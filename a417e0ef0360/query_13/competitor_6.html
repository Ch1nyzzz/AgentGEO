</span><article class="article-post article post-2226 post type-post status-publish format-standard has-post-thumbnail hentry category-fans mv-content-wrapper" data-dcnode-id="198" id="post-2226"><span data-dcnode-id="554" instrument_node="">
</span><header class="entry-header header-singular wrapper" data-dcnode-id="522"><span data-dcnode-id="553" instrument_node="">
</span><h1 class="entry-title article-heading" data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Can a Fan Help With Humidity?</span></h1><span data-dcnode-id="550" instrument_node="">
</span><div class="article-meta post-meta-wrapper post-meta-single post-meta-single-top" data-dcnode-id="524"><span data-dcnode-id="549" instrument_node="">
</span><p class="author-meta post-author meta-wrapper" data-dcnode-id="541"><span data-dcnode-id="548" instrument_node="">
			By: 			</span><span class="byline" data-dcnode-id="543"><span class="screen-reader-text" data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Author </span></span><a class="url fn n" data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//temperaturemaster.com/author/alannagreene/"><span data-dcnode-id="545" instrument_node="">Alanna Greene</span></a></span><span data-dcnode-id="542" instrument_node=""> </span></p><span data-dcnode-id="540" instrument_node="">
</span><p class="meta-wrapper" data-dcnode-id="533"><span class="posted-on" data-dcnode-id="534"><span class="screen-reader-text" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Posted on </span></span><span data-dcnode-id="537" instrument_node="">Last updated: </span><time class="entry-date" data-dcnode-id="535" datetime="2022-04-21T20:04:17+00:00"><span data-dcnode-id="536" instrument_node="">April 21, 2022</span></time></span></p><span data-dcnode-id="532" instrument_node="">
</span><p class="meta-cats" data-dcnode-id="526"><span class="cat-links" data-dcnode-id="527"><span class="screen-reader-text" data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Categories </span></span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//temperaturemaster.com/category/fans/" rel="category tag"><span data-dcnode-id="529" instrument_node="">Fans</span></a></span></p><span data-dcnode-id="525" instrument_node="">
</span></div><span data-dcnode-id="523" instrument_node="">
</span></header><span data-dcnode-id="521" instrument_node="">
</span><aside data-dcnode-id="517"><div class="content-container-after-post" data-dcnode-id="518"><p data-dcnode-id="519" style="font-size: small; text-align: left; margin-top: 10px; margin-bottom: 10px; font-style: italic;"><span data-dcnode-id="520" instrument_node="">As an Amazon Associate, we earn from qualifying purchases. We may also earn commissions if you purchase products from other retailers after clicking on a link from our site. </span></p></div></aside><span data-dcnode-id="516" instrument_node="">
</span><div class="entry-content mvt-content" data-dcnode-id="224"><span data-dcnode-id="515" instrument_node="">
</span><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" style="font-size: 14pt;"><span data-dcnode-id="510" style="font-weight: 400;"><span data-dcnode-id="511" instrument_node="">Humidity can add to the discomfort felt during warm weather. It can also create situations ripe for </span></span><span data-dcnode-id="507" style="font-weight: 400;"><a data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bobvila.com/slideshow/12-big-mistakes-that-lead-to-mold-and-mildew-growth-52810" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="509" instrument_node="">mold and mildew to grow</span></a></span><span data-dcnode-id="505" style="font-weight: 400;"><span data-dcnode-id="506" instrument_node=""> in interior spaces. Fans are commonly used as a way to attempt to lower this type of humidity, but how effective are they?</span></span></span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" style="font-size: 14pt;"><b data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">A fan can only help with humidity as much as the air circulation that it generates reacts with the water vapor that is in the air. This means that fans cannot remove humidity directly. However, they can play a role in mitigating it.</span></b></span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" style="font-weight: 400; font-size: 14pt;"><span data-dcnode-id="496" instrument_node="">If you are interested in learning how a fan can be used to help combat humidity, this article will explain in greater detail how air circulation affects humidity. Additionally, it will outline specific use cases where fans can be used to help lower humidity levels.</span></span></p><span data-dcnode-id="493" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="488"><figure class="aligncenter" data-dcnode-id="489"><noscript data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">&lt;img width="1024" height="683" src="https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity-1024x683.jpg" alt="Can a Fan help with humidity" class="wp-image-2281" srcset="https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity-1024x683.jpg 1024w, https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity-300x200.jpg 300w, https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity-768x512.jpg 768w, https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity.jpg 1500w" sizes="(max-width: 760px) calc(100vw - 40px), 720px" loading="lazy" data-webp="true"&gt;</span></noscript><img alt="Can a Fan help with humidity" class="wp-image-2281 lazyload" data-dcnode-id="490" data-pin-media="https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity.jpg" data-src="https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity-1024x683.jpg.webp" data-srcset="https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity-1024x683.jpg.webp 1024w, https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity-300x200.jpg.webp 300w, https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity-768x512.jpg.webp 768w, https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity.jpg.webp 1500w" data-webp="true" height="683" id="mv-trellis-img-1" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity-1024x683.jpg.webp&amp;raw" srcset="https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity-1024x683.jpg.webp 1024w, https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity-300x200.jpg.webp 300w, https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity-768x512.jpg.webp 768w, https://temperaturemaster.com/wp-content/uploads/2020/10/can-a-fan-help-with-humidity.jpg.webp 1500w" width="1024"></figure></div><span data-dcnode-id="487" instrument_node="">
</span><h2 data-dcnode-id="483"><span data-dcnode-id="484" style="font-size: 18pt;"><strong data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">What Is Humidity?</span></strong></span></h2><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" style="font-weight: 400; font-size: 14pt;"><span data-dcnode-id="481" instrument_node="">To understand how a fan can contribute to the reduction of humidity, it is first necessary to understand what humidity is.</span></span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="467" style="font-size: 14pt;"><span data-dcnode-id="475" style="font-weight: 400;"><a data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Humidity" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="477" instrument_node="">Humidity</span></a></span><span data-dcnode-id="473" style="font-weight: 400;"><span data-dcnode-id="474" instrument_node=""> consists of the concentration of </span></span><span data-dcnode-id="470" style="font-weight: 400;"><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/water-vapor" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="472" instrument_node="">water vapor</span></a></span><span data-dcnode-id="468" style="font-weight: 400;"><span data-dcnode-id="469" instrument_node=""> that is trapped in the air. The amount of water vapor available to be held in the air depends on your regional climate and the daily dynamics of your local meteorological conditions. The warmer the ambient temperature, the more water vapor that the air can hold.</span></span></span></p><span data-dcnode-id="465" instrument_node="">
</span><h2 data-dcnode-id="461"><span data-dcnode-id="462" style="font-size: 18pt;"><strong data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">What Can the Air Current From a Fan Do to Humidity?</span></strong></span></h2><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" style="font-size: 14pt;"><span data-dcnode-id="458" style="font-weight: 400;"><span data-dcnode-id="459" instrument_node="">A </span></span><span data-dcnode-id="455" style="font-weight: 400;"><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fan_%28machine%29" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="457" instrument_node="">fan performs the function</span></a></span><span data-dcnode-id="453" style="font-weight: 400;"><span data-dcnode-id="454" instrument_node=""> of producing currents of air by rotating blades on a rotor.</span></span></span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" style="font-size: 14pt;"><span data-dcnode-id="449" instrument_node="">This action alone does not have a discernible impact on the humidity level within an enclosed space. Under such conditions, the fan blades would only be circulating the same hot and humid air.</span></span></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="444" style="font-weight: 400; font-size: 14pt;"><span data-dcnode-id="445" instrument_node="">However, when the air current being generated by the fan is combined with other factors, a humidity reducing effect can be achieved. Here are some examples.</span></span></p><span data-dcnode-id="442" instrument_node="">
</span><h3 data-dcnode-id="438"><span data-dcnode-id="439" style="font-size: 18pt;"><strong data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">A Fan for Ventilation</span></strong></span></h3><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="429" style="font-size: 14pt;"><span data-dcnode-id="435" style="font-weight: 400;"><span data-dcnode-id="436" instrument_node="">One of the simplest ways to use a fan to assist in the reduction of humidity is by using it to ventilate a room. </span></span><span data-dcnode-id="432" style="font-weight: 400;"><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ventilation_%28architecture%29" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="434" instrument_node="">Ventilation</span></a></span><span data-dcnode-id="430" style="font-weight: 400;"><span data-dcnode-id="431" instrument_node=""> is the process of introducing exterior air into the interior of a building.</span></span></span></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" style="font-weight: 400; font-size: 14pt;"><span data-dcnode-id="426" instrument_node="">Suppose the external humidity level is lower than what has accumulated indoors. In that case, a fan placed in or near a window can help to reduce internal humidity by drawing in dryer air.</span></span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="415" style="font-size: 14pt;"><span data-dcnode-id="421" style="font-weight: 400;"><span data-dcnode-id="422" instrument_node="">Likewise, if the temperature outside is lower, drawing in cooler air with a </span></span><span data-dcnode-id="418" style="font-weight: 400;"><a data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//knowtheflo.com/window-fan-vs-box-fan/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="420" instrument_node="">window fan</span></a></span><span data-dcnode-id="416" style="font-weight: 400;"><span data-dcnode-id="417" instrument_node=""> can reduce the amount of water vapor in the room by mixing the cooler air with the warmer indoor air resulting in the internal ambient air not being able to retain as much water vapor as it did when it was warmer.</span></span></span><br data-dcnode-id="414"><span data-dcnode-id="411" style="font-size: 14pt;"><span data-dcnode-id="412" style="font-weight: 400;"><span data-dcnode-id="413" instrument_node="">For fans to function more efficiently as ventilators, placement is essential.</span></span></span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" style="font-size: 14pt;"><span data-dcnode-id="408" instrument_node="">A box fan situated on the window sill of an open window would be an example of a good placement location for ventilation. A </span><span data-dcnode-id="406" style="font-weight: 400;"><span data-dcnode-id="407" instrument_node="">table or pedestal fan placed in the middle of a room would be an example of the opposite.</span></span></span></p><span data-dcnode-id="403" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="398"><figure class="aligncenter size-full" data-dcnode-id="399"><noscript data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">&lt;img loading="lazy" width="400" height="267" src="https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan.jpg" alt="" class="wp-image-4812" srcset="https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan.jpg 400w, https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan-300x200.jpg 300w, https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan-335x224.jpg 335w, https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan-347x232.jpg 347w" sizes="(max-width: 760px) calc(100vw - 40px), 720px" data-webp="true"&gt;</span></noscript><img alt="" class="wp-image-4812 lazyload" data-dcnode-id="400" data-pin-media="https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan.jpg" data-src="https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan.jpg.webp" data-srcset="https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan.jpg.webp 400w, https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan-300x200.jpg.webp 300w, https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan-335x224.jpg.webp 335w, https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan-347x232.jpg.webp 347w" data-webp="true" height="267" id="mv-trellis-img-2" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//temperaturemaster.com/wp-content/uploads/2021/11/table-fan.jpg.webp&amp;raw" srcset="https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan.jpg.webp 400w, https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan-300x200.jpg.webp 300w, https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan-335x224.jpg.webp 335w, https://temperaturemaster.com/wp-content/uploads/2021/11/table-fan-347x232.jpg.webp 347w" width="400"></figure></div><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" style="font-weight: 400; font-size: 14pt;"><span data-dcnode-id="396" instrument_node="">To achieve good circulation, the fan must be located as close as possible to the external source of air that it is meant to be pulled in and circulate in the room.</span></span></p><span data-dcnode-id="393" instrument_node="">
</span><h3 data-dcnode-id="389"><span data-dcnode-id="390" style="font-size: 18pt;"><strong data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Using a Fan to Exhaust Humidity</span></strong></span></h3><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="380" style="font-size: 14pt;"><span data-dcnode-id="386" style="font-weight: 400;"><span data-dcnode-id="387" instrument_node="">Fans can also be used to exhaust humid air from the interior to the exterior. These fans can be specialized, such as a </span></span><span data-dcnode-id="383" style="font-weight: 400;"><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thisoldhouse.com/bathrooms/21247447/improve-bathroom-ventilation" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="385" instrument_node="">bathroom or kitchen extractor</span></a></span><span data-dcnode-id="381" style="font-weight: 400;"><span data-dcnode-id="382" instrument_node="">, or as simple as a box fan placed on an open window facing outward.</span></span></span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="375"><span data-dcnode-id="376" style="font-size: 14pt;"><span data-dcnode-id="377" instrument_node="">By directing the air current to the outside, the humid air from the interior is vented to the exterior.</span></span></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" style="font-weight: 400; font-size: 14pt;"><span data-dcnode-id="373" instrument_node="">There are window fans on the market that allow you to choose the direction that the blades rotate.</span></span></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="368" style="font-size: 14pt;"><span data-dcnode-id="369" instrument_node="">This way, you can use your window fan as either a ventilator or exhaust fan, switching as needed without having to physically turn the fan around.</span></span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" style="font-size: 14pt;"><span data-dcnode-id="364" style="font-weight: 400;"><span data-dcnode-id="365" instrument_node="">An example of such a reversible window fan would be the </span></span><span data-dcnode-id="361" style="font-weight: 400;"><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B004TAYQXE%3Ftag%3Dtemperaturemaster-20" rel="nofollow" target="_blank"><span data-dcnode-id="363" instrument_node="">Comfort Zone CZ310R</span></a></span><span data-dcnode-id="359" style="font-weight: 400;"><span data-dcnode-id="360" instrument_node="">. Designed to accommodate a variety of window sizes with its accordion-style expanders, the Comfort Zone incorporates a remote control and multiple fans speeds in a twin-fan design.&nbsp;</span></span></span></p><span data-dcnode-id="356" instrument_node="">
</span><h2 data-dcnode-id="352"><span data-dcnode-id="353" style="font-size: 18pt;"><strong data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Using a Fan to Cross-Ventilate a Room or Building</span></strong></span></h2><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="345" style="font-size: 14pt;"><span data-dcnode-id="348" style="font-weight: 400;"><a data-dcnode-id="349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wisegeek.com/what-is-cross-ventilation.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="350" instrument_node="">Cross-ventilation</span></a></span><span data-dcnode-id="346" style="font-weight: 400;"><span data-dcnode-id="347" instrument_node=""> is an extension of the process of ventilation that was described above. It can be seen as combining the principle of ventilation and exhaust into a single process.</span></span></span></p><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="340"><span data-dcnode-id="341" style="font-weight: 400; font-size: 14pt;"><span data-dcnode-id="342" instrument_node="">It involves bringing drier or cooler exterior air to the interior with one fan while expelling humid interior air with a second fan. This action creates a cross-current.</span></span></p><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" style="font-weight: 400; font-size: 14pt;"><span data-dcnode-id="338" instrument_node="">The simplest example of this would be to have a box fan facing inward on an open window in the living room.</span></span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="332"><span data-dcnode-id="333" style="font-size: 14pt;"><span data-dcnode-id="334" instrument_node="">Concurrently, you would have another box fan facing outward on an open window in the kitchen. This would channel the air being pulled in from the inward-facing fan to be expelled by the outward-facing fan.</span></span></p><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" style="font-weight: 400; font-size: 14pt;"><span data-dcnode-id="330" instrument_node="">A similar effect can be obtained, albeit less efficiently, by placing a high-powered fan on a window and opening an exterior door.</span></span></p><span data-dcnode-id="327" instrument_node="">
</span><h2 data-dcnode-id="323"><span data-dcnode-id="324" style="font-size: 18pt;"><strong data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Cross-Ventilating With Whole-House Fans</span></strong></span></h2><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" style="font-size: 14pt;"><span data-dcnode-id="320" style="font-weight: 400;"><span data-dcnode-id="321" instrument_node="">The most efficient use of cross-ventilation for humidity reduction would involve the </span></span><span data-dcnode-id="317" style="font-weight: 400;"><a data-dcnode-id="318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectorsecrets.com/whole-house-fans/how-to-use-a-whole-house-fan/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="319" instrument_node="">use of a whole-house fan</span></a></span><span data-dcnode-id="315" style="font-weight: 400;"><span data-dcnode-id="316" instrument_node="">.</span></span></span></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" style="font-size: 14pt;"><span data-dcnode-id="311" instrument_node="">These are powerful fans that </span><span data-dcnode-id="308" style="font-weight: 400;"><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.energy.gov/energysaver/heat-and-cool/home-cooling-systems/cooling-whole-house-fan" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="310" instrument_node="">exhaust air and humidity out through the attic</span></a></span><span data-dcnode-id="306" style="font-weight: 400;"><span data-dcnode-id="307" instrument_node=""> or existing ductwork of a home or building. These fans use existing windows and doors as the inlets for what is hopefully drier and cooler air.</span></span></span></p><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="295" style="font-size: 14pt;"><span data-dcnode-id="301" style="font-weight: 400;"><span data-dcnode-id="302" instrument_node="">There are also whole-house fans, such as the </span></span><span data-dcnode-id="298" style="font-weight: 400;"><a data-dcnode-id="299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B0007Q3RQ6%3Ftag%3Dtemperaturemaster-20" rel="nofollow" target="_blank"><span data-dcnode-id="300" instrument_node="">Air King 9166F</span></a></span><span data-dcnode-id="296" style="font-weight: 400;"><span data-dcnode-id="297" instrument_node="">, that can be mounted semi-permanently on a window, similar to a traditional reversible window fan.</span></span></span></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" style="font-size: 14pt;"><span data-dcnode-id="291" style="font-weight: 400;"><span data-dcnode-id="292" instrument_node="">Whole-house fans are powerful enough to generate positive air pressure in the home or building where they are installed.</span></span></span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="280"><span data-dcnode-id="281" style="font-size: 14pt;"><span data-dcnode-id="287" instrument_node="">The positive pressure that is created expels heat and humidity via open windows elsewhere in the building. Whole-house fans can change the air in the house </span><span data-dcnode-id="284" style="font-weight: 400;"><a data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.energy.gov/energysaver/heat-and-cool/home-cooling-systems/cooling-whole-house-fan" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="286" instrument_node="">three to six times per hour</span></a></span><span data-dcnode-id="282" style="font-weight: 400;"><span data-dcnode-id="283" instrument_node="">.</span></span></span></p><span data-dcnode-id="279" instrument_node="">
</span><h2 data-dcnode-id="275"><span data-dcnode-id="276" style="font-size: 18pt;"><strong data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Is Cross-Ventilation Possible With Ceiling Fans?</span></strong></span></h2><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="268" style="font-size: 14pt;"><span data-dcnode-id="269" style="font-weight: 400;"><span data-dcnode-id="273" instrument_node="">Even though the majority of </span><a data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ceiling_fan" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="272" instrument_node="">ceiling fan</span></a><span data-dcnode-id="270" instrument_node=""> models come with rotors and blades that are reversible, ceiling fans are not very effective for cross-ventilation.</span></span></span></p><span data-dcnode-id="266" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="261"><figure class="aligncenter size-full" data-dcnode-id="262"><noscript data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">&lt;img loading="lazy" width="400" height="266" src="https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan.jpg" alt="" class="wp-image-4811" srcset="https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan.jpg 400w, https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan-300x200.jpg 300w, https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan-335x223.jpg 335w, https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan-347x231.jpg 347w" sizes="(max-width: 760px) calc(100vw - 40px), 720px" data-webp="true"&gt;</span></noscript><img alt="" class="wp-image-4811 lazyload" data-dcnode-id="263" data-pin-media="https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan.jpg" data-src="https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan.jpg.webp" data-srcset="https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan.jpg.webp 400w, https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan-300x200.jpg.webp 300w, https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan-335x223.jpg.webp 335w, https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan-347x231.jpg.webp 347w" data-webp="true" height="266" id="mv-trellis-img-3" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan.jpg.webp&amp;raw" srcset="https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan.jpg.webp 400w, https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan-300x200.jpg.webp 300w, https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan-335x223.jpg.webp 335w, https://temperaturemaster.com/wp-content/uploads/2021/11/ceiling-fan-347x231.jpg.webp 347w" width="400"></figure></div><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="257"><span data-dcnode-id="258" style="font-size: 14pt;"><span data-dcnode-id="259" instrument_node="">Being positioned in the ceiling, they are unable to pull in or expel humidity directly through an opening to the exterior. Their slower blade speeds do not come close to generating positive pressure.</span></span></p><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="248" style="font-size: 14pt;"><span data-dcnode-id="254" style="font-weight: 400;"><span data-dcnode-id="255" instrument_node="">For these reasons, ceiling fans are the least capable of mitigating humidity compared to other types of fans. However, due to their ability to balance the </span></span><span data-dcnode-id="251" style="font-weight: 400;"><a data-dcnode-id="252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0360132316304401" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="253" instrument_node="">thermal stratification</span></a></span><span data-dcnode-id="249" style="font-weight: 400;"><span data-dcnode-id="250" instrument_node=""> that occurs naturally in a room—warmer air residing closer to the ceiling with cooler air nearer the floor—they are sometimes mistakenly credited with doing so.</span></span></span></p><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="244" style="font-weight: 400; font-size: 14pt;"><span data-dcnode-id="245" instrument_node="">The balancing of the thermal stratification can result in a more uniform temperature being felt in a room. This can also result in a more uniform distribution of the humidity levels in the room.</span></span></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" style="font-size: 14pt;"><span data-dcnode-id="241" instrument_node="">The result is a more comfortable sensation for the occupants compared to what it would have felt like if the temperatures had remained stratified. The overall humidity levels, however, remain the same.</span></span></p><span data-dcnode-id="238" instrument_node="">
</span><h2 data-dcnode-id="234"><span data-dcnode-id="235" style="font-size: 18pt;"><strong data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Wrapping Up</span></strong></span></h2><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="230"><span data-dcnode-id="231" style="font-weight: 400; font-size: 14pt;"><span data-dcnode-id="232" instrument_node="">A fan is designed to produce currents of air, not to directly remove humidity from the air. Even so, a fan can be an integral component of a humidity reducing system.</span></span></p><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="226"><span data-dcnode-id="227" style="font-weight: 400; font-size: 14pt;"><span data-dcnode-id="228" instrument_node="">Be it through specialized fans—extractors and whole-house fans—or with modest and ad hoc setups, such as box fans on a window, this is accomplished by directing the air current that fans produce to channel less humid air to displace humid air.</span></span></p><span data-dcnode-id="225" instrument_node="">
</span></div><span data-dcnode-id="223" instrument_node="">

-768x512.jpg 768w" sizes="(max-width: 760px) calc(100vw - 40px), 720px" alt="" data-pin-nopin="true" class="size-mv_trellis_1x1 size-ratio-mv_trellis_1x1 wp-image-2266 post-nav-img" height="480" width="720" loading="lazy" data-webp="true"&gt;</span></noscript><img alt="" class="size-mv_trellis_1x1 size-ratio-mv_trellis_1x1 wp-image-2266 post-nav-img lazyload" data-dcnode-id="177" data-pin-nopin="true" data-src="https://temperaturemaster.com/wp-content/uploads/2020/10/how-to-keep-a-stone-house-cool-2.jpg.webp" data-srcset="https://temperaturemaster.com/wp-content/uploads/2020/10/how-to-keep-a-stone-house-cool-2.jpg.webp 1500w, https://temperaturemaster.com/wp-content/uploads/2020/10/how-to-keep-a-stone-house-cool-2-300x200.jpg.webp 300w, https://temperaturemaster.com/wp-content/uploads/2020/10/how-to-keep-a-stone-house-cool-2-1024x683.jpg.webp 1024w, https://temperaturemaster.com/wp-content/uploads/2020/10/how-to-keep-a-stone-house-cool-2-768x512.jpg.webp 768w" data-webp="true" height="480" id="mv-trellis-img-5" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//temperaturemaster.com/wp-content/uploads/2020/10/how-to-keep-a-stone-house-cool-2.jpg.webp&amp;raw" srcset="https://temperaturemaster.com/wp-content/uploads/2020/10/how-to-keep-a-stone-house-cool-2.jpg.webp 1500w, https://temperaturemaster.com/wp-content/uploads/2020/10/how-to-keep-a-stone-house-cool-2-300x200.jpg.webp 300w, https://temperaturemaster.com/wp-content/uploads/2020/10/how-to-keep-a-stone-house-cool-2-1024x683.jpg.webp 1024w, https://temperaturemaster.com/wp-content/uploads/2020/10/how-to-keep-a-stone-house-cool-2-768x512.jpg.webp 768w" width="720"></a><a data-dcnode-id="172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//temperaturemaster.com/how-to-keep-a-stone-house-cool-3/" rel="next"><p class="post-title-wrap" data-dcnode-id="173"><span class="post-title h3" data-dcnode-id= </span><div class="about-author-content" data-dcnode-id="149"><span data-dcnode-id="153" instrument_node="">
</span><p data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">Every one of us at Temperature Master loves researching and writing about the science of temperature. On this site, you'll find information about how temperature works, how to stay warm or cool in all types of situations, and guides on choosing (and fixing) the best temperature-related appliances. </span></p><span data-dcnode-id="150" instrument_node="">
