</span></div><div class="html-p" data-dcnode-id="5861"><span data-dcnode-id="5877" instrument_node="">Srivastava et al. used three different composite materials to extract water from atmospheric air: LiCl/sand (CM 1), CaCl</span><sub data-dcnode-id="5875"><span data-dcnode-id="5876" instrument_node="">2</span></sub><span data-dcnode-id="5874" instrument_node="">/sand (CM 2), and LiBr/sand (CM 3), each with a 37 percent concentration of hygroscopic salt and sand as a host medium. Absorption and desorption mechanisms were used to remove water from the air. A new Scheffler reflector (1.54 m</span><sup data-dcnode-id="5872"><span data-dcnode-id="5873" instrument_node="">2</span></sup><span data-dcnode-id="5871" instrument_node="">) was used during the day to refresh the area [</span><a class="html-bibr" data-dcnode-id="5869" href="#B66-energies-15-00421" title=""><span data-dcnode-id="5870" instrument_node="">66</span></a><span data-dcnode-id="5868" instrument_node="">]. </span><a class="html-fig html-figpopup" data-dcnode-id="5866" href="#fig_body_display_energies-15-00421-f013"><span data-dcnode-id="5867" instrument_node="">Figure 13</span></a><span data-dcnode-id="5865" instrument_node=""> shows a daytime schematic diagram of water generation employing a composite desiccant material and a fixed focus concentrator. </span><a class="html-table html-tablepopup" data-dcnode-id="5863" href="#table_body_display_energies-15-00421-t001"><span data-dcnode-id="5864" instrument_node="">Table 1</span></a><span data-dcnode-id="5862" instrument_node=""> shows various strategies that have been published for extracting water from ambient air.</span></div><div class="html-fig-wrap" data-dcnode-id="5840" id="energies-15-00421-f013"><span data-dcnode-id="5860" instrument_node="">

</span></div><div class="html-p" data-dcnode-id="5832"><span data-dcnode-id="5839" instrument_node="">An experimental work was conducted in Malaysia’s tropical outdoor environment conditions, in which the performance of a medium-scale atmosphere water generator (MSAWG) system was tested for a 48 h period from 8 p.m. on 18 March 2020 to 8 p.m. on 20 March 2020. It is observed in </span><a class="html-fig html-figpopup" data-dcnode-id="5837" href="#fig_body_display_energies-15-00421-f014"><span data-dcnode-id="5838" instrument_node="">Figure 14</span></a><span data-dcnode-id="5836" instrument_node=""> that the MSAWG system’s hourly water production climbed from 110 mL/h at 9 p.m. (night) on 18 March 2020 to 204 mL/h at 5 a.m. (early morning) on 19 March 2020 as the corresponding relative humidity rates increased from 62 to 80 percent. Hence, AWG can be used as a long-term solution to consistently generate daily fresh water, helping to alleviate the country’s unpredicted water crisis [</span><a class="html-bibr" data-dcnode-id="5834" href="#B69-energies-15-00421" title=""><span data-dcnode-id="5835" instrument_node="">69</span></a><span data-dcnode-id="5833" instrument_node="">].</span></div><div class="html-fig-wrap" data-dcnode-id="5808" id="energies-15-00421-f014"><span data-dcnode-id="5831" instrument_node="">

Values of hourly water production of MSAWG in a 48 h period from 8.00 p.m. on 18 March 2020 to 8.00 p.m. on 20 March 2020 (reprinted from Reference [</span><a class="html-bibr" data-dcnode-id="5815" href="#B69-energies-15-00421" title=""><span data-dcnode-id="5816" instrument_node="">69</span></a><span data-dcnode-id="5814" instrument_node="">] under the terms of the Creative Commons Attribution License CC BY 4.0 license, </span><a data-dcnode-id="5812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/4.0/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5813" instrument_node="">https://creativecommons.org/licenses/by/4.0/</span></a><span data-dcnode-id="5811" instrument_node=""> (accessed on 25 October 2021)).

</span></div><span data-dcnode-id="5809" instrument_node="">
</span></div></section></section><section data-dcnode-id="5798" id="sec3-energies-15-00421" type=""><h2 data-dcnode-id="5804" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5805" instrument_node=""> 3. Policy Perspective</span></h2><div class="html-p" data-dcnode-id="5799"><span data-dcnode-id="5803" instrument_node="">Environmental and water resource economic debates are all new topics driving policy decisions on this technology. The best support for AWG system adoption reveals interesting choices, comparable to those seen in intermittent renewable energy sources. On the one hand, a subsidy for the purchase of an AWG or for the price of power may result in social benefits such as cheaper investment in water infrastructure, less environmental harm, and lower health risks. High AWG penetration, on the other hand, may raise overall energy consumption, impair the economy of scale for alternate water resources, and incur economic costs [</span><a class="html-bibr" data-dcnode-id="5801" href="#B70-energies-15-00421" title=""><span data-dcnode-id="5802" instrument_node="">70</span></a><span data-dcnode-id="5800" instrument_node="">].</span></div></section><section data-dcnode-id="5787" id="sec4-energies-15-00421" type="conclusions"><h2 data-dcnode-id="5796" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5797" instrument_node=""> 4. Conclusions</span></h2><div class="html-p" data-dcnode-id="5788"><span data-dcnode-id="5795" instrument_node="">Even though there are sufficient water resources, their uneven circulation leads to a shortage and requirement for portable fresh water. More than two billion people live in water-stressed areas. Studying a range of research shows that the most widespread method for actively extracting water from atmospheric air is the air-cooling method, where water is produced for free because it is a byproduct. In contrast, the best method for extracting water passively (without using an energy source) is the desiccant method because it can be used anywhere, unlike the dew collection method, which can only be used in regions where very high quantities of moisture occur, such as coastal and mountain areas, and in contrast to Earth-water collecting methods, which can only be used in open, sandy regions such as deserts. The maximum amount of water collected is 2.5 L/m</span><sup data-dcnode-id="5793"><span data-dcnode-id="5794" instrument_node="">2</span></sup><span data-dcnode-id="5792" instrument_node="">/day using CaCl</span><sub data-dcnode-id="5790"><span data-dcnode-id="5791" instrument_node="">2</span></sub><span data-dcnode-id="5789" instrument_node=""> as a desiccant, a pyramid-shaped multi-shelf device, and solar energy as a heating source. Researchers have begun to use the desiccant method for water extraction because it has a high production rate, does not require an energy source, and uses solar energy as a heating source. This research work will support further research on the extraction of water from atmospheric air in arid zones for the benefit of society</span></div></section><section data-dcnode-id="5782" id="sec5-energies-15-00421" type=""><h2 data-dcnode-id="5785" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5786" instrument_node=""> 5. Future Work and Limitations</span></h2><div class="html-p" data-dcnode-id="5783"><span data-dcnode-id="5784" instrument_node="">A water extraction system is a potential way to rapidly supply drinking water. The ability to connect an extraction system to a local Wi-Fi or Bluetooth device, as well as its ability to be an Internet of Things (IoT) device, will allow the user to engage with it intuitively. Water extraction systems should be further developed in the near future. Water extraction is capable of expanding the limitations of present technologies and will considerably help to reduce water shortages as a result of all of the aforementioned research efforts and the attractive possibilities that they have offered.</span></div></section><span data-dcnode-id="5781" instrument_node="">
