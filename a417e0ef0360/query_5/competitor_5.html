</span><meta content="A Recent and Systematic Review on Water Extraction from the Atmosphere for Arid Zones" data-dcnode-id="11304" name="title"><span data-dcnode-id="11303" instrument_node="">
</span><meta content="Water is essential for food security, industrial output, ecological sustainability, and a country&amp;rsquo;s socioeconomic progress. Water scarcity and environmental concerns have increased globally in recent years as a result of the ever-increasing population, rapid industrialization and urbanization, and poor water resource management. Even though there are sufficient water resources, their uneven circulation leads to shortages and the requirement for portable fresh water. More than two billion people live in water-stressed areas. Hence, the present study covers all of the research based on water extraction from atmospheric air, including theoretical and practical (different experimental methods) research. A comparison between different results is made. The calculated efficiency of the systems used to extract water from atmospheric air by simulating the governing equations is discussed. The effects of different limitations, which affect and enhance the collectors&amp;rsquo; efficiency, are studied. This research article will be very useful to society and will support further research on the extraction of water in arid zones." data-dcnode-id="11302" name="description"><span data-dcnode-id="11301" instrument_node="">

</span><meta content="A Recent and Systematic Review on Water Extraction from the Atmosphere for Arid Zones" data-dcnode-id="11178" property="og:title"><span data-dcnode-id="11177" instrument_node="">
</span><meta content="Water is essential for food security, industrial output, ecological sustainability, and a country&amp;rsquo;s socioeconomic progress. Water scarcity and environmental concerns have increased globally in recent years as a result of the ever-increasing population, rapid industrialization and urbanization, and poor water resource management. Even though there are sufficient water resources, their uneven circulation leads to shortages and the requirement for portable fresh water. More than two billion people live in water-stressed areas. Hence, the present study covers all of the research based on water extraction from atmospheric air, including theoretical and practical (different experimental methods) research. A comparison between different results is made. The calculated efficiency of the systems used to extract water from atmospheric air by simulating the governing equations is discussed. The effects of different limitations, which affect and enhance the collectors&amp;rsquo; efficiency, are studied. This research article will be very useful to society and will support further research on the extraction of water in arid zones." data-dcnode-id="11176" property="og:description"><span data-dcnode-id="11175" instrument_node="">

</span><p data-dcnode-id="10856"><span data-dcnode-id="10857" instrument_node="">
All articles published by MDPI are made immediately available worldwide under an open access license. No special
permission is required to reuse all or part of the article published by MDPI, including figures and tables. For
articles published under an open access Creative Common CC BY license, any part of the article may be reused without
permission provided that the original article is clearly cited.
</span></p><span data-dcnode-id="10855" instrument_node="">
</span></div><span data-dcnode-id="10853" instrument_node="">
</span><div aria-hidden="true" class="f-dropdown medium" data-dcnode-id="10845" data-dropdown-content="" id="drop-article-label-feature" tabindex="-1"><span data-dcnode-id="10852" instrument_node="">
</span><p data-dcnode-id="10850"><span data-dcnode-id="10851" instrument_node="">
Feature Papers represent the most advanced research with significant potential for high impact in the field. Feature
Papers are submitted upon individual invitation or recommendation by the scientific editors and undergo peer review
prior to publication.
</span></p><span data-dcnode-id="10849" instrument_node="">
</span><p data-dcnode-id="10847"><span data-dcnode-id="10848" instrument_node="">
The Feature Paper can be either an original research article, a substantial novel research study that often involves
several techniques or approaches, or a comprehensive review paper with concise and precise updates on the latest
progress in the field that systematically reviews the most exciting advances in scientific literature. This type of
paper provides an outlook on future directions of research or possible applications.
</span></p><span data-dcnode-id="10846" instrument_node="">
</span></div><span data-dcnode-id="10844" instrument_node="">
</span><div aria-hidden="true" class="f-dropdown medium" data-dcnode-id="10839" data-dropdown-content="" id="drop-article-label-choice" tabindex="-1"><span data-dcnode-id="10843" instrument_node="">
</span><p data-dcnode-id="10841"><span data-dcnode-id="10842" instrument_node="">
Editor’s Choice articles are based on recommendations by the scientific editors of MDPI journals from around the world.
Editors select a small number of articles recently published in the journal that they believe will be particularly
interesting to authors, or important in this field. The aim is to provide a snapshot of some of the most exciting work
published in the various research areas of the journal.
</span></p><span data-dcnode-id="10840" instrument_node="">

</span><h2 data-dcnode-id="6720" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6721" instrument_node="">Abstract</span></h2><span data-dcnode-id="6719" instrument_node="">
</span></div><span data-dcnode-id="6717" instrument_node="">
</span><div class="art-abstract in-tab hypothesis_container" data-dcnode-id="6715"><span data-dcnode-id="6716" instrument_node="">
Water is essential for food security, industrial output, ecological sustainability, and a country’s socioeconomic progress. Water scarcity and environmental concerns have increased globally in recent years as a result of the ever-increasing population, rapid industrialization and urbanization, and poor water resource management. Even though there are sufficient water resources, their uneven circulation leads to shortages and the requirement for portable fresh water. More than two billion people live in water-stressed areas. Hence, the present study covers all of the research based on water extraction from atmospheric air, including theoretical and practical (different experimental methods) research. A comparison between different results is made. The calculated efficiency of the systems used to extract water from atmospheric air by simulating the governing equations is discussed. The effects of different limitations, which affect and enhance the collectors’ efficiency, are studied. This research article will be very useful to society and will support further research on the extraction of water in arid zones.
</span></div><span data-dcnode-id="6714" instrument_node="">

</span><div class="html-body" data-dcnode-id="5780"><span data-dcnode-id="6682" instrument_node="">
</span><section data-dcnode-id="6642" id="sec1-energies-15-00421" type="intro"><h2 data-dcnode-id="6680" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6681" instrument_node=""> 1. Introduction</span></h2><div class="html-p" data-dcnode-id="6657"><span data-dcnode-id="6679" instrument_node="">Freshwater production is one of the world’s most pressing issues today. Despite the fact that desalination can provide a climate-independent source of clean water, it is a time-consuming and energy-intensive process [</span><a class="html-bibr" data-dcnode-id="6677" href="#B1-energies-15-00421" title=""><span data-dcnode-id="6678" instrument_node="">1</span></a><span data-dcnode-id="6676" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6674" href="#B2-energies-15-00421" title=""><span data-dcnode-id="6675" instrument_node="">2</span></a><span data-dcnode-id="6673" instrument_node="">]. Even though there are sufficient water resources, their uneven circulation leads to shortages and the requirement for portable fresh water. More than two billion people live in water-stressed areas. Large-scale desalination systems, which are currently largely powered by nonrenewable energy sources, have gradually improved freshwater supplies in several coastal regions [</span><a class="html-bibr" data-dcnode-id="6671" href="#B3-energies-15-00421" title=""><span data-dcnode-id="6672" instrument_node="">3</span></a><span data-dcnode-id="6670" instrument_node="">]. In addition, water is used inefficiently in many fields, such as industries, agriculture, and many others. Currently, many countries in the world are facing water crises [</span><a class="html-bibr" data-dcnode-id="6668" href="#B4-energies-15-00421" title=""><span data-dcnode-id="6669" instrument_node="">4</span></a><span data-dcnode-id="6667" instrument_node="">]. As of now, the percentage of fresh water available on the Earth’s surface is precisely 3.0%, and the remaining 97% is saline water. A considerable fraction of this fresh water persists in the form of ice (68.7%). This is mainly the case in regions of the Arctic and Antarctica. The primary water use is only 0.26% (rivers and freshwater lakes) of the entire global water reserves (90,000 km</span><sup data-dcnode-id="6665"><span data-dcnode-id="6666" instrument_node="">3</span></sup><span data-dcnode-id="6664" instrument_node="">) for human consumption [</span><a class="html-bibr" data-dcnode-id="6662" href="#B5-energies-15-00421" title=""><span data-dcnode-id="6663" instrument_node="">5</span></a><span data-dcnode-id="6661" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6659" href="#B6-energies-15-00421" title=""><span data-dcnode-id="6660" instrument_node="">6</span></a><span data-dcnode-id="6658" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6643"><span data-dcnode-id="6656" instrument_node="">The air may be used as a sustainable water supply because it contains over 14,000 km</span><sup data-dcnode-id="6654"><span data-dcnode-id="6655" instrument_node="">3</span></sup><span data-dcnode-id="6653" instrument_node=""> of water vapor [</span><a class="html-bibr" data-dcnode-id="6651" href="#B7-energies-15-00421" title=""><span data-dcnode-id="6652" instrument_node="">7</span></a><span data-dcnode-id="6650" instrument_node="">]. There are two methods for extracting water from ambient air. The first approach entails lowering the temperature of humid ambient air to below the dew point. The second method entails sucking water vapor from moist ambient air with a solid adsorbent and a liquid absorbent and then retrieving the water by heating the absorbent and liquefying the evaporated water [</span><a class="html-bibr" data-dcnode-id="6648" href="#B8-energies-15-00421" title=""><span data-dcnode-id="6649" instrument_node="">8</span></a><span data-dcnode-id="6647" instrument_node="">]. Dew water appears to be an easy way to supplement drinking water supplies in a few parts of the world. Small animals and plants are the primary consumers of dew water, as it is necessary for maintaining their activities in a semiarid or dry environment. Engineering informs the decision on which methods to use. Economic considerations, such as energy, operational and capital costs, and climatic circumstances, also play roles. On the other hand, unique tools are different from drinking water since they are made up of small components that are sufficient for the daily needs of one individual. Large office buildings can provide portable fresh water to the surrounding community [</span><a class="html-bibr" data-dcnode-id="6645" href="#B9-energies-15-00421" title=""><span data-dcnode-id="6646" instrument_node="">9</span></a><span data-dcnode-id="6644" instrument_node="">]. The literature review reveals that little work has been carried out to summarize the extraction of water from atmospheric air. Hence, an initiative is taken through this research work to summarize all of the possible technical methods for water extraction. This research work will help researchers and industry to move forward in water extraction from the atmosphere for arid zones.</span></div></section><section data-dcnode-id="5806" id="sec2-energies-15-00421" type=""><h2 data-dcnode-id="6640" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6641" instrument_node=""> 2. Water Extraction Methods</span></h2><div class="html-p" data-dcnode-id="6623"><span data-dcnode-id="6639" instrument_node="">Water vapor is a key component of the atmosphere in atmospheric sciences, meteorology, hydrology, and climate studies. Water vapor has an impact on the Earth’s atmosphere’s energy budget, which causes and maintains atmospheric motions. Solar radiation absorption, nonradiative transport from the Earth’s surface (convection and condensation of water), and thermal radiation absorption all provide energy to the atmosphere [</span><a class="html-bibr" data-dcnode-id="6637" href="#B10-energies-15-00421" title=""><span data-dcnode-id="6638" instrument_node="">10</span></a><span data-dcnode-id="6636" instrument_node="">]. In most parts of the world, 1 km</span><sup data-dcnode-id="6634"><span data-dcnode-id="6635" instrument_node="">2</span></sup><span data-dcnode-id="6633" instrument_node=""> of atmospheric air contains 10,000–30,000 m</span><sup data-dcnode-id="6631"><span data-dcnode-id="6632" instrument_node="">3</span></sup><span data-dcnode-id="6630" instrument_node=""> of pure water. The patented extraction of water from air (EWA) technique was designed for large-scale water supply, up to 1000 m</span><sup data-dcnode-id="6628"><span data-dcnode-id="6629" instrument_node="">3</span></sup><span data-dcnode-id="6627" instrument_node=""> per day, and is based on the extraction of air humidity into a water stream. The EWA method makes use of air humidity, similar to desalination, which uses an endless free source of salty water. In regions where neither salty water nor infrastructure is available, EWA technology could be a viable alternative for water supply. EWA technology extracts air humidity in three stages: humidity absorption on a solid desiccant, water vaporization at moderate temperatures (65–85 °C), and condensation with a passive condenser connected to a heat pump. EWA technology may offer a reasonable option for water delivery in dry locations, such as the South Mediterranean, as well as countries with contaminated water, such as tropical countries, and those far from seashores where long-pipe systems are not available [</span><a class="html-bibr" data-dcnode-id="6625" href="#B11-energies-15-00421" title=""><span data-dcnode-id="6626" instrument_node="">11</span></a><span data-dcnode-id="6624" instrument_node="">]. </span></div><section data-dcnode-id="6479" id="sec2dot1-energies-15-00421" type=""><h4 class="html-italic" data-dcnode-id="6621" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6622" instrument_node=""> 2.1. Air-to-Water Generators (AWGs)</span></h4><div class="html-p" data-dcnode-id="6610"><span data-dcnode-id="6620" instrument_node="">Water extraction from air via reverse-cycle systems is becoming increasingly popular, and a variety of air-to-water generators (AWGs) are now available, all of which claim to be the most efficient [</span><a class="html-bibr" data-dcnode-id="6618" href="#B12-energies-15-00421" title=""><span data-dcnode-id="6619" instrument_node="">12</span></a><span data-dcnode-id="6617" instrument_node="">]. The atmospheric water generator (AWG) is a possible solution for water scarcity since it converts water vapor to liquid water [</span><a class="html-bibr" data-dcnode-id="6615" href="#B13-energies-15-00421" title=""><span data-dcnode-id="6616" instrument_node="">13</span></a><span data-dcnode-id="6614" instrument_node="">]. </span><a class="html-fig html-figpopup" data-dcnode-id="6612" href="#fig_body_display_energies-15-00421-f001"><span data-dcnode-id="6613" instrument_node="">Figure 1</span></a><span data-dcnode-id="6611" instrument_node=""> shows the experimental setup of an atmospheric water generator.</span></div><div class="html-fig-wrap" data-dcnode-id="6586" id="energies-15-00421-f001"><span data-dcnode-id="6609" instrument_node="">
</span><div class="html-fig_img" data-dcnode-id="6600"><span data-dcnode-id="6608" instrument_node="">
</span><div class="html-figpopup html-figpopup-link" data-dcnode-id="6602" href="#fig_body_display_energies-15-00421-f001"><span data-dcnode-id="6607" instrument_node="">
</span><img alt="Energies 15 00421 g001 550" data-dcnode-id="6606" data-large="/energies/energies-15-00421/article_deploy/html/images/energies-15-00421-g001.png" data-original="/energies/energies-15-00421/article_deploy/html/images/energies-15-00421-g001.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/energies/energies-15-00421/article_deploy/html/images/energies-15-00421-g001-550.jpg&amp;raw"><span data-dcnode-id="6605" instrument_node="">

Atmospheric water generator [</span><a class="html-bibr" data-dcnode-id="6593" href="#B13-energies-15-00421" title=""><span data-dcnode-id="6594" instrument_node="">13</span></a><span data-dcnode-id="6592" instrument_node="">] (under the terms of the Creative Commons Attribution License CC BY 4.0 license, </span><a data-dcnode-id="6590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/4.0/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="6591" instrument_node="">https://creativecommons.org/licenses/by/4.0/</span></a><span data-dcnode-id="6589" instrument_node=""> (accessed on 25 October 2021)).

</span></div><span data-dcnode-id="6587" instrument_node="">
</span></div><div class="html-p" data-dcnode-id="6581"><span data-dcnode-id="6585" instrument_node="">The method of water extraction from air is the same for all techniques, whether reverse cycle or not, and it involves driving the condensation of the air vapor content. AWGs with a compression reverse cycle (</span><a class="html-fig html-figpopup" data-dcnode-id="6583" href="#fig_body_display_energies-15-00421-f002"><span data-dcnode-id="6584" instrument_node="">Figure 2</span></a><span data-dcnode-id="6582" instrument_node="">), in particular, force condensation by cooling air to below the dew point. The fundamental benefit of using atmospheric water as a source of drinking water is that no water-transport infrastructure is required; harvesting equipment can be installed practically anywhere (away from the coastline). Dew condensers are divided into two categories: passive and active. </span></div><div class="html-fig-wrap" data-dcnode-id="6557" id="energies-15-00421-f002"><span data-dcnode-id="6580" instrument_node="">
</span><div class="html-fig_img" data-dcnode-id="6571"><span data-dcnode-id="6579" instrument_node="">
</span><div class="html-figpopup html-figpopup-link" data-dcnode-id="6573" href="#fig_body_display_energies-15-00421-f002"><span data-dcnode-id="6578" instrument_node="">
</span><img alt="Energies 15 00421 g002 550" data-dcnode-id="6577" data-large="/energies/energies-15-00421/article_deploy/html/images/energies-15-00421-g002.png" data-original="/energies/energies-15-00421/article_deploy/html/images/energies-15-00421-g002.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/energies/energies-15-00421/article_deploy/html/images/energies-15-00421-g002-550.jpg&amp;raw"><span data-dcnode-id="6576" instrument_node="">
</span><a class="html-expand html-figpopup" data-dcnode-id="6575" href="#fig_body_display_energies-15-00421-f002"></a><span data-dcnode-id="6574" instrument_node="">
</span></div><span data-dcnode-id="6572" instrument_node="">
</span></div><span data-dcnode-id="6570" instrument_node="">
</span><div class="html-fig_description" data-dcnode-id="6559"><span data-dcnode-id="6569" instrument_node="">
</span><b data-dcnode-id="6567"><span data-dcnode-id="6568" instrument_node="">Figure 2.</span></b><span data-dcnode-id="6566" instrument_node="">
Reverse thermodynamic cycle [</span><a class="html-bibr" data-dcnode-id="6564" href="#B12-energies-15-00421" title=""><span data-dcnode-id="6565" instrument_node="">12</span></a><span data-dcnode-id="6563" instrument_node="">] (under the terms of the Creative Commons Attribution License CC BY 4.0 license, </span><a data-dcnode-id="6561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/4.0/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="6562" instrument_node="">https://creativecommons.org/licenses/by/4.0/</span></a><span data-dcnode-id="6560" instrument_node=""> (accessed on 25 October 2021)).

</span></div><span data-dcnode-id="6558" instrument_node="">
</span></div><div class="html-p" data-dcnode-id="6540"><span data-dcnode-id="6556" instrument_node="">Atmospheric water generators are another name for active condensers (AWGs). With an average airflow of 400 m</span><sup data-dcnode-id="6554"><span data-dcnode-id="6555" instrument_node="">3</span></sup><span data-dcnode-id="6553" instrument_node="">/h and a compressor output of 1000 W, the unique AWG in the figure generates water at a minimum temperature of 10 °C and cools the ambient air to 8 °C below the dew point. It includes two 2 L water tanks that are completely distinct from one another, and schedules can be applied to create water for each container at a specific time. The device is 35 cm in height, 25 cm in length, and 14 cm in width [</span><a class="html-bibr" data-dcnode-id="6551" href="#B12-energies-15-00421" title=""><span data-dcnode-id="6552" instrument_node="">12</span></a><span data-dcnode-id="6550" instrument_node="">]. Condensation is the primary method by which the AWG converts water vapor to liquid water. It cools moist air to below dew point temperatures, inducing a phase transition from vapor to liquid water across the cooling surfaces, which is subsequently collected [</span><a class="html-bibr" data-dcnode-id="6548" href="#B14-energies-15-00421" title=""><span data-dcnode-id="6549" instrument_node="">14</span></a><span data-dcnode-id="6547" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6545" href="#B15-energies-15-00421" title=""><span data-dcnode-id="6546" instrument_node="">15</span></a><span data-dcnode-id="6544" instrument_node="">]. The vapor-compression refrigeration cycle is used in condensation-based AWGs. The ability of the AWG to harvest water from relatively dry air and low temperatures is its most promising feature. Although relative humidity is important to the AWG’s performance, it is less affected by abiotic variables such as sky emissivity, wind speed, and topographic position than passive condensers. As a result, it may be able to operate in a wider range of weather conditions [</span><a class="html-bibr" data-dcnode-id="6542" href="#B14-energies-15-00421" title=""><span data-dcnode-id="6543" instrument_node="">14</span></a><span data-dcnode-id="6541" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6535"><span data-dcnode-id="6539" instrument_node="">Khalil et al. conducted an inquiry to look into the refrigeration and dehumidification air-conditioning procedure as a viable method for producing fresh water and the viability of employing it in areas with high temperatures and relative humidity. Several elements, including moist air characteristics, air velocity, the surface area of the cooling coil, and heat exchange arrangement, influence the amount of condensate produced [</span><a class="html-bibr" data-dcnode-id="6537" href="#B16-energies-15-00421" title=""><span data-dcnode-id="6538" instrument_node="">16</span></a><span data-dcnode-id="6536" instrument_node="">]. </span></div><div class="html-p" data-dcnode-id="6530"><span data-dcnode-id="6534" instrument_node="">Habeebullah et al. studied the restraints of water production from the water vapor that exists in atmospheric air when cooling hot, moist air over desiccator coils of a refrigerator and then directing it to an open area. This approach can provide a limited quantity of fresh water at no cost since the water is a consequence of the air-conditioning process. A sophisticated model was used to calculate the water output due to desiccation on finned desiccator coils. Experiments were performed, and the results showed that the water productivity was reduced with an increase in the air velocity due to inadequate evaporator capacity, and it decreased at insufficient airspeed because the coolant deprivation obstructed the water extraction due to the formation of frost on the tube surface [</span><a class="html-bibr" data-dcnode-id="6532" href="#B17-energies-15-00421" title=""><span data-dcnode-id="6533" instrument_node="">17</span></a><span data-dcnode-id="6531" instrument_node="">]. </span></div><div class="html-p" data-dcnode-id="6525"><span data-dcnode-id="6529" instrument_node="">Energy was used to examine the performance and economic feasibility of coupling solar liquid desiccant dehumidification with a standard vapor-compression air-conditioning system for the meteorological scenario in Hong Kong. The capacity of the steam compression system of the solar-reinforced air-conditioning system can be reduced from the typical air-conditioning system’s original performance to 19–28 kW. The performance of a standard air-conditioning system was compared to that of a solar desiccant dehumidification system. Due to higher COP resulting from a greater supply of cooled water from more efficient plants, the energy-recovery possibilities due to incorporating the solar desiccant dehumidification system in a conventional air conditioning system are significant for the hot, humid weather in Hong Kong. The hybrid system reduces annual service energy consumption by 6760 kW/h [</span><a class="html-bibr" data-dcnode-id="6527" href="#B18-energies-15-00421" title=""><span data-dcnode-id="6528" instrument_node="">18</span></a><span data-dcnode-id="6526" instrument_node="">]. </span></div><div class="html-p" data-dcnode-id="6517"><span data-dcnode-id="6524" instrument_node="">The use of a plant intended to function at peak efficiency to produce the best water with the least amount of electricity was presented as a way to extract water from atmospheric air. The study also looked into whether solar energy can be employed in atmospheric water generators (AWGs) as a new source of fresh water. Using HOMER software, a recommended solar AWG unit was conceived, assessed, and designed. The studies revealed that the produced water is safe to drink and that solar-powered AWG technology is technically possible. AWG technology generates consumable water at a lower cost than bottled water and is more environmentally friendly [</span><a class="html-bibr" data-dcnode-id="6522" href="#B19-energies-15-00421" title=""><span data-dcnode-id="6523" instrument_node="">19</span></a><span data-dcnode-id="6521" instrument_node="">]. This study described the computing methods and component selection for significant cooling system components used in the atmospheric generator instead of a condenser to increase the volume of received water. Thermoelectric refrigerating machines (TRMs), vapor-compression refrigerating machines (VCRMs), and Stirling-cycle refrigerating machines (SRMs) have all been studied [</span><a class="html-bibr" data-dcnode-id="6519" href="#B20-energies-15-00421" title=""><span data-dcnode-id="6520" instrument_node="">20</span></a><span data-dcnode-id="6518" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6512"><span data-dcnode-id="6516" instrument_node="">AWG technology provides drinkable water at a competitive price compared to bottled water, which is more environmentally and health-friendly. In the program (Cool Pack), return Rankine cycles were established (VCRM). The job required the use of two refrigerant coolants: R134a and R502. Cycle requirements were calculated for autumn, spring, summer, and winter. The results revealed that the optimal mode occurs in autumn, and the optimal refrigerating machine for work in fixed settings with the highest water productivity per day is a VCRM. Vinay et al. developed a water generator that was used to generate water by extracting humidity from atmospheric air. The system’s design is simple, and it consists of a condenser, evaporator, compressor, blower, and copper tube. Its operation is similar to that of refrigerators and air conditioners in that ambient air is converted to pressurized air via the compressor and then transferred to the condenser tubes to cool the dew point, transforming into a water droplet. Several filters, including carbon, reverse osmosis, water filter, UV sterilization, and light sand, are housed in a tank [</span><a class="html-bibr" data-dcnode-id="6514" href="#B21-energies-15-00421" title=""><span data-dcnode-id="6515" instrument_node="">21</span></a><span data-dcnode-id="6513" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6501"><span data-dcnode-id="6511" instrument_node="">This project was based on refrigeration, which is defined as the process of moving heat from one point to another. A compressor, condenser, expansion valve, and evaporator are employed, as shown in </span><a class="html-fig html-figpopup" data-dcnode-id="6509" href="#fig_body_display_energies-15-00421-f003"><span data-dcnode-id="6510" instrument_node="">Figure 3</span></a><span data-dcnode-id="6508" instrument_node=""> [</span><a class="html-bibr" data-dcnode-id="6506" href="#B22-energies-15-00421" title=""><span data-dcnode-id="6507" instrument_node="">22</span></a><span data-dcnode-id="6505" instrument_node="">]. This experiment was carried out using two or three refrigerants: R134a, R290, and HC R290. It was discovered that the system produced good economic outcomes with HC R290. As a result, HC R290 was deemed to be the best refrigerant for this job. In 1.5 h, the amount of water collected was 250 mL [</span><a class="html-bibr" data-dcnode-id="6503" href="#B23-energies-15-00421" title=""><span data-dcnode-id="6504" instrument_node="">23</span></a><span data-dcnode-id="6502" instrument_node="">].</span></div><div class="html-fig-wrap" data-dcnode-id="6480" id="energies-15-00421-f003"><span data-dcnode-id="6500" instrument_node="">
</span><div class="html-fig_img" data-dcnode-id="6491"><span data-dcnode-id="6499" instrument_node="">
</span><div class="html-figpopup html-figpopup-link" data-dcnode-id="6493" href="#fig_body_display_energies-15-00421-f003"><span data-dcnode-id="6498" instrument_node="">
</span><img alt="Energies 15 00421 g003 550" data-dcnode-id="6497" data-large="/energies/energies-15-00421/article_deploy/html/images/energies-15-00421-g003.png" data-original="/energies/energies-15-00421/article_deploy/html/images/energies-15-00421-g003.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/energies/energies-15-00421/article_deploy/html/images/energies-15-00421-g003-550.jpg&amp;raw"><span data-dcnode-id="6496" instrument_node="">
</span><a class="html-expand html-figpopup" data-dcnode-id="6495" href="#fig_body_display_energies-15-00421-f003"></a><span data-dcnode-id="6494" instrument_node="">
</span></div><span data-dcnode-id="6492" instrument_node="">
</span></div><span data-dcnode-id="6490" instrument_node="">
</span><div class="html-fig_description" data-dcnode-id="6482"><span data-dcnode-id="6489" instrument_node="">
</span><b data-dcnode-id="6487"><span data-dcnode-id="6488" instrument_node="">Figure 3.</span></b><span data-dcnode-id="6486" instrument_node="">
Block diagram of water extractor [</span><a class="html-bibr" data-dcnode-id="6484" href="#B22-energies-15-00421" title=""><span data-dcnode-id="6485" instrument_node="">22</span></a><span data-dcnode-id="6483" instrument_node="">].

</span></div><span data-dcnode-id="6481" instrument_node="">
</span></div></section><section data-dcnode-id="6433" id="sec2dot2-energies-15-00421" type=""><h4 class="html-italic" data-dcnode-id="6477" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6478" instrument_node=""> 2.2. Earth-Water Collector</span></h4><div class="html-p" data-dcnode-id="6466"><span data-dcnode-id="6476" instrument_node="">An arrangement consists of columnar and slanted channels over the Earth’s surface that are used to obtain pure water from atmospheric air by cooling humid atmospheric air to a temperature lower than the dew point [</span><a class="html-bibr" data-dcnode-id="6474" href="#B7-energies-15-00421" title=""><span data-dcnode-id="6475" instrument_node="">7</span></a><span data-dcnode-id="6473" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6471" href="#B24-energies-15-00421" title=""><span data-dcnode-id="6472" instrument_node="">24</span></a><span data-dcnode-id="6470" instrument_node="">]. The amount of gaseous solar radiation absorbers in the atmosphere, such as water vapor and ozone, can also be significant. Downward thermal emission from the atmosphere, which is influenced by clouds and water vapor, as well as upward thermal emission, which is lowered by upward thermal emission, make up the total net radiation that heats the terrestrial surface. Because this ‘Earth’ radiation is more weakly dependent on surface temperature than energy fluxes from surface evaporation and dry sensible heat, we use the phrase ‘total net radiation’ to describe the atmospheric radiative fluxes to the surface in the next section [</span><a class="html-bibr" data-dcnode-id="6468" href="#B25-energies-15-00421" title=""><span data-dcnode-id="6469" instrument_node="">25</span></a><span data-dcnode-id="6467" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6455"><span data-dcnode-id="6465" instrument_node="">When the brightness of the sun increases, the Earth’s surface becomes dry. The dry surface’s depth differs based on the amount of average rainfall, the depth of the capillary motion, and the soil type in that location. Inside this dry surface, a moist coating is present. This happens due to the interaction between capillary movement and underground water. This capillary action means that this water is lifted to the Earth’s surface by minute slits in the soil. When the sunlight heats the upper surface using solar energy, this water disperses into vapor [</span><a class="html-bibr" data-dcnode-id="6463" href="#B26-energies-15-00421" title=""><span data-dcnode-id="6464" instrument_node="">26</span></a><span data-dcnode-id="6462" instrument_node="">]. A four-sided figure with a glaze at the slope called the Earth-Water Collector is used (</span><a class="html-fig html-figpopup" data-dcnode-id="6460" href="#fig_body_display_energies-15-00421-f004"><span data-dcnode-id="6461" instrument_node="">Figure 4</span></a><span data-dcnode-id="6459" instrument_node="">). When the upper surface of the Earth is heated by the sun in the form of solar energy, water is evaporated from the surface through water vapor [</span><a class="html-bibr" data-dcnode-id="6457" href="#B27-energies-15-00421" title=""><span data-dcnode-id="6458" instrument_node="">27</span></a><span data-dcnode-id="6456" instrument_node="">]. This process is known as convection. This collection of water then reaches the ground surface due to gravity as portable fresh water.</span></div><div class="html-fig-wrap" data-dcnode-id="6434" id="energies-15-00421-f004"><span data-dcnode-id="6454" instrument_node="">
</span><div class="html-fig_img" data-dcnode-id="6445"><span data-dcnode-id="6453" instrument_node="">

</span></div></section><section data-dcnode-id="6360" id="sec2dot3-energies-15-00421" type=""><h4 class="html-italic" data-dcnode-id="6431" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6432" instrument_node=""> 2.3. Absorption–Regeneration Cycle</span></h4><div class="html-p" data-dcnode-id="6420"><span data-dcnode-id="6430" instrument_node="">A conceptual cycle was developed to describe water vapor absorption from atmospheric air, followed by the regeneration process. CaCl</span><sub data-dcnode-id="6428"><span data-dcnode-id="6429" instrument_node="">2</span></sub><span data-dcnode-id="6427" instrument_node=""> was used as a desiccant in this study. The ambient conditions’ influence on the cycle’s operating limits was predicted [</span><a class="html-bibr" data-dcnode-id="6425" href="#B29-energies-15-00421" title=""><span data-dcnode-id="6426" instrument_node="">29</span></a><span data-dcnode-id="6424" instrument_node="">]. The absorption–regeneration cycle is shown in </span><a class="html-fig html-figpopup" data-dcnode-id="6422" href="#fig_body_display_energies-15-00421-f005"><span data-dcnode-id="6423" instrument_node="">Figure 5</span></a><span data-dcnode-id="6421" instrument_node="">. These are the four thermal processes:</span></div><div class="html-fig-wrap" data-dcnode-id="6399" id="energies-15-00421-f005"><span data-dcnode-id="6419" instrument_node="">
</span><div class="html-fig_img" data-dcnode-id="6410"><span data-dcnode-id="6418" instrument_node="">
</span><div class="html-figpopup html-figpopup-link" data-dcnode-id="6412" href="#fig_body_display_energies-15-00421-f005"><span data-dcnode-id="6417" instrument_node="">
</span><img alt="Energies 15 00421 g005 550" data-dcnode-id="6416" data-large="/energies/energies-15-00421/article_deploy/html/images/energies-15-00421-g005.png" data-original="/energies/energies-15-00421/article_deploy/html/images/energies-15-00421-g005.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/energies/energies-15-00421/article_deploy/html/images/energies-15-00421-g005-550.jpg&amp;raw"><span data-dcnode-id="6415" instrument_node="">
</span><a class="html-expand html-figpopup" data-dcnode-id="6414" href="#fig_body_display_energies-15-00421-f005"></a><span data-dcnode-id="6413" instrument_node="">

The absorption–regeneration cycle (adapted with permission from Reference [</span><a class="html-bibr" data-dcnode-id="6403" href="#B29-energies-15-00421" title=""><span data-dcnode-id="6404" instrument_node="">29</span></a><span data-dcnode-id="6402" instrument_node="">], Copyright 2000, Elsevier).

</span></div><span data-dcnode-id="6400" instrument_node="">
</span></div><div class="html-p" data-dcnode-id="6377"><dl class="html-alpha-lower" data-dcnode-id="6378"><dt data-dcnode-id="6397" id=""><span data-dcnode-id="6398" instrument_node="">(a)</span></dt><dd data-dcnode-id="6394" style="margin-left: 0px; padding-left: 23px;"><div class="html-p" data-dcnode-id="6395"><span data-dcnode-id="6396" instrument_node="">Process 1_2: isothermal water vapor absorption from the air;</span></div></dd><dt data-dcnode-id="6392" id=""><span data-dcnode-id="6393" instrument_node="">(b)</span></dt><dd data-dcnode-id="6389" style="margin-left: 0px; padding-left: 23px;"><div class="html-p" data-dcnode-id="6390"><span data-dcnode-id="6391" instrument_node="">Process 2_3: heating the absorbent at a steady concentration;</span></div></dd><dt data-dcnode-id="6387" id=""><span data-dcnode-id="6388" instrument_node="">(c)</span></dt><dd data-dcnode-id="6384" style="margin-left: 0px; padding-left: 22px;"><div class="html-p" data-dcnode-id="6385"><span data-dcnode-id="6386" instrument_node="">Process 3_4: constant pressure absorbent regeneration;</span></div></dd><dt data-dcnode-id="6382" id=""><span data-dcnode-id="6383" instrument_node="">(d)</span></dt><dd data-dcnode-id="6379" style="margin-left: 0px; padding-left: 23px;"><div class="html-p" data-dcnode-id="6380"><span data-dcnode-id="6381" instrument_node="">Process 4_1: cooling the absorbent at a steady concentration.</span></div></dd></dl></div><div class="html-p" data-dcnode-id="6372"><span data-dcnode-id="6376" instrument_node="">According to theoretical studies, the limits of weak and strong solution concentrations considerably impact the cycle efficiency value. A cycle efficiency of more than 90% can be achieved for various values of a high solution concentration; however, this value drops when the variation among the strong and weak solution concentrations is minimal. The absorption–regeneration cycle is shown in </span><a class="html-fig html-figpopup" data-dcnode-id="6374" href="#fig_body_display_energies-15-00421-f005"><span data-dcnode-id="6375" instrument_node="">Figure 5</span></a><span data-dcnode-id="6373" instrument_node="">.</span></div><div class="html-p" data-dcnode-id="6361"><span data-dcnode-id="6371" instrument_node="">Sultan et al. proposed an unconventional practice of steam extraction from atmospheric air on a 24 h basis using a tight structure. The approach is based on the absorption–regeneration process with forced convection in a filled tower with two comparable columns, each filled with a similar bed made up of upright multi-layers of a fabric medium soaked with CaCl</span><sub data-dcnode-id="6369"><span data-dcnode-id="6370" instrument_node="">2</span></sub><span data-dcnode-id="6368" instrument_node=""> solution of varying concentrations. Based on the experimental findings, an analytical model was created [</span><a class="html-bibr" data-dcnode-id="6366" href="#B30-energies-15-00421" title=""><span data-dcnode-id="6367" instrument_node="">30</span></a><span data-dcnode-id="6365" instrument_node="">]. The highest concentration of the desiccant was discovered to be dependent on the primary concentration, penetration, and regeneration temperatures. The system’s efficiency increased as the primary concentration increased, and it decreased as the absorption temperature and air velocity employed in the regeneration process increased [</span><a class="html-bibr" data-dcnode-id="6363" href="#B31-energies-15-00421" title=""><span data-dcnode-id="6364" instrument_node="">31</span></a><span data-dcnode-id="6362" instrument_node="">].</span></div></section><section data-dcnode-id="6251" id="sec2dot4-energies-15-00421" type=""><h4 class="html-italic" data-dcnode-id="6358" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6359" instrument_node=""> 2.4. Dew Collection</span></h4><div class="html-p" data-dcnode-id="6338"><span data-dcnode-id="6357" instrument_node="">A plan for large-scale dew collection as a source of fresh water was presented. Using four plastic pipes, the system involves delivering cold seawater (5 °C) from a depth of approximately 500 m and around 5 km from the shore. It then flows through a heat exchanger, condensing 643 m</span><sup data-dcnode-id="6355"><span data-dcnode-id="6356" instrument_node="">3</span></sup><span data-dcnode-id="6354" instrument_node=""> of dew in 24 h. Three wind turbines (each with a capacity of 200 kW) pump seawater from the sea into the area. The system’s technical and economic feasibility was examined. It was determined that the current concept is not economically viable compared to a reverse osmosis facility of comparable capacity [</span><a class="html-bibr" data-dcnode-id="6352" href="#B32-energies-15-00421" title=""><span data-dcnode-id="6353" instrument_node="">32</span></a><span data-dcnode-id="6351" instrument_node="">]. Dew is formed when moisture in the air condenses and is utilized for drinking and irrigation. Dew-collecting surfaces can benefit from the radiative cooling capabilities of polymer foils. This research was focused on dew development on colored polyethylene foils that have been radioactively cooled. The findings revealed that the volume of collected dew per m</span><sup data-dcnode-id="6349"><span data-dcnode-id="6350" instrument_node="">2</span></sup><span data-dcnode-id="6348" instrument_node=""> is minimal, but large-scale systems can be inexpensive [</span><a class="html-bibr" data-dcnode-id="6346" href="#B33-energies-15-00421" title=""><span data-dcnode-id="6347" instrument_node="">33</span></a><span data-dcnode-id="6345" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6343" href="#B34-energies-15-00421" title=""><span data-dcnode-id="6344" instrument_node="">34</span></a><span data-dcnode-id="6342" instrument_node="">]. Dew collection will play an important role in the regions of our planet that are arid [</span><a class="html-bibr" data-dcnode-id="6340" href="#B35-energies-15-00421" title=""><span data-dcnode-id="6341" instrument_node="">35</span></a><span data-dcnode-id="6339" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6327"><span data-dcnode-id="6337" instrument_node="">Experiments have shown that 0.22 L/day of water can be collected in a single night of operation, with model predictions and experimental findings agreeing well [</span><a class="html-bibr" data-dcnode-id="6335" href="#B36-energies-15-00421" title=""><span data-dcnode-id="6336" instrument_node="">36</span></a><span data-dcnode-id="6334" instrument_node="">]. The DEW project began by installing a 15 m</span><sup data-dcnode-id="6332"><span data-dcnode-id="6333" instrument_node="">2</span></sup><span data-dcnode-id="6331" instrument_node=""> roof with a commercial plastic cover chosen for its exceptional dew-gathering qualities on the tiny Mediterranean islands of Bisevo, Croatia. Rain and dew water measurements were taken for several years, and the results will be compared to meteorological data gathered on the site. According to the previous measure, the total collected water was 642 L. The volume of dew water was 222 L, which was equal to 26% of all collected water (21 April 2005–21 October 2005) [</span><a class="html-bibr" data-dcnode-id="6329" href="#B37-energies-15-00421" title=""><span data-dcnode-id="6330" instrument_node="">37</span></a><span data-dcnode-id="6328" instrument_node="">]; the study evaluated the feasibility of using fog collectors to obtain water for various applications by the local population (domestic, agriculture, cattle raising, and forestry).</span></div><div class="html-p" data-dcnode-id="6319"><span data-dcnode-id="6326" instrument_node="">There are three types of fog collectors: (a) a flat rectangular fog collector, (b) a round rectangular fog collector, and (c) a simple fog collector in the form of a cylinder. A fog collector with two cylinders was put to use. The results revealed that when a larger amount of water was collected on the double-cylinder fog collector, it was possible to achieve an average water production of 0.53 L/m2/day and a maximum water collection of 3.3 L/m</span><sup data-dcnode-id="6324"><span data-dcnode-id="6325" instrument_node="">2</span></sup><span data-dcnode-id="6323" instrument_node="">/day [</span><a class="html-bibr" data-dcnode-id="6321" href="#B38-energies-15-00421" title=""><span data-dcnode-id="6322" instrument_node="">38</span></a><span data-dcnode-id="6320" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6297"><a class="html-fig html-figpopup" data-dcnode-id="6317" href="#fig_body_display_energies-15-00421-f006"><span data-dcnode-id="6318" instrument_node="">Figure 6</span></a><span data-dcnode-id="6316" instrument_node=""> shows a flat dew collector and overturned pyramid collector. Experiments to gather passive dew were conducted in a grassland setting. A 1 m</span><sup data-dcnode-id="6314"><span data-dcnode-id="6315" instrument_node="">2</span></sup><span data-dcnode-id="6313" instrument_node=""> flat collector with a 0.39 mm polyethylene foil covering angled at a 30° angle and a second dew collector in the shape of an overturned pyramid were erected. Two models were employed to predict dew collection on the two surfaces: one was a simple surface energy budget model, while the other was an aerodynamic model. According to the statistics, the daily average dew was 0.12–0.03 mm on the grass cover, 0.1–0.06 mm in the flat collector, and 0.15–0.05 mm in the overturned pyramid collector. A fog-water collector system is shown in </span><a class="html-fig html-figpopup" data-dcnode-id="6311" href="#fig_body_display_energies-15-00421-f007"><span data-dcnode-id="6312" instrument_node="">Figure 7</span></a><span data-dcnode-id="6310" instrument_node=""> [</span><a class="html-bibr" data-dcnode-id="6308" href="#B39-energies-15-00421" title=""><span data-dcnode-id="6309" instrument_node="">39</span></a><span data-dcnode-id="6307" instrument_node="">]. The overturned pyramid produced more dew than the flat collector or grass cover due to improved insulation and a lower sky observation point. The study assumed that water can be extracted from fog under specific topographical and climatic conditions. When the fog’s microscopic droplets encounter a solid surface, they precipitate. Fog might be regarded as an alternative source of fresh water when it occurs regularly. Three standard fog collectors (SFCs) were built and tested at three different altitudes (22, 603 and 200 m). According to the findings, the amount of water collected was 6.125 L/m</span><sup data-dcnode-id="6305"><span data-dcnode-id="6306" instrument_node="">2</span></sup><span data-dcnode-id="6304" instrument_node="">/day at the highest altitude and 3.3 L/m</span><sup data-dcnode-id="6302"><span data-dcnode-id="6303" instrument_node="">2</span></sup><span data-dcnode-id="6301" instrument_node="">/day at the lowest height [</span><a class="html-bibr" data-dcnode-id="6299" href="#B40-energies-15-00421" title=""><span data-dcnode-id="6300" instrument_node="">40</span></a><span data-dcnode-id="6298" instrument_node="">].</span></div><div class="html-fig-wrap" data-dcnode-id="6276" id="energies-15-00421-f006"><span data-dcnode-id="6296" instrument_node="">
</span><div class="html-fig_img" data-dcnode-id="6287"><span data-dcnode-id="6295" instrument_node="">

Fog-water collector system (reprinted from Reference [</span><a class="html-bibr" data-dcnode-id="6259" href="#B39-energies-15-00421" title=""><span data-dcnode-id="6260" instrument_node="">39</span></a><span data-dcnode-id="6258" instrument_node="">] under the terms of the Creative Commons Attribution License CC BY 4.0 license, </span><a data-dcnode-id="6256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/4.0/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="6257" instrument_node="">https://creativecommons.org/licenses/by/4.0/</span></a><span data-dcnode-id="6255" instrument_node=""> (accessed on 25 October 2021)).

</span></div></section><section data-dcnode-id="5807" id="sec2dot5-energies-15-00421" type=""><h4 class="html-italic" data-dcnode-id="6249" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6250" instrument_node=""> 2.5. Desiccant Systems</span></h4><div class="html-p" data-dcnode-id="6241"><span data-dcnode-id="6248" instrument_node="">Water is extracted from humid air using desiccant materials. A desiccant with a high concentration can absorb moist air at night (absorption phase), and the absorbed water can be removed from the diluted desiccant during the regeneration process by heating. When employing the desiccant method, the regeneration process can be carried out at relatively low temperatures, ranging from 40 to 70 °C, which is ideal for solar stills [</span><a class="html-bibr" data-dcnode-id="6246" href="#B41-energies-15-00421" title=""><span data-dcnode-id="6247" instrument_node="">41</span></a><span data-dcnode-id="6245" instrument_node="">]. The primary benefit of solar-powered water extraction is its purity, sustainability, and self-sufficiency, as it does not require any infrastructure [</span><a class="html-bibr" data-dcnode-id="6243" href="#B42-energies-15-00421" title=""><span data-dcnode-id="6244" instrument_node="">42</span></a><span data-dcnode-id="6242" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6233"><span data-dcnode-id="6240" instrument_node="">Using ethylene glycol as a liquid desiccant, Hall et al. developed an absorption method for obtaining fresh water from ambient air, followed by recovery in a solar still [</span><a class="html-bibr" data-dcnode-id="6238" href="#B43-energies-15-00421" title=""><span data-dcnode-id="6239" instrument_node="">43</span></a><span data-dcnode-id="6237" instrument_node="">]. The water retrieved with this method was affected by temperature and humidity. The data were presented in a composition psychometric chart, although the investigation lacked information on the mass of the collected water [</span><a class="html-bibr" data-dcnode-id="6235" href="#B44-energies-15-00421" title=""><span data-dcnode-id="6236" instrument_node="">44</span></a><span data-dcnode-id="6234" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6225"><span data-dcnode-id="6232" instrument_node="">An unorthodox method that captures water from the atmosphere using a solid desiccant was developed. It was also examined whether humid air could be collected by cooling it to a temperature below the dew point using an air-conditioning system [</span><a class="html-bibr" data-dcnode-id="6230" href="#B45-energies-15-00421" title=""><span data-dcnode-id="6231" instrument_node="">45</span></a><span data-dcnode-id="6229" instrument_node="">]. In a method for extracting humidity from atmospheric air, a desiccant pond was used to absorb humidity from the air and produce a water-rich desiccant. The sun heats the water-rich desiccant, causing the moisture to evaporate and mix with the ambient air, raising the ambient air’s dew point, condensing the vaporized moisture to generate a drinking water condensate, and returning the water-poor desiccant to the desiccant pond. An S-shaped composite material was employed to manufacture water from atmospheric air by soaking it in a physiochemical liquid to absorb humidity from the air [</span><a class="html-bibr" data-dcnode-id="6227" href="#B46-energies-15-00421" title=""><span data-dcnode-id="6228" instrument_node="">46</span></a><span data-dcnode-id="6226" instrument_node="">]. It was discovered that when the temperature rose, the absorptivity of the surface fell, necessitating a 50-degree angle to absorb humidity. One liter of water might be produced per square meter of composite material.</span></div><div class="html-p" data-dcnode-id="6220"><span data-dcnode-id="6224" instrument_node="">The amount of water absorbed by the desiccant was calculated from the ambient air in the absorber as a function of climate data and the desiccant’s initial conditions. The liquid desiccant was calcium chloride, and the absorptivity surface was an inclined surface exposed to the environment. The desiccant runs along the surface, absorbing humidity as it does so because of the difference in vapor pressure between the air and the desiccant surface [</span><a class="html-bibr" data-dcnode-id="6222" href="#B47-energies-15-00421" title=""><span data-dcnode-id="6223" instrument_node="">47</span></a><span data-dcnode-id="6221" instrument_node="">]. The sun’s rays heat the water-rich desiccant, forcing moisture out and condensing the vapor stream. The results showed that increasing the desiccant flow rate, air relative humidity, and wind speed increased the mass of absorbed water.</span></div><div class="html-p" data-dcnode-id="6212"><span data-dcnode-id="6219" instrument_node="">Gandhidasan and Abulhamayel et al. suggested that water be extracted from the atmosphere using a suitable liquid desiccant. Using the same unit, the process has a nighttime component where humidity is absorbed and a daily part where humidity is desorbed. </span><a class="html-fig html-figpopup" data-dcnode-id="6217" href="#fig_body_display_energies-15-00421-f006"><span data-dcnode-id="6218" instrument_node="">Figure 6</span></a><span data-dcnode-id="6216" instrument_node=""> depicts the system’s structure, consisting of a flat, blackened, slanted surface covered with single glazing with a 45 cm air gap. The desiccant flows as a thin layer over the glazing at night, and the desiccant is diluted because of moisture absorption. During the day, solar energy heats the diluted desiccant as it flows downward and across the absorption surface. Moisture vaporizes in desiccant vaporizers and condenses on the underside of the glazing. A total of 1.92 kg/m of water was generated [</span><a class="html-bibr" data-dcnode-id="6214" href="#B48-energies-15-00421" title=""><span data-dcnode-id="6215" instrument_node="">48</span></a><span data-dcnode-id="6213" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6201"><span data-dcnode-id="6211" instrument_node="">A new type of composite material known as selective water sorbents (SWSs) was created for removing humidity from the air. As host materials, silica gel (SiO</span><sub data-dcnode-id="6209"><span data-dcnode-id="6210" instrument_node="">2</span></sub><span data-dcnode-id="6208" instrument_node="">), alumina (IK 02 200), and porous carbon (subunit) were utilized. Lithium bromide (LiBr) and calcium chloride (CaCl</span><sub data-dcnode-id="6206"><span data-dcnode-id="6207" instrument_node="">2</span></sub><span data-dcnode-id="6205" instrument_node="">) were utilized as hygroscopic salts. The ability to produce 3–5 tonnes of water/10 tonnes of dry SWS was demonstrated in lab experiments [</span><a class="html-bibr" data-dcnode-id="6203" href="#B49-energies-15-00421" title=""><span data-dcnode-id="6204" instrument_node="">49</span></a><span data-dcnode-id="6202" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6181"><span data-dcnode-id="6200" instrument_node="">For water production from atmospheric air, Gad [</span><a class="html-bibr" data-dcnode-id="6198" href="#B44-energies-15-00421" title=""><span data-dcnode-id="6199" instrument_node="">44</span></a><span data-dcnode-id="6197" instrument_node="">] used an integrated (solar/desiccant) device. At night, the process absorbs humidity from the air, regenerates the desiccant, and condenses the vapor during the day. To improve the mass transfer area, a thick, corrugated textile layer impregnated with CaCl</span><sub data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">2</span></sub><span data-dcnode-id="6194" instrument_node=""> was utilized as a bed. At night, a fan was used to circulate air over the bed. In addition, a condensing device was used. The operation was repeated twice, once without the condenser and once with it. The results revealed that employing the condenser device reduced the system’s efficiency by 5%. In total, 1.5 L/m</span><sup data-dcnode-id="6192"><span data-dcnode-id="6193" instrument_node="">2</span></sup><span data-dcnode-id="6191" instrument_node="">/day was produced. Hamed et al. used a horizontal sandy bed saturated with CaCl</span><sub data-dcnode-id="6189"><span data-dcnode-id="6190" instrument_node="">2</span></sub><span data-dcnode-id="6188" instrument_node=""> to investigate the natural absorption of water vapor from a gaseous-air combination. There were seven levels in total, each with a different desiccant/sand ratio ranging from 0% to 100% (0.1 to 0.4). The effects of the desiccant concentration and Grashof number on the mass transfer coefficient and mixing ratio (desiccant/sand) on the absorption rate were investigated. The data demonstrated that as the concentration increased, the mass transfer increased as well. Furthermore, it was discovered that mass transfer decreased significantly as the mixing ratio was reduced [</span><a class="html-bibr" data-dcnode-id="6186" href="#B50-energies-15-00421" title=""><span data-dcnode-id="6187" instrument_node="">50</span></a><span data-dcnode-id="6185" instrument_node="">]. A schematic of fresh water from the humid atmosphere unit is shown in </span><a class="html-fig html-figpopup" data-dcnode-id="6183" href="#fig_body_display_energies-15-00421-f008"><span data-dcnode-id="6184" instrument_node="">Figure 8</span></a><span data-dcnode-id="6182" instrument_node="">.</span></div><div class="html-fig-wrap" data-dcnode-id="6148" id="energies-15-00421-f008"><span data-dcnode-id="6180" instrument_node="">
</span><div class="html-fig_img" data-dcnode-id="6171"><span data-dcnode-id="6179" instrument_node="">
</span><div class="html-figpopup html-figpopup-link" data-dcnode-id="6173" href="#fig_body_display_energies-15-00421-f008"><span data-dcnode-id="6178" instrument_node="">

</span></div><span data-dcnode-id="6149" instrument_node="">
</span></div><div class="html-p" data-dcnode-id="6137"><span data-dcnode-id="6147" instrument_node="">Kabeel et al. developed a method to extract water from the atmosphere. A system consisting of a solar collector unit including a sandy bed saturated with CaCl</span><sub data-dcnode-id="6145"><span data-dcnode-id="6146" instrument_node="">2</span></sub><span data-dcnode-id="6144" instrument_node=""> was used. Sand was used to replicate the conditions observed in Arab deserts. Three different tilt degrees (15°, 20°, and 25°) were used to test the system. A theoretical model was used to investigate the effects of various parameters, such as solution concentration and solar radiation intensity. The results showed that it could produce 1.2 L/m</span><sup data-dcnode-id="6142"><span data-dcnode-id="6143" instrument_node="">2</span></sup><span data-dcnode-id="6141" instrument_node="">/day of pure water, with the best results obtained with a tilt angle of 25°. Scrivani et al. looked into non-heating and cooling applications for the solar trough concentration, such as water generation from atmospheric air. This was accomplished using a solar concentrator and a double-effect ammonia chiller. It has the advantage of condensing air humidity using chillers using the same energy source that heats the air: solar heat. As such, only two pieces of solar-powered equipment are required, both of which require no additional energy sources other than the troughs’ orientation and the diathermic fluid delivered via the collector [</span><a class="html-bibr" data-dcnode-id="6139" href="#B52-energies-15-00421" title=""><span data-dcnode-id="6140" instrument_node="">52</span></a><span data-dcnode-id="6138" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6123"><span data-dcnode-id="6136" instrument_node="">Two identical pyramid-shaped multi-shelf solar systems aid in the extraction of water from the atmosphere. The two systems have the same proportions, but the types of beds are different. The beds are impregnated with calcium chloride. At night, all four glass faces of the pyramid are opened to absorb moisture from the air near the beds. Then, the faces are closed to extract water from the air. The first pyramid’s bed is made of saw wood, while the second is made of cloth with the same dimensions. </span><a class="html-fig html-figpopup" data-dcnode-id="6134" href="#fig_body_display_energies-15-00421-f009"><span data-dcnode-id="6135" instrument_node="">Figure 9</span></a><span data-dcnode-id="6133" instrument_node=""> shows a solar desiccant/collector system for water recovery [</span><a class="html-bibr" data-dcnode-id="6131" href="#B53-energies-15-00421" title=""><span data-dcnode-id="6132" instrument_node="">53</span></a><span data-dcnode-id="6130" instrument_node="">], and </span><a class="html-fig html-figpopup" data-dcnode-id="6128" href="#fig_body_display_energies-15-00421-f010"><span data-dcnode-id="6129" instrument_node="">Figure 10</span></a><span data-dcnode-id="6127" instrument_node=""> shows a pyramid quadratic solar system. Tests were conducted in various climates to see how the pyramid design affected absorption [</span><a class="html-bibr" data-dcnode-id="6125" href="#B54-energies-15-00421" title=""><span data-dcnode-id="6126" instrument_node="">54</span></a><span data-dcnode-id="6124" instrument_node="">].</span></div><div class="html-fig-wrap" data-dcnode-id="6102" id="energies-15-00421-f009"><span data-dcnode-id="6122" instrument_node="">

A pyramid quadratic solar system (adapted with permission from Reference [</span><a class="html-bibr" data-dcnode-id="6085" href="#B55-energies-15-00421" title=""><span data-dcnode-id="6086" instrument_node="">55</span></a><span data-dcnode-id="6084" instrument_node="">], Copyright 2017, Elsevier).

</span></div><span data-dcnode-id="6082" instrument_node="">
</span></div><div class="html-p" data-dcnode-id="6064"><span data-dcnode-id="6080" instrument_node="">According to the findings, the garment bed absorbs a larger volume of solutions than the cut wood. A new high-efficiency composite adsorbent for extracting water from the atmosphere using solar energy was created with a rate of 2.1 L/m</span><sup data-dcnode-id="6078"><span data-dcnode-id="6079" instrument_node="">2</span></sup><span data-dcnode-id="6077" instrument_node="">/day. The composite material comprises a host matrix of crystalline material with large pores (MCM-41) and calcium chloride as a hygroscopic salt [</span><a class="html-bibr" data-dcnode-id="6075" href="#B56-energies-15-00421" title=""><span data-dcnode-id="6076" instrument_node="">56</span></a><span data-dcnode-id="6074" instrument_node="">]. The findings demonstrated that the composite material has a high adsorption capacity (1.75 kg/kg desiccant), a unique adsorption rate, and a low-temperature regeneration process. A large amount of water (1.2 kg/m</span><sup data-dcnode-id="6072"><span data-dcnode-id="6073" instrument_node="">2</span></sup><span data-dcnode-id="6071" instrument_node="">) was produced. Water was created at a rate of 1.2 kg/m</span><sup data-dcnode-id="6069"><span data-dcnode-id="6070" instrument_node="">2</span></sup><span data-dcnode-id="6068" instrument_node=""> [</span><a class="html-bibr" data-dcnode-id="6066" href="#B57-energies-15-00421" title=""><span data-dcnode-id="6067" instrument_node="">57</span></a><span data-dcnode-id="6065" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6059"><span data-dcnode-id="6063" instrument_node="">The principal application of solar concentration for collecting portable water from the atmospheric air is described in this study. The findings of the AQUASOLIS study were used to assess the usefulness of solar trough concentration plants for uses other than heating and cooling, particularly water generation for a variety of applications. Abulhamayel and Gandhidasan et al. observed an absorber/desorber that was built and found it to be suitable for gathering the moisture that abounds in the humid atmosphere [</span><a class="html-bibr" data-dcnode-id="6061" href="#B58-energies-15-00421" title=""><span data-dcnode-id="6062" instrument_node="">58</span></a><span data-dcnode-id="6060" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6057"><span data-dcnode-id="6058" instrument_node="">Calcium chloride was employed as a functioning desiccant. The desiccant solution passes over the absorber and is exposed to the ambient air at night, removing humidity from the air. After covering the absorber with a glass cover throughout the day, the diluted solution runs over it again. Four different desiccant flow rates and concentrations of desiccant were used in the trials (32.5–33.5 percent). The results revealed that increased ambient air temperature, wind speed, and solution concentration and a reduced desiccant flow rate enhance the absorption efficiency.</span></div><div class="html-p" data-dcnode-id="6031"><span data-dcnode-id="6056" instrument_node="">In contrast, increased solar radiation and ambient air temperature and a decreased desiccant flow rate increased the desorption rate. Depending on the desiccant flow rate, the water absorption rate was 2.11 L/m</span><sup data-dcnode-id="6054"><span data-dcnode-id="6055" instrument_node="">2</span></sup><span data-dcnode-id="6053" instrument_node="">/day, while the water desorption rate was 1.15 L/m</span><sup data-dcnode-id="6051"><span data-dcnode-id="6052" instrument_node="">2</span></sup><span data-dcnode-id="6050" instrument_node="">/day. Because it uses solar-powered thermoelectric generators, the technology is appropriate for Arab Gulf countries or regions with comparable water conditions. Using Star-CCM+, a simulation was run. The parameters (pressure drop across the flow channel, water productivity/m</span><sup data-dcnode-id="6048"><span data-dcnode-id="6049" instrument_node="">2</span></sup><span data-dcnode-id="6047" instrument_node="">, impact of ambient air temperature, and humidity) were assessed (the Red Sea, Arabian Gulf, and South Spain). The amount of water produced rose to 3.9 L/h/m</span><sup data-dcnode-id="6045"><span data-dcnode-id="6046" instrument_node="">2</span></sup><span data-dcnode-id="6044" instrument_node=""> [</span><a class="html-bibr" data-dcnode-id="6042" href="#B59-energies-15-00421" title=""><span data-dcnode-id="6043" instrument_node="">59</span></a><span data-dcnode-id="6041" instrument_node="">], while the amount of pumping power required for the air fan remained the same (9.1 W) [</span><a class="html-bibr" data-dcnode-id="6039" href="#B4-energies-15-00421" title=""><span data-dcnode-id="6040" instrument_node="">4</span></a><span data-dcnode-id="6038" instrument_node="">]. Investigations on new composite material for the storage and production of water from ambient air were conducted. Three different solar glass box-type systems (SGDBSs) were used with a collection area of 0.36 m</span><sup data-dcnode-id="6036"><span data-dcnode-id="6037" instrument_node="">2</span></sup><span data-dcnode-id="6035" instrument_node="">. Six different concentrations of CaCl</span><sub data-dcnode-id="6033"><span data-dcnode-id="6034" instrument_node="">2</span></sub><span data-dcnode-id="6032" instrument_node=""> composite were used in the tests. The amount of absorbed water at night, the temperature of the composite material, the temperature of the device’s internal space, and the amount of water generated during the day all rose as the desiccant concentration rose. A composite material with a percentage of 60% produced the most water (180 mL/kg/day).</span></div><div class="html-p" data-dcnode-id="6008"><span data-dcnode-id="6030" instrument_node="">Many experiments were conducted in this study to determine the capability of a newly created composite desiccant material (CaCl</span><sup data-dcnode-id="6028"><span data-dcnode-id="6029" instrument_node="">2</span></sup><span data-dcnode-id="6027" instrument_node="">/flower foam) for extracting water from atmospheric air. The floral foam was employed as the host material, and CaCl</span><sub data-dcnode-id="6025"><span data-dcnode-id="6026" instrument_node="">2</span></sub><span data-dcnode-id="6024" instrument_node=""> was used as the hygroscopic salt. Three different sets of SGDBs were employed. Six distinct concentrations of CaCl</span><sub data-dcnode-id="6022"><span data-dcnode-id="6023" instrument_node="">2</span></sub><span data-dcnode-id="6021" instrument_node=""> composite were created. The greatest adsorption rate (0.043992 kg/h) and water production (0.35 mL/cm</span><sup data-dcnode-id="6019"><span data-dcnode-id="6020" instrument_node="">3</span></sup><span data-dcnode-id="6018" instrument_node="">/day) were discovered at a concentration of 37 percent CaCl</span><sub data-dcnode-id="6016"><span data-dcnode-id="6017" instrument_node="">2</span></sub><span data-dcnode-id="6015" instrument_node="">. The amount of water produced increased as the concentration of CaCl</span><sub data-dcnode-id="6013"><span data-dcnode-id="6014" instrument_node="">2</span></sub><span data-dcnode-id="6012" instrument_node=""> rose [</span><a class="html-bibr" data-dcnode-id="6010" href="#B60-energies-15-00421" title=""><span data-dcnode-id="6011" instrument_node="">60</span></a><span data-dcnode-id="6009" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="5982"><span data-dcnode-id="6007" instrument_node="">The air gap height, inclination angle, effective glass thickness, and sufficient glazing number were investigated as design parameters for collecting drinkable water from the air utilizing silica gel (SiO</span><sub data-dcnode-id="6005"><span data-dcnode-id="6006" instrument_node="">2</span></sub><span data-dcnode-id="6004" instrument_node="">) as a solid desiccant in the study. There were three different numbers of SGBDs used [</span><a class="html-bibr" data-dcnode-id="6002" href="#B61-energies-15-00421" title=""><span data-dcnode-id="6003" instrument_node="">61</span></a><span data-dcnode-id="6001" instrument_node="">]. The results revealed that the design factors for maximum production were the air gap height (0.22 m), inclination angle (30°), the effective thickness of glass (3 mm), and single glazing. Most of the water was produced (200 mL/kg/day) during the trial [</span><a class="html-bibr" data-dcnode-id="5999" href="#B62-energies-15-00421" title=""><span data-dcnode-id="6000" instrument_node="">62</span></a><span data-dcnode-id="5998" instrument_node="">]. William et al. designed and built a trapezoidal prism collector with four fiberglass faces. The collector has a multi-shelf bed on the inside to enhance the bed surface area. As a bed, sand and fabric layers were used, with CaCl</span><sub data-dcnode-id="5996"><span data-dcnode-id="5997" instrument_node="">2</span></sub><span data-dcnode-id="5995" instrument_node=""> at a 30% concentration acting as a desiccant. At a CaCl</span><sub data-dcnode-id="5993"><span data-dcnode-id="5994" instrument_node="">2</span></sub><span data-dcnode-id="5992" instrument_node=""> concentration of 30%, evaporated water for cloth and sand can reach 2.32 slit/m</span><sup data-dcnode-id="5990"><span data-dcnode-id="5991" instrument_node="">2</span></sup><span data-dcnode-id="5989" instrument_node="">/day and 1.23 slit/m</span><sup data-dcnode-id="5987"><span data-dcnode-id="5988" instrument_node="">2</span></sup><span data-dcnode-id="5986" instrument_node="">/day, respectively. The efficiency of the cloth and sand systems was 29.3 percent and 17.76 percent, respectively. Various strategies that have been published for extracting water from ambient air have been given in </span><a class="html-table html-tablepopup" data-dcnode-id="5984" href="#table_body_display_energies-15-00421-t001"><span data-dcnode-id="5985" instrument_node="">Table 1</span></a><span data-dcnode-id="5983" instrument_node="">.</span></div><div class="html-table-wrap" data-dcnode-id="5964" id="energies-15-00421-t001"><div class="html-table_wrap_discription" data-dcnode-id="5977"><span data-dcnode-id="5981" instrument_node="">
</span><b data-dcnode-id="5979"><span data-dcnode-id="5980" instrument_node="">Table 1.</span></b><span data-dcnode-id="5978" instrument_node="">
Various strategies that have been published for extracting water from ambient air.
</span></div><span data-dcnode-id="5976" instrument_node="">
</span><div class="html-table_wrap_td" data-dcnode-id="5967"><span data-dcnode-id="5975" instrument_node="">

</span></div><div class="html-p" data-dcnode-id="5929"><span data-dcnode-id="5963" instrument_node="">Kumar et al. developed and tested a new composite desiccant material, CaCl</span><sub data-dcnode-id="5961"><span data-dcnode-id="5962" instrument_node="">2</span></sub><span data-dcnode-id="5960" instrument_node="">–vermiculite saw wood, for collecting water from ambient air. The hygroscopic salt was CaCl</span><sub data-dcnode-id="5958"><span data-dcnode-id="5959" instrument_node="">2</span></sub><span data-dcnode-id="5957" instrument_node="">, and the host material was vermiculite saw wood. Six different ethanol concentrations were made using a solid desiccant type device with a collector area of 0.36 m</span><sup data-dcnode-id="5955"><span data-dcnode-id="5956" instrument_node="">2</span></sup><span data-dcnode-id="5954" instrument_node=""> and a 30° inclined inclination (CaCl</span><sub data-dcnode-id="5952"><span data-dcnode-id="5953" instrument_node="">2</span></sub><span data-dcnode-id="5951" instrument_node="">). The adsorption and desorption rates were highest when the adsorbent and desorbing concentrations were highest (CaCl</span><sub data-dcnode-id="5949"><span data-dcnode-id="5950" instrument_node="">2</span></sub><span data-dcnode-id="5948" instrument_node="">). The highest amount of generated water was 500 mL/m</span><sup data-dcnode-id="5946"><span data-dcnode-id="5947" instrument_node="">2</span></sup><span data-dcnode-id="5945" instrument_node="">/day when using 2.5 kg of composite desiccant. The most effective attribute for water creation was the desiccant content. Wang et al. proposed the construction of a highly efficient semi-open system for the production of potable water. The composite material’s unit structure (active carbon felt (ACF) with nanosilica grains aggregated in pure ACF fibers gap soaked with lithium chloride) was made into a corrugated shape that can be easily constructed as mass transfer channels. The process is divided into absorption at night and desorption during the day [</span><a class="html-bibr" data-dcnode-id="5943" href="#B64-energies-15-00421" title=""><span data-dcnode-id="5944" instrument_node="">64</span></a><span data-dcnode-id="5942" instrument_node="">]. The sorbent unit was investigated (CFX). The findings revealed that the amount of absorbed water grew as relative humidity rose in the absorption phase, while the amount of released water decreased in the desorption process. As the temperature of desorption rose, the amount of water in the system increased. Overall, 40.8 kg of composite material was used to collect 14.7 kg of water. Talaat et al. looked into the factors that influence the performance of a finned, portable, lightweight device that uses CaCl</span><sub data-dcnode-id="5940"><span data-dcnode-id="5941" instrument_node="">2</span></sub><span data-dcnode-id="5939" instrument_node=""> as a desiccant to collect fresh water from the atmosphere. A finned double-faced conical absorber was manufactured and used to capture moisture from the ambient air at night. During the day, a transparent double-faced conical cover surface was used to capture heat. The system’s productivity ranged from 0.3295 to 0.6310 kg per square meter per day, with the produced water costing 0.062 USD per kilogram [</span><a class="html-bibr" data-dcnode-id="5937" href="#B65-energies-15-00421" title=""><span data-dcnode-id="5938" instrument_node="">65</span></a><span data-dcnode-id="5936" instrument_node="">]. </span><a class="html-fig html-figpopup" data-dcnode-id="5934" href="#fig_body_display_energies-15-00421-f011"><span data-dcnode-id="5935" instrument_node="">Figure 11</span></a><span data-dcnode-id="5933" instrument_node=""> shows the test rig operation during the daytime, and </span><a class="html-fig html-figpopup" data-dcnode-id="5931" href="#fig_body_display_energies-15-00421-f012"><span data-dcnode-id="5932" instrument_node="">Figure 12</span></a><span data-dcnode-id="5930" instrument_node=""> shows a schematic diagram of the main parts and thermocouples’ distribution on the absorber and cover.</span></div><div class="html-fig-wrap" data-dcnode-id="5908" id="energies-15-00421-f011"><span data-dcnode-id="5928" instrument_node="">
