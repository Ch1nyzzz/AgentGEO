</span><h1 class="entry-title" data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Best Humidity Levels for Growing Cannabis</span></h1><span data-dcnode-id="741" instrument_node="">
</span><div data-dcnode-id="728" data-hide-on-mobile="true" id="single-below-header"><span data-dcnode-id="740" instrument_node="">
</span><span class="meta-author vcard author" data-dcnode-id="735"><span class="fn" data-dcnode-id="736"><span data-dcnode-id="739" instrument_node="">By </span><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarisfarms.org/author/solaris/" rel="author" title="Posts by Solaris Farms"><span data-dcnode-id="738" instrument_node="">Solaris Farms</span></a></span></span><span class="meta-date date updated" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node=""> Last updated on August 16, 2021</span></span><span class="meta-comment-count" data-dcnode-id="730"><a data-dcnode-id="731" href="#respond"><span data-dcnode-id="732" instrument_node="">No Comments</span></a></span><span data-dcnode-id="729" instrument_node=""> </span></div><span data-dcnode-id="726" instrument_node="">
</span></div><span data-dcnode-id="723" instrument_node="">
</span></div><span data-dcnode-id="720" instrument_node="">
</span><div class="row" data-dcnode-id="442"><span data-dcnode-id="719" instrument_node="">
</span><div class="post-area col span_12 col_last" data-dcnode-id="445"><span data-dcnode-id="718" instrument_node="">
</span><article class="post-630 post type-post status-publish format-standard has-post-thumbnail category-blog-article" data-dcnode-id="505" id="post-630"><span data-dcnode-id="717" instrument_node="">
</span><div class="inner-wrap" data-dcnode-id="508"><span data-dcnode-id="716" instrument_node="">
</span><div class="post-content" data-dcnode-id="511" data-hide-featured-media="1"><span data-dcnode-id="715" instrument_node="">
</span><div class="content-inner" data-dcnode-id="513"><p data-dcnode-id="709"><span data-dcnode-id="714" instrument_node="">If you want to grow sticky, high-potency buds, your cannabis will demand attention to its many needs. One need of the </span><strong data-dcnode-id="711"><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarisfarms.org/how-to-grow-weed/"><span data-dcnode-id="713" instrument_node="">growing cannabis plant</span></a></strong><span data-dcnode-id="710" instrument_node=""> that is commonly overlooked is humidity.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Humidity is very important to your plant. It will help determine your plant’s resilience against mold or mildew in addition to how much your plants need to drink. Getting it just right can improve plant growth and increase your yields.</span></p><span data-dcnode-id="705" instrument_node="">
</span><h2 data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">What is humidity?</span></h2><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Humidity is expressed as the quantity of water vapor in the air. Humidity plays a necessary role in influencing how much evaporation occurs in cannabis plants. Your plant will take in more nutrition and water when the humidity is low.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Cannabis plants will guard themselves against water scarcity by closing their stomata. So naturally, this will stunt the growth of your plant due to the lack of water absorption. This is why you must have the proper humidity levels in your grow area.</span></p><span data-dcnode-id="696" instrument_node="">
</span><h2 data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Effects of poor humidity management</span></h2><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Some common problems with weed plants stemming from poor humidity management include:</span></p><span data-dcnode-id="690" instrument_node="">
</span><ul data-dcnode-id="668"><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="685"><strong data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">White powdery mildew: </span></strong><span data-dcnode-id="686" instrument_node="">This is a fungal disease that will show up in high humidity environments. This can be tricky since young cannabis plants flourish in humid environments. Luckily, you can stave off white powdery mildew by making sure there is proper airflow in your grow area; a small oscillating fan works wonders.</span></li><span data-dcnode-id="684" instrument_node="">
</span><li data-dcnode-id="680"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Bud rot or mold:</span></strong><span data-dcnode-id="681" instrument_node=""> Imagine harvesting a huge, dense main cola from your plant only to see the insides are white or brown with mold. Buds in this condition are unusable and should be thrown away.</span></li><span data-dcnode-id="679" instrument_node="">
</span><li data-dcnode-id="675"><strong data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Nutrient overload: </span></strong><span data-dcnode-id="676" instrument_node="">This is a factor that partly determines how much your plants will drink. If the air is dry, your plants will tend to drink more at their roots. If they are already drinking more due to high temperatures, low humidity can cause them to drink a lot of water through their roots and uptake too-high levels of nutrients. If your plant takes in more nutrients than the plant can use, the leaves will begin to show yellow or burnt tips, which is the result of nutrient burn.</span></li><span data-dcnode-id="674" instrument_node="">
</span><li data-dcnode-id="670"><strong data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Slowed growth: </span></strong><span data-dcnode-id="671" instrument_node="">Cannabis plants love higher humidity when they are young, and lower humidity when they are mature. If they are not getting these conditions, they may not be growing nearly as fast or healthy as they could.</span></li><span data-dcnode-id="669" instrument_node="">
</span></ul><span data-dcnode-id="667" instrument_node="">
</span><h2 data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">How temperatures and humidity levels interact</span></h2><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">It is important to know that humidity levels and temperatures are closely related to one another. When we talk about humidity, we usually mean relative humidity (RH), which is the ratio of partial pressure of water vapor to the maximum vapor pressure of water at the same temperature.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">It is easy to understand by knowing the basic principle that warm air holds more water vapor than cold air. This is one of the reasons why it is necessary to extract a lot of warm air from our grow room, and ideally, allow cool air to enter.</span></p><span data-dcnode-id="658" instrument_node="">
</span><h2 data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">How to measure humidity</span></h2><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">A hygrometer is a device that measures the level of humidity in the atmosphere. Also known as a humidity meter or humidity gauge, hygrometers measure the amount of moisture in a specific environment. It does this by calculating changes in pressure and temperature.</span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">There are many different types of hygrometers, including digital (also known as electrical) hygrometers, mechanical hygrometers, psychrometers, and dew point hygrometers. Digital hygrometers are the most commonly used hygrometers.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">The higher-priced hygrometers are usually of better quality and are certainly worth it. These devices can have a built-in storage bank that tracks the highest and lowest values, to help you determine how well you stayed within the preferred range.</span></p><span data-dcnode-id="646" instrument_node="">
</span><h2 data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Humidity levels and temperatures: from seedling to harvest</span></h2><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><img alt="Humidity levels and temperatures: from seedling to harvest" class="aligncenter wp-image-631 size-full" data-dcnode-id="642" height="1401" sizes="(max-width: 1081px) 100vw, 1081px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarisfarms.org/wp-content/uploads/2021/07/Best-Humidity-Levels-for-Growing-Cannabis-Image.jpg&amp;raw" srcset="https://solarisfarms.org/wp-content/uploads/2021/07/Best-Humidity-Levels-for-Growing-Cannabis-Image.jpg 1081w, https://solarisfarms.org/wp-content/uploads/2021/07/Best-Humidity-Levels-for-Growing-Cannabis-Image-231x300.jpg 231w, https://solarisfarms.org/wp-content/uploads/2021/07/Best-Humidity-Levels-for-Growing-Cannabis-Image-790x1024.jpg 790w, https://solarisfarms.org/wp-content/uploads/2021/07/Best-Humidity-Levels-for-Growing-Cannabis-Image-768x995.jpg 768w" width="1081"></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">We need to define what humidity and temperature control means when growing cannabis. It makes sense to divide the life of cannabis plants into 4 different stages in which humidity levels, and temperatures, should be adjusted to ensure healthy growth.</span></p><span data-dcnode-id="637" instrument_node="">
</span><h3 data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Seedling stage</span></h3><span data-dcnode-id="634" instrument_node="">
</span><ul data-dcnode-id="619"><span data-dcnode-id="633" instrument_node="">
</span><li data-dcnode-id="629"><span data-dcnode-id="632" instrument_node="">Seedlings and clones like high humidity levels of </span><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">65-70 percent.</span></strong></li><span data-dcnode-id="628" instrument_node="">
</span><li data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">High humidity levels allow for water intake through the leaves.</span></li><span data-dcnode-id="625" instrument_node="">
</span><li data-dcnode-id="621"><span data-dcnode-id="624" instrument_node="">The temperature with lights on should be </span><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">68-77 degrees Fahrenheit.</span></strong></li><span data-dcnode-id="620" instrument_node="">
</span></ul><span data-dcnode-id="618" instrument_node="">
</span><h3 data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Vegetation period</span></h3><span data-dcnode-id="615" instrument_node="">
</span><ul data-dcnode-id="600"><span data-dcnode-id="614" instrument_node="">
</span><li data-dcnode-id="610"><span data-dcnode-id="613" instrument_node="">Humidity levels can be lowered by 5 percent each week to a range of </span><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">40-70 percent.</span></strong></li><span data-dcnode-id="609" instrument_node="">
</span><li data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Roots absorb more water; evaporation through the leaves cool down the plant.</span></li><span data-dcnode-id="606" instrument_node="">
</span><li data-dcnode-id="602"><span data-dcnode-id="605" instrument_node="">The temperature with lights on should be </span><strong data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">72-82 degrees Fahrenheit.</span></strong></li><span data-dcnode-id="601" instrument_node="">
</span></ul><span data-dcnode-id="599" instrument_node="">
</span><h3 data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Flowering period</span></h3><span data-dcnode-id="596" instrument_node="">
</span><ul data-dcnode-id="584"><span data-dcnode-id="595" instrument_node="">
</span><li data-dcnode-id="591"><span data-dcnode-id="594" instrument_node="">Humidity levels need to be lowered to </span><strong data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">40-50 percent.</span></strong></li><span data-dcnode-id="590" instrument_node="">
</span><li data-dcnode-id="586"><span data-dcnode-id="589" instrument_node="">Slightly lower the temperatures in flowering to </span><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">68-79 degrees Fahrenheit.</span></strong></li><span data-dcnode-id="585" instrument_node="">
</span></ul><span data-dcnode-id="583" instrument_node="">
</span><h3 data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Late flowering (1-2 weeks before harvest)</span></h3><span data-dcnode-id="580" instrument_node="">
</span><ul data-dcnode-id="560"><span data-dcnode-id="579" instrument_node="">
</span><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">The following steps can improve yield, flavor, and appearance.</span></li><span data-dcnode-id="576" instrument_node="">
</span><li data-dcnode-id="571"><span data-dcnode-id="575" instrument_node="">Bring down the humidity levels to </span><strong data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">30-40 percent</span></strong><span data-dcnode-id="572" instrument_node="">.</span></li><span data-dcnode-id="570" instrument_node="">
</span><li data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Lower daytime temperatures, and also increase the temperature difference (day/night).</span></li><span data-dcnode-id="567" instrument_node="">
</span><li data-dcnode-id="562"><span data-dcnode-id="566" instrument_node="">The temperature with lights on should be </span><strong data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">64-75 degrees Fahrenheit</span></strong><span data-dcnode-id="563" instrument_node="">.</span></li><span data-dcnode-id="561" instrument_node="">
</span></ul><span data-dcnode-id="559" instrument_node="">
</span><h2 data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">How to raise humidity levels</span></h2><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">You have a few options for raising the humidity in your grow room. For starters, you can try spraying water on the walls. Also, try putting the lights further up so the temperature will go down a little near the plants. This way you will not have to turn on the extractor fan as often. If you put bottles or buckets of water around the grow room, or even wet towels, this will also raise the humidity level.</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">The best way to accomplish your goal is to use a humidifier. Humidifiers transform water into water vapor and shoot a constant mist consisting of high humidity into your room. Depending on which one you buy it may come with a humidistat to monitor the humidity level and will even turn on if it goes beneath the value you set it to.</span></p><span data-dcnode-id="550" instrument_node="">
</span><h2 data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">How to decrease humidity levels</span></h2><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Once your cannabis plant starts flowering the humidity will need to be decreased, so it is necessary to dehumidify. Try using the extractor fan on a higher setting than usual or you can even create cold air in the room by using a portable air conditioner.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Dehumidifiers are most certainly your best option. It has the capability of taking moisture from the air and draining it or holding it in a reservoir. Make sure to get a larger humidifier because the smaller ones fill up quickly.</span></p><span data-dcnode-id="541" instrument_node="">
</span><h2 data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Humidity levels for outdoor cannabis plants</span></h2><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Humidity is much less of an issue when growing your cannabis plants outdoors. The springtime and the start of summer offer higher humidity which works just fine since there are no buds present on the plant for moisture to gather. Any moisture on the plant from morning dew will easily evaporate throughout the day.</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Once summertime ends, the flowering stage starts and there is a shift in the climate, resulting in cooler days and more rainfall. This usually makes the humidity higher. In the cooler months, the morning dew could be an issue since the sun is not guaranteed to come out and the temperatures are sometimes too low to evaporate it.</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Luckily a little bit of rain will not cause the buds to rot, but you should remain on the lookout for this. In the last portion of the flowering stage, it might be a good idea to brush the dew off your cannabis plants in the mornings.</span></p><span data-dcnode-id="529" instrument_node="">
</span><h2 data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Humidity levels for drying buds</span></h2><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="525" instrument_node="">Keep the humidity in the drying room to around </span><strong data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">50 percent</span></strong><span data-dcnode-id="522" instrument_node="">. This will allow your buds to dry, but keep them from drying too quickly.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">As a drying and curing technique, some growers like to keep the humidity a little higher so buds dry slower which could increase the quality of your cured buds. Drying with high humidity is considered an advanced technique because drying must be done with extra care to prevent mold from forming on your harvested buds.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">It is good to have air circulation in the drying area, but it is recommended that no air is blown directly over the buds to prevent them from drying too quickly.</span></p><span data-dcnode-id="514" instrument_node="">
</span></div><span data-dcnode-id="512" instrument_node="">
</span></div><span data-dcnode-id="509" instrument_node="">
</span></div><span data-dcnode-id="506" instrument_node="">
