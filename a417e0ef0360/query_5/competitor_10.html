Color" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="7798" is="true"><use data-dcnode-id="7799" href="#MJMAIN-D7"><path d="M630 29Q630 9 609 9Q604 9 587 25T493 118L389 222L284 117Q178 13 175 11Q171 9 168 9Q160 9 154 15T147 29Q147 36 161 51T255 146L359 250L255 354Q174 435 161 449T147 471Q147 480 153 485T168 490Q173 490 175 489Q178 487 284 383L389 278L493 382Q570 459 587 475T609 491Q630 491 630 471Q630 464 620 453T522 355L418 250L522 145Q606 61 618 48T630 29Z" data-dcnode-id="7800" id="MJMAIN-D7" stroke-width="1"></path></use></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="7792" role="presentation"><math data-dcnode-id="7793" xmlns="http://www.w3.org/1998/Math/MathML"><mo data-dcnode-id="7794" is="true"><span data-dcnode-id="7795" instrument_node="">×</span></mo></math></span></span></span><span data-dcnode-id="7787" instrument_node=""> 17&nbsp;mm</span></td></tr><tr class="valign-top" data-dcnode-id="7776"><td class="align-left" data-dcnode-id="7783"><span data-dcnode-id="7784" instrument_node="">Price</span></td><td class="align-left" data-dcnode-id="7781"><span data-dcnode-id="7782" instrument_node="">$20</span></td><td class="align-left" data-dcnode-id="7779"><span data-dcnode-id="7780" instrument_node="">$95 to $149</span></td><td class="align-left" data-dcnode-id="7777"><span data-dcnode-id="7778" instrument_node="">$75</span></td></tr></tbody></table></div></div></div></section></section><section data-dcnode-id="7241" id="sec3.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7763" id="d1e3619"><span data-dcnode-id="7768" instrument_node="">3.4</span><span data-dcnode-id="7766" instrument_node="">. </span><span data-dcnode-id="7764" instrument_node="">Hardware components and software packages commonly used in Arduino (RESEARCH QUESTION-4)</span></h3><p data-dcnode-id="7761" id="d1e3621"><span data-dcnode-id="7762" instrument_node="">Arduino has several hardware and software components that it needs in delivering its job. We look at each of these one after the other.</span></p><section data-dcnode-id="7398" id="sec3.4.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7755" id="d1e3626"><span data-dcnode-id="7760" instrument_node="">3.4.1</span><span data-dcnode-id="7758" instrument_node="">. </span><span data-dcnode-id="7756" instrument_node="">Hardware components</span></h4><p data-dcnode-id="7753" id="d1e3628"><span data-dcnode-id="7754" instrument_node="">Several hardware components are necessary for Arduino prototyping. There contribute hugely to the success of the project being prototyped and have to be present before a particular project is completed. The type of components needed for one project may slightly differ from those needed for another project. Some of these hardware components include Sensors, connectors, accessories, controllers, and several other devices. Some of the major hardware components include:</span></p><section data-dcnode-id="7691" id="sec3.4.1.1"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7747" id="d1e3633"><span data-dcnode-id="7752" instrument_node="">3.4.1.1</span><span data-dcnode-id="7750" instrument_node="">. </span><span data-dcnode-id="7748" instrument_node="">Arduino controller.</span></h5><p data-dcnode-id="7745" id="d1e3635"><span data-dcnode-id="7746" instrument_node="">The Arduino board comes with several hardware components. These components have special purposes and functions they carry out on the board. The following are some of the most widely needed:</span></p><p data-dcnode-id="7694" id="d1e3640"></p><dl class="list" data-dcnode-id="7695"><dt class="list-label" data-dcnode-id="7743"><span data-dcnode-id="7744" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="7738"><p data-dcnode-id="7741" id="d1e3646"><span data-dcnode-id="7742" instrument_node="">Power port.</span></p><p data-dcnode-id="7739" id="d1e3648"><span data-dcnode-id="7740" instrument_node="">The power port provides a space to connect the Arduino power to the power supply</span></p></dd><dt class="list-label" data-dcnode-id="7736"><span data-dcnode-id="7737" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="7731"><p data-dcnode-id="7734" id="d1e3653"><span data-dcnode-id="7735" instrument_node="">Microcontroller.</span></p><p data-dcnode-id="7732" id="d1e3655"><span data-dcnode-id="7733" instrument_node="">Every Arduino board has an embedded microcontroller usually an ATMega</span></p></dd><dt class="list-label" data-dcnode-id="7729"><span data-dcnode-id="7730" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="7724"><p data-dcnode-id="7727" id="d1e3660"><span data-dcnode-id="7728" instrument_node="">Analog input pins.</span></p><p data-dcnode-id="7725" id="d1e3662"><span data-dcnode-id="7726" instrument_node="">Slots are made available for input pins. This could number anywhere from 54 in the Arduino Mega to 12 in the Arduino Uno board.</span></p></dd><dt class="list-label" data-dcnode-id="7722"><span data-dcnode-id="7723" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="7717"><p data-dcnode-id="7720" id="d1e3667"><span data-dcnode-id="7721" instrument_node="">Digital pins.</span></p><p data-dcnode-id="7718" id="d1e3669"><span data-dcnode-id="7719" instrument_node="">There are also digital pins on the board.</span></p></dd><dt class="list-label" data-dcnode-id="7715"><span data-dcnode-id="7716" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="7710"><p data-dcnode-id="7713" id="d1e3674"><span data-dcnode-id="7714" instrument_node="">Reset switch.</span></p><p data-dcnode-id="7711" id="d1e3676"><span data-dcnode-id="7712" instrument_node="">The reset switch helps to reset the board when necessary perhaps due to some discovered error or some other reason that prompted the designer to reset the whole process and start afresh.</span></p></dd><dt class="list-label" data-dcnode-id="7708"><span data-dcnode-id="7709" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="7703"><p data-dcnode-id="7706" id="d1e3681"><span data-dcnode-id="7707" instrument_node="">Crystal oscillator.</span></p><p data-dcnode-id="7704" id="d1e3683"><span data-dcnode-id="7705" instrument_node="">A crystal oscillator uses the mechanical resonance of a vibrating crystal of piezoelectric material to create an electrical signal with precise. Every Arduino board has at least one crystal oscillator.</span></p></dd><dt class="list-label" data-dcnode-id="7701"><span data-dcnode-id="7702" instrument_node="">7.</span></dt><dd class="list-description" data-dcnode-id="7696"><p data-dcnode-id="7699" id="d1e3688"><span data-dcnode-id="7700" instrument_node="">USB interface chip</span></p><p data-dcnode-id="7697" id="d1e3690"><span data-dcnode-id="7698" instrument_node="">USB interface chips help connect the Arduino board to USB interfaces to enhance data communication and control between the Arduino board and the connected device.</span></p></dd></dl><p></p><p data-dcnode-id="7692"><span data-dcnode-id="7693" instrument_node="">The Arduino Uno controller much like other variants of the Arduino board also contains, in addition to the above mentioned, net Wi-fi port, a Wi-fi socket, nRF24L01+ component interface, and an ATMega328. The board also has wireless ESP8266 wi-fi shield control provides an internet connection for the project.</span></p></section><section data-dcnode-id="7556" id="sec3.4.1.2"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7685" id="d1e3697"><span data-dcnode-id="7690" instrument_node="">3.4.1.2</span><span data-dcnode-id="7688" instrument_node="">. </span><span data-dcnode-id="7686" instrument_node="">Sensors.</span></h5><p data-dcnode-id="7680" id="d1e3699"><span data-dcnode-id="7684" instrument_node="">In a project that requires an intelligent operation for the systems being developed, sensors play a prominent role. In automating fans and lamps at home, for instance, temperature control and lamp control are coupled to the system. Sensors such as Light-dependent resistor (LDR) and Temperature sensor (LM35) are needed for the automatic control of lamps and fans&nbsp;</span><a class="workspace-trigger" data-dcnode-id="7682" href="#b79" name="bb79"><span data-dcnode-id="7683" instrument_node="">[79]</span></a><span data-dcnode-id="7681" instrument_node="">. The temperature sensor is used to detect ambient temperature. Popular sensors include the ultrasonic module used for non-contact detection and used when prototyping robotic systems. There is a soil hygrometer, a soil moisture sensor that generates a digital signal when the soil moisture in a particular place rises above certain levels. The hygrometer is useful in building many agricultural solutions on Arduino such as an automatic watering system. Digital Barometric pressure sensor measures the absolute pressure of the environment as well as the height of the robot or projectile. The photoresistor sensor module is used for light detection. A night security light system can be prototyped on Arduino using this sensor. To detect poisonous gases such as LPG, i- Butane, Propane, Alcohol, etc, the MQ-2 gas sensor is adopted. Sensors such as the rain sensor are used for weather observation while the ordinary light Flame sensor is used to detect the flame. PIR sensor is used to detect motion from humans, pets, and other animals, and the touch screen sensor plays a key role when designing a Touch dimmer circuit using Arduino.</span></p><p data-dcnode-id="7678" id="d1e3705"><span data-dcnode-id="7679" instrument_node="">Some of other Arduino Sensors include:</span></p><p data-dcnode-id="7571" id="d1e3707"></p><dl class="list" data-dcnode-id="7572"><dt class="list-label" data-dcnode-id="7676"><span data-dcnode-id="7677" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="7673"><p data-dcnode-id="7674" id="d1e3713"><span data-dcnode-id="7675" instrument_node="">5&nbsp;V 2- Channel Relay module</span></p></dd><dt class="list-label" data-dcnode-id="7671"><span data-dcnode-id="7672" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="7668"><p data-dcnode-id="7669" id="d1e3718"><span data-dcnode-id="7670" instrument_node="">Accelerometer Module</span></p></dd><dt class="list-label" data-dcnode-id="7666"><span data-dcnode-id="7667" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="7663"><p data-dcnode-id="7664" id="d1e3723"><span data-dcnode-id="7665" instrument_node="">Breadboard Power Supply Module 3.3&nbsp;V</span></p></dd><dt class="list-label" data-dcnode-id="7661"><span data-dcnode-id="7662" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="7658"><p data-dcnode-id="7659" id="d1e3728"><span data-dcnode-id="7660" instrument_node="">DHT11 Temperature and Humidity sensor</span></p></dd><dt class="list-label" data-dcnode-id="7656"><span data-dcnode-id="7657" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="7653"><p data-dcnode-id="7654" id="d1e3733"><span data-dcnode-id="7655" instrument_node="">Digital Barometric Pressure Sensor</span></p></dd><dt class="list-label" data-dcnode-id="7651"><span data-dcnode-id="7652" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="7648"><p data-dcnode-id="7649" id="d1e3738"><span data-dcnode-id="7650" instrument_node="">Digital thermal sensor —&nbsp;Temperature sensor</span></p></dd><dt class="list-label" data-dcnode-id="7646"><span data-dcnode-id="7647" instrument_node="">7.</span></dt><dd class="list-description" data-dcnode-id="7643"><p data-dcnode-id="7644" id="d1e3743"><span data-dcnode-id="7645" instrument_node="">HC- SR04 Ultrasonic Module</span></p></dd><dt class="list-label" data-dcnode-id="7641"><span data-dcnode-id="7642" instrument_node="">8.</span></dt><dd class="list-description" data-dcnode-id="7638"><p data-dcnode-id="7639" id="d1e3748"><span data-dcnode-id="7640" instrument_node="">HC- SR501 Pyroelectric Infrared Sensor</span></p></dd><dt class="list-label" data-dcnode-id="7636"><span data-dcnode-id="7637" instrument_node="">9.</span></dt><dd class="list-description" data-dcnode-id="7633"><p data-dcnode-id="7634" id="d1e3753"><span data-dcnode-id="7635" instrument_node="">Humidity and Rain Detection sensor</span></p></dd><dt class="list-label" data-dcnode-id="7631"><span data-dcnode-id="7632" instrument_node="">10.</span></dt><dd class="list-description" data-dcnode-id="7628"><p data-dcnode-id="7629" id="d1e3758"><span data-dcnode-id="7630" instrument_node="">IR Infrared Flame Detection sensor</span></p></dd><dt class="list-label" data-dcnode-id="7626"><span data-dcnode-id="7627" instrument_node="">11.</span></dt><dd class="list-description" data-dcnode-id="7623"><p data-dcnode-id="7624" id="d1e3763"><span data-dcnode-id="7625" instrument_node="">IR Infrared Obstacle Avoidance sensor</span></p></dd><dt class="list-label" data-dcnode-id="7621"><span data-dcnode-id="7622" instrument_node="">12.</span></dt><dd class="list-description" data-dcnode-id="7618"><p data-dcnode-id="7619" id="d1e3769"><span data-dcnode-id="7620" instrument_node="">Microphone sensor</span></p></dd><dt class="list-label" data-dcnode-id="7616"><span data-dcnode-id="7617" instrument_node="">13.</span></dt><dd class="list-description" data-dcnode-id="7613"><p data-dcnode-id="7614" id="d1e3774"><span data-dcnode-id="7615" instrument_node="">MQ-2 Gas sensor</span></p></dd><dt class="list-label" data-dcnode-id="7611"><span data-dcnode-id="7612" instrument_node="">14.</span></dt><dd class="list-description" data-dcnode-id="7608"><p data-dcnode-id="7609" id="d1e3779"><span data-dcnode-id="7610" instrument_node="">Passive Buzzer Module</span></p></dd><dt class="list-label" data-dcnode-id="7606"><span data-dcnode-id="7607" instrument_node="">15.</span></dt><dd class="list-description" data-dcnode-id="7603"><p data-dcnode-id="7604" id="d1e3784"><span data-dcnode-id="7605" instrument_node="">Photoresistor sensor</span></p></dd><dt class="list-label" data-dcnode-id="7601"><span data-dcnode-id="7602" instrument_node="">16.</span></dt><dd class="list-description" data-dcnode-id="7598"><p data-dcnode-id="7599" id="d1e3789"><span data-dcnode-id="7600" instrument_node="">RF 433&nbsp;MHz Transmitter/Receiver</span></p></dd><dt class="list-label" data-dcnode-id="7596"><span data-dcnode-id="7597" instrument_node="">17.</span></dt><dd class="list-description" data-dcnode-id="7593"><p data-dcnode-id="7594" id="d1e3794"><span data-dcnode-id="7595" instrument_node="">Rotary Encoder Module</span></p></dd><dt class="list-label" data-dcnode-id="7591"><span data-dcnode-id="7592" instrument_node="">18.</span></dt><dd class="list-description" data-dcnode-id="7588"><p data-dcnode-id="7589" id="d1e3799"><span data-dcnode-id="7590" instrument_node="">Soil Hygrometer Detection Module</span></p></dd><dt class="list-label" data-dcnode-id="7586"><span data-dcnode-id="7587" instrument_node="">19.</span></dt><dd class="list-description" data-dcnode-id="7583"><p data-dcnode-id="7584" id="d1e3804"><span data-dcnode-id="7585" instrument_node="">Soil Moisture Sensor</span></p></dd><dt class="list-label" data-dcnode-id="7581"><span data-dcnode-id="7582" instrument_node="">20.</span></dt><dd class="list-description" data-dcnode-id="7578"><p data-dcnode-id="7579" id="d1e3809"><span data-dcnode-id="7580" instrument_node="">Speed sensor Module</span></p></dd><dt class="list-label" data-dcnode-id="7576"><span data-dcnode-id="7577" instrument_node="">21.</span></dt><dd class="list-description" data-dcnode-id="7573"><p data-dcnode-id="7574" id="d1e3814"><span data-dcnode-id="7575" instrument_node="">SW-420 Motion sensor</span></p></dd></dl><p></p><p data-dcnode-id="7557"><span data-dcnode-id="7570" instrument_node="">The role of Arduino sensors cannot be overemphasized in the development and implementation of many electronic projects. Projects such as prototyping a Sun tracking system with Arduino requires using LDR. Other projects such as the Arduino rainwater alarm, Accelerometer-based gesture-controlled Robot with Arduino, IR sensor-based line follower, IR sensor-based motion-sensing alarm also require sensors. A door alarm cannot possibly be built without an ultrasonic sensor. The same ultrasonic sensor could also be used in prototyping distance measurement systems. PIR sensors are important for home appliances control.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="7568" href="#b171" name="bb171"><span data-dcnode-id="7569" instrument_node="">[171]</span></a><span data-dcnode-id="7567" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7565" href="#b172" name="bb172"><span data-dcnode-id="7566" instrument_node="">[172]</span></a><span data-dcnode-id="7564" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7562" href="#b173" name="bb173"><span data-dcnode-id="7563" instrument_node="">[173]</span></a><span data-dcnode-id="7561" instrument_node=""> and&nbsp;</span><a class="workspace-trigger" data-dcnode-id="7559" href="#b174" name="bb174"><span data-dcnode-id="7560" instrument_node="">[174]</span></a><span data-dcnode-id="7558" instrument_node="">.</span></p></section><section data-dcnode-id="7510" id="sec3.4.1.3"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7550" id="d1e3838"><span data-dcnode-id="7555" instrument_node="">3.4.1.3</span><span data-dcnode-id="7553" instrument_node="">. </span><span data-dcnode-id="7551" instrument_node="">Connectors.</span></h5><p data-dcnode-id="7548" id="d1e3840"><span data-dcnode-id="7549" instrument_node="">Connectors such as DuPont connectors, USB connectors, and pin header connectors are used to connect Arduino boards to shields or USB cables and sensors to the board. Examples of Arduino connectors are:</span></p><p data-dcnode-id="7511" id="d1e3842"></p><dl class="list" data-dcnode-id="7512"><dt class="list-label" data-dcnode-id="7546"><span data-dcnode-id="7547" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="7543"><p data-dcnode-id="7544" id="d1e3848"><span data-dcnode-id="7545" instrument_node="">USB A Male to B Male</span></p></dd><dt class="list-label" data-dcnode-id="7541"><span data-dcnode-id="7542" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="7538"><p data-dcnode-id="7539" id="d1e3853"><span data-dcnode-id="7540" instrument_node="">USB Cable Extension</span></p></dd><dt class="list-label" data-dcnode-id="7536"><span data-dcnode-id="7537" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="7533"><p data-dcnode-id="7534" id="d1e3858"><span data-dcnode-id="7535" instrument_node="">Phidgets 12-foot Sensor Cable</span></p></dd><dt class="list-label" data-dcnode-id="7531"><span data-dcnode-id="7532" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="7528"><p data-dcnode-id="7529" id="d1e3863"><span data-dcnode-id="7530" instrument_node="">RobotGeek</span></p></dd><dt class="list-label" data-dcnode-id="7526"><span data-dcnode-id="7527" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="7523"><p data-dcnode-id="7524" id="d1e3868"><span data-dcnode-id="7525" instrument_node="">Sensor Cable</span></p></dd><dt class="list-label" data-dcnode-id="7521"><span data-dcnode-id="7522" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="7518"><p data-dcnode-id="7519" id="d1e3873"><span data-dcnode-id="7520" instrument_node="">Couplers</span></p></dd><dt class="list-label" data-dcnode-id="7516"><span data-dcnode-id="7517" instrument_node="">7.</span></dt><dd class="list-description" data-dcnode-id="7513"><p data-dcnode-id="7514" id="d1e3878"><span data-dcnode-id="7515" instrument_node="">2 Pin Dual-Female Jumper Wire</span></p></dd></dl><p></p></section><section data-dcnode-id="7459" id="sec3.4.1.4"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7504" id="d1e3883"><span data-dcnode-id="7509" instrument_node="">3.4.1.4</span><span data-dcnode-id="7507" instrument_node="">. </span><span data-dcnode-id="7505" instrument_node="">Shields.</span></h5><p data-dcnode-id="7502" id="d1e3885"><span data-dcnode-id="7503" instrument_node="">It is possible to extend the power, functionalities, and capabilities of Arduino boards beyond the manufacture’s specifications. This can be done by plugging shields, some sort of boards, on top of the Arduino PCB. Most shields are easy to mount and ridiculously affordable. More than one shield can be connected to an Arduino board. When this occurs, that is when several shields are connected and then connected to the Arduino board, a “Big Mac” of Arduino modules is said to have been created. Arduino shields come with programming libraries that make it easier to implement the hardware features on the shield. Several types of shields exist. The most popular ones are:</span></p><p data-dcnode-id="7460" id="d1e3887"></p><dl class="list" data-dcnode-id="7461"><dt class="list-label" data-dcnode-id="7500"><span data-dcnode-id="7501" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="7497"><p data-dcnode-id="7498" id="d1e3893"><span data-dcnode-id="7499" instrument_node="">LCD shields</span></p></dd><dt class="list-label" data-dcnode-id="7495"><span data-dcnode-id="7496" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="7492"><p data-dcnode-id="7493" id="d1e3898"><span data-dcnode-id="7494" instrument_node="">LED matrix shields</span></p></dd><dt class="list-label" data-dcnode-id="7490"><span data-dcnode-id="7491" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="7487"><p data-dcnode-id="7488" id="d1e3903"><span data-dcnode-id="7489" instrument_node="">Wifi shields</span></p></dd><dt class="list-label" data-dcnode-id="7485"><span data-dcnode-id="7486" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="7482"><p data-dcnode-id="7483" id="d1e3908"><span data-dcnode-id="7484" instrument_node="">Bluetooth shields</span></p></dd><dt class="list-label" data-dcnode-id="7480"><span data-dcnode-id="7481" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="7477"><p data-dcnode-id="7478" id="d1e3913"><span data-dcnode-id="7479" instrument_node="">Motor shields</span></p></dd><dt class="list-label" data-dcnode-id="7475"><span data-dcnode-id="7476" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="7472"><p data-dcnode-id="7473" id="d1e3918"><span data-dcnode-id="7474" instrument_node="">Power supply shields</span></p></dd><dt class="list-label" data-dcnode-id="7470"><span data-dcnode-id="7471" instrument_node="">7.</span></dt><dd class="list-description" data-dcnode-id="7467"><p data-dcnode-id="7468" id="d1e3923"><span data-dcnode-id="7469" instrument_node="">Geiger counter shields</span></p></dd><dt class="list-label" data-dcnode-id="7465"><span data-dcnode-id="7466" instrument_node="">8.</span></dt><dd class="list-description" data-dcnode-id="7462"><p data-dcnode-id="7463" id="d1e3928"><span data-dcnode-id="7464" instrument_node="">I/O grove base shields</span></p></dd></dl><p></p></section><section data-dcnode-id="7450" id="sec3.4.1.5"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7453" id="d1e3933"><span data-dcnode-id="7458" instrument_node="">3.4.1.5</span><span data-dcnode-id="7456" instrument_node="">. </span><span data-dcnode-id="7454" instrument_node="">Power supply.</span></h5><p data-dcnode-id="7451" id="d1e3935"><span data-dcnode-id="7452" instrument_node="">The power supply is necessary to test the prototype and to get it up and running. There should be a reliable power source to which the board should be connected to while work is ongoing.</span></p></section><section data-dcnode-id="7399" id="sec3.4.1.6"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7444" id="d1e3940"><span data-dcnode-id="7449" instrument_node="">3.4.1.6</span><span data-dcnode-id="7447" instrument_node="">. </span><span data-dcnode-id="7445" instrument_node="">Other accessories.</span></h5><p data-dcnode-id="7442" id="d1e3942"><span data-dcnode-id="7443" instrument_node="">The following are also hardware accessories used while prototyping with Arduino:</span></p><p data-dcnode-id="7400" id="d1e3944"></p><dl class="list" data-dcnode-id="7401"><dt class="list-label" data-dcnode-id="7440"><span data-dcnode-id="7441" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="7437"><p data-dcnode-id="7438" id="d1e3950"><span data-dcnode-id="7439" instrument_node="">Bluetooth and Wi-Fi technologies for connection</span></p></dd><dt class="list-label" data-dcnode-id="7435"><span data-dcnode-id="7436" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="7432"><p data-dcnode-id="7433" id="d1e3955"><span data-dcnode-id="7434" instrument_node="">RF</span></p></dd><dt class="list-label" data-dcnode-id="7430"><span data-dcnode-id="7431" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="7427"><p data-dcnode-id="7428" id="d1e3960"><span data-dcnode-id="7429" instrument_node="">Motor-drivers</span></p></dd><dt class="list-label" data-dcnode-id="7425"><span data-dcnode-id="7426" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="7422"><p data-dcnode-id="7423" id="d1e3965"><span data-dcnode-id="7424" instrument_node="">Adapters</span></p></dd><dt class="list-label" data-dcnode-id="7420"><span data-dcnode-id="7421" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="7417"><p data-dcnode-id="7418" id="d1e3970"><span data-dcnode-id="7419" instrument_node="">DIY kits</span></p></dd><dt class="list-label" data-dcnode-id="7415"><span data-dcnode-id="7416" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="7412"><p data-dcnode-id="7413" id="d1e3975"><span data-dcnode-id="7414" instrument_node="">Motherboards</span></p></dd><dt class="list-label" data-dcnode-id="7410"><span data-dcnode-id="7411" instrument_node="">7.</span></dt><dd class="list-description" data-dcnode-id="7407"><p data-dcnode-id="7408" id="d1e3980"><span data-dcnode-id="7409" instrument_node="">Arduino shield stacking headers</span></p></dd><dt class="list-label" data-dcnode-id="7405"><span data-dcnode-id="7406" instrument_node="">8.</span></dt><dd class="list-description" data-dcnode-id="7402"><p data-dcnode-id="7403" id="d1e3985"><span data-dcnode-id="7404" instrument_node="">LCD Touch display</span></p></dd></dl><p></p></section></section><section data-dcnode-id="7242" id="sec3.4.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7392" id="d1e3990"><span data-dcnode-id="7397" instrument_node="">3.4.2</span><span data-dcnode-id="7395" instrument_node="">. </span><span data-dcnode-id="7393" instrument_node="">Software components of arduino</span></h4><p data-dcnode-id="7390" id="d1e3992"><span data-dcnode-id="7391" instrument_node="">Different types of software are needed to make Arduino work. Before a particular project will be successfully prototyped in Arduino several software packages must have interacted and been adopted to believe the best possible product. The following are some of the most prominent software components of Arduino:</span></p><section data-dcnode-id="7339" id="sec3.4.2.1"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7384" id="d1e3997"><span data-dcnode-id="7389" instrument_node="">3.4.2.1</span><span data-dcnode-id="7387" instrument_node="">. </span><span data-dcnode-id="7385" instrument_node="">Arduino IDE.</span></h5><p data-dcnode-id="7382" id="d1e3999"><span data-dcnode-id="7383" instrument_node="">The Arduino IDE is the interactive development environment for writing Arduino codes which are then sent to the board. The IDE runs on Windows, Linux, and Mac OS it is written in Java and Processing and similar open-source software. The Arduino IDE is compatible with all the existing variants of Arduino boards. The functions and syntax are similar to C and C++ functions and syntaxes. To use the Arduino IDE, a developer first downloads it to a computer. The Arduino board is then connected to the computer through USB ports. The developer then writes the Arduino codes on the Ide right on the computer system. Once written, the codes are uploaded to the microcontroller which then executes the code, interacts with inputs, and also outputs like light, motors, and sensors. Prominent Arduino IDE or compatible alternatives include:</span></p><p data-dcnode-id="7340" id="d1e4001"></p><dl class="list" data-dcnode-id="7341"><dt class="list-label" data-dcnode-id="7380"><span data-dcnode-id="7381" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="7377"><p data-dcnode-id="7378" id="d1e4007"><span data-dcnode-id="7379" instrument_node="">PlatformIO</span></p></dd><dt class="list-label" data-dcnode-id="7375"><span data-dcnode-id="7376" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="7372"><p data-dcnode-id="7373" id="d1e4012"><span data-dcnode-id="7374" instrument_node="">Eclipse Arduino IDE</span></p></dd><dt class="list-label" data-dcnode-id="7370"><span data-dcnode-id="7371" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="7367"><p data-dcnode-id="7368" id="d1e4017"><span data-dcnode-id="7369" instrument_node="">Programino IDE for Arduino</span></p></dd><dt class="list-label" data-dcnode-id="7365"><span data-dcnode-id="7366" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="7362"><p data-dcnode-id="7363" id="d1e4022"><span data-dcnode-id="7364" instrument_node="">EmbedXcode</span></p></dd><dt class="list-label" data-dcnode-id="7360"><span data-dcnode-id="7361" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="7357"><p data-dcnode-id="7358" id="d1e4027"><span data-dcnode-id="7359" instrument_node="">Kletchlab</span></p></dd><dt class="list-label" data-dcnode-id="7355"><span data-dcnode-id="7356" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="7352"><p data-dcnode-id="7353" id="d1e4032"><span data-dcnode-id="7354" instrument_node="">Codebender</span></p></dd><dt class="list-label" data-dcnode-id="7350"><span data-dcnode-id="7351" instrument_node="">7.</span></dt><dd class="list-description" data-dcnode-id="7347"><p data-dcnode-id="7348" id="d1e4037"><span data-dcnode-id="7349" instrument_node="">Visual Studio</span></p></dd><dt class="list-label" data-dcnode-id="7345"><span data-dcnode-id="7346" instrument_node="">8.</span></dt><dd class="list-description" data-dcnode-id="7342"><p data-dcnode-id="7343" id="d1e4042"><span data-dcnode-id="7344" instrument_node="">Zeus IDE</span></p></dd></dl><p></p></section><section data-dcnode-id="7330" id="sec3.4.2.2"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7333" id="d1e4047"><span data-dcnode-id="7338" instrument_node="">3.4.2.2</span><span data-dcnode-id="7336" instrument_node="">. </span><span data-dcnode-id="7334" instrument_node="">C/C++ compiler (avr-g++) and fritzing compiler.</span></h5><p data-dcnode-id="7331" id="d1e4049"><span data-dcnode-id="7332" instrument_node="">Arduino uses a type of the C/C++ compilers called avr-g++ in compiling codes written on the Arduino IDE. What the avr-g++ does is to convert the codes written in high-level languages, C/C++, Java, Processing) to a language that is native to the machine being used. A fritzing compiler is also used sometimes.</span></p></section><section data-dcnode-id="7315" id="sec3.4.2.3"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7324" id="d1e4054"><span data-dcnode-id="7329" instrument_node="">3.4.2.3</span><span data-dcnode-id="7327" instrument_node="">. </span><span data-dcnode-id="7325" instrument_node="">Excel, LABVIEW and MATLAB.</span></h5><p data-dcnode-id="7316" id="d1e4056"><span data-dcnode-id="7323" instrument_node="">Microsoft Excel is used for Arduino data analysis, output processing and storage&nbsp;</span><a class="workspace-trigger" data-dcnode-id="7321" href="#b175" name="bb175"><span data-dcnode-id="7322" instrument_node="">[175]</span></a><span data-dcnode-id="7320" instrument_node=""> allows Arduino users to import, view, and analyze live data from external devices like their Arduino microcontroller. With this tool, it is quite easy to making meaning of data gathered from sensors easy to get to, affordable, and user-friendly for a wide range of applications. Data Streamer reads values printed to a computer’s serial port exactly how data is printed to the Arduino IDE Serial Monitor. Besides Excel’s Data Streamer, similar add-ins also exist in LABVIEW </span><a class="workspace-trigger" data-dcnode-id="7318" href="#b33" name="bb33"><span data-dcnode-id="7319" instrument_node="">[33]</span></a><span data-dcnode-id="7317" instrument_node=""> and MATLAB. All of these import data directly from Arduino and conduct real-time plotting and analysis on the data so extracted. Excel also a second add-in for Arduino data acquisition called PLX-DAQ. Analyzed data can be saved to CSV and made available for future use.</span></p></section><section data-dcnode-id="7306" id="sec3.4.2.4"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7309" id="d1e4069"><span data-dcnode-id="7314" instrument_node="">3.4.2.4</span><span data-dcnode-id="7312" instrument_node="">. </span><span data-dcnode-id="7310" instrument_node="">EEPROM.</span></h5><p data-dcnode-id="7307" id="d1e4071"><span data-dcnode-id="7308" instrument_node="">The electronic erasable programmable read-only memory can be used to store byte variables. The variables so stored can later be accessed for future use. EEPROM is permanent storage that is similar to how a computer system’s hard drive works.</span></p></section><section data-dcnode-id="7252" id="sec3.4.2.5"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7300" id="d1e4076"><span data-dcnode-id="7305" instrument_node="">3.4.2.5</span><span data-dcnode-id="7303" instrument_node="">. </span><span data-dcnode-id="7301" instrument_node="">Virtual breadboard.</span></h5><p data-dcnode-id="7292" id="d1e4078"><span data-dcnode-id="7299" instrument_node="">A virtual breadboard is a circuit prototyping software in which hardware and software simulation gears are readily available. The goal of the virtual breadboard is to help amateur and professional circuit creators study, program, and test their ideas without spending anything in cash or time. Neither does the designer have to worry about the board getting damaged in the period of trial and error have usually seen while still trying to perfect skills or while learning. It is also good for distance learning&nbsp;</span><a class="workspace-trigger" data-dcnode-id="7297" href="#b176" name="bb176"><span data-dcnode-id="7298" instrument_node="">[176]</span></a><span data-dcnode-id="7296" instrument_node=""> and a very effective virtual laboratory for the disabled&nbsp;</span><a class="workspace-trigger" data-dcnode-id="7294" href="#b177" name="bb177"><span data-dcnode-id="7295" instrument_node="">[177]</span></a><span data-dcnode-id="7293" instrument_node="">. The market is saturated with a plethora of simulator or virtual breadboard. Examples include:</span></p><p data-dcnode-id="7255" id="d1e4088"></p><dl class="list" data-dcnode-id="7256"><dt class="list-label" data-dcnode-id="7290"><span data-dcnode-id="7291" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="7287"><p data-dcnode-id="7288" id="d1e4094"><span data-dcnode-id="7289" instrument_node="">Autodesk circuits</span></p></dd><dt class="list-label" data-dcnode-id="7285"><span data-dcnode-id="7286" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="7282"><p data-dcnode-id="7283" id="d1e4099"><span data-dcnode-id="7284" instrument_node="">Autodesk Eagle</span></p></dd><dt class="list-label" data-dcnode-id="7280"><span data-dcnode-id="7281" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="7277"><p data-dcnode-id="7278" id="d1e4104"><span data-dcnode-id="7279" instrument_node="">Electronify</span></p></dd><dt class="list-label" data-dcnode-id="7275"><span data-dcnode-id="7276" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="7272"><p data-dcnode-id="7273" id="d1e4109"><span data-dcnode-id="7274" instrument_node="">Fritzing</span></p></dd><dt class="list-label" data-dcnode-id="7270"><span data-dcnode-id="7271" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="7267"><p data-dcnode-id="7268" id="d1e4114"><span data-dcnode-id="7269" instrument_node="">Proteus</span></p></dd><dt class="list-label" data-dcnode-id="7265"><span data-dcnode-id="7266" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="7262"><p data-dcnode-id="7263" id="d1e4119"><span data-dcnode-id="7264" instrument_node="">VBB4Arduino or Virtual Broadband for Arduino</span></p></dd><dt class="list-label" data-dcnode-id="7260"><span data-dcnode-id="7261" instrument_node="">7.</span></dt><dd class="list-description" data-dcnode-id="7257"><p data-dcnode-id="7258" id="d1e4124"><span data-dcnode-id="7259" instrument_node="">Virtronics simulator for Arduino</span></p></dd></dl><p></p><p data-dcnode-id="7253"><span data-dcnode-id="7254" instrument_node="">Some of these virtual breadboards or simulators come with tutorials that can teach amateur Arduino enthusiasts a lot about Arduino.</span></p></section><section data-dcnode-id="7243" id="sec3.4.2.6"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7246" id="d1e4131"><span data-dcnode-id="7251" instrument_node="">3.4.2.6</span><span data-dcnode-id="7249" instrument_node="">. </span><span data-dcnode-id="7247" instrument_node="">Android apk.</span></h5><p data-dcnode-id="7244" id="d1e4133"><span data-dcnode-id="7245" instrument_node="">The android platform app is a prominent platform for developing smartphone applications using Arduino. There are numerous platforms for developing smartphone applications such as those running on Windows Mobile, Symbian, iOS, and Android. Platforms like Android studio are widely used.</span></p></section></section></section></section><section data-dcnode-id="7193" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7234" id="d1e4138"><span data-dcnode-id="7239" instrument_node="">4</span><span data-dcnode-id="7237" instrument_node="">. </span><span data-dcnode-id="7235" instrument_node="">Discussions</span></h2><p data-dcnode-id="7217" id="d1e4140"><span data-dcnode-id="7233" instrument_node="">Software IDEs in existence before Arduino and similar computing platforms came to the scene usually had little or no compatibility with the existing hardware. Arduino came as an answer to the yearning of many developers, hobbyists, and professionals alike. This review has holistically studied the existing literature on Prototyping with Arduino, it is applications, advantages of using it over other alternatives, challenges, and limitations to its actualization of intended goals. The reviewed literature agrees on one thing: the application domains of Arduino are limitless. It is possible to build a personalized alarm system using an Arduino board. The alarm system is designed to get actuated every time a person or object appears in front of the sensor. The alarm can then be deactivated by the users by keying in a predefined keyword of their choice. All that is required in developing such an alarm system are an ultrasonic sensor, an LCD, a 4</span><span class="math" data-dcnode-id="7219"><span class="MathJax_Preview" data-dcnode-id="7232" style=""></span><span class="MathJax_SVG" data-dcnode-id="7222" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mo is=&quot;true&quot;>&amp;#xD7;</mo></math>" id="MathJax-Element-14-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="7227" focusable="false" height="1.482ex" role="img" style="vertical-align: 0.019ex; margin-bottom: -0.146ex;" viewBox="0 -583.1 778.5 637.9" width="1.808ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="7228" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="7229" is="true"><use data-dcnode-id="7230" href="#MJMAIN-D7"><path d="M630 29Q630 9 609 9Q604 9 587 25T493 118L389 222L284 117Q178 13 175 11Q171 9 168 9Q160 9 154 15T147 29Q147 36 161 51T255 146L359 250L255 354Q174 435 161 449T147 471Q147 480 153 485T168 490Q173 490 175 489Q178 487 284 383L389 278L493 382Q570 459 587 475T609 491Q630 491 630 471Q630 464 620 453T522 355L418 250L522 145Q606 61 618 48T630 29Z" data-dcnode-id="7231" id="MJMAIN-D7" stroke-width="1"></path></use></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="7223" role="presentation"><math data-dcnode-id="7224" xmlns="http://www.w3.org/1998/Math/MathML"><mo data-dcnode-id="7225" is="true"><span data-dcnode-id="7226" instrument_node="">×</span></mo></math></span></span></span><span data-dcnode-id="7218" instrument_node="">4 keypad, and a buzzer. The sensor is to detect oncoming objects and activate the alarm immediately. The user then enters a keyword for disengaging the system.</span></p><p data-dcnode-id="7212" id="d1e4147"><span data-dcnode-id="7216" instrument_node="">More and more are being found each day and the different variants of Arduino boards become more powerful and sophisticated with more technological advancements. The reviewed literature also accepts that Arduino is not perfect. That explains why they call for more studies and more improvement. They also found it pertinent that it is introduced to kids earlier in their education studies so that they become professionals before they leave high school&nbsp;</span><a class="workspace-trigger" data-dcnode-id="7214" href="#b99" name="bb99"><span data-dcnode-id="7215" instrument_node="">[99]</span></a><span data-dcnode-id="7213" instrument_node="">. Arduino holds much promise for the future and deserves credit for the simplification of the prototyping of highly needed devices which have found wide use in systems designs, general application, hardware communication Healthcare, Education, energy, defense, agriculture, and the mining industry.</span></p><p data-dcnode-id="7210" id="d1e4153"><span data-dcnode-id="7211" instrument_node="">At present, Arduino has been able to serve its purpose. It has provided a low-cost, energy-efficient platform for academics, hobbyists, and professionals. That platform is responsible for the many products that Arduino has been used to prototype. The astonishing number of literature, published in journals or presented at conferences, confirm that Arduino has gained wide acceptability. On rare occasions do you come across studies that are critical of Arduino? None utterly dismisses it and few find any faults in it.</span></p><p data-dcnode-id="7208" id="d1e4155"><span data-dcnode-id="7209" instrument_node="">Yet, it is glaring that Arduino still has a long way to go. Its capabilities cannot as of yet cover very big projects. This is certainly disturbing in a world where devices are becoming more sophisticated and more powerful. The fact that it is easy to use does not help since people are made to feel comfortable in their mediocrity. Arduino may need to up its game to remain relevant and become the platform for not only the small projects but also the very complex ones. There is also the question of how accessible Arduino is to those who need it. How accessible, or even affordable, is it in developing countries? There are still issues with Arduino’s limited processing power, small storage space, and hardware limitations.</span></p><p data-dcnode-id="7200" id="d1e4157"><span data-dcnode-id="7207" instrument_node="">In the future, Arduino will not only need to confront and defeat these limitations but will need to massively innovate to confront some of the challenges that currently besets it&nbsp;</span><a class="workspace-trigger" data-dcnode-id="7205" href="#b155" name="bb155"><span data-dcnode-id="7206" instrument_node="">[155]</span></a><span data-dcnode-id="7204" instrument_node="">. It is important to improve Arduino integration in teaching, for instance, to ensure more and more students remain interested in using Arduino. While it is true that Arduino is fast in its prototyping process&nbsp;</span><a class="workspace-trigger" data-dcnode-id="7202" href="#b13" name="bb13"><span data-dcnode-id="7203" instrument_node="">[13]</span></a><span data-dcnode-id="7201" instrument_node="">, improving would go a long to save students’ time to be used in other activities such as code maintenance, debugging, and documentation.</span></p><p data-dcnode-id="7198" id="d1e4167"><span data-dcnode-id="7199" instrument_node="">Several microcontrollers are in existence in the wider embedded system market but Arduino particularly adopts several. Most of the variants of Arduino boards available, and there are quite many, have separate microcontrollers. This makes it difficult for people to know which is better to use between the many in the market. Streamlining it all to just one or two will make it easier for people to know which to choose by reducing deficiencies and inefficiencies. Such a move would ultimately increase Arduino’s popularity and acceptability.</span></p><p data-dcnode-id="7196" id="d1e4169"><span data-dcnode-id="7197" instrument_node="">Reviewing Arduino revealed how vast its application domains are. Only a few could be reviewed since they are so many. The literature on them was equally numerous. Thus, it was a cumbersome, tasking job reviewing the studies. A comprehensive review is almost impossible. The literature was inexhaustible and each of the literature had points that were relevant to our topic. In the end, we settled only on the most relevant after sifting through all the literature we came across.</span></p><p data-dcnode-id="7194" id="d1e4171"><span data-dcnode-id="7195" instrument_node="">More studies on Arduino, its applications, advantages, limitations, and challenges are going to be released in the nearest future. In the future, there will be improvements on the Arduino board and software. More applications will be prototyped with Arduino and even more, literature will be produced on it. In the future still, likely, there will be challenges associated with using Arduino for prototyping engineering projects, there may still be limitations to what it can achieve and if many innovations can be made in improving it, there will always be advantages of Arduino for prototyping solutions.</span></p></section></div><section data-dcnode-id="7187" id="coi1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7190" id="d1e4174"><span data-dcnode-id="7191" instrument_node="">Declaration of Competing Interest</span></h2><p data-dcnode-id="7188" id="d1e4176"><span data-dcnode-id="7189" instrument_node="">The authors declare that they have no known competing financial interests or personal relationships that could have appeared to influence the work reported in this paper.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="7182"><button class="button button-anchor" data-dcnode-id="7183" type="button"><span class="button-text" data-dcnode-id="7184"><span data-dcnode-id="7185" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcn node-id="381" instrument_node="">Arduino based monitoring system for materials used in façade rehabilitation − Experimental study with lime mortars</span></h3></a><div class="article-source ellipsis" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">2022, Case Studies in Construction Materials</span></div></div><div class="buttons" data-dcnode-id="370"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="371" type="button"><span class="button-link-text" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="372" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="373"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="365"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="366" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="367"><p data-dcnode-id="368" id="sp0095"><span data-dcnode-id="369" instrument_node="">Today's society is increasingly aware of the conservation of architectural heritage and, at the same time, is committed to the use of new technologies in construction and the use of more sustainable construction materials. This work has a double objective, on the one hand, to develop new measurement equipment based on Arduino platform for the monitoring of moisture and temperature parameters, and on the other, to determine the evolution of these properties and the physical-mechanical characteristics of lime-based mortars used in rehabilitation works. An experimental campaign has been carried out where two types of hydraulic lime mortars have been used that differ according to the aggregate either, natural or mixed recycled ceramic. The results show how it is possible to monitor in real-time the temperature and moisture parameters in the mortars from the beginning of the setting process, which is of great relevance for the control of the execution process in restoration works. Besides, it has been possible to observe how lime mortars with recycled aggregate present good technical performance for use in rehabilitation works, although without reaching the physical and mechanical properties of traditional mortars.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="346"><div class="sub-heading" data-dcnode-id="358"><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2468067221000857" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="362" id="citing-articles-article1-title"><span data-dcnode-id="363" instrument_node="">Overcoming supply disruptions during pandemics by utilizing found hardware for open source gentle ventilation</span></h3></a><div class="article-source ellipsis" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">2022, HardwareX</span></div></div><div class="buttons" data-dcnode-id="352"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="353" type="button"><span class="button-link-text" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="354" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="355"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="347"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="348" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="349"><p data-dcnode-id="350" id="sp0010"><span data-dcnode-id="351" instrument_node="">This article details the design of an open source emergency gentle ventilator (gentle-vent) framework that can be used in periods of scarcity. Although it is not a medical device, the system utilizes a wide range of commonly-available components that are combined using basic electronics skills to achieve the desired performance. The main function of the gentle-vent is to generate a calibrated pressure wave at the pump to provide support to the patient’s breathing. Each gentle-vent permutation was tested using a DIY manometer as it would be utilized in the field in low-resource settings and validated with an open source VentMon. The most rudimentary implementation costs less than $40.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="328"><div class="sub-heading" data-dcnode-id="340"><a data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0167739X21004738" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="344" id="citing-articles-article2-title"><span data-dcnode-id="345" instrument_node="">Measurement project interoperability for real-time data gathering systems</span></h3></a><div class="article-source ellipsis" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">2022, Future Generation Computer Systems</span></div></div><div class="buttons" data-dcnode-id="334"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="335" type="button"><span class="button-link-text" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="336" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="337"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="329"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="330" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="331"><p data-dcnode-id="332" id="d1e1571"><span data-dcnode-id="333" instrument_node="">The Internet-of-Things devices have allowed the increment of the Spatiotemporal resolution in the Real-time Data Gathering Systems. However, this has increased the complexity due to the heterogeneity of sensors. Thus, it is important to know how data can be understood aware of its context at the edge. Also, a transversal perspective is expected for aligning and reusing as many sensors as possible (based on an experimental design). Because of the hardware limitations, the experimental design should be communicated as simple, integrated, and consistent as possible under single content fostering the projects’ complementarity. This work describes a strategy for defining and communicating a set of measurement projects, following a conceptual hierarchy derived from a measurement ontology. Every project definition is obtained from the user requirements following a well-established strategy. BriefPD is introduced as a data interchange format that is self-contained, partially verifiable (through a Merkle tree insight), consistent, and does not require the use of tags to determine the content meaning. BriefPD generates a project definition in 6.27 ms (1.9 times quicker than JSON-equivalent), consuming 20.39% of JSON’s size. A Github library is provided with the reference implementation jointly with a ‘Code Ocean’ capsule for reproducing the simulation results.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="307"><div class="sub-heading" data-dcnode-id="322"><a data-dcnode-id="325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0924424722000383" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="326" id="citing-articles-article3-title"><span data-dcnode-id="327" instrument_node="">The silver-coated sponge spacer and multiwalled carbon nanotube-dragon skin electrodes for cushion-type nanocomposite pressure sensor array</span></h3></a><div class="article-source ellipsis" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">2022, Sensors and Actuators A: Physical</span></div></div><div class="buttons" data-dcnode-id="316"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="317" type="button"><span class="button-link-text" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="318" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="319"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="308"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="309" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="310"><p data-dcnode-id="311" id="sp0035"><span data-dcnode-id="315" instrument_node="">Prolonged sitting in an unhealthy posture can cause various health ailments. Especially, wheelchair users and office workers suffer from pressure ulcer and chronic back pain. Here we report a cushion-type 20&nbsp;×&nbsp;20 pressure sensor array made by the low-cost simple scalable method. The soft electrode is made of multiwalled carbon nanotubes and dragon skin matrix. The resistance of the electrode is dramatically decreased by the insertion of a copper wire. The silver-coated polyurethane sponge provides the piezoresistive sensing mechanism and significantly improves the sensor response. The continuous sensing range (0–70&nbsp;kPa) is sufficient for sitting posture analysis, and the sensitivity is as high as 0.10&nbsp;kPa</span><sup data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">-1</span></sup><span data-dcnode-id="312" instrument_node=""> in the range of 0–10&nbsp;kPa. The signal is processed using a single board microcontroller, and data are transmitted to a mobile device wirelessly. The sequential voltage supply and signal read minimize the number of voltage supply and analog-to-digital conversion ports in the microcontroller, and a modified conductance matrix algorithm is designed to completely eliminate crosstalk effect of the sensor array. The pressure sensor successfully recognizes various sitting postures, including optimal and left/right/forward leaning, and may find immediate rehabilitation and health care applications.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="274"><div class="sub-heading" data-dcnode-id="301"><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0039914021009620" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="305" id="citing-articles-article4-title"><span data-dcnode-id="306" instrument_node="">A quantitative sensing system based on a 3D-printed ion-selective electrode for rapid and sensitive detection of bacteria in biological fluid</span></h3></a><div class="article-source ellipsis" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">2022, Talanta</span></div></div><div class="buttons" data-dcnode-id="295"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="296" type="button"><span class="button-link-text" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="297" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="298"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="275"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="276" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="277"><p data-dcnode-id="278" id="abspara0010"><span data-dcnode-id="294" instrument_node="">Bacterial infections, such as urinary tract infections, are crucial health problems. Here, we report a new potentiometric sensor to detect bacteria sensitively, accurately, and quickly. First, a customizable, 3D printed Ag</span><sup data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">+</span></sup><span data-dcnode-id="291" instrument_node=""> selective electrode was fabricated as the probe. Our 3D printed electrode showed sensitive, linear, and selective responses to Ag</span><sup data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">+</span></sup><span data-dcnode-id="288" instrument_node="">. Compared to commercial Ag</span><sup data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">+</span></sup><span data-dcnode-id="285" instrument_node=""> selective electrodes, ours required less sample volume, shorter responding time, and lower costs. Next, a novel potentiometer was developed with Arduino to couple the electrode for data transducing and transferring, which was programmed to transfer results to cell phones wirelessly. Moreover, a filter was designed to quickly remove interfering species in a biofluid sample (e.g., Cl</span><sup data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">−</span></sup><span data-dcnode-id="282" instrument_node="">). By detecting the lost Ag</span><sup data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">+</span></sup><span data-dcnode-id="279" instrument_node=""> taken by bacteria, the bacterial number could be elucidated. With this sensor system, bacteria numbers could be detected as low as 80&nbsp;CFU/mL (LOD) within 15&nbsp;min, which is sufficient for many diagnoses (e.g., urinary tract infection &gt;1000&nbsp;CFU/mL). An amplification method was presented for single-digit bacteria detection. Overall, we are presenting a bacteria detector with three innovative components: the electrode (signal transduction and detection), the potentiometer (transducer and data processing), and the 3D printed filter (sample preparation), which showed robust and improved (than previously reported ones) analytical merits. The low-cost and customizable (the electrode and the open-source coding) nature enhances the transnationality of the system, especially in underdeveloped areas.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="253"><div class="sub-heading" data-dcnode-id="268"><a data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0043135421010745" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="272" id="citing-articles-article5-title"><span data-dcnode-id="273" instrument_node="">Development of a novel solar energy controllable Linear fresnel photoreactor (LFP) for high-efficiency photocatalytic wastewater treatment under actual weather</span></h3></a><div class="article-source ellipsis" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">2022, Water Research</span></div></div><div class="buttons" data-dcnode-id="262"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="263" type="button"><span class="button-link-text" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="264" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="265"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="254"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="255" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="256"><p data-dcnode-id="257" id="spara013"><span data-dcnode-id="261" instrument_node="">Solar-energy-enabled photocatalysis is promising for wastewater treatment. However, due to the changes in the solar position and variable weather conditions, providing optimized light and temperature for photocatalysis under actual weather remains to be a technical difficulty. In this study, a novel Linear fresnel photoreactor (LFP) was firstly developed for wastewater treatment. LFP could achieve effective adjustment of sunlight by flexibly controlling 6 mirrors according to solar position and weather conditions. On sunny condition, LFP could maintain the optimal light irradiance and temperature, while on overcast condition it could provide the highest possible light irradiance and temperature. In the comparative experiments between LFP and Inclined Plate Collector (IPC) (as control reactor) which passively receive sunlight, the Rhodamine B degradation efficiencies in LFP were 2.19 folds, 1.5 folds and 2.28 folds higher than control under the temporarily overcast, totally to slightly overcast and sunny conditions, respectively. In addition, the efficiencies of Amoxicillin degradation and </span><em data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Escherichia coli</span></em><span data-dcnode-id="258" instrument_node=""> disinfection in LFP were also 2 folds and 1.37 folds higher than control in sunny conditions, respectively. Furthermore, whole-year estimation indicated that LFP is effective to optimize light irradiance and temperature in typical densely populated areas of the world to achieve high-efficiency wastewater treatment. These results proved that LFP, as an effective solar energy controllable reactor, has great potential in promoting the development of green wastewater treatment infrastructure to improve global public health and achieve eco-friendly society.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85107357804%26md5%3Db9553e3cfeda58b09186d3fe86a0a3b7" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="250" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="251"></path></svg><span class="button-alternative-text" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?inde
