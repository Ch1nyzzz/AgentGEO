549" href="#b129" name="bb129"><span data-dcnode-id="9550" instrument_node="">[129]</span></a></td><td class="align-left" data-dcnode-id="9546"><span data-dcnode-id="9547" instrument_node="">Oliveira et al, 2014, Tactile interface for navigation in underground mines</span></td><td class="align-left" data-dcnode-id="9544"><span data-dcnode-id="9545" instrument_node="">Arduino Mega</span></td><td class="align-left" data-dcnode-id="9542"><span data-dcnode-id="9543" instrument_node="">Navigation and Heart rate observation</span></td><td class="align-left" data-dcnode-id="9540"><span data-dcnode-id="9541" instrument_node="">Built a system that could help in navigation in places that are not well-lit while checking the wearers’ heart rate</span></td><td class="align-left" data-dcnode-id="9538"><span data-dcnode-id="9539" instrument_node="">The system built was effective in navigating the environment it was deployed to.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9523"><td class="align-left" data-dcnode-id="9534"><a class="workspace-trigger" data-dcnode-id="9535" href="#b88" name="bb88"><span data-dcnode-id="9536" instrument_node="">[88]</span></a></td><td class="align-left" data-dcnode-id="9532"><span data-dcnode-id="9533" instrument_node="">Alam et al, 2015, Design of an intelligent helmet for mine workers</span></td><td class="align-left" data-dcnode-id="9530"><span data-dcnode-id="9531" instrument_node="">Arduino Mega</span></td><td class="align-left" data-dcnode-id="9528"><span data-dcnode-id="9529" instrument_node="">Observation of air quality, Heart rate observation</span></td><td class="align-left" data-dcnode-id="9526"><span data-dcnode-id="9527" instrument_node="">Designed and prototyped a</span></td><td class="align-left" data-dcnode-id="9524"><span data-dcnode-id="9525" instrument_node="">This system was effectively simulated. Remains to be seen if it could be built for real-life use.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9507"><td class="align-left" data-dcnode-id="9520"><a class="workspace-trigger" data-dcnode-id="9521" href="#b130" name="bb130"><span data-dcnode-id="9522" instrument_node="">[130]</span></a></td><td class="align-left" data-dcnode-id="9518"><span data-dcnode-id="9519" instrument_node="">Dewarkar et al, 2019, Smart Device for Security of Coal Mine Workers</span></td><td class="align-left" data-dcnode-id="9516"><span data-dcnode-id="9517" instrument_node="">Arduino Nano</span></td><td class="align-left" data-dcnode-id="9512"><span data-dcnode-id="9515" instrument_node="">Observation of air quality Position observation </span><br data-dcnode-id="9514"><span data-dcnode-id="9513" instrument_node="">Pulse rate observation</span></td><td class="align-left" data-dcnode-id="9510"><span data-dcnode-id="9511" instrument_node="">Prototyped on Arduino Nano and implemented a security system that took notice of an environment’s air, the wearer’s position, and pulse rate to offer suggestions.</span></td><td class="align-left" data-dcnode-id="9508"><span data-dcnode-id="9509" instrument_node="">The system observes certain key factors that are necessary for the safety of the wearers and provides useful information offering advice when the environment suddenly changes and requires proactive action.</span></td></tr><tr class="valign-top" data-dcnode-id="9492"><td class="align-left" data-dcnode-id="9503"><a class="workspace-trigger" data-dcnode-id="9505" href="#b123" name="bb123"><span data-dcnode-id="9506" instrument_node="">[123]</span></a><span data-dcnode-id="9504" instrument_node="">.</span></td><td class="align-left" data-dcnode-id="9501"><span data-dcnode-id="9502" instrument_node="">Sanjay, 2019, Smart Helmet Using ZigBee</span></td><td class="align-left" data-dcnode-id="9499"><span data-dcnode-id="9500" instrument_node="">Arduino Nano</span></td><td class="align-left" data-dcnode-id="9497"><span data-dcnode-id="9498" instrument_node="">Observation of Air quality, detection of destructive event, observation of pulse rate</span></td><td class="align-left" data-dcnode-id="9495"><span data-dcnode-id="9496" instrument_node="">Implemented a smart helmet that was based on Arduino-compliant technologies and intended to observe parameters which when properly studied could serve as a preventive measure against adverse health effects.</span></td><td class="align-left" data-dcnode-id="9493"><span data-dcnode-id="9494" instrument_node="">The system was successfully built and deployed for the observation of air quality, detection of destructive events, observation of pulse rate, and in such other functions as would ensure the safety of the wearer.</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="9486"></p><p data-dcnode-id="9487" id="d1e639"><span data-dcnode-id="9488" instrument_node="">Note: It has to be noted that health is important in any domain. That explains why the systems for the health of miners could suffice for consideration under systems for health.</span></p><p></p></div></div></section><section data-dcnode-id="9202" id="sec3.2.8"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9477" id="d1e2940"><span data-dcnode-id="9482" instrument_node="">3.2.8</span><span data-dcnode-id="9480" instrument_node="">. </span><span data-dcnode-id="9478" instrument_node="">Mining industry</span></h4><p data-dcnode-id="9457" id="d1e2942"><span data-dcnode-id="9476" instrument_node="">The Arduino computing platform has found wide use in the mining industry.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9474" href="#b16" name="bb16"><span data-dcnode-id="9475" instrument_node="">[16]</span></a><span data-dcnode-id="9473" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9471" href="#b22" name="bb22"><span data-dcnode-id="9472" instrument_node="">[22]</span></a><span data-dcnode-id="9470" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9468" href="#b23" name="bb23"><span data-dcnode-id="9469" instrument_node="">[23]</span></a><span data-dcnode-id="9467" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9465" href="#b49" name="bb49"><span data-dcnode-id="9466" instrument_node="">[49]</span></a><span data-dcnode-id="9464" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9462" href="#b71" name="bb71"><span data-dcnode-id="9463" instrument_node="">[71]</span></a><span data-dcnode-id="9461" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9459" href="#b131" name="bb131"><span data-dcnode-id="9460" instrument_node="">[131]</span></a><span data-dcnode-id="9458" instrument_node="">, stated that Arduino’s capability to acquire information from as many sensors as possible, transmit data with the aid of communication devices, and control devices with the aid of actuators have made it possible for it to be an important tool in building an initial prototype of an autonomous mining device.</span></p><p data-dcnode-id="9447" id="d1e2949"><a class="workspace-trigger" data-dcnode-id="9455" href="#b88" name="bb88"><span data-dcnode-id="9456" instrument_node="">[88]</span></a><span data-dcnode-id="9454" instrument_node=""> designed an intelligent helmet that could be used by mine workers with the aid of Arduino.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9452" href="#b89" name="bb89"><span data-dcnode-id="9453" instrument_node="">[89]</span></a><span data-dcnode-id="9451" instrument_node=""> presented at a conference a case study of a low-cost environmental observation system for non-metallic underground mines by suggesting how open-source hardware and software specifically Arduino are useful to the mining industry. Several other studies focused on the application of Arduino to different operations in the mining industry be in field observation systems, wearable systems, or autonomous systems. </span><a class="workspace-trigger" data-dcnode-id="9449" href="#tbl5" name="btbl5"><span data-dcnode-id="9450" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="9448" instrument_node=""> analyzes a few of these studies that focused on Arduino uses in field observation systems.</span></p><div data-dcnode-id="9203"><p data-dcnode-id="9446" id="d1e2961"></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="9204" id="tbl5"><span class="captions" data-dcnode-id="9438"><span data-dcnode-id="9439" id="d1e644"><p data-dcnode-id="9440" id="d1e645"><span class="label" data-dcnode-id="9444"><span data-dcnode-id="9445" instrument_node="">Table 5</span></span><span data-dcnode-id="9443" instrument_node="">. </span><span data-dcnode-id="9441" instrument_node="">Summary of Arduino uses for field observation devices in the mining industry.</span></p></span></span><div class="groups" data-dcnode-id="9205"><table data-dcnode-id="9206"><thead data-dcnode-id="9420"><tr class="valign-top" data-dcnode-id="9421"><th class="align-left" data-dcnode-id="9436" scope="col"><span data-dcnode-id="9437" instrument_node="">Reference</span></th><th class="align-left" data-dcnode-id="9434" scope="col"><span data-dcnode-id="9435" instrument_node="">Author, year, title</span></th><th class="align-left" data-dcnode-id="9432" scope="col"><span data-dcnode-id="9433" instrument_node="">Type of Arduino Board Used</span></th><th class="align-left" data-dcnode-id="9430" scope="col"><span data-dcnode-id="9431" instrument_node="">Mine type</span></th><th class="align-left" data-dcnode-id="9426" scope="col"><span data-dcnode-id="9429" instrument_node="">Purpose of Field </span><br data-dcnode-id="9428"><span data-dcnode-id="9427" instrument_node="">Observation System</span></th><th class="align-left" data-dcnode-id="9424" scope="col"><span data-dcnode-id="9425" instrument_node="">Methodology</span></th><th class="align-left" data-dcnode-id="9422" scope="col"><span data-dcnode-id="9423" instrument_node="">Remarks</span></th></tr></thead><tbody data-dcnode-id="9207"><tr class="valign-top rowsep-1" data-dcnode-id="9402"><td class="align-left" data-dcnode-id="9417"><a class="workspace-trigger" data-dcnode-id="9418" href="#b132" name="bb132"><span data-dcnode-id="9419" instrument_node="">[132]</span></a></td><td class="align-left" data-dcnode-id="9413"><span data-dcnode-id="9416" instrument_node="">Anitha and </span><br data-dcnode-id="9415"><span data-dcnode-id="9414" instrument_node="">Seshagiri, 2019, Implementation of Wireless Sensor in Coal Mine Safety System using ZigBee.</span></td><td class="align-left" data-dcnode-id="9411"><span data-dcnode-id="9412" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="9409"><span data-dcnode-id="9410" instrument_node="">underground</span></td><td class="align-left" data-dcnode-id="9407"><span data-dcnode-id="9408" instrument_node="">observation of environmental changes</span></td><td class="align-left" data-dcnode-id="9405"><span data-dcnode-id="9406" instrument_node="">Implemented a wireless sensor network system that used Arduino technologies to observe air quality in underground mines.</span></td><td class="align-left" data-dcnode-id="9403"><span data-dcnode-id="9404" instrument_node="">The Zigbee technology works perfectly with Arduino in solving problems and did not fail here.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9386"><td class="align-left" data-dcnode-id="9399"><a class="workspace-trigger" data-dcnode-id="9400" href="#b133" name="bb133"><span data-dcnode-id="9401" instrument_node="">[133]</span></a></td><td class="align-left" data-dcnode-id="9397"><span data-dcnode-id="9398" instrument_node="">Kugan et&nbsp;al. 2019, Coal Mine Observation and Alert System With Data Acquisition</span></td><td class="align-left" data-dcnode-id="9395"><span data-dcnode-id="9396" instrument_node="">Arduino Mega</span></td><td class="align-left" data-dcnode-id="9393"><span data-dcnode-id="9394" instrument_node="">underground</span></td><td class="align-left" data-dcnode-id="9391"><span data-dcnode-id="9392" instrument_node="">observation of environmental changes</span></td><td class="align-left" data-dcnode-id="9389"><span data-dcnode-id="9390" instrument_node="">Implementation of a system with the capacity to acquire data and process the same in alerting the user to dangers.</span></td><td class="align-left" data-dcnode-id="9387"><span data-dcnode-id="9388" instrument_node="">The system built is capable of informing the wearer if the air in an environment is not good enough and should therefore exit the place.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9370"><td class="align-left" data-dcnode-id="9383"><a class="workspace-trigger" data-dcnode-id="9384" href="#b134" name="bb134"><span data-dcnode-id="9385" instrument_node="">[134]</span></a></td><td class="align-left" data-dcnode-id="9381"><span data-dcnode-id="9382" instrument_node="">Bhagat, 2016, Wireless Surveillance and Safety System for Mine Workers Using ZigBee</span></td><td class="align-left" data-dcnode-id="9379"><span data-dcnode-id="9380" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="9377"><span data-dcnode-id="9378" instrument_node="">underground</span></td><td class="align-left" data-dcnode-id="9375"><span data-dcnode-id="9376" instrument_node="">observation of air quality</span></td><td class="align-left" data-dcnode-id="9373"><span data-dcnode-id="9374" instrument_node="">Implemented and prototyped with Arduino a system for the safety of wearers</span></td><td class="align-left" data-dcnode-id="9371"><span data-dcnode-id="9372" instrument_node="">The system monitors the environment and makes deductions from its observations. These observations are then relayed to the user for decision making.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9354"><td class="align-left" data-dcnode-id="9367"><a class="workspace-trigger" data-dcnode-id="9368" href="#b135" name="bb135"><span data-dcnode-id="9369" instrument_node="">[135]</span></a></td><td class="align-left" data-dcnode-id="9365"><span data-dcnode-id="9366" instrument_node="">Ünsal et al, 2016, Power management for Wireless Sensor Networks in underground mining</span></td><td class="align-left" data-dcnode-id="9363"><span data-dcnode-id="9364" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="9361"><span data-dcnode-id="9362" instrument_node="">underground</span></td><td class="align-left" data-dcnode-id="9359"><span data-dcnode-id="9360" instrument_node="">observation of environmental factors</span></td><td class="align-left" data-dcnode-id="9357"><span data-dcnode-id="9358" instrument_node="">Implemented a system that managed power in WSNs used in a mining site.</span></td><td class="align-left" data-dcnode-id="9355"><span data-dcnode-id="9356" instrument_node="">Wireless sensor networks in mining sites require power to function. Without a good system for managing power usage, wastage frequently occurs. This system mitigates against such wastage.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9338"><td class="align-left" data-dcnode-id="9351"><a class="workspace-trigger" data-dcnode-id="9352" href="#b97" name="bb97"><span data-dcnode-id="9353" instrument_node="">[97]</span></a></td><td class="align-left" data-dcnode-id="9349"><span data-dcnode-id="9350" instrument_node="">Shah et&nbsp;al. 2019, IoT enabled worker safety system</span></td><td class="align-left" data-dcnode-id="9347"><span data-dcnode-id="9348" instrument_node="">Arduino Mega</span></td><td class="align-left" data-dcnode-id="9345"><span data-dcnode-id="9346" instrument_node="">polluted area</span></td><td class="align-left" data-dcnode-id="9343"><span data-dcnode-id="9344" instrument_node="">observation of atmospheric variations</span></td><td class="align-left" data-dcnode-id="9341"><span data-dcnode-id="9342" instrument_node="">Implemented and prototyped on Arduino Mega, a system that ensured mineworkers’ safety by observing the air.</span></td><td class="align-left" data-dcnode-id="9339"><span data-dcnode-id="9340" instrument_node="">The system could study if the environment is polluted or not and made available on a liquid crystal display (LCD) attached to it.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9320"><td class="align-left" data-dcnode-id="9335"><a class="workspace-trigger" data-dcnode-id="9336" href="#b136" name="bb136"><span data-dcnode-id="9337" instrument_node="">[136]</span></a></td><td class="align-left" data-dcnode-id="9331"><span data-dcnode-id="9334" instrument_node="">Rajalakshmi and </span><br data-dcnode-id="9333"><span data-dcnode-id="9332" instrument_node="">Vidhya, 2019, Toxic Environment Observation Using Sensors Based on Arduino</span></td><td class="align-left" data-dcnode-id="9329"><span data-dcnode-id="9330" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="9327"><span data-dcnode-id="9328" instrument_node="">polluted area</span></td><td class="align-left" data-dcnode-id="9325"><span data-dcnode-id="9326" instrument_node="">observation of air quality</span></td><td class="align-left" data-dcnode-id="9323"><span data-dcnode-id="9324" instrument_node="">Implemented on Arduino a system that observed environments with sensors, deciphered if they were toxic or not, and communicated results to the user interface attached.</span></td><td class="align-left" data-dcnode-id="9321"><span data-dcnode-id="9322" instrument_node="">The system was built in the knowledge that temperature and odor were important factors in the toxicity of any place. By studying the two and comparing it with existing data, the system could know if an environment is polluted.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9304"><td class="align-left" data-dcnode-id="9317"><a class="workspace-trigger" data-dcnode-id="9318" href="#b137" name="bb137"><span data-dcnode-id="9319" instrument_node="">[137]</span></a></td><td class="align-left" data-dcnode-id="9315"><span data-dcnode-id="9316" instrument_node="">Sudila et al, 2017, A IoT Proactive Disaster Management System for Mines</span></td><td class="align-left" data-dcnode-id="9313"><span data-dcnode-id="9314" instrument_node="">Arduino UNO, Mega</span></td><td class="align-left" data-dcnode-id="9311"><span data-dcnode-id="9312" instrument_node="">underground</span></td><td class="align-left" data-dcnode-id="9309"><span data-dcnode-id="9310" instrument_node="">surveillance of environmental changes</span></td><td class="align-left" data-dcnode-id="9307"><span data-dcnode-id="9308" instrument_node="">Implemented a system that managed disastrous events in mines and limited casualties and damages.</span></td><td class="align-left" data-dcnode-id="9305"><span data-dcnode-id="9306" instrument_node="">Sensors and IoT technologies were deployed in the system which noticed when environments had taken an unusual outlook and alerted concerned professionals.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9288"><td class="align-left" data-dcnode-id="9301"><a class="workspace-trigger" data-dcnode-id="9302" href="#b138" name="bb138"><span data-dcnode-id="9303" instrument_node="">[138]</span></a></td><td class="align-left" data-dcnode-id="9299"><span data-dcnode-id="9300" instrument_node="">Durán et&nbsp;al. 2019, Wireless Smell System for Hazardous Gases Detection</span></td><td class="align-left" data-dcnode-id="9297"><span data-dcnode-id="9298" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="9295"><span data-dcnode-id="9296" instrument_node="">underground</span></td><td class="align-left" data-dcnode-id="9293"><span data-dcnode-id="9294" instrument_node="">observation of changes in atmospheric odor</span></td><td class="align-left" data-dcnode-id="9291"><span data-dcnode-id="9292" instrument_node="">Implemented a system that detected the smell of an environment and provided the same for decision making.</span></td><td class="align-left" data-dcnode-id="9289"><span data-dcnode-id="9290" instrument_node="">Activated by a vacuum pump, this system perceives the smell of the air in an environment and quickly raises an alarm if some hazardous smells had been released to the environment. This promptly saves lives.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9272"><td class="align-left" data-dcnode-id="9285"><a class="workspace-trigger" data-dcnode-id="9286" href="#b75" name="bb75"><span data-dcnode-id="9287" instrument_node="">[75]</span></a></td><td class="align-left" data-dcnode-id="9283"><span data-dcnode-id="9284" instrument_node="">Jo and Khan 2017, An Event Reporting And Early-Warning Safety System Based On The Internet of Things For Underground Coal Mines: A Case Study</span></td><td class="align-left" data-dcnode-id="9281"><span data-dcnode-id="9282" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="9279"><span data-dcnode-id="9280" instrument_node="">underground</span></td><td class="align-left" data-dcnode-id="9277"><span data-dcnode-id="9278" instrument_node="">observation of air quality</span></td><td class="align-left" data-dcnode-id="9275"><span data-dcnode-id="9276" instrument_node="">Developed, prototyped with Arduino, and implemented a system that could report occurring events and raised alarm if any event that portends danger suddenly occurs.</span></td><td class="align-left" data-dcnode-id="9273"><span data-dcnode-id="9274" instrument_node="">The system is helpful in several cases. Examples include when there is a fire outbreak and when a pipe begins to leak.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9256"><td class="align-left" data-dcnode-id="9269"><a class="workspace-trigger" data-dcnode-id="9270" href="#b105" name="bb105"><span data-dcnode-id="9271" instrument_node="">[105]</span></a></td><td class="align-left" data-dcnode-id="9267"><span data-dcnode-id="9268" instrument_node="">(Mondal et al, 2015), Quantitative Recognition of Flammable And Toxic Gases With Artificial Neural Network Using Metal Oxide Gas Sensors In Embedded Platform</span></td><td class="align-left" data-dcnode-id="9265"><span data-dcnode-id="9266" instrument_node="">Arduino Due</span></td><td class="align-left" data-dcnode-id="9263"><span data-dcnode-id="9264" instrument_node="">underground</span></td><td class="align-left" data-dcnode-id="9261"><span data-dcnode-id="9262" instrument_node="">observation of air quality, detection of harmful gases</span></td><td class="align-left" data-dcnode-id="9259"><span data-dcnode-id="9260" instrument_node="">Implementation of fire and toxic gas recognition system using Arduino sensors.</span></td><td class="align-left" data-dcnode-id="9257"><span data-dcnode-id="9258" instrument_node="">An artificial neural network was used in classifying gases and using that to know which is harmful and which is not. That way it is easy for the system to report when it detects a harmful gas.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9240"><td class="align-left" data-dcnode-id="9253"><a class="workspace-trigger" data-dcnode-id="9254" href="#b76" name="bb76"><span data-dcnode-id="9255" instrument_node="">[76]</span></a></td><td class="align-left" data-dcnode-id="9251"><span data-dcnode-id="9252" instrument_node="">Rodriguez-Diaz et al, 2019, Benchmark For Analysis, Modeling, and Control of Ventilation Systems In Small-scale mine</span></td><td class="align-left" data-dcnode-id="9249"><span data-dcnode-id="9250" instrument_node="">Arduino Mega</span></td><td class="align-left" data-dcnode-id="9247"><span data-dcnode-id="9248" instrument_node="">underground</span></td><td class="align-left" data-dcnode-id="9245"><span data-dcnode-id="9246" instrument_node="">observation of air quality</span></td><td class="align-left" data-dcnode-id="9243"><span data-dcnode-id="9244" instrument_node="">Studied, theorized, and then implemented a ventilation system using Arduino and its sensors</span></td><td class="align-left" data-dcnode-id="9241"><span data-dcnode-id="9242" instrument_node="">Provided a comprehensive framework that can work anywhere.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9224"><td class="align-left" data-dcnode-id="9237"><a class="workspace-trigger" data-dcnode-id="9238" href="#b139" name="bb139"><span data-dcnode-id="9239" instrument_node="">[139]</span></a></td><td class="align-left" data-dcnode-id="9235"><span data-dcnode-id="9236" instrument_node="">Adjiski et al, 2019, Methodology for Evaluation of The Evacuation Time In Case of Fire In Underground Mines</span></td><td class="align-left" data-dcnode-id="9233"><span data-dcnode-id="9234" instrument_node="">Arduino Nano</span></td><td class="align-left" data-dcnode-id="9231"><span data-dcnode-id="9232" instrument_node="">underground</span></td><td class="align-left" data-dcnode-id="9229"><span data-dcnode-id="9230" instrument_node="">observation of air quality</span></td><td class="align-left" data-dcnode-id="9227"><span data-dcnode-id="9228" instrument_node="">theorized a model and then implemented a system for quickly evacuating people and properties from fire scenes.</span></td><td class="align-left" data-dcnode-id="9225"><span data-dcnode-id="9226" instrument_node="">Showed how by studying the air in a place, fire outbreak can be detected and victims evacuated before the situation blows out of proportion</span></td></tr><tr class="valign-top" data-dcnode-id="9208"><td class="align-left" data-dcnode-id="9221"><a class="workspace-trigger" data-dcnode-id="9222" href="#b77" name="bb77"><span data-dcnode-id="9223" instrument_node="">[77]</span></a></td><td class="align-left" data-dcnode-id="9219"><span data-dcnode-id="9220" instrument_node="">Adjiski et al, 2019, System for prediction of carboxyhemoglobin levels as an indicator for on-time installation of self-contained self-rescuers in case of fire in underground mines</span></td><td class="align-left" data-dcnode-id="9217"><span data-dcnode-id="9218" instrument_node="">Arduino Nano</span></td><td class="align-left" data-dcnode-id="9215"><span data-dcnode-id="9216" instrument_node="">underground</span></td><td class="align-left" data-dcnode-id="9213"><span data-dcnode-id="9214" instrument_node="">observation of air quality</span></td><td class="align-left" data-dcnode-id="9211"><span data-dcnode-id="9212" instrument_node="">Implemented a system for predicting carboxyhemoglobin levels as a means to ensure safety and quick response to fire outbreaks in mines.</span></td><td class="align-left" data-dcnode-id="9209"><span data-dcnode-id="9210" instrument_node="">Carboxyhemoglobin is toxic to the human body. If carbon is inhaled and the same binds with the hemoglobin it could result in a lot of health problems for the victim. If one quickly knows when his carboxyhemoglobin level begins to rise, he could perhaps know that something has gone wrong in the environment and could thus save himself and others.</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="8988" id="sec3.2.9"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9196" id="d1e2967"><span data-dcnode-id="9201" instrument_node="">3.2.9</span><span data-dcnode-id="9199" instrument_node="">. </span><span data-dcnode-id="9197" instrument_node="">Energy</span></h4><p data-dcnode-id="9191" id="d1e2969"><span data-dcnode-id="9195" instrument_node="">Innovations in energy have from times immemorial ushered in eureka moments in the world’s calendar. From the time our ancestors first ignited light from rocks till when Thomas Edison’s in lamp first beamed yellow lights on New York streets, energy in any and all forms has remained vital for human existence. Today, we almost solely depend on energy. We need electricity to power our gadgets and appliances and the industries that improve those gadgets as well as some of the foods we eat, clothes we hear, and need a big amount of hydrocarbon energy to remain functional. Not surprisingly, the cost of getting a unit of energy has blown over the roof and still rising. Everyday effort have been putting in to ensure energy efficiency and hence cost reduction. Arduino has proved useful to such efforts.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9193" href="#b64" name="bb64"><span data-dcnode-id="9194" instrument_node="">[64]</span></a><span data-dcnode-id="9192" instrument_node=""> adopted the open-source hardware resources of Arduino in developing a low-cost alternative for scientific instrumentation and research. This not only made it cheaper for energy researchers to conduct researches but also provided an efficient platform to prototype the proposed system.</span></p><p data-dcnode-id="9186" id="d1e2983"><span data-dcnode-id="9190" instrument_node="">Considering how costly energy is to the global economy, it is surprising to find out that billions of energy calories are left to waste. Smart studies like&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9188" href="#b140" name="bb140"><span data-dcnode-id="9189" instrument_node="">[140]</span></a><span data-dcnode-id="9187" instrument_node=""> devised ways to harvest these wasted energy calories by building a smart multi-application harvester using Arduino. The system comprises a solar, thermal plate, and dynamo mechanical parts that were deployed in harvesting the energy while an Arduino was used as a microcontroller to reduce the power stored from the input.</span></p><p data-dcnode-id="9181" id="d1e2989"><span data-dcnode-id="9185" instrument_node="">Since energy harvesters exist, it would not be a bad idea to develop systems that measure their performance and possibly recommend if they need maintenance to increase efficiency. That is where the Piezoelectric rainfall energy harvester performance measuring system based on advanced Arduino-based proposed&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9183" href="#b90" name="bb90"><span data-dcnode-id="9184" instrument_node="">[90]</span></a><span data-dcnode-id="9182" instrument_node=""> comes in.</span></p><p data-dcnode-id="9167" id="d1e3012"><span data-dcnode-id="9180" instrument_node="">In countries where energy theft is a problem, as is often the case in a host of developing nations, there is&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9178" href="#b91" name="bb91"><span data-dcnode-id="9179" instrument_node="">[91]</span></a><span data-dcnode-id="9177" instrument_node=""> a smart energy metering and power theft control system whose prototype was designed with Arduino and which was eventually implemented with an Automated Smart Metering GSM.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9175" href="#b93" name="bb93"><span data-dcnode-id="9176" instrument_node="">[93]</span></a><span data-dcnode-id="9174" instrument_node=""> also developed a system, based on Arduino, that measured power and energy. While&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9172" href="#b92" name="bb92"><span data-dcnode-id="9173" instrument_node="">[92]</span></a><span data-dcnode-id="9171" instrument_node=""> built a similar system, a smart energy meter, also using Arduino and GSM Automated Smart Metering. There is the ever-constant need to optimize energy cost and ensure the value derived from a unit of energy equals or even exceeds the cost. That was in the mind of&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9169" href="#b141" name="bb141"><span data-dcnode-id="9170" instrument_node="">[141]</span></a><span data-dcnode-id="9168" instrument_node=""> when they developed an Arduino Based IoT Metering System that is used for on-demand energy scrutiny.</span></p><p data-dcnode-id="9159" id="d1e3039"><span data-dcnode-id="9166" instrument_node="">With hydrocarbons contributing to atmospheric pollution, global warming, and climate change, environmental activists had since the beginning of the millennium been calling for a radical decision concerning the world’s energy sources. Dire consequences and imminent catastrophe were predicted to await the world by both scientists and activists if alternative energy sources did not immediately replace the hydrocarbons. It took time, but eventually most agreed that solar was perhaps the best of the available alternatives. This is chiefly because solar, being a direct product of sunlight, is readily available anywhere in the world. Harnessing it also is not as risky as manufacturing nuclear energy in nuclear reactors. The compounds used in producing nuclear energy have on several occasions exploded in the warehouses where they were kept, killing several. Solar was also found to be cheaper to produce. Depending on sunlight means that 50% of the raw materials required have been paid for by God. Not surprisingly, solar panels and solar products in different forms started proliferating the energy market. With this solar proliferation also came studies and applications to optimize solar production and consumption. Interestingly, some of these solutions were prototyped with Arduino.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9164" href="#b65" name="bb65"><span data-dcnode-id="9165" instrument_node="">[65]</span></a><span data-dcnode-id="9163" instrument_node=""> developed a new temperature data acquisition device for solar energy uses. The system was prototyped with Arduino and took advantage of Arduino’s capability to work effectively with sensors to build a flexible system that can be used to gather data on and for solar installations in the remotest of places anywhere in the world. scholars like&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9161" href="#b142" name="bb142"><span data-dcnode-id="9162" instrument_node="">[142]</span></a><span data-dcnode-id="9160" instrument_node=""> felt there is a need to measure solar energy, they were right and so went ahead to develop a system to measure Solar using the Arduino computing platform.</span></p><p data-dcnode-id="9148" id="d1e3051"><span data-dcnode-id="9158" instrument_node="">With the increasing need for renewable energy and indeed a spike in the number of households using renewable energy sources, it becomes imperative to have systems that analyze and ensure optimal maintenance of operation status&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9156" href="#b143" name="bb143"><span data-dcnode-id="9157" instrument_node="">[143]</span></a><span data-dcnode-id="9155" instrument_node="">.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9153" href="#b144" name="bb144"><span data-dcnode-id="9154" instrument_node="">[144]</span></a><span data-dcnode-id="9152" instrument_node=""> proposed such a system. They developed a LoRa based renewable energy observation system with an open IoT platform. LoRa, a low-power WAN protocol (achieving a distance of 15-20km), has pins that can be connected on the Arduino Uno board. </span><a class="workspace-trigger" data-dcnode-id="9150" href="#tbl6" name="btbl6"><span data-dcnode-id="9151" instrument_node="">Table&nbsp;6</span></a><span data-dcnode-id="9149" instrument_node=""> analyzes a few of these studies that focused on Arduino uses in energy and energy management.</span></p><div data-dcnode-id="8989"><p data-dcnode-id="9147" id="d1e3065"></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="8990" id="tbl6"><span class="captions" data-dcnode-id="9139"><span data-dcnode-id="9140" id="d1e919"><p data-dcnode-id="9141" id="d1e920"><span class="label" data-dcnode-id="9145"><span data-dcnode-id="9146" instrument_node="">Table 6</span></span><span data-dcnode-id="9144" instrument_node="">. </span><span data-dcnode-id="9142" instrument_node="">Summary of Arduino uses in energy and energy management.</span></p></span></span><div class="groups" data-dcnode-id="8991"><table data-dcnode-id="8992"><thead data-dcnode-id="9123"><tr class="valign-top" data-dcnode-id="9124"><th class="align-left" data-dcnode-id="9137" scope="col"><span data-dcnode-id="9138" instrument_node="">Reference</span></th><th class="align-left" data-dcnode-id="9135" scope="col"><span data-dcnode-id="9136" instrument_node="">Author, year, title</span></th><th class="align-left" data-dcnode-id="9133" scope="col"><span data-dcnode-id="9134" instrument_node="">Type of Arduino Board Used</span></th><th class="align-left" data-dcnode-id="9131" scope="col"><span data-dcnode-id="9132" instrument_node="">Energy type</span></th><th class="align-left" data-dcnode-id="9129" scope="col"><span data-dcnode-id="9130" instrument_node="">Purpose of Energy System</span></th><th class="align-left" data-dcnode-id="9127" scope="col"><span data-dcnode-id="9128" instrument_node="">Methodology</span></th><th class="align-left" data-dcnode-id="9125" scope="col"><span data-dcnode-id="9126" instrument_node="">Remarks</span></th></tr></thead><tbody data-dcnode-id="8993"><tr class="valign-top rowsep-1" data-dcnode-id="9107"><td class="align-left" data-dcnode-id="9120"><a class="workspace-trigger" data-dcnode-id="9121" href="#b144" name="bb144"><span data-dcnode-id="9122" instrument_node="">[144]</span></a></td><td class="align-left" data-dcnode-id="9118"><span data-dcnode-id="9119" instrument_node="">Chang-Sic et al, 2018, LoRa based renewable energy monitoring system with an open IoT platform.</span></td><td class="align-left" data-dcnode-id="9116"><span data-dcnode-id="9117" instrument_node="">Arduino Mega</span></td><td class="align-left" data-dcnode-id="9114"><span data-dcnode-id="9115" instrument_node="">Renewable Energy</span></td><td class="align-left" data-dcnode-id="9112"><span data-dcnode-id="9113" instrument_node="">Energy monitoring</span></td><td class="align-left" data-dcnode-id="9110"><span data-dcnode-id="9111" instrument_node="">Developed, prototyped with Arduino, and implemented a system for monitoring renewable energy.</span></td><td class="align-left" data-dcnode-id="9108"><span data-dcnode-id="9109" instrument_node="">The system monitors the quantity of energy generated from renewable energy sources such as solar energy, wind, and nuclear energy. It aims to know the quantity that is effectively utilized</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9091"><td class="align-left" data-dcnode-id="9104"><a class="workspace-trigger" data-dcnode-id="9105" href="#b92" name="bb92"><span data-dcnode-id="9106" instrument_node="">[92]</span></a></td><td class="align-left" data-dcnode-id="9102"><span data-dcnode-id="9103" instrument_node="">Chaudhari et al, 2017, Smart energy meter using Arduino and GSM</span></td><td class="align-left" data-dcnode-id="9100"><span data-dcnode-id="9101" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="9098"><span data-dcnode-id="9099" instrument_node="">Electricity</span></td><td class="align-left" data-dcnode-id="9096"><span data-dcnode-id="9097" instrument_node="">Smart metering</span></td><td class="align-left" data-dcnode-id="9094"><span data-dcnode-id="9095" instrument_node="">Implemented a smart energy metering system that tapped from Arduino technologies and Global System for Mobile Communication (GSM)</span></td><td class="align-left" data-dcnode-id="9092"><span data-dcnode-id="9093" instrument_node="">The system that made energy metering fair to all involved parties — buyers or sellers.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9075"><td class="align-left" data-dcnode-id="9088"><a class="workspace-trigger" data-dcnode-id="9089" href="#b142" name="bb142"><span data-dcnode-id="9090" instrument_node="">[142]</span></a></td><td class="align-left" data-dcnode-id="9086"><span data-dcnode-id="9087" instrument_node="">Jumaat and Othman, 2018, Solar Energy Measurement Using Arduino.</span></td><td class="align-left" data-dcnode-id="9084"><span data-dcnode-id="9085" instrument_node="">Arduino UNO, Mega</span></td><td class="align-left" data-dcnode-id="9082"><span data-dcnode-id="9083" instrument_node="">Solar Energy</span></td><td class="align-left" data-dcnode-id="9080"><span data-dcnode-id="9081" instrument_node="">Energy measurement</span></td><td class="align-left" data-dcnode-id="9078"><span data-dcnode-id="9079" instrument_node="">Developed, prototyped, and implemented a system that measured the quantity of solar energy used.</span></td><td class="align-left" data-dcnode-id="9076"><span data-dcnode-id="9077" instrument_node="">The system aimed to achieve solar energy efficiency, reduce wastage, and find how best excess solar energy could be moved to those that need it most or stored in accumulators for future uses.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9059"><td class="align-left" data-dcnode-id="9072"><a class="workspace-trigger" data-dcnode-id="9073" href="#b141" name="bb141"><span data-dcnode-id="9074" instrument_node="">[141]</span></a></td><td class="align-left" data-dcnode-id="9070"><span data-dcnode-id="9071" instrument_node="">Okafor et al, 2017, Development of Arduino Based IoT Metering System for On-Demand Energy Monitoring.</span></td><td class="align-left" data-dcnode-id="9068"><span data-dcnode-id="9069" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="9066"><span data-dcnode-id="9067" instrument_node="">Electricity, solar energy, fuel</span></td><td class="align-left" data-dcnode-id="9064"><span data-dcnode-id="9065" instrument_node="">Energy metering and monitoring</span></td><td class="align-left" data-dcnode-id="9062"><span data-dcnode-id="9063" instrument_node="">Developed an Internet of Things (IoT) system that monitored the metering of on-demand energy</span></td><td class="align-left" data-dcnode-id="9060"><span data-dcnode-id="9061" instrument_node="">The system is efficient for solar energy, electricity, and even hydrocarbon energies such as petrol and diesel.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9043"><td class="align-left" data-dcnode-id="9056"><a class="workspace-trigger" data-dcnode-id="9057" href="#b140" name="bb140"><span data-dcnode-id="9058" instrument_node="">[140]</span></a></td><td class="align-left" data-dcnode-id="9054"><span data-dcnode-id="9055" instrument_node="">Rizman et al, 2018, Smart multi-application energy harvester using Arduino</span></td><td class="align-left" data-dcnode-id="9052"><span data-dcnode-id="9053" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="9050"><span data-dcnode-id="9051" instrument_node="">Solar energy, wind energy</span></td><td class="align-left" data-dcnode-id="9048"><span data-dcnode-id="9049" instrument_node="">Energy harvesting</span></td><td class="align-left" data-dcnode-id="9046"><span data-dcnode-id="9047" instrument_node="">Implemented a system that facilitated energy harvesting from energy-dependent devices.</span></td><td class="align-left" data-dcnode-id="9044"><span data-dcnode-id="9045" instrument_node="">In most cases, excess energy is wasted by several devices. This system taps this energy that could have been wasted and makes them useful.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9027"><td class="align-left" data-dcnode-id="9040"><a class="workspace-trigger" data-dcnode-id="9041" href="#b90" name="bb90"><span data-dcnode-id="9042" instrument_node="">[90]</span></a></td><td class="align-left" data-dcnode-id="9038"><span data-dcnode-id="9039" instrument_node="">Acciari et al, 2017, Piezoelectric rainfall energy harvester performance by an advanced Arduino-based measuring system.</span></td><td class="align-left" data-dcnode-id="9036"><span data-dcnode-id="9037" instrument_node="">Arduino Due</span></td><td class="align-left" data-dcnode-id="9034"><span data-dcnode-id="9035" instrument_node="">Rainfall energy</span></td><td class="align-left" data-dcnode-id="9032"><span data-dcnode-id="9033" instrument_node="">Determination of energy harvester performance</span></td><td class="align-left" data-dcnode-id="9030"><span data-dcnode-id="9031" instrument_node="">Developed a system prototyped with Arduino whose goal is to measure the performance of Piezoelectric rainfall energy harvester</span></td><td class="align-left" data-dcnode-id="9028"><span data-dcnode-id="9029" instrument_node="">Ceramic materials and crystals when subjected to mechanical pressure produce electric energy which can be harvested for energy solutions. An efficient harvest achieves a better result than an inefficient one. The system uses an established benchmark to decide if a harvester is efficient enough.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9010"><td class="align-left" data-dcnode-id="9023"><span data-dcnode-id="9026" instrument_node="">7 </span><a class="workspace-trigger" data-dcnode-id="9024" href="#b93" name="bb93"><span data-dcnode-id="9025" instrument_node="">[93]</span></a></td><td class="align-left" data-dcnode-id="9021"><span data-dcnode-id="9022" instrument_node="">Srividyadevi et al, 2013, Measurement of Power and Energy Using Arduino.</span></td><td class="align-left" data-dcnode-id="9019"><span data-dcnode-id="9020" instrument_node="">Arduino Mega</span></td><td class="align-left" data-dcnode-id="9017"><span data-dcnode-id="9018" instrument_node="">Electricity, solar energy</span></td><td class="align-left" data-dcnode-id="9015"><span data-dcnode-id="9016" instrument_node="">Power measurement, energy measurement</span></td><td class="align-left" data-dcnode-id="9013"><span data-dcnode-id="9014" instrument_node="">Implemented an Arduino-prototyped system for the measurement of power and energy</span></td><td class="align-left" data-dcnode-id="9011"><span data-dcnode-id="9012" instrument_node="">The developed system measures the total power generated by an electricity generating plant or the total sum of solar energy produced by a solar panel.</span></td></tr><tr class="valign-top" data-dcnode-id="8994"><td class="align-left" data-dcnode-id="9007"><a class="workspace-trigger" data-dcnode-id="9008" href="#b91" name="bb91"><span data-dcnode-id="9009" instrument_node="">[91]</span></a></td><td class="align-left" data-dcnode-id="9005"><span data-dcnode-id="9006" instrument_node="">Visalatchi and Sandeep, 2017, Smart Energy Metering and Power Theft Control Using Arduino and GSM Automated Smart Metering</span></td><td class="align-left" data-dcnode-id="9003"><span data-dcnode-id="9004" instrument_node="">Arduino Nano</span></td><td class="align-left" data-dcnode-id="9001"><span data-dcnode-id="9002" instrument_node="">Solar energy, electricity</span></td><td class="align-left" data-dcnode-id="8999"><span data-dcnode-id="9000" instrument_node="">Smart energy metering, power theft control</span></td><td class="align-left" data-dcnode-id="8997"><span data-dcnode-id="8998" instrument_node="">Developed and implemented a smart energy metering system which when deployed could reduce power theft</span></td><td class="align-left" data-dcnode-id="8995"><span data-dcnode-id="8996" instrument_node="">Energy buyers a times want to manipulate the system and shortchange the sellers and producers. The system stops them on their track and effectively stops f\them from stealing the power while ensuring that they are charged only a fair price by the energy company.</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="8799" id="sec3.2.10"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8982" id="d1e3071"><span data-dcnode-id="8987" instrument_node="">3.2.10</span><span data-dcnode-id="8985" instrument_node="">. </span><span data-dcnode-id="8983" instrument_node="">Defense</span></h4><p data-dcnode-id="8971" id="d1e3073"><span data-dcnode-id="8981" instrument_node="">Defense of human lives and properties gulp a big chunk of national budgets in all countries of the world. This goes to tell how much we value our safety and the safety of our properties. Today, systems such as drones and missiles rely heavily on telecommunication technologies to function properly. Software is also gaining wide use in the development of sophisticated defense gadgets. Several of these gadgets require to be prototyped before they are finally deployed to the field. Arduino provides the best platform for this. And indeed, many have. Automatic Enemy Detecting Defense Robots that use Face Detection Techniques are prototyped with Arduino in&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8979" href="#b94" name="bb94"><span data-dcnode-id="8980" instrument_node="">[94]</span></a><span data-dcnode-id="8978" instrument_node="">. Arduino Uno, like other variants of Arduino boards, provides a cost-effective approach to developing dense systems. This was the argument of&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8976" href="#b95" name="bb95"><span data-dcnode-id="8977" instrument_node="">[95]</span></a><span data-dcnode-id="8975" instrument_node=""> while showing the development of a small unarmed robot for defense and security. In collaboration with android phones, Arduino can be used to build systems that are useful in the war-field.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8973" href="#b96" name="bb96"><span data-dcnode-id="8974" instrument_node="">[96]</span></a><span data-dcnode-id="8972" instrument_node=""> built an Arduino controlled war field spy robot that made use of night vision wireless camera and android application. When installed on an android phone, soldiers can use the system developed to spy in their enemy’s camp at night and gather relevant information.</span></p><p data-dcnode-id="8963" id="d1e3087"><span data-dcnode-id="8970" instrument_node="">But defense extends beyond the military. Individual safety is as important as territorial integrity and is why nations also invest in ensuring safety for their citizens. Nations want to see as few air crashes as possible, as few accidents as possible, as few thefts as possible, etc. while governments owe their citizens these functions, some level of responsibility ultimately rests on the shoulders of the citizens themselves. Developers have stepped in with devices to assist individuals in staying as safe as possible.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8968" href="#b145" name="bb145"><span data-dcnode-id="8969" instrument_node="">[145]</span></a><span data-dcnode-id="8967" instrument_node=""> developed a vehicle tracking system that got information from real-time google maps was based on Arduino on the computing platform. In the United States, gun violence remains a huge threat to public safety and worst of all these occur unmitigated even in classrooms that should normally be free from such.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8965" href="#b146" name="bb146"><span data-dcnode-id="8966" instrument_node="">[146]</span></a><span data-dcnode-id="8964" instrument_node=""> designed and prototyped a moveable classroom attendance system based on Arduino and biometric data that makes it possible to know everyone in a class and to easily identify who could constitute a possible threat.</span></p><p data-dcnode-id="8958" id="d1e3097"><span data-dcnode-id="8962" instrument_node="">Workers in certain hazardous occupations are always fearing for their lives. Colleagues have either died on the job or got seriously injured.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8960" href="#b97" name="bb97"><span data-dcnode-id="8961" instrument_node="">[97]</span></a><span data-dcnode-id="8959" instrument_node=""> stepped in to solve this problem by developing an IoT enabled worker safety system that was prototyped with Arduino and that could detect the quality of air in a work environment.</span></p><p data-dcnode-id="8942" id="d1e3104"><a class="workspace-trigger" data-dcnode-id="8956" href="#b75" name="bb75"><span data-dcnode-id="8957" instrument_node="">[75]</span></a><span data-dcnode-id="8955" instrument_node=""> built an Arduino prototyped event reporting and early-warning security system based on IoT for underground coal mines while&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8953" href="#b137" name="bb137"><span data-dcnode-id="8954" instrument_node="">[137]</span></a><span data-dcnode-id="8952" instrument_node=""> came through with an IoT Proactive Disaster Management System for Mines that was also prototyped with Arduino.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8950" href="#b138" name="bb138"><span data-dcnode-id="8951" instrument_node="">[138]</span></a><span data-dcnode-id="8949" instrument_node=""> described and also built a Wireless Smell System for Hazardous Gases Detection that is relevant in many workplaces especially those that deal with chemicals.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8947" href="#b147" name="bb147"><span data-dcnode-id="8948" instrument_node="">[147]</span></a><span data-dcnode-id="8946" instrument_node=""> has a theory on how to increase the safety of people in dangerous locations. This was eventually modeled and simulated with the aid of an Arduino platform. </span><a class="workspace-trigger" data-dcnode-id="8944" href="#tbl7" name="btbl7"><span data-dcnode-id="8945" instrument_node="">Table&nbsp;7</span></a><span data-dcnode-id="8943" instrument_node=""> analyzes a couple of these studies that focused on Arduino uses in defense.</span></p><div data-dcnode-id="8800"><p data-dcnode-id="8941" id="d1e3125"></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="8801" id="tbl7"><span class="captions" data-dcnode-id="8933"><span data-dcnode-id="8934" id="d1e1087"><p data-dcnode-id="8935" id="d1e1088"><span class="label" data-dcnode-id="8939"><span data-dcnode-id="8940" instrument_node="">Table 7</span></span><span data-dcnode-id="8938" instrument_node="">. </span><span data-dcnode-id="8936" instrument_node="">Summary of Arduino uses in defense.</span></p></span></span><div class="groups" data-dcnode-id="8802"><table data-dcnode-id="8803"><thead data-dcnode-id="8917"><tr class="valign-top" data-dcnode-id="8918"><th class="align-left" data-dcnode-id="8931" scope="col"><span data-dcnode-id="8932" instrument_node="">Reference</span></th><th class="align-left" data-dcnode-id="8929" scope="col"><span data-dcnode-id="8930" instrument_node="">Author, year, title</span></th><th class="align-left" data-dcnode-id="8927" scope="col"><span data-dcnode-id="8928" instrument_node="">Type of Arduino Board Used</span></th><th class="align-left" data-dcnode-id="8925" scope="col"><span data-dcnode-id="8926" instrument_node="">Defense type</span></th><th class="align-left" data-dcnode-id="8923" scope="col"><span data-dcnode-id="8924" instrument_node="">Purpose of defense System</span></th><th class="align-left" data-dcnode-id="8921" scope="col"><span data-dcnode-id="8922" instrument_node="">Methodology</span></th><th class="align-left" data-dcnode-id="8919" scope="col"><span data-dcnode-id="8920" instrument_node="">Remarks</span></th></tr></thead><tbody data-dcnode-id="8804"><tr class="valign-top rowsep-1" data-dcnode-id="8901"><td class="align-left" data-dcnode-id="8914"><a class="workspace-trigger" data-dcnode-id="8915" href="#b148" name="bb148"><span data-dcnode-id="8916" instrument_node="">[148]</span></a></td><td class="align-left" data-dcnode-id="8912"><span data-dcnode-id="8913" instrument_node="">Mumtaz et al, 2018, An Automatic System for Controlling Streetlights and Monitoring Objects Using Arduino</span></td><td class="align-left" data-dcnode-id="8910"><span data-dcnode-id="8911" instrument_node="">Arduino Nano</span></td><td class="align-left" data-dcnode-id="8908"><span data-dcnode-id="8909" instrument_node="">Car and human Safety</span></td><td class="align-left" data-dcnode-id="8906"><span data-dcnode-id="8907" instrument_node="">Controlling streetlights and monitoring vehicles and pedestrians</span></td><td class="align-left" data-dcnode-id="8904"><span data-dcnode-id="8905" instrument_node="">Implementation of a system for controlling streetlights using solar rays together with the detection of an object’s movement and position</span></td><td class="align-left" data-dcnode-id="8902"><span data-dcnode-id="8903" instrument_node="">The system makes it easier to control traffic and reduce accidents.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8885"><td class="align-left" data-dcnode-id="8898"><a class="workspace-trigger" data-dcnode-id="8899" href="#b149" name="bb149"><span data-dcnode-id="8900" instrument_node="">[149]</span></a></td><td class="align-left" data-dcnode-id="8896"><span data-dcnode-id="8897" instrument_node="">Ghoghre et al, 2017, Radar System using Arduino</span></td><td class="align-left" data-dcnode-id="8894"><span data-dcnode-id="8895" instrument_node="">Arduino Mega</span></td><td class="align-left" data-dcnode-id="8892"><span data-dcnode-id="8893" instrument_node="">National security</span></td><td class="align-left" data-dcnode-id="8890"><span data-dcnode-id="8891" instrument_node="">Detecting missiles, traffic control, advanced warfare</span></td><td class="align-left" data-dcnode-id="8888"><span data-dcnode-id="8889" instrument_node="">Design and implementation of a system that uses microwaves to determine military and paramilitary object’s range, altitude, speed, and direction.</span></td><td class="align-left" data-dcnode-id="8886"><span data-dcnode-id="8887" instrument_node="">The radar system built can be deployed in air-defense, air traffic control, antimissile systems, and aircraft anti-collision systems. All of which are important for defense.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8869"><td class="align-left" data-dcnode-id="8882"><a class="workspace-trigger" data-dcnode-id="8883" href="#b150" name="bb150"><span data-dcnode-id="8884" instrument_node="">[150]</span></a></td><td class="align-left" data-dcnode-id="8880"><span data-dcnode-id="8881" instrument_node="">Alghamdi, 2017, Autonomous: PC Controlled Robot Using Arduino Uno</span></td><td class="align-left" data-dcnode-id="8878"><span data-dcnode-id="8879" instrument_node="">Arduino Uno</span></td><td class="align-left" data-dcnode-id="8876"><span data-dcnode-id="8877" instrument_node="">Rescue and Emergencies</span></td><td class="align-left" data-dcnode-id="8874"><span data-dcnode-id="8875" instrument_node="">Robotic arms for controlling weapons and machinery</span></td><td class="align-left" data-dcnode-id="8872"><span data-dcnode-id="8873" instrument_node="">Implemented an autonomous robot that could carry out specified activities</span></td><td class="align-left" data-dcnode-id="8870"><span data-dcnode-id="8871" instrument_node="">These robots can replace humans in high-risk operations such as when rescuing people from a blast zone.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8853"><td class="align-left" data-dcnode-id="8866"><a class="workspace-trigger" data-dcnode-id="8867" href="#b151" name="bb151"><span data-dcnode-id="8868" instrument_node="">[151]</span></a></td><td class="align-left" data-dcnode-id="8864"><span data-dcnode-id="8865" instrument_node="">Hoque et al, 2017, Arduino based battlefield assistive robot.</span></td><td class="align-left" data-dcnode-id="8862"><span data-dcnode-id="8863" instrument_node="">Arduino Mega</span></td><td class="align-left" data-dcnode-id="8860"><span data-dcnode-id="8861" instrument_node="">Battlefield defense</span></td><td class="align-left" data-dcnode-id="8858"><span data-dcnode-id="8859" instrument_node="">Military robots</span></td><td class="align-left" data-dcnode-id="8856"><span data-dcnode-id="8857" instrument_node="">Implemented and designed, an Arduino-prototyped system that made use of night vision monitoring and other technologies to equip robots to fight in battlefields.</span></td><td class="align-left" data-dcnode-id="8854"><span data-dcnode-id="8855" instrument_node="">Robots are deployed to reduce casualties while presenting a formidable force than opponents.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8837"><td class="align-left" data-dcnode-id="8850"><a class="workspace-trigger" data-dcnode-id="8851" href="#b152" name="bb152"><span data-dcnode-id="8852" instrument_node="">[152]</span></a></td><td class="align-left" data-dcnode-id="8848"><span data-dcnode-id="8849" instrument_node="">Pavithra et al, 2018, Design and Implementation of a Rescue System for the Safety of Women by using Arduino Controller</span></td><td class="align-left" data-dcnode-id="8846"><span data-dcnode-id="8847" instrument_node="">Arduino Uno</span></td><td class="align-left" data-dcnode-id="8844"><span data-dcnode-id="8845" instrument_node="">Human assistance, personal defense</span></td><td class="align-left" data-dcnode-id="8842"><span data-dcnode-id="8843" instrument_node="">Safety of women</span></td><td class="align-left" data-dcnode-id="8840"><span data-dcnode-id="8841" instrument_node="">Design and implementation of a wearable band that captures images and videos and sends to the wearer informing them of dangers around so they take precautions early on.</span></td><td class="align-left" data-dcnode-id="8838"><span data-dcnode-id="8839" instrument_node="">Sensors are used here to analyze wearers’ physiological signals such as pulse rate and body vibration. If the wearer has a cause to fear, the system can advise them to leave the environment or make an SOS call.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8821"><td class="align-left" data-dcnode-id="8834"><a class="workspace-trigger" data-dcnode-id="8835" href="#b153" name="bb153"><span data-dcnode-id="8836" instrument_node="">[153]</span></a></td><td class="align-left" data-dcnode-id="8832"><span data-dcnode-id="8833" instrument_node="">Mohamad et al, 2016, Design and implementation of a real-time tracking system based on Arduino Intel Galileo</span></td><td class="align-left" data-dcnode-id="8830"><span data-dcnode-id="8831" instrument_node="">Arduino Intel Galileo</span></td><td class="align-left" data-dcnode-id="8828"><span data-dcnode-id="8829" instrument_node="">Vehicle and gadgets tracking</span></td><td class="align-left" data-dcnode-id="8826"><span data-dcnode-id="8827" instrument_node="">Tracking system</span></td><td class="align-left" data-dcnode-id="8824"><span data-dcnode-id="8825" instrument_node="">Design and implantation of a vehicle tracking and monitoring system that uses GSM, GPS, and GPSR in finding a vehicle’s location coordinates and processes the data so that a missing vehicle can easily be located.</span></td><td class="align-left" data-dcnode-id="8822"><span data-dcnode-id="8823" instrument_node="">Vehicle theft is a common occurrence in most parts of the world. The system provides real-time tracking of a missing vehicle. This makes it easier to not only find the vehicle but to also arrest the criminals behind its missing.</span></td></tr><tr class="valign-top" data-dcnode-id="8805"><td class="align-left" data-dcnode-id="8818"><a class="workspace-trigger" data-dcnode-id="8819" href="#b154" name="bb154"><span data-dcnode-id="8820" instrument_node="">[154]</span></a></td><td class="align-left" data-dcnode-id="8816"><span data-dcnode-id="8817" instrument_node="">Aphiratsakun et al, 2018, Defense System Modelling</span></td><td class="align-left" data-dcnode-id="8814"><span data-dcnode-id="8815" instrument_node="">Arduino Uno</span></td><td class="align-left" data-dcnode-id="8812"><span data-dcnode-id="8813" instrument_node="">National security</span></td><td class="align-left" data-dcnode-id="8810"><span data-dcnode-id="8811" instrument_node="">Defense system</span></td><td class="align-left" data-dcnode-id="8808"><span data-dcnode-id="8809" instrument_node="">Created a model system to detect and track the motion of objects and publish the objects’ real-time location.</span></td><td class="align-left" data-dcnode-id="8806"><span data-dcnode-id="8807" instrument_node="">The system is useful in building automatic snipers and killer lasers which use the location found to know how to easily eliminate a target.</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="8634" id="sec3.2.11"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8793" id="d1e3131"><span data-dcnode-id="8798" instrument_node="">3.2.11</span><span data-dcnode-id="8796" instrument_node="">. </span><span data-dcnode-id="8794" instrument_node="">Education</span></h4><p data-dcnode-id="8788" id="d1e3133"><span data-dcnode-id="8792" instrument_node="">Arduino has found many uses in education. This no doubt comes in different shades and forms always geared towards educating the target audience. Education can help develop Arduino and Arduino can also be beneficial to education, either helping to educate people or being used to build systems that can be used to make education easier, more accessible, and more fun.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8790" href="#b98" name="bb98"><span data-dcnode-id="8791" instrument_node="">[98]</span></a><span data-dcnode-id="8789" instrument_node=""> showed how the Arduino platform is connected to the education process. They believed that the massive growth and expanding development of the relatively new fields of electronics and informatics requires that the educational curriculum are changed to reflect the new trends in the technology industry. They argued that the disruption of electronic and hardware solutions supplies with the availability of more sophisticated and better solutions made possible by Arduino based technologies should be matched in vigor by systematic including Arduino in the education process. Such systematic inclusion could mean adding an Arduino topic to the topics covered by High School Computer Science or even integrated science.</span></p><p data-dcnode-id="8777" id="d1e3139"><span data-dcnode-id="8787" instrument_node="">If educationists realize that open-source hardware, including those offered by Arduino, are growing ever influential in controls education&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8785" href="#b68" name="bb68"><span data-dcnode-id="8786" instrument_node="">[68]</span></a><span data-dcnode-id="8784" instrument_node=""> then a concerted effort should be made to introduce them to kids early enough.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8782" href="#b60" name="bb60"><span data-dcnode-id="8783" instrument_node="">[60]</span></a><span data-dcnode-id="8781" instrument_node=""> contended that since control education generally profoundly and almost unchangeable depends on simulation suites and virtual laboratories, Raspberry Pi and Arduino boards could be adopted to offer control education students a more physical, more realistic outlook of the experiments so that they enjoy physical feedback that clearly shows the impact of control algorithms and the workings involved in the interaction between the experiment’s parameters. To that end,&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8779" href="#b69" name="bb69"><span data-dcnode-id="8780" instrument_node="">[69]</span></a><span data-dcnode-id="8778" instrument_node=""> proposed inexpensive open-source hardware in control education and adopted Arduino-feedback as a case study.</span></p><p data-dcnode-id="8772" id="d1e3153"><span data-dcnode-id="8776" instrument_node="">Indeed, this has become an Arduino age and likely technology has thought the world over and over again, Arduino is perhaps a forerunner to something else, something better, more sophisticated, and more efficient. Understanding Arduino perfectly could place us in a better position to fully utilize similar but better systems of the future. It was on that note that&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8774" href="#b155" name="bb155"><span data-dcnode-id="8775" instrument_node="">[155]</span></a><span data-dcnode-id="8773" instrument_node=""> conducted a review of embedded systems education, arrived at lessons certain lessons he hoped key industry players should have learned, and made predictions on future directions of Arduino and similar systems.</span></p><p data-dcnode-id="8768" id="d1e3160"><a class="workspace-trigger" data-dcnode-id="8770" href="#b100" name="bb100"><span data-dcnode-id="8771" instrument_node="">[100]</span></a><span data-dcnode-id="8769" instrument_node=""> concluded that so many are missing the boat, left technologically behind because they have failed to see that engineering education needs Arduino, Raspberry Pi, and other small prototyping boards. This failure has resulted in requisite attention not being paid to these devices. Integrating them into the course flow, however, would yield positive results for all.</span></p><p data-dcnode-id="8761" id="d1e3165"><a class="workspace-trigger" data-dcnode-id="8766" href="#b99" name="bb99"><span data-dcnode-id="8767" instrument_node="">[99]</span></a><span data-dcnode-id="8765" instrument_node=""> developed and showed the practical use of an Arduino Based Education program for high school students in South Korea. </span><a class="workspace-trigger" data-dcnode-id="8763" href="#tbl8" name="btbl8"><span data-dcnode-id="8764" instrument_node="">Table&nbsp;8</span></a><span data-dcnode-id="8762" instrument_node=""> analyzes some selected studies that focused on Arduino uses in education.</span></p><div data-dcnode-id="8635"><p data-dcnode-id="8760" id="d1e3173"></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="8636" id="tbl8"><span class="captions" data-dcnode-id="8752"><span data-dcnode-id="8753" id="d1e1237"><p data-dcnode-id="8754" id="d1e1238"><span class="label" data-dcnode-id="8758"><span data-dcnode-id="8759" instrument_node="">Table 8</span></span><span data-dcnode-id="8757" instrument_node="">. </span><span data-dcnode-id="8755" instrument_node="">Summary of Arduino uses in education.</span></p></span></span><div class="groups" data-dcnode-id="8637"><table data-dcnode-id="8638"><thead data-dcnode-id="8736"><tr class="valign-top" data-dcnode-id="8737"><th class="align-left" data-dcnode-id="8750" scope="col"><span data-dcnode-id="8751" instrument_node="">Reference</span></th><th class="align-left" data-dcnode-id="8748" scope="col"><span data-dcnode-id="8749" instrument_node="">Author, year, title</span></th><th class="align-left" data-dcnode-id="8746" scope="col"><span data-dcnode-id="8747" instrument_node="">Type of Arduino Board Used</span></th><th class="align-left" data-dcnode-id="8744" scope="col"><span data-dcnode-id="8745" instrument_node="">Education type</span></th><th class="align-left" data-dcnode-id="8742" scope="col"><span data-dcnode-id="8743" instrument_node="">Purpose of System</span></th><th class="align-left" data-dcnode-id="8740" scope="col"><span data-dcnode-id="8741" instrument_node="">Methodology</span></th><th class="align-left" data-dcnode-id="8738" scope="col"><span data-dcnode-id="8739" instrument_node="">Remarks</span></th></tr></thead><tbody data-dcnode-id="8639"><tr class="valign-top rowsep-1" data-dcnode-id="8720"><td class="align-left" data-dcnode-id="8733"><a class="workspace-trigger" data-dcnode-id="8734" href="#b156" name="bb156"><span data-dcnode-id="8735" instrument_node="">[156]</span></a></td><td class="align-left" data-dcnode-id="8731"><span data-dcnode-id="8732" instrument_node="">Vital et al, 2018, Educational Humanoid Robot Using a Sensoring Fusion.</span></td><td class="align-left" data-dcnode-id="8729"><span data-dcnode-id="8730" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="8727"><span data-dcnode-id="8728" instrument_node="">Higher Education</span></td><td class="align-left" data-dcnode-id="8725"><span data-dcnode-id="8726" instrument_node="">Using Arduino for final year engineering projects</span></td><td class="align-left" data-dcnode-id="8723"><span data-dcnode-id="8724" instrument_node="">A description of the use of the NAO robot for engineering projects was followed by the integration of the robot with Arduino sensors that made it easy to make analysis, obtain information, and do projects.</span></td><td class="align-left" data-dcnode-id="8721"><span data-dcnode-id="8722" instrument_node="">Such a system makes learning easier for students.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8704"><td class="align-left" data-dcnode-id="8717"><a class="workspace-trigger" data-dcnode-id="8718" href="#b157" name="bb157"><span data-dcnode-id="8719" instrument_node="">[157]</span></a></td><td class="align-left" data-dcnode-id="8715"><span data-dcnode-id="8716" instrument_node="">Ishikawa and Maruta, 2010, Rapid prototyping for control education using Arduino and open-source technologies.</span></td><td class="align-left" data-dcnode-id="8713"><span data-dcnode-id="8714" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="8711"><span data-dcnode-id="8712" instrument_node="">Control education</span></td><td class="align-left" data-dcnode-id="8709"><span data-dcnode-id="8710" instrument_node="">Simplification of learning and research</span></td><td class="align-left" data-dcnode-id="8707"><span data-dcnode-id="8708" instrument_node="">Prototyped on Arduino and Implemented a small-sized investigational device that facilitated control education.</span></td><td class="align-left" data-dcnode-id="8705"><span data-dcnode-id="8706" instrument_node="">Because Arduino systems are cheap and easy-to-use, they hold enormous advantages over traditional learning techniques which does not place much emphasis on practicality as it does on theory.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8688"><td class="align-left" data-dcnode-id="8701"><a class="workspace-trigger" data-dcnode-id="8702" href="#b158" name="bb158"><span data-dcnode-id="8703" instrument_node="">[158]</span></a></td><td class="align-left" data-dcnode-id="8699"><span data-dcnode-id="8700" instrument_node="">Sohn, 2014, Design and Evaluation of Computer Programming Education Strategy Using Arduino.</span></td><td class="align-left" data-dcnode-id="8697"><span data-dcnode-id="8698" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="8695"><span data-dcnode-id="8696" instrument_node="">Computer Programming Education</span></td><td class="align-left" data-dcnode-id="8693"><span data-dcnode-id="8694" instrument_node="">An environment for making software and hardware learning easier.</span></td><td class="align-left" data-dcnode-id="8691"><span data-dcnode-id="8692" instrument_node="">It developed a teaching and learning model that borrowed heavily from Arduino-based programming education.</span></td><td class="align-left" data-dcnode-id="8689"><span data-dcnode-id="8690" instrument_node="">The model presented makes learning coding easier.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8672"><td class="align-left" data-dcnode-id="8685"><a class="workspace-trigger" data-dcnode-id="8686" href="#b159" name="bb159"><span data-dcnode-id="8687" instrument_node="">[159]</span></a></td><td class="align-left" data-dcnode-id="8683"><span data-dcnode-id="8684" instrument_node="">Cheng et al 2016, Establishing the connection between control theory education and application: An Arduino based rapid control prototyping approach.</span></td><td class="align-left" data-dcnode-id="8681"><span data-dcnode-id="8682" instrument_node="">Arduino Due</span></td><td class="align-left" data-dcnode-id="8679"><span data-dcnode-id="8680" instrument_node="">Control education</span></td><td class="align-left" data-dcnode-id="8677"><span data-dcnode-id="8678" instrument_node="">Offers an alternative to existing control education approaches.</span></td><td class="align-left" data-dcnode-id="8675"><span data-dcnode-id="8676" instrument_node="">The introduction of digital simulation and hardware-in-loop simulation into the teaching profession is aimed at using these Arduino-based rapid control prototyping approaches to diminish the gap between classroom theory and real-life application.</span></td><td class="align-left" data-dcnode-id="8673"><span data-dcnode-id="8674" instrument_node="">Digital simulation makes learning easier and hardware-in-loop simulation makes it easier to see a practical implementation of whatever is taught in the classroom.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8656"><td class="align-left" data-dcnode-id="8669"><a class="workspace-trigger" data-dcnode-id="8670" href="#b160" name="bb160"><span data-dcnode-id="8671" instrument_node="">[160]</span></a></td><td class="align-left" data-dcnode-id="8667"><span data-dcnode-id="8668" instrument_node="">Zieris et al 2015, Using Arduino-Based Experiments to Integrate Computer Science Education and Natural Science.</span></td><td class="align-left" data-dcnode-id="8665"><span data-dcnode-id="8666" instrument_node="">Arduino Mega</span></td><td class="align-left" data-dcnode-id="8663"><span data-dcnode-id="8664" instrument_node="">Computer Science Education and Natural Science</span></td><td class="align-left" data-dcnode-id="8661"><span data-dcnode-id="8662" instrument_node="">Integration of computer science with natural science</span></td><td class="align-left" data-dcnode-id="8659"><span data-dcnode-id="8660" instrument_node="">A student-programmed microcontroller is used to perform and evaluate measurements such as that of humidity and pressure, mass and density, etc.</span></td><td class="align-left" data-dcnode-id="8657"><span data-dcnode-id="8658" instrument_node="">Students do not have to depend on industry built calculators if they can build theirs. This way they are trained to be skilled in software and hardware engineering while proffering solutions to problems.</span></td></tr><tr class="valign-top" data-dcnode-id="8640"><td class="align-left" data-dcnode-id="8653"><a class="workspace-trigger" data-dcnode-id="8654" href="#b161" name="bb161"><span data-dcnode-id="8655" instrument_node="">[161]</span></a></td><td class="align-left" data-dcnode-id="8651"><span data-dcnode-id="8652" instrument_node="">Chou, 2018, Skill development and knowledge acquisition cultivated by maker education: Evidence from Arduino-based educational robotics.</span></td><td class="align-left" data-dcnode-id="8649"><span data-dcnode-id="8650" instrument_node="">Arduino Nano</span></td><td class="align-left" data-dcnode-id="8647"><span data-dcnode-id="8648" instrument_node="">Skill development and knowledge acquisition</span></td><td class="align-left" data-dcnode-id="8645"><span data-dcnode-id="8646" instrument_node="">Facilitation of skill development and knowledge acquisition</span></td><td class="align-left" data-dcnode-id="8643"><span data-dcnode-id="8644" instrument_node="">A study group of high school students was divided into two, one group learning Arduino-based robotics and the likes while others learned tailoring and bead making. The first group was found to have become proficient in engineering while the last was not.</span></td><td class="align-left" data-dcnode-id="8641"><span data-dcnode-id="8642" instrument_node="">Arduino, if introduced to young people early enough, has the power to increase their problem-solving capabilities, reasoning capacity, and likelihood to find a career in engineering and acquire high paying skills.</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="8257" id="sec3.2.12"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8628" id="d1e3179"><span data-dcnode-id="8633" instrument_node
