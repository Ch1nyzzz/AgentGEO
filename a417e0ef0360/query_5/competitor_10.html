rument_node="">(Badamasi, 2014) </span><a class="workspace-trigger" data-dcnode-id="10639" href="#b13" name="bb13"><span data-dcnode-id="10640" instrument_node="">[13]</span></a></td><td class="align-left" data-dcnode-id="10636"><span data-dcnode-id="10637" instrument_node="">2014 11 International Conference on Electronics, Computer and Computation (ICECCO)</span></td><td class="align-left" data-dcnode-id="10634"><span data-dcnode-id="10635" instrument_node="">The working principle of an Arduino. 1-4. 10.1109/ICECCO.2014.6997578.</span></td><td class="align-left" data-dcnode-id="10632"><span data-dcnode-id="10633" instrument_node="">2014</span></td><td class="align-left" data-dcnode-id="10630"><span data-dcnode-id="10631" instrument_node="">7</span></td><td class="align-left" data-dcnode-id="10628"><span data-dcnode-id="10629" instrument_node="">160</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="10612"><td class="align-left" data-dcnode-id="10623"><span data-dcnode-id="10626" instrument_node="">(Budiman, Tarigan, &amp; Winata, 2020) </span><a class="workspace-trigger" data-dcnode-id="10624" href="#b59" name="bb59"><span data-dcnode-id="10625" instrument_node="">[59]</span></a></td><td class="align-left" data-dcnode-id="10621"><span data-dcnode-id="10622" instrument_node="">Journal of Physics: Conference Series</span></td><td class="align-left" data-dcnode-id="10619"><span data-dcnode-id="10620" instrument_node="">Arduino UNO and Android Based Digital Lock Using Combination of Vigenere Cipher and XOR Cipher.</span></td><td class="align-left" data-dcnode-id="10617"><span data-dcnode-id="10618" instrument_node="">2020</span></td><td class="align-left" data-dcnode-id="10615"><span data-dcnode-id="10616" instrument_node="">12</span></td><td class="align-left" data-dcnode-id="10613"><span data-dcnode-id="10614" instrument_node="">12</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="10597"><td class="align-left" data-dcnode-id="10608"><span data-dcnode-id="10611" instrument_node="">(Nayyar &amp; Puri, 2016) </span><a class="workspace-trigger" data-dcnode-id="10609" href="#b18" name="bb18"><span data-dcnode-id="10610" instrument_node="">[18]</span></a></td><td class="align-left" data-dcnode-id="10606"><span data-dcnode-id="10607" instrument_node="">3rd International Conference on Computing for Sustainable Global Development</span></td><td class="align-left" data-dcnode-id="10604"><span data-dcnode-id="10605" instrument_node="">A review of Arduino boards, Lilypad’s and Arduino shields</span></td><td class="align-left" data-dcnode-id="10602"><span data-dcnode-id="10603" instrument_node="">2016</span></td><td class="align-left" data-dcnode-id="10600"><span data-dcnode-id="10601" instrument_node="">12</span></td><td class="align-left" data-dcnode-id="10598"><span data-dcnode-id="10599" instrument_node="">56</span></td></tr><tr class="valign-top" data-dcnode-id="10582"><td class="align-left" data-dcnode-id="10593"><span data-dcnode-id="10596" instrument_node="">(Vivek &amp; Lee, 1995) </span><a class="workspace-trigger" data-dcnode-id="10594" href="#b7" name="bb7"><span data-dcnode-id="10595" instrument_node="">[7]</span></a></td><td class="align-left" data-dcnode-id="10591"><span data-dcnode-id="10592" instrument_node="">In Proceedings of the 1995 Asia and South Pacific Design Automation Conference (ASP-DAC ’95). Association for Computing Machinery, New York.</span></td><td class="align-left" data-dcnode-id="10589"><span data-dcnode-id="10590" instrument_node="">Power analysis of a 32-bit embedded microcontroller.</span></td><td class="align-left" data-dcnode-id="10587"><span data-dcnode-id="10588" instrument_node="">1995</span></td><td class="align-left" data-dcnode-id="10585"><span data-dcnode-id="10586" instrument_node="">16</span></td><td class="align-left" data-dcnode-id="10583"><span data-dcnode-id="10584" instrument_node="">49</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="10576"></p><p data-dcnode-id="10577" id="d1e176"><span data-dcnode-id="10578" instrument_node="">Notes: the number of citations is based on figures from Google Scholar as accessed August 2020.</span></p><p></p></div></div><p data-dcnode-id="10572" id="d1e2290"><span data-dcnode-id="10573" instrument_node="">P1: (Arduino* OR Arduino board* OR microcontroller OR embedded system OR Arduino components*)</span></p><p data-dcnode-id="10570" id="d1e2293"><span data-dcnode-id="10571" instrument_node="">P2: (prototype OR prototyped OR prototyping OR prototypes)</span></p><p data-dcnode-id="10568" id="d1e2295"><span data-dcnode-id="10569" instrument_node="">P3: (applications OR appliances OR uses OR domain)</span></p><p data-dcnode-id="10566" id="d1e2297"><span data-dcnode-id="10567" instrument_node="">P4: (advantages OR comparison OR benefits OR selling point)</span></p><p data-dcnode-id="10564" id="d1e2299"><span data-dcnode-id="10565" instrument_node="">P5: (challenge OR challenging OR setbacks OR shortcomings)</span></p><p data-dcnode-id="10562" id="d1e2301"><span data-dcnode-id="10563" instrument_node="">P6: (“prototyping with Arduino” OR “computing platform”)</span></p><p data-dcnode-id="10560" id="d1e2303"><span data-dcnode-id="10561" instrument_node="">P7: (Microprocessor OR Computer* OR “Arduino Algorithms”).</span></p><p data-dcnode-id="10558" id="d1e2305"><span data-dcnode-id="10559" instrument_node="">It was by using these search strings that we were able to eliminate some existing works which though related to our study is irrelevant to us. This way we successfully handled the huge amount of obtainable work and concentrated our efforts on crucial studies that dealt with prototyping with Arduino, its applications, advantages, challenges, and limitations. Following this, we removed all studies that appeared in the list but had previously been scrutinized in another backward or forward snowballing operation.</span></p><div data-dcnode-id="10425"><p data-dcnode-id="10556" id="d1e2307"><span data-dcnode-id="10557" instrument_node="">After this, we removed every study that was found to be missing on any of the literature depositories listed above. Whatever studies that were left after this became candidates for the systematic literature review. These were then subjected to further backward and forward snowballing. At last, neither backward nor forward snowballing yielded new papers leading to the termination of the search process. This way we got a candidate list of about 193 primary studies. Throughout the whole selection process, we ensured seminar papers in workshops and symposia including working notes and papers with four pages or less, were left out since we needed high-quality peer-reviewed papers. Also disqualified were review papers that are not primary studies. We focused on papers published in the last 15&nbsp;years including this year, that is between 2005 and 2020. This is because Arduino only came into existence in 2005 and prior papers on related topics such as those on microcontrollers may not contain the most recent researches in prototyping with Arduino except if a revised edition was recently published. Eventually, 130 primary studies that fully complied with the established criteria were used to source the results presented in this systematic literature review.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="10426" id="tbl2"><span class="captions" data-dcnode-id="10548"><span data-dcnode-id="10549" id="d1e182"><p data-dcnode-id="10550" id="d1e183"><span class="label" data-dcnode-id="10554"><span data-dcnode-id="10555" instrument_node="">Table 2</span></span><span data-dcnode-id="10553" instrument_node="">. </span><span data-dcnode-id="10551" instrument_node="">A streamlined summary of the data extraction pattern.</span></p></span></span><div class="groups" data-dcnode-id="10433"><table data-dcnode-id="10434"><tbody data-dcnode-id="10435"><tr class="valign-top" data-dcnode-id="10544"><td class="align-left" data-dcnode-id="10545"><strong data-dcnode-id="10546"><span data-dcnode-id="10547" instrument_node="">RESEARCH OBJECTIVES</span></strong></td></tr><tr class="valign-top" data-dcnode-id="10540"><td class="align-left" data-dcnode-id="10541"><em data-dcnode-id="10542"><span data-dcnode-id="10543" instrument_node="">RESEARCH QUESTION-1</span></em></td></tr><tr class="valign-top" data-dcnode-id="10533"><td class="align-left" data-dcnode-id="10534"><span data-dcnode-id="10539" instrument_node="">- Arduino Board Variants</span><a class="workspace-trigger" data-dcnode-id="10536" href="#tblfn2a" name="btblfn2a"><sup data-dcnode-id="10537"><span data-dcnode-id="10538" instrument_node="">a</span></sup></a><span data-dcnode-id="10535" instrument_node=""> (Arduino Uno, Arduino Due, Arduino Mega, Arduino Nano)</span></td></tr><tr class="valign-top" data-dcnode-id="10526"><td class="align-left" data-dcnode-id="10527"><span data-dcnode-id="10532" instrument_node="">- Technical specifications of each variant</span><a class="workspace-trigger" data-dcnode-id="10529" href="#tblfn2a" name="btblfn2a"><sup data-dcnode-id="10530"><span data-dcnode-id="10531" instrument_node="">a</span></sup></a><span data-dcnode-id="10528" instrument_node=""> (number of digital and analog IO pins, memory, processor, etc)</span></td></tr><tr class="valign-top" data-dcnode-id="10520"><td class="align-left" data-dcnode-id="10521"><span data-dcnode-id="10525" instrument_node="">- Advantages of each variant</span><a class="workspace-trigger" data-dcnode-id="10522" href="#tblfn2a" name="btblfn2a"><sup data-dcnode-id="10523"><span data-dcnode-id="10524" instrument_node="">a</span></sup></a></td></tr><tr class="valign-top" data-dcnode-id="10514"><td class="align-left" data-dcnode-id="10515"><span data-dcnode-id="10519" instrument_node="">- Limitations of each variant</span><a class="workspace-trigger" data-dcnode-id="10516" href="#tblfn2a" name="btblfn2a"><sup data-dcnode-id="10517"><span data-dcnode-id="10518" instrument_node="">a</span></sup></a></td></tr><tr class="valign-top" data-dcnode-id="10508"><td class="align-left" data-dcnode-id="10509"><span data-dcnode-id="10513" instrument_node="">- Specific applications of each variant</span><a class="workspace-trigger" data-dcnode-id="10510" href="#tblfn2a" name="btblfn2a"><sup data-dcnode-id="10511"><span data-dcnode-id="10512" instrument_node="">a</span></sup></a></td></tr><tr class="valign-top" data-dcnode-id="10506"><td class="align-left" data-dcnode-id="10507"></td></tr><tr class="valign-top" data-dcnode-id="10502"><td class="align-left" data-dcnode-id="10503"><em data-dcnode-id="10504"><span data-dcnode-id="10505" instrument_node="">RESEARCH QUESTION-2</span></em></td></tr><tr class="valign-top" data-dcnode-id="10495"><td class="align-left" data-dcnode-id="10496"><span data-dcnode-id="10501" instrument_node="">- Application Domains of Arduino</span><a class="workspace-trigger" data-dcnode-id="10498" href="#tblfn2a" name="btblfn2a"><sup data-dcnode-id="10499"><span data-dcnode-id="10500" instrument_node="">a</span></sup></a><span data-dcnode-id="10497" instrument_node=""> (systems design, general-purpose applications, home automation, etc)</span></td></tr><tr class="valign-top" data-dcnode-id="10489"><td class="align-left" data-dcnode-id="10490"><span data-dcnode-id="10494" instrument_node="">- Advantages of using Arduino for prototyping in the reviewed domains</span><a class="workspace-trigger" data-dcnode-id="10491" href="#tblfn2a" name="btblfn2a"><sup data-dcnode-id="10492"><span data-dcnode-id="10493" instrument_node="">a</span></sup></a></td></tr><tr class="valign-top" data-dcnode-id="10483"><td class="align-left" data-dcnode-id="10484"><span data-dcnode-id="10488" instrument_node="">- Challenges of using Arduino for prototyping in the reviewed domains</span><a class="workspace-trigger" data-dcnode-id="10485" href="#tblfn2a" name="btblfn2a"><sup data-dcnode-id="10486"><span data-dcnode-id="10487" instrument_node="">a</span></sup></a></td></tr><tr class="valign-top" data-dcnode-id="10477"><td class="align-left" data-dcnode-id="10478"><span data-dcnode-id="10482" instrument_node="">- Limitations of using Arduino for prototyping in the reviewed domains</span><a class="workspace-trigger" data-dcnode-id="10479" href="#tblfn2a" name="btblfn2a"><sup data-dcnode-id="10480"><span data-dcnode-id="10481" instrument_node="">a</span></sup></a></td></tr><tr class="valign-top" data-dcnode-id="10475"><td class="align-left" data-dcnode-id="10476"></td></tr><tr class="valign-top" data-dcnode-id="10472"><td class="align-left" data-dcnode-id="10473"><span data-dcnode-id="10474" instrument_node="">RESEARCH QUESTION-3</span></td></tr><tr class="valign-top" data-dcnode-id="10465"><td class="align-left" data-dcnode-id="10466"><span data-dcnode-id="10471" instrument_node="">- Alternatives to Arduino Board</span><a class="workspace-trigger" data-dcnode-id="10468" href="#tblfn2a" name="btblfn2a"><sup data-dcnode-id="10469"><span data-dcnode-id="10470" instrument_node="">a</span></sup></a><span data-dcnode-id="10467" instrument_node=""> (Raspberry Pi, BeagleBone, Sharks Cove, Waspmote)</span></td></tr><tr class="valign-top" data-dcnode-id="10459"><td class="align-left" data-dcnode-id="10460"><span data-dcnode-id="10464" instrument_node="">- Strengths and weaknesses of each of the alternatives</span><a class="workspace-trigger" data-dcnode-id="10461" href="#tblfn2a" name="btblfn2a"><sup data-dcnode-id="10462"><span data-dcnode-id="10463" instrument_node="">a</span></sup></a></td></tr><tr class="valign-top" data-dcnode-id="10457"><td class="align-left" data-dcnode-id="10458"></td></tr><tr class="valign-top" data-dcnode-id="10453"><td class="align-left" data-dcnode-id="10454"><em data-dcnode-id="10455"><span data-dcnode-id="10456" instrument_node="">RESEARCH QUESTION-4</span></em></td></tr><tr class="valign-top" data-dcnode-id="10450"><td class="align-left" data-dcnode-id="10451"><span data-dcnode-id="10452" instrument_node="">- Hardware and software used in Arduino</span></td></tr><tr class="valign-top" data-dcnode-id="10443"><td class="align-left" data-dcnode-id="10444"><span data-dcnode-id="10449" instrument_node="">- Hardware components</span><a class="workspace-trigger" data-dcnode-id="10446" href="#tblfn2a" name="btblfn2a"><sup data-dcnode-id="10447"><span data-dcnode-id="10448" instrument_node="">a</span></sup></a><span data-dcnode-id="10445" instrument_node=""> (Sensors, connectors, accessories, microcontroller, etc)</span></td></tr><tr class="valign-top" data-dcnode-id="10436"><td class="align-left" data-dcnode-id="10437"><span data-dcnode-id="10442" instrument_node="">- Software packages used</span><a class="workspace-trigger" data-dcnode-id="10439" href="#tblfn2a" name="btblfn2a"><sup data-dcnode-id="10440"><span data-dcnode-id="10441" instrument_node="">a</span></sup></a><span data-dcnode-id="10438" instrument_node=""> (Arduino IDE, software for data storage, analysis, and output)</span></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="10427"><dt data-dcnode-id="10431" id="tblfn2a"><span data-dcnode-id="10432" instrument_node="">a</span></dt><dd data-dcnode-id="10428"><p data-dcnode-id="10429" id="d1e304"><span data-dcnode-id="10430" instrument_node="">Multiple values possible.</span></p></dd></dl></div></div></section><section data-dcnode-id="10409" id="sec2.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10418" id="d1e2314"><span data-dcnode-id="10423" instrument_node="">2.3</span><span data-dcnode-id="10421" instrument_node="">. </span><span data-dcnode-id="10419" instrument_node="">Data extraction</span></h3><p data-dcnode-id="10410" id="d1e2316"><span data-dcnode-id="10417" instrument_node="">Data were gotten from the selected primary studies to answer the questions posed by our research questions. The data extracted to answer all the research questions, be they RESEARCH QUESTION-1, RESEARCH QUESTION-2, RESEARCH QUESTION-3, or RESEARCH QUESTION-4, are associated with the methodology suggested by particular literature as illustrated in </span><a class="workspace-trigger" data-dcnode-id="10415" href="#tbl2" name="btbl2"><span data-dcnode-id="10416" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="10414" instrument_node="">. A careful analysis of all primary studies was instrumental in successfully extracting all necessary data for the SLR. A template to be used for the collection of the information needed for the data extraction was designed in line with what is in </span><a class="workspace-trigger" data-dcnode-id="10412" href="#tbl2" name="btbl2"><span data-dcnode-id="10413" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="10411" instrument_node="">. The authors of this review shared the responsibility of extracting the data and filling them into the template. They also worked together to double-check all extracted information irrespective of the person responsible for extracting that particular information. They then raised objections and discussed disagreements with the person that extracted the information. In some cases, they could not reach a consensus amongst themselves and had to involve other researchers for possible resolution of the disagreement as well as further discussion of the area in contention.</span></p></section><section data-dcnode-id="10397" id="sec2.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10403" id="d1e2337"><span data-dcnode-id="10408" instrument_node="">2.4</span><span data-dcnode-id="10406" instrument_node="">. </span><span data-dcnode-id="10404" instrument_node="">Threats to validity</span></h3><p data-dcnode-id="10398" id="d1e2339"><span data-dcnode-id="10402" instrument_node="">A couple of threats to the validity and legitimacy of this systematic review were identified. These threats were mostly in two aspects. These study selection bias and likely inaccuracies in the cause of data extraction and analysis. Being that the process of selecting studies depends on the search strategy adopted, the chosen literature sources, the criteria for selection, and the quality criteria certain limitations are bound to occur. Firstly, as detailed by&nbsp;</span><a class="workspace-trigger" data-dcnode-id="10400" href="#b57" name="bb57"><span data-dcnode-id="10401" instrument_node="">[57]</span></a><span data-dcnode-id="10399" instrument_node="">, multiple databases are usually used for literature searches in studies like this. Moreover, it is always necessary to make available a clear, but concise, certification of the deployed search strategy to make it easier to replicate the search at some later stage of the study. In our study, we incorporated a filter of the titles of publications in an initial stage and used a predefined search string. The need for a predefined search string stems from our intention to only examine primary studies that are dwelt on our topic of discussion: Prototyping with Arduino, Applications, Advantages, Challenges, and Limitations. To that end, we focused on publication titles that could be said to have hit the nail on the head in terms of the words used. Those that rather had unrelated terms like “building sensors with a computing platform” will automatically be filtered out. We have also limited our choice of publications to those written in the English language excluding by default relevant studies that are not written in the English language. These publications are also by requirement expected to only be journals and conference papers whose papers do not number less than four in pages, written in the English language, remember. There is no gainsaying that if our net had been cast wider more results could have been found. Excluded gray literature including those of Ph.D. and Master’s theses, technical reports, working notes, white papers, workshop, and symposium papers could have provided fertile ground for relevant ideas, ideas perhaps missed in the publications that eventually made the cut. Luckily, we did spread our net quite wide in the community of the type of publications we wanted for our systematic literature review so much so that a large number of publications studied revealed more information than we initially set out to find, answered all our research questions and gave new insights. It is also worth saying that some of the excluded gray literature such as Ph.D. and Master’s theses end up being published in journals or as conference papers. In this case, these papers may have already been considered not in their natural form but in a form acceptable to our stated criteria for selecting publications. Excluding them, therefore, helps us avoid duplicating primary studies within a literature review. We also recognized ab initio that inaccurate data extraction is a possible threat and so we set out to mitigate against it right away by developing a specialized template for data extraction. To also reduce inaccuracies during data extraction, prompt resolution of disagreements between data checker and extractor was deemed a priority. Researchers weighed all the contentious issues and chose the best line of action at every point.</span></p></section></section><section data-dcnode-id="7240" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10390" id="d1e2364"><span data-dcnode-id="10395" instrument_node="">3</span><span data-dcnode-id="10393" instrument_node="">. </span><span data-dcnode-id="10391" instrument_node="">Results</span></h2><p data-dcnode-id="10388" id="d1e2366"><span data-dcnode-id="10389" instrument_node="">In this section, we report the aggregated results per research question based on the data we extracted from primary studies.</span></p><section data-dcnode-id="10069" id="sec3.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10382" id="d1e2371"><span data-dcnode-id="10387" instrument_node="">3.1</span><span data-dcnode-id="10385" instrument_node="">. </span><span data-dcnode-id="10383" instrument_node="">Variants of arduino boards (RESEARCH QUESTION-1)</span></h3><p data-dcnode-id="10365" id="d1e2373"><span data-dcnode-id="10381" instrument_node="">Here we considered the different variants of Arduino boards that are currently in existence. A whole number of boards were identified from a couple of the publications that formed our primary study&nbsp;</span><a class="workspace-trigger" data-dcnode-id="10379" href="#b60" name="bb60"><span data-dcnode-id="10380" instrument_node="">[60]</span></a><span data-dcnode-id="10378" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10376" href="#b61" name="bb61"><span data-dcnode-id="10377" instrument_node="">[61]</span></a><span data-dcnode-id="10375" instrument_node="">, and&nbsp;</span><a class="workspace-trigger" data-dcnode-id="10373" href="#b11" name="bb11"><span data-dcnode-id="10374" instrument_node="">[11]</span></a><span data-dcnode-id="10372" instrument_node="">. Several variants of Arduino boards are available in the market, but only a handful are most often used by engineers and hobbyists (see </span><a class="workspace-trigger" data-dcnode-id="10370" href="#fig4" name="bfig4"><span data-dcnode-id="10371" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="10369" instrument_node="">). Some of these commonly used Arduino boards include (see </span><a class="workspace-trigger" data-dcnode-id="10367" href="#fig4" name="bfig4"><span data-dcnode-id="10368" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="10366" instrument_node="">):</span></p><div data-dcnode-id="10338"><p data-dcnode-id="10364" id="d1e2392"></p><figure class="figure text-xs" data-dcnode-id="10339" id="fig4"><span data-dcnode-id="10348"><img alt="" aria-describedby="d1e47" data-dcnode-id="10363" height="369" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr4.jpg&amp;raw"><span data-dcnode-id="10362" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10349"><li data-dcnode-id="10356"><a class="anchor download-link u-font-sans" data-dcnode-id="10357" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr4_lrg.jpg" target="_blank" title="Download high-res image (656KB)"><span class="anchor-text" data-dcnode-id="10358"><span data-dcnode-id="10361" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10359"><span data-dcnode-id="10360" instrument_node="">Download high-res image (656KB)</span></span></span></a></li><li data-dcnode-id="10350"><a class="anchor download-link u-font-sans" data-dcnode-id="10351" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10352"><span data-dcnode-id="10355" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10353"><span data-dcnode-id="10354" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10340"><span data-dcnode-id="10341" id="d1e47"><p data-dcnode-id="10342" id="d1e48"><span class="label" data-dcnode-id="10346"><span data-dcnode-id="10347" instrument_node="">Fig. 4</span></span><span data-dcnode-id="10345" instrument_node="">. </span><span data-dcnode-id="10343" instrument_node="">Arduino Variants. (a) Arduino Uno, (b) Arduino Due, (c) Arduino Mega (d) Arduino Nano.</span></p></span></span></figure></div><section data-dcnode-id="10323" id="sec3.1.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10332" id="d1e2398"><span data-dcnode-id="10337" instrument_node="">3.1.1</span><span data-dcnode-id="10335" instrument_node="">. </span><span data-dcnode-id="10333" instrument_node="">Arduino UNO</span></h4><p data-dcnode-id="10330" id="d1e2400"><span data-dcnode-id="10331" instrument_node="">The UNO is perhaps the most popular Arduino board in the market and the industry. Powered by an Atmega328 processor that operates at 16&nbsp;MHz, the Arduino Uno board is widely used. Its​ 32&nbsp;KB of program memory, 1&nbsp;KB of EEPROM, and 2&nbsp;KB of RAM does not make it the board with the most storage space but users seem to love it just the way it is, as well as forgive its shortcomings in having only 14 digital I/O, 6 analog inputs, and both 5&nbsp;V and 3.3&nbsp;V power rails.</span></p><p data-dcnode-id="10328" id="d1e2410"><span data-dcnode-id="10329" instrument_node="">The Arduino UNO does have a pin header arrangement that is quickly becoming the industry standard for development boards. This pin header makes Arduino Uno compatible with most development board shields on the market. The shields, explained later, are connected to the boards through the pin header to enhance the capabilities and increase the functionalities of the Arduino board.</span></p><p data-dcnode-id="10326" id="d1e2412"><span data-dcnode-id="10327" instrument_node="">Every Arduino Uno comes with a power jack. A power jack is important because it allows the Arduino Uno to be powered by an external wall wart. An alternative means of connection to a power source known as VIN does also exist. The VIN option is available for connecting the UNO to batteries.</span></p><p data-dcnode-id="10324" id="d1e2414"><span data-dcnode-id="10325" instrument_node="">At 69&nbsp;mm in length and 54&nbsp;mm in width, the physical dimensions of the UNO make it a small development board that can easily fit into many projects. The presence of four screw holes allows designers, hobbyists, and engineers to securely fit them into place.</span></p></section><section data-dcnode-id="10312" id="sec3.1.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10317" id="d1e2419"><span data-dcnode-id="10322" instrument_node="">3.1.2</span><span data-dcnode-id="10320" instrument_node="">. </span><span data-dcnode-id="10318" instrument_node="">Arduino due</span></h4><p data-dcnode-id="10315" id="d1e2421"><span data-dcnode-id="10316" instrument_node="">The Arduino Due, which together with Arduino Mega has the largest board of all the variants of Arduino boards is the only Arduino board that is powered by an ARM processor, the AT91SAM3X8E Cortex-M3, and does indeed operate at a higher speed than others — 84&nbsp;MHz.</span></p><p data-dcnode-id="10313" id="d1e2423"><span data-dcnode-id="10314" instrument_node="">Unlike the Arduino UNO and Arduino Nano that operate at 5&nbsp;V, the Arduino Due operates at a lesser 3.3&nbsp;V. The voltage may be small but reduces overvoltage which if not checked usually leads to damaged boards. With 512&nbsp;KB of ROM and 96&nbsp;KB RAM, the Arduino Due has a relatively large memory space compared to other boards. Although the absence of EEPROM coupled with the fact that it is Arduino’s most expensive board also gives enough room for Due’s criticism. In its favor, the import Arduino due has 54 digital I/O pins, 12 PWM channels, 12 analog inputs, and 2 analog outputs. It also has a large number of pin headers which are important for connecting to Due’s many digital I/O. It does specifically have a pin-l that is​ compatible with most Arduino shields. Software compatibility with the Due, however, is not always certain.</span></p></section><section data-dcnode-id="10301" id="sec3.1.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10306" id="d1e2444"><span data-dcnode-id="10311" instrument_node="">3.1.3</span><span data-dcnode-id="10309" instrument_node="">. </span><span data-dcnode-id="10307" instrument_node="">Arduino mega</span></h4><p data-dcnode-id="10304" id="d1e2446"><span data-dcnode-id="10305" instrument_node="">The Arduino Mega compared be with the Arduino Due in many ways. One, it has the same size and also because it also has 54 I/O. But unlike the Due, the Arduino Mega is not powered by an ARM processor but rather by an ATmega2560. The processor has a clock speed of 16&nbsp;MHz. It has a relatively modest storage space consisting of 256&nbsp;KB of ROM, 8&nbsp;KB of RAM, 4&nbsp;KB of EEPROM. It operates at 5&nbsp;V and is easy to use not least because several electronics operate at the same 5&nbsp;V.</span></p><p data-dcnode-id="10302" id="d1e2448"><span data-dcnode-id="10303" instrument_node="">The Arduino Mega has 16 analog inputs, 15 PWM channels, a header pinout that is just like that of the Due. Its hardware is compatible with Arduino shields but sometimes lacks software compatibility.</span></p></section><section data-dcnode-id="10070" id="sec3.1.4"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10295" id="d1e2461"><span data-dcnode-id="10300" instrument_node="">3.1.4</span><span data-dcnode-id="10298" instrument_node="">. </span><span data-dcnode-id="10296" instrument_node="">Arduino nano</span></h4><p data-dcnode-id="10293" id="d1e2463"><span data-dcnode-id="10294" instrument_node="">On the surface of it, the Arduino Nano is a mini Arduino Uno. This is because the Arduino nano is an Arduino UNO shrunk into a very small profile. But a great advantage lies in its minute-ness. This small size makes the Arduino Nano a very good fit for projects that need their weights reduced for some reason. It also makes it easier for the Arduino Nano to be securely kept in tight spaces. Previous versions of the Arduino Nano used ATmega168 which could be said to be half of Arduino Uno’s Atmega328. Current versions have reverted to the full ATmega328 processor and operate at the same 16&nbsp;MHz as does the Arduino Uno.</span></p><p data-dcnode-id="10291" id="d1e2465"><span data-dcnode-id="10292" instrument_node="">Just like the Arduino UNO, the Arduino Uno has 32&nbsp;KB of program memory, 1&nbsp;KB of EEPROM, 2&nbsp;KB of RAM as well as 14 digital I/O and 6 analog inputs and both 5&nbsp;V and 3.3&nbsp;V power rails.</span></p><p data-dcnode-id="10289" id="d1e2467"><span data-dcnode-id="10290" instrument_node="">But unlike the UNO, the Nano cannot connect to Arduino shields despite having pin headers. It does use its pin headers for breadboard prototyping and in PCBs with the use of a socket. Arduino Nano boards are the cheapest Arduino board option in the market. This makes them cost-effective for large projects.</span></p><p data-dcnode-id="10287" id="d1e2469"><span data-dcnode-id="10288" instrument_node="">Comparing the variants of Arduino boards.</span></p><p data-dcnode-id="10285" id="d1e2471"><span data-dcnode-id="10286" instrument_node="">The physical dimensions of the Arduino Nano are the smallest of all the variants and therefore make the Nano a very portable device. The UNO is a medium-sized development board yet it is still small enough to be mounted to many projects including remote-controlled devices such as RC cars and boats. The Mega and Due are by far larger boards. Hence, they are difficult to use in space-restricted applications.</span></p><p data-dcnode-id="10283" id="d1e2473"><span data-dcnode-id="10284" instrument_node="">For projects requiring high processing power, it will be best the Due, which has a potent ARM core and enormous RAM/ROM, is used. While the Mega is a large Arduino with plenty of GPIO, its CPU speed is still the same as that found on the UNO and Nano (partly because they all belong to the same Mega family). The Arduino Mega, therefore, offers no speed advantage.</span></p><p data-dcnode-id="10281" id="d1e2475"><span data-dcnode-id="10282" instrument_node="">The UNO and Nano use the same processor, the Atmega328. This means that in terms of hardware and peripherals the UNO and Nano are identical. If a project requires plenty of GPIO, Due and Mega are the best options to choose from. An application that does not require a strong CPU but needs sufficient GPIO which can best be prototyped with Arduino Mega.</span></p><p data-dcnode-id="10276" id="d1e2477"><span data-dcnode-id="10280" instrument_node="">With 12 analog inputs and about 2 analog outputs, the Android Due is the leader in the prototyping and development of analog projects. Others can also be used but they are by nature not as effective (see </span><a class="workspace-trigger" data-dcnode-id="10278" href="#tbl3" name="btbl3"><span data-dcnode-id="10279" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="10277" instrument_node="">).</span></p><p data-dcnode-id="10274" id="d1e2485"><span data-dcnode-id="10275" instrument_node="">Finally, we compare the different Arduino boards by looking at certain key factors:</span></p><p data-dcnode-id="10242" id="d1e2488"></p><dl class="list" data-dcnode-id="10243"><dt class="list-label" data-dcnode-id="10272"><span data-dcnode-id="10273" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="10269"><p data-dcnode-id="10270" id="d1e2494"><span data-dcnode-id="10271" instrument_node="">Physical dimensions</span></p></dd><dt class="list-label" data-dcnode-id="10267"><span data-dcnode-id="10268" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="10264"><p data-dcnode-id="10265" id="d1e2499"><span data-dcnode-id="10266" instrument_node="">Processor and CPU power</span></p></dd><dt class="list-label" data-dcnode-id="10262"><span data-dcnode-id="10263" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="10259"><p data-dcnode-id="10260" id="d1e2504"><span data-dcnode-id="10261" instrument_node="">I/O capability</span></p></dd><dt class="list-label" data-dcnode-id="10257"><span data-dcnode-id="10258" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="10254"><p data-dcnode-id="10255" id="d1e2509"><span data-dcnode-id="10256" instrument_node="">Voltage</span></p></dd><dt class="list-label" data-dcnode-id="10252"><span data-dcnode-id="10253" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="10249"><p data-dcnode-id="10250" id="d1e2514"><span data-dcnode-id="10251" instrument_node="">Memory size</span></p></dd><dt class="list-label" data-dcnode-id="10247"><span data-dcnode-id="10248" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="10244"><p data-dcnode-id="10245" id="d1e2519"><span data-dcnode-id="10246" instrument_node="">Kinds of projects best suited for, etc.</span></p></dd></dl><p></p><div data-dcnode-id="10071"><p data-dcnode-id="10241" id="d1e2521"></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="10072" id="tbl3"><span class="captions" data-dcnode-id="10234"><span data-dcnode-id="10235" id="d1e309"><p data-dcnode-id="10236" id="d1e310"><span class="label" data-dcnode-id="10239"><span data-dcnode-id="10240" instrument_node="">Table 3</span></span><span data-dcnode-id="10238" instrument_node="">. </span><span data-dcnode-id="10237" instrument_node="">Summary of Arduino boards and applications.</span></p></span></span><div class="groups" data-dcnode-id="10073"><table data-dcnode-id="10074"><thead data-dcnode-id="10210"><tr class="valign-top" data-dcnode-id="10211"><th class="align-left" data-dcnode-id="10232" scope="col"><span data-dcnode-id="10233" instrument_node="">Name of the Board</span></th><th class="align-left" data-dcnode-id="10228" scope="col"><span data-dcnode-id="10231" instrument_node="">Dimensions </span><br data-dcnode-id="10230"><span data-dcnode-id="10229" instrument_node="">(mm)</span></th><th class="align-left" data-dcnode-id="10224" scope="col"><span data-dcnode-id="10227" instrument_node="">CPU </span><br data-dcnode-id="10226"><span data-dcnode-id="10225" instrument_node="">Power &amp; processor</span></th><th class="align-left" data-dcnode-id="10220" scope="col"><span data-dcnode-id="10223" instrument_node="">I/O </span><br data-dcnode-id="10222"><span data-dcnode-id="10221" instrument_node="">capability</span></th><th class="align-left" data-dcnode-id="10218" scope="col"><span data-dcnode-id="10219" instrument_node="">Voltage</span></th><th class="align-left" data-dcnode-id="10216" scope="col"><span data-dcnode-id="10217" instrument_node="">Memory Size</span></th><th class="align-left" data-dcnode-id="10214" scope="col"><span data-dcnode-id="10215" instrument_node="">Kinds of Projects best suited to prototyping</span></th><th class="align-left" data-dcnode-id="10212" scope="col"><span data-dcnode-id="10213" instrument_node="">Components</span></th></tr></thead><tbody data-dcnode-id="10075"><tr class="valign-top rowsep-1" data-dcnode-id="10176"><td class="align-left" data-dcnode-id="10208"><span data-dcnode-id="10209" instrument_node="">Arduino Uno</span></td><td class="align-left" data-dcnode-id="10191"><span data-dcnode-id="10207" instrument_node="">69 </span><span class="math" data-dcnode-id="10193"><span class="MathJax_Preview" data-dcnode-id="10206" style=""></span><span class="MathJax_SVG" data-dcnode-id="10196" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mo is=&quot;true&quot;>&amp;#xD7;</mo></math>" id="MathJax-Element-4-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="10201" focusable="false" height="1.584ex" role="img" style="vertical-align: 0.019ex; margin-bottom: -0.181ex;" viewBox="0 -612.2 778.5 682" width="1.808ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="10202" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="10203" is="true"><use data-dcnode-id="10204" href="#MJMAIN-D7"><path d="M630 29Q630 9 609 9Q604 9 587 25T493 118L389 222L284 117Q178 13 175 11Q171 9 168 9Q160 9 154 15T147 29Q147 36 161 51T255 146L359 250L255 354Q174 435 161 449T147 471Q147 480 153 485T168 490Q173 490 rigger" data-dcnode-id="9955" href="#b90" name="bb90"><span data-dcnode-id="9956" instrument_node="">[90]</span></a><span data-dcnode-id="9954" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9952" href="#b91" name="bb91"><span data-dcnode-id="9953" instrument_node="">[91]</span></a><span data-dcnode-id="9951" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9949" href="#b92" name="bb92"><span data-dcnode-id="9950" instrument_node="">[92]</span></a><span data-dcnode-id="9948" instrument_node=""> and&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9946" href="#b93" name="bb93"><span data-dcnode-id="9947" instrument_node="">[93]</span></a><span data-dcnode-id="9945" instrument_node="">; defense&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9943" href="#b94" name="bb94"><span data-dcnode-id="9944" instrument_node="">[94]</span></a><span data-dcnode-id="9942" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9940" href="#b95" name="bb95"><span data-dcnode-id="9941" instrument_node="">[95]</span></a><span data-dcnode-id="9939" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9937" href="#b96" name="bb96"><span data-dcnode-id="9938" instrument_node="">[96]</span></a><span data-dcnode-id="9936" instrument_node=""> and&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9934" href="#b97" name="bb97"><span data-dcnode-id="9935" instrument_node="">[97]</span></a><span data-dcnode-id="9933" instrument_node="">; and education&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9931" href="#b60" name="bb60"><span data-dcnode-id="9932" instrument_node="">[60]</span></a><span data-dcnode-id="9930" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9928" href="#b98" name="bb98"><span data-dcnode-id="9929" instrument_node="">[98]</span></a><span data-dcnode-id="9927" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9925" href="#b99" name="bb99"><span data-dcnode-id="9926" instrument_node="">[99]</span></a><span data-dcnode-id="9924" instrument_node=""> and&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9922" href="#b100" name="bb100"><span data-dcnode-id="9923" instrument_node="">[100]</span></a><span data-dcnode-id="9921" instrument_node=""> (see </span><a class="workspace-trigger" data-dcnode-id="9919" href="#fig5" name="bfig5"><span data-dcnode-id="9920" instrument_node="">Fig.&nbsp;5</span></a><span data-dcnode-id="9918" instrument_node="">).</span></p><div data-dcnode-id="9890"><p data-dcnode-id="9916" id="d1e2669"></p><figure class="figure text-xs" data-dcnode-id="9891" id="fig5"><span data-dcnode-id="9900"><img alt="" aria-describedby="d1e55" data-dcnode-id="9915" height="484" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr5.jpg&amp;raw"><span data-dcnode-id="9914" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="9901"><li data-dcnode-id="9908"><a class="anchor download-link u-font-sans" data-dcnode-id="9909" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr5_lrg.jpg" target="_blank" title="Download high-res image (294KB)"><span class="anchor-text" data-dcnode-id="9910"><span data-dcnode-id="9913" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9911"><span data-dcnode-id="9912" instrument_node="">Download high-res image (294KB)</span></span></span></a></li><li data-dcnode-id="9902"><a class="anchor download-link u-font-sans" data-dcnode-id="9903" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="9904"><span data-dcnode-id="9907" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9905"><span data-dcnode-id="9906" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="9892"><span data-dcnode-id="9893" id="d1e55"><p data-dcnode-id="9894" id="d1e56"><span class="label" data-dcnode-id="9898"><span data-dcnode-id="9899" instrument_node="">Fig. 5</span></span><span data-dcnode-id="9897" instrument_node="">. </span><span data-dcnode-id="9895" instrument_node="">Some of the application domains of Arduino.</span></p></span></span></figure></div><section data-dcnode-id="9872" id="sec3.2.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9884" id="d1e2675"><span data-dcnode-id="9889" instrument_node="">3.2.1</span><span data-dcnode-id="9887" instrument_node="">. </span><span data-dcnode-id="9885" instrument_node="">Systems design</span></h4><p data-dcnode-id="9873" id="d1e2677"><span data-dcnode-id="9883" instrument_node="">Arduino, as well as other computing platforms such as Raspberry Pi, can be used for systems design.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9881" href="#b62" name="bb62"><span data-dcnode-id="9882" instrument_node="">[62]</span></a><span data-dcnode-id="9880" instrument_node=""> describes how Arduino could be used to design overall system architecture as well as the hardware and software components of a wireless sensor network. They conclude that systems such as Arduino are specially adapted for systems design because they are low cost&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9878" href="#b8" name="bb8"><span data-dcnode-id="9879" instrument_node="">[8]</span></a><span data-dcnode-id="9877" instrument_node=""> and highly scalable. Due to Arduino’s scalability, in designing wireless sensor networks, the types of sensors and the number of nodes can be easily amplified at the developer’s discretion. This particularly makes Arduino suitable for the design of a wide variety of environmental monitoring applications. This was confirmed by&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9875" href="#b63" name="bb63"><span data-dcnode-id="9876" instrument_node="">[63]</span></a><span data-dcnode-id="9874" instrument_node=""> which also used Raspberry Pi and Arduino to design a wireless sensor network for environmental monitoring applications.</span></p></section><section data-dcnode-id="9838" id="sec3.2.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9866" id="d1e2694"><span data-dcnode-id="9871" instrument_node="">3.2.2</span><span data-dcnode-id="9869" instrument_node="">. </span><span data-dcnode-id="9867" instrument_node="">General purpose applications</span></h4><p data-dcnode-id="9843" id="d1e2696"><span data-dcnode-id="9865" instrument_node="">Arduino platforms have wide uses in almost all facets of life. Design and implementation techniques that are based on open-source approaches </span><a class="workspace-trigger" data-dcnode-id="9863" href="#b101" name="bb101"><span data-dcnode-id="9864" instrument_node="">[101]</span></a><span data-dcnode-id="9862" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9860" href="#b102" name="bb102"><span data-dcnode-id="9861" instrument_node="">[102]</span></a><span data-dcnode-id="9859" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9857" href="#b103" name="bb103"><span data-dcnode-id="9858" instrument_node="">[103]</span></a><span data-dcnode-id="9856" instrument_node=""> made available on platforms such as Arduino are now deployed in building digital twins for smart manufacturing&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9854" href="#b72" name="bb72"><span data-dcnode-id="9855" instrument_node="">[72]</span></a><span data-dcnode-id="9853" instrument_node="">. Metrological information is important for scholars and stakeholders involved with environmental management. To such people, a sonde, a system for transmitting metrological information and about just any other information, is very important. These sondes can be used to gather information from very deep boreholes by lowering them into the borehole. They can also be attached to a balloon or an aircraft and carried into the upper atmosphere for information. Today, however, these systems are quite expensive to design and implement but with the aid of Arduino, a cheap sonde for coastal applications that is based on Arduino can easily be prototyped and built&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9851" href="#b74" name="bb74"><span data-dcnode-id="9852" instrument_node="">[74]</span></a><span data-dcnode-id="9850" instrument_node="">. This system was built on Arduino Mega and Arduino Uno boards and found to deliver efficiently. Arduino can also be deployed in building a system that automatically controls the laboratory sterilization process&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9848" href="#b104" name="bb104"><span data-dcnode-id="9849" instrument_node="">[104]</span></a><span data-dcnode-id="9847" instrument_node="">.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9845" href="#b105" name="bb105"><span data-dcnode-id="9846" instrument_node="">[105]</span></a><span data-dcnode-id="9844" instrument_node=""> too described how an embedded platform such as Arduino can be used, in conjunction with an artificial neural network, to build a Quantitative recognition of flammable and toxic gases.</span></p><p data-dcnode-id="9839" id="d1e2720"><a class="workspace-trigger" data-dcnode-id="9841" href="#b106" name="bb106"><span data-dcnode-id="9842" instrument_node="">[106]</span></a><span data-dcnode-id="9840" instrument_node=""> also detailed the use of Arduinos and 3D-printers in building research-grade weather stations and ecological devices. Several other application of prototyping with Arduino exists.</span></p></section><section data-dcnode-id="9817" id="sec3.2.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9832" id="d1e2727"><span data-dcnode-id="9837" instrument_node="">3.2.3</span><span data-dcnode-id="9835" instrument_node="">. </span><span data-dcnode-id="9833" instrument_node="">Hardware communication</span></h4><p data-dcnode-id="9818" id="d1e2729"><span data-dcnode-id="9831" instrument_node="">Arduino can be used to prototype systems for hardware communication. Hardware communication has to do with devices that transmit data in form of digital and/or analog signals from one a source device to a target device through telephony technology, network interface cards, Wi-Fi technologies, and devise access points. Hardware communication in satellites have proved to offer useful data in better understanding our world and helping communication itself. Hardware communication devices are ever in need because of the many things they can achieve and platforms to prototypes such devices are darlings in the engineering community. Arduino happens to sit at the top of this pile, ranking first in the list of computing platforms used for prototyping hardware communication devices. This is even made more so by the fact that Arduino is a low-cost alternative for technical instrumentation and research&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9829" href="#b64" name="bb64"><span data-dcnode-id="9830" instrument_node="">[64]</span></a><span data-dcnode-id="9828" instrument_node="">. This means that researchers in hardware communication such as those building a high-temperature information gaining system for stellar energy applications will prefer to use Arduino than more expensive alternatives&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9826" href="#b65" name="bb65"><span data-dcnode-id="9827" instrument_node="">[65]</span></a><span data-dcnode-id="9825" instrument_node="">. Several of the other application domains where prototypes made with Arduino boards have found wide use also involve some level of hardware communication. Studies such as&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9823" href="#b75" name="bb75"><span data-dcnode-id="9824" instrument_node="">[75]</span></a><span data-dcnode-id="9822" instrument_node=""> developed integrated systems that depended on hardware communication to monitor gases, track activities in mines, and incorporate cloud computing into technical operations. In connecting different sensors such as MQ9, and MQ4 to an Arduino board in achieving their goal of building the system,&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9820" href="#b75" name="bb75"><span data-dcnode-id="9821" instrument_node="">[75]</span></a><span data-dcnode-id="9819" instrument_node=""> systems much like similar ones used Arduino massively in prototypes applications that needed some element of hardware communication including network interface cards, Wi-Fi devices, and access points.</span></p></section><section data-dcnode-id="9799" id="sec3.2.4"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9811" id="d1e2751"><span data-dcnode-id="9816" instrument_node="">3.2.4</span><span data-dcnode-id="9814" instrument_node="">. </span><span data-dcnode-id="9812" instrument_node="">Software prototyping</span></h4><p data-dcnode-id="9800" id="d1e2753"><span data-dcnode-id="9810" instrument_node="">Quite frequently, different kinds of software are prototyped with Arduino.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9808" href="#b76" name="bb76"><span data-dcnode-id="9809" instrument_node="">[76]</span></a><span data-dcnode-id="9807" instrument_node=""> discussed what they considered the standard for analysis, demonstrating, and regulation of aeration systems in the non-large-scale mine in which Arduino was chosen as the go-to platform for software prototyping. With Arduino, similar conditions as in existing underground mines were replicated. Sensors were used to measure the airflow and the transfer function of a typical ventilation system was computed with experimental data.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9805" href="#b77" name="bb77"><span data-dcnode-id="9806" instrument_node="">[77]</span></a><span data-dcnode-id="9804" instrument_node=""> described a system for forecasting carboxyhemoglobin levels as a pointer for on-time setting up of self-contained self-rescuers in case of fire in underground mines. This system was to be modeled in the Arduino platform and integrated monitoring and analyzing approaches. Further applications of Arduino in software prototyping were found in&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9802" href="#b78" name="bb78"><span data-dcnode-id="9803" instrument_node="">[78]</span></a><span data-dcnode-id="9801" instrument_node=""> where a state-of-the-art use of the T-Ray imaging unit for crack recognition and mine security was proposed. He showed how Arduino could be used to build the proposed system, to simulate crack identification in mines through the systematic mapping of variations in dielectric properties and thermograph images at a time.</span></p></section><section data-dcnode-id="9754" id="sec3.2.5"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9793" id="d1e2770"><span data-dcnode-id="9798" instrument_node="">3.2.5</span><span data-dcnode-id="9796" instrument_node="">. </span><span data-dcnode-id="9794" instrument_node="">Home automation and general automation</span></h4><p data-dcnode-id="9782" id="d1e2772"><span data-dcnode-id="9792" instrument_node="">Prototypes of home automation devices, as well as those of automation in other fields, can be made with Arduino. intelligent smart home automation and security systems that now disrupt the market and offer alternatives to households are now prototyped with Arduino&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9790" href="#b79" name="bb79"><span data-dcnode-id="9791" instrument_node="">[79]</span></a><span data-dcnode-id="9789" instrument_node="">. Households are wary of systems, be they refrigerators or Siri, that increase their utility bills. This makes&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9787" href="#b107" name="bb107"><span data-dcnode-id="9788" instrument_node="">[107]</span></a><span data-dcnode-id="9786" instrument_node=""> that produced an energy-efficient home automation system an answer to the prayers of many. The system described, and prototyped with Arduino, can smartly schedule tasks and keep members of the household abreast of the schedule of activities, who is to do what and when.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9784" href="#b108" name="bb108"><span data-dcnode-id="9785" instrument_node="">[108]</span></a><span data-dcnode-id="9783" instrument_node=""> also tried solving households’ energy problems by designing an established protocol for smart home energy management systems and prototyping the same with Arduino Uno.</span></p><p data-dcnode-id="9771" id="d1e2786"><span data-dcnode-id="9781" instrument_node="">Robots have also found wide uses in households especially in automation and in helping carry out household functions that were hitherto carried out by humans&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9779" href="#b109" name="bb109"><span data-dcnode-id="9780" instrument_node="">[109]</span></a><span data-dcnode-id="9778" instrument_node="">. System’s like the one in&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9776" href="#b80" name="bb80"><span data-dcnode-id="9777" instrument_node="">[80]</span></a><span data-dcnode-id="9775" instrument_node=""> which illustrated the design of a miniature smart home device that was prototyped with Arduino, tapped into robotics to solve household problems while using Arduino to make the prototypes. Others adopted cutting edge technologies while not forgetting to use Arduino for prototyping and simulation. This category is&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9773" href="#b81" name="bb81"><span data-dcnode-id="9774" instrument_node="">[81]</span></a><span data-dcnode-id="9772" instrument_node=""> which built a smart home device based on IPV6 and ZIGBEE technology but prototyped with Arduino.</span></p><p data-dcnode-id="9763" id="d1e2800"><span data-dcnode-id="9770" instrument_node="">Innovations in the Internet of Things (IoT) have also extended what is possible as far as home automation is concerned. IoT has varied uses in this regard and the number keeps increasing every new hour.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9768" href="#b110" name="bb110"><span data-dcnode-id="9769" instrument_node="">[110]</span></a><span data-dcnode-id="9767" instrument_node=""> did show a way internet of things could be deployed in building a home control (automated) and monitoring system that uses an Android-based smartphone and was prototyped with Arduino. Another Android-based system was presented in&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9765" href="#b111" name="bb111"><span data-dcnode-id="9766" instrument_node="">[111]</span></a><span data-dcnode-id="9764" instrument_node="">. The smart home system described made use of an android application. The prototyping of the system was with Arduino Uno.</span></p><p data-dcnode-id="9755" id="d1e2810"><span data-dcnode-id="9762" instrument_node="">Outside the home, automation has also found wide uses in many other ways and with Arduino, more and more solutions can be prototyped daily. Such solutions include the one in [Kumar] that illustrated the localization and tracking of unmanned vehicles and how this can be prototyped with Arduino computing platforms. Such an automation process was also extended to mine operations and aerial systems.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9760" href="#b66" name="bb66"><span data-dcnode-id="9761" instrument_node="">[66]</span></a><span data-dcnode-id="9759" instrument_node="">, for instance, proposed an internet of things based automation system that could be used to ensure safety and monitor mines operations.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9757" href="#b112" name="bb112"><span data-dcnode-id="9758" instrument_node="">[112]</span></a><span data-dcnode-id="9756" instrument_node=""> on the other hand, described how unmanned aerial systems prototyped with Arduino systems could be used for the mapping of legacy uranium mines. Similar automated systems exist for applications in other areas.</span></p></section><section data-dcnode-id="9711" id="sec3.2.6"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9748" id="d1e2823"><span data-dcnode-id="9753" instrument_node="">3.2.6</span><span data-dcnode-id="9751" instrument_node="">. </span><span data-dcnode-id="9749" instrument_node="">Agriculture</span></h4><p data-dcnode-id="9731" id="d1e2825"><span data-dcnode-id="9747" instrument_node="">Food insufficiency amidst an increasing global population has forced many stakeholders to look for alternatives in increasing food production as well as revenue for farmers and foreign earnings from agriculture exports for countries. This need for alternatives birthed precision agriculture. Precision Agriculture sometimes referred to as satellite agriculture is a concept in farming management which aims to observe, measure and then respond to field variability in crops by making use of a decision support system (DSS) with the overall goal of maximizing outputs from the farm while at the same time utilizing farming resources optimally. Precision agriculture has found uses in diverse areas in agriculture including soil management, crop variety selection, yield prediction, and fruit harvesting. Luckily, innovations in Arduino computing platforms have co with innovations in precision agriculture tools&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9745" href="#b82" name="bb82"><span data-dcnode-id="9746" instrument_node="">[82]</span></a><span data-dcnode-id="9744" instrument_node="">. Today several of the tools needed in agriculture can safely and cheaply be prototyped with Arduino. Several studies detail these application areas of Arduino prototyping in agriculture.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9742" href="#b83" name="bb83"><span data-dcnode-id="9743" instrument_node="">[83]</span></a><span data-dcnode-id="9741" instrument_node=""> described a system for observing soil moisture that used IoT enabled Arduino sensors with neural networks in refining soil management for agriculturalists and to forecast periodic rainfall for anticipating forthcoming yield in North Karnataka-India. Similarly,&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9739" href="#b113" name="bb113"><span data-dcnode-id="9740" instrument_node="">[113]</span></a><span data-dcnode-id="9738" instrument_node=""> proposed using Arduino to build a system that could be deployed in observing the water content in the soil while determining multiple soil–air–vegetation factors.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9736" href="#b82" name="bb82"><span data-dcnode-id="9737" instrument_node="">[82]</span></a><span data-dcnode-id="9735" instrument_node=""> Proposed in great detail how Arduino could be used to prototype a system that can monitor environmental parameters that are usually needed in precision agriculture. Also,&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9733" href="#b84" name="bb84"><span data-dcnode-id="9734" instrument_node="">[84]</span></a><span data-dcnode-id="9732" instrument_node=""> proposed a computerized system for observing soil moistness and directing irrigation with low-cost open-source microcontrollers. These are the same microcontrollers in Arduino boards.</span></p><p data-dcnode-id="9726" id="d1e2856"><span data-dcnode-id="9730" instrument_node="">With smart farming becoming an area of intense research, the need has arisen for applications that will translate research findings and proposed systems into real-life solutions.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9728" href="#b114" name="bb114"><span data-dcnode-id="9729" instrument_node="">[114]</span></a><span data-dcnode-id="9727" instrument_node=""> stepped in to provide a detailed illustration, prototype, and implementation of a smart farming solution that made use of Arduino and data mining.</span></p><p data-dcnode-id="9712" id="d1e2862"><span data-dcnode-id="9725" instrument_node="">Beyond precision agriculture and smart farming,&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9723" href="#b115" name="bb115"><span data-dcnode-id="9724" instrument_node="">[115]</span></a><span data-dcnode-id="9722" instrument_node=""> showed how a low-cost open-source LED system namely Arduino could be deployed for microalgae cultivation.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9720" href="#b116" name="bb116"><span data-dcnode-id="9721" instrument_node="">[116]</span></a><span data-dcnode-id="9719" instrument_node=""> developed some Arduino-based geographic information tools for landscape ecology.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9717" href="#b117" name="bb117"><span data-dcnode-id="9718" instrument_node="">[117]</span></a><span data-dcnode-id="9716" instrument_node=""> developed an easy-to-use and low-cost device for recording photosynthetically active radioactivity that was prototyped with Arduino. Finally,&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9714" href="#b118" name="bb118"><span data-dcnode-id="9715" instrument_node="">[118]</span></a><span data-dcnode-id="9713" instrument_node=""> described a cheap, open-source, robotic data gathering on the farm. Such data is without question helpful in accomplishing a variety of farming operations.</span></p></section><section data-dcnode-id="9483" id="sec3.2.7"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9705" id="d1e2886"><span data-dcnode-id="9710" instrument_node="">3.2.7</span><span data-dcnode-id="9708" instrument_node="">. </span><span data-dcnode-id="9706" instrument_node="">Healthcare</span></h4><p data-dcnode-id="9685" id="d1e2888"><span data-dcnode-id="9704" instrument_node="">Breakthroughs in expert systems have produced a plethora of studies looking at solutions that can make the work of a doctor easier in some cases or replace a doctor in others. Expert systems must often take advantage of mobile technologies in smartphones and other smart devices including those running on the internet of things.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9702" href="#b119" name="bb119"><span data-dcnode-id="9703" instrument_node="">[119]</span></a><span data-dcnode-id="9701" instrument_node=""> surveyed IoT and Arduino based patient health monitoring systems.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9699" href="#b120" name="bb120"><span data-dcnode-id="9700" instrument_node="">[120]</span></a><span data-dcnode-id="9698" instrument_node=""> prototyped on Arduino and Android-based M-Health solution for diabetes mellitus patient. Biomedical instrumentation is more successful when prototyped with Arduino&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9696" href="#b121" name="bb121"><span data-dcnode-id="9697" instrument_node="">[121]</span></a><span data-dcnode-id="9695" instrument_node="">. What Arduino can be used to accomplish in healthcare are limitless.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9693" href="#b86" name="bb86"><span data-dcnode-id="9694" instrument_node="">[86]</span></a><span data-dcnode-id="9692" instrument_node=""> described a continuous health monitoring system for a photovoltaic array that used Arduino microcontroller.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9690" href="#b87" name="bb87"><span data-dcnode-id="9691" instrument_node="">[87]</span></a><span data-dcnode-id="9689" instrument_node=""> also proposed using Arduino UNO and wireless GSM for prototyping and implementing a health monitoring system for patients.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9687" href="#b122" name="bb122"><span data-dcnode-id="9688" instrument_node="">[122]</span></a><span data-dcnode-id="9686" instrument_node=""> on the other hand is an Arduino based e-health system that measured health functions such as heart rate, body temperature, and body temperature and used the information gathered to diagnose health risks and provide interventions in real-time.</span></p><p data-dcnode-id="9674" id="d1e2915"><span data-dcnode-id="9684" instrument_node="">Different Arduino boards can be deployed in building wearable systems&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9682" href="#b123" name="bb123"><span data-dcnode-id="9683" instrument_node="">[123]</span></a><span data-dcnode-id="9681" instrument_node="">. Such systems can monitor the health status of the wearer at any point and offer health and safety tips. Some can monitor the person’s temperature and some could be used to see if vital organs, such as the heart, are not functioning properly. </span><a class="workspace-trigger" data-dcnode-id="9679" href="#tbl4" name="btbl4"><span data-dcnode-id="9680" instrument_node="">Table&nbsp;4</span></a><span data-dcnode-id="9678" instrument_node=""> summarizes the literature on some wearable systems. These studies were based on miners and their need to have devices that could help monitor their health status as well as the safety of the mining environment.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="9676" href="#b66" name="bb66"><span data-dcnode-id="9677" instrument_node="">[66]</span></a><span data-dcnode-id="9675" instrument_node="">, described a system that monitors air quality and air density in an environment. With such a system, an unsafe system can very easily be known.</span></p><div data-dcnode-id="9484"><p data-dcnode-id="9673" id="d1e2933"></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="9485" id="tbl4"><span class="captions" data-dcnode-id="9665"><span data-dcnode-id="9666" id="d1e443"><p data-dcnode-id="9667" id="d1e444"><span class="label" data-dcnode-id="9671"><span data-dcnode-id="9672" instrument_node="">Table 4</span></span><span data-dcnode-id="9670" instrument_node="">. </span><span data-dcnode-id="9668" instrument_node="">A concise review of Arduino applications for healthcare-centric wearable systems.</span></p></span></span><div class="groups" data-dcnode-id="9489"><table data-dcnode-id="9490"><thead data-dcnode-id="9651"><tr class="valign-top" data-dcnode-id="9652"><th class="align-left" data-dcnode-id="9663" scope="col"><span data-dcnode-id="9664" instrument_node="">Reference</span></th><th class="align-left" data-dcnode-id="9661" scope="col"><span data-dcnode-id="9662" instrument_node="">Author, year, title</span></th><th class="align-left" data-dcnode-id="9659" scope="col"><span data-dcnode-id="9660" instrument_node="">Arduino Variant Used</span></th><th class="align-left" data-dcnode-id="9657" scope="col"><span data-dcnode-id="9658" instrument_node="">Purpose of Wearable System</span></th><th class="align-left" data-dcnode-id="9655" scope="col"><span data-dcnode-id="9656" instrument_node="">Methodology</span></th><th class="align-left" data-dcnode-id="9653" scope="col"><span data-dcnode-id="9654" instrument_node="">Remarks</span></th></tr></thead><tbody data-dcnode-id="9491"><tr class="valign-top rowsep-1" data-dcnode-id="9637"><td class="align-left" data-dcnode-id="9648"><a class="workspace-trigger" data-dcnode-id="9649" href="#b66" name="bb66"><span data-dcnode-id="9650" instrument_node="">[66]</span></a></td><td class="align-left" data-dcnode-id="9646"><span data-dcnode-id="9647" instrument_node="">Majee, 2016, IoT Based Automation of Safety and Observation System Operations of Mines</span></td><td class="align-left" data-dcnode-id="9644"><span data-dcnode-id="9645" instrument_node="">Arduino Nano Arduino UNO</span></td><td class="align-left" data-dcnode-id="9642"><span data-dcnode-id="9643" instrument_node="">Observation of air quality</span></td><td class="align-left" data-dcnode-id="9640"><span data-dcnode-id="9641" instrument_node="">Designed, prototyped, and implemented a system that could observe mines to ensure safety.</span></td><td class="align-left" data-dcnode-id="9638"><span data-dcnode-id="9639" instrument_node="">While the system had roles to play in overall safety, data gathered helped decide when the quality of air was not good enough for the safety of miners.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9623"><td class="align-left" data-dcnode-id="9634"><a class="workspace-trigger" data-dcnode-id="9635" href="#b124" name="bb124"><span data-dcnode-id="9636" instrument_node="">[124]</span></a></td><td class="align-left" data-dcnode-id="9632"><span data-dcnode-id="9633" instrument_node="">Harshitha et al, 2018, ZigBee based intelligent helmet for Coal Miners Safety Purpose</span></td><td class="align-left" data-dcnode-id="9630"><span data-dcnode-id="9631" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="9628"><span data-dcnode-id="9629" instrument_node="">Observation of air quality</span></td><td class="align-left" data-dcnode-id="9626"><span data-dcnode-id="9627" instrument_node="">Used Arduino UNO and intelligent systems and sensors to consider air density and temperature.</span></td><td class="align-left" data-dcnode-id="9624"><span data-dcnode-id="9625" instrument_node="">Air quality is dependent on air density and temperature. Equipping a helmet with systems that can detect the two and inform the wearer made it easier for people to know when the environment is not safe enough.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9609"><td class="align-left" data-dcnode-id="9620"><a class="workspace-trigger" data-dcnode-id="9621" href="#b125" name="bb125"><span data-dcnode-id="9622" instrument_node="">[125]</span></a></td><td class="align-left" data-dcnode-id="9618"><span data-dcnode-id="9619" instrument_node="">Roja and Srihari, 2018, IoT based smart helmet for air quality used for the mining industry</span></td><td class="align-left" data-dcnode-id="9616"><span data-dcnode-id="9617" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="9614"><span data-dcnode-id="9615" instrument_node="">Observation of air quality, Helmet wearing status</span></td><td class="align-left" data-dcnode-id="9612"><span data-dcnode-id="9613" instrument_node="">Used IoT technologies to prototype on Arduino a system which when implanted in so-called smart helmets could detect air quality.</span></td><td class="align-left" data-dcnode-id="9610"><span data-dcnode-id="9611" instrument_node="">Innovations of the internet of things (IoT) has made a lot of things possible. The system built relied heavily on IoT to facilitate communication between the wearer and the smart helmet system.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9595"><td class="align-left" data-dcnode-id="9606"><a class="workspace-trigger" data-dcnode-id="9607" href="#b126" name="bb126"><span data-dcnode-id="9608" instrument_node="">[126]</span></a></td><td class="align-left" data-dcnode-id="9604"><span data-dcnode-id="9605" instrument_node="">Bhuttoa et al, 2016, Development of a wearable safety device for coal miners</span></td><td class="align-left" data-dcnode-id="9602"><span data-dcnode-id="9603" instrument_node="">Arduino Nano</span></td><td class="align-left" data-dcnode-id="9600"><span data-dcnode-id="9601" instrument_node="">Observation of air quality, Collision detection</span></td><td class="align-left" data-dcnode-id="9598"><span data-dcnode-id="9599" instrument_node="">Built a system that could make health safety suggestions by observing the environment</span></td><td class="align-left" data-dcnode-id="9596"><span data-dcnode-id="9597" instrument_node="">The wearable system alerts wearers to the presence of obstacles. Useful in fast-paced environments.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9579"><td class="align-left" data-dcnode-id="9592"><a class="workspace-trigger" data-dcnode-id="9593" href="#b127" name="bb127"><span data-dcnode-id="9594" instrument_node="">[127]</span></a></td><td class="align-left" data-dcnode-id="9590"><span data-dcnode-id="9591" instrument_node="">Noorin and Suma, 2018, IoT based wearable device using WSN technology for miners</span></td><td class="align-left" data-dcnode-id="9588"><span data-dcnode-id="9589" instrument_node="">Arduino Nano</span></td><td class="align-left" data-dcnode-id="9584"><span data-dcnode-id="9587" instrument_node="">Observation of air quality, Collision detection </span><br data-dcnode-id="9586"><span data-dcnode-id="9585" instrument_node="">Helmet wearing status</span></td><td class="align-left" data-dcnode-id="9582"><span data-dcnode-id="9583" instrument_node="">Implemented and prototyped a wireless system network device that could observe air quality while detecting obstacles and providing other useful tips.</span></td><td class="align-left" data-dcnode-id="9580"><span data-dcnode-id="9581" instrument_node="">The system made use of sensors that detect temperature vibrations and humidity for effectiveness.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9565"><td class="align-left" data-dcnode-id="9576"><a class="workspace-trigger" data-dcnode-id="9577" href="#b33" name="bb33"><span data-dcnode-id="9578" instrument_node="">[33]</span></a></td><td class="align-left" data-dcnode-id="9574"><span data-dcnode-id="9575" instrument_node="">Priyadarsini et al, 2018, LabVIEW Based Real-Time Observation System for Coal Mine Worker</span></td><td class="align-left" data-dcnode-id="9572"><span data-dcnode-id="9573" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="9570"><span data-dcnode-id="9571" instrument_node="">Heart rate observation</span></td><td class="align-left" data-dcnode-id="9568"><span data-dcnode-id="9569" instrument_node="">Used Arduino Uno to develop, prototype, and implement a system for observing heart rate</span></td><td class="align-left" data-dcnode-id="9566"><span data-dcnode-id="9567" instrument_node="">ECG AD8232, a sensor for detecting heartbeat rate was used in building the system.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9551"><td class="align-left" data-dcnode-id="9562"><a class="workspace-trigger" data-dcnode-id="9563" href="#b128" name="bb128"><span data-dcnode-id="9564" instrument_node="">[128]</span></a></td><td class="align-left" data-dcnode-id="9560"><span data-dcnode-id="9561" instrument_node="">Dudwadkar et al, 2016, Wireless Mine Surveillance with Data Logging</span></td><td class="align-left" data-dcnode-id="9558"><span data-dcnode-id="9559" instrument_node="">Arduino Uno, Arduino Mega</span></td><td class="align-left" data-dcnode-id="9556"><span data-dcnode-id="9557" instrument_node="">Observation of air quality and Heart rate observation</span></td><td class="align-left" data-dcnode-id="9554"><span data-dcnode-id="9555" instrument_node="">Implemented an Arduino-based robotic system that surveys its environment and logins in the data in a database from which the gathered data could be extracted for decision making.</span></td><td class="align-left" data-dcnode-id="9552"><span data-dcnode-id="9553" instrument_node="">Infrared light reflection and refraction were studied in detecting changes in heartbeat rate with several other technologies deployed in studying such factors as humidity and temperature all of which were used by the system to make reports.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="9537"><td class="align-left" data-dcnode-id="9548"><a class="workspace-trigger" data-dcnode-id="9
