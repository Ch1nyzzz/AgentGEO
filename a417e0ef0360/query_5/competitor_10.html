="">3.2.12</span><span data-dcnode-id="8631" instrument_node="">. </span><span data-dcnode-id="8629" instrument_node="">Internet of Things (IoT)</span></h4><p data-dcnode-id="8596" id="d1e3181"><span data-dcnode-id="8627" instrument_node="">The internet of things is a relatively new phenomenon that has transformed and promises to bring even further transformation to the interconnectivity of devices. IoT aims to use the internet in connecting all computing devices in typical everyday use so that such devices can share data and communicate amongst themselves without any form of human-to-human interaction. Arduino has found varied uses in building IoT systems. Several such systems were discussed and described by various studies, describing in great detail how the Arduino computing platform played an enormous in the final IoT product released to the public. These IoT products are used in several fields and domains.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8625" href="#b83" name="bb83"><span data-dcnode-id="8626" instrument_node="">[83]</span></a><span data-dcnode-id="8624" instrument_node=""> described a system built for the observation of soil moisture using IoT enabled Arduino sensors which were used in conjunction with neural networks. The aim of the system, which is relevant in the agricultural domain, is to improve soil management for rural, subsistent farmers and to also predict seasonal rainfall that could help them in planning future harvest. In healthcare,&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8622" href="#b85" name="bb85"><span data-dcnode-id="8623" instrument_node="">[85]</span></a><span data-dcnode-id="8621" instrument_node=""> conducted a survey on the building of an IoT and Arduino system for observing a patient’s health. In energy use and management&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8619" href="#b144" name="bb144"><span data-dcnode-id="8620" instrument_node="">[144]</span></a><span data-dcnode-id="8618" instrument_node=""> built an IoT system for observing renewable energy that used Arduino based LoRa technology. In that same energy domain&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8616" href="#b141" name="bb141"><span data-dcnode-id="8617" instrument_node="">[141]</span></a><span data-dcnode-id="8615" instrument_node=""> simplified energy metering by building a fair, on-demand energy observation and metering system that tapped from both IoT technology and the inexhaustible capabilities of the Arduino computing platform. The mining industry also has IoT systems that were prototyped in Arduino and used to somewhat make life easier for the miners.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8613" href="#b127" name="bb127"><span data-dcnode-id="8614" instrument_node="">[127]</span></a><span data-dcnode-id="8612" instrument_node=""> used wireless sensor network technologies on the Arduino library to build an IoT based wearable device that could observe air quality while detecting obstacles and providing some other useful tips. While&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8610" href="#b125" name="bb125"><span data-dcnode-id="8611" instrument_node="">[125]</span></a><span data-dcnode-id="8609" instrument_node=""> used IoT technologies to prototype on Arduino a system which when implanted in smart helmets could detect air quality. A similar IoT system in&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8607" href="#b97" name="bb97"><span data-dcnode-id="8608" instrument_node="">[97]</span></a><span data-dcnode-id="8606" instrument_node=""> is also instrumental in ensuring worker safety by observing the air ion a particular environment.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8604" href="#b137" name="bb137"><span data-dcnode-id="8605" instrument_node="">[137]</span></a><span data-dcnode-id="8603" instrument_node=""> implemented a system for disaster management that heavily relied on IoT in noticing when environments had taken an unusual outlook and quickly alerted concerned professionals so proactive measures could be taken to avert disaster. Certain IoT systems like&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8601" href="#b81" name="bb81"><span data-dcnode-id="8602" instrument_node="">[81]</span></a><span data-dcnode-id="8600" instrument_node=""> are also built on Arduino for home automation, connecting all home devices including kitchen utensils and TVs, Siri, and vacuum cleaners. </span><a class="workspace-trigger" data-dcnode-id="8598" href="#tbl9" name="btbl9"><span data-dcnode-id="8599" instrument_node="">Table&nbsp;9</span></a><span data-dcnode-id="8597" instrument_node=""> analyzes some selected studies that focused on Arduino uses in education.</span></p><div data-dcnode-id="8400"><p data-dcnode-id="8593" id="d1e3225"><strong data-dcnode-id="8594"><span data-dcnode-id="8595" instrument_node="">Advantage of using Arduino for prototyping in the reviewed domains</span></strong></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="8401" id="tbl9"><span class="captions" data-dcnode-id="8585"><span data-dcnode-id="8586" id="d1e1385"><p data-dcnode-id="8587" id="d1e1386"><span class="label" data-dcnode-id="8591"><span data-dcnode-id="8592" instrument_node="">Table 9</span></span><span data-dcnode-id="8590" instrument_node="">. </span><span data-dcnode-id="8588" instrument_node="">Summary of Arduino uses in education.</span></p></span></span><div class="groups" data-dcnode-id="8402"><table data-dcnode-id="8403"><thead data-dcnode-id="8567"><tr class="valign-top" data-dcnode-id="8568"><th class="align-left" data-dcnode-id="8583" scope="col"><span data-dcnode-id="8584" instrument_node="">Reference</span></th><th class="align-left" data-dcnode-id="8581" scope="col"><span data-dcnode-id="8582" instrument_node="">Author, year, title</span></th><th class="align-left" data-dcnode-id="8579" scope="col"><span data-dcnode-id="8580" instrument_node="">Type of Arduino Board Used</span></th><th class="align-left" data-dcnode-id="8577" scope="col"><span data-dcnode-id="8578" instrument_node="">Domain</span></th><th class="align-left" data-dcnode-id="8573" scope="col"><span data-dcnode-id="8576" instrument_node="">Purpose of Field </span><br data-dcnode-id="8575"><span data-dcnode-id="8574" instrument_node="">Observation System</span></th><th class="align-left" data-dcnode-id="8571" scope="col"><span data-dcnode-id="8572" instrument_node="">Methodology</span></th><th class="align-left" data-dcnode-id="8569" scope="col"><span data-dcnode-id="8570" instrument_node="">Remarks</span></th></tr></thead><tbody data-dcnode-id="8404"><tr class="valign-top rowsep-1" data-dcnode-id="8551"><td class="align-left" data-dcnode-id="8564"><a class="workspace-trigger" data-dcnode-id="8565" href="#b83" name="bb83"><span data-dcnode-id="8566" instrument_node="">[83]</span></a></td><td class="align-left" data-dcnode-id="8562"><span data-dcnode-id="8563" instrument_node="">Athani et al, 2017, Soil moisture observation using IoT enabled Arduino sensors with neural networks for improving soil management for farmers and predict seasonal rainfall for planning future harvest in North Karnataka-India.</span></td><td class="align-left" data-dcnode-id="8560"><span data-dcnode-id="8561" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="8558"><span data-dcnode-id="8559" instrument_node="">Agriculture</span></td><td class="align-left" data-dcnode-id="8556"><span data-dcnode-id="8557" instrument_node="">Soil moisture observation</span></td><td class="align-left" data-dcnode-id="8554"><span data-dcnode-id="8555" instrument_node="">Built an IoT system that was prototyped on the Arduino computing platform and designed to observe changes in soil moisture.</span></td><td class="align-left" data-dcnode-id="8552"><span data-dcnode-id="8553" instrument_node="">Soil moisture figures are important in making several farming decisions, hence the need for the system. The system when built proved useful for the targeted region.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8535"><td class="align-left" data-dcnode-id="8548"><a class="workspace-trigger" data-dcnode-id="8549" href="#b144" name="bb144"><span data-dcnode-id="8550" instrument_node="">[144]</span></a></td><td class="align-left" data-dcnode-id="8546"><span data-dcnode-id="8547" instrument_node="">Chang-Sic et al, 2018, LoRa based renewable energy monitoring system with an open IoT platform.</span></td><td class="align-left" data-dcnode-id="8544"><span data-dcnode-id="8545" instrument_node="">Arduino Mega</span></td><td class="align-left" data-dcnode-id="8542"><span data-dcnode-id="8543" instrument_node="">Renewable Energy</span></td><td class="align-left" data-dcnode-id="8540"><span data-dcnode-id="8541" instrument_node="">Energy monitoring</span></td><td class="align-left" data-dcnode-id="8538"><span data-dcnode-id="8539" instrument_node="">Developed, prototyped with Arduino, and implemented a system for monitoring renewable energy.</span></td><td class="align-left" data-dcnode-id="8536"><span data-dcnode-id="8537" instrument_node="">The system monitors the quantity of energy generated from renewable energy sources such as solar energy, wind, and nuclear energy. It aims to know the quantity that is effectively utilized</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8519"><td class="align-left" data-dcnode-id="8532"><a class="workspace-trigger" data-dcnode-id="8533" href="#b85" name="bb85"><span data-dcnode-id="8534" instrument_node="">[85]</span></a></td><td class="align-left" data-dcnode-id="8530"><span data-dcnode-id="8531" instrument_node="">Karthik eta l, 2018, Survey on IoT &amp; Arduino Based Patient Health Observation System</span></td><td class="align-left" data-dcnode-id="8528"><span data-dcnode-id="8529" instrument_node="">Arduino UNO, Arduino Mega</span></td><td class="align-left" data-dcnode-id="8526"><span data-dcnode-id="8527" instrument_node="">healthcare</span></td><td class="align-left" data-dcnode-id="8524"><span data-dcnode-id="8525" instrument_node="">Patient health observation</span></td><td class="align-left" data-dcnode-id="8522"><span data-dcnode-id="8523" instrument_node="">Conducted a practical survey for how an Arduino based IoT system can make patient health observation without a doctor’s physical presence possible.</span></td><td class="align-left" data-dcnode-id="8520"><span data-dcnode-id="8521" instrument_node="">Found that Arduino could be used to build such an IoT system by observing existing systems and building a similar one.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8503"><td class="align-left" data-dcnode-id="8516"><a class="workspace-trigger" data-dcnode-id="8517" href="#b66" name="bb66"><span data-dcnode-id="8518" instrument_node="">[66]</span></a></td><td class="align-left" data-dcnode-id="8514"><span data-dcnode-id="8515" instrument_node="">Majee, 2016, IoT Based Automation of Safety and Observation System Operations of Mines</span></td><td class="align-left" data-dcnode-id="8512"><span data-dcnode-id="8513" instrument_node="">Arduino Nano Arduino UNO</span></td><td class="align-left" data-dcnode-id="8510"><span data-dcnode-id="8511" instrument_node="">Mining industry</span></td><td class="align-left" data-dcnode-id="8508"><span data-dcnode-id="8509" instrument_node="">Observation of air quality</span></td><td class="align-left" data-dcnode-id="8506"><span data-dcnode-id="8507" instrument_node="">Designed, prototyped, and implemented a system that could observe mines to ensure safety.</span></td><td class="align-left" data-dcnode-id="8504"><span data-dcnode-id="8505" instrument_node="">While the system had roles to play in overall safety, data gathered helped to decide when the quality of air was not good enough for the safety of miners.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8485"><td class="align-left" data-dcnode-id="8500"><a class="workspace-trigger" data-dcnode-id="8501" href="#b127" name="bb127"><span data-dcnode-id="8502" instrument_node="">[127]</span></a></td><td class="align-left" data-dcnode-id="8498"><span data-dcnode-id="8499" instrument_node="">Noorin and Suma, 2018, IoT based wearable device using WSN technology for miners</span></td><td class="align-left" data-dcnode-id="8496"><span data-dcnode-id="8497" instrument_node="">Arduino Nano</span></td><td class="align-left" data-dcnode-id="8494"><span data-dcnode-id="8495" instrument_node="">Mining Industry</span></td><td class="align-left" data-dcnode-id="8490"><span data-dcnode-id="8493" instrument_node="">Observation of air quality, Collision detection </span><br data-dcnode-id="8492"><span data-dcnode-id="8491" instrument_node="">Helmet wearing status</span></td><td class="align-left" data-dcnode-id="8488"><span data-dcnode-id="8489" instrument_node="">Implemented and prototyped a wireless system network device that could observe air quality while detecting obstacles and providing other useful tips.</span></td><td class="align-left" data-dcnode-id="8486"><span data-dcnode-id="8487" instrument_node="">The system made use of sensors that detect temperature vibrations and humidity for effectiveness.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8469"><td class="align-left" data-dcnode-id="8482"><a class="workspace-trigger" data-dcnode-id="8483" href="#b141" name="bb141"><span data-dcnode-id="8484" instrument_node="">[141]</span></a></td><td class="align-left" data-dcnode-id="8480"><span data-dcnode-id="8481" instrument_node="">Okafor et al, 2017, Development of Arduino Based IoT Metering System for On-Demand Energy Monitoring.</span></td><td class="align-left" data-dcnode-id="8478"><span data-dcnode-id="8479" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="8476"><span data-dcnode-id="8477" instrument_node="">Energy: Electricity, solar energy, fuel</span></td><td class="align-left" data-dcnode-id="8474"><span data-dcnode-id="8475" instrument_node="">Energy metering and monitoring</span></td><td class="align-left" data-dcnode-id="8472"><span data-dcnode-id="8473" instrument_node="">Developed an Internet of Things (IoT) system that monitored the metering of on-demand energy</span></td><td class="align-left" data-dcnode-id="8470"><span data-dcnode-id="8471" instrument_node="">The system is efficient for solar energy, electricity, and even hydrocarbon energies such as petrol and diesel.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8453"><td class="align-left" data-dcnode-id="8466"><a class="workspace-trigger" data-dcnode-id="8467" href="#b125" name="bb125"><span data-dcnode-id="8468" instrument_node="">[125]</span></a></td><td class="align-left" data-dcnode-id="8464"><span data-dcnode-id="8465" instrument_node="">Roja and Srihari, 2018, IoT based smart helmet for air quality used for the mining industry</span></td><td class="align-left" data-dcnode-id="8462"><span data-dcnode-id="8463" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="8460"><span data-dcnode-id="8461" instrument_node="">Mining Industry</span></td><td class="align-left" data-dcnode-id="8458"><span data-dcnode-id="8459" instrument_node="">Observation of air quality, Helmet wearing status</span></td><td class="align-left" data-dcnode-id="8456"><span data-dcnode-id="8457" instrument_node="">Used IoT technologies to prototype on Arduino a system which when implanted in so-called smart helmets could detect air quality.</span></td><td class="align-left" data-dcnode-id="8454"><span data-dcnode-id="8455" instrument_node="">Innovations of the internet of things (IoT) has made a lot of things possible. The system built relied heavily on IoT to facilitate communication between the wearer and the smart helmet system.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8437"><td class="align-left" data-dcnode-id="8450"><a class="workspace-trigger" data-dcnode-id="8451" href="#b97" name="bb97"><span data-dcnode-id="8452" instrument_node="">[97]</span></a></td><td class="align-left" data-dcnode-id="8448"><span data-dcnode-id="8449" instrument_node="">Shah et&nbsp;al. 2019, IoT enabled worker safety system</span></td><td class="align-left" data-dcnode-id="8446"><span data-dcnode-id="8447" instrument_node="">Arduino Mega</span></td><td class="align-left" data-dcnode-id="8444"><span data-dcnode-id="8445" instrument_node="">mining industry</span></td><td class="align-left" data-dcnode-id="8442"><span data-dcnode-id="8443" instrument_node="">observation of atmospheric variations</span></td><td class="align-left" data-dcnode-id="8440"><span data-dcnode-id="8441" instrument_node="">Implemented and prototyped on Arduino Mega, a system that ensured mineworkers’ safety by observing the air</span></td><td class="align-left" data-dcnode-id="8438"><span data-dcnode-id="8439" instrument_node="">The system could study if the environments were polluted or not and made available on a liquid crystal display (LCD) attached to it.</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8421"><td class="align-left" data-dcnode-id="8434"><a class="workspace-trigger" data-dcnode-id="8435" href="#b81" name="bb81"><span data-dcnode-id="8436" instrument_node="">[81]</span></a></td><td class="align-left" data-dcnode-id="8432"><span data-dcnode-id="8433" instrument_node="">Zhenyu et al, 2013, Smart Home System Based on IPV6 and ZIGBEE Technology</span></td><td class="align-left" data-dcnode-id="8430"><span data-dcnode-id="8431" instrument_node="">Arduino UNO</span></td><td class="align-left" data-dcnode-id="8428"><span data-dcnode-id="8429" instrument_node="">Home Automation</span></td><td class="align-left" data-dcnode-id="8426"><span data-dcnode-id="8427" instrument_node="">Smart home system</span></td><td class="align-left" data-dcnode-id="8424"><span data-dcnode-id="8425" instrument_node="">Designed and built a smart home system that interconnected all the embedded devices in the home using IoT and thus facilitated communication between them.</span></td><td class="align-left" data-dcnode-id="8422"><span data-dcnode-id="8423" instrument_node="">The IoT system automated devices in the home and reduces what the homeowner had to do manually while also removing redundancy.</span></td></tr><tr class="valign-top" data-dcnode-id="8405"><td class="align-left" data-dcnode-id="8418"><a class="workspace-trigger" data-dcnode-id="8419" href="#b137" name="bb137"><span data-dcnode-id="8420" instrument_node="">[137]</span></a></td><td class="align-left" data-dcnode-id="8416"><span data-dcnode-id="8417" instrument_node="">Sudila et al, 2017, A IoT Proactive Disaster Management System for Mines</span></td><td class="align-left" data-dcnode-id="8414"><span data-dcnode-id="8415" instrument_node="">Arduino UNO, Mega</span></td><td class="align-left" data-dcnode-id="8412"><span data-dcnode-id="8413" instrument_node="">underground</span></td><td class="align-left" data-dcnode-id="8410"><span data-dcnode-id="8411" instrument_node="">surveillance of environmental changes</span></td><td class="align-left" data-dcnode-id="8408"><span data-dcnode-id="8409" instrument_node="">Implemented a system that managed disastrous events in mines and limited casualties and damages.</span></td><td class="align-left" data-dcnode-id="8406"><span data-dcnode-id="8407" instrument_node="">Sensors and IoT technologies were deployed in the system which noticed when environments had taken an unusual outlook and alerted concerned professionals.</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="8387" id="d1e3232"><a class="workspace-trigger" data-dcnode-id="8398" href="#b162" name="bb162"><span data-dcnode-id="8399" instrument_node="">[162]</span></a><span data-dcnode-id="8397" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8395" href="#b163" name="bb163"><span data-dcnode-id="8396" instrument_node="">[163]</span></a><span data-dcnode-id="8394" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8392" href="#b164" name="bb164"><span data-dcnode-id="8393" instrument_node="">[164]</span></a><span data-dcnode-id="8391" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8389" href="#b165" name="bb165"><span data-dcnode-id="8390" instrument_node="">[165]</span></a><span data-dcnode-id="8388" instrument_node=""> identified some of the advantages of using Arduino as follows:</span></p><p data-dcnode-id="8325" id="d1e3236"></p><dl class="list" data-dcnode-id="8326"><dt class="list-label" data-dcnode-id="8385"><span data-dcnode-id="8386" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="8382"><p data-dcnode-id="8383" id="d1e3242"><span data-dcnode-id="8384" instrument_node="">Low cost and inexpensive platform: Arduino boards are relatively economical especially when compared to other microcontroller platforms such as Raspberry Pi and Nanode. Most people buy Arduino components and assemble everything at home, DIY standard. The cheapest kind of the Arduino module that can be assembled at home costs below $50.</span></p></dd><dt class="list-label" data-dcnode-id="8380"><span data-dcnode-id="8381" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="8377"><p data-dcnode-id="8378" id="d1e3247"><span data-dcnode-id="8379" instrument_node="">Cross-platform: Arduino IDE can run on most operating systems including Macintosh OSX, Windows, and Linux. This is unlike most other microcontroller platforms that run only on Windows</span></p></dd><dt class="list-label" data-dcnode-id="8375"><span data-dcnode-id="8376" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="8372"><p data-dcnode-id="8373" id="d1e3252"><span data-dcnode-id="8374" instrument_node="">Energy-efficient —&nbsp;Arduino requires little energy. It functions with the lowest of voltage, saving costs for the user.</span></p></dd><dt class="list-label" data-dcnode-id="8370"><span data-dcnode-id="8371" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="8367"><p data-dcnode-id="8368" id="d1e3257"><span data-dcnode-id="8369" instrument_node="">Fast prototyping process: it does not take long for a system to be fully prototyped with Arduino. In alternatives computing platforms, it takes longer in most cases to prototype the same type of device that would take very little time with Arduino.</span></p></dd><dt class="list-label" data-dcnode-id="8365"><span data-dcnode-id="8366" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="8362"><p data-dcnode-id="8363" id="d1e3270"><span data-dcnode-id="8364" instrument_node="">Simple, clear programming environment — The Arduino IDE is the platform’s programming environment. It is loved because of its ease-of-use and because it mastering it does not​ require much practice even for beginners. It is not oversimplified, however, they are advanced tools that help professionals perform more difficult functions. Being that the Arduino IDE was built on certain features of the Processing programming environment, working with it is quite easy for those who already know the Processing language and makes the work easier for teachers teaching to students that had already been taught programming in Processing.</span></p></dd><dt class="list-label" data-dcnode-id="8360"><span data-dcnode-id="8361" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="8357"><p data-dcnode-id="8358" id="d1e3283"><span data-dcnode-id="8359" instrument_node="">Open source and extensible software — The Arduino IDE and accompanying software are completely open-source. This makes it easier for experienced programmers to add extensions and modifications that will make the platform better. The Arduino programming language also borrows extensively from C++ and can be extended from the C++ library. The technical details of the language are also mirrored from the AVR C programming language. It, therefore, accepts AVR-C codes as though they were written in the Arduino IDE.</span></p></dd><dt class="list-label" data-dcnode-id="8355"><span data-dcnode-id="8356" instrument_node="">7.</span></dt><dd class="list-description" data-dcnode-id="8352"><p data-dcnode-id="8353" id="d1e3288"><span data-dcnode-id="8354" instrument_node="">Open source and extensible hardware —&nbsp;it is not only Arduino’s software that is open source. The hardware which is based on Atmel’s ATMEGA8 and ATMEGA168 microcontrollers are also open source and has their modules published under a Creative Commons license. By being open-source, experienced circuit designers can make their version of the module, extending it, or improve on it. Inexperienced users can even manage to build the breadboard version of the module. Doing this most often helps them better understand how the module works while also saving money.</span></p></dd><dt class="list-label" data-dcnode-id="8350"><span data-dcnode-id="8351" instrument_node="">8.</span></dt><dd class="list-description" data-dcnode-id="8347"><p data-dcnode-id="8348" id="d1e3293"><span data-dcnode-id="8349" instrument_node="">Introduced more innovative techniques: when Arduino came into the microcontroller platform, some other platforms already exist but by introducing innovative techniques such as high processing speed Arduino was able to quickly become the dominant platform and the one most preferred by professionals.</span></p></dd><dt class="list-label" data-dcnode-id="8345"><span data-dcnode-id="8346" instrument_node="">9.</span></dt><dd class="list-description" data-dcnode-id="8342"><p data-dcnode-id="8343" id="d1e3298"><span data-dcnode-id="8344" instrument_node="">Easy to Interface: Arduino is easy to interface. Extendable Pins where external modules such as USB can be attached to exist making it easier to transfer resources. Available also is a wide array of APIs or Application Program Interface.</span></p></dd><dt class="list-label" data-dcnode-id="8340"><span data-dcnode-id="8341" instrument_node="">10.</span></dt><dd class="list-description" data-dcnode-id="8337"><p data-dcnode-id="8338" id="d1e3303"><span data-dcnode-id="8339" instrument_node="">A wide array of sensors: Arduino comes with some many sensors that make it a good choice for prototyping systems that involve some type of imaging</span></p></dd><dt class="list-label" data-dcnode-id="8335"><span data-dcnode-id="8336" instrument_node="">11.</span></dt><dd class="list-description" data-dcnode-id="8332"><p data-dcnode-id="8333" id="d1e3308"><span data-dcnode-id="8334" instrument_node="">Huge community: Arduino has a huge community of users and enthusiasts alike. If you have any issues, some individuals will be glad to assist you. The fact that Arduino is a highly portable platform that requires little effort and zero or limited experience to use means that many flocks to it and eventually land in the developer community to provide help to newbies or learn themselves.</span></p></dd><dt class="list-label" data-dcnode-id="8330"><span data-dcnode-id="8331" instrument_node="">12.</span></dt><dd class="list-description" data-dcnode-id="8327"><p data-dcnode-id="8328" id="d1e3314"><span data-dcnode-id="8329" instrument_node="">Suited for the Amateur: Arduino is simplified for the beginner and gives little head to students. Most functions and capabilities can be mastered by watching videos online or asking the question on the online Arduino community.</span></p></dd></dl><p></p><p data-dcnode-id="8322"><strong data-dcnode-id="8323"><span data-dcnode-id="8324" instrument_node="">Challenges of using Arduino for prototyping in the reviewed domains</span></strong></p><p data-dcnode-id="8295" id="d1e3316"></p><dl class="list" data-dcnode-id="8296"><dt class="list-label" data-dcnode-id="8320"><span data-dcnode-id="8321" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="8317"><p data-dcnode-id="8318" id="d1e3325"><span data-dcnode-id="8319" instrument_node="">Complex structure</span></p></dd><dt class="list-label" data-dcnode-id="8315"><span data-dcnode-id="8316" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="8312"><p data-dcnode-id="8313" id="d1e3330"><span data-dcnode-id="8314" instrument_node="">Its ease of use makes users lazier and uninterested in learning more difficult, even if better, platforms.</span></p></dd><dt class="list-label" data-dcnode-id="8310"><span data-dcnode-id="8311" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="8307"><p data-dcnode-id="8308" id="d1e3335"><span data-dcnode-id="8309" instrument_node="">Accessibility: Arduino is still manufactured in only a few parts of the world and not in all. This makes it hard for those in countries where it is not manufactured to buy it. This sometimes leads to an increase in costs for people in such countries.</span></p></dd><dt class="list-label" data-dcnode-id="8305"><span data-dcnode-id="8306" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="8302"><p data-dcnode-id="8303" id="d1e3340"><span data-dcnode-id="8304" instrument_node="">New findings take time before getting into the hands of the majority of users to be there professional or hobbyist. Because findings remain buried in the pages of journals not read beyond the contributing audience and key stakeholders in that field, it is usually difficult for new trends in Arduino to get to the wider public.</span></p></dd><dt class="list-label" data-dcnode-id="8300"><span data-dcnode-id="8301" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="8297"><p data-dcnode-id="8298" id="d1e3345"><span data-dcnode-id="8299" instrument_node="">Lack of interest and/or support from governments. With government funding, more headway could be made in developing and propagating Arduino. Without this Arduino has been unable to fully go mainstream.</span></p></dd></dl><p></p><p data-dcnode-id="8292" id="d1e3319"><strong data-dcnode-id="8293"><span data-dcnode-id="8294" instrument_node="">Limitations of using Arduino for prototyping in the reviewed domains</span></strong></p><p data-dcnode-id="8290"><span data-dcnode-id="8291" instrument_node="">Limitations of using Arduino hardware and software to include the following:</span></p><p data-dcnode-id="8258" id="d1e3347"></p><dl class="list" data-dcnode-id="8259"><dt class="list-label" data-dcnode-id="8288"><span data-dcnode-id="8289" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="8285"><p data-dcnode-id="8286" id="d1e3358"><span data-dcnode-id="8287" instrument_node="">Limited processing power: An Arduino’s processing power is usually weaker than that of the microcontroller this limits how much it can process and how fast it processes the little one it can.</span></p></dd><dt class="list-label" data-dcnode-id="8283"><span data-dcnode-id="8284" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="8280"><p data-dcnode-id="8281" id="d1e3363"><span data-dcnode-id="8282" instrument_node="">Small storage space and memory: Arduino’s memory is most often very small and cannot store more than a few kilobytes. Assuming the user wishes to store something on the built system immediately after burning, the user would have to find a storage memory device. be built</span></p></dd><dt class="list-label" data-dcnode-id="8278"><span data-dcnode-id="8279" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="8275"><p data-dcnode-id="8276" id="d1e3368"><span data-dcnode-id="8277" instrument_node="">Requires efforts to accomplish tasks such as scheduling and database storage. This wastage of time is usually due to the low processing power and the small storage space.</span></p></dd><dt class="list-label" data-dcnode-id="8273"><span data-dcnode-id="8274" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="8270"><p data-dcnode-id="8271" id="d1e3373"><span data-dcnode-id="8272" instrument_node="">Uses an advanced form of the 8-bit AVR ecosystem that is still below par when compared with their 32-bit offering.</span></p></dd><dt class="list-label" data-dcnode-id="8268"><span data-dcnode-id="8269" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="8265"><p data-dcnode-id="8266" id="d1e3378"><span data-dcnode-id="8267" instrument_node="">Cannot handle the large complexities usually seen in very advanced projects.</span></p></dd><dt class="list-label" data-dcnode-id="8263"><span data-dcnode-id="8264" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="8260"><p data-dcnode-id="8261" id="d1e3383"><span data-dcnode-id="8262" instrument_node="">Hardware limitations: kits are not suitable for courses that require expensive, high-performance hardware.</span></p></dd></dl><p></p></section></section><section data-dcnode-id="7769" id="sec3.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8250" id="d1e3388"><span data-dcnode-id="8255" instrument_node="">3.3</span><span data-dcnode-id="8253" instrument_node="">. </span><span data-dcnode-id="8251" instrument_node="">Alternatives to Arduino (RESEARCH QUESTION-3)</span></h3><p data-dcnode-id="8245" id="d1e3390"><span data-dcnode-id="8249" instrument_node="">Several computing platforms exist in the market besides the Arduino platform. These platforms all have their specific features (See </span><a class="workspace-trigger" data-dcnode-id="8247" href="#tbl10" name="btbl10"><span data-dcnode-id="8248" instrument_node="">Table&nbsp;10</span></a><span data-dcnode-id="8246" instrument_node="">). For some, it is these features that may them stand out, while for others these features are a clog on the wheel of their wide acceptability as a good option for prototyping hardware and software.</span></p><section data-dcnode-id="8124" id="sec3.3.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8239" id="d1e3399"><span data-dcnode-id="8244" instrument_node="">3.3.1</span><span data-dcnode-id="8242" instrument_node="">. </span><span data-dcnode-id="8240" instrument_node="">Raspberry Pi</span></h4><p data-dcnode-id="8234" id="d1e3401"><span data-dcnode-id="8238" instrument_node="">The Raspberry Pi consists of a series of small single-board computers developed to promote the teaching of basic computer science in High schools and developing countries&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8236" href="#b166" name="bb166"><span data-dcnode-id="8237" instrument_node="">[166]</span></a><span data-dcnode-id="8235" instrument_node="">. Raspberry Pi is popular for its low cost and portability and is used in very advanced projects such as robotics, sensing, and weather observation. Raspberry Pi, however, does not have peripherals such as keyboards and mice.</span></p><p data-dcnode-id="8229" id="d1e3407"><span data-dcnode-id="8233" instrument_node="">Raspberry Pi supports the following operating systems Android, FreeBSD, Linux, NetBSD, OpenBSD, Plan 9, RISC OS, Windows 10 ARM 64, and Windows 10 IoT core&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8231" href="#b167" name="bb167"><span data-dcnode-id="8232" instrument_node="">[167]</span></a><span data-dcnode-id="8230" instrument_node="">.</span></p><section data-dcnode-id="8180" id="sec3.3.1.1"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8223" id="d1e3416"><span data-dcnode-id="8228" instrument_node="">3.3.1.1</span><span data-dcnode-id="8226" instrument_node="">. </span><span data-dcnode-id="8224" instrument_node="">Strength of Raspberry Pi</span></h5><p data-dcnode-id="8181" id="d1e3418"></p><dl class="list" data-dcnode-id="8182"><dt class="list-label" data-dcnode-id="8221"><span data-dcnode-id="8222" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="8203"><p data-dcnode-id="8204" id="d1e3424"><span data-dcnode-id="8220" instrument_node="">Low cost, affordable (</span><span class="math" data-dcnode-id="8206"><span class="MathJax_Preview" data-dcnode-id="8219" style=""></span><span class="MathJax_SVG" data-dcnode-id="8209" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mo is=&quot;true&quot;>&amp;#x223C;</mo></math>" id="MathJax-Element-8-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="8214" focusable="false" height="1.114ex" role="img" style="vertical-align: 0.307ex; margin-bottom: -0.434ex;" viewBox="0 -424.6 778.5 479.5" width="1.808ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="8215" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="8216" is="true"><use data-dcnode-id="8217" href="#MJMAIN-223C"><path d="M55 166Q55 241 101 304T222 367Q260 367 296 349T362 304T421 252T484 208T554 189Q616 189 655 236T694 338Q694 350 698 358T708 367Q722 367 722 334Q722 260 677 197T562 134H554Q517 134 481 152T414 196T355 248T292 293T223 311Q179 311 145 286Q109 257 96 218T80 156T69 133Q55 133 55 166Z" data-dcnode-id="8218" id="MJMAIN-223C" stroke-width="1"></path></use></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="8210" role="presentation"><math data-dcnode-id="8211" xmlns="http://www.w3.org/1998/Math/MathML"><mo data-dcnode-id="8212" is="true"><span data-dcnode-id="8213" instrument_node="">∼</span></mo></math></span></span></span><span data-dcnode-id="8205" instrument_node="">35$)</span></p></dd><dt class="list-label" data-dcnode-id="8201"><span data-dcnode-id="8202" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="8198"><p data-dcnode-id="8199" id="d1e3435"><span data-dcnode-id="8200" instrument_node="">Huge processing power in a compact board</span></p></dd><dt class="list-label" data-dcnode-id="8196"><span data-dcnode-id="8197" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="8193"><p data-dcnode-id="8194" id="d1e3440"><span data-dcnode-id="8195" instrument_node="">Several interfaces (HDMI, multiple USB, Ethernet, onboard Wi-Fi and Bluetooth, many GPIOs, USB powered, etc.)</span></p></dd><dt class="list-label" data-dcnode-id="8191"><span data-dcnode-id="8192" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="8188"><p data-dcnode-id="8189" id="d1e3445"><span data-dcnode-id="8190" instrument_node="">Supports Linux and Python (which makes it easy to build applications with)</span></p></dd><dt class="list-label" data-dcnode-id="8186"><span data-dcnode-id="8187" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="8183"><p data-dcnode-id="8184" id="d1e3450"><span data-dcnode-id="8185" instrument_node="">Readily available examples with community support</span></p></dd></dl><p></p></section><section data-dcnode-id="8125" id="sec3.3.1.2"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8174" id="d1e3455"><span data-dcnode-id="8179" instrument_node="">3.3.1.2</span><span data-dcnode-id="8177" instrument_node="">. </span><span data-dcnode-id="8175" instrument_node="">Weaknesses of Raspberry Pi</span></h5><p data-dcnode-id="8172" id="d1e3457"><span data-dcnode-id="8173" instrument_node="">1. Raspberry Pi boards are not always available for long. Products and projects developed with them cannot have a long life span because the boards themselves have a limited life span. This would prove too costly for many including developers and businesses who need to upgrade to newer and even more expensive embedded boards every few years. What is worse? There are times needed boards that may not even be available.</span></p><p data-dcnode-id="8170" id="d1e3467"><span data-dcnode-id="8171" instrument_node="">2. The Operating System (OS) runs on an SD Card</span></p><p data-dcnode-id="8168" id="d1e3469"><span data-dcnode-id="8169" instrument_node="">Raspberry Pi Board runs Linux on an SD card. The implication is that certain applications will pose a problem as this SD card connection may have issues with vibrations in the field. With no provision to ensure connections are intact while in operation, only unreliable workarounds such as double-sided tapes and glue become the designer’s only hope. That is not even considering that a corrupted SD card would mean the end of your work</span></p><p data-dcnode-id="8166" id="d1e3479"><span data-dcnode-id="8167" instrument_node="">3. Absence of USB header connectors</span></p><p data-dcnode-id="8164" id="d1e3481"><span data-dcnode-id="8165" instrument_node="">Raspberry Pi boards do not have USB header connectors, making it impossible to connect modems, sensors, etc. The only alternative, in this case, becomes connecting peripherals via a USB cable which is usually counter-productive especially in industrial applications.</span></p><p data-dcnode-id="8162" id="d1e3483"><span data-dcnode-id="8163" instrument_node="">4. Absence of Real-time Clock with Battery Backup</span></p><p data-dcnode-id="8160" id="d1e3485"><span data-dcnode-id="8161" instrument_node="">The absence of a real-time clock in Raspberry Pi boards ensures that real-time events cannot be tracked. Although an external RTC circuit can be added to the board, it comes at additional cost, effort, and space.</span></p><p data-dcnode-id="8158" id="d1e3487"><span data-dcnode-id="8159" instrument_node="">5. Absence of LCD Interface: The Raspberry Pi board does not have a liquid crystal display interface. Hence, all display RGB signals come on the 40-pin header. If the designer needs to use a thin-film transistor (TFT) display, very few or no GPIOs will be available.</span></p><p data-dcnode-id="8156" id="d1e3489"><span data-dcnode-id="8157" instrument_node="">6. Absence of Onboard ADC: If a product needs an ADC (8/10/12bit resolution), the designer will need to add an external ADC chip via I2C/SPI. Again more cost.</span></p><p data-dcnode-id="8154" id="d1e3494"><span data-dcnode-id="8155" instrument_node="">7. Absence of EEPROM/FRAM/SPI Flash: For data logging applications, it is very important to have onboard EEPROM or FRAM or Flash any of which can be used data storage. Raspberry Pi does not, however, make provisions for any of them.</span></p><p data-dcnode-id="8152" id="d1e3504"><span data-dcnode-id="8153" instrument_node="">8. Limited Universal Asynchronous Receiver Transmitter (UARTs): Only one UART is available on the header and that does not allow eight signals. Usually, two or three UARTs are required for most of the requirements which leave a shortage of at least one UART.</span></p><p data-dcnode-id="8150" id="d1e3516"><span data-dcnode-id="8151" instrument_node="">9. A limited number of I/Os: Raspberry Pi has fewer input/output slots than required. 28 GPIOs are available on the header when commercial applications usually require more.</span></p><p data-dcnode-id="8148" id="d1e3520"><span data-dcnode-id="8149" instrument_node="">Due to points 4–9, a separate board might be required to meet up with these shortcomings.</span></p><p data-dcnode-id="8146" id="d1e3522"><span data-dcnode-id="8147" instrument_node="">10. Raspberry cannot handle External Power Supply</span></p><p data-dcnode-id="8144" id="d1e3524"><span data-dcnode-id="8145" instrument_node="">The lack of a reliable power supply connector means that commercial products that require additional power supply are not properly attended to. The use of a USB micro connector-based power supply further increases this unreliability and may jeopardize products.</span></p><p data-dcnode-id="8142" id="d1e3526"><span data-dcnode-id="8143" instrument_node="">This is because it cannot handle the reverse voltage, surge, and overload.</span></p><p data-dcnode-id="8140" id="d1e3528"><span data-dcnode-id="8141" instrument_node="">11. Poor thermal Management</span></p><p data-dcnode-id="8138" id="d1e3530"><span data-dcnode-id="8139" instrument_node="">The microprocessor on the Raspberry Pi produces heat which must be well managed else it may seriously affect the board’s dependability. Yet the small, improperly fastened heatsink with glue that is​ currently used does a poor job of managing this heat. The solution is to custom design a heatsink with a good mounting hole and manufactures the same. What appears like a solution here is a call to spend more.</span></p><p data-dcnode-id="8136" id="d1e3540"><span data-dcnode-id="8137" instrument_node="">12. Restrictions on Form Factor Size</span></p><p data-dcnode-id="8134" id="d1e3542"><span data-dcnode-id="8135" instrument_node="">Form sides on Raspberry Pi are fixed, inflexible, and not designed to suit the designer’s needs in terms of size and shape.</span></p><p data-dcnode-id="8132" id="d1e3545"><span data-dcnode-id="8133" instrument_node="">13. Abysmally limited professional development support</span></p><p data-dcnode-id="8130" id="d1e3547"><span data-dcnode-id="8131" instrument_node="">The online forums and community that Raspberry Pi operates perhaps discouraged them from offering highly needed professional dev support. Dedicated support, necessary in making certain decisions are hardly provided.</span></p><p data-dcnode-id="8128" id="d1e3549"><span data-dcnode-id="8129" instrument_node="">14. No provisions for scale</span></p><p data-dcnode-id="8126" id="d1e3551"><span data-dcnode-id="8127" instrument_node="">Raspberry Pi boards were not designed for commercial products ab initio that probably explains why the boards were designed for small projects and not large scale projects running into millions.</span></p></section></section><section data-dcnode-id="8097" id="sec3.3.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8118" id="d1e3564"><span data-dcnode-id="8123" instrument_node="">3.3.2</span><span data-dcnode-id="8121" instrument_node="">. </span><span data-dcnode-id="8119" instrument_node="">BeagleBone</span></h4><p data-dcnode-id="8110" id="d1e3566"><span data-dcnode-id="8117" instrument_node="">The BeagleBoard </span><a class="workspace-trigger" data-dcnode-id="8115" href="#b168" name="bb168"><span data-dcnode-id="8116" instrument_node="">[168]</span></a><span data-dcnode-id="8114" instrument_node=""> is the low-power open-source single-board computer invented by a dedicated group of engineers as a learning board that could be used in colleges and universities all over the world in teaching open-source hardware and software capabilities. As an open-source board, the public purchases it under the Creative Commons share-alike license. The board was designed with Cadence OrCAD for schematics and Cadence Allegro for PCB manufacturing; and adopted no simulation software. The Beaglebone is a version of BeagleBoard that was introduced in 2011&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8112" href="#b169" name="bb169"><span data-dcnode-id="8113" instrument_node="">[169]</span></a><span data-dcnode-id="8111" instrument_node="">.</span></p><p data-dcnode-id="8108" id="d1e3576"><span data-dcnode-id="8109" instrument_node="">Strength of BeagleBone</span></p><p data-dcnode-id="8106" id="d1e3578"><span data-dcnode-id="8107" instrument_node="">1. Provides an environment for ultra-low-latency processing of audio and sensor data</span></p><p data-dcnode-id="8104" id="d1e3580"><span data-dcnode-id="8105" instrument_node="">2. low-cost</span></p><p data-dcnode-id="8102" id="d1e3582"><span data-dcnode-id="8103" instrument_node="">3. single-board computer.</span></p><p data-dcnode-id="8100" id="d1e3584"><span data-dcnode-id="8101" instrument_node="">Weakness</span></p><p data-dcnode-id="8098" id="d1e3586"><span data-dcnode-id="8099" instrument_node="">Shares moist of the weakness of Raspberry Pi.</span></p></section><section data-dcnode-id="8084" id="sec3.3.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8091" id="d1e3591"><span data-dcnode-id="8096" instrument_node="">3.3.3</span><span data-dcnode-id="8094" instrument_node="">. </span><span data-dcnode-id="8092" instrument_node="">Sharks Cove</span></h4><p data-dcnode-id="8089" id="d1e3593"><span data-dcnode-id="8090" instrument_node="">Sharks Cove, developed by Microsoft and Intel, is a hardware development board that can be used to develop hardware and drivers for Windows OS.</span></p><p data-dcnode-id="8087" id="d1e3595"><span data-dcnode-id="8088" instrument_node="">Strength: efficient, purpose-driven, and low-cost.</span></p><p data-dcnode-id="8085" id="d1e3597"><span data-dcnode-id="8086" instrument_node="">Weakness: limited in scope</span></p></section><section data-dcnode-id="7770" id="sec3.3.4"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8078" id="d1e3602"><span data-dcnode-id="8083" instrument_node="">3.3.4</span><span data-dcnode-id="8081" instrument_node="">. </span><span data-dcnode-id="8079" instrument_node="">Waspmote</span></h4><p data-dcnode-id="8076" id="d1e3604"><span data-dcnode-id="8077" instrument_node="">Waspmote is a Wireless Sensor Networks Open Source Platform that is focused on the implementation of low consumption modes to allow the sensor nodes (“motes”) to maintain complete autonomy and while being powered by a powered offering a variable lifetime between 1 and 5&nbsp;years. Waspmote is a specially adapted sensor device purposefully oriented to developers.</span></p><p data-dcnode-id="8072" id="d1e3606"><span data-dcnode-id="8075" instrument_node="">Strength: high availability, low-cost, efficient.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="8073" href="#b170" name="bb170"><span data-dcnode-id="8074" instrument_node="">[170]</span></a></p><p data-dcnode-id="8070" id="d1e3611"><span data-dcnode-id="8071" instrument_node="">Weakness: weak 4G signal.</span></p><div data-dcnode-id="7771"><p data-dcnode-id="8069" id="d1e3613"></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="7772" id="tbl10"><span class="captions" data-dcnode-id="8061"><span data-dcnode-id="8062" id="d1e1590"><p data-dcnode-id="8063" id="d1e1591"><span class="label" data-dcnode-id="8067"><span data-dcnode-id="8068" instrument_node="">Table 10</span></span><span data-dcnode-id="8066" instrument_node="">. </span><span data-dcnode-id="8064" instrument_node="">Summary of the Specifications of some selected embedded system computing platforms.</span></p></span></span><div class="groups" data-dcnode-id="7773"><table data-dcnode-id="7774"><thead data-dcnode-id="8051"><tr class="valign-top" data-dcnode-id="8052"><th class="align-left" data-dcnode-id="8059" scope="col"><span data-dcnode-id="8060" instrument_node="">Platform/Features</span></th><th class="align-left" data-dcnode-id="8057" scope="col"><span data-dcnode-id="8058" instrument_node="">Arduino</span></th><th class="align-left" data-dcnode-id="8055" scope="col"><span data-dcnode-id="8056" instrument_node="">Beagle Bone</span></th><th class="align-left" data-dcnode-id="8053" scope="col"><span data-dcnode-id="8054" instrument_node="">Raspberry Pi</span></th></tr></thead><tbody data-dcnode-id="7775"><tr class="valign-top rowsep-1" data-dcnode-id="8042"><td class="align-left" data-dcnode-id="8049"><span data-dcnode-id="8050" instrument_node="">Microcontroller chip</span></td><td class="align-left" data-dcnode-id="8047"><span data-dcnode-id="8048" instrument_node="">ATmega328</span></td><td class="align-left" data-dcnode-id="8045"><span data-dcnode-id="8046" instrument_node="">TI AM3359</span></td><td class="align-left" data-dcnode-id="8043"><span data-dcnode-id="8044" instrument_node="">Broadcom BCM2835 SoC full HD multimedia applications processor</span></td></tr><tr class="valign-top rowsep-1" data-dcnode-id="8031"><td class="align-left" data-d
