</span><meta content="Arduino, an open-source electronics platform, has become the go-to option for anyone working on interactive hardware and software projects. An Arduino…" data-dcnode-id="12017" property="og:description"><span data-dcnode-id="12016" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;d1e1927&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;d1e1930&quot;><p id=&quot;d1e1931&quot;>Arduino, an open-source electronics platform, has become the go-to option for anyone working on interactive hardware and software projects. An Arduino board (such as the Uno) connected to a breadboard with plugins such as inputs, sensors, lights, and displays can be controlled by a code written in the Arduino development environment. How to achieve this is by prototyping with Arduino. Prototyping with Arduino has grown in popularity with the increased use of the Arduino platform. Prototyping with Arduino, however, is not an easy task for nonprogrammers with interest in the field. With increased public interest in the field will come a need for accessible information. This paper presents a methodical literature review intended to intensively analyze and compare existing primary studies on prototyping with Arduino. We found about 130 of such studies, all peer-reviewed and published within the last 15 years, including these years (2015–2020). These studies were tediously and carefully chosen through a three-step process. In this paper, a cautious analysis of selected studies was followed by a clear description of the methods applied. The methods were categorized according to the success rate of the studied prototypes. Results obtained can be used in researches on the best technique to adopt while prototyping with Arduino. They can also be used in electronics researches and by individuals who wish to obtain a guide on prototyping with Arduino despite lacking grounded knowledge of the subject matter.</p></div></div></div>" data-dcnode-id="12015" lang="en" name="citation_abstract"><span data-dcnode-id="12014" instrument_node="">

s="icon icon-navigate-down" data-dcnode-id="11239" focusable="false" height="20" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="11240"></path></svg></button><div class="banner-options u-padding-xs-bottom" data-dcnode-id="11215"><button class="button toc-button button-anchor u-hide-from-lg u-margin-s-right" data-dcnode-id="11232" type="button"><svg class="icon icon-list" data-dcnode-id="11236" focusable="false" height="24" viewBox="0 0 104 128" width="19.5"><path d="m2e1 95a9 9 0 0 1 -9 9 9 9 0 0 1 -9 -9 9 9 0 0 1 9 -9 9 9 0 0 1 9 9zm0-3e1a9 9 0 0 1 -9 9 9 9 0 0 1 -9 -9 9 9 0 0 1 9 -9 9 9 0 0 1 9 9zm0-3e1a9 9 0 0 1 -9 9 9 9 0 0 1 -9 -9 9 9 0 0 1 9 -9 9 9 0 0 1 9 9zm14 55h68v1e1h-68zm0-3e1h68v1e1h-68zm0-3e1h68v1e1h-68z" data-dcnode-id="11237"></path></svg><span class="button-text" data-dcnode-id="11233"><span data-dcnode-id="11234"><span data-dcnode-id="11235" instrument_node="">Outline</span></span></span></button><div class="Social u-display-inline-block" data-dcnode-id="11224" id="social"><div class="popover social-popover" data-dcnode-id="11225" id="social-popover"><div data-dcnode-id="11226" id="popover-trigger-social-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="11227" type="button"><svg class="icon icon-share" data-dcnode-id="11230" focusable="false" height="16" viewBox="0 0 128 128" width="16"><path d="m9e1 112c-6.62 0-12-5.38-12-12s5.38-12 12-12 12 5.38 12 12-5.38 12-12 12zm-66-36c-6.62 0-12-5.38-12-12s5.38-12 12-12 12 5.38 12 12-5.38 12-12 12zm66-6e1c6.62 0 12 5.38 12 12s-5.38 12-12 12-12-5.38-12-12 5.38-12 12-12zm0 62c-6.56 0-12.44 2.9-16.48 7.48l-28.42-15.28c0.58-1.98 0.9-4.04 0.9-6.2s-0.32-4.22-0.9-6.2l28.42-15.28c4.04 4.58 9.92 7.48 16.48 7.48 12.14 0 22-9.86 22-22s-9.86-22-22-22-22 9.86-22 22c0 1.98 0.28 3.9 0.78 5.72l-28.64 15.38c-4.02-4.34-9.76-7.1-16.14-7.1-12.14 0-22 9.86-22 22s9.86 22 22 22c6.38 0 12.12-2.76 16.14-7.12l28.64 15.38c-0.5 1.84-0.78 3.76-0.78 5.74 0 12.14 9.86 22 22 22s22-9.86 22-22-9.86-22-22-22z" data-dcnode-id="11231"></path></svg><span class="button-text" data-dcnode-id="11228"><span data-dcnode-id="11229" instrument_node="">Share</span></span></button></div></div></div><div class="ExportCitation u-display-inline-block" data-dcnode-id="11216" id="export-citation"><div class="popover export-citation-popover" data-dcnode-id="11217" id="export-citation-popover"><div data-dcnode-id="11218" id="popover-trigger-export-citation-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="11219" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="11222" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="11223" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="11220"><span data-dcnode-id="11221" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="11209" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="11212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.cosrev.2021.100364" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="11213" instrument_node="">https://doi.org/10.1016/j.cosrev.2021.100364</span></a><a class="rights-and-content" data-dcnode-id="11210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS1574013721000046%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="11211" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="11208"></section><section class="ReferencedArticles" data-dcnode-id="11207"></section><div class="PageDivider" data-dcnode-id="11206"></div><div class="Abstracts u-font-serif" data-dcnode-id="11199" id="abstracts"><div class="abstract author" data-dcnode-id="11200" id="d1e1927"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11204"><span data-dcnode-id="11205" instrument_node="">Abstract</span></h2><div data-dcnode-id="11201" id="d1e1930"><p data-dcnode-id="11202" id="d1e1931"><span data-dcnode-id="11203" instrument_node="">Arduino, an open-source electronics platform, has become the go-to option for anyone working on interactive hardware and software projects. An Arduino board (such as the Uno) connected to a breadboard with plugins such as inputs, sensors, lights, and displays can be controlled by a code written in the Arduino development environment. How to achieve this is by prototyping with Arduino. Prototyping with Arduino has grown in popularity with the increased use of the Arduino platform. Prototyping with Arduino, however, is not an easy task for nonprogrammers with interest in the field. With increased public interest in the field will come a need for accessible information. This paper presents a methodical literature review intended to intensively analyze and compare existing primary studies on prototyping with Arduino. We found about 130 of such studies, all peer-reviewed and published within the last 15 years, including these years (2015–2020). These studies were tediously and carefully chosen through a three-step process. In this paper, a cautious analysis of selected studies was followed by a clear description of the methods applied. The methods were categorized according to the success rate of the studied prototypes. Results obtained can be used in researches on the best technique to adopt while prototyping with Arduino. They can also be used in electronics researches and by individuals who wish to obtain a guide on prototyping with Arduino despite lacking grounded knowledge of the subject matter.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="11176" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="11188"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="11189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1574013721000472"><svg class="icon icon-navigate-left" data-dcnode-id="11197" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="11198"></path></svg><span class="button-alternative-text" data-dcnode-id="11190"><strong data-dcnode-id="11195"><span data-dcnode-id="11196" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="11193"><span data-dcnode-id="11194" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="11191"><span data-dcnode-id="11192" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="11177"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="11178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1574013721000071"><span class="button-alternative-text" data-dcnode-id="11181"><strong data-dcnode-id="11186"><span data-dcnode-id="11187" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="11184"><span data-dcnode-id="11185" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="11182"><span data-dcnode-id="11183" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="11179" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="11180"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="11160"><div class="keywords-section" data-dcnode-id="11161" id="d1e1935"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11174"><span data-dcnode-id="11175" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="11171" id="d1e1938"><span data-dcnode-id="11172"><span data-dcnode-id="11173" instrument_node="">Raspberry Pi</span></span></div><div class="keyword" data-dcnode-id="11168" id="d1e1941"><span data-dcnode-id="11169"><span data-dcnode-id="11170" instrument_node="">BeagleBone</span></span></div><div class="keyword" data-dcnode-id="11165" id="d1e1944"><span data-dcnode-id="11166"><span data-dcnode-id="11167" instrument_node="">Sharks Cove</span></span></div><div class="keyword" data-dcnode-id="11162" id="d1e1947"><span data-dcnode-id="11163"><span data-dcnode-id="11164" instrument_node="">Waspmote</span></span></div></div></div><span data-dcnode-id="11159" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="7186" id="body"><div data-dcnode-id="7192"><section data-dcnode-id="10858" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11153" id="d1e1955"><span data-dcnode-id="11158" instrument_node="">1</span><span data-dcnode-id="11156" instrument_node="">. </span><span data-dcnode-id="11154" instrument_node="">Introduction</span></h2><p data-dcnode-id="11133" id="d1e1957"><span data-dcnode-id="11152" instrument_node="">Any study on prototyping with Arduino that does not mention microcontrollers would be judged to be incomplete. Microcontrollers have found widespread use in homes, offices, and research environments. In simple terms, microcontrollers are embedded systems which when in a device control the actions and features of that device&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11150" href="#b1" name="bb1"><span data-dcnode-id="11151" instrument_node="">[1]</span></a><span data-dcnode-id="11149" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11147" href="#b2" name="bb2"><span data-dcnode-id="11148" instrument_node="">[2]</span></a><span data-dcnode-id="11146" instrument_node="">. Most often, they control one dedicated task in the device and not all of the device’s functions. Microcontrollers have both a software and a hardware component&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11144" href="#b3" name="bb3"><span data-dcnode-id="11145" instrument_node="">[3]</span></a><span data-dcnode-id="11143" instrument_node="">. Microcontrollers are microcomputers now popularly known as single board computers&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11141" href="#b4" name="bb4"><span data-dcnode-id="11142" instrument_node="">[4]</span></a><span data-dcnode-id="11140" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11138" href="#b5" name="bb5"><span data-dcnode-id="11139" instrument_node="">[5]</span></a><span data-dcnode-id="11137" instrument_node="">. But microcontrollers should not be confused with microprocessors which are used for general-purpose computing whereas microcontrollers are designed for a specific purpose&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11135" href="#b6" name="bb6"><span data-dcnode-id="11136" instrument_node="">[6]</span></a><span data-dcnode-id="11134" instrument_node="">.</span></p><p data-dcnode-id="11128" id="d1e1984"><span data-dcnode-id="11132" instrument_node="">Microcontrollers can be found in implantable medical devices, process control systems, automobile engine control systems, remote control systems, industrial instrumentation devices, voltmeter, office equipment, electronic appliances, power tools, and toys&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11130" href="#b4" name="bb4"><span data-dcnode-id="11131" instrument_node="">[4]</span></a><span data-dcnode-id="11129" instrument_node="">. Most of these devices and products are automatically controlled, have dedicated input devices and tiny LED/LCD display outputs.</span></p><p data-dcnode-id="11117" id="d1e1990"><span data-dcnode-id="11127" instrument_node="">Their consumption of very low power is microcontrollers’ biggest selling point and explains why a very big percentage of the applications in most facets of the electronics manufacturing industry is being implemented as embedded computer systems such as microcontrollers&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11125" href="#b7" name="bb7"><span data-dcnode-id="11126" instrument_node="">[7]</span></a><span data-dcnode-id="11124" instrument_node="">. Microcontrollers are also loved for their reusability, cost-effectiveness&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11122" href="#b8" name="bb8"><span data-dcnode-id="11123" instrument_node="">[8]</span></a><span data-dcnode-id="11121" instrument_node="">, and dependability. All microcontrollers are programmable&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11119" href="#b9" name="bb9"><span data-dcnode-id="11120" instrument_node="">[9]</span></a><span data-dcnode-id="11118" instrument_node="">.</span></p><p data-dcnode-id="11088" id="d1e2004"><span data-dcnode-id="11116" instrument_node="">While many systems exist for building microcontrollers&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11114" href="#b8" name="bb8"><span data-dcnode-id="11115" instrument_node="">[8]</span></a><span data-dcnode-id="11113" instrument_node="">, Arduino has proved to be the most effective. Arduino, an open-source hardware and software enterprise and user interaction community, has been manufacturing microcontroller-based Arduino boards since 2005&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11111" href="#b10" name="bb10"><span data-dcnode-id="11112" instrument_node="">[10]</span></a><span data-dcnode-id="11110" instrument_node="">. These development boards are also known as Arduino Modules can be used for microcontroller development. Arduino makes the procedure of working with microcontrollers simpler while offering huge benefits to teachers, students, and hobbyists when compared with similar systems. Unlike other microcontroller development platforms, Arduino boards are moderately inexpensive. There is also the possibility of uploading a script ton the Arduino board’s EEPROM and it would execute without the board being interfaced with computers or some software outside the Arduino system. This gives ensures it can function independently and with a high degree of accuracy and portability&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11108" href="#b11" name="bb11"><span data-dcnode-id="11109" instrument_node="">[11]</span></a><span data-dcnode-id="11107" instrument_node="">. Arduino boards also have an accessory of microcontroller-based kits that are useful in building digital devices and interactive entities that not only sense but control real-life objects&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11105" href="#b6" name="bb6"><span data-dcnode-id="11106" instrument_node="">[6]</span></a><span data-dcnode-id="11104" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11102" href="#b12" name="bb12"><span data-dcnode-id="11103" instrument_node="">[12]</span></a><span data-dcnode-id="11101" instrument_node="">. An Arduino itself contains a microcontroller, such as an Atmel ATmega328p or ATmega168, and relies on this microcontroller in the development of prototypes and projects&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11099" href="#b13" name="bb13"><span data-dcnode-id="11100" instrument_node="">[13]</span></a><span data-dcnode-id="11098" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11096" href="#b14" name="bb14"><span data-dcnode-id="11097" instrument_node="">[14]</span></a><span data-dcnode-id="11095" instrument_node="">. Arduino has a simple, easy-to-understand, easy-to-use syntax that makes it perfect for the kind of individuals that are naturally lovers of C, simplified C++, and Processing namely, hobbyists, students, and amateur innovators&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11093" href="#b15" name="bb15"><span data-dcnode-id="11094" instrument_node="">[15]</span></a><span data-dcnode-id="11092" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11090" href="#b16" name="bb16"><span data-dcnode-id="11091" instrument_node="">[16]</span></a><span data-dcnode-id="11089" instrument_node="">. Arduino, then, is a conglomeration of microcontroller and other needed parts like crystal, on-board power supply pins, bootloader. All of these are necessary for successfully building executable programs in the Arduino IDE.</span></p><p data-dcnode-id="11086" id="d1e2039"><span data-dcnode-id="11087" instrument_node="">An Arduino board allows users to experiment on innovative ideas they wish to bring to life. The controller in the Arduino board can be programmed with the Arduino IDE. In reality, programming with Arduino means reprogramming this microcontroller. There are inbuilt LEDs on the board, as well as extendable pins where external modules such as USB can be attached to. It is the in-built microcontroller that controls the functions of the LEDs and sensors that are attached to the board through its pins.</span></p><p data-dcnode-id="10982" id="d1e2041"><span data-dcnode-id="11085" instrument_node="">Arduino exists in many variants </span><a class="workspace-trigger" data-dcnode-id="11083" href="#b17" name="bb17"><span data-dcnode-id="11084" instrument_node="">[17]</span></a><span data-dcnode-id="11082" instrument_node=""> including Arduino Uno, Arduino Due, Arduino Mega, and Arduino Leonardo&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11080" href="#b18" name="bb18"><span data-dcnode-id="11081" instrument_node="">[18]</span></a><span data-dcnode-id="11079" instrument_node=""> and has been used in many fields such as mining </span><a class="workspace-trigger" data-dcnode-id="11077" href="#b19" name="bb19"><span data-dcnode-id="11078" instrument_node="">[19]</span></a><span data-dcnode-id="11076" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11074" href="#b20" name="bb20"><span data-dcnode-id="11075" instrument_node="">[20]</span></a><span data-dcnode-id="11073" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11071" href="#b21" name="bb21"><span data-dcnode-id="11072" instrument_node="">[21]</span></a><span data-dcnode-id="11070" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11068" href="#b22" name="bb22"><span data-dcnode-id="11069" instrument_node="">[22]</span></a><span data-dcnode-id="11067" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11065" href="#b23" name="bb23"><span data-dcnode-id="11066" instrument_node="">[23]</span></a><span data-dcnode-id="11064" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11062" href="#b24" name="bb24"><span data-dcnode-id="11063" instrument_node="">[24]</span></a><span data-dcnode-id="11061" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11059" href="#b25" name="bb25"><span data-dcnode-id="11060" instrument_node="">[25]</span></a><span data-dcnode-id="11058" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11056" href="#b26" name="bb26"><span data-dcnode-id="11057" instrument_node="">[26]</span></a><span data-dcnode-id="11055" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11053" href="#b27" name="bb27"><span data-dcnode-id="11054" instrument_node="">[27]</span></a><span data-dcnode-id="11052" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11050" href="#b28" name="bb28"><span data-dcnode-id="11051" instrument_node="">[28]</span></a><span data-dcnode-id="11049" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11047" href="#b29" name="bb29"><span data-dcnode-id="11048" instrument_node="">[29]</span></a><span data-dcnode-id="11046" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11044" href="#b30" name="bb30"><span data-dcnode-id="11045" instrument_node="">[30]</span></a><span data-dcnode-id="11043" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11041" href="#b31" name="bb31"><span data-dcnode-id="11042" instrument_node="">[31]</span></a><span data-dcnode-id="11040" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11038" href="#b32" name="bb32"><span data-dcnode-id="11039" instrument_node="">[32]</span></a><span data-dcnode-id="11037" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11035" href="#b33" name="bb33"><span data-dcnode-id="11036" instrument_node="">[33]</span></a><span data-dcnode-id="11034" instrument_node=""> Systems Design, controllers </span><a class="workspace-trigger" data-dcnode-id="11032" href="#b34" name="bb34"><span data-dcnode-id="11033" instrument_node="">[34]</span></a><span data-dcnode-id="11031" instrument_node="">, General Purpose Applications </span><a class="workspace-trigger" data-dcnode-id="11029" href="#b35" name="bb35"><span data-dcnode-id="11030" instrument_node="">[35]</span></a><span data-dcnode-id="11028" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11026" href="#b36" name="bb36"><span data-dcnode-id="11027" instrument_node="">[36]</span></a><span data-dcnode-id="11025" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11023" href="#b37" name="bb37"><span data-dcnode-id="11024" instrument_node="">[37]</span></a><span data-dcnode-id="11022" instrument_node=""> and use, remote sensing </span><a class="workspace-trigger" data-dcnode-id="11020" href="#b38" name="bb38"><span data-dcnode-id="11021" instrument_node="">[38]</span></a><span data-dcnode-id="11019" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11017" href="#b39" name="bb39"><span data-dcnode-id="11018" instrument_node="">[39]</span></a><span data-dcnode-id="11016" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11014" href="#b40" name="bb40"><span data-dcnode-id="11015" instrument_node="">[40]</span></a><span data-dcnode-id="11013" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11011" href="#b41" name="bb41"><span data-dcnode-id="11012" instrument_node="">[41]</span></a><span data-dcnode-id="11010" instrument_node=""> Hardware Communication </span><a class="workspace-trigger" data-dcnode-id="11008" href="#b42" name="bb42"><span data-dcnode-id="11009" instrument_node="">[42]</span></a><span data-dcnode-id="11007" instrument_node="">, Software Prototyping, Oceanographic research </span><a class="workspace-trigger" data-dcnode-id="11005" href="#b43" name="bb43"><span data-dcnode-id="11006" instrument_node="">[43]</span></a><span data-dcnode-id="11004" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11002" href="#b44" name="bb44"><span data-dcnode-id="11003" instrument_node="">[44]</span></a><span data-dcnode-id="11001" instrument_node=""> and Programming Education&nbsp;</span><a class="workspace-trigger" data-dcnode-id="10999" href="#b45" name="bb45"><span data-dcnode-id="11000" instrument_node="">[45]</span></a><span data-dcnode-id="10998" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10996" href="#b46" name="bb46"><span data-dcnode-id="10997" instrument_node="">[46]</span></a><span data-dcnode-id="10995" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10993" href="#b47" name="bb47"><span data-dcnode-id="10994" instrument_node="">[47]</span></a><span data-dcnode-id="10992" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10990" href="#b48" name="bb48"><span data-dcnode-id="10991" instrument_node="">[48]</span></a><span data-dcnode-id="10989" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10987" href="#b49" name="bb49"><span data-dcnode-id="10988" instrument_node="">[49]</span></a><span data-dcnode-id="10986" instrument_node=""> and&nbsp;</span><a class="workspace-trigger" data-dcnode-id="10984" href="#b50" name="bb50"><span data-dcnode-id="10985" instrument_node="">[50]</span></a><span data-dcnode-id="10983" instrument_node="">.</span></p><section data-dcnode-id="10859" id="sec1.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10976" id="d1e2088"><span data-dcnode-id="10981" instrument_node="">1.1</span><span data-dcnode-id="10979" instrument_node="">. </span><span data-dcnode-id="10977" instrument_node="">Steps in prototyping with arduino</span></h3><p data-dcnode-id="10968" id="d1e2090"><span data-dcnode-id="10975" instrument_node="">Generic steps in prototyping with Arduino, irrespective of the variant being used or the type of project being prototyped </span><a class="workspace-trigger" data-dcnode-id="10973" href="#b51" name="bb51"><span data-dcnode-id="10974" instrument_node="">[51]</span></a><span data-dcnode-id="10972" instrument_node="">, usually includes the following (cp. </span><a class="workspace-trigger" data-dcnode-id="10970" href="#fig1" name="bfig1"><span data-dcnode-id="10971" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="10969" instrument_node="">):</span></p><section data-dcnode-id="10959" id="sec1.1.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10962" id="d1e2103"><span data-dcnode-id="10967" instrument_node="">1.1.1</span><span data-dcnode-id="10965" instrument_node="">. </span><span data-dcnode-id="10963" instrument_node="">Ideation/problem definition</span></h4><p data-dcnode-id="10960" id="d1e2105"><span data-dcnode-id="10961" instrument_node="">during this stage, the idea of the project is birthed, a need for such a project is discovered and the project the finished project is supposed to solve is defined. From this stage, a picture of the successfully prototyped project is imagined.</span></p></section><section data-dcnode-id="10950" id="sec1.1.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10953" id="d1e2110"><span data-dcnode-id="10958" instrument_node="">1.1.2</span><span data-dcnode-id="10956" instrument_node="">. </span><span data-dcnode-id="10954" instrument_node="">Conceptualization</span></h4><p data-dcnode-id="10951" id="d1e2112"><span data-dcnode-id="10952" instrument_node="">After the idea had been birthed and problems defined, a concept is built around the idea. This is a simplified view of the project [Gruber]. How exactly should it work? Would computations be necessary for generating the final output? What is the process the finished product would go through before producing an output? Are theories necessary, what should be the theory behind the operations of the imagined system?</span></p></section><section data-dcnode-id="10860" id="sec1.1.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10944" id="d1e2117"><span data-dcnode-id="10949" instrument_node="">1.1.3</span><span data-dcnode-id="10947" instrument_node="">. </span><span data-dcnode-id="10945" instrument_node="">Prototyping</span></h4><p data-dcnode-id="10933" id="d1e2119"><span data-dcnode-id="10943" instrument_node="">This involves building a sample of the finished product&nbsp;</span><a class="workspace-trigger" data-dcnode-id="10941" href="#b52" name="bb52"><span data-dcnode-id="10942" instrument_node="">[52]</span></a><span data-dcnode-id="10940" instrument_node="">. A prototype translates theories into specifications for a real, working system&nbsp;</span><a class="workspace-trigger" data-dcnode-id="10938" href="#b53" name="bb53"><span data-dcnode-id="10939" instrument_node="">[53]</span></a><span data-dcnode-id="10937" instrument_node="">. The imagined ideas, now conceptualized are built into an observable framework; a rough set of clickable screens one capable of having the user/developer move around it to simulate interaction; high definition screens with code-like prototypes and eventually the project up and running in actual codes. Prototypes of software are initially alpha grades being that they are the first version of the project to run until they have been modified to contain all the required features. Once all the features are incorporated, the prototype becomes a beta software, ready for testing and subsequent deployment for public use. These two types of prototypes capsulate the general idea behind a prototype, that is, a version needed by system analysts and users to evaluate the built system to enhance effectiveness and performance&nbsp;</span><a class="workspace-trigger" data-dcnode-id="10935" href="#b54" name="bb54"><span data-dcnode-id="10936" instrument_node="">[54]</span></a><span data-dcnode-id="10934" instrument_node="">.</span></p><div data-dcnode-id="10899"><p data-dcnode-id="10925" id="d1e2133"><span data-dcnode-id="10932" instrument_node="">The final stage, prototyping, does have stages itself. These are the communication, design, modeling, and deployment stages&nbsp;</span><a class="workspace-trigger" data-dcnode-id="10930" href="#b55" name="bb55"><span data-dcnode-id="10931" instrument_node="">[55]</span></a><span data-dcnode-id="10929" instrument_node=""> (see </span><a class="workspace-trigger" data-dcnode-id="10927" href="#fig2" name="bfig2"><span data-dcnode-id="10928" instrument_node="">Fig.&nbsp;2</span></a><span data-dcnode-id="10926" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="10900" id="fig1"><span data-dcnode-id="10909"><img alt="" aria-describedby="d1e23" data-dcnode-id="10924" height="78" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr1.jpg&amp;raw"><span data-dcnode-id="10923" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10910"><li data-dcnode-id="10917"><a class="anchor download-link u-font-sans" data-dcnode-id="10918" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr1_lrg.jpg" target="_blank" title="Download high-res image (98KB)"><span class="anchor-text" data-dcnode-id="10919"><span data-dcnode-id="10922" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10920"><span data-dcnode-id="10921" instrument_node="">Download high-res image (98KB)</span></span></span></a></li><li data-dcnode-id="10911"><a class="anchor download-link u-font-sans" data-dcnode-id="10912" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10913"><span data-dcnode-id="10916" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10914"><span data-dcnode-id="10915" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10901"><span data-dcnode-id="10902" id="d1e23"><p data-dcnode-id="10903" id="d1e24"><span class="label" data-dcnode-id="10907"><span data-dcnode-id="10908" instrument_node="">Fig. 1</span></span><span data-dcnode-id="10906" instrument_node="">. </span><span data-dcnode-id="10904" instrument_node="">Generic steps in prototyping with Arduino.</span></p></span></span></figure></div><div data-dcnode-id="10871"><p data-dcnode-id="10897" id="d1e2145"><span data-dcnode-id="10898" instrument_node="">At the communication stage, the project requirement and outlook of the expected final product are communicated to the developing team by the idea initiator. The design is important in building the prototype. The design stage requires the depiction of the input and output features of the project under review, focusing on the features of the project that are easily observable and implementable and not just abstract, non-implementable wishes of the idea initiator. During modeling, the goal is to put the conceptualized idea in a form it is clearly understood and the expected product imagined. After this stage, the idea initiator and other critical stakeholders of the project should see what has been built so far and agree whether it is good enough or requires improvements in certain places. Finally, the product from the modeling stage is deployed to the production environment and eventually shipped to the expected users.</span></p><figure class="figure text-xs" data-dcnode-id="10872" id="fig2"><span data-dcnode-id="10881"><img alt="" aria-describedby="d1e31" data-dcnode-id="10896" height="260" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr2.jpg&amp;raw"><span data-dcnode-id="10895" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10882"><li data-dcnode-id="10889"><a class="anchor download-link u-font-sans" data-dcnode-id="10890" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr2_lrg.jpg" target="_blank" title="Download high-res image (127KB)"><span class="anchor-text" data-dcnode-id="10891"><span data-dcnode-id="10894" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10892"><span data-dcnode-id="10893" instrument_node="">Download high-res image (127KB)</span></span></span></a></li><li data-dcnode-id="10883"><a class="anchor download-link u-font-sans" data-dcnode-id="10884" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10885"><span data-dcnode-id="10888" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10886"><span data-dcnode-id="10887" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10873"><span data-dcnode-id="10874" id="d1e31"><p data-dcnode-id="10875" id="d1e32"><span class="label" data-dcnode-id="10879"><span data-dcnode-id="10880" instrument_node="">Fig. 2</span></span><span data-dcnode-id="10878" instrument_node="">. </span><span data-dcnode-id="10876" instrument_node="">Final processes in the prototyping phase of prototyping.</span></p></span></span></figure></div><p data-dcnode-id="10869" id="d1e2149"><span data-dcnode-id="10870" instrument_node="">At the heart of this paper, are the following objectives:</span></p><p data-dcnode-id="10867" id="d1e2151"><span data-dcnode-id="10868" instrument_node="">(1) a thorough review of researches already conducted in the field of prototyping with Arduino</span></p><p data-dcnode-id="10865" id="d1e2153"><span data-dcnode-id="10866" instrument_node="">(2) highlighting the challenges of research, and</span></p><p data-dcnode-id="10863" id="d1e2155"><span data-dcnode-id="10864" instrument_node="">(3) the motivation of more individuals to prototype with Arduino and enjoy the many benefits of using it to build microcontrollers which in turn could be used to solve a whole range of problems.</span></p><p data-dcnode-id="10861" id="d1e2157"><span data-dcnode-id="10862" instrument_node="">Much effort was concentrated on reviewing the application domains of Arduino. A detailed analysis of the prototyping steps is outside the deliverables of this review. Moreover, the methods applied within these phases are generic and generally independent of the application domain.</span></p></section></section></section><section data-dcnode-id="10396" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10852" id="d1e2162"><span data-dcnode-id="10857" instrument_node="">2</span><span data-dcnode-id="10855" instrument_node="">. </span><span data-dcnode-id="10853" instrument_node="">Methods</span></h2><p data-dcnode-id="10850" id="d1e2164"><span data-dcnode-id="10851" instrument_node="">A systematic literature review (SLR) is the assessment of all existing research materials on a particular research topic of interest and an accompanying generalized interpretation of the results from the assessed research works. The methodology for a systematic literature review (SLR) is well established. The processes involved in an SLR are grouped into three main parts, and these include:</span></p><p data-dcnode-id="10827" id="d1e2166"></p><dl class="list" data-dcnode-id="10828"><dt class="list-label" data-dcnode-id="10848"><span data-dcnode-id="10849" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="10845"><p data-dcnode-id="10846" id="d1e2172"><span data-dcnode-id="10847" instrument_node="">Outlining of the research questions,</span></p></dd><dt class="list-label" data-dcnode-id="10843"><span data-dcnode-id="10844" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="10840"><p data-dcnode-id="10841" id="d1e2177"><span data-dcnode-id="10842" instrument_node="">Conduction of a thorough search procedure to find important publications, and</span></p></dd><dt class="list-label" data-dcnode-id="10838"><span data-dcnode-id="10839" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="10829"><p data-dcnode-id="10830" id="d1e2182"><span data-dcnode-id="10837" instrument_node="">Mining essential data, useful for answering the outlined research questions, from the identified publications&nbsp;</span><a class="workspace-trigger" data-dcnode-id="10835" href="#b56" name="bb56"><span data-dcnode-id="10836" instrument_node="">[56]</span></a><span data-dcnode-id="10834" instrument_node=""> and&nbsp;</span><a class="workspace-trigger" data-dcnode-id="10832" href="#b57" name="bb57"><span data-dcnode-id="10833" instrument_node="">[57]</span></a><span data-dcnode-id="10831" instrument_node="">.</span></p></dd></dl><p></p><p data-dcnode-id="10825"><span data-dcnode-id="10826" instrument_node="">These steps and methods were exactly what was adopted in this review.</span></p><section data-dcnode-id="10784" id="sec2.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10819" id="d1e2197"><span data-dcnode-id="10824" instrument_node="">2.1</span><span data-dcnode-id="10822" instrument_node="">. </span><span data-dcnode-id="10820" instrument_node="">Research questions</span></h3><p data-dcnode-id="10817" id="d1e2199"><span data-dcnode-id="10818" instrument_node="">The following four research questions were defined for our systematic literature review:</span></p><p data-dcnode-id="10809" id="d1e2201"><span data-dcnode-id="10816" instrument_node="">RESEARCH QUESTION-1: </span><strong data-dcnode-id="10814"><span data-dcnode-id="10815" instrument_node="">Arduino Board variants:</span></strong><span data-dcnode-id="10813" instrument_node=""> </span><em data-dcnode-id="10811"><span data-dcnode-id="10812" instrument_node="">What are the different variants of Arduino boards? What are the technical specifications (width, breadth, weight, number of digital and analog IO pins, memory, processor, etc.), advantages, and limitations of each variant? What is the specific application of each variant?</span></em><span data-dcnode-id="10810" instrument_node=""> (The goal here is to get a quantitative overview of Arduino boards and a description of each variant as obtained in the reviewed literature.)</span></p><p data-dcnode-id="10801" id="d1e2209"><span data-dcnode-id="10808" instrument_node="">RESEARCH QUESTION-2: </span><strong data-dcnode-id="10806"><span data-dcnode-id="10807" instrument_node="">Application Domains of Arduino:</span></strong><span data-dcnode-id="10805" instrument_node=""> </span><em data-dcnode-id="10803"><span data-dcnode-id="10804" instrument_node="">What are the various application domains of Arduino prototyping? What are the advantages, challenges, limitations of using Arduino for prototyping in each application domain?</span></em><span data-dcnode-id="10802" instrument_node=""> This question interrogated the areas where Arduino could be used in prototyping problem-solving devices. There happen to exist over a thousand such areas, so we had to constrain ourselves with a limited number of domains.</span></p><p data-dcnode-id="10793" id="d1e2217"><span data-dcnode-id="10800" instrument_node="">RESEARCH QUESTION-3: </span><strong data-dcnode-id="10798"><span data-dcnode-id="10799" instrument_node="">Alternatives to Arduino:</span></strong><span data-dcnode-id="10797" instrument_node=""> </span><em data-dcnode-id="10795"><span data-dcnode-id="10796" instrument_node="">What are the other alternative prototyping boards to Arduino? What are their strengths and weaknesses?</span></em><span data-dcnode-id="10794" instrument_node=""> Arduino is not the only type of prototyping board in the market. This research question seeks to identify these alternatives and to conduct a comparative analysis of the capabilities of each board.</span></p><p data-dcnode-id="10785" id="d1e2225"><span data-dcnode-id="10792" instrument_node="">RESEARCH QUESTION-4: </span><strong data-dcnode-id="10790"><span data-dcnode-id="10791" instrument_node="">Hardware components and software packages used when prototyping with Arduino</span></strong><span data-dcnode-id="10789" instrument_node="">: </span><em data-dcnode-id="10787"><span data-dcnode-id="10788" instrument_node="">What are the commonly used Hardware components (Sensors, connectors, accessories, and other devices) in prototyping with Arduino? What is the commonly used software for data storage, analysis, and output?</span></em><span data-dcnode-id="10786" instrument_node=""> Here we identified the hardware components of an Arduino board and the software packages that work with these hardware components to prototype projects.</span></p></section><section data-dcnode-id="10424" id="sec2.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10778" id="d1e2236"><span data-dcnode-id="10783" instrument_node="">2.2</span><span data-dcnode-id="10781" instrument_node="">. </span><span data-dcnode-id="10779" instrument_node="">Data sources and selection strategy</span></h3><p data-dcnode-id="10770" id="d1e2238"><span data-dcnode-id="10777" instrument_node="">Many strategies exist for the identification of data sources in systematic literature reviews like this one. But for our review, we combined the backward and forward snowballing strategies in identifying relevant primary studies (as shown in </span><a class="workspace-trigger" data-dcnode-id="10775" href="#fig3" name="bfig3"><span data-dcnode-id="10776" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="10774" instrument_node="">). The reason we adopted this approach because such a snowballing search technique allows the accumulation of a relatively complete census of relevant literature. Again, literature so acquired is not always limited to a single research methodology, a single set of journal articles and conference papers, or a particular geographic location. The snowballing strategy needs in its operations a starting set of publications usually publications in the research field’s leading journals. Publications that have been cited several times and by varied categories of researches are also acceptable. A manual search on Google Scholar was used to identify our starting set of five publications (as illustrated in </span><a class="workspace-trigger" data-dcnode-id="10772" href="#tbl1" name="btbl1"><span data-dcnode-id="10773" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="10771" instrument_node="">). Google Scholar is a popular tool for finding research papers and scholarly written textbooks, journal articles, and conference papers. It is widely used in the intelligence community because eliminates bias in favor of against a particular publisher in the set point of the sampling procedure. But the existence of a publication on Google Scholar is in itself not enough to judge the credibility of the publication or ascertain that it is scholarly enough. To confirm if our initial set publications already identified from Google Scholar were scholarly enough and good enough for our systematic literature review, we had to be sure they appeared in at least one other scientific repositories. Popular scientific repositories for such check include:</span></p><p data-dcnode-id="10768" id="d1e2264"><span data-dcnode-id="10769" instrument_node="">(a) ACM Digital Library,</span></p><p data-dcnode-id="10766" id="d1e2266"><span data-dcnode-id="10767" instrument_node="">(b) Elsevier ScienceDirect®,</span></p><p data-dcnode-id="10764" id="d1e2268"><span data-dcnode-id="10765" instrument_node="">(c) IEEE Xplore®, and</span></p><p data-dcnode-id="10739" id="d1e2270"><span data-dcnode-id="10763" instrument_node="">(d) Thomson Reuters Web of Science</span><span class="math" data-dcnode-id="10741"><span class="MathJax_Preview" data-dcnode-id="10762" style=""></span><span class="MathJax_SVG" data-dcnode-id="10744" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><msup is=&quot;true&quot;><mrow is=&quot;true&quot; /><mrow is=&quot;true&quot;><mi mathvariant=&quot;normal&quot; is=&quot;true&quot;>TM</mi></mrow></msup></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="10752" focusable="false" height="2.341ex" role="img" style="vertical-align: -0.127ex;" viewBox="0 -952.9 1259.7 1007.7" width="2.926ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="10753" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="10754" is="true"><g data-dcnode-id="10761" is="true"></g><g data-dcnode-id="10755" is="true" transform="translate(0,362)"><g data-dcnode-id="10756" is="true"><use data-dcnode-id="10759" href="#MJMAIN-54" transform="scale(0.707)"><path d="M36 443Q37 448 46 558T55 671V677H666V671Q667 666 676 556T685 443V437H645V443Q645 445 642 478T631 544T610 593Q593 614 555 625Q534 630 478 630H451H443Q417 630 414 618Q413 616 413 339V63Q420 53 439 50T528 46H558V0H545L361 3Q186 1 177 0H164V46H194Q264 46 283 49T309 63V339V550Q309 620 304 625T271 630H244H224Q154 630 119 601Q101 585 93 554T81 486T76 443V437H36V443Z" data-dcnode-id="10760" id="MJMAIN-54" stroke-width="1"></path></use><use data-dcnode-id="10757" href="#MJMAIN-4D" transform="scale(0.707)" x="722" y="0"><path d="M132 622Q125 629 121 631T105 634T62 637H29V683H135Q221 683 232 682T249 675Q250 674 354 398L458 124L562 398Q666 674 668 675Q671 681 683 682T781 683H887V637H854Q814 636 803 634T785 622V61Q791 51 802 49T854 46H887V0H876Q855 3 736 3Q605 3 596 0H585V46H618Q660 47 669 49T688 61V347Q688 424 688 461T688 546T688 613L687 632Q454 14 450 7Q446 1 430 1T410 7Q409 9 292 316L176 624V606Q175 588 175 543T175 463T175 356L176 86Q187 50 261 46H278V0H269Q254 3 154 3Q52 3 37 0H29V46H46Q78 48 98 56T122 69T132 86V622Z" data-dcnode-id="10758" id="MJMAIN-4D" stroke-width="1"></path></use></g></g></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="10745" role="presentation"><math data-dcnode-id="10746" xmlns="http://www.w3.org/1998/Math/MathML"><msup data-dcnode-id="10747" is="true"><mrow data-dcnode-id="10751" is="true"></mrow><mrow data-dcnode-id="10748" is="true"><mi data-dcnode-id="10749" is="true" mathvariant="normal"><span data-dcnode-id="10750" instrument_node="">TM</span></mi></mrow></msup></math></span></span></span><span data-dcnode-id="10740" instrument_node="">.</span></p><p data-dcnode-id="10737" id="d1e2280"><span data-dcnode-id="10738" instrument_node="">All of these repositories are reputable enough to publish low-quality publications. The existence of the selected publication is not only Google Scholar but also one of these repositories is clear proof the publication is high quality and therefore fit to make a list of the publications that would possibly make the final cut. We also applied backward snowball selection to all the publications selected and confirmed to exist in any of the above-listed repositories. Backward snowball selection here refers to a recursive consideration of all the referenced publications in all the papers already identified from our manual search on Google Scholar. This is complemented by forward snowballing to further increase the references needed for our review.</span></p><div data-dcnode-id="10709"><p data-dcnode-id="10735" id="d1e2282"><span data-dcnode-id="10736" instrument_node="">Forward snowballing was carried out by scurrying through Google Scholar citations to identify similar publications that provide answers to our research questions especially publications from all the studies that cited any of our already included publications.</span></p><figure class="figure text-xs" data-dcnode-id="10710" id="fig3"><span data-dcnode-id="10719"><img alt="" aria-describedby="d1e39" data-dcnode-id="10734" height="334" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr3.jpg&amp;raw"><span data-dcnode-id="10733" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10720"><li data-dcnode-id="10727"><a class="anchor download-link u-font-sans" data-dcnode-id="10728" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr3_lrg.jpg" target="_blank" title="Download high-res image (438KB)"><span class="anchor-text" data-dcnode-id="10729"><span data-dcnode-id="10732" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10730"><span data-dcnode-id="10731" instrument_node="">Download high-res image (438KB)</span></span></span></a></li><li data-dcnode-id="10721"><a class="anchor download-link u-font-sans" data-dcnode-id="10722" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1574013721000046-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10723"><span data-dcnode-id="10726" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10724"><span data-dcnode-id="10725" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10711"><span data-dcnode-id="10712" id="d1e39"><p data-dcnode-id="10713" id="d1e40"><span class="label" data-dcnode-id="10717"><span data-dcnode-id="10718" instrument_node="">Fig. 3</span></span><span data-dcnode-id="10716" instrument_node="">. </span><span data-dcnode-id="10714" instrument_node="">Selection Process of the literature used in the study.</span></p></span></span></figure></div><div data-dcnode-id="10574"><p data-dcnode-id="10707" id="d1e2286"><span data-dcnode-id="10708" instrument_node="">To make the final cut and be used in our study, we subjected the publications to further assessment other than being listed in the repositories. This assessment was based on the criteria that the paper title is expected to comply with a certain pattern. This pattern went thus: P1 AND (P2 OR P3 OR P4 OR P5 OR P6) AND NOT (P7) where</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="10575" id="tbl1"><span class="captions" data-dcnode-id="10699"><span data-dcnode-id="10700" id="d1e62"><p data-dcnode-id="10701" id="d1e63"><span class="label" data-dcnode-id="10705"><span data-dcnode-id="10706" instrument_node="">Table 1</span></span><span data-dcnode-id="10704" instrument_node="">. </span><span data-dcnode-id="10702" instrument_node="">Seeding of a set of papers for backward and forward snowballing in the review.</span></p></span></span><div class="groups" data-dcnode-id="10579"><table data-dcnode-id="10580"><thead data-dcnode-id="10657"><tr class="valign-top" data-dcnode-id="10658"><th class="align-left" data-dcnode-id="10697" scope="col"><span data-dcnode-id="10698" instrument_node="">Author, Year</span></th><th class="align-left" data-dcnode-id="10695" scope="col"><span data-dcnode-id="10696" instrument_node="">Journal/Conference</span></th><th class="align-left" data-dcnode-id="10693" scope="col"><span data-dcnode-id="10694" instrument_node="">Title</span></th><th class="align-left" data-dcnode-id="10691" scope="col"><span data-dcnode-id="10692" instrument_node="">Year</span></th><th class="align-left" data-dcnode-id="10675" scope="col"><span class="math" data-dcnode-id="10677"><span class="MathJax_Preview" data-dcnode-id="10690" style=""></span><span class="MathJax_SVG" data-dcnode-id="10680" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mi is=&quot;true&quot;>&amp;#x3A3;</mi></math>" id="MathJax-Element-2-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="10685" focusable="false" height="2.214ex" role="img" style="vertical-align: -0.32ex;" viewBox="0 -815.6 806.5 953.3" width="1.873ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="10686" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="10687" is="true"><use data-dcnode-id="10688" href="#MJMATHI-3A3"><path d="M65 0Q58 4 58 11Q58 16 114 67Q173 119 222 164L377
