</span><div data-dcnode-id="1136"><span data-dcnode-id="1137"><span data-dcnode-id="1138"><span data-dcnode-id="1154" instrument_node="">Many people notice the issue when the </span><b data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">bathroom</span></b><span data-dcnode-id="1151" instrument_node=""> exhaust </span><b data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">fan</span></b><span data-dcnode-id="1148" instrument_node=""> starts </span><b data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">dripping</span></b><span data-dcnode-id="1145" instrument_node=""> on their head as they step out after a shower. The usual cause is condensation inside the duct. In winter, when the warm moist air from the </span><b data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">bathroom</span></b><span data-dcnode-id="1142" instrument_node=""> hits cool air in the attic or outdoors, it condenses, sending </span><b data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">drips</span></b><span data-dcnode-id="1139" instrument_node=""> back down the ductwork.</span></span></span></div><span data-dcnode-id="1135" instrument_node="">Read </span><a class="lc" data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//treehozz.com/goto/82268" rel="nofollow" target="_blank"><span data-dcnode-id="1134" instrument_node="">in-depth answer</span></a><span data-dcnode-id="1132" instrument_node=""> here.</span><br data-dcnode-id="1131"><span data-dcnode-id="1130" instrument_node=""> Also,  how do I stop condensation in my bathroom fan?</span><p data-dcnode-id="1125"><span data-dcnode-id="1129" instrument_node=""> </span><b data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">How To Prevent Ceiling Stains Around Your Bathroom Exhaust Fan</span></b><span data-dcnode-id="1126" instrument_node=""> </span></p><ol data-dcnode-id="1111"><span data-dcnode-id="1124" instrument_node=""> </span><li data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Use an insulated duct inside the attic. This is a no-brainer.</span></li><span data-dcnode-id="1121" instrument_node=""> </span><li data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Use the shortest run possible. The longer the bath fan duct, the greater the potential for condensation inside the duct.</span></li><span data-dcnode-id="1118" instrument_node=""> </span><li data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Make sure the duct is tightly connected to a roof cap with a damper.</span></li><span data-dcnode-id="1115" instrument_node=""> </span><li data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Check the damper at the roof cap periodically.</span></li><span data-dcnode-id="1112" instrument_node=""> </span></ol><span data-dcnode-id="1110" instrument_node=""> </span><p data-dcnode-id="1109"></p><p data-dcnode-id="1083"><span data-dcnode-id="1108" instrument_node="">Additionally,  will an extractor fan get rid of condensation? </span><span data-dcnode-id="1084"><span data-dcnode-id="1085"><span data-dcnode-id="1107" instrument_node="">An </span><b data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">extractor fan can</span></b><span data-dcnode-id="1104" instrument_node=""> help control </span><b data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">condensation</span></b><span data-dcnode-id="1101" instrument_node="">. If you don't fit an </span><b data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">extractor fan</span></b><span data-dcnode-id="1098" instrument_node="">, the </span><b data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">condensation</span></b><span data-dcnode-id="1095" instrument_node=""> has nowhere to escape, which </span><b data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">can</span></b><span data-dcnode-id="1092" instrument_node=""> lead to major issues. An </span><b data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">extractor fan</span></b><span data-dcnode-id="1089" instrument_node=""> takes the moist air out of your </span><b data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">bathroom</span></b><span data-dcnode-id="1086" instrument_node=""> and transports it outside.</span></span></span></p><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node=""> Subsequently, question is,  why is my bathroom vent leaking when it rains?</span></p><p data-dcnode-id="1055"><span data-dcnode-id="1080" instrument_node=""> </span><span data-dcnode-id="1056"><span data-dcnode-id="1057"><span data-dcnode-id="1079" instrument_node="">If </span><b data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">the bathroom</span></b><span data-dcnode-id="1076" instrument_node=""> fan is </span><b data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">dripping</span></b><span data-dcnode-id="1073" instrument_node=""> water when it </span><b data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">rains</span></b><span data-dcnode-id="1070" instrument_node="">, it means that </span><b data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">the</span></b><span data-dcnode-id="1067" instrument_node=""> flashing or some part of </span><b data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">the vent</span></b><span data-dcnode-id="1064" instrument_node=""> cover is allowing in water. It may also be </span><b data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">the</span></b><span data-dcnode-id="1061" instrument_node=""> flap that is loose or missing and is allowing in water. In short, you will have to get someone onto </span><b data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">the roof</span></b><span data-dcnode-id="1058" instrument_node=""> to fix it.</span></span></span></p><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">How do you stop condensation in ducts?</span></p><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node=""> </span></p><ol data-dcnode-id="1037"><span data-dcnode-id="1050" instrument_node=""> </span><li data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Reduce the humidity level around your air ducts. Keep ducts spaced apart so air can flow between them.</span></li><span data-dcnode-id="1047" instrument_node=""> </span><li data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Unblock any ducts that are restricting air flow and have them cleaned regularly.</span></li><span data-dcnode-id="1044" instrument_node=""> </span><li data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Keep your air filters clean and change them regularly.</span></li><span data-dcnode-id="1041" instrument_node=""> </span><li data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Repair leaking ducts.</span></li><span data-dcnode-id="1038" instrument_node=""> </span></ol><p data-dcnode-id="1036"></p><span data-dcnode-id="1035" instrument_node=""> </span><div class="pg-lazy" data-dcnode-id="1034" data-gpt-parent="th_flex_desk"></div><span data-dcnode-id="1033" instrument_node="">
