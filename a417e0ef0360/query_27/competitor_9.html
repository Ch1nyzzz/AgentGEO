</span><p data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">There are hundreds available, and if you don’t have an existing fan to base your judgement on or if you do but it is an old model, then the question is simple: which extractor fan do you buy? With such choice comes huge ranges in terms of price, size and effectiveness. As a general rule, those which cost a bit more will be more reliable and quieter, but there’s a few gems out there.</span></p><span data-dcnode-id="2612" instrument_node="">

</span><p data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Square fans are the norm, but if you’d rather opt for the best round model then this option is a good pick.</span></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">The design makes it unobtrusive and no squaring up is needed when installing, which should make it much easier. It is also slimline, so doesn’t take up much space at all.</span></p><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">A big standout is the Iris shutter design. When the fan is not in use, the air vent area completely closes, so no outside air will come into your room in the form of backdraughts. This saves having to purchase all those extras which block out the air.</span></p><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">The cover can be changed to better match the aesthetics of the room you are in, with a choice of Anthracite, Chrome, Sandstone and Silver available to purchase separately.</span></p><span data-dcnode-id="2215" instrument_node="">
</span><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">It isn’t silent, but is still on the quiet side. As there is the shutter design, you won’t find there is a lot of noise on windy nights or during storms, which is perfect if you want to replace your current model for these reasons.</span></p><span data-dcnode-id="2212" instrument_node="">

</span><p data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">An axial fan perfect for 4″ 100mm ducting, this model is one of the most powerful for its size.</span></p><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">It can be fitted to a ceiling, which is ideal if this is where your current gap is. It can also be hooked up to your light connection, so it comes on automatically when the main light is used and will remain on for a while after the light goes out so the room clears. Or, use a cord override to be able to control it a little more.</span></p><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">There is a handy timer option where 5, 20 or 30 minutes run-on time can be selected, or in automatic mode it self-calculates the time needed to clear the room. The shut off time can also be adjusted between 1 and 30 minutes, so whether you have a large room or a lot of steam is produced, you can pick the exact time needed.</span></p><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Not only is it powerful, but it is also quiet when working. It was awarded the Quiet Mark in 2013, so the noise of the fan isn’t going to annoy you as you take your shower. To be more technical, the sound output is 26.5 dB at 3 metres, which is rated A.</span></p><span data-dcnode-id="2067" instrument_node="">

</span><p data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">It is designed for wall and ceiling mounting, so while best for a bathroom, it can also be used in kitchens. The 75m3/hr extraction rate is sufficient enough to get rid of both steam from showers and baths or smoke and smells from your cooking.</span></p><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">The noise level is 27dB, which gives it an A rating, and can give you a 60% reduction in noise compared to some other 4” rivals. You will be able to hear it ever so slightly if in the same room of course, but once the door is closed you won’t even be able to tell it is on.</span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Manrose also state that it is the most environmentally friendly fan in their range, so you can keep it running without worrying about how much it is costing you and how much electricity it is using.</span></p><span data-dcnode-id="1783" instrument_node="">

</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">The ABS thermoplastic &amp; PVC bathroom shower extractor fan kit is splash-resistant, so a bit of water will not harm the workings. There is a timer, meaning that for up to 20 minutes after the lights are switched off and you leave the bathroom, it can still run to ensure the room is completely cleared.</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">The external grille isn’t the prettiest, but when it is as functional as this, we would say it is an easy thing to put up with. You get a 3m long duct hose with the purchase which is great so you can get started.</span></p><span data-dcnode-id="1505" instrument_node="">

</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">This is the kitchen-suitable version of Manrose’s Gold Bathroom fan. It is suitable for both wall and ceiling mounting, and a long lasting ball bearing motor means it should last for a good few years.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">It is relatively easy to install, and the ABS thermoplastic material makes it simple to keep clean. Fans can often become discoloured with cooking fumes over the years, turning a slightly yellowish tint. Even when the fan is working in overdrive, some can still escape.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">So this material makes it easy to give an occasional wipe clean and keep looking as good as new throughout its lifespan. It is also quiet when on and has a standard design so won’t look like an eyesore.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Overall, though, it does what it is meant to – the suction is hugely powerful, and you can really see the difference as it dispels smoke and steam in seconds.</span></p><span data-dcnode-id="1191" instrument_node="">

</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Complete with a pull cord so you can flick it on and off as you wish, this kitchen-appropriate extractor fan is solid and reliable.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">It is a standard model, so if you already have an extraction fan in place, there is a good chance this will be a nice clean swap for it. You can mount it either on your wall or window, depending on what is best for you and your kitchen layout.</span></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Using a pre-oiled ball bearing motor, the longevity of the fan should be increased – up to 2x as much possibly. Many start to wear away after a few years with regular use and all the moisture they have to remove, but this one is designed to give you a good bit more use.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">The noise it a bit on the upper side. This may be a bit of a pain if you like to have a nice peaceful meal time or cooking session, and is why it is best in the kitchen as opposed to the bathroom.</span></p><span data-dcnode-id="1049" instrument_node="">

</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">One thing you don’t see often in extractor fans is the Mosquito net design which this OOPPEN has. This prevents insects or dust and small particles entering your home, and will also reduce the likelihood of draughts.</span></p><span data-dcnode-id="911" instrument_node="">

</span><article class="post wpb_content_element" data-dcnode-id="264"><span data-dcnode-id="310" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="266"><span data-dcnode-id="309" instrument_node="">
</span><h3 data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">What To Look For In An Extractor Fan</span></h3><span data-dcnode-id="306" instrument_node="">
</span><ul data-dcnode-id="289"><span data-dcnode-id="305" instrument_node="">
</span><li data-dcnode-id="301"><strong data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Size</span></strong><span data-dcnode-id="302" instrument_node=""> – Most of these will be pretty universal, which is great, especially if you already have a space for the fan and are replacing a current model. But you will still need to double check – you don’t want any gaping gaps. Also check the fitting positions will be appropriate</span></li><span data-dcnode-id="300" instrument_node="">
</span><li data-dcnode-id="296"><strong data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Noise</span></strong><span data-dcnode-id="297" instrument_node=""> – You have to expect some noise from the fan when it is working, because of the action it takes sucking air through the vents. But some may be designed to keep the noise at bay, and it could be worth paying a bit more to buy a quieter model if you will need the fan on a lot</span></li><span data-dcnode-id="295" instrument_node="">
</span><li data-dcnode-id="291"><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Material</span></strong><span data-dcnode-id="292" instrument_node=""> – The majority are plastic. This makes them easy to wipe clean and protect from dirt and grease which can discolour them over time</span></li><span data-dcnode-id="290" instrument_node="">
</span></ul><span data-dcnode-id="288" instrument_node="">
</span><h3 data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Types Of Extractor Fan</span></h3><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">There are two main types of extractor fan: axial, which you can fit in an exterior wall or in a window, and centrifugal fans, which are usually mounted on the ceiling.</span></p><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">The former is commonly found in kitchens and loft spaces, but latter on a bathroom.</span></p><span data-dcnode-id="279" instrument_node="">
</span><h3 data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Operation</span></h3><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">An extractor fan can be operated in one of two ways: either a pull cord so you can activate it when it is needed, or by a switch elsewhere in the house. The latter is usually for fans which switch on alongside another action, such as flicking the bathroom light on and they will stay on for a short period after the light is switched off. Or, it may be when the room reaches particular levels of humidity.</span></p><span data-dcnode-id="273" instrument_node="">
</span><h3 data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Fitting</span></h3><span data-dcnode-id="270" instrument_node="">
</span><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Extractor fans should be fitted as high up on a wall as possible. This is because whatever they have to remove will likely rise. It is usually possible to do this yourself as long as it is a clean swap for replacing an already existing unit; just remember to switch the electricity off first. If yours is going to be a bit trickier, hire a decent electrician who could have it done safely in minutes</span></p><span data-dcnode-id="267" instrument_node="">
</span></div><span data-dcnode-id="265" instrument_node="">
</span></article><span data-dcnode-id="263" instrument_node="">
</span><div class="vc_separator wpb_content_element vc_separator_align_center vc_sep_width_100 vc_sep_pos_align_center vc_separator_no_text vc_sep_color_grey" data-dcnode-id="257"><span class="vc_sep_holder vc_sep_holder_l" data-dcnode-id="261"><span class="vc_sep_line" data-dcnode-id="262"></span></span><span class="vc_sep_holder vc_sep_holder_r" data-dcnode-id="259"><span class="vc_sep_line" data-dcnode-id="260"></span></span><span data-dcnode-id="258" instrument_node="">
</span></div></div></div></div></div><div class="vc_row wpb_row vc_row-fluid centered-container" data-dcnode-id="221"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="222"><div class="vc_column-inner" data-dcnode-id="223"><div class="wpb_wrapper" data-dcnode-id="224"><span data-dcnode-id="252" instrument_node="">
</span><article class="post wpb_content_element" data-dcnode-id="226"><span data-dcnode-id="251" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="228"><span data-dcnode-id="250" instrument_node="">
</span><h3 data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">FAQ’s</span></h3><span data-dcnode-id="247" instrument_node="">
</span><h4 data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Why Are Extractor Fans Needed?</span></h4><span data-dcnode-id="244" instrument_node="">
</span><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">From steam in bathrooms, to smoke and smells in the kitchen, our rooms have to come up against a lot of issues. An extractor fan takes these outside, completely removing them from the house.</span></p><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">All rooms must have sufficient ventilation according to building regulations, so if there are no windows, a fan is a great way of making this possible.</span></p><span data-dcnode-id="238" instrument_node="">
</span><h4 data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Can I Install A Bathroom Extractor Fan In The Kitchen?</span></h4><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">As a general rule, no. Your kitchen comes up against issues which aren’t present in the bathroom, such as cooking smells and grease/grime being released. Most bathroom fans don’t have a filter, which means these issues can’t be collected in any form. This would cause it to build up on the motor or blades of the fan instead, so you will need to buy a dedicated kitchen model.</span></p><span data-dcnode-id="232" instrument_node="">
</span><p data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Bathroom fans also usually come on when a light or certain temperature is activated, but kitchen fans are often controlled by a switch or pull cord so you are in control.</span></p><span data-dcnode-id="229" instrument_node="">
</span></div><span data-dcnode-id="227" instrument_node="">
</span></article><span data-dcnode-id="225" instrument_node="">
</span></div></div></div></div><span data-dcnode-id="220" instrument_node="">
