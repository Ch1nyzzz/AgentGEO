ps://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Extractor-Fan-768x768.jpg 768w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Extractor-Fan.jpg 1000w" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heatpumpsource.co.uk/blog/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="300"><noscript data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">&lt;img
loading=lazy src=https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Extractor-Fan-300x300.jpg alt="Bathroom Extractor Fan" width=300 height=300 class="alignright size-medium wp-image-3772" srcset="https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Extractor-Fan-300x300.jpg 300w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Extractor-Fan-150x150.jpg 150w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Extractor-Fan-768x768.jpg 768w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Extractor-Fan.jpg 1000w" sizes="(max-width: 300px) 100vw, 300px"&gt;</span></noscript><span data-dcnode-id="428" instrument_node="">A bathroom extractor fan is a fan that has been placed into a bathroom to move air from inside to outside a home or property. Before bathroom extractor fans became commonplace, open windows were used to move air from inside the bathroom. While this method eventually worked, when compared to an extractor fan, it took a lot more time for the air to move, and there was nothing to facilitate the movement other than natural air currents. New properties that are constructed in the UK are required to have extractor fans in their bathrooms due to building regulations.</span></p><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Buildings that were built years before current UK regulations may not have bathroom fan extractors and will need to have them installed. Three kinds of fans can be used for extraction purposes:</span></p><h4 data-dcnode-id="422"><span data-dcnode-id="423" id="Window_Fans"><span data-dcnode-id="424" instrument_node="">Window Fans</span></span></h4><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Window fans are an option that many choose because of how cheap they are and the ease of installation. In some cases, glass will need to be cut to fit the fan into a window. The fan’s cables will be visible, which can be unsightly for some.</span></p><h4 data-dcnode-id="417"><span data-dcnode-id="418" id="Ducted_Wall_Fans"><span data-dcnode-id="419" instrument_node="">Ducted Wall Fans</span></span></h4><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Ducted wall fans are the most common choice among extractor fans. In both the bathroom wall and the outer wall, a hole is made and the extractor fan is place into the bathroom wall hole. A duct is placed on the other side of the fan and leads to the other hole.</span></p><h4 data-dcnode-id="412"><span data-dcnode-id="413" id="Ceiling_Fans"><span data-dcnode-id="414" instrument_node="">Ceiling Fans</span></span></h4><p data-dcnode-id="408"><a data-dcnode-id="410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heatpumpsource.co.uk/blog/best-ceiling-fans/"><span data-dcnode-id="411" instrument_node="">Ceiling fans</span></a><span data-dcnode-id="409" instrument_node=""> are similar to ducted wall fans, but they are mounted in the ceiling. They sometimes lack the same power that wall fans have because of their vertical orientation, but often found to be more pleasing to the eye.</span></p><div class="shop-now-button-container" data-dcnode-id="405"><a class="btn standard-button shop-now-link" data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/s/ref%3Das_li_ss_tl%3Fk%3Dbathroom%2Bextractor%2Bfan%26linkCode%3Dll2%26tag%3Dheatpumpsource-21%26linkId%3D2d35a6beeb3a92924be2e3e12ab9ac4a%26language%3Den_GB" rel="nofollow"><span data-dcnode-id="407" instrument_node="">SHOP FOR BATHROOM EXTRACTOR FANS NOW</span></a></div><h3 data-dcnode-id="402"><span data-dcnode-id="403" id="How_Does_a_Bathroom_Extractor_Fan_Work"><span data-dcnode-id="404" instrument_node="">How Does a Bathroom Extractor Fan Work?</span></span></h3><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Extractor fans use a fast moving component to create suction that moves air from inside of the bathroom. The fast moving component is an impeller that is connected to the power supply of a property. The impeller spins using a high speed motor. While the extractor is in use, air constantly moves through it with no way of going back the same way it came. Extractor fans are made to work efficiently by moving certain amounts of air in a given amount of time.</span></p><h3 data-dcnode-id="397"><span data-dcnode-id="398" id="How_Do_I_Install_a_Bathroom_Extractor_Fan"><span data-dcnode-id="399" instrument_node="">How Do I Install a Bathroom Extractor Fan?</span></span></h3><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">The steps for installing a bathroom extractor fan will depend on the kind of fan that will be placed in a bathroom. If it’s a window extractor fan, and there is only one window in the bathroom, then the location choices are pretty limited. For ducted wall fans and ceiling fans, there’s a little more freedom, as duct work will be used to direct the air from the bathroom to the outside. For a window extractor fan, the steps are as follows.</span></p><h4 data-dcnode-id="392"><span data-dcnode-id="393" id="Installing_a_Window_Fan"><span data-dcnode-id="394" instrument_node="">Installing a Window Fan</span></span></h4><ol data-dcnode-id="376"><span data-dcnode-id="391" instrument_node="">
</span><li data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Choose the fan location. To get the best results out of the fan, it should be placed as closely to the source of any odours or condensation as possible.</span></li><span data-dcnode-id="388" instrument_node="">
</span><li data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Make measurements on the glass pane for the extractor’s location. Each fan will have its own hole size, and fan’s manual can provide information about it. There needs to be space around the window hole to accommodate the housing of the fan, which will be larger than it.</span></li><span data-dcnode-id="385" instrument_node="">
</span><li data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Start cutting the glass. Use safety equipment and use a glass cutter to cut the marked area of the glass. If you don’t feel confident in your ability to cut the glass, you can take the glass pane to a professional cutter.</span></li><span data-dcnode-id="382" instrument_node="">
</span><li data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Place the extractor fan in the hole that you’ve cut. It will fit tightly if the glass has bee cut correctly. Either use the manual to join the fan’s wires or get an electrician to do it.</span></li><span data-dcnode-id="379" instrument_node="">
</span><li data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Wire the fan to a switch. The fan can be connected to a switched fuse spur, a pull switch, or a light switch to activate it. The manual will offer wiring instructions for specific cases, or an electrician can be used.</span></li></ol><h4 data-dcnode-id="373"><span data-dcnode-id="374" id="Installing_a_Ceiling_Fan"><span data-dcnode-id="375" instrument_node="">Installing a Ceiling Fan</span></span></h4><p data-dcnode-id="368"><img alt="Bathroom" class="lazy-hidden alignright size-medium wp-image-3775" data-dcnode-id="372" data-lazy-type="image" data-src="https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-300x208.jpg" data-srcset="https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-300x208.jpg 300w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-768x533.jpg 768w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom.jpg 1000w" height="208" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heatpumpsource.co.uk/blog/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="300"><noscript data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">&lt;img
loading=lazy src=https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-300x208.jpg alt=Bathroom width=300 height=208 class="alignright size-medium wp-image-3775" srcset="https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-300x208.jpg 300w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-768x533.jpg 768w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom.jpg 1000w" sizes="(max-width: 300px) 100vw, 300px"&gt;</span></noscript><span data-dcnode-id="369" instrument_node="">For a ceiling fan, the steps are as follows:</span></p><ol data-dcnode-id="343"><span data-dcnode-id="367" instrument_node="">
</span><li data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Create a reference hole with a drill and a 2 cm spade bit. This hole will need to be found in the attic and insulation must be cleared from it. The measurements of the fan’s casing should be checked to see if the fan will fit between two joists. The fan’s intake port must be measured, and then an outline must be marked on the ceiling using these measurements.</span></li><span data-dcnode-id="364" instrument_node="">
</span><li data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Cut out the market area in the ceiling with a drywall saw or jigsaw. Support the ceiling with your free hand as you cut to prevent extra bits of drywall from falling. Wear a respirator and safety gear while cutting.</span></li><span data-dcnode-id="361" instrument_node="">
</span><li data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Put the fan in place. A 90 degree elbow duct must be attached with foil tape to the outlet port. Through the fan’s housing, a cable connector will be inserted in the knockout hole. Metal brackets will be positioned for support, and then the fan can be lowered into the hole.</span></li><span data-dcnode-id="358" instrument_node="">
</span><li data-dcnode-id="353"><span data-dcnode-id="357" instrument_node="">Properly secure the fan after it has been positioned. The metal brackets should reach the two joist and drywall screws should be used to secure the bracket ends. One end of the duct elbow must then be attached to the duct pipe using foil tape. Through the housing of the fan, run an electrical cable through and secure its connector screw with a </span><a data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heatpumpsource.co.uk/blog/best-insulated-screwdriver-sets/"><span data-dcnode-id="356" instrument_node="">screwdriver</span></a><span data-dcnode-id="354" instrument_node="">.</span></li><span data-dcnode-id="352" instrument_node="">
</span><li data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Pick the shortest, straightest route for the duct pipe to meet the outside. Longer pipes are less efficient than shorter ones. A sidewall or the roof can be used.</span></li><span data-dcnode-id="349" instrument_node="">
</span><li data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Add the vent cap. For sidewalls, measure and mark a spot between two studs on the wall and cut from the outside and add the cap. For a roof, measure and mark a spot on the inside and cut. Climb to the roof, remove the shingles over the cut area and add the vent cap with roofing nails and roofing cement. Attach the cap to the duct pipe with foil tape.</span></li><span data-dcnode-id="346" instrument_node="">
</span><li data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Attach the fan wires to the house’s power supply. Shut the power off first before making any connections. The wires of the fan and the inserted cable must be stripped by 1.6 cm. Like coloured wires are then twisted together and then connectors are added. The bare copper wire should be wrapped around the grounding clip. An electrician can help with the wiring if necessary.</span></li></ol><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">The steps for installing a wall ducted fan are similar, except a location in the wall will need to be selected between two studs. A detector can be used to determine the location of any pipes that may be behind the walls. Just as with the ceiling fan, the shortest and straightest duct pipe path must be used to make sure the fan is as efficient as possible.</span></p><div class="shop-now-button-container" data-dcnode-id="338"><a class="btn standard-button shop-now-link" data-dcnode-id="339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/s/ref%3Das_li_ss_tl%3Fk%3Dbathroom%2Bextractor%2Bfan%26linkCode%3Dll2%26tag%3Dheatpumpsource-21%26linkId%3D2d35a6beeb3a92924be2e3e12ab9ac4a%26language%3Den_GB" rel="nofollow"><span data-dcnode-id="340" instrument_node="">SHOP FOR BATHROOM EXTRACTOR FANS NOW</span></a></div><h3 data-dcnode-id="335"><span data-dcnode-id="336" id="Why_Are_Bathroom_Extractor_Fans_Needed"><span data-dcnode-id="337" instrument_node="">Why Are Bathroom Extractor Fans Needed?</span></span></h3><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">There’s a chance that you’ve been in a bathroom without a window, or one where the fan wasn’t working. If so, then you know how bad things can be. In a room with normal ventilation, any odours will dissipate in a short amount of time, but without it, the odours can stay around longer than intended. From the harsh smells made by products that are used to clean bathrooms, to foul smells from defecation, these odours will be in the air. Bathroom extractor fans are needed because they can remove these odours from the bathroom.</span></p><p data-dcnode-id="328"><img alt="Bathroom" class="lazy-hidden alignright size-medium wp-image-1972" data-dcnode-id="332" data-lazy-type="image" data-src="https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2019/10/Bathroom-300x200.jpg" data-srcset="https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2019/10/Bathroom-300x200.jpg 300w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2019/10/Bathroom-768x512.jpg 768w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2019/10/Bathroom-1024x683.jpg 1024w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2019/10/Bathroom.jpg 1800w" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heatpumpsource.co.uk/blog/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="300"><noscript data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">&lt;img
loading=lazy src=https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2019/10/Bathroom-300x200.jpg alt=Bathroom width=300 height=200 class="alignright size-medium wp-image-1972" srcset="https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2019/10/Bathroom-300x200.jpg 300w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2019/10/Bathroom-768x512.jpg 768w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2019/10/Bathroom-1024x683.jpg 1024w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2019/10/Bathroom.jpg 1800w" sizes="(max-width: 300px) 100vw, 300px"&gt;</span></noscript><span data-dcnode-id="329" instrument_node="">In addition to harsh odours, bathroom extractor fans are needed to remove excess moisture from the bathroom. A lot of humidity is produced when showers are taken, and it can make its way into the bathroom walls due to the porous and breathable nature of drywall and paint respectively. When the air cools down, the trapped humidity turns into water. All of this moisture creates the perfect environment for mould and fungus to grow. Long term exposure to mould can negatively effect body heath, causing problems such as skin irritation and allergies.</span></p><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Excess amounts of moisture in the bathroom can also have terrible effects on the parts of the bathroom. Fixtures can become rusted, doors will begin to warp, and wallpaper and paint will begin to peel.</span></p><h3 data-dcnode-id="323"><span data-dcnode-id="324" id="What_Is_the_Difference_Between_a_Kitchen_and_Bathroom_Extractor_Fan"><span data-dcnode-id="325" instrument_node="">What Is the Difference Between a Kitchen and Bathroom Extractor Fan?</span></span></h3><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Bathroom extractor fans aren’t the only kind of extractor fans that exist. Kitchens also have extractor fans, and although they seem similar, they aren’t the same at all. While both fans move air from one location to another via suction, the kitchen fan draws more power and is made to be used in areas with high temperatures, such as over a stove. Kitchen fans generally deal with odours produced by food, moisture, and grease particles, while bathrooms fans just handle human odours, moisture, and odours from cleaning chemicals.</span></p><h3 data-dcnode-id="318"><span data-dcnode-id="319" id="What_Are_the_Different_Type_of_Extractor_Fans"><span data-dcnode-id="320" instrument_node="">What Are the Different Type of Extractor Fans?</span></span></h3><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Three kinds of bathroom extractor fans exist that can be used: axial, centrifugal, and inline fans.</span></p><h4 data-dcnode-id="313"><span data-dcnode-id="314" id="Axial_Fans"><span data-dcnode-id="315" instrument_node="">Axial Fans</span></span></h4><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Axial fans have their impeller parallel to the blade rotation shaft to pull air. These fans are usually around 10 cm in size, but can be larger for commercial applications. They are the least powerful option out of the three, and should only be used with ducts that are 2 to 3 meters long.</span></p><h4 data-dcnode-id="308"><span data-dcnode-id="309" id="Centrifugal_Fans"><span data-dcnode-id="310" instrument_node="">Centrifugal Fans</span></span></h4><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Centrifugal fans are more powerful than the axial versions and use an impeller to generate centrifugal force to extract air through a right angle turn. This creates more pressure and allows longer duct distances to be used. These fans also cost more than axial fans.</span></p><h4 data-dcnode-id="303"><span data-dcnode-id="304" id="Inline_Fans"><span data-dcnode-id="305" instrument_node="">Inline Fans</span></span></h4><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Inline fans are the most powerful and are also used for long distance duct work.</span></p><div class="shop-now-button-container" data-dcnode-id="298"><a class="btn standard-button shop-now-link" data-dcnode-id="299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/s/ref%3Das_li_ss_tl%3Fk%3Dbathroom%2Bextractor%2Bfan%26linkCode%3Dll2%26tag%3Dheatpumpsource-21%26linkId%3D2d35a6beeb3a92924be2e3e12ab9ac4a%26language%3Den_GB" rel="nofollow"><span data-dcnode-id="300" instrument_node="">SHOP FOR BATHROOM EXTRACTOR FANS NOW</span></a></div><h3 data-dcnode-id="295"><span data-dcnode-id="296" id="Features_to_Look_for_in_a_Bathroom_Extractor_Fan"><span data-dcnode-id="297" instrument_node="">Features to Look for in a Bathroom Extractor Fan</span></span></h3><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">When deciding on a bathroom extractor fan, there are certain features that can affect your choice.</span></p><h4 data-dcnode-id="290"><span data-dcnode-id="291" id="Extraction_Rate"><span data-dcnode-id="292" instrument_node="">Extraction Rate</span></span></h4><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Possibly the most important feature, as it determines how much air can be moved in a time interval. A rate of around 20 litres per second is a good place to start. Some extractors have higher extraction rates, but they produce more noise and create negative pressure that makes the air cold.</span></p><h4 data-dcnode-id="285"><span data-dcnode-id="286" id="Dimensions"><span data-dcnode-id="287" instrument_node="">Dimensions</span></span></h4><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">The size of the extractor will determine where it can be placed and if it can even fit in the bathroom.</span></p><h4 data-dcnode-id="280"><span data-dcnode-id="281" id="Sound_Output"><span data-dcnode-id="282" instrument_node="">Sound Output</span></span></h4><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">The sound that is produced by an extractor is measured in decibels. Lower decibels results in a quieter sound, which good for bathroom extractors. 30db and under is the safe spot where the extractor won’t bee too noisy.</span></p><h4 data-dcnode-id="275"><span data-dcnode-id="276" id="Material"><span data-dcnode-id="277" instrument_node="">Material</span></span></h4><p data-dcnode-id="270"><img alt="Bathroom Ventilation Extractor Fan" class="lazy-hidden alignright size-medium wp-image-3777" data-dcnode-id="274" data-lazy-type="image" data-src="https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Ventilation-Extractor-Fan-300x200.jpg" data-srcset="https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Ventilation-Extractor-Fan-300x200.jpg 300w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Ventilation-Extractor-Fan-768x511.jpg 768w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Ventilation-Extractor-Fan.jpg 999w" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heatpumpsource.co.uk/blog/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="300"><noscript data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">&lt;img
loading=lazy src=https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Ventilation-Extractor-Fan-300x200.jpg alt="Bathroom Ventilation Extractor Fan" width=300 height=200 class="alignright size-medium wp-image-3777" srcset="https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Ventilation-Extractor-Fan-300x200.jpg 300w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Ventilation-Extractor-Fan-768x511.jpg 768w, https://www.heatpumpsource.co.uk/blog/wp-content/uploads/2020/03/Bathroom-Ventilation-Extractor-Fan.jpg 999w" sizes="(max-width: 300px) 100vw, 300px"&gt;</span></noscript><span data-dcnode-id="271" instrument_node="">Fans are usually made of plastic or metals like aluminium or galvanised steel. The material used to make the fan can affect its price.</span></p><h4 data-dcnode-id="267"><span data-dcnode-id="268" id="Operation"><span data-dcnode-id="269" instrument_node="">Operation</span></span></h4><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Extractor fans have to be turned on to start moving air and turned off to stop. There are couple of options that are used:</span></p><p data-dcnode-id="262"><strong data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Pull Cord</span></strong></p><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">The cord functions as a separate activation method from a light switch and just takes one pull to activate or deactivate.</span></p><p data-dcnode-id="257"><strong data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Switch</span></strong></p><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">When wired properly, the fan can be turned on and off with a simple wall switch. This makes for convenient operation.</span></p><h4 data-dcnode-id="252"><span data-dcnode-id="253" id="Timer"><span data-dcnode-id="254" instrument_node="">Timer</span></span></h4><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">The fan can be wired to a timer that allows it to run for a certain amount of time. Even after the shower and lights have been turned off, the fan can still run for a while.</span></p><h4 data-dcnode-id="247"><span data-dcnode-id="248" id="Design"><span data-dcnode-id="249" instrument_node="">Design</span></span></h4><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Fans can come in different shapes and sizes, have special colours and vent arrangements.</span></p><h4 data-dcnode-id="242"><span data-dcnode-id="243" id="Humidity_Sensor"><span data-dcnode-id="244" instrument_node="">Humidity Sensor</span></span></h4><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">This device can detect the humidity level in the air and activate the extractor fan to remove the humidity. The extractor will only turn on when necessary, rather than when the light is turned on.</span></p><h4 data-dcnode-id="237"><span data-dcnode-id="238" id="Guarantee"><span data-dcnode-id="239" instrument_node="">Guarantee</span></span></h4><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">The fans come with some kind of manufacturers guarantee that will ensure that it works when installed. There is usually a short warranty that covers the fan under normal use.</span></p><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">This guide should give you a better idea of the bathroom extractor fan you might want. Once you make an informed decision, the buying and installation process should be easy to do.</span></p><div class="shop-now-button-container" data-dcnode-id="230"><a class="btn standard-button shop-now-link" data-dcnode-id="231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/s/ref%3Das_li_ss_tl%3Fk%3Dbathroom%2Bextractor%2Bfan%26linkCode%3Dll2%26tag%3Dheatpumpsource-21%26linkId%3D2d35a6beeb3a92924be2e3e12ab9ac4a%26language%3Den_GB" rel="nofollow"><span data-dcnode-id="232" instrument_node="">SHOP FOR BATHROOM EXTRACTOR FANS NOW</span></a></div><div class="dpsp-content-wrapper dpsp-shape-rounded dpsp-size-medium dpsp-has-spacing dpsp-hide-on-mobile dpsp-button-style-1" data-dcnode-id="188" id="dpsp-content-bottom" style="min-height:40px;position:relative"><ul class="dpsp-networks-btns-wrapper dpsp-networks-btns-share dpsp-networks-btns-content dpsp-column-3 dpsp-has-button-icon-animation" data-dcnode-id="189" style="padding:0;margin:0;list-style-type:none"><span data-dcnode-id="229" instrument_node="">
