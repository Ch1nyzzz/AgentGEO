</span><h1 class="entry-title" data-dcnode-id="1395" itemprop="headline"><span data-dcnode-id="1396" instrument_node="">Humidity</span></h1><span data-dcnode-id="1394" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1380"><span data-dcnode-id="1393" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1388"><time class="updated" data-dcnode-id="1391" datetime="2022-03-28T12:32:01+02:00" itemprop="dateModified"><span data-dcnode-id="1392" instrument_node="">28 March 2022</span></time><time class="entry-date published" data-dcnode-id="1389" datetime="2021-10-02T12:47:00+02:00" itemprop="datePublished"><span data-dcnode-id="1390" instrument_node="">2 October 2021</span></time></span><span data-dcnode-id="1387" instrument_node=""> </span><span class="byline" data-dcnode-id="1382"><span class="author vcard" data-dcnode-id="1383" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/author/robert-bergman/" itemprop="url" rel="author" title="View all posts by Robert Bergman"><span class="author-name" data-dcnode-id="1385" itemprop="name"><span data-dcnode-id="1386" instrument_node="">Robert Bergman</span></span></a></span></span><span data-dcnode-id="1381" instrument_node=""> </span></div><span data-dcnode-id="1379" instrument_node="">
</span></header><span data-dcnode-id="1377" instrument_node="">
</span><div class="featured-image page-header-image-single" data-dcnode-id="1373"><span data-dcnode-id="1376" instrument_node="">
</span><img alt="Humidity for marijuana plants" class="attachment-full size-full" data-dcnode-id="1375" height="317" itemprop="image" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/01/Humidity-for-marijuana-plants.png&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/01/Humidity-for-marijuana-plants.png 600w, https://ilgm.com/blog/wp-content/uploads/2019/01/Humidity-for-marijuana-plants-300x159.png 300w" width="600"><span data-dcnode-id="1374" instrument_node="">
</span></div><span data-dcnode-id="1372" instrument_node="">
</span><div class="entry-content" data-dcnode-id="934" itemprop="text"><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Humidity is the amount of water vapor in the air, expressed in percentages. Humidity is very important to marijuana plants, because it determines the degree of evaporation. The lower the humidity, the higher the vapor pressure, so the more water and nutrients your marijuana plant can absorb. But if the vapor pressure gets too high, the plant will protect itself from dehydration and the stomata will close. As a result it will barely absorb any water and the growth will slow down.</span></p><span data-dcnode-id="1368" instrument_node="">
</span><div class="table_contents" data-dcnode-id="1320"><span data-dcnode-id="1367" instrument_node="">
</span><h3 data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">In this guide you will learn</span></h3><span data-dcnode-id="1364" instrument_node="">
</span><ul data-dcnode-id="1322"><span data-dcnode-id="1363" instrument_node="">
</span><li data-dcnode-id="1359"><strong data-dcnode-id="1360"><a data-dcnode-id="1361" href="#Humidity-and-temperature"><span data-dcnode-id="1362" instrument_node="">Humidity and temperature</span></a></strong></li><span data-dcnode-id="1358" instrument_node="">
</span><li data-dcnode-id="1354"><strong data-dcnode-id="1355"><a data-dcnode-id="1356" href="#Humidity-for-cuttings-seedlings-and-flowering-plants"><span data-dcnode-id="1357" instrument_node="">Humidity for cuttings, seedlings and flowering plants</span></a></strong></li><span data-dcnode-id="1353" instrument_node="">
</span><li data-dcnode-id="1349"><strong data-dcnode-id="1350"><a data-dcnode-id="1351" href="#Schedule-for-ideal-humidity-of-weed-plants"><span data-dcnode-id="1352" instrument_node="">Schedule for ideal humidity of weed plants</span></a></strong></li><span data-dcnode-id="1348" instrument_node="">
</span><li data-dcnode-id="1344"><strong data-dcnode-id="1345"><a data-dcnode-id="1346" href="#How-to-increase-the-humidity"><span data-dcnode-id="1347" instrument_node="">How to increase the humidity</span></a></strong></li><span data-dcnode-id="1343" instrument_node="">
</span><li data-dcnode-id="1339"><strong data-dcnode-id="1340"><a data-dcnode-id="1341" href="#How-to-lower-the-humidity-in-your-growing-room"><span data-dcnode-id="1342" instrument_node="">How to lower the humidity in your growing room</span></a></strong></li><span data-dcnode-id="1338" instrument_node="">
</span><li data-dcnode-id="1334"><strong data-dcnode-id="1335"><a data-dcnode-id="1336" href="#Humidity-during-watering"><span data-dcnode-id="1337" instrument_node="">Humidity during watering</span></a></strong></li><span data-dcnode-id="1333" instrument_node="">
</span><li data-dcnode-id="1329"><strong data-dcnode-id="1330"><a data-dcnode-id="1331" href="#Humidity-for-outdoor-marijuana-plants"><span data-dcnode-id="1332" instrument_node="">Humidity for outdoor marijuana plants</span></a></strong></li><span data-dcnode-id="1328" instrument_node="">
</span><li data-dcnode-id="1324"><strong data-dcnode-id="1325"><a data-dcnode-id="1326" href="#How-to-measure-the-humidity"><span data-dcnode-id="1327" instrument_node="">How to measure the humidity</span></a></strong></li><span data-dcnode-id="1323" instrument_node="">
</span></ul><span data-dcnode-id="1321" instrument_node="">
</span></div><span data-dcnode-id="1319" instrument_node="">
</span><figure class="wp-block-gallery columns-3 is-cropped" data-dcnode-id="1298"><ul class="blocks-gallery-grid" data-dcnode-id="1299"><li class="blocks-gallery-item" data-dcnode-id="1312"><figure data-dcnode-id="1313"><img alt="Spray all marijuana leaves" class="wp-image-1158" data-dcnode-id="1318" data-id="1158" data-link="https://ilgm.com/blog/marijuana-grow-course/climate/cannabis-humidity/humidity-intro2/" height="300" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/02/humidity-intro2.jpg&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/02/humidity-intro2.jpg 300w, https://ilgm.com/blog/wp-content/uploads/2019/02/humidity-intro2-150x150.jpg 150w" width="300"><figcaption class="blocks-gallery-item__caption" data-dcnode-id="1314"><span data-dcnode-id="1317" instrument_node=""> </span><br data-dcnode-id="1316"><span data-dcnode-id="1315" instrument_node="">Increase the humidity </span></figcaption></figure></li><li class="blocks-gallery-item" data-dcnode-id="1305"><figure data-dcnode-id="1306"><img alt="To kill the thrips on marijuana leaves" class="wp-image-1157" data-dcnode-id="1311" data-id="1157" data-link="https://ilgm.com/blog/marijuana-grow-course/climate/cannabis-humidity/humidity-intro-1/" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/02/humidity-intro-1.jpg&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/02/humidity-intro-1.jpg 300w, https://ilgm.com/blog/wp-content/uploads/2019/02/humidity-intro-1-150x150.jpg 150w" width="300"><figcaption class="blocks-gallery-item__caption" data-dcnode-id="1307"><span data-dcnode-id="1310" instrument_node=""> </span><br data-dcnode-id="1309"><span data-dcnode-id="1308" instrument_node="">Lower the humidity </span></figcaption></figure></li><li class="blocks-gallery-item" data-dcnode-id="1300"><figure data-dcnode-id="1301"><img alt="Humidity for cuttings plant" class="wp-image-1159" data-dcnode-id="1304" data-id="1159" data-link="https://ilgm.com/blog/marijuana-grow-course/climate/cannabis-humidity/humidity-intro-2/" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/02/humidity-intro-2.jpg&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/02/humidity-intro-2.jpg 300w, https://ilgm.com/blog/wp-content/uploads/2019/02/humidity-intro-2-150x150.jpg 150w" width="300"><figcaption class="blocks-gallery-item__caption" data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Humidity for cuttings</span></figcaption></figure></li></ul></figure><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1296" instrument_node="">So it’s important to create the right humidity in your grow room. Marijuana plants require a higher humidity in the </span><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/bubble-buckets/vegetative-stage/"><span data-dcnode-id="1295" instrument_node="">vegetative stage</span></a><span data-dcnode-id="1293" instrument_node=""> than in the flowering phase, because </span><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/plant-care/marijuana-root-system/"><span data-dcnode-id="1292" instrument_node="">the root system</span></a><span data-dcnode-id="1290" instrument_node=""> of young plants is a lot smaller. You can start growing with a humidity of around 70% and go down by 5% every week, until you get to a humidity of 40%. You can measure the humidity with a hygrometer. Later in this course I will provide you with a schedule of the perfect humidity for marijuana plants each week. But let’s first talk about the relationship between humidity and </span><a data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/climate/temperature/"><span data-dcnode-id="1289" instrument_node="">temperature</span></a><span data-dcnode-id="1287" instrument_node="">.</span></p><span data-dcnode-id="1285" instrument_node="">
</span><a data-dcnode-id="1284" name="Humidity-and-temperature"></a><span data-dcnode-id="1283" instrument_node="">
</span><h2 data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Humidity and temperature</span></h2><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Air always contains water vapor. This can be a lot or a little. The humidity will already be a bit higher in a grow room, since the leaves evaporate water through their leaves. Plants only use 10% of the water they absorb for growing purposes. The rest (90%) – is evaporated. Air can only contain a certain amount of water vapor. If this amount is exceeded, the condensation process takes place, during which water droplets are formed on the cold areas of the room or on the plants.</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1276" instrument_node="">The amount of water vapor the air depends on the </span><a data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/climate/temperature/"><span data-dcnode-id="1275" instrument_node="">temperature</span></a><span data-dcnode-id="1273" instrument_node="">. Warm air can contain much more moisture than cold air. The relative humidity (RH) indicates how many percent of the maximum amount of water vapor is already in the air. So if this is 70%, some more water vapor can be added before water droplets are formed. But 70% humidity at 77 degrees is different than 70% humidity at 68 degrees. Warmer air can contain more moisture. At 77 degrees, 2 pounds of air can contain 0.45 ounces of water vapor. At 68 degrees, 2 pounds of air with a relative humidity of 70% can only contain 0.32 ounces of water vapor.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1267"><img alt="How to measure the humidity" class="wp-image-1160" data-dcnode-id="1270" height="325" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/02/How-to-measure-the-humidity.jpg&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/02/How-to-measure-the-humidity.jpg 600w, https://ilgm.com/blog/wp-content/uploads/2019/02/How-to-measure-the-humidity-300x163.jpg 300w" width="600"><figcaption data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Measure the humidity</span></figcaption></figure><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1265" instrument_node="">This also means that if the air cools off, it can contain less water vapor. This increases the relative humidity. If you cool 77 degree air with an RH of 70% to 73 degrees, the RH will rise to 80%. This is called the dew point, because dew will start to form. The air can’t contain any more water vapor, and the water condenses in the form of droplets (dew). The dew point </span><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/climate/temperature/"><span data-dcnode-id="1264" instrument_node="">temperature</span></a><span data-dcnode-id="1262" instrument_node=""> of 77 degree air with 70% RH is 66 degrees.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1259" instrument_node="">Since you’re constantly </span><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/climate/ventilation/"><span data-dcnode-id="1258" instrument_node="">ventilating your grow room</span></a><span data-dcnode-id="1256" instrument_node="">, heat from the lamps and the humid air are both sucked out of the room. So you have to keep your room moist at all times to increase the humidity. There are several ways to increase humidity, but I’ll first explain why cuttings, seedlings, vegetating and flowering marijuana plants all need a different humidity levels.</span></p><span data-dcnode-id="1254" instrument_node="">
</span><a data-dcnode-id="1253" name="Humidity-for-cuttings-seedlings-and-flowering-plants"></a><span data-dcnode-id="1252" instrument_node="">
</span><h2 data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Humidity for cuttings seedlings and flowering plants</span></h2><span data-dcnode-id="1249" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1245"><img alt="How to measure the humidity" class="wp-image-1162" data-dcnode-id="1248" height="325" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/01/humidity-for-cutting.jpg&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/01/humidity-for-cutting.jpg 600w, https://ilgm.com/blog/wp-content/uploads/2019/01/humidity-for-cutting-300x163.jpg 300w" width="600"><figcaption data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Humidity for cuttings</span></figcaption></figure><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1239"><span data-dcnode-id="1243" instrument_node="">When your cuttings are ready to be placed in the grow room, they have very few roots. They can only absorb minimal amounts of water, so you want them to evaporate as little as possible. By keeping the humidity high, the cuttings will evaporate less water and they also don’t need as many roots. You could also cut of half of the big leaves of your cuttings, so they’re unable to evaporate as much. An RH of 80% is perfect when placing your </span><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/bubble-buckets/how-to-cut-weed-and-dry/"><span data-dcnode-id="1242" instrument_node="">cuttings</span></a><span data-dcnode-id="1240" instrument_node=""> in the grow room.</span></p><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1237" instrument_node="">Cuttings are rooted in a room with a temperature of about 70 degrees, a high humidity and fluorescent lighting. If you place the cuttings under a 600 watt HPS lamp in a space with a humidity of 30%, they’ll get quite a shock. It’s therefore important to keep the humidity up during the growth of </span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/plant-care/marijuana-root-system/"><span data-dcnode-id="1236" instrument_node="">the root system</span></a><span data-dcnode-id="1234" instrument_node="">. The roots grow as long as the plant itself, so up to the second or third week of flowering. A strong root system is very important for the absorption of water and </span><a data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/plant-care/best-nutrients-for-weed/"><span data-dcnode-id="1233" instrument_node="">nutrients</span></a><span data-dcnode-id="1231" instrument_node="">.</span><br data-dcnode-id="1230"><br data-dcnode-id="1229"><span data-dcnode-id="1228" instrument_node="">Let my&nbsp;</span><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ilovegrowingmarijuana.com/marijuana-grow-bible"><span data-dcnode-id="1227" instrument_node="">free marijuana grow bible</span></a><span data-dcnode-id="1225" instrument_node="">&nbsp;be your ultimate guide as you begin your marijuana journey.</span></p><span data-dcnode-id="1223" instrument_node="">

</span><p data-dcnode-id="1155" style="display: none !important;"><label data-dcnode-id="1159"><span data-dcnode-id="1161" instrument_node="">Δ</span><textarea cols="45" data-dcnode-id="1160" maxlength="100" name="_wpcf7_ak_hp_textarea" rows="8"></textarea></label><input data-dcnode-id="1158" id="ak_js_1" name="_wpcf7_ak_js" type="hidden" value="1651292132422"></p><div aria-hidden="true" class="wpcf7-response-output" data-dcnode-id="1154"></div></form></div><span data-dcnode-id="1151" instrument_node="">

</span></div></div><span data-dcnode-id="1142" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1138"><img alt="Marijuana seedling" class="wp-image-1164" data-dcnode-id="1141" height="325" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/02/Marijuana-seedling.jpg&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/02/Marijuana-seedling.jpg 600w, https://ilgm.com/blog/wp-content/uploads/2019/02/Marijuana-seedling-300x163.jpg 300w" width="600"><figcaption data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Seedling</span></figcaption></figure><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1136" instrument_node="">The rules are slightly different for seedlings, because they already have a fast growing taproot that can absorb moisture during </span><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/from-seed-to-bud/how-to-germinate-weed-seeds/"><span data-dcnode-id="1135" instrument_node="">germination</span></a><span data-dcnode-id="1133" instrument_node="">. Don’t cut the leaves of </span><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/from-seed-to-bud/how-to-grow-marijuana-from-seed/"><span data-dcnode-id="1132" instrument_node="">seedlings</span></a><span data-dcnode-id="1130" instrument_node="">, because the plant needs these to absorb light and evaporate water. It’s however not wrong to maintain a high humidity, because the seedlings can also absorb water and nutrients through the leaves. You can start with 70% and slowly lower it to 50%.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1124"><img alt="Marijuana flowering" class="wp-image-1166" data-dcnode-id="1127" height="325" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/01/Marijuana-flowering.jpg&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/01/Marijuana-flowering.jpg 600w, https://ilgm.com/blog/wp-content/uploads/2019/01/Marijuana-flowering-300x163.jpg 300w" width="600"><figcaption data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Flowering plants</span></figcaption></figure><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1122" instrument_node="">Once your </span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/introduction-to-growing/what-is-marijuana-guide/"><span data-dcnode-id="1121" instrument_node="">marijuana plants start</span></a><span data-dcnode-id="1119" instrument_node=""> to flower, you have to slowly lower the humidity. The root system is now properly developed, so the plant can absorb the maximum amounts of water and nutrients. Another reason to lower the humidity during the flowering stage is because fungi flourish in a climate with a high humidity.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1116" instrument_node="">As the plant gets older, the chance of infection increases. The plant uses more water and the vapor pressure increases. If you have a high humidity, the water can accumulate in the buds, giving fungi room to grow.&nbsp;</span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/plant-care/bud-rot/"><span data-dcnode-id="1115" instrument_node="">Bud rot</span></a><span data-dcnode-id="1113" instrument_node="">&nbsp;is the most common and most annoying fungi.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><a data-dcnode-id="1110" name="Schedule-for-ideal-humidity-of-weed-plants"></a><span data-dcnode-id="1109" instrument_node="">
</span><h2 data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Schedule for ideal humidity of weed plants</span></h2><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1105" instrument_node="">Here’s a sample chart you can use to make sure your marijuana plants experience the perfect humidity. Notice the difference between </span><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/bubble-buckets/how-to-cut-weed-and-dry/"><span data-dcnode-id="1104" instrument_node="">cuttings</span></a><span data-dcnode-id="1102" instrument_node=""> and </span><a data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/from-seed-to-bud/how-to-grow-marijuana-from-seed/"><span data-dcnode-id="1101" instrument_node="">seedlings</span></a><span data-dcnode-id="1099" instrument_node="">, especially during the first couple of weeks.</span></p><span data-dcnode-id="1097" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1093"><img alt="Humidity cutting plant" class="wp-image-1162" data-dcnode-id="1096" height="325" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/01/humidity-for-cutting.jpg&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/01/humidity-for-cutting.jpg 600w, https://ilgm.com/blog/wp-content/uploads/2019/01/humidity-for-cutting-300x163.jpg 300w" width="600"><figcaption data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Humidity for cuttings</span></figcaption></figure><span data-dcnode-id="1092" instrument_node="">
</span><ul data-dcnode-id="1069"><li data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Week 1 growing: RH 80%</span></li><li data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Week 2 growing: RH 70%</span></li><li data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Week 1 flowering: RH 65%</span></li><li data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Week 2 flowering: RH 60%</span></li><li data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Week 3 flowering: RH 55%</span></li><li data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Week 4 flowering: RH 50%</span></li><li data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Week 5 flowering: RH 50%</span></li><li data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Week 6 flowering: RH 45%</span></li><li data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Week 7 flowering: RH 45%</span></li><li data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Week 8 flowering: RH 40%</span></li><li data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Week 9 flowering: RH 40%</span></li></ul><span data-dcnode-id="1068" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1064"><img alt="Marijuana flowering" class="wp-image-1166" data-dcnode-id="1067" height="325" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/01/Marijuana-flowering.jpg&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/01/Marijuana-flowering.jpg 600w, https://ilgm.com/blog/wp-content/uploads/2019/01/Marijuana-flowering-300x163.jpg 300w" width="600"><figcaption data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Flowering plants</span></figcaption></figure><span data-dcnode-id="1063" instrument_node="">
</span><ul data-dcnode-id="1040"><li data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Week 1 growing: RH 70%</span></li><li data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Week 2 growing: RH 65%</span></li><li data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Week 1 growing: RH 60%</span></li><li data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Week 2 flowering: RH 50%</span></li><li data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Week 3 flowering: RH 50%</span></li><li data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Week 4 flowering: RH 50%</span></li><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Week 5 flowering: RH 50%</span></li><li data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Week 6 flowering: RH 45%</span></li><li data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Week 7 flowering: RH 45%</span></li><li data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Week 8 flowering: RH 40%</span></li><li data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Week 9 flowering: RH 40%</span></li></ul><span data-dcnode-id="1039" instrument_node="">
</span><a data-dcnode-id="1038" name="How-to-increase-the-humidity"></a><span data-dcnode-id="1037" instrument_node="">
</span><h2 data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">How to increase the humidity</span></h2><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">There are different ways to increase the humidity in your grow room. You could spray water on the floor or on the walls. Just make sure you place pond liner or other waterproof foil beforehand. You could hang the lamps a bit higher, so the temperature at your plants is lowered a bit so you won’t have to extract as much air. Placing wet towels and bins of water in your grow room also increases the humidity.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1027"><img alt="How to increase the humidity" class="wp-image-1167" data-dcnode-id="1030" height="325" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/02/humidity-intro.jpg&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/02/humidity-intro.jpg 600w, https://ilgm.com/blog/wp-content/uploads/2019/02/humidity-intro-300x163.jpg 300w" width="600"><figcaption data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Increase the humidity</span></figcaption></figure><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">If you really want to do it properly, you should get a humidifier. This device converts water into water vapor and spouts a constant mist with a high humidity into your room. Some humidifiers have a water tank, some have to be connected to the tap and others even have a humidistat that measures the humidity and is turned on once the humidity drops below a set value.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><a data-dcnode-id="1022" name="How-to-lower-the-humidity-in-your-growing-room"></a><span data-dcnode-id="1021" instrument_node="">
</span><h2 data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">How to lower the humidity in your growing room</span></h2><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1017" instrument_node="">Once your plant starts flowering, you want the humidity to go down a bit, so you have to dehumidify the room. You can do this by turning up the air extractor or by blowing cold air into the room. The best way to lower the humidity in your grow room is to buy a dehumidifier. This device removes moisture from the air and transports it to a drain or stores it in a tank. Don’t use a tiny one that people use for basements, because these are very quickly saturated if you </span><a data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/introduction-to-growing/grow-room-requirements/"><span data-dcnode-id="1016" instrument_node="">place them in a grow room</span></a><span data-dcnode-id="1014" instrument_node="">.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1008"><img alt="Lower humidity" class="wp-image-1168" data-dcnode-id="1011" height="325" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/02/lower-humidity.jpg&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/02/lower-humidity.jpg 600w, https://ilgm.com/blog/wp-content/uploads/2019/02/lower-humidity-300x163.jpg 300w" width="600"><figcaption data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Lower the humidity</span></figcaption></figure><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1006" instrument_node="">The humidity outside can also influence the humidity of your grow room when sucking in outside air. If your humidity greatly increases during rainy days, you could turn off the fan that sucks air into the room for a bit, or put it on the lowest setting. Make sure the </span><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/climate/temperature/"><span data-dcnode-id="1005" instrument_node="">temperature</span></a><span data-dcnode-id="1003" instrument_node=""> doesn’t increase too much, since you’re not sucking in as much cold outside air.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><a data-dcnode-id="1000" name="Humidity-during-watering"></a><span data-dcnode-id="999" instrument_node="">
</span><h2 data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Humidity during watering</span></h2><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="995" instrument_node="">The humidity increases enormously when you’re watering your marijuana plants. That’s prefect during the vegetative stage, and you could spray the floors and wall (if they’re covered with waterproof foil) to increase the humidity. But the humidity could become too high during the flowering stage after </span><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/watering/watering-weed-guide/"><span data-dcnode-id="994" instrument_node="">watering</span></a><span data-dcnode-id="992" instrument_node="">. Once your lights go out, the temperature usually decreases and you won’t have to extract as much air, causing the humidity to rise.</span></p><span data-dcnode-id="990" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="986"><img alt="Humidity during watering" class="wp-image-1169" data-dcnode-id="989" height="325" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/02/humidity-during-watering.jpg&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/02/humidity-during-watering.jpg 600w, https://ilgm.com/blog/wp-content/uploads/2019/02/humidity-during-watering-300x163.jpg 300w" width="600"><figcaption data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Watering</span></figcaption></figure><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="984" instrument_node="">You should therefore always water your plants right after the lamps come on, to let most of the evaporation take place during the day. If you’re growing on </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/bubble-buckets/diy-hydroponic-system/"><span data-dcnode-id="983" instrument_node="">hydro</span></a><span data-dcnode-id="981" instrument_node="">, make sure you don’t spill any water and that you keep the room dry during the dark period. Never spray water on your buds if it’s not necessary. This greatly raises the humidity and increases the chance of fungi.</span></p><span data-dcnode-id="979" instrument_node="">
</span><a data-dcnode-id="978" name="Humidity-for-outdoor-marijuana-plants"></a><span data-dcnode-id="977" instrument_node="">
</span><h2 data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Humidity for outdoor marijuana plants</span></h2><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="973" instrument_node="">If you’re </span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/outdoor/best-place-to-grow-weed-outdoors/"><span data-dcnode-id="972" instrument_node="">growing outdoors</span></a><span data-dcnode-id="970" instrument_node="">, you can’t do much to manage the humidity. During spring and the beginning of the summer, a high humidity is no problem, and the plant won’t have buds yet for the water to accumulate in. You’ll see that the plant is very wet early in the morning from the dew, but once the sun comes out and the day passes, this all evaporates without any problems.</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="967" instrument_node="">But after the summer, the actual </span><a data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/from-seed-to-bud/cannabis-flowering-week-1-and-2/"><span data-dcnode-id="966" instrument_node="">flowering of the plants starts</span></a><span data-dcnode-id="964" instrument_node="">, and the climate changes. It becomes colder and it rains more often, increasing the humidity. The dew can cause problems, because the sun doesn’t always show and the temperatures aren’t high enough to sufficiently evaporate it. Large amounts of rain can also cause problems.</span></p><span data-dcnode-id="962" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="958"><img alt="humidity outdoor marijuana plants" class="wp-image-1170" data-dcnode-id="961" height="325" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/02/humidity-outdoor-marijuana-plants.jpg&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/02/humidity-outdoor-marijuana-plants.jpg 600w, https://ilgm.com/blog/wp-content/uploads/2019/02/humidity-outdoor-marijuana-plants-300x163.jpg 300w" width="600"><figcaption data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Outdoor marijuana</span></figcaption></figure><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">It’s definitely not the case that your plants will develop bud rot after a bit of rain. But it is however something to keep an eye out for, because it would suck if you see your buds start to rot after 6 months of offering them your love and care. You could shake the dew off the plants in the morning, during the last month of flowering. It’s good to shelter your plants from the rain if very rainy days are predicted.</span></p><span data-dcnode-id="954" instrument_node="">
</span><a data-dcnode-id="953" name="How-to-measure-the-humidity"></a><span data-dcnode-id="952" instrument_node="">
</span><h2 data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">How to measure the humidity</span></h2><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="948" instrument_node="">A plant can experience heat stress when it gets too much warmth. Heat stress doesn’t usually occur outside, because it won’t get warm enough for that. We’re talking about </span><a data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/marijuana-grow-course/climate/temperature/"><span data-dcnode-id="947" instrument_node="">temperatures</span></a><span data-dcnode-id="945" instrument_node=""> above 105 degrees. Photosynthesis is greatly inhibited during heat stress. Furthermore, the activity of enzymes decreases and the production of proteins slows down. Certain proteins could break. If heat stress goes on too long, the plant will die.</span></p><span data-dcnode-id="943" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="939"><img alt="How to measure the humidity" class="wp-image-1160" data-dcnode-id="942" height="325" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilgm.com/blog/wp-content/uploads/2019/02/How-to-measure-the-humidity.jpg&amp;raw" srcset="https://ilgm.com/blog/wp-content/uploads/2019/02/How-to-measure-the-humidity.jpg 600w, https://ilgm.com/blog/wp-content/uploads/2019/02/How-to-measure-the-humidity-300x163.jpg 300w" width="600"><figcaption data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Measure the humidity</span></figcaption></figure><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">In this way, you can also check the humidity in the room when the lights are off. These hygrometers often have a memory feature that will remember the highest and lowest measured values, so you can tell whether you stayed within the margins. I always use a thermometer/hygrometer with min-max feature. Check this one on&nbsp;Amazon.com</span></p><span data-dcnode-id="935" instrument_node="">
</span></div><span data-dcnode-id="933" instrument_node="">
