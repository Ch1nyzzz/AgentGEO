</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="1828" id="firstHeading"><span data-dcnode-id="1829" instrument_node="">Atmospheric water generator</span></h1><span data-dcnode-id="1827" instrument_node="">
</span><div class="vector-body" data-dcnode-id="462" id="bodyContent"><span data-dcnode-id="1826" instrument_node="">
</span><div class="noprint" data-dcnode-id="1824" id="siteSub"><span data-dcnode-id="1825" instrument_node="">From Wikipedia, the free encyclopedia</span></div><span data-dcnode-id="1823" instrument_node="">

</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="501" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="510"><div class="hatnote navigation-not-searchable" data-dcnode-id="1805" role="note"><span data-dcnode-id="1808" instrument_node="">Main article: </span><a data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Air_well_%28condenser%29" title="Air well (condenser)"><span data-dcnode-id="1807" instrument_node="">Air well (condenser)</span></a></div><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1803" instrument_node="">An </span><b data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">atmospheric water generator</span></b><span data-dcnode-id="1800" instrument_node=""> (</span><b data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">AWG</span></b><span data-dcnode-id="1797" instrument_node="">) is a device that extracts water from </span><a data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Humidity" title="Humidity"><span data-dcnode-id="1796" instrument_node="">humid</span></a><span data-dcnode-id="1794" instrument_node=""> ambient air. </span><a data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_vapor" title="Water vapor"><span data-dcnode-id="1793" instrument_node="">Water vapor</span></a><span data-dcnode-id="1791" instrument_node=""> in the air can be extracted by </span><a data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Condensation" title="Condensation"><span data-dcnode-id="1790" instrument_node="">condensation</span></a><span data-dcnode-id="1788" instrument_node=""> - cooling the air below its </span><a data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dew_point" title="Dew point"><span data-dcnode-id="1787" instrument_node="">dew point</span></a><span data-dcnode-id="1785" instrument_node="">, exposing the air to </span><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Desiccant" title="Desiccant"><span data-dcnode-id="1784" instrument_node="">desiccants</span></a><span data-dcnode-id="1782" instrument_node="">, or pressurizing the air. Unlike a </span><a data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dehumidifier" title="Dehumidifier"><span data-dcnode-id="1781" instrument_node="">dehumidifier</span></a><span data-dcnode-id="1779" instrument_node="">, an AWG is designed to render the water </span><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drinking_water" title="Drinking water"><span data-dcnode-id="1778" instrument_node="">potable</span></a><span data-dcnode-id="1776" instrument_node="">.  AWGs are useful where pure drinking water is difficult or impossible to obtain, because there is almost always a small amount of water in the air that can be extracted.  The two primary techniques in use are cooling and </span><a data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Desiccant" title="Desiccant"><span data-dcnode-id="1775" instrument_node="">desiccants</span></a><span data-dcnode-id="1773" instrument_node="">.
</span></p><p data-dcnode-id="1760"><span data-dcnode-id="1771" instrument_node="">The extraction of atmospheric water may require a significant input of energy.  Some AWG methods are completely passive, relying on natural </span><a data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temperature" title="Temperature"><span data-dcnode-id="1770" instrument_node="">temperature</span></a><span data-dcnode-id="1768" instrument_node=""> differences, and requiring no external energy source. </span><a class="mw-redirect" data-dcnode-id="1766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biomimicry" title="Biomimicry"><span data-dcnode-id="1767" instrument_node="">Biomimicry</span></a><span data-dcnode-id="1765" instrument_node=""> studies have shown the beetle </span><i data-dcnode-id="1762"><a data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stenocara_gracilipes" title="Stenocara gracilipes"><span data-dcnode-id="1764" instrument_node="">Stenocara gracilipes</span></a></i><span data-dcnode-id="1761" instrument_node=""> has the natural ability to perform this task.
</span></p><span data-dcnode-id="1759" instrument_node="">

</span><h2 data-dcnode-id="1653"><span class="mw-headline" data-dcnode-id="1661" id="History"><span data-dcnode-id="1662" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="1654"><span class="mw-editsection-bracket" data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">[</span></span><a data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAtmospheric_water_generator%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="1658" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1652" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1631"><div class="thumbinner" data-dcnode-id="1632" style="width:222px;"><a class="image" data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAtrapanieblas_en_Alto_Patache.jpg"><img alt="" class="thumbimage" data-dcnode-id="1651" data-file-height="3456" data-file-width="5184" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Atrapanieblas_en_Alto_Patache.jpg/220px-Atrapanieblas_en_Alto_Patache.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Atrapanieblas_en_Alto_Patache.jpg/330px-Atrapanieblas_en_Alto_Patache.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Atrapanieblas_en_Alto_Patache.jpg/440px-Atrapanieblas_en_Alto_Patache.jpg 2x" width="220"></a><span data-dcnode-id="1649" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1633"><div class="magnify" data-dcnode-id="1647"><a class="internal" data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAtrapanieblas_en_Alto_Patache.jpg" title="Enlarge"></a></div><span data-dcnode-id="1646" instrument_node="">"Atrapanieblas" or </span><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fog_collection" title="Fog collection"><span data-dcnode-id="1645" instrument_node="">fog collection</span></a><span data-dcnode-id="1643" instrument_node=""> in </span><a class="new" data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlto_Patache%26action%3Dedit%26redlink%3D1" title="Alto Patache (page does not exist)"><span data-dcnode-id="1642" instrument_node="">Alto Patache</span></a><span data-dcnode-id="1640" instrument_node="">, </span><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atacama_Desert" title="Atacama Desert"><span data-dcnode-id="1639" instrument_node="">Atacama Desert</span></a><span data-dcnode-id="1637" instrument_node="">, </span><a data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chile" title="Chile"><span data-dcnode-id="1636" instrument_node="">Chile</span></a><span data-dcnode-id="1634" instrument_node="">.</span></div></div></div><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1629" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Incas" title="Incas"><span data-dcnode-id="1628" instrument_node="">Incas</span></a><span data-dcnode-id="1626" instrument_node=""> were able to sustain their culture above the rain line by collecting dew and channeling it to </span><a class="mw-redirect" data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cisterns" title="Cisterns"><span data-dcnode-id="1625" instrument_node="">cisterns</span></a><span data-dcnode-id="1623" instrument_node=""> for later distribution.</span><sup class="reference" data-dcnode-id="1620" id="cite_ref-1"><a data-dcnode-id="1621" href="#cite_note-1"><span data-dcnode-id="1622" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1619" instrument_node=""> Historical records indicate the use of water-collecting </span><a data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fog_collection" title="Fog collection"><span data-dcnode-id="1618" instrument_node="">fog fences</span></a><span data-dcnode-id="1616" instrument_node="">.  These traditional methods have usually been completely passive, requiring no external energy source other than naturally occurring temperature variations.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1609" style="white-space:nowrap;"><span data-dcnode-id="1615" instrument_node="">[</span><i data-dcnode-id="1611"><a data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1613" title="This claim needs references to reliable sources. (June 2015)"><span data-dcnode-id="1614" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1610" instrument_node="">]</span></sup><span data-dcnode-id="1608" instrument_node="">
</span></p><p data-dcnode-id="1594"><span data-dcnode-id="1606" instrument_node="">Several inventors have developed </span><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Air_well_%28condenser%29" title="Air well (condenser)"><span data-dcnode-id="1605" instrument_node="">air wells</span></a><span data-dcnode-id="1603" instrument_node=""> as a way to passively collect moisture from air.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1596" style="white-space:nowrap;"><span data-dcnode-id="1602" instrument_node="">[</span><i data-dcnode-id="1598"><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1600" title="This claim needs references to reliable sources. (February 2021)"><span data-dcnode-id="1601" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1597" instrument_node="">]</span></sup><span data-dcnode-id="1595" instrument_node="">
</span></p><p data-dcnode-id="1582"><span data-dcnode-id="1593" instrument_node="">The American military’s </span><a data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DARPA" title="DARPA"><span data-dcnode-id="1592" instrument_node="">DARPA</span></a><span data-dcnode-id="1590" instrument_node=""> has a program called Atmospheric Water Extraction which aims to develop a device which can provide water for 150 soldiers while being able to be carried by four people. In February 2021 </span><a data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Electric" title="General Electric"><span data-dcnode-id="1589" instrument_node="">General Electric</span></a><span data-dcnode-id="1587" instrument_node=""> was awarded 14 million dollars to continue development of their device.</span><sup class="reference" data-dcnode-id="1584" id="cite_ref-2"><a data-dcnode-id="1585" href="#cite_note-2"><span data-dcnode-id="1586" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1583" instrument_node="">
</span></p><span data-dcnode-id="1581" instrument_node="">
</span><h2 data-dcnode-id="1571"><span class="mw-headline" data-dcnode-id="1579" id="Modern_technologies"><span data-dcnode-id="1580" instrument_node="">Modern technologies</span></span><span class="mw-editsection" data-dcnode-id="1572"><span class="mw-editsection-bracket" data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">[</span></span><a data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAtmospheric_water_generator%26action%3Dedit%26section%3D2" title="Edit section: Modern technologies"><span data-dcnode-id="1576" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1569" instrument_node="">Many atmospheric water generators operate in a manner very similar to that of a </span><a data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dehumidifier" title="Dehumidifier"><span data-dcnode-id="1568" instrument_node="">dehumidifier</span></a><span data-dcnode-id="1566" instrument_node="">: air is moved over a cooled coil, causing water to condense. The rate of water production depends on the ambient temperature, humidity, the volume of air passing over the coil, and the machine's capacity to cool the coil.  These systems decrease air temperature, which in turn reduces the air's capacity to carry water vapor.  This is the most common technology in use, but when powered by coal-based electricity it has one of the worst </span><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_footprint" title="Carbon footprint"><span data-dcnode-id="1565" instrument_node="">carbon footprints</span></a><span data-dcnode-id="1563" instrument_node=""> of any water source (exceeding </span><a data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reverse_osmosis" title="Reverse osmosis"><span data-dcnode-id="1562" instrument_node="">reverse osmosis</span></a><span data-dcnode-id="1560" instrument_node=""> seawater desalination by three </span><a data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Order_of_magnitude" title="Order of magnitude"><span data-dcnode-id="1559" instrument_node="">orders of magnitude</span></a><span data-dcnode-id="1557" instrument_node="">) and it demands more than four times as much water up the supply chain than it delivers to the user.</span><sup class="reference" data-dcnode-id="1554" id="cite_ref-3"><a data-dcnode-id="1555" href="#cite_note-3"><span data-dcnode-id="1556" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1553" instrument_node="">
</span></p><p data-dcnode-id="1524"><span data-dcnode-id="1551" instrument_node="">An alternative available technology uses liquid, or "wet" </span><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Desiccant" title="Desiccant"><span data-dcnode-id="1550" instrument_node="">desiccants</span></a><span data-dcnode-id="1548" instrument_node=""> such as </span><a data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithium_chloride" title="Lithium chloride"><span data-dcnode-id="1547" instrument_node="">lithium chloride</span></a><span data-dcnode-id="1545" instrument_node=""> or </span><a data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithium_bromide" title="Lithium bromide"><span data-dcnode-id="1544" instrument_node="">lithium bromide</span></a><span data-dcnode-id="1542" instrument_node=""> to pull water from the air via </span><a data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hygroscopy" title="Hygroscopy"><span data-dcnode-id="1541" instrument_node="">hygroscopic</span></a><span data-dcnode-id="1539" instrument_node=""> processes.</span><sup class="reference" data-dcnode-id="1536" id="cite_ref-4"><a data-dcnode-id="1537" href="#cite_note-4"><span data-dcnode-id="1538" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1535" instrument_node="">  A proposed similar technique combines the use of solid desiccants, such as </span><a data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silica_gel" title="Silica gel"><span data-dcnode-id="1534" instrument_node="">silica gel</span></a><span data-dcnode-id="1532" instrument_node=""> and </span><a data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zeolite" title="Zeolite"><span data-dcnode-id="1531" instrument_node="">zeolite</span></a><span data-dcnode-id="1529" instrument_node="">, with pressure condensation. Direct drinking quality water generating devices using sunlight is also under development.</span><sup class="reference" data-dcnode-id="1526" id="cite_ref-5"><a data-dcnode-id="1527" href="#cite_note-5"><span data-dcnode-id="1528" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1525" instrument_node="">
</span></p><p data-dcnode-id="1518"><span data-dcnode-id="1523" instrument_node="">It is said to take 310 Wh to make 1 liter of water.</span><sup class="reference" data-dcnode-id="1520" id="cite_ref-6"><a data-dcnode-id="1521" href="#cite_note-6"><span data-dcnode-id="1522" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1519" instrument_node="">
</span></p><span data-dcnode-id="1517" instrument_node="">
</span><h3 data-dcnode-id="1507"><span class="mw-headline" data-dcnode-id="1515" id="Cooling_condensation"><span data-dcnode-id="1516" instrument_node="">Cooling condensation</span></span><span class="mw-editsection" data-dcnode-id="1508"><span class="mw-editsection-bracket" data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">[</span></span><a data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAtmospheric_water_generator%26action%3Dedit%26section%3D3" title="Edit section: Cooling condensation"><span data-dcnode-id="1512" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1506" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1497"><div class="thumbinner" data-dcnode-id="1498" style="width:262px;"><a class="image" data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAtmospheric_Water_Generator_diagram.svg"><img alt="" class="thumbimage" data-dcnode-id="1505" data-file-height="386" data-file-width="667" decoding="async" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Atmospheric_Water_Generator_diagram.svg/260px-Atmospheric_Water_Generator_diagram.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Atmospheric_Water_Generator_diagram.svg/390px-Atmospheric_Water_Generator_diagram.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Atmospheric_Water_Generator_diagram.svg/520px-Atmospheric_Water_Generator_diagram.svg.png 2x" width="260"></a><span data-dcnode-id="1503" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1499"><div class="magnify" data-dcnode-id="1501"><a class="internal" data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAtmospheric_Water_Generator_diagram.svg" title="Enlarge"></a></div><span data-dcnode-id="1500" instrument_node="">Example of cooling-condensation process.</span></div></div></div><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1495" instrument_node="">In a cooling condensation type atmospheric water generator, a </span><a class="mw-redirect" data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gas_compressor" title="Gas compressor"><span data-dcnode-id="1494" instrument_node="">compressor</span></a><span data-dcnode-id="1492" instrument_node=""> circulates </span><a data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refrigerant" title="Refrigerant"><span data-dcnode-id="1491" instrument_node="">refrigerant</span></a><span data-dcnode-id="1489" instrument_node=""> through a condenser and then an evaporator coil which cools the air surrounding it.  This lowers the air temperature to its </span><a data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dew_point" title="Dew point"><span data-dcnode-id="1488" instrument_node="">dew point</span></a><span data-dcnode-id="1486" instrument_node="">, causing water to condense.  A controlled-speed fan pushes filtered air over the coil.  The resulting water is then passed into a holding tank with a purification and filtration system to help keep the water pure and reduce the risk posed by viruses and bacteria which may be collected from the ambient air on the evaporator coil by the condensing water.</span><sup class="reference" data-dcnode-id="1483" id="cite_ref-7"><a data-dcnode-id="1484" href="#cite_note-7"><span data-dcnode-id="1485" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1482" instrument_node="">
</span></p><p data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">The rate at which water can be produced depends on </span><a class="mw-redirect" data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Relative_humidity" title="Relative humidity"><span data-dcnode-id="1479" instrument_node="">relative humidity</span></a><span data-dcnode-id="1477" instrument_node=""> and ambient air temperature and the size of the compressor.  Atmospheric water generators become more effective as relative humidity and air temperature increase. As a rule of thumb, cooling condensation atmospheric water generators do not work efficiently when the temperature falls below 18.3°C (65°F) or the relative humidity drops below 30%. This means they are relatively inefficient when located inside air-conditioned offices.  The cost-effectiveness of an AWG depends on the capacity of the machine, local humidity and temperature conditions, and the cost to power the unit.
</span></p><p data-dcnode-id="1460"><span data-dcnode-id="1475" instrument_node="">Recent efforts have been made attempting to utilize the </span><a class="mw-redirect" data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peltier_effect" title="Peltier effect"><span data-dcnode-id="1474" instrument_node="">Peltier effect</span></a><span data-dcnode-id="1472" instrument_node=""> of semiconducting materials in which one side of the semi-conducting material heats while the other side cools. In this application, the air is forced over the cooling fans on the side that cools which lowers the temperature of the air to its </span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dew_point" title="Dew point"><span data-dcnode-id="1471" instrument_node="">dew point</span></a><span data-dcnode-id="1469" instrument_node="">, causing water to condense, the resulting water is then collected. Due to the solid-state nature of the semiconducting material, they are attractive for portable units although the low efficiency of condensing water at commonly experienced humidity is compounded by the high power consumption of Peltier coolers</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1462" style="white-space:nowrap;"><span data-dcnode-id="1468" instrument_node="">[</span><i data-dcnode-id="1464"><a data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1466" title="This claim needs references to reliable sources. (July 2016)"><span data-dcnode-id="1467" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1463" instrument_node="">]</span></sup><span data-dcnode-id="1461" instrument_node="">
</span></p><p data-dcnode-id="1449"><span data-dcnode-id="1459" instrument_node="">The drinking water generation capacity can be enhanced in low humidity ambient air conditions, first by using the </span><a data-dcnode-id="1457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evaporative_cooler" title="Evaporative cooler"><span data-dcnode-id="1458" instrument_node="">evaporative cooler</span></a><span data-dcnode-id="1456" instrument_node=""> with a </span><a data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brackish_water" title="Brackish water"><span data-dcnode-id="1455" instrument_node="">brackish water</span></a><span data-dcnode-id="1453" instrument_node=""> supply to increase the air humidity near to </span><a data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dew_point" title="Dew point"><span data-dcnode-id="1452" instrument_node="">dew point</span></a><span data-dcnode-id="1450" instrument_node=""> condition. Thus drinking water is generated using brackish water without depending on ambient air humidity by the water generator.
</span></p><span data-dcnode-id="1448" instrument_node="">
</span><h3 data-dcnode-id="1438"><span class="mw-headline" data-dcnode-id="1446" id="Wet_desiccation"><span data-dcnode-id="1447" instrument_node="">Wet desiccation</span></span><span class="mw-editsection" data-dcnode-id="1439"><span class="mw-editsection-bracket" data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">[</span></span><a data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAtmospheric_water_generator%26action%3Dedit%26section%3D4" title="Edit section: Wet desiccation"><span data-dcnode-id="1443" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1436" instrument_node="">One form of wet desiccant water generation involves the use of salt in a concentrated </span><a data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brine" title="Brine"><span data-dcnode-id="1435" instrument_node="">brine</span></a><span data-dcnode-id="1433" instrument_node=""> solution to absorb the ambient humidity.  These systems then extract the water from the solution and purify it for consumption.  A version of this technology was developed as portable devices that run on </span><a data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Engine-generator" title="Engine-generator"><span data-dcnode-id="1432" instrument_node="">generators</span></a><span data-dcnode-id="1430" instrument_node="">.  Large versions, mounted on trailers, are said to produce up to 1,200 US gallons (4,500&nbsp;l) of water per day, at a ratio of up to 5 gallons of water per gallon of fuel.</span><sup class="reference" data-dcnode-id="1427" id="cite_ref-8"><a data-dcnode-id="1428" href="#cite_note-8"><span data-dcnode-id="1429" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1426" instrument_node="">  This technology was contracted for use by the US Army and the US Navy from Terralab</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1419" style="white-space:nowrap;"><span data-dcnode-id="1425" instrument_node="">[</span><i data-dcnode-id="1421"><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1423" title="This claim needs references to reliable sources. (March 2010)"><span data-dcnode-id="1424" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1420" instrument_node="">]</span></sup><span data-dcnode-id="1418" instrument_node=""> and the </span><a data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Emergency_Management_Agency" title="Federal Emergency Management Agency"><span data-dcnode-id="1417" instrument_node="">Federal Emergency Management Agency</span></a><span data-dcnode-id="1415" instrument_node=""> (FEMA).</span><sup class="reference" data-dcnode-id="1412" id="cite_ref-9"><a data-dcnode-id="1413" href="#cite_note-9"><span data-dcnode-id="1414" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1411" instrument_node="">
</span></p><p data-dcnode-id="1395"><span data-dcnode-id="1409" instrument_node="">A variation of this technology has been developed to be more environmentally friendly, primarily through the use of </span><a class="mw-redirect" data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passive_solar" title="Passive solar"><span data-dcnode-id="1408" instrument_node="">passive solar</span></a><span data-dcnode-id="1406" instrument_node=""> energy and </span><a data-dcnode-id="1404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gravity" title="Gravity"><span data-dcnode-id="1405" instrument_node="">gravity</span></a><span data-dcnode-id="1403" instrument_node="">.  Brine is streamed down the outside of towers, where it absorbs water from the air.  The brine then enters a chamber and is subjected to a partial </span><a data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vacuum" title="Vacuum"><span data-dcnode-id="1402" instrument_node="">vacuum</span></a><span data-dcnode-id="1400" instrument_node=""> and heated.  The water vapor is condensed and the liquid water collected, while the renewed brine is recirculated through the system.  As the condensed water is removed from the system using gravity, it creates a vacuum which lowers the boiling point of the brine.</span><sup class="reference" data-dcnode-id="1397" id="cite_ref-10"><a data-dcnode-id="1398" href="#cite_note-10"><span data-dcnode-id="1399" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1396" instrument_node="">
</span></p><p data-dcnode-id="1383"><span data-dcnode-id="1394" instrument_node="">Systems combining </span><a data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adsorption" title="Adsorption"><span data-dcnode-id="1393" instrument_node="">adsorption</span></a><span data-dcnode-id="1391" instrument_node="">, refrigeration and condensation are also being developed.</span><sup class="reference" data-dcnode-id="1388" id="cite_ref-11"><a data-dcnode-id="1389" href="#cite_note-11"><span data-dcnode-id="1390" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="1385" id="cite_ref-12"><a data-dcnode-id="1386" href="#cite_note-12"><span data-dcnode-id="1387" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1384" instrument_node="">
</span></p><span data-dcnode-id="1382" instrument_node="">
</span><h2 data-dcnode-id="1372"><span class="mw-headline" data-dcnode-id="1380" id="In_greenhouses"><span data-dcnode-id="1381" instrument_node="">In greenhouses</span></span><span class="mw-editsection" data-dcnode-id="1373"><span class="mw-editsection-bracket" data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">[</span></span><a data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAtmospheric_water_generator%26action%3Dedit%26section%3D5" title="Edit section: In greenhouses"><span data-dcnode-id="1377" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1370" instrument_node="">A special case is water generation in greenhouses because the air inside a greenhouse is much hotter and more humid than the outside. Particularly in climatic zones with </span><a data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_scarcity" title="Water scarcity"><span data-dcnode-id="1369" instrument_node="">water scarcity</span></a><span data-dcnode-id="1367" instrument_node="">, a greenhouse can strongly enhance the conditions necessary for atmospheric water generation.  An example is the </span><a data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seawater_greenhouse" title="Seawater greenhouse"><span data-dcnode-id="1366" instrument_node="">seawater greenhouse</span></a><span data-dcnode-id="1364" instrument_node=""> in </span><a data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oman" title="Oman"><span data-dcnode-id="1363" instrument_node="">Oman</span></a><span data-dcnode-id="1361" instrument_node=""> and the </span><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IBTS_Greenhouse" title="IBTS Greenhouse"><span data-dcnode-id="1360" instrument_node="">IBTS Greenhouse</span></a><span data-dcnode-id="1358" instrument_node="">.
</span></p><span data-dcnode-id="1356" instrument_node="">
</span><h2 data-dcnode-id="1346"><span class="mw-headline" data-dcnode-id="1354" id="In_fuel_cell_cars"><span data-dcnode-id="1355" instrument_node="">In fuel cell cars</span></span><span class="mw-editsection" data-dcnode-id="1347"><span class="mw-editsection-bracket" data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">[</span></span><a data-dcnode-id="1350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAtmospheric_water_generator%26action%3Dedit%26section%3D6" title="Edit section: In fuel cell cars"><span data-dcnode-id="1351" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1344" instrument_node="">A hydrogen </span><a data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fuel_cell_vehicle" title="Fuel cell vehicle"><span data-dcnode-id="1343" instrument_node="">fuel cell car</span></a><span data-dcnode-id="1341" instrument_node=""> generates  one liter of drinking quality water for every 8 miles (12.87 kilometers) ride which is of significance in desert conditions.</span><sup class="reference" data-dcnode-id="1338" id="cite_ref-13"><a data-dcnode-id="1339" href="#cite_note-13"><span data-dcnode-id="1340" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1337" instrument_node="">
</span></p><span data-dcnode-id="1335" instrument_node="">
</span><h2 data-dcnode-id="1325"><span class="mw-headline" data-dcnode-id="1333" id="In_air_conditioners"><span data-dcnode-id="1334" instrument_node="">In air conditioners</span></span><span class="mw-editsection" data-dcnode-id="1326"><span class="mw-editsection-bracket" data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">[</span></span><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAtmospheric_water_generator%26action%3Dedit%26section%3D7" title="Edit section: In air conditioners"><span data-dcnode-id="1330" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1323" instrument_node="">In dehumidification type </span><a class="mw-redirect" data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Air_conditioner" title="Air conditioner"><span data-dcnode-id="1322" instrument_node="">air conditioners</span></a><span data-dcnode-id="1320" instrument_node="">, wastewater is a by-product, caused by air cooling and </span><a data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Condensation" title="Condensation"><span data-dcnode-id="1319" instrument_node="">condensation</span></a><span data-dcnode-id="1317" instrument_node="">, like an atmospheric water generator (AWG). The water, in this case, is not purified. Refrigeration air conditioning equipment usually reduces the absolute humidity of the air processed by the system. The relatively cold (below the dewpoint) evaporator coil condenses water vapor from the processed air, much like an ice-cold drink will condense water on the outside of a glass. Therefore, water vapor is removed from the cooled air and the relative humidity in the room is lowered. The water is usually sent to a drain or may simply drip onto the ground outdoors. The heat is rejected by the condenser which is located outside of the room to be cooled.
</span></p><span data-dcnode-id="1315" instrument_node="">
</span><h2 data-dcnode-id="1305"><span class="mw-headline" data-dcnode-id="1313" id="Drinking_water_generated_by_solar_power"><span data-dcnode-id="1314" instrument_node="">Drinking water generated by solar power</span></span><span class="mw-editsection" data-dcnode-id="1306"><span class="mw-editsection-bracket" data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">[</span></span><a data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAtmospheric_water_generator%26action%3Dedit%26section%3D8" title="Edit section: Drinking water generated by solar power"><span data-dcnode-id="1310" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1303" instrument_node="">Drinking quality water was generated by rooftop solar hydropanels from the air using the solar power and solar heat during daylight time.</span><sup class="reference" data-dcnode-id="1300" id="cite_ref-14"><a data-dcnode-id="1301" href="#cite_note-14"><span data-dcnode-id="1302" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="1297" id="cite_ref-15"><a data-dcnode-id="1298" href="#cite_note-15"><span data-dcnode-id="1299" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="1294" id="cite_ref-16"><a data-dcnode-id="1295" href="#cite_note-16"><span data-dcnode-id="1296" instrument_node="">[16]</span></a></sup><span data-dcnode-id="1293" instrument_node="">
</span></p><p data-dcnode-id="1251"><a data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydrogel" title="Hydrogel"><span data-dcnode-id="1291" instrument_node="">Hydrogels</span></a><span data-dcnode-id="1289" instrument_node=""> can be used to capture moisture (e.g. at night in a desert) to cool solar panels</span><sup class="reference" data-dcnode-id="1286" id="cite_ref-17"><a data-dcnode-id="1287" href="#cite_note-17"><span data-dcnode-id="1288" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1285" instrument_node=""> or to produce fresh water</span><sup class="reference" data-dcnode-id="1282" id="cite_ref-18"><a data-dcnode-id="1283" href="#cite_note-18"><span data-dcnode-id="1284" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1281" instrument_node=""> – including for irrigating crops as demonstrated in </span><a data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photovoltaic_system%23Standalone" title="Photovoltaic system"><span data-dcnode-id="1280" instrument_node="">solar panel integrated systems</span></a><span data-dcnode-id="1278" instrument_node=""> where these have been enclosed next to</span><sup class="reference" data-dcnode-id="1275" id="cite_ref-19"><a data-dcnode-id="1276" href="#cite_note-19"><span data-dcnode-id="1277" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="1272" id="cite_ref-20"><a data-dcnode-id="1273" href="#cite_note-20"><span data-dcnode-id="1274" instrument_node="">[20]</span></a></sup><span data-dcnode-id="1271" instrument_node=""> or beneath the panels within the system.</span><sup class="reference" data-dcnode-id="1268" id="cite_ref-21"><a data-dcnode-id="1269" href="#cite_note-21"><span data-dcnode-id="1270" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="1265" id="cite_ref-22"><a data-dcnode-id="1266" href="#cite_note-22"><span data-dcnode-id="1267" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="1262" id="cite_ref-23"><a data-dcnode-id="1263" href="#cite_note-23"><span data-dcnode-id="1264" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="1259" id="cite_ref-24"><a data-dcnode-id="1260" href="#cite_note-24"><span data-dcnode-id="1261" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="1256" id="cite_ref-25"><a data-dcnode-id="1257" href="#cite_note-25"><span data-dcnode-id="1258" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="1253" id="cite_ref-26"><a data-dcnode-id="1254" href="#cite_note-26"><span data-dcnode-id="1255" instrument_node="">[26]</span></a></sup><span data-dcnode-id="1252" instrument_node="">
</span></p><p data-dcnode-id="1230"><span data-dcnode-id="1250" instrument_node="">A potentials-assessment study found that such devices (which are under development, already exist or could be developed) could help a billion people to access </span><a data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drinking_water%23Global_access" title="Drinking water"><span data-dcnode-id="1249" instrument_node="">safe drinking water</span></a><span data-dcnode-id="1247" instrument_node="">, albeit such </span><a data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Off-the-grid" title="Off-the-grid"><span data-dcnode-id="1246" instrument_node="">off-the-grid</span></a><span data-dcnode-id="1244" instrument_node=""> generation may sometimes "undermine efforts to develop </span><a data-dcnode-id="1242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_supply_network" title="Water supply network"><span data-dcnode-id="1243" instrument_node="">permanent piped infrastructure</span></a><span data-dcnode-id="1241" instrument_node="">".</span><sup class="reference" data-dcnode-id="1238" id="cite_ref-27"><a data-dcnode-id="1239" href="#cite_note-27"><span data-dcnode-id="1240" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="1235" id="cite_ref-28"><a data-dcnode-id="1236" href="#cite_note-28"><span data-dcnode-id="1237" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="1232" id="cite_ref-29"><a data-dcnode-id="1233" href="#cite_note-29"><span data-dcnode-id="1234" instrument_node="">[29]</span></a></sup><span data-dcnode-id="1231" instrument_node="">
</span></p><span data-dcnode-id="1229" instrument_node="">
