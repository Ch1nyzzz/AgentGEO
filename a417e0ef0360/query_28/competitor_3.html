Recently the</span><b data-dcnode-id="829"><span data-dcnode-id="830" instrument_node=""> Environmental Protection Agency (EPA)</span></b><span data-dcnode-id="828" instrument_node="">, the </span><b data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Center for Disease Control (CDC)</span></b><span data-dcnode-id="825" instrument_node=""> and other environmental groups have commented on the shocking and dangerous state of public water supplies. They have said that the water quality in many of our public water supplies is being degraded by chemical, biological, and physical contaminants. Drinking ordinary tap water can be potentially fatal to people with a weakened immune system. Children, expectant mothers and the elderly are in greatest risk. 

</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">
As the news of this water crisis has spread, there has been an explosive worldwide growth in the sales of both bottled water and filtering devices, There is however, no assurance that bottled water is safe;  and furthermore, of the over 2,000 different filter models sold to the public, only a handful actually remove all of the parasites, viruses, bacteria, pesticides and heavy metals that may be present in tap water. Cryptosporidium Parvum, for example is one of the protozoa, which most water systems are incapable of removing. This is the same parasite that killed 104 people and made 400,000 ill in Milwaukee. </span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="821" instrument_node="">
The </span><b data-dcnode-id="819"><span data-dcnode-id="820" instrument_node=""> Natural Resources Defense Council</span></b><span data-dcnode-id="818" instrument_node=""> estimates that in the US alone  . . . more than 900,000 people become ill each year from water borne disease  . . . and as many as 900 will die.  As bad as the situation is in the United States, it is worse in many other developed countries and to an even greater degree, second and third-world countries.

</span></p><p data-dcnode-id="803"><span data-dcnode-id="816" instrument_node="">
Continually, on any given day, more than 1/2 of the earth's human population is ill, with the majority of these cases caused by waterborne contaminants. The </span><strong data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">World Health Organization</span></strong><span data-dcnode-id="813" instrument_node=""> of the United Nations estimates that </span><strong data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">80%</span></strong><span data-dcnode-id="810" instrument_node=""> of this</span><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node=""> illness</span></strong><span data-dcnode-id="807" instrument_node=""> is caused by </span><strong data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">contaminated drinking water</span></strong><span data-dcnode-id="804" instrument_node="">. Many countries throughout the world, not just third world countries, have inadequate water treatment facilities, or a complete lack of treatment facilities. </span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">
It is becoming clear that new technologies are needed in every segment of the water  treatment industry: agriculture, horticulture, food processing, industrial waste treatment, public water supplies, and sewage treatment. These systems must be environmentally-friendly and rely on methods and processes that are not chemically based. </span></p><span data-dcnode-id="799" instrument_node="">

Fortunately, there is a new technology that offers a remarkable solution to the global water crisis. Air2Water; has introduced the Dolphin1 - - - an atmospheric water generator (AWG) which utilizes a revolutionary patented technology to convert ambient atmospheric water vapor into potable water. In other words The Dolphin1 </span><b data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">produces pure drinking water  . . . out of thin air</span></b><span data-dcnode-id="786" instrument_node="">. 
</span><p data-dcnode-id="12"><span data-dcnode-id="785" instrument_node="">

Designed with Air2Water's advanced proprietary ultrafiltration membrane technology, the Dolphin1 extracts, filters, treats and purifies water . . . all from the air we breath . . .  providing pristine, sparkling clear water in the purest form - much like crystal-like dew found only on the purest mountain tops.

</span><table data-dcnode-id="703"><tbody data-dcnode-id="704"><tr data-dcnode-id="705"><td align="left" data-dcnode-id="706"><span data-dcnode-id="742" instrument_node="">

</span><li data-dcnode-id="739"><span data-dcnode-id="740" instrument_node=""> The Dolphin1; machine first pulls air through an electrostatic filter, removing 93% of all air born particles.</span></li><br data-dcnode-id="738"><span data-dcnode-id="737" instrument_node="">
</span><li data-dcnode-id="735"><span data-dcnode-id="736" instrument_node=""> A condensation unit receives this clean humid airflow and condenses water vapor into liquid.</span></li><br data-dcnode-id="734"><span data-dcnode-id="733" instrument_node="">
</span><li data-dcnode-id="731"><span data-dcnode-id="732" instrument_node=""> As the machine collects the water, it drops into a collection tray and immediately passes into Ultraviolet (UV) light, where the water stays in contact with UV rays for approximately 30 minutes. This kills over 90% of all germs and bacteria in the water.</span></li><br data-dcnode-id="730"><span data-dcnode-id="729" instrument_node="">
</span><li data-dcnode-id="727"><span data-dcnode-id="728" instrument_node=""> The water is then pumped through a sediment screen and then through 2 solid block activated carbon (SBAC) 1 micron filters, which removes over 90% of any volatile organic chemicals (VOCs) that may be in the water.</span></li><br data-dcnode-id="726"><span data-dcnode-id="725" instrument_node="">
</span><li data-dcnode-id="723"><span data-dcnode-id="724" instrument_node=""> The water is then filtered through air2water's proprietary ultrafiltration (UF) membrane, with a pore size of .015 micron, to remove virtually all bacteria and common viruses. </span></li><span data-dcnode-id="722" instrument_node=""> </span><br data-dcnode-id="721"><span data-dcnode-id="720" instrument_node="">
</span><li data-dcnode-id="718"><span data-dcnode-id="719" instrument_node=""> The water is then pumped into a reservoir tank. </span></li><br data-dcnode-id="717"><span data-dcnode-id="716" instrument_node="">
</span><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node=""> From the reservoir tank, the water is recycled every 30 minutes through the UV and back into the reservoir tank. </span></li><br data-dcnode-id="713"><span data-dcnode-id="712" instrument_node="">
</span><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node=""> The water is then chilled or heated and dispensed at the consumer's convenience. </span></li><span data-dcnode-id="709" instrument_node="">

</span><b data-dcnode-id="698"><font color="#006699" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">The Air2Water Technology:</span></font></b></p><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">
</span></p><p data-dcnode-id="694"></p><center data-dcnode-id="692"><img data-dcnode-id="693" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//air2water.biz/images/aquovator-flow.jpg&amp;raw"></center><p data-dcnode-id="371"><span data-dcnode-id="691" instrument_node="">

This revolutionary technology is helping to meet the growing demand for economical, good tasting, quality drinking water. </span><br data-dcnode-id="689"><span data-dcnode-id="688" instrument_node="">
Atmospheric water generation is a green friendly, alternative water source, for anyone who wishes to maintain control over their own pure water supply. The Dolphin1 has been designed to perform at optimum levels, producing high quality water while consuming minimal electricity.</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">


Water produced by the Dolphin1 water generation machine is pure and safe for human consumption and exceeds the established U.S. and international Public Health standards, including NSF 53, which is the top U.S. benchmark for drinking water. The NSF 53 standard requires the removal of volatile organic chemicals. VOCs such as ether, which have proven extremely difficult to remove by filtration methods of the past, are not present in the water generated by the Dolphin1 water generation machine.


</span></p><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">
</span></p><h1 data-dcnode-id="681"><font color="#006699" data-dcnode-id="682" size="5"><span data-dcnode-id="683" instrument_node=""> Dolphin1 Features: </span></font></h1><span data-dcnode-id="680" instrument_node="">

The Dolphin1 represents our newest model of quality atmospheric water generation technology. The complete set of features of the Dolphin1 set it apart from any other machine available in the marketplace today. This hot/cold machine features superior logic, easy to read LCD display, and low energy consumption. With its municipal tap-in feature, the Dolphin1 is perfect for environments where temperature and humidity are seasonal. Our superior filter system ensures that the water dispensed is filtered through high quality filters, including one carbon filter, one sediment filter, a second carbon filter, a no waste RO filter or an ultra-filtration (with no-waste bypass), and a third carbon filter. The water is treated by two inline UV lamps and is re-circulated to ensure fresh tasting water when you need it. Re-circulation of all water in the system takes place every 90 minutes for 10 minutes using two separate re-circulation systems with individual UV lamps. Because the hot and cold water tanks use the latest coil technology the Dolphin1 uses less energy overall to provide you with hot and cold water on demand (see our detailed specifications below). Combined with its no-waste RO system (or optional ultra-filtration filter), the Dolphin1 represents the most fully featured and thoroughly thought through AWG design ever built.
</span><p data-dcnode-id="603"><span data-dcnode-id="679" instrument_node="">
</span><strong data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Water Filtration system</span></strong><span data-dcnode-id="676" instrument_node="">: 4 filters and 2 x UV lights.
</span><br data-dcnode-id="675"><span data-dcnode-id="674" instrument_node="">
</span><br data-dcnode-id="673"><span data-dcnode-id="672" instrument_node="">
</span><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Water Flow from the collection tank</span></strong><span data-dcnode-id="669" instrument_node="">: Sediment filter, Carbon filter 1, Reverse Osmosis, Carbon filter 2, then the 1st UV Light. Additional UV light for cold water: All cold water is additionally sanitized by passing the water through a 2nd UV light.
</span><br data-dcnode-id="668"><span data-dcnode-id="667" instrument_node="">
</span><br data-dcnode-id="666"><span data-dcnode-id="665" instrument_node="">
</span><strong data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Recycle Mode</span></strong><span data-dcnode-id="662" instrument_node="">: Sanitizes water in top storage tank on power up and every 12 hours during normal operation by passing the water through the cold water UV Light and then back into the storage tank for 2 minutes.
</span><br data-dcnode-id="661"><span data-dcnode-id="660" instrument_node="">
</span><br data-dcnode-id="659"><span data-dcnode-id="658" instrument_node="">
</span><strong data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">2 speed fan</span></strong><span data-dcnode-id="655" instrument_node="">: A 2 speed fan is used to allow the dealer or end user to select between maximum water production, or a quieter operation mode. The switch is on the back of the unit.
</span><br data-dcnode-id="654"><span data-dcnode-id="653" instrument_node="">
</span><br data-dcnode-id="652"><span data-dcnode-id="651" instrument_node="">
</span><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Quiet Operation Sound</span></strong><span data-dcnode-id="648" instrument_node="">: measures less than 50dB maximum sound level (measured 1ft from the unit, when generating water).
</span><br data-dcnode-id="647"><span data-dcnode-id="646" instrument_node="">
</span><br data-dcnode-id="645"><span data-dcnode-id="644" instrument_node="">
</span><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Municipal Water Mode</span></strong><span data-dcnode-id="641" instrument_node="">: Municipal water mode is designed to provide additional water source if atmospheric water generation can not keep up with demand. Municipal water requires an external pre-filter kit to maintain water quality vs. atmospheric water.
</span><br data-dcnode-id="640"><span data-dcnode-id="639" instrument_node="">
</span><br data-dcnode-id="638"><span data-dcnode-id="637" instrument_node="">
Note: Without a pre-filter, all of the standard filters, especially the Reverse Osmosis filter life will be much shorter.
</span><br data-dcnode-id="636"><span data-dcnode-id="635" instrument_node="">
</span><br data-dcnode-id="634"><span data-dcnode-id="633" instrument_node="">
If an external water source is present, and the Relative Humidity is above 40%. Any time the collection tank is empty, the unit will fill the collection tank from the external water source (takes about 1 min), and then shut off the external water source, and resume Atmospheric water production.
</span><br data-dcnode-id="632"><span data-dcnode-id="631" instrument_node="">
</span><br data-dcnode-id="630"><span data-dcnode-id="629" instrument_node="">
If an external water source is present, and the Relative Humidity is below 40%. Any time the collection tank is empty, the unit will fill the collection tank from the external water source (takes about 1 min), and then shut off the external water source. Atmospheric water production will resume if the R/H goes above 40%.
</span><br data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">
</span><br data-dcnode-id="626"><span data-dcnode-id="625" instrument_node="">
</span><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Hot Water Child Lock</span></strong><span data-dcnode-id="622" instrument_node="">: Hot Water will only be dispensed if the Child Lock button is pressed before the Hot Water Button. The system resets after each use, or if no Hot water is dispensed for 30 seconds. The unit sounds a long warning tone if the Hot Water button is pressed without first pressing the Child Lock button. This can remind an adult to engage the Child Lock, or warn that a child is playing with the machine.
</span><br data-dcnode-id="621"><span data-dcnode-id="620" instrument_node="">
</span><br data-dcnode-id="619"><span data-dcnode-id="618" instrument_node="">
</span><strong data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Filter Replacement Warning</span></strong><span data-dcnode-id="615" instrument_node="">: The unit will remind the end user to replace each filter as required. Filter replacement timers can be reset at any time, if the filters are replaced early. The Sediment, and 2x Carbon filters should be replaced every 6 months, and the Reverse Osmosis filter every 12 months. The filters are accessible from the front of the machine, have quick disconnect connectors, and the front panel is easily removed to facilitate filter replacement.
</span><br data-dcnode-id="614"><span data-dcnode-id="613" instrument_node="">
</span><br data-dcnode-id="612"><span data-dcnode-id="611" instrument_node="">
</span><strong data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Dolphin1 User Interface Liquid Crystal Display</span></strong><span data-dcnode-id="608" instrument_node="">: The unit displays the current status of the machine with full animation on the front panel color LCD. Displays include Atmospheric water generation, filtering the water, dispensing Hot or Cold Water, Hot and Cold water tank temp, Heater and Cooler Status, UV Light Status / Failure, filter replacement, leak sensor, defrost sensor, the level of water in the collection tank and storage tank, etc.

All button presses respond with an acknowledgement tone and where appropriate, mode change on the LCD, or a long warning tone if the requested operation cannot be performed.
