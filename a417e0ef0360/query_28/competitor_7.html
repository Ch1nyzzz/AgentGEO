</span><p data-dcnode-id="1945"></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1936"><span data-dcnode-id="1943" instrument_node="">If you want to know the operation consumption is </span><strong data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">450 watts / hour.</span></strong><span data-dcnode-id="1940" instrument_node=""> That means you can make up to </span><strong data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">1.25 liters in 1 hour</span></strong><span data-dcnode-id="1937" instrument_node=""> with a humidity percentage greater than 85%.</span></p><span data-dcnode-id="1935" instrument_node="">
