/07/Romex-vs-MC-cable-1024x493.png.webp 1024w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/Romex-vs-MC-cable-768x370.png.webp 768w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/Romex-vs-MC-cable-600x289.png.webp 600w" width="1080"><noscript data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">&lt;img class="alignnone size-full wp-image-4292" src="https://wesbellwireandcable.com/wp-content/uploads/2021/07/Romex-vs-MC-cable.png" alt="Romex vs MC cable" width="1080" height="520" srcset="https://wesbellwireandcable.com/wp-content/uploads/2021/07/Romex-vs-MC-cable.png 1080w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/Romex-vs-MC-cable-300x144.png 300w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/Romex-vs-MC-cable-1024x493.png 1024w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/Romex-vs-MC-cable-768x370.png 768w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/Romex-vs-MC-cable-600x289.png 600w" sizes="(max-width: 1080px) 100vw, 1080px" /&gt;</span></noscript></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="721" instrument_node="">Electrical cable options vary widely, with unique types used in specific applications. Therefore, </span><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">choosing the right type of cable is one of the essential tasks installers need</span></strong><span data-dcnode-id="718" instrument_node=""> to take on before initiating a project. Two types of cables that may be commonly used, especially in residential applications, are Romex and MC cabling. While both are approved for use in residential applications by National Electrical Code (NEC) regulations, these cables each have unique features to consider for installation.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="715" instrument_node="">Learn what these types of cables are, their differences and when to use </span><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">MC versus Romex cabling</span></strong><span data-dcnode-id="712" instrument_node=""> in an installation below.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="706"><img alt="what is MC cable" class="alignnone size-full wp-image-4293 entered lazyloaded" data-dcnode-id="709" data-lazy-sizes="(max-width: 1080px) 100vw, 1080px" data-lazy-src="https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable.png.webp" data-lazy-src-webp="https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable.png.webp" data-lazy-srcset="https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable.png.webp 1080w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-300x144.png.webp 300w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-1024x493.png.webp 1024w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-768x370.png.webp 768w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-600x289.png.webp 600w" data-lazy-srcset-webp="https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable.png.webp 1080w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-300x144.png.webp 300w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-1024x493.png.webp 1024w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-768x370.png.webp 768w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-600x289.png.webp 600w" data-ll-status="loaded" height="520" sizes="(max-width: 1080px) 100vw, 1080px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable.png.webp&amp;raw" srcset="https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable.png.webp 1080w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-300x144.png.webp 300w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-1024x493.png.webp 1024w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-768x370.png.webp 768w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-600x289.png.webp 600w" width="1080"><noscript data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">&lt;img class="alignnone size-full wp-image-4293" src="https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable.png" alt="what is MC cable" width="1080" height="520" srcset="https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable.png 1080w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-300x144.png 300w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-1024x493.png 1024w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-768x370.png 768w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-MC-cable-600x289.png 600w" sizes="(max-width: 1080px) 100vw, 1080px" /&gt;</span></noscript></p><span data-dcnode-id="705" instrument_node="">
</span><h2 data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">What Is MC Cable?</span></h2><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="701" instrument_node="">MC is short for “metal-clad,” and this type of cable is sheathed with a metallic coating.&nbsp;</span><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecmag.com/section/systems/review-metal-clad-cable-requirements"><span data-dcnode-id="700" instrument_node="">MC cable is defined</span></a><span data-dcnode-id="698" instrument_node="">&nbsp;as an assembly of one or more insulated circuits, often enclosed with an armor of metal tape or a metallic sheath. The most popular MC cables today feature aluminum interlocked armor.</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="695" instrument_node="">MC cable was originally developed in the early&nbsp;</span><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nachi.org/conductor-types.htm"><span data-dcnode-id="694" instrument_node="">1900s by Edwin Greenfield</span></a><span data-dcnode-id="692" instrument_node="">. Also called metallic sheathed cable, armored cable (AC) or BX cable, MC cable&nbsp;was one of the first cable types developed for both commercial and residential applications. It is still commonly used today in residential, commercial and industrial building construction. Some of the unique features of MC cable include:</span></p><span data-dcnode-id="690" instrument_node="">
</span><ul data-dcnode-id="668"><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="685"><b data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Sheathing:</span></b><span data-dcnode-id="686" instrument_node="">&nbsp;This cable type is defined by the metal sheathing surrounding the insulated wires. Typically consisting of aluminum, this cable sheath covers the wires in an interlocking configuration to allow for flexibility and coverage.</span></li><span data-dcnode-id="684" instrument_node="">
</span><li data-dcnode-id="680"><b data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Wires:&nbsp;</span></b><span data-dcnode-id="681" instrument_node="">MC cables contain three wires minimum — two are conductor wires and one is a ground wire. Of the conductors, one is a hot conductor and the other is a neutral conductor.&nbsp;An MC cable may contain more than one hot conductor.</span></li><span data-dcnode-id="679" instrument_node="">
</span><li data-dcnode-id="675"><b data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Wire coatings:&nbsp;</span></b><span data-dcnode-id="676" instrument_node="">The wires in MC cables are either THNN&nbsp;— which are thermoplastic, high-heat and nylon-jacketed&nbsp;—&nbsp;or THWN-2 wires&nbsp;— which are thermoplastic, high-heat and water-resistant. These coatings insulate wires to make them suitable for various MC cable applications.</span></li><span data-dcnode-id="674" instrument_node="">
</span><li data-dcnode-id="670"><b data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Protection:</span></b><span data-dcnode-id="671" instrument_node="">&nbsp;MC cable is corrosion resistant and able to handle heat and moisture. It is also built with layers of cable protection, meaning the wires are protected from environmental conditions without conduit installation.</span></li><span data-dcnode-id="669" instrument_node="">
</span></ul><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">In addition to traditional MC cable, several varieties of MC cable are available to suit the needs of unique applications. One example is MC-HL cable, which is designed for use in hazardous locations and features vapor-tight sheathing.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="660"><img alt="mc cable benefits" class="alignnone size-full wp-image-4294 entered error" data-dcnode-id="663" data-lazy-sizes="(max-width: 720px) 100vw, 720px" data-lazy-src="https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits.png" data-lazy-srcset="https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits.png 720w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits-189x300.png.webp 189w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits-647x1024.png.webp 647w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits-600x950.png.webp 600w" data-lazy-srcset-webp="https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits.png 720w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits-189x300.png.webp 189w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits-647x1024.png.webp 647w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits-600x950.png.webp 600w" data-ll-status="error" height="1140" sizes="(max-width: 720px) 100vw, 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits.png&amp;raw" srcset="https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits.png 720w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits-189x300.png.webp 189w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits-647x1024.png.webp 647w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits-600x950.png.webp 600w" width="720"><noscript data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">&lt;img class="alignnone size-full wp-image-4294" src="https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits.png" alt="mc cable benefits" width="720" height="1140" srcset="https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits.png 720w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits-189x300.png 189w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits-647x1024.png 647w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/mc-cable-benefits-600x950.png 600w" sizes="(max-width: 720px) 100vw, 720px" /&gt;</span></noscript></p><span data-dcnode-id="659" instrument_node="">
</span><h2 data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">MC Cable Benefits</span></h2><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="655" instrument_node="">MC cable has been a </span><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">popular option for a wide range of commercial, residential and industrial applications</span></strong><span data-dcnode-id="652" instrument_node="">, especially those that are looking for all-in-one, cost-effective options. Some of the&nbsp;</span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jadelearning.com/blog/article-330-metal-clad-cable-type-mc/"><span data-dcnode-id="651" instrument_node="">key benefits of MC cable</span></a><span data-dcnode-id="649" instrument_node="">&nbsp;include the following:</span></p><span data-dcnode-id="647" instrument_node="">
</span><ul data-dcnode-id="630"><span data-dcnode-id="646" instrument_node="">
</span><li data-dcnode-id="642"><b data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Protection:</span></b><span data-dcnode-id="643" instrument_node="">&nbsp;The aluminum sheath of an MC cable provides excellent strength and protection. Unlike non-metallic alternatives, MC cables provide added protection against piercing and shearing forces. While ill-placed nails or screws can still damage the armor, the interior coatings can protect the interior wiring from most environmental conditions.</span></li><span data-dcnode-id="641" instrument_node="">
</span><li data-dcnode-id="637"><b data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Installation time:</span></b><span data-dcnode-id="638" instrument_node="">&nbsp;In applications where conduit is a necessity, MC cable can save valuable labor hours. In most interior and exterior applications, MC cable provides enough protection to eliminate conduit altogether. This advantage saves significant time by eliminating the conduit installation step.</span></li><span data-dcnode-id="636" instrument_node="">
</span><li data-dcnode-id="632"><b data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Approvals:</span></b><span data-dcnode-id="633" instrument_node="">&nbsp;MC cables are approved by the Institute of Electrical and Electronics Engineers (IEEE) and meet a range of specifications. Those specifications include UL 83, UL 1569, UL 1685, military standard A-A59544 and NEC Codes.</span></li><span data-dcnode-id="631" instrument_node="">
</span></ul><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">These benefits have made MC cable a popular choice for a wide range of applications, including indoor, outdoor, underground and embedded installations.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="623"><a class="fl-button" data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wesbellwireandcable.com/product-category/electrical-wire/copper-mc-cable/"><span data-dcnode-id="625" instrument_node="">Buy MC Cable here</span></a></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="618"><img alt="what is romex cable" class="alignnone size-full wp-image-4295 entered lazyloaded" data-dcnode-id="621" data-lazy-sizes="(max-width: 1080px) 100vw, 1080px" data-lazy-src="https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable.png" data-lazy-srcset="https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable.png 1080w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-300x144.png.webp 300w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-1024x493.png.webp 1024w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-768x370.png.webp 768w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-600x289.png.webp 600w" data-lazy-srcset-webp="https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable.png 1080w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-300x144.png.webp 300w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-1024x493.png.webp 1024w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-768x370.png.webp 768w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-600x289.png.webp 600w" data-ll-status="loaded" height="520" sizes="(max-width: 1080px) 100vw, 1080px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable.png&amp;raw" srcset="https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable.png 1080w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-300x144.png.webp 300w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-1024x493.png.webp 1024w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-768x370.png.webp 768w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-600x289.png.webp 600w" width="1080"><noscript data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">&lt;img class="alignnone size-full wp-image-4295" src="https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable.png" alt="what is romex cable" width="1080" height="520" srcset="https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable.png 1080w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-300x144.png 300w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-1024x493.png 1024w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-768x370.png 768w, https://wesbellwireandcable.com/wp-content/uploads/2021/07/what-is-romex-cable-600x289.png 600w" sizes="(max-width: 1080px) 100vw, 1080px" /&gt;</span></noscript></p><span data-dcnode-id="617" instrument_node="">
</span><h2 data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">What Is Romex Cable?</span></h2><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="613" instrument_node="">Romex is the trade name for a type of electrical cable that has non-metallic sheathing. Produced by Southwire, this electrical wire is </span><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">one of the most common types of wire used in indoor residential applications.</span></strong><span data-dcnode-id="610" instrument_node=""> Also called NM cable or NMC,&nbsp;this type of cable is a much more recent development compared to MC cable, used primarily within the last 40 years. This wire is also called SIMpull, which is another trademark of Southwire referring to the jacketing used on Romex wires.</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">The following features define Romex cables:</span></p><span data-dcnode-id="605" instrument_node="">
</span><ul data-dcnode-id="585"><span data-dcnode-id="604" instrument_node="">
</span><li data-dcnode-id="600"><b data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Sheathing:&nbsp;</span></b><span data-dcnode-id="601" instrument_node="">The sheath for Romex cable is commonly made of PVC material, which is flexible but easily penetrated. Each conductor in the cable is insulated individually, and the bundle of wires is also insulated as a whole, ensuring two layers of protection.</span></li><span data-dcnode-id="599" instrument_node="">
</span><li data-dcnode-id="592"><b data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Wires:&nbsp;</span></b><span data-dcnode-id="596" instrument_node="">Like MC cables, NM cables contain at least&nbsp;</span><a data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthybuildingscience.com/2013/01/15/residential-wiring-best/"><span data-dcnode-id="595" instrument_node="">two conductor wires</span></a><span data-dcnode-id="593" instrument_node="">&nbsp;and a ground wire. One conductor is a neutral conductor, while the others are hot conductors.</span></li><span data-dcnode-id="591" instrument_node="">
</span><li data-dcnode-id="587"><b data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Protection:&nbsp;</span></b><span data-dcnode-id="588" instrument_node="">The&nbsp;coating for non-metallic cable is designed to be non-conducting but also provides a low level of protection against environmental factors. Romex is rated for temperatures of up to 90 degrees Celsius in dry locations and can handle up to 600 volts.</span></li><span data-dcnode-id="586" instrument_node="">
</span></ul><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Like MC cable, Romex is available in multiple varieties for unique applications. Various sizes of Romex wire are available depending on how much power needs to be run, with the most popular sizes being&nbsp;14 AWG, 12 AWG and 10 AWG.</span></p><span data-dcnode-id="581" instrument_node="">
</span><h2 data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Benefits of Romex Cable</span></h2><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Romex cable is a common choice in many residential installations, especially for branch wiring. Romex NM-B is the type of wire used for these types of applications. Some of the unique benefits of Romex cable include:</span></p><span data-dcnode-id="575" instrument_node="">
</span><ul data-dcnode-id="563"><span data-dcnode-id="574" instrument_node="">
</span><li data-dcnode-id="570"><b data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Easy handling:&nbsp;</span></b><span data-dcnode-id="571" instrument_node="">Romex cable is typically required to be run in a protective conduit, with some exceptions. Despite this installation limitation, Romex cable itself is easy to work with&nbsp;— the cable can be ripped by hand or with a simple cable ripper. It is also easy to run through conduit due to its smooth exterior.</span></li><span data-dcnode-id="569" instrument_node="">
</span><li data-dcnode-id="565"><b data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Approvals:</span></b><span data-dcnode-id="566" instrument_node="">&nbsp;Romex wires comply with a range of standards, including UL Standard 719, UL Standard 83, ASTM B-3 and B-8, Federal Specification A-A-59544, NFPA 70, REACH and RoHS.</span></li><span data-dcnode-id="564" instrument_node="">
</span></ul><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">These features make Romex a useful wire for interior wiring applications. Common examples include interior wall wiring, especially for lighting and appliances.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="556"><a class="fl-button" data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wesbellwireandcable.com/product-category/electrical-wire/romexa-wire/"><span data-dcnode-id="558" instrument_node="">Buy Romex Wire here</span></a></p><span data-dcnode-id="555" instrument_node="">
</span><h2 data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Differences Between Romex and MC Cable</span></h2><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="551" instrument_node="">The primary difference when comparing Romex wire versus MC cable is the sheathing. MC cable has a metal casing, while Romex has a non-metallic sheath. While this is a core distinction between the two cable types, it leads to a&nbsp;</span><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruce.com/bx-wire-guide-to-armored-electrical-cable-1821519"><span data-dcnode-id="550" instrument_node="">range of differences</span></a><span data-dcnode-id="548" instrument_node="">&nbsp;relating to the handling, installation and safety considerations of each type of cable. These differences include the following:</span></p><span data-dcnode-id="546" instrument_node="">
</span><ul data-dcnode-id="504"><span data-dcnode-id="545" instrument_node="">
</span><li data-dcnode-id="541"><b data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Ripping:</span></b><span data-dcnode-id="542" instrument_node="">&nbsp;Because of the metal sheath, MC cable is difficult to rip back, requiring a specialized tool. Comparatively, Romex cable is easy to rip back using a typical cable ripper.</span></li><span data-dcnode-id="540" instrument_node="">
</span><li data-dcnode-id="536"><b data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Cutting:&nbsp;</span></b><span data-dcnode-id="537" instrument_node="">The metal sheath of an MC cable means it requires some amount of power to cut. Typically, this is accomplished with a hacksaw or specialized armored cable cutting tool. Romex is comparatively easy to cut using lineman’s pliers or the cutters on wire strippers.</span></li><span data-dcnode-id="535" instrument_node="">
</span><li data-dcnode-id="531"><b data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Handling:</span></b><span data-dcnode-id="532" instrument_node="">&nbsp;Romex cable is light and easy to handle — the smooth coating makes it simple to pull through holes and conduit. MC cable, on the other hand, is a bit heavier, and the corrugated surface of the cable can make it difficult to pull through holes.</span></li><span data-dcnode-id="530" instrument_node="">
</span><li data-dcnode-id="526"><b data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Safety:</span></b><span data-dcnode-id="527" instrument_node="">&nbsp;Compared to Romex, MC cable is safer to install due to its metallic sheath. This sheath helps protect against accidental shearing and penetration, reducing the risk for accidental wire exposure. Romex sheathing is easily penetrated or sheared, making it less safe unless run through protective conduit.</span></li><span data-dcnode-id="525" instrument_node="">
</span><li data-dcnode-id="521"><b data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Environmental protection:&nbsp;</span></b><span data-dcnode-id="522" instrument_node="">While Romex cable can provide some protection against heat, prolonged exposure to moisture and environmental conditions can result in degradation over time. MC cable provides greater protection against the elements and has the added benefit of providing more protection against pests — the metallic casing protects against biting&nbsp;damage from rodents.</span></li><span data-dcnode-id="520" instrument_node="">
</span><li data-dcnode-id="516"><b data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Electric shielding:&nbsp;</span></b><span data-dcnode-id="517" instrument_node="">Both MC cable and Romex are effective at protecting against magnetic fields, but MC cable can provide additional protection against electric fields due to its metallic casing. Non-metallic Romex cables cannot provide the same protection.</span></li><span data-dcnode-id="515" instrument_node="">
</span><li data-dcnode-id="511"><b data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Grounding:</span></b><span data-dcnode-id="512" instrument_node="">&nbsp;MC cable is grounded through its metal armor or through an internal ground wire. If grounded through the metal casing, this casing needs to be attached to metal boxes. Romex is grounded through an internal ground wire since the sheathing is non-conductive.</span></li><span data-dcnode-id="510" instrument_node="">
</span><li data-dcnode-id="506"><b data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Cost:</span></b><span data-dcnode-id="507" instrument_node="">&nbsp;Cost is a tricky difference between Romex and MC Cable. When it comes to pure MC cable versus Romex cost, Romex is about 25% cheaper than MC cable due to the fewer source materials and lower shipping costs. In terms of installation, Romex can cost more than MC cable if a protective conduit is required.</span></li><span data-dcnode-id="505" instrument_node="">
</span></ul><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">While both of these cable types are accepted by the NEC, the differences between these cables must be considered to ensure the safety and longevity of an installation.</span></p><span data-dcnode-id="500" instrument_node="">
</span><h2 data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">When to Use MC vs. Romex</span></h2><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="496" instrument_node="">The benefits and differences between Romex and MC cables highlight the differing uses of these cables. But&nbsp;</span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wesbellwireandcable.com/blog/7-electrical-wire-attributes-to-consider-before-buying/"><span data-dcnode-id="495" instrument_node="">how do you choose</span></a><span data-dcnode-id="493" instrument_node="">&nbsp;between one or the other for an application?</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Consider these factors when choosing between MC and Romex:</span></p><span data-dcnode-id="488" instrument_node="">
</span><h3 data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Conduit or No Conduit</span></h3><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Romex can be installed indoors with no conduit in certain applications. However, it is often easier and more cost-effective to use MC cable in most situations where a conduit would be required. MC cable comes with built-in protection, so it can be run indoors without a conduit.</span></p><span data-dcnode-id="482" instrument_node="">
</span><h3 data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Indoors or Outdoors</span></h3><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="478" instrument_node="">Both Romex and MC cable can be run indoors. If you’re looking for an outdoor installation, your options are more limited. Romex provides limited protection against the elements and damage, so&nbsp;</span><a data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wesbellwireandcable.com/blog/why-romexcopy-cant-be-used-outdoors/"><span data-dcnode-id="477" instrument_node="">it should never be used outside</span></a><span data-dcnode-id="475" instrument_node="">. One alternative is an underground feeder (UF-B) cable, which is similar to Romex but offers more protection for outdoor and underground applications so it can be run without a conduit. Otherwise, you can choose MC cable, which provides sufficient protection and function in&nbsp;</span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wesbellwireandcable.com/blog/indoor-vs-outdoor-wire/"><span data-dcnode-id="474" instrument_node="">outdoor and indoor applications</span></a><span data-dcnode-id="472" instrument_node="">.</span></p><span data-dcnode-id="470" instrument_node="">
</span><h3 data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Above Ground or Underground</span></h3><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Romex should never be installed underground — the only NM cable that can be installed in this way is a UF-B cable. MC cable can be installed underground as long as it is run through a conduit to prevent decay. For above-ground applications, MC cable can be installed without a conduit.</span></p><span data-dcnode-id="464" instrument_node="">
</span><h3 data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Enclosed or Open</span></h3><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">For indoor applications, Romex must be installed in&nbsp;an enclosed space. You might install it within a wall, inside a ceiling or under a floor. Depending on the needs of the application, this may be done with or without conduit. However, if the installation is out in the open, the Romex wire must be run through a conduit. MC conduit does not require these considerations and can be installed in enclosed or open spaces.</span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">In addition to these considerations, make sure you comply with the&nbsp;NEC first before you initiate a wiring project. Looking to those codes can help guide your choice in wiring and save you trouble in the long run.</span></p><span data-dcnode-id="455" instrument_node="">
</span><h2 data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Wesbell MC and Romex Options</span></h2><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">If you’re looking for MC Cable or Romex for your next installation, Wesbell has what you need.</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="448" instrument_node="">We carry a wide range of&nbsp;</span><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wesbellwireandcable.com/product-category/electrical-wire/romexa-wire/"><span data-dcnode-id="447" instrument_node="">Romex wire</span></a><span data-dcnode-id="445" instrument_node="">, all sourced from the most reliable manufacturers in the industry. We buy from manufacturers like Southwire, meaning we sell quality products directly from the source. We are also able to provide these products at the lowest price. Our offerings include popular sizes like 14 AWG, 12 AWG and 10 AWG, but we carry everything up to 2 AWG. All of our wires are color-coded according to size, but you can also request specific colors for orders of 50,000 feet or more.</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="442" instrument_node="">As for our copper&nbsp;</span><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wesbellwireandcable.com/product-category/electrical-wire/copper-mc-cable/"><span data-dcnode-id="441" instrument_node="">MC cable offerings</span></a><span data-dcnode-id="439" instrument_node="">, Wesbell Electronics offers a range of sizes and configurations to meet the needs of practically any application. We stock copper MC Cable AWG sizes 14 through 2. Each size comes with two to four conductors and an additional ground wire. We also carry cables made of solid, stranded and bare copper to meet unique application needs.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">With any of our cable offerings, you can purchase by the foot to get any length of cable you need for your project.</span></p><span data-dcnode-id="434" instrument_node="">

</span><h2 data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Work With Wesbell</span></h2><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">For over 30 years, Wesbell has been dedicated to providing quality bulk wire, cable and tubing products. We offer high-quality Romex wire and copper MC cables in a range of sizes and configurations to meet your unique needs.&nbsp;We can also save you time with assembly and processing services, including cutting, stripping and twisting. With ISO 9001/2015 certification and a team of expert technicians, you can trust Wesbell to provide the quality products and services you need to save time and money on your next project.</span></p><span data-dcnode-id="422" instrument_node="">
