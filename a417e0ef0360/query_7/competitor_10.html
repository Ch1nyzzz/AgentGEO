</span></a></div></figure></div><p data-dcnode-id="4300"><span data-dcnode-id="4346" instrument_node="">The isosteric heats of adsorption were calculated from the Clausius-Claperyon equation. These values were compared with the enthalpic parameter of the Langmuir model (Fig.&nbsp;</span><a data-dcnode-id="4344" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4345" instrument_node="">3</span></a><span data-dcnode-id="4343" instrument_node="">). With the increase of loading, the computed isosteric heats of adsorption seem to converge to the values obtained by regressing the experimental data to the Langmuir model (Table </span><a data-dcnode-id="4341" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="4342" instrument_node="">1</span></a><span data-dcnode-id="4340" instrument_node="">). The constant values obtained for N</span><sub data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">2</span></sub><span data-dcnode-id="4337" instrument_node=""> and O</span><sub data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">2</span></sub><span data-dcnode-id="4334" instrument_node=""> indicate that the energetic homogeneity assumed by the Langmuir model is valid for these two compounds. While the slight decrease of the isosteric heat of adsorption with loading, observed for CO</span><sub data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">2</span></sub><span data-dcnode-id="4331" instrument_node="">, indicates at least two different sites or the presence of repulsive forces between neighboring adsorbed CO</span><sub data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">2</span></sub><span data-dcnode-id="4328" instrument_node=""> molecules. Nevertheless, the Langmuir model describes the adsorption equilibrium for this adsorbate at the studied conditions (see Fig.&nbsp;</span><a data-dcnode-id="4326" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4327" instrument_node="">2</span></a><span data-dcnode-id="4325" instrument_node="">a). Additionally, CO</span><sub data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">2</span></sub><span data-dcnode-id="4322" instrument_node=""> and N</span><sub data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">2</span></sub><span data-dcnode-id="4319" instrument_node=""> isosteric heats of adsorption in this work are slightly lower than those reported in Borges et al. study (33.0 and 16.7&nbsp;kJ·mol</span><sup data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">−1</span></sup><span data-dcnode-id="4316" instrument_node="">, respectively), but closer to CO</span><sub data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">2</span></sub><span data-dcnode-id="4313" instrument_node=""> isosteric heat of adsorption presented in Brandt et al. study (29.8&nbsp;kJ·mol</span><sup data-dcnode-id="4311"><span data-dcnode-id="4312" instrument_node="">−1</span></sup><span data-dcnode-id="4310" instrument_node=""> at 4&nbsp;mol·kg</span><sup data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">−1</span></sup><span data-dcnode-id="4307" instrument_node="">) [</span><a aria-label="Reference 1" data-dcnode-id="4305" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d136475424e2581" title="Borges, D.D., Normand, P., Permiakova, A., Babarao, R., Heymans, N., Galvao, D.S., Serre, C., De Weireld, G., Maurin, G.: Gas adsorption and separation by the Al-based metal–organic framework MIL-160. J. Phys. Chem. C 121(48), 26822–26832 (2017).

                "><span data-dcnode-id="4306" instrument_node="">1</span></a><span data-dcnode-id="4304" instrument_node="">, </span><a aria-label="Reference 3" data-dcnode-id="4302" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d136475424e2584" title="Brandt, P., Nuhnen, A., Lange, M., Möllmer, J., Weingart, O., Janiak, C.: Metal–organic frameworks with potential application for SO2 separation and flue gas desulfurization. ACS Appl. Mater. Interfaces 11(19), 17350–17358 (2019).

citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d136475424e2636" title="Cadiau, A., Lee, J.S., Damasceno Borges, D., Fabry, P., Devic, T., Wharmby, M.T., Martineau, C., Foucher, D., Taulelle, F., Jun, C.H., Hwang, Y.K., Stock, N., De Lange, M.F., Kapteijn, F., Gascon, J., Maurin, G., Chang, J.S., Serre, C.: Design of hydrophilic metal organic framework water adsorbents for heat reallocation. Adv. Mater. (Deerfield Beach, Fla) 27(32), 4775–4780 (2015).

                "><span data-dcnode-id="4236" instrument_node="">33</span></a><span data-dcnode-id="4234" instrument_node="">, </span><a aria-label="Reference 41" data-dcnode-id="4232" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d136475424e2648" title="Ruthven, D.M.: Principles of adsorption and adsorption processes. Wiley, New York (1984)"><span data-dcnode-id="4233" instrument_node="">41</span></a><span data-dcnode-id="4231" instrument_node="">]. As stated in the Cadiau et al. study, the hydrophilic nature of MIL-160(Al) is due to the interaction of water molecules and the hydroxyl groups which are present in the pore [</span><a aria-label="Reference 4" data-dcnode-id="4229" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d136475424e2651" title="Cadiau, A., Lee, J.S., Damasceno Borges, D., Fabry, P., Devic, T., Wharmby, M.T., Martineau, C., Foucher, D., Taulelle, F., Jun, C.H., Hwang, Y.K., Stock, N., De Lange, M.F., Kapteijn, F., Gascon, J., Maurin, G., Chang, J.S., Serre, C.: Design of hydrophilic metal organic framework water adsorbents for heat reallocation. Adv. Mater. (Deerfield Beach, Fla) 27(32), 4775–4780 (2015).

                "><span data-dcnode-id="4230" instrument_node="">4</span></a><span data-dcnode-id="4228" instrument_node="">]. The isotherms shape is in agreement with the ones already reported in the open literature [</span><a aria-label="Reference 4" data-dcnode-id="4226" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d136475424e2655" title="Cadiau, A., Lee, J.S., Damasceno Borges, D., Fabry, P., Devic, T., Wharmby, M.T., Martineau, C., Foucher, D., Taulelle, F., Jun, C.H., Hwang, Y.K., Stock, N., De Lange, M.F., Kapteijn, F., Gascon, J., Maurin, G., Chang, J.S., Serre, C.: Design of hydrophilic metal organic framework water adsorbents for heat reallocation. Adv. Mater. (Deerfield Beach, Fla) 27(32), 4775–4780 (2015).

                  https://doi.org/10.1002/adma.201502418
                  
                "><span data-dcnode-id="4197" instrument_node="">4</span></a><span data-dcnode-id="4195" instrument_node="">].</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4164" data-test="figure" data-title="Fig. 4" id="figure-4"><figure data-dcnode-id="4165"><figcaption data-dcnode-id="4191"><b class="c-article-section__figure-caption" data-dcnode-id="4192" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="4193" instrument_node="">Fig. 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4176"><div class="c-article-section__figure-item" data-dcnode-id="4186"><a class="c-article-section__figure-link" data-dcnode-id="4187" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/4" rel="nofollow"><picture data-dcnode-id="4188"><source data-dcnode-id="4190" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10450-020-00286-5/MediaObjects/10450_2020_286_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="4189" height="1040" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10450-020-00286-5/MediaObjects/10450_2020_286_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4177" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="4178"><span data-dcnode-id="4185" instrument_node="">Water vapor adsorption–desorption equilibrium isotherm on MIL-160(Al) at 303, 323, and 343&nbsp;K as a function of </span><b data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">a</span></b><span data-dcn </span></a></div></figure></div><p data-dcnode-id="4132"><span data-dcnode-id="4145" instrument_node="">The Polanyi’s characteristic curve for MIL-160(Al) is presented in Fig. S10; however, a small deviation is visible at the temperature of 303&nbsp;K. This deviation increases mainly for loadings above 14&nbsp;mol·kg</span><sup data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">−1</span></sup><span data-dcnode-id="4142" instrument_node="">. The characteristic curve is independent of temperature allowing the prediction of H</span><sub data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">2</span></sub><span data-dcnode-id="4139" instrument_node="">O vapor adsorption equilibrium isotherms at different temperatures if necessary [</span><a aria-label="Reference 7" data-dcnode-id="4137" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d136475424e2907" title="Dabrowski, A.: Adsorption and its Applications in Industry and Environmental Protection–Studies in Surface Science and Catalysis, v.120: Suppl. Part A (1998)"><span data-dcnode-id="4138" instrument_node="">7</span></a><span data-dcnode-id="4136" instrument_node="">, </span><a aria-label="Reference 41" data-dcnode-id="4134" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d136475424e2910" title="Ruthven, D.M.: Principles of adsorption and adsorption processes. Wiley, New York (1984)"><span data-dcnode-id="4135" instrument_node="">41</span></a><span data-dcnode-id="4133" instrument_node="">].</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4130" id="Sec15"><span data-dcnode-id="4131" instrument_node="">Dynamic adsorption experiments</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="4125" id="Sec16"><span data-dcnode-id="4129" instrument_node="">H</span><sub data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">2</span></sub><span data-dcnode-id="4126" instrument_node="">O breakthrough experiment (with the inert background)</span></h4><p data-dcnode-id="4087"><span data-dcnode-id="4124" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="4122" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="4123" instrument_node="">5</span></a><span data-dcnode-id="4121" instrument_node=""> presents the breakthrough curve of H</span><sub data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">2</span></sub><span data-dcnode-id="4118" instrument_node="">O vapor, while Table S6 shows the input model parameters used in the simulation and bed properties. Firstly, a dispersive front (P/P</span><sub data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">o</span></sub><span data-dcnode-id="4115" instrument_node=""> </span><span class="mathjax-tex" data-dcnode-id="4110"><span class="MathJax_Preview" data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">\le</span></span></span><span data-dcnode-id="4109" instrument_node=""> 0.05) followed by a compressive front (0.05 &lt; P/P</span><sub data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">o</span></sub><span data-dcnode-id="4106" instrument_node=""> &lt; 0.5) is visible during the adsorption step. Similar behavior was observed during desorption step (P/P</span><sub data-dcnode-id="4104"><span data-dcnode-id="4105" instrument_node="">o</span></sub><span data-dcnode-id="4103" instrument_node=""> = 0.5 to 0.14–dispersive; P/P</span><sub data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">o</span></sub><span data-dcnode-id="4100" instrument_node=""> = 0.14 to 0–compressive). The observed behavior is in agreement with the H</span><sub data-dcnode-id="4098"><span data-dcnode-id="4099" instrument_node="">2</span></sub><span data-dcnode-id="4097" instrument_node="">O vapor adsorption equilibrium isotherm presented in Fig.&nbsp;</span><a data-dcnode-id="4095" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4096" instrument_node="">4</span></a><span data-dcnode-id="4094" instrument_node="">. The developed mathematical model can predict the H</span><sub data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">2</span></sub><span data-dcnode-id="4091" instrument_node="">O vapor breakthrough dynamic behavior on MIL-160(Al) (Fig.&nbsp;</span><a data-dcnode-id="4089" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="4090" instrument_node="">5</span></a><span data-dcnode-id="4088" instrument_node="">—full line).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4063" data-test="figure" data-title="Fig. 5" id="figure-5"><figure data-dcnode-id="4064"><figcaption data-dcnode-id="4084"><b class="c-article-section__figure-caption" data-dcnode-id="4085" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="4086" instrument_node="">Fig. 5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4075"><div class="c-article-section__figure-item" data-dcnode-id="4079"><a class="c-article-section__figure-link" data-dcnode-id="4080" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/5" rel="nofollow"><picture data-dcnode-id="4081"><source data-dcnode-id="4083" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10450-020-00286-5/MediaObjects/10450_2020_286_Fig5_HTML.png?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="4 ><span data-dcnode-id="4030" instrument_node=""> (Fig.&nbsp;</span><a data-dcnode-id="4028" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="4029" instrument_node="">7</span></a><span data-dcnode-id="4027" instrument_node="">) and CO</span><sub data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">2</span></sub><span data-dcnode-id="4024" instrument_node="">, were carried out to evaluate the influence of their presence on water adsorption on MIL-160(Al), mainly CO</span><sub data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">2</span></sub><span data-dcnode-id="4021" instrument_node="">.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3993" data-test="figure" data-title="Fig. 6" id="figure-6"><figure data-dcnode-id="3994"><figcaption data-dcnode-id="4017"><b class="c-article-section__figure-caption" data-dcnode-id="4018" data-test="figure-caption-text" id="Fig6"><span data-dcnode-id="4019" instrument_node="">Fig. 6</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4005"><div class="c-article-section__figure-item" data-dcnode-id="4012"><a class="c-article-section__figure-link" data-dcnode-id="4013" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/6" rel="nofollow"><picture data-dcnode-id="4014"><source data-dcnode-id="4016" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10450-020-00286-5/MediaObjects/10450_2020_286_Fig6_HTML.png?as=webp" type="image/webp"><img alt="figure 6" aria-describedby="Fig6" data-dcnode-id="4015" height="468" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10450-020-00286-5/MediaObjects/10450_2020_286_Fig6_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4006" data-test="bottom-caption" id="figure-6-desc"><p data-dcnode-id="4007"><span data-dcnode-id="4011" instrument_node="">Breakthrough curve of a binary mixture of dry He with saturated CO</span><sub data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">2</span></sub><span data-dcnode-id="4008" instrument_node=""> (50% RH), on MIL-160(Al) at 298&nbsp;K, in terms of relative humidity (Points represent experimental data, full line correspond to simulation results, dashed line represents the beginning of the regeneration step)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3995"><a aria-label="Full size image figure 6" class="c-article__pill-button" data-dcnode-id="3996" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure6 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/6" rel="nofollow"><span data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3997" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3998" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3999" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4002" instrument_node="">

sents the beginning of the regeneration step)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3968"><a aria-label="Full size image figure 7" class="c-article__pill-button" data-dcnode-id="3969" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure7 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/7" rel="nofollow"><span data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3970" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3971" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3972" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3975" instrument_node="">

</span></a></div></figure></div><p data-dcnode-id="3952"><span data-dcnode-id="3965" instrument_node="">As in the previous case, a dispersive front is present, due to the unfavorable shape of the isotherm for low relative pressures (P/Po &lt; 0.05), followed by a compressive front up to P/Po ~ 0.45. During the desorption step, a dispersive front from P/Po = 0.45 to 0.07 is observed and then is followed by a compressive front, similar to the breakthrough experiment without CO</span><sub data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">2</span></sub><span data-dcnode-id="3962" instrument_node=""> present (Fig.&nbsp;</span><a data-dcnode-id="3960" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3961" instrument_node="">5</span></a><span data-dcnode-id="3959" instrument_node="">). The fixed bed model, considering only water adsorption, i.e., without considering any competition between both components, slightly under predicts water adsorption in the presence of CO</span><sub data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">2</span></sub><span data-dcnode-id="3956" instrument_node="">. The strong water adsorption can explain this phenomenon on MIL-160(Al), which might be synergetically enhanced further by the co-adsorption of CO</span><sub data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">2</span></sub><span data-dcnode-id="3953" instrument_node="">.</span></p><p data-dcnode-id="3941"><span data-dcnode-id="3951" instrument_node="">However, the CO</span><sub data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">2</span></sub><span data-dcnode-id="3948" instrument_node=""> level in the atmosphere is about 400–500&nbsp;ppm, far lower than the 50% used in this experiment. Indeed, the primary air component is N</span><sub data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">2</span></sub><span data-dcnode-id="3945" instrument_node="">. As is observed in Fig.&nbsp;</span><a data-dcnode-id="3943" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="3944" instrument_node="">7</span></a><span data-dcnode-id="3942" instrument_node="">, the model can predict well the water adsorption dynamic behavior in the presence of this air component, also without taking into consideration any competition.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3939" id="Sec18"><span data-dcnode-id="3940" instrument_node="">Infrared experiments</span></h3><p data-dcnode-id="3898"><span data-dcnode-id="3938" instrument_node="">The FTIR-ATR spectrum of the fully activated MIL-160(Al) is presented in Fig.&nbsp;</span><a data-dcnode-id="3936" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig8"><span data-dcnode-id="3937" instrument_node="">8</span></a><span data-dcnode-id="3935" instrument_node="">. A broadband can be observed in the range 3000–3700&nbsp;cm</span><sup data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">−1</span></sup><span data-dcnode-id="3932" instrument_node=""> which is attributed to the stretching vibration of hydroxyl groups of the aluminum oxide-hydroxide chains [</span><a aria-label="Reference 48" data-dcnode-id="3930" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d136475424e3103" title="Wahiduzzaman, M., Lenzen, D., Maurin, G., Stock, N., Wharmby, M.T.: Rietveld refinement of MIL-160 and its structural flexibility upon H2O and N2 adsorption. Eur. J. Inorg. Chem. 2018(32), 3626–3632 (2018). 
                  https://doi.org/10.1002/ejic.201800323
                  
                "><span data-dcnode-id="3931" instrument_node="">48</span></a><span data-dcnode-id="3929" instrument_node="">]. The weak band peaking at 3620&nbsp;cm</span><sup data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">−1</span></sup><span data-dcnode-id="3926" instrument_node=""> corresponds to the stretching vibration of isolated hydroxyl groups The bands in the range 2700–3150&nbsp;cm</span><sup data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">−1</span></sup><span data-dcnode-id="3923" instrument_node=""> can be assigned to =C–H stretching vibrations of the furan ring [</span><a aria-label="Reference 16" data-dcnode-id="3921" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d136475424e3111" title="Jiang, Y., Woortman, A.J.J., Alberda van Ekenstein, G.O.R., Loos, K.: A biocatalytic approach towards sustainable furanic–aliphatic polyesters. Polym. Chem. 6(29), 5198–5211 (2015). 
                  https://doi.org/10.1039/C5PY00629E
                  
                "><span data-dcnode-id="3922" instrument_node="">16</span></a><span data-dcnode-id="3920" instrument_node="">]. The stretching vibration of the C=C bond in the furan ring and the wagging vibration of the –CH– group may be observed at 1585, and 1417&nbsp;cm</span><sup data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">−1</span></sup><span data-dcnode-id="3917" instrument_node="">, respectively. The bands corresponding to the asymmetric and symmetric stretching vibrations of the ester C–O–C groups and to the = C–O–C= vibration of the furan rings are visible in the range between 1000 and 1300&nbsp;cm</span><sup data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">−1</span></sup><span data-dcnode-id="3914" instrument_node="">. Finally, the band at 782&nbsp;cm</span><sup data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">−1</span></sup><span data-dcnode-id="3911" instrument_node=""> can be ascribed to the C–H out-of-plane bending vibrations of the furan ring [</span><a aria-label="Reference 48" data-dcnode-id="3909" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d136475424e3120" title="Wahiduzzaman, M., Lenzen, D., Maurin, G., Stock, N., Wharmby, M.T.: Rietveld refinement of MIL-160 and its structural flexibility upon H2O and N2 adsorption. Eur. J. Inorg. Chem. 2018(32), 3626–3632 (2018). 
                  https://doi.org/10.1002/ejic.201800323
                  
                "><span data-dcnode-id="3910" instrument_node="">48</span></a><span data-dcnode-id="3908" instrument_node="">], while the band peaking at 646&nbsp;cm</span><sup data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">−1</span></sup><span data-dcnode-id="3905" instrument_node=""> is attributed to the stretching vibrations of the Al–O bond in the octahedral structure of AlO</span><sub data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">6</span></sub><span data-dcnode-id="3902" instrument_node=""> [</span><a aria-label="Reference 45" data-dcnode-id="3900" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d136475424e3128" title="Tarte, P.: Infra-red spectra of inorganic aluminates and characteristic vibrational frequencies of AlO4 tetrahedra and AlO6 octahedra. Spectrochim. Acta Part A 23(7), 2127–2143 (1967).

                "><span data-dcnode-id="3901" instrument_node="">45</span></a><span data-dcnode-id="3899" instrument_node="">].</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3871" data-test="figure" data-title="Fig. 8" id="figure-8"><figure data-dcnode-id="3872"><figcaption data-dcnode-id="3895"><b class="c-article-section__figure-caption" data-dcnode-id="3896" data-test="figure-caption-text" id="Fig8"><span data-dcnode-id="3897" instrument_node="">Fig. 8</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3883"><div class="c-article-section__figure-item" data-dcnode-id="3890"><a class="c-article-section__figure-link" data-dcnode-id="3891" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/8" rel="nofollow"><picture data-dcnode-id="3892"><source data-dcnode-id="3894" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10450-020-00286-5/MediaObjects/10450_2020_286_Fig8_HTML.png?as=webp" type="image/webp"><img alt="figure 8" aria-describedby="Fig8" data-dcnode-id="3893" height="586" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10450-020-00286-5/MediaObjects/10450_2020_286_Fig8_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3884" data-test="bottom-caption" id="figure-8-desc"><p data-dcnode-id="3885"><span data-dcnode-id="3889" instrument_node="">DRIFT-ATR spectrum of MIL-160(Al). Inset: Spectrum magnification of the 4000–2500&nbsp;cm</span><sup data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">−1</span></sup><span data-dcnode-id="3886" instrument_node=""> zone</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3873"><a aria-label="Full size image figure 8" class="c-article__pill-button" data-dcnode-id="3874" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure8 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/8" rel="nofollow"><span data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3875" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3876" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3877" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3880" instrument_node="">

</span></a></div></figure></div><p data-dcnode-id="3860"><span data-dcnode-id="3870" instrument_node="">The impact of temperature on MIL-160(Al) was evaluated by DRIFT spectra analyses (Fig.&nbsp;</span><a data-dcnode-id="3868" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig9"><span data-dcnode-id="3869" instrument_node="">9</span></a><span data-dcnode-id="3867" instrument_node="">). On non-activated MIL-160(Al), a DRIFT spectrum for each temperature was collected. While the temperature increased, the IR absorption intensity, between 3800 and 2300&nbsp;cm</span><sup data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">−1</span></sup><span data-dcnode-id="3864" instrument_node="">, decreased due to moisture, and other air components desorption (Fig.&nbsp;</span><a data-dcnode-id="3862" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig9"><span data-dcnode-id="3863" instrument_node="">9</span></a><span data-dcnode-id="3861" instrument_node="">b) proves the thermal stability of MIL-160(Al). These results corroborate the behavior already observed in the TGA analysis (Fig. S6), which indicate that the material is stable up to 600–650&nbsp;K, and that water desorption takes place at about 373–423&nbsp;K.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3821" data-test="figure" data-title="Fig. 9" id="figure-9"><figure data-dcnode-id="3822"><figcaption data-dcnode-id="3857"><b class="c-article-section__figure-caption" data-dcnode-id="3858" data-test="figure-caption-text" id="Fig9"><span data-dcnode-id="3859" instrument_node="">Fig. 9</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3833"><div class="c-article-section__figure-item" data-dcnode-id="3852"><a class="c-article-section__figure-link" data-dcnode-id="3853" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/9" rel="nofollow"><picture data-dcnode-id="3854"><source data-dcnode-id="3856" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10450-020-00286-5/MediaObjects/10450_2020_286_Fig9_HTML.png?as=webp" type="image/webp"><img alt="figure 9" aria-describedby="Fig9" data-dcnode-id="3855" height="291" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10450-020-00286-5/MediaObjects/10450_2020_286_Fig9_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3834" data-test="bottom-caption" id="figure-9-desc"><p data-dcnode-id="3835"><span data-dcnode-id="3851" instrument_node="">DRIFT spectrum of MIL-160(Al) during the regeneration step in the region of </span><b data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">a</span></b><span data-dcnode-id="3848" instrument_node=""> 3800–2300&nbsp;cm</span><sup data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">−1</span></sup><span data-dcnode-id="3845" instrument_node=""> and </span><b data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">b</span></b><span data-dcnode-id="3842" instrument_node=""> 2300–600&nbsp;cm</span><sup data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">−1</span></sup><span data-dcnode-id="3839" instrument_node=""> spectrum of MIL-160(Al). Inset: Spectrum magnification of the 4000–2500&nbsp;cm</span><sup data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">−1</span></sup><span data-dcnode-id="3836" instrument_node=""> zone</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3823"><a aria-label="Full size image figure 9" class= </span></a></div></figure></div><p data-dcnode-id="3804"><span data-dcnode-id="3820" instrument_node="">After MIL-160(Al) activation, the material was exposed to water vapor, and spectra were collected periodically until reaching the material saturation (Fig.&nbsp;</span><a data-dcnode-id="3818" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="3819" instrument_node="">10</span></a><span data-dcnode-id="3817" instrument_node="">). Along with the water adsorption, a broad band started to appear in the region of 3680–2850&nbsp;cm</span><sup data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">−1</span></sup><span data-dcnode-id="3814" instrument_node=""> (Fig.&nbsp;</span><a data-dcnode-id="3812" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="3813" instrument_node="">10</span></a><span data-dcnode-id="3811" instrument_node="">a). Between 1880 and 600&nbsp;cm</span><sup data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">−1</span></sup><span data-dcnode-id="3808" instrument_node="">, no noteworthy changes were observed, concluding that the presence of water does not affect the material structure, which remains stable (Fig.&nbsp;</span><a data-dcnode-id="3806" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="3807" instrument_node="">10</span></a><span data-dcnode-id="3805" instrument_node="">b).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3769" data-test="figure" data-title="Fig. 10" id="figure-10"><figure data-dcnode-id="3770"><figcaption data-dcnode-id="3801"><b class="c-article-section__figure-caption" data-dcnode-id="3802" data-test="figure-caption-text" id="Fig10"><span data-dcnode-id="3803" instrument_node="">Fig. 10</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3781"><div class="c-article-section__figure-item" data-dcnode-id="3796"><a class="c-article-section__figure-link" data-dcnode-id="3797" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/10" rel="nofollow"><picture data-dcnode-id="3798"><source data-dcnode-id="3800" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10450-020-00286-5/MediaObjects/10450_2020_286_Fig10_HTML.png?as=webp" type="image/webp"><img alt="figure 10" aria-describedby="Fig10" data-dcnode-id="3799" height="256" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10450-020-00286-5/MediaObjects/10450_2020_286_Fig10_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3782" data-test="bottom-caption" id="figure-10-desc"><p data-dcnode-id="3783"><span data-dcnode-id="3795" instrument_node="">DRIFT spectrum of MIL-160(Al) during water adsorption in the region of </span><b data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">a</span></b><span data-dcnode-id="3792" instrument_node=""> 3800–2300&nbsp;cm</span><sup data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">−1</span></sup><span data-dcnode-id="3789" instrument_node=""> and </span><b data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">b</span></b><span data-dcnode-id="3786" instrument_node=""> 2300–600&nbsp;cm</span><sup data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">−1</span></sup></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3771"><a aria-label="Full size image figure 10" class="c-article__pill-button" data-dcnode-id="3772" d </span></a></div></figure></div><p data-dcnode-id="3755"><span data-dcnode-id="3768" instrument_node="">The quantification of the water amount adsorbed in the MIL-160(Al) over time was determined (Fig.&nbsp;</span><a data-dcnode-id="3766" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig11"><span data-dcnode-id="3767" instrument_node="">11</span></a><span data-dcnode-id="3765" instrument_node="">) by the integration of the DRIFT spectra in the 3850–2400&nbsp;cm</span><sup data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">−1</span></sup><span data-dcnode-id="3762" instrument_node=""> region (Fig.&nbsp;</span><a data-dcnode-id="3760" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="3761" instrument_node="">10</span></a><span data-dcnode-id="3759" instrument_node="">a) after subtraction of the area of the DRIFT spectrum of the regenerated MIL-160(Al) (Fig.&nbsp;</span><a data-dcnode-id="3757" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig8"><span data-dcnode-id="3758" instrument_node="">8</span></a><span data-dcnode-id="3756" instrument_node="">) in the same spectral region. The amount adsorbed increased linearly until 20&nbsp;min of water exposure. A slower increase was observed along with the progress of water adsorption; a plateau is reached at c.a. 50&nbsp;min of adsorption.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3725" data-test="figure" data-title="Fig. 11" id="figure-11"><figure data-dcnode-id="3726"><figcaption data-dcnode-id="3752"><b class="c-article-section__figure-caption" data-dcnode-id="3753" data-test="figure-caption-text" id="Fig11"><span data-dcnode-id="3754" instrument_node="">Fig. 11</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3737"><div class="c-article-section__figure-item" data-dcnode-id="3747"><a class="c-article-section__figure-link" data-dcnode-id="3748" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/11" rel="nofollow"><picture data-dcnode-id="3749"><source data-dcnode-id="3751" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10450-020-00286-5/MediaObjects/10450_2020_286_Fig11_HTML.png?as=webp" type="image/webp"><img alt="figure 11" aria-describedby="Fig11" data-dcnode-id="3750" height="556" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10450-020-00286-5/MediaObjects/10450_2020_286_Fig11_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3738" data-test="bottom-caption" id="figure-11-desc"><p data-dcnode-id="3739"><span data-dcnode-id="3746" instrument_node="">Variation of the area of the MIL-160(Al) DRIFT spectra with time during adsorption of H</span><sub data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">2</span></sub><span data-dcnode-id="3743" instrument_node="">O (integration over 3850–2400&nbsp;cm</span><sup data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">−1</span></sup><span data-dcnode-id="3740" instrument_node="">)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3727"><a aria-label="Full size image figure 11" class="c-article__pill-button" data-dcnode-id="3728" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure11 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/11" rel="nofollow"><span data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3729" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3730" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3731" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3734" instrument_node="">

</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="3723" id="Sec19"><span data-dcnode-id="3724" instrument_node="">TSA process</span></h3><p data-dcnode-id="3718"><span data-dcnode-id="3722" instrument_node="">A process to produce water harvesting from thin air by adsorption and its posterior condensation from the regeneration outlet stream was designed (Table S7). The cyclic adsorption process is composed of two co-current steps, feed, and purge. In the process design, a column with a volume of 1 m</span><sup data-dcnode-id="3720"><span data-dcnode-id="3721" instrument_node="">3</span></sup><span data-dcnode-id="3719" instrument_node=""> (length = 1.25&nbsp;m, diameter = 1&nbsp;m) packed with 480&nbsp;kg of MIL-160(Al) granules operating under adiabatic conditions was considered. Operating and feed conditions are shown in the Supporting Information (Table S8).</span></p><p data-dcnode-id="3683"><span data-dcnode-id="3717" instrument_node="">The operating conditions of the proposed TSA cycles were optimized. Pressure and condensation temperature were considered to be 1.01&nbsp;bar and 283&nbsp;K, respectively. Cycle times (t</span><sub data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">feed</span></sub><span data-dcnode-id="3714" instrument_node=""> and t</span><sub data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">purge</span></sub><span data-dcnode-id="3711" instrument_node="">) were optimized to minimize the objective function (Eq.&nbsp;</span><a data-dcnode-id="3709" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ2"><span data-dcnode-id="3710" instrument_node="">2</span></a><span data-dcnode-id="3708" instrument_node="">). Considering a purge temperature of 353&nbsp;K, and equal feed and purge flow rates, four optimization runs were performed, one for each volumetric gas flow rate (0.10, 0.30, 0.40, and 0.50 m</span><sup data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">3</span></sup><span data-dcnode-id="3705" instrument_node="">·s</span><sup data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">−1</span></sup><span data-dcnode-id="3702" instrument_node="">) (Fig.&nbsp;</span><a data-dcnode-id="3700" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig12"><span data-dcnode-id="3701" instrument_node="">12</span></a><span data-dcnode-id="3699" instrument_node=""> and Table </span><a data-dcnode-id="3697" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="3698" instrument_node="">3</span></a><span data-dcnode-id="3696" instrument_node="">). The same procedure was repeated by fixing the volumetric gas flow rate at 0.30 m</span><sup data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">3</span></sup><span data-dcnode-id="3693" instrument_node="">·s</span><sup data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">−1</span></sup><span data-dcnode-id="3690" instrument_node="">, and considering different purge/regeneration temperatures (333, 353, 363, and 373&nbsp;K) (Fig.&nbsp;</span><a data-dcnode-id="3688" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig13"><span data-dcnode-id="3689" instrument_node="">13</span></a><span data-dcnode-id="3687" instrument_node=""> and Table </span><a data-dcnode-id="3685" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="3686" instrument_node="">4</span></a><span data-dcnode-id="3684" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3659" data-test="figure" data-title="Fig. 12" id="figure-12"><figure data-dcnode-id="3660"><figcaption data-dcnode-id="3680"><b class="c-article-section__figure-caption" data-dcnode-id="3681" data-test="figure-caption-text" id="Fig12"><span data-dcnode-id="3682" instrument_node="">Fig. 12</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3671"><div class="c-article-section__figure-item" data-dcnode-id="3675"><a class="c-article-section__figure-link" data-dcnode-id="3676" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/12" rel="nofollow"><picture data-dcnode-id="3677"><source data-dcnode-id="3679" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10450-020-00286-5/MediaObjects/10450_2020_286_Fig12_HTML.png?as=webp" type="image/webp"><img alt="figure 12" aria-describedby="Fig12" data-dcnode-id="3678" height="440" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10450-020-00286-5/MediaObjects/10450_2020_286_Fig12_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3672" data-test="bottom-caption" id="figure-12-desc"><p data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">Maximum water production by optimal unit performance parameters in terms of flow rate</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3661"><a aria-label="Full size image figure 12" class="c-article__pill-button" data-dcnode-id="3662" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure12 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/12" rel="nofollow"><span data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">Full size image</span></s </span></a></div></figure></div><p data-dcnode-id="3591"><span data-dcnode-id="3604" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="3602" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig12"><span data-dcnode-id="3603" instrument_node="">12</span></a><span data-dcnode-id="3601" instrument_node=""> shows the maximum productivity obtained by applying each flow rate. At the same time, Table </span><a data-dcnode-id="3599" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="3600" instrument_node="">3</span></a><span data-dcnode-id="3598" instrument_node=""> presents the optimal point found for the cycle steps duration (t</span><sub data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">feed</span></sub><span data-dcnode-id="3595" instrument_node=""> and t</span><sub data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">purge</span></sub><span data-dcnode-id="3592" instrument_node="">) and the corresponding maximum productivity and standard deviation (std). One should note that each optimization run consists of three individual optimization trials, and the reported result for each run is the average of the three trials.</span></p><p data-dcnode-id="3571"><span data-dcnode-id="3590" instrument_node="">The maximum productivities vary between 22.3&nbsp;l·day</span><sup data-dcnode-id="3588"><span data-dcnode-id="3589" instrument_node="">−1</span></sup><span data-dcnode-id="3587" instrument_node=""> (46.5&nbsp;l·day</span><sup data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">−1</span></sup><span data-dcnode-id="3584" instrument_node="">·ton</span><sup data-dcnode-id="3582"><span data-dcnode-id="3583" instrument_node="">−1</span></sup><span data-dcnode-id="3581" instrument_node="">) and 147&nbsp;l·day</span><sup data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">−1</span></sup><span data-dcnode-id="3578" instrument_node=""> (305&nbsp;l·day</span><sup data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">−1</span></sup><span data-dcnode-id="3575" instrument_node="">·ton</span><sup data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">−1</span></sup><span data-dcnode-id="3572" instrument_node="">). As expected, the total cycle duration decreases inversely with the flow rate.</span></p><p data-dcnode-id="3560"><span data-dcnode-id="3570" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="3568" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig13"><span data-dcnode-id="3569" instrument_node="">13</span></a><span data-dcnode-id="3567" instrument_node=""> represents the optimal unit point of productivity achieved after the optimization process for each purge temperature, while Table </span><a data-dcnode-id="3565" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="3566" instrument_node="">4</span></a><span data-dcnode-id="3564" instrument_node=""> presents more detailed the results of the optimal point. The productivity is directly proportional to the purge temperature, as predictable. The maximum productivity (111&nbsp;l·day</span><sup data-dcnode-id="3562"><span data-dcnode-id="3563" instrument_node="">−1</span></sup><span data-dcnode-id="3561" instrument_node="">) was obtained for the maximum purge temperature (373&nbsp;K).</span></p><p data-dcnode-id="3537"><span data-dcnode-id="3559" instrument_node="">The most promising scenario was obtained for purge temperature equal to 353&nbsp;K and a flow rate of 0.50 m</span><sup data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">3</span></sup><span data-dcnode-id="3556" instrument_node="">·s</span><sup data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">−1</span></sup><span data-dcnode-id="3553" instrument_node="">, with the highest H</span><sub data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">2</span></sub><span data-dcnode-id="3550" instrument_node="">O productivity of 305&nbsp;l·day</span><sup data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">−1</span></sup><span data-dcnode-id="3547" instrument_node="">·ton</span><sup data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">−1</span></sup><span data-dcnode-id="3544" instrument_node="">. The history of gas temperature and RH at two different axial positions: 0.6&nbsp;m and 1.25&nbsp;m (outlet of the adsorber), at Cyclic Steady State (CSS) are presented in Fig.&nbsp;</span><a data-dcnode-id="3542" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig14"><span data-dcnode-id="3543" instrument_node="">14</span></a><span data-dcnode-id="3541" instrument_node="">. At the beginning of the regeneration step (35,125&nbsp;s), the concentration shock wave has just achieved the end of the column, as can be observed in Fig.&nbsp;</span><a data-dcnode-id="3539" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig14"><span data-dcnode-id="3540" instrument_node="">14</span></a><span data-dcnode-id="3538" instrument_node="">a. Furthermore, the regeneration step ends up before the full regeneration of the bed. The regeneration of the end part of the bed proceeds during the feed step. Indeed, the end of the bed is never fully regenerated, which can be easily understood since productivity is a time-based performance parameter. The time that takes to regenerate the end part of the bed entirely might not be waged by the extra capacity gained by doing so.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3505" data-test="figure" data-title="Fig. 14" id="figure-14"><figure data-dcnode-id="3506"><figcaption data-dcnode-id="3534"><b class="c-article-section__figure-caption" data-dcnode-id="3535" data-test="figure-caption-text" id="Fig14"><span data-dcnode-id="3536" instrument_node="">Fig. 14</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3517"><div class="c-article-section__figure-item" data-dcnode-id="3529"><a class="c-article-section__figure-link" data-dcnode-id="3530" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/14" rel="nofollow"><picture data-dcnode-id="3531"><source data-dcnode-id="3533" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10450-020-00286-5/MediaObjects/10450_2020_286_Fig14_HTML.png?as=webp" type="image/webp"><img alt="figure 14" aria-describedby="Fig14" data-dcnode-id="3532" height="1006" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10450-020-00286-5/MediaObjects/10450_2020_286_Fig14_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3518" data-test="bottom-caption" id="figure-14-desc"><p data-dcnode-id="3519"><b data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">a</span></b><span data-dcnode-id="3526" instrument_node=""> RH and </span><b data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">b</span></b><span data-dcnode-id="3523" instrument_node=""> gas temperature histories at two different axial positions: 0.6&nbsp;m and 1.25&nbsp;m, for the highest H</span><sub data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">2</span></sub><span data-dcnode-id="3520" instrument_node="">O productivity (Vertical dashed line represents the beginning of the regeneration step)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3507"><a aria-lab etermination of isosteric adsorption heats for CO</span><sub data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">2</span></sub><span data-dcnode-id="3439" instrument_node=""> (25.6&nbsp;kJ·mol</span><sup data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">−1</span></sup><span data-dcnode-id="3436" instrument_node="">), N</span><sub data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">2</span></sub><span data-dcnode-id="3433" instrument_node=""> (14.1&nbsp;kJ·mol</span><sup data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">−1</span></sup><span data-dcnode-id="3430" instrument_node="">), and O</span><sub data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">2</span></sub><span data-dcnode-id="3427" instrument_node=""> (13.6&nbsp;kJ·mol</span><sup data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">−1</span></sup><span data-dcnode-id="3424" instrument_node="">). Dynamic adsorption experiments demonstrated that CO</span><sub data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">2</span></sub><span data-dcnode-id="3421" instrument_node=""> does not have an impact on H</span><sub data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">2</span></sub><span data-dcnode-id="3418" instrument_node="">O adsorption, and the mathematical model developed can predict the H</span><sub data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">2</span></sub><span data-dcnode-id="3415" instrument_node="">O adsorption dynamic behavior without having to consider competition during the co-adsorption with CO</span><sub data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">2</span></sub><span data-dcnode-id="3412" instrument_node=""> or N</span><sub data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">2</span></sub><span data-dcnode-id="3409" instrument_node="">.</span></p><p data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">DRIFT and TGA measurements allowed us to verify that the maximum regeneration temperature required would be about 398–423&nbsp;K, which is by far lower than the thermal stability limit of the material, which is 600–650&nbsp;K.</span></p><p data-dcnode-id="3392"><span data-dcnode-id="3405" instrument_node="">TSA process evidenced the potential application of MIL-160(Al) as a material for water harvesting capable of producing at least 305&nbsp;l·day</span><sup data-dcnode-id="3403"><span data-dcnode-id="3404" instrument_node="">−1</span></sup><span data-dcnode-id="3402" instrument_node="">·ton</span><sup data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">−1</span></sup><span data-dcnode-id="3399" instrument_node=""> of water (purge temperature—353&nbsp;K, condensation temperature—283&nbsp;K, and flowrate—0.50 m</span><sup data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">3</span></sup><span data-dcnode-id="3396" instrument_node="">·s</span><sup data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">−1</span></sup><span data-dcnode-id="3393" instrument_node="">).</span></p></div></div></section><span data-dcnode-id="3388" instrument_node="">

ybrid Interface Materials of Korea (GFHIM) (Grant No. NRF-2013M3A6B1078879) for financial support. The authors acknowledge Prof. Christian Serre for his contribution in the synthesis and shaping of MIL-160(Al).</span></p></div></div></section><section aria-labelledby="author-information" data-dcnode-id="1647" data-title="Author information"><div class="c-article-section" data-dcnode-id="1648" id="author-information-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1869" id="author-information"><span data-dcnode-id="1870" instrument_node="">Author information</span></h2><div class="c-article-section__content" data-dcnode-id="1649" id="author-information-content"><h3 class="c-article__sub-heading" data-dcnode-id="1867" id="affiliations"><span data-dcnode-id="1868" instrument_node="">Affiliations</span></h3><ol class="c-article-author-affiliation__list" data-dcnode-id="1851"><li data-dcnode-id="1862" id="Aff1"><p class="c-article-author-affiliation__address" data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">Laboratory of Separation and Reaction Engineering - Laboratory of Catalysis and Materials (LSRE-LCM), Associate Laboratory LSRE-LCM, Faculdade de Engenharia, Universidade do Porto, Rua Dr. Roberto Frias, 4200-465, Porto, Portugal</span></p><p class="c-article-author-affiliation__authors-list" data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">M. P. Silva,&nbsp;A. M. Ribeiro,&nbsp;C. G. Silva,&nbsp;I. B. R. Nogueira,&nbsp;J. L. Faria,&nbsp;J. L. Loureiro,&nbsp;A. E. Rodrigues&nbsp;&amp;&nbsp;A. Ferreira</span></p></li><li data-dcnode-id="1857" id="Aff2"><p class="c-article-author-affiliation__address" data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Catalysis Center for Nanocatalysts, Korea Research Institute of Chemical Technology (KRICT), Jang-dong 100, Yuseong, Daejeon, South Korea</span></p><p class="c-article-author-affiliation__authors-list
