</span><meta content="The water crisis is one of the main global risks based on its societal impact, particularly the access to safe drinking water in regions with a dry (arid) or mainly dry (semi-arid) climate. Several techniques are being developed, namely the use of regenerative desiccant (e.g., MOFs) to water capture through adsorption processes. MIL-160(Al) belongs to the fumarate-based MOFs family, and it is one of the most promising MOFs for water harvesting and heat transformation applications. In this study, the potential of MIL-160(Al) as an adsorbent for water sorption based applications was evaluated. For this purpose, adsorption equilibrium isotherms, dynamic adsorption experiments, and MIL-160(Al) granules characterization were performed. H2O vapor adsorption equilibrium isotherm was studied at 303, 323, and 343&amp;nbsp;K presenting a type V shape and was fitted using the Cooperative Multimolecular Sorption model and Polanyi’s theory model. Additionally, CO2, N2, and O2 adsorption equilibrium isotherms were also measured but at 283, 303, and 323&amp;nbsp;K, presenting the following order of adsorption affinity: CO2 &amp;gt; O2 &amp;gt; N2. Water vapor adsorption breakthrough experiments corroborate the shape of the water adsorption equilibrium isotherms on MIL-160(Al). Water co-adsorption history proved that the presence of the other air components (CO2, O2, and N2) does not affect water adsorption behavior on MIL-160(Al). DRIFTS measurements proved the MIL-160(Al) structure remains stable during the water vapor exposure. The optimization of the TSA process allowed us to achieve maximum H2O productivity of 305 L·day−1·ton−1 for a regeneration temperature of 353&amp;nbsp;K and flow rate equal to 0.50 m3·s−1." data-dcnode-id="5829" name="dc.description"><span data-dcnode-id="5828" instrument_node="">

</span><meta content="The water crisis is one of the main global risks based on its societal impact, particularly the access to safe drinking water in regions with a dry (arid) or mainly dry (semi-arid) climate. Several techniques are being developed, namely the use of regenerative desiccant (e.g., MOFs) to water capture through adsorption processes. MIL-160(Al) belongs to the fumarate-based MOFs family, and it is one of the most promising MOFs for water harvesting and heat transformation applications. In this study, the potential of MIL-160(Al) as an adsorbent for water sorption based applications was evaluated. For this purpose, adsorption equilibrium isotherms, dynamic adsorption experiments, and MIL-160(Al) granules characterization were performed. H2O vapor adsorption equilibrium isotherm was studied at 303, 323, and 343 K presenting a type V shape and was fitted using the Cooperative Multimolecular Sorption model and Polanyi’s theory model. Additionally, CO2, N2, and O2 adsorption equilibrium isotherms were also measured but at 283, 303, and 323 K, presenting the following order of adsorption affinity: CO2 > O2 > N2. Water vapor adsorption breakthrough experiments corroborate the shape of the water adsorption equilibrium isotherms on MIL-160(Al). Water co-adsorption history proved that the presence of the other air components (CO2, O2, and N2) does not affect water adsorption behavior on MIL-160(Al). DRIFTS measurements proved the MIL-160(Al) structure remains stable during the water vapor exposure. The optimization of the TSA process allowed us to achieve maximum H2O productivity of 305 L·day−1·ton−1 for a regeneration temperature of 353 K and flow rate equal to 0.50 m3·s−1." data-dcnode-id="5571" property="og:description"><span data-dcnode-id="5570" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="4973" data-gtm-vis-first-on-screen-50443292_562="627" data-gtm-vis-first-on-screen-50443292_563="627" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="627" data-gtm-vis-recent-on-screen-50443292_563="627" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4974" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5023" id="Abs1"><span data-dcnode-id="5024" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4975" id="Abs1-content"><p data-dcnode-id="4976"><span data-dcnode-id="5022" instrument_node="">The water crisis is one of the main global risks based on its societal impact, particularly the access to safe drinking water in regions with a dry (arid) or mainly dry (semi-arid) climate. Several techniques are being developed, namely the use of regenerative desiccant (e.g., MOFs) to water capture through adsorption processes. MIL-160(Al) belongs to the fumarate-based MOFs family, and it is one of the most promising MOFs for water harvesting and heat transformation applications. In this study, the potential of MIL-160(Al) as an adsorbent for water sorption based applications was evaluated. For this purpose, adsorption equilibrium isotherms, dynamic adsorption experiments, and MIL-160(Al) granules characterization were performed. H</span><sub data-dcnode-id="5020"><span data-dcnode-id="5021" instrument_node="">2</span></sub><span data-dcnode-id="5019" instrument_node="">O vapor adsorption equilibrium isotherm was studied at 303, 323, and 343&nbsp;K presenting a type V shape and was fitted using the Cooperative Multimolecular Sorption model and Polanyi’s theory model. Additionally, CO</span><sub data-dcnode-id="5017"><span data-dcnode-id="5018" instrument_node="">2</span></sub><span data-dcnode-id="5016" instrument_node="">, N</span><sub data-dcnode-id="5014"><span data-dcnode-id="5015" instrument_node="">2</span></sub><span data-dcnode-id="5013" instrument_node="">, and O</span><sub data-dcnode-id="5011"><span data-dcnode-id="5012" instrument_node="">2</span></sub><span data-dcnode-id="5010" instrument_node=""> adsorption equilibrium isotherms were also measured but at 283, 303, and 323&nbsp;K, presenting the following order of adsorption affinity: CO</span><sub data-dcnode-id="5008"><span data-dcnode-id="5009" instrument_node="">2</span></sub><span data-dcnode-id="5007" instrument_node=""> &gt; O</span><sub data-dcnode-id="5005"><span data-dcnode-id="5006" instrument_node="">2</span></sub><span data-dcnode-id="5004" instrument_node=""> &gt; N</span><sub data-dcnode-id="5002"><span data-dcnode-id="5003" instrument_node="">2</span></sub><span data-dcnode-id="5001" instrument_node="">. Water vapor adsorption breakthrough experiments corroborate the shape of the water adsorption equilibrium isotherms on MIL-160(Al). Water co-adsorption history proved that the presence of the other air components (CO</span><sub data-dcnode-id="4999"><span data-dcnode-id="5000" instrument_node="">2</span></sub><span data-dcnode-id="4998" instrument_node="">, O</span><sub data-dcnode-id="4996"><span data-dcnode-id="4997" instrument_node="">2</span></sub><span data-dcnode-id="4995" instrument_node="">, and N</span><sub data-dcnode-id="4993"><span data-dcnode-id="4994" instrument_node="">2</span></sub><span data-dcnode-id="4992" instrument_node="">) does not affect water adsorption behavior on MIL-160(Al). DRIFTS measurements proved the MIL-160(Al) structure remains stable during the water vapor exposure. The optimization of the TSA process allowed us to achieve maximum H</span><sub data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">2</span></sub><span data-dcnode-id="4989" instrument_node="">O productivity of 305 L·day</span><sup data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">−1</span></sup><span data-dcnode-id="4986" instrument_node="">·ton</span><sup data-dcnode-id="4984"><span data-dcnode-id="4985" instrument_node="">−1</span></sup><span data-dcnode-id="4983" instrument_node=""> for a regeneration temperature of 353&nbsp;K and flow rate equal to 0.50 m</span><sup data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">3</span></sup><span data-dcnode-id="4980" instrument_node="">·s</span><sup data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node="">−1</span></sup><span data-dcnode-id="4977" instrument_node="">.</span></p></div></div></section><span data-dcnode-id="4972" instrument_node="">
</span><section data-dcnode-id="4793" data-gtm-vis-first-on-screen-50443292_562="627" data-gtm-vis-first-on-screen-50443292_563="627" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="627" data-gtm-vis-recent-on-screen-50443292_563="627" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="4794" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4970" id="Sec1"><span data-dcnode-id="4971" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="4795" id="Sec1-content"><p data-dcnode-id="4822"><span data-dcnode-id="4969" instrument_node="">Climate change and the world’s population growth are factors that origin water stress [</span><a aria-label="Reference 51" data-dcnode-id="4967" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d136475424e1512" title="Yaghi, O.M., Kalmutzki, M.J., Diercks, C.S.: Water sorption applications of MOFs. In: Yaghi, O.M. (ed.) Introduction to Reticular Chemistry, pp. 395–427. Wiley, Weinheim (2019)"><span data-dcnode-id="4968" instrument_node="">51</span></a><span data-dcnode-id="4966" instrument_node="">]. Over the past decades, the water demand rate is two times higher than the population growth rate [</span><a aria-label="Reference 31" data-dcnode-id="4964" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d136475424e1515" title="Pazwash, H.: Urban Storm Water Management. CRC Press, Boca Raton (2016)"><span data-dcnode-id="4965" instrument_node="">31</span></a><span data-dcnode-id="4963" instrument_node="">, </span><a aria-label="Reference 43" data-dcnode-id="4961" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d136475424e1518" title="Shiklomanov, I.A.: World Water Resources: a new appraisal and assessment for the 21st century. In. United Nations Educational, Scientific and Cultural Organization (UNESCO), (1998)"><span data-dcnode-id="4962" instrument_node="">43</span></a><span data-dcnode-id="4960" instrument_node="">]. About 66% of the world population (4 billion) faced water scarcity episodes for at least 1 month a year [</span><a aria-label="Reference 28" data-dcnode-id="4958" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d136475424e1521" title="Mekonnen, M.M., Hoekstra, A.Y.: Four billion people facing severe water scarcity. Sci. Adv. 2(2), 1500323 (2016). 
                  https://doi.org/10.1126/sciadv.1500323
                  
                "><span data-dcnode-id="4959" instrument_node="">28</span></a><span data-dcnode-id="4957" instrument_node="">]. Several techniques are being developed along with the traditional water sources to meet the lack of potable water. Non-conventional water sources such as seawater, fog and dew, and atmospheric moisture (H</span><sub data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">2</span></sub><span data-dcnode-id="4954" instrument_node="">O) vapor are being considered to produce potable water [</span><a aria-label="Reference 42" data-dcnode-id="4952" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d136475424e1527" title="Santos Pereira, L., Cordery, I., Iacovides, I.: Using non-conventional water resources. In: Coping with Water Scarcity. Springer, Dordrecht (2009)"><span data-dcnode-id="4953" instrument_node="">42</span></a><span data-dcnode-id="4951" instrument_node="">]. In areas where no viable liquid water source is available, such as arid regions, war zones, natural calamity areas, heavily chemically/biologically contaminated water supply areas, water in the atmospheric air can be considered a possible water source. Atmospheric water generators (AWGs) can be an alternative to capture and deliver water in these problematic regions [</span><a aria-label="Reference 22" data-dcnode-id="4949" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d136475424e1530" title="Kim, H., Rao, S.R., Kapustin, E.A., Zhao, L., Yang, S., Yaghi, O.M., Wang, E.N.: Adsorption-based atmospheric water harvesting device for arid climates. Nat. Commun. 9(1), 1191 (2018). 
                  https://doi.org/10.1038/s41467-018-03162-7
                  
                "><span data-dcnode-id="4950" instrument_node="">22</span></a><span data-dcnode-id="4948" instrument_node="">, </span><a aria-label="Reference 49" data-dcnode-id="4946" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d136475424e1533" title="Wang, J.Y., Wang, R.Z., Tu, Y.D., Wang, L.W.: Universal scalable sorption-based atmosphere water harvesting. Energy 165, 387–395 (2018). 
                  https://doi.org/10.1016/j.energy.2018.09.106
                  
                "><span data-dcnode-id="4947" instrument_node="">49</span></a><span data-dcnode-id="4945" instrument_node="">, </span><a aria-label="Reference 51" data-dcnode-id="4943" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d136475424e1536" title="Yaghi, O.M., Kalmutzki, M.J., Diercks, C.S.: Water sorption applications of MOFs. In: Yaghi, O.M. (ed.) Introduction to Reticular Chemistry, pp. 395–427. Wiley, Weinheim (2019)"><span data-dcnode-id="4944" instrument_node="">51</span></a><span data-dcnode-id="4942" instrument_node="">]. Water harvesting from the air provides water with sufficient quality for drinking [</span><a aria-label="Reference 10" data-dcnode-id="4940" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d136475424e1539" title="Fessehaye, M., Abdul-Wahab, S.A., Savage, M.J., Kohler, T., Gherezghiher, T., Hurni, H.: Fog-water collection for community use. Renew. Sustain. Energy Rev. 29, 52–62 (2014). 
                  https://doi.org/10.1016/j.rser.2013.08.063
                  
                "><span data-dcnode-id="4941" instrument_node="">10</span></a><span data-dcnode-id="4939" instrument_node="">], does not have spatial limitations, and can be powered by renewable energies [</span><a aria-label="Reference 24" data-dcnode-id="4937" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d136475424e1542" title="Kogan, B., Trahtman, A.: The moisture from the air as water resource in arid region: hopes, doubts and facts. J. Arid Environ. 53(2), 231–240 (2003). 
                  https://doi.org/10.1006/jare.2002.1028
                  
                "><span data-dcnode-id="4938" instrument_node="">24</span></a><span data-dcnode-id="4936" instrument_node="">]. The water capture by a regenerative desiccant (liquid or solid) through adsorption processes is the most common type of active dew condenser [</span><a aria-label="Reference 19" data-dcnode-id="4934" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d136475424e1546" title="Khalil, B., Adamowski, J., Rojas, M., Reilly, K.: Towards an independent dew water irrigation system for arid or insular areas. Paper presented at the 2014 Montreal, Quebec Canada July 13–July 16, 2014, St. Joseph, MI"><span data-dcnode-id="4935" instrument_node="">19</span></a><span data-dcnode-id="4933" instrument_node="">, </span><a aria-label="Reference 20" data-dcnode-id="4931" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d136475424e1549" title="Khalil, B., Adamowski, J., Shabbir, A., Jang, C., Rojas, M., Reilly, K., Ozga-Zielinski, B.: A review: dew water collection from radiative passive collectors to recent developments of active collectors. Sustain. Water Resour. Manag. 2(1), 71–86 (2016). 
                  https://doi.org/10.1007/s40899-015-0038-z
                  
                "><span data-dcnode-id="4932" instrument_node="">20</span></a><span data-dcnode-id="4930" instrument_node="">]. The desiccant (e.g., silica and zeolite) is exposed to moist air, and then, the water is removed by a stimulus source (heat) and collected [</span><a aria-label="Reference 20" data-dcnode-id="4928" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d136475424e1552" title="Khalil, B., Adamowski, J., Shabbir, A., Jang, C., Rojas, M., Reilly, K., Ozga-Zielinski, B.: A review: dew water collection from radiative passive collectors to recent developments of active collectors. Sustain. Water Resour. Manag. 2(1), 71–86 (2016). 
                  https://doi.org/10.1007/s40899-015-0038-z
                  
                "><span data-dcnode-id="4929" instrument_node="">20</span></a><span data-dcnode-id="4927" instrument_node="">]. The most common desiccants, such as alumina, zeolite, and silica gel, although present high water vapor adsorption capacity, demand high temperatures (&gt; 160&nbsp;°C) to perform water desorption efficiently [</span><a aria-label="Reference 2" data-dcnode-id="4925" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d136475424e1555" title="Boriskina, S.V., Raza, A., Zhang, T., Wang, P., Zhou, L., Zhu, J.: Nanomaterials for the water-energy nexus. MRS Bull. 44(1), 59–66 (2019). 
                  https://doi.org/10.1557/mrs.2018.325
                  
                "><span data-dcnode-id="4926" instrument_node="">2</span></a><span data-dcnode-id="4924" instrument_node="">]. On the other hand, MOFs present high water-uptake performances [</span><a aria-label="Reference 47" data-dcnode-id="4922" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d136475424e1558" title="Tu, Y., Wang, R., Zhang, Y., Wang, J.: Progress and expectation of atmospheric water harvesting. Joule 2(8), 1452–1475 (2018). 
                  https://doi.org/10.1016/j.joule.2018.07.015
                  
                "><span data-dcnode-id="4923" instrument_node="">47</span></a><span data-dcnode-id="4921" instrument_node="">] and low regeneration temperatures, making them highly suitable for water harvesting. Additionally, MOFs present structural tunability, tailorable architecture and maintain their working adsorption capacity after multiple cycles [</span><a aria-label="Reference 13" data-dcnode-id="4919" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d136475424e1561" title="Hanikel, N., Prévot, M.S., Yaghi, O.M.: MOF water harvesters. Nat. Nanotechnol. 15(5), 348–355 (2020). 
                  https://doi.org/10.1038/s41565-020-0673-x
                  
                "><span data-dcnode-id="4920" instrument_node="">13</span></a><span data-dcnode-id="4918" instrument_node="">, </span><a aria-label="Reference 18" data-dcnode-id="4916" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d136475424e1565" title="Karmakar, A., Prabakaran, V., Zhao, D., Chua, K.J.: A review of metal-organic frameworks (MOFs) as energy-efficient desiccants for adsorption driven heat-transformation applications. Appl. Energy 269, 115070 (2020). 
                  https://doi.org/10.1016/j.apenergy.2020.115070
                  
                "><span data-dcnode-id="4917" instrument_node="">18</span></a><span data-dcnode-id="4915" instrument_node="">]. Indeed, the interest in MOFs for water vapor capture increased in the recent years [</span><a aria-label="Reference 9" data-dcnode-id="4913" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d136475424e1568" title="Fathieh, F., Kalmutzki, M.J., Kapustin, E.A., Waller, P.J., Yang, J., Yaghi, O.M.: Practical water production from desert air. Sci. Adv. 4(6), 3198 (2018). 
                  https://doi.org/10.1126/sciadv.aat3198
                  
                "><span data-dcnode-id="4914" instrument_node="">9</span></a><span data-dcnode-id="4912" instrument_node="">, </span><a aria-label="Reference 17" data-dcnode-id="4910" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d136475424e1571" title="Kalmutzki, M.J., Diercks, C.S., Yaghi, O.M.: Metal–organic frameworks for water harvesting from air. Adv. Mater. 30(37), 1704304 (2018). 
                  https://doi.org/10.1002/adma.201704304
                  
                "><span data-dcnode-id="4911" instrument_node="">17</span></a><span data-dcnode-id="4909" instrument_node="">, </span><a aria-label="Reference 22" data-dcnode-id="4907" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d136475424e1574" title="Kim, H., Rao, S.R., Kapustin, E.A., Zhao, L., Yang, S., Yaghi, O.M., Wang, E.N.: Adsorption-based atmospheric water harvesting device for arid climates. Nat. Commun. 9(1), 1191 (2018). 
                  https://doi.org/10.1038/s41467-018-03162-7
                  
                "><span data-dcnode-id="4908" instrument_node="">22</span></a><span data-dcnode-id="4906" instrument_node="">, </span><a aria-label="Reference 26" data-dcnode-id="4904" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d136475424e1577" title="LaPotin, A., Kim, H., Rao, S.R., Wang, E.N.: Adsorption-based atmospheric water harvesting: impact of material and component properties on system-level performance. Acc. Chem. Res. 52(6), 1588–1597 (2019). 
                  https://doi.org/10.1021/acs.accounts.9b00062
                  
                "><span data-dcnode-id="4905" instrument_node="">26</span></a><span data-dcnode-id="4903" instrument_node="">, </span><a aria-label="Reference 47" data-dcnode-id="4901" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d136475424e1580" title="Tu, Y., Wang, R., Zhang, Y., Wang, J.: Progress and expectation of atmospheric water harvesting. Joule 2(8), 1452–1475 (2018). 
                  https://doi.org/10.1016/j.joule.2018.07.015
                  
                "><span data-dcnode-id="4902" instrument_node="">47</span></a><span data-dcnode-id="4900" instrument_node="">, </span><a aria-label="Reference 49" data-dcnode-id="4898" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d136475424e1584" title="Wang, J.Y., Wang, R.Z., Tu, Y.D., Wang, L.W.: Universal scalable sorption-based atmosphere water harvesting. Energy 165, 387–395 (2018). 
                  https://doi.org/10.1016/j.energy.2018.09.106
                  
                "><span data-dcnode-id="4899" instrument_node="">49</span></a><span data-dcnode-id="4897" instrument_node="">]. Few recent publications demonstrated the great potential of robust MOFs in water adsorption related processes, being stable during water adsorption/desorption cycles [</span><a aria-label="Reference 4" data-dcnode-id="4895" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d136475424e1587" title="Cadiau, A., Lee, J.S., Damasceno Borges, D., Fabry, P., Devic, T., Wharmby, M.T., Martineau, C., Foucher, D., Taulelle, F., Jun, C.H., Hwang, Y.K., Stock, N., De Lange, M.F., Kapteijn, F., Gascon, J., Maurin, G., Chang, J.S., Serre, C.: Design of hydrophilic metal organic framework water adsorbents for heat reallocation. Adv. Mater. (Deerfield Beach, Fla) 27(32), 4775–4780 (2015). 
                  https://doi.org/10.1002/adma.201502418
                  
                "><span data-dcnode-id="4896" instrument_node="">4</span></a><span data-dcnode-id="4894" instrument_node="">, </span><a aria-label="Reference 14" data-dcnode-id="4892" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d136475424e1590" title="Jeremias, F., Khutia, A., Henninger, S.K., Janiak, C.: MIL-100(Al, Fe) as water adsorbents for heat transformation purposes-a promising application. J. Mater. Chem. 22(20), 10148–10151 (2012). 
                  https://doi.org/10.1039/C2jm15615f
                  
                "><span data-dcnode-id="4893" instrument_node="">14</span></a><span data-dcnode-id="4891" instrument_node="">, </span><a aria-label="Reference 15" data-dcnode-id="4889" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d136475424e1593" title="Jeremias, F., Lozan, V., Henninger, S.K., Janiak, C.: Programming MOFs for water sorption: amino-functionalized MIL-125 and UiO-66 for heat transformation and heat storage applications. Dalton Trans. 42(45), 15967–15973 (2013). 
                  https://doi.org/10.1039/C3dt51471d
                  
                "><span data-dcnode-id="4890" instrument_node="">15</span></a><span data-dcnode-id="4888" instrument_node="">, </span><a aria-label="Reference 21" data-dcnode-id="4886" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d136475424e1596" title="Khutia, A., Rammelberg, H.U., Schmidt, T., Henninger, S., Janiak, C.: Water sorption cycle measurements on functionalized MIL-101Cr for heat transformation application. Chem. Mater. 25(5), 790–798 (2013). 
                  https://doi.org/10.1021/Cm304055k
                  
                "><span data-dcnode-id="4887" instrument_node="">21</span></a><span data-dcnode-id="4885" instrument_node="">, </span><a aria-label="Reference 36" data-dcnode-id="4883" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d136475424e1599" title="Plessius, R., Kromhout, R., Ramos, A.L., Ferbinteanu, M., Mittelmeijer-Hazeleger, M.C., Krishna, R., Rothenberg, G., Tanase, S.: Highly selective water adsorption in a lanthanum metal-organic framework. Chemistry 20(26), 7922–7925 (2014). 
                  https://doi.org/10.1002/chem.201403241
                  
                "><span data-dcnode-id="4884" instrument_node="">36</span></a><span data-dcnode-id="4882" instrument_node="">]. Teo and Chakraborty used MIL-101(Cr), alkali metal (Li</span><sup data-dcnode-id="4880"><span data-dcnode-id="4881" instrument_node="">+</span></sup><span data-dcnode-id="4879" instrument_node="">, Na</span><sup data-dcnode-id="4877"><span data-dcnode-id="4878" instrument_node="">+</span></sup><span data-dcnode-id="4876" instrument_node="">) doped MIL-101(Cr), aluminum fumarate, and CAU-10 as adsorbents to evaluate the effect of material properties on water adsorption behavior [</span><a aria-label="Reference 46" data-dcnode-id="4874" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d136475424e1607" title="Teo, H.W.B., Chakraborty, A.: Water adsorption on various metal organic framework. IOP Conf. Ser. 272(1), 012019 (2017)"><span data-dcnode-id="4875" instrument_node="">46</span></a><span data-dcnode-id="4873" instrument_node="">]. While, Küsgens and co-workers tested different MOFs (HKUST-1, ZIF-8, MIL-101, MIL-100(Fe), DUT-4) to select the most promising candidates for water adsorption applications [</span><a aria-label="Reference 25" data-dcnode-id="4871" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d136475424e1610" title="Küsgens, P., Rose, M., Senkovska, I., Fröde, H., Henschel, A., Siegle, S., Kaskel, S.: Characterization of metal-organic frameworks by water adsorption. Microporous Mesoporous Mater. 120(3), 325–330 (2009). 
                  https://doi.org/10.1016/j.micromeso.2008.11.020
                  
                "><span data-dcnode-id="4872" instrument_node="">25</span></a><span data-dcnode-id="4870" instrument_node="">]. According to water stability, hydrophilic mesoporous adsorbents MIL-101(Cr) and MIL-100(Fe) were the selected ones [</span><a aria-label="Reference 25" data-dcnode-id="4868" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d136475424e1613" title="Küsgens, P., Rose, M., Senkovska, I., Fröde, H., Henschel, A., Siegle, S., Kaskel, S.: Characterization of metal-organic frameworks by water adsorption. Microporous Mesoporous Mater. 120(3), 325–330 (2009). 
                  https://doi.org/10.1016/j.micromeso.2008.11.020
                  
                "><span data-dcnode-id="4869" instrument_node="">25</span></a><span data-dcnode-id="4867" instrument_node="">]. Intending to study water adsorption in porous materials, Furukawa et al. selected 23 materials, of which 20 of them were MOFs [</span><a aria-label="Reference 11" data-dcnode-id="4865" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d136475424e1616" title="Furukawa, H., Gándara, F., Zhang, Y.-B., Jiang, J., Queen, W.L., Hudson, M.R., Yaghi, O.M.: Water adsorption in porous metal–organic frameworks and related materials. J. Am. Chem. Soc. 136(11), 4369–4381 (2014). 
                  https://doi.org/10.1021/ja500330a
                  
                "><span data-dcnode-id="4866" instrument_node="">11</span></a><span data-dcnode-id="4864" instrument_node="">], and MOF-841 was highlighted as a suitable candidate for water capture in arid areas [</span><a aria-label="Reference 11" data-dcnode-id="4862" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d136475424e1620" title="Furukawa, H., Gándara, F., Zhang, Y.-B., Jiang, J., Queen, W.L., Hudson, M.R., Yaghi, O.M.: Water adsorption in porous metal–organic frameworks and related materials. J. Am. Chem. Soc. 136(11), 4369–4381 (2014). 
                  https://doi.org/10.1021/ja500330a
                  
                "><span data-dcnode-id="4863" instrument_node="">11</span></a><span data-dcnode-id="4861" instrument_node="">]. In Kalmutzki et al. review it was compared the potential of selected MOFs for water harvesting from the air and concluded that these materials have great potential, albeit there is a lack in the development of technologies for the cyclic adsorption process [</span><a aria-label="Reference 17" data-dcnode-id="4859" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d136475424e1623" title="Kalmutzki, M.J., Diercks, C.S., Yaghi, O.M.: Metal–organic frameworks for water harvesting from air. Adv. Mater. 30(37), 1704304 (2018). 
                  https://doi.org/10.1002/adma.201704304
                  
                "><span data-dcnode-id="4860" instrument_node="">17</span></a><span data-dcnode-id="4858" instrument_node="">]. Kim et al. designed an ecological device with MOF-801 as an adsorbent to capture water from the atmosphere [</span><a aria-label="Reference 22" data-dcnode-id="4856" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d136475424e1626" title="Kim, H., Rao, S.R., Kapustin, E.A., Zhao, L., Yang, S., Yaghi, O.M., Wang, E.N.: Adsorption-based atmospheric water harvesting device for arid climates. Nat. Commun. 9(1), 1191 (2018). 
                  https://doi.org/10.1038/s41467-018-03162-7
                  
                "><span data-dcnode-id="4857" instrument_node="">22</span></a><span data-dcnode-id="4855" instrument_node="">, </span><a aria-label="Reference 23" data-dcnode-id="4853" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d136475424e1629" title="Kim, H., Yang, S., Rao, S.R., Narayanan, S., Kapustin, E.A., Furukawa, H., Umans, A.S., Yaghi, O.M., Wang, E.N.: Water harvesting from air with metal-organic frameworks powered by natural sunlight. Science 356(6336), 430–434 (2017). 
                  https://doi.org/10.1126/science.aam8743
                  
                "><span data-dcnode-id="4854" instrument_node="">23</span></a><span data-dcnode-id="4852" instrument_node="">]. Indeed, at 20% of relative humidity, it can harvest 2.8 L of water per kilogram of MOF [</span><a aria-label="Reference 23" data-dcnode-id="4850" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d136475424e1632" title="Kim, H., Yang, S., Rao, S.R., Narayanan, S., Kapustin, E.A., Furukawa, H., Umans, A.S., Yaghi, O.M., Wang, E.N.: Water harvesting from air with metal-organic frameworks powered by natural sunlight. Science 356(6336), 430–434 (2017). 
                  https://doi.org/10.1126/science.aam8743
                  
                "><span data-dcnode-id="4851" instrument_node="">23</span></a><span data-dcnode-id="4849" instrument_node="">]. More recently, it was reported an aluminum-based MOF 303, which is capable of retaining about twice much water [</span><a aria-label="Reference 9" data-dcnode-id="4847" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d136475424e1635" title="Fathieh, F., Kalmutzki, M.J., Kapustin, E.A., Waller, P.J., Yang, J., Yaghi, O.M.: Practical water production from desert air. Sci. Adv. 4(6), 3198 (2018). 
                  https://doi.org/10.1126/sciadv.aat3198
                  
                "><span data-dcnode-id="4848" instrument_node="">9</span></a><span data-dcnode-id="4846" instrument_node="">]. Rieth et al. studied the capture of water from atmosphere with a low relative humidity of 30% [</span><a aria-label="Reference 40" data-dcnode-id="4844" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d136475424e1639" title="Rieth, A.J., Yang, S., Wang, E.N., Dincă, M.: Record atmospheric fresh water capture and heat transfer with a material operating at the water uptake reversibility limit. ACS Central Sci. 3(6), 668–672 (2017). 
                  https://doi.org/10.1021/acscentsci.7b00186
                  
                "><span data-dcnode-id="4845" instrument_node="">40</span></a><span data-dcnode-id="4843" instrument_node="">]. The sorbent presented is capable of harvesting 0.82 g</span><sub data-dcnode-id="4838"><span data-dcnode-id="4842" instrument_node="">H</span><span class="u-small-caps" data-dcnode-id="4840"><span data-dcnode-id="4841" instrument_node="">2</span></span><span data-dcnode-id="4839" instrument_node="">O</span></sub><span data-dcnode-id="4837" instrument_node="">·g</span><sub data-dcnode-id="4835"><span data-dcnode-id="4836" instrument_node="">MOF</span></sub><sup data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">–1</span></sup><span data-dcnode-id="4832" instrument_node=""> [</span><a aria-label="Reference 40" data-dcnode-id="4830" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d136475424e1651" title="Rieth, A.J., Yang, S., Wang, E.N., Dincă, M.: Record atmospheric fresh water capture and heat transfer with a material operating at the water uptake reversibility limit. ACS Central Sci. 3(6), 668–672 (2017). 
                  https://doi.org/10.1021/acscentsci.7b00186
                  
                "><span data-dcnode-id="4831" instrument_node="">40</span></a><span data-dcnode-id="4829" instrument_node="">]. Water adsorption properties in different porous materials, including ZIFs and MOFs, were also investigated using molecular simulations [</span><a aria-label="Reference 32" data-dcnode-id="4827" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d136475424e1654" title="Peng, X., Lin, L.-C., Sun, W., Smit, B.: Water adsorption in metal–organic frameworks with open-metal sites. AIChE J. 61(2), 677–687 (2015). 
                  https://doi.org/10.1002/aic.14707
                  
                "><span data-dcnode-id="4828" instrument_node="">32</span></a><span data-dcnode-id="4826" instrument_node="">]. The main conclusion of this study was that prediction of water adsorption in MOFs with open-metal sites is particularly sensitive to the selected water molecular model [</span><a aria-label="Reference 32" data-dcnode-id="4824" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d136475424e1658" title="Peng, X., Lin, L.-C., Sun, W., Smit, B.: Water adsorption in metal–organic frameworks with open-metal sites. AIChE J. 61(2), 677–687 (2015). 
                  https://doi.org/10.1002/aic.14707
                  
                "><span data-dcnode-id="4825" instrument_node="">32</span></a><span data-dcnode-id="4823" instrument_node="">].</span></p><p data-dcnode-id="4796"><span data-dcnode-id="4821" instrument_node="">With the dramatic scenario for water demand shortly, this study's main objective is to develop an efficient technology that allows water harvesting from the air. This technology will be adsorption based and will exploit the potential of new emerging materials, namely Al-MOF MIL-160. MOFs containing Al nodes have been investigated and applied in different fields. Indeed, their characteristics, such as high hydrothermal stability, low-cost, and non-toxic nature, make them eligible adsorbents for water vapor capture [</span><a aria-label="Reference 4" data-dcnode-id="4819" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d136475424e1664" title="Cadiau, A., Lee, J.S., Damasceno Borges, D., Fabry, P., Devic, T., Wharmby, M.T., Martineau, C., Foucher, D., Taulelle, F., Jun, C.H., Hwang, Y.K., Stock, N., De Lange, M.F., Kapteijn, F., Gascon, J., Maurin, G., Chang, J.S., Serre, C.: Design of hydrophilic metal organic framework water adsorbents for heat reallocation. Adv. Mater. (Deerfield Beach, Fla) 27(32), 4775–4780 (2015). 
                  https://doi.org/10.1002/adma.201502418
                  
                "><span data-dcnode-id="4820" instrument_node="">4</span></a><span data-dcnode-id="4818" instrument_node="">, </span><a aria-label="Reference 12" data-dcnode-id="4816" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d136475424e1667" title="Gaab, M., Trukhan, N., Maurer, S., Gummaraju, R., Müller, U.: The progression of Al-based metal-organic frameworks—From academic research to industrial production and applications. Microporous Mesoporous Mater. 157, 131–136 (2012). 
                  https://doi.org/10.1016/j.micromeso.2011.08.016
                  
                "><span data-dcnode-id="4817" instrument_node="">12</span></a><span data-dcnode-id="4815" instrument_node="">, </span><a aria-label="Reference 44" data-dcnode-id="4813" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d136475424e1670" title="Tannert, N., Jansen, C., Nießing, S., Janiak, C.: Robust synthesis routes and porosity of the Al-based metal–organic frameworks Al-fumarate, CAU-10-H and MIL-160. Dalton Trans. 48(9), 2967–2976 (2019). 
                  https://doi.org/10.1039/C8DT04688C
                  
                "><span data-dcnode-id="4814" instrument_node="">44</span></a><span data-dcnode-id="4812" instrument_node="">]. Minding the conclusion of Kalmutzki, the potential of shaped Al-MOF MIL-160 for water capture from the air by cyclic adsorption processes is assessed. Herein, adsorption equilibrium data of carbon dioxide (CO</span><sub data-dcnode-id="4810"><span data-dcnode-id="4811" instrument_node="">2</span></sub><span data-dcnode-id="4809" instrument_node="">), oxygen (O</span><sub data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">2</span></sub><span data-dcnode-id="4806" instrument_node="">), nitrogen (N</span><sub data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">2</span></sub><span data-dcnode-id="4803" instrument_node="">), and H</span><sub data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">2</span></sub><span data-dcnode-id="4800" instrument_node="">O vapor were measured. Fixed-bed experiments were carried out at 298&nbsp;K to study the dynamic adsorption of H</span><sub data-dcnode-id="4798"><span data-dcnode-id="4799" instrument_node="">2</span></sub><span data-dcnode-id="4797" instrument_node="">O vapor on the adsorbent. Diffuse Reflectance Infrared Fourier Transform Spectroscopy (DRIFTS) measurements were performed to evaluate water adsorption/desorption and the effect of temperature in the regeneration of the material. A mathematical model was developed to predict the dynamic adsorption behavior of MIL-160(Al) granules. The optimal conditions of a Temperature Swing Adsorption (TSA) process were obtained by optimizing the process to achieve maximum water productivity.</span></p></div></div></section><section data-dcnode-id="4601" data-gtm-vis-first-on-screen-50443292_562="627" data-gtm-vis-first-on-screen-50443292_563="627" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="627" data-gtm-vis-recent-on-screen-50443292_563="627" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Materials and methods"><div class="c-article-section" data-dcnode-id="4602" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4791" id="Sec2"><span data-dcnode-id="4792" instrument_node="">Materials and methods</span></h2><div class="c-article-section__content" data-dcnode-id="4603" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="4789" id="Sec3"><span data-dcnode-id="4790" instrument_node="">MIL-160(Al) and gases</span></h3><p data-dcnode-id="4781"><span data-dcnode-id="4788" instrument_node="">The Korea Research Institute of Chemical Technology (KRICT) partner provided MIL-160(Al) granules (Fig.&nbsp;</span><a data-dcnode-id="4786" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4787" instrument_node="">1</span></a><span data-dcnode-id="4785" instrument_node="">a). The material was synthesized at a large-scale, and the preparation was performed following the procedure described by Permyakova et al. [</span><a aria-label="Reference 33" data-dcnode-id="4783" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d136475424e1699" title="Permyakova, A., Skrylnyk, O., Courbon, E., Affram, M., Wang, S., Lee, U.H., Valekar, A.H., Nouar, F., Mouchaham, G., Devic, T., De Weireld, G., Chang, J.-S., Steunou, N., Frère, M., Serre, C.: Synthesis optimization, shaping, and heat reallocation evaluation of the hydrophilic metal–organic framework MIL-160(Al). Chemsuschem 10(7), 1419–1426 (2017). 
                  https://doi.org/10.1002/cssc.201700164
                  
                "><span data-dcnode-id="4784" instrument_node="">33</span></a><span data-dcnode-id="4782" instrument_node="">].</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4748" data-gtm-vis-first-on-screen-50443292_561="627" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="627" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="4749"><figcaption data-dcnode-id="4778"><b class="c-article-section__figure-caption" data-dcnode-id="4779" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="4780" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4760"><div class="c-article-section__figure-item" data-dcnode-id="4773"><a class="c-article-section__figure-link" data-dcnode-id="4774" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/1" rel="nofollow"><picture data-dcnode-id="4775"><source data-dcnode-id="4777" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10450-020-00286-5/MediaObjects/10450_2020_286_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="4776" height="301" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10450-020-00286-5/MediaObjects/10450_2020_286_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4761" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="4762"><span data-dcnode-id="4772" instrument_node="">MIL-160(Al) granules as </span><b data-dcnode-id="4770"><span data-dcnode-id="4771" instrument_node="">a</span></b><span data-dcnode-id="4769" instrument_node=""> provided by KRICT and </span><b data-dcnode-id="4767"><span data-dcnode-id="4768" instrument_node="">b</span></b><span data-dcnode-id="4766" instrument_node=""> the crystal structure of MIL-160(Al) with a blue area representing available pore volume, and aluminum, oxygen, carbon, and hydrogen atoms are represented by pink, red, grey, and white colors, respectively [</span><a aria-label="Reference 1" data-dcnode-id="4764" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d136475424e1718" title="Borges, D.D., Normand, P., Permiakova, A., Babarao, R., Heymans, N., Galvao, D.S., Serre, C., De Weireld, G., Maurin, G.: Gas adsorption and separation by the Al-based metal–organic framework MIL-160. J. Phys. Chem. C 121(48), 26822–26832 (2017). 
                  https://doi.org/10.1021/acs.jpcc.7b08856
                  
                "><span data-dcnode-id="4765" instrument_node="">1</span></a><span data-dcnode-id="4763" instrument_node="">] (Color figure online)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4750"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="4751" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10450-020-00286-5/figures/1" rel="nofollow"><span data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4752" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4753" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4754" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4757" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4756" fill-rule="evenodd"></path><span data-dcnode-id="4755" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4734"><span data-dcnode-id="4747" instrument_node="">The MIL-160(Al) is isostructural to CAU-10 [</span><a aria-label="Reference 38" data-dcnode-id="4745" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d136475424e1732" title="Reinsch, H., van der Veen, M.A., Gil, B., Marszalek, B., Verbiest, T., de Vos, D., Stock, N.: Structures, sorption characteristics, and nonlinear optical properties of a new series of highly stable aluminum MOFs. Chem. Mater. 25(1), 17–26 (2013). 
                  https://doi.org/10.1021/cm3025445
                  
                "><span data-dcnode-id="4746" instrument_node="">38</span></a><span data-dcnode-id="4744" instrument_node="">]. This material is built up from inorganic aluminum helical chains connected by 2,5-furandicarboxylate groups (Fig.&nbsp;</span><a data-dcnode-id="4742" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4743" instrument_node="">1</span></a><span data-dcnode-id="4741" instrument_node="">b) [</span><a aria-label="Reference 4" data-dcnode-id="4739" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d136475424e1738" title="Cadiau, A., Lee, J.S., Damasceno Borges, D., Fabry, P., Devic, T., Wharmby, M.T., Martineau, C., Foucher, D., Taulelle, F., Jun, C.H., Hwang, Y.K., Stock, N., De Lange, M.F., Kapteijn, F., Gascon, J., Maurin, G., Chang, J.S., Serre, C.: Design of hydrophilic metal organic framework water adsorbents for heat reallocation. Adv. Mater. (Deerfield Beach, Fla) 27(32), 4775–4780 (2015). 
                  https://doi.org/10.1002/adma.201502418
                  
                "><span data-dcnode-id="4740" instrument_node="">4</span></a><span data-dcnode-id="4738" instrument_node="">, </span><a aria-label="Reference 50" data-dcnode-id="4736" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d136475424e1741" title="Weiss, A., Reimer, N., Stock, N., Tiemann, M., Wagner, T.: Screening of mixed-linker CAU-10 MOF materials for humidity sensing by impedance spectroscopy. Microporous Mesoporous Mater. 220, 39–43 (2016). 
                  https://doi.org/10.1016/j.micromeso.2015.08.020
                  
                "><span data-dcnode-id="4737" instrument_node="">50</span></a><span data-dcnode-id="4735" instrument_node="">]. As in CAU-10, the helical chains are formed by the bridge between hydroxyl ions with the Al centers. The 3D framework presents square shape channels with a pore size of 4 to 6&nbsp;Å.</span></p><p data-dcnode-id="4732"><span data-dcnode-id="4733" instrument_node="">Oxygen (purity higher than 99.995%), nitrogen (purity higher than 99.995%), and carbon dioxide (purity higher than 99.998%) were used in the experiments. MOFs were regenerated and activated by purging with helium (He) (purity higher than 99.999%) before the dynamic adsorption experiments. All gases were supplied by L’Air Liquide and were used without any pre-treatment.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4730" id="Sec4"><span data-dcnode-id="4731" instrument_node="">Adsorption equilibrium isotherms</span></h3><p data-dcnode-id="4716"><span data-dcnode-id="4729" instrument_node="">The adsorption equilibrium isotherms of pure gases were performed in a Rubotherm magnetic suspension microbalance (precision of 0.01&nbsp;mg, Fig. S1). The equipment is described in previous studies of the group [</span><a aria-label="Reference 37" data-dcnode-id="4727" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d136475424e1755" title="Regufe, M.J., Tamajon, J., Ribeiro, A.M., Ferreira, A., Lee, U.H., Hwang, Y.K., Chang, J.S., Serre, C., Loureiro, J.M., Rodrigues, A.E.: Syngas purification by porous amino-functionalized titanium terephthalate MIL-125. Energy Fuels 29(7), 4654–4664 (2015). 
                  https://doi.org/10.1021/acs.energyfuels.5b00975
                  
                "><span data-dcnode-id="4728" instrument_node="">37</span></a><span data-dcnode-id="4726" instrument_node="">]. Before the adsorption measurements, the sample was activated in situ at 423&nbsp;K for 12&nbsp;h under vacuum. The absolute amount of gas adsorbed (</span><span class="mathjax-tex" data-dcnode-id="4721"><span class="MathJax_Preview" data-dcnode-id="4724"><span data-dcnode-id="4725" instrument_node="">q</span></span></span><span data-dcnode-id="4720" instrument_node="">) was calculated by the following equation [</span><a aria-label="Reference 29" data-dcnode-id="4718" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d136475424e1775" title="Moreira, M.A., Ribeiro, A.M., Ferreira, A.F.P., Rodrigues, A.E.: Cryogenic pressure temperature swing adsorption process for natural gas upgrade. Sep. Purif. Technol. 173, 339–356 (2017). 
                  https://doi.org/10.1016/j.seppur.2016.09.044
                  
                "><span data-dcnode-id="4719" instrument_node="">29</span></a><span data-dcnode-id="4717" instrument_node="">],</span></p><div class="c-article-equation" data-dcnode-id="4707" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="4710"><span class="mathjax-tex" data-dcnode-id="4711"><span class="MathJax_Preview" data-dcnode-id="4714"><span data-dcnode-id="4715" instrument_node="">q = \frac{{\Delta m + \rho_{G} \left( {V_{s} + V_{C} } \right)}}{{m_{S} M_{w} }}\frac{{\rho_{ads} }}{{\rho_{ads} - \rho_{G} }}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4708"><span data-dcnode-id="4709" instrument_node="">
                    (1)
                </span></div></div><p data-dcnode-id="4645"><span data-dcnode-id="4706" instrument_node="">
with </span><span class="mathjax-tex" data-dcnode-id="4701"><span class="MathJax_Preview" data-dcnode-id="4704"><span data-dcnode-id="4705" instrument_node="">{\Delta }_{m}</span></span></span><span data-dcnode-id="4700" instrument_node=""> corresponding to the difference between the mass recorded by the balance and the initial mass; </span><span class="mathjax-tex" data-dcnode-id="4695"><span class="MathJax_Preview" data-dcnode-id="4698"><span data-dcnode-id="4699" instrument_node="">{\rho }_{G}</span></span></span><span data-dcnode-id="4694" instrument_node=""> is the density of the adsorbate gas at the measuring conditions (T, P); </span><span class="mathjax-tex" data-dcnode-id="4689"><span class="MathJax_Preview" data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">{\rho }_{ads}</span></span></span><span data-dcnode-id="4688" instrument_node=""> is the density of the adsorbed phase, assuming that it is equal to the liquid density; </span><span class="mathjax-tex" data-dcnode-id="4683"><span class="MathJax_Preview" data-dcnode-id="4686"><span data-dcnode-id="4687" instrument_node="">{V}_{S}</span></span></span><span data-dcnode-id="4682" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="4677"><span class="MathJax_Preview" data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">{V}_{c}</span></span></span><span data-dcnode-id="4676" instrument_node=""> are the adsorbent volume and the volume of inert parts, respectively; </span><span class="mathjax-tex" data-dcnode-id="4671"><span class="MathJax_Preview" data-dcnode-id="4674"><span data-dcnode-id="4675" instrument_node="">{m}_{S}</span></span></span><span data-dcnode-id="4670" instrument_node=""> is the adsorbent mass, and </span><span class="mathjax-tex" data-dcnode-id="4665"><span class="MathJax_Preview" data-dcnode-id="4668"><span data-dcnode-id="4669" instrument_node="">{M}_{w}</span></span></span><span data-dcnode-id="4664" instrument_node=""> is the adsorbate molecular weight. The adsorption equilibrium criterion was no mass (&lt; 1 × 10</span><sup data-dcnode-id="4662"><span data-dcnode-id="4663" instrument_node="">–4</span></sup><span data-dcnode-id="4661" instrument_node="">&nbsp;mg·s</span><sup data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">−1</span></sup><span data-dcnode-id="4658" instrument_node="">) and pressure variation. The CO</span><sub data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">2</span></sub><span data-dcnode-id="4655" instrument_node="">, N</span><sub data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">2</span></sub><span data-dcnode-id="4652" instrument_node="">, and O</span><sub data-dcnode-id="4650"><span data-dcnode-id="4651" instrument_node="">2</span></sub><span data-dcnode-id="4649" instrument_node=""> adsorption equilibria were measured at 283, 303, and 323&nbsp;K and within the pressure range of 0 to 6&nbsp;bar. Water vapor adsorption equilibrium was assessed at three different temperatures: 303, 323, and 343&nbsp;K. The H</span><sub data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">2</span></sub><span data-dcnode-id="4646" instrument_node="">O vapor was generated in a home-built vapor generator at room temperature and fed into the balance after degassing.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4643" id="Sec5"><span data-dcnode-id="4644" instrument_node="">Fixed-bed adsorption unit</span></h3><p data-dcnode-id="4635"><span data-dcnode-id="4642" instrument_node="">Breakthrough experiments were performed in a bench-scale fixed bed unit at 298&nbsp;K and 1&nbsp;bar (Fig. S2). The stainless-steel column (Table S1) was packed with MIL-160(Al), and both ends of the column were capped with a layer of glass wood. Before the adsorption breakthrough experiments, the adsorbent was activated by heating it to 423&nbsp;K under helium flow for 12&nbsp;h. Initially, the column was pre-conditioned under a flow of dry helium (0.2 SLPM). The adsorption feed consisted of a mixture of dry helium (0.1 SLPM) and helium saturated with water vapor (0.1 SLPM). After saturation of the bed, the regeneration was performed with dry helium (0.2 SLPM). The outlet stream's composition was analyzed throughout the entire experiment by a gas analyzer (GA). This same experimental protocol was repeated for different feed compositions, i.e., CO</span><sub data-dcnode-id="4640"><span data-dcnode-id="4641" instrument_node="">2</span></sub><span data-dcnode-id="4639" instrument_node=""> or N</span><sub data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node="">2</span></sub><span data-dcnode-id="4636" instrument_node=""> saturated with water vapor instead of He.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4633" id="Sec6"><span data-dcnode-id="4634" instrument_node="">Infrared studies</span></h3><p data-dcnode-id="4625"><span data-dcnode-id="4632" instrument_node="">The Fourier transform infrared (FTIR) spectrum of MIL-160(Al) was acquired in a JASCO FT/IR-6800 spectrometer (4000–600&nbsp;cm</span><sup data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node="">−1</span></sup><span data-dcnode-id="4629" instrument_node="">, JASCO Analytical Instruments, USA) equipped with a MIRacle™ Single Reflection ATR accessory (ZnSe crystal plate, PIKE Technologies, USA). The analyses were performed using 256 scans with a resolution of 4&nbsp;cm</span><sup data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node="">−1</span></sup><span data-dcnode-id="4626" instrument_node="">.</span></p><p data-dcnode-id="4614"><span data-dcnode-id="4624" instrument_node="">Water adsorption studies were performed by collecting the Diffuse Reflectance Infrared Fourier Transform (DRIFT) spectra of the material using a Nicolet 510-P FTIR spectrometer (Thermo Fisher Scientific, USA) equipped with a DiffusIR™ diffuse reflection accessory and a chamber (PIKE Technologies, USA). Spectra were collected after 256 scans with a 4&nbsp;cm</span><sup data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">−1</span></sup><span data-dcnode-id="4621" instrument_node=""> resolution, in the spectral range of 4000−400&nbsp;cm</span><sup data-dcnode-id="4619"><span data-dcnode-id="4620" instrument_node="">−1</span></sup><span data-dcnode-id="4618" instrument_node="">. Fig. S3 presents a scheme for the DRIFT set-up. Before collecting the DRIFT spectra, adsorbent granules were grounded into a fine powder and pressed into the sample holder. The samples were analyzed without any dilution. In a typical experiment, the sample was placed inside the chamber, then sealed and continuously purged with helium, and activated under He flow at 423&nbsp;K for 3&nbsp;h. Then, the sample was cooled to 298&nbsp;K and the system was fed with a He flow saturated with water. The spectrum of pure He at ambient temperature (~ 298&nbsp;K) was used as background. After that, the regeneration was performed by promoting water desorption at a controlled temperature ramp. The temperature inside the infrared chamber was increased at a rate of 10&nbsp;K·min</span><sup data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">−1</span></sup><span data-dcnode-id="4615" instrument_node=""> to a pre-determined value.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4612" id="Sec7"><span data-dcnode-id="4613" instrument_node="">Characterization techniques</span></h3><p data-dcnode-id="4604"><span data-dcnode-id="4611" instrument_node="">MIL-160(Al) granules were characterized by scanning electron micrography (SEM), X-ray diffraction (XRD), N</span><sub data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node="">2</span></sub><span data-dcnode-id="4608" instrument_node=""> and CO</span><sub data-dcnode-id="4606"><span data-dcnode-id="4607" instrument_node="">2</span></sub><span data-dcnode-id="4605" instrument_node=""> adsorption at 77&nbsp;K and 273&nbsp;K, respectively, particle crushing strength/hardness measurements, mercury (Hg) porosimetry, and thermogravimetric (TG) analysis. All characterization results are presented as Supporting Information (Figs. S4–S9, and Tables S2, S3).</span></p></div></div></section><section data-dcnode-id="4567" data-title="Theory"><div class="c-article-section" data-dcnode-id="4568" id="Sec8-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4599" id="Sec8"><span data-dcnode-id="4600" instrument_node="">Theory</span></h2><div class="c-article-section__content" data-dcnode-id="4569" id="Sec8-content"><h3 class="c-article__sub-heading" data-dcnode-id="4597" id="Sec9"><span data-dcnode-id="4598" instrument_node="">TSA process model</span></h3><p data-dcnode-id="4586"><span data-dcnode-id="4596" instrument_node="">Material, momentum, and energy balances were used to develop the global mathematical model (Tables S4). The mathematical model describes the dynamic behavior of the bed in the cyclic adsorption process. The following assumptions were taken into consideration to select the essential conservation equations: (i) ideal gas behavior for the fluid phase, (ii) homogeneous temperature inside each particle, (iii) the film model describes the external mass and heat transfer, (iv) mass, heat and velocity gradients in radial direction were neglected, (v) bidisperse porous nature of the adsorbent was considered and expressed by a bi-linear driving force (bi-LDF) with micro and macropores mass diffusion, (vi) the Ergun equation is valid locally and (vii) constant void fraction within the column. Initial and boundary conditions are presented in Table S5. Additionally, the employed adsorption equilibrium models are described in the Supporting Information. More detailed information regarding the mathematical model can be found in previous works [</span><a aria-label="Reference 6" data-dcnode-id="4594" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d136475424e2130" title="Da Silva, F.A., Silva, J.A., Rodrigues, A.E.: A general package for the simulation of cyclic adsorption processes. Adsorption 5(3), 229–244 (1999). 
                  https://doi.org/10.1023/a:1008974908427
                  
                "><span data-dcnode-id="4595" instrument_node="">6</span></a><span data-dcnode-id="4593" instrument_node="">, </span><a aria-label="Reference 35" data-dcnode-id="4591" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d136475424e2133" title="Plaza, M.G., Ribeiro, A.M., Ferreira, A., Santos, J.C., Lee, U.H., Chang, J.-S., Loureiro, J.M., Rodrigues, A.E.: Propylene/propane separation by vacuum swing adsorption using Cu-BTC spheres. Sep. Purif. Technol. 90, 109–119 (2012). 
                  https://doi.org/10.1016/j.seppur.2012.02.023
                  
                "><span data-dcnode-id="4592" instrument_node="">35</span></a><span data-dcnode-id="4590" instrument_node="">, </span><a aria-label="Reference 39" data-dcnode-id="4588" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d136475424e2136" title="Ribeiro, A.M., Campo, M.C., Narin, G., Santos, J.C., Ferreira, A., Chang, J.S., Hwang, Y.K., Seo, Y.K., Lee, U.H., Loureiro, J.M., Rodrigues, A.E.: Pressure swing adsorption process for the separation of nitrogen and propylene with a MOF adsorbent MIL-100(Fe). Sep. Purif. Technol. 110, 101–111 (2013). 
                  https://doi.org/10.1016/j.seppur.2013.03.009
                  
                "><span data-dcnode-id="4589" instrument_node="">39</span></a><span data-dcnode-id="4587" instrument_node="">]. The mathematical model was implemented in gPROMS software (Process Systems Enterprise, UK) with the axial domain discretized using second-order polynomials orthogonal collocation on 200 finite elements as a numerical method. The model was validated against the experimental data obtained in the fixed-bed bench-scale.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4584" id="Sec10"><span data-dcnode-id="4585" instrument_node="">Objective function—definition</span></h3><p data-dcnode-id="4579"><span data-dcnode-id="4583" instrument_node="">The definition of the objective function in the optimization process is an essential factor. To maximize TSA water productivity (</span><i data-dcnode-id="4581"><span data-dcnode-id="4582" instrument_node="">Pr</span></i><span data-dcnode-id="4580" instrument_node="">, the quality parameter) is necessary to describe the unit operating variables, which in this case, is the duration of each step. However, achieving a global optimum for those parameters is a difficult task; thus, the optimization problem should be designed in a way to get as close as possible to the global optimum. Therefore, it is proposed to apply an objective function with penalties, namely a constant penalty is applied to a solution that violates the initially defined constraints. Hence, the objective function is defined as:</span></p><div class="c-article-equation" data-dcnode-id="4570" id="Equ2"><div class="c-article-equation__content" data-dcnode-id="4573"><span class="mathjax-tex" data-dcnode-id="4574"><span class="MathJax_Preview" data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">min\;(J) = \sum\limits_{k}^{nk} {\left( {\frac{1}{{\Pr_{k} }}} \right)}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4571"><span data-dcnode-id="4572" instrument_node="">
                    (2)
                </span></div></div></div></div></section><section data-dcnode-id="3465" data-title="Results and discussion"><div class="c-article-section" data-dcnode-id="3466" id="Sec11-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4565" id="Sec11"><span data-dcnode-id="4566" instrument_node="">Results and discussion</span></h2><div class="c-article-section__content" data-dcnode-id="3467" id="Sec11-content"><h3 class="c-article__sub-heading" data-dcnode-id="4563" id="Sec12"><span data-dcnode-id="4564" instrument_node="">Adsorption equilibrium isotherms</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="4552" id="Sec13"><span data-dcnode-id="4562" instrument_node="">O</span><sub data-dcnode-id="4560"><span data-dcnode-id="4561" instrument_node="">2</span></sub><span data-dcnode-id="4559" instrument_node="">, N</span><sub data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">2</span></sub><span data-dcnode-id="4556" instrument_node="">, and CO</span><sub data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">2</span></sub><span data-dcnode-id="4553" instrument_node=""> adsorption equilibrium isotherms</span></h4><p data-dcnode-id="4412"><span data-dcnode-id="4551" instrument_node="">Adsorption equilibrium data of O</span><sub data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">2</span></sub><span data-dcnode-id="4548" instrument_node="">, N</span><sub data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">2</span></sub><span data-dcnode-id="4545" instrument_node="">, and CO</span><sub data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">2</span></sub><span data-dcnode-id="4542" instrument_node=""> were assessed at 283&nbsp;K, 303&nbsp;K, and 323&nbsp;K, on MIL-160(Al) (Fig.&nbsp;</span><a data-dcnode-id="4540" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4541" instrument_node="">2</span></a><span data-dcnode-id="4539" instrument_node="">). The obtained data were fitted to the Langmuir model (Eq. S1—Supporting Information). The parameter estimation was carried out by minimizing the sum of the square of the differences between the predicted and experimental values, using the Excel Solver. Table </span><a data-dcnode-id="4537" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="4538" instrument_node="">1</span></a><span data-dcnode-id="4536" instrument_node=""> presents the Langmuir model parameters for each adsorbate. In all adsorption equilibrium isotherms, no hysteresis is visible. O</span><sub data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">2</span></sub><span data-dcnode-id="4533" instrument_node=""> and N</span><sub data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">2</span></sub><span data-dcnode-id="4530" instrument_node=""> adsorption equilibrium isotherms exhibit an almost linear shape and similar adsorbed amount. The amount adsorbed of O</span><sub data-dcnode-id="4528"><span data-dcnode-id="4529" instrument_node="">2</span></sub><span data-dcnode-id="4527" instrument_node=""> and N</span><sub data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">2</span></sub><span data-dcnode-id="4524" instrument_node=""> on MIL-125(Ti)_NH</span><sub data-dcnode-id="4522"><span data-dcnode-id="4523" instrument_node="">2</span></sub><span data-dcnode-id="4521" instrument_node=""> are very comparable, probably due to their similar molecular properties such as kinetic diameters (3.46&nbsp;Å and 3.64&nbsp;Å for O</span><sub data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">2</span></sub><span data-dcnode-id="4518" instrument_node=""> and N</span><sub data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">2</span></sub><span data-dcnode-id="4515" instrument_node="">, respectively) and polarizability (1.58 × 10</span><sup data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">–30</span></sup><span data-dcnode-id="4512" instrument_node=""> m</span><sup data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">3</span></sup><span data-dcnode-id="4509" instrument_node=""> and 1.74 × 10</span><sup data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">–30</span></sup><span data-dcnode-id="4506" instrument_node=""> m</span><sup data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">3</span></sup><span data-dcnode-id="4503" instrument_node=""> for O</span><sub data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">2</span></sub><span data-dcnode-id="4500" instrument_node=""> and N</span><sub data-dcnode-id="4498"><span data-dcnode-id="4499" instrument_node="">2</span></sub><span data-dcnode-id="4497" instrument_node="">, respectively) affecting the affinity towards material [</span><a aria-label="Reference 8" data-dcnode-id="4495" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d136475424e2288" title="de Visser, S.P.: Polarizability-based equation of state: application to CO, N2 and O2. Chem. Phys. Lett. 515(1), 170–172 (2011). 
                  https://doi.org/10.1016/j.cplett.2011.07.039
                  
                "><span data-dcnode-id="4496" instrument_node="">8</span></a><span data-dcnode-id="4494" instrument_node="">, </span><a aria-label="Reference 30" data-dcnode-id="4492" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d136475424e2291" title="Park, Y.-J., Lee, S.-J., Moon, J.-H., Choi, D.-K., Lee, C.-H.: Adsorption equilibria of O2, N2, and Ar on carbon molecular sieve and zeolites 10X, 13X, and LiX. J. Chem. Eng. Data 51(3), 1001–1008 (2006). 
                  https://doi.org/10.1021/je050507v
                  
                "><span data-dcnode-id="4493" instrument_node="">30</span></a><span data-dcnode-id="4491" instrument_node="">, </span><a aria-label="Reference 34" data-dcnode-id="4489" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d136475424e2294" title="Pillai, R.S., Peter, S.A., Jasra, R.V.: Adsorption of carbon dioxide, methane, nitrogen, oxygen and argon in NaETS-4. Microporous Mesoporous Mater. 113(1), 268–276 (2008).
