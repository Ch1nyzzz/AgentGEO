/b></td><td data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">240 Volts Volts</span></td></tr></tbody></table><span data-dcnode-id="709" instrument_node=""> </span><a class="reviews-button rds_hl_nofollow" data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B0047V0KSU/%3Ftag%3Dtanklessreview00-20%23customerReviews" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="708" instrument_node="">Read Verified Customers Reviews</span></a></div></div><figure class="wp-block-table" data-dcnode-id="646"><table data-dcnode-id="647"><tbody data-dcnode-id="648"><tr data-dcnode-id="698"><td data-dcnode-id="701"><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Temperature rise</span></strong><span data-dcnode-id="702" instrument_node="">/Groundwater temp</span></td><td data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Max flow rate (GPM)</span></td></tr><tr data-dcnode-id="691"><td data-dcnode-id="694"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">68</span></strong><span data-dcnode-id="695" instrument_node="">/42°F</span></td><td data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">2</span></td></tr><tr data-dcnode-id="684"><td data-dcnode-id="687"><strong data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">63</span></strong><span data-dcnode-id="688" instrument_node="">/47°F</span></td><td data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">2.1</span></td></tr><tr data-dcnode-id="677"><td data-dcnode-id="680"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">55</span></strong><span data-dcnode-id="681" instrument_node="">/55°F</span></td><td data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">2.5</span></td></tr><tr data-dcnode-id="670"><td data-dcnode-id="673"><strong data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">48</span></strong><span data-dcnode-id="674" instrument_node="">/62°F</span></td><td data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">2.9</span></td></tr><tr data-dcnode-id="663"><td data-dcnode-id="666"><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">43</span></strong><span data-dcnode-id="667" instrument_node="">/67°F</span></td><td data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">3.2</span></td></tr><tr data-dcnode-id="656"><td data-dcnode-id="659"><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">38</span></strong><span data-dcnode-id="660" instrument_node="">/72°F</span></td><td data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">3.7</span></td></tr><tr data-dcnode-id="649"><td data-dcnode-id="652"><strong data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">33</span></strong><span data-dcnode-id="653" instrument_node="">/77°F</span></td><td data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">4.4</span></td></tr></tbody></table></figure><p data-dcnode-id="641"><span data-dcnode-id="645" instrument_node="">This is probably the best electric tankless water heater for medium-sized households. For such a low price it provides an astonishing </span><strong data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">real 4.5 GPM</span></strong><span data-dcnode-id="642" instrument_node=""> flow rate. In northern states, it can achieve up to 2.3 GPM. And that’s not just naked specs. The owners we interviewed and people on Amazon with verified purchases also say it can handle that amount of hot water without losing much water pressure.</span></p><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">&nbsp;It requires two 40 amps breakers and 2 x 8 AWG wires and a 240 V circuit.</span></p><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">If you live in the southern states you can be sure that this unit can easily handle a mid-size household with two showers plus maybe a laundry used at the same time. But as always, it all depends on the temperature of the incoming water. The lower the temperature, the more the tankless heater has to work, the lower the flow rate it will be able to provide hot water at the set temperature.</span></p><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">If you’re not sure about the capabilities, check out other Ecosmart models with greater performance, like Ecosmart 27 which provides up to 6.5 GPM.</span></p><div class="expert-review expert-review--color-purple-1" data-dcnode-id="611"><section class="expert-review-pluses-minuses" data-dcnode-id="612"><div class="expert-review-block" data-dcnode-id="621"><div class="expert-review-pluses-minuses-header" data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Pros</span></div><div class="expert-review-pluses" data-dcnode-id="622"><div class="expert-review-plus" data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">The unit got almost 2 thousand positive reviews on Amazon</span></div><div class="expert-review-plus" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Lifetime warranty</span></div><div class="expert-review-plus" data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">It’s very quiet and starts working slowly</span></div><div class="expert-review-plus" data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">It has a self-modulating system that adjusts heat to the current demand. It will not heat the water more than required</span></div><div class="expert-review-plus" data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">It supports a remote which gives you control overflow temperature</span></div></div></div><div class="expert-review-block" data-dcnode-id="613"><div class="expert-review-pluses-minuses-header" data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Cons</span></div><div class="expert-review-minuses" data-dcnode-id="614"><div class="expert-review-minus" data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">If you don’t have enough circuit load capacity (200+ amps) it may cause some trouble</span></div><div class="expert-review-minus" data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">You can only be qualified for the warranty if the unit installed by professionals, which sometimes is not cheap at all</span></div></div></div></section></div><hr class="wp-block-separator is-style-wide" data-dcnode-id="610"><span class="uag-toc__heading-anchor" data-dcnode-id="609" id="how-to-select-the-right-tankless-water-heater-buying-guide"></span><h2 data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">How to Select The Right Tankless Water Heater: Buying Guide</span></h2><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">If you’re new to all this stuff, chances are you’re very confused right now and don’t even know where to start from. And you’re probably asking yourself: “what should I look for when buying a tankless water heater”?&nbsp;</span></p><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Easy peasy! Just follow this easy 3-steps guide and find out how to choose the right tankless water heater for your needs.</span></p><span class="uag-toc__heading-anchor" data-dcnode-id="602" id="step-1-decide-which-fuel-source-you-are-going-to-use"></span><h3 data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Step 1: Decide which fuel source you are going to use</span></h3><p data-dcnode-id="589"><span data-dcnode-id="599" instrument_node="">The first thing you need to know is that there are 4 types of tankless water heaters by fuel source: </span><a class="rank-math-link" data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tankless.review/best-gas-tankless-water-heaters"><span data-dcnode-id="598" instrument_node="">natural gas</span></a><span data-dcnode-id="596" instrument_node="">, </span><a class="rank-math-link" data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tankless.review/best-electric-tankless-water-heaters"><span data-dcnode-id="595" instrument_node="">electric</span></a><span data-dcnode-id="593" instrument_node="">, </span><a class="rank-math-link" data-dcnode-id="591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tankless.review/best-propane-tankless-water-heater"><span data-dcnode-id="592" instrument_node="">propane</span></a><span data-dcnode-id="590" instrument_node="">, and solar. The last one is very new and expensive right now. So we’re only looking at those three.</span></p><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Every household is different. I can’t tell you exactly which fuel source is better for your situation. But here are some factors to consider when making this decision:</span></p><ul data-dcnode-id="575"><li data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Is there a convenient natural gas source available at your house? Residential tankless water heaters may use up to 199,000 BTU in power. You need to make sure that your system can handle the load. But keep in mind, that 199,000 BTU is the peak number, so use it as a maximum borderline.</span></li><li data-dcnode-id="580"><span data-dcnode-id="584" instrument_node="">Do you have enough electric service capacity? If you’re considering a </span><a class="rank-math-link" data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tankless.review/best-electric-tankless-water-heaters/whole-house"><span data-dcnode-id="583" instrument_node="">whole house electric tankless water heater</span></a><span data-dcnode-id="581" instrument_node="">, your service should be about 150-200 amp and have enough space for breakers in your panel. The requirements for point of use tankless water heaters are much much lower though.</span></li><li data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Installation cost. Depending on your previous answers, installation costs may vary a lot. If there is some plumbing or electrician work to be done, you may need to call a professional. Otherwise, you can always do the installation yourself. Tankless water heaters are usually relatively lightweight and easy to install. With some DIY skills and an installation guide, you can easily do it yourself.&nbsp;</span></li><li data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">The difference between electricity costs and gas costs in your area.</span></li></ul><p data-dcnode-id="564"><span data-dcnode-id="574" instrument_node="">Make some calculations and decide what works for you.&nbsp;When you make your decision and choose between </span><a data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tankless.review/best-gas-tankless-water-heaters"><span data-dcnode-id="573" instrument_node="">natural gas</span></a><span data-dcnode-id="571" instrument_node="">, </span><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tankless.review/best-electric-tankless-water-heaters"><span data-dcnode-id="570" instrument_node="">electric</span></a><span data-dcnode-id="568" instrument_node="">, and </span><a class="rank-math-link" data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tankless.review/best-propane-tankless-water-heater"><span data-dcnode-id="567" instrument_node="">propane tankless water heaters</span></a><span data-dcnode-id="565" instrument_node="">, you’re ready for step #2:</span></p><span class="uag-toc__heading-anchor" data-dcnode-id="563" id="step-2-determine-the-right-size-of-a-tankless-water-heater"></span><h3 data-dcnode-id="559"><span data-dcnode-id="562" instrument_node="">Step 2: </span><a class="rank-math-link" data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tankless.review/sizing-guide"><span data-dcnode-id="561" instrument_node="">Determine the right size of a tankless water heater</span></a></h3><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Tankless water heaters are available in many different sizes across all brands.</span></p><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">The biggest size you can have available for residential models is 199,000 BTU.&nbsp;</span></p><div class="important" data-dcnode-id="551"><span data-dcnode-id="554" instrument_node="">Above 200,000 BTU you’re going to need plumbing license called a </span><i data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">boiler operator license</span></i></div><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Sizing a tankless water heater is very different from sizing a tank storage water heater since you can’t run out of hot water. But you do have to consider the peak demand.</span></p><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">If you’re planning to use several appliances that use hot water simultaneously or you need to be able to use more than one shower at a time, you’re going to need a more powerful unit.</span></p><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">The whole process of selecting the right size comes down to three steps:</span></p><ol data-dcnode-id="538"><li data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Determine the peak hot water demand. How much hot water are you going to use at the same time (in gallons per minute)?&nbsp;</span></li><li data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Determine the worst case temperature rise for your region</span></li><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Select the model that satisfies the requirements</span></li></ol><p data-dcnode-id="535"><span data-dcnode-id="537" instrument_node="">That’s all </span><img alt="🙂" class="emoji" data-dcnode-id="536" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f642.svg&amp;raw"></p><p data-dcnode-id="530"><span data-dcnode-id="534" instrument_node="">Now, you may be asking how to do all that. If you’re still wondering </span><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tankless.review/sizing-guide"><span data-dcnode-id="533" instrument_node="">what size tankless water heater do you need</span></a><span data-dcnode-id="531" instrument_node="">, we have a detailed guide about that and a sizing calculator to help you. Just follow the link.</span></p><span class="uag-toc__heading-anchor" data-dcnode-id="529" id="step-3-choose-the-brand"></span><h3 data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Step 3: Choose the brand</span></h3><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Now that you know how big your tankless water heater should be and you’re ready to pick the model, you may notice that there are several models from different brands that suit your requirements.</span></p><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">How to decide which one to choose?</span></p><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">There are many different tankless water heater brands out there. Some of them are:</span></p><ul data-dcnode-id="490"><li data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Rinnai&nbsp;</span></li><li data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Rheem</span></li><li data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Navien</span></li><li data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Noritz</span></li><li data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Ecosmart</span></li><li data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Eccotemp</span></li><li data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Eemax (same as Ecosmart)</span></li><li data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Marey</span></li><li data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Stiebel&nbsp;</span></li><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Camplux</span></li><li data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Black and Decker</span></li><li data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Bosch</span></li><li data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Sio Green</span></li><li data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">A O Smith</span></li><li data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Takagi</span></li></ul><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">You can check out our reviews and pick one on your own, or…</span></p><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">You may ask your local contractors, but they often recommend different brands that they’re used to work with or get paid by. And they make it even harder to choose.</span></p><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">We asked one of our experts. And here are a couple of insights he agreed to share with us:</span></p><div class="expert-review expert-review--color-purple-1" data-dcnode-id="446"><div class="expert-review-expert" data-dcnode-id="447"><div class="expert-review-expert-header" data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Professional Opinion</span></div><div class="expert-review-expert-bio" data-dcnode-id="466"><div class="expert-review-expert-bio__avatar" data-dcnode-id="477"><a data-dcnode-id="478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/Fjcowles/" rel="nofollow noopener" target="_blank"><img alt="Frank J. Cowles" data-dcnode-id="481" data-lazy-src="https://tankless.review/wp-content/uploads/2019/11/Frank.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">&lt;img src="https://tankless.review/wp-content/uploads/2019/11/Frank.jpg" alt="Frank J. Cowles"&gt;</span></noscript></a></div><div class="expert-review-expert-bio__body" data-dcnode-id="471"><div class="expert-review-expert-bio-name" data-dcnode-id="474"><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/Fjcowles/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="476" instrument_node="">Frank J. Cowles</span></a></div><div class="expert-review-expert-bio-description" data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Frank J. Cowles is a NY-based HVAC professional with 20+ years of experience in the industry</span></div></div><div class="expert-review-expert-bio__button" data-dcnode-id="467"><span data-dcnode-id="470" instrument_node=""> </span><span class="expert-review-button js-expert-review-button" data-dcnode-id="468" data-settings="{&quot;type&quot;:&quot;popup&quot;,&quot;expertType&quot;:&quot;expert_id&quot;,&quot;expertId&quot;:&quot;2&quot;,&quot;use_phone&quot;:0,&quot;link&quot;:&quot;&quot;}"><span data-dcnode-id="469" instrument_node="">Ask Question</span></span></div></div><div class="expert-review-expert-text" data-dcnode-id="448"><span data-dcnode-id="465" instrument_node=""> For many contractors, the brand they’ll recommend is based on what they can get parts and support for. </span><br data-dcnode-id="464"><span data-dcnode-id="463" instrument_node=""> </span><br data-dcnode-id="462"><span data-dcnode-id="461" instrument_node=""> Myself – I prefer Rinnai and Bosch. Rinnai has people on call – even on weekends – to offer contractors support on troubleshooting. </span><br data-dcnode-id="460"><span data-dcnode-id="459" instrument_node=""> </span><br data-dcnode-id="458"><span data-dcnode-id="457" instrument_node=""> Bosch has higher efficiency and more adaptive intelligence in its operating software than most. Are Navien, Nortz, or the other bad units? No. Navien supports their products very well. The others vary based on brand. </span><br data-dcnode-id="456"><span data-dcnode-id="455" instrument_node=""> </span><br data-dcnode-id="454"><span data-dcnode-id="453" instrument_node=""> In the end – buy your contractor. If you feel comfortable with him and know he’ll be there when you need him – go with the unit he recommends. One word of caution – beware of those that do not own or use a combustion analyzer. </span><br data-dcnode-id="452"><span data-dcnode-id="451" instrument_node=""> </span><br data-dcnode-id="450"><span data-dcnode-id="449" instrument_node=""> The 90%+ plus unit MUST be tested and tuned to run properly. Bosch has that as an internal function done as part of commissioning. Most other brands do not and will fail early if not commissioned properly.</span></div></div></div><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">As you can see, there’s no one best of all brands. Each brand has its own strengths and weaknesses.&nbsp;</span></p><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">But you still need to choose one, right? Personally I would recommend these: Rinnai for natural gas, Ecosmart or Stiebel for electric, and Rinnai or Eccotemp for propane. That’s why they’re on our list of best tankless water heaters.&nbsp;</span></p><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Just go to our comparison table and simply choose the model using our checklist:</span></p><ol data-dcnode-id="433"><li data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Filter them by fuel source</span></li><li data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Check if the model can handle your hot water demand at the temperature rise at your home (we have convenient tables for this under each individual review).</span></li><li data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Check if the price satisfies you and buy the unit.</span></li></ol><span class="uag-toc__heading-anchor" data-dcnode-id="432" id="pros-and-cons-of-tankless-water-heaters"></span><h2 data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Pros And Cons Of Tankless Water Heaters</span></h2><p data-dcnode-id="425"><span data-dcnode-id="429" instrument_node="">Tankless water heaters are great! But I believe that customers should make informed decisions. So here are some quick facts about the advantages and disadvantages. Find out </span><strong data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">what is good and what is bad</span></strong><span data-dcnode-id="426" instrument_node=""> about tankless water heaters:</span></p><figure class="wp-block-table" data-dcnode-id="386"><table data-dcnode-id="387"><thead data-dcnode-id="419"><tr data-dcnode-id="420"><th data-dcnode-id="423" scope="col"><span data-dcnode-id="424" instrument_node="">Pros of tankless water heaters</span></th><th data-dcnode-id="421" scope="col"><span data-dcnode-id="422" instrument_node="">Cons of tankless water heaters</span></th></tr></thead><tbody data-dcnode-id="388"><tr data-dcnode-id="414"><td data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Higher efficiency</span></td><td data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Require annual maintenance</span></td></tr><tr data-dcnode-id="409"><td data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Compact sizes</span></td><td data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">May require prior setup work</span></td></tr><tr data-dcnode-id="404"><td data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Endless hot water</span></td><td data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Limited flow rate</span></td></tr><tr data-dcnode-id="399"><td data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Long-term energy costs saving</span></td><td data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Higher upfront costs</span></td></tr><tr data-dcnode-id="394"><td data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">They last longer</span></td><td data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="389"><td data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Environmentally friendly</span></td><td data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">&nbsp;</span></td></tr></tbody></table></figure><span class="uag-toc__heading-anchor" data-dcnode-id="385" id="[advantage]-tankless-water-heaters-are-more-efficient"></span><h3 data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">[Advantage]: Tankless water heaters are more efficient</span></h3><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">A tank may heat and reheat the water even when you’re not at home.&nbsp;</span></p><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Tankless water heaters operate strictly on-demand. This means you only heat water when you need it. When you don’t need it, the unit does not consume any energy.&nbsp;</span></p><span class="uag-toc__heading-anchor" data-dcnode-id="378" id="[advantage]-tankless-water-heaters-save-space"></span><h3 data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">[Advantage]: Tankless water heaters save space</span></h3><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Unlike big tank water heaters, tankless units do not take a lot of space. You just mount a little box on the wall or under a sink and you’ve plenty of space left for your utilities.</span></p><span class="uag-toc__heading-anchor" data-dcnode-id="373" id="[advantage]-endless-hot-water"></span><h3 data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">[Advantage]: Endless hot water</span></h3><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">When the demand is high, tank water heaters may run out of hot water, leaving you in the cold. But tankless water heaters heat water as it goes through the pipes, giving you an endless supply of hot water for the whole family.</span></p><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">So if you like those 30-minutes long showers, tankless water heaters are your best choice.&nbsp;</span></p><span class="uag-toc__heading-anchor" data-dcnode-id="366" id="[advantage]-tankless-water-heaters-save-money-by-reducing-energy-costs"></span><h3 data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">[Advantage]: Tankless water heaters save money by reducing energy costs&nbsp;</span></h3><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Of course, if you don’t have a large house or several kids who use the hot water heater a lot, you may not see a ton of money saved in your natural gas bill. But it will still go lower!&nbsp; Because you are only using hot water when you wash dishes, clothes, or take a shower. You don’t have it all on all the time. And you don’t have a huge 50-60-75 gallons tanks constantly being heated up.&nbsp;</span></p><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">The savings may not be big month to month, but over time you’ll see how a tankless water heater is a great investment of your money.</span></p><span class="uag-toc__heading-anchor" data-dcnode-id="359" id="[advantage]-tankless-water-heaters-last-longer"></span><h3 data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">[Advantage]: Tankless water heaters last longer</span></h3><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Tankless water heaters usually last twice as long as your typical tank water heaters. And if you use a water softener or just have soft water it may serve you up to 3 times longer. The average lifespan of a tankless unit is around 20-25 years.&nbsp;</span></p><span class="uag-toc__heading-anchor" data-dcnode-id="354" id="[advantage]-tankless-water-heaters-are-environmentally-friendly"></span><h3 data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">[Advantage]: Tankless water heaters are environmentally friendly</span></h3><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">You’re drastically reducing CO2 footprint of your household if you’re using tankless water heaters. Since they heat water on demand, they use less fuel to heat the same amount of water.&nbsp;</span></p><span class="uag-toc__heading-anchor" data-dcnode-id="349" id="[disadvantage]-tankless-water-heaters-require-annual-maintenance"></span><h3 data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">[Disadvantage]: Tankless water heaters require annual maintenance</span></h3><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">The problem with tankless water heaters is that they require maintenance.&nbsp;</span></p><p data-dcnode-id="340"><span data-dcnode-id="344" instrument_node="">The </span><strong data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">maintenance cost</span></strong><span data-dcnode-id="341" instrument_node=""> really depends on the water. The harder it is the more maintenance it’s going to require.&nbsp;</span></p><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">If you use well water and you have a family of 3 to 5 kids and you use hot water a lot, you’d probably need to flush your tankless once a year.&nbsp;</span></p><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">It’s relatively easy. You just get a solution pumped through the burner system. It’s going to remove all that calcium deposits from hard water.&nbsp;</span></p><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">If you have 2 to 3 people in your house, you’d need to do the procedure once every 2 to 3 years.</span></p><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">You can make it work longer without flushing the system if you use a water softener system or you just have soft water. This way you may never even need to flush the water heater.&nbsp;&nbsp;</span></p><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Maintenance is VERY easy with modern tankless water heaters. Many of them have a little LCD screen where you can see the output temperature of the water. When something is wrong or broken, it shows an error code which you can google online, or call a plumber, or call the manufacturer. It’s really handy and you don’t have to worry about ANYTHING.&nbsp;</span></p><span class="uag-toc__heading-anchor" data-dcnode-id="329" id="[disadvantage]-they-may-also-require-prior-setup-work"></span><h3 data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">[Disadvantage]: They may also require prior setup work</span></h3><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">If you live in an old house, your gas line or electric service may need an upgrade if you decide to go tankless. Sometimes costing you more than you can save. (Spoiler: the convenience of endless hot water on demand worth it!)</span></p><span class="uag-toc__heading-anchor" data-dcnode-id="324" id="[disadvantage]-they-have-limited-flow-rate"></span><h3 data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">[Disadvantage]: They have limited flow rate</span></h3><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">My clients almost never remember to pay attention to this parameter when they choose a tankless for their home. But it may become an issue for you. Especially in winter if you live in a colder climate region. The problem is that when the flow is too low, the unit may not be activated and you’ll get colder water. It’s almost never a thing for modern (and more expensive) tankless water heaters because their minimum flow rate is at 0.26-0.3 GPM. But if you choose to buy an older model you may end up with cold water when you want to wash your hands.</span></p><span class="uag-toc__heading-anchor" data-dcnode-id="319" id="[disadvantage]-tankless-water-heaters-cost-more-than-storage-tank"></span><h3 data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">[Disadvantage]: Tankless water heaters cost more than storage tank</span></h3><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Tankless water heaters are usually more expensive than tank-type water heaters. But it’s a great investment if you count the costs over time.</span></p><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">They’re available in a wide range of prices. It really depends on the type and size of a tankless water heater. The bigger you choose, the more expensive it will be. You really pay for what you get.</span></p><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">If a tankless unit seems too expensive for you, it might be because it already has a special feature, like a built-in recirculation pump or smart technology. You can choose a cheaper option, but are you really sure you won’t pay more in the future?</span></p><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">For example, a built-in recirculation pump solves the problem of a cold water sandwich and supplies you with instant hot water.&nbsp;It decreases the amount of draining water and reduces your water and energy bills.</span></p><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">A few thousand dollars right out of the pocket is never cheap. But it’s not that big of a deal when you compare it to overtime cost of having two or three tank water heaters.</span></p><span class="uag-toc__heading-anchor" data-dcnode-id="306" id="additional-requirements-for-electric-units"></span><h3 data-dcnode-id="304" id="15-additional-requirements-for-electric-units"><span data-dcnode-id="305" instrument_node="">Additional requirements for electric units</span></h3><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Before choosing a tankless water heater find out if your home has the necessary electrical requirements to support the unit you need.</span></p><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Since they have greater voltage requirements, you may need to have a qualified install upgraded breakers and thicker gauge wiring to handle an increase in power.</span></p><ul data-dcnode-id="288"><li data-dcnode-id="297"><em data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">How many amps do you need?</span></em></li><li data-dcnode-id="293"><em data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">What size breaker do I need?</span></em><span data-dcnode-id="294" instrument_node="">&nbsp;</span></li><li data-dcnode-id="289"><em data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">What kind of tankless water heaters do I need?</span></em><span data-dcnode-id="290" instrument_node=""> (by Power Source)</span></li></ul><span class="uag-toc__heading-anchor" data-dcnode-id="287" id="frequently-asked-questions-about-tankless-water-heaters"></span><h2 data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Frequently Asked Questions About Tankless Water Heaters</span></h2><div class="rank-math-block" data-dcnode-id="213" id="rank-math-faq"><div class="rank-math-list" data-dcnode-id="214"><div class="rank-math-list-item" data-dcnode-id="275" id="faq-question-1588365372480"><h3 class="rank-math-question" data-dcnode-id="282"><img alt="💲" class="emoji" data-dcnode-id="284" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f4b2.svg&amp;raw"><span data-dcnode-id="283" instrument_node=""> Is a tankless water heater worth it?</span></h3><div class="rank-math-answer" data-dcnode-id="276"><p data-dcnode-id="277"><span data-dcnode-id="281" instrument_node="">Although the upfront costs for buying a tankless water heater is higher, it is more efficient than storage tank water heater, uses less energy and saves you up to $100 on energy costs on average annually. So yes, I think </span><strong data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">tankless water heater totally worth it</span></strong><span data-dcnode-id="278" instrument_node="">.</span></p></div></div><div class="rank-math-list-item" data-dcnode-id="265" id="faq-question-1588365434547"><h3 class="rank-math-question" data-dcnode-id="272"><img alt="🤔" class="emoji" data-dcnode-id="274" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f914.svg&amp;raw"><span data-dcnode-id="273" instrument_node=""> Can a tankless water heater fill a tub?</span></h3><div class="rank-math-answer" data-dcnode-id="266"><p data-dcnode-id="267"><span data-dcnode-id="271" instrument_node="">Yes, a </span><strong data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">tankless water heater can fill a tub</span></strong><span data-dcnode-id="268" instrument_node="">. But you should properly size your system. If you buy a too small tankless water heater it would take ages to fill a tub, since it can provide only so much gallons of hot water per minute.</span></p></div></div><div class="rank-math-list-item" data-dcnode-id="255" id="faq-question-1588365730167"><h3 class="rank-math-question" data-dcnode-id="262"><img alt="⌛" class="emoji" data-dcnode-id="264" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/231b.svg&amp;raw"><span data-dcnode-id="263" instrument_node=""> How long does a tankless hot water heater last?</span></h3><div class="rank-math-answer" data-dcnode-id="256"><p data-dcnode-id="257"><span data-dcnode-id="261" instrument_node=""> Newer models of tankless water heaters have a life expectancy of more than&nbsp;</span><strong data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">25 years</span></strong><span data-dcnode-id="258" instrument_node="">.&nbsp;Compare it to 10-15 years for storage tank water heaters. If you descale your tankless water heater every couple of years, it can last even longer.</span></p></div></div><div class="rank-math-list-item" data-dcnode-id="246" id="faq-question-1588365777351"><h3 class="rank-math-question" data-dcnode-id="252"><img alt="❓" class="emoji" data-dcnode-id="254" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/2753.svg&amp;raw"><span data-dcnode-id="253" instrument_node=""> Do tankless water heaters run out of hot water?</span></h3><div class="rank-math-answer" data-dcnode-id="247"><p data-dcnode-id="248"><strong data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Tankless water heaters never run out of hot water</span></strong><span data-dcnode-id="249" instrument_node=""> because they heat it as the water flows through it.</span></p></div></div><div class="rank-math-list-item" data-dcnode-id="236" id="faq-question-1588365798846"><h3 class="rank-math-question" data-dcnode-id="243"><img alt="💰" class="emoji" data-dcnode-id="245" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f4b0.svg&amp;raw"><span data-dcnode-id="244" instrument_node=""> How much does it cost to install a tankless hot water heater?</span></h3><div class="rank-math-answer" data-dcnode-id="237"><p data-dcnode-id="238"><span data-dcnode-id="242" instrument_node="">The cost totally depends on your contractors. On average </span><strong data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">it costs between $1000 and $2000 to install a tankless water heater</span></strong><span data-dcnode-id="239" instrument_node="">. But the installation process is really easy. With some DIY skills and the installation guide, you can have it installed in several hours or a day.</span></p></div></div><div class="rank-math-list-item" data-dcnode-id="229" id="faq-question-1588365839572"><h3 class="rank-math-question" data-dcnode-id="233"><img alt="🏠" class="emoji" data-dcnode-id="235" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f3e0.svg&amp;raw"><span data-dcnode-id="234" instrument_node=""> Does tankless water heater increase home value?</span></h3><div class="rank-math-answer" data-dcnode-id="230"><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">According to Zillow, homes with tankless water heaters are sold for 4 percent more than their expected value. So, the answer is yes, a tankless water heater increase home value.</span></p></div></div><div class="rank-math-list-item" data-dcnode-id="222" id="faq-question-1588365890748"><h3 class="rank-math-question" data-dcnode-id="226"><img alt="🔧" class="emoji" data-dcnode-id="228" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f527.svg&amp;raw"><span data-dcnode-id="227" instrument_node=""> Do tankless water heaters need maintenance?</span></h3><div class="rank-math-answer" data-dcnode-id="223"><p data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">Tankless water heaters require annual maintenance, which means that it should be done once a year. If you have hard water at your home, tankless water heaters may require maintenance every 6 months. Rinnai have a nice feature for it. It sends an error code when the tankless water heater needs to be flushed due to scale build-up, and shuts down to prevent damage.</span></p></div></div><div class="rank-math-list-item" data-dcnode-id="215" id="faq-question-1588365923909"><h3 class="rank-math-question" data-dcnode-id="219"><img alt="🤑" class="emoji" data-dcnode-id="221" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f911.svg&amp;raw"><span data-dcnode-id="220" instrument_node=""> Do tankless water heaters really save money?</span></h3><div class="rank-math-answer" data-dcnode-id="216"><p data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Although the initial costs are higher than storage tank models, tankless water heaters save money in the long run. According to the U.S. Department of Energy, tankless water heaters can save at least $100 per year.</span></p></div></div></div></div><span data-dcnode-id="212" instrument_node=""> </span><span data-dcnode-id="209" instrument_node=""> </span></div></div></article><div class="comments-area" data-dcnode-id="91"><div data-dcnode-id="92" id="comments"><h3 class="comments-title" data-dcnode-id="204"><span data-dcnode-id="205" instrument_node=""> 2 thoughts on “Tankless Water Heaters Reviews and Rating”</span></h3><ol class="comment-list" data-dcnode-id="130"><li class="comment even thread-even depth-1 parent" data-dcnode-id="131" id="comment-14"><article class="comment-body" data-dcnode-id="174" id="div-comment-14" itemscope="" itemtype="https://schema.org/Comment"><foo tid="14" data-dcnode-id="186" data-postid="16" data-respondelement="respond" href="#comment-14" rel="nofollow"><span data-dcnode-id="187" instrument_node="">Reply</span></a></span></div></div></footer><div class="comment-content" data-dcnode-id="175" itemprop="text"><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">This is THE most comprehensive and honest guide I’ve ever read. Thank you for this.</span></p><p data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">And since I now see you’re an actual expert and not some esl student, I have a question.</span></p><p data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">What tankless model would you suggest for a single bathroom house. There’s only my wife and myself.</span></p></div></article><ul class="children" data-dcnode-id="132"><li class="comment byuser comment-author-tankless bypostauthor odd alt depth-2" data-dcnode-id="133" id="comment-15"><article class="comment-body" data-dcnode-id="134" id="div-comment-15" itemscope="" itemtype="https://schema.org/Comment"><footer class="comment-meta" data-dcnode-id="152"><span data-dcnode-id="173" instrument_node=""> </span><img alt="" class="avatar avatar-50 photo" data-dcnode-id="172" data-lazy-src="https://secure.gravatar.com/avatar/36b25c7fda8b473bfbefbf6153922e28?s=50&amp;d=identicon&amp;r=g" data-lazy-srcset="https://secure.gravatar.com/avatar/36b25c7fda8b473bfbefbf6153922e28?s=100&amp;d=identicon&amp;r=g 2x" height="50" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2050%2050'%3E%3C/svg%3E" width="50"><noscript data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">&lt;img alt='' src='https://secure.gravatar.com/avatar/36b25c7fda8b473bfbefbf6153922e28?s=50&amp;#038;d=identicon&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/36b25c7fda8b473bfbefbf6153922e28?s=100&amp;#038;d=identicon&amp;#038;r=g 2x' class='avatar avatar-50 photo' height='50' width='50' /&gt;</spa t-gas-tankless-water-heaters" rel="ugc"><span data-dcnode-id="144" instrument_node="">natural gas fueled tankless</span></a><span data-dcnode-id="142" instrument_node="">, take a look at Eccotemp i12-NG.</span><br data-dcnode-id="141"><span data-dcnode-id="140" instrument_node=""> If you’re better off with an </span><a data-dcnode-id="138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tankless.review/best-electric-tankless-water-heaters-%25E2%25AD%2590%25E2%25AD%2590%25E2%25AD%2590%25E2%25AD%2590%25E2%25AD%2590" rel="ugc"><span data-dcnode-id="139" instrument_node="">electric powered tankless unit</span></a><span data-dcnode-id="137" instrument_node="">, I’d suggest Ecosmart ECO 11 or ECO 18. It totally depends on your requirements.</span></p></div></article></li></ul></li></ol><div class="comment-respond" data-dcnode-id="93" id="respond"><h3 class="comment-reply-title" data-dcnode-id="125" id="reply-title"><span data-dcnode-id="129" instrument_node="">Leave a Comment </span><small data-dcnode-id="126"><a data-dcnode-id="127" href="#respond" id="cancel-comment-reply-link" rel="nofollow" style="display:none;"><span data-dcnode-id="128" instrument_node="">Cancel reply</span></a></small></h3><form action="https://tankless.review/wp-comments-post.php" class="comment-form" data-dcnode-id="94" id="commentform" method="post" novalidate=""><p class="comment-form-comment" data-dcnode-id="121"><label class="screen-reader-text" data-dcnode-id="123" for="comment"><span data-dcnode-id="124" instrument_node="">Comment</span></label><textarea aria-required="true" cols="45" data-dcnode-id="122" id="comment" name="comment" rows="8"></textarea></p><label class="screen-reader-text" data-dcnode-id="119" for="author"><span data-dcnode-id="120" instrument_node="">Name</span></label><input data-dcnode-id="118" id="author" name="author" placeholder="Name *" size="30" type="text" value=""><span data-dcnode-id="117" instrument_node=""> </span><label class="scree
