n system, no “cold water sandwich” problem</span></div><div class="expert-review-plus" data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">A digital controller that allows to schedule the recirculation to align with usage patterns</span></div><div class="expert-review-plus" data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Multiple venting options</span></div><div class="expert-review-plus" data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Can be used with or without a dedicated recirculation line</span></div><div class="expert-review-plus" data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Less draining water</span></div></div></div><div class="expert-review-block" data-dcnode-id="1378"><div class="expert-review-pluses-minuses-header" data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Cons</span></div><div class="expert-review-minuses" data-dcnode-id="1379"><div class="expert-review-minus" data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">It’s a bit pricey</span></div></div></div></section></div><div class="wp-block-image" data-dcnode-id="1371"><figure class="alignleft size-large is-resized" data-dcnode-id="1372"><img alt="Rinnai RUR199In Installed" class="wp-image-1438 lazyloaded" data-dcnode-id="1375" data-lazy-sizes="(max-width: 384px) 100vw, 384px" data-lazy-src="https://tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater-768x1024.jpg" data-lazy-srcset="https://tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater-768x1024.jpg 768w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater-225x300.jpg 225w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater-1152x1536.jpg 1152w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater.jpg 1200w" data-was-processed="true" height="512" sizes="(max-width: 384px) 100vw, 384px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater-768x1024.jpg&amp;raw" srcset="https://tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater-768x1024.jpg 768w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater-225x300.jpg 225w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater-1152x1536.jpg 1152w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater.jpg 1200w" width="384"><noscript data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">&lt;img src="https://tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater-768x1024.jpg" alt="Rinnai RUR199In Installed" class="wp-image-1438" width="384" height="512" srcset="https://tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater-768x1024.jpg 768w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater-225x300.jpg 225w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater-1152x1536.jpg 1152w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-tankless-natural-gas-water-heater.jpg 1200w" sizes="(max-width: 384px) 100vw, 384px" /&gt;</span></noscript></figure></div><p data-dcnode-id="1366"><span data-dcnode-id="1370" instrument_node="">Being the #1 most popular selling water heaters brand, </span><a aria-label="Rinnai (opens in a new tab)" class="rank-math-link" data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rinnai.us/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1369" instrument_node="">Rinnai</span></a><span data-dcnode-id="1367" instrument_node=""> is very well known in the US and Canada. It provides some of the best performing and the most efficient tankless water heaters on the market.</span></p><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">That’s why Rinnai RUR199iN Ultra Series is a good candidate for first place in our rating of reviews of the best tankless water heaters.&nbsp;</span></p><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">If not for the price, we’d only leave this one model. Rinnai RUR199iN is the best ultra-efficient tankless water heater with an astonishing flow rate of 11 GPM (take a look at the table above for more info).&nbsp;</span></p><p data-dcnode-id="1355"><span data-dcnode-id="1361" instrument_node="">The killer feature of the Rinnai RUR199iN model is that it has a </span><strong data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">built-in recirculation pump</span></strong><span data-dcnode-id="1358" instrument_node="">. It eliminates a significant (and probably the only one) disadvantage that tankless water heaters are known to have. You don’t have to wait for hot water to get to your faucets or shower anymore. With this model, you get </span><strong data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">instant hot water on demand.</span></strong></p><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Here’s what owners say about it:</span></p><div class="expert-review expert-review--color-purple-1" data-dcnode-id="1335"><div class="expert-review-expert" data-dcnode-id="1336"><div class="expert-review-expert-bio" data-dcnode-id="1339"><div class="expert-review-expert-bio__avatar" data-dcnode-id="1349"><img alt="Kelly Widule" class="lazyloaded" data-dcnode-id="1352" data-lazy-src="https://tankless.review/wp-content/uploads/2019/09/image-3.jpg" data-was-processed="true" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tankless.review/wp-content/uploads/2019/09/image-3.jpg&amp;raw"><noscript data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">&lt;img src="https://tankless.review/wp-content/uploads/2019/09/image-3.jpg" alt="Kelly Widule"&gt;</span></noscript></div><div class="expert-review-expert-bio__body" data-dcnode-id="1344"><div class="expert-review-expert-bio-name" data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Kelly Widule</span></div><div class="expert-review-expert-bio-description" data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Mrs. Widule is a proud owner of Rinnai RUR199iN. She kindly agreed to share her personal experience with our readers</span></div></div><div class="expert-review-expert-bio__button" data-dcnode-id="1340"><span data-dcnode-id="1343" instrument_node=""> </span><span class="expert-review-button js-expert-review-button" data-dcnode-id="1341" data-settings="{&quot;type&quot;:&quot;popup&quot;,&quot;expertType&quot;:&quot;expert_id&quot;,&quot;expertId&quot;:&quot;1&quot;,&quot;use_phone&quot;:0,&quot;link&quot;:&quot;&quot;}"><span data-dcnode-id="1342" instrument_node="">Ask Question</span></span></div></div><div class="expert-review-expert-text" data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node=""> We’ve had this unit installed for 2 years in our 2500 sq home with 3 baths and a family of 6. Works flawlessly. The only thing that’s bothering me a little is you do have to wait 5-10 sec more for hot water. But I believe a recirculation pump can solve the delay problem. Also, we live where the ground water temp is at 50 degrees or so which limits the flow rate of the system to 5-6 GPM in cold months. At worst, it may limit how fast I can fill the tub, but it doesn’t prevent operating multiple showers.</span></div></div></div><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Usually, all tankless water heaters instantly heat the water but then the water needs to get delivered to the fixture.</span></p><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">For instance, your master bathroom is 80 feet from the heater. The unit fires up as soon as you open the tap, but you’ve got to evacuate all that cold water that’s in the line.&nbsp;</span></p><p data-dcnode-id="1326"><span data-dcnode-id="1330" instrument_node="">With other models, you’d have to install an additional recirculation pump (which usually needs a dedicated return line), but with the Rinnai RUR199iN Ultra Series model hot water is instantly available in showers, sinks and kitchen appliances like washing machines or dishwashers. Because the pump </span><strong data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">is built in</span></strong><span data-dcnode-id="1327" instrument_node=""> the tankless. You can push a button on the side, or use a motion detector, or a timer, or an app (Rinnai has several options) and as you walk into the master bathroom, the cold water circulates back at the tank and you get instant hot water in your shower. The good thing here is that you don’t have to drain that water anymore, it’s going back to the cold line.</span></p><ul data-dcnode-id="1317"><li data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">You’re going green by saving more water</span></li><li data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">You’re saving more energy, since it has an astonishing 0.96 EF rating, meaning that for every dollar you spend on propane or gas, you get 96 cents back in hot water (compare it to old tank water heaters where you get only around 65% converted to hot water).</span></li><li data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">You’re saving money because you spend less on utility costs related to gas and water usage.&nbsp;&nbsp;</span></li><li data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">You’re getting ENDLESS and INSTANT hot water.&nbsp;</span></li></ul><p data-dcnode-id="1312"><span data-dcnode-id="1316" instrument_node="">But if you’re willing to pay the extra dollar for convenience and instant hot water on demand without waiting (sometimes up to 30-40 seconds), Rinnai RUR199IN is the way to go. </span><em data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">It’s flawless</span></em><span data-dcnode-id="1313" instrument_node="">. 20+ owners that we interviewed for these reviews can vouch for that. Plus you can read all the reviews for this model and make sure that most of the owners are really happy with it.</span></p><h3 data-dcnode-id="1308"><span data-dcnode-id="1311" instrument_node="">2. </span><img alt="🥈" class="emoji" data-dcnode-id="1310" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f948.svg&amp;raw"><span data-dcnode-id="1309" instrument_node=""> Rinnai V65iN</span></h3><figure class="wp-block-image size-full" data-dcnode-id="1304"><img alt="Rinnai V65-IN Tankless Water Heater" class="wp-image-1433" data-dcnode-id="1307" data-lazy-sizes="(max-width: 1980px) 100vw, 1980px" data-lazy-src="https://tankless.review/wp-content/uploads/2020/06/Rinnai-V65iN-Tankless-Water-Heater.jpg" data-lazy-srcset="https://tankless.review/wp-content/uploads/2020/06/Rinnai-V65iN-Tankless-Water-Heater.jpg 1980w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-V65iN-Tankless-Water-Heater-300x194.jpg 300w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-V65iN-Tankless-Water-Heater-1024x662.jpg 1024w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-V65iN-Tankless-Water-Heater-768x496.jpg 768w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-V65iN-Tankless-Water-Heater-1536x993.jpg 1536w" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">&lt;img src="https://tankless.review/wp-content/uploads/2020/06/Rinnai-V65iN-Tankless-Water-Heater.jpg" alt="Rinnai V65-IN Tankless Water Heater" class="wp-image-1433" srcset="https://tankless.review/wp-content/uploads/2020/06/Rinnai-V65iN-Tankless-Water-Heater.jpg 1980w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-V65iN-Tankless-Water-Heater-300x194.jpg 300w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-V65iN-Tankless-Water-Heater-1024x662.jpg 1024w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-V65iN-Tankless-Water-Heater-768x496.jpg 768w, https://tankless.review/wp-content/uploads/2020/06/Rinnai-V65iN-Tankless-Water-Heater-1536x993.jpg 1536w" sizes="(max-width: 1980px) 100vw, 1980px" /&gt;</span></noscript></figure><div class="product-card" data-dcnode-id="1256"><div class="image-block div-block" data-dcnode-id="1295"><span data-dcnode-id="1303" instrument_node=""> </span><a class="rds_hl_nofollow" data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B0084CPEDO/%3Ftag%3Dtanklessreview00-20" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="1302" instrument_node=""> </span><img alt="Picture of Rinnai V65iN on white background" class="rds_hl_nofollow" data-dcnode-id="1301" data-lazy-src="https://m.media-amazon.com/images/I/31acLbwAiML._SL300_.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">&lt;img src="https://m.media-amazon.com/images/I/31acLbwAiML._SL300_.jpg" alt="Picture of Rinnai V65iN on white background" class="rds_hl_nofollow"&gt;</span></noscript><div "="" class="affiliate-button" data-dcnode-id="1297" target="_blank"><span data-dcnode-id="1298" instrument_node="">Check Latest Price</span></div></a></div><div class="features-block div-block" data-dcnode-id="1257"><table data-dcnode-id="1261"><caption class="product-title" data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Rinnai V65iN Features and Specifications:</span></caption><tbody data-dcnode-id="1262"><tr data-dcnode-id="1287"><td class="feature-text" data-dcnode-id="1290"><b data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Fuel Type</span></b></td><td data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Natual Gas</span></td></tr><tr data-dcnode-id="1281"><td class="feature-text" data-dcnode-id="1284"><b data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Efficiency</span></b></td><td data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">0.80</span></td></tr><tr data-dcnode-id="1275"><td class="feature-text" data-dcnode-id="1278"><b data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Product dimensions</span></b></td><td data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">13.9 x 8.8 x 23.6 inches</span></td></tr><tr data-dcnode-id="1269"><td class="feature-text" data-dcnode-id="1272"><b data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Flow rate</span></b></td><td data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">6.5 GPM</span></td></tr><tr data-dcnode-id="1263"><td class="feature-text" data-dcnode-id="1266"><b data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Energy Star® certified</span></b></td><td data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Yes</span></td></tr></tbody></table><span data-dcnode-id="1260" instrument_node=""> </span><a class="reviews-button rds_hl_nofollow" data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B0084CPEDO/%3Ftag%3Dtanklessreview00-20%23customerReviews" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="1259" instrument_node="">Read Verified Customers Reviews</span></a></div></div><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Rinnai RUR199iN is really a king of natural gas tankless water heaters. It is a good tankless water heater, it has great performance and it’s really powerful.</span></p><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">But what if you don’t need so much power? What if you could enjoy the quality of one of the most trusted American brands for a smaller price?</span></p><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Well, you can. Rinnai V65iN is a perfect gas tankless water heater for a household with low to medium hot water demand.</span></p><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">I believe I’m not wrong when I say that Rinnai V65iN offers the best value for the money among other tankless water heaters. It’s almost three times cheaper than the previous model but delivers you 2.5 times more performance for the buck.</span></p><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">The average flow rate of 6.5 GPM is perfect for warmer climates where groundwater temperature doesn’t get freezing cold or/and smaller homes with 1 or 2 bathrooms and lower hot water demand. Six and a half gallons per minute is not a small number though. There are several sizes available on Amazon. So if you size it properly, it can easily handle two simultaneous showers (2.5 GPM each) or a shower and additional appliances, like dishwasher or washing machine.&nbsp;</span></p><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Overall, it’s a great quality for a lower price.&nbsp;</span></p><h3 data-dcnode-id="1240" id="5-----stiebel-eltron-tempra-plus-36-kw-review"><span data-dcnode-id="1243" instrument_node="">3.</span><img alt="🥉" class="emoji" data-dcnode-id="1242" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f949.svg&amp;raw"><span data-dcnode-id="1241" instrument_node e-id="1212" instrument_node="">Product dimensions</span></b></td><td data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">16.5 x 4.6 x 14.5 inches</span></td></tr><tr data-dcnode-id="1201"><td class="feature-text" data-dcnode-id="1204"><b data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Flow rate</span></b></td><td data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">7.5 GPM</span></td></tr><tr data-dcnode-id="1195"><td class="feature-text" data-dcnode-id="1198"><b data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Wattage</span></b></td><td data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">36 kW</span></td></tr><tr data-dcnode-id="1189"><td class="feature-text" data-dcnode-id="1192"><b data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Voltage</span></b></td><td data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">240 Volts</span></td></tr></tbody></table><span data-dcnode-id="1186" instrument_node=""> </span><a class="reviews-button rds_hl_nofollow" data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B07GZ3MFBX/%3Ftag%3Dtanklessreview00-20%23customerReviews" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="1185" instrument_node="">Read Verified Customers Reviews</span></a></div></div><figure class="wp-block-table" data-dcnode-id="1123"><table data-dcnode-id="1124"><tbody data-dcnode-id="1125"><tr data-dcnode-id="1175"><td data-dcnode-id="1178"><strong data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Temperature rise</span></strong><span data-dcnode-id="1179" instrument_node="">/Groundwater temp</span></td><td data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Max flow rate (GPM)</span></td></tr><tr data-dcnode-id="1168"><td data-dcnode-id="1171"><strong data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">68</span></strong><span data-dcnode-id="1172" instrument_node="">/42°F</span></td><td data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">3.7</span></td></tr><tr data-dcnode-id="1161"><td data-dcnode-id="1164"><strong data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">63</span></strong><span data-dcnode-id="1165" instrument_node="">/47°F</span></td><td data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">4.2</span></td></tr><tr data-dcnode-id="1154"><td data-dcnode-id="1157"><strong data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">55</span></strong><span data-dcnode-id="1158" instrument_node="">/55°F</span></td><td data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">4.6</span></td></tr><tr data-dcnode-id="1147"><td data-dcnode-id="1150"><strong data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">48</span></strong><span data-dcnode-id="1151" instrument_node="">/62°F</span></td><td data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">5.2</span></td></tr><tr data-dcnode-id="1140"><td data-dcnode-id="1143"><strong data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">43</span></strong><span data-dcnode-id="1144" instrument_node="">/67°F</span></td><td data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">5.7</span></td></tr><tr data-dcnode-id="1133"><td data-dcnode-id="1136"><strong data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">38</span></strong><span data-dcnode-id="1137" instrument_node="">/72°F</span></td><td data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">6.7</span></td></tr><tr data-dcnode-id="1126"><td data-dcnode-id="1129"><strong data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">33</span></strong><span data-dcnode-id="1130" instrument_node="">/77°F</span></td><td data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">7.5</span></td></tr></tbody></table></figure><p data-dcnode-id="1115"><span data-dcnode-id="1122" instrument_node="">This is yet another good </span><em data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">electric</span></em><span data-dcnode-id="1119" instrument_node=""> tankless water heater from a </span><a aria-label="German brand Stiebel (opens in a new tab)" class="rank-math-link" data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stiebel-eltron-usa.com/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1118" instrument_node="">German brand Stiebel</span></a><span data-dcnode-id="1116" instrument_node=""> – Stiebel Eltron Tempra Plus 36 kW. This is a great alternative for houses with no gas lines or if you just prefer electric water heaters.</span></p><p data-dcnode-id="1105"><span data-dcnode-id="1114" instrument_node="">Tempra Plus series come in different sizes ranging from models with 1 GPM flow rate to 8 GPM in perfect conditions. Maybe in a lab </span><img alt="🙂" class="emoji" data-dcnode-id="1113" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/12.0.0-1/svg/1f642.svg&amp;raw"><span data-dcnode-id="1112" instrument_node=""> But in real life with the temperature rise of 50-60 degrees</span><strong data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node=""> this model</span></strong><span data-dcnode-id="1109" instrument_node=""> will provide a stable flow rate of </span><strong data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">4 to 5 GPM of endless hot water</span></strong><span data-dcnode-id="1106" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">If you haven’t had electric tankless heaters you will probably need to make some adjustments in your electric panel. It requires 3 x 50 amps breakers and 3 x 6/2 AWG cables.&nbsp;</span></p><div class="important" data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">This model can potentially use 150 amps, so make sure you have enough capacity</span></div><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Stiebel Tempra Plus 36 is really tiny and can fit just about everywhere.&nbsp;</span></p><p data-dcnode-id="1091"><span data-dcnode-id="1098" instrument_node="">When we prepared our tankless heater reviews, the most common question about this unit was </span><em data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">if it can fill a bathtub with hot water</span></em><span data-dcnode-id="1095" instrument_node="">. The answer is clear </span><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">YES</span></strong><span data-dcnode-id="1092" instrument_node="">. 4-5 GPM is definitely enough for a bathtub. Moreover, we interviewed some owners from Missouri (with an average groundwater temp around 52-57 degrees Fahrenheit) and they’ve said that it could easily supply a house with 2 bathrooms, laundry, and a kitchen with hot water. With the air temperature in the 60-65 degrees, it was able to supply 2 showers running at the same time. There was some reduction in pressure though.&nbsp;</span></p><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">It’s great for large homes in warmer climates and for smaller homes in the northern states.</span></p><div class="expert-review expert-review--color-purple-1" data-dcnode-id="1067"><section class="expert-review-pluses-minuses" data-dcnode-id="1068"><div class="expert-review-block" data-dcnode-id="1077"><div class="expert-review-pluses-minuses-header" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Pros</span></div><div class="expert-review-pluses" data-dcnode-id="1078"><div class="expert-review-plus" data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Relatively low price</span></div><div class="expert-review-plus" data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">It has very convenient automatic controllers that adjust the pressure and temperature to meet the demand when several fixtures use hot water.</span></div><div class="expert-review-plus" data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Due to small sizes, it saves a lot of space and can be installed near the point of use. It’s also very quiet, so it wouldn’t make any anoint noise</span></div><div class="expert-review-plus" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">It requires NO venting</span></div></div></div><div class="expert-review-block" data-dcnode-id="1069"><div class="expert-review-pluses-minuses-header" data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Cons</span></div><div class="expert-review-minuses" data-dcnode-id="1070"><div class="expert-review-minus" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Since it’s an electric water heater, it may be difficult to install if you had no previous experiment</span></div><div class="expert-review-minus" data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">In cold climates, it performs much worse and consumes more energy. During dead cold winter when the groundwater temperature is below 50 degrees it can barely produce 3.5 GPM</span></div></div></div></section></div><h3 data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">4. Rheem Prestige RTGH-95DVLN</span></h3><figure class="wp-block-image size-full" data-dcnode-id="1061"><img alt="Rheem Tankless Water Heater" class="wp-image-1452" data-dcnode-id="1064" data-lazy-sizes="(max-width: 1980px) 100vw, 1980px" data-lazy-src="https://tankless.review/wp-content/uploads/2020/06/Rheem-Tankless-Water-Heater.jpg" data-lazy-srcset="https://tankless.review/wp-content/uploads/2020/06/Rheem-Tankless-Water-Heater.jpg 1980w, https://tankless.revi tps://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B0084CPDFS/%3Ftag%3Dtanklessreview00-20%23customerReviews" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="1022" instrument_node="">Read Verified Customers Reviews</span></a></div></div><figure class="wp-block-table" data-dcnode-id="960"><table data-dcnode-id="961"><tbody data-dcnode-id="962"><tr data-dcnode-id="1012"><td data-dcnode-id="1015"><strong data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Temperature rise</span></strong><span data-dcnode-id="1016" instrument_node="">/Groundwater temp</span></td><td data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Max flow rate (GPM)</span></td></tr><tr data-dcnode-id="1005"><td data-dcnode-id="1008"><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">68</span></strong><span data-dcnode-id="1009" instrument_node="">/42°F</span></td><td data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">5</span></td></tr><tr data-dcnode-id="998"><td data-dcnode-id="1001"><strong data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">63</span></strong><span data-dcnode-id="1002" instrument_node="">/47°F</span></td><td data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">5.4</span></td></tr><tr data-dcnode-id="991"><td data-dcnode-id="994"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">55</span></strong><span data-dcnode-id="995" instrument_node="">/55°F</span></td><td data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">6</span></td></tr><tr data-dcnode-id="984"><td data-dcnode-id="987"><strong data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">48</span></strong><span data-dcnode-id="988" instrument_node="">/62°F</span></td><td data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">7</span></td></tr><tr data-dcnode-id="977"><td data-dcnode-id="980"><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">43</span></strong><span data-dcnode-id="981" instrument_node="">/67°F</span></td><td data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">7.5</span></td></tr><tr data-dcnode-id="970"><td data-dcnode-id="973"><strong data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">38</span></strong><span data-dcnode-id="974" instrument_node="">/72°F</span></td><td data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">9</span></td></tr><tr data-dcnode-id="963"><td data-dcnode-id="966"><strong data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">33</span></strong><span data-dcnode-id="967" instrument_node="">/77°F</span></td><td data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">9.5</span></td></tr></tbody></table></figure><p data-dcnode-id="956"><a aria-label="Rheem (opens in a new tab)" class="rank-math-link" data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rheem.com/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="959" instrument_node="">Rheem</span></a><span data-dcnode-id="957" instrument_node=""> is one of the most trusted American brands in the water heaters industry. We couldn’t make a TOP list without mentioning it.</span></p><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">We chose Rheem RTGH-95DVLN for its time-tested great reputation as a reliable workhorse for thousands of Americans. It is reported by the owners that Rheem RTGH-95DVLN perfectly does its main job of heating water without any significant issues.&nbsp;</span></p><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Now let’s get to the technicalities. This model comes in two options: indoor and outdoor. Both require a min. 11,000 BTU and can handle up to 199,900 BTU.</span></p><p data-dcnode-id="947"><span data-dcnode-id="951" instrument_node="">It shows 94% efficiency due to a stainless steel condensing heat exchanger (that’s how the heating element is called). It’s designed for both large and mid-sized homes, providing up to </span><strong data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">9.5 GPM flow rate</span></strong><span data-dcnode-id="948" instrument_node="">.</span></p><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">You would be surprised that such small and compact tankless water heaters can supply hot water to a big family of 4 to 6 members. The owners say that they tried using two showers, a whirlpool tub, and a kitchen sink all at the same time and the temperature never dropped.</span></p><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">It’s easy to install thanks to two PVC pipes direct venting system. You don’t need expensive stainless steel vent piping.</span></p><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Some owners said that they experience some noise. It may happen because of improper installation. If you install the intake and exhaust pipes too close to each other, the intake may start sucking exhaust fumes causing the fan to run at its full capacity. It tried to clear the intake. So be careful about installing the unit. Or get professionals to do the job.</span></p><div class="expert-review expert-review--color-purple-1" data-dcnode-id="919"><section class="expert-review-pluses-minuses" data-dcnode-id="920"><div class="expert-review-block" data-dcnode-id="931"><div class="expert-review-pluses-minuses-header" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Pros</span></div><div class="expert-review-pluses" data-dcnode-id="932"><div class="expert-review-plus" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Endless and consistent supply of hot water</span></div><div class="expert-review-plus" data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Vent system designed for PVC pipes</span></div><div class="expert-review-plus" data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Compact sizes</span></div></div></div><div class="expert-review-block" data-dcnode-id="921"><div class="expert-review-pluses-minuses-header" data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Cons</span></div><div class="expert-review-minuses" data-dcnode-id="922"><div class="expert-review-minus" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Cold water sandwich problem (if used without a recirculation pump)</span></div><div class="expert-review-minus" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">120 degrees max temperature</span></div><div class="expert-review-minus" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Noise is a common problem</span></div></div></div></section></div><h3 data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">5. Rheem RTEX-13</span></h3><figure class="wp-block-image size-large" data-dcnode-id="913"><img alt="" class="wp-image-1454" data-dcnode-id="916" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://tankless.review/wp-content/uploads/2020/06/Rheem-RTEX13-Tankless-Water-Heater-1024x662.jpg" data-lazy-srcset="https://tankless.review/wp-content/uploads/2020/06/Rheem-RTEX13-Tankless-Water-Heater-1024x662.jpg 1024w, https://tankless.review/wp-content/uploads/2020/06/Rheem-RTEX13-Tankless-Water-Heater-300x194.jpg 300w, https://tankless.review/wp-content/uploads/2020/06/Rheem-RTEX13-Tankless-Water-Heater-768x496.jpg 768w, https://tankless.review/wp-content/uploads/2020/06/Rheem-RTEX13-Tankless-Water-Heater-1536x993.jpg 1536w, https://tankless.review/wp-content/uploads/2020/06/Rheem-RTEX13-Tankless-Water-Heater.jpg 1980w" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">&lt;img src="https://tankless.review/wp-content/uploads/2020/06/Rheem-RTEX13-Tankless-Water-Heater-1024x662.jpg" alt="" class="wp-image-1454" srcset="https://tankless.review/wp-content/uploads/2020/06/Rheem-RTEX13-Tankless-Water-Heater-1024x662.jpg 1024w, https://tankless.review/wp-content/uploads/2020/06/Rheem-RTEX13-Tankless-Water-Heater-300x194.jpg 300w, https://tankless.review/wp-content/uploads/2020/06/Rheem-RTEX13-Tankless-Water-Heater-768x496.jpg 768w, https://tankless.review/wp-content/uploads/2020/06/Rheem-RTEX13-Tankless-Water-Heater-1536x993.jpg 1536w, https://tankless.review/wp-content/uploads/2020/06/Rheem-RTEX13-Tankless-Water-Heater.jpg 1980w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></figure><div class="product-card" data-dcnode-id="859"><div class="image-block div-block" data-dcnode-id="904"><span data-dcnode-id="912" instrument_node=""> </span><a class="rds_hl_nofollow" data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B01NAUZJPE/%3Ftag%3Dtanklessreview00-20" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="911" instrument_node=""> </span><img alt="Picture of Rheem RTEX-13 on white background" class="rds_hl_nofollow" data-dcnode-id="910" data-lazy-src="https://images-na.ssl-images-amazon.com/images/I/51Nx3dx3rKL._SL275_.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">&lt;img src="https://images-na.ssl-images-amazon.com/images/I/51Nx3dx3rKL._SL275_.jpg" alt="Picture of Rheem RTEX-13 on white background" class="rds_hl_nofollow"&gt;</span></noscript><div "="" class="affiliate-button" data-dcnode-id="906" target="_blank"><span data-dcnode-id="907" instrument_node="">Check Latest Price</span></div></a></div><div class="features-block div-block" data-dcnode-id="860"><table data-dcnode-id="864"><caption class="product-title" data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Rheem RTEX-13 Features and Specifications:</span></caption><tbody data-dcnode-id="865"><tr data-dcnode-id="896"><td class="feature-text" data-dcnode-id="899"><b data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Fuel Type</span></b></td><td data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Electric</span></td></tr><tr data-dcnode-id="890"><td class="feature-text" data-dcnode-id="893"><b data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Efficiency</span></b></td><td data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">99.8%</span></td></tr><tr data-dcnode-id="884"><td class="feature-text" data-dcnode-id="887"><b data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Product dimensions</span></b></td><td data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">4 x 9 x 13 inches</span></td></tr><tr data-dcnode-id="878"><td class="feature-text" data-dcnode-id="881"><b data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Flow rate</span></b></td><td data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">3 GPM</span></td></tr><tr data-dcnode-id="872"><td class="feature-text" data-dcnode-id="875"><b data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Wattage</span></b></td><td data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">13 kW kW</span></td></tr><tr data-dcnode-id="866"><td class="feature-text" data-dcnode-id="869"><b data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Voltage</span></b></td><td data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">240 Volts Volts</span></td></tr></tbody></table><span data-dcnode-id="863" instrument_node=""> </span><a class="reviews-button rds_hl_nofollow" data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B01NAUZJPE/%3Ftag%3Dtanklessreview00-20%23customerReviews" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="862" instrument_node="">Read Verified Customers Reviews</span></a></div></div><figure class="wp-block-table" data-dcnode-id="821"><table data-dcnode-id="822"><tbody data-dcnode-id="823"><tr data-dcnode-id="852"><td data-dcnode-id="855"><strong data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Temperature rise</span></strong><span data-dcnode-id="856" instrument_node="">/Groundwater temp</span></td><td data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Max flow rate (GPM)</span></td></tr><tr data-dcnode-id="845"><td data-dcnode-id="848"><strong data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">60</span></strong><span data-dcnode-id="849" instrument_node="">/50°F</span></td><td data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">1.5</span></td></tr><tr data-dcnode-id="838"><td data-dcnode-id="841"><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">44</span></strong><span data-dcnode-id="842" instrument_node="">/66°F</span></td><td data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">2</span></td></tr><tr data-dcnode-id="831"><td data-dcnode-id="834"><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">38</span></strong><span data-dcnode-id="835" instrument_node="">/72°F</span></td><td data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">2.5</span></td></tr><tr data-dcnode-id="824"><td data-dcnode-id="827"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">33</span></strong><span data-dcnode-id="828" instrument_node="">/77°F</span></td><td data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">3</span></td></tr></tbody></table></figure><p data-dcnode-id="816"><span data-dcnode-id="820" instrument_node="">Up to this point, we’ve only reviewed gas/propane tankless heaters. They have great performance and a high flow rate. They’re very efficient and save you money on energy costs for water heating. They may be used in every type of household, whether it’s a </span><em data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">large 3-bathroom house with a big family enjoying a hot shower in all three bathrooms simultaneously </span></em><span data-dcnode-id="817" instrument_node="">or a mid-size house in the cold northern states where a couple wants to have the luxury of endless hot water on demand.&nbsp;&nbsp;</span></p><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">But not everybody needs that high performance in their apartments, or condos, or RVs, or trendy tiny houses… You get the point. $3000+ in upfront costs for a 10 GPM tankless unit that will be used for heating water for one shower all day might be overkill.</span></p><p data-dcnode-id="809"><span data-dcnode-id="813" instrument_node="">So Rheem RTEX-13 comes to the rescue. It’s a good electric tankless water heater for single point-of-use or multiple applications. It’s </span><strong data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">best suited for apartments or small houses with low to medium hot water demand</span></strong><span data-dcnode-id="810" instrument_node="">, where just one or two people are using hot water appliances. It’s also great for offices.</span></p><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Rheem RTEX-13 is very easy to install, just follow the manual and you’ll get along.</span></p><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">For Rheem RTEX-13 you’re going to need to have 1 x 60 amps power breakers. 6 AWG wire size is recommended. If you’re not familiar with wiring details, consider getting a quote from professionals.</span></p><p data-dcnode-id="794"><span data-dcnode-id="804" instrument_node="">It is one of the several units from the Classic Series. If the </span><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">maximum of 3.8 GPM</span></strong><span data-dcnode-id="801" instrument_node=""> in Rheem RTEX-13 is not enough, you can choose a different option. The model with the highest performance is Rheem RTEX-36 which, according to Rheem, can provide impressive for an electric tankless water heater maximum of </span><em data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">8GPM</span></em><span data-dcnode-id="798" instrument_node="">, if you live in the south. The lower the temperature of the groundwater in your location, the lower the flow rate will be. Although the manufacturer claims the maximum flow rate is that high, the actual one will probably be around </span><strong data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">3 GPM</span></strong><span data-dcnode-id="795" instrument_node=""> for RTEX-13 and around 6 GPM for RTEX-36.</span></p><div class="pro-tip" data-dcnode-id="787"><span data-dcnode-id="793" instrument_node=""> If you want to use low flow rate models like Rheem RTEX-13 in your house, but you’re afraid that they won’t be able to handle your hot water demand, consider installing low flow showerheads and aerators on as many fixtures as possible. It will reduce your actual flow rate without losing the pressure. </span><i data-dcnode-id="788"><span data-dcnode-id="792" instrument_node="">And with less GPM demand you’ll need smaller and </span><b data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">cheaper</span></b><span data-dcnode-id="789" instrument_node=""> tankless water heater.</span></i></div><div class="expert-review expert-review--color-purple-1" data-dcnode-id="765"><section class="expert-review-pluses-minuses" data-dcnode-id="766"><div class="expert-review-block" data-dcnode-id="775"><div class="expert-review-pluses-minuses-header" data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Pros</span></div><div class="expert-review-pluses" data-dcnode-id="776"><div class="expert-review-plus" data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Very easy to install</span></div><div class="expert-review-plus" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Good choice if you’re on a low budget</span></div><div class="expert-review-plus" data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Great value for the money</span></div><div class="expert-review-plus" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">It has compact sizes and could fit probably everywhere</span></div></div></div><div class="expert-review-block" data-dcnode-id="767"><div class="expert-review-pluses-minuses-header" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Cons</span></div><div class="expert-review-minuses" data-dcnode-id="768"><div class="expert-review-minus" data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">One unit can’t supply the whole house with hot water (you can buy several units though)</span></div><div class="expert-review-minus" data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Without recirculation pump, it has a cold water sandwich</span></div></div></div></section></div><h3 data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">6. Ecosmart ECO 18</span></h3><figure class="wp-block-image size-large" data-dcnode-id="759"><img alt="" class="wp-image-1456" data-dcnode-id="762" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://tankless.review/wp-content/uploads/2020/06/ECOSmart-Tankless-Water-Heater-1024x662.jpg" data-lazy-srcset="https://tankless.review/wp-content/uploads/2020/06/ECOSmart-Tankless-Water-Heater-1024x662.jpg 1024w, https://tankless.review/wp-content/uploads/2020/06/ECOSmart-Tankless-Water-Heater-300x194.jpg 300w, https://tankless.review/wp-content/uploads/2020/06/ECOSmart-Tankless-Water-Heater-768x496.jpg 768w, https://tankless.r
