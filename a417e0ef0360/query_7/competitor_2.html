"">
</span><div class="g1-content-narrow g1-typography-xl entry-content" data-dcnode-id="2675" itemprop="articleBody"><span data-dcnode-id="3806" instrument_node="">
</span><div class="overview-section" data-dcnode-id="3458"><span data-dcnode-id="3805" instrument_node="">
</span><h1 data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">Tankless Water Heaters - Perfect for Cabins and Vacation Homes</span></h1><span data-dcnode-id="3802" instrument_node="">
</span><div class="main-paragraph" data-dcnode-id="3576"><p data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">Tankless water heaters are great for cabins. They are very popular outside of the United States for many of the same reasons that they are perfect for vacation homes and cabins – they are significantly more size and energy efficient compared to traditional tank water heaters.</span></p><span data-dcnode-id="3799" instrument_node="">
</span><div data-dcnode-id="3789" style="clear:both; margin-top:-1em; margin-bottom:0em;"><a class="ufc3bc7e8470d820faf3dafce413083ae" data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cabindiy.com/how-to/sprinkler-blowout/" rel="dofollow" target="_blank"><div data-dcnode-id="3791" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">ALSO READ : </span></span><span data-dcnode-id="3794" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">Sprinkler Blowout</span></span></div></a></div><span data-dcnode-id="3788" instrument_node="">
</span><p data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">Here is a summary of some of the benefits of a tankless waters:</span></p><span data-dcnode-id="3785" instrument_node="">
</span><ul data-dcnode-id="3771"><span data-dcnode-id="3784" instrument_node="">
</span><li data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">small size/wall mountable</span></li><span data-dcnode-id="3781" instrument_node="">
</span><li data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">unlimited hot water</span></li><span data-dcnode-id="3778" instrument_node="">
</span><li data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">instant hot water (no waiting to heat the tank of water)</span></li><span data-dcnode-id="3775" instrument_node="">
</span><li data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">more efficient water heating/lower energy use.</span></li><span data-dcnode-id="3772" instrument_node="">
</span></ul><span data-dcnode-id="3770" instrument_node="">
</span><p data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">The limitations of a tankless water heater include:</span></p><span data-dcnode-id="3767" instrument_node="">
</span><ul data-dcnode-id="3756"><span data-dcnode-id="3766" instrument_node="">
</span><li data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">large instantaneous energy requirements (electric or gas)</span></li><span data-dcnode-id="3763" instrument_node="">
</span><li data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">high initial cost of the unit/installation</span></li><span data-dcnode-id="3760" instrument_node="">
</span><li data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">heating limitations based on flow and inlet water temperature (can be significant)</span></li><span data-dcnode-id="3757" instrument_node="">
</span></ul><span data-dcnode-id="3755" instrument_node="">
</span><p data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">For us, we were interested in saving space. We needed to move a furnace into our smallish utility room and getting rid of the old, floor standing tank water heater freed up the space we needed to install a new furnace. The small size and space savings of a wall mounted tankless water heater is pretty amazing – they literally take up the space of a briefcase.</span></p><span data-dcnode-id="3752" instrument_node="">
</span><p data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">And while the space savings is great, the biggest benefit we have found after converting to tankless is the instant-on, ready-when-we-get-there hot water. Not needing to get hot water for an occasional-use property like our cabin is huge.</span></p><span data-dcnode-id="3749" instrument_node="">
</span><blockquote data-dcnode-id="3744"><span data-dcnode-id="3748" instrument_node="">
</span><p data-dcnode-id="3746" style="text-align: center;"><span data-dcnode-id="3747" instrument_node="">Tankless water heaters + cabins = match made in heaven!</span></p><span data-dcnode-id="3745" instrument_node="">
</span></blockquote><span data-dcnode-id="3743" instrument_node="">
</span><h2 data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">Tankless Water Heaters vs. Traditional Tank Water Heaters:</span></h2><span data-dcnode-id="3740" instrument_node="">
</span><p data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">A tankless water heater offers space savings, endless hot water, lower cost of operation and no tank heating delays with the trade-off of higher initial cost and hot water flow limitations.</span></p><span data-dcnode-id="3737" instrument_node="">
</span><h4 data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">Tankless Water Heater (On Demand)</span></h4><span data-dcnode-id="3734" instrument_node="">
</span><ul data-dcnode-id="3711"><span data-dcnode-id="3733" instrument_node="">
</span><li data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">small size / space requirement</span></li><span data-dcnode-id="3730" instrument_node="">
</span><li data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">Instant hot water after a period of non-use – turn on and use</span></li><span data-dcnode-id="3727" instrument_node="">
</span><li data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">Pay for what you use (+ pilot if gas) and only when you use it</span></li><span data-dcnode-id="3724" instrument_node="">
</span><li data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">Unit life 20 + years</span></li><span data-dcnode-id="3721" instrument_node="">
</span><li data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">Cost more to purchase/install</span></li><span data-dcnode-id="3718" instrument_node="">
</span><li data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">Substantial energy demand when in use (40 – 180 amps for electric units and high-flows for gas units)</span></li><span data-dcnode-id="3715" instrument_node="">
</span><li data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">Flow (use) limitations based on supply water temperature</span></li><span data-dcnode-id="3712" instrument_node="">
</span></ul><span data-dcnode-id="3710" instrument_node="">
</span><h4 data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">Traditional Tank Water Heater (Storage)</span></h4><span data-dcnode-id="3707" instrument_node="">
</span><ul data-dcnode-id="3684"><span data-dcnode-id="3706" instrument_node="">
</span><li data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">large size / space requirement</span></li><span data-dcnode-id="3703" instrument_node="">
</span><li data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">Entire tank heated before hot water available after a period of non-use – turn on and wait to heat an entire tank</span></li><span data-dcnode-id="3700" instrument_node="">
</span><li data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">Pay for heating (and reheating) entire tank</span></li><span data-dcnode-id="3697" instrument_node="">
</span><li data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">Unit life 10 – 15 years</span></li><span data-dcnode-id="3694" instrument_node="">
</span><li data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">Cost less to purchase/install</span></li><span data-dcnode-id="3691" instrument_node="">
</span><li data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">Lower energy requirements vs tankless when operating</span></li><span data-dcnode-id="3688" instrument_node="">
</span><li data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">Stable temperature for entire tank volume no matter supply temperature</span></li><span data-dcnode-id="3685" instrument_node="">
</span></ul><span data-dcnode-id="3683" instrument_node="">
</span><h2 data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">Electric vs. Gas Tankless Water Heater Comparison</span></h2><span data-dcnode-id="3680" instrument_node="">
</span><p data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">On demand tankless water heaters are typically offered with one of two fuel sources, gas (natural gas or propane) or electric.&nbsp;Selecting between gas and electric balances costs, performance, installation and maintenance&nbsp;requirements of each.</span></p><span data-dcnode-id="3677" instrument_node="">
</span><h4 data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">Electric Tankless Water Heater</span></h4><span data-dcnode-id="3674" instrument_node="">
</span><ul data-dcnode-id="3647"><span data-dcnode-id="3673" instrument_node="">
</span><li data-dcnode-id="3670"><span data-dcnode-id="3671" style="line-height: 16px;"><span data-dcnode-id="3672" instrument_node="">Requires one to three 240v 40-60 amp circuits</span></span></li><span data-dcnode-id="3669" instrument_node="">
</span><li data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">Does not require combustion air ducts, exhaust venting, gas supply</span></li><span data-dcnode-id="3666" instrument_node="">
</span><li data-dcnode-id="3664"><span data-dcnode-id="3665" instrument_node="">Install anywhere 240v supply circuit wiring can go</span></li><span data-dcnode-id="3663" instrument_node="">
</span><li data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">Install less complex and expensive (install electrical circuit, plumbing)</span></li><span data-dcnode-id="3660" instrument_node="">
</span><li data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">More&nbsp;efficient typically ~ 95%</span></li><span data-dcnode-id="3657" instrument_node="">
</span><li data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">Electricity typically more expensive vs. gas</span></li><span data-dcnode-id="3654" instrument_node="">
</span><li data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">May have narrower range of heating capacity (100° – 140°) adjustment</span></li><span data-dcnode-id="3651" instrument_node="">
</span><li data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">Nearly maintenance free (replace inlet screen)</span></li><span data-dcnode-id="3648" instrument_node="">
</span></ul><span data-dcnode-id="3646" instrument_node="">
</span><h4 data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">Gas Tankless Water Heater</span></h4><span data-dcnode-id="3643" instrument_node="">
</span><ul data-dcnode-id="3616"><span data-dcnode-id="3642" instrument_node="">
</span><li data-dcnode-id="3639"><span data-dcnode-id="3640" style="line-height: 16px;"><span data-dcnode-id="3641" instrument_node="">Requires gas supply, combustion air, exhaust venting, 120v circuit</span></span></li><span data-dcnode-id="3638" instrument_node="">
</span><li data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">Does not require 240v high amperage circuits</span></li><span data-dcnode-id="3635" instrument_node="">
</span><li data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">Install where combustion air, exhaust venting, 120v circuit can go</span></li><span data-dcnode-id="3632" instrument_node="">
</span><li data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">Install more complex and expensive (install gas line, combustion/exhaust venting, plumbing)</span></li><span data-dcnode-id="3629" instrument_node="">
</span><li data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">Less efficient typically ~ 85%</span></li><span data-dcnode-id="3626" instrument_node="">
</span><li data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">Gas typically less expensive vs. electricity</span></li><span data-dcnode-id="3623" instrument_node="">
</span><li data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">May have wider range of heating capacity (100° – 180°) adjustment</span></li><span data-dcnode-id="3620" instrument_node="">
</span><li data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">Some mainenance required (burner, pilot, venting)</span></li><span data-dcnode-id="3617" instrument_node="">
</span></ul><span data-dcnode-id="3615" instrument_node="">
</span><h2 data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">Selecting the Correct Size Tankless Water Heater</span></h2><span data-dcnode-id="3612" instrument_node="">
</span><p data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">Picking the proper size water heater is important. &nbsp;This is especially true with tankless water heaters as they have no reserve (tank) and are required to heat the water flow in “real time”. Tankless water heaters heat the cold water supply as it passes through the unit and therefore are limited by the flow rate of the water and temperature of the cold water supplied to the unit.</span></p><span data-dcnode-id="3609" instrument_node="">
</span><p data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">Larger flow needs (large homes, multiple bathrooms (showers), high flow showers, etc) and colder supply water (cold climates, winter use) require larger units</span></p><span data-dcnode-id="3606" instrument_node="">
</span><div data-dcnode-id="3596" style="clear:both; margin-top:-1em; margin-bottom:0em;"><a class="ubb4cade5eb5178071ef120934873e2f2" data-dcnode-id="3597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cabindiy.com/how-to/rainscreen-siding/" rel="dofollow" target="_blank"><div data-dcnode-id="3598" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">ALSO READ : </span></span><span data-dcnode-id="3601" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">Rainscreen Siding Construction</span></span></div></a></div><span data-dcnode-id="3595" instrument_node="">
</span><p data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">Sizing is particularly important with electrical units which generally have a smaller range of heating capacity (max setting typically = 140°) compared to gas units (max settings up to 180°) and offer less flexibility once installed. Most manufactures have charts to help you select the proper size unit. Here is an example of the selection chart on the Stiebel Eltron site:</span></p><span data-dcnode-id="3592" instrument_node="">
</span><figure aria-describedby="caption-attachment-2833" class="wp-caption aligncenter" data-dcnode-id="3587" id="attachment_2833"><a data-dcnode-id="3590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/steibeleltronelectrictanklesswaterheaterselectionguide1.jpg"><img alt="Stiebel Eltron electric tankless water heater selection guide." class="wp-image-2833 size-medium" data-dcnode-id="3591" height="549" loading="lazy" sizes="(max-width: 590px) 100vw, 590px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/steibeleltronelectrictanklesswaterheaterselectionguide1-590x549.jpg&amp;raw" srcset="https://img.cabindiy.com/how-to/steibeleltronelectrictanklesswaterheaterselectionguide1-590x550.jpg 590w, https://img.cabindiy.com/how-to/steibeleltronelectrictanklesswaterheaterselectionguide1-241x225.jpg 241w, https://img.cabindiy.com/how-to/steibeleltronelectrictanklesswaterheaterselectionguide1-160x150.jpg 160w, https://img.cabindiy.com/how-to/steibeleltronelectrictanklesswaterheaterselectionguide1-768x716.jpg 768w, https://img.cabindiy.com/how-to/steibeleltronelectrictanklesswaterheaterselectionguide1-600x559.jpg 600w, https://img.cabindiy.com/how-to/steibeleltronelectrictanklesswaterheaterselectionguide1-482x450.jpg 482w, https://img.cabindiy.com/how-to/steibeleltronelectrictanklesswaterheaterselectionguide1.jpg 820w" title="Electric Tankless Water Heater Sizing Guide US" width="590"></a><figcaption class="wp-caption-text" data-dcnode-id="3588" id="caption-attachment-2833"><span data-dcnode-id="3589" instrument_node="">Tankless water heater selection guide (source: stiebel-eltron-usa.com)</span></figcaption></figure><span data-dcnode-id="3586" instrument_node="">
</span><p data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">Get Your Own Tankless Water Heater Once you decide on a tankless water heater, you will need it installed.&nbsp;Installation for these units can be expensive, especially for gas units.&nbsp;For many DIYers, installation of a tankless water heater is a fairly straightforward project. Read on for a step by step of the installation of my electric tankless water heater. I rate this an advanced level project simply because of the high voltage, high amperage electrical work. Due to the potential danger of working with high voltage, high amperage circuits, do not attempt the electrical portion of this project unless you are&nbsp;qualified&nbsp;to do so.&nbsp;You could certainly mount and plumb the unit and hire out the wiring. Safety first.</span></p><span data-dcnode-id="3583" instrument_node="">
</span><p data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">THIS PROJECT REQUIRES WIRING OF HIGH VOLTAGE / HIGH AMPERAGE ELECTRICAL CIRCUITS</span></p><span data-dcnode-id="3580" instrument_node="">
</span><p data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">Prior to any electrical work ensure that the main breaker panel is off. Consult federal, state and local codes. Call a qualified Electrician if you have any questions or not comfortable with this type of electrical work.</span></p><span data-dcnode-id="3577" instrument_node="">
</span></div><span data-dcnode-id="3575" instrument_node="">
</span><div class="overview-box" data-dcnode-id="3460"><span data-dcnode-id="3574" instrument_node="">

</span><h3 data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">STEPS | How we installed an electric tankless water heater in our cabin utility room - costs, logistics and gas vs. electric comparison.</span></h3><span data-dcnode-id="3079" instrument_node="">
</span><ol class="steps-list" data-dcnode-id="2951"><span data-dcnode-id="3078" instrument_node="">
</span><h4 class="step-title" data-dcnode-id="3075" id="plan-placement-of-on-demand-water-heater" style="margin:40px auto 10px auto;font-weight:600;text-transform:none"><li data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">Plan placement of on demand water heater</span></li></h4><span data-dcnode-id="3074" instrument_node="">
</span><div class="step-description" data-dcnode-id="3064"><p data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">Consider proximity to electrical supply, plumbing connections and accessibility for temperature adjustment and service. Also consider plumbing distance from heater to end use fixtures. Long plumbing runs will result in longer lag time between faucet opening and heated water arrival.</span></p><span data-dcnode-id="3071" instrument_node="">
</span><figure aria-describedby="caption-attachment-2865" class="wp-caption aligncenter" data-dcnode-id="3066" id="attachment_2865"><a data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/tankless-water-heater-connections-plumbing-diagram3.jpg"><img alt="Plumbing diagram showing plumbing and electrical connections to tankless water heater." class="wp-image-2865 size-full" data-dcnode-id="3070" height="715" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/tankless-water-heater-connections-plumbing-diagram3.jpg&amp;raw" srcset="https://img.cabindiy.com/how-to/tankless-water-heater-connections-plumbing-diagram3.jpg 755w, https://img.cabindiy.com/how-to/tankless-water-heater-connections-plumbing-diagram3-503x600.jpg 503w, https://img.cabindiy.com/how-to/tankless-water-heater-connections-plumbing-diagram3-188x225.jpg 188w, https://img.cabindiy.com/how-to/tankless-water-heater-connections-plumbing-diagram3-125x150.jpg 125w, https://img.cabindiy.com/how-to/tankless-water-heater-connections-plumbing-diagram3-138x165.jpg 138w" title="Plumbing Diagram Tankless Water Heater" width="600"></a><figcaption class="wp-caption-text" data-dcnode-id="3067" id="caption-attachment-2865"><span data-dcnode-id="3068" instrument_node="">Plan placement of tankless water heater — consider access to unit, ease of plumbing, distance to end use (longer = more lag time for hot water) and ease of wiring.</span></figcaption></figure><span data-dcnode-id="3065" instrument_node="">
</span></div><span data-dcnode-id="3063" instrument_node="">
</span><h4 class="step-title" data-dcnode-id="3060" id="assemble-water-heater-supplies-and-tools" style="margin:40px auto 10px auto;font-weight:600;text-transform:none"><li data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">Assemble water heater, supplies and tools</span></li></h4><span data-dcnode-id="3059" instrument_node="">
</span><div class="step-description" data-dcnode-id="3049"><p data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">Gather water heater, plumbing supplies, electrical supplies and tools.</span></p><span data-dcnode-id="3056" instrument_node="">
</span><figure aria-describedby="caption-attachment-2837" class="wp-caption aligncenter" data-dcnode-id="3051" id="attachment_2837"><a data-dcnode-id="3054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/tankless-water-heater-electrical-tools2.jpg"><img alt="Basic electrical supplies for wiring tankless water heater." class="wp-image-2837 size-medium" data-dcnode-id="3055" height="450" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/tankless-water-heater-electrical-tools2-600x450.jpg&amp;raw" srcset="https://img.cabindiy.com/how-to/tankless-water-heater-electrical-tools2-600x450.jpg 600w, https://img.cabindiy.com/how-to/tankless-water-heater-electrical-tools2-590x443.jpg 590w, https://img.cabindiy.com/how-to/tankless-water-heater-electrical-tools2-640x480.jpg 640w, https://img.cabindiy.com/how-to/tankless-water-heater-electrical-tools2-300x225.jpg 300w, https://img.cabindiy.com/how-to/tankless-water-heater-electrical-tools2-200x150.jpg 200w, https://img.cabindiy.com/how-to/tankless-water-heater-electrical-tools2-768x576.jpg 768w, https://img.cabindiy.com/how-to/tankless-water-heater-electrical-tools2-800x600.jpg 800w, https://img.cabindiy.com/how-to/tankless-water-heater-electrical-tools2-138x104.jpg 138w, https://img.cabindiy.com/how-to/tankless-water-heater-electrical-tools2.jpg 1200w" title="Electrical Hand Tools and Supplies for Tankless Water Heater Install" width="600"></a><figcaption class="wp-caption-text" data-dcnode-id="3052" id="caption-attachment-2837"><span data-dcnode-id="3053" instrument_node="">Hand tools for water heater electrical work.</span></figcaption></figure><span data-dcnode-id="3050" instrument_node="">
</span></div><span data-dcnode-id="3048" instrument_node="">
</span><h4 class="step-title" data-dcnode-id="3045" id="mount-water-heater" style="margin:40px auto 10px auto;font-weight:600;text-transform:none"><li data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Mount water heater</span></li></h4><span data-dcnode-id="3044" instrument_node="">
</span><div class="step-description" data-dcnode-id="3034"><p data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">Position heater on wall in intended mounting position and mark mounting hole positions on wall. Using supplied or suitable fasteners, connect the heater to the wall. Unit must be mounted in upright position, unless otherwise noted by manufacturer. Leave at least 6″ around water heater cabinet for service and clearance for cabinet door opening when choosing a mounting location. Mount the unit upright, in a dry area and one protected from freezing temperatures.</span></p><span data-dcnode-id="3041" instrument_node="">
</span><figure aria-describedby="caption-attachment-2841" class="wp-caption aligncenter" data-dcnode-id="3036" id="attachment_2841"><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/tankless-water-heater-open-closeup-mounting2.jpg"><img alt="Mounting tankless water heater." class="wp-image-2841 size-medium" data-dcnode-id="3040" height="450" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/tankless-water-heater-open-closeup-mounting2-600x450.jpg&amp;raw" srcset="https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup-mounting2-600x450.jpg 600w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup-mounting2-590x442.jpg 590w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup-mounting2-640x480.jpg 640w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup-mounting2-300x225.jpg 300w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup-mounting2-200x150.jpg 200w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup-mounting2-138x104.jpg 138w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup-mounting2-800x600.jpg 800w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup-mounting2.jpg 1200w" title="Mounting Holes in Cabinet of Electric Tankless Water Heater" width="600"></a><figcaption class="wp-caption-text" data-dcnode-id="3037" id="caption-attachment-2841"><span data-dcnode-id="3038" instrument_node="">Mount the unit upright in a secure, dry position on an accessible wall.</span></figcaption></figure><span data-dcnode-id="3035" instrument_node="">
</span></div><span data-dcnode-id="3033" instrument_node="">
</span><h4 class="step-title" data-dcnode-id="3030" id="plan-and-attach-water-connections" style="margin:40px auto 10px auto;font-weight:600;text-transform:none"><li data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">Plan and Attach Water Connections</span></li></h4><span data-dcnode-id="3029" instrument_node="">
</span><div class="step-description" data-dcnode-id="3003"><ul data-dcnode-id="3005"><span data-dcnode-id="3028" instrument_node="">
</span><li data-dcnode-id="3007"><strong data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">Plan and Attach Water Connections.</span></strong><span data-dcnode-id="3025" instrument_node="">Check local, state and national codes prior to proceeding. Most units require periodic water supply line disconnection for service (inlet filter screen cleaning) and therefore should be plumbed with an easy to disconnect and reconnect attachment. Many use flexible stainless steel connections for this. These are the same connectors used to attach to water softeners and other water heaters. I used a 3/4 inch Falcon Stainless Mega-Flow Super Water-Flex line. Using these flexible connectors also simplifies the plumbing process for this arm of the water connection.
</span><figure aria-describedby="caption-attachment-2839" class="wp-caption aligncenter" data-dcnode-id="3020" id="attachment_2839"><a data-dcnode-id="3023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/tankless-water-heater-inlet-outlet-plumbing2.jpg"><img alt="Tankless water heater plumbing supply connection with flexible stainless steel connection." class="wp-image-2839 size-medium" data-dcnode-id="3024" height="450" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/tankless-water-heater-inlet-outlet-plumbing2-600x450.jpg&amp;raw" srcset="https://img.cabindiy.com/how-to/tankless-water-heater-inlet-outlet-plumbing2-600x450.jpg 600w, https://img.cabindiy.com/how-to/tankless-water-heater-inlet-outlet-plumbing2-590x443.jpg 590w, https://img.cabindiy.com/how-to/tankless-water-heater-inlet-outlet-plumbing2-640x480.jpg 640w, https://img.cabindiy.com/how-to/tankless-water-heater-inlet-outlet-plumbing2-300x225.jpg 300w, https://img.cabindiy.com/how-to/tankless-water-heater-inlet-outlet-plumbing2-200x150.jpg 200w, https://img.cabindiy.com/how-to/tankless-water-heater-inlet-outlet-plumbing2-800x600.jpg 800w, https://img.cabindiy.com/how-to/tankless-water-heater-inlet-outlet-plumbing2-138x104.jpg 138w, https://img.cabindiy.com/how-to/tankless-water-heater-inlet-outlet-plumbing2-768x576.jpg 768w, https://img.cabindiy.com/how-to/tankless-water-heater-inlet-outlet-plumbing2.jpg 1200w" title="Plumbing Connections on Electric Tankless Water Heater" width="600"></a><figcaption class="wp-caption-text" data-dcnode-id="3021" id="caption-attachment-2839"><span data-dcnode-id="3022" instrument_node="">Flexible stainless supply water connection and outlet plumbing with disconnect coupling.</span></figcaption></figure><span data-dcnode-id="3019" instrument_node="">
</span><p data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">The oulet (hot) water connection should also incorporate a disconnect connection to allow for service or replacement. I used a brass coupling with rigid copper tubing. All NPT (normal pipe thread) connections will require Teflon thread tape or paste. Coupling connections do not and should not recieve thread treatment as this can limit the compression of the device and inhibit proper seating of the brass interface resulting in leaks. When using sweat (solder) connections, complete as many of the connections (especially those close to the unit connection) prior to assembly of the plumbing in order to limit potential heat damage to the water heater.</span></p><span data-dcnode-id="3016" instrument_node="">
</span><figure aria-describedby="caption-attachment-2842" class="wp-caption aligncenter" data-dcnode-id="3011" id="attachment_2842"><a data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/tankless-water-heater-plumbing-connections2.jpg"><img alt="Closeup of plumbing connections at the base of the Stiebel Eltron tankless water heater." class="wp-image-2842 size-medium" data-dcnode-id="3015" height="450" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/tankless-water-heater-plumbing-connections2-600x450.jpg&amp;raw" srcset="https://img.cabindiy.com/how-to/tankless-water-heater-plumbing-connections2-600x450.jpg 600w, https://img.cabindiy.com/how-to/tankless-water-heater-plumbing-connections2-590x442.jpg 590w, https://img.cabindiy.com/how-to/tankless-water-heater-plumbing-connections2-640x480.jpg 640w, https://img.cabindiy.com/how-to/tankless-water-heater-plumbing-connections2-300x225.jpg 300w, https://img.cabindiy.com/how-to/tankless-water-heater-plumbing-connections2-200x150.jpg 200w, https://img.cabindiy.com/how-to/tankless-water-heater-plumbing-connections2-800x600.jpg 800w, https://img.cabindiy.com/how-to/tankless-water-heater-plumbing-connections2-138x104.jpg 138w, https://img.cabindiy.com/how-to/tankless-water-heater-plumbing-connections2.jpg 1200w" title="Use Two Wrenches When Making Plumbing Connections" width="600"></a><figcaption class="wp-caption-text" data-dcnode-id="3012" id="caption-attachment-2842"><span data-dcnode-id="3013" instrument_node="">Secure unit fittings with second wrench when making connections</span></figcaption></figure><span data-dcnode-id="3010" instrument_node="">
</span><p data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">When making the connections to the inlet and outlet fittings of the unit, use care to avoid rotational damage to the unit plumbing by using two wrenches for connections. Once all connections are complete open water supply and check for leaks. Repair any leaks prior to proceeding with electrical connections.</span></p></li><span data-dcnode-id="3006" instrument_node="">
</span></ul><span data-dcnode-id="3004" instrument_node="">
</span></div><span data-dcnode-id="3002" instrument_node="">
</span><h4 class="step-title" data-dcnode-id="2999" id="plan-and-connect-the-electrical-circuits" style="margin:40px auto 10px auto;font-weight:600;text-transform:none"><li data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">Plan and Connect the Electrical Circuits</span></li></h4><span data-dcnode-id="2998" instrument_node="">
</span><div class="step-description" data-dcnode-id="2973"><p data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">Prior to any electrical work make sure that the main breaker panel is off!</span></p><span data-dcnode-id="2995" instrument_node="">
</span><p data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">Consult state and local codes. Call a qualified Electrician to perform this work if you have any questions. Depending on the make and model of your water heater, you will require one to three double pole (240 volt) 40 or 50 amp circuits. My unit calls for two 50 amp 240 volt circuits and for these circuits I needed 2 double pole 50 amp breakers (check codes to determine if GFIC protection is required), and AWG #6 copper wire. I needed enough wire to to run two wires for each circuit and a shared ground. Check wire requirements for the specific circuit requirements for your unit.</span></p><span data-dcnode-id="2992" instrument_node="">
</span><figure aria-describedby="caption-attachment-2835" class="wp-caption aligncenter" data-dcnode-id="2987" id="attachment_2835"><a data-dcnode-id="2990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/tankless-water-heater-60amp-breakers2.jpg"><img alt="Electrical breaker panel in mechical room showing two 60 amp breakers for electric tankless water heater." class="wp-image-2835 size-medium" data-dcnode-id="2991" height="450" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/tankless-water-heater-60amp-breakers2-600x450.jpg&amp;raw" srcset="https://img.cabindiy.com/how-to/tankless-water-heater-60amp-breakers2-600x450.jpg 600w, https://img.cabindiy.com/how-to/tankless-water-heater-60amp-breakers2-590x443.jpg 590w, https://img.cabindiy.com/how-to/tankless-water-heater-60amp-breakers2-640x480.jpg 640w, https://img.cabindiy.com/how-to/tankless-water-heater-60amp-breakers2-300x225.jpg 300w, https://img.cabindiy.com/how-to/tankless-water-heater-60amp-breakers2-200x150.jpg 200w, https://img.cabindiy.com/how-to/tankless-water-heater-60amp-breakers2-138x104.jpg 138w, https://img.cabindiy.com/how-to/tankless-water-heater-60amp-breakers2-768x576.jpg 768w, https://img.cabindiy.com/how-to/tankless-water-heater-60amp-breakers2-800x600.jpg 800w, https://img.cabindiy.com/how-to/tankless-water-heater-60amp-breakers2.jpg 1200w" title="Power requirements for this unit = Two 240 volt 60 amp circiuts!" width="600"></a><figcaption class="wp-caption-text" data-dcnode-id="2988" id="caption-attachment-2835"><span data-dcnode-id="2989" instrument_node="">Power requirements for this unit = 2 x 50 amp circiuts!</span></figcaption></figure><span data-dcnode-id="2986" instrument_node="">
</span><p data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">Using the appropriate size conduit (3/4″ in my case), measure, cut and connect the conduit circuits from your unit to the breaker panel. I used rigid galvanized conduit with pre-bent turns and compression fittings. Depending on the distance and complexity of the conduit run, you may find it much easier to run the conductors (wires) through the conduit sequentially, as you connect the conduit. Pulling #6 copper through long or complicated runs of conduit is no fun and can be much easier if the wire is passed as you construct the conduit.</span></p><span data-dcnode-id="2983" instrument_node="">
</span><figure aria-describedby="caption-attachment-2840" class="wp-caption aligncenter" data-dcnode-id="2978" id="attachment_2840"><a data-dcnode-id="2981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/tankless-water-heater-open-closeup22.jpg"><img alt="Stiebel Eltron Tempra 24 Plus electric tankless water heater connecting input and output plumbing." class="wp-image-2840 size-medium" data-dcnode-id="2982" height="450" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.cabindiy.com/how-to/tankless-water-heater-open-closeup22-600x450.jpg&amp;raw" srcset="https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup22-600x450.jpg 600w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup22-590x443.jpg 590w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup22-640x480.jpg 640w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup22-300x225.jpg 300w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup22-200x150.jpg 200w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup22-768x576.jpg 768w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup22-138x104.jpg 138w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup22-800x600.jpg 800w, https://img.cabindiy.com/how-to/tankless-water-heater-open-closeup22.jpg 1200w" title="Electrical Circuit Connections for the Stiebel Eltron Tankless Water Heater" width="600"></a><figcaption class="wp-caption-text" data-dcnode-id="2979" id="caption-attachment-2840"><span data-dcnode-id="2980" instrument_node="">Electrical circuits for the Stiebel Eltron unit. Dual 240v 50amp circuits – closeup of conductor connections inside unit.</span></figcaption></figure><span data-dcnode-id="2977" instrument_node="">
</span><p data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">Attach the conductors to the appropriate connectors in the unit. Consult the product manual for your unit. The connections should be marked by “L1” “L2” (Live 1, Live 2) or similar and the ground connection indicated by a ground symbol (⏚). Remember these are double pole wiring and each live conductor is “hot”. The ground for this unit is a single conductor connected to the ground connection.</span></p><span data-dcnode-id="2974" instrument_node="">
</span></div><span data-dcnode-id="2972" instrument_node="">
</span><h4 class="step-title" data-dcnode-id="2969" id="close-unit-cover-turn-on-electricity-and-power-up-unit" style="margin:40px auto 10px auto;font-weight:600;text-transform:none"><li data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">Close Unit Cover, Turn On Electricity and Power Up Unit</span></li></h4><span data-dcnode-id="2968" instrument_node="">
</span><div class="step-description" data-dcnode-id="2964"><p data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">Close water heater cover and fasten cabinet screw. Turn on power breakers. Check unit display to varify power and operation. Open hot water faucet to purge system of air. Adjust temperature setting of unit control to desired level. Confirm unit function and hot water at tap. Adjust temperature as needed.</span></p><span data-dcnode-id="2965" instrument_node="">
</span></div><span data-dcnode-id="2963" instrument_node="">
</span><div data-dcnode-id="2953" style="clear:both; margin-top:-1em; margin-bottom:0em;"><a class="ufc2a2beaa20210779ea548d14876e414" data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cabindiy.com/how-to/install-hardwood-floors/" rel="dofollow" target="_blank"><div data-dcnode-id="2955" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">ALSO READ : </span></span><span data-dcnode-id="2958" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">How to Install Hardwood Floors</span></span></div></a></div><span data-dcnode-id="2952" instrument_node="">
</span></ol><span data-dcnode-id="2950" instrument_node="">

</span><div class="image-gallery-block" data-dcnode-id="2807"><h3 data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">FOLLOW UP | How we installed an electric tankless water heater in our cabin utility room - costs, logistics and gas vs. electric comparison.</span></h3><span data-dcnode-id="2828" instrument_node="">
</span><div data-dcnode-id="2809" style="background-color:#f7f7f7;padding:20px;margin:20px auto"><span data-dcnode-id="2827" instrument_node="">
</span><h4 class="followup-header" data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">Stiebel Eltron Tankless Water Heater Follow Up</span></h4><span data-dcnode-id="2824" instrument_node="">
</span><div class="followup-date" data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">08/06/2016</span></div><span data-dcnode-id="2821" instrument_node="">
</span><div class="followup-text" data-dcnode-id="2811"><p data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">We have used the Stiebel Eltron Tempra 24 plus in our central Minnesota cabin for almost 2 years and could not be more happy with the performance. Our cabin has only one bathroom, but the plumbing to the shower is 3/4″ and the shower head set up for high flow, so the demands for a shower can be high.</span></p><span data-dcnode-id="2818" instrument_node="">
</span><p data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">We find setting the unit to around 130° in the winter and around 120° in the summer provides perfectly hot showers and gives us all the hot water we need. One aspect of using the unit with a well reservoir tank that we have noticed is the effect of changing water temperature related to refilling of the reservoir tank. Our reservoir tank is located in our warm mechanical room, and water in the tank eventually warms to the temperature of this room.</span></p><span data-dcnode-id="2815" instrument_node="">
</span><p data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Once we start to draw down the water in the tank, it is replaced with cold well water and the supply water temperature quickly drops. The end effect is changing hot water temperature at the tap. This is usually not a big problem, but we will plan our showers accordingly and know the second shower will need adjustment of the shower mixer.</span></p><span data-dcnode-id="2812" instrument_node="">
</span></div><span data-dcnode-id="2810" instrument_node="">
</span></div><span data-dcnode-id="2808" instrument_node="">
</span></div><span data-dcnode-id="2806" instrument_node="">

</span><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Hi Rae,</span></p><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Thanks for using our site and thanks for the kind words.</span></p><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">The Stiebel Eltron units do not require more than a single (appropriately sized) ground. Here is a wiring diagram for the 24 plus tankless heater. The wiring block will be labeled from left to right as follows: ⏚, L1, L2, L1, L2. The ground symbol (⏚) is the connection block for your single ground wire and the L1 and L2 are connection blocks for the hot leads from the double pole (240v) breakers. So for this unit from left to right you should connect the following: ground,hot,hot,hot,hot.</span></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">As far as the conduit and number of wires you can run in a single conduit will depend on the size of the conduit and the size of the wires. Active conductors (wires) product heat which limits the number and size of wires within a conduit. You may also use a sheathed cable of the appropriate size that does not require conduit. If you do use a combined sheathed product (Romex type), you probably should not run it in conduit as it is not allowed to dissipate heat correctly.</span></p><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">For the Tempra 24 Plus requiring 50A circuits you should use AWG 6 wire, therefore if you use 1″ conduit you can run up to 6 wires. If you use 3/4″ conduit (as I did) you can only run up to 4 wires and will require two runs of conduit.</span></p><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1950"><span data-dcnode-id="1953" instrument_node="">To determine the number of single wires you can run in a single conduit, use a guide like this one from Alan Wire: </span><a data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alanwire.com/tech/conduit.html" rel="nofollow" target="_blank"><span data-dcnode-id="1952" instrument_node="">Conduit Wire Fill Chart </span></a></p><span data-dcnode-id="1949" instrument_node="">
</span><p data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Here is a link to the Stiebel Eltron Tempra tankless water heater pdf install guide:</span></p><span data-dcnode-id="1946" instrument_node="">
</span><p data-dcnode-id="1943"><a data-dcnode-id="1944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stiebel-eltron-usa.com/sites/default/files/pdf/install-tempra.pdf" rel="nofollow" target="_blank"><span data-dcnode-id="1945" instrument_node="">Stiebel Eltron Tempra 24 Plus tankless electric water heater installation guide</span></a></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Gary		</span></p><span data-dcnode-id="1939" instrument_node="">

</span><a class="cace-comment-link cace-comment-link-not-copied" data-dcnode-id="1787" href="#comment-2883" title="Copy Link of a Comment"><span data-dcnode-id="1788" instrument_node="">Copy Link of a Comment</span></a><span data-dcnode-id="1786" instrument_node="">

</span><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Rae,</span></p><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Concerning the wire, I would not recommend removing the sheathing of the wire you have. The sheathed wire is only rated for the load you plan to use if left intact. Using the individual wires after manually stripping them is a bad idea – doing this with a 240v 50 amp circuit is a really bad idea.</span></p><span data-dcnode-id="1773" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">I would recommend using the sheathed wire as is or within a conduit approved for the wire. You may need to contact the wire manufacture for more info regarding running sheathed wire within conduit.</span></p><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Alternatively, you could return the sheathed wire and use AWG 6 THHN individual wires (you can easily get them from most building supply stores like Home Depot or Lowes). Stiebel Eltron recommends stranded wire too.</span></p><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Regarding the flexible stainless connectors, it really depends on what they carry at your local Lowes. I have found that some of the local Ace Hardware stores carry Falcon stainless water connectors. You can look through the connector to get an idea if there will be a significant reduction in flow – lower flow connectors will have narrower internal diameters or areas of narrowing.</span></p><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Good luck. I would do a bit of checking before you wire this thing to be sure you are doing it in a safe, code compliant way. These units use a lot of electricity – be safe!</span></p><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Gary		</span></p><span data-dcnode-id="1758" instrument_node="">

</span><p data-dcnode-id="1430"><span data-dcnode-id="1433" instrument_node="">Enrique,</span><br data-dcnode-id="1432"><span data-dcnode-id="1431" instrument_node="">
You only need one ground back to the electrical panel. The ground needs to connect to the ground buss if a subpanel or the ground/neutral buss if connected to your main panel.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Each of the other two (or four if your unit requires two circuits) are hot line wires (L1, L2) coming from your double-pole 240v breaker and should not be connected to the ground.  Go back and make sure the wires are connected properly according to the wiring diagram for your unit. The single ground will connect to the unit lug marked with a ground symbol. The other wires (all of which are hot) connect to the L1, L2 line (hot) lugs in the unit.</span></p><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1425" instrument_node="">If the unit does not operate, try re-setting the thermal high-limit switch demonstrated here: </span><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Ftime_continue%3D76%26v%3DuWQg3pnhAl8" rel="nofollow ugc"><span data-dcnode-id="1424" instrument_node="">https://www.youtube.com/watch?time_continue=76&amp;v=uWQg3pnhAl8</span></a></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Good luck and be safe – if you have any questions about the electrical connections call an electrician!</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Gary		</span></p><span data-dcnode-id="1415" instrument_node="">

</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Hi John,</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Thanks for the comments and question.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">You can use flexible stainless connectors for both the hot and cold side. I can’t exactly recall why I didn’t use one on the hot side – it would have advantages (easy disconnect, flexible if any movement, etc). The connectors I used (Falcon Stainless) are rating for working temps of -40 – 220 degrees Fahrenheit and are intended for hot water too.</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">If you use the flexible connectors, I would highly recommend using the best quality products. Those from Falcon Stainless are very good and offer better flow and much higher quality compared to the cheaper braided connectors.</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Gary		</span></p><span data-dcnode-id="955" instrument_node="">
