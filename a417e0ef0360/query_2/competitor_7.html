</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>Atmospheric water harvesting technologies can be classified based on working principles, namely condensation technology, sorption technology and other technologies. Condensation technology utilizes various refrigeration technologies such as vapor compression cycle, thermoelectric cooling and adsorption/absorption cooling for condensing water vapor. Water harvesting processes can be operated as long as electricity is available. For other technologies, it can be further divided into innovative technologies and hybrid technologies. For innovative technologies, renewable energy powered VCC systems, solar chimney and geothermal cooling systems are used. Based on the above three categories, This paper summarizes these water harvesting technologies from perspectives of system configurations, test setups, simulation methods, performances analysis and important findings. Based on current review study, performances and research gaps of these technologies are compared and evaluated, and possible future research for atmospheric water harvesting in humid or dry climate regions are proposed.</p></div></div></div>" data-dcnode-id="9599" lang="en" name="citation_abstract"><span data-dcnode-id="9598" instrument_node="">

nd content</span></a></div><section class="ReferencedArticles" data-dcnode-id="9065"></section><section class="ReferencedArticles" data-dcnode-id="9064"></section><div class="PageDivider" data-dcnode-id="9063"></div><div class="Abstracts u-font-serif" data-dcnode-id="9030" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="9037" id="abs0015" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9061"><span data-dcnode-id="9062" instrument_node="">Highlights</span></h2><div data-dcnode-id="9038" id="abssec0015"><p data-dcnode-id="9039" id="abspara0015"></p><dl class="list" data-dcnode-id="9040"><dt class="list-label" data-dcnode-id="9059"><span data-dcnode-id="9060" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9056"><p data-dcnode-id="9057" id="p0010"><span data-dcnode-id="9058" instrument_node="">Condensation methods have high water productivity under humid climates.</span></p></dd><dt class="list-label" data-dcnode-id="9054"><span data-dcnode-id="9055" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9051"><p data-dcnode-id="9052" id="p0015"><span data-dcnode-id="9053" instrument_node="">Sorption technology can use solar energy, but its water productivity is low.</span></p></dd><dt class="list-label" data-dcnode-id="9049"><span data-dcnode-id="9050" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9046"><p data-dcnode-id="9047" id="p0020"><span data-dcnode-id="9048" instrument_node="">Desiccant wheel and membrane assisted methods are favorable for dry climates.</span></p></dd><dt class="list-label" data-dcnode-id="9044"><span data-dcnode-id="9045" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9041"><p data-dcnode-id="9042" id="p0025"><span data-dcnode-id="9043" instrument_node="">Water harvesting performances of related technologies are summarized.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="9031" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9035"><span data-dcnode-id="9036" instrument_node="">Abstract</span></h2><div data-dcnode-id="9032" id="abssec0010"><p data-dcnode-id="9033" id="abspara0010"><span data-dcnode-id="9034" instrument_node="">Atmospheric water harvesting technologies can be classified based on working principles, namely condensation technology, sorption technology and other technologies. Condensation technology utilizes various refrigeration technologies such as vapor compression cycle, thermoelectric cooling and adsorption/absorption cooling for condensing water vapor. Water harvesting processes can be operated as long as electricity is available. For other technologies, it can be further divided into innovative technologies and hybrid technologies. For innovative technologies, renewable energy powered VCC systems, solar chimney and geothermal cooling systems are used. Based on the above three categories, This paper summarizes these water harvesting technologies from perspectives of system configurations, test setups, simulation methods, performances analysis and important findings. Based on current review study, performances and research gaps of these technologies are compared and evaluated, and possible future research for atmospheric water harvesting in humid or dry climate regions are proposed.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="9007" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="9019"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="9020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0360544220309725"><svg class="icon icon-navigate-left" data-dcnode-id="9028" focusable="false" height="32" viewBox="0 0 54 128" width=" ta-dcnode-id="8759" href="#bib25" name="bbib25"><span data-dcnode-id="8760" instrument_node="">[25]</span></a><span data-dcnode-id="8758" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8756" href="#bib26" name="bbib26"><span data-dcnode-id="8757" instrument_node="">[26]</span></a><span data-dcnode-id="8755" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8753" href="#bib27" name="bbib27"><span data-dcnode-id="8754" instrument_node="">[27]</span></a><span data-dcnode-id="8752" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8750" href="#bib28" name="bbib28"><span data-dcnode-id="8751" instrument_node="">[28]</span></a><span data-dcnode-id="8749" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8747" href="#bib29" name="bbib29"><span data-dcnode-id="8748" instrument_node="">[29]</span></a><span data-dcnode-id="8746" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8744" href="#bib30" name="bbib30"><span data-dcnode-id="8745" instrument_node="">[30]</span></a><span data-dcnode-id="8743" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8741" href="#bib31" name="bbib31"><span data-dcnode-id="8742" instrument_node="">[31]</span></a><span data-dcnode-id="8740" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8738" href="#bib32" name="bbib32"><span data-dcnode-id="8739" instrument_node="">[32]</span></a><span data-dcnode-id="8737" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8735" href="#bib33" name="bbib33"><span data-dcnode-id="8736" instrument_node="">[33]</span></a><span data-dcnode-id="8734" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8732" href="#bib34" name="bbib34"><span data-dcnode-id="8733" instrument_node="">[34]</span></a><span data-dcnode-id="8731" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8729" href="#bib35" name="bbib35"><span data-dcnode-id="8730" instrument_node="">[35]</span></a><span data-dcnode-id="8728" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8726" href="#bib36" name="bbib36"><span data-dcnode-id="8727" instrument_node="">[36]</span></a><span data-dcnode-id="8725" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8723" href="#bib37" name="bbib37"><span data-dcnode-id="8724" instrument_node="">[37]</span></a><span data-dcnode-id="8722" instrument_node="">], innovative technologies, such as combining wind power with VCC [</span><a class="workspace-trigger" data-dcnode-id="8720" href="#bib38" name="bbib38"><span data-dcnode-id="8721" instrument_node="">[38]</span></a><span data-dcnode-id="8719" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8717" href="#bib39" name="bbib39"><span data-dcnode-id="8718" instrument_node="">[39]</span></a><span data-dcnode-id="8716" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8714" href="#bib40" name="bbib40"><span data-dcnode-id="8715" instrument_node="">[40]</span></a><span data-dcnode-id="8713" instrument_node="">] or solar chimney [</span><a class="workspace-trigger" data-dcnode-id="8711" href="#bib41" name="bbib41"><span data-dcnode-id="8712" instrument_node="">[41]</span></a><span data-dcnode-id="8710" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8708" href="#bib42" name="bbib42"><span data-dcnode-id="8709" instrument_node="">[42]</span></a><span data-dcnode-id="8707" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8705" href="#bib43" name="bbib43"><span data-dcnode-id="8706" instrument_node="">[43]</span></a><span data-dcnode-id="8704" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8702" href="#bib44" name="bbib44"><span data-dcnode-id="8703" instrument_node="">[44]</span></a><span data-dcnode-id="8701" instrument_node="">] or using natural cooling sources [</span><a class="workspace-trigger" data-dcnode-id="8699" href="#bib41" name="bbib41"><span data-dcnode-id="8700" instrument_node="">41</span></a><span data-dcnode-id="8698" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="8696" href="#bib45" name="bbib45"><span data-dcnode-id="8697" instrument_node="">45</span></a><span data-dcnode-id="8695" instrument_node="">], and hybrid technologies that combine desiccant wheel [</span><a class="workspace-trigger" data-dcnode-id="8693" href="#bib46" name="bbib46"><span data-dcnode-id="8694" instrument_node="">46</span></a><span data-dcnode-id="8692" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="8690" href="#bib47" name="bbib47"><span data-dcnode-id="8691" instrument_node="">47</span></a><span data-dcnode-id="8689" instrument_node="">] or membrane [</span><a class="workspace-trigger" data-dcnode-id="8687" href="#bib48" name="bbib48"><span data-dcnode-id="8688" instrument_node="">[48]</span></a><span data-dcnode-id="8686" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8684" href="#bib49" name="bbib49"><span data-dcnode-id="8685" instrument_node="">[49]</span></a><span data-dcnode-id="8683" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8681" href="#bib50" name="bbib50"><span data-dcnode-id="8682" instrument_node="">[50]</span></a><span data-dcnode-id="8680" instrument_node="">] with VCC.</span></p><div data-dcnode-id="8648"><p data-dcnode-id="8674" id="p0035"><span data-dcnode-id="8678" instrument_node="">In the paper, atmospheric water harvesting technologies are reviewed as shown in </span><a class="workspace-trigger" data-dcnode-id="8676" href="#fig1" name="bfig1"><span data-dcnode-id="8677" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="8675" instrument_node="">. Performance evaluating indexes, which are different for technologies, are summarized first. For each technology, working principles, performances and test setups or simulation methods are summarized. Lastly, performances and research gaps of these technologies are compared and evaluated. And based on former studies, possible future research for atmospheric water harvesting in humid or dry climate regions are proposed.</span></p><figure class="figure text-xs" data-dcnode-id="8649" id="fig1"><span data-dcnode-id="8658"><img alt="Fig.&nbsp;1" aria-describedby="cap0010" data-dcnode-id="8673" height="340" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr1.jpg&amp;raw"><span data-dcnode-id="8672" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8659"><li data-dcnode-id="8666"><a class="anchor download-link u-font-sans" data-dcnode-id="8667" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr1_lrg.jpg" target="_blank" title="Download high-res image (304KB)"><span class="anchor-text" data-dcnode-id="8668"><span data-dcnode-id="8671" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8669"><span data-dcnode-id="8670" instrument_node="">Download high-res image (304KB)</span></span></span></a></li><li data-dcnode-id="8660"><a class="anchor download-link u-font-sans" data-dcnode-id="8661" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8662"><span data-dcnode-id="8665" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8663"><span data-dcnode-id="8664" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8650"><span data-dcnode-id="8651" id="cap0010"><p data-dcnode-id="8652" id="fspara0010"><span class="label" data-dcnode-id="8656"><span data-dcnode-id="8657" instrument_node="">Fig.&nbsp;1</span></span><span data-dcnode-id="8655" instrument_node="">. </span><span data-dcnode-id="8653" instrument_node="">Classifications of atmospheric water harvesting technologies.</span></p></span></span></figure></div></section><section data-dcnode-id="6391" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8641" id="sectitle0030"><span data-dcnode-id="8646" instrument_node="">2</span><span data-dcnode-id="8644" instrument_node="">. </span><span data-dcnode-id="8642" instrument_node="">Atmospheric water harvesting using condensation technologies</span></h2><p data-dcnode-id="8497" id="p0040"><span data-dcnode-id="8640" instrument_node="">For condensation technologies, electricity is needed to power the VCC or TEC to produce cold sources. Cooling source temperature must be lower than the dew point temperature of the process air to condense the water vapor. Performance of the condensing technology is often evaluated as harvested water mass per hour and power consumption per unit mass of water harvested, represented as </span><em data-dcnode-id="8638"><span data-dcnode-id="8639" instrument_node="">WHR</span></em><span data-dcnode-id="8637" instrument_node=""> in the unit of kg·h</span><sup data-dcnode-id="8635"><span data-dcnode-id="8636" instrument_node="">−1</span></sup><span data-dcnode-id="8634" instrument_node=""> in </span><a class="workspace-trigger" data-dcnode-id="8630" href="#fd1" name="bfd1"><span data-dcnode-id="8633" instrument_node="">eq. (1) and </span><em data-dcnode-id="8631"><span data-dcnode-id="8632" instrument_node="">UPC</span></em></a><span data-dcnode-id="8629" instrument_node=""> in the unit of kWh·kg</span><sup data-dcnode-id="8627"><span data-dcnode-id="8628" instrument_node="">−1</span></sup><span data-dcnode-id="8626" instrument_node=""> in eq. </span><a class="workspace-trigger" data-dcnode-id="8624" href="#fd2" name="bfd2"><span data-dcnode-id="8625" instrument_node="">(2)</span></a><span data-dcnode-id="8623" instrument_node="">, respectively, in this paper.</span><span class="display" data-dcnode-id="8556"><span class="formula" data-dcnode-id="8557" id="fd1"><span class="label" data-dcnode-id="8621"><span data-dcnode-id="8622" instrument_node="">(1)</span></span><span class="math" data-dcnode-id="8558"><span class="MathJax_Preview" data-dcnode-id="8620" style=""></span><span class="MathJax_SVG" data-dcnode-id="8561" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>W</mi><mi is=&quot;true&quot;>H</mi><mi is=&quot;true&quot;>R</mi><mo linebreak=&quot;badbreak&quot; is=&quot;true&quot;>=</mo><mfrac is=&quot;true&quot;><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>m</mi><mi is=&quot;true&quot;>w</mi></msub></mrow><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>h</mi><mi is=&quot;true&quot;>r</mi></msub></mrow></mfrac></mrow></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="8586" focusable="false" height="3.445ex" role="img" style="vertical-align: -1.354ex;" viewBox="0 -900.1 5440.7 1483.2" width="12.637ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="8587" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="8588" is="true"><g data-dcnode-id="8617" is="true"><use data-dcnode-id="8618" href="#MJMATHI-57"><path d="M436 683Q450 683 486 682T553 680Q604 680 638 681T677 682Q695 682 695 674Q695 670 692 659Q687 641 683 639T661 637Q636 636 621 632T600 624T597 615Q597 603 613 377T629 138L631 141Q633 144 637 151T649 170T666 200T690 241T720 295T759 362Q863 546 877 572T892 604Q892 619 873 628T831 637Q817 637 817 647Q817 650 819 660Q823 676 825 679T83 ode="">P</span></mi><mi data-dcnode-id="8518" is="true"><span data-dcnode-id="8519" instrument_node="">C</span></mi><mo data-dcnode-id="8516" is="true" linebreak="badbreak"><span data-dcnode-id="8517" instrument_node="">=</span></mo><mfrac data-dcnode-id="8507" is="true"><mi data-dcnode-id="8514" is="true"><span data-dcnode-id="8515" instrument_node="">P</span></mi><mrow data-dcnode-id="8508" is="true"><msub data-dcnode-id="8509" is="true"><mi data-dcnode-id="8512" is="true"><span data-dcnode-id="8513" instrument_node="">m</span></mi><mi data-dcnode-id="8510" is="true"><span data-dcnode-id="8511" instrument_node="">w</span></mi></msub></mrow></mfrac></mrow></math></span></span></span></span></span></p><p data-dcnode-id="8489" id="p0045"><span data-dcnode-id="8496" instrument_node="">Higher </span><em data-dcnode-id="8494"><span data-dcnode-id="8495" instrument_node="">WHR</span></em><span data-dcnode-id="8493" instrument_node=""> and lower </span><em data-dcnode-id="8491"><span data-dcnode-id="8492" instrument_node="">UPC</span></em><span data-dcnode-id="8490" instrument_node=""> are desired as they mean more water can be obtained in given time and less power is required to harvest the same amount of water.</span></p><section data-dcnode-id="7628" id="sec2.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8483" id="sectitle0035"><span data-dcnode-id="8488" instrument_node="">2.1</span><span data-dcnode-id="8486" instrument_node="">. </span><span data-dcnode-id="8484" instrument_node="">Condensation technologies using VCC</span></h3><p data-dcnode-id="8448" id="p0050"><span data-dcnode-id="8482" instrument_node="">In some studies, VCC is used just for water harvesting [</span><a class="workspace-trigger" data-dcnode-id="8480" href="#bib1" name="bbib1"><span data-dcnode-id="8481" instrument_node="">[1]</span></a><span data-dcnode-id="8479" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8477" href="#bib2" name="bbib2"><span data-dcnode-id="8478" instrument_node="">[2]</span></a><span data-dcnode-id="8476" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8474" href="#bib3" name="bbib3"><span data-dcnode-id="8475" instrument_node="">[3]</span></a><span data-dcnode-id="8473" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8471" href="#bib4" name="bbib4"><span data-dcnode-id="8472" instrument_node="">[4]</span></a><span data-dcnode-id="8470" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8468" href="#bib5" name="bbib5"><span data-dcnode-id="8469" instrument_node="">[5]</span></a><span data-dcnode-id="8467" instrument_node="">]. While in other studies, VCC is used for both air conditioning and water harvesting [</span><a class="workspace-trigger" data-dcnode-id="8465" href="#bib6" name="bbib6"><span data-dcnode-id="8466" instrument_node="">[6]</span></a><span data-dcnode-id="8464" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8462" href="#bib7" name="bbib7"><span data-dcnode-id="8463" instrument_node="">[7]</span></a><span data-dcnode-id="8461" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8459" href="#bib8" name="bbib8"><span data-dcnode-id="8460" instrument_node="">[8]</span></a><span data-dcnode-id="8458" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8456" href="#bib9" name="bbib9"><span data-dcnode-id="8457" instrument_node="">[9]</span></a><span data-dcnode-id="8455" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8453" href="#bib10" name="bbib10"><span data-dcnode-id="8454" instrument_node="">[10]</span></a><span data-dcnode-id="8452" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8450" href="#bib11" name="bbib11"><span data-dcnode-id="8451" instrument_node="">[11]</span></a><span data-dcnode-id="8449" instrument_node="">]. The latter is normally used in central cooling systems and condensed water is considered the byproduct of air cooling.</span></p><section data-dcnode-id="8128" id="sec2.1.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8442" id="sectitle0040"><span data-dcnode-id="8447" instrument_node="">2.1.1</span><span data-dcnode-id="8445" instrument_node="">. </span><span data-dcnode-id="8443" instrument_node="">Condensation technology using VCC for atmospheric water harvesting</span></h4><p data-dcnode-id="8419" id="p0055"><span data-dcnode-id="8441" instrument_node="">Luo et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="8439" href="#bib1" name="bbib1"><span data-dcnode-id="8440" instrument_node="">1</span></a><span data-dcnode-id="8438" instrument_node="">] proposed an atmospheric water harvesting device using VCC for military purpose. The ambient air is cooled and dehumidified at the evaporator and the heat is dissipated at the condenser by the dehumidified air from the evaporator. </span><em data-dcnode-id="8436"><span data-dcnode-id="8437" instrument_node="">WHR</span></em><span data-dcnode-id="8435" instrument_node=""> was reported to be 1.50&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8433"><span data-dcnode-id="8434" instrument_node="">−1</span></sup><span data-dcnode-id="8432" instrument_node=""> when ambient dry bulb and wet bulb temperatures were 26.7&nbsp;°C and 19.4&nbsp;°C, respectively. For the discussed device, the rated air flow rate was 578&nbsp;m</span><sup data-dcnode-id="8430"><span data-dcnode-id="8431" instrument_node="">3</span></sup><span data-dcnode-id="8429" instrument_node="">&nbsp;h</span><sup data-dcnode-id="8427"><span data-dcnode-id="8428" instrument_node="">−1</span></sup><span data-dcnode-id="8426" instrument_node="">, which is adjustable, and rated input power of compressor was 1035&nbsp;W. Under the designed working condition, </span><em data-dcnode-id="8424"><span data-dcnode-id="8425" instrument_node="">UPC</span></em><span data-dcnode-id="8423" instrument_node=""> can be calculated as 0.69&nbsp;kWh·kg</span><sup data-dcnode-id="8421"><span data-dcnode-id="8422" instrument_node="">−1</span></sup><span data-dcnode-id="8420" instrument_node="">.</span></p><p data-dcnode-id="8360" id="p0060"><span data-dcnode-id="8418" instrument_node="">Yang [</span><a class="workspace-trigger" data-dcnode-id="8416" href="#bib2" name="bbib2"><span data-dcnode-id="8417" instrument_node="">2</span></a><span data-dcnode-id="8415" instrument_node="">] conducted field tests of such a device. The rated power of compressor was 370&nbsp;W and rated cooling capacity was 1.5&nbsp;kW. It was found that </span><em data-dcnode-id="8413"><span data-dcnode-id="8414" instrument_node="">WHR</span></em><span data-dcnode-id="8412" instrument_node=""> was largely influenced by the inlet relative humidity of dehumidification air. At 35&nbsp;°C inlet air temperature, when relative humidity is increased from 20 to 40%, </span><em data-dcnode-id="8410"><span data-dcnode-id="8411" instrument_node="">WHR</span></em><span data-dcnode-id="8409" instrument_node=""> is increased from 0.13 to 2.00&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8407"><span data-dcnode-id="8408" instrument_node="">−1</span></sup><span data-dcnode-id="8406" instrument_node="">. Zhang et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="8404" href="#bib3" name="bbib3"><span data-dcnode-id="8405" instrument_node="">3</span></a><span data-dcnode-id="8403" instrument_node="">] and Liu [</span><a class="workspace-trigger" data-dcnode-id="8401" href="#bib4" name="bbib4"><span data-dcnode-id="8402" instrument_node="">4</span></a><span data-dcnode-id="8400" instrument_node="">] proposed a device with two parallel evaporators, with the aims of studying influences of evaporating heat transfer area on system performances. The </span><em data-dcnode-id="8398"><span data-dcnode-id="8399" instrument_node="">WHR</span></em><span data-dcnode-id="8397" instrument_node="">, energy consumption, and cooling efficiency of evaporators were tested under the climate condition of Tianjin, which is located at northeast coast of China with a humid climate. The results show that the monthly average </span><em data-dcnode-id="8395"><span data-dcnode-id="8396" instrument_node="">WHR</span></em><span data-dcnode-id="8394" instrument_node=""> varied from 1.50 to 4.20&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8392"><span data-dcnode-id="8393" instrument_node="">−1</span></sup><span data-dcnode-id="8391" instrument_node=""> and </span><em data-dcnode-id="8389"><span data-dcnode-id="8390" instrument_node="">UPC</span></em><span data-dcnode-id="8388" instrument_node=""> was from 0.48 to 1.43&nbsp;kWh·kg</span><sup data-dcnode-id="8386"><span data-dcnode-id="8387" instrument_node="">−1</span></sup><span data-dcnode-id="8385" instrument_node="">. During dry months like March and April, </span><em data-dcnode-id="8383"><span data-dcnode-id="8384" instrument_node="">WHR</span></em><span data-dcnode-id="8382" instrument_node=""> varied from 1.50 to 1.80&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8380"><span data-dcnode-id="8381" instrument_node="">−1</span></sup><span data-dcnode-id="8379" instrument_node=""> and </span><em data-dcnode-id="8377"><span data-dcnode-id="8378" instrument_node="">UPC</span></em><span data-dcnode-id="8376" instrument_node=""> was from 1.11 to 1.43&nbsp;kWh·kg</span><sup data-dcnode-id="8374"><span data-dcnode-id="8375" instrument_node="">−1</span></sup><span data-dcnode-id="8373" instrument_node="">. During humid months from June to September, </span><em data-dcnode-id="8371"><span data-dcnode-id="8372" instrument_node="">WHR</span></em><span data-dcnode-id="8370" instrument_node=""> varied from 3.70 to 4.20&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8368"><span data-dcnode-id="8369" instrument_node="">−1</span></sup><span data-dcnode-id="8367" instrument_node=""> and </span><em data-dcnode-id="8365"><span data-dcnode-id="8366" instrument_node="">UPC</span></em><span data-dcnode-id="8364" instrument_node=""> was from 0.24 to 0.27&nbsp;kWh·kg</span><sup data-dcnode-id="8362"><span data-dcnode-id="8363" instrument_node="">−1</span></sup><span data-dcnode-id="8361" instrument_node="">. The results support the conclusion that higher humidity ratio of air is beneficial for water harvesting when using VCC.</span></p><p data-dcnode-id="8328" id="p0065"><span data-dcnode-id="8359" instrument_node="">Zolfagharkhani et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="8357" href="#bib5" name="bbib5"><span data-dcnode-id="8358" instrument_node="">5</span></a><span data-dcnode-id="8356" instrument_node="">] conducted a simulation research of such a system. A small scale prototype was designed and simulated. The results show that </span><em data-dcnode-id="8354"><span data-dcnode-id="8355" instrument_node="">WHR</span></em><span data-dcnode-id="8353" instrument_node=""> and </span><em data-dcnode-id="8351"><span data-dcnode-id="8352" instrument_node="">UPC</span></em><span data-dcnode-id="8350" instrument_node=""> of the system are strongly dependent on the ambient temperature and relative humidity. The system was more practical for hot and humid climate. A case study on a coastal city in the south of Iran, where the ambient air is humid and relative humidity is from 69% in May to 94% in December, was carried out. Evaporating temperature was set as 10&nbsp;°C and condensing temperature was set at 60&nbsp;°C. The results show that the small scale system was able to produce 22–26&nbsp;L water everyday with energy intensity between 220 and 300&nbsp;Wh·L</span><sup data-dcnode-id="8348"><span data-dcnode-id="8349" instrument_node="">−1</span></sup><span data-dcnode-id="8347" instrument_node=""> when the air flow rate of which was around 650&nbsp;m</span><sup data-dcnode-id="8345"><span data-dcnode-id="8346" instrument_node="">3</span></sup><span data-dcnode-id="8344" instrument_node="">&nbsp;h</span><sup data-dcnode-id="8342"><span data-dcnode-id="8343" instrument_node="">−1</span></sup><span data-dcnode-id="8341" instrument_node="">. It can be calculated that </span><em data-dcnode-id="8339"><span data-dcnode-id="8340" instrument_node="">WHR</span></em><span data-dcnode-id="8338" instrument_node=""> would be from 0.92 to 1.08&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8336"><span data-dcnode-id="8337" instrument_node="">−1</span></sup><span data-dcnode-id="8335" instrument_node=""> if it was operated for 24&nbsp;h a day and </span><em data-dcnode-id="8333"><span data-dcnode-id="8334" instrument_node="">UPC</span></em><span data-dcnode-id="8332" instrument_node=""> would be from 0.22 to 0.30&nbsp;kWh·kg</span><sup data-dcnode-id="8330"><span data-dcnode-id="8331" instrument_node="">−1</span></sup><span data-dcnode-id="8329" instrument_node="">.</span></p><div data-dcnode-id="8129"><p data-dcnode-id="8293" id="p0070"><span data-dcnode-id="8327" instrument_node="">Performances and details of the above systems can be summarized in </span><a class="workspace-trigger" data-dcnode-id="8325" href="#tbl1" name="btbl1"><span data-dcnode-id="8326" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="8324" instrument_node="">. It can be seen that </span><em data-dcnode-id="8322"><span data-dcnode-id="8323" instrument_node="">WHR</span></em><span data-dcnode-id="8321" instrument_node=""> of condensation technologies using VCC is in the range of 0.13–4.20&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8319"><span data-dcnode-id="8320" instrument_node="">−1</span></sup><span data-dcnode-id="8318" instrument_node=""> with the average value of 1.71&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8316"><span data-dcnode-id="8317" instrument_node="">−1</span></sup><span data-dcnode-id="8315" instrument_node="">, and </span><em data-dcnode-id="8313"><span data-dcnode-id="8314" instrument_node="">UPC</span></em><span data-dcnode-id="8312" instrument_node=""> is in the range of 0.18–2.08&nbsp;kWh·kg</span><sup data-dcnode-id="8310"><span data-dcnode-id="8311" instrument_node="">−1</span></sup><span data-dcnode-id="8309" instrument_node=""> with the average value of 0.86&nbsp;kWh·kg</span><sup data-dcnode-id="8307"><span data-dcnode-id="8308" instrument_node="">−1</span></sup><span data-dcnode-id="8306" instrument_node="">. Air flow rate is in the range of 300&nbsp;m</span><sup data-dcnode-id="8304"><span data-dcnode-id="8305" instrument_node="">3</span></sup><span data-dcnode-id="8303" instrument_node="">&nbsp;h</span><sup data-dcnode-id="8301"><span data-dcnode-id="8302" instrument_node="">−1</span></sup><span data-dcnode-id="8300" instrument_node=""> to 1000&nbsp;m</span><sup data-dcnode-id="8298"><span data-dcnode-id="8299" instrument_node="">3</span></sup><span data-dcnode-id="8297" instrument_node="">&nbsp;h</span><sup data-dcnode-id="8295"><span data-dcnode-id="8296" instrument_node="">−1</span></sup><span data-dcnode-id="8294" instrument_node="">.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="8130" id="tbl1"><span class="captions" data-dcnode-id="8285"><span data-dcnode-id="8286" id="cap0045"><p data-dcnode-id="8287" id="tspara0010"><span class="label" data-dcnode-id="8291"><span data-dcnode-id="8292" instrument_node="">Table&nbsp;1</span></span><span data-dcnode-id="8290" instrument_node="">. </span><span data-dcnode-id="8288" instrument_node="">Main information of condensation technologies using VCC for water harvesting.</span></p></span></span><div class="groups" data-dcnode-id="8131"><table data-dcnode-id="8132"><thead data-dcnode-id="8273"><tr class="rowsep-1 valign-top" data-dcnode-id="8274"><th data-dcnode-id="8283" scope="col"><span data-dcnode-id="8284" instrument_node="">Reference</span></th><th data-dcnode-id="8281" scope="col"><span data-dcnode-id="8282" instrument_node="">System information</span></th><th data-dcnode-id="8278" scope="col"><em data-dcnode-id="8279"><span data-dcnode-id="8280" instrument_node="">WHR</span></em></th><th data-dcnode-id="8275" scope="col"><em data-dcnode-id="8276"><span data-dcnode-id="8277" instrument_node="">UPC</span></em></th></tr></thead><tbody data-dcnode-id="8133"><tr class="valign-top" data-dcnode-id="8245"><td class="align-left" data-dcnode-id="8268"><span data-dcnode-id="8272" instrument_node="">[</span><a class="workspace-trigger" data-dcnode-id="8270" href="#bib1" name="bbib1"><span data-dcnode-id="8271" instrument_node="">1</span></a><span data-dcnode-id="8269" instrument_node="">]</span></td><td class="align-left" data-dcnode-id="8260"><span data-dcnode-id="8267" instrument_node="">Rated air flow rate is 578&nbsp;m</span><sup data-dcnode-id="8265"><span data-dcnode-id="8266" instrument_node="">3</span></sup><span data-dcnode-id="8264" instrument_node="">&nbsp;h</span><sup data-dcnode-id="8262"><span data-dcnode-id="8263" instrument_node="">−1</span></sup><span data-dcnode-id="8261" instrument_node=""> (adjustable); Rated compressor power is 1035&nbsp;W.</span></td><td class="align-left" data-dcnode-id="8253"><em data-dcnode-id="8258"><span data-dcnode-id="8259" instrument_node="">WHR</span></em><span data-dcnode-id="8257" instrument_node="">&nbsp;=&nbsp;1.5&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8255"><span data-dcnode-id="8256" instrument_node="">−1</span></sup><span data-dcnode-id="8254" instrument_node=""> (dry bulb and wet bulb temperature: 26.7&nbsp;°C, 19.4&nbsp;°C).</span></td><td class="align-left" data-dcnode-id="8246"><em data-dcnode-id="8251"><span data-dcnode-id="8252" instrument_node="">UPC</span></em><span data-dcnode-id="8250" instrument_node="">&nbsp;=&nbsp;0.69&nbsp;kWh·kg</span><sup data-dcnode-id="8248"><span data-dcnode-id="8249" instrument_node="">−1</span></sup><span data-dcnode-id="8247" instrument_node=""> (dry bulb and wet bulb temperature: 26.7&nbsp;°C, 19.4&nbsp;°C).</span></td></tr><tr class="valign-top" data-dcnode-id="8217"><td class="align-left" data-dcnode-id="8240"><span data-dcnode-id="8244" instrument_node="">[</span><a class="workspace-trigger" data-dcnode-id="8242" href="#bib2" name="bbib2"><span data-dcnode-id="8243" instrument_node="">2</span></a><span data-dcnode-id="8241" instrument_node="">]</span></td><td class="align-left" data-dcnode-id="8238"><span data-dcnode-id="8239" instrument_node="">Weight is 39&nbsp;kg; uses R22; rated compressor power is 370&nbsp;W and rated cooling capacity is 1.5&nbsp;kW.</span></td><td class="align-left" data-dcnode-id="8228"><em data-dcnode-id="8236"><span data-dcnode-id="8237" instrument_node="">WHR</span></em><span data-dcnode-id="8235" instrument_node="">&nbsp;=&nbsp;0.13&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8233"><span data-dcnode-id="8234" instrument_node="">−1</span></sup><span data-dcnode-id="8232" instrument_node=""> to 2&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8230"><span data-dcnode-id="8231" instrument_node="">−1</span></sup><span data-dcnode-id="8229" instrument_node=""> (ambient condition: 35&nbsp;°C, 20–40% RH).</span></td><td class="align-left" data-dcnode-id="8218"><em data-dcnode-id="8226"><span data-dcnode-id="8227" instrument_node="">UPC</span></em><span data-dcnode-id="8225" instrument_node="">&nbsp;=&nbsp;2.8&nbsp;kWh·kg</span><sup data-dcnode-id="8223"><span data-dcnode-id="8224" instrument_node="">−1</span></sup><span data-dcnode-id="8222" instrument_node=""> to 0.18&nbsp;kWh·kg</span><sup data-dcnode-id="8220"><span data-dcnode-id="8221" instrument_node="">−1</span></sup><span data-dcnode-id="8219" instrument_node="">.</span></td></tr><tr class="valign-top" data-dcnode-id="8171"><td class="align-left" data-dcnode-id="8209"><span data-dcnode-id="8216" instrument_node="">[</span><a class="workspace-trigger" data-dcnode-id="8214" href="#bib3" name="bbib3"><span data-dcnode-id="8215" instrument_node="">3</span></a><span data-dcnode-id="8213" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="8211" href="#bib4" name="bbib4"><span data-dcnode-id="8212" instrument_node="">4</span></a><span data-dcnode-id="8210" instrument_node="">]</span></td><td class="align-left" data-dcnode-id="8195"><span data-dcnode-id="8208" instrument_node="">AFR is from 300&nbsp;m</span><sup data-dcnode-id="8206"><span data-dcnode-id="8207" instrument_node="">3</span></sup><span data-dcnode-id="8205" instrument_node="">&nbsp;h</span><sup data-dcnode-id="8203"><span data-dcnode-id="8204" instrument_node="">−1</span></sup><span data-dcnode-id="8202" instrument_node=""> to 1000&nbsp;m</span><sup data-dcnode-id="8200"><span data-dcnode-id="8201" instrument_node="">3</span></sup><span data-dcnode-id="8199" instrument_node="">&nbsp;h</span><sup data-dcnode-id="8197"><span data-dcnode-id="8198" instrument_node="">−1</span></sup><span data-dcnode-id="8196" instrument_node="">.</span></td><td class="align-left" data-dcnode-id="8185"><em data-dcnode-id="8193"><span data-dcnode-id="8194" instrument_node="">WHR</span></em><span data-dcnode-id="8192" instrument_node="">&nbsp;=&nbsp;1.5&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8190"><span data-dcnode-id="8191" instrument_node="">−1</span></sup><span data-dcnode-id="8189" instrument_node=""> to 4.2&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8187"><span data-dcnode-id="8188" instrument_node="">−1</span></sup><span data-dcnode-id="8186" instrument_node="">.</span></td><td class="align-left" data-dcnode-id="8172"><em data-dcnode-id="8183"><span data-dcnode-id="8184" instrument_node="">UPC</span></em><span data-dcnode-id="8182" instrument_node="">&nbsp;=&nbsp;0.48&nbsp;kWh·kg</span><sup data-dcnode-id="8180"><span data-dcnode-id="8181" instrument_node="">−1</span></sup><span data-dcnode-id="8179" instrument_node=""> to 1.33&nbsp;kWh·kg</span><sup data-dcnode-id="8177"><span data-dcnode-id="8178" instrument_node="">−1</span></sup><span data-dcnode-id="8176" instrument_node="">l; average value is 0.64&nbsp;kWh·kg</span><sup data-dcnode-id="8174"><span data-dcnode-id="8175" instrument_node="">−1</span></sup><span data-dcnode-id="8173" instrument_node="">.</span></td></tr><tr class="valign-top" data-dcnode-id="8134"><td class="align-left" data-dcnode-id="8166"><span data-dcnode-id="8170" instrument_node="">[</span><a class="workspace-trigger" data-dcnode-id="8168" href="#bib5" name="bbib5"><span data-dcnode-id="8169" instrument_node="">5</span></a><span data-dcnode-id="8167" instrument_node="">]</span></td><td class="align-left" data-dcnode-id="8155"><span data-dcnode-id="8165" instrument_node="">AFR is around 650&nbsp;m</span><sup data-dcnode-id="8163"><span data-dcnode-id="8164" instrument_node="">3</span></sup><span data-dcnode-id="8162" instrument_node="">&nbsp;h</span><sup data-dcnode-id="8160"><span data-dcnode-id="8161" instrument_node="">−1</span></sup><span data-dcnode-id="8159" instrument_node="">; frontal area is 0.04&nbsp;m</span><sup data-dcnode-id="8157"><span data-dcnode-id="8158" instrument_node="">2</span></sup><span data-dcnode-id="8156" instrument_node="">.</span></td><td class="align-left" data-dcnode-id="8145"><em data-dcnode-id="8153"><span data-dcnode-id="8154" instrument_node="">WHR</span></em><span data-dcnode-id="8152" instrument_node="">&nbsp;=&nbsp;0.92&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8150"><span data-dcnode-id="8151" instrument_node="">−1</span></sup><span data-dcnode-id="8149" instrument_node=""> to 1.08&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8147"><span data-dcnode-id="8148" instrument_node="">−1</span></sup><span data-dcnode-id="8146" instrument_node="">.</span></td><td class="align-left" data-dcnode-id="8135"><em data-dcnode-id="8143"><span data-dcnode-id="8144" instrument_node="">UPC</span></em><span data-dcnode-id="8142" instrument_node="">&nbsp;=&nbsp;0.22&nbsp;kWh·kg</span><sup data-dcnode-id="8140"><span data-dcnode-id="8141" instrument_node="">−1</span></sup><span data-dcnode-id="8139" instrument_node=""> to 0.3&nbsp;kWh·kg</span><sup data-dcnode-id="8137"><span data-dcnode-id="8138" instrument_node="">−1</span></sup><span data-dcnode-id="8136" instrument_node="">.</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="7629" id="sec2.1.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8122" id="sectitle0045"><span data-dcnode-id="8127" instrument_node="">2.1.2</span><span data-dcnode-id="8125" instrument_node="">. </span><span data-dcnode-id="8123" instrument_node="">Condensation technologies using VCC for air conditioning and water harvesting</span></h4><p data-dcnode-id="8084" id="p0075"><span data-dcnode-id="8121" instrument_node="">Magrini et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="8119" href="#bib6" name="bbib6"><span data-dcnode-id="8120" instrument_node="">6</span></a><span data-dcnode-id="8118" instrument_node="">] investigated an HVAC system, which provided air conditioning and domestic water for a hotel in Abu Dhabi. For the proposed system, air flow rate for each module was 30,000&nbsp;m</span><sup data-dcnode-id="8116"><span data-dcnode-id="8117" instrument_node="">3</span></sup><span data-dcnode-id="8115" instrument_node="">&nbsp;h</span><sup data-dcnode-id="8113"><span data-dcnode-id="8114" instrument_node="">−1</span></sup><span data-dcnode-id="8112" instrument_node="">. The results show that average amount of water harvested from each module each day was highest in September, which was 10.2&nbsp;m</span><sup data-dcnode-id="8110"><span data-dcnode-id="8111" instrument_node="">3</span></sup><span data-dcnode-id="8109" instrument_node="">·day</span><sup data-dcnode-id="8107"><span data-dcnode-id="8108" instrument_node="">−1</span></sup><span data-dcnode-id="8106" instrument_node=""> (</span><em data-dcnode-id="8104"><span data-dcnode-id="8105" instrument_node="">WHR</span></em><span data-dcnode-id="8103" instrument_node="">&nbsp;=&nbsp;425&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8101"><span data-dcnode-id="8102" instrument_node="">−1</span></sup><span data-dcnode-id="8100" instrument_node="">). When ambient air became drier like in winter, this value was reduced to around 2.5&nbsp;m</span><sup data-dcnode-id="8098"><span data-dcnode-id="8099" instrument_node="">3</span></sup><span data-dcnode-id="8097" instrument_node="">·day</span><sup data-dcnode-id="8095"><span data-dcnode-id="8096" instrument_node="">−1</span></sup><span data-dcnode-id="8094" instrument_node=""> (</span><em data-dcnode-id="8092"><span data-dcnode-id="8093" instrument_node="">WHR</span></em><span data-dcnode-id="8091" instrument_node="">&nbsp;=&nbsp;104&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8089"><span data-dcnode-id="8090" instrument_node="">−1</span></sup><span data-dcnode-id="8088" instrument_node="">). Magrini et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="8086" href="#bib7" name="bbib7"><span data-dcnode-id="8087" instrument_node="">7</span></a><span data-dcnode-id="8085" instrument_node="">] then found that harvested water by the system with water harvesting function met about 56.4% of the daily demand of the hotel and the overall cost of water was reduced by 19%.</span></p><p data-dcnode-id="8049" id="p0080"><span data-dcnode-id="8083" instrument_node="">Habeebullah [</span><a class="workspace-trigger" data-dcnode-id="8081" href="#bib8" name="bbib8"><span data-dcnode-id="8082" instrument_node="">8</span></a><span data-dcnode-id="8080" instrument_node="">] numerically studied the potential of using evaporator coils for water harvesting in hot and humid areas. For the evaporator coil, the heat transfer area is 47&nbsp;m</span><sup data-dcnode-id="8078"><span data-dcnode-id="8079" instrument_node="">2</span></sup><span data-dcnode-id="8077" instrument_node=""> and frontal area is 1.17&nbsp;m</span><sup data-dcnode-id="8075"><span data-dcnode-id="8076" instrument_node="">2</span></sup><span data-dcnode-id="8074" instrument_node="">. Under humid ambient condition, which is 34.6&nbsp;°C and 61% RH, 24.8&nbsp;kg&nbsp;m</span><sup data-dcnode-id="8072"><span data-dcnode-id="8073" instrument_node="">−2</span></sup><span data-dcnode-id="8071" instrument_node="">·day</span><sup data-dcnode-id="8069"><span data-dcnode-id="8070" instrument_node="">−1</span></sup><span data-dcnode-id="8068" instrument_node=""> water can be harvested when moisture air velocity is 1&nbsp;m&nbsp;s</span><sup data-dcnode-id="8066"><span data-dcnode-id="8067" instrument_node="">−1</span></sup><span data-dcnode-id="8065" instrument_node="">. Volume flow rate can be calculated as 4212&nbsp;m</span><sup data-dcnode-id="8063"><span data-dcnode-id="8064" instrument_node="">3</span></sup><span data-dcnode-id="8062" instrument_node="">&nbsp;h</span><sup data-dcnode-id="8060"><span data-dcnode-id="8061" instrument_node="">−1</span></sup><span data-dcnode-id="8059" instrument_node="">. </span><em data-dcnode-id="8057"><span data-dcnode-id="8058" instrument_node="">WHR</span></em><span data-dcnode-id="8056" instrument_node=""> can be calculated as 48.6&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8054"><span data-dcnode-id="8055" instrument_node="">−1</span></sup><span data-dcnode-id="8053" instrument_node="">. And it was found that </span><em data-dcnode-id="8051"><span data-dcnode-id="8052" instrument_node="">WHR</span></em><span data-dcnode-id="8050" instrument_node=""> was higher when ambient humidity ratio was higher and vice versa. Besides, a working chart was developed to predict the maximum water yield when the ambient conditions are in the range of 25–40&nbsp;°C and 30–100% RH.</span></p><p data-dcnode-id="8011" id="p0085"><span data-dcnode-id="8048" instrument_node="">Nada et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="8046" href="#bib9" name="bbib9"><span data-dcnode-id="8047" instrument_node="">9</span></a><span data-dcnode-id="8045" instrument_node="">] theoretically studied a hybrid system when applied in hot and dry climate region. In this study, the air was humidified by a steam humidifier or an evaporative cooler before being condensed in the cooling coil of VCC. Four air handling processes considering the adoption of heat recovery and the locations of evaporative cooling within the air conditioning systems were studied. The results show that higher fresh air ratio, higher ambient wet bulb temperature and higher supply air temperature lead to higher </span><em data-dcnode-id="8043"><span data-dcnode-id="8044" instrument_node="">WHR</span></em><span data-dcnode-id="8042" instrument_node="">. Correlation equations of </span><em data-dcnode-id="8040"><span data-dcnode-id="8041" instrument_node="">WHR</span></em><span data-dcnode-id="8039" instrument_node=""> and power consumption (</span><em data-dcnode-id="8037"><span data-dcnode-id="8038" instrument_node="">P</span></em><span data-dcnode-id="8036" instrument_node="">) of each system were given. It is advised to put the evaporative cooling after the mixture of ambient air and return air, which can remarkably increase </span><em data-dcnode-id="8034"><span data-dcnode-id="8035" instrument_node="">WHR</span></em><span data-dcnode-id="8033" instrument_node=""> as compared with cases of applying it to the ambient air. Under optimal system design, when supply air temperature is 14&nbsp;°C, ambient wet bulb temperature is 19&nbsp;°C and </span><em data-dcnode-id="8031"><span data-dcnode-id="8032" instrument_node="">m</span></em><sub data-dcnode-id="8028"><em data-dcnode-id="8029"><span data-dcnode-id="8030" instrument_node="">o</span></em></sub><span data-dcnode-id="8027" instrument_node="">/</span><em data-dcnode-id="8025"><span data-dcnode-id="8026" instrument_node="">m</span></em><sub data-dcnode-id="8022"><em data-dcnode-id="8023"><span data-dcnode-id="8024" instrument_node="">s</span></em></sub><span data-dcnode-id="8021" instrument_node=""> (ambient air mass flow rate (MFR)/supply air MFR) is 0.25, 9000&nbsp;kg of water can be obtained each day with 351&nbsp;kW cooling capacity. </span><em data-dcnode-id="8019"><span data-dcnode-id="8020" instrument_node="">WHR</span></em><span data-dcnode-id="8018" instrument_node=""> can be calculated as 375&nbsp;kg&nbsp;h</span><sup data-dcnode-id="8016"><span data-dcnode-id="8017" instrument_node="">−1</span></sup><span data-dcnode-id="8015" instrument_node="">. However, one problem needs to be further explained in this study. For the steam humidifier and the evaporative cooling, water is required to humidify the process air. Therefore, this part of water should be considered as cost for the production of water and is not appropriate to be counted for the calculation of </span><em data-dcnode-id="8013"><span data-dcnode-id="8014" instrument_node="">WHR</span></em><span data-dcnode-id="8012" instrument_node="">, unless its purpose is sea water desalination.</span></p><p data-dcnode-id="7937" id="p0090"><span data-dcnode-id="8010" instrument_node="">In the study of Elattar et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="8008" href="#bib10" name="bbib10"><span data-dcnode-id="8009" instrument_node="">10</span></a><span data-dcnode-id="8007" instrument_node="">], the ambient air was heated first, and then it was humidified in a spray tower to increase its humidity ratio. Next it was dehumidified by cold sea water to produce fresh water. After that the ambient air was mixed with return air and was sent to cooling coil for cooling and dehumidification. This part of fresh water was collected too. Solar heaters were used to heat the air and the spray water before air was humidified in the spray tower. Advantages of this device is that sea water can be purified by means of the spray tower and the free cooling from cold sea water can be used effectively. The results show that </span><em data-dcnode-id="8005"><span data-dcnode-id="8006" instrument_node="">WHR</span></em><span data-dcnode-id="8004" instrument_node=""> increased with the increase of ambient temperature and humidity ratio. Coefficient of Performance (</span><em data-dcnode-id="8002"><span data-dcnode-id="8003" instrument_node="">COP</span></em><span data-dcnode-id="8001" instrument_node="">) was used to evaluate performances of this system, which was defined as room cooling load plus latent heat capacity of fresh water divided by power consumption. The results show that the </span><em data-dcnode-id="7999"><span data-dcnode-id="8000" instrument_node="">COP</span></em><span data-dcnode-id="7998" instrument_node=""> of the proposed system increased with the increase of ambient temperature and humidity ratio. Therefore, it can operate efficiently in humid climatic regions and cost saving can be increased too. Comparing with the basic system, which had no humidification process, the </span><em data-dcnode-id="7996"><span data-dcnode-id="7997" instrument_node="">COP</span></em><span data-dcnode-id="7995" instrument_node=""> of the proposed system was higher, especially under hot-and-humid climate. When ambient condition is 40&nbsp;°C and 20&nbsp;g&nbsp;kg</span><sup data-dcnode-id="7993"><span data-dcnode-id="7994" instrument_node="">−1</span></sup><span data-dcnode-id="7992" instrument_node="">, the MFR of ambient air was 1&nbsp;kg&nbsp;s</span><sup data-dcnode-id="7990"><span data-dcnode-id="7991" instrument_node="">−1</span></sup><span data-dcnode-id="7989" instrument_node=""> and temperature rise of the air after the heater was 10&nbsp;°C, the </span><em data-dcnode-id="7987"><span data-dcnode-id="7988" instrument_node="">WHR</span></em><span data-dcnode-id="7986" instrument_node=""> of for the proposed system was around 100&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7984"><span data-dcnode-id="7985" instrument_node="">−1</span></sup><span data-dcnode-id="7983" instrument_node=""> and </span><em data-dcnode-id="7981"><span data-dcnode-id="7982" instrument_node="">COP</span></em><span data-dcnode-id="7980" instrument_node=""> was around 3. And for the basic system, </span><em data-dcnode-id="7978"><span data-dcnode-id="7979" instrument_node="">WHR</span></em><span data-dcnode-id="7977" instrument_node=""> was around 50&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7975"><span data-dcnode-id="7976" instrument_node="">−1</span></sup><span data-dcnode-id="7974" instrument_node=""> and </span><em data-dcnode-id="7972"><span data-dcnode-id="7973" instrument_node="">COP</span></em><span data-dcnode-id="7971" instrument_node=""> was around 2.3. Under this working condition, the increase of power consumption of the proposed system was about 120&nbsp;kWh. Therefore, for the increased </span><em data-dcnode-id="7969"><span data-dcnode-id="7970" instrument_node="">WHR</span></em><span data-dcnode-id="7968" instrument_node="">, which was around 50&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7966"><span data-dcnode-id="7967" instrument_node="">−1</span></sup><span data-dcnode-id="7965" instrument_node="">, </span><em data-dcnode-id="7963"><span data-dcnode-id="7964" instrument_node="">UPC</span></em><span data-dcnode-id="7962" instrument_node=""> for the additional harvested water can be calculated as 2.40&nbsp;kWh·kg</span><sup data-dcnode-id="7960"><span data-dcnode-id="7961" instrument_node="">−1</span></sup><span data-dcnode-id="7959" instrument_node="">. As air MFR was increased to 3&nbsp;kg&nbsp;s</span><sup data-dcnode-id="7957"><span data-dcnode-id="7958" instrument_node="">−1</span></sup><span data-dcnode-id="7956" instrument_node="">, </span><em data-dcnode-id="7954"><span data-dcnode-id="7955" instrument_node="">WHR</span></em><span data-dcnode-id="7953" instrument_node=""> and power consumption of the proposed system was 250&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7951"><span data-dcnode-id="7952" instrument_node="">−1</span></sup><span data-dcnode-id="7950" instrument_node=""> and 1500&nbsp;kWh, respectively. The increase of </span><em data-dcnode-id="7948"><span data-dcnode-id="7949" instrument_node="">WHR</span></em><span data-dcnode-id="7947" instrument_node=""> and power consumption was 120&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7945"><span data-dcnode-id="7946" instrument_node="">−1</span></sup><span data-dcnode-id="7944" instrument_node=""> and 500&nbsp;kWh, respectively, and </span><em data-dcnode-id="7942"><span data-dcnode-id="7943" instrument_node="">UPC</span></em><span data-dcnode-id="7941" instrument_node=""> for the additional harvested water can be calculated as 4.2&nbsp;kWh·kg</span><sup data-dcnode-id="7939"><span data-dcnode-id="7940" instrument_node="">−1</span></sup><span data-dcnode-id="7938" instrument_node="">.</span></p><p data-dcnode-id="7917" id="p0095"><span data-dcnode-id="7936" instrument_node="">In the study of Al-Farayedhi et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="7934" href="#bib11" name="bbib11"><span data-dcnode-id="7935" instrument_node="">11</span></a><span data-dcnode-id="7933" instrument_node="">], analytical and experimental investigations were carried out on such systems when applied in Dhahran, Saudi Arabia. Particularly, summer ambient conditions (25–50&nbsp;°C and 15–90% RH) were analyzed. The experiment results show that for a split air conditioner, rated input power and rated cooling capacity are 2.075 and 4.747&nbsp;kW, respectively, the daily yields during June, July, August and September are 34.5, 38.1, 70.1 and 59.4&nbsp;kg·day</span><sup data-dcnode-id="7931"><span data-dcnode-id="7932" instrument_node="">−1</span></sup><span data-dcnode-id="7930" instrument_node="">, respectively when air volumetric flow rate is 0.135&nbsp;m</span><sup data-dcnode-id="7928"><span data-dcnode-id="7929" instrument_node="">3</span></sup><span data-dcnode-id="7927" instrument_node="">&nbsp;s</span><sup data-dcnode-id="7925"><span data-dcnode-id="7926" instrument_node="">−1</span></sup><span data-dcnode-id="7924" instrument_node="">. And corresponding </span><em data-dcnode-id="7922"><span data-dcnode-id="7923" instrument_node="">WHRs</span></em><span data-dcnode-id="7921" instrument_node=""> are 1.44, 1.59, 2.92 and 2.48&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7919"><span data-dcnode-id="7920" instrument_node="">−1</span></sup><span data-dcnode-id="7918" instrument_node="">, respectively, for these months.</span></p><div data-dcnode-id="7630"><p data-dcnode-id="7876" id="p0100"><span data-dcnode-id="7916" instrument_node="">Performance of the discussed hybrid air cooling and water harvesting systems can be summarized in </span><a class="workspace-trigger" data-dcnode-id="7914" href="#tbl2" name="btbl2"><span data-dcnode-id="7915" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="7913" instrument_node="">. For the reviewed studies, </span><em data-dcnode-id="7911"><span data-dcnode-id="7912" instrument_node="">WHR</span></em><span data-dcnode-id="7910" instrument_node=""> and air flow rate of condensation technologies using VCC for water harvesting and air conditioning are shown in </span><a class="workspace-trigger" data-dcnode-id="7908" href="#fig2" name="bfig2"><span data-dcnode-id="7909" instrument_node="">Fig.&nbsp;2</span></a><span data-dcnode-id="7907" instrument_node="">. The two </span><em data-dcnode-id="7905"><span data-dcnode-id="7906" instrument_node="">WHRs</span></em><span data-dcnode-id="7904" instrument_node=""> of air flow rate equaling to 30,000&nbsp;m</span><sup data-dcnode-id="7902"><span data-dcnode-id="7903" instrument_node="">3</span></sup><span data-dcnode-id="7901" instrument_node="">&nbsp;h</span><sup data-dcnode-id="7899"><span data-dcnode-id="7900" instrument_node="">−1</span></sup><span data-dcnode-id="7898" instrument_node=""> are from different air conditioners. It can be seen that effects of air flow rate on </span><em data-dcnode-id="7896"><span data-dcnode-id="7897" instrument_node="">WHR</span></em><span data-dcnode-id="7895" instrument_node=""> are quite obvious. It can be found from comparing </span><a class="workspace-trigger" data-dcnode-id="7893" href="#tbl1" name="btbl1"><span data-dcnode-id="7894" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="7892" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7890" href="#tbl2" name="btbl2"><span data-dcnode-id="7891" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="7889" instrument_node=""> that the </span><em data-dcnode-id="7887"><span data-dcnode-id="7888" instrument_node="">WHR</span></em><span data-dcnode-id="7886" instrument_node=""> of the hybrid system is much higher, which is due to a larger air flow rate. When process air flow rates are close for the two systems, such as [</span><a class="workspace-trigger" data-dcnode-id="7884" href="#bib1" name="bbib1"><span data-dcnode-id="7885" instrument_node="">1</span></a><span data-dcnode-id="7883" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="7881" href="#bib11" name="bbib11"><span data-dcnode-id="7882" instrument_node="">11</span></a><span data-dcnode-id="7880" instrument_node="">], </span><em data-dcnode-id="7878"><span data-dcnode-id="7879" instrument_node="">WHRs</span></em><span data-dcnode-id="7877" instrument_node=""> are close too.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="7659" id="tbl2"><span class="captions" data-dcnode-id="7850"><span data-dcnode-id="7851" id="cap0050"><p data-dcnode-id="7852" id="tspara0015"><span class="label" data-dcnode-id="7874"><span data-dcnode-id="7875" instrument_node="">Table&nbsp;2</span></span><span data-dcnode-id="7873" instrument_node="">. </span><span data-dcnode-id="7871" instrument_node="">Main information of condensation methods using VCC for water harvesting and air conditioning [</span><a class="workspace-trigger" data-dcnode-id="7869" href="#bib6" name="bbib6"><span data-dcnode-id="7870" instrument_node="">[6]</span></a><span data-dcnode-id="7868" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7866" href="#bib7" name="bbib7"><span data-dcnode-id="7867" instrument_node="">[7]</span></a><span data-dcnode-id="7865" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7863" href="#bib8" name="bbib8"><span data-dcnode-id="7864" instrument_node="">[8]</span></a><span data-dcnode-id="7862" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7860" href="#bib9" name="bbib9"><span data-dcnode-id="7861" instrument_node="">[9]</span></a><span data-dcnode-id="7859" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7857" href="#bib10" name="bbib10"><span data-dcnode-id="7858" instrument_node="">[10]</span></a><span data-dcnode-id="7856" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7854" href="#bib11" name="bbib11"><span data-dcnode-id="7855" instrument_node="">[11]</span></a><span data-dcnode-id="7853" instrument_node="">].</span></p></span></span><div class="groups" data-dcnode-id="7660"><table data-dcnode-id="7661"><thead data-dcnode-id="7836"><tr class="rowsep-1 valign-top" data-dcnode-id="7837"><th data-dcnode-id="7848" scope="col"><span data-dcnode-id="7849" instrument_node="">Reference</span></th><th data-dcnode-id="7846" scope="col"><span data-dcnode-id="7847" instrument_node="">System information</span></th><th data-dcnode-id="7844" scope="col"><span data-dcnode-id="7845" instrument_node="">Location</span></th><th data-dcnode-id="7841" scope="col"><em data-dcnode-id="7842"><span data-dcnode-id="7843" instrument_node="">WHR</span></em></th><th data-dcnode-id="7838" scope="col"><em data-dcnode-id="7839"><span data-dcnode-id="7840" instrument_node="">UPC</span></em></th></tr></thead><tbody data-dcnode-id="7662"><tr class="valign-top" data-dcnode-id="7801"><td class="align-left" data-dcnode-id="7828"><span data-dcnode-id="7835" instrument_node="">[</span><a class="workspace-trigger" data-dcnode-id="7833" href="#bib6" name="bbib6"><span data-dcnode-id="7834" instrument_node="">6</span></a><span data-dcnode-id="7832" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="7830" href="#bib7" name="bbib7"><span data-dcn
