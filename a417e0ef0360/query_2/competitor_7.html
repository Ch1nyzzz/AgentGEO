"><a class="anchor download-link u-font-sans" data-dcnode-id="4776" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4777"><span data-dcnode-id="4780" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4778"><span data-dcnode-id="4779" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4755"><span data-dcnode-id="4756" id="cap0020"><p data-dcnode-id="4757" id="fspara0020"><span class="label" data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">Fig.&nbsp;3</span></span><span data-dcnode-id="4770" instrument_node="">. </span><em data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">DWHR</span></em><sub data-dcnode-id="4765"><em data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node="">ua</span></em></sub><span data-dcnode-id="4764" instrument_node=""> and </span><em data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">DWHR</span></em><sub data-dcnode-id="4759"><em data-dcnode-id="4760"><span data-dcnode-id="4761" instrument_node="">um</span></em></sub><span data-dcnode-id="4758" instrument_node=""> reported in literature about sorption technologies.</span></p></span></span></figure></div></section><section data-dcnode-id="4289" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4746" id="sectitle0065"><span data-dcnode-id="4751" instrument_node="">4</span><span data-dcnode-id="4749" instrument_node="">. </span><span data-dcnode-id="4747" instrument_node="">Atmospheric water harvesting using other technologies</span></h2><section data-dcnode-id="4541" id="sec4.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4740" id="sectitle0070"><span data-dcnode-id="4745" instrument_node="">4.1</span><span data-dcnode-id="4743" instrument_node="">. </span><span data-dcnode-id="4741" instrument_node="">Innovative technologies for atmospheric water harvesting</span></h3><p data-dcnode-id="4714" id="p0250"><span data-dcnode-id="4739" instrument_node="">A French company, Eole, proposed a wind turbine that can be used to produce electricity and potable water for remote areas [</span><a class="workspace-trigger" data-dcnode-id="4737" href="#bib38" name="bbib38"><span data-dcnode-id="4738" instrument_node="">38</span></a><span data-dcnode-id="4736" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="4734" href="#bib39" name="bbib39"><span data-dcnode-id="4735" instrument_node="">39</span></a><span data-dcnode-id="4733" instrument_node="">]. A VCC was installed for water production, which is powered by electricity produced by the wind turbine. This prototype was 24&nbsp;m high and the rotor diameter was 13&nbsp;m with three blades. It is claimed that the </span><em data-dcnode-id="4731"><span data-dcnode-id="4732" instrument_node="">WHR</span></em><span data-dcnode-id="4730" instrument_node=""> of the prototype was 62&nbsp;kg&nbsp;h</span><sup data-dcnode-id="4728"><span data-dcnode-id="4729" instrument_node="">−1</span></sup><span data-dcnode-id="4727" instrument_node="">. Under 24&nbsp;°C and 45% RH ambient condition, the turbine was able to produce 1500&nbsp;L water in each day, when the air flow rate was from 7500 to 8000&nbsp;m</span><sup data-dcnode-id="4725"><span data-dcnode-id="4726" instrument_node="">3</span></sup><span data-dcnode-id="4724" instrument_node="">&nbsp;h</span><sup data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">−1</span></sup><span data-dcnode-id="4721" instrument_node="">. The compressor power was 30&nbsp;kW and </span><em data-dcnode-id="4719"><span data-dcnode-id="4720" instrument_node="">UPC</span></em><span data-dcnode-id="4718" instrument_node=""> was around 0.48&nbsp;kWh·kg</span><sup data-dcnode-id="4716"><span data-dcnode-id="4717" instrument_node="">−1</span></sup><span data-dcnode-id="4715" instrument_node="">.</span></p><p data-dcnode-id="4694" id="p0255"><span data-dcnode-id="4713" instrument_node="">Another water harvesting machine driven by wind power was proposed by a Dutch company, Rainmaker [</span><a class="workspace-trigger" data-dcnode-id="4711" href="#bib40" name="bbib40"><span data-dcnode-id="4712" instrument_node="">40</span></a><span data-dcnode-id="4710" instrument_node="">]. A stand-alone wind turbine was used to draw the air and drive the compressor of VCC, where humid air was condensed, and water was collected for domestic or irrigation purposes. A prototype was in 24–36&nbsp;m high and 35,000&nbsp;kg in mass [</span><a class="workspace-trigger" data-dcnode-id="4708" href="#bib40" name="bbib40"><span data-dcnode-id="4709" instrument_node="">40</span></a><span data-dcnode-id="4707" instrument_node="">]. The rotor diameter was 20&nbsp;m with three blades. A VCC was combined with wind turbines and performances were analyzed when applied in northeast of Brazil. It was reported that under suitable working conditions, Rainmaker was able to produce 7500&nbsp;kg water in each day (</span><em data-dcnode-id="4705"><span data-dcnode-id="4706" instrument_node="">WHR</span></em><span data-dcnode-id="4704" instrument_node="">&nbsp;=&nbsp;312.5&nbsp;kg&nbsp;h</span><sup data-dcnode-id="4702"><span data-dcnode-id="4703" instrument_node="">−1</span></sup><span data-dcnode-id="4701" instrument_node="">) when air flow rate was 15,000&nbsp;m</span><sup data-dcnode-id="4699"><span data-dcnode-id="4700" instrument_node="">3</span></sup><span data-dcnode-id="4698" instrument_node="">&nbsp;h</span><sup data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">−1</span></sup><span data-dcnode-id="4695" instrument_node="">.</span></p><p data-dcnode-id="4662" id="p0260"><span data-dcnode-id="4693" instrument_node="">Bolonkin [</span><a class="workspace-trigger" data-dcnode-id="4691" href="#bib41" name="bbib41"><span data-dcnode-id="4692" instrument_node="">41</span></a><span data-dcnode-id="4690" instrument_node="">] proposed two innovative designs that can be used at any location on earth except the polar regions. These designs consume no primary energy in this process. In the first design, an inflatable altitude tube that is 3&nbsp;km–5&nbsp;km tall is required. Air from the ground enters a solar heater, where it is heated first and rises through the uplift tube. At a high altitude, the air is expanded and cooled, and water vapor is condensed and collected. For the second design, air from ground is heated in solar heater and then sent to a sea heat exchanger located 20–30&nbsp;m below the sea level, where the sea water temperature is 5–10&nbsp;°C and vapor in the air is condensed and collected. Fans and pumps are required to move the air and water, respectively. It is estimated that </span><em data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">WHR</span></em><span data-dcnode-id="4687" instrument_node=""> for the first design is 9.36·10</span><sup data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">6</span></sup><span data-dcnode-id="4684" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">−1</span></sup><span data-dcnode-id="4681" instrument_node=""> under the condition that the inflatable tube is 3&nbsp;km high with radius of 115&nbsp;m and ambient air is 25 ̊C, 70% RH and 6&nbsp;m&nbsp;s</span><sup data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">−1</span></sup><span data-dcnode-id="4678" instrument_node="">. </span><em data-dcnode-id="4676"><span data-dcnode-id="4677" instrument_node="">WHR</span></em><span data-dcnode-id="4675" instrument_node=""> for the second design was 1.27·10</span><sup data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">5</span></sup><span data-dcnode-id="4672" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="4670"><span data-dcnode-id="4671" instrument_node="">−1</span></sup><span data-dcnode-id="4669" instrument_node=""> under the condition that the air was 30&nbsp;°C, 100% RH and 1256&nbsp;m</span><sup data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">3</span></sup><span data-dcnode-id="4666" instrument_node="">&nbsp;s</span><sup data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">−1</span></sup><span data-dcnode-id="4663" instrument_node="">.</span></p><p data-dcnode-id="4651" id="p0265"><span data-dcnode-id="4661" instrument_node="">In the study of Kashiwa et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="4659" href="#bib42" name="bbib42"><span data-dcnode-id="4660" instrument_node="">42</span></a><span data-dcnode-id="4658" instrument_node="">], a solar cyclone, which is a solar chimney with an expansion cyclone separator at the base of the chimney, was theoretically analyzed for both power generation and atmospheric water generation. Theoretical calculation results based on a specific design show that chimney height, ambient humidity ratio, and solar density are key factors influencing updraft power, water harvesting capacity and electricity generation. It is suggested that a single solar cyclone with 500&nbsp;m high can produce 2·10</span><sup data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">6</span></sup><span data-dcnode-id="4655" instrument_node=""> ton water each year with ambient humidity ratio being 6&nbsp;g&nbsp;kg</span><sup data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">−1</span></sup><span data-dcnode-id="4652" instrument_node="">, as well as 3&nbsp;MW electricity.</span></p><p data-dcnode-id="4562" id="p0270"><span data-dcnode-id="4650" instrument_node="">Ming et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="4648" href="#bib43" name="bbib43"><span data-dcnode-id="4649" instrument_node="">43</span></a><span data-dcnode-id="4647" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="4645" href="#bib44" name="bbib44"><span data-dcnode-id="4646" instrument_node="">44</span></a><span data-dcnode-id="4644" instrument_node="">] proposed an atmospheric water harvesting system from solar chimney power plant. The ambient air was first heated by water, that was heated by solar energy, filled in black tubes. Then, the air was humidified through a warm water tower. Then, the hot-and-humidified air rises through a chimney, where the water vapor in the air is condensed. Parametric analysis [</span><a class="workspace-trigger" data-dcnode-id="4642" href="#bib43" name="bbib43"><span data-dcnode-id="4643" instrument_node="">43</span></a><span data-dcnode-id="4641" instrument_node="">] shows that air temperature and air relative humidity, have significant influence on the condensation level. For water generation, increasing chimney height is an efficient way to improve efficiency of the solar chimney power plant. However, pressure drop of the wind turbine increases, too, which leads to the reduction of the MFR of condensed water. Case studies were carried out based on the system [</span><a class="workspace-trigger" data-dcnode-id="4639" href="#bib44" name="bbib44"><span data-dcnode-id="4640" instrument_node="">44</span></a><span data-dcnode-id="4638" instrument_node="">]. In the system, a tube with a radius of 50&nbsp;m and height of 3&nbsp;km was built. Air temperature was increased at least 5&nbsp;°C higher than the ambient condition, while relative humidity was unchanged. Simulation analysis was carried out of this system in 9 different cities with different ambient temperatures, humidity ratio, solar radiation and rain fall conditions. The results show that water harvested per month in the range of 10</span><sup data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">7</span></sup><span data-dcnode-id="4635" instrument_node="">&nbsp;kg&nbsp;month</span><sup data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">−1</span></sup><span data-dcnode-id="4632" instrument_node=""> is highly related to natural precipitation. And mass of condensed water increases with the increase of ambient air relative humidity and temperature increase after the black tube solar heater. The annual water production for the nine Chinese cities, namely Chengdu, Shanghai, Shijiazhuang, Zhengzhou, Wuhan, Chongqing, Beijing, Urumqi, and Guangzhou, are 29.71·10</span><sup data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node="">9</span></sup><span data-dcnode-id="4629" instrument_node="">, 23.62·10</span><sup data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node="">9</span></sup><span data-dcnode-id="4626" instrument_node="">, 17.08·10</span><sup data-dcnode-id="4624"><span data-dcnode-id="4625" instrument_node="">9</span></sup><span data-dcnode-id="4623" instrument_node="">, 12.87·10</span><sup data-dcnode-id="4621"><span data-dcnode-id="4622" instrument_node="">9</span></sup><span data-dcnode-id="4620" instrument_node="">, 29.37·10</span><sup data-dcnode-id="4618"><span data-dcnode-id="4619" instrument_node="">9</span></sup><span data-dcnode-id="4617" instrument_node="">, 27.40·10</span><sup data-dcnode-id="4615"><span data-dcnode-id="4616" instrument_node="">9</span></sup><span data-dcnode-id="4614" instrument_node="">, 14.59·10</span><sup data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">9</span></sup><span data-dcnode-id="4611" instrument_node="">, 8.17·10</span><sup data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node="">9</span></sup><span data-dcnode-id="4608" instrument_node=""> and 37.92·10</span><sup data-dcnode-id="4606"><span data-dcnode-id="4607" instrument_node="">9</span></sup><span data-dcnode-id="4605" instrument_node="">&nbsp;kg&nbsp;year</span><sup data-dcnode-id="4603"><span data-dcnode-id="4604" instrument_node="">−1</span></sup><span data-dcnode-id="4602" instrument_node="">, respectively. For an inland city with dry climates, such as Urumqi, the average </span><em data-dcnode-id="4600"><span data-dcnode-id="4601" instrument_node="">WHR</span></em><span data-dcnode-id="4599" instrument_node=""> is 932.6·10</span><sup data-dcnode-id="4597"><span data-dcnode-id="4598" instrument_node="">3</span></sup><span data-dcnode-id="4596" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="4594"><span data-dcnode-id="4595" instrument_node="">−1</span></sup><span data-dcnode-id="4593" instrument_node="">. For coastal cities with humid climates such as Shanghai and Guangzhou, </span><em data-dcnode-id="4591"><span data-dcnode-id="4592" instrument_node="">WHR</span></em><span data-dcnode-id="4590" instrument_node=""> is 2696.2·10</span><sup data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">3</span></sup><span data-dcnode-id="4587" instrument_node=""> and 4328.5·10</span><sup data-dcnode-id="4585"><span data-dcnode-id="4586" instrument_node="">3</span></sup><span data-dcnode-id="4584" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="4582"><span data-dcnode-id="4583" instrument_node="">−1</span></sup><span data-dcnode-id="4581" instrument_node="">, respectively. The large </span><em data-dcnode-id="4579"><span data-dcnode-id="4580" instrument_node="">WHR</span></em><span data-dcnode-id="4578" instrument_node=""> is due to large air MFR. It is reported in the paper that velocity at the entrance of the chimney calculated based on Spain condition is from 7 to 12.2&nbsp;m&nbsp;s</span><sup data-dcnode-id="4576"><span data-dcnode-id="4577" instrument_node="">−1</span></sup><span data-dcnode-id="4575" instrument_node="">. The air flow rate is 55.0·10</span><sup data-dcnode-id="4573"><span data-dcnode-id="4574" instrument_node="">3</span></sup><span data-dcnode-id="4572" instrument_node=""> to 95.8·10</span><sup data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">3</span></sup><span data-dcnode-id="4569" instrument_node="">&nbsp;m</span><sup data-dcnode-id="4567"><span data-dcnode-id="4568" instrument_node="">3</span></sup><span data-dcnode-id="4566" instrument_node="">&nbsp;h</span><sup data-dcnode-id="4564"><span data-dcnode-id="4565" instrument_node="">−1</span></sup><span data-dcnode-id="4563" instrument_node="">.</span></p><p data-dcnode-id="4542" id="p0275"><span data-dcnode-id="4561" instrument_node="">In the study of Lindblom [</span><a class="workspace-trigger" data-dcnode-id="4559" href="#bib45" name="bbib45"><span data-dcnode-id="4560" instrument_node="">45</span></a><span data-dcnode-id="4558" instrument_node="">], humid air transports through underground pipes at daytime, where it is cooled, and vapor is condensed by the ground. During the night, cold ambient air is supplied into the pipes to remove heat stored at daytime and to keep the soil temperature in a favorable range. Simulation results show that when air state was 60&nbsp;°C, 70% RH and 3.5&nbsp;m&nbsp;s</span><sup data-dcnode-id="4556"><span data-dcnode-id="4557" instrument_node="">−1</span></sup><span data-dcnode-id="4555" instrument_node="">, average daily yield of the first month was 2.3&nbsp;kg&nbsp;m</span><sup data-dcnode-id="4553"><span data-dcnode-id="4554" instrument_node="">−1</span></sup><span data-dcnode-id="4552" instrument_node="">·day</span><sup data-dcnode-id="4550"><span data-dcnode-id="4551" instrument_node="">−1</span></sup><span data-dcnode-id="4549" instrument_node=""> and 1.9&nbsp;kg&nbsp;m</span><sup data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">−1</span></sup><span data-dcnode-id="4546" instrument_node="">·day</span><sup data-dcnode-id="4544"><span data-dcnode-id="4545" instrument_node="">−1</span></sup><span data-dcnode-id="4543" instrument_node=""> of the second month for the discussed pipe configuration (diameter is 0.5&nbsp;m and length is around 49.6&nbsp;m).</span></p></section><section data-dcnode-id="4290" id="sec4.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4535" id="sectitle0075"><span data-dcnode-id="4540" instrument_node="">4.2</span><span data-dcnode-id="4538" instrument_node="">. </span><span data-dcnode-id="4536" instrument_node="">Desiccant wheel or membrane assisted technologies for atmospheric water harvesting</span></h3><p data-dcnode-id="4500" id="p0280"><span data-dcnode-id="4534" instrument_node="">Milani et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="4532" href="#bib46" name="bbib46"><span data-dcnode-id="4533" instrument_node="">46</span></a><span data-dcnode-id="4531" instrument_node="">] experimentally studied a small-scale desiccant wheel dehumidifier for freshwater generation and space cooling. This system is favorable for moderate coastal climates, where the humidity level is usually high, but the ambient temperature is moderate. For the system, a desiccant wheel is used to transfer water vapor from the process air to the regeneration air. After being humidified, the regeneration air then passes through an air cooler, where the vapor was condensed by the ambient air. The experiment was run continuously over nine days at the end of autumn season. During the test, average ambient condition was 14.2&nbsp;°C and 64.8% RH. The accumulated water mass at the end of the test was approximately 52&nbsp;kg. </span><em data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">WHR</span></em><span data-dcnode-id="4528" instrument_node=""> can be calculated as 0.24&nbsp;kg&nbsp;h</span><sup data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">−1</span></sup><span data-dcnode-id="4525" instrument_node="">. Simulation in TRNSYS shows that an annual water harvesting rate can be 13.8·10</span><sup data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">3</span></sup><span data-dcnode-id="4522" instrument_node="">, 18.5·10</span><sup data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">3</span></sup><span data-dcnode-id="4519" instrument_node=""> and 10·10</span><sup data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">3</span></sup><span data-dcnode-id="4516" instrument_node="">&nbsp;kg&nbsp;year</span><sup data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">−1</span></sup><span data-dcnode-id="4513" instrument_node=""> for Sydney, Abu Dhabi and London, respectively. Based on the type of desiccant wheel adopted in the study, which is Comdry M170L from Munters, the rated air flow rate for process air was 612&nbsp;m</span><sup data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">3</span></sup><span data-dcnode-id="4510" instrument_node="">&nbsp;h</span><sup data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">−1</span></sup><span data-dcnode-id="4507" instrument_node="">. Therefore, the volume flow rate of the regeneration air, which is the air for water harvesting, was around 204&nbsp;m</span><sup data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">3</span></sup><span data-dcnode-id="4504" instrument_node="">&nbsp;h</span><sup data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">−1</span></sup><span data-dcnode-id="4501" instrument_node="">.</span></p><p data-dcnode-id="4492" id="p0285"><span data-dcnode-id="4499" instrument_node="">Heidari et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="4497" href="#bib47" name="bbib47"><span data-dcnode-id="4498" instrument_node="">47</span></a><span data-dcnode-id="4496" instrument_node="">] presented a novel desiccant-based evaporative cooling system for co-production of water and cooling. The moisture in the regeneration air is condensed at a heat exchanger by the return air from the occupant room. Part of the condensed water is used to cover all the water consumed at the evaporator cooler, which is used to cool the dehumidified process air after the desiccant wheel, and the rest is for domestic use. Dynamic simulation of the proposed system was carried out for a 60&nbsp;m</span><sup data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">2</span></sup><span data-dcnode-id="4493" instrument_node=""> building located in the hot-and-humid climate of Bandar Abbas, Iran. Simulation results show that about 590&nbsp;kg of water can be produced during a week with the aid of desiccant wheel. After compensating for the water loss at the evaporate cooler, 289&nbsp;kg of water can be provided for domestic use. Electricity consumption of the proposed system can be reduced by 60% as compared with the reference system. However, heat is needed for desiccant wheel regeneration in the proposed system. Therefore, natural gas consumption of the proposed system is 30% higher.</span></p><p data-dcnode-id="4448" id="p0290"><span data-dcnode-id="4491" instrument_node="">Tu et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="4489" href="#bib48" name="bbib48"><span data-dcnode-id="4490" instrument_node="">48</span></a><span data-dcnode-id="4488" instrument_node="">] proposed a hybrid system using multi-stage desiccant wheels and VCCs, which shows high performances even in dry climate regions. For this technology, desiccant wheels, which adsorb moisture from ambient air (dehumidification air) and release it to the processed ambient air (regeneration air) to increase its humidity ratio. Thermal energy is required to heat the processed ambient air before being humidified in the desiccant wheel. Then, the humidified ambient air is cooled, and vapor is condensed. In the study [</span><a class="workspace-trigger" data-dcnode-id="4486" href="#bib48" name="bbib48"><span data-dcnode-id="4487" instrument_node="">48</span></a><span data-dcnode-id="4485" instrument_node="">], VCC is used to as both heating and cooling source. Under optimized design, </span><em data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">WHR</span></em><span data-dcnode-id="4482" instrument_node=""> and </span><em data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">UPC</span></em><span data-dcnode-id="4479" instrument_node=""> can be 32.5&nbsp;kg&nbsp;h</span><sup data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">−1</span></sup><span data-dcnode-id="4476" instrument_node=""> and 0.79&nbsp;kWh·kg</span><sup data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">−1</span></sup><span data-dcnode-id="4473" instrument_node="">, respectively, at 1500&nbsp;kg&nbsp;m</span><sup data-dcnode-id="4471"><span data-dcnode-id="4472" instrument_node="">−3</span></sup><span data-dcnode-id="4470" instrument_node=""> air flow rate and the ambient condition of 40&nbsp;°C and 5&nbsp;g&nbsp;kg</span><sup data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">−1</span></sup><span data-dcnode-id="4467" instrument_node="">. When ambient condition is 20&nbsp;°C and 10&nbsp;g&nbsp;kg</span><sup data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">−1</span></sup><span data-dcnode-id="4464" instrument_node="">, </span><em data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">WHR</span></em><span data-dcnode-id="4461" instrument_node=""> and </span><em data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">UPC</span></em><span data-dcnode-id="4458" instrument_node=""> can be 82.7&nbsp;kg&nbsp;h</span><sup data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">−1</span></sup><span data-dcnode-id="4455" instrument_node=""> and 0.46&nbsp;kWh·kg</span><sup data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">−1</span></sup><span data-dcnode-id="4452" instrument_node="">, respectively, at 1500&nbsp;kg&nbsp;m</span><sup data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">−3</span></sup><span data-dcnode-id="4449" instrument_node=""> of air flow rate.</span></p><p data-dcnode-id="4389" id="p0295"><span data-dcnode-id="4447" instrument_node="">Bergmair et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="4445" href="#bib49" name="bbib49"><span data-dcnode-id="4446" instrument_node="">49</span></a><span data-dcnode-id="4444" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="4442" href="#bib50" name="bbib50"><span data-dcnode-id="4443" instrument_node="">50</span></a><span data-dcnode-id="4441" instrument_node="">] experimentally evaluated a membrane-assisted water harvesting system. In this kind of system, vapor permeated through a water vapor selective membrane from feed air to sweep air. The humidified sweep air then enters the condenser to be dehumidified and water is collected. Simulation results [</span><a class="workspace-trigger" data-dcnode-id="4439" href="#bib49" name="bbib49"><span data-dcnode-id="4440" instrument_node="">49</span></a><span data-dcnode-id="4438" instrument_node="">] show that for a water harvesting system with a power of 62&nbsp;kW, 9.19&nbsp;m</span><sup data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">3</span></sup><span data-dcnode-id="4435" instrument_node=""> of water can be produced each day, </span><em data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">WHR</span></em><span data-dcnode-id="4432" instrument_node=""> and </span><em data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">UPC</span></em><span data-dcnode-id="4429" instrument_node=""> of which are 382.9&nbsp;kg&nbsp;h</span><sup data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">−1</span></sup><span data-dcnode-id="4426" instrument_node=""> and 0.16&nbsp;kWh·kg</span><sup data-dcnode-id="4424"><span data-dcnode-id="4425" instrument_node="">−1</span></sup><span data-dcnode-id="4423" instrument_node="">, as compared to 4.45&nbsp;m</span><sup data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">3</span></sup><span data-dcnode-id="4420" instrument_node=""> of water per each day for systems without membranes, </span><em data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">WHR</span></em><span data-dcnode-id="4417" instrument_node=""> and </span><em data-dcnode-id="4415"><span data-dcnode-id="4416" instrument_node="">UPC</span></em><span data-dcnode-id="4414" instrument_node=""> of which are 185.4&nbsp;kg&nbsp;h</span><sup data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">−1</span></sup><span data-dcnode-id="4411" instrument_node=""> and 0.33&nbsp;kWh·kg</span><sup data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">−1</span></sup><span data-dcnode-id="4408" instrument_node="">. Experiments were carried out under the condition of 30&nbsp;°C and 77% RH to evaluate the effect of recirculating the sweep air [</span><a class="workspace-trigger" data-dcnode-id="4406" href="#bib50" name="bbib50"><span data-dcnode-id="4407" instrument_node="">50</span></a><span data-dcnode-id="4405" instrument_node="">]. With an air flow rate of 10 or 32&nbsp;L&nbsp;min</span><sup data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">−1</span></sup><span data-dcnode-id="4402" instrument_node=""> and a system pressure of 100&nbsp;mbar, </span><em data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">WHR</span></em><span data-dcnode-id="4399" instrument_node=""> are 12.9·10</span><sup data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">−3</span></sup><span data-dcnode-id="4396" instrument_node=""> and 15.8·10</span><sup data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">−3</span></sup><span data-dcnode-id="4393" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">−1</span></sup><span data-dcnode-id="4390" instrument_node="">, respectively.</span></p><p data-dcnode-id="4291" id="p0300"><span data-dcnode-id="4388" instrument_node="">In the study of Zhao et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="4386" href="#bib51" name="bbib51"><span data-dcnode-id="4387" instrument_node="">51</span></a><span data-dcnode-id="4385" instrument_node="">], PDMS (polydimethylsiloxane)/PAN (polyacrylonitrile) hollow fiber was used as a membrane of the discussed system. The sweep air and the permeated air were dehumidified at a cooling coil, where chilled water inlet temperature was 2&nbsp;°C. Then, part of the air after condensation circulated in the system as the sweep air and the rest was sent to the occupant room. During the test, the feed air was kept at 1.52&nbsp;L&nbsp;min</span><sup data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">−1</span></sup><span data-dcnode-id="4382" instrument_node="">, 30&nbsp;°C and 80% RH. Performances were evaluated when the volume flow rate of the sweep air (</span><em data-dcnode-id="4380"><span data-dcnode-id="4381" instrument_node="">V</span></em><sub data-dcnode-id="4377"><em data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">sa</span></em></sub><span data-dcnode-id="4376" instrument_node="">) varied from 0.12 to 0.55&nbsp;L&nbsp;min</span><sup data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">−1</span></sup><span data-dcnode-id="4373" instrument_node=""> and vacuum pressure (</span><em data-dcnode-id="4371"><span data-dcnode-id="4372" instrument_node="">P</span></em><sub data-dcnode-id="4368"><em data-dcnode-id="4369"><span data-dcnode-id="4370" instrument_node="">g</span></em></sub><span data-dcnode-id="4367" instrument_node="">) changed from 0.17 to 0.67&nbsp;bar. The simulation results show that larger </span><em data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">V</span></em><sub data-dcnode-id="4362"><em data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">sa</span></em></sub><span data-dcnode-id="4361" instrument_node=""> and </span><em data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">P</span></em><sub data-dcnode-id="4356"><em data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">g</span></em></sub><span data-dcnode-id="4355" instrument_node=""> help humidity permeation, especially the latter one. When </span><em data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">V</span></em><sub data-dcnode-id="4350"><em data-dcnode-id="4351"><span data-dcnode-id="4352" instrument_node="">sa</span></em></sub><span data-dcnode-id="4349" instrument_node=""> is 0.55&nbsp;L&nbsp;min</span><sup data-dcnode-id="4347"><span data-dcnode-id="4348" instrument_node="">−1</span></sup><span data-dcnode-id="4346" instrument_node=""> and </span><em data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">P</span></em><sub data-dcnode-id="4341"><em data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">g</span></em></sub><span data-dcnode-id="4340" instrument_node=""> is 0.67&nbsp;bar, vapor concentration of the humid air reduces from 24.3 to 7.4&nbsp;g&nbsp;m</span><sup data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">−3</span></sup><span data-dcnode-id="4337" instrument_node="">, which means 69.5% humid in the outdoor air was removed to the sweep air. When </span><em data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">V</span></em><sub data-dcnode-id="4332"><em data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">sa</span></em></sub><span data-dcnode-id="4331" instrument_node=""> is 0.12&nbsp;L&nbsp;min</span><sup data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">−1</span></sup><span data-dcnode-id="4328" instrument_node="">, </span><em data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">WHR</span></em><span data-dcnode-id="4325" instrument_node=""> increases from 1.06·10</span><sup data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">−3</span></sup><span data-dcnode-id="4322" instrument_node=""> to 1.55·10</span><sup data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">−3</span></sup><span data-dcnode-id="4319" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">−1</span></sup><span data-dcnode-id="4316" instrument_node=""> when </span><em data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">P</span></em><sub data-dcnode-id="4311"><em data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">g</span></em></sub><span data-dcnode-id="4310" instrument_node=""> increases from 0.17 to 0.67&nbsp;bar. And energy required to produce 1&nbsp;kg of fresh water increases from 687.4 to 828.1&nbsp;kJ. </span><em data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">UPC</span></em><span data-dcnode-id="4307" instrument_node=""> of the case when </span><em data-dcnode-id="4305"><span data-dcnode-id="4306" instrument_node="">P</span></em><sub data-dcnode-id="4302"><em data-dcnode-id="4303"><span data-dcnode-id="4304" instrument_node="">g</span></em></sub><span data-dcnode-id="4301" instrument_node=""> is 0.17&nbsp;bar can be calculated as 0.19&nbsp;kWh·kg</span><sup data-dcnode-id="4299"><span data-dcnode-id="4300" instrument_node="">−1</span></sup><span data-dcnode-id="4298" instrument_node="">. To do the same water harvesting from the ambient air directly without membrane, 1125&nbsp;kJ is needed for 1&nbsp;kg of water and </span><em data-dcnode-id="4296"><span data-dcnode-id="4297" instrument_node="">UPC</span></em><span data-dcnode-id="4295" instrument_node=""> is 0.31&nbsp;kWh·kg</span><sup data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">−1</span></sup><span data-dcnode-id="4292" instrument_node="">.</span></p></section></section><section data-dcnode-id="3915" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4283" id="sectitle0080"><span data-dcnode-id="4288" instrument_node="">5</span><span data-dcnode-id="4286" instrument_node="">. </span><span data-dcnode-id="4284" instrument_node="">Comparisons among atmospheric water harvesting technologies and possible future research</span></h2><section data-dcnode-id="3999" id="sec5.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4277" id="sectitle0085"><span data-dcnode-id="4282" instrument_node="">5.1</span><span data-dcnode-id="4280" instrument_node="">. </span><span data-dcnode-id="4278" instrument_node="">Atmospheric water harvesting technologies comparisons and current research gaps</span></h3><div data-dcnode-id="4210"><p data-dcnode-id="4239" id="p0305"><span data-dcnode-id="4276" instrument_node="">Water harvesting performances of condensation technologies using VCC and TEC, sorption technologies, Membrane-assisted technologies (MAT) reported in the literatures discussed in part 2 to part 4 are compared. </span><a class="workspace-trigger" data-dcnode-id="4274" href="#fig4" name="bfig4"><span data-dcnode-id="4275" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="4273" instrument_node=""> shows the results of </span><em data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">DWHR</span></em><span data-dcnode-id="4270" instrument_node="">. </span><em data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">DWHR</span></em><span data-dcnode-id="4267" instrument_node=""> of condensation technologies and MAT are obtained by multiplying </span><em data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">WHR</span></em><span data-dcnode-id="4264" instrument_node=""> with 24&nbsp;h assuming that it can be operated continuously for 24&nbsp;h. It can be seen from </span><a class="workspace-trigger" data-dcnode-id="4262" href="#fig4" name="bfig4"><span data-dcnode-id="4263" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="4261" instrument_node=""> that </span><em data-dcnode-id="4259"><span data-dcnode-id="4260" instrument_node="">DWHR</span></em><span data-dcnode-id="4258" instrument_node=""> of condensation technology using VCC is much higher than the other technologies. Among all the cases in </span><a class="workspace-trigger" data-dcnode-id="4256" href="#fig4" name="bfig4"><span data-dcnode-id="4257" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="4255" instrument_node=""> (a), </span><em data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">DWHR</span></em><span data-dcnode-id="4252" instrument_node=""> lower than 1&nbsp;kg·day</span><sup data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">−1</span></sup><span data-dcnode-id="4249" instrument_node=""> are selected and shown in </span><a class="workspace-trigger" data-dcnode-id="4247" href="#fig4" name="bfig4"><span data-dcnode-id="4248" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="4246" instrument_node=""> (b). It can be seen that </span><em data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">DWHR</span></em><span data-dcnode-id="4243" instrument_node=""> of 8 out of 14 TEC cases, 4 out of 4 MAT cases and 6 out of 13 sorption cases are lower than 1&nbsp;kg·day</span><sup data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">−1</span></sup><span data-dcnode-id="4240" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="4211" id="fig4"><span data-dcnode-id="4223"><img alt="Fig.&nbsp;4" aria-describedby="cap0025" data-dcnode-id="4238" height="646" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr4.jpg&amp;raw"><span data-dcnode-id="4237" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4224"><li data-dcnode-id="4231"><a class="anchor download-link u-font-sans" data-dcnode-id="4232" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr4_lrg.jpg" target="_blank" title="Download high-res image (653KB)"><span class="anchor-text" data-dcnode-id="4233"><span data-dcnode-id="4236" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">Download high-res image (653KB)</span></span></span></a></li><li data-dcnode-id="4225"><a class="anchor download-link u-font-sans" data-dcnode-id="4226" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4227"><span data-dcnode-id="4230" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4212"><span data-dcnode-id="4213" id="cap0025"><p data-dcnode-id="4214" id="fspara0025"><span class="label" data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">Fig.&nbsp;4</span></span><span data-dcnode-id="4220" instrument_node="">. </span><span data-dcnode-id="4218" instrument_node="">Reported </span><em data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node="">DWHR</span></em><span data-dcnode-id="4215" instrument_node=""> among different technologies in literature.</span></p></span></span></figure></div><div data-dcnode-id="4161"><p data-dcnode-id="4187" id="p0310"><span data-dcnode-id="4209" instrument_node="">Air MFR is another influencing factor of </span><em data-dcnode-id="4207"><span data-dcnode-id="4208" instrument_node="">DWHR</span></em><span data-dcnode-id="4206" instrument_node="">. Mass flow rates reported in literatures about different technologies are shown in </span><a class="workspace-trigger" data-dcnode-id="4204" href="#fig5" name="bfig5"><span data-dcnode-id="4205" instrument_node="">Fig.&nbsp;5</span></a><span data-dcnode-id="4203" instrument_node="">. It can be seen that, for condensation technology using VCC, much higher air flow rate can be realized. </span><a class="workspace-trigger" data-dcnode-id="4201" href="#fig5" name="bfig5"><span data-dcnode-id="4202" instrument_node="">Fig.&nbsp;5</span></a><span data-dcnode-id="4200" instrument_node=""> (b) shows that air flow rate of 7 out of 9 TEC cases and 3 out of 3 MAT cases are lower than 50&nbsp;m</span><sup data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">3</span></sup><span data-dcnode-id="4197" instrument_node="">&nbsp;h</span><sup data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">−1</span></sup><span data-dcnode-id="4194" instrument_node="">. For MAT, air flow rate is even lower than 2&nbsp;m</span><sup data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">3</span></sup><span data-dcnode-id="4191" instrument_node="">&nbsp;h</span><sup data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">−1</span></sup><span data-dcnode-id="4188" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="4162" id="fig5"><span data-dcnode-id="4171"><img alt="Fig.&nbsp;5" aria-describedby="cap0030" data-dcnode-id="4186" height="651" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr5.jpg&amp;raw"><span data-dcnode-id="4185" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4172"><li data-dcnode-id="4179"><a class="anchor download-link u-font-sans" data-dcnode-id="4180" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr5_lrg.jpg" target="_blank" title="Download high-res image (472KB)"><span class="anchor-text" data-dcnode-id="4181"><span data-dcnode-id="4184" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">Download high-res image (472KB)</span></span></span></a></li><li data-dcnode-id="4173"><a class="anchor download-link u-font-sans" data-dcnode-id="4174" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4175"><span data-dcnode-id="4178" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4163"><span data-dcnode-id="4164" id="cap0030"><p data-dcnode-id="4165" id="fspara0030"><span class="label" data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">Fig.&nbsp;5</span></span><span data-dcnode-id="4168" instrument_node="">. </span><span data-dcnode-id="4166" instrument_node="">Reported air flow rates among different technologies in literature.</span></p></span></span></figure></div><div data-dcnode-id="4115"><p data-dcnode-id="4144" id="p0315"><span data-dcnode-id="4160" instrument_node="">The results for </span><em data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">UPC</span></em><span data-dcnode-id="4157" instrument_node=""> are shown in </span><a class="workspace-trigger" data-dcnode-id="4155" href="#fig6" name="bfig6"><span data-dcnode-id="4156" instrument_node="">Fig.&nbsp;6</span></a><span data-dcnode-id="4154" instrument_node="">. It can be seen that although </span><em data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">DWHR</span></em><span data-dcnode-id="4151" instrument_node=""> and air flow rate are quite different among different technologies, </span><em data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">UPC</span></em><span data-dcnode-id="4148" instrument_node=""> are quite similar. Condensation technologies with VCC, which have relatively low </span><em data-dcnode-id="4146"><span data-dcnode-id="4147" instrument_node="">UPC</span></em><span data-dcnode-id="4145" instrument_node="">, are better than condensation technologies with TEC.</span></p><figure class="figure text-xs" data-dcnode-id="4116" id="fig6"><span data-dcnode-id="4128"><img alt="Fig.&nbsp;6" aria-describedby="cap0035" data-dcnode-id="4143" height="249" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr6.jpg&amp;raw"><span data-dcnode-id="4142" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4129"><li data-dcnode-id="4136"><a class="anchor download-link u-font-sans" data-dcnode-id="4137" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr6_lrg.jpg" target="_blank" title="Download high-res image (173KB)"><span class="anchor-text" data-dcnode-id="4138"><span data-dcnode-id="4141" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">Download high-res image (173KB)</span></span></span></a></li><li data-dcnode-id="4130"><a class="anchor download-link u-font-sans" data-dcnode-id="4131" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr6.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4132"><span data-dcnode-id="4135" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4117"><span data-dcnode-id="4118" id="cap0035"><p data-dcnode-id="4119" id="fspara0035"><span class="label" data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">Fig.&nbsp;6</span></span><span data-dcnode-id="4125" instrument_node="">. </span><span data-dcnode-id="4123" instrument_node="">Reported </span><em data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">UPC</span></em><span data-dcnode-id="4120" instrument_node=""> among different technologies in literature.</span></p></span></span></figure></div><div data-dcnode-id="4000"><p data-dcnode-id="4101" id="p0320"><span data-dcnode-id="4114" instrument_node="">Based on the above comparisons, advantages and disadvantages of the above water harvesting technologies, as well as current research gaps are summarized in </span><a class="workspace-trigger" data-dcnode-id="4112" href="#tbl5" name="btbl5"><span data-dcnode-id="4113" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="4111" instrument_node="">. Condensation technologies can be operated 24&nbsp;h a day and their </span><em data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">WHRs</span></em><span data-dcnode-id="4108" instrument_node=""> are relatively high. However, the research gaps are that low temperature cooling sources are required especially when air is dry, which restrains the adoption of free cooling, and electricity is required to produce low temperature cooling sources, such as VCC and TEC technologies. For sorption technologies, it can be driven by solar energy and humidified air can be condensed by cooling sources with ambient temperature. However, the research gaps are the problem of periodical operation and low </span><em data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">WHR</span></em><span data-dcnode-id="4105" instrument_node=""> because of small </span><em data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">MFR</span></em><span data-dcnode-id="4102" instrument_node=""> of air and ambient vapor condensation temperature.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="4001" id="tbl5"><span class="captions" data-dcnode-id="4093"><span data-dcnode-id="4094" id="cap0065"><p data-dcnode-id="4095" id="tspara0030"><span class="label" data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">Table&nbsp;5</span></span><span data-dcnode-id="4098" instrument_node="">. </span><span data-dcnode-id="4096" instrument_node="">Advantages, disadvantages and research gaps of related water harvesting technologies.</span></p></span></span><div class="groups" data-dcnode-id="4002"><table data-dcnode-id="4003"><thead data-dcnode-id="4082"><tr class="rowsep-1 valign-top" data-dcnode-id="4083"><td data-dcnode-id="4090" scope="col"><span class="screen-reader-only" data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">Empty Cell</span></span></td><th data-dcnode-id="4088" scope="col"><span data-dcnode-id="4089" instrument_node="">advantages</span></th><th data-dcnode-id="4086" scope="col"><span data-dcnode-id="4087" instrument_node="">disadvantages</span></th><th data-dcnode-id="4084" scope="col"><span data-dcnode-id="4085" instrument_node="">technology gaps</span></th></tr></thead><tbody data-dcnode-id="4004"><tr class="valign-top" data-dcnode-id="4067"><th class="align-left" data-dcnode-id="4080" scope="row"><span data-dcnode-id="4081" instrument_node="">Condensation methods using VCC</span></th><td class="align-left" data-dcnode-id="4075"><span data-dcnode-id="4079" instrument_node="">Large </span><em data-dcnode-id="4077"><span data-dcnode-id="4078" instrument_node="">WPR</span></em><span data-dcnode-id="4076" instrument_node=""> when air is humid; compact structure.</span></td><td class="align-left" data-dcnode-id="4070"><span data-dcnode-id="4074" instrument_node="">Not efficient when air is dry and </span><em data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">UPC</span></em><span data-dcnode-id="4071" instrument_node=""> is high; electricity is required to power VCC.</span></td><td class="align-left" data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">Low evaporating temperature, which is restricted by the dew point temperature of outlet process air.</span></td></tr><tr class="valign-top" data-dcnode-id="4050"><th class="align-left" data-dcnode-id="4065" scope="row"><span data-dcnode-id="4066" instrument_node="">Condensation methods using TEC</span></th><td class="align-left" data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">Compact structure.</span></td><td class="align-left" data-dcnode-id="4053"><em data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">WPR</span></em><span data-dcnode-id="4060" instrument_node=""> is low and </span><em data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">UPC</span></em><span data-dcnode-id="4057" instrument_node=""> is high as compared with VCC methods; electricity is required to power TEC; Small </span><em data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">MFR</span></em><span data-dcnode-id="4054" instrument_node=""> of air.</span></td><td class="align-left" data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">Heat needs to be dissipated effectively at the hot end; low cooling temperature (reasons are the same with VCC methods).</span></td></tr><tr class="valign-top" data-dcnode-id="4035"><th class="align-left" data-dcnode-id="4048" scope="row"><span data-dcnode-id="4049" instrument_node="">Sorption methods</span></th><td class="align-left" data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">Solar heat can be used; avoid fan power consumption for natural convection systems.</span></td><td class="align-left" data-dcnode-id="4038"><span data-dcnode-id="4045" instrument_node="">Small </span><em data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">WHR</span></em><span data-dcnode-id="4042" instrument_node="">; periodic water harvesting process; Small </span><em data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">MFR</span></em><span data-dcnode-id="4039" instrument_node=""> of air.</span></td><td class="align-left" data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">Vapor is condensed at ambient temperature, which is relatively high as compared with mechanical cooling methods.</span></td></tr><tr class="valign-top" data-dcnode-id="4023"><th class="align-left" data-dcnode-id="4033" scope="row"><span data-dcnode-id="4034" instrument_node="">Solar chimney and wind turbine methods</span></th><td class="align-left" data-dcnode-id="4028"><span data-dcnode-id="4032" instrument_node="">Large WHR and </span><em data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">MFR</span></em><span data-dcnode-id="4029" instrument_node=""> of air.</span></td><td class="align-left" data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">Large installation space with high costs.</span></td><td class="align-left" data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">Mainly used for electricity generation and water is just the byproduct.</span></td></tr><tr class="valign-top" data-dcnode-id="4005"><th class="align-left" data-dcnode-id="4021" scope="row"><span data-dcnode-id="4022" instrument_node="">Membrane assisted methods</span></th><td class="align-left" data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">Favorable for dry climate regions for the increased humidity ratio of processed air.</span></td><td class="align-left" data-dcnode-id="4008"><span data-dcnode-id="4018" instrument_node="">Small </span><em data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">WHR</span></em><span data-dcnode-id="4015" instrument_node="">; small </span><em data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">MFR</span></em><span data-dcnode-id="4012" instrument_node=""> of air; low </span><em data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">UPC</span></em><span data-dcnode-id="4009" instrument_node="">.</span></td><td class="align-left" data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">Mass transfer performance of membrane needs to be improved.</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="3916" id="sec5.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3993" id="sectitle0090"><span data-dcnode-id="3998" instrument_node="">5.2</span><span data-dcnode-id="3996" instrument_node="">. </span><span data-dcnode-id="3994" instrument_node="">Future possible research</span></h3><p data-dcnode-id="3973" id="p0325"><span data-dcnode-id="3992" instrument_node="">The above technologies are favorable for humid climate regions. However, for dry climate regions that have no sea water available for desalination [</span><a class="workspace-trigger" data-dcnode-id="3990" href="#bib52" name="bbib52"><span data-dcnode-id="3991" instrument_node="">52</span></a><span data-dcnode-id="3989" instrument_node="">], the water shortage problem is more serious than coastal areas or humid climate areas. The future research is to find efficient atmospheric water harvesting technologies with both high </span><em data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">WHR</span></em><span data-dcnode-id="3986" instrument_node=""> and high energy efficiency for dry climate regions. Taking both </span><em data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">DWHR</span></em><span data-dcnode-id="3983" instrument_node=""> and </span><em data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">UPC</span></em><span data-dcnode-id="3980" instrument_node=""> into consideration, even though sorption technology can be driven by solar energy, condensation technologies are more attractive for larger </span><em data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">DWHR</span></em><span data-dcnode-id="3977" instrument_node=""> and relatively low </span><em data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">UPC</span></em><span data-dcnode-id="3974" instrument_node="">. However, as can be learned from literature review that performance of condensation technologies is greatly influenced by ambient air temperature and relative humidity. Therefore, for dry climate regions, a possible solution is to increase humid of processed air, using membrane or desiccant wheels, before condensation.</span></p><div data-dcnode-id="3917"><p data-dcnode-id="3947" id="p0330"><span data-dcnode-id="3972" instrument_node="">The technology proposed by Tu et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="3970" href="#bib48" name="bbib48"><span data-dcnode-id="3971" instrument_node="">48</span></a><span data-dcnode-id="3969" instrument_node="">] is one of the solutions. It can be found from the study [</span><a class="workspace-trigger" data-dcnode-id="3967" href="#bib48" name="bbib48"><span data-dcnode-id="3968" instrument_node="">48</span></a><span data-dcnode-id="3966" instrument_node="">] that when ambient humidity ratio is from 3 to 12&nbsp;g&nbsp;kg</span><sup data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">−1</span></sup><span data-dcnode-id="3963" instrument_node="">, the air can be humidified to 20–50&nbsp;g&nbsp;kg</span><sup data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">−1</span></sup><span data-dcnode-id="3960" instrument_node="">, by the desiccant wheels. Under similar working conditions, comparisons of </span><em data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">UPC</span></em><span data-dcnode-id="3957" instrument_node=""> between this system and state-of-art condensation technologies using VCC are shown in </span><a class="workspace-trigger" data-dcnode-id="3955" href="#fig7" name="bfig7"><span data-dcnode-id="3956" instrument_node="">Fig.&nbsp;7</span></a><span data-dcnode-id="3954" instrument_node="">. It can be seen that </span><em data-dcnode-id="3952"><span data-dcnode-id="3953" instrument_node="">UPC</span></em><span data-dcnode-id="3951" instrument_node=""> of the proposed technology [</span><a class="workspace-trigger" data-dcnode-id="3949" href="#bib48" name="bbib48"><span data-dcnode-id="3950" instrument_node="">48</span></a><span data-dcnode-id="3948" instrument_node="">] is lower than those reported in literature. This means that the proposed technology is an efficient atmospheric water harvesting technology that can be applied effectively in dry climate regions. However, in this study, humidification process in desiccant wheels is driven by thermal energy from condensers of VCC. It is possible to adopt solar energy and free cooling as heating and cooling sources to replace VCC, which will improve performance of this system significantly.</span></p><figure class="figure text-xs" data-dcnode-id="3918" id="fig7"><span data-dcnode-id="3931"><img alt="Fig.&nbsp;7" aria-describedby="cap0040" data-dcnode-id="3946" height="206" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr7.jpg&amp;raw"><span data-dcnode-id="3945" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3932"><li data-dcnode-id="3939"><a class="anchor download-link u-font-sans" data-dcnode-id="3940" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr7_lrg.jpg" target="_blank" title="Download high-res image (151KB)"><span class="anchor-text" data-dcnode-id="3941"><span data-dcnode-id="3944" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">Download high-res image (151KB)</span></span></span></a></li><li data-dcnode-id="3933"><a class="anchor download-link u-font-sans" data-dcnode-id="3934" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr7.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3935"><span data-dcnode-id="3938" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3919"><span data-dcnode-id="3920" id="cap0040"><p data-dcnode-id="3921" id="fspara0040"><span class="label" data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">Fig.&nbsp;7</span></span><span data-dcnode-id="3928" instrument_node="">. </span><em data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">UPC</span></em><span data-dcnode-id="3925" instrument_node=""> of the proposed system [</span><a class="workspace-trigger" data-dcnode-id="3923" href="#bib48" name="bbib48"><span data-dcnode-id="3924" instrument_node="">48</span></a><span data-dcnode-id="3922" instrument_node="">] and those in literature under similar ambient conditions.</span></p></span></span></figure></div></section></section><section data-dcnode-id="3792" id="sec6"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3909" id="sectitle0095"><span data-dcnode-id="3914" instrument_node="">6</span><span data-dcnode-id="3912" instrument_node="">. </span><span data-dcnode-id="3910" instrument_node="">Conclusions</span></h2><p data-dcnode-id="3907" id="p0335"><span data-dcnode-id="3908" instrument_node="">In this paper, atmospheric water technologies published after year 2004 are reviewed. The main conclusions for each technology category are summarized as following.</span></p><p data-dcnode-id="3866" id="p0340"><span data-dcnode-id="3906" instrument_node="">1) Condensation technologies perform well under humid climates. Condensation technologies using VCC has high </span><em data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">WHR</span></em><span data-dcnode-id="3903" instrument_node=""> and lower </span><em data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">UPC</span></em><span data-dcnode-id="3900" instrument_node=""> than those of TEC, which is in the range of 0.13–4.20&nbsp;kg&nbsp;h</span><sup data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">−1</span></sup><span data-dcnode-id="3897" instrument_node=""> with the average value of 1.71&nbsp;kg&nbsp;h</span><sup data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">−1</span></sup><span data-dcnode-id="3894" instrument_node="">, and, which is in the range of 0.18–2.08&nbsp;kWh·kg</span><sup data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">−1</span></sup><span data-dcnode-id="3891" instrument_node=""> with the average value of 0.86&nbsp;kWh·kg</span><sup data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">−1</span></sup><span data-dcnode-id="3888" instrument_node="">. The </span><em data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">WHR</span></em><span data-dcnode-id="3885" instrument_node=""> of condensation technology using TEC is lower than 1.41&nbsp;kg&nbsp;h</span><sup data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">−1</span></sup><span data-dcnode-id="3882" instrument_node=""> with the average value of 0.26&nbsp;kg&nbsp;h</span><sup data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">−1</span></sup><span data-dcnode-id="3879" instrument_node="">. And </span><em data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">UPC</span></em><span data-dcnode-id="3876" instrument_node=""> of it is in the range of 0.39–5.21&nbsp;kWh·kg</span><sup data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">−1</span></sup><span data-dcnode-id="3873" instrument_node=""> with the average value of 2.20&nbsp;kWh·kg</span><sup data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">−1</span></sup><span data-dcnode-id="3870" instrument_node="">. Air flow rate of VCC can be much higher than that of TEC, which leads to higher </span><em data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">WHR</span></em><span data-dcnode-id="3867" instrument_node="">.</span></p><p data-dcnode-id="3825" id="p0345"><span data-dcnode-id="3865" instrument_node="">2) Sorption technology can only work in daytime with enough solar radiation and its daily water harvesting rate (</span><em data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">DHWR</span></em><span data-dcnode-id="3862" instrument_node="">) is relatively low. Physical properties of sorption material, solar radiation, ambient temperature and humidity ratio, and the adoption of fans are important factors to influence water harvesting performances. </span><em data-dcnode-id="3860"><span data-dcnode-id="3861" instrument_node="">DWHR</span></em><sub data-dcnode-id="3857"><em data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">ua</span></em></sub><span data-dcnode-id="3856" instrument_node=""> are in the range of 0.31–12.5&nbsp;kg·day</span><sup data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">−1</span></sup><span data-dcnode-id="3853" instrument_node="">&nbsp;m</span><sup data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">−2</span></sup><span data-dcnode-id="3850" instrument_node="">, and the average value is 2.46&nbsp;kg·day</span><sup data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">−1</span></sup><span data-dcnode-id="3847" instrument_node="">&nbsp;m</span><sup data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">−2</span></sup><span data-dcnode-id="3844" instrument_node="">. </span><em data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">DWHR</span></em><sub data-dcnode-id="3839"><em data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">um</span></em></sub><span data-dcnode-id="3838" instrument_node=""> are in the range of 0.05–0.5&nbsp;kg·day</span><sup data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">−1</span></sup><span data-dcnode-id="3835" instrument_node="">&nbsp;kg</span><sup data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">−1</span></sup><span data-dcnode-id="3832" instrument_node="">, and the average value is 0.23&nbsp;kg·day</span><sup data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">−1</span></sup><span data-dcnode-id="3829" instrument_node="">&nbsp;kg</span><sup data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">−1</span></sup><span data-dcnode-id="3826" instrument_node="">.</span></p><p data-dcnode-id="3793" id="p0350"><span data-dcnode-id="3824" instrument_node="">3) For innovative technologies, such as wind turbine powered systems, solar chimney, geothermal cooling system, </span><em data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">WHR</span></em><span data-dcnode-id="3821" instrument_node=""> is very high. However, large space is required for the installation. For membrane assisted systems, </span><em data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">UPC</span></em><span data-dcnode-id="3818" instrument_node=""> is relatively low, which is in the range of 0.16–0.19&nbsp;kWh·kg</span><sup data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">−1</span></sup><span data-dcnode-id="3815" instrument_node="">. However, </span><em data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">DWHR</span></em><span data-dcnode-id="3812" instrument_node=""> reported in literature is very small, which is lower than 0.4&nbsp;kg·day</span><sup data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">−1</span></sup><span data-dcnode-id="3809" instrument_node=""> with the average value of 0.19&nbsp;kg·day</span><sup data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">−1</span></sup><span data-dcnode-id="3806" instrument_node="">. This is mainly due to small processed air flow rate, which is lower than 2&nbsp;m</span><sup data-dcnode-id="3804"><span data-dcnode-id="3805" instrument_node="">3</span></sup><span data-dcnode-id="3803" instrument_node="">&nbsp;h</span><sup data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">−1</span></sup><span data-dcnode-id="3800" instrument_node=""> with the average value of 0.84&nbsp;m</span><sup data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">3</span></sup><span data-dcnode-id="3797" instrument_node="">&nbsp;h</span><sup data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">−1</span></sup><span data-dcnode-id="3794" instrument_node=""> as can be found in literature. Desiccant wheels can be combined with VCC to improve water harvesting performances.</span></p></section></div><section data-dcnode-id="3786" id="coi0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3789" id="sectitle0100"><span data-dcnode-id="3790" instrument_node="">Declaration of competing interest</span></h2><p data-dcnode-id="3787" id="p0355"><span data-dcnode-id="3788" instrument_node="">We wish to confirm that there are no known conflicts of interest associated with this publication and there has been no significant financial support for this work that could have influenced its outcome.</span></p></section><section data-dcnode-id="3769" id="ack0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3784" id="sectitle0105"><span data-dcnode-id="3785" instrument_node="">Acknowledgments</span></h2><p data-dcnode-id="3770" id="p0360"><span data-dcnode-id="3783" instrument_node="">The authors appreciate the support from the </span><span data-dcnode-id="3781" id="gs2"><span data-dcnode-id="3782" instrument_node="">National Natural Science Foundation of China</span></span><span data-dcnode-id="3780" instrument_node=""> (No. </span><a data-dcnode-id="3778" href="#gs2"><span data-dcnode-id="3779" instrument_node="">51706015</span></a><span data-dcnode-id="3777" instrument_node="">), and from the </span><span data-dcnode-id="3775" id="gs3"><span data-dcnode-id="3776" instrument_node="">Fundamental Research Funds for the Central Universities</span></span><span data-dcnode-id="3774" instrument_node=""> (</span><a data-dcnode-id="3772" href="#gs3"><span data-dcnode-id="3773" instrument_node="">FRF-TP-18-014A3</span></a><span data-dcnode-id="3771" instrument_node="">).</span></p></section><div class="Appendices" data-dcnode-id="3661"><section data-dcnode-id="3662" id="appsec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3767" id="sectitle0110"><span data-dcnode-id="3768" instrument_node="">Nomenclature</span></h2><p data-dcnode-id="3663" id="p0365"></p><dl data-dcnode-id="3664" id="dlist0010"><dt data-dcnode-id="3764"><em data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node="">COP</span></em></dt><dd class="u-margin-xxl-left" data-dcnode-id="3761"><p data-dcnode-id="3762" id="p0370"><span data-dcnode-id="3763" instrument_node="">coefficient of performance</span></p></dd><dt data-dcnode-id="3758"><em data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">DWHR</span></em></dt><dd class="u-margin-xxl-left" data-dcnode-id="3753"><p data-dcnode-id="3754" id="p0375"><span data-dcnode-id="3757" instrument_node="">daily water harvesting rate, kg·day</span><sup data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">−1</span></sup></p></dd><dt data-dcnode-id="3747"><em data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">DWHR</span></em><sub data-dcnode-id="3748"><em data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">ua</span></em></sub></dt><dd class="u-margin-xxl-left" data-dcnode-id="3739"><p data-dcnode-id="3740" id="p0380"><span data-dcnode-id="3746" instrument_node="">daily water harvesting rate per transparent area, kg·day</span><sup data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">−1</span></sup><span data-dcnode-id="3743" instrument_node="">&nbsp;m</span><sup data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">−2</span></sup></p></dd><dt data-dcnode-id="3733"><em data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">DWHR</span></em><sub data-dcnode-id="3734"><em data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">um</span></em></sub></dt><dd class="u-margin-xxl-left" data-dcnode-id="3725"><p data-dcnode-id="3726" id="p0385"><span data-dcnode-id="3732" instrument_node="">daily water harvesting rate per kg sorption material, kg·day</span><sup data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">−1</span></sup><span data-dcnode-id="3729" instrument_node="">&nbsp;kg</span><sup data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">−1</span></sup></p></dd><dt data-dcnode-id="3722"><em data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">hr</span></em></dt><dd class="u-margin-xxl-left" data-dcnode-id="3719"><p data-dcnode-id="3720" id="p0390"><span data-dcnode-id="3721" instrument_node="">operating hours, hour</span></p></dd><dt data-dcnode-id="3713"><em data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">m</span></em><sub data-dcnode-id="3714"><em data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">w</span></em></sub></dt><dd class="u-margin-xxl-left" data-dcnode-id="3710"><p data-dcnode-id="3711" id="p0395"><span data-dcnode-id="3712" instrument_node="">harvested water mass, kg</span></p></dd><dt data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">MAT</span></dt><dd class="u-margin-xxl-left" data-dcnode-id="3705"><p data-dcnode-id="3706" id="p0400"><span data-dcnode-id="3707" instrument_node="">membrane assisted technologies</span></p></dd><dt data-dcnode-id="3702"><em data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">MFR</span></em></dt><dd class="u-margin-xxl-left" data-dcnode-id="3697"><p data-dcnode-id="3698" id="p0405"><span data-dcnode-id="3701" instrument_node="">mass flow rate, kg·s</span><sup data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">−1</span></sup></p></dd><dt data-dcnode-id="3694"><em data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">P</span></em></dt><dd class="u-margin-xxl-left" data-dcnode-id="3691"><p data-dcnode-id="3692" id="p0410"><span data-dcnode-id="3693" instrument_node="">electricity consumption, kWh</span></p></dd><dt data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">TEC</span></dt><dd class="u-margin-xxl-left" data-dcnode-id="3686"><p data-dcnode-id="3687" id="p0415"><span data-dcnode-id="3688" instrument_node="">thermoelectric cooling</span></p></dd><dt data-dcnode-id="3683"><em data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">UPC</span></em></dt><dd class="u-margin-xxl-left" data-dcnode-id="3678"><p data-dcnode-id="3679" id="p0420"><span data-dcnode-id="3682" instrument_node="">unit power consumption, kWh·kg</span><sup data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">−1</span></sup></p></dd><dt data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">VCC</span></dt><dd class="u-margin-xxl-left" data-dcnode-id="3673"><p data-dcnode-id="3674" id="p0425"><span data-dcnode-id="3675" instrument_node="">vapor compression cycle</span></p></dd><dt data-dcnode-id="3670"><em data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">WHR</span></em></dt><dd class="u-margin-xxl-left" data-dcnode-id="3665"><p data-dcnode-id="3666" id="p0430"><span data-dcnode-id="3669" instrument_node="">water harvesting rate, kg·h</span><sup data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">−1</span></sup></p></dd></dl><p></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="3656"><button class="button button-anchor" data-dcnode-id="3657" type="button"><span class="button-text" data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="3655"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="389" id="cebib0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="390" id="cebibsec0010"><dl class="references" data-dcnode-id="391" id="reference-links-cebibsec0010"><dt class="label" data-dcnode-id="3650"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="3651" href="#bbib1" id="ref-id-bib1"><span data-dcnode-id="3652" instrument_node="">[1]</span></a></dt><dd class="reference" data-dcnode-id="3587" id="sref1"><div class="contribution" data-dcnode-id="3625"><span data-dcnode-id="3649" instrument_node="">J.J.</span><span data-dcnode-id="3647" instrument_node=""> </span><span data-dcnode-id="3645" instrument_node="">Luo</span><span data-dcnode-id="3643" instrument_node="">, </span><span data-dcnode-id="3641" instrument_node="">W.D.</span><span data-dcnode-id="3639" instrument_node=""> </span><span data-dcnode-id="3637" instrument_node="">Zhang</span><span data-dcnode-id="3635" instrument_node="">, </span><span data-dcnode-id="3633" instrument_node="">X.B.</span><span data-dcnode-id="3631" instrument_node=""> </span><span data-dcnode-id="3629" instrument_node="">Bai</span><div data-dcnode-id="3626" id="ref-id-sref1"><strong class="title" data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">D
