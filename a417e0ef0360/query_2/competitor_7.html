f"><h3 class="article-title ellipsis text-s" data-dcnode-id="383" id="citing-articles-article0-title"><span data-dcnode-id="384" instrument_node="">Experimental study and performance analysis of a mobile autonomous atmospheric water generator designed for arid climatic conditions</span></h3></a><div class="article-source ellipsis" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">2022, Energy</span></div></div><div class="buttons" data-dcnode-id="373"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="374" type="button"><span class="button-link-text" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="375" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="376"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="365"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="366" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="367"><p data-dcnode-id="368" id="abspara0010"><span data-dcnode-id="372" instrument_node="">To offer an alternative way of supplying potable water to people in desert climatic conditions, a prototype of a mobile autonomous atmospheric water generator was designed, constructed, and experimentally investigated. The dimensions of the prototype are 1&nbsp;×&nbsp;1.4&nbsp;×&nbsp;1&nbsp;m. To ensure the efficient water extraction from the atmospheric vapour in the desert climatic conditions, a desiccant wheel was used to provide a water vapour mass transfer from one airflow to another. Cooling the air stream (120&nbsp;m</span><sup data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">3</span></sup><span data-dcnode-id="369" instrument_node="">/h) below the dew point temperature was realised by a vapour compression cycle. The influence of the climatic conditions (air temperature and humidity ratio) on the water production, energy consumption, and device performance was studied and analysed. The developed prototype can effectively harvest water in arid locations with a water harvesting rate (WHR) from 0.23&nbsp;kg/h to 1.45&nbsp;kg/h and a unit performance coefficient (UPC) from 1.00&nbsp;kWh/kg to 4.65&nbsp;kWh/kg. Subsequently, a whole year simulation analysis with different control strategies was conducted for the desert climatic conditions of Riyadh (Saudi Arabia) and Tamanrasset (Algeria). The results of the simulation showed that, in the fully autonomous mode, annual average daily water production rates of 7.9&nbsp;kg/day and 8.1&nbsp;kg/day were achieved for the Riyadh and Tamanrasset climatic conditions, respectively, proving it to be an efficient and valuable solution for potable water production in extremely dry and hot regions.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="346"><div class="sub-heading" data-dcnode-id="358"><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1364032122002398" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="362" id="citing-articles-article1-title"><span data-dcnode-id="363" instrument_node="">Progress in atmospheric water generation systems: A review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">2022, Renewable and Sustainable Energy Reviews</span></div></div><div class="buttons" data-dcnode-id="352"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="353" type="button"><span class="button-link-text" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="354" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="355"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="347"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="348" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="349"><p data-dcnode-id="350" id="abspara0010"><span data-dcnode-id="351" instrument_node="">In recent years, freshwater reserves have been severely depleted. Demand is outpacing supply, and supply is being impacted in terms of both quantity and quality. Therefore, freshwater scarcity is regarded as one of the greatest challenges of our time. During recent decades, the concept of generating fresh water from atmospheric air has been emerging as a promising solution to overcome the global water crisis. The present review attempts to provide a novel and comprehensive classification of various AWG technologies and materials. Each technology has been summarized and discussed. Solar assisted AWG systems with a reliable and cheap energy source are thoroughly explained. Over the last few years, most AWG studies have been shifted towards hybrid/integrated systems which utilize several cooling approaches in order to increase water productivity. The present paper is primarily focused on reviewing hybrid systems with portable and round-the-clock (RTC) application capability. Performance indicators of each system; including water production and energy consumption, thermal efficiency, and coefficient of performance were evaluated and compared. Finally, possible future perspective of implementing atmospheric water generating technologies is proposed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="322"><div class="sub-heading" data-dcnode-id="340"><a data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0735193322000835" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="344" id="citing-articles-article2-title"><span data-dcnode-id="345" instrument_node="">Adsorption-based atmospheric water harvesting: A review of adsorbents and systems</span></h3></a><div class="article-source ellipsis" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">2022, International Communications in Heat and Mass Transfer</span></div></div><div class="buttons" data-dcnode-id="334"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="335" type="button"><span class="button-link-text" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="336" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="337"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="323"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="324" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="325"><p data-dcnode-id="326" id="sp0165"><span data-dcnode-id="333" instrument_node="">Atmospheric water harvesting (AWH) has been an appealing prospect for decades to overcome water scarcity in remote areas. Adsorption-based AWH technologies have gained popularity due to their adaptability, and applicability using low-grade heat sources. This study presents up-to-date and future possibilities of adsorbents and systems for adsorption-based AWH. In this review, in-depth advancements in adsorbent materials are compartmentalized into adsorption equilibrium/isotherms, adsorption kinetics, and thermal conductivity. Various systems designs and modifications have been reviewed and classified accordingly. Liquid desiccants i.e., CaCl</span><sub data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">2</span></sub><span data-dcnode-id="330" instrument_node=""> and LiCl-based AWH systems produced in between 0.63 to 1.0 kg/m/d of water. Recently, metal-organic frameworks (MOFs) are realized as effective adsorbents for AWH. Their excellent hydrophilicity, structural integrity, and tailorable structures can provide water in high and low relative humidity (RH) areas. MOF-841 and MOF-801 yielded maximum adsorption uptakes at 25 °C i.e., 0.5 and 0.3 g/g, respectively. MOF-801 showed an excellent water production of 0.2-0.3 L/kg/d at 5%-40% RH and 20-40°C. MOF-303 delivered ~0.7 L/kg/d at 10% RH and 27</span><sup data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">o</span></sup><span data-dcnode-id="327" instrument_node="">C. Cr-soc-MOF-1 and MIL-101(Cr) resulted in maximum adsorption uptakes i.e., 1.9 g/g and 1.4 g/g, respectively. Future possibilities regarding these captivating and emerging adsorption technologies are discussed as concluding remarks.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="292"><div class="sub-heading" data-dcnode-id="316"><a data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0196890421012413" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="320" id="citing-articles-article3-title"><span data-dcnode-id="321" instrument_node="">Performance analyses of desiccant wheel-assisted atmospheric water harvesting system using renewable heating and cooling sources</span></h3></a><div class="article-source ellipsis" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">2022, Energy Conversion and Management</span></div></div><div class="buttons" data-dcnode-id="310"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="311" type="button"><span class="button-link-text" data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="312" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="313"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="293"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="294" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="295"><p data-dcnode-id="296" id="sp0010"><span data-dcnode-id="309" instrument_node="">This paper proposes an atmospheric water harvesting system that can be operated using renewable heating and cooling sources. It is intended for use in humid regions. The system uses multistage desiccant wheels to increase the humidity ratio of the processed air before it is condensed to collect water. Theoretical analyses of the cascade humidification cycles were performed, and parametric analyses were performed to identify the optimal system configurations, e.g., the wheel structure, total wheel thickness, and stage number. The results can be used to maximize water harvesting rate (</span><em data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">WHR</span></em><span data-dcnode-id="306" instrument_node="">) under different weather conditions and different heating/cooling-source temperatures. Under annual weather conditions of four typical cities in South China, the area ratio of the wheel is recommended to be 1. Considering both the total thickness of the wheels and the stage number, the recommended wheel thickness in each stage is 100&nbsp;mm. Increasing the stage number led to a high </span><em data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">WHR</span></em><span data-dcnode-id="303" instrument_node="">. However, the water harvesting efficiency first increased and then decreased. The optimal stage number with the maximum water-harvesting efficiency depends on the weather conditions. The optimal number of parallel humidification systems was studied for a total wheel thickness of 1200&nbsp;mm and a stage number of 12. Under weather conditions of 28&nbsp;°C and 20&nbsp;g/kg, the maximum </span><em data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">WHR</span></em><span data-dcnode-id="300" instrument_node=""> is 95.2&nbsp;kg/h, which is realized when the number of parallel humidifying systems is 3. Considering the heating and cooling temperatures and heat-transfer efficiencies, the numbers of parallel humidifying systems needed to achieve the maximum </span><em data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">WHR</span></em><span data-dcnode-id="297" instrument_node=""> under different weather conditions were identified.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="271"><div class="sub-heading" data-dcnode-id="286"><a data-dcnode-id="289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0360544221023276" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="290" id="citing-articles-article4-title"><span data-dcnode-id="291" instrument_node="">Transitional metal-doped aluminum fumarates for ultra-low heat driven adsorption cooling systems</span></h3></a><div class="article-source ellipsis" data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">2022, Energy</span></div></div><div class="buttons" data-dcnode-id="280"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="281" type="button"><span class="button-link-text" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="282" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="283"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="272"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="273" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="274"><p data-dcnode-id="275" id="abspara0010"><span data-dcnode-id="279" instrument_node="">Solid-gas adsorption has drawn considerable attention utilizing low-grade waste heat and environment-friendly refrigerants for cooling, heating, and air-conditioning. However, low sorption capacity of the adsorbents is a long-standing challenge for achieving highly efficient adsorption heat pumps. This study aims to analyze and compare the performance of green synthesized transitional metal (10% Ni and 10% Co) doped aluminum fumarate metal-organic frameworks as adsorbent materials in an adsorption chiller where water is considered as the refrigerant. Water uptakes on these adsorbents were measured at 303&nbsp;K, 323&nbsp;K, and 343&nbsp;K gravimetrically. It was found that both Ni and Co-doped samples showed higher equilibrium uptake when compared with the parent sample while the adsorption isotherm moved towards the lower pressure region. Additionally, adsorption cycles involving the pressure, temperature, and uptakes (</span><em data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">P</span></em><span data-dcnode-id="276" instrument_node="">-T-q diagrams) were drawn to investigate their cyclic performances. The specific cooling effects were also calculated and compared among the associated adsorbent/adsorbate pairs having the adsorption, desorption, evaporator, and condenser temperatures considered as 303&nbsp;K, 353&nbsp;K, 288&nbsp;K, and 308&nbsp;K, respectively. Additional studies were conducted using the inverse gas chromatography technique to investigate the relation between the surface properties and the water adsorption isotherms.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="253"><div class="sub-heading" data-dcnode-id="265"><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1359431121009807" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="269" id="citing-articles-article5-title"><span data-dcnode-id="270" instrument_node="">Application of dehumidification as anti-corrosion technology on suspension bridges: A review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">2021, Applied Thermal Engineering</span></div></div><div class="buttons" data-dcnode-id="259"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="260" type="button"><span class="button-link-text" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="261" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="262"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="254"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="255" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="256"><p data-dcnode-id="257" id="sp0010"><span data-dcnode-id="258" instrument_node="">The moisture from residual droplets during construction and infiltration of wet air during operation can cause metal corrosion of main cables on suspension bridges. Main cable dehumidification, emerged as a prospective corrosion protection approach, which provides an internal environment of relative humidity below 60%, would significantly mitigate the corrosion. This paper presents a state-of-the-art listicle review of existing dehumidification systems implemented on 47 suspension bridges (e.g., the Akashi Kaikyo Bridge, the Runyang Yangtze River Bridge). Dehumidification methods adopted in suspension bridges, including solid desiccant dehumidification, condensing dehumidification and integrated dehumidification, are elaborated. Based on that, crucial limitations and adaptations of various systems for main cable applications are discussed. Then, technical suggestions concerning the moisture load matching, sensor configurations, full-bridge sealings, dehumidification equipment placement and system division, are given to realize system sustainability and energy efficiency. Finally, this paper examined one potential development of a multi-stage dehumidification system that uses condensing dehumidification and solid desiccant dehumidification, which facilitates cascade utilization of the waste energy and enhances the system efficiency.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85083831216%26md5%3D52cd8fa3339c847dd8a8878b3cd0c5b3" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="250" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="251"></path></svg><span class="button-alternative-text" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0360544220307374"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2020 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-
