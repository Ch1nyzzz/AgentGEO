span data-dcnode-id="6554" instrument_node=""> to 4·10</span><sup data-dcnode-id="6552"><span data-dcnode-id="6553" instrument_node="">−3</span></sup><span data-dcnode-id="6551" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="6549"><span data-dcnode-id="6550" instrument_node="">−1</span></sup><span data-dcnode-id="6548" instrument_node="">.</span></td><td class="align-left" data-dcnode-id="6540"><span data-dcnode-id="6546" instrument_node="">30.3&nbsp;kg·kWh</span><sup data-dcnode-id="6544"><span data-dcnode-id="6545" instrument_node="">−1</span></sup><span data-dcnode-id="6543" instrument_node=""> to 14.9&nbsp;kg·kWh</span><sup data-dcnode-id="6541"><span data-dcnode-id="6542" instrument_node="">−1</span></sup></td></tr><tr class="valign-top" data-dcnode-id="6493"><td class="align-left" data-dcnode-id="6534"><span data-dcnode-id="6538" instrument_node="">[</span><a class="workspace-trigger" data-dcnode-id="6536" href="#bib21" name="bbib21"><span data-dcnode-id="6537" instrument_node="">21</span></a><span data-dcnode-id="6535" instrument_node="">]</span></td><td class="align-left" data-dcnode-id="6532"><span data-dcnode-id="6533" instrument_node="">NA</span></td><td class="align-left" data-dcnode-id="6530"><span data-dcnode-id="6531" instrument_node="">experiment</span></td><td class="align-left" data-dcnode-id="6501"><em data-dcnode-id="6528"><span data-dcnode-id="6529" instrument_node="">t</span></em><sub data-dcnode-id="6525"><em data-dcnode-id="6526"><span data-dcnode-id="6527" instrument_node="">a</span></em></sub><span data-dcnode-id="6524" instrument_node="">&nbsp;=&nbsp;26.4&nbsp;°C, RH&nbsp;=&nbsp;69.6% and </span><em data-dcnode-id="6522"><span data-dcnode-id="6523" instrument_node="">m</span></em><sub data-dcnode-id="6519"><em data-dcnode-id="6520"><span data-dcnode-id="6521" instrument_node="">a</span></em></sub><span data-dcnode-id="6518" instrument_node="">&nbsp;=&nbsp;31.7&nbsp;m</span><sup data-dcnode-id="6516"><span data-dcnode-id="6517" instrument_node="">3</span></sup><span data-dcnode-id="6515" instrument_node="">&nbsp;h</span><sup data-dcnode-id="6513"><span data-dcnode-id="6514" instrument_node="">−1</span></sup><span data-dcnode-id="6512" instrument_node="">: 10.2&nbsp;ml water collected in 2&nbsp;h;</span><br data-dcnode-id="6511"><span data-dcnode-id="6510" instrument_node="">0.21&nbsp;kg water can be obtained each day and </span><em data-dcnode-id="6508"><span data-dcnode-id="6509" instrument_node="">WHR</span></em><span data-dcnode-id="6507" instrument_node=""> is calculated as 8.75·10</span><sup data-dcnode-id="6505"><span data-dcnode-id="6506" instrument_node="">−3</span></sup><span data-dcnode-id="6504" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="6502"><span data-dcnode-id="6503" instrument_node="">−1</span></sup></td><td class="align-left" data-dcnode-id="6494"><span data-dcnode-id="6500" instrument_node="">Daily power consumption is 0.33&nbsp;kWh. </span><em data-dcnode-id="6498"><span data-dcnode-id="6499" instrument_node="">UPC</span></em><span data-dcnode-id="6497" instrument_node=""> of TEC method is 1.56&nbsp;kWh·kg</span><sup data-dcnode-id="6495"><span data-dcnode-id="6496" instrument_node="">−1</span></sup></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="6392" id="sec2.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6481" id="sectitle0055"><span data-dcnode-id="6486" instrument_node="">2.3</span><span data-dcnode-id="6484" instrument_node="">. </span><span data-dcnode-id="6482" instrument_node="">Condensation technologies using adsorption/absorption refrigeration</span></h3><p data-dcnode-id="6440" id="p0155"><span data-dcnode-id="6480" instrument_node="">Scrivani et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="6478" href="#bib22" name="bbib22"><span data-dcnode-id="6479" instrument_node="">22</span></a><span data-dcnode-id="6477" instrument_node="">] analyzed the use of solar concentrating plants for atmospheric water harvesting by direct cooling of humid air below the dew point under the climate conditions in Middle East and Northern Africa region. An adsorption cooling system driven by solar thermal energy was used to produce chilled water for water vapor condensation. In the study, the condensed air was fixed at 12&nbsp;°C and 100% RH and the </span><em data-dcnode-id="6475"><span data-dcnode-id="6476" instrument_node="">COP</span></em><span data-dcnode-id="6474" instrument_node=""> of the adsorption chiller was fixed at 0.75. The results show that </span><em data-dcnode-id="6472"><span data-dcnode-id="6473" instrument_node="">WHR</span></em><span data-dcnode-id="6471" instrument_node=""> and </span><em data-dcnode-id="6469"><span data-dcnode-id="6470" instrument_node="">UPC</span></em><span data-dcnode-id="6468" instrument_node=""> were more favorable for ocean cities or inland cities with high relative humidity. For ocean cities like Tripoli, 84.7&nbsp;m</span><sup data-dcnode-id="6466"><span data-dcnode-id="6467" instrument_node="">3</span></sup><span data-dcnode-id="6465" instrument_node=""> water can be harvested each year. Average </span><em data-dcnode-id="6463"><span data-dcnode-id="6464" instrument_node="">WHR</span></em><span data-dcnode-id="6462" instrument_node=""> can be calculated as 9.7&nbsp;kg&nbsp;h</span><sup data-dcnode-id="6460"><span data-dcnode-id="6461" instrument_node="">−1</span></sup><span data-dcnode-id="6459" instrument_node="">. Average </span><em data-dcnode-id="6457"><span data-dcnode-id="6458" instrument_node="">UPC</span></em><span data-dcnode-id="6456" instrument_node=""> of Tripoli is 2.26&nbsp;kWh·kg</span><sup data-dcnode-id="6454"><span data-dcnode-id="6455" instrument_node="">−1</span></sup><span data-dcnode-id="6453" instrument_node="">. On the contrary, for Rayack, which is an inland city and is in dry climate, average </span><em data-dcnode-id="6451"><span data-dcnode-id="6452" instrument_node="">WHR</span></em><span data-dcnode-id="6450" instrument_node=""> can be calculated as 0.6&nbsp;kg&nbsp;h</span><sup data-dcnode-id="6448"><span data-dcnode-id="6449" instrument_node="">−1</span></sup><span data-dcnode-id="6447" instrument_node="">. Average </span><em data-dcnode-id="6445"><span data-dcnode-id="6446" instrument_node="">UPC</span></em><span data-dcnode-id="6444" instrument_node=""> of Rayack is 7.96&nbsp;kWh·kg</span><sup data-dcnode-id="6442"><span data-dcnode-id="6443" instrument_node="">−1</span></sup><span data-dcnode-id="6441" instrument_node="">.</span></p><p data-dcnode-id="6393" id="p0160"><span data-dcnode-id="6439" instrument_node="">In the study of Ibrahim et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="6437" href="#bib23" name="bbib23"><span data-dcnode-id="6438" instrument_node="">23</span></a><span data-dcnode-id="6436" instrument_node="">], a H</span><sub data-dcnode-id="6434"><span data-dcnode-id="6435" instrument_node="">2</span></sub><span data-dcnode-id="6433" instrument_node="">O/LiBr absorption chiller driven by solar thermal energy was used as a cooling source. Chilled water in the evaporator was sent to a fan-coil unit located in the occupant room to cool and dehumidify the air to realize both air conditioning and water harvesting. Mathematic model of the absorption chiller was developed. Simulation results show that under the condition that air MFR is 0.3&nbsp;m</span><sup data-dcnode-id="6431"><span data-dcnode-id="6432" instrument_node="">3</span></sup><span data-dcnode-id="6430" instrument_node="">&nbsp;s</span><sup data-dcnode-id="6428"><span data-dcnode-id="6429" instrument_node="">−1</span></sup><span data-dcnode-id="6427" instrument_node=""> (half fresh air and half return air), return air state is 27&nbsp;°C and 40% RH, the incident solar flux is 800&nbsp;W&nbsp;m</span><sup data-dcnode-id="6425"><span data-dcnode-id="6426" instrument_node="">−2</span></sup><span data-dcnode-id="6424" instrument_node=""> and hot fluid MFR is 0.3&nbsp;kg&nbsp;s</span><sup data-dcnode-id="6422"><span data-dcnode-id="6423" instrument_node="">−1</span></sup><span data-dcnode-id="6421" instrument_node="">, useful energy generated was found to be 14.8&nbsp;kW. </span><em data-dcnode-id="6419"><span data-dcnode-id="6420" instrument_node="">WHR</span></em><span data-dcnode-id="6418" instrument_node=""> is around 5.1&nbsp;kg&nbsp;h</span><sup data-dcnode-id="6416"><span data-dcnode-id="6417" instrument_node="">−1</span></sup><span data-dcnode-id="6415" instrument_node=""> when fresh air is 30&nbsp;°C and 50% RH, and </span><em data-dcnode-id="6413"><span data-dcnode-id="6414" instrument_node="">WHR</span></em><span data-dcnode-id="6412" instrument_node=""> is around 8.0&nbsp;kg&nbsp;h</span><sup data-dcnode-id="6410"><span data-dcnode-id="6411" instrument_node="">−1</span></sup><span data-dcnode-id="6409" instrument_node=""> when fresh air is 45&nbsp;°C and 50% RH. Increasing fresh air volume ratio, incident solar flux and fresh air relative humidity will enhance </span><em data-dcnode-id="6407"><span data-dcnode-id="6408" instrument_node="">WHR</span></em><span data-dcnode-id="6406" instrument_node="">, correspondingly. For a typical day in August for Dhahran, Saudi Arabia, the results indicate that the chiller </span><em data-dcnode-id="6404"><span data-dcnode-id="6405" instrument_node="">COP</span></em><span data-dcnode-id="6403" instrument_node=""> and </span><em data-dcnode-id="6401"><span data-dcnode-id="6402" instrument_node="">WHR</span></em><span data-dcnode-id="6400" instrument_node=""> peaked at noon, which were 0.73 and 6.6&nbsp;kg&nbsp;h</span><sup data-dcnode-id="6398"><span data-dcnode-id="6399" instrument_node="">−1</span></sup><span data-dcnode-id="6397" instrument_node="">, respectively, when the incident solar flux is peak (935&nbsp;W&nbsp;m</span><sup data-dcnode-id="6395"><span data-dcnode-id="6396" instrument_node="">−2</span></sup><span data-dcnode-id="6394" instrument_node="">) for 45% fresh air volume ratio.</span></p></section></section><section data-dcnode-id="4752" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6385" id="sectitle0060"><span data-dcnode-id="6390" instrument_node="">3</span><span data-dcnode-id="6388" instrument_node="">. </span><span data-dcnode-id="6386" instrument_node="">Atmospheric water harvesting using sorption technologies</span></h2><p data-dcnode-id="6383" id="p0165"><span data-dcnode-id="6384" instrument_node="">The sorption technologies adopt adsorbent or absorbent material to catch moisture from the air at night and release the water to high temperature air at daytime when there is enough solar radiation. Then, the humid air is condensed at surfaces with ambient temperature. Difference between adsorption technology and absorption technology depends on the adopted sorption material.</span></p><p data-dcnode-id="6345" id="p0170"><span data-dcnode-id="6382" instrument_node="">This technology inherently has the characteristic of periodic working, which reduced daily water harvesting capacity as compared with condensation technologies. The performance of sorption technology is usually evaluated as daily water harvest rate, short as </span><em data-dcnode-id="6380"><span data-dcnode-id="6381" instrument_node="">DWHR</span></em><span data-dcnode-id="6379" instrument_node="">, in the unit of kg·day</span><sup data-dcnode-id="6377"><span data-dcnode-id="6378" instrument_node="">−1</span></sup><span data-dcnode-id="6376" instrument_node="">, </span><em data-dcnode-id="6374"><span data-dcnode-id="6375" instrument_node="">DWHR</span></em><span data-dcnode-id="6373" instrument_node=""> for unit mass of dry sorption material, short as </span><em data-dcnode-id="6371"><span data-dcnode-id="6372" instrument_node="">DWHR</span></em><sub data-dcnode-id="6368"><em data-dcnode-id="6369"><span data-dcnode-id="6370" instrument_node="">um</span></em></sub><span data-dcnode-id="6367" instrument_node="">, in the unit of kg·day</span><sup data-dcnode-id="6365"><span data-dcnode-id="6366" instrument_node="">−1</span></sup><span data-dcnode-id="6364" instrument_node="">&nbsp;kg</span><sup data-dcnode-id="6362"><span data-dcnode-id="6363" instrument_node="">−1</span></sup><span data-dcnode-id="6361" instrument_node="">, or </span><em data-dcnode-id="6359"><span data-dcnode-id="6360" instrument_node="">DWHR</span></em><span data-dcnode-id="6358" instrument_node=""> for unit area of solar collector area, short as </span><em data-dcnode-id="6356"><span data-dcnode-id="6357" instrument_node="">DWHR</span></em><sub data-dcnode-id="6353"><em data-dcnode-id="6354"><span data-dcnode-id="6355" instrument_node="">ua</span></em></sub><span data-dcnode-id="6352" instrument_node="">, in the unit of kg·day</span><sup data-dcnode-id="6350"><span data-dcnode-id="6351" instrument_node="">−1</span></sup><span data-dcnode-id="6349" instrument_node="">&nbsp;m</span><sup data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">−2</span></sup><span data-dcnode-id="6346" instrument_node="">.</span></p><p data-dcnode-id="6328" id="p0175"><span data-dcnode-id="6344" instrument_node="">Yang et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="6342" href="#bib24" name="bbib24"><span data-dcnode-id="6343" instrument_node="">24</span></a><span data-dcnode-id="6341" instrument_node="">] tested a tube type adsorbent bed for atmospheric water harvesting. Compound adsorbent of 66.7&nbsp;wt% (mass fraction in the compound material) of CaCl</span><sub data-dcnode-id="6339"><span data-dcnode-id="6340" instrument_node="">2</span></sub><span data-dcnode-id="6338" instrument_node=""> and 33.3&nbsp;wt% of expanded graphite (EG) was used. Density and heat conductivity of the compound adsorbent are 600&nbsp;kg&nbsp;m</span><sup data-dcnode-id="6336"><span data-dcnode-id="6337" instrument_node="">−3</span></sup><span data-dcnode-id="6335" instrument_node=""> and 3.4&nbsp;W&nbsp;m</span><sup data-dcnode-id="6333"><span data-dcnode-id="6334" instrument_node="">−1</span></sup><span data-dcnode-id="6332" instrument_node="">&nbsp;K</span><sup data-dcnode-id="6330"><span data-dcnode-id="6331" instrument_node="">−1</span></sup><span data-dcnode-id="6329" instrument_node="">, respectively. The test tubes have an outer diameter of 60&nbsp;mm, an inner diameter of 10–20&nbsp;mm, which is air flow channel, and a length of 400&nbsp;mm. The space between the inner diameter and outer diameter is packed with the compound materials. It was found that forced convection could increase adsorption capacity by 14.5% and the increase of mass transfer channel could increase adsorption capacity by more than 40%. For adsorption ambient conditions of 11.8&nbsp;°C and 57% RH, 57.4&nbsp;g of water vapor can be adsorbed in 12&nbsp;h by a single tube type adsorption bed when fan motor power was 150&nbsp;W and mass transfer channel diameter was 20&nbsp;mm. However, desorption process was not discussed in this paper. Although forced convection shows great performance enhancement potential, electricity is required to power the fan motor.</span></p><p data-dcnode-id="6311" id="p0180"><span data-dcnode-id="6327" instrument_node="">Liu et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="6325" href="#bib25" name="bbib25"><span data-dcnode-id="6326" instrument_node="">25</span></a><span data-dcnode-id="6324" instrument_node="">] made four compound desiccants using silica-gel (SG), activated carbon fiber (ACF), calcium chloride (CaCl</span><sub data-dcnode-id="6322"><span data-dcnode-id="6323" instrument_node="">2</span></sub><span data-dcnode-id="6321" instrument_node="">) and lithium chloride (LiCl). Laboratory tests were carried out to find out performances of these materials for atmospheric water harvesting. The results show that ACF-LiCl compound adsorbent had the best adsorption and desorption performances. When desorption temperature was increased from 70 to 90&nbsp;°C, water harvested by unit mass of adsorbent increased from 0.379 to 0.412&nbsp;kg&nbsp;kg</span><sup data-dcnode-id="6319"><span data-dcnode-id="6320" instrument_node="">−1</span></sup><span data-dcnode-id="6318" instrument_node=""> during test period of 6&nbsp;h. The weights of adsorbents were 2.06&nbsp;kg of ACF and 1.94&nbsp;kg of LiCl. Therefore, </span><em data-dcnode-id="6316"><span data-dcnode-id="6317" instrument_node="">WHR</span></em><span data-dcnode-id="6315" instrument_node=""> during test period can be calculated, which was increased from 130 to 133&nbsp;g&nbsp;h</span><sup data-dcnode-id="6313"><span data-dcnode-id="6314" instrument_node="">−1</span></sup><span data-dcnode-id="6312" instrument_node="">.</span></p><p data-dcnode-id="6282" id="p0185"><span data-dcnode-id="6310" instrument_node="">Zhao et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="6308" href="#bib26" name="bbib26"><span data-dcnode-id="6309" instrument_node="">26</span></a><span data-dcnode-id="6307" instrument_node="">] tested adsorption characteristics of solar pipes, which were made of stainless-steel tubes with diameter of 50&nbsp;mm filled with SG and CaCl</span><sub data-dcnode-id="6305"><span data-dcnode-id="6306" instrument_node="">2</span></sub><span data-dcnode-id="6304" instrument_node=""> compound material. Solar energy was used for desorption. Results from theoretic calculation show that 735&nbsp;g of water was obtained with a single tube during adsorption period of 10–16&nbsp;h when ambient condition was about 50&nbsp;°C and 40% RH. </span><em data-dcnode-id="6302"><span data-dcnode-id="6303" instrument_node="">DWHR</span></em><span data-dcnode-id="6301" instrument_node=""> was 15&nbsp;kg·day</span><sup data-dcnode-id="6299"><span data-dcnode-id="6300" instrument_node="">−1</span></sup><span data-dcnode-id="6298" instrument_node=""> with 20 solar pipes, total solar heating area of which was 1.2&nbsp;m</span><sup data-dcnode-id="6296"><span data-dcnode-id="6297" instrument_node="">2</span></sup><span data-dcnode-id="6295" instrument_node="">. Therefore, </span><em data-dcnode-id="6293"><span data-dcnode-id="6294" instrument_node="">DWHR</span></em><sub data-dcnode-id="6290"><em data-dcnode-id="6291"><span data-dcnode-id="6292" instrument_node="">ua</span></em></sub><span data-dcnode-id="6289" instrument_node=""> can be calculated as 12.5&nbsp;kg·day</span><sup data-dcnode-id="6287"><span data-dcnode-id="6288" instrument_node="">−1</span></sup><span data-dcnode-id="6286" instrument_node="">&nbsp;m</span><sup data-dcnode-id="6284"><span data-dcnode-id="6285" instrument_node="">−2</span></sup><span data-dcnode-id="6283" instrument_node="">.</span></p><p data-dcnode-id="6259" id="p0190"><span data-dcnode-id="6281" instrument_node="">Kim et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="6279" href="#bib27" name="bbib27"><span data-dcnode-id="6280" instrument_node="">27</span></a><span data-dcnode-id="6278" instrument_node="">] investigated theoretically and experimentally on a solar driven water harvesting system using metal-organic frameworks (MOF). MOF has the advantages of large water uptake, low temperature desorption. MOF-801, which exhibit good performance at around 20% RH, was used for study. In this study, MOF temperature ranged between 25 and 65&nbsp;°C, and more than 0.25&nbsp;kg of water could be harvested for 1&nbsp;kg of MOF when ambient condition was 25&nbsp;°C and 20% RH. A laboratory prototype having a 5&nbsp;×&nbsp;5&nbsp;×&nbsp;0.43&nbsp;cm adsorbent layer with 1.79&nbsp;g MOF-801 powder was fabricated. Ambient condition for adsorption is 35&nbsp;°C and 20% RH. After saturation, a solar flux of 1000&nbsp;W&nbsp;m</span><sup data-dcnode-id="6276"><span data-dcnode-id="6277" instrument_node="">−2</span></sup><span data-dcnode-id="6275" instrument_node=""> was applied to heat the adsorption bed to vaporize the adsorbed water. The test results show that 0.24&nbsp;kg of water was harvested with 1&nbsp;kg MOF after 100&nbsp;min one cycle consisting of 70&nbsp;min for adsorption and 30&nbsp;min for desorption. A water-harvesting prototype was built for testing. This prototype used a MOF-801 layer (5&nbsp;×&nbsp;5&nbsp;×&nbsp;0.31&nbsp;cm, containing 1.34&nbsp;g of activated MOF), an acrylic enclosure and a condenser. Field tests were carried out on a roof of one building at MIT, Boston, USA. Ambient relative humidity was at around 65% when desorption started. Solar intensity was about 750&nbsp;W&nbsp;m</span><sup data-dcnode-id="6273"><span data-dcnode-id="6274" instrument_node="">−2</span></sup><span data-dcnode-id="6272" instrument_node=""> and condensing temperature stayed at around 23&nbsp;°C. The MOF temperature increased from around 25 to 66&nbsp;°C after being exposed to the sun. For 1&nbsp;kg MOF, around 0.3&nbsp;kg of water could be harvested. </span><em data-dcnode-id="6270"><span data-dcnode-id="6271" instrument_node="">DWHR</span></em><sub data-dcnode-id="6267"><em data-dcnode-id="6268"><span data-dcnode-id="6269" instrument_node="">um</span></em></sub><span data-dcnode-id="6266" instrument_node=""> can be calculated as 0.3&nbsp;kg·day</span><sup data-dcnode-id="6264"><span data-dcnode-id="6265" instrument_node="">−1</span></sup><span data-dcnode-id="6263" instrument_node="">&nbsp;kg</span><sup data-dcnode-id="6261"><span data-dcnode-id="6262" instrument_node="">−1</span></sup><span data-dcnode-id="6260" instrument_node="">.</span></p><p data-dcnode-id="6221" id="p0195"><span data-dcnode-id="6258" instrument_node="">A solar-driven device that produces fresh water from atmosphere was presented and tested [</span><a class="workspace-trigger" data-dcnode-id="6256" href="#bib28" name="bbib28"><span data-dcnode-id="6257" instrument_node="">28</span></a><span data-dcnode-id="6255" instrument_node="">]. A new composite adsorbent that uses ultra-large pore crystalline material (MCM-41) as host matrix and CaCl</span><sub data-dcnode-id="6253"><span data-dcnode-id="6254" instrument_node="">2</span></sub><span data-dcnode-id="6252" instrument_node=""> as a hygroscopic salt was used. A solar driven water harvesting prototype was built, the effective solar collector area was 0.16&nbsp;m</span><sup data-dcnode-id="6250"><span data-dcnode-id="6251" instrument_node="">2</span></sup><span data-dcnode-id="6249" instrument_node=""> and the mass of dry adsorbent was 0.4&nbsp;kg. Test results show that </span><em data-dcnode-id="6247"><span data-dcnode-id="6248" instrument_node="">DWHR</span></em><span data-dcnode-id="6246" instrument_node=""> were 0.201&nbsp;kg, 0.223&nbsp;kg and 0.214&nbsp;kg in March, August and October, respectively. </span><em data-dcnode-id="6244"><span data-dcnode-id="6245" instrument_node="">DWHR</span></em><sub data-dcnode-id="6241"><em data-dcnode-id="6242"><span data-dcnode-id="6243" instrument_node="">ua</span></em></sub><span data-dcnode-id="6240" instrument_node=""> and </span><em data-dcnode-id="6238"><span data-dcnode-id="6239" instrument_node="">DWHR</span></em><sub data-dcnode-id="6235"><em data-dcnode-id="6236"><span data-dcnode-id="6237" instrument_node="">um</span></em></sub><span data-dcnode-id="6234" instrument_node=""> can be calculated and are higher than 1.2&nbsp;kg·day</span><sup data-dcnode-id="6232"><span data-dcnode-id="6233" instrument_node="">−1</span></sup><span data-dcnode-id="6231" instrument_node="">&nbsp;m</span><sup data-dcnode-id="6229"><span data-dcnode-id="6230" instrument_node="">−2</span></sup><span data-dcnode-id="6228" instrument_node=""> and 0.5&nbsp;kg·day</span><sup data-dcnode-id="6226"><span data-dcnode-id="6227" instrument_node="">−1</span></sup><span data-dcnode-id="6225" instrument_node="">&nbsp;kg</span><sup data-dcnode-id="6223"><span data-dcnode-id="6224" instrument_node="">−1,</span></sup><span data-dcnode-id="6222" instrument_node=""> respectively.</span></p><p data-dcnode-id="6213" id="p0200"><span data-dcnode-id="6220" instrument_node="">Wang et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="6218" href="#bib29" name="bbib29"><span data-dcnode-id="6219" instrument_node="">29</span></a><span data-dcnode-id="6217" instrument_node="">] developed novel compound desiccant materials suitable for atmospheric water harvesting. Eight sorbents composite made from four matrixes and two salt solutions were studied and compared. Adsorption properties of these materials were tested. The test results show that ACF with LiCl had the best water uptake performance. The largest desorption quantity of ACF with LiCl, which was 0.65&nbsp;g&nbsp;g</span><sup data-dcnode-id="6215"><span data-dcnode-id="6216" instrument_node="">−1</span></sup><span data-dcnode-id="6214" instrument_node="">, was obtained at 77&nbsp;°C and 20% RH. A corrugated structure design of ACF-LiCl was proposed, which can be put layer by layer to fill in the sorbent bed, and air goes through the channels to complete the whole process of sorption and desorption cycles.</span></p><p data-dcnode-id="6187" id="p0205"><span data-dcnode-id="6212" instrument_node="">A high-efficient semi-open system using novel consolidated composite sorbent for fresh water harvesting was tested [</span><a class="workspace-trigger" data-dcnode-id="6210" href="#bib30" name="bbib30"><span data-dcnode-id="6211" instrument_node="">30</span></a><span data-dcnode-id="6209" instrument_node="">]. For the semi-open system, air for desorption circulates in the system, while air for sorption is dissipated after passing through the adsorbent. A novel material of ACF matrix combined with LiCl was adopted. For the consolidated ACF matrix, nano-silica grains are agglomerated in pure ACF fibers gap. The ACF has the advantages of a strong support frame to avoid distortion, huge surface area and optimal thermal transfer capability [</span><a class="workspace-trigger" data-dcnode-id="6207" href="#bib30" name="bbib30"><span data-dcnode-id="6208" instrument_node="">30</span></a><span data-dcnode-id="6206" instrument_node="">]. The sorption bed was fabricated by putting flat sorbent plates and corrugated sorbent plates layer by layer vertically and the void spaces are air flow channels. 40.8&nbsp;kg consolidating sorbents can be packed in a 0.4&nbsp;×&nbsp;0.4&nbsp;×&nbsp;0.6&nbsp;m sorption bed. CFX simulation results show that this sorption bed has low pressure resistance and relative uniform velocity distribution. Higher inlet relative humidity during sorption period and higher desorption temperature leads to larger desorption rate and water harvesting rate. The test results show that 14.7&nbsp;kg of fresh water can be collected during the test period (5.5&nbsp;h sorption period and 5&nbsp;h desorption period) with 40.8&nbsp;kg of consolidating sorbents when sorption condition was 25&nbsp;°C and 85% RH and desorption temperature was 77&nbsp;°C. Based on the data, </span><em data-dcnode-id="6204"><span data-dcnode-id="6205" instrument_node="">DWHR</span></em><span data-dcnode-id="6203" instrument_node=""> is 14.7&nbsp;kg·day</span><sup data-dcnode-id="6201"><span data-dcnode-id="6202" instrument_node="">−1</span></sup><span data-dcnode-id="6200" instrument_node="">, and </span><em data-dcnode-id="6198"><span data-dcnode-id="6199" instrument_node="">DWHR</span></em><sub data-dcnode-id="6195"><em data-dcnode-id="6196"><span data-dcnode-id="6197" instrument_node="">um</span></em></sub><span data-dcnode-id="6194" instrument_node=""> is calculated as 0.36&nbsp;kg·day</span><sup data-dcnode-id="6192"><span data-dcnode-id="6193" instrument_node="">−1</span></sup><span data-dcnode-id="6191" instrument_node="">&nbsp;kg</span><sup data-dcnode-id="6189"><span data-dcnode-id="6190" instrument_node="">−1</span></sup><span data-dcnode-id="6188" instrument_node="">&nbsp;at 77&nbsp;°C.</span></p><p data-dcnode-id="6113" id="p0210"><span data-dcnode-id="6186" instrument_node="">The performance of the semi-open system was compared with an open system, where air for desorption was dissipated after being condensed [</span><a class="workspace-trigger" data-dcnode-id="6184" href="#bib31" name="bbib31"><span data-dcnode-id="6185" instrument_node="">31</span></a><span data-dcnode-id="6183" instrument_node="">]. For the open system, ACF matrix combined with CaCl</span><sub data-dcnode-id="6181"><span data-dcnode-id="6182" instrument_node="">2</span></sub><span data-dcnode-id="6180" instrument_node=""> was adopted, mass of which was 2.25&nbsp;kg, while for the semi-open cycle, ACF matrix combined with LiCl was adopted, mass of which was 40.8&nbsp;kg. For the open system, sorption bed was fabricated by rolling the desiccant plate in a multi-layer tube shape, while sorption bed of the semi-open system is the same with the one in the study of Wang et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="6178" href="#bib30" name="bbib30"><span data-dcnode-id="6179" instrument_node="">30</span></a><span data-dcnode-id="6177" instrument_node="">]. Both systems are driven by solar energy. Solar collector area for the open system is 0.77&nbsp;m</span><sup data-dcnode-id="6175"><span data-dcnode-id="6176" instrument_node="">2</span></sup><span data-dcnode-id="6174" instrument_node=""> while that for the semi-open system is 4&nbsp;m</span><sup data-dcnode-id="6172"><span data-dcnode-id="6173" instrument_node="">2</span></sup><span data-dcnode-id="6171" instrument_node="">. For the semi-open system, circulating air during desorption process was heated in a set of tube solar heaters with air flow rate of 64&nbsp;m</span><sup data-dcnode-id="6169"><span data-dcnode-id="6170" instrument_node="">3</span></sup><span data-dcnode-id="6168" instrument_node="">&nbsp;h</span><sup data-dcnode-id="6166"><span data-dcnode-id="6167" instrument_node="">−1</span></sup><span data-dcnode-id="6165" instrument_node=""> in the solar collector and velocity of around 0.17&nbsp;m&nbsp;s</span><sup data-dcnode-id="6163"><span data-dcnode-id="6164" instrument_node="">−1</span></sup><span data-dcnode-id="6162" instrument_node=""> in the bed. Test results of the two systems showed that 0.32&nbsp;kg of water was collected for the open system in a sorption-desorption cycle. </span><em data-dcnode-id="6160"><span data-dcnode-id="6161" instrument_node="">DWHR</span></em><sub data-dcnode-id="6157"><em data-dcnode-id="6158"><span data-dcnode-id="6159" instrument_node="">ua</span></em></sub><span data-dcnode-id="6156" instrument_node=""> and </span><em data-dcnode-id="6154"><span data-dcnode-id="6155" instrument_node="">DWHR</span></em><sub data-dcnode-id="6151"><em data-dcnode-id="6152"><span data-dcnode-id="6153" instrument_node="">um</span></em></sub><span data-dcnode-id="6150" instrument_node=""> of the open system can be calculated as 0.42&nbsp;kg·day</span><sup data-dcnode-id="6148"><span data-dcnode-id="6149" instrument_node="">−1</span></sup><span data-dcnode-id="6147" instrument_node="">&nbsp;m</span><sup data-dcnode-id="6145"><span data-dcnode-id="6146" instrument_node="">−2</span></sup><span data-dcnode-id="6144" instrument_node=""> and 0.14&nbsp;kg·day</span><sup data-dcnode-id="6142"><span data-dcnode-id="6143" instrument_node="">−1</span></sup><span data-dcnode-id="6141" instrument_node="">&nbsp;kg</span><sup data-dcnode-id="6139"><span data-dcnode-id="6140" instrument_node="">−1</span></sup><span data-dcnode-id="6138" instrument_node="">, respectively. 9&nbsp;kg of water was collected by the semi-open system. </span><em data-dcnode-id="6136"><span data-dcnode-id="6137" instrument_node="">DWHR</span></em><sub data-dcnode-id="6133"><em data-dcnode-id="6134"><span data-dcnode-id="6135" instrument_node="">ua</span></em></sub><span data-dcnode-id="6132" instrument_node=""> and </span><em data-dcnode-id="6130"><span data-dcnode-id="6131" instrument_node="">DWHR</span></em><sub data-dcnode-id="6127"><em data-dcnode-id="6128"><span data-dcnode-id="6129" instrument_node="">um</span></em></sub><span data-dcnode-id="6126" instrument_node=""> of the semi-open system can be calculated as 2.25&nbsp;kg·day</span><sup data-dcnode-id="6124"><span data-dcnode-id="6125" instrument_node="">−1</span></sup><span data-dcnode-id="6123" instrument_node="">&nbsp;m</span><sup data-dcnode-id="6121"><span data-dcnode-id="6122" instrument_node="">−2</span></sup><span data-dcnode-id="6120" instrument_node=""> and 0.22&nbsp;kg·day</span><sup data-dcnode-id="6118"><span data-dcnode-id="6119" instrument_node="">−1</span></sup><span data-dcnode-id="6117" instrument_node="">&nbsp;kg</span><sup data-dcnode-id="6115"><span data-dcnode-id="6116" instrument_node="">−1</span></sup><span data-dcnode-id="6114" instrument_node="">, respectively. The improved performance of the semi-open system is contributed to more adsorbent, larger solar collector area, more efficient corrugated and flat sorption bed configuration and less uncondensed water vapor in the air because of the circulation air flow.</span></p><p data-dcnode-id="6057" id="p0215"><span data-dcnode-id="6112" instrument_node="">Kabeel [</span><a class="workspace-trigger" data-dcnode-id="6110" href="#bib32" name="bbib32"><span data-dcnode-id="6111" instrument_node="">32</span></a><span data-dcnode-id="6109" instrument_node="">], William et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="6107" href="#bib33" name="bbib33"><span data-dcnode-id="6108" instrument_node="">33</span></a><span data-dcnode-id="6106" instrument_node="">] and Mohamed et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="6104" href="#bib34" name="bbib34"><span data-dcnode-id="6105" instrument_node="">34</span></a><span data-dcnode-id="6103" instrument_node="">] tested a multi-shelves system in the shape of pyramid. Four faces of the pyramid are made of glass, allowing sunlight to pass through to evaporate the vapor adsorbed at night. In the study of Kabeel [</span><a class="workspace-trigger" data-dcnode-id="6101" href="#bib32" name="bbib32"><span data-dcnode-id="6102" instrument_node="">32</span></a><span data-dcnode-id="6100" instrument_node="">], two adsorbent materials were used, namely saw wood saturated with 30% CaCl</span><sub data-dcnode-id="6098"><span data-dcnode-id="6099" instrument_node="">2</span></sub><span data-dcnode-id="6097" instrument_node=""> solution and black cloth saturated with 30% CaCl</span><sub data-dcnode-id="6095"><span data-dcnode-id="6096" instrument_node="">2</span></sub><span data-dcnode-id="6094" instrument_node=""> solution. Tests were performed in three typical days in June, when ambient temperature were in the range of 28–30&nbsp;°C and solar radiation was in the range of 300–900&nbsp;W&nbsp;m</span><sup data-dcnode-id="6092"><span data-dcnode-id="6093" instrument_node="">−2</span></sup><span data-dcnode-id="6091" instrument_node=""> from 10 a.m. to 7 p.m. Test results show that from 10 a.m. to 7 p.m., </span><em data-dcnode-id="6089"><span data-dcnode-id="6090" instrument_node="">WHR</span></em><span data-dcnode-id="6088" instrument_node=""> increased from around 0.15&nbsp;kg&nbsp;h</span><sup data-dcnode-id="6086"><span data-dcnode-id="6087" instrument_node="">−1</span></sup><span data-dcnode-id="6085" instrument_node=""> at 10 a.m. to around 0.4&nbsp;kg&nbsp;h</span><sup data-dcnode-id="6083"><span data-dcnode-id="6084" instrument_node="">−1</span></sup><span data-dcnode-id="6082" instrument_node=""> at 2 p.m. and then reduced to around 0.07&nbsp;kg&nbsp;h</span><sup data-dcnode-id="6080"><span data-dcnode-id="6081" instrument_node="">−1</span></sup><span data-dcnode-id="6079" instrument_node=""> at 7 p.m. for black cloth bed. The performance of the saw wood bed was lower than the black cloth bed. </span><em data-dcnode-id="6077"><span data-dcnode-id="6078" instrument_node="">DWHR</span></em><sub data-dcnode-id="6074"><em data-dcnode-id="6075"><span data-dcnode-id="6076" instrument_node="">ua</span></em></sub><span data-dcnode-id="6073" instrument_node=""> reached about 2.5&nbsp;kg·day</span><sup data-dcnode-id="6071"><span data-dcnode-id="6072" instrument_node="">−1</span></sup><span data-dcnode-id="6070" instrument_node="">&nbsp;m</span><sup data-dcnode-id="6068"><span data-dcnode-id="6069" instrument_node="">−2</span></sup><span data-dcnode-id="6067" instrument_node="">. Solar collector in this system has the glass cover. Based on the geometric dimensions, the glass covered area was 3.5&nbsp;m</span><sup data-dcnode-id="6065"><span data-dcnode-id="6066" instrument_node="">2</span></sup><span data-dcnode-id="6064" instrument_node="">. Therefore, </span><em data-dcnode-id="6062"><span data-dcnode-id="6063" instrument_node="">DWHR</span></em><span data-dcnode-id="6061" instrument_node=""> can be calculated as 8.8&nbsp;kg·day</span><sup data-dcnode-id="6059"><span data-dcnode-id="6060" instrument_node="">−1</span></sup><span data-dcnode-id="6058" instrument_node="">.</span></p><p data-dcnode-id="6010" id="p0220"><span data-dcnode-id="6056" instrument_node="">In the study by William et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="6054" href="#bib33" name="bbib33"><span data-dcnode-id="6055" instrument_node="">33</span></a><span data-dcnode-id="6053" instrument_node="">], a system with similar configurations with the one proposed by Kabeel [</span><a class="workspace-trigger" data-dcnode-id="6051" href="#bib32" name="bbib32"><span data-dcnode-id="6052" instrument_node="">32</span></a><span data-dcnode-id="6050" instrument_node="">] was tested. In the system, saw wood was changed to yellow sand. The solar adsorption bed was designed to maximize bed surface area. Tests were performed in Cairo, Egypt. The results show that in case of natural adsorption process, </span><em data-dcnode-id="6048"><span data-dcnode-id="6049" instrument_node="">DWHR</span></em><sub data-dcnode-id="6045"><em data-dcnode-id="6046"><span data-dcnode-id="6047" instrument_node="">ua</span></em></sub><span data-dcnode-id="6044" instrument_node=""> at a typical day in June, July, Aug. and Sep. were 0.91, 0.71, 0.84 and 0.87&nbsp;kg&nbsp;m</span><sup data-dcnode-id="6042"><span data-dcnode-id="6043" instrument_node="">−2</span></sup><span data-dcnode-id="6041" instrument_node="">·day</span><sup data-dcnode-id="6039"><span data-dcnode-id="6040" instrument_node="">−1</span></sup><span data-dcnode-id="6038" instrument_node="">, respectively, for cloth beds, while that for sand beds on the test day in Sep. was 0.31&nbsp;kg&nbsp;m</span><sup data-dcnode-id="6036"><span data-dcnode-id="6037" instrument_node="">−2</span></sup><span data-dcnode-id="6035" instrument_node="">·day</span><sup data-dcnode-id="6033"><span data-dcnode-id="6034" instrument_node="">−1</span></sup><span data-dcnode-id="6032" instrument_node="">. In case of humid weather conditions at night on the 3rd day of Sep. for cloth beds, </span><em data-dcnode-id="6030"><span data-dcnode-id="6031" instrument_node="">DWHR</span></em><sub data-dcnode-id="6027"><em data-dcnode-id="6028"><span data-dcnode-id="6029" instrument_node="">ua</span></em></sub><span data-dcnode-id="6026" instrument_node=""> reached to 1.2&nbsp;kg&nbsp;m</span><sup data-dcnode-id="6024"><span data-dcnode-id="6025" instrument_node="">−2</span></sup><span data-dcnode-id="6023" instrument_node="">·day</span><sup data-dcnode-id="6021"><span data-dcnode-id="6022" instrument_node="">−1</span></sup><span data-dcnode-id="6020" instrument_node="">. Glass area can be calculated as 4.45&nbsp;m</span><sup data-dcnode-id="6018"><span data-dcnode-id="6019" instrument_node="">2</span></sup><span data-dcnode-id="6017" instrument_node=""> based on the geometry dimension and configuration. Then the </span><em data-dcnode-id="6015"><span data-dcnode-id="6016" instrument_node="">DWHR</span></em><span data-dcnode-id="6014" instrument_node=""> for cloth beds under humid conditions can be 5.34&nbsp;kg·day</span><sup data-dcnode-id="6012"><span data-dcnode-id="6013" instrument_node="">−1</span></sup><span data-dcnode-id="6011" instrument_node="">.</span></p><p data-dcnode-id="5960" id="p0225"><span data-dcnode-id="6009" instrument_node="">In the study of Mohamed et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="6007" href="#bib34" name="bbib34"><span data-dcnode-id="6008" instrument_node="">34</span></a><span data-dcnode-id="6006" instrument_node="">] and Kumar et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="6004" href="#bib35" name="bbib35"><span data-dcnode-id="6005" instrument_node="">35</span></a><span data-dcnode-id="6003" instrument_node="">], a similar device using solar glass desiccant boxes, which was placed on top, was investigated. Mohamed et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="6001" href="#bib34" name="bbib34"><span data-dcnode-id="6002" instrument_node="">34</span></a><span data-dcnode-id="6000" instrument_node="">] analyzed the system using simulation technology. The bottom of the box was 1&nbsp;×&nbsp;1&nbsp;m filled with desiccant material, and the glass area was 1&nbsp;m</span><sup data-dcnode-id="5998"><span data-dcnode-id="5999" instrument_node="">2</span></sup><span data-dcnode-id="5997" instrument_node="">. Cloth beds with CaCl</span><sub data-dcnode-id="5995"><span data-dcnode-id="5996" instrument_node="">2</span></sub><span data-dcnode-id="5994" instrument_node=""> solution and sand beds with CaCl</span><sub data-dcnode-id="5992"><span data-dcnode-id="5993" instrument_node="">2</span></sub><span data-dcnode-id="5991" instrument_node=""> solution were studied. The simulation results show that the system regeneration characteristic in summer was better than spring due to higher ambient temperature and solar radiation intensity. Lower initial solution concentration leads to higher water productivity and higher initial solution mass is beneficial for higher water productivity. When initial concentration solution is 30%, the </span><em data-dcnode-id="5989"><span data-dcnode-id="5990" instrument_node="">DWHR</span></em><sub data-dcnode-id="5986"><em data-dcnode-id="5987"><span data-dcnode-id="5988" instrument_node="">ua</span></em></sub><span data-dcnode-id="5985" instrument_node=""> of higher solution mass (12&nbsp;kg&nbsp;m</span><sup data-dcnode-id="5983"><span data-dcnode-id="5984" instrument_node="">−2</span></sup><span data-dcnode-id="5982" instrument_node="">) is 3.75&nbsp;kg&nbsp;m</span><sup data-dcnode-id="5980"><span data-dcnode-id="5981" instrument_node="">−2</span></sup><span data-dcnode-id="5979" instrument_node="">·day</span><sup data-dcnode-id="5977"><span data-dcnode-id="5978" instrument_node="">−1</span></sup><span data-dcnode-id="5976" instrument_node="">, which is increased by 25% from the low initial solution mass (6&nbsp;kg&nbsp;m</span><sup data-dcnode-id="5974"><span data-dcnode-id="5975" instrument_node="">−2</span></sup><span data-dcnode-id="5973" instrument_node="">) case. Cloth bed regeneration characteristic is better than sand bed due to lower specific heat capacity, which leads to higher temperature during desorption process. With the best combination, </span><em data-dcnode-id="5971"><span data-dcnode-id="5972" instrument_node="">DWHR</span></em><sub data-dcnode-id="5968"><em data-dcnode-id="5969"><span data-dcnode-id="5970" instrument_node="">ua</span></em></sub><span data-dcnode-id="5967" instrument_node=""> in summer and spring are 3.2 and 3.03&nbsp;kg&nbsp;m</span><sup data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node="">−2</span></sup><span data-dcnode-id="5964" instrument_node="">·day</span><sup data-dcnode-id="5962"><span data-dcnode-id="5963" instrument_node="">−1</span></sup><span data-dcnode-id="5961" instrument_node="">, respectively, in Alexandria, Egypt.</span></p><p data-dcnode-id="5892" id="p0230"><span data-dcnode-id="5959" instrument_node="">Kumar et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="5957" href="#bib35" name="bbib35"><span data-dcnode-id="5958" instrument_node="">35</span></a><span data-dcnode-id="5956" instrument_node="">] tested a solar powered device using composite desiccant material made of CaCl</span><sub data-dcnode-id="5954"><span data-dcnode-id="5955" instrument_node="">2</span></sub><span data-dcnode-id="5953" instrument_node=""> and saw wood under Indian climatic condition in October. Glass was placed on top and the area was 0.36&nbsp;m</span><sup data-dcnode-id="5951"><span data-dcnode-id="5952" instrument_node="">2</span></sup><span data-dcnode-id="5950" instrument_node="">. Six compound desiccant materials, which were prepared with 1&nbsp;kg saw wood and CaCl</span><sub data-dcnode-id="5948"><span data-dcnode-id="5949" instrument_node="">2</span></sub><span data-dcnode-id="5947" instrument_node=""> solutions of different concentration from 10% to 60%, were tested. When ambient temperature was between 20 and 35&nbsp;°C and solar radiation was from 300 to 900&nbsp;W&nbsp;m</span><sup data-dcnode-id="5945"><span data-dcnode-id="5946" instrument_node="">−2</span></sup><span data-dcnode-id="5944" instrument_node="">, </span><em data-dcnode-id="5942"><span data-dcnode-id="5943" instrument_node="">DWHR</span></em><sub data-dcnode-id="5939"><em data-dcnode-id="5940"><span data-dcnode-id="5941" instrument_node="">um</span></em></sub><span data-dcnode-id="5938" instrument_node=""> were 0.065, 0.07, 0.09, 0.11, 0.145 and 0.18&nbsp;kg·day</span><sup data-dcnode-id="5936"><span data-dcnode-id="5937" instrument_node="">−1</span></sup><span data-dcnode-id="5935" instrument_node="">&nbsp;kg</span><sup data-dcnode-id="5933"><span data-dcnode-id="5934" instrument_node="">−1</span></sup><span data-dcnode-id="5932" instrument_node="">, respectively, for the six compound materials. Maximum </span><em data-dcnode-id="5930"><span data-dcnode-id="5931" instrument_node="">DWHR</span></em><sub data-dcnode-id="5927"><em data-dcnode-id="5928"><span data-dcnode-id="5929" instrument_node="">um</span></em></sub><span data-dcnode-id="5926" instrument_node="">, which was 0.18&nbsp;kg·day</span><sup data-dcnode-id="5924"><span data-dcnode-id="5925" instrument_node="">−1</span></sup><span data-dcnode-id="5923" instrument_node="">&nbsp;kg</span><sup data-dcnode-id="5921"><span data-dcnode-id="5922" instrument_node="">−1</span></sup><span data-dcnode-id="5920" instrument_node="">, was from the sample that has 60% concentration of CaCl</span><sub data-dcnode-id="5918"><span data-dcnode-id="5919" instrument_node="">2</span></sub><span data-dcnode-id="5917" instrument_node="">. Weight of the saw wood-60% CaCl</span><sub data-dcnode-id="5915"><span data-dcnode-id="5916" instrument_node="">2</span></sub><span data-dcnode-id="5914" instrument_node=""> compound material was 2.8&nbsp;kg. Therefore, </span><em data-dcnode-id="5912"><span data-dcnode-id="5913" instrument_node="">DWHR</span></em><span data-dcnode-id="5911" instrument_node=""> can be calculated as 0.504&nbsp;kg·day</span><sup data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">−1</span></sup><span data-dcnode-id="5908" instrument_node="">. The solar collector area was 0.36&nbsp;m</span><sup data-dcnode-id="5906"><span data-dcnode-id="5907" instrument_node="">2</span></sup><span data-dcnode-id="5905" instrument_node=""> and </span><em data-dcnode-id="5903"><span data-dcnode-id="5904" instrument_node="">DWHR</span></em><sub data-dcnode-id="5900"><em data-dcnode-id="5901"><span data-dcnode-id="5902" instrument_node="">ua</span></em></sub><span data-dcnode-id="5899" instrument_node=""> can be calculated as 1.4&nbsp;kg&nbsp;m</span><sup data-dcnode-id="5897"><span data-dcnode-id="5898" instrument_node="">−2</span></sup><span data-dcnode-id="5896" instrument_node="">·day</span><sup data-dcnode-id="5894"><span data-dcnode-id="5895" instrument_node="">−1</span></sup><span data-dcnode-id="5893" instrument_node="">.</span></p><p data-dcnode-id="5863" id="p0235"><span data-dcnode-id="5891" instrument_node="">Srivastava et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="5889" href="#bib36" name="bbib36"><span data-dcnode-id="5890" instrument_node="">36</span></a><span data-dcnode-id="5888" instrument_node="">] tested systems with different compound materials. These compound materials are mixtures of 1.5&nbsp;kg sand and salt solution, namely LiCl, CaCl</span><sub data-dcnode-id="5886"><span data-dcnode-id="5887" instrument_node="">2</span></sub><span data-dcnode-id="5885" instrument_node=""> and LiBr, with 37% concentration. A reflector was used to concentrate the solar radiation at a fixed point to heat the material during desorption processes. The material was placed in a box with a dimension of 11&nbsp;×&nbsp;13&nbsp;×&nbsp;1&nbsp;cm, which was laid in front of the reflector as the receiver. The top of the box was made of glass. Tests were carried out from late Nov. to early Dec. in Kurukshetra, Haryana, India. Absorption process started at night, when ambient humidity ratio was from 8 to 12&nbsp;g&nbsp;kg</span><sup data-dcnode-id="5883"><span data-dcnode-id="5884" instrument_node="">−1</span></sup><span data-dcnode-id="5882" instrument_node="">. Desorption process started at 9 a.m. During desorption process, solar radiation was from 300 to 650&nbsp;W&nbsp;m</span><sup data-dcnode-id="5880"><span data-dcnode-id="5881" instrument_node="">−2</span></sup><span data-dcnode-id="5879" instrument_node="">, air velocity was mostly from 0.2 to 0.4&nbsp;m&nbsp;s</span><sup data-dcnode-id="5877"><span data-dcnode-id="5878" instrument_node="">−1</span></sup><span data-dcnode-id="5876" instrument_node="">, humidity ratio was from 7 to 14&nbsp;g&nbsp;kg</span><sup data-dcnode-id="5874"><span data-dcnode-id="5875" instrument_node="">−1</span></sup><span data-dcnode-id="5873" instrument_node="">, and bed temperature was increased to 140&nbsp;°C. The test results show that the maximum </span><em data-dcnode-id="5871"><span data-dcnode-id="5872" instrument_node="">DWHR</span></em><span data-dcnode-id="5870" instrument_node="">
