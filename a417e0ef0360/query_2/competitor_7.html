ode="">−1</span></sup><span data-dcnode-id="7693" instrument_node=""> when AFR was 3&nbsp;kg&nbsp;s</span><sup data-dcnode-id="7691"><span data-dcnode-id="7692" instrument_node="">−1</span></sup></td></tr><tr class="valign-top" data-dcnode-id="7663"><td class="align-left" data-dcnode-id="7684"><span data-dcnode-id="7688" instrument_node="">[</span><a class="workspace-trigger" data-dcnode-id="7686" href="#bib11" name="bbib11"><span data-dcnode-id="7687" instrument_node="">11</span></a><span data-dcnode-id="7685" instrument_node="">]</span></td><td class="align-left" data-dcnode-id="7676"><span data-dcnode-id="7683" instrument_node="">Rated input power and rated cooling capacity of the split air conditioner are 2.075&nbsp;kW and 4.747&nbsp;kW, respectively; AFR is 486&nbsp;m</span><sup data-dcnode-id="7681"><span data-dcnode-id="7682" instrument_node="">3</span></sup><span data-dcnode-id="7680" instrument_node="">&nbsp;h</span><sup data-dcnode-id="7678"><span data-dcnode-id="7679" instrument_node="">−1</span></sup><span data-dcnode-id="7677" instrument_node="">.</span></td><td class="align-left" data-dcnode-id="7674"><span data-dcnode-id="7675" instrument_node="">Summer in Dhahran, Saudi Arabia</span></td><td class="align-left" data-dcnode-id="7666"><span data-dcnode-id="7673" instrument_node="">25–50&nbsp;°C and 15–90% RH: </span><em data-dcnode-id="7671"><span data-dcnode-id="7672" instrument_node="">WHR</span></em><span data-dcnode-id="7670" instrument_node="">&nbsp;=&nbsp;1.44, 1.59, 2.92 and 2.48&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7668"><span data-dcnode-id="7669" instrument_node="">−1</span></sup><span data-dcnode-id="7667" instrument_node="">, respectively for June, July, August and September.</span></td><td class="align-left" data-dcnode-id="7664"><span data-dcnode-id="7665" instrument_node="">–</span></td></tr></tbody></table></div></div><figure class="figure text-xs" data-dcnode-id="7631" id="fig2"><span data-dcnode-id="7643"><img alt="Fig.&nbsp;2" aria-describedby="cap0015" data-dcnode-id="7658" height="334" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr2.jpg&amp;raw"><span data-dcnode-id="7657" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7644"><li data-dcnode-id="7651"><a class="anchor download-link u-font-sans" data-dcnode-id="7652" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr2_lrg.jpg" target="_blank" title="Download high-res image (166KB)"><span class="anchor-text" data-dcnode-id="7653"><span data-dcnode-id="7656" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7654"><span data-dcnode-id="7655" instrument_node="">Download high-res image (166KB)</span></span></span></a></li><li data-dcnode-id="7645"><a class="anchor download-link u-font-sans" data-dcnode-id="7646" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0360544220307374-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7647"><span data-dcnode-id="7650" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7648"><span data-dcnode-id="7649" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7632"><span data-dcnode-id="7633" id="cap0015"><p data-dcnode-id="7634" id="fspara0015"><span class="label" data-dcnode-id="7641"><span data-dcnode-id="7642" instrument_node="">Fig.&nbsp;2</span></span><span data-dcnode-id="7640" instrument_node="">. </span><span data-dcnode-id="7638" instrument_node="">Reported air flow rate and corresponding </span><em data-dcnode-id="7636"><span data-dcnode-id="7637" instrument_node="">WHR</span></em><span data-dcnode-id="7635" instrument_node=""> in literatures about condensation methods using VCC for water harvesting and air conditioning.</span></p></span></span></figure></div></section></section><section data-dcnode-id="6487" id="sec2.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7622" id="sectitle0050"><span data-dcnode-id="7627" instrument_node="">2.2</span><span data-dcnode-id="7625" instrument_node="">. </span><span data-dcnode-id="7623" instrument_node="">Condensation technologies using TEC</span></h3><p data-dcnode-id="7614" id="p0105"><span data-dcnode-id="7621" instrument_node="">As compared with VCC, TEC is powered by direct current, utilizing the Peltier effect to realize refrigeration effect at the cold end. The heat is dissipated from the hot end. Temperature of the semiconductor material ranges from&nbsp;−130 to 90&nbsp;°C [</span><a class="workspace-trigger" data-dcnode-id="7619" href="#bib12" name="bbib12"><span data-dcnode-id="7620" instrument_node="">12</span></a><span data-dcnode-id="7618" instrument_node="">], which is proper for harvesting water from air. Volume of semiconductor chips is small, which can effectively reduce sizes of water harvesting devices and make them more portable than the VCC systems. Zhang et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="7616" href="#bib12" name="bbib12"><span data-dcnode-id="7617" instrument_node="">12</span></a><span data-dcnode-id="7615" instrument_node="">] conducted a feasibility study on the TEC powered device for military use in remote areas, where solar radiation is rich, and water is scarce. Solar panel is adopted to generate electricity, which is stored in batteries to continuously power the TEC for water harvesting from air.</span></p><p data-dcnode-id="7570" id="p0110"><span data-dcnode-id="7613" instrument_node="">Cao et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="7611" href="#bib13" name="bbib13"><span data-dcnode-id="7612" instrument_node="">13</span></a><span data-dcnode-id="7610" instrument_node="">] made experimental and simulation study of the TEC processes. TEC1-12706 was selected for study, working temperature of which was from&nbsp;−50 to 80&nbsp;°C. The maximum current and voltage were 6 A and 15.2&nbsp;V, respectively. And the maximum cooling and heating capacities were 56.5&nbsp;W and 92.4&nbsp;W, respectively. 127 pairs of TEC chips were used in the prototype. Test results show that heat dissipating fans and a larger current helps to lower cooling temperatures in a shorter time. When current and voltage are 2.5 A and 7.5&nbsp;V, with the help of fans, cooling temperature can be reduced from 20.5&nbsp;°C to around 2&nbsp;°C in 5&nbsp;min. When current and voltage are 1.5 A and 5&nbsp;V, with the help of fans, cooling temperature can be reduced from 19.5&nbsp;°C to around 8&nbsp;°C in 5&nbsp;min. Under the test condition (25&nbsp;°C, 60% RH), </span><em data-dcnode-id="7608"><span data-dcnode-id="7609" instrument_node="">WHR</span></em><span data-dcnode-id="7607" instrument_node=""> of each chip was 7·10</span><sup data-dcnode-id="7605"><span data-dcnode-id="7606" instrument_node="">−3</span></sup><span data-dcnode-id="7604" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7602"><span data-dcnode-id="7603" instrument_node="">−1</span></sup><span data-dcnode-id="7601" instrument_node=""> when air velocity was 1&nbsp;m&nbsp;s</span><sup data-dcnode-id="7599"><span data-dcnode-id="7600" instrument_node="">−1</span></sup><span data-dcnode-id="7598" instrument_node=""> and air volume flow rate is 4.8&nbsp;m</span><sup data-dcnode-id="7596"><span data-dcnode-id="7597" instrument_node="">3</span></sup><span data-dcnode-id="7595" instrument_node="">&nbsp;h</span><sup data-dcnode-id="7593"><span data-dcnode-id="7594" instrument_node="">−1</span></sup><span data-dcnode-id="7592" instrument_node="">. Xu [</span><a class="workspace-trigger" data-dcnode-id="7590" href="#bib14" name="bbib14"><span data-dcnode-id="7591" instrument_node="">14</span></a><span data-dcnode-id="7589" instrument_node="">] also studied a TEC powered device through experiment. The results show that when current is 4 A and air state is 20&nbsp;°C and 80% RH, </span><em data-dcnode-id="7587"><span data-dcnode-id="7588" instrument_node="">WHR</span></em><span data-dcnode-id="7586" instrument_node=""> is increased from 48.7·10</span><sup data-dcnode-id="7584"><span data-dcnode-id="7585" instrument_node="">−3</span></sup><span data-dcnode-id="7583" instrument_node=""> to 64.5·10</span><sup data-dcnode-id="7581"><span data-dcnode-id="7582" instrument_node="">−3</span></sup><span data-dcnode-id="7580" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7578"><span data-dcnode-id="7579" instrument_node="">−1</span></sup><span data-dcnode-id="7577" instrument_node=""> as the air flow rate is increased from 0.09 to 0.33&nbsp;m</span><sup data-dcnode-id="7575"><span data-dcnode-id="7576" instrument_node="">3</span></sup><span data-dcnode-id="7574" instrument_node="">&nbsp;h</span><sup data-dcnode-id="7572"><span data-dcnode-id="7573" instrument_node="">−1</span></sup><span data-dcnode-id="7571" instrument_node="">.</span></p><p data-dcnode-id="7493" id="p0115"><span data-dcnode-id="7569" instrument_node="">Eslami et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="7567" href="#bib15" name="bbib15"><span data-dcnode-id="7568" instrument_node="">15</span></a><span data-dcnode-id="7566" instrument_node="">] studied performances of a TEC powered water harvesting unit through simulation. Numerical model includes heat transfer equations, which are based on logarithmic mean temperature difference method, between fins and air and the TEC power consumption equation, which is related to temperature difference between hot and cold ends. This model was validated using manufactural data and data from other studies. The optimum length of the channel and number of TECs were determined first, which were 1.386&nbsp;m and 18&nbsp;TECs placed in series, respectively. Under the optimal design, the results of optimal current and air MFR were calculated. Under the condition that air is 35&nbsp;°C, 75% RH and 11.7·10</span><sup data-dcnode-id="7564"><span data-dcnode-id="7565" instrument_node="">−3</span></sup><span data-dcnode-id="7563" instrument_node="">&nbsp;kg&nbsp;s</span><sup data-dcnode-id="7561"><span data-dcnode-id="7562" instrument_node="">−1</span></sup><span data-dcnode-id="7560" instrument_node="">&nbsp;MFR, Both </span><em data-dcnode-id="7558"><span data-dcnode-id="7559" instrument_node="">WHR</span></em><span data-dcnode-id="7557" instrument_node=""> and </span><em data-dcnode-id="7555"><span data-dcnode-id="7556" instrument_node="">UPC</span></em><span data-dcnode-id="7554" instrument_node=""> increase first and then decrease. The maximum </span><em data-dcnode-id="7552"><span data-dcnode-id="7553" instrument_node="">WHR</span></em><span data-dcnode-id="7551" instrument_node=""> can be calculated as 42·10</span><sup data-dcnode-id="7549"><span data-dcnode-id="7550" instrument_node="">−3</span></sup><span data-dcnode-id="7548" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7546"><span data-dcnode-id="7547" instrument_node="">−1</span></sup><span data-dcnode-id="7545" instrument_node=""> when current is 2.315 A. However, the maximum efficiency is 1.638·10</span><sup data-dcnode-id="7543"><span data-dcnode-id="7544" instrument_node="">−7</span></sup><span data-dcnode-id="7542" instrument_node="">&nbsp;L&nbsp;J</span><sup data-dcnode-id="7540"><span data-dcnode-id="7541" instrument_node="">−1</span></sup><span data-dcnode-id="7539" instrument_node="">, </span><em data-dcnode-id="7537"><span data-dcnode-id="7538" instrument_node="">UPC</span></em><span data-dcnode-id="7536" instrument_node=""> of which can be calculated as 1.69&nbsp;kWh·kg</span><sup data-dcnode-id="7534"><span data-dcnode-id="7535" instrument_node="">−1</span></sup><span data-dcnode-id="7533" instrument_node="">, when current is 1.349 A. When current is 1.349 A, air temperature is 35&nbsp;°C and air MFR is 11.7·10</span><sup data-dcnode-id="7531"><span data-dcnode-id="7532" instrument_node="">−3</span></sup><span data-dcnode-id="7530" instrument_node="">&nbsp;kg&nbsp;s</span><sup data-dcnode-id="7528"><span data-dcnode-id="7529" instrument_node="">−1</span></sup><span data-dcnode-id="7527" instrument_node="">, </span><em data-dcnode-id="7525"><span data-dcnode-id="7526" instrument_node="">WHR</span></em><span data-dcnode-id="7524" instrument_node=""> increases close to linearly from around 20·10</span><sup data-dcnode-id="7522"><span data-dcnode-id="7523" instrument_node="">−3</span></sup><span data-dcnode-id="7521" instrument_node=""> to 106·10</span><sup data-dcnode-id="7519"><span data-dcnode-id="7520" instrument_node="">−3</span></sup><span data-dcnode-id="7518" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7516"><span data-dcnode-id="7517" instrument_node="">−1</span></sup><span data-dcnode-id="7515" instrument_node=""> with the increase of relative humidity from 70% to 100%. The optimal air MFR with the lowest </span><em data-dcnode-id="7513"><span data-dcnode-id="7514" instrument_node="">UPC</span></em><span data-dcnode-id="7512" instrument_node=""> were given for different air temperature when relative humidity is fixed at 75%. When inlet temperature is 25&nbsp;°C, optimal air MFR and current is 0.0135&nbsp;kg&nbsp;s</span><sup data-dcnode-id="7510"><span data-dcnode-id="7511" instrument_node="">−1</span></sup><span data-dcnode-id="7509" instrument_node=""> and 1.606 A, and the minimum </span><em data-dcnode-id="7507"><span data-dcnode-id="7508" instrument_node="">UPC</span></em><span data-dcnode-id="7506" instrument_node=""> is 2.5&nbsp;kWh·kg</span><sup data-dcnode-id="7504"><span data-dcnode-id="7505" instrument_node="">−1</span></sup><span data-dcnode-id="7503" instrument_node="">. When inlet temperature is 40&nbsp;°C, optimal air MFR and current is 0.0105&nbsp;kg&nbsp;s</span><sup data-dcnode-id="7501"><span data-dcnode-id="7502" instrument_node="">−1</span></sup><span data-dcnode-id="7500" instrument_node=""> and 1.081 A, and the minimum </span><em data-dcnode-id="7498"><span data-dcnode-id="7499" instrument_node="">UPC</span></em><span data-dcnode-id="7497" instrument_node=""> is 1.22&nbsp;kWh·kg</span><sup data-dcnode-id="7495"><span data-dcnode-id="7496" instrument_node="">−1</span></sup><span data-dcnode-id="7494" instrument_node="">.</span></p><p data-dcnode-id="7404" id="p0120"><span data-dcnode-id="7492" instrument_node="">In the study of Jradi et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="7490" href="#bib16" name="bbib16"><span data-dcnode-id="7491" instrument_node="">16</span></a><span data-dcnode-id="7489" instrument_node="">], ambient air is humidified by a solar distiller, where the humidity ratio is increased, and then it is dehumidified by TEC cooling modules Solar radiation is used to provide evaporating heat, to heat the air during humidification process, and to generate electricity to power the TEC modules. Numerical model, which has been validated by experimental results, was used for system design to satisfy fresh water needs, which is at least 10&nbsp;L water in 10&nbsp;h operating period, under Lebanese humid climate. The model includes equations describing heat transfer between air and fins, which is based on the efficiency-number of transfer unit methods and a TEC power consumption equation similar to the one used in the study of Eslamia et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="7487" href="#bib15" name="bbib15"><span data-dcnode-id="7488" instrument_node="">15</span></a><span data-dcnode-id="7486" instrument_node="">]. The optimization results show that </span><em data-dcnode-id="7484"><span data-dcnode-id="7485" instrument_node="">WHR</span></em><span data-dcnode-id="7483" instrument_node=""> increased first and then decreased with the increasing of air MFR. The optimal air MFR for each channel with the highest </span><em data-dcnode-id="7481"><span data-dcnode-id="7482" instrument_node="">WHR</span></em><span data-dcnode-id="7480" instrument_node=""> is selected as 0.0155&nbsp;kg&nbsp;s</span><sup data-dcnode-id="7478"><span data-dcnode-id="7479" instrument_node="">−1</span></sup><span data-dcnode-id="7477" instrument_node="">. And optimal electric current input values for each module are 2.2 A for June, 2.1 A for July, and 2.0 A for August, September and October. Performance analysis showed that maximum amount of fresh water produced was attained between 3:00 p.m. and 6:00 p.m. for five months and the amount of fresh water produced ranged from about 14.09&nbsp;L day</span><sup data-dcnode-id="7475"><span data-dcnode-id="7476" instrument_node="">−1</span></sup><span data-dcnode-id="7474" instrument_node=""> (</span><em data-dcnode-id="7472"><span data-dcnode-id="7473" instrument_node="">WHR</span></em><span data-dcnode-id="7471" instrument_node="">&nbsp;=&nbsp;1.41&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7469"><span data-dcnode-id="7470" instrument_node="">−1</span></sup><span data-dcnode-id="7468" instrument_node=""> in the 10&nbsp;h operating period) in August to about 10.06&nbsp;L day</span><sup data-dcnode-id="7466"><span data-dcnode-id="7467" instrument_node="">−1</span></sup><span data-dcnode-id="7465" instrument_node=""> (</span><em data-dcnode-id="7463"><span data-dcnode-id="7464" instrument_node="">WHR</span></em><span data-dcnode-id="7462" instrument_node="">&nbsp;=&nbsp;1.01&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7460"><span data-dcnode-id="7461" instrument_node="">−1</span></sup><span data-dcnode-id="7459" instrument_node=""> in the 10&nbsp;h operating period) in October [</span><a class="workspace-trigger" data-dcnode-id="7457" href="#bib16" name="bbib16"><span data-dcnode-id="7458" instrument_node="">16</span></a><span data-dcnode-id="7456" instrument_node="">]. The increasement of condensate water due to the integration of the solar distiller in the process is from 7.75&nbsp;L·day</span><sup data-dcnode-id="7454"><span data-dcnode-id="7455" instrument_node="">−1</span></sup><span data-dcnode-id="7453" instrument_node=""> (</span><em data-dcnode-id="7451"><span data-dcnode-id="7452" instrument_node="">WHR</span></em><span data-dcnode-id="7450" instrument_node="">&nbsp;=&nbsp;0.78&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7448"><span data-dcnode-id="7449" instrument_node="">−1</span></sup><span data-dcnode-id="7447" instrument_node=""> in the 10&nbsp;h operation period) in October to 9.37&nbsp;L·day</span><sup data-dcnode-id="7445"><span data-dcnode-id="7446" instrument_node="">−1</span></sup><span data-dcnode-id="7444" instrument_node=""> (0.94&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7442"><span data-dcnode-id="7443" instrument_node="">−1</span></sup><span data-dcnode-id="7441" instrument_node=""> in the 10&nbsp;h operation period) in August [</span><a class="workspace-trigger" data-dcnode-id="7439" href="#bib16" name="bbib16"><span data-dcnode-id="7440" instrument_node="">16</span></a><span data-dcnode-id="7438" instrument_node="">]. The cooling capacity ranges from 7.02&nbsp;kWh·day</span><sup data-dcnode-id="7436"><span data-dcnode-id="7437" instrument_node="">−1</span></sup><span data-dcnode-id="7435" instrument_node=""> in August to 9.07&nbsp;kWh·day</span><sup data-dcnode-id="7433"><span data-dcnode-id="7434" instrument_node="">−1</span></sup><span data-dcnode-id="7432" instrument_node=""> in June. And energy consumption varies from 5.32&nbsp;kWh·day</span><sup data-dcnode-id="7430"><span data-dcnode-id="7431" instrument_node="">−1</span></sup><span data-dcnode-id="7429" instrument_node=""> in October to 6.73&nbsp;kWh·day</span><sup data-dcnode-id="7427"><span data-dcnode-id="7428" instrument_node="">−1</span></sup><span data-dcnode-id="7426" instrument_node=""> in June. Therefore, </span><em data-dcnode-id="7424"><span data-dcnode-id="7425" instrument_node="">UPC</span></em><span data-dcnode-id="7423" instrument_node=""> of the proposed integrated solar distiller with photovoltaic powered TEC channel system is from 0.58&nbsp;kWh·kg</span><sup data-dcnode-id="7421"><span data-dcnode-id="7422" instrument_node="">−1</span></sup><span data-dcnode-id="7420" instrument_node=""> in June to 0.39&nbsp;kWh·kg</span><sup data-dcnode-id="7418"><span data-dcnode-id="7419" instrument_node="">−1</span></sup><span data-dcnode-id="7417" instrument_node=""> in August. </span><em data-dcnode-id="7415"><span data-dcnode-id="7416" instrument_node="">UPC</span></em><span data-dcnode-id="7414" instrument_node=""> is much higher than the values reported in the study of Eslamia et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="7412" href="#bib15" name="bbib15"><span data-dcnode-id="7413" instrument_node="">15</span></a><span data-dcnode-id="7411" instrument_node="">]. This is mainly because inlet humidity ratio of [</span><a class="workspace-trigger" data-dcnode-id="7409" href="#bib16" name="bbib16"><span data-dcnode-id="7410" instrument_node="">16</span></a><span data-dcnode-id="7408" instrument_node="">] is higher than [</span><a class="workspace-trigger" data-dcnode-id="7406" href="#bib15" name="bbib15"><span data-dcnode-id="7407" instrument_node="">15</span></a><span data-dcnode-id="7405" instrument_node="">] because of the distiller.</span></p><p data-dcnode-id="7321" id="p0125"><span data-dcnode-id="7403" instrument_node="">In the study of Liu et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="7401" href="#bib17" name="bbib17"><span data-dcnode-id="7402" instrument_node="">17</span></a><span data-dcnode-id="7400" instrument_node="">], the size of the tested TECs water generator is 0.46&nbsp;m&nbsp;×&nbsp;0.14&nbsp;m&nbsp;×&nbsp;0.15&nbsp;m, and the weight was 7&nbsp;kg. Total area of fins of the cold side is 0.216&nbsp;m</span><sup data-dcnode-id="7398"><span data-dcnode-id="7399" instrument_node="">2</span></sup><span data-dcnode-id="7397" instrument_node="">. Input power source was controlled as 3.4 A, 15.4&nbsp;V throughout the experiments. Test results show that generated water and </span><em data-dcnode-id="7395"><span data-dcnode-id="7396" instrument_node="">WHR</span></em><span data-dcnode-id="7394" instrument_node=""> increases with the increase of inlet air relative humidity. When ambient temperature is in the range of 23.1&nbsp;°C–24.5&nbsp;°C and air MFR is 29.7&nbsp;m</span><sup data-dcnode-id="7392"><span data-dcnode-id="7393" instrument_node="">3</span></sup><span data-dcnode-id="7391" instrument_node="">&nbsp;h</span><sup data-dcnode-id="7389"><span data-dcnode-id="7390" instrument_node="">−1</span></sup><span data-dcnode-id="7388" instrument_node="">, </span><em data-dcnode-id="7386"><span data-dcnode-id="7387" instrument_node="">WHR</span></em><span data-dcnode-id="7385" instrument_node=""> increases from 11.2·10</span><sup data-dcnode-id="7383"><span data-dcnode-id="7384" instrument_node="">−3</span></sup><span data-dcnode-id="7382" instrument_node=""> to 25.1·10</span><sup data-dcnode-id="7380"><span data-dcnode-id="7381" instrument_node="">−3</span></sup><span data-dcnode-id="7379" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7377"><span data-dcnode-id="7378" instrument_node="">−1</span></sup><span data-dcnode-id="7376" instrument_node=""> and </span><em data-dcnode-id="7374"><span data-dcnode-id="7375" instrument_node="">UPC</span></em><span data-dcnode-id="7373" instrument_node=""> decreased from 5.21 (0.889&nbsp;kg&nbsp;m</span><sup data-dcnode-id="7371"><span data-dcnode-id="7372" instrument_node="">−2</span></sup><span data-dcnode-id="7370" instrument_node="">·kWh</span><sup data-dcnode-id="7368"><span data-dcnode-id="7369" instrument_node="">−1</span></sup><span data-dcnode-id="7367" instrument_node=""> in the paper) to 2.33&nbsp;kWh·kg</span><sup data-dcnode-id="7365"><span data-dcnode-id="7366" instrument_node="">−1</span></sup><span data-dcnode-id="7364" instrument_node=""> (1.993&nbsp;kg&nbsp;m</span><sup data-dcnode-id="7362"><span data-dcnode-id="7363" instrument_node="">−2</span></sup><span data-dcnode-id="7361" instrument_node="">·kWh</span><sup data-dcnode-id="7359"><span data-dcnode-id="7360" instrument_node="">−1</span></sup><span data-dcnode-id="7358" instrument_node=""> in the paper) when relative humidity is from 67.8% to 92.7%. When ambient temperature is in the range of 21.2&nbsp;°C–22.1&nbsp;°C and relative humidity is around 86.5%, </span><em data-dcnode-id="7356"><span data-dcnode-id="7357" instrument_node="">WHR</span></em><span data-dcnode-id="7355" instrument_node=""> increased from 18.2·10</span><sup data-dcnode-id="7353"><span data-dcnode-id="7354" instrument_node="">−3</span></sup><span data-dcnode-id="7352" instrument_node=""> to 20.6·10</span><sup data-dcnode-id="7350"><span data-dcnode-id="7351" instrument_node="">−3</span></sup><span data-dcnode-id="7349" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7347"><span data-dcnode-id="7348" instrument_node="">−1</span></sup><span data-dcnode-id="7346" instrument_node=""> and </span><em data-dcnode-id="7344"><span data-dcnode-id="7345" instrument_node="">UPC</span></em><span data-dcnode-id="7343" instrument_node=""> decreased from 3.21 (1.445&nbsp;kg&nbsp;m</span><sup data-dcnode-id="7341"><span data-dcnode-id="7342" instrument_node="">−2</span></sup><span data-dcnode-id="7340" instrument_node="">·kWh</span><sup data-dcnode-id="7338"><span data-dcnode-id="7339" instrument_node="">−1</span></sup><span data-dcnode-id="7337" instrument_node=""> in the paper) to 2.83&nbsp;kWh·kg</span><sup data-dcnode-id="7335"><span data-dcnode-id="7336" instrument_node="">−1</span></sup><span data-dcnode-id="7334" instrument_node=""> (1.636&nbsp;kg&nbsp;m</span><sup data-dcnode-id="7332"><span data-dcnode-id="7333" instrument_node="">−2</span></sup><span data-dcnode-id="7331" instrument_node="">·kWh</span><sup data-dcnode-id="7329"><span data-dcnode-id="7330" instrument_node="">−1</span></sup><span data-dcnode-id="7328" instrument_node=""> in the paper) when air MFR is from 29.7 to 70.6&nbsp;m</span><sup data-dcnode-id="7326"><span data-dcnode-id="7327" instrument_node="">3</span></sup><span data-dcnode-id="7325" instrument_node="">&nbsp;h</span><sup data-dcnode-id="7323"><span data-dcnode-id="7324" instrument_node="">−1</span></sup><span data-dcnode-id="7322" instrument_node="">.</span></p><p data-dcnode-id="7280" id="p0130"><span data-dcnode-id="7320" instrument_node="">Joshi et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="7318" href="#bib18" name="bbib18"><span data-dcnode-id="7319" instrument_node="">18</span></a><span data-dcnode-id="7317" instrument_node="">] experimentally investigated a portable fresh water generator, which consists of a 0.7&nbsp;m long cooling channel with cross section of 0.05&nbsp;m·0.045&nbsp;m along with ten serial connected thermoelectric modules of dimension 0.04&nbsp;m&nbsp;×&nbsp;0.04&nbsp;m. It is proposed in this paper an internal heat sink with the area of 0.2&nbsp;m</span><sup data-dcnode-id="7315"><span data-dcnode-id="7316" instrument_node="">2</span></sup><span data-dcnode-id="7314" instrument_node="">, which is put at the cold end to enhance heat transfer rate. Three variable direct current power sources, rated voltage and rated current of which are 30&nbsp;V and 2&nbsp;A, respectively, were used. During the test, ambient temperature was kept at 30&nbsp;°C, while current (0.5–1.5 A), MFR (1–26&nbsp;g&nbsp;s</span><sup data-dcnode-id="7312"><span data-dcnode-id="7313" instrument_node="">−1</span></sup><span data-dcnode-id="7311" instrument_node="">) and relative humidity (60–90%) were changing. It can be observed from the test results that </span><em data-dcnode-id="7309"><span data-dcnode-id="7310" instrument_node="">WHR</span></em><span data-dcnode-id="7308" instrument_node=""> is proportional to current, MFR and relative humidity. At the maximum of each parameter, which are 1.5 A, 26&nbsp;g&nbsp;s</span><sup data-dcnode-id="7306"><span data-dcnode-id="7307" instrument_node="">−1</span></sup><span data-dcnode-id="7305" instrument_node=""> (108&nbsp;m</span><sup data-dcnode-id="7303"><span data-dcnode-id="7304" instrument_node="">3</span></sup><span data-dcnode-id="7302" instrument_node="">&nbsp;h</span><sup data-dcnode-id="7300"><span data-dcnode-id="7301" instrument_node="">−1</span></sup><span data-dcnode-id="7299" instrument_node="">) and 90%, 240&nbsp;ml water was collected during the 10&nbsp;h test period. Therefore, the maximum </span><em data-dcnode-id="7297"><span data-dcnode-id="7298" instrument_node="">WHR</span></em><span data-dcnode-id="7296" instrument_node=""> for the system with internal heat sink is 24·10</span><sup data-dcnode-id="7294"><span data-dcnode-id="7295" instrument_node="">−3</span></sup><span data-dcnode-id="7293" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7291"><span data-dcnode-id="7292" instrument_node="">−1</span></sup><span data-dcnode-id="7290" instrument_node="">, while the maximum </span><em data-dcnode-id="7288"><span data-dcnode-id="7289" instrument_node="">WHR</span></em><span data-dcnode-id="7287" instrument_node=""> is 4.5·10</span><sup data-dcnode-id="7285"><span data-dcnode-id="7286" instrument_node="">−3</span></sup><span data-dcnode-id="7284" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7282"><span data-dcnode-id="7283" instrument_node="">−1</span></sup><span data-dcnode-id="7281" instrument_node=""> for the system without placing the internal heat sink on the cold surface.</span></p><p data-dcnode-id="7263" id="p0135"><span data-dcnode-id="7279" instrument_node="">Atta [</span><a class="workspace-trigger" data-dcnode-id="7277" href="#bib19" name="bbib19"><span data-dcnode-id="7278" instrument_node="">19</span></a><span data-dcnode-id="7276" instrument_node="">] proposed a solar power water condensation technology using TECs for irrigation purpose. The system reported in this study consists of one solar cell with a maximum output power of 120&nbsp;W, three 40&nbsp;W Peltier coolers connected in parallel, and a fan that is capable of producing airflow of 500 cfm (840&nbsp;m</span><sup data-dcnode-id="7274"><span data-dcnode-id="7275" instrument_node="">3</span></sup><span data-dcnode-id="7273" instrument_node="">&nbsp;h</span><sup data-dcnode-id="7271"><span data-dcnode-id="7272" instrument_node="">−1</span></sup><span data-dcnode-id="7270" instrument_node="">). For each Peltier cooler, the dimension is 4&nbsp;cm&nbsp;×&nbsp;4&nbsp;cm&nbsp;×&nbsp;0.8&nbsp;cm, maximum current is 3.6 A and maximum temperature difference between cold and hot ends is 87&nbsp;°C. Each heat sink is made of aluminum alloy and has a dimension of 15&nbsp;cm&nbsp;×&nbsp;15&nbsp;cm. The ambient air passes through the hot sink first to increase air temperature and to cool down the hot end. Then, it is pumped to the cold end to be cooled and dehumidified, where condensed water is collected. Test results show that, when applied in humid areas such as Yanbu, </span><em data-dcnode-id="7268"><span data-dcnode-id="7269" instrument_node="">WHR</span></em><span data-dcnode-id="7267" instrument_node=""> can be 1&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7265"><span data-dcnode-id="7266" instrument_node="">−1</span></sup><span data-dcnode-id="7264" instrument_node="">. However, it is not wise to introduce ambient air to the hot end first. The increase of air temperature will increase cooling capacity of the cold end as well as heating capacity at the hot end, which are bad influences on water condensation process.</span></p><p data-dcnode-id="7240" id="p0140"><span data-dcnode-id="7262" instrument_node="">Muñoz-García et&nbsp;al. [</span><a class="workspace-trigger" data-dcnode-id="7260" href="#bib20" name="bbib20"><span data-dcnode-id="7261" instrument_node="">20</span></a><span data-dcnode-id="7259" instrument_node="">] investigated such a system for irrigating young trees in dry climate area. A solar photovoltaic panel (rated power is 145&nbsp;W) and an accumulator (12&nbsp;V lead-acid battery with a capacity of 102 Ah) were used to produce and store electricity for continuous use. According to test results, it is recommended to be used during night from 5 a.m. to 8 a.m. to minimum energy consumption. When relative humidity is lower than 20%, this device cannot be used since temperature difference is over 20&nbsp;°C, which cannot be reached by this system. The test results show that, when the temperature difference was 15&nbsp;°C, the required power was approximately 60&nbsp;W (60&nbsp;Wh of energy in 1&nbsp;h) and the corresponding water volume collected in 1&nbsp;h ranged from 2 to 4&nbsp;mL, depending on ambient temperature and humidity ratio during the night. Based on data reported in this paper, it can be calculated that </span><em data-dcnode-id="7257"><span data-dcnode-id="7258" instrument_node="">WHR</span></em><span data-dcnode-id="7256" instrument_node=""> is from 2·10</span><sup data-dcnode-id="7254"><span data-dcnode-id="7255" instrument_node="">−3</span></sup><span data-dcnode-id="7253" instrument_node=""> to 4·10</span><sup data-dcnode-id="7251"><span data-dcnode-id="7252" instrument_node="">−3</span></sup><span data-dcnode-id="7250" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7248"><span data-dcnode-id="7249" instrument_node="">−1</span></sup><span data-dcnode-id="7247" instrument_node=""> and </span><em data-dcnode-id="7245"><span data-dcnode-id="7246" instrument_node="">UPC</span></em><span data-dcnode-id="7244" instrument_node=""> is from 30.3 to 14.9&nbsp;kWh·kg</span><sup data-dcnode-id="7242"><span data-dcnode-id="7243" instrument_node="">−1</span></sup><span data-dcnode-id="7241" instrument_node="">.</span></p><p data-dcnode-id="7193" id="p0145"><span data-dcnode-id="7239" instrument_node="">Pontious [</span><a class="workspace-trigger" data-dcnode-id="7237" href="#bib21" name="bbib21"><span data-dcnode-id="7238" instrument_node="">21</span></a><span data-dcnode-id="7236" instrument_node="">] experimentally compared water harvesting performances of TEC technology and heat exchanger technology that exchange heat with low temperature underground. Test results show that, when ambient condition is 26.4&nbsp;°C, 69.6% RH and air flow rate is 31.7&nbsp;m</span><sup data-dcnode-id="7234"><span data-dcnode-id="7235" instrument_node="">3</span></sup><span data-dcnode-id="7233" instrument_node="">&nbsp;h</span><sup data-dcnode-id="7231"><span data-dcnode-id="7232" instrument_node="">−1</span></sup><span data-dcnode-id="7230" instrument_node="">, 10.2&nbsp;ml water can be collected in 2&nbsp;h of the TEC technology. When ambient condition is 23.1&nbsp;°C, 89.4% RH and air flow rate is 31.7&nbsp;m</span><sup data-dcnode-id="7228"><span data-dcnode-id="7229" instrument_node="">3</span></sup><span data-dcnode-id="7227" instrument_node="">&nbsp;h</span><sup data-dcnode-id="7225"><span data-dcnode-id="7226" instrument_node="">−1</span></sup><span data-dcnode-id="7224" instrument_node="">, 82.4&nbsp;ml water can be collected in 2&nbsp;h of the heat exchanger technology. It is reported in this paper that for the TEC technology, 0.21&nbsp;kg water can be obtained each day and </span><em data-dcnode-id="7222"><span data-dcnode-id="7223" instrument_node="">WHR</span></em><span data-dcnode-id="7221" instrument_node=""> is calculated as 8.75·10</span><sup data-dcnode-id="7219"><span data-dcnode-id="7220" instrument_node="">−3</span></sup><span data-dcnode-id="7218" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7216"><span data-dcnode-id="7217" instrument_node="">−1</span></sup><span data-dcnode-id="7215" instrument_node="">. Daily power consumption is 0.33&nbsp;kWh. Therefore, </span><em data-dcnode-id="7213"><span data-dcnode-id="7214" instrument_node="">UPC</span></em><span data-dcnode-id="7212" instrument_node=""> of TEC technology is calculated as 1.56&nbsp;kWh·kg</span><sup data-dcnode-id="7210"><span data-dcnode-id="7211" instrument_node="">−1</span></sup><span data-dcnode-id="7209" instrument_node="">. For the heat exchanger technology, 0.75&nbsp;kg water can be obtained each day and </span><em data-dcnode-id="7207"><span data-dcnode-id="7208" instrument_node="">WHR</span></em><span data-dcnode-id="7206" instrument_node=""> is calculated as 31.25·10</span><sup data-dcnode-id="7204"><span data-dcnode-id="7205" instrument_node="">−3</span></sup><span data-dcnode-id="7203" instrument_node="">&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7201"><span data-dcnode-id="7202" instrument_node="">−1</span></sup><span data-dcnode-id="7200" instrument_node="">. Daily power consumption is 0.6&nbsp;kWh. Therefore, </span><em data-dcnode-id="7198"><span data-dcnode-id="7199" instrument_node="">UPC</span></em><span data-dcnode-id="7197" instrument_node=""> of heat exchanger technology is 1.25&nbsp;kg·kWh</span><sup data-dcnode-id="7195"><span data-dcnode-id="7196" instrument_node="">−1</span></sup><span data-dcnode-id="7194" instrument_node="">.</span></p><div data-dcnode-id="6488"><p data-dcnode-id="7170" id="p0150"><span data-dcnode-id="7192" instrument_node="">Main information of system configurations and performances of the related papers are summarized in </span><a class="workspace-trigger" data-dcnode-id="7190" href="#tbl3" name="btbl3"><span data-dcnode-id="7191" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="7189" instrument_node="">. For the reviewed studies, </span><em data-dcnode-id="7187"><span data-dcnode-id="7188" instrument_node="">WHR</span></em><span data-dcnode-id="7186" instrument_node=""> of condensation technology using TEC is smaller than 1.41&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7184"><span data-dcnode-id="7185" instrument_node="">−1</span></sup><span data-dcnode-id="7183" instrument_node=""> with the average value of 0.26&nbsp;kg&nbsp;h</span><sup data-dcnode-id="7181"><span data-dcnode-id="7182" instrument_node="">−1</span></sup><span data-dcnode-id="7180" instrument_node="">. And </span><em data-dcnode-id="7178"><span data-dcnode-id="7179" instrument_node="">UPC</span></em><span data-dcnode-id="7177" instrument_node=""> of it is in the range of 0.39–5.21&nbsp;kWh·kg</span><sup data-dcnode-id="7175"><span data-dcnode-id="7176" instrument_node="">−1</span></sup><span data-dcnode-id="7174" instrument_node=""> with the average value of 2.20&nbsp;kWh·kg</span><sup data-dcnode-id="7172"><span data-dcnode-id="7173" instrument_node="">−1</span></sup><span data-dcnode-id="7171" instrument_node="">.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="6489" id="tbl3"><span class="captions" data-dcnode-id="7135"><span data-dcnode-id="7136" id="cap0055"><p data-dcnode-id="7137" id="tspara0020"><span class="label" data-dcnode-id="7168"><span data-dcnode-id="7169" instrument_node="">Table&nbsp;3</span></span><span data-dcnode-id="7167" instrument_node="">. </span><span data-dcnode-id="7165" instrument_node="">Main information of condensation methods using TEC for water harvesting [</span><a class="workspace-trigger" data-dcnode-id="7163" href="#bib13" name="bbib13"><span data-dcnode-id="7164" instrument_node="">[13]</span></a><span data-dcnode-id="7162" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7160" href="#bib14" name="bbib14"><span data-dcnode-id="7161" instrument_node="">[14]</span></a><span data-dcnode-id="7159" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7157" href="#bib15" name="bbib15"><span data-dcnode-id="7158" instrument_node="">[15]</span></a><span data-dcnode-id="7156" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7154" href="#bib16" name="bbib16"><span data-dcnode-id="7155" instrument_node="">[16]</span></a><span data-dcnode-id="7153" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7151" href="#bib17" name="bbib17"><span data-dcnode-id="7152" instrument_node="">[17]</span></a><span data-dcnode-id="7150" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7148" href="#bib18" name="bbib18"><span data-dcnode-id="7149" instrument_node="">[18]</span></a><span data-dcnode-id="7147" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7145" href="#bib19" name="bbib19"><span data-dcnode-id="7146" instrument_node="">[19]</span></a><span data-dcnode-id="7144" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7142" href="#bib20" name="bbib20"><span data-dcnode-id="7143" instrument_node="">[20]</span></a><span data-dcnode-id="7141" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7139" href="#bib21" name="bbib21"><span data-dcnode-id="7140" instrument_node="">[21]</span></a><span data-dcnode-id="7138" instrument_node="">].</span></p></span></span><div class="groups" data-dcnode-id="6490"><table data-dcnode-id="6491"><thead data-dcnode-id="7121"><tr class="rowsep-1 valign-top" data-dcnode-id="7122"><th data-dcnode-id="7133" scope="col"><span data-dcnode-id="7134" instrument_node="">Reference</span></th><th data-dcnode-id="7131" scope="col"><span data-dcnode-id="7132" instrument_node="">System information</span></th><th data-dcnode-id="7129" scope="col"><span data-dcnode-id="7130" instrument_node="">Study methods</span></th><th data-dcnode-id="7126" scope="col"><em data-dcnode-id="7127"><span data-dcnode-id="7128" instrument_node="">WHR</span></em></th><th data-dcnode-id="7123" scope="col"><em data-dcnode-id="7124"><span data-dcnode-id="7125" instrument_node="">UPC</span></em></th></tr></thead><tbody data-dcnode-id="6492"><tr class="valign-top" data-dcnode-id="7083"><td class="align-left" data-dcnode-id="7116"><span data-dcnode-id="7120" instrument_node="">[</span><a class="workspace-trigge
