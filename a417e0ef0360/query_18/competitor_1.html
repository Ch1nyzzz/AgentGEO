</span><h3 class="a-spacing-mini" data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node=""> iCON Range </span></h3><span data-dcnode-id="2893" instrument_node=""> </span><h4 class="a-spacing-mini a-color-secondary a-text-italic" data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node=""> Stylish ventilation for the home </span></h4><span data-dcnode-id="2890" instrument_node=""> </span><p class="a-spacing-base" data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node=""> For a sleek and stylish addition to any home, why not choose an extractor fan from the iCON range? iCON’s unique design ensures effective ventilation, which is quiet and uses minimal energy, for various applications. </span></p><span data-dcnode-id="2887" instrument_node=""> </span><p class="a-spacing-base" data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node=""> The design includes iCON’s plug-in module concept, which allows you to create a fan to suit your specific needs. </span></p><span data-dcnode-id="2884" instrument_node=""> </span><p class="a-spacing-base" data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node=""> iCON’s round design means fitting on the wall or ceiling is simple, and with three versions, this provides a suitable fan to install in any room, large or small. </span></p><span data-dcnode-id="2881" instrument_node=""> </span><div class="amp-centerthirdcol-listbox" data-dcnode-id="2823"><span data-dcnode-id="2880" instrument_node="">

n></li><span data-dcnode-id="2850" instrument_node=""> </span><li data-dcnode-id="2844"><span class="a-list-item" data-dcnode-id="2845"><span data-dcnode-id="2849" instrument_node=""> </span><span class="a-size-base" data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node=""> AIRTIGHT HOMES: Modern dwellings are designed with  increasingly reduced air infiltration rates  and higher levels of insulation making them  almost completely sealed.  </span></span><span data-dcnode-id="2846" instrument_node=""> </span></span></li><span data-dcnode-id="2843" instrument_node=""> </span><li data-dcnode-id="2837"><span class="a-list-item" data-dcnode-id="2838"><span data-dcnode-id="2842" instrument_node=""> </span><span class="a-size-base" data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node=""> MOULD: Unchecked levels of moisture and relative humidity will lead to mould growth and Inhaling these spores can trigger health issues, so extracting moist air is important. </span></span><span data-dcnode-id="2839" instrument_node=""> </span></span></li><span data-dcnode-id="2836" instrument_node=""> </span><li data-dcnode-id="2830"><span class="a-list-item" data-dcnode-id="2831"><span data-dcnode-id="2835" instrument_node=""> </span><span class="a-size-base" data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node=""> CONDENSATION: Dampness is a huge problem in the U.K. Damaging to both humans, and to the fabric  of buildings, condensation leads to streaming windows and walls  and ultimately to mould. </span></span><span data-dcnode-id="2832" instrument_node=""> </span></span></li><span data-dcnode-id="2829" instrument_node=""> </span></ul><span data-dcnode-id="2827" instrument_node=""> </span></div></div><span data-dcnode-id="2824" instrument_node=""> </span></div><span data-dcnode-id="2822" instrument_node="">

</span><div class="a-section a-spacing-none aplus-13-heading" data-dcnode-id="1762"><span data-dcnode-id="1766" instrument_node=""> </span><h1 class="aplus-13-heading-text a-text-bold" data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node=""> iCON Frequently Asked Questions </span></h1><span data-dcnode-id="1763" instrument_node=""> </span></div><span data-dcnode-id="1761" instrument_node=""> </span><div class="a-section a-spacing-none aplus-module-section aplus-text-section" data-dcnode-id="1717"><span data-dcnode-id="1760" instrument_node=""> </span><p class="description" data-dcnode-id="1755"><span data-dcnode-id="1759" instrument_node=""> </span><span class="a-text-bold" data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Who can install my iCON fan?</span></span><span data-dcnode-id="1756" instrument_node=""> </span></p><span data-dcnode-id="1754" instrument_node=""> </span><p class="description" data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node=""> All electrical installation must be carried out by a qualified electrician in accordance with Approved Document Part P of the U.K. Building Regulations and to the latest IET standards, or the appropriate regulations in the country of installation. All fans must be installed in line with the manufacturer's installation instructions provided to ensure the fan has been installed correctly, allowing for performance of the fan. </span></p><span data-dcnode-id="1751" instrument_node=""> </span><p class="description" data-dcnode-id="1746"><span data-dcnode-id="1750" instrument_node=""> </span><span class="a-text-bold" data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">How do I clean my iCON fan?</span></span><span data-dcnode-id="1747" instrument_node=""> </span></p><span data-dcnode-id="1745" instrument_node=""> </span><p class="description" data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node=""> SAFETY FIRST: ALWAYS ISOLATE THE FAN UNIT FROM THE POWER SUPPLY BEFORE DOING ANY WORK ON THE FAN/MODULE. </span></p><span data-dcnode-id="1742" instrument_node=""> </span><p class="description" data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node=""> The fan and ducting should be inspected and cleaned on a regular basis to keep fan performance at an optimum level. The external housing of the fan can be wiped clean with a damp cloth. Do not use household cleaners containing abrasives. Cleaning of internal parts such as the impeller should be carried out by using a soft brush. Never clean any parts of the fan assembly by immersing in water or using a dishwasher. </span></p><span data-dcnode-id="1739" instrument_node=""> </span><p class="description" data-dcnode-id="1734"><span data-dcnode-id="1738" instrument_node=""> </span><span class="a-text-bold" data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Which type of ducting is suitable to use with the iCON?</span></span><span data-dcnode-id="1735" instrument_node=""> </span></p><span data-dcnode-id="1733" instrument_node=""> </span><p class="description" data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node=""> Both Rigid and Flexible ducting can be used with the iCON fans. When installing ducting, it must not be damaged or blocked. Where flexible ducting is used it must be pulled taught to avoid system pressure build up and noise. </span></p><span data-dcnode-id="1730" instrument_node=""> </span><p class="description" data-dcnode-id="1725"><span data-dcnode-id="1729" instrument_node=""> </span><span class="a-text-bold" data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">How does the iCON iris/shutter open and close?</span></span><span data-dcnode-id="1726" instrument_node=""> </span></p><span data-dcnode-id="1724" instrument_node=""> </span><p class="description" data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node=""> The iris/shutter opens by activation of a wax brown actuator mechanism. Upon switching the fan on, the actuator is heated and pushes onto a white plastic clip, which in turn opens the fan iris/shutter. </span></p><span data-dcnode-id="1721" instrument_node=""> </span><p class="description" data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node=""> After installing the fan, ensure to power off and allow the actuator to fully retract for approx. 2 minutes, before attempting to fit the cover, this will permit the iris/shutter to function correctly. </span></p><span data-dcnode-id="1718" instrument_node=""> </span></div><span data-dcnode-id="1716" instrument_node=""> </span></div><span data-dcnode-id="1714" instrument_node=""> </span></div><span data-dcnode-id="1712" instrument_node="">
</span></div><span data-dcnode-id="1710" instrument_node=""> </span></div><span data-dcnode-id="1708" instrument_node=""> </span></div><span data-dcnode-id="1706" instrument_node="">

</span><span data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Good concept but appalling design.</span></span><span data-dcnode-id="1204" instrument_node="">
</span></a></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1200" data-hook="review-date"><span data-dcnode-id="1201" instrument_node="">Reviewed in the United Kingdom on 3 December 2019</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1194"><span class="a-color-secondary" data-dcnode-id="1198" data-hook="format-strip-linkless"><span data-dcnode-id="1199" instrument_node="">Style Name: Single</span></span><i aria-label="|" class="a-icon a-icon-text-separator" data-dcnode-id="1197" role="img"></i><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1195" data-hook="avp-badge-linkless"><span data-dcnode-id="1196" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1171"><span class="a-size-base review-text" data-dcnode-id="1172" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1173" style="max-height: none; height: 300px;"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1180" data-hook="review-collapsed" style="padding-bottom: 20px;"><span data-dcnode-id="1193" instrument_node="">
</span><span data-dcnode-id="1182"><span data-dcnode-id="1192" instrument_node="">
  I'm an electrician and decided to try the Airflow iCON ECO 15 after an excellent review in a trade magazine. I really wanted this fan to work as the shutter concept is a genius idea compared to the common noisy flaps to stop backdrafts especially on a south-west wall.</span><br data-dcnode-id="1191"><br data-dcnode-id="1190"><span data-dcnode-id="1189" instrument_node="">At first I was very impressed but after a month or so, the shutter mechanism started to become weak and would not completely open and eventually not close.  I returned the fan to Amazon for a replacement but after another month the same thing started happening again.  I contacted Airflow Developments technical department to discuss the problem and I was told that they have sold X million of these fans worldwide and adamant that the problem is down to my installation not being on a completely flat wall.  I accepted their recommendation to release the pressure on the 2 fixing screws but quickly came to the conclusion that they were talking absolute nonsense and the problem over the following weeks continued to get worse - after all the old cheap fan of 8 years was removed still working with a distinctive rattle and impressively caked in dust!  I was also very surprised that Airflow were incredibly keen to send out a new wax actuator and clip mechanism as if they know that there is an inherent problem with the design of these fans.</span><br data-dcnode-id="1188"><br data-dcnode-id="1187"><span data-dcnode-id="1186" instrument_node="">On top of this problem, I bought the optional humidistat module.  This module clips neatly into the bottom of the fan and the cover locks back on top.  However, the slots at the bottom of the module for the sensor to measure humidity in the air do not line up with the slots in the casing of the fan - therefore with the minuscule amount of backdraft pushing back into the fan casing, the module is actually measuring humidity on the wrong side of the fan.  This means that having a shower on dry day outside would not trigger the fan to come on - and that's after spending so much time getting the sensitivity adjustment in the correct position.</span><br data-dcnode-id="1185"><br data-dcnode-id="1184"><span data-dcnode-id="1183" instrument_node="">So, in short - this article is the result of an incredible amount of time wasting on a product that should have worked far better.  Although the concept of this fan is an excellent idea - I can not describe how shocked I am at the poor design and quality.  Such a shame Airflow!
</span></span><span data-dcnode-id="1181" instrument_node="">

</span></a></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1049" data-hook="review-date"><span data-dcnode-id="1050" instrument_node="">Reviewed in the United Kingdom on 15 April 2021</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1043"><span class="a-color-secondary" data-dcnode-id="1047" data-hook="format-strip-linkless"><span data-dcnode-id="1048" instrument_node="">Style Name: Single</span></span><i aria-label="|" class="a-icon a-icon-text-separator" data-dcnode-id="1046" role="img"></i><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1044" data-hook="avp-badge-linkless"><span data-dcnode-id="1045" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1029"><span class="a-size-base review-text" data-dcnode-id="1030" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1031" style="max-height: none; height: 300px;"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1038" data-hook="review-collapsed" style="padding-bottom: 20px;"><span data-dcnode-id="1042" instrument_node="">
</span><span data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">
  Sleek and stylish, I've fitted 4 of these now to replace other types and I love them, and as long as you ensure the hole diameter in the wall or ceiling is the same as the fans', they are reasonably easy to fit if you take things carefully.  The iris fins are however quite delicate, and you need to keep the cover free from all dust and grit that might be present around the hole in the wall or ceiling whilst installing. I fitted a ceiling one and the hole edges in the plasterboard were very crumbly, I found the iris wouldn't close evenly, or completely, because tiny bits of plaster grit were jamming between the fins and the cover, the springs of the mechanism are quite weak in that regard. I had let dirt get into the iris mechanism  and then had to completely strip the cover parts down and wash and clean it all before it would work smoothly. The final grub screw  that stops the cover moving I didn't bother fitting, apart from being very fiddly, it makes it easier if you ever want to adjust the timer unit later on, to not have to deal with the tiny grub screw. It really isn't needed, the cover stays on tightly in place without it. The cover itself was a bit of a struggle to put on, but again only because I hadn't kept the threads around the unit clean enough and had got a little bit of filler on them.  There is only a slight clockwise turn needed to attach the cover, but it does need very careful alignment, I practised first before fitting any of it, and used a marker pen to make a few little guide marks for later.

</span><span data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">
  I bought this fan and the humidity module for a small shower room with an existing 100mm hole where the previous fan was installed in October 2019. I chose it because of the size, capacity and the shutter which meant no annoying flappy external shutter. Also I could use my own external heritage terminal. Instalation was easy but care needs to be taken to keep it flat so that the shutter operates correctly. I had some real issues setting up the humidity stat and was just about to contact the company when I read about resetting it and then that it needs time to settle when adjusted. So instead of tweaking it often to try and get it to operate as I wanted I adjusted the humidity and then left it for a few days to settle. Hey presto it worked and now operating correctly every time. Comes on within minutes of starting the shower. Not the quietest but more than acceptable. Would recommend it and would buy it again
