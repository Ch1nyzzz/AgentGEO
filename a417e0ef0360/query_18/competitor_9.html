</span><h1 data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Humidity Sensing Fans, Should You Get One?</span></h1><span data-dcnode-id="675" instrument_node="">
</span><span data-dcnode-id="673" instrument_node="">
</span><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Humidity sensing fans are the natural evolution of the traditional bathroom extractor fan which the vast majority of us currently still use in our homes up and down the country.</span></p><span data-dcnode-id="668" instrument_node="">
</span><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">We’re all very much aware of how an extractor fan works. A little fan in the wall unit turns on when we switch on the bathroom light. The fan then tries (most don’t do a great job) to extract all the moist air before turning off around ten minutes after we turn the light off.</span></p><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">They tend to be noisy and fairly inefficient. So it’ll be no surprise to find out that they don’t do a great job when it comes to getting rid of condensation from your bathroom. </span></p><p data-dcnode-id="656"><span data-dcnode-id="660" instrument_node="">I’ll not go into the reasons why I think basic extractor fans simply aren’t fit for purpose and should all be replaced, as I’ve written an entire article on the subject </span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eco-home-essentials.co.uk/bathroom-extractor-fans.html"><span data-dcnode-id="659" instrument_node="">here</span></a><span data-dcnode-id="657" instrument_node="">.</span></p><span data-dcnode-id="655" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="646"><img alt="Humidity Sensing Fans" data-dcnode-id="654" data-pin-media="https://www.eco-home-essentials.co.uk/images/Humidity_sensing_extractor_fan.jpg" height="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eco-home-essentials.co.uk/images/xHumidity_sensing_extractor_fan.jpg.pagespeed.ic.fBKfeh1Hr7.jpg&amp;raw" style="width: 600px; height: auto; border-color: #000000; border-width: 1px 1px 1px 1px; border-style: solid" title="My humidity sensing fan ducted through my loft." width="600"><div class="pinit" data-dcnode-id="647"><span data-dcnode-id="653" instrument_node="">
</span><a class="PIN_1650924558637_button_pin PIN_1650924558637_beside PIN_1650924558637_save PIN_1650924558637_padded" data-dcnode-id="649" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ShxiomGUCrrG-1&amp;url=http%3A%2F%2Fwww.eco-home-essentials.co.uk%2Fhumidity-sensing-fans.html&amp;media=https%3A%2F%2Fwww.eco-home-essentials.co.uk%2Fimages%2FHumidity_sensing_extractor_fan.jpg&amp;description=Humidity%20Sensing%20Fans%20For%20Bathrooms" data-pin-log="button_pinit" data-pin-x="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DShxiomGUCrrG-1%26url%3Dhttp%253A%252F%252Fwww.eco-home-essentials.co.uk%252Fhumidity-sensing-fans.html%26media%3Dhttps%253A%252F%252Fwww.eco-home-essentials.co.uk%252Fimages%252FHumidity_sensing_extractor_fan.jpg%26description%3DHumidity%2520Sensing%2520Fans%2520For%2520Bathrooms"><span class="PIN_1650924558637_count" data-dcnode-id="651" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=ShxiomGUCrrG-1&amp;url=http%3A%2F%2Fwww.eco-home-essentials.co.uk%2Fhumidity-sensing-fans.html&amp;media=https%3A%2F%2Fwww.eco-home-essentials.co.uk%2Fimages%2FHumidity_sensing_extractor_fan.jpg&amp;description=Humidity%20Sensing%20Fans%20For%20Bathrooms" data-pin-log="button_pinit" data-pin-x="0"><span data-dcnode-id="652" instrument_node="">0</span></span><span data-dcnode-id="650" instrument_node="">Save</span></a><span data-dcnode-id="648" instrument_node="">
</span></div></div><span data-dcnode-id="645" instrument_node="">
</span><h2 data-dcnode-id="642"><span data-dcnode-id="644" instrument_node="">Why Are Humidity Sensing Fans So Superior?</span><br data-dcnode-id="643"></h2><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="640" instrument_node="">Humidity sensing fans are simply the next evolutionary step for the humble extractor fan. They’re more powerful and smarter in their operation. They know when to turn on and for how long.</span><br data-dcnode-id="639"></p><span data-dcnode-id="637" instrument_node="">
</span><h2 data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">How They Work</span></h2><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Instead of being linked to your light switch and a timer, humidity sensing units have a small humidity sensor built into the housing of the fan unit which constantly monitors the air humidity. So when it detects the humidity level increase above a preset level the fan switches on.</span></p><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">It continues to run until the humidity level drops below the preset level, at which point it turns itself off.</span></p><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">They also tend to be much better engineered and so will run quieter than the budget style extractor fans that are typically fitted to homes in the UK.&nbsp;</span></p><p data-dcnode-id="623"><span data-dcnode-id="627" instrument_node="">That does mean the price is more expensive than the basic extractor fans. But they do what they’re supposed to and will ultimately pay for themselves as they will mean you won’t have to redecorate as often and you should hopefully be able to avoid the formation of </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eco-home-essentials.co.uk/black-mould-removal.html"><span data-dcnode-id="626" instrument_node="">black mould</span></a><span data-dcnode-id="624" instrument_node="">, which can represent a serious health hazard if left to its own devices.</span></p><span data-dcnode-id="622" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="620"><img alt="Vent for Humidity Sensing Extractor Fan" data-dcnode-id="621" data-pin-media="https://www.eco-home-essentials.co.uk/images/Humidity_sensing_Extractor_fan_vent.jpg" height="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eco-home-essentials.co.uk/images/xHumidity_sensing_Extractor_fan_vent.jpg.pagespeed.ic.tZRVRJLfgV.jpg&amp;raw" style="width: 600px; height: auto; border-color: #000000; border-width: 1px 1px 1px 1px; border-style: solid" title="Vent to bathroom ceiling for my humidity sensing extractor fan." width="600"></div><span data-dcnode-id="619" instrument_node="">
</span><h2 data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Are There Any Alternatives?</span></h2><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">There are several different types of humidity sensing fans on the market. With some simply turning on and off a fairly standard extractor fan unit, while some top of the range units will run constantly at a low level (c.3 litres/sec). Then when it detects humidity it will ramp up to say 30 litres per second.</span></p><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">In my opinion there aren’t really any true alternatives for use in a bathroom. </span></p><p data-dcnode-id="607"><span data-dcnode-id="611" instrument_node="">The only other system that comes close is the </span><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eco-home-essentials.co.uk/positive-pressure-ventilation.html"><span data-dcnode-id="610" instrument_node="">Positive ventilation unit</span></a><span data-dcnode-id="608" instrument_node=""> but its more of a whole house solution or could would work well in conjunction with a high end humidity sensing fan.&nbsp;</span></p><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">If your home has sufficient air changes (i.e adequate ventilation) you shouldn’t need to add a positive ventilation unit in addition to a humidity sensing unit. </span></p><p data-dcnode-id="600"><span data-dcnode-id="604" instrument_node="">However if you have condensation issues throughout the rest of your home (as opposed to just in the bathroom). Then you may not be getting </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eco-home-essentials.co.uk/whole-house-ventilation.html"><span data-dcnode-id="603" instrument_node="">enough fresh air into your home</span></a><span data-dcnode-id="601" instrument_node=""> and in this instance a positive ventilation unit may be worth considering.</span></p><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">That said, within the humidity sensing range there are lots of options to choose from to suit all budgets. You could even buy a humidistat controller that will convert your existing fan into a humidity sensing fan.</span></p><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">With so many to choose from you can buy a humidity sensing unit from around £30 right up to around £450 depending on what features you’re looking for.</span></p><span data-dcnode-id="595" instrument_node="">
</span><h2 data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Advantages of Humidity Sensing Fans:</span></h2><span data-dcnode-id="592" instrument_node="">
</span><ol data-dcnode-id="572"><li data-dcnode-id="585"><u data-dcnode-id="589"><b data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Not linked to a timer</span></b></u><span data-dcnode-id="588" instrument_node=""> - because they’re linked to a humidity sensor as opposed to a timer they won’t turn off until they have got the humidity level down to the correct level.</span><br data-dcnode-id="587"><br data-dcnode-id="586"></li><li data-dcnode-id="578"><u data-dcnode-id="582"><b data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Noise</span></b></u><span data-dcnode-id="581" instrument_node=""> - The more expensive units are well engineered and will therefore be much quieter that the cheap fans. They should have a decibel (dB) rating on the box.</span><br data-dcnode-id="580"><br data-dcnode-id="579"></li><li data-dcnode-id="573"><b data-dcnode-id="575"><u data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Ease of installation</span></u></b><span data-dcnode-id="574" instrument_node=""> - the units is typically very similar to a standard extractor fan and it’s normally a simple swap process. Just bolt the old one off an replace it with the new one. But it is a job for an electrician as there are electrical connections to be made.</span></li></ol><span data-dcnode-id="571" instrument_node="">
</span><h2 data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Disadvantages</span></h2><span data-dcnode-id="568" instrument_node="">
</span><ol data-dcnode-id="562"><li data-dcnode-id="563"><u data-dcnode-id="565"><b data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Cost</span></b></u><span data-dcnode-id="564" instrument_node=""> - they do tend to be more expensive but probably not by as much as you might think. Although top of the range units can cost several hundred pounds.</span></li></ol><span data-dcnode-id="561" instrument_node="">
</span><h2 data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Conclusion:</span></h2><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">I’ve actually fitted two humidity sensing fans in my property as the existing extractor fans simply weren’t up to the job. In the past I had to open the windows while I had a shower to assist the fan.</span></p><p data-dcnode-id="551"><span data-dcnode-id="555" instrument_node="">After fitting the humidity sensing units I’d estimate my </span><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eco-home-essentials.co.uk/what-is-condensation.html"><span data-dcnode-id="554" instrument_node="">condensation</span></a><span data-dcnode-id="552" instrument_node=""> issues have been reduced by around 75%.</span></p><span data-dcnode-id="550" instrument_node="">
</span><span data-dcnode-id="547" instrument_node="">
