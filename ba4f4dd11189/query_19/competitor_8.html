</span><p data-dcnode-id="2015"><b data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Fraud Waste Abuse Investigator </span></b><br data-dcnode-id="2021"/><i data-dcnode-id="2016"><span data-dcnode-id="2020" instrument_node="">Candidates for this position </span><b data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">must reside in Ohio</span></b><span data-dcnode-id="2017" instrument_node="">. Work will be remote with potential requirement for periodic meetings in Columbus, OH with Client.</span></i></p><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Diversified Systems is seeking a FWA Investigator who will oversee all aspects of the clients FWA program. The FWA Investigator will partner with the Claims Manager and Compliance Officer to develop and maintain a program that identifies and prevents FWA. This position will develop policy and procedures that meet the client's standards, regulations and statutes, and federal regulations/statues. The FWA Investigator will instill a positive culture working with multiple teams.</span></p><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2007"><b data-dcnode-id="2008"><i data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Responsibilities: </span></i></b></p><span data-dcnode-id="2006" instrument_node="">
</span><ul data-dcnode-id="1983"><span data-dcnode-id="2005" instrument_node="">
</span><li data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Manages the Fraud Waste Abuse program by reviewing claims, Prior Authorization, and other system information necessary to provide all services under the terms of the clients contract.</span></li><span data-dcnode-id="2002" instrument_node="">
</span><li data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Fully engages in real-time performance monitoring to facilitate achieving a Compliant program</span></li><span data-dcnode-id="1999" instrument_node="">
</span><li data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Ensures all policies and procedures are up to date</span></li><span data-dcnode-id="1996" instrument_node="">
</span><li data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Supports knowledge sharing.</span></li><span data-dcnode-id="1993" instrument_node="">
</span><li data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Coordinates with Claims personnel, client, and other state or federal authorities to facilitate detection, prevention, and referrals of potential FWA.</span></li><span data-dcnode-id="1990" instrument_node="">
</span><li data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">Maintains subject matter expertise regarding industry best practices, process improvement, and claims service.</span></li><span data-dcnode-id="1987" instrument_node="">
</span><li data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">Other duties as assigned/required.</span></li><span data-dcnode-id="1984" instrument_node="">
</span></ul><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1978"><b data-dcnode-id="1979"><i data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Education and Experience: </span></i></b></p><span data-dcnode-id="1977" instrument_node="">
</span><ul data-dcnode-id="1963"><span data-dcnode-id="1976" instrument_node="">
</span><li data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Bachelor's degree with a minimum of two years of experience in a healthcare field working in fraud, waste, and abuse investigations and audits</span></li><span data-dcnode-id="1973" instrument_node="">
</span><li data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Associate degree with a minimum of four years of experience in a healthcare field working in fraud, waste, and abuse investigations and audits</span></li><span data-dcnode-id="1970" instrument_node="">
</span><li data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Certification in the field preferred.</span></li><span data-dcnode-id="1967" instrument_node="">
