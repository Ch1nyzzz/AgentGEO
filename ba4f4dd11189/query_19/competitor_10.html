</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">We are looking for a talented and passionate Bank Fraud Investigator to join our team. As a Fraud Investigator at our company, you will assume responsibility to identify and handle suspicious or problematic claims and incidents. </span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="397" instrument_node="">As a Fraud Investigator, you should have excellent analytical skills along with a passion for research and discovery.</span><br data-dcnode-id="396"/><span data-dcnode-id="395" instrument_node=""> </span><br data-dcnode-id="394"/><span data-dcnode-id="393" instrument_node=""> </span><br data-dcnode-id="392"/><span data-dcnode-id="391" instrument_node=""> </span></p><span data-dcnode-id="389" instrument_node="">
</span><ul data-dcnode-id="369"><span data-dcnode-id="388" instrument_node="">
</span><li data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Perform objective, fair and timely investigations </span></li><span data-dcnode-id="385" instrument_node="">
</span><li data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Search and review evidence</span></li><span data-dcnode-id="382" instrument_node="">
</span><li data-dcnode-id="380"><span data-dcnode-id="381" instrument_node=""> Look for documents to analyze the overall situation</span></li><span data-dcnode-id="379" instrument_node="">
</span><li data-dcnode-id="377"><span data-dcnode-id="378" instrument_node=""> Plan, implement and manage field assignments</span></li><span data-dcnode-id="376" instrument_node="">
</span><li data-dcnode-id="374"><span data-dcnode-id="375" instrument_node=""> Handle 3-7 cases weekly</span></li><span data-dcnode-id="373" instrument_node="">
</span><li data-dcnode-id="371"><span data-dcnode-id="372" instrument_node=""> Plan and implement deposition strategies based on specific situations</span></li><span data-dcnode-id="370" instrument_node="">
</span></ul><span data-dcnode-id="368" instrument_node="">
