</span><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.actionfraud.police.uk/a-z-of-fraud" target="_self"><span data-dcnode-id="703" instrument_node="">A-Z of fraud</span></a><span data-dcnode-id="701" instrument_node="">
</span></div><span data-dcnode-id="699" instrument_node="">
</span><h1 data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Employment fraud</span></h1><span data-dcnode-id="696" instrument_node="">
</span></div><span data-dcnode-id="694" instrument_node="">
</span></div><span data-dcnode-id="692" instrument_node="">
</span><div class="wrapper-full-width" data-dcnode-id="555"><span data-dcnode-id="691" instrument_node="">
</span><div class="wrapper-page-width container-fluid af-page-content" data-dcnode-id="557"><span data-dcnode-id="690" instrument_node="">
</span><div class="row" data-dcnode-id="559"><span data-dcnode-id="689" instrument_node="">
</span><div class="col-xs-12 col-md-8" data-dcnode-id="561"><span data-dcnode-id="688" instrument_node="">
</span><div class="social-share" data-dcnode-id="668"><span data-dcnode-id="687" instrument_node="">
</span><span class="social-share-stats" data-dcnode-id="679"><span data-dcnode-id="686" instrument_node="">
</span><span class="social-share-number" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">23</span></span><span data-dcnode-id="683" instrument_node="">
</span><span class="social-share-text" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">shares</span></span><span data-dcnode-id="680" instrument_node="">
</span></span><span data-dcnode-id="678" instrument_node="">
</span><a analytics-="" aria-label="Share on Facebook" class="social-share-facebook" data-dcnode-id="676" data-ga-target="https://www.actionfraud.police.uk/a-z-of-fraud/employment-fraud" data-ga-type="facebook" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.actionfraud.police.uk%252Fa-z-of-fraud%252Femployment-fraud" target="_blank"><span aria-hidden="true" class="af-icon-facebook" data-dcnode-id="677"></span></a><span data-dcnode-id="675" instrument_node="">
</span><a analytics-="" aria-label="Share on Twitter" class="social-share-twitter" data-dcnode-id="673" data-ga-target="https://www.actionfraud.police.uk/a-z-of-fraud/employment-fraud" data-ga-type="twitter" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.twitter.com/share%3Furl%3Dhttps%253A%252F%252Fwww.actionfraud.police.uk%252Fa-z-of-fraud%252Femployment-fraud" target="_blank"><span aria-hidden="true" class="af-icon-twitter" data-dcnode-id="674"></span></a><span data-dcnode-id="672" instrument_node="">
</span><a analytics-="" aria-label="Share on Linkedin" class="social-share-linkedin" data-dcnode-id="670" data-ga-target="https://www.actionfraud.police.uk/a-z-of-fraud/employment-fraud" data-ga-type="linkedin" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/shareArticle%3Furl%3Dhttps%253A%252F%252Fwww.actionfraud.police.uk%252Fa-z-of-fraud%252Femployment-fraud%26mini%3Dtrue%26title%3DEmployment%2Bfraud%26source%3D" target="_blank"><span aria-hidden="true" class="af-icon-linkedin" data-dcnode-id="671"></span></a><span data-dcnode-id="669" instrument_node="">
</span></div><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="664"><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Employment fraud happens when a fraudster claims to be a recruitment agent, hiring you for a job – which can be in a foreign country - that doesn’t exist.</span></strong></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">You place your CV or personal details on internet job sites so that potential employers can see them and, hopefully, offer you a job.</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">You’re contacted by someone claiming to be an employer or an employer’s agent to say they are considering you for a position. You’re asked to fill in a questionnaire and may be interviewed over the phone. You may also be referred to the employer’s website for further information.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Eventually, you’re told that you’ve been successful and the job is yours.</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Once you have received the job offer, the fraudsters will contact you about arrangements. If the job is abroad, they will talk about arranging travel, accommodation and visas. You’ll be referred to an agency that, again, may have a website to give it credibility. The agency is supposed to help you with all your arrangements – for a fee.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">When you pay one fee (eg: a visa administration fee), the agency will tell you about another fee that has to be paid (eg: a deposit on accommodation). In reality, the fraudulent agency makes none of these arrangements.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">What’s more, the fraudsters may also ask for your bank account details to set up salary payments. They will use these details to steal money from your account.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Some employment fraudsters ask the applicant to pay a fee in order to apply for&nbsp;a job.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">In reality, there is no job and any fees paid go straight to the fraudsters. Victims may already have given up their previous job and made new accommodation arrangements.</span></p><span data-dcnode-id="639" instrument_node="">
</span><h3 data-dcnode-id="636"><strong data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Are you a victim of employment fraud?</span></strong></h3><span data-dcnode-id="635" instrument_node="">
</span><ul data-dcnode-id="624"><span data-dcnode-id="634" instrument_node="">
</span><li data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">You’ve been contacted by someone claiming to be an employer’s agent offering you a new job.</span></li><span data-dcnode-id="631" instrument_node="">
</span><li data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">You’ve filled out a questionnaire or given them personal information about yourself over the phone.</span></li><span data-dcnode-id="628" instrument_node="">
</span><li data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">You’ve given money to them as an administration fee.</span></li><span data-dcnode-id="625" instrument_node="">
</span></ul><span data-dcnode-id="623" instrument_node="">
</span><h3 data-dcnode-id="620"><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">What should you do if you’ve been a victim of employment fraud?</span></strong></h3><span data-dcnode-id="619" instrument_node="">
</span><ul data-dcnode-id="602"><span data-dcnode-id="618" instrument_node="">
</span><li data-dcnode-id="613"><span data-dcnode-id="617" instrument_node="">Stop all communication with the ‘agency’ but make a note of their details and </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reporting.actionfraud.police.uk/reporting" target="_self" title="Report fraud to Action Fraud"><span data-dcnode-id="616" instrument_node="">report it to Action Fraud</span></a><span data-dcnode-id="614" instrument_node="">.</span></li><span data-dcnode-id="612" instrument_node="">
</span><li data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">If you’ve given them any money, contact your bank immediately.</span></li><span data-dcnode-id="609" instrument_node="">
</span><li data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Warn the operators of the website where you placed your CV that their site is being used by fraudsters.</span></li><span data-dcnode-id="606" instrument_node="">
</span><li data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Don’t give any more money to the scammers. If you have, then call your bank to let them know.</span></li><span data-dcnode-id="603" instrument_node="">
</span></ul><span data-dcnode-id="601" instrument_node="">
</span><h3 data-dcnode-id="598"><strong data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Protect yourself against employment fraud</span></strong></h3><span data-dcnode-id="597" instrument_node="">
</span><ul data-dcnode-id="571"><span data-dcnode-id="596" instrument_node="">
</span><li data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Check any documents for poor spelling and grammar – this is often a sign that fraudsters are at work.</span></li><span data-dcnode-id="593" instrument_node="">
</span><li data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Ask the embassy representing the country where you believe you will be working how to obtain a visa and how much it costs. Check that the answers the potential employer gave you are the same – if they’re not, it may be a sign of fraud.</span></li><span data-dcnode-id="590" instrument_node="">
</span><li data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Check the official records to confirm that the organisation offering you the job actually exists. If it does, contact the organisation directly through officially listed contact details to confirm the job offer is genuine.</span></li><span data-dcnode-id="587" instrument_node="">
</span><li data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Tell the employer that you will make your own travel and accommodation arrangements. Beware if they try hard to dissuade you or tell you that you have to use the agency they refer you to.</span></li><span data-dcnode-id="584" instrument_node="">
</span><li data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Beware, too, if the employer or agent provides a webmail email address such as @Yahoo or @Hotmail as a point of contact.</span></li><span data-dcnode-id="581" instrument_node="">
</span><li data-dcnode-id="573"><span data-dcnode-id="580" instrument_node="">For further help see the recruitment industry counter fraud </span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.safer-jobs.com/a-z-of-fraud" target="_self"><span data-dcnode-id="579" instrument_node="">forum website</span></a><span data-dcnode-id="577" instrument_node="">, which provides specific </span><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.safer-jobs.com/advice.cfm%20for%20advice" target="_self"><span data-dcnode-id="576" instrument_node="">advice</span></a><span data-dcnode-id="574" instrument_node=""> on for candidates and recruitment professionals.</span></li><span data-dcnode-id="572" instrument_node="">
</span></ul><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="563"><strong data-dcnode-id="565"><span data-dcnode-id="569" instrument_node="">If fraud has been committed, </span><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reporting.actionfraud.police.uk/reporting" target="_self" title="Report fraud to Action Fraud"><span data-dcnode-id="568" instrument_node="">report it to Action Fraud</span></a><span data-dcnode-id="566" instrument_node="">.</span></strong><span data-dcnode-id="564" instrument_node="">
</span></p><span data-dcnode-id="562" instrument_node=""> </span></div><span data-dcnode-id="560" instrument_node="">
</span></div><span data-dcnode-id="558" instrument_node="">
</span></div><span data-dcnode-id="556" instrument_node="">
</span></div><span data-dcnode-id="554" instrument_node="">
