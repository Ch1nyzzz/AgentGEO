</span><br data-dcnode-id="443"/><span data-dcnode-id="442" instrument_node=""> Resolve Cardmember inquiries regarding a fraud- or security-related concern; such as verifying flagged transactions, caller authentication, reporting an account as fraud, etc.

</span><br data-dcnode-id="439"/><span data-dcnode-id="438" instrument_node=""> Take incoming calls and referrals from other departments, and at times make outbound calls.

</span><br data-dcnode-id="435"/><span data-dcnode-id="434" instrument_node=""> How You’ll Do It

</span><br data-dcnode-id="431"/><span data-dcnode-id="430" instrument_node=""> Handle inbound customer calls; complete necessary fraud verification, includes caller authentication, transaction verification, etc., utilizing excellent customer service skills.

</span><br data-dcnode-id="427"/><span data-dcnode-id="426" instrument_node=""> Collect necessary information and complete a fraud report when a customer confirms unauthorized account activity.

</span><br data-dcnode-id="423"/><span data-dcnode-id="422" instrument_node=""> Ensure proper follow-up or escalation of account based on call outcome.

</span><br data-dcnode-id="419"/><span data-dcnode-id="418" instrument_node=""> Make outbound calls to verify account activity with the customer.
