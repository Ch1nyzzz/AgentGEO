</span><p data-dcnode-id="1126"><a data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/wp-content/uploads/2014/10/employee-theft.jpg"><img alt="warning signs of fraud" class="alignleft wp-image-12599 size-thumbnail" data-dcnode-id="1162" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/wp-content/uploads/2021/12/employee-theft-150x150.jpg&amp;raw" width="150"></a><span data-dcnode-id="1160" instrument_node="">Unfortunately, </span><a data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/battling-uncertainty-in-your-company/" rel="noopener" target="_blank"><span data-dcnode-id="1159" instrument_node="">companies</span></a><span data-dcnode-id="1157" instrument_node=""> of all sizes can become victims of </span><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/accounting-fraud-prevention-using-quickbooks/" rel="noopener" target="_blank"><span data-dcnode-id="1156" instrument_node="">fraud</span></a><span data-dcnode-id="1154" instrument_node="">. In fact, a study on </span><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/accounting-fraud-targeted/" rel="noopener" target="_blank"><span data-dcnode-id="1153" instrument_node="">fraud</span></a><span data-dcnode-id="1151" instrument_node=""> published by </span><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/cash-basis-vs-accrual-basis-accounting/" rel="noopener" target="_blank"><span data-dcnode-id="1150" instrument_node="">accounting</span></a><span data-dcnode-id="1148" instrument_node=""> firm KPMG International found “a very large increase in cases involving the </span><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/exploit-new-business-opportunities/"><span data-dcnode-id="1147" instrument_node="">exploitation</span></a><span data-dcnode-id="1145" instrument_node=""> of weak internal </span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/cost-control-vs-cost-reduction/"><span data-dcnode-id="1144" instrument_node="">controls</span></a><span data-dcnode-id="1142" instrument_node=""> by fraudsters up from 49 percent in 2007 to 74 percent in 2011.” Thus, internal controls are a first line of defense and are important in any size </span><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/how-decision-making-impacts-an-organization/" rel="noopener" target="_blank"><span data-dcnode-id="1141" instrument_node="">organization</span></a><span data-dcnode-id="1139" instrument_node="">. So, implement them to reduce the </span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/opportunity-costs-decision-making/"><span data-dcnode-id="1138" instrument_node="">opportunity</span></a><span data-dcnode-id="1136" instrument_node=""> for </span><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/marketing-fraud/"><span data-dcnode-id="1135" instrument_node="">fraud</span></a><span data-dcnode-id="1133" instrument_node="">. Whatever the size </span><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/spot-zombie-company/" rel="noopener" target="_blank"><span data-dcnode-id="1132" instrument_node="">company</span></a><span data-dcnode-id="1130" instrument_node="">, there are some warning signs of </span><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/skimming-fraud/" rel="noopener" target="_blank"><span data-dcnode-id="1129" instrument_node="">fraud</span></a><span data-dcnode-id="1127" instrument_node=""> that are important to pay attention to.</span></p><span data-dcnode-id="1125" instrument_node="">

</span><p data-dcnode-id="1076" style="text-align: center;"><span data-dcnode-id="1077" style="color: #ff0000;"><strong data-dcnode-id="1078"><span data-dcnode-id="1082" instrument_node="">(Have you ever heard of </span><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/skimming-fraud/"><span data-dcnode-id="1081" instrument_node="">skimming fraud</span></a><span data-dcnode-id="1079" instrument_node="">? It’s the most difficult fraud to detect.)</span></strong></span></p><span data-dcnode-id="1075" instrument_node="">

</span><p data-dcnode-id="1046"><span data-dcnode-id="1053" instrument_node="">What is the motivation for an </span><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/employee-turnover/" rel="noopener" target="_blank"><span data-dcnode-id="1052" instrument_node="">employee</span></a><span data-dcnode-id="1050" instrument_node=""> to steal?&nbsp; The </span><a data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/the-fraud-triangle/"><span data-dcnode-id="1049" instrument_node="">fraud triangle</span></a><span data-dcnode-id="1047" instrument_node=""> shows us 3 following conditions:</span></p><span data-dcnode-id="1045" instrument_node="">

</span><li data-dcnode-id="1040"><strong data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Pressure</span></strong><span data-dcnode-id="1041" instrument_node=""> (motivation or intent to steal)</span></li><span data-dcnode-id="1039" instrument_node="">

</span></ul><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1022" instrument_node="">Well designed internal controls serve to mitigate the </span><a data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/opportunity-cost-definition/"><span data-dcnode-id="1021" instrument_node="">opportunity</span></a><span data-dcnode-id="1019" instrument_node=""> for </span><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/the-fraud-triangle/" rel="noopener" target="_blank"><span data-dcnode-id="1018" instrument_node="">fraud</span></a><span data-dcnode-id="1016" instrument_node=""> in your organization.</span></p><span data-dcnode-id="1014" instrument_node="">

</span><h3 data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">How to Reduce Fraud</span></h3><span data-dcnode-id="1003" instrument_node="">

</span><h4 data-dcnode-id="991"><strong data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Live Ethics in Your Corporate Culture&nbsp;</span></strong></h4><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="989" instrument_node="">A </span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/ethics-affects-the-financial-results-of-a-company/" rel="noopener" target="_blank"><span data-dcnode-id="988" instrument_node="">culture of ethics</span></a><span data-dcnode-id="986" instrument_node=""> starts at the top and you start by demonstrating it on a daily basis. We cannot emphasize this enough as it sets the bar for acceptable behavior in your </span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategiccfo.com/manage-organizational-diversity/" rel="noopener" target="_blank"><span data-dcnode-id="985" instrument_node="">organization</span></a><span data-dcnode-id="983" instrument_node="">.</span></p><span data-dcnode-id="981" instrument_node="">
</span><h4 data-dcnode-id="978"><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Trust is Not a Control&nbsp;</span></strong></h4><span data-dcnode-id="977" instrument_node="">
