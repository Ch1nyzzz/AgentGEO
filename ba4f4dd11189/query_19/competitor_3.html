</span><h2 class="appear-like-h1 text-center" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">EMPLOYMENT FRAUD WARNING</span></h2><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="325" instrument_node="">Effective as of November 4</span><sup data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">th</span></sup><span data-dcnode-id="322" instrument_node="">, 2019.</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="319" instrument_node="">Dollarama Inc. in conjunction with its affiliates (collectively, “</span><strong data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Dollarama</span></strong><span data-dcnode-id="316" instrument_node="">” and hereinafter also referred to as “we” or “us”) provides you access to Dollarama’s website (</span><a data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dollarama.com/"><span data-dcnode-id="315" instrument_node="">www.dollarama.com</span></a><span data-dcnode-id="313" instrument_node="">), Dollarama’s mobile application, and all other sites, applications and portals operated by or on behalf of Dollarama (collectively, the “</span><strong data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Sites</span></strong><span data-dcnode-id="310" instrument_node="">”).</span></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Canadian companies are increasingly targeted by employment-related fraud.</span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">One of the schemes commonly used by fraudsters is to introduce themselves as an employee of a company (or of a recruitment agency mandated by the company) and to ask for personal information and/or money from job applicants.</span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">To achieve their objective, fraudsters may use an email address with a domain name that is identical or similar to that of the company to which they claim to be associated and may send forms or other documents bearing the name, logo or other trademark of the company in question.</span></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">We would like to assure you that neither Dollarama, nor any recruitment agency mandated by it will ask applicants to pay any funds as part of the recruitment process, for example to cover travel, immigration or visa costs, processing fees, or other expenses to be incurred. A request for personal information early in the hiring process, such as the date of birth, the social insurance number or bank details, is a sign of potentially fraudulent activity.</span></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">The Dollarama recruitment process is a rigorous, professional and confidential one. No job offer is made without first meeting the candidate.</span></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="292" instrument_node="">If you have any doubts or concerns about a job offer or Dollarama’s recruitment process, please do not hesitate to contact us via the </span><a data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dollarama.com/en-CA/corp/contact-us"><span data-dcnode-id="291" instrument_node="">"Contact Us"</span></a><span data-dcnode-id="289" instrument_node=""> page on our website.</span></p><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="286" instrument_node="">If you believe you are a victim of employment fraud, we advise you to contact local authorities and/or to report the incident to the </span><a data-dcnode-id="284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.antifraudcentre.ca/"><span data-dcnode-id="285" instrument_node="">Canadian Anti-Fraud Centre</span></a><span data-dcnode-id="283" instrument_node="">.</span></p><span data-dcnode-id="281" instrument_node="">
