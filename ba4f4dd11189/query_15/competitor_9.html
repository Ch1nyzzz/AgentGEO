</span><div class="cke-visible accordion__panel" data-dcnode-id="741"><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="747" instrument_node="">Do not pay for or submit any form until USCIS updates official TPS re-registration information for your country. Stay updated at </span><a data-dcnode-id="745" data-entity-substitution="canonical" data-entity-type="node" data-entity-uuid="3b35b3d2-d4fd-4e0d-9406-12d664f029f0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/humanitarian/temporary-protected-status"><span data-dcnode-id="746" instrument_node="">uscis.gov/TPS</span></a><span data-dcnode-id="744" instrument_node="">.</span></p><span data-dcnode-id="742" instrument_node="">
</span></div><span data-dcnode-id="740" instrument_node="">
</span><h1 aria-expanded="false" class="cke-active accordion__header" data-dcnode-id="738" tabindex="0"><span data-dcnode-id="739" instrument_node="">Immigration Scam in India</span></h1><span data-dcnode-id="737" instrument_node="">
</span><div class="cke-visible accordion__panel" data-dcnode-id="716"><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Beware of emails supposedly sent by the USCIS New Delhi Field Office or the Department of State in India. These emails may contain attachments, claim you have been approved for a visa to the U.S., or request money for visa processing. Emails like that may be scams because:</span></p><span data-dcnode-id="733" instrument_node="">
</span><ul data-dcnode-id="723"><li data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Emails from the U.S. government always end in the domain“.gov”;</span></li><span data-dcnode-id="730" instrument_node="">
</span><li data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">USCIS will never send an email indicating you’ve been approved for a diversity visa, immigrant visa, nonimmigrant visa, or any other type of immigration benefit; and</span></li><span data-dcnode-id="727" instrument_node="">
</span><li data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">USCIS will never ask you to transfer money to an individual (see Payments by Phone or Email).</span></li><span data-dcnode-id="724" instrument_node="">
</span></ul><p data-dcnode-id="718"><span data-dcnode-id="722" instrument_node="">Please visit the Department of State’s website on </span><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//travel.state.gov/content/travel/en/us-visas/visa-information-resources/fraud.html"><span data-dcnode-id="721" instrument_node="">fraud warnings</span></a><span data-dcnode-id="719" instrument_node=""> for additional information.</span></p><span data-dcnode-id="717" instrument_node="">
</span></div><span data-dcnode-id="715" instrument_node="">
</span><h1 aria-expanded="false" class="cke-active accordion__header" data-dcnode-id="713" tabindex="0"><span data-dcnode-id="714" instrument_node="">Form I-9 and Email Scams</span></h1><span data-dcnode-id="712" instrument_node="">
</span><div class="cke-visible accordion__panel" data-dcnode-id="692"><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="710" instrument_node="">USCIS has learned that employers have received scam emails requesting Form I-9 information that appear to come from USCIS. Employers are not required to submit Forms I-9 to USCIS. Employers must have a Form I-9, Employment Eligibility Verification, for every person on their payroll who is required to complete Form I-9. All of these forms must be retained for a certain period of time. Visit </span><a data-dcnode-id="708" data-entity-substitution="canonical" data-entity-type="node" data-entity-uuid="1888aa98-b970-4183-82f9-6149f79645f5" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/i-9-central"><span data-dcnode-id="709" instrument_node="">I-9 Central</span></a><span data-dcnode-id="707" instrument_node=""> to learn more about retention, storage and inspections for Form I-9.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">These scam emails come from a fraudulent email address: news@uscis.gov. This is not a USCIS email address. The body of the email may contain USCIS and Office of the Inspector General labels, your address and a fraudulent download button that links to a non-government web address (uscis-online.org). Do not respond to these emails or click the links in them.</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="701" instrument_node="">If you believe that you received a scam email requesting Form I-9 information from USCIS, report it to the </span><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//identitytheft.gov/"><span data-dcnode-id="700" instrument_node="">Federal Trade Commission</span></a><span data-dcnode-id="698" instrument_node="">. If you are not sure if it is a scam, forward the suspicious email to the </span><a data-dcnode-id="696" href="mailto:uscis.webmaster@uscis.dhs.gov"><span data-dcnode-id="697" instrument_node="">USCIS webmaster</span></a><span data-dcnode-id="695" instrument_node="">. USCIS will review the emails received and share with law enforcement agencies as appropriate.</span></p><span data-dcnode-id="693" instrument_node="">
</span></div><span data-dcnode-id="691" instrument_node="">
</span><h1 aria-expanded="false" class="cke-active accordion__header" data-dcnode-id="689" tabindex="0"><span data-dcnode-id="690" instrument_node="">“Notarios Públicos”</span></h1><span data-dcnode-id="688" instrument_node="">
</span><div class="cke-visible accordion__panel" data-dcnode-id="678"><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="686" instrument_node="">In many Latin American countries, the term “notario publico” (which is Spanish for “notary public”) means something very different than what it means in the United States. In many Spanish-speaking nations, “notarios” are powerful attorneys with special legal credentials. In the U.S., however, notary publics are people appointed by state governments to witness the signing of important documents and administer oaths. A notario publico is not authorized to provide you with any legal services related to immigration. Only an attorney or an accredited representative working for a Department of Justice (DOJ)-recognized organization can give you legal advice. For more information, go to the </span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/eoir/recognition-and-accreditation-program"><span data-dcnode-id="685" instrument_node="">Recognition &amp; Accreditation </span></a><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/eoir/recognition-and-accreditation-program"><span data-dcnode-id="683" instrument_node="">Program page</span></a><span data-dcnode-id="681" instrument_node=""> on DOJ’s website.</span></p><span data-dcnode-id="679" instrument_node="">
</span></div><span data-dcnode-id="677" instrument_node="">
</span><h1 aria-expanded="false" class="cke-active accordion__header" data-dcnode-id="675" tabindex="0"><span data-dcnode-id="676" instrument_node="">Payments by Phone or Email</span></h1><span data-dcnode-id="674" instrument_node="">
</span><div class="cke-visible accordion__panel" data-dcnode-id="657"><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">USCIS will never ask you to transfer money to an individual. We do not accept Western Union, MoneyGram, PayPal, or gift cards as payment for immigration fees. In addition, we will never ask you to pay fees to a person on the phone or by email. You can pay some immigration fees online, but only if you pay through your </span><a data-dcnode-id="670" data-entity-substitution="canonical" data-entity-type="node" data-lang="en" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myaccount.uscis.gov/"><span data-dcnode-id="671" instrument_node="">USCIS online account</span></a><span data-dcnode-id="669" instrument_node=""> and Pay.gov.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="666" instrument_node="">Remember, you can learn more on our </span><a data-dcnode-id="664" data-entity-substitution="canonical" data-entity-type="node" data-entity-uuid="f42d7fe8-6124-4c4d-a3e3-28568a8462ce" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/forms/filing-fees"><span data-dcnode-id="665" instrument_node="">Paying USCIS Fees</span></a><span data-dcnode-id="663" instrument_node="">&nbsp;page.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">&nbsp;</span></p><span data-dcnode-id="658" instrument_node="">
</span></div><span data-dcnode-id="656" instrument_node="">
</span><h1 aria-expanded="false" class="cke-active accordion__header" data-dcnode-id="654" tabindex="0"><span data-dcnode-id="655" instrument_node="">Winning the Visa Lottery</span></h1><span data-dcnode-id="653" instrument_node="">
</span><div class="cke-visible accordion__panel" data-dcnode-id="639"><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">USCIS does not manage the Diversity Immigrant Visa (DV) Program. This program is managed by the U.S. Department of State (State Department). The DV Program is also known as the visa lottery.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="648" instrument_node="">Visit the </span><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//travel.state.gov/content/travel/en/us-visas/immigrate/diversity-visa-program-entry.html"><span data-dcnode-id="647" instrument_node="">State Department’s website</span></a><span data-dcnode-id="645" instrument_node=""> to learn more about the program, the requirements to enter, and how they </span><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//travel.state.gov/content/travel/en/us-visas/immigrate/diversity-visa-program-entry/diversity-visa-if-you-are-selected.html"><span data-dcnode-id="644" instrument_node="">notify selectees</span></a><span data-dcnode-id="642" instrument_node="">. Remember that the DV Program is free and the State Department will never send you an email about being selected.</span></p><span data-dcnode-id="640" instrument_node="">
</span></div><span data-dcnode-id="638" instrument_node="">
</span><h1 aria-expanded="false" class="cke-active accordion__header" data-dcnode-id="636" tabindex="0"><span data-dcnode-id="637" instrument_node="">Scam Websites</span></h1><span data-dcnode-id="635" instrument_node="">
</span><div class="cke-visible accordion__panel" data-dcnode-id="621"><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Some websites claim to be affiliated with USCIS and offer step-by-step guidance on completing a USCIS application or petition. Make sure your information is from uscis.gov or is affiliated with uscis.gov.&nbsp;Make sure the website address ends with .gov.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="630" instrument_node="">Please remember that we will never ask you to pay to download USCIS forms. Our forms are always free on our website. You can also get forms at your local USCIS office.&nbsp;To order forms by mail, follow these instructions in </span><a data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/node/73964"><span data-dcnode-id="629" instrument_node="">English</span></a><span data-dcnode-id="627" instrument_node=""> or </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/es/formularios/formularios-por-correo"><span data-dcnode-id="626" instrument_node="">Spanish</span></a><span data-dcnode-id="624" instrument_node="">.</span></p><span data-dcnode-id="622" instrument_node="">
</span></div><span data-dcnode-id="620" instrument_node="">
</span><h1 aria-expanded="false" class="cke-active accordion__header" data-dcnode-id="618" tabindex="0"><span data-dcnode-id="619" instrument_node="">Job Offers</span></h1><span data-dcnode-id="617" instrument_node="">
</span><div class="cke-visible accordion__panel" data-dcnode-id="600"><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Beware of companies offering a job from overseas or by email. If you receive a suspicious job offer by email before you leave your country to come to the U.S., it may be a scam, especially if you are asked to pay money to receive a job offer.</span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="612" instrument_node="">Even if a job offer is legitimate, you are not allowed to work in the United States unless you have a permanent resident card (Green Card), an Employment Authorization Document (work permit) or an employment-related visa which allows you to work for a particular employer. Read the </span><a data-dcnode-id="610" data-entity-substitution="canonical" data-entity-type="node" data-entity-uuid="a88c9fa8-665e-4734-9f00-4e39f67d27f2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/working-in-the-united-states"><span data-dcnode-id="611" instrument_node="">Working in the U.S.</span></a><span data-dcnode-id="609" instrument_node=""> page.&nbsp;</span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="606" instrument_node="">If you are already in the United States on a student visa, talk with your foreign student advisor (designated school official) at your school before you take any job. If you are about to graduate and are applying for Optional Practical Training (OPT), read the instructions on the </span><a data-dcnode-id="604" data-entity-substitution="canonical" data-entity-type="node" data-entity-uuid="a88c9fa8-665e-4734-9f00-4e39f67d27f2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/working-in-the-united-states"><span data-dcnode-id="605" instrument_node="">Working in the U.S.</span></a><span data-dcnode-id="603" instrument_node=""> page.</span></p><span data-dcnode-id="601" instrument_node="">
</span></div><span data-dcnode-id="599" instrument_node="">
</span><h1 aria-expanded="false" class="cke-active accordion__header" data-dcnode-id="597" tabindex="0"><span data-dcnode-id="598" instrument_node="">Scams Targeting Students</span></h1><span data-dcnode-id="596" instrument_node="">
</span><div class="cke-visible accordion__panel" data-dcnode-id="560"><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="594" instrument_node="">If you are an international student outside of the U.S. and want to come to the U.S. for education, make sure you are applying to an accredited college or university. Look for your school on the</span><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ope.ed.gov/accreditation"><span data-dcnode-id="593" instrument_node=""> Council for Higher Education</span></a><span data-dcnode-id="591" instrument_node=""> web page.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">You must have a Form I-20, Certificate of Eligibility for Nonimmigrant Student Status, to travel. After you are accepted into a </span><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studyinthestates.dhs.gov/school-search"><span data-dcnode-id="587" instrument_node="">Student and Exchange Visitor Program (SEVP)-certified school</span></a><span data-dcnode-id="585" instrument_node="">, a designated school official will either give you:</span></p><span data-dcnode-id="583" instrument_node="">
</span><ul data-dcnode-id="576"><li data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Form I-20, Certificate of Eligibility for Nonimmigrant (F-1) Student Status –For Academic and Language Students, or</span></li><span data-dcnode-id="580" instrument_node="">
</span><li data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Form I-20, Certificate of Eligibility for Nonimmigrant (M-1) Student Status –For Vocational Students</span></li><span data-dcnode-id="577" instrument_node="">
</span></ul><p data-dcnode-id="571"><span data-dcnode-id="575" instrument_node="">Schools that are not accredited cannot sponsor you for an </span><a data-dcnode-id="573" data-entity-substitution="canonical" data-entity-type="node" data-entity-uuid="cab4c98c-3f8e-418b-9f25-7df53c7ed648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/working-in-the-united-states/students-and-exchange-visitors/students-and-employment"><span data-dcnode-id="574" instrument_node="">F-1 student visa</span></a><span data-dcnode-id="572" instrument_node="">.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="569" instrument_node="">Additional information on the Form I-20 is available on DHS’ website </span><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studyinthestates.dhs.gov/2013/01/what-is-the-form-i-20"><span data-dcnode-id="568" instrument_node="">studyinthestates.dhs.gov</span></a><span data-dcnode-id="566" instrument_node=""> or on our website on the </span><a data-dcnode-id="564" data-entity-substitution="canonical" data-entity-type="node" data-entity-uuid="cab4c98c-3f8e-418b-9f25-7df53c7ed648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscis.gov/working-in-the-united-states/students-and-exchange-visitors/students-and-employment"><span data-dcnode-id="565" instrument_node="">Students and Employment</span></a><span data-dcnode-id="563" instrument_node=""> page.</span></p><span data-dcnode-id="561" instrument_node="">
</span></div><span data-dcnode-id="559" instrument_node="">
</span><h1 aria-expanded="false" class="accordion__header" data-dcnode-id="557" tabindex="0"><span data-dcnode-id="558" instrument_node="">Paying Money for Connections or Jumping the Line&nbsp;</span></h1><span data-dcnode-id="556" instrument_node="">
</span><div class="cke-hidden accordion__panel" data-dcnode-id="548"><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="554" instrument_node="">Sometimes businesses and websites pretend to be immigration experts or say they have special connections to the government. They might also “guarantee” that you can get a visa, Green Card, or work permit faster if you pay a fee. Remember, USCIS has no exceptions to the normal processing times and no one can obtain these services faster than the usual process. </span><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//egov.uscis.gov/processing-times/"><span data-dcnode-id="553" instrument_node="">Check case processing times online</span></a><span data-dcnode-id="551" instrument_node="">.</span></p><span data-dcnode-id="549" instrument_node="">
</span></div><span data-dcnode-id="547" instrument_node="">
</span><div aria-expanded="false" class="accordion__header cke-active" data-dcnode-id="545" tabindex="0"><span data-dcnode-id="546" instrument_node="">Afghan Personal Information Scam</span></div><span data-dcnode-id="544" instrument_node="">
</span><div class="accordion__panel cke-visible" data-dcnode-id="526"><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">If you are an Afghan parolee in the United States, beware of individuals asking for personal information. Our “Information for Afghan Nationals” webpage offers complete information on what you need to do as a parolee. When reviewing an email, always remember:</span></p><span data-dcnode-id="540" instrument_node="">
</span><ul data-dcnode-id="527"><li data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">USCIS does not routinely send emails to inform you that you have been approved for a diversity visa, immigrant visa, nonimmigrant visa, or any other type of immigration benefit, except in certain situations.</span></li><span data-dcnode-id="537" instrument_node="">
</span><li data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Email addresses from the U.S. government always end in (.gov).</span></li><span data-dcnode-id="534" instrument_node="">
</span><li data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">If you did not enter a physical address because it is not safe for you to disclose it, then you may get emails from uscis.gov. Please always check the sender information to make sure it ends in (.gov).</span></li><span data-dcnode-id="531" instrument_node="">
</span><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">USCIS will never ask you to transfer money to an individual or pay fees other than through your myUSCIS account. Read the Payments by Phone or Email section below.</span></li><span data-dcnode-id="528" instrument_node="">
</span></ul></div><span data-dcnode-id="525" instrument_node="">
</span></div><div class="flex-wrapper content-accordion--bottom" data-dcnode-id="506"><a class="content-accordion__close-all" data-dcnode-id="516" href="#"><span data-dcnode-id="523" instrument_node=""> </span><svg aria-hidden="true" class="svg-inline--fa fa-compress-alt fa-w-14" data-dcnode-id="521" data-fa-i2svg="" data-icon="compress-alt" data-prefix="fas" focusable="false" role="presentation" viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg"><path d="M4.686 427.314L104 328l-32.922-31.029C55.958 281.851 66.666 256 88.048 256h112C213.303 256 224 266.745 224 280v112c0 21.382-25.803 32.09-40.922 16.971L152 376l-99.314 99.314c-6.248 6.248-16.379 6.248-22.627 0L4.686 449.941c-6.248-6.248-6.248-16.379 0-22.627zM443.314 84.686L344 184l32.922 31.029c15.12 15.12 4.412 40.971-16.97 40.971h-112C234.697 256 224 245.255 224 232V120c0-21.382 25.803-32.09 40.922-16.971L296 136l99.314-99.314c6.248-6.248 16.379-6.248 22.627 0l25.373 25.373c6.248 6.248 6.248 16.379 0 22.627z" data-dcnode-id="522" fill="currentColor"></path></svg><span data-dcnode-id="519" instrument_node=""> </span><span class="content-accordion__open-close" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Close All</span></span></a><span data-dcnode-id="515" instrument_node=""> </span><a class="content-accordion__open-all" data-dcnode-id="507" href="#"><span data-dcnode-id="514" instrument_node=""> </span><svg aria-hidden="true" class="svg-inline--fa fa-expand-alt fa-w-14" data-dcnode-id="512" data-fa-i2svg="" data-icon="expand-alt" data-prefix="fas" focusable="false" role="presentation" viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg"><path d="M212.686 315.314L120 408l32.922 31.029c15.12 15.12 4.412 40.971-16.97 40.971h-112C10.697 480 0 469.255 0 456V344c0-21.382 25.803-32.09 40.922-16.971L72 360l92.686-92.686c6.248-6.248 16.379-6.248 22.627 0l25.373 25.373c6.249 6.248 6.249 16.378 0 22.627zm22.628-118.628L328 104l-32.922-31.029C279.958 57.851 290.666 32 312.048 32h112C437.303 32 448 42.745 448 56v112c0 21.382-25.803 32.09-40.922 16.971L376 152l-92.686 92.686c-6.248 6.248-16.379 6.248-22.627 0l-25.373-25.373c-6.249-6.248-6.249-16.378 0-22.627z" data-dcnode-id="513" fill="currentColor"></path></svg><span data-dcnode-id="510" instrument_node=""> </span><span class="content-accordion__open-close" data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Open All</span></span></a></div><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="504" instrument_node="">If you receive a suspicious email, forward it to us at </span><a data-dcnode-id="502" href="mailto:USCIS.Webmaster@uscis.dhs.gov"><span data-dcnode-id="503" instrument_node="">USCIS.Webmaster@uscis.dhs.gov</span></a><span data-dcnode-id="501" instrument_node="">.</span></p><span data-dcnode-id="499" instrument_node="">
