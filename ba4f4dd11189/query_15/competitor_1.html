</span><h1 data-dcnode-id="3215" itemprop="headline"><span data-dcnode-id="3216" instrument_node="">Travel Scams</span></h1><span data-dcnode-id="3214" instrument_node="">
</span><p class="byline" data-dcnode-id="3209"><span class="byline" data-dcnode-id="3211"><a data-dcnode-id="3212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aarp.org/"><span data-dcnode-id="3213" instrument_node="">AARP</span></a></span><span data-dcnode-id="3210" instrument_node="">

</span><div class="clear" data-dcnode-id="3207"></div><span data-dcnode-id="3206" instrument_node="">

</span><div class="everywhere-article-content parsys" data-dcnode-id="2354"><div class="textimage parbase section" data-dcnode-id="3137"><div data-dcnode-id="3138"><span data-dcnode-id="3186" instrument_node="">

</span><span data-dcnode-id="3169" instrument_node="">
</span><span data-dcnode-id="3167" instrument_node="">
</span><span data-dcnode-id="3165" instrument_node="">
</span><p data-dcnode-id="3161"><a data-dcnode-id="3163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/espanol/dinero/estafas-y-fraudes/info-2019/viaje.html"><span data-dcnode-id="3164" instrument_node="">En español</span></a><span data-dcnode-id="3162" instrument_node="">&nbsp;| ﻿These days, travel starts on the internet. But as you research destinations online and comb travel sites for savings on lodging and flights, keep a sharp eye out for deceptive offers and outright scams that could cost you a bundle.&nbsp;</span></p><span data-dcnode-id="3160" instrument_node="">
</span><p data-dcnode-id="3155"><span data-dcnode-id="3159" instrument_node="">The Federal Trade Commission (FTC) received more than 73,000 reports of travel-related scams in 2020, costing consumers $175 million. Yet an&nbsp;</span><a data-dcnode-id="3157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/content/dam/aarp/research/surveys_statistics/life-leisure/2019/travel-affordability-confidence-poll.doi.10.26419-2Fres.00303.001.pdf"><span data-dcnode-id="3158" instrument_node="">AARP poll</span></a><span data-dcnode-id="3156" instrument_node="">&nbsp;the previous year found that less than 40 percent of travelers, and only about a quarter of those ages 50 and up, are concerned about booking scams when planning trips.</span></p><span data-dcnode-id="3154" instrument_node="">
</span><p data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">Be especially wary when using third-party hotel booking sites. According to a 2019 survey conducted for the American Hotel &amp; Lodging Association (AHLA), nearly a quarter of consumers report being misled by travel resellers on the phone or online, affecting $5.7 billion in transactions in 2018.</span></p><span data-dcnode-id="3151" instrument_node="">
</span><span data-dcnode-id="3149" instrument_node="">
</span><span data-dcnode-id="3147" instrument_node="">
</span><span data-dcnode-id="3145" instrument_node="">
</span><span data-dcnode-id="3143" instrument_node="">
</span><span data-dcnode-id="3141" instrument_node="">
</span></div><span data-dcnode-id="3139" instrument_node="">
</span></div></div><span data-dcnode-id="3136" instrument_node="">
</span><div class="articleCalloutBox section" data-dcnode-id="3066"><span data-dcnode-id="3135" instrument_node="">
</span><div class="aarp-c-article-callout-box aarp-c-article-callout-box@mobile aarp-c-article-callout-box--border-all-sides aarp-c-article-callout-box--medium aarp-c-article-callout-box--medium@tablet-desktop aarp-c-article-callout-box--pull-right aarp-c-article-callout-box--pull-right@tablet-desktop aarp-c-article-callout-box--addGrayBackground aarp-c-article-callout-box--addPaddingLeft aarp-c-article-callout-box--addPaddingRight aarp-c-article-callout-box--addPaddingTop aarp-c-article-callout-box--addPaddingBottom" data-dcnode-id="3070"><span data-dcnode-id="3134" instrument_node="">

</span><h4 data-dcnode-id="3109"><b data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">Have you seen this scam?</span></b></h4><span data-dcnode-id="3108" instrument_node="">
</span><ul data-dcnode-id="3093"><span data-dcnode-id="3107" instrument_node="">
</span><li data-dcnode-id="3100"><span data-dcnode-id="3106" instrument_node="">Call the </span><a data-dcnode-id="3104" data-overlay-msg="AARP.Everywhere.LeavingModal.drawOverlay(this,'',/content/aarpe/en/home/money/scams-fraud/info-2019/new-medicare-card.html,'','You are now leaving AARP.org and going to a website that is not operated by AARP. A different privacy policy and terms of service will apply.');return false;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/helpline/%3Fintcmp%3DAE-SCM-FRD-CTA-HLPLN1"><span data-dcnode-id="3105" instrument_node="">AARP Fraud Watch Network Helpline</span></a><span data-dcnode-id="3103" instrument_node="">:&nbsp;</span><b data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">877-908-3360</span></b></li><span data-dcnode-id="3099" instrument_node="">
</span><li data-dcnode-id="3095"><span data-dcnode-id="3098" instrument_node="">Report it on AARP’s&nbsp;</span><a data-dcnode-id="3096" data-overlay-msg="AARP.Everywhere.LeavingModal.drawOverlay(this,'',/content/aarpe/en/home/money/scams-fraud/info-2019/new-medicare-card.html,'','You are now leaving AARP.org and going to a website that is not operated by AARP. A different privacy policy and terms of service will apply.');return false;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/tracking-map/%3Fintcmp%3DAE-SCM-FRD-CTA-MAP1"><span data-dcnode-id="3097" instrument_node="">Scam-Tracking Map</span></a></li><span data-dcnode-id="3094" instrument_node="">
</span></ul><span data-dcnode-id="3092" instrument_node="">
</span><p data-dcnode-id="3087"><span data-dcnode-id="3091" instrument_node="">Sign up for&nbsp;</span><a data-dcnode-id="3089" data-overlay-msg="AARP.Everywhere.LeavingModal.drawOverlay(this,'',/content/aarpe/en/home/money/scams-fraud/info-2019/new-medicare-card.html,'','You are now leaving AARP.org and going to a website that is not operated by AARP. A different privacy policy and terms of service will apply.');return false;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cp.email.aarp.org/fraudwatchsignup%3Fintcmp%3DAE-SCM-FRD-CTA-ALRT1"><span data-dcnode-id="3090" instrument_node="">Watchdog Alerts</span></a><span data-dcnode-id="3088" instrument_node="">&nbsp;for more tips on avoiding scams.</span></p><span data-dcnode-id="3086" instrument_node="">
</span><span data-dcnode-id="3084" instrument_node="">
</span><span data-dcnode-id="3082" instrument_node="">
</span><span data-dcnode-id="3080" instrument_node="">
</span><span data-dcnode-id="3078" instrument_node="">

</span><span data-dcnode-id="3067" instrument_node="">
</span></div><span data-dcnode-id="3065" instrument_node="">
</span><div class="textimage parbase section" data-dcnode-id="2985"><div data-dcnode-id="2986"><span data-dcnode-id="3064" instrument_node="">
</span><span data-dcnode-id="3062" instrument_node="">
</span><span data-dcnode-id="3060" instrument_node="">
</span><div class="aarpe-text-image" data-dcnode-id="2988"><span data-dcnode-id="3059" instrument_node="">
</span><span data-dcnode-id="3057" instrument_node="">
</span><span data-dcnode-id="3055" instrument_node="">
</span><span data-dcnode-id="3053" instrument_node="">
</span><span data-dcnode-id="3051" instrument_node="">
</span><span data-dcnode-id="3049" instrument_node="">
</span><span data-dcnode-id="3047" instrument_node="">
</span><span data-dcnode-id="3045" instrument_node="">
</span><span data-dcnode-id="3043" instrument_node="">
</span><p data-dcnode-id="3039"><span data-dcnode-id="3042" instrument_node="">Unscrupulous resellers draw consumers through search engine ads and send them, via links or posted phone numbers, to booking websites or call centers that appear to be affiliated with a hotel. The lookalike site will feature detailed descriptions of rooms and amenities; it might even have the hotel’s name in its URL.</span><br data-dcnode-id="3041"><span data-dcnode-id="3040" instrument_node="">
</span></p><span data-dcnode-id="3038" instrument_node="">
</span><p data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">But you are not actually dealing with the hotel. This can have consequences ranging from inconvenient (the reseller doesn’t transmit special requests such as a wheelchair-accessible room) to expensive (higher rates than the hotel actually charges or hidden fees tacked on to your bill) to potentially trip-ruining (you arrive and discover the booking was never made).</span></p><span data-dcnode-id="3035" instrument_node="">
</span><p data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">There’s plenty more to look out for. For example:</span></p><span data-dcnode-id="3032" instrument_node="">
</span><ul data-dcnode-id="3012"><span data-dcnode-id="3031" instrument_node="">
</span><li data-dcnode-id="3026"><span data-dcnode-id="3030" instrument_node="">Crooks operate lookalike websites for airlines, popular travel companies and federal </span><a data-dcnode-id="3028" data-overlay-msg="AARP.Everywhere.LeavingModal.drawOverlay(this,'',/content/aarpe/en/home/money/scams-fraud/info-2019/travel.html,'','You are now leaving AARP.org and going to a website that is not operated by AARP. A different privacy policy and terms of service will apply.');return false;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/travel/travel-tips/safety/info-2018/tsa-global-entry.html"><span data-dcnode-id="3029" instrument_node="">Trusted Traveler programs</span></a><span data-dcnode-id="3027" instrument_node=""> like TSA PreCheck to harvest personal data from people who believe they're booking tickets or signing up for smoother airport screening. </span></li><span data-dcnode-id="3025" instrument_node="">
</span><li data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Scam emails offer promotions such as free flights to get you to give up credit card information or click links that download malware. </span></li><span data-dcnode-id="3022" instrument_node="">
</span><li data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">Bogus insurance brokers sell travel policies they falsely claim will cover coronavirus-related cancellations. </span></li><span data-dcnode-id="3019" instrument_node="">
</span><li data-dcnode-id="3014"><span data-dcnode-id="3018" instrument_node="">Fraudsters make up </span><a data-dcnode-id="3016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2019/vacation.html"><span data-dcnode-id="3017" instrument_node="">vacation-rental listings</span></a><span data-dcnode-id="3015" instrument_node="">, or duplicate real ones, to collect payments for nonexistent bookings.&nbsp;</span></li><span data-dcnode-id="3013" instrument_node="">
</span></ul><span data-dcnode-id="3011" instrument_node="">
</span><h3 data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">Warning Signs</span></h3><span data-dcnode-id="3008" instrument_node="">
</span><ul data-dcnode-id="3000"><span data-dcnode-id="3007" instrument_node="">
</span><li data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">A cut-rate hotel or airline offer that seems too good to be true.</span></li><span data-dcnode-id="3004" instrument_node="">
</span><li data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">A hotel, airline or travel website has odd spelling or grammatical errors, suggesting it may have been created by a scammer in a foreign country.</span></li><span data-dcnode-id="3001" instrument_node="">
</span></ul><span data-dcnode-id="2999" instrument_node="">
</span><span data-dcnode-id="2997" instrument_node="">

</span><li data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Do&nbsp;book&nbsp;on the official website of a hotel, airline or other travel business, or use a reputable third-party booking site.</span></li><span data-dcnode-id="2890" instrument_node="">
</span><li data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">Do carefully check a travel website’s URL. Scam sites may use “domain spoofing” tricks such as an extra letter in the address.</span></li><span data-dcnode-id="2887" instrument_node="">
</span><li data-dcnode-id="2882"><span data-dcnode-id="2886" instrument_node="">Do use the </span><a data-dcnode-id="2884" data-overlay-msg="AARP.Everywhere.LeavingModal.drawOverlay(this,'',/content/aarpe/en/home/money/scams-fraud/info-2019/travel.html,'','You are now leaving AARP.org and going to a website that is not operated by AARP. A different privacy policy and terms of service will apply.');return false;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tsa.gov/precheck"><span data-dcnode-id="2885" instrument_node="">official government website</span></a><span data-dcnode-id="2883" instrument_node=""> to sign up for TSA PreCheck. Online searches for the program can turn up scam sites.</span></li><span data-dcnode-id="2881" instrument_node="">
</span><li data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">Do look for written policies on canceling or modifying reservations, and confirm them before booking.</span></li><span data-dcnode-id="2878" instrument_node="">
</span><li data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">Do call the hotel or airline and confirm your reservation after booking on a travel website. If they don’t have a record of your booking, that may signal a problem that it’s best to solve well before you travel.</span></li><span data-dcnode-id="2875" instrument_node="">
</span><li data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">Do be skeptical of pitches for travel insurance that cover cancellations due to COVID-19. Most standard travel policies do not cover pandemics or viral outbreaks, according to the industry-led Coalition Against Insurance Fraud.&nbsp;</span></li><span data-dcnode-id="2872" instrument_node="">
</span></ul><span data-dcnode-id="2870" instrument_node="">

</span><li data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">Don’t trust a travel website just because it has a familiar logo or comes up near the top of search results. Many scam sites mimic major travel companies’ branding.</span></li><span data-dcnode-id="2795" instrument_node="">
</span><li data-dcnode-id="2790"><span data-dcnode-id="2794" instrument_node="">Don't book on an unfamiliar travel site until you've checked it out. Search for the company's name plus words like “review,” “complaint” or “scam” to see if other consumers had bad experiences with the site, and look it up in the&nbsp;</span><a data-dcnode-id="2792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbb.org/search"><span data-dcnode-id="2793" instrument_node="">Better&nbsp;Business Bureau's&nbsp;database</span></a><span data-dcnode-id="2791" instrument_node="">.</span></li><span data-dcnode-id="2789" instrument_node="">
</span><li data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">Don’t click on links in emails with travel promotions like free airline tickets or warnings that your hotel loyalty points are about to expire. Mouse over the link to check whether it goes to a legitimate travel site.</span></li><span data-dcnode-id="2786" instrument_node="">
</span><li data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">Don’t pay for travel with a debit card. Use credit cards, which offer better fraud protection.</span></li><span data-dcnode-id="2783" instrument_node="">
</span></ul><span data-dcnode-id="2781" instrument_node="">

</span><li data-dcnode-id="2717"><span data-dcnode-id="2721" instrument_node="">If it’s an online fraud, you can also report it to the FBI’s&nbsp;</span><a data-dcnode-id="2719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ic3.gov/default.aspx" rel="noreferrer" target="_blank"><span data-dcnode-id="2720" instrument_node="">Internet Crime Complaint Center (IC3)</span></a><span data-dcnode-id="2718" instrument_node="">.</span></li><span data-dcnode-id="2716" instrument_node="">
