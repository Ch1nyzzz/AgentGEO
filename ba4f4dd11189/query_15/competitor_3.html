https://images.ctfassets.net/y6oq7udscnj8/1h5zAzLhiMPC77SMtwAD0P/196e4913bcaaab8a807f0cd2f53a4f5a/phising_2.jpeg?w=1200&amp;h=942&amp;fl=progressive&amp;q=50&amp;fm=jpg 1200w" type="image/png"><img data-dcnode-id="732" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.ctfassets.net/y6oq7udscnj8/1h5zAzLhiMPC77SMtwAD0P/196e4913bcaaab8a807f0cd2f53a4f5a/phising_2.jpeg%3Fw%3D1200%26h%3D942%26fl%3Dprogressive%26q%3D50%26fm%3Djpg&amp;raw"></picture></div><p class="Body1-dc894c-0 Typography__Body1-sc-pu0no3-0 styles__ColoredBody1-sc-12uidqw-4 lbSeQ caMdaO eYowAQ c-n" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">This can fool just about anyone into thinking that the email they received is legitimate. Even the smartest person can have an off day where they fall for an email like this. Now the spammer has your login credentials, and you can get locked out of your account due to the compromise.</span></p><h2 class="Header2-p6jleu-0 Typography__Header2-sc-pu0no3-10 VDDae keEKNv c-n" data-dcnode-id="726" id="chapter-2"><span data-dcnode-id="727" instrument_node="">Here’s how to spot a sophisticated phishing attempt</span></h2><p class="Body1-dc894c-0 Typography__Body1-sc-pu0no3-0 styles__ColoredBody1-sc-12uidqw-4 lbSeQ caMdaO eYowAQ c-n" data-dcnode-id="718"><span data-dcnode-id="725" instrument_node="">Sometimes looking for spelling mistakes and formatting errors isn’t enough. If the spammer has really committed to their scam, they’ll do what it takes to make the email they send you look legitimate. Take for instance the email shown above, it looks like it came from Mailgun. The formatting on the email is a little off, but the biggest sign that jumps out to us is the from address. We as a company know that we don’t have a `</span><a class="StyledLink__ExternalLink-sc-r09we5-1 kpoUdG" data-dcnode-id="722" href="mailto:service@mailgun.org" rel="noopener noreferrer" target="_tabs"><u data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">service@mailgun.org</span></u></a><span data-dcnode-id="721" instrument_node="">` address, but </span><b data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">not everyone is going to be privy to that information.&nbsp;</span></b></p><h3 class="Typography__Header5-sc-pu0no3-13 kkkjZ" data-dcnode-id="716" id="subchapter-1"><span data-dcnode-id="717" instrument_node="">Message Headers</span></h3><p class="Body1-dc894c-0 Typography__Body1-sc-pu0no3-0 styles__ColoredBody1-sc-12uidqw-4 lbSeQ caMdaO eYowAQ c-n" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Instead, we advise that you take a look at the message headers. These headers will give you every single last detail of a message – including who and where it’s actually coming from in the first place. You can usually find the headers by looking at the `more` options of a message, and clicking on `show original` from there, you will receive the headers.&nbsp;</span></p><p class="Body1-dc894c-0 Typography__Body1-sc-pu0no3-0 styles__ColoredBody1-sc-12uidqw-4 lbSeQ caMdaO eYowAQ c-n" data-dcnode-id="704"><span data-dcnode-id="713" instrument_node="">For some, reading headers is second nature, but for those of you who aren’t looking at phishing and spam attempts all day, you can use tools like </span><a class="StyledLink__ExternalLink-sc-r09we5-1 kpoUdG" data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mxtoolbox.com/EmailHeaders.aspx" rel="noopener noreferrer" target="_tabs"><u data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">MXToolBox</span></u></a><span data-dcnode-id="709" instrument_node=""> to parse the headers for you. If it doesn’t have the right </span><a class="StyledLink__ExternalLink-sc-r09we5-1 kpoUdG" data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mailgun.com/blog/email-authentication-your-id-card-sending" rel="noopener noreferrer" target="_tabs"><u data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">authentications</span></u></a><span data-dcnode-id="705" instrument_node=""> in place like DKIM tied to the message, it isn’t coming from the real sender.</span></p><h3 class="Typography__Header5-sc-pu0no3-13 kkkjZ" data-dcnode-id="702" id="subchapter-2"><span data-dcnode-id="703" instrument_node="">Landing Page URL</span></h3><p class="Body1-dc894c-0 Typography__Body1-sc-pu0no3-0 styles__ColoredBody1-sc-12uidqw-4 lbSeQ caMdaO eYowAQ c-n" data-dcnode-id="698"><span data-dcnode-id="701" instrument_node="">The URL of the landing page the email sends you to will always give away a phishing attempt. The example above is a bit tricky because the beginning of the URL looks pretty legitimate. It tries to trick you with the `mailgun-com,` hoping that your eyes will gloss over the fact that it isn’t our website. If that isn’t enough, the rest of the URL is just as bogus. </span><b data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Always be sure to double-check the URL anytime you are sent a message asking for personal information.&nbsp;</span></b></p><h2 class="Header2-p6jleu-0 Typography__Header2-sc-pu0no3-10 VDDae keEKNv c-n" data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">What else can you do?</span></h2><p class="Body1-dc894c-0 Typography__Body1-sc-pu0no3-0 styles__ColoredBody1-sc-12uidqw-4 lbSeQ caMdaO eYowAQ c-n" data-dcnode-id="690"><span data-dcnode-id="695" instrument_node="">Outside of being vigilant about phishing attempts, there are some added steps you can take to keep yourself and your data protected. For starters, make sure you have </span><a class="StyledLink__ExternalLink-sc-r09we5-1 kpoUdG" data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mailgun.com/blog/lock-it-down-2-factor-authentication-account-security" rel="noopener noreferrer" target="_tabs"><u data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">2FA enabled</span></u></a><span data-dcnode-id="691" instrument_node=""> on every account you have. This added security measure makes it much harder for spammers to access your information. Consider using password generators and password banks to update your passwords regularly, just in case you have to update your login credentials in a pinch.&nbsp;</span></p><p class="Body1-dc894c-0 Typography__Body1-sc-pu0no3-0 styles__ColoredBody1-sc-12uidqw-4 lbSeQ caMdaO eYowAQ c-n" data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">Beyond that, </span><b data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">it’s imperative that you inform the company that is being spoofed and the ESP the phishing email is coming from.</span></b><span data-dcnode-id="686" instrument_node=""> Once they are made aware of the situation, the company in question and the ESP can work on mitigating the reach of spammers sending out those messages.&nbsp;</span></p><p class="Body1-dc894c-0 Typography__Body1-sc-pu0no3-0 styles__ColoredBody1-sc-12uidqw-4 lbSeQ caMdaO eYowAQ c-n" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Should you suspect that you’ve received phishing attempts that look like they’re coming from Mailgun, please send your message headers to abuse@mailgun.com. We’ll take it from there.&nbsp;</span></p></div><div class="styles__DivCardsProfil-sc-12uidqw-8 cOIJra" data-dcnode-id="668"><a class="StyledLink-sc-r09we5-0 gtsqBP" data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mailgun.com/blog/author/the-mailgun-team/"><div class="styles__CardProfilContainer-sc-lstshh-0 dzMPWh" data-dcnode-id="670"><div class="styles__ImageContainer-sc-lstshh-1 dNFFHk" data-dcnode-id="676"><div class="ImageDiv-sc-1f29tny-0 kcNpys" data-dcnode-id="677"><picture class="Image-sc-1280wnm-0 styles__RoundedImage-sc-lstshh-2 jnAGSw ksfjbI" data-dcnode-id="678"><source data-dc
