</span><h1 data-dcnode-id="436"><img alt="Beware of Sealcoating Con Artists!" data-dcnode-id="449" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.precisionmaint.com/images/images.aspx%3Fwidth%3D85%26height%3D95&amp;raw" style="border-bottom: 0px solid; border-left: 0px solid; margin: 2px 5px; width: 85px; float: left; height: 95px; border-top: 0px solid; border-right: 0px solid"><br data-dcnode-id="448"><span data-dcnode-id="447" instrument_node="">
BEWARE OF SCAMS!</span><br data-dcnode-id="446"><span data-dcnode-id="445" instrument_node="">
</span><span data-dcnode-id="441" style="font-size: medium"><span data-dcnode-id="444" instrument_node="">&nbsp;11 Warning Signs&nbsp;of a</span><br data-dcnode-id="443"><span data-dcnode-id="442" instrument_node="">
</span></span><span data-dcnode-id="437" style="font-size: large"><span data-dcnode-id="440" instrument_node="">&nbsp;SEALCOATING SCAM ARTIST</span><br data-dcnode-id="439"><span data-dcnode-id="438" instrument_node="">
</span></span></h1><span data-dcnode-id="435" instrument_node="">
</span><ol data-dcnode-id="376"><span data-dcnode-id="434" instrument_node="">
</span><li data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">One of the biggest scams in asphalt contracting is the “I have extra material” line.&nbsp; Any reputable sealing&nbsp; contractor will have very little sealer left after a job is complete.&nbsp; Also sealer does not go bad as long as it does not freeze so there is no rush to get rid of it, if it is about to freeze it's too cold to apply sealcoating anyway.</span></li><span data-dcnode-id="431" instrument_node="">
</span><li data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Any contractor that knocks on your door should only tell you one thing; that he left his shop with nothing to do that day and is now out trying to drum up some work.&nbsp;</span></li><span data-dcnode-id="428" instrument_node="">
</span><li data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Soliciting door to door is also illegal in most towns.</span></li><span data-dcnode-id="425" instrument_node="">
</span><li data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Beware of anyone who does not have their truck lettered.</span></li><span data-dcnode-id="422" instrument_node="">
</span><li data-dcnode-id="410"><strong data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">What is commonly called "OIL BASED SEALER"&nbsp;</span></strong><span data-dcnode-id="411" style="color: #800000"><span data-dcnode-id="419" instrument_node=""> IS ILLEGAL IN THE STATE OF NEW JERSEY and most states on the Eastern Seaboard.</span><span data-dcnode-id="417" style="background-color: rgb(255, 255, 0);"><span data-dcnode-id="418" instrument_node=""> </span></span><strong data-dcnode-id="414"><span data-dcnode-id="415" style="background-color: rgb(255, 255, 0);"><span data-dcnode-id="416" instrument_node="">An example of this is depicted in the photo below.</span></span></strong><img alt="" data-dcnode-id="413" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.precisionmaint.com/images/asphalt/IMG_0864.aspx%3Fwidth%3D450%26height%3D337&amp;raw" style="width: 450px; height: 337px; float: right; margin: 5px;"><span data-dcnode-id="412" instrument_node=""> </span></span></li><span data-dcnode-id="409" instrument_node="">
</span><li data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">If a deal sounds to good to be true. IT IS!</span></li><span data-dcnode-id="406" instrument_node="">
</span><li data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Ask for references, exact addresses, tell them to come back after you have had a chance to go look at them... and do go look.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></li><span data-dcnode-id="403" instrument_node="">
</span><li data-dcnode-id="397"><span data-dcnode-id="402" instrument_node="">If a contractor says that a price is for “today only,” or “working in your area this week only” that usually means that he is what’s called a “Traveller". &nbsp;Traveller's or more commonly called "Gypsies" move from state to state and town to town.&nbsp; After they have worn out their welcome, they move to a different state or town.&nbsp; These people usually have out of state license plates, fancy trucks, and a reason you need to do the work right now. </span><span data-dcnode-id="399" style="color: #800000"><strong data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Always</span></strong></span><span data-dcnode-id="398" instrument_node=""> just take a moment to see if they are in the phone book, if they say they are new, call directory assistance, that few cent call could save you being taken advantage of.</span></li><span data-dcnode-id="396" instrument_node="">
</span><li data-dcnode-id="386"><span data-dcnode-id="395" instrument_node="">If the contractor you hire will only accept cash or wants the check made out to cash, BEWARE. </span><span data-dcnode-id="392" style="color: #800000"><strong data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Never</span></strong></span><span data-dcnode-id="391" instrument_node=""> make a check out to "cash" and if they insists on using their personal name ask for a valid driver's license &amp; copy all their information.&nbsp;</span><em data-dcnode-id="388"><strong data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">A reputable contractor will always ask for a check made out in the name of the business</span></strong></em><span data-dcnode-id="387" instrument_node="">.</span></li><span data-dcnode-id="385" instrument_node="">
</span><li data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">If in any doubt, ask for their contractor's license number, to see their drivers license, or certificates of insurance. If they just give you information verbally tell them to return the next business day after you have had a chance to verify their information.</span></li><span data-dcnode-id="382" instrument_node="">
</span><li data-dcnode-id="378"><strong data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">USE COMMON SENSE.</span></strong><span data-dcnode-id="379" instrument_node=""> While not every contractor who makes "cold calls" is disreputable many are, often others are brand new, inexperienced, and desperate for work.</span></li><span data-dcnode-id="377" instrument_node="">
</span></ol><span data-dcnode-id="375" instrument_node="">
</span><img alt="" data-dcnode-id="374" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.precisionmaint.com/images/asphalt/IMG_0800.aspx&amp;raw" style="width: 675px; height: 504px;"><br data-dcnode-id="373"><span data-dcnode-id="372" instrument_node="">
</span><u data-dcnode-id="368"><strong data-dcnode-id="369"><span data-dcnode-id="370" style="background-color: rgb(255, 255, 0);"><span data-dcnode-id="371" instrument_node="">This is what is commonly called a "Gypsie" rig. &nbsp;It has no agitation, therefore there is no way to add sand or additives. This type of container can be purchased by anyone for about $150.00. &nbsp;Make sure you know who you are dealing with.</span></span></strong></u><span data-dcnode-id="365" style="color: rgb(255, 255, 0);"><br data-dcnode-id="367"><span data-dcnode-id="366" instrument_node="">
</span></span><br data-dcnode-id="364"><span data-dcnode-id="363" instrument_node="">
</span><span data-dcnode-id="361" style="background-color: #99ccff"><span data-dcnode-id="362" instrument_node="">&nbsp;</span></span><strong data-dcnode-id="354"><a data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.precisionmaint.com/Commercial-Client-List.aspx"><span data-dcnode-id="358" style="background-color: #99ccff"><font color="#800080" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Commercial Client List</span></font></span></a><span data-dcnode-id="355" style="background-color: #99ccff"><span data-dcnode-id="356" instrument_node="">&nbsp;</span></span></strong><span data-dcnode-id="353" instrument_node=""> - We are know by the company we keep.
</span><p data-dcnode-id="323"><a data-dcnode-id="349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.precisionmaint.com/Get-A-Quoe.aspx"><span data-dcnode-id="350" style="color: #800000"><strong data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Get a Estimate</span></strong></span></a><strong data-dcnode-id="347"><span data-dcnode-id="348" instrument_node=""> </span></strong><span data-dcnode-id="346" instrument_node="">or</span><strong data-dcnode-id="344"><span data-dcnode-id="345" instrument_node=""> </span></strong><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.precisionmaint.com/CONTACT.aspx"><span data-dcnode-id="341" style="color: #800000"><strong data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">call us</span></strong></span></a><strong data-dcnode-id="338"><span data-dcnode-id="339" instrument_node=""> </span></strong><span data-dcnode-id="337" instrument_node="">for your parking lot or driveway sealcoating today.</span><br data-dcnode-id="336"><span data-dcnode-id="335" instrument_node="">
