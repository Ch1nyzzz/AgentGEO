dth: 500px)" srcset="https://img.saplingcdn.com/630x/clsd/getty/52c7f3d9fc204278810c212ae808ca1b"><source data-dcnode-id="495" media="(min-width: 300px)" srcset="https://img.saplingcdn.com/375/clsd/getty/52c7f3d9fc204278810c212ae808ca1b?type=webp" type="image/webp"><source data-dcnode-id="494" media="(min-width: 300px)" srcset="https://img.saplingcdn.com/375/clsd/getty/52c7f3d9fc204278810c212ae808ca1b"><span data-dcnode-id="493" instrument_node=""> </span><img alt="How to Report Food Stamp Fraud Online" class="picture__image" data-dcnode-id="492" height="3456" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.saplingcdn.com/375/clsd/getty/52c7f3d9fc204278810c212ae808ca1b&amp;raw" width="5184"></picture></div></div></div></div><span data-dcnode-id="486" instrument_node=""> </span><div class="component-caption-module" data-dcnode-id="477"><div class="caption__caption-text ui-label" data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">
    How to Report Food Stamp Fraud Online
  </span></div><span data-dcnode-id="483" instrument_node=""> </span><div data-dcnode-id="478"><div class="caption__attribution-text ui-label-bold" data-dcnode-id="479"><span class="caption__attribution-text-copy" data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Image Credit:</span></span><span data-dcnode-id="480" instrument_node="">
      JumpStock/iStock/GettyImages
    </span></div></div></div><span data-dcnode-id="476" instrument_node=""> </span></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="464"><p data-dcnode-id="466"><span data-dcnode-id="473" instrument_node="">The </span><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fns.usda.gov/snap/supplemental-nutrition-assistance-program-snap" rel="nofollow" target="_blank"><span data-dcnode-id="472" instrument_node="">Supplemental Nutrition Assistance Program</span></a><span data-dcnode-id="470" instrument_node=""> (SNAP) provides monthly food assistance benefits to low-income individuals and families throughout the country. </span><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fns.usda.gov/fraud/what-snap-fraud" rel="nofollow" target="_blank"><span data-dcnode-id="469" instrument_node="">SNAP fraud</span></a><span data-dcnode-id="467" instrument_node=""> costs taxpayers millions each year. The United States Department of Agriculture (USDA) actively fights fraud to help protect the taxpayers and ensure help is available to those truly in need. Among the common types of SNAP fraud includes trading benefits for cash and lying on an application to qualify. If you suspect an individual or retailer is committing fraud, you can file a report online.</span></p><span data-dcnode-id="465" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="457"><div class="inline-ad inline-ad--mobile" data-dcnode-id="458"><p class="inline-ad__label ui-label" data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">
      Advertisement
    </span></p><span data-dcnode-id="461" instrument_node=""> </span><div class="inline-ad__wrapper inline-ad__wrapper_runway" data-dcnode-id="459"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="1" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/dmd.sapling.mw/slot1-1" data-ad-refresh="false" data-ad-sizes="[[300,250]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_1&quot;}" data-ad-type="gpt" data-dcnode-id="460" id="slot1-1" reve-ad-refresh="false"></div></div></div></div><div class="component-article-section-heading article-section-content" data-dcnode-id="452"><div data-dcnode-id="453" id="usda-oig-hotline"><h2 data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">USDA OIG Hotline</span></h2><span data-dcnode-id="454" instrument_node="">
</span></div></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="442"><p data-dcnode-id="444"><span data-dcnode-id="451" instrument_node="">The </span><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fns.usda.gov/fraud/how-can-i-report-snap-fraud" rel="nofollow" target="_blank"><span data-dcnode-id="450" instrument_node="">USDA Office of the Inspector General</span></a><span data-dcnode-id="448" instrument_node=""> verifies and investigates SNAP fraud reports. You can report fraud online through the </span><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usda.gov/oig/hotline.htm" rel="nofollow" target="_blank"><span data-dcnode-id="447" instrument_node="">OIG Hotline</span></a><span data-dcnode-id="445" instrument_node="">. You'll need to select whether you want to remain confidential, use your name in the report or submit an anonymous complaint. If you want to remain confidential, your name will be revealed only to the OIG. If report anonymously, you won't be contacted to answer any follow-up questions the agency may have, which could hinder the investigation.</span></p><span data-dcnode-id="443" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="435"><div class="inline-ad inline-ad--mobile" data-dcnode-id="436"><p class="inline-ad__label ui-label" data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">
      Advertisement
    </span></p><span data-dcnode-id="439" instrument_node=""> </span><div class="inline-ad__wrapper inline-ad__wrapper_runway" data-dcnode-id="437"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="1" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/dmd.sapling.mw/slot1-2" data-ad-refresh="false" data-ad-sizes="[[300,250]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_2&quot;}" data-ad-type="gpt" data-dcnode-id="438" id="slot1-2" reve-ad-refresh="false"></div></div></div></div><div class="component-article-section-jwplayer-wrapper" data-dcnode-id="413"><div class="component-article-section-jwplayer" data-dcnode-id="414"><p class="component-article-section-jwplayer-label" data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">
      Video of the Day
    </span></p><span data-dcnode-id="432" instrument_node=""> </span><div class="component-article-section-jwplayer-container-outer" data-dcnode-id="415"><div class="component-article-section-jwplayer-container" data-dcnode-id="416"><div class="jw-error jw-reset" data-dcnode-id="420" id="lg-jwplayer" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="421"><div class="jw-icon jw-reset" data-dcnode-id="427"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="428" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="429"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="422"><div class="jw-error-text jw-reset-text" data-dcnode-id="423" data-nosnippet="" dir="auto"><span data-dcnode-id="426" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="425"></span><span data-dcnode-id="424" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div><span data-dcnode-id="419" instrument_node=""> </span><div data-dcnode-id="417" id="lg-jwplayer-close"><span class="close-x" data-dcnode-id="418"></span></div></div></div></div></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="409"><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">You can also file a report with your state. Generally, the state's department of human resources or social services handles SNAP fraud reports. If you are unsure of your state department's phone number, contact your local social services office and request the number from the clerk.</span></p><span data-dcnode-id="410" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="402"><div class="inline-ad inline-ad--mobile" data-dcnode-id="403"><p class="inline-ad__label ui-label" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">
      Advertisement
    </span></p><span data-dcnode-id="406" instrument_node=""> </span><div class="inline-ad__wrapper" data-dcnode-id="404"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="2" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/dmd.sapling.mw/slot1-3" data-ad-refresh="false" data-ad-sizes="[[300,250],[320,50],[320,100]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_3&quot;}" data-ad-type="gpt" data-dcnode-id="405" id="slot1-3" reve-ad-refresh="false"></div></div></div></div><div class="component-article-section-heading article-section-content" data-dcnode-id="397"><div data-dcnode-id="398" id="information-needed-for-the-report"><h2 data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Information Needed for the Report</span></h2><span data-dcnode-id="399" instrument_node="">
</span></div></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="393"><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">You'll need to provide as much information as possible to support your allegation. The investigating agency will need the subject's full name and address. If you don't know the complete address, provide the city and state. The OIG fraud complaint form asks what the subject does for work, what they did wrong, when the incident occurred, when you were made aware of the problem and what rule they violated. If you're reporting a retailer, list the owner's name if known.</span></p><span data-dcnode-id="394" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="386"><div class="inline-ad inline-ad--mobile" data-dcnode-id="387"><p class="inline-ad__label ui-label" data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">
      Advertisement
    </span></p><span data-dcnode-id="390" instrument_node=""> </span><div class="inline-ad__wrapper" data-dcnode-id="388"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="2" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/dmd.sapling.mw/slot1-4" data-ad-refresh="false" data-ad-sizes="[[300,250],[320,50],[320,100]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_4&quot;}" data-ad-type="gpt" data-dcnode-id="389" id="slot1-4" reve-ad-refresh="false"></div></div></div></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="382"><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Any supporting documents or evidence you have must be faxed to 202-690-2474 or mailed to USDA, OIG Hotline, P. O. Box 23399, Washington, D.C. 20026-3399. When submitting any documents, include a note stating that you filed a complaint online.</span></p><span data-dcnode-id="383" instrument_node="">
</span></div><div class="component-article-section-heading article-section-content" data-dcnode-id="377"><div data-dcnode-id="378" id="possible-reporting-rewards"><h2 data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Possible Reporting Rewards</span></h2><span data-dcnode-id="379" instrument_node="">
</span></div></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="370"><p data-dcnode-id="372"><span data-dcnode-id="376" instrument_node="">The federal government doesn't offer any rewards for reporting SNAP fraud, even if it leads to a conviction. However, your state may have a fraud reporting program. For example, the Florida Department of Children and Families administers the </span><a data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myflfamilies.com/service-programs/public-benefits-integrity/reward.shtml" rel="nofollow" target="_blank"><span data-dcnode-id="375" instrument_node="">Public Assistance Fraud Reward Program</span></a><span data-dcnode-id="373" instrument_node="">. Through the program, the person who reported fraud can receive up to 10 percent of the amount the agency is able to recover from the subject. The maximum reward is $500,000 for a single case. Check with your local agency to determine whether your state offers a reward program.</span></p><span data-dcnode-id="371" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="363"><div class="inline-ad inline-ad--mobile" data-dcnode-id="364"><p class="inline-ad__label ui-label" data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">
      Advertisement

</span></div></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="354"><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Suspected SNAP fraud is always reviewed and investigated if enough information was provided to the agency. If the investigation determines the subject isn't committing SNAP fraud, you won't be punished for the false allegation. If the suspect is found guilty of fraud, she may be permanently banned from the SNAP program. Depending on the type of fraud, she also may face criminal charges, which can lead to imprisonment.</span></p><span data-dcnode-id="355" instrument_node="">
