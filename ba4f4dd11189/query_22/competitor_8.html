</span><div class="content-block__description body-copy" data-dcnode-id="1132"><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Unfortunately, some job seekers may accidentally fall victim to job scams in Malaysia. Our recruitment consultants adhere to a structured process to ensure we maintain the highest level of integrity.</span></p></div><span data-dcnode-id="1131" instrument_node="">

</span><h2 class="content-block__title" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">what is a job scam?</span></h2><span data-dcnode-id="1105" instrument_node="">
</span><div class="content-block__description body-copy" data-dcnode-id="1102"><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Recruitment scams often involve fake online job ads in social platforms and untrusted job portals offering high paying jobs. Victims may also receive unsolicited text messages, or messages from Facebook, Whatsapp, Telegram, WeChat or Viber that offers jobs that do not exist. Job scammers will ask victims to share personal information such as your mobile number OR transfer or remit a small sum of money to secure the fake interview or for more information about the fraud jobs.&nbsp;</span></p></div><span data-dcnode-id="1101" instrument_node="">
</span></div><span data-dcnode-id="1099" instrument_node="">
</span></div><span data-dcnode-id="1097" instrument_node="">
</span></div><span data-dcnode-id="1095" instrument_node="">

</span><div class="block__header" data-dcnode-id="1088"><span data-dcnode-id="1092" instrument_node="">
</span><h2 class="block__title" data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">
						how to spot fake job postings?
					</span></h2><span data-dcnode-id="1089" instrument_node="">
</span></div><span data-dcnode-id="1087" instrument_node="">
</span><div class="block__content block__content--s body-copy" data-dcnode-id="1052"><span data-dcnode-id="1086" instrument_node="">
</span><h4 class="title--xxs" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Identify fake job offers with this 10 warning signs of scam.</span></h4><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1082" instrument_node="">1. If money is involved. You’ve been asked to transfer money for medical check, work pass application or to attend the job interview</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">
2. The company has no website or official/corporate social media account&nbsp;</span><br data-dcnode-id="1079"><span data-dcnode-id="1078" instrument_node="">
3. Job offer sent from a personal email, a “noreply” email, and not from Randstad email domain</span><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">
4. You did not apply for the job</span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">
5. The job is too good to be true&nbsp;</span><br data-dcnode-id="1073"><span data-dcnode-id="1072" instrument_node="">
6. Job description is unclear or too short</span><br data-dcnode-id="1071"><span data-dcnode-id="1070" instrument_node="">
7. Poor use of the English language with multiple typos and grammatical errors in the job advertisement or text messages</span><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">
8. You found the job posting in a random social media community</span><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">
9. Communication channels are only limited to social media channels and messaging platforms such as Facebook, Whatsapp, Telegram, WeChat, Viber and etc.</span><br data-dcnode-id="1065"><span data-dcnode-id="1064" instrument_node="">
10. They ask you for your personal information such as your mobile number or ID photo on messaging platforms</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">When looking for a job, please do not respond to fraudulent job advertisements that are often shared in unsolicited Facebook groups or messaging platforms.&nbsp;</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">You should not respond to suspicious job offers in email or messaging platforms (Facebook Messenger, Whatsapp, Telegram, WeChat, Viber, etc.) or calls from unknown numbers.&nbsp;</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Remember that it is never safe to disclose your personal and/or banking details to anyone you do not know.&nbsp;</span></p><span data-dcnode-id="1053" instrument_node="">

</span><div class="content-block__description body-copy" data-dcnode-id="943"><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Beware of whatsapp messages claiming to offer job opportunities in exchange of any sum of money. Don't fall for this kind of fraud.</span></p></div><span data-dcnode-id="942" instrument_node="">

</span><h2 class="block__title" data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">
						how to report a scam?
					</span></h2><span data-dcnode-id="930" instrument_node="">
</span></div><span data-dcnode-id="928" instrument_node="">
</span><div class="block__content block__content--s body-copy" data-dcnode-id="897"><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">If you have been exposed to a fake job advertisement on a messaging platform or social media network, received a fake job offers in email or fraudulent job opportunity from an individual and/or organisation or are an unfortunate victim of such a job scam, we advise you to file an official report with the local police immediately.&nbsp;</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="920"><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mcmc.gov.my/en/make-a-complaint/make-a-complaint"><span data-dcnode-id="923" instrument_node="">File a report</span></a><span data-dcnode-id="921" instrument_node=""> with the local authorities. By reporting a scammer to the police, you are helping us raise awareness of job scams and protecting your family and friends from becoming victims of scams. Please provide the local police with all the information you have, such as:&nbsp;</span></p><span data-dcnode-id="919" instrument_node="">
</span><ul data-dcnode-id="902"><span data-dcnode-id="918" instrument_node="">
</span><li data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Sender’s name and contact information&nbsp;</span></li><span data-dcnode-id="915" instrument_node="">
</span><li data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">A copy of the fraudulent job advertisement&nbsp;</span></li><span data-dcnode-id="912" instrument_node="">
</span><li data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Your chat history with the individual and/or organisation</span></li><span data-dcnode-id="909" instrument_node="">
</span><li data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">The bank account details that you’ve been asked to remit money to&nbsp;</span></li><span data-dcnode-id="906" instrument_node="">
</span><li data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">The banking remittance details (if payment has already been made)&nbsp;</span></li><span data-dcnode-id="903" instrument_node="">
</span></ul><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">At Randstad, we do not condone any illegal activities carried out by individuals and/or organisations based on local laws. If you come across a job post that looks suspicious and you are unsure of, we advise you to call the respective Randstad offices directly to verify the job ad or mail us.</span></p><span data-dcnode-id="898" instrument_node="">
