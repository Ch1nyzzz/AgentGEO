</span><article class="post-244 post type-post status-publish format-standard hentry category-irs-whistleblower-program tag-how-to-report-tax-fraud tag-irs-fraud tag-irs-whistleblower-program-2 tag-report-tax-fraud-anonymously tag-tax-evasion tag-tax-fraud" data-dcnode-id="435" id="post-244"><span data-dcnode-id="573" instrument_node="">
</span><header class="entry-header" data-dcnode-id="561"><span data-dcnode-id="572" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">How To Report Tax Fraud Anonymously</span></h1><span data-dcnode-id="569" instrument_node="">
</span><div class="comments-link" data-dcnode-id="564"><span data-dcnode-id="568" instrument_node="">
</span><a data-dcnode-id="566" href="#comments"><span data-dcnode-id="567" instrument_node="">3 Replies</span></a><span data-dcnode-id="565" instrument_node=""> </span></div><span data-dcnode-id="562" instrument_node="">
</span></header><span data-dcnode-id="559" instrument_node="">
</span><div class="entry-content" data-dcnode-id="472"><span data-dcnode-id="558" instrument_node="">
</span><div class="at-above-post addthis_tool" data-dcnode-id="557" data-url="https://howtobeawhistleblower.org/how-to-report-tax-fraud-anonymously/"></div><h2 data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Curious about how to report tax fraud anonymously or how to report fraud to the IRS anonymously? We hope this IRS Whistleblower Information can answer some of your questions.</span></h2><span data-dcnode-id="554" instrument_node="">
</span><h3 data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">The IRS Whistleblower Program</span></h3><span data-dcnode-id="551" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="546" id="attachment_250" style="width: 160px"><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtobeawhistleblower.org/wp-content/uploads/2012/04/how-to-report-irs-tax-fraud.jpg"><img alt="How To Report Tax Fraud Anonymously" class="size-thumbnail wp-image-250" data-dcnode-id="550" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtobeawhistleblower.org/wp-content/uploads/2012/04/how-to-report-irs-tax-fraud-150x150.jpg&amp;raw" title="How To Report Tax Fraud Anonymously" width="150"></a><p class="wp-caption-text" data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">How To Report Tax Fraud Anonymously</span></p></div><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="544" instrument_node="">The </span><a data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtobeawhistleblower.org/whistleblower-programs/irs-whistleblower-program/" title="Information about the IRS Whistleblower Program"><span data-dcnode-id="543" instrument_node="">IRS Whistleblower Program</span></a><span data-dcnode-id="541" instrument_node=""> is a program placed in effect by the </span><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.irs.gov/" rel="nofollow" title="IRS Whistleblower Office"><span data-dcnode-id="540" instrument_node="">IRS Whistleblower Office</span></a><span data-dcnode-id="538" instrument_node="">. This </span><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtobeawhistleblower.org/whistleblower-programs/irs-whistleblower-program/" title="Information about the IRS Whistleblower Program"><span data-dcnode-id="537" instrument_node="">IRS Whistleblower Program</span></a><span data-dcnode-id="535" instrument_node=""> pays money to people who report tax fraud or other IRS fraud by blowing the whistle on persons or companies who fail to pay the tax that they owe. Upon filing an IRS Whistleblower Claim, the IRS </span><em data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">may</span></em><span data-dcnode-id="532" instrument_node=""> offer a whistleblower reward of up to 40% of the additional tax, penalty or other amounts it collects or recovers through from the IRS whistleblower action, but only if the IRS uses information provided by the whistleblower.</span></p><span data-dcnode-id="530" instrument_node="">
</span><h3 data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">How To Report Tax Fraud Anonymously</span></h3><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="526" instrument_node="">The IRS Whistleblower Claims must be submitted to the IRS Whistleblower Office under </span><strong data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">penalty of perjury</span></strong><span data-dcnode-id="523" instrument_node="">. There is a special IRS Whistleblower Claim Form (Form 211) and an application for a whistleblower award that must be completed and filed with the Internal Revenue Service Whistleblower Office. </span><strong data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">It is extremely important that you retain an experienced whistleblower lawyer to assist you in filing your Tax Fraud Claim or IRS Whistleblower Claim to maximize the likelihood of receiving a substantial whistleblower reward.</span></strong><span data-dcnode-id="520" instrument_node=""> Some examples of the detailed information that an experienced IRS Whistleblower Attorney will assist you with include the following:</span></p><span data-dcnode-id="518" instrument_node="">
</span><ul data-dcnode-id="504"><span data-dcnode-id="517" instrument_node="">
</span><li data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">If the IRS Whistleblower withholds available information or does not include the proper information, the IRS Whistleblower may not be considered by the IRS Whistleblower Office in making any whistleblower award determination.</span></li><span data-dcnode-id="514" instrument_node="">
</span><li data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">If the documents or supporting evidence are known to the IRS Whistleblower but not in his/her possession, there is a certain way these documents should be described by the IRS Whistleblower to identify their location and relevance.</span></li><span data-dcnode-id="511" instrument_node="">
</span><li data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Generally, except in unusual instances, the IRS Whistleblower should include the whistleblower evidence with the initial submission to the IRS Whistleblower Office.</span></li><span data-dcnode-id="508" instrument_node="">
</span><li data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Our IRS Whistleblower Attorneys will assist IRS Whistleblowers with organizing exhibits, preparing documents, and exhibits for the IRS Whistleblower Office.</span></li><span data-dcnode-id="505" instrument_node="">
</span></ul><span data-dcnode-id="503" instrument_node="">
</span><div data-dcnode-id="500" id="call-to-action"><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtobeawhistleblower.org/free-whistleblower-consultation" title="Free Whistleblower Consultation"><span data-dcnode-id="502" instrument_node="">Speak With A Whistleblower Attorney Today!</span></a></div><span data-dcnode-id="499" instrument_node="">
</span><h3 data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">How To Report Tax Evasion Anonymously</span></h3><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="495" instrument_node="">The IRS places strict requirements on whistleblowers seeking awards but also desiring to remain anonymous. Typically this is not allowed; however, by retaining an experienced Whistleblower lawyer, you may be able to retain some form of anonymity or protection from retaliation upon bringing an IRS Whistleblower Claim. It is important to discuss your rights and options with an experienced whistleblower attorney before you blow the whistle. You may complete our </span><a data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtobeawhistleblower.org/free-whistleblower-consultation" title="Free Whistleblower Consultation Form"><span data-dcnode-id="494" instrument_node="">free whistleblower consultation form</span></a><span data-dcnode-id="492" instrument_node=""> for a case review with no cost or obligation to you.</span></p><span data-dcnode-id="490" instrument_node="">
</span><h3 data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">How The Whistleblower Law Firm of Gilman Law LLP Can Help</span></h3><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="486" instrument_node="">Our firm assist whistleblowers with filing whistleblower claims in many different Government Whistleblower Programs. Most of these whistleblower programs offer significant whistleblower awards, as well as whistleblower protection against retaliation. If you feel like you have witnessed corporate fraud, tax fraud, or other wrongful conduct, you may contact our whistleblower law firm confidentially and toll free at (888) 252-0048, or complete our online </span><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtobeawhistleblower.org/free-whistleblower-consultation" title="Free Whistleblower Consultation"><span data-dcnode-id="485" instrument_node="">free consultation form</span></a><span data-dcnode-id="483" instrument_node=""> for a free whistleblower case review.</span></p><span data-dcnode-id="481" instrument_node="">
</span><div class="at-below-post addthis_tool" data-dcnode-id="475" data-url="https://howtobeawhistleblower.org/how-to-report-tax-fraud-anonymously/"></div><span data-dcnode-id="473" instrument_node=""> </span></div><span data-dcnode-id="470" instrument_node="">
