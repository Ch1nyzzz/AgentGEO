="true" aria-label="" class="icl-Button icl-Button--secondary icl-Button--lg icl-Button--block css-u42zq4 e8ju0x51" data-dcnode-id="1936"><span class="icl-ButtonIcon" data-dcnode-id="1938"><svg aria-label="save-icon" class="icl-Icon icl-Icon--inheritColor icl-Icon--sm" data-dcnode-id="1939" focusable="false" role="img" viewbox="0 0 18 18"><g data-dcnode-id="1940"><path d="M12.38,2.25A4.49,4.49,0,0,0,9,3.82,4.49,4.49,0,0,0,5.63,2.25,4.08,4.08,0,0,0,1.5,6.38c0,2.83,2.55,5.15,6.41,8.66L9,16l1.09-1C14,11.52,16.5,9.21,16.5,6.38A4.08,4.08,0,0,0,12.38,2.25ZM9.08,13.91L9,14l-0.08-.08C5.35,10.68,3,8.54,3,6.38A2.56,2.56,0,0,1,5.63,3.75,2.93,2.93,0,0,1,8.3,5.52H9.7a2.91,2.91,0,0,1,2.67-1.77A2.56,2.56,0,0,1,15,6.38C15,8.54,12.65,10.68,9.08,13.91Z" data-dcnode-id="1941"></path></g></svg></span><span data-dcnode-id="1937"></span></button></div></div></div></div></div><div class="mosaic-zone" data-dcnode-id="1930" id="mosaic-belowViewjobButtons"></div><div class="mosaic mosaic-provider-jobsearch-feedback" data-dcnode-id="1929" id="mosaic-provider-jobsearch-feedback"></div></div></div><div class="icl-u-lg-block icl-u-lg-mt--md" data-dcnode-id="1926" id="saveJobInlineCalloutContainer"></div></div><div data-dcnode-id="1924"></div></div><div class="jobsearch-JobComponent-embeddedBody" data-dcnode-id="1771"><div class="mosaic-zone" data-dcnode-id="1922" id="mosaic-aboveExtractedJobDescription"></div><div class="jobsearch-JobComponent-description jobsearch-JobComponent-description--embedded icl-u-xs-mb--md" data-dcnode-id="1790"><div class="mosaic-zone" data-dcnode-id="1921" id="mosaic-jobHighlights"></div><div class="mosaic-zone" data-dcnode-id="1919" id="mosaic-aboveFullJobDescription"><div class="mosaic mosaic-provider-company-info-salary mosaic-rst" data-dcnode-id="1920" id="mosaic-provider-company-info-salary"></div></div><div class="jobsearch-jobDescriptionText" data-dcnode-id="1801" id="jobDescriptionText"><div data-dcnode-id="1802"><span data-dcnode-id="1918" instrument_node="">Do you want to lead in a dynamic, fast paced, customer and colleague centric environment? Do you have a passion for developing others whilst learning new skills and supporting customers with their financial needs? Are you an excellent communicator and passionate about getting it right first time for customers and colleagues alike using various channels? Can you think 'outside of the box', problem solve and have the desire to change, implement and own processes?
</span><br data-dcnode-id="1917"/><span data-dcnode-id="1916" instrument_node="">
</span><br data-dcnode-id="1915"/><span data-dcnode-id="1914" instrument_node="">
If you've answered yes to the above and want a new challenge then we want you!
</span><p data-dcnode-id="1903"><b data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">About us
</span></b><br data-dcnode-id="1911"/><span data-dcnode-id="1910" instrument_node="">
</span><br data-dcnode-id="1909"/><span data-dcnode-id="1908" instrument_node="">
We are Chase - part of the JPMorgan Chase family. We are a leading provider of traditional and digital financial services worldwide. We operate like a start-up, embedded within a leading global financial institution. We are working together in powerful partnership to ethically disrupt the financial services market in the UK. Our vision is to inspire and equip our customers to get more from their money, all from the palm of their hand, with our innovative and seamless mobile banking app, supported by our friendly and knowledgeable customer support team.
</span><br data-dcnode-id="1907"/><span data-dcnode-id="1906" instrument_node="">
</span><br data-dcnode-id="1905"/><span data-dcnode-id="1904" instrument_node="">
Our team is at the heart of building this new venture, focused on developing offerings that put the customer at the centre.
</span></p><p data-dcnode-id="1884"><b data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Chase UK - Fraud Team Leader
</span></b><br data-dcnode-id="1900"/><span data-dcnode-id="1899" instrument_node="">
</span><br data-dcnode-id="1898"/><span data-dcnode-id="1897" instrument_node="">
Our Fraud &amp; Financial Crime Operations team ensures our customers receive the best fraud detection and protection in the industry. Whether this involves credit card, debit card, and/or current accounts, our operational strategies are aimed at mitigating fraud losses to the Bank and our customers.
</span><br data-dcnode-id="1896"/><span data-dcnode-id="1895" instrument_node="">
</span><br data-dcnode-id="1894"/><span data-dcnode-id="1893" instrument_node="">
We are actively seeking Leaders to join our team and help us shape the future of banking for our customers. If you are successful we want you to bring your best self to work each day, encourage, develop and coach your team to provide an outstanding service in a culture built for success.
</span><br data-dcnode-id="1892"/><span data-dcnode-id="1891" instrument_node="">
</span><br data-dcnode-id="1890"/><span data-dcnode-id="1889" instrument_node="">
You will help to foster an exceptional &amp; unique culture. A culture that will evolve with each new addition and it will be your role to help ensure we have the right operational foundations in place to bring the very best out of people, helping them to live their best purposeful work life each and every day. You will be comfortable with thinking big but starting small, knowing the best ways to fuel our people power and drive exceptional performance.</span><br data-dcnode-id="1888"/><span data-dcnode-id="1887" instrument_node="">
</span><br data-dcnode-id="1886"/><span data-dcnode-id="1885" instrument_node="">
</span></p><ul data-dcnode-id="1879"><li data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Optimise performance across key operational KPI's, financials and people metrics, smashing team goals.
</span></li><li data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Work collaboratively with the relevant teams to continuously improve operational and business performance to optimise both the customer and employee experience
</span></li></ul><br data-dcnode-id="1878"/><span data-dcnode-id="1877" instrument_node="">
We are providing a 24/7 operation and looking to support our customers and colleagues 365 days a year.
</span><br data-dcnode-id="1876"/><span data-dcnode-id="1875" instrument_node="">
</span><br data-dcnode-id="1874"/><span data-dcnode-id="1873" instrument_node="">
We are looking for self-motivated Leaders with a passion for leading a team of 12 direct reports.
</span><br data-dcnode-id="1872"/><span data-dcnode-id="1871" instrument_node="">
</span><br data-dcnode-id="1870"/><span data-dcnode-id="1869" instrument_node="">
The work schedule will involve working on a rotational shift basis.
</span><p data-dcnode-id="1862"><b data-dcnode-id="1865"><span data-dcnode-id="1868" instrument_node="">To succeed in this role you will:</span><br data-dcnode-id="1867"/><span data-dcnode-id="1866" instrument_node="">
</span></b><br data-dcnode-id="1864"/><span data-dcnode-id="1863" instrument_node="">
</span></p><ul data-dcnode-id="1833"><li data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Be passionate &amp; curious about people, take extreme accountability, think commercially
</span></li><li data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Lead colleagues and self, through times of ambiguity
</span></li><li data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Be able to drive results through colleague engagement, creating a culture of success.
</span></li><li data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">Have excellent communication and presentation skills
</span></li><li data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Be customer centric with a real focus on 'out of the box thinking' to support resolutions and inquiries
</span></li><li data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Be Change Champion and owner for processes and products for colleagues and customers
</span></li><li data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Understand and research customer behaviour and share knowledge with wider team and peers
</span></li><li data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Become a multi-channel expert across all platforms and functions that we operate across
</span></li><li data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Have intrinsic passion to coach and support delivery of first class service to colleagues and customers
</span></li><li data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">Be a critical thinker - establish root cause and champion and own change to improve delivery
</span></li><li data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Be an advocate of our brand and lead and act as a role model to all colleagues and peers
</span></li><li data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Have passion to self-learn and develop others within their team and area
</span></li><li data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Have the ability to operate effectively in a virtual team working environment using empowerment to create a right first time culture for colleagues and customers
</span></li><li data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Identify ways to support inclusion and diversity
</span></li></ul><p data-dcnode-id="1826"><b data-dcnode-id="1829"><span data-dcnode-id="1832" instrument_node="">Essential Experience for this role:</span><br data-dcnode-id="1831"/><span data-dcnode-id="1830" instrument_node="">
</span></b><br data-dcnode-id="1828"/><span data-dcnode-id="1827" instrument_node="">
</span></p><ul data-dcnode-id="1807"><li data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Investigation Fraud experience required (Application fraud, First party fraud, Scam, Mules, Claims, Organized and complex fraud, Onboarding indemnity)
</span></li><li data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Experience dealing with the contingent reimbursement model (CRM)
</span></li><li data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Knowledge of key compliance frameworks and regulations such as AML, KYC, PEPS etc.
