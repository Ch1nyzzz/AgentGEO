-page" data-dcnode-id="283"><a data-dcnode-id="284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//join.liveops.com/about/contact/"><span data-dcnode-id="285" instrument_node="">Contact Us</span></a></li></ul></li></ul></div><div class="menu-cta" data-dcnode-id="275"><span data-dcnode-id="278" instrument_node=""> </span><a class="button button-orange" data-dcnode-id="276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//join.liveops.com/apply-now/" target="_self"><span data-dcnode-id="277" instrument_node="">Apply Now</span></a></div></div></div></div></div></div></div></header><main aria-hidden="true" data-dcnode-id="90" rol="main"><div class="section section-hero has-hero-text" data-dcnode-id="250" style="padding-bottom: 137px;"><div class="hero-image" data-dcnode-id="251"><span data-dcnode-id="267" instrument_node=""> </span><img alt="" class="main-image" data-dcnode-id="266" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//join.liveops.com/wp-content/uploads/sites/2/2021/02/Scam-Phone.jpg&amp;raw"><div class="hero-box-container" data-dcnode-id="252"><div class="w-container" data-dcnode-id="253"><span data-dcnode-id="265" instrument_node=""> </span><img alt="" class="badge-image" data-dcnode-id="264" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//join.liveops.com/wp-content/uploads/sites/2/2022/01/Website-Awards.png&amp;raw"><div class="w-row" data-dcnode-id="254"><div class="w-col" data-dcnode-id="255"><div class="hero-box has-bg bg-gray has-text-color text-light has-border border-blue border-size-thick has-text-align text-left has-padding padding-large" data-dcnode-id="256"><div class="hero-box-text" data-dcnode-id="257"><h1 class="p1" data-dcnode-id="261"><span data-dcnode-id="262" style="font-weight: 400;"><span data-dcnode-id="263" instrument_node="">Avoid Work-At-Home Scams</span></span></h1><p data-dcnode-id="258"><span data-dcnode-id="259" style="font-weight: 400;"><span data-dcnode-id="260" instrument_node="">Liveops takes your online safety and security seriously. Below is information to help you identify whether an opportunity is legitimate or a possible scam.</span></span></p></div></div></div></div></div></div></div></div><div class="section section-content has-bg bg-white has-text-color text-dark border-size-thick has-text-align text-left has-padding padding-medium" data-dcnode-id="235"><div class="content-wrapper" data-dcnode-id="236"><div class="w-container" data-dcnode-id="237"><div class="w-row" data-dcnode-id="238"><div class="w-col w-col-12" data-dcnode-id="239"><div class="content-styled" data-dcnode-id="240"><p data-dcnode-id="241" style="text-align: center;"><span data-dcnode-id="248" style="font-weight: 400;"><span data-dcnode-id="249" instrument_node="">If you have received a faulty 1099 form from Liveops, </span></span><span data-dcnode-id="244" style="text-decoration: underline;"><a data-dcnode-id="245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//share.hsforms.com/19PJRWl13SxuWPdgtSbKMfw4bv55"><span data-dcnode-id="246" style="font-weight: 400;"><span data-dcnode-id="247" instrument_node="">please complete the form here</span></span></a></span><span data-dcnode-id="242" style="font-weight: 400;"><span data-dcnode-id="243" instrument_node=""> and our team will connect with you.</span></span></p></div></div></div></div></div></div><div class="section section-image-content-advanced content-right has-bg bg-blue has-text-color text-light has-border border-orange border-size-thick has-text-align text-left has-padding padding-medium" data-dcnode-id="199"><div class="w-container" data-dcnode-id="200"><div class="w-row" data-dcnode-id="201"><div class="w-col-flex" data-dcnode-id="202"><div class="w-col w-col-6 w-col-medium-12" data-dcnode-id="230"><div class="image-content-advanced-image" data-dcnode-id="231"><div class="type-image" data-dcnode-id="232"><span data-dcnode-id="234" instrument_node=""> </span><img alt="" data-dcnode-id="233" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//join.liveops.com/wp-content/uploads/sites/2/2021/02/coatPhonescam.jpg&amp;raw"></div></div></div><div class="w-col w-col-6 w-col-medium-12" data-dcnode-id="203"><div class="image-content-advanced-content content-styled" data-dcnode-id="204"><h2 data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">What Liveops Does/Doesn’t Do</span></h2><p data-dcnode-id="225"><span data-dcnode-id="226" style="font-weight: 400;"><span data-dcnode-id="227" instrument_node="">For more than 20 years, Liveops has offered remote opportunities to agents in the United States. Recently there have been reports of fraudsters taking advantage of people who are looking for work-at-home opportunities. As a reminder: </span></span></p><p data-dcnode-id="222" style="padding-left: 40px;"><span data-dcnode-id="223" style="font-weight: 400;"><span data-dcnode-id="224" instrument_node="">• Liveops will only contact you after you have submitted an application at join.liveops.com</span></span></p><p data-dcnode-id="220" style="padding-left: 40px;"><span data-dcnode-id="221" instrument_node="">• Liveops representatives will never try to prove Liveops affiliation with a picture of a badge or other form of identification.</span></p><p data-dcnode-id="217" style="padding-left: 40px;"><span data-dcnode-id="218" style="font-weight: 400;"><span data-dcnode-id="219" instrument_node="">• All Liveops employees have @liveops.com email addresses</span></span></p><p data-dcnode-id="214" style="padding-left: 40px;"><span data-dcnode-id="215" style="font-weight: 400;"><span data-dcnode-id="216" instrument_node="">• We do not use Telegram, Skype, Whatsapp or other messaging platforms to conduct interviews</span></span></p><p data-dcnode-id="211" style="padding-left: 40px;"><span data-dcnode-id="212" style="font-weight: 400;"><span data-dcnode-id="213" instrument_node="">• We will never send you a check for equipment</span></span></p><p data-dcnode-id="208" style="padding-left: 40px;"><span data-dcnode-id="209" style="font-weight: 400;"><span data-dcnode-id="210" instrument_node="">• Liveops will never ask for your social media profile information or passwords</span></span></p><p data-dcnode-id="205" style="padding-left: 40px;"><span data-dcnode-id="206" style="font-weight: 400;"><span data-dcnode-id="207" instrument_node="">• At this time, Liveops doesn’t have a “data entry” position available</span></span></p></div></div></div></div></div></div><div class="section section-content has-bg bg-white has-text-color text-dark has-border border-light-gray border-size-thin has-text-align text-left has-padding padding-medium" data-dcnode-id="186"><div class="content-wrapper" data-dcnode-id="187"><div class="w-container" data-dcnode-id="188"><div class="w-row" data-dcnode-id="189"><div class="w-col w-col-12" data-dcnode-id="190"><div class="content-styled" data-dcnode-id="191"><h2 data-dcnode-id="197" style="text-align: center;"><span data-dcnode-id="198" instrument_node="">Application Process Chart</span></h2><p data-dcnode-id="194" style="text-align: center;"><span data-dcnode-id="195" style="font-weight: 400;"><span data-dcnode-id="196" instrument_node="">Here are some more ways to spot legitimate Liveops opportunities vs scams.</span></span></p><p data-dcnode-id="192" style="text-align: center;"><img alt="" class="alignnone wp-image-2874" data-dcnode-id="193" height="490" loading="lazy" sizes="(max-width: 651px) 100vw, 651px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//join.liveops.com/wp-content/uploads/sites/2/2021/03/Application-Process-Chart-300x226.jpg&amp;raw" srcset="https://join.liveops.com/wp-content/uploads/sites/2/2021/03/Application-Process-Chart-300x226.jpg 300w, https://join.liveops.com/wp-content/uploads/sites/2/2021/03/Application-Process-Chart-1024x771.jpg 1024w, https://join.liveops.com/wp-content/uploads/sites/2/2021/03/Application-Process-Chart-768x579.jpg 768w, https://join.liveops.com/wp-content/uploads/sites/2/2021/03/Application-Process-Chart.jpg 1200w" width="651"></p></div></div></div></div></div></div><div class="section section-image-content has-bg bg-dark-blue has-text-color text-light border-size-medium has-text-align text-left" data-dcnode-id="157"><div class="section-wrapper image-content-wrapper image-content-left" data-dcnode-id="158"><div class="image-content-image" data-dcnode-id="183"><span data-dcnode-id="185" instrument_node=""> </span><img alt="" data-dcnode-id="184" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//join.liveops.com/wp-content/uploads/sites/2/2021/02/WomanCalculater.jpg&amp;raw"></div><div class="image-content-content has-border border-blue border-size-medium" data-dcnode-id="159"><div class="content-styled" data-dcnode-id="160"><h2 data-dcnode-id="180" style="text-align: left;"><b data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Need Assistance?</span></b></h2><p data-dcnode-id="172" style="text-align: left;"><span data-dcnode-id="178" style="font-weight: 400;"><span data-dcnode-id="179" instrument_node="">Not sure if you’re speaking with a real Liveops team member? Reach out! If you suspect something unusual in your process, feel free to connect with our team at </span></span><a data-dcnode-id="175" href="mailto:press@liveops.com"><span data-dcnode-id="176" style="font-weight: 400;"><span data-dcnode-id="177" instrument_node="">press@liveops.com</span></span></a><span data-dcnode-id="173" style="font-weight: 400;"><span data-dcnode-id="174" instrument_node="">. </span></span></p><h4 data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Think you’re a victim of a scam?</span></h4><p data-dcnode-id="161" style="text-align: left;"><span data-dcnode-id="168" style="font-weight: 400;"><span data-dcnode-id="169" instrument_node="">The best way to crack down on the bad actors is to report them. If you are a victim of fraudulent activity, we recommend that you contact your local authorities, and also&nbsp;</span></span><span data-dcnode-id="164" style="text-decoration: underline;"><a data-dcnode-id="165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ic3.gov/"><span data-dcnode-id="166" style="font-weight: 400;"><span data-dcnode-id="167" instrument_node="">file a complaint with the FBI</span></span></a></span><span data-dcnode-id="162" style="font-weight: 400;"><span data-dcnode-id="163" instrument_node="">.</span></span></p></div></div></div></div><div class="section section-cards has-bg bg-light-gray has-text-color text-dark has-border border-blue border-size-medium has-text-align text-left has-padding padding-medium" data-dcnode-id="91"><div class="section-content content-before" data-dcnode-id="146"><div class="w-container" data-dcnode-id="147"><div class="w-row" data-dcnode-id="148"><div class="w-col" data-dcnode-id="149"><div class="content-styled content-wide" data-dcnode-id="150"><h2 data-dcnode-id="154" style="text-align: center;"><b data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">Resources</span></b></h2><p data-dcnode-id="151" style="text-align: center;"><span data-dcnode-id="152" style="font-weight: 400;"><span data-dcnode-id="153" instrument_node="">Learn more about common red flags and tips to avoid being a victim of work-at-home scams.</span></span></p></div></div></div></div></div><div class="section-wrapper comparison-table-wrapper" data-dcnode-id="92"><div class="w-container" data-dcnode-id="93"><div class="w-row cards-row" data-dcnode-id="94"><div class="w-col w-col-3 w-col-medium-6" data-dcnode-id="129"><div class="card" data-dcnode-id="130"><span data-dcnode-id="145" instrument_node=""> </span><a class="card-link" data-dcnode-id="138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveops.com/virtual-agents
