</span><h2 data-dcnode-id="1131" id="h.bd6ugyvt3qep"><span data-dcnode-id="1132" instrument_node="">Common Work-From-Home Scams — What They Are and How to Avoid Them</span></h2><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Another vital work-at-home strategy that doesn’t get as much attention — but should — is avoiding work-from-home scams.</span></p><div class="money-content" data-dcnode-id="1117" id="money-1843181170"><div data-dcnode-id="1118" style="border:1px solid #CACACA; padding:20px; margin-bottom:20px;"><img data-dcnode-id="1127" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2019/02/the-motley-fool-logo-300x82.png&amp;raw" width="125px"><br data-dcnode-id="1126"><span data-dcnode-id="1119" style="font-size:15px; line-height:160%;"><span data-dcnode-id="1125" instrument_node="">Motley Fool Stock Advisor recommendations have an </span><strong data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">average return of 618%</span></strong><span data-dcnode-id="1122" instrument_node="">. For $79 (or just $1.52 per week), join more than 1 million members and don't miss their upcoming stock picks. 30 day money-back guarantee. </span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/motley-fool-stock-advisor/incontent" rel="nofollow" style="text-decoration:underline;" target="_blank"><span data-dcnode-id="1121" instrument_node="">Sign Up Now</span></a></span></div></div><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1115" instrument_node="">The temptation to increase earnings with active and </span><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/strategies-for-earning-passive-income/"><span data-dcnode-id="1114" instrument_node="">passive income streams</span></a><span data-dcnode-id="1112" instrument_node="">&nbsp;is great, especially in tough economic times and for those not presently working full time. Enterprising scammers prey on our natural inclination to maximize the economic value of our work. When they succeed, they leave us worse off — financially and psychologically — than before.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">While individual work-at-home scams often crop up and disappear faster than the authorities can track them, many take on familiar, easy-to-recognize forms.&nbsp;Common work-from-home scams include:</span></p><span data-dcnode-id="1107" instrument_node="">
</span><ul data-dcnode-id="1096"><li data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">“Middleman” opportunities, such as forwarding packages or cashing checks for a third party</span></li><li data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">In-home manufacturing and assembly</span></li><li data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Pyramid schemes</span></li><li data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Ill-defined “business opportunities”</span></li><li data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Gray-area pursuits that can be legitimate but often aren’t, such as mystery shopping and medical billing</span></li></ul><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1094" instrument_node="">Yes, work-from-home scams abound. But there are also plenty of tips for spotting and avoiding them. Keep these tips close at hand as you seek out </span><a data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/ways-make-money-from-home/"><span data-dcnode-id="1093" instrument_node="">legitimate ways to earn income from home</span></a><span data-dcnode-id="1091" instrument_node=""> through remote work.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1087"><img alt="Businessman Stacking Blocks With Dollar Signs Pypramid Scheme" class="wp-image-253734" data-dcnode-id="1088" height="455" loading="lazy" sizes="(max-width: 810px) 100vw, 810px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2011/02/businessman-stacking-blocks-with-dollar-signs-pypramid-scheme-810x455.jpg&amp;raw" srcset="https://www.moneycrashers.com/wp-content/uploads/2011/02/businessman-stacking-blocks-with-dollar-signs-pypramid-scheme-810x455.jpg 810w, https://www.moneycrashers.com/wp-content/uploads/2011/02/businessman-stacking-blocks-with-dollar-signs-pypramid-scheme-918x516.jpg 918w, https://www.moneycrashers.com/wp-content/uploads/2011/02/businessman-stacking-blocks-with-dollar-signs-pypramid-scheme-90x51.jpg 90w" width="810"></figure><span data-dcnode-id="1086" instrument_node="">
</span><h3 data-dcnode-id="1084" id="h.njhgvc2wtw4u"><span data-dcnode-id="1085" instrument_node="">Starting Your Own Internet Business</span></h3><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">This scam sounds like a dream come true: a plug-and-play business (often advertised as a “proven system” or “business-in-a-box”) you can run and scale without ever leaving the house, earning thousands of dollars per month in short order.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">There’s just one catch: Before you get started, you need to pay for expert “coaching” and other vague services that (the offer claims) are essential to your success. These services can cost thousands when all is said and done.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">If they’re even delivered — and the worst of these scammers simply pocket victims’ money without providing anything in return — they’re not at all useful. Often, these “services” merely consist of information you can find on your own through open-source research.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">High-pressure sales is a defining feature of the Internet business scam. Scammers advertise offers as being available for a limited time only and relentlessly pressure those who express any interest to act before it’s too late.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1070" instrument_node="">According to a detailed fact sheet on Internet business scams produced by the </span><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumer.ftc.gov/articles/0140-starting-internet-business" target="_blank"><span data-dcnode-id="1069" instrument_node="">Federal Trade Commission (FTC)</span></a><span data-dcnode-id="1067" instrument_node="">, these pressure tactics often convince victims to purchase before doing basic research that would reveal the scam for what it is.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1064" instrument_node="">Rather than invest in an ambiguous coaching or business-in-a-box opportunity, the FTC recommends using legitimate </span><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sba.gov/business-guide" target="_blank"><span data-dcnode-id="1063" instrument_node="">Small Business Administration (SBA)</span></a><span data-dcnode-id="1061" instrument_node="">&nbsp;resources for Internet entrepreneurs. Among the other lessons from the SBA: There aren’t any shortcuts to building a successful online business.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><h3 data-dcnode-id="1057" id="h.wey2zzp5vksa"><span data-dcnode-id="1058" instrument_node="">Stuffing Envelopes</span></h3><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Envelope stuffing is one of the oldest and simplest work-from-home scams around.</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">The typical envelope-stuffing scam asks victims to pay a relatively small amount to learn how to make money stuffing and sending envelopes at home. In return, they become part of a rudimentary pyramid scheme: mailing solicitations for the same envelope-stuffing scam to others.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Envelope-stuffing victims usually receive payment only when one of their recipients responds to the offer, which rarely happens. Any revenue generated is unlikely to cover the initial startup fee, let alone postage and mailing costs.</span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">The “employer” offering the opportunity doesn’t get a cut, but that’s OK. They’ve already pocketed the startup fee, and they continue to advertise through low-cost online channels like Craigslist or spam email.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">A popular variant on this scam does deal the employer in by co-opting victims to promote their products or services. In such cases, the content of the envelope is just an ad for whatever the employer is selling.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><h3 data-dcnode-id="1039" id="h.obo1jk8wp3o3"><span data-dcnode-id="1040" instrument_node="">Forwarding Emails</span></h3><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">This scam is a digital version of the old-school envelope-stuffing scam.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Often delivered by email, the initial pitch advertises easy money through a vaguely defined opportunity involving email marketing. To get started, the victim must pay upfront for educational materials or software that the scammer claims are essential to the job.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">In some cases, the scammer simply pockets victims’ money and disappears. In others, they send useless material, often little more than an expanded version of the initial pitch with instructions to forward it to everyone in your address book.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">If any software is involved, it could be worse than useless. These scams are sometimes vectors for malicious spyware or adware that can impact your computer’s performance or facilitate </span><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/what-to-do-suspect-identity-theft-victim/"><span data-dcnode-id="1027" instrument_node="">identity theft</span></a><span data-dcnode-id="1025" instrument_node="">.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><h3 data-dcnode-id="1021" id="h.j68qgm12xjsz"><span data-dcnode-id="1022" instrument_node="">Forwarding Packages</span></h3><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">This scam seems simple enough. All the participant must do is respond to the offer with their address, wait for a package to arrive from Amazon or some other online retailer, and forward the package to a third address (covering shipping costs, of course).</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">The scam itself is simple. It could also put participants in legal jeopardy. That’s because package-forwarding victims often act as fronts for identity thieves attempting to conceal their true identities and location.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">The scammer uses stolen credit card or bank account information to purchase the packages, then sends them to unsuspecting victims’ addresses to throw law enforcement off their trail.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Unless the scammer is really foolish, they use a public address, such as a UPS Store, to pick up their packages — leaving victims in legal hot water.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><h3 data-dcnode-id="1006" id="h.dnvoa6peztb3"><span data-dcnode-id="1007" instrument_node="">Cashing Checks &amp; Wiring Money</span></h3><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Check-cashing scams are also simple and can have potentially devastating consequences for victims.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">One of the most common variations is the international payment processing scam. This scam asks the victim to open a bank account, cash fake checks on behalf of international clients, and wire most of the payment (less a processing fee for the victim) to a third party. When the bank discovers the check is fake, the victim is left holding the bag legally and financially.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Not all check-cashing scams involve work-from-home opportunities. Check scammers also prey on:</span></p><span data-dcnode-id="996" instrument_node="">
</span><ul data-dcnode-id="984"><li data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">People seeking roommates by sending fake checks to cover the security deposit&nbsp;or first month’s rent and asking the victim to wire funds for “moving expenses”</span></li><li data-dcnode-id="990"><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/government-imposter-scams/"><span data-dcnode-id="993" instrument_node="">Lottery or sweepstakes scams</span></a><span data-dcnode-id="991" instrument_node="">&nbsp;with fake checks for lump-sum prize payments and requests to wire payment for fees and taxes</span></li><li data-dcnode-id="985"><span data-dcnode-id="989" instrument_node="">People selling things on sites like eBay and </span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/types-common-craigslist-scams/"><span data-dcnode-id="988" instrument_node="">Craigslist</span></a><span data-dcnode-id="986" instrument_node="">&nbsp;by sending a phony check worth more than the total selling price and asking the victim to wire the difference</span></li></ul><span data-dcnode-id="983" instrument_node="">
</span><h3 data-dcnode-id="981" id="h.ancss7q19sn"><span data-dcnode-id="982" instrument_node="">In-Home Manufacturing &amp; Assembly</span></h3><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">So-called craft scams seem like an enticing proposition for people who enjoy working with their hands.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">They’re not. They’re a waste of time, money, or both.</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Craft scammers ask victims to pay hundreds of dollars (and sometimes more) for specialized assembly equipment, such as top-of-the-line sewing machines or printing contraptions, and the “high-quality” supplies needed to produce the advertised crafts. In exchange, they promise handsome pay for each completed piece.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Some craft scammers simply pocket victims’ payments and move on, never bothering to send equipment and supplies that don’t actually exist. Others do make good on the initial promise, though the actual cost of whatever they send is liable to be much lower than the victim’s upfront payment.</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Moving forward, they reject completed crafts on the grounds they don’t meet exacting quality standards, wasting hours of the victim’s valuable time before the victim finally gets wise.</span></p><span data-dcnode-id="965" instrument_node="">
</span><h3 data-dcnode-id="963" id="h.3j1lwbbfs4lr"><span data-dcnode-id="964" instrument_node="">Medical Billing</span></h3><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Some people really do have stable careers as work-from-home medical billing professionals, but competition for work in this field is fierce, and scams outnumber legitimate jobs. No matter how enticing the opportunity sounds, tread cautiously.</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Illegitimate medical billing opportunities typically ask victims to pay upfront for pricey software, training materials, or lead lists they claim are essential. But the material’s collective value is vastly overinflated.</span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">The software itself might not even work as advertised, and the lead lists might be publicly available rosters of hospitals and clinics rather than targeted lists of medical practitioners who’ve expressed interest in billing services, among other common problems.</span></p><span data-dcnode-id="953" instrument_node="">
</span><h3 data-dcnode-id="951" id="h.kgu7sr2raiqh"><span data-dcnode-id="952" instrument_node="">Data Entry</span></h3><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Data entry is another sometimes-legitimate work-from-home job that’s often fraudulent (or misleading, at minimum).</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Illegitimate data entry opportunities often resemble fraudulent medical billing opportunities, with pricey software that doesn’t work and training materials that don’t say anything new.</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Real data entry jobs don’t require upfront payment — the company provides the software for free — and typically involve company-provided rather than self-directed training.</span></p><span data-dcnode-id="941" instrument_node="">
</span><h3 data-dcnode-id="939" id="h.gcah92ntmdz5"><span data-dcnode-id="940" instrument_node="">Mystery Shopping</span></h3><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="937" instrument_node="">Mystery shopping can sometimes produce a net profit for participants. That said, even&nbsp;</span><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/what-is-mystery-shopping-companies-jobs/"><span data-dcnode-id="936" instrument_node="">legitimate mystery shopping opportunities</span></a><span data-dcnode-id="934" instrument_node=""> demand exceptional organizational skills and extreme diligence.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Few pay well. Most require participants to leave their homes and visit brick-and-mortar retailers, restaurants, and professional offices.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">And many are just scams — they serve as fronts for fake check scammers. The scammer sends a check upfront to cover the victim’s shopping costs on the condition that they return the merchandise and wire back the remaining balance (less the victim’s shopping fee).</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">In other cases, shady mystery shopping companies ask new shoppers to pay upfront for worthless training materials and promise work that never materializes.</span></p><span data-dcnode-id="923" instrument_node="">
</span><h3 data-dcnode-id="921" id="h.9yqv22pq1sk8"><span data-dcnode-id="922" instrument_node="">Multilevel Marketing Schemes</span></h3><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="919" instrument_node="">Like mystery shopping and medical billing, </span><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/multi-level-marketing-mlm/"><span data-dcnode-id="918" instrument_node="">multilevel marketing schemes&nbsp;(MLMs) </span></a><span data-dcnode-id="916" instrument_node="">&nbsp;can be profitable. But they’re often misleading and exploitative, putting later arrivals (those on the lowest levels of the scheme) at a considerable disadvantage.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">The line between legitimate (if potentially exploitative) MLMs and outright pyramid schemes can be subtle. It’s wise to avoid any MLM that emphasizes recruiting new “subs” — people lower on the ladder — over selling actual products.</span></p><span data-dcnode-id="911" instrument_node="">
</span><h2 data-dcnode-id="909" id="h.jkltlmx1nv9m"><span data-dcnode-id="910" instrument_node="">Red Flags of Work-From-Home Scams</span></h2><span data-dcnode-id="908" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="906"><img alt="Female Hands Counting Money Cash" class="wp-image-253735" data-dcnode-id="907" height="455" loading="lazy" sizes="(max-width: 810px) 100vw, 810px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2011/02/female-hands-counting-money-cash-810x455.jpg&amp;raw" srcset="https://www.moneycrashers.com/wp-content/uploads/2011/02/female-hands-counting-money-cash-810x455.jpg 810w, https://www.moneycrashers.com/wp-content/uploads/2011/02/female-hands-counting-money-cash-918x516.jpg 918w, https://www.moneycrashers.com/wp-content/uploads/2011/02/female-hands-counting-money-cash-90x51.jpg 90w" width="810"></figure><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Use these tips to assess every work-from-home offer that crosses your desk. While there are many variations on work-from-home scams, they often have several potential red flags in common.</span></p><span data-dcnode-id="902" instrument_node="">
</span><h3 data-dcnode-id="900" id="h.pcvmrbpx2j08"><span data-dcnode-id="901" instrument_node="">You Must Make an Upfront Investment or Provide Payment Information</span></h3><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Work-from-home opportunities that require participants to pay upfront for anything — supplies, equipment, software, training materials, or anything else — are almost always illegitimate.</span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Legitimate MLMs are a qualified exception, provided the opportunity’s sponsor can clearly and in detail demonstrate how the endeavor generates income.</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Otherwise, work-from-home jobs that require upfront investments are at best&nbsp;conduits for fraudsters to sell vastly overinflated products or knowledge. At worst, they’re fronts for criminals looking for credit card numbers to steal.</span></p><span data-dcnode-id="890" instrument_node="">
</span><h3 data-dcnode-id="888" id="h.608937sz0ra4"><span data-dcnode-id="889" instrument_node="">The Offer Makes Wild Claims About Passive Income Potential</span></h3><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Be skeptical of any offer that’s heavy on promises of outsize passive income with minimal work and short on specifics about what’s needed to achieve that result.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Dreamy stock photos of “employees” relaxing on a Tahitian beach or crushing Swiss powder tell you nothing about the job at hand, the reality of which is infinitely less glamorous — if it exists at all.</span></p><span data-dcnode-id="881" instrument_node="">
</span><h3 data-dcnode-id="879" id="h.obbjaohtw4o1"><span data-dcnode-id="880" instrument_node="">The Company Is Based Overseas</span></h3><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Legitimate job opportunities don’t stop at the water’s edge. Some of the world’s most employee-friendly companies are based overseas. Some lack any American presence at all.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">But legitimate international employers generally follow the same hiring practices as legitimate employers in the United States. Coupled with any other red flags, an international mailing address or phone number is a signal to tread cautiously.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">U.S. law enforcement authorities are even less likely to hold small-time fraudsters based overseas accountable for their actions than domestic crooks — many of whom take advantage of others for years without facing justice.</span></p><span data-dcnode-id="869" instrument_node="">
</span><h3 data-dcnode-id="867" id="h.lk5ui899pf1x"><span data-dcnode-id="868" instrument_node="">The Company Won’t Answer Basic Questions About the Job or Compensation</span></h3><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Legitimate job descriptions can be vague too. The difference is that legitimate employers are willing and able to provide detailed answers to basic questions about the organization’s structure, the scope of work, how employees or participants earn money, the likely amount of any compensation, the length and terms of any probationary period, and any other details candidates want to know before accepting a job offer.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">When asking for more information about a job posting, be especially stubborn about the onboarding process and any costs you must bear. Again, any requirement of upfront out-of-pocket payment is a giant red flag, but excessive paycheck deductions for supplies or company expenses also warrant scrutiny.</span></p><span data-dcnode-id="860" instrument_node="">
</span><h3 data-dcnode-id="858" id="h.f83ik6oiz257"><span data-dcnode-id="859" instrument_node="">The Only Interview Occurs by Email or Social Media Chat</span></h3><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Be wary of employers resistant to showing their faces (or voices) to job seekers.</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">By itself, an employer’s refusal to conduct video or phone interviews isn’t definitive proof of a scam, but it strongly suggests that the employer prefers to remain anonymous. The person hiding behind a random email address or social media chat handle could be anyone.</span></p><span data-dcnode-id="851" instrument_node="">
</span><h3 data-dcnode-id="849" id="h.1tt83u4spyii"><span data-dcnode-id="850" instrument_node="">Qualifying Opportunities Fail to Follow the FTC’s Business Opportunity Rule</span></h3><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Under FTC regulations, the sponsor of any qualifying business opportunity advertised to prospects in the United States must do two things upon request:</span></p><span data-dcnode-id="845" instrument_node="">
</span><ul data-dcnode-id="840"><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Issue a disclosure that identifies the sponsor, discloses any lawsuits or legal actions against the sponsor, spells out the cancellation or refund policy (if any), provides references, and discloses whether the sponsor makes any specific earnings claims about the opportunity.</span></li><li data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Issue a separate earnings claim statement if the opportunity makes any specific earnings claim. This statement must spell out the time frame during which the claimed earnings occurred and the percentage of participants achieving those results, among other details.</span></li></ul><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="838" instrument_node="">The </span><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ftc.gov/tips-advice/business-center/guidance/bogus-business-opportunities" target="_blank"><span data-dcnode-id="837" instrument_node="">FTC’s Bogus Business Opportunities</span></a><span data-dcnode-id="835" instrument_node="">&nbsp;guide provides more detail on sponsors’ obligations and recourse for prospects who believe they’ve been scammed.</span></p><span data-dcnode-id="833" instrument_node="">
</span><h3 data-dcnode-id="831" id="h.9yik21nazmqc"><span data-dcnode-id="832" instrument_node="">Research Using Trusted Sources Turns Up Little Information (or Negative Information) About the Company</span></h3><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Never agree to participate in a work-from-home opportunity without using trusted sources to research its sponsor. These include but aren’t limited to:</span></p><span data-dcnode-id="827" instrument_node="">
</span><ul data-dcnode-id="808"><li data-dcnode-id="822"><span data-dcnode-id="826" instrument_node="">The </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bbb.org/" target="_blank"><span data-dcnode-id="825" instrument_node="">Better Business Bureau</span></a><span data-dcnode-id="823" instrument_node="">, which compiles information (including customer complaints) about registered businesses and provides letter-grade ratings based on past complaint patterns</span></li><li data-dcnode-id="818"><span data-dcnode-id="821" instrument_node="">The Federal Trade Commission, which maintains the </span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ftc.gov/enforcement/consumer-sentinel-network" target="_blank"><span data-dcnode-id="820" instrument_node="">Consumer Sentinel Network</span></a></li><li data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">State consumer regulators and attorney general offices, which often publish information about enforcement actions against fraudsters with local victims</span></li><li data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Local and national media reports accessed through Google News and similar tools</span></li><li data-dcnode-id="809"><span data-dcnode-id="813" instrument_node="">Complaints on consumer websites like </span><a data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/yelp-business-owners-review/"><span data-dcnode-id="812" instrument_node="">Yelp</span></a><span data-dcnode-id="810" instrument_node="">, keeping in mind that not all complaints are accurate and plenty of folks have an ax to grind online</span></li></ul><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">An absence of consumer complaints or adverse actions against a work-from-home opportunity sponsor doesn’t necessarily mean it’s on the up and up. It could simply be a new fly-by-night opportunity that hasn’t been around long enough to attract scrutiny.</span></p><span data-dcnode-id="804" instrument_node="">
</span><h3 data-dcnode-id="802" id="h.akro0j895hpr"><span data-dcnode-id="803" instrument_node="">The Job Doesn’t Appear on Legitimate Job Boards</span></h3><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="800" instrument_node="">A work-from-home opportunity’s appearance on legitimate job boards like </span><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/flexjobs" rel="nofollow" target="_blank"><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">FlexJobs</span></strong></a><span data-dcnode-id="796" instrument_node="">, </span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indeed.com/" target="_blank"><span data-dcnode-id="795" instrument_node="">Indeed</span></a><span data-dcnode-id="793" instrument_node="">, and </span><a data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.monster.com/" target="_blank"><span data-dcnode-id="792" instrument_node="">Monster</span></a><span data-dcnode-id="790" instrument_node="">&nbsp;is not a guarantee the opportunity itself is legitimate. Clever scammers willing to pay for placement can advertise anywhere they want.</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">That said, jobs that have other red flags and appear only on more freewheeling sites like Reddit or Craigslist — or through low-cost channels like spam email and paid search ads — are significantly more likely to be scams.</span></p><span data-dcnode-id="785" instrument_node="">
</span><h2 data-dcnode-id="783" id="h.j1d4mntpaouj"><span data-dcnode-id="784" instrument_node="">Final Word</span></h2><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">This list of common work-from-home scams includes several opportunities that are almost always fraudulent, such as check forwarding and in-home assembly.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">It also includes opportunities that occupy a broad gray area between truly legitimate and fully fraudulent. Some mystery shopping and medical billing jobs are profitable. Those at the higher rungs of multilevel marketing schemes often do quite well for themselves.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="775" instrument_node="">Other opportunities not mentioned here hold out supplemental earning potential for workers confined to their homes, such as completing online surveys through </span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/survey-junkie" rel="nofollow" target="_blank"><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Survey Junkie</span></strong></a><span data-dcnode-id="771" instrument_node=""> and participating in digital </span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/make-money-focus-groups-product-testing/"><span data-dcnode-id="770" instrument_node="">focus groups or product testing panels</span></a><span data-dcnode-id="768" instrument_node="">.</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Since many of these opportunities are legitimate, it’s not fair to color them as scams. But anyone thinking about pursuing them must understand they can’t get rich doing so.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">In fact, that’s good advice for anyone considering any opportunity to earn extra income. The fact that you can supplement your income by doing something doesn’t make it worth your time.</span></p><span data-dcnode-id="760" instrument_node="">
