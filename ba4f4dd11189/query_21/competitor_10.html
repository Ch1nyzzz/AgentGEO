</span><section class="section with_sidebar" data-dcnode-id="291"><span data-dcnode-id="680" instrument_node="">
</span><div class="article_content" data-dcnode-id="346"><span data-dcnode-id="679" instrument_node="">
</span><article class="post-20110 post type-post status-publish format-standard hentry category-job-search category-tips-advice tag-job-search tag-candidate tag-tips-advice tag-scams tag-trust-safety" data-dcnode-id="508" id="post-20110"><span data-dcnode-id="678" instrument_node="">
</span><div class="content" data-dcnode-id="510"><span data-dcnode-id="677" instrument_node="">
</span><header class="entry-header" data-dcnode-id="665"><span data-dcnode-id="676" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Work From Home Scams | How to Detect and Avoid Them</span></h1><span data-dcnode-id="673" instrument_node=""> </span><p class="article_date" data-dcnode-id="667"><span data-dcnode-id="672" instrument_node="">
					September 25, 2019 </span><span class="archived_article" data-dcnode-id="669"><span data-dcnode-id="671" instrument_node=""> Archived</span><sup class="foot_note" data-callout="tooltip" data-dcnode-id="670" data-placement="bottom" title="Note: This post is over a year old"></sup></span><span data-dcnode-id="668" instrument_node=""> </span></p><span data-dcnode-id="666" instrument_node="">
</span></header><span data-dcnode-id="663" instrument_node="">
</span><div class="entry-content" data-dcnode-id="534"><span data-dcnode-id="662" instrument_node="">
</span><h1 data-dcnode-id="660" style="text-align: center; font-size: 1.8em;"><span data-dcnode-id="661" instrument_node="">What Are Work From Home Scams?</span></h1><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Advancements in technology have made remote work opportunities available to job seekers all around the globe. These roles offer greater convenience and flexibility than traditional office-based positions and are favored by freelancers, employees with growing families (and therefore, growing obligations), and many others who benefit from the flexible nature of working at home.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="652"><strong data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Home-based positions can be used as vehicles to carry out scams.</span></strong><span data-dcnode-id="653" instrument_node=""> Phony employers pretend to have positions available that allow job seekers to work remotely. Instead, job seekers are tasked with facilitating questionable acts that are often illegal.</span></p><span data-dcnode-id="651" instrument_node="">
</span><h2 data-dcnode-id="649" style="text-align: center; font-size: 1.5em;"><span data-dcnode-id="650" instrument_node="">What Is the Risk to You?</span></h2><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Some people may be willing to “try” a work from home position that seems faulty just because they do not think there will be any real risks posed to them. However, taking this approach may end poorly. Work from home scams have several risks to you, including long-term financial losses. In addition, a scammer seeking to make large purchases on your dime might advertise a work from home position and require you to send your credit card information, which may lead to severely damaged credit.</span></p><span data-dcnode-id="645" instrument_node="">
</span><h2 data-dcnode-id="643" style="text-align: center; font-size: 1.5em;"><span data-dcnode-id="644" instrument_node="">How to Spot Them</span></h2><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Work from home scams often feature “perks” that are too good to be true, such as a large income for minimal work. You might also find that the job posting requires you to call a “1-800” number for more information about the opportunity or that you must pay “startup” fees to begin.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Work from home scams typically encourage the job seeker to move quickly in securing the opportunity. Phrases like, “Call today,” “Apply right now,” or “Make money fast” might be featured because scammers do not want you to have ample time to doubt the opportunity. Instead, they want you to quickly apply, interview, and then hand over your personal information. Job postings that require you to move faster than you are comfortable with cannot be trusted.</span></p><span data-dcnode-id="636" instrument_node="">
</span><hr data-dcnode-id="635"><span data-dcnode-id="634" instrument_node="">
</span><h2 data-dcnode-id="632" style="text-align: center; font-size: 1.5em;"><span data-dcnode-id="633" instrument_node="">6 Major Red Flags</span></h2><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="628"><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">1. &nbsp;Cashing Bad Checks</span></strong></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">This scam requires an employee to deposit illegally-obtained money and transfer the funds to international recipients as an “Account Manager” or Sales Representative.” It relies on the employee transferring the stolen money from one fraud to another while obscuring the identities of both parties.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="621"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">2. Return Cash Scheme </span></strong></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">In this scam, the scammer will send the work from home employee a very large check to get their office started (i.e. – $3,500 instead of $1,500). The scammer will ask the person to cash the check but send back a smaller check to cover the difference. Eventually, the first check from the scammer will bounce, but the scammer will have already cashed in the real counter check that was sent back by the employee.</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="614"><strong data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">3. Stuffing Envelopes</span></strong></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">If you’ve ever held an administrative job, you have probably stuffed a few envelopes and would not find this work from home opportunity to be suspicious. However, an opportunity like this should cause concern because employees must pay startup fees. Then, they begin filling the envelopes to earn an income, but find that a series of “loopholes” that the scammer failed to mention prevents them from ever being compensated. Be wary of this classic con and its modern-day cousin, “Forwarding Emails.”</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="607"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">4. Entering Data</span></strong></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="605" instrument_node="">Data Entry is another common work function, but no one should be </span><i data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">paying</span></i><span data-dcnode-id="602" instrument_node="">&nbsp;you to perform this task. This “paid” opportunity might be accompanied by the promise of training materials and resources to get the employee started, but in the end, employees find that they have wasted their money on supplies they cannot use for a less-than-lucrative job with no leads.</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="597"><strong data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">5. Pyramid Scheme</span></strong></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">The progression of scams like this actually take the shape of a pyramid. If you answer this job advertisement, you will learn that the only way to earn money is to reel others in and profit from them joining, thus building the pyramid. The problem with Pyramid Schemes is that the product or service being peddled by current members to induct new members is rarely rooted in anything of substance. Job seekers who have become involved in hopes of earning an honest income usually find out about the illegitimacy of the product or service only after it is too late.</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="590"><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">6. Sending Packages</span></strong></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Anytime someone asks you to send or receive packages of which you cannot verify the contents, you should note this as a red flag. Most employers, remote or otherwise, are not willing to pay an employee solely to handle packages. Furthermore, the details surrounding the packages are usually murky; you will not know exactly where they are going, who they are from, or what purpose they serve. This scam may require you to pay money to get started and the chances of earning a real paycheck from this job are slim to none. What’s more, your public record might be compromised if authorities can tie you to any illegal activity concerning the packages.</span></p><span data-dcnode-id="586" instrument_node="">
</span><hr data-dcnode-id="585"><span data-dcnode-id="584" instrument_node="">
</span><h2 data-dcnode-id="582" style="text-align: center; font-size: 1.3em;"><span data-dcnode-id="583" instrument_node="">Precautions to Take</span></h2><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Protect yourself from work from home scams by learning as much as you can about home-based work. Reach out to your network of friends, family, and colleagues to gauge their knowledge of companies that offer legit remote work. If you come across a work from home opportunity that appears to be questionable, someone in your network may be able to tell you if they have encountered the organization and how their experience went.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="577" instrument_node="">Finding reputable home-based works starts with search queries. Working remotely is a convenience offered by many jobs, but searching specifically for ‘work from home jobs’ sends a message to the search engine (and scammers) that working remotely is your primary concern. Scammers include these words in their job titles and postings because they are hoping that people will be so concerned with working at home that they will take any opportunity that comes their way. Try using search queries that target the nature of the work, not just the location. To do this, try diversifying the terms you use. Instead of “work from home,” try search terms like </span><i data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">remote</span></i><span data-dcnode-id="574" instrument_node="">, </span><i data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">telework</span></i><span data-dcnode-id="571" instrument_node="">, and </span><i data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">telecommute</span></i><span data-dcnode-id="568" instrument_node="">.</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Trust your instincts. As an avid job seeker, you have reviewed dozens (perhaps hundreds) of job postings. You now have a trained eye when it comes to deciphering what is real vs. fake. This, coupled with your natural instincts that signal you when something is wrong, can help you to defend yourself against work from home scams.</span></p><span data-dcnode-id="563" instrument_node="">
</span><hr data-dcnode-id="562"><span data-dcnode-id="561" instrument_node="">
</span><h3 data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Resources and Reporting</span></h3><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="557" instrument_node="">The </span><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ftccomplaintassistant.gov/%23%26panel1-1"><span data-dcnode-id="556" instrument_node="">Federal Trade Commission</span></a><span data-dcnode-id="554" instrument_node=""> (FTC) not only serves as a useful resource but is also an agency through which job seekers can file reports about work from home scams.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="551" instrument_node="">Access the </span><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbb.org/northwest/accredited-business-directory"><span data-dcnode-id="550" instrument_node="">Better Business Bureau</span></a><span data-dcnode-id="548" instrument_node=""> (BBB) to verify the legitimacy of companies you find that offer work from home jobs. A company that is listed in the Accredited Business Directory of the BBB has been thoroughly vetted and assigned a letter grade based on its interaction with the public.</span></p><span data-dcnode-id="546" instrument_node="">
</span><hr data-dcnode-id="545"><span data-dcnode-id="544" instrument_node="">
</span><h4 data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Help ZipRecruiter Keep Our Community Safe</span></h4><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="540" instrument_node="">At ZipRecruiter, we care about our community and its safety. If you have encountered a suspicious job post, please let us know by clicking the “Report Job” link at the bottom of the posting, or email us to report any spam or fraudulent activity on the ZipRecruiter site at&nbsp;</span><a data-dcnode-id="538" href="mailto:trustandsafety@ziprecruiter.com" rel="nofollow noopener noreferrer"><span data-dcnode-id="539" instrument_node="">trustandsafety@ziprecruiter.com</span></a><span data-dcnode-id="537" instrument_node="">.</span></p><span data-dcnode-id="535" instrument_node="">
</span></div><span data-dcnode-id="533" instrument_node="">
