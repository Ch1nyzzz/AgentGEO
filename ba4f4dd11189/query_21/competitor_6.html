</span><div class="text-16 mb-24" data-dcnode-id="844" id="excerpt"><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Be wary of offers to start your own business, stuff envelopes, and mystery shop.</span></p><span data-dcnode-id="845" instrument_node="">
</span></div><span data-dcnode-id="843" instrument_node="">

</span><section class="article_body" data-dcnode-id="555"><span data-dcnode-id="806" instrument_node="">
</span><div class="px-16 md:px-0 max-w-3xl mx-auto" data-dcnode-id="625" id="post_content"><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="804" instrument_node="">Want to get paid handsomely while being your own boss? Rake in thousands of dollars each week? You don’t even need any skills, and won’t even have to leave your home! If it sounds too good to be true, then it probably is.</span><br data-dcnode-id="803"><br data-dcnode-id="802"><span data-dcnode-id="801" instrument_node="">Plenty of people are still out of work and looking for ways to earn money, ideally from their own homes, due to the ongoing pandemic. And data from the </span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ftc.gov/news-events/blogs/data-spotlight/2020/12/income-scams-big-promises-big-losses"><span data-dcnode-id="800" instrument_node="">Federal Trade Commission (FTC)</span></a><span data-dcnode-id="798" instrument_node=""> suggests that work-from-home scams, which really took off at the start of the pandemic early in 2020, are still a cause for concern. In fact, the FTC </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2019/work-at-home.html"><span data-dcnode-id="797" instrument_node="">reportedly</span></a><span data-dcnode-id="795" instrument_node=""> received nearly 60,000 fraudulent job complaints in 2020. That’s more than twice as many as in 2019, with a median loss to consumers of approximately $2,000.</span><br data-dcnode-id="794"><br data-dcnode-id="793"><span data-dcnode-id="792" instrument_node="">“We’ve seen a rise in reports of work from home scams during the pandemic,” says Chris Parker, host of the</span><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easyprey.com/"><span data-dcnode-id="791" instrument_node=""> Easy Prey Podcast</span></a><span data-dcnode-id="789" instrument_node="">, and founder of WhatIsMyIPAddress.com, who is based in Tustin, California. ”These scams are particularly attractive with people out of work, and companies trying to keep distance between their employees.”&nbsp;</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="784"><br data-dcnode-id="786"><span data-dcnode-id="785" instrument_node="">To avoid getting swindled by a fake work-from-home gig, be on the lookout for these common scams.</span></p><span data-dcnode-id="783" instrument_node="">
</span><h2 data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Cashing checks, mystery shopping, and more</span></h2><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="773"><strong data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Stuffing envelopes. </span></strong><span data-dcnode-id="777" instrument_node="">It may sound easy, because you don’t need to have skills, know-how, or special equipment to get started. You’ll be promised extra income quickly. The catch? You’ll usually owe </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//work.chron.com/stay-home-mailing-jobs-27898.html"><span data-dcnode-id="776" instrument_node="">a fee </span></a><span data-dcnode-id="774" instrument_node="">for supplies to get started.&nbsp;</span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="758"><br data-dcnode-id="771"><strong data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Starting your own business.</span></strong><span data-dcnode-id="768" instrument_node=""> Examples might include a </span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumer.ftc.gov/articles/when-business-offer-or-coaching-program-scam"><span data-dcnode-id="767" instrument_node="">coaching program</span></a><span data-dcnode-id="765" instrument_node=""> that tells you to follow a proven or low-cost system that requires a fee, and personal information, to get started. Another common </span><a data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ftc.gov/tips-advice/business-center/guidance/home-medical-billing-businesses"><span data-dcnode-id="764" instrument_node="">business hustle</span></a><span data-dcnode-id="762" instrument_node=""> is for </span><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//work.chron.com/degree-needed-job-medical-biller-3206.html"><span data-dcnode-id="761" instrument_node="">medical billing</span></a><span data-dcnode-id="759" instrument_node="">, a profession that takes some level of skill. Fraudsters might claim that no experience is necessary, and charge a fee to set you up with fake client lists and software, according to the FTC.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="750"><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Mystery shopper and order fulfillment scam.</span></strong><span data-dcnode-id="754" instrument_node=""> The scammer provides details about becoming&nbsp; a </span><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.idtheftcenter.org/mystery-shopper-scams-resurface-during-covid-19/"><span data-dcnode-id="753" instrument_node="">secret shopper</span></a><span data-dcnode-id="751" instrument_node="">, or doing order fulfillment from your home. Both involve&nbsp; placing orders online using your own credit cards. Fraudsters will then steal the money, and your personal information. The scammer will promise to reimburse you, which isn’t likely to happen, Parker says.&nbsp;</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Fraudsters may also provide stolen credit card information for you to use. “When the credit card details are provided by the scammer, the person is participating in the fraud by making purchases using stolen credit cards,” says Parker.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="739"><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Payment processing. </span></strong><span data-dcnode-id="743" instrument_node="">A scammer might ask you to deposit checks, money orders, or wire transfers into your own bank account, and then send the funds on to someone you don’t know, says Parker. You might be offered </span><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abc7ny.com/work-from-home-scam-consumer-protection-week-scams-money-mule/10379557/"><span data-dcnode-id="742" instrument_node="">a commission</span></a><span data-dcnode-id="740" instrument_node=""> in exchange, but the money may be stolen, and the check may bounce, putting you on the hook for fees.&nbsp;</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="730"><strong data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Online surveys.</span></strong><span data-dcnode-id="735" instrument_node=""> You may be asked to complete hundreds of surveys with the </span><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//us.norton.com/internetsecurity-privacy-participating-in-legitimate-surveys-what-personal-data-is-ok-to-give-away.html"><span data-dcnode-id="734" instrument_node="">promise of paymen</span></a><span data-dcnode-id="732" instrument_node="">t later on. However, it may be just a way for the scammer to steal personal information, or sell it to affiliate marketers, Parker says.</span><br data-dcnode-id="731"></p><span data-dcnode-id="729" instrument_node="">
</span><h2 data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Tips for spotting WFH scams</span></h2><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="725" instrument_node="">While it’s not always easy to spot a scam, the American Association of Retired Persons (</span><a data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2019/work-at-home.html"><span data-dcnode-id="724" instrument_node="">AARP</span></a><span data-dcnode-id="722" instrument_node="">) and the FTC offer several </span><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumer.ftc.gov/articles/how-avoid-scam%23signs"><span data-dcnode-id="721" instrument_node="">warning signs</span></a><span data-dcnode-id="719" instrument_node="">.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="702"><br data-dcnode-id="716"><br data-dcnode-id="715"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Tone of urgency. </span></strong><span data-dcnode-id="712" instrument_node="">Some scams, particularly </span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumer.ftc.gov/articles/how-recognize-and-avoid-phishing-scams"><span data-dcnode-id="711" instrument_node="">phishing attacks</span></a><span data-dcnode-id="709" instrument_node="">, might urge you to act quickly, and&nbsp; may tap into common marketing techniques. For instance, a job opportunity may be advertised as a limited time offer, or may encourage you to act quickly, or else lose out on a deep discount.</span><br data-dcnode-id="708"><strong data-dcnode-id="706"><br data-dcnode-id="707"></strong><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Paying a fee. </span></strong><span data-dcnode-id="703" instrument_node="">Before you can take advantage of a work-from-home opportunity, scammers may ask you to sign up for a membership, or pay for initial training, supplies, or products.&nbsp;</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="695"><strong data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Additionally,</span></strong><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node=""> you may get an unsolicited email, text, or call offering you work</span></strong><span data-dcnode-id="696" instrument_node="">. Be on the lookout for texts with spelling mistakes. The job opportunity may also skip the standard application and interview process. “Job seekers should be suspicious when the compensation doesn’t match the experience required for the job,” Parker says.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="691" instrument_node="">
</span><h2 data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Steps to Safeguard Yourself&nbsp;</span></h2><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="685"><br data-dcnode-id="687"><span data-dcnode-id="686" instrument_node="">Here are some suggestions for determining whether people or companies offering you work are legitimate.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="679"><br data-dcnode-id="683"><strong data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Check websites and social media.</span></strong><span data-dcnode-id="680" instrument_node=""> A lack of social media accounts, dormant social media accounts, or accounts that are only a few weeks or months old may be a cause for concern, Parker says.&nbsp;</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="662"><br data-dcnode-id="677"><strong data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Look up physical addresses on a map. </span></strong><span data-dcnode-id="674" instrument_node="">If your potential WFH employer has no physical location, it could be a red flag.</span><br data-dcnode-id="673"><br data-dcnode-id="672"><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Check review sites. </span></strong><span data-dcnode-id="669" instrument_node="">Sites such as </span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbb.org/"><span data-dcnode-id="668" instrument_node="">Better Business Bureau</span></a><span data-dcnode-id="666" instrument_node="">, a nonprofit that helps consumers verify the trustworthiness of businesses, and </span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trustpilot.com/"><span data-dcnode-id="665" instrument_node="">Trustpilot</span></a><span data-dcnode-id="663" instrument_node="">, a consumer review site of businesses can help you understand who you’re dealing with.&nbsp;</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="650"><br data-dcnode-id="660"><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Practice security hygiene. </span></strong><span data-dcnode-id="657" instrument_node="">Take simple steps, like making sure passwords are unique by using alphanumeric and upper and lower case letters for added strength, says </span><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//staysafeonline.org/about/ncsa-leadership/kelvin-coleman/"><span data-dcnode-id="656" instrument_node="">Kelvin Coleman</span></a><span data-dcnode-id="654" instrument_node="">, executive director of the National Cyber Security Alliance </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//staysafeonline.org/"><span data-dcnode-id="653" instrument_node="">(NCSA</span></a><span data-dcnode-id="651" instrument_node="">) in Washington, D.C. Additionally, make sure software is up to date, and consider going the extra mile by installing anti-virus software.&nbsp;</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="645"><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Take a step back.</span></strong><span data-dcnode-id="646" instrument_node=""> If something seems fishy, then pause and do some further investigating, says Parker. “Job seekers should always do their own leg work to make sure that any company offering them a job is real,” he adds.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="636"><br data-dcnode-id="643"><strong data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Contact authorities.</span></strong><span data-dcnode-id="640" instrument_node=""> If you think you’ve been phished or scammed, you can file a report on the FTC’s </span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.identitytheft.gov/"><span data-dcnode-id="639" instrument_node="">IdentityTheft.gov</span></a><span data-dcnode-id="637" instrument_node=""> site. Once you submit a report, you’ll receive a recovery plan targeted to different scenarios related to stolen personal information.&nbsp;</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="634" instrument_node="">Each state also has its own </span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/state-consumer"><span data-dcnode-id="633" instrument_node="">state consumer protection</span></a><span data-dcnode-id="631" instrument_node=""> office that may be able to assist you.&nbsp;</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Especially as the pandemic continues and many people are under financial pressure, “it’s important to stay vigilant when it comes to suspicious activity,” says Coleman. “The main piece of advice remote workers should follow is to think before you click and stay alert at all times.”</span></p><span data-dcnode-id="626" instrument_node="">
</span></div><span data-dcnode-id="624" instrument_node="">

ds that are paid to participating customers via the Stash Stock-Back program, are Not FDIC Insured, Not Bank Guaranteed, and May Lose Value. In order to earn stock in the program, the Stash Visa Debit card (Stock-Back® Card) must be used to make a qualifying purchase. What doesn’t count: Cash withdrawals, money orders, prepaid cards, and P2P payment. If publicly-traded stock of the merchant (or a subsidiary thereof, if applicable) is not available or otherwise capable of being fulfilled for any reason, the stock reward arising from a qualifying transaction will be in an ETF or a publicly traded company available on the Stash Platform. Stash reserves the right to amend this program and the terms and conditions thereof and/or cancel this program at any time, for any reason, upon notice to you. See </span><a data-dcnode-id="152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lp.stash.com/stash-stock-back-rewards-terms-and-conditions/" target="_blank"><span data-dcnode-id="153" instrument_node="">Terms and Conditions</span></a><span data-dcnode-id="151" instrument_node=""> for more details. Double Stock-Back® rewards is subject to </span><a data-dcnode-id="149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.stash.com/disclosures/Platform_Tier_3_Supplemental.pdf" target="_blank"><span data-dcnode-id="150" instrument_node="">terms and conditions</span></a><span data-dcnode-id="148" instrument_node="">.</span></p></li><li data-dcnode-id="141"><span data-dcnode-id="145" instrument_node="">Fee-free ATM access applied to in-network ATMs only. For out-of-network ATMs and bank tellers a $2.50 fee will apply, plus any additional fee that the ATM owner or bank may charge. For overdraft, transaction is declined and no fee is charged. Neither Green Dot Bank nor Stash offers overdraft services. Other fees apply to the bank account. Please see the </span><a data-dcnode-id="143" href="https://chatnoir-webcontent.chatnoir.eu antee any stock will pay dividends in a quarter or year. “</span><strong data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Retirement Portfolio</span></strong><span data-dcnode-id="127" instrument_node="">” is an IRA (Roth or Traditional). This is a Non-Discretionary Managed Account. Stash does not monitor whether a customer is eligible for a particular type of IRA, or a tax deduction, or if a reduced contribution limit applies to a customer. These are based on a customer’s individual circumstances. You should consult with a tax advisor.</span></li><li data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">When you Lock your card, withdrawals and purchases conducted using your card will not be authorized until you unlock your card. Some activity will continue, including your monthly fee, if applicable, debit transactions that were authorized before you Locked your card, transactions crediting funds to your account, ACH debit transactions conducted using your account and routing numbers, recurring bill payments, mobile check deposit, and cash deposits.</span></li><li data-dcnode-id="122"><span data-dcnode-id="123" instrument_node="">This is a Discretionary Managed Account whereby Stash has full authority to manage according to a specific investment mandate. Balance” is defined by investing deposits into underweight assets, and for withdrawals, trimming overweight positions. As you deposit or withdraw funds, your portfolio can slowly be aligned to the target allocation appropriate for your risk profile by additional money movements throughout the year. The investment team at Stash built these portfolios with the goal of optimizing risk-adjusted returns. This is achieved by utilizing the diversification benefits highlighted by modern portfolio theory. The portfolios aim to optimize returns given a user’s overall risk profile. Diversification and asset allocation do not guarantee a profit, nor do they eliminate the risk of loss of principal. Stash does not guarantee any level of performance or that any client will avoid losses in the client’s account.</span></li><li data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">A “Personal Portfolio” is a taxable brokerage account. This is a Non-Discretionary Managed Account.</span></li><li data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">Stash through the “Diversification Analysis” feature does not rebalance portfolios or otherwise manage the Personal Portfolio Account for Clients on a discretionary basis. Each Client is solely responsible for implementing any such advice. This investment recommendation relies entirely on the responses you’ve provided regarding your risk tolerance. Portfolio recommendations through this tool are considered personalized investment advice. No asset allocation is a guarantee against loss of principal.</span></li><li data-dcnode-id="113"><span data-dcnode-id="117" instrument_node="">To be eligible to receive a Stock Reward through stock party, you must complete the account registration process and open an individual taxable brokerage account ("Personal Portfolio") that is in good standing. This program is subject to </span><a data-dcnode-id="115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//party.stash.com/terms" target="_blank"><span data-dcnode-id="116" instrument_node="">Terms and Conditions</span></a><span data-dcnode-id="114" instrument_node="">.</span></li><li data-dcnode-id="111"><span data-dcnode-id="112" instrument_node="">Stash may receive compensation from business partners for referring Stash clients to such partners for the purchase of non-investment consumer products or services. This conflict of interest affects the ability of Stash to provide clients with unbiased, objective promotions concerning the products and services of its business partners. This could mean that the products and/or services of businesses that do not compensate Stash may be more appropriate for a client than the products and/or services of Stash’s business partners. Clients are not required to purchase the products and services Stash promotes.</span></li><li data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">If you purchase this plan, you will receive Financial Counseling Advice which is  impersonal investment advice in the form of guides and educational materials about investing and financial planning, along with the ability to view the investments through the platform. In order to obtain personalized investment advice, clients are required to complete the suitability questionnaire during registration, must be approved from an account verification perspective and open a brokerage account.</span></li><li data-dcnode-id="107"><span data-dcnode-id="108" instrument_node="">You may subsequently choose to open one or more investment advisory account(s). To begin investing on Stash, you must be approved from an account verification perspective and open a brokerage account.</span></li><li data-dcnode-id="105"><span data-dcnode-id="106" instrument_node="">This information should not be construed as Tax or Legal advice. Please consult a Tax professional for your questions.</span></li><li data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">This Program is subject to terms and conditions. In order to participate, a user must comply with all eligibility requirements and make a qualifying purchase with their Stock-Back® Card. All funds used for this Program will be taken from your Stash Banking account. This Program is not sponsored or endorsed by Green Dot Bank.</span></li></ol><ul data-dcnode-id="39"><li data-dcnode-id="100"><span data-dcnode-id="101" instrument_node="">Stash does not offer an interest-bearing savings account.</span></li><li data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">Fractional shares start at $0.05 for investments that cost $1,000+ per share.</span></li><li data-dcnode-id="96"><span d
