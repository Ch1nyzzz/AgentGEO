</span><div class="inside-article" data-dcnode-id="1875"><span data-dcnode-id="1982" instrument_node="">
</span><header aria-label="Content" class="entry-header" data-dcnode-id="1977"><span data-dcnode-id="1981" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1979" itemprop="headline"><span data-dcnode-id="1980" instrument_node="">Tips to avoid job scams</span></h1><span data-dcnode-id="1978" instrument_node=""> </span></header><span data-dcnode-id="1976" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1877" itemprop="text"><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">In this article we provide 5 tips to help you avoid being the victim of scams related to searching for employment.</span></p><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1969"><strong data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">1. Requests for money</span></strong></p><span data-dcnode-id="1968" instrument_node="">
</span><p data-dcnode-id="1959"><span data-dcnode-id="1967" instrument_node="">This is the main reason for the existence of most scams. The scammers want to trick you into sending them money. A legitimate employer or recruiter will </span><span data-dcnode-id="1964" style="text-decoration: underline;"><strong data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">never</span></strong></span><span data-dcnode-id="1963" instrument_node=""> ask you to send them money for any part of the recruitment process. If you are asked to make a payment then </span><strong data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">DO NOT</span></strong><span data-dcnode-id="1960" instrument_node=""> proceed.</span></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1955"><strong data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">2. Always be vigilant</span></strong></p><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Be open to the possibility that people may not be who they say they are. If you are open to this possibility then you will be in a better position to identify potential scams.</span></p><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1948"><strong data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">3. Learn how to identify scams</span></strong></p><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">Job scams are increasingly convincing but there are often traits that can help you to identify them as a scam. These include:</span></p><span data-dcnode-id="1944" instrument_node="">
</span><ul data-dcnode-id="1927"><span data-dcnode-id="1943" instrument_node="">
</span><li data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Receiving unsolicited email/call/text/message with a job offer or business opportunity</span></li><span data-dcnode-id="1940" instrument_node="">
</span><li data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">The “salary” for the role is higher than expected or the returns offered seem to good to be true</span></li><span data-dcnode-id="1937" instrument_node="">
</span><li data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">You are asked to make payment(s) in order to complete an test/application/background check OR you are asked to urgently provide cash/information/payment (this reduces the time you have to consider whether it might be a scam and is a common trick)</span></li><span data-dcnode-id="1934" instrument_node="">
</span><li data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">The “employer” uses different email addresses/contact methods to those listed in the job advert</span></li><span data-dcnode-id="1931" instrument_node="">
</span><li data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">The job advert contains poor English,&nbsp;spelling mistakes or other errors</span></li><span data-dcnode-id="1928" instrument_node="">
</span></ul><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1923"><strong data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">4. Try and verify job listings</span></strong></p><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">It is a good idea to do some background checks prior to making a job application. These checks could include:</span></p><span data-dcnode-id="1919" instrument_node="">
</span><ul data-dcnode-id="1908"><span data-dcnode-id="1918" instrument_node="">
</span><li data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Checking with friends or family who work for the employer and may be able to verify the job opening</span></li><span data-dcnode-id="1915" instrument_node="">
</span><li data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Checking the internet to see whether this could be a potential scam</span></li><span data-dcnode-id="1912" instrument_node="">
</span><li data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Checking with the potential employer to verify the job opening.&nbsp;Scammers may list genuine contact details – it may be that only the email address or telephone number are not genuine. A simple check with the employer may help to uncover a scam.</span></li><span data-dcnode-id="1909" instrument_node="">
</span></ul><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1902"><strong data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">5</span></strong><strong data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">. Report suspicious job adverts</span></strong></p><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">If you believe that a job advert is a scam always ensure that you report this to the advertiser and to the relevant authorities. This will enable them to (1) take action to remove the job advert (2) investigate the scam and (3) prevent other people from becoming victims.</span></p><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1893"><strong data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Further Informatio</span></strong><strong data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">n</span></strong></p><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1888"><span data-dcnode-id="1891" instrument_node="">To find more careers articles visit: </span><a data-dcnode-id="1889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gozambiajobs.com/category/career-advice/"><span data-dcnode-id="1890" instrument_node="">Careers Advice</span></a></p><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1884"><strong data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Search for Jobs</span></strong></p><span data-dcnode-id="1883" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1882" instrument_node="">To search for the latest jobs in Zambia visit: </span><a data-dcnode-id="1880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gozambiajobs.com/jobs/"><span data-dcnode-id="1881" instrument_node="">www.gozambiajobs.com/jobs</span></a></p><span data-dcnode-id="1878" instrument_node="">
