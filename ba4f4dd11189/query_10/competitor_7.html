</span><div class="section the_content has_content" data-dcnode-id="2605"><div class="section_wrapper" data-dcnode-id="2606"><div class="the_content_wrapper" data-dcnode-id="2607"><p data-dcnode-id="5149"><ins class="adsbygoogle" data-ad-client="ca-pub-7717531029937458" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="5909030633" data-dcnode-id="5153" style="display: block; text-align: center;"></ins><span data-dcnode-id="5152" instrument_node=""> </span></p><span data-dcnode-id="5148" instrument_node="">
</span><h2 data-dcnode-id="5146"><span data-dcnode-id="5147" instrument_node="">5 Safety Tips on How to Spot a Scam on Craigslist</span></h2><span data-dcnode-id="5145" instrument_node="">
</span><p data-dcnode-id="5137"><span data-dcnode-id="5144" instrument_node="">Craigslist is used worldwide to advertise anything from cars and furniture to jobs. While classifieds like Craigslist make it easy for people to buy and sell online, there are certain precautions we need to take to avoid scams, especially during the COVID-19 crisis, when fake advertisements for </span><a data-dcnode-id="5142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scam-detector.com/social-networking-scams/coronavirus-mask-paranoia-and-the-scam-that-followed" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5143" instrument_node="">Coronavirus face masks</span></a><span data-dcnode-id="5141" instrument_node=""> or </span><a data-dcnode-id="5139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scam-detector.com/article/air-purifier-sale" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5140" instrument_node="">air filter sales and services</span></a><span data-dcnode-id="5138" instrument_node=""> are being sold on the platform. Here are 5 tips to avoid Craigslist scams:</span></p><span data-dcnode-id="5136" instrument_node="">
</span><p data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">1. Avoid Online Payments.</span></p><span data-dcnode-id="5133" instrument_node="">
</span><p data-dcnode-id="5131"><span data-dcnode-id="5132" instrument_node="">2. Research the Job Poster.</span></p><span data-dcnode-id="5130" instrument_node="">
</span><p data-dcnode-id="5128"><span data-dcnode-id="5129" instrument_node="">3. Check the Legitimacy of the Ad.</span></p><span data-dcnode-id="5127" instrument_node="">
</span><p data-dcnode-id="5125"><span data-dcnode-id="5126" instrument_node="">4. Research the Price.</span></p><span data-dcnode-id="5124" instrument_node="">
</span><p data-dcnode-id="5122"><span data-dcnode-id="5123" instrument_node="">5. Beware of Counterfeits.</span></p><span data-dcnode-id="5121" instrument_node="">
</span><p data-dcnode-id="5119"><span data-dcnode-id="5120" instrument_node="">Let’s take a look at them and how to spot a scam on Craigslist, one by one.</span></p><span data-dcnode-id="5118" instrument_node="">
</span><p data-dcnode-id="5111"><span data-dcnode-id="5116" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-7717531029937458" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="2770699070" data-dcnode-id="5115" style="display: block; text-align: center;"></ins><span data-dcnode-id="5114" instrument_node=""> </span></p><span data-dcnode-id="5110" instrument_node="">
</span><h2 data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">1. Avoid Online Payments</span></h2><span data-dcnode-id="5107" instrument_node="">
</span><p data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node="">If you are used to making and receiving online payments, you may be tempted to do the same for a product on Craigslist. Remember, Craigslist does not provide any payment guarantees. So, avoid transactions in which the payment is with a cashier’s check, gift card, or wire transfer. If the check turns out to be a fake, you will have to deal with the bank.</span></p><span data-dcnode-id="5104" instrument_node="">
</span><p data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node="">Using any of these methods is a bad idea because you don’t have any form of protection in case things go wrong. Don’t be in a situation where all you have is the other person’s word. Instead, insist on cash payments.</span></p><span data-dcnode-id="5101" instrument_node="">
</span><h2 data-dcnode-id="5099"><span data-dcnode-id="5100" instrument_node="">2. Research the Job Poster</span></h2><span data-dcnode-id="5098" instrument_node="">
</span><p data-dcnode-id="5093"><span data-dcnode-id="5097" instrument_node="">Quick online research can be a great way of finding out more about the person or company that has posted the ad. If you have the name, address, or phone number of the person, do a background check on a people search website like </span><a data-dcnode-id="5095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nuwber.com/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="5096" instrument_node="">Nuwber</span></a><span data-dcnode-id="5094" instrument_node="">. Also, Google the person to find out if there are any complaints made about them online. If you are in the market for a property, do a location search on google and/or Nuwber to find if the information provided in the ad is accurate. Similarly, check the details provided by an employer to make sure they are a real company.</span></p><span data-dcnode-id="5092" instrument_node="">
</span><p data-dcnode-id="5085"><span data-dcnode-id="5090" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-7717531029937458" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="2770699070" data-dcnode-id="5089" style="display: block; text-align: center;"></ins><span data-dcnode-id="5088" instrument_node=""> </span></p><span data-dcnode-id="5084" instrument_node="">
</span><h2 data-dcnode-id="5082"><span data-dcnode-id="5083" instrument_node="">3. Check the Legitimacy of the Ad</span></h2><span data-dcnode-id="5081" instrument_node="">
</span><p data-dcnode-id="5079"><span data-dcnode-id="5080" instrument_node="">Read the ad carefully and also check any images attached to the ad. If the poster does not provide any details of the product or service, then don’t move forward until you find out more. Ask the ad poster if they are willing to meet in person to show the product.</span></p><span data-dcnode-id="5078" instrument_node="">
</span><p data-dcnode-id="5076"><span data-dcnode-id="5077" instrument_node="">This will help you avoid any substandard products marketed as good. If there are pictures in the ad, check if those pictures are original or copied from another website. Copy the image’s link and search it on images.google.com.</span></p><span data-dcnode-id="5075" instrument_node="">
</span><p data-dcnode-id="5073" style="text-align: center;"><img alt="how to spot a scam on craigslist" data-dcnode-id="5074" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scam-detector.com/assets/how%2520to%2520spot%2520a%2520scam%2520on%2520craigslist.jpg&amp;raw"></p><span data-dcnode-id="5072" instrument_node="">
</span><h2 data-dcnode-id="5070"><span data-dcnode-id="5071" instrument_node="">4. Research the Price</span></h2><span data-dcnode-id="5069" instrument_node="">
</span><p data-dcnode-id="5067"><span data-dcnode-id="5068" instrument_node="">Don’t stick to just one classifieds website. Search on multiple websites and note down the price. For example, if you’re looking for a car, see listings on dedicated vehicle sale websites and use the Kelley Blue Book. Besides other classifieds web sites, you may also find online forums dedicated to discussing what you are looking to buy.</span></p><span data-dcnode-id="5066" instrument_node="">
</span><h2 data-dcnode-id="5064"><span data-dcnode-id="5065" instrument_node="">5. Beware of Counterfeits</span></h2><span data-dcnode-id="5063" instrument_node="">
</span><p data-dcnode-id="5061"><span data-dcnode-id="5062" instrument_node="">One thing you have to be careful about when dealing with cash is counterfeit money. Carefully check each banknote and return any questionable ones. Invest in a counterfeit detection pen.</span></p><span data-dcnode-id="5060" instrument_node="">
</span><p data-dcnode-id="5055"><span data-dcnode-id="5059" instrument_node="">With over 65,000 complaints, non-payment/ non-delivery was the most reported crime in 2018 among the crimes reported to the IC3 (U.S. Internet Crime Complaint Center) (</span><a data-dcnode-id="5057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/184083/commonly-reported-types-of-cyber-crime/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5058" instrument_node="">Statista</span></a><span data-dcnode-id="5056" instrument_node="">). The steps mentioned above can help you be safer when dealing with buyers and sellers on classifieds sites like Craigslist.</span></p><span data-dcnode-id="5054" instrument_node="">
