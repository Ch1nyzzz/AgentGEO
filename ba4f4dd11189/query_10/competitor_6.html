</span><div class="section author-by-line" data-dcnode-id="1448"><span data-dcnode-id="1453" instrument_node="">
</span><div class="author-by-line-description font-s" data-dcnode-id="1450"><i data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Written by Dan Rafter for NortonLifeLock</span></i></div><span data-dcnode-id="1449" instrument_node="">
</span></div><span data-dcnode-id="1447" instrument_node="">
</span><div class="rich-text-editor parbase section" data-dcnode-id="1441"><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1443"><span class="font-s variableFour" data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Feb. 12, 2021</span></span></p><span data-dcnode-id="1442" instrument_node="">
</span></div><span data-dcnode-id="1440" instrument_node="">
</span><div class="rich-text-editor parbase section" data-dcnode-id="1321"><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1438" instrument_node="">The COVID-19 pandemic has pummeled the U.S.&nbsp;economy, driving up </span><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//us.norton.com/internetsecurity-online-scams-unemployment-scams-and-covid-19.html"><span data-dcnode-id="1437" instrument_node="">unemployment&nbsp;rates</span></a><span data-dcnode-id="1435" instrument_node=""> across the country. Plenty of people, then, are&nbsp;searching for a new job today. And all those job seekers? They’re targets for scam artists.</span></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">If you’re hunting for a new position, be aware&nbsp;of job-posting cons. In these scams, criminals post fake job listings, usually&nbsp;online, with no intention of offering applicants a real position. Instead,&nbsp;they’re out to scam them.</span></p><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Often, the criminals behind these fake listings want to steal your personal information so&nbsp;they can access your online&nbsp;credit card or bank accounts. Or they might use this information to apply for&nbsp;loans or open new credit card accounts in your name. Other scammers post fake&nbsp;help-wanted ads to trick you into sending them money directly.</span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Fortunately, there are several clues you can look for when studying a job listing. Run into any of the red flags below?&nbsp;Proceed with caution. You might be answering a help-wanted ad created by a criminal.</span></p><span data-dcnode-id="1424" instrument_node="">
</span><h2 data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">How do job-posting scams work?</span></h2><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Scammers usually post fake job ads for one&nbsp;reason: They want to trick you into surrendering your personal or financial&nbsp;information.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">These&nbsp;con artists might post a help-wanted ad online. When you respond — most often&nbsp;using an email address provided in the job listing — the scammer on the other&nbsp;end requests information such as your birth date or Social Security number.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">When you provide this information? The criminal could use it to break into your online credit card accounts and run up thousands of&nbsp;dollars in fraudulent purchases. Or maybe the scammer relies on your Social&nbsp;Security number to sneak into your online bank account, stealing the dollars&nbsp;inside.</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Some criminals might even use your personal&nbsp;information to open up credit card accounts or loans in your name.</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Other scammers might say they need your bank&nbsp;account information to set up a direct deposit account for your future&nbsp;payments. Once you give them this information, they clean out this account.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Then there are the con artists who want you to send them money directly. They might say that you need to pay a fee to apply&nbsp;for the job or that you need to take a test that costs a certain amount of dollars. When you send the money? These scammers disappear, along with your&nbsp;dollars.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><h2 data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">How to protect yourself from job scams</span></h2><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">The key here? Never provide any employer&nbsp;personal information such as your Social Security, birthdate, or bank account&nbsp;information unless you are actually given a job.</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">And never send these “employers” your money,&nbsp;either. You should never have to pay a company to get hired.</span></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Another mistake to avoid? Don’t respond to a&nbsp;help-wanted ad before researching the employer behind it. You can do this&nbsp;through Google. If you Google the name of a company and you don’t find a website for the firm? Be careful. You might be dealing with an imaginary&nbsp;company conjured by a con artist.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">And if the company doesn’t reveal its name in a&nbsp;job posting? Be careful. It might be a legitimate ad, but it might also be a&nbsp;scam. If you respond to a help-wanted ad from a company that is staying anonymous? Never provide personal information before you are actually offered a&nbsp;job and given the name of the company.</span></p><span data-dcnode-id="1388" instrument_node="">
</span><h2 data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">How to identify signs of a scam</span></h2><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Avoiding&nbsp;a job-posting scam isn’t complicated. It’s about identifying the most common signs of a bogus job offering.</span></p><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1375"><b data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Sign 1: Getting too personal, too early:</span></b><span data-dcnode-id="1379" instrument_node=""> You&nbsp;respond to a job posting and the person behind the ad immediately asks you for&nbsp;your Social Security number or birth date. Or maybe the person asks for your bank account information, so that he or she can set up direct deposit. Never&nbsp;provide this information. Legitimate companies won’t ask for personal&nbsp;information, especially such valuable information, before offering you a job or&nbsp;interviewing you in person. Scammers, though, will. And they’ll use this&nbsp;information to </span><a data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//us.norton.com/internetsecurity-id-theft-what-is-identity-theft.html"><span data-dcnode-id="1378" instrument_node="">steal&nbsp;your identity</span></a><span data-dcnode-id="1376" instrument_node=""> and break into your online bank and credit card&nbsp;accounts.</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1370"><b data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Sign 2: Asking you to pay:</span></b><span data-dcnode-id="1371" instrument_node=""> Another common red flag? If a job poster asks you to send money to pay for training&nbsp;materials, that’s a scam. If a poster asks for money to evaluate your resume or requests that you pay to complete an application? Those are also sure signs of&nbsp;a scam. Legitimate companies never make prospective employees pay to apply for&nbsp;a job.</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1365"><b data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Sign 3: They hire you immediately:</span></b><span data-dcnode-id="1366" instrument_node=""> It’s&nbsp;always flattering to receive a job offer. But if that offer comes too soon? Be&nbsp;careful. Legitimate companies will want to interview you in person, or at least&nbsp;over the phone, before making you a job offer. If a company gives you an offer&nbsp;after a brief email conversation? That’s a serious red flag that they’re only&nbsp;making you a “job offer” to eventually steal your personal information.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1360"><b data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Sign 4: They contacted you:</span></b><span data-dcnode-id="1361" instrument_node=""> Be&nbsp;suspicious if an email suddenly appears in your inbox with a job opportunity.&nbsp;Most legitimate companies will post job offerings and then sift through the&nbsp;applicants who respond. They don’t have to reach out to strangers on the internet.&nbsp;If you receive a job offer from someone you don’t know at a company you’ve&nbsp;never heard of? You can bet it’s a scam.</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1355"><b data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Sign 5: The job offer is too good to be true:</span></b><span data-dcnode-id="1356" instrument_node=""> What&nbsp;if a company offers you a position with a salary that seems far too high for&nbsp;the job? Again, be careful. Scammers will sometimes promise their victims a&nbsp;large salary to trick them into giving up personal information or sending money&nbsp;for “testing” materials. If a job offer seems too good to be true? It probably&nbsp;is.</span></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1350"><b data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Sign 6: The contact information is a free email&nbsp;address:</span></b><span data-dcnode-id="1351" instrument_node=""> Be careful, too, if the contact information in an&nbsp;online job posting comes in the form of a Gmail or Yahoo address. Legitimate&nbsp;companies don’t use free email services when posting job listings. Instead,&nbsp;they’ll use email addresses that typically have their company names in them.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><h2 data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">What to do if you fall victim to a job-posting scam?</span></h2><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">But what happens if you do fall victim to a job-listing scam? You’ll need to act quickly to protect your financial accounts.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1342" instrument_node="">First, file a complaint with the </span><a data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ic3.gov/" target="_blank"><span data-dcnode-id="1341" instrument_node="">Internet&nbsp;Crime Complaint Center</span></a><span data-dcnode-id="1339" instrument_node="">, better known as IC3. This entity is a&nbsp;partnership between the FBI, the National White Collar Crime Center and the&nbsp;Bureau of Justice Assistance. If you've been victimized by an online&nbsp;job-posting scam, you can file a complaint at the IC3 online.</span></p><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">To file a report, log onto the site and provide&nbsp;your name, mailing address and telephone number. Then provide as much&nbsp;information as you have about the scam artist posting the fake job listing. You&nbsp;might not have much information available, but the more details you can&nbsp;provide, the better.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">You should also report the scam listing to&nbsp;whatever site it was posted on. If you found the listing on Monster.com, report&nbsp;it to that company. If you found it on Indeed.com, report it there.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Next, monitor your online bank and credit card&nbsp;accounts carefully. Look for suspicious transactions or withdrawals. If you&nbsp;sent your personal information to con artists, they might use it to break into these accounts. If you find suspicious activity, contact your bank and credit&nbsp;card companies immediately. They can freeze your accounts or provide you with&nbsp;new credit cards.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1327" instrument_node="">Also order your three free credit reports from </span><a data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.annualcreditreport.com/index.action" target="_blank"><span data-dcnode-id="1326" instrument_node="">AnnualCreditReport.com</span></a><span data-dcnode-id="1324" instrument_node="">.&nbsp;These reports list any open credit card accounts and loans in your name. Check&nbsp;for loans or accounts that you don't remember taking out. These could be&nbsp;fraudulent loans or accounts that scammers have taken out in your name. If you find fraudulent cards or accounts, notify the companies behind them immediately&nbsp;so that they can cancel them.</span></p><span data-dcnode-id="1322" instrument_node="">
</span></div><span data-dcnode-id="1320" instrument_node="">
