</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="333" id="accordion-item-213719-2"><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Keep these tips in mind to protect yourself from Ponzi schemes:</span></p><h4 data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Do</span></h4><ul data-dcnode-id="346"><li data-dcnode-id="356"><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Be wary of any investment that regularly pays positive returns regardless of what the overall market is doing.</span></p></li><li data-dcnode-id="353"><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Avoid investments if you do not&nbsp;understand them or cannot get complete information about them.</span></p></li><li data-dcnode-id="350"><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Be alert to account statement errors, which may be a sign of investment fraud.</span></p></li><li data-dcnode-id="347"><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Be suspicious if you do not&nbsp;receive a payment or have difficulty cashing out. &nbsp;</span></p></li></ul><h4 data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Do Not</span></h4><ul data-dcnode-id="334"><li data-dcnode-id="341"><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Do not&nbsp;put your money in investments that promise big returns with little to no risk.</span></p></li><li data-dcnode-id="338"><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Do not&nbsp;contribute to any investment that is not registered with the SEC or with state regulators.</span></p></li><li data-dcnode-id="335"><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Do not get financially involved with any unlicensed investment professional or unregistered firm.</span></p></li></ul></div></li></ul></div><span data-dcnode-id="329" instrument_node="">
</span></article><span data-dcnode-id="327" instrument_node=""> </span><article aria-labelledby="item-212864" data-dcnode-id="218" role="complementary"><span data-dcnode-id="326" instrument_node="">
</span><header data-dcnode-id="321"><span data-dcnode-id="325" instrument_node="">
</span><h2 class="accordionified" data-dcnode-id="323" id="item-212864"><span data-dcnode-id="324" instrument_node="">Ticket Scams</span></h2><span data-dcnode-id="322" instrument_node="">
</span></header><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Ticket selling scams happen when a scammer uses tickets as bait to steal your money.&nbsp;The scammer usually sells fake tickets,&nbsp;or you pay for a ticket, but never receive it. They are common when tickets for popular concerts, plays, and sporting events sell out.</span></p><div class="usa-accordion-bordered usa-accordion-from-content usa-accordion-toggle" data-dcnode-id="220" data-multiselectable="true" id="accordion-item-212864"><button aria-controls="accordion-item-212864" aria-expanded="false" aria-labelledby="item-212864 item-212864-all" class="usa-accordion-toggle-all" data-dcnode-id="317" data-initialtext="Open All +" data-toggledtext="Close All -" id="item-212864-all"><span data-dcnode-id="318" instrument_node="">Open All +</span></button><ul data-dcnode-id="221"><li data-dcnode-id="299"><h3 class="accordion-heading" data-dcnode-id="312"><span data-dcnode-id="316" instrument_node="">
</span><button aria-controls="accordion-item-212864-0" aria-expanded="false" aria-label="Ways That Ticket Scammers Go After Your Money" class="usa-accordion-button initialized" data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Ways That Ticket Scammers Go After Your Money</span></button><span data-dcnode-id="313" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="300" id="accordion-item-212864-0"><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Scammers, including individuals and fake resale companies, take advantage of ticket shortages by:</span></p><ul data-dcnode-id="301"><li data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Charging prices much higher than the face value of a ticket</span></li><li data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Creating counterfeit tickets with forged barcodes and logos of real ticket companies</span></li><li data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Selling duplicates of a legitimate ticket and emailing it to several&nbsp;buyers</span></li><li data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Pretending to sell tickets online to steal your credit card information</span></li></ul></div></li><li data-dcnode-id="270"><h3 class="accordion-heading" data-dcnode-id="294"><span data-dcnode-id="298" instrument_node="">
</span><button aria-controls="accordion-item-212864-1" aria-expanded="false" aria-label="Report Ticket Scams" class="usa-accordion-button initialized" data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Report Ticket Scams</span></button><span data-dcnode-id="295" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="271" id="accordion-item-212864-1"><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">There are several options to report a ticket scam.</span></p><ul data-dcnode-id="272"><li data-dcnode-id="287"><span data-dcnode-id="291" instrument_node="">Contact your </span><a data-dcnode-id="289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/state-consumer"><span data-dcnode-id="290" instrument_node="">state consumer protection office</span></a><span data-dcnode-id="288" instrument_node="">.</span></li><li data-dcnode-id="282"><span data-dcnode-id="286" instrument_node="">Contact the Federal Trade Commission (FTC) using the </span><a data-dcnode-id="284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reportfraud.ftc.gov/%23/"><span data-dcnode-id="285" instrument_node="">Online Complaint Assistant</span></a><span data-dcnode-id="283" instrument_node="">.</span></li><li data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">File a local police report, especially if you met the scammer in person or have a picture of them to give the police.</span></li><li data-dcnode-id="275"><span data-dcnode-id="279" instrument_node="">Report it&nbsp;using the </span><a data-dcnode-id="277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbb.org/scamtracker"><span data-dcnode-id="278" instrument_node="">Better Business Bureau’s Scam Tracker</span></a><span data-dcnode-id="276" instrument_node="">.</span></li><li data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">If you paid by credit card, report the problem to the card company. You may be able to dispute the charge.</span></li></ul></div></li><li data-dcnode-id="222"><h3 class="accordion-heading" data-dcnode-id="265"><span data-dcnode-id="269" instrument_node="">
</span><button aria-controls="accordion-item-212864-2" aria-expanded="false" aria-label="How to Protect Yourself" class="usa-accordion-button initialized" data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">How to Protect Yourself</span></button><span data-dcnode-id="266" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="223" id="accordion-item-212864-2"><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Learn what you can do to avoid becoming a victim:</span></p><h4 data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Do</span></h4><ul data-dcnode-id="235"><li data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Buy tickets at the venue box office.</span></li><li data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Buy tickets from authorized brokers and third party sellers, with verified contact information.</span></li><li data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Look for red flags in the ticket offer. If the offer has imperfect English or unusual phrases, the offer&nbsp;could be a scam.&nbsp;</span></li><li data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Verify that the seller has a real physical addresses and phone numbers. Scammers often post fake addresses, PO Box, or no address on their websites.</span></li><li data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Check the actual web address of the resale ticket seller. Some scammers create phony websites that look like real ticket sellers' websites.</span></li><li data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Search online for negative reviews about the seller. Use the seller’s name, email address, and phone number, along with the words “fraud,” “scams,” and “fake tickets”.</span></li><li data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Verify the details on the ticket. Check the&nbsp;date and the time printed on the tickets. Make sure the section and seat numbers actually exist at the venue.</span></li><li data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Have the seller meet you in person in a public place for the ticket exchange.</span></li><li data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Ask the seller for proof that they bought the tickets, if you are buying from an individual.</span></li><li data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Use a credit card to pay third party sellers. Your credit card offers protections, if you need to dispute a charge.</span></li><li data-dcnode-id="236"><span data-dcnode-id="240" instrument_node="">Check for complaints against a ticket seller with your state’s </span><a data-dcnode-id="238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/state-consumer"><span data-dcnode-id="239" instrument_node="">consumer protection agency</span></a><span data-dcnode-id="237" instrument_node="">.</span></li></ul><h4 data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Don’t</span></h4><ul data-dcnode-id="224"><li data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Don’t wire transfer money to pay for tickets. &nbsp;</span></li><li data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Don’t trust sellers who want you to pay with a prepaid money card.</span></li><li data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Don’t meet an individual ticket seller alone or in a low-traffic area.</span></li><li data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Don’t automatically trust online search results for ticket sellers. Search results can include paid ads, sellers that charge high fees, and scams.</span></li></ul></div></li></ul></div><span data-dcnode-id="219" instrument_node="">
</span></article><span data-dcnode-id="216" instrument_node="">
