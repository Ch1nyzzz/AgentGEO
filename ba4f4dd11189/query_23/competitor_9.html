</span><h2 class="accordionified" data-dcnode-id="1338" id="item-214623"><span data-dcnode-id="1339" instrument_node="">COVID-19 Scams, Rumors, and Price Gouging</span></h2><span data-dcnode-id="1337" instrument_node="">
</span></header><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">During&nbsp;the COVID-19&nbsp;pandemic, scammers may try to&nbsp;take advantage of you. They might&nbsp;get in touch by phone, email, postal mail, text, or social media. Protect your money and your identity. Don't share&nbsp;personal information like your bank account number, Social Security number, or date&nbsp;of birth. Learn&nbsp;how to recognize and report a COVID vaccine scam&nbsp;and other types of coronavirus scams.&nbsp;</span></p><div class="usa-accordion-bordered usa-accordion-from-content usa-accordion-toggle" data-dcnode-id="1215" data-multiselectable="true" id="accordion-item-214623"><button aria-controls="accordion-item-214623" aria-expanded="false" aria-labelledby="item-214623 item-214623-all" class="usa-accordion-toggle-all" data-dcnode-id="1332" data-initialtext="Open All +" data-toggledtext="Close All -" id="item-214623-all"><span data-dcnode-id="1333" instrument_node="">Open All +</span></button><ul data-dcnode-id="1216"><li data-dcnode-id="1285"><h3 class="accordion-heading" data-dcnode-id="1327"><span data-dcnode-id="1331" instrument_node="">
</span><button aria-controls="accordion-item-214623-0" aria-expanded="false" aria-label="Common Coronavirus Scams" class="usa-accordion-button initialized" data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Common Coronavirus Scams</span></button><span data-dcnode-id="1328" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="1286" id="accordion-item-214623-0"><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Scammers change their methods frequently. Current coronavirus scams include:</span></p><ul data-dcnode-id="1290"><li data-dcnode-id="1321"><a data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumer.ftc.gov/consumer-alerts/2021/02/social-media-no-place-covid-19-vaccination-cards"><span data-dcnode-id="1324" instrument_node="">Identity theft when people post a photo of their vaccination card on social media</span></a><span data-dcnode-id="1322" instrument_node=""> -&nbsp; Don't post a photo of your vaccination card online. Scammers can see and steal your name, birthdate, and other personal information.&nbsp;&nbsp;</span></li><li data-dcnode-id="1314"><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fda.gov/consumers/consumer-updates/beware-fraudulent-coronavirus-tests-vaccines-and-treatments"><span data-dcnode-id="1320" instrument_node="">COVID-19 testing, vaccine, and treatment scams</span></a><span data-dcnode-id="1318" instrument_node=""> - Be aware that&nbsp;</span><a data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oig.hhs.gov/coronavirus/fraud-alert-covid19.asp"><span data-dcnode-id="1317" instrument_node="">scammers are targeting Medicare recipients</span></a><span data-dcnode-id="1315" instrument_node="">. They're&nbsp;offering COVID-19 testing in an attempt to steal personal information.</span></li><li data-dcnode-id="1310"><a data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumer.ftc.gov/features/how-donate-wisely-and-avoid-charity-scams"><span data-dcnode-id="1313" instrument_node="">Charity scams</span></a><span data-dcnode-id="1311" instrument_node=""> - Fake charities pop up during disasters. And scammers can also claim to be from real charities. Learn how to research charity claims and protect your money.&nbsp;</span></li><li data-dcnode-id="1306"><a data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumer.ftc.gov/consumer-alerts/2020/04/want-get-your-coronavirus-relief-check-scammers-do-too"><span data-dcnode-id="1309" instrument_node="">Checks from the government</span></a><span data-dcnode-id="1307" instrument_node=""> - Scammers say they’re from the IRS or another government agency. They&nbsp;ask for your personal information or try to charge you fake fees for getting your stimulus check or offer you a way to get the money early.&nbsp;</span></li><li data-dcnode-id="1302"><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fdic.gov/news/news/press/2020/pr20032.html"><span data-dcnode-id="1305" instrument_node="">FDIC and banking</span></a><span data-dcnode-id="1303" instrument_node=""> - People pretend to call from the Federal Deposit Insurance Corporation (FDIC) or your bank. They&nbsp;say your bank account or your ability to get cash are in danger and ask for your personal information.</span></li><li data-dcnode-id="1298"><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumer.ftc.gov/consumer-alerts/2020/04/grandparent-scams-age-coronavirus"><span data-dcnode-id="1301" instrument_node="">Grandparent and military service member scams</span></a><span data-dcnode-id="1299" instrument_node=""> - A scammer pretends to be a grandchild or a military service member. They say they're&nbsp;sick or in trouble because of the coronavirus. They contact you asking to wire them money to pay for fake medical or travel expenses.</span></li><li data-dcnode-id="1291"><a data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.militaryconsumer.gov/blog/scammers-target-loved-ones-covid-19-victims"><span data-dcnode-id="1297" instrument_node="">COVID-19 funeral assistance scam</span></a><span data-dcnode-id="1295" instrument_node="">&nbsp;- Scammers pretend to be from </span><a data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fema.gov/disasters/coronavirus/economic/funeral-assistance"><span data-dcnode-id="1294" instrument_node="">FEMA's COVID-19 Funeral Assistance Program</span></a><span data-dcnode-id="1292" instrument_node=""> and call to offer program registration to&nbsp;family members of people who have died from COVID-19. In this way, the scammers can&nbsp;steal the family members' Social Security numbers and other forms of identification.</span></li></ul><p data-dcnode-id="1287"><a data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fcc.gov/covid-scams"><span data-dcnode-id="1289" instrument_node="">Learn from the FCC about other types of COVID-19&nbsp;scams and read and listen to sample text and phone messages from scammers.</span></a></p></div></li><li data-dcnode-id="1253"><h3 class="accordion-heading" data-dcnode-id="1280"><span data-dcnode-id="1284" instrument_node="">
</span><button aria-controls="accordion-item-214623-1" aria-expanded="false" aria-label="Report COVID-19&nbsp;Scams" class="usa-accordion-button initialized" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Report COVID-19&nbsp;Scams</span></button><span data-dcnode-id="1281" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="1254" id="accordion-item-214623-1"><ul data-dcnode-id="1255"><li data-dcnode-id="1268"><p data-dcnode-id="1269"><span data-dcnode-id="1279" instrument_node="">Contact the </span><a data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/disaster-fraud"><span data-dcnode-id="1278" instrument_node="">National Center for Disaster Fraud</span></a><span data-dcnode-id="1276" instrument_node="">&nbsp;hotline at </span><span class="num" data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">866-720-5721</span></span><span data-dcnode-id="1273" instrument_node="">&nbsp;or email&nbsp;</span><a data-dcnode-id="1271" href="mailto:disaster@leo.gov"><span data-dcnode-id="1272" instrument_node="">disaster@leo.gov</span></a><span data-dcnode-id="1270" instrument_node="">.</span></p></li><li data-dcnode-id="1262"><p data-dcnode-id="1263"><span data-dcnode-id="1267" instrument_node="">Report a scam to the FBI at </span><a data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tips.fbi.gov/"><span data-dcnode-id="1266" instrument_node="">tips.fbi.gov</span></a><span data-dcnode-id="1264" instrument_node="">.</span></p></li><li data-dcnode-id="1256"><p data-dcnode-id="1257"><span data-dcnode-id="1261" instrument_node="">If it's an online scam, submit your complaint through the </span><a data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ic3.gov/default.aspx"><span data-dcnode-id="1260" instrument_node="">Internet Crime Complaint Center (IC3)</span></a><span data-dcnode-id="1258" instrument_node="">.</span></p></li></ul></div></li><li data-dcnode-id="1241"><h3 class="accordion-heading" data-dcnode-id="1248"><span data-dcnode-id="1252" instrument_node="">
</span><button aria-controls="accordion-item-214623-2" aria-expanded="false" aria-label="Coronavirus Rumors" class="usa-accordion-button initialized" data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Coronavirus Rumors</span></button><span data-dcnode-id="1249" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="1242" id="accordion-item-214623-2"><p data-dcnode-id="1243"><span data-dcnode-id="1247" instrument_node="">Rumors, myths, and conspiracy theories about the coronavirus can be frightening and misleading. Go to </span><a data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fema.gov/coronavirus/rumor-control"><span data-dcnode-id="1246" instrument_node="">FEMA's Rumor Control page</span></a><span data-dcnode-id="1244" instrument_node=""> to check out the real answers about the rumors you're hearing.</span></p></div></li><li data-dcnode-id="1217"><h3 class="accordion-heading" data-dcnode-id="1236"><span data-dcnode-id="1240" instrument_node="">
</span><button aria-controls="accordion-item-214623-3" aria-expanded="false" aria-label="Report Price Gouging" class="usa-accordion-button initialized" data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Report Price Gouging</span></button><span data-dcnode-id="1237" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="1218" id="accordion-item-214623-3"><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">During times of high demand, sellers may raise prices to a very high and unfair level on needed items like:</span></p><ul data-dcnode-id="1224"><li data-dcnode-id="1231"><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Face masks</span></p></li><li data-dcnode-id="1228"><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Hand sanitizer</span></p></li><li data-dcnode-id="1225"><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Household or personal care items</span></p></li></ul><p data-dcnode-id="1219"><span data-dcnode-id="1223" instrument_node="">This is called price gouging and it’s illegal. If you suspect price gouging, report it to your </span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/state-attorney-general"><span data-dcnode-id="1222" instrument_node="">state attorney general</span></a><span data-dcnode-id="1220" instrument_node="">.</span></p></div></li></ul></div><span data-dcnode-id="1214" instrument_node="">
</span></article><span data-dcnode-id="1212" instrument_node=""> </span><article aria-labelledby="item-36617" data-dcnode-id="1091" role="complementary"><span data-dcnode-id="1211" instrument_node="">
</span><header data-dcnode-id="1206"><span data-dcnode-id="1210" instrument_node="">
</span><h2 class="accordionified" data-dcnode-id="1208" id="item-36617"><span data-dcnode-id="1209" instrument_node="">Banking Scams</span></h2><span data-dcnode-id="1207" instrument_node="">
</span></header><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Banking scams involve attempts to access your bank account. Use this information to recognize, report, and protect yourself from them.</span></p><div class="usa-accordion-bordered usa-accordion-from-content usa-accordion-toggle" data-dcnode-id="1093" data-multiselectable="true" id="accordion-item-36617"><button aria-controls="accordion-item-36617" aria-expanded="false" aria-labelledby="item-36617 item-36617-all" class="usa-accordion-toggle-all" data-dcnode-id="1202" data-initialtext="Open All +" data-toggledtext="Close All -" id="item-36617-all"><span data-dcnode-id="1203" instrument_node="">Open All +</span></button><ul data-dcnode-id="1094"><li data-dcnode-id="1172"><h3 class="accordion-heading" data-dcnode-id="1197"><span data-dcnode-id="1201" instrument_node="">
</span><button aria-controls="accordion-item-36617-0" aria-expanded="false" aria-label="Popular banking scams" class="usa-accordion-button initialized" data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Popular banking scams</span></button><span data-dcnode-id="1198" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="1173" id="accordion-item-36617-0"><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">The most common banking scams include:</span></p><ul data-dcnode-id="1174"><li data-dcnode-id="1190"><p data-dcnode-id="1191"><a data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumer.ftc.gov/articles/how-spot-avoid-report-fake-check-scams"><span data-dcnode-id="1194" instrument_node="">Overpayment scams</span></a><span data-dcnode-id="1192" instrument_node=""> -&nbsp; Someone sends you a check, instructs you to deposit it in your bank account, and wire part of the money back to them. But the check was&nbsp;fake, so you’ll have to pay your bank the amount of the check, plus you’ll lose any money you wired.</span></p></li><li data-dcnode-id="1185"><p data-dcnode-id="1186"><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumer.georgia.gov/consumer-topics/unsolicited-checks"><span data-dcnode-id="1189" instrument_node="">Unsolicited check fraud</span></a><span data-dcnode-id="1187" instrument_node=""> - A scammer sends you a check for no reason. If you cash it, you may be authorizing the purchase of items or signing up for a loan you didn’t ask for.</span></p></li><li data-dcnode-id="1180"><p data-dcnode-id="1181"><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.helpwithmybank.gov/help-topics/bank-accounts/electronic-transactions/index-electronic-transactions.html"><span data-dcnode-id="1184" instrument_node="">Automatic withdrawals</span></a><span data-dcnode-id="1182" instrument_node=""> - A scam company sets up automatic withdrawals from your bank account to qualify for a free trial or to collect a prize.</span></p></li><li data-dcnode-id="1175"><p data-dcnode-id="1176"><a data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumer.ftc.gov/articles/how-recognize-and-avoid-phishing-scams"><span data-dcnode-id="1179" instrument_node="">Phishing</span></a><span data-dcnode-id="1177" instrument_node=""> - You receive an email message that asks you to verify your bank account or debit card number.</span></p></li></ul></div></li><li data-dcnode-id="1140"><h3 class="accordion-heading" data-dcnode-id="1167"><span data-dcnode-id="1171" instrument_node="">
</span><button aria-controls="accordion-item-36617-1" aria-expanded="false" aria-label="Report Banking Scams" class="usa-accordion-button initialized" data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Report Banking Scams</span></button><span data-dcnode-id="1168" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="1141" id="accordion-item-36617-1"><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">The proper organization to report a banking scam depends on which type of scam you experienced.</span></p><ul data-dcnode-id="1142"><li data-dcnode-id="1160"><p data-dcnode-id="1161"><a data-dcnode-id="1163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uspis.gov/report"><span data-dcnode-id="1164" instrument_node="">Report fake checks you receive by mail</span></a><span data-dcnode-id="1162" instrument_node=""> to the US Postal Inspection Service.</span></p></li><li data-dcnode-id="1152"><p data-dcnode-id="1153"><a data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reportfraud.ftc.gov/"><span data-dcnode-id="1159" instrument_node="">Report counterfeit checks to the Federal Trade Commission</span></a><span data-dcnode-id="1157" instrument_node="">, either online or by phone at </span><span class="num" data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">1-877-382-4357</span></span><span data-dcnode-id="1154" instrument_node="">.</span></p></li><li data-dcnode-id="1149"><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Contact your bank to report and stop unauthorized automatic withdrawals from your account.&nbsp;&nbsp;</span></p></li><li data-dcnode-id="1143"><p data-dcnode-id="1144"><span data-dcnode-id="1148" instrument_node="">Forward phishing emails to the Federal Trade Commission at </span><a data-dcnode-id="1146" href="mailto:spam@uce.gov"><span data-dcnode-id="1147" instrument_node="">spam@uce.gov</span></a><span data-dcnode-id="1145" instrument_node="">.</span></p></li></ul></div></li><li data-dcnode-id="1095"><h3 class="accordion-heading" data-dcnode-id="1135"><span data-dcnode-id="1139" instrument_node="">
</span><button aria-controls="accordion-item-36617-2" aria-expanded="false" aria-label="How to Protect Yourself" class="usa-accordion-button initialized" data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">How to Protect Yourself</span></button><span data-dcnode-id="1136" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="1096" id="accordion-item-36617-2"><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Remember these tips to avoid a banking scam:</span></p><h4 data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Do</span></h4><ul data-dcnode-id="1118"><li data-dcnode-id="1128"><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Be suspicious if you are told to wire a portion of funds from a check you received back to a company.</span></p></li><li data-dcnode-id="1125"><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Be wary of lotteries or free trials that ask for your bank account number.</span></p></li><li data-dcnode-id="1122"><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Verify the authenticity of a cashier’s check with the bank that it is drawn on before depositing it.</span></p></li><li data-dcnode-id="1119"><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">When verifying a check or the issuer, use contact information on a bank’s website.</span></p></li></ul><h4 data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Don’t</span></h4><ul data-dcnode-id="1097"><li data-dcnode-id="1113"><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Don’t trust the appearance of checks or money orders. Scammers can make them look legitimate and official.</span></p></li><li data-dcnode-id="1110"><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Don’t deposit checks or money orders from strangers or companies you don’t have a relationship with.</span></p></li><li data-dcnode-id="1107"><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Don’t wire money to people or companies you don’t know.</span></p></li><li data-dcnode-id="1104"><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Don’t give your bank account number to someone who calls you, even for verification purposes.</span></p></li><li data-dcnode-id="1101"><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Don’t click on links in an email to verify your bank account.</span></p></li><li data-dcnode-id="1098"><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Don’t accept a check that includes an overpayment.</span></p></li></ul></div></li></ul></div><span data-dcnode-id="1092" instrument_node="">
</span></article><span data-dcnode-id="1090" instrument_node=""> </span><article aria-labelledby="item-37207" data-dcnode-id="1007" role="complementary"><span data-dcnode-id="1089" instrument_node="">
</span><header data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">
</span><h2 class="accordionified" data-dcnode-id="1086" id="item-37207"><span data-dcnode-id="1087" instrument_node="">Telephone Scams</span></h2><span data-dcnode-id="1085" instrument_node="">
</span></header><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Telephone scammers try to steal your money or personal information. Scams may come through phone calls from real people, robocalls, or text messages. Callers often make false promises, such as opportunities to buy products, invest your money, or receive free product trials. They may also offer you money through free grants and lotteries. Some scammers may call with threats of jail or lawsuits if you don’t pay them.</span></p><div class="usa-accordion-bordered usa-accordion-from-content usa-accordion-toggle" data-dcnode-id="1009" data-multiselectable="true" id="accordion-item-37207"><button aria-controls="accordion-item-37207" aria-expanded="false" aria-labelledby="item-37207 item-37207-all" class="usa-accordion-toggle-all" data-dcnode-id="1080" data-initialtext="Open All +" data-toggledtext="Close All -" id="item-37207-all"><span data-dcnode-id="1081" instrument_node="">Open All +</span></button><ul data-dcnode-id="1010"><li data-dcnode-id="1053"><h3 class="accordion-heading" data-dcnode-id="1075"><span data-dcnode-id="1079" instrument_node="">
</span><button aria-controls="accordion-item-37207-0" aria-expanded="false" aria-label="Report Telephone Scams" class="usa-accordion-button initialized" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Report Telephone Scams</span></button><span data-dcnode-id="1076" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="1054" id="accordion-item-37207-0"><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">It's important to report phone scams to federal agencies. They can’t investigate individual cases. But your report can help them collect evidence for lawsuits against scammers.</span></p><ul data-dcnode-id="1060"><li data-dcnode-id="1069"><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reportfraud.ftc.gov/%23/"><span data-dcnode-id="1072" instrument_node="">Report telephone scams online to the Federal Trade Commission</span></a><span data-dcnode-id="1070" instrument_node="">. You can also call 1-877-382-4357 (TTY: 1-866-653-4261). The FTC is the primary government agency that collects scam complaints.&nbsp;</span></li><li data-dcnode-id="1065"><a data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.donotcall.gov/"><span data-dcnode-id="1068" instrument_node="">Report all robocalls and unwanted telemarketing calls to the Do Not Call Registry</span></a><span data-dcnode-id="1066" instrument_node="">.&nbsp;</span></li><li data-dcnode-id="1061"><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumercomplaints.fcc.gov/hc/en-us"><span data-dcnode-id="1064" instrument_node="">Report caller ID spoofing to the Federal Communications Commission</span></a><span data-dcnode-id="1062" instrument_node="">. You can report either online or by phone at 1-888-225-5322 (TTY: 1-888-835-5322).&nbsp;</span></li></ul><p data-dcnode-id="1055"><span data-dcnode-id="1059" instrument_node="">For more help in resolving consumer issues, you can report scams to your </span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/state-consumer"><span data-dcnode-id="1058" instrument_node="">state consumer protection office</span></a><span data-dcnode-id="1056" instrument_node="">.</span></p></div></li><li data-dcnode-id="1011"><h3 class="accordion-heading" data-dcnode-id="1048"><span data-dcnode-id="1052" instrument_node="">
</span><button aria-controls="accordion-item-37207-1" aria-expanded="false" aria-label="Protect Yourself From Telephone Scams" class="usa-accordion-button initialized" data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Protect Yourself From Telephone Scams</span></button><span data-dcnode-id="1049" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="1012" id="accordion-item-37207-1"><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Remember these tips to avoid being a victim of a telephone scam:</span></p><h4 data-dcnode-id="1043"><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">Do:</span></h4><ul data-dcnode-id="1024"><li data-dcnode-id="1038"><span data-dcnode-id="1042" instrument_node="">Register your phone number with the </span><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.donotcall.gov/"><span data-dcnode-id="1041" instrument_node="">National Do Not Call Registry</span></a><span data-dcnode-id="1039" instrument_node="">. You may register online or by calling 1-888-382-1222 (TTY: 1-866-290-4236). If you still receive telemarketing calls after registering, there’s a good chance that the calls are scams.&nbsp;</span></li><li data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Be wary of callers claiming that you’ve won a prize or vacation package.&nbsp;</span></li><li data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Hang up on suspicious phone calls.&nbsp;</span></li><li data-dcnode-id="1029"><span data-dcnode-id="1033" instrument_node="">Be cautious of caller ID. Scammers can change the phone number that shows up on your caller ID screen. </span><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumer.ftc.gov/consumer-alerts/2016/05/scammers-can-fake-caller-id-info"><span data-dcnode-id="1032" instrument_node="">This is called “spoofing.”</span></a><span data-dcnode-id="1030" instrument_node="">&nbsp;</span></li><li data-dcnode-id="1025"><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbb.org/search"><span data-dcnode-id="1028" instrument_node="">Independently research business opportunities, charities, or travel packages that the caller offers</span></a><span data-dcnode-id="1026" instrument_node="">.</span></li></ul><h4 data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Don’t:</span></h4><ul data-dcnode-id="1013"><li data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Don’t give in to pressure to take immediate action.&nbsp;</span></li><li data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Don’t say anything if a caller starts the call asking, “Can you hear me?” This is a common tactic for scammers to record you saying “yes.” Scammers record your “yes” response and use it as proof that you agreed to a purchase or credit card charge.&nbsp;</span></li><li data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Don’t provide your credit card number, bank account information, or other personal information to a caller.&nbsp;</span></li><li data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Don’t send money if a caller tells you to wire money or pay with a prepaid debit card.</span></li></ul></div></li></ul></div><span data-dcnode-id="1008" instrument_node="">
</span></article><span data-dcnode-id="1006" instrument_node=""> </span><article aria-labelledby="item-35227" data-dcnode-id="917" role="complementary"><span data-dcnode-id="1005" instrument_node="">
</span><header data-dcnode-id="1000"><span data-dcnode-id="1004" instrument_node="">
</span><h2 class="accordionified" data-dcnode-id="1002" id="item-35227"><span data-dcnode-id="1003" instrument_node="">Census-Related Fraud</span></h2><span data-dcnode-id="1001" instrument_node="">
</span></header><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Census scams happen when someone pretends to work for the Census Bureau to steal your personal information. Use this information to learn how these scams work, and protect yourself against them.&nbsp;</span></p><div class="usa-accordion-bordered usa-accordion-from-content usa-accordion-toggle" data-dcnode-id="919" data-multiselectable="true" id="accordion-item-35227"><button aria-controls="accordion-item-35227" aria-expanded="false" aria-labelledby="item-35227 item-35227-all" class="usa-accordion-toggle-all" data-dcnode-id="996" data-initialtext="Open All +" data-toggledtext="Close All -" id="item-35227-all"><span data-dcnode-id="997" instrument_node="">Open All +</span></button><ul data-dcnode-id="920"><li data-dcnode-id="987"><h3 class="accordion-heading" data-dcnode-id="991"><span data-dcnode-id="995" instrument_node="">
</span><button aria-controls="accordion-item-35227-0" aria-expanded="false" aria-label="How Census Related Fraud Works" class="usa-accordion-button initialized" data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">How Census Related Fraud Works</span></button><span data-dcnode-id="992" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="988" id="accordion-item-35227-0"><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Some scam artists may pretend to be work for the Census Bureau. They'll try to collect your personal information to use for fraud or to steal your identity. These scam artists may send you letters that seem to come from the U.S. Census Bureau. Others&nbsp;may come to your home to collect information about you.</span></p></div></li><li data-dcnode-id="975"><h3 class="accordion-heading" data-dcnode-id="982"><span data-dcnode-id="986" instrument_node="">
</span><button aria-controls="accordion-item-35227-1" aria-expanded="false" aria-label="Report Census-Related Fraud" class="usa-accordion-button initialized" data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Report Census-Related Fraud</span></button><span data-dcnode-id="983" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="976" id="accordion-item-35227-1"><p data-dcnode-id="977"><span data-dcnode-id="981" instrument_node="">If you suspect fraud, report it to the Census Bureau’s</span><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.census.gov/about/regions.html"><span data-dcnode-id="980" instrument_node=""> report it to the Census Bureau’s regional office for your state</span></a><span data-dcnode-id="978" instrument_node="">. Forward scam emails to the Census Bureau at &nbsp;ois.fraud.reporting@census.gov.</span></p></div></li><li data-dcnode-id="921"><h3 class="accordion-heading" data-dcnode-id="970"><span data-dcnode-id="974" instrument_node="">
</span><button aria-controls="accordion-item-35227-2" aria-expanded="false" aria-label="How to Protect Yourself" class="usa-accordion-button initialized" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">How to Protect Yourself</span></button><span data-dcnode-id="971" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="922" id="accordion-item-35227-2"><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Follow these tips to ensure that your personal information stays safe:</span></p><h4 data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Do</span></h4><ul data-dcnode-id="938"><li data-dcnode-id="960"><p data-dcnode-id="961"><span data-dcnode-id="965" instrument_node="">Verify that the study is legitimate. Check the survey name on the Census Bureau's&nbsp;</span><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.census.gov/programs-surveys/surveyhelp/list-of-surveys.html"><span data-dcnode-id="964" instrument_node="">list of surveys</span></a><span data-dcnode-id="962" instrument_node="">.</span></p></li><li data-dcnode-id="954"><p data-dcnode-id="955"><span data-dcnode-id="959" instrument_node="">If someone comes to your home and claims to be a census worker,&nbsp;</span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.census.gov/programs-surveys/surveyhelp/verify-a-survey.html%23person"><span data-dcnode-id="958" instrument_node="">verify that they work for the Census Bureau</span></a><span data-dcnode-id="956" instrument_node="">.</span></p></li><li data-dcnode-id="948"><p data-dcnode-id="949"><span data-dcnode-id="953" instrument_node="">Look up the employee's name in the </span><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.census.gov/cgi-bin/main/email.cgi"><span data-dcnode-id="952" instrument_node="">Census Bureau staff directory</span></a><span data-dcnode-id="950" instrument_node="">.</span></p></li><li data-dcnode-id="945"><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Ask to see their badge. A Census Bureau badge has a picture of the field agent, a Department of Commerce watermark, and an expiration date.</span></p></li><li data-dcnode-id="939"><p data-dcnode-id="940"><span data-dcnode-id="944" instrument_node="">Follow these&nbsp;</span><a data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.census.gov/programs-surveys/surveyhelp/fraudulent-activity-and-scams.html"><span data-dcnode-id="943" instrument_node="">tips to help you spot census scams</span></a><span data-dcnode-id="941" instrument_node="">, so you don’t become a victim.</span></p></li></ul><h4 data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Don’t</span></h4><ul data-dcnode-id="923"><li data-dcnode-id="933"><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Don’t share your full Social Security number, bank or credit card account numbers, or your mother’s maiden name. The Census Bureau won't ask for this type of information.</span></p></li><li data-dcnode-id="930"><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Don't trust emails claiming to be from the Census Bureau. This agency uses postal mail to invite individuals to take part in its surveys. If you get an email from the Census Bureau, it's probably a scam.</span></p></li><li data-dcnode-id="924"><p data-dcnode-id="925"><span data-dcnode-id="929" instrument_node="">Don't trust caller ID. Call the Census Bureau’s</span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.census.gov/about/npc.Call_from_an_Interviewer.html"><span data-dcnode-id="928" instrument_node=""> National Processing Center</span></a><span data-dcnode-id="926" instrument_node=""> to verify a telephone survey.</span></p></li></ul></div></li></ul></div><span data-dcnode-id="918" instrument_node="">
</span></article><span data-dcnode-id="916" instrument_node=""> </span><article aria-labelledby="item-213803" data-dcnode-id="815" role="complementary"><span data-dcnode-id="915" instrument_node="">
</span><header data-dcnode-id="910"><span data-dcnode-id="914" instrument_node="">
</span><h2 class="accordionified" data-dcnode-id="912" id="item-213803"><span data-dcnode-id="913" instrument_node="">Government Grant Scams</span></h2><span data-dcnode-id="911" instrument_node="">
</span></header><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Government grant scammers try to get your money by guaranteeing you a grant for costs like college or home repairs. They ask for your checking account information. With it, they say they will "deposit the grant money into your account" or withdraw a “one-time processing fee.”</span></p><p data-dcnode-id="903"><span data-dcnode-id="907" instrument_node="">In reality, </span><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/grants%23item-36807"><span data-dcnode-id="906" instrument_node="">government grants are rarely awarded to individuals</span></a><span data-dcnode-id="904" instrument_node="">. They usually go to state and local governments, universities, and other organizations. The money is awarded to help pay for research and projects that will benefit the public.</span></p><div class="usa-accordion-bordered usa-accordion-from-content usa-accordion-toggle" data-dcnode-id="817" data-multiselectable="true" id="accordion-item-213803"><button aria-controls="accordion-item-213803" aria-expanded="false" aria-labelledby="item-213803 item-213803-all" class="usa-accordion-toggle-all" data-dcnode-id="901" data-initialtext="Open All +" data-toggledtext="Close All -" id="item-213803-all"><span data-dcnode-id="902" instrument_node="">Open All +</span></button><ul data-dcnode-id="818"><li data-dcnode-id="870"><h3 class="accordion-heading" data-dcnode-id="896"><span data-dcnode-id="900" instrument_node="">
</span><button aria-controls="accordion-item-213803-0" aria-expanded="false" aria-label="Report Grant Scams" class="usa-accordion-button initialized" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Report Grant Scams</span></button><span data-dcnode-id="897" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="871" id="accordion-item-213803-0"><p data-dcnode-id="891"><span data-dcnode-id="895" instrument_node="">If you think you’ve been a victim of a government grant scam, </span><a data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reportfraud.ftc.gov/%23/%3Fpid%3DB"><span data-dcnode-id="894" instrument_node="">report the scam&nbsp;to the Federal Trade Commission (FTC)</span></a><span data-dcnode-id="892" instrument_node="">.&nbsp;</span></p><ul data-dcnode-id="879"><li data-dcnode-id="886"><p data-dcnode-id="887"><a data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reportfraud.ftc.gov/%23/assistant%3Fpid%3DB"><span data-dcnode-id="890" instrument_node="">Online</span></a><span data-dcnode-id="888" instrument_node="">&nbsp;</span></p></li><li data-dcnode-id="880"><p data-dcnode-id="881"><span data-dcnode-id="885" instrument_node="">By calling&nbsp;</span><span class="num" data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">1-877-FTC-HELP</span></span><span data-dcnode-id="882" instrument_node=""> (1-877-382-4357)</span></p></li></ul><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">The FTC enters fraud-related complaints into a database available to law enforcement agencies in the U.S. and abroad.</span></p><p data-dcnode-id="872"><span data-dcnode-id="876" instrument_node="">If you’ve paid a fee to learn about or apply for a government grant, you can report it to your </span><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/state-consumer"><span data-dcnode-id="875" instrument_node="">state consumer protection office</span></a><span data-dcnode-id="873" instrument_node="">. The government does not charge for information or applications for federal grants.</span></p></div></li><li data-dcnode-id="819"><h3 class="accordion-heading" data-dcnode-id="865"><span data-dcnode-id="869" instrument_node="">
</span><button aria-controls="accordion-item-213803-1" aria-expanded="false" aria-label="Protect Yourself From Grant Scams" class="usa-accordion-button initialized" data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Protect Yourself From Grant Scams</span></button><span data-dcnode-id="866" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="820" id="accordion-item-213803-1"><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Remember these tips to avoid being a victim of a grant scam:</span></p><h4 data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Do</span></h4><ul data-dcnode-id="839"><li data-dcnode-id="858"><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Be wary of advertisements and calls about free government grants. These are usually scams.</span></p></li><li data-dcnode-id="840"><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Register your phone number with the National Do Not Call Registry. This may reduce the number of telemarketing calls you receive. You can register:</span></p><ul data-dcnode-id="841"><li data-dcnode-id="851"><p data-dcnode-id="852"><span data-dcnode-id="855" instrument_node="">Online at </span><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.donotcall.gov/register.html"><span data-dcnode-id="854" instrument_node="">donotcall.gov</span></a></p></li><li data-dcnode-id="842"><p data-dcnode-id="843"><span data-dcnode-id="850" instrument_node="">By calling </span><span class="num" data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">1-888-382-1222</span></span><span data-dcnode-id="847" instrument_node="">&nbsp;(TTY: </span><span class="num" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">1-866-290-4236</span></span><span data-dcnode-id="844" instrument_node="">) from the phone number you wish to register</span></p></li></ul></li></ul><h4 data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Don’t</span></h4><ul data-dcnode-id="821"><li data-dcnode-id="834"><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Don’t give your bank account information to anyone you don’t know.</span></p></li><li data-dcnode-id="828"><p data-dcnode-id="829"><span data-dcnode-id="833" instrument_node="">Don’t pay any money for a government grant. You can get information about government grants for free at public libraries and online at </span><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grants.gov/"><span data-dcnode-id="832" instrument_node="">Grants.gov</span></a><span data-dcnode-id="830" instrument_node="">. Government agencies don’t charge processing fees for grants they’ve awarded.</span></p></li><li data-dcnode-id="825"><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Don’t believe callers who claim they’re from an official-sounding government agency with news about a grant. Check out the name of the agency online or in the phone book—it may be fake.</span></p></li><li data-dcnode-id="822"><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Don’t assume a phone call is originating from the area code displayed on your caller ID. Some scam artists use technology to disguise their location and make it appear as if they’re calling from Washington, DC.</span></p></li></ul></div></li></ul></div><span data-dcnode-id="816" instrument_node="">
</span></article><span data-dcnode-id="814" instrument_node=""> </span><article aria-labelledby="item-213708" data-dcnode-id="719" role="complementary"><span data-dcnode-id="813" instrument_node="">
</span><header data-dcnode-id="808"><span data-dcnode-id="812" instrument_node="">
</span><h2 class="accordionified" data-dcnode-id="810" id="item-213708"><span data-dcnode-id="811" instrument_node="">Investment Scams</span></h2><span data-dcnode-id="809" instrument_node="">
</span></header><p data-dcnode-id="804"><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investor.gov/protect-your-investments/fraud/types-fraud%23.VA32ZsVSHPR"><span data-dcnode-id="807" instrument_node="">Investment scams</span></a><span data-dcnode-id="805" instrument_node=""> promise high returns, without financial risk. Use this information to report and protect your investments.</span></p><div class="usa-accordion-bordered usa-accordion-from-content usa-accordion-toggle" data-dcnode-id="721" data-multiselectable="true" id="accordion-item-213708"><button aria-controls="accordion-item-213708" aria-expanded="false" aria-labelledby="item-213708 item-213708-all" class="usa-accordion-toggle-all" data-dcnode-id="802" data-initialtext="Open All +" data-toggledtext="Close All -" id="item-213708-all"><span data-dcnode-id="803" instrument_node="">Open All +</span></button><ul data-dcnode-id="722"><li data-dcnode-id="773"><h3 class="accordion-heading" data-dcnode-id="797"><span data-dcnode-id="801" instrument_node="">
</span><button aria-controls="accordion-item-213708-0" aria-expanded="false" aria-label="Report Investment Scams" class="usa-accordion-button initialized" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Report Investment Scams</span></button><span data-dcnode-id="798" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="774" id="accordion-item-213708-0"><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Report investment scams to the right government agency.</span></p><ul data-dcnode-id="777"><li data-dcnode-id="790"><p data-dcnode-id="791"><a data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sec.gov/oiea/Complaint.html"><span data-dcnode-id="794" instrument_node="">File a complaint about an investment</span></a><span data-dcnode-id="792" instrument_node=""> or an investment account with the Securities and Exchange Commission (SEC).</span></p></li><li data-dcnode-id="784"><p data-dcnode-id="785"><span data-dcnode-id="789" instrument_node="">Report pyramid or Ponzi schemes to the </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reportfraud.ftc.gov/"><span data-dcnode-id="788" instrument_node="">Federal Trade Commission (FTC)</span></a><span data-dcnode-id="786" instrument_node="">.</span></p></li><li data-dcnode-id="778"><p data-dcnode-id="779"><span data-dcnode-id="783" instrument_node="">Report investment scams by state-licensed companies to </span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasaa.org/contact-your-regulator/"><span data-dcnode-id="782" instrument_node="">your state's securities administrator</span></a><span data-dcnode-id="780" instrument_node="">.</span></p></li></ul><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">The SEC may forward your complaint to the investment company. It will&nbsp;request that the company reply to your complaint. The FTC will not research your individual case of investment fraud.</span></p></div></li><li data-dcnode-id="723"><h3 class="accordion-heading" data-dcnode-id="768"><span data-dcnode-id="772" instrument_node="">
</span><button aria-controls="accordion-item-213708-1" aria-expanded="false" aria-label="How to Protect Yourself" class="usa-accordion-button initialized" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">How to Protect Yourself</span></button><span data-dcnode-id="769" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="724" id="accordion-item-213708-1"><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Remember these tips to avoid experiencing&nbsp;an investment scam:</span></p><h4 data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Do</span></h4><ul data-dcnode-id="746"><li data-dcnode-id="756"><p data-dcnode-id="757"><span data-dcnode-id="763" instrument_node="">Research investment opportunities and investment professionals. Your </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasaa.org/contact-your-regulator/"><span data-dcnode-id="762" instrument_node="">state securities regulator</span></a><span data-dcnode-id="760" instrument_node=""> and the </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sec.gov/investor/pubs/affinity.htm"><span data-dcnode-id="759" instrument_node="">Financial Industry Regulatory Authority offer information.</span></a></p></li><li data-dcnode-id="753"><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Learn where the investment and the investment professional have&nbsp;registered. It may be&nbsp;in your state or with other regulators.</span></p></li><li data-dcnode-id="750"><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Get all the details of an investment in writing, but still do your own research.</span></p></li><li data-dcnode-id="747"><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Ask questions about costs, timing, risks, and other issues.</span></p></li></ul><h4 data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Don’t</span></h4><ul data-dcnode-id="725"><li data-dcnode-id="741"><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Don’t give in to&nbsp;pressure to invest immediately.</span></p></li><li data-dcnode-id="738"><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Don’t be influenced by promises that seem too good to be true. These promises may include&nbsp;“guaranteed earnings” or “risk-free” investments.</span></p></li><li data-dcnode-id="735"><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Don’t invest just because the investment professional seems nice, trustworthy, or has&nbsp;professional titles.</span></p></li><li data-dcnode-id="729"><p data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">Don’t invest based on claims&nbsp;that&nbsp;</span><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sec.gov/investor/pubs/affinity.htm"><span data-dcnode-id="733" instrument_node="">other people, "just like you"</span></a><span data-dcnode-id="731" instrument_node="">, have invested.</span></p></li><li data-dcnode-id="726"><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Don’t feel obligated to invest, even if the&nbsp;professional gave you a gift, lunch, or reduced their&nbsp;fees.</span></p></li></ul></div></li></ul></div><span data-dcnode-id="720" instrument_node="">
</span></article><span data-dcnode-id="718" instrument_node=""> </span><article aria-labelledby="item-35527" data-dcnode-id="600" role="complementary"><span data-dcnode-id="717" instrument_node="">
</span><header data-dcnode-id="712"><span data-dcnode-id="716" instrument_node="">
</span><h2 class="accordionified" data-dcnode-id="714" id="item-35527"><span data-dcnode-id="715" instrument_node="">Lottery and Sweepstakes Scams</span></h2><span data-dcnode-id="713" instrument_node="">
</span></header><p data-dcnode-id="708"><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumer.ftc.gov/articles/fake-prize-sweepstakes-lottery-scams"><span data-dcnode-id="711" instrument_node="">Prize scammers</span></a><span data-dcnode-id="709" instrument_node=""> try to get your money or personal information through fake lotteries, sweepstakes, or other contests. Many claim that you’ve won a prize but must pay a fee to collect it. Others require you to provide personal information to enter a “contest.” These scams may reach you by postal mail, email, phone call, robocall, or text message.</span></p><div class="usa-accordion-bordered usa-accordion-from-content usa-accordion-toggle" data-dcnode-id="602" data-multiselectable="true" id="accordion-item-35527"><button aria-controls="accordion-item-35527" aria-expanded="false" aria-labelledby="item-35527 item-35527-all" class="usa-accordion-toggle-all" data-dcnode-id="706" data-initialtext="Open All +" data-toggledtext="Close All -" id="item-35527-all"><span data-dcnode-id="707" instrument_node="">Open All +</span></button><ul data-dcnode-id="603"><li data-dcnode-id="673"><h3 class="accordion-heading" data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">
</span><button aria-controls="accordion-item-35527-0" aria-expanded="false" aria-label="Report Lottery and Sweepstakes Scams" class="usa-accordion-button initialized" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Report Lottery and Sweepstakes Scams</span></button><span data-dcnode-id="702" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="674" id="accordion-item-35527-0"><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">To report a prize scam:</span></p><ul data-dcnode-id="680"><li data-dcnode-id="691"><p data-dcnode-id="692"><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reportfraud.ftc.gov/"><span data-dcnode-id="698" instrument_node="">Contact the Federal Trade Commission</span></a><span data-dcnode-id="696" instrument_node=""> online or by phone at </span><span class="num" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">1-877-382-4357</span></span><span data-dcnode-id="693" instrument_node="">.</span></p></li><li data-dcnode-id="686"><p data-dcnode-id="687"><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uspis.gov/report"><span data-dcnode-id="690" instrument_node="">Contact a postal inspector</span></a><span data-dcnode-id="688" instrument_node=""> if the scam uses the U.S. mail .</span></p></li><li data-dcnode-id="681"><p data-dcnode-id="682"><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.donotcall.gov/report.html"><span data-dcnode-id="685" instrument_node="">Report robocalls and unwanted telemarketing calls to the Do Not Call Registry</span></a><span data-dcnode-id="683" instrument_node="">.</span></p></li></ul><p data-dcnode-id="675"><span data-dcnode-id="679" instrument_node="">Federal agencies investigate scams and pursue criminal charges against the scammers. They don’t, however, investigate individual cases. </span><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/state-consumer"><span data-dcnode-id="678" instrument_node="">State consumer protection offices</span></a><span data-dcnode-id="676" instrument_node="">&nbsp;might pursue individual cases as well as investigate scams.</span></p></div></li><li data-dcnode-id="604"><h3 class="accordion-heading" data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">
</span><button aria-controls="accordion-item-35527-1" aria-expanded="false" aria-label="Protect Yourself From Lottery and Sweepstakes Scams" class="usa-accordion-button initialized" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Protect Yourself From Lottery and Sweepstakes Scams</span></button><span data-dcnode-id="669" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="605" id="accordion-item-35527-1"><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Remember these tips to avoid being a victim of a lottery or sweepstakes scam:</span></p><h4 data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Do</span></h4><ul data-dcnode-id="636"><li data-dcnode-id="661"><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Ask yourself if&nbsp;you entered a particular contest. If you didn’t enter it, the prize notice is likely a fake.</span></p></li><li data-dcnode-id="658"><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Some scammers use the&nbsp;names of organizations that run real sweepstakes. Research the company's contact information. Contact them to verify if the prize is legitimate.</span></p></li><li data-dcnode-id="646"><p data-dcnode-id="647"><span data-dcnode-id="657" instrument_node="">Register your phone number with the </span><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.donotcall.gov/"><span data-dcnode-id="656" instrument_node="">National Do Not Call Registry</span></a><span data-dcnode-id="654" instrument_node="">. You may </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.donotcall.gov/register.html%23step1"><span data-dcnode-id="653" instrument_node="">register online</span></a><span data-dcnode-id="651" instrument_node=""> or by calling </span><span class="num" data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">1-888-382-1222</span></span><span data-dcnode-id="648" instrument_node="">. If you still receive telemarketing calls after registering, there’s a good chance that the calls are scams.</span></p></li><li data-dcnode-id="640"><p data-dcnode-id="641"><span data-dcnode-id="645" instrument_node="">Report </span><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumer.ftc.gov/articles/how-recognize-and-report-spam-text-messages"><span data-dcnode-id="644" instrument_node="">spam text</span></a><span data-dcnode-id="642" instrument_node=""> messages to your mobile carrier, then delete them.</span></p></li><li data-dcnode-id="637"><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Hang up on suspicious calls.</span></p></li></ul><h4 data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Don’t</span></h4><ul data-dcnode-id="606"><li data-dcnode-id="631"><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Don’t pay a fee, taxes, or shipping charges to receive a prize.</span></p></li><li data-dcnode-id="628"><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Don’t wire money to, or deposit a check from, any organization claiming to run a sweepstakes or lottery.</span></p></li><li data-dcnode-id="625"><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Don’t provide your credit card number or&nbsp;bank account information to receive a prize.</span></p></li><li data-dcnode-id="622"><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Don’t believe someone just because they say they’re from the government or an official-sounding organization.</span></p></li><li data-dcnode-id="616"><p data-dcnode-id="617"><span data-dcnode-id="621" instrument_node="">Don’t reply to, or click on any links in, a </span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumer.ftc.gov/articles/how-recognize-and-report-spam-text-messages"><span data-dcnode-id="620" instrument_node="">spam text</span></a><span data-dcnode-id="618" instrument_node="">&nbsp;message.</span></p></li><li data-dcnode-id="613"><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Don’t give in to pressure to take immediate action.</span></p></li><li data-dcnode-id="607"><p data-dcnode-id="608"><span data-dcnode-id="612" instrument_node="">Don’t believe anyone claiming to be from a foreign lottery or sweepstakes. It’s </span><a data-dcnode-id="610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumer.ftc.gov/articles/fake-prize-sweepstakes-lottery-scams"><span data-dcnode-id="611" instrument_node="">illegal to enter foreign contests</span></a><span data-dcnode-id="609" instrument_node=""> like these.</span></p></li></ul></div></li></ul></div><span data-dcnode-id="601" instrument_node="">
</span></article><span data-dcnode-id="599" instrument_node=""> </span><article aria-labelledby="item-211606" data-dcnode-id="510" role="complementary"><span data-dcnode-id="598" instrument_node="">
</span><header data-dcnode-id="593"><span data-dcnode-id="597" instrument_node="">
</span><h2 class="accordionified" data-dcnode-id="595" id="item-211606"><span data-dcnode-id="596" instrument_node="">Charity Scams</span></h2><span data-dcnode-id="594" instrument_node="">
</span></header><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Some scammers set up fake organizations&nbsp;to take advantage of the public’s generosity. They especially take advantage of&nbsp;tragedies and&nbsp;disasters.</span></p><div class="usa-accordion-bordered usa-accordion-from-content usa-accordion-toggle" data-dcnode-id="512" data-multiselectable="true" id="accordion-item-211606"><button aria-controls="accordion-item-211606" aria-expanded="false" aria-labelledby="item-211606 item-211606-all" class="usa-accordion-toggle-all" data-dcnode-id="589" data-initialtext="Open All +" data-toggledtext="Close All -" id="item-211606-all"><span data-dcnode-id="590" instrument_node="">Open All +</span></button><ul data-dcnode-id="513"><li data-dcnode-id="558"><h3 class="accordion-heading" data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">
</span><button aria-controls="accordion-item-211606-0" aria-expanded="false" aria-label="How to Report Charity Scams" class="usa-accordion-button initialized" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">How to Report Charity Scams</span></button><span data-dcnode-id="585" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="559" id="accordion-item-211606-0"><ul data-dcnode-id="565"><li data-dcnode-id="578"><p data-dcnode-id="579"><span data-dcnode-id="583" instrument_node="">Your </span><a data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/state-consumer"><span data-dcnode-id="582" instrument_node="">state consumer protection office</span></a><span data-dcnode-id="580" instrument_node=""> can accept and investigate consumer complaints.</span></p></li><li data-dcnode-id="572"><p data-dcnode-id="573"><span data-dcnode-id="577" instrument_node="">File a complaint with the </span><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reportfraud.ftc.gov/%23/%3Fpid%3DB"><span data-dcnode-id="576" instrument_node="">Federal Trade Commission</span></a><span data-dcnode-id="574" instrument_node=""> (FTC). The FTC does not resolve individual matters. But it does track charity fraud claims and sues companies on the behalf of consumers.</span></p></li><li data-dcnode-id="566"><p data-dcnode-id="567"><span data-dcnode-id="571" instrument_node="">Contact the </span><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/disaster-fraud/how-report-disaster-related-fraud"><span data-dcnode-id="570" instrument_node="">National Center for Disaster Fraud</span></a><span data-dcnode-id="568" instrument_node="">,&nbsp;if the&nbsp;fraud is because of a natural disaster.</span></p></li></ul><p data-dcnode-id="560"><span data-dcnode-id="564" instrument_node="">The </span><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.donotcall.gov/index.html%23who"><span data-dcnode-id="563" instrument_node="">Do Not Call Registry doesn’t apply to charities</span></a><span data-dcnode-id="561" instrument_node="">. But you can ask an organization not to contact you again.</span></p></div></li><li data-dcnode-id="514"><h3 class="accordion-heading" data-dcnode-id="553"><span data-dcnode-id="557" instrument_node="">
</span><button aria-controls="accordion-item-211606-1" aria-expanded="false" aria-label="How to Protect Yourself From Charity Scams" class="usa-accordion-button initialized" data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">How to Protect Yourself From Charity Scams</span></button><span data-dcnode-id="554" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="515" id="accordion-item-211606-1"><p data-dcnode-id="546"><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//give.org/donor-landing-page/giving-guidance-tips"><span data-dcnode-id="552" instrument_node="">Follow these tips</span></a><span data-dcnode-id="550" instrument_node=""> to detect common </span><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumer.ftc.gov/articles/giving-charity%23Signs"><span data-dcnode-id="549" instrument_node="">charity scam tactics</span></a><span data-dcnode-id="547" instrument_node="">:</span></p><h4 data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Do</span></h4><ul data-dcnode-id="531"><li data-dcnode-id="535"><p data-dcnode-id="536"><span data-dcnode-id="543" instrument_node="">Check out the charity with your </span><a data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/state-consumer"><span data-dcnode-id="542" instrument_node="">state consumer protection office</span></a><span data-dcnode-id="540" instrument_node=""> or the </span><a data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.give.org/"><span data-dcnode-id="539" instrument_node="">Better Business Bureau</span></a><span data-dcnode-id="537" instrument_node="">.</span></p></li><li data-dcnode-id="532"><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Verify the name. Fake charities often choose names that are close to well established charities.&nbsp;</span></p></li></ul><h4 data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Don’t</span></h4><ul data-dcnode-id="516"><li data-dcnode-id="526"><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Don’t give in to high pressure tactics such as urging you to donate immediately.</span></p></li><li data-dcnode-id="520"><p data-dcnode-id="521"><span data-dcnode-id="525" instrument_node="">Don’t assume that you can get a tax deduction for donating to an organization. Use the </span><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.irs.gov/app/eos/"><span data-dcnode-id="524" instrument_node="">IRS’s database of 501(c)3 organizations</span></a><span data-dcnode-id="522" instrument_node=""> to find out if it has this status.</span></p></li><li data-dcnode-id="517"><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Don’t send cash. Pay with a check or credit card.</span></p></li></ul></div></li></ul></div><span data-dcnode-id="511" instrument_node="">
</span></article><span data-dcnode-id="509" instrument_node=""> </span><article aria-labelledby="item-37297" data-dcnode-id="416" role="complementary"><span data-dcnode-id="508" instrument_node="">
</span><header data-dcnode-id="503"><span data-dcnode-id="507" instrument_node="">
</span><h2 class="accordionified" data-dcnode-id="505" id="item-37297"><span data-dcnode-id="506" instrument_node="">Pyramid Schemes</span></h2><span data-dcnode-id="504" instrument_node="">
</span></header><p data-dcnode-id="496"><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investor.gov/introduction-investing/investing-basics/glossary/pyramid-schemes"><span data-dcnode-id="502" instrument_node="">Pyramid schemes</span></a><span data-dcnode-id="500" instrument_node=""> are scams that need a constant flow of new participants to keep them going. They are marketed as </span><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consumer.ftc.gov/articles/multi-level-marketing-businesses-pyramid-schemes"><span data-dcnode-id="499" instrument_node="">multi-level marketing programs</span></a><span data-dcnode-id="497" instrument_node=""> or other types of legitimate businesses. They use new recruits’ "investments" to pay&nbsp;“profits” to those participating longer.</span></p><p data-dcnode-id="492"><span data-dcnode-id="495" instrument_node="">Pyramid schemes collapse when they can't recruit enough new participants&nbsp;to pay earlier investors. These scams always fail—</span><a data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investor.gov/protect-your-investments/fraud/types-fraud/pyramid-schemes"><span data-dcnode-id="494" instrument_node="">it’s mathematically guaranteed.</span></a></p><div class="usa-accordion-bordered usa-accordion-from-content usa-accordion-toggle" data-dcnode-id="418" data-multiselectable="true" id="accordion-item-37297"><button aria-controls="accordion-item-37297" aria-expanded="false" aria-labelledby="item-37297 item-37297-all" class="usa-accordion-toggle-all" data-dcnode-id="490" data-initialtext="Open All +" data-toggledtext="Close All -" id="item-37297-all"><span data-dcnode-id="491" instrument_node="">Open All +</span></button><ul data-dcnode-id="419"><li data-dcnode-id="470"><h3 class="accordion-heading" data-dcnode-id="485"><span data-dcnode-id="489" instrument_node="">
</span><button aria-controls="accordion-item-37297-0" aria-expanded="false" aria-label="Report Pyramid Schemes" class="usa-accordion-button initialized" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Report Pyramid Schemes</span></button><span data-dcnode-id="486" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="471" id="accordion-item-37297-0"><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Report pyramid schemes to:</span></p><ul data-dcnode-id="472"><li data-dcnode-id="478"><p data-dcnode-id="479"><span data-dcnode-id="482" instrument_node="">Your </span><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/state-consumer"><span data-dcnode-id="481" instrument_node="">state consumer protection office</span></a></p></li><li data-dcnode-id="473"><p data-dcnode-id="474"><span data-dcnode-id="477" instrument_node="">The </span><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reportfraud.ftc.gov/%23/"><span data-dcnode-id="476" instrument_node="">Federal Trade Commission</span></a></p></li></ul></div></li><li data-dcnode-id="420"><h3 class="accordion-heading" data-dcnode-id="465"><span data-dcnode-id="469" instrument_node="">
</span><button aria-controls="accordion-item-37297-1" aria-expanded="false" aria-label="How to Protect Yourself" class="usa-accordion-button initialized" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">How to Protect Yourself</span></button><span data-dcnode-id="466" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="421" id="accordion-item-37297-1"><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Keep these tips in mind to avoid falling for a pyramid scheme:</span></p><h4 data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Do</span></h4><ul data-dcnode-id="440"><li data-dcnode-id="458"><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Be wary if you have to recruit more participants to increase your profit, or get your investment back.</span></p></li><li data-dcnode-id="455"><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Ask if the company sells non-tangible products and&nbsp;services&nbsp;rather than physical products.</span></p></li><li data-dcnode-id="447"><p data-dcnode-id="448"><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbb.org/"><span data-dcnode-id="454" instrument_node="">Check out the business with the Better Business Bureau</span></a><span data-dcnode-id="452" instrument_node="">, your </span><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.naag.org/find-my-ag/"><span data-dcnode-id="451" instrument_node="">state attorney general</span></a><span data-dcnode-id="449" instrument_node="">, or state licensing agencies.</span></p></li><li data-dcnode-id="444"><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Ask to see&nbsp;financial statements audited by a certified public accountant (CPA). Find out if&nbsp;the company earns income from selling its products or services to customers, not to its sales team.</span></p></li><li data-dcnode-id="441"><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Be skeptical of success stories and testimonials of fantastic earnings.</span></p></li></ul><h4 data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Don’t</span></h4><ul data-dcnode-id="422"><li data-dcnode-id="435"><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Don’t invest until you’ve verified that the business is legitimate.</span></p></li><li data-dcnode-id="432"><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Don’t get involved in businesses that make you&nbsp;recruit new participants.</span></p></li><li data-dcnode-id="429"><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Don’t buy into franchises that promise&nbsp;big or quick profits.</span></p></li><li data-dcnode-id="423"><p data-dcnode-id="424"><span data-dcnode-id="428" instrument_node="">Don’t invest in any “opportunity” bearing </span><a data-dcnode-id="426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investor.gov/introduction-investing/general-resources/news-alerts/alerts-bulletins/investor-alerts/investor-30"><span data-dcnode-id="427" instrument_node="">warning signs of a pyramid scheme</span></a><span data-dcnode-id="425" instrument_node="">.</span></p></li></ul></div></li></ul></div><span data-dcnode-id="417" instrument_node="">
</span></article><span data-dcnode-id="415" instrument_node=""> </span><article aria-labelledby="item-213719" data-dcnode-id="328" role="complementary"><span data-dcnode-id="414" instrument_node="">
</span><header data-dcnode-id="409"><span data-dcnode-id="413" instrument_node="">
</span><h2 class="accordionified" data-dcnode-id="411" id="item-213719"><span data-dcnode-id="412" instrument_node="">Ponzi Schemes</span></h2><span data-dcnode-id="410" instrument_node="">
</span></header><p data-dcnode-id="404"><span data-dcnode-id="408" instrument_node="">A </span><a data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investor.gov/protect-your-investments/fraud/types-fraud/ponzi-scheme"><span data-dcnode-id="407" instrument_node="">Ponzi scheme</span></a><span data-dcnode-id="405" instrument_node=""> is a type of investment fraud. Use this information to identify, report, and protect yourself against this type of scam.&nbsp;</span></p><div class="usa-accordion-bordered usa-accordion-from-content usa-accordion-toggle" data-dcnode-id="330" data-multiselectable="true" id="accordion-item-213719"><button aria-controls="accordion-item-213719" aria-expanded="false" aria-labelledby="item-213719 item-213719-all" class="usa-accordion-toggle-all" data-dcnode-id="402" data-initialtext="Open All +" data-toggledtext="Close All -" id="item-213719-all"><span data-dcnode-id="403" instrument_node="">Open All +</span></button><ul data-dcnode-id="331"><li data-dcnode-id="393"><h3 class="accordion-heading" data-dcnode-id="397"><span data-dcnode-id="401" instrument_node="">
</span><button aria-controls="accordion-item-213719-0" aria-expanded="false" aria-label="How Ponzi Schemes Work" class="usa-accordion-button initialized" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">How Ponzi Schemes Work</span></button><span data-dcnode-id="398" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="394" id="accordion-item-213719-0"><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Ponzi schemes rely on money from new investors to pay “returns” to current investors. To keep the scheme going, the scammers must&nbsp;continually&nbsp;recruit new investors and discourage&nbsp;current investors from cashing out. Otherwise, they will not&nbsp;bring in enough cash to pay current investors, and&nbsp;the scheme will collapse.</span></p></div></li><li data-dcnode-id="368"><h3 class="accordion-heading" data-dcnode-id="388"><span data-dcnode-id="392" instrument_node="">
</span><button aria-controls="accordion-item-213719-1" aria-expanded="false" aria-label="Report Ponzi Schemes" class="usa-accordion-button initialized" data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Report Ponzi Schemes</span></button><span data-dcnode-id="389" instrument_node="">
</span></h3><div aria-hidden="true" class="usa-accordion-content" data-dcnode-id="369" id="accordion-item-213719-1"><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Report Ponzi schemes to:</span></p><ul data-dcnode-id="370"><li data-dcnode-id="381"><p data-dcnode-id="382"><span data-dcnode-id="385" instrument_node="">The </span><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sec.gov/complaint/select.shtml"><span data-dcnode-id="384" instrument_node="">Securities and Exchange Commission (SEC)</span></a></p></li><li data-dcnode-id="376"><p data-dcnode-id="377"><span data-dcnode-id="380" instrument_node="">The </span><a data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finra.org/investors/need-help"><span data-dcnode-id="379" instrument_node="">Financial Industry Regulatory Authority (FINRA)</span></a></p></li><li data-dcnode-id="371"><p data-dcnode-id="372"><span data-dcnode-id="375" instrument_node="">Your </span><a data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/state-consumer"><span data-dcnode-id="374" instrument_node="">state&nbsp;securities administrator</span></a></p></li></ul></div></li><li data-dcnode-id="332"><h3 class="accordion-heading" data-dcnode-id="363"><span data-dcnode-id="367" instrument_node="">
</span><button aria-controls="accordion-item-213719-2" aria-expanded="false" aria-label="How to Protect Yourself From Ponzi Schemes" class="usa-accordion-button initialized" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">How to Protect Yourself From Ponzi Schemes</span></button><span data-dcnode-id="364" instrument_node="">
