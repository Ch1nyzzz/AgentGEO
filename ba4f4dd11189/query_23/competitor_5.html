</span><h1 class="centered" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Common Fraud Scams</span></h1><span data-dcnode-id="398" instrument_node="">
</span></div><span data-dcnode-id="396" instrument_node="">
</span></div><span data-dcnode-id="394" instrument_node="">
</span></div><span data-dcnode-id="392" instrument_node="">
</span><span data-dcnode-id="390" instrument_node="">
</span><div data-dcnode-id="389" id="content"></div><span data-dcnode-id="388" instrument_node="">
</span><div class="par responsivegrid" data-dcnode-id="206"><span data-dcnode-id="387" instrument_node="">
</span><div class="aem-Grid aem-Grid--12 aem-Grid--default--12" data-dcnode-id="208"><span data-dcnode-id="386" instrument_node="">
</span><div class="fullwidthpagerow parbase aem-GridColumn aem-GridColumn--default--12" data-dcnode-id="252"><div class="fwpagerow-397cdbe535e243e0a98f2083775f9bfa fullwidthpagerow-outer padding--default--left--20 padding--default--top--20 padding--default--right--20 padding--default--bottom--20" data-dcnode-id="256"><span data-dcnode-id="385" instrument_node="">
</span><div class="fullwidthpagerow-inner grid-spacing--default--8 layoutmode-default limit-width" data-dcnode-id="258"><span data-dcnode-id="384" instrument_node="">
</span><div class="responsivegrid" data-dcnode-id="260"><span data-dcnode-id="383" instrument_node="">
</span><div class="aem-Grid aem-Grid--12 aem-Grid--default--12" data-dcnode-id="262"><span data-dcnode-id="382" instrument_node="">
</span><div class="text parbase aem-GridColumn aem-GridColumn--default--12" data-dcnode-id="264"><div class="text-outer padding--default--left--20 padding--default--top--20 padding--default--right--20 padding--default--bottom--20" data-dcnode-id="266"><span data-dcnode-id="381" instrument_node="">
</span><h3 class="centered" data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Protect yourself from some common scams.​​</span></h3><span data-dcnode-id="378" instrument_node="">
</span><div class="text-body" data-dcnode-id="268"><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">​Every day, con artists tempt unsuspecting consumers with get rich quick schemes. Although new variations continue to evolve, the purpose of these scams is the same—to steal your hard-earned money.</span></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="373" instrument_node="">In an effort to provide consumers with information regarding these schemes, Comerica Bank has detailed some of the most common scams. Educate yourself on potential scams and if you suspect you are a victim of fraud it is important to act as quickly as possible.</span><br data-dcnode-id="372"><span data-dcnode-id="371" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="366"><span class="tab-title" data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Foreign Lottery</span></span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">In this scam, consumers receive a phone call, email, or a letter stating that they have won a large sum of money in a foreign lottery. The winner is told that a check will be sent to them to cover part of the taxes they'll owe. They are then instructed to deposit the check into their account, withdraw a specified amount within a few days, and send the funds via wire or money transfer agency to the lottery office. The letter promises the sender that once the funds are received, the remaining prize money will be forwarded to the winner.</span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Shortly after the money is wired, the deposited check is returned as counterfeit to the consumer's account and no winnings are ever received.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="356"><span class="tab-heading" data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Don't gamble with your money.</span></span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Ask yourself the following questions:</span></p><span data-dcnode-id="352" instrument_node="">
</span><ul data-dcnode-id="342"><span data-dcnode-id="351" instrument_node="">
</span><li data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">How could I win the lottery if I never bought a ticket or entered a sweepstakes?</span></li><span data-dcnode-id="348" instrument_node="">
</span><li data-dcnode-id="344"><span data-dcnode-id="347" instrument_node="">Why do I need to send money to get my winnings?</span><br data-dcnode-id="346"><span data-dcnode-id="345" instrument_node="">
&nbsp;</span></li><span data-dcnode-id="343" instrument_node="">
</span></ul><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="338"><span class="tab-title" data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Work at Home Scams</span></span></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="333"><strong data-dcnode-id="334"><span class="tab-heading" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Check Processor</span></span></strong></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">The "business", located outside of the United States, needs someone to process checks from their United States customers. The job applicant is to deposit the checks into their account and wire 90% to the “employer” keeping the remaining 10%. The wires may go to various foreign countries. The check turns out to be counterfeit and the "employee" is responsible to their bank for the entire amount. Ask yourself: Why does an international business need me to process checks?</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="325"><strong data-dcnode-id="326"><span class="tab-heading" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Shipper&nbsp;</span></span></strong></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">The "business" needs goods available in the United States. The applicant is asked to ship them to an address overseas at their own expense. The shipping fee will be reimbursed (with a counterfeit check). The items to be shipped are usually stolen or purchased with a stolen credit card.</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Use extreme caution when dealing with employers you are not familiar with. Do some research on your own.​</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">&nbsp;</span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="312"><span class="tab-title" data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Inheritance Fraud</span></span></p><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">This scam begins with the consumer receiving a fax, letter, or email from someone with a very confidential business proposal. The letter states that an individual, worth millions of dollars, has died without a will.</span></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">The writer is trying to keep the money from reverting to a corrupt government and requests assistance from the consumer. The victim is asked to provide an account number where the money can be transferred, and in exchange for this "service," the victim will make a profit.</span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">A check is sent to the victim for deposit into their bank account. Then the victim is instructed to send funds back to the originator of the letter via wire, money orders, or money transfer agency in increments under $10,000, and keep the "extra" money in their account.</span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Shortly after the money is wired, the deposited check is returned as counterfeit to the victim’s account, no winnings are ever received and the victim is responsible for the entire amount of the check.</span></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="295"><strong data-dcnode-id="296"><span class="tab-heading" data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">If it is too good to be true, ask yourself:&nbsp;</span></span></strong></p><span data-dcnode-id="294" instrument_node="">
</span><ul data-dcnode-id="283"><span data-dcnode-id="293" instrument_node="">
</span><li data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Why would the writer want to share the money?</span></li><span data-dcnode-id="290" instrument_node="">
</span><li data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Why do they want this transaction kept confidential?</span></li><span data-dcnode-id="287" instrument_node="">
</span><li data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Why do they want some of the money returned to them?​</span></li><span data-dcnode-id="284" instrument_node="">
</span></ul><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">&nbsp;</span></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="276"><span class="tab-title" data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Elder Financial Abuse</span></span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Many innocent older adults are falling victim to financial exploitation and robbed of their life savings every day. Financial exploitation against the elderly is defined as any illegal or improper use of an elder’s funds, property or assets.</span></p><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Examples of exploitation can include stealing their personal information and making unauthorized withdrawals on the elder’s account, deceiving them into believing they have won the lottery or sweepstakes or abusing powers of attorney, conservatorship or guardianships for the detriment of the elder’s financial or physical wellbeing.</span></p><span data-dcnode-id="269" instrument_node="">
