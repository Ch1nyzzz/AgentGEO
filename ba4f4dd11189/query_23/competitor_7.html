</span><p class="h4 strong" data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">FAQs: Coronavirus job retention scheme
                                    (682 KB
                                    , PDF)</span></p><span data-dcnode-id="684" instrument_node="">

</span><a class="button button--primary" data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//researchbriefings.files.parliament.uk/documents/CBP-8880/CBP-8880.pdf"><span data-dcnode-id="681" instrument_node="">

</span><div class="reading-width stack" data-dcnode-id="591"><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="658"><strong data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">The CJRS was extended a number of times and was closed to new claims on 30 September 2021. Unless otherwise stated, the FAQ responses in this paper refer to the fifth Treasury Direction (as amended) and are correct as at March 2021. If required, Members of Parliament can request specific information about a particular point in time from the House of Commons Library team. </span></strong></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="654"><strong data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">This information is provided to Members of Parliament in support of their parliamentary duties and is not intended to address the specific circumstances of any particular individual. A suitably qualified professional should be consulted if specific advice or information is required.</span></strong></p><h3 data-dcnode-id="651"><strong data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Introducing the Coronavirus Job Retention Scheme</span></strong></h3><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">On 20 March 2020 the Government announced the Coronavirus Job Retention Scheme.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">The purpose of the Scheme was to provide grants to employers to ensure that they could retain and continue to pay staff, despite the effects of the COVID-19 pandemic.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">The CJRS initially applied from 1 March to 30 May 2020. It was then extended to 30 June. The CJRS was extended again from 1 July to 31 October 2020. The rules were changed to allow employees to be ‘flexibly furloughed’ – meaning employers could ask employees to work any pattern and claim a CJRS grant for any usual hours not worked.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Under the initial CJRS, only employees who were employed on 19 March 2020 on a PAYE payroll notified to HMRC through an RTI submission on or before that date were eligible. Employees who were on a payroll on or before 28 February or 19 March but who stopped working after those dates could be re-employed and furloughed.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">The CJRS initially covered 80% of an employee’s wages (up to £2,500 per month) as well as employer National Insurance and pension contributions. From 1 August 2020, NICs and pension contributions were not covered. In September and October 2020 the CJRS only covered 70% and 60% of wages, respectively, and employers were required to top up to 80%.</span></p><span data-dcnode-id="635" instrument_node="">
</span><h3 data-dcnode-id="632"><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Extending the CJRS from 1 November 2020 to 30 April 2021</span></strong></h3><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">The CJRS was set to end on 31 October 2020 to be replaced by the Job Support Scheme. Under the JSS Closed, businesses that were legally closed would have been able to furlough their staff and claim a grant for 67% of their wages with no employer top-ups required. Under JSS Open, which was open to all businesses, employers would have had to bring employees back for at least 20% of their normal hours. For hours not worked, employers would have had to cover 5% of wages and HMRC would have provided a grant to cover 61.67% of wages.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">On 31 October 2020, as a new temporary national lockdown was announced for England, the Chancellor announced that the CJRS would be extended until December and the JSS would be postponed. On 5 November, the Chancellor announced that the CJRS would be extended further until 31 March 2021 to give businesses certainty over the winter months. On 17 December, the Chancellor announced the CJRS will be extended to 30 April 2021.</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Under the extended CJRS, employers could flexibly furlough employees and claim a grant from HMRC for 80% of an employee’s wages for any usual hours not worked (up to £2,500 per month or the relevant pro rata amount). Employers were required to cover employer NICs and pension contributions. As such, the rules were similar to those in August 2020.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Under the extended CJRS, employees who were employed on 30 October 2020 on a payroll notified to HMRC on or before that date were eligible. Those who were employed on 23 September but who since stopped working could be re-employed and furloughed. There was no need for an employee to have been furloughed between March and October.</span></p><span data-dcnode-id="619" instrument_node="">
</span><h3 data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Extending the CJRS from 1 May 2021 to 30 September 2021</span></h3><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">In Budget 2021 the Chancellor announced that the CJRS would be extended until 30 September 2021. The CJRS grant would continue to cover 80% of an employee’s wages until 30 June 2021. From 1 July 2021, the grant covered 70% of wages and employers were required to top up an additional 10%. From 1 August 2021 the grant covered 60% of wages and employers were required to top up 20%. The CJRS closed on 30 September 2021.</span></p><span data-dcnode-id="613" instrument_node="">
</span><h3 data-dcnode-id="610"><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Relationship between the CJRS and employment law</span></strong></h3><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">The CJRS was simply a mechanism through which employers can claim money from HMRC. It did not alter existing employment law rights and obligations.</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Employers will normally be liable under the employment contract to pay employees their full wages, even if they cannot provide any work. In many cases, the employment contract would need to be varied to allow employers to furlough an employee on reduced pay.</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">The rules of the CJRS – set out in Treasury Directions – require employers to enter into a full furlough agreement or a flexible furlough agreement with their employees, setting out the main terms and conditions that will apply during any period of furlough. Agreements must be incorporated into the employee’s employment contract.</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">It was for employers to decide whether to furlough an employee. This potentially caused problems for zero-hours workers and agency workers whose employers could simply reduce their work to zero without making a claim under the Scheme.</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">The Scheme also sat amongst a range of existing statutory employment rights. These include protections from discrimination, protections from unfair dismissal and rights to consultation in cases of collective redundancies. It also includes the rules on Statutory Sick Pay, statutory maternity pay and holiday pay.</span></p><span data-dcnode-id="594" instrument_node="">
