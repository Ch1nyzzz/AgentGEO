</span><h2 data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Common Fraud Schemes</span></h2><span data-dcnode-id="1694" instrument_node="">
</span><div class="faqWrapper" data-dcnode-id="1327"><span data-dcnode-id="1693" instrument_node="">
</span><div class="accordian-block" data-dcnode-id="1651"><span data-dcnode-id="1692" instrument_node="">
</span><div class="ac-title acc-active" data-dcnode-id="1685" data-in="#tab11"><span data-dcnode-id="1691" instrument_node="">
</span><div class="arrow_up" data-dcnode-id="1690"></div><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Check Washing</span></p><span data-dcnode-id="1686" instrument_node=""> </span></div><span data-dcnode-id="1684" instrument_node="">
</span><div class="accordian-para acc-show" data-dcnode-id="1653" id="tab11" style="display:block;"><span data-dcnode-id="1683" instrument_node="">
</span><p class="commn-para-sm" data-dcnode-id="1682"></p><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Local Police and the United States Postal Inspection Service are investigating a rash of thefts from street mail collection boxes. The scam, known as “check washing," starts with the theft of envelopes containing checks from mail collection boxes. The stolen checks are then altered with the dollar amounts and payee names changed.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">How to Protect Yourself</span></p><span data-dcnode-id="1676" instrument_node="">
</span><ul data-dcnode-id="1656"><span data-dcnode-id="1675" instrument_node="">
</span><li data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">When possible, avoid using street mail collection boxes. Bring outgoing mail to the collection boxes inside the post office.</span></li><span data-dcnode-id="1672" instrument_node="">
</span><li data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Fraud Prevention Gel Pens are available at office supply retailers which use a specially formulated ink to help prevent check washing and other document alteration</span></li><span data-dcnode-id="1669" instrument_node="">
</span><li data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Check online banking daily for suspicious activity</span></li><span data-dcnode-id="1666" instrument_node="">
</span><li data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Check bank statements monthly</span></li><span data-dcnode-id="1663" instrument_node="">
</span><li data-dcnode-id="1658"><span data-dcnode-id="1662" instrument_node="">Report unauthorized transactions immediately to your local branch representative or by email to </span><u data-dcnode-id="1659"><a data-dcnode-id="1660" href="mailto:securityfraud@kearnybank.com" tabindex="1572"><span data-dcnode-id="1661" instrument_node="">securityfraud@kearnybank.com</span></a></u></li><span data-dcnode-id="1657" instrument_node="">
</span></ul><p data-dcnode-id="1655"></p><span data-dcnode-id="1654" instrument_node="">
</span></div><span data-dcnode-id="1652" instrument_node="">
</span></div><span data-dcnode-id="1650" instrument_node="">
</span><div class="accordian-block" data-dcnode-id="1613"><span data-dcnode-id="1649" instrument_node="">
</span><div class="ac-title" data-dcnode-id="1642" data-in="#tab21"><span data-dcnode-id="1648" instrument_node="">
</span><div class="arrow_down" data-dcnode-id="1647"></div><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Tech Support</span></p><span data-dcnode-id="1643" instrument_node="">
</span></div><span data-dcnode-id="1641" instrument_node="">
</span><div class="accordian-para" data-dcnode-id="1615" id="tab21" style="display:none;"><span data-dcnode-id="1640" instrument_node="">
</span><p class="commn-para-sm" data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">
</span></p><p data-dcnode-id="1619"><span data-contrast="auto" data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">A tech support scam can begin with an unsolicited phone call reporting a serious problem&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">with your computer</span></span><span data-contrast="auto" data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">, a pop-up window indicating a virus infected your&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">computer</span></span><span data-contrast="auto" data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">&nbsp;or other messages received while browsing the internet</span></span><span data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">.&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">The caller may use trusted names such as Microsoft and others to trick you into downloading malicious software to your computer, providing&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">them</span></span><span data-contrast="auto" data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">&nbsp;with access to your computer, compromising your online banking credentials or requiring payment for services not received.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1617"></p><span data-dcnode-id="1616" instrument_node="">
</span></div><span data-dcnode-id="1614" instrument_node="">
</span></div><span data-dcnode-id="1612" instrument_node="">
</span><div class="accordian-block" data-dcnode-id="1556"><span data-dcnode-id="1611" instrument_node="">
</span><div class="ac-title" data-dcnode-id="1604" data-in="#tab31"><span data-dcnode-id="1610" instrument_node="">
</span><div class="arrow_down" data-dcnode-id="1609"></div><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Romance/Internet&nbsp;Dating</span></p><span data-dcnode-id="1605" instrument_node="">
</span></div><span data-dcnode-id="1603" instrument_node="">
</span><div class="accordian-para" data-dcnode-id="1558" id="tab31" style="display:none;"><span data-dcnode-id="1602" instrument_node="">
</span><p class="commn-para-sm" data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">
</span></p><p data-dcnode-id="1562"><span data-contrast="auto" data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">A romance scammer lures people with fake identities and photographs to begin an online romantic relationship</span></span><span data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">.&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">The scammer may contact you through online dating apps or social media and </span></span><span data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">pretend</span></span><span data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">&nbsp;</span></span><span data-contrast="auto" data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">to be a member of the armed forces, teacher, doctor or businessperson working overseas</span></span><span data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">. </span></span><span data-contrast="auto" data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">The relationship progresses sometimes for many months without ever meeting in person</span></span><span data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">. </span></span><span data-contrast="auto" data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Eventually, the scammer will ask for money due to a medical problem, legal issue or other emergency</span></span><span data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">. </span></span><span data-contrast="auto" data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">The scammer will continue the relationship and request more money for various reasons</span></span><span data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">. </span></span><span data-contrast="auto" data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">The scammer may also wire money into your bank account with instructions to forward the money elsewhere</span></span><span data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">. </span></span><span data-contrast="auto" data-dcnode-id="1565"><span data-dcnode-id="1569" instrument_node="">This money is typically swindled from another person targeted in an unrelated scam. The FBI provides tips for avoiding romance scams </span><a class="speedBumpLink" data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fbi.gov/scams-and-safety/common-scams-and-crimes/romance-scams" rel="noopener" tabindex="1573" target="_blank"><span data-dcnode-id="1568" instrument_node="">here</span></a><span data-dcnode-id="1566" instrument_node="">.&nbsp;&nbsp;</span></span><span data-ccp-props="{&quot;201341983&quot;:0,&quot;335551550&quot;:6,&quot;335551620&quot;:6,&quot;335559739&quot;:160,&quot;335559740&quot;:259}" data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1560"></p><span data-dcnode-id="1559" instrument_node="">
</span></div><span data-dcnode-id="1557" instrument_node="">
</span></div><span data-dcnode-id="1555" instrument_node="">
</span><div class="accordian-block" data-dcnode-id="1535"><span data-dcnode-id="1554" instrument_node="">
</span><div class="ac-title" data-dcnode-id="1547" data-in="#tab41"><span data-dcnode-id="1553" instrument_node="">
</span><div class="arrow_down" data-dcnode-id="1552"></div><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Covid-19</span></p><span data-dcnode-id="1548" instrument_node="">
</span></div><span data-dcnode-id="1546" instrument_node="">
</span><div class="accordian-para" data-dcnode-id="1537" id="tab41" style="display:none;"><span data-dcnode-id="1545" instrument_node="">
</span><p class="commn-para-sm" data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">
</span></p><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">During&nbsp;a pandemic scammers&nbsp;will&nbsp;target people with everything from phony remedies and tests to products such as masks and household cleaners.&nbsp;The scammers are using fake websites, robocalls, texts, social media, fake charities and imposter schemes to steal money.&nbsp;</span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1539"></p><span data-dcnode-id="1538" instrument_node="">
</span></div><span data-dcnode-id="1536" instrument_node="">
</span></div><span data-dcnode-id="1534" instrument_node="">
</span><div class="accordian-block" data-dcnode-id="1514"><span data-dcnode-id="1533" instrument_node="">
</span><div class="ac-title" data-dcnode-id="1526" data-in="#tab51"><span data-dcnode-id="1532" instrument_node="">
</span><div class="arrow_down" data-dcnode-id="1531"></div><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Fake Checks</span></p><span data-dcnode-id="1527" instrument_node="">
</span></div><span data-dcnode-id="1525" instrument_node="">
</span><div class="accordian-para" data-dcnode-id="1516" id="tab51" style="display:none;"><span data-dcnode-id="1524" instrument_node="">
</span><p class="commn-para-sm" data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">
</span></p><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">In a fake check scam, you are asked to deposit a check&nbsp;into&nbsp;your bank account and then send money back to the sender or another person.&nbsp;The check may represent an “overpayment” in an online classified ad transaction or represent payment received in various other consumer frauds. You may be asked to send the money through a money transmitter like Western Union or use the money to purchase and send pre-paid cards or gift cards.&nbsp;Since the check is counterfeit, the check is charged back to your bank account.&nbsp;Fake checks can be in the form of personal checks, business checks, or bank cashier’s checks.&nbsp;</span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1518"></p><span data-dcnode-id="1517" instrument_node="">
</span></div><span data-dcnode-id="1515" instrument_node="">
</span></div><span data-dcnode-id="1513" instrument_node="">
</span><div class="accordian-block" data-dcnode-id="1493"><span data-dcnode-id="1512" instrument_node="">
</span><div class="ac-title" data-dcnode-id="1505" data-in="#tab61"><span data-dcnode-id="1511" instrument_node="">
</span><div class="arrow_down" data-dcnode-id="1510"></div><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Work at Home</span></p><span data-dcnode-id="1506" instrument_node="">
</span></div><span data-dcnode-id="1504" instrument_node="">
</span><div class="accordian-para" data-dcnode-id="1495" id="tab61" style="display:none;"><span data-dcnode-id="1503" instrument_node="">
</span><p class="commn-para-sm" data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">
</span></p><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">There are legitimate work at home opportunities; however, many advertised on&nbsp;the&nbsp;iInternet or through unsolicited phone calls are scams. Jobs involving the payment of an upfront fee, giving out your credit card or bank information, or transferring money on behalf of the company or another person is the first sign of a scam. Scammers will often send you fake checks as discussed above or&nbsp;will request your help in&nbsp;receiving&nbsp;and forwarding&nbsp;money stolen from other scam victims.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1497"></p><span data-dcnode-id="1496" instrument_node="">
</span></div><span data-dcnode-id="1494" instrument_node="">
</span></div><span data-dcnode-id="1492" instrument_node="">
</span><div class="accordian-block" data-dcnode-id="1472"><span data-dcnode-id="1491" instrument_node="">
</span><div class="ac-title" data-dcnode-id="1484" data-in="#tab71"><span data-dcnode-id="1490" instrument_node="">
</span><div class="arrow_down" data-dcnode-id="1489"></div><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Debt Collection</span></p><span data-dcnode-id="1485" instrument_node="">
</span></div><span data-dcnode-id="1483" instrument_node="">
</span><div class="accordian-para" data-dcnode-id="1474" id="tab71" style="display:none;"><span data-dcnode-id="1482" instrument_node="">
</span><p class="commn-para-sm" data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">
</span></p><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Fraudulent debt collectors may contact you claiming you owe money.&nbsp;The scammers will threaten legal action and even arrest to intimidate you into making payments on a debt you never owed.&nbsp;Calls from individuals claiming to be from a government agency such as the IRS; law enforcement officials or a collection agency can be very convincing.&nbsp;The scammer will often require immediate payment through a money transmitter, a wire transfer, cashier’s check, prepaid card or even cash sent through the mail.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1476"></p><span data-dcnode-id="1475" instrument_node="">
</span></div><span data-dcnode-id="1473" instrument_node="">
</span></div><span data-dcnode-id="1471" instrument_node="">
</span><div class="accordian-block" data-dcnode-id="1451"><span data-dcnode-id="1470" instrument_node="">
</span><div class="ac-title" data-dcnode-id="1463" data-in="#tab81"><span data-dcnode-id="1469" instrument_node="">
</span><div class="arrow_down" data-dcnode-id="1468"></div><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Lottery/Sweepstakes</span></p><span data-dcnode-id="1464" instrument_node="">
</span></div><span data-dcnode-id="1462" instrument_node="">
</span><div class="accordian-para" data-dcnode-id="1453" id="tab81" style="display:none;"><span data-dcnode-id="1461" instrument_node="">
</span><p class="commn-para-sm" data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">
</span></p><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">You are notified that you won a large lottery or sweepstakes; however, to collect your prize, you must pay the required taxes, fees or custom duties.&nbsp;The initial notification usually requires you to contact a “prize coordinator” who provides you with the instructions necessary to claim your prize. Additional money is often required as problems arise in the release of the grand prize.&nbsp;Many of the scams claim to be international sweepstakes which you were entered automatically.&nbsp;</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1455"></p><span data-dcnode-id="1454" instrument_node="">
</span></div><span data-dcnode-id="1452" instrument_node="">
</span></div><span data-dcnode-id="1450" instrument_node="">
</span><div class="accordian-block" data-dcnode-id="1430"><span data-dcnode-id="1449" instrument_node="">
</span><div class="ac-title" data-dcnode-id="1442" data-in="#tab91"><span data-dcnode-id="1448" instrument_node="">
</span><div class="arrow_down" data-dcnode-id="1447"></div><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Grandchild/Family Emergency</span></p><span data-dcnode-id="1443" instrument_node="">
</span></div><span data-dcnode-id="1441" instrument_node="">
</span><div class="accordian-para" data-dcnode-id="1432" id="tab91" style="display:none;"><span data-dcnode-id="1440" instrument_node="">
</span><p class="commn-para-sm" data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">
</span></p><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">A call or message is received from someone posing as your grandchild in trouble.&nbsp;The caller will be panicked and will ask you to send money immediately. The caller may also claim to be someone in law enforcement reporting that your grandchild has been involved in an accident, arrest or robbery and money is needed for medical expenses or bail.&nbsp;Do not send money. First&nbsp;verify your grandchild’s whereabouts with a family member, even if you were told not to tell anyone.&nbsp;</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1434"></p><span data-dcnode-id="1433" instrument_node="">
</span></div><span data-dcnode-id="1431" instrument_node="">
</span></div><span data-dcnode-id="1429" instrument_node="">
</span><div class="accordian-block" data-dcnode-id="1329"><span data-dcnode-id="1428" instrument_node="">
</span><div class="ac-title" data-dcnode-id="1420" data-in="#tab101"><span data-dcnode-id="1427" instrument_node="">
</span><div class="arrow_down" data-dcnode-id="1426"></div><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1422"><a class="speedBumpLink" data-dcnode-id="1424" name="charity-and-disaster-fraud" rel="noopener" tabindex="1574" target="_blank"></a><span data-dcnode-id="1423" instrument_node="">Charity and Disaster Fraud</span></p><span data-dcnode-id="1421" instrument_node="">
</span></div><span data-dcnode-id="1419" instrument_node="">
</span><div class="accordian-para" data-dcnode-id="1331" id="tab101" style="display:none;"><span data-dcnode-id="1418" instrument_node="">
</span><p class="commn-para-sm" data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">
</span></p><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">There are many charities and disaster funds that seek donations and support to perform valuable humanitarian and other relief. Unfortunately, there are also charity and disaster relief schemes which can come in the form of emails, phone calls, social media posts and funding platforms.</span></p><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">The FBI provides the following tips to avoid these scams:</span></p><span data-dcnode-id="1410" instrument_node="">
</span><ul data-dcnode-id="1389"><span data-dcnode-id="1409" instrument_node="">
</span><li data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Give to established charities or groups</span></li><span data-dcnode-id="1406" instrument_node="">
</span><li data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Be alert for charity names similar to known organizations</span></li><span data-dcnode-id="1403" instrument_node="">
</span><li data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Be aware of new organizations aiding in high profile disasters</span></li><span data-dcnode-id="1400" instrument_node="">
</span><li data-dcnode-id="1394"><span data-dcnode-id="1399" instrument_node="">Do your research. Sources such as the </span><span data-dcnode-id="1396" style="text-decoration: underline;"><a class="speedBumpLink" data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumer.ftc.gov/features/how-donate-wisely-and-avoid-charity-scams" rel="noopener" tabindex="1575" target="_blank" title="FTC.gov/charity"><span data-dcnode-id="1398" instrument_node="">FTC.gov/charity</span></a></span><span data-dcnode-id="1395" instrument_node=""> provides additional tips and resources to avoid scams and research charities</span></li><span data-dcnode-id="1393" instrument_node="">
</span><li data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">After a natural disaster, carefully vet contractors</span></li><span data-dcnode-id="1390" instrument_node="">
</span></ul><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Donation requests in cash, gift card, virtual currency or wire transfer are likely scams.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><ul data-dcnode-id="1377"><span data-dcnode-id="1384" instrument_node="">
</span><li data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Check the website address - most legitimate charity organizations use .org not .com</span></li><span data-dcnode-id="1381" instrument_node="">
</span><li data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Legitimate organizations will not require personal identifying information or online banking sign-on credentials.</span></li><span data-dcnode-id="1378" instrument_node="">
</span></ul><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">If you are a victim of a charity or disaster fraud:</span></p><span data-dcnode-id="1373" instrument_node="">
</span><ul data-dcnode-id="1341"><span data-dcnode-id="1372" instrument_node="">
</span><li data-dcnode-id="1367"><span data-dcnode-id="1371" instrument_node="">Report the incident to your local Kearny Bank branch or via email at </span><span data-dcnode-id="1368" style="text-decoration: underline;"><a data-dcnode-id="1369" href="mailto:securityfraud@kearnybank.com" tabindex="1576"><span data-dcnode-id="1370" instrument_node="">securityfraud@kearnybank.com</span></a></span></li><span data-dcnode-id="1366" instrument_node="">
</span><li data-dcnode-id="1343"><span data-dcnode-id="1365" instrument_node="">Other Reporting Resources:
</span><ul data-dcnode-id="1345" style="list-style-type: circle;"><span data-dcnode-id="1364" instrument_node="">
</span><li data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Local Police Department</span></li><span data-dcnode-id="1361" instrument_node="">
</span><li data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">State Consumer Protection Office</span></li><span data-dcnode-id="1358" instrument_node="">
</span><li data-dcnode-id="1353"><span data-dcnode-id="1357" instrument_node="">FBI's Internet Crime Complaint Center </span><span data-dcnode-id="1354" style="text-decoration: underline;"><a class="speedBumpLink" data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ic3.gov/" rel="noopener" tabindex="1577" target="_blank"><span data-dcnode-id="1356" instrument_node="">IC3.gov</span></a></span></li><span data-dcnode-id="1352" instrument_node="">
</span><li data-dcnode-id="1347"><span data-dcnode-id="1351" instrument_node="">Federal Trade Commission </span><a class="speedBumpLink" data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ftc.gov/" rel="noopener" tabindex="1578" target="_blank"><span data-dcnode-id="1349" style="text-decoration: underline;"><span data-dcnode-id="1350" instrument_node="">FTC.gov</span></span></a></li><span data-dcnode-id="1346" instrument_node="">
</span></ul><span data-dcnode-id="1344" instrument_node="">
</span></li><span data-dcnode-id="1342" instrument_node="">
</span></ul><span data-dcnode-id="1340" instrument_node="">
