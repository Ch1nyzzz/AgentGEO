</span><h1 data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">
              11 Common Freelancer Scams and How to Avoid Them
            </span></h1><span data-dcnode-id="873" instrument_node="">
</span></div><span data-dcnode-id="871" instrument_node="">
</span><div class="article-post" data-dcnode-id="540"><span data-dcnode-id="870" instrument_node="">
</span><div class="article wordpress" data-dcnode-id="545"><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">In recent years, there has been ever-growing interest in freelance work and it has rightly&nbsp; also led to more concern about freelancer scams. Taking advantage of people in need of jobs or a side income, scammers pretend to be employers (or even “helpful” fellow freelancers) to trick workers into giving away their information and money.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">So as an independent contractor, how can you recognize freelancer scams and protect yourself? This post will take you through 11 of the most common scams along with tips as to how you can avoid them.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="862" instrument_node="">❗&nbsp;</span><em data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Disclaimer: Below are some experiences we've heard of from freelancers, they're not absolute signs. Please bear this in mind as you read and reflect on your own experience.&nbsp;</span></em></p><span data-dcnode-id="858" instrument_node="">
</span><div class="click-to-tweet panel panel-thin" data-dcnode-id="840"><span data-dcnode-id="857" instrument_node="">
</span><div class="panel-body" data-dcnode-id="842"><span data-dcnode-id="856" instrument_node="">
</span><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Ftext%3DConstant%2520vigilance%21%2520Keep%2520scammers%2520at%2520bay%2520with%2520these%2520tips%2520%2523freelancers%26via%3DReedsyHQ%26url%3Dhttps%3A//blog.reedsy.com/freelancer/freelancer-scams/" target="_blank"><span data-dcnode-id="855" instrument_node="">Constant vigilance! Keep scammers at bay with these tips #freelancers
      </span><div class="small grid gutter-xs-sm space-top-xs-sm" data-dcnode-id="846" itemscope="" itemtype="https://schema.org/ImageObject"><span data-dcnode-id="854" instrument_node="">
</span><meta content="https://blog-cdn.reedsy.com/assets/icons/twitter-5ae2ad8b7ff48d4c6f92d5fd0cb4e979223fbced99caf7f7dd010dc12b30c3de.svg" data-dcnode-id="853" itemprop="contentUrl"><span data-dcnode-id="852" instrument_node="">
</span><img alt="icon-twitter" class="lazyloaded" data-dcnode-id="851" data-src="https://blog-cdn.reedsy.com/assets/icons/twitter-5ae2ad8b7ff48d4c6f92d5fd0cb4e979223fbced99caf7f7dd010dc12b30c3de.svg" height="32" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog-cdn.reedsy.com/assets/icons/twitter-5ae2ad8b7ff48d4c6f92d5fd0cb4e979223fbced99caf7f7dd010dc12b30c3de.svg&amp;raw" width="24"><span data-dcnode-id="850" instrument_node="">
</span><b data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Click to tweet!</span></b><span data-dcnode-id="847" instrument_node="">
</span></div><span data-dcnode-id="845" instrument_node="">
</span></a><span data-dcnode-id="843" instrument_node="">
</span></div><span data-dcnode-id="841" instrument_node="">
</span></div><span data-dcnode-id="839" instrument_node="">
</span><h2 data-dcnode-id="837" id="1__an_easy_job_for_a_high_pay"><span data-dcnode-id="838" instrument_node="">1. An easy job for a high pay</span></h2><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">If you come across a job posting that is simply too good to be true, it probably isn’t a legitimate job posting. In a freelancer scam like this, you probably won’t get the advertised payment for your service. In some cases, the “client” might not even be looking for your service altogether — they may be trying to take your information or bring you into a pyramid scheme.</span></p><span data-dcnode-id="833" instrument_node="">
</span><h3 data-dcnode-id="831" id="tip__do_your_research_thoroughly"><span data-dcnode-id="832" instrument_node="">Tip: Do your research thoroughly</span></h3><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="829" instrument_node="">To avoid falling into this trap, you should have a good grasp of your field. Browse a lot of job postings and find out the average rate and the common responsibilities of your ideal job. This way, you’ll notice when something is unnatural. For instance, you will find that $1,400 is a </span><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/cost-to-self-publish-a-book/%23editing-costs"><span data-dcnode-id="828" instrument_node="">reasonable fee</span></a><span data-dcnode-id="826" instrument_node=""> for a developmental editing project, but it’s peculiarly high for a </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/freelancer/remote-proofreading-jobs/"><span data-dcnode-id="825" instrument_node="">remote proofreading job</span></a><span data-dcnode-id="823" instrument_node="">.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">You might also find that legitimate freelance jobs tend to be posted on marketplaces that focus on certain niches rather than general platforms like Upwork, Fiverr, or Freelancer.com.</span></p><span data-dcnode-id="818" instrument_node="">
</span><div class="panel panel-grey panel-overflow space-bottom-xs-xl space-top-xs-xl" data-dcnode-id="771"><span data-dcnode-id="817" instrument_node="">
</span><div class="panel-body text-center" data-dcnode-id="773" itemscope="" itemtype="https://schema.org/ImageObject"><span data-dcnode-id="816" instrument_node="">
</span><meta content="https://blog-cdn.reedsy.com/assets/community-8cf9af8b13cb7c08f703efbe9f4f849c5cd096a5075adb2d58ba022cbd6191d1.svg" data-dcnode-id="815" itemprop="contentUrl"><span data-dcnode-id="814" instrument_node="">
</span><img class="lazyloaded" data-dcnode-id="813" data-src="https://blog-cdn.reedsy.com/assets/community-8cf9af8b13cb7c08f703efbe9f4f849c5cd096a5075adb2d58ba022cbd6191d1.svg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog-cdn.reedsy.com/assets/community-8cf9af8b13cb7c08f703efbe9f4f849c5cd096a5075adb2d58ba022cbd6191d1.svg&amp;raw" width="240"><span data-dcnode-id="812" instrument_node="">
</span><h3 class="space-top-xs-md space-bottom-xs-xs" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">
      Discover rewarding publishing jobs at Reedsy

</span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.com/join-our-community" target="_blank"><span data-dcnode-id="778" instrument_node="">Learn more about how Reedsy can help.</span></a><span data-dcnode-id="776" instrument_node="">
</span></p><span data-dcnode-id="774" instrument_node="">
</span></div><span data-dcnode-id="772" instrument_node="">
</span></div><span data-dcnode-id="770" instrument_node="">
</span><h2 data-dcnode-id="768" id="2__having_to_pay_for_access_to_work"><span data-dcnode-id="769" instrument_node="">2. Having to pay for access to work</span></h2><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">A scam of this kind comes in several forms. The client could ask the freelancer to pay a deposit or, more commonly, they could make it a requirement for them to buy something to set up your workstation so you can easily work from home. It might be a software or product of theirs that they claim is crucial to the project. Regardless, they make you send money in order to do your job.</span></p><span data-dcnode-id="764" instrument_node="">
</span><blockquote data-dcnode-id="759"><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">❗ Note: This is different from paying sites like Upwork for extra bidding powers. Money paid to such sites is optional, not compulsory.</span></p><span data-dcnode-id="760" instrument_node="">
</span></blockquote><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">This is uncommon practice for any industry. If the client truly needed you to have access to some specific resources to complete their project, they would’ve stated that in their job description and possibly provided it to you on their own terms.</span></p><span data-dcnode-id="755" instrument_node="">
</span><h3 data-dcnode-id="753" id="tip__never_pay_to_start_working"><span data-dcnode-id="754" instrument_node="">Tip: Never pay to start working</span></h3><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">The solution to this scam is simple: decline any offer that asks you to pay!</span></p><span data-dcnode-id="749" instrument_node="">
</span><h2 data-dcnode-id="747" id="3__requests_for_extensive_communication_off_platform"><span data-dcnode-id="748" instrument_node="">3. Requests for extensive communication off-platform</span></h2><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">A lot of new freelancers work on sites like Freelancer and Upwork — and if you do, you’ll know that conversations, work delivery, and payments are usually made through the platform. Reedsy also provides collaborative channels that help you keep track of your work progress. Should any problem arise, you can always go back to find solid evidence to back your complaint.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">As such, when a client asks to discuss work extensively off the platform, you should raise your guards. With the exception of quick Skype or Zoom calls to get to know one another or better flesh out the project, being asked to communicate off-platform should raise major red flags.</span></p><span data-dcnode-id="740" instrument_node="">
</span><h3 data-dcnode-id="738" id="tip__stay_on_professional_channels_of_communication"><span data-dcnode-id="739" instrument_node="">Tip: Stay on professional channels of communication</span></h3><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">The best way to keep yourself safe is to say no to clients’ requests to use a different platform when it comes to work. You can still have calls with them — but always make sure that you write down any important work-related agreement made and send it to them for confirmation after the talk. Other than that, work discussion and exchanges should happen on your chosen freelancer platform to keep your project safe.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="731" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams.jpg" data-dcnode-id="733" itemprop="contentUrl"><img alt="Freelancer Scams | Communicating Through Professional Channels" class="aligncenter size-full lazyloaded" data-dcnode-id="732" data-src="https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams.jpg" data-srcset="https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams-300x200.jpg 300w, https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams-1024x682.jpg 1024w, https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams-768x512.jpg 768w, https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams-450x300.jpg 450w, https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams-330x220.jpg 330w, https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams.jpg 1165w" height="776" sizes="(max-width: 480px) 100vw, 1165px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams.jpg&amp;raw" srcset="https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams-300x200.jpg 300w, https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams-1024x682.jpg 1024w, https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams-768x512.jpg 768w, https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams-450x300.jpg 450w, https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams-330x220.jpg 330w, https://blog-cdn.reedsy.com/uploads/2020/10/save-communications-freelancer-scams.jpg 1165w" width="1165"></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">For those who don’t use freelance sites, be sure to have a professional email account reserved for freelancing before you get started. It’s better to be safe than sorry — you don’t want to use private accounts and give away personal information by accident.</span></p><span data-dcnode-id="727" instrument_node="">
</span><h2 data-dcnode-id="725" id="4__unnecessary__test__projects"><span data-dcnode-id="726" instrument_node="">4. Unnecessary “test” projects</span></h2><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="723" instrument_node="">Test projects are by no means </span><em data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">all</span></em><span data-dcnode-id="720" instrument_node=""> scams, which is why avoiding this trap will be a bit tricky. When a client is interested in your profile but you don’t have a lot of experience to go with it, the client may ask for you to complete a task or two as a test. Usually, this is a chance for beginners to demonstrate their abilities.</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">However, this recruitment process can also be exploited by those who don’t want to pay for your service. By asking freelancers to send in their sample work, the client can have satisfactory products without having to spend anything. All they’d have to say is that you weren't the right match for them, and they’ll choose another freelancer.</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Exploitative projects tend to be more complex and time consuming than a regular test. They’d also likely come from independent employers or small enterprises who don’t clearly outline the recruitment process in their job description.</span></p><span data-dcnode-id="712" instrument_node="">
</span><blockquote data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">❗ Note: Many job marketplaces vet their applicants through tests. If the purpose of the test is clear and the site is reputable, it's probably not a scam.</span></p><span data-dcnode-id="708" instrument_node="">
</span></blockquote><span data-dcnode-id="706" instrument_node="">
</span><h3 data-dcnode-id="704" id="tip__send_minimal_free_samples"><span data-dcnode-id="705" instrument_node="">Tip: Send minimal free samples</span></h3><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Being asked to send a sample is not completely unreasonable, as it is a way for clients to gauge your ability. However, for a freelance gig, this sample should be a relatively small task compared to the project described by the client. Requests for more than one assignment is not a good sign.</span></p><span data-dcnode-id="700" instrument_node="">
</span><h2 data-dcnode-id="698" id="5__the_proposal_for_a_shared_upwork_account"><span data-dcnode-id="699" instrument_node="">5. The proposal for a shared Upwork account</span></h2><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="696" instrument_node="">One of the commonest freelancer scams is this: a client or fellow freelancer approaches you, claiming they could help you make thousands of dollars using your existing Upwork or Freelancer.com account. All you have to do is give them access to it — share it with them — and they’ll do some tech-wizardry to </span><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/freelancer/grow-your-freelance-editing-business/"><span data-dcnode-id="695" instrument_node="">grow your freelance business</span></a><span data-dcnode-id="693" instrument_node=""> and bring in the cash. Once that happens, you’ll split the gains.</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">If you agree to this proposal, this new “partner” wouldn't be doing any growth hacking for you — though they </span><em data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">would</span></em><span data-dcnode-id="687" instrument_node=""> get access to your bank and ID information. Moreover, they probably will drag you into more elaborate scams as an accomplice (more on that in scam #6).</span></p><span data-dcnode-id="685" instrument_node="">
</span><h3 data-dcnode-id="683" id="tip__never_share_your_work_accounts_with_anyone"><span data-dcnode-id="684" instrument_node="">Tip: Never share your work accounts with anyone</span></h3><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">When you receive a proposal like this, ignore it. If they wanted to growth-hack something, they would’ve focused on their own sites.</span></p><span data-dcnode-id="679" instrument_node="">
</span><blockquote data-dcnode-id="671"><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="677" instrument_node="">💡 Want to be a more successful freelancer? We have a post outlining </span><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/freelancer/tips-for-successful-freelancing/"><span data-dcnode-id="676" instrument_node="">20 powerful freelancing tips</span></a><span data-dcnode-id="674" instrument_node=""> you might find helpful.</span></p><span data-dcnode-id="672" instrument_node="">
</span></blockquote><span data-dcnode-id="670" instrument_node="">
</span><h2 data-dcnode-id="668" id="6__the_unsolicited_cheque"><span data-dcnode-id="669" instrument_node="">6. The unsolicited cheque</span></h2><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="666" instrument_node="">In this scam, the client mails a cheque to you </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nbcnews.com/tech/security/people-who-turned-upwork-find-freelance-gigs-say-they-were-n1218421" rel="nofollow noopener" target="_blank"><em data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">before</span></em><span data-dcnode-id="663" instrument_node=""> you even do any work</span></a><span data-dcnode-id="661" instrument_node="">. They might say that it’s a prepayment, and the cheque’s value could be even higher than your quote. Perhaps they claim it includes another worker’s pay, or money that you should send away on the company’s behalf. The “client” will even provide you with details of this third party — profiles they’ve tricked other freelancers into sharing with them — so everything appears believable. What you’d have to do is cash out the money and deposit it to a given account.</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="658" instrument_node="">If you think this all sounds fishy, that’s because it is. You’d find, after you’ve cashed and sent the money away, that everything came out of </span><em data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">your</span></em><span data-dcnode-id="655" instrument_node=""> account. Your “client” has sent you an illegitimate cheque to trick you into sending them money. More importantly, this is most definitely part of a money laundering or tax evasion scheme that you do not want to be dragged into.</span></p><span data-dcnode-id="653" instrument_node="">
</span><h3 data-dcnode-id="651" id="tip__settle_on_a_reasonable_and_clear_payment_plan_from_the_outset"><span data-dcnode-id="652" instrument_node="">Tip: Settle on a reasonable and clear payment plan from the outset</span></h3><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="649" instrument_node="">As early as the moment you send your </span><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/freelancer/freelance-proposal-template/"><span data-dcnode-id="648" instrument_node="">freelance proposal</span></a><span data-dcnode-id="646" instrument_node="">, map out a clear payment schedule. When signing a work agreement, make sure there’s a section of payment plan, and accept money according to that outline only. Anything that’s out of the ordinary should be double-checked or ignored.</span></p><span data-dcnode-id="644" instrument_node="">
</span><h2 data-dcnode-id="642" id="7__the_tax_document_ploy"><span data-dcnode-id="643" instrument_node="">7. The tax document ploy</span></h2><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Dealing with taxes as a freelancer can be confusing, a fact that this ploy takes advantage of. What a scammer would do is ask for personal information (such as social security number, or its equivalent in your country) to fill out tax forms confirming that they have paid you.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="635" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://blog-cdn.reedsy.com/uploads/2020/07/tax.jpg" data-dcnode-id="637" itemprop="contentUrl"><img alt="Tax Paperwork and Calculator" class="aligncenter size-full lazyloaded" data-dcnode-id="636" data-src="https://blog-cdn.reedsy.com/uploads/2020/07/tax.jpg" data-srcset="https://blog-cdn.reedsy.com/uploads/2020/07/tax-300x211.jpg 300w, https://blog-cdn.reedsy.com/uploads/2020/07/tax-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2020/07/tax-768x540.jpg 768w, https://blog-cdn.reedsy.com/uploads/2020/07/tax-427x300.jpg 427w, https://blog-cdn.reedsy.com/uploads/2020/07/tax-313x220.jpg 313w, https://blog-cdn.reedsy.com/uploads/2020/07/tax.jpg 1012w" height="711" sizes="(max-width: 480px) 100vw, 1012px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog-cdn.reedsy.com/uploads/2020/07/tax.jpg&amp;raw" srcset="https://blog-cdn.reedsy.com/uploads/2020/07/tax-300x211.jpg 300w, https://blog-cdn.reedsy.com/uploads/2020/07/tax-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2020/07/tax-768x540.jpg 768w, https://blog-cdn.reedsy.com/uploads/2020/07/tax-427x300.jpg 427w, https://blog-cdn.reedsy.com/uploads/2020/07/tax-313x220.jpg 313w, https://blog-cdn.reedsy.com/uploads/2020/07/tax.jpg 1012w" width="1012"></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="633" instrument_node="">In the US, this is a necessary step if the client pays you </span><em data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">over $600 in a year</span></em><span data-dcnode-id="630" instrument_node="">. Hirers have to fill out a </span><a data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.and.co/blog/freelance-knowledge/what-is-a-1099-form-youre-gonna-learn-today" rel="nofollow noopener" target="_blank"><span data-dcnode-id="629" instrument_node="">1099-MISC form</span></a><span data-dcnode-id="627" instrument_node=""> for every independent contractor they pay at least that much. If the total payment in a year is under $600, there’s no obligation to fill the form. In other words, there’s no need for you to share your personal information if that is the case. If a client insists that you do, they’re probably up to no good.</span></p><span data-dcnode-id="625" instrument_node="">
</span><h3 data-dcnode-id="623" id="tip__get_paid_through_paypal_or_stripe"><span data-dcnode-id="624" instrument_node="">Tip: Get paid through PayPal or Stripe</span></h3><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="621" instrument_node="">It goes without saying that you should learn </span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.reedsy.com/freelancer/how-to-manage-tax-as-a-freelance-editor/"><span data-dcnode-id="620" instrument_node="">how to manage your tax as a freelancer</span></a><span data-dcnode-id="618" instrument_node=""> — but here’s an extra tip for US-based freelancers. Online payment processing platforms like </span><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.paypal.com/us/smarthelp/article/How-do-I-find-my-1099-tax-statement-in-my-PayPal-account-FAQ919" rel="nofollow noopener" target="_blank"><span data-dcnode-id="617" instrument_node="">PayPal</span></a><span data-dcnode-id="615" instrument_node=""> and </span><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//support.stripe.com/questions/1099-k-forms-issued-by-stripe" rel="nofollow noopener" target="_blank"><span data-dcnode-id="614" instrument_node="">Stripe</span></a><span data-dcnode-id="612" instrument_node=""> fill in 1099 forms for all transactions — make your life easier by using them. At Reedsy, we favor a hassle-free solution for our users, so all transactions are made via Stripe.</span></p><span data-dcnode-id="610" instrument_node="">
</span><h2 data-dcnode-id="608" id="8__unusual_forms_of_payment"><span data-dcnode-id="609" instrument_node="">8. Unusual forms of payment</span></h2><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Another payment-related red flag for freelancers is when clients offer to pay in an unconventional method. This includes gift cards, crypto currencies, and goods and services that they may or may not have produced themselves. Such payments suggest that the client is either not very serious about the project, or they don’t have the financial capabilities to fund it.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Obviously, we don’t operate in a bartering economy, so those methods of payment you wouldn’t typically accept. Of course, if the offer is of value and you are indeed interested in it, feel free to put it in your contract. If not, our tip here is similar to the previous one: stick to well-known channels like PayPal or Stripe.</span></p><span data-dcnode-id="601" instrument_node="">
</span><h2 data-dcnode-id="599" id="9__the_lack_of_a_mutually_confirmed_pre_work_agreement"><span data-dcnode-id="600" instrument_node="">9. The lack of a mutually confirmed pre-work agreement</span></h2><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="597" instrument_node="">Even if the project is small and its duration short, you should </span><em data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">always</span></em><span data-dcnode-id="594" instrument_node=""> have some form of written agreement. This document outlines the project’s deliverables, the expected timeline, and the payment information. Not only is this for your protection, but it also helps you keep track of your paperwork.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">If a client refuses to acknowledge this agreement, be wary. This is another warning of their lack of either funds or seriousness, and it’s not something you want to deal with half-way through your work.</span></p><span data-dcnode-id="589" instrument_node="">
</span><h3 data-dcnode-id="587" id="tip__don_t_start_work_until_there_s_a_confirmed_agreement"><span data-dcnode-id="588" instrument_node="">Tip: Don’t start work until there’s a confirmed agreement</span></h3><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">If your client hasn't confirmed your project agreement </span><em data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">on paper</span></em><span data-dcnode-id="582" instrument_node="">, politely let them know that it's your policy never to start work until there's a clearly documented, mutually accepted arrangement. Remind them to send their confirmation. A client who has never hired a freelancer before may be unfamiliar with contractor etiquette, and a polite reminder may be all they need. If you still get no answer, feel free to move on to another project. If they do,&nbsp; great for both parties: the work can begin!</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="577" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://blog-cdn.reedsy.com/uploads/2020/10/freelance-agreement.jpg" data-dcnode-id="579" itemprop="contentUrl"><img alt="Sign Agreement to Avoid Freelance Scams" class="aligncenter size-full lazyload" data-dcnode-id="578" data-src="https://blog-cdn.reedsy.com/uploads/2020/10/freelance-agreement.jpg" data-srcset="https://blog-cdn.reedsy.com/uploads/2020/10/freelance-agreement-300x200.jpg 300w, https://blog-cdn.reedsy.com/uploads/2020/10/freelance-agreement-1024x684.jpg 1024w, https://blog-cdn.reedsy.com/uploads/2020/10/freelance-agreement-150x150.jpg 150w, https://blog-cdn.reedsy.com/uploads/2020/10/freelance-agreement-768x513.jpg 768w, https://blog-cdn.reedsy.com/uploads/2020/10/freelance-agreement-1536x1026.jpg 1536w, https://blog-cdn.reedsy.com/uploads/2020/10/freelance-agreement-449x300.jpg 449w, https://blog-cdn.reedsy.com/uploads/2020/10/freelance-agreement-329x220.jpg 329w, https://blog-cdn.reedsy.com/uploads/2020/10/freelance-agreement.jpg 1920w" height="1282" sizes="(max-width: 480px) 100vw, 1920px" width="1920"></p><span data-dcnode-id="576" instrument_node="">
</span><h2 data-dcnode-id="574" id="10__other_kinds_of_identity_theft"><span data-dcnode-id="575" instrument_node="">10. Other kinds of identity theft</span></h2><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">We’ve mentioned identity theft several times before, although it’s an important enough issue to warrant another note. A common form of identity theft is fake job postings that ask for more information than necessary, perhaps in the name of vetting their workers. Your clients usually have no need for details such as your social security or identification number, credit card information, your date of birth, and even your address, so steer clear of people who ask for them without really good reason!</span></p><span data-dcnode-id="570" instrument_node="">
</span><h2 data-dcnode-id="568" id="11__freelancer_sites__mishaps"><span data-dcnode-id="569" instrument_node="">11. Freelancer sites’ mishaps</span></h2><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="566" instrument_node="">As you might’ve guessed, a lot of these scams happen on freelancer sites such as Upwork, Fiverr, and Freelancer.com. They usually do have some safeguard measures to keep scammers from accessing the website, but there are cracks to slip through. There are plenty of shared account proposals made on Upwork and Freelancer.com. There are also incidences of </span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/freelance/comments/4oimvb/freelancercom_scam_stay_away/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="565" instrument_node="">unverified, unauthorised users hiring freelancers</span></a><span data-dcnode-id="563" instrument_node="">. Being a highly accessible community sometimes comes with a cost.</span></p><span data-dcnode-id="561" instrument_node="">
</span><h3 data-dcnode-id="559" id="tip__look_for_protection_policies_and_site_reviews"><span data-dcnode-id="560" instrument_node="">Tip: Look for protection policies and site reviews</span></h3><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="557" instrument_node="">Before you sign up to a freelancer community, check out their policy regarding payment and project protection. Not every site will have a clear, helpful policy — and it’s best to avoid those. You can also look for reviews of these sites (</span><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/freelance/comments/4oimvb/freelancercom_scam_stay_away/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="556" instrument_node="">or try searching “freelance scams” on Reddit</span></a><span data-dcnode-id="554" instrument_node="">) to get an idea of how safe they are. At Reedsy, all projects are to be done with contracts, and </span><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reedsy.crisp.help/en-us/article/how-is-my-project-protected-on-reedsy-zi1x4/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="553" instrument_node="">our protection policy</span></a><span data-dcnode-id="551" instrument_node=""> ensure that violations will be met with appropriate consequences.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Hopefully, this list of freelancer scams have shed light on the various ways that you can be taken advantage of as an independent worker. It may seem daunting, but remember that for every con artist out there, there many more enthusiastic clients searching for your talent!</span></p><span data-dcnode-id="546" instrument_node="">
