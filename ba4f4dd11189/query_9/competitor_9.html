		This article was co-authored by </span><a data-dcnode-id="2505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Author/Clinton-M-Sandvick-JD-PhD"><span data-dcnode-id="2506" instrument_node="">Clinton M. Sandvick, JD, PhD</span></a><span data-dcnode-id="2504" instrument_node="">. Clinton M. Sandvick worked as a civil litigator in California for over 7 years. He received his JD from the University of Wisconsin-Madison in 1998 and his PhD in American History from the University of Oregon in 2013.

			</span><br data-dcnode-id="2503"><br data-dcnode-id="2502"><span data-dcnode-id="2501" instrument_node="">
			There are </span><a data-dcnode-id="2499" href="#References"><span data-dcnode-id="2500" instrument_node="">9 references</span></a><span data-dcnode-id="2498" instrument_node=""> cited in this article, which can be found at the bottom of the page.

		</span></p><span data-dcnode-id="2493" instrument_node="">

</span><div class="mf-section-0" data-dcnode-id="2450" id="mf-section-0"><span data-dcnode-id="2488" instrument_node="">
</span><p data-dcnode-id="2452"><span data-dcnode-id="2487" instrument_node="">The U.S. Department of Housing and Urban Development (HUD) operates a housing voucher program under Section VIII of Title 24 of the Code of Federal Regulations.</span><sup aria-label="Link to Reference 1" class="reference" data-dcnode-id="2471" id="_ref-1"><a data-dcnode-id="2485" href="#_note-1"><span data-dcnode-id="2486" instrument_node="">[1]</span></a><span class="ts_popup" data-dcnode-id="2473" hidden="" id="ts_popup_1" style="display: none;"><span data-dcnode-id="2484" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">X</span></span><span data-dcnode-id="2481" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Research source</span></span><span data-dcnode-id="2478" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2477"></span><span data-dcnode-id="2476" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2475" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2474" instrument_node="">
</span></span><span data-dcnode-id="2472" instrument_node="">
</span></sup><span data-dcnode-id="2470" instrument_node=""> This voucher program is commonly known as Section 8 assistance, and is designed to help low income, elderly, and disabled people afford decent, safe, and sanitary housing.</span><sup aria-label="Link to Reference 2" class="reference" data-dcnode-id="2454" id="_ref-2"><a data-dcnode-id="2468" href="#_note-2"><span data-dcnode-id="2469" instrument_node="">[2]</span></a><span class="ts_popup" data-dcnode-id="2456" hidden="" id="ts_popup_2" style="display: none;"><span data-dcnode-id="2467" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">X</span></span><span data-dcnode-id="2464" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">Research source</span></span><span data-dcnode-id="2461" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2460"></span><span data-dcnode-id="2459" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2458" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2457" instrument_node="">
</span></span><span data-dcnode-id="2455" instrument_node="">
</span></sup><span data-dcnode-id="2453" instrument_node=""> Unfortunately, some tenants commit fraud, which wastes government resources and can create unpleasant situations for landlords and neighbors.  Once you have identified Section 8 fraud, it is easy to report it to the authorities.
</span></p><span data-dcnode-id="2451" instrument_node="">
</span></div><span data-dcnode-id="2449" instrument_node="">

</span><span class="mw-headline" data-dcnode-id="2407" id="Identifying-Section-8-Fraud"><div class="method_label" data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">Part 1 of 2:</span></div><span data-dcnode-id="2408" instrument_node="">Identifying Section 8 Fraud</span></span><span data-dcnode-id="2406" instrument_node="">
</span></h3><span data-dcnode-id="2404" instrument_node="">
</span><div class="section_text" data-dcnode-id="2151" id="steps_1"><span data-dcnode-id="2403" instrument_node="">
</span><ol class="steps_list_2" data-dcnode-id="2155"><span data-dcnode-id="2402" instrument_node="">
</span><li data-dcnode-id="2332" id="step-id-00"><span data-dcnode-id="2401" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="2400" name="step_1_1"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="2378" style="max-width:728px"><a class="image" data-dcnode-id="2379" href="#/Image:Get-Out-of-a-Lease-Step-3-Version-2.jpg"><div class="content-spacer" data-dcnode-id="2389" style="padding-top:75%"><div class="loading-container" data-dcnode-id="2395"><div class="loader" data-dcnode-id="2396"><div class="loader-dot" data-dcnode-id="2399"></div><div class="loader-dot" data-dcnode-id="2398"></div><div class="loader-dot" data-dcnode-id="2397"></div></div></div><span data-dcnode-id="2394" instrument_node="">
</span><img alt="Image titled Get Out of a Lease Step 3" class="whcdn content-fill img-loading-alt" data-dcnode-id="2393" data-height="345" data-src="https://www.wikihow.com/images/thumb/b/b8/Get-Out-of-a-Lease-Step-3-Version-2.jpg/v4-460px-Get-Out-of-a-Lease-Step-3-Version-2.jpg" data-srclarge="/images/thumb/b/b8/Get-Out-of-a-Lease-Step-3-Version-2.jpg/aid6652216-v4-728px-Get-Out-of-a-Lease-Step-3-Version-2.jpg" data-width="460" decoding="async" id="fa707fe53c7b044397cc1a64caf4c3c0" loading="lazy" onload="WH.performance.clearMarks('image1_rendered'); WH.performance.mark('image1_rendered');" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/b/b8/Get-Out-of-a-Lease-Step-3-Version-2.jpg/aid6652216-v4-728px-Get-Out-of-a-Lease-Step-3-Version-2.jpg.webp&amp;raw"><span data-dcnode-id="2390" instrument_node="">
</span></div><span data-dcnode-id="2388" instrument_node="">
</span><noscript data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">&lt;img alt="Image titled Get Out of a Lease Step 3" src="https://www.wikihow.com/images/thumb/b/b8/Get-Out-of-a-Lease-Step-3-Version-2.jpg/v4-460px-Get-Out-of-a-Lease-Step-3-Version-2.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/b/b8/Get-Out-of-a-Lease-Step-3-Version-2.jpg/aid6652216-v4-728px-Get-Out-of-a-Lease-Step-3-Version-2.jpg" data-width="460" data-height="345" id="fa707fe53c7b044397cc1a64caf4c3c0" onload="WH.performance.clearMarks('image1_rendered'); WH.performance.mark('image1_rendered');"&gt;</span></noscript><span data-dcnode-id="2385" instrument_node="">
</span><div class="image_details" data-dcnode-id="2380" style="display:none;"><span data-dcnode-id="2381" style="display:none;"><span data-dcnode-id="2382" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/b\/b8\/Get-Out-of-a-Lease-Step-3-Version-2.jpg\/v4-460px-Get-Out-of-a-Lease-Step-3-Version-2.jpg","bigUrl":"\/images\/thumb\/b\/b8\/Get-Out-of-a-Lease-Step-3-Version-2.jpg\/aid6652216-v4-728px-Get-Out-of-a-Lease-Step-3-Version-2.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="2377" instrument_node="">
</span><div class="step_num" data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">1</span></div><div class="step" data-dcnode-id="2338"><span data-dcnode-id="2374" instrument_node="">
</span><b class="whb" data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">Determine if the person is committing financial fraud.</span></b><span data-dcnode-id="2371" instrument_node=""> If you suspect that your tenant or neighbor should be able to support their family with their income without Section 8 support, the police may be interested in investigating the situation. 
</span><ul data-dcnode-id="2343"><span data-dcnode-id="2370" instrument_node="">
</span><li data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Section 8 assistance is given to those with low income to help them afford housing for themselves and their families.</span></li><span data-dcnode-id="2367" instrument_node="">
</span><li data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Sometimes, a tenant's income level will rise, but they will not report the increase in income in order to keep qualifying for Section 8 assistance. This is financial fraud.</span></li><span data-dcnode-id="2364" instrument_node="">
</span><li data-dcnode-id="2345"><span data-dcnode-id="2363" instrument_node="">In other cases, a high-earning spouse may be living in the home but not listed on the lease.</span><sup aria-label="Link to Reference 3" class="reference" data-dcnode-id="2347" id="_ref-3"><a data-dcnode-id="2361" href="#_note-3"><span data-dcnode-id="2362" instrument_node="">[3]</span></a><span class="ts_popup" data-dcnode-id="2349" hidden="" id="ts_popup_3" style="display: none;"><span data-dcnode-id="2360" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">X</span></span><span data-dcnode-id="2357" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Research source</span></span><span data-dcnode-id="2354" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2353"></span><span data-dcnode-id="2352" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2351" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2350" instrument_node="">
</span></span><span data-dcnode-id="2348" instrument_node="">
</span></sup><span data-dcnode-id="2346" instrument_node=""> If you sense a disconnect between the tenants' standard of living and the assistance they are receiving, keep an eye out for more concrete evidence, such as long-term "guests" who aren't on the lease.</span></li><span data-dcnode-id="2344" instrument_node="">
</span></ul><span data-dcnode-id="2342" instrument_node="">
</span><span data-dcnode-id="2339" instrument_node="">
</span></div><span data-dcnode-id="2337" instrument_node="">
</span><div class="clearall" data-dcnode-id="2336"></div><span data-dcnode-id="2335" instrument_node="">
</span><div class="scrolltomarker" data-dcnode-id="2334" data-isstep="1"></div><span data-dcnode-id="2333" instrument_node="">
</span></li><span data-dcnode-id="2331" instrument_node="">
</span><li data-dcnode-id="2246" id="step-id-01"><span data-dcnode-id="2330" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="2329" name="step_1_2"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="2309" style="max-width:728px"><a class="image" data-dcnode-id="2310" href="#/Image:Get-Out-of-a-Lease-Step-15.jpg"><div class="content-spacer" data-dcnode-id="2318" style="padding-top:75%"><div class="loading-container" data-dcnode-id="2324"><div class="loader" data-dcnode-id="2325"><div class="loader-dot" data-dcnode-id="2328"></div><div class="loader-dot" data-dcnode-id="2327"></div><div class="loader-dot" data-dcnode-id="2326"></div></div></div><span data-dcnode-id="2323" instrument_node="">
</span><img alt="Image titled Get Out of a Lease Step 15" class="whcdn content-fill img-loading-alt" data-dcnode-id="2322" data-height="345" data-src="https://www.wikihow.com/images/thumb/6/6b/Get-Out-of-a-Lease-Step-15.jpg/v4-460px-Get-Out-of-a-Lease-Step-15.jpg" data-srclarge="/images/thumb/6/6b/Get-Out-of-a-Lease-Step-15.jpg/aid6652216-v4-728px-Get-Out-of-a-Lease-Step-15.jpg" data-width="460" decoding="async" id="4da3fc8195059257349dd5596f556bd9" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/6/6b/Get-Out-of-a-Lease-Step-15.jpg/aid6652216-v4-728px-Get-Out-of-a-Lease-Step-15.jpg.webp&amp;raw"><span data-dcnode-id="2319" instrument_node="">
</span></div><span data-dcnode-id="2317" instrument_node="">
</span><noscript data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">&lt;img alt="Image titled Get Out of a Lease Step 15" src="https://www.wikihow.com/images/thumb/6/6b/Get-Out-of-a-Lease-Step-15.jpg/v4-460px-Get-Out-of-a-Lease-Step-15.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/6/6b/Get-Out-of-a-Lease-Step-15.jpg/aid6652216-v4-728px-Get-Out-of-a-Lease-Step-15.jpg" data-width="460" data-height="345" id="4da3fc8195059257349dd5596f556bd9"&gt;</span></noscript><span data-dcnode-id="2314" instrument_node="">
</span><div class="image_details" data-dcnode-id="2311" style="display:none;"><span data-dcnode-id="2312" style="display:none;"><span data-dcnode-id="2313" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/6\/6b\/Get-Out-of-a-Lease-Step-15.jpg\/v4-460px-Get-Out-of-a-Lease-Step-15.jpg","bigUrl":"\/images\/thumb\/6\/6b\/Get-Out-of-a-Lease-Step-15.jpg\/aid6652216-v4-728px-Get-Out-of-a-Lease-Step-15.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="2308" instrument_node="">
</span><div class="step_num" data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">2</span></div><div class="step" data-dcnode-id="2258"><span data-dcnode-id="2305" instrument_node="">
</span><b class="whb" data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Identify unauthorized people permanently living in the home.</span></b><span data-dcnode-id="2302" instrument_node=""> There is usually nothing wrong with a tenant having guests overnight or even for an extended period of time. However, those receiving Section 8 assistance will sometimes take on roommates or sublet space to help pay the rent. They will keep these arrangements hidden because they no longer qualify for Section 8 assistance but want to keep receiving benefits.</span><sup aria-label="Link to Reference 4" class="reference" data-dcnode-id="2286" id="_ref-4"><a data-dcnode-id="2300" href="#_note-4"><span data-dcnode-id="2301" instrument_node="">[4]</span></a><span class="ts_popup" data-dcnode-id="2288" hidden="" id="ts_popup_4" style="display: none;"><span data-dcnode-id="2299" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">X</span></span><span data-dcnode-id="2296" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">Research source</span></span><span data-dcnode-id="2293" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2292"></span><span data-dcnode-id="2291" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2290" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2289" instrument_node="">
</span></span><span data-dcnode-id="2287" instrument_node="">
</span></sup><span data-dcnode-id="2285" instrument_node="">
</span><ul data-dcnode-id="2260"><span data-dcnode-id="2284" instrument_node="">
</span><li data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">If you see people who are not on the lease coming and going regularly from the home, it may warrant an investigation.</span></li><span data-dcnode-id="2281" instrument_node="">
</span><li data-dcnode-id="2262"><span data-dcnode-id="2280" instrument_node="">A visitor becomes an "unauthorized guest" if they stay more than 15 consecutive days without approval from the Public Housing Authority (PHA), or more than 30 days in one twelve-month period.</span><sup aria-label="Link to Reference 5" class="reference" data-dcnode-id="2264" id="_ref-5"><a data-dcnode-id="2278" href="#_note-5"><span data-dcnode-id="2279" instrument_node="">[5]</span></a><span class="ts_popup" data-dcnode-id="2266" hidden="" id="ts_popup_5" style="display: none;"><span data-dcnode-id="2277" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">X</span></span><span data-dcnode-id="2274" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Research source</span></span><span data-dcnode-id="2271" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2270"></span><span data-dcnode-id="2269" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2268" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2267" instrument_node="">
</span></span><span data-dcnode-id="2265" instrument_node="">
</span></sup><span data-dcnode-id="2263" instrument_node="">

</span><div class="step_num" data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">3</span></div><div class="step" data-dcnode-id="2172"><span data-dcnode-id="2219" instrument_node="">
</span><b class="whb" data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Be aware of other fraudulent arrangements.</span></b><span data-dcnode-id="2216" instrument_node=""> It is a violation for some convicted felons to reside in Section 8 housing, depending upon the type of offense and how long ago the offense was committed. Disqualifying offenses include violent crimes, sexual offenses, drug trafficking, and some types of fraud.</span><sup aria-label="Link to Reference 6" class="reference" data-dcnode-id="2200" id="_ref-6"><a data-dcnode-id="2214" href="#_note-6"><span data-dcnode-id="2215" instrument_node="">[6]</span></a><span class="ts_popup" data-dcnode-id="2202" hidden="" id="ts_popup_6" style="display: none;"><span data-dcnode-id="2213" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">X</span></span><span data-dcnode-id="2210" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Research source</span></span><span data-dcnode-id="2207" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2206"></span><span data-dcnode-id="2205" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2204" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2203" instrument_node="">
</span></span><span data-dcnode-id="2201" instrument_node="">
</span></sup><span data-dcnode-id="2199" instrument_node=""> You might also encounter a Section 8 tenant who reports that there are more people living in the home than are actually present.
</span><ul data-dcnode-id="2174"><span data-dcnode-id="2198" instrument_node="">
</span><li data-dcnode-id="2179"><span data-dcnode-id="2197" instrument_node="">For example, a Section 8 applicant might report to HUD that his children are living in the home and that he  needs additional assistance to afford a home with more rooms, when in fact he is living alone in a larger home than he would otherwise be able to afford.</span><sup aria-label="Link to Reference 7" class="reference" data-dcnode-id="2181" id="_ref-7"><a data-dcnode-id="2195" href="#_note-7"><span data-dcnode-id="2196" instrument_node="">[7]</span></a><span class="ts_popup" data-dcnode-id="2183" hidden="" id="ts_popup_7" style="display: none;"><span data-dcnode-id="2194" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">X</span></span><span data-dcnode-id="2191" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Research source</span></span><span data-dcnode-id="2188" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2187"></span><span data-dcnode-id="2186" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2185" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2184" instrument_node="">
</span></span><span data-dcnode-id="2182" instrument_node="">
</span></sup><span data-dcnode-id="2180" instrument_node="">
</span></li><span data-dcnode-id="2178" instrument_node="">
</span><li data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">If you decide to investigate on your own, be careful not to cross the line into intrusiveness or harassment. Make note of or even discretely photograph people who regularly come an go from the property but should not be living there. Look out also for business transactions on the premises that could indicate drug-related activity.</span></li><span data-dcnode-id="2175" instrument_node="">
</span></ul><span data-dcnode-id="2173" instrument_node="">

</span><span class="mw-headline" data-dcnode-id="2133" id="Reporting-Fraud"><div class="method_label" data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Part 2 of 2:</span></div><span data-dcnode-id="2134" instrument_node="">Reporting Fraud</span></span><span data-dcnode-id="2132" instrument_node="">
</span></h3><span data-dcnode-id="2130" instrument_node="">
</span><div class="section_text" data-dcnode-id="1734" id="steps_2"><span data-dcnode-id="2129" instrument_node="">
</span><ol class="steps_list_2" data-dcnode-id="1738"><span data-dcnode-id="2128" instrument_node="">
</span><li data-dcnode-id="2031" id="step-id-13"><span data-dcnode-id="2127" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="2126" name="step_2_1"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="2106" style="max-width:728px"><a class="image" data-dcnode-id="2107" href="#/Image:Conduct-Research-Step-2.jpg"><div class="content-spacer" data-dcnode-id="2115" style="padding-top:75%"><div class="loading-container" data-dcnode-id="2121"><div class="loader" data-dcnode-id="2122"><div class="loader-dot" data-dcnode-id="2125"></div><div class="loader-dot" data-dcnode-id="2124"></div><div class="loader-dot" data-dcnode-id="2123"></div></div></div><span data-dcnode-id="2120" instrument_node="">
</span><img alt="" class="whcdn content-fill img-loading-alt" data-dcnode-id="2119" data-height="345" data-src="https://www.wikihow.com/images/thumb/e/ed/Conduct-Research-Step-2.jpg/v4-460px-Conduct-Research-Step-2.jpg" data-srclarge="/images/thumb/e/ed/Conduct-Research-Step-2.jpg/aid6652216-v4-728px-Conduct-Research-Step-2.jpg" data-width="460" decoding="async" id="94108b2741271df578210ed2ce0b9d47" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/e/ed/Conduct-Research-Step-2.jpg/aid6652216-v4-728px-Conduct-Research-Step-2.jpg.webp&amp;raw"><span data-dcnode-id="2116" instrument_node="">

</span><noscript data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">&lt;img alt="Image titled Conduct Research Step 2" src="https://www.wikihow.com/images/thumb/e/ed/Conduct-Research-Step-2.jpg/v4-460px-Conduct-Research-Step-2.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/e/ed/Conduct-Research-Step-2.jpg/aid6652216-v4-728px-Conduct-Research-Step-2.jpg" data-width="460" data-height="345" id="94108b2741271df578210ed2ce0b9d47"&gt;</span></noscript><span data-dcnode-id="2111" instrument_node="">
</span><div class="image_details" data-dcnode-id="2108" style="display:none;"><span data-dcnode-id="2109" style="display:none;"><span data-dcnode-id="2110" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/e\/ed\/Conduct-Research-Step-2.jpg\/v4-460px-Conduct-Research-Step-2.jpg","bigUrl":"\/images\/thumb\/e\/ed\/Conduct-Research-Step-2.jpg\/aid6652216-v4-728px-Conduct-Research-Step-2.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="2105" instrument_node="">
</span><div class="step_num" data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">1</span></div><div class="step" data-dcnode-id="2037"><span data-dcnode-id="2102" instrument_node="">
</span><b class="whb" data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Gather evidence and details.</span></b><span data-dcnode-id="2099" instrument_node=""> When you make your report, you will need to provide enough information to convince the investigating agency that fraud seems to be occurring, and enough detail to indicate who and where to investigate. If your information is too vague or unsubstantiated, the investigating agency might choose not to take any action.</span><sup aria-label="Link to Reference 8" class="reference" data-dcnode-id="2083" id="_ref-8"><a data-dcnode-id="2097" href="#_note-8"><span data-dcnode-id="2098" instrument_node="">[8]</span></a><span class="ts_popup" data-dcnode-id="2085" hidden="" id="ts_popup_8" style="display: none;"><span data-dcnode-id="2096" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">X</span></span><span data-dcnode-id="2093" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Research source</span></span><span data-dcnode-id="2090" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2089"></span><span data-dcnode-id="2088" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2087" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2086" instrument_node="">
</span></span><span data-dcnode-id="2084" instrument_node="">
</span></sup><span data-dcnode-id="2082" instrument_node=""> Be prepared to provide as much of the following as you can:
</span><ul data-dcnode-id="2039"><span data-dcnode-id="2081" instrument_node="">
</span><li data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">The violator's name;</span></li><span data-dcnode-id="2078" instrument_node="">
</span><li data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">The violator's address;</span></li><span data-dcnode-id="2075" instrument_node="">
</span><li data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">How you know the violator is receiving Section 8 assistance;</span></li><span data-dcnode-id="2072" instrument_node="">
</span><li data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Why you believe the violator does not qualify for Section 8 assistance;</span></li><span data-dcnode-id="2069" instrument_node="">
</span><li data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">What benefit the violator is receiving through his or her fraud;</span></li><span data-dcnode-id="2066" instrument_node="">
</span><li data-dcnode-id="2047"><span data-dcnode-id="2065" instrument_node="">What actions or scheme the violator is using to commit fraud;</span><sup aria-label="Link to Reference 9" class="reference" data-dcnode-id="2049" id="_ref-9"><a data-dcnode-id="2063" href="#_note-9"><span data-dcnode-id="2064" instrument_node="">[9]</span></a><span class="ts_popup" data-dcnode-id="2051" hidden="" id="ts_popup_9" style="display: none;"><span data-dcnode-id="2062" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">X</span></span><span data-dcnode-id="2059" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Research source</span></span><span data-dcnode-id="2056" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2055"></span><span data-dcnode-id="2054" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2053" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2052" instrument_node="">
</span></span><span data-dcnode-id="2050" instrument_node="">
</span></sup><span data-dcnode-id="2048" instrument_node="">
</span></li><span data-dcnode-id="2046" instrument_node="">
</span><li data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Descriptions of people living at the address, or photographs, if you have them; and</span></li><span data-dcnode-id="2043" instrument_node="">
</span><li data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Any other documentation that supports your claim.</span></li><span data-dcnode-id="2040" instrument_node="">
</span></ul><span data-dcnode-id="2038" instrument_node="">
</span></div><span data-dcnode-id="2036" instrument_node="">
</span><div class="clearall" data-dcnode-id="2035"></div><span data-dcnode-id="2034" instrument_node="">
</span><div class="scrolltomarker" data-dcnode-id="2033" data-isstep="1"></div><span data-dcnode-id="2032" instrument_node="">
</span></li><span data-dcnode-id="2030" instrument_node="">
</span><li data-dcnode-id="1956" id="step-id-14"><span data-dcnode-id="2029" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="2028" name="step_2_2"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="2008" style="max-width:728px"><a class="image" data-dcnode-id="2009" href="#/Image:Conduct-Research-Step-4.jpg"><div class="content-spacer" data-dcnode-id="2017" style="padding-top:75%"><div class="loading-container" data-dcnode-id="2023"><div class="loader" data-dcnode-id="2024"><div class="loader-dot" data-dcnode-id="2027"></div><div class="loader-dot" data-dcnode-id="2026"></div><div class="loader-dot" data-dcnode-id="2025"></div></div></div><span data-dcnode-id="2022" instrument_node="">
</span><img alt="" class="whcdn content-fill img-loading-alt" data-dcnode-id="2021" data-height="345" data-src="https://www.wikihow.com/images/thumb/3/36/Conduct-Research-Step-4.jpg/v4-460px-Conduct-Research-Step-4.jpg" data-srclarge="/images/thumb/3/36/Conduct-Research-Step-4.jpg/aid6652216-v4-728px-Conduct-Research-Step-4.jpg" data-width="460" decoding="async" id="dcb20d4f48d11fab353b8468d80708c1" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/3/36/Conduct-Research-Step-4.jpg/aid6652216-v4-728px-Conduct-Research-Step-4.jpg.webp&amp;raw"><span data-dcnode-id="2018" instrument_node="">
</span></div><span data-dcnode-id="2016" instrument_node="">
</span><noscript data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">&lt;img alt="Image titled Conduct Research Step 4" src="https://www.wikihow.com/images/thumb/3/36/Conduct-Research-Step-4.jpg/v4-460px-Conduct-Research-Step-4.jpg" decoding="async" class="whcdn content-fill" data-srclarge="/images/thumb/3/36/Conduct-Research-Step-4.jpg/aid6652216-v4-728px-Conduct-Research-Step-4.jpg" data-width="460" data-height="345" id="dcb20d4f48d11fab353b8468d80708c1"&gt;</span></noscript><span data-dcnode-id="2013" instrument_node="">
</span><div class="image_details" data-dcnode-id="2010" style="display:none;"><span data-dcnode-id="2011" style="display:none;"><span data-dcnode-id="2012" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/3\/36\/Conduct-Research-Step-4.jpg\/v4-460px-Conduct-Research-Step-4.jpg","bigUrl":"\/images\/thumb\/3\/36\/Conduct-Research-Step-4.jpg\/aid6652216-v4-728px-Conduct-Research-Step-4.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="2007" instrument_node="">
</span><div class="step_num" data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">2</span></div><div class="step" data-dcnode-id="1962"><span data-dcnode-id="2004" instrument_node="">
</span><b class="whb" data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">Decide whether or not to remain anonymous.</span></b><span data-dcnode-id="2001" instrument_node=""> You generally have the option to make an anonymous fraud report.</span><sup aria-label="Link to Reference 10" class="reference" data-dcnode-id="1985" id="_ref-10"><a data-dcnode-id="1999" href="#_note-10"><span data-dcnode-id="2000" instrument_node="">[10]</span></a><span class="ts_popup" data-dcnode-id="1987" hidden="" id="ts_popup_10" style="display: none;"><span data-dcnode-id="1998" instrument_node="">
</span><span class="ts_close" data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">X</span></span><span data-dcnode-id="1995" instrument_node="">
</span><span class="ts_name" data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Research source</span></span><span data-dcnode-id="1992" instrument_node="">
</span><span class="ts_description" data-dcnode-id="1991"></span><span data-dcnode-id="1990" instrument_node="">
</span><a class="ts_source" data-dcnode-id="1989" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="1988" instrument_node="">
</span></span><span data-dcnode-id="1986" instrument_node="">
</span></sup><span data-dcnode-id="1984" instrument_node=""> However, if you remain anonymous, the investigator will not be able to contact you again for any additional information or details.

</span><a class="collapse_link" data-dcnode-id="1024" href="#summary_wrapper"><span data-dcnode-id="1027" id="summary_toc_heading_text"><span data-dcnode-id="1028" instrument_node="">Article Summary</span></span><span data-dcnode-id="1025" id="summary_close"><span data-dcnode-id="1026" instrument_node="">X</span></span></a><p class="text_summary_wrapper" data-dcnode-id="1019" id="summary_text"><span data-dcnode-id="1023" instrument_node="">If someone is claiming section 8 support while making a good income or subletting a room in their house, they may be committing fraud. Your local Department of Housing and Urban Development office will have an Office of Inspector General that deals with fraud reports. You can contact them by email, letter, or an in-person visit. Tell them the name and address of the person you suspect of section 8 fraud and tell them why you believe this. You can choose to report the fraud anonymously if you’re worried about the person finding out. Alternatively, contact your local Public Housing Authority, who can either deal with your report or direct you to a third party who can. </span><span data-dcnode-id="1021" id="summary_last_sentence"><span data-dcnode-id="1022" instrument_node="">For more tips from our Legal co-author, including how to locate your nearest Public Housing Authority, read on.</span></span><span class="sumpos_bottom" data-dcnode-id="1020" id="summary_position"></span></p><div class="s-help-wrap" data-dcnode-id="1005" data-type="summarytexthelp"><span data-dcnode-id="1018" instrument_node="">
