ner-inner" data-dcnode-id="953"><img alt="" class="avia_image" data-dcnode-id="954" itemprop="contentURL" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-static.findly.com/wp-content/uploads/sites/1118/2020/03/EVP-banner.jpg&amp;raw" tabindex="0" title="EVP-banner"></div></div><span data-dcnode-id="951" instrument_node="">
</span><div class="av-special-heading av-special-heading-h2 avia-builder-el-1 el_after_av_image el_before_av_textblock" data-dcnode-id="946" style="padding-bottom:10px;"><h2 class="av-special-heading-tag" data-dcnode-id="949" itemprop="headline"><span data-dcnode-id="950" instrument_node="">Notice on Recruitment Fraud</span></h2><div class="special-heading-border" data-dcnode-id="947"><div class="special-heading-inner-border" data-dcnode-id="948"></div></div></div><span data-dcnode-id="945" instrument_node="">
</span><section class="av_textblock_section" data-dcnode-id="834" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="avia_textblock" data-dcnode-id="835" itemprop="text"><p data-dcnode-id="939"><b data-dcnode-id="942"><span data-contrast="auto" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Recruitment fraud</span></span></b><span 201341983="" 335559739="" 335559740="" :0="" :240="" data-ccp-props="{" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="933"><span data-contrast="auto" data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Recruitment fraud is a sophisticated fraud involving the offer of fictitious job opportunities. This kind of fraud is normally done through unsolicited emails, online recruitment services (sometimes even legitimate platforms such as LinkedIn), bogus websites and even text messages claiming to be from Allstate. The aim of the fraud is typically to obtain personal information or money. Recruitment scams may involve offering fictitious job opportunities and requesting personal information and payments to process false applications.&nbsp;</span></span><span 201341983="" 335559739="" 335559740="" :0="" :240="" data-ccp-props="{" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="931" instrument_node="">Allstate is aware that both individuals and organizations have falsely claimed to recruit on behalf of Allstate. </span><span data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">We take recruitment fraud very seriously and provide this information to help you learn how to identify and report recruitment fraud.</span></span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="920"><span data-contrast="auto" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">We recommend that you do not respond to unsolicited offers of employment from people claiming to work for, or be affiliated with, Allstate. </span></span><span data-contrast="auto" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Allstate will not request personal information before you have first applied on our career site. Only applicants that have filled out the official application on our career site can be hired.</span></span><span 201341983="" 335559739="" 335559740="" :0="" :240="" data-ccp-props="{" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="916"><strong data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Identifying Recruitment Fraud</span></strong></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Perpetrators often ask recipients to complete fake recruitment documents, such as job applications, bank statements and/or visa/work permit forms.</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">It is important to look for these key warning signs:</span></p><span data-dcnode-id="909" instrument_node="">
</span><ul data-dcnode-id="892"><span data-dcnode-id="908" instrument_node="">
</span><li data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Requests for personal information, such as passport details, credit card information, and banking information.</span></li><span data-dcnode-id="905" instrument_node="">
</span><li data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Requests to contact other companies/individuals that you’re connected to (e.g., lawyers, bank officials, travel agencies, credit card information, courier companies, visa/immigration processing agencies).</span></li><span data-dcnode-id="902" instrument_node="">
</span><li data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Requests for payment of a fee to process or assist with a job application.</span></li><span data-dcnode-id="899" instrument_node="">
</span><li data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">An offer to pay a percentage of a fee requested if the candidate pays the remaining amount.</span></li><span data-dcnode-id="896" instrument_node="">
</span><li data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">An urgent request for the applicant to take action on the correspondence or offer.</span></li><span data-dcnode-id="893" instrument_node="">
</span></ul><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="888"><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">What should I do?</span></strong></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="882"><strong data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Do</span></strong></p><span data-dcnode-id="881" instrument_node="">
</span><ul data-dcnode-id="867"><span data-dcnode-id="880" instrument_node="">
</span><li data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Save messages from the perpetrator for further investigation if necessary. Save the original subject line, complete headers and complete message content.</span></li><span data-dcnode-id="877" instrument_node="">
</span><li data-dcnode-id="872"><span data-dcnode-id="876" instrument_node="">Send an email to </span><a data-dcnode-id="874" href="mailto:reportfraud@allstate.com"><span data-dcnode-id="875" instrument_node="">reportfraud@allstate.com</span></a><span data-dcnode-id="873" instrument_node=""> with the subject “Recruitment Fraud,” and include all relevant evidence, including job posting information and email communications.</span></li><span data-dcnode-id="871" instrument_node="">
</span><li data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Consider contacting your local police or legal authority.</span></li><span data-dcnode-id="868" instrument_node="">
</span></ul><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="861"><strong data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Do NOT</span></strong></p><span data-dcnode-id="860" instrument_node="">
</span><ul data-dcnode-id="849"><span data-dcnode-id="859" instrument_node="">
</span><li data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Respond to unsolicited business propositions and/or offers of employment from people with whom you are unfamiliar.</span></li><span data-dcnode-id="856" instrument_node="">
</span><li data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Send any money. Allstate does not ask for money transfers or payments from applicants to secure an application, interview or a job, either as an employee or as a contractor.</span></li><span data-dcnode-id="853" instrument_node="">
</span><li data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Engage in further communication or disclose your personal or financial information, if you believe the communication may be fraudulent.</span></li><span data-dcnode-id="850" instrument_node="">
</span></ul><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="843"><strong data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Allstate will never </span></strong><strong data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">​​​ask you to submit your personal information unless you have first applied to a position on our career site.</span></strong></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="841" instrument_node="">Allstate bears no responsibility for fraudulent offers. When in doubt, please reach out to </span><a data-dcnode-id="839" href="mailto:reportfraud@allstate.com"><span data-dcnode-id="840" instrument_node="">reportfraud@allstate.com</span></a><span data-dcnode-id="838" instrument_node="">, use the subject “Recruitment Fraud.”</span></p><span data-dcnode-id="836" instrument_node="">
</span></div></section><span data-dcnode-id="833" instrument_node="">
</span></div></div></main><span data-dcnode-id="828" instrument_node=""> </span><span data-dcnode-id="826" instrument_node=""> </span></div></div><span data-dcnode-id="821" instrument_node=""> </span><div class="avia-section main_color avia-section-no-padding avia-no-border-styling avia-bg-style-scroll avia-builder-el-55 el_after_av_section avia-builder-el-last container_wrap fullsize" data-dcnode-id="800" id="logo-bottom"><div class="container container-1440" data-dcnode-id="802"><div class="template-page content av-content-full alpha units" data-dcnode-id="806"><div class="post-entry post-entry-type-page post-entry-16" data-dcnode-id="807"><div class="entry-content-wrapper clearfix" data-dcnode-id="808"><div class="flex_column av_one_full no_margin flex_column_div av-zero-column-padding first avia-builder-el-56 avia-builder-el-no-sibling" data-dcnode-id="809" style="margin-top:0; margin-bottom:0; border-radius:0px; "><div class="avia-image-container av-styling- avia-builder-el-57 el_before_av_textblock avia-builder-el-first avia-align-left" data-dcnode-id="818" itemscope="itemscope" itemtype="https://schema.org/ImageObject"><div class="avia-image-container-inner" data-dcnode-id="819"><img alt="Beacon Box" class="avia_image" data-dcnode-id="820" itemprop="contentURL" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-static.findly.com/wp-content/uploads/sites/2003/2021/11/12150815/footer-logo.png&amp;raw" title="Beacon Box"></div></div><section class="av_textblock_section" data-dcnode-id="810" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="avia_textblock good-hands" data-dcnode-id="811" itemprop="text"><h2 data-dcnode-id="812"><span data-dcnode-id="817" instrument_node="">good work. good life. </span><span class="drkblue" data-dcnode-id="813"><span data-dcnode-id="816" instrument_node="">good hands.</span><span class="symbol" data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">®</span></span></span></h2></div></section></div></div></div></div><span data-dcnode-id="804" instrument_node=""> </span></div></div><div class="container_wrap footer_color" data-dcnode-id="729" id="footer"><span data-dcnode-id="799" instrument_node="">
</span><div class="container" data-dcnode-id="733"><span data-dcnode-id="798" instrument_node="">
</span><div class="flex_column first el_before_" data-dcnode-id="735"><section class="widget_text widget clearfix widget_custom_html" data-dcnode-id="741" id="custom_html-13"><div class="textwidget custom-html-widget" data-dcnode-id="743"><div class="textwidget custom-html-widget footer-top" data-dcnode-id="768"><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">
Effective July 1, 2014, under Indiana House Enrolled Act (HEA) 1242, it is against public policy of the State of Indiana and a discriminatory practice for an employer to discriminate against a prospective employee on the basis of status as a veteran by refusing to employ an applicant on the basis that they are a veteran of the armed forces of the United States, a member of the Indiana National Guard or a member of a reserve component.</span></p><p data-dcnode-id="791"><span data-dcnode-id="795" instrument_node="">For jobs in San Francisco, please click </span><a aria-label="San Francisco Fair Chance Ordinance Here" data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sfgov.org/olse/sites/default/files/Document/FCO%2520Poster%2520Set%2520All%2520Languages%252010%252001%252018.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="794" instrument_node="">here</span></a><span data-dcnode-id="792" instrument_node=""> for information regarding the San Francisco Fair Chance Ordinance.</span></p><p data-dcnode-id="786"><span data-dcnode-id="790" instrument_node="">For jobs in Los Angeles, please click </span><a aria-label="Los Angeles Fair Chance Initiative for Hiring Ordinance here" data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bca.lacity.org/fair-chance" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="789" instrument_node="">here</span></a><span data-dcnode-id="787" instrument_node=""> for information regarding the Los Angeles Fair Chance Initiative for Hiring Ordinance.</span></p><p data-dcnode-id="781"><span data-dcnode-id="785" instrument_node="">To view the “EEO is the Law” poster click </span><a aria-label="EEO is the Law here" data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dol.gov/sites/dolgov/files/ofccp/regs/compliance/posters/pdf/eeopost.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="784" instrument_node="">here</span></a><span data-dcnode-id="782" instrument_node="">. This poster provides information concerning the laws and procedures for filing complaints of violations of the laws with the Office of Federal Contract Compliance Programs.</span></p><p data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">To view the FMLA poster, click </span><a aria-label="FMLA poster here" data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dol.gov/sites/dolgov/files/WHD/legacy/files/fmlaen.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="779" instrument_node="">here</span></a><span data-dcnode-id="777" instrument_node="">. This poster summarizing the major provisions of the Family and Medical Leave Act (FMLA) and telling employees how to file a complaint.</span></p><p data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">To view the EPPA poster, click </span><a aria-label="EPPA poster here" data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dol.gov/sites/dolgov/files/WHD/legacy/files/eppac.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="774" instrument_node="">here</span></a><span data-dcnode-id="772" instrument_node="">. This Employee Polygraph Protection Act prohibits most private employers from using lie detector tests either for pre-employment screening or during the course of employment.</span></p><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">It is the Company’s policy to employ the best qualified individuals available for all jobs. Therefore, any discriminatory action taken on account of an employee’s ancestry, age, color, disability, genetic information, gender, gender identity, gender expression, sexual and reproductive health decision, marital status, medical condition, military or veteran status, national origin, race (include traits historically associated with race, including, but not limited to, hair texture and protective hairstyles), religion (including religious dress), sex, or sexual orientation that adversely affects an employee’s terms or conditions of employment is prohibited. This policy applies to all aspects of the employment relationship, including, but not limited to, hiring, training, salary administration, promotion, job assignment, benefits, discipline, and separation of employment.</span></p></div><span data-dcnode-id="767" instrument_node="">
