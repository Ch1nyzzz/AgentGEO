</span><p data-dcnode-id="2500"><em data-dcnode-id="2501"><span data-dcnode-id="2502" style="font-weight: 400;"><span data-dcnode-id="2503" instrument_node="">Tessian Cloud Email Security intelligently prevents advanced email threats and protects against data loss, to strengthen email security and build smarter security cultures in modern enterprises.</span></span></em></p><span data-dcnode-id="2499" instrument_node="">

</span><li class="accordion-item is-active" data-accordion-item="" data-dcnode-id="2484"><span data-dcnode-id="2494" instrument_node="">
</span><a aria-controls="41lho0-accordion" aria-expanded="true" aria-selected="true" class="accordion-title" data-dcnode-id="2492" href="#" id="41lho0-accordion-label" role="tab"><span data-dcnode-id="2493" instrument_node="">
What is CEO Fraud? </span></a><span data-dcnode-id="2491" instrument_node="">
</span><div aria-hidden="false" aria-labelledby="41lho0-accordion-label" class="accordion-content" data-dcnode-id="2486" data-tab-content="" id="41lho0-accordion" role="tabpanel" style="display: block;"><span data-dcnode-id="2490" instrument_node="">
</span><p data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">CEO fraud is a type of cyberattack in which a fraudster impersonates a company executive via email. This could be your CEO, CFO, Head of HR — or anyone with the power to ask employees to make payments.</span></p><span data-dcnode-id="2487" instrument_node="">
</span></div><span data-dcnode-id="2485" instrument_node="">
</span></li><span data-dcnode-id="2483" instrument_node="">
</span></ul><span data-dcnode-id="2481" instrument_node="">
</span></div><span data-dcnode-id="2479" instrument_node="">
</span><div class="small-12 columns nopad entry" data-dcnode-id="2393"><span data-dcnode-id="2478" instrument_node="">
</span><p data-dcnode-id="2475"><span data-dcnode-id="2476" style="font-weight: 400;"><span data-dcnode-id="2477" instrument_node="">As we’ll explain below, there are several different methods used by cybercriminals to carry out a CEO fraud attack. But they all have one thing in common: money.</span></span></p><span data-dcnode-id="2474" instrument_node="">
</span><p data-dcnode-id="2466"><span data-dcnode-id="2472" style="font-weight: 400;"><span data-dcnode-id="2473" instrument_node="">Most often, a CEO fraud email will urgently request the employee to pay a supplier’s “invoice” using new account details. Cybercriminals use</span></span><span data-dcnode-id="2471" instrument_node=""> </span><strong data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">sophisticated techniques and meticulous research</span></strong><span data-dcnode-id="2467" style="font-weight: 400;"><span data-dcnode-id="2468" instrument_node=""> to make the attack as persuasive as possible.&nbsp;</span></span></p><span data-dcnode-id="2465" instrument_node="">
</span><p data-dcnode-id="2462"><span data-dcnode-id="2463" style="font-weight: 400;"><span data-dcnode-id="2464" instrument_node="">Why do cybercriminals impersonate CEOs and other high-level executives? Two reasons:</span></span></p><span data-dcnode-id="2461" instrument_node="">
</span><ul data-dcnode-id="2443"><span data-dcnode-id="2460" instrument_node="">
</span><li data-dcnode-id="2453" style="font-weight: 400;"><strong data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Power</span></strong><span data-dcnode-id="2454" style="font-weight: 400;"><strong data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">:</span></strong><span data-dcnode-id="2455" instrument_node=""> CEOs have the authority to instruct staff to make payments.</span></span></li><span data-dcnode-id="2452" instrument_node="">
</span><li data-dcnode-id="2445" style="font-weight: 400;"><strong data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">Status</span></strong><span data-dcnode-id="2446" style="font-weight: 400;"><strong data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">:</span></strong><span data-dcnode-id="2447" instrument_node=""> Employees tend to do what CEOs ask. No one wants to upset the boss.</span></span></li><span data-dcnode-id="2444" instrument_node="">
</span></ul><span data-dcnode-id="2442" instrument_node="">
</span><h2 data-dcnode-id="2439"><span data-dcnode-id="2440" style="font-weight: 400;"><span data-dcnode-id="2441" instrument_node="">CEO fraud vs. other types of cybercrime</span></span></h2><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2435"><span data-dcnode-id="2436" style="font-weight: 400;"><span data-dcnode-id="2437" instrument_node="">There’s some confusion about CEO fraud and how it relates to other types of cybercrime. Let’s clear a few things up before looking at CEO fraud in more detail.</span></span></p><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2431"><span data-dcnode-id="2432" style="font-weight: 400;"><span data-dcnode-id="2433" instrument_node="">CEO fraud is related to the following types of cybercrime:</span></span></p><span data-dcnode-id="2430" instrument_node="">
</span><ul data-dcnode-id="2395"><span data-dcnode-id="2429" instrument_node="">
</span><li data-dcnode-id="2423" style="font-weight: 400;"><a data-dcnode-id="2426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/what-is-social-engineering/"><span data-dcnode-id="2427" style="font-weight: 400;"><span data-dcnode-id="2428" instrument_node="">Social engineering attack</span></span></a><span data-dcnode-id="2424" style="font-weight: 400;"><span data-dcnode-id="2425" instrument_node="">: Any cyberattack in which the attacker impersonates someone that their target is likely to trust.</span></span></li><span data-dcnode-id="2422" instrument_node="">
</span><li data-dcnode-id="2411" style="font-weight: 400;"><a data-dcnode-id="2419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/phishing-statistics-2020/"><span data-dcnode-id="2420" style="font-weight: 400;"><span data-dcnode-id="2421" instrument_node="">Phishing</span></span></a><span data-dcnode-id="2417" style="font-weight: 400;"><span data-dcnode-id="2418" instrument_node="">: A social engineering attack conducted via email (there are other forms of phishing, such as </span></span><a data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/what-is-smishing-and-vishing/"><span data-dcnode-id="2415" style="font-weight: 400;"><span data-dcnode-id="2416" instrument_node="">“smishing” and “vishing”</span></span></a><span data-dcnode-id="2412" style="font-weight: 400;"><span data-dcnode-id="2413" instrument_node=""> via SMS and phone).</span></span></li><span data-dcnode-id="2410" instrument_node="">
</span><li data-dcnode-id="2404" style="font-weight: 400;"><a data-dcnode-id="2407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/what-is-spear-phishing/"><span data-dcnode-id="2408" style="font-weight: 400;"><span data-dcnode-id="2409" instrument_node="">Spear phishing</span></span></a><span data-dcnode-id="2405" style="font-weight: 400;"><span data-dcnode-id="2406" instrument_node="">: A phishing attack targeting a named individual.</span></span></li><span data-dcnode-id="2403" instrument_node="">
</span><li data-dcnode-id="2397" style="font-weight: 400;"><a data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/bec-business-email-compromise/"><span data-dcnode-id="2401" style="font-weight: 400;"><span data-dcnode-id="2402" instrument_node="">Business Email Compromise (BEC)</span></span></a><span data-dcnode-id="2398" style="font-weight: 400;"><span data-dcnode-id="2399" instrument_node="">: A phishing attack conducted via a hacked or spoofed corporate email account.</span></span></li><span data-dcnode-id="2396" instrument_node="">
</span></ul><span data-dcnode-id="2394" instrument_node="">
</span></div><span data-dcnode-id="2392" instrument_node="">
</span><div class="small-12 columns nopad single-request-hold" data-dcnode-id="2376"><span data-dcnode-id="2391" instrument_node="">
</span><a data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/research/spear-phishing-threat-landscape/"><span data-dcnode-id="2390" instrument_node="">
</span><div class="small-12 columns nopad single-request-label" data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">
Download the Report </span></div><span data-dcnode-id="2387" instrument_node="">
</span><div class="small-12 columns nopad single-request-title" data-dcnode-id="2382"><span data-dcnode-id="2386" instrument_node="">
</span><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Spear Phishing Threat Landscape 2021</span></p><span data-dcnode-id="2383" instrument_node="">
</span></div><span data-dcnode-id="2381" instrument_node="">
</span><span data-dcnode-id="2380" style="width: 141px;"></span><span data-dcnode-id="2379" instrument_node="">
</span></a><span data-dcnode-id="2377" instrument_node="">
</span></div><span data-dcnode-id="2375" instrument_node="">
</span><div class="small-12 columns nopad entry" data-dcnode-id="2233"><span data-dcnode-id="2374" instrument_node="">
</span><p data-dcnode-id="2371"><span data-dcnode-id="2372" style="font-weight: 400;"><span data-dcnode-id="2373" instrument_node="">These types of cyberattack all utilize email and impersonation—two critical elements of a CEO fraud attack.</span></span></p><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2360"><span data-dcnode-id="2368" style="font-weight: 400;"><span data-dcnode-id="2369" instrument_node="">CEO fraud is not to be confused with “whaling”: a phishing attack where the cybercriminal </span></span><b data-dcnode-id="2365"><i data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">targets</span></i></b><b data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">—rather than impersonates—a CEO </span></b><span data-dcnode-id="2361" style="font-weight: 400;"><span data-dcnode-id="2362" instrument_node="">or other senior company employee.</span></span></p><span data-dcnode-id="2359" instrument_node="">
</span><p data-dcnode-id="2351"><span data-dcnode-id="2357" style="font-weight: 400;"><span data-dcnode-id="2358" instrument_node="">More on that in this article: </span></span><a data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/whaling-phishing-attack/"><span data-dcnode-id="2355" style="font-weight: 400;"><span data-dcnode-id="2356" instrument_node="">Whaling: Examples and Prevention Strategies</span></span></a><span data-dcnode-id="2352" style="font-weight: 400;"><span data-dcnode-id="2353" instrument_node="">.</span></span></p><span data-dcnode-id="2350" instrument_node="">
</span><h2 data-dcnode-id="2347"><span data-dcnode-id="2348" style="font-weight: 400;"><span data-dcnode-id="2349" instrument_node="">CEO Fraud techniques</span></span></h2><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2338"><span data-dcnode-id="2344" style="font-weight: 400;"><span data-dcnode-id="2345" instrument_node="">As explained above, CEO fraud is related to Business Email Compromise. That’s because the attacker needs to make it </span></span><i data-dcnode-id="2341"><span data-dcnode-id="2342" style="font-weight: 400;"><span data-dcnode-id="2343" instrument_node="">look like </span></span></i><span data-dcnode-id="2339" style="font-weight: 400;"><span data-dcnode-id="2340" instrument_node="">they’re a senior employee of your company—so any email they send must appear to have come from a company account.</span></span></p><span data-dcnode-id="2337" instrument_node="">
</span><p data-dcnode-id="2334"><span data-dcnode-id="2335" style="font-weight: 400;"><span data-dcnode-id="2336" instrument_node="">There are three main ways cybercriminals can compromise a CEO’s email account:</span></span></p><span data-dcnode-id="2333" instrument_node="">
</span><ul data-dcnode-id="2299"><span data-dcnode-id="2332" instrument_node="">
</span><li aria-level="1" data-dcnode-id="2325" style="font-weight: 400;"><b data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Hacking</span></b><span data-dcnode-id="2328" style="font-weight: 400;"><span data-dcnode-id="2329" instrument_node="">: Forcing entry into the CEO’s business email account and using it to send emails. </span></span><span data-dcnode-id="2326" style="font-weight: 400;"><span data-dcnode-id="2327" instrument_node="">This is the CEO fraud technique that’s most difficult to detect.</span></span></li><span data-dcnode-id="2324" instrument_node="">
</span><li aria-level="1" data-dcnode-id="2312" style="font-weight: 400;"><b data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">Spoofing</span></b><span data-dcnode-id="2320" style="font-weight: 400;"><span data-dcnode-id="2321" instrument_node="">: Sending an email from a forged email address and evading authentication techniques </span></span><span data-dcnode-id="2318" style="font-weight: 400;"><span data-dcnode-id="2319" instrument_node="">such as </span></span><a data-dcnode-id="2315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/why-dmarc-is-not-enough-to-stop-imperosnation/"><span data-dcnode-id="2316" style="font-weight: 400;"><span data-dcnode-id="2317" instrument_node="">DMARC</span></span></a><span data-dcnode-id="2313" style="font-weight: 400;"><span data-dcnode-id="2314" instrument_node="">.</span></span></li><span data-dcnode-id="2311" instrument_node="">
</span><li aria-level="1" data-dcnode-id="2301" style="font-weight: 400;"><b data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Impersonation</span></b><span data-dcnode-id="2307" style="font-weight: 400;"><span data-dcnode-id="2308" instrument_node="">: Using an email address that looks similar to a CEO’s email address. This can take the form of a “</span></span><a data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/how-to-impersonate-display-name/"><span data-dcnode-id="2305" style="font-weight: 400;"><span data-dcnode-id="2306" instrument_node="">display name impersonation attack</span></span></a><span data-dcnode-id="2302" style="font-weight: 400;"><span data-dcnode-id="2303" instrument_node="">.”</span></span></li><span data-dcnode-id="2300" instrument_node="">
</span></ul><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2295"><span data-dcnode-id="2296" style="font-weight: 400;"><span data-dcnode-id="2297" instrument_node="">Once the threat actor has taken control of a CEO’s email account—or has convincingly impersonated their email address—they use one of the following techniques to attack the target organisation:</span></span></p><span data-dcnode-id="2294" instrument_node="">
</span><ul data-dcnode-id="2262"><span data-dcnode-id="2293" instrument_node="">
</span><li aria-level="1" data-dcnode-id="2278" style="font-weight: 400;"><strong data-dcnode-id="2290"><a data-dcnode-id="2291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/what-is-wire-transfer-phishing/"><span data-dcnode-id="2292" instrument_node="">Wire transfer phishing</span></a></strong><span data-dcnode-id="2286" style="font-weight: 400;"><strong data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">:</span></strong><span data-dcnode-id="2287" instrument_node=""> The attacker asks the target to pay an invoice. </span></span><span data-dcnode-id="2284" style="font-weight: 400;"><span data-dcnode-id="2285" instrument_node="">According to </span></span><a data-dcnode-id="2281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ic3.gov/Media/PDF/AnnualReport/2020_IC3Report.pdf"><span data-dcnode-id="2282" style="font-weight: 400;"><span data-dcnode-id="2283" instrument_node="">the FBI</span></span></a><span data-dcnode-id="2279" style="font-weight: 400;"><span data-dcnode-id="2280" instrument_node="">, businesses lose billions of dollars per year via this type of phishing attack.</span></span></li><span data-dcnode-id="2277" instrument_node="">
</span><li aria-level="1" data-dcnode-id="2270" style="font-weight: 400;"><span data-dcnode-id="2273" style="font-weight: 400;"><strong data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">Gift certificate phishing</span></strong><span data-dcnode-id="2274" instrument_node="">: The attacker asks the targets to buy them gift certificates. </span></span><span data-dcnode-id="2271" style="font-weight: 400;"><span data-dcnode-id="2272" instrument_node="">Gift certificates can be harder to trace than a bank transfer. Check out this (hilarious) example “from” Tessian’s own CEO.</span></span></li><span data-dcnode-id="2269" instrument_node="">
</span><li aria-level="1" data-dcnode-id="2264" style="font-weight: 400;"><strong data-dcnode-id="2266"><a data-dcnode-id="2267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/what-is-a-malicious-payload/"><span data-dcnode-id="2268" instrument_node="">Malicious payload</span></a></strong><span data-dcnode-id="2265" instrument_node="">: The email contains an innocent-looking attachment that installs malware on the target company’s systems.</span></li><span data-dcnode-id="2263" instrument_node="">
</span></ul><span data-dcnode-id="2261" instrument_node="">
</span><h2 data-dcnode-id="2258"><span data-dcnode-id="2259" style="font-weight: 400;"><span data-dcnode-id="2260" instrument_node="">Anatomy of a CEO fraud attack</span></span></h2><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2254"><span data-dcnode-id="2255" style="font-weight: 400;"><span data-dcnode-id="2256" instrument_node="">Now let’s take a look at an example of a CEO fraud attack to help you better understand the process.</span></span></p><span data-dcnode-id="2253" instrument_node="">
</span><p data-dcnode-id="2244"><span data-dcnode-id="2251" style="font-weight: 400;"><span data-dcnode-id="2252" instrument_node="">Like all social engineering attacks, </span></span><strong data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">CEO fraud attacks exploit people’s feelings of trust and urgency</span></strong><span data-dcnode-id="2245" style="font-weight: 400;"><strong data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">.</span></strong><span data-dcnode-id="2246" instrument_node=""> When the CEO is “in a meeting” or “at a conference” and needs an urgent favor, employees don’t tend to second-guess them.&nbsp;</span></span></p><span data-dcnode-id="2243" instrument_node="">
</span><p data-dcnode-id="2235"><span data-dcnode-id="2241" style="font-weight: 400;"><span data-dcnode-id="2242" instrument_node="">Here’s how a CEO fraud email might look. Now, for the sake of the example, imagine your boss is Thomas Edison. Yes, </span></span><i data-dcnode-id="2238"><span data-dcnode-id="2239" style="font-weight: 400;"><span data-dcnode-id="2240" instrument_node="">that</span></span></i><span data-dcnode-id="2236" style="font-weight: 400;"><span data-dcnode-id="2237" instrument_node=""> Thomas Edison.</span></span></p><span data-dcnode-id="2234" instrument_node="">
</span></div><span data-dcnode-id="2232" instrument_node="">
</span><div class="small-12 columns nopad other-single-hold" data-dcnode-id="2204"><span data-dcnode-id="2231" instrument_node="">
</span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/the-ultimate-guide-to-spear-phishing/"><span data-dcnode-id="2230" instrument_node="">
</span><div class="small-12 medium-5 columns nopad other-single-image" data-dcnode-id="2228" style="background: url(https://www.tessian.com/wp-content/uploads/2021/12/WebsiteBlog2021-11-Ultimate-Guide-to-Spear-Phishing-500x281.jpg) no-repeat center center;"><span data-dcnode-id="2229" instrument_node="">
</span></div><span data-dcnode-id="2227" instrument_node="">
</span><div class="small-12 medium-7 columns nopad blog-list-content" data-dcnode-id="2208"><span data-dcnode-id="2226" instrument_node="">

</span><div class="small-12 columns nopad blog-list-title" data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">
The Ultimate Guide to Spear Phishing </span></div><span data-dcnode-id="2219" instrument_node="">
</span><div class="small-12 columns nopad blog-list-info" data-dcnode-id="2215"><span data-dcnode-id="2218" instrument_node="">
By Laura Brooks</span><br data-dcnode-id="2217"><span data-dcnode-id="2216" instrument_node="">
09 December 2021 </span></div><span data-dcnode-id="2214" instrument_node="">
</span></div><span data-dcnode-id="2212" instrument_node="">
</span><div class="small-12 columns nopad blog-list-content-bottom" data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">
</span></div><span data-dcnode-id="2209" instrument_node="">
</span></div><span data-dcnode-id="2207" instrument_node="">
</span></a><span data-dcnode-id="2205" instrument_node="">
</span></div><span data-dcnode-id="2203" instrument_node="">
</span><div class="small-12 columns nopad single-image-hold" data-dcnode-id="2191"><span data-dcnode-id="2202" instrument_node="">
</span><div class="small-12 columns nopad single-image" data-dcnode-id="2196"><span data-dcnode-id="2201" instrument_node="">
</span><img data-dcnode-id="2200" data-lazy-src="https://www.tessian.com/wp-content/uploads/2020/01/thomas-edison-mail-display-name-impersonation-blog.jpeg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">&lt;img src="https://www.tessian.com/wp-content/uploads/2020/01/thomas-edison-mail-display-name-impersonation-blog.jpeg"&gt;</span></noscript><span data-dcnode-id="2197" instrument_node="">
</span></div><span data-dcnode-id="2195" instrument_node="">
</span><div class="small-12 columns nopad single-caption" data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">
In this example of CEO Fraud, the hacker is impersonating Thomas Edison and is encouraging the target to make a fraudulent wire transfer. </span></div><span data-dcnode-id="2192" instrument_node="">
</span></div><span data-dcnode-id="2190" instrument_node="">
</span><div class="small-12 columns nopad entry" data-dcnode-id="1987"><span data-dcnode-id="2189" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2187" style="font-weight: 400;"><span data-dcnode-id="2188" instrument_node="">There are a few things to note about this CEO fraud email:</span></span></p><span data-dcnode-id="2185" instrument_node="">
</span><ul data-dcnode-id="2152"><span data-dcnode-id="2184" instrument_node="">
</span><li data-dcnode-id="2176" style="font-weight: 400;"><span data-dcnode-id="2182" style="font-weight: 400;"><span data-dcnode-id="2183" instrument_node="">Note the subject line, “Urgent request,” and the impending payment deadline. This </span></span><strong data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">sense of urgency</span></strong><span data-dcnode-id="2179" instrument_node=""> </span><span data-dcnode-id="2177" style="font-weight: 400;"><span data-dcnode-id="2178" instrument_node="">is ubiquitous among CEO fraud emails.</span></span></li><span data-dcnode-id="2175" instrument_node="">
</span><li data-dcnode-id="2167" style="font-weight: 400;"><span data-dcnode-id="2173" style="font-weight: 400;"><span data-dcnode-id="2174" instrument_node="">The fraudster uses Thomas’s casual email tone and his trademark lightbulb emoji. Fraudsters can do </span></span><strong data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">a great impersonation of a CEO</span></strong><span data-dcnode-id="2170" instrument_node=""> </span><span data-dcnode-id="2168" style="font-weight: 400;"><span data-dcnode-id="2169" instrument_node="">by scraping public data (plenty is available on social media!) or by hacking their email and observing their written style.</span></span></li><span data-dcnode-id="2166" instrument_node="">
</span><li data-dcnode-id="2154" style="font-weight: 400;"><span data-dcnode-id="2164" style="font-weight: 400;"><span data-dcnode-id="2165" instrument_node="">Cybercriminals do </span></span><strong data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">meticulous research</span></strong><span data-dcnode-id="2160" style="font-weight: 400;"><span data-dcnode-id="2161" instrument_node="">. Thomas probably is in Florida. “Filament Co.” might be a genuine supplier and an invoice might even </span></span><i data-dcnode-id="2157"><span data-dcnode-id="2158" style="font-weight: 400;"><span data-dcnode-id="2159" instrument_node="">actually</span></span></i><span data-dcnode-id="2155" style="font-weight: 400;"><span data-dcnode-id="2156" instrument_node=""> be due tomorrow.</span></span></li><span data-dcnode-id="2153" instrument_node="">
</span></ul><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2133"><span data-dcnode-id="2149" style="font-weight: 400;"><span data-dcnode-id="2150" instrument_node="">There’s one more thing to note about the email above.</span></span><span data-dcnode-id="2148" instrument_node=""> </span><strong data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">Look at the display name</span></strong><span data-dcnode-id="2144" style="font-weight: 400;"><span data-dcnode-id="2145" instrument_node=""> — it’s “Thomas Edison”. But </span></span><i data-dcnode-id="2141"><span data-dcnode-id="2142" style="font-weight: 400;"><span data-dcnode-id="2143" instrument_node="">anyone</span></span></i><span data-dcnode-id="2139" style="font-weight: 400;"><span data-dcnode-id="2140" instrument_node=""> can choose whatever email display name they want. Mobile email apps don’t show the full email address, leaving people vulnerable to crude “</span></span><a data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/how-to-impersonate-display-name/"><span data-dcnode-id="2137" style="font-weight: 400;"><span data-dcnode-id="2138" instrument_node="">display name impersonation</span></span></a><span data-dcnode-id="2134" style="font-weight: 400;"><span data-dcnode-id="2135" instrument_node="">” attacks.</span></span></p><span data-dcnode-id="2132" instrument_node="">
</span><p data-dcnode-id="2123"><span data-dcnode-id="2124" style="font-weight: 400;"><span data-dcnode-id="2131" instrument_node="">Cybercriminals can also set up a fake email domain impersonating your company’s real domain name. The domain is the part of the email address after the “@” sign. A cybercriminal impersonating Bill Gates, for example, might purchase a domain such as “micros</span><strong data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">0</span></strong><span data-dcnode-id="2128" instrument_node="">ft.com” or “microsoft.</span><strong data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">co</span></strong><span data-dcnode-id="2125" instrument_node="">”.&nbsp;</span></span></p><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2120" style="font-weight: 400;"><span data-dcnode-id="2121" instrument_node="">Likewise, using “freemail impersonation”, </span></span><span data-dcnode-id="2118" style="font-weight: 400;"><span data-dcnode-id="2119" instrument_node="">a less sophisticated </span></span><span data-dcnode-id="2116" style="font-weight: 400;"><span data-dcnode-id="2117" instrument_node="">attacker might simply set up an email account with any free email provider using the CEO’s name (think “</span></span><a data-dcnode-id="2113" href="mailto:bill.gates@gmail.com"><span data-dcnode-id="2114" style="font-weight: 400;"><span data-dcnode-id="2115" instrument_node="">bill.gates@gmail.com</span></span></a><span data-dcnode-id="2111" style="font-weight: 400;"><span data-dcnode-id="2112" instrument_node="">”). </span></span><span data-dcnode-id="2109" style="font-weight: 400;"><span data-dcnode-id="2110" instrument_node="">It sounds crude, but such attacks really can work</span></span><span data-dcnode-id="2107" style="font-weight: 400;"><span data-dcnode-id="2108" instrument_node="">.</span></span></p><span data-dcnode-id="2105" instrument_node="">
</span><h3 data-dcnode-id="2098"><strong data-dcnode-id="2099"><em data-dcnode-id="2100"><span data-dcnode-id="2104" instrument_node="">We explain domain impersonation in more detail – including plenty of examples – in this blog: </span><a data-dcnode-id="2102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/inside-domain-name-email-impersonation/"><span data-dcnode-id="2103" instrument_node="">Inside Email Impersonation: Why Domain Name Spoofs Could be Your Biggest Risk</span></a><span data-dcnode-id="2101" instrument_node="">.</span></em></strong></h3><span data-dcnode-id="2097" instrument_node="">
</span><h2 data-dcnode-id="2094"><span data-dcnode-id="2095" style="font-weight: 400;"><span data-dcnode-id="2096" instrument_node="">How common is CEO fraud?</span></span></h2><span data-dcnode-id="2093" instrument_node="">
</span><p data-dcnode-id="2090"><span data-dcnode-id="2091" style="font-weight: 400;"><span data-dcnode-id="2092" instrument_node="">It’s fair to say that cybercrime has gone into overdrive in recent years.</span></span></p><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2080"><a data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ic3.gov/Media/PDF/AnnualReport/2020_IC3Report.pdf"><span data-dcnode-id="2087" style="font-weight: 400;"><span data-dcnode-id="2088" instrument_node="">Data</span></span></a><span data-dcnode-id="2081" style="font-weight: 400;"><span data-dcnode-id="2085" instrument_node=""> from the FBI’s Internet Crime Complaint Center (IC3), released March 2021, shows a</span><strong data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node=""> record-breaking number of cybercrime complaints in 2020</span></strong><span data-dcnode-id="2082" instrument_node="">.</span></span></p><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2073"><span data-dcnode-id="2074" style="font-weight: 400;"><span data-dcnode-id="2078" instrument_node="">The IC3 reports a </span><strong data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">69% increase in the number of complaints since 2019</span></strong><span data-dcnode-id="2075" instrument_node="">, with reported losses exceeding $4.1 billion dollars. The main cause of cybercrime reported to the IC3 was—you guessed it—phishing.</span></span></p><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2069"><span data-dcnode-id="2070" style="font-weight: 400;"><span data-dcnode-id="2071" instrument_node="">So it’s clear that cybercrime, particularly phishing, is pervasive—and increasingly so.</span></span></p><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2060"><span data-dcnode-id="2066" style="font-weight: 400;"><span data-dcnode-id="2067" instrument_node="">But what about CEO fraud itself? CEO fraud once dominated the cybercrime landscape. However, there is some evidence that </span></span><strong data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">cybercriminals are moving away from CEO fraud</span></strong><span data-dcnode-id="2063" instrument_node=""> </span><span data-dcnode-id="2061" style="font-weight: 400;"><span data-dcnode-id="2062" instrument_node="">and towards a broader range of more sophisticated social engineering attacks.</span></span></p><span data-dcnode-id="2059" instrument_node="">
</span><p data-dcnode-id="2043"><span data-dcnode-id="2057" style="font-weight: 400;"><span data-dcnode-id="2058" instrument_node="">In 2020, the FBI </span></span><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pdf.ic3.gov/2019_IC3Report.pdf"><span data-dcnode-id="2055" style="font-weight: 400;"><span data-dcnode-id="2056" instrument_node="">noted</span></span></a><span data-dcnode-id="2052" style="font-weight: 400;"><span data-dcnode-id="2053" instrument_node=""> that while CEO fraud previously dominated BEC, cybercriminals now impersonate</span></span><span data-dcnode-id="2051" instrument_node=""> </span><strong data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">a broader range of actors,</span></strong><span data-dcnode-id="2048" instrument_node=""> </span><span data-dcnode-id="2046" style="font-weight: 400;"><span data-dcnode-id="2047" instrument_node="">including </span></span><strong data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">vendors, lawyers, and payroll departments.</span></strong></p><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2040" style="font-weight: 400;"><span data-dcnode-id="2041" instrument_node="">And a </span></span><a data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ukfinance.org.uk/system/files/Half-year-fraud-update-2021-FINAL.pdf"><span data-dcnode-id="2038" style="font-weight: 400;"><span data-dcnode-id="2039" instrument_node="">report</span></span></a><span data-dcnode-id="2032" style="font-weight: 400;"><span data-dcnode-id="2036" instrument_node=""> by UK Finance suggests that while CEO fraud is still among the main eight types of fraud attacks targeting consumers and businesses, there was a 14% percent drop in CEO fraud attacks between the first half of 2020 and the first half of 2021. (So it’s not </span><em data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">all</span></em><span data-dcnode-id="2033" instrument_node=""> doom and gloom…)</span></span></p><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2028" style="font-weight: 400;"><span data-dcnode-id="2029" instrument_node="">These days, employees don’t </span></span><i data-dcnode-id="2025"><span data-dcnode-id="2026" style="font-weight: 400;"><span data-dcnode-id="2027" instrument_node="">only</span></span></i><span data-dcnode-id="2023" style="font-weight: 400;"><span data-dcnode-id="2024" instrument_node=""> have to be wary of CEO fraud attacks. They also need to watch out for more advanced cybercrime techniques like </span></span><a data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/what-is-account-takeover/"><span data-dcnode-id="2021" style="font-weight: 400;"><span data-dcnode-id="2022" instrument_node="">Account Takeover (ATO)</span></span></a><span data-dcnode-id="2018" style="font-weight: 400;"><span data-dcnode-id="2019" instrument_node="">, </span></span><a data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/what-are-deepfakes/"><span data-dcnode-id="2016" style="font-weight: 400;"><span data-dcnode-id="2017" instrument_node="">deepfakes</span></span></a><span data-dcnode-id="2013" style="font-weight: 400;"><span data-dcnode-id="2014" instrument_node="">, and ransomware.</span></span></p><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2002"><span data-dcnode-id="2009" style="font-weight: 400;"><span data-dcnode-id="2010" instrument_node="">But </span></span><strong data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">CEO fraud is still a big deal</span></strong><span data-dcnode-id="2005" style="font-weight: 400;"><span data-dcnode-id="2006" instrument_node="">. </span></span><span data-dcnode-id="2003" style="font-weight: 400;"><span data-dcnode-id="2004" instrument_node="">And as with all other types of social engineering attacks, there’s evidence that CEO fraud attacks are becoming more sophisticated and easier for threat actors to carry out.</span></span></p><span data-dcnode-id="2001" instrument_node="">
</span><p data-dcnode-id="1995"><span data-dcnode-id="1996" style="font-weight: 400;"><span data-dcnode-id="2000" instrument_node="">For example, in March 2021, a CEO fraud “phishing kit” was </span><a data-dcnode-id="1998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ukfinance.org.uk/system/files/Half-year-fraud-update-2021-FINAL.pdf"><span data-dcnode-id="1999" instrument_node="">discovered</span></a><span data-dcnode-id="1997" instrument_node=""> that enabled cybercriminals to easily host fake Office 365 login pages in the cloud storage tool Backblaze.</span></span></p><span data-dcnode-id="1994" instrument_node="">
</span><h3 data-dcnode-id="1989"><strong data-dcnode-id="1990"><span data-dcnode-id="1993" instrument_node="">Want to know how to protect yourself and your business from CEO fraud? Read our article: </span><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/ceo-fraud-email-attacks-how-to-detect/"><span data-dcnode-id="1992" instrument_node="">How to Prevent CEO Fraud Attacks.</span></a></strong></h3><span data-dcnode-id="1988" instrument_node="">
</span></div><span data-dcnode-id="1986" instrument_node="">
</span><div class="small-12 columns nopad single-request-hold" data-dcnode-id="1970"><span data-dcnode-id="1985" instrument_node="">
</span><a data-dcnode-id="1972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tessian.com/blog/category/spear-phishing/"><span data-dcnode-id="1984" instrument_node="">
