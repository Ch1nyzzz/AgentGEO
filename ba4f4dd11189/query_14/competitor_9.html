</span><p data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">You’ve probably encountered spam email in your inbox at some point, and often it’s pretty easy to tell what’s a scam and what’s the real deal.</span></p><span data-dcnode-id="3025" instrument_node="">

</span><p data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">So here’s how to spot a scammer and what to do next.</span></p><span data-dcnode-id="3019" instrument_node="">

</span><h2 data-dcnode-id="2943" id="what-are-scam-emails"><span data-dcnode-id="2947" instrument_node="">What are scam emails?</span><button class="link-to-section" data-clipboard-text="https://www.totaljobs.com/advice/how-to-spot-scam-emails#what-are-scam-emails" data-dcnode-id="2944" title="Copy link to this subheading"><svg aria-hidden="true" data-dcnode-id="2945" height="28" role="presentation" viewBox="0 0 26 28" width="26" xmlns="http://www.w3.org/2000/svg"><path d="M22.75 19c0-.406-.156-.781-.438-1.062l-3.25-3.25A1.516 1.516 0 0 0 18 14.25c-.453 0-.812.172-1.125.5.516.516 1.125.953 1.125 1.75a1.5 1.5 0 0 1-1.5 1.5c-.797 0-1.234-.609-1.75-1.125-.328.313-.516.672-.516 1.141 0 .391.156.781.438 1.062l3.219 3.234c.281.281.672.422 1.062.422s.781-.141 1.062-.406l2.297-2.281A1.48 1.48 0 0 0 22.75 19zM11.766 7.984a1.51 1.51 0 0 0-.438-1.062L8.109 3.688c-.281-.281-.672-.438-1.062-.438s-.781.156-1.062.422L3.688 5.953a1.484 1.484 0 0 0 0 2.109l3.25 3.25A1.5 1.5 0 0 0 8 11.734c.453 0 .812-.156 1.125-.484C8.609 10.734 8 10.297 8 9.5A1.5 1.5 0 0 1 9.5 8c.797 0 1.234.609 1.75 1.125.328-.313.516-.672.516-1.141zM25.75 19a4.468 4.468 0 0 1-1.328 3.172l-2.297 2.281a4.466 4.466 0 0 1-3.172 1.297 4.44 4.44 0 0 1-3.187-1.328l-3.219-3.234a4.466 4.466 0 0 1-1.297-3.172c0-1.234.5-2.406 1.375-3.266l-1.375-1.375A4.539 4.539 0 0 1 8 14.75a4.514 4.514 0 0 1-3.187-1.313l-3.25-3.25A4.454 4.454 0 0 1 .25 7c0-1.188.484-2.344 1.328-3.172l2.297-2.281A4.466 4.466 0 0 1 7.047.25a4.44 4.44 0 0 1 3.187 1.328l3.219 3.234a4.466 4.466 0 0 1 1.297 3.172c0 1.234-.5 2.406-1.375 3.266l1.375 1.375A4.539 4.539 0 0 1 18 11.25c1.188 0 2.344.469 3.187 1.313l3.25 3.25A4.454 4.454 0 0 1 25.75 19z" data-dcnode-id="2946"></path></svg></button></h2><span data-dcnode-id="2942" instrument_node="">
</span><p data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">There are many different types of scam emails that will offer you a job that doesn’t actually exist, but two methods in particular seem to have become increasingly popular.</span></p><span data-dcnode-id="2939" instrument_node="">
</span><p data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">The first gives you information about a job and then asks you to apply if you’re interested in the role. Within minutes of sending them your CV, you’ll be offered the job…sort of. You’re then asked to spend money on extra training or asked to do a free week trial.</span></p><span data-dcnode-id="2936" instrument_node="">
</span><p data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">The second type of scam email simply offers you the job without ever seeing your CV or speaking to you.</span></p><span data-dcnode-id="2933" instrument_node="">
</span><p data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">Many scammers claim they’ve seen your CV on a recruitment website, when they actually haven’t. This is known as a phishing scam, and is used by fraudsters to access valuable personal details.</span></p><span data-dcnode-id="2930" instrument_node="">
</span><h2 data-dcnode-id="2925" id="how-can-you-tell"><span data-dcnode-id="2929" instrument_node="">How can you tell?</span><button class="link-to-section" data-clipboard-text="https://www.totaljobs.com/advice/how-to-spot-scam-emails#how-can-you-tell" data-dcnode-id="2926" title="Copy link to this subheading"><svg aria-hidden="true" data-dcnode-id="2927" height="28" role="presentation" viewBox="0 0 26 28" width="26" xmlns="http://www.w3.org/2000/svg"><path d="M22.75 19c0-.406-.156-.781-.438-1.062l-3.25-3.25A1.516 1.516 0 0 0 18 14.25c-.453 0-.812.172-1.125.5.516.516 1.125.953 1.125 1.75a1.5 1.5 0 0 1-1.5 1.5c-.797 0-1.234-.609-1.75-1.125-.328.313-.516.672-.516 1.141 0 .391.156.781.438 1.062l3.219 3.234c.281.281.672.422 1.062.422s.781-.141 1.062-.406l2.297-2.281A1.48 1.48 0 0 0 22.75 19zM11.766 7.984a1.51 1.51 0 0 0-.438-1.062L8.109 3.688c-.281-.281-.672-.438-1.062-.438s-.781.156-1.062.422L3.688 5.953a1.484 1.484 0 0 0 0 2.109l3.25 3.25A1.5 1.5 0 0 0 8 11.734c.453 0 .812-.156 1.125-.484C8.609 10.734 8 10.297 8 9.5A1.5 1.5 0 0 1 9.5 8c.797 0 1.234.609 1.75 1.125.328-.313.516-.672.516-1.141zM25.75 19a4.468 4.468 0 0 1-1.328 3.172l-2.297 2.281a4.466 4.466 0 0 1-3.172 1.297 4.44 4.44 0 0 1-3.187-1.328l-3.219-3.234a4.466 4.466 0 0 1-1.297-3.172c0-1.234.5-2.406 1.375-3.266l-1.375-1.375A4.539 4.539 0 0 1 8 14.75a4.514 4.514 0 0 1-3.187-1.313l-3.25-3.25A4.454 4.454 0 0 1 .25 7c0-1.188.484-2.344 1.328-3.172l2.297-2.281A4.466 4.466 0 0 1 7.047.25a4.44 4.44 0 0 1 3.187 1.328l3.219 3.234a4.466 4.466 0 0 1 1.297 3.172c0 1.234-.5 2.406-1.375 3.266l1.375 1.375A4.539 4.539 0 0 1 18 11.25c1.188 0 2.344.469 3.187 1.313l3.25 3.25A4.454 4.454 0 0 1 25.75 19z" data-dcnode-id="2928"></path></svg></button></h2><span data-dcnode-id="2924" instrument_node="">
</span><p data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">Some scam emails can be very convincing, (especially if they address you personally), but there are a few things to be on the look-out for.</span></p><span data-dcnode-id="2921" instrument_node="">
</span><h2 data-dcnode-id="2916" id="asks-for-personal-details"><span data-dcnode-id="2920" instrument_node="">Asks for personal details</span><button class="link-to-section" data-clipboard-text="https://www.totaljobs.com/advice/how-to-spot-scam-emails#asks-for-personal-details" data-dcnode-id="2917" title="Copy link to this subheading"><svg aria-hidden="true" data-dcnode-id="2918" height="28" role="presentation" viewBox="0 0 26 28" width="26" xmlns="http://www.w3.org/2000/svg"><path d="M22.75 19c0-.406-.156-.781-.438-1.062l-3.25-3.25A1.516 1.516 0 0 0 18 14.25c-.453 0-.812.172-1.125.5.516.516 1.125.953 1.125 1.75a1.5 1.5 0 0 1-1.5 1.5c-.797 0-1.234-.609-1.75-1.125-.328.313-.516.672-.516 1.141 0 .391.156.781.438 1.062l3.219 3.234c.281.281.672.422 1.062.422s.781-.141 1.062-.406l2.297-2.281A1.48 1.48 0 0 0 22.75 19zM11.766 7.984a1.51 1.51 0 0 0-.438-1.062L8.109 3.688c-.281-.281-.672-.438-1.062-.438s-.781.156-1.062.422L3.688 5.953a1.484 1.484 0 0 0 0 2.109l3.25 3.25A1.5 1.5 0 0 0 8 11.734c.453 0 .812-.156 1.125-.484C8.609 10.734 8 10.297 8 9.5A1.5 1.5 0 0 1 9.5 8c.797 0 1.234.609 1.75 1.125.328-.313.516-.672.516-1.141zM25.75 19a4.468 4.468 0 0 1-1.328 3.172l-2.297 2.281a4.466 4.466 0 0 1-3.172 1.297 4.44 4.44 0 0 1-3.187-1.328l-3.219-3.234a4.466 4.466 0 0 1-1.297-3.172c0-1.234.5-2.406 1.375-3.266l-1.375-1.375A4.539 4.539 0 0 1 8 14.75a4.514 4.514 0 0 1-3.187-1.313l-3.25-3.25A4.454 4.454 0 0 1 .25 7c0-1.188.484-2.344 1.328-3.172l2.297-2.281A4.466 4.466 0 0 1 7.047.25a4.44 4.44 0 0 1 3.187 1.328l3.219 3.234a4.466 4.466 0 0 1 1.297 3.172c0 1.234-.5 2.406-1.375 3.266l1.375 1.375A4.539 4.539 0 0 1 18 11.25c1.188 0 2.344.469 3.187 1.313l3.25 3.25A4.454 4.454 0 0 1 25.75 19z" data-dcnode-id="2919"></path></svg></button></h2><span data-dcnode-id="2915" instrument_node="">
</span><p data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">The first thing that should send off warning signs is if the email asks for personal details, especially if they ask for information that you’d never put on your CV.</span></p><span data-dcnode-id="2912" instrument_node="">
</span><p data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">This includes asking for your date of birth, bank details or a copy of your passport to prove your ID. This information could be used for fraudulent activity and genuine employers won’t need any of these details until a formal job offer has been made and a contract signed.</span></p><span data-dcnode-id="2909" instrument_node="">
</span><h2 data-dcnode-id="2904" id="bad-grammar"><span data-dcnode-id="2908" instrument_node="">Bad grammar</span><button class="link-to-section" data-clipboard-text="https://www.totaljobs.com/advice/how-to-spot-scam-emails#bad-grammar" data-dcnode-id="2905" title="Copy link to this subheading"><svg aria-hidden="true" data-dcnode-id="2906" height="28" role="presentation" viewBox="0 0 26 28" width="26" xmlns="http://www.w3.org/2000/svg"><path d="M22.75 19c0-.406-.156-.781-.438-1.062l-3.25-3.25A1.516 1.516 0 0 0 18 14.25c-.453 0-.812.172-1.125.5.516.516 1.125.953 1.125 1.75a1.5 1.5 0 0 1-1.5 1.5c-.797 0-1.234-.609-1.75-1.125-.328.313-.516.672-.516 1.141 0 .391.156.781.438 1.062l3.219 3.234c.281.281.672.422 1.062.422s.781-.141 1.062-.406l2.297-2.281A1.48 1.48 0 0 0 22.75 19zM11.766 7.984a1.51 1.51 0 0 0-.438-1.062L8.109 3.688c-.281-.281-.672-.438-1.062-.438s-.781.156-1.062.422L3.688 5.953a1.484 1.484 0 0 0 0 2.109l3.25 3.25A1.5 1.5 0 0 0 8 11.734c.453 0 .812-.156 1.125-.484C8.609 10.734 8 10.297 8 9.5A1.5 1.5 0 0 1 9.5 8c.797 0 1.234.609 1.75 1.125.328-.313.516-.672.516-1.141zM25.75 19a4.468 4.468 0 0 1-1.328 3.172l-2.297 2.281a4.466 4.466 0 0 1-3.172 1.297 4.44 4.44 0 0 1-3.187-1.328l-3.219-3.234a4.466 4.466 0 0 1-1.297-3.172c0-1.234.5-2.406 1.375-3.266l-1.375-1.375A4.539 4.539 0 0 1 8 14.75a4.514 4.514 0 0 1-3.187-1.313l-3.25-3.25A4.454 4.454 0 0 1 .25 7c0-1.188.484-2.344 1.328-3.172l2.297-2.281A4.466 4.466 0 0 1 7.047.25a4.44 4.44 0 0 1 3.187 1.328l3.219 3.234a4.466 4.466 0 0 1 1.297 3.172c0 1.234-.5 2.406-1.375 3.266l1.375 1.375A4.539 4.539 0 0 1 18 11.25c1.188 0 2.344.469 3.187 1.313l3.25 3.25A4.454 4.454 0 0 1 25.75 19z" data-dcnode-id="2907"></path></svg></button></h2><span data-dcnode-id="2903" instrument_node="">
</span><p data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">Scam emails are often badly written, full of spelling mistakes, use basic words and generally seem disjointed when you read them.</span></p><span data-dcnode-id="2900" instrument_node="">
</span><p data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">Also, the job description doesn’t always make sense. Often trying to dazzle you with words that suggest a senior position, your actual job title might sound either meaningless or look completely made up. Scam jobs ads also tend to put whole sentences in capital letters and use a lot of exclamation marks.</span></p><span data-dcnode-id="2897" instrument_node="">
</span><h2 data-dcnode-id="2892" id="doesnt-care-about-your-skills"><span data-dcnode-id="2896" instrument_node="">Doesn’t care about your skills</span><button class="link-to-section" data-clipboard-text="https://www.totaljobs.com/advice/how-to-spot-scam-emails#doesnt-care-about-your-skills" data-dcnode-id="2893" title="Copy link to this subheading"><svg aria-hidden="true" data-dcnode-id="2894" height="28" role="presentation" viewBox="0 0 26 28" width="26" xmlns="http://www.w3.org/2000/svg"><path d="M22.75 19c0-.406-.156-.781-.438-1.062l-3.25-3.25A1.516 1.516 0 0 0 18 14.25c-.453 0-.812.172-1.125.5.516.516 1.125.953 1.125 1.75a1.5 1.5 0 0 1-1.5 1.5c-.797 0-1.234-.609-1.75-1.125-.328.313-.516.672-.516 1.141 0 .391.156.781.438 1.062l3.219 3.234c.281.281.672.422 1.062.422s.781-.141 1.062-.406l2.297-2.281A1.48 1.48 0 0 0 22.75 19zM11.766 7.984a1.51 1.51 0 0 0-.438-1.062L8.109 3.688c-.281-.281-.672-.438-1.062-.438s-.781.156-1.062.422L3.688 5.953a1.484 1.484 0 0 0 0 2.109l3.25 3.25A1.5 1.5 0 0 0 8 11.734c.453 0 .812-.156 1.125-.484C8.609 10.734 8 10.297 8 9.5A1.5 1.5 0 0 1 9.5 8c.797 0 1.234.609 1.75 1.125.328-.313.516-.672.516-1.141zM25.75 19a4.468 4.468 0 0 1-1.328 3.172l-2.297 2.281a4.466 4.466 0 0 1-3.172 1.297 4.44 4.44 0 0 1-3.187-1.328l-3.219-3.234a4.466 4.466 0 0 1-1.297-3.172c0-1.234.5-2.406 1.375-3.266l-1.375-1.375A4.539 4.539 0 0 1 8 14.75a4.514 4.514 0 0 1-3.187-1.313l-3.25-3.25A4.454 4.454 0 0 1 .25 7c0-1.188.484-2.344 1.328-3.172l2.297-2.281A4.466 4.466 0 0 1 7.047.25a4.44 4.44 0 0 1 3.187 1.328l3.219 3.234a4.466 4.466 0 0 1 1.297 3.172c0 1.234-.5 2.406-1.375 3.266l1.375 1.375A4.539 4.539 0 0 1 18 11.25c1.188 0 2.344.469 3.187 1.313l3.25 3.25A4.454 4.454 0 0 1 25.75 19z" data-dcnode-id="2895"></path></svg></button></h2><span data-dcnode-id="2891" instrument_node="">
</span><p data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">Scam job offers may give a lot of detail about the role, but they’ll give very little detail about what they’re looking for in a candidate.</span></p><span data-dcnode-id="2888" instrument_node="">
</span><p data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">Look at any genuine job ad, and you’ll see that even if the role doesn’t require any qualifications or work experience, the employer will state the skill set and attitude they’re looking for in an employee.</span></p><span data-dcnode-id="2885" instrument_node="">
</span><p data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">Scam ads won’t do this, as the more specific they are, the less people are likely to apply. So even when they’re advertising for senior management jobs, scam ads won’t ask for any qualifications or previous experience.</span></p><span data-dcnode-id="2882" instrument_node="">
</span><h2 data-dcnode-id="2877" id="instant-job-offer"><span data-dcnode-id="2881" instrument_node="">Instant job offer</span><button class="link-to-section" data-clipboard-text="https://www.totaljobs.com/advice/how-to-spot-scam-emails#instant-job-offer" data-dcnode-id="2878" title="Copy link to this subheading"><svg aria-hidden="true" data-dcnode-id="2879" height="28" role="presentation" viewBox="0 0 26 28" width="26" xmlns="http://www.w3.org/2000/svg"><path d="M22.75 19c0-.406-.156-.781-.438-1.062l-3.25-3.25A1.516 1.516 0 0 0 18 14.25c-.453 0-.812.172-1.125.5.516.516 1.125.953 1.125 1.75a1.5 1.5 0 0 1-1.5 1.5c-.797 0-1.234-.609-1.75-1.125-.328.313-.516.672-.516 1.141 0 .391.156.781.438 1.062l3.219 3.234c.281.281.672.422 1.062.422s.781-.141 1.062-.406l2.297-2.281A1.48 1.48 0 0 0 22.75 19zM11.766 7.984a1.51 1.51 0 0 0-.438-1.062L8.109 3.688c-.281-.281-.672-.438-1.062-.438s-.781.156-1.062.422L3.688 5.953a1.484 1.484 0 0 0 0 2.109l3.25 3.25A1.5 1.5 0 0 0 8 11.734c.453 0 .812-.156 1.125-.484C8.609 10.734 8 10.297 8 9.5A1.5 1.5 0 0 1 9.5 8c.797 0 1.234.609 1.75 1.125.328-.313.516-.672.516-1.141zM25.75 19a4.468 4.468 0 0 1-1.328 3.172l-2.297 2.281a4.466 4.466 0 0 1-3.172 1.297 4.44 4.44 0 0 1-3.187-1.328l-3.219-3.234a4.466 4.466 0 0 1-1.297-3.172c0-1.234.5-2.406 1.375-3.266l-1.375-1.375A4.539 4.539 0 0 1 8 14.75a4.514 4.514 0 0 1-3.187-1.313l-3.25-3.25A4.454 4.454 0 0 1 .25 7c0-1.188.484-2.344 1.328-3.172l2.297-2.281A4.466 4.466 0 0 1 7.047.25a4.44 4.44 0 0 1 3.187 1.328l3.219 3.234a4.466 4.466 0 0 1 1.297 3.172c0 1.234-.5 2.406-1.375 3.266l1.375 1.375A4.539 4.539 0 0 1 18 11.25c1.188 0 2.344.469 3.187 1.313l3.25 3.25A4.454 4.454 0 0 1 25.75 19z" data-dcnode-id="2880"></path></svg></button></h2><span data-dcnode-id="2876" instrument_node="">
</span><p data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">When you send your CV to an employer, you expect to wait a few days, maybe even a few weeks, until the deadline for applications is closed. And even after that, you can be waiting awhile as the employer filters through CVs and picks a select few to interview.</span></p><span data-dcnode-id="2873" instrument_node="">
</span><p data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">Scam ads won’t make you wait at all, and within minutes of sending them your CV you’ve got the job. We know you want to hear back from employers, but if they get back to you that quickly, they’re undoubtedly scammers.</span></p><span data-dcnode-id="2870" instrument_node="">
</span><p data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">If in doubt, search for the company on the internet, you’ll soon find out if they actually exist. Some scammers might even have built up a bad reputation for themselves, so people might have blogged about them or set up online forums to warn other people.</span></p><span data-dcnode-id="2867" instrument_node="">
</span><p data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">Remember, if it sounds too good to be true, it probably is.</span></p><span data-dcnode-id="2864" instrument_node="">
</span><h2 data-dcnode-id="2859" id="what-should-you-do-next"><span data-dcnode-id="2863" instrument_node="">What should you do next?</span><button class="link-to-section" data-clipboard-text="https://www.totaljobs.com/advice/how-to-spot-scam-emails#what-should-you-do-next" data-dcnode-id="2860" title="Copy link to this subheading"><svg aria-hidden="true" data-dcnode-id="2861" height="28" role="presentation" viewBox="0 0 26 28" width="26" xmlns="http://www.w3.org/2000/svg"><path d="M22.75 19c0-.406-.156-.781-.438-1.062l-3.25-3.25A1.516 1.516 0 0 0 18 14.25c-.453 0-.812.172-1.125.5.516.516 1.125.953 1.125 1.75a1.5 1.5 0 0 1-1.5 1.5c-.797 0-1.234-.609-1.75-1.125-.328.313-.516.672-.516 1.141 0 .391.156.781.438 1.062l3.219 3.234c.281.281.672.422 1.062.422s.781-.141 1.062-.406l2.297-2.281A1.48 1.48 0 0 0 22.75 19zM11.766 7.984a1.51 1.51 0 0 0-.438-1.062L8.109 3.688c-.281-.281-.672-.438-1.062-.438s-.781.156-1.062.422L3.688 5.953a1.484 1.484 0 0 0 0 2.109l3.25 3.25A1.5 1.5 0 0 0 8 11.734c.453 0 .812-.156 1.125-.484C8.609 10.734 8 10.297 8 9.5A1.5 1.5 0 0 1 9.5 8c.797 0 1.234.609 1.75 1.125.328-.313.516-.672.516-1.141zM25.75 19a4.468 4.468 0 0 1-1.328 3.172l-2.297 2.281a4.466 4.466 0 0 1-3.172 1.297 4.44 4.44 0 0 1-3.187-1.328l-3.219-3.234a4.466 4.466 0 0 1-1.297-3.172c0-1.234.5-2.406 1.375-3.266l-1.375-1.375A4.539 4.539 0 0 1 8 14.75a4.514 4.514 0 0 1-3.187-1.313l-3.25-3.25A4.454 4.454 0 0 1 .25 7c0-1.188.484-2.344 1.328-3.172l2.297-2.281A4.466 4.466 0 0 1 7.047.25a4.44 4.44 0 0 1 3.187 1.328l3.219 3.234a4.466 4.466 0 0 1 1.297 3.172c0 1.234-.5 2.406-1.375 3.266l1.375 1.375A4.539 4.539 0 0 1 18 11.25c1.188 0 2.344.469 3.187 1.313l3.25 3.25A4.454 4.454 0 0 1 25.75 19z" data-dcnode-id="2862"></path></svg></button></h2><span data-dcnode-id="2858" instrument_node="">
</span><p data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">Forward the email you received to the fraud department of the email provider hosting the scammers email address, and request that the account be closed (i.e.)</span></p><span data-dcnode-id="2855" instrument_node="">
</span><p data-dcnode-id="2851"><span data-dcnode-id="2854" instrument_node="">Yahoo (Ymail etc.): </span><a data-dcnode-id="2852" href="mailto:mail-abuse@cc.yahoo-inc.com"><span data-dcnode-id="2853" instrument_node="">mail-abuse@cc.yahoo-inc.com</span></a></p><span data-dcnode-id="2850" instrument_node="">
</span><p data-dcnode-id="2846"><span data-dcnode-id="2849" instrument_node="">Google mail (Gmail etc.): </span><a data-dcnode-id="2847" href="mailto:abuse@googlemail.com"><span data-dcnode-id="2848" instrument_node="">abuse@googlemail.com</span></a></p><span data-dcnode-id="2845" instrument_node="">
</span><p data-dcnode-id="2841"><span data-dcnode-id="2844" instrument_node="">Hotmail (Live mail etc.): </span><a data-dcnode-id="2842" href="mailto:report_spam@hotmail.com"><span data-dcnode-id="2843" instrument_node="">report_spam@hotmail.com</span></a></p><span data-dcnode-id="2840" instrument_node="">
</span><p data-dcnode-id="2835"><span data-dcnode-id="2839" instrument_node="">If you have already disclosed your bank details or received funds into your account you should contact your bank immediately. Help and advice for preventing all types of banking fraud is available at </span><a data-dcnode-id="2837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.banksafeonline.org.uk/"><span data-dcnode-id="2838" instrument_node="">www.banksafeonline.org.uk</span></a><span data-dcnode-id="2836" instrument_node="">.</span></p><span data-dcnode-id="2834" instrument_node="">
</span><p data-dcnode-id="2829"><span data-dcnode-id="2833" instrument_node="">If you would like to speak to someone about this you can also call Action Fraud on 03001232040 or you can </span><a data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.actionfraud.org.uk/"><span data-dcnode-id="2832" instrument_node="">visit their website</span></a><span data-dcnode-id="2830" instrument_node="">. Action fraud can give you advice on issues about fraud, both prevention and what to do if you have been a victim of it.</span></p><span data-dcnode-id="2828" instrument_node="">
</span><h2 data-dcnode-id="2823" id="what-if-they-say-theyve-used-totaljobs"><span data-dcnode-id="2827" instrument_node="">What if they say they’ve used Totaljobs?</span><button class="link-to-section" data-clipboard-text="https://www.totaljobs.com/advice/how-to-spot-scam-emails#what-if-they-say-theyve-used-totaljobs" data-dcnode-id="2824" title="Copy link to this subheading"><svg aria-hidden="true" data-dcnode-id="2825" height="28" role="presentation" viewBox="0 0 26 28" width="26" xmlns="http://www.w3.org/2000/svg"><path d="M22.75 19c0-.406-.156-.781-.438-1.062l-3.25-3.25A1.516 1.516 0 0 0 18 14.25c-.453 0-.812.172-1.125.5.516.516 1.125.953 1.125 1.75a1.5 1.5 0 0 1-1.5 1.5c-.797 0-1.234-.609-1.75-1.125-.328.313-.516.672-.516 1.141 0 .391.156.781.438 1.062l3.219 3.234c.281.281.672.422 1.062.422s.781-.141 1.062-.406l2.297-2.281A1.48 1.48 0 0 0 22.75 19zM11.766 7.984a1.51 1.51 0 0 0-.438-1.062L8.109 3.688c-.281-.281-.672-.438-1.062-.438s-.781.156-1.062.422L3.688 5.953a1.484 1.484 0 0 0 0 2.109l3.25 3.25A1.5 1.5 0 0 0 8 11.734c.453 0 .812-.156 1.125-.484C8.609 10.734 8 10.297 8 9.5A1.5 1.5 0 0 1 9.5 8c.797 0 1.234.609 1.75 1.125.328-.313.516-.672.516-1.141zM25.75 19a4.468 4.468 0 0 1-1.328 3.172l-2.297 2.281a4.466 4.466 0 0 1-3.172 1.297 4.44 4.44 0 0 1-3.187-1.328l-3.219-3.234a4.466 4.466 0 0 1-1.297-3.172c0-1.234.5-2.406 1.375-3.266l-1.375-1.375A4.539 4.539 0 0 1 8 14.75a4.514 4.514 0 0 1-3.187-1.313l-3.25-3.25A4.454 4.454 0 0 1 .25 7c0-1.188.484-2.344 1.328-3.172l2.297-2.281A4.466 4.466 0 0 1 7.047.25a4.44 4.44 0 0 1 3.187 1.328l3.219 3.234a4.466 4.466 0 0 1 1.297 3.172c0 1.234-.5 2.406-1.375 3.266l1.375 1.375A4.539 4.539 0 0 1 18 11.25c1.188 0 2.344.469 3.187 1.313l3.25 3.25A4.454 4.454 0 0 1 25.75 19z" data-dcnode-id="2826"></path></svg></button></h2><span data-dcnode-id="2822" instrument_node="">
</span><p data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">Some of you have told us you’ve received a scam email from a recruiter claiming they’ve seen your CV and got your contact details from our site. This has affected several other job sites as well and it has even affected people who have never visited our site.</span></p><span data-dcnode-id="2819" instrument_node="">
</span><p data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">We have a team that verifies all our employers and jobs and we do not allow access to our CV database unless these vetting procedures have been passed. Be assured that these scammers haven’t had access to your CV and are falsely making claims like this in order to seem like a genuine job offer.</span></p><span data-dcnode-id="2816" instrument_node="">
</span><p data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">If this has happened to you and you’re still concerned or need any further support you can contact the Totaljobs Group Customer Service Team on 0333 0145 111.</span></p><span data-dcnode-id="2813" instrument_node="">
</span><p data-dcnode-id="2808"><span data-dcnode-id="2812" instrument_node="">Totaljobs Group is also a founding member of the Recruitment Industry Counter-Fraud Forum, known as </span><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.safer-jobs.com/"><span data-dcnode-id="2811" instrument_node="">SAFER</span></a><span data-dcnode-id="2809" instrument_node=""> (Safe Advice for Employment and Recruitment). Established by the Metropolitan Police, SAFER is concerned with raising awareness and combating criminal and fraudulent activities within the recruitment and HR industry.</span></p><span data-dcnode-id="2807" instrument_node="">
</span><p data-dcnode-id="2805"><img alt="" class="aligncenter size-medium wp-image-9396" data-dcnode-id="2806" height="149" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.totaljobs.com/advice/wp-content/uploads/SaferJobLogo-300x149.jpg&amp;raw" srcset="https://www.totaljobs.com/advice/wp-content/uploads/SaferJobLogo-300x149.jpg 300w, https://www.totaljobs.com/advice/wp-content/uploads/SaferJobLogo-768x382.jpg 768w, https://www.totaljobs.com/advice/wp-content/uploads/SaferJobLogo-1024x509.jpg 1024w, https://www.totaljobs.com/advice/wp-content/uploads/SaferJobLogo-960x478.jpg 960w, https://www.totaljobs.com/advice/wp-content/uploads/SaferJobLogo.jpg 1186w" width="300"></p><span data-dcnode-id="2804" instrument_node="">
