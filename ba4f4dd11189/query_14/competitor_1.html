ass="entry-date published" data-dcnode-id="668" datetime="2017-10-13T14:12:01Z"><span data-dcnode-id="669" instrument_node="">October 13, 2017</span></time><time class="entry-date updated sr-only" data-dcnode-id="666" datetime="2019-06-25T13:00:58Z"><span data-dcnode-id="667" instrument_node="">June 25, 2019</span></time></span><span data-dcnode-id="664" instrument_node="">
</span><em data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">by </span></em><span class="vcard author author_name" data-dcnode-id="659"><span class="fn" data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Erik Fullmer</span></span></span></div><div class="entry-content" data-dcnode-id="522"><div class="textbox-body" data-dcnode-id="523"><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Are you familiar with an “open door” policy? This idea is standard practice at many businesses, but others denounce it entirely. Those that adhere to the policy believe it increases communication—which is a pillar of a successful organization. However, others believe that it is more of an interruption and inconvenience that can have costly consequences.</span></p><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Interestingly enough, the internet is very much like an open door policy. It increases communication and productivity—whether you use it to pay bills or work online—but it also increases crime. The web is an open door that allows access in both directions. It’s offers several benefits, but it also makes you very vulnerable.</span></p><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">To use the internet for its benefits and avoid its disadvantages, you need to understand how to protect yourself. At any given time, a criminal can reach into your private life through your computer, but you don’t have to give them the chance. Below, you’ll learn how you can recognize and protect yourself from online scams.</span></p><p data-dcnode-id="647"><span data-dcnode-id="651" instrument_node="">After reading, consider if you are a good candidate for a membership with </span><a aria-label="HelpCloud Tech Support (opens in a new tab)" data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.helpcloud.com/insight/helpcloud-tech-support-membership-explained/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="650" instrument_node="">HelpCloud Tech Support</span></a><span data-dcnode-id="648" instrument_node="">. The membership not only provides the best in identity theft protection and restoration, it also includes 24/7 support and US based experts you can speak with if you have concerns that you’ve been scammed.</span></p><h2 data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Online Scam Overview</span></h2><p data-dcnode-id="640"><span data-dcnode-id="644" instrument_node="">An online scam—also known as </span><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fbi.gov/scams-and-safety/common-fraud-schemes/internet-fraud"><span data-dcnode-id="643" instrument_node="">internet fraud</span></a><span data-dcnode-id="641" instrument_node=""> —is when a criminal uses the web to take advantage of another user. These crimes can be difficult to identify, especially because they come in many forms. The main connection between every online fraud is the end goal. The attacker is looking for financial information and/or personal information that they can take advantage of.</span></p><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Personal information is highly sought after because it can be used maliciously. A fraudster might steal your identity to commit or aid unlawful activity. Someone that steals your financial information is likely looking for money. However, these people may also use or sell the information they gather, which can lead to identity theft.</span></p><hr class="wp-block-separator" data-dcnode-id="637"><div class="wp-block-image size-full wp-image-14834" data-dcnode-id="631"><figure class="aligncenter" data-dcnode-id="632"><img alt="A screenshot of a phishing scam where criminals attempt to get your personal financial information" class="wp-image-14834" data-dcnode-id="636" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//helpcloud-4b43.kxcdn.com/wp-content/uploads/online-identity-theft-1.png&amp;raw"><figcaption data-dcnode-id="633"><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thumbnails-visually.netdna-ssl.com/online-fraud-the-problem-and-how-to-tackle-it_53b1395c4b303_w1500.jpg"><span data-dcnode-id="635" instrument_node="">Visually</span></a></figcaption></figure></div><hr class="wp-block-separator" data-dcnode-id="630"><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">For example, if a person sends you an email asking for your bank account information, they’ve committed financial fraud. They might turn around create other bank accounts or apply for a loan in your name, which is identify theft.</span></p><h2 data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Risk Groups</span></h2><p data-dcnode-id="621"><span data-dcnode-id="625" instrument_node="">Every internet user is at risk for online fraud—but some groups are at more of a risk than others. According to </span><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.today.com/money/why-some-us-are-more-vulnerable-online-fraud-2D79321732"><span data-dcnode-id="624" instrument_node="">AARP</span></a><span data-dcnode-id="622" instrument_node=""> , the main things that dictate someone’s vulnerability to fraud are their online behaviors and their life experiences.</span></p><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">If you click on pop-ups, open email from unknown senders or sign up for free trials, you’re more vulnerable. Hackers and criminals often want you to give them your personal information, like your routing number, or they want you to download a link that will infect your computer with a virus. The three behaviors above are common ways criminals try to carry out these criminal acts.</span></p><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">As far as life experiences go, people that are experiencing a negative event are often more vulnerable to fraud. When you are distraught, your ability to defend yourself online decreases. Individuals that feel isolated, have recently lost a job or are experiencing any negative life change should be especially aware of their online behaviors.</span></p><hr class="wp-block-separator" data-dcnode-id="616"><div class="wp-block-image size-full wp-image-14836" data-dcnode-id="610"><figure class="aligncenter" data-dcnode-id="611"><img alt="Infographic: If you suspect a fraud, don't connect!" class="wp-image-14836" data-dcnode-id="615" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//helpcloud-4b43.kxcdn.com/wp-content/uploads/online-scams-do-not-connect-2.jpg&amp;raw"><figcaption data-dcnode-id="612"><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/CbzWZWmOrMU/maxresdefault.jpg"><span data-dcnode-id="614" instrument_node="">YouTube</span></a></figcaption></figure></div><hr class="wp-block-separator" data-dcnode-id="609"><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">HelpCloud suggests these users follow a simple piece of advice: “If it sounds too good to be true, it probably is.” Don’t click on links or respond to emails that include out-of-this-world offers or deals.</span></p><h2 data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Common Types of Scams</span></h2><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Although fraudsters come up with new schemes every day, they have a few tried-and-true techniques that they often employ. One of the most common is a phishing email. If you receive an email that appears to be from your bank or an online website, you should immediately be suspicious.</span></p><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">These links can make it seem as though you’re just logging into your real account, but you’re often adding your information to a list that’s sent to scammers. Inputting your information on one of these fake sites can give a criminal the information they need to steal your identity or falsely charge things to your bank account.</span></p><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">So, if you ever receive an email that asks for your personal information, wait a moment. The best practice is to call the company that the information is supposedly from and have them confirm the validity of the email. They should tell you right then and there if the communication is legitimate.</span></p><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Advanced Fee Fraud, originally known as Nigerian 419 scam, has been around since 1843. It used to be carried out over fax machines and snail mail, but now they’re commonly found on the internet.</span></p><hr class="wp-block-separator" data-dcnode-id="596"><div class="wp-block-image size-full wp-image-14833" data-dcnode-id="590"><figure class="aligncenter" data-dcnode-id="591"><img alt="An infographic about online fraud awareness and the Nigerian Prince Scam" class="wp-image-14833" data-dcnode-id="595" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//helpcloud-4b43.kxcdn.com/wp-content/uploads/online-fraud-awareness-3.jpg&amp;raw"><figcaption data-dcnode-id="592"><a data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/fraudawareness201701-170424160435/95/fraud-awareness-12-638.jpg%3Fcb%3D1493088228"><span data-dcnode-id="594" instrument_node="">Fraud Awareness 12</span></a></figcaption></figure></div><hr class="wp-block-separator" data-dcnode-id="589"><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Scammers will connect with you online and tell you an elaborate fake story. Generally, they will say that they need help transferring a large amount of money out of their country. They will ask for your bank account details so they can transfer the money to you. However, they won’t send you any money. In fact, they’ll use the information you provide to steal the funds out of your account.</span></p><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Link scams are also very common. A criminal will send you some type of communication that includes a link. They have many ways to disguise the malicious link. For example, they might send you an email that’s disguised as an online greeting card from a friend or family member. When you click on the link, a harmful software will download onto your computer. The hacker can then gather your personal and financial information for unlawful activities.</span></p><h2 data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Identifying an Online Scam</span></h2><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">The first step to protecting yourself against online scams is awareness. Once you know what online scams are, who is at risk and the common types, you’ll be one step closer to protecting your personal information.</span></p><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">As mentioned above, you should also call a company to validate potentially risky communications you receive. When you do, it’s best to pull the number from a source like Google—not the suspect piece of writing.</span></p><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">You can also type in “[Company Name] Scam” into your preferred search engine. The results will give you an up-to-date understanding of what’s happening with the company. They should also tell you if other people are experiencing issues with the same scam.</span></p><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">A major red flag is any conversation about money. If you read about a lottery, prize, sweepstakes or your bank account, approach with caution. Unfortunately, it’s not very common to randomly win money online. More often than not, these communications are a scam. Also look out for “phantom riches.” These scams guarantee a certain return if you invest a particular amount.</span></p><hr class="wp-block-separator" data-dcnode-id="574"><div class="wp-block-image size-full wp-image-14837" data-dcnode-id="568"><figure class="aligncenter" data-dcnode-id="569"><img alt="An infographic about Tips and Warning signs of online scams" class="wp-image-14837" data-dcnode-id="573" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//helpcloud-4b43.kxcdn.com/wp-content/uploads/online-scams-warning-signs-4.png&amp;raw"><figcaption data-dcnode-id="570"><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//support.rsvp.com.au/hc/en-gb/article_attachments/201693400/warning_signs.PNG"><span data-dcnode-id="572" instrument_node="">RSVP</span></a></figcaption></figure></div><hr class="wp-block-separator" data-dcnode-id="567"><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Look for messages that put pressure onto the reader, too. Phrases like “everyone is doing it” or “almost sold out” are sales pitches that are closely related to scams. Lastly, always read the “terms and conditions” before you accept or sign anything. A lot of scammers neglect to add this component to their content. If they can be found, make sure they’re reasonable. Then, call the company directly to ensure that you understand them correctly.</span></p><h2 data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">An Up-and-Coming Scam</span></h2><p data-dcnode-id="558"><span data-dcnode-id="562" instrument_node="">Online scams plague many aspects of the internet—especially online dating. </span><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eharmony.com/online-dating-statistics/"><span data-dcnode-id="561" instrument_node="">Millions of Americans use online dating websites every year</span></a><span data-dcnode-id="559" instrument_node="">, and so do criminals. These people look for victims and then build a relationship with them. They often target individuals that are divorced, widowed or disabled.</span></p><hr class="wp-block-separator" data-dcnode-id="557"><div class="wp-block-image size-full wp-image-14835" data-dcnode-id="551"><figure class="aligncenter" data-dcnode-id="552"><img alt="An inforgraphic about online romance scams" class="wp-image-14835" data-dcnode-id="556" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//helpcloud-4b43.kxcdn.com/wp-content/uploads/online-scams-and-frauds-5.jpg&amp;raw"><figcaption data-dcnode-id="553"><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/onlinescamsfrauds-150408064645-conversion-gate01/95/online-scams-and-frauds-24-638.jpg%3Fcb%3D1428479429"><span data-dcnode-id="555" instrument_node="">Slideshare</span></a></figcaption></figure></div><hr class="wp-block-separator" data-dcnode-id="550"><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">They will contact you and show interest you. They may even send you flowers or gifts as your bond grows. When you have a relationship formed, the scammer will ask for money. These criminals will cater to your interests and needs to take money from you.</span></p><h2 data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Reporting Your Findings</span></h2><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Anytime you run across internet-related crime, you should report your findings to government authorities. In general, there are four parties you can contact. The Internet Crime Complaint Center handles international, federal, state and local internet complaints. The Federal Trade Commission can’t resolve individual complaints, but they can give you information on the next steps to take. They can also help you understand current online scams.</span></p><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Econsumer.gov specializes in handling complaints about online transactions with foreign companies. Lastly, the Department of Justice can help you if you’ve experienced internet-related intellectual property crime.</span></p><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">All of these agencies are unrelated to your bank. If you notice unauthorized charges or believe your information is at risk, you will need to contact your bank directly so they can help protect you as much as possible.</span></p><p data-dcnode-id="535"><span data-dcnode-id="539" instrument_node="">Another resource that’s open for all consumers is the </span><a data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbb.org/scamtracker/north-east-florida/ReportScam"><span data-dcnode-id="538" instrument_node="">Better Business Bureau’s (BBB) Scam Tracker</span></a><span data-dcnode-id="536" instrument_node="">. On the tracker’s website, you can tell the BBB about any business or offer you run into that sounds like a scam. After you submit a few pieces of information about the scam, they will investigate it and warn others if it turns out to be fraudulent.</span></p><h2 data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">A Critical Component to Online Safety</span></h2><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Open door policies aren’t good or bad, but they do have advantages and disadvantages. Similarly, the internet isn’t always good or bad, but it does have its pros and cons. To experience more of the pros the web has to offer, you need to know how to spot an online scam. If you follow the advice above, you’ll be well on your way to a healthy and positive relationship with the internet.</span></p><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Always look out for scamming content, and limit the amount of personal information you freely give away. It’s easy to overshare information and post too many photos on social platforms. You want your network to be informed, but you absolutely don’t want to give them too much information. If you do, you’ll put yourself at risk for a range of issues—from online theft to cyberstalking.</span></p><p data-dcnode-id="524"><span data-dcnode-id="528" instrument_node="">For more information about online scams and how you can protect yourself, reach out to </span><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.helpcloud.com/blog/how-to-spot-online-scams-and-frauds"><span data-dcnode-id="527" instrument_node="">HelpCloud Tech Support</span></a><span data-dcnode-id="525" instrument_node=""> directly.</span></p></div></div><footer class="entry-footer my-5" data-dcnode-id="460"><div class="cat-tags-links" data-dcnode-id="461"><div class="cat-links" data-dcnode-id="516"><span class="sr-only" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Categories:&nbsp;</span></span><span data-dcnode-id="519" instrument_node="">

ered in his articles. He has always held an affinity for the world wide web and its workings, development, history and future.</span></p><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Being a key player in the development of, and Director of Marketing for HelpCloud, he takes the content displayed and utilized on HelpCloud extremely seriously.</span></p></div><p class="author-url text-white" data-dcnode-id="442"><a class="author-posts-link text-option40" data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.helpcloud.com/author/erik" itemprop="url"><span data-dcnode-id="444" instrument_node="">View posts</span></a></p><a class="d-inline-block mr-2 author-social-link text-white" data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.linkedin.com/in/eriktfullmer" itemprop="sameAs"><img alt="Connect with Erik Fullmer on LinkedIn" class="social-icon social-icon-linkedin" data-dcnode-id="441" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.helpcloud.com/assets/icon/hicon-99.svg&amp;raw" width="48"></a><span data-dcnode-id="439" instrument_node="">
