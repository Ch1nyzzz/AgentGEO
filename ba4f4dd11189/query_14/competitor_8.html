</span><h3 class="mb-4 text-base md:text-lg" data-dcnode-id="677"><mark class="bg-transparent" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Are you ready to discover your college program?</span></mark></h3><span data-dcnode-id="676" instrument_node="">
</span><span data-dcnode-id="673" instrument_node="">
</span><sonic-qdf button="Search Programs" buttonalign="center" class="md:hidden" data-dcnode-id="669" hidedisclosure="" layout="horizontal" publisher="thebestschools.org" theme="secondary" url="https://info.thebestschools.org/app/experience/"><span data-dcnode-id="671" instrument_node=""></span></sonic-qdf><span data-dcnode-id="668" instrument_node="">
</span><sonic-qdf button="Search Programs" buttonalign="center" class="hidden md:flex" data-dcnode-id="664" layout="horizontal" publisher="thebestschools.org" theme="secondary" url="https://info.thebestschools.org/app/experience/"><span data-dcnode-id="666" instrument_node=""></span></sonic-qdf><span data-dcnode-id="663" instrument_node="">

</span><div data-dcnode-id="656" data-preamp-display-banner=""></div><span data-dcnode-id="655" instrument_node="">
</span><section class="container content pt-3 md:pt-7 pb-8 md:pb-20 js-content" data-dcnode-id="337"><span data-dcnode-id="654" instrument_node="">
</span><p class="heading-2" data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">If an online college sounds too good to be true, it might be a scam. Knowing the red flags will help you avoid diploma mills.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Most diploma mills operate online. However, many legitimate colleges, including top-ranked universities, also offer distance learning options.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Fortunately, it's easy to tell the difference between a real online college and a diploma mill. For example, online colleges hold accreditation from recognized agencies, while diploma mills often fake their accreditation credentials.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Diploma mills are a waste of money and may even open students up to legal problems. This page can help you learn how to spot online college scams and identify legitimate schools.</span></p><span data-dcnode-id="642" instrument_node="">
</span><h2 data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">What Are Diploma Mills?</span></h2><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="638" instrument_node="">Diploma mills grant college degrees without meeting any academic standards. For example, one online university granted an </span><a data-dcnode-id="636" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nbcnews.com/id/wbna6664906" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="637" instrument_node="">MBA to a cat</span></a><span data-dcnode-id="635" instrument_node=""> for $299. These schools scam students who are looking for legitimate degrees.</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Legitimate, accredited colleges provide an education that meets academic standards, while diploma mills exist to scam students. Diploma mills do not educate students. Some do not even offer classes. Instead, they often charge a flat fee for a degree.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Many diploma mills operate online to lower the cost of scamming people. It's best to avoid diploma mills.</span></p><span data-dcnode-id="627" instrument_node="">
</span><div class="rounded shadow-lg" data-dcnode-id="619" style="background-color: #457E76 ; padding:30px"><span data-dcnode-id="626" instrument_node="">
</span><h3 class="text-white" data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">What Does "Diploma Mill" Mean?</span></h3><span data-dcnode-id="623" instrument_node="">
</span><p class="text-white" data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">A diploma mill offers college degrees that do not meet educational standards or assess student learning. Instead of focusing on education, these scam institutions grant undergraduate and graduate degrees for a fee.</span></p><span data-dcnode-id="620" instrument_node="">
</span></div><span data-dcnode-id="618" instrument_node="">
</span><h3 data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Are Diploma Mills Accredited?</span></h3><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="614" instrument_node="">Diploma mills do not </span><a data-dcnode-id="612" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebestschools.org/resources/accreditation/"><span data-dcnode-id="613" instrument_node="">hold proper accreditation</span></a><span data-dcnode-id="611" instrument_node="">. However, most of them list fake accrediting agencies on their websites to confuse applicants.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Why does accreditation matter? Accredited schools undergo rigorous review from independent, nonprofit accrediting agencies. These accrediting bodies evaluate schools based on their student learning outcomes, academic mission, and faculty qualifications.</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="605" instrument_node="">Schools that fail to earn accreditation do not meet these standards. Applicants can avoid falling for scams by checking for a school in the </span><a data-dcnode-id="603" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ope.ed.gov/dapip/%23/home" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="604" instrument_node="">Database of Accredited Colleges and Programs</span></a><span data-dcnode-id="602" instrument_node=""> before applying.</span></p><span data-dcnode-id="600" instrument_node="">
</span><h3 data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Are Diploma Mills Legal?</span></h3><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="596" instrument_node="">Federal laws do not explicitly ban diploma mills. While the U.S. Department of Education publishes a list of </span><a data-dcnode-id="594" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ope.ed.gov/dapip/%23/home"><span data-dcnode-id="595" instrument_node="">accredited colleges and programs</span></a><span data-dcnode-id="593" instrument_node="">, it does not list unaccredited colleges or diploma mills.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="590" instrument_node="">Some </span><a data-dcnode-id="588" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebestschools.org/resources/for-profit-vs-non-profit-colleges/"><span data-dcnode-id="589" instrument_node="">for-profit schools</span></a><span data-dcnode-id="587" instrument_node=""> do hold accreditation, distinguishing them from diploma mills. This can make it difficult to identify online college scams.</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Attending a diploma mill can have legal or professional consequences for graduates, however. In many states, job-seekers cannot list unaccredited degrees or diploma mills on their job applications. In some states, listing a diploma mill degree on job applications is fraud.</span></p><span data-dcnode-id="582" instrument_node="">
</span><h2 data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Featured Online Colleges</span></h2><span data-dcnode-id="579" instrument_node="">
</span><sonic-editorial-listings data-dcnode-id="575" degree="general" layout="stacked" limit="2" offset="0" publisher="thebestschools.org" subject="general" url="https://info.thebestschools.org/app/experience/"><span data-dcnode-id="577" instrument_node=""></span></sonic-editorial-listings><span data-dcnode-id="574" instrument_node="">
</span><h2 data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">How Can You Tell a Diploma Mill from a Legitimate College?</span></h2><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="570" instrument_node="">How does a diploma mill differ from a legitimate college, particularly when looking at </span><a data-dcnode-id="568" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebestschools.org/rankings/online-colleges/"><span data-dcnode-id="569" instrument_node="">online colleges</span></a><span data-dcnode-id="567" instrument_node="">?</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Accreditation is the biggest indicator. If the program is not accredited by an accreditation agency approved by the Council for Higher Education Accreditation (CHEA), be suspicious.</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">At some diploma mills, students don't even take classes to earn their degrees. Instead, the school offers credit for life experience or grant a degree for a fee. In contrast, legitimate colleges treat education as their primary function, requiring students to take classes and pay on a per-credit basis.</span></p><span data-dcnode-id="559" instrument_node="">
</span><sonic-columns columns="2" data-dcnode-id="503"><span data-dcnode-id="558" instrument_node="">
</span><div class="bg-white rounded" data-dcnode-id="532" style="padding:30px"><span data-dcnode-id="557" instrument_node="">
</span><h4 class="text-secondary" data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Diploma Mill</span></h4><span data-dcnode-id="554" instrument_node="">
</span><ul data-dcnode-id="534"><span data-dcnode-id="553" instrument_node="">
</span><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Students pay for degrees. Some colleges offer degrees for as little as $100.</span></li><span data-dcnode-id="550" instrument_node="">
</span><li data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Diploma mills do not educate students. Instead, they exist to scam them.</span></li><span data-dcnode-id="547" instrument_node="">
</span><li data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Unaccredited schools do not meet any academic or professional standards.</span></li><span data-dcnode-id="544" instrument_node="">
</span><li data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Diploma mills may use foreign addresses to avoid U.S. laws.</span></li><span data-dcnode-id="541" instrument_node="">
</span><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Students receive excessive credit for work or life experience.</span></li><span data-dcnode-id="538" instrument_node="">
</span><li data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Graduates could face legal consequences for listing diploma mill degrees on job applications.</span></li><span data-dcnode-id="535" instrument_node="">
</span></ul><span data-dcnode-id="533" instrument_node="">
</span></div><span data-dcnode-id="531" instrument_node="">
</span><div class="bg-white rounded" data-dcnode-id="505" style="padding:30px"><span data-dcnode-id="530" instrument_node="">
</span><h4 class="text-secondary" data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Legitimate College</span></h4><span data-dcnode-id="527" instrument_node="">
</span><ul data-dcnode-id="507"><span data-dcnode-id="526" instrument_node="">
</span><li data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Legitimate colleges educate students in their chosen majors.</span></li><span data-dcnode-id="523" instrument_node="">
</span><li data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Students pay a per-credit or per-term fee to take classes. Legitimate colleges do not charge a flat fee to earn a degree.</span></li><span data-dcnode-id="520" instrument_node="">
</span><li data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Accredited colleges meet high standards of academic excellence.</span></li><span data-dcnode-id="517" instrument_node="">
</span><li data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Enrollees at accredited colleges can apply for federal financial aid programs.</span></li><span data-dcnode-id="514" instrument_node="">
</span><li data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Graduates qualify for professional licenses and certifications.</span></li><span data-dcnode-id="511" instrument_node="">
</span><li data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Degrees from legitimate colleges meet entrance requirements for graduate school.</span></li><span data-dcnode-id="508" instrument_node="">
</span></ul><span data-dcnode-id="506" instrument_node="">
</span></div><span data-dcnode-id="504" instrument_node="">
</span></sonic-columns><span data-dcnode-id="502" instrument_node="">
</span><h2 data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Online College Scams: What to Look For — And What to Avoid</span></h2><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">With so many online college scams, how can students avoid diploma mills and identify reputable online colleges? Lucky, there are a few signs and red flags to keep an eye out for.</span></p><span data-dcnode-id="496" instrument_node="">
</span><sonic-callout data-dcnode-id="457" theme="white"><span data-dcnode-id="494" instrument_node="">
</span><span data-dcnode-id="493" instrument_node="">
</span><span data-dcnode-id="492" instrument_node="">
</span><slot class="block" data-dcnode-id="463"><span data-dcnode-id="491" instrument_node="">
</span><h3 class="text-tertiary" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Signs of a Quality Program</span></h3><span data-dcnode-id="488" instrument_node="">
</span><sonic-checklist data-dcnode-id="465"><span data-dcnode-id="487" instrument_node="">
</span><sonic-checklist-item color="#5e948c" data-dcnode-id="485" icon="check-circle" title=""><span data-dcnode-id="486" instrument_node="">
Accredited by a nonprofit, independent agency recognized by the U.S. Department of Education or the Council for Higher Education Accreditation (CHEA)
</span></sonic-checklist-item><span data-dcnode-id="484" instrument_node="">
</span><sonic-checklist-item color="#5e948c" data-dcnode-id="482" icon="check-circle" title=""><span data-dcnode-id="483" instrument_node="">
Provides information about academic departments, transfer policies, and degree requirements on their website
</span></sonic-checklist-item><span data-dcnode-id="481" instrument_node="">
</span><sonic-checklist-item color="#5e948c" data-dcnode-id="479" icon="check-circle" title=""><span data-dcnode-id="480" instrument_node="">
Lists a physical address and phone number for the institution
</span></sonic-checklist-item><span data-dcnode-id="478" instrument_node="">
</span><sonic-checklist-item color="#5e948c" data-dcnode-id="476" icon="check-circle" title=""><span data-dcnode-id="477" instrument_node="">
The website has a .edu address
</span></sonic-checklist-item><span data-dcnode-id="475" instrument_node="">
</span><sonic-checklist-item color="#5e948c" data-dcnode-id="473" icon="check-circle" title=""><span data-dcnode-id="474" instrument_node="">
Does not charge a flat fee for a degree; instead, it charges a per-credit or per-semester rate
</span></sonic-checklist-item><span data-dcnode-id="472" instrument_node="">
</span><sonic-checklist-item color="#5e948c" data-dcnode-id="470" icon="check-circle" title=""><span data-dcnode-id="471" instrument_node="">
Requires at least 120 credits for a bachelor's degree or 60 credits for an associate degree
</span></sonic-checklist-item><span data-dcnode-id="469" instrument_node="">
</span><sonic-checklist-item color="#5e948c" data-dcnode-id="467" icon="check-circle" title=""><span data-dcnode-id="468" instrument_node="">
Provides information about financial aid, including the federal student aid program
</span></sonic-checklist-item><span data-dcnode-id="466" instrument_node="">
</span></sonic-checklist><span data-dcnode-id="464" instrument_node="">
</span></slot><span data-dcnode-id="462" instrument_node="">
</span><span data-dcnode-id="461" instrument_node=""></span><span data-dcnode-id="460" instrument_node="">
</span><span data-dcnode-id="459" instrument_node="">
</span></sonic-callout><span data-dcnode-id="456" instrument_node="">
</span><sonic-callout data-dcnode-id="414" theme="white"><span data-dcnode-id="454" instrument_node="">
</span><span data-dcnode-id="453" instrument_node="">
</span><span data-dcnode-id="452" instrument_node="">
</span><slot class="block" data-dcnode-id="420"><span data-dcnode-id="451" instrument_node="">
</span><h3 class="text-secondary" data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Warning Signs of a Scam Program</span></h3><span data-dcnode-id="448" instrument_node="">
</span><sonic-checklist data-dcnode-id="422"><span data-dcnode-id="447" instrument_node="">
</span><sonic-checklist-item color="#b94c2c" data-dcnode-id="445" icon="x-circle" title=""><span data-dcnode-id="446" instrument_node="">
Promises a degree in a very short time; for example, a few months to earn a bachelor's degree
</span></sonic-checklist-item><span data-dcnode-id="444" instrument_node="">
</span><sonic-checklist-item color="#b94c2c" data-dcnode-id="442" icon="x-circle" title=""><span data-dcnode-id="443" instrument_node="">
Lists accrediting agencies not approved by the Council for Higher Education Accreditation (CHEA)
</span></sonic-checklist-item><span data-dcnode-id="441" instrument_node="">
</span><sonic-checklist-item color="#b94c2c" data-dcnode-id="439" icon="x-circle" title=""><span data-dcnode-id="440" instrument_node="">
Charges a per-degree fee rather than a per-credit or -term rate
</span></sonic-checklist-item><span data-dcnode-id="438" instrument_node="">
</span><sonic-checklist-item color="#b94c2c" data-dcnode-id="436" icon="x-circle" title=""><span data-dcnode-id="437" instrument_node="">
The website does not contain contact information, like a phone number or physical address
</span></sonic-checklist-item><span data-dcnode-id="435" instrument_node="">
</span><sonic-checklist-item color="#b94c2c" data-dcnode-id="433" icon="x-circle" title=""><span data-dcnode-id="434" instrument_node="">
The website does not have a .edu address
</span></sonic-checklist-item><span data-dcnode-id="432" instrument_node="">
</span><sonic-checklist-item color="#b94c2c" data-dcnode-id="430" icon="x-circle" title=""><span data-dcnode-id="431" instrument_node="">
The school name sounds very similar to a prestigious college
</span></sonic-checklist-item><span data-dcnode-id="429" instrument_node="">
</span><sonic-checklist-item color="#b94c2c" data-dcnode-id="427" icon="x-circle" title=""><span data-dcnode-id="428" instrument_node="">
The school does not list its faculty or administrators online
</span></sonic-checklist-item><span data-dcnode-id="426" instrument_node="">
</span><sonic-checklist-item color="#b94c2c" data-dcnode-id="424" icon="x-circle" title=""><span data-dcnode-id="425" instrument_node="">
The admission process does not require transcripts and only asks for a fee
</span></sonic-checklist-item><span data-dcnode-id="423" instrument_node="">
</span></sonic-checklist><span data-dcnode-id="421" instrument_node="">
</span></slot><span data-dcnode-id="419" instrument_node="">
</span><span data-dcnode-id="418" instrument_node=""></span><span data-dcnode-id="417" instrument_node="">
</span><span data-dcnode-id="416" instrument_node="">
</span></sonic-callout><span data-dcnode-id="413" instrument_node="">
</span><h3 data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">How Can You Avoid Diploma Mills and Unaccredited Colleges?</span></h3><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Diploma mills and unaccredited colleges can appear in searches for legitimate programs. To spot them, start by knowing the signs of scam programs and how to identify legitimate online colleges.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="406" instrument_node="">Always check the </span><a data-dcnode-id="404" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ope.ed.gov/dapip/%23/home" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="405" instrument_node="">Database of Accredited Colleges and Programs</span></a><span data-dcnode-id="403" instrument_node=""> to verify a school's accreditation status. When looking at online college or program rankings, make sure the rankings only include accredited schools.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Students can avoid diploma mills by doing their due diligence when researching programs.</span></p><span data-dcnode-id="398" instrument_node="">
</span><h2 data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Featured Online Colleges</span></h2><span data-dcnode-id="395" instrument_node="">
</span><sonic-editorial-listings data-dcnode-id="391" degree="general" layout="stacked" limit="2" offset="0" publisher="thebestschools.org" subject="general" url="https://info.thebestschools.org/app/experience/"><span data-dcnode-id="393" instrument_node=""></span></sonic-editorial-listings><span data-dcnode-id="390" instrument_node="">
</span><h2 data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Bottom Line: How Do I Know if an Online College Is Legitimate?</span></h2><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Legitimate online colleges hold accreditation, treat education as their primary mission, and accurately assess student learning. In contrast, diploma mills exist solely to make money from unsuspecting students. Before applying to online colleges, prospective applicants should research schools and their accreditation statuses.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Remember: Unaccredited degrees do not meet requirements for many careers, and buying a degree can put you in legal jeopardy.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Diploma mills might masquerade as legitimate colleges, but informed people can spot the difference. Dig into a school's credentials, read up on its track record, and check it against accreditation databases. If you spot any red flags, cross the school off your list.</span></p><span data-dcnode-id="378" instrument_node="">
