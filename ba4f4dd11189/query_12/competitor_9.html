</span><div class="span8 widget-span widget-type-cell" data-dcnode-id="795" data-w="8" data-widget-type="cell" data-x="0" style=""><span data-dcnode-id="1051" instrument_node="">
</span><div class="row-fluid-wrapper row-depth-1 row-number-6" data-dcnode-id="819"><span data-dcnode-id="1050" instrument_node="">

</span><div class="span12 widget-span widget-type-custom_widget c-modules" data-dcnode-id="825" data-w="12" data-widget-type="custom_widget" data-x="0" style=""><span data-dcnode-id="1048" instrument_node="">
</span><div class="hs_cos_wrapper hs_cos_wrapper_widget hs_cos_wrapper_type_module widget-type-blog_content" data-dcnode-id="827" data-hs-cos-general-type="widget" data-hs-cos-type="module" id="hs_cos_wrapper_module_1523032069834331" style=""><span data-dcnode-id="1047" instrument_node="">
</span><div class="c-post__featured-image" data-dcnode-id="1045"><img alt="Recruitment scam red flags" class="lazyloaded" data-dcnode-id="1046" data-src="https://f.hubspotusercontent30.net/hubfs/3277184/IT-recruitment-workforce-solutions-feature.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f.hubspotusercontent30.net/hubfs/3277184/IT-recruitment-workforce-solutions-feature.png&amp;raw"></div><span data-dcnode-id="1044" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_rich_text" data-dcnode-id="846" data-hs-cos-general-type="meta_field" data-hs-cos-type="rich_text" id="hs_cos_wrapper_post_body" style=""><p data-dcnode-id="1039"><span data-dcnode-id="1043" instrument_node="">When </span><a data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/blog/how-to-conduct-an-effective-job-search%3FhsLang%3Den" rel="noopener"><span data-dcnode-id="1042" instrument_node="">conducting a job search</span></a><span data-dcnode-id="1040" instrument_node="">, it’s not uncommon to be inundated with job offers from several different recruiters.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">But unfortunately, not all of these are who they say they are...</span></p><span data-dcnode-id="1035" instrument_node="">
</span><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Some scammers pose as recruiters so they can access your personal information, and sometimes even your bank details.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">These recruitment scams can be difficult to spot, as the perpetrators often use information from real companies and resume details they found online. This makes the job offers sound convincing.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">However, there are ways to spot the signs and avoid falling for a recruitment scam. We’ve put together some top tips to help job seekers determine whether you’re dealing with a fake recruiter:</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1017" style="font-weight: normal;"><span data-dcnode-id="1020" style="font-style: italic;"><span data-dcnode-id="1022" style="font-weight: bold;"><span data-dcnode-id="1023" instrument_node="">Looking for genuine jobs?</span></span><span data-dcnode-id="1021" instrument_node=""> </span></span><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jobs.airswift.com/jobs" rel="noopener" style="font-style: italic;"><span data-dcnode-id="1019" instrument_node="">Visit our job board</span></a></p><span data-dcnode-id="1016" instrument_node="">
</span><hr data-dcnode-id="1015"><span data-dcnode-id="1014" instrument_node="">
</span><h2 data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Six red flags that suggest a potential job scam</span></h2><span data-dcnode-id="1011" instrument_node="">
</span><h3 data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">1. Emails from a free account</span></h3><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Be wary of recruiters using free web e-mail accounts from services like Gmail or Hotmail as opposed to using a business email address to contact you.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">There may also be tell-tale signs within the email itself, too. While some scammers may send out well-written emails, many will seem unprofessional.&nbsp;</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">If the email contains excessive spelling or punctuation mistakes, incorrect capitalization, or grammatical errors, it could be from a fake recruiter.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">It’s also important to consider attachments sent in emails. If you are unsure about the legitimacy of the file, use a virus scanner before opening it. Some scammers may send attachments that contain viruses designed to corrupt your device and extract personal information.</span></p><span data-dcnode-id="996" instrument_node="">
</span><h3 data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">2. Asking for money or unnecessary personal information before submitting your application</span></h3><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">While discussing job opportunities, you should not be asked for payment before being submitted.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Some scammers might ask you to set up a new bank account and give them the details, or send you to a website and fill out a credit report form. In these instances, the scammer might say that they need your details to put you onto the company insurance.</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Genuine recruiters may ask for your contact details, an up-to-date resume, references, and salary expectations. However, they should always be open and honest about why they need these details. They should never ask you to transfer any money before starting the recruitment process.</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">You should never give out your full Social Security Number or date of birth before being successfully securing a new position and starting the onboarding process.</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">If a “recruiter” asks you to fill out a form, always check that the website they send you to is secure. You can do this by looking at the web address bar. If the URL begins with HTTP:// then it isn’t secure; only HTTPS:// sites are secure.</span></p><span data-dcnode-id="978" instrument_node="">
</span><h3 data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">3. Recruiters being evasive when asked about the job in question</span></h3><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Recruiters should always be knowledgeable about the job they’re recommending. If they seem vague, fail to answer your questions properly, or gloss over the finer details, this should set off alarm bells.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">If they’re unable to answer your questions in a satisfactory way, it’s a sign that they might not be who they say they are.</span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">That said, sometimes genuine recruiters have a confidential role and can’t disclose the name of the client. Nevertheless, they should still have knowledge of the industry and will disclose as much information about the role as they can.</span></p><span data-dcnode-id="966" instrument_node="">
</span><h3 data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">4. Fake job offers that sound too good to be true</span></h3><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Scammers will make their job offers as appealing as possible to entice people to share information with them. Be on your guard if they present a job opportunity that seems too good to be true.</span></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958"><img alt="pexels-andrea-piacquadio-3756678" data-dcnode-id="959" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/pexels-andrea-piacquadio-3756678.jpg%3Fwidth%3D800%26name%3Dpexels-andrea-piacquadio-3756678.jpg&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/pexels-andrea-piacquadio-3756678.jpg?width=400&amp;name=pexels-andrea-piacquadio-3756678.jpg 400w, https://www.airswift.com/hs-fs/hubfs/pexels-andrea-piacquadio-3756678.jpg?width=800&amp;name=pexels-andrea-piacquadio-3756678.jpg 800w, https://www.airswift.com/hs-fs/hubfs/pexels-andrea-piacquadio-3756678.jpg?width=1200&amp;name=pexels-andrea-piacquadio-3756678.jpg 1200w, https://www.airswift.com/hs-fs/hubfs/pexels-andrea-piacquadio-3756678.jpg?width=1600&amp;name=pexels-andrea-piacquadio-3756678.jpg 1600w, https://www.airswift.com/hs-fs/hubfs/pexels-andrea-piacquadio-3756678.jpg?width=2000&amp;name=pexels-andrea-piacquadio-3756678.jpg 2000w, https://www.airswift.com/hs-fs/hubfs/pexels-andrea-piacquadio-3756678.jpg?width=2400&amp;name=pexels-andrea-piacquadio-3756678.jpg 2400w" style="width: 800px;" width="800"></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="956" instrument_node="">Whilst most job description</span><span data-dcnode-id="954" style="background-color: transparent;"><span data-dcnode-id="955" instrument_node="">s tend to highlight the benefits of a role, fake descriptions may have an abnormally long list. They may also say ‘no experience necessary and have shorter hours than would be expected of the role in question.</span></span></p><span data-dcnode-id="952" instrument_node="">
</span><h3 data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">5. Instantly offering a high salary</span></h3><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Similar to the point above, fake job offers tend to include unrealistically high salaries. For example, a starting job salary that is 50-100% above the average rate is unlikely to be real.</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">If the salary offered seems at odds with the job role, it’s worth questioning whether the job is part of a scam.</span></p><span data-dcnode-id="943" instrument_node="">
</span><h3 data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">6. Offering you the job without an interview</span></h3><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Some scammers may even offer you the job without even putting you through for an interview. Some will go further and have an interview with you on the phone, but this won’t be with the company ‘hiring’, you’ll just speak to the fake recruiter.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Another tactic scammers use is to invite you to an online job interview using an unfamiliar or insecure messaging service. Scammers can obtain your details by asking you to set up an account on the online chat platform. It is recommended that you research any software or websites you are invited to sign up to.</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Part of a genuine recruiter's job is to spend time ensuring you’re the right fit for the company that’s hiring. If they offer you the role without even putting you through for an interview, chances are it’s a scam.</span></p><span data-dcnode-id="931" instrument_node="">
</span><hr data-dcnode-id="930"><span data-dcnode-id="929" instrument_node="">
</span><h2 data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">How to know if a recruitment agency is legitimate</span></h2><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">It might seem scary that people would go to these lengths to scam somebody, but luckily, there are several ways to check whether a recruitment agency is genuine:</span></p><span data-dcnode-id="923" instrument_node="">
</span><h3 data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Ask the right questions</span></h3><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Regardless of whether a recruiter is legitimate or not, you should always ask questions when discussing a role. However, this is especially important if you suspect you're being targeted by a job recruiter scam.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><img alt="pexels-fotografierende-1925536 (1)" data-dcnode-id="916" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airswift.com/hs-fs/hubfs/pexels-fotografierende-1925536%2520%281%29.jpg%3Fwidth%3D800%26name%3Dpexels-fotografierende-1925536%2520%281%29.jpg&amp;raw" srcset="https://www.airswift.com/hs-fs/hubfs/pexels-fotografierende-1925536%20(1).jpg?width=400&amp;name=pexels-fotografierende-1925536%20(1).jpg 400w, https://www.airswift.com/hs-fs/hubfs/pexels-fotografierende-1925536%20(1).jpg?width=800&amp;name=pexels-fotografierende-1925536%20(1).jpg 800w, https://www.airswift.com/hs-fs/hubfs/pexels-fotografierende-1925536%20(1).jpg?width=1200&amp;name=pexels-fotografierende-1925536%20(1).jpg 1200w, https://www.airswift.com/hs-fs/hubfs/pexels-fotografierende-1925536%20(1).jpg?width=1600&amp;name=pexels-fotografierende-1925536%20(1).jpg 1600w, https://www.airswift.com/hs-fs/hubfs/pexels-fotografierende-1925536%20(1).jpg?width=2000&amp;name=pexels-fotografierende-1925536%20(1).jpg 2000w, https://www.airswift.com/hs-fs/hubfs/pexels-fotografierende-1925536%20(1).jpg?width=2400&amp;name=pexels-fotografierende-1925536%20(1).jpg 2400w" style="width: 800px;" width="800"></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Good questions to ask in this situation include:</span></p><span data-dcnode-id="911" instrument_node="">
</span><ul data-dcnode-id="894"><span data-dcnode-id="910" instrument_node="">
</span><li data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Have you placed any previous candidates with your client?</span></li><span data-dcnode-id="907" instrument_node="">
</span><li data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">What can you tell me about the company’s culture?</span></li><span data-dcnode-id="904" instrument_node="">
</span><li data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">What opportunities are there for growth in this role?</span></li><span data-dcnode-id="901" instrument_node="">
</span><li data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Please can you tell me more about the role?</span></li><span data-dcnode-id="898" instrument_node="">
</span><li data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">How long has the company been operating?</span></li><span data-dcnode-id="895" instrument_node="">
</span></ul><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Legitimate agencies always invest time and effort into the recruitment process and, even if the role is confidential, should be able to answer the majority of your questions.</span></p><span data-dcnode-id="890" instrument_node="">
</span><h3 data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Check their LinkedIn profile</span></h3><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">If you get contacted by a recruiter, your first port of call should always be LinkedIn. If their profile doesn’t have a lot of connections or has incomplete information, this could be a warning sign that it's a fake recruitment agency.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Copy the recruiter’s profile photo and text from their bio and paste it into a Google Search. Scammers often steal information from real recruiters in order to create their own illegitimate profiles.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Finally, make sure the recruiter's LinkedIn profile is connected to their agency’s corporate page. If it isn’t, this could suggest that they don’t really work for an official firm.</span></p><span data-dcnode-id="878" instrument_node="">
</span><hr data-dcnode-id="877"><span data-dcnode-id="876" instrument_node="">
</span><h2 data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Let Airswift help you find your next job</span></h2><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Airswift is a trusted global recruitment agency with more than 40 years of experience in helping candidates find their perfect roles within the energy, process, and infrastructure industries.</span></p><span data-dcnode-id="870" instrument_node="">
