6-.664.287-1.24.22-1.363-.07-.123-.26-.203-.54-.357z" data-dcnode-id="634" fill="#FFF" fill-rule="evenodd"></path></svg></span><span class="a2a_label" data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">WhatsApp</span></span></a></div></div></div></div></div></div></div></div><div class="brz-columns brz-css-ppjus brz-css-phrmt" data-custom-id="sibdralfsmkofgqdckhyknxykltroffofdzv" data-dcnode-id="619"><div class="brz-column__items brz-css-rqgtn brz-css-blwlw" data-dcnode-id="620"></div></div><div class="brz-columns brz-css-ppjus brz-css-wshco" data-custom-id="pxiijxthjvecwgjqnqqhwbzekzetkmogkjqn" data-dcnode-id="617"><div class="brz-column__items brz-css-rqgtn brz-css-ggiwm" data-dcnode-id="618"></div></div></div></div></div></div></div></section><section class="brz-section brz-css-gbwae brz-css-jmpwu" data-dcnode-id="392" data-uid="qnejufqsvgqibcatheuzniomosmjlbolvoln" id="qnejufqsvgqibcatheuzniomosmjlbolvoln"><div class="brz-section__content brz-section--boxed brz-css-qmwov brz-css-ytixq" data-custom-id="gtskqfjaxpilsdqzluspbafzrxswaydtsnmp" data-dcnode-id="393"><div class="brz-bg" data-dcnode-id="607"><div class="brz-bg-color" data-dcnode-id="610"></div><div class="brz-bg-shape brz-bg-shape__top" data-dcnode-id="609"></div><div class="brz-bg-shape brz-bg-shape__bottom" data-dcnode-id="608"></div></div><div class="brz-container brz-css-gkijd" data-dcnode-id="394"><div class="brz-row__container brz-css-vlzdm" data-custom-id="bwssxsczjzunqyuwozmiznsquwbuzbzfcqxa" data-dcnode-id="395"><div class="brz-row brz-css-taffb brz-css-zesrr" data-dcnode-id="396"><div class="brz-columns brz-css-ppjus brz-css-jbczv div-sticky" data-custom-id="tfqkvpzbjbqxpfcztpckrvhevibyqspclxih" data-dcnode-id="597"><div class="brz-column__items brz-css-rqgtn brz-css-mdmvo" data-dcnode-id="598"><div class="brz-css-bubzz brz-wrapper" data-dcnode-id="601"><div class="brz-rich-text brz-rich-text__custom brz-css-tosrx" data-custom-id="jbuwbelogqyakdzkradqidmuiitqsttmaijz" data-dcnode-id="602"><div data-dcnode-id="603"><p class="brz-css-opprf" data-dcnode-id="604"><span class="brz-cp-color7" data-dcnode-id="605"><span data-dcnode-id="606" instrument_node=""> </span></span></p></div></div></div><div class="brz-css-bubzz brz-css-mgcrb brz-css-gyydi brz-wrapper" data-dcnode-id="599"><div class="brz-spacer brz-css-axzce brz-css-lpjof" data-dcnode-id="600"></div></div></div></div><div class="brz-columns brz-css-ppjus brz-css-fjmwq" data-custom-id="ppxsyavbxdcxnhvvsroamiocgcktlpboctks" data-dcnode-id="401"><div class="brz-column__items brz-css-rqgtn brz-css-arhat" data-dcnode-id="402"><div class="brz-css-bubzz brz-css-wigwb brz-wrapper" data-dcnode-id="489"><div class="brz-wp-post-content brz-css-jdeqc brz-css-jllid" data-custom-id="ecpngueytpojekuqjfhxiyrgnblknmbtjahz" data-dcnode-id="490"><div data-dcnode-id="491" style="min-height:20px"><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">With more people looking to work from home, there is even more opportunity for scammers to post fake jobs, often to part unsuspecting victims from their money. Particularly common are virtual assistant job scams, as working as a VA is appealing to a wide range of people.</span></p><p data-dcnode-id="590"><span data-dcnode-id="594" instrument_node="">There are plenty of legitimate VA jobs out there, but they’re mixed in with virtual assistant scams. Being aware of the common red flags will help you steer clear of these scams and land a real job to start your </span><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myva360.com/blog/how-to-become-a-virtual-assistant-with-no-experience" rel="noopener" target="_blank"><span data-dcnode-id="593" instrument_node="">career as a virtual assistant</span></a><span data-dcnode-id="591" instrument_node="">. The following are some of the most common warning signs and scams.</span></p><h2 data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">1. Expensive Training or Materials</span></h2><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">If you’ve never worked as a virtual assistant before, it may be reasonable to expect you need to invest in some training or materials. Nonetheless, an authentic job will never require you to pay them anything upfront.</span></p><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">When you pay for training, there’s rarely a job at the end. Usually, you’ll receive some low-quality lessons and then the scammer will disappear with your money.</span></p><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">It’s also a common scam to require prospective VAs to pay for software, promising that they’ll receive their money back with their first paycheck. This is completely unnecessary — a genuine client should be able to provide you with access to digital tools without you needing to pay anything. In addition, downloading unfamiliar software could give the scammer remote access to your computer to steal your information or hack your accounts.</span></p><h2 data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">2. High Pay</span></h2><p data-dcnode-id="575"><span data-dcnode-id="579" instrument_node="">Sometimes, the opposite happens: the scammer offers more money than you know the job is worth. (To figure out if the job is offering too much, familiarize yourself with the </span><a data-dcnode-id="577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myva360.com/blog/how-much-should-you-pay-for-a-virtual-assistant" rel="noopener" target="_blank"><span data-dcnode-id="578" instrument_node="">typical rates for virtual assistants</span></a><span data-dcnode-id="576" instrument_node="">.) VAs fall into the trap of thinking, “What’s the worst that could happen?” After all, you’ll be receiving a large sum of money from the client, right?</span></p><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">In fact, the scammer will find a way to not pay you. This is especially easy when scammers use PayPal, as buyers usually receive the benefit of the doubt in payment disputes and can easily claim refunds. Another option is that the scammer could send you a fraudulent check.</span></p><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">These virtual assistant scams are particularly common after the client asks you to purchase something as part of your job responsibilities. The scammer may ask you to buy airline tickets or a gift for someone. You’ll never receive the funds and you’ll end up paying for something expensive with your own money.</span></p><h2 data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">3. Forwarding Payments</span></h2><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">In some cases, you will actually receive money for the job and it will be a reasonable amount considering the tasks you perform. However, it may still be dangerous to accept the work.</span></p><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">One such example is forwarding payments to a person in “another company.” You’ll receive a check or money order with the instructions to forward a certain amount and keep the rest for yourself as payment.</span></p><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">You need to ask yourself why the client needs someone else to do this. The reality is the client using you to launder money. Sending the payment to you first allows the client to clean the money — which will often result in you becoming the subject of a federal investigation.</span></p><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Bear in mind that scammers often present such jobs as legitimate by adding other normal virtual assistant tasks to the description. However, the job listing will often feature sending and receiving money as the main duty of the job.</span></p><h2 data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">4. Shipping Packages</span></h2><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Similar to the above is a job shipping packages. You will be asked to receive or collect items and resend them. These will be stolen goods, items purchased with stolen credit cards, or illegal merchandise.</span></p><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">You’ll often receive a fraudulent check, meaning you’ll never receive payment for your work and will end up incurring the shipping costs yourself. Worst of all, though, is that you’ll have participated in an illegal activity and may face criminal charges.</span></p><h2 data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">5. Pushing to Start a Contract</span></h2><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Scammers often want you to start working as soon as possible. You may receive an offer immediately after applying with no interview or background check. Alternatively, you may have an interview, but the client will be pushy and encourage you to accept the job straight away.</span></p><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">This forces you to sign a contract before you’ve had time to think or investigate the offer. Plus, the fact that someone is willing to work with you just because you showed interest in the job is a huge red flag — especially if you have no prior experience and references.</span></p><p data-dcnode-id="547"><img alt="personal-info" data-dcnode-id="548" height="800" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myva360.com/wp-content/uploads/2020/10/personal-info.jpg&amp;raw" width="1860"></p><h2 data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">6. Asking for Personal Information</span></h2><p data-dcnode-id="540"><span data-dcnode-id="544" instrument_node="">It’s equally possible that the scammer may ask for too much information. It’s especially risky to supply your bank details — the scammer may say that this is to pay you directly, but it will actually be to turn you into a </span><a data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumer.ftc.gov/blog/2020/03/whats-money-mule-scam" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="543" instrument_node="">money mule</span></a><span data-dcnode-id="541" instrument_node="">.</span></p><p data-dcnode-id="535"><span data-dcnode-id="539" instrument_node="">Scammers may also ask for your social security number. In fact, this could be one of the only things they request to start a job, claiming it’s necessary to finish the paperwork and get started. Sharing your social security number puts you at the risk of </span><a data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ssa.gov/pubs/EN-05-10064.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="538" instrument_node="">identity theft</span></a><span data-dcnode-id="536" instrument_node="">. You could be in for years of trouble, as scammers can use your social security number to collect benefits, take out credit cards in your name, and even receive your tax refund.</span></p><h2 data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">7. Offer for a Different Job</span></h2><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">It’s possible you never even applied for a position as a virtual assistant, but you receive an offer all the same. This sometimes happens if you post your details on a job site or even apply to a different job. In the case of the second, the scammer will claim the job you wanted has been filled, but the company now has an opening for a virtual assistant. If you show any interest, a scam will likely follow.</span></p><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">You may even have fallen victim to a fake job board. Scammers set these up specifically to gather contact information of people looking for jobs to send them scams. The dangerous thing about these job boards is that they look professional. One warning sign is asking for your social security number — with the pretense of screening you — before you can apply to any job or create an account.</span></p><h2 data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">8. No Job Details</span></h2><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Any virtual assistant job post should explain what you’ll be doing. A sure sign of a scam is a listing that just expounds the benefits of the job (like flexibility and great pay) but has barely any or no job details. Without this information, it’s impossible to know who the job is even targeted to — and that’s because the scammer is targeting anyone and everyone.</span></p><h2 data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">9. Shady Employer Details</span></h2><p data-dcnode-id="519"><span data-dcnode-id="522" instrument_node="">The job listing should feature the name of the company as well as the name of the individual running the search. If you have any suspicions, a quick online search will show you if the person does actually work for the company. You can also tell by looking at the email address. Almost all professionals have an email in the format </span><span data-dcnode-id="521" instrument_node="">name@company.com.</span><span data-dcnode-id="520" instrument_node=""> Anything with a generic domain like gmail.com is a sign you’re not dealing with a professional.</span></p><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">You should also check the phone number and website the client provides you. A person pretending to work at a real company may list a slightly different phone number or website.</span></p><h2 data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">10. Promising Future Payment</span></h2><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">It’s true that startups may want to benefit from the services of a virtual assistant but have limited funds. They may ask to pay you at a later date after they’ve generated some income. The problem with this is there’s no guarantee that day will ever come.</span></p><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">It is possible that you’ve encountered a small business owner who genuinely does want to pay you later (although this doesn’t make it right). However, it’s more likely to be a scam. These virtual assistant scams prey on one VA after another to continuously gain free work.</span></p><h2 data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">11. Asking for a Free Trial</span></h2><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Depending on the type of work you’re offering, a client may need to test your skills before offering you a job. However, this should take 10 to 15 minutes at the most — anything more than this is free work. It’s normal to offer a trial contract at the start, but a serious client will always pay you for this time.</span></p><h2 data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">12. Poor Spelling and Grammar</span></h2><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">If you find a job from a company based abroad, a minor spelling or grammar mistake could just be a sign that the client is not a native English speaker. However, you would not expect a reputable company to post a job listing littered with mistakes.</span></p><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">If the company is based in the U.S. or another English-speaking company, the job is almost certainly a scam.</span></p><h2 data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">13. The Sense Something Isn’t Right</span></h2><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Go with your gut. If anything feels wrong, move on. This could include a client who is oversharing, asking odd questions or has strange mannerisms. In any case, it’s not worth the risk of pursuing the job when there are so many legitimate opportunities out there.</span></p><p data-dcnode-id="492"><span data-dcnode-id="496" instrument_node="">If a job ever seems too good to be true, it most likely is. Always keep scams in mind to assess any job you come across for red flags, as some scammers even make it on to freelance platforms. If anything feels wrong, investigate further. On social media and forums, you may find VAs who have had encounters with the same scam artists or ran across a similar scam and can provide you with further advice about what to avoid. Finally, protect yourself by searching for jobs just on known platforms&nbsp;and through reputable agencies. Read our list of the&nbsp;</span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myva360.com/blog/the-best-outsourcing-websites" rel="noopener" target="_blank"><span data-dcnode-id="495" instrument_node="">best outsourcing platforms</span></a><span data-dcnode-id="493" instrument_node="">&nbsp;to learn about the top options.</span></p></div></div></div><div class="brz-row__container brz-css-vlzdm brz-css-marrs" data-custom-id="sexiyeqpmkbupzppoiofpvxfwwgclkipzgmi" data-dcnode-id="459"><div class="brz-row brz-row--inner brz-css-taffb" data-dcnode-id="460"><div class="brz-columns brz-css-ppjus brz-css-qsazi" data-custom-id="mrwojwymdekoslwvjxvbqiecgmqqqufywfik" data-dcnode-id="481"><div class="brz-column__items brz-css-rqgtn brz-css-gjbuq" data-dcnode-id="482"><div class="brz-css-bubzz brz-css-ydbtm brz-wrapper" data-dcnode-id="483"><div class="brz-image brz-css-bdtza brz-css-dcmwi" data-dcnode-id="484"><picture class="brz-picture brz-d-block brz-p-rel
