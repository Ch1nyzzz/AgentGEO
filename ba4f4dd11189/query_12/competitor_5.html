</span><p data-dcnode-id="841"><strong data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">We’ve got your back!</span></strong><span data-dcnode-id="844" instrument_node=""> Student Loan Hero is a completely free website 100% focused on helping student loan borrowers get the answers they need. </span><span class="gotuback-read-more" data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Read more</span></span></p><span data-dcnode-id="840" instrument_node="">
</span><p class="gotuback-hidden" data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">How do we make money? It’s actually pretty simple. If you choose to check out and become a customer of any of the loan providers featured on our site, we get compensated for sending you their way. This helps pay for our amazing staff of writers (many of which are paying back student loans of their own!).</span></p><span data-dcnode-id="837" instrument_node="">
</span><p class="gotuback-hidden" data-dcnode-id="833"><span data-dcnode-id="836" instrument_node="">Bottom line: We’re here for you. So please learn all you can, email us with any questions, and feel free to visit or not visit any of the loan providers on our site. </span><span class="overview-read-less" data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Read less</span></span></p><span data-dcnode-id="832" instrument_node="">
</span></div><span data-dcnode-id="830" instrument_node="">
</span><div class="clear" data-dcnode-id="829"></div><span data-dcnode-id="828" instrument_node="">
</span></div><span data-dcnode-id="826" instrument_node="">
</span><div class="slh-post-entry" data-dcnode-id="687"><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">As a new graduate, you’re eager to land a job and start making good money. But in your rush to launch your career, it’s easy to overlook red flags that suggest a job posting is a scam.</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Unfortunately, scammers are out there posing as legitimate employers in an effort to steal your money or private information. If you see a job posting with any of the seven warning signs below, then watch out: It could very well be a fraud:</span></p><span data-dcnode-id="819" instrument_node="">
</span><h2 data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">1. It sounds too good to be true</span></h2><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">If you’ve scoured the internet looking for jobs, you’ve probably seen postings promising huge earnings for little work. But as much as you want to believe you’ll get a big paycheck for a part-time job, this offer probably isn’t real.</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="812" instrument_node="">“[If] you’re worried that an offer might be too good to be true — it probably is,” said Laura Spawn, CEO and co-founder of remote job board </span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.virtualvocations.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="811" instrument_node="">Virtual Vocations</span></a><span data-dcnode-id="809" instrument_node="">. “Trust your gut. If something sounds fishy, don’t be afraid to ask questions — and if they aren’t willing to give you an answer, steer clear!”</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Even if someone answers your questions, do extra research to verify the legitimacy of a company. Sometimes a simple Google search with the name of the employer and the word “scam” will be enough to pull up horror stories from other job seekers.</span></p><span data-dcnode-id="804" instrument_node="">
</span><h2 data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">2. No experience required</span></h2><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">As a new grad, you might feel like you’re in a Catch-22. You need a job to gain experience, but many employers don’t want to bet on someone with so little on their resume.</span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">So when a would-be employer promises no experience is required, you might jump at the opportunity. But make sure to vet the job posting before accepting it.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="794" instrument_node="">Most employers want to see some related education or experience on your resume, even if it’s just a degree in a certain field or a </span><a data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studentloanhero.com/featured/should-you-take-that-unpaid-internship/"><span data-dcnode-id="793" instrument_node="">relevant internship</span></a><span data-dcnode-id="791" instrument_node="">. If someone wants to hire you without even seeing a resume or cover letter, they may be trying to scam you.</span></p><span data-dcnode-id="789" instrument_node="">
</span><h2 data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">3. It came out of nowhere</span></h2><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Another time to be wary is if a company reaches out to you with a job offer, especially if you’re not sure how they tracked you down. When asked about common warning signs, talent recruiter Andrew Jones said to be careful if you don’t know how they found your information.</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">“Do you remember putting your resume on that job board? Do you remember reaching out to this organization? A common tactic for scammers is to frame an unsolicited email as a follow-up,” he said.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">If you’ve been sending out dozens of resumes and cover letters, you might forget where you’ve applied. Before responding to a so-called follow-up email, make sure to track down your initial application.</span></p><span data-dcnode-id="777" instrument_node="">
</span><h2 data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">4. You have to pay money upfront</span></h2><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Anyone claiming to be an employer and asking you to pay money upfront is probably a scammer trying to steal from you. Some con artists will say you need to pay a fee for a background check or to buy some work-at-home equipment.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Legitimate employers will cover start-up costs, so you shouldn’t have to pay anything to begin working. Be especially careful if someone is asking you to wire money, as it’s often extremely difficult, if not impossible, to recover wired money after you’ve sent it.</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">The one exception involves multi-level marketing (MLM) companies, which ask you to invest in products before selling them. But MLM companies are risky, and some are outright disreputable, with many people finding themselves spending far more money than they’ve earned.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Remember, the employer should be paying you for your work, not the other way around.</span></p><span data-dcnode-id="762" instrument_node="">
</span><h2 data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">5. No interview required</span></h2><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Did you get a job offer with little to no interview process? If so, your alarm bells should start ringing.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="755" instrument_node="">“Beware of online interviews that immediately hire you and rush into asking for information for their payroll department, such as your employment ID information or bank account number,” said Joe Flanagan, senior career advisor at </span><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mintresume.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="754" instrument_node="">MintResume</span></a><span data-dcnode-id="752" instrument_node="">, a site that provides resume services. “These scams are designed to get you excited about a new job opportunity so you won’t notice you’re being asked for information that makes identity theft possible.”</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="749" instrument_node="">Although </span><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studentloanhero.com/featured/remote-companies-offering-unique-perks-dream-job/"><span data-dcnode-id="748" instrument_node="">remote companies</span></a><span data-dcnode-id="746" instrument_node=""> might conduct online interviews, you should typically at least meet with someone over video chat. If you get a job offer after only emailing back and forth, you should probably ask to Skype with an actual hiring manager before you share any private data.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">“Bottom Line: Never give out your financial information during an online job interview,” Flanagan said.</span></p><span data-dcnode-id="741" instrument_node="">
</span><h2 data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">6. Contains vague and generic language</span></h2><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Legitimate hiring managers spend time crafting job postings that outline the skills and experiences they’re looking for in a candidate. They also provide substantial details in the job description, so you know exactly what you’re applying for.</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">But if you’re reading a job posting with vague language and unclear specifications, it might not be a legitimate opportunity. Take a look at </span><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studentloanhero.com/marketplace/new-career/"><span data-dcnode-id="733" instrument_node="">vetted job postings on reputable sites</span></a><span data-dcnode-id="731" instrument_node=""> such as Indeed and CareerBuilder so you have a good idea what a real job posting is supposed to look like — and avoid the ones that fall short.</span></p><span data-dcnode-id="729" instrument_node="">
</span><h2 data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">7. No contact person or website</span></h2><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Before applying to a job, do your due diligence by researching the company and heading to its official website. If you’re having trouble tracking down a point of contact or even a website, you might have a scam on your hands.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="722" instrument_node="">“Can you see who the organization is that is actually advertising the role?” asked Simon Royston, founder and managing director of recruitment agency </span><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.therecruitmentlab.co.uk/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="721" instrument_node="">The Recruitment Lab</span></a><span data-dcnode-id="719" instrument_node="">. “It should be clear, and they will hopefully have an online presence such as a website or social media activities that demonstrate they are reputable.”</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">If you can’t find an internet presence, the company might not exist. You should also be on the lookout for a copycat URL — using “.co” where the real website has “.com,” for example — and any other spelling irregularities that could point to a scam.</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="713" instrument_node="">“Legitimate job postings will contain company info, no noticeable typos or grammar errors, and information about how to apply beyond a telephone number,” said Emily Frank, career counselor and founder of </span><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.denvercareercatalyst.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="712" instrument_node="">Denver Career Catalyst</span></a><span data-dcnode-id="710" instrument_node="">. “There will also be things people can find in multiple places, including the company’s own job board.”</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">If the company has little internet presence to speak of, you should probably keep hunting for a more secure opportunity.</span></p><span data-dcnode-id="705" instrument_node="">
</span><h2 data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Protect yourself from job scams</span></h2><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Thanks to online job boards, it’s easy to search for work from the comfort of your computer. But you have to be careful to use legitimate sites that carefully screen job postings, or you could end up falling victim to a job scam.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">And remember that even on reputable job boards, fake postings can fall through the cracks. So it’s up to you to recognize the red flags and protect yourself from scammers.</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Listen to your instincts, and don’t let desperation for a job make you vulnerable to fake ads. Otherwise, you won’t just be disappointed by the false promise of work — you could also end up losing money or becoming a </span></span><span data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">victim of identity theft</span></span><span data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">. </span></span></p><span data-dcnode-id="688" instrument_node="">
</span></div><span data-dcnode-id="686" instrument_node="">
