</span><div class="single-content online-dating" data-dcnode-id="751"><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">I remember watching this “Dr. Phil” episode one time about a guy who met a woman on a dating site with him who he really hit it off. Not long after, they were making plans to meet, but she was in another country and didn’t have the means to come to the U.S. to be with him. So, he decided to help — after all, he’d fallen hard for her.</span></p><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">For months, he’d send her money to use toward paying for her travel expenses, but something would always come up (it would get lost, there was another fee she’d forgotten about, etc.). Eventually, one of his friends asked Dr. Phil to see if he was being duped. Unfortunately, Dr. Phil’s team discovered that the woman didn’t actually exist and it was all part of an international scam.</span></p><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Situations like this don’t have to happen if you know what signs to look for. Here are 15 red flags for online dating (which we’ve broken up for men and women) that can help keep you and your personal information safe.</span></p><p data-dcnode-id="926" style="text-align: center"><a data-dcnode-id="930" href="#heading1"><span data-dcnode-id="931" instrument_node="">For Men</span></a><span data-dcnode-id="929" instrument_node=""> | </span><a data-dcnode-id="927" href="#heading2"><span data-dcnode-id="928" instrument_node="">For Women</span></a></p><div class="h2-header" data-dcnode-id="922"><h2 data-dcnode-id="924" id="heading1"><span data-dcnode-id="925" instrument_node="">Online Dating Red Flags for Men (#1-7)</span></h2><div class="ret-sprite subhead-watermark" data-dcnode-id="923"></div></div><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Con artists target men differently than they target women, so below are seven red flags in online dating that men should be especially aware of.</span></p><h3 data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">1. She Asks for Money</span></h3><p data-dcnode-id="913"><span data-dcnode-id="917" instrument_node="">As we saw from the story above, </span><a data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.datingadvice.com/studies/odsffs" target="_blank"><span data-dcnode-id="916" instrument_node="">there are scammers out there</span></a><span data-dcnode-id="914" instrument_node=""> who will try to get you to send them money, pretending to be a woman who’s in love with you and just needs a little help to come see you. If someone on a dating site asks you for money, report them to the customer service team immediately and then block them so they cannot contact you again. No matter what they say, do not give them your financial information or send them money — there’s never a good enough reason to do that.</span></p><h3 data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">2. She Says “My Friends Made Me Do This”</span></h3><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">When a woman leads off her profile or a message with “my friends made me do this,” you can tell she’s not that into online dating. Maybe she thinks it’s desperate or whatever the case may be.</span></p><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">
</span></p><div class="wp-caption aligncenter" data-dcnode-id="903" id="attachment_124660" style="width: 588px"><img alt="Photo of a bored woman on a computer" aria-describedby="caption-attachment-124660" class="wp-image-124660 size-full is-cf-image lazy-loaded" data-dcnode-id="906" data-src="https://www.datingadvice.com/images/uploads/2017/01/online-dating-red-flags3.jpg?width=588&amp;height=295" height="295" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.datingadvice.com/images/uploads/2017/01/online-dating-red-flags3.jpg%3Fwidth%3D588%26height%3D295&amp;raw" style="height:295px; width:588px" title="Photo of a bored woman on a computer" width="588"><p class="wp-caption-text" data-dcnode-id="904" id="caption-attachment-124660"><span data-dcnode-id="905" instrument_node="">This tends to come off like a dispassionate statement, and the person should be excited about meeting new people such as yourself.</span></p></div><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">You want someone who’s excited to be meeting tons of new people, yourself included, and cares about finding a potential date, boyfriend, or husband.</span></p><h3 data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">3. She Has Tons of Photos But Little Information About Herself</span></h3><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">You’re probably looking at a fake profile if she has all kinds of pictures (especially sexy ones) but doesn’t say anything about herself except for things like her name, age, and location. You need to know things about her interests, lifestyle habits, and things of that nature. There are tons of stock photos out there of pretty women, and it’s easy for anyone to obtain them.</span></p><h3 data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">4. She Only Has “Must-Haves” On Her Profile</span></h3><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">While a dating profile pretty much has to say a person’s wants and needs (otherwise, what’s the point?), if a woman has a grocery list of items she’s looking for in a man, she may be asking for too much from one person. That’s not to say you shouldn’t give her a chance, but just keep an eye out. Try to look for people who value important characteristics, not superficial ones.</span></p><h3 data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">5. She’s Negative All the Time</span></h3><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">We can all be Negative Nancys (or Negative Nathans!) from time to time. However, if she seems to be complaining about dating, work, friends, and her life more than sharing the qualities she can bring to a date or relationship or asking you about yourself — it’s time to take a pause and think about if she’s right for you. This is similar to how “my friends made me do this” is a somewhat pessimistic statement.</span></p><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">
</span></p><div class="wp-caption aligncenter" data-dcnode-id="882" id="attachment_124652" style="width: 588px"><img alt="Photo of a woman yelling" aria-describedby="caption-attachment-124652" class="wp-image-124652 size-full is-cf-image lazy-loaded" data-dcnode-id="885" data-src="https://www.datingadvice.com/images/uploads/2017/01/online-dating-red-flags2.jpg?width=588&amp;height=295" height="295" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.datingadvice.com/images/uploads/2017/01/online-dating-red-flags2.jpg%3Fwidth%3D588%26height%3D295&amp;raw" style="height:295px; width:588px" title="Photo of a woman yelling" width="588"><p class="wp-caption-text" data-dcnode-id="883" id="caption-attachment-124652"><span data-dcnode-id="884" instrument_node="">We’re all negative sometimes, but if the entire profile reads like one big complaint-fest, think twice about this person.</span></p></div><span data-dcnode-id="881" instrument_node="">
</span><h3 data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">6. She’s Flaky About Meeting in Person</span></h3><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">The ultimate goal of online dating is to find someone you like and meet them offline, right? When an online match keeps putting off the date, that’s cause for worry. Her excuses could definitely be genuine, but if it’s been weeks or months of you trying to meet her in person and she still hasn’t done it, you’ll probably want to ask her about it one last time and then move on.</span></p><h3 data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">7. She Seems Too Good to Be True</span></h3><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">You don’t want to be too cynical, but at the end of the day, when someone says all the right things and has all the right qualities (or ones that are even better than what you could’ve dreamed up), just keep that in your mind and stay on your toes for anything that feels off to you. They’re called gut instincts for a reason, and it’s usually good to follow them.</span></p><div class="h2-header" data-dcnode-id="869"><h2 data-dcnode-id="871" id="heading2"><span data-dcnode-id="872" instrument_node="">Online Dating Red Flags for Women (#8-15)</span></h2><div class="ret-sprite subhead-watermark" data-dcnode-id="870"></div></div><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Red flags of online dating can vary, depending on your preferences, the site you’re using, your age, your location, and things like that. We’ve compiled a list of eight that might apply to women more so than men.</span></p><h3 data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">8. His Profile Has Too Many Grammar &amp; Spelling Mistakes</span></h3><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Most dating profiles are bound to have a few grammar and spelling errors in them, and that’s definitely OK. However, if almost every sentence has something wrong with it and you’re getting a funny feeling, listen to it. Either this person didn’t care about taking the time to make sure they were putting their best foot forward, or it could be a fraudster.</span></p><h3 data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">9. He’s Not Showing His Face in Photos</span></h3><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">If he doesn’t have a picture that shows his entire face looking at the camera, he could be hiding something. Maybe he’s wearing a hat that’s tilted down over his eye, or maybe he’s looking over to the side.</span></p><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">
</span></p><div class="wp-caption aligncenter" data-dcnode-id="853" id="attachment_124663" style="width: 588px"><img alt="Photo of a man tilting his hat" aria-describedby="caption-attachment-124663" class="wp-image-124663 size-full is-cf-image lazy-loaded" data-dcnode-id="856" data-src="https://www.datingadvice.com/images/uploads/2017/01/online-dating-red-flags4.jpg?width=588&amp;height=295" height="295" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.datingadvice.com/images/uploads/2017/01/online-dating-red-flags4.jpg%3Fwidth%3D588%26height%3D295&amp;raw" style="height:295px; width:588px" title="Photo of a man tilting his hat" width="588"><p class="wp-caption-text" data-dcnode-id="854" id="caption-attachment-124663"><span data-dcnode-id="855" instrument_node="">There’s a time and a place for artsy photos, but an online dating profile isn’t one of them. You want to be able to see who the person actually is.</span></p></div><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">No matter what it is, a solution could be to send him a picture of yourself smiling directly into the camera, and then ask him to send one as well.</span></p><h3 data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">10. His Messages Seem to Be Copied &amp; Pasted</span></h3><p data-dcnode-id="843"><span data-dcnode-id="847" instrument_node="">The messaging part of online dating is so important. This is when you two get to determine if y’all want to take things offline or go your separate ways. If he’s sending you messages that sound generic and don’t mention anything specific from your profile, you’ve got to wonder </span><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.datingadvice.com/for-women/how-can-i-tell-hes-a-player" target="_blank"><span data-dcnode-id="846" instrument_node="">if he’s sending it to every other girl</span></a><span data-dcnode-id="844" instrument_node="">. That’s not a good feeling. If he’s not willing to take the time to write a unique message, what else will he not take the time for?</span></p><h3 data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">11. He Gives You Too Many Superficial Compliments</span></h3><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Most of us like to be complimented and told we’re good at something or we look nice, but you can tell when someone is laying it on too thick and kissing your ass. When all a guy says is how you’re beautiful and funny and charming, it makes you question if he’s just a smooth talker, if you can ever get deeper conversations out of him, or if he might want something he’s not disclosing.</span></p><h3 data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">12. He Brings Up His Exes a Lot</span></h3><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">We all go through breakups, and we all heal from them in different ways and at different paces. If you broke up with someone who was one of the loves of your life, you’ll always remember them and will eventually discuss them with a new date or boyfriend. However, the first time you’re meeting someone (whether it’s on a dating site or not) isn’t the time to do it. If this is what one of your online matches is doing, we’d suggest being a little leery. You don’t want to have to worry about everything you do and if it’s going to remind him of what one of his former girlfriends did.</span></p><h3 data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">13. He Brags About Himself</span></h3><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">This red flag isn’t for one-time offenders but for guys who just can’t seem to stop gloating about themselves and their accomplishments and everything else they do in life that’s amazing. We’ve all met people like this.</span></p><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">
</span></p><div class="wp-caption aligncenter" data-dcnode-id="825" id="attachment_124666" style="width: 588px"><img alt="Photo of a man bragging about himself to a woman" aria-describedby="caption-attachment-124666" class="wp-image-124666 size-full is-cf-image lazy-loaded" data-dcnode-id="828" data-src="https://www.datingadvice.com/images/uploads/2017/01/online-dating-red-flags5.jpg?width=588&amp;height=330" height="330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.datingadvice.com/images/uploads/2017/01/online-dating-red-flags5.jpg%3Fwidth%3D588%26height%3D330&amp;raw" style="height:330px; width:588px" title="Photo of a man bragging about himself to a woman" width="588"><p class="wp-caption-text" data-dcnode-id="826" id="caption-attachment-124666"><span data-dcnode-id="827" instrument_node="">If an online match only talks about him or herself and never asks you any questions, that’s a bad sign.</span></p></div><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">For example, if you’re telling a story about something awesome you did at work and he says a quick “good job” and then jumps into something awesome he did at his job, maybe it’s always going to be about him?</span></p><h3 data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">14. He Frequently Talks About Sex</span></h3><p data-dcnode-id="815"><span data-dcnode-id="819" instrument_node="">There’s absolutely nothing wrong with talking about sex — if it’s a two-way street. If that’s not what you’re looking for and he keeps directing the conversation that way, you should </span><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.datingadvice.com/for-men/how-do-i-politely-turn-down-someone-online" target="_blank"><span data-dcnode-id="818" instrument_node="">politely say you’re not interested</span></a><span data-dcnode-id="816" instrument_node=""> and go find someone else.</span></p><h3 data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">15. He Goes a Long Time Without Communicating</span></h3><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">When people really like someone, more than likely they’re going to respond to their messages, texts, and calls pretty quickly. On the other hand, when people aren’t really into someone, they tend to not be as eager to get back to them right away or have a back-and-forth conversation for too long. If he constantly goes days before responding to you, especially if you asked an important question, like when you want to go on a date, it’s not a good sign. Yes, he could be out of town or he’s lost his phone or something, but you should also consider the alternative. Look for patterns in his behavior, and then make your decision about cutting him loose or not.</span></p><div class="h2-header" data-dcnode-id="807"><h2 data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Knowing These Red Flags Will Help Keep You Safe!</span></h2><div class="ret-sprite subhead-watermark" data-dcnode-id="808"></div></div><p data-dcnode-id="802"><span data-dcnode-id="806" instrument_node="">What happened to that guest on Dr. Phil was terrible, and no one should have to go through that. To keep something like this from happening to you or someone you know, remember these 15 online dating red flags. Online dating is the best way to meet a date or partner — you just have to </span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.datingadvice.com/for-women/top-5-tips-to-avoid-online-dating-scams" target="_blank"><span data-dcnode-id="805" instrument_node="">keep your wits about you</span></a><span data-dcnode-id="803" instrument_node="">.</span></p><p data-dcnode-id="799"><em data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Photo sources: datingasociopath.wordpress.com, confidentman.net, askandyaboutclothes.com, etiquette-social-situations.knoji.com</span></em></p><div class="disclosure-popovers" data-dcnode-id="753"><span data-dcnode-id="798" instrument_node="">
