</span><h1 class="entry-title" data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Red flags in a job interview</span></h1><span data-dcnode-id="1683" instrument_node="">
</span><span class="entry-div" data-dcnode-id="1682"></span><span data-dcnode-id="1681" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1670"><span data-dcnode-id="1680" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1677"><time class="entry-date published updated" data-dcnode-id="1678" datetime="2021-12-13T07:58:10+01:00"><span data-dcnode-id="1679" instrument_node="">13 December 2021</span></time></span><span class="byline" data-dcnode-id="1672"><span data-dcnode-id="1676" instrument_node="">by </span><span class="author vcard" data-dcnode-id="1673"><a class="url fn n" data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elaintech.com/author/elamoscicka/"><span data-dcnode-id="1675" instrument_node="">Ela Moscicka | ElaInTech.com - All about career in tech</span></a></span></span><span data-dcnode-id="1671" instrument_node=""> </span></div><span data-dcnode-id="1668" instrument_node="">
</span></header><span data-dcnode-id="1665" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1224"><span data-dcnode-id="1664" instrument_node="">
</span><div class="entry-featured" data-dcnode-id="1660"><span data-dcnode-id="1663" instrument_node="">
</span><img alt="Red flags in a job interview by Ela Moscicka" class="attachment-post-thumbnail size-post-thumbnail wp-post-image jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="3630" data-comments-opened="1" data-dcnode-id="1662" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Red flags in a job interview" data-large-file="https://elaintech.com/wp-content/uploads/2021/12/red-flags-1024x577.png" data-lazy-loaded="1" data-medium-file="https://elaintech.com/wp-content/uploads/2021/12/red-flags-300x169.png" data-orig-file="https://elaintech.com/wp-content/uploads/2021/12/red-flags.png" data-orig-size="1640,924" data-permalink="https://elaintech.com/2021/12/13/red-flags-in-a-job-interview/red-flags/" height="406" loading="eager" sizes="(max-width: 720px) 100vw, 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elaintech.com/wp-content/uploads/2021/12/red-flags-720x406.png&amp;raw" srcset="https://elaintech.com/wp-content/uploads/2021/12/red-flags-720x406.png 720w, https://elaintech.com/wp-content/uploads/2021/12/red-flags-300x169.png 300w, https://elaintech.com/wp-content/uploads/2021/12/red-flags-1024x577.png 1024w, https://elaintech.com/wp-content/uploads/2021/12/red-flags-768x433.png 768w, https://elaintech.com/wp-content/uploads/2021/12/red-flags-1536x865.png 1536w, https://elaintech.com/wp-content/uploads/2021/12/red-flags-1200x676.png 1200w, https://elaintech.com/wp-content/uploads/2021/12/red-flags.png 1640w" width="720"><span data-dcnode-id="1661" instrument_node=""> </span></div><span data-dcnode-id="1658" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1622"><span data-dcnode-id="1657" instrument_node="">Have you ever left the job interview feeling that </span><strong data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">something is just not right</span></strong><span data-dcnode-id="1654" instrument_node="">? </span><strong data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Have doubts about joining that company</span></strong><span data-dcnode-id="1651" instrument_node="">? High chances are you’ve spotted some </span><strong data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">red flags</span></strong><span data-dcnode-id="1648" instrument_node="">. </span><br data-dcnode-id="1647"><br data-dcnode-id="1646"><span data-dcnode-id="1645" instrument_node="">Keep in mind that the recruitment process is a </span><strong data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">two-way street</span></strong><span data-dcnode-id="1642" instrument_node="">.  It’s not only about the company hiring the right person, but also a great opportunity for you to learn more about them before you say “yes” to their job offer. </span><br data-dcnode-id="1641"><br data-dcnode-id="1640"><span data-dcnode-id="1639" instrument_node="">Make sure to </span><strong data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">give yourself time </span></strong><span data-dcnode-id="1636" instrument_node="">to think about the entire interviewing experience as those might have been </span><strong data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">important warning signs</span></strong><span data-dcnode-id="1633" instrument_node="">.</span><br data-dcnode-id="1632"><br data-dcnode-id="1631"><span data-dcnode-id="1630" instrument_node="">Here are </span><strong data-dcnode-id="1625"><span data-dcnode-id="1629" instrument_node="">8 </span><strong data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">red flags</span></strong><span data-dcnode-id="1626" instrument_node=""> in a job interview </span></strong><span data-dcnode-id="1624" instrument_node="">that you shouldn’t ignore.</span><br data-dcnode-id="1623"></p><span data-dcnode-id="1621" instrument_node="">
</span><span data-dcnode-id="1620" id="more-983"></span><span data-dcnode-id="1619" instrument_node="">
</span><h3 data-dcnode-id="1616" id="1-entire-recruitment-process-was-chaotic"><strong data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">1. Entire recruitment process was chaotic</span></strong></h3><span data-dcnode-id="1615" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">The job description didn’t really have enough details. </span></p><span data-dcnode-id="1612" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">You never know who will be your next interviewer or how many steps of the recruitment process you can expect. </span></p><span data-dcnode-id="1609" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">You’re asking questions but no one ever gets back to you. </span></p><span data-dcnode-id="1606" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1601"><span data-dcnode-id="1605" instrument_node="">Interviews get rescheduled multiple times or are cancelled without notification.</span><br data-dcnode-id="1604"><br data-dcnode-id="1603"><span data-dcnode-id="1602" instrument_node="">Do you feel like you’re the only one who cares? If the answer is “yes”, then you’ve just discovered one of the red flags in a job interview.</span></p><span data-dcnode-id="1600" instrument_node="">
</span><h2 data-dcnode-id="1599"></h2><span data-dcnode-id="1598" instrument_node="">
</span><h3 data-dcnode-id="1595" id="2-unprofessional-behavior"><strong data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">2. Unprofessional behavior</span></strong></h3><span data-dcnode-id="1594" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1591"><strong data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">How you have been treated in job interviews says a lot about the people who work for this company. </span></strong></p><span data-dcnode-id="1590" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1579"><span data-dcnode-id="1589" instrument_node="">Being a candidate (internal or external) doesn’t mean interviewers can have inappropriate comments or show a lack of respect to you as a person. </span><br data-dcnode-id="1588"><br data-dcnode-id="1587"><span data-dcnode-id="1586" instrument_node="">Heard them talking in a negative way about previous employees?</span><br data-dcnode-id="1585"><br data-dcnode-id="1584"><span data-dcnode-id="1583" instrument_node="">My advice: </span><strong data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">run away from such companies as those types of behavior tells a lot about their entire culture</span></strong><span data-dcnode-id="1580" instrument_node="">.</span></p><span data-dcnode-id="1578" instrument_node="">
</span><p class="wp-block-coblocks-highlight" data-dcnode-id="1575"><mark class="wp-block-coblocks-highlight__content" data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">I’ve personally experienced unprofessional behavior when was interviewing for a junior role at one of the biggest pharmaceutical company in Poland. That happened many years ago, but I still remember it: </span></mark></p><span data-dcnode-id="1574" instrument_node="">
</span><p class="wp-block-coblocks-highlight" data-dcnode-id="1568" style="font-size:16px"><mark class="wp-block-coblocks-highlight__content" data-dcnode-id="1569" style="font-size:16px"><span data-dcnode-id="1573" instrument_node="">Interviewers were late for almost 20 minutes (didn’t apologize), didn’t read my CV before the meeting, looked down on me all the time, made me feel dumb, and didn’t make any notes. </span><br data-dcnode-id="1572"><br data-dcnode-id="1571"><span data-dcnode-id="1570" instrument_node="">I was too shy back then, but nowadays I’d just walk out of the meeting if such a situation would take place.</span></mark></p><span data-dcnode-id="1567" instrument_node="">
</span><h2 data-dcnode-id="1566"></h2><span data-dcnode-id="1565" instrument_node="">
</span><h3 data-dcnode-id="1562" id="3-lack-of-clarity-regarding-your-role"><strong data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">3. Lack of clarity regarding your role</span></strong></h3><span data-dcnode-id="1561" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1554"><span data-dcnode-id="1560" instrument_node="">The job description provided only high-level overview of the role. You’re trying to get better understanding of what exactly you’ll be doing but no one can really answer your questions?</span><br data-dcnode-id="1559"><br data-dcnode-id="1558"><span data-dcnode-id="1557" instrument_node="">Instead you hear: Don’t worry about it, we will figure it out later. </span><strong data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Treat it as a warning sign. </span></strong></p><span data-dcnode-id="1553" instrument_node="">
</span><p class="wp-block-coblocks-highlight" data-dcnode-id="1550" style="font-size:16px"><mark class="wp-block-coblocks-highlight__content" data-dcnode-id="1551" style="font-size:16px"><span data-dcnode-id="1552" instrument_node="">No matter if you’re interviewing for an entry-level role or you’re a C-level executive, the people you’re meeting throughout your recruitment process should be able to explain the responsibilities. </span></mark></p><span data-dcnode-id="1549" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1546"><strong data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">If they don’t have clarity regarding your role, is there a career path at that company?</span></strong></p><span data-dcnode-id="1545" instrument_node="">
</span><h2 data-dcnode-id="1544"></h2><span data-dcnode-id="1543" instrument_node="">
</span><h3 data-dcnode-id="1540" id="4-no-opportunity-to-ask-your-questions"><strong data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">4. No opportunity to ask your questions</span></strong></h3><span data-dcnode-id="1539" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Went through a few rounds of the interview process where you answered tons of questions but still didn’t have a chance to ask yours? </span></p><span data-dcnode-id="1536" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1532"><span data-dcnode-id="1535" instrument_node="">As I’ve mentioned in the beginning (and in my other articles), </span><strong data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">the recruitment process is for both candidate and company: you should have equal chances to learn about each other.</span></strong></p><span data-dcnode-id="1531" instrument_node="">
</span><figure class="wp-block-pullquote" data-dcnode-id="1520"><blockquote data-dcnode-id="1521"><p data-dcnode-id="1522"><span data-dcnode-id="1530" instrument_node="">Check my 2 other articles:</span><br data-dcnode-id="1529"><a data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elaintech.com/2021/09/13/interview-preparation-checklist/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1528" instrument_node="">“Job interview preparation checklist”</span></a><span data-dcnode-id="1526" instrument_node=""> and</span><br data-dcnode-id="1525"><a data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elaintech.com/2021/10/18/questions-to-ask-in-a-job-interview/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1524" instrument_node="">“Questions to ask in a job interview”</span></a></p></blockquote></figure><span data-dcnode-id="1519" instrument_node="">
</span><h3 data-dcnode-id="1516" id="5-are-they-interested-in-what-you-have-to-say"><strong data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">5. Are they interested in what you have to say?</span></strong></h3><span data-dcnode-id="1515" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1512"><strong data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">You can tell a lot about the people you’re meeting by observing their body language, whether they’re maintaining an eye contact with you and their overall  behaviour during an interview.</span></strong></p><span data-dcnode-id="1511" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Do they really listen to your answers and ask the right follow-up questions? Or do you have an impression that they’re bored and just wait for a meeting to be over?</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">If you feel like you’re not being heard or the person is playing with their mobile phone then it’s a clear red flag.</span></p><span data-dcnode-id="1505" instrument_node="">
</span><h2 data-dcnode-id="1504"></h2><span data-dcnode-id="1503" instrument_node="">
</span><h3 data-dcnode-id="1497" id="6-energy-during-the-interview-process"><strong data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">6. Energy during the interview</span></strong><span data-dcnode-id="1500" instrument_node=""> </span><strong data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">process</span></strong></h3><span data-dcnode-id="1496" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Do you know this feeling when you meet someone and immediately feel a “good energy”? They have a smile on their face, listen to you, and are genuinely interested in what you have to say.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1490"><strong data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Same applies for the recruitment process.</span></strong></p><span data-dcnode-id="1489" instrument_node="">
</span><p class="wp-block-coblocks-highlight" data-dcnode-id="1483" style="font-size:16px"><mark class="wp-block-coblocks-highlight__content" data-dcnode-id="1484" style="font-size:16px"><span data-dcnode-id="1488" instrument_node="">Once I found myself sitting in one room with 2 Recruiters who were bombarding me with questions. </span><strong data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">I was a candidate who came with positive energy, but after 5 minutes I was just praying for that meeting to be over.</span></strong><span data-dcnode-id="1485" instrument_node=""> </span></mark></p><span data-dcnode-id="1482" instrument_node="">
</span><p class="wp-block-coblocks-highlight" data-dcnode-id="1463" style="font-size:16px"><mark class="wp-block-coblocks-highlight__content" data-dcnode-id="1464" style="font-size:16px"><span data-dcnode-id="1481" instrument_node="">I was looking for a job back then but </span><strong data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">I just couldn’t imagine myself working for 8 hours/day with those people.</span></strong><span data-dcnode-id="1478" instrument_node=""> </span><br data-dcnode-id="1477"><br data-dcnode-id="1476"><span data-dcnode-id="1475" instrument_node="">Why? “Poker face” the entire time, no reaction to what I was saying (be it good or bad news). I felt like they just want to finish the entire list of questions they have prepared no matter what. They were just “ticking the boxes” and not really interested in what I have to say.</span><br data-dcnode-id="1474"><br data-dcnode-id="1473"><span data-dcnode-id="1472" instrument_node="">I remember leaving the building with a fear that maybe I won’t be able to make it back into the recruitment.</span><br data-dcnode-id="1471"><br data-dcnode-id="1470"><span data-dcnode-id="1469" instrument_node="">How wrong I was! 1 hour later I had another interview, also with 2 people, but OMG, what a difference and a great experience it was!</span><br data-dcnode-id="1468"><span data-dcnode-id="1467" instrument_node=""> </span><br data-dcnode-id="1466"><span data-dcnode-id="1465" instrument_node="">I knew immediately that this is the company I’d love to join! (I got a job offer the next day and I accepted it). </span></mark></p><span data-dcnode-id="1462" instrument_node="">
</span><h3 data-dcnode-id="1459" id="7-unable-to-meet-with-your-future-manager"><strong data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">7. Unable to meet with your future Manager</span></strong></h3><span data-dcnode-id="1458" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Not being able to talk to my future Manager would be on the top of my list with the red flags in a job interview!</span></p><span data-dcnode-id="1455" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1450"><span data-dcnode-id="1454" instrument_node="">If that person doesn’t have time to meet with you now, if he/she is not interested in the recruitment process, then you should ask yourself this question: </span><strong data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">“What will happen once I join the team?”</span></strong><span data-dcnode-id="1451" instrument_node="">.</span></p><span data-dcnode-id="1449" instrument_node="">
</span><h2 data-dcnode-id="1448"></h2><span data-dcnode-id="1447" instrument_node="">
</span><h3 data-dcnode-id="1444" id="8-lots-of-changes-within-the-team-company-in-a-short-period-of-time"><strong data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">8. Lots of changes within the team/company in a short period of time</span></strong></h3><span data-dcnode-id="1443" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1437"><span data-dcnode-id="1442" instrument_node="">Make sure to </span><strong data-dcnode-id="1439"><a data-dcnode-id="1440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elaintech.com/2021/10/18/questions-to-ask-in-a-job-interview/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1441" instrument_node="">ask your questions in a job interview</span></a></strong><span data-dcnode-id="1438" instrument_node="">, especially when it comes to your future team.</span></p><span data-dcnode-id="1436" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1433"><em data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">How long are people working there?  Why the previous employee left?</span></em></p><span data-dcnode-id="1432" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">If you hear about high rotation and interviewers can’t provide many insights then it might be a sign which you don’t want to miss.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">—————</span></p><span data-dcnode-id="1426" instrument_node="">
</span><h3 data-dcnode-id="1422" id="trust-your-gut-feeling"><strong data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Trust your “gut feeling</span></strong><span data-dcnode-id="1423" instrument_node="">“</span></h3><span data-dcnode-id="1421" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">You’re overwhelmed with emotions while going through the interviews. And it’s totally normal. </span></p><span data-dcnode-id="1418" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">It’s good to calm down whenever you need to make an important decision.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">But I’d say that you shouldn’t be afraid to trust your “gut feeling”. Sometimes you can’t name the things, but you know that something just isn’t right.</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1411"></p><span data-dcnode-id="1410" instrument_node="">
</span><p class="has-normal-font-size" data-dcnode-id="1402"><em data-dcnode-id="1403"><em data-dcnode-id="1406"><span data-dcnode-id="1409" instrument_node="">Thanks for reading &amp; have a nice day,</span><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node="">Ela</span></em><br data-dcnode-id="1405"><span data-dcnode-id="1404" instrument_node=""> ————-</span></em></p><span data-dcnode-id="1401" instrument_node="">

She went through a career change</span></a></strong><span data-dcnode-id="1382" instrument_node=""> and </span><strong data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">became a Software Engineer</span></strong><span data-dcnode-id="1379" instrument_node="">. She’s currently based in Prague where she </span><strong data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">works at Microsoft Teams team</span></strong><span data-dcnode-id="1376" instrument_node="">. </span><br data-dcnode-id="1375"><br data-dcnode-id="1374"><span data-dcnode-id="1373" instrument_node="">Her career tips have helped people </span><strong data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">break into the tech industry</span></strong><span data-dcnode-id="1370" instrument_node="">, </span><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">change careers</span></strong><span data-dcnode-id="1367" instrument_node="">, and </span><strong data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">get jobs in top tech companies!</span></strong><br data-dcnode-id="1364"><br data-dcnode-id="1363"><span data-dcnode-id="1362" instrument_node="">Connect with her on </span><strong data-dcnode-id="1359"><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/elamoscicka/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1361" instrument_node="">LinkedIn</span></a></strong><span data-dcnode-id="1358" instrument_node="">, </span><strong data-dcnode-id="1355"><a data-dcnode-id="1356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/elamoscicka" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1357" instrument_node="">Twitter</span></a></strong><span data-dcnode-id="1354" instrument_node="">, and </span><strong data-dcnode-id="1351"><a data-dcnode-id="1352" href="https://chatnoir-webcontent.
