</span><div class="img-caption right article-img" data-dcnode-id="2020"><span data-dcnode-id="2023" instrument_node="">
</span><img alt="7 job-posting red flags" class="img-responsive img-md" data-dcnode-id="2022" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//coda.newjobs.com/api/imagesproxy/ms/cms/careeradvice/images/12.jpg&amp;raw"><span data-dcnode-id="2021" instrument_node="">
</span></div><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Wondering whether a job post is worth applying to? If you're afraid that a job ad sounds either too good to be true or just plain fishy, certain cautionary signs in the posting could confirm your suspicion. Of course, one or two of these red flags don't always mean something is wrong, but if the clues start to pile up, you may want to proceed with caution. Here are seven signs to watch out for.&nbsp; &nbsp;&nbsp;</span></p><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="1919"><strong data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">1. The job was posted months ago, or the job is constantly reposted.</span></strong><br data-dcnode-id="2013"><span data-dcnode-id="2012" instrument_node="">
</span><br data-dcnode-id="2011"><span data-dcnode-id="2010" instrument_node="">
Often, the reason for this is perfectly legit: A company may simply have lots of similar positions to fill, or it may be looking to fill typically high-turnover positions (such as seasonal </span><a data-dcnode-id="2008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.monster.com/career-advice/article/hospitality-opportunities-older-workers" target=""><span data-dcnode-id="2009" instrument_node="">hospitality jobs</span></a><span data-dcnode-id="2007" instrument_node="">). But if that's not the case, this may be a sign that the company has put the position </span><a data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.monster.com/career-advice/article/when-a-job-offer-is-put-on-hold-hot-jobs" target=""><span data-dcnode-id="2006" instrument_node="">on hold</span></a><span data-dcnode-id="2004" instrument_node=""> or has high turnover for reasons that might raise concern. And sometimes companies will collect resumes just for the sake of gathering information about current salary conditions. But it’s also true the employer might be waiting for the perfect match, so if you're it, you'll want to apply.</span><br data-dcnode-id="2003"><span data-dcnode-id="2002" instrument_node="">
</span><br data-dcnode-id="2001"><span data-dcnode-id="2000" instrument_node="">
</span><strong data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">2. The post says, "Company confidential." </span></strong><br data-dcnode-id="1997"><span data-dcnode-id="1996" instrument_node="">
</span><br data-dcnode-id="1995"><span data-dcnode-id="1994" instrument_node="">
You should ask yourself the reason for the secrecy. Is the position not really open? Is an agency collecting resumes without a company’s consent? There may be no cause for concern; however, a post like this makes it difficult to </span><a data-dcnode-id="1992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.monster.com/career-advice/article/customize-your-resume-for-results" target=""><span data-dcnode-id="1993" instrument_node="">tailor your resume</span></a><span data-dcnode-id="1991" instrument_node="">&nbsp;and conduct the appropriate </span><a data-dcnode-id="1989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.monster.com/career-advice/article/interview-company-research" target=""><span data-dcnode-id="1990" instrument_node="">company research</span></a><span data-dcnode-id="1988" instrument_node="">.</span><br data-dcnode-id="1987"><span data-dcnode-id="1986" instrument_node="">
</span><br data-dcnode-id="1985"><span data-dcnode-id="1984" instrument_node="">
</span><strong data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">3. The post says, "Fax your resume to…"</span></strong><br data-dcnode-id="1981"><span data-dcnode-id="1980" instrument_node="">
</span><br data-dcnode-id="1979"><span data-dcnode-id="1978" instrument_node="">
This is a sign that the company isn't keeping up with the times. Then again, the company may just be testing your ability to follow instructions.</span><br data-dcnode-id="1977"><span data-dcnode-id="1976" instrument_node="">
</span><br data-dcnode-id="1975"><span data-dcnode-id="1974" instrument_node="">
</span><strong data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">4. The post contains phrases like "must be extremely hardworking" and "must be able to handle extremely high stress."</span></strong><br data-dcnode-id="1971"><span data-dcnode-id="1970" instrument_node="">
</span><br data-dcnode-id="1969"><span data-dcnode-id="1968" instrument_node="">
An ability to work hard should be a given, so if a post says "extremely hardworking," know that it means "</span><em data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">extreeeeeemely</span></em><span data-dcnode-id="1965" instrument_node=""> hardworking." Such a </span><a data-dcnode-id="1963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.monster.com/career-advice/article/ideal-work-environment-question" target=""><span data-dcnode-id="1964" instrument_node="">work environment</span></a><span data-dcnode-id="1962" instrument_node="">&nbsp;might be perfect for you, and lots of high-stress jobs are very rewarding. But if a job post focuses on the difficulty of a job (instead of selling the company as a great place to work to attract the best candidates), you should at least go into the application process knowing that your work-life balance will not be a priority at this company.</span><br data-dcnode-id="1961"><span data-dcnode-id="1960" instrument_node="">
</span><br data-dcnode-id="1959"><span data-dcnode-id="1958" instrument_node="">
</span><strong data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">5. The post lists the salary as "up to $500K per year."</span></strong><br data-dcnode-id="1955"><span data-dcnode-id="1954" instrument_node="">
</span><br data-dcnode-id="1953"><span data-dcnode-id="1952" instrument_node="">
This is another matter of simply being aware of what you're signing up for. If a job post talks about the salary in terms of "up to," then the job pays on commission. Just be sure to ask about base salary and average incomes when you talk to the hiring manager. (Another phrase to watch out for in this vein is "Be your own boss!")</span><br data-dcnode-id="1951"><span data-dcnode-id="1950" instrument_node="">
</span><br data-dcnode-id="1949"><span data-dcnode-id="1948" instrument_node="">
</span><strong data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">6. The post says the successful candidate will need to work for free or for less than minimum wage for a trial period. </span></strong><br data-dcnode-id="1945"><span data-dcnode-id="1944" instrument_node="">
</span><br data-dcnode-id="1943"><span data-dcnode-id="1942" instrument_node="">
Employment tests are often completely legitimate. For instance, if you're applying for a job that requires writing press releases, a company might ask you to write a sample press release. And both paid trial periods and </span><a data-dcnode-id="1940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.monster.com/career-advice/article/adult-internships"><span data-dcnode-id="1941" instrument_node="">unpaid internships</span></a><span data-dcnode-id="1939" instrument_node="">&nbsp;are common in some industries. But the US Department of Labor is clear that any productive labor be paid under minimum-wage laws, and that an internship cannot be a condition of employment at a company.</span><br data-dcnode-id="1938"><span data-dcnode-id="1937" instrument_node="">
</span><br data-dcnode-id="1936"><span data-dcnode-id="1935" instrument_node="">
</span><strong data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">7. The job post asks you to submit sensitive information.</span></strong><br data-dcnode-id="1932"><span data-dcnode-id="1931" instrument_node="">
</span><br data-dcnode-id="1930"><span data-dcnode-id="1929" instrument_node="">
Being smart online means guarding information such as your Social Security number and bank-account information until you're sure that the entity asking for it is on the up and up. Until a job offer is in the works, a legitimate company has no need for private information such as this.</span><br data-dcnode-id="1928"><span data-dcnode-id="1927" instrument_node="">
</span><br data-dcnode-id="1926"><span data-dcnode-id="1925" instrument_node="">
</span><em data-dcnode-id="1920"><span data-dcnode-id="1924" instrument_node="">If you suspect that a Monster.com job post is a scam or unethical, we want to hear about it. Flag it using the “Report this job” button on every job posting. Check out our </span><a data-dcnode-id="1922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//monster.secure.force.com/ekb/EKBHome%3Fbrand%3Dseeker"><span data-dcnode-id="1923" instrument_node="">Monster Security Center</span></a><span data-dcnode-id="1921" instrument_node=""> for more information.</span></em></p><span data-dcnode-id="1918" instrument_node="">
</span></div><span data-dcnode-id="1916" instrument_node="">
</span><br data-dcnode-id="1915"><span data-dcnode-id="1914" instrument_node="">
