</span><h1 data-dcnode-id="1205" style="text-align: center"><span data-dcnode-id="1207" instrument_node="">Mold Scams</span><br data-dcnode-id="1206"></h1><span data-dcnode-id="1204" instrument_node="">
</span><span data-dcnode-id="1202" instrument_node="">
</span><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><br data-dcnode-id="1199"></p><p data-dcnode-id="1195"><span data-dcnode-id="1197" instrument_node="">As public knowledge about the health risks of mold has increased, so have the number of mold scams. Of course, there are many reputable, responsible, honest mold remediation professionals out there, but unfortunately, there are also some individuals that will take advantage of people and play on their fears about the health risks of mold exposure. How do you make sure you don’t get taken?</span><br data-dcnode-id="1196"></p><span data-dcnode-id="1194" instrument_node="">
</span><span data-dcnode-id="1192" instrument_node="">
</span><span data-dcnode-id="1190" instrument_node="">
</span><h3 data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Signs That You Might Be Dealing With Mold Remediation Scams</span></h3><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">The following things are often signs of scams, although they might not always indicate a scam, and there are also scammers that don’t do these things. These things should be red flags for you, though, causing you to ask questions or consider finding a different mold remediation professional.</span></p><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Common signs of mold remediation scams include:</span></p><ul data-dcnode-id="1164"><li data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">They offer free mold testing – unfortunately, mold testing costs money. Reputable mold testers typically charge for their services.</span></li><li data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">The same company offers mold testing and mold remediation services – this gives them an incentive to find mold in your home so you will hire them to remove it. It also gives them an incentive to say your home tests negative for mold after they’ve done the work, even if it doesn’t, so that you think they did a good job, even if they didn’t. If the same company does both mold testing and mold remediation, they should have an independent third party reviewing all of their work.</span></li><li data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">They aren’t certified by any reputable mold remediation organizations, such as the Mold Inspection Consulting and Remediation Organization (MICRO), the National Organization of Remediators and Mold Inspectors, or the Professional Mold Inspection Institute (PMII).</span></li><li data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">They want to encapsulate mold with a solid-colored sealant instead of a clear sealant – mold removal professionals that don’t do a good job of removing mold sometimes want to hide the evidence of remaining mold by painting over it with a dark-colored sealant instead of using a clear sealant that allows an inspector to see what was done.</span></li><li data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">They plan to use heat to kill the mold instead of actually removing the mold from your home – this is just not very effective.</span></li><li data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">They can’t or won’t give you any references.</span></li><li data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">They don't put everything in writing.</span></li><li data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">They do not offer any guarantees regarding the effectiveness of their work – not standing behind the work they do is common with mold scams.</span></li><li data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Asking for the entire payment upfront is a common mold scam. A fair payment plan would be 25% on the day the work starts, 25% when the work is half done, and the last 50% after the work is completed and testing done by an independent company shows the property to have acceptable/safe levels of mold.</span></li></ul><span data-dcnode-id="1163" instrument_node="">
