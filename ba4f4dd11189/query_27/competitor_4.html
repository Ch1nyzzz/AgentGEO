</span><h2 data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Beware of scams</span></h2><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1524" instrument_node="">Working from home is very widespread right now due to the coronavirus pandemic. Unfortunately, so is unemployment. It’s a bit of a perfect storm for a type of scam that’s been around for a while: fraudulent “work from home” job offers. Should you get one of these “offers,” here’s a guide to how this scam works, how the prevalence of working from home right now is bolstering it, and how to avoid falling victim. Plus, watch out for these </span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/common-computer-mistakes-stopped-making/"><span data-dcnode-id="1523" instrument_node="">computer mistakes you should have stopped making by now</span></a><span data-dcnode-id="1521" instrument_node="">.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><div class="jw-error jw-reset" data-dcnode-id="1507" id="jwp_ef1e69b63c3814a3346b87d8e3d50c84" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="1508"><div class="jw-icon jw-reset" data-dcnode-id="1514"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="1515" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="1516"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="1509"><div class="jw-error-text jw-reset-text" data-dcnode-id="1510" data-nosnippet="" dir="auto"><span data-dcnode-id="1513" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="1512"></span><span data-dcnode-id="1511" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div><div class="video-content-link" data-dcnode-id="1503" data-player-id="jwp_ef1e69b63c3814a3346b87d8e3d50c84" style="display:none"><a data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/work-from-home-job-scam" rel="nofollow"></a><span class="expand-icon" data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">ⓘ</span></span></div><span data-dcnode-id="1502" instrument_node="">

 1024w, https://www.rd.com/wp-content/uploads/2020/06/POST_GettyImages-1180259937-scaled.jpg?resize=768,512 768w, https://www.rd.com/wp-content/uploads/2020/06/POST_GettyImages-1180259937-scaled.jpg?resize=568,379 568w, https://www.rd.com/wp-content/uploads/2020/06/POST_GettyImages-1180259937-scaled.jpg?resize=1536,1024 1536w, https://www.rd.com/wp-content/uploads/2020/06/POST_GettyImages-1180259937-scaled.jpg?resize=2048,1365 2048w" sizes="(max-width: 2201px) 100vw, 2201px" data-image-analytics='{"licensorName":"Getty Images","credits":"Khosrork\/Getty Images"}' /&gt;</span></noscript><span class="credits-overlay" data-dcnode-id="1478"><span class="image-credit noskim" data-dcnode-id="1479"><a class="image-credit-link" data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gty.im/1180259937" rel="nofollow" target="_blank"><span data-dcnode-id="1481" instrument_node="">Khosrork/Getty Images</span></a></span></span><span data-dcnode-id="1477" instrument_node="">
</span></div><span data-dcnode-id="1475" instrument_node="">
</span><h2 data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">What are “work-from-home” job scams?</span></h2><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">They’re pretty much what they sound like. They’re scams that make it look like you’re being offered a job where you’ll be able to work entirely from home—but there is no job, and they’re actually just trying to steal your money.</span></p><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1468" instrument_node="">While some scammers might be less-than-meticulous with their sham offer, others might go to great lengths to make the offer look real. “They may create fake companies, but they can also spoof real companies,” explains Karim Hijazi, CEO of </span><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prevailion.com/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1467" instrument_node="">Prevailion</span></a><span data-dcnode-id="1465" instrument_node="">. “They may also steal the identities of real people, such as business executives or HR recruiters, in order to fool their victims. They may post on legitimate job sites like CareerBuilder, or they may contact the person directly via email, SMS, or social media sites such as LinkedIn.” So just because an offer is on a legitimate career site doesn’t mean the offer itself is legitimate. If you’re already working from home, make sure you’re following </span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/work-from-home/"><span data-dcnode-id="1464" instrument_node="">the golden rules for WFH</span></a><span data-dcnode-id="1462" instrument_node="">.</span></p><span data-dcnode-id="1460" instrument_node="">
</span></div><span data-dcnode-id="1458" instrument_node="">

</span></div><span data-dcnode-id="1401" instrument_node="">
</span><h2 data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">How is COVID-19 bolstering these scams?</span></h2><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1397" instrument_node="">Again, the pandemic has created a perfect storm for these scams. Sadly, scammers take advantage of the current climate and people’s hardships, and </span><a data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/coronavirus-scam/"><span data-dcnode-id="1396" instrument_node="">COVID-19 is no exception</span></a><span data-dcnode-id="1394" instrument_node="">. “For the first time in our history, virtually every company that can do so is trying to figure out how to keep its employees at home,” Hijazi explains. “There is a very high percentage of people who are actively looking for a job—any job—and plenty more who are keeping their options open in case they’re the next one on the chopping block. As a result, people who wouldn’t normally open a WFH job offer email are more likely to do so now.”</span></p><span data-dcnode-id="1392" instrument_node="">
</span></div><span data-dcnode-id="1390" instrument_node="">
</span><div class="listicle-card" data-dcnode-id="1358"><span data-dcnode-id="1389" instrument_node="">

</span><h2 data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Sign: The job offer just seems way too good to be true</span></h2><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">According to Hijazi, this simple gut feeling might be the strongest indicator that something is wrong. “[The scammer] may offer a very above-average rate, a promised upfront payment or high bonus, easy work, et cetera,” he says. If any of those things strike you as a bit too lofty, they probably are, so make sure you take a close look at all of the details of the offer.</span></p><span data-dcnode-id="1359" instrument_node="">
</span></div><span data-dcnode-id="1357" instrument_node="">

</span><h2 data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Sign: There are spelling and grammar errors</span></h2><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1329" instrument_node="">Yes, anyone can make grammatical errors, but if the job description you’re looking at contains enough errors—or a large enough error, like a misspelling in the name of the company—that it seems like someone&nbsp;</span><em data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">really&nbsp;</span></em><span data-dcnode-id="1326" instrument_node="">should have caught it, the offer might be nothing but a hastily written scam.</span></p><span data-dcnode-id="1324" instrument_node="">

</span><h2 data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">An unfamiliar—or too familiar—email address</span></h2><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">If the offer arrives via email, take a good look at the email address. One red flag is that the address—or any web address included in the offer—ends with an international domain, like “.ru.” (This is the top-level domain for Russia.) Before clicking on any link, hover over it and peek at the domain. If it’s not familiar, don’t click on the link. (And you should avoid clicking on links from unfamiliar email senders regardless!)</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1265" instrument_node="">Interestingly, an email address that’s&nbsp;</span><em data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">too&nbsp;</span></em><span data-dcnode-id="1262" instrument_node="">familiar can also be a warning sign. For instance, a recruiter for a certain company will typically be using a work email for that company—not, say, a Gmail address. While Gmail certainly might be a trusted site and you’d probably be inclined to trust it, consider that a legitimate job recruitment email will most likely come from an email address from the specific company.</span></p><span data-dcnode-id="1260" instrument_node="">
</span></div><span data-dcnode-id="1258" instrument_node="">
</span><div class="listicle-card" data-dcnode-id="1224"><span data-dcnode-id="1257" instrument_node="">

</span></div><span data-dcnode-id="1234" instrument_node="">
</span><h2 data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">You’re encouraged to open attachments</span></h2><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1230" instrument_node="">Attachments are a danger zone for any kind of scam. They’re often “Trojan horses” that contain malware, designed to steal your passwords, install a virus, or otherwise obtain your information and/or money. But, just like fake email and web addresses, they can look convincing. They “may be disguised as a job description, application, or payment transfer request, but actually contain malware,” says Hijazi. If the sender is not someone you recognize or have verified as legitimate, do not open any attachments. Be especially wary if the message specifically tells you to open an attachment or download something. Again, this is a good rule for any email, not just a job offer. For more info, watch out for these </span><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/phishing-email-signs/"><span data-dcnode-id="1229" instrument_node="">signs you’re falling for a phishing email</span></a><span data-dcnode-id="1227" instrument_node="">.</span></p><span data-dcnode-id="1225" instrument_node="">
</span></div><span data-dcnode-id="1223" instrument_node="">

</span></div><span data-dcnode-id="1196" instrument_node="">
</span><h2 data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Stay safe: Do your research</span></h2><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1192" instrument_node="">Luckily, there are plenty of ways to avoid falling victim to a work-from-home scam (or </span><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/how-to-avoid-online-scams/"><span data-dcnode-id="1191" instrument_node="">any online scam</span></a><span data-dcnode-id="1189" instrument_node="">, for that matter). When considering a job offer—whether through email or on a career site—you should first check to make sure the company has a real-looking website, and dig deep for information on the site. “You can…look up the </span><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whois.net/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1188" instrument_node="">WHOIS</span></a><span data-dcnode-id="1186" instrument_node=""> information on the website to see how old it is,” Hijazi recommends. “A website that was only launched in the past few months raises more questions than one which has been around for years.” He also suggests searching for the site on the </span><a data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbb.org/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1185" instrument_node="">Better Business Bureau</span></a><span data-dcnode-id="1183" instrument_node=""> and even on a database of state corporations. If the company doesn’t show up—or if it shows up in a negative light, i.e. people have made complaints about it—it’s likely not legitimate.</span></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">You should also look up the name of the person the email says it’s from—are they a real person, and do they really work for that company? To be ultra-careful, you can even call the company’s HR department to make sure that they really did send you the offer or really do have that job opening. Better safe than sorry!</span></p><span data-dcnode-id="1178" instrument_node="">
</span></div><span data-dcnode-id="1176" instrument_node="">

</span><h2 data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Stay safe: Dig deep for the true email sender</span></h2><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1123" instrument_node="">There’s a simple, but little-known, way to get a good idea if an email is from a legitimate sender. You need to read the email header. Just by doing that, “you can immediately catch a lot of scams that rely on email spoofing to impersonate legitimate companies or organizations,” Hijazi says. To do this, click “show original” (on Gmail) or “view source”; this makes the full header visible. Find the line that says “return-path.” It will show the “true origination point” of the email, he says: “Criminals can easily spoof a legitimate domain, so that what you see in your inbox is ‘</span><span data-dcnode-id="1122" instrument_node="">jsmith@</span><span class="skimlinks-unlinked" data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">wellsfargo.com</span></span><span data-dcnode-id="1119" instrument_node="">.</span><span data-dcnode-id="1118" instrument_node="">’ But the return-path will always tell you the truth.” Again, if the domain here is an unfamiliar one—and, especially, in direct contrast to the one you see in your inbox—the email is not legitimate. Find out the </span><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/what-hackers-can-do-with-email-address/"><span data-dcnode-id="1117" instrument_node="">scary things a hacker can do when they have your email address</span></a><span data-dcnode-id="1115" instrument_node="">.</span></p><span data-dcnode-id="1113" instrument_node="">
</span></div><span data-dcnode-id="1111" instrument_node="">

</span><h2 data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Stay safe: Keep your personal information to yourself</span></h2><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1082" instrument_node="">This is another biggie in today’s climate. In addition to working online much more, we’re also </span><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/fbi-warns-about-this-online-shopping-scam/"><span data-dcnode-id="1081" instrument_node="">shopping online</span></a><span data-dcnode-id="1079" instrument_node=""> and researching and </span><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/support-blm-charities-and-organizations/"><span data-dcnode-id="1078" instrument_node="">donating to charities</span></a><span data-dcnode-id="1076" instrument_node=""> en masse. It’s so easy with just a few clicks to provide personal information—but be careful. Hijazi’s advice? “Don’t provide sensitive personal information like your Social Security Number, bank account number, credit card, etc., to someone you’ve only engaged with remotely.” This is especially true when it comes to </span><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/times-to-never-disclose-social-security-number/"><span data-dcnode-id="1075" instrument_node="">your social security number</span></a><span data-dcnode-id="1073" instrument_node="">, which you really shouldn’t be being asked for on anything but a government form, and&nbsp;</span><em data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">certainly&nbsp;</span></em><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/never-give-social-security-number-over-phone/"><span data-dcnode-id="1070" instrument_node="">not over the phone</span></a><span data-dcnode-id="1068" instrument_node="">. Before sharing information like this online, make sure you’re absolutely certain the site is legitimate.</span></p><span data-dcnode-id="1066" instrument_node="">
</span></div><span data-dcnode-id="1064" instrument_node="">
</span><div class="listicle-card" data-dcnode-id="1026"><span data-dcnode-id="1063" instrument_node="">

07/Stay-safe-Safeguard-against-malware.jpg?resize=768,512 768w, https://www.rd.com/wp-content/uploads/2020/07/Stay-safe-Safeguard-against-malware.jpg?resize=568,379 568w, https://www.rd.com/wp-content/uploads/2020/07/Stay-safe-Safeguard-against-malware.jpg?resize=1536,1024 1536w, https://www.rd.com/wp-content/uploads/2020/07/Stay-safe-Safeguard-against-malware.jpg?resize=2048,1366 2048w" sizes="(max-width: 2500px) 100vw, 2500px" data-image-analytics='{"licensorName":"Getty Images","credits":" 4zevar\/Getty Images"}' /&gt;</span></noscript><span class="credits-overlay" data-dcnode-id="1042"><span class="image-credit noskim" data-dcnode-id="1043"><a class="image-credit-link" data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/detail/illustration/laptop-with-checkmark-vector-illustration-royalty-free-illustration/1126711254" rel="nofollow" target="_blank"><span data-dcnode-id="1045" instrument_node=""> 4zevar/Getty Images</span></a></span></span><span data-dcnode-id="1041" instrument_node="">
</span></div><span data-dcnode-id="1039" instrument_node="">
</span><h2 data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Stay safe: Safeguard against malware</span></h2><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1035" instrument_node="">Threats of getting a computer virus or being scammed are omnipresent. Make sure your computer has strong antiviral software, and </span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/article/ignore-security-warnings/"><span data-dcnode-id="1034" instrument_node="">don’t ignore “virus” or “update” warnings on your computer</span></a><span data-dcnode-id="1032" instrument_node="">. Make sure your email’s spam filter is working. Hijazi even recommends using a separate device for banking from the one you use for email, if possible. For more tips, follow these </span><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rd.com/list/10-ways-to-protect-yourself-online/"><span data-dcnode-id="1031" instrument_node="">rules that make you less likely to be a target for scammers</span></a><span data-dcnode-id="1029" instrument_node="">.</span></p><span data-dcnode-id="1027" instrument_node="">
</span></div><span data-dcnode-id="1025" instrument_node="">
