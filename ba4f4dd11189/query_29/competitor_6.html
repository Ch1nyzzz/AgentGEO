</span><div class="medium-6 cell" data-dcnode-id="545"><div class="text-content text-content--align-default component-margin--medium" data-dcnode-id="546" data-widget="text-content"><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Unemployment insurance fraud is taken very seriously. The federal and state governments ask citizens to report anyone who is knowingly receiving payments under fraudulent circumstances. It is a crime to begin or continue receiving unemployment benefit payments under false pretenses. To report unemployment insurance fraud, contact your local State Unemployment Agency to file a formal report.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="564" instrument_node="">There are many ways </span><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eligibility.com/unemployment/avoiding-unemployment-fraud"><span data-dcnode-id="563" instrument_node="">individuals commit unemployment insurance fraud</span></a><span data-dcnode-id="561" instrument_node="">. Committing fraud involves submitting false information regarding any/all of the following: income earned, availability to work, ability to work, unreported travel or sick time, job offer refusals, etc. Falsifying or purposely omitting information regarding any item reported on your weekly claim is considered fraud.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Most often, an individual commits fraud by not reporting income. In this case, an individual is in fact working, but continues to receive unemployment payments. By law, all income must be reported on a recipient’s weekly claims. Failure to do so is considered fraud.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="555" instrument_node="">Each State - including </span><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eligibility.com/unemployment/new-york-ny-unemployment-benefits"><span data-dcnode-id="554" instrument_node="">NYS Unemployment</span></a><span data-dcnode-id="552" instrument_node=""> - Unemployment Office uses a variety of tools to detect fraud along with public reporting, including employer hiring reports, quality control audits, government records, etc. Alternate strategies for detecting fraud are constantly being developed.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">If you know an individual who is employed, including in a part-time, freelance, short-term, or “under the table” position, and they do not report this income on their weekly claim, you should alert your State Unemployment Agency.</span></p><span data-dcnode-id="547" instrument_node="">
</span></div></div><span data-dcnode-id="544" instrument_node="">
</span><span data-dcnode-id="542" instrument_node="">

</span><div class="medium-12 cell" data-dcnode-id="493"><div class="text-content text-content--align-default component-margin--medium" data-dcnode-id="499" data-widget="text-content"><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">You may be given the option to report anonymously, though some agencies will ask for contact information. You should provide the agency with as much information about the fraudulent individual in question as possible when making your report. Expect to share his or her name, address, phone number, employer, and estimated income (if you know it).</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="511" instrument_node="">If a person is convicted of fraud they are liable for repaying the employment benefits received and will often incur a penalty fee. They may not collect </span><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eligibility.com/unemployment"><span data-dcnode-id="510" instrument_node="">unemployment benefits</span></a><span data-dcnode-id="508" instrument_node=""> for a time specified by the state where the fraud was committed. In some cases, investigators may even pursue criminal prosecution. Texas, for example, often prosecutes unemployment insurance fraud at the felony level.</span></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Employers can also commit unemployment insurance fraud by avoiding paying unemployment tax. This happens when an employer pays employees “under the table,” misclassifies workers as independent contractors or moves workers between different payrolls. Employer unemployment insurance fraud encourages illegal wage and hours worked practices, diminished health and safety standards and unbalanced competition—creating a significant negative effect on employees and fellow employers.</span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">If you know an individual or employer who is committing unemployment insurance fraud, contact your local State Unemployment Agency.</span></p><span data-dcnode-id="500" instrument_node="">
