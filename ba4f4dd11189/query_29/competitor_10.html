</span><p data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">I am a victim of windshield scam. A person came up to me at a car wash and said that his company was in the area, and they would fix your windshield.  I asked how much would it cost, and he said it was free.  He asked to see my insurance information to make sure that I was not driving around without insurance.  So I let him see my insurance information, and now the windshield company is suing me.  They filled a claim with my insurance company, and it was denied.  My insurance company sent me a letter so that is when I found out about what this company.  They said that they replaced the windshield when it only had a small spot when an acorn hit my windshield.  They wanted to charge me $187. 00 for not even 5 minutes of work. These people are trying to scam my insurance company and me.  I am reporting them to the Fraud bureau.</span></p><span data-dcnode-id="2062" instrument_node="">

</span><p data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Report them to State Attorney’s office for the county she bought it in; report them to Florida Highway Patrol and DMV for county she bought in esp if they lied to her about condition; file with Atty Gen; BBB; Ripoff Report; People Claim; Scam Guard; if all else fails try the Press, the TV station in her area. Look up their name and address to see if anybody else has filed claim. I just had major fraud by car dealer who lied about car’s condition, it needed a new engine and doesn’t run–the only money I had and they had me come all the way to get it. They forged the name of somebody else they had bought the car from knowing it was a dangerous wreck and needed a new engine. He was honest when he sold it to them. They never did repairs and I asked for refund within one hour but had no address since they had me pay their mech. He had lied in text messages. They never did proper Title Transfer and Notice of Sale was in the name of the guy they bought it from not theirs. He had sold it to mechs because it needed work. He had no idea they had forged his name, address, and signature plus put it up for sale on their lot for $5500 more than what they paid. He sold it cheap to them. I could have been killed because of its condition. It was very dangerous to drive and I had no idea it had engine problems. They had said it was a sensor when I wanted refund. I was pressured to buy it in their dealership office and they wouldn’t let me take it to outside mech. They kept lying and since they were speaking in a foreign language I didn’t  understand. I wanted another mech to look at it but they wouldn’t let me. I wanted refund when I found out at FL DMV but they wouldn’t let me. Since I had no address for their mech and it was done on dealership lot I wanted to return it. They said it wasn’t their fault it was his but they were the ones who had advertised it in first place putting up the photos. I haven’t been able to get out of the house because of their fraud. They knew it was all the money I had and I needed this car for school, work, etc. it’s very serious situation since there is no public transportation here. I can’t get to doctor, pharmacy, store, etc. Then mech here stole car repair money on top of what they did, raped me, stole credit cards after raping me again, stole my only protection. So I had their fraud, his fraud, and then another one’s fraud. They didn’t put their car dealership name on the Notice of Sale nor do Title Transfer on purpose so they could do this to somebody. They even changed the Carfax to remove the wrecks it had been in they never disclosed.</span></p><span data-dcnode-id="1810" instrument_node="">

</span><p data-dcnode-id="1706"><span data-dcnode-id="1731" instrument_node="">My Question Is.</span><br data-dcnode-id="1730"><span data-dcnode-id="1729" instrument_node="">
Is it legal to have two final hearings on an Ordinance #230-M?</span><br data-dcnode-id="1728"><span data-dcnode-id="1727" instrument_node="">
When on Feb 12,1991 #230-M was Tabled INDEFINITELY.( closer of a street )</span><br data-dcnode-id="1726"><span data-dcnode-id="1725" instrument_node="">
Some how Resurrected for a total different Use.</span><br data-dcnode-id="1724"><span data-dcnode-id="1723" instrument_node="">
On August 13,1991 Again another final hearing on #230-M to Adopt The Comprehension Plan, 6 Months After being Tabled INDEFINITELY.</span><br data-dcnode-id="1722"><span data-dcnode-id="1721" instrument_node="">
 ( I thought Indefinitely was forever )</span><br data-dcnode-id="1720"><span data-dcnode-id="1719" instrument_node="">
And on Aug 13 The City manager Quoted Saying in Minutes that the City Planning &amp; Zoning on August 6,1991 had a Unanimous Vote for Approval.</span><br data-dcnode-id="1718"><span data-dcnode-id="1717" instrument_node="">
But it is NOT on the Agenda, there Is NO Proof  that The City ever had a Vote for Approval.</span><br data-dcnode-id="1716"><span data-dcnode-id="1715" instrument_node="">
( See Attachments )</span><br data-dcnode-id="1714"><span data-dcnode-id="1713" instrument_node="">
Is This or it This NOT Legal?</span><br data-dcnode-id="1712"><span data-dcnode-id="1711" instrument_node="">
According to The City of Clermont’s Own Codes of Ordnance Sec.1-14. Altering Code.</span><br data-dcnode-id="1710"><span data-dcnode-id="1709" instrument_node="">
‘It shall be Unlawful for any person or persons, To Alter, Change, Add, Delete, Amend , Any portion of a Ordnance it is thereby FRAUD.’</span><br data-dcnode-id="1708"><span data-dcnode-id="1707" instrument_node="">
So is The City of Clermont’s Comprehensive. Plan is based on a premise of FRAUD?</span></p><span data-dcnode-id="1705" instrument_node="">

</span><p data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">I was scammed by a car dealership and his mechanic. They bought a dangerous wreck with major engine problems that was a Manufacturer’s Lemon for $500 from a private seller. They advertised it online as being worth $5100 more than it was worth and what they paid. A junker said it was $140. They lied in their online ad, their Notice of Sale was forged with the original Seller’s name,address, signature he never signed. They didn’t do a Title Transfer ouf of original guy’s name so they could claim he sold it to me even though I never met them. They knew it could kill somebody or be killed in the condition it was in which they lied about. They knew it needed a completely new engine. I demanded a refund within one hour because it had 225,000 miles difference between Title and Odometer. They wouldn’t let me take it outside mech. Both their mechs said it had no engine, transmission, frame, or electrical damage. I wanted a refund within ONE hour because of all of this. I never saw Title before I paid. Then it was in somebody else’s name. They wore religious clothing pretending they were religious and devout, wouldn’t cheat anybody. It turns out they did this all the time and one of their locations got its license suspended. I filed with BBB, FTC, Consumer Law of Atty Gen, Senior v. Crime, Mayor of Town they did business in, State Atty, FHP, DMV Fraud division. I have text messages and Notarized Affidavits from people that saw their misleading ad which one was another car dealer. I can’t get out of house to go anywhere because of the. A mech here said it wasn’t worth repairing and would cost more to do so than what I paid for it. They spoke in a foreign language so I wouldn’t understand. The Carfax they never let me see either showed the wrecks it had been in, that it had been a fleet car, had diff between odometer and title. Their ins adjuster changed the Carfax to remove mention of the wreck, the 225,000 mile diff between Odometer and Title, that it had been a fleet car. She ignored the fact they fraudulently signed the Notice of Sale and the failure to do a Title Transfer.</span></p><span data-dcnode-id="1625" instrument_node="">

</span><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Home Building Fraud -Florida is number one in Fraud for the United States. Sadly it appears to me that while Florida claims to be proactive in dealing with criminal fraud, it’s not. Criminals and crooked lawyers see old people retiring with money as a challenge to separate the two. Most policing agencies just try to pass fraud complaints off to other agencies. Not my jurisdiction! That’s a civil complaint! Home builder associations claim to guarantee builders in Cape Coral , oh but not that builder! They claim your fraud is not criminal but you have to pursue it civilly by hiring a lawyer.  Law enforcement is a joke and makes all their easy money giving traffic tickets. Florida has three things, land, lawyers and warm weather. The realtors help stay employed selling repossessed land and property. The lawyers who run the system see making money representing both sides of fraud cases. Too bad all the criminals like warm weather also. Why doesn’t Florida require surety bonds for building new homes?  Lose via fraud over $100,000 in a home build and you,d think twice about what it cost for a surety bond. The system condones this fraud. The lien / commencement notice system doesn’t work. The trades are getting ripped off. The home owner that signs a commencement notice with a contractor is giving the home builders a license to steal. That’s all right as long as the lawyers make money. Even if a home builder files bankruptcy they often just change the company name and go back into business. I wasn’t the first to get swindled in a real estate purchase in the state of Florida and won’t be the last. What is the definition of insanity – doing the same thing over and over and expecting a different result.  I guess we are as stupid as the criminals think we are. A couple years ago one of Cape Coral claim to fame was that it had no crime. They just didn’t look very hard or the criminals thought it was an advertisement for employment hear in paradise.</span></p><span data-dcnode-id="1465" instrument_node="">

</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">I am writing from Alberta, Canada.    I became involved with gsf Global Service.  My master card was charged  in Aug., 2016, again in Nov.2016 and again in Dec., 2016.  I spoke by telephone with a lady and I was under the impression that amends were being made  Last month (first part of June, I believe) I was phoned by a man (and I specifically asked if he were calling from gsf and his reply was to the affirmative.)  He wanted more money and when I said that there was no way that I was giving  any more money and besides I had a new master card number.  That did not matter they could still charge me and rudely hung up.   Certain enough, although it is under dispute, $693.68 is being added to my June statement.  When I asked it be not paid , as my bills are automatically paid at the bank, there was no way that it could not be avoided.  I have “googled” the company’s name and it would seem that they have skipped the country as there is no mention of them.  Hence I am unable to phone them..  If I pay this amount , due July 20, I am certain I shall never have it reimbursed, even if it is fraud.  What suggestions do you have?</span></p><span data-dcnode-id="1385" instrument_node="">
