node-id="969" instrument_node=""> </span></li><span data-dcnode-id="967" instrument_node=""> </span><li data-dcnode-id="959"><span data-dcnode-id="966" instrument_node=""> </span><a aria-label="Link to Notary Signature Line Information" data-dcnode-id="961" data-event="right rail " data-info="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//legalbeagle.com/6300945-notary-signature-line-information.html"><span data-dcnode-id="965" instrument_node=""> </span><span data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Notary Signature Line Information</span></span><span data-dcnode-id="962" instrument_node=""> </span></a><span data-dcnode-id="960" instrument_node=""> </span></li><span data-dcnode-id="958" instrument_node=""> </span><li data-dcnode-id="950"><span data-dcnode-id="957" instrument_node=""> </span><a aria-label="Link to Immigration Consultant Requirements" data-dcnode-id="952" data-event="right rail " data-info="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//legalbeagle.com/6540842-immigration-consultant-requirements.html"><span data-dcnode-id="956" instrument_node=""> </span><span data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Immigration Consultant Requirements</span></span><span data-dcnode-id="953" instrument_node=""> </span></a><span data-dcnode-id="951" instrument_node=""> </span></li><span data-dcnode-id="949" instrument_node=""> </span></ul><span data-dcnode-id="947" instrument_node=""> </span></div><span data-dcnode-id="945" instrument_node=""> </span></div><div class="article-summary" data-dcnode-id="941"><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">A notary is a public official, typically licensed by secretaries of state, who certify documents, such as wills, affidavits, divorce papers and other legal documents. If a notary public misrepresents facts deliberately -- for example, by stating that someone signed a document in person when they were not actually present -- this may constitute fraud.</span></p></div><span data-dcnode-id="940" instrument_node=""> </span><div class="inline-parent-container" data-dcnode-id="927"><span data-dcnode-id="939" instrument_node=""> </span><div data-ad-unit-name="adsense-inline-link" data-dcnode-id="938"></div><span data-dcnode-id="937" instrument_node=""> </span><div data-ad-unit-name="adsense-inline-has-loaded" data-dcnode-id="929"><span data-dcnode-id="936" instrument_node="">

</span></div></div><span data-dcnode-id="928" instrument_node=""> </span></div><span data-dcnode-id="926" instrument_node=""> </span><div class="section section-1" data-dcnode-id="919"><h2 data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Reporting Notary Fraud</span></h2><div class="section" data-dcnode-id="921"><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">The exact process for reporting notary fraud will vary based on the state where the incident took place. Generally, however, you may be able to report these instances of fraud by working with both your local police and the secretary of state. To file a police report alleging fraud, you may be asked to appear in person and talk to a police officer about the details of the notary's actions. The police may ask you to provide evidence supporting your claims, such as the erroneous notarized document in question. The secretary of state or other board that governs notaries in your state may also have an official complaint process. To verify whether your state has an official process regarding notary complaints, contact the governing board by phone or visit their website. If your state does not have a formal complaint process, the state may ask you to write a formal letter, similar to a police statement, outlining the circumstances of the notary’s fraudulent activity.</span></p></div><span data-dcnode-id="920" instrument_node=""> </span></div><span data-dcnode-id="918" instrument_node=""> </span><div class="main-ad no-print" data-ad-unit-name="adsense-main-has-loaded" data-dcnode-id="912"><span data-dcnode-id="917" instrument_node="">
