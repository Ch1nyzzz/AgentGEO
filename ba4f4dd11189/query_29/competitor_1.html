</span><h1 class="title" data-dcnode-id="701"><span class="field field--name-title field--type-string field--label-hidden" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">How to report fraud</span></span><span data-dcnode-id="702" instrument_node="">
</span></h1><span data-dcnode-id="700" instrument_node="">
</span></div><span data-dcnode-id="698" instrument_node="">

</span><article class="node node--type-page node--promoted node--view-mode-full clearfix page container" data-dcnode-id="489"><span data-dcnode-id="691" instrument_node="">

</span><div class="node__content clearfix" data-dcnode-id="491"><span data-dcnode-id="687" instrument_node="">
</span><div class="field field--name-field-intro field--type-text-long field--label-hidden container node-intro field__item" data-dcnode-id="681"><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">What is Fraud?</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">The Commonwealth defines fraud as "Dishonestly obtaining a benefit, or causing a loss, by deception or other means". In this definition, "benefit" can be money or objects, power, status or information.</span></p></div><span data-dcnode-id="680" instrument_node="">
</span><div data-dcnode-id="679" id="sticky-anchor"></div><span data-dcnode-id="678" instrument_node="">
</span><div class="toc-js" data-back-to-top="0" data-back-to-top-label="Back to top" data-container=".field--name-field-content" data-dcnode-id="646" data-highlight-offset="100" data-highlight-on-scroll="1" data-list-type="ul" data-prefix="toc" data-scroll-to-offset="0" data-selectors="h2" data-selectors-minimum="2" data-smooth-scrolling="1" data-sticky="0" data-sticky-offset="0" data-sticky-stop="" data-sticky-stop-padding="0" id="toc-js-node-64" style="display: block;"><span data-dcnode-id="677" instrument_node="">
</span><h2 class="toc-title h2" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">On this page:</span></h2><span data-dcnode-id="674" instrument_node="">
</span><nav aria-label="On this page:" data-dcnode-id="648"><ul data-dcnode-id="649" role="presentation"><li class="toc-h2 toc-active" data-dcnode-id="671" role="presentation"><a aria-label="Fraud Strategy Statement" data-dcnode-id="672" href="#toc-fraud-strategy-statement"><span data-dcnode-id="673" instrument_node="">Fraud Strategy Statement</span></a></li><li class="toc-h2" data-dcnode-id="668" role="presentation"><a aria-label="Reporting Fraud" data-dcnode-id="669" href="#toc-reporting-fraud"><span data-dcnode-id="670" instrument_node="">Reporting Fraud</span></a></li><li class="toc-h2" data-dcnode-id="665" role="presentation"><a aria-label="How to report fraud" data-dcnode-id="666" href="#toc-how-to-report-fraud"><span data-dcnode-id="667" instrument_node="">How to report fraud</span></a></li><li class="toc-h2" data-dcnode-id="662" role="presentation"><a aria-label="What information should I provide?" data-dcnode-id="663" href="#toc-what-information-should-i-provide-"><span data-dcnode-id="664" instrument_node="">What information should I provide?</span></a></li><li class="toc-h2" data-dcnode-id="659" role="presentation"><a aria-label="What will happen next?" data-dcnode-id="660" href="#toc-what-will-happen-next-"><span data-dcnode-id="661" instrument_node="">What will happen next?</span></a></li><li class="toc-h2" data-dcnode-id="656" role="presentation"><a aria-label="Privacy Notice" data-dcnode-id="657" href="#toc-privacy-notice"><span data-dcnode-id="658" instrument_node="">Privacy Notice</span></a></li><li class="toc-h2" data-dcnode-id="653" role="presentation"><a aria-label="Safeguards for Persons Reporting Suspected Fraud" data-dcnode-id="654" href="#toc-safeguards-for-persons-reporting-suspected-fraud"><span data-dcnode-id="655" instrument_node="">Safeguards for Persons Reporting Suspected Fraud</span></a></li><li class="toc-h2" data-dcnode-id="650" role="presentation"><a aria-label="Contact Us" data-dcnode-id="651" href="#toc-contact-us"><span data-dcnode-id="652" instrument_node="">Contact Us</span></a></li></ul></nav><span data-dcnode-id="647" instrument_node="">
</span></div><span data-dcnode-id="645" instrument_node="">
</span><div class="field field--name-field-content field--type-entity-reference-revisions field--label-hidden field__items" data-dcnode-id="493"><span data-dcnode-id="644" instrument_node="">
</span><div class="field__item" data-dcnode-id="495"><span data-dcnode-id="643" instrument_node=""> </span><div class="paragraph paragraph--type--text paragraph--view-mode--default" data-dcnode-id="497"><span data-dcnode-id="642" instrument_node="">
</span><div class="field field--name-field-body field--type-text-long field--label-hidden container width-750 width-content-750 field__item" data-dcnode-id="499"><span data-dcnode-id="641" id="toc-fraud-strategy-statement"></span><h2 data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Fraud Strategy Statement</span></h2><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">The Department of Education, Skills and Employment has a responsibility to ensure appropriate use of public resources to achieve its goals and promote financial sustainability. A robust fraud control environment encourages public and government confidence in maintaining the integrity of the department’s activities. Fraud control supports the department’s governance structure to meet policy and operational objectives in an appropriately risk managed manner.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="634" instrument_node="">The department is committed to preventing and controlling fraud however, this can only be achieved through the collective effort of staff, contractors, external service providers and the community. The department's </span><a data-dcnode-id="632" data-entity-substitution="canonical" data-entity-type="node" data-entity-uuid="f196775a-b1ba-4e26-b1a8-cb01b66387c5" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dese.gov.au/about-us/resources/fraud-strategy-statement-2021-2022"><span data-dcnode-id="633" instrument_node="">Fraud Strategy Statement</span></a><span data-dcnode-id="631" instrument_node=""> provides more information about the department's stance on fraud.</span></p><span data-dcnode-id="629" instrument_node="">
</span><span data-dcnode-id="628" id="toc-reporting-fraud"></span><h2 data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Reporting Fraud</span></h2><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">The Department of Education, Skills and Employment is committed to preventing fraud in all aspects of its business. If you suspect fraudulent activity within a program administered by the Department of Education, Skills and Employment, you should report it.</span></p><span data-dcnode-id="622" instrument_node="">
</span><span data-dcnode-id="621" id="toc-how-to-report-fraud"></span><h2 data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">How to report fraud</span></h2><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">You can provide information about suspected fraudulent activities or unethical behaviour by:</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="614" instrument_node="">Email: </span><a data-dcnode-id="612" href="mailto:fraud@dese.gov.au"><span data-dcnode-id="613" instrument_node="">fraud@dese.gov.au</span></a><span data-dcnode-id="611" instrument_node=""> or</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Phone: 02 6121 5450 (where you can leave a detailed voicemail message and contact details)</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="596"><strong data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Anonymously</span></strong><span data-dcnode-id="603" instrument_node=""> report fraud through our </span><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dese-gov-au.whispli.com/reportfraud"><span data-dcnode-id="602" instrument_node="">online reporting tool</span></a><span data-dcnode-id="600" instrument_node="">.&nbsp;Our anonymous reporting tool, </span><em data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Whispli</span></em><span data-dcnode-id="597" instrument_node="">, allows you to report fraud and communicate&nbsp;directly with the department, without disclosing your identity.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="594" instrument_node="">If you have information relating to incorrect payments or suspect fraud relating to Commonwealth benefits (Centrelink, Medicare, the Pharmaceuticals Benefits Scheme or Child Support Agency payments), please visit the </span><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanservices.gov.au/individuals/contact-us/reporting-fraud"><span data-dcnode-id="593" instrument_node="">Services Australia</span></a><span data-dcnode-id="591" instrument_node=""> website.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">If you have information relating to a new company that has been created to continue the business of an existing company that has been deliberately liquidated to avoid paying taxes, creditors and employee entitlements, please visit the </span><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ato.gov.au/General/The-fight-against-tax-crime/Our-focus/Illegal-phoenix-activity/Phoenix-Taskforce/"><span data-dcnode-id="587" instrument_node="">Australian Taxation Office</span></a><span data-dcnode-id="585" instrument_node=""> website.</span></p><span data-dcnode-id="583" instrument_node="">
</span><span data-dcnode-id="582" id="toc-what-information-should-i-provide-"></span><h2 data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">What information should I provide?</span></h2><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">The department takes all allegations of fraud seriously but does require specific information to enable it to deal with your matter appropriately. By providing more information in the first instance (including supporting documents), we can look into your matter more efficiently.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">You are encouraged to provide the following information:</span></p><span data-dcnode-id="573" instrument_node="">
</span><ul data-dcnode-id="559"><span data-dcnode-id="572" instrument_node="">
</span><li data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Who is involved? Include as much detail as you can such as the name of the person or organisation, date of birth, addresses and phone numbers.</span></li><span data-dcnode-id="569" instrument_node="">
</span><li data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">What fraud do you think has occurred? Please provide details of your concerns about the activity, including how, when and where it occurred.</span></li><span data-dcnode-id="566" instrument_node="">
</span><li data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">How did you come across this information?</span></li><span data-dcnode-id="563" instrument_node="">
</span><li data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Your contact details (you can provide information anonymously).</span></li><span data-dcnode-id="560" instrument_node="">
</span></ul><span data-dcnode-id="558" instrument_node="">
</span><span data-dcnode-id="557" id="toc-what-will-happen-next-"></span><h2 data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">What will happen next?</span></h2><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">The department will make appropriate enquiries into your allegations. Due to privacy restrictions and/or the need to protect the integrity of any further investigation, the department may not provide you with details of the outcome of these enquiries.</span></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">In particular, please note that if your allegation involves another individual, the department may not be able to give you any information about the conduct or outcome of the investigation due to the department's obligations under the Privacy Act 1988.</span></p><span data-dcnode-id="548" instrument_node="">
</span><span data-dcnode-id="547" id="toc-privacy-notice"></span><h2 data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Privacy Notice</span></h2><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Your personal information is protected by law, including the Privacy Act 1988, and is collected by the Australian Government Department of Education, Skills and Employment for the purposes of investigating allegations of suspected fraud.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">If the information you provide does not relate to the activities or functions of the department, we may disclose the information to other Commonwealth, state or territory bodies (including law enforcement bodies) for appropriate assessment or action.</span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Your information may also be used by the department or given to other parties if it is required or authorised by law.</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="534" instrument_node="">For more information about how the department manages personal information (including information on accessing or correcting information) and how to make a complaint, please view our full </span><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dese.gov.au/node/25"><span data-dcnode-id="533" instrument_node="">privacy policy</span></a><span data-dcnode-id="531" instrument_node=""> or you can request a copy from the department by sending an email to </span><a data-dcnode-id="529" href="mailto:privacy@dese.gov.au"><span data-dcnode-id="530" instrument_node="">privacy@dese.gov.au</span></a><span data-dcnode-id="528" instrument_node="">.</span></p><span data-dcnode-id="526" instrument_node="">
</span><span data-dcnode-id="525" id="toc-safeguards-for-persons-reporting-suspected-fraud"></span><h2 data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Safeguards for Persons Reporting Suspected Fraud</span></h2><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="521" instrument_node="">Reports of suspected fraud – and any subsequent investigations – are handled confidentially. If the information you provide relates to disclosable conduct, provisions under the </span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ombudsman.gov.au/Our-responsibilities/making-a-disclosure"><span data-dcnode-id="520" instrument_node="">Public Interest Disclosure (PID) Act 2013</span></a><span data-dcnode-id="518" instrument_node=""> may be available to you.</span></p><span data-dcnode-id="516" instrument_node="">
</span><ul data-dcnode-id="510"><span data-dcnode-id="515" instrument_node="">
</span><li data-dcnode-id="512"><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dese.gov.au/node/197"><span data-dcnode-id="514" instrument_node="">Procedures for Dealing with Public Interest Disclosures</span></a></li><span data-dcnode-id="511" instrument_node="">
</span></ul><span data-dcnode-id="509" instrument_node="">
</span><span data-dcnode-id="508" id="toc-contact-us"></span><h2 data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Contact Us</span></h2><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="504" instrument_node="">For more information or if you wish to report suspected fraud, please email </span><a data-dcnode-id="502" href="mailto:fraud@dese.gov.au"><span data-dcnode-id="503" instrument_node="">fraud@dese.gov.au</span></a><span data-dcnode-id="501" instrument_node=""> or call the Fraud Hotline on 02 6121 5450 (where you can leave a detailed voicemail message and contact details).</span></p></div><span data-dcnode-id="498" instrument_node="">
