</span><p data-dcnode-id="4315"><span data-dcnode-id="4316" instrument_node="">Here are some steps you can take to protect yourself against attempts to compromise your MyUI+ account and unemployment claim:</span></p><span data-dcnode-id="4314" instrument_node="">
</span><ul data-dcnode-id="4301"><li data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">Be careful about requests by phone, text, or email to share personally identifiable information such as your Social Security number, bank account numbers, PIN numbers, or account passwords. Scammers try to obtain personal information in order to file fraudulent claims or compromise existing MyUI+ accounts.</span></li><span data-dcnode-id="4311" instrument_node="">
</span><li data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">Avoid clicking links in emails and text messages. CDLE will never send you a text message with a link to log into your MyUI+ account. If you are unsure about any link asking you to log into your account, simply disregard the link and instead access your MyUI+ account from the official CDLE website at ColoradoUI.gov.</span></li><span data-dcnode-id="4308" instrument_node="">
</span><li data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">If you have filed an unemployment claim, verify that your address, phone number, email, and payment method are correct and have not been altered before completing each weekly certification.</span></li><span data-dcnode-id="4305" instrument_node="">
</span><li data-dcnode-id="4303"><span data-dcnode-id="4304" instrument_node="">Do not share your MyUI+ password with anyone.</span></li><span data-dcnode-id="4302" instrument_node="">
</span></ul></div><span data-dcnode-id="4299" instrument_node="">

</span><ul data-dcnode-id="4194"><li data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">You or someone else in your household has received a ReliaCard debit card or other correspondence but have not filed an unemployment claim</span></li><span data-dcnode-id="4204" instrument_node="">
</span><li data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">Your household has received a ReliaCard or other correspondence at your address but in the name of someone who does not live in your household</span></li><span data-dcnode-id="4201" instrument_node="">

</span><li data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">You know of someone collecting unemployment benefits while working</span></li><span data-dcnode-id="4195" instrument_node="">
</span></ul></div><span data-dcnode-id="4192" instrument_node="">

</span><ul data-dcnode-id="4152"><li data-dcnode-id="4176"><span data-dcnode-id="4180" instrument_node="">If you received a U.S. Bank ReliaCard debit card that you did not request, deactivate the card by following the instructions at </span><a data-dcnode-id="4178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usbankreliacard.com/web/usbankreliacard/login" target="_blank"><span data-dcnode-id="4179" instrument_node="">usbankreliacard.com</span></a><span data-dcnode-id="4177" instrument_node="">.</span></li><span data-dcnode-id="4175" instrument_node="">
</span><li data-dcnode-id="4157"><span data-dcnode-id="4174" instrument_node="">Contact the three consumer credit bureaus and put a fraud alert on your name and Social Security number (SSN).
	</span><ul data-dcnode-id="4158"><li data-dcnode-id="4170"><a data-dcnode-id="4172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.equifax.com/personal/credit-report-services/credit-fraud-alerts/"><span data-dcnode-id="4173" instrument_node="">Equifax</span></a><span data-dcnode-id="4171" instrument_node="">: 1-800-525-6285</span></li><span data-dcnode-id="4169" instrument_node="">
</span><li data-dcnode-id="4165"><a data-dcnode-id="4167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.experian.com/fraud/center.html"><span data-dcnode-id="4168" instrument_node="">Experian</span></a><span data-dcnode-id="4166" instrument_node="">: 1-888-397-3742</span></li><span data-dcnode-id="4164" instrument_node="">

</span></ul></li><span data-dcnode-id="4156" instrument_node="">
</span><li data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">Create a file where you can keep any records related to the fraud or identity theft in one place.</span></li><span data-dcnode-id="4153" instrument_node="">

</span><div class="field field--name-field-card-body field--type-text-long field--label-hidden field--item" data-dcnode-id="2763"><h4 data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">FAQs for Individuals</span></h4><span data-dcnode-id="2905" instrument_node="">
</span><div class="ckeditor-accordion-container" data-dcnode-id="2764"><dl class="styled" data-dcnode-id="2765"><dt data-dcnode-id="2898"><span class="ckeditor-accordion-toggle" data-dcnode-id="2904"></span><a class="ckeditor-accordion-toggler" data-dcnode-id="2899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/MRDDwofnC4w%3Fautoplay%3D0%26start%3D0%26rel%3D0"><strong data-dcnode-id="2900"><span data-dcnode-id="2903" instrument_node="">What should I do if my identity was used to file a fraudulent claim? </span><em data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">(received a Reliacard or mail from CDLE)</span></em></strong></a></dt><span data-dcnode-id="2897" instrument_node="">
</span><dd data-dcnode-id="2854"><span data-dcnode-id="2896" instrument_node="">
</span><p data-dcnode-id="2887"><span data-dcnode-id="2895" instrument_node="">If you received unemployment paperwork but did not file a claim, or otherwise believe you are a victim of identity theft related to unemployment benefits, please </span><a data-dcnode-id="2893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//co.tfaforms.net/f/Report_Unemployment_Identity_Theft" target="_blank"><span data-dcnode-id="2894" instrument_node="">submit a Report Unemployment Fraud form</span></a><span data-dcnode-id="2892" instrument_node="">.</span><br data-dcnode-id="2891"><br data-dcnode-id="2890"><strong data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">Additionally, there are several recommended steps to follow:</span></strong></p><span data-dcnode-id="2886" instrument_node="">
</span><ul data-dcnode-id="2855"><li data-dcnode-id="2879"><span data-dcnode-id="2885" instrument_node="">Follow the instructions at </span><a data-dcnode-id="2883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usbankreliacard.com/web/usbankreliacard/login" target="_blank"><span data-dcnode-id="2884" instrument_node="">usbankreliacard.com</span></a><span data-dcnode-id="2882" instrument_node=""> or contact U.S. Bank immediately at 1-855-282-6161. Tell them that a fraudulent unemployment claim was filed using your information, and ask them to deactivate the card.</span><br data-dcnode-id="2881"><span data-dcnode-id="2880" instrument_node="">
		&nbsp;</span></li><span data-dcnode-id="2878" instrument_node="">
</span><li data-dcnode-id="2857"><span data-dcnode-id="2877" instrument_node="">Contact the three consumer credit bureaus and put a fraud alert on your name and Social Security number (SSN). It may be an automated system, so you may not talk to a live person and you will have to enter your SSN and date of birth.</span><br data-dcnode-id="2876"><strong data-dcnode-id="2872"><span data-dcnode-id="2875" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span><br data-dcnode-id="2874"><span data-dcnode-id="2873" instrument_node="">
		&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp;Credit Bureau Contact Info:</span></strong><br data-dcnode-id="2871"><strong data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp;</span></strong><span data-dcnode-id="2868" instrument_node="">Equifax: 1-800-525-6285</span><br data-dcnode-id="2867"><strong data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp;</span></strong><span data-dcnode-id="2864" instrument_node="">Experian: 1-888-397-3742</span><br data-dcnode-id="2863"><strong data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp;</span></strong><span data-dcnode-id="2860" instrument_node="">TransUnion: 1-800-680-7289</span><br data-dcnode-id="2859"><span data-dcnode-id="2858" instrument_node="">
		&nbsp;</span></li><span data-dcnode-id="2856" instrument_node="">
</span></ul></dd><span data-dcnode-id="2853" instrument_node="">
</span><dt data-dcnode-id="2848"><span class="ckeditor-accordion-toggle" data-dcnode-id="2852"></span><a class="ckeditor-accordion-toggler" data-dcnode-id="2849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/MRDDwofnC4w%3Fautoplay%3D0%26start%3D0%26rel%3D0"><strong data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">I submitted a Report Unemployment Fraud form. What are some steps I can take in the meantime?</span></strong></a></dt><span data-dcnode-id="2847" instrument_node="">
</span><dd data-dcnode-id="2823"><span data-dcnode-id="2846" instrument_node="">
</span><ul data-dcnode-id="2824"><li data-dcnode-id="2839"><span data-dcnode-id="2845" instrument_node="">It is important to regularly review your credit reports from each of the three credit bureaus. Each will look different and may contain different information. If you discover any incorrect or fraudulent information on your credit report, you should dispute it with the credit bureau directly. Normally, you can receive one free copy of your credit report each year from each credit bureau. Due to increased fraud during the COVID-19 pandemic, each of the three credit bureaus is offering free weekly credit reports via </span><a data-dcnode-id="2843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//annualcreditreport.com/foreignLocation.action" target="_blank"><span data-dcnode-id="2844" instrument_node="">annualcreditreport.com</span></a><span data-dcnode-id="2842" instrument_node="">.</span><br data-dcnode-id="2841"><span data-dcnode-id="2840" instrument_node="">
		&nbsp;</span></li><span data-dcnode-id="2838" instrument_node="">
</span><li data-dcnode-id="2831"><span data-dcnode-id="2837" instrument_node="">You can also report identity theft to the Federal Trade Commission at </span><a data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//identitytheft.gov/" target="_blank"><span data-dcnode-id="2836" instrument_node="">identitytheft.gov</span></a><span data-dcnode-id="2834" instrument_node="">.&nbsp;</span><br data-dcnode-id="2833"><span data-dcnode-id="2832" instrument_node="">
		&nbsp;</span></li><span data-dcnode-id="2830" instrument_node="">
</span><li data-dcnode-id="2826"><span data-dcnode-id="2829" instrument_node="">Lastly, create a file where you can keep any records relating to this identity theft in one central place, in case you are notified of other fraud or breaches of your personal information.</span><br data-dcnode-id="2828"><span data-dcnode-id="2827" instrument_node="">
		&nbsp;</span></li><span data-dcnode-id="2825" instrument_node="">
</span></ul></dd><span data-dcnode-id="2822" instrument_node="">
</span><dt data-dcnode-id="2817"><span class="ckeditor-accordion-toggle" data-dcnode-id="2821"></span><a class="ckeditor-accordion-toggler" data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/MRDDwofnC4w%3Fautoplay%3D0%26start%3D0%26rel%3D0"><strong data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">Are there any other resources to help me recover from identity theft?</span></strong></a></dt><span data-dcnode-id="2816" instrument_node="">
</span><dd data-dcnode-id="2767"><span data-dcnode-id="2815" instrument_node="">
</span><ul data-dcnode-id="2768"><li data-dcnode-id="2809"><span data-dcnode-id="2814" instrument_node="">It is important to regularly review your credit reports from each of the three credit bureaus. Each will look different and may contain different information. If you discover any incorrect or fraudulent information on your credit report, you should dispute it with the credit bureau directly. Normally, you can receive one free copy of your credit report each year from each credit bureau. Due to increased fraud and&nbsp;identity theft during the COVID-19 pandemic, each of the three credit bureaus is offering free weekly credit reports via </span><a data-dcnode-id="2812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.annualcreditreport.com/index.action" target="_blank"><span data-dcnode-id="2813" instrument_node="">annualcreditreport.com</span></a><br data-dcnode-id="2811"><span data-dcnode-id="2810" instrument_node="">
		&nbsp;</span></li><span data-dcnode-id="2808" instrument_node="">
</span><li data-dcnode-id="2798"><span data-dcnode-id="2807" instrument_node="">You can also report identity theft to the Federal Trade Commission at </span><a data-dcnode-id="2805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.identitytheft.gov/" target="_blank"><span data-dcnode-id="2806" instrument_node="">identitytheft.gov</span></a><span data-dcnode-id="2804" instrument_node="">. The FTC's website includes </span><a data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumer.ftc.gov/features/feature-0014-identity-theft" target="_blank"><span data-dcnode-id="2803" instrument_node="">valuable resources</span></a><span data-dcnode-id="2801" instrument_node=""> about how to recover from identity theft and protect your identity.</span><br data-dcnode-id="2800"><span data-dcnode-id="2799" instrument_node="">
		&nbsp;</span></li><span data-dcnode-id="2797" instrument_node="">
</span><li data-dcnode-id="2793"><span data-dcnode-id="2796" instrument_node="">Lastly, create a file where you can keep any records relating to this identity theft in one central place, in case you are notified of other fraud or breaches of your personal information.</span><br data-dcnode-id="2795"><span data-dcnode-id="2794" instrument_node="">
		&nbsp;</span></li><span data-dcnode-id="2792" instrument_node="">
</span><li data-dcnode-id="2785"><span data-dcnode-id="2791" instrument_node="">The FTC's website includes </span><a data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumer.ftc.gov/features/feature-0014-identity-theft" target="_blank"><span data-dcnode-id="2790" instrument_node="">valuable resources</span></a><span data-dcnode-id="2788" instrument_node=""> about how to recover from identity theft and protect your identity.</span><br data-dcnode-id="2787"><span data-dcnode-id="2786" instrument_node="">
		&nbsp;</span></li><span data-dcnode-id="2784" instrument_node="">
</span><li data-dcnode-id="2770"><span data-dcnode-id="2783" instrument_node="">Read the </span><strong data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Attorney General’s Identity Theft Repair Kit</span></strong><span data-dcnode-id="2780" instrument_node="">&nbsp;</span><strong data-dcnode-id="2774"><a data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdle.colorado.gov/sites/cdle/files/documents/Identity-Theft-Repair-Kit-English.pdf" target="_blank"><span data-dcnode-id="2779" instrument_node="">English</span></a><span data-dcnode-id="2777" instrument_node=""> </span><a data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdle.colorado.gov/sites/cdle/files/documents/Identity-Theft-Repair-Kit-Spanish.pdf" target="_blank"><span data-dcnode-id="2776" instrument_node="">Español</span></a></strong><span data-dcnode-id="2773" instrument_node=""> and </span><a data-dcnode-id="2771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stopfraudcolorado.gov/fraud-center/identity-theft.html" target="_blank"><span data-dcnode-id="2772" instrument_node="">Website</span></a></li><span data-dcnode-id="2769" instrument_node="">

</span><div class="paragraph paragraph--type--bp-columns paragraph--view-mode--default" data-dcnode-id="1353" style="background-color:##FFFFFF;"><span data-dcnode-id="1536" instrument_node="">
</span><div class="paragraph__column" data-dcnode-id="1355"><span data-dcnode-id="1535" instrument_node="">
</span><div class="paragraph__column--container-wrapper" data-dcnode-id="1357"><span data-dcnode-id="1534" instrument_node="">
</span><div class="container" data-dcnode-id="1359"><div class="paragraph--type--bp-columns__1col" data-dcnode-id="1360"><span data-dcnode-id="1533" instrument_node="">
</span><div class="paragraph__card paragraph paragraph--type--card-basic card_no-border paragraph--view-mode--default" data-dcnode-id="1362"><span data-dcnode-id="1532" instrument_node="">
</span><div class="paragraph__column" data-dcnode-id="1364"><span data-dcnode-id="1531" instrument_node="">
</span><div class="field field--name-field-card-body field--type-text-long field--label-hidden field--item" data-dcnode-id="1366"><h4 data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">FAQs for Employers</span></h4><span data-dcnode-id="1528" instrument_node="">
</span><div class="ckeditor-accordion-container" data-dcnode-id="1367"><dl class="styled" data-dcnode-id="1368"><dt data-dcnode-id="1523"><span class="ckeditor-accordion-toggle" data-dcnode-id="1527"></span><a class="ckeditor-accordion-toggler" data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yMU1l_p5x6Y%3Fautoplay%3D0%26start%3D0%26rel%3D0"><strong data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Was there a CDLE data breach? </span></strong></a></dt><span data-dcnode-id="1522" instrument_node="">
</span><dd data-dcnode-id="1511"><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">No, there has been no data breach. Like other states, Colorado continues to see increased unemployment fraud activity. Many Colorado employers are noticing fraudulent unemployment claims being filed in the names of active employees or for people who never worked for them. Fraud within Unemployment Insurance programs nationally has become rampant during the Pandemic.&nbsp;</span></p><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">The Colorado Department of Labor and Employment was one of the first agencies to begin an aggressive fraud detection and prevention program when this issue began to present itself. To date, CDLE has stopped over 800,000 fraudulent claims, and has likely prevented over $7 billion in fraudulent payments. These sophisticated criminal rings use Personally Identifiable information, including social security numbers, to file claims on behalf of unsuspecting victims. The sheer volume of this identity theft is likely the result of one or several data breaches that have occurred over the past few years, which compromised hundreds of millions of identities.&nbsp;</span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">If you receive unemployment paperwork on an active employee, we recommend that you notify that employee that they are likely a victim of identity theft and should take immediate precautions. While unemployment is relatively harmless to the victim’s credit, these criminals could make other transactions using these identities, which has the potential to cause irreparable damage to the victim’s credit.&nbsp;</span></p><span data-dcnode-id="1512" instrument_node="">
</span></dd><span data-dcnode-id="1510" instrument_node="">
</span><dt data-dcnode-id="1505"><span class="ckeditor-accordion-toggle" data-dcnode-id="1509"></span><a class="ckeditor-accordion-toggler" data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yMU1l_p5x6Y%3Fautoplay%3D0%26start%3D0%26rel%3D0"><strong data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Where do I report Identity Theft?</span></strong></a></dt><span data-dcnode-id="1504" instrument_node="">
</span><dd data-dcnode-id="1484"><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1486"><strong data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">As an employer, </span></strong><span data-dcnode-id="1500" instrument_node="">you can report suspected identity theft on our&nbsp;Unemployment Identity Theft Form for Employers.</span><br data-dcnode-id="1499"><a class="btn btn-primary" data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//co.tfaforms.net/f/Employer_Reported_Identity_Theft" target="_blank"><span class="text" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Report Identity Theft for Employers</span></span></a><br data-dcnode-id="1495"><br data-dcnode-id="1494"><strong data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Your employees </span></strong><span data-dcnode-id="1491" instrument_node="">should also report on the Unemployment Identity Theft Form for Individuals.</span><br data-dcnode-id="1490"><a class="btn btn-primary" data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//co.tfaforms.net/f/Report_Unemployment_Identity_Theft" target="_blank"><span class="text" data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Report Identity Theft for Individuals</span></span></a></p><span data-dcnode-id="1485" instrument_node="">
</span></dd><span data-dcnode-id="1483" instrument_node="">
</span><dt data-dcnode-id="1478"><span class="ckeditor-accordion-toggle" data-dcnode-id="1482"></span><a class="ckeditor-accordion-toggler" data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yMU1l_p5x6Y%3Fautoplay%3D0%26start%3D0%26rel%3D0"><strong data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">What happens after I submit a report? </span></strong></a></dt><span data-dcnode-id="1477" instrument_node="">
</span><dd data-dcnode-id="1468"><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1475" instrument_node="">After completing the </span><em data-dcnode-id="1472"><strong data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">“Identity Theft Report”</span></strong></em><span data-dcnode-id="1471" instrument_node="">, we will hold payment from being issued on the claim, pending investigation. However, you may continue to receive paperwork that’s automatically generated. Rest assured, the report was received, and the claim is under investigation. We understand how unsettling this experience can be. We take any fraud seriously and work daily with law enforcement and other agencies to investigate and prosecute this behavior. If you haven’t yet, we encourage you to review our tips on protecting yourself against fraud.</span></p><span data-dcnode-id="1469" instrument_node="">
</span></dd><span data-dcnode-id="1467" instrument_node="">
</span><dt data-dcnode-id="1462"><span class="ckeditor-accordion-toggle" data-dcnode-id="1466"></span><a class="ckeditor-accordion-toggler" data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yMU1l_p5x6Y%3Fautoplay%3D0%26start%3D0%26rel%3D0"><strong data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Will my premiums be impacted by fraudulent claims? </span></strong></a></dt><span data-dcnode-id="1461" instrument_node="">
</span><dd data-dcnode-id="1456"><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">If any benefits were paid that would charge against your account prior to the claim being closed as a fraudulent claim, once the claim was closed for the fraudulent activity, your account is credited for any benefits that might have been paid. As such, payment of any of those benefits will not impact your experience rating when your premium rates are calculated.</span></p><span data-dcnode-id="1457" instrument_node="">
</span></dd><span data-dcnode-id="1455" instrument_node="">
</span><dt data-dcnode-id="1450"><span class="ckeditor-accordion-toggle" data-dcnode-id="1454"></span><a class="ckeditor-accordion-toggler" data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yMU1l_p5x6Y%3Fautoplay%3D0%26start%3D0%26rel%3D0"><strong data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Do I need to appeal these claims and benefit charges? </span></strong></a></dt><span data-dcnode-id="1449" instrument_node="">
</span><dd data-dcnode-id="1441"><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1447" instrument_node="">No, you do not need to appeal decisions issued or protest benefits charged to your account on claims filed as a result of identity theft. We will not process appeals where the reason for the appeal is that the claim is fraudulent. It is possible you received a decision issued automatically on a claim that was closed due to fraudulent activity. While our hope is to provide documentation at some point that these claims have been closed to reduce confusion and provide certainty to you, rest assured that payment has been stopped as long as you completed the </span><a data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//co.tfaforms.net/f/Employer_Reported_Identity_Theft" target="_blank"><span data-dcnode-id="1446" instrument_node="">Identity Theft Report</span></a><span data-dcnode-id="1444" instrument_node="">.</span></p><span data-dcnode-id="1442" instrument_node="">
</span></dd><span data-dcnode-id="1440" instrument_node="">
</span><dt data-dcnode-id="1435"><span class="ckeditor-accordion-toggle" data-dcnode-id="1439"></span><a class="ckeditor-accordion-toggler" data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yMU1l_p5x6Y%3Fautoplay%3D0%26start%3D0%26rel%3D0"><strong data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">What do I do with a job separation request for an employee still on payroll? </span></strong></a></dt><span data-dcnode-id="1434" instrument_node="">
</span><dd data-dcnode-id="1414"><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1432" instrument_node="">When a claim is filed using the stolen identity of one of your employees, you receive a fact-finding questionnaire by email or U.S. mail requesting information about the job separation. If your employee is still employed, </span><u data-dcnode-id="1429"><strong data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">DO NOT</span></strong></u><span data-dcnode-id="1428" instrument_node=""> complete that questionnaire in MyUI Employer or the paper form you may have received. Instead, please file an </span><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//co.tfaforms.net/f/Employer_Reported_Identity_Theft" target="_blank"><span data-dcnode-id="1427" instrument_node="">Identity Theft Report</span></a><span data-dcnode-id="1425" instrument_node=""> on our website. Employees who are the victim of unemployment ID Theft should also submit an ID Theft Report online. They should visit ColoradoUI.gov/unemployment, click the</span><em data-dcnode-id="1422"><strong data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node=""> “Report ID Theft”</span></strong></em><span data-dcnode-id="1421" instrument_node=""> button, then the </span><em data-dcnode-id="1418"><strong data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">“I'm an Individual Reporting Identity Theft” </span></strong></em><span data-dcnode-id="1417" instrument_node="">button. Our website also outlines other important steps that employees who are victims of UI fraud should take.</span></p><span data-dcnode-id="1415" instrument_node="">
</span></dd><span data-dcnode-id="1413" instrument_node="">
</span><dt data-dcnode-id="1408"><span class="ckeditor-accordion-toggle" data-dcnode-id="1412"></span><a class="ckeditor-accordion-toggler" data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yMU1l_p5x6Y%3Fautoplay%3D0%26start%3D0%26rel%3D0"><strong data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Special instructions for SIDES employer users:</span></strong></a></dt><span data-dcnode-id="1407" instrument_node="">
</span><dd data-dcnode-id="1399"><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1405" instrument_node="">For SIDES users, please complete the Identity Theft report on the CDLE website and also still respond to the questionnaire within the SIDES program. We are working on a method for one central reporting location and will update that in the near future. For more information about SIDES, visit </span><a data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdle.colorado.gov/respond-job-separations" target="_blank"><span data-dcnode-id="1404" instrument_node="">here</span></a><span data-dcnode-id="1402" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1400" instrument_node="">
</span></dd><span data-dcnode-id="1398" instrument_node="">
</span><dt data-dcnode-id="1393"><span class="ckeditor-accordion-toggle" data-dcnode-id="1397"></span><a class="ckeditor-accordion-toggler" data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yMU1l_p5x6Y%3Fautoplay%3D0%26start%3D0%26rel%3D0"><strong data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Is the form to report identity theft secure? </span></strong></a></dt><span data-dcnode-id="1392" instrument_node="">
</span><dd data-dcnode-id="1384"><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">The Employer Identity Theft reporting form uses a system called FormAssembly. FormAssembly keeps up with the latest protocols to ensure security per the National Institute of Standards and Technology (NIST), Cybersecurity Framework. FormAssembly uses TLS 1.2 to ensure data is transmitted securely.</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">All Personal Identifying information (PII), specifically SSNs are marked as sensitive data to further protect the data within the system. Additionally, reCAPTCHA is used to prevent spam submissions to the form. We follow State protocols for purging, storing, and accessing SSNs.</span></p><span data-dcnode-id="1385" instrument_node="">
</span></dd><span data-dcnode-id="1383" instrument_node="">
</span><dt data-dcnode-id="1378"><span class="ckeditor-accordion-toggle" data-dcnode-id="1382"></span><a class="ckeditor-accordion-toggler" data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yMU1l_p5x6Y%3Fautoplay%3D0%26start%3D0%26rel%3D0"><strong data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Is CDLE sending out Social Security Numbers? How do I report fraud without a full SSN?</span></strong></a></dt><span data-dcnode-id="1377" instrument_node="">
</span><dd data-dcnode-id="1370"><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1375" instrument_node="">Our employer correspondence masks an employee’s full SSN, showing the last 4 numbers. If you are reporting fraud for someone who never worked for you, please use this format for the SSN on the fraud reporting form: 00000 </span><em data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">(then add the last four digits on the questionnaire form).</span></em></p><span data-dcnode-id="1371" instrument_node="">
