ontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporatefinanceinstitute.com/resources/knowledge/" property="item" title="Go to the Knowledge Resource Type archives." typeof="WebPage"><span data-dcnode-id="930" property="name"><span data-dcnode-id="931" instrument_node="">Knowledge</span></span></a><meta content="3" data-dcnode-id="928" property="position"></span><span data-dcnode-id="926" instrument_node=""> › </span><span data-dcnode-id="921" property="itemListElement" typeof="ListItem"><a class="taxonomy resource_types" data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporatefinanceinstitute.com/resources/knowledge/other/" property="item" title="Go to the Other Resource Type archives." typeof="WebPage"><span data-dcnode-id="924" property="name"><span data-dcnode-id="925" instrument_node="">Other</span></span></a><meta content="4" data-dcnode-id="922" property="position"></span><span data-dcnode-id="920" instrument_node=""> › </span><span data-dcnode-id="916" property="itemListElement" typeof="ListItem"><span data-dcnode-id="918" property="name"><span data-dcnode-id="919" instrument_node="">Fraud</span></span><meta content="5" data-dcnode-id="917" property="position"></span></div></div></div></div><section class="section content default" data-dcnode-id="683"><div class="sharing" data-dcnode-id="879"><div class="social-share" data-dcnode-id="880"><ul class="social-share-btns" data-dcnode-id="881"><li class="social-share-btn social-share-btn-linkedin>" data-dcnode-id="906"><span data-dcnode-id="911" instrument_node=""> </span><a class="share-in-window" data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/shareArticle%3Fmini%3Dtrue%26url%3Dhttps%253A%252F%252Fcorporatefinanceinstitute.com%252Fresources%252Fknowledge%252Fother%252Ffraud%252F%26summary%3DFraud" title="Share on LinkedIn"><span data-dcnode-id="910" instrument_node=""> </span><img alt="Share on data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wa.me/%3Ftext%3Dhttps%253A%252F%252Fcorporatefinanceinstitute.com%252Fresources%252Fknowledge%252Fother%252Ffraud%252F%26summary%3DFraud" title="Share on WhatsApp"><span data-dcnode-id="892" instrument_node=""> </span><img alt="Share on WhatsApp" class="" data-dcnode-id="891" data-src="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.corporatefinanceinstitute.com/wp-content/themes/cfi/dist/images/whatsapp.svg&amp;raw"><span data-dcnode-id="890" instrument_node=""> </span></a></li><li class="social-share-btn social-share-btn-copylink>" data-dcnode-id="882"><span data-dcnode-id="887" instrument_node=""> </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporatefinanceinstitute.com/resources/knowledge/other/fraud/" title="Copy link"><span data-dcnode-id="886" instrument_node=""> </span><img alt="Copy link" class="" data-dcnode-id="885" data-src="" data-value="https://corporatefinanceinstitute.com/resources/knowledge/other/fraud/" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.corporatefinanceinstitute.com/wp-content/themes/cfi/dist/images/copylink.svg&amp;raw"><span data-dcnode-id="884" instrument_node=""> </span></a></li></ul></div></div><div class="container" data-dcnode-id="684"><div class="row" data-dcnode-id="685"><div class="content" data-dcnode-id="686"><div class="inner-wrapper-lg" data-dcnode-id="687"><h2 data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">What is Fraud?</span></h2><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Fraud refers to any deceptive activity engaged in by an individual with the aim of gaining something through means that violate the law. One keyword in fraud is deception, wherein the perpetrator leads their victim to believe in an untruth in order to obtain a benefit or value.</span></p><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">&nbsp;</span></p><p data-dcnode-id="871"><img alt="Fraud" class="aligncenter wp-image-25397 size-large" data-dcnode-id="872" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="" data-srcset="//cdn.corporatefinanceinstitute.com/assets/fraud-1024x683.jpeg 1024w, //cdn.corporatefinanceinstitute.com/assets/fraud-300x200.jpeg 300w, //cdn.corporatefinanceinstitute.com/assets/fraud-768x512.jpeg 768w, //cdn.corporatefinanceinstitute.com/assets/fraud-900x600.jpeg 900w, //cdn.corporatefinanceinstitute.com/assets/fraud-600x400.jpeg 600w, //cdn.corporatefinanceinstitute.com/assets/fraud-450x300.jpeg 450w, //cdn.corporatefinanceinstitute.com/assets/fraud-24x16.jpeg 24w, //cdn.corporatefinanceinstitute.com/assets/fraud-36x24.jpeg 36w, //cdn.corporatefinanceinstitute.com/assets/fraud-48x32.jpeg 48w, //cdn.corporatefinanceinstitute.com/assets/fraud.jpeg 1100w" height="683" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.corporatefinanceinstitute.com/assets/fraud-1024x683.jpeg&amp;raw" srcset="//cdn.corporatefinanceinstitute.com/assets/fraud-1024x683.jpeg 1024w, //cdn.corporatefinanceinstitute.com/assets/fraud-300x200.jpeg 300w, //cdn.corporatefinanceinstitute.com/assets/fraud-768x512.jpeg 768w, //cdn.corporatefinanceinstitute.com/assets/fraud-900x600.jpeg 900w, //cdn.corporatefinanceinstitute.com/assets/fraud-600x400.jpeg 600w, //cdn.corporatefinanceinstitute.com/assets/fraud-450x300.jpeg 450w, //cdn.corporatefinanceinstitute.com/assets/fraud-24x16.jpeg 24w, //cdn.corporatefinanceinstitute.com/assets/fraud-36x24.jpeg 36w, //cdn.corporatefinanceinstitute.com/assets/fraud-48x32.jpeg 48w, //cdn.corporatefinanceinstitute.com/assets/fraud.jpeg 1100w" width="1024"></p><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">&nbsp;</span></p><p data-dcnode-id="855"><span data-dcnode-id="868" instrument_node="">The most common place where fraud occurs is in the </span><span data-dcnode-id="860"><a class="tooltip-shortcode" data-dcnode-id="866" data-original-title="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporatefinanceinstitute.com/resources/careers/jobs/real-estate/" title=""><span data-dcnode-id="867" instrument_node="">real estate</span></a><span class="link-content hidden" data-dcnode-id="861"><span class="title" data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Real Estate</span></span><span class="meta-description" data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Real estate is real property that consists of land and improvements, which include buildings, fixtures, roads, structures, and utility systems.</span></span></span></span><span data-dcnode-id="859" instrument_node=""> industry, specifically in selling and buying, as well as in falsifying documents such as </span><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="858" instrument_node="">taxes</span></a><span data-dcnode-id="856" instrument_node=""> and medical insurance claims. Fraud is not uncommon and is often carried out by individuals, organizations, and even companies.</span></p><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Types of E-commerce Fraud</span></h3><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">In the past, credit card frauds were the only thing people were wary about. However, with technological advancements and all the personal information people willingly input online, hackers are becoming more “resourceful” and “creative” in their means to deceive people. Here are some of the types of e-commerce fraud we can all become victims of:</span></p><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">1. Identity theft</span></h4><p data-dcnode-id="834"><span data-dcnode-id="844" instrument_node="">No matter the era, identity theft will always remain a major concern for everyone, especially for online merchants, credit companies, and </span><span data-dcnode-id="836"><a class="tooltip-shortcode" data-dcnode-id="842" data-original-title="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporatefinanceinstitute.com/resources/careers/companies/top-banks-in-the-usa/" title=""><span data-dcnode-id="843" instrument_node="">banks</span></a><span class="link-content hidden" data-dcnode-id="837"><span class="title" data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Top Banks in the USA</span></span><span class="meta-description" data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">According to the US Federal Deposit Insurance Corporation, there were 6,799&nbsp;FDIC-insured commercial banks in the USA as of February 2014.&nbsp;</span></span></span></span><span data-dcnode-id="835" instrument_node="">. What hackers do is take over the identity of the account owner and make purchases, for example, using stolen credit card information.</span></p><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">For as long as they are in possession of the individual’s personal details such as name, address, phone number, and credit card details, they can actually successfully purchase what they want online at the expense of the credit card owner.</span></p><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">2. Friendly fraud</span></h4><p data-dcnode-id="817"><span data-dcnode-id="827" instrument_node="">Merchants are often the victims of this type of fraud. What fraudsters do is make purchases using their debit or </span><span data-dcnode-id="819"><a class="tooltip-shortcode" data-dcnode-id="825" data-original-title="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporatefinanceinstitute.com/resources/knowledge/other/credit-card/" title=""><span data-dcnode-id="826" instrument_node="">credit card</span></a><span class="link-content hidden" data-dcnode-id="820"><span class="title" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Credit Card</span></span><span class="meta-description" data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">A credit card is a simple yet no-ordinary card that allows the owner to make purchases without bringing out any amount of cash. Instead, by using a credit</span></span></span></span><span data-dcnode-id="818" instrument_node=""> and then ask for a chargeback, saying that their credit card details were stolen. The merchant ends up giving a refund while the fraudster keeps the goods.</span></p><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">3. Clean fraud</span></h4><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Not even calling it clean fraud makes it clean or right. Clean fraud involves stealing credit cards and using the cards to make purchases while making sure that the perpetrators are able to escape theft detection that is being practiced by payment processors. Using the personal details of the card owner, the thief can successfully make purchases using the stolen card.</span></p><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">4. Merchant fraud</span></h4><p data-dcnode-id="796"><span data-dcnode-id="806" instrument_node="">Merchant fraud is very common, especially online. It is also the reason why many people are doubtful about purchases that don’t do cash-on-delivery transactions. In merchant fraud, the order is received and confirmed by an </span><span data-dcnode-id="798"><a class="tooltip-shortcode" data-dcnode-id="804" data-original-title="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporatefinanceinstitute.com/resources/careers/jobs/introduction-to-e-commerce-guide/" title=""><span data-dcnode-id="805" instrument_node="">e-commerce</span></a><span class="link-content hidden" data-dcnode-id="799"><span class="title" data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Introduction to E-commerce</span></span><span class="meta-description" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">E-commerce refers to commercial transactions of goods or services conducted over the internet.&nbsp;E-commerce companies sell various products and services.</span></span></span></span><span data-dcnode-id="797" instrument_node=""> store but then no product or service is delivered, and no chargebacks are allowed. Merchant fraud is also otherwise called internet fraud.</span></p><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">5. Check fraud</span></h4><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Even issuing a check while knowing that there is not enough balance in this account is considered fraudulent. A check fraud also happens when a person steals another person’s check and forges their signature to make purchases or payments.</span></p><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">6. Pyramid schemes</span></h4><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Pyramiding involves a company that encourages people to make investments with the promise that they will get their returns if they are able to recruit downlines and when their downlines recruit their own downlines, too.</span></p><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">7. Charities fraud</span></h4><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">People should be wary about groups claiming to be supporting or running charitable organizations and asking for donations. Before doing so, people must make sure to check if the group indeed is legitimate – that the charity does actually exist before falling into the trap of charities fraud.</span></p><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Fraud Warning Signs</span></h3><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Fraud can happen to anyone who isn’t careful or selective in the offers they accept. Everyone should be aware of the warning signs to avoid falling prey to such fraudulent activities.</span></p><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">1. Dubious phone calls</span></h4><p data-dcnode-id="757"><span data-dcnode-id="767" instrument_node="">People should watch out for telephone calls that claim to be from the federal government asking for their </span><span data-dcnode-id="759"><a class="tooltip-shortcode" data-dcnode-id="765" data-original-title="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporatefinanceinstitute.com/resources/knowledge/other/social-security/" title=""><span data-dcnode-id="766" instrument_node="">Social Security</span></a><span class="link-content hidden" data-dcnode-id="760"><span class="title" data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Social Security</span></span><span class="meta-description" data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Social Security is a US federal government program that provides social insurance and benefits to people with inadequate or no income. The first Social</span></span></span></span><span data-dcnode-id="758" instrument_node=""> numbers and other personal details. There are also certain fraudsters that call and offer something in exchange for money.</span></p><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">2. Random emails</span></h4><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Random emails that ask the recipient to input their login details in the link as this may be a form of phishing. Once they click the link and they enter their details, the fraudsters can now use the login information to steal their accounts.</span></p><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">3. Unknown text messages or emails</span></h4><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Receiving a text message from an unknown number or email from an unknown sender stating that the recipient’s won the grand prize of a raffle and that they can receive the prize money if they deposit a certain amount of money to the sender.</span></p><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">4. Questionable job listings</span></h4><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">There are job listings online wherein the person is asked to handle payments for the “boss.” The person will receive the money in their account, and they are to forward it to several recipients. It should be avoided at all costs as it may involve something illegal like money laundering.</span></p><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">5. Unverified wire transfer requests</span></h4><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">People asking their victims to wire money is definitely another sign of fraud. Wiring money cannot be undone, and the perpetrator can access the money almost instantly, making reversals impossible.</span></p><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Fraud is very common, and it can happen to everyone, regardless of status in life. Fraudsters don’t target only rich people but anyone who is willing to take their bait. So everyone should be vigilant.</span></p><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Related Readings</span></h3><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Thank you for reading CFI’s explanation of Fraud. To keep learning and advancing your career, the following CFI resources will be helpful:</span></p><ul data-dcnode-id="688"><li data-dcnode-id="716"><span data-dcnode-id="717"><a class="tooltip-shortcode" data-dcnode-id="723" data-original-title="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporatefinanceinstitute.com/resources/knowledge/other/business-ethics/" title=""><span data-dcnode-id="724" instrument_node="">Business Ethics</span></a><span class="link-content hidden" data-dcnode-id="718"><span class="title" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Business Ethics</span></span><span class="meta-description" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">To keep it simple, business ethics are the moral principles that act as guidelines for the way a business conducts itself and its transactions</span></span></span></span></li><li data-dcnode-id="707"><span data-dcnode-id="708"><a class="tooltip-shortcode" data-dcnode-id="714" data-original-title="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporatefinanceinstitute.com/resources/knowledge/other/cash-larceny/" title=""><span data-dcnode-id="715" instrument_node="">Cash Larceny</span></a><span class="link-content hidden" data-dcnode-id="709"><span class="title" data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Cash Larceny</span></span><span class="meta-description" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Cash larceny refers to the act of stealing cash that has already been recorded in the books of accounts during a specific period. This fraud is perpetrated</span></span></span></span></li><li data-dcnode-id="698"><span data-dcnode-id="699"><a class="tooltip-shortcode" data-dcnode-id="705" data-original-title="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporatefinanceinstitute.com/resources/knowledge/other/skimming-fraud/" title=""><span data-dcnode-id="706" instrument_node="">Skimming</span></a><span class="link-content hidden" data-dcnode-id="700"><span class="title" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Skimming Fraud</span></span><span class="meta-description" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Skimming fraud is a type of white-collar crime that involves taking the cash of a business prior to entering it into the accounting system.</span></span></span></span></li><li data-dcnode-id="689"><span data-dcnode-id="690"><a class="tooltip-shortcode" data-dcnode-id="696" data-original-title="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporatefinanceinstitute.com/resources/knowledge/other/top-accounting-scandals/" title=""><span data-dcnode-id="697" instrument_node="">Top Accounting Scandals</span></a><span class="link-content hidden" data-dcnode-id="691"><span class="title" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Top Accounting Scandals</span></span><span class="meta-description" data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">The last two decades saw some of the worst accounting scandals in history. Billions of dollars were lost as a result of these financial disasters.</span></span></span></span></li></ul></div></div></div></div></section><section class="section footer-link-section" data-dcnode-id="673" style="background-color: rgb(248, 249, 250);"><div class="container" data-dcnode-id="674"><div class="row" data-dcnode-id="675"><div class="footer-links-wrapper" data-dcnode-id="676"><div class="footer-link-section-content" data-dcnode-id="677"><span data-dcnode-id="682" instrument_node=""> </span><a class="icon-with-link" data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//courses.corporatefinanceinstitute.com/collections" title="Corporate Finance Institute"><span data-dcnode-id="681" instrument_node=""> </span><img alt="Corporate Finance Institute logo" class="" data-dcnode-id="680" data-src="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.corporatefinanceinstitute.com/wp-content/themes/cfi/dist/images/logo-large-r.svg&amp;raw"><span data-dcnode-id="679" instrument_node=""> </span></a></div></div></div></div></section><section class="footer-banner type-cta layout-image-first" data-dcnode-id="661" style="background-color: #132e57;
