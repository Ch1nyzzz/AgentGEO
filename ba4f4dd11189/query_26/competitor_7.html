="jobsearch-JobDescriptionSection-section" data-dcnode-id="495" id="jobDetailsSection"><div class="jobsearch-JobDescriptionSection-title" data-dcnode-id="506"><h2 class="jobsearch-JobDescriptionSection-title--main icl-u-textBold" data-dcnode-id="507" id="jobDetails" tabindex="-1"><span data-dcnode-id="508" instrument_node="">Job details</span></h2></div><div class="jobsearch-JobDescriptionSection-sectionItem" data-dcnode-id="501"><div class="jobsearch-JobDescriptionSection-sectionItemKey icl-u-textBold" data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Salary</span></div><span class="icl-u-xs-mr--xs" data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">$20.38 - $27.16 an hour</span></span></div><div class="jobsearch-JobDescriptionSection-sectionItem" data-dcnode-id="496"><div class="jobsearch-JobDescriptionSection-sectionItemKey icl-u-textBold" data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Job Type</span></div><div data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Full-time</span></div></div></div></div><div class="mosaic-zone" data-dcnode-id="492" id="mosaic-aboveFullJobDescription"><div class="mosaic mosaic-provider-company-info-salary mosaic-rst mosaic-provider-hydrated" data-dcnode-id="493" id="mosaic-provider-company-info-salary"></div></div><h2 class="jobsearch-JobDescriptionSection-jobDescriptionTitle icl-u-xs-my--md" data-dcnode-id="490" id="jobDescriptionTitle"><span data-dcnode-id="491" instrument_node="">Full Job Description</span></h2><div class="jobsearch-jobDescriptionText" data-dcnode-id="374" id="jobDescriptionText"><span data-dcnode-id="489" instrument_node="">
</span><div data-dcnode-id="376"><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">At U.S. Bank, we're passionate about helping customers and the communities where we live and work. The fifth-largest bank in the United States, we’re one of the country's most respected, innovative and successful financial institutions. U.S. Bank is an equal opportunity employer committed to creating a diverse workforce. We consider all qualified applicants without regard to race, religion, color, sex, national origin, age, sexual orientation, gender identity, disability or veteran status, among other factors. </span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="484"></p><span data-dcnode-id="483" instrument_node="">
</span><h2 class="jobSectionHeader" data-dcnode-id="480"><b data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Job Description </span></b></h2><span data-dcnode-id="479" instrument_node="">
</span><div data-dcnode-id="419"><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Monitors customer online account activity to identify fraudulent transactions and violations. </span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Secures customer accounts to prevent losses and contacts customers to validate payments </span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">being sent through various online channel are authorized. Must be attentive to detail, thorough </span></p><span data-dcnode-id="469" instrument_node="">
</span><div data-dcnode-id="421"><span data-dcnode-id="468" instrument_node="">
    and accurate documentation associated with actions taken. 
    </span><br data-dcnode-id="467"/><span data-dcnode-id="466" instrument_node="">
</span><b data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Work Schedule: SUN-Thurs </span></b><span data-dcnode-id="463" instrument_node="">
</span><b data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">10AM- 6:30PM </span></b><span data-dcnode-id="460" instrument_node="">
</span><br data-dcnode-id="459"/><span data-dcnode-id="458" instrument_node=""> Basic Qualifications 
    </span><br data-dcnode-id="457"/><span data-dcnode-id="456" instrument_node="">
</span><ul data-dcnode-id="448"><span data-dcnode-id="455" instrument_node="">
</span><li data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Technical or trade school certificate in business or computer science, or equivalent work experience </span></li><span data-dcnode-id="452" instrument_node="">
</span><li data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Five or more years of job-specific work experience </span></li><span data-dcnode-id="449" instrument_node="">
</span></ul><span data-dcnode-id="447" instrument_node="">
</span><br data-dcnode-id="446"/><span data-dcnode-id="445" instrument_node=""> Preferred Skills/Experience 
    </span><br data-dcnode-id="444"/><span data-dcnode-id="443" instrument_node="">
</span><ul data-dcnode-id="423"><span data-dcnode-id="442" instrument_node="">
</span><li data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Well-developed ability to identify and interpret data and resolve exceptions </span></li><span data-dcnode-id="439" instrument_node="">
</span><li data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Excellent interpersonal, verbal and written communication skills </span></li><span data-dcnode-id="436" instrument_node="">
</span><li data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Proficient personal computer skills including Word and Excel </span></li><span data-dcnode-id="433" instrument_node="">
</span><li data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Able to work independently with minimal supervision in a fast paced production environment required </span></li><span data-dcnode-id="430" instrument_node="">
</span><li data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Previous fraud and/or loss prevention experience desirable </span></li><span data-dcnode-id="427" instrument_node="">
</span><li data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Strong customer service orientation </span></li><span data-dcnode-id="424" instrument_node="">
</span></ul><span data-dcnode-id="422" instrument_node="">
</span></div><span data-dcnode-id="420" instrument_node="">
</span></div><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="417"></p><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">If there’s anything we can do to accommodate a disability during any portion of the application or hiring process, please refer to our disability accommodations for applicants . </span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="412"></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="406"><b data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Benefits: </span></b><br data-dcnode-id="408"/><span data-dcnode-id="407" instrument_node=""> Take care of yourself and your family with U.S. Bank employee benefits. We know that healthy employees are happy employees, and we believe that work/life balance should be easy to achieve. That's why we share the cost of benefits and offer a variety of programs, resources and support you need to bring your full self to work and stay present and committed to the people who matter most - your family. </span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="404"></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Learn all about U.S. Bank employee benefits, including tuition reimbursement, retirement plans and more, by visiting careers.usbank.com . </span></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="399"></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="393"><b data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">EEO is the Law </span></b><br data-dcnode-id="395"/><span data-dcnode-id="394" instrument_node=""> Applicants can learn more about the company’s status as an equal opportunity employer by viewing the federal EEO is the Law poster. </span></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="391"></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="387"><b data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">E-Verify </span></b></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">U.S. Bank participates in the U.S. Department of Homeland Security E-Verify program in all facilities located in the United States and certain U.S. territories. The E-Verify program is an Internet-based employment eligibility verification system operated by the U.S. Citizenship and Immigration Services. Learn more about the E-Verify program . </span></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="382"></p><span data-dcnode-id="381" instrument_node="">Salary range reflected is an estimate of base pay and is for the primary location. Base pay range may vary if an offer is made for work in a different location. Pay Range: $20.38 - $27.16 - $29.88 
  </span><p data-dcnode-id="380"></p><span data-dcnode-id="379" instrument_node="">Due to legal requirements, U.S. Bank requires that the successful candidate hired for some positions be fully-vaccinated for COVID-19, absent being granted an accommodation due to a medical condition, pregnancy, or sincerely held religious belief or other legally required exemption. For these positions, as part of the conditional offer of employment, the successful candidate will be asked to provide proof of vaccination or approval for an accommodation or exemption upon hire. 
  </span><p data-dcnode-id="378"></p><span data-dcnode-id="377" instrument_node="">U.S. Bank will consider qualified applicants with criminal histories in a manner consistent with the San Francisco Fair Chance Ordinance.
 </span></div><span data-dcnode-id="375" instrument_node="">
</span></div><div class="mosaic-zone" data-dcnode-id="373" id="mosaic-belowFullJobDescription"></div><div class="jobsearch-HiringInsights-root jobsearch-HiringInsights-root--bottomborder" data-dcnode-id="364" id="hiringInsightsSectionRoot"><h2 class="jobsearch-HiringInsights-header" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Hiring Insights</span></h2><h4 class="jobsearch-HiringInsights-subheader" data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Job activity</span></h4><p class="jobsearch-HiringInsights-entry--bullet" data-dcnode-id="365"><span class="jobsearch-HiringInsights-icon jobsearch-HiringInsights-icon--bullet" data-dcnode-id="368"></span><span class="jobsearch-HiringInsights-entry--text" data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Posted 2 days ago</span></span></p></div></div><div class="jobsearch-JobTab-content" data-dcnode-id="350"><div class="mosaic-zone" data-dcnode-id="362" id="mosaic-belowJobDescription"></div><div class="jobsearch-JobMetadataFooter" data-dcnode-id="351"><div class="icl-u-textColor--success" data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">U.S. Bank</span></div><div data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">2 days ago</span></div><div class="mosaic mosaic-provider-reportcontent mosaic-provider-hydrated" data-dcnode-id="352" id="mosaic-provider-reportcontent"><div class="mosaic-reportcontent-wrapper button" data-dcnode-id="353"><button class="mosaic-reportcontent-button desktop css-fjuv6g e8ju0x51" data-dcnode-id="355"><span class="mosaic-reportcontent-button-icon" data-dcnode-id="357"></span><span data-dcnode-id="356" instrument_node="">Report job</span></button><div class="mosaic-reportcontent-content" data-dcnode-id="354"></div></div></div></div></div></div><div data-dcnode-id="348" id="successfullySignedInModal"></div><div data-dcnode-id="347" id="thirdPartyApplyCreateAccountModal"></div></div></div><div class="jobsearch-Vie
