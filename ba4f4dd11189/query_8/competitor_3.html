</span><h1 data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">The Fake Job Offer Scam on LinkedIn</span></h1><span data-dcnode-id="2266" instrument_node="">
</span></div><span data-dcnode-id="2264" instrument_node="">
</span></div><span data-dcnode-id="2262" instrument_node="">
</span></div><span data-dcnode-id="2260" instrument_node="">
</span><div class="standard-content standard-content--white-desktop" data-dcnode-id="401"><span data-dcnode-id="2259" instrument_node="">
</span><div class="wrapper" data-dcnode-id="403"><span data-dcnode-id="2258" instrument_node="">
</span><div class="flex-column-row" data-dcnode-id="405"><span data-dcnode-id="2257" instrument_node="">
</span><div class="standard-text" data-dcnode-id="2087"><span data-dcnode-id="2256" instrument_node="">
</span><div class="wrapper" data-dcnode-id="2089"><span data-dcnode-id="2255" instrument_node="">
</span><div class="breadcrumbs" data-dcnode-id="2244"><span data-dcnode-id="2254" instrument_node="">
</span><a data-dcnode-id="2252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.titanhq.com/"><span data-dcnode-id="2253" instrument_node="">Home</span></a><span data-dcnode-id="2251" instrument_node=""> &nbsp;/&nbsp; </span><a data-dcnode-id="2249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.titanhq.com/blog/"><span data-dcnode-id="2250" instrument_node="">TitanHQ Blog</span></a><span data-dcnode-id="2248" instrument_node=""> &nbsp;/&nbsp; </span><span class="last" data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">The Fake Job Offer Scam on LinkedIn</span></span><span data-dcnode-id="2245" instrument_node="">
</span></div><span data-dcnode-id="2243" instrument_node="">
</span><p class="author" data-dcnode-id="2238"><span data-dcnode-id="2242" instrument_node="">Posted by </span><strong data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Trevagh Stankard</span></strong><span data-dcnode-id="2239" instrument_node=""> on Thu, Mar 4th, 2021</span></p><span data-dcnode-id="2237" instrument_node="">
</span><p data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">LinkedIn users have been targeted with fake job offers, as part of a social engineering scam.</span></p><span data-dcnode-id="2234" instrument_node="">
</span><p data-dcnode-id="2227"><a data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//about.linkedin.com/" style="color:#4E4E4E;"><span data-dcnode-id="2233" instrument_node="">LinkedIn</span></a><span data-dcnode-id="2231" instrument_node=""> is the success story of social media for business users. The platform has been around since 2003 and has over 740 million users across 200 countries. Unlike its consumer equivalents such as Facebook and Twitter, LinkedIn focuses on business networking, providing a way for industry folk to connect. Many use the platform to expand their professional network and use LinkedIn to keep up to date with industry news. It is also a popular platform for job searching. Like all social media, LinkedIn has its fair share of scams. With almost </span><a data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessofapps.com/data/linkedin-statistics/" style="color:#4E4E4E;"><span data-dcnode-id="2230" instrument_node="">half of LinkedIn users having salaries of over $75,000</span></a><span data-dcnode-id="2228" instrument_node="">, the platform is an attractive proposition for fraudsters.</span></p><span data-dcnode-id="2226" instrument_node="">
</span><p data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">One of the scams that comes up regularly on LinkedIn is the fake job offer scam.</span></p><span data-dcnode-id="2223" instrument_node="">
</span><p data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2220" instrument_node="">
</span><span data-dcnode-id="2218" instrument_node="">
</span><div class="interruption-strip" data-dcnode-id="2211"><span data-dcnode-id="2217" instrument_node="">
</span><p class="interruption-strip__text" data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">Want protection from phishing and ransomware?</span></p><span data-dcnode-id="2214" instrument_node="">
</span><a class="btn" data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.titanhq.com/signup/%3Fproduct_type%3Dspamtitan"><span data-dcnode-id="2213" instrument_node="">Get your 30 day free trial </span></a></div><span data-dcnode-id="2210" instrument_node="">
</span><span data-dcnode-id="2208" instrument_node="">
</span><p data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2205" instrument_node="">
</span><h2 data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">How Does the Linkedin Fake Jobs Scam Work?</span></h2><span data-dcnode-id="2202" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2201" instrument_node="">One of the useful features of LinkedIn is that recruiters and companies can reach out to LinkedIn users to make job offers. You can even set your profile as “open to finding a new job” which places you into a pool of users actively seeking work. And this system works; </span><a data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kinsta.com/blog/linkedin-statistics/" style="color:#4E4E4E;"><span data-dcnode-id="2200" instrument_node="">122 million users received a job interview via LinkedIn</span></a><span data-dcnode-id="2198" instrument_node="">. This is all great, but it also means that you can become a </span><a data-dcnode-id="2196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.titanhq.com/blog/social-engineering-scams-and-how-to-avoid-them/" style="color:#4E4E4E;"><span data-dcnode-id="2197" instrument_node="">target for scammers</span></a><span data-dcnode-id="2195" instrument_node="">.</span></p><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">The fake job offer scam on LinkedIn typically involves the scammer creating a fake or synthetic profile used to represent themselves as a recruitment agent or a senior person in a company. Once an account is created the scammer can then attempt to ‘recruit’ people to fake jobs and other scams.</span></p><span data-dcnode-id="2190" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Fake accounts can be set up on LinkedIn easily. All you need is an email address; to check this out, I used a private, @protonmail account, and was able to set up a Pseudonymous LinkedIn account in seconds.</span></p><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Scammers will usually attempt to populate a fake account with connections to give it legitimacy. If they can even trick a single user into linking to them, this can create a snowball effect with connections of connections then linking in. With each new connection, the fake account looks more real and increases the level of trust. Once trust is established, the scammer has a greater chance of successfully tricking a target LinkedIn user into believing a job offer is real.</span></p><span data-dcnode-id="2184" instrument_node="">
</span><h2 data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">What Happens If You Fall Foul Of A Linkedin Job Offer Scam?</span></h2><span data-dcnode-id="2181" instrument_node="">
</span><p data-dcnode-id="2173"><span data-dcnode-id="2180" instrument_node="">Scammers may attempt to build up a rapport with the target by sending friendly LinkedIn messages. This helps establish a relationship and build the all-important trust to ensure the next steps work. Once a LinkedIn user takes the fraudster’s fake job bait, typically the scammer’s next step is to use </span><a data-dcnode-id="2178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.titanhq.com/blog/two-thirds-of-orgs-expect-increase-in-covid-19-phishing-attacks-in-2021/" style="color:#4E4E4E;"><span data-dcnode-id="2179" instrument_node="">phishing methods to steal data</span></a><span data-dcnode-id="2177" instrument_node="">. In many LinkedIn job offer scams, the victim will receive a PDF document with the job description. This </span><a data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.titanhq.com/blog/new-injection-technique-exposes-data-in-pdfs/" style="color:#4E4E4E;"><span data-dcnode-id="2176" instrument_node="">document will either be infected with malware</span></a><span data-dcnode-id="2174" instrument_node=""> that will execute on opening, but more typically the PDF will contain a link. This latter technique is often used to evade antivirus software. If the recipient clicks on the link, they are likely to be taken to a website set up by the fraudster to collect bank account details for payroll functions.</span></p><span data-dcnode-id="2172" instrument_node="">
</span><span data-dcnode-id="2170" instrument_node="">
</span><div class="interruption-strip" data-dcnode-id="2163"><span data-dcnode-id="2169" instrument_node="">
</span><p class="interruption-strip__text" data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Want protection from phishing and ransomware?</span></p><span data-dcnode-id="2166" instrument_node="">
</span><a class="btn" data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.titanhq.com/signup/%3Fproduct_type%3Dspamtitan"><span data-dcnode-id="2165" instrument_node="">Get your 30 day free trial </span></a></div><span data-dcnode-id="2162" instrument_node="">
</span><span data-dcnode-id="2160" instrument_node="">
</span><h2 data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Things To Look Out For When Receiving A Linkedin Invite</span></h2><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Security awareness is not just for phishing emails. Understanding the tricks of the LinkedIn scam can help avoid becoming a victim. Here are some of the tell-tale signs to help spot a fake LinkedIn user:</span></p><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2150"><strong data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">The connections</span></strong><span data-dcnode-id="2151" instrument_node="">: Check out the account holder’s connections and shared connections. Scammers generally have few connections. If they say they represent a certain company, do they have connections in that company?</span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2145"><strong data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">The company</span></strong><span data-dcnode-id="2146" instrument_node="">: Sometimes scammers go as far as to create a fake company. Do some digging and see if the company exists.</span></p><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2140"><strong data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Other details</span></strong><span data-dcnode-id="2141" instrument_node="">:</span></p><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2135"><strong data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Names</span></strong><span data-dcnode-id="2136" instrument_node="">: Often scammers use common names, like John or Jane to try and avoid any alarm bells. This, along with other warning signs, might be enough to ring the scammer bells.</span></p><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2127"><strong data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Profile photo</span></strong><span data-dcnode-id="2131" instrument_node="">: Also, the profile picture might be a giveaway. Scammers are known to do online searches to find photos of real people to use in their profile picture. If you do a </span><a data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//support.google.com/websearch/answer/1325808%3Fco%3DGENIE.Platform%253DAndroid%26hl%3Den" style="color:#4E4E4E;"><span data-dcnode-id="2130" instrument_node="">Google reverse image search</span></a><span data-dcnode-id="2128" instrument_node=""> you can see if the photo matches the name. You can do this using Chrome, by right clicking on the profile picture and choosing “search Google for image”.</span></p><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2122"><strong data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Endorsements</span></strong><span data-dcnode-id="2123" instrument_node="">: Even scammers can be endorsed, but usually the endorser is also a scammer. If you are suspicious, check out the details of those who have endorsed the suspicious account holder in the same way you check out the scammer.</span></p><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2117"><strong data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Profile information</span></strong><span data-dcnode-id="2118" instrument_node="">: Check out various aspects of the profile. Does the profile contain a lot of spelling mistakes, does their work history and education fits their persona?</span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">LinkedIn is used for many types of scams. If the fraudster can use LinkedIn to create an account that looks legitimate, they can create trusted relationships with LinkedIn users. Once trust is established, the next steps involve phishing and other methods to extract data and money from targets.</span></p><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2108"><span data-dcnode-id="2112" instrument_node="">Phishing is increasingly sophisticated, and even security aware individuals can be caught out. The use of </span><a data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.titanhq.com/dns-filtering/" style="color:#4E4E4E;"><span data-dcnode-id="2111" instrument_node="">web content and DNS filter protection</span></a><span data-dcnode-id="2109" instrument_node=""> can stop employees’ visiting a malicious website. Also, smart DNS filtering tools allow IT teams to block malware downloads, monitor internet activity, and carefully control the types of websites remote users can access on corporate devices.</span></p><span data-dcnode-id="2107" instrument_node="">
</span><p data-dcnode-id="2102"><span data-dcnode-id="2106" instrument_node="">If you believe you may have been involved in an attempted scam you can report the </span><a data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/help/linkedin/ask/TS-RPS" style="color:#4E4E4E;"><span data-dcnode-id="2105" instrument_node="">scam details to LinkedIn</span></a><span data-dcnode-id="2103" instrument_node="">.</span></p><span data-dcnode-id="2101" instrument_node="">
