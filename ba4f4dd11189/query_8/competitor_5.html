</span><article class="article-section" data-dcnode-id="2724"><span data-dcnode-id="2877" instrument_node="">
</span><div class="article-head" data-dcnode-id="2858"><span data-dcnode-id="2876" instrument_node="">
</span><h1 class="article-title" data-dcnode-id="2874" itemprop="name"><span data-dcnode-id="2875" instrument_node="">How To Spot a Fake Canadian Job Offer</span></h1><span data-dcnode-id="2873" instrument_node="">
</span><div class="info" data-dcnode-id="2860"><span data-dcnode-id="2872" instrument_node="">
</span><div class="date-author" data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">
              by Rueben, April 6th, 2020
            </span></div><span data-dcnode-id="2869" instrument_node="">
</span><div class="art-read-time" data-dcnode-id="2867" style="display: flex;"><span data-dcnode-id="2868" instrument_node="">
</span></div><span data-dcnode-id="2866" instrument_node="">
</span><div class="art-share" data-dcnode-id="2862"><span data-dcnode-id="2865" instrument_node="">
</span><div class="shareInPopup" data-dcnode-id="2864" id="shareInPopup"></div><span data-dcnode-id="2863" instrument_node="">
</span></div><span data-dcnode-id="2861" instrument_node="">
</span></div><span data-dcnode-id="2859" instrument_node="">
</span></div><span data-dcnode-id="2857" instrument_node="">
</span><div class="article-body" data-dcnode-id="2737" itemprop="articleBody"><span data-dcnode-id="2856" instrument_node="">
</span><img alt="How To Spot a Fake Canadian Job Offer" class="lazy" data-dcnode-id="2855" data-src="https://d1ac9zce9817ms.cloudfront.net/images/Canadian%20Immigration%20Scam-1586167575305.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="min-height: 200px" title="How To Spot a Fake Canadian Job Offer"><span data-dcnode-id="2854" instrument_node="">
</span><p data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">Immigrating to Canada is a bold choice. The thing at the front of your mind is most likely landing a Canadian job offer, as soon as possible. Canada literally has hundreds of thousands of positions open in their labour market right now. But there are always a select few bad people who will exploit the system to take advantage of honest, hopeful immigrants.&nbsp; &nbsp;</span></p><p data-dcnode-id="2847"><span data-dcnode-id="2851" instrument_node="">People like you are just trying to find a good, well-paying position so they can support themselves and their families when they arrive in Canada. No matter where you are in the Canadian immigration process, if you are </span><a data-dcnode-id="2849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//canadianvisa.org/blog/immigration/what-is-the-fastest-way-to-immigrate-to-canada"><span data-dcnode-id="2850" instrument_node="">planning to immigrate to Canada</span></a><span data-dcnode-id="2848" instrument_node=""> and have yet to secure a job offer, there are a few Canadian job offer scams you should be aware of to protect yourself and your finances. So, let's take a closer look at how to spot a fake Canadian job offer.&nbsp; &nbsp; &nbsp;&nbsp;</span></p><p data-dcnode-id="2846"></p><h2 data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">Popular Job Offer Scams</span></h2><p data-dcnode-id="2842"><img alt="Canadian Job Offer Scam" class="lazy" data-dcnode-id="2843" data-src="https://d1ac9zce9817ms.cloudfront.net/images/Canadian%20Job%20Offer%20Scam-1586166842468.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"></p><p data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">Canadian Police have warned against the following scam in particular, as they receive more and more complaint of people who have been taken advantage of:</span></p><span data-dcnode-id="2839" instrument_node="">
</span><p data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">A scam company will use something called ‘fake maker’ to create a fake website, usually a mirror of a legitimate company's site, along with all the relevant information you might check for, such as social media and online reviews. Further, they generate official-looking bank deposit forms.</span></p><span data-dcnode-id="2836" instrument_node="">
</span><p data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">The first thing that happens is they will find your resume on popular employment websites such as LinkedIn or Monster. A person will reach out claiming to be a recruitment consultant working on behalf of a company.&nbsp;</span></p><span data-dcnode-id="2833" instrument_node="">
</span><p data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">Next, they will contact you in a polite and professional manner with a seemingly valid job offer.  They will inquire if you are available to interview and what your preferred method would be. Usually, they try to steer toward IM based interviews (red flag) as opposed to video chat.
After a short and seemingly ‘easy’ interview, they will make you a job offer and send you employment forms quite swiftly, this on its own is a second red flag, professional companies tend to interview multiple people and follow due process which takes time.</span></p><span data-dcnode-id="2830" instrument_node="">
</span><p data-dcnode-id="2822"><span data-dcnode-id="2829" instrument_node="">Then you complete the forms, including banking information, identification, etc. which they can use later on. At this point, they will ask you to </span><strong data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">make a deposit</span></strong><span data-dcnode-id="2826" instrument_node=""> into their account </span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//canadianvisa.org/blog/jobs/5-top-tips-on-how-to-get-a-job-offer-in-canada-in-2020"><span data-dcnode-id="2825" instrument_node="">to secure the job offer</span></a><span data-dcnode-id="2823" instrument_node="">. They will claim it is their ‘fee’ for sourcing the job and perhaps that the company may pay you back once you start working.&nbsp;</span></p><span data-dcnode-id="2821" instrument_node="">
</span><p data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">They may even provide you with a fake offer of employment to buy themselves more time, which you will unknowingly submit with your Canadian visa application and end up being rejected and banned from applying for a period.&nbsp;&nbsp;</span></p><span data-dcnode-id="2818" instrument_node="">
</span><h2 data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">Don’t be a Victim of a Scam!</span></h2><p data-dcnode-id="2814"><img alt="Canada Visa Scam" class="lazy" data-dcnode-id="2815" data-src="https://d1ac9zce9817ms.cloudfront.net/images/Canada%20Visa%20Scam-1586166885710.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"></p><p data-dcnode-id="2810"><strong data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">ONE</span></strong><span data-dcnode-id="2811" instrument_node="">. You should know that it is employers who pay recruiters to fill positions for them, so you should never pay a recruiter for a job. It’s simple, they can’t guarantee you the position, you would still have to interview with the actual company for it.</span></p><span data-dcnode-id="2809" instrument_node="">
</span><p data-dcnode-id="2805"><strong data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">TWO</span></strong><span data-dcnode-id="2806" instrument_node="">. The Canadian government has made it illegal for any exchange of money to be made for a job offer or job offer letter. So if you submit a fraudulent job offer letter with your immigration application, you could have your application denied indefinitely.</span></p><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2800"><strong data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">THREE</span></strong><span data-dcnode-id="2801" instrument_node="">. Your job offer must have the details of the company on the letterhead, including registration and contact number. It will be verifiable on the internet. So in short, do not pay anyone for a job offer.</span></p><span data-dcnode-id="2799" instrument_node="">
</span><p data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">Some red flags to look out for when a recruiter contacts you with a Canadian job offer:&nbsp;</span></p><span data-dcnode-id="2796" instrument_node="">
</span><ul data-dcnode-id="2781"><li data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">If you can work from home</span></li><span data-dcnode-id="2793" instrument_node="">
</span><li data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">If you are asked to pay for the job application or training materials for the job</span></li><span data-dcnode-id="2790" instrument_node="">
</span><li data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">Your skills or experience don’t seem important to the employer</span></li><span data-dcnode-id="2787" instrument_node="">
</span><li data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">The person you are dealing with is working from a free email address such as @gmail.com</span></li><span data-dcnode-id="2784" instrument_node="">
</span><li data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">The job offer contains spelling or grammatical errors, real company documents are sound</span></li></ul><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Lastly, if you are asked for any sensitive information such as your social insurance number, national identification number, driver's license number, and most importantly your bank account number, do not provide this. Professional organizations will not need these details for a job offer letter.&nbsp;</span></p><span data-dcnode-id="2777" instrument_node="">
</span><h3 data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">What should be in a job offer letter?</span></h3><span data-dcnode-id="2774" instrument_node="">
</span><p data-dcnode-id="2769"><span data-dcnode-id="2773" instrument_node="">Your job offer letter should come in writing. It must list your role, responsibilities, remuneration, deductions, and conditions of employment. Lastly, and perhaps most importantly it </span><a data-dcnode-id="2771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//canadianvisa.org/blog/jobs/how-to-get-a-labour-market-impact-assessment"><span data-dcnode-id="2772" instrument_node="">must contain a Labour Market Impact Assessment (LMIA)</span></a><span data-dcnode-id="2770" instrument_node=""> number and an employee number.&nbsp;&nbsp;</span></p><span data-dcnode-id="2768" instrument_node="">
</span><h2 data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">Rounding Up - Don't Fall for Fake Job Offers!&nbsp;</span></h2><p data-dcnode-id="2764"><img alt="Immigrate to Canada" class="lazy" data-dcnode-id="2765" data-src="https://cv-media-files.s3.us-west-2.amazonaws.com/images/Immigrate%20to%20Canada-1586166916467.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"></p><span data-dcnode-id="2763" instrument_node="">
</span><p data-dcnode-id="2759"><strong data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">DO NOT PAY FOR A CANADIAN JOB OFFER.</span></strong><span data-dcnode-id="2760" instrument_node=""> We cannot offer more serious advice than that. We take immigration fraud very seriously and if someone ever contacts you directly claiming to be a representative of CanadianVisa.org, and you haven’t requested our services, we urge you to reach out to us officially right away.&nbsp;&nbsp;</span></p><span data-dcnode-id="2758" instrument_node="">
</span><p data-dcnode-id="2747"><span data-dcnode-id="2757" instrument_node="">At the end of the day, you will need to look out for the warning signs and only go ahead with someone if you feel that they have your best interests at heart. We cannot assist you in </span><a data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//canadianvisa.org/blog/jobs/how-to-get-a-canadian-job-offer-in-2020"><span data-dcnode-id="2756" instrument_node="">obtaining a Canadian job offer</span></a><span data-dcnode-id="2754" instrument_node="">, but we can point you in the right direction and handle the entire Canadian immigration process. By using our accredited </span><a data-dcnode-id="2752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//canadianvisa.org/why-use-rcic"><span data-dcnode-id="2753" instrument_node="">Regulated Canadian Immigration Consultants (RCICs)</span></a><span data-dcnode-id="2751" instrument_node=""> you will not only improve your chances of success in the visa application process, but you will get expert advice on which program is best for your specific needs. Our RCICs are highly qualified and are granted permission by the </span><a data-dcnode-id="2749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//iccrc-crcic.ca/find-a-professional/"><span data-dcnode-id="2750" instrument_node="">ICCRC</span></a><span data-dcnode-id="2748" instrument_node=""> to assist you with your eligibility evaluation, review all your documents and application forms, and submit them to the Canadian government for you. Why take the chance of having your application denied because your forms are incorrect or sent in too late.&nbsp; &nbsp; &nbsp;</span></p><span data-dcnode-id="2746" instrument_node="">
</span><button class="btn btn-primary info-rose-btn" data-dcnode-id="2744" data-target="#getstartedModal" data-toggle="modal"><span data-dcnode-id="2745" instrument_node="">Start Your Journey Here</span></button><span data-dcnode-id="2743" instrument_node="">
</span><p data-dcnode-id="2740"><strong data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">Follow us on Facebook, Instagram, Twitter, and LinkedIn for up to date information and interesting blog posts on Canadian Immigration.&nbsp;</span></strong></p><p data-dcnode-id="2739"></p><span data-dcnode-id="2738" instrument_node="">
