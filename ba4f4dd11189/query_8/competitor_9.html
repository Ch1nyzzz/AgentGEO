</span><article class="post-5692 post type-post status-publish format-standard has-post-thumbnail category-career-planning entry" data-dcnode-id="507" id="post-5692"><span data-dcnode-id="773" instrument_node="">
</span><header class="entry-header" data-dcnode-id="757"><span data-dcnode-id="772" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="770" itemprop="headline"><span data-dcnode-id="771" instrument_node="">Don’t Be a Victim of Fake Job Offers – Run the SCAM Check [Infographic]</span></h1><span data-dcnode-id="769" instrument_node="">
</span><div class="cat-links-wrapper" data-dcnode-id="759"><span class="date" data-dcnode-id="765"><span data-dcnode-id="768" instrument_node=""> Last Updated: </span><time class="entry-modified-time" data-dcnode-id="766" datetime="2021-06-03T17:22:25-06:00" itemprop="dateModified"><span data-dcnode-id="767" instrument_node="">June 3, 2021</span></time></span><br data-dcnode-id="764"><span class="cat-links" data-dcnode-id="760"><span data-dcnode-id="763" instrument_node="">Posted in: </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vistaprojects.com/career-planning/" rel="category tag"><span data-dcnode-id="762" instrument_node="">Career Planning</span></a></span></div><span data-dcnode-id="758" instrument_node=""> </span></header><span data-dcnode-id="756" instrument_node="">
</span><div class="entry-content" data-dcnode-id="509" itemprop="text"><span data-dcnode-id="755" instrument_node="">
</span><div class="share-before share-outlined share-small" data-dcnode-id="730" id="share-before-5692"><div class="linkedin sharrre" data-count="%s shares on LinkedIn" data-dcnode-id="747" data-reader="Share on LinkedIn" data-text="Don’t Be a Victim of Fake Job Offers – Run the SCAM Check [Infographic]" data-title="Share" data-url="https://www.vistaprojects.com/blog/identify-fake-job-offers/" data-urlalt="https://www.vistaprojects.com/?p=5692" id="linkedin-before-5692"><div class="box no-count" data-dcnode-id="750"><a class="count" data-dcnode-id="754" href="#"></a><a aria-labelledby="linkedin-before-5692-label" class="share" data-dcnode-id="751" href="#" onclick="return false;"><span aria-hidden="true" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Share</span></span></a></div><span class="hidden" data-dcnode-id="748" id="linkedin-before-5692-label"><span data-dcnode-id="749" instrument_node="">Share on LinkedIn</span></span></div><div class="facebook sharrre" data-count="%s shares on Facebook" data-dcnode-id="739" data-reader="Share on Facebook" data-text="Don’t Be a Victim of Fake Job Offers – Run the SCAM Check [Infographic]" data-title="Share" data-url="https://www.vistaprojects.com/blog/identify-fake-job-offers/" data-urlalt="https://www.vistaprojects.com/?p=5692" id="facebook-before-5692"><div class="box no-count" data-dcnode-id="742"><a class="count" data-dcnode-id="746" href="#"></a><a aria-labelledby="facebook-before-5692-label" class="share" data-dcnode-id="743" href="#" onclick="return false;"><span aria-hidden="true" data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Share</span></span></a></div><span class="hidden" data-dcnode-id="740" id="facebook-before-5692-label"><span data-dcnode-id="741" instrument_node="">Share on Facebook</span></span></div><div class="twitter sharrre" data-count="%s Tweets" data-dcnode-id="731" data-reader="Tweet this" data-text="Don’t Be a Victim of Fake Job Offers – Run the SCAM Check [Infographic]" data-title="Tweet" data-url="https://www.vistaprojects.com/blog/identify-fake-job-offers/" data-urlalt="https://www.vistaprojects.com/?p=5692" id="twitter-before-5692"><div class="box no-count" data-dcnode-id="734"><a class="count" data-dcnode-id="738" href="#"></a><a aria-labelledby="twitter-before-5692-label" class="share" data-dcnode-id="735" href="#" onclick="return false;"><span aria-hidden="true" data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Tweet</span></span></a></div><span class="hidden" data-dcnode-id="732" id="twitter-before-5692-label"><span data-dcnode-id="733" instrument_node="">Tweet this</span></span></div></div><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="726" instrument_node="">Fraudulent employment offers are on the rise, thanks largely to the anonymity that the internet offers. The spurious agents who make such offers do so in the name of reputable recruiters and companies, even </span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vistaprojects.com/engineering/"><span data-dcnode-id="725" instrument_node="">engineering services firms</span></a><span data-dcnode-id="723" instrument_node="">.</span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">It’s possible that someone may even make such offers claiming to represent </span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vistaprojects.com/"><span data-dcnode-id="719" instrument_node="">Vista Projects</span></a><span data-dcnode-id="717" instrument_node="">. Typically, these types of fake offers involve a request for money from the candidate based on the promise of a job. Sometimes, the request may come with the addendum of another request – this one for your bank account information.</span></p><span data-dcnode-id="715" instrument_node="">
</span><h2 data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">How to Identify Fake Job Offers – the SCAM Check</span></h2><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">The rising instances of fraudulent job offers make it a poignant time to learn how you could recognize and avoid becoming victims of fallacious job offers. Since most of these offers are made through emails, performing a SCAM Check would be a decent way to tackle the problem.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">SCAM Check is explained in more detail below.</span></p><span data-dcnode-id="706" instrument_node="">
</span><h3 data-dcnode-id="702"><strong data-dcnode-id="703"><em data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">S- Sender’s email</span></em></strong></h3><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">A common phishing tactic used by cybercriminals involves spoofing the display name in the sent email. Typically, the spoofed display name used will be that of a recognizable brand. And because only the username is displayed in most mail client inboxes, an unsuspecting receiver has no reason to distrust the fraudulent email as it will appear to be perfectly legitimate.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">A handy general rule is to never trust the display name if it appears unfamiliar. Always check the email address of the sender in addition to checking the display name.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">If it looks suspicious, it probably is – don’t open the email. Another important consideration is embedded links in the email body. If the links appear to be suspicious or weird, don’t click on them. To test a link of this kind, it is best to directly type the website address in a browser window. This would help to circumvent hidden tracking or redirect codes.</span></p><span data-dcnode-id="692" instrument_node="">
</span><h3 data-dcnode-id="688"><strong data-dcnode-id="689"><em data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">C- Confidential information</span></em></strong></h3><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="686" instrument_node="">Communication from banks, credit card companies, and other financial institutions are commonly used in phishing scams by cybercriminals. Always ignore an email that asks for any confidential information such as your credit card details, bank account, or your social insurance or social security number. You really should not submit this information in via email anyhow – instead, try to provide the required information over the phone </span><strong data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">if you trust the person</span></strong><span data-dcnode-id="683" instrument_node="">.</span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Any legitimate bank or financial institution will never use email to ask for personal credentials. All banks and institutions dealing in any kind of financial transactions should have clearly defined and instituted policies against asking for personal information via emails. The same can be said about legitimate employers. For example, no one at Vista would ask a candidate to provide financial information prior to meeting in person.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">It is better to be extremely skeptical about these kinds of emails than to be caught off-guard.</span></p><span data-dcnode-id="675" instrument_node="">
</span><h3 data-dcnode-id="671"><strong data-dcnode-id="672"><em data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">A- Addressee</span></em></strong></h3><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">A common trait of email scammers is that they send in bulk and don’t always have a name to go with the email. This creates another red flag opportunity for you to check.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Pay special attention to any email that includes a generic or open-ended greeting, particularly if you don’t recognize the sender. Examples to watch out for:</span></p><span data-dcnode-id="664" instrument_node="">
</span><div class="gca-column one-half first" data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">“Dear Sir/Madam”</span></div><span data-dcnode-id="661" instrument_node="">
</span><div class="gca-column one-half" data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">“Valued Customer”</span></div><span data-dcnode-id="658" instrument_node="">
</span><div class="gca-column one-half first" data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">“To whom it may concern”</span></div><span data-dcnode-id="655" instrument_node="">
</span><div class="gca-column one-half" data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">“Hey/Hi There”</span></div><div class="gca-utility vertical-spacer" data-dcnode-id="652"></div><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Legitimate businesses use personal greetings and salutations which will typically include your first and/or last name.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">If the name used is indeed yours, however, and it has been misspelled, don’t be in a hurry to respond or click on the mail as this could be a sign that the sender doesn’t know you. We recommend checking for details in the sender’s email signature; if the email does not include any information that helps to validate the person’s identity or if it does not provide contact details of the company/sender, it could easily be a phishing scam.</span></p><span data-dcnode-id="645" instrument_node="">
</span><h3 data-dcnode-id="641"><strong data-dcnode-id="642"><em data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">M- Message</span></em></strong></h3><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Check for spelling errors and/or grammatical inconsistencies in the email. Legitimate businesses take communications with&nbsp;clients or consumers very seriously, appropriately recognizing them as representations of their brand. The odd typo aside, professional communications will not typically have major spelling or grammatical errors.</span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="636" instrument_node="">A tool of choice with many internet scammers is </span><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//translate.google.ca/" rel="noopener" target="_blank"><span data-dcnode-id="635" instrument_node="">Google translate</span></a><span data-dcnode-id="633" instrument_node="">. Messages crafted this way will include errors in spelling and possibly in sentence structure as well. Another common tactic employed by scammers is the use of clickbait in subject lines or messages. These are phrases designed to invoke a sense of urgency or fear, such as “unauthorized login attempted,” or “your account has been suspended.” The use of </span><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">ALL CAPS</span></strong><span data-dcnode-id="630" instrument_node=""> is another tactic that could be a dubious sign of false intentions.</span></p><span data-dcnode-id="628" instrument_node="">
</span><h2 data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Remember the SCAM Check</span></h2><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="621"><img alt="Fake Job Offers - SCAM Check" class="aligncenter size-full wp-image-5699 entered error" data-dcnode-id="624" data-lazy-sizes="(max-width: 900px) 100vw, 900px" data-lazy-src="https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic.png" data-lazy-srcset="https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic.png 900w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-160x300.png 160w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-768x1444.png 768w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-545x1024.png 545w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-13x24.png 13w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-19x36.png 19w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-26x48.png 26w" data-ll-status="error" height="1692" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic.png&amp;raw" srcset="https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic.png 900w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-160x300.png 160w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-768x1444.png 768w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-545x1024.png 545w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-13x24.png 13w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-19x36.png 19w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-26x48.png 26w" width="900"><noscript data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">&lt;img class="aligncenter size-full wp-image-5699" src="https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic.png" alt="Fake Job Offers - SCAM Check" width="900" height="1692" srcset="https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic.png 900w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-160x300.png 160w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-768x1444.png 768w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-545x1024.png 545w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-13x24.png 13w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-19x36.png 19w, https://www.vistaprojects.com/wp-content/uploads/2017/06/Vista-Fake-Job-Offers-SCAM-Check-Infographic-26x48.png 26w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">If you feel suspicious after having done a SCAM Check on an email, you could do a Google search with the name of the sender or company along with keywords like “fraud” or “scam.” Chances are high that someone else might have been defrauded by the same party before, and reports of the same could show up in the search results.</span></p><span data-dcnode-id="617" instrument_node="">
</span><h2 data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Vista’s Recruitment Process</span></h2><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">To ensure we receive the best candidates, and also to make sure that candidates interact directly with Vista representatives, we follow a multi-step recruitment process involving different personnel. If you somehow receive a job offer from Vista without completing this process, it is most likely fraudulent.</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="610" instrument_node="">1. The job applications to Vista are received through our </span><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vistaprojects.com/careers/life-at-a-top-employer/"><span data-dcnode-id="609" instrument_node="">careers portal</span></a><span data-dcnode-id="607" instrument_node="">. This ensures that all the applications are routed directly to our hiring managers.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">2. As the second step, selected candidates are invited to take part in a video interview for the position.</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">3. The candidates shortlisted from video interviews are sent a technical skills test they should undertake. This is to assess their extent of knowledge in their particular area of expertise.</span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">4. Based on the results of the technical test, successful candidates are invited for an in-person interview. This interview would be with the hiring manager, in the presence of a human resources representative.</span></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="595" instrument_node="">5. The shortlisted candidates from the fourth step would make it to the fifth and final step – which is to meet </span><a data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vistaprojects.com/bashar-hussien/"><span data-dcnode-id="594" instrument_node="">our CEO</span></a><span data-dcnode-id="592" instrument_node="">. The interaction with our CEO is largely to assess if the candidate is a solid cultural fit for Vista.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="589" style="text-align: center;"></p><div class="video-container" data-dcnode-id="580" id="videoWithJs"><div class="rll-youtube-player" data-dcnode-id="583" data-id="w2byi9gtSyg" data-query="rel=0&amp;feature=oembed&amp;modestbranding=0&amp;showinfo=0&amp;wmode=transparent" data-src="https://www.youtube.com/embed/w2byi9gtSyg"><div data-dcnode-id="584" data-id="w2byi9gtSyg" data-query="rel=0&amp;feature=oembed&amp;modestbranding=0&amp;showinfo=0&amp;wmode=transparent" data-src="https://www.youtube.com/embed/w2byi9gtSyg"><img alt="" class="entered error" data-dcnode-id="588" data-lazy-src="https://i.ytimg.com/vi/w2byi9gtSyg/hqdefault.jpg" data-ll-status="error" height="360" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/w2byi9gtSyg/hqdefault.jpg&amp;raw" width="480"><noscript data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">&lt;img src="https://i.ytimg.com/vi/ID/hqdefault.jpg" alt="" width="480" height="360"&gt;</span></noscript><button aria-label="play Youtube video" class="play" data-dcnode-id="585"></button></div></div><noscript data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">&lt;iframe src="https://www.youtube.com/embed/w2byi9gtSyg?rel=0&amp;feature=oembed&amp;modestbranding=0&amp;showinfo=0&amp;wmode=transparent" frameborder="0" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></div><span data-dcnode-id="579" instrument_node="">
</span><h3 data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Things to know about job communications from Vista Projects</span></h3><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">With regard to fraudulent or fake job offers, the following are some of the key things you should know about Vista:</span></p><span data-dcnode-id="573" instrument_node="">
</span><ul data-dcnode-id="556"><span data-dcnode-id="572" instrument_node="">
</span><li data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">We never ask for money from prospective candidates. Neither do we request bank account details until a new employee begins to work.</span></li><span data-dcnode-id="569" instrument_node="">
</span><li data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">We don’t ask candidates for their credit score.</span></li><span data-dcnode-id="566" instrument_node="">
</span><li data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">We never instruct a candidate to undertake paid training during the recruitment process.</span></li><span data-dcnode-id="563" instrument_node="">
</span><li data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Apart from salary expectations and past experience, we never ask for a candidate’s confidential information.</span></li><span data-dcnode-id="560" instrument_node="">
</span><li data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">We never extend an offer of employment without the authorized company representative(s) meeting the candidate in person.</span></li><span data-dcnode-id="557" instrument_node="">
</span></ul><span data-dcnode-id="555" instrument_node="">
</span><h2 data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Typical Warning Signs for Fake Job Offers</span></h2><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">There are a few common warning signs with fraudulent job offers which you should be wary of. Some of the most common are listed here:</span></p><span data-dcnode-id="549" instrument_node="">
</span><ul data-dcnode-id="532"><span data-dcnode-id="548" instrument_node="">
</span><li data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">If the offer sounds too good to be true, it’s probably fake. Typical examples include an inordinately high compensation offer compared to the industry standards or offering the job right away without any in-person interview.</span></li><span data-dcnode-id="545" instrument_node="">
</span><li data-dcnode-id="540"><span data-dcnode-id="544" instrument_node="">If the job description in the email sounds too vague, it’s a warning sign. In genuine communication, the job description would be rather descriptive, often listing the different responsibilities point by point. Communication about fake job offers typically gloss over the description – often mentioning just the designation – and focuses more on the purported salary and perks that you would receive. Check out our </span><a data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vistaprojects.com/careers/future-opportunities/"><span data-dcnode-id="543" instrument_node="">future job opportunities</span></a><span data-dcnode-id="541" instrument_node=""> for examples of what a job posting with Vista would look like.</span></li><span data-dcnode-id="539" instrument_node="">
</span><li data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">For some reason, online scammers seem to have an affinity for Yahoo Instant Messenger (IM). Many of the fake job offers online that mention an interview would happen over Yahoo IM. The use of this particular application, of course, doesn’t necessarily mean it’s a scam. But there’s a decent chance it could be. So, if you receive a communication of this kind, please do a background check about the company in question.</span></li><span data-dcnode-id="536" instrument_node="">
</span><li data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Another warning sign is if the email that you receive doesn’t contain any contact address – as in a physical mailing address, office, cell, and/or fax number. Also, if the job offer seems to have come from someone’s personal email ID, the chances of this job being real are not looking too strong.</span></li><span data-dcnode-id="533" instrument_node="">
</span></ul><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">So, keep these warning signs in mind the next time you come across an online job offer. And stay safe out there!</span></p><span data-dcnode-id="528" instrument_node="">
</span><h2 data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Help Vista Prevent Fraud</span></h2><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="524" instrument_node="">If you receive an email or any other mode of communication from someone claiming to represent </span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vistaprojects.com/engineering-consulting/"><span data-dcnode-id="523" instrument_node="">Vista Projects</span></a><span data-dcnode-id="521" instrument_node="">&nbsp;with information contrary to what’s mentioned above, please forward the communication to </span><a data-dcnode-id="519" href="mailto:hr@vistaprojects.com"><span data-dcnode-id="520" instrument_node="">hr@vistaprojects.com</span></a><span data-dcnode-id="518" instrument_node=""> so that we may verify the authenticity of the email.</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">&nbsp;</span></p><span data-dcnode-id="513" instrument_node="">
</span><span data-dcnode-id="510" instrument_node="">
