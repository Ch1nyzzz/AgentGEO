</span><div class="wpd-comment-text" data-dcnode-id="1224"><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">My husband is recently unemployed and was entertaining a job offer.  However, during the telephone interview they kept asking for the name of the bank we use which my husband did not divulge.  The process did not feel right so he merely sent them a text that he was no longer pursuing the job.  Yesterday we received a FedEx envelope with a check for $4,550.00 with a letter from this company advising it was for start up materials.  My husband contacted them to see if they wanted the check returned or if they would just do a stop payment.  The company advised that the only way to return the money was to deposit the check into our account and write them our check for the same amount.  He advised we would merely return the check.  At 1 a.m. this morning they were texting us wanting to know where their check is.  My husband has saved the text messages he exchanged with the company and we still have the original check and letter.  I feel like there is some sort of fraud going on here but I’m not sure how to proceed.  Please advise.</span></p><span data-dcnode-id="1225" instrument_node="">
