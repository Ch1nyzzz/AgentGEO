</span><div data-dcnode-id="301"><span data-dcnode-id="305" instrument_node="">If you want to know how to report unemployment fraud, you must first be sure that someone is committing unemployment fraud. It is a crime to knowingly collect unemployment benefits that you are not eligible to receive, and this is considered unemployment fraud. BUT, it is very important to note that </span><strong data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">IT IS NOT ILLEGAL TO WORK WHILE YOU ARE COLLECTING UNEMPLOYMENT BENEFITS</span></strong><span data-dcnode-id="302" instrument_node="">.</span></div><span data-dcnode-id="300" instrument_node="">
</span><div data-dcnode-id="278"><span data-dcnode-id="299" instrument_node="">
</span><p align="left" data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">When you apply for unemployment you may be informed that you are legally allowed to work at a job and make a certain amount of money while still collecting unemployment benefits. When you initially apply for unemployment, this amount will be calculated, and how this process works will be explained to you by your unemployment counselor.</span></p><span data-dcnode-id="296" instrument_node="">
</span><span data-dcnode-id="294" instrument_node="">
</span><div data-dcnode-id="283" style="float: none; margin:10px 0 10px 0; text-align:center;"><span data-dcnode-id="293" instrument_node="">
</span><span data-dcnode-id="291" instrument_node="">
</span><span data-dcnode-id="289" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5667154515609660" data-ad-slot="2374545732" data-dcnode-id="288" style="display:inline-block;width:300px;height:250px"></ins><span data-dcnode-id="287" instrument_node="">
</span><span data-dcnode-id="284" instrument_node="">
</span></div><span data-dcnode-id="282" instrument_node="">
</span><p align="left" data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">If you do work while you are collecting unemployment benefits, it is VERY important that you follow the rules given to you by your unemployment counselor, which includes reporting where you work, how much you make every week, etc.</span></p><span data-dcnode-id="279" instrument_node="">
</span></div><span data-dcnode-id="277" instrument_node="">
</span><p align="left" data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">If you suspect someone of committing unemployment fraud, you can contact the unemployment office to report them. You may be able to remain anonymous, or you may have to give your name and contact information to report them.</span></p><span data-dcnode-id="274" instrument_node="">
</span><p align="left" data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">When you make your report, be sure to give as much detailed information as possible, including the following:</span></p><span data-dcnode-id="271" instrument_node="">
</span><ul data-dcnode-id="254"><span data-dcnode-id="270" instrument_node="">
</span><li data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Their name</span></li><span data-dcnode-id="267" instrument_node="">
</span><li data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Their address</span></li><span data-dcnode-id="264" instrument_node="">
</span><li data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Their phone number</span></li><span data-dcnode-id="261" instrument_node="">
</span><li data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Where they are working</span></li><span data-dcnode-id="258" instrument_node="">
</span><li data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">How much money they’re making</span></li><span data-dcnode-id="255" instrument_node="">
</span></ul><span data-dcnode-id="253" instrument_node="">
</span><div data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Here’s how to report someone for unemployment fraud:</span></div><span data-dcnode-id="250" instrument_node="">
</span><div data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">&nbsp;</span></div><span data-dcnode-id="247" instrument_node="">
</span><div data-dcnode-id="244"><strong data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Step 1:</span></strong></div><span data-dcnode-id="243" instrument_node="">
</span><div data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">&nbsp;</span></div><span data-dcnode-id="240" instrument_node="">
</span><div data-dcnode-id="235"><span data-dcnode-id="239" instrument_node="">Find you state unemployment website by clicking this link: &nbsp;</span><a data-dcnode-id="236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unemploymenthandbook.com/how-to-report-unemployment-fraud/state-unemployment-directory" title="State Unemployment Directory"><span data-dcnode-id="237" style="color: #0000ff;"><span data-dcnode-id="238" instrument_node="">State Unemployment Directory</span></span></a></div><span data-dcnode-id="234" instrument_node="">
</span><div data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">&nbsp;</span></div><span data-dcnode-id="231" instrument_node="">
</span><div data-dcnode-id="228"><strong data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Step 2:</span></strong></div><span data-dcnode-id="227" instrument_node="">
</span><div data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">&nbsp;</span></div><span data-dcnode-id="224" instrument_node="">
</span><div data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Go to your state unemployment website.</span></div><span data-dcnode-id="221" instrument_node="">
</span><div data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">&nbsp;</span></div><span data-dcnode-id="218" instrument_node="">
</span><div data-dcnode-id="215"><strong data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">Step 3.</span></strong></div><span data-dcnode-id="214" instrument_node="">
</span><div data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">&nbsp;</span></div><span data-dcnode-id="211" instrument_node="">
</span><div data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Click on the link that says: &nbsp;“Report Unemployment Fraud”; “Contact Us”, or other such heading.</span></div><span data-dcnode-id="208" instrument_node="">
</span><div data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">&nbsp;</span></div><span data-dcnode-id="205" instrument_node="">
</span><div data-dcnode-id="202"><strong data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Step 4.</span></strong></div><span data-dcnode-id="201" instrument_node="">
</span><div data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">&nbsp;</span></div><span data-dcnode-id="198" instrument_node="">
</span><div data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Describe the instance of unemployment fraud that you are reporting.</span></div><span data-dcnode-id="195" instrument_node="">
</span><p data-dcnode-id="192"><span data-dcnode-id="194" instrument_node=""> </span></p><div class="widget widget_text widget-shortcode area-arbitrary" data-dcnode-id="176" id="text-9"><span data-dcnode-id="191" instrument_node=""> </span><div class="textwidget" data-dcnode-id="178"><span data-dcnode-id="189" instrument_node="">
</span><div class="box-info" data-dcnode-id="179"><p data-dcnode-id="186"><b data-dcnode-id="187" style="font-size: 16px;"><span data-dcnode-id="188" instrument_node="">Maybe We Can Help:&nbsp;</span></b></p><span data-dcnode-id="185" instrument_node=""> </span><p align="left" data-dcnode-id="180"><span data-dcnode-id="184" instrument_node="">If you can't find the answer to your question, you can fill out the comment form below and I will answer your question ASAP, or you can ask the </span><a data-dcnode-id="182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unemploymenthandbook.com/contact/"><span data-dcnode-id="183" instrument_node="">The Unemployment Expert</span></a><span data-dcnode-id="181" instrument_node="">.</span></p></div></div><span data-dcnode-id="177" instrument_node="">
</span></div><span data-dcnode-id="174" instrument_node=""> </span><div class="widget widget_text widget-shortcode area-arbitrary" data-dcnode-id="168" id="text-8"><span data-dcnode-id="172" instrument_node=""> </span><div class="textwidget" data-dcnode-id="170"></div><span data-dcnode-id="169" instrument_node="">
</span></div><p data-dcnode-id="166"></p><span data-dcnode-id="165" instrument_node="">
