</span><div class="e-mailit_top_toolbox" data-dcnode-id="843"><div class="e-mailit_toolbox square size32" data-dcnode-id="845" data-emailit-title="How to Report GoFundMe Fraud" data-emailit-url="http://gofraudme.com/report-fraud-gofundme/"><span data-dcnode-id="861" instrument_node="">

</span></div><p data-dcnode-id="831"><br data-dcnode-id="841"><span data-dcnode-id="840" instrument_node="">
</span><br data-dcnode-id="838"><span data-dcnode-id="837" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1596619034097517" data-ad-format="auto" data-ad-slot="3205798188" data-dcnode-id="836" style="display: block;"></ins><br data-dcnode-id="835"><span data-dcnode-id="834" instrument_node="">
</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="829" instrument_node="">So you think you found a </span><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gofraudme.com/map-gofundme-frauds/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="828" instrument_node="">fraudulent crowdfunding campaign.</span></a><span data-dcnode-id="826" instrument_node=""> What can you do about it? I’m glad you asked. Although the platform claims “nearly all GoFundMe campaigns are accurate and funds are delivered and used for their stated purpose,” this website wouldn’t exist if GoFundMe fraud weren’t a serious and pervasive issue.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="812"><br data-dcnode-id="822"><span data-dcnode-id="821" instrument_node="">
</span><br data-dcnode-id="819"><span data-dcnode-id="818" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1596619034097517" data-ad-format="auto" data-ad-slot="3205798188" data-dcnode-id="817" style="display: block;"></ins><br data-dcnode-id="816"><span data-dcnode-id="815" instrument_node="">
</span></p><span data-dcnode-id="811" instrument_node="">
</span><h2 data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Report GoFundMe fraud</span></h2><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="807" instrument_node="">Before you get trigger-happy on the Report button, it would be helpful to know what kind of fraud you think it is. Campaign owners are bound by </span><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gofundme.com/terms" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="806" instrument_node="">GoFundMe’s Terms and Conditions</span></a><span data-dcnode-id="804" instrument_node="">, which do outline certain behaviors which are prohibited on the platform. You’re going to have the best luck shutting down a fraudulent GoFundMe page if you can prove it is in violation of these terms.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">As of 12/2015, the following are prohibited in GoFundMe campaigns:</span></p><span data-dcnode-id="799" instrument_node="">
</span><ol data-dcnode-id="743"><span data-dcnode-id="798" instrument_node="">
</span><li data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">any activity that violates any law or governmental regulation;</span></li><span data-dcnode-id="795" instrument_node="">
</span><li data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">content or campaigns that are fraudulent, misleading, inaccurate or dishonest;</span></li><span data-dcnode-id="792" instrument_node="">
</span><li data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">illegal drugs, narcotics, steroids, controlled substances or other products that present a risk to consumer safety or any related paraphernalia;</span></li><span data-dcnode-id="789" instrument_node="">
</span><li data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">knives, explosives, ammunition, firearms, or other weaponry or accessories;</span></li><span data-dcnode-id="786" instrument_node="">
</span><li data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">annuities, investments, equity or lottery contracts, lay-away systems, off-shore banking or similar transactions, money service businesses (including currency exchanges, check cashing or the like), debt collection or crypto-currencies;</span></li><span data-dcnode-id="783" instrument_node="">
</span><li data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">gambling, gaming and/or any other activity with an entry fee and a prize, including, but not limited to casino games, sports betting, fantasy sports, horse or greyhound racing, lottery tickets, other ventures that facilitate gambling, games of skill or chance (whether or not it is legally defined as a lottery) or sweepstakes;</span></li><span data-dcnode-id="780" instrument_node="">
</span><li data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">the promotion of hate, violence, harassment, discrimination or terrorism, or racial, ethnic, or gender intolerance of any kind;</span></li><span data-dcnode-id="777" instrument_node="">
</span><li data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">activities with, in, or involving countries, regions, governments, persons, or entities (including but not limited to Specially Designated Nationals) that are subject to U.S. economic sanctions, unless authorized by the Office of Foreign Assets Control, U.S. Department of the Treasury;</span></li><span data-dcnode-id="774" instrument_node="">
</span><li data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">human trafficking or exploitation;</span></li><span data-dcnode-id="771" instrument_node="">
</span><li data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">pornography or other sexual content;</span></li><span data-dcnode-id="768" instrument_node="">
</span><li data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">offensive, graphic, perverse or sensitive content;</span></li><span data-dcnode-id="765" instrument_node="">
</span><li data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">the defense or support of anyone alleged to be involved in criminal activity;</span></li><span data-dcnode-id="762" instrument_node="">
</span><li data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">offering monetary rewards, including gift cards;</span></li><span data-dcnode-id="759" instrument_node="">
</span><li data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">funding an abortion;</span></li><span data-dcnode-id="756" instrument_node="">
</span><li data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">ending the life of an animal;</span></li><span data-dcnode-id="753" instrument_node="">
</span><li data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">transactions for the sale of items before the seller has control or possession of the item;</span></li><span data-dcnode-id="750" instrument_node="">
</span><li data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">collection of payments on behalf of merchants by payment processors or otherwise; or</span></li><span data-dcnode-id="747" instrument_node="">
</span><li data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">credit repair or debt settlement services.</span></li><span data-dcnode-id="744" instrument_node="">
</span></ol><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="741" instrument_node="">A large portion of the messages we get from people asking for help in shutting down scam campaigns fall under </span><em data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">content or campaigns that are fraudulent, misleading, inaccurate or dishonest; </span></em><span data-dcnode-id="738" instrument_node="">it just so happens that’s also the most difficult violation to prove. Think about it: a GoFundMe page that explicitly requests donations for cocaine, abortions, and/or dildos is a flagrant violation of the rules. However, a page that purports to exist for one purpose (say, “Help Scummy Sally avoid eviction”) but actually exists for another, unspoken purpose (“actually, all your donations will go toward Scummy Sally’s cocaine habit”) is much harder to prove. How do you know Scummy Sally won’t spend the money on back rent? Unless of course you’re Scummy Sally’s drug dealer, in which case you have intimate knowledge of her finances, however you are probably unlikely to report her ratchet GoFundMe as fraud.</span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">GoFundMe doesn’t know Scummy Sally and with 100,000 new fundraisers started every single month, they have no way to know which Scummy Sally of the countless Scummy Sallies on their site are actually snorting up their crowdfunding money. So if you’re taking it upon yourself to report a fundraiser you believe to be fraudulent, you need to have your evidence ready.</span></p><span data-dcnode-id="733" instrument_node="">
</span><h2 data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">How to report a fraudulent GoFundMe page</span></h2><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">So, head to her campaign and then scroll down to the bottom and hit the handy dandy report button:</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><img alt="report a GoFundMe page" class="alignnone wp-image-191" data-dcnode-id="726" height="79" loading="lazy" sizes="(max-width: 463px) 100vw, 463px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/gofraudme.com/wp-content/uploads/2016/04/report-gofundme.png%3Fresize%3D463%252C88&amp;raw" srcset="https://i1.wp.com/gofraudme.com/wp-content/uploads/2016/04/report-gofundme.png?resize=300%2C57 300w, https://i1.wp.com/gofraudme.com/wp-content/uploads/2016/04/report-gofundme.png?w=565 565w" width="413"></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">From here, you’ll be presented with a set of options. It’s obvious which one you should pick but fuck it, we’ll tell you anyway:</span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><img alt="Screen Shot 2016-04-09 at 6" class="alignnone wp-image-265" data-dcnode-id="720" height="355" loading="lazy" sizes="(max-width: 434px) 100vw, 434px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/gofraudme.com/wp-content/uploads/2016/04/Screen-Shot-2016-04-09-at-6.png%3Fresize%3D434%252C373&amp;raw" srcset="https://i2.wp.com/gofraudme.com/wp-content/uploads/2016/04/Screen-Shot-2016-04-09-at-6.png?resize=300%2C258 300w, https://i2.wp.com/gofraudme.com/wp-content/uploads/2016/04/Screen-Shot-2016-04-09-at-6.png?w=443 443w" width="413"></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">From there, you’ll get a set of FAQs. Most notable:</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">“Personal disputes between two parties will be ignored.”</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Let me repeat that on GoFundMe’s behalf:</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="704"><em data-dcnode-id="705"><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">“Personal disputes between two parties will be ignored.”</span></strong><span data-dcnode-id="706" instrument_node=""> </span></em></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">What that means is that if you and Scummy Sally used to be friends but for whatever reason got all pissed at each other and now you want to hate on her GoFundMe page, they could not possibly care less. Don’t use the Report button to troll people you don’t like or high school friends on your Facebook page using GoFundMe for reasons you find morally repugnant. There will always be campaigns that straddle the line between ethical and dubious but it isn’t your job to be the crowdfunding police. The “report” function should be used for fraud. That said, feel free to drop us a line if you need to complain about what a loser Sally is.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Now, if you are sure the campaign is fraudulent and not just stupid or ridiculous (to date, being a jackass on GoFundMe is not illegal), you can scroll down further:</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><img alt="Report GoFundMe campaign" class="alignnone wp-image-266" data-dcnode-id="696" height="278" loading="lazy" sizes="(max-width: 444px) 100vw, 444px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/gofraudme.com/wp-content/uploads/2016/04/Screen-Shot-2016-04-09-at-6-1.png%3Fresize%3D444%252C299&amp;raw" srcset="https://i1.wp.com/gofraudme.com/wp-content/uploads/2016/04/Screen-Shot-2016-04-09-at-6-1.png?resize=300%2C202 300w, https://i1.wp.com/gofraudme.com/wp-content/uploads/2016/04/Screen-Shot-2016-04-09-at-6-1.png?resize=600%2C404 600w, https://i1.wp.com/gofraudme.com/wp-content/uploads/2016/04/Screen-Shot-2016-04-09-at-6-1.png?w=606 606w" width="413"></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Before you take that step, ask yourself if the suspected fraud falls under GoFundMe guidelines for possible fraud:</span></p><span data-dcnode-id="691" instrument_node="">
</span><blockquote data-dcnode-id="677"><span data-dcnode-id="690" instrument_node="">
</span><ol data-dcnode-id="679"><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">They are intentionally including factually incorrect information on their campaign.</span></li><span data-dcnode-id="686" instrument_node="">
</span><li data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">They have not used the funds that were raised for the stated purpose within a reasonable amount of time.</span></li><span data-dcnode-id="683" instrument_node="">
</span><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">They are impersonating someone else or have copied a campaign that already exists on GoFundMe.</span></li><span data-dcnode-id="680" instrument_node="">
</span></ol><span data-dcnode-id="678" instrument_node="">
</span></blockquote><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">From there, you’ll fill out your information and explain why you think the campaign is fraudulent. This step is the most important and I say this with the utmost respect but holy shit, please try to form complete sentences. I can’t tell you how many messages I get that are written using 2nd grade English and lacking any sort of logic or point. GoFundMe can’t help you if they can’t understand you. So be succinct, be informative, and above all else </span><strong data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">be sensible</span></strong><span data-dcnode-id="672" instrument_node="">. They don’t care about your backstory or how Scummy Sally kicked your cat that one time 20 years ago, stick to the facts surrounding the campaign and why you believe it to be fraudulent.</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">It seems that GoFundMe is most responsive to actual donors rather than concerned third parties who haven’t actually been ripped off by a GoFundMe fraudster, so if you gave to the campaign in question be sure to note that.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Being that it’s a relatively new phenomenon and growing leaps and bounds every day, crowdfunding is still a new technology and as such, policing it can be a tricky business. Staying diligent and reporting any suspect pages does help, at least until law enforcement is better empowered to prosecute offenders and crowdfunding platforms themselves find a way to weed out questionable campaigns. Until that time comes, we’ll be here.</span></p><span data-dcnode-id="664" instrument_node="">
</span><h2 data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">GoFundMe Refund Policy</span></h2><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="660" instrument_node="">As of October 2016, GoFundMe now offers The </span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gofraudme.com/new-gofundme-refund-policy/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="659" instrument_node="">GoFundMe Guarantee</span></a><span data-dcnode-id="657" instrument_node="">. What this means is that if the campaign and your donation meet certain terms, you can get your money back.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="654" instrument_node="">If you believe you have been a victim of GoFundMe fraud, then follow </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pages.gofundme.com/guarantee/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="653" instrument_node="">this link</span></a><span data-dcnode-id="651" instrument_node=""> to beg and plead to get your money back. And good luck.</span></p><span data-dcnode-id="649" instrument_node="">
</span><h2 data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Report Fraud to Us</span></h2><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="645" instrument_node="">If you need additional assistance, you can </span><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gofraudme.com/report-gofundme-fraud/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="644" instrument_node="">use this form</span></a><span data-dcnode-id="642" instrument_node="">to report GoFundMe fraud to us and we’ll look into it. Please have evidence ready to corroborate your claim, and keep in mind we aren’t the police nor are we GoFundMe, so we can’t remove campaigns or prosecute scammers.</span></p><span data-dcnode-id="640" instrument_node="">
