</span><h1 class="page-title flexible-header--title" data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Whom do I contact to report Medicare fraud?</span></h1><span data-dcnode-id="1871" instrument_node="">
</span><hr class="hidden-xs" data-dcnode-id="1870" role="presentation"><span data-dcnode-id="1869" instrument_node="">

</span><div class="everywhere-top-content iparsys parsys" data-dcnode-id="1754"><div class="textimage parbase section" data-dcnode-id="1792"><span data-dcnode-id="1846" instrument_node="">

</span><span data-dcnode-id="1837" instrument_node="">
</span><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1829"><a data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/espanol/salud/medicare-preguntas-respuestas/como-reportar-fraude-contra-medicare/%3Fintcmp%3DAE-HLTH-TOSPA-TOGL-ES"><span data-dcnode-id="1834" instrument_node="">En español</span></a><span data-dcnode-id="1832" instrument_node=""> | Fraud against Medicare — usually committed by medical practitioners, equipment suppliers and related entities that claim money from Medicare for services they have not provided — is a huge, multibillion-dollar industry. The Office of Inspector General of Medicare investigates and prosecutes many such cases, some of which are brought to light by Medicare beneficiaries who notice something that doesn’t look right and report it. Often it’s the result of studying their Medicare Summary Notice and realizing that the statement is showing that Medicare paid for a service or item that they didn’t receive.</span><br data-dcnode-id="1831"><span data-dcnode-id="1830" instrument_node="">
</span></p><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">If you suspect a fraud has occurred, you should report it, providing as many details as you can, in any of the following ways:</span></p><span data-dcnode-id="1825" instrument_node="">
</span><ul data-dcnode-id="1811"><span data-dcnode-id="1824" instrument_node="">
</span><li data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Call Medicare’s help line at 800-633-4227.</span></li><span data-dcnode-id="1821" instrument_node="">
</span><li data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Call the Office of Inspector General directly at 800‑HHS‑TIPS (800‑447‑8477, or TTY 800‑377‑4950).</span></li><span data-dcnode-id="1818" instrument_node="">
</span><li data-dcnode-id="1813"><span data-dcnode-id="1817" instrument_node="">File an </span><a data-dcnode-id="1815" data-overlay-msg="AARP.Everywhere.LeavingModal.drawOverlay(this,'',/content/aarpe/en/home/health/medicare-qa-tool/reporting-medicare-fraud.html,'','You are now leaving AARP.org and going to a website that is not operated by AARP. A different privacy policy and terms of service will apply.');return false;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//forms.oig.hhs.gov/hotlineoperations/report-fraud-form.aspx"><span data-dcnode-id="1816" instrument_node="">online report</span></a><span data-dcnode-id="1814" instrument_node=""> with the Office of Inspector General.</span></li><span data-dcnode-id="1812" instrument_node="">
