</span><div class="has_ae_slider elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-4807cca ae-bg-gallery-type-default" data-dcnode-id="2750" data-element_type="column" data-id="4807cca"><span data-dcnode-id="2902" instrument_node="">

</span><div class="elementor-element elementor-element-4f5b1b0 elementor-widget elementor-widget-theme-post-content" data-dcnode-id="2756" data-element_type="widget" data-id="4f5b1b0" data-widget_type="theme-post-content.default"><span data-dcnode-id="2899" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="2758"><span data-dcnode-id="2898" instrument_node="">
</span><p data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">Reporting HMRC VAT fraud can be a daunting task, but if you believe someone is evading taxes, you have a responsibility to report&nbsp;VAT fraud.</span></p><span data-dcnode-id="2895" instrument_node="">
</span><p data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">Here, our guide explores what VAT fraud is, how to report VAT fraud anonymously and what to do if you’ve been reported for HMRC VAT fraud.</span></p><span data-dcnode-id="2892" instrument_node="">
</span><p data-dcnode-id="2889"><strong data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">What is VAT fraud?</span></strong></p><span data-dcnode-id="2888" instrument_node="">
</span><p data-dcnode-id="2884"><a data-dcnode-id="2886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stpaulschambers.com/expertise/vat-fraud/"><span data-dcnode-id="2887" instrument_node="">VAT fraud</span></a><span data-dcnode-id="2885" instrument_node="">&nbsp;is a form of tax evasion on the of goods and services. VAT fraud occurs when a person or business avoids charging VAT, or doesn’t pay HMRC the VAT owed, but still charges customers the VAT rate.</span></p><span data-dcnode-id="2883" instrument_node="">
</span><p data-dcnode-id="2878"><span data-dcnode-id="2882" instrument_node="">Within the UK, VAT is commonly at a rate of 20%. Although in response to the Covid-19 pandemic, this rate has been&nbsp;</span><a data-dcnode-id="2880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/vat-reduced-rate-for-hospitality-holiday-accommodation-and-attractions"><span data-dcnode-id="2881" instrument_node="">reduced to 5%</span></a><span data-dcnode-id="2879" instrument_node="">&nbsp;for certain goods until January 2021.</span></p><span data-dcnode-id="2877" instrument_node="">
</span><p data-dcnode-id="2874"><strong data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">How is VAT fraud committed?</span></strong></p><span data-dcnode-id="2873" instrument_node="">
</span><p data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">Four signs a company might be evading VAT include:</span></p><span data-dcnode-id="2870" instrument_node="">
</span><ol data-dcnode-id="2856"><span data-dcnode-id="2869" instrument_node="">
</span><li data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">Not being registered for VAT at all, when they should be</span></li><span data-dcnode-id="2866" instrument_node="">
</span><li data-dcnode-id="2864"><span data-dcnode-id="2865" instrument_node="">Dealing in cash only on all or some jobs</span></li><span data-dcnode-id="2863" instrument_node="">
</span><li data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">Asking for indirect payments or payments dispersed across different names</span></li><span data-dcnode-id="2860" instrument_node="">
</span><li data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">Using an invalid or incorrect VAT number</span></li><span data-dcnode-id="2857" instrument_node="">
</span></ol><span data-dcnode-id="2855" instrument_node="">
</span><p data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">An example of HMRC VAT fraud is if you are having some gardening work done at your home and the gardener asks for cash-in-hand to avoid paying the VAT tax.</span></p><span data-dcnode-id="2852" instrument_node="">
</span><p data-dcnode-id="2849"><strong data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">What are the consequences of&nbsp;HMRC VAT fraud?</span></strong></p><span data-dcnode-id="2848" instrument_node="">
</span><p data-dcnode-id="2843"><span data-dcnode-id="2847" instrument_node="">Ultimately, if you are found guilty of VAT fraud, the consequences are a fine of up to £20,0000 and a maximum seven-year prison sentence. The levels of high, medium or low&nbsp;culpability, outlined in our </span><a data-dcnode-id="2845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stpaulschambers.com/expertise/vat-fraud/"><span data-dcnode-id="2846" instrument_node="">VAT Fraud</span></a><span data-dcnode-id="2844" instrument_node=""> service information, are used to sentence the accused.</span></p><span data-dcnode-id="2842" instrument_node="">
</span><p data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">If you suspect that an individual or business is intentionally or unintentionally committing HMRC VAT fraud, you must report it. Failure to report VAT fraud to HMRC could result in you being responsible for paying the tax yourself!</span></p><span data-dcnode-id="2839" instrument_node="">
</span><h2 data-dcnode-id="2835"><strong data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">How to </span></strong><span data-dcnode-id="2836" instrument_node="">report VAT fraud?</span></h2><span data-dcnode-id="2834" instrument_node="">
</span><p data-dcnode-id="2826"><span data-dcnode-id="2833" instrument_node="">The quickest way to report any suspected VAT fraud is through the confidential and anonymous HMRC </span><a data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tax.service.gov.uk/shortforms/form/TEH_IRF%3Fdept-name%3DTEH%26sub-dep%2520%2520t-name%3D%26location%3D39"><span data-dcnode-id="2832" instrument_node="">online</span></a><span data-dcnode-id="2830" instrument_node="">&nbsp;form or by reporting the business to the </span><a data-dcnode-id="2828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/organisations/hm-revenue-customs/contact/report-fraud-to-hmrc"><span data-dcnode-id="2829" instrument_node="">fraud hotline</span></a><span data-dcnode-id="2827" instrument_node="">. Once you’ve reported the business or person suspected of VAT fraud, an investigation will then be opened by HMRC.</span></p><span data-dcnode-id="2825" instrument_node="">
</span><p data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">You don’t have to complete every section of the online form, although HMRC encourages you to provide as much information as possible. It’s useful to provide as much detail about how you’ve come to discover that the person or business is not charging or paying VAT.</span></p><span data-dcnode-id="2822" instrument_node="">
</span><p data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">The online form has five sections which include:</span></p><span data-dcnode-id="2819" instrument_node="">
</span><ol data-dcnode-id="2802"><span data-dcnode-id="2818" instrument_node="">
</span><li data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">Information on the suspected business or person</span></li><span data-dcnode-id="2815" instrument_node="">
</span><li data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Their business details</span></li><span data-dcnode-id="2812" instrument_node="">
</span><li data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Information use</span></li><span data-dcnode-id="2809" instrument_node="">
</span><li data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">Your personal details</span></li><span data-dcnode-id="2806" instrument_node="">
</span><li data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">Form submitting</span></li><span data-dcnode-id="2803" instrument_node="">
</span></ol><span data-dcnode-id="2801" instrument_node="">
</span><h3 data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">What safety measures are there for reporting VAT fraud?</span></h3><span data-dcnode-id="2798" instrument_node="">
</span><p data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">Your personal safety is a top priority; hence it’s important to bear that in mind when you report VAT fraud. For instance, when reporting VAT fraud over the telephone or online, you don’t have to give your personal details</span></p><span data-dcnode-id="2795" instrument_node="">
</span><p data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">For your protection, HMRC recommends further safety guidelines to consider:</span></p><span data-dcnode-id="2792" instrument_node="">
</span><ul data-dcnode-id="2781"><span data-dcnode-id="2791" instrument_node="">
</span><li data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">Don’t tell anybody that you’re reporting the activity</span></li><span data-dcnode-id="2788" instrument_node="">
</span><li data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Don’t take it upon yourself to find out more about the activity</span></li><span data-dcnode-id="2785" instrument_node="">
</span><li data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">Don’t encourage anybody to break the law to find out more information</span></li><span data-dcnode-id="2782" instrument_node="">
</span></ul><span data-dcnode-id="2780" instrument_node="">
</span><h4 data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">What to do if you’re being investigated for VAT fraud?</span></h4><span data-dcnode-id="2777" instrument_node="">
</span><p data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">If you believe that someone suspects you are involved in tax evasion or believe that someone has reported you, there are several factors to be aware of.</span></p><span data-dcnode-id="2774" instrument_node="">
</span><p data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">While reporting VAT fraud is typically done with good intentions, VAT reports are not always accurate, and businesses can be falsely accused of tax evasion. The consequences of allegations can be dire, including business raids, arrests of business personnel, account freezes, and police questioning. This can, of course, be hugely detrimental to the reputation of the business.</span></p><span data-dcnode-id="2771" instrument_node="">
</span><p data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">It’s important to have a solid legal team in place during a VAT fraud investigation as the outcome of the case relies heavily on the expertise and skill of the defence, due to the intricacies of UK and European tax law and the particularly specialist terminology. As VAT fraud investigations are often incredibly complex and detailed, it can take years for a tax fraud case to be laid to rest.</span></p><span data-dcnode-id="2768" instrument_node="">
</span><p data-dcnode-id="2760"><span data-dcnode-id="2767" instrument_node="">If you or your business is being investigated for HMRC VAT fraud, it’s never too early to get in touch and form a strong defence. Please don’t hesitate to </span><a data-dcnode-id="2765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stpaulschambers.com/contact/"><span data-dcnode-id="2766" instrument_node="">get in touch</span></a><span data-dcnode-id="2764" instrument_node=""> with our experienced&nbsp;</span><a data-dcnode-id="2762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stpaulschambers.com/expertise/fraud/"><span data-dcnode-id="2763" instrument_node="">fraud barristers</span></a><span data-dcnode-id="2761" instrument_node="">&nbsp;today; we are here to support your case.</span></p><span data-dcnode-id="2759" instrument_node="">
</span></div><span data-dcnode-id="2757" instrument_node="">
</span></div><span data-dcnode-id="2755" instrument_node="">
