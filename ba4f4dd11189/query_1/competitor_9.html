&lt;/picture&gt;
</span></noscript><p data-dcnode-id="2131"><span data-dcnode-id="2135" instrument_node="">You will </span><em data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">not</span></em><span data-dcnode-id="2132" instrument_node=""> get paid if you fall for one of these scams, even if you do work for them for a period of time in what seems to be a job. And you may end up in big trouble.</span></p><span data-dcnode-id="2130" instrument_node="">
</span><p data-dcnode-id="2125" style="text-align: center; font-size: 16px; font-weight: bold; background-color: rgba(0, 197, 179, 0.4);"><span data-dcnode-id="2129" instrument_node="">Trust </span><em data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">AFTER</span></em><span data-dcnode-id="2126" instrument_node=""> you verify!</span></p><span data-dcnode-id="2124" instrument_node="">
</span><span data-dcnode-id="2122" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7019316728998862" data-ad-format="auto" data-ad-slot="3575862246" data-dcnode-id="2121" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="2120" instrument_node="">
</span><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">Very unpleasant consequences, like the loss of your identity, loss of your money, a ruined credit rating, and worse may result if you fall for one of these scams.</span></p><span data-dcnode-id="2114" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2113" instrument_node="">If they get your unwitting cooperation in a crime (</span><a data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//job-hunt.org/reshipper-payment-clerk-scams/" title="The Reshipment and Payment Rep Scams"><span data-dcnode-id="2112" instrument_node="">the reshipment and payment rep scams</span></a><span data-dcnode-id="2110" instrument_node="">), participation in a</span><strong data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node=""> felony</span></strong><span data-dcnode-id="2107" instrument_node=""> could land you in jail. Not trivial!</span></p><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2103" style="text-align: center; font-size: 16px; font-weight: bold; background-color: rgba(0, 197, 179, 0.4);"><span data-dcnode-id="2104" instrument_node="">Once they have private information from you, they have everything they need for their scam! They can drain your bank account, apply for (and receive) a tax refund in your name, and dozens of other things that make your life very difficult.</span></p><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2091"><span data-dcnode-id="2101" instrument_node="">Be extremely wary when an employer approaches you to hire you for a job which pays </span><em data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">extremely</span></em><span data-dcnode-id="2098" instrument_node=""> well but that anyone could do. Read </span><a data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//job-hunt.org/9-scam-characteristics/" title="9 Characteristics of a Job Scam"><span data-dcnode-id="2097" instrument_node="">9 Characteristics of a Job Scam</span></a><span data-dcnode-id="2095" instrument_node=""> and </span><a data-dcnode-id="2093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//job-hunt.org/avoiding-scam-jobs/scam-jobs-sniff-test/" title="Scam Jobs Sniff Test"><span data-dcnode-id="2094" instrument_node="">Scam Jobs Sniff Test</span></a><span data-dcnode-id="2092" instrument_node=""> first.</span></p><span data-dcnode-id="2090" instrument_node="">
</span><h2 data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">5 Major Types of Job Search Scams and Job Frauds</span></h2><span data-dcnode-id="2087" instrument_node="">
</span><p data-dcnode-id="2082"><span data-dcnode-id="2086" instrument_node="">The scammers are endlessly creative, so this is </span><em data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">not </span></em><span data-dcnode-id="2083" instrument_node="">everything, by any means.</span></p><span data-dcnode-id="2081" instrument_node="">
</span><p data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">But these are the major scams I have discovered.</span></p><span data-dcnode-id="2078" instrument_node="">
</span><h3 data-dcnode-id="2071"><strong data-dcnode-id="2072"><em data-dcnode-id="2073" style="background-color: rgba(0, 197, 179, 0.4);"><span data-dcnode-id="2077" instrument_node="">&nbsp; 1.&nbsp; E-mailed Job Offer </span><em data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Supposedly</span></em><span data-dcnode-id="2074" instrument_node=""> from an Employer, Recruiter, or Job Board. &nbsp;</span></em></strong></h3><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Maybe the email claims they found your resume on Monster or CareerBuilder or their company website, etc.</span></p><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2066" instrument_node="">The message says they think you are</span><em data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node=""> the perfect candidate</span></em><span data-dcnode-id="2063" instrument_node=""> for this new opportunity.</span></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2060" instrument_node="">You might not remember ever applying (and, if it’s a scam, you likely didn’t). You may not remember seeing the employer’s name before. Or, perhaps the employer name is a famous one you would </span><em data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">love</span></em><span data-dcnode-id="2057" instrument_node=""> to work for.</span></p><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2054" instrument_node="">And, they are</span><em data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node=""> very</span></em><span data-dcnode-id="2051" instrument_node=""> interested in hiring you — </span><em data-dcnode-id="2048"><strong data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">immediately! </span></strong></em></p><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">All you need to do to is send them personal information for a pre-employment credit check, complete your application, or give them the information they need to complete the process so they can bring you on board as a new employee.</span></p><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">They want you to give them sensitive information like a copy of your driver’s license (which tells them your birthdate), your Social Security Number (to complete the paperwork to hire you), and/or your bank account number (for depositing those never-received paychecks).</span></p><span data-dcnode-id="2040" instrument_node="">
</span><span data-dcnode-id="2038" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7019316728998862" data-ad-format="auto" data-ad-slot="3575862246" data-dcnode-id="2037" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="2036" instrument_node="">
</span><span data-dcnode-id="2033" instrument_node="">
</span><p data-dcnode-id="2028" style="text-align: center; font-size: 16px; font-weight: bold; background-color: rgba(0, 197, 179, 0.4);"><span data-dcnode-id="2032" instrument_node="">Be very wary of an email from someone you don’t know,</span><em data-dcnode-id="2029"><strong data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node=""> regardless of the logos and names visible in the email message.</span></strong></em></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Logos and names can be “borrowed” from websites. Check the email address. Since the From: email address may be “spoofed” with some email software, do not trust that the From: address is genuine. It may not be!</span></p><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Using a fictional example of a recruiter named Mary Smith, who is a fictional employee of IBM (a real company, but any employer’s name could be used, large or small, well-known or not), you would contact her via an email address from the domain name for that employer.</span></p><span data-dcnode-id="2021" instrument_node="">
</span><p data-dcnode-id="2004"><span data-dcnode-id="2020" instrument_node="">So, if she existed, Mary’s real email address would be something like MarySmith</span><strong data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">@IBM.com</span></strong><span data-dcnode-id="2017" instrument_node="">. If Mary Smith is really a recruiter for IBM, she would NOT ask you to send your resume to MarySmith</span><em data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">@yahoo.com</span></em><span data-dcnode-id="2014" instrument_node="">, MarySmith</span><em data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">@gmail.com</span></em><span data-dcnode-id="2011" instrument_node="">, IBM-recruiting</span><em data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">@gmail.com</span></em><span data-dcnode-id="2008" instrument_node="">, MarySmithIBMrecruite</span><em data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">r@yahoo.com</span></em><span data-dcnode-id="2005" instrument_node="">, etc.</span></p><span data-dcnode-id="2003" instrument_node="">
</span><p data-dcnode-id="1998"><span data-dcnode-id="2002" instrument_node="">A </span><em data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">real</span></em><span data-dcnode-id="1999" instrument_node=""> Mary Smith who was actually a recruiter from IBM would probably ask you to respond to her via her @IBM.com email address or to post your resume on the IBM.com website (more on that below).</span></p><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1992"><span data-dcnode-id="1996" instrument_node="">[MORE: </span><a data-dcnode-id="1994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//job-hunt.org/article_privacy_protection_methods/" title="How to Protect Your Privacy in Your Job Search"><span data-dcnode-id="1995" instrument_node="">How to Protect Your Privacy in Your Job Search</span></a><span data-dcnode-id="1993" instrument_node="">.]</span></p><span data-dcnode-id="1991" instrument_node="">
</span><h3 data-dcnode-id="1987"><strong data-dcnode-id="1988"><em data-dcnode-id="1989" style="background-color: rgba(0, 197, 179, 0.4);"><span data-dcnode-id="1990" instrument_node="">&nbsp; 2.&nbsp; Fake Jobs on Social Media &nbsp;</span></em></strong></h3><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">This is the newest venue for job scams, and no social network is imune or perfectly safe. Be cautious of jobs and recruiters you find on social media.</span></p><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Fake Facebook pages exist with many “opportunities” shared and promoted. Bogus jobs may also be posted on legitimate Facebook pages, too.</span></p><span data-dcnode-id="1980" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Fake LinkedIn Profiles are created, and they are used to post “opportunities” in LinkedIn Groups. Of course, sometimes real LinkedIn Profiles share fake jobs, too. LinkedIn does try to eliminate the fake Profiles, and limit access (or remove the accounts) when someone with a real Profile spreads junk inside of LinkedIn.</span></p><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Scams can be sent out in Twitter where the link is a shortened URL (bit.ly or ow.ly) from real or fake accounts. Those shortened links could lead anywhere, so keep your shields up on Twitter, too.</span></p><span data-dcnode-id="1974" instrument_node="">
</span><span data-dcnode-id="1972" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7019316728998862" data-ad-format="auto" data-ad-slot="3575862246" data-dcnode-id="1971" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1970" instrument_node="">
</span><span data-dcnode-id="1967" instrument_node="">
</span><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Verify that the recruiter or employer social media account is genuine before you click and apply. Google the employer or recruiter name. If a Twitter account has fewer than 500 followers, be cautious, especially if the employer name claimed is well-known.</span></p><span data-dcnode-id="1964" instrument_node="">
</span><h3 data-dcnode-id="1957"><strong data-dcnode-id="1958"><em data-dcnode-id="1959" style="background-color: rgba(0, 197, 179, 0.4);"><span data-dcnode-id="1963" instrument_node="">&nbsp; 3.&nbsp; Fake Jobs </span><em data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Apparently</span></em><span data-dcnode-id="1960" instrument_node=""> from Legitimate Employers &nbsp;</span></em></strong></h3><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">The job posting or the website claim to be a real employer, perhaps from a well-known company like Google or Apple or often from less well-known names. But, although the employer name is legitimate, the jobs are NOT legitimate because they not actually from that employer.</span></p><span data-dcnode-id="1953" instrument_node="">
</span><p data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">In this scam, the real employer doesn’t have anything to do with the posting. The scammers abuse a legitimate employer’s identity.</span></p><span data-dcnode-id="1950" instrument_node="">
</span><p data-dcnode-id="1948" style="text-align: center; font-size: 16px; font-weight: bold; background-color: rgba(0, 197, 179, 0.4);"><span data-dcnode-id="1949" instrument_node="">I call this “corporate identity theft.” because the scammers have “stolen” a real company’s identity to use in this scam.</span></p><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">The scammers are advertising bogus jobs that are completely unrelated to the legitimate employer named in the posting or on the site.</span></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1939"><span data-dcnode-id="1943" instrument_node="">[MORE: </span><a data-dcnode-id="1941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//job-hunt.org/article_about_domain_names/"><span data-dcnode-id="1942" instrument_node="">Understanding Domain Names, URLs, and Web Addresses</span></a><span data-dcnode-id="1940" instrument_node="">.]</span></p><span data-dcnode-id="1938" instrument_node="">
</span><h3 data-dcnode-id="1934"><strong data-dcnode-id="1935"><em data-dcnode-id="1936" style="background-color: rgba(0, 197, 179, 0.4);"><span data-dcnode-id="1937" instrument_node="">&nbsp; 4.&nbsp; Bogus Jobs on Legitimate Job Boards &nbsp;</span></em></strong></h3><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">The job board may be a well-known brand name like Indeed, Monster, CareerBuilder, Craigslist, Jobs2Careers, Snagajob, or your favorite professional association’s “career center.” But, while the job board is legitimate, the job may be a scam.</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1929" instrument_node="">Frankly, I wouldn’t trust all of the jobs posted on </span><em data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">any</span></em><span data-dcnode-id="1926" instrument_node=""> website completely, with the exception of </span><a <a="" data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flexjobs.com/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1925" instrument_node="">FlexJobs.com</span></a><span data-dcnode-id="1923" instrument_node=""> (our sister site that has a team of </span><a <a="" data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flexjobs.com/research-team" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1922" instrument_node="">researchers vetting all the jobs</span></a><span data-dcnode-id="1920" instrument_node="">) and </span><a <a="" data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usajobs.gov/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1919" instrument_node="">USAJOBS.gov</span></a><span data-dcnode-id="1917" instrument_node=""> (and then I’d double-check to be sure that I was </span><em data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">truly </span></em><span data-dcnode-id="1914" instrument_node="">viewing a page of USAJOBS.gov by checking the URL in my browser).</span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">The fact that an employer, or a scammer, must first pay a job board in order to post jobs does NOT guarantee that the job is legitimate. The scammers may make enough money off their scam to cover the cost of the listing. Or they may be scamming the job board, too, by using a stolen credit card to pay for the posting.</span></p><span data-dcnode-id="1909" instrument_node="">
</span><span data-dcnode-id="1907" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7019316728998862" data-ad-format="auto" data-ad-slot="3575862246" data-dcnode-id="1906" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1905" instrument_node="">
</span><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">These days, the people running websites which have job postings must work hard to make sure that they don’t allow fake jobs to be posted on their sites. Unfortunately, not all of the job boards do a great job of vetting employers and job postings, and sometimes they are fooled by the scammers, too.</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1898" instrument_node="">[Read </span><a data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//job-hunt.org/choosing/" title="Choosing Good Job Boards"><span data-dcnode-id="1897" instrument_node="">Choosing Good Job Boards</span></a><span data-dcnode-id="1895" instrument_node=""> for more information.]</span></p><span data-dcnode-id="1893" instrument_node="">
</span><h3 data-dcnode-id="1889"><strong data-dcnode-id="1890"><em data-dcnode-id="1891" style="background-color: rgba(0, 197, 179, 0.4);"><span data-dcnode-id="1892" instrument_node="">&nbsp; 5.&nbsp; Fake Job Boards, Fake Employer Websites, and Fake Recruiter Websites &nbsp;</span></em></strong></h3><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">These can be hard to spot. The website may look very professional, but their only goal is to collect as much personal information from you as possible. The websites looks great, but the employer or job board don’t really exist. Fake jobs are posted for job seekers to apply for.</span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Usually they require your personal information, particularly your Social Security Number for “pre-screening.” They usually also need your personal bank account number so they can begin depositing your paychecks (because they are ready to hire you immediately).</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">The fake job boards usually require you to “register” before you can see the job postings, but they may allow you to select the “job” you want first and then collect your information. There may — or may not — be any jobs (bogus or legitimate) posted on these sites.</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1878" instrument_node="">I’ve seen a website that </span><em data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">looks</span></em><span data-dcnode-id="1875" instrument_node=""> like it’s from Google (Google’s logo is on the site and the name Google is widely used on the site), but it definitely was</span><em data-dcnode-id="1871"><strong data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node=""> not </span></strong><span data-dcnode-id="1872" instrument_node="">Google </span></em><span data-dcnode-id="1870" instrument_node="">because, although Google’s name was in the URL, it was in the wrong place in the URL, and the site most definitely was</span><em data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node=""> not</span></em><span data-dcnode-id="1867" instrument_node=""> google.com.</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">And the “jobs” unfortunately weren’t with Google either. Just another scammer site.</span></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1861" instrument_node="">[Read </span><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//job-hunt.org/article_about_domain_names/"><span data-dcnode-id="1860" instrument_node="">Understanding Domain Names, URLs, and Web Addresses</span></a><span data-dcnode-id="1858" instrument_node=""> for information on how to be sure what domain you’re viewing.]</span></p><span data-dcnode-id="1856" instrument_node="">
</span><h2 data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">Your Best Defense Against Job Scams and Job Fraud</span></h2><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1848" style="text-align: center; font-size: 16px; font-weight: bold; background-color: rgba(0, 197, 179, 0.4);"><span data-dcnode-id="1852" instrument_node="">Until you have </span><em data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">verified</span></em><span data-dcnode-id="1849" instrument_node=""> that the employer and job are legitimate, do NOT respond to the job posting or email!</span></p><span data-dcnode-id="1847" instrument_node="">
</span><span data-dcnode-id="1845" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7019316728998862" data-ad-format="auto" data-ad-slot="3575862246" data-dcnode-id="1844" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1843" instrument_node="">
</span><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1839" instrument_node="">And, don’t provide the recruiter/employer or website with any information about you. Don’t register a resume or set up a profile, unless you </span><em data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">know</span></em><span data-dcnode-id="1836" instrument_node=""> the opportunity is legitimate.</span></p><span data-dcnode-id="1834" instrument_node="">
</span><ul data-dcnode-id="1824"><span data-dcnode-id="1833" instrument_node="">
</span><li data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Independently verify that the employer did post the job on the website in question by tracking down the employer’s phone number via Google, Superpages.com, or some other reputable web phone directory.</span></li><span data-dcnode-id="1830" instrument_node="">
</span><li data-dcnode-id="1826"><em data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Then,</span></em><span data-dcnode-id="1827" instrument_node=""> call the employer — using the number you have found in legitimate directory, NOT the number in the email or job posting — to verify that they really did send the message, IF the message looks real but is not from an email adddress associated with the employer’s domain name.</span></li><span data-dcnode-id="1825" instrument_node="">
</span></ul><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1817"><em data-dcnode-id="1819"><strong data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">When you are in doubt about the authenticity of the employer</span></strong><span data-dcnode-id="1820" instrument_node="">,</span></em><span data-dcnode-id="1818" instrument_node=""> use your favorite search engine to find out what you can about the employer.</span></p><span data-dcnode-id="1816" instrument_node="">
</span><ul data-dcnode-id="1808"><span data-dcnode-id="1815" instrument_node="">
</span><li data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">If all you find are job postings, that’s a bad sign.Legitimate businesses do more that hire people. They also promote their products and/or services, so they can pay those employees. They usually post public contact information (address and phone numbers) so customers can find them.</span></li><span data-dcnode-id="1812" instrument_node="">
</span><li data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Look for the business website which explains what they do and where they do it.You need that information to prepare your response, anyway, in case the job is real, but the research will help you determine if the job is real or bogus.</span></li><span data-dcnode-id="1809" instrument_node="">
</span></ul><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1802"><span data-dcnode-id="1806" instrument_node="">Read the </span><a data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//job-hunt.org/avoiding-scam-jobs/scam-jobs-sniff-test/" title="Scam Jobs Sniff Test"><span data-dcnode-id="1805" instrument_node="">Scam Jobs Sniff Test</span></a><span data-dcnode-id="1803" instrument_node=""> for more information.</span></p><span data-dcnode-id="1801" instrument_node="">
</span><h3 data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">The Bottom Line on Job Search Scams</span></h3><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1794"><strong data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">DO verify before you trust!</span></strong><span data-dcnode-id="1795" instrument_node=""> Taking the time to run through the steps above will not only save you the time and energy it takes to apply for a job, which is time wasted in this case, but it can also save your bank account, identity, credit rating, and much more that you value highly. Yes, it’s a tough job market, and being unemployed is very unpleasant. But being scammed at the same time you are struggling with a job search is additional stress no one needs.</span></p><span data-dcnode-id="1793" instrument_node="">
</span><h3 data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">More About Avoiding Job Scams:</span></h3><span data-dcnode-id="1790" instrument_node="">
</span><ul data-dcnode-id="1768"><span data-dcnode-id="1789" instrument_node="">
</span><li data-dcnode-id="1786"><a data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//job-hunt.org/9-scam-characteristics/" title="9 Characteristics of a Job Scam"><span data-dcnode-id="1788" instrument_node="">9 Characteristics of a Job Scam</span></a></li><span data-dcnode-id="1785" instrument_node="">
</span><li data-dcnode-id="1782"><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//job-hunt.org/avoiding-scam-jobs/scam-jobs-sniff-test/" title="Scam Jobs Sniff Test"><span data-dcnode-id="1784" instrument_node="">Scam Jobs Sniff Test</span></a></li><span data-dcnode-id="1781" instrument_node="">
</span><li data-dcnode-id="1778"><a data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//job-hunt.org/reshipper-payment-clerk-scams/" title="The Reshipment and Payment Rep Scams"><span data-dcnode-id="1780" instrument_node="">The Reshipment and Ppayment Rep Scams</span></a></li><span data-dcnode-id="1777" instrument_node="">
</span><li data-dcnode-id="1774"><a data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//job-hunt.org/article_scam-proof/" title="Scam/Phish Proof Quiz"><span data-dcnode-id="1776" instrument_node="">Quiz: How Scam/Phish Proof Are You?</span></a></li><span data-dcnode-id="1773" instrument_node="">
</span><li data-dcnode-id="1770"><a data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//job-hunt.org/article_about_domain_names/"><span data-dcnode-id="1772" instrument_node="">Understanding Domain Names, URLs, and Web Addresses</span></a></li><span data-dcnode-id="1769" instrument_node="">
</span></ul><span data-dcnode-id="1767" instrument_node="">
</span><span data-dcnode-id="1765" instrument_node="">

</span><span data-dcnode-id="1760" instrument_node="">

</span></div><img alt="How to Reschedule a Job Interview (Example Message)" class="attachment-full size-full wp-post-image" data-dcnode-id="1106" height="420" loading="lazy" sizes="(max-width: 850px) 100vw, 850px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.job-hunt.org/wp-content/uploads/2022/03/How-to-Reschedule-a-Job-Interview.jpg&amp;raw" srcset="https://www.job-hunt.org/wp-content/uploads/2022/03/How-to-Reschedule-a-Job-Interview.jpg 850w, https://www.job-hunt.org/wp-content/uploads/2022/03/How-to-Reschedule-a-Job-Interview-300x148.jpg 300w, https://www.job-hunt.org/wp-content/uploads/2022/03/How-to-Reschedule-a-Job-Interview-768x379.jpg 768w" width="850"><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1104" instrument_node="">You’ve had the interview on your calendar for days, maybe even weeks. </span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.job-hunt.org/google-for-interview-preparation/"><span data-dcnode-id="1103" instrument_node="">You’ve prepped</span></a><span data-dcnode-id="1101" instrument_node="">, planned, and you’re as ready as you’ll ever be to impress the hiring manager with everything from </span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.job-hunt.org/how-to-answer-the-most-difficult-interview-questions/"><span data-dcnode-id="1100" instrument_node="">your spot-on answers</span></a><span data-dcnode-id="1098" instrument_node=""> to </span><a data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.job-hunt.org/what-to-wear-to-a-job-interview/"><span data-dcnode-id="1097" instrument_node="">what you’re wearing</span></a><span data-dcnode-id="1095" instrument_node="">.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Only, something’s come up, and there’s nothing you can do. You’ve got to reschedule the job interview.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><span data-dcnode-id="1088" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7019316728998862" data-ad-format="auto" data-ad-slot="3575862246" data-dcnode-id="1087" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1086" instrument_node="">
</span><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Though you may worry that rescheduling will hurt your chances of getting the job, not rescheduling and showing up late or ghosting the interview is not an option. It is possible to reschedule a job interview without burning any bridges. Here’s how!</span></p><span data-dcnode-id="1080" instrument_node="">
</span><h2 data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Valid Reasons for Rescheduling a Job Interview</span></h2><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">A valid reason for rescheduling a job interview is when something outside of your control makes it impossible for you to attend. Being sick or having a family emergency are two good examples. Other valid reasons to reschedule a job interview are:</span></p><span data-dcnode-id="1074" instrument_node="">
</span><ul data-dcnode-id="1062"><li data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Your car breaks down</span></li><li data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Public transportation is delayed</span></li><li data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Bad weather (the kind that shuts things down)</span></li><li data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Lack of internet or power (for a virtual interview)</span></li><li data-dcnode-id="1063"><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.job-hunt.org/things-to-do-once-youve-accepted-a-job-offer/"><span data-dcnode-id="1065" instrument_node="">You’ve accepted a job offer</span></a></li></ul><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">You can also reschedule a job interview because a different company wants to meet with you at the same time. However, you should only do this if you’re either far more interested in the second job or if it’s impossible to meet with the other company at another time. Professionalism is essential in this situation, as two hiring managers may know each other and share information about candidates.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">There are also invalid reasons for rescheduling a job interview. These are things that are within your control and include:</span></p><span data-dcnode-id="1055" instrument_node="">
</span><ul data-dcnode-id="1046"><li data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">You forgot you had an interview</span></li><li data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">You overslept</span></li><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">You’re hungover</span></li><li data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">You got lost or went to the wrong address</span></li></ul><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Things happen, but it’s doubtful any hiring manager will accept these reasons for rescheduling a job interview.</span></p><span data-dcnode-id="1042" instrument_node="">
</span><h3 data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Will Rescheduling Hurt My Chances of Getting the Job?</span></h3><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Provided you follow the below steps, rescheduling the interview shouldn’t hurt your chances of getting the job. It’s far better (and more professional) to reschedule than skip out on the interview. However, you only get one reschedule! If you have to reschedule a second time, the hiring manager may doubt that you’re truly interested in the job.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">And if you do have to reschedule, use it as an opportunity to learn more about the company. If the hiring manager seems annoyed or put off by rescheduling, if they can’t fit you in for several weeks (or months!), or if they flat-out refuse to reschedule, take note! All of this could signal how flexible or accommodating your future employer might or might not be.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><span data-dcnode-id="1031" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7019316728998862" data-ad-format="auto" data-ad-slot="3575862246" data-dcnode-id="1030" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1029" instrument_node="">
</span><span data-dcnode-id="1026" instrument_node="">
</span><h2 data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">How to Reschedule Your Job Interview</span></h2><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">If you have to reschedule a job interview, here’s how to do it without blowing your chances of getting the job.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><h3 data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Reschedule as Soon as Possible</span></h3><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">The best time to reschedule the interview is as soon as you know you have to. While some things happen at the last minute, try to give the interviewer a heads up as soon as possible.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Start by phoning the person you’re meeting with (or your contact person at the company). Calling can often be faster and more direct than other communications. If you can’t reach your contact, leave a voicemail, then follow up with an email or even a text message if that’s been a communication channel.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><h3 data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Apologize, Then Explain</span></h3><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Even though the circumstances are outside of your control, apologize for rescheduling. The interviewer blocked off time in their schedule for you, and you want to acknowledge that.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Briefly explain what’s happened and that you need to reschedule. This is also a good time to reiterate your interest in the role.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><h3 data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Suggest Alternates</span></h3><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Offer some alternative dates and times to meet. You can be specific (“tomorrow at 10:00 a.m.”) or a little more vague (“tomorrow morning between 9:00 a.m. and 11:00 a.m.”). Try to reschedule your interview for the next day (or close to it). The one exception is if you’re ill. You may want to give yourself a few days to recover.</span></p><span data-dcnode-id="996" instrument_node="">
</span><h3 data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Be Flexible</span></h3><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">The dates and times you suggest may not work for the interviewer. Be flexible and try to accommodate the dates and times they throw out. That may be the only other times they are available to interview you.</span></p><span data-dcnode-id="990" instrument_node="">
</span><h3 data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Thank Them</span></h3><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Thank the hiring manager for being understanding and rescheduling your interview. They are likely just as busy as you are, and a thank you goes a long way toward easing the inconvenience of rescheduling.</span></p><span data-dcnode-id="984" instrument_node="">
</span><h3 data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Confirm the New Time</span></h3><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Finally, whether you call, text, or email, once you have an alternative interview date set up, send a follow-up email to confirm the date and time. This ensures that you and the hiring manager are on the same page.</span></p><span data-dcnode-id="978" instrument_node="">
</span><h2 data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">How to Reschedule an Interview: Script</span></h2><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Whether by phone or email (or both!), here’s a sample script to help you reschedule a job interview.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="969" style="padding-left: 40px;"><em data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Hi, [Hiring Manager’s Name],</span></em></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="965" style="padding-left: 40px;"><em data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">[If calling, state your name]</span></em></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="961" style="padding-left: 40px;"><em data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">I’m so sorry, but I’m hoping we can reschedule the interview on [date and time of interview]. I’m very excited about the role and want to learn more, but unfortunately [briefly explain why you need to reschedule], and I won’t be able to keep the appointment. These are some other dates and times I can meet with you:</span></em></p><span data-dcnode-id="960" instrument_node="">
</span><ul data-dcnode-id="940"><span data-dcnode-id="959" instrument_node="">
</span><li data-dcnode-id="942" style="list-style-type: none;"><span data-dcnode-id="958" instrument_node="">
</span><ul data-dcnode-id="944"><span data-dcnode-id="957" instrument_node="">
</span><li data-dcnode-id="954"><em data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">[Date and time]</span></em></li><span data-dcnode-id="953" instrument_node="">
</span><li data-dcnode-id="950"><em data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">[Date and time]</span></em></li><span data-dcnode-id="949" instrument_node="">
</span><li data-dcnode-id="946"><em data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">[Date and time]</span></em></li><span data-dcnode-id="945" instrument_node="">
</span></ul><span data-dcnode-id="943" instrument_node="">
</span></li><span data-dcnode-id="941" instrument_node="">
</span></ul><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="936" style="padding-left: 40px;"><em data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">If none of these work for you, please let me know when you are available. You can call or email me at [your contact information].</span></em></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="932" style="padding-left: 40px;"><em data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Thank you so much for understanding, and I look forward to meeting with you.</span></em></p><span data-dcnode-id="931" instrument_node="">
</span><h2 data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Take Two</span></h2><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Life happens, and most interviewers understand that. As long as you are respectful and professional, you should have no problem rescheduling a job interview.</span></p><span data-dcnode-id="925" instrument_node="">
</span></div><span data-dcnode-id="922" instrument_node="">
