</span><h1 data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">What is Fraud &amp; Abuse?</span></h1><span data-dcnode-id="488" instrument_node="">
</span></div><span data-dcnode-id="486" instrument_node="">
</span><div data-dcnode-id="435"><span data-dcnode-id="485" instrument_node="">
</span><div class="tn-panel" data-dcnode-id="437"><div class="panel" data-dcnode-id="439"><span data-dcnode-id="484" instrument_node="">
</span><div data-dcnode-id="441"><span data-dcnode-id="483" instrument_node="">
</span><div class="tn-rte" data-dcnode-id="457"><span data-dcnode-id="482" instrument_node="">
</span><h4 data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">DEFINITION OF FRAUD</span></h4><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">An intentional deception or misrepresentation made by a person with the knowledge that the deception could result in some unauthorized benefit to himself or some other person. It includes any act that constitutes fraud under applicable Federal or State Law.</span></p><span data-dcnode-id="476" instrument_node="">
</span><h4 data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">DEFINITION OF ABUSE</span></h4><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Provider practices that are inconsistent with sound fiscal, business, or medical practices, and result in an unnecessary cost to the Medicaid program, or in reimbursement of services that are not medically necessary or that fail to meet professionally recognized standards for health care. It also includes recipient practices that result in unnecessary cost to the Medicaid/TennCare/Cover TN Program.</span></p><span data-dcnode-id="470" instrument_node="">
</span><h4 data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">TYPES OF FRAUD AND ABUSE</span></h4><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Examples of cases that the Office of Inspector General investigates include unreported income or insurance, TennCare/Cover TN recipients living out of state, drug seeking behavior, incarceration, individuals receiving bills (or EOB statements) for services never provided, provider billing irregularities, over or under utilization of health care services, and misrepresentation of credentials. Provider fraud involves not only doctors, but nursing homes, home health, durable medical equipment, pharmacies, mental health facilities, laboratories, transportation and dentists, to name a few.</span></p><span data-dcnode-id="464" instrument_node="">
</span><h4 data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">WHAT IS IN IT FOR YOU?</span></h4><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">The Office of Inspector General along with the Tennessee Bureau of Investigation, Medicaid Fraud Control Unit, Federal Bureau of Investigation, Attorney General's Office, Department of Human Services, and many other departmental offices have recovered millions of public health dollars. We provide our expertise, consultation and staff to all departments to help combat fraud, abuse, and waste within the Tennessee Health Care Programs.</span></p><span data-dcnode-id="458" instrument_node="">
</span></div><span data-dcnode-id="456" instrument_node="">
</span><div class="tn-rte" data-dcnode-id="443"><span data-dcnode-id="455" instrument_node="">
