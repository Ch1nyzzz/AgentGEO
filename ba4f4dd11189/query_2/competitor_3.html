</span><article class="text-article" data-dcnode-id="476"><span data-dcnode-id="480" instrument_node="">
</span><h2 data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">What Is Fraud, Anyway?</span></h2><span data-dcnode-id="477" instrument_node="">
“Fraud” is any activity that relies on deception in order to achieve a gain. Fraud becomes a crime when it is a “knowing misrepresentation of the truth or concealment of a material fact to induce another to act to his or her detriment” (Black’s Law Dictionary). In other words, if you lie in order to deprive a person or organization of their money or property, you’re committing fraud.&nbsp;
        </span></article><span data-dcnode-id="475" instrument_node="">
</span></section><span data-dcnode-id="473" instrument_node="">
</span><div data-dcnode-id="472" id="Fraud-101-why-do-people-commit-fraud" name="Fraud-101-why-do-people-commit-fraud"></div><span data-dcnode-id="471" instrument_node=""> </span><section class="" data-dcnode-id="434"><span data-dcnode-id="470" instrument_node="">
</span><article class="text-article" data-dcnode-id="436"><span data-dcnode-id="469" instrument_node="">
</span><h2 data-dcnode-id="468"></h2><span data-dcnode-id="467" instrument_node="">
</span><h2 data-dcnode-id="465" style="text-align: left;"><span data-dcnode-id="466" instrument_node="">Why Do People Commit Fraud?</span></h2><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462" style="text-align: left;"><span data-dcnode-id="463" instrument_node="">The most widely accepted explanation for why some people commit fraud is known as the Fraud Triangle. The Fraud Triangle was developed by Dr. Donald Cressey, a criminologist whose research on embezzlers produced the term “trust violators.”&nbsp;</span></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="455" style="text-align: center;"><img alt="Triangle with the words Financial Pressure, Rationalization and Opportunity each on one side of the triangle" data-dcnode-id="460" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acfe.com/fraud-resources/-/media/AA42FF4361D64E3E8923099894FB4C9B.ashx%3Fh%3D262%26w%3D300&amp;raw" style="height:262px; width:300px;"><br data-dcnode-id="459"><span data-dcnode-id="458" instrument_node="">
</span><br data-dcnode-id="457"><span data-dcnode-id="456" instrument_node="">
</span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="445" style="text-align: left;"><span data-dcnode-id="453" instrument_node="">
The Fraud Triangle hypothesizes that if all three components are present — unshareable financial need, perceived opportunity and rationalization — a person is highly likely to pursue fraudulent activities. As Dr. Cressey explains in the the </span><em data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Fraud Examiners Manual</span></em><span data-dcnode-id="450" instrument_node="">:</span><br data-dcnode-id="449"><span data-dcnode-id="448" instrument_node="">
</span><br data-dcnode-id="447"><span data-dcnode-id="446" instrument_node="">
</span></p><span data-dcnode-id="444" instrument_node="">
</span><blockquote data-dcnode-id="441"><q data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">When the trust violators were asked to explain why they refrained from violation of other positions of trust they might have held at previous times, or why they had not violated the subject position at an earlier time, those who had an opinion expressed the equivalent of one or more of the following quotations: (a) ‘There was no need for it like there was this time.’ (b) ‘The idea never entered my head.’ (c) ‘I thought it was dishonest then, but this time it did not seem dishonest at first.’</span></q></blockquote><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">&nbsp;</span></p><span data-dcnode-id="437" instrument_node="">
</span></article><span data-dcnode-id="435" instrument_node="">

</span><div class="card-body" data-dcnode-id="291"><span data-dcnode-id="304" instrument_node="">
</span><h3 data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">The Fraud Tree</span></h3><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Occupational fraud contains a wide variety of specific schemes — each of which with its own tactics and goals. That’s why we created the Fraud Tree. The Fraud Tree classifies every type of occupational fraud.</span></p><span data-dcnode-id="298" instrument_node="">
</span><div class="buttons-holder" data-dcnode-id="293"><span data-dcnode-id="297" instrument_node="">
</span><a class="button primary with-arrow" data-dcnode-id="295" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acfe.com/-/media/files/acfe/pdfs/2022-rttn-fraud-tree.ashx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="296" instrument_node="">Fraud Tree</span></a><span data-dcnode-id="294" instrument_node="">

</span><div data-dcnode-id="277" id="Fraud-101-Categories-of-fraud" name="Fraud-101-Categories-of-fraud"></div><span data-dcnode-id="276" instrument_node=""> </span><section class="content-section" data-dcnode-id="241"><span data-dcnode-id="275" instrument_node="">
</span><div class="grid-container" data-dcnode-id="243"><span data-dcnode-id="274" instrument_node="">
</span><div class="grid-x grid-margin-x align-center" data-dcnode-id="245"><span data-dcnode-id="273" instrument_node="">
</span><div class="cell large-10 xlarge-8" data-dcnode-id="247"><span data-dcnode-id="272" instrument_node="">
</span><h2 data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Categories of Fraud</span></h2><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Unfortunately, fraud is so common that it can be categorized in countless ways. But&nbsp;fundamentally, every type of fraud is either organizational or individual. Let’s look at some key characteristics of each.&nbsp;</span></p><span data-dcnode-id="266" instrument_node="">
</span><h3 data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Against individuals&nbsp;</span></h3><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">This is when a single person is targeted by a fraudster — including identity theft, phishing scams and “advance-fee” schemes. Perhaps one of the most noteworthy and devastating individual frauds is the Ponzi scheme.&nbsp;</span></p><span data-dcnode-id="260" instrument_node="">
</span><h3 data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Internal organizational fraud</span></h3><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Sometimes called “occupational fraud,” this is when an employee, manager or executive of an organization deceives the organization itself. Think embezzlement, cheating on taxes, and lying to investors and shareholders.&nbsp;</span></p><span data-dcnode-id="254" instrument_node="">
</span><h3 data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">External organizational fraud</span></h3><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">This includes fraud committed against an organization from the outside, such as vendors who lie about the work they did, demand bribes from employees and rig costs. But customers sometimes defraud organizations, such as when they submit bad checks or try to return knock-off or stolen products. And increasingly, technology threatens organizations with theft of intellectual property or customer information.&nbsp;</span></p><span data-dcnode-id="248" instrument_node="">
</span></div><span data-dcnode-id="246" instrument_node="">
</span></div><span data-dcnode-id="244" instrument_node="">
