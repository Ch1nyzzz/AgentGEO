</span><h3 data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">It’s all about you. We want to help you make the right legal decisions.</span></h3><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">We strive to help you make confident insurance and legal decisions. Finding trusted and reliable insurance quotes and legal advice should be easy. This doesn’t influence our content. Our opinions are our own.</span></p><span data-dcnode-id="1008" instrument_node="">

</span><div class="editorial-disclaimer" data-dcnode-id="997"><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="999"><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freeadvice.com/editorial-guidelines/"><span data-dcnode-id="1002" instrument_node="">Editorial Guidelines</span></a><span data-dcnode-id="1000" instrument_node="">: We are a free online resource for anyone interested in learning more about legal topics and insurance. Our goal is to be an objective, third-party resource for everything legal and insurance related. We update our site regularly, and all content is reviewed by experts.</span></p><span data-dcnode-id="998" instrument_node="">
</span></div><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Fraud occurs when someone gains something of value, usually money or property, from a victim by knowingly making a false statement or misrepresentation of a matter of fact.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">In the United States, fraud commonly occurs in the buying or selling of property, particularly real estate and stocks, or in falsifying reports such as taxes and Social Security or Medicare claims made to obtain benefits from the state or federal government.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">While fraud itself is an independent criminal charge, it can also appear in other charges as the means used or the intent required in the commission of a crime. For example, identity theft charges often require that a defendant is accused of stealing another’s personal information with the intent to defraud them. Although a fraud scheme would be involved, that defendant could be charged with identity theft or criminal use of personal identification information violation rather than fraud – depending on the state.</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="986" instrument_node="">Read on to learn more about the different types of fraud, and the consequences of scams. If you have been charged with fraud or are the victim of any type of fraud, just </span><a data-dcnode-id="984" href="#mdatop"><span data-dcnode-id="985" instrument_node="">enter your ZIP code</span></a><span data-dcnode-id="983" instrument_node=""> to get help from an attorney.</span></p><span data-dcnode-id="981" instrument_node="">

</span><h2 data-dcnode-id="948"><span class="ez-toc-section" data-dcnode-id="951" id="what-are-the-types-of-fraud"></span><span data-dcnode-id="950" instrument_node="">What are the types of fraud?</span><span class="ez-toc-section-end" data-dcnode-id="949"></span></h2><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="946" instrument_node="">Because fraud covers a diverse array of fraudulent activity ranging from </span><a data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criminal-law.freeadvice.com/criminal-law/white_collar_crimes/white_collar_crime.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="945" instrument_node="">white-collar crimes</span></a><span data-dcnode-id="943" instrument_node=""> to theft, it can be helpful to divide it into three general categories: consumer fraud, employee fraud, and fraud committed against a governmental institution or business. Consumer fraud covers instances where individual consumers are defrauded. It includes identity theft, </span><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//criminal-law.freeadvice.com/criminal-law/criminal-law/credit-card-fraud.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="942" instrument_node="">credit card fraud</span></a><span data-dcnode-id="940" instrument_node="">, telemarketing scams, Ponzi schemes, and check fraud.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="937" instrument_node="">The most common federal charges are for mail and wire fraud, which involve using the mail or interstate wires such as the phone or internet to further a scheme to defraud for personal gain. This category also includes </span><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freeadvice.com/legal/securities-fraud-arbitration-process/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="936" instrument_node="">securities fraud</span></a><span data-dcnode-id="934" instrument_node="">, which occurs when investors buy or sell based on a false representation of fact made by another party, such as a stockbroker or financial advisor. Real estate contracts may also be involved, particularly if a realtor or home seller lied or failed to disclose important information to a home buyer.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">Employee fraud occurs when an employee violates his fiduciary duties to the company or its customers by embezzling funds, selling trade secrets, or accepting bribes. Lastly, there are attempts to defraud the government or businesses. This includes insurance fraud, tax fraud and </span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//law.freeadvice.com/tax_law/income_tax_law/avoid-tax-evasion.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="930" instrument_node="">tax evasion</span></a><span data-dcnode-id="928" instrument_node="">, counterfeiting, healthcare fraud, bankruptcy fraud, Medicare and Social Security fraud, and welfare fraud.</span></p><span data-dcnode-id="926" instrument_node="">
</span><span data-dcnode-id="923" instrument_node="">
</span><div class="quote-new-360-mda" data-dcnode-id="812"><span data-dcnode-id="922" instrument_node="">

</span><h2 data-dcnode-id="807"><span class="ez-toc-section" data-dcnode-id="810" id="what-are-some-examples-of-frauds"></span><span data-dcnode-id="809" instrument_node="">What Are Some Examples of Frauds?</span><span class="ez-toc-section-end" data-dcnode-id="808"></span></h2><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" data-preserver-spaces="true"><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Common types of fraudulent activities include the following</span></strong><span data-dcnode-id="803" instrument_node="">:</span></span></p><span data-dcnode-id="800" instrument_node="">
</span><ul data-dcnode-id="766"><span data-dcnode-id="799" instrument_node="">
</span><li data-dcnode-id="796"><span data-dcnode-id="797" data-preserver-spaces="true"><span data-dcnode-id="798" instrument_node="">Embezzlement (e.g., theft of cash)</span></span></li><span data-dcnode-id="795" instrument_node="">
</span><li data-dcnode-id="792"><span data-dcnode-id="793" data-preserver-spaces="true"><span data-dcnode-id="794" instrument_node="">Forgery or alteration of documents (e.g., checks, time cards, receipts, contracts, purchase orders, expense reimbursement paperwork, etc.)</span></span></li><span data-dcnode-id="791" instrument_node="">
</span><li data-dcnode-id="788"><span data-dcnode-id="789" data-preserver-spaces="true"><span data-dcnode-id="790" instrument_node="">Fraudulent financial reporting.</span></span></li><span data-dcnode-id="787" instrument_node="">
</span><li data-dcnode-id="784"><span data-dcnode-id="785" data-preserver-spaces="true"><span data-dcnode-id="786" instrument_node="">Impropriety in the handling or reporting of cash or financial transactions</span></span></li><span data-dcnode-id="783" instrument_node="">
</span><li data-dcnode-id="780"><span data-dcnode-id="781" data-preserver-spaces="true"><span data-dcnode-id="782" instrument_node="">Authorization or receipt of payment for goods not received or services not performed (e.g. payments to fictitious employees or vendors)</span></span></li><span data-dcnode-id="779" instrument_node="">
</span><li data-dcnode-id="776"><span data-dcnode-id="777" data-preserver-spaces="true"><span data-dcnode-id="778" instrument_node="">Authorization or receipt of unearned wages or benefits.</span></span></li><span data-dcnode-id="775" instrument_node="">
</span><li data-dcnode-id="772"><span data-dcnode-id="773" data-preserver-spaces="true"><span data-dcnode-id="774" instrument_node="">Identity theft</span></span></li><span data-dcnode-id="771" instrument_node="">
</span><li data-dcnode-id="768"><span data-dcnode-id="769" data-preserver-spaces="true"><span data-dcnode-id="770" instrument_node="">Destruction, removal, or inappropriate use of records</span></span></li><span data-dcnode-id="767" instrument_node="">
</span></ul><span data-dcnode-id="765" instrument_node="">
</span><h2 data-dcnode-id="761"><span class="ez-toc-section" data-dcnode-id="764" id="what-are-the-penalties-for-fraud"></span><span data-dcnode-id="763" instrument_node="">What are the penalties for fraud?</span><span class="ez-toc-section-end" data-dcnode-id="762"></span></h2><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Fraudulent acts can be both criminal and civil offenses, so if a prosecutor does not pursue criminal charges, victims of consumer fraud may file a civil action. Criminal penalties vary widely depending on several factors including the type of fraud and the amount of money involved but can range from suspended sentences, and probation and fines to prison sentences of up to fifteen years. Generally, however, fraud is a felony charge with a potential sentence of six months to five years.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Additional charges can be filed for each instance of financial fraud committed, so someone who passes several bad checks or uses a stolen credit card several times can be charged for each of those actions. Civil penalties typically involve fines allowing the victim to recover the monetary loss as a result of the fraud, including attorney’s fees and any money the victim of fraud spent to clear his or her credit report.</span></p><span data-dcnode-id="754" instrument_node="">
</span><h2 data-dcnode-id="750"><span class="ez-toc-section" data-dcnode-id="753" id="how-is-fraud-proven"></span><span data-dcnode-id="752" instrument_node="">How is fraud proven?</span><span class="ez-toc-section-end" data-dcnode-id="751"></span></h2><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">The elements required to prove fraud vary in state and federal laws, but generally, one must prove that there was a misrepresentation of an important fact by a person who knew it was false to a victim who reasonably relied on the misrepresentation, and who suffered an actual loss or injury because of that reliance. Additionally, the misrepresented fact must be important and must have substantially influenced the victim’s decision to act. It must be a fact; offering an opinion such as “this is the best house on the block” would not be considered fraud.</span></p><span data-dcnode-id="746" instrument_node="">
</span><span data-dcnode-id="743" instrument_node="">
