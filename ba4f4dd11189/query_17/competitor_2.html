</span><h3 data-dcnode-id="1412"><span class="mw-headline" data-dcnode-id="1420" id="Recruitment_agent_fraud"><span data-dcnode-id="1421" instrument_node="">Recruitment agent fraud</span></span><span class="mw-editsection" data-dcnode-id="1413"><span class="mw-editsection-bracket" data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">[</span></span><a data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmployment_fraud%26action%3Dedit%26section%3D2" title="Edit section: Recruitment agent fraud"><span data-dcnode-id="1417" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1410" instrument_node="">Fraud is committed by recruiters when the profit margin is increased through misrepresentation. They try to convince candidates, contractors, or consultants that their skill set is beneath the wage they are seeking. On the other end, they try to convince the employer that there is no candidate on the market for the hourly rate the recruiter is offering. It is the misrepresentation that renders it fraudulent. This type of fraud is widespread in countries like the United Kingdom, where due to law enforcement agencies being negligent, jury trials not being mandatory or not even existing at all, and due to corruption, it is impossible to enforce the law through private prosecution or civil remedies.</span><sup class="reference" data-dcnode-id="1407" id="cite_ref-3"><a data-dcnode-id="1408" href="#cite_note-3"><span data-dcnode-id="1409" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1406" instrument_node="">
</span></p><span data-dcnode-id="1404" instrument_node="">
</span><h3 data-dcnode-id="1394"><span class="mw-headline" data-dcnode-id="1402" id="Recruitment_fraud"><span data-dcnode-id="1403" instrument_node="">Recruitment fraud</span></span><span class="mw-editsection" data-dcnode-id="1395"><span class="mw-editsection-bracket" data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">[</span></span><a data-dcnode-id="1398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmployment_fraud%26action%3Dedit%26section%3D3" title="Edit section: Recruitment fraud"><span data-dcnode-id="1399" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1384"><span data-dcnode-id="1392" instrument_node="">This type of fraud involves a person misrepresenting themselves as an employee of a particular company and acting on its behalf to offer a fictitious </span><a data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Job_Opportunities_and_Basic_Skills_Training_program" title="Job Opportunities and Basic Skills Training program"><span data-dcnode-id="1391" instrument_node="">job opportunity</span></a><span data-dcnode-id="1389" instrument_node="">. This type of fraud is generally conducted through the internet utilizing tactics that include false social media advertising and the creation of fake websites.</span><sup class="reference" data-dcnode-id="1386" id="cite_ref-4"><a data-dcnode-id="1387" href="#cite_note-4"><span data-dcnode-id="1388" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1385" instrument_node="">
</span></p><span data-dcnode-id="1383" instrument_node="">
</span><h3 data-dcnode-id="1373"><span class="mw-headline" data-dcnode-id="1381" id="Advertising_fraud"><span data-dcnode-id="1382" instrument_node="">Advertising fraud</span></span><span class="mw-editsection" data-dcnode-id="1374"><span class="mw-editsection-bracket" data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">[</span></span><a data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmployment_fraud%26action%3Dedit%26section%3D4" title="Edit section: Advertising fraud"><span data-dcnode-id="1378" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1371" instrument_node="">Any advertising or </span><a data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Promotion_%28marketing%29" title="Promotion (marketing)"><span data-dcnode-id="1370" instrument_node="">promotion</span></a><span data-dcnode-id="1368" instrument_node=""> that misrepresents the nature, characteristics, qualities or geographic origin of goods or services,</span><sup class="reference" data-dcnode-id="1365" id="cite_ref-5"><a data-dcnode-id="1366" href="#cite_note-5"><span data-dcnode-id="1367" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1364" instrument_node=""> including activity that may induce a person to become a victim of a crime such as </span><a data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theft" title="Theft"><span data-dcnode-id="1363" instrument_node="">theft</span></a><span data-dcnode-id="1361" instrument_node="">, including </span><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Identity_theft" title="Identity theft"><span data-dcnode-id="1360" instrument_node="">identity theft</span></a><span data-dcnode-id="1358" instrument_node="">.</span><sup class="reference" data-dcnode-id="1355" id="cite_ref-6"><a data-dcnode-id="1356" href="#cite_note-6"><span data-dcnode-id="1357" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1354" instrument_node="">
</span></p><span data-dcnode-id="1352" instrument_node="">
</span><h3 data-dcnode-id="1342"><span class="mw-headline" data-dcnode-id="1350" id="Employers_conspiracy_fraud"><span data-dcnode-id="1351" instrument_node="">Employers conspiracy fraud</span></span><span class="mw-editsection" data-dcnode-id="1343"><span class="mw-editsection-bracket" data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">[</span></span><a data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmployment_fraud%26action%3Dedit%26section%3D5" title="Edit section: Employers conspiracy fraud"><span data-dcnode-id="1347" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1340" instrument_node="">This type of fraud happens when several employers conspire against a specific candidate to force them to work for a specific employer and/or to cause financial damage to this person, so they would agree to work for lesser wage than their market value or conspiring employer job ad stated salary via avoiding hiring them under different false reasons and through misrepresentation. For instance, after the whole hiring process is accomplished, the conspiring employers may say they need more time to decide and never give any decision, or after the whole hiring process is completed, the conspiring employer would state the false reason for not hiring victim candidates. It is similar to </span><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Price_fixing" title="Price fixing"><span data-dcnode-id="1339" instrument_node="">price-fixing</span></a><span data-dcnode-id="1337" instrument_node="">. This type of fraud is very difficult to prove.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1330" style="white-space:nowrap;"><span data-dcnode-id="1336" instrument_node="">[</span><i data-dcnode-id="1332"><a data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1334" title="This claim needs references to reliable sources. (August 2021)"><span data-dcnode-id="1335" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1331" instrument_node="">]</span></sup><span data-dcnode-id="1329" instrument_node="">
</span></p><span data-dcnode-id="1327" instrument_node="">
</span><h2 data-dcnode-id="1317"><span class="mw-headline" data-dcnode-id="1325" id="Types_of_employment_scams"><span data-dcnode-id="1326" instrument_node="">Types of employment scams</span></span><span class="mw-editsection" data-dcnode-id="1318"><span class="mw-editsection-bracket" data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">[</span></span><a data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmployment_fraud%26action%3Dedit%26section%3D6" title="Edit section: Types of employment scams"><span data-dcnode-id="1322" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1316" instrument_node="">
</span><h3 data-dcnode-id="1306"><span class="mw-headline" data-dcnode-id="1314" id="Mystery_shopper"><span data-dcnode-id="1315" instrument_node="">Mystery shopper</span></span><span class="mw-editsection" data-dcnode-id="1307"><span class="mw-editsection-bracket" data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">[</span></span><a data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmployment_fraud%26action%3Dedit%26section%3D7" title="Edit section: Mystery shopper"><span data-dcnode-id="1311" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1304" instrument_node="">The victim applies to be a mystery shopper. They are asked to test a money wiring service such as </span><a data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Union" title="Western Union"><span data-dcnode-id="1303" instrument_node="">Western Union</span></a><span data-dcnode-id="1301" instrument_node=""> and to report back on the experience. The victim receives a check and is told to withdraw the value of the check in cash. This leads them to believe the check has cleared, although the check is fake. It can take weeks to uncover the fraud. They then send the money via the wire transfer service either back to the sender or some sort of money laundering scheme.</span><sup class="reference" data-dcnode-id="1298" id="cite_ref-ftc_7-0"><a data-dcnode-id="1299" href="#cite_note-ftc-7"><span data-dcnode-id="1300" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1297" instrument_node="">
</span></p><span data-dcnode-id="1295" instrument_node="">
</span><h3 data-dcnode-id="1285"><span class="mw-headline" data-dcnode-id="1293" id="Payment_administration"><span data-dcnode-id="1294" instrument_node="">Payment administration</span></span><span class="mw-editsection" data-dcnode-id="1286"><span class="mw-editsection-bracket" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">[</span></span><a data-dcnode-id="1289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmployment_fraud%26action%3Dedit%26section%3D8" title="Edit section: Payment administration"><span data-dcnode-id="1290" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1283" instrument_node="">The victim is asked to handle payments on behalf of an overseas company, earning a fee for every payment handled. The companies turn out to be a front for illegal activity, implicating the victim in the crime.</span><sup class="reference" data-dcnode-id="1280" id="cite_ref-8"><a data-dcnode-id="1281" href="#cite_note-8"><span data-dcnode-id="1282" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1279" instrument_node="">
</span></p><span data-dcnode-id="1277" instrument_node="">
</span><h3 data-dcnode-id="1266"><span data-dcnode-id="1276" id="Guaranteed_employment.2Fincome_scams"></span><span class="mw-headline" data-dcnode-id="1274" id="Guaranteed_employment/income_scams"><span data-dcnode-id="1275" instrument_node="">Guaranteed employment/income scams</span></span><span class="mw-editsection" data-dcnode-id="1267"><span class="mw-editsection-bracket" data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">[</span></span><a data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmployment_fraud%26action%3Dedit%26section%3D9" title="Edit section: Guaranteed employment/income scams"><span data-dcnode-id="1271" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1264" instrument_node="">The victim is guaranteed a certain income, benefits or employment. To get this they first have to buy something like a business plan, start-up materials, or software. They may be asked to pay to be put on a directory to "guarantee" jobs.</span><sup class="reference" data-dcnode-id="1261" id="cite_ref-9"><a data-dcnode-id="1262" href="#cite_note-9"><span data-dcnode-id="1263" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1260" instrument_node=""> This is merely a way to get the victim to spend money – no job awaits.
</span></p><span data-dcnode-id="1258" instrument_node="">
</span><h3 data-dcnode-id="1248"><span class="mw-headline" data-dcnode-id="1256" id="Multi-level_marketing"><span data-dcnode-id="1257" instrument_node="">Multi-level marketing</span></span><span class="mw-editsection" data-dcnode-id="1249"><span class="mw-editsection-bracket" data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">[</span></span><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmployment_fraud%26action%3Dedit%26section%3D10" title="Edit section: Multi-level marketing"><span data-dcnode-id="1253" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1246" instrument_node="">People selling through a multi-level marketing scheme earn a </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commission_%28remuneration%29" title="Commission (remuneration)"><span data-dcnode-id="1245" instrument_node="">commission</span></a><span data-dcnode-id="1243" instrument_node=""> on the sales of those they recruit, as well as on their direct sales. Some multi-level marketing, like </span><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tupperware" title="Tupperware"><span data-dcnode-id="1242" instrument_node="">Tupperware</span></a><span data-dcnode-id="1240" instrument_node="">, can be legitimate businesses. However, some multi-level marketing schemes are </span><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pyramid_scheme" title="Pyramid scheme"><span data-dcnode-id="1239" instrument_node="">pyramid schemes</span></a><span data-dcnode-id="1237" instrument_node=""> in disguise. The products may be of poor quality, overpriced, and hard to sell, or the victim may be asked to spend heavily on useless training materials. Some multi-level marketing schemes may require money from the victim to join.</span><sup class="reference" data-dcnode-id="1234" id="cite_ref-10"><a data-dcnode-id="1235" href="#cite_note-10"><span data-dcnode-id="1236" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1233" instrument_node="">
</span></p><span data-dcnode-id="1231" instrument_node="">
</span><h3 data-dcnode-id="1220"><span data-dcnode-id="1230" id="Visa.2Fwork_permits"></span><span class="mw-headline" data-dcnode-id="1228" id="Visa/work_permits"><span data-dcnode-id="1229" instrument_node="">Visa/work permits</span></span><span class="mw-editsection" data-dcnode-id="1221"><span class="mw-editsection-bracket" data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">[</span></span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmployment_fraud%26action%3Dedit%26section%3D11" title="Edit section: Visa/work permits"><span data-dcnode-id="1225" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1218" instrument_node="">A prospective </span><a class="mw-redirect" data-dcnode-id="1216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Employer" title="Employer"><span data-dcnode-id="1217" instrument_node="">employer</span></a><span data-dcnode-id="1215" instrument_node=""> overseas says that it will handle the victim's work visa application but instructs the victim to send money in the guise of processing fees. The scammer takes the money and vanishes.</span><sup class="reference" data-dcnode-id="1212" id="cite_ref-11"><a data-dcnode-id="1213" href="#cite_note-11"><span data-dcnode-id="1214" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1211" instrument_node="">
</span></p><span data-dcnode-id="1209" instrument_node="">
</span><h2 data-dcnode-id="1199"><span class="mw-headline" data-dcnode-id="1207" id="International_Trade"><span data-dcnode-id="1208" instrument_node="">International Trade</span></span><span class="mw-editsection" data-dcnode-id="1200"><span class="mw-editsection-bracket" data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">[</span></span><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmployment_fraud%26action%3Dedit%26section%3D12" title="Edit section: International Trade"><span data-dcnode-id="1204" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1197" instrument_node="">Crime and fraud are an increasing threat to businesses that operate within the international trade sector. Fraud is defined as deceit for financial profit, and it costs the UK an estimated £110 billion annually.</span><sup class="reference" data-dcnode-id="1194" id="cite_ref-12"><a data-dcnode-id="1195" href="#cite_note-12"><span data-dcnode-id="1196" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1193" instrument_node=""> The main threat to international traders is from organized crime, including the theft of goods or business identity, cross-border crime, and road-freight crime. Other risks include infringement of intellectual property or employee fraud.</span><sup class="reference" data-dcnode-id="1190" id="cite_ref-13"><a data-dcnode-id="1191" href="#cite_note-13"><span data-dcnode-id="1192" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1189" instrument_node="">
</span></p><p data-dcnode-id="1182"><span data-dcnode-id="1187" instrument_node="">Online trading developed a new platform for criminal activity, such as new ways of laundering money. Businesses that do international trade under the EU can rely on shared laws and commercial procedures to protect them.</span><sup class="reference" data-dcnode-id="1184" id="cite_ref-14"><a data-dcnode-id="1185" href="#cite_note-14"><span data-dcnode-id="1186" instrument_node="">[14]</span></a></sup><span data-dcnode-id="1183" instrument_node="">
</span></p><span data-dcnode-id="1181" instrument_node="">
</span><h2 data-dcnode-id="1171"><span class="mw-headline" data-dcnode-id="1179" id="See_also"><span data-dcnode-id="1180" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="1172"><span class="mw-editsection-bracket" data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">[</span></span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmployment_fraud%26action%3Dedit%26section%3D13" title="Edit section: See also"><span data-dcnode-id="1176" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1170" instrument_node="">
</span><ul data-dcnode-id="1166"><li data-dcnode-id="1167"><a data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Work-at-home_scheme" title="Work-at-home scheme"><span data-dcnode-id="1169" instrument_node="">Work-at-home scheme</span></a></li></ul><span data-dcnode-id="1165" instrument_node="">
