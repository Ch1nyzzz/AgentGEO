</span><p class="cmp-blogauthors__modal-container__author-content__name" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Brian O'Connell</span></p><span data-dcnode-id="718" instrument_node="">
</span><p class="cmp-blogauthors__modal-container__author-content__title" data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Contributing writer</span></p><span data-dcnode-id="715" instrument_node="">

</span></div><span data-dcnode-id="703" instrument_node="">
</span></div><span data-dcnode-id="701" instrument_node="">
</span><div class="c-article-main-image" data-dcnode-id="697"><span data-dcnode-id="700" instrument_node="">
</span><img alt="Display image" data-dcnode-id="699" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifelock.com/content/dam/lifelock/learn/article-main/signing-check_725x381.jpg&amp;raw"><span data-dcnode-id="698" instrument_node="">
</span></div><span data-dcnode-id="696" instrument_node="">
</span><div class="c-article__contentfragment__elements" data-dcnode-id="490"><span data-dcnode-id="695" instrument_node="">
</span><div data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">
</span></div><span data-dcnode-id="692" instrument_node="">
</span><div data-dcnode-id="492"><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Every time you write a check to someone, you’re handing them the information they need to commit check fraud—with you as the victim. That’s because the front of your check may contain such critical information as:</span></p><span data-dcnode-id="688" instrument_node="">
</span><ul data-dcnode-id="665"><span data-dcnode-id="687" instrument_node="">
</span><li data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Name</span></li><span data-dcnode-id="684" instrument_node="">
</span><li data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Address</span></li><span data-dcnode-id="681" instrument_node="">
</span><li data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Phone number</span></li><span data-dcnode-id="678" instrument_node="">
</span><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Bank’s name and address</span></li><span data-dcnode-id="675" instrument_node="">
</span><li data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Bank account number</span></li><span data-dcnode-id="672" instrument_node="">
</span><li data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Bank’s routing number</span></li><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Signature</span></li><span data-dcnode-id="666" instrument_node="">
</span></ul><span data-dcnode-id="664" instrument_node="">
</span><div data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">
</span></div><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">And think about what happens when you write a check for payment at a store. The clerk may add even more personal information, your date of birth and driver’s license number, perhaps. It’s enough to lead to check fraud.</span></p><span data-dcnode-id="658" instrument_node="">
</span><div data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">
</span></div><span data-dcnode-id="655" instrument_node="">
</span><h2 data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">What is check fraud?</span></h2><span data-dcnode-id="652" instrument_node="">
</span><div data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">
</span></div><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Fraud occurs when a person intentionally or deliberately acts to&nbsp;deprive another person (or entity) of money using deceptive or unfair means. Check fraud is simply using checks to commit fraud. Among the types of check fraud are:</span></p><span data-dcnode-id="646" instrument_node="">
</span><ul data-dcnode-id="626"><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Forgery – signing a check without authorization or endorsing a check not payable to the endorser</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Theft – stealing checks to use for fraudulent purposes</span></li><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Paper hanging – writing checks on closed accounts or ordering and, then, writing checks on closed accounts</span></li><span data-dcnode-id="636" instrument_node="">
</span><li data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Check kiting – intentionally gaining access to funds deposited in one account before the bank collects them from another</span></li><span data-dcnode-id="633" instrument_node="">
</span><li data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Washing – using chemicals to remove information from a check</span></li><span data-dcnode-id="630" instrument_node="">
</span><li data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Counterfeiting – illegally printing checks using information from the victim’s account</span></li><span data-dcnode-id="627" instrument_node="">
</span></ul><span data-dcnode-id="625" instrument_node="">
</span><div data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">
</span></div><span data-dcnode-id="622" instrument_node="">
</span><h2 data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Plenty of opportunity for check fraud</span></h2><span data-dcnode-id="619" instrument_node="">
</span><div data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">
</span></div><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">As more consumers and businesses use others forms of non-cash payment, including credit and debit cards, we’re writing fewer checks each year. Still, the Federal Reserve says we wrote 17.3 billion checks in 2015, so there’s still plenty of opportunity for check fraud.</span></p><span data-dcnode-id="613" instrument_node="">
</span><div data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">
</span></div><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">In fact, 71 percent of businesses surveyed in 2015 experienced actual or attempted check fraud in 2015, according to a study by the Association for Financial Professionals. Checks are the payment method most often targeted for fraud.</span></p><span data-dcnode-id="607" instrument_node="">
</span><div data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">
</span></div><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Check fraud may not receive the media attention that credit card fraud, tax fraud, and Social Security fraud do, but it’s a big problem for individual Americans and U.S. companies. In its 2015 Deposit Account Fraud Survey, the American Bankers Association says that check fraud accounted for 32 percent of the industry’s $1.91 billion in losses in 2014.</span></p><span data-dcnode-id="601" instrument_node="">
</span><div data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">
</span></div><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Technology is a big reason check fraud remains such a significant crime. Criminals can easily use a personal computer, software, and high-quality color printer to produce realistic-looking checks that can often escape detection. After all, a lot of consumers and businesses use the same tools to create legitimate checks for payment.</span></p><span data-dcnode-id="595" instrument_node="">
</span><div data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">
</span></div><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Plus, as more consumers use their smart phones to deposit checks with their bank, mobile-based check fraud has grown.</span></p><span data-dcnode-id="589" instrument_node="">
</span><div data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">
</span></div><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Another way individuals can be victimized is when they receive payment in the form of fake or fraudulent checks. In such a scenario, the criminal provides a check as payment from a nonexistent bank, fake bank account, or from an account that is not theirs at all,</span></p><span data-dcnode-id="583" instrument_node="">
</span><div data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">
</span></div><span data-dcnode-id="580" instrument_node="">
</span><h2 data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Protecting yourself from check fraud</span></h2><span data-dcnode-id="577" instrument_node="">
</span><div data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">
</span></div><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">The best protection against check fraud is vigilance.</span></p><span data-dcnode-id="571" instrument_node="">
</span><div data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">
</span></div><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">The fact is, the most important factor in check fraud is a check, and it’s up to consumers to do everything in their power to keep their checks—and the information on those checks—safe from prying eyes.</span></p><span data-dcnode-id="565" instrument_node="">
</span><div data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">
</span></div><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Take these steps to get that job done successfully:</span></p><span data-dcnode-id="559" instrument_node="">
</span><ul data-dcnode-id="536"><span data-dcnode-id="558" instrument_node="">
</span><li data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Protect your checks – Because&nbsp;checks are relatively easy to&nbsp;reproduce, strive to protect your account number,&nbsp;routing number, and any other information a&nbsp;thief would need to print a fake check.</span></li><span data-dcnode-id="555" instrument_node="">
</span><li data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Monitor your bank account – Regularly reconcile your bank statements to look for fraudulent transactions. Set up text alerts for checks drawn on your account over a certain dollar amount.</span></li><span data-dcnode-id="552" instrument_node="">
</span><li data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Watch for “check washing” – Fraudsters use chemicals and solvents to erase or alter check information. Write your check using “fraud prevention pens,” which contain ink that is more difficult to change.</span></li><span data-dcnode-id="549" instrument_node="">
</span><li data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Vet anyone who enters your home – If you allow a housekeeper, contractor, or other service persons inside your home, run them through a background check to determine how trustworthy they may be. And keep important documents, including checks and bank statements, locked up.</span></li><span data-dcnode-id="546" instrument_node="">
</span><li data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">No checks in cars – Never leave your checkbook out in public, and especially not stored in a car. It’s just too easy for fraud artists to break into the vehicle and steal your checks.</span></li><span data-dcnode-id="543" instrument_node="">
</span><li data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Avoid mailing checks at a mailbox – Thieves can steal checks from a mailbox. Always mail checks at the post office, if possible, or try to mail shortly before postal pickup.</span></li><span data-dcnode-id="540" instrument_node="">
</span><li data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">No Social Security number – Never write your Social Security number on a check. It’s just too easy for check fraud artists to steal the check, get your Social Security number, and then commit identity theft.</span></li><span data-dcnode-id="537" instrument_node="">
</span></ul><span data-dcnode-id="535" instrument_node="">
</span><div data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">
</span></div><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Check fraud is an unfortunate and all-too-common occurrence. That’s why it’s critical to take the issue seriously. Anything less and you’re all too vulnerable to check fraud—and all the negative fallout that may go with it.</span></p><span data-dcnode-id="529" instrument_node="">
</span><div data-dcnode-id="494"><span data-dcnode-id="528" instrument_node="">
