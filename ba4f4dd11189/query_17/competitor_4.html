</span><div class="custom-singular-template entry wpex-clr" data-dcnode-id="508"><div class="vc_row wpb_row vc_row-fluid vc_custom_1616519900231 wpex-vc_row-has-fill wpex-vc-row-stretched no-bottom-margins" data-dcnode-id="789" data-vc-full-width="true" data-vc-full-width-init="true" style="position: relative; left: -36.2031px; box-sizing: border-box; width: 1024px; padding-left: 36.2031px; padding-right: 36.2029px;"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="790"><div class="vc_column-inner vc_custom_1616520043159" data-dcnode-id="791"><div class="wpb_wrapper" data-dcnode-id="792"><ul class="vcex-post-meta meta wpex-flex wpex-flex-wrap wpex-items-center wpex-justify-start wpex-child-inherit-color wpex-text-left wpex-mb-5" data-dcnode-id="796" style="color:#a3a3a3;"><li class="meta-date" data-dcnode-id="807"><time data-dcnode-id="808" datetime="2019-09-07" itemprop="datePublished" pubdate=""><span data-dcnode-id="809" instrument_node="">September 7, 2019</span></time></li><li class="meta-author" data-dcnode-id="801"><span aria-hidden="true" class="meta-icon ticon ticon-pencil-square-o" data-dcnode-id="806"></span><span class="vcard author" data-dcnode-id="802" itemprop="name"><span class="fn" data-dcnode-id="803"><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fightthecharges.com/author/admin_natalie/"><span data-dcnode-id="805" instrument_node="">Aitken Robertson</span></a></span></span></li><li class="meta-post-terms wpex-clr" data-dcnode-id="797"><span aria-hidden="true" class="meta-icon ticon ticon-folder-open-o" data-dcnode-id="800"></span><a class="term-37" data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fightthecharges.com/blog/"><span data-dcnode-id="799" instrument_node="">Blog</span></a></li></ul><h1 class="vcex-heading vcex-module wpex-text-2xl wpex-font-normal wpex-m-auto wpex-max-w-100 vcex-heading-plain wpex-h1 wpex-block vc_custom_1614988729109" data-dcnode-id="793"><span class="vcex-heading-inner wpex-inline-block wpex-clr" data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">What Is Fraud and What Are the Associated Penalties?</span></span></h1></div></div></div></div><div class="vc_row-full-width vc_clearfix" data-dcnode-id="788"></div><div class="vc_row wpb_row vc_row-fluid vc_custom_1614988763969 vc_column-gap-35 wpex-vc_row-has-fill wpex-vc-row-stretched no-bottom-margins" data-dcnode-id="544" data-vc-full-width="true" data-vc-full-width-init="true" style="position: relative; left: -19.2031px; box-sizing: border-box; width: 1024px; padding-left: 19.2031px; padding-right: 19.2029px;"><div class="wpb_column vc_column_container vc_col-sm-8" data-dcnode-id="690" id="text_block_section"><div class="vc_column-inner" data-dcnode-id="691"><div class="wpb_wrapper" data-dcnode-id="692"><span data-dcnode-id="787" instrument_node="">
</span><div class="vcex-post-content vcex-clr vc_custom_1614805363502" data-dcnode-id="695"><span data-dcnode-id="786" instrument_node="">
</span><div class="vcex-post-content-c wpex-clr" data-dcnode-id="697"><p data-dcnode-id="775"><span data-dcnode-id="785" instrument_node="">Committing any type of </span><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fightthecharges.com/fraud/"><span data-dcnode-id="784" instrument_node="">fraud</span></a><span data-dcnode-id="782" instrument_node=""> can have serious consequences including significant criminal penalties under the </span><em data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Criminal Code of Canada</span></em><span data-dcnode-id="779" instrument_node="">. The Crown can choose to either proceed summarily (less serious offence) or by indictment (a more serious offence) for the offence of fraud. You should know whether you are charged with fraud </span><u data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">under $5,000 or over $5,000</span></u><span data-dcnode-id="776" instrument_node=""> as this makes a difference with respect to what type of penalty is imposed upon a conviction. The more serious cases certainly attract the possibility of jail time.</span></p><span data-dcnode-id="774" instrument_node="">
</span><h3 data-dcnode-id="771"><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">What happens after a Fraud Conviction?</span></strong></h3><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Being convicted of the criminal offence of fraud can have serious effects for your future employment, immigration status (for non-Canadian citizens), family, community reputation, volunteer opportunities and most concerning, freedom. A conviction means you are left with a criminal record. As you might already be aware, a great deal of jobs these days requires a criminal record check. The type of employment you seek may be limiting after having a criminal conviction of fraud. This is particularly so because fraud can be interpreted as a crime of dishonesty. This would concern employers and understandably so.</span></p><span data-dcnode-id="767" instrument_node="">
</span><h3 data-dcnode-id="764"><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">So What is Fraud?</span></strong></h3><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Fraud can be explained as an intentional deception for a financial or personal gain, which results in some form of injury either to a person or an entity. Fraud is a serious white-collar crime and has harsh penalties.</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">The particular circumstances of a case will have an impact on the manner in which the Crown deals with the case. For instance, whether there are any aggravating factors and/or the extent of injuries caused by the fraud will play a role in how the Crown proceeds with the case. In other words, will the Crown proceed summarily or by indictment? The former will have less harsher penalties than the latter.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">As mentioned above, your charge can be one of fraud under $5,000 or fraud over $5,000. These are the two categories that any type of fraud can fall under. Fraud under $5,000 is a hybrid offence, which means that the Crown has the discretion to decide if the matter should proceed summarily or by indictment. Conversely, fraud over $5000 is strictly an indictable offence. This category carries significantly heftier penalties including imprisonment. Below are the various forms that the criminal offence of fraud can take place.</span></p><span data-dcnode-id="754" instrument_node="">
</span><h4 data-dcnode-id="751"><strong data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Types of Fraud</span></strong></h4><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">There are many types of fraud including but not limited to:</span></p><span data-dcnode-id="747" instrument_node="">
</span><ul data-dcnode-id="721"><span data-dcnode-id="746" instrument_node="">
</span><li data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Credit Card Fraud</span></li><span data-dcnode-id="743" instrument_node="">
</span><li data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Health Care Fraud</span></li><span data-dcnode-id="740" instrument_node="">
</span><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Internet Fraud</span></li><span data-dcnode-id="737" instrument_node="">
</span><li data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Mail Fraud</span></li><span data-dcnode-id="734" instrument_node="">
</span><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Securities Fraud</span></li><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Insurance Fraud</span></li><span data-dcnode-id="728" instrument_node="">
</span><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Identity Fraud</span></li><span data-dcnode-id="725" instrument_node="">
</span><li data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Public Assistance Fraud</span></li><span data-dcnode-id="722" instrument_node="">
</span></ul><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">It is important to keep in mind that the nature of the criminal offence can overlap with other types of fraud thereby causing additional criminal charges. It is critical that you seriously consider hiring a criminal defence lawyer to fight for your case.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">An experienced lawyer has the ability to illustrate that the Crown has a weak case against you or raise a doubt as to the strength of the case. The burden is on the Crown to prove its case against you beyond a reasonable doubt. This is a high threshold to meet. Each of the types of fraud listed above has elements that must be independently proven by the Crown. By discussing the case with you in depth and hearing your version of events, we seek to resolve your case outside of the court process. What this means is that with a lawyer, you may be able to have your case resolved in such away that leaves you with no criminal record. We explain all the potential outcomes in your matter in detail and help you make informed decisions.</span></p><span data-dcnode-id="714" instrument_node="">
</span><h3 data-dcnode-id="711"><strong data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Let the Aitken Robertson Team Go to Work For You </span></strong></h3><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="709" instrument_node="">Fraud is one of the more </span><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">complicated</span></strong><span data-dcnode-id="706" instrument_node=""> types of criminal offences, involving a great deal of legal intricacies. That is what lawyers are for. They are trained to address such intricate criminal cases. Addressing your charge(s) at the earliest opportunity is of critical importance. This is especially so as the details are fresh in your mind.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="703" instrument_node="">At Aitken Robertson, </span><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fightthecharges.com/our-lawyers/"><span data-dcnode-id="702" instrument_node="">our lawyers</span></a><span data-dcnode-id="700" instrument_node=""> have tackled a wide range of fraud cases and are prepared to handle your case. We understand the difference between an honest mistake and a deliberate act. We understand the complexities of successfully defending fraud related charges. A conviction on a fraud charge can turn your life upside down. It is important that you appreciate that hiring a criminal defence lawyer can make the difference of avoiding jail, criminal record and a deportation if you are not a Canadian citizen. Our goal is to assist you with understanding the case you are facing. It is advised that you do not speak to the authorities without the presence of your lawyer.</span></p><span data-dcnode-id="698" instrument_node="">
</span></div><span data-dcnode-id="696" instrument_node="">
