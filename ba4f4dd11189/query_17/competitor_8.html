</span><section class="modules open_content" data-background="transparent" data-bg-color="" data-bg-color-custom="" data-bg-image="" data-dcnode-id="472" data-module="open_content" id="module-1"><span data-dcnode-id="678" instrument_node="">
</span><div class="mod-cont" data-dcnode-id="475"><span data-dcnode-id="677" instrument_node="">
</span><div class="container" data-dcnode-id="477"><span data-dcnode-id="676" instrument_node="">
</span><div class="row" data-dcnode-id="479"><span data-dcnode-id="675" instrument_node="">
</span><div class="col-12 col-md-8" data-dcnode-id="622"><span data-dcnode-id="674" instrument_node="">
</span><div data-dcnode-id="624"><span data-dcnode-id="673" instrument_node="">
</span><h2 data-dcnode-id="670"><span data-dcnode-id="671" style="color: #003f5e;"><span data-dcnode-id="672" instrument_node="">What is Telecommunications Fraud?</span></span></h2><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="666"><span class="larger" data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">In the digital age, phone systems are frequently interconnected with the corporate computer network, but often overlooked as a security vulnerability. Hackers can infiltrate phone systems via the customer’s network or the telecommunications service provider. Once fraudsters have gained access, they then manipulate the phone system to make unauthorized long-distance calls leaving the customer with an exorbitant bill. Through staff awareness training, companies can take steps to mitigate or prevent such hacks.</span></span></p><span data-dcnode-id="665" instrument_node="">
</span><h4 data-dcnode-id="663" style="padding-top: 18px;"><span data-dcnode-id="664" instrument_node="">TELECOMMUNICATIONS FRAUD TECHNIQUES</span></h4><span data-dcnode-id="662" instrument_node="">
</span><ul data-dcnode-id="650"><span data-dcnode-id="661" instrument_node="">
</span><li data-dcnode-id="657"><strong data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Provider Frauds:</span></strong><span data-dcnode-id="658" instrument_node=""> These frauds are the most complicated because they infiltrate the service provider itself. These schemes create a behind-thescenes fraudulent system that is invisible to the telecommunications service provider’s customers but generates a large bill for the customer.</span></li><span data-dcnode-id="656" instrument_node="">
</span><li data-dcnode-id="652"><strong data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Customer Frauds:</span></strong><span data-dcnode-id="653" instrument_node=""> This technique infiltrates companies who use telecommunications services. Hackers can enter into the phone network via voicemail system, improperly discarded SIM cards and pre-paid calling cards. After infiltration, the fraudster uses the phone system to make unauthorized calls, often to high-cost locations.</span></li><span data-dcnode-id="651" instrument_node="">
</span></ul><span data-dcnode-id="649" instrument_node="">
</span><h5 data-dcnode-id="646" style="padding-bottom: 8px;"><span data-dcnode-id="647" style="color: #003f5e; padding-top: 10px;"><span data-dcnode-id="648" instrument_node="">REDUCING THE RISK OF A TELECOMMUNICATIONS FRAUD LOSS</span></span></h5><span data-dcnode-id="645" instrument_node="">
</span><ul data-dcnode-id="626"><span data-dcnode-id="644" instrument_node="">
</span><li data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Regularly monitor call activity to detect suspicious patterns.</span></li><span data-dcnode-id="641" instrument_node="">
</span><li data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Review phone bills fully to avoid overlooking fraudulent transactions.</span></li><span data-dcnode-id="638" instrument_node="">
</span><li data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Change voicemail passwords from default settings and do not use ones that can be easily guessed such as 1-2-3-4 or 0-0-0-0.</span></li><span data-dcnode-id="635" instrument_node="">
</span><li data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Report lost or stolen phone equipment to the service provider to prevent manipulation by hackers.</span></li><span data-dcnode-id="632" instrument_node="">
</span><li data-dcnode-id="628"><span data-dcnode-id="631" instrument_node="">Develop corporate-wide awareness for telecommunications fraud</span><br data-dcnode-id="630"><span data-dcnode-id="629" instrument_node="">
through corporate culture, education and training.</span></li><span data-dcnode-id="627" instrument_node="">
</span></ul><span data-dcnode-id="625" instrument_node="">
</span></div><span data-dcnode-id="623" instrument_node="">
</span></div><span data-dcnode-id="621" instrument_node="">
</span><div class="col-12 col-md-4" data-dcnode-id="586"><span data-dcnode-id="620" instrument_node="">
</span><div data-dcnode-id="588"><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="616"><b class="medium" data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">DOWNLOADABLE RESOURCES</span></b></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="612"><a class="btn btn-default" data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//epicbrokers.com/wp-content/uploads/2020/04/EPIC_TelecommunicationsFraudClientAdvisory.pdf" rel="noopener" target="_blank"><span data-dcnode-id="614" instrument_node="">Telecommunications Client Advisory (PDF)</span></a></p><span data-dcnode-id="611" instrument_node="">
</span><div data-dcnode-id="599" style="margin-top: 30px; padding: 18px; border: 3px solid #003f5e;"><span data-dcnode-id="610" instrument_node="">
</span><h6 data-dcnode-id="607"><span data-dcnode-id="608" style="color: #003f5e;"><span data-dcnode-id="609" instrument_node="">DON’T BE A STATISTIC </span></span></h6><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Global losses due to telecommunications fraud amount to about $32.7 billion annually.¹</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Nearly 5% of voice mail passwords are 1-2-3-4. The next most frequently used password is 0-0-0-0.</span></p><span data-dcnode-id="600" instrument_node="">
</span></div><span data-dcnode-id="598" instrument_node="">
</span><div data-dcnode-id="590"><span data-dcnode-id="597" instrument_node="">
</span><h5 data-dcnode-id="595" style="padding-top: 40px;"><span data-dcnode-id="596" instrument_node="">CLAIM EXAMPLE</span></h5><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">An unauthorized third party gains access to an insured’s telephone system, using it to incur $50,000 in international call charges. The insured only discovers the loss when it receives its monthly statement from the telecommunications service provider containing the fraudulent charges.</span></p><span data-dcnode-id="591" instrument_node="">
</span></div><span data-dcnode-id="589" instrument_node="">
</span></div><span data-dcnode-id="587" instrument_node="">
</span></div><span data-dcnode-id="585" instrument_node="">
</span><div class="col-12 col-md-12" data-dcnode-id="576"><span data-dcnode-id="584" instrument_node="">
</span><div data-dcnode-id="578"><span data-dcnode-id="583" instrument_node="">
</span><h3 data-dcnode-id="580" style="margin-top: 20px; margin-bottom: 20px;"><span data-dcnode-id="581" style="color: #003f5e;"><span data-dcnode-id="582" instrument_node="">Insurance Solutions for Telecommunications Fraud</span></span></h3><span data-dcnode-id="579" instrument_node="">
</span></div><span data-dcnode-id="577" instrument_node="">
</span></div><span data-dcnode-id="575" instrument_node="">
</span><div class="col-12 col-md-6" data-dcnode-id="534"><span data-dcnode-id="574" instrument_node="">
</span><div data-dcnode-id="536"><span data-dcnode-id="573" instrument_node="">
</span><h4 data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">CYBER COVERAGE</span></h4><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Cyber risk mitigation involves taking proactive steps to protect against and reduce the adverse effects of the key risks to your organization. Implementing network security defenses, incident response plans and employee training are all essential elements of cyber risk mitigation. Unfortunately, this is not enough. The reality is, no organization is immune from a cyber-attack, regardless of the strength of their defenses. This is where insurance can help. Comprehensive stand-alone cyber insurance will help protect the organization’s balance sheet by transferring some of the costs associated with the inevitable breach.</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Cyber insurance complements and supports active security measures by providing third-party regulatory and liability coverage as well as a host of first-party response, remediation and recovery insurance. In addition, most cyber markets also provide free or discounted pre-loss services to assist an organization in breach preparedness.</span></p><span data-dcnode-id="564" instrument_node="">
</span><h5 data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">RISK MANAGEMENT TIPS</span></h5><span data-dcnode-id="561" instrument_node="">
</span><ul data-dcnode-id="538"><span data-dcnode-id="560" instrument_node="">
</span><li data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Develop a written incident response plan that includes IT, HR, Accounting Staff, Security and Management</span></li><span data-dcnode-id="557" instrument_node="">
</span><li data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Appoint a Computer Information Security Officer</span></li><span data-dcnode-id="554" instrument_node="">
</span><li data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Identify, contain and protect any Personally Identifiable Data</span></li><span data-dcnode-id="551" instrument_node="">
</span><li data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Continually maintain and upgrade computer systems and software</span></li><span data-dcnode-id="548" instrument_node="">
</span><li data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Implement mandatory employee training to better prevent phishing, unauthorized transfer of funds, or unwitting data breach</span></li><span data-dcnode-id="545" instrument_node="">
</span><li data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Encrypt all mobile devices</span></li><span data-dcnode-id="542" instrument_node="">
</span><li data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Contact your VoIP provider to discuss security measures</span></li><span data-dcnode-id="539" instrument_node="">
</span></ul><span data-dcnode-id="537" instrument_node="">
</span></div><span data-dcnode-id="535" instrument_node="">
</span></div><span data-dcnode-id="533" instrument_node="">
</span><div class="col-12 col-md-6" data-dcnode-id="499"><span data-dcnode-id="532" instrument_node="">
</span><div data-dcnode-id="501"><span data-dcnode-id="531" instrument_node="">
</span><h4 data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">CRIME COVERAGE</span></h4><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="527" instrument_node="">Commercial Crime insurance provides first-party</span><br data-dcnode-id="526"><span data-dcnode-id="525" instrument_node="">
coverage intended to help an organization recoup losses due to employee dishonesty, theft of money or securities, robbery, burglary, forgery and alteration, and theft of client property. In addition, Commercial Crime policies also typically include coverage for Computer Fraud, Wire Transfer Fraud and Social Engineering Fraud. Today, many stand-alone cyber policies also include similar or identical coverage extensions. This means there is a potential for overlapping and/or redundant coverage. Organizations should strive to coordinate coverage between stand-alone cyber and crime policies in order to ensure they are able to maximize potential insurance recoveries in the event of an incident.</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">In addition to the above, most commercial crime policies also provide a limit for investigation costs for covered loss, assisting the insured in paying for the complex process of determining the extent of the loss once the fraud has been uncovered. Coverage is typically on a loss discovered basis, meaning that the cumulative loss over time, regardless of when it took place, is covered by the policy in place when the loss is discovered.</span></p><span data-dcnode-id="520" instrument_node="">
</span><h5 data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">RISK MANAGEMENT TIPS</span></h5><span data-dcnode-id="517" instrument_node="">
</span><ul data-dcnode-id="503"><span data-dcnode-id="516" instrument_node="">
</span><li data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Establish an anti-fraud policy and code of conduct, with a hotline for employees to call if they suspect fraudulent activity. Conduct anti-fraud training and procedures for employees, managers and executives</span></li><span data-dcnode-id="513" instrument_node="">
</span><li data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Conducting external audits of internal controls used in financial reporting</span></li><span data-dcnode-id="510" instrument_node="">
</span><li data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Maintain multi-person controls in accounting and inventory</span></li><span data-dcnode-id="507" instrument_node="">
</span><li data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Vet, update and purge approved vendor lists at least annually</span></li><span data-dcnode-id="504" instrument_node="">
</span></ul><span data-dcnode-id="502" instrument_node="">
</span></div><span data-dcnode-id="500" instrument_node="">
</span></div><span data-dcnode-id="498" instrument_node="">
</span><div class="col-12 col-md-12" data-dcnode-id="481"><span data-dcnode-id="497" instrument_node="">
