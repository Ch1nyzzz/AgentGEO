</span><h1 class="hero-title" data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">
            What is Fraud?        </span></h1><span data-dcnode-id="3130" instrument_node="">
</span></div><span data-dcnode-id="3128" instrument_node="">
</span></div><span data-dcnode-id="3126" instrument_node="">
</span></div><span data-dcnode-id="3124" instrument_node="">
</span><span data-dcnode-id="3121" instrument_node="">
</span></div><span data-dcnode-id="3119" instrument_node="">
</span></div><span data-dcnode-id="3117" instrument_node="">
</span><div class="page-content" data-dcnode-id="197" id="page-content"><span data-dcnode-id="3116" instrument_node="">
</span><div class="gridContainer content" data-dcnode-id="199"><span data-dcnode-id="3115" instrument_node="">
</span><div class="post-470 page type-page status-publish hentry" data-dcnode-id="201" id="post-470"><span data-dcnode-id="3114" instrument_node="">
</span><div data-dcnode-id="203"><span data-dcnode-id="3113" instrument_node="">
</span><h2 class="has-vivid-cyan-blue-color has-text-color" data-dcnode-id="3111" id="definition"><span data-dcnode-id="3112" instrument_node="">Definition</span></h2><span data-dcnode-id="3110" instrument_node="">
</span><p class="has-black-color has-text-color" data-dcnode-id="3102"><span data-dcnode-id="3109" instrument_node=""> Fraud is a criminal offence as defined by the Fraud Act 2006.</span><br data-dcnode-id="3108"><br data-dcnode-id="3107"><span data-dcnode-id="3106" instrument_node="">Most commonly it occurs when a person dishonestly makes a false representation in order to gain for themselves or cause loss to another. </span><br data-dcnode-id="3105"><br data-dcnode-id="3104"><span data-dcnode-id="3103" instrument_node="">The type of offences for which a person could be prosecuted include: </span></p><span data-dcnode-id="3101" instrument_node="">
</span><ul data-dcnode-id="3092" style="color:#000000"><li data-dcnode-id="3098"><span data-dcnode-id="3100" instrument_node="">Fraud by False Representation – lying about something with the intention to cause a gain or a loss.</span><br data-dcnode-id="3099"></li><li data-dcnode-id="3095"><span data-dcnode-id="3097" instrument_node="">Fraud by Failure to Disclose Information – not declaring something when you have a legal duty to do so with the intention to cause a gain or a loss.</span><br data-dcnode-id="3096"></li><li data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">Fraud by Abuse of Position – where someone abuses a position of trust where there is an expectation to safeguard the financial interest of another and places another at financial risk or causes a loss. </span></li></ul><span data-dcnode-id="3091" instrument_node="">
</span><p data-dcnode-id="3090"></p><span data-dcnode-id="3089" instrument_node="">
</span><div class="wp-block-columns has-2-columns" data-dcnode-id="3072"><span data-dcnode-id="3088" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="3080"><span data-dcnode-id="3087" instrument_node="">
</span><p class="has-black-color has-text-color" data-dcnode-id="3082"><span data-dcnode-id="3086" instrument_node="">In each instance the action must be shown to have been dishonest. It shouldn’t be possible to commit fraud accidentally; it must be shown that the individual’s actions would be considered to be dishonest by the average ‘man in the street’. </span><br data-dcnode-id="3085"><br data-dcnode-id="3084"><span data-dcnode-id="3083" instrument_node="">As well as being a criminal offence, if an NHS employee or contractor is found to have committed fraud it is likely that they will have also broken the terms of their contract of employment or professional codes of conduct. </span></p><span data-dcnode-id="3081" instrument_node="">
</span></div><span data-dcnode-id="3079" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="3074"><span data-dcnode-id="3078" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="3076"><img alt="" class="wp-image-963" data-dcnode-id="3077" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nhsfraudandsecurity.co.uk/wp-content/uploads/2019/10/finger-2081169_1280-1-300x169.jpg&amp;raw" srcset="https://nhsfraudandsecurity.co.uk/wp-content/uploads/2019/10/finger-2081169_1280-1-300x169.jpg 300w, https://nhsfraudandsecurity.co.uk/wp-content/uploads/2019/10/finger-2081169_1280-1-768x432.jpg 768w, https://nhsfraudandsecurity.co.uk/wp-content/uploads/2019/10/finger-2081169_1280-1-1024x576.jpg 1024w, https://nhsfraudandsecurity.co.uk/wp-content/uploads/2019/10/finger-2081169_1280-1.jpg 1280w" width="400"></figure><span data-dcnode-id="3075" instrument_node="">
</span></div><span data-dcnode-id="3073" instrument_node="">
</span></div><span data-dcnode-id="3071" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="3070"><span data-dcnode-id="3069" instrument_node="">
</span><h3 class="has-vivid-cyan-blue-color has-text-color" data-dcnode-id="3066" id="what-types-of-fraud-can-occur-within-the-nhs"><strong data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">What types of fraud can occur within the NHS?</span></strong></h3><span data-dcnode-id="3065" instrument_node="">
</span><p class="has-black-color has-text-color" data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">The following are some examples of fraud that have been committed within or against the NHS:</span></p><span data-dcnode-id="3062" instrument_node="">
</span><ul data-dcnode-id="3009" style="color:#000000"><li data-dcnode-id="3052"><span data-dcnode-id="3061" instrument_node="">Staff submitting:</span><ul data-dcnode-id="3053"><li data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">claims for excess hours or overtime not worked.</span></li><li data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">claims for expenses not incurred.</span></li><li data-dcnode-id="3054"><span data-dcnode-id="3056" instrument_node="">duplicate claims for hours already claimed.</span><br data-dcnode-id="3055"></li></ul></li><li data-dcnode-id="3042"><span data-dcnode-id="3051" instrument_node="">Job applicants providing false information on an employment application including:</span><ul data-dcnode-id="3043"><li data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">work history.</span></li><li data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">qualifications.</span></li><li data-dcnode-id="3044"><span data-dcnode-id="3046" instrument_node="">references.</span><br data-dcnode-id="3045"></li></ul></li><li data-dcnode-id="3039"><span data-dcnode-id="3041" instrument_node="">Employees working elsewhere whilst sick from the NHS.</span><br data-dcnode-id="3040"></li><li data-dcnode-id="3036"><span data-dcnode-id="3038" instrument_node="">Employees ordering goods through the NHS and taking them home.</span><br data-dcnode-id="3037"></li><li data-dcnode-id="3033"><span data-dcnode-id="3035" instrument_node="">Employees defrauding the finances of a patient.</span><br data-dcnode-id="3034"></li><li data-dcnode-id="3030"><span data-dcnode-id="3032" instrument_node="">Employees manipulating budgets and accounts for their own gain.</span><br data-dcnode-id="3031"></li><li data-dcnode-id="3027"><span data-dcnode-id="3029" instrument_node="">Patients using false identities to obtain extra drugs.</span><br data-dcnode-id="3028"></li><li data-dcnode-id="3024"><span data-dcnode-id="3026" instrument_node="">The falsification or alteration of prescriptions.</span><br data-dcnode-id="3025"></li><li data-dcnode-id="3021"><span data-dcnode-id="3023" instrument_node="">Contractors claiming for services not provided.</span><br data-dcnode-id="3022"></li><li data-dcnode-id="3018"><span data-dcnode-id="3020" instrument_node="">Visitors to the UK using false identity papers or details to obtain NHS treatment.</span><br data-dcnode-id="3019"></li><li data-dcnode-id="3015"><span data-dcnode-id="3017" instrument_node="">Submission of false invoices to the NHS.</span><br data-dcnode-id="3016"></li><li data-dcnode-id="3012"><span data-dcnode-id="3014" instrument_node="">False requests to change the banking or contact details for a legitimate supplier.</span><br data-dcnode-id="3013"></li><li data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">Emails impersonating directors or managers being sent to NHS employees requesting financial transactions.</span></li></ul><span data-dcnode-id="3008" instrument_node="">
</span><p class="has-black-color has-text-color" data-dcnode-id="3002"><span data-dcnode-id="3007" instrument_node="">In summary; fraud is a dishonest act which is committed with the intention of making a gain or causing loss or risk of loss to another. If you have a suspicion of fraud affecting the NHS you should </span><strong data-dcnode-id="3004"><a data-dcnode-id="3005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nhsfraudandsecurity.co.uk/contact/"><span data-dcnode-id="3006" instrument_node="">report your concerns</span></a></strong><span data-dcnode-id="3003" instrument_node=""> immediately.</span></p><span data-dcnode-id="3001" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="3000"><span data-dcnode-id="2999" instrument_node="">
