</span><section class="pt-2 pb-5" data-dcnode-id="901"><span data-dcnode-id="1242" instrument_node="">
</span><div class="container" data-dcnode-id="903"><span data-dcnode-id="1241" instrument_node="">
</span><div class="row" data-dcnode-id="905"><span data-dcnode-id="1240" instrument_node="">
</span><div class="col-md-8 text-zone" data-dcnode-id="1108"><span data-dcnode-id="1239" instrument_node="">
</span><h1 data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">What is mortgage fraud?</span></h1><span data-dcnode-id="1236" instrument_node="">
</span><h5 class="font-weight-normal" data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Mortgage fraud is a criminal act that involves obtaining a mortgage by making false claims on your application and it is becoming increasingly common. Even if you tell a 'little white lie' when applying for your mortgage, you are still committing mortgage fraud.</span></h5><span data-dcnode-id="1233" instrument_node="">
</span><br data-dcnode-id="1232"><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1229" style="font-size: 14px;"><span data-dcnode-id="1230" instrument_node="">If you omit information, under-represent your income or financial situation, or don’t disclose any information regarding your financial obligations such as loans or credit cards, you could be putting your home at risk, while at the same time breaking the law. This is true of whether you are buying a new property, or simply </span></span><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qualitysolicitors.com/housing-and-property/remortgaging/" target="_blank"><span data-dcnode-id="1228" instrument_node="">remortgaging</span></a><span data-dcnode-id="1225" style="font-size: 14px;"><span data-dcnode-id="1226" instrument_node=""> a current one.</span></span></p><span data-dcnode-id="1223" instrument_node="">
</span><h3 data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Why do people commit mortgage fraud?</span></h3><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1219" instrument_node="">Recently it has become more difficult to obtain a mortgage as mortgage lenders have become stricter regarding their borrowing criteria. This has resulted in more people making fraudulent </span><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qualitysolicitors.com/media-centre/social-media/blog/2013/07/22/applying-for-a-mortgage-the-ins-and-outs" target="_blank"><span data-dcnode-id="1218" instrument_node="">mortgage applications</span></a><span data-dcnode-id="1216" instrument_node=""> in order to buy a home. Nearly 4 in every 1,000 mortgage applications turn out to be fraudulent.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><h3 data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">What kind of mortgage frauds do people commit?</span></h3><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">There are various forms of mortgage fraud, but the most common is lying about income,&nbsp;which&nbsp;accounts for 25% of all mortgage fraud.&nbsp;Attempting to hide a bad credit history is also a common type of mortgage fraud, and around 20% of mortgage fraud involves lying about an employment situation.</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Another kind of mortgage fraud is failing to tell the lender about the use of the property.&nbsp;For instance a borrower might tell the lender that the property is being bought for them to live in while it is really being bought to let. This way they hope to avoid the higher buy-to-let mortgage rates.</span></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">While most mortgage fraud is committed by individuals, &nbsp;it is&nbsp;increasingly being targeted by organised crime groups too.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><h3 data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">How does organised crime use mortgage fraud?</span></h3><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Mortgage fraud is popular with organised crime groups as it can be profitable and relatively low risk. Frequently it is used as a way of laundering money obtained from illegal activities such as supplying drugs and trafficking.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">One way in which it happens is by over-valuing properties, forged documentation, and inflating the value of commercial property using fraudulent leases.</span></p><span data-dcnode-id="1193" instrument_node="">
</span><h3 data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">How easy is it to get away with mortgage fraud?</span></h3><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Many people who try to get away with mortgage fraud, such as lying about their financial circumstances in order to secure a home loan, do get found out.</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1186" instrument_node="">This might happen through normal credit checks, or through the </span><a data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.telegraph.co.uk/finance/personalfinance/borrowing/mortgages/8732253/HMRC-to-verify-mortgage-applications.html" rel="nofollow" target="_blank"><span data-dcnode-id="1185" instrument_node="">Mortgage verification Scheme</span></a><span data-dcnode-id="1183" instrument_node=""> which is run by HMRC, the Building Societies Association and the Council of Mortgage Lenders. Lenders can pass applicants' details to HMRC which will then check them against their tax and employment information.</span></p><span data-dcnode-id="1181" instrument_node="">
</span><h3 data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">How is mortgage fraud detected?</span></h3><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">As well as the normal checks and balances carried out by lenders, there are a number of unusual circumstances that are likely to raise suspicion. Some of these include several remortgages and sales of the same property; a large and unexplained increase of the purchase price; a deposit paid by a third person; and sales proceeds to be paid to someone other than the seller.</span></p><span data-dcnode-id="1175" instrument_node="">
</span><h3 data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">What happens if people committing mortgage fraud are found out?</span></h3><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">The least serious form of mortgage fraud is when a person is accused of making a false statement, for instance regarding their income, in an attempt to obtain a residential mortgage. It is unlikely to result in a charge and if it does proceed to court it is unlikely to attract a custodial sentence.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Where there is considered to have been a conspiracy to defraud, all parties involved in the transaction may be charged with conspiracy to defraud&nbsp;and if found guilty, the court may impose custodial sentences depending on the severity of the case.</span></p><span data-dcnode-id="1166" instrument_node="">
</span><h3 data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">How do I defend a charge of mortgage fraud?</span></h3><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">If you are facing the possibility of prosecution for mortgage fraud then it is important that you speak with a solicitor as soon as possible. It is essential that the solicitor you chose understands the nature of mortgage fraud as it&nbsp;can be highly complex.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1159" instrument_node="">Most people accused of mortgage fraud are unacquainted with the English justice system and are of good character, never having been </span><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qualitysolicitors.com/criminal-defence/" target="_blank"><span data-dcnode-id="1158" instrument_node="">convicted of a criminal offence</span></a><span data-dcnode-id="1156" instrument_node="">. Our specialist </span><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qualitysolicitors.com/find-solicitor" target="_blank"><span data-dcnode-id="1155" instrument_node="">local solicitors</span></a><span data-dcnode-id="1153" instrument_node=""> understand that your good reputation is very important to you and they have experience in defending complex fraud cases.</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1150" instrument_node="">QualitySolicitors&nbsp;are changing the way you see lawyers.&nbsp;We promise&nbsp;</span><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qualitysolicitors.com/media-centre/about-us/direct-lawyer-contact" target="_blank"><span data-dcnode-id="1149" instrument_node="">direct lawyer contact</span></a><span data-dcnode-id="1147" instrument_node="">,&nbsp;</span><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qualitysolicitors.com/media-centre/about-us/free-first-advice" target="_blank"><span data-dcnode-id="1146" instrument_node="">Free First&nbsp;Advice</span></a><span data-dcnode-id="1144" instrument_node="">,&nbsp;</span><a data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qualitysolicitors.com/media-centre/about-us/no-hidden-costs" target="_blank"><span data-dcnode-id="1143" instrument_node="">no hidden-costs</span></a><span data-dcnode-id="1141" instrument_node="">,</span><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qualitysolicitors.com/media-centre/about-us/same-day-response" target="_blank"><span data-dcnode-id="1140" instrument_node="">&nbsp;same day response</span></a><span data-dcnode-id="1138" instrument_node="">&nbsp;and</span><a data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qualitysolicitors.com/media-centre/about-us/saturday-openings" target="_blank"><span data-dcnode-id="1137" instrument_node="">&nbsp;Saturday openings</span></a><span data-dcnode-id="1135" instrument_node="">.</span></p><span data-dcnode-id="1133" instrument_node="">
