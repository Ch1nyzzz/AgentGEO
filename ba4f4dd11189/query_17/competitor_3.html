</span><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">New laws are making it difficult for illegal immigrants to gain employment—thus entrepreneurial thieves are after your good name to sell it for a high price.</span></p><span data-dcnode-id="525" instrument_node="">
</span><div class="section" data-dcnode-id="493"><span data-dcnode-id="524" instrument_node="">

</span><h2 data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">How does employment-related fraud occur?</span></h2><span data-dcnode-id="518" instrument_node="">
</span><div data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">
</span></div><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">A criminal background, an illegal status or even a bad work history can make it difficult to find employment. That’s why identity thieves are often resorting to employment fraud. In order to pass a background check or employment requirements, a fraudster could use your Social Security number. Even if the employment process requires more than an SSN, employer background checks are often not very thorough. Identity thieves may only need a small amount of additional information.</span></p><span data-dcnode-id="512" instrument_node="">
</span><div data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">
</span></div><span data-dcnode-id="509" instrument_node="">
</span><h2 data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">How could employment related fraud affect my identity?</span></h2><span data-dcnode-id="506" instrument_node="">
</span><div data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">
</span></div><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">If an identity thief uses your information for employment purposes, there could be a devastating effect on your employment history and your name. Since incorrect employment will be reported to the Social Security Administration, you may face tax audits, lost tax refunds and errors on permanent government records. They could even use your identity for medical services, home utilities, credit and more. And if you apply for a new job, your employment history may be incorrect and misleading. The effects could take years to resolve.</span></p><span data-dcnode-id="500" instrument_node="">
</span><div class="disclaimers" data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">&nbsp;</span></div><span data-dcnode-id="497" instrument_node="">
