</span><div data-dcnode-id="390" id="kms-document-div"><h1 data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">ARCHIVED: What is the Storm worm, and how can I protect myself?</span></h1><div data-dcnode-id="426" id="kb-archive-notice"><span data-dcnode-id="433" instrument_node="">
</span><div class="alert alert-warning" data-dcnode-id="428" style="font-size:133%; color:#1f1f1f"><span data-dcnode-id="432" instrument_node="">
  This content has been </span><a class="kba" data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kb.iu.edu/d/anlq" title=""><span data-dcnode-id="431" instrument_node="">archived</span></a><span data-dcnode-id="429" instrument_node="">, and is no longer maintained by Indiana University. Information here may no longer be accurate, and links may no longer be available or reliable.

 </span></div><span data-dcnode-id="427" instrument_node="">
</span></div><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="423" instrument_node="">The Storm worm is a </span><a class="kbh" data-dcnode-id="421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kb.iu.edu/d/aehm" title=""><span data-dcnode-id="422" instrument_node="">Trojan horse</span></a><span data-dcnode-id="420" instrument_node=""> that opens a backdoor in
the computer which then allows it to be remotely controlled, while
also installing a rootkit that hides the malicious program. The
compromised computer becomes a </span><span data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">zombie</span></span><span data-dcnode-id="417" instrument_node=""> in a botnet. This
particular worm also has the ability to update itself, so that updated
infections can be fed into the compromised computer.</span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">
The Storm worm first appeared in January 2007 as severe storms swept
over Europe. Users received a phony email message purporting to
contain vital news updates about the storms. Since then, a variety of
subjects have been used to lure users to open the email.
</span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">
In a recent wave of attacks, the emails purport to notify users that they have
received a postcard or electronic greeting card from a friend, family
member, or mate. The body of the email message provides a link where
the card can be picked up, but really directs the user to a site that
installs the malicious software. Once the bot has installed, it can
harvest email addresses from that machine and propagate itself.</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="408" instrument_node="">
</span><a class="kbh" data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kb.iu.edu/d/ahaw" title=""><span data-dcnode-id="407" instrument_node="">UITS</span></a><span data-dcnode-id="405" instrument_node=""> recommends that you keep your antivirus software as up to date as
possible. Also, because malware can be downloaded and installed
inadvertently, log in with a limited account for everyday tasks and as
a privileged user only when needed. For more information, see </span><a class="kba" data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kb.iu.edu/d/amsv" title=""><span data-dcnode-id="404" instrument_node="">About the principle of least privilege</span></a><span data-dcnode-id="402" instrument_node="">
</span></p><div class="references panel panel-primary" data-dcnode-id="392"><div class="panel-heading" data-dcnode-id="398"><h2 class="panel-title" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Related documents</span></h2></div><span data-dcnode-id="397" instrument_node="">

</span></div></div><span data-dcnode-id="391" instrument_node="">
