</span><p class="post-modified-info" data-dcnode-id="492"><span data-dcnode-id="495" instrument_node="">Last Updated on December 13, 2020 by </span><a class="last-modified-author" data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resellerbible.com/depop-safety-avoid-scams" target="_blank"><span data-dcnode-id="494" instrument_node="">Stiletto Socialite</span></a></p><span data-dcnode-id="491" instrument_node="">
</span><p class="has-text-color has-very-dark-gray-color" data-dcnode-id="483"><span data-dcnode-id="490" instrument_node="">It’s unfortunate that there is so much talk that </span><strong data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Depop is a scam</span></strong><span data-dcnode-id="487" instrument_node=""> with articles, forums, and Facebook groups all pointing with screen shot evidence how </span><strong data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Depop safety</span></strong><span data-dcnode-id="484" instrument_node=""> is an issue. </span></p><span data-dcnode-id="482" instrument_node="">
</span><p class="has-text-color has-very-dark-gray-color" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">However, I would like to take this moment to say I am a real human being not a bot and I don’t scam anyone on Depop.&nbsp; </span></p><span data-dcnode-id="479" instrument_node="">

</span><p data-dcnode-id="322"><span data-dcnode-id="326" instrument_node="">Depop has recently announced they have teamed up with Real Authentication.com to authenticate designer items.  You can check out the process and the brands </span><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//depophelp.zendesk.com/hc/en-gb/articles/360038264893-Authenticated-Products-on-Depop"><span data-dcnode-id="325" instrument_node="">here</span></a><span data-dcnode-id="323" instrument_node="">.  I know when I thrift stuff and its designer I disclose that “I cannot verify the authenticity as I was not the original owner. Right there the buyer knows that its possible it could be a fake.&nbsp; Since I disclosed it and show the tags therefore they cannot go back and say I sold them a fake.&nbsp; I’ve never had any issues conducting business in this upfront way. </span></p><span data-dcnode-id="321" instrument_node="">

</span><p class="has-text-color has-very-dark-gray-color" data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Here is a low key scam that did not happen here but is part of the reason I don’t do international shipments at this time.&nbsp; I had a international customer in the EU (which has certain rules about returns, etc) return a package to me due to&nbsp; buyers remorse.&nbsp; </span></p><span data-dcnode-id="296" instrument_node="">
</span><p class="has-text-color has-very-dark-gray-color" data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Most people on Depop are final sale so return to sender is the passive aggressive way to send the package back to force the seller into a return.&nbsp; Well boo you shouldn’t waste your time buying it then, I would have much rather NOT dealt with you as a customer and let that item sit for eternity before dealing with you.&nbsp; </span></p><span data-dcnode-id="293" instrument_node="">

this situation did not occur on Depop but its something you should think about

is my step by step process that I use as a seller to make sure I do not get
scammed</span></p><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">I’ve sold hundereds of packages on Depop and I conduct all my transactions via the app. I’ve never had any issues regarding receiving payments, etc because it is so simple to do business when you do it the right way.&nbsp; </span></p><span data-dcnode-id="284" instrument_node="">

</span><ul data-dcnode-id="267"><li data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">When      I get notification of a sale then I review that my payment has been      received then I ship. </span></li><li data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">I use a Depop shipping label      so that the tracking # will automatically update in the app and the customer can see  their tracking status</span></li><li data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Depending on the      circumstances I may video record me, packaging my shipment</span></li><li data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">If I am not hand delivering      my USPS packages to a USPS worker then I usually video record me dropping      off my packages at USPS that way I have proof that the package is within      USPS hands</span></li></ul><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="265"></p><span data-dcnode-id="264" instrument_node="">
</span><p class="has-text-color has-very-dark-gray-color" data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">After that I am done, the customer has their tracking and I expect USPS to do their job. If for some reason there is a problem with the item being delivered, etc trust me the customer will contact you.&nbsp; I don’t spend my time monitoring tracking except on rare occasion.&nbsp; Every time a customer has had an issue with delivery it has not been my fault or USPS it has been the customer’s and it usually had to do with their delivery address information being wrong.&nbsp; </span></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="260"></p><span data-dcnode-id="259" instrument_node="">

and then I wont hear from any of the spammy buyers from months. Almost always
the messages are for my higher priced items.&nbsp;
This is how I handle the fake buyers on Depop. I block them.&nbsp; Depop gets plenty of messages they know they
exist so I block them and move on.</span></p><span data-dcnode-id="250" instrument_node="">
</span><p class="has-text-color has-very-dark-gray-color" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">All this talk about scam and you would think that’s all there is to Depop, but I assure you its not.&nbsp; There are wonderful sellers out there ready to service your needs.&nbsp; Honestly, if you go in thinking negative often time the universe will deliver just what you asked for.&nbsp; So&nbsp; as a seller there are too many scams out there to keep track of you can spend a whole day reading the various reddits about scamming on Depop or instead you can go purchase the item, hope for the best, and go an conquer the world because honestly ]it really its not that serious!</span></p><span data-dcnode-id="247" instrument_node="">
