libaba.com/" target="_blank"><strong data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">Alibaba Trade Assurance</span></strong></a><span data-dcnode-id="6021" instrument_node=""> – a service from </span><a data-dcnode-id="6018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alibaba.com/" target="_blank"><strong data-dcnode-id="6019"><span data-dcnode-id="6020" instrument_node="">Alibaba</span></strong></a><span data-dcnode-id="6017" instrument_node=""> that offers “full payment protection for your online orders”.</span></p><span data-dcnode-id="6015" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="6013"><span data-dcnode-id="6014" instrument_node="">So without any further ado, let’s get to it!</span></p><span data-dcnode-id="6012" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="6008"><span data-dcnode-id="6009" id="First_things_first_-_what_is_Alibaba_Trade_Assurance"><strong data-dcnode-id="6010"><span data-dcnode-id="6011" instrument_node="">First things first – what is Alibaba Trade Assurance?</span></strong></span></h3><span data-dcnode-id="6007" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="6005"><span data-dcnode-id="6006" instrument_node="">Well it’s a service run by Alibaba that’s “designed to help create trust between buyers and suppliers.” Trade Assurance covers eligible orders on Alibaba.com with full payment protection if either:</span></p><span data-dcnode-id="6004" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="6000"><li data-dcnode-id="6002"><span data-dcnode-id="6003" instrument_node="">The quality of your products do not conform to the agreed standards;</span></li><span data-dcnode-id="6001" instrument_node=""> </span></ul><p class="nitro-offscreen" data-dcnode-id="5997"><strong data-dcnode-id="5998"><span data-dcnode-id="5999" instrument_node="">OR</span></strong></p><span data-dcnode-id="5996" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="5992"><li data-dcnode-id="5994"><span data-dcnode-id="5995" instrument_node="">The supplier fails to ship your products on the agreed shipment date.</span></li><span data-dcnode-id="5993" instrument_node=""> </span></ul><p class="nitro-offscreen" data-dcnode-id="5989"><strong data-dcnode-id="5990"><span data-dcnode-id="5991" instrument_node="">Sounds good, right? But, how much does Alibaba Trade Assurance cost to use?</span></strong></p><span data-dcnode-id="5988" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5986"><span data-dcnode-id="5987" instrument_node="">It’s 100% FREE – and by free, I actually mean free – for both buyers and sellers, so it doesn’t add any cost to your order at all even though it’s basically an insurance in case anything goes wrong.</span></p><span data-dcnode-id="5985" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5983"><span data-dcnode-id="5984" instrument_node="">However, Trade Assurance doesn’t cover all orders on Alibaba – as it’s only eligible for suppliers who have signed up to the service and promise to abide by the Trade Assurance rules.</span></p><span data-dcnode-id="5982" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5980"><span data-dcnode-id="5981" instrument_node="">You can easily see which suppliers/products are covered by Trade Assurance by looking out for the Trade Assurance logo when searching for products and suppliers on Alibaba.</span></p><span data-dcnode-id="5979" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5977"><span data-dcnode-id="5978" instrument_node="">In this example search (and no, I don’t suggest you actually start selling iPhone cases!) you can see that while the first listing isn’t covered by Trade Assurance, the second one is:</span></p><span data-dcnode-id="5976" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5974" style="text-align:center;"><img alt="" class="aligncenter size-full wp-image-5810 nitro-lazy" data-attachment-id="5810" data-comments-opened="1" data-dcnode-id="5975" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="trade-assurance-listing" data-large-file="https://andrewminalto.com/wp-content/uploads/2021/01/735f8-trade-assurance-listing.jpg" data-medium-file="https://andrewminalto.com/wp-content/uploads/2021/01/735f8-trade-assurance-listing.jpg" data-orig-file="https://andrewminalto.com/wp-content/uploads/2021/01/735f8-trade-assurance-listing.jpg" data-orig-size="600,528" data-permalink="https://andrewminalto.com/trade-assurance/trade-assurance-listing/" height="528" id="NDc5OjExOTQ=-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-cmkpn.nitrocdn.com/MfFBDSVpuVFMKffuKkdRAJpKZOnQGWkK/assets/static/optimized/rev-2355d2a/wp-content/uploads/2021/01/735f8-trade-assurance-listing.jpg" src="data:image/svg+xml;nitro-empty-id=NDc5OjExOTQ=-1;base64,PHN2ZyB2aWV3Qm94PSIwIDAgNjAwIDUyOCIgd2lkdGg9IjYwMCIgaGVpZ2h0PSI1MjgiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PC9zdmc+" width="600"></p><span data-dcnode-id="5973" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5971"><span data-dcnode-id="5972" instrument_node="">When you hover over the Trade Assurance logo, you’ll be able to see another very important piece of information – the coverage amount for that supplier:</span></p><span data-dcnode-id="5970" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5968" style="text-align:center;"><img alt="" class="aligncenter size-full wp-image-5811 nitro-lazy" data-attachment-id="5811" data-comments-opened="1" data-dcnode-id="5969" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="trade-assurance-limit" data-large-file="https://andrewminalto.com/wp-content/uploads/2021/01/e6324-trade-assurance-limit.jpg" data-medium-file="https://andrewminalto.com/wp-content/uploads/2021/01/e6324-trade-assurance-limit.jpg" data-orig-file="https://andrewminalto.com/wp-content/uploads/2021/01/e6324-trade-assurance-limit.jpg" data-orig-size="700,516" data-permalink="https://andrewminalto.com/trade-assurance/trade-assurance-limit/" height="516" id="NDgxOjExODI=-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-cmkpn.nitrocdn.com/MfFBDSVpuVFMKffuKkdRAJpKZOnQGWkK/assets/static/optimized/rev-2355d2a/wp-content/uploads/2021/01/e6324-trade-assurance-limit.jpg" src="data:image/svg+xml;nitro-empty-id=NDgxOjExODI=-1;base64,PHN2ZyB2aWV3Qm94PSIwIDAgNzAwIDUxNiIgd2lkdGg9IjcwMCIgaGVpZ2h0PSI1MTYiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PC9zdmc+" width="700"></p><span data-dcnode-id="5967" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5962"><strong data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node="">This is also known as the supplier’s Trade Assurance limit and this amount is set by Alibaba, not the supplier!</span></strong><span data-dcnode-id="5964" instrument_node=""> It’s based on the supplier’s qualification status and also their historical sales volume, so the higher this amount the better really.</span><span data-dcnode-id="5963" id="more-5804"></span></p><span data-dcnode-id="5961" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5959"><span data-dcnode-id="5960" instrument_node="">Just to be clear – you’ll only be covered up to the Trade Assurance limit amount for your specific supplier. So if their limit is $20,000 and your order is worth $30,000 – then you’ll still only be covered up to $20,000.</span></p><span data-dcnode-id="5958" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5956"><span data-dcnode-id="5957" instrument_node="">But in practice this is never really a problem as the vast majority of the time the Trade Assurance limit will be well above your order amount anyway.</span></p><span data-dcnode-id="5955" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5953"><span data-dcnode-id="5954" instrument_node="">Okay, so now that we’ve covered what Trade Assurance is, who it applies to and the coverage amount – how do you actually use the Trade Assurance service?</span></p><span data-dcnode-id="5952" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="5948"><span data-dcnode-id="5949" id="Heres_how_it_works"><strong data-dcnode-id="5950"><span data-dcnode-id="5951" instrument_node="">Here’s how it works:</span></strong></span></h3><span data-dcnode-id="5947" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5944"><strong data-dcnode-id="5945"><span data-dcnode-id="5946" instrument_node="">1) Find a supplier</span></strong></p><span data-dcnode-id="5943" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5941"><span data-dcnode-id="5942" instrument_node="">Search for a supplier with the Trade Assurance icon and check that your order amount is within their Trade Assurance limit.</span></p><span data-dcnode-id="5940" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5937"><strong data-dcnode-id="5938"><span data-dcnode-id="5939" instrument_node="">2) Negotiate and confirm your order</span></strong></p><span data-dcnode-id="5936" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5934"><span data-dcnode-id="5935" instrument_node="">Agree on all aspects of your order – such as price, the total amount to be covered by Trade Assurance, payment terms, shipping date, and if you want to be covered for product quality, select either pre-shipment or post-delivery coverage and make sure your quality requirements are contained in the contract.</span></p><span data-dcnode-id="5933" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5930"><strong data-dcnode-id="5931"><span data-dcnode-id="5932" instrument_node="">3) Make payment</span></strong></p><span data-dcnode-id="5929" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5927"><span data-dcnode-id="5928" instrument_node="">Confirm the Trade Assurance contract and make payment via Alibaba.com</span></p><span data-dcnode-id="5926" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5924"><span data-dcnode-id="5925" instrument_node="">Now we’ve already covered finding a supplier who’s enrolled in the Trade Assurance service, but I want to talk more about point no.2 as it’s actually the most important part of Trade Assurance.</span></p><span data-dcnode-id="5923" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5920"><strong data-dcnode-id="5921"><span data-dcnode-id="5922" instrument_node="">What exactly do Alibaba mean when they say “make sure your quality requirements are contained in the contract”?</span></strong></p><span data-dcnode-id="5919" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5917"><span data-dcnode-id="5918" instrument_node="">The answer to this is very, very important – the Trade Assurance coverage is based on the details that you and your supplier agree in your purchase contract.</span></p><span data-dcnode-id="5916" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5914"><span data-dcnode-id="5915" instrument_node="">You can’t start a claim for late delivery unless you specify a delivery date for your order.</span></p><span data-dcnode-id="5913" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5911"><span data-dcnode-id="5912" instrument_node="">You can’t start a claim for product quality unless it’s against a specific and measurable detail, as laid out in your contract.</span></p><span data-dcnode-id="5910" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5907"><strong data-dcnode-id="5908"><span data-dcnode-id="5909" instrument_node="">For example, you can’t say the colour is wrong unless it’s specified exactly what colour the products should be in your contract.</span></strong></p><span data-dcnode-id="5906" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5904"><span data-dcnode-id="5905" instrument_node="">And you need to be as accurate as possible – don’t leave anything up for interpretation! If you’re ordering some children’s tablets and you say “long lasting battery” and they arrive with 2,000 mAh batteries, then there’s nothing you can do.</span></p><span data-dcnode-id="5903" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5901"><span data-dcnode-id="5902" instrument_node="">However, if you specify that the tablets should have batteries that are at least 3,000 mAh then you would be able to make a claim!</span></p><span data-dcnode-id="5900" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5898"><span data-dcnode-id="5899" instrument_node="">You need to be as specific and detailed as possible in your contract.</span></p><span data-dcnode-id="5897" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5894"><strong data-dcnode-id="5895"><span data-dcnode-id="5896" instrument_node="">Specify all of the following:</span></strong></p><span data-dcnode-id="5893" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="5868"><li data-dcnode-id="5891"><span data-dcnode-id="5892" instrument_node="">The shipment date</span></li><span data-dcnode-id="5890" instrument_node=""> </span><li data-dcnode-id="5888"><span data-dcnode-id="5889" instrument_node="">The size of the product</span></li><span data-dcnode-id="5887" instrument_node=""> </span><li data-dcnode-id="5885"><span data-dcnode-id="5886" instrument_node="">Quantity</span></li><span data-dcnode-id="5884" instrument_node=""> </span><li data-dcnode-id="5882"><span data-dcnode-id="5883" instrument_node="">The materials to be used</span></li><span data-dcnode-id="5881" instrument_node=""> </span><li data-dcnode-id="5879"><span data-dcnode-id="5880" instrument_node="">The colour</span></li><span data-dcnode-id="5878" instrument_node=""> </span><li data-dcnode-id="5876"><span data-dcnode-id="5877" instrument_node="">The packaging</span></li><span data-dcnode-id="5875" instrument_node=""> </span><li data-dcnode-id="5873"><span data-dcnode-id="5874" instrument_node="">The branding</span></li><span data-dcnode-id="5872" instrument_node=""> </span><li data-dcnode-id="5870"><span data-dcnode-id="5871" instrument_node="">etc.</span></li><span data-dcnode-id="5869" instrument_node=""> </span></ul><p class="nitro-offscreen" data-dcnode-id="5865"><strong data-dcnode-id="5866"><span data-dcnode-id="5867" instrument_node="">And anything else that is important/that you can think of!</span></strong></p><span data-dcnode-id="5864" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5862"><span data-dcnode-id="5863" instrument_node="">Also – include images! Images of samples, images to illustrate what you’re expecting… these are both incredibly useful.</span></p><span data-dcnode-id="5861" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5859"><span data-dcnode-id="5860" instrument_node="">And the thing about this is that this is good practice anyway. Yes, you have to do this if you want to be fully covered under Alibaba Trade Assurance but it’s what I recommend you do with every order from China anyway!</span></p><span data-dcnode-id="5858" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5856"><span data-dcnode-id="5857" instrument_node="">There’s honestly no downside to doing this – it makes your expectations clear, it makes your supplier’s job easier, and it’s essential for both your pre-shipment inspection as well as for settling any disagreements or disputes.</span></p><span data-dcnode-id="5855" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5853"><span data-dcnode-id="5854" instrument_node="">So please don’t take this part lightly as it is the most important step when ensuring your order from China is protected by Trade Assurance.</span></p><span data-dcnode-id="5852" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5850"><span data-dcnode-id="5851" instrument_node="">Next, let’s look at the two different types of cover and which one you should opt for.</span></p><span data-dcnode-id="5849" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="5845"><span data-dcnode-id="5846" id="Pre-shipment_coverage_vs_Post-delivery_coverage"><strong data-dcnode-id="5847"><span data-dcnode-id="5848" instrument_node="">Pre-shipment coverage vs Post-delivery coverage</span></strong></span></h3><span data-dcnode-id="5844" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5842"><span data-dcnode-id="5843" instrument_node="">Previously to be eligible for Trade Assurance you had to organise a pre-shipment inspection – it wasn’t like eBay or Amazon where you could receive and inspect the goods yourself before making a claim and really that was completely fair – after all this isn’t a retail site – these are b2b, wholesale orders travelling thousands of miles!</span></p><span data-dcnode-id="5841" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5839"><span data-dcnode-id="5840" instrument_node="">However, even taking all of that into account, Alibaba have now made it possible to instead have “Extended Trade Assurance until Arrival at Port/Place of Destination”.</span></p><span data-dcnode-id="5838" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5834"><strong data-dcnode-id="5836"><span data-dcnode-id="5837" instrument_node="">But I actually don’t recommend this at all.</span></strong><span data-dcnode-id="5835" instrument_node=""> I strongly suggest you stick with the typical “Trade Assurance up to Shipment Date”. The reason for this is very simple – if there’s a dispute, then Alibaba will designate an inspection company to come and inspect the stock and write a report, which is what Alibaba will then use to make their decision.</span></p><span data-dcnode-id="5833" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5831"><span data-dcnode-id="5832" instrument_node="">You, as the buyer, as responsible for paying for this inspection initially (it is refunded to you if the claim is later found in your favour) and as I’m sure you can imagine, the cost of doing this in the UK is many times more expensive than doing it in China.</span></p><span data-dcnode-id="5830" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5828"><span data-dcnode-id="5829" instrument_node="">Plus it’s just so much easier to deal with any problems when the stock is still with your supplier – particularly if you’ve agreed 50/50 payment terms where half the money is paid upfront and half is paid prior to shipment. That way you have more leverage and you can work on fixing any issues directly with your supplier, rather than having to go through Alibaba.</span></p><span data-dcnode-id="5827" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5824"><strong data-dcnode-id="5825"><span data-dcnode-id="5826" instrument_node="">So that’s why I always recommend going for pre-shipment coverage and arranging a pre-shipment inspection in China before you’ve paid for your products and before they’re shipped to you.</span></strong></p><span data-dcnode-id="5823" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5821"><span data-dcnode-id="5822" instrument_node="">I’ve covered pre-shipment inspections in great detail previously, so if you need any help with that, please take a look at these posts:</span></p><span data-dcnode-id="5820" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="5809"><li data-dcnode-id="5816"><a data-dcnode-id="5817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//andrewminalto.com/china-factory-inspection/" target="_blank"><strong data-dcnode-id="5818"><span data-dcnode-id="5819" instrument_node="">Trip to China: £3000 vs Factory Inspection: £70</span></strong></a></li><span data-dcnode-id="5815" instrument_node=""> </span><li data-dcnode-id="5811"><a data-dcnode-id="5812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//andrewminalto.com/pre-shipment-inspection/" target="_blank"><strong data-dcnode-id="5813"><span data-dcnode-id="5814" instrument_node="">Pre-Shipment Inspection in China – STAY SAFE!</span></strong></a></li><span data-dcnode-id="5810" instrument_node=""> </span></ul><h3 class="nitro-offscreen" data-dcnode-id="5805"><span data-dcnode-id="5806" id="What_payment_methods_are_available_for_a_Trade_Assurance_order"><strong data-dcnode-id="5807"><span data-dcnode-id="5808" instrument_node="">What payment methods are available for a Trade Assurance order?</span></strong></span></h3><span data-dcnode-id="5804" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5802"><span data-dcnode-id="5803" instrument_node="">You have three different options for payment:</span></p><span data-dcnode-id="5801" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5798"><strong data-dcnode-id="5799"><span data-dcnode-id="5800" instrument_node="">1) E-Checking</span></strong></p><span data-dcnode-id="5797" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5795"><span data-dcnode-id="5796" instrument_node="">This is the payment methods recommended by Alibaba. You create an account online and transfer money directly to the company’s designated bank account. It has a fixed transaction fee of $15. (currently only available to people in the US).</span></p><span data-dcnode-id="5794" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5791"><strong data-dcnode-id="5792"><span data-dcnode-id="5793" instrument_node="">2) Credit Card</span></strong></p><span data-dcnode-id="5790" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5788"><span data-dcnode-id="5789" instrument_node="">This is the payment method I suggest if you want complete protection. It does have a transaction fee of 2.8% (so it’s more expensive than e-Checking for orders above $540) but at the same time it means that you always have the option of starting a chargeback with your bank/card company if everything else fails.</span></p><span data-dcnode-id="5787" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5784"><strong data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">3) Telegraphic Transfer</span></strong></p><span data-dcnode-id="5783" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5781"><span data-dcnode-id="5782" instrument_node="">Lastly there’s the option of simply transferring the money directly from your bank account to the company’s designated Citibank account.</span></p><span data-dcnode-id="5780" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5778"><span data-dcnode-id="5779" instrument_node="">So we’ve now covered pretty much everything you need to know about Alibaba Trade Assurance apart from something that you will hopefully never need – how to make a claim!</span></p><span data-dcnode-id="5777" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5773"><strong data-dcnode-id="5775"><span data-dcnode-id="5776" instrument_node="">As I’ve mentioned a few times, even if you have Trade Assurance, you should always try and resolve any issues directly with your supplier</span></strong><span data-dcnode-id="5774" instrument_node="">. Most of the time if will be a genuine mistake and they’ll be more than happy to alter/fix/replace it for you.</span></p><span data-dcnode-id="5772" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5770"><span data-dcnode-id="5771" instrument_node="">If however you’re very unlucky and that isn’t the case, then you have no choice but to get Alibaba involved.</span></p><span data-dcnode-id="5769" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5766"><strong data-dcnode-id="5767"><span data-dcnode-id="5768" instrument_node="">The process for opening a dispute is actually very&nbsp;simple:</span></strong></p><span data-dcnode-id="5765" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5763"><span data-dcnode-id="5764" instrument_node="">Login to My Alibaba &gt; Go to Order Management &gt; Click on All Orders and from there you can select to Open a dispute.</span></p><span data-dcnode-id="5762" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5760" style="text-align:center;"><img alt="" class="aligncenter size-full wp-image-5812 nitro-lazy" data-attachment-id="5812" data-comments-opened="1" data-dcnode-id="5761" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="order" data-large-file="https://andrewminalto.com/wp-content/uploads/2021/01/767ea-order.jpg" data-medium-file="https://andrewminalto.com/wp-content/uploads/2021/01/767ea-order.jpg" data-orig-file="https://andrewminalto.com/wp-content/uploads/2021/01/767ea-order.jpg" data-orig-size="700,353" data-permalink="https://andrewminalto.com/trade-assurance/order/" height="353" id="NTQwOjEwODY=-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-cmkpn.nitrocdn.com/MfFBDSVpuVFMKffuKkdRAJpKZOnQGWkK/assets/static/optimized/rev-2355d2a/wp-content/uploads/2021/01/767ea-order.jpg" src="data:image/svg+xml;nitro-empty-id=NTQwOjEwODY=-1;base64,PHN2ZyB2aWV3Qm94PSIwIDAgNzAwIDM1MyIgd2lkdGg9IjcwMCIgaGVpZ2h0PSIzNTMiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PC9zdmc+" width="700"></p><span data-dcnode-id="5759" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5755"><strong data-dcnode-id="5757"><span data-dcnode-id="5758" instrument_node="">After you submit a dispute, your supplier has 3 days to respond.</span></strong><span data-dcnode-id="5756" instrument_node=""> If the supplier doesn’t respond within 3 days, you can escalate the dispute manually. If you or the supplier don’t respond within 7 days, then it will be automatically escalated.</span></p><span data-dcnode-id="5754" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5752"><span data-dcnode-id="5753" instrument_node="">You then have to pay for one of Alibaba’s three designated inspection companies to perform an inspection of your order. These three companies are:</span></p><span data-dcnode-id="5751" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5748"><strong data-dcnode-id="5749"><span data-dcnode-id="5750" instrument_node="">Bureau Veritas, TUV Rheinland, and SGS.</span></strong></p><span data-dcnode-id="5747" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5745"><span data-dcnode-id="5746" instrument_node="">These companies will carry out an inspection based on the details in your contract (hence why that is so important!).</span></p><span data-dcnode-id="5744" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5742"><span data-dcnode-id="5743" instrument_node="">They’ll follow international industry standards in terms of the number of samples and the maximum allowed no. of defects:</span></p><span data-dcnode-id="5741" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5739" style="text-align:center;"><img alt="" class="aligncenter size-full wp-image-5808 nitro-lazy" data-attachment-id="5808" data-comments-opened="1" data-dcnode-id="5740" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="defects" data-large-file="https://andrewminalto.com/wp-content/uploads/2021/01/f31b2-defects.jpg" data-medium-file="https://andrewminalto.com/wp-content/uploads/2021/01/f31b2-defects.jpg" data-orig-file="https://andrewminalto.com/wp-content/uploads/2021/01/f31b2-defects.jpg" data-orig-size="682,318" data-permalink="https://andrewminalto.com/trade-assurance/defects-2/" height="318" id="NTQ2OjExMDA=-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-cmkpn.nitrocdn.com/MfFBDSVpuVFMKffuKkdRAJpKZOnQGWkK/assets/static/optimized/rev-2355d2a/wp-content/uploads/2021/01/f31b2-defects.jpg" src="data:image/svg+xml;nitro-empty-id=NTQ2OjExMDA=-1;base64,PHN2ZyB2aWV3Qm94PSIwIDAgNjgyIDMxOCIgd2lkdGg9IjY4MiIgaGVpZ2h0PSIzMTgiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PC9zdmc+" width="682"></p><span data-dcnode-id="5738" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5734"><strong data-dcnode-id="5736"><span data-dcnode-id="5737" instrument_node="">AQL 4.0 refers to Minor Defects</span></strong><span data-dcnode-id="5735" instrument_node=""> – i.e. a defect that does not reduce the usability of the product, can be noticed only after careful examination, and may reduce the saleability. It is a workmanship defect beyond the defined quality standard.</span></p><span data-dcnode-id="5733" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5729"><strong data-dcnode-id="5731"><span data-dcnode-id="5732" instrument_node="">AQL 2.5 refers to Major Defects</span></strong><span data-dcnode-id="5730" instrument_node=""> – i.e. a defect that is likely to result in failure, reduce the usability and saleability and can easily be detected by the customer.</span></p><span data-dcnode-id="5728" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5724"><strong data-dcnode-id="5726"><span data-dcnode-id="5727" instrument_node="">Then there is also AQL 0 – Critical Defects</span></strong><span data-dcnode-id="5725" instrument_node=""> – i.e. a defect likely to result in a hazardous or unsafe condition for an individual using the product or fails to meet mandatory regulations. There are no AQL 0 defects allowed at any lot size.</span></p><span data-dcnode-id="5723" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5721"><span data-dcnode-id="5722" instrument_node="">After they’ve completed their report, it will be sent to both companies and Alibaba will then use it to make a decision on the dispute.</span></p><span data-dcnode-id="5720" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5718"><span data-dcnode-id="5719" instrument_node="">If your claims were found to be correct, you’ll be refunded your order amount as well as the amount you paid for the inspection.</span></p><span data-dcnode-id="5717" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5715"><span data-dcnode-id="5716" instrument_node="">And there you have it! An eBay/Amazon like dispute service, but for Alibaba.com.</span></p><span data-dcnode-id="5714" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5712"><span data-dcnode-id="5713" instrument_node="">And before anyone points out that there aren’t so many requirements for making a dispute on eBay or Amazon… that’s just common sense! Alibaba is a site for bulk, business orders so it would honestly be crazy to expect the same level of buyer protection as you get on marketplaces like eBay and Amazon.</span></p><span data-dcnode-id="5711" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5709"><span data-dcnode-id="5710" instrument_node="">In my opinion Alibaba Trade Assurance is still an amazing service and a great extra layer of protection. Even if you never have to actually make a claim, the whole idea of creating a contract that details all of the order expectations between you and your supplier will result in higher product quality and significantly less issues.</span></p><span data-dcnode-id="5708" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5706"><span data-dcnode-id="5707" instrument_node="">That’s all for today!</span></p><span data-dcnode-id="5705" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5703"><span data-dcnode-id="5704" instrument_node="">I’ll see you on Friday for this week’s Reader’s Question post.</span></p><span data-dcnode-id="5702" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="5696"><strong data-dcnode-id="5700"><span data-dcnode-id="5701" instrument_node="">All the best,</span></strong><br data-dcnode-id="5699"><strong data-dcnode-id="5697"><span data-dcnode-id="5698" instrument_node="">Andrew</span></strong></p><span reply" data-dcnode-id="5246"><a aria-label="Reply to Mike Hughes" class="comment-reply-link" data-belowelement="div-comment-11249" data-commentid="11249" data-dcnode-id="5248" data-postid="5804" data-replyto="Reply to Mike Hughes" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//andrewminalto.com/trade-assurance/%3Freplytocom%3D11249%23respond" rel="nofollow"><svg aria-hidden="true" class="icon icon-mail-reply" data-dcnode-id="5250" role="img"></svg><span data-dcnode-id="5253" instrument_node=""> </span><use data-dcnode-id="5252" href="#icon-mail-reply" xlink:href="#icon-mail-reply"></use><span data-dcnode-id="5251" instrument_node=""> </span><span data-dcnode-id="5249" instrument_node="">Reply</span></a><span data-dcnode-id="5247" instrument_node=""> </span></div><span data-dcnode-id="5245" instrument_node=""> </span></div><span data-dcnode-id="5243" instrument_node=""> </span><div class="comment-text__conteiner" data-dcnode-id="5226"><span data-dcnode-id="5242" instrument_node=""> </span><p data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">Hi Andrew, thanks for all this useful information on online selling, trading with Chinese suppliers etc, it really is useful for us who are new to all of this type of thing. Can I ask you a question regarding product liability insurance. Do you put this in place for your business and if so, do you have brokers / insurers you would recommend using? I’ve approached a few now and so many seem to get very nervous when you say you are sourcing from China, which frankly is ridiculous when you think that most of the worlds products are manufactured there. Also, quite a few insurers are also keen for you to have rights of recourse in place with the Chinese supplier. What are your thoughts on this / have you managed to get any such clauses included in your supplier contracts? To be honest, I would imagine that even if you did manage to put something into a contract with a Chinese supplier, enforcing it in a Chinese court under China’s regulatory system (if there was ever a problem) and your insurers chances of winning the case would be very slim if not nil. I’d appreciate your thoughts on this area and any advice you have from your own experience.</span></p><span data-dcnode-id="5239" instrument_node=""> </span><div class="jetpack-comment-likes-widget-wrapper jetpack-likes-widget-unloaded" data-dcnode-id="5228" data-name="like-comment-frame-188163336-11249-6251c97c3d85b" data-src="https://widgets.wp.com/likes/#blog_id=188163336&amp;comment_id=11249&amp;origin=andrewminalto.com&amp;obj_id=188163336-11249-6251c97c3d85b" id="like-comment-wrapper-188163336-11249-6251c97c3d85b"><span data-dcnode-id="5238" instrument_node=""> </span><div class="likes-widget-placeholder comment-likes-widget-placeholder comment-likes" data-dcnode-id="5235"><span class="loading" data-dcnode-id="5236"><span data-dcnode-id="5237" instrument_node="">Loading...</span></span></div><span data-dcnode-id="5234" instrument_node=""> </span><div class="comment-likes-widget jetpack-likes-widget comment-likes" data-dcnode-id="5230"><span class="comment-like-feedback" data-dcnode-id="5233"></span><span class="sd-text-color" data-dcnode-id="5232"></span><a class="sd-link-color" data-dcnode-id="5231"></a></div><span data-dcnode-id="5229" instrument_node=""> </span></div><span data-dcnode-id="5227" instrument_node=""> </span></div><span data-dcnode-id="5225" instrument_node=""> </span></div><ol class="children" data-dcnode-id="5155"><span data-dcnode-id="5223" instrument_node=""> </span><li class="comment odd alt depth-2" data-dcnode-id="5157" id="comment-11250"><span data-dcnode-id="5222" instrument_node=""> </span><div class="comment-body" data-dcnode-id="5158" id="div-comment-11250"><span data-dcnode-id="5221" instrument_node=""> </span><div class="comment-author__container" data-dcnode-id="5190"><span data-dcnode-id="5220" instrument_node=""> </span><div class=" </div><span data-dcnode-id="3270" instrument_node=""> </span></div><span data-dcnode-id="3268" instrument_node=""> </span><div class="reply" data-dcnode-id="3260"><a aria-label="Reply to Mohammed" class="comment-reply-link" data-belowelement="div-comment-11216" data-commentid="11216" data-dcnode-id="3262" data-postid="5804" data-replyto="Reply to Mohammed" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//andrewminalto.com/trade-assurance/%3Freplytocom%3D11216%23respond" rel="nofollow"><svg aria-hidden="true" class="icon icon-mail-reply" data-dcnode-id="3264" role="img"></svg><span data-dcnode-id="3267" instrument_node=""> </span><use data-dcnode-id="3266" href="#icon-mail-reply" xlink:href="#icon-mail-reply"></use><span data-dcnode-id="3265" instrument_node=""> </span><span data-dcnode-id="3263" instrument_node="">Reply</span></a><span data-dcnode-id="3261" instrument_node=""> </span></div><span data-dcnode-id="3259" instrument_node=""> </span></div><span data-dcnode-id="3257" instrument_node=""> </span><div class="comment-text__conteiner" data-dcnode-id="3199"><span data-dcnode-id="3256" instrument_node=""> </span><p data-dcnode-id="3252"><span data-dcnode-id="3255" instrument_node="">Hey Andrew,</span><br data-dcnode-id="3254"><span data-dcnode-id="3253" instrument_node=""> You are just doing an amazing job, but can you please help me out with this. This is supplier who mailed me and i am interested in his products. Now AliPay is a safe way to make a payment and this is what the seller said me :</span></p><span data-dcnode-id="3251" instrument_node=""> </span><p data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">“Hello,</span></p><span data-dcnode-id="3248" instrument_node=""> </span><p data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">Regarding payment, I prefer Alibaba Payment (Alipay). We need a safe way to conduct this transaction. Alibaba offers purchase protection plans for these situations. They will decide how you pay me so you can be insured for the entire value of this purchase. In case you don’t get what you are paying for, you get a full refund from Alibaba.</span></p><span data-dcnode-id="3245" instrument_node=""> </span><p data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Alibaba (Alipay) Payment provides an escrow payment service that reduces transaction risk for online consumers. Shoppers have the ability to verify whether they are happy with goods they have purchased before releasing funds to the seller.</span></p><span data-dcnode-id="3242" instrument_node=""> </span><p data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">I will contact Alibaba and they will get back to us when the needed verification are done and you got the purchase protection. You will be able to verify the validity of your purchase protection after you have qualified for it. They will give us a transaction number. Should a refund be needed (I doubt that), you email them the payment proof and the transaction number in order to get your money back.</span></p><span data-dcnode-id="3239" instrument_node=""> </span><p data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">Here is how the process works through the Alibaba Protection Program:</span></p><span data-dcnode-id="3236" instrument_node=""> </span><p data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">&gt; Buyer and seller agree to use/transact payment through Alibaba (Alipay) Payment. </span></p><span data-dcnode-id="3233" instrument_node=""> </span><p data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">&gt; Buyer sends payment to Alibaba (Alipay) Payment rather than directly to the seller. </span></p><span data-dcnode-id="3230" instrument_node=""> </span><p data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">&gt; Alibaba (Alipay) Payment tracks the shipment of the items. </span></p><span data-dcnode-id="3227" instrument_node=""> </span><p data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">&gt; As soon as buyer confirms receipt of the item’s, Alibaba will send payment to the seller in order to complete the transaction.</span></p><span data-dcnode-id="3224" instrument_node=""> </span><p data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">NOTE: If you are not satisfied with your order, you can make a Refund Request. Alibaba will send the full amount back.</span></p><span data-dcnode-id="3221" instrument_node=""> </span><p data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">I wait for your decision</span></p><span data-dcnode-id="3218" instrument_node=""> </span><p data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">Thank you”</span></p><span data-dcnode-id="3215" instrument_node=""> </span><p data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">Is this a scam or is it legit, Is what he telling true?</span></p><span data-dcnode-id="3212" instrument_node=""> </span><div class="jetpack-comment-likes-widget-wrapper jetpack-likes-widget-unloaded" data-dcnode-id="3201" data-name="like-comment-frame-188163336-11216-6251c97c49e0d" data-src="https://widgets.wp.com/likes/#blog_id=188163336&amp;comment_id=11216&amp;origin=andrewminalto.com&amp;obj_id=188163336-11216-6251c97c49e0d" id="like-comment-wrapper-188163336-11216-6251c97c49e0d"><span data-dcnode-id="3211" instrument_node=""> </span><div class="likes-widget-placeholder comment-likes-widget-placeholder comment-likes" data-dcnode-id="3208"><span class="loading" data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">Loading...</span></span></div><span data-dcnode-id="3207" instrument_node=""> </span><div class="comment-likes-widget jetpack-likes-widget comment-likes" data-dcnode-id="3203"><span class="comment-like-feedback" data-dcnode-id="3206"></span><span class="sd-text-color" data-dcnode-id="3205"></span><a clas tnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//andrewminalto.com/trade-assurance/%3Freplytocom%3D11202%23respond" rel="nofollow"><svg aria-hidden="true" class="icon icon-mail-reply" data-dcnode-id="2360" role="img"></svg><span data-dcnode-id="2363" instrument_node=""> </span><use data-dcnode-id="2362" href="#icon-mail-reply" xlink:href="#icon-mail-reply"></use><span data-dcnode-id="2361" instrument_node=""> </span><span data-dcnode-id="2359" instrument_node="">Reply</span></a><span data-dcnode-id="2357" instrument_node=""> </span></div><span data-dcnode-id="2355" instrument_node=""> </span></div><span data-dcnode-id="2353" instrument_node=""> </span><div class="comment-text__conteiner" data-dcnode-id="2304"><span data-dcnode-id="2352" instrument_node=""> </span><p data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Hi Andrew,</span></p><span data-dcnode-id="2349" instrument_node=""> </span><p data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Thanks for having this blog!</span></p><span data-dcnode-id="2346" instrument_node=""> </span><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">My supplier just slapped a 3% Alibaba handling fee on my invoice. When I called Alibaba, I was told that sellers have to pay 3% for Trade Assurance and I guess it just got downloaded to me. Have you heard of this 3% TA fee before? </span></p><span data-dcnode-id="2343" instrument_node=""> </span><p data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">I also have concerns about the 2.8% processing fee that Alibaba claims on its website and by its employees that it all goes to the bank and therefore no invoice or document:</span></p><span data-dcnode-id="2340" instrument_node=""> </span><p data-dcnode-id="2335"><a data-dcnode-id="2338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//service.alibaba.com/buyer/faq_detail/20111762.htm" rel="nofollow ugc"><span data-dcnode-id="2339" instrument_node="">https://service.alibaba.com/buyer/faq_detail/20111762.htm</span></a><br data-dcnode-id="2337"><span data-dcnode-id="2336" instrument_node=""> “2. Since the transaction fees are charged by the bank, there is no document or invoice for the fees.”</span></p><span data-dcnode-id="2334" instrument_node=""> </span><p data-dcnode-id="2330"><span data-dcnode-id="2333" instrument_node="">Do you know the veracity of this statement? Is there overhead built-in to this fee?</span><br data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node=""> My VISA card company confirmed that it was not the one charging the 2.8%. My VISA card company charges its own fees plus currency exchange on top of the 2.8%. </span></p><span data-dcnode-id="2329" instrument_node=""> </span><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Is this 2.8% a merchant-side fee plus some Alibaba fees that’s being offset to the buyers? Since Alibaba’s website is the platform that calculates and charges it, should it be possible for Alibaba to issue an invoice or a receipt? </span></p><span data-dcnode-id="2326" instrument_node=""> </span><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Currently, all one has is the contract with the actual agreed upon cost and a VISA statement that shows a sum with 2.8% built-in plus all the other fees. The difference between the two amounts is nowhere accounted for in writing.</span></p><span data-dcnode-id="2323" instrument_node=""> </span><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">What are your thoughts on this lack of documentation for this hefty fee?</span></p><span data-dcnode-id="2320" instrument_node=""> </span><p data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">I look forward to hearing your reply.</span></p><span data-dcnode-id="2317" instrument_node=""> </span><div class="jetpack-comment-likes-widget-wrapper jetpack-likes-widget-unloaded" data-dcnode-id="2306" data-name="like-comment-frame-188163336-11202-6251c97c4f2dd" data-src="https://widgets.wp.com/likes/#blog_id=188163336&amp;comment_id=11202&amp;origin=andrewminalto.com&amp;obj_id=188163336-11202-6251c97c4f2dd" id="like-comment-wrapper-188163336-11202-6251c97c4f2dd"><span data-dcnode-id="2316" instrument_node=""> </span><div class="likes-widget-placeholder comment-likes-widget-placeholder comment-likes" data-dcnode-id="2313"><span class="loading" data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Loading...</span></span></div><span data-dcnode-id="2312" instrument_node=""> </span><div class="comment-likes-widget jetpack-likes-widget comment-likes" data-dcnode-id="2308"><span class="comment-like-feedback" data-dcnode-id="2311"></span><span class="sd-text-color" data-dcnode-id="2310"></span><a class="sd-link-color" data-dcnode-id="2309"></a></div><span data-dcnode-id="2307" instrument_node=""> </span></div><span data-dcnode-id="2305" instrument_node=""> </span></div><span data-dcnode-id="2303" instrument_node=""> </span></div><ol class="children" data-dcnode-id="2234"><span data-dcnode-id="2301" instrument_node=""> </span><li class="comment even depth-2" data-dcnode-id="2236" id="comment-11203"><span data-dcnode-id="2300" instrument_node=""> </span><div class="comment-body" data-dcnode-id="2237" id="div-comment-11203"><span data-dcnode-id="2299" instrument_node=""> </span><div class="comment-author__container" data-dcnode-id="2268"><span data-dcnode-id="2298" instrument_node=""> </span><div class="comment-author vcard" data-dcnode-id="2279"><span data-dcnode-id="2297" instrument_node=""> </span><div class="left_container" data-dcnode-id="2293"><span data-dcnode-id="2296" instrument_node=""> </span><img alt="" class="avatar avatar-100 photo nitro-lazy" data-dcnode-id="2295" height="100" id="MTkwNDozMDU=-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-cmkpn.nitrocdn.com/MfFBDSVpuVFMKffuKkdRAJpKZOnQGWkK/assets/desktop/optimized/rev-2355d2a/avatar/b8118898809fe5088099416946a03c99.81ce8235f1ad7b14d083197d483ba77e" nitro-lazy-srcset="https://cdn-cmkpn.nitrocdn.com/MfFBDSVpuVFMKffuKkdRAJpKZOnQGWkK/assets/desktop/optimized/rev-2355d2a/avatar/96354d18bbaa6a841cd93fa2b0734f39.81ce8235f1ad7b14d083197d483ba77e 2x" src="data:image/svg+xml;nitro-empty-id=MTkwNDozMDU=-1;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMTAwIDEwMCIgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PC9zdmc+" width="100"><span data-dcnode-id="2294" instrument_node=""> </span></div><span data-dcnode-id="2292" instrument_node=""> </span><div class="right_container" data-dcnode-id="2281"><span data-dcnode-id="2291" instrument_node=""> </span><cite class="fn" data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">Andrew Minalto</span></cite><span data-dcnode-id="2288" instrument_node=""> </span><div class="comment-meta commentmetadata" data-dcnode-id="2283"><span data-dcnode-id="2287" instrument_node=""> </span><a data-dcnode-id="2285" href="#comment-11203"><span data-dcnode-id="2286" instrument_node="">4 years ago </span></a><span data-dcnode-id="2284" instrument_node=""> </span></div><span data-dcnode-id="2282" instrument_node=""> </span></div><span data-dcnode-id="2280" instrument_node=""> </span></div><span data-dcnode-id="2278" instrument_node=""> </span><div class="reply" data-dcnode-id="2270"><a aria-label="Reply to Andrew Minalto" class="comment-reply-link" data-belowelement="div-comment-11203" data-commentid="11203" data-dcnode-id="2272" data-postid="5804" data-replyto="Reply to Andrew Minalto" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//andrewminalto.com/trade-assurance/%3Freplytocom%3D11203%23respond" rel="nofollow"><svg aria-hidden="true" class="icon icon-mail-reply" data-dcnode-id="2274" role="img"></svg><span data-dcnode-id="2277" instrument_node=""> </span><use data-dcnode-id="2276" href="#icon-mail-reply" xlink:href="#icon-mail-reply"></use><span data-dcnode-id="2275" instrument_node=""> </span><span data-dcnode-id="2273" instrument_node="">Reply</span></a><span data-dcnode-id="2271" instrument_node=""> </span></div><span data-dcnode-id="2269" instrument_node=""> </span></div><span data-dcnode-id="2267" instrument_node=""> </span><div class="comment-text__conteiner" data-dcnode-id="2239"><span data-dcnode-id="2266" instrument_node=""> </span><p data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">You’re mixing/making up two fees here.</span></p><span data-dcnode-id="2263" instrument_node=""> </span><p data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Those 3% supplier wants to charge – this is the fee (well, 2.8% to be exact) that SUPPLIER won’t receive from money you send, if you pay with a card on Trade Assurance.</span></p><span data-dcnode-id="2260" instrument_node=""> </span><p data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">There are no extra or hidden fees. Some suppliers will accept that 3% loss but many will just put it on the invoice, like in your case. But the money that shows in invoice is the money you’ll pay – there are no extra fees that pop up when you make the payment.</span></p><span data-dcnode-id="2257" instrument_node=""> </span><p data-dcnode-id="2253"><span data-dcnode-id="2256" instrument_node="">Thanks,</span><br data-dcnode-id="2255"><span data-dcnode-id="2254" instrument_node=""> Andrew</span></p><span data-dcnode-id="2252" instrument_node=""> </span><div class="jetpack-comment-likes-widget-wrapper jetpack-likes-widget-unloaded" data-dcnode-id="2241" data-name="like-comment-frame-188163336-11203-6251c97c4f93e" data-src="https://widgets.wp.com/likes/#blog_id=188163336&amp;comment_id=11203&amp;origin=andrewminalto.com&amp;obj_id=188163336-11203-6251c97c4f93e" id="like-comment-wrapper-188163336-11203-6251c97c4f93e"><span data-dcnode-id="2251" instrument_node=""> </span><div class="likes-widget-placeholder comment 0" instrument_node="">5 years ago </span></a><span data-dcnode-id="1538" instrument_node=""> </span></div><span data-dcnode-id="1536" instrument_node=""> </span></div><span data-dcnode-id="1534" instrument_node=""> </span></div><span data-dcnode-id="1532" instrument_node=""> </span><div class="reply" data-dcnode-id="1524"><a aria-label="Reply to Amy B" class="comment-reply-link" data-belowelement="div-comment-11188" data-commentid="11188" data-dcnode-id="1526" data-postid="5804" data-replyto="Reply to Amy B" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//andrewminalto.com/trade-assurance/%3Freplytocom%3D11188%23respond" rel="nofollow"><svg aria-hidden="true" class="icon icon-mail-reply" data-dcnode-id="1528" role="img"></svg><span data-dcnode-id="1531" instrument_node=""> </span><use data-dcnode-id="1530" href="#icon-mail-reply" xlink:href="#icon-mail-reply"></use><span data-dcnode-id="1529" instrument_node=""> </span><span data-dcnode-id="1527" instrument_node="">Reply</span></a><span data-dcnode-id="1525" instrument_node=""> </span></div><span data-dcnode-id="1523" instrument_node=""> </span></div><span data-dcnode-id="1521" instrument_node=""> </span><div class="comment-text__conteiner" data-dcnode-id="1475"><span data-dcnode-id="1520" instrument_node=""> </span><p data-dcnode-id="1516"><span data-dcnode-id="1519" instrument_node="">Hi Andrew,</span><br data-dcnode-id="1518"><span data-dcnode-id="1517" instrument_node=""> I wanted to share my experience with Alibaba Trade Assurance with your readers. I have been an Alibaba free member for 6 years and have worked very hard to try to bring my product to market. I have had several successful transactions. </span></p><span data-dcnode-id="1515" instrument_node=""> </span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">However, I paid a manufacturer/supplier last September (2016) and used Trade Assurance for the preshipment coverage. This supplier has delayed, asked for additional money on several occasions, refused to comply with our contract terms and failed 2 inspections.</span></p><span data-dcnode-id="1512" instrument_node=""> </span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">I originally filed a dispute in April (2017) and even agreed to continue the contract, provided the supplier would fulfill my order. I have received NO help what so ever from Alibaba Trade Assurance. I have even agreed to pay to hire one of the three inspectors they use to determine quality.</span></p><span data-dcnode-id="1509" instrument_node=""> </span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">At each turn, Trade Assurance deflects looks for ridiculous reasons (stated because I responded to the suppliers inquiry/ message I had resolved all issues- I acknowledged I recieved a spring I even paid to ship to the US after the one the supplier sent on my prototyoe rusted.) I have spent hours screen shotting and attaching Whatsapp, emails, inspection and photographic evidence to support my claim for the quality, supplier delays, and price increases. </span></p><span data-dcnode-id="1506" instrument_node=""> </span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">I have complained to their help chat, and told “how sorry they were and how they will refer my order issues to a “higher team.” I finally felt like after months of the same refusal to help me that they would finally help, only to receive another email from same person stating that I would need to hire a quality inspection. I had already agreed to this in May 2017, they stated in a previous email that since I agreed they would help. Then the same person told me to begin again. </span></p><span data-dcnode-id="1503" instrument_node=""> </span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">This process has been beyond frustrating and I am still out the $6000 USD that was supposed to be guaranteed against “quality issues, shipping delays and price increases. </span></p><span data-dcnode-id="1500" instrument_node=""> </span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">I had believed they ( Alibaba Trade Assurance ) would issue a refund or the very least hold the manufacturer accountable to finish the order. Nothing has been done to protect me as a buyer. </span></p><span data-dcnode-id="1497" instrument_node=""> </span><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">I have thought about trying to hire a Chinese lawyer to help, do you think it would help? Or do you have any suggestions on how to proceed? </span></p><span data-dcnode-id="1494" instrument_node=""> </span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Thanks,</span></p><span data-dcnode-id="1491" instrument_node=""> </span><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Amy</span></p><span data-dcnode-id="1488" instrument_node=""> </span><div class="jetpack-comment-likes-widget-wrapper jetpack-likes-widget-unloaded" data-dcnode-id="1477" data-name="like-comment-frame-188163336-11188-6251c97c54137" data-src="https://widgets.wp.com/likes/#blog_id=188163336&amp;comment_id=11188&amp;origin=andrewminalto.com&amp;obj_id=188163336-11188-6251c97c54137" id="like-comment-wrapper-188163336-11188-6251c97c54137"><span data-dcnode-id="1487" instrument_node=""> </span><div class="likes-widget-placeholder comment-likes-widget-placeholder comment-likes" data-dcnode-id="1484"><span class="loading" data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Loading...</span></span></div><span data-dcnode-id="1483" instrument_node=""> </span><div class="comment-likes-widget jetpack-likes-widget comment-likes" data-dcnode-id="1479"><span class="comment-like-feedback" data-dcnode-id="1482"></span><span class="sd-text-color" data-dcnode-id="1481"></span><a class="sd-link-color" da pan data-dcnode-id="1430" instrument_node="">They cannot seem to fathom evidence provided and in my case, Alibaba Trade Assurance commanded me to return the purchased product without a 3rd party inspection. When I insisted on a 3rd party inspection Alibaba responded they cannot help me if I insist on it.</span></p><span data-dcnode-id="1428" instrument_node=""> </span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Today, 8 months later, I have returned the product upon Alibaba’s instruction, the seller is claiming that it is not in the same condition, and Alibaba refuses to have my money refunded.</span></p><span data-dcnode-id="1425" instrument_node=""> </span><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">In essence, Trade Assurance is a Sham! I DO NOT RECOMMEND ANYONE TO USE TRADE ASSURANCE, AS THERE IS ZERO ASSURANCE HERE.</span></p><span data-dcnode-id="1422" instrument_node=""> </span><div class="jetpack-comment-likes-widget-wrapper jetpack-likes-widget-unloaded" data-dcnode-id="1411" data-name="like-comment-frame-188163336-11190-6251c97c54796" data-src="https://widgets.wp.com/likes/#blog_id=188163336&amp;comment_id=11190&amp;origin=andrewminalto.com&amp;obj_id=188163336-11190-6251c97c54796" id="like-comment-wrapper-188163336-11190-6251c97c54796"><span data-dcnode-id="1421" instrument_node=""> </span><div class="likes-widget-placeholder comment-likes-widget-placeholder comment-likes" data-dcnode-id="1418"><span class="loading" data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Loading...</span></span></div><span data-dcnode-id="1417" instrument_node=""> </span><div class="comment-likes-widget jetpack-likes-widget comment-likes" data-dcnode-id="1413"><span class="comment-like-feedback" data-dcnode-id="1416"></span><span class="sd-text-color" data-dcnode-id="1415"></span><a class="sd-link-color" data-dcnode-id="1414"></a></div><span data-dcnode-id="1412" instrument_node=""> </span></div><span da
