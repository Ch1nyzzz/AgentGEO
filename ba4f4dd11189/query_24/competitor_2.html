go" data-dcnode-id="1529"><svg class="SVGIcon__StyledIconComponent-sc-1kyax6f-0 ipxzFI ConversationInteractions__InteractionIcon-sc-1k8sxej-6 hexmKN" data-dcnode-id="1532" height="1em" stroke="#4D4D4D" stroke-width="0" viewBox="0 0 16 12" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M10.5 4v.5h.5V4h-.5zm0 3h.5v-.5h-.5V7zm.85 2.67L11 9.314l.35.358zm3.8-4.41l.358-.35-.357.35zm-.008.707l.35.358-.35-.358zm-3.784-4.59l-.358.35.358-.35zm-.358.35l3.793 3.882.715-.698-3.793-3.883-.715.7zm3.793 3.882L11 9.313l.699.715 3.793-3.703-.7-.716zM11 4V1.727h-1V4h1zm0 5.313V7h-1v2.313h1zM10.5 3.5c-1.835 0-3.952.553-5.761 1.627C2.927 6.202 1.384 7.823.775 9.978l.963.272c.52-1.845 1.855-3.28 3.51-4.263C6.908 5.004 8.849 4.5 10.5 4.5v-1zm-7.995 7.326C4.516 8.737 7.855 7.5 10.5 7.5v-1c-2.889 0-6.497 1.328-8.715 3.633l.72.693zM11 9.313h-1c0 .885 1.065 1.334 1.699.715L11 9.313zm3.793-3.704l.699.716a1 1 0 00.016-1.414l-.715.698zM.775 9.98a.905.905 0 00.076.7.94.94 0 00.482.408c.366.143.841.082 1.172-.26l-.72-.694a.083.083 0 01-.046.025.085.085 0 01-.044-.003c-.008-.003.01.001.026.031a.127.127 0 01.016.048c.002.015-.001.022 0 .016l-.962-.272zm10.94-8.95C11.09.386 10 .83 10 1.726h1l.715-.699z" data-dcnode-id="1533" fill="#4D4D4D"></path></svg><div class="TypographyRebrand__Component-sc-18c6d9c-0 jzvAlu" data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Share</span></div></div></div></div></div><div class="ArticleDetails__MediaWrapper-sc-1a6fe9l-11 jKkHZn" data-dcnode-id="1520"><picture data-dcnode-id="1521"><source data-dcnode-id="1525" media="(max-width: 600px)" srcset="https://media.jobcase.com/images/97746746-3923-4761-b75c-9928853865fd/w400_h200.webp" type="image/webp"><source data-dcnode-id="1524" media="(max-width: 600px)" srcset="https://media.jobcase.com/images/97746746-3923-4761-b75c-9928853865fd/w400_h200"><source data-dcnode-id="1523" srcset="https://media.jobcase.com/images/97746746-3923-4761-b75c-9928853865fd/large.webp" type="image/webp"><img alt="How to avoid job scams" class="ArticleDetails__BannerImage-sc-1a6fe9l-12 clwajk" data-dcnode-id="1522" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.jobcase.com/images/97746746-3923-4761-b75c-9928853865fd/large&amp;raw"></picture></div><div class="ArticleBody__StyledMarkdown-lej8bf-3 iodfId" data-dcnode-id="1438"><div class="ArticleBody__Toc-lej8bf-0 xyxpZ" data-dcnode-id="1496"><div class="ArticleBody__TocHeading-lej8bf-1 hVsBaj" data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Jump to section</span></div><ul class="ArticleBody__TocList-lej8bf-2 lfvYRk" data-dcnode-id="1497"><li data-dcnode-id="1514"><a data-dcnode-id="1515" href="#the-mystery-shopper-scam"><span data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">The Mystery Shopper Scam</span></span></a></li><li data-dcnode-id="1510"><a data-dcnode-id="1511" href="#the-job-posting-and-check-cashing-scam"><span data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">The Job Posting and Check Cashing Scam</span></span></a></li><li data-dcnode-id="1506"><a data-dcnode-id="1507" href="#the-envelope-stuffing-scam"><span data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">The Envelope Stuffing Scam</span></span></a></li><li data-dcnode-id="1502"><a data-dcnode-id="1503" href="#the-pyramid-scheme-scam-multi-level-marketing-companies"><span data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">The Pyramid Scheme Scam / Multi-Level Marketing Companies</span></span></a></li><li data-dcnode-id="1498"><a data-dcnode-id="1499" href="#phishing-schemes"><span data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Phishing Schemes </span></span></a></li></ul></div><p data-dcnode-id="1488"><span data-dcnode-id="1495" instrument_node="">It’s no secret that </span><a data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jobcase.com/ru/unemployment-benefits-overview" target="_blank"><span data-dcnode-id="1494" instrument_node="">unemployment</span></a><span data-dcnode-id="1492" instrument_node=""> is at an all time high. Unfortunately, there’s also an uptick in fake job and hiring scams. These “too good to be true” opportunities trick job seekers into paying money or giving out their personal information by offering ways to land an assortment of jobs that are being advertised as: well-paying, work from home and other benefits with little to no effort for the worker. Since COVID-19 hit in December 2019, the </span><a data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbb.org/" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1491" instrument_node="">Better Business  Bureau</span></a><span data-dcnode-id="1489" instrument_node=""> has reported more than 24,000 job listing scams in the US alone. </span></p><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">It’s difficult to find a job in this climate — and the last thing you want to do is get caught up in a job scam. It’s important to protect yourself by learning how to spot fake job offers. Below are a few of the more popular scams you should be wary of when job searching:</span></p><h3 data-dcnode-id="1484" id="the-mystery-shopper-scam"><span data-dcnode-id="1485" instrument_node="">The Mystery Shopper Scam</span></h3><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">What better way to earn money? And it sounds legitimate — you make a purchase at a store or eat at a restaurant and then leave a review. The store or restaurant gets feedback from you and then you get a small payment for your time. Not so fast! Scammers will ask you to pay a fee to join the shopping program, a director of the companies to review, or to get the job in the first place. But there’s never a need to pay any amount of money to get into the mystery shopper business — legitimate mystery shopping companies do not charge application fees.</span></p><h3 data-dcnode-id="1480" id="the-job-posting-and-check-cashing-scam"><span data-dcnode-id="1481" instrument_node="">The Job Posting and Check Cashing Scam</span></h3><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">This scam involves what looks like legitimate postings appearing on reputable job search websites. However, after you submit an application/resume, you’re then asked to send a check or a money order to continue the application process. This is probably the biggest red flag when it comes to job search scams: when a company asks you for money. Don’t send money — ever. You should never have to pay to get a job. A true, legitimate employer won’t request your bank account, credit card, or even your Paypal account. Always be safe and only provide your personal banking information after you’re hired by a legitimate company (e.g., if you choose to have your paycheck direct deposited.)</span></p><h3 data-dcnode-id="1476" id="the-envelope-stuffing-scam"><span data-dcnode-id="1477" instrument_node="">The Envelope Stuffing Scam</span></h3><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Before any work begins with this scam, you’re  asked to pay a “registration fee.” Once the fee is paid, you’re asked to post an ad — often the same ad that you answered — using your own contact information. Once a response comes in, you stuff an envelope with information on how to get started in the new “job” and mail it to the applicant. How do you get paid? By how many responses you receive to the ad (if you get any at all).</span></p><h3 data-dcnode-id="1472" id="the-pyramid-scheme-scam-multi-level-marketing-companies"><span data-dcnode-id="1473" instrument_node="">The Pyramid Scheme Scam / Multi-Level Marketing Companies</span></h3><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">A pyramid scheme is a job scam that’s usually framed as a “business opportunity” that requires you to pay money up front and then it’s up to you to recruit others to join along with you. The idea is that the more people you recruit to join, the more money you can earn. (Though the payout is rarely ever seen or achieved). </span></p><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Along the lines of the pyramid scheme is the multi-level marketing company. Multi-level marketing companies — also referred to as MLMs or direct-selling companies — sell products through person-to-person sales without a physical storefront. People who join MLMs make money from selling the products, which makes most MLMs legal (unlike pyramid schemes, where distributors are only compensated for recruiting people to join). However, there are times when a multi-level marketing company is legitimate. Popular MLMs include Tupperware, Mary Kay, Herbalife, Avon, and Amway. (Interesting fact: Amway is often considered a pyramid scheme, but the FTC decided in 1979 that the company was legit since it sold actual home, health, and beauty products.)</span></p><h3 data-dcnode-id="1466" id="phishing-schemes"><span data-dcnode-id="1467" instrument_node="">Phishing Schemes</span></h3><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">These aren’t technically job scams, but they’re tactics that scammers sometimes use when promoting fraudulent job offers, usually through emails. These scans are cleverly hidden attempts to get your personal account information. The emails you receive appear legitimate, complete with professional-looking company logos and details. If you receive one of these emails do not click on any links. Instead, check the destination URLs to try and verify that the links are legitimate or may lead you to a false website. (Hover your mouse over the link — the destination URL should appear at the bottom left-hand corner of your screen.) </span></p><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">OK, so how do you avoid job scams like these? We’ve compiled some tips to help you keep a watchful eye out when you’re job searching:</span></p><ul data-dcnode-id="1446"><li data-dcnode-id="1459"><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Always evaluate contact information in job ads or emails — watch out for spelling errors and make sure the email address attached to the ad features the company’s name (if not, it’s probably a scam)  </span></p></li><li data-dcnode-id="1456"><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">As we described in the phishing scheme section above, don’t ever click on links in an email if you’re suspicious they may be fraudulent. Instead, copy and paste website addresses (URLs) into your browser. By doing this you can immediately tell if the website destination is legitimate. </span></p></li><li data-dcnode-id="1453"><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Avoid job listings that use these descriptions: “package forwarding,” “reshipping,” “money transfers,” and “wiring funds.” These and similar phrases should raise a red flag.</span></p></li><li data-dcnode-id="1450"><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Do not be fooled by official-sounding company names. Scam artists can easily create and operate under names that sound like reputable organizations.</span></p></li><li data-dcnode-id="1447"><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Never forward or transfer money from your personal accounts on behalf of an employer. Also, you should not trust a company that asks you to “wire” money to them. (If a legitimate job requires you to make money transfers, the money should be withdrawn from the employer’s business account and not yours.)</span></p></li></ul><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">And remember: If you ever have questions about the legitimacy of a job listing, contact the Better Business Bureau, your state or local consumer agency, or the Federal Trade Commission.</span></p><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">The bottom line? If it seems too good to be true, then it probably is — and always trust your gut. Unfortunately there are no shortcuts to getting a job (or wealth, for that matter). The reality is that no one is going to pay you a six-figure salary to stuff envelopes, post ads, or shop at your favorite store. So, first and foremost, always follow your instincts: if something doesn’t feel right, take the time to investigate the situation — or just simply avoid it and move on to the legitimate job offers.</span></p><p data-dcnode-id="1439"><strong data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Have you come across a job scam? How did you handle it? </span></strong></p></div><div class="ConversationInteractions__InteractionsWrapper-sc-1k8sxej-0 kZaPhu" data-dcnode-id="1403"><div class="ConversationInteractions__InteractionScoreBoard-sc-1k8sxej-2 hKteGs" data-dcnode-id="1423"><div class="ReactionIconStatusBar__ReactionIconStatusBarWrapper-sc-9rejn1-0 AGlpM" data-dcnode-id="1429"><div class="ReactionIconStatusBar__ReactionIconsBar-sc-9rejn1-1 kSDWNj" data-dcnode-id="1432"><div class="ReactionIconStatusBar__ReactionIconWrapper-sc-9rejn1-2 kyasyS" data-dcnode-id="1433"><svg data-dcnode-id="1434" fill="none" height="19" viewBox="0 0 16 16" width="19" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8.00012" data-dcnode-id="1437" fill="#1C99F7" r="7.41176" stroke="white" stroke-width="0.823529"></circle><path clip-rule="evenodd" d="M11.8265 7.8122C11.8119 7.80369 11.8026 7.7683 11.8083 7.74933C11.8612 7.56946 11.8633 7.38978 11.7975 7.2136C11.705 6.9661 11.535 6.77995 11.2287 6.73759C11.0841 6.71759 10.9336 6.72988 10.7858 6.7292C10.6801 6.7287 10.5743 6.72868 10.4658 6.72875C10.4657 6.7304 10.4657 6.73204 10.4656 6.73369C10.2767 6.73262 10.067 6.731
