</span><div class="breadcrumb-area" data-dcnode-id="943"><div class="entry-breadcrumb" data-dcnode-id="944"><span class="1 breadcrumb-first" data-dcnode-id="955" property="itemListElement" typeof="ListItem"><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.virtualvocations.com/blog/"><span aria-hidden="true" class="fa fa-home" data-dcnode-id="958"></span><span data-dcnode-id="957" instrument_node=""> Home</span></a></span><em class="delimiter" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node=""> - </span></em><span class="2 breadcrumb-first" data-dcnode-id="950" property="itemListElement" typeof="ListItem"><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.virtualvocations.com/blog/covid-19/"><span data-dcnode-id="952" instrument_node=""> COVID-19</span></a></span><em class="delimiter" data-dcnode-id="948"><span data-dcnode-id="949" instrument_node=""> - </span></em><span data-dcnode-id="945"><span class="current" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">How to Spot a Remote Work Scam &amp; What to Do If You’ve Fallen Victim to One</span></span></span></div></div><span data-dcnode-id="942" instrument_node=""> </span><h1 class="entry-title" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">How to Spot a Remote Work Scam &amp; What to Do If You’ve Fallen Victim to One</span></h1><span data-dcnode-id="939" instrument_node="">
</span><div class="entry-content" data-dcnode-id="707"><span data-dcnode-id="938" instrument_node="">

</span><div class="share-links" data-dcnode-id="914"><span data-dcnode-id="936" instrument_node="">
</span><a class="facebook-share-button large-share-button" data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%3A//www.virtualvocations.com/blog/covid-19/victim-remote-work-scam/" rel="external" target="_blank"><span class="fa fa-facebook" data-dcnode-id="935"></span><span data-dcnode-id="934" instrument_node=""> </span><span class="social-text" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Facebook</span></span></a><a class="twitter-share-button large-share-button" data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DHow%2Bto%2BSpot%2Ba%2BRemote%2BWork%2BScam%2B%2526%2BWhat%2Bto%2BDo%2BIf%2BYou%25E2%2580%2599ve%2BFallen%2BVictim%2Bto%2BOne%26url%3Dhttps%3A//www.virtualvocations.com/blog/covid-19/victim-remote-work-scam/" rel="external" target="_blank"><span class="fa fa-twitter" data-dcnode-id="930"></span><span data-dcnode-id="929" instrument_node=""> </span><span class="social-text" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Twitter</span></span></a><a class="linkedin-share-button" data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.linkedin.com/shareArticle%3Fmini%3Dtrue%26url%3Dhttps%3A//www.virtualvocations.com/blog/covid-19/victim-remote-work-scam/%26title%3DHow%2Bto%2BSpot%2Ba%2BRemote%2BWork%2BScam%2B%2526%2BWhat%2Bto%2BDo%2BIf%2BYou%25E2%2580%2599ve%2BFallen%2BVictim%2Bto%2BOne" rel="external" target="_blank"><span class="fa fa-linkedin" data-dcnode-id="925"></span><span data-dcnode-id="924" instrument_node=""> </span><span class="screen-reader-text" data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">LinkedIn</span></span></a><a class="reddit-share-button" data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//reddit.com/submit%3Furl%3Dhttps%3A//www.virtualvocations.com/blog/covid-19/victim-remote-work-scam/%26title%3DHow%2Bto%2BSpot%2Ba%2BRemote%2BWork%2BScam%2B%2526%2BWhat%2Bto%2BDo%2BIf%2BYou%25E2%2580%2599ve%2BFallen%2BVictim%2Bto%2BOne" rel="external" target="_blank"><span class="fa fa-reddit" data-dcnode-id="920"></span><span data-dcnode-id="919" instrument_node=""> </span><span class="screen-reader-text" data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Reddit</span></span></a><span data-dcnode-id="915" instrument_node=""> </span></div><span data-dcnode-id="913" instrument_node="">
</span></div><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="910" instrument_node="">According to a report from collaborative software provider Slack, </span><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slackhq.com/report-remote-work-during-coronavirus" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="909" instrument_node="">over 16 million workers</span></a><span data-dcnode-id="907" instrument_node=""> have gone remote since March 27, 2020. In the months following, that number may have nearly doubled. And while many remote workers are still with the same company, other people are still searching for work amid the COVID-19 pandemic. With 40 million unemployment claims and an unemployment rate of over 13%, the American job market is difficult to crack—especially for those looking to work remotely. Sadly, some unethical people and fraudulent companies have seized the opportunity to spout remote work scams. If you’re currently looking for work online, use these tips to help you spot COVID-19 remote work scams, as well as what to do if you fall victim to one.</span></p><span data-dcnode-id="905" instrument_node="">
</span><h2 data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">How Fraudulent Workers Are Scamming Job Boards and Applicants</span></h2><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="901" instrument_node="">Remote work scammers are a cunning bunch. Any time these unsavory individuals can find an avenue to make a few bucks or gain valuable personal information, they’ll jump at the opportunity. </span><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.virtualvocations.com/blog/telecommuting-job-search-help/remote-job-scams-12-strategies/"><span data-dcnode-id="900" instrument_node="">So how do they do it</span></a><span data-dcnode-id="898" instrument_node="">? Use these ideas to keep a keen eye out for remote work scams.</span></p><span data-dcnode-id="896" instrument_node="">
</span><h3 data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">The Devil Is in the Details (or Grammar)</span></h3><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Many scammers aren’t based in the United States, so their grasp of English grammar may be poor. Misspellings, syntax, and improper verb conjugation are all obvious signs of a remote work scam. In addition, many of these fake companies will overuse keywords, meaning that you’re likely to see “work-from-home” or “work-at-home” repeatedly throughout the job description. Scammers do this not only to entice aspiring remote workers, but also to bring their search results to the top of the search results pages.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="886"><strong data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Pro Tip:&nbsp;</span></strong><span data-dcnode-id="887" instrument_node="">If you see misspellings, grammatical errors, and “work-from-home” repeatedly, the listing may be a fraud.</span></p><span data-dcnode-id="885" instrument_node="">
</span><h3 data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Immediate Hires and Unlimited Earning Potential</span></h3><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Another telltale sign of a scam artist is the phrasing used in the job description. While some companies may need urgent hires, you should tread lightly if you’re unfamiliar with the company name. Plus, the phrase “unlimited earning potential” is a surefire indication that the job is probably a fraud. Few jobs have unlimited earning potential, especially ones that also claim to want to hire you without a proper interview or exchange.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="875"><strong data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Pro Tip:&nbsp;</span></strong><span data-dcnode-id="876" instrument_node="">Job postings that list phrases such as “immediate hires needed” or “unlimited earning potential” fall under the category of too good to be true. As the old adage goes, “if it’s too good to be true, it probably is.”</span></p><span data-dcnode-id="874" instrument_node="">
</span><h3 data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Strange Communication Methods or Emails</span></h3><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="870" instrument_node="">Scammers have </span><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.microsoft.com/security/blog/2010/08/06/how-do-spammers-get-my-email-address/%23%3A~%3Atext%3DSpammers%2520and%2520cybercriminals%2520use%2520sophisticated%2Cpair%2520them%2520with%2520common%2520domains." rel="noopener noreferrer" target="_blank"><span data-dcnode-id="869" instrument_node="">sophisticated methods to obtain your email address</span></a><span data-dcnode-id="867" instrument_node=""> and other sensitive information. While you shouldn’t give your email out willy-nilly, you also shouldn’t post your information to social media or other forums. When you do, hackers and spammers can plunder this information, then either use it themselves or sell it to others.</span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Once they have your email, you may receive some unsolicited job offers. Oftentimes, these emails feature the same over-the-top promises and poor grammar mentioned above. In many instances, these scammers will also use an email address that’s similar to a reputable company. They may also want to hold interviews via chat instead of via video to conceal their identity.</span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="856"><strong data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Pro Tip</span></strong><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">:&nbsp;</span></strong><span data-dcnode-id="857" instrument_node="">Don’t believe any unsolicited job emails that you receive. If you feel that one may be legitimate, check out the email and go to the website to determine if it’s real. Also, remember that no legitimate employer will interview you through a chat room or instant messaging as opposed to a video or phone interview.</span></p><span data-dcnode-id="855" instrument_node="">
</span><h3 data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Upfront Costs and Information or Free Work</span></h3><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Most people are wise enough not to give away bank account information or send money to a “company” or “hiring agent.” However, scammers have the art of deception down to a science. They may provide professional emails that seem 100% legitimate. In addition, they may want you to fill out fake “background checks” or “direct deposit information,” which end up providing them with sensitive information such as your address, birth date, and even your Social Security number.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="845"><strong data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Pro Tip:&nbsp;</span></strong><span data-dcnode-id="846" instrument_node="">Don’t ever pay a fee to apply for a job nor give away sensitive information before you find out if the job is legitimate. In the same vein, don’t give away work for free. Even some companies that aren’t total scams will ask you to complete work that they may or may not use, even if you don’t give approval. Some sites will make you take an assessment on their website for certain jobs. But even these aren’t common. Even if you’re desperate for remote work, don’t fall for remote work scams that can ruin your name, bank account, or reputation. Let your personality, skill set, and portfolio do the work for you.</span></p><span data-dcnode-id="844" instrument_node="">
</span><h2 data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">What You Should Do If You’re the Victim of a Remote Work Scam</span></h2><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Before discussing what to do if you’re a victim of a remote work scam, remember to always trust your gut instinct. If something feels off, your intuition is probably spot on. Unfortunately for some, the damage may already be done. In that case, you’re probably embarrassed and scared about identity theft or your financial well-being. While these circumstances are far less than ideal, you can take a few steps to ensure you minimize the after-effects and ensure that the same remote work scams don’t happen to your fellow aspiring telecommuters.</span></p><span data-dcnode-id="838" instrument_node="">
</span><h3 data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Alert the Job Site</span></h3><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="834" instrument_node="">As soon as you suspect a fraudulent job listing or a scammer, your first step is to alert the job board. Many job boards have a support email that will remove the listing after an investigation. If you happen to find a scam or questionable job listing on Virtual Vocations, send an email to </span><a data-dcnode-id="832" href="mailto:customerservice@virtualvocations.com"><span data-dcnode-id="833" instrument_node="">customerservice@virtualvocations.com</span></a><span data-dcnode-id="831" instrument_node=""> and explain the issue in as much detail as possible.</span></p><span data-dcnode-id="829" instrument_node="">
</span><h3 data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Report Fake or Phishing Websites to Authorities</span></h3><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">While you can’t report a fake or phishing website directly to Google or Bing, you can send reports to the FTC, the IC3, and the BBB (listed below). You may also want to file a report with regional fraud offices in your area. If a monetary transaction takes place, file a police report immediately. A slim chance may exist for you to recoup your money. At the very least, you’ve done everything in your power to reduce the chance for others to fall for similar scams.</span></p><span data-dcnode-id="823" instrument_node="">
</span><h3 data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Send a Report to the Federal Trade Commission</span></h3><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="819" instrument_node="">Tasked with protecting American consumers and jobseekers, the Federal Trade Commission, or FTC, has a process that allows you to </span><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ftccomplaintassistant.gov/"><span data-dcnode-id="818" instrument_node="">file a complaint</span></a><span data-dcnode-id="816" instrument_node="">. By filing a complaint, you can make sure that the company shows up on the radar of federal law enforcement agencies. Simply fill out the online form, and the FTC will file the complaint and investigate it. This may help you from falling victim to identity theft, as well as others.</span></p><span data-dcnode-id="814" instrument_node="">
</span><h3 data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">File a Report With the Internet Crime Complaint Center</span></h3><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="810" instrument_node="">In partnership with the FBI, the Internet Crime Complaint Center (IC3) allows concerned consumers to file a report. By </span><a data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ic3.gov/default.aspx"><span data-dcnode-id="809" instrument_node="">logging onto the IC3 website</span></a><span data-dcnode-id="807" instrument_node="">, you can file a complaint as a victim or as a third party. Either way, you’ll have to provide some information, including:</span></p><span data-dcnode-id="805" instrument_node="">
</span><ul data-dcnode-id="791"><span data-dcnode-id="804" instrument_node="">
</span><li data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Whether you gave money to the scammer</span></li><span data-dcnode-id="801" instrument_node="">
</span><li data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">The nature of your victimization/what was said or done</span></li><span data-dcnode-id="798" instrument_node="">
</span><li data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Your name and contact information</span></li><span data-dcnode-id="795" instrument_node="">
</span><li data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Any information on the scammer (email, wire transfer information, etc.)</span></li><span data-dcnode-id="792" instrument_node="">
</span></ul><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">After receiving this information, IC3 develops leads on scams and notifies local, state, federal, and international authorities about fraudulent or illegal activity.</span></p><span data-dcnode-id="787" instrument_node="">
</span><h3 data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Contact the Better Business Bureau</span></h3><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Most scam businesses don’t have an account with the Better Business Bureau (BBB). But if you’re a bit lucky, you can find the company name and any other complaints from the past. Much like filing a report with IC3 and the FTC, you’ll need some basic information on the incident. This may include where the business is located, the nature of the victimization, and any other information about the scam artist. Once filed, the BBB will give the company up to 30 days to respond based on two requests. The BBB offers no guarantees of finding out the guilty culprit or being able to assist. But you can give people yet another way to avoid the same scenario.</span></p><span data-dcnode-id="781" instrument_node="">
</span><h3 data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Post Warnings to Company Review Websites</span></h3><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Many job boards and company review websites allow you to post an anonymous review of a company. While some might abuse this out of retribution (firing or disagreement with management), you can use this to warn other job seekers. By logging onto websites such as Glassdoor, you can give a review of the company and how you were victimized. Again, many of these scammers probably aren’t on Glassdoor. But if you find them, a quick review can save others money, time, and mental anguish.</span></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Now that you have the knowledge to identify remote work scams during COVID-19, you should remain wary of the process. Unfortunately, many large-scale job boards don’t have the resources to screen every employer or job listing. But that’s when you should turn to Virtual Vocations. With over 20,000 vetted job opportunities, you don’t have to worry about becoming the victim of a scam. Plus, you just might find that perfect remote job you’ve been searching for.</span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">&nbsp;</span></p><span data-dcnode-id="769" instrument_node="">
