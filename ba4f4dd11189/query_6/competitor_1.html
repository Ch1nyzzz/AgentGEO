</span><article class="main-content post-4301 post type-post status-publish format-standard has-post-thumbnail hentry category-financial-fitness" data-dcnode-id="576" id="post-4301"><span data-dcnode-id="861" instrument_node="">
</span><div class="blog-posts" data-dcnode-id="578"><span data-dcnode-id="860" instrument_node="">
</span><header data-dcnode-id="852"><span data-dcnode-id="859" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Top 10 Job Scam Warning Signs</span></h1><span data-dcnode-id="856" instrument_node="">
</span><time class="updated" data-dcnode-id="854" datetime="2021-04-15T15:46:46-05:00"><span data-dcnode-id="855" instrument_node="">Posted on April 15, 2021 at 3:46 pm.</span></time><span data-dcnode-id="853" instrument_node=""> </span></header><span data-dcnode-id="851" instrument_node="">
</span><hr data-dcnode-id="850"><span data-dcnode-id="849" instrument_node="">
</span><div class="entry-content" data-dcnode-id="580"><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">About 14 million people are caught up in employment scams every year, according to the Better Business Bureau, and people who are unfamiliar with job scams are most likely to lose money to them. In 2020 alone, BBB reports that fraudsters cost victims an estimated $2 billion.1</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">However, even for sophisticated job seekers, it can be hard to tell the difference between a scam and a genuine offer. Familiarize yourself with the warning signs and protect yourself during your search.</span></p><span data-dcnode-id="842" instrument_node="">
</span><h3 data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Top 10 Job Scam Warning Signs</span></h3><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Like your mom always said, if something sounds too good to be true, it probably is. Here are some tip-offs that the “job” is fake:</span></p><span data-dcnode-id="836" instrument_node="">
</span><h4 data-dcnode-id="833"><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">1. Too Good to Be True</span></strong></h4><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="827"><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">You didn’t contact them. They contacted you.</span></strong><br data-dcnode-id="829"><span data-dcnode-id="828" instrument_node="">
According to BBB Scam Tracker, 80% of victims reported that the scammer initiated contact with them, typically through a job board or social media. In this scenario, the “employer” will often offer you a job right away or try to entice you by saying that you’ve already made the first cut and they want to interview you as a finalist for the job.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="820"><strong data-dcnode-id="822"><span data-dcnode-id="825" instrument_node="">The pay is high—much higher than typical for the job.</span><br data-dcnode-id="824"><span data-dcnode-id="823" instrument_node="">
</span></strong><span data-dcnode-id="821" instrument_node="">Here are two examples, one from an online listing and another reported by a reader:</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="815"><em data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">An online listing for a healthcare administrative assistant:</span></em><span data-dcnode-id="816" instrument_node=""> This is a work-from-home job. Work hours are from 9 am-4 pm Monday-Friday You will earn $45 per hour for this position, you are also expected online at Yahoo Messenger during working hours. We also offer flexible hours…</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="810"><em data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">A note from a reader about an operations officer scam:</span></em><span data-dcnode-id="811" instrument_node=""> I have never had anyone offer me a job working 20 hours a week, for $72,800 annually, without an interview or two or three. They don’t really say what you will be doing or where…The company address is in Spain.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="803"><strong data-dcnode-id="805"><span data-dcnode-id="808" instrument_node="">You get the job right away.</span><br data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">
</span></strong><span data-dcnode-id="804" instrument_node="">After a quick phone or online interview, the “interviewer” immediately contacts you to offer you the job.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="801" instrument_node="">Scammers troll job boards looking for victims. To reduce the chance you’ll get scammed, </span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancecareers.com/top-best-job-websites-2064080"><span data-dcnode-id="800" instrument_node="">use job sites</span></a><span data-dcnode-id="798" instrument_node=""> that have privacy policies and only allow verified employers to view the listings.</span></p><span data-dcnode-id="796" instrument_node="">
</span><h4 data-dcnode-id="793"><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">2. Vague Job Requirements and Job Description</span></strong></h4><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="791" instrument_node="">Scammers try to make their emails sound believable by listing </span><a data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancecareers.com/what-are-job-requirements-3928054"><span data-dcnode-id="790" instrument_node="">job requirements</span></a><span data-dcnode-id="788" instrument_node="">. Usually, these requirements are so ridiculously simple that almost everyone qualifies:</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="783"><em data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Must be 18 years old. Must be a citizen. Must have access to the internet. </span></em></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">(You wouldn’t be reading their email if you didn’t have internet access, right?)</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">The job requirements don’t mention years of education or experience. As a rule of thumb, if it’s a real job, the requirements will be quite specific.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Job scam emails usually don’t include clear job descriptions, either. Many job seekers say that when they ask for a job description or list of job duties, they get the brush-off. The interviewer either ignores the questions or says something like, “Don’t worry, we’ll train you.”</span></p><span data-dcnode-id="773" instrument_node="">
</span><h4 data-dcnode-id="770"><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">3. Unprofessional Emails</span></strong></h4><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Some emails from scammers are well-written, but many aren’t. Real companies hire professionals who can write well. If the email contains spelling, capitalization, punctuation, or grammatical mistakes, be on your guard. Here’s an example submitted by a reader:</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="763"><em data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">The Human resources have just reviewed your resume due to the one you posted on www.allstarjobs.com. You are now scheduled for an interview with the hiring manager of the company. Her name is Mrs. Ann Jernigan; you are required to set up a yahoo mail account(mail.yahoo.com) and a yahoo instant messenger.</span></em></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">In this example, the mistakes include:</span></p><span data-dcnode-id="759" instrument_node="">
</span><ul data-dcnode-id="742"><span data-dcnode-id="758" instrument_node="">
</span><li data-dcnode-id="754"><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Capitalization errors:</span></strong><span data-dcnode-id="755" instrument_node=""> “Human resources” should be “Human Resources” and “yahoo” should be “Yahoo.”</span></li><span data-dcnode-id="753" instrument_node="">
</span><li data-dcnode-id="749"><strong data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Punctuation errors:</span></strong><span data-dcnode-id="750" instrument_node=""> Commas, periods, and parentheses should be followed by a space.</span></li><span data-dcnode-id="748" instrument_node="">
</span><li data-dcnode-id="744"><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Grammatical errors:</span></strong><span data-dcnode-id="745" instrument_node=""> “Human resources have reviewed” should be “Human Resources has reviewed…”</span></li><span data-dcnode-id="743" instrument_node="">
</span></ul><span data-dcnode-id="741" instrument_node="">
</span><h4 data-dcnode-id="738"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">4. Online Interviews via Messaging Services</span></strong></h4><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Many attempted scams say the interview will take place online using an instant messaging service. The scammers often include instructions for setting up and contacting the hiring manager and may ask for confidential information.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">If you’re applying for an online job and you’re told the interview will take place online via instant message, research the company and its representatives before you agree to an interview. And if you agree to be interviewed, ask detailed questions about the job during the interview.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Don’t give out confidential information such as your bank account, credit card, or Social Security numbers.</span></p><span data-dcnode-id="728" instrument_node="">
</span><h4 data-dcnode-id="725"><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">5. Emails Don’t Include Contact Information</span></strong></h4><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">If the email doesn’t include the company’s address and phone, it’s a good bet it’s a scam. Also watch out for interviewers who make excuses for using a personal email address by saying the company’s servers are down, etc.</span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Some scam emails will look like they come from real companies. One reader reported:</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="715"><em data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">The scammer’s email address was jobs@senergy-world.com. The real company email is jobs@senergyworld.com.</span></em></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Google email addresses to ensure their validity. Be sure to copy and paste each address into the search box as is. You can also type in the word “scam” after the email address to see if someone else has reported the company.</span></p><span data-dcnode-id="711" instrument_node="">
</span><h4 data-dcnode-id="708"><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">6. Search Results Don’t Add Up</span></strong></h4><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Before agreeing to an interview, do your research. If it’s a real company, you should be able to find information about the company by doing an online search. Finding information does not guarantee the company is legit, but if you can’t find anything, you can bet it’s a scam.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">For example, one reader got a scam job offer from Fijax.com:</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="698"><em data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Firstly, their email is very unprofessional; there is no signature at the end. When I checked for the company on Google, I found nothing, not even a website!</span></em></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Some scammers pretend to represent real companies. One of our readers reported that she received a job offer from “Proctor and Gambel,” but the real company is named “Procter &amp; Gamble.” Another reader says he was offered a job by someone who claimed to represent a real company, but when he did his research, he found out it was a scam:</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="691"><em data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">ALWAYS contact the REAL company and ask if this employee exists. That is how I found out this employee was a fraud.</span></em></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Sophisticated scammers sometimes set up nice-looking websites—but looks can be deceiving.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="686" instrument_node="">Go to </span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//who.is/"><span data-dcnode-id="685" instrument_node="">Who.Is</span></a><span data-dcnode-id="683" instrument_node=""> and type the company’s web address into the “domain names or IP addresses” box and click the search button. The results will tell you the date when the website was created. If the website is less than a year old, be on your guard.</span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">When searching for information about the company online, search for both the company’s name and the email address. Also, copy/paste paragraphs from the email into the search box. Scammers may change the company name but re-use the other parts of the email, and it’s possible you’ll find an identical email posted online.</span></p><span data-dcnode-id="678" instrument_node="">
</span><h4 data-dcnode-id="675"><strong data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">7. You’re Asked to Provide Confidential Information</span></strong></h4><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Some scammers ask for your bank account information to set up direct deposit or transfer money to your account, or ask you to open a new bank account and provide the information to them:</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Other scammers will tell you to go to a website and fill out a credit report form or provide confidential information so they can “put you on the company insurance.” Identity theft scams try to get you to provide your Social Security number and birth date and other personal information.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Before entering personal information online, check to make sure the website is secure by looking at the web address bar. Secure websites have URLs that begin with “HTTPS://”, not “HTTP://”.</span></p><span data-dcnode-id="665" instrument_node="">
</span><h4 data-dcnode-id="662"><strong data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">8. Sending Money or Using a Personal Bank Account</span></strong></h4><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Some readers say they’ve received checks that look like real cashier’s checks. They are instructed to deposit the check, keep some of the money for themselves, and send the rest of the money to someone else via Western Union or Money Gram. Then, a few days or weeks later, they get a call from the bank saying the check is fake. They have lost the money they sent.</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Here’s an example of a scam sent from a reader:</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="652"><em data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Once you receive the check, First of all, I want you to head right away to your bank and get the check cashed. Deduct your first-week pay which is $500, and Deduct an extra $100 for the Money Gram sending fee and proceed to the nearest Money Gram outlet around you to make payment to my wife’s travel agent.</span></em></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Some scammers ask to use your personal bank account to transfer money from one account to another account. It is called money laundering, and it’s against the law. Other scams ask you to receive and forward packages from your home. These packages might contain stolen goods or illegal substances.</span></p><span data-dcnode-id="648" instrument_node="">
</span><h4 data-dcnode-id="645"><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">9. They Want you to Pay for Something</span></strong></h4><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Legitimate companies don’t ask for money. If you’re told you need to purchase software or pay for services, beware. Here are three examples:</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="638"><strong data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Buy This Software</span></strong></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">A reader reports:</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="631"><em data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">They were offering $15 per hour for training and $24.75 to start. I was so excited to work from home and actually be paid a decent wage. </span></em></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="627"><em data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">The interview went well, and I was told I have the job. YAY! Then I was told that they were going to send me a brand-new HP laptop for work, but I needed to pay for the software for it. I thought not a problem; I’ve had to upgrade in the past for jobs. </span></em></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="623"><em data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Well, here is the red flag: ‘We need you to send $312 Western Union for software costs…’</span></em></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="619"><strong data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Pay for a Credit Report</span></strong></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">The scam:</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="612"><em data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">The job will require you to work in a high financial environment, so it is our corporate policy that we perform financial verification checks on all employees to ensure applicant registration info. It’s corporate policy that we have applicants sent through our link, so we are compliant with the U.S employment standards act… Fill out the form and indicate that you want the free report.</span></em></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Here’s what a reader had to say about this scam:</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="605"><em data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">…These companies are using the internet to get job-seeking people to use their site. Then they tell them they need a credit check to apply for a job through their site. Then the company charges an unauthorized fee on your credit card, which you used to pay a $1 one-time fee for the credit check. Preying on those who can least afford it! Shame on you!</span></em></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="601"><strong data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Pay to Have Your Resume Reviewed</span></strong></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">The scammer wrote:</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="594"><em data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">You have a lot of strong, relevant experience and are an excellent candidate although it would be best to improve your resume before doing anything with it. I can refer you to a resume writing expert that can improve your resume to the standard we are looking for, and I believe he charges around $150 or so…</span></em></p><span data-dcnode-id="593" instrument_node="">
</span><h4 data-dcnode-id="590"><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">10. Your Gut Says It’s a Scam</span></strong></h4><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="585"><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancecareers.com/how-to-research-a-company-2058508"><span data-dcnode-id="588" instrument_node="">Researching the company</span></a><span data-dcnode-id="586" instrument_node=""> is your best defense, but some scammers are very clever. If you start to feel that things aren’t right, trust your intuition. Ask questions and pay close attention to the answers.</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Slow the process down and don’t be pressured into making a commitment or giving out personal information. Do more research. If it turns out to be a scam, report it to the authorities.</span></p><span data-dcnode-id="581" instrument_node="">
</span></div><span data-dcnode-id="579" instrument_node="">
</span></div><span data-dcnode-id="577" instrument_node="">
