Philippines Investigator Blog </span><span data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">&nbsp;&nbsp;&nbsp;Stay Informed. Lower the Risk.</span></span></h2><span data-dcnode-id="417" instrument_node="">
</span><div class="maincon" data-dcnode-id="308"><span data-dcnode-id="416" instrument_node="">

</span><h2 class="boxttl" data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Philippines Romance Scams: Know the Warning Signs</span></h2><span data-dcnode-id="412" instrument_node="">
</span><span data-dcnode-id="410" instrument_node="">
</span><img alt="Philippines Romance Scams: Know the Warning Signs" class="image-float" data-dcnode-id="409" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.philippinepi.com/wp-content/uploads/2018/11/philippine-romance-scam.jpg&amp;raw"><span data-dcnode-id="408" instrument_node="">
</span><br data-dcnode-id="407"><span data-dcnode-id="406" instrument_node="">
</span><div class="txt" data-dcnode-id="313"><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">People feel sorry for those who have been victim of fraud in one way or another, and yet they fail to protect themselves because most of the times they think it won’t happen to them. Precaution is the key to being safe in romantic relationships, and this is especially important when dating a Filipina.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="401" instrument_node="">The majority of cases of Philippines romance scams involve Filipina women and foreigners, especially men from the United States, the U.K., Australia and New Zealand, who speak English and come from a wealthy country. These are the preferred victims of romance scammers, and although </span><a data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.philippinepi.com/blog/from-manila-to-cebu-philippines-investigators-help-fight-fraud/"><span data-dcnode-id="400" instrument_node="">Philippines investigators have been helping fight fraud</span></a><span data-dcnode-id="398" instrument_node=""> for years, this is still an ongoing problem.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="395" instrument_node="">The first warning that people should keep in mind is: do not wait for a warning! Most of the victims learn that they have been deceived until it’s too late and they have already lost money or valuable personal information. &nbsp;&nbsp;When having an online or long distance relationship it is extremely easy to lie or have a double life when you are thousands of miles away. Therefore, hiring a </span><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.philippinepi.com/blog/dating-background-checks-philippines/"><span data-dcnode-id="394" instrument_node="">dating background check investigation in the Philippines</span></a><span data-dcnode-id="392" instrument_node=""> in the early stages of a relationship will come handy.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">With that said, there are some important warning signs that you need to be aware of if you have been dating a Filipina, or if you know someone who is.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="384"><em data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Repeated hardship claims</span></em></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">The Philippines might not be as wealthy as developed countries, and many people certainly live hardship situations. However, in many fraud cases there is a pattern of difficult circumstances that seem to never end. Usually, the goal is to request financial assistance, or to make their victims offer it voluntarily. Most people are willing to do what they can to help, and romance scammers exploit this.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="377"><em data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Sudden disconnections or impossibility to communicate during certain time frames</span></em></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">In many of the cases of romance scam, the fraudsters tell their online partner that they are unable to communicate during certain moments of the day, during long periods (like a whole week) or suddenly disconnect and do not call back. This can be an indication that they are married and have a family, or that they are communicating with other foreigners for the same reason: to get their money. If this happens frequently, you might be just another of their victims.</span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="370"><em data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">The relationship moves forward too fast</span></em></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="368" instrument_node="">When dating online, skepticism is your friend. Love at first sight sounds romantic and magical, but it could all be a lie. Take your time to investigate the truth. You might need </span><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.philippinepi.com/services/surveillance-services/"><span data-dcnode-id="367" instrument_node="">surveillance or local investigation in the Philippines</span></a><span data-dcnode-id="365" instrument_node=""> to really find out what is going on.</span></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Getting professional help is your best option to stay safe. &nbsp;&nbsp;If you’ve met someone on the internet, verify first and get the facts early on.&nbsp; Contact us and get the evidence you need!</span></p><span data-dcnode-id="360" instrument_node="">
