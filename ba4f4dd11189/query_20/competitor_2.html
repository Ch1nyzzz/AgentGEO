="rich-text" data-dcnode-id="1159"></div></div><div class="slide-body" data-dcnode-id="1143"><div class="rich-text" data-dcnode-id="1144"><p data-dcnode-id="1153"><span data-dcnode-id="1157" instrument_node="">There's a reason e-mail remains a favorite of scammers: It works, and it works well. So make sure you look at any emails with a critical eye. They may even appear to be from reputable retailers you've actually shopped with, and they'll use any number of tactics to get you to provide personal information like passwords and even (gulp) credit card or bank account numbers. For instance, they&nbsp;may claim they've noticed suspicious activity on your account, offer a dubious coupon, say your payment information isn't up to date, or include an official-looking invoice for something you didn't&nbsp;buy, </span><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumer.ftc.gov/articles/how-recognize-and-avoid-phishing-scams" target="_blank"><span data-dcnode-id="1156" instrument_node="">the FTC warns</span></a><span data-dcnode-id="1154" instrument_node="">.</span></p><p data-dcnode-id="1151"><br data-dcnode-id="1152"></p><p data-dcnode-id="1145"><b data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Related:&nbsp;</span></b><a data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.cheapism.com/avoid-phone-scams/"><span data-dcnode-id="1148" instrument_node="">How to Recognize IRS Fraud, Vaccine Cons, and Other Big Phone Scams</span></a><br data-dcnode-id="1146"></p></div></div></article></div><div class="ad-places adapex" data-dcnode-id="1139"><div data-aa-adunit="/1030155/chp_ss_728v_1" data-aaad="true" data-dcnode-id="1140"></div></div><div class="slideshow-item" data-dcnode-id="1099" id="slide=3"><figure class="figure" data-dcnode-id="1117"><div class="img-wrap" data-dcnode-id="1120"><picture data-dcnode-id="1136" data-slide-src="https://cdn.che lass="CommentItem__CommentMain-sc-6uyzdi-2 fVReyA" data-dcnode-id="389"><div data-dcnode-id="390"><div class="CommentText__CommentWrap-sc-urbev0-0 ecnWot" data-dcnode-id="399"><div data-dcnode-id="400"><div class="Truncate__Wrap-sc-1t1ouih-0 klLjfd" data-dcnode-id="404"><div data-dcnode-id="405"><div class="CommentText__CommentTextWrap-sc-urbev0-7 elEhof" data-dcnode-id="406"><span class="Linkify" data-dcnode-id="407"><p class="CommentText__P-sc-urbev0-1 hYGZtK" data-dcnode-id="408"><span class="Text-sc-1jeqstd-0 CommentText__CText-sc-urbev0-6 dnwmdc" data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">I was searching for a puppy on craigslist and there was an ad with a picture of the puppy I was looking for.  I called the number and they of course wanted money up front, but I told them I wanted to see the puppy first.  They gave me their address in an apartment complex.  So I called the apartment complex to verify they lived there.  The lady told me she had no one by that name.  So I called the man back and said I wanted to drive there and pick up the puppy, I knew it was a scam and when I said I was leaving then...he never answered me back...lol    I never open emails from people I do not know, I send all unknown calls to be blocked and I found my furbaby through a friend.  I get at least 4 or 5 emails every day in my spam folder that are trying to get me to answer them because they have 'money' for me..haha.  Another scam.  Best thing is to block all spam calls and people you don't know on the phone and send all unknown emails to the spam folder then delete them all.  It makes me angry that those crooks are too lazy to work for a living!!</span></span></p></span></div></div></div><button class="Button-sc-w9hrhk-0 Truncate__ShowHide-sc-1t1ouih-1 bNhegq" data-dcnode-id="401" type="button"><span class="Text-sc-1jeqstd-0 eGVLph" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Show more</span></span></button></div></div><footer class=
