</span><h2 class="ct-slideshow__slide__text-container__caption" data-dcnode-id="1731"><span data-dcnode-id="1735" instrument_node="">
</span><div data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Retirement scams to watch out for</span></div><span data-dcnode-id="1732" instrument_node="">
</span></h2><span data-dcnode-id="1730" instrument_node="">
</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="1700"><span data-dcnode-id="1729" instrument_node="">
</span><div data-dcnode-id="1702"><p data-dcnode-id="1724"><span data-dcnode-id="1728" instrument_node="">Scams are on the rise. In 2018, the Federal Trade Commission announced it had collected </span><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumer.ftc.gov/blog/2019/02/top-frauds-2018"><span data-dcnode-id="1727" instrument_node="">1.4 million fraud reports</span></a><span data-dcnode-id="1725" instrument_node=""> and that people had reported losing $1.48 billion to fraud—a 38% increase over the previous year. Younger people reported losing money to fraud more often than older people, with 43% of responders in their 20s confessed to losing money to scams. Only 15% of those in their 70s reported the same thing, but older people tended to lose more: The median loss for individuals in their 70s was $751; it was $400 for people in their 20s.</span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1719"><a data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fbi.gov/scams-and-safety/common-fraud-schemes/seniors"><span data-dcnode-id="1722" instrument_node="">Senior citizens targets for&nbsp;fraud</span></a><span data-dcnode-id="1720" instrument_node="">&nbsp;for many reasons, according to the FBI. First, seniors often have large “nest eggs,” own their own homes, or have good credit, making them appealing targets for con artists. In addition, seniors may take longer to realize that they’ve been scammed and they take longer to report it, both of which make it easier for scammers to succeed. Finally, individuals who grew up during the 1930s, ‘40s, and ‘50s tend to be more polite and trusting, characteristics fraudsters exploit.</span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">In light of this, Stacker rounded up 20 retirement scams seniors should watch out for. Using independently verified sources, we highlight some of the most common and dangerous scams that target the elderly. From Medicare scams, to reverse mortgage scams, to counterfeit anti-aging product schemes, these scams can be both financially and emotionally draining.</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1714" instrument_node="">Those who believe they have been victimized by a scam should file a complaint with their local police department, as well as with the Federal Trade Commission. A complete </span><a data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/stop-scams-frauds"><span data-dcnode-id="1713" instrument_node="">list of where to report scams</span></a><span data-dcnode-id="1711" instrument_node="">, based on the type of fraud involved, can be found on USA.gov.</span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1703"><strong data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">You may also like:</span></strong><span data-dcnode-id="1706" instrument_node=""> </span><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3083/best-places-retire-east-coast"><span data-dcnode-id="1705" instrument_node="">Best places to retire on the East Coast</span></a></p></div><span data-dcnode-id="1701" instrument_node="">

</span><h2 class="ct-slideshow__slide__text-container__caption" data-dcnode-id="1656"><span data-dcnode-id="1660" instrument_node="">
</span><div data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Medicare Beneficiary Identifier scams</span></div><span data-dcnode-id="1657" instrument_node="">
</span></h2><span data-dcnode-id="1655" instrument_node="">
</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="1643"><span data-dcnode-id="1654" instrument_node="">
</span><div data-dcnode-id="1645"><p data-dcnode-id="1649"><span data-dcnode-id="1653" instrument_node="">To cut down on Medicare scams, the federal Centers for Medicare &amp; Medicaid Services rolled out new cards for beneficiaries earlier this year. These cards no longer display beneficiaries’ Social Security numbers; instead, they bear a random </span><a data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2019/new-medicare-card.html"><span data-dcnode-id="1652" instrument_node="">Medicare Beneficiary Identifier (MBI)</span></a><span data-dcnode-id="1650" instrument_node="">. However, scammers still are finding ways to gain users’ personal information—such as asking you for your MBI to “activate” the card, or offering a plastic upgrade from the paper card that’s sent out as long as you provide personal information (Social Security numbers, birth dates).</span></p><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Don’t fall prey to this scam: Know that Medicare employees will never call you without being invited to do so and that your insurance coverage cannot be canceled simply because you don’t provide vital information over the phone.</span></p></div><span data-dcnode-id="1644" instrument_node="">
</span></div><span data-dcnode-id="1642" instrument_node="">
</span></div><span data-dcnode-id="1640" instrument_node="">
</span></div><span data-dcnode-id="1638" instrument_node="">

</span><h2 class="ct-slideshow__slide__text-container__caption" data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node="">
</span><div data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Instagram scams</span></div><span data-dcnode-id="1603" instrument_node="">
</span></h2><span data-dcnode-id="1601" instrument_node="">
</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="1592"><span data-dcnode-id="1600" instrument_node="">
</span><div data-dcnode-id="1594"><p data-dcnode-id="1595"><span data-dcnode-id="1599" instrument_node="">Social media is a popular place for scammers to run their cons, especially those that target older users who might not be tech-savvy. For example, </span><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2019/scams-on-social-media-networks.html%3Fintcmp%3DAE-FRDSC-MOR-R2-POS3"><span data-dcnode-id="1598" instrument_node="">scammers who use Instagram</span></a><span data-dcnode-id="1596" instrument_node=""> will view the photos and videos you like and accounts you follow, and then try to hook you with a scam based on your interests. If you follow accounts that post photos exclusively of Paris, for example, someone might send you a direct message offering cheap tickets to the city. But when you click on the link to claim your tickets and provide your personal or banking information, the link will steal it. The best way to avoid this scam is by not responding to any unsolicited direct messages or to direct messages coming from individuals you don’t know.</span></p></div><span data-dcnode-id="1593" instrument_node="">
</span></div><span data-dcnode-id="1591" instrument_node="">
</span></div><span data-dcnode-id="1589" instrument_node="">
</span></div><span data-dcnode-id="1587" instrument_node="">
</span><div class="paragraph paragraph--type--slideshow-para paragraph--view-mode--full ct-slideshow__slide" data-dcnode-id="1537"><span data-dcnode-id="1586" instrument_node="">
</span><div class="ct-slideshow__slide__image-container" data-dcnode-id="1558"><span data-dcnode-id="1585" instrument_node="">
</span><div class="ct-slideshow__slide__image-container__image" data-dcnode-id="1566"><span data-dcnode-id="1584" instrument_node="">

</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="1541"><span data-dcnode-id="1549" instrument_node="">
</span><div data-dcnode-id="1543"><p data-dcnode-id="1544"><span data-dcnode-id="1548" instrument_node="">Many older Americans will prearrange or prepay for their funerals to save loved ones from additional financial and emotional burdens. Knowing this, scammers will often overcharge for their services or listing themselves as the financial beneficiary of an individual. </span><a data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fbi.gov/scams-and-safety/common-fraud-schemes/funeral-and-cemetery-fraud"><span data-dcnode-id="1547" instrument_node="">Laws regulating the industry vary state to state</span></a><span data-dcnode-id="1545" instrument_node="">, but shrewd individuals can ensure they won’t be scammed by shopping around, reading all contracts and purchasing agreements carefully, and making sure cancellation terms are explicitly spelled out before signing.</span></p></div><span data-dcnode-id="1542" instrument_node="">

</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="1482"><span data-dcnode-id="1493" instrument_node="">
</span><div data-dcnode-id="1484"><p data-dcnode-id="1485"><span data-dcnode-id="1492" instrument_node="">Using targeted ads, scammers may post ads for prescription drugs at super-low prices. Buyers should be aware that </span><a data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fbi.gov/scams-and-safety/common-fraud-schemes/counterfeit-prescription-drugs"><span data-dcnode-id="1491" instrument_node="">these drugs may be contaminated</span></a><span data-dcnode-id="1489" instrument_node="">, have no active ingredient, or include the wrong dosage of active ingredients. Avoid being scammed by not purchasing medications from unlicensed pharmacies or those without the </span><a data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nabp.pharmacy/programs/vipps/"><span data-dcnode-id="1488" instrument_node="">Verified Internet Pharmacy Practice Site</span></a><span data-dcnode-id="1486" instrument_node=""> (VIPPS) seal. Examining the product closely and asking your doctor or pharmacist about any concerns are other ways to make sure you aren’t putting dangerous medications into your body.</span></p></div><span data-dcnode-id="1483" instrument_node="">
</span></div><span data-dcnode-id="1481" instrument_node="">

</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="1421"><span data-dcnode-id="1439" instrument_node="">
</span><div data-dcnode-id="1423"><p data-dcnode-id="1431"><span data-dcnode-id="1438" instrument_node="">Many seniors use the </span><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ssa.gov/benefits/retirement/%3Fgclid%3DCjwKCAiAzanuBRAZEiwA5yf4uk5hZ5Vxq0m3kyQL-0AH70UgI-ABdrMdkf-YKAI07pALWIAGC-LnZRoCbGYQAvD_BwE"><span data-dcnode-id="1437" instrument_node="">my Social Security</span></a><span data-dcnode-id="1435" instrument_node=""> portal to access their Social Security benefits and manage their personal information. Scammers who know this have begun sending </span><a data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fool.com/investing/5-dangerous-social-security-medicare-scams.aspx"><span data-dcnode-id="1434" instrument_node="">“phishing” emails that contain malware</span></a><span data-dcnode-id="1432" instrument_node=""> to steal personal information or coerce individuals into providing it willingly. These emails often warn retirees that something is wrong with their account and that it will be frozen if they don’t act immediately. Before clicking any links or sending any personal information, be sure to check the URL included in the email—real government websites only end in .gov or .gov/. Anything else is a scam.</span></p><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1424"><strong data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">You may also like:</span></strong><span data-dcnode-id="1427" instrument_node=""> </span><a data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/3042/can-you-answer-these-real-jeopardy-questions-about-economy%3Futm_source%3D12345"><span data-dcnode-id="1426" instrument_node="">Can you answer these real Jeopardy questions about the economy?</span></a></p></div><span data-dcnode-id="1422" instrument_node="">

</span></h2><span data-dcnode-id="1379" instrument_node="">
</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="1368"><span data-dcnode-id="1378" instrument_node="">
</span><div data-dcnode-id="1370"><p data-dcnode-id="1374"><a data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2019/phone.html"><span data-dcnode-id="1377" instrument_node="">Telemarketing scams</span></a><span data-dcnode-id="1375" instrument_node=""> vary, but the core of the scams is almost always the same: You’ll receive an unsolicited call from a company, public utility, or government agency claiming that you’ve either won a prize, qualified for a steep discount on a product, or that there’s a serious problem.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">The scammer will pressure you into acting now to get you to provide vital personal information that will allow them access to your bank accounts, or convince you to wire them money directly. These scams can be hard to identify, but general hallmarks include pressuring you to act faster than you’d like, not answering questions, and offering you deals that are too good to be true.</span></p></div><span data-dcnode-id="1369" instrument_node="">

</span><div data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Charity scams</span></div><span data-dcnode-id="1323" instrument_node="">
</span></h2><span data-dcnode-id="1321" instrument_node="">
</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="1309"><span data-dcnode-id="1320" instrument_node="">
</span><div data-dcnode-id="1311"><p data-dcnode-id="1312"><span data-dcnode-id="1319" instrument_node="">In a similar vein to telemarketing scams, </span><a data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumer.ftc.gov/features/how-donate-wisely-and-avoid-charity-scams"><span data-dcnode-id="1318" instrument_node="">charity scams solicit money for fake charities</span></a><span data-dcnode-id="1316" instrument_node="">, usually via telephone. To ensure you aren’t being duped into lining someone’s pockets rather than helping a good cause, always research a charity before donating (websites like </span><a data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.charitynavigator.org/"><span data-dcnode-id="1315" instrument_node="">Charity Navigator</span></a><span data-dcnode-id="1313" instrument_node=""> are great for this), and never donate with cash, gift cards, or via wire transfer. In addition, make sure you know exactly how a charity plans to use your donation—ask for specifics and be wary of sentimental claims.</span></p></div><span data-dcnode-id="1310" instrument_node="">

</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="1258"><span data-dcnode-id="1266" instrument_node="">
</span><div data-dcnode-id="1260"><p data-dcnode-id="1261"><span data-dcnode-id="1265" instrument_node="">Also similar to telemarketing scams, </span><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fbi.gov/scams-and-safety/common-fraud-schemes/advance-fee-schemes"><span data-dcnode-id="1264" instrument_node="">advance-fee scams</span></a><span data-dcnode-id="1262" instrument_node=""> can take many forms. Usually, they require an individual to send a little money “upfront,” in anticipation of receiving something of much greater value, like found money or investment earnings. To make sure you don’t fall victim to advance fee scams, avoid offers that sound too good to be true or business that is handled in unprofessional ways (i.e. dropping an envelope full of cash at a specific destination).</span></p></div><span data-dcnode-id="1259" instrument_node="">

</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="1207"><span data-dcnode-id="1215" instrument_node="">
</span><div data-dcnode-id="1209"><p data-dcnode-id="1210"><span data-dcnode-id="1214" instrument_node="">Many seniors choose to spend their retirement traveling, which can lead to falling prey to </span><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumer.ftc.gov/blog/2018/07/getting-vacation-rental-watch-out-scams"><span data-dcnode-id="1213" instrument_node="">vacation rental scams</span></a><span data-dcnode-id="1211" instrument_node="">. Scammers will concoct an entire vacation rental listing, down to the details, promising great amenities or a lower-than-normal price if you book now. Then, when excited vacationers show up at the property, they find it doesn’t exist. Watch out for super-cheap rates in prime locations, make sure to get a copy of the contract before sending money, and never wire money to cover the rental fee.</span></p></div><span data-dcnode-id="1208" instrument_node="">

</span><div data-dcnode-id="1146"><p data-dcnode-id="1154"><span data-dcnode-id="1158" instrument_node="">In 2018, the Federal Trade Commission began warning the public that </span><a data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ftc.gov/news-events/press-releases/2018/02/ftc-challenges-schemes-target-or-affect-senior-citizens"><span data-dcnode-id="1157" instrument_node="">computer technical support service scams</span></a><span data-dcnode-id="1155" instrument_node=""> were on the rise. In these scams, cons claiming to be from well-known technology companies call targets (often seniors), claiming that their security software had expired, leaving them open to hackers who could steal their personal information. They then sell them overpriced, outdated security software, and steal the target’s personal information themselves as they are installing it. Asking lots of questions, not being rushed into anything, and doing independent research are the best ways to avoid this scam.</span></p><span data-dcnode-id="1153" instrument_node="">

</span><div data-dcnode-id="1095"><p data-dcnode-id="1096"><span data-dcnode-id="1100" instrument_node="">The </span><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fbi.gov/scams-and-safety/common-fraud-schemes/fraudulent-anti-aging-products"><span data-dcnode-id="1099" instrument_node="">volume of fraudulent anti-aging products</span></a><span data-dcnode-id="1097" instrument_node=""> entering the United States is increasing, according to the FBI. These products, usually sold online, generally come from businesses headquartered outside the country and can include dangerous ingredients like arsenic, beryllium, high levels of aluminum, and dangerous levels of bacteria from sources like urine. To avoid wasting money on products that don’t work and could be dangerous to your health, be aware of claims that sound too good to be true, do your research, and consult a doctor before using anything (especially if the product is one you ingest).</span></p></div><span data-dcnode-id="1094" instrument_node="">

</span><div data-dcnode-id="1044"><p data-dcnode-id="1045"><span data-dcnode-id="1049" instrument_node="">An in-person scam, </span><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2019/home-improvement.html"><span data-dcnode-id="1048" instrument_node="">fraudsters may appear on your doorstep posing as repairmen</span></a><span data-dcnode-id="1046" instrument_node=""> and offering their services to fix something they’ve just spotted, like broken gutters or clogged drain pipes. After you’ve agreed to the work, they’ll demand payment upfront, perform some unlicensed and/or shoddy work, and then reveal that the problem was more serious than they’d initially thought and that you’ll have to pay more for them to finish the job. Retirees can avoid being scammed by demanding to see a repairman’s references, signing a contract before any work has been completed, and not accepting unsolicited offers of work.</span></p></div><span data-dcnode-id="1043" instrument_node="">

</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="984"><span data-dcnode-id="994" instrument_node="">
</span><div data-dcnode-id="986"><p data-dcnode-id="987"><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bankrate.com/mortgages/reverse-mortgage-scams/"><span data-dcnode-id="993" instrument_node="">Reverse mortgage scams</span></a><span data-dcnode-id="991" instrument_node=""> are perhaps the most prevalent and dangerous scams aimed at senior citizens. These cons, run by real estate and financial professionals, intend to steal equity from older homeowners or coerce them into unwittingly stealing equity from flipped properties. To </span><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reversemortgagealert.org/reverse-mortgage-scams/"><span data-dcnode-id="990" instrument_node="">avoid these scams</span></a><span data-dcnode-id="988" instrument_node="">, seek a housing counselor licensed by the U.S. Department of Housing and Urban Development before signing or agreeing to anything. Also watch out for unsolicited advertisements, never sign something you don’t understand, and be wary of anyone claiming you can do fantastic things (like own a home without a down payment or accept payments for a home you never purchased).</span></p></div><span data-dcnode-id="985" instrument_node="">

</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="933"><span data-dcnode-id="941" instrument_node="">
</span><div data-dcnode-id="935"><p data-dcnode-id="936"><span data-dcnode-id="940" instrument_node="">Phony investment scams often play on retirees’ fears that they won’t have enough money to fund their retirements. High-yield investment scams, often run on the internet, promise investors incredible returns of 30% to 40% daily, weekly, or monthly. </span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investor.gov/protect-your-investments/fraud/types-fraud/high-yield-investment-programs"><span data-dcnode-id="939" instrument_node="">The U.S. Securities and Exchange Commission</span></a><span data-dcnode-id="937" instrument_node=""> warns the public that offers to invest in “high-yield investment programs” are almost always scams and should be rejected.</span></p></div><span data-dcnode-id="934" instrument_node="">

</span></h2><span data-dcnode-id="891" instrument_node="">
</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="872"><span data-dcnode-id="890" instrument_node="">
</span><div data-dcnode-id="874"><p data-dcnode-id="882"><span data-dcnode-id="889" instrument_node="">Some retirees may wish to make a little extra money by starting a small business from home. In doing so, they are positioned to fall victim to </span><a data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancesmb.com/business-is-an-mlm-scam-1794756"><span data-dcnode-id="888" instrument_node="">multilevel marketing (MLM) scams</span></a><span data-dcnode-id="886" instrument_node=""> or pyramid schemes. These scams, which </span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancesmb.com/is-it-multilevel-marketing-or-a-pyramid-scheme-2947159"><span data-dcnode-id="885" instrument_node="">require you to sell a low-quality or non-existent product</span></a><span data-dcnode-id="883" instrument_node=""> while simultaneously signing up others to do the same thing, often end up costing you more than you could ever make from them. Watch out for unfounded and over-the-top product claims, pressure to buy and stock inventory, and low BBB ratings—and steer clear of any businesses that give you a generally unsettled feeling.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="875"><strong data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">You may also like:</span></strong><span data-dcnode-id="878" instrument_node=""> </span><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestacker.com/stories/2322/best-value-private-colleges-america%3Futm_source%3D12345"><span data-dcnode-id="877" instrument_node="">Best value private colleges in America</span></a></p></div><span data-dcnode-id="873" instrument_node="">

</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="816"><span data-dcnode-id="824" instrument_node="">
</span><div data-dcnode-id="818"><p data-dcnode-id="819"><span data-dcnode-id="823" instrument_node="">Winning that dream vacation, new car, or brand-new grill may sound like a dream come true—until it isn’t. </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalanceeveryday.com/warning-signs-of-sweepstakes-scams-886996"><span data-dcnode-id="822" instrument_node="">Sweepstakes scams</span></a><span data-dcnode-id="820" instrument_node=""> alert victims that they’ve won a sweepstakes or lottery and that they just need to provide some personal information or send a small amount of money to cover the taxes and fees to claim their prizes. In reality, there are no prizes, the money is going straight into a scammer’s pocket, and that personal information can now be used to steal your identity or hack into your bank accounts. Be wary of sweepstakes that require you to send money to claim a prize (especially money that must be sent via wire transfer), prizes for contests you don’t remember entering, and winnings from foreign lotteries.</span></p></div><span data-dcnode-id="817" instrument_node="">

</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="765"><span data-dcnode-id="773" instrument_node="">
</span><div data-dcnode-id="767"><p data-dcnode-id="768"><span data-dcnode-id="772" instrument_node="">Many seniors rely on mobile diagnostic labs for their medical tests. While these rolling labs make health care more accessible, they can also be the </span><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insurancefraud.org/scam-alerts-false-medical-claims.htm%23scams"><span data-dcnode-id="771" instrument_node="">sites of major health insurance scams</span></a><span data-dcnode-id="769" instrument_node="">. Some of these labs provide fake or unnecessary testing before billing health insurance companies for expensive procedures. Victims can be left with drained coverage, increasing co-pays, and false medical records, all things that can take financial and emotional tolls. To avoid these scams, be sure to keep detailed records, review billing and summary statements, and know what your insurance does and does not cover.</span></p></div><span data-dcnode-id="766" instrument_node="">

</span></h2><span data-dcnode-id="723" instrument_node="">
</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="714"><span data-dcnode-id="722" instrument_node="">
</span><div data-dcnode-id="716"><p data-dcnode-id="717"><span data-dcnode-id="721" instrument_node="">Preying on grandparents’ love for their grandchildren, so-called </span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fraud.org/grandparent_scams"><span data-dcnode-id="720" instrument_node="">grandparent scams</span></a><span data-dcnode-id="718" instrument_node=""> usually involve a con artist posing as a target’s grandchild. The con artist will call the target on the phone and explain that they’re in a lot of trouble, desperate for money to cover some last-minute bill, bail, or other made-up expense, and need a wire transfer immediately to get out of the jam. To ensure you aren’t getting scammed, and to avoid losing a large sum of money, be sure to call the “relative” on the other end of the line at a known phone number or verify the story with another family member before acting.</span></p></div><span data-dcnode-id="715" instrument_node="">

</span><h2 class="ct-slideshow__slide__text-container__caption" data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">
</span><div data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Social Security Advisory Board scams</span></div><span data-dcnode-id="669" instrument_node="">
</span></h2><span data-dcnode-id="667" instrument_node="">
</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="655"><span data-dcnode-id="666" instrument_node="">
</span><div data-dcnode-id="657"><p data-dcnode-id="658"><span data-dcnode-id="665" instrument_node="">In May 2019, the inspector general of Social Security warned about a new government </span><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.ssa.gov/inspector-general-warns-public-about-social-security-advisory-board-related-scam/"><span data-dcnode-id="664" instrument_node="">employee impersonation scam involving the Social Security Advisory Board</span></a><span data-dcnode-id="662" instrument_node="">. The scam begins with an individual receiving a phone call that </span><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fcc.gov/consumers/guides/spoofing-and-caller-id"><span data-dcnode-id="661" instrument_node="">displays the board’s phone number</span></a><span data-dcnode-id="659" instrument_node="">. Then, during these calls, a scammer tries to obtain that individual’s personal details, such as their Social Security number, birth date, address, etc. The inspector general emphasized that the board never contacts the general public over the phone to collect information and that government employees never take a threatening stance. If either of these things happens to you, hang up because you’re being scammed.</span></p></div><span data-dcnode-id="656" instrument_node="">

</span><div data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Sweetheart scams</span></div><span data-dcnode-id="615" instrument_node="">
</span></h2><span data-dcnode-id="613" instrument_node="">
</span><div class="ct-slideshow__slide__text-container__description" data-dcnode-id="597"><span data-dcnode-id="612" instrument_node="">
</span><div data-dcnode-id="599"><p data-dcnode-id="607"><span data-dcnode-id="611" instrument_node="">In </span><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nolo.com/legal-encyclopedia/elder-abuse-financial-scams-against-29822.html"><span data-dcnode-id="610" instrument_node="">sweetheart scams</span></a><span data-dcnode-id="608" instrument_node="">, con men&nbsp;pose as loving, attentive, potential suitors online, earning the trust of their targets and creating the illusion of happy, normal relationships. Playing on their targets’ trust, scammers convince individuals to turn over banking information, or other personal information, before draining the accounts and vanishing. The best way to avoid this scam is to never send money to someone you haven’t met in person no matter how much you may care for them.</span></p><span data-dcnode-id="606" instrument_node="">

</span><textarea data-dcnode-id="153" id="html-source-code">&lt;span data-dcnode-id="154" instrument_node=""&gt;&lt;section&gt;
  &lt;header&gt;
    &lt;ul&gt;
      &lt;li&gt;Story name: Retirement scams to watch out for&lt;/li&gt;
      &lt;li&gt;Canonical URL: https://stacker.com/stories/3693/retirement-scams-watch-out&lt;/li&gt;
      &lt;li&gt;Written by: Madison Troyer&lt;/li&gt;
      &lt;li&gt;Description: &lt;p dir="ltr"&gt;In 2018, scam victims reported $1.48 billion in collective losses. Seniors, on average, lost more money to scams than any other age group. Stacker has rounded up 20 retirement scams to watch out for, from Medicaid scams to reverse mortgage scams, to ensure you keep your hard-earned money where it belongs—in your pocket.&nbsp;
&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/header&gt;

  &lt;article&gt;
    &lt;h2&gt;Retirement scams to watch out for&lt;/h2&gt;
&lt;p&gt;Scams are on the rise. In 2018, the Federal Trade Commission announced it had collected &lt;a href="https://www.consumer.ftc.gov/blog/2019/02/top-frauds-2018"&gt;1.4 million fraud reports&lt;/a&gt; and that people had reported losing $1.48 billion to fraud—a 38% increase over the previous year. Younger people reported losing money to fraud more often than older people, with 43% of responders in their 20s confessed to losing money to scams. Only 15% of those in their 70s reported the same thing, but older people tended to lose more: The median loss for individuals in their 70s was $751; it was $400 for people in their 20s.&lt;/p&gt;

&lt;p&gt;&lt;a href="https://www.fbi.gov/scams-and-safety/common-fraud-schemes/seniors"&gt;Senior citizens targets for&nbsp;fraud&lt;/a&gt;&nbsp;for many reasons, according to the FBI. First, seniors often have large “nest eggs,” own their own homes, or have good credit, making them appealing targets for con artists. In addition, seniors may take longer to realize that they’ve been scammed and they take longer to report it, both of which make it easier for scammers to succeed. Finally, individuals who grew up during the 1930s, ‘40s, and ‘50s tend to be more polite and trusting, characteristics fraudsters exploit.&lt;/p&gt;

&lt;p&gt;In light of this, Stacker rounded up 20 retirement scams seniors should watch out for. Using independently verified sources, we highlight some of the most common and dangerous scams that target the elderly. From Medicare scams, to reverse mortgage scams, to counterfeit anti-aging product schemes, these scams can be both financially and emotionally draining.&lt;/p&gt;

&lt;p&gt;Those who believe they have been victimized by a scam should file a complaint with their local police department, as well as with the Federal Trade Commission. A complete &lt;a href="https://www.usa.gov/stop-scams-frauds"&gt;list of where to report scams&lt;/a&gt;, based on the type of fraud involved, can be found on USA.gov.&lt;/p&gt;

&lt;p&gt;&lt;strong&gt;You may also like:&lt;/strong&gt; &lt;a href="https://thestacker.com/stories/3083/best-places-retire-east-coast"&gt;Best places to retire on the East Coast&lt;/a&gt;&lt;/p&gt;
&lt;h2&gt;Medicare Beneficiary Identifier scams&lt;/h2&gt;
&lt;p&gt;To cut down on Medicare scams, the federal Centers for Medicare &amp;amp; Medicaid Services rolled out new cards for beneficiaries earlier this year. These cards no longer display beneficiaries’ Social Security numbers; instead, they bear a random &lt;a href="https://www.aarp.org/money/scams-fraud/info-2019/new-medicare-card.html"&gt;Medicare Beneficiary Identifier (MBI)&lt;/a&gt;. However, scammers still are finding ways to gain users’ personal information—such as asking you for your MBI to “activate” the card, or offering a plastic upgrade from the paper card that’s sent out as long as you provide personal information (Social Security numbers, birth dates).&lt;/p&gt;

&lt;p&gt;Don’t fall prey to this scam: Know that Medicare employees will never call you without being invited to do so and that your insurance coverage cannot be canceled simply because you don’t provide vital information over the phone.&lt;/p&gt;
&lt;h2&gt;Instagram scams&lt;/h2&gt;
&lt;p&gt;Social media is a popular place for scammers to run their cons, especially those that target older users who might not be tech-savvy. For example, &lt;a href="https://www.aarp.org/money/scams-fraud/info-2019/scams-on-social-media-networks.html?intcmp=AE-FRDSC-MOR-R2-POS3"&gt;scammers who use Instagram&lt;/a&gt; will view the photos and videos you like and accounts you follow, and then try to hook you with a scam based on your interests. If you follow accounts that post photos exclusively of Paris, for example, someone might send you a direct message offering cheap tickets to the city. But when you click on the link to claim your tickets and provide your personal or banking information, the link will steal it. The best way to avoid this scam is by not responding to any unsolicited direct messages or to direct messages coming from individuals you don’t know.&lt;/p&gt;
&lt;h2&gt;Funeral frauds&lt;/h2&gt;
&lt;p&gt;Many older Americans will prearrange or prepay for their funerals to save loved ones from additional financial and emotional burdens. Knowing this, scammers will often overcharge for their services or listing themselves as the financial beneficiary of an individual. &lt;a href="https://www.fbi.gov/scams-and-safety/common-fraud-schemes/funeral-and-cemetery-fraud"&gt;Laws regulating the industry vary state to state&lt;/a&gt;, but shrewd individuals can ensure they won’t be scammed by shopping around, reading all contracts and purchasing agreements carefully, and making sure cancellation terms are explicitly spelled out before signing.&lt;/p&gt;
&lt;h2&gt;Counterfeit prescription drug scams&lt;/h2&gt;
&lt;p&gt;Using targeted ads, scammers may post ads for prescription drugs at super-low prices. Buyers should be aware that &lt;a href="https://www.fbi.gov/scams-and-safety/common-fraud-schemes/counterfeit-prescription-drugs"&gt;these drugs may be contaminated&lt;/a&gt;, have no active ingredient, or include the wrong dosage of active ingredients. Avoid being scammed by not purchasing medications from unlicensed pharmacies or those without the &lt;a href="https://nabp.pharmacy/programs/vipps/"&gt;Verified Internet Pharmacy Practice Site&lt;/a&gt; (VIPPS) seal. Examining the product closely and asking your doctor or pharmacist about any concerns are other ways to make sure you aren’t putting dangerous medications into your body.&lt;/p&gt;
&lt;h2&gt;Social Security Administration phishing scams&lt;/h2&gt;
&lt;p&gt;Many seniors use the &lt;a href="https://www.ssa.gov/benefits/retirement/?gclid=CjwKCAiAzanuBRAZEiwA5yf4uk5hZ5Vxq0m3kyQL-0AH70UgI-ABdrMdkf-YKAI07pALWIAGC-LnZRoCbGYQAvD_BwE"&gt;my Social Security&lt;/a&gt; portal to access their Social Security benefits and manage their personal information. Scammers who know this have begun sending &lt;a href="https://www.fool.com/investing/5-dangerous-social-security-medicare-scams.aspx"&gt;“phishing” emails that contain malware&lt;/a&gt; to steal personal information or coerce individuals into providing it willingly. These emails often warn retirees that something is wrong with their account and that it will be frozen if they don’t act immediately. Before clicking any links or sending any personal information, be sure to check the URL included in the email—real government websites only end in .gov or .gov/. Anything else is a scam.&lt;/p&gt;

&lt;p&gt;&lt;strong&gt;You may also like:&lt;/strong&gt; &lt;a href="https://thestacker.com/stories/3042/can-you-answer-these-real-jeopardy-questions-about-economy?utm_source=12345"&gt;Can you answer these real Jeopardy questions about the economy?&lt;/a&gt;&lt;/p&gt;
&lt;h2&gt;Telemarketing scams&lt;/h2&gt;
&lt;p&gt;&lt;a href="https://www.aarp.org/money/scams-fraud/info-2019/phone.html"&gt;Telemarketing scams&lt;/a&gt; vary, but the core of the scams is almost always the same: You’ll receive an unsolicited call from a company, public utility, or government agency claiming that you’ve either won a prize, qualified for a steep discount on a product, or that there’s a serious problem.&lt;/p&gt;

&lt;p&gt;The scammer will pressure you into acting now to get you to provide vital personal information that will allow them access to your bank accounts, or convince you to wire them money directly. These scams can be hard to identify, but general hallmarks include pressuring you to act faster than you’d like, not answering questions, and offering you deals that are too good to be true.&lt;/p&gt;
&lt;h2&gt;Charity scams&lt;/h2&gt;
&lt;p&gt;In a similar vein to telemarketing scams, &lt;a href="https://www.consumer.ftc.gov/features/how-donate-wisely-and-avoid-charity-scams"&gt;charity scams solicit money for fake charities&lt;/a&gt;, usually via telephone. To ensure you aren’t being duped into lining someone’s pockets rather than helping a good cause, always research a charity before donating (websites like &lt;a href="https://www.charitynavigator.org/"&gt;Charity Navigator&lt;/a&gt; are great for this), and never donate with cash, gift cards, or via wire transfer. In addition, make sure you know exactly how a charity plans to use your donation—ask for specifics and be wary of sentimental claims.&lt;/p&gt;
&lt;h2&gt;Advance fee scams&lt;/h2&gt;
&lt;p&gt;Also similar to telemarketing scams, &lt;a href="https://www.fbi.gov/scams-and-safety/common-fraud-schemes/advance-fee-schemes"&gt;advance-fee scams&lt;/a&gt; can take many forms. Usually, they require an individual to send a little money “upfront,” in anticipation of receiving something of much greater value, like found money or investment earnings. To make sure you don’t fall victim to advance fee scams, avoid offers that sound too good to be true or business that is handled in unprofessional ways (i.e. dropping an envelope full of cash at a specific destination).&lt;/p&gt;
&lt;h2&gt;Vacation rental scams&lt;/h2&gt;
&lt;p&gt;Many seniors choose to spend their retirement traveling, which can lead to falling prey to &lt;a href="https://www.consumer.ftc.gov/blog/2018/07/getting-vacation-rental-watch-out-scams"&gt;vacation rental scams&lt;/a&gt;. Scammers will concoct an entire vacation rental listing, down to the details, promising great amenities or a lower-than-normal price if you book now. Then, when excited vacationers show up at the property, they find it doesn’t exist. Watch out for super-cheap rates in prime locations, make sure to get a copy of the contract before sending money, and never wire money to cover the rental fee.&lt;/p&gt;
&lt;h2&gt;Computer technical support services scams&lt;/h2&gt;
&lt;p&gt;In 2018, the Federal Trade Commission began warning the public that &lt;a href="https://www.ftc.gov/news-events/press-releases/2018/02/ftc-challenges-schemes-target-or-affect-senior-citizens"&gt;computer technical support service scams&lt;/a&gt; were on the rise. In these scams, cons claiming to be from well-known technology companies call targets (often seniors), claiming that their security software had expired, leaving them open to hackers who could steal their personal information. They then sell them overpriced, outdated security software, and steal the target’s personal information themselves as they are installing it. Asking lots of questions, not being rushed into anything, and doing independent research are the best ways to avoid this scam.&lt;/p&gt;

&lt;p&gt;&lt;strong&gt;You may also like:&lt;/strong&gt; &lt;a href="https://thestacker.com/stories/397/best-school-districts-every-state?utm_source=12345"&gt;The best school district in every state&lt;/a&gt;&lt;/p&gt;
&lt;h2&gt;Fraudulent anti-aging product scams&lt;/h2&gt;
&lt;p&gt;The &lt;a href="https://www.fbi.gov/scams-and-safety/common-fraud-schemes/fraudulent-anti-aging-products"&gt;volume of fraudulent anti-aging products&lt;/a&gt; entering the United States is increasing, according to the FBI. These products, usually sold online, generally come from businesses headquartered outside the country and can include dangerous ingredients like arsenic, beryllium, high levels of aluminum, and dangerous levels of bacteria from sources like urine. To avoid wasting money on products that don’t work and could be dangerous to your health, be aware of claims that sound too good to be true, do your research, and consult a doctor before using anything (especially if the product is one you ingest).&lt;/p&gt;
&lt;h2&gt;Home repair scams&lt;/h2&gt;
&lt;p&gt;An in-person scam, &lt;a href="https://www.aarp.org/money/scams-fraud/info-2019/home-improvement.html"&gt;fraudsters may appear on your doorstep posing as repairmen&lt;/a&gt; and offering their services to fix something they’ve just spotted, like broken gutters or clogged drain pipes. After you’ve agreed to the work, they’ll demand payment upfront, perform some unlicensed and/or shoddy work, and then reveal that the problem was more serious than they’d initially thought and that you’ll have to pay more for them to finish the job. Retirees can avoid being scammed by demanding to see a repairman’s references, signing a contract before any work has been completed, and not accepting unsolicited offers of work.&lt;/p&gt;
&lt;h2&gt;Reverse mortgage scams&lt;/h2&gt;
&lt;p&gt;&lt;a href="https://www.bankrate.com/mortgages/reverse-mortgage-scams/"&gt;Reverse mortgage scams&lt;/a&gt; are perhaps the most prevalent and dangerous scams aimed at senior citizens. These cons, run by real estate and financial professionals, intend to steal equity from older homeowners or coerce them into unwittingly stealing equity from flipped properties. To &lt;a href="https://reversemortgagealert.org/reverse-mortgage-scams/"&gt;avoid these scams&lt;/a&gt;, seek a housing counselor licensed by the U.S. Department of Housing and Urban Development before signing or agreeing to anything. Also watch out for unsolicited advertisements, never sign something you don’t understand, and be wary of anyone claiming you can do fantastic things (like own a home without a down payment or accept payments for a home you never purchased).&lt;/p&gt;
&lt;h2&gt;High-yield investment scams&lt;/h2&gt;
&lt;p&gt;Phony investment scams often play on retirees’ fears that they won’t have enough money to fund their retirements. High-yield investment scams, often run on the internet, promise investors incredible returns of 30% to 40% daily, weekly, or monthly. &lt;a href="https://www.investor.gov/protect-your-investments/fraud/types-fraud/high-yield-investment-programs"&gt;The U.S. Securities and Exchange Commission&lt;/a&gt; warns the public that offers to invest in “high-yield investment programs” are almost always scams and should be rejected.&lt;/p&gt;
&lt;h2&gt;Multilevel-marketing scams&lt;/h2&gt;
&lt;p&gt;Some retirees may wish to make a little extra money by starting a small business from home. In doing so, they are positioned to fall victim to &lt;a href="https://www.thebalancesmb.com/business-is-an-mlm-scam-1794756"&gt;multilevel marketing (MLM) scams&lt;/a&gt; or pyramid schemes. These scams, which &lt;a href="https://www.thebalancesmb.com/is-it-multilevel-marketing-or-a-pyramid-scheme-2947159"&gt;require you to sell a low-quality or non-existent product&lt;/a&gt; while simultaneously signing up others to do the same thing, often end up costing you more than you could ever make from them. Watch out for unfounded and over-the-top product claims, pressure to buy and stock inventory, and low BBB ratings—and steer clear of any businesses that give you a generally unsettled feeling.&lt;/p&gt;

&lt;p&gt;&lt;strong&gt;You may also like:&lt;/strong&gt; &lt;a href="https://thestacker.com/stories/2322/best-value-private-colleges-america?utm_source=12345"&gt;Best value private colleges in America&lt;/a&gt;&lt;/p&gt;
&lt;h2&gt;Sweepstakes scams&lt;/h2&gt;
&lt;p&gt;Winning that dream vacation, new car, or brand-new grill may sound like a dream come true—until it isn’t. &lt;a href="https://www.thebalanceeveryday.com/warning-signs-of-sweepstakes-scams-886996"&gt;Sweepstakes scams&lt;/a&gt; alert victims that they’ve won a sweepstakes or lottery and that they just need to provide some personal information or send a small amount of money to cover the taxes and fees to claim their prizes. In reality, there are no prizes, the money is going straight into a scammer’s pocket, and that personal information can now be used to steal your identity or hack into your bank accounts. Be wary of sweepstakes that require you to send money to claim a prize (especially money that must be sent via wire transfer), prizes for contests you don’t remember entering, and winnings from foreign lotteries.&lt;/p&gt;
&lt;h2&gt;Rolling lab scams&lt;/h2&gt;
&lt;p&gt;Many seniors rely on mobile diagnostic labs for their medical tests. While these rolling labs make health care more accessible, they can also be the &lt;a href="https://www.insurancefraud.org/scam-alerts-false-medical-claims.htm#scams"&gt;sites of major health insurance scams&lt;/a&gt;. Some of these labs provide fake or unnecessary testing before billing health insurance companies for expensive procedures. Victims can be left with drained coverage, increasing co-pays, and false medical records, all things that can take financial and emotional tolls. To avoid these scams, be sure to keep detailed records, review billing and summary statements, and know what your insurance does and does not cover.&lt;/p&gt;
&lt;h2&gt;Grandparent scams&lt;/h2&gt;
&lt;p&gt;Preying on grandparents’ love for their grandchildren, so-called &lt;a href="https://www.fraud.org/grandparent_scams"&gt;grandparent scams&lt;/a&gt; usually involve a con artist posing as a target’s grandchild. The con artist will call the target on the phone and explain that they’re in a lot of trouble, desperate for money to cover some last-minute bill, bail, or other made-up expense, and need a wire transfer immediately to get out of the jam. To ensure you aren’t getting scammed, and to avoid losing a large sum of money, be sure to call the “relative” on the other end of the line at a known phone number or verify the story with another family member before acting.&lt;/p&gt;
&lt;h2&gt;Social Security Advisory Board scams&lt;/h2&gt;
&lt;p&gt;In May 2019, the inspector general of Social Security warned about a new government &lt;a href="https://blog.ssa.gov/inspector-general-warns-public-about-social-security-advisory-board-related-scam/"&gt;employee impersonation scam involving the Social Security Advisory Board&lt;/a&gt;. The scam begins with an individual receiving a phone call that &lt;a href="https://www.fcc.gov/consumers/guides/spoofing-and-caller-id"&gt;displays the board’s phone number&lt;/a&gt;. Then, during these calls, a scammer tries to obtain that individual’s personal details, such as their Social Security number, birth date, address, etc. The inspector general emphasized that the board never contacts the general public over the phone to collect information and that government employees never take a threatening stance. If either of these things happens to you, hang up because you’re being scammed.&lt;/p&gt;
&lt;h2&gt;Sweetheart scams&lt;/h2&gt;
&lt;p&gt;In &lt;a href="https://www.nolo.com/legal-encyclopedia/elder-abuse-financial-scams-against-29822.html"&gt;sweetheart scams&lt;/a&gt;, con men&nbsp;pose as loving, attentive, potential suitors online, earning the trust of their targets and creating the illusion of happy, normal relationships. Playing on their targets’ trust, scammers convince individuals to turn over banking information, or other personal information, before draining the accounts and vanishing. The best way to avoid this scam is to never send money to someone you haven’t met in person no matter how much you may care for them.&lt;/p&gt;

</span><textarea data-dcnode-id="138" id="text-source-code">&lt;span data-dcnode-id="139" instrument_node=""&gt;Story name: Retirement scams to watch out for
Canonical URL: https://stacker.com/stories/3693/retirement-scams-watch-out
Written by: Madison Troyer
Description: In 2018, scam victims reported $1.48 billion in collective losses. Seniors, on average, lost more money to scams than any other age group. Stacker has rounded up 20 retirement scams to watch out for, from Medicaid scams to reverse mortgage scams, to ensure you keep your hard-earned money where it belongs—in your pocket.&nbsp;





Retirement scams to watch out for
Scams are on the rise. In 2018, the Federal Trade Commission announced it had collected 1.4 million fraud reports and that people had reported losing $1.48 billion to fraud—a 38% increase over the previous year. Younger people reported losing money to fraud more often than older people, with 43% of responders in their 20s confessed to losing money to scams. Only 15% of those in their 70s reported the same thing, but older people tended to lose more: The median loss for individuals in their 70s was $751; it was $400 for people in their 20s.

Senior citizens targets for&nbsp;fraud&nbsp;for many reasons, according to the FBI. First, seniors often have large “nest eggs,” own their own homes, or have good credit, making them appealing targets for con artists. In addition, seniors may take longer to realize that they’ve been scammed and they take longer to report it, both of which make it easier for scammers to succeed. Finally, individuals who grew up during the 1930s, ‘40s, and ‘50s tend to be more polite and trusting, characteristics fraudsters exploit.

In light of this, Stacker rounded up 20 retirement scams seniors should watch out for. Using independently verified sources, we highlight some of the most common and dangerous scams that target the elderly. From Medicare scams, to reverse mortgage scams, to counterfeit anti-aging product schemes, these scams can be both financially and emotionally draining.

Those who believe they have been victimized by a scam should file a complaint with their local police department, as well as with the Federal Trade Commission. A complete list of where to report scams, based on the type of fraud involved, can be found on USA.gov.

You may also like: Best places to retire on the East Coast
Medicare Beneficiary Identifier scams
To cut down on Medicare scams, the federal Centers for Medicare &amp;amp; Medicaid Services rolled out new cards for beneficiaries earlier this year. These cards no longer display beneficiaries’ Social Security numbers; instead, they bear a random Medicare Beneficiary Identifier (MBI). However, scammers still are finding ways to gain users’ personal information—such as asking you for your MBI to “activate” the card, or offering a plastic upgrade from the paper card that’s sent out as long as you provide personal information (Social Security numbers, birth dates).

Don’t fall prey to this scam: Know that Medicare employees will never call you without being invited to do so and that your insurance coverage cannot be canceled simply because you don’t provide vital information over the phone.
Instagram scams
Social media is a popular place for scammers to run their cons, especially those that target older users who might not be tech-savvy. For example, scammers who use Instagram will view the photos and videos you like and accounts you follow, and then try to hook you with a scam based on your interests. If you follow accounts that post photos exclusively of Paris, for example, someone might send you a direct message offering cheap tickets to the city. But when you click on the link to claim your tickets and provide your personal or banking information, the link will steal it. The best way to avoid this scam is by not responding to any unsolicited direct messages or to direct messages coming from individuals you don’t know.
Funeral frauds
Many older Americans will prearrange or prepay for their funerals to save loved ones from additional financial and emotional burdens. Knowing this, scammers will often overcharge for their services or listing themselves as the financial beneficiary of an individual. Laws regulating the industry vary state to state, but shrewd individuals can ensure they won’t be scammed by shopping around, reading all contracts and purchasing agreements carefully, and making sure cancellation terms are explicitly spelled out before signing.
Counterfeit prescription drug scams
Using targeted ads, scammers may post ads for prescription drugs at super-low prices. Buyers should be aware that these drugs may be contaminated, have no active ingredient, or include the wrong dosage of active ingredients. Avoid being scammed by not purchasing medications from unlicensed pharmacies or those without the Verified Internet Pharmacy Practice Site (VIPPS) seal. Examining the product closely and asking your doctor or pharmacist about any concerns are other ways to make sure you aren’t putting dangerous medications into your body.
Social Security Administration phishing scams
Many seniors use the my Social Security portal to access their Social Security benefits and manage their personal information. Scammers who know this have begun sending “phishing” emails that contain malware to steal personal information or coerce individuals into providing it willingly. These emails often warn retirees that something is wrong with their account and that it will be frozen if they don’t act immediately. Before clicking any links or sending any personal information, be sure to check the URL included in the email—real government websites only end in .gov or .gov/. Anything else is a scam.

You may also like: Can you answer these real Jeopardy questions about the economy?
Telemarketing scams
Telemarketing scams vary, but the core of the scams is almost always the same: You’ll receive an unsolicited call from a company, public utility, or government agency claiming that you’ve either won a prize, qualified for a steep discount on a product, or that there’s a serious problem.

The scammer will pressure you into acting now to get you to provide vital personal information that will allow them access to your bank accounts, or convince you to wire them money directly. These scams can be hard to identify, but general hallmarks include pressuring you to act faster than you’d like, not answering questions, and offering you deals that are too good to be true.
Charity scams
In a similar vein to telemarketing scams, charity scams solicit money for fake charities, usually via telephone. To ensure you aren’t being duped into lining someone’s pockets rather than helping a good cause, always research a charity before donating (websites like Charity Navigator are great for this), and never donate with cash, gift cards, or via wire transfer. In addition, make sure you know exactly how a charity plans to use your donation—ask for specifics and be wary of sentimental claims.
Advance fee scams
Also similar to telemarketing scams, advance-fee scams can take many forms. Usually, they require an individual to send a little money “upfront,” in anticipation of receiving something of much greater value, like found money or investment earnings. To make sure you don’t fall victim to advance fee scams, avoid offers that sound too good to be true or business that is handled in unprofessional ways (i.e. dropping an envelope full of cash at a specific destination).
Vacation rental scams
Many seniors choose to spend their retirement traveling, which can lead to falling prey to vacation rental scams. Scammers will concoct an entire vacation rental listing, down to the details, promising great amenities or a lower-than-normal price if you book now. Then, when excited vacationers show up at the property, they find it doesn’t exist. Watch out for super-cheap rates in prime locations, make sure to get a copy of the contract before sending money, and never wire money to cover the rental fee.
Computer technical support services scams
In 2018, the Federal Trade Commission began warning the public that computer technical support service scams were on the rise. In these scams, cons claiming to be from well-known technology companies call targets (often seniors), claiming that their security software had expired, leaving them open to hackers who could steal their personal information. They then sell them overpriced, outdated security software, and steal the target’s personal information themselves as they are installing it. Asking lots of questions, not being rushed into anything, and doing independent research are the best ways to avoid this scam.

You may also like: The best school district in every state
Fraudulent anti-aging product scams
The volume of fraudulent anti-aging products entering the United States is increasing, according to the FBI. These products, usually sold online, generally come from businesses headquartered outside the country and can include dangerous ingredients like arsenic, beryllium, high levels of aluminum, and dangerous levels of bacteria from sources like urine. To avoid wasting money on products that don’t work and could be dangerous to your health, be aware of claims that sound too good to be true, do your research, and consult a doctor before using anything (especially if the product is one you ingest).
Home repair scams
An in-person scam, fraudsters may appear on your doorstep posing as repairmen and offering their services to fix something they’ve just spotted, like broken gutters or clogged drain pipes. After you’ve agreed to the work, they’ll demand payment upfront, perform some unlicensed and/or shoddy work, and then reveal that the problem was more serious than they’d initially thought and that you’ll have to pay more for them to finish the job. Retirees can avoid being scammed by demanding to see a repairman’s references, signing a contract before any work has been completed, and not accepting unsolicited offers of work.
Reverse mortgage scams
Reverse mortgage scams are perhaps the most prevalent and dangerous scams aimed at senior citizens. These cons, run by real estate and financial professionals, intend to steal equity from older homeowners or coerce them into unwittingly stealing equity from flipped properties. To avoid these scams, seek a housing counselor licensed by the U.S. Department of Housing and Urban Development before signing or agreeing to anything. Also watch out for unsolicited advertisements, never sign something you don’t understand, and be wary of anyone claiming you can do fantastic things (like own a home without a down payment or accept payments for a home you never purchased).
High-yield investment scams
Phony investment scams often play on retirees’ fears that they won’t have enough money to fund their retirements. High-yield investment scams, often run on the internet, promise investors incredible returns of 30% to 40% daily, weekly, or monthly. The U.S. Securities and Exchange Commission warns the public that offers to invest in “high-yield investment programs” are almost always scams and should be rejected.
Multilevel-marketing scams
Some retirees may wish to make a little extra money by starting a small business from home. In doing so, they are positioned to fall victim to multilevel marketing (MLM) scams or pyramid schemes. These scams, which require you to sell a low-quality or non-existent product while simultaneously signing up others to do the same thing, often end up costing you more than you could ever make from them. Watch out for unfounded and over-the-top product claims, pressure to buy and stock inventory, and low BBB ratings—and steer clear of any businesses that give you a generally unsettled feeling.

You may also like: Best value private colleges in America
Sweepstakes scams
Winning that dream vacation, new car, or brand-new grill may sound like a dream come true—until it isn’t. Sweepstakes scams alert victims that they’ve won a sweepstakes or lottery and that they just need to provide some personal information or send a small amount of money to cover the taxes and fees to claim their prizes. In reality, there are no prizes, the money is going straight into a scammer’s pocket, and that personal information can now be used to steal your identity or hack into your bank accounts. Be wary of sweepstakes that require you to send money to claim a prize (especially money that must be sent via wire transfer), prizes for contests you don’t remember entering, and winnings from foreign lotteries.
Rolling lab scams
Many seniors rely on mobile diagnostic labs for their medical tests. While these rolling labs make health care more accessible, they can also be the sites of major health insurance scams. Some of these labs provide fake or unnecessary testing before billing health insurance companies for expensive procedures. Victims can be left with drained coverage, increasing co-pays, and false medical records, all things that can take financial and emotional tolls. To avoid these scams, be sure to keep detailed records, review billing and summary statements, and know what your insurance does and does not cover.
Grandparent scams
Preying on grandparents’ love for their grandchildren, so-called grandparent scams usually involve a con artist posing as a target’s grandchild. The con artist will call the target on the phone and explain that they’re in a lot of trouble, desperate for money to cover some last-minute bill, bail, or other made-up expense, and need a wire transfer immediately to get out of the jam. To ensure you aren’t getting scammed, and to avoid losing a large sum of money, be sure to call the “relative” on the other end of the line at a known phone number or verify the story with another family member before acting.
Social Security Advisory Board scams
In May 2019, the inspector general of Social Security warned about a new government employee impersonation scam involving the Social Security Advisory Board. The scam begins with an individual receiving a phone call that displays the board’s phone number. Then, during these calls, a scammer tries to obtain that individual’s personal details, such as their Social Security number, birth date, address, etc. The inspector general emphasized that the board never contacts the general public over the phone to collect information and that government employees never take a threatening stance. If either of these things happens to you, hang up because you’re being scammed.
Sweetheart scams
In sweetheart scams, con men&nbsp;pose as loving, attentive, potential suitors online, earning the trust of their targets and creating the illusion of happy, normal relationships. Playing on their targets’ trust, scammers convince individuals to turn over banking information, or other personal information, before draining the accounts and vanishing. The best way to avoid this scam is to never send money to someone you haven’t met in person no matter how much you may care for them.
