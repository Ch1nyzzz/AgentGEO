</span><p data-dcnode-id="1114"><span data-dcnode-id="1127" instrument_node="">It used to be that when you wanted to</span><a data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/how-to-find-cheap-apartments-for-rent-guide/"><span data-dcnode-id="1126" instrument_node=""> find an apartment for rent</span></a><span data-dcnode-id="1124" instrument_node="">,</span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/benefits-of-buying-a-slightly-used-car/"><span data-dcnode-id="1123" instrument_node=""> buy a used car</span></a><span data-dcnode-id="1121" instrument_node="">, or pick up used,</span><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/things-buy-used-secondhand/"><span data-dcnode-id="1120" instrument_node=""> secondhand items</span></a><span data-dcnode-id="1118" instrument_node=""> like furniture or a washer and dryer, you looked in the classified section of the newspaper. Nowadays, if you’re looking for any of these things, the best place to look is probably</span><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//craigslist.org/" target="_blank"><span data-dcnode-id="1117" instrument_node=""> Craigslist</span></a><span data-dcnode-id="1115" instrument_node="">, an online classified site categorized by city or region.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">However, the technology that has made it easier to find what you need has also made it easier for scammers to take advantage of the unsuspecting. Craigslist is a perfect example of that. On any day of the week, you can find hundreds of local listings that include apartment and home rentals, cars for sale, concert and play tickets, jobs, and every conceivable secondhand item you can think of. But scammers are creative and have put together elaborate ruses to trick even the savviest buyer.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">The good news is that you don’t have to avoid Craigslist and all of its wonderful opportunities to avoid being “taken.” You just need to know what to look for. Here’s a rundown of the most common Craigslist scams, the red flags that often accompany them, and advice on how to avoid them.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><h2 data-dcnode-id="1105" id="home-and-apartment-rental-scams"><span data-dcnode-id="1106" instrument_node="">Home and Apartment Rental Scams</span></h2><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1103" instrument_node="">If you don’t plan to use a</span><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/find-real-estate-agent-realtor/"><span data-dcnode-id="1102" instrument_node=""> real estate agent</span></a><span data-dcnode-id="1100" instrument_node=""> to look for a house or apartment, be on high alert for scammers. Avoid becoming a victim by understanding how they operate and what types of tactics they use. First, we’ll look at the various scams and then we’ll talk about how to avoid them.</span></p><div class="money-content" data-dcnode-id="1088" id="money-490915510"><div data-dcnode-id="1089" style="border:1px solid #CACACA; padding:20px; margin-bottom:20px;"><img data-dcnode-id="1098" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2019/02/the-motley-fool-logo-300x82.png&amp;raw" width="125px"><br data-dcnode-id="1097"><span data-dcnode-id="1090" style="font-size:15px; line-height:160%;"><span data-dcnode-id="1096" instrument_node="">Motley Fool Stock Advisor recommendations have an </span><strong data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">average return of 618%</span></strong><span data-dcnode-id="1093" instrument_node="">. For $79 (or just $1.52 per week), join more than 1 million members and don't miss their upcoming stock picks. 30 day money-back guarantee. </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/motley-fool-stock-advisor/incontent" rel="nofollow" style="text-decoration:underline;" target="_blank"><span data-dcnode-id="1092" instrument_node="">Sign Up Now</span></a></span></div></div><span data-dcnode-id="1087" instrument_node="">
</span><h3 data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">1. The Popular Home or Apartment</span></h3><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">In this insidious scam, the “landlord” will list a home or apartment at an unbelievably great price. They’ll feature photos of an adorable place with the desired amenities. Of course, they’ll have dozens of people respond to the ad and most will want to snatch it up before it’s gone.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1080" instrument_node="">This landlord is all too willing to please everyone too. In fact, the scammer will collect</span><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/help-security-deposits-laws-refunds-deductions/"><span data-dcnode-id="1079" instrument_node=""> security deposits</span></a><span data-dcnode-id="1077" instrument_node="">, first and last month’s rent, and other fees from anyone who’s interested. Then, the scammer will skip town — or maybe maybe never lived in town in the first place. The problem comes when all the renters try to move in and discover the home was never that landlord’s to rent in the first place.</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1074" instrument_node="">A slight variation of this scam occurs when the crook rents a house or apartment with the intention of re-renting it to multiple people. In 2018, a Kentucky woman was accused of relieving two would-be renters of $800 each after convincing them to put down security deposits on a unit she didn’t own, according to</span><a data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wkyt.com/content/news/Berea-woman-accused-of-stealing-1600-in-rental-scam-540564251.html" target="_blank"><span data-dcnode-id="1073" instrument_node=""> WKYT</span></a><span data-dcnode-id="1071" instrument_node="">.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><h3 data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">2. The Middleman</span></h3><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Sometimes the story is that the owner of the home or apartment is sick, out of the country, or otherwise unavailable and the property owner’s friend is helping out by renting the place on their behalf. This is called the middleman scam because renters never come into contact with the real owner of the property. If they did, they would quickly realize the property isn’t even for rent.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">After a renter pays the deposits and rent, the “friend” disappears and the renter is out the money and still has no place to live. This scam can also be pulled off by people overseas. They do it by finding a photo of a cute house, then listing it for rent. They target people relocating to a new city or town who can’t physically check out the house and won’t know it’s not located in the area claimed.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1059" instrument_node="">A variation on this scam occurs when the scammer pretends to be the apartment’s current occupant, rather than a middleman. In an alleged Michigan apartment scam uncovered by a reporter for the</span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freep.com/story/money/personal-finance/susan-tompor/2019/08/28/craigslist-detroit-rental-apartments/2085078001/" target="_blank"><span data-dcnode-id="1058" instrument_node=""> Detroit Free Press</span></a><span data-dcnode-id="1056" instrument_node="">, the scammer’s cover story involved a sudden job-related move.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><h3 data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">3. The Over-Anxious Renter</span></h3><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Rental scams don’t just target renters. They target landlords too.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">The most common variation on this scam involves a person who agrees to rent a house or apartment. As the landlord expects, this person sends a check or money order for the deposits, rent, and fees. So far, so good.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Then things go south. After the check is sent, however, they realize they “accidentally” sent too much and tell the landlord it has put them in a financial bind. They ask that the excess be wired back to them right away. What the landlord may not realize, however, is that the check or money order is no good. Whatever money they wire the scammer will be their own money, never to be seen again.</span></p><span data-dcnode-id="1042" instrument_node="">
</span><h3 data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">How to Avoid Craigslist Apartment Scams</span></h3><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1038" instrument_node="">Now that you understand the basics of how thieves take advantage of</span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/tips-tenant-landlords-find-apartment/"><span data-dcnode-id="1037" instrument_node=""> tenants</span></a><span data-dcnode-id="1035" instrument_node=""> and</span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/good-landlord-tips-advice-responsibilities/"><span data-dcnode-id="1034" instrument_node=""> landlords</span></a><span data-dcnode-id="1032" instrument_node="">, here’s how you can avoid becoming a victim.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><ul data-dcnode-id="999"><li data-dcnode-id="1023"><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Confirm Ownership of the Property</span></strong><span data-dcnode-id="1027" instrument_node="">. Make sure the landlord really owns the property. If it’s an apartment or condo, you can call the related association or</span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/property-management-companies-worth-cost/"><span data-dcnode-id="1026" instrument_node=""> property management company</span></a><span data-dcnode-id="1024" instrument_node=""> and ask whether you’re renting from the legitimate owner. If it’s a home, you’ll have to search the property records in the area that the house or apartment is located. If the names don’t match in either of these circumstances, you’re probably dealing with a scammer.</span></li><li data-dcnode-id="1012"><strong data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Check ID and Background</span></strong><span data-dcnode-id="1020" instrument_node="">. Get a copy of the landlord’s or tenant’s ID and call the local authorities to make sure it’s legitimate. If you’re a landlord, </span><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/screening-potential-tenants-questions-credit-background-check/"><span data-dcnode-id="1019" instrument_node="">screen potential tenants</span></a><span data-dcnode-id="1017" instrument_node=""> by thoroughly checking all personal and employer references, credit reports, and criminal histories through a background check before offering a lease. This can easily be done through a service like </span><a data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/go/rentprep" rel="nofollow" target="_blank"><strong data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">RentPrep</span></strong></a><span data-dcnode-id="1013" instrument_node="">.</span></li><li data-dcnode-id="1008"><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Do Some Online Sleuthing</span></strong><span data-dcnode-id="1009" instrument_node="">. Do a quick Google search on the person’s name. If you’re a prospective tenant, look up the address of the property you’re considering renting as well. If the person has scammed anyone else under the same name, you’ll probably find information about it online. Looking up the property could reveal that it has been involved in previous scams, along with other useful information like public safety complaints or code violations.</span></li><li data-dcnode-id="1004"><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Expect a Background Check If You’re a Would-Be Tenant</span></strong><span data-dcnode-id="1005" instrument_node="">. If the person you’re dealing with doesn’t ask you for an application or doesn’t care to screen tenants with a background check, you may be dealing with a scammer. The illegitimate landlords will seem to make renting and qualifying as easy for you as possible.</span></li><li data-dcnode-id="1000"><strong data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Don’t Allow Would-Be Tenants to Overpay You</span></strong><span data-dcnode-id="1001" instrument_node="">. If they overpay you, don’t release any funds back to them until their check or money order has cleared your account. Some thieves can produce fake personal checks, certified checks, or money orders so believable that they’ll even fool banks until the check is finally bounced back weeks later. If this happens, you’ll be responsible for any money you’ve used against the funds and, in some instances, you may even be held criminally responsible. They will likely pressure you to wire money beforehand to “pay them back,” but don’t give in unless you’re sure there’s no chance of the original check bouncing.</span></li></ul><span data-dcnode-id="998" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="997"><span data-dcnode-id="996" instrument_node="">
</span><h2 data-dcnode-id="994" id="car-buying-and-selling-scams"><span data-dcnode-id="995" instrument_node="">Car Buying and Selling Scams</span></h2><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="992" instrument_node="">It’s possible to save hundreds and sometimes thousands of dollars by</span><a data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/how-to-buy-car-tips/"><span data-dcnode-id="991" instrument_node=""> buying a car</span></a><span data-dcnode-id="989" instrument_node=""> in a</span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/sell-car-private-party-transaction/"><span data-dcnode-id="988" instrument_node=""> private party transaction</span></a><span data-dcnode-id="986" instrument_node=""> — from an individual rather than from a</span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/buying-new-car-vs-used-car/"><span data-dcnode-id="985" instrument_node=""> car dealership</span></a><span data-dcnode-id="983" instrument_node=""> or car lot. Many buyers and sellers use Craigslist to facilitate these transactions.</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Unfortunately, so do scammers looking to dupe unwitting people on either side of the transaction. Here’s an overview of how these scams occur and tips to avoid falling for them.</span></p><span data-dcnode-id="978" instrument_node="">
</span><h3 data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">1. Fake Funds</span></h3><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Con artists are experts at producing fraudulent checks, money orders, and cashier’s checks. Some car owners have found that out the hard way after they release their car to such a buyer, only for the check to bounce or come back as a fraud. The seller is out a car with no real way to trace the buyer’s identity or location.</span></p><span data-dcnode-id="972" instrument_node="">
</span><h3 data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">2. The Accidental Check</span></h3><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">As in the housing-related version of this scam, buyers pay the seller with a cashier’s check or money order that looks real and then suddenly “realize” they paid too much. This usually happens with buyers who claim to be overseas or otherwise unable to meet with the seller in person.</span></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">After claiming to realize their mistake, the buyer asks the seller to send a wire transfer for the overage and asks the seller to arrange to have the car picked up by a middleman (pick-up agent). By the time the seller realizes they’re holding a fake check, they’ve lost the money they wired to the buyer as well as their car.</span></p><span data-dcnode-id="963" instrument_node="">
</span><h3 data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">3. The Out-of-Town Seller</span></h3><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="959" instrument_node="">This scam is similar to the “accidental check” scheme but without the claims of overpayment. It usually begins with a seller listing a car at an unbelievable price. This person has a sob story to tell interested buyers: Maybe they are going through a</span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/divorce-costs-types/"><span data-dcnode-id="958" instrument_node=""> costly divorce</span></a><span data-dcnode-id="956" instrument_node=""> and need to get rid of the car fast or have been transferred overseas and can’t afford to have the car shipped or registered to the new locale.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Whatever the story, it justifies the low price and the buyer thinks they’re getting a great deal. But because the seller is out of the country, the buyer will have to wire funds to them in order to take possession of the car. You can imagine what happens next: The seller disappears with the money and the car is nowhere to be found.</span></p><span data-dcnode-id="951" instrument_node="">
</span><h3 data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">4. The Safe Deal (Escrow Fraud)</span></h3><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">It’s a little scary to send thousands of dollars to someone you don’t know and then trust them to send you the item. Con artists know this as well as anyone. To assuage buyers’ hesitation about wiring money before taking possession of a car, scammers might offer to do a “safe” transaction using an intermediary known as an online escrow service. They tell the buyer to send funds via Western Union to the escrow account where they will be held until the buyer picks up the car.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Sounds good, doesn’t it? The problem comes when a spoof email — one that mimics a legitimate site — is sent to the buyer from the supposedly secure escrow site. The email directs the buyer to a similar-looking fake site that siphons the buyer’s funds into an account that the seller controls. From there, you can guess what happens: The seller disappears with the money and the buyer is left with no money, no car, and wounded pride.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Escrow scams aren’t limited to private automotive transactions, by the way. Fake escrow sites entrap online buyers seeking all sorts of big-ticket items. Proceed with extreme caution whenever a seller suggests conducting the transaction through a particular escrow site or other secure intermediary, especially if they seem fixated on pushing it on you.</span></p><span data-dcnode-id="939" instrument_node="">
</span><h3 data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">How to Avoid Craigslist Automotive Scams</span></h3><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Despite all the dirty deals, it’s still possible to make a good, legitimate car deal on Craigslist. But you have to mind these warning signs and understand how to avoid potential scams before it’s too late.</span></p><span data-dcnode-id="933" instrument_node="">
</span><ul data-dcnode-id="901"><li data-dcnode-id="929"><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">The Deal Sounds Too Good to Be True</span></strong><span data-dcnode-id="930" instrument_node="">. If a deal sounds too good to be true, it probably is. The way con artists lure people into their scams is by offering irresistible deals.</span></li><li data-dcnode-id="925"><strong data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">The Buyer or Seller Doesn’t Want to Meet</span></strong><span data-dcnode-id="926" instrument_node="">. If you can’t meet face-to-face with the buyer or seller in person because they’re out of the country or are sick, or for any other reason, don’t proceed with the deal. Likewise, use extreme caution as a buyer if the seller demands to use an online escrow service of their own choosing.</span></li><li data-dcnode-id="921"><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">The Transaction Involves Overseas Money Transfers</span></strong><span data-dcnode-id="922" instrument_node="">. This is a bright, flashing warning sign that the transaction is fraudulent. Never, ever agree to transfer money overseas using Western Union, MoneyGram, or any other money transfer service as part of a Craigslist transaction supposedly taking place in the United States.</span></li><li data-dcnode-id="917"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">The Buyer or Seller Communicates Urgency</span></strong><span data-dcnode-id="918" instrument_node="">. If your counterparty insists that you complete the transaction immediately because someone else is looking at the car or they have to sell it in a hurry, take a breath and think twice about proceeding. Scammers use a sense of urgency to force buyers to do things they wouldn’t normally do if they had enough time to think it through.</span></li><li data-dcnode-id="913"><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">The Buyer or Seller Doesn’t Have a Contact Number</span></strong><span data-dcnode-id="914" instrument_node="">. If the buyer or seller insists on using only the anonymous email address provided by Craigslist and won’t give you a working phone number, assume the worst.</span></li><li data-dcnode-id="909"><strong data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Never Use the Seller’s Preferred Escrow Site</span></strong><span data-dcnode-id="910" instrument_node="">. There are legitimate escrow companies out there that provide great service. If you want to use one, pick it yourself. Never do business with a company you’ve never heard of, no matter how legitimate the site looks. In fact, if the seller suggests one, counter it with a different site you know and trust. If you never hear from the seller again, you’ll know you just avoided a scam.</span></li><li data-dcnode-id="902"><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Evaluate Escrow Sites Carefully</span></strong><span data-dcnode-id="906" instrument_node="">. If you don’t yet have a preferred escrow service, carefully evaluate your options. Do they have contact information other than just email? If so, call and talk to them. Is English their first language? How about the content on the site — is it full of grammatical errors and difficult to understand? When you Google their business and domain name, what do you find? Use the</span><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dfpi.ca.gov/10-tips-to-avoid-online-escrow-fraud/" target="_blank"><span data-dcnode-id="905" instrument_node=""> California Department of Financial Protection &amp; Innovation</span></a><span data-dcnode-id="903" instrument_node="">‘s guide to escrow fraud for further guidance.</span></li></ul><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">Ultimately, your best bet might be to avoid Craigslist’s automotive section entirely. Other popular car-buying and -selling websites, such as</span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ebay.com/b/Auto-Parts-and-Vehicles/6000" target="_blank"><span data-dcnode-id="898" instrument_node=""> eBay Motors</span></a><span data-dcnode-id="896" instrument_node="">, are less susceptible to fraud.</span></p><span data-dcnode-id="894" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="893"><span data-dcnode-id="892" instrument_node="">
</span><h2 data-dcnode-id="890" id="the-fake-ticket-or-event-pass-scam"><span data-dcnode-id="891" instrument_node="">The Fake Ticket or Event Pass Scam</span></h2><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="888" instrument_node="">Craigslist is a great place to look for tickets to sold-out concerts,</span><a data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/where-buy-cheap-discount-sports-tickets-online/"><span data-dcnode-id="887" instrument_node=""> sporting events</span></a><span data-dcnode-id="885" instrument_node="">, and other exclusive outings for which tickets aren’t available through regular channels.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Unfortunately, many offers of tickets and event passes for sale on Craigslist are fraudulent. Well-funded con artists with access to high-quality printing equipment can easily create tickets or passes that look exactly like the real thing, sometimes down to the hard-to-duplicate watermark or reflective backing.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="879" instrument_node="">When genuine, these credentials are worth many hundreds or even thousands of dollars — for example, season tickets and</span><a data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/sideline-passes-nfl-games/"><span data-dcnode-id="878" instrument_node=""> sideline passes</span></a><span data-dcnode-id="876" instrument_node=""> for an NFL franchise — and the seller prices them accordingly. But when the buyer tries to use them, they’re told that the tickets aren’t real.</span></p><span data-dcnode-id="874" instrument_node="">
</span><h3 data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">How to Avoid Fake Ticket Scams on Craigslist</span></h3><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">If you don’t want to be taken for a ride when purchasing tickets from Craigslist, here’s how to protect yourself.</span></p><span data-dcnode-id="868" instrument_node="">
</span><ul data-dcnode-id="851"><li data-dcnode-id="864"><strong data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Know What You’re Buying</span></strong><span data-dcnode-id="865" instrument_node="">. Scammers without the ability to print out an exact replica of the tickets they’re selling will instead print out one-size-fits-all tickets for a variety of events and change the names, dates, times, and fine print accordingly. Because most people don’t know what the tickets should look like, they don’t recognize the subterfuge and plow ahead with the fraudulent transaction. To protect yourself, do two things. First, make sure you know what the ticket is supposed to look like using a Google image search to confirm. Second, study the seating plan of the event venue to confirm that the ticket has the right seat numbers and letters on it.</span></li><li data-dcnode-id="860"><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Ask for an Original Receipt or Invoice</span></strong><span data-dcnode-id="861" instrument_node="">. If the seller can’t offer you proof that they bought the tickets with an invoice or receipt, then they probably never did. Ask for proof of purchase from the seller and tell them you want a copy of it. Next, call the event’s ticket seller and make sure the tickets were paid for. This is especially wise if you are buying a season’s worth of tickets because many times a scammer will show you a receipt that, upon careful examination, will show only a few tickets that have actually been paid for.</span></li><li data-dcnode-id="856"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Verify the Seller</span></strong><span data-dcnode-id="857" instrument_node="">. When a person buys season tickets, they’ll be assigned an account number that should match their name. If you’re buying season tickets, ask the seller for this information and then call the vendor, which will either be the team or ticket agent. Make sure the person you’re dealing with has an account and that the tickets they are trying to sell you are valid. If the seller balks at this, that means the tickets are likely fake and you should call off the deal.</span></li><li data-dcnode-id="852"><strong data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Avoid Buying Tickets Through the Mail</span></strong><span data-dcnode-id="853" instrument_node="">. Always meet in person to physically exchange tickets or passes and payment. Too much can go wrong when buying through the mail, and the seller is just as likely to abscond with your funds than to even bother sending you fake tickets.</span></li></ul><span data-dcnode-id="850" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="849"><span data-dcnode-id="848" instrument_node="">
</span><h2 data-dcnode-id="846" id="job-scams"><span data-dcnode-id="847" instrument_node="">Job Scams</span></h2><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Looking for a job is tough enough, but if you get scammed in your job search, it can be downright disheartening. That’s exactly what happens to some job seekers who answer ads on Craigslist. If you’re looking for a job online, read about what to avoid below.</span></p><span data-dcnode-id="842" instrument_node="">
</span><h3 data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">1. The Nanny Job</span></h3><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Some scammers post jobs for nannies and babysitters, targeting the young and inexperienced. They claim they’re moving to the area and need someone to look after their children. They generally offer a nice salary, but not outrageous enough to ring any alarm bells. Once they “hire” someone, they’ll mail them a check along with instructions about exactly what to do with the money. These instructions might be things like buying groceries for the new house, taking out an amount for their salary, and paying the rent to the new landlord.</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">And that’s the scam. The check the scammer sends the employee is fake and the “landlord,” if they exist, is a part of the scam. The employee covers the requested expenses from their own account, expecting to rely on the employer’s check to get whole. By the time the check bounces, the “employer” is nowhere to be found, and the unsuspecting employee is out hundreds or thousands of dollars of their own money.</span></p><span data-dcnode-id="833" instrument_node="">
</span><h3 data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">2. The Payments Job</span></h3><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">In this underhanded scheme, a dodgy “employer” claims they’re having difficulty receiving payments from their customers because of trouble with their bank or even their country’s financial regulations. They’ll offer to pay a percentage of each sale to someone who will receive payments into their account, take out their cut, and then wire the balance to the employer. Of course, the received payments will bounce and the person will be out any money they wired.</span></p><span data-dcnode-id="827" instrument_node="">
</span><h3 data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">How to Avoid Craigslist Job Scams</span></h3><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">The guidelines for avoiding job-related Craigslist scams should be familiar at this point. They include:</span></p><span data-dcnode-id="821" instrument_node="">
</span><ul data-dcnode-id="802"><li data-dcnode-id="817"><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Never Wire Money As Part of a Job Offer</span></strong><span data-dcnode-id="818" instrument_node="">. No matter how eager you are to land a paying job, rule out any job listings that include phrases like “wire money” or “cash a check.” These are invariably scams.</span></li><li data-dcnode-id="810"><strong data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Never Spend Your Own Money for an Employer You Haven’t Met</span></strong><span data-dcnode-id="814" instrument_node="">. A legitimate employer should never ask you to use your own funds to cover job-related expenses without providing detailed guidance on how and when you’ll be reimbursed. And an employer should never, ever ask you to use your own bank account to complete business transactions. They should have their own</span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/best-business-bank-account-promotions/"><span data-dcnode-id="813" instrument_node=""> business bank account</span></a><span data-dcnode-id="811" instrument_node=""> for that.</span></li><li data-dcnode-id="803"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Research Would-Be Employers</span></strong><span data-dcnode-id="807" instrument_node=""> </span><strong data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Online</span></strong><span data-dcnode-id="804" instrument_node="">. Thoroughly research your employers using the name they give you and their company. Employers and companies with thin or nonexistent online footprints are just as likely to be fake as real. Pay attention to customer or employee reviews and complaints as well. Even if the company is real, a pattern of Better Business Bureau complaints or legal entanglements shouldn’t inspire confidence.</span></li></ul><span data-dcnode-id="801" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="800"><span data-dcnode-id="799" instrument_node="">
</span><h2 data-dcnode-id="797" id="fake-craigslist-guarantee"><span data-dcnode-id="798" instrument_node="">Fake Craigslist Guarantee</span></h2><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Craigslist is a great site that allows buyers and sellers to come together even if they don’t live in the same city. But many Craigslist users don’t realize that site management doesn’t get involved in users’ transactions or prevent them from occurring except when listings clearly and flagrantly violate U.S. law — for example, by advertising illegal weapons or human organs for sale — or violate Craigslist’s own terms of service.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">That leaves an opening for scam artists whose con lies in convincing Craigslist buyers that their transactions are approved and protected or insured by the company. Spoiler alert: They’re not.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Fake Craigslist guarantee scams typically work something like this. After making first contact with the seller, the buyer receives an official-looking email that appears to come from Craigslist. The email assures the buyer that Craigslist has researched the seller and approved the transaction as safe. Craigslist is so confident that the seller is legit that it’s willing to offer a buyer protection service if something does go wrong.</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">The catch, of course, is that the buyer must pay for this service by wiring money or providing payment card information through a “secure” payment portal. The entire exercise is a setup to take the buyer’s money or steal their credit card. Craigslist does not offer buyer protection, period, so you can safely assume that any offer of such a service is fraudulent. Report the offending listing to Craigslist right away. After all, it certainly qualifies as a violation of Craigslist’s terms of service, if not U.S. law.</span></p><span data-dcnode-id="784" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="783"><span data-dcnode-id="782" instrument_node="">
</span><h2 data-dcnode-id="780" id="fake-craigslist-site"><span data-dcnode-id="781" instrument_node="">Fake Craigslist Site</span></h2><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="778" instrument_node="">The simplest Craigslist scam of all is also one of the easiest to avoid. Con artists have created spoof sites that are made to look exactly like Craigslist but are in actuality designed only to take your money. So, be certain you’re on the authentic Craigslist site whenever you make a transaction. The official website address is </span><span class="skimlinks-unlinked" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">http://www.craigslist.org</span></span><span data-dcnode-id="775" instrument_node="">/ — any other URL is not the real deal.</span></p><span data-dcnode-id="773" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="772"><span data-dcnode-id="771" instrument_node="">
</span><h2 data-dcnode-id="769" id="final-word"><span data-dcnode-id="770" instrument_node="">Final Word</span></h2><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="761"><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneycrashers.com/how-sell-your-stuff-ebay-craigslist-amazon/"><span data-dcnode-id="767" instrument_node="">Buying and selling on Craigslist</span></a><span data-dcnode-id="765" instrument_node=""> can be an awesome experience. For example, you can find deals you couldn’t otherwise locate in your local area. As long as you pay attention to the details of each transaction and stay aware of the signs that alert you to possible scams, you should be fine. If you believe you have come across a scam, mark it as such at the top of the page and email Craigslist at abuse@</span><span class="skimlinks-unlinked" data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">craigslist.org</span></span><span data-dcnode-id="762" instrument_node="">.</span></p><span data-dcnode-id="760" instrument_node="">
