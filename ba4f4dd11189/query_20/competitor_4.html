lass="input-group-append" data-dcnode-id="397"><button class="btn btn-link" data-dcnode-id="398" id="search-clear-addon" type="button"><span class="sr-only" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Search</span></span><span aria-hidden="true" class="icon-search" data-dcnode-id="399" title="Search"></span></button></div></div></form></div></div></div></div></div></div></nav><div class="mm-spacing" data-dcnode-id="387"></div><div class="container mm-spacing" data-dcnode-id="210"><h1 data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">ALERT: Current Scams To Watch Out For</span></h1><div class="app-container" data-dcnode-id="226"><div class="row" data-dcnode-id="227"><div class="col-md-8" data-dcnode-id="291"><div class="app-container" data-dcnode-id="338"><div class="card--basic no-border card" data-dcnode-id="339"><div class="card-body" data-dcnode-id="340"><div class="card-text" data-dcnode-id="341"><h2 data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Job Recruiter Impersonation</span></h2><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Job recruiter fraud is a scam by impostors posing as recruiters or representatives of a company promoting fake job opportunities to job seekers. The scam is conducted through online communication and affects all types of companies, regardless of their size, across the United States.</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">MassMutual understands the importance of your privacy. We will never ask job candidates to pay any kind of fee, make cash or check advancements, cash checks from outside sources, or make an investment in any product or service. We will never ask candidates to supply information, such as credit card numbers, banking PIN numbers, by email or online.</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Please be aware that it is likely a form of fraud if you receive requests like the ones described below.</span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Current Fraud schemes include:</span></p><span data-dcnode-id="370" instrument_node="">
</span><ul data-dcnode-id="352"><li data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Individuals posing as recruiters from the actual company.</span></li><span data-dcnode-id="367" instrument_node="">
</span><li data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Creating fake recruiting pages or job postings on sites such as LinkedIn and Google Hangouts.</span></li><span data-dcnode-id="364" instrument_node="">
</span><li data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Using different channels such as Facebook Messenger, LinkedIn, or Skype to connect with potential victims.</span></li><span data-dcnode-id="361" instrument_node="">
</span><li data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Contacting candidates for interviews and making fake job offers.</span></li><span data-dcnode-id="358" instrument_node="">
</span><li data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Convincing candidates to buy home office equipment from a fake vendor website, requesting money via Venmo for license fees, or requesting a deposit ($300) before their company-issued laptop is issued.</span></li><span data-dcnode-id="355" instrument_node="">
</span><li data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Sending checks to the victim as part of a money laundering scheme.</span></li></ul><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="348"><strong data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">What to do:</span></strong></p><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="346" instrument_node="">Please </span><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//massmutual.onit.com/portals/apps/60d0dd94e1e77b433d005696/atoms/new" target="_blank"><span data-dcnode-id="345" instrument_node="">contact us</span></a><span data-dcnode-id="343" instrument_node=""> if your think someone is using MassMutual to seek this information from you.</span></p></div></div></div></div><div class="app-container" data-dcnode-id="292"><div class="card--basic no-border card" data-dcnode-id="293"><div class="card-body" data-dcnode-id="294"><div class="card-text" data-dcnode-id="295"><h2 data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Counterfeit Checks</span></h2><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Massachusetts Mutual Life Insurance Company (MassMutual) is aware that certain individuals may have received counterfeit checks with MassMutual's name or logo on them. Communication with potential victims varies and includes mail delivered by the U.S. Postal Service, telephone, e-mail, and overnight delivery services.</span></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">The counterfeit checks are often associated with the following:</span></p><span data-dcnode-id="329" instrument_node="">
</span><ul data-dcnode-id="321"><span data-dcnode-id="328" instrument_node="">
</span><li data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Sweepstakes, mystery shopper, participation in a paid consumer research program, proposed employment as a consumer service evaluator or other advance-fee schemes where the communications request recipients to send money in order to receive the prize or money promised.</span></li><span data-dcnode-id="325" instrument_node="">
</span><li data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Merchandise sold over the Internet or through the mail where the buyers' checks exceed the agreed upon sales price and the purchasers instruct the sellers to send the balance back.</span></li><span data-dcnode-id="322" instrument_node="">
</span></ul><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">MassMutual is not affiliated in any way with these fraudulent activities or with the counterfeit checks, which have absolutely no value.</span></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="314"><strong data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">What to do:</span></strong></p><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">If you are suspicious about any check you receive with MassMutual's name or logo on it, you can call MassMutual's Treasury Bank Reconciliation Unit at (413) 744-3330 to verify the check's authenticity.</span></p><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">If you discover that you received a counterfeit check or notification via mail delivered by the U.S. Postal Service or telephone, consider filing a mail fraud complaint with your local Postmaster or directly with the U.S. Postal Inspection Service at&nbsp;United States Postal Inspection Service.</span></p><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">If you discover that you received a counterfeit check via UPS, FedEx, or other non-Postal Service overnight delivery service and communications or solicitation have involved the Internet or e-mail, consider filing a complaint with the Federal Trade Commission at&nbsp;FTC Bureau of Consumer Protection - Consumer Information&nbsp;or with the&nbsp;FBI's Internet Crime Unit at Internet Crime Complaint Center (IC3).</span></p><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">You should also consider filing a complaint with your local police department.</span></p><span data-dcnode-id="301" instrument_node="">
