mall business loan scams—and the COVID-19 pandemic has made businesses even more vulnerable.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1042" instrument_node="">Thieves and hackers running business loan scams capitalize on business owners’ desire for quick, affordable funding. These con artists try to steal money, personal information, and business information by pretending to be respected brands, bankers, and other people you trust, like </span><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/business-loans/guides/small-business-loan-broker" rel="noopener" target="_blank"><span data-dcnode-id="1041" instrument_node="">small business loan brokers</span></a><span data-dcnode-id="1039" instrument_node="">.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Most scammers will attempt to contact you online, through email, websites, or search engine ads. But those aren’t the only ways. Phone fraud, text fraud, and direct mail fraud are other channels for scammers. Your best defense is to remain cautious whenever someone asks you for more money, personal information, or non-public business information.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Here are common business loan scams to watch out for, and if you do fall victim to a scam, how to report the incident and get back on your feet.</span></p><span data-dcnode-id="1031" instrument_node="">
</span></div></div></div><div class="v_j" data-dcnode-id="1022"><div class="v_bw" data-dcnode-id="1023"><div class="v_J m_2" data-dcnode-id="1024"><p data-dcnode-id="1026"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="1027" data-source="https://www.youtube.com/embed/WYUpr3c8j6A" frameborder="0" height="315" width="560"></iframe></p><span data-dcnode-id="1025" instrument_node="">
</span></div></div></div><h2 class="g_H" data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">9 Common Small Business Loan Scams</span></h2><div class="v_j" data-dcnode-id="983"><div class="v_bw" data-dcnode-id="984"><h3 class="v_bz" data-dcnode-id="1018" id="1.%20Advance%20Fee%20Scams"><span data-dcnode-id="1019" instrument_node="">1. Advance Fee Scams</span></h3><div class="v_J m_2" data-dcnode-id="987"><p data-dcnode-id="1013"><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">What It Sounds Like:</span></strong><em data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node=""> “Business loans starting at 0% interest! No credit, low credit, and bankruptcy okay. Low application fee to get started!”</span></em></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">An advance fee scam is when an individual or company promises easy access to low-cost debt in exchange for an upfront payment. The scammer might call the payment an “application fee,” a “processing fee,” or a “one-time fee.” Whatever the label, the motive is the same: The scammer is asking you to put money down before they can approve you for a loan.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1008" instrument_node="">These scammers entice you to pay the fee by promising that anyone can qualify for their low-interest loan products. These “lenders” often claim that a poor credit history or bankruptcy won’t prevent you from getting a low-rate loan. This is definitely a red flag. Most lenders, with the exception of extremely expensive </span><a data-dcnode-id="1006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/business-loans/guides/merchant-cash-advance-companies" rel="noopener" target="_blank"><span data-dcnode-id="1007" instrument_node="">merchant cash advance companies</span></a><span data-dcnode-id="1005" instrument_node="">, have credit score minimums and restrictions on former bankruptcies. At the end of the day, the lower your credit score, the more you’ll have to pay in interest.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Although you should be wary of advance fee scams, you should know that legitimate lenders might also charge upfront fees. For instance, banks often charge upfront application fees, credit check fees, underwriting fees, and origination fees before closing on your business loan.</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="999" instrument_node="">The key is who you’re working with. Legitimate and trustworthy online lenders like </span><a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/business-loans/lender-reviews/ondeck-reviews" rel="noopener" target="_blank"><span data-dcnode-id="998" instrument_node="">OnDeck</span></a><span data-dcnode-id="996" instrument_node=""> and </span><a data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/business-loans/lender-reviews/bluevine-reviews" rel="noopener" target="_blank"><span data-dcnode-id="995" instrument_node="">BlueVine</span></a><span data-dcnode-id="993" instrument_node=""> have also been immensely valuable to small business owners.</span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Lending platforms like Fundera pre-vet the lenders on their network, so you know that only legitimate lenders are receiving your information and money. If you come across a lender online who you’ve never heard of, and they ask for your money right away, steer clear.</span></p><span data-dcnode-id="988" instrument_node="">
</span></div><a class="v_K" data-dcnode-id="985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/apply-for-a-loan%23/questionnaire" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="986" instrument_node="">Find Lenders With Fundera</span></a></div></div><div class="v_j" data-dcnode-id="919"><div class="v_bw" data-dcnode-id="920"><h3 class="v_bz" data-dcnode-id="981" id="2.%20Peer%20Lending%20Scams"><span data-dcnode-id="982" instrument_node="">2. Peer Lending Scams</span></h3><div class="v_J m_2" data-dcnode-id="921"><p data-dcnode-id="975"><img alt="Peer-to-peer lending business loan scam" class="lazyload size-full wp-image-35429" data-dcnode-id="980" data-src="https://assets-blog.fundera.com/assets/wp-content/uploads/2017/09/18133805/Reddit-loan-scam-example.png" height="450" width="850"><br data-dcnode-id="979"><span data-dcnode-id="978" instrument_node="">
</span><em data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Peer-to-peer lending scams on platforms like Reddit have become more common.</span></em></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="967"><b data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">What It Sounds Like:</span></b><span data-dcnode-id="971" instrument_node=""> </span><i data-dcnode-id="968"><span data-dcnode-id="969" style="font-weight: 400;"><span data-dcnode-id="970" instrument_node="">Message on Craigslist, Facebook Messenger, Reddit, or other platform that says something like, “Low-interest rate loans up to $100K. Low credit and bankruptcy not a problem. All borrowers eligible. Apply NOW!”</span></span></i></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="964" style="font-weight: 400;"><span data-dcnode-id="965" instrument_node="">Verified peer-to-peer lending platforms such as </span></span><a data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/business-loans/lender-reviews/lending-club-reviews" rel="noopener" target="_blank"><span data-dcnode-id="962" style="font-weight: 400;"><span data-dcnode-id="963" instrument_node="">Lending Club</span></span></a><span data-dcnode-id="959" style="font-weight: 400;"><span data-dcnode-id="960" instrument_node=""> and </span></span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/business-loans/lender-reviews/funding-circle-reviews" rel="noopener" target="_blank"><span data-dcnode-id="957" style="font-weight: 400;"><span data-dcnode-id="958" instrument_node="">Funding Circle</span></span></a><span data-dcnode-id="954" style="font-weight: 400;"><span data-dcnode-id="955" instrument_node=""> have become an increasingly popular avenue for business loan funding. These platforms draw on the power of numbers. Each site has thousands of investors who can decide to buy a loan or a portion of a loan that meets their desired credit standards. So instead of having a bank or company as your lender, dozens of investors collectively act as your lender.</span></span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="950" style="font-weight: 400;"><span data-dcnode-id="951" instrument_node="">Trustworthy peer lending platforms can be a great way for business owners to obtain financing. Unfortunately, unscrupulous “peer lenders” use social platforms—think Craigslist, Facebook Messenger, even </span></span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatlantic.com/business/archive/2016/05/reddit-borrow-peer-loan/481698/" rel="noopener" target="_blank"><span data-dcnode-id="948" style="font-weight: 400;"><span data-dcnode-id="949" instrument_node="">Reddit</span></span></a><span data-dcnode-id="945" style="font-weight: 400;"><span data-dcnode-id="946" instrument_node="">—to take advantage of unsuspecting business owners.</span></span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" style="font-weight: 400;"><span data-dcnode-id="942" instrument_node="">The typical peer lending scam often looks very similar to the advance fee scam we described above. The difference is that the solicitation comes from an individual offering a peer loan instead of from a phony business. These peer lenders will usually ask you for some kind of upfront payment to secure your loan—or to conduct a background check. That means, along with taking your money, these supposed peer lenders could also be requesting sensitive personal data—such as your full name, date of birth, and Social Security number—to complete their phony background checks.</span></span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="937" style="font-weight: 400;"><span data-dcnode-id="938" instrument_node="">If you fall prey to a peer lending small business loan scam, the supposed lender can steal both your money </span></span><i data-dcnode-id="934"><span data-dcnode-id="935" style="font-weight: 400;"><span data-dcnode-id="936" instrument_node="">and </span></span></i><span data-dcnode-id="932" style="font-weight: 400;"><span data-dcnode-id="933" instrument_node="">your identity. And once they have the money or information they want from you, you’ll never hear from them again.</span></span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="928" style="font-weight: 400;"><span data-dcnode-id="929" instrument_node="">To avoid this scam, rely only on reputable peer lending platforms when considering any peer-to-peer borrowing opportunity. Never use a money wiring service like Western Union for a business loan (these services offer much thinner fraud protections than banks), and never offer payment up front for any reason.</span></span><a data-dcnode-id="924" href="#sources"><sup data-dcnode-id="925"><span data-dcnode-id="926" style="font-weight: 400;"><span data-dcnode-id="927" instrument_node="">[1]</span></span></sup></a></p><span data-dcnode-id="922" instrument_node="">
</span></div></div></div><div class="v_j" data-dcnode-id="895"><div class="v_bw" data-dcnode-id="896"><h3 class="v_bz" data-dcnode-id="917" id="3.%20Funding%20Kit%20Scams"><span data-dcnode-id="918" instrument_node="">3. Funding Kit Scams</span></h3><div class="v_J m_2" data-dcnode-id="897"><p data-dcnode-id="911"><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">What It Sounds Like:</span></strong><span data-dcnode-id="914" instrument_node=""> </span><em data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">“If you have received this email, you’ve been selected to receive a Government Funded Grant. This Grant Kit could put thousands of dollars in your pocket, INTEREST-FREE. Many grants go unclaimed every year, simply because most people don’t know about the programs they may qualify for. Don’t let this happen to you!”</span></em></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="909" instrument_node="">Some online loan providers want you to believe that obtaining a business loan is so complicated, you need to pay them to walk you through the process. Don’t buy this! This is one of many business loan scams. In this case, scammers might offer you insider tips or tricks to complete your business loan application, obtain special government grants, or qualify for some special </span><a data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/business-loans/guides/low-interest-business-loans" rel="noopener" target="_blank"><span data-dcnode-id="908" instrument_node="">low-interest business loan</span></a><span data-dcnode-id="906" instrument_node=""> product.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">The truth is that any and all information you need to obtain a business loan is readily available online—and for free—from verified online lenders, loan brokers, or marketplaces like Fundera. And you should be wary if you see “free” and “government grants” in the same sentence. With the exception of a few targeted grants for research and development companies and agriculture businesses, federal government agencies don’t offer free business grants. Plus, the US government will never call anyone to offer a grant. Information about government grants is available on the official website Grants.gov.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Have a specific question that you can’t find an answer to online? Any ethical lender or loan broker should be more than happy to answer your questions free of charge, providing you whatever information you need in order to make the right borrowing decision for your business. Anyone asking you to pay for information on obtaining a business loan or grant is simply taking advantage of your earnest search for information as a means to line their pocketbook.</span></p><span data-dcnode-id="898" instrument_node="">
</span></div></div></div><div class="v_j" data-dcnode-id="865"><div class="v_bw" data-dcnode-id="866"><h3 class="v_bz" data-dcnode-id="893" id="4.%20Credit%20Repair%20Scams"><span data-dcnode-id="894" instrument_node="">4. Credit Repair Scams</span></h3><div class="v_J m_2" data-dcnode-id="867"><p data-dcnode-id="887"><strong data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">What It Sounds Like:</span></strong><span data-dcnode-id="890" instrument_node="">&nbsp;</span><em data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">“Increase your credit score by 100+ points in less than 7 days! Lowest fees in the industry. 3-Way Disputes with Creditors, Credit Bureaus, and the FTC. Fast-Track Your Credit, and Sign Up Now!”</span></em></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Your credit history is the most important part of your financial record when you apply for a business loan, so scammers abound who claim to help you wipe out a poor credit history or raise your credit by hundreds of points overnight. These scams exist in the area of personal credit and business credit repair. New businesses are especially at risk for these scams because they haven’t built an extensive commercial credit history yet.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="882" instrument_node="">Although there are some legitimate credit repair companies, their services typically don’t add much value. You can do everything they are promising on your own for free. For instance, there’s a clear and simple government-mandated </span><a data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumer.ftc.gov/articles/0151-disputing-errors-credit-reports" rel="noopener" target="_blank"><span data-dcnode-id="881" instrument_node="">dispute process</span></a><span data-dcnode-id="879" instrument_node=""> for removing errors from your credit report—you don’t need anyone’s help and can do this for free. And there are plenty of actionable steps you can take on your own to improve your credit score. If you really feel underwater and need some assistance, seek out the Justice Department’s </span><a data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/ust/list-credit-counseling-agencies-approved-pursuant-11-usc-111" rel="noopener" target="_blank"><span data-dcnode-id="878" instrument_node="">list of approved credit counselors</span></a><span data-dcnode-id="876" instrument_node="">.</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">Don’t believe anyone who says that they are going to increase your credit score by hundreds of points overnight. Also beware of anyone pressuring you for upfront fees to improve your credit or who promises to remove negative but true information from your credit report (that’s not possible). Improving credit can take weeks, even months of financial discipline. The good news is that you don’t necessarily have to wait for the perfect credit score to apply for a business loan. There are plenty of legitimate lenders willing to work with you even if you have </span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/business-loans/guides/bad-credit-business-loans" rel="noopener" target="_blank"><span data-dcnode-id="872" instrument_node="">bad credit or a short credit history</span></a><span data-dcnode-id="870" instrument_node="">.</span></p><span data-dcnode-id="868" instrument_node="">
</span></div></div></div><div class="v_j" data-dcnode-id="838"><div class="v_bw" data-dcnode-id="839"><h3 class="v_bz" data-dcnode-id="863" id="5.%20Ghost%20Investors"><span data-dcnode-id="864" instrument_node="">5. Ghost Investors</span></h3><div class="v_J m_2" data-dcnode-id="840"><p data-dcnode-id="857"><strong data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">What It Sounds Like:</span></strong><span data-dcnode-id="860" instrument_node=""> </span><em data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">“We have a potential investor lined up for your business based on your business plan. Over $1 million of funding, in your bank account within 24 hours! No need to give up ownership! Just send in your $1,000 transaction fee!”</span></em></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">While not technically a business loan scam, this is another con job waiting to hit anyone on the market for business funding. In this scenario, the scammer will pose as an “agent” for a large foundation or financial fund, or even as a wealthy angel investor who is interested in funding your business.</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">But instead of inviting you to make a pitch, they will try to collect sensitive financial information from you online. They might ask for your Social Security number (to conduct a “background check”), your business’s tax ID number, legal papers, or financial statements. Again, as with advance fee scams, the supposed “investor” might ask for an upfront fee.</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Not only is this scam taking your hard earned money for an investment opportunity that will never come to pass—but these scammers are also gathering personal information about you and your business that can later be used for identity theft and other forms of fraud!</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="846" instrument_node="">Many of these scammers prowl websites that connect entrepreneurs with angel investors and venture capitalists. If you’re interested in finding legitimate investors for your business, expect to put in a lot of time and effort building connections, creating a pitch deck, and meeting with investors. Equity financing is not a get rich quick scheme and can actually take one year or more to pan out.</span><sup data-dcnode-id="843"><a data-dcnode-id="844" href="#sources"><span data-dcnode-id="845" instrument_node="">[2]</span></a></sup></p><span data-dcnode-id="841" instrument_node="">
</span></div></div></div><div class="v_j" data-dcnode-id="815"><div class="v_bw" data-dcnode-id="816"><h3 class="v_bz" data-dcnode-id="836" id="6.%20Swindling%20Loan%20Brokers"><span data-dcnode-id="837" instrument_node="">6. Swindling Loan Brokers</span></h3><div class="v_J m_2" data-dcnode-id="817"><p data-dcnode-id="831"><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">What It Sounds Like:</span></strong><em data-dcnode-id="832"><span data-dcnode-id="833" instrument_node=""> “Starting a small business? Need a Consultant or Agent to work for YOU? We can help! Best fees in the industry!”</span></em></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">This all-too-common business loan scam looks very similar to the advance fee scam, with the exception that the phony business in question is not a lender, but a broker promising to connect you with a reputable lender.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">A loan broker’s role is to help you find the right loan product for your business, prepare the necessary paperwork for your application, and connect you with lenders who will be a good fit for your business’s needs.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">While this is a lawful service available from verified loan brokers, the service becomes a scam anytime a loan broker asks you to pay upfront for their services. Ethical loan brokering services work on a commission-based model in which the broker obtains a percentage of the total loan after closing. And the best services take their cut directly from the lender and at no cost to you.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Any loan broker who asks you to pay up front is at best charging you for a service that you should be able to get for free—and at worst planning to take your money and run.</span></p><span data-dcnode-id="818" instrument_node="">
</span></div></div></div><div class="v_j" data-dcnode-id="790"><div class="v_bw" data-dcnode-id="791"><h3 class="v_bz" data-dcnode-id="813" id="7.%20SBA%20Loan%20Scams"><span data-dcnode-id="814" instrument_node="">7. SBA Loan Scams</span></h3><div class="v_J m_2" data-dcnode-id="792"><p data-dcnode-id="807"><strong data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">What It Sounds Like:</span></strong><span data-dcnode-id="810" instrument_node=""> </span><em data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">“The SBA cannot issue your loan until you verify your business’s information. Click this link to enter your banking information so your money won’t be delayed.”</span></em></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">The U.S. Small Business Administration backs loans offered by banks, credit unions, and online lenders. That large pool of providers is great for business owners, but it also gives con artists many ways to try and take advantage of you.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">SBA loan scams can use any number of the elements already discussed, including upfront payments, excessive fees, or guaranteed loan approvals. With unprecedented government funding for small businesses due to the COVID-19 pandemic, business owners need to be extra vigilant to avoid potential con artists.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="799" instrument_node="">Among other scams, the SBA advises business owners to watch out for email phishing attempts.</span><a data-dcnode-id="796" href="#sources"><sup data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">[3]</span></sup></a><span data-dcnode-id="795" instrument_node="">&nbsp;Suspect fraud if you’re contacted by someone who claims to be from the SBA but does not come from an @sba.gov email. Do not automatically trust an email because it includes the SBA logo—check the sender’s email address—and watch for any messages that send you to a third-party website to enter personal information.</span></p><span data-dcnode-id="793" instrument_node="">
</span></div></div></div><h2 class="g_H" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Business Loan Scams to Avoid After Obtaining Financing</span></h2><div class="v_j" data-dcnode-id="776"><div class="v_bw" data-dcnode-id="777"><div class="v_J m_2" data-dcnode-id="778"><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">You might think that you’re out of the woods once you obtain your business loan. But there are scammers who prey on people who already have a loan.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="784" instrument_node="">Avoid these common scams </span><em data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">after</span></em><span data-dcnode-id="781" instrument_node=""> you’ve obtained a business loan:</span></p><span data-dcnode-id="779" instrument_node="">
</span></div></div></div><div class="v_j" data-dcnode-id="749"><div class="v_bw" data-dcnode-id="750"><h3 class="v_bz" data-dcnode-id="774" id="1.%20Debt%20Relief%20Scams"><span data-dcnode-id="775" instrument_node="">1. Debt Relief Scams</span></h3><div class="v_J m_2" data-dcnode-id="751"><p data-dcnode-id="768"><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">What It Sounds Like:</span></strong><span data-dcnode-id="771" instrument_node=""> </span><em data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">“Struggling with loan payments? Get out of debt with affordable monthly payments. Guaranteed, 48-hour approval!”</span></em></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Debt relief scammers have one main target: people who are having trouble keeping up with their loan payments. These scammers might promise to cut your loan payment in half or forgive your outstanding debt. They will likely ask for your personal information and business information so that they can “analyze” your credit standing and current debt. Some might even ask for bank account numbers, so they can start the process of “transferring” your debt. In addition, they might ask for an upfront fee.</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="763" instrument_node="">You should be on high alert if a lender offers “guaranteed approval” or promises to “get you out of debt.” Legitimate debt relief solutions, such as </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/business-loans/guides/business-debt-consolidation-loan" rel="noopener" target="_blank"><span data-dcnode-id="762" instrument_node="">debt consolidation</span></a><span data-dcnode-id="760" instrument_node=""> and </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/business-loans/guides/refinance-business-loan" rel="noopener" target="_blank"><span data-dcnode-id="759" instrument_node="">refinancing</span></a><span data-dcnode-id="757" instrument_node="">, don’t reduce your debt level. Debt consolidation simplifies your monthly payments by combining multiple loans into one loan with one monthly payment—for example, three $20,000 loans become one $60,000 loan. Refinancing lets you lower your monthly payment by getting you into a lower-interest loan or longer-term loan.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">The best thing to do if you’re struggling with loan payments is to contact your lender. Your lender can work with you to lower your payments, for example by extending your repayment term or putting you on a payment plan. Refinancing and debt consolidation can also help, as long as you’re going through a legitimate lender.</span></p><span data-dcnode-id="752" instrument_node="">
</span></div></div></div><div class="v_j" data-dcnode-id="724"><div class="v_bw" data-dcnode-id="725"><h3 class="v_bz" data-dcnode-id="747" id="2.%20Debt%20Collection%20Scams"><span data-dcnode-id="748" instrument_node="">2. Debt Collection Scams</span></h3><div class="v_J m_2" data-dcnode-id="726"><p data-dcnode-id="740"><b data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">What It Sounds Like:</span></b><span data-dcnode-id="744" instrument_node=""> </span><i data-dcnode-id="741"><span data-dcnode-id="742" style="font-weight: 400;"><span data-dcnode-id="743" instrument_node="">Phone conversation where debt collector harasses you, demands immediate payment, or makes threats of arrest for unpaid debt. They might say things like “I’m giving you two hours to pay back this loan” or “I am going to issue a warrant for your arrest if I don’t receive payment right now.”</span></span></i></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" style="font-weight: 400;"><span data-dcnode-id="738" instrument_node="">If you take out a small business loan but are unable to pay the loan back, the lender will contact you. So if you fall behind on payments, how can you tell the difference between a legitimate debt collector and a scammer?</span></span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" style="font-weight: 400;"><span data-dcnode-id="734" instrument_node="">The main red flag is if the caller uses unusually harsh or high-pressure tactics to try to get you to pay the outstanding debt. Legitimate lenders will usually try to work out a payment plan with you if you can’t afford a loan. They want to keep your business and avoid the hassle of taking you to court.</span></span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" style="font-weight: 400;"><span data-dcnode-id="730" instrument_node="">But scammers might pose as the police or threaten to take legal action against you if you don’t pay immediately. In addition, if the caller doesn’t seem to know details about your loan, such as the outstanding balance or the interest rate, that’s another red flag. You should never pay any delinquent debt unless you have a notice in writing showing the outstanding loan amount and the name of the creditor.</span></span></p><span data-dcnode-id="727" instrument_node="">
</span></div></div></div><h2 class="g_H" data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Watch out for These Signs of a Business Loan Scam</span></h2><div class="v_j" data-dcnode-id="713"><div class="v_bw" data-dcnode-id="714"><div class="v_J m_2" data-dcnode-id="715"><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">As you can see, there are a whole host of ways that well-meaning business owners can be duped by con artists looking to make a quick buck. What we’ve highlighted above are the eight most common business loan scams—but these aren’t the only forms of business loan fraud that you might encounter. Every day, criminals come up with new and creative ways to waste your time while stealing your money and your personal information.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">To help you avoid these and other business loans scams, here are some common warning signs to look out for when considering any business funding opportunity:</span></p><span data-dcnode-id="716" instrument_node="">
</span></div></div></div><ul class="bg_2" data-dcnode-id="569"><li data-dcnode-id="699"><div class="bH_fQ" data-dcnode-id="700"><div class="bf_dl" data-dcnode-id="701"><div class="bF_fK" data-dcnode-id="702"><div class="bf_dk" data-dcnode-id="703"><h3 class="bg_bd" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">1. Unsolicited Contact</span></h3><div class="content-card__body m_2" data-dcnode-id="704"><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Cold calling isn’t a common method among credible small business lenders for connecting with new prospective borrowers.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">If you hear from someone out of the blue offering you a business loan and you’ve never initiated contact through an online form or any other method, consider that your first clue that something might be amiss.</span></p><span data-dcnode-id="705" instrument_node="">
</span></div></div></div></div></div></li><li data-dcnode-id="685"><div class="bH_fQ" data-dcnode-id="686"><div class="bf_dl" data-dcnode-id="687"><div class="bF_fK" data-dcnode-id="688"><div class="bf_dk" data-dcnode-id="689"><h3 class="bg_bd" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">2. Non-Traditional Advertising</span></h3><div class="content-card__body m_2" data-dcnode-id="690"><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Legitimate business lenders typically don’t advertise on Craigslist, personal Facebook messages, or yard signs on the side of the road. If you see marketing messages for a business loan that look out of place,</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">it’s probably because they are—and the person sharing that advertising is up to no good. This is a good way to avoid business loan scams.</span></p><span data-dcnode-id="691" instrument_node="">
</span></div></div></div></div></div></li><li data-dcnode-id="649"><div class="bH_fQ" data-dcnode-id="650"><div class="bf_dl" data-dcnode-id="651"><div class="bF_fK" data-dcnode-id="652"><div class="bf_dk" data-dcnode-id="653"><h3 class="bg_bd" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">3. Money Requested Up Front</span></h3><div class="content-card__body m_2" data-dcnode-id="654"><p data-dcnode-id="675"><span data-dcnode-id="681" style="font-weight: 400;"><span data-dcnode-id="682" instrument_node="">We’ve said this before, but it’s worth reiterating. You should never—</span></span><i data-dcnode-id="678"><span data-dcnode-id="679" style="font-weight: 400;"><span data-dcnode-id="680" instrument_node="">ever</span></span></i><span data-dcnode-id="676" style="font-weight: 400;"><span data-dcnode-id="677" instrument_node="">—give someone money up front for the purpose of a business loan. Not for a credit check. Not for a brokering service. Not for an application or processing fee.</span></span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="672" style="font-weight: 400;"><span data-dcnode-id="673" instrument_node="">There is </span></span><i data-dcnode-id="669"><span data-dcnode-id="670" style="font-weight: 400;"><span data-dcnode-id="671" instrument_node="">no</span></span></i><span data-dcnode-id="667" style="font-weight: 400;"><span data-dcnode-id="668" instrument_node=""> reason that you should ever be required to </span></span><i data-dcnode-id="664"><span data-dcnode-id="665" style="font-weight: 400;"><span data-dcnode-id="666" instrument_node="">pay</span></span></i><span data-dcnode-id="662" style="font-weight: 400;"><span data-dcnode-id="663" instrument_node=""> money in order to </span></span><i data-dcnode-id="659"><span data-dcnode-id="660" style="font-weight: 400;"><span data-dcnode-id="661" instrument_node="">obtain</span></span></i><span data-dcnode-id="657" style="font-weight: 400;"><span data-dcnode-id="658" instrument_node=""> money for your business. If any lender, loan broker, investor, or platform asks you for any form of upfront payment, end the relationship immediately and move on.</span></span></p><span data-dcnode-id="655" instrument_node="">
</span></div></div></div></div></div></li><li data-dcnode-id="635"><div class="bH_fQ" data-dcnode-id="636"><div class="bf_dl" data-dcnode-id="637"><div class="bF_fK" data-dcnode-id="638"><div class="bf_dk" data-dcnode-id="639"><h3 class="bg_bd" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">4. Lack of Physical Address</span></h3><div class="content-card__body m_2" data-dcnode-id="640"><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Even online lenders who connect with their customers exclusively over the internet have a registered physical address for their headquarter offices that you can easily research and identify. In fact, listing a physical address is a legal requirement for sanctioned lending institutions—so if you’re questioning the credibility of a loan opportunity, asking for the business’s physical address is a great way to investigate whether or not this is just another business loan scam.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">If your point of contact won’t offer a physical address, gives you only a P.O. Box number, or if the address they provide doesn’t seem to match the business they claim to operate—that might be further evidence that your instincts were correct.</span></p><span data-dcnode-id="641" instrument_node="">
</span></div></div></div></div></div></li><li data-dcnode-id="621"><div class="bH_fQ" data-dcnode-id="622"><div class="bf_dl" data-dcnode-id="623"><div class="bF_fK" data-dcnode-id="624"><div class="bf_dk" data-dcnode-id="625"><h3 class="bg_bd" data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">5. Generic Email Address</span></h3><div class="content-card__body m_2" data-dcnode-id="626"><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Similarly, authorized lenders and loan brokers don’t use generic email addresses. If you’re receiving contact about a business loan from a Yahoo, Hotmail, or generic Gmail account, that’s a clear sign you’re being scammed.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Keep in mind, though, that the presence of a website or domain-associated email address doesn’t necessarily prove that a lender or a loan broker is the real deal.These days, anyone with modest technical skills can purchase a domain and set up a basic website that looks just like a real business.</span></p><span data-dcnode-id="627" instrument_node="">
</span></div></div></div></div></div></li><li data-dcnode-id="607"><div class="bH_fQ" data-dcnode-id="608"><div class="bf_dl" data-dcnode-id="609"><div class="bF_fK" data-dcnode-id="610"><div class="bf_dk" data-dcnode-id="611"><h3 class="bg_bd" data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">6. “Guaranteed” Approval</span></h3><div class="content-card__body m_2" data-dcnode-id="612"><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Among credible business lenders, there’s no such thing as “guaranteed” approval for a business loan prior to a credit check and financial review.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">If you see advertising or receive unsolicited contact for a business loan that makes any mention of “guaranteed approval,” you have most definitely encountered a business loan scam.</span></p><span data-dcnode-id="613" instrument_node="">
</span></div></div></div></div></div></li><li data-dcnode-id="593"><div class="bH_fQ" data-dcnode-id="594"><div class="bf_dl" data-dcnode-id="595"><div class="bF_fK" data-dcnode-id="596"><div class="bf_dk" data-dcnode-id="597"><h3 class="bg_bd" data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">7. High-Pressure Sales Tactics</span></h3><div class="content-card__body m_2" data-dcnode-id="598"><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Does the loan officer or broker you’re communicating with seem just a little bit too eager to sign the dotted line on your small business loan agreement? If you’re getting the slimy used-car salesman vibe, trust your instincts, take a pause, and research the validity of your business loan opportunity. This could be just another business loan scam.</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Credible or not, any loan representative who isn’t willing to give you a night to sleep on such an important decision isn’t someone you should be doing business with.</span></p><span data-dcnode-id="599" instrument_node="">
</span></div></div></div></div></div></li><li data-dcnode-id="570"><div class="bH_fQ" data-dcnode-id="571"><div class="bf_dl" data-dcnode-id="572"><div class="bF_fK" data-dcnode-id="573"><div class="bf_dk" data-dcnode-id="574"><h3 class="bg_bd" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">8. Terms Are Too Good to Be True</span></h3><div class="content-card__body m_2" data-dcnode-id="575"><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Simply put, does this funding opportunity just sound too good to be true? Is the interest rate dramatically lower than what you’ve seen elsewhere, or are you being offered funds outright before you’ve provided any information about financial history, your business plan, or how you intend to repay the loan?</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Don’t fall into the trap of these business loan scams!</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="584" instrument_node="">Our biggest piece of advice when considering whether a loan opportunity might be a scam? Trust your gut. And if in doubt, go a different direction. There are enough legitimate, verifiable </span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/business-loans/guides/alternative-lending" rel="noopener" target="_blank"><span data-dcnode-id="583" instrument_node="">online lenders</span></a><span data-dcnode-id="581" instrument_node=""> out there for you to find the funding your business needs without wondering if you’re about to be swindled.</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">As long as you have a solid business plan and are in a financial position where it makes reasonable sense for you to be taking out a loan, you have every opportunity to get what you need without becoming the victim of a fraud.</span></p><span data-dcnode-id="576" instrument_node="">
</span></div></div></div></div></div></li></ul><h2 class="g_H" data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">What to Do If You're a Victim of a Business Loan Scam</span></h2><div class="v_j" data-dcnode-id="483"><div class="v_bw" data-dcnode-id="484"><div class="v_J m_2" data-dcnode-id="485"><p data-dcnode-id="564"><span data-dcnode-id="565" style="font-weight: 400;"><span data-dcnode-id="566" instrument_node="">After reading about these common small business loan scams, you might think that you would never fall for something like this. But even the savviest of business owners can make a mistake. As marketplace lending grows more complex and more lenders enter the small business loans space, you can’t be too careful. Scammers often masquerade as well-respected brands to get your money and information.</span></span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" style="font-weight: 400;"><span data-dcnode-id="562" instrument_node="">Certain groups are at especially high risk. Millennial business owners might not have enough experience with business ownership to avoid scams. Baby boomer, “second-career” business owners should also be careful to avoid scams, especially if the seed money for your business is coming out of your retirement savings. A wrong move, and you could lose your nest egg.</span></span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="557" style="font-weight: 400;"><span data-dcnode-id="558" instrument_node="">Business owners who are new to the country are another at-risk group. Adina Appelbaum, a lawyer and founder of </span></span><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//immigrantfinance.com/" rel="noopener" target="_blank"><span data-dcnode-id="555" style="font-weight: 400;"><span data-dcnode-id="556" instrument_node="">Immigrant Finance</span></span></a><span data-dcnode-id="552" style="font-weight: 400;"><span data-dcnode-id="553" instrument_node="">, says that “Predatory scammers often seek out new immigrants who want to start a business in the U.S. but who don’t have the capital to do so, offering </span></span><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/business-loans/merchant-cash-advance" rel="noopener" target="_blank"><span data-dcnode-id="550" style="font-weight: 400;"><span data-dcnode-id="551" instrument_node="">cash advance loans</span></span></a><span data-dcnode-id="547" style="font-weight: 400;"><span data-dcnode-id="548" instrument_node=""> with impossible terms. These loan sharks are also known to offer to help immigrants build credit or ‘fix’ their credit through questionable practices that end up just taking immigrants’ money.”</span></span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" style="font-weight: 400;"><span data-dcnode-id="544" instrument_node="">If you find yourself in the middle of a loan scam, your first steps will depend on whether the scammer stole your money, your personal/business information, or both.</span></span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" style="font-weight: 400;"><span data-dcnode-id="540" instrument_node="">Here’s what to do if you’re the victim of a business loan scam:</span></span></p><span data-dcnode-id="537" instrument_node="">
</span><ul data-dcnode-id="491"><span data-dcnode-id="536" instrument_node="">
</span><li aria-level="1" data-dcnode-id="521" style="font-weight: 400;"><b data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Report the scam to the federal government.</span></b><span data-dcnode-id="532" style="font-weight: 400;"><span data-dcnode-id="533" instrument_node=""> File a complaint with the Consumer Financial Protection Bureau (CFPB). The </span></span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumerfinance.gov/complaint/process/" rel="noopener" target="_blank"><span data-dcnode-id="530" style="font-weight: 400;"><span data-dcnode-id="531" instrument_node="">bureau will review your complaint</span></span></a><span data-dcnode-id="527" style="font-weight: 400;"><span data-dcnode-id="528" instrument_node=""> and publish it in a public Complaint Database. They might also take legal action against the scammer if enough people report the same kind of scam. For SBA loan scams, report any suspected fraud to the agency’s </span></span><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sba.gov/about-sba/oversight-advocacy/office-inspector-general/office-inspector-general-hotline" rel="noopener" target="_blank"><span data-dcnode-id="525" style="font-weight: 400;"><span data-dcnode-id="526" instrument_node="">Office of Inspector General</span></span></a><span data-dcnode-id="522" style="font-weight: 400;"><span data-dcnode-id="523" instrument_node="">.</span></span></li><span data-dcnode-id="520" instrument_node="">
</span><li aria-level="1" data-dcnode-id="515" style="font-weight: 400;"><b data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Call your local police.</span></b><span data-dcnode-id="516" style="font-weight: 400;"><span data-dcnode-id="517" instrument_node=""> File a complaint with your local police. They might not be able to do much to help if the scammer used untraceable methods, but when there’s a financial dispute, it’s helpful to have a police report on file.</span></span></li><span data-dcnode-id="514" instrument_node="">
</span><li aria-level="1" data-dcnode-id="504" style="font-weight: 400;"><b data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Report identity theft. </span></b><span data-dcnode-id="510" style="font-weight: 400;"><span data-dcnode-id="511" instrument_node="">If the scammer got your personal information and successfully applied for or used credit in your name, </span></span><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.identitytheft.gov/%23what-to-do-right-away" rel="noopener" target="_blank"><span data-dcnode-id="508" style="font-weight: 400;"><span data-dcnode-id="509" instrument_node="">report identity theft</span></span></a><span data-dcnode-id="505" style="font-weight: 400;"><span data-dcnode-id="506" instrument_node=""> to the Federal Trade Commission (FTC).</span></span></li><span data-dcnode-id="503" instrument_node="">
</span><li aria-level="1" data-dcnode-id="493" style="font-weight: 400;"><b data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Contact the credit bureaus.</span></b><span data-dcnode-id="499" style="font-weight: 400;"><span data-dcnode-id="500" instrument_node=""> If the scammer got your personal information, contact the credit bureaus and </span></span><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.transunion.com/fraud-victim-resource/place-fraud-alert" rel="noopener" target="_blank"><span data-dcnode-id="497" style="font-weight: 400;"><span data-dcnode-id="498" instrument_node="">place a fraud alert</span></span></a><span data-dcnode-id="495" instrument_node=""> on your file. This will alert prospective creditors and lenders that someone might be trying to use your identity to apply for credit. An initial credit alert expires in 90 days.</span><a data-dcnode-id="494" id="sources"></a></li><span data-dcnode-id="492" instrument_node="">
</span></ul><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" style="font-weight: 400;"><span data-dcnode-id="489" instrument_node="">By completing these steps, you can minimize the impact of business loan scams. You should also be extra vigilant going forward and work only with well-respected lenders and companies.</span></span></p><span data-dcnode-id="486" instrument_node="">
</span></div></div></div><div class="v_j" data-dcnode-id="457"><div class="v_bw" data-dcnode-id="458"><h3 class="v_bz" data-dcnode-id="481" id="Article%20Sources"><span data-dcnode-id="482" instrument_node="">Article Sources</span></h3><div class="v_J m_2" data-dcnode-id="459"><ol data-dcnode-id="461"><span data-dcnode-id="480" instrument_node="">
