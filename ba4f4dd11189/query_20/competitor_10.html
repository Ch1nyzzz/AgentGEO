t_node="">Angi</span></a></li><li class="" data-dcnode-id="423"><a data-dcnode-id="424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.angi.com/articles" title="Solution Center"><span data-dcnode-id="425" instrument_node="">Solution Center</span></a></li><li class="" data-dcnode-id="420"><a data-dcnode-id="421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.angi.com/articles/electrical" title="Electrical"><span data-dcnode-id="422" instrument_node="">Electrical</span></a></li></ol></div></div><div class="title-block row" data-dcnode-id="400"><div class="col-lg-offset-1 col-md-10 col-xs-12" data-dcnode-id="401"><h1 data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Shield Yourself From These 6 Electrician Scams</span></h1><div class="author" data-dcnode-id="406"><img alt="Rochel Maday" class="author__profile-img" data-dcnode-id="414" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.angi.com/s3fs-public/Rochel%2520Maday%2520headshot.jpg%3Fimpolicy%3Dthumbnail&amp;raw"><div class="author__info-box" data-dcnode-id="407"><div data-dcnode-id="410"><span data-dcnode-id="413" instrument_node="">Written by </span><a data-dcnode-id="411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.angi.com/articles/author/rochel-maday" id="article-author-name"><span data-dcnode-id="412" instrument_node="">Rochel Maday</span></a></div><div class="author__info-date" data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Updated November 17, 2021</span></div></div></div><figure class="photo-credit-image" data-dcnode-id="404"><img alt="fully furnished living room" data-dcnode-id="405" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.angi.com/s3fs-public/well-lit-living-room.jpg%3Fimpolicy%3DleadImage&amp;raw"></figure><div class="photo-credit" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Iriana Shiyan - stock.adobe.com</span></div></div></div><div class="article-page__primary-container row" data-dcnode-id="236"><div class="article-page__content-container col-md-offset-1 col-sm-7 col-sm-pull-0 col-xs-12" data-dcnode-id="237"><div class="article-page__main-content" data-dcnode-id="249"><section class="dek" data-dcnode-id="397"><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">These 6 tips will help you find an electrician who lights up your life</span></p></section><div class="srcta--postalcode" data-dcnode-id="380"><div class="srcta__title" data-dcnode-id="391"><span data-dcnode-id="396" instrument_node="">Get quotes from up to 3 </span><span data-dcnode-id="394" instrument_node="">pros</span><span data-dcnode-id="392" instrument_node="">!</span></div><div class="srcta__subtitle" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Enter a zip below and get matched to top-rated pros near you.</span></div><form action="https://match.angieslist.com/ext-cat/54" data-dcnode-id="381" method="POST" name="srFunnelForm"><input data-dcnode-id="388" id="pageType" name="category" type="hidden" value="electrical"><input data-dcnode-id="387" id="pageType" name="pageType" type="hidden" value="Content - Structured"><input data-dcnode-id="386" id="pageType" name="ctaType" type="hidden" value="Primary"><div class="form-group" data-dcnode-id="384"><input aria-describedby="srPostalCode-help" aria-label="ZIP Code" class="srcta__zipcode form-control arc-Input no-addon" data-dcnode-id="385" form="srFunnelForm" id="srPostalCode" placeholder="ZIP Code" sr-cta-postal-code="" type="text" value=""></div><button class="srcta__find-pros btn-primary btn btn-primary" data-dcnode-id="382" data-track-postalcode="" id="find-pros-postalcode-srcta-button" type="submit"><span data-dcnode-id="383" instrument_node="">Find pros</span></button></form></div><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Most electricians are honest and hardworking. They love their craft and enjoy helping their clients with electrical projects that make life more illuminating. But unfortunately, electrician scams aren’t unheard of. On the bright side (pun intended), most electrician scams are easy to spot once you know the red flags. A lightbulb should go off in your head (sorry, we had to) if you come across any of these sketchy behaviors.</span></p><h2 data-dcnode-id="376" id="6-electrician-scam-red-flags-to-watch-out-for"><span data-dcnode-id="377" instrument_node="">6 Electrician Scam Red Flags To Watch Out For</span></h2><h2 data-dcnode-id="374" id="1-they-overwhelm-you-with-jargon"><span data-dcnode-id="375" instrument_node="">1. They Overwhelm You With Jargon</span></h2><p data-dcnode-id="370"><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.angi.com/articles/5-things-check-hiring-electrician.htm" rel="follow" target="_self"><span data-dcnode-id="373" instrument_node="">Finding a great electrician</span></a><span data-dcnode-id="371" instrument_node=""> is key, and you know you’ve found a good one when they want to educate you on the basics of your project. If you come across an electrician who’s throwing every term in the electrician lingo book at you, along with multiple numbers and timelines, you’ll definitely want to get a second (and even third) quote. This type of scam relies on overwhelming the customer with intimidating jargon and worry, followed by pressure to sign a contract without getting another electrician’s input.</span></p><h2 data-dcnode-id="368" id="2-they-recommend-over-the-top-upgrades"><span data-dcnode-id="369" instrument_node="">2. They Recommend  Over-the-Top Upgrades</span></h2><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">You’re having an electrician quote you on a new outlet for your office when suddenly he’s walking you through how he’ll rewire your entire home at a discounted price. All homes, whether new construction or resales, go through rigorous inspections. It’s unlikely that your home needs extensive electrical work without your knowledge. An electrician who won’t stick to the original project could be trying to scam you for additional yet unwarranted work.</span></p><aside class="related-article" data-dcnode-id="354"><p class="related-article__static-title" data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Related Article</span></p><div class="related-article__content" data-dcnode-id="355"><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.angi.com/articles/how-verify-electricians-license.htm" id="related-article-img"><img alt="Woman screws in bulb on hanging light" data-dcnode-id="363" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.angi.com/s3fs-public/woman-light-bulb.jpeg%3Fimpolicy%3Dthumbnail&amp;raw"></a><div data-dcnode-id="356"><a class="related-article__title" data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.angi.com/articles/how-verify-electricians-license.htm" id="related-article-title"><span data-dcnode-id="361" instrument_node="">How To Find Out if an Electrician Is Licensed</span></a><div class="related-article__description" data-dcnode-id="357"><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Hiring a licensed electrician can help you be sure the job is done accurately and safely</span></p></div></div></div></aside><h2 data-dcnode-id="352" id="3-they-demand-full-payment-upfront"><span data-dcnode-id="353" instrument_node="">3. They Demand Full Payment Upfront</span></h2><p data-dcnode-id="347"><span data-dcnode-id="351" instrument_node="">Any professional, including an electrician, who asks for </span><b data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">100%</span></b><span data-dcnode-id="348" instrument_node=""> of their payment upfront may be a scammer. An electrician who wants to appear professional and trustworthy will work out a payment plan that allows them to secure materials and labor without asking you to risk your project’s completion.</span></p><h2 data-dcnode-id="345" id="4-they-only-communicate-via-email"><span data-dcnode-id="346" instrument_node="">4. They Only Communicate via Email</span></h2><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">When working with an electrician, you want to make sure you have all their contact information, including their email address, phone number and business address. Communicating through email may be convenient for non-time-sensitive issues, but it’s not helpful if you need to visit your electrician's office or connect about urgent matters. If their email sign-off has an address and phone number, make sure to verify them to avoid this scam.</span></p><h2 data-dcnode-id="341" id="5-they-quote-you-an-unusually-low-bid"><span data-dcnode-id="342" instrument_node="">5. They Quote You an Unusually Low Bid</span></h2><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">In an effort to get you to quickly sign a contract based solely on price, an electrician running this scam will quote you a suspiciously low price for the electrical work. Take heed—if the price sounds too good to be true, it probably is, and the electrician may have no intention of doing the project. Instead, they’ll take your down payment and head for the hills.</span></p><h2 data-dcnode-id="337" id="6-theyre-not-licensed-or-insured"><span data-dcnode-id="338" instrument_node="">6. They’re Not Licensed or Insured</span></h2><p data-dcnode-id="332"><span data-dcnode-id="336" instrument_node="">To avoid most types of electrician scams, never work with a professional who isn’t licensed. Electrician license requirements vary by state, so </span><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.coverwallet.com/business-tips/electrician-requirements-state" rel="nofollow" target="_blank"><span data-dcnode-id="335" instrument_node="">check out what your local jurisdiction requires</span></a><span data-dcnode-id="333" instrument_node=""> before choosing an electrician.</span></p><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Never work with an electrician who doesn’t carry general liability insurance. Also, make sure you verify their coverage with their insurance provider.</span></p><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Keep in mind that a professional contractor will never have an issue confirming their credentials, license, or insurance.</span></p><aside class="related-article" data-dcnode-id="316"><p class="related-article__static-title" data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Related Article</span></p><div class="related-article__content" data-dcnode-id="317"><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.angi.com/articles/electrician-hiring-guide.htm" id="related-article-img"><img alt="An electrician installing new lights" data-dcnode-id="325" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.angi.com/s3fs-public/Electrician-installing-lights.jpg%3Fimpolicy%3Dthumbnail&amp;raw"></a><div data-dcnode-id="318"><a class="related-article__title" data-dcnode-id="322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.angi.com/articles/electrician-hiring-guide.htm" id="related-article-title"><span data-dcnode-id="323" instrument_node="">How to Hire the Best Electrician for Your Project</span></a><div class="related-article__description" data-dcnode-id="319"><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Don't be shocked when hiring</span></p></div></div></div></aside><h2 data-dcnode-id="314" id="questions-to-ask-your-electrician"><span data-dcnode-id="315" instrument_node="">Questions to Ask Your Electrician</span></h2><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Once you’ve confirmed that your electrician is licensed and insured, and there are no obvious red flags that they’re a scammer, consider asking them the following questions for additional clarity.</span></p><h2 data-dcnode-id="310" id="whats-your-specialty"><span data-dcnode-id="311" instrument_node="">What’s Your Specialty?</span></h2><p data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Not all electricians take on all types of jobs. Some focus mainly on commercial work, while others work on residential projects. Some have very niche specialties, like solar panel installation or home automation. Make sure your potential contractor has experience with your specific project.</span></p><h2 data-dcnode-id="306" id="who-will-be-working-on-the-project"><span data-dcnode-id="307" instrument_node="">Who Will Be Working on the Project?</span></h2><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Some electricians provide a quote but then subcontract the work once a contract is signed, leaving your project in the hands of a potentially unqualified electrician. Confirm that the electrician quoting you is the pro who will complete the work from start to finish.</span></p><h2 data-dcnode-id="302" id="do-you-offer-a-guarantee"><span data-dcnode-id="303" instrument_node="">Do You Offer a Guarantee?</span></h2><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">It’s rare for electrical work to be guaranteed forever, but the longer a warranty or guarantee, the more you can trust the pro’s performance.</span></p><h2 data-dcnode-id="298" id="what-permits-do-i-need-and-who-will-get-them"><span data-dcnode-id="299" instrument_node="">What Permits Do I Need and Who Will Get Them?</span></h2><p data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Most types of electrical projects require a permit. It’s always ideal for the contractor to pull a permit. Never work with a contractor who wants to skirt around permits.</span></p><h2 data-dcnode-id="294" id="what-to-look-for-in-a-contract"><span data-dcnode-id="295" instrument_node="">What to Look for in a Contract</span></h2><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Not all electricians use the same contract format,but there are some basic points to look for when moving forward with a project. Don’t sign a contract unless it includes:</span></p><ul data-dcnode-id="271"><li data-dcnode-id="288"><p data-dcnode-id="289"><b data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Clearly and precisely outlined job requirements</span></b></p></li><li data-dcnode-id="284"><p data-dcnode-id="285"><b data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">All costs broken down by labor and materials</span></b></p></li><li data-dcnode-id="280"><p data-dcnode-id="281"><b data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">A detailed timeline with key dates (like start and completion, payments, checkpoints, and estimated completion dates)</span></b></p></li><li data-dcnode-id="276"><p data-dcnode-id="277"><b data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Contact information for all parties involved</span></b></p></li><li data-dcnode-id="272"><p data-dcnode-id="273"><b data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Signatures from all parties</span></b></p></li></ul><h2 data-dcnode-id="269" id="finding-the-right-electrician"><span data-dcnode-id="270" instrument_node="">Finding the Right Electrician</span></h2><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Most electrical contractors are professional and ethical, but to ensure your electrical project ends on a bright note, get quotes from at least three pros. Look out for red flags and make sure they’re licensed and insured. Ask them several questions to validate their experience and professionalism. Finally, examine the contract before signing.</span></p><p data-dcnode-id="262"><span data-dcnode-id="266" instrument_node="">If you’re ready to find an electrician for your next big project, search Angi. We vet </span><a data-dcnode-id="264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.angi.com/companylist/electrical.htm" rel="follow" target="_self"><span data-dcnode-id="265" instrument_node="">electrical contractors near you</span></a><span data-dcnode-id="263" instrument_node=""> so you can get a head start on the selection process.</span></p><aside class="related-article" data-dcnode-id="250"><p class="related-article__static-title" data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Related Article</span></p><div class="related-article__content" data-dcnode-id="251"><a data-dcnode-id="258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.angi.com/articles/different-types-electricians-explained.htm" id="related-article-img"><img alt="man with tool belt installing hanging lights " data-dcnode-id="259" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.angi.com/s3fs-public/electrician-installing-lights.jpeg%3Fimpolicy%3Dthumbnail&amp;raw"></a><div data-dcnode-id="252"><a class="related-article__title" data-dcnode-id="256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.angi.com/articles/different-types-electricians-explained.htm" id="related-article-title"><span data-dcnode-id="257" instrument_node="">What Are the Different Types of Electricians?</span></a><div class="related-article__description" data-dcnode-id="253"><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Not all electricians are created equal—understanding more about the different types of electricians and their qualifications can help you get the right support for electrical work in
