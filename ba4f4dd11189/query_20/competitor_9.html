</span><h1 data-dcnode-id="3262" itemprop="headline"><span data-dcnode-id="3263" instrument_node="">Cruise Scams</span></h1><span data-dcnode-id="3261" instrument_node="">
</span><p class="byline" data-dcnode-id="3256"><span class="byline" data-dcnode-id="3258"><a data-dcnode-id="3259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aarp.org/"><span data-dcnode-id="3260" instrument_node="">AARP</span></a></span><span data-dcnode-id="3257" instrument_node="">
</span></p><span data-dcnode-id="3255" instrument_node="">
</span><div class="clear" data-dcnode-id="3254"></div><span data-dcnode-id="3253" instrument_node="">

</span><div class="everywhere-article-content parsys" data-dcnode-id="2435"><div class="textimage parbase section" data-dcnode-id="3172"><div data-dcnode-id="3173"><span data-dcnode-id="3233" instrument_node="">

</span><span data-dcnode-id="3224" instrument_node="">

</span><span data-dcnode-id="3212" instrument_node="">
</span><p data-dcnode-id="3199"><a data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/espanol/dinero/estafas-y-fraudes/info-2019/cruceros.html%3Fintcmp%3DAE-MON-TOSPA-TOGL-ES"><span data-dcnode-id="3211" instrument_node="">En español</span></a><span data-dcnode-id="3209" instrument_node="">&nbsp;| The siren song of a vacation chockablock with seagoing luxury and exotic ports of call can draw you into scam-infested waters. The classic cruise con starts with an email or call (often automated) with news that you’ve won a free cruise — as a&nbsp;</span><a data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2019/sweepstakes.html"><span data-dcnode-id="3208" instrument_node="">sweepstakes</span></a><span data-dcnode-id="3206" instrument_node="">&nbsp;prize, a&nbsp;</span><a data-dcnode-id="3204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2019/travel.html"><span data-dcnode-id="3205" instrument_node="">special offer from a travel company</span></a><span data-dcnode-id="3203" instrument_node="">&nbsp;or a “reward” for taking a brief survey. You might be asked to provide a&nbsp;</span><a data-dcnode-id="3201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2019/social-security.html"><span data-dcnode-id="3202" instrument_node="">Social Security number</span></a><span data-dcnode-id="3200" instrument_node="">&nbsp;to reserve your spot, or credit card details to cover nominal booking or processing fees.</span></p><span data-dcnode-id="3198" instrument_node="">
</span><p data-dcnode-id="3187"><span data-dcnode-id="3197" instrument_node="">What you’re actually signing up for is a barrage of sales pitches and additional charges, such as taxes, port fees and&nbsp;</span><a data-dcnode-id="3195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/travel/vacation-ideas/cruises/info-2018/cruise-ship-tipping-fd.html"><span data-dcnode-id="3196" instrument_node="">onboard gratuities</span></a><span data-dcnode-id="3194" instrument_node="">. By departure time, your “free” trip might cost more than if you’d simply booked directly with the cruise line or a travel agent. That’s if there’s a trip at all: Some cruise offers are just ploys to get the requisite data to steal your money or&nbsp;</span><a data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2019/identity-theft.html"><span data-dcnode-id="3193" instrument_node="">identity</span></a><span data-dcnode-id="3191" instrument_node="">, or to harvest contact information that is shared with spam-spewing marketers. (The latter is particularly prevalent on&nbsp;</span><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2019/social-media.html"><span data-dcnode-id="3190" instrument_node="">social media</span></a><span data-dcnode-id="3188" instrument_node="">.)</span></p><span data-dcnode-id="3186" instrument_node="">
</span><span data-dcnode-id="3184" instrument_node="">
</span><span data-dcnode-id="3182" instrument_node="">
</span><span data-dcnode-id="3180" instrument_node="">
</span><span data-dcnode-id="3178" instrument_node="">
</span><span data-dcnode-id="3176" instrument_node="">
</span></div><span data-dcnode-id="3174" instrument_node="">
</span></div></div><span data-dcnode-id="3171" instrument_node="">
</span><div class="articleCalloutBox section" data-dcnode-id="3101"><span data-dcnode-id="3170" instrument_node="">
</span><div class="aarp-c-article-callout-box aarp-c-article-callout-box@mobile aarp-c-article-callout-box--border-all-sides aarp-c-article-callout-box--medium aarp-c-article-callout-box--medium@tablet-desktop aarp-c-article-callout-box--pull-right aarp-c-article-callout-box--pull-right@tablet-desktop aarp-c-article-callout-box--addGrayBackground aarp-c-article-callout-box--addPaddingLeft aarp-c-article-callout-box--addPaddingRight aarp-c-article-callout-box--addPaddingTop aarp-c-article-callout-box--addPaddingBottom" data-dcnode-id="3105"><span data-dcnode-id="3169" instrument_node="">

</span><h4 data-dcnode-id="3144"><b data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">Have you seen this scam?</span></b></h4><span data-dcnode-id="3143" instrument_node="">
</span><ul data-dcnode-id="3128"><span data-dcnode-id="3142" instrument_node="">
</span><li data-dcnode-id="3135"><span data-dcnode-id="3141" instrument_node="">Call the </span><a data-dcnode-id="3139" data-overlay-msg="AARP.Everywhere.LeavingModal.drawOverlay(this,'',/content/aarpe/en/home/money/scams-fraud/info-2019/new-medicare-card.html,'','You are now leaving AARP.org and going to a website that is not operated by AARP. A different privacy policy and terms of service will apply.');return false;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/helpline/%3Fintcmp%3DAE-SCM-FRD-CTA-HLPLN1"><span data-dcnode-id="3140" instrument_node="">AARP Fraud Watch Network Helpline</span></a><span data-dcnode-id="3138" instrument_node="">:&nbsp;</span><b data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">877-908-3360</span></b></li><span data-dcnode-id="3134" instrument_node="">
</span><li data-dcnode-id="3130"><span data-dcnode-id="3133" instrument_node="">Report it on AARP’s&nbsp;</span><a data-dcnode-id="3131" data-overlay-msg="AARP.Everywhere.LeavingModal.drawOverlay(this,'',/content/aarpe/en/home/money/scams-fraud/info-2019/new-medicare-card.html,'','You are now leaving AARP.org and going to a website that is not operated by AARP. A different privacy policy and terms of service will apply.');return false;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/tracking-map/%3Fintcmp%3DAE-SCM-FRD-CTA-MAP1"><span data-dcnode-id="3132" instrument_node="">Scam-Tracking Map</span></a></li><span data-dcnode-id="3129" instrument_node="">
</span></ul><span data-dcnode-id="3127" instrument_node="">
</span><p data-dcnode-id="3122"><span data-dcnode-id="3126" instrument_node="">Sign up for&nbsp;</span><a data-dcnode-id="3124" data-overlay-msg="AARP.Everywhere.LeavingModal.drawOverlay(this,'',/content/aarpe/en/home/money/scams-fraud/info-2019/new-medicare-card.html,'','You are now leaving AARP.org and going to a website that is not operated by AARP. A different privacy policy and terms of service will apply.');return false;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cp.email.aarp.org/fraudwatchsignup%3Fintcmp%3DAE-SCM-FRD-CTA-ALRT1"><span data-dcnode-id="3125" instrument_node="">Watchdog Alerts</span></a><span data-dcnode-id="3123" instrument_node="">&nbsp;for more tips on avoiding scams.</span></p><span data-dcnode-id="3121" instrument_node="">
</span><span data-dcnode-id="3119" instrument_node="">
</span><span data-dcnode-id="3117" instrument_node="">
</span><span data-dcnode-id="3115" instrument_node="">
</span><span data-dcnode-id="3113" instrument_node="">
</span><span data-dcnode-id="3111" instrument_node="">

</span></div></div><span data-dcnode-id="3106" instrument_node="">
</span></div><span data-dcnode-id="3104" instrument_node="">
</span><span data-dcnode-id="3102" instrument_node="">
</span></div><span data-dcnode-id="3100" instrument_node="">
</span><div class="textimage parbase section" data-dcnode-id="3029"><div data-dcnode-id="3030"><span data-dcnode-id="3099" instrument_node="">
</span><span data-dcnode-id="3097" instrument_node="">
</span><span data-dcnode-id="3095" instrument_node="">
</span><div class="aarpe-text-image" data-dcnode-id="3032"><span data-dcnode-id="3094" instrument_node="">
</span><span data-dcnode-id="3092" instrument_node="">
</span><span data-dcnode-id="3090" instrument_node="">
</span><span data-dcnode-id="3088" instrument_node="">
</span><span data-dcnode-id="3086" instrument_node="">
</span><span data-dcnode-id="3084" instrument_node="">
</span><span data-dcnode-id="3082" instrument_node="">
</span><span data-dcnode-id="3080" instrument_node="">
</span><span data-dcnode-id="3078" instrument_node="">
</span><p data-dcnode-id="3071"><span data-dcnode-id="3077" instrument_node="">Another common trick is offering an all-expenses-paid cruise in exchange for a little of your time — which turns out to be a </span><a data-dcnode-id="3075" data-overlay-msg="AARP.Everywhere.LeavingModal.drawOverlay(this,'',/content/aarpe/en/home/money/scams-fraud/info-2019/cruise.html,'','You are now leaving AARP.org and going to a website that is not operated by AARP. A different privacy policy and terms of service will apply.');return false;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2019/timeshare-resale.html"><span data-dcnode-id="3076" instrument_node="">time-share</span></a><span data-dcnode-id="3074" instrument_node=""> presentation or resort tour lasting several hours. If you survive that with the cruise offer intact, you’ll likely face more high-pressure pitches for costly trip upgrades. Turn them down and you're apt to end up with “dismal cruise conditions and ships that lack common amenities like air-conditioning,” the National Consumers League warns.</span><br data-dcnode-id="3073"><span data-dcnode-id="3072" instrument_node="">
</span></p><span data-dcnode-id="3070" instrument_node="">
</span><p data-dcnode-id="3065"><span data-dcnode-id="3069" instrument_node="">The </span><a data-dcnode-id="3067" data-overlay-msg="AARP.Everywhere.LeavingModal.drawOverlay(this,'',/content/aarpe/en/home/money/scams-fraud/info-2019/cruise.html,'','You are now leaving AARP.org and going to a website that is not operated by AARP. A different privacy policy and terms of service will apply.');return false;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2020/coronavirus.html"><span data-dcnode-id="3068" instrument_node="">coronavirus pandemic</span></a><span data-dcnode-id="3066" instrument_node="">&nbsp;provided another pretext for scammers to target cruisers. Cruise Critic, a TripAdvisor-affiliated site that covers the industry, reports that fraudsters posing as cruise-line reps are calling or emailing travelers with bogus offers of refunds or credits for canceled trips. If your plans have been disrupted by the pandemic, communicate with the cruise company only&nbsp;through its official customer-service channels or via the travel adviser who booked the trip for you.</span></p><span data-dcnode-id="3064" instrument_node="">
</span><h3 data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">Warning Signs</span></h3><span data-dcnode-id="3061" instrument_node="">
</span><ul data-dcnode-id="3047"><span data-dcnode-id="3060" instrument_node="">
</span><li data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">An email or call says you’ve won a free cruise in a lottery, sweepstakes or contest you do not recall entering.</span></li><span data-dcnode-id="3057" instrument_node="">
</span><li data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">You receive an offer of a free cruise in exchange for attending a meeting or presentation.</span></li><span data-dcnode-id="3054" instrument_node="">
</span><li data-dcnode-id="3049"><span data-dcnode-id="3053" instrument_node="">You’re asked, in a </span><a data-dcnode-id="3051" data-overlay-msg="AARP.Everywhere.LeavingModal.drawOverlay(this,'',/content/aarpe/en/home/money/scams-fraud/info-2019/cruise.html,'','You are now leaving AARP.org and going to a website that is not operated by AARP. A different privacy policy and terms of service will apply.');return false;" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aarp.org/money/scams-fraud/info-2019/robocalls.html"><span data-dcnode-id="3052" instrument_node="">robocall</span></a><span data-dcnode-id="3050" instrument_node=""> or social media post, to answer a few questions to qualify for a free cruise.</span></li><span data-dcnode-id="3048" instrument_node="">
</span></ul><span data-dcnode-id="3046" instrument_node="">
</span><ul data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">
</span></ul><span data-dcnode-id="3043" instrument_node="">

</span><span data-dcnode-id="3039" instrument_node="">

</span></div></div><span data-dcnode-id="3028" instrument_node="">
</span><div class="columns parbase section" data-dcnode-id="2841"><span data-dcnode-id="3027" instrument_node="">
</span><div class="aarpe-column-control clearfix" data-dcnode-id="2843"><span data-dcnode-id="3026" instrument_node="">

</span><span data-dcnode-id="2985" instrument_node="">

</span><span data-dcnode-id="2973" instrument_node="">
</span><ul data-dcnode-id="2953"><span data-dcnode-id="2972" instrument_node="">
</span><li data-dcnode-id="2967"><span data-dcnode-id="2971" instrument_node="">Do check out the source of any free or low-cost cruise offer. Search online to authenticate the company’s address and phone number. Look up its online reviews and&nbsp;</span><a data-dcnode-id="2969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbb.org/search"><span data-dcnode-id="2970" instrument_node="">Better Business Bureau rating</span></a><span data-dcnode-id="2968" instrument_node="">.</span></li><span data-dcnode-id="2966" instrument_node="">
</span><li data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">Do check online offers for signs of spoofing. Scam emails, social media posts and websites mimic the names and branding of well-known cruise lines.</span></li><span data-dcnode-id="2963" instrument_node="">
</span><li data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Do confirm any booking you make through a travel agent or third-party travel seller with the cruise line itself.</span></li><span data-dcnode-id="2960" instrument_node="">
</span><li data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">Do pay with a credit card, which offers the greatest protection if a payment dispute arises.</span></li><span data-dcnode-id="2957" instrument_node="">
</span><li data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">Do ask detailed questions and study the fine print. Get a clear explanation of all fees and your accommodation class, and make sure you understand the cancellation and refund policies.</span></li><span data-dcnode-id="2954" instrument_node="">
</span></ul><span data-dcnode-id="2952" instrument_node="">

</span></div><span data-dcnode-id="2915" instrument_node="">

</span><ul data-dcnode-id="2864"><span data-dcnode-id="2880" instrument_node="">
</span><li data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">Don’t give personal or financial information to a travel company that contacts you out the blue with the promise of a free or discount cruise offer or a refund for a canceled trip.</span></li><span data-dcnode-id="2877" instrument_node="">
</span><li data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">Don’t pay to claim a contest prize. If you truly won a free cruise, it should include all taxes and fees, according to the National Consumers League.</span></li><span data-dcnode-id="2874" instrument_node="">
</span><li data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">Don’t succumb to pressure to move quickly on a “time restricted” cruise deal.</span></li><span data-dcnode-id="2871" instrument_node="">
</span><li data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">Don’t share or follow links from social media posts that promise cruise tickets for taking a survey.</span></li><span data-dcnode-id="2868" instrument_node="">
</span><li data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">Don’t click on attachments in unsolicited cruise or travel emails. They could unleash malware that scours your computer for personal and financial data.</span></li><span data-dcnode-id="2865" instrument_node="">
</span></ul><span data-dcnode-id="2863" instrument_node="">
