</span><p data-dcnode-id="5839"><span data-dcnode-id="5843" instrument_node="">Craigslist is great. Really, I love it for buying and selling, finding services, and even posting jobs. But for the 99% of ads that are completely legit, you'll find postings designed to con you. That's a sad reality of life, and of Craigslist, but if you know what to look out for you can avoid the pitfalls of an otherwise awesome service. (See also:&nbsp;</span><a data-dcnode-id="5841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wisebread.com/how-safe-is-craigslist" sl-processed="1"><span data-dcnode-id="5842" instrument_node="">How Safe Is Craigslist?</span></a><span data-dcnode-id="5840" instrument_node="">)</span></p><span data-dcnode-id="5838" instrument_node="">
</span><h2 data-dcnode-id="5836"><span data-dcnode-id="5837" instrument_node="">1. Lured to a Mugging</span></h2><span data-dcnode-id="5835" instrument_node="">
</span><p data-dcnode-id="5833"><span data-dcnode-id="5834" instrument_node="">This is a really nasty scam, and we could all fall for it quite easily. It's also known as "robbery by appointment."</span></p><span data-dcnode-id="5832" instrument_node="">
</span><p data-dcnode-id="5827"><span data-dcnode-id="5831" instrument_node="">As a Craigslist seller, you will know that cash is the only way to go. You don't want to deal with bounced checks. Of course, as a buyer you have to abide by those same rules. Craigslist scammers will place an ad for </span><a data-dcnode-id="5829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.contracostatimes.com/news/ci_15567157" sl-processed="1" target="_blank"><span data-dcnode-id="5830" instrument_node="">something like a car</span></a><span data-dcnode-id="5828" instrument_node="">, high-end electronics, or anoter product of significant value. You'll arrange to meet the seller (with a nice wad of cash in your pocket), and that's when you'll be jumped and the money taken from you. Some people have even been killed in the robbery attempt.</span></p><span data-dcnode-id="5826" instrument_node="">
</span><p data-dcnode-id="5824"><span data-dcnode-id="5825" instrument_node="">This "lure" scenario has happened many times over the years, and as always Craigslist advises you to meet in a safe, secure location, go with a friend (or two), and if in doubt, back out.</span></p><span data-dcnode-id="5823" instrument_node="">
</span><h2 data-dcnode-id="5821"><span data-dcnode-id="5822" instrument_node="">2. Receiving an Overpayment on ANYTHING</span></h2><span data-dcnode-id="5820" instrument_node="">
</span><p data-dcnode-id="5818"><span data-dcnode-id="5819" instrument_node="">Another common scam is that your prospective buyer will send you a check (regular check, money order, or a cashier's check) that is for much more than the agreed price. There will usually be an excuse, like "oh, I sent a down payment for two months rent instead of one, can you wire me the difference?" Of course, the check they have sent you is fake, but the bank will often cash it and then discover the fraud later. By that time, you're out of pocket, and the scammer's pockets are full of your money.</span></p><span data-dcnode-id="5817" instrument_node="">
</span><p data-dcnode-id="5812"><span data-dcnode-id="5816" instrument_node="">Never wire funds, always deal with people locally, and beware of anything other than cash. Even then, cash can be counterfeit. It doesn't hurt to have a counterfeit detector pen on hand (</span><a data-dcnode-id="5814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.staples.com/Dri-Mark-Counterfeit-Money-Detector-Pen/product_450130" sl-processed="1"><span data-dcnode-id="5815" instrument_node="">they're less than $10</span></a><span data-dcnode-id="5813" instrument_node="">) for larger transactions. And be wary of bills bigger than $20; you can easily be handed a fake $100 bill, give the buyer the item and change, and be out of pocket twice.</span></p><span data-dcnode-id="5811" instrument_node="">
</span><h2 data-dcnode-id="5809"><span data-dcnode-id="5810" instrument_node="">3. The Rental Robbery</span></h2><span data-dcnode-id="5808" instrument_node="">
</span><p data-dcnode-id="5803"><span data-dcnode-id="5807" instrument_node="">Back in</span><a data-dcnode-id="5805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wisebread.com/the-vicious-home-rental-scam-%25E2%2580%2593-don%25E2%2580%2599t-get-conned" sl-processed="1" target="_blank"><span data-dcnode-id="5806" instrument_node=""> 2009 I wrote a detailed post on this scam,</span></a><span data-dcnode-id="5804" instrument_node=""> and it appears it is still going on. In fact, it's more widespread than ever, and the reason is that it is very easy to pull off, and almost impossible to track down the scammer.</span></p><span data-dcnode-id="5802" instrument_node="">
</span><p data-dcnode-id="5797"><span data-dcnode-id="5801" instrument_node="">The basic premise is this. You scour the Craigslist ads for a rental home and find one that is both beautiful and very, very affordable. Almost too affordable. You contact the address in the ad and are told that the owner had to leave the country (usually for </span><a data-dcnode-id="5799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.youtube.com/watch%3Fv%3Dh3VKpb0r7BQ" sl-processed="1" target="_blank"><span data-dcnode-id="5800" instrument_node="">something like missionary work</span></a><span data-dcnode-id="5798" instrument_node="">) and needs money to cover the mortgage. You then are told to fill out a background check (which gives ID thieves a ton of personal info) and wire them money for one month's rent and deposit. Most of us would drop out at that point.</span></p><span data-dcnode-id="5796" instrument_node="">
</span><p data-dcnode-id="5791"><span data-dcnode-id="5795" instrument_node="">However, if you think "well, I'd never send money to someone I'd never met" you should also know there is a variant of the scam that involves people actually showing homes to you and collecting the money there and then. They'll even give you a set of keys (not that they'll work) and a signed agreement. They gain access to the home through various means, including getting the keys legitimately from a home that's on the market, and then renting it out to dozens of people in a single day. Watch out for this one, and if you receive an email that references leaving the country and low rent because money is needed </span><em data-dcnode-id="5793"><span data-dcnode-id="5794" instrument_node="">fast</span></em><span data-dcnode-id="5792" instrument_node="">, add it to your spam filter.</span></p><span data-dcnode-id="5790" instrument_node="">
</span><h2 data-dcnode-id="5788"><span data-dcnode-id="5789" instrument_node="">4. Fake or Canceled Tickets</span></h2><span data-dcnode-id="5787" instrument_node="">
</span><p data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">It's bad enough that scalpers use Craigslist, buying tickets for $50 and when the concert is sold out, selling them to you for $200. But there are also scams involving tickets. These scams won't just leave you paying a steep markup, but also without the tickets you thought you were buying.</span></p><span data-dcnode-id="5784" instrument_node="">
</span><p data-dcnode-id="5782"><span data-dcnode-id="5783" instrument_node="">Sophisticated scammers have found ways to replicate tickets to major events that look and feel legit. They even have holograms and watermarks. But these tickets are worthless, and when you buy them, you'll lose out twice. First with the money, and second when you get turned away from the event.</span></p><span data-dcnode-id="5781" instrument_node="">
</span><p data-dcnode-id="5779"><span data-dcnode-id="5780" instrument_node="">A similar scam involves genuine tickets that get canceled after you buy them. A common scam involves airline tickets. You purchase the tickets for less than face value, thinking you have a bargain. The scammer will tell you they bought the tickets but cannot use them due to a family emergency. However, the tickets have been canceled and cost the scammer nothing. They will cost you dearly.</span></p><span data-dcnode-id="5778" instrument_node="">
</span><p data-dcnode-id="5776"><span data-dcnode-id="5777" instrument_node="">To avoid this, purchase tickets direct from the venue, from a legitimate site like Ticketmaster, or from trusted resources like Hotwire, Travelocity and so on. It's just not worth the risk to buy tickets off Craigslist.</span></p><span data-dcnode-id="5775" instrument_node="">
</span><h2 data-dcnode-id="5773"><span data-dcnode-id="5774" instrument_node="">5. The Online Escrow Service</span></h2><span data-dcnode-id="5772" instrument_node="">
</span><p data-dcnode-id="5770"><span data-dcnode-id="5771" instrument_node="">You see an ad on Craigslist for something like a car, boat, expensive electronics, that kind of thing. When you contact the seller, they will reply that they want to use an escrow service for their protection and yours, and send you to a site.</span></p><span data-dcnode-id="5769" instrument_node="">
</span><p data-dcnode-id="5761"><span data-dcnode-id="5768" instrument_node="">However, unlike </span><a data-dcnode-id="5766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pages.ebay.com/help/pay/escrow.html%23caution" sl-processed="1" target="_blank"><span data-dcnode-id="5767" instrument_node="">escrow.com, which is a legitimate site endorsed by eBay</span></a><span data-dcnode-id="5765" instrument_node="">, they will recommend one that sounds just as plausible. Perhaps something like EscrowProtectionPlan.org or EscrowPaymentGuardian.net, and ask you to set up an account. But this is a fraudulent site set up by the seller, and as soon as you deposit the money, you've lost it. Be wary of any seller that recommends an escrow service to you, and if one does, </span><a data-dcnode-id="5763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bankrate.com/brm/news/advice/scams/20040517b1.asp" sl-processed="1" target="_blank"><span data-dcnode-id="5764" instrument_node="">take steps to verify its legitimacy</span></a><span data-dcnode-id="5762" instrument_node="">.</span></p><span data-dcnode-id="5760" instrument_node="">
</span><h2 data-dcnode-id="5758"><span data-dcnode-id="5759" instrument_node="">6. The Cell Phone Swindle</span></h2><span data-dcnode-id="5757" instrument_node="">
</span><p data-dcnode-id="5755"><span data-dcnode-id="5756" instrument_node="">This one can take a bite out of your monthly income, and if you're not monitoring your finances closely, you may not even notice it.</span></p><span data-dcnode-id="5754" instrument_node="">
</span><p data-dcnode-id="5749"><span data-dcnode-id="5753" instrument_node="">In this scam, someone will respond to your for sale ad saying they are interested, but cannot talk right then. Usually they're at work or otherwise indisposed. However, instead of giving an email address or phone number, they'll ask </span><em data-dcnode-id="5751"><span data-dcnode-id="5752" instrument_node="">you </span></em><span data-dcnode-id="5750" instrument_node="">to put your cell phone number into a website that "stores" information for them. In reality, it's a site that is signing you up for a monthly charge of $10 or more per month, and there is no way to cancel the service. The only way out, when you spot it, is to cancel your credit card. And forget about getting a refund.</span></p><span data-dcnode-id="5748" instrument_node="">
</span><p data-dcnode-id="5743"><span data-dcnode-id="5747" instrument_node="">Another cell phone swindle is to provide you with a call back number that appears to be an answering service, but is in fact a pay-per-call number. Although you won't be out thousands of dollars like some warnings of these numbers claim (specifically the </span><a data-dcnode-id="5745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.snopes.com/fraud/telephone/809.asp" sl-processed="1" target="_blank"><span data-dcnode-id="5746" instrument_node="">809 code scam</span></a><span data-dcnode-id="5744" instrument_node="">), you could be charged $25-$30 to make the call. And if enough people do it, that's a tidy sum for the scammer.</span></p><span data-dcnode-id="5742" instrument_node="">
</span><h2 data-dcnode-id="5740"><span data-dcnode-id="5741" instrument_node="">7. The Job Bait</span></h2><span data-dcnode-id="5739" instrument_node="">
</span><p data-dcnode-id="5734"><span data-dcnode-id="5738" instrument_node="">With </span><a data-dcnode-id="5736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wisebread.com/techniques-for-escaping-long-term-unemployment" sl-processed="1"><span data-dcnode-id="5737" instrument_node="">unemployment as high as it is</span></a><span data-dcnode-id="5735" instrument_node="">, people out there are desperate for work. And when jobs are in such high demand, scammers come out of the woodwork.</span></p><span data-dcnode-id="5733" instrument_node="">
</span><p data-dcnode-id="5731"><span data-dcnode-id="5732" instrument_node="">Here's the scam. You will see a job offer that sounds wonderful, with great salary and benefits. But when you apply, you could face any number of potential cons. They include: fake background check services and credit report sites that steal your information, being reimbursed to sign up for "free" offers, fee-based training for the potential job, and bogus focus group and survey sites.</span></p><span data-dcnode-id="5730" instrument_node="">
</span><p data-dcnode-id="5725"><span data-dcnode-id="5729" instrument_node="">Your best bet is to thoroughly research any company offering a job. Use the </span><a data-dcnode-id="5727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbb.org/" sl-processed="1" target="_blank"><span data-dcnode-id="5728" instrument_node="">BBB</span></a><span data-dcnode-id="5726" instrument_node="">, make sure they have a phone number you can call for information, and run from any posting asking for fees up front.</span></p><span data-dcnode-id="5724" instrument_node="">
</span><h2 data-dcnode-id="5722"><span data-dcnode-id="5723" instrument_node="">8. Revenge of the Free Stuff</span></h2><span data-dcnode-id="5721" instrument_node="">
</span><p data-dcnode-id="5719"><span data-dcnode-id="5720" instrument_node="">Sometimes you will see ads in the free section that advertise a massive house clearance. Basically, the renter or homeowner is moving out the next day (perhaps even leaving the country) and needs everything to be gone. Seems legit, right? But often, this is a scammer who is setting up an innocent victim to be burglarized.</span></p><span data-dcnode-id="5718" instrument_node="">
</span><p data-dcnode-id="5713"><span data-dcnode-id="5717" instrument_node="">There have been </span><a data-dcnode-id="5715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//seattletimes.com/html/localnews/2004302237_webhoax24m.html" sl-processed="1" target="_blank"><span data-dcnode-id="5716" instrument_node="">news reports</span></a><span data-dcnode-id="5714" instrument_node=""> of people returning home to discover that their home is being stripped bare by dozens of people. The scammer is often one of these, who will be helping himself to bigger items and blending in with the crowd. The people who take the stuff, who are usually innocent themselves, can be prosecuted. The victim will rarely be able to get back any of the missing items. And the scammer gets away free and clear.</span></p><span data-dcnode-id="5712" instrument_node="">
</span><p data-dcnode-id="5707"><span data-dcnode-id="5711" instrument_node="">99.9% of the time, </span><a data-dcnode-id="5709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wisebread.com/the-25-best-things-to-buy-on-craigslist" sl-processed="1"><span data-dcnode-id="5710" instrument_node="">free stuff will be put out on the curb for you to take</span></a><span data-dcnode-id="5708" instrument_node="">, or somewhere else outside of the home. If it's inviting you to just walk into the home and take whatever you like, it's bogus.</span></p><span data-dcnode-id="5706" instrument_node="">
</span><p data-dcnode-id="5702"><em data-dcnode-id="5704"><span data-dcnode-id="5705" instrument_node="">Have you encountered another Craigslist scam not covered here? Let us know in comments.</span></em><span data-dcnode-id="5703" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5701" instrument_node="">

</span><p data-dcnode-id="5017"><span data-dcnode-id="5018" instrument_node="">I completely agree. I've used Craigslist for everything from apartment hunting to car shopping (I actually just got bought a car last weekend through Craigslist) — and overall I've had awesome experiences. BUT I think that's mainly because I'm incredibly wary of any possible scam someone could be trying to pull. I've definitely run into multiple scammers who "are moving out of the country tomorrow" - which is why I've learned to trust my gut. If it seems out of place, or if it just doesn't feel right, it's not worth pursuing.  </span></p><span data-dcnode-id="5016" instrument_node="">
</span><p data-dcnode-id="5014"><span data-dcnode-id="5015" instrument_node="">I also make sure to speak with the person prior to meeting, which may not sound fool-proof, but you'd be surprised how much you can glean from a simple conversation beyond the computer screen.</span></p><span data-dcnode-id="5013" instrument_node="">

</span><p data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node="">That's a excellent idea. I mostly use craigslist to buy and sell video games so the clientele are usually cool, down to earth people. I always meet at large gas stations like quiktrip because there are always people going in and out, and there's usually a cop or two there as well. I never let people meet at my house because I have two small children and my wife to look out for. Also, I started taking a counterfeit pen with me to check money. Not because I think that they have a money printing machine in their basement to scam me out of a $20 game, but because you never know if some of the money already in circulation is counterfeit or not.</span></p><span data-dcnode-id="4920" instrument_node="">

</span><div class="text" data-dcnode-id="4587"><span data-dcnode-id="4625" instrument_node="">
</span><p data-dcnode-id="4623"><span data-dcnode-id="4624" instrument_node="">OK, folks, tell me if you think someone is trying to scam me. I'm trying to sell a snow thrower on Craig's List and got the following rather befuddling email yesterday after confirming that the item was still for sale. This message seems suspicious to me, but I can't figure out what the scam might be:</span></p><span data-dcnode-id="4622" instrument_node="">
</span><p data-dcnode-id="4610"><span data-dcnode-id="4621" instrument_node="">  "Thanks for the prompt response to my mail. I will be buying from you so</span><br data-dcnode-id="4620"><span data-dcnode-id="4619" instrument_node="">
please kindly withdraw the advert from C.LIST  to avoid disturbance. Please</span><br data-dcnode-id="4618"><span data-dcnode-id="4617" instrument_node="">
be informed that i will be paying with a certified check from my Bank it</span><br data-dcnode-id="4616"><span data-dcnode-id="4615" instrument_node="">
will be delivered to you via United Parcel Service (UPS) or FedEx , Then,</span><br data-dcnode-id="4614"><span data-dcnode-id="4613" instrument_node="">
the last price you're willing sell it for me so I'll need you to provide me</span><br data-dcnode-id="4612"><span data-dcnode-id="4611" instrument_node="">
with the following information to facilitate the mailing of the check...</span></p><span data-dcnode-id="4609" instrument_node="">
</span><p data-dcnode-id="4601"><span data-dcnode-id="4608" instrument_node="">1.....Full name to write on the check</span><br data-dcnode-id="4607"><span data-dcnode-id="4606" instrument_node="">
2.....Full Physical address to post the check</span><br data-dcnode-id="4605"><span data-dcnode-id="4604" instrument_node="">
3.....City, State and Zip Code</span><br data-dcnode-id="4603"><span data-dcnode-id="4602" instrument_node="">
4.....Home &amp; Cell Phone to contact you</span></p><span data-dcnode-id="4600" instrument_node="">
</span><p data-dcnode-id="4592"><span data-dcnode-id="4599" instrument_node="">I will make arrangements for the pick up as soon as you have your money I am</span><br data-dcnode-id="4598"><span data-dcnode-id="4597" instrument_node="">
completely satisfied with the advert and the payment will be delivered</span><br data-dcnode-id="4596"><span data-dcnode-id="4595" instrument_node="">
within 4hours.** I use a hearing impaired phone # and will receive your</span><br data-dcnode-id="4594"><span data-dcnode-id="4593" instrument_node="">
calls via email **</span></p><span data-dcnode-id="4591" instrument_node="">
</span><p data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">N.B UPS/FedEx does not deliver to a P.O box addresses.Thanks"</span></p><span data-dcnode-id="4588" instrument_node="">

</span><div class="text" data-dcnode-id="4132"><span data-dcnode-id="4142" instrument_node="">
</span><p data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">Yeah, that's a scam. I had something very similar happen to me. In my case, the guy said he was away on a business trip and wanted to mail payment for the item to me ASAP so that the "mover" could get it, could I send the information for that? Like with you, he listed that information he wanted, nice and neat. For mine, he specifically requested no PO Box (Warning Bell #1).</span></p><span data-dcnode-id="4139" instrument_node="">
</span><p data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">Probably what makes the message feel off is that it's written like it's not from a native English speaker. The same was for mine - it sounded like it was either written by someone who had a vague grasp of English or like it was generated by a computer program. For my message, I also got the distinct sense that the "buyer" hadn't actually read/processed my e-mail to him. He opened it with, "Yes, the price and the description both look alright to me". In my previous correspondence with him (the only time I wrote to him), I had not mentioned the price at ALL. What I HAD mentioned was our meeting location (not at my place), the time, and if we could possibly meet in a week's time so I'd have a chance to get the item lined up (he wanted to meet ASAP, like, the very day he contacted me. Warning Bell #2). All off the things I had written about were not addressed by him at all, either as a confirmation that he got it or as answering the questions I had about the date of our meeting.</span></p><span data-dcnode-id="4136" instrument_node="">
</span><p data-dcnode-id="4134"><span data-dcnode-id="4135" instrument_node="">Oh, and he also never contacted me again, after I asked him if we could possibly hold off on the deal until he was back from his "business trip". No, he didn't even give a, "Sorry, I can't do that. Bye!"</span></p><span data-dcnode-id="4133" instrument_node="">

</span><div class="text" data-dcnode-id="3677"><span data-dcnode-id="3681" instrument_node="">
</span><p data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">Pimps are a major problem in Talent, Event, Domestic, Crew and even Creative Gigs.  In the San Francisco area, these sections often contain posts looking for "models", or "dancers" which are sometimes easy to spot, but anytime you see any post for a need a female for an assistant for a busy executive, date to the opera, date for lunch, someone to serve drinks at a private party, etc.  IT IS A PIMP.  They are looking to find women who will go on dates for money.  It's all about the social engineering.  They then try and hook them into lunch for a presentation (the usual pitch).  If you are in doubt, use a fake email address with a female name and respond asking for more information.  I flag relentlessly (I have three different machines in three different subnets that I can remote into, but they are like cockroaches - they keep coming back...)  If Craigslist would respond to complaints about this it would take a majority of them out, but craigslist doesn't do anything until the police or district attorneys make threats.</span></p><span data-dcnode-id="3678" instrument_node="">

</span><p data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">I just caught my landlord in a scam. She rents out rooms in her home, only there are no rooms available. She requires the prospective renter to leave her with a month's rent and a month's security and tells them that the room will be available in a week's time. When the renter shows up to move in, she tells them that there was a problem getting the present tenant out, and claims that she is having trouble with the bank getting her money out, then she ignores any future calls from that person. She knows that the police will do nothing except to tell the unfortunate person who got cheated that "it's a civil matter" and they have to take her to court. Most people who rent rooms don't have either the knowledge or the money to file a suit against her, and she seems to be getting away with it.</span></p><span data-dcnode-id="3489" instrument_node="">

</span><div class="text" data-dcnode-id="3395"><span data-dcnode-id="3399" instrument_node="">
</span><p data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">We have tried twice to but a used Treadclimber from craigslist in two different states.   Both have been scams and even months apart the return email stories were similar.  Both claimed to have moved, one out of the country. Neither would talk to us on the phone.   Both wanted to use eBay protected buyer program instead of cash and asked for a bunch of personal info to get us 'registered'. Then asked us to wait until eBay contacted us.  Thankfully this was acted flag and We never gave our info.  Both times the machines were not located where they were posted, both needed shipping, both sellers sent way too much detailed personal information about why they were selling.  Both wanted to make sure we had money ready to go.  I have bought and sold many times on Craigslist and legit sellers want to talk on phone- they want cash and they are willing to do a quick non-complicated interaction.  They never ask if you have money ready to go.  Isn't hat a given if we respond to an add?</span></p><span data-dcnode-id="3396" instrument_node="">

</span><div class="text" data-dcnode-id="3346"><span data-dcnode-id="3350" instrument_node="">
</span><p data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node="">I had a similar situation trying to buy a car.  I need a car badly and because my income is low I need it to be cheap,.  Every day without à car means I am losing lots of potential income.  So I was acting out of desperation and found the "perfect deal".  Since I had not done this before I did not see any red flags at first.  The lady said she was selling so quick and cheap because her husband died a month ago from a heart attack and she was moving out of state to be close to her brother.  I was even feeling sad for her and told her I was sorry for her loss and even shared a bit of my story. We had a few emails back and forth and my first red flag was that she would never use my name nor reply to certain things I would say.  There were also phrases such as," as I said before I will pay to have the car shipped to you".  She had never said that before, nor did that make sense to me.  She said she was using  EBay Motors  and she told me they would send me an email explaining what I needed to do next.  The flow of things  just did not feel natural to me so I googled EBay Motors and found that they never send emails.  It was a scam. I was sad that I had been dupped but I felt lucky I did not send the money.</span></p><span data-dcnode-id="3347" instrument_node="">

</span><span class="count" data-dcnode-id="3310" style="display: none;"><span data-dcnode-id="3311" instrument_node="">#43</span></span><span data-dcnode-id="3309" instrument_node="">
</span></div><span data-dcnode-id="3307" instrument_node="">
</span><div class="text" data-dcnode-id="3281"><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">Watch out for this:   You are selling something from your home that you cannot meet someone for ( heavy furniture Items that can't be moved easily)  You are contacted by someone that doesn't even want to look at your item and agree to the cost right off.  They are VERY interested and want to come pick it up: They ask for the address before they even attempt to set up a meeting time.  If you give it to them they start asking you about possible meetings time...THEY NEVER AGREE TO A TIME WHEN YOU SAY YOU WILL BE HOME BUT SUGGEST OTHER TIMES HOPING YOU WILL SAY "WE ARE NOT HOME THEN".  THIS CAN HAPPEN WITH TWO OR THREE DIFFERENT "INTERESTED BUYERS" WORKING TOGETHER.</span></p><span data-dcnode-id="3303" instrument_node="">
</span><p data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">What is happening is that you are basically telling the same people when you won't be home.  Pretty much a burglary ring setting up your home.  </span></p><span data-dcnode-id="3300" instrument_node="">
</span><p data-dcnode-id="3288"><span data-dcnode-id="3299" instrument_node="">watch for:</span><br data-dcnode-id="3298"><span data-dcnode-id="3297" instrument_node="">
Mostly "female" contacts very "understanding and overly work with you" demeanor</span><br data-dcnode-id="3296"><span data-dcnode-id="3295" instrument_node="">
will not give you a cell phone # to talk to them to text them</span><br data-dcnode-id="3294"><span data-dcnode-id="3293" instrument_node="">
uses the hidden craigs list email will not provide you with real email contact</span><br data-dcnode-id="3292"><span data-dcnode-id="3291" instrument_node="">
uses a group of different tactics to change up meeting times</span><br data-dcnode-id="3290"><span data-dcnode-id="3289" instrument_node="">
Never provide you with a real name (always some strange contact cypher)</span></p><span data-dcnode-id="3287" instrument_node="">
</span><p data-dcnode-id="3283"><span data-dcnode-id="3286" instrument_node="">Once you give them any reason to think they are being scrutinized they bail on the deal</span><br data-dcnode-id="3285"><span data-dcnode-id="3284" instrument_node="">
and never hear back from them.</span></p><span data-dcnode-id="3282" instrument_node="">

</span><p data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">I have been applying for jobs advertised on Craigslist that describes front desk receptionist.  I get an email back stating that position has been filled but, he needs a personal secretary....I have received many of these saying the same thing....$500 a week, they are always out of the country and will contact me as soon as they get back, very confidential but need me to start now..just send them name, address and telephone...but, i had sent my ruseme' already....i know this is a scam so be careful.</span></p><span data-dcnode-id="3233" instrument_node="">

</span><p data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">I've also replied to many job listings and received 5 or 6 of very similar responses. They all say the position has been filled but they are in need of a personal assistant to do a number of different things that include cashing checks, sending money orders, buying and sending goods, etc. They all claim to be out of the US currently but are willing to send payment upfront. It's always $500 wkly or more. I had a Tijani Rammykush offer to pay me $2000 every 2 wks to clean her apartment while she was over seas! The only "problem" was that her secretary accidentally sent my pay and the painters pay. So I was to cash this enormous check and send most of it to someone else. I couldn't get this lady to really answer my questions. It was all too vague. I must've asked too many questions because I never received that check. This is very discouraging when you're really seeking employment!</span></p><span data-dcnode-id="3184" instrument_node="">

</span><div class="text" data-dcnode-id="3095"><span data-dcnode-id="3099" instrument_node="">
</span><p data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">Help me figure out what kind of scam attempt this was...I had a chair for sale, guy emails that he wants to buy chair and to call him (I thought the email was a little abrupt, but not everyone has the same style). I called the number, but it was a wrong # (this may have been an honest accident because it turns out two numbers were transposed when he actually called me). I emailed him back that he had given me a wrong # and to call or text (my cell #). He called later and sounded a little weird (nervous, high?). My red flags were at half staff, but I was anxious to sell the chair and my husband was home with me. He asked if he could come right then, and I said yes if he was on his way, and so he asked me to text him my address which I did. (This is how I normally operate with CL sales; I give out my address only when they say they are on their way.) So then he called back from a different # (I recognized his voice) and said "OK, so I checked her out and she is 53 and a Catholic..." (which is not a description of me by the way), and I cut him off with "Whoa, you have the wrong #" and he said "oh, who is this?" and I said "whoever it is, it's not who you want to be talking to" so he hung up and then texted me a few minutes later "I'm sorry but the Furniture does not fit mine" I ignored him from that point. Is this an attempt at identity theft? All is he basically has is information that is publicly available (name, address) and my cell and email. What exactly can he do with this? My husband is freaked out that he was setting up a burglary, but I think it's more along the identity theft lines.</span></p><span data-dcnode-id="3096" instrument_node="">

</span><span class="author" data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">Catherine </span></span><span data-dcnode-id="2636" instrument_node="">
</span><span class="count" data-dcnode-id="2634" style="display: none;"><span data-dcnode-id="2635" instrument_node="">#57</span></span><span data-dcnode-id="2633" instrument_node="">

</span><div class="text" data-dcnode-id="2626"><span data-dcnode-id="2630" instrument_node="">
</span><p data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">I have just been a victim of a craigslist s scam. My bank account is now negative of $2519. Here is what happened: On Saturday, April 12th of this year (2014), I answered an ad from the famous craigslist website for a child caregiver job. The mother, who goes with the name of Laura Johnson answers me Sunday, 20th via email. She tells me that she is moving from Phoenix to Los Angeles because last December she lost her husband and her 4 months old baby in a car accident. She tells me that the only survivor is her 6 year old kid, named Joe, who is now in a wheelchair. Of course I am affected and moved by this story. I even cried when I read her email. So she needs a babysitter/caregiver for the first weekend of when she arrives; May 10th and she wants us to meet the 9th to assure that I am reliable. She sent me a picture of her and her handicap son. Everything was very believable. She wants to have everything ready for when they arrive in Los Angeles. So she asks me to accept the delivery of the new wheelchair she ordered so that it is here for when they move. The wheelchair is supposed to be delivered at my own place. She sends me a check of $2775 to pay for the delivery and to cover my first week of work ($2523 for the wheelchair + $252 for my first week paid in advance). She asks me to deposit the check at the bank and then to transfer it to the seller who will deliver the wheelchair. So I do. The check got returned to the bank and my account is now in a negative balance. I contacted the bank and they tell me that I am responsible because I am the one who deposited it into my account. The bank will not return me the money. The person to who I transferred the money is named Orma Daniels, she banks with Bank of America and I have her account number. Also, the check that I have received of an amount of $2775 was sent through Fedex and a signature was required. It was sent from a person named Tyler Jones and the sender's address is; Stihl Inc. 536 Viking Drive Virginia Beach, VA 23452 I kept the envelope. We first communicated via email and then switched to text messaging because it was quicker. She also told me that she was death so I could not call her, this should really have ringed the bell, but I was so happy to help someone in need that I did not even pay attention to all of those (now obvious) signs. As soon as the money was transferred, she told me that she would contact me for the delivery of the wheelchair and then never got back to me. We set an appointment for the delivery the next day but she cancelled it and I have never heard from her again. I have ALL of our email conversations and text messages. I also have the original craigslist ad. I took pictures of the check that I received (to prove her that I had received it well) and pictures of the receipt of the deposit that I made on the seller's account. I was worried that she would think that I was a scam and that I would keep the money for myself. I could not imagine that she (or HE) was actually the scammer. I have witnesses, friends that were with me when she (or he) was texting me to go to the bank and send her proof of the deposit. And my mother to whom I very proudly told that I had found a new child caregiving job.</span></p><span data-dcnode-id="2627" instrument_node="">

</span><p data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">I have recently been looking for cars. Every person I have come in contact with is mysteriously in a different location than which they posted the ad in. I have now received the same exact story from 2 people and very similar stories from others. They are either in the military or some family member has died. I almost fell for the first one, but when things didn't add up I was able to get out of the scam. Do NOT fall for it. These people are very smart and convincing. Can't trust anyone now days. I now know that meeting in a safe public place is the way to go, and to never send money via internet. Please be aware and smart while using craigslist!</span></p><span data-dcnode-id="2578" instrument_node="">

</span><p data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">I just posted an ad to rent our rooms in our house over summer and got a reply from someone named Klara Smith and she says that her father is wiring a check to me for the rent, and also included in the check is money for me to pick up her car. She is allegedly moving from Europe so she needs to be picked up from the airport in her car and she says the check is already on its way. I have a gut feeling that this is the Overpayment Scam. Am I right? She asked for my address and name and phone number. Should I just block her emails?</span></p><span data-dcnode-id="2529" instrument_node="">

</span><p data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">I have one to add and it's also a job scam. It was a warehouse job. The listing was the first red flag. It said way too much and then didn't completely relate to what the job actually was in their response. Second when you contact them they respond by saying your a perfect fit. You hired! The pay was amazing for the time they needed you. The person hiring you contacts you and says they trust your resume so no interview needed. They are in Europe and needs you to fill in for them for 3 months part time. It always took 24 hours for them to respond to any questions and they never answer what you ask, never tell you where the company is or it's name. Finally they send you your "salary" and "fees" to cover shipping in the form of a large check. My spider senses were going crazy so I didn't taken by them but it is awful how they target the unemployed. I have a detailed post about this on my blog.</span></p><span data-dcnode-id="2478" instrument_node="">

</span><div class="text" data-dcnode-id="2428"><span data-dcnode-id="2432" instrument_node="">
</span><p data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">Had 2 used counter tops on craigslist for 60 a piece Got a call . The caller States, Will be sending more than amount so the people who pick up the countertops can be paid. Just deposit the check in your account and when they arrive pay them. they sent 1489.00.  What? The whole thing was a scam and my bank shredded the check.  Thank God I did not do what they asked. My account would of never recovered and I would of been devastated, being on a set income. What kind of psychopaths  are these people. Stay away from anyone offering more than what your asking. What a scammmm. The bank was real but the account which the check was drawn on wasn't. They went to great lengths to make it look legit but there greed gave it away. New countertops can be found for less.</span></p><span data-dcnode-id="2429" instrument_node="">

</span><div class="text" data-dcnode-id="2379"><span data-dcnode-id="2383" instrument_node="">
</span><p data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">I discovered a car sale scam on craigslist.  It seems the seller was unloading a 2003 Toyota 4wd pickup. When they replied they first thanked me for my interest (why thank me?).  Then they explained that the seller was a military member who had just been promoted and was being transferred to an air base in Hawaii (being former military I found being transferred because of a promotion to be unusual). Then the reason for the low price, quick sale because seller is in arrears on a mortgage (didn't need to hear that hard luck story, but a hard luck story like a death, divorce, accident is usually included in a scam ).  Then the scam, truck is crated up and waiting shipment from an air base in ND, to a military installation close to your location.  They tell you the shipment is being managed by the US Army Logistics Department (No such entity, these shipments were managed by the TMO at the air base).  Then I was told to go to ebay motors and ask them the details of the transaction (of course they tell you that you are protected (from what? as close as you can get to ebay's buyer protection plan).  The grammar was a tipoff, since they always used "from" rather that "at" when referring to a location.  They asked for my data so they could tell ebay.  Anyway, realizing it was a scam, I replied with a thank you, but would pass because of all the rigermerole involved in a sale.</span></p><span data-dcnode-id="2380" instrument_node="">

</span><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">I am selling a purse on CR and got the following text message: "I will pay 400, will proceed with this purchase. Am paying with a cashier’s check/bank check at the moment so kindly text me the name to write on the check &amp; the address to mail it out to, I won’t also be able to come to look at it to inspect the condition due to heavy work schedule. Pick up would be arranged at your place after you have the check cashed." I replied something like, How about meeting at a bank when you have the cash? and received no answer. I am 100% sure this is a scam and have no intention on giving them my personal info or cashing a check! I reported them to FTC hotline: 877-FTC-HELP (877-382-4357)</span></p><span data-dcnode-id="2212" instrument_node="">

</span><p data-dcnode-id="2146"><span data-dcnode-id="2165" instrument_node="">Another scam:</span><br data-dcnode-id="2164"><span data-dcnode-id="2163" instrument_node="">

- In addition, the person flags your ad and brings it down</span><br data-dcnode-id="2154"><span data-dcnode-id="2153" instrument_node="">

</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">I received the nearly identical emails below regarding some furniture I wanted to sell.  I'm thinking they're scams.  </span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Thanks for your reply; I appreciate it, I'm okay with the price and I'm ready to buy from you plus I'm going to add an extra $30 just so you can have the furniture kept in my favor as I understand I may not be the only interested buyer; just something I picked up along the way. My mode of payment will be via Check and it will be sent by FedEx Overnight delivery. I will be responsible for the pick-up (pickers will only show up at your location after you have your payment), and in addition the movers’ fees will be added to your payment so as to avoid needless delay; they will schedule an appropriate time for the pick-up after you have your payment as I have other properties waiting to be moved alongside yours. Will be great to just come in person and examine what I’m about to buy but my work schedule wouldn’t let me nonetheless I trust the details provided is sufficient; conversely, more pictures will be deeply appreciated just to satisfy my fiancée. Should you agreed to sell for me; I will need the name you want written on the check and the address you want the payment sent out to, your cell phone will be appreciated too (I’ll call you as soon as I can). Many thanks</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Hi, Sorry i'm afraid i just checked my daily/work schedule and coming to view won't fit due to a busy work frame but would appreciate if you could email me pictures. I'm fine with the condition/price and willing to add an extra $20 to reserve it for me and avoid other buyers.  My form of payment will be via business or personal check which could be cashed instantly or deposit for clearance and after that we could proceed with the pick up arrangements so you can be rest assured. I would be responsible for the pick-up  as i have other belongings to be moved alongside and to avoid any delays,  the movers/pick-up fees would be added to the payment..   If you're okay with the form of payment kindly write back with necessary details (name, address and phone # to discuss further) so i can make out payment asap via FedEx or USPS next day delivery .</span></p><span data-dcnode-id="1667" instrument_node="">

</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">The scammer sends you a "Cashiers Check" for the full amount plus freight.  You go to your bank and cash the check.  The shipper shows up to pick up the merchandise, takes the cash money for the shipping and either picks up the item or goes to lunch, saying he'll be right back.  Either way he's got the real cash.  Then the "Cashiers Check" bounces, the money comes back out of your account, and the scammer walks away with the cash for the freight.  He never wanted the item - just the shipping money.  And if he's slick enough, he got it!</span></p><span data-dcnode-id="1618" instrument_node="">

</span><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">I've seen quite a a few where the seller offers and item such as a computer or rv at a price that is just good enough that you can't pass it up but still high enough that it could possibly be real. Typically they will only provide a phone number to text. Texting this number causes as emails to begin coming in. Every time I've suspect this with an ad in my local craigslist, I google a key phrase from the ad. And often end up seeing very similar ads, often with the same pic in other cities.</span></p><span data-dcnode-id="1416" instrument_node="">

</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">I always ask buyers to provide a phone number when I'm selling something on Craigslist.  A spammer or scammer will not do this. It's also a good way to weed out the flaky people that have no intention of buying.</span></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">I will not respond to emails that don't provide a phone number. It has worked very well this year as I've sold dozens of items ranging from $10 to $100+!</span></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Also people that don't follow these simple directions are not worth responding to in my experience.</span></p><span data-dcnode-id="1361" instrument_node="">

</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">There is a company called american standard claiming to help you find forclosed and pre foreclosed homes. They make you pay 199.00  to start and give you a password and username and a list which they say is up to date but it's not. You don't get your money back unless you recieve find refusal letters which won't happen because either the owners aren't really being foreclosed or the home is empty or just purchased. They're even bad with the BBB and go by other names. Thankfully my bank knew of them and replaced the money but others were not so lucky. If you want to find pre foreclosed homes then go on Zillow its legit.</span></p><span data-dcnode-id="1161" instrument_node="">

</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Hi-- so I posted a couple of different pieces of furniture on CL. At 1st, I made the mistake of putting my cell # &amp; got A LOT of spam texts. EG-- " I will send my assistant, need to pay thru paypal, etc" so I took my phone # down &amp; have ONLY CL mail. So in the last 2 days, I received CL mail relay (gotta be the same person w/ 2 different emails as this person keeps saying "I get off work at 5:30 &amp; would like to see your furnite. Is Wednesday (tomorrow) okay? Please email me back at blah blah blah @ gmail" I don't want to email anyone back at their email so I simply replied to the CL email asking which pieces are they interested in?? Is this normal that people ask me to email them directly?? Can they do anything w/ my real email address?? Oh yeah, btw, what got rid of the SEVERAL spam people was when I replied " cash only, all transactions done at my local P.D.!! " what should I do??</span></p><span data-dcnode-id="870" instrument_node="">

</span><div class="text" data-dcnode-id="820"><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">I called a man on Craig's list selling a small apartment size oven. He told me that he owned a apartment building, and the oven for sale was from one of his units. So , he quotes me a price of $250, and I agree to purchase the oven. I go to this building with my husband to purchase the oven. The guy shows up 20 minutes past the agreed time, takes us into a basement through one of those storm shelter type doors. Once we're in the basement the guy says the oven is gone he don't know what happened to it , and starts searching through different rooms looking for this oven. He apologized, and we left. Don't know for sure if we were being set up for a robery or not. The experience was a bit strange.</span></p><span data-dcnode-id="821" instrument_node="">

</span><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Now I'm concerned. I'm in the middle of the over-payment scam right now, but didn't know it as such before giving out my name and address. "I'm Alex by name," never offered over the asking price, but said he'd send a check, which I could first deposit, then could contact him and "his shipping company" would pick it up.  It was later that the over-payment part came into play. I've not yet received any check, and was suspicious about the reason for the over-payment (he could've called his bank and stopped payment), but now am worried that he has my name, address, and cell phone #. (This is my very first CraigsList ad and didn't know NOT to give a phone #.) someone else, here, was concerned with giving out similar info, but no one responded to her question.</span></p><span data-dcnode-id="772" instrument_node="">

</span><div class="text" data-dcnode-id="580"><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">This is a very old scam, I heard of it 6 yrs ago. Google it. It's not even a girl- it's professional con men, they have net works and make hundreds of thousands every year. They hire girls or prostitutes to pose for sessions. They are patient to work with you weeks. In the end it's all about $$. Look up "on-line dating scams". (They target middle aged single men).</span></p><span data-dcnode-id="581" instrument_node="">

</span><div class="text" data-dcnode-id="530"><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">A big one you're missing which is quite frequent, is the send your full name and address so I can send you a money order in 3, or more days. The text or email usually comes after a message of do you still have it?  </span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">You've probably shown a picture of something outdoors or on a porch. A roving band a thieves wants a nice big list of addresses they can visit at night in the next few days and pick up lots of things in your area..on the five finger discount.</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Who doesn't negotiate? Also if this is a text, you'll usually notice this one came from an area code..way..way away from you, like 3 states over. That's because they're doing this from a no contract phone that's untraceable. I get this one a lot and think it should be your number 1! BTW the cops act oblivious to any of these scams. and if you try to PRE-warn them they don't follow up or care. I had the same guy trying to lure me to several different inner city locations to deliver to him because I had several sets of tires and he didn't know I was the owner of all of them. So he tried several times! The cops didn't care when I called them said they hadn't had any problems, even though the police blotter mentions several people having this happen to them,  and I've got to think he has some success in mugging people who stupidly show up.</span></p><span data-dcnode-id="531" instrument_node="">

</span><div class="text" data-dcnode-id="472"><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">I thought I had found the dream car for my son on Craigslist, and received this email tonight.  I'm thinking scam, first, because it isn't even in my city.  Secondly, I'd have to send money to eBay Vehicle Purchase Protection, and I didn't even get the car information through ebay.  Here's the email in full:</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Hi,</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node=""> The car is located in Mobile, AL at DAS ( Dependable Auto Shippers ) headquarters, in the container, sealed and ready for shipping. I would like to use eBay Vehicle Purchase Protection,so we can both be protected and insured.You will have 10 days so you can inspect the car. Once you have inspected the car and decided to keep it, you will confirm your decision to eBay and only then they will re-route the money in to my account, but if by any reason, you won't be satisfied with the car you can return it back for a full refund of your money. I will take care of the shipping, don't worry. You will receive the car with all the necessary papers (clear title, bill of sale, user’s manual, insurance etc). Just get back with your full name and full shipping address and I will get everything started as soon as possible, then eBay will contact you with more further instructions.</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Thanks a lot!</span></p><span data-dcnode-id="473" instrument_node="">

</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Here is the email from one of my experience while selling an ipad. She seemed genuine in initial emails. Unfortunately I provided her address but not my home address, instead I gave address of my office which is a secure building. But then after receiving this email and checking forums from you guys, I guess I could have been a potential victim. So, I just refused her. But not sure what to do with the check if I receive it.</span></p><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="423" instrument_node="">"Good day, How are you doing today &amp; i'm sorry for my late in</span><br data-dcnode-id="422"><span data-dcnode-id="421" instrument_node="">

 Via USPS and  he included the shipment funds in the amount on the</span><br data-dcnode-id="418"><span data-dcnode-id="417" instrument_node="">

 your money as agreed and additional $100 for  keeping the item for me</span><br data-dcnode-id="414"><span data-dcnode-id="413" instrument_node="">
 and your running around and then give the rest  balance to the mover</span><br data-dcnode-id="412"><span data-dcnode-id="411" instrument_node="">
 coming for the pick up, I hope i can trust you with my money?  We have</span><br data-dcnode-id="410"><span data-dcnode-id="409" instrument_node="">
 some other items around your location needed for our new apartment</span><br data-dcnode-id="408"><span data-dcnode-id="407" instrument_node="">
 with the mover will be picking up everything together  but pls i will</span><br data-dcnode-id="406"><span data-dcnode-id="405" instrument_node="">
 need your honest and trust and your updating to end up this</span><br data-dcnode-id="404"><span data-dcnode-id="403" instrument_node="">
 transaction..because this is our first time on the list. I will get</span><br data-dcnode-id="402"><span data-dcnode-id="401" instrument_node="">
 back to you with the tracking number to monitor the payment with the</span><br data-dcnode-id="400"><span data-dcnode-id="399" instrument_node="">
 mover information  tomorrow morning so that you will know who will be</span><br data-dcnode-id="398"><span data-dcnode-id="397" instrument_node="">
 coming for the pick up.</span><br data-dcnode-id="396"><span data-dcnode-id="395" instrument_node="">
 Thanks and God bless</span><br data-dcnode-id="394"><span data-dcnode-id="393" instrument_node="">
 Best Regard"</span></p><span data-dcnode-id="391" instrument_node="">
