</span><p data-dcnode-id="2135"><span data-dcnode-id="2137" instrument_node="">Scams are nothing new to photographers, but scammers are getting cleverer and more thorough. A scammer who targeted&nbsp;me in November was the most convincing one I’ve had&nbsp;yet. I’m going to share the scammer’s emails&nbsp;and the clues that gave him away.</span></p><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">I’m not a fan of email in the first place;&nbsp;it always feels like drudgery to me, so I usually scan things pretty quickly to decide whether to respond. Unlike more obvious scam emails pitching family reunions, this one was harder to parse. I researched the sender and found that it was a real person in a real position with the magazine mentioned in the email. This confused me because, on the second reading, the strange capitalization, punctuation, and grammar made me suspicious.&nbsp;</span></p><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Here is the email I received.</span></p><span data-dcnode-id="2128" instrument_node="">
</span><div class="media media-element-container media-default" data-dcnode-id="2125"><a class="galleryImage fbGallery-processed target-processed" data-dcnode-id="2126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.fstoppers.com/styles/xlarge/s3/media/2020/02/07/photography_scam_1_0.png" title=""><img alt="" class="media-element file-default" data-dcnode-id="2127" height="509" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.fstoppers.com/styles/full/s3/media/2020/02/07/photography_scam_1_0.png&amp;raw" srcset="https://cdn.fstoppers.com/styles/medium/s3/media/2020/02/07/photography_scam_1_0.png 1031w, https://cdn.fstoppers.com/styles/large/s3/media/2020/02/07/photography_scam_1_0.png 700w, https://cdn.fstoppers.com/styles/full/s3/media/2020/02/07/photography_scam_1_0.png 1500w" width="1500"></a></div><span data-dcnode-id="2124" instrument_node="">
</span><div class="media media-element-container media-default" data-dcnode-id="2121"><a class="galleryImage fbGallery-processed target-processed" data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.fstoppers.com/styles/xlarge/s3/media/2020/02/07/photography_scam_2.png" title=""><img alt="" class="media-element file-default" data-dcnode-id="2123" height="440" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.fstoppers.com/styles/full/s3/media/2020/02/07/photography_scam_2.png&amp;raw" srcset="https://cdn.fstoppers.com/styles/medium/s3/media/2020/02/07/photography_scam_2.png 1192w, https://cdn.fstoppers.com/styles/large/s3/media/2020/02/07/photography_scam_2.png 700w, https://cdn.fstoppers.com/styles/full/s3/media/2020/02/07/photography_scam_2.png 1500w" width="1500"></a></div><span data-dcnode-id="2120" instrument_node="">
</span><div class="media media-element-container media-default" data-dcnode-id="2117"><a class="galleryImage fbGallery-processed target-processed" data-dcnode-id="2118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.fstoppers.com/styles/xlarge/s3/media/2020/02/07/photography_scam_3.png" title=""><img alt="" class="media-element file-default" data-dcnode-id="2119" height="435" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.fstoppers.com/styles/full/s3/media/2020/02/07/photography_scam_3.png&amp;raw" srcset="https://cdn.fstoppers.com/styles/medium/s3/media/2020/02/07/photography_scam_3.png 1207w, https://cdn.fstoppers.com/styles/large/s3/media/2020/02/07/photography_scam_3.png 700w, https://cdn.fstoppers.com/styles/full/s3/media/2020/02/07/photography_scam_3.png 1500w" width="1500"></a></div><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2111"><span data-dcnode-id="2115" instrument_node="">When you’re busy and reading quickly, it’s easy to miss some of the signs that become obvious only in hindsight. I suspect scammers know this. To make matters worse, the desire for work can make photographers even more susceptible, and scammers take note of what works and what doesn’t. In order to avoid getting taken advantage of, it’s important to pay attention to both the obvious, and the more subtle signs of a scam. Poor grammar and improper punctuation should make you hesitate and pay careful attention to the rest of the email. The generic opening, which includes nothing specific about why the magazine might have been interested in hiring me, smacks of a form email that might be sent to many people. And you should always steer clear of emails that offer to overpay you so you can pay other people. That’s a sign of </span><a class="target-processed" data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumer.ftc.gov/blog/2018/09/anatomy-fake-check-scam" rel="noopener" target="_blank"><span data-dcnode-id="2114" instrument_node="">classic check fraud</span></a><span data-dcnode-id="2112" instrument_node="">. But those are the signs we already know to watch for. What about the more subtle clues we might not be aware of?&nbsp;</span></p><span data-dcnode-id="2110" instrument_node="">
</span><p data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">I reached out to commercial and editorial photographer, Alexis Cuarezma, who is well versed in chatting with magazine editors over email,&nbsp;to see what red flags he could find in the email. He picked up a few things that photographers with less experience may not notice. Here are the things he pointed out:</span></p><span data-dcnode-id="2107" instrument_node="">
</span><ol data-dcnode-id="2088"><li data-dcnode-id="2102"><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">The chances of an editor using their personal Gmail on a first contact email are slim. They’re much likelier to use a work-associated email with relevant contact information in the signature line.</span></p><span data-dcnode-id="2103" instrument_node="">
</span></li><span data-dcnode-id="2101" instrument_node="">
</span><li data-dcnode-id="2096"><span data-dcnode-id="2100" instrument_node="">
</span><p data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">The scammer gave too much information. According to Cuarezma: “This person wrote out every single detail without even knowing if you're available or willing to do the job. No one is going to send out such a long email and waste so much time.”&nbsp;</span></p><span data-dcnode-id="2097" instrument_node="">
</span></li><span data-dcnode-id="2095" instrument_node="">
</span><li data-dcnode-id="2090"><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">They asked for way too much information. My full name and detailed address in a cold email? Why would they need that, especially if I hadn’t even agreed to do the job?</span></p><span data-dcnode-id="2091" instrument_node="">
</span></li><span data-dcnode-id="2089" instrument_node="">
</span></ol><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Another thing Cuarezma pointed out was that in my research, I could have looked for the contact info to verify the proper email address was being used. It wasn’t. The sender of my email was using a generic Gmail account instead of the business email associated with his job description. So, I responded to see if I could get the scammer to give away the game in the hope of writing this article, so you could see how a scam might give itself away in real-time.</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Here is our exchange.</span></p><span data-dcnode-id="2082" instrument_node="">
</span><div class="media media-element-container media-default" data-dcnode-id="2079"><a class="galleryImage fbGallery-processed target-processed" data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.fstoppers.com/styles/xlarge/s3/media/2020/02/07/photography_4.png" title=""><img alt="" class="media-element file-default" data-dcnode-id="2081" height="155" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.fstoppers.com/styles/full/s3/media/2020/02/07/photography_4.png&amp;raw" srcset="https://cdn.fstoppers.com/styles/medium/s3/media/2020/02/07/photography_4.png 2525w, https://cdn.fstoppers.com/styles/large/s3/media/2020/02/07/photography_4.png 700w, https://cdn.fstoppers.com/styles/full/s3/media/2020/02/07/photography_4.png 1118w" width="1118"></a></div><span data-dcnode-id="2078" instrument_node="">
</span><div class="media media-element-container media-default" data-dcnode-id="2075"><a class="galleryImage fbGallery-processed target-processed" data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.fstoppers.com/styles/xlarge/s3/media/2020/02/07/photography_scam_5.png" title=""><img alt="" class="media-element file-default" data-dcnode-id="2077" height="590" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.fstoppers.com/styles/full/s3/media/2020/02/07/photography_scam_5.png&amp;raw" srcset="https://cdn.fstoppers.com/styles/medium/s3/media/2020/02/07/photography_scam_5.png 874w, https://cdn.fstoppers.com/styles/large/s3/media/2020/02/07/photography_scam_5.png 700w, https://cdn.fstoppers.com/styles/full/s3/media/2020/02/07/photography_scam_5.png 1473w" width="1473"></a></div><span data-dcnode-id="2074" instrument_node="">
</span><div class="media media-element-container media-default" data-dcnode-id="2071"><a class="galleryImage fbGallery-processed target-processed" data-dcnode-id="2072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.fstoppers.com/styles/xlarge/s3/media/2020/02/07/photography_scam_6.png" title=""><img alt="" class="media-element file-default" data-dcnode-id="2073" height="375" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.fstoppers.com/styles/full/s3/media/2020/02/07/photography_scam_6.png&amp;raw" srcset="https://cdn.fstoppers.com/styles/medium/s3/media/2020/02/07/photography_scam_6.png 1084w, https://cdn.fstoppers.com/styles/large/s3/media/2020/02/07/photography_scam_6.png 700w, https://cdn.fstoppers.com/styles/full/s3/media/2020/02/07/photography_scam_6.png 1161w" width="1161"></a></div><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2065"><span data-dcnode-id="2069" instrument_node="">As you can see, the scam was clearly revealed when the scammer told me that I would be overpaid in the expectation that I would pay the team from a talent agency they had already contracted. That’s the canary in the coal mine. Classic check fraud. Just to clarify, I made sure the expectation was that the money would come to me, and I was expected to pay the team. That’s when I cut off communication and reported it. I also did a quick web search to see if the wording was reported in other photography scams, and look </span><a class="target-processed" data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aphotoeditor.com/2019/01/09/scam-alert-fake-departures-magazine-shoot/" rel="noopener" target="_blank"><span data-dcnode-id="2068" instrument_node="">what I found</span></a><span data-dcnode-id="2066" instrument_node="">...</span></p><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">I hope this exchange will be helpful in catching the current round of scammers before they take advantage of any other photographers. Please share this article if you found it helpful, and make sure to comment below with any scam emails you’ve received and how you were able to spot the signs. The more we know, the better we can defend ourselves.</span></p><span data-dcnode-id="2061" instrument_node="">

</span><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="924"><div class="field-item" data-dcnode-id="925"><p data-dcnode-id="930"><span data-dcnode-id="939" instrument_node="">I worked 3 years as cruise photographer and just the other day (after more of 1 year that I apply) I receive an email from national geographic expeditions (their cruise line) offering me a position.</span><br data-dcnode-id="938"><span data-dcnode-id="937" instrument_node="">
As you say, the first error was the name and email address. After working so many years with different companies you noticed that they have their own business email so is weird that someone send something like that from gmail and specially mispronounce a simple name.</span><br data-dcnode-id="936"><span data-dcnode-id="935" instrument_node="">
Second the email was like very informal with lack of the classic signature with contact links and other ways to contact him.</span><br data-dcnode-id="934"><span data-dcnode-id="933" instrument_node="">
So I decided to play the interested card and this guy sent me a pdf with the job description, the itineraries, responsibilities, etc, and one of the points that call my attention (besides the salary &lt;4k x 8 days&gt;) was that if for some reason you don't want to deliver the pictures shooted for the company, you must send a note in before the cruise\expedition so you can keep it, basically is like you do the expedition for free.</span><br data-dcnode-id="932"><span data-dcnode-id="931" instrument_node="">
After I ask him the same question (why do you use your personal email?) this guy didn't answer back of course.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Also last year when I was teaching photography in home, one of my students shows up excited because he receive an email from an exposition in a small gallery in Paris that was interested in display their pictures, ofc you need it to pay a fee of 40 euros and send the 5 best photos and he did it without telling anyone because he wanted to surprise everyone.. oh well.. he get surprise for sure :\</span></p><span data-dcnode-id="926" instrument_node="">
</span></div></div><span data-dcnode-id="923" instrument_node="">

</span><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="868"><div class="field-item" data-dcnode-id="869"><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">I'm always suspicious, but a few years ago I had a live one that I let play out.  My thinking was, let them FedEx me a cheque so that they are out of pocket for the courier fees.  Turns out that they sent me a cheque from a Sony affiliate, so I called Sony and they said that some cheques had gone missing, and this was one of the series that was lost.  I never bothered cashing the cheque, but I was glad that Sony decided to follow up with their security department.  After talking with Sony's security folks I was done, but I still have a smile on my face because I cost the scammers money AND I outsmarted them.</span></p><span data-dcnode-id="870" instrument_node="">
