urrounding%20new%20pension%20options.%0A%0Ahttps://www.which.co.uk/consumer-rights/advice/pension-scams-ak6dF6c5KszR%0A%0A" rel="noreferrer" target="_blank"><svg aria-hidden="true" class="Icon__icon--3AZ46 sb-vertical-align-middle Roundel__roundelIcon--199Pu sb-bg-color-charcoal-100 SocialLink__socialLinkIcon--2IYl-" data-dcnode-id="505" data-testid="roundel-icon-mail" focusable="false" height="32px" tabindex="-1" version="1.1" viewBox="0 0 32 32" width="32px" xlink:href="https://www.w3.org/1999/xlink" xml:space="preserve" xmlns="https://www.w3.org/2000/svg"><path d="M27,10 L27,21 C27,22.33 26.33,23 25,23 L7,23 C5.67,23 5,22.33 5,21 L5,10 C5,9.69 5.04,9.41 5.11,9.17 L14.18,16.88 L14.31,17.01 C14.67,17.32 15.07,17.5 15.5,17.5 C15.98,17.5 16.43,17.27 16.85,16.85 L26.58,8.59 C26.86,8.92 27,9.39 27,10 Z M25,8 C25.24,8 25.46,8.02 25.65,8.06 L16.18,16.12 L16.08,16.22 C15.85,16.42 15.66,16.5 15.5,16.5 C15.31,16.5 15.1,16.4 14.85,16.15 L5.68,8.35 C6,8.12 6.44,8 7,8 L25,8 Z" data-dcnode-id="506" data-testid="icon-mail" fill="#FFFFFF"></path></svg></a></li></ul></div></div></div></section><section class="GridItemArticle__body--JyNAK gc-col-4 gc-row gridarea-body" data-dcnode-id="305"><div class="gc-col-12 gc-row" data-dcnode-id="361"><div class="article-wrapper" data-dcnode-id="364"><div data-dcnode-id="485" data-testid="infobox"><section class="InfoBox__infoBoxWrapper--1HXdG InfoBox__infoBoxWrapperBlue--3ig22" data-dcnode-id="486" data-testid="info-box"><p class="sb-sans-serif-regular sb-text-very-small-print sb-margin-bottom-2 InfoBox__infoBoxByline--qGIb-" data-dcnode-id="496" data-testid="info-box-byline"><span data-dcnode-id="497" instrument_node="">Key Information</span></p><div data-dcnode-id="495"></div><div data-dcnode-id="488"><h3 class="sb-sans-serif-semibold sb-text-title-400 h3-article" data-dcnode-id="493" data-testid="typography-title-400"><span data-dcnode-id="494" instrument_node="">Ban on pension cold calling</span></h3><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="491" data-testid="typography-body"><span data-dcnode-id="492" instrument_node="">Pension scams are a worrying problem and are costing savers millions of pounds. The government has announced a ban on pensions cold calling.</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="489" data-testid="typography-body"><span data-dcnode-id="490" instrument_node="">No legitimate pension or investment firm will ever cold call you about releasing cash from your pension, accessing it before you are 55 or extra tax savings, so alarm bells should ring if they do.</span></p></div><div data-dcnode-id="487"></div></section></div><h2 class="sb-serif-semibold sb-text-title-600 h2-article" data-dcnode-id="481" data-testid="typography-title-600" id="whats-a-pension-scam"><strong class="strong-article" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">1</span></strong><span data-dcnode-id="482" instrument_node=""> What’s a pension scam?</span></h2><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="479" data-testid="typography-body"><span data-dcnode-id="480" instrument_node="">Since April 2015, the government’s pension reforms have given the over-55s the freedom to cash in their company and personal pensions.</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="477" data-testid="typography-body"><span data-dcnode-id="478" instrument_node="">Thousands of people now have more freedom over what to do with their pension pot. With millions of pounds now accessible that previously weren’t, scammers will circle like vultures and try to take advantage.</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="475" data-testid="typography-body"><span data-dcnode-id="476" instrument_node="">Pension scams are not a new thing. But they are likely to become more prevalent now people have more options available to them when it comes to investing or spending their money.&nbsp;</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="473" data-testid="typography-body"><span data-dcnode-id="474" instrument_node="">Pension scams may be referred to by shady salesmen as:</span></p><ul class="ul-article" data-dcnode-id="462"><li class="sb-sans-serif-regular sb-text-body li-article" data-dcnode-id="471" data-testid="typography-body"><span data-dcnode-id="472" instrument_node="">pension loans</span></li><li class="sb-sans-serif-regular sb-text-body li-article" data-dcnode-id="469" data-testid="typography-body"><span data-dcnode-id="470" instrument_node="">early pension release</span></li><li class="sb-sans-serif-regular sb-text-body li-article" data-dcnode-id="467" data-testid="typography-body"><span data-dcnode-id="468" instrument_node="">pension selling</span></li><li class="sb-sans-serif-regular sb-text-body li-article" data-dcnode-id="465" data-testid="typography-body"><span data-dcnode-id="466" instrument_node="">cashing in your pension</span></li><li class="sb-sans-serif-regular sb-text-body li-article" data-dcnode-id="463" data-testid="typography-body"><span data-dcnode-id="464" instrument_node="">pension liberation</span></li></ul><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="460" data-testid="typography-body"><span data-dcnode-id="461" instrument_node="">These are all different names for essentially the same thing – an agreement to transfer your pension savings to something that allows you access to your funds before the age of 55.&nbsp;</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="458" data-testid="typography-body"><span data-dcnode-id="459" instrument_node="">Or, to allow you to access your pension pot as cash in larger quantities than is currently allowed under the law.</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="456" data-testid="typography-body"><span data-dcnode-id="457" instrument_node="">Scammers may attempt to sell you a too-good-to-be-true, ‘one-off’ investment, usually via an unsolicited phone call, text message or email, or even in person after calling at your door.</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="454" data-testid="typography-body"><span data-dcnode-id="455" instrument_node="">They may even attempt to entice you with upfront cash payments.</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="452" data-testid="typography-body"><span data-dcnode-id="453" instrument_node="">Scammers will often offer a ‘free pension review’ to give the impression that they are honest and independent advisers.&nbsp;</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="450" data-testid="typography-body"><span data-dcnode-id="451" instrument_node="">You should only get a review from an Independent Financial Adviser registered with the Financial Conduct Authority (FCA).</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="448" data-testid="typography-body"><span data-dcnode-id="449" instrument_node="">Some scammers also advise you to ‘liberate’ your pension into one of these too-good-to-be-true schemes before you turn 55, which isn’t permitted under the new rules</span></p><h2 class="sb-serif-semibold sb-text-title-600 h2-article" data-dcnode-id="444" data-testid="typography-title-600" id="how-do-i-avoid-pension-scams"><strong class="strong-article" data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">2</span></strong><span data-dcnode-id="445" instrument_node=""> How do I avoid pension scams?</span></h2><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="442" data-testid="typography-body"><span data-dcnode-id="443" instrument_node="">You should always be suspicious if anyone calls you out of the blue to offer you a money-making deal.</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="440" data-testid="typography-body"><span data-dcnode-id="441" instrument_node="">If someone calls you, always ask to call them back. Reputable companies will always be happy to let you do this, whereas scammers tend to be more reluctant to give contact details.</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="438" data-testid="typography-body"><span data-dcnode-id="439" instrument_node="">Any review of your pension should be conducted by a regulated financial adviser.</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="436" data-testid="typography-body"><span data-dcnode-id="437" instrument_node="">Be aware that some firms might pretend to be offering free guidance, and&nbsp;some might even pretend to represent Pension Wise, which the government has made an offence in recent legislation.</span></p><div data-dcnode-id="414" data-testid="infobox"><section class="InfoBox__infoBoxWrapper--1HXdG InfoBox__infoBoxWrapperBlue--3ig22" data-dcnode-id="415" data-testid="info-box"><p class="sb-sans-serif-regular sb-text-very-small-print sb-margin-bottom-2 InfoBox__infoBoxByline--qGIb-" data-dcnode-id="434" data-testid="info-box-byline"><span data-dcnode-id="435" instrument_node="">Key Information</span></p><div data-dcnode-id="433"></div><div data-dcnode-id="417"><h3 class="sb-sans-serif-semibold sb-text-title-400 h3-article" data-dcnode-id="431" data-testid="typography-title-400"><span data-dcnode-id="432" instrument_node="">Spot a pensions scam</span></h3><ul class="ul-article" data-dcnode-id="418"><li class="sb-sans-serif-regular sb-text-body li-article" data-dcnode-id="429" data-testid="typography-body"><span data-dcnode-id="430" instrument_node="">phrases used include ‘one-off investment opportunity’, ‘free pension review’, ‘legal loopholes’, ‘cash bonus’, ‘government endorsement’</span></li><li class="sb-sans-serif-regular sb-text-body li-article" data-dcnode-id="427" data-testid="typography-body"><span data-dcnode-id="428" instrument_node="">you’re approached out of the blue over the phone, via text messages or in person at the door</span></li><li class="sb-sans-serif-regular sb-text-body li-article" data-dcnode-id="425" data-testid="typography-body"><span data-dcnode-id="426" instrument_node="">you’re asked to transfer your money overseas</span></li><li class="sb-sans-serif-regular sb-text-body li-article" data-dcnode-id="423" data-testid="typography-body"><span data-dcnode-id="424" instrument_node="">you’re promised access to your pension before age 55</span></li><li class="sb-sans-serif-regular sb-text-body li-article" data-dcnode-id="421" data-testid="typography-body"><span data-dcnode-id="422" instrument_node="">no copies of any documentation is provided</span></li><li class="sb-sans-serif-regular sb-text-body li-article" data-dcnode-id="419" data-testid="typography-body"><span data-dcnode-id="420" instrument_node="">you’re encouraged to speed up transfer of your money to the new scheme.</span></li></ul></div><div data-dcnode-id="416"></div></section></div><h2 class="sb-serif-semibold sb-text-title-600 h2-article" data-dcnode-id="410" data-testid="typography-title-600" id="research-the-company"><strong class="strong-article" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">3</span></strong><span data-dcnode-id="411" instrument_node=""> Research the company</span></h2><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="408" data-testid="typography-body"><span data-dcnode-id="409" instrument_node="">Check the FCA’s register of regulated financial services providers. This will tell you whether the company is registered as well as listing any companies being investigated.</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="406" data-testid="typography-body"><span data-dcnode-id="407" instrument_node="">Any company claiming to be government-endorsed is not telling the truth.&nbsp;</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="404" data-testid="typography-body"><span data-dcnode-id="405" instrument_node="">Don’t proceed unless you are absolutely certain your money will be safe. Once you transfer, it’s too late.</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="396" data-testid="typography-body"><span data-dcnode-id="403" instrument_node="">The government has launched an official pension guidance service called Pension Wise.&nbsp;You can </span><a class="sb-link-primary" data-dcnode-id="398" data-testid="standard-link-primary" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pensionwise.gov.uk/%3Fgclid%3DCJrAk9bV0cwCFbgy0wodi90HnA" rel="noopener noreferrer" target="_blank"><span class="sb-link-animation-wrapper" data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">book a free appointment</span></span><svg aria-hidden="false" class="Icon__icon--3AZ46 sb-vertical-align-middle StandardLink__standardLinkNewWindow--1u8o9" data-dcnode-id="399" data-testid="svg" focusable="false" height="16px" tabindex="-1" version="1.1" viewBox="0 0 16 16" width="16px" xlink:href="https://www.w3.org/1999/xlink" xml:space="preserve" xmlns="https://www.w3.org/2000/svg"><path d="M13.55 0H16v6.651a1.014 1.014 0 01-2.027 0V3.46l-6.726 6.727a1.007 1.007 0 01-.716.296 1.014 1.014 0 01-.716-1.73l6.725-6.725H9.349a1.014 1.014 0 110-2.027h4.2zM6.796 2a1.019 1.019 0 110 2.04h-4.33a.426.426 0 00-.426.426v9.069c0 .234.19.424.425.424h9.07c.235 0 .425-.19.425-.424V9.204a1.02 1.02 0 012.04 0v4.331A2.469 2.469 0 0111.534 16H2.465A2.468 2.468 0 010 13.535V4.466A2.47 2.47 0 012.465 2h4.331z" data-dcnode-id="400" data-testid="icon-externalLink" fill="#1866C8" fill-rule="evenodd"></path></svg></a><span data-dcnode-id="397" instrument_node=""> to talk about your pension options.&nbsp;The guidance is being delivered by Citizens Advice and the Pensions Advisory Service. &nbsp;</span></p><h2 class="sb-serif-semibold sb-text-title-600 h2-article" data-dcnode-id="392" data-testid="typography-title-600" id="further-help"><strong class="strong-article" data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">4</span></strong><span data-dcnode-id="393" instrument_node=""> Further help</span></h2><ul class="ul-article" data-dcnode-id="380"><li class="sb-sans-serif-regular sb-text-body li-article" data-dcnode-id="387" data-testid="typography-body"><span data-dcnode-id="391" instrument_node="">before you sign anything, call the Pensions Advisory Service on </span><strong class="strong-article" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">0300 123 1047</span></strong><span data-dcnode-id="388" instrument_node=""> for information and guidance</span></li><li class="sb-sans-serif-regular sb-text-body li-article" data-dcnode-id="383" data-testid="typography-body"><span data-dcnode-id="386" instrument_node="">if you have already accepted an offer, raise the alarm by calling Action Fraud on </span><strong class="strong-article" data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">0300 123 2040</span></strong></li><li class="sb-sans-serif-regular sb-text-body li-article" data-dcnode-id="381" data-testid="typography-body"><span data-dcnode-id="382" instrument_node="">find out more about your money options in our pensions and retirement section.</span></li></ul><h2 class="sb-serif-semibold sb-text-title-600 h2-article" data-dcnode-id="376" data-testid="typography-title-600" id="better-pensions-campaign"><strong class="strong-article" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">5</span></strong><span data-dcnode-id="377" instrument_node=""> Better pensions campaign</span></h2><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="374" data-testid="typography-body"><span data-dcnode-id="375" instrument_node="">Pension reforms mean people have more options than ever before on how to use their pension pot.&nbsp;</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="372" data-testid="typography-body"><span data-dcnode-id="373" instrument_node="">The Which? ‘Better pensions’ campaign is calling for action to make sure everyone can benefit from the freedom and choices available to them.&nbsp;</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="370" data-testid="typography-body"><span data-dcnode-id="371" instrument_node="">We want a government-backed scheme to be established to give everyone access to a good value, low-cost pension product, no matter who their pension provider. &nbsp;</span></p><p class="sb-sans-serif-regular sb-text-body p-article" data-dcnode-id="365" data-testid="typography-body"><span data-dcnode-id="369" instrument_node="">Sign up to join our </span><a class="sb-link-primary" data-dcnode-id="366" data-testid="standard-link-primary" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.which.co.uk/campaigns/better-pensions/" rel="noopener noreferrer"><span class="sb-link-animation-wrapper" data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Better pensions campaign.</span></span></a></p></div><div class="usabilla-fixed-min-height gc-col-12" data-dcnode-id="362"><div data-dcnode-id="363" ub-in-page="5df11a2f1a8e9e0bb5749bb6"></div></div></div><div class="related-footer gc-col-12 gc-row" data-dcnode-id="339"><div class="AssociatedArticles_associatedArticleLinksWrapper__1sO4C" data-dcnode-id="340" data-testid="associated-article-links-wrapper"><section data-dcnode-id="341" data-testid="multi-link-wrapper"><h2 class="sb-sans-serif-semibold sb-text-title-400 sb-padding-bottom-3" data-dcnode-id="359" data-testid="multi-link-title"><span data-dcnode-id="360" instrument_node="">Related articles</span></h2><ul class="MultiLinkBlock_multiLinkList__3sfSF sb-margin-left-zero sb-margin-top-zero sb-padding-left-zero sb-list-style-type-none"
