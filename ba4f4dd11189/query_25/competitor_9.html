</span><div class="wp-block-columns" data-dcnode-id="426"><span data-dcnode-id="659" instrument_node="">

</span><div class="post-thumbnail" data-dcnode-id="648"><span data-dcnode-id="657" instrument_node="">
</span><img alt="Scam email warning on computer screen" class="attachment-post-thumbnail size-post-thumbnail wp-post-image" data-dcnode-id="656" data-hero="" height="707" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pcworld.com/wp-content/uploads/2021/11/scam-email-stock-art.jpg%3Fquality%3D50%26strip%3Dall%26w%3D1024&amp;raw" srcset="https://www.pcworld.com/wp-content/uploads/2021/11/scam-email-stock-art.jpg?quality=50&amp;strip=all 5114w, https://www.pcworld.com/wp-content/uploads/2021/11/scam-email-stock-art.jpg?resize=300%2C207&amp;quality=50&amp;strip=all 300w, https://www.pcworld.com/wp-content/uploads/2021/11/scam-email-stock-art.jpg?resize=768%2C530&amp;quality=50&amp;strip=all 768w, https://www.pcworld.com/wp-content/uploads/2021/11/scam-email-stock-art.jpg?resize=1024%2C707&amp;quality=50&amp;strip=all 1024w, https://www.pcworld.com/wp-content/uploads/2021/11/scam-email-stock-art.jpg?resize=1536%2C1061&amp;quality=50&amp;strip=all 1536w, https://www.pcworld.com/wp-content/uploads/2021/11/scam-email-stock-art.jpg?resize=2048%2C1414&amp;quality=50&amp;strip=all 2048w" width="1024"><span data-dcnode-id="655" instrument_node=""> </span><div class="post-thumbnail-text" data-dcnode-id="650"><span data-dcnode-id="654" instrument_node="">
</span><span class="credit" data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Rawpixel.com/Shutterstock</span></span><span data-dcnode-id="651" instrument_node=""> </span></div><span data-dcnode-id="649" instrument_node="">

</span><div class="entry-content" data-dcnode-id="435"><span data-dcnode-id="645" instrument_node="">
</span><div data-dcnode-id="644" id="post-toc"></div><span data-dcnode-id="643" instrument_node="">
</span><div data-dcnode-id="502" id="link_wrapped_content"><span data-dcnode-id="642" instrument_node="">
</span><section class="wp-block-bigbite-multi-title" data-dcnode-id="640"><div class="container" data-dcnode-id="641"></div></section><p data-dcnode-id="635"><span data-dcnode-id="639" instrument_node="">The fact that you and everyone you know will receive spam and scam emails (and texts) for as long as they live should be added to the famous Ben Franklin quote, “… in this world nothing can be said to be certain, except death and taxes.” Death, taxes, and spam. It’s constant, ever-present, and you likely have a few hundred of them sitting in your Spam folder as you read this. The very fact that we even </span><em data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">need</span></em><span data-dcnode-id="636" instrument_node=""> to have a spam folder tells us there’s a problem. However, you are a savvy navigator of your inbox, and a seasoned connoisseur of Nigerian missives. The problem is, someone in your family is decidedly not. Maybe it’s your mother or father, an uncle, or even a step-relative. Here’s some advice to lend them in order to keep them safe.</span></p><span data-dcnode-id="634" instrument_node="">
</span><h2 data-dcnode-id="632" id="always-know-and-verify-the-sender"><span data-dcnode-id="633" instrument_node="">Always know (and verify) the sender</span></h2><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">An email from someone you know suddenly arriving in your inbox with no warning is a red flag. Typically, when we get email from our family or friends, it’s about a topic we are actively discussing, so when there is no warning of an incoming email, tread lightly; it could be a scam. If there is a link inside this email, then it’s almost always a scam. Hackers and ne’er-do-wells can sometimes take over someone’s email account and just start spamming all of their contacts with nefarious links that seem safe, but will plant malware on your system, or worse. Luckily, this tactic is easy to counter since you can just verify if the person who you think sent the email did indeed mean to send it. A simple phone call or text will do, and if they exclaim, “What email?” then you know what to do.</span></p><span data-dcnode-id="628" instrument_node="">
</span><div class="fake_sidebar_front" data-dcnode-id="627"></div><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="625" instrument_node="">It’s also important to point out that when examining these emails, don’t just look at the name of the sender, but the email address. For example I got a spam email from “Facebook” recently, which is obviously fake, but when I clicked the drop-down for the actual address and CC’d people, I saw the details below. Even your </span><em data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">grandma</span></em><span data-dcnode-id="622" instrument_node=""> knows that is fishy. Not to mention the address </span><a data-dcnode-id="620" href="mailto:Facebookmail750@gmail.com"><span data-dcnode-id="621" instrument_node="">Facebookmail750@gmail.com</span></a><span data-dcnode-id="619" instrument_node="">—come on spammers, try harder.</span></p><span data-dcnode-id="617" instrument_node="">
</span><div class="extendedBlock-wrapper block-coreImage undefined" data-dcnode-id="612"><figure class="wp-block-image size-full" data-dcnode-id="615"><img alt="List of scam email addresses in message" class="wp-image-549428" data-dcnode-id="616" height="887" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//b2c-contenthub.com/wp-content/uploads/2021/11/spam-list.png&amp;raw" srcset="https://b2c-contenthub.com/wp-content/uploads/2021/11/spam-list.png?quality=50&amp;strip=all 1200w, https://b2c-contenthub.com/wp-content/uploads/2021/11/spam-list.png?resize=300%2C260&amp;quality=50&amp;strip=all 300w, https://b2c-contenthub.com/wp-content/uploads/2021/11/spam-list.png?resize=768%2C665&amp;quality=50&amp;strip=all 768w" width="1024"></figure><p class="imageCredit" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Josh Norem/IDG</span></p></div><span data-dcnode-id="611" instrument_node="">
</span><h2 data-dcnode-id="609" id="always-check-links-in-email"><span data-dcnode-id="610" instrument_node="">Always check links in email</span></h2><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="607" instrument_node="">As a general rule it’s safest to never click any links in emails, even if you think you know the source; mostly because you might not actually know the source (see above) and clicking links in email is how the vast majority of people fall victim to phishing operations (see the United States </span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.redirectingat.com/%3Fid%3D111346X1569483%26url%3Dhttps%3A//www.cbsnews.com/news/the-phishing-email-that-hacked-the-account-of-john-podesta/%26xcust%3D2-1-549422-1-0-0%26sref%3Dhttps%3A//www.pcworld.com/article/549422/how-to-spot-a-scam-email.html" rel="nofollow"><span data-dcnode-id="606" instrument_node="">Presidential election of 2016</span></a><span data-dcnode-id="604" instrument_node=""> for how disastrous this can be). That said, if you are sure of the source, and you are confident it is not a spam or scam email, you can always check the actual link prior to clicking it, and the process is quite simple. Just hover your mouse over the link in the email, and a little window will pop-up in the lower corner of your browser (usually on the left side) showing you what the actual link. For example, when I hover over </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pcworld.com/article/541476/see-your-ssds-hidden-stats-with-this-free-tool.html"><span data-dcnode-id="603" instrument_node="">this masterfully written article’s</span></a><span data-dcnode-id="601" instrument_node=""> link on PCWorld.com, I can look in the lower left-hand corner to see where it will take me. You might need to enable this preview window in your browser, so if you don’t see link previews click “View” in your browser’s controls and look for something called Status Bar or similar.</span></p><span data-dcnode-id="599" instrument_node="">
</span><div class="jwPlayer--floatingContainer" data-dcnode-id="594"><span data-dcnode-id="598" instrument_node="">
</span><div class="jwplayer" data-dcnode-id="596" data-media-id="ZpKXvna2" id="jwplayer--floatingVideo"><span data-dcnode-id="597" instrument_node="">
</span></div><span data-dcnode-id="595" instrument_node="">
</span></div><span data-dcnode-id="593" instrument_node="">
</span><div class="extendedBlock-wrapper block-coreImage undefined" data-dcnode-id="588"><figure class="wp-block-image size-large" data-dcnode-id="591"><img alt="Hovering link preview in browser" class="wp-image-549429" data-dcnode-id="592" height="718" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//b2c-contenthub.com/wp-content/uploads/2021/11/link-preview.png%3Fw%3D1200&amp;raw" srcset="https://b2c-contenthub.com/wp-content/uploads/2021/11/link-preview.png?quality=50&amp;strip=all 2628w, https://b2c-contenthub.com/wp-content/uploads/2021/11/link-preview.png?resize=300%2C180&amp;quality=50&amp;strip=all 300w, https://b2c-contenthub.com/wp-content/uploads/2021/11/link-preview.png?resize=768%2C460&amp;quality=50&amp;strip=all 768w, https://b2c-contenthub.com/wp-content/uploads/2021/11/link-preview.png?resize=1200%2C718&amp;quality=50&amp;strip=all 1200w, https://b2c-contenthub.com/wp-content/uploads/2021/11/link-preview.png?resize=1536%2C919&amp;quality=50&amp;strip=all 1536w, https://b2c-contenthub.com/wp-content/uploads/2021/11/link-preview.png?resize=2048%2C1226&amp;quality=50&amp;strip=all 2048w" width="1200"></figure><p class="imageCredit" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Josh Norem/IDG</span></p></div><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">When hovering over what you think might be spam links, you’ll usually see some very strange URLs that are not typical, which usually means it’s spam, of course.</span></p><span data-dcnode-id="584" instrument_node="">
</span><div class="extendedBlock-wrapper block-coreImage undefined" data-dcnode-id="579"><figure class="wp-block-image size-full" data-dcnode-id="582"><img alt="Scam link preview in browser" class="wp-image-549425" data-dcnode-id="583" height="160" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//b2c-contenthub.com/wp-content/uploads/2021/11/actual-spam.png&amp;raw" srcset="https://b2c-contenthub.com/wp-content/uploads/2021/11/actual-spam.png?quality=50&amp;strip=all 1200w, https://b2c-contenthub.com/wp-content/uploads/2021/11/actual-spam.png?resize=300%2C47&amp;quality=50&amp;strip=all 300w, https://b2c-contenthub.com/wp-content/uploads/2021/11/actual-spam.png?resize=768%2C120&amp;quality=50&amp;strip=all 768w" width="1024"></figure><p class="imageCredit" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Josh Norem/IDG</span></p></div><span data-dcnode-id="578" instrument_node="">
</span><h2 data-dcnode-id="576" id="spelling-mistakes-are-a-huge-red-flag"><span data-dcnode-id="577" instrument_node="">Spelling mistakes are a huge red flag</span></h2><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Spelling mistakes, odd punctuation, and weird use of language are probably the easiest red flags to recognize. The majority of scam operations are run from countries far away, where English is not their native tongue, and hence you get stuff like this.</span></p><span data-dcnode-id="572" instrument_node="">
</span><div class="extendedBlock-wrapper block-coreImage undefined" data-dcnode-id="567"><figure class="wp-block-image size-full" data-dcnode-id="570"><img alt="Poorly written scam email" class="wp-image-549423" data-dcnode-id="571" height="275" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//b2c-contenthub.com/wp-content/uploads/2021/11/weird-english.png&amp;raw" srcset="https://b2c-contenthub.com/wp-content/uploads/2021/11/weird-english.png?quality=50&amp;strip=all 1200w, https://b2c-contenthub.com/wp-content/uploads/2021/11/weird-english.png?resize=300%2C81&amp;quality=50&amp;strip=all 300w, https://b2c-contenthub.com/wp-content/uploads/2021/11/weird-english.png?resize=768%2C206&amp;quality=50&amp;strip=all 768w" width="1024"></figure><p class="imageCredit" data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Josh Norem/IDG</span></p></div><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="565" instrument_node="">Sure, nobody is perfect and email can be seen as a casual way to communicate at times, so even </span><em data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">we</span></em><span data-dcnode-id="562" instrument_node=""> have typos in our emails from time-to-time. But if you’re reading an email thinking the person had a stroke while typing it, mark it as Spam.</span></p><span data-dcnode-id="560" instrument_node="">
</span><h2 data-dcnode-id="558" id="be-wary-of-email-from-big-companies"><span data-dcnode-id="559" instrument_node="">Be wary of email from big companies</span></h2><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="556" instrument_node="">You will likely never receive an email from Facebook, Apple, or Google, unless you are paying for a service from them, so it could be an invoice for iCloud, or Google Storage, or similar. They will not just email you out of the blue, usually, to let you know there’s an issue with your account. They will, however, send you an email when a foreign device logs into your account, but hopefully that’s you on a new device, and not some nefarious person. You should have </span><a data-dcnode-id="554" data-id="https://www.pcworld.com/article/403535/two-factor-authentication-faq-sms-authenticator-security-key-icloud.html" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pcworld.com/article/403535/two-factor-authentication-faq-sms-authenticator-security-key-icloud.html"><span data-dcnode-id="555" instrument_node="">two-factor authentication</span></a><span data-dcnode-id="553" instrument_node=""> enabled on all your accounts for online services anyway, so something like this should not be possible in the first place.</span></p><span data-dcnode-id="551" instrument_node="">
</span><div class="ad page-ad has-ad-prefix ad-article" data-ad-template="article" data-dcnode-id="550" data-ofp="false"></div><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">That said, there are exceptions that can be safe. For example, I recently got an email from Google asking me to add a second phone number to my two-factor authentication setup, and since Google is usually smart about these things, it thoughtfully included a non-clickable link at the bottom if I wanted to copy-and-paste it myself instead of clicking an active link. That’s because, as we’ve said previously, savvy users know to be wary of clickable links. Most big companies will also write in their emails to you that they will never ask for your password over email.</span></p><span data-dcnode-id="546" instrument_node="">
</span><div class="extendedBlock-wrapper block-coreImage undefined" data-dcnode-id="541"><figure class="wp-block-image size-large" data-dcnode-id="544"><img alt="Google two-step verification message" class="wp-image-549427" data-dcnode-id="545" height="1200" loading="lazy" sizes="(max-width: 1140px) 100vw, 1140px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//b2c-contenthub.com/wp-content/uploads/2021/11/security-check.png%3Fw%3D1140&amp;raw" srcset="https://b2c-contenthub.com/wp-content/uploads/2021/11/security-check.png?quality=50&amp;strip=all 1200w, https://b2c-contenthub.com/wp-content/uploads/2021/11/security-check.png?resize=285%2C300&amp;quality=50&amp;strip=all 285w, https://b2c-contenthub.com/wp-content/uploads/2021/11/security-check.png?resize=768%2C808&amp;quality=50&amp;strip=all 768w, https://b2c-contenthub.com/wp-content/uploads/2021/11/security-check.png?resize=1140%2C1200&amp;quality=50&amp;strip=all 1140w" width="1140"></figure><p class="imageCredit" data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Josh Norem/IDG</span></p></div><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">One more thing to note: Typically, if you do get an email from a big company like Facebook, there will not be clickable links in the email. It’ll be just to inform you of something. However, if you are curious enough to follow up, do it outside the email itself. Open Facebook, or your Google settings, or your iPhone, and investigate the issue there instead of through the email you received.</span></p><span data-dcnode-id="537" instrument_node="">
</span><div class="nativo" data-dcnode-id="536" id="nativo1"></div><span data-dcnode-id="535" instrument_node="">
</span><h2 data-dcnode-id="533" id="texts-are-just-as-dangerous-as-email"><span data-dcnode-id="534" instrument_node="">Texts are just as dangerous as email</span></h2><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">I’ll admit it, I have definitely been curious about a few texts I have received, which were worded like, “Your Amazon package is delayed. Check its status here.” Most of us have an Amazon package en route often enough for this type of message to be applicable, but more often than not, it’s a scam. Text messages are much more dangerous than emails because there’s not really a way to see where the embedded link is taking you unless you preview it, but not everyone knows how to do that. Smartphones have gotten smarter by displaying a preview of what is linked in a box with an image, but of course the scammers have found ways around this, so there’s usually not a preview box. The best thing to do, in almost every case, is simply ignore the text, and block the sender.</span></p><span data-dcnode-id="529" instrument_node="">
</span><div class="extendedBlock-wrapper block-coreImage undefined" data-dcnode-id="524"><figure class="wp-block-image size-full" data-dcnode-id="527"><img alt="Spam failed package delivery text" class="wp-image-549426" data-dcnode-id="528" height="986" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//b2c-contenthub.com/wp-content/uploads/2021/11/package.jpg%3Fquality%3D50%26strip%3Dall&amp;raw" srcset="https://b2c-contenthub.com/wp-content/uploads/2021/11/package.jpg?quality=50&amp;strip=all 1200w, https://b2c-contenthub.com/wp-content/uploads/2021/11/package.jpg?resize=300%2C289&amp;quality=50&amp;strip=all 300w, https://b2c-contenthub.com/wp-content/uploads/2021/11/package.jpg?resize=768%2C740&amp;quality=50&amp;strip=all 768w" width="1024"></figure><p class="imageCredit" data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Josh Norem/IDG</span></p></div><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">In the link above, you know it’s a scam just based on the URL alone, but what if the message is more sophisticated? What if they use your name, or say something in the message that is actually applicable to your life?</span></p><span data-dcnode-id="520" instrument_node="">
</span><div class="ad page-ad has-ad-prefix ad-article" data-ad-template="article" data-dcnode-id="519" data-ofp="false"></div><span data-dcnode-id="518" instrument_node="">
</span><div class="extendedBlock-wrapper block-coreImage undefined" data-dcnode-id="513"><figure class="wp-block-image size-full" data-dcnode-id="516"><img alt="Scam text message" class="wp-image-549424" data-dcnode-id="517" height="1015" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//b2c-contenthub.com/wp-content/uploads/2021/11/scam-text.jpg%3Fquality%3D50%26strip%3Dall&amp;raw" srcset="https://b2c-contenthub.com/wp-content/uploads/2021/11/scam-text.jpg?quality=50&amp;strip=all 1200w, https://b2c-contenthub.com/wp-content/uploads/2021/11/scam-text.jpg?resize=150%2C150&amp;quality=50&amp;strip=all 150w, https://b2c-contenthub.com/wp-content/uploads/2021/11/scam-text.jpg?resize=300%2C297&amp;quality=50&amp;strip=all 300w, https://b2c-contenthub.com/wp-content/uploads/2021/11/scam-text.jpg?resize=768%2C761&amp;quality=50&amp;strip=all 768w" width="1024"></figure><p class="imageCredit" data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Josh Norem/IDG</span></p></div><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">The same rules apply to texts as they do to emails—if you don’t know the sender, do not open any links. Even if you know the sender, contact them to verify they are the ones who sent it. Either way, your life will not deteriorate in any noticeable fashion if you simply do not click the link provided.</span></p><span data-dcnode-id="509" instrument_node="">
</span><h2 data-dcnode-id="507" id="summary"><span data-dcnode-id="508" instrument_node="">Summary</span></h2><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">To sum things up, the vast majority of phishing and malware attacks are only successful if the target clicks on a link provided. While there are “no click” malware attacks going around right now, they are expensive for a third party to purchase on the black market, so they usually target high-level government employees, journalists investigating corruption, and those types of people. For most regular people, you will only get scammed if you respond to a mysterious message, whether it’s via email or text. So be safe, and do not click on links you get that seem fishy, no matter how curios you might be about it.</span></p><span data-dcnode-id="503" instrument_node="">
</span></div><span data-dcnode-id="501" instrument_node="">
