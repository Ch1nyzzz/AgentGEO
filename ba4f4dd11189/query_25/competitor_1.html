 btn-social-icon btn-pinterest share-button" data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Furl%3Dhttp%253A%252F%252Frenderer.cms.themuse.com%252Fadvice%252Fspot-avoid-job-scams%26media%3Dhttps%253A%252F%252Fcms-assets.themuse.com%252Fmedia%252Flead%252F02232021-1217375482.png%26description%3Dperson%2520sitting%2520on%2520couch%2520at%2520home%2520typing%2520on%2520laptop" rel="nofollow" target="_blank"><svg class="" data-dcnode-id="463" viewBox="0 0 243 243" xmlns="http://www.w3.org/2000/svg"><circle cx="121.5" cy="121.5" data-dcnode-id="465" r="121.5"></circle><path d="M121.5,0C54.4,0,0,54.4,0,121.5C0,173,32,217,77.2,234.7c-1.1-9.6-2-24.4,0.4-34.9 c2.2-9.5,14.2-60.4,14.2-60.4s-3.6-7.3-3.6-18c0-16.9,9.8-29.5,22-29.5c10.4,0,15.4,7.8,15.4,17.1c0,10.4-6.6,26-10.1,40.5 c-2.9,12.1,6.1,22,18,22c21.6,0,38.2-22.8,38.2-55.6c0-29.1-20.9-49.4-50.8-49.4c-34.6,0-54.9,25.9-54.9,52.7 c0,10.4,4,21.6,9,27.7c1,1.2,1.1,2.3,0.8,3.5c-0.9,3.8-3,12.1-3.4,13.8c-0.5,2.2-1.8,2.7-4.1,1.6c-15.2-7.1-24.7-29.2-24.7-47.1 c0-38.3,27.8-73.5,80.3-73.5c42.1,0,74.9,30,74.9,70.2c0,41.9-26.4,75.6-63,75.6c-12.3,0-23.9-6.4-27.8-14c0,0-6.1,23.2-7.6,28.9 c-2.7,10.6-10.1,23.8-15.1,31.9c11.4,3.5,23.4,5.4,36,5.4c67.1,0,121.5-54.4,121.5-121.5C243,54.4,188.6,0,121.5,0z" data-dcnode-id="464"></path></svg></a></div></div></figure><div class="article-content" data-dcnode-id="240"><div class="article-body__content-module" data-dcnode-id="241"><span data-dcnode-id="458" instrument_node=""> </span><div data-dcnode-id="434"><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Camden Boyd knew it all sounded too good to be true—but he really wanted that job as a work-from-home customer service representative, making $25 an hour.</span></p><span data-dcnode-id="455" instrument_node=""> </span><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Boyd, 19, was invited to interview for the position via chat on Google Hangouts. During that exchange, he was asked for his mailing address so the company could send him a check to “pay for required work materials through their preferred supplier,” he says. “Since they said they wanted me to purchase a new work computer and monitors, this wasn’t too hard to believe.” </span></p><span data-dcnode-id="452" instrument_node=""> </span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">But things got stranger from there. A few days later, Boyd received a check for $2,250 via FedEx. The confusing part was that the check wasn’t even from the customer service company that hired him but from a landscaping company Boyd had never heard of. </span></p><span data-dcnode-id="449" instrument_node=""> </span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Once Boyd received the check, the hiring manager asked him to confirm the amount it was made out for and urged Boyd to cash the check immediately at a bank ATM. “He strongly emphasized not cashing it via mobile deposit or in person with the bank teller,” Boyd says.</span></p><span data-dcnode-id="446" instrument_node=""> </span><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Boyd ignored the hiring manager’s advice and took the check straight to a bank teller, who confirmed his suspicions that the whole thing was a scam. The person “hiring” him didn’t work for the company and certainly didn’t have the authority to employ anyone on its behalf; he was pretending to represent the company to trick Boyd into cashing a fraudulent check.</span></p><span data-dcnode-id="443" instrument_node=""> </span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">“I was devastated,” Boyd says. “To get a $25 an hour job was huge, but there wasn’t really a job.”</span></p><span data-dcnode-id="440" instrument_node=""> </span><p data-dcnode-id="435"><span data-dcnode-id="439" instrument_node="">Boyd’s experience is part of a growing problem. The Better Business Bureau (BBB) had already deemed employment scams the riskiest type of scam in 2018 and 2019. The onset of the coronavirus pandemic and the huge spike in unemployment that followed “has created a ‘perfect storm’ for scammers,” the BBB wrote in an </span><a data-dcnode-id="437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbb.org/globalassets/local-bbbs/council-113/media/bbb-institute/employmentscams/2020-bbb-employmentscams-report.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="438" instrument_node="">April 2020 report</span></a><span data-dcnode-id="436" instrument_node="">, finding that the risk of job scams was continuing to trend upward.</span></p></div><h2 data-dcnode-id="431"><div class="inline" data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">What Are Job Scams?</span></div></h2><span data-dcnode-id="430" instrument_node=""> </span><div data-dcnode-id="415"><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Job scams are essentially fake job postings. Sometimes the scammer is trying to get access to your bank account or to steal a bank’s money, and other times they’re after your personal information. </span></p><span data-dcnode-id="427" instrument_node=""> </span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">“Employment scammers will typically conduct online interviews, provide employment forms that collect personally identifiable information, and ask the target to perform job duties before the scam is discovered,” says Sandra Guile, BBB spokesperson. The BBB’s survey of 10,670 U.S. and Canadian consumers reporting employment scams found that students and individuals ages 25 to&nbsp;34 are more susceptible and likely to be victimized, while those ages 45 to 54 and 65+ report higher median dollar losses.&nbsp;</span></p><span data-dcnode-id="424" instrument_node=""> </span><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">“These scams are also often part-time, flexible jobs that fit within the growing gig economy,” Guile says. Unfortunately, it is very easy to set up a job scam for work-for-home jobs, says Mark Silverman, CEO of Amava, a member website that connects people with legitimate work-from-home jobs and volunteer opportunities. The increasing number of job scams has led his website to offer classes on how to spot a fake online job posting. </span></p><span data-dcnode-id="421" instrument_node=""> </span><p data-dcnode-id="416"><span data-dcnode-id="420" instrument_node="">To protect yourself from job scams, you should know what some of the most common types of scams are, what warning signs to look for, what to do—and avoid—when job searching, and what steps to take if you think you’ve been a victim of a scam. (And if you’re looking for a new job, you can find&nbsp;thousands of open roles </span><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themuse.com/search"><span data-dcnode-id="419" instrument_node="">right here&nbsp;on The Muse</span></a><span data-dcnode-id="417" instrument_node="">—and none of them are scams.)&nbsp;</span></p></div><h2 data-dcnode-id="412"><div class="inline" data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">What Are Some Common Types of Job Scams?</span></div></h2><span data-dcnode-id="411" instrument_node=""> </span><div data-dcnode-id="380"><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Here are four common types of employment scams you should look out for:</span></p><span data-dcnode-id="408" instrument_node=""> </span><h3 data-dcnode-id="405"><strong data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">1. Reshipper or Package Processor </span></strong></h3><span data-dcnode-id="404" instrument_node=""> </span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">In the BBB’s April 2020 survey, 65% of respondents reported that their “job offer” was related to becoming a “warehouse redistribution coordinator” or a similar job that involved the reshipment of packages, often of items purchased with stolen credit cards. “The thieves use your address to ship the hot stuff—computers, phones, iPads—and they pay you to reship it, usually overseas,” Silverman says. “You may actually be helping thieves traffic in stolen merchandise.” It’s not uncommon for these scammers to impersonate well-known retailers like Amazon and Walmart.</span></p><span data-dcnode-id="401" instrument_node=""> </span><h3 data-dcnode-id="398"><strong data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">2. Product Assembler</span></strong></h3><span data-dcnode-id="397" instrument_node=""> </span><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Any job that requires you to put products together at home to be shipped is probably a scam, Silverman says. They’ll ask you to pay for parts and products up front and they won’t reimburse you until the products are shipped. Most likely, you’ll get stuck with the inventory.</span></p><span data-dcnode-id="394" instrument_node=""> </span><h3 data-dcnode-id="391"><strong data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">3. Mystery Shopper</span></strong></h3><span data-dcnode-id="390" instrument_node=""> </span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Getting paid to shop sounds enticing and some mystery shopper jobs are legitimate. You go to a store or restaurant and report back about your experience and you’re paid for your time and reimbursed for what you spend. But beware of scammers making a small deposit in your bank account to “get you started” as a shopper and then asking you to wire the money back to them, allowing them to gain information about you and your bank account, Silverman says. Another popular scam is asking the shopper to pay a non-refundable fee up front to “register” as a mystery shopper. </span></p><span data-dcnode-id="387" instrument_node=""> </span><h3 data-dcnode-id="384"><strong data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">4. Envelope Stuffer</span></strong></h3><span data-dcnode-id="383" instrument_node=""> </span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Stuffing envelopes from home sounds like an easy job. However, scammers might ask you to pay for materials that either never arrive or that you aren’t able to use. In some cases, they’ll ask you to buy a mailing list in addition to materials and then say they'll pay you based on the consumer response they get to the mailing, Silverman says. “There is no way for the home mailer to validate the results or challenge whatever payment for the work that was done,” he says.</span></p></div><h2 data-dcnode-id="377"><div class="inline" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">What Warning Signs Should You Look Out For?</span></div></h2><span data-dcnode-id="376" instrument_node=""> </span><div data-dcnode-id="334"><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">There are many red flags to look for when you’re searching online job listings. Here are the most common:</span></p><span data-dcnode-id="373" instrument_node=""> </span><ul data-dcnode-id="335"><li data-dcnode-id="366"><strong data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">The job posting claims that you will make</span></strong><span data-dcnode-id="370" instrument_node=""> </span><strong data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">thousands of dollars each week working from home.</span></strong><span data-dcnode-id="367" instrument_node=""> “If a job ad mentions it’s an easy job or alludes to you earning a lot of money but not having to work hard, that is definitely a clear sign,” says Charlette Beasley of Fit Small Business, a digital resource for small business owners, who’s advised job seekers on how to avoid scams and helped business owners ensure their own ads didn’t resemble fraudulent ones. </span></li><li data-dcnode-id="362"><strong data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">You notice typos, misspellings, poor grammar, and other errors.</span></strong><span data-dcnode-id="363" instrument_node=""> Be on the lookout for grammatical errors, oddly worded phrases, and website links that don’t go back to the company on the job posting. “Little errors in these details are easy to overlook but could be clues that you’re being phished for information,” says cybersecurity expert Ryan O’Ramsay Barrett, founder and CEO of ORAM Corporate Advisors, a firm that provides IT services—including cybersecurity—to small businesses.</span></li><li data-dcnode-id="355"><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">You’re asked to</span></strong><span data-dcnode-id="359" instrument_node=""> </span><strong data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">send a resume but there’s no specific job posting</span></strong><span data-dcnode-id="356" instrument_node="">. For instance, an ad that states, “We have a lot of jobs, send us your resume and we will match you with jobs,” strongly suggests they are looking for personal identifying information including phone numbers, email addresses, and home addresses, Silverman says.</span></li><li data-dcnode-id="348"><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">You’re asked to pay for training, an application fee, or background check, or</span></strong><span data-dcnode-id="352" instrument_node=""> </span><strong data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">required to purchase items upfront</span></strong><span data-dcnode-id="349" instrument_node="">. “Anyone who asks for money to apply for a job is providing a huge warning sign,” Silverman says. While they may be legitimate businesses, they are often pyramid schemes that ask you to make a significant investment into the business that you may not earn back, he says.</span></li><li data-dcnode-id="344"><strong data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">The email address isn’t quite right</span></strong><span data-dcnode-id="345" instrument_node="">. Any company using an email provider like Yahoo! or Gmail instead of their own company email is probably not legitimate. Also take notice of whether the company name is spelled correctly in the email; it’s not uncommon for scammers to use an email or domain that’s one or two letters off in the hopes that you won’t look closely enough and assume it’s authentic. </span></li><li data-dcnode-id="340"><strong data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Be careful if the hiring manager contacts you via text only.</span></strong><span data-dcnode-id="341" instrument_node=""> “A legitimate job opportunity will come through via email as opposed to text,” Silverman says. If it does come via text, “It usually means that someone got your data, including your phone number, from someplace.” Signs that it’s not legitimate include the text coming from an unknown number and the way the hiring manager addresses you. For instance, do they call you William but you typically go by Bill? Does the message sound oddly formal? “Also, if you don’t have any recollection of applying to the entity they claim to represent or you have a funny feeling about it, you’re probably right,” Silverman says. If you’re interested in pursuing the opportunity, do some research on the recruiter, Beasley says. Can you find them on LinkedIn, and do they work for the company they claim to work for? You can also call the company’s HR department and confirm that text interviews are a legitimate part of their process, she says.</span></li><li data-dcnode-id="336"><strong data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Be wary of ads that mention brand names like Amazon, Walmart, or Target but don’t include a specific location for the job.</span></strong><span data-dcnode-id="337" instrument_node=""> And if you can’t find the same job on their website, it is probably not a job for that company, Silverman says.</span></li></ul></div><h2 data-dcnode-id="331"><div class="inline" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">What Can You Do to Avoid Being the Victim of a Scam?</span></div></h2><span data-dcnode-id="330" instrument_node=""> </span><div data-dcnode-id="288"><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">There are a few simple ways to avoid becoming a victim of a scheme.</span></p><span data-dcnode-id="327" instrument_node=""> </span><h3 data-dcnode-id="324"><strong data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Don’t...</span></strong></h3><span data-dcnode-id="323" instrument_node=""> </span><ul data-dcnode-id="318"><li data-dcnode-id="319"><strong data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">...use your primary email address when applying</span></strong><span data-dcnode-id="320" instrument_node="">. Create an email with the word “jobs” at the end of it. That address looks legitimate and then, if it’s a scam, they don’t have access to your primary account. “If you limit the amount of information you provide, you limit your exposure,” Silverman says. </span></li></ul><ul data-dcnode-id="309"><li data-dcnode-id="314"><strong data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">...give out your bank information, social security number, or credit card number. </span></strong><span data-dcnode-id="315" instrument_node="">This information is only required once you are hired and you only submit it through a tax form, Silverman says. Before sending this information to any hiring manager, you need to confirm they are an employee with the authority to hire.</span></li><li data-dcnode-id="310"><strong data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">...send them money or cash a check they send you.</span></strong><span data-dcnode-id="311" instrument_node=""> “They are essentially stealing money from the bank and you will end up owing the bank money,” says Beasley, who’s seen job seekers lose money falling for similar scams.</span></li></ul><h3 data-dcnode-id="306"><strong data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Do...</span></strong></h3><span data-dcnode-id="305" instrument_node=""> </span><ul data-dcnode-id="289"><li data-dcnode-id="301"><strong data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">...verify the person you are speaking with works for the company and the job you’re applying for exists. </span></strong><span data-dcnode-id="302" instrument_node="">“If you can’t verify the person by calling the main number of the company, you have to assume they are not legitimate,” Barrett says.</span></li><li data-dcnode-id="294"><strong data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">...make sure you are dealing with a real company.</span></strong><span data-dcnode-id="298" instrument_node=""> Check to see if they have a website. If they do, how long ago was it created? You can look this up </span><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lookup.icann.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="297" instrument_node="">here</span></a><span data-dcnode-id="295" instrument_node="">. If they say they’ve been in business three years but the website was created a week ago, that is a huge red flag, Beasley says.</span></li><li data-dcnode-id="290"><strong data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">...find the job posting on the company website.</span></strong><span data-dcnode-id="291" instrument_node=""> “Most companies have a ‘jobs and careers’ page on their website so there should be a posting there for the same position,” Barrett says. Some companies will even post an alert on their jobs page that they’ve received reports that individuals claiming to represent the company have sent fraudulent job offers to unwitting candidates.</span></li></ul></div><h2 data-dcnode-id="285"><div class="inline" data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">What Should You Do if You Spot—or Have Already Fallen for—a Job Scam?</span></div></h2><span data-dcnode-id="284" instrument_node=""> </span><div data-dcnode-id="257"><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">If you suspect you’re dealing with a job scam, no matter how far in you’ve gotten, follow these tips:</span></p><span data-dcnode-id="281" instrument_node=""> </span><ul data-dcnode-id="258"><li data-dcnode-id="277"><strong data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Stop what you’re doing.</span></strong><span data-dcnode-id="278" instrument_node=""> Don’t cash that check or mail in a payment and halt any correspondence. </span></li><li data-dcnode-id="273"><strong data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Notify your bank</span></strong><span data-dcnode-id="274" instrument_node=""> if you already cashed a check and then realized it’s a scam, Beasley says. “As long as they determine you weren’t intentionally trying to engage in illegal activity, they won’t take legal action against you,” she says. Keep in mind that you'll have to return the money. “If you already spent it or sent a portion to the scammer, the bank may give you the option [of] using a payment plan to repay it,” she says. Be sure to report the scam to law enforcement, she adds. </span></li><li data-dcnode-id="263"><strong data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Report it</span></strong><span data-dcnode-id="270" instrument_node=""> to the </span><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbb.org/scamtracker/reportscam" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="269" instrument_node="">Better Business Bureau</span></a><span data-dcnode-id="267" instrument_node=""> and </span><a data-dcnode-id="265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reportfraud.ftc.gov/%23/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="266" instrument_node="">Federal Trade Commission</span></a><span data-dcnode-id="264" instrument_node="">. When you report the incident, include the name of the company and person you communicated with and the email address and web domain they were using. If you have any screenshots of the website or your communications, send those as well.</span></li><li data-dcnode-id="259"><strong data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Contact the job board&nbsp;</span></strong><span data-dcnode-id="260" instrument_node="">if that’s where you encountered the scam. Most sites have a mechanism for reporting these types of issues.</span></li></ul></div><span data-dcnode-id="256" instrument_node=""> </span><div data-dcnode-id="253"><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Job scams are on the rise. The best way to protect yourself is to be cautious when applying for jobs online—especially ones that sound too good to be true.</span></p></div><aside class="author article-body__content-moduleauthor author--large" data-dcnode-id="242"><a class="headshot" data-dcnode-id="251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themuse.com/author/lisa-rabasca-roepe"><img alt="Lisa Rabasca Roepe" class="img-responsive image-round" data-dcnode-id="252" data-src="https://pilbox.themuse.com/image.jpg?filter=antialias&amp;h=108&amp;opt=1&amp;pos=top-left&amp;prog=1&amp;q=keep&amp;url=https%3A%2F%2Fcms-assets.themuse.com%2Fmedia%2Fwriters%2Flisa-rabasca-roepe.jpg%3Fv%3Da8
