</span><h4 class="blog-intro" data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Applying for a UK visa can be stressful. It’s easy to get swept away when someone promises to help make it easier – or, if you’re told you need to hand over more cash to process your application. We look at a few of the most common UK immigration scams and ways you can protect yourself.</span></h4><span data-dcnode-id="664" instrument_node="">
</span><div class="BlogImageWrapper" data-dcnode-id="660"><span data-dcnode-id="663" instrument_node="">
</span><img alt="warning sign" class="b-lazy b-loaded" data-dcnode-id="662" height="369" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sableinternational.com/images/default-source/blog/16_how-to-spot-a-uk-immigration-scam.jpg%3Fsfvrsn%3D1c2aa9c2_0&amp;raw" title="warning sign" width="704"><span data-dcnode-id="661" instrument_node="">
</span></div><span data-dcnode-id="659" instrument_node="">
</span><span data-dcnode-id="657" instrument_node="">
</span><p class="sf-Long-text" data-dcnode-id="656"></p><h2 data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Common approaches</span></h2><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Scammers tend to use one of two main ruses. They usually either promise to make your UK visa application quicker or claim that there is a problem with your current visa or application.</span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Their solution could be to offer you an easier route to obtaining your visa, but scammers will usually require a down payment of some sort.</span></p><span data-dcnode-id="647" instrument_node="">
</span><h2 data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Popular current scams</span></h2><span data-dcnode-id="644" instrument_node="">
</span><h3 data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Websites that offer fake UK jobs</span></h3><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">There are no shortcuts to a job in the UK.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Applying for and getting a job online, without a proper interview, should raise a red flag. This scam makes money by asking you to pay visa and work permit fees to secure the position.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="634" instrument_node="">A legitimate prospective employer would direct you to the relevant .gov website or a reputable agency like&nbsp;</span><a data-dcnode-id="629" data-mce-href="http://www.1stcontact.com/visas" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sableinternational.com/1stcontact"><span data-dcnode-id="633" instrument_node="">1</span><sup data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">st</span></sup><span data-dcnode-id="630" instrument_node="">&nbsp;Contact</span></a><span data-dcnode-id="628" instrument_node="">&nbsp;to apply.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="623"><strong data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Calls from the “Home Office” claiming there is a problem with your visa</span></strong></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">This tactic is particularly aimed at students, although anyone in the UK on a visa could fall prey to this scheme.</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">You will be asked to send money to a specified account to prevent your visa being cancelled or your immediate deportation. The caller may sound authentic and convincing, but asking a few detailed questions can help to weed out any fraudsters.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="613"><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">People who target applicants for UK work visas</span></strong></p><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Again, you’ll receive a phone call from someone posing as a UK government official.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="608" instrument_node="">You will be asked to pay money into a holding bank account as proof that you have enough funds to support yourself in the UK. &nbsp;</span><strong data-dcnode-id="607"></strong></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">While you do need to prove that you have enough money to support yourself in the UK, you will never be asked to transfer this money to another account. HMRC will only ever request bank statements for proof of funding.</span></p><span data-dcnode-id="602" instrument_node="">
</span><h2 data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">How to protect yourself</span></h2><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Something sounds too good to be true? You should be suspicious if:</span></p><span data-dcnode-id="596" instrument_node="">
</span><ul data-dcnode-id="588"><span data-dcnode-id="595" instrument_node="">
</span><li data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">You receive an email from a supposed UK employer or immigration agent using a hotmail.com, gmail.com or any other free, web-based email address.</span></li><span data-dcnode-id="592" instrument_node="">
</span><li data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">You’re asked to pay money via an unsecure or untraceable payment service, such as Ukash or a paysafecard.</span></li><span data-dcnode-id="589" instrument_node="">
</span></ul><span data-dcnode-id="587" instrument_node="">
</span><ul data-dcnode-id="582"><span data-dcnode-id="586" instrument_node="">
</span><li data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">You’re asked for your bank account or credit card details, or any other confidential information.</span></li><span data-dcnode-id="583" instrument_node="">
</span></ul><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">If you are concerned that you have been contacted by a scammer, it’s worth checking the email address that they’ve used. Official Home Office email addresses are always in one of the following two formats:</span></p><span data-dcnode-id="578" instrument_node="">
</span><ul data-dcnode-id="570"><span data-dcnode-id="577" instrument_node="">
</span><li data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">name.surname@ukba.gsi.gov.uk</span></li><span data-dcnode-id="574" instrument_node="">
</span><li data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">name.surname@homeoffice.gsi.gov.uk</span></li><span data-dcnode-id="571" instrument_node="">
</span></ul><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">If someone claims to be from the Foreign and Commonwealth Office, their email address should be one of the two below:</span></p><span data-dcnode-id="566" instrument_node="">
</span><ul data-dcnode-id="558"><span data-dcnode-id="565" instrument_node="">
</span><li data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">name.surname@fco.gov.uk</span></li><span data-dcnode-id="562" instrument_node="">
</span><li data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">xxxxxxxxx@fco.gov.uk</span></li><span data-dcnode-id="559" instrument_node="">
</span></ul><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="556" instrument_node="">If you are contacted by a suspicious person, report it to Action Fraud, either through their&nbsp;</span><a data-dcnode-id="554" data-mce-href="http://www.actionfraud.police.uk/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.actionfraud.police.uk/"><span data-dcnode-id="555" instrument_node="">website</span></a><span data-dcnode-id="553" instrument_node="">&nbsp;or by phoning 030 0123 2040 from within the UK.</span></p><span data-dcnode-id="551" instrument_node="">
</span><h4 data-dcnode-id="540"><span data-dcnode-id="550" instrument_node="">With our no visa, no fee policy and thousands of happy clients, you can be sure that&nbsp;</span><a data-dcnode-id="545" data-mce-href="http://www.1stcontact.com/visas" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sableinternational.com/1stcontact"><span data-dcnode-id="549" instrument_node="">1</span><sup data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">st</span></sup><span data-dcnode-id="546" instrument_node="">&nbsp;Contact</span></a><span data-dcnode-id="544" instrument_node="">&nbsp;is the real deal when it comes to getting your&nbsp;</span><a data-dcnode-id="542" data-mce-href="http://www.1stcontact.com/visas/uk-visas" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sableinternational.com/uk-visas"><span data-dcnode-id="543" instrument_node="">UK visa</span></a><span data-dcnode-id="541" instrument_node="">. Give our team a call on +44 (0) 20 7759 7527 to get started.</span></h4><p data-dcnode-id="539"></p><span data-dcnode-id="538" instrument_node="">
</span><div class="BlueBanner" data-dcnode-id="530"><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">
                We are a professional services company that specialises in cross-border financial and immigration advice and solutions.
            </span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">
                Our teams in the UK, South Africa and Australia can ensure that when you decide to move
                overseas, invest offshore or expand your business internationally, you'll do so with the backing of experienced local experts.
