</span><article class="post-563906 post type-post status-publish format-standard category-the-geek-blog tag-features tag-security breadcrumbs-cloud-internet" data-dcnode-id="320" id="post-563906"><span data-dcnode-id="697" instrument_node="">
</span><div class="entry-content e-content" data-dcnode-id="349"><span data-dcnode-id="696" instrument_node="">
</span><span data-dcnode-id="694" instrument_node="">
</span><figure class="wp-caption alignnone" data-dcnode-id="688" style="width: 1200px"><img alt="A woman staring at a smartphone" class="type:primaryImage size-full wp-image-772375" data-dcnode-id="693" data-pagespeed-no-defer="" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/wp-content/uploads/2020/03/A-woman-staring-at-a-smartphone.jpg%3Fwidth%3D1198%26trim%3D1%2C1%26bg-color%3D000%26pad%3D1%2C1&amp;raw" width="1200"><figcaption class="wp-caption-text" data-dcnode-id="689"><span class="type:primaryImage imagecredit" data-dcnode-id="690"><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shutterstock.com/image-photo/upset-confused-african-woman-holding-cellphone-1361068583"><span data-dcnode-id="692" instrument_node="">fizkes/Shutterstock.com</span></a></span></figcaption></figure><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="686" instrument_node="">The average person these days is savvy enough to spot an email scam, which is why scammers have turned to text messages. </span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/526115/what-is-smishing-and-how-do-you-protect-yourself/"><span data-dcnode-id="685" instrument_node="">Smishing</span></a><span data-dcnode-id="683" instrument_node=""> (phishing via SMS) is on the rise, but here’s how you can avoid falling prey to it.</span></p><span data-dcnode-id="681" instrument_node="">
</span><div class="autotoc_wrapper" data-dcnode-id="651"><strong class="moka_autotoc_heading" data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Table of Contents</span></strong><p data-dcnode-id="678"></p><blockquote class="moka_autotoc" data-dcnode-id="652"><p data-dcnode-id="653"><a data-dcnode-id="676" href="#autotoc_anchor_0"><span data-dcnode-id="677" instrument_node="">What Is a Text Message Scam?</span></a><br data-dcnode-id="675"><a data-dcnode-id="673" href="#autotoc_anchor_1"><span data-dcnode-id="674" instrument_node="">Number One: Is the Message Relevant to You?</span></a><br data-dcnode-id="672"><a data-dcnode-id="670" href="#autotoc_anchor_2"><span data-dcnode-id="671" instrument_node="">Number Two: Don't Tap Links in Suspicious Messages</span></a><br data-dcnode-id="669"><a data-dcnode-id="667" href="#autotoc_anchor_3"><span data-dcnode-id="668" instrument_node="">Number Three: Don't Fall for a Convincing Website</span></a><br data-dcnode-id="666"><a data-dcnode-id="664" href="#autotoc_anchor_4"><span data-dcnode-id="665" instrument_node="">Number Four: Pay Attention to the Grammar</span></a><br data-dcnode-id="663"><a data-dcnode-id="661" href="#autotoc_anchor_5"><span data-dcnode-id="662" instrument_node="">Number Five: Don't Trust a Personalized Message</span></a><br data-dcnode-id="660"><a data-dcnode-id="658" href="#autotoc_anchor_6"><span data-dcnode-id="659" instrument_node="">Number Six: Suspect It's Real? Contact the Company Directly</span></a><br data-dcnode-id="657"><a data-dcnode-id="655" href="#autotoc_anchor_7"><span data-dcnode-id="656" instrument_node="">Be Careful Out There</span></a><br data-dcnode-id="654"></p></blockquote></div><span data-dcnode-id="650" instrument_node="">
</span><div class="jw-error jw-reset" data-dcnode-id="640" id="purch_N_C_0_1" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="641"><div class="jw-icon jw-reset" data-dcnode-id="647"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="648" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="649"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="642"><div class="jw-error-text jw-reset-text" data-dcnode-id="643" data-nosnippet="" dir="auto"><span data-dcnode-id="646" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="645"></span><span data-dcnode-id="644" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div><span data-dcnode-id="639" instrument_node="">
</span><span data-dcnode-id="638" instrument_node="">
</span><span data-dcnode-id="637" instrument_node=""> </span><div data-dcnode-id="636" style="clear:both"></div><span data-dcnode-id="635" instrument_node="">
</span><div class="bordeaux-slot" data-dcnode-id="634" data-feat-ref="bordeaux-feat-id-42" id="bordeaux-static-slot-0" style="display: flex; flex-direction: column; margin: auto;"></div><h2 aria-level="2" data-dcnode-id="631" role="heading"><a data-dcnode-id="633" name="autotoc_anchor_0"></a><span data-dcnode-id="632" instrument_node="">What Is a Text Message Scam?</span></h2><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="629" instrument_node="">The tactics of a text message scam are virtually identical to those used in a standard </span><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/437513/what-should-you-do-if-you-receive-a-phishing-email/"><span data-dcnode-id="628" instrument_node="">email phishing scam</span></a><span data-dcnode-id="626" instrument_node="">. “Phishing” is when someone acts like a representative of a legitimate business or institution to steal personal information, like your credit card details, bank account information, or social security number.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">It normally starts with an email that seems legitimate. Within the body of the email, there’s a link to an “official” website that’s designed to trick you into giving away your login credentials, personal details, or money. The website is usually indistinguishable from the actual company’s, including the branding.</span></p><span data-dcnode-id="621" instrument_node="">
</span><div class="future_hybrid_paragraph_first" data-dcnode-id="620"></div><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">“Smishing” (a portmanteau of SMS and phishing) works almost identically. The scammer sends a text message with a link to potential victims. Normally, the message invites you to verify your account details, make a payment, or claim a prize.</span></p><span data-dcnode-id="617" instrument_node="">
</span><blockquote class="twitter-tweet" data-dcnode-id="600" data-dnt="true" data-width="550"><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="606" dir="ltr" lang="en"><span data-dcnode-id="615" instrument_node="">Seems legit! What do you think ⁦</span><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/scotiabank%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="614" instrument_node="">@scotiabank</span></a><span data-dcnode-id="612" instrument_node="">⁩ ?😂 man I can’t believe </span><a data-dcnode-id="610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/Smishing%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="611" instrument_node="">#Smishing</span></a><span data-dcnode-id="609" instrument_node=""> makes a profit. </span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/PKbugf5ZGh"><span data-dcnode-id="608" instrument_node="">pic.twitter.com/PKbugf5ZGh</span></a></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="604" instrument_node="">— Alex K (@kojach) </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/kojach/status/1225927625329270784%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="603" instrument_node="">February 7, 2020</span></a></p></blockquote><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="598"></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Crafting a phishing email that doesn’t immediately raise suspicion requires some skill. The scammer has to be mindful of branding and tone and make sure the email is error-free. He also has to hope a spam filter doesn’t catch the email.</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Because SMS is such a basic form of communication, fraudulent messages are a lot harder to spot. Text messages are short, which leaves little room for obvious spelling or grammar mistakes. Also, URL shorteners are common in text messages due to the 160-character limit.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">This opportunity hasn’t gone unnoticed by scammers. Sending text messages en masse from a web interface is cheap and easy to do. While there is evidence of mobile carriers using spam filtering techniques similar to those of email providers, many smishing attempts slip through the net.</span></p><span data-dcnode-id="588" instrument_node="">
</span><div class="future_hybrid_paragraph" data-dcnode-id="587"></div><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">There are plenty of other scams circulated via SMS, as well. Social engineering, in which a scammer messages you directly and attempts to gain your trust is also a problem. This type of scammer often uses phone calls and emails in addition to SMS messages to appear more legitimate.</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Here are six things to keep in mind the next time you receive an unsolicited text message that invites you to click a link.</span></p><span data-dcnode-id="581" instrument_node="">
</span><div class="bordeaux-slot" data-dcnode-id="580" data-feat-ref="bordeaux-feat-id-43" id="bordeaux-static-slot-1" style="display: flex; flex-direction: column; margin: auto;"></div><h2 aria-level="2" data-dcnode-id="577" role="heading"><a data-dcnode-id="579" name="autotoc_anchor_1"></a><span data-dcnode-id="578" instrument_node="">Number One: Is the Message Relevant to You?</span></h2><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Scammers will try anything to get you to click on their link. For example, they might say you’ve won something. But did you enter any sort of competition? You might be notified that you have a parcel to pick up, but are you expecting anything?</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><img alt="A text message scam with a link that says the receiver has won a &quot;mystery box.&quot;" class="alignnone wp-image-657162 size-full" data-dcnode-id="572" height="443" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/wp-content/uploads/2020/02/airline.png%3Ftrim%3D1%2C1%26bg-color%3D000%26pad%3D1%2C1&amp;raw" width="650"></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Sometimes, it’s a gift card for a store where you don’t shop. Other times it’s a final notice for a bill you’ve never received before. I’ve received messages about “prizes” from airlines I’ve never flown with—and how often do airlines give away prizes, anyway?</span></p><span data-dcnode-id="567" instrument_node="">
</span><div class="future_hybrid_paragraph" data-dcnode-id="566"></div><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Always remember the golden rule: If it seems too good to be true, it probably is.</span></p><span data-dcnode-id="563" instrument_node="">
</span><div class="bordeaux-slot" data-dcnode-id="562" data-feat-ref="bordeaux-feat-id-44" id="bordeaux-static-slot-2" style="display: flex; flex-direction: column; margin: auto;"></div><h2 aria-level="2" data-dcnode-id="559" role="heading"><a data-dcnode-id="561" name="autotoc_anchor_2"></a><span data-dcnode-id="560" instrument_node="">Number Two: Don’t Tap Links in Suspicious Messages</span></h2><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Most text message scams include a link, and, usually, the URL doesn’t match the company name. However, even if it does, you have no way of knowing whether it’s safe or not. Some of these scams are designed to spread malware, and, sometimes, all that requires a tap (or click) on a link.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><img alt="A text message scam with a random link." class="alignnone wp-image-657163 size-full" data-dcnode-id="554" height="370" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/wp-content/uploads/2020/02/random_link.png%3Ftrim%3D1%2C1%26bg-color%3D000%26pad%3D1%2C1&amp;raw" width="650"></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="551" instrument_node="">To be safe, avoid tapping links in unsolicited text messages. In August 2019, </span><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/447107/can-my-iphone-or-ipad-get-a-virus/"><span data-dcnode-id="550" instrument_node="">people who own iPhones were exposed to malware</span></a><span data-dcnode-id="548" instrument_node="">&nbsp;simply by visiting a URL in Safari due to a </span><a data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forcepoint.com/cyber-edu/zero-day-exploit"><span data-dcnode-id="547" instrument_node="">zero-day exploit</span></a><span data-dcnode-id="545" instrument_node="">. While this was the first (and, as of this writing, only) exploit of its kind, it’s a reminder that you should never trust a random link.</span></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">If you do happen to tap a link, you might be redirected (often multiple times) to a different website. If the address bar in your browser bounces you from one website to another in quick succession, that’s a good sign you’re being hit with a scam.</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="532"><strong data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">RELATED:</span></strong><span data-dcnode-id="537" instrument_node=""> </span><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/devops/what-is-typosquatting-and-how-do-scammers-use-it/"><strong data-dcnode-id="534"><em data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">What is Typosquatting and How Do Scammers Use it?</span></em></strong></a></p><span data-dcnode-id="531" instrument_node="">
</span><div class="bordeaux-slot" data-dcnode-id="530" data-feat-ref="bordeaux-feat-id-45" id="bordeaux-static-slot-3" style="display: flex; flex-direction: column; margin: auto;"></div><h2 aria-level="2" data-dcnode-id="527" role="heading"><a data-dcnode-id="529" name="autotoc_anchor_3"></a><span data-dcnode-id="528" instrument_node="">Number Three: Don’t Fall for a Convincing Website</span></h2><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Suppose you accidentally tap a link without giving it much thought, and you see a very official-looking website.&nbsp;Some scammers are adept at producing websites that appear identical to the companies they’re trying to imitate. Don’t fall for it!</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="522" instrument_node="">A glance at the address bar should confirm any suspicions. Take a look at the example below from the Australia Post scam. The URL in the highlighted address bar doesn’t match that of the official Australia Post website, which means it’s a scam. However, some scammers </span><a data-dcnode-id="520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/devops/what-is-typosquatting-and-how-do-scammers-use-it/"><span data-dcnode-id="521" instrument_node="">go to great lengths to make their URLs look convincing</span></a><span data-dcnode-id="519" instrument_node="">, too.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><img alt="An example of a fake website from the Australia Post scam." class="alignnone wp-image-657164 size-full" data-dcnode-id="516" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/wp-content/uploads/2020/02/website_scam.png%3Ftrim%3D1%2C1%26bg-color%3D000%26pad%3D1%2C1&amp;raw" width="405"></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="513" instrument_node="">It’s surprisingly easy to create a carbon copy of a website simply by downloading the page and uploading it elsewhere. Sometimes, </span><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/657333/watch-out-this-verizon-smishing-scam-is-crazy-realistic/"><span data-dcnode-id="512" instrument_node="">the whole website functions as it normally would</span></a><span data-dcnode-id="510" instrument_node="">, including the “About Us” links and other unrelated content.</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="500"><strong data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">RELATED:</span></strong><span data-dcnode-id="505" instrument_node=""> </span><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/657333/watch-out-this-verizon-smishing-scam-is-crazy-realistic/"><strong data-dcnode-id="502"><em data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Watch Out: This Verizon Smishing Scam Is Crazy Realistic</span></em></strong></a></p><span data-dcnode-id="499" instrument_node="">
</span><div class="bordeaux-slot" data-dcnode-id="498" data-feat-ref="bordeaux-feat-id-46" id="bordeaux-static-slot-4" style="display: flex; flex-direction: column; margin: auto;"></div><h2 aria-level="2" data-dcnode-id="495" role="heading"><a data-dcnode-id="497" name="autotoc_anchor_4"></a><span data-dcnode-id="496" instrument_node="">Number Four: Pay Attention to the Grammar</span></h2><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">A large percentage of smishing attempts originate in countries where English is not the official (or first) language. As a result, many scammers make spelling or grammar mistakes that should be relatively easy for a native speaker to spot.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">This might be as simple as a misplaced word, improper capitalization, or a sentence that just seems “off.” Check out the double-space error in the message below. You also see incorrect capitalization, missing punctuation, and a URL that was incorrectly pasted mid-sentence.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><img alt="A text message scam for a &quot;Gift Card&quot; winner with many grammar mistakes." class="alignnone wp-image-657165 size-full" data-dcnode-id="487" height="232" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/wp-content/uploads/2020/02/gift_card.png%3Ftrim%3D1%2C1%26bg-color%3D000%26pad%3D1%2C1&amp;raw" width="650"></p><span data-dcnode-id="485" instrument_node="">
</span><div class="future_hybrid_paragraph" data-dcnode-id="484"></div><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Of course, not all scammers are from non-English-speaking countries. Many have a solid grasp of the language and understand how to make the bait look genuine.</span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Anecdotally, though, the vast majority of smishing attempts I’ve received have contained obvious grammar or spelling mistakes.</span></p><span data-dcnode-id="478" instrument_node="">
</span><div class="bordeaux-slot" data-dcnode-id="477" data-feat-ref="bordeaux-feat-id-47" id="bordeaux-static-slot-5" style="display: flex; flex-direction: column; margin: auto;"></div><h2 aria-level="2" data-dcnode-id="474" role="heading"><a data-dcnode-id="476" name="autotoc_anchor_5"></a><span data-dcnode-id="475" instrument_node="">Number Five: Don’t Trust a Personalized Message</span></h2><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">In many of the examples in this article, the scammers managed to get my name right. This sort of personalization could lead some to believe the message is genuine. You might receive a similar message trying to impersonate your bank, ISP, or cell provider.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468"><img alt="A text message scam using the author's first name. " class="alignnone wp-image-657166 size-full" data-dcnode-id="469" height="270" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/wp-content/uploads/2020/02/winner.png%3Ftrim%3D1%2C1%26bg-color%3D000%26pad%3D1%2C1&amp;raw" width="650"></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Unfortunately, chances are high that some of your personal information has been leaked online. Data breaches are common, and they allow scammers to piece together information that makes them appear more legitimate.</span></p><span data-dcnode-id="464" instrument_node="">
</span><div class="future_hybrid_paragraph" data-dcnode-id="463"></div><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">For example, they might know your address, which smartphone you use, or your social media handles.</span></p><span data-dcnode-id="460" instrument_node="">
</span><div class="bordeaux-slot" data-dcnode-id="459" data-feat-ref="bordeaux-feat-id-48" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><h2 aria-level="2" data-dcnode-id="456" role="heading"><a data-dcnode-id="458" name="autotoc_anchor_6"></a><span data-dcnode-id="457" instrument_node="">Number Six: Suspect It’s Real? Contact the Company Directly</span></h2><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">One of the most common smishing attempts of late is the postage scam. The message appears to be from a postal service informing you that you have to pay additional shipping costs on a package or verify your address. The landing page says the package will be returned to the sender if you don’t pay to create a sense of urgency.</span></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">My partner received the smishing attempt below last week. Despite the official-looking tracking number and a carbon copy of the Australia Post website, mail handlers don’t attempt to collect overdue shipping costs via text message. They also won’t send your package back within a few days of receiving it. Due to these inconsistencies, the scam was exposed.</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><img alt="An &quot;Overdue Postage&quot; text message scam." class="alignnone wp-image-657167 size-full" data-dcnode-id="448" height="210" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/wp-content/uploads/2020/02/parcel.png%3Ftrim%3D1%2C1%26bg-color%3D000%26pad%3D1%2C1&amp;raw" width="650"></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="445" instrument_node="">A quick search led me to a page on&nbsp;</span><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redirect.viglink.com/%3Fkey%3D204a528a336ede4177fff0d84a044482%26u%3Dhttps%253A%252F%252Fauspost.com.au%252Fabout-us%252Fabout-our-site%252Fonline-security-scams-fraud%252Fscam-alerts" rel="sponsored"><span data-dcnode-id="444" instrument_node="">the AusPost website&nbsp;</span></a><span data-dcnode-id="442" instrument_node="">describing the scam. We also previously explored </span><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/511049/psa-watch-out-for-this-new-text-message-package-delivery-scam/"><span data-dcnode-id="441" instrument_node="">the FedEx package delivery scam</span></a><span data-dcnode-id="439" instrument_node="">. If you receive a similar SMS, search the web for “USPS (or the relevant delivery service) text message scam.”</span></p><span data-dcnode-id="437" instrument_node="">
</span><div class="future_hybrid_paragraph" data-dcnode-id="436"></div><p data-dcnode-id="432"><span data-dcnode-id="435" instrument_node="">Social engineering attacks can be a lot harder to spot—particularly if you already think the person you’re talking to is who they say they are. One easy way to spot such a scam is if the other party is asking for payment or donations in gift cards, as they did recently in </span><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wave3.com/2020/02/06/scammers-impersonating-louisville-priests-ask-elderly-buy-gift-cards-cancer-patients/"><span data-dcnode-id="434" instrument_node="">Louisville, Ky.</span></a></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">It’s well-established that companies will never email, text, or call you and ask for payment. If you suspect an overdue bill or postage fee isn’t legitimate, contact the company directly before you give out any information. If someone is soliciting donations, make sure you donate to the organization directly, via its official website, at a point of sale, or a collection box rather than via text.</span></p><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="420"><strong data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">RELATED:</span></strong><span data-dcnode-id="425" instrument_node=""> </span><a data-dcnode-id="421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/511049/psa-watch-out-for-this-new-text-message-package-delivery-scam/"><strong data-dcnode-id="422"><em data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">PSA: Watch Out for This New Text Message Package Delivery Scam</span></em></strong></a></p><span data-dcnode-id="419" instrument_node="">
</span><div class="bordeaux-slot" data-dcnode-id="418" data-feat-ref="bordeaux-feat-id-49" id="bordeaux-static-slot-7" style="display: flex; flex-direction: column; margin: auto;"></div><h2 aria-level="2" data-dcnode-id="415" role="heading"><a data-dcnode-id="417" name="autotoc_anchor_7"></a><span data-dcnode-id="416" instrument_node="">Be Careful Out There</span></h2><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Be skeptical of any text messages you receive that aren’t from friends or acquaintances. If you keep these basics in mind, you won’t be tricked into giving up cash or your personal information.</span></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="410" instrument_node="">To take your protection a bit further, you can also </span><a data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/366653/how-to-make-android-as-secure-as-possible/"><span data-dcnode-id="409" instrument_node="">secure your Android device</span></a><span data-dcnode-id="407" instrument_node="">&nbsp;or follow a few </span><a data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/447616/10-easy-steps-to-better-iphone-and-ipad-security/"><span data-dcnode-id="406" instrument_node="">basic iPhone security tips</span></a><span data-dcnode-id="404" instrument_node="">.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="394"><strong data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">RELATED:</span></strong><span data-dcnode-id="399" instrument_node=""> </span><a data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howtogeek.com/526115/what-is-smishing-and-how-do-you-protect-yourself/"><strong data-dcnode-id="396"><em data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">What Is Smishing, and How Do You Protect Yourself?</span></em></strong></a></p><span data-dcnode-id="393" instrument_node="">
</span><span data-dcnode-id="392" instrument_node="">
