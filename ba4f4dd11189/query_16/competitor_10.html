</span><div class="tdb-block-inner td-fix-index" data-dcnode-id="1241"><h1 class="tdb-title-text" data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">How to Spot Job Scammers and Fake Jobs in the UAE</span></h1><div data-dcnode-id="1243"></div><div class="tdb-title-line" data-dcnode-id="1242"></div></div></div><div class="td_block_wrap tdb_single_content tdi_75_216 td-pb-border-top td_block_template_1 td-post-content tagdiv-type" data-dcnode-id="1133" data-td-block-uid="tdi_75_216"><span data-dcnode-id="1239" instrument_node="">
</span><div class="tdb-block-inner td-fix-index" data-dcnode-id="1134"><div class="td-a-ad id_top_ad" data-dcnode-id="1227"><span class="td-adspot-title" data-dcnode-id="1236"></span><span data-dcnode-id="1234" instrument_node="">
</span><span data-dcnode-id="1232" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-0906846014121679" data-ad-format="auto" data-ad-slot="8460933357" data-dcnode-id="1231" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1230" instrument_node="">
</span></div><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">People from different countries come to Dubai and the Middle East to search for greener pastures and earn better money. Knowing that Dubai’s economy is&nbsp;rising again, multiple jobs are available. However, there are also plenty of scams that you should be aware of.</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Technology is getting sophisticated&nbsp;&nbsp;and&nbsp;it is getting difficult these days to spot job scammers. There can&nbsp;be as much fake job offerings as there are legit ones. Watch out for warning signs listed below to not fall for these traps.</span></p><span data-dcnode-id="1221" instrument_node="">
</span><h2 data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">BEWARE: 5 Common Trends of Job Scammers</span></h2><span data-dcnode-id="1218" instrument_node="">
</span><ol data-dcnode-id="1201"><span data-dcnode-id="1217" instrument_node="">
</span><li data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">A job is said to offer you attractive salary package instantly without any skills or experience needed;</span></li><span data-dcnode-id="1214" instrument_node="">
</span><li data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">You are immediately offered a job without having to submit your application, going through an interview and interacting with a representative of the company to talk about job details and salary benefits;</span></li><span data-dcnode-id="1211" instrument_node="">
</span><li data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">You are asked to make a payment such as a&nbsp;processing fee, training fee, placement fee, etc. as a form of advance payment to secure the job.&nbsp; At no time should you be paying for a job you are applying for;</span></li><span data-dcnode-id="1208" instrument_node="">
</span><li data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">You are asked to provide your credit card details or personal bank account information;</span></li><span data-dcnode-id="1205" instrument_node="">
</span><li data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">The company hiring you does not have a physical address and phone number listed. If there is a contact number provided and you are still suspicious, you can always dial out the number and see if it’s valid.</span></li><span data-dcnode-id="1202" instrument_node="">
</span></ol><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><img alt="" class="aligncenter" data-dcnode-id="1199" height="354" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dubaiofw.com/wp-content/uploads/2014/10/job-scam-dubai.jpg&amp;raw" width="600"></p><span data-dcnode-id="1197" instrument_node="">
</span><div class="td-a-ad id_inline_ad0 id_ad_content-horiz-center" data-dcnode-id="1187"><span class="td-adspot-title" data-dcnode-id="1196"></span><span data-dcnode-id="1194" instrument_node="">
</span><span data-dcnode-id="1192" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-0906846014121679" data-ad-format="auto" data-ad-slot="2442319919" data-dcnode-id="1191" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1190" instrument_node="">
</span></div><p data-dcnode-id="1185" style="text-align: center;"><span data-dcnode-id="1186" instrument_node="">screenshot of an email which is known to be a scam since I did not apply for this company and they did not mention what position was available — even just the “Dear Candidate” greeting and not using my name, just proves that this is a fake.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><h3 data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Other Tips to Avoid&nbsp;Being a Victim of Fake Jobs in the UAE</span></h3><span data-dcnode-id="1181" instrument_node="">
</span><ul data-dcnode-id="1167"><span data-dcnode-id="1180" instrument_node="">
</span><li data-dcnode-id="1175"><span data-dcnode-id="1179" instrument_node="">Apply directly to the company in need of the job posts. </span><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Visit their official website</span></strong><span data-dcnode-id="1176" instrument_node=""> after using search engines like Google, Yahoo, etc.</span></li><span data-dcnode-id="1174" instrument_node="">
</span><li data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">If you are going through an agency in the Philippines, you can check with POEA the legitimacy of that specific agency. If you are applying in the UAE and you are suspicious about a specific agency offering you a job and asking you for money, do not hesitate to contact the local police and ask them.</span></li><span data-dcnode-id="1171" instrument_node="">
</span><li data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">If you are applying through an advertisement you saw online or on a newspaper, check the legitimacy of the advertiser. Research about them online and watch out for&nbsp; signs of scammers listed above.</span></li><span data-dcnode-id="1168" instrument_node="">
</span></ul><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">In the UAE, plenty of job opportunities are available for every expat. If you are unsure about a job offer or a company hiring you, take time to research online to make sure the company/job offer is legit.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">—————–</span></p><span data-dcnode-id="1160" instrument_node="">
</span><div class="td-a-ad id_inline_ad1 id_ad_content-horiz-center" data-dcnode-id="1150"><span class="td-adspot-title" data-dcnode-id="1159"></span><span data-dcnode-id="1157" instrument_node="">
</span><span data-dcnode-id="1155" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-0906846014121679" data-ad-format="auto" data-ad-slot="2442319919" data-dcnode-id="1154" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1153" instrument_node="">
</span></div><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">In line with this article, we would to stress that we, The DubaiOFW, are not a recruitment agency. We do not ask nor receive any form of payment when we post the jobs unless otherwise stated. The job vacancies we advertise link directly to the main website of the company where you will submit your CV. We do not collect nor have access to the CV you submitted.</span></p><span data-dcnode-id="1147" instrument_node="">
