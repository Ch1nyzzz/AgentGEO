</span><h1 class="entry-title" data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Searching For a Job in the UAE? Know How to Spot and Prevent Fake Job Disclaimers</span></h1><span data-dcnode-id="1060" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1045"><span data-dcnode-id="1059" instrument_node="">
</span><span class="meta-prep meta-prep-author" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Posted on</span></span><span data-dcnode-id="1056" instrument_node=""> </span><span class="entry-date" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">February 8, 2017</span></span><span data-dcnode-id="1053" instrument_node=""> </span><span class="meta-sep" data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">by</span></span><span data-dcnode-id="1050" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1047"><a class="url fn n" data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.naukrigulf.com/career-tips/author/ssrivastava/" title="View all posts by Swati Srivastava"><span data-dcnode-id="1049" instrument_node="">Swati Srivastava</span></a></span><span data-dcnode-id="1046" instrument_node=""> | 32,935 views					</span></div><span data-dcnode-id="1043" instrument_node="">
</span><span data-dcnode-id="1041" instrument_node="">
</span><div addthis:title="Searching For a Job in the UAE? Know How to Spot and Prevent Fake Job Disclaimers" addthis:url="https://www.naukrigulf.com/career-tips/identify-fake-job-offer-emails/" class="addthis_toolbox addthis_default_style" data-dcnode-id="1034"><a class="addthis_button_facebook" data-dcnode-id="1040"></a><a class="addthis_button_twitter" data-dcnode-id="1039"></a><a class="addthis_button_linkedin" data-dcnode-id="1038"></a><a class="addthis_button_gmail" data-dcnode-id="1037"></a><a class="addthis_button_compact" data-dcnode-id="1036"></a><a class="addthis_counter addthis_bubble_style" data-dcnode-id="1035"></a></div><span data-dcnode-id="1033" instrument_node="">
</span><span data-dcnode-id="1031" instrument_node="">
</span><div class="entry-content" data-dcnode-id="793"><span data-dcnode-id="1030" instrument_node="">
</span><span data-dcnode-id="1028" instrument_node="">
</span><span data-dcnode-id="1026" instrument_node="">
</span><span data-dcnode-id="1024" instrument_node="">
</span><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1018" style="text-align: justify;"><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.naukrigulf.com/career-tips/wp-content/uploads/2017/02/fake2-jobs.jpg"><img alt="Beware of Fake Jobs" class="alignnone wp-image-10268" data-dcnode-id="1020" height="233" sizes="(max-width: 629px) 100vw, 629px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.naukrigulf.com/career-tips/wp-content/uploads/2017/02/fake2-jobs-1024x379.jpg&amp;raw" srcset="https://www.naukrigulf.com/career-tips/wp-content/uploads/2017/02/fake2-jobs-1024x379.jpg 1024w, https://www.naukrigulf.com/career-tips/wp-content/uploads/2017/02/fake2-jobs-300x111.jpg 300w, https://www.naukrigulf.com/career-tips/wp-content/uploads/2017/02/fake2-jobs-768x284.jpg 768w, https://www.naukrigulf.com/career-tips/wp-content/uploads/2017/02/fake2-jobs.jpg 1200w" title="Searching For a Job in the UAE" width="629"></a></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015" style="text-align: justify;"><span data-dcnode-id="1016" instrument_node="">The growing economy like the UAE is a hub for international job seekers. While it offers tax-free income, competitive compensation, global exposure and lucrative career opportunities, the UAE is also becoming a breeding ground for job scams. There are a plethora of genuine job offers but several scams also happen which every job seeker should be aware of.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012" style="text-align: justify;"><span data-dcnode-id="1013" instrument_node="">Advertising fake job openings for seeking ‘cash-for-jobs’ are the common ways scammers dupe job seekers. Many declare exaggerated compensation and employment benefits as a bait to misguide expats. The result is that job seekers desperately looking for jobs abroad get into these scams.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1008" instrument_node="">
</span><ul data-dcnode-id="1000"><span data-dcnode-id="1007" instrument_node="">
</span><li data-dcnode-id="1002"><span data-dcnode-id="1006" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Key Factors to Identify a Job Scam</span></h2><span data-dcnode-id="1003" instrument_node="">
</span></li><span data-dcnode-id="1001" instrument_node="">
</span></ul><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997" style="text-align: justify;"><span data-dcnode-id="998" instrument_node="">There are several alarming factors that can tell you about a job SCAM. Consider a situation where you find an extremely enticing job offer in Dubai that claims to offer a salary beyond your imagination, perks, other benefits, and wants you to join immediately. The only joining procedure or interview call demands you to pay a huge, non-refundable amount in the initial stage of the hiring process. Be cautious and think logically why a genuine employer would ask you to pay an amount to find a suitable job.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994" style="text-align: justify;"><span data-dcnode-id="995" instrument_node="">In such a situation, how can you play safe? Here are a few clues you should always pay attention to:</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">&nbsp;</span></p><span data-dcnode-id="990" instrument_node="">
</span><ul data-dcnode-id="854"><span data-dcnode-id="989" instrument_node="">
</span><li data-dcnode-id="856"><span data-dcnode-id="988" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="985"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">–&nbsp; Job Has Been Created For You</span></strong></h3><span data-dcnode-id="984" instrument_node="">
</span><ul data-dcnode-id="858"><span data-dcnode-id="983" instrument_node="">
</span><li data-dcnode-id="860"><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980" style="text-align: justify;"><span data-dcnode-id="981" instrument_node="">Any job that seems to have been created only for you should be an alarming factor. For instance, a job that you never applied for, says that you are the perfect match for it and asks you to sign the contract as soon as possible. This should leave no doubt for you to consider it as a fake job alert.</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">&nbsp;</span></p><span data-dcnode-id="976" instrument_node="">
</span><ul data-dcnode-id="876"><span data-dcnode-id="975" instrument_node="">
</span><li data-dcnode-id="885"><span data-dcnode-id="974" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="971"><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">–&nbsp;&nbsp; Everything Seems So Perfect</span></strong></h3><span data-dcnode-id="970" instrument_node="">
</span><ul data-dcnode-id="892"><span data-dcnode-id="969" instrument_node="">
</span><li data-dcnode-id="901"><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966" style="text-align: justify;"><span data-dcnode-id="967" instrument_node="">The job claims to offer you just so perfect salary, facilities, and growth opportunities, even without calling you for a face-to-face interview. The job also mentions no minimum qualification or work experience.</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">&nbsp;</span></p><span data-dcnode-id="962" instrument_node="">
</span><ul data-dcnode-id="908"><span data-dcnode-id="961" instrument_node="">
</span><li data-dcnode-id="917"><span data-dcnode-id="960" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="957"><strong data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">–&nbsp; Salary Offered Is Extremely High</span></strong></h3><span data-dcnode-id="956" instrument_node="">
</span><ul data-dcnode-id="924"><span data-dcnode-id="955" instrument_node="">
</span><li data-dcnode-id="932"><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952" style="text-align: justify;"><span data-dcnode-id="953" instrument_node="">The salary offered for the advertised job is too high than what is offered in the industry. Any such thing being offered to you without any expectation is what should alarm you.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">&nbsp;</span></p><span data-dcnode-id="948" instrument_node="">
</span><ul data-dcnode-id="939"><span data-dcnode-id="947" instrument_node="">
</span><li data-dcnode-id="941"><span data-dcnode-id="946" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="943"><strong data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">–&nbsp; You Are Asked To Pay A Fee</span></strong></h3><span data-dcnode-id="942" instrument_node="">
</span></li><span data-dcnode-id="940" instrument_node="">
</span></ul><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936" style="text-align: justify;"><span data-dcnode-id="937" instrument_node="">The only condition mentioned to you for getting the job is a fee that could be in the form of either processing fee or registration fee. Moreover, the sender wants you to transfer the amount on an urgent basis in a personal account. Any such recruiter should be a red flag for you.</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">&nbsp;</span></p></li><span data-dcnode-id="931" instrument_node="">
</span><li data-dcnode-id="926"><span data-dcnode-id="930" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Tips to Prevent These Scams</span></h2><span data-dcnode-id="927" instrument_node="">
</span></li><span data-dcnode-id="925" instrument_node="">
</span></ul><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="921" style="text-align: justify;"><span data-dcnode-id="922" instrument_node="">Apart from understanding these clues, it is imperative that you should also take action to prevent such scams happening to you. This is what you can do:</span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">&nbsp;</span></p></li><span data-dcnode-id="916" instrument_node="">
</span><li data-dcnode-id="910"><span data-dcnode-id="915" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="912"><strong data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">–&nbsp; Never Pay In The Name Of Any Fees</span></strong></h3><span data-dcnode-id="911" instrument_node="">
</span></li><span data-dcnode-id="909" instrument_node="">
</span></ul><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905" style="text-align: justify;"><span data-dcnode-id="906" instrument_node="">The most important thing to understand is that fake recruitment agencies often ask you to pay in exchange for a job. They promise guaranteed job offer once you pay a fee in the name of processing fee, placement fee or caution fee. To prevent such fraud activities, never say- “YES” to paying even a small amount for getting a job. Remember, genuine recruitment agencies never ask job seekers for money as they get commission from the companies for which they are hiring and not from job candidates.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">&nbsp;</span></p></li><span data-dcnode-id="900" instrument_node="">
</span><li data-dcnode-id="894"><span data-dcnode-id="899" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="896"><strong data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">&nbsp;– Avoid Sending Your CV To Unauthentic Recruiters On E-Mail</span></strong></h3><span data-dcnode-id="895" instrument_node="">
</span></li><span data-dcnode-id="893" instrument_node="">
</span></ul><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889" style="text-align: justify;"><span data-dcnode-id="890" instrument_node="">Another gimmick used by scammers is asking you to send your CV. Every day you may receive several e-mails that advertise jobs, even when you might have not registered to any such sites. Since these emails do not involve financial transactions, many job seekers believe that it is harmless to share their CV with such sundry e-mails. The fact is that your CV includes a lot of information such as contact details, which are used to build a database for several fake activities.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">&nbsp;</span></p></li><span data-dcnode-id="884" instrument_node="">
</span><li data-dcnode-id="878"><span data-dcnode-id="883" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="880"><strong data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">– Research And Look For Reliable Sources Only</span></strong></h3><span data-dcnode-id="879" instrument_node="">
</span></li><span data-dcnode-id="877" instrument_node="">
</span></ul><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873" style="text-align: justify;"><span data-dcnode-id="874" instrument_node="">Most of the employers prefer to post a job opening either on their official website or with reputed online job portals. Moreover, you can get a direct job e-mail from a recruiter if you have previously applied for the company or submitted your CV on the site. Apart from this, if you get any job invitation from an unknown source, it is always recommended to research more about the sender. You can easily do this by searching the name of the recruiting company online and find its contact details to reach out to him directly. Another important point is to check the email id of the sender. If it is a personal id, i.e., gmail.com or yahoo.com instead of a company domain, it could be a trap for you.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="867" style="text-align: justify;"><span data-dcnode-id="871" instrument_node="">We understand that you are </span><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.naukrigulf.com/jobs-in-uae" rel="noopener" target="_blank"><span data-dcnode-id="870" instrument_node="">looking for a job in the UAE</span></a><span data-dcnode-id="868" instrument_node="">, which offers several career opportunities. However, follow the tips mentioned in the article to stay safe and avoid loss of money by falling into the trap of job scammers.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864" style="text-align: justify;"><span data-dcnode-id="865" instrument_node="">Be careful and happy job search.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861" style="text-align: justify;"><span data-dcnode-id="862" instrument_node="">
