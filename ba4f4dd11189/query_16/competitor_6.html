zonaws.com/wp-content/uploads/2017/10/13195031/fake-job-posting-810x380.jpg&amp;raw" srcset="https://tjn-blog-images.s3.amazonaws.com/wp-content/uploads/2017/10/13195031/fake-job-posting.jpg 810w, https://tjn-blog-images.s3.amazonaws.com/wp-content/uploads/2017/10/13195031/fake-job-posting-768x360.jpg 768w" width="810"></div><div class="meta-author" data-dcnode-id="800"><div class="meta-author-img" data-dcnode-id="807"><span data-dcnode-id="809" instrument_node=""> </span><img alt="" class="avatar avatar-100 photo" data-dcnode-id="808" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/8b26caf9980cb78fdd88eb956db3497f%3Fs%3D100%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/8b26caf9980cb78fdd88eb956db3497f?s=200&amp;d=mm&amp;r=g 2x" width="100"></div><div class="meta-author-wrapped" data-dcnode-id="801"><span data-dcnode-id="806" instrument_node="">Written by </span><span class="vcard author" data-dcnode-id="802"><span class="fn" data-dcnode-id="803"><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thejobnetwork.com/author/peter-jones/"><span data-dcnode-id="805" instrument_node="">Peter Jones</span></a></span></span></div></div><div class="entry-content" data-dcnode-id="666"><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">The job market is hard enough to navigate without having to worry about some posting turning out to be a scam—or even just a dead end. Save your precious time and energy by being on the lookout for these simple signs that something just isn’t right.</span></p><div class="thejo-post-content" data-dcnode-id="793" id="thejo-1816506220" style="float: left; margin-right: 60px; margin-bottom: 20px; "><div data-dcnode-id="794" id="div-gpt-ad-1467144145037-0" style="height:250px; width:300px;"><span data-dcnode-id="797" instrument_node=""> </span><span data-dcnode-id="795" instrument_node=""> </span></div></div><h4 data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">1. The company has no online presence.</span></h4><p data-dcnode-id="786"><span data-dcnode-id="790" instrument_node="">You do your due diligence and try to verify the person, the company, the job listing… and nothing is turning up in your Googling. You can stop right there and step away. Legit jobs always have&nbsp;</span><em data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">some</span></em><span data-dcnode-id="787" instrument_node=""> online trail.</span></p><h4 data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">2. The recruiter’s email doesn’t match their company.</span></h4><p data-dcnode-id="779"><span data-dcnode-id="783" instrument_node="">You get an email from a recruiter who claims to represent a fabulous and well-known company. The company logo might even be at the bottom of the email. Look closely—does the email they want you to send materials to not end in the official company name (theircompany.com)? If the email associated with the posting or the invitation is a personal one (think Hotmail, Gmail, Yahoo, et</span><em data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">c.</span></em><span data-dcnode-id="780" instrument_node="">), maybe take a pass. And please, please don’t respond and attach any personal documents unless you’re sure you’re dealing with the real deal.</span></p><h4 data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">3. You found it via a random social media post.</span></h4><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">While it is possible to land a great job you found through social media, chances are if it’s just posted there—or sponsored or advertised—it’s probably not as sweet a deal as it seems. Remember that the overwhelming majority of jobs are referral based, come through legitimate channels, or are on vetted job boards. Resist the idea that you can just surf Facebook and get hired.</span></p><h4 data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">4. They claim “No experience necessary.”</span></h4><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Sure, maybe the job they’re offering is entry level. Maybe they offer training. But if the posting leads with NO EXPERIENCE NECESSARY, you can be almost certain that there’s a catch you won’t like. Most jobs want you to come equipped with some skills.</span></p><h4 data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">5. The language is sloppy.</span></h4><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">If the ad isn’t well written, or it contains spelling or grammatical errors, or it’s just sloppily punctuated or IN ALL CAPS, consider it a red flag. A real job posting will be professional and polished.</span></p><h4 data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">6. They ask for an interview via chat or text.</span></h4><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">You should be wary if your first interview scheduled on some kind of text messaging service. While remote interviews are becoming increasingly common, that means phone calls and Skype, not a typed conversation in a chat window.</span></p><h4 data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">7. Anything about it is too good to be true.</span></h4><p data-dcnode-id="753"><span data-dcnode-id="760" instrument_node="">You’re hired immediately! The salary is CRAZY HIGH! They contacted</span><em data-dcnode-id="758"><span data-dcnode-id="759" instrument_node=""> you</span></em><span data-dcnode-id="757" instrument_node=""> out of the blue! No need to interview! When can you start? (Hint: if a job seems too good to be true, it probably </span><em data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">is</span></em><span data-dcnode-id="754" instrument_node=""> too good to be true.)</span></p><h4 data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">8. Everything about it is vague.</span></h4><p data-dcnode-id="746"><span data-dcnode-id="750" instrument_node="">If you can’t tell from the posting what exactly your role would be at the company, that’s a problem. A bigger problem is when you can’t really tell what the </span><em data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">company</span></em><span data-dcnode-id="747" instrument_node=""> does and get a sense of its mission or history. If all of this is very vague… leave this one on the “no” pile.</span></p><h4 data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">9. They want money.</span></h4><p data-dcnode-id="739"><span data-dcnode-id="743" instrument_node="">If you’re asked to pay&nbsp;</span><em data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">anything</span></em><span data-dcnode-id="740" instrument_node="">—such as a fee to apply or for a software program with which to send in your application materials—consider the job a scam. A general rule of thumb: never give your money away to total strangers you meet on the internet.</span></p><h4 data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">10. Your gut says no.</span></h4><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">The bottom line: keep an eye out for these and other warning signs, but your best alarm system is your own gut feeling. Does something seem off to you? If so, let it go. There are other jobs out there.</span></p><span data-dcnode-id="734" instrument_node=""> </span><div class="heateor_sss_sharing_container heateor_sss_vertical_sharing heateor_sss_bottom_sharing" data-dcnode-id="697" data-heateor-sss-href="https://www.thejobnetwork.com/how-you-can-spot-a-fake-job-posting/" style="width:44px;left: -10px;top: 100px;-webkit-box-shadow:none;box-shadow:none;"><div class="heateor_sss_sharing_ul" data-dcnode-id="700">
