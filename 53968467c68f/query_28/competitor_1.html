eaned. This unit has a replaceable </span><a data-dcnode-id="544" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lakeair.com/product/replacement-carbon-filter-maxum/" rel="follow"><span data-dcnode-id="545" instrument_node="">activated carbon filter</span></a><span data-dcnode-id="543" instrument_node=""> and is available in brushed aluminum, black, wood grain or white. The Maxum can be bought on our site or from one of our </span><a data-dcnode-id="541" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.purennatural.com/products/maxum-home-smoke-eater/" rel="external noopener noreferrer"><span data-dcnode-id="542" instrument_node="">re-selling partners</span></a><span data-dcnode-id="540" instrument_node="">. Many of our customers use the Maxum electrostatic as their </span><a data-dcnode-id="538" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lakeair.com/smoke-eater/home/" rel="follow"><span data-dcnode-id="539" instrument_node="">home smoke eater</span></a><span data-dcnode-id="537" instrument_node=""> of choice</span></p><h4 data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Benefits and Applications</span></h4><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">The Maxum Electronic air cleaner purifies the air in your home to relieve the symptoms of allergy and asthma suffers. The Maxum is a mold killing machine. Smoke is destroyed by the Maxum’s 3 filter design. You will breathe easier when you have the Maxum protection. The Maxum will make your home a refuge from air pollution and airborne irritants.</span></p><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">the Maxum removes:</span></p><ul data-dcnode-id="517"><li data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">dust&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; pollen&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;pet dander&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; pesticides&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; ragweed</span></li><li data-dcnode-id="523"><span data-dcnode-id="527" instrument_node="">mold&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; bacteria&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span><a data-dcnode-id="525" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lakeair.com/smoke-eater" rel="follow"><span data-dcnode-id="526" instrument_node="">smoke</span></a><span data-dcnode-id="524" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; formaldehyde&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; acetone</span></li><li data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">viruses&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; dust mites&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;pet hair&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; radon&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;off-gassing</span></li><li data-dcnode-id="518"><strong data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">And many many more indoor pollutants that pose a threat to the air we breathe at home</span></strong></li></ul><p data-dcnode-id="515"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="516" data-lazyloaded="1" data-litespeed-src="https://www.youtube.com/embed/AbIDxfWhW_U" frameborder="0" height="315" src="about:blank" width="560"></iframe></p><h4 data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Built to Last</span></h4><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">The Maxum is an industrial-strength air purifier that works great in the home or office. The Maxum is made from an 18 gauge steel body. This super tough frame is covered by a 20 gauge vinyl coated steel shell. This tough material is the same used by many leading appliance manufactures. The Maxum Electrostatic Home Air purifier has the best warranty in the industry. The power supply and electronic cells are guaranteed to provide 7 years of worry-free operation. The Maxum has been in production for nearly 30 years and many of them are still running today. You can be assured that service, parts, and accessories will be available for many years to come.</span></p><h4 data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Free for Schools (currently suspended due to COVID 19)</span></h4><p data-dcnode-id="502"><span data-dcnode-id="508" instrument_node="">RK Ventures Inc., the manufacturer of LakeAir Air Purifying Systems, is proud to announce a new program to allow schools to examine the benefits of improved indoor air quality. We will install a LakeAir Maxum Electrostatic Air purifier in one classroom of any school wishing to participate in a 90 day free no obligation trial.&nbsp;This program has been pilot tested with </span><a data-dcnode-id="506" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Ftime_continue%3D6%26v%3D_C1lmO2UlXI" rel="external noopener noreferrer"><span data-dcnode-id="507" instrument_node="">amazing results</span></a><span data-dcnode-id="505" instrument_node="">. According to participants, school absenteeism was greatly reduced and the teaching and</span><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node="">learning environment was enhanced. The classrooms smell cleaner and both teachers and students found the classroom a nicer place to be.</span></p><p data-dcnode-id="500"><img alt="Maxum Electrostatic Air Purifier" data-dcnode-id="501" data-lazyloaded="1" data-src="https://www.lakeair.com/wp-content/uploads/2013/02/Maxum-electrostatic-air-purifier-300x232.jpg" height="232" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMjMyIiB2aWV3Qm94PSIwIDAgMzAwIDIzMiI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iI2NmZDRkYiIvPjwvc3ZnPg==" width="300"></p><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Maxum Electrostatic Air Purifier, Perfect for the home, school or office</span></p><h3 data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">How it Works</span></h3><ol data-dcnode-id="487"><li data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">&nbsp;Dirty air is drawn into the Maxum.</span></li><li data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Air particles pass through to the ionizing section of the electrostatic filter cell. Here they receive a positive electrical charge. The positively charged particles continue through to the negatively charged collecting section. The positively charged dirty air particles stick to plates in the collecting section like metal filings stick to a magnet. The pollutants are held on the collecting section until they are washed away during the cleaning process.</span></li><li data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">The cleaned air passes through an odor-absorbing activated carbon after filter. Activated carbon absorbs odors, gasses, and harmful VOCs.</span></li><li data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">The quiet circular fan pushes the clean air back into the room.</span></li></ol><h3 data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Specifications</span></h3><p data-dcnode-id="483"><img alt=" Maxum Electrostatic Home Air Purifer" data-dcnode-id="484" data-lazyloaded="1" data-src="https: -id="265" role="img"><span data-dcnode-id="266" style="width:100%"><span data-dcnode-id="270" instrument_node="">Rated </span><strong class="rating" data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">5</span></strong><span data-dcnode-id="267" instrument_node=""> out of 5</span></span></div><p class="meta" data-dcnode-id="255"><span data-dcnode-id="264" instrument_node="">

 great customer service and prompt order fulfillment, we are so pleased with this unit that we will probably be ordering them (our daughter and son in law) one for Christmas as well, so obviously we would recommend this product to anyone wanting better quality air in their home, as we have definitely noticed a big difference. We live in Arizona so our climate here is very dusty and the LakeAir unit fits the bill nicely.</span></p><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Thanks, Carl</span></p></div></div></div></li><li class="review even thread-even depth-1" data-dcnode-id="220" id="li-comment-2673"><div class="comment_container" data-dcnode-id="221" id="comment-2673"><img alt="" class="avatar avatar-60 photo" data-dcnode-id="246" data-lazyloaded="1" data-src="https://secure.gravatar.com/avatar/d598c39749d9e51c7eecf7b110da3f16?s=60&amp;d=mm&amp;r=g" data-srcset="https://secure.gravatar.com/avatar/d598c39749d9e51c7eecf7b110da3f16?s=120&amp;d=mm&amp;r=g 2x" height="60" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2MCIgaGVpZ2h0PSI2MCIgdmlld0JveD0iMCAwIDYwIDYwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjY2ZkNGRiIi8+PC9zdmc+" width="60"><div class="comment-text" data-dcnode-id="222"><div aria-label="Rated 5 out of 5" class="star-rating" data-dcnode-id="240" role="img"><span data-dcnode-id="241" style="width:100%"><span data-dcnode-id="245" instrument_node="">Rated </span><strong class="rating" data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">5</span></strong><span data-dcnode-id="242" instrument_node=""> out of 5</span></span></div><p class="meta" data-dcnode-id="230"><span data-dcnode-id="239" instrument_node="">
