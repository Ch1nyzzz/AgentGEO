</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">With its tower design the Oransi Finn HEPA air purifier fits nicely in any room. We invested heavily in design to bring you a HEPA air purifier you are proud to show off and not hide behind the couch. In addition, we have removed wasted space to make it more compact and powerful than other tower air purifiers.</span></p><span data-dcnode-id="973" instrument_node="">

</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">The Finn air purifier is optimized to remove airborne dust, pollen, pet dander, mold, and other solid airborne particles. Also features a carbon pre-filter to help with light odors. It’s the perfect air purifier for a bedroom or office. The Finn is designed for use in a single small square foot size room - ideally 400 square feet or less.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="963"><b data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Placement -</span></b><span data-dcnode-id="964" instrument_node=""> we suggest placing the air purifier in the room where you spend most of your time. For most this is a bedroom where the unit stays plugged in and runs 24/7 or whenever you are in the room.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="958"><span class="text-primary" data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Note:</span></span><span data-dcnode-id="959" instrument_node=""> Be sure to open the cover and remove the installed filter from the plastic bag before operating the air purifier. If run continuously the HEPA Filter should be checked and cleaned if needed about every 1-2 months for best performance. Also, the air does shoot straight out of this air purifier. There are two fan assemblies inside the Finn that rotate around a vertical rod in the center of the air purifier and it's normal for it to shoot out one side. We designed this HEPA air purifier that way to achieve the maximum air flow. If we were to route the air so it exits the center or evenly it would result in lower air flow and more noise.</span></p><span data-dcnode-id="957" instrument_node="">
