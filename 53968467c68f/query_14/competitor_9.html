div><div class="PlainImage PlainImage--width-boxed d-none" data-dcnode-id="1613" id="36c48fd8-3801-449b-8517-4280a0a7c035"><div class="plain-image-container container" data-dcnode-id="1614"><div class="plain-image-row clearfix row" data-dcnode-id="1615"><div class="plain-image-col col-12" data-dcnode-id="1616"><div class="d-none d-lg-block PlainImage__image" data-dcnode-id="1622"><img class="img-fluid" data-dcnode-id="1623" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//a.storyblok.com/f/101818/2038x836/1e9256c289/slice-1.png&amp;raw"></div><span data-dcnode-id="1621" instrument_node=""> </span><div class="d-none d-lg-none d-md-block PlainImage__image" data-dcnode-id="1620" style="background-image: url(&quot;https://a.storyblok.com/f/101818/2038x836/1e9256c289/slice-1.png&quot;);"></div><span data-dcnode-id="1619" instrument_node=""> </span><div class="d-block d-md-none PlainImage__image" data-dcnode-id="1617"><img class="img-fluid" data-dcnode-id="1618" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//a.storyblok.com/f/101818/772x1232/9c23900439/air-partners-logos-mobile.jpg&amp;raw"></div></div></div></div></div><div class="ColumnText ColumnText--title-top text-center padding-top-s" data-dcnode-id="1597" data-v-7c54a31b="" id="8d14b6ee-65b3-4493-a9bd-c0626b94b14f"><div class="container" data-dcnode-id="1598" data-v-7c54a31b=""><div class="row" data-dcnode-id="1599" data-v-7c54a31b=""><div class="col-md-12 variation-width-width-full" data-dcnode-id="1600" data-v-7c54a31b=""><div class="contents-wrapper" data-dcnode-id="1601" data-v-7c54a31b=""><div class="title-wrapper" data-dcnode-id="1604" data-v-7c54a31b=""><span data-dcnode-id="1611" instrument_node=""> </span><h3 class="title-inner ColumnText__title" data-dcnode-id="1609" data-v-7c54a31b=""><span data-dcnode-id="1610" instrument_node="">Frequently Asked Questions</span></h3><span data-dcnode-id="1608" instrument_node=""> </span><span data-dcnode-id="1606" instrument_node=""> </span></div><span data-dcnode-id="1603" instrument_node=""> </span></div></div></div></div></div><div class="RowModule RowModule--flex padding-bottom-xxl padding-top-s" data-dcnode-id="1315"><div class="container" data-dcnode-id="1316"><div class="row" data-dcnode-id="1317"><div class="col-md-6 row-align-items--align-top" data-dcnode-id="1465"><div class="AccordionList AccordionList--row-1" data-dcnode-id="1466" id="a96b4f39-75da-43cb-acb1-5d852997702d"><div class="container" data-dcnode-id="1467"><div class="row" data-dcnode-id="1468"><div class="col-md-12" data-dcnode-id="1469"><div class="accordion-content-wrapper" data-dcnode-id="1470"><div class="accordion accordion-content-grid" data-dcnode-id="1471" role="tablist"><div class="accordion-content-item" data-dcnode-id="1569"><div class="card accordion-inner AccordionList__item" data-dcnode-id="1570"><div class="card-header AccordionList__header" data-dcnode-id="1585" role="tab"><div aria-controls="15b93f6b-7eab-4eaf-ac6a-eb61be9f38cd" aria-expanded="false" class="AccordionList__title-wrapper collapsed" data-dcnode-id="1586" role="button" style="overflow-anchor: none;" tabindex="0"><span class="AccordionList__title" data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">With hundreds of solutions in the marketplace, how does Delos decide upon the best air purification solutions?</span></span><span data-dcnode-id="1592" instrument_node=""> </span><span class="collapse-sign collapse-plus" data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">+</span></span><span data-dcnode-id="1589" instrument_node=""> </span><span class="collapse-sign collapse-minus" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">-</span></span></div></div><span data-dcnode-id="1584" instrument_node=""> </span><div class="collapse" data-dcnode-id="1573" id="15b93f6b-7eab-4eaf-ac6a-eb61be9f38cd" role="tabpanel" style="display: none;"><div class="AccordionList__body" data-dcnode-id="1576"><p data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Anchored by Delos Labs, we conduct scientific research to better understand the fundamental impact of indoor environments on human health &amp; well-being. Based on scientific research and industry standards and best practices, we create product technology position documents, which include the pros and cons of the air purification technology, specifications on efficiency, durability and other parameters. Based on this information, we develop proprietary product review criteria, which include four key components: material safety, functionality and performance, marketing claims and user experience. We use our product review criteria as our guide when reviewing and evaluating air purification solutions, selecting those that most closely meet our rigorous requirements.</span></p><p data-dcnode-id="1577"><span data-dcnode-id="1581" instrument_node="">We can help customers choose products that best fit their needs, and evaluate product safety concerns based on different use cases. Learn more about </span><a data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//delos.com/resources/blog/interview-with-the-experts-evaluating-products-with-health-in-mind"><span data-dcnode-id="1580" instrument_node="">Delos’ product review process</span></a><span data-dcnode-id="1578" instrument_node=""> and what experts at Delos Labs’ look for when selecting products that are healthy, safe, effective and easy to use.</span></p></div><span data-dcnode-id="1575" instrument_node=""> </span></div></div></div><div class="accordion-content-item" data-dcnode-id="1544"><div class="card accordion-inner AccordionList__item" data-dcnode-id="1545"><div class="card-header AccordionList__header" data-dcnode-id="1557" role="tab"><div aria-controls="50cecf19-d892-48fd-a0fd-f67f43b3c0bb" aria-expanded="false" class="AccordionList__title-wrapper collapsed" data-dcnode-id="1558" role="button" style="overflow-anchor: none;" tabindex="0"><span class="AccordionList__title" data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Why should I choose Delos Advanced Air Purification solutions?</span></span><span data-dcnode-id="1564" instrument_node=""> </span><span class="collapse-sign collapse-plus" data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">+</span></span><span data-dcnode-id="1561" instrument_node=""> </span><span class="collapse-sign collapse-minus" data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">-</span></span></div></div><span data-dcnode-id="1556" instrument_node=""> </span><div class="collapse" data-dcnode-id="1548" id="50cecf19-d892-48fd-a0fd-f67f43b3c0bb" role="tabpanel" style="display: none;"><div class="AccordionList__body" data-dcnode-id="1551"><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Delos Advanced Air Purification solutions remove ultrafine particles you can’t see, such as dust, dust mites, pet dander, pollen and more. Delos Advanced Air Purification solutions also remove particles that carry microorganisms like fungi, viruses, bacteria and mold spores – known to be associated with a variety of short-term symptoms as well as long-term health effects.</span></p><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">In addition to efficient air purification, the electrically charged mechanical filter in Delos’ standalone advanced air purification devices creates a bacteriostatic environment within the device. This means that microorganisms are unable to multiply inside the filter, which helps to prolong filter life. Furthermore, the Delos’ standalone advanced air purification devices meet the stringent UL 2998 certification for zero ozone emissions (≤5 ppb), and have also been certified according to the requirements set by the California Air Resources Board (CARB) for minimum ozone emissions (≤50 ppb).</span></p></div><span data-dcnode-id="1550" instrument_node=""> </span></div></div></div><div class="accordion-content-item" data-dcnode-id="1518"><div class="card accordion-inner AccordionList__item" data-dcnode-id="1519"><div class="card-header AccordionList__header" data-dcnode-id="1532" role="tab"><div aria-controls="873673c0-7a56-4b74-85f2-0753ba007519" aria-expanded="false" class="AccordionList__title-wrapper collapsed" data-dcnode-id="1533" role="button" style="overflow-anchor: none;" tabindex="0"><span class="AccordionList__title" data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">How is Delos Advanced Air Purification different from HEPA filtration?</span></span><span data-dcnode-id="1539" instrument_node=""> </span><span class="collapse-sign collapse-plus" data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">+</span></span><span data-dcnode-id="1536" instrument_node=""> </span><span class="collapse-sign collapse-minus" data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">-</span></span></div></div><span data-dcnode-id="1531" instrument_node=""> </span><div class="collapse" data-dcnode-id="1522" id="873673c0-7a56-4b74-85f2-0753ba007519" role="tabpanel" style="display: none;"><div class="AccordionList__body" data-dcnode-id="1525"><p data-dcnode-id="1526"><span data-dcnode-id="1530" instrument_node="">Delos Advanced Air Purification utilizes Disinfection Filtration System (DFS) technology, which combines electrical charging processes with the means of mechanical capture to enhance particle capture efficiency. It works by forcing particles to agglomerate (group with one another), creating larger particles which the mechanical filter in the device may more easily capture. The mechanical filter has a charge that is opposite that of the agglomerated particles, forcing the particles to become attracted to, and subsequently captured by, the mechanical filter. Delos Advanced Air Purification solutions that utilize DFS are capable of removing 99.99% of all airborne particles down to 0.007 µm in size.</span><a data-dcnode-id="1528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//delos.com/disclaimers"><span data-dcnode-id="1529" instrument_node="">*</span></a><span data-dcnode-id="1527" instrument_node=""> True HEPA filters, on the other hand, only capture 99.97% of airborne particles that are 0.3 µm in size. Each Delos Advanced Air Purification unit is individually tested by the manufacturer to ensure superior performance.</span></p></div><span data-dcnode-id="1524" instrument_node=""> </span></div></div></div><div class="accordion-content-item" data-dcnode-id="1495"><div class="card accordion-inner AccordionList__item" data-dcnode-id="1496"><div class="card-header AccordionList__header" data-dcnode-id="1506" role="tab"><div aria-controls="ed8fa644-de44-4e43-bb40-e9b3c99a8f0f" aria-expanded="false" class="AccordionList__title-wrapper collapsed" data-dcnode-id="1507" role="button" style="overflow-anchor: none;" tabindex="0"><span class="AccordionList__title" data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Are Delos Advanced Air Purification solutions effective against SARS-CoV-2 (the virus that causes Covid-19)?</span></span><span data-dcnode-id="1513" instrument_node=""> </span><span class="collapse-sign collapse-plus" data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">+</span></span><span data-dcnode-id="1510" instrument_node=""> </span><span class="collapse-sign collapse-minus" data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">-</span></span></div></div><span data-dcnode-id="1505" instrument_node=""> </span><div class="collapse" data-dcnode-id="1499" id="ed8fa644-de44-4e43-bb40-e9b3c99a8f0f" role="tabpanel" style="display: none;"><div class="AccordionList__body" data-dcnode-id="1502"><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Viruses and bacteria, which have become a more central focus due to the Covid-19 pandemic, are bioaerosols, a type of particulate matter. Delos Advanced Air Purification solutions utilize technology that has been independently tested to show that it is capable of capturing particles as small as 0.007 microns at 99.99% efficiency. For context, the virus causing Covid-19 (SARS-CoV-2) and other enveloped viruses range in size from 0.06 to 0.14 microns.</span></p></div><span data-dcnode-id="1501" instrument_node=""> </span></div></div></div><div class="accordion-content-item" data-dcnode-id="1472"><div class="card accordion-inner AccordionList__item" data-dcnode-id="1473"><div class="card-header AccordionList__header" data-dcnode-id="1483" role="tab"><div aria-controls="a9c85436-41c2-4c91-a184-709a206e01f6" aria-expanded="false" class="AccordionList__title-wrapper collapsed" data-dcnode-id="1484" role="button" style="overflow-anchor: none;" tabindex="0"><span class="AccordionList__title" data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Where should I place the Delos Advanced Air Purification unit(s)?</span></span><span data-dcnode-id="1490" instrument_node=""> </span><span class="collapse-sign collapse-plus" data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">+</span></span><span data-dcnode-id="1487" instrument_node=""> </span><span class="collapse-sign collapse-minus" data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">-</span></span></div></div><span data-dcnode-id="1482" instrument_node=""> </span><div class="collapse" data-dcnode-id="1476" id="a9c85436-41c2-4c91-a184-709a206e01f6" role="tabpanel" style="display: none;"><div class="AccordionList__body" data-dcnode-id="1479"><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">We recommend placing the Delos Advanced Air Purification unit(s) in areas where people spend most of their time.</span></p></div><span data-dcnode-id="1478" instrument_node=""> </span></div></div></div></div></div></div></div></div></div></div><div class="col-md-6 row-align-items--align-top" data-dcnode-id="1318"><div class="AccordionList AccordionList--row-1" data-dcnode-id="1319" id="7c26ba0f-c605-4d0f-845d-83460cea20e4"><div class="container" data-dcnode-id="1320"><div class="row" data-dcnode-id="1321"><div class="col-md-12" data-dcnode-id="1322"><div class="accordion-content-wrapper" data-dcnode-id="1323"><div class="accordion accordion-content-grid" data-dcnode-id="1324" role="tablist"><div class="accordion-content-item" data-dcnode-id="1441"><div class="card accordion-inner AccordionList__item" data-dcnode-id="1442"><div class="card-header AccordionList__header" data-dcnode-id="1453" role="tab"><div aria-controls="fa5caad4-156d-4510-ae77-d894591b8aa7" aria-expanded="false" class="AccordionList__title-wrapper collapsed" data-dcnode-id="1454" role="button" style="overflow-anchor: none;" tabindex="0"><span class="AccordionList__title" data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Do Delos Advanced Air Purification solutions require maintenance?</span></span><span data-dcnode-id="1460" instrument_node=""> </span><span class="collapse-sign collapse-plus" data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">+</span></span><span data-dcnode-id="1457" instrument_node=""> </span><span class="collapse-sign collapse-minus" data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">-</span></span></div></div><span data-dcnode-id="1452" instrument_node=""> </span><div class="collapse" data-dcnode-id="1445" id="fa5caad4-156d-4510-ae77-d894591b8aa7" role="tabpanel" style="display: none;"><div class="AccordionList__body" data-dcnode-id="1448"><p data-dcnode-id="1449"><span data-dcnode-id="1451" instrument_node="">Each Delos Advanced Air Purification unit requires routine care and maintenance to keep it performing at a high level. For more information on how to care for your unit, please contact us at </span><span data-dcnode-id="1450" instrument_node="">info@delos.com.</span></p></div><span data-dcnode-id="1447" instrument_node=""> </span></div></div></div><div class="accordion-content-item" data-dcnode-id="1417"><div class="card accordion-inner AccordionList__item" data-dcnode-id="1418"><div class="card-header AccordionList__header" data-dcnode-id="1429" role="tab"><div aria-controls="3a5af096-338a-42e2-a759-6e5d28bf2210" aria-expanded="false" class="AccordionList__title-wrapper collapsed" data-dcnode-id="1430" role="button" style="overflow-anchor: none;" tabindex="0"><span class="AccordionList__title" data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">How often do I need to change the filters?</span></span><span data-dcnode-id="1436" instrument_node=""> </span><span class="collapse-sign collapse-plus" data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">+</span></span><span data-dcnode-id="1433" instrument_node=""> </span><span class="collapse-sign collapse-minus" data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">-</span></span></div></div><span data-dcnode-id="1428" instrument_node=""> </span><div class="collapse" data-dcnode-id="1421" id="3a5af096-338a-42e2-a759-6e5d28bf2210" role="tabpanel" style="display: none;"><div class="AccordionList__body" data-dcnode-id="1424"><p data-dcnode-id="1425"><span data-dcnode-id="1427" instrument_node="">Filter replacement varies based on the unit(s) you own and daily usage, as well as ambient pollution levels. For more information on how often you should change your filters, please contact us at </span><span data-dcnode-id="1426" instrument_node="">info@delos.com.</span></p></div><span data-dcnode-id="1423" instrument_node=""> </span></div></div></div><div class="accordion-content-item" data-dcnode-id="1384"><div class="card accordion-inner AccordionList__item" data-dcnode-id="1385"><div class="card-header AccordionList__header" data-dcnode-id="1405" role="tab"><div aria-controls="e966b384-fd58-4656-8899-6199839b3dca" aria-expanded="false" class="AccordionList__title-wrapper collapsed" data-dcnode-id="1406" role="button" style="overflow-anchor: none;" tabindex="0"><span class="AccordionList__title" data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Can ESSER funds be used to purchase school air purifiers?</span></span><span data-dcnode-id="1412" instrument_node=""> </span><span class="collapse-sign collapse-plus" data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">+</span></span><span data-dcnode-id="1409" instrument_node=""> </span><span class="collapse-sign collapse-minus" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">-</span></span></div></div><span data-dcnode-id="1404" instrument_node=""> </span><div class="collapse" data-dcnode-id="1388" id="e966b384-fd58-4656-8899-6199839b3dca" role="tabpanel" style="display: none;"><div class="AccordionList__body" data-dcnode-id="1391"><p data-dcnode-id="1400"><b data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Yes.</span></b><span data-dcnode-id="1401" instrument_node=""> ESSER funding can be used to purchase air purification technologies, such as portable air purifiers, to provide better indoor air quality in your district or school.</span></p><p data-dcnode-id="1392"><span data-dcnode-id="1399" instrument_node="">All Delos Advanced Air Purification solutions (including filter replacements) available on </span><a data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop.delos.com/"><span data-dcnode-id="1398" instrument_node="">Delos Shop</span></a><span data-dcnode-id="1396" instrument_node=""> qualify for ESSER funding. For volume discounts, reach out to </span><a data-dcnode-id="1394" href="#contact-us"><span data-dcnode-id="1395" instrument_node="">one of our Air Quality Specialists</span></a><span data-dcnode-id="1393" instrument_node="">.</span></p></div><span data-dcnode-id="1390" instrument_node=""> </span></div></div></div><div class="accordion-content-item" data-dcnode-id="1348"><div class="card accordion-inner AccordionList__item" data-dcnode-id="1349"><div class="card-header AccordionList__header" data-dcnode-id="1372" role="tab"><div aria-controls="79ec20d8-a5d1-429f-bb37-3499d4c00cd1" aria-expanded="false" class="AccordionList__title-wrapper collapsed" data-dcnode-id="1373" role="button" style="overflow-anchor: none;" tabindex="0"><span class="AccordionList__title" data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">What is the deadline to place an order for air purifiers with Delos when using ESSER funds?</span></span><span data-dcnode-id="1379" instrument_node=""> </span><span class="collapse-sign collapse-plus" data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">+</span></span><span data-dcnode-id="1376" instrument_node=""> </span><span class="collapse-sign collapse-minus" data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">-</span></span></div></div><span data-dcnode-id="1371" instrument_node=""> </span><div class="collapse" data-dcnode-id="1352" id="79ec20d8-a5d1-429f-bb37-3499d4c00cd1" role="tabpanel" style="display: none;"><div class="AccordionList__body" data-dcnode-id="1355"><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">The ESSER Fund has three funding streams. For each stream, districts must obligate funds by finalizing awards to contractual partners (such as Delos) within one year of receiving them from the U.S. Department of Education.</span></p><p data-dcnode-id="1358"><span data-dcnode-id="1368" instrument_node="">For ESSER I: funds must be obligated by </span><b data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">9/30/2022</span></b><span data-dcnode-id="1365" instrument_node="">.
For ESSER II: funds must be obligated by </span><b data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">9/30/2023</span></b><span data-dcnode-id="1362" instrument_node="">.
For ESSER III: funds must be obligated by </span><b data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">9/30/2024</span></b><span data-dcnode-id="1359" instrument_node="">.</span></p><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Don’t wait until it’s too late to use your federal funding to help make your school healthier!</span></p></div><span data-dcnode-id="1354" instrument_node=""> </span></div></div></div><div class="accordion-content-item" data-dcnode-id="1325"><div class="card accordion-inner AccordionList__item" data-dcnode-id="1326"><div class="card-header AccordionList__header" data-dcnode-id="1336" role="tab"><div aria-controls="07756992-d716-4289-923e-26e58581f132" aria-expanded="false" class="AccordionList__title-wrapper collapsed" data-dcnode-id="1337" role="button" style="overflow-anchor: none;" tabindex="0"><span class="AccordionList__title" data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">How can I place an order for air purifiers with Delos when using ESSER funds?</span></span><span data-dcnode-id="1343" instrument_node=""> </span><span class="collapse-sign collapse-plus" data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">+</span></span><span data-dcnode-id="1340" instrument_node=""> </span><span class="collapse-sign collapse-minus" data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">-</span></span></div></div><span data-dcnode-id="1335" instrument_node=""> </span><div class="collapse" data-dcnode-id="1329" id="07756992-d716-4289-923e-26e58581f132" role="tabpanel" style="display: none;"><div class="AccordionList__body" data-dcnode-id="1332"><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Every case can be a little different but Delos will work with your school and local educational agencies (LEAs) to help meet all necessary requirements in the most efficient way possible. Additionally, Delos can work with your school to address custom needs, including but not limited to procuring air purification units through established distributors in the education sector, and signing up to be an approved vendor through your school’s vendor portal.</span></p></div><span data-dcnode-id="1331" instrument_node=""> </span></div></div></div></div></div></div></div></div></div></div></div></div></div><div class="RichText pt-4 pb-5 smallText d-none" data-dcnode-id="1301" id="abfd3219-f680-4816-b439-8ae68de78154"><div class="container" data-dcnode-id="1302"><div class="row" data-dcnode-id="1303"><div class="col-md-12" data-dcnode-id="1304"><span data-dcnode-id="1313" instrument_node=""> </span><span data-dcnode-id="1311" instrument_node=""> </span><div class="RichText__body" data-dcnode-id="1307"><p data-dcnode-id="1308"><i data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">*Square footage calculations are based on device CFM rates, 8 foot ceilings and a minimum of 2 air exchanges per hour</span></i></p></div><span data-dcnode-id="1306" instrument_node=""> </span></div></div></div></div><div class="ColumnText ColumnText--title-top padding-top-xxl padding-bottom-xxl bg-greyGhost" data-dcnode-id="1269" data-v-7c54a31b="" id="92ee7b7a-a233-498f-8e20-e06a8e9b44c0"><div class="container" data-dcnode-id="1270" data-v-7c54a31b=""><div class="row" data-dcnode-id="1271" data-v-7c54a31b=""><div class="col-md-12 variation-width-width-50" data-dcnode-id="1272" data-v-7c54a31b=""><div class="contents-wrapper" data-dcnode-id="1273" data-v-7c54a31b=""><div class="title-wrapper" data-dcnode-id="1292" data-v-7c54a31b=""><span data-dcnode-id="1299" instrument_node=""> </span><h2 class="title-inner ColumnText__title" data-dcnode-id="1297" data-v-7c54a31b=""><span data-dcnode-id="1298" instrument_node="">Take Wellness Anywhere
