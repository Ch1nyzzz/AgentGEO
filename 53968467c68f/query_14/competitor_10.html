</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">When it comes to your home and family, only the best will do. Indoor air quality plays a very important role in our overall health, especially considering the fact that we each typically spend at least ⅓ of each day at home.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Indoor air quality is surprisingly poor. Have you ever looked at the light coming through your blinds only to see countless dust particles and other allergens floating around? </span></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1528" instrument_node="">If you think that’s bad, we’re sorry to say that the reality is actually much worse because — believe it or not — over 800,000 allergens and particles can fit in a space as small as 1 square inch. But most of that is invisible to the naked eye. For example, viruses are as small as 0.02–0.4 microns, which is 25–500x smaller than a pollen particle. </span><a data-dcnode-id="1526" data-target="#airPurifiersModal" data-toggle="modal" href="#"><span data-dcnode-id="1527" instrument_node="">How effective are our air purifiers against viruses? ›</span></a></p><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">But there is good news. We have two commercial and medical grade air purifiers that have been specifically designed to capture allergens and particles with unbeatable efficiency.</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">When we started Oransi more than 10 years ago, we had a decision to make: did we want to create the same sort of cheap air purifiers you find all over the internet to make a quick buck, or did we want to source only the highest quality materials, seek out the best engineers, and value air purifying ability above all else while making our effectiveness ratings and lab studies available to the public?</span></p><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">We decided to go with the second option. The result is three amazing HEPA air purifiers to choose from:</span></p><span data-dcnode-id="1515" instrument_node="">

</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">In a commercial or industrial setting, the safety of those who visit your premises is paramount. Ensuring the health of your, your employees and your clients should be a factor constantly top-of-mind. Oransi’s specialized range of commercial air purifiers has been developed specifically for commercial and industrial applications, such as smoke and gas removal, fume extraction, antibacterial and air disinfection, odor elimination, and much more. Some key benefits of using commercial air purifier are:</span></p><span data-dcnode-id="849" instrument_node="">

</span><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Extract harmful gasses and particles - harmful pollutants in the air such as chemical fumes, gases, and particulates can be drawn into commercial premises due to day-to-day activities as part of your business operations or the environment which you operate in. Urban areas can be subject to noxious levels of chemical particles such as carbon monoxide, ozone, sulfur dioxide, nitrogen dioxide, and diesel exhaust particles.</span></li><span data-dcnode-id="836" instrument_node="">

</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Any business with concerns about the quality of their air and the presence of air pollutants (odors, allergens and other fine particles, smoke and gases) can benefit from an Oransi commercial air purifier.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Oransi commercial air purifiers have become the preferred choice of air purifier for the offices, meeting spaces, and business centers of many of the world’s top brands. In addition to our vast network for corporate customers, we regularly partner with organizations of all sizes to consult with them on their commercial air purifier needs, such as:</span></p><span data-dcnode-id="792" instrument_node="">
</span><ul data-dcnode-id="766"><span data-dcnode-id="791" instrument_node="">
</span><li data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Medical centres, hospitals, assisted living facilities, and other healthcare providers,</span></li><span data-dcnode-id="788" instrument_node="">
</span><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Local/State/Federal Government Departments and Agencies,</span></li><span data-dcnode-id="785" instrument_node="">
</span><li data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Gyms, Dance Studios, and other Fitness Centers,</span></li><span data-dcnode-id="782" instrument_node="">
</span><li data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Bars, clubs and other entertainment venues,</span></li><span data-dcnode-id="779" instrument_node="">
</span><li data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Hotels, resorts, serviced apartments and other accommodation venues,</span></li><span data-dcnode-id="776" instrument_node="">
</span><li data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Restaurants, cafes and other eateries,</span></li><span data-dcnode-id="773" instrument_node="">
</span><li data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Schools, colleges and universities,</span></li><span data-dcnode-id="770" instrument_node="">
</span><li data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">...and many more.</span></li><span data-dcnode-id="767" instrument_node="">
</span></ul><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">We are proud to be able to provide clean air to the many renowned organizations who use Oransi commercial air purifiers every single day for the well-being of their people and their customers.</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="761" instrument_node="">Visit our “</span><a data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oransi.com/pages/who-uses-oransi-air-purifiers"><span data-dcnode-id="760" instrument_node="">Who Uses Oransi Air Purifiers</span></a><span data-dcnode-id="758" instrument_node="">?” page to discover the wide range of organizations we work with.</span></p><span data-dcnode-id="756" instrument_node="">
</span><h3 class="font-weight-normal my-4" data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">What is The Difference Between A Regular Air Purifier And A Hospital Grade Air Purifier?</span></h3><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="752" instrument_node="">The main difference between a regular air purifier and a hospital-grade air purifier is the filtration efficiency and effectiveness of the filter within the air purifier. The </span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minimum_Efficiency_Reporting_Value"><span data-dcnode-id="751" instrument_node="">Minimum Efficiency Reporting Value</span></a><span data-dcnode-id="749" instrument_node=""> (</span><strong data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">MERV</span></strong><span data-dcnode-id="746" instrument_node="">) rating. These ratings are used to rate a filter's ability to remove particles from 10 to 0.3 micrometer in size from the air as it passes through the filtration system.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Many standards, lower-grade air purifiers use a foam pre-filter and those fall in the MERV 1-4 range and are the lowest-performing filters. Filters and air purifiers with a higher MERV rating not only remove more particles from the air but smaller particles as well.</span></p><span data-dcnode-id="741" instrument_node="">
</span><h3 class="font-weight-normal my-4" data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">What Makes Our Purifiers The Best For Medical Grade Air Filtration?</span></h3><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Through our years of experience and investment into R&amp;D, we know an air purifier is only as good as the filter within. As such, we developed a range of Commercial Medical Grade Commercial &amp; Industrial Air Purifiers specifically engineered and rigorously tested for the US market. As a higher performance pre-filter will further improve the quality of the air, we recommend a MERV 6 to MERV 8 rated pre-filter to balance the filtration capabilities with less airflow resistance. Every air purifier offered from Oransi has an overall MERV rating of 16-18. </span></p><span data-dcnode-id="735" instrument_node="">
</span><h3 class="font-weight-normal my-4" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">How Do Our Commercial Air Purifiers Ensure Utmost Safety?</span></h3><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">We never compromise on quality or performance. Our commercial air purifiers were designed for people with sensitive systems like COPD or asthma. In order to create the best air purifiers and ensure the utmost safety of our customers, we thoroughly test the performance of our commercial filters in world-class labs against stringent American standards and hold a multitude of certifications giving you assurance of their compliance with American regulations. We engineer all our commercial air purifiers with safety, easy to use, Reliability and Quality all front-of-mind.</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">The Oransi EJ air purifier housing, filter media and electronics are all made in the USA. This range uses mechanical filtration only and does not feature an ionizer or anything that could potentially create ozone.</span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="725" instrument_node="">The primary </span><a data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nafahq.org/the-importance-of-air-filtration/"><span data-dcnode-id="724" instrument_node="">air filtration</span></a><span data-dcnode-id="722" instrument_node=""> for the Finn and Max air purifiers is HEPA. They have a low level (1 watt or less) negative ionizer which can be turned off with the simple touch of a button.</span></p><span data-dcnode-id="720" instrument_node="">
</span></div><span data-dcnode-id="718" instrument_node="">
</span></div><span data-dcnode-id="716" instrument_node="">

</span><h3 class="mb-3 text-black" data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">How Effective Are Our Air Purifiers Against Viruses?</span></h3><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="700"><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">What Size are Viruses and Bacteria?</span></strong></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Virus particles range in size from 0.02 to 0.4 microns (that’s at least 25–500x smaller than a pollen particle). Most bacterial cells range in size from 0.2 to 10 microns. Common E.coli and rod-shaped bacteria are generally 1 micron by 2 microns.</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="693"><strong data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">For viruses how well do your air filters work from 0.02 to 0.4 microns?</span></strong></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Testing standards are set at the 0.3 micron size so testing data is not readily available for the smaller sizes for most, if not all other air purifiers.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="688" instrument_node="">However, </span><strong data-dcnode-id="685"><i data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">we </span></i></strong><span data-dcnode-id="684" instrument_node="">sent our EJ120 HEPA filters to one of the few test labs that will test the performance against nano-sized particles.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">The lab report showed the performance for nano-sized particles for our filter. At 0.03 microns the removal was 97.34%, at 0.04 microns 97.07% removal, at 0.06 microns 98% removal, at 0.10 microns 98.79%.
</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">
It’s no wonder that the EJ120 was selected by the temporary medical station in the Javits Center in New York City for COVID-19 patients.</span></p><span data-dcnode-id="676" instrument_node="">
