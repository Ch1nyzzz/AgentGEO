</span><div class="pre-content" data-dcnode-id="867"><div data-dcnode-id="868"><div class="bk_prnt" data-dcnode-id="913"><p class="small" data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">NCBI Bookshelf. A service of the National Library of Medicine, National Institutes of Health.</span></p><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">National Research Council (US) Committee on Indoor Pollutants. Indoor Pollutants. Washington (DC): National Academies Press (US); 1981. </span></p></div><div class="iconblock clearfix whole_rhythm no_top_margin bk_noprnt" data-dcnode-id="869"><a class="img_link icnblk_img" data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/" title="Table of Contents Page"><img alt="Cover of Indoor Pollutants" class="source-thumb" data-dcnode-id="912" height="100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/corehtml/pmc/pmcgifs/bookshelf/thumbs/th-nap1711-lrg.png&amp;raw" width="80px"></a><div class="icnblk_cntnt eight_col" data-dcnode-id="876"><h2 data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Indoor Pollutants.</span></h2><a aria-expanded="false" class="ui-widget ui-ncbitoggler" data-dcnode-id="905" data-jig="ncbitoggler" href="#__NBK234047_dtls__" id="ui-ncbitoggler-5" role="button"><span class="ui-ncbitoggler-master-text" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Show details</span></span><span class="ui-icon ui-icon-triangle-1-e" data-dcnode-id="906"></span></a><div aria-live="assertive" class="ui-helper-reset" data-dcnode-id="896"><div aria-hidden="true" class="ui-widget ui-ncbitoggler ui-ncbitoggler-slave" data-dcnode-id="897" id="__NBK234047_dtls__" style="display:none"><div data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">National Research Council (US) Committee on Indoor Pollutants.</span></div><div data-dcnode-id="898"><span data-dcnode-id="902" instrument_node="">Washington (DC): </span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nap.edu/" ref="pagearea=page-banner&amp;targetsite=external&amp;targetcat=link&amp;targettype=publisher"><span data-dcnode-id="901" instrument_node="">National Academies Press (US)</span></a><span data-dcnode-id="899" instrument_node="">; 1981.</span></div></div></div><div class="half_rhythm" data-dcnode-id="888"><ul class="inline_list" data-dcnode-id="889"><li data-dcnode-id="893" style="margin-right:1em"><a aria-expanded="false" aria-haspopup="true" class="bk_cntns" data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/" role="button"><span data-dcnode-id="895" instrument_node="">Contents</span></a></li><li data-dcnode-id="890" style="margin-left:1em"><a data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nap.edu/catalog.php%3Frecord_id%3D1711" ref="pagearea=body&amp;targetsite=external&amp;targetcat=link&amp;targettype=publisher"><span data-dcnode-id="892" instrument_node="">Hardcopy Version at National Academies Press</span></a></li></ul></div><div class="bk_noprnt" data-dcnode-id="877"><form action="/books/n/nap1711/" data-dcnode-id="878" id="bk_srch" method="get"><div class="bk_search" data-dcnode-id="879"><label class="offscreen_noflow" data-dcnode-id="886" for="bk_term"><span data-dcnode-id="887" instrument_node="">Search term</span></label><div class="jig-ncbiclearbutton-wrap ui-ncbiclearbutton-wrap" data-dcnode-id="882"><input data-dcnode-id="885" data-jig="ncbiclearbutton" id="bk_term" name="term" title="Search this book" type="text" value=""><a class="reset" data-dcnode-id="883" href="#" style="visibility: hidden;"><img alt="Clear input" data-dcnode-id="884" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/core/jig/1.15.2/img/clear.png&amp;raw"></a></div><span data-dcnode-id="881" instrument_node=""> </span><input class="jig-ncbibutton ui-corner-all ui-ncbibutton ui-ncbibutton-gray" data-dcnode-id="880" id="ui-ncbibutton-4" role="button" style="padding: 0.1em 0.4em;" submit="false" type="submit" value="Search this book"></div></form></div></div><div class="icnblk_cntnt two_col" data-dcnode-id="870"><div class="pagination bk_noprnt" data-dcnode-id="871"><a class="active page_link prev" data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00007/" title="Previous page in this title"><span data-dcnode-id="875" instrument_node="">&lt; Prev</span></a><a class="active page_link next" data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00023/" title="Next page in this title"><span data-dcnode-id="873" instrument_node="">Next &gt;</span></a></div></div></div></div></div><span data-dcnode-id="866" instrument_node="">
</span><div class="main-content lit-style" data-dcnode-id="543" itemscope="itemscope" itemtype="http://schema.org/CreativeWork"><div class="meta-content fm-sec" data-dcnode-id="862"><h1 data-dcnode-id="863" id="_NBK234047_"><span class="title" data-dcnode-id="864" itemprop="name"><span data-dcnode-id="865" instrument_node="">EXECUTIVE SUMMARY</span></span></h1></div><div class="jig-ncbiinpagenav body-content whole_rhythm" data-dcnode-id="544" data-jigconfig="allHeadingLevels: ['h2'],smoothScroll: false" id="ui-ncbiinpagenav-6" itemprop="text"><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Many people spend large amounts of each day indoors—in many cases, 80–90%—in a house, an automobile, a waiting room, an office or other workplace, or a confined space accessible to the general public, such as a store or a restaurant. It has been shown that indoor exposure to environmental pollutants can be substantial. Although there is little epidemiologic evidence on the health effects of indoor pollutants, indoor concentrations of some pollutants that already have primary ambient-air quality standards exceed those standards. Indoor exposure has been largely overlooked in research on the health effects of environmental pollutants, but it can constitute an important fraction of the total exposure to many pollutants.</span></p><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Indoor pollution in residences, public building, and offices is created for the most part by the occupants' activities and their use of appliances, power equipment, and chemicals, by wear and tear and outgassing of some structural or decorative materials, by thermal factors, and by the intrusion of outdoor pollutants.</span></p><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">In some cases, the outdoor pollutants that penetrate to the indoors may represent the most important pollutant stress on human health and welfare, and such effects have been addressed at length in reports of previous National Research Council committees. This report is focused primarily on the indoor air contaminants that are liberated indoors. When they attain high concentrations, they may cause nuisances, irritation of sensitive tissues, illness, and death from acute as well as chronic exposures. Some pollutant sources—such as cigarette-smoking—have been recognized for a long time, but their importance has only recently been evaluated. Others arise from new products or from old products in new uses, such as building materials, pesticides, and insulation. A number of sources are of concern only in the indoor environment, e.g., cooking, use of consumer products, space-heating devices, and floor and wall coverings. The expanded use of wood and coal for residential space-heating, of home hobby and craft products, and of products that liberate organic substances is a potential contributor to the contamination of indoor environments. Infectious microbes and aallergenic agents can grow indoors or be transmitted into indoor environments.</span></p><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Ventilation alone (whether natural or forced) may not be sufficient to dilute indoor pollution to an acceptable point. Natural ventilation may be inappropriate because it is variable and generally not controllable in a precise way for many indoor settings. Exclusive dependence on forced ventilation is inappropriate because it is not universally available; moreover, introduction of untreated outdoor air may not always be desirable. Also, natural ventilation and forced ventilation may have substantial energy penalties, owing to heating and cooling losses. The adoption of energy-saving proposals to reduce ventilation rates could aggravate problems in indoor air quality, create new problems, and perhaps be generally detrimental to health and property, unless appropriate pollution-control measures are also taken.</span></p><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Public-health laws are broad enough to permit evaluation and, when required, control of indoor environments. The public expects a safe and healthful outdoor environment, and the same expectation applies to public indoor environments. The regulatory authority to control contaminant sources, to set or recommend building codes, and to support or conduct research on or monitoring of indoor contaminants rests with diverse federal, state, and local government units, but no specific government unit has been directly charged with the responsibility for protecting the quality of indoor environments.</span></p><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">For all the reasons stated above, the present quality of the indoor environment and how this quality may change are matters of immediate and great concern.</span></p><div data-dcnode-id="823" id="ddd00010"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="846"><span data-dcnode-id="847" role="menubar"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="848" href="#" role="menuitem" title="Go to other sections in this page"><span data-dcnode-id="849" instrument_node="">Go to:</span></a></span></div><h2 class="ui-helper-clearfix" data-dcnode-id="844" id="_ddd00010_"><span data-dcnode-id="845" instrument_node="">SCOPE OF THE REPORT</span></h2><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">This report was prepared, at the request of the Environmental Protection Agency (EPA), by the Committee on Indoor Pollutants, which was appointed by the National Research Council in the Board on Toxicology and Environmental Health Hazards, Assembly of Life Sciences. It is intended to characterize the quality of the indoor environment—primarily with respect to airborne pollutants, although others are discussed—and to determine the potential adverse health effects of indoor pollutants. The charge was to review, compile, and appraise the available knowledge. The Committee has also identified the research needed for abatement of indoor pollution. “Indoor” refers to the environments in homes, schools, public buildings, and similar spaces to which the public has access; industrial working environments, however, are excluded from consideration here.</span></p><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">It is beyond the scope of this report to list all the pollutants found indoors that are hazardous to human health. The examples given make it plain that humans are exposed to a variety of potentially hazardous indoor pollutants from diverse sources. It is hoped that this report will encourage researchers to broaden the list of hazardous indoor pollutants and to characterize the hazards, so that the general public and those responsible for pollution control and abatement can be informed.</span></p><p data-dcnode-id="835"><span data-dcnode-id="839" instrument_node="">Throughout this report, pollutants are mentioned without discussion of their health effects. This does not constitute an oversight on the part of the Committee, but rather reflects a decision that the discussion here be adequate to show that there are indoor pollutants that cause adverse health effects in humans. The reader's attention is directed to </span><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00063/"><span data-dcnode-id="838" instrument_node="">Chapter III</span></a><span data-dcnode-id="836" instrument_node="">, which offers some recommendations for further health research with respect to these pollutants, for further exposure studies, and for public education about effective ways of reducing exposure to many contaminants encountered indoors. The Committee on Indoor Pollutants and its contributors prepared concise reviews of such physical aspects as sources and concentrations and of such biologic aspects as the physiologic and toxicologic effects of a variety of contaminants encountered indoors. In addition, the effects of those contaminants that bear on human well-being in a more general way, such as soiling and corrosion, and the available means of controlling the presence of the contaminants are discussed in some detail. The report attempts to focus personal, corporate, and government attention on present and potential problems related to indoor contaminants.</span></p><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">The Committee notes that documentation of excessive indoor air pollution should not in itself be considered sufficient reason to relax standards for ambient air. The barriers between indoor air and outdoor air are not absolute, and ambient air contributes to indoor air. Furthermore, outdoor and indoor air pollutants may interact chemically and physiologically. The Committee recognizes the complexity of human exposures that have multiple sources. The development of effective and efficient strategies for mitigating hazardous contamination requires improved understanding of responses to exposure and of pollutant interactions.</span></p><p data-dcnode-id="828"><span data-dcnode-id="832" instrument_node="">The Committee has not attempted to set priorities for research on or regulation or control of indoor pollutants. Nor has it attempted to develop risk analyses for these pollutants. The order in which contaminants are presented in this report does </span><u data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">not</span></u><span data-dcnode-id="829" instrument_node=""> constitute a ranking of importance by the members of the Committee.</span></p><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">To set priorities for differentiating among indoor contaminants and to establish objectives for research and control programs, there must be a system for comparison. The dimensions of this system include the numbers of people exposed, the severity of exposures, and the consequences of the exposures. To be comprehensive, the system must also deal with ecologic and material damage, loss of productivity, degradation of artifacts, and other kinds of impact not related to health. Priorities could be derived from a ranking of these variables for pollutants of interest, but proper risk analysis would require measurement of exposures by population subgroups and weighting of exposure-response relationships by importance of outcome.</span></p><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">The Committee unanimously agreed that establishing firm priorities for research on indoor pollutants that ranks one contaminant as more important than another is premature. In most instances, we do not appreciate the extent of population exposures. Available reports on indoor air pollutants contain almost no data on the incidence of disease or even annoyance related to changes in pollutant concentrations. Nevertheless, the Committee has made judgments based on its interpretation of reported concentrations, of prevalence of sources, and of evidence of effects on health and welfare. The Committee offers guidance for research, development, and educational programs by specifying current gaps in information and scientific and engineering deficiencies. Priorities within these programs will have to depend on the extent of federal and private funding; the Committee believes that the determination of such priorities is urgent.</span></p></div><div data-dcnode-id="736" id="ddd00011"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="820"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="821" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="822" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="818" id="_ddd00011_"><span data-dcnode-id="819" instrument_node="">ORGANIZATION OF THE REPORT</span></h2><p data-dcnode-id="807"><span data-dcnode-id="817" instrument_node="">The introduction, summary and conclusions, and recommendations of the Committee are in Chapters </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00023/"><span data-dcnode-id="816" instrument_node="">I</span></a><span data-dcnode-id="814" instrument_node="">, </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00024/"><span data-dcnode-id="813" instrument_node="">II</span></a><span data-dcnode-id="811" instrument_node="">, and </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00063/"><span data-dcnode-id="810" instrument_node="">III</span></a><span data-dcnode-id="808" instrument_node="">, respectively. This material is based on both the body of the report and Committee deliberations. Some conclusions and recommendations were derived from consideration of the documented information in specific sections of the report and the substantiating discussions therein. Others, based on Committee consensus, were formulated from a more comprehensive perspective on the subject of indoor pollutants.</span></p><p data-dcnode-id="778"><span data-dcnode-id="806" instrument_node="">After the introduction, summary and conclusions, and recommendations in Chapters </span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00023/"><span data-dcnode-id="805" instrument_node="">I</span></a><span data-dcnode-id="803" instrument_node="">, </span><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00024/"><span data-dcnode-id="802" instrument_node="">II</span></a><span data-dcnode-id="800" instrument_node="">, and </span><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00063/"><span data-dcnode-id="799" instrument_node="">III</span></a><span data-dcnode-id="797" instrument_node="">, the treatment of indoor pollutants is presented in three primary chapters and three secondary chapters. The three primary chapters are </span><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00074/"><span data-dcnode-id="796" instrument_node="">Chapter IV</span></a><span data-dcnode-id="794" instrument_node="">, on the sources and characterization of indoor pollution; </span><a data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00221/"><span data-dcnode-id="793" instrument_node="">Chapter VII</span></a><span data-dcnode-id="791" instrument_node="">, on the health effects; and </span><a data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00334/"><span data-dcnode-id="790" instrument_node="">Chapter IX</span></a><span data-dcnode-id="788" instrument_node="">, on the control of indoor pollutants. They are the most voluminous chapters and respond most directly to the Committee's charge to review and appraise the available knowledge on indoor air pollution. The other chapters—</span><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00186/"><span data-dcnode-id="787" instrument_node="">Chapter V</span></a><span data-dcnode-id="785" instrument_node="">, on factors that influence indoor pollution; </span><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00199/"><span data-dcnode-id="784" instrument_node="">Chapter VI</span></a><span data-dcnode-id="782" instrument_node="">, on the measurement of indoor pollution and exposures; and </span><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00311/"><span data-dcnode-id="781" instrument_node="">Chapter VIII</span></a><span data-dcnode-id="779" instrument_node="">, on other non-health-related effects—offer important additional information. They elaborate on material presented in the primary chapters, and they introduce factual and conceptual material that the Committee feels essential for evaluating indoor pollution comprehensively.</span></p><p data-dcnode-id="771"><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00074/"><span data-dcnode-id="777" instrument_node="">Chapter IV</span></a><span data-dcnode-id="775" instrument_node="">, on the sources and characterization of indoor pollution, covers radon and its decay products, formaldehyde and other organic substances, asbestos and fibrous glass, combustion products, tobacco smoke, consumer products, odors, temperature and humidity, and other pollutants not specifically treated. The objective of the chapter, as of </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00221/"><span data-dcnode-id="774" instrument_node="">Chapter VII</span></a><span data-dcnode-id="772" instrument_node=""> (on health effects), is not a global treatment of every possible hazard encountered indoors, but rather a selective treatment. The chief criterion for selection is direct or circumstantial evidence that a contaminant causes or is reasonably likely to cause human stress, illness, or material damage indoors.</span></p><p data-dcnode-id="764"><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00186/"><span data-dcnode-id="770" instrument_node="">Chapter V</span></a><span data-dcnode-id="768" instrument_node="">, on factors that influence indoor pollution, expands on the physical characterization of indoor pollutions in </span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00074/"><span data-dcnode-id="767" instrument_node="">Chapter IV</span></a><span data-dcnode-id="765" instrument_node="">. Aspects of geography, building design, and human activity that lead to variations in ventilation rates and in the distribution of pollutant sources are presented.</span></p><p data-dcnode-id="760"><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00199/"><span data-dcnode-id="763" instrument_node="">Chapter VI</span></a><span data-dcnode-id="761" instrument_node="">, on the measurement and monitoring of indoor pollution and exposure, reviews the design and components of indoor and personal monitors, mathematical models for estimating indoor pollutant concentrations, and methods of estimating total personal exposure.</span></p><p data-dcnode-id="753"><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00221/"><span data-dcnode-id="759" instrument_node="">Chapter VII</span></a><span data-dcnode-id="757" instrument_node="">, on the health effects of indoor pollution, relates the current understanding of the toxicologic and physiologic effects of specific contaminants that are found at high enough concentrations and in a broad enough range of indoor environments to constitute an actual or reasonably likely challenge to the occupants of those environments. In some cases, as in </span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00074/"><span data-dcnode-id="756" instrument_node="">Chapter IV</span></a><span data-dcnode-id="754" instrument_node="">, the discussion is structured by source, such as involuntary smoking or indoor combustion products; the health effects may be attributable to specific components of a mixture of gases and particles, or it may be attributable to the general, mixed exposure. The chapter also considers indoor airborne contagion and allergens.</span></p><p data-dcnode-id="749"><a data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00311/"><span data-dcnode-id="752" instrument_node="">Chapter VIII</span></a><span data-dcnode-id="750" instrument_node="">, on the effects of indoor pollution on human welfare, covers a number of items related to comfort, productivity, and material protection in indoor environments.</span></p><p data-dcnode-id="745"><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00334/"><span data-dcnode-id="748" instrument_node="">Chapter IX</span></a><span data-dcnode-id="746" instrument_node="">, on the control of indoor pollution, emphasizes the engineering aspects of air-conditioning and indoor air-cleaning. Ventilation codes and standards are reviewed, and mechanical systems for conditioning and cleaning air are described. The chapter discusses strategies for controlling contaminants to maintain acceptable indoor air quality in general. Some pollutants, because of their sources or their physical and chemical properties, cannot be treated with conventional control systems, and strategies for controlling these pollutants are described specifically.</span></p><p data-dcnode-id="741"><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00359/"><span data-dcnode-id="744" instrument_node="">Appendix A</span></a><span data-dcnode-id="742" instrument_node=""> lists national primary ambient-air quality standards and occupational-health standards (for the industrial environment) established for the United States. In addition, it lists indoor-air pollution standards and guidelines of several foreign countries. Ventilation standards for dwellings are also listed. This appendix is not exhaustive with respect to relevant pollution or ventilation standards, but it does offer a point of reference for some of the more commonly used standards.</span></p><p data-dcnode-id="737"><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap1711/ddd00361/"><span data-dcnode-id="740" instrument_node="">Appendix B</span></a><span data-dcnode-id="738" instrument_node=""> presents an example of the interactions among energy conservation, comfort, and indoor air pollution in a residence. This simulation exercise illustrates the tradeoffs among energy-cost savings, retrofit costs, and thermal comfort under the constraints of maintaining various hypothetical conditions of indoor air quality in a particular kind of single-family residence.</span></p></div><div data-dcnode-id="689" id="ddd00012"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="733"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="734" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="735" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="731" id="_ddd00012_"><span data-dcnode-id="732" instrument_node="">PRINCIPAL FINDINGS ON SPECIFIC POLLUTANTS AND CLASSES OF POLLUTANTS</span></h2><div data-dcnode-id="726" id="ddd00013"><h3 data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">RADON</span></h3><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Radon and its alpha-emitting decay products contribute a major portion of the biologically significant dose associated with natural background radiation. Many natural substances contain radium, a precursor of radon gas. Soil, construction materials, and groundwater are the major sources of indoor radon. Indoor radon concentrations are often an order of magnitude greater than outdoor concentrations. The dose-response relationships for alpha-emitting radionuclides are not sufficiently well accepted to allow quantitation of the health risk associated with measured indoor concentrations, and surveys of radiation in homes are very limited. Expansion of the data base on the variation of indoor radon exposure with time and location is a necessary prerequisite for assignment of a health risk to indoor radon. In theory, techniques for controlling radon exposure are available; but they need development and evaluation before they can be applied economically on a large scale. The effectiveness of several contaminant control strategies, other than ventilation, has not been demonstrated in practice. Codes for new construction may be necessary to prevent the occurrence of high radon concentrations in modern or refurbished dwellings. In any event, prudent judgment concerning reduced ventilation in residences must be based on a better understanding of radiation exposures in present houses.</span></p></div><div data-dcnode-id="721" id="ddd00014"><h3 data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">FORMALDEHYDE</span></h3><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">The major indoor sources of formaldehyde have been identified. Aldehydes and other organic substances emanate from outgassing of urea-formaldehyde foam insulation, particleboard, plywood, fabrics, and, to a lesser extent, cigarettes and indoor combustion sources. The high surface-to-volume ratio of particleboard and plywood used as building materials in mobile homes, as well as lower air-exchange rates, causes the high measured formaldehyde concentrations. Formaldehyde can cause skin, eye, and throat irritation in occupants. Moreover, potential health problems associated with formaldehyde exposures are readily identified in acute cases when concentrations are high and tolerance is low. In addition to irritation, respiratory disorders and allergies have been associated with high formaldehyde concentrations. There is evidence of a decreased threshold of sensitivity with prolonged exposure. Recent studies have indicated that exposure of rats and mice to formaldehyde produces nasal cancer. Owing to the ubiquitous and increasing use of resins and solvents in building materials and furnishings, indoor formaldehyde concentrations have increased. Abatement technology is available, although at times expensive; new and less expensive techniques are being developed. The Committee is especially concerned with long-term and essentially continuous indoor exposures to low concentrations of formaldehyde.</span></p></div><div data-dcnode-id="714" id="ddd00015"><h3 data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">ASBESTOS AND OTHER FIBERS</span></h3><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">The health hazard posed by indoor exposure to asbetos has been perceived as a problem by virtue of the presence of asbestos fibers in insulating and decorative materials. Abrasion, mechanical vibration, or deliberate disruption of asbestos-containing surfaces can result in increased fiber concentrations in the indoor environment. There have been a small number of studies in which fiber counts have been documented in association with normal building use. Extrapolation from what we currently understand about the exposure-response relationships for asbestos fibers to the very low concentrations reported in indoor spaces, such as schools, suggests a small health risk under conditions of normal use. However, deliberate modification of surfaces to remove asbestos from buildings may create a risk of exposure of occupants and workers. Buildings in which asbestos exposure is likely to occur can be identified. The risk of exposure from dislodged fibers can be reduced by containment. The occurrence of mesothelioma (a specific form of cancer believed to result only from the inhalation of asbestos fibers) may provide a very sensitive indicator of the exposure of the general population. Home exposure to asbestos due to aging, cracking, or physical disruption of insulated pipes or asbestos-containing ceiling tiles and spackling compounds may be greater than public exposures in schools, which have received the most attention. Homes built before 1950 in northern climates are more likely to have pipes insulated with asbestos plaster. Given the very common use of asbestos in homes, schools, and other buildings, there is a need for further assessment to identify structures where actual asbestos exposure constitutes substantial risk to humans.</span></p><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">The extent of exposure of the general public to asbestos fibers has not been assessed; however, the occurrence of mesothelioma should be carefully monitored in the general population. Man-made fibers have produced skin irritation, but have not otherwise been demonstrated convincingly as hazardous to health. Epidemiologic and toxicologic investigation of synthetic fibers should continue. On the basis of present knowledge, synthetic fibers in the indoor environment should not cause undue concern.</span></p></div><div data-dcnode-id="709" id="ddd00016"><h3 data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">TOBACCO SMOKE</span></h3><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Virtually every member of our society is exposed to tobacco smoke: 33% of the population smokes, and the rest are exposed to the smoke released by others. The constituents of tobacco smoke are well documented as hazardous, the prevalence of population exposures is very high, and there is an increased incidence of respiratory tract symptoms and functional decrements in children residing in homes with smokers, compared with those in homes without smokers. These considerations and recent evidence of increased lung-cancer rates among nonsmoking women living with smoking husbands have led us to conclude that indoor exposure to tobacco smoke has adverse effects. Coughing, headache, nausea, and irritation of eyes, nose, and throat are among the reported symptoms. Although many studies have measured various components of tobacco smoke indoors, total exposure has not been determined. Passive exposure to tobacco smoke may constitute an important exposure to respirable particles, such gaseous compounds as acrolein and formaldehyde, benzo[a]pyrene, and various trace metals. Reduced ventilation increases concentrations of tobacco smoke. As an energy-conserving compromise, smoking could be restricted to zones that are well ventilated. Public policy should clearly articulate that involuntary exposure to tobacco smoke has adverse health effects and ought to be minimized or avoided where possible. Under this framework, the prohibition or restriction of smoking in public buildings, offices, etc., is a control option to be considered with ventilation and air-cleaning.</span></p></div><div data-dcnode-id="700" id="ddd00017"><h3 data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">INDOOR COMBUSTION</span></h3><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">When fuel combustion occurs indoors—e.g., for heating, cooking, and power machinery, including automobiles—it gives rise to increased concentrations of gases and particles. Unvented gas cooking is probably responsible for a large portion of nitrogen dioxide exposures in our population. In many homes, chronic exposures to nitrogen dioxide indoors may exceed established national ambient-air quality standards. Shorter-term 1-h average concentrations indoors often exceed the highest hourly concentrations measured outdoors. The concentrations of nitrogen dioxide and carbon monoxide in residences have not been fully documented. However, some studies have shown an association between gas cooking and the impairment of lung function in children. Gas cooking appliances are also sources of carbon monoxide, carbon dioxide, formaldehyde, hydrogen cyanide, sulfate particles, organic particulate matter, and organic vapors. The problem of chronic or even peak exposures to combustion products indoors will be accentuated with decreased ventilation and the increased use of portable space-heaters, wood- and coal-burning stoves, and indoor venting of gas dryers. Carbon monoxide, nitrogen oxides, and particles from automobile exhaust can produce increased concentration in office buildings and public areas. Concentrations exceeding 1-h carbon monoxide national ambient-air quality standards (NAAQS) by a factor of 2–4 have been reported in several ice-skating rinks that use gasoline-powered ice resurfacing machinery. Office buildings and apartment buildings with attached or underground garages can also have sustained high concentrations of carbon monoxide indoors. Because both carbon monoxide and nitrogen dioxide are odorless at typical concentrations, the presence of increased and possibly hazardous concentrations may go undetected.</span></p><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Although confirmation is necessary, the available evidence suggests that important population exposures to nitrogen dioxide and carbon monoxide can occur indoors and may constitute a sufficient threat to the general public health to justify remedial action. Reducing exposure to those gases is relatively straightforward. Source removal or direct venting of combustion sources should be considered.</span></p><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Efforts to conserve energy present other potential problems indoors. Effective energy-conservation measures can result in an overcapacity of existing heating equipment. Operation of such equipment at low load factors may decrease its overall combustion efficiency and increase emission of the products of combustion.</span></p></div><div data-dcnode-id="695" id="ddd00018"><h3 data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">MICROORGANISMS AND ALLERGENS</span></h3><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Microorganisms are present in the indoor environment and are associated with human activity and the presence of domestic animals. The microorganisms include bacteria, viruses, and fungi. Many microorganisms—such as spores, molds, and fungi—multiply in the presence of increased humidity. It is possible that reduced ventilation and the increased use of untreated recirculating air could increase the concentrations of microorganisms. Many of these microorganisms can produce infection, disease, or allergic reactions. Respiratory viruses and bacteria can be transmitted from person to person in buildings and confined spaces. Certainly, respiratory infections are an important cause of morbidity that results in lost earnings and discomfort. It is reasonable to assume that some of the incidence of respiratory disease results from airborne transmission, but it is not at all clear what effect ventilation, air-conditioning, or air-cleaning will have on incidence. If the main transmission is between persons in contact with or close to each other, the mechanism and efficiency of disease transfer will be relatively insensitive to ventilation rates and other operating conditions of the air handling systems. However, to the extent that infectious and aallergenic microorganisms remain viable and airborne, substantial reduction in ventilation rates will tend to increase concentrations and most likely the probability of infection and allergy.</span></p></div><div data-dcnode-id="690" id="ddd00019"><h3 data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">MOISTURE</span></h3><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Water vapor in confined spaces is a product of metabolic and respiratory processes, as well as of indoor combustion and evaporation from clothes and dish-washing and bathroom functions. Condensation of water indoors has been shown to increase corrosive effects of absorbed gases. Decreases in ventilation tend to increase the indoor relative humidity during the heating seasons. Excess water vapor adsorbs or condenses on drier or colder surfaces, and that gives rise to increased deterioration or corrosion of building materials, furnishings, decorations, artwork, and other artifacts. Increased relative humidity may also promote the growth of molds, algae, and fungi. Thus, humidity control may become an important component of reduced-ventilation strategies. Some energy penalty may result that should be considered in relation to the energy savings that may be obtained through reduced ventilation.</span></p></div></div><div data-dcnode-id="673" id="ddd00020"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="686"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="687" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="688" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="684" id="_ddd00020_"><span data-dcnode-id="685" instrument_node="">RESPONSIBILITIES</span></h2><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">The quality of the indoor environment is not the responsibility exclusively of any individual or government body. Even a single home built in isolation (away from outdoor sources of contaminants) has the potential to be contaminated by its occupants, soil, outgassing from piped-water use, building materials, cooking, space-heating, consumer products, pesticides, molds, and fungi. Responsibility for the indoor environment is on four levels: individuals; product manufacturers; building designers, contractors, and owners; and government.</span></p><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Most sources of contamination are associated with human activity. Individuals also exercise some control over contamination sources and ventilation. Hence, the individual can directly affect his or her own exposure, as well as the exposure of those with whom the indoor space is shared. This is also true, to a lesser extent, in the nonindustrial workplace and in public buildings.</span></p><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Building owners and operators are responsible for maintaining the indoor environment and ensuring that at least minimal ventilation standards are being met. It should be noted that there is little or no enforcement of ventilation standards, once building plans are approved. Architects, engineers, and contractors should treat indoor environmental quality as a design objective. There are many opportunities in building design to separate people from the sources of contamination or to remove the sources entirely.</span></p><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Manufacturers have the responsibility to warn the consumer adequately of the potential hazards of products. As evidence on specific contaminants—such as formaldehyde and nitrogen dioxide from gas stoves—becomes available, less harmful substitutes can be considered, and results of research on the control of the sources can be made available.</span></p><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Government shares the responsibility to ensure that the indoor environments to which the public has access are healthful. Clearly, in the assessment of indoor concentrations, in instrument development, and in the control of health-directed research on indoor pollutants, government can serve the public interest. Government can establish ordinances (regulations) to protect the general public from nuisances, contamination, or direct health damage; such ordinances may include performance standards related to building materials and ventilation codes for public and private buildings. In the same vein, government can require product certification in the case of known or potential hazards. Furthermore, government can establish concentration standards or source-control specifications. Radon, a naturally occurring substance, is a clear example of contaminants that would require government attention, as opposed to that of industry or the individual.</span></p></div><div data-dcnode-id="639" id="ddd00021"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="670"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="671" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="672" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="668" id="_ddd00021_"><span data-dcnode-id="669" instrument_node="">CONCLUSIONS</span></h2><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Definitive conclusions on the character of indoor air are prevented by the lack of systematic studies. The available data base has been generated by a series of pilot studies and does not fully characterize the variety of pollutants, indoor environments, and occupancy conditions. Furthermore, the implementation of energy-conservation measures and the introduction of new building materials have intensified the problem of indoor air contamination.</span></p><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Studies explicitly addressing both long-term and episodic events have not been undertaken. Episodic release of contaminants in the indoor environment may be rare, but can lead to short-term high contaminant concentrations, which must be considered (in addition to long-term low concentrations) in assessing the overall health risk of indoor contaminants.</span></p><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Measurement of indoor contaminants necessitates a sampling protocol that considers the spatial and temporal profile of several pollutants, as well as air diffusion and ventilation characteristics. In addition, measurement techniques for assessing indoor concentrations have to meet more rigorous requirements, particularly with regard to sensitivity and interferences. Unfortunately, many of the instruments required to characterize long-term and short-term indoor pollutant concentrations do not exist.</span></p><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">From a practical viewpoint, it would be desirable to determine the emission rate of an indoor pollutant by simple physical measurements and to infer the dose received by a human inhabiting the indoor space. But several intervening steps must be evaluated that involve degrees of uncertainty ranging from good estimates to total ignorance. The first process to be considered is the transport by diffusion and convection; transport is influenced initially by the fluid motion of the air near the source and throughout the indoor space. These modes of transport depend on a number of factors and are usually spatially and temporally variable. They lead to a concentration profile of the contaminant as a function of position and time. Measuring such profiles is virtually impossible, so the usual approach is to use mathematical models of dispersion. The human receptor is not stationary. Therefore, to obtain an exposure history, the spatial history of the receptor should be specified or estimated. Inexact knowledge of this function introduces a further degree of uncertainty. Dose to the receptor is related to exposure through deposition functions that express the fraction of the exposure that is available to reach specific receptor sites and produce effects. These deposition functions are themselves functions of several variables that are usually poorly specified or unknown. Thus, several layers of uncertainty are embedded between emission rate and receptor dose.</span></p><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Indoor air pollutants generated or released indoors typically occur in concentrations and mixtures that are often episodic and generally vary over a wide range of time and from one space to another. As a result, human exposures are difficult to assess for individuals or groups. If, in addition, the adverse health effects are subtle, and especially if they are delayed, associations between indoor air pollutants and disease or premature mortality are unlikely to be discovered or demonstrated without a specific and substantial effort. Thus, efforts to improve indoor air quality most likely will have to be guided by information on the adverse health effects of pollutants demonstrated and studied in other settings, such as the occupational environment.</span></p><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">For a limited number of air contaminants that can be found in residential and public buildings, there is direct and circumstantial evidence that human exposures are large enough and common enough to account for substantial morbidity and premature mortality. These include radon progeny, sidestream tobacco smoke, formaldehyde, carbon monoxide, nitrogen dioxide, aeropathogens, and aeroallergens. However, our knowledge of the extent of the exposures and of the exposure-response relationships is inadequate to permit measurement or even estimation of the resulting mortality and morbidity. Furthermore, the kinds of health effects and the latent periods between exposures and effects are quite varied. For example, they extend from acute intoxication from carbon monoxide and formaldehyde to cancer that appears long after exposure to radon decay products and asbestos.</span></p><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">In evaluating health risks, it is reasonable to compare indoor exposure with ambient air-quality standards for pollutants for which there are such standards (carbon monoxide, sulfur dioxide, nitrogen dioxide, ozone, lead, and total suspended particles). Depending on how the standards were developed, however, they may or may not consider exposure of the most sensitive population groups (the ill or infirm or the very young). In addition, the composition of particulate matter indoors, the potential synergistic interaction of gaseous and particulate matter, and the time characteristics of exposures can differ widely between the indoors and the ambient environment. Hence, for some pollutants, the ambient air-quality standards may actually underestimate the health risks.</span></p><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Current knowledge would permit the establishment of defensible indoor-air quality standards for only a few, if any, contaminants. In any case, the establishment of such standards would not necessarily lead to rational or enforceable controls beyond ventilation codes for dilution. Economical and reliable techniques for sampling and analyzing the airborne contaminants of interest at very low concentrations have not been developed; nor have methods been developed to relate spot samples from specific locations to integrated doses.</span></p><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">We conclude that the best approach to the reduction of health damage from exposure to indoor contaminants is to reduce the population exposure to those contaminants. Control strategies for some pollutants would target the high-exposure groups. For other pollutants, lowering the population-weighted mean exposure would, by best estimates, reduce the health hazards.</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Because of the diversity of indoor pollutants and their sources and because of the unpredictability of the distribution of such pollutants over time and in different buildings, efforts to improve indoor air quality should concentrate on reducing the number and strength of the sources by substitution of other materials.</span></p><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Control strategies based on the specifications of source control are preferred, whenever feasible, because they are generally the most dependable, with respect to their extent and reliability of exposure reduction. That suggests that reducing exposure through source control or removal or through material substitution must be tempered by the practical realities of existing sources, which might not be easy to eliminate, and by the unknown long-term toxicity of substitute materials. When those strategies cannot achieve the desired degree of control at reasonable cost, they can be supplemented or replaced by other engineering controls, such as dilution ventilation or air-cleaning. However, it should be recognized that the concentration reduction achieved through dilution may be less than that achievable with source control or air-cleaning, whereas the effectiveness of air-cleaning devices usually depends on frequent and effective application of maintenance procedures.</span></p><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">The specific source controls appropriate to each kind of contaminant can be expected to vary. For example, local exhaust control is most appropriate for nitrogen dioxide and carbon monoxide from gas ranges, the sealing of walls and floors for radon control, prohibition for asbestos-containing products, and specifications for care of furniture, drapery, and carpeting materials prepared with formaldehyde-containing substances.</span></p><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Air-conditioning systems are generally designed to provide for all or most of the thermal environmental requirements (i.e., heating, cooling, and ventilating) of the occupied space. In the design of these systems, it is necessary to select components that will meet the particular requirements, such as heating coils or furnaces to meet winter design temperatures, evaporator coils and condensing units to meet summer design temperatures and humidities, and air-cleaners or ventilation air-flow rates to meet the air-quality requirements of the occupied space. The functional requirements of the space (i.e., residential, office, theater, etc.) also impose constraints on the type of system that might be selected. Because of the wide variety of functional requirements of indoor environments and the other constraints on design, a vast variety of control systems are used. For instance, lighting and acoustic requirements can influence the size and location of the air-conditioning system, the location of air supply and return devices, and air velocities in the air distribution system. Available information suggests that this trend will continue.</span></p><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Although the requirements may be described discretely and some performance specifications are available for components of the system, the effectiveness of the system as a whole, including its impact on indoor air quality, must be evaluated. Unfortunately, very few data are available to indicate whether these systems, under actual loads, perform in accordance with their designs.</span></p></div><div data-dcnode-id="566" id="ddd00022"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="636"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="637" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="638" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="634" id="_ddd00022_"><span data-dcnode-id="635" instrument_node="">RECOMMENDATIONS</span></h2><dl class="temp-labeled-list" data-dcnode-id="567"><dt data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">1.</span></dt><dd data-dcnode-id="629"><p class="no_top_margin" data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">A staged assessment of the exposures of the general population to indoor pollutants and of the effects of such exposures on health and welfare should be conducted by the federal government in both residential and office buildings. Federal agencies with substantial interests in definition of the indoor exposures—i.e., the Environmental Protection Agency, the Department of Energy, the Consumer Product Safety Commission, the National Institute for Occupational Safety and Health, the Centers for Disease Control, the National Institute of Environmental Health Sciences, the Food and Drug Administration, the National Center for Toxicological Research, the Department of Housing and Urban Development, etc.—should participate in the formulation of the study objectives and protocols and should provide technical assistance and financial support, as appropriate and feasible. Congress should enunciate clearly its interest in healthful and safe indoor environments.</span></p></dd><dt data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">2.</span></dt><dd data-dcnode-id="624"><p class="no_top_margin" data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Monitoring protocols and properly designed monitoring instruments must be developed to satisfy the special requirements involved in investigating the indoor environment.</span></p></dd><dt data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">3.</span></dt><dd data-dcnode-id="619"><p class="no_top_margin" data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">The indoor pollutants that should receive the initial major focus in investigation of sources, concentrations, dispersion, and removal are radon and its progeny, tobacco smoke, formaldehyde, nitrogen dioxide, carbon monoxide, pesticides, water vapor, carbon dioxide, and airborne contagion, including allergens.</span></p></dd><dt data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">4.</span></dt><dd data-dcnode-id="614"><p class="no_top_margin" data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">The health effects that should receive the initial major focus in investigation are respiratory-infection rates and respiratory mechanical function in relation to nitrogen dioxide, tobacco-smoke, and airborne-contagion exposures; respiratory-tract irritation and potential carcinogenic effects in relation to formaldehyde, tobacco smoke, asbestos, and alpha-emitting radon decay products; and acute intoxication, blood carboxyhemoglobin, and cardiovascular-disease aggravation in relation to carbon monoxide and nitrogen dioxide exposures.</span></p></dd><dt data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">5.</span></dt><dd data-dcnode-id="609"><p class="no_top_margin" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">The low-level acute and chronic complaints of malaise, headache, stuffiness, and eye and throat irritation that are reported with increasing frequency in large buildings deserve careful study.</span></p></dd><dt data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">6.</span></dt><dd data-dcnode-id="604"><p class="no_top_margin" data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">The welfare and behavioral effects that should receive the initial major focus in investigation are material damage from mold formation in relation to relative humidity; corrosion and surface deterioration in relation to nitrogen dioxide, sulfur dioxide, and water vapor; fabric fading and deterioration in relation to solar radiation in combination with nitrogen dioxide, sulfur dioxide, house dust, and water vapor; soiling due to tobacco smoke; and the lowering of work productivity due to indoor air pollution and associated discomfort.</span></p></dd><dt data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">7.</span></dt><dd data-dcnode-id="599"><p class="no_top_margin" data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Responsibility for conducting a well-coordinated investigation of the influence of building design and operational factors on the concentrations of pollutants in both residential and commercial facilities should rest with the federal government, assisted by the appropriate professional and scientific organizations.</span></p></dd><dt data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">8.</span></dt><dd data-dcnode-id="573"><p class="no_top_margin" data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">The building factors that should receive the initial major focus in investigation are as follows:</span></p><dl class="temp-labeled-list" data-dcnode-id="574"><dt data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">a.</span></dt><dd data-dcnode-id="590"><p class="no_top_margin" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">The effects of reducing infiltration rates in existing buildings on combustion efficiency of space-heating equipment and on increases in relative humidity and concentrations of indoor-generated air pollutants and airborne contagion.</span></p></dd><dt data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">b.</span></dt><dd data-dcnode-id="585"><p class="no_top_margin" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">The effects of materials of construction and furnishings on indoor-pollutant content—specifically, there should be systematic evaluations of outgassing and surface attrition of particleboard and plywood (for formaldehyde and other organic substances); of wall and floor coverings and fabrics (for organic substances); of masonry products (for radon and dust); of wallboard, plaster, and spackling compounds (for dust and fibers); and of the materials used for heat storage in dry solar systems (for radon, dust, surface molds, etc.).</span></p></dd><dt data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">c.</span></dt><dd data-dcnode-id="580"><p class="no_top_margin" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">The differences in air distribution, diffusion, mixing, etc., associated with the use of different climate-control systems, such as forced-air, baseboard, and radiant floor or ceiling systems.</span></p></dd><dt data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">d.</span></dt><dd data-dcnode-id="575"><p class="no_top_margin" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">The effectiveness of air-cleaning systems in capturing pollutants in recirculating air—specifically, this will require in-place testing of systems, rather than test-stand evaluation of components, and the effectiveness of a variety of commonly used systems should be evaluated for radon and radon progeny, formaldehyde and solvent vapors, and cigarette smoke.</span></p></dd></dl></dd><dt data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">9.</span></dt><dd data-dcnode-id="568"><p class="no_top_margin" data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">The potential for consumer products to contaminate the indoor environment needs to be evaluated. Hazardous components of these products must be identified and tested. Adequate labeling, warning users of hazards associated with product use and misuse in enclosed spaces, should be required. Testing in homes is needed to assess the extent of contamination, allergic reactions, and other health effects of pesticides, residues, and consumer products.</span></p></dd></dl></div><div data-dcnode-id="565" id="bk_toc_contnr"></div><div aria-hidden="true" aria-live="assertive" class="ui-helper-reset ui-ncbipopper-wrapper ui-ncbilinksmenu" data-dcnode-id="545" style="display: none; width: 200px; top: -100px; left: -100px;"><ul data-dcnode-id="546" id="ui-ncbiinpagenav-7"><li data-dcnode-id="562"><a data-dcnode-id="563" href="#_ddd00010_"><span data-dcnode-id="564" instrument_node="">SCOPE OF THE REPORT</span></a></li><li data-dcnode-id="559"><a data-dcnode-id="560" href="#_ddd00011_"><span data-dcnode-id="561" instrument_node="">ORGANIZATION OF THE REPORT</span></a></li><li data-dcnode-id="556"><a data-dcnode-id="557" href="#_ddd00012_"><span data-dcnode-id="558" instrument_node="">PRINCIPAL FINDINGS ON SPECIFIC POLLUTANTS AND CLASSES OF POLLUTANTS</span></a></li><li data-dcnode-id="553"><a data-dcnode-id="554" href="#_ddd00020_"><span data-dcnode-id="555" instrument_node="">RESPONSIBILITIES</span></a></li><li data-dcnode-id="550"><a data-dcnode-id="551" href="#_ddd00021_"><span data-dcnode-id="552" instrument_node="">CONCLUSIONS</span></a></li><li data-dcnode-id="547"><a data-dcnode-id="548" href="#_ddd00022_"><span data-dcnode-id="549" instrument_node="">RECOMMENDATIONS</span></a></li></ul></div></div></div><span data-dcnode-id="542" instrument_node="">
