</span><div class="main-content lit-style" data-dcnode-id="591" itemscope="itemscope" itemtype="http://schema.org/CreativeWork"><div class="meta-content fm-sec" data-dcnode-id="4667"><h1 data-dcnode-id="4687" id="_NBK138710_"><span class="label" data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node=""> 2</span></span><span class="title" data-dcnode-id="4688" itemprop="name"><span data-dcnode-id="4689" instrument_node="">Carbon monoxide</span></span></h1><p class="contrib-group" data-dcnode-id="4668"><span data-dcnode-id="4685" itemprop="author"><span data-dcnode-id="4686" instrument_node="">David Penney</span></span><span data-dcnode-id="4684" instrument_node="">, </span><span data-dcnode-id="4682" itemprop="author"><span data-dcnode-id="4683" instrument_node="">Vernon Benignus</span></span><span data-dcnode-id="4681" instrument_node="">, </span><span data-dcnode-id="4679" itemprop="author"><span data-dcnode-id="4680" instrument_node="">Stylianos Kephalopoulos</span></span><span data-dcnode-id="4678" instrument_node="">, </span><span data-dcnode-id="4676" itemprop="author"><span data-dcnode-id="4677" instrument_node="">Dimitrios Kotzias</span></span><span data-dcnode-id="4675" instrument_node="">, </span><span data-dcnode-id="4673" itemprop="author"><span data-dcnode-id="4674" instrument_node="">Michael Kleinman</span></span><span data-dcnode-id="4672" instrument_node="">, and </span><span data-dcnode-id="4670" itemprop="author"><span data-dcnode-id="4671" instrument_node="">Agnes Verrier</span></span><span data-dcnode-id="4669" instrument_node="">.</span></p></div><div class="jig-ncbiinpagenav body-content whole_rhythm" data-dcnode-id="592" data-jigconfig="allHeadingLevels: ['h2'],smoothScroll: false" id="ui-ncbiinpagenav-10" itemprop="text"><div data-dcnode-id="4622" id="ch2.s1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="4663"><span data-dcnode-id="4664" role="menubar"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="4665" href="#" role="menuitem" title="Go to other sections in this page"><span data-dcnode-id="4666" instrument_node="">Go to:</span></a></span></div><h2 class="ui-helper-clearfix" data-dcnode-id="4661" id="_ch2_s1_"><span data-dcnode-id="4662" instrument_node="">General description</span></h2><p data-dcnode-id="4647"><span data-dcnode-id="4660" instrument_node="">Carbon monoxide (CO) is a colourless, non-irritant, odourless and tasteless toxic gas. It is produced by the incomplete combustion of carbonaceous fuels such as wood, petrol, coal, natural gas and kerosene. Its molecular weight is 28.01 g/mol, melting point −205.1 °C, boiling point (at 760 mmHg) −191.5 °C (−312.7 °F), density 1.250 kg/m</span><sup data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">3</span></sup><span data-dcnode-id="4657" instrument_node=""> at 0 °C and 1 atm and 1.145 kg/m</span><sup data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">3</span></sup><span data-dcnode-id="4654" instrument_node=""> at 25 °C and 1 atm, and relative density (air = 1) 0.967 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r1" data-dcnode-id="4652" href="#" role="button"><span data-dcnode-id="4653" instrument_node="">1</span></a><span data-dcnode-id="4651" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r2" data-dcnode-id="4649" href="#" role="button"><span data-dcnode-id="4650" instrument_node="">2</span></a><span data-dcnode-id="4648" instrument_node="">). Its solubility in water at 1 atm is 3.54 ml/100 ml at 0 °C, 2.14 ml/100 ml at 25 °C and 1.83 ml/100 ml at 37 °C.</span></p><p data-dcnode-id="4645"><span data-dcnode-id="4646" instrument_node="">The molecular weight of carbon monoxide is similar to that of air (28.01 vs approximately 29). It mixes freely with air in any proportion and moves with air via bulk transport. It is combustible, may serve as a fuel source and can form explosive mixtures with air. It reacts vigorously with oxygen, acetylene, chlorine, fluorine and nitrous oxide. Carbon monoxide is not detectible by humans either by sight, taste or smell. It is only slightly soluble in water, blood serum and plasma; in the human body, it reacts with haemoglobin to form carboxyhaemoglobin (COHb).</span></p><p data-dcnode-id="4640"><span data-dcnode-id="4644" instrument_node="">The relationship of carbon monoxide exposure and the COHb concentration in blood can be modelled using the differential Coburn-Forster-Kane equation (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r3" data-dcnode-id="4642" href="#" role="button"><span data-dcnode-id="4643" instrument_node="">3</span></a><span data-dcnode-id="4641" instrument_node="">), which provides a good approximation to the COHb level at a steady level of inhaled exogenous carbon monoxide.</span></p><div data-dcnode-id="4623" id="ch2.s2"><h3 data-dcnode-id="4638"><span data-dcnode-id="4639" instrument_node="">Conversion factors</span></h3><p data-dcnode-id="4624"><span data-dcnode-id="4637" instrument_node="">At 760 mmHg and 20 °C, 1ppm = 1.165 mg/m</span><sup data-dcnode-id="4635"><span data-dcnode-id="4636" instrument_node="">3</span></sup><span data-dcnode-id="4634" instrument_node=""> and 1 mg/m</span><sup data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">3</span></sup><span data-dcnode-id="4631" instrument_node=""> = 0.858 ppm; at 25 °C, 1 ppm = 1.145 mg/m</span><sup data-dcnode-id="4629"><span data-dcnode-id="4630" instrument_node="">3</span></sup><span data-dcnode-id="4628" instrument_node=""> and 1 mg/m</span><sup data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">3</span></sup><span data-dcnode-id="4625" instrument_node=""> = 0.873 ppm.</span></p></div></div><div data-dcnode-id="4584" id="ch2.s3"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="4619"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="4620" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="4621" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="4617" id="_ch2_s3_"><span data-dcnode-id="4618" instrument_node="">Indoor sources</span></h2><p data-dcnode-id="4606"><span data-dcnode-id="4616" instrument_node="">Inhalation is the only exogenous exposure route for carbon monoxide. Anthropogenic emissions are responsible for about two thirds of the carbon monoxide in the atmosphere and natural emissions account for the remaining one third. Small amounts are also produced endogenously in the human body (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r4" data-dcnode-id="4614" href="#" role="button"><span data-dcnode-id="4615" instrument_node="">4</span></a><span data-dcnode-id="4613" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r5" data-dcnode-id="4611" href="#" role="button"><span data-dcnode-id="4612" instrument_node="">5</span></a><span data-dcnode-id="4610" instrument_node="">). Exposure to low levels of carbon monoxide can occur outdoors near roads, as it is also produced by the exhaust of petrol- and diesel-powered motor vehicles. Parking areas can also be a source of carbon monoxide (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r6" data-dcnode-id="4608" href="#" role="button"><span data-dcnode-id="4609" instrument_node="">6</span></a><span data-dcnode-id="4607" instrument_node="">).</span></p><p data-dcnode-id="4598"><span data-dcnode-id="4605" instrument_node="">Carbon monoxide is produced indoors by combustion sources (cooking and heating) and is also introduced through the infiltration of carbon monoxide from outdoor air into the indoor environment (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r7" data-dcnode-id="4603" href="#" role="button"><span data-dcnode-id="4604" instrument_node="">7</span></a><span data-dcnode-id="4602" instrument_node="">). In developed countries, the most important source of exposure to carbon monoxide in indoor air is emissions from faulty, incorrectly installed, poorly maintained or poorly ventilated cooking or heating appliances that burn fossil fuels. In homes in developing countries, the burning of biomass fuels and tobacco smoke are the most important sources of exposure to carbon monoxide. Clogged chimneys, wood-burning fireplaces, decorative fireplaces, gas burners and supplementary heaters without properly working safety features could vent carbon monoxide into indoor spaces. Incomplete oxidation during combustion may cause high concentrations of carbon monoxide in indoor air. Tobacco smoke can be a major source of indoor exposure, as can exhaust from motor vehicles operating in attached garages (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r6" data-dcnode-id="4600" href="#" role="button"><span data-dcnode-id="4601" instrument_node="">6</span></a><span data-dcnode-id="4599" instrument_node="">).</span></p><p data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">Combustion of low-grade solid fuel and biofuels in a small stove or fireplace can generate high carbon monoxide emissions, which may become lethal to occupants unless the flue gases are vented outdoors via a chimney throughout the entire combustion process. At the beginning of combustion, the pollutants released are dominated by particulate matter (elemental and organic carbon) but carbon monoxide dominates towards the end. Combustion of high-grade fuels such as natural gas, butane or propane usually produces much less carbon monoxide, provided that sufficient air is supplied to ensure complete combustion. Nevertheless, even devices using such fuels can cause lethal carbon monoxide intoxication if they are not properly maintained or vented or if air : fuel ratios are not properly adjusted.</span></p><p data-dcnode-id="4585"><span data-dcnode-id="4595" instrument_node="">Incense burning in homes and public buildings such as stores and shopping malls can be a source of exposure to carbon monoxide. Jetter et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r8" data-dcnode-id="4593" href="#" role="button"><span data-dcnode-id="4594" instrument_node="">8</span></a><span data-dcnode-id="4592" instrument_node="">) reported emission rates of 23 different types of incense, such as rope, cones, sticks, rocks and powder, that are typically used indoors. The measured emission rates of carbon monoxide ranged from 144 to 531 mg/hour. The authors estimated a peak concentration of 9.6 mg/m</span><sup data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">3</span></sup><span data-dcnode-id="4589" instrument_node=""> caused by incense burning and therefore concluded that carbon monoxide concentrations could exceed the USEPA's National Ambient Air Quality Standard of 10 mg/m</span><sup data-dcnode-id="4587"><span data-dcnode-id="4588" instrument_node="">3</span></sup><span data-dcnode-id="4586" instrument_node=""> for an 8-hour average, depending on the room volume, ventilation rate and the amount of incense burned. Incense burning might be a significant contributor to carbon monoxide exposure in cultures where incense is burned frequently, for example in religious rituals.</span></p></div><div data-dcnode-id="4533" id="ch2.s4"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="4581"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="4582" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="4583" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="4579" id="_ch2_s4_"><span data-dcnode-id="4580" instrument_node="">Indoor levels and relationship with outdoor levels</span></h2><p data-dcnode-id="4571"><span data-dcnode-id="4578" instrument_node="">Results of recent studies on carbon monoxide concentrations in indoor air are summarized in </span><a class="figpopup" data-dcnode-id="4576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t1/%3Freport%3Dobjectonly" rid-figpopup="figch2t1" rid-ob="figobch2t1" target="object"><span data-dcnode-id="4577" instrument_node="">Table 2.1</span></a><span data-dcnode-id="4575" instrument_node="">. The studies are listed by continent. Studies concerning accidental or peak exposures are presented separately in </span><a class="figpopup" data-dcnode-id="4573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t2/%3Freport%3Dobjectonly" rid-figpopup="figch2t2" rid-ob="figobch2t2" target="object"><span data-dcnode-id="4574" instrument_node="">Table 2.2</span></a><span data-dcnode-id="4572" instrument_node="">. Representativeness and data quality, as well as the form in which the data are presented, vary greatly between the studies and make detailed comparisons meaningless except when comparing data within the same study. The general levels of carbon monoxide, however, vary so much between the locations and studies that patterns are easily discernible.</span></p><div class="iconblock whole_rhythm clearfix ten_col table-wrap" data-dcnode-id="4562" id="figch2t1"><a class="img_link icnblk_img figpopup" data-dcnode-id="4569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t1/%3Freport%3Dobjectonly" rid-figpopup="figch2t1" rid-ob="figobch2t1" target="object" title="Table 2.1"><img alt="Table 2.1. Indoor concentrations of carbon monoxide and indoor : outdoor (I : O) ratios." class="small-thumb" data-dcnode-id="4570" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t1/%3Freport%3Dthumb&amp;raw" src-large="/books/NBK138710/table/ch2.t1/?report=previmg"></a><div class="icnblk_cntnt" data-dcnode-id="4563"><h4 data-dcnode-id="4566" id="ch2.t1"><a data-dcnode-id="4567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t1/%3Freport%3Dobjectonly" rid-ob="figobch2t1" target="object"><span data-dcnode-id="4568" instrument_node="">Table 2.1</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="4564"><span data-dcnode-id="4565" instrument_node="">Indoor concentrations of carbon monoxide and indoor : outdoor (I : O) ratios. </span></p></div></div><div class="iconblock whole_rhythm clearfix ten_col table-wrap" data-dcnode-id="4553" id="figch2t2"><a class="img_link icnblk_img figpopup" data-dcnode-id="4560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t2/%3Freport%3Dobjectonly" rid-figpopup="figch2t2" rid-ob="figobch2t2" target="object" title="Table 2.2"><img alt="Table 2.2. Accidental or peak exposure studies." class="small-thumb" data-dcnode-id="4561" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t2/%3Freport%3Dthumb&amp;raw" src-large="/books/NBK138710/table/ch2.t2/?report=previmg"></a><div class="icnblk_cntnt" data-dcnode-id="4554"><h4 data-dcnode-id="4557" id="ch2.t2"><a data-dcnode-id="4558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t2/%3Freport%3Dobjectonly" rid-ob="figobch2t2" target="object"><span data-dcnode-id="4559" instrument_node="">Table 2.2</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">Accidental or peak exposure studies. </span></p></div></div><p data-dcnode-id="4545"><span data-dcnode-id="4552" instrument_node="">In the absence of indoor sources, current concentrations of carbon monoxide in indoor air in European and North American cities are well below the levels of existing air quality guidelines and standards. In the 1950s and 1960s, carbon monoxide levels in urban air often approached or even exceeded these reference values, but drastic reductions in emissions from space heating and traffic have substantially reduced anthropogenic emissions in spite of the growing size of cities and increasing traffic (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r9" data-dcnode-id="4550" href="#" role="button"><span data-dcnode-id="4551" instrument_node="">9</span></a><span data-dcnode-id="4549" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r29" data-dcnode-id="4547" href="#" role="button"><span data-dcnode-id="4548" instrument_node="">29</span></a><span data-dcnode-id="4546" instrument_node="">).</span></p><p data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">The highest reported non-accidental carbon monoxide levels are observed in public or residential garages and in primitive kitchens when cooking with open fires (Guatemala). Aside from open-fire cooking with solid fuels, the most common sources for elevated carbon monoxide concentrations in indoor air are unvented gas appliances, tobacco smoking and proximity to busy traffic. The lowest concentrations are found in homes, churches and schools at some distance (&gt; 500 metres) from busy traffic and with no indoor sources. Carbon monoxide intoxication can be caused by single or repetitively generated high short-term peaks, and carbon monoxide poisoning is the leading cause of death from poisoning (accidental and intentional).</span></p><p data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">Carbon monoxide is a relatively unreactive gas under ambient air conditions and is not absorbed by building materials or ventilation system filters. Therefore, in the absence of indoor carbon monoxide sources, the indoor air concentration is the same as the concentration of ventilated or infiltrating outdoor air. Under these conditions, the indoor : outdoor (I : O) carbon monoxide concentration ratio should be 1.0; in practice, however, measured I : O ratios vary for two reasons.</span></p><ul data-dcnode-id="4534"><li class="half_rhythm" data-dcnode-id="4538"><div data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">The outdoor air carbon monoxide concentration at the point of measurement may be significantly higher or lower than the concentration at the point of ventilation air intake. Consequently, even in the absence of any indoor sources, the 15-minute I : O for carbon monoxide varies from 0.2 to 4.1 and the daily I : O from 0.4 to 1.2.</span></div></li><li class="half_rhythm" data-dcnode-id="4535"><div data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">Normal indoor sources, gas appliances and tobacco smoking increase the I : O ratios.</span></div></li></ul></div><div data-dcnode-id="4405" id="ch2.s5"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="4530"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="4531" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="4532" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="4528" id="_ch2_s5_"><span data-dcnode-id="4529" instrument_node="">Kinetics and metabolism</span></h2><div data-dcnode-id="4469" id="ch2.s6"><h3 data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">Carbon monoxide hypoxia</span></h3><p data-dcnode-id="4503"><span data-dcnode-id="4525" instrument_node="">Since the time of Haldane (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r52" data-dcnode-id="4523" href="#" role="button"><span data-dcnode-id="4524" instrument_node="">52</span></a><span data-dcnode-id="4522" instrument_node="">), it has been assumed that the effect of carbon monoxide exposure is due to hypoxic effects (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r53" data-dcnode-id="4520" href="#" role="button"><span data-dcnode-id="4521" instrument_node="">53</span></a><span data-dcnode-id="4519" instrument_node="">). Carbon monoxide enters the body via inhalation and is diffused across the alveolar membrane with nearly the same ease as oxygen (O</span><sub data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">2</span></sub><span data-dcnode-id="4516" instrument_node="">). Carbon monoxide is first dissolved in blood, but is quickly bound to haemoglobin (Hb) to form COHb, which is measured as the percentage of haemoglobin so bound. The binding of carbon monoxide to haemoglobin occurs with nearly the same speed and ease as with which oxygen binds to haemoglobin, although the bond for carbon monoxide is about 245 times as strong as that for oxygen (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r54" data-dcnode-id="4514" href="#" role="button"><span data-dcnode-id="4515" instrument_node="">54</span></a><span data-dcnode-id="4513" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r56" data-dcnode-id="4511" href="#" role="button"><span data-dcnode-id="4512" instrument_node="">56</span></a><span data-dcnode-id="4510" instrument_node="">). Thus carbon monoxide competes equivocally with oxygen for haemoglobin binding sites but, unlike oxygen, which is quickly and easily dissociated from its haemoglobin bond, carbon monoxide remains bound for a much longer time. In this way, COHb continues to increase with continued exposure, leaving pro gressively less haemoglobin available for carrying oxygen. The result is arterial hypoxaemia. Another effect of COHb is to increase the binding strength of oxygen to haemoglobin, thus making release of oxygen into tissue more difficult (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r57" data-dcnode-id="4508" href="#" role="button"><span data-dcnode-id="4509" instrument_node="">57</span></a><span data-dcnode-id="4507" instrument_node="">). The latter effect is quantitatively described as a leftward shift in the oxyhaemoglobin dissociation curve, proportional to the COHb level (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r58" data-dcnode-id="4505" href="#" role="button"><span data-dcnode-id="4506" instrument_node="">58</span></a><span data-dcnode-id="4504" instrument_node="">).</span></p><p data-dcnode-id="4489"><span data-dcnode-id="4502" instrument_node="">The endogenous formation of COHb has been described by Coburn, Forster &amp; Kane (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r3" data-dcnode-id="4500" href="#" role="button"><span data-dcnode-id="4501" instrument_node="">3</span></a><span data-dcnode-id="4499" instrument_node="">). The model has also been tested under a wide variety of carbon monoxide exposure conditions and found to predict COHb more accurate ly than empirical methods (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r54" data-dcnode-id="4497" href="#" role="button"><span data-dcnode-id="4498" instrument_node="">54</span></a><span data-dcnode-id="4496" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r59" data-dcnode-id="4494" href="#" role="button"><span data-dcnode-id="4495" instrument_node="">59</span></a><span data-dcnode-id="4493" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r66" data-dcnode-id="4491" href="#" role="button"><span data-dcnode-id="4492" instrument_node="">66</span></a><span data-dcnode-id="4490" instrument_node="">).</span></p><p data-dcnode-id="4484"><span data-dcnode-id="4488" instrument_node="">The most important variables in the formation of COHb are the concentration and duration of carbon monoxide in inhaled air and the rate of alveolar ventilation (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r67" data-dcnode-id="4486" href="#" role="button"><span data-dcnode-id="4487" instrument_node="">67</span></a><span data-dcnode-id="4485" instrument_node="">). Alveolar ventilation, largely determined by body energy expenditure (exercise), can vary over a wide range and is thus the major physiological determinant of the rate of COHb formation and elimination.</span></p><p data-dcnode-id="4470"><span data-dcnode-id="4483" instrument_node="">Carbon monoxide will also reduce the diffusion of oxygen into tissue via myoglobin by formation of carboxymyoglobin. The formation of carboxymyoglobin also acts as another sink for carbon monoxide. This process has been described by a multicompartmental physiological model (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r68" data-dcnode-id="4481" href="#" role="button"><span data-dcnode-id="4482" instrument_node="">68</span></a><span data-dcnode-id="4480" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r69" data-dcnode-id="4478" href="#" role="button"><span data-dcnode-id="4479" instrument_node="">69</span></a><span data-dcnode-id="4477" instrument_node="">). The models estimate the effects of carboxymyoglobin formation on carbon monoxide uptake, but the effect of carboxymyoglobin on tissue function is not clear. It is probable that such effects become important only for high levels of carbon monoxide exposure (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r70" data-dcnode-id="4475" href="#" role="button"><span data-dcnode-id="4476" instrument_node="">70</span></a><span data-dcnode-id="4474" instrument_node="">). Binding of carbon monoxide to other proteins (cytochrome P-450 and cytochrome oxidase) have also been demonstrated, but the dosimetry is unclear and the functional significance appears to be limited to high levels of carbon monoxide exposure (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r70" data-dcnode-id="4472" href="#" role="button"><span data-dcnode-id="4473" instrument_node="">70</span></a><span data-dcnode-id="4471" instrument_node="">).</span></p></div><div data-dcnode-id="4449" id="ch2.s7"><h3 data-dcnode-id="4467"><span data-dcnode-id="4468" instrument_node="">Dosimetric compensations for COHb</span></h3><p data-dcnode-id="4450"><span data-dcnode-id="4466" instrument_node="">Carbon monoxide, in addition to being an environmental contaminant, is produced endogenously. Thus, it is not surprising that physiological mechanisms have evolved to compensate for its presence in mammalian blood and tissues. These compensatory mechanisms must be considered when calculating the tissue dosimetry. For acute exposures, as COHb increases, arterial blood flow to the brain increases proportionally. Thus, even though the blood oxygen contents are decreased, in normal people the increased volume of blood tends to keep the amount of oxygen delivered to the brain constant, preventing hypoxia (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r71" data-dcnode-id="4464" href="#" role="button"><span data-dcnode-id="4465" instrument_node="">71</span></a><span data-dcnode-id="4463" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r74" data-dcnode-id="4461" href="#" role="button"><span data-dcnode-id="4462" instrument_node="">74</span></a><span data-dcnode-id="4460" instrument_node="">). These investigators have demonstrated that brain tissue metabolism remains constant as the COHb increases until it approaches 20%, implying that brain tissue hypoxia does not occur with lower COHb levels. Thus it is apparent that the increased compensatory flow is sufficient to account for the shift in the oxyhaemoglobin dissociation curve. This compensatory activity also occurs in neonates and fetuses (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r73" data-dcnode-id="4458" href="#" role="button"><span data-dcnode-id="4459" instrument_node="">73</span></a><span data-dcnode-id="4457" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r74" data-dcnode-id="4455" href="#" role="button"><span data-dcnode-id="4456" instrument_node="">74</span></a><span data-dcnode-id="4454" instrument_node="">). For chronic exposures to carbon monoxide, red cell volume increases or plasma volume decreases (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r70" data-dcnode-id="4452" href="#" role="button"><span data-dcnode-id="4453" instrument_node="">70</span></a><span data-dcnode-id="4451" instrument_node="">), thus increasing the amount of oxygen that can be delivered.</span></p></div><div data-dcnode-id="4441" id="ch2.s8"><h3 data-dcnode-id="4447"><span data-dcnode-id="4448" instrument_node="">Non-hypoxic mechanisms</span></h3><p data-dcnode-id="4442"><span data-dcnode-id="4446" instrument_node="">An accumulating body of evidence indicates that direct carbon monoxide exposure (not COHb) can produce a number of brain cellular events that could potentially lead to serious functional consequences (see the section on </span><a data-dcnode-id="4444" href="#ch2.s11"><span data-dcnode-id="4445" instrument_node="">health effects</span></a><span data-dcnode-id="4443" instrument_node=""> below). The direct effect of carbon monoxide on tissue has not been demonstrated in vivo, although such effects have been inferred by the observation of tissue effects in exposures in vivo that are very similar to such effects found with in vitro preparations. It would appear that the presence of carbon monoxide in tissues from in vivo exposure would depend on carbon monoxide dissolved in blood, because it had not yet bound with haemoglobin or because there could be some level of dissociation due to chemical equilibrium reactions. The amount of such dissolved carbon monoxide and the diffusion into various tissues has not been described or modelled. Thus, the dosimetry for putative non-hypoxic effects of carbon monoxide exposure is not known. The amount of dissolved carbon monoxide in blood would seem to be highest for high-level carbon monoxide exposure.</span></p></div><div data-dcnode-id="4413" id="ch2.s9"><h3 data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">Comprehensive dosimetry</span></h3><p data-dcnode-id="4425"><span data-dcnode-id="4438" instrument_node="">The final dose for carbon-monoxide-induced hypoxic effects is thus seen to be some measure of tissue oxygenation. This is an inverse measure in the sense that, as tissue oxygen increases towards the normal, function improves. As shown above, tissue oxygenation is determined by (</span><i data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">a</span></i><span data-dcnode-id="4435" instrument_node="">) the blood oxygen content (inversely proportional to COHb level), (</span><i data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">b</span></i><span data-dcnode-id="4432" instrument_node="">) the ease of dissociation from blood to tissue (the oxyhaemoglobin dissociation curve), (</span><i data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">c</span></i><span data-dcnode-id="4429" instrument_node="">) the volume of blood delivered to tissue and (</span><i data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">d</span></i><span data-dcnode-id="4426" instrument_node="">) the ability of tissue to utilize the oxygen (tissue respiration). To these we must add the rate of oxygen utilization by the tissue. The final criterion of tissue function is the energy metabolism rate in the tissue.</span></p><p data-dcnode-id="4414"><span data-dcnode-id="4424" instrument_node="">The issue of dosimetry is complex, but there exist physiologically based mathematical models to estimate many of the above variables and thus to predict tissue function. They are not mathematically trivial, but with modern computation tools the necessary calculations are readily performed (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r3" data-dcnode-id="4422" href="#" role="button"><span data-dcnode-id="4423" instrument_node="">3</span></a><span data-dcnode-id="4421" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r75" data-dcnode-id="4419" href="#" role="button"><span data-dcnode-id="4420" instrument_node="">75</span></a><span data-dcnode-id="4418" instrument_node="">). Many of these models have been combined into “whole-body” models, which hold much promise for estimating physiological function (</span><a data-dcnode-id="4416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//physiology.umc.edu/themodelingworkshop/" ref="pagearea=body&amp;targetsite=external&amp;targetcat=link&amp;targettype=uri"><span data-dcnode-id="4417" instrument_node="">http://physiology.umc.edu/themodelingworkshop/</span></a><span data-dcnode-id="4415" instrument_node="">).</span></p></div><div data-dcnode-id="4406" id="ch2.s10"><h3 data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">Exposure–response relationship</span></h3><p data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">The information required for regulatory guidance setting is some measure of the biologically critical concentration and duration of carbon monoxide exposure in inhaled air. To estimate environmental guidelines that provide reasonable protection against adverse health effects, information is required about what tissue dose produces what health effects. Given this critical tissue dose, one can estimate the various environmental concentrations, subject characteristics and subject activities that will produce the critical tissue dose. Thus for a specific environmental case of interest, mathematical simulations can be done to estimate protective regulatory decisions. Therefore, for each health effect of interest, critical tissue oxygenation must be known.</span></p><p data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">It might be argued that the critical tissue dose is obtained from experimental evidence in which environmental exposure is given in the first place. Experiments, however, are not usually good simulations of actual scenarios of interest. The purpose of the simulations is to be able to simulate any environment of interest without having direct experimental evidence. Unfortunately, in the absence of adequate dosimetric information, and therefore dosimetric models, simulation by models is not possible. Thus for non-hypoxic effects, it is frequently necessary to use less general evidence from empirical environmental data to make estimates of critical exposures. To preserve exposure data from experiments and literature reviews, it would seem to be important to report both COHb and exposure concentration and duration. This would potentially permit calculation of tissue dose for non-hypoxic tissue effects when the dosimetry models are developed. It should be kept in mind that the tissue dose and the eventual health effect are not necessarily contemporaneous. Delayed sequelae may occur and cumulative exposure may be needed to become effective. These are really questions of physiological mechanisms.</span></p></div></div><div data-dcnode-id="3713" id="ch2.s11"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="4402"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="4403" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="4404" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="4400" id="_ch2_s11_"><span data-dcnode-id="4401" instrument_node="">Health effects</span></h2><div data-dcnode-id="4393" id="ch2.s12"><h3 data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">Identification of studies</span></h3><p data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">For the acute health effects, the literature search was conducted in the PubMed and Web of Science databases, searching the keywords carbon monoxide and health. A special search for behavioural and neurological effects used PubMed with the following keyword statement: (“carbon monoxide” OR CO) AND (“human behaviour” OR “nervous system” OR CNS OR sensory OR “human performance” OR vision OR hearing OR auditory) NOT co- NOT smoking. Similar search statements were used for physiological and mechanistic articles. From these searches, 952 articles were found and, from these, 52 were deemed relevant and used in the review. The references in each of the relevant articles were searched to find any other articles that might have been missed by the automated searches.</span></p><p data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">A similar strategy was followed for a review of the health effects of chronic exposure. From these articles, 101 were deemed relevant and were used.</span></p></div><div data-dcnode-id="3834" id="ch2.s13"><h3 data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">Chronic exposure</span></h3><div data-dcnode-id="4296" id="ch2.s14"><h4 data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">Definition of the health outcome</span></h4><p data-dcnode-id="4384"><span data-dcnode-id="4388" instrument_node="">This review will discuss concisely and briefly human exposure to carbon monoxide in enclosed (i.e. closed) breathing spaces. Since outdoor air inevitably becomes indoor air, some consideration of carbon monoxide levels in outdoor air and their effects on humans are required. To that end, there will be some discussion of epidemiological studies involving ultra-low-level carbon monoxide found in outside air. Exposure to high, potentially lethal levels are not considered here at any length and “delayed effects” are not examined because neither would be seen in indoor carbon monoxide exposure situations under normal circumstances. Because animal studies cannot at present provide much useful data about many aspects of the carbon monoxide poisoning syndrome (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r76" data-dcnode-id="4386" href="#" role="button"><span data-dcnode-id="4387" instrument_node="">76</span></a><span data-dcnode-id="4385" instrument_node="">), they have been considered only in order to understand basic mechanisms by which carbon monoxide may impair human health.</span></p><p data-dcnode-id="4367"><span data-dcnode-id="4383" instrument_node="">This review extends the discussion of those issues involving carbon monoxide exposure in humans summarized in the 1999 WHO and 2005 European Union reports (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r77" data-dcnode-id="4381" href="#" role="button"><span data-dcnode-id="4382" instrument_node="">77</span></a><span data-dcnode-id="4380" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r78" data-dcnode-id="4378" href="#" role="button"><span data-dcnode-id="4379" instrument_node="">78</span></a><span data-dcnode-id="4377" instrument_node="">). There has been no major attempt to recapitulate the review of most studies before roughly 1999. Other recent reviews on carbon monoxide exposure are available in monographs by Penney (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r79" data-dcnode-id="4375" href="#" role="button"><span data-dcnode-id="4376" instrument_node="">79</span></a><span data-dcnode-id="4374" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r81" data-dcnode-id="4372" href="#" role="button"><span data-dcnode-id="4373" instrument_node="">81</span></a><span data-dcnode-id="4371" instrument_node="">) and Kleinman (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r6" data-dcnode-id="4369" href="#" role="button"><span data-dcnode-id="4370" instrument_node="">6</span></a><span data-dcnode-id="4368" instrument_node="">). Recourse to these works is strongly encouraged.</span></p><p data-dcnode-id="4350"><span data-dcnode-id="4366" instrument_node="">Tikuisis (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r82" data-dcnode-id="4364" href="#" role="button"><span data-dcnode-id="4365" instrument_node="">82</span></a><span data-dcnode-id="4363" instrument_node="">) reviewed human carbon monoxide uptake and elimination in 1996. Chen &amp; Wang (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r83" data-dcnode-id="4361" href="#" role="button"><span data-dcnode-id="4362" instrument_node="">83</span></a><span data-dcnode-id="4360" instrument_node="">) reviewed the health effects of carbon monoxide in air pollution in major Chinese cities in 2000. Flachsbart (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r84" data-dcnode-id="4358" href="#" role="button"><span data-dcnode-id="4359" instrument_node="">84</span></a><span data-dcnode-id="4357" instrument_node="">) reviewed ambient and very low concentrations of carbon monoxide on humans more recently. Penney (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r81" data-dcnode-id="4355" href="#" role="button"><span data-dcnode-id="4356" instrument_node="">81</span></a><span data-dcnode-id="4354" instrument_node="">) recently reviewed pitfalls in making diagnoses of carbon monoxide poisoning, especially chronic poisoning. “Chronic” is defined as any exposure lasting more than 24 hours; “acute” is an exposure of 24 hours or less (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r76" data-dcnode-id="4352" href="#" role="button"><span data-dcnode-id="4353" instrument_node="">76</span></a><span data-dcnode-id="4351" instrument_node="">).</span></p><p data-dcnode-id="4339"><span data-dcnode-id="4349" instrument_node="">Penney (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r85" data-dcnode-id="4347" href="#" role="button"><span data-dcnode-id="4348" instrument_node="">85</span></a><span data-dcnode-id="4346" instrument_node="">) reviewed the effects of carbon monoxide exposure on developing animals and humans in 1996. White (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r86" data-dcnode-id="4344" href="#" role="button"><span data-dcnode-id="4345" instrument_node="">86</span></a><span data-dcnode-id="4343" instrument_node="">) reviewed carbon monoxide poisoning in children in 2000. Public perceptions about carbon monoxide in the northern and southern regions of the United States, some relevant to indoor air, were investigated by Penney and published in 2008 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r87" data-dcnode-id="4341" href="#" role="button"><span data-dcnode-id="4342" instrument_node="">87</span></a><span data-dcnode-id="4340" instrument_node="">).</span></p><p data-dcnode-id="4322"><span data-dcnode-id="4338" instrument_node="">Penney reviewed the general characteristics of chronic carbon monoxide poisoning in humans in 2000 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r80" data-dcnode-id="4336" href="#" role="button"><span data-dcnode-id="4337" instrument_node="">80</span></a><span data-dcnode-id="4335" instrument_node="">) and 2008 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r88" data-dcnode-id="4333" href="#" role="button"><span data-dcnode-id="4334" instrument_node="">88</span></a><span data-dcnode-id="4332" instrument_node="">), as did Hay et al. in 2000 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r89" data-dcnode-id="4330" href="#" role="button"><span data-dcnode-id="4331" instrument_node="">89</span></a><span data-dcnode-id="4329" instrument_node="">) and Hay in 2008 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r90" data-dcnode-id="4327" href="#" role="button"><span data-dcnode-id="4328" instrument_node="">90</span></a><span data-dcnode-id="4326" instrument_node="">). In 2000,Greiner &amp; Schwab (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r91" data-dcnode-id="4324" href="#" role="button"><span data-dcnode-id="4325" instrument_node="">91</span></a><span data-dcnode-id="4323" instrument_node="">) reviewed engineering aspects of carbon monoxide as it occurs in the living space.</span></p><p data-dcnode-id="4311"><span data-dcnode-id="4321" instrument_node="">Helfaer &amp; Traystman (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r71" data-dcnode-id="4319" href="#" role="button"><span data-dcnode-id="4320" instrument_node="">71</span></a><span data-dcnode-id="4318" instrument_node="">) reviewed the cerebrovascular effects of carbon monoxide in 1996. In 2000, Hazucha (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r92" data-dcnode-id="4316" href="#" role="button"><span data-dcnode-id="4317" instrument_node="">92</span></a><span data-dcnode-id="4315" instrument_node="">) reviewed the effects of carbon monoxide on work and exercise capacity in humans. McGrath (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r93" data-dcnode-id="4313" href="#" role="button"><span data-dcnode-id="4314" instrument_node="">93</span></a><span data-dcnode-id="4312" instrument_node="">) reviewed the interacting effects on humans of altitude and carbon monoxide.</span></p><p data-dcnode-id="4297"><span data-dcnode-id="4310" instrument_node="">In 1996, Hiramatsu et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r94" data-dcnode-id="4308" href="#" role="button"><span data-dcnode-id="4309" instrument_node="">94</span></a><span data-dcnode-id="4307" instrument_node="">) reviewed the impairment of learning and memory and neuronal dysfunction resulting from carbon monoxide exposure. In 2008, Hopkins (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r95" data-dcnode-id="4305" href="#" role="button"><span data-dcnode-id="4306" instrument_node="">95</span></a><span data-dcnode-id="4304" instrument_node="">) and Armstrong &amp; Cunningham (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r96" data-dcnode-id="4302" href="#" role="button"><span data-dcnode-id="4303" instrument_node="">96</span></a><span data-dcnode-id="4301" instrument_node="">) reviewed the neurocognitive and affective outcomes of carbon monoxide poisoning in adults and children. Helffenstein (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r97" data-dcnode-id="4299" href="#" role="button"><span data-dcnode-id="4300" instrument_node="">97</span></a><span data-dcnode-id="4298" instrument_node="">) recently reported on a study investigating the neurocognitive and neurobehavioural sequelae of chronic carbon monoxide poisoning.</span></p></div><div data-dcnode-id="4183" id="ch2.s15"><h4 data-dcnode-id="4294"><span data-dcnode-id="4295" instrument_node="">Early studies of chronic carbon monoxide poisoning</span></h4><p data-dcnode-id="4244"><span data-dcnode-id="4293" instrument_node="">The early studies of Beck (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r98" data-dcnode-id="4291" href="#" role="button"><span data-dcnode-id="4292" instrument_node="">98</span></a><span data-dcnode-id="4290" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r99" data-dcnode-id="4288" href="#" role="button"><span data-dcnode-id="4289" instrument_node="">99</span></a><span data-dcnode-id="4287" instrument_node="">), Lindgren (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r100" data-dcnode-id="4285" href="#" role="button"><span data-dcnode-id="4286" instrument_node="">100</span></a><span data-dcnode-id="4284" instrument_node="">), Barrowcliff (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r101" data-dcnode-id="4282" href="#" role="button"><span data-dcnode-id="4283" instrument_node="">101</span></a><span data-dcnode-id="4281" instrument_node="">), Wilson &amp; Schaeffer (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r102" data-dcnode-id="4279" href="#" role="button"><span data-dcnode-id="4280" instrument_node="">102</span></a><span data-dcnode-id="4278" instrument_node="">), Davies &amp; Smith (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r103" data-dcnode-id="4276" href="#" role="button"><span data-dcnode-id="4277" instrument_node="">103</span></a><span data-dcnode-id="4275" instrument_node="">), Trese et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r104" data-dcnode-id="4273" href="#" role="button"><span data-dcnode-id="4274" instrument_node="">104</span></a><span data-dcnode-id="4272" instrument_node="">), Kowalska (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r105" data-dcnode-id="4270" href="#" role="button"><span data-dcnode-id="4271" instrument_node="">105</span></a><span data-dcnode-id="4269" instrument_node="">), Kirkpatrick (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r106" data-dcnode-id="4267" href="#" role="button"><span data-dcnode-id="4268" instrument_node="">106</span></a><span data-dcnode-id="4266" instrument_node="">), Jensen et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r107" data-dcnode-id="4264" href="#" role="button"><span data-dcnode-id="4265" instrument_node="">107</span></a><span data-dcnode-id="4263" instrument_node="">), Ryan (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r108" data-dcnode-id="4261" href="#" role="button"><span data-dcnode-id="4262" instrument_node="">108</span></a><span data-dcnode-id="4260" instrument_node="">), Tvedt &amp; Kjuus (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r109" data-dcnode-id="4258" href="#" role="button"><span data-dcnode-id="4259" instrument_node="">109</span></a><span data-dcnode-id="4257" instrument_node="">), Myers et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r110" data-dcnode-id="4255" href="#" role="button"><span data-dcnode-id="4256" instrument_node="">110</span></a><span data-dcnode-id="4254" instrument_node="">) and Bayer et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r111" data-dcnode-id="4252" href="#" role="button"><span data-dcnode-id="4253" instrument_node="">111</span></a><span data-dcnode-id="4251" instrument_node="">) on chronic carbon monoxide poisoning have been reviewed by Penney (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r76" data-dcnode-id="4249" href="#" role="button"><span data-dcnode-id="4250" instrument_node="">76</span></a><span data-dcnode-id="4248" instrument_node="">). Other older studies, many coming out of the Second World War, have not been included in published reviews by this author. For example, Helminen (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r112" data-dcnode-id="4246" href="#" role="button"><span data-dcnode-id="4247" instrument_node="">112</span></a><span data-dcnode-id="4245" instrument_node="">) describes changes in the visual field caused by chronic coal gas (i.e. carbon monoxide) poisoning in 180 patients. The investigation was part of an extensive, systematic examination carried out at the First Medical Clinic of the University in Helsinki, Finland.</span></p><p data-dcnode-id="4239"><span data-dcnode-id="4243" instrument_node="">Sumari (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r113" data-dcnode-id="4241" href="#" role="button"><span data-dcnode-id="4242" instrument_node="">113</span></a><span data-dcnode-id="4240" instrument_node="">) describes the method used in Finland in examining victims of coal gas poisoning and the observations made in connection with it. The subject material comprises the results of the examination of 135 patients of which 71 are certain, “pure” chronic carbon monoxide cases. Of the cohort of 71, objective neurological symptoms were found in 60 cases. Out of 69 cases ophthalmologically examined, 66 gave positive results. Out of 65 cases otoneurologically examined, the reaction of 52 was positive. In some cases the disease seemed to progress, although the patients being examined were then in surroundings free from coal gas.</span></p><p data-dcnode-id="4231"><span data-dcnode-id="4238" instrument_node="">Lumio, in an extensive 1948 study (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r114" data-dcnode-id="4236" href="#" role="button"><span data-dcnode-id="4237" instrument_node="">114</span></a><span data-dcnode-id="4235" instrument_node="">), found fatigue, headache, vertigo, irritation, memory impairment, tinnitus and nausea to be the most frequent symptoms resulting from chronic carbon monoxide poisoning. Hearing disturbances were noted in 78.3% of the patients suffering from chronic carbon monoxide poisoning. A smaller number of hearing disturbances (26.7%) were found in patients exposed to carbon monoxide at work but in whom chronic carbon monoxide poisoning could not be confirmed. Thus, hearing disturbances were present in approximately three times as many patients suffering chronic carbon monoxide poisoning as in patients not affected. The majority of patients had a similar pattern of hearing deficiencies. The threshold of hearing was about normal at frequencies up to 1000 Hz. Hearing loss occurred above that frequency. This pattern of hearing deficiency was noted in 67.7% of patients who had suffered chronic carbon monoxide poisoning, but in only 14% of patients not so affected. Often, patients themselves were not aware of the presence of a hearing deficiency. Of those suffering from chronic carbon monoxide poisoning, 47.9% complained of hearing impairment during the time they were exposed to the carbon monoxide. The audiogram, however, showed changes in 78.3% of the patients with carbon monoxide poisoning. Follow-up examinations revealed that typical hearing losses improved only slightly or not at all. An improvement in hearing was found in only 26.7% of the cases, and it was always slight. The data suggest that typical hearing deficiency may appear during the initial stage of chronic carbon monoxide poisoning, when vestibular symptoms are not yet present. For additional details see the Carbon Monoxide (CO) Headquarters web site (</span><a data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.coheadquarters.com/ChronicCO/indexchronic2.htm" ref="pagearea=body&amp;targetsite=external&amp;targetcat=link&amp;targettype=uri"><span data-dcnode-id="4234" instrument_node="">http://www.coheadquarters.com/ChronicCO/indexchronic2.htm</span></a><span data-dcnode-id="4232" instrument_node="">).</span></p><p data-dcnode-id="4226"><span data-dcnode-id="4230" instrument_node="">Von Zenk (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r115" data-dcnode-id="4228" href="#" role="button"><span data-dcnode-id="4229" instrument_node="">115</span></a><span data-dcnode-id="4227" instrument_node="">) reported on rhino-cochlear-vestibular symptoms in 80 suspected cases of chronic carbon monoxide poisoning. The cochlear findings showed a perceptive disturbance with a high tone loss and largely retroganglionic damage. Subjective symptoms included vertigo that was accompanied by nystagmus more commonly in the confirmed group. There was also a diminution of the sense of smell.</span></p><p data-dcnode-id="4209"><span data-dcnode-id="4225" instrument_node="">Komatsu et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r116" data-dcnode-id="4223" href="#" role="button"><span data-dcnode-id="4224" instrument_node="">116</span></a><span data-dcnode-id="4222" instrument_node="">) examined 733 workers at a steel-making facility. Mean ages of four groups broken out of the cohort was approximately 32 years (no significant difference). Group A1 was exposed to 58–291 mg/m</span><sup data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">3</span></sup><span data-dcnode-id="4219" instrument_node="">, Group A2 to 70–1595 mg/m</span><sup data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">3</span></sup><span data-dcnode-id="4216" instrument_node="">, Group B to &lt; 23 mg/m</span><sup data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">3</span></sup><span data-dcnode-id="4213" instrument_node=""> and Group C to &lt; 12 mg/m</span><sup data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">3</span></sup><span data-dcnode-id="4210" instrument_node=""> carbon monoxide in the course of their normal work. Median COHb saturation was 10–15% in Group A1, 20–25% in Group A2, 1–5% in Group B and 1–5% in Group C. The average frequency of health complaints was much higher for members of Groups A1 and A2 than for those of Groups B and C. A large variety of subjective health complaints were made by Group A1 and especially Group A2 members. For example, the highest frequency of complaints in reports included headache, poor hearing, chest pain, lassitude, fatigue and forgetfulness. A variety of objective health complaints were made by Group A1 and especially Group A2 members. The highest incidences, for example, included pallor, cardiac enlargement (cardiomegaly), coldness of the extremities and hyperactive patellar reflex. Average vital capacity was significantly less for members of Group A at any age than for members of Groups B or C. Average back strength was significantly less for members of Group A at age 30–40 years than for same-age members of Group C. The difference from members of Group B was very large and significant over the entire age range of the two groups.</span></p><p data-dcnode-id="4198"><span data-dcnode-id="4208" instrument_node="">Smith &amp; Landaw (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r117" data-dcnode-id="4206" href="#" role="button"><span data-dcnode-id="4207" instrument_node="">117</span></a><span data-dcnode-id="4205" instrument_node="">) reported that smokers develop polycythaemia. Furthermore, smoking at increased elevation dramatically increases the extent of the polycythaemia. This, along with cardiomegaly, has been demonstrated numerous times following chronic carbon monoxide exposure in animals (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r118" data-dcnode-id="4203" href="#" role="button"><span data-dcnode-id="4204" instrument_node="">118</span></a><span data-dcnode-id="4202" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r119" data-dcnode-id="4200" href="#" role="button"><span data-dcnode-id="4201" instrument_node="">119</span></a><span data-dcnode-id="4199" instrument_node="">).</span></p><p data-dcnode-id="4184"><span data-dcnode-id="4197" instrument_node="">Stern et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r120" data-dcnode-id="4195" href="#" role="button"><span data-dcnode-id="4196" instrument_node="">120</span></a><span data-dcnode-id="4194" instrument_node="">) studied the effects of carbon monoxide exposure on deaths of New York City bridge and tunnel employees over the period 1952–1981. It was found that the tunnel workers experienced a 35% excess risk compared with the New York City general population; among the less exposed bridge workers the risk was not elevated. The elevated risk among the tunnel workers declined significantly within five years after ending occupational exposure, and there was also a significant decline after 1970, when a new ventilation system lowered carbon monoxide levels inside the tunnels and tunnel booths. The 24-hour average tunnel carbon monoxide concentrations were approximately 58 mg/m</span><sup data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">3</span></sup><span data-dcnode-id="4191" instrument_node=""> in 1961 and 47 mg/m</span><sup data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">3</span></sup><span data-dcnode-id="4188" instrument_node=""> in 1968. During periods of rush hour traffic in 1968, carbon monoxide concentrations in tunnel toll booths were as high as 76–192 mg/m</span><sup data-dcnode-id="4186"><span data-dcnode-id="4187" instrument_node="">3</span></sup><span data-dcnode-id="4185" instrument_node="">.</span></p></div><div data-dcnode-id="4054" id="ch2.s16"><h4 data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">Retrospective and case studies</span></h4><p data-dcnode-id="4170"><span data-dcnode-id="4180" instrument_node="">Two questionnaire studies (A and B) of chronic carbon monoxide poisoning in North America have been reported by Penney (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r76" data-dcnode-id="4178" href="#" role="button"><span data-dcnode-id="4179" instrument_node="">76</span></a><span data-dcnode-id="4177" instrument_node="">). A third questionnaire study (C) of 61 individuals sustaining chronic carbon monoxide poisoning was recently reported by Penney (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r121" data-dcnode-id="4175" href="#" role="button"><span data-dcnode-id="4176" instrument_node="">121</span></a><span data-dcnode-id="4174" instrument_node="">). The large questionnaire study conducted in the United Kingdom in 1997 under the title “Carbon monoxide support” has been reviewed by Hay et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r89" data-dcnode-id="4172" href="#" role="button"><span data-dcnode-id="4173" instrument_node="">89</span></a><span data-dcnode-id="4171" instrument_node="">).</span></p><p data-dcnode-id="4147"><span data-dcnode-id="4169" instrument_node="">Two cases of chronic carbon monoxide poisoning in children (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r122" data-dcnode-id="4167" href="#" role="button"><span data-dcnode-id="4168" instrument_node="">122</span></a><span data-dcnode-id="4166" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r123" data-dcnode-id="4164" href="#" role="button"><span data-dcnode-id="4165" instrument_node="">123</span></a><span data-dcnode-id="4163" instrument_node="">) have been discussed by White (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r86" data-dcnode-id="4161" href="#" role="button"><span data-dcnode-id="4162" instrument_node="">86</span></a><span data-dcnode-id="4160" instrument_node="">) and another (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r124" data-dcnode-id="4158" href="#" role="button"><span data-dcnode-id="4159" instrument_node="">124</span></a><span data-dcnode-id="4157" instrument_node="">) by Hay (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r90" data-dcnode-id="4155" href="#" role="button"><span data-dcnode-id="4156" instrument_node="">90</span></a><span data-dcnode-id="4154" instrument_node="">). Armstrong &amp; Cunningham (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r96" data-dcnode-id="4152" href="#" role="button"><span data-dcnode-id="4153" instrument_node="">96</span></a><span data-dcnode-id="4151" instrument_node="">) report on three cases of chronic carbon monoxide poisoning in young children and the functional and developmental effects that resulted. A review of the effect of chronic or intermittent hypoxia on cognition in childhood (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r125" data-dcnode-id="4149" href="#" role="button"><span data-dcnode-id="4150" instrument_node="">125</span></a><span data-dcnode-id="4148" instrument_node="">) included carbon monoxide poisoning; it concluded that adverse effects have been noted at even mild levels of oxygen desaturation and that “studies of high-altitude and carbon monoxide poisoning provide evidence for causality”.</span></p><p data-dcnode-id="4127"><span data-dcnode-id="4146" instrument_node="">Other studies looking at neuropsychological aspects of chronic carbon monoxide exposure such as those of Ryan (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r108" data-dcnode-id="4144" href="#" role="button"><span data-dcnode-id="4145" instrument_node="">108</span></a><span data-dcnode-id="4143" instrument_node="">), Myers et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r110" data-dcnode-id="4141" href="#" role="button"><span data-dcnode-id="4142" instrument_node="">110</span></a><span data-dcnode-id="4140" instrument_node="">), Pinkston et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r126" data-dcnode-id="4138" href="#" role="button"><span data-dcnode-id="4139" instrument_node="">126</span></a><span data-dcnode-id="4137" instrument_node="">), Hartman (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r127" data-dcnode-id="4135" href="#" role="button"><span data-dcnode-id="4136" instrument_node="">127</span></a><span data-dcnode-id="4134" instrument_node="">) and Devine et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r128" data-dcnode-id="4132" href="#" role="button"><span data-dcnode-id="4133" instrument_node="">128</span></a><span data-dcnode-id="4131" instrument_node="">) have recently been thoroughly reviewed by Helffenstein (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r97" data-dcnode-id="4129" href="#" role="button"><span data-dcnode-id="4130" instrument_node="">97</span></a><span data-dcnode-id="4128" instrument_node="">). Helffenstein's findings from his own study of 21 people chronically exposed to carbon monoxide are detailed in that same 2008 source.</span></p><p data-dcnode-id="4122"><span data-dcnode-id="4126" instrument_node="">Ely et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r129" data-dcnode-id="4124" href="#" role="button"><span data-dcnode-id="4125" instrument_node="">129</span></a><span data-dcnode-id="4123" instrument_node="">) describe 30 people who developed “warehouse workers' headache”. COHb levels in the workers most exposed to exhaust gases were 21.1%. It is understood that this condition in the warehouse had continued for some time, making the exposure “chronic” rather than “acute”. A majority of the people experienced acute difficulty with headache, dizziness, weakness, nausea and chest pain. Some complained of shortness of breath, vomiting, muscle cramps, difficulty in concentrating, visual changes and confusion. Follow-up symptoms present two years after the carbon monoxide exposure included numbness in the extremities, restlessness, persistent headaches, irritability, confusion, difficulty in walking or moving the extremities, and memory loss.</span></p><p data-dcnode-id="4114"><span data-dcnode-id="4121" instrument_node="">Walker (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r130" data-dcnode-id="4119" href="#" role="button"><span data-dcnode-id="4120" instrument_node="">130</span></a><span data-dcnode-id="4118" instrument_node="">) states that the incidence of chronic carbon monoxide exposure in Great Britain is officially 200 per year, while at the same time “250 000 gas appliances are condemned annually”. He speculates that if only 10% of these appliances give off significant amounts of carbon monoxide that reach the breathing space of residents, as many as 25 000 people every year may be exposed to carbon monoxide in their homes. The carbon monoxide support study (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r89" data-dcnode-id="4116" href="#" role="button"><span data-dcnode-id="4117" instrument_node="">89</span></a><span data-dcnode-id="4115" instrument_node="">) found that “only one case out of 77 was correctly identified (i.e. diagnosed) on the basis of symptoms alone” and that medical professionals were the least likely group to “discover” the fact of the carbon monoxide poisoning.</span></p><p data-dcnode-id="4109"><span data-dcnode-id="4113" instrument_node="">Thyagarajan et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r131" data-dcnode-id="4111" href="#" role="button"><span data-dcnode-id="4112" instrument_node="">131</span></a><span data-dcnode-id="4110" instrument_node="">) report on a 37-year-old woman chronically exposed to carbon monoxide for seven years. Her symptoms included seizure, persistent tiredness, problems with balance, headache associated with cognitive symptoms, personality changes and depression. Magnetic resonance imaging of her brain five years after the end of carbon monoxide exposure showed a well-defined lesion in the globus pallidus, on the left. Hippocampal atrophy was also suggested. This case indicates that unilateral lesioning resulting from carbon monoxide poisoning can occur.</span></p><p data-dcnode-id="4104"><span data-dcnode-id="4108" instrument_node="">Prochop (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r132" data-dcnode-id="4106" href="#" role="button"><span data-dcnode-id="4107" instrument_node="">132</span></a><span data-dcnode-id="4105" instrument_node="">) reports on the case of four people chronically exposed to carbon monoxide in an apartment building in Florida as the result of a faulty gas heater. All four suffered transient loss of consciousness immediately prior to discovery of the problem. All four incurred cognitive impairments, while two also experienced residual coordinative deficits. Magnetic resonance imaging of the four people was said to be normal. One victim had an abnormal magnetic resonance spectroscopy scan.</span></p><p data-dcnode-id="4099"><span data-dcnode-id="4103" instrument_node="">Sari et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r133" data-dcnode-id="4101" href="#" role="button"><span data-dcnode-id="4102" instrument_node="">133</span></a><span data-dcnode-id="4100" instrument_node="">) investigated an association between chronic carbon monoxide exposure and P-wave and QT interval characteristics of the electrocardiogram in 48 healthy male indoor barbecue workers and 51 age-matched healthy male controls. COHb in the two groups was 6.48% and 2.19%, respectively. Using Pearson analysis, there were significant correlations between COHb level and P-wave duration, maximum QT height, QT duration and corrected QT duration.</span></p><p data-dcnode-id="4088"><span data-dcnode-id="4098" instrument_node="">In a clinical review, Weaver (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r134" data-dcnode-id="4096" href="#" role="button"><span data-dcnode-id="4097" instrument_node="">134</span></a><span data-dcnode-id="4095" instrument_node="">) states that “lower level CO exposures can cause headache, malaise, and fatigue and can result in cognitive difficulties and personality changes”. This assertion is borne out by Chambers et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r135" data-dcnode-id="4093" href="#" role="button"><span data-dcnode-id="4094" instrument_node="">135</span></a><span data-dcnode-id="4092" instrument_node="">) (see Hopkins (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r95" data-dcnode-id="4090" href="#" role="button"><span data-dcnode-id="4091" instrument_node="">95</span></a><span data-dcnode-id="4089" instrument_node="">)), who prospectively followed 256 patients, 55 with “less severe” and 201 with “more severe” carbon monoxide poisoning. Less severe poisoning was defined as no loss of consciousness and a COHb level of ≤ 15%, while more severe poisoning was defined as loss of consciousness or a COHb of &gt;15%. Of the less severely poisoned patients, 39% had cognitive deficits at six weeks. Of those more severely poisoned, 35% had cognitive deficits. In the less vs more severe groups, the incidence of depression was 21% and 16%, respectively, and that of anxiety was 30% and 11%, respectively. There was no difference in cognitive outcomes between the two groups. Interestingly, the prevalence of depression was higher in patients with the less compared with the more severe poisoning at six months. Likewise, the prevalence of anxiety was higher in patients with the less compared with the more severe poisoning at six weeks. These results suggest that loss of consciousness is not a requirement for carbon-monoxide-induced brain damage, and that carbon-monoxide-related cognitive (and other) outcomes may be independent of poisoning severity when that severity is based on COHb saturation.</span></p><p data-dcnode-id="4083"><span data-dcnode-id="4087" instrument_node="">In a recent clinical study, Keles et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r136" data-dcnode-id="4085" href="#" role="button"><span data-dcnode-id="4086" instrument_node="">136</span></a><span data-dcnode-id="4084" instrument_node="">) characterized their patients as having acute carbon monoxide poisoning, when in actual fact most had chronic poisoning since the authors cite coal stoves and water heaters as carbon monoxide sources. These devices do not deteriorate overnight. Many studies do not characterize the exposure condition at all, or will characterize it as acute when in fact it is chronic. The study found that COHb could not be used to rule out carbon monoxide poisoning. This has been known for some time, i.e. the poor relationship between COHb, symptoms and outcome. The most common symptoms they recorded were headache, nausea, dizziness and syncope.</span></p><p data-dcnode-id="4064"><a class="figpopup" data-dcnode-id="4081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t3/%3Freport%3Dobjectonly" rid-figpopup="figch2t3" rid-ob="figobch2t3" target="object"><span data-dcnode-id="4082" instrument_node="">Table 2.3</span></a><span data-dcnode-id="4080" instrument_node=""> provides summary data from five studies on chronic carbon monoxide poisoning: Bayer et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r111" data-dcnode-id="4078" href="#" role="button"><span data-dcnode-id="4079" instrument_node="">111</span></a><span data-dcnode-id="4077" instrument_node="">), Penney (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r76" data-dcnode-id="4075" href="#" role="button"><span data-dcnode-id="4076" instrument_node="">76</span></a><span data-dcnode-id="4074" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r121" data-dcnode-id="4072" href="#" role="button"><span data-dcnode-id="4073" instrument_node="">121</span></a><span data-dcnode-id="4071" instrument_node="">) and Helffenstein (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r97" data-dcnode-id="4069" href="#" role="button"><span data-dcnode-id="4070" instrument_node="">97</span></a><span data-dcnode-id="4068" instrument_node="">). N1 is the number of cases for which air carbon monoxide concentration data are available. N2 is the number of cases for which COHb data are available. It should be noted that, for all five studies, average COHb levels fall within the “less severe” carbon monoxide poisoning group as defined by Chambers et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r135" data-dcnode-id="4066" href="#" role="button"><span data-dcnode-id="4067" instrument_node="">135</span></a><span data-dcnode-id="4065" instrument_node="">).</span></p><div class="iconblock whole_rhythm clearfix ten_col table-wrap" data-dcnode-id="4055" id="figch2t3"><a class="img_link icnblk_img figpopup" data-dcnode-id="4062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t3/%3Freport%3Dobjectonly" rid-figpopup="figch2t3" rid-ob="figobch2t3" target="object" title="Table 2.3"><img alt="Table 2.3. Summary data from five studies on chronic carbon monoxide poisoning." class="small-thumb" data-dcnode-id="4063" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t3/%3Freport%3Dthumb&amp;raw" src-large="/books/NBK138710/table/ch2.t3/?report=previmg"></a><div class="icnblk_cntnt" data-dcnode-id="4056"><h4 data-dcnode-id="4059" id="ch2.t3"><a data-dcnode-id="4060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t3/%3Freport%3Dobjectonly" rid-ob="figobch2t3" target="object"><span data-dcnode-id="4061" instrument_node="">Table 2.3</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">Summary data from
