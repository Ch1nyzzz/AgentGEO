five studies on chronic carbon monoxide poisoning. </span></p></div></div></div><div data-dcnode-id="3907" id="ch2.s17"><h4 data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">Epidemiological studies</span></h4><p data-dcnode-id="4044"><span data-dcnode-id="4051" instrument_node="">Epidemiological studies reported prior to 2000 dealing with carbon monoxide effects relative to mortality, birth weight, asthma, congestive heart failure, coronary artery disease, psychiatric admissions, etc. in humans have been reviewed by Penney (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r76" data-dcnode-id="4049" href="#" role="button"><span data-dcnode-id="4050" instrument_node="">76</span></a><span data-dcnode-id="4048" instrument_node="">). The topic of congestive heart failure and environmental carbon monoxide levels was also reviewed by Morris (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r137" data-dcnode-id="4046" href="#" role="button"><span data-dcnode-id="4047" instrument_node="">137</span></a><span data-dcnode-id="4045" instrument_node="">).</span></p><p data-dcnode-id="4039"><span data-dcnode-id="4043" instrument_node="">Mar et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r138" data-dcnode-id="4041" href="#" role="button"><span data-dcnode-id="4042" instrument_node="">138</span></a><span data-dcnode-id="4040" instrument_node="">) evaluated the association between mortality in the elderly and air pollutants over a three-year period in Phoenix, Arizona. Total mortality was found to be significantly correlated with changes in ambient carbon monoxide and nitrogen dioxide, whereas cardiovascular mortality was significantly associated with carbon monoxide, nitrogen dioxide, sulfur dioxide, etc.</span></p><p data-dcnode-id="4028"><span data-dcnode-id="4038" instrument_node="">Moolgavkar (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r139" data-dcnode-id="4036" href="#" role="button"><span data-dcnode-id="4037" instrument_node="">139</span></a><span data-dcnode-id="4035" instrument_node="">) investigated non-accidental cardiovascular, cerebrovascular and chronic obstructive pulmonary disease deaths over eight years in three American metropolitan areas: two in California and one in Illinois. Carbon monoxide level was particularly found to have a stronger association with mortality than level of particulate matter. This association was noted to be stronger in Los Angeles County. This study is similar to an earlier epidemiological investigation by Hexter &amp; Goldsmith (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r140" data-dcnode-id="4033" href="#" role="button"><span data-dcnode-id="4034" instrument_node="">140</span></a><span data-dcnode-id="4032" instrument_node="">), reviewed by Penney (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r76" data-dcnode-id="4030" href="#" role="button"><span data-dcnode-id="4031" instrument_node="">76</span></a><span data-dcnode-id="4029" instrument_node="">).</span></p><p data-dcnode-id="4020"><span data-dcnode-id="4027" instrument_node="">Hajat et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r141" data-dcnode-id="4025" href="#" role="button"><span data-dcnode-id="4026" instrument_node="">141</span></a><span data-dcnode-id="4024" instrument_node="">) found a relationship between ambient carbon monoxide and asthma consultations for children in London. Sheppard et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r142" data-dcnode-id="4022" href="#" role="button"><span data-dcnode-id="4023" instrument_node="">142</span></a><span data-dcnode-id="4021" instrument_node="">) examined the relationship between asthma and air carbon monoxide levels in Seattle for data during the period 1987–1994. They found a 6% increase in the rate of hospital admissions for asthma related to carbon monoxide, with a three-day lag.</span></p><p data-dcnode-id="4012"><span data-dcnode-id="4019" instrument_node="">Yu et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r143" data-dcnode-id="4017" href="#" role="button"><span data-dcnode-id="4018" instrument_node="">143</span></a><span data-dcnode-id="4016" instrument_node="">), in another study in Seattle, found a 30% increase in asthma in children for a 1.2-mg/m</span><sup data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">3</span></sup><span data-dcnode-id="4013" instrument_node=""> increment in carbon monoxide that lagged one day. They estimated 25% increases in the odds of increases in carbon monoxide, conditional on the previous day's asthma symptoms. It was concluded that there is an association between change in short-term air pollution levels and the occurrence of asthma symptoms among children in Seattle.</span></p><p data-dcnode-id="4007"><span data-dcnode-id="4011" instrument_node="">Karr et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r144" data-dcnode-id="4009" href="#" role="button"><span data-dcnode-id="4010" instrument_node="">144</span></a><span data-dcnode-id="4008" instrument_node="">) analysed nearly 12 000 diagnoses of infant bronchiolitis between 1999 and 2002 in south-west British Columbia. They looked at infants' exposure within 10 km of home, and were able to account for confounding variables including sex, gestational age, maternal smoking and breastfeeding. An interquartile increase in exposure to nitric oxide, nitrogen dioxide, sulfur dioxide and carbon monoxide increased bronchiolitis risk by 8%, 12%, 4% and 13%, respectively. Infants living within 50 metres of a highway had an increased risk of 6%; those living in an area with higher exposure to wood smoke had an increase of 8% in their risk of bronchiolitis. Carbon monoxide posed the largest risk for bronchiolitis among the pollutants examined.</span></p><p data-dcnode-id="3999"><span data-dcnode-id="4006" instrument_node="">In studies by Hong et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r145" data-dcnode-id="4004" href="#" role="button"><span data-dcnode-id="4005" instrument_node="">145</span></a><span data-dcnode-id="4003" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r146" data-dcnode-id="4001" href="#" role="button"><span data-dcnode-id="4002" instrument_node="">146</span></a><span data-dcnode-id="4000" instrument_node="">), the occurrence of acute stroke mortality in Seoul is reported to be related to air pollution. Data covering 4- and 7-year periods were analysed. In the first study, stroke mortality increased 4.1% with a two-day lag. In the second study, a significantly increased risk of 1.06 (95% CI 1.02–1.09) was found for carbon monoxide, with a one-day lag. Nitrogen dioxide and ozone also appeared to play a role. This suggests, according to the authors, “an acute pathogenetic process in the cerebrovascular system induced by air pollution”.</span></p><p data-dcnode-id="3994"><span data-dcnode-id="3998" instrument_node="">Yang et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r147" data-dcnode-id="3996" href="#" role="button"><span data-dcnode-id="3997" instrument_node="">147</span></a><span data-dcnode-id="3995" instrument_node="">), in a “case cross-over study” carried out on data for Kaohsiung (Taiwan, China), found that carbon monoxide and other air pollutants were significantly associated with increased numbers of admissions for cardiovascular diseases (CVD) on both warm and cool days. This study provides evidence that exposure to “higher levels of ambient contaminants, particularly carbon monoxide, increase the risk of hospital admissions for CVD”.</span></p><p data-dcnode-id="3986"><span data-dcnode-id="3993" instrument_node="">Barnett et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r148" data-dcnode-id="3991" href="#" role="button"><span data-dcnode-id="3992" instrument_node="">148</span></a><span data-dcnode-id="3990" instrument_node="">), looking at data from Australia and New Zealand, found an association between outdoor air quality and cardiovascular hospital admissions. They found that for a 1-mg/m</span><sup data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">3</span></sup><span data-dcnode-id="3987" instrument_node=""> increase in carbon monoxide, there were significant increases in hospital admissions of elderly people for total cardiovascular disease (2.2%), all cardiac disease (2.8%), cardiac failure (6.0%), ischemic heart disease (2.3%) and myocardial infarction (2.9%). In matched analyses, carbon monoxide had the most consistent association.</span></p><p data-dcnode-id="3978"><span data-dcnode-id="3985" instrument_node="">Bell et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r149" data-dcnode-id="3983" href="#" role="button"><span data-dcnode-id="3984" instrument_node="">149</span></a><span data-dcnode-id="3982" instrument_node="">) studied hospital admissions for cardiovascular disease in 126 urban counties in the United States during 1999–2005. They found a positive and statistically significant association between same-day carbon monoxide exposure and increased risk of hospitalization for multiple cardiovascular outcomes (ischemic heart disease, heart rhythm disturbances, heart failure, cerebrovascular disease and total cardiovascular disease). A 1.2-mg/m</span><sup data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">3</span></sup><span data-dcnode-id="3979" instrument_node=""> increase in same-day daily 1-hour maximum carbon monoxide was associated with a 0.96% (95% CI 0.79–1.12) increase in risk of cardiovascular admissions.</span></p><p data-dcnode-id="3964"><span data-dcnode-id="3977" instrument_node="">In 1995, Morris et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r150" data-dcnode-id="3975" href="#" role="button"><span data-dcnode-id="3976" instrument_node="">150</span></a><span data-dcnode-id="3974" instrument_node="">) reported an association between ambient carbon monoxide levels in seven United States cities and hospital admissions for congestive heart failure among elderly people, which showed a consistent association with daily variations in ambient carbon monoxide. This association was independent of season, temperature and other major gaseous pollutants. In 1997, Burnett et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r151" data-dcnode-id="3972" href="#" role="button"><span data-dcnode-id="3973" instrument_node="">151</span></a><span data-dcnode-id="3971" instrument_node="">) found a similar association in ten Canadian cities. The logarithm of the daily high-hour ambient carbon monoxide concentration recorded on the day of admission displayed the strongest and most consistent association with hospital admission rates among the pollutants, after stratifying the time series by month of the year and simultaneously adjusting for temperature, dew point and the other ambient air pollutants. The relative risk for a change from 1.2 mg/m</span><sup data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">3</span></sup><span data-dcnode-id="3968" instrument_node=""> to 3.5 mg/m</span><sup data-dcnode-id="3966"><span data-dcnode-id="3967" instrument_node="">3</span></sup><span data-dcnode-id="3965" instrument_node="">, the 25th and 75th percentiles of the exposure distribution, was 1.065.</span></p><p data-dcnode-id="3959"><span data-dcnode-id="3963" instrument_node="">Yang (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r152" data-dcnode-id="3961" href="#" role="button"><span data-dcnode-id="3962" instrument_node="">152</span></a><span data-dcnode-id="3960" instrument_node="">) re-examined the reported association between air pollutant levels and hospital admissions for congestive heart failure in Taipei in 2008. The data examined covered the period 1996–2004. The number of admissions for congestive heart failure was significantly associated with the environmental presence of carbon monoxide and several other pollutants. Statistically significant positive effects on increased congestive heart failure admissions on cool days were observed only for the carbon monoxide levels.</span></p><p data-dcnode-id="3951"><span data-dcnode-id="3958" instrument_node="">Stieb et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r153" data-dcnode-id="3956" href="#" role="button"><span data-dcnode-id="3957" instrument_node="">153</span></a><span data-dcnode-id="3955" instrument_node="">) conducted a study of nearly 400 000 emergency department visits to 14 hospitals in Canada between the early 1990s and the early 2000s. Twenty-four-hour averages of carbon monoxide and nitrogen dioxide exhibited the most consistent associations with cardiac conditions: 2.1% (95% CI 0.0–4.2) and 2.6% (95% CI 0.2–5.0) increase in visits, respectively, for myocardial infarction and angina per 0.8 mg/m</span><sup data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">3</span></sup><span data-dcnode-id="3952" instrument_node=""> carbon monoxide. Thus, daily average concentrations of carbon monoxide and nitrogen dioxide exhibited the most consistent associations with emergency department visits for cardiac conditions.</span></p><p data-dcnode-id="3943"><span data-dcnode-id="3950" instrument_node="">Dales et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r154" data-dcnode-id="3948" href="#" role="button"><span data-dcnode-id="3949" instrument_node="">154</span></a><span data-dcnode-id="3947" instrument_node="">) examined an association between air pollution and daily numbers of hospital admissions for headache in seven Chilean urban centres during the period 2001–2005. Relative risks for migraine associated with interquartile-range increases for carbon monoxide was 1.11 (95% CI 1.06–1.17) for a 1.3-mg/m</span><sup data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">3</span></sup><span data-dcnode-id="3944" instrument_node=""> increase in carbon monoxide concentration. The authors concluded that air pollution increases the risk of headache in Santiago Province. There was no significant effect of modification by age, sex or season.</span></p><p data-dcnode-id="3935"><span data-dcnode-id="3942" instrument_node="">In a massive epidemiological study, Ritz &amp; Yu (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r155" data-dcnode-id="3940" href="#" role="button"><span data-dcnode-id="3941" instrument_node="">155</span></a><span data-dcnode-id="3939" instrument_node="">) studied a cohort of 125 573 singleton children born in Los Angeles. Excluded were infants born before 37 or after 44 weeks of gestation, those weighing below 1000 or above 5500 grams at birth, those for whom fewer than 10 days of carbon monoxide measurements were available during the last trimester, and those whose mothers suffered from hypertension, diabetes or uterine bleeding during pregnancy. Within the cohort, 2813 (2.2%) were low in birth weight (between 1000 and 2499 grams). Exposure to higher levels of ambient carbon monoxide (&gt; 6.4 mg/m</span><sup data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">3</span></sup><span data-dcnode-id="3936" instrument_node="">, 3-month average) during the last trimester was associated with a significantly increased risk for low birth weight (odds ratio (OR) 1.22; 95% CI 1.03–1.44) after adjustment for potential confounders, including commuting habits in the monitoring area, sex of the child, level of prenatal care, and the age, ethnicity and level of education of the mother. Levels of environmental carbon monoxide previously thought to be extremely low were shown to reduce birth weight in women exposed to carbon monoxide during the last trimester of pregnancy.</span></p><p data-dcnode-id="3930"><span data-dcnode-id="3934" instrument_node="">Maisonet et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r156" data-dcnode-id="3932" href="#" role="button"><span data-dcnode-id="3933" instrument_node="">156</span></a><span data-dcnode-id="3931" instrument_node="">) followed the Los Angeles study with an investigation on birth weight in Boston, MA, Hartford, CT, Philadelphia, PA, Pittsburgh, PA, Springfield, IL and Washington, DC. Their results suggest that exposure to ambient carbon monoxide (and sulfur dioxide) increases the risk of low birth weight at term. This risk is increased by a unit rise in the average concentration of carbon monoxide in the third trimester.</span></p><p data-dcnode-id="3919"><span data-dcnode-id="3929" instrument_node="">Chen et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r157" data-dcnode-id="3927" href="#" role="button"><span data-dcnode-id="3928" instrument_node="">157</span></a><span data-dcnode-id="3926" instrument_node="">) assessed the association between ambient air pollution and daily elementary school absenteeism in Washoe County, Nevada in the period 1996–1998. A total of 27 793 students were enrolled. The daily average absence rate was 5.09% (SD = 1.54%). The daily average carbon monoxide concentration was 3.2 mg/m</span><sup data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">3</span></sup><span data-dcnode-id="3923" instrument_node="">. After adjustment for the effects of weather, day of the week, month, holidays and time trend, they found that carbon monoxide and oxygen were statistically significant predictors of daily absenteeism. For every 1.2-mg/m</span><sup data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">3</span></sup><span data-dcnode-id="3920" instrument_node=""> increase in carbon monoxide concentration, absence increased by 3.79% (95% CI 1.04–6.55).</span></p><p data-dcnode-id="3908"><span data-dcnode-id="3918" instrument_node="">Two studies examining cardiovascular events and long-term exposure to carbon monoxide at ultra-low levels (i.e. 1.2–1.8 mg/m</span><sup data-dcnode-id="3916"><span data-dcnode-id="3917" instrument_node="">3</span></sup><span data-dcnode-id="3915" instrument_node="">) found no significant association with changes in the carbon monoxide concentration in ambient air (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r158" data-dcnode-id="3913" href="#" role="button"><span data-dcnode-id="3914" instrument_node="">158</span></a><span data-dcnode-id="3912" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r159" data-dcnode-id="3910" href="#" role="button"><span data-dcnode-id="3911" instrument_node="">159</span></a><span data-dcnode-id="3909" instrument_node="">).</span></p></div><div data-dcnode-id="3902" id="ch2.s18"><h4 data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">Experimental studies</span></h4><p data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">Past reviews of air quality mainly discuss acute studies of carbon monoxide exposure at lower concentrations. Even though hypoxic stress may have been the only underlying mechanism at work, some nonetheless reported positive effects. It can be argued that when considering exposure to air pollution in human residential and work environments, these studies have limited significance and model rather poorly human responses to long-term carbon monoxide exposure.</span></p></div><div data-dcnode-id="3885" id="ch2.s19"><h4 data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">Symptomatology</span></h4><p data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">Recognizing the onset of carbon monoxide poisoning is crucial, as it can be fatal in just a few minutes. The symptoms are usually non-specific and appear to involve many of the body systems. Common symptoms include headache, lethargy/fatigue, nausea, dizziness and confusion. A victim may also suffer from shortness of breath, cardiac palpitations, convulsion, paralysis, loss of consciousness, coma and eventually death. Many reviews list the step-wise onset of various symptoms in acute carbon monoxide poisoning as they relate to blood COHb levels. However, the relationship in reality between blood carbon monoxide levels and symptomatology is extremely poor. There is no hyperventilation induced by carbon monoxide poisoning or increased salivation, taste/odour changes, eye watering or coughing, as are produced by carbon monoxide's toxic twin, hydrogen cyanide. Age, anaemia, increased elevation, cardiopulmonary disease and prior exposure to carbon monoxide can increase susceptibility to carbon monoxide toxicity. The median level of COHb in people dying of uncomplicated carbon monoxide poisoning is 53–55%.</span></p><p data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">An important key to identifying carbon monoxide poisoning is the victim's environment and immediate past living or work situation. Was the victim exposed to sources of carbon monoxide such as uncontrolled fires, motor vehicles, fuel-burning heaters or other internal combustion engines in a poorly ventilated enclosed space? Are others in that environment (e.g. family members or pets living in the same house) displaying similar symptoms? These facts are critical in accurately identifying carbon monoxide poisoning.</span></p><p data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">First and foremost, the victim must be moved out of the contaminated area into fresh air. Eventually, the carbon monoxide will be eliminated from the blood through normal ventilation, although often serious health damage may be done before this can occur, so emergency measures should be started immediately.</span></p><p data-dcnode-id="3886"><span data-dcnode-id="3893" instrument_node="">In 1895, John Scott Haldane demonstrated that rats survive carbon monoxide poisoning when placed in oxygen at two atmospheres pressure. In 1942, End &amp; Long treated carbon monoxide poisoning in experimental animals with hyperbaric oxygen. The first human clinical use of hyperbaric oxygen therapy in carbon monoxide poisoning was by Smith &amp; Sharp in 1960 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r80" data-dcnode-id="3891" href="#" role="button"><span data-dcnode-id="3892" instrument_node="">80</span></a><span data-dcnode-id="3890" instrument_node="">). This type of therapy is now recommended for most seriously, acutely poisoned victims, but there have been some studies that fail to show its efficacy (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r81" data-dcnode-id="3888" href="#" role="button"><span data-dcnode-id="3889" instrument_node="">81</span></a><span data-dcnode-id="3887" instrument_node="">). If hyperbaric oxygen therapy is to be used, it must be initiated immediately (within 12 hours) on reaching a health care facility.</span></p></div><div data-dcnode-id="3835" id="ch2.s20"><h4 data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">Pathophysiological mechanisms</span></h4><p data-dcnode-id="3875"><span data-dcnode-id="3882" instrument_node="">Since the time of Haldane (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r52" data-dcnode-id="3880" href="#" role="button"><span data-dcnode-id="3881" instrument_node="">52</span></a><span data-dcnode-id="3879" instrument_node="">), it has been presumed that the attachment of carbon monoxide to haemoglobin, thus preventing the carriage of adequate oxygen and the impaired release of oxygen from the remaining oxyhaemoglobin (i.e. hypoxic stress) was the major mechanism by which carbon monoxide exerts its health-damaging effects. At low COHb levels and in the presence of normal vasomotion and hyperaemia, it has been difficult to understand how carbon monoxide can cause immediate or long-term cellular, tissue and organ damage. Evidence for various cellular mechanisms not requiring hypoxic stress has recently appeared. See also </span><a data-dcnode-id="3877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.coheadquarters.com/coacute.mech1.htm" ref="pagearea=body&amp;targetsite=external&amp;targetcat=link&amp;targettype=uri"><span data-dcnode-id="3878" instrument_node="">http://www.coheadquarters.com/coacute.mech1.htm</span></a><span data-dcnode-id="3876" instrument_node="">.</span></p><p data-dcnode-id="3861"><span data-dcnode-id="3874" instrument_node="">Ischiropoulos et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r160" data-dcnode-id="3872" href="#" role="button"><span data-dcnode-id="3873" instrument_node="">160</span></a><span data-dcnode-id="3871" instrument_node="">) found in rat studies that the potent oxidant species, peroxynitrite, was generated in the brain from nitric oxide and that a cascade of events could lead to “oxidative stress” in carbon monoxide poisoning. Thom &amp; Ischiropoulos (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r161" data-dcnode-id="3869" href="#" role="button"><span data-dcnode-id="3870" instrument_node="">161</span></a><span data-dcnode-id="3868" instrument_node="">) reported that platelets released nitric oxide when incubated with carbon monoxide and that carbon monoxide concentrations as low as 12 mg/m</span><sup data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">3</span></sup><span data-dcnode-id="3865" instrument_node=""> were capable of doing this in vitro. They concluded that carbon monoxide levels produced in vivo when humans are exposed to carbon monoxide “can cause endothelial cells to liberate nitric oxide and derived oxidants, and that these products can adversely affect cell physiology”. Using microelectrodes in rats, it was seen that carbon monoxide exposure caused nitric oxide concentration to nearly double to 280 nM through the modulation of nitric oxide synthase (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r162" data-dcnode-id="3863" href="#" role="button"><span data-dcnode-id="3864" instrument_node="">162</span></a><span data-dcnode-id="3862" instrument_node="">).</span></p><p data-dcnode-id="3850"><span data-dcnode-id="3860" instrument_node="">It was found that platelet activating factor was involved in the adherence of neutrophils to brain endothelium after carbon monoxide poisoning and that the process required nitric-oxide-derived oxidants (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r163" data-dcnode-id="3858" href="#" role="button"><span data-dcnode-id="3859" instrument_node="">163</span></a><span data-dcnode-id="3857" instrument_node="">). Thom et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r164" data-dcnode-id="3855" href="#" role="button"><span data-dcnode-id="3856" instrument_node="">164</span></a><span data-dcnode-id="3854" instrument_node="">) postulated that carbon monoxide poisoning causes “adduct formation between myelin basic protein (MBP) and malonylaldehyde, a reactive product of lipid peroxidation, resulting in an immunological cascade”. It was found that carbon-monoxide-poisoned rats displayed impaired maze-learning that did not occur in similar rats made immunologically tolerant to MBP. They suggest that this mechanism may explain brain damage occurring days after treatment for carbon monoxide poisoning, and be the reason for the observed lack of a simple dose–response relationship between COHb level at presentation and outcome. The use of hyperbaric oxygen following carbon monoxide poisoning in rats prevented deficits in maze-learning performance and MBP immune-mediated neurological dysfunction (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r165" data-dcnode-id="3852" href="#" role="button"><span data-dcnode-id="3853" instrument_node="">165</span></a><span data-dcnode-id="3851" instrument_node="">).</span></p><p data-dcnode-id="3845"><span data-dcnode-id="3849" instrument_node="">In blood obtained from 50 patients who had sustained carbon monoxide poisoning, platelet–neutrophil aggregates were detected and plasma myeloperoxidase concentration was elevated, suggesting that the processes seen in animals also operate in humans (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r166" data-dcnode-id="3847" href="#" role="button"><span data-dcnode-id="3848" instrument_node="">166</span></a><span data-dcnode-id="3846" instrument_node="">).</span></p><p data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">Thus, recent studies suggest that the intracellular uptake of carbon monoxide could be a major cause of neurological damage (i.e. brain damage). When carbon monoxide binds to cytochrome oxidase, it causes mitochondrial dysfunction. The release of nitric oxide from platelets and endothelial cells inside blood vessels, forming the free radical peroxynitrite, further inactivates mitochondrial enzymes and damages the vascular endothelium of the brain. The end result is lipid peroxidation of the brain, which starts during recovery from carbon monoxide poisoning. With reperfusion of the brain, leukocyte adhesion and the subsequent release of destructive enzymes and excitatory amino acids amplify the initial oxidative injury. Such endovascular inflammation may be a major mechanism leading to organ dysfunction.</span></p><p data-dcnode-id="3838"><span data-dcnode-id="3842" instrument_node="">Other recent studies indicate that carbon monoxide poisoning can cause immune system dysfunction (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r164" data-dcnode-id="3840" href="#" role="button"><span data-dcnode-id="3841" instrument_node="">164</span></a><span data-dcnode-id="3839" instrument_node="">) that causes decrements in learning not observed in immunologically tolerant animals. This may be based on adduct formation between MBP and malonylaldehyde, a reactive product of lipid peroxidation, resulting in an immunological cascade. Thus, carbon monoxide poisoning appears to trigger immunological reactions, just as a number of other disease states do. Therefore, a third damaging mechanism of carbon monoxide exposure appears to be through its action on the immune system.</span></p><p data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">The information summarized above suggests that the damaging effects of carbon monoxide are not only due to its action in binding to haemoglobin and interfering with oxygen delivery, i.e. hypoxic stress. Although this process certainly takes place and is undoubtedly important in higher-level and acute carbon monoxide poisoning, other processes not previously known result in endothelial inflammation and immune activation, causing interference with blood flow and the destruction of cellular machinery. The operation of these pathways and their products explain the effects of carbon monoxide at very low air–carbon monoxide and COHb levels, and what occurs during extended exposure, and finally the seeming lack of a dose–response relationship between air–carbon monoxide concentration, COHb, immediate symptoms and the long-term health effects.</span></p></div></div><div data-dcnode-id="3714" id="ch2.s21"><h3 data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">Acute exposure</span></h3><div data-dcnode-id="3788" id="ch2.s22"><h4 data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">Effects on exercise duration</span></h4><p data-dcnode-id="3816"><span data-dcnode-id="3829" instrument_node="">There have been no reliable demonstrations of health effects due to acute carbon monoxide exposure in normal, healthy people where exposures resulted in COHb levels below 6%, except for limitation of maximal exercise duration. In laboratory experiments, people exposed to carbon monoxide before maximum exercise tests had reduced exercise duration (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r167" data-dcnode-id="3827" href="#" role="button"><span data-dcnode-id="3828" instrument_node="">167</span></a><span data-dcnode-id="3826" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r172" data-dcnode-id="3824" href="#" role="button"><span data-dcnode-id="3825" instrument_node="">172</span></a><span data-dcnode-id="3823" instrument_node="">). The duration was reduced as an inverse function of COHb level. A linear equation was fitted to the data (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r167" data-dcnode-id="3821" href="#" role="button"><span data-dcnode-id="3822" instrument_node="">167</span></a><span data-dcnode-id="3820" instrument_node="">) but the equation should have been curvilinear. This is clear from inspection of the data because the zero COHb point, had it been included in the fitting, would have been plotted well below the intercept of the fitted curve. At higher COHb, however, the curve is nearly linear. An increase in COHb of 4.5% produced a drop in exercise time of about 30 seconds. In the Ekblom &amp; Huot study (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r167" data-dcnode-id="3818" href="#" role="button"><span data-dcnode-id="3819" instrument_node="">167</span></a><span data-dcnode-id="3817" instrument_node="">), the baseline mean exercise duration was about 5.2 minutes. Another metric of the effect magnitude was calculated by estimating the maximum total calories expended from the amount of work performed. Here, a 4.5% increase in COHb level reduced the maximum exercise from a total expenditure of about 112 kcal to some 90 kcal.</span></p><p data-dcnode-id="3811"><span data-dcnode-id="3815" instrument_node="">The exercise effect of carbon monoxide exposure in healthy subjects was produced by reduced oxygen delivery to the exercising muscle. At 20%, COHb reduced the arterial oxygen content from about 19.8% to about 15.8% by volume. Normally, one would expect reduced oxygen dissociation from arterial blood into muscle tissue because of the shift in the dissociation curve, but in the case of exercising muscle the oxygen partial pressure of the tissue is likely to have been so low that the dissociation shift did not matter (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r167" data-dcnode-id="3813" href="#" role="button"><span data-dcnode-id="3814" instrument_node="">167</span></a><span data-dcnode-id="3812" instrument_node="">).</span></p><p data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">Also, at maximum exercise, no further increase in blood flow to the muscle was possible. Thus, in this experiment, the only appreciable determinant of tissue oxygenation was the COHb. No account of the possible role of carboxymyoglobin was possible.</span></p><p data-dcnode-id="3798"><span data-dcnode-id="3808" instrument_node="">When laboratory maximal exercise testing was done with patients who exhibited stable angina pectoris due to coronary artery disease, the results were quite different from normal subjects (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r173" data-dcnode-id="3806" href="#" role="button"><span data-dcnode-id="3807" instrument_node="">173</span></a><span data-dcnode-id="3805" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r178" data-dcnode-id="3803" href="#" role="button"><span data-dcnode-id="3804" instrument_node="">178</span></a><span data-dcnode-id="3802" instrument_node="">). Here the subjects were also given maximal exercise tests, but the criterion for stopping was not exhaustion but the onset of angina. Subjects were also exposed to lower levels of carbon monoxide, producing a maximum of nearly 6% COHb. In the baseline (no carbon monoxide) condition, the mean maximum exercise time was around 8.2 minutes. Allred et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r175" data-dcnode-id="3800" href="#" role="button"><span data-dcnode-id="3801" instrument_node="">175</span></a><span data-dcnode-id="3799" instrument_node="">) showed that an increase in COHb of 4.5% reduced exercise time by 36 seconds and reduced total maximum energy expenditure from about 64 kcal to about 30 kcal. Thus it is seen that the magnitude of effect produced by an increase in COHb of 4.5% in not dramatically greater than for normal subjects. The difference is that the cardiac impairment has simply reduced the baseline exercise ability.</span></p><p data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">The angina patient's baseline exercise ability was reduced from a maximum energy expenditure of 112 kcal to 64 kcal by the inability of the heart to supply sufficient blood flow to provide oxygen to the exercising muscles. The further decrease in exercise time was due to the same mechanism as for normal subjects (reduced arterial content of the same magnitude), which produced nearly the same magnitude of effect. To be sure, the percentage exercise reduction is greater for the angina patients than for the normal subjects, but this is simply due to the reduction in baseline exercise ability.</span></p><p data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">It is not clear whether the slightly greater observed effect of COHb in the patients compared to the normal subjects would be considered statistically significant or physiologically meaningful. Another consideration in the angina data is the fact that COHb was not extended to higher levels as it was for normal subjects. Clearly, this was done for ethical reasons, but the possibility exists that higher exposures would have led to greater magnitudes of effect than for normal subjects.</span></p><p data-dcnode-id="3789"><span data-dcnode-id="3793" instrument_node="">It might be argued that the data on the effect of carbon monoxide exposure in angina patients contributes little additional information needed for regulatory decisions. However, heart disease is a leading cause of sickness and death worldwide, and it is plausible that coronary artery disease would make patients more susceptible to cardiac failure from increased hypoxic cardiac stress (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r179" data-dcnode-id="3791" href="#" role="button"><span data-dcnode-id="3792" instrument_node="">179</span></a><span data-dcnode-id="3790" instrument_node="">), but there are no data to evaluate this hypothesis. On the other hand, individuals with heart disease represent a large fraction of the population and therefore the angina studies do address an issue of public health concern.</span></p></div><div data-dcnode-id="3742" id="ch2.s23"><h4 data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">Brain function effects</span></h4><p data-dcnode-id="3775"><span data-dcnode-id="3785" instrument_node="">Clinical reports of symptoms of low-level acute carbon monoxide poisoning (headache and nausea) are commonly cited (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r180" data-dcnode-id="3783" href="#" role="button"><span data-dcnode-id="3784" instrument_node="">180</span></a><span data-dcnode-id="3782" instrument_node="">) for COHb levels of 10–20% but were not observed in a double-blind study for COHb levels below 20% (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r181" data-dcnode-id="3780" href="#" role="button"><span data-dcnode-id="3781" instrument_node="">181</span></a><span data-dcnode-id="3779" instrument_node="">). Head ache and nausea were reported in a double-blind study at COHb levels of 25–30% (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r182" data-dcnode-id="3777" href="#" role="button"><span data-dcnode-id="3778" instrument_node="">182</span></a><span data-dcnode-id="3776" instrument_node="">).</span></p><p data-dcnode-id="3767"><span data-dcnode-id="3774" instrument_node="">A large number of behavioural studies were critically reviewed by Benignus (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r183" data-dcnode-id="3772" href="#" role="button"><span data-dcnode-id="3773" instrument_node="">183</span></a><span data-dcnode-id="3771" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r184" data-dcnode-id="3769" href="#" role="button"><span data-dcnode-id="3770" instrument_node="">184</span></a><span data-dcnode-id="3768" instrument_node="">) involving sensory, psychomotor, vigilance, cognitive and schedule-controlled behaviour in both humans and rats. Human studies were largely unreliable in the sense that they were not replicable, sometimes even by their original authors. Rat studies were highly consistent but demonstrated statistically significant effects only when COHb exceeded about 20%.</span></p><p data-dcnode-id="3762"><span data-dcnode-id="3766" instrument_node="">Benignus (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r183" data-dcnode-id="3764" href="#" role="button"><span data-dcnode-id="3765" instrument_node="">183</span></a><span data-dcnode-id="3763" instrument_node="">) meta-analysed the carbon monoxide literature, fitting dose–effect curves and attempting to relate the rat and human carbon monoxide data and the human hypoxia data. The rat carbon monoxide data were meta-analysed and the internal dose (oxygen delivery by arterial blood) was estimated. The extra behavioural effect of hypothermia (which results from COHb increase) was also estimated and subtracted. The internal dose for humans exposed to carbon monoxide was also calculated, but hypothermia (which does not occur in humans for the duration of acute exposures) was not considered. The internal dose for hypoxic hypoxia in humans was calculated, in addition to the hypocapnia (which occurs due to hyperventilation in hypoxic hypoxia but not carbon monoxide exposure). The carbon monoxide effects were corrected by subtracting the effects of hypocapnia. When all of the internal doses and the behaviourally corrected dose–effect curves were compared, they nearly overlay each other. The conclusion was that, when arterial oxygen content was used as the internal dose and extraneous effects were subtracted, the behavioural effects of carbon monoxide hypoxia and hypoxic hypoxia were of equal magnitude for humans and were equal in rate to the magnitude of carbon monoxide hypoxia. The results were expressed in equivalent of estimated COHb.</span></p><p data-dcnode-id="3757"><span data-dcnode-id="3761" instrument_node="">The above-mentioned dose–effect curves reached the 10% effective dose (ED-10) at mean COHb ∼ 20%, with upper and lower 95% confidence limits of about 22.2% and 18.8% (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r184" data-dcnode-id="3759" href="#" role="button"><span data-dcnode-id="3760" instrument_node="">184</span></a><span data-dcnode-id="3758" instrument_node="">). The ED-10 was selected as a point of interest because in the behavioural literature, and with the typical number of subjects, the ED-10 is about the magnitude of effect that becomes statistically significant or behaviourally important. A continuous non-linear function was fitted to the data and thus there is a continuum of magnitude of effect estimates, which may be used to estimate severity of effects between zero and about 30% COHb and higher by extrapolation from rats. It may not be inferred from these results that effects be low a COHb of 20% are absent; they gradually diminish towards zero at a COHb of zero.</span></p><p data-dcnode-id="3749"><span data-dcnode-id="3756" instrument_node="">These results provide an example of compensatory physiological action, i.e. the increased arterial blood flow to the brain sufficient to keep tissue oxygen supply nearly constant (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r73" data-dcnode-id="3754" href="#" role="button"><span data-dcnode-id="3755" instrument_node="">73</span></a><span data-dcnode-id="3753" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r185" data-dcnode-id="3751" href="#" role="button"><span data-dcnode-id="3752" instrument_node="">185</span></a><span data-dcnode-id="3750" instrument_node="">). It was observed by these workers that brain energy metabolism remained statistically unchanged until COHb exceeded 20%, because up to that point blood flow could increase sufficiently to offset the carbon-monoxide-induced hypoxia. At COHb levels of around 30%, the brain metabolism fell precipitously. These physiological results agree almost exactly with the behavioural data.</span></p><p data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">It is interesting that small decreases in mean brain energy metabolism as well as in mean behaviour are estimated to occur below 20% COHb. This could be attributed to an actual small effect or to some small fraction of susceptible subjects having larger effects or to an inappropriate statistical model for the dose–effect curves. This is an area requiring additional study, since at the present stage of knowledge the question cannot be resolved.</span></p><p data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">An implication of the above analysis is that if, owing to some pre-existing cardiovascular or pulmonary disease, the compensatory increase in blood flow were impaired, small increases in COHb could produce larger decreases in tissue oxygen and thus larger behavioural effects. No data have been reported to test this hypothesis.</span></p><p data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">Compromised brain function, in addition to being an adverse effect in itself, can contribute to sensory impairment that could result in failure to detect signs of danger or could impair decision-making capabilities, leading to an inability to respond appropriately to danger. The ability to avoid or flee danger could also be impaired by carbon-monoxide-induced limitations on exercise. Such effects of acute exposure can potentially lead to consequences ranging from minor injuries to serious injuries and death. Behaviourally or physically impaired people exposed to carbon monoxide could also endanger others in their vicinity.</span></p></div><div data-dcnode-id="3737" id="ch2.s24"><h4 data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">Quality of the exposure and effects measures</span></h4><p data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">It has been customary to specify the “dose” of carbon monoxide as either the amount in blood as COHb or as the concentration in the inhaled air. The effects of carbon monoxide are, however, not strictly determined by either of these metrics. The health effects are a product of tissue functioning and these, in turn, are functions of some tissue dose metric. An effort is made below to specify tissue dosimetry where knowledge permits and to point to gaps in knowledge when appropriate.</span></p></div><div data-dcnode-id="3715" id="ch2.s25"><h4 data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">Susceptible populations and effect modifiers</span></h4><p data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">Any person with some form of impaired oxygen uptake and delivery would be more sensitive to the acute hypoxic effects of carbon monoxide exposure. Thus, hypothetically, any cardiac, vascular or pulmonary disease would have such an effect, as would other factors that limit the blood's ability to transport oxygen, such as anaemia. Also, presumably, multiple diseases in a particular person could increase that individual's risk of greater effects; the potential interaction need not necessarily be simply additive. The severity of a given disease state would influence the maximum COHb, possibly before adverse effects became noticeable, and could determine the maximum amount of effort that could be expended. The magnitude of a carbon monoxide effect would depend on the amount of oxygen available for metabolism in the tissue under consideration. Because multiple cardiac, vascular and pulmonary diseases in one person are not uncommon, it would not be surprising if some impaired people were adversely affected by even small increases in COHb. No data are available to evaluate this conjecture, but quantitative physiological analyses to further delimit the range of effects would be possible.</span></p><p data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">Other possible sensitive groups are pregnant women, whose endogenous COHb is greater, and fetuses, whose haemoglobin has somewhat greater affinity to carbon monoxide than that of adults.</span></p><p data-dcnode-id="3720"><span data-dcnode-id="3730" instrument_node="">There are numerous situations in which carbon monoxide is not the only source of hypoxia. Until a person is adapted to high altitude, the resulting arterial hypoxia is directly additive (in terms of arterial oxygen content) to carbon monoxide hypoxia (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r178" data-dcnode-id="3728" href="#" role="button"><span data-dcnode-id="3729" instrument_node="">178</span></a><span data-dcnode-id="3727" instrument_node="">), and the increased pulmonary ventilatory response also increases carbon monoxide uptake. Increased inhaled carbon dioxide increases pulmonary ventilation and thus carbon monoxide uptake. Hydrogen cyanide inhibits tissue respiration and thus adds to hypoxic effects, in addition to strongly stimulating increased pulmonary ventilation. These effects are of interest because all of the above pollutants are combustion products. These effects are enumerated in detail by Benignus (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r184" data-dcnode-id="3725" href="#" role="button"><span data-dcnode-id="3726" instrument_node="">184</span></a><span data-dcnode-id="3724" instrument_node="">) and physiological effects and interactions have also been quantitatively estimated in interesting cases by Benignus (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r186" data-dcnode-id="3722" href="#" role="button"><span data-dcnode-id="3723" instrument_node="">186</span></a><span data-dcnode-id="3721" instrument_node="">) using computerized mathematical models of physiological function. Thus, the presence of any or all of the above combustion gases would exacerbate the effects of carbon monoxide exposure.</span></p><p data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">The concomitant behaviour of people exposed to carbon monoxide can also make them more sensitive to its effects. Higher rates of physical exercise increase pulmonary ventilation, thereby increasing the COHb formation rate, and increase oxygen metabolism, exacerbating the hypoxia. Increased body temperature from external heat or inappropriate clothing would increase pulmonary ventilation. Those who are anxious owing to emotional or psychological conditions have increased pulmonary ventilation.</span></p><p data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">Clearly, impaired persons could be exposed to multiple hypoxic toxicants while engaged in situations in which pulmonary ventilation would be elevated. Even though the carbon monoxide in these environments might be insufficient to produce effects in controlled laboratory experiments, the real world is much more complicated and the possibility of such complex multiple effects cannot be dismissed.</span></p></div></div></div><div data-dcnode-id="3645" id="ch2.s26"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3710"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3711" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3712" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="3708" id="_ch2_s26_"><span data-dcnode-id="3709" instrument_node="">Health risk evaluation</span></h2><p data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">There are several health concerns associated with exposure to carbon monoxide. The best understood health effects appear to be produced by hypoxia due to the binding of carbon monoxide to haemoglobin, which reduces the oxygen-carrying capacity of the blood as well as decreasing the dissociation of oxygen into extravascular tissue. COHb is widely used as a biomarker for carbon monoxide exposure. Carbon monoxide also binds with myoglobin and cytochrome oxidase and P-450, but the magnitude and the effects of such binding are less well explored.</span></p><p data-dcnode-id="3701"><span data-dcnode-id="3705" instrument_node="">High-level exposures (over several hundred mg/m</span><sup data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">3</span></sup><span data-dcnode-id="3702" instrument_node="">) can cause unconsciousness and death. There can be severe and permanent CNS damage, even in cases where individuals do not experience loss of consciousness. Evidence is also mounting that carbon monoxide can produce a cascade of cellular events leading to adverse effects that are not necessarily ascribable to hypoxia (i.e. COHb may be a less reliable biomonitor for these effects).</span></p><div data-dcnode-id="3690" id="ch2.s27"><h3 data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">Acute exposure</span></h3><p data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">Acute laboratory exposure to carbon monoxide in healthy young people has been shown to decrease duration of maximum exercise tests in a COHb (dose)-related manner. The same phenomena were demonstrated in patients with stable angina, but only at a lower range of COHb. The latter effect is presumably due to limitation of heart oxygen supply because of an inability to increase blood flow in the presence of, for example, stenoses in the coronary arteries.</span></p><p data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">In early acute laboratory exposures of healthy young people, brain function (as measured by reduced behavioural performance) was reported to be impaired in a COHb-related manner when COHb ranged from 2.5% to around 10%. These studies were, however, not replicable in any case where such replication was attempted. It has been suggested, based on physiological analysis and extrapolation, that brain function should not be reduced by more than 10% until COHb approaches around 18%. With laboratory carbon monoxide exposures of a few hours' duration, no symptoms were reported, even for COHb approaching 20%. Such high effect thresholds were attributed to the compensatory effect of the increased brain blood flow that accompanies increased COHb.</span></p><p data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">As COHb due to acute exposure increases above 25–30%, people begin to lose consciousness and eventually, as COHb reaches 60% and above, death ensues. Exact COHb values depend on individual susceptibilities, the underlying state of health and, to some extent, the activity level of the individuals concerned.</span></p><p data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">The above data have been considered as evidence that carbon monoxide hypoxia produced the effects. It may not be assumed, however, that non-hypoxic physiological events do not contribute to the effects, because such non-hypoxic effects might be correlated in time and magnitude with COHb. Evidence exists that non-hypoxic events are responsible for impairments that sometimes develop several days after reduction of COHb due to high-level acute carbon monoxide exposure.</span></p></div><div data-dcnode-id="3677" id="ch2.s28"><h3 data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">Chronic, low-level exposure</span></h3><p data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">There is a growing consensus that for carbon monoxide, as with ionizing radiation, a NOAEL exists. Effectively, a so-called “safe level” is arbitrarily set at a point at which a level of health effects is deemed acceptable. Thus, the setting of a guideline for indoor carbon monoxide involves other considerations than simply scientific considerations of carbon monoxide's toxicity.</span></p><p data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">Long-term exposures to lower levels of carbon monoxide have far wider-ranging implications for human health than do acute carbon monoxide exposures. There are many hundreds of millions, indeed billions of people around the world who are currently chronically exposed to carbon monoxide indoors. Such exposure has been reported to alter health in a number of ways, including physical symptoms, sensory–motor changes, cognitive memory deficits, emotional–psychiatric alterations, cardiac events and low birth weight. The evidence for this is derived from clinical toxicological, medical and neuropsychological case reports, case series and other retrospective studies. It is established that many cases of carbon monoxide toxicity are misdiagnosed because the symptoms mimic other health problems.</span></p><p data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">Epidemiological studies involving large population groups, where exposures are generally at relatively low carbon monoxide levels, have demonstrated increased incidences of low birth weight, congenital defects, infant and adult mortality, cardiovascular admissions, congestive heart failure, stroke, asthma, tuberculosis, pneumonia, etc. In both accidental exposure and epidemiological studies, toxic substances other than carbon monoxide were often present in the exposed person's inhaled air. Dose–effect relationships are suggested in some epidemiological studies. The body of literature from both kinds of study is large and growing, and is consistent with subtle but often profound health effects at low carbon monoxide levels.</span></p><p data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">Health damage resulting from chronic, lower-level exposure has been difficult to fully explain on the basis of hypoxia, hypoxaemia and measured COHb, since various physiological mechanisms should quickly compensate. This leads to the conjecture that non-hypoxic mechanisms may be responsible for some of the effects. The lack of good dose–effect relationships in the accidental exposure case study reports also suggests alternative mechanisms of causation. The cellular mechanisms described above from recent experimental studies may well be the avenues by which this health damage occurs.</span></p><p data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">If COHb and hypoxia are not important factors in chronically generated health effects, then an alternative means of referencing severity of exposure must be used. Since COHb level only recognizes initial carbon monoxide uptake, a better measure is arguably to use the product, carbon monoxide concentration × time (i.e. duration of exposure). This parameter more accurately represents the total dose of carbon monoxide received in long-term carbon monoxide exposure, since duration of exposure is explicitly present.</span></p></div><div data-dcnode-id="3672" id="ch2.s29"><h3 data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">Specially sensitive people</span></h3><p data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">Groups at highest risk from carbon monoxide exposure include the unborn and those adults, elderly or not, with coronary artery disease, congestive heart failure or potential stroke, those at risk of sudden death, etc. There is almost certainly also a group of individuals who are extraordinarily sensitive to carbon monoxide but who have no obvious health or unusual physiological conditions and thus cannot be readily identified. They represent that fraction of individuals who lie at the left end of the standard curve when health effects are determined in any population with known exposure history. All of these higher risk groups must be considered when setting carbon monoxide guidelines for indoor air or, for that matter, outdoor air, i.e. the guideline must be low enough to protect all those at highest risk.</span></p></div><div data-dcnode-id="3646" id="ch2.s30"><h3 data-dcnode-id="3670"><span data-dcnode-id="3671" instrument_node="">Quality and weight of evidence</span></h3><p data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">Compelling evidence of carbon-monoxide-induced adverse effects on the cardiovascular system is derived from a series of controlled human exposure studies of individuals with cardiovascular disease at COHb levels relevant to ambient conditions. Carbon monoxide exposure caused decreases the time to angina and ST-segment changes with COHb levels on the range of 2 to 6%.</span></p><p data-dcnode-id="3663"><span data-dcnode-id="3667" instrument_node="">Recent epidemiological studies of chronic environmental exposures are coherent with the results of the controlled human exposure studies. Positive associations between ambient carbon monoxide exposure and ED visits and hospital admissions for ischemic heart disease, congestive heart failure and cardiovascular disease are seen in multiple locations where ambient carbon monoxide concentrations ranged from 0.6 to 10.9 mg/m</span><sup data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">3</span></sup><span data-dcnode-id="3664" instrument_node="">. These carbon monoxide associations generally remained robust in multiple pollutant models. In addition, newer data on pathophysiological mechanisms offer an eventual possible explanation of the chronic effects. These two lines of data support a direct effect of carbon monoxide exposure on cardiovascular morbidity and are considered to have a high weight of evidence.</span></p><p data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">The toxicological studies of carbon monoxide effects on human birth outcomes and fetal development have been critically reviewed. There is evidence that carbon monoxide exposure during pregnancy is associated with reduced fetal growth and low birth weight. Because of inconsistencies in data reporting, exposure assessment and possible confounding of effects by co-pollutants the weight of this evidence is considered limited but suggestive of important health effects.</span></p><p data-dcnode-id="3656"><span data-dcnode-id="3660" instrument_node="">At the present time, the strength of the evidence for important health outcomes is as summarized in </span><a class="figpopup" data-dcnode-id="3658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t4/%3Freport%3Dobjectonly" rid-figpopup="figch2t4" rid-ob="figobch2t4" target="object"><span data-dcnode-id="3659" instrument_node="">Table 2.4</span></a><span data-dcnode-id="3657" instrument_node="">.</span></p><div class="iconblock whole_rhythm clearfix ten_col table-wrap" data-dcnode-id="3647" id="figch2t4"><a class="img_link icnblk_img figpopup" data-dcnode-id="3654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t4/%3Freport%3Dobjectonly" rid-figpopup="figch2t4" rid-ob="figobch2t4" target="object" title="Table 2.4"><img alt="Table 2.4. Strength of evidence." class="small-thumb" data-dcnode-id="3655" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t4/%3Freport%3Dthumb&amp;raw" src-large="/books/NBK138710/table/ch2.t4/?report=previmg"></a><div class="icnblk_cntnt" data-dcnode-id="3648"><h4 data-dcnode-id="3651" id="ch2.t4"><a data-dcnode-id="3652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t4/%3Freport%3Dobjectonly" rid-ob="figobch2t4" target="object"><span data-dcnode-id="3653" instrument_node="">Table 2.4</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">Strength of evidence. </span></p></div></div></div></div><div data-dcnode-id="3475" id="ch2.s31"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3642"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3643" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3644" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="3640" id="_ch2_s31_"><span data-dcnode-id="3641" instrument_node="">Guidelines</span></h2><div data-dcnode-id="3629" id="ch2.s32"><h3 data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">The 24-hour guideline</span></h3><p data-dcnode-id="3630"><span data-dcnode-id="3637" instrument_node="">Chronic carbon monoxide exposure is different from acute exposure in several important respects, as noted above. Thus, a separate guideline is needed to address minimal exposure over 24 hours, rather than the 8-hour period used in the acute guidelines. The latest studies available to us in 2009, especially those epidemiological studies using very large databases and thus producing extremely high-resolution findings, suggest that the appropriate level for carbon monoxide in order to minimize health effects must be positioned below the 8-hour guideline of 10.5 mg/m</span><sup data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">3</span></sup><span data-dcnode-id="3634" instrument_node="">, possibly as low as 4.6–5.8 mg/m</span><sup data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">3</span></sup><span data-dcnode-id="3631" instrument_node="">. This is also essential since the minimal exposure time for this guideline is three times longer.</span></p></div><div data-dcnode-id="3476" id="ch2.s33"><h3 data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">Derivation of a concentration–response factor</span></h3><p data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">Exposure to carbon monoxide reduced maximum exercise ability in healthy, young individuals and reduced the time to angina and, in some cases, the time to ST-segment depression in subjects with cardiovascular disease, albeit at a concentration that was lower than that needed to reduce exercise ability in healthy individuals.</span></p><p data-dcnode-id="3620"><span data-dcnode-id="3624" instrument_node="">The relationship of carbon monoxide exposure and the COHb concentration in blood can be modelled using the differential Coburn-Forster-Kane equation (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r3" data-dcnode-id="3622" href="#" role="button"><span data-dcnode-id="3623" instrument_node="">3</span></a><span data-dcnode-id="3621" instrument_node="">), which provides a good approximation to the COHb concentration at a steady level of inhaled, exogenous carbon monoxide. Based on the laboratory studies of reduction in exercise capacity in both healthy individuals and volunteers with cardiovascular disease, it was determined that COHb levels should not exceed 2%. The CFK equation is used below to determine the levels of carbon monoxide to which a normal adult under resting conditions for various intervals can be exposed without exceeding a COHb level of 2%.</span></p><p data-dcnode-id="3615"><span data-dcnode-id="3619" instrument_node="">The previous WHO guidelines were established for 15 minutes to protect against short-term peak exposures that might occur from, for example, an unvented stove; for 1 hour to protect against excess exposure from, for example, faulty appliances; and for 8 hours (which is relevant to occupational exposures and has been used as an averaging time for ambient exposures). We do not recommend changing the existing guidelines. However, chronic carbon monoxide exposure appears different from acute exposure in several important respects. Thus, a separate guideline is recommended to address 24-hour exposures. This is also relevant because the epidemiological studies (based on 24-hour exposures) using very large databases and thus producing extremely high-resolution findings are now available and indicate important population-level effects at levels that might be lower than the current 8-hour limit. We recommend a series of guidelines relevant to typical indoor exposures, as shown in </span><a class="figpopup" data-dcnode-id="3617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t5/%3Freport%3Dobjectonly" rid-figpopup="figch2t5" rid-ob="figobch2t5" target="object"><span data-dcnode-id="3618" instrument_node="">Table 2.5</span></a><span data-dcnode-id="3616" instrument_node="">.</span></p><div class="iconblock whole_rhythm clearfix ten_col table-wrap" data-dcnode-id="3606" id="figch2t5"><a class="img_link icnblk_img figpopup" data-dcnode-id="3613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t5/%3Freport%3Dobjectonly" rid-figpopup="figch2t5" rid-ob="figobch2t5" target="object" title="Table 2.5"><img alt="Table 2.5. Indoor carbon monoxide guidelines." class="small-thumb" data-dcnode-id="3614" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t5/%3Freport%3Dthumb&amp;raw" src-large="/books/NBK138710/table/ch2.t5/?report=previmg"></a><div class="icnblk_cntnt" data-dcnode-id="3607"><h4 data-dcnode-id="3610" id="ch2.t5"><a data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138710/table/ch2.t5/%3Freport%3Dobjectonly" rid-ob="figobch2t5" target="object"><span data-dcnode-id="3612" instrument_node="">Table 2.5</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">Indoor carbon monoxide guidelines. </span></p></div></div><blockquote data-dcnode-id="3603"><p data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">The guidelines section was formulated and agreed by the working group meeting in November 2009.</span></p></blockquote><div class="box" data-dcnode-id="3477" id="ch2.box1"><h3 data-dcnode-id="3600"><span class="title" data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">Summary of main evidence and decision-making in guideline formulation</span></span></h3><div data-dcnode-id="3595" id="ch2.box1.s1"><h4 data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">Critical outcome for guideline definition</span></h4><p data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">Acute exposure-related reduction of exercise tolerance and increase in symptoms of ischaemic heart disease (e.g. ST-segment changes).</span></p></div><div data-dcnode-id="3581" id="ch2.box1.s2"><h4 data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">Source of exposure–effect evidence</span></h4><p data-dcnode-id="3582"><span data-dcnode-id="3592" instrument_node="">Laboratory dose–effect experiments with human subjects with stable angina exposed to carbon monoxide (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r173" data-dcnode-id="3590" href="#" role="button"><span data-dcnode-id="3591" instrument_node="">173</span></a><span data-dcnode-id="3589" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r178" data-dcnode-id="3587" href="#" role="button"><span data-dcnode-id="3588" instrument_node="">178</span></a><span data-dcnode-id="3586" instrument_node="">). COHb elevated above 2% caused ST-segment changes and decreased time to angina. The CFK equation (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r3" data-dcnode-id="3584" href="#" role="button"><span data-dcnode-id="3585" instrument_node="">3</span></a><span data-dcnode-id="3583" instrument_node="">) was used to calculate exposure levels to which a normal adult under resting conditions can be exposed for various intervals without exceeding 2% COHb to calculate guideline levels.</span></p></div><div data-dcnode-id="3552" id="ch2.box1.s3"><h4 data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">Supporting evidence</span></h4><dl class="temp-labeled-list" data-dcnode-id="3553"><dt data-dcnode-id="3577"><span data-dcnode-id="3578" instrument_node="">–</span></dt><dd data-dcnode-id="3568"><p class="no_top_margin" data-dcnode-id="3569"><span data-dcnode-id="3576" instrument_node="">Laboratory dose–effect exercise experiments in non-angina (normal) subjects (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r167" data-dcnode-id="3574" href="#" role="button"><span data-dcnode-id="3575" instrument_node="">167</span></a><span data-dcnode-id="3573" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r172" data-dcnode-id="3571" href="#" role="button"><span data-dcnode-id="3572" instrument_node="">172</span></a><span data-dcnode-id="3570" instrument_node="">).</span></p></dd><dt data-dcnode-id="3566"><span data-dcnode-id="3567" instrument_node="">–</span></dt><dd data-dcnode-id="3554"><p class="no_top_margin" data-dcnode-id="3555"><span data-dcnode-id="3565" instrument_node="">Numerous epidemiological studies on effects of acute and chronic exposure to carbon monoxide, including studies on health effects when daily mean levels were in the range 0.6–10.9 mg/m</span><sup data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">3</span></sup><span data-dcnode-id="3562" instrument_node="">, provide sufficient evidence of a relationship between long-term exposure and cardiovascular morbidity (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r145" data-dcnode-id="3560" href="#" role="button"><span data-dcnode-id="3561" instrument_node="">145</span></a><span data-dcnode-id="3559" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r157" data-dcnode-id="3557" href="#" role="button"><span data-dcnode-id="3558" instrument_node="">157</span></a><span data-dcnode-id="3556" instrument_node="">).</span></p></dd></dl></div><div data-dcnode-id="3512" id="ch2.box1.s4"><h4 data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">Results of other reviews</span></h4><dl class="temp-labeled-list" data-dcnode-id="3513"><dt data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">–</span></dt><dd data-dcnode-id="3528"><p class="no_top_margin" data-dcnode-id="3529"><i data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">Air quality guidelines for Europe, 2nd ed. Chapter 5.5, carbon monoxide.</span></i><span data-dcnode-id="3545" instrument_node=""> The guidelines were established for 15 minutes (100 mg/m</span><sup data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">3</span></sup><span data-dcnode-id="3542" instrument_node="">), for 1 hour (35 mg/ m</span><sup data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">3</span></sup><span data-dcnode-id="3539" instrument_node="">) and for 8 hours (10 mg/ m</span><sup data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">3</span></sup><span data-dcnode-id="3536" instrument_node="">) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r41" data-dcnode-id="3534" href="#" role="button"><span data-dcnode-id="3535" instrument_node="">41</span></a><span data-dcnode-id="3533" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r42" data-dcnode-id="3531" href="#" role="button"><span data-dcnode-id="3532" instrument_node="">42</span></a><span data-dcnode-id="3530" instrument_node="">).</span></p></dd><dt data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">–</span></dt><dd data-dcnode-id="3514"><p class="no_top_margin" data-dcnode-id="3515"><span data-dcnode-id="3525" instrument_node="">European Commission's INDEX project proposed guidelines: for 1 hour, 30 mg/m</span><sup data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">3</span></sup><span data-dcnode-id="3522" instrument_node="">; for 8 hours, 10 mg/m</span><sup data-dcnode-id="3520"><span data-dcnode-id="3521" instrument_node="">3</span></sup><span data-dcnode-id="3519" instrument_node="">(</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r78" data-dcnode-id="3517" href="#" role="button"><span data-dcnode-id="3518" instrument_node="">78</span></a><span data-dcnode-id="3516" instrument_node="">).</span></p></dd></dl></div><div data-dcnode-id="3489" id="ch2.box1.s5"><h4 data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">Guidelines</span></h4><p data-dcnode-id="3505"><span data-dcnode-id="3509" instrument_node="">15 minutes – 100 mg/m</span><sup data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">3</span></sup><span data-dcnode-id="3506" instrument_node="">.</span></p><p data-dcnode-id="3500"><span data-dcnode-id="3504" instrument_node="">1 hour – 35 mg/ m</span><sup data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">3</span></sup><span data-dcnode-id="3501" instrument_node="">.</span></p><p data-dcnode-id="3495"><span data-dcnode-id="3499" instrument_node="">8 hours – 10 mg/ m</span><sup data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">3</span></sup><span data-dcnode-id="3496" instrument_node="">.</span></p><p data-dcnode-id="3490"><span data-dcnode-id="3494" instrument_node="">24 hours – 7 mg/m</span><sup data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">3</span></sup><span data-dcnode-id="3491" instrument_node="">.</span></p></div><div data-dcnode-id="3478" id="ch2.box1.s6"><h4 data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">Comments</span></h4><p data-dcnode-id="3479"><span data-dcnode-id="3486" instrument_node="">The addition of a guideline for 24 hours (7 mg/m</span><sup data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">3</span></sup><span data-dcnode-id="3483" instrument_node="">) to the WHO 2000 guidelines (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch2.r41" data-dcnode-id="3481" href="#" role="button"><span data-dcnode-id="3482" instrument_node="">41</span></a><span data-dcnode-id="3480" instrument_node="">) to address the risk of long-term exposure.</span></p></div></div></div></div><div data-dcnode-id="620" id="ch2.rl1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3472"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3473" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3474" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="3470" id="_ch2_rl1_"><span data-dcnode-id="3471" instrument_node="">References</span></h2><dl class="temp-labeled-list" data-dcnode-id="621"><dt data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">1.</span></dt><dd data-dcnode-id="3456"><div class="bk_ref" data-dcnode-id="3457" id="ch2.r1"><span class="ref-journal" data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">Carbon monoxide.</span></span><span data-dcnode-id="3465" instrument_node=""> Geneva: World Health Organization; 1979.  [12 May 2010].  (Environmental Health Criteria 13) (</span><a data-dcnode-id="3459"
