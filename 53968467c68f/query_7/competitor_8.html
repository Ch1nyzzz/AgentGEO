</span><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">The air we breathe has a significant and immediate impact on our health and the way our bodies function. Because of this, it’s important (and totally worth it!) to make sure that we’re consistently surrounded by air of only the highest quality.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="722" instrument_node="">There are many factors that influence indoor air quality, including&nbsp;temperature, humidity, circulation and quality of outside air, or exposure to other pollutants or chemicals.&nbsp;There are some things we </span><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thisoldhouse.com/how-to/how-to-properly-vent-bathroom" target="_blank"><span data-dcnode-id="721" instrument_node="">can control</span></a><span data-dcnode-id="719" instrument_node=""> about these factors, and others that we </span><a data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2017/10/16/opinion/california-fires-air-quality.html%3F_r%3D0" target="_blank"><span data-dcnode-id="718" instrument_node="">simply cannot</span></a><span data-dcnode-id="716" instrument_node="">.</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="713" instrument_node="">First, check out this </span><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/indoor-air-quality-iaq/inside-story-guide-indoor-air-quality" target="_blank"><span data-dcnode-id="712" instrument_node="">comprehensive resource from the EPA</span></a><span data-dcnode-id="710" instrument_node=""> about indoor air quality and why it’s important. Then, take a deep breath and reduce your risk for illness or complications with these tips for your apartment.</span></p><span data-dcnode-id="708" instrument_node="">
</span><h2 data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Monitor, monitor, monitor</span></h2><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">The first step to improving and maintaining the air quality of your home is to make sure you know what exactly is floating around in your air. Carbon monoxide is one of the most common indoor air pollutants and causes a large number of deaths and illnesses per year. It is a by-product of combustion, which means that it’s present wherever fuel is being burned. The dangerous gas is released when fuel doesn’t burn fully, which can happen with household appliances such as gas stovetops, central heating systems, water heaters, or furnaces.</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Once you’ve installed a simple carbon monoxide detector (it looks just like a smoke detector) in your apartment, you’ll be able to know immediately when there’s something in the air that just isn’t right. If this does happen, get yourself and your roommates to fresh air and call emergency services to address the problem.</span></p><span data-dcnode-id="699" instrument_node="">
</span><h2 data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Fix leaks&nbsp;and ventilate properly</span></h2><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Another common cause of indoor air pollution is mold and mildew, which tends to form in the kitchen, bathroom, or basement and is caused by lack of ventilation that traps moisture inside. If you come across a leak in your apartment, no matter how small it may seem, make sure to alert your landlord as soon as possible so that they can take the proper action in a timely fashion.</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Further, when you use your shower or bath tub, make sure you use a ventilation fan (typically installed in most apartments) or open the window to let out the humidity caused by the warm water. The same thing goes for the kitchen and other rooms when you’re cooking or using appliances that omit lots of heat, gas, or humidity.</span></p><span data-dcnode-id="690" instrument_node="">
</span><h2 data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Keep the chemicals to a minimum</span></h2><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">There are many things around the house that you might feel the need to use chemicals for, the two most prominent of which are cleaning and keeping pests away. When you can, substitute these chemicals with natural precautions and solutions.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="683" instrument_node="">For example, patch up any small holes or crevices in your walls before any pests can get to them, and make sure you store all food items in tightly sealed containers. Additionally, get a trash can with a lid and make sure you sweep up those crumbs that just fell off the fresh batch of chocolate chip cookies you may or may not have just eaten entirely by yourself. There are also quite a few </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/56844/natural-pest-control/"><span data-dcnode-id="682" instrument_node="">natural pest control solutions</span></a><span data-dcnode-id="680" instrument_node=""> out there, including fruit fly traps that you can place on your counter and essential oils that you can mix together and spray into the air.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="677" instrument_node="">When it comes to cleaning, try to keep the same principles in mind. Eliminate chemicals that give off caustic odors and linger in the air long after being put away. Toxic cleaning chemicals consist both intentionally added ingredients and naturally occurring ones that can cause cancer, respiratory problems, or other related health issues. Opt for a mix of </span><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/6244/natural-cleaning-tips/"><span data-dcnode-id="676" instrument_node="">natural ingredients</span></a><span data-dcnode-id="674" instrument_node=""> or — if you’re not much of a DIYer — a cleaning product that’s made out of them.</span></p><span data-dcnode-id="672" instrument_node="">
</span><h2 data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Minimize dust collection</span></h2><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">While completely getting rid of dust sounds like one of the most impossible tasks of all time&nbsp;(ever try&nbsp;to control a rogue dust bunny?), there are a few household items that you can get rid of that tend to collect the most dust. First off, carpeting. You might have requirements from your landlord about how much of your floor has to be covered with rugs (usually for noise reduction reasons), so make sure you’re following those. That said, don’t go overboard with the fuzzy floors, as the fluffier and more vast your carpet is, the more dust it is likely to collect.</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Also be sure to keep a close eye on curtains, blinds, and high surfaces (the top of your bookshelf of refrigerator) and dust them regularly with a clean rag or duster.</span></p><span data-dcnode-id="663" instrument_node="">
</span><h2 data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Purify</span></h2><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="659" instrument_node="">Although they can’t defend against gas or moisture, indoor air purifiers are a great addition to the rest of the efforts you’re putting in to make the air in&nbsp;your home as clean as possible. Air purifiers are particularly useful when there are environmental conditions in the outside air, like smoke or pollen, as they function to remove these airborne particles in a quick and efficient way. </span><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smarthome.guide/best-air-purifiers/"><span data-dcnode-id="658" instrument_node="">Do your research</span></a><span data-dcnode-id="656" instrument_node=""> before making a decision on one, and remember to continue to take the rest of the aforementioned precautions as well.</span></p><span data-dcnode-id="654" instrument_node="">
