d="4902" instrument_node="">2</span></sub><span data-dcnode-id="4900" instrument_node="">Cl</span><sub data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">4</span></sub><span data-dcnode-id="4897" instrument_node="">; molecular weight 165.83) is a readily volatile, colourless liquid with an ether-like smell (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r1" data-dcnode-id="4895" href="#" role="button"><span data-dcnode-id="4896" instrument_node="">1</span></a><span data-dcnode-id="4894" instrument_node="">). Its main physical and chemical properties are as follows (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4892" href="#" role="button"><span data-dcnode-id="4893" instrument_node="">2</span></a><span data-dcnode-id="4891" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r5" data-dcnode-id="4889" href="#" role="button"><span data-dcnode-id="4890" instrument_node="">5</span></a><span data-dcnode-id="4888" instrument_node="">): molecular weight 165.83 g/mol; density (at 20 °C) 1.6227 g/ml; melting point approximately −22 °C; boiling point 121 °C; water solubility (at 25 °C) 150 mg/litre; vapour pressure 18.47 mmHg at 25 °C (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4886" href="#" role="button"><span data-dcnode-id="4887" instrument_node="">2</span></a><span data-dcnode-id="4885" instrument_node="">), 1.9 kPa at 20 °C, 3.2 kPa at 30 °C and 6.0 kPa at 40 °C (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r3" data-dcnode-id="4883" href="#" role="button"><span data-dcnode-id="4884" instrument_node="">3</span></a><span data-dcnode-id="4882" instrument_node="">); Henry's Law constant 0.018 atm-m</span><sup data-dcnode-id="4880"><span data-dcnode-id="4881" instrument_node="">3</span></sup><span data-dcnode-id="4879" instrument_node="">/mol at 25 °C; log K</span><sub data-dcnode-id="4877"><span data-dcnode-id="4878" instrument_node="">ow</span></sub><span data-dcnode-id="4876" instrument_node=""> (octanol/water partition coefficient) 3.40 (measurement value) and 2.97 (estimated value); and log K</span><sub data-dcnode-id="4874"><span data-dcnode-id="4875" instrument_node="">oc</span></sub><span data-dcnode-id="4873" instrument_node=""> (octanol/carbon partition coefficient) 177∼350 (measurement value). The reaction rate constant against the hydroxyl radical is 1.7 × 10</span><sup data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">−13</span></sup><span data-dcnode-id="4870" instrument_node=""> cm</span><sup data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">3</span></sup><span data-dcnode-id="4867" instrument_node="">/molecule per second at 25 °C, against ozone 2.0 × 10</span><sup data-dcnode-id="4865"><span data-dcnode-id="4866" instrument_node="">−23</span></sup><span data-dcnode-id="4864" instrument_node=""> cm</span><sup data-dcnode-id="4862"><span data-dcnode-id="4863" instrument_node="">3</span></sup><span data-dcnode-id="4861" instrument_node="">/molecule per second at 25 °C and against the NO</span><sub data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">3</span></sub><span data-dcnode-id="4858" instrument_node=""> radical 5.2 × 10</span><sup data-dcnode-id="4856"><span data-dcnode-id="4857" instrument_node="">−17</span></sup><span data-dcnode-id="4855" instrument_node=""> cm</span><sup data-dcnode-id="4853"><span data-dcnode-id="4854" instrument_node="">3</span></sup><span data-dcnode-id="4852" instrument_node="">/molecule per second.</span></p><p data-dcnode-id="4849"><span data-dcnode-id="4850" instrument_node="">Its structural formula is:</span></p><div class="pmc_disp_formula whole_rhythm clearfix" data-dcnode-id="4842" id="ch9.eq1"><div class="inline_block pmc_inline_block pmc_va_middle pmc_hide_overflow twelve_col" data-dcnode-id="4846"><span data-dcnode-id="4848" instrument_node="">
</span><img alt="Image ch9fu1.jpg" data-dcnode-id="4847" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/bin/ch9fu1.jpg&amp;raw"></div><div class="inline_block pmc_inline_block pmc_va_middle pmc_hide_overflow last bk_equ_label" data-dcnode-id="4843"><div data-dcnode-id="4844"><span class="nowrap" data-dcnode-id="4845"></span></div></div></div><p data-dcnode-id="4840"><span data-dcnode-id="4841" instrument_node="">Common synonyms include perchloroethylene, PCE, ethylene tetrachloride, tetrachloroethene, 1,1,2,2-tetrachloroethylene, carbon dichloride, perchlor, tetrachloroethane, carbon bichloride, PERC, PCE and perk.</span></p><div data-dcnode-id="4823" id="ch9.s2"><h3 data-dcnode-id="4838"><span data-dcnode-id="4839" instrument_node="">Conversion factors</span></h3><p data-dcnode-id="4824"><span data-dcnode-id="4837" instrument_node="">At 760 mmHg and 20 °C, 1 ppm = 6.897 mg/m</span><sup data-dcnode-id="4835"><span data-dcnode-id="4836" instrument_node="">3</span></sup><span data-dcnode-id="4834" instrument_node=""> and 1 mg/m</span><sup data-dcnode-id="4832"><span data-dcnode-id="4833" instrument_node="">3</span></sup><span data-dcnode-id="4831" instrument_node=""> = 0.145 ppm; at 25 °C, 1 ppm = 6.782 mg/m</span><sup data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node="">3</span></sup><span data-dcnode-id="4828" instrument_node=""> and 1 mg/m</span><sup data-dcnode-id="4826"><span data-dcnode-id="4827" instrument_node="">3</span></sup><span data-dcnode-id="4825" instrument_node=""> = 0.147 ppm.</span></p></div><div data-dcnode-id="4809" id="ch9.s3"><h3 data-dcnode-id="4821"><span data-dcnode-id="4822" instrument_node="">Applications and uses</span></h3><p data-dcnode-id="4810"><span data-dcnode-id="4820" instrument_node="">Major industrial applications of PCE are as a synthetic raw material of hydrochlorofluorocarbon, a dry cleaning agent, a degreaser for manufactured metal parts and an industrial solvent. Other applications include the finishing and processing of textiles, the production of paint removers and printing inks, and the formulation of adhesives and specialized cleaning fluids. Consumer products that may contain PCE include adhesives, fragrances, spot removers, stain removers, fabric finishes, water repellents, wood cleaners, motor vehicle cleaners and dry-cleaned fabrics (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r6" data-dcnode-id="4818" href="#" role="button"><span data-dcnode-id="4819" instrument_node="">6</span></a><span data-dcnode-id="4817" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r8" data-dcnode-id="4815" href="#" role="button"><span data-dcnode-id="4816" instrument_node="">8</span></a><span data-dcnode-id="4814" instrument_node="">). In Japan, 69%, 18%, 12%, and 1.3% of PCE was used as a synthetic raw material of hydrochlorofluorocarbon, a dry cleaning agent, a degreaser and an industrial solvent, respectively (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r9" data-dcnode-id="4812" href="#" role="button"><span data-dcnode-id="4813" instrument_node="">9</span></a><span data-dcnode-id="4811" instrument_node="">).</span></p></div><div data-dcnode-id="4792" id="ch9.s4"><h3 data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">Production</span></h3><p data-dcnode-id="4793"><span data-dcnode-id="4806" instrument_node="">The estimated production volume in the United States in 1990 was 137 kilotonnes, compared to 282 kilotonnes in 1980 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4804" href="#" role="button"><span data-dcnode-id="4805" instrument_node="">2</span></a><span data-dcnode-id="4803" instrument_node="">). In 1994, the total production of PCE in the EU was 164 kilotonnes. Of this amount, 78 kilotonnes was sold for use within the EU, 56 kilotonnes were exported and the remainder used as a chemical intermediate within the chemical industry (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r10" data-dcnode-id="4801" href="#" role="button"><span data-dcnode-id="4802" instrument_node="">10</span></a><span data-dcnode-id="4800" instrument_node="">). For Japan and the United States, it was 178 and 102 kilotonnes, respectively (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r1" data-dcnode-id="4798" href="#" role="button"><span data-dcnode-id="4799" instrument_node="">1</span></a><span data-dcnode-id="4797" instrument_node="">). In Canada, where PCE is no longer produced, the demand in 1990 was estimated at 14 kilotonnes (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r7" data-dcnode-id="4795" href="#" role="button"><span data-dcnode-id="4796" instrument_node="">7</span></a><span data-dcnode-id="4794" instrument_node="">). In Japan, the production and supply of PCE was 25 and 37 kilotonnes, respectively. No estimates of consumption levels are available for other parts of the world.</span></p></div><div data-dcnode-id="4784" id="ch9.s5"><h3 data-dcnode-id="4790"><span data-dcnode-id="4791" instrument_node="">Analytical methods in air</span></h3><p data-dcnode-id="4785"><span data-dcnode-id="4789" instrument_node="">Common methods of measuring indoor concentrations of TCE include integrated active and passive sampling methods using tubes packed with a carbon-based sorbent or evacuated SUMMA canisters (passivated canister sampling apparatus), or diffusion samplers such as charcoal badges. Canister sampling involves controlling the flow of air into a pre-evacuated canister. Sorbent tubes and badges retain compounds according to the affinity of the sorbent for that compound. For sorbent or charcoal sampling, the analytes must first be extracted thermally or chemically, then separated using gas chromatography and identified using a detection method such as mass spectrometry (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r11" data-dcnode-id="4787" href="#" role="button"><span data-dcnode-id="4788" instrument_node="">11</span></a><span data-dcnode-id="4786" instrument_node="">). Personal exposure studies often use these sorbent-based methods.</span></p></div><div data-dcnode-id="4749" id="ch9.s6"><h3 data-dcnode-id="4782"><span data-dcnode-id="4783" instrument_node="">Environmental fate</span></h3><p data-dcnode-id="4774"><span data-dcnode-id="4781" instrument_node="">There are no known natural sources of PCE. The Henry's Law constant indicates that PCE is expected to volatilize rapidly from water surfaces and that volatilization from moist soil surfaces may occur (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r1" data-dcnode-id="4779" href="#" role="button"><span data-dcnode-id="4780" instrument_node="">1</span></a><span data-dcnode-id="4778" instrument_node="">). Concentrations in ambient air may fluctuate widely over relatively short periods of time depending on the strength of the emission source, variations in wind direction and velocity, and scavenging and photodecomposition (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r6" data-dcnode-id="4776" href="#" role="button"><span data-dcnode-id="4777" instrument_node="">6</span></a><span data-dcnode-id="4775" instrument_node="">).</span></p><p data-dcnode-id="4760"><span data-dcnode-id="4773" instrument_node="">The half-life in the atmosphere has been estimated to range from 70 to 250 days (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4771" href="#" role="button"><span data-dcnode-id="4772" instrument_node="">2</span></a><span data-dcnode-id="4770" instrument_node="">).Considering the atmospheric concentrations and reaction rate constant of the hydroxyl radical and ozone, this removal from atmosphere is mostly due to reaction with hydroxyl radicals. This process is temperature-dependent, with increased reaction rates in the summer. The results of biodegradability tests suggested that the biodegradability of PCE is extremely low in environmental water (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r12" data-dcnode-id="4768" href="#" role="button"><span data-dcnode-id="4769" instrument_node="">12</span></a><span data-dcnode-id="4767" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r13" data-dcnode-id="4765" href="#" role="button"><span data-dcnode-id="4766" instrument_node="">13</span></a><span data-dcnode-id="4764" instrument_node="">); it may persist in groundwater for several months or more (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r7" data-dcnode-id="4762" href="#" role="button"><span data-dcnode-id="4763" instrument_node="">7</span></a><span data-dcnode-id="4761" instrument_node="">).</span></p><p data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">The main sources resulting in ambient air concentrations are industrial emissions and releases from building and consumer products. Releases are primarily to the atmosphere, but the compound is also released to surface water and land in sewage sludges and in other liquid and solid waste, where it can evaporate rapidly to the atmosphere.</span></p><p data-dcnode-id="4750"><span data-dcnode-id="4757" instrument_node="">ATSDR has estimated that 80–85% of the PCE used annually in the United States is released into the atmosphere (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4755" href="#" role="button"><span data-dcnode-id="4756" instrument_node="">2</span></a><span data-dcnode-id="4754" instrument_node="">). Atmospheric emissions result from evaporation during dry cleaning, metal degreasing, the production of fluorocarbons and other chemicals, and miscellaneous solvent-associated applications (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r14" data-dcnode-id="4752" href="#" role="button"><span data-dcnode-id="4753" instrument_node="">14</span></a><span data-dcnode-id="4751" instrument_node="">). However, the percentage is likely to be lower in the United States at present, owing to improved technology and regulatory restrictions. Almost all PCE enters the atmosphere unchanged. A small proportion enters water and wastewater. From surface water, PCE volatilizes owing to its relatively low water solubility and high vapour pressure.</span></p></div></div><div data-dcnode-id="4684" id="ch9.s7"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="4745"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="4746" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="4747" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="4743" id="_ch9_s7_"><span data-dcnode-id="4744" instrument_node="">Indoor sources and pathways of exposure</span></h2><p data-dcnode-id="4738"><span data-dcnode-id="4742" instrument_node="">Inhalation is the most common route of exposure to PCE for the general population. Ingestion of contaminated drinking-water may also be important in areas with highly contaminated water. While PCE has been found in some food items, particularly from local source contamination, not enough data are available to estimate exposure through this route (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4740" href="#" role="button"><span data-dcnode-id="4741" instrument_node="">2</span></a><span data-dcnode-id="4739" instrument_node="">).</span></p><div data-dcnode-id="4685" id="ch9.s8"><h3 data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">Indoor sources</span></h3><p data-dcnode-id="4731"><span data-dcnode-id="4735" instrument_node="">Consumer products described above are sources of indoor PCE exposure. Contaminated drinking-water may be a source of indoor PCE exposure when taking a shower or washing dishes. Workers from dry cleaning establishments have been found to become sources of PCE at home by exhaling PCE in their breath (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r15" data-dcnode-id="4733" href="#" role="button"><span data-dcnode-id="4734" instrument_node="">15</span></a><span data-dcnode-id="4732" instrument_node="">). Dry-cleaned clothes are also possible sources of PCE in a house.</span></p><p data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">The air in dry cleaning facilities and neighbouring homes or facilities can contain elevated concentrations of PCE. Soil pollution with PCE has resulted in indoor air concentrations of these chemicals in residential homes. These chemicals can evaporate from the soil, permeate through floors and result in elevated indoor air concentrations. PCE can permeate through synthetic water pipes and contaminate drinking-water, thus leading to exposure during bathing or showering.</span></p><div data-dcnode-id="4706" id="ch9.s9"><h4 data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node="">Drinking-water</span></h4><p data-dcnode-id="4707"><span data-dcnode-id="4726" instrument_node="">Exposure can take place by drinking contaminated water as well as volatilization. In the United States, PCE is not detectable in drinking-water in most cases. The EPA Groundwater Supply Survey of 945 drinking-water systems nationwide reported PCE in 75 out of 945 systems in 1984; the median level of the positive samples was about 0.75 μg/litre, with a maximum of 69 μg/litre (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4724" href="#" role="button"><span data-dcnode-id="4725" instrument_node="">2</span></a><span data-dcnode-id="4723" instrument_node="">). In several studies in Canada, PCE was detectable in 6–60% of the tested samples. Reported mean values ranged from 0.1 to 0.9 μg/litre (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r6" data-dcnode-id="4721" href="#" role="button"><span data-dcnode-id="4722" instrument_node="">6</span></a><span data-dcnode-id="4720" instrument_node="">). In several other countries, including Germany and the United Kingdom, similar results have been observed (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r8" data-dcnode-id="4718" href="#" role="button"><span data-dcnode-id="4719" instrument_node="">8</span></a><span data-dcnode-id="4717" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r16" data-dcnode-id="4715" href="#" role="button"><span data-dcnode-id="4716" instrument_node="">16</span></a><span data-dcnode-id="4714" instrument_node="">). In some villages in Finland, concentrations of up to 180 μg/litre were found (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r17" data-dcnode-id="4712" href="#" role="button"><span data-dcnode-id="4713" instrument_node="">17</span></a><span data-dcnode-id="4711" instrument_node="">). In Japan, PCE levels in 99.7% of drinking-water (n = 5600) were less than 1 μg/litre with a maximum of 7 μg/litre in 2007 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r18" data-dcnode-id="4709" href="#" role="button"><span data-dcnode-id="4710" instrument_node="">18</span></a><span data-dcnode-id="4708" instrument_node="">).</span></p></div><div data-dcnode-id="4686" id="ch9.s10"><h4 data-dcnode-id="4704"><span data-dcnode-id="4705" instrument_node="">Food</span></h4><p data-dcnode-id="4687"><span data-dcnode-id="4703" instrument_node="">Data on concentrations of PCE in food are scarce. In some studies from Germany and Switzerland reported in the early 1980s, relatively high total intakes of 87–170 μg/day were found (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r16" data-dcnode-id="4701" href="#" role="button"><span data-dcnode-id="4702" instrument_node="">16</span></a><span data-dcnode-id="4700" instrument_node="">). The results of market basket surveys in the United States, reported in 1987 and 1988, indicated lower levels. From the results of these surveys, total daily intake via food has been estimated at 0.12–65 μg/kg body weight (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r6" data-dcnode-id="4698" href="#" role="button"><span data-dcnode-id="4699" instrument_node="">6</span></a><span data-dcnode-id="4697" instrument_node="">). Several groups of researchers have reported elevated concentrations of PCE in fatty food products in residences and markets, owing to contamination from dry cleaning establishments nearby. In a supermarket near a dry cleaning shop in Germany, concentrations were 36 μg/kg and 110 μg/kg in cheese and margarine, respectively (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r8" data-dcnode-id="4695" href="#" role="button"><span data-dcnode-id="4696" instrument_node="">8</span></a><span data-dcnode-id="4694" instrument_node="">). In one instance in the United States, a very high PCE concentration was found in margarine (up to 50 mg/kg) in a shop next door to a dry cleaning establishment (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4692" href="#" role="button"><span data-dcnode-id="4693" instrument_node="">2</span></a><span data-dcnode-id="4691" instrument_node="">). Moreover, food grown on contaminated soil can contain PCE. In Japan, the daily maximum levels of PCE in the diet between 1990 and 1999 (n = 72∼81 in each year) were 4.4 μg/kg wet weight (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r14" data-dcnode-id="4689" href="#" role="button"><span data-dcnode-id="4690" instrument_node="">14</span></a><span data-dcnode-id="4688" instrument_node="">).</span></p></div></div></div><div data-dcnode-id="4309" id="ch9.s11"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="4681"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="4682" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="4683" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="4679" id="_ch9_s11_"><span data-dcnode-id="4680" instrument_node="">Indoor air concentrations and relationship with outdoor levels</span></h2><div data-dcnode-id="4524" id="ch9.s12"><h3 data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">Residential concentrations</span></h3><p data-dcnode-id="4654"><span data-dcnode-id="4676" instrument_node="">In several United States cities (New York, Los Angeles, Chicago, Minneapolis, St Paul, Baltimore, Elizabeth and Houston), median indoor residential concentrations ranged from 0.4 μg/m</span><sup data-dcnode-id="4674"><span data-dcnode-id="4675" instrument_node="">3</span></sup><span data-dcnode-id="4673" instrument_node=""> in spring (Minneapolis) to 3.5 μg/m</span><sup data-dcnode-id="4671"><span data-dcnode-id="4672" instrument_node="">3</span></sup><span data-dcnode-id="4670" instrument_node=""> during winter (New York City) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r19" data-dcnode-id="4668" href="#" role="button"><span data-dcnode-id="4669" instrument_node="">19</span></a><span data-dcnode-id="4667" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r26" data-dcnode-id="4665" href="#" role="button"><span data-dcnode-id="4666" instrument_node="">26</span></a><span data-dcnode-id="4664" instrument_node="">). The 90th percentiles ranged from 1 μg/m</span><sup data-dcnode-id="4662"><span data-dcnode-id="4663" instrument_node="">3</span></sup><span data-dcnode-id="4661" instrument_node=""> in Minneapolis in the spring to 14 μg/m</span><sup data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">3</span></sup><span data-dcnode-id="4658" instrument_node=""> in New York City during the summer (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r23" data-dcnode-id="4656" href="#" role="button"><span data-dcnode-id="4657" instrument_node="">23</span></a><span data-dcnode-id="4655" instrument_node="">).</span></p><p data-dcnode-id="4628"><span data-dcnode-id="4653" instrument_node="">Geometric mean concentrations of PCE in the homes of dry cleaning workers have been found to be 265 μg/m</span><sup data-dcnode-id="4651"><span data-dcnode-id="4652" instrument_node="">3</span></sup><span data-dcnode-id="4650" instrument_node="">, while non-exposed homes had a mean concentration of 2 μg/m</span><sup data-dcnode-id="4648"><span data-dcnode-id="4649" instrument_node="">3</span></sup><span data-dcnode-id="4647" instrument_node="">(</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r15" data-dcnode-id="4645" href="#" role="button"><span data-dcnode-id="4646" instrument_node="">15</span></a><span data-dcnode-id="4644" instrument_node="">). Also, shops, offices or homes that share a building with a dry cleaning establishment have been found to have higher levels of PCE than those that are not near dry cleaners. A study of apartments in neighbourhoods with different income levels and ethnic compositions in New York City between 2001 and 2003 found overall geometric mean levels of 34 μg/m</span><sup data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">3</span></sup><span data-dcnode-id="4641" instrument_node="">, although in low-income neighbourhoods, the geometric mean was 256 μg/m</span><sup data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">3</span></sup><span data-dcnode-id="4638" instrument_node="">. Apartments with no dry cleaners in the building had a geometric mean concentration of 3 μg/m</span><sup data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">3</span></sup><span data-dcnode-id="4635" instrument_node="">. Before 1997, when New York adopted stricter regulations for dry cleaners, PCE was found to be about 340–360 μg/m</span><sup data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">3</span></sup><span data-dcnode-id="4632" instrument_node=""> in residential buildings with a dry cleaning establishment (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r27" data-dcnode-id="4630" href="#" role="button"><span data-dcnode-id="4631" instrument_node="">27</span></a><span data-dcnode-id="4629" instrument_node="">).</span></p><p data-dcnode-id="4566"><span data-dcnode-id="4627" instrument_node="">In a national survey of dwellings in France, a median concentration of 1.4 μg/m</span><sup data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">3</span></sup><span data-dcnode-id="4624" instrument_node=""> was found, with a 90th percentile of 5.2 μg/m</span><sup data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">3</span></sup><span data-dcnode-id="4621" instrument_node="">(</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r28" data-dcnode-id="4619" href="#" role="button"><span data-dcnode-id="4620" instrument_node="">28</span></a><span data-dcnode-id="4618" instrument_node="">). In the European multinational urban air study EXPOLIS (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r29" data-dcnode-id="4616" href="#" role="button"><span data-dcnode-id="4617" instrument_node="">29</span></a><span data-dcnode-id="4615" instrument_node="">), median levels of PCE inside homes in Helsinki were not detectable, while they were 0.6 μg/m</span><sup data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">3</span></sup><span data-dcnode-id="4612" instrument_node=""> in Basel. The 90th percentile in Basel was 2.9 μg/m</span><sup data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">3</span></sup><span data-dcnode-id="4609" instrument_node="">. In Oxford, United Kingdom, the median indoor residential PCE concentration was 1.9 μg/m</span><sup data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">3</span></sup><span data-dcnode-id="4606" instrument_node="">, and 6.3 μg/m</span><sup data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">3</span></sup><span data-dcnode-id="4603" instrument_node=""> at the 90th percentile. Homes in Athens had a median indoor level of 4 μg/m</span><sup data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">3</span></sup><span data-dcnode-id="4600" instrument_node=""> and a 90th percentile level of 14.3 μg/m</span><sup data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">3</span></sup><span data-dcnode-id="4597" instrument_node="">. Milan and Prague were found to have median concentrations of 7.4 and 8.7 μg/m</span><sup data-dcnode-id="4595"><span data-dcnode-id="4596" instrument_node="">3</span></sup><span data-dcnode-id="4594" instrument_node="">, respectively, with 90th percentiles of 28.1 μg/m</span><sup data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">3</span></sup><span data-dcnode-id="4591" instrument_node=""> and 26.1 μg/m</span><sup data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">3</span></sup><span data-dcnode-id="4588" instrument_node="">, respectively. Median outdoor residential PCE levels were under the detection limit in Helsinki, 0.7 μg/m</span><sup data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">3</span></sup><span data-dcnode-id="4585" instrument_node=""> in Basel and 1.7 μg/m</span><sup data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node="">3</span></sup><span data-dcnode-id="4582" instrument_node=""> in Oxford. The 90th percentiles in Basel and Oxford were 1.4 μg/m</span><sup data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">3</span></sup><span data-dcnode-id="4579" instrument_node=""> and 3.4 μg/m</span><sup data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">3</span></sup><span data-dcnode-id="4576" instrument_node="">, respectively. In Athens, Milan and Prague, the median outdoor residential levels were 2.3 μg/m</span><sup data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">3</span></sup><span data-dcnode-id="4573" instrument_node="">, 4.1 μg/m</span><sup data-dcnode-id="4571"><span data-dcnode-id="4572" instrument_node="">3</span></sup><span data-dcnode-id="4570" instrument_node=""> and 5.3 μg/m</span><sup data-dcnode-id="4568"><span data-dcnode-id="4569" instrument_node="">3</span></sup><span data-dcnode-id="4567" instrument_node="">, respectively. Median personal exposure levels were lower than the indoor levels.</span></p><p data-dcnode-id="4525"><span data-dcnode-id="4565" instrument_node="">In 25 homes surveyed in Shimizu, Japan, geometric mean indoor PCE concentrations were 0.16 μg/m</span><sup data-dcnode-id="4563"><span data-dcnode-id="4564" instrument_node="">3</span></sup><span data-dcnode-id="4562" instrument_node=""> in summer and winter, with geometric standard deviations of 2.34 μg/m</span><sup data-dcnode-id="4560"><span data-dcnode-id="4561" instrument_node="">3</span></sup><span data-dcnode-id="4559" instrument_node=""> in summer and 2.77 μg/m</span><sup data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">3</span></sup><span data-dcnode-id="4556" instrument_node=""> in winter (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r30" data-dcnode-id="4554" href="#" role="button"><span data-dcnode-id="4555" instrument_node="">30</span></a><span data-dcnode-id="4553" instrument_node="">). The geometric mean concentration outside these homes was 0.11 μg/m</span><sup data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">3</span></sup><span data-dcnode-id="4550" instrument_node=""> in both summer and winter, with geometric standard deviations of approximately 2 μg/m</span><sup data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">3</span></sup><span data-dcnode-id="4547" instrument_node=""> in both seasons. In a national survey of dwellings in Japan, median indoor PCE concentrations in residential houses in 1997 (n = 180) and 1998 (n = 205) were 0.4 μg/m</span><sup data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">3</span></sup><span data-dcnode-id="4544" instrument_node=""> (mean 1.8 μg/m</span><sup data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">3</span></sup><span data-dcnode-id="4541" instrument_node="">; maximum 83.5 μg/m</span><sup data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">3</span></sup><span data-dcnode-id="4538" instrument_node="">) and 0.3 μg/m</span><sup data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">3</span></sup><span data-dcnode-id="4535" instrument_node=""> (mean 1.9 μg/m</span><sup data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">3</span></sup><span data-dcnode-id="4532" instrument_node="">; maximum 43.4 μg/m</span><sup data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">3</span></sup><span data-dcnode-id="4529" instrument_node="">), respectively (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r31" data-dcnode-id="4527" href="#" role="button"><span data-dcnode-id="4528" instrument_node="">31</span></a><span data-dcnode-id="4526" instrument_node="">).</span></p></div><div data-dcnode-id="4414" id="ch9.s13"><h3 data-dcnode-id="4522"><span data-dcnode-id="4523" instrument_node="">Non-residential microenvironments</span></h3><p data-dcnode-id="4508"><span data-dcnode-id="4521" instrument_node="">Predicted PCE concentrations in the air around metal degreasing machines were found to range from about 10 000 μg/m</span><sup data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">3</span></sup><span data-dcnode-id="4518" instrument_node=""> to above 1 million μg/m</span><sup data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">3</span></sup><span data-dcnode-id="4515" instrument_node="">, depending on the type of machine. In Germany, mean personal air samples in occupational environments with degreasers ranged from 18 000 to 40 000 μg/m</span><sup data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">3</span></sup><span data-dcnode-id="4512" instrument_node="">(</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r10" data-dcnode-id="4510" href="#" role="button"><span data-dcnode-id="4511" instrument_node="">10</span></a><span data-dcnode-id="4509" instrument_node="">).</span></p><p data-dcnode-id="4491"><span data-dcnode-id="4507" instrument_node="">Exposure to PCE from dry cleaning affects both workers and members of the general public. A study in Finland of personal exposure of workers in commercial and industrial dry cleaning operations using dry-to-dry machines found that machine operators had the highest exposure levels (28 000 and 32 000 μg/m</span><sup data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">3</span></sup><span data-dcnode-id="4504" instrument_node=""> at commercial and industrial sites, respectively). Customer service workers had the lowest exposures, with an average of about 800 μg/m</span><sup data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">3</span></sup><span data-dcnode-id="4501" instrument_node="">(</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r32" data-dcnode-id="4499" href="#" role="button"><span data-dcnode-id="4500" instrument_node="">32</span></a><span data-dcnode-id="4498" instrument_node="">). Another study of dry cleaning establishments in Chicago found indoor levels of PCE ranging from 12 000 to 355 000 μg/m</span><sup data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">3</span></sup><span data-dcnode-id="4495" instrument_node="">(</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r33" data-dcnode-id="4493" href="#" role="button"><span data-dcnode-id="4494" instrument_node="">33</span></a><span data-dcnode-id="4492" instrument_node="">).</span></p><p data-dcnode-id="4465"><span data-dcnode-id="4490" instrument_node="">A survey of stores in a one-level commercial building in New Jersey found a median concentration of 690 μg/m</span><sup data-dcnode-id="4488"><span data-dcnode-id="4489" instrument_node="">3</span></sup><span data-dcnode-id="4487" instrument_node=""> and a 90th percentile of 4200 μg/m</span><sup data-dcnode-id="4485"><span data-dcnode-id="4486" instrument_node="">3</span></sup><span data-dcnode-id="4484" instrument_node=""> in a dry cleaning establishment in the building, and a median of 570 μg/m</span><sup data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">3</span></sup><span data-dcnode-id="4481" instrument_node=""> and 90th percentile of 5800 μg/m</span><sup data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">3</span></sup><span data-dcnode-id="4478" instrument_node=""> (8 hour average) in a neighbouring clothes rental shop, which may have also contained dry-cleaned clothes (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r34" data-dcnode-id="4476" href="#" role="button"><span data-dcnode-id="4477" instrument_node="">34</span></a><span data-dcnode-id="4475" instrument_node="">). The neighbouring shop on the other side had lower levels, but the median was still nearly 90 μg/m</span><sup data-dcnode-id="4473"><span data-dcnode-id="4474" instrument_node="">3</span></sup><span data-dcnode-id="4472" instrument_node="">, a level much higher than the average indoor environment. Dry cleaned clothes have been shown to emit PCE (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4470" href="#" role="button"><span data-dcnode-id="4471" instrument_node="">2</span></a><span data-dcnode-id="4469" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r32" data-dcnode-id="4467" href="#" role="button"><span data-dcnode-id="4468" instrument_node="">32</span></a><span data-dcnode-id="4466" instrument_node="">).</span></p><p data-dcnode-id="4415"><span data-dcnode-id="4464" instrument_node="">A survey of 70 office buildings across the United States (in which there were no complaints) found a median indoor PCE level of 1.5 μg/m</span><sup data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">3</span></sup><span data-dcnode-id="4461" instrument_node=""> and a 95th percentile of 18 μg/m</span><sup data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">3</span></sup><span data-dcnode-id="4458" instrument_node="">(</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r35" data-dcnode-id="4456" href="#" role="button"><span data-dcnode-id="4457" instrument_node="">35</span></a><span data-dcnode-id="4455" instrument_node="">). A study of mechanically ventilated non-office and office buildings in Hong Kong SAR, China found arithmetic mean levels of 1.4 μg/m</span><sup data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">3</span></sup><span data-dcnode-id="4452" instrument_node=""> (SD = 3.4) and 1.9 μg/m</span><sup data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">3</span></sup><span data-dcnode-id="4449" instrument_node=""> (SD = 9.2), respectively (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r36" data-dcnode-id="4447" href="#" role="button"><span data-dcnode-id="4448" instrument_node="">36</span></a><span data-dcnode-id="4446" instrument_node="">). Median indoor concentrations at workplaces of the EXPOLIS participants were under the detection limit in Helsinki, 1.2 μg/m</span><sup data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">3</span></sup><span data-dcnode-id="4443" instrument_node=""> in Basel, 3.5 μg/m</span><sup data-dcnode-id="4441"><span data-dcnode-id="4442" instrument_node="">3</span></sup><span data-dcnode-id="4440" instrument_node=""> in Athens, 5.4 μg/m</span><sup data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">3</span></sup><span data-dcnode-id="4437" instrument_node=""> in Milan and 3.7 μg/m</span><sup data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">3</span></sup><span data-dcnode-id="4434" instrument_node=""> in Prague. The 90th percentile of workplace levels were 3.1 μg/m</span><sup data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">3</span></sup><span data-dcnode-id="4431" instrument_node=""> in Basel, 10.6 μg/m</span><sup data-dcnode-id="4429"><span data-dcnode-id="4430" instrument_node="">3</span></sup><span data-dcnode-id="4428" instrument_node=""> in Athens, 17.5 μg/m</span><sup data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">3</span></sup><span data-dcnode-id="4425" instrument_node=""> in Milan and 10 μg/m</span><sup data-dcnode-id="4423"><span data-dcnode-id="4424" instrument_node="">3</span></sup><span data-dcnode-id="4422" instrument_node=""> in Prague. The workplaces were typically offices. A survey of stores in Boston, MA found that geometric mean levels of PCE in stores and restaurants were near or under 3 μg/m</span><sup data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node="">3</span></sup><span data-dcnode-id="4419" instrument_node="">(</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r37" data-dcnode-id="4417" href="#" role="button"><span data-dcnode-id="4418" instrument_node="">37</span></a><span data-dcnode-id="4416" instrument_node="">).</span></p></div><div data-dcnode-id="4362" id="ch9.s14"><h3 data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">Ambient air</span></h3><p data-dcnode-id="4374"><span data-dcnode-id="4411" instrument_node="">Residential outdoor median concentrations ranged from 0.3 μg/m</span><sup data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">3</span></sup><span data-dcnode-id="4408" instrument_node=""> in Minneapolis (spring) to 1.7 μg/m</span><sup data-dcnode-id="4406"><span data-dcnode-id="4407" instrument_node="">3</span></sup><span data-dcnode-id="4405" instrument_node=""> in Los Angeles (winter). The median outdoor concentrations of PCE in Shimizu (Japan) were 0.2 μg/m</span><sup data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">3</span></sup><span data-dcnode-id="4402" instrument_node=""> (mean 0.5 μg/m</span><sup data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">3</span></sup><span data-dcnode-id="4399" instrument_node="">; maximum 4.7 μg/m</span><sup data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">3</span></sup><span data-dcnode-id="4396" instrument_node="">) and 0.2 μg/m</span><sup data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">3</span></sup><span data-dcnode-id="4393" instrument_node=""> (mean 0.7 μg/m</span><sup data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">3</span></sup><span data-dcnode-id="4390" instrument_node="">; maximum 10.8 μg/m</span><sup data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">3</span></sup><span data-dcnode-id="4387" instrument_node="">), respectively (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r30" data-dcnode-id="4385" href="#" role="button"><span data-dcnode-id="4386" instrument_node="">30</span></a><span data-dcnode-id="4384" instrument_node="">). Outdoor levels in rural Canada were found to have a mean of 0.04 μg/m</span><sup data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">3</span></sup><span data-dcnode-id="4381" instrument_node=""> and a maximum of 7 μg/m</span><sup data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">3</span></sup><span data-dcnode-id="4378" instrument_node="">(</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r38" data-dcnode-id="4376" href="#" role="button"><span data-dcnode-id="4377" instrument_node="">38</span></a><span data-dcnode-id="4375" instrument_node="">).</span></p><p data-dcnode-id="4363"><span data-dcnode-id="4373" instrument_node="">Indoor : outdoor ratios in New York and Los Angeles from a study in a low-income group of teenagers were between 1 and 2 at the median and did not have large standard deviations relative to the median (except for New York homes in the winter) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r23" data-dcnode-id="4371" href="#" role="button"><span data-dcnode-id="4372" instrument_node="">23</span></a><span data-dcnode-id="4370" instrument_node="">). The earlier Total Exposure Assessment Methodology (TEAM) study found higher indoor : outdoor ratios in the cities of Bayonne and Elizabeth, NJ, with arithmetic means ranging from 2 in summer to 7 in winter and 5 in the winter in Los Angeles (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r39" data-dcnode-id="4368" href="#" role="button"><span data-dcnode-id="4369" instrument_node="">39</span></a><span data-dcnode-id="4367" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r40" data-dcnode-id="4365" href="#" role="button"><span data-dcnode-id="4366" instrument_node="">40</span></a><span data-dcnode-id="4364" instrument_node="">). The medians were not reported but are likely to have been lower than the arithmetic means.</span></p></div><div data-dcnode-id="4310" id="ch9.s15"><h3 data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">Personal exposure</span></h3><p data-dcnode-id="4328"><span data-dcnode-id="4359" instrument_node="">Median personal exposures of the teenagers were 2.2 μg/m</span><sup data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">3</span></sup><span data-dcnode-id="4356" instrument_node=""> in Los Angeles and 3.7 μg/m</span><sup data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">3</span></sup><span data-dcnode-id="4353" instrument_node=""> in New York, although the mean in New York was 8.8 μg/m</span><sup data-dcnode-id="4351"><span data-dcnode-id="4352" instrument_node="">3</span></sup><span data-dcnode-id="4350" instrument_node="">, indicating a more skewed distribution with some higher values (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r19" data-dcnode-id="4348" href="#" role="button"><span data-dcnode-id="4349" instrument_node="">19</span></a><span data-dcnode-id="4347" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r26" data-dcnode-id="4345" href="#" role="button"><span data-dcnode-id="4346" instrument_node="">26</span></a><span data-dcnode-id="4344" instrument_node="">). The New York indoor home distribution was also fairly skewed. The RIOPA study in Los Angeles, Elizabeth and Houston found that adult personal air concentrations had lower medians than means, with a particularly large difference in Elizabeth, where the median was 0.56 μg/m</span><sup data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">3</span></sup><span data-dcnode-id="4341" instrument_node=""> and the mean was 17.3 μg/m</span><sup data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">3</span></sup><span data-dcnode-id="4338" instrument_node="">(</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r26" data-dcnode-id="4336" href="#" role="button"><span data-dcnode-id="4337" instrument_node="">26</span></a><span data-dcnode-id="4335" instrument_node="">). Indoor and outdoor residential mean concentrations in Elizabeth, however, were near 1 μg/m</span><sup data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">3</span></sup><span data-dcnode-id="4332" instrument_node=""> and were detectable in only 24% of outdoor samples and 39% of indoor samples, while in personal samples PCE was detected in 44% of the samples (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r26" data-dcnode-id="4330" href="#" role="button"><span data-dcnode-id="4331" instrument_node="">26</span></a><span data-dcnode-id="4329" instrument_node="">).</span></p><p data-dcnode-id="4311"><span data-dcnode-id="4327" instrument_node="">Personal exposures to PCE are most influenced by indoor concentrations. PCE can reach extremely high levels indoors, even in non-occupational environments such as homes or businesses that are in the same building as or close to dry cleaners. The TEAM studies found that higher personal PCE exposures were associated with visits to dry cleaners (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r39" data-dcnode-id="4325" href="#" role="button"><span data-dcnode-id="4326" instrument_node="">39</span></a><span data-dcnode-id="4324" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r40" data-dcnode-id="4322" href="#" role="button"><span data-dcnode-id="4323" instrument_node="">40</span></a><span data-dcnode-id="4321" instrument_node="">). Unlike other industries that use PCE, such as metal degreasing, dry cleaners are often located in residential, non-industrial commercial and business districts and may affect both the occupants of neighbouring establishments and food. Indoor environments next to dry cleaners have been found to have PCE concentrations of several hundreds of μg/m</span><sup data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">3</span></sup><span data-dcnode-id="4318" instrument_node="">. Indoor environments without sources of PCE have concentrations well below 10 μg/m</span><sup data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">3</span></sup><span data-dcnode-id="4315" instrument_node="">, with median concentrations near 1 μg/m</span><sup data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">3</span></sup><span data-dcnode-id="4312" instrument_node=""> in many areas. Dry-cleaned items can be an occasional source of PCE in some homes.</span></p></div></div><div data-dcnode-id="3996" id="ch9.s16"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="4306"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="4307" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="4308" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="4304" id="_ch9_s16_"><span data-dcnode-id="4305" instrument_node="">Toxicokinetics</span></h2><div data-dcnode-id="4279" id="ch9.s17"><h3 data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">Absorption</span></h3><p data-dcnode-id="4294"><span data-dcnode-id="4301" instrument_node="">PCE is readily absorbed in the gastrointestinal tract and the lungs. Pulmonary uptake is proportional to ventilation rate, duration of exposure and, at lower atmospheric concentrations, the concentration in the inspired air (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4299" href="#" role="button"><span data-dcnode-id="4300" instrument_node="">2</span></a><span data-dcnode-id="4298" instrument_node="">). In both humans and animals, initial uptake following inhalation is rapid, with rates levelling off after a few hours of exposure. The available data suggest that a high proportion is absorbed in humans, but actual percentages have not been reported. In rats, the proportion absorbed was approximately 55–70% after 1 minute, gradually declining to 40–50% after 2 hours (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r41" data-dcnode-id="4296" href="#" role="button"><span data-dcnode-id="4297" instrument_node="">41</span></a><span data-dcnode-id="4295" instrument_node="">).</span></p><p data-dcnode-id="4280"><span data-dcnode-id="4293" instrument_node="">Dermal absorption from the gaseous phase is negligible. However, dermal absorption of significant amounts of PCE is probably possible in some situations. Dermal absorption of PCE solutions resulted in measurable levels of the compound in the breath, reaching a maximum 10 minutes after exposure (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r16" data-dcnode-id="4291" href="#" role="button"><span data-dcnode-id="4292" instrument_node="">16</span></a><span data-dcnode-id="4290" instrument_node="">). Experiments in hairless guinea-pigs have shown substantial dermal absorption from dilute aqueous solutions (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r21" data-dcnode-id="4288" href="#" role="button"><span data-dcnode-id="4289" instrument_node="">21</span></a><span data-dcnode-id="4287" instrument_node="">). In vitro dermal absorption of PCE in aqueous solution through freshly prepared and previously frozen human skin was measured and compared to absorption of other volatile organic compounds in aqueous solution (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r42" data-dcnode-id="4285" href="#" role="button"><span data-dcnode-id="4286" instrument_node="">42</span></a><span data-dcnode-id="4284" instrument_node="">). The dermal absorption of PCE from a soil matrix was compared in rats and humans using real-time mass spectrometric exhaled breath technology and physiologically based pharmacokinetic (PBPK) modelling (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r43" data-dcnode-id="4282" href="#" role="button"><span data-dcnode-id="4283" instrument_node="">43</span></a><span data-dcnode-id="4281" instrument_node="">).</span></p></div><div data-dcnode-id="4241" id="ch9.s18"><h3 data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">Distribution</span></h3><p data-dcnode-id="4242"><span data-dcnode-id="4276" instrument_node="">Repeated inhalation exposure to PCE results in accumulation of the compound in the body, especially in fatty tissue since it is lipid-soluble. PCE crosses the placenta and can be found in breast milk; the fetus and nursing neonates may therefore be at increased risk of adverse effects from maternal exposure (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4274" href="#" role="button"><span data-dcnode-id="4275" instrument_node="">2</span></a><span data-dcnode-id="4273" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r44" data-dcnode-id="4271" href="#" role="button"><span data-dcnode-id="4272" instrument_node="">44</span></a><span data-dcnode-id="4270" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r45" data-dcnode-id="4268" href="#" role="button"><span data-dcnode-id="4269" instrument_node="">45</span></a><span data-dcnode-id="4267" instrument_node="">). In rats, distribution to the brain, liver and kidneys has also been demonstrated (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4265" href="#" role="button"><span data-dcnode-id="4266" instrument_node="">2</span></a><span data-dcnode-id="4264" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r46" data-dcnode-id="4262" href="#" role="button"><span data-dcnode-id="4263" instrument_node="">46</span></a><span data-dcnode-id="4261" instrument_node="">). In a study in mice, transplacental transport of unchanged PCE has been observed (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4259" href="#" role="button"><span data-dcnode-id="4260" instrument_node="">2</span></a><span data-dcnode-id="4258" instrument_node="">). In rats and goats, it has been shown that excretion of unchanged PCE in milk occurs after intraruminal administration (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r23" data-dcnode-id="4256" href="#" role="button"><span data-dcnode-id="4257" instrument_node="">23</span></a><span data-dcnode-id="4255" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r24" data-dcnode-id="4253" href="#" role="button"><span data-dcnode-id="4254" instrument_node="">24</span></a><span data-dcnode-id="4252" instrument_node="">). Following inhalation exposure of lactating rats to a concentration of 4070 mg/m</span><sup data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">3</span></sup><span data-dcnode-id="4249" instrument_node=""> (600 ppm) for 2 hours, total body burden for the pups was up to about 14 mg/kg body weight (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r23" data-dcnode-id="4247" href="#" role="button"><span data-dcnode-id="4248" instrument_node="">23</span></a><span data-dcnode-id="4246" instrument_node="">). Since women have a higher proportion of body fat than men, it is assumed that women retain PCE longer (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r47" data-dcnode-id="4244" href="#" role="button"><span data-dcnode-id="4245" instrument_node="">47</span></a><span data-dcnode-id="4243" instrument_node="">).</span></p></div><div data-dcnode-id="4117" id="ch9.s19"><h3 data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">Biotransformation</span></h3><p data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">In experiments in humans and rats, it was observed that most of the absorbed amount of PCE is exhaled unchanged. The two principal pathways of PCE metabolism that occur in the liver and kidney of experimental animals are cytochrome P450-dependent oxidation and glutathione conjugation. The hepatotoxic, nephrotoxic and carcinogenic effects of PCE depend on its metabolism to reactive metabolites, which may covalently bind to cellular macromolecules.</span></p><p data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">Cytochrome P450 enzymes primarily catalyse PCE oxidation. Presumably, CYP2E1 plays an important role in this process in rodent liver and kidney as well as human liver. This results in the formation of a PCE-epoxide, which further reacts to trichloroacetyl chloride. Trichloroacetyl chloride can react with amino groups in macromolecules, resulting in hepatotoxicity. When it reacts with water it forms trichloroacetic acid.</span></p><p data-dcnode-id="4224"><span data-dcnode-id="4234" instrument_node="">Trichloroacetic acid is the principal metabolite recovered from urine in both humans and rodents following inhalation exposure to PCE. Another metabolite that can be formed by the cytochrome P450 pathway is dichloroacetate. Di- and trichloroacetate are associated with hepatic toxicity and carcinogenicity. Other metabolites of PCE by the P450 pathway that have been identified are shown schematically in </span><a class="figpopup" data-dcnode-id="4232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/figure/ch9.f1/%3Freport%3Dobjectonly" rid-figpopup="figch9f1" rid-ob="figobch9f1" target="object"><span data-dcnode-id="4233" instrument_node="">Fig. 9.1</span></a><span data-dcnode-id="4231" instrument_node="">(</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r48" data-dcnode-id="4229" href="#" role="button"><span data-dcnode-id="4230" instrument_node="">48</span></a><span data-dcnode-id="4228" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r49" data-dcnode-id="4226" href="#" role="button"><span data-dcnode-id="4227" instrument_node="">49</span></a><span data-dcnode-id="4225" instrument_node="">).</span></p><div class="iconblock whole_rhythm clearfix ten_col fig" co-legend-rid="figlgndch9f1" data-dcnode-id="4210" id="figch9f1"><a class="img_link icnblk_img figpopup" data-dcnode-id="4222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/figure/ch9.f1/%3Freport%3Dobjectonly" rid-figpopup="figch9f1" rid-ob="figobch9f1" target="object" title="Fig. 9.1"><img alt="Fig. 9.1. Metabolism of PCE by the P450 pathway." class="small-thumb" data-dcnode-id="4223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/bin/ch9f1.gif&amp;raw" src-large="/books/NBK138706/bin/ch9f1.jpg"></a><div class="icnblk_cntnt" data-dcnode-id="4211" id="figlgndch9f1"><h4 data-dcnode-id="4219" id="ch9.f1"><a data-dcnode-id="4220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/figure/ch9.f1/%3Freport%3Dobjectonly" rid-ob="figobch9f1" target="object"><span data-dcnode-id="4221" instrument_node="">Fig. 9.1</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="4212"><span data-dcnode-id="4218" instrument_node="">Metabolism of PCE by the P450 pathway. </span><i data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node="">Note</span></i><span data-dcnode-id="4215" instrument_node="">. Identified urinary metabolites: 1 = PCE; 2 = PCE epoxide; 3 = trichloroacetyl chloride; 4 = trichloroacetate; 5 = trichloroethanol; 6 = trichloroethanol glucuronide; 7 = oxalate dichloride; 8 = trichloroacetyl </span><a data-dcnode-id="4213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/figure/ch9.f1/%3Freport%3Dobjectonly" rid-ob="figobch9f1" target="object"><span data-dcnode-id="4214" instrument_node="">(more...)</span></a></p></div></div><p data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">There is a broad range of halogenated hydrocarbons and other small organic molecules that are oxidized by CYP2E1. Several drugs as well as physiological or pathological conditions may lead to the induction of CYP2E1. This implies that under certain conditions, prior or concurrent exposure to chemicals such as ethanol or acetaminophen may influence the response to PCE. Also, individual susceptibility due to genetic polymorphisms in CYP450-dependent metabolism can result in altered toxicity.</span></p><p data-dcnode-id="4197"><span data-dcnode-id="4207" instrument_node="">PCE is conjugated by glutathione to S-(1,2,2-trichlorovinyl)glutathione (TCVG). No significant effects were found of PCE or TCVG on cytotoxicity or mitochondrial function in isolated hepatocytes from rats or in isolated liver mitochondria from rats or mice. Therefore, it is unlikely that the liver is a major acute target for PCE or TCVG. Glutathione conjugation of PCE, followed by activation of trichlorovinylcysteine (TCVC), is responsible for nephrotoxicity and possibly nephrocarcinogenicity (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r49" data-dcnode-id="4205" href="#" role="button"><span data-dcnode-id="4206" instrument_node="">49</span></a><span data-dcnode-id="4204" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r50" data-dcnode-id="4202" href="#" role="button"><span data-dcnode-id="4203" instrument_node="">50</span></a><span data-dcnode-id="4201" instrument_node="">). </span><a class="figpopup" data-dcnode-id="4199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/figure/ch9.f2/%3Freport%3Dobjectonly" rid-figpopup="figch9f2" rid-ob="figobch9f2" target="object"><span data-dcnode-id="4200" instrument_node="">Fig. 9.2</span></a><span data-dcnode-id="4198" instrument_node=""> shows the metabolites of PCE by the glutathione conjugation pathway, so far as they have been identified to date.</span></p><div class="iconblock whole_rhythm clearfix ten_col fig" co-legend-rid="figlgndch9f2" data-dcnode-id="4183" id="figch9f2"><a class="img_link icnblk_img figpopup" data-dcnode-id="4195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/figure/ch9.f2/%3Freport%3Dobjectonly" rid-figpopup="figch9f2" rid-ob="figobch9f2" target="object" title="Fig. 9.2"><img alt="Fig. 9.2. Metabolism of PCE by the glutathione conjugation pathway." class="small-thumb" data-dcnode-id="4196" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/bin/ch9f2.gif&amp;raw" src-large="/books/NBK138706/bin/ch9f2.jpg"></a><div class="icnblk_cntnt" data-dcnode-id="4184" id="figlgndch9f2"><h4 data-dcnode-id="4192" id="ch9.f2"><a data-dcnode-id="4193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/figure/ch9.f2/%3Freport%3Dobjectonly" rid-ob="figobch9f2" target="object"><span data-dcnode-id="4194" instrument_node="">Fig. 9.2</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="4185"><span data-dcnode-id="4191" instrument_node="">Metabolism of PCE by the glutathione conjugation pathway. </span><i data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">Note</span></i><span data-dcnode-id="4188" instrument_node="">. Identified urinary metabolites: 1 = PCE; 2 = TCVG; 3 = TCVC; 4 = NAcTCVC; 5 = NAcTCVC sulfoxide; 6 = 1,2,2-trichlorovinylthiol; 7 = TCVCSO; 8 = 2,2-dichlorothioketene; 9 = dichloroacetate. </span><a data-dcnode-id="4186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/figure/ch9.f2/%3Freport%3Dobjectonly" rid-ob="figobch9f2" target="object"><span data-dcnode-id="4187" instrument_node="">(more...)</span></a></p></div></div><div data-dcnode-id="4129" id="ch9.s20"><h4 data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">Species-dependent differences in biotransformation</span></h4><p data-dcnode-id="4146"><span data-dcnode-id="4180" instrument_node="">Mice metabolize PCE to trichloroacetic acid to a greater extent than rats. In rats, saturation of the oxidative metabolism at exposure concentrations exceeding 678 mg/m</span><sup data-dcnode-id="4178"><span data-dcnode-id="4179" instrument_node="">3</span></sup><span data-dcnode-id="4177" instrument_node=""> (100 ppm) prevents the occurrence of the high trichloroacetic acid concentrations that are observed in mice at these dose levels. The available evidence indicates that in humans too, saturation of the oxidative metabolism of PCE occurs at ≥ 678 mg/m</span><sup data-dcnode-id="4175"><span data-dcnode-id="4176" instrument_node="">3</span></sup><span data-dcnode-id="4174" instrument_node=""> (≥ 100 ppm) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r51" data-dcnode-id="4172" href="#" role="button"><span data-dcnode-id="4173" instrument_node="">51</span></a><span data-dcnode-id="4171" instrument_node="">). In a comparative study, the urinary levels of </span><i data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">N</span></i><span data-dcnode-id="4168" instrument_node="">-acetyl-</span><i data-dcnode-id="4166"><span data-dcnode-id="4167" instrument_node="">S</span></i><span data-dcnode-id="4165" instrument_node="">-(1,2,2-trichlorovinyl)-</span><i data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">L</span></i><span data-dcnode-id="4162" instrument_node="">-cysteine, one of the final metabolites in the glutathione biotransformation pathway, were shown to be higher in rats than in mice after inhalation exposure to PCE. In vitro tests in hepatocytes and kidney fractions of rats, mice and humans suggest that the potential for this biotransformation in the kidneys is also lower in humans than in rats (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4160" href="#" role="button"><span data-dcnode-id="4161" instrument_node="">2</span></a><span data-dcnode-id="4159" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r6" data-dcnode-id="4157" href="#" role="button"><span data-dcnode-id="4158" instrument_node="">6</span></a><span data-dcnode-id="4156" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r52" data-dcnode-id="4154" href="#" role="button"><span data-dcnode-id="4155" instrument_node="">52</span></a><span data-dcnode-id="4153" instrument_node="">). Experimental data show that rates of TCVG formation in rats and mice are higher in males than in females, the formation rates in mice being higher than in rats (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r48" data-dcnode-id="4151" href="#" role="button"><span data-dcnode-id="4152" instrument_node="">48</span></a><span data-dcnode-id="4150" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r53" data-dcnode-id="4148" href="#" role="button"><span data-dcnode-id="4149" instrument_node="">53</span></a><span data-dcnode-id="4147" instrument_node="">).</span></p><p data-dcnode-id="4132"><span data-dcnode-id="4145" instrument_node="">The overall kinetics of PCE oxidative metabolism differs significantly between humans and rodents. The excretion of trichloroacetic acid after inhalation of PCE has been shown to be slower in humans than in rats. The elimination half-time of trichloroacetic acid in the urine was approximately 4.1-fold longer in humans than in rats exposed to 10 or 40 ppm PCE. Maximal trichloroacetic acid concentrations in blood were 3- to 10-fold lower (depending on dose) in humans than in rats (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r48" data-dcnode-id="4143" href="#" role="button"><span data-dcnode-id="4144" instrument_node="">48</span></a><span data-dcnode-id="4142" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r54" data-dcnode-id="4140" href="#" role="button"><span data-dcnode-id="4141" instrument_node="">54</span></a><span data-dcnode-id="4139" instrument_node="">). It is assumed that saturation of PCE metabolism occurs at lower doses in humans (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r55" data-dcnode-id="4137" href="#" role="button"><span data-dcnode-id="4138" instrument_node="">55</span></a><span data-dcnode-id="4136" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r56" data-dcnode-id="4134" href="#" role="button"><span data-dcnode-id="4135" instrument_node="">56</span></a><span data-dcnode-id="4133" instrument_node="">).</span></p><p data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node="">While the target organs for toxicity in general are similar for different species, this is not the case for carcinogenicity.</span></p></div><div data-dcnode-id="4118" id="ch9.s21"><h4 data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">Sex-dependent differences in biotransformation</span></h4><p data-dcnode-id="4119"><span data-dcnode-id="4126" instrument_node="">Regarding renal toxicity, sex differences have been found in experiments on rats and mice. PCE is demonstrated to cause a significant release of lactate dehydrogenase in isolated kidney cells from male but not from female rats. TCVG causes much more lactate dehydrogenase to be released from male than from female rat kidney cells. Examination of effects on mitochondrial respiration in suspensions of isolated mitochondria showed that PCE and TCVG are more toxic in renal mitochondria from male rats than in those from female rats. Respiratory function in (renal) mitochondria from mice was significantly inhibited by PCE and TCVG, but showed little sex dependence (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r49" data-dcnode-id="4124" href="#" role="button"><span data-dcnode-id="4125" instrument_node="">49</span></a><span data-dcnode-id="4123" instrument_node="">). Experimental data showed that TCVG formation in kidney and liver subcellular fractions from male rats and mice were invariably higher than corresponding values in female rats and mice (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r53" data-dcnode-id="4121" href="#" role="button"><span data-dcnode-id="4122" instrument_node="">53</span></a><span data-dcnode-id="4120" instrument_node="">).</span></p></div></div><div data-dcnode-id="4081" id="ch9.s22"><h3 data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">Elimination</span></h3><p data-dcnode-id="4104"><span data-dcnode-id="4114" instrument_node="">In humans and animals, the major part of the absorbed amount of PCE is exhaled unchanged. In humans, 80–100% of the uptake was exhaled as parent compound in the 7 days following a single 4-hour inhalation exposure to 488 or 976 mg/m</span><sup data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">3</span></sup><span data-dcnode-id="4111" instrument_node=""> (72 or 144 ppm) PCE. In rats, the proportion is somewhat lower (68%). Elimination of PCE from adipose tissue is relatively slow (calculated half-life 55 hours) owing to the high adipose/blood partition coefficient and the low rate of blood perfusion to this tissue (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4109" href="#" role="button"><span data-dcnode-id="4110" instrument_node="">2</span></a><span data-dcnode-id="4108" instrument_node="">). Excretion of metabolites in urine represents only a small proportion of the inhaled dose. Following single inhalation exposure in humans, only 2% of the uptake was found as the major urinary metabolite, tetrachloroacetic acid. This compound was excreted from the blood with a half-life of 75–80 hours. In another study, its half-life in urine was estimated at 6 days (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r16" data-dcnode-id="4106" href="#" role="button"><span data-dcnode-id="4107" instrument_node="">16</span></a><span data-dcnode-id="4105" instrument_node="">).</span></p><p data-dcnode-id="4093"><span data-dcnode-id="4103" instrument_node="">In a study in which humans were exposed by inhalation to 6.8 mg/m</span><sup data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">3</span></sup><span data-dcnode-id="4100" instrument_node=""> (1 ppm) PCE in the air for 6 hours, the average recovery by exhalation was calculated to be 82%. This implies that about 18% was metabolized. PCE was readily detected in alveolar air and venous blood; trichloroacetic acid was found in venous blood and urine. Recovery was primarily through exhaled air; only a small amount (less than 1% of intake) of trichloroacetic acid was excreted via the urine. Between about 63% and 93% of the intake was exhaled as parent compound 6 days after the exposure; 0–10% was estimated to be exhaled as PCE after the 6-day period (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r57" data-dcnode-id="4098" href="#" role="button"><span data-dcnode-id="4099" instrument_node="">57</span></a><span data-dcnode-id="4097" instrument_node="">). An inhalation study in humans and rats exposed for 6 hours at different concentrations of PCE showed excretion of trichloroacetic acid and the acetylated metabolite N-acetyl-TCVC in the urine of both species. Excretion of the N-acetyl-TCVC was significantly higher in male than in female rats (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r54" data-dcnode-id="4095" href="#" role="button"><span data-dcnode-id="4096" instrument_node="">54</span></a><span data-dcnode-id="4094" instrument_node="">).</span></p><p data-dcnode-id="4082"><span data-dcnode-id="4092" instrument_node="">In rat studies, high concentrations in the milk have been observed, peak concentrations being an order of magnitude higher than in maternal blood (</span><a aria-expanded="false
