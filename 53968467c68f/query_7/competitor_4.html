" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r58" data-dcnode-id="4090" href="#" role="button"><span data-dcnode-id="4091" instrument_node="">58</span></a><span data-dcnode-id="4089" instrument_node="">). Experimental data in lactating goats showed that, following intraruminal administration of an equal volume mixture of PCE, TCE and methyl chloroform, the milk secreted during the 24 hours following the administration contained 6.43 mg PCE (in addition to TCE and methyl chloroform). PCE demonstrated the greatest tissue partitioning compared to TCE and methyl chloroform, being persistently in the blood and secreted into the milk (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r59" data-dcnode-id="4087" href="#" role="button"><span data-dcnode-id="4088" instrument_node="">59</span></a><span data-dcnode-id="4086" instrument_node="">). Limited data in humans also show that PCE is excreted in the milk (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r60" data-dcnode-id="4084" href="#" role="button"><span data-dcnode-id="4085" instrument_node="">60</span></a><span data-dcnode-id="4083" instrument_node="">).</span></p></div><div data-dcnode-id="4057" id="ch9.s23"><h3 data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">Biomarkers of exposure</span></h3><p data-dcnode-id="4077"><span data-dcnode-id="4078" instrument_node="">Biological monitoring of exposure to PCE can be carried out by measuring levels of the parent com pound in blood, urine or exhaled air or of the metabolites in blood or urine. These methods have been applied for assessing both occupational and non-occupational exposure.</span></p><p data-dcnode-id="4063"><span data-dcnode-id="4076" instrument_node="">There has been discussion in the literature as to whether measurement of the parent compound in blood or in exhaled air is the preferred biological index to monitor PCE exposure (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r47" data-dcnode-id="4074" href="#" role="button"><span data-dcnode-id="4075" instrument_node="">47</span></a><span data-dcnode-id="4073" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r61" data-dcnode-id="4071" href="#" role="button"><span data-dcnode-id="4072" instrument_node="">61</span></a><span data-dcnode-id="4070" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r63" data-dcnode-id="4068" href="#" role="button"><span data-dcnode-id="4069" instrument_node="">63</span></a><span data-dcnode-id="4067" instrument_node="">). A study in humans showed that correlation coefficients (r) between environmental PCE and PCE-B (PCE measured in blood), PCE-Alv (PCE measured in alveolar air) and PCE-U (PCE measured in urine) were 0.94, 0.81 and 0.67, respectively. A high correlation was also found among biological indices: the r value was 0.96 between PCE-B and PCE-Alv, 0.95 between PCE-B and PCE-U, and 0.87 between PCE-Alv and PCE-U (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r61" data-dcnode-id="4065" href="#" role="button"><span data-dcnode-id="4066" instrument_node="">61</span></a><span data-dcnode-id="4064" instrument_node="">). The examined biological indices proved sensitive enough for biological monitoring of low exposure to PCE and can give substantially similar information in terms of exposure evaluation. PCE measurement in alveolar air offers some practical advantages over the other exposure indices.</span></p><p data-dcnode-id="4058"><span data-dcnode-id="4062" instrument_node="">Measuring of metabolites (trichloroacetic acid, trichlorethanol) in blood or urine may not necessarily represent exposure to PCE because some related chlorinated hydrocarbons (TCE, 1,1,1-trichloroethane) are converted to the same metabolites (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="4060" href="#" role="button"><span data-dcnode-id="4061" instrument_node="">2</span></a><span data-dcnode-id="4059" instrument_node="">).</span></p></div><div data-dcnode-id="3997" id="ch9.s24"><h3 data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">Physiologically based pharmacokinetic modelling</span></h3><p data-dcnode-id="4032"><span data-dcnode-id="4054" instrument_node="">Several groups of researchers have developed PBPK models for PCE and several of the models have been evaluated. </span><a class="figpopup" data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/table/ch9.t1/%3Freport%3Dobjectonly" rid-figpopup="figch9t1" rid-ob="figobch9t1" target="object"><span data-dcnode-id="4053" instrument_node="">Table 9.1</span></a><span data-dcnode-id="4051" instrument_node=""> provides an overview of these efforts (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r41" data-dcnode-id="4049" href="#" role="button"><span data-dcnode-id="4050" instrument_node="">41</span></a><span data-dcnode-id="4048" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r46" data-dcnode-id="4046" href="#" role="button"><span data-dcnode-id="4047" instrument_node="">46</span></a><span data-dcnode-id="4045" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r58" data-dcnode-id="4043" href="#" role="button"><span data-dcnode-id="4044" instrument_node="">58</span></a><span data-dcnode-id="4042" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r60" data-dcnode-id="4040" href="#" role="button"><span data-dcnode-id="4041" instrument_node="">60</span></a><span data-dcnode-id="4039" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r64" data-dcnode-id="4037" href="#" role="button"><span data-dcnode-id="4038" instrument_node="">64</span></a><span data-dcnode-id="4036" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r79" data-dcnode-id="4034" href="#" role="button"><span data-dcnode-id="4035" instrument_node="">79</span></a><span data-dcnode-id="4033" instrument_node="">).</span></p><div class="iconblock whole_rhythm clearfix ten_col table-wrap" data-dcnode-id="4023" id="figch9t1"><a class="img_link icnblk_img figpopup" data-dcnode-id="4030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/table/ch9.t1/%3Freport%3Dobjectonly" rid-figpopup="figch9t1" rid-ob="figobch9t1" target="object" title="Table 9.1"><img alt="Table 9.1. Physiologically based pharmacokinetic (PBPK) models for PCE metabolism." class="small-thumb" data-dcnode-id="4031" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/table/ch9.t1/%3Freport%3Dthumb&amp;raw" src-large="/books/NBK138706/table/ch9.t1/?report=previmg"></a><div class="icnblk_cntnt" data-dcnode-id="4024"><h4 data-dcnode-id="4027" id="ch9.t1"><a data-dcnode-id="4028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138706/table/ch9.t1/%3Freport%3Dobjectonly" rid-ob="figobch9t1" target="object"><span data-dcnode-id="4029" instrument_node="">Table 9.1</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">Physiologically based pharmacokinetic (PBPK) models for PCE metabolism. </span></p></div></div><p data-dcnode-id="4015"><span data-dcnode-id="4022" instrument_node="">Most PBPK models for PCE share the four-compartment structure (liver, fat, rapidly perfused tissues and slowly perfused tissues) and steady-state description of lung equilibration developed by Ramsey &amp; Andersen (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r80" data-dcnode-id="4020" href="#" role="button"><span data-dcnode-id="4021" instrument_node="">80</span></a><span data-dcnode-id="4019" instrument_node="">) for styrene. Only one of the published models (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r71" data-dcnode-id="4017" href="#" role="button"><span data-dcnode-id="4018" instrument_node="">71</span></a><span data-dcnode-id="4016" instrument_node="">) provides a description of the kinetics of trichloroacetic acid, the major metabolite of PCE.</span></p><p data-dcnode-id="3998"><span data-dcnode-id="4014" instrument_node="">Some studies have focused on the evaluation of these models. In one, the key parameters and predictions for PBPK models for mice, rats and humans developed by different groups of researchers were compared. The amounts of metabolized PCE predicted showed considerable differences (about 12- to 14-fold for humans). Most of the differences in risk-related model predictions were due to the choice of the data sets used for calibrating metabolic parameters (V</span><sub data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">max</span></sub><span data-dcnode-id="4011" instrument_node="">, K</span><sub data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">m</span></sub><span data-dcnode-id="4008" instrument_node="">) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r77" data-dcnode-id="4006" href="#" role="button"><span data-dcnode-id="4007" instrument_node="">77</span></a><span data-dcnode-id="4005" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r81" data-dcnode-id="4003" href="#" role="button"><span data-dcnode-id="4004" instrument_node="">81</span></a><span data-dcnode-id="4002" instrument_node="">). A statistical approach to some of the PBPK models for PCE in mice, rats and humans showed that the kinetic parameters defining the metabolic rate were the most important parameters for model sensitivity (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r82" data-dcnode-id="4000" href="#" role="button"><span data-dcnode-id="4001" instrument_node="">82</span></a><span data-dcnode-id="3999" instrument_node="">).</span></p></div></div><div data-dcnode-id="3404" id="ch9.s25"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3993"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3994" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3995" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="3991" id="_ch9_s25_"><span data-dcnode-id="3992" instrument_node="">Health effects</span></h2><div data-dcnode-id="3969" id="ch9.s26"><h3 data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">Identification of studies</span></h3><p data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">Epidemiological studies on health effects of PCE exposure were identified from electronic searches and hand searches of references in former reviews by WHO. Electronic searches were made in PubMed in July 2008, with an update in June 2009. We intended to identify all studies with original data on health effects of PCE and the main descriptors used were “tetrachloroethylene” and “perchloroethylene”. In addition, studies that examined the health effects of PCE were identified through hand searches of earlier reviews of the topic, citations within papers identified on health effects of PCE and searches on the web sites of international or national health assessment agencies, including WHO, the European Commission, Health Canada, IARC, ATSDR, USEPA, the United Kingdom Committee on Carcinogenicity of Chemicals in Food, Consumer Products and the Environment and the US National Institute for Occupational Safety and Health. Papers known to the expert group in 2009 concerning health effects of PCE were also used.</span></p><p data-dcnode-id="3970"><span data-dcnode-id="3986" instrument_node="">Of 148 papers identified, 59 were relevant to the health effects section of this chapter. These papers were included in the discussion presented below, addressing human exposure and epidemiological issues (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r37" data-dcnode-id="3984" href="#" role="button"><span data-dcnode-id="3985" instrument_node="">37</span></a><span data-dcnode-id="3983" instrument_node="">), children (0), animal studies (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r10" data-dcnode-id="3981" href="#" role="button"><span data-dcnode-id="3982" instrument_node="">10</span></a><span data-dcnode-id="3980" instrument_node="">), cell studies (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r4" data-dcnode-id="3978" href="#" role="button"><span data-dcnode-id="3979" instrument_node="">4</span></a><span data-dcnode-id="3977" instrument_node="">), reviews (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r4" data-dcnode-id="3975" href="#" role="button"><span data-dcnode-id="3976" instrument_node="">4</span></a><span data-dcnode-id="3974" instrument_node="">) and other studies (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r4" data-dcnode-id="3972" href="#" role="button"><span data-dcnode-id="3973" instrument_node="">4</span></a><span data-dcnode-id="3971" instrument_node="">). In addition, 11 reports of the above-mentioned agencies were used in the “Health effects” section.</span></p></div><div data-dcnode-id="3720" id="ch9.s27"><h3 data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">Effects on experimental animals and in vitro test systems</span></h3><div data-dcnode-id="3818" id="ch9.s28"><h4 data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">Toxicological effects</span></h4><p data-dcnode-id="3954"><span data-dcnode-id="3964" instrument_node="">PCE has a low acute inhalation toxicity (LC</span><sub data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">50</span></sub><span data-dcnode-id="3961" instrument_node=""> in rodents ≥ 16.6 mg/litre). Acute oral toxicity is also low (LD</span><sub data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">50</span></sub><span data-dcnode-id="3958" instrument_node=""> in rodents ≥ 3000 mg/kg body weight) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r6" data-dcnode-id="3956" href="#" role="button"><span data-dcnode-id="3957" instrument_node="">6</span></a><span data-dcnode-id="3955" instrument_node="">).</span></p><p data-dcnode-id="3937"><span data-dcnode-id="3953" instrument_node="">The liver, kidneys, blood and CNS are the target organs for systemic effects. Hepatic effects occur at lower dose levels in mice than in rats. In a series of experi ments in mice, continuous (24 hours/day) inhalation exposure for 30 days at concentrations of 61, 251, 508 or 1017 mg/m</span><sup data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">3</span></sup><span data-dcnode-id="3950" instrument_node=""> produced a dose-related increase in liver weight at all dose levels. Morphological changes in the liver were observed at 251 mg/m</span><sup data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">3</span></sup><span data-dcnode-id="3947" instrument_node=""> and, as stated but not fully reported, at all other dose levels as well. Plasma butyrylcholinesterase activity showed a slight increase at ≥ 251 mg/m</span><sup data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">3</span></sup><span data-dcnode-id="3944" instrument_node="">. The reversibility of the effects was exami ned at 1071 mg/m</span><sup data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">3</span></sup><span data-dcnode-id="3941" instrument_node=""> only, showing that at 120 days after cessation of treatment, only a slight increase in liver weight remained (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r83" data-dcnode-id="3939" href="#" role="button"><span data-dcnode-id="3940" instrument_node="">83</span></a><span data-dcnode-id="3938" instrument_node="">).</span></p><p data-dcnode-id="3914"><span data-dcnode-id="3936" instrument_node="">Within the United States National Toxicology Program (NTP) subchronic inhalation studies were carried out in rats and mice. In mice, liver effects were observed at 1350 mg/m</span><sup data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">3</span></sup><span data-dcnode-id="3933" instrument_node=""> (≥ 200 ppm) or higher. Karyomegaly of the renal tubule epithelial cells was observed at ≥ 1350 mg/m</span><sup data-dcnode-id="3931"><span data-dcnode-id="3932" instrument_node="">3</span></sup><span data-dcnode-id="3930" instrument_node=""> (≥ 200 ppm). At 680 mg/m</span><sup data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">3</span></sup><span data-dcnode-id="3927" instrument_node=""> (100 ppm), no effects were seen but at this level no histopathological examination of the liver was carried out. In rats, mild congestion of the liver was seen at ≥ 1350 mg/m</span><sup data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">3</span></sup><span data-dcnode-id="3924" instrument_node=""> (≥ 200 ppm) (lower concentrations not tested), with congestion of the lungs, decreased survival and growth retardation at higher dose levels (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r84" data-dcnode-id="3922" href="#" role="button"><span data-dcnode-id="3923" instrument_node="">84</span></a><span data-dcnode-id="3921" instrument_node="">). In chronic studies, renal tubular cell karyomegaly was observed in female rats and mice at both 1356 and 2712 mg/m</span><sup data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">3</span></sup><span data-dcnode-id="3918" instrument_node=""> (200 and 400 ppm) in rats and 678 and 1356 mg/m</span><sup data-dcnode-id="3916"><span data-dcnode-id="3917" instrument_node="">3</span></sup><span data-dcnode-id="3915" instrument_node=""> (100 and 200 ppm) in mice.</span></p><p data-dcnode-id="3903"><span data-dcnode-id="3913" instrument_node="">In addition, in rats, renal tubular hyperplasia (males), thrombosis and squamous metaplasia in the nasal cavity (males and females) and hyperlasia in the adrenal medullae (males) or cortices (females) were found. In mice only, liver cell degeneration and necrosis were seen at both concentrations (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r84" data-dcnode-id="3911" href="#" role="button"><span data-dcnode-id="3912" instrument_node="">84</span></a><span data-dcnode-id="3910" instrument_node="">). A study exposing mice to 2040 mg/m</span><sup data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">3</span></sup><span data-dcnode-id="3907" instrument_node=""> (300 ppm) perchloroethylene gas for 6 hours daily for 5 days revealed regeneration of olfactory mucosa. Two weeks and three months after exposure, the nasal mucosa was examined histopathologically. After two weeks, ciliated epithelium started to replace the olfactory epithelium. Damage was more persistent in the nasal mucosa of the olfactory region than in the respiratory region (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r85" data-dcnode-id="3905" href="#" role="button"><span data-dcnode-id="3906" instrument_node="">85</span></a><span data-dcnode-id="3904" instrument_node="">).</span></p><p data-dcnode-id="3859"><span data-dcnode-id="3902" instrument_node="">CNS effects have been observed at high dose levels. In the short-term NTP experiment in rats and mice, neurological symptoms were observed only at the highest concentration of 11 860 mg/m</span><sup data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">3</span></sup><span data-dcnode-id="3899" instrument_node=""> (1750 ppm) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r84" data-dcnode-id="3897" href="#" role="button"><span data-dcnode-id="3898" instrument_node="">84</span></a><span data-dcnode-id="3896" instrument_node="">). Biochemical changes in brain tissues have been observed in rats and gerbils at concentrations of ≥ 407 mg/m</span><sup data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">3</span></sup><span data-dcnode-id="3893" instrument_node=""> (≥ 60 ppm). However, the toxicological significance of these changes is unclear (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="3891" href="#" role="button"><span data-dcnode-id="3892" instrument_node="">2</span></a><span data-dcnode-id="3890" instrument_node="">). In a recent short-term study in rats, decreased weight of brain regions and reductions in neuronal marker proteins were seen at 4080 mg/m</span><sup data-dcnode-id="3888"><span data-dcnode-id="3889" instrument_node="">3</span></sup><span data-dcnode-id="3887" instrument_node=""> (600 ppm) but not at 2040 mg/m</span><sup data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">3</span></sup><span data-dcnode-id="3884" instrument_node=""> (300 ppm) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r86" data-dcnode-id="3882" href="#" role="button"><span data-dcnode-id="3883" instrument_node="">86</span></a><span data-dcnode-id="3881" instrument_node="">). Haematotoxicity was observed in an inhalation study in mice at test concentrations of 915 and 1830 mg/m</span><sup data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">3</span></sup><span data-dcnode-id="3878" instrument_node=""> (no other concentrations tested) in which the animals were exposed for 6 hours/day, 5 days/week for 7.5 or 11.5 weeks (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r87" data-dcnode-id="3876" href="#" role="button"><span data-dcnode-id="3877" instrument_node="">87</span></a><span data-dcnode-id="3875" instrument_node="">). Rats that were acutely exposed to a high dose (500 mg/kg oral) of PCE and others subchronically to lower doses (5 and 50 mg/kg oral), showed significant effects on nociception and locomotor activity (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r88" data-dcnode-id="3873" href="#" role="button"><span data-dcnode-id="3874" instrument_node="">88</span></a><span data-dcnode-id="3872" instrument_node="">). An inhalation study assessed the effects of PCE on sustained attention in rats performing a visual signal detection task. It showed that inhaled PCE acutely impaired sustained attention in rats, and its potency weakened on repetition of the exposure. Accuracy was significantly reduced at 3390 mg/m</span><sup data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">3</span></sup><span data-dcnode-id="3869" instrument_node=""> (500 ppm), significantly elevated response time was seen at 6780 mg/m</span><sup data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">3</span></sup><span data-dcnode-id="3866" instrument_node=""> (1000 ppm) and significantly reduced trial completions were found at 10 170 mg/m</span><sup data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">3</span></sup><span data-dcnode-id="3863" instrument_node=""> (1500 ppm) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r89" data-dcnode-id="3861" href="#" role="button"><span data-dcnode-id="3862" instrument_node="">89</span></a><span data-dcnode-id="3860" instrument_node="">).</span></p><p data-dcnode-id="3830"><span data-dcnode-id="3858" instrument_node="">Limited teratogenicity studies in rats, mice and rabbits suggest that PCE produces fetotoxicity and embryotoxicity at high dose levels (≥ 2034 mg/m</span><sup data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">3</span></sup><span data-dcnode-id="3855" instrument_node="">). In a behavioural teratogenicity study in rats, neuromuscular ability in pups was decreased at 6100 mg/m</span><sup data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">3</span></sup><span data-dcnode-id="3852" instrument_node=""> (900 ppm) but not at 2034 mg/m</span><sup data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">3</span></sup><span data-dcnode-id="3849" instrument_node=""> (300 ppm) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="3847" href="#" role="button"><span data-dcnode-id="3848" instrument_node="">2</span></a><span data-dcnode-id="3846" instrument_node="">). In a study on developmental toxicity, embryos from rats were explanted on gestational day 120 and cultured for 46 hours in the presence of PCE. Exposure to PCE ranging from 3.5 to 15 mM caused concentration-related effects on growth and development. The presence of hepatic microsomal fractions in the culture medium partially prevented the effects of PCE on the measured parameters of embryo growth and development (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r90" data-dcnode-id="3844" href="#" role="button"><span data-dcnode-id="3845" instrument_node="">90</span></a><span data-dcnode-id="3843" instrument_node="">). A study showed altered behaviour in adult mice orally exposed to PCE as neonates (5 and 320 mg/kg PCE/day between days 10 and 16 postnatally), indicating neonatal susceptibility of brain maturation in achieving long-lasting changes in adult behaviour (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r91" data-dcnode-id="3841" href="#" role="button"><span data-dcnode-id="3842" instrument_node="">91</span></a><span data-dcnode-id="3840" instrument_node="">). A developmental study in rats following inhalation exposure to PCE showed maternal responses that were of limited toxicological significance. Developmental effects at 600 ppm consisted of reduced gravid uterus, placental and fetal weights and decreased ossification of thoracic vertebral centra. Developmental effects at 1695 mg/m</span><sup data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">3</span></sup><span data-dcnode-id="3837" instrument_node=""> (250 ppm) were of minimal toxicological significance, being limited to minor decreases in fetal and placental weights. There were no developmental effects at 441 mg/m</span><sup data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">3</span></sup><span data-dcnode-id="3834" instrument_node=""> (65 ppm) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r92" data-dcnode-id="3832" href="#" role="button"><span data-dcnode-id="3833" instrument_node="">92</span></a><span data-dcnode-id="3831" instrument_node="">).</span></p><p data-dcnode-id="3819"><span data-dcnode-id="3829" instrument_node="">PCE at 68–2043 mg/m</span><sup data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">3</span></sup><span data-dcnode-id="3826" instrument_node=""> (10–300 ppm) was found to increase, in a concentration-dependent manner, ACh- and high K+-induced muscle contraction in tracheal tissue from swine. Swine tissue was used because there are many similarities between swine and human airways. More research is necessary to be able to conclude that these responses play a role in airway impairment and hyperresponsiveness after PCE exposure (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r93" data-dcnode-id="3824" href="#" role="button"><span data-dcnode-id="3825" instrument_node="">93</span></a><span data-dcnode-id="3823" instrument_node="">). A study using renal cell suspensions of rats and mice showed that PCE caused acute renal cellular toxicity in rats and mitochondrial toxicity in rats and mice (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r49" data-dcnode-id="3821" href="#" role="button"><span data-dcnode-id="3822" instrument_node="">49</span></a><span data-dcnode-id="3820" instrument_node="">).</span></p></div><div data-dcnode-id="3770" id="ch9.s29"><h4 data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">Carcinogenic effects</span></h4><p data-dcnode-id="3799"><span data-dcnode-id="3815" instrument_node="">Data on the carcinogenicity of PCE have been evaluated in various health assessment documents (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="3813" href="#" role="button"><span data-dcnode-id="3814" instrument_node="">2</span></a><span data-dcnode-id="3812" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r6" data-dcnode-id="3810" href="#" role="button"><span data-dcnode-id="3811" instrument_node="">6</span></a><span data-dcnode-id="3809" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r51" data-dcnode-id="3807" href="#" role="button"><span data-dcnode-id="3808" instrument_node="">51</span></a><span data-dcnode-id="3806" instrument_node="">). PCE-induced nephrotoxicity and nephrocarcinogenicity have been associated with metabolism by the glutathione conjugation pathway to form TCVG (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r48" data-dcnode-id="3804" href="#" role="button"><span data-dcnode-id="3805" instrument_node="">48</span></a><span data-dcnode-id="3803" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r53" data-dcnode-id="3801" href="#" role="button"><span data-dcnode-id="3802" instrument_node="">53</span></a><span data-dcnode-id="3800" instrument_node="">).</span></p><p data-dcnode-id="3785"><span data-dcnode-id="3798" instrument_node="">Oral and inhalation studies with NTP have been performed in mice and rats. In a gavage study in B6C3F1 mice (time-weighted average (TWA) daily dose levels of 536 and 1072 mg/kg body weight in males and 386 and 772 mg/kg in females), increased incidences of hepatocellular carcinomas were found in males and females (4/37, 32/49 and 27/48 in males and 2/40, 19/48 and 19/48 in females). In Osborne Mendel rats, no increase in tumour incidence was seen. This study has various limitations: numerous dose adjustments during the study, early mortality related to compound-induced toxic nephropathy, and pneumonia due to intercurrent infectious disease in both rats and mice (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="3796" href="#" role="button"><span data-dcnode-id="3797" instrument_node="">2</span></a><span data-dcnode-id="3795" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r94" data-dcnode-id="3793" href="#" role="button"><span data-dcnode-id="3794" instrument_node="">94</span></a><span data-dcnode-id="3792" instrument_node="">). In the inhalation study in B6C3F1 mice (test concentrations 100 and 200 ppm, 6 hours/day, 5 days/week for 103 weeks, corresponding to 680 and 1360 mg/m</span><sup data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">3</span></sup><span data-dcnode-id="3789" instrument_node="">), incidences of hepatocellular carcinomas were increased (7/49, 25/49 and 26/50 males and 1/48, 13/50 and 36/50 females). In F344/N rats (test concentrations 200 and 400 ppm, 6 hours/day, 5 days/week for 103 weeks, corresponding to 1360 and 2720 mg/m</span><sup data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">3</span></sup><span data-dcnode-id="3786" instrument_node="">), PCE caused dose-related increases in the incidence of stage 3 mononuclear cell leukaemia in animals of both sexes: in males, 20/50 in controls, 24/50 at the low dose and 27/50 at the high dose; in females, 10/50, 18/50 and 21/50, respectively. The historical control for mononuclear cell leukaemia in rats in the same laboratory was 47% in males and 29% in females. Uncommonly occurring renal tubular cell adenomas or adenocarcinomas were found in male rats (adenomas,1/49 in controls, 3/49 at the low dose and 2/50 at the high dose; adenocarcinomas, 0/49, 0/49 and 2/50, respectively).</span></p><p data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">Although induction of peroxisome proliferation as a mechanism underlying the hepatocarcinogenic effect of PCE in mice appears attractive, a poor quantitative correlation was seen between peroxisome proliferation and tumour formation in the liver following administration by inhalation.</span></p><p data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">The induction of kidney tumours observed in male rats provides only weak evidence for (human) carcinogenicity. The observed increase in incidence is not statistically significant. In addition, two different mechanisms of action have been proposed for the induction of these tumours: alpha 2μ-globulin nephropathy, an effect specific for male rats, and formation of genotoxic metabolites in the kidneys as the final step of the glutathione biotransformation pathway. Given the low incidences observed, combined with the data on the mechanism of induction, it can be concluded that the result in male rats is equivocal evidence only for a risk of renal cancer in humans.</span></p><p data-dcnode-id="3776"><span data-dcnode-id="3780" instrument_node="">A review of six carcinogenicity studies of PCE in rats concluded that evidence of increases in mononuclear cell leukaemia has been seen in two studies in the F344 rat but not in other strains, and that as a rat-strain-specific effect it is not considered to be relevant to the evaluation of human cancer risk (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r95" data-dcnode-id="3778" href="#" role="button"><span data-dcnode-id="3779" instrument_node="">95</span></a><span data-dcnode-id="3777" instrument_node="">).</span></p><p data-dcnode-id="3771"><span data-dcnode-id="3775" instrument_node="">IARC (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r96" data-dcnode-id="3773" href="#" role="button"><span data-dcnode-id="3774" instrument_node="">96</span></a><span data-dcnode-id="3772" instrument_node="">) has concluded that the results of the available animal bioassays provide sufficient evidence for carcinogenicity in animals.</span></p></div><div data-dcnode-id="3741" id="ch9.s30"><h4 data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">Mutagenicity</span></h4><p data-dcnode-id="3742"><span data-dcnode-id="3767" instrument_node="">Comprehensive reviews are available of the data obtained from the many studies carried out with PCE (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="3765" href="#" role="button"><span data-dcnode-id="3766" instrument_node="">2</span></a><span data-dcnode-id="3764" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r51" data-dcnode-id="3762" href="#" role="button"><span data-dcnode-id="3763" instrument_node="">51</span></a><span data-dcnode-id="3761" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r96" data-dcnode-id="3759" href="#" role="button"><span data-dcnode-id="3760" instrument_node="">96</span></a><span data-dcnode-id="3758" instrument_node="">). In vitro studies include tests for gene mutations in prokaryotes and eukaryotes and tests for chromosome aberrations in mammalian cell lines. In vivo studies include tests for chromosome aberrations in bone marrow in rats and mice and a dominant-lethal assay in rats. In addition, several studies have been carried out on DNA damage in vitro and in vivo. The body of results shows absence of mutagenicity of PCE in virtually all of the systems tested. The few weakly positive results may be due to the presence of mutagenic stabilizers in the test samples (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="3756" href="#" role="button"><span data-dcnode-id="3757" instrument_node="">2</span></a><span data-dcnode-id="3755" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r51" data-dcnode-id="3753" href="#" role="button"><span data-dcnode-id="3754" instrument_node="">51</span></a><span data-dcnode-id="3752" instrument_node="">). Binding of PCE in vivo to unpurified DNA from several organs was noted in one study, although no covalent binding to purified hepatic DNA could be demonstrated in another. In the other available in vivo studies, it is not known whether the test compound (or its metabolites) reached the target tissues. This observation reduces the value of the negative results observed. Nevertheless, an in vivo study, in which male mice were administered PCE intraperitoneally, assessed the induction of micronuclei in hepatocytes and reticulocytes and showed that PCE might have a clastogenic effect in hepatocytes (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r97" data-dcnode-id="3750" href="#" role="button"><span data-dcnode-id="3751" instrument_node="">97</span></a><span data-dcnode-id="3749" instrument_node="">). For the metabolites of PCE that are formed by conjugation with glutathione (a minor biotransformation route demonstrated in rodents), positive results were obtained in in vitro studies in </span><i data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">S. typhimurium</span></i><span data-dcnode-id="3746" instrument_node=""> TA 100 (reverse mutation), with metabolic activation with kidney microsomes, in the presence of glutathione and glutathione transferase (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r96" data-dcnode-id="3744" href="#" role="button"><span data-dcnode-id="3745" instrument_node="">96</span></a><span data-dcnode-id="3743" instrument_node="">).</span></p></div><div data-dcnode-id="3721" id="ch9.s31"><h4 data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">Interactions with other chemicals</span></h4><p data-dcnode-id="3722"><span data-dcnode-id="3738" instrument_node="">Results of studies on the influence of ethanol on the metabolism and toxicity of PCE in liver did not show synergism (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="3736" href="#" role="button"><span data-dcnode-id="3737" instrument_node="">2</span></a><span data-dcnode-id="3735" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r98" data-dcnode-id="3733" href="#" role="button"><span data-dcnode-id="3734" instrument_node="">98</span></a><span data-dcnode-id="3732" instrument_node="">). Increased urinary excretion of metabolites of PCE and enhanced hepatotoxicity have been observed in rats following pretreatment with polychlorinated biphenyls (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="3730" href="#" role="button"><span data-dcnode-id="3731" instrument_node="">2</span></a><span data-dcnode-id="3729" instrument_node="">). Simulation of interaction thresholds for human exposure to mixtures of TCE, PCE and 1,1,1-trichloroethane was done with PBPK models. Model simulations indicated that during combined exposures, certain toxicological effects may be expected to occur at lower exposure levels compared with PCE exposure alone (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r73" data-dcnode-id="3727" href="#" role="button"><span data-dcnode-id="3728" instrument_node="">73</span></a><span data-dcnode-id="3726" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r99" data-dcnode-id="3724" href="#" role="button"><span data-dcnode-id="3725" instrument_node="">99</span></a><span data-dcnode-id="3723" instrument_node="">).</span></p></div></div><div data-dcnode-id="3405" id="ch9.s32"><h3 data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">Effects on humans</span></h3><p data-dcnode-id="3713"><span data-dcnode-id="3717" instrument_node="">Exposure to PCE can affect the CNS, eyes, kidney, liver, lungs, mucous membranes and skin. CNS effects have been most frequently noted (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r44" data-dcnode-id="3715" href="#" role="button"><span data-dcnode-id="3716" instrument_node="">44</span></a><span data-dcnode-id="3714" instrument_node="">).</span></p><p data-dcnode-id="3705"><span data-dcnode-id="3712" instrument_node="">The odour threshold in air for detection of PCE is 8 mg/m</span><sup data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">3</span></sup><span data-dcnode-id="3709" instrument_node="">. The odour threshold in air for recognition of PCE is 3–4 times higher (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r16" data-dcnode-id="3707" href="#" role="button"><span data-dcnode-id="3708" instrument_node="">16</span></a><span data-dcnode-id="3706" instrument_node="">).</span></p><div data-dcnode-id="3672" id="ch9.s33"><h4 data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">Acute poisoning incidents</span></h4><p data-dcnode-id="3698"><span data-dcnode-id="3702" instrument_node="">Acute exposure to PCE at air levels of 100–200 ppm can cause irritation of the skin, eyes and upper respiratory tract. Non-cardiogenic pulmonary oedema, nausea, vomiting and diarrhoea can occur. CNS effects have also been observed with acute inhalation exposure to PCE at 50–300 ppm. At these levels, neuromotor effects may be seen and results of certain coordination and behavioural tests may be abnormal. At higher air concentrations, loss of consciousness can occur (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r44" data-dcnode-id="3700" href="#" role="button"><span data-dcnode-id="3701" instrument_node="">44</span></a><span data-dcnode-id="3699" instrument_node="">).</span></p><p data-dcnode-id="3690"><span data-dcnode-id="3697" instrument_node="">Several acute PCE intoxications have been reported. In one case, up to 16 mg was ingested by a 6-year-old boy weighing 22 kg. He was admitted to hospital one hour after ingestion, where his condition deteriorated from somnolence to coma. The initial blood level was 21.5 μg/ml. He recovered completely without liver, renal or CNS injury and was discharged on day 9 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r100" data-dcnode-id="3695" href="#" role="button"><span data-dcnode-id="3696" instrument_node="">100</span></a><span data-dcnode-id="3694" instrument_node="">). In another report, a 32-year-old man became semi-comatose and experienced oliguric acute renal failure after accidental ingestion of 75 g PCE. A renal biopsy performed on the 19th day after ingestion showed severe acute tubular necrosis. He regained normal renal function after five haemodialyses and conservative treatment. The amount of PCE in the blood and urine were not measured (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r101" data-dcnode-id="3692" href="#" role="button"><span data-dcnode-id="3693" instrument_node="">101</span></a><span data-dcnode-id="3691" instrument_node="">).</span></p><p data-dcnode-id="3673"><span data-dcnode-id="3689" instrument_node="">Three fatalities due to inhalation of PCE have been reported in the literature. A concentration of 4.5 mg/l was measured in the blood of a man aged 53 years weighing 70 kg, who died while he was cleaning and recycling PCE by distillation (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r102" data-dcnode-id="3687" href="#" role="button"><span data-dcnode-id="3688" instrument_node="">102</span></a><span data-dcnode-id="3686" instrument_node="">). A two-year-old boy died due to PCE that had been retained in the curtains of his bedroom. A concentration of 66 mg/l blood was measured (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r103" data-dcnode-id="3684" href="#" role="button"><span data-dcnode-id="3685" instrument_node="">103</span></a><span data-dcnode-id="3683" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r104" data-dcnode-id="3681" href="#" role="button"><span data-dcnode-id="3682" instrument_node="">104</span></a><span data-dcnode-id="3680" instrument_node="">). Finally, a 33-year-old man clearing a line in a dry cleaning establishment died with a blood concentration of 44 mg/l (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r105" data-dcnode-id="3678" href="#" role="button"><span data-dcnode-id="3679" instrument_node="">105</span></a><span data-dcnode-id="3677" instrument_node="">). A fatality due to poisoning by both PCE and TCE has been described, a 45-year-old woman being discovered unconscious and in cardiac arrest in a laundry area. Examination revealed that she was deeply comatose and had acute respiratory distress syndrome and severe metabolic acidosis. Cardiovascular instability and acute renal failure occurred and eventually the patient died; the results of the autopsy are described in the paper. The blood levels of PCE 2, 4, 5, 6 and 7 days after hospital admission were respectively 1319, 758, 787, 436 and 656 μg/l (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r106" data-dcnode-id="3675" href="#" role="button"><span data-dcnode-id="3676" instrument_node="">106</span></a><span data-dcnode-id="3674" instrument_node="">).</span></p></div><div data-dcnode-id="3582" id="ch9.s34"><h4 data-dcnode-id="3670"><span data-dcnode-id="3671" instrument_node="">Effects on the CNS</span></h4><p data-dcnode-id="3665"><span data-dcnode-id="3669" instrument_node="">Depending on the concentration, acute exposure can result in loss of coordination, reversible mood and behavioural changes, or potentially anaesthetic effects. People chronically exposed to PCE may experience ataxia, disorientation, irritability, peripheral neuropathy, short-term memory deficits and sleep disturbance. Reversibility depends on the degree of severity of the exposure and associated effects (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r44" data-dcnode-id="3667" href="#" role="button"><span data-dcnode-id="3668" instrument_node="">44</span></a><span data-dcnode-id="3666" instrument_node="">).</span></p><p data-dcnode-id="3630"><span data-dcnode-id="3664" instrument_node="">PCE has been associated with neurobehavioural dysfunction, including reduced attention in humans. In a series of controlled short-term studies in limited numbers of human volunteers, neurological symptoms (including dizziness, drowsiness and decreased functioning in motor coordination tests) and visual system dysfunction were observed at ≥ 678 mg/m</span><sup data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">3</span></sup><span data-dcnode-id="3661" instrument_node=""> (≥ 100 ppm) and 339 mg/m</span><sup data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">3</span></sup><span data-dcnode-id="3658" instrument_node=""> (50 ppm), respectively (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="3656" href="#" role="button"><span data-dcnode-id="3657" instrument_node="">2</span></a><span data-dcnode-id="3655" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r16" data-dcnode-id="3653" href="#" role="button"><span data-dcnode-id="3654" instrument_node="">16</span></a><span data-dcnode-id="3652" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r107" data-dcnode-id="3650" href="#" role="button"><span data-dcnode-id="3651" instrument_node="">107</span></a><span data-dcnode-id="3649" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r108" data-dcnode-id="3647" href="#" role="button"><span data-dcnode-id="3648" instrument_node="">108</span></a><span data-dcnode-id="3646" instrument_node="">). Limited information on neurological effects following long-term exposure was obtained in occupational studies in dry cleaning workers. In a cross-sectional study with two groups of exposed workers (exposure concentrations 83 ± 53 mg/m</span><sup data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">3</span></sup><span data-dcnode-id="3643" instrument_node=""> and 364 ± 114 mg/m</span><sup data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">3</span></sup><span data-dcnode-id="3640" instrument_node="">, duration of exposure 127 or 141 days), small effects on scores in psychological tests were found. However, the response did not correlate with the exposure level in this study (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="3638" href="#" role="button"><span data-dcnode-id="3639" instrument_node="">2</span></a><span data-dcnode-id="3637" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r6" data-dcnode-id="3635" href="#" role="button"><span data-dcnode-id="3636" instrument_node="">6</span></a><span data-dcnode-id="3634" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r109" data-dcnode-id="3632" href="#" role="button"><span data-dcnode-id="3633" instrument_node="">109</span></a><span data-dcnode-id="3631" instrument_node="">).</span></p><p data-dcnode-id="3607"><span data-dcnode-id="3629" instrument_node="">In another study in female dry cleaning workers with exposures of 6.8–408 mg/m</span><sup data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">3</span></sup><span data-dcnode-id="3626" instrument_node=""> (4-hour averages, median 102 mg/m</span><sup data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">3</span></sup><span data-dcnode-id="3623" instrument_node="">) and PCE concentrations in the blood of 12–864 mg/l (median 145 mg/l), performance test scores in a test battery for neuromotor functions were decreased. Neither duration of exposure nor blood concentration of PCE was significantly correlated with performance (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r110" data-dcnode-id="3621" href="#" role="button"><span data-dcnode-id="3622" instrument_node="">110</span></a><span data-dcnode-id="3620" instrument_node="">). In cross-sectional studies in dry cleaning workers, effects on blue–yellow colour vision were found at mean PCE concentrations of 42–102 mg/m</span><sup data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">3</span></sup><span data-dcnode-id="3617" instrument_node="">(</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r111" data-dcnode-id="3615" href="#" role="button"><span data-dcnode-id="3616" instrument_node="">111</span></a><span data-dcnode-id="3614" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r112" data-dcnode-id="3612" href="#" role="button"><span data-dcnode-id="3613" instrument_node="">112</span></a><span data-dcnode-id="3611" instrument_node="">). In Italy, PCE-induced impairment of colour vision was studied in 33 dry cleaning workers. Exposure was evaluated with passive samplers and colour vision was assessed. Two years later, the workers were re-examined. The exposure to PCE had increased in subgroup A (median 1.7 ppm vs 4.3 ppm). In subgroup B, exposure was reduced (median 2.9 ppm vs 0.7 ppm). Colour vision worsened in subgroup A but no vision changes were noticed in subgroup B, indicating that an increase in exposure during a 2-year period can cause colour vision to deteriorate (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r113" data-dcnode-id="3609" href="#" role="button"><span data-dcnode-id="3610" instrument_node="">113</span></a><span data-dcnode-id="3608" instrument_node="">).</span></p><p data-dcnode-id="3602"><span data-dcnode-id="3606" instrument_node="">A case report described a 57-year-old woman exposed to supposedly high concentrations of PCE while working at a dry cleaning shop, who suffered from blindness for 9 days in the left eye and 11 days in the right eye with optic neuritis. Blood concentrations of PCE 48 and 80 hours after onset of the optic neuritis were respectively 1.08 mg/g and 0.65 mg/g (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r114" data-dcnode-id="3604" href="#" role="button"><span data-dcnode-id="3605" instrument_node="">114</span></a><span data-dcnode-id="3603" instrument_node="">).</span></p><p data-dcnode-id="3597"><span data-dcnode-id="3601" instrument_node="">In a prospective population-based cohort study on 88 829 children, offspring from dry cleaners (144 children) were followed from birth to age 21–33 years. Preliminary findings suggested an increased incidence of schizophrenia (4 cases) in these children (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r115" data-dcnode-id="3599" href="#" role="button"><span data-dcnode-id="3600" instrument_node="">115</span></a><span data-dcnode-id="3598" instrument_node="">). However, it should be mentioned that there was no exposure characterization, there were few cases and few details were provided. These findings need to be corroborated in follow-up studies.</span></p><p data-dcnode-id="3583"><span data-dcnode-id="3596" instrument_node="">Research from 2002 suggests that chronic, environmental exposure to airborne PCE adversely affects neurobehavioural function in healthy individuals. A significantly lower visual contrast sensitivity was reported in apartment residents exposed to PCE (daytime mean 620 μg/m</span><sup data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">3</span></sup><span data-dcnode-id="3593" instrument_node="">, nighttime mean &lt; 100 μg/m</span><sup data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">3</span></sup><span data-dcnode-id="3590" instrument_node="">) compared to unexposed controls. The reliability of these data was later discussed in the literature. Methodological limitations preclude a definitive attribution of causation, and further research is necessary to draw reliable conclusions (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r99" data-dcnode-id="3588" href="#" role="button"><span data-dcnode-id="3589" instrument_node="">99</span></a><span data-dcnode-id="3587" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r116" data-dcnode-id="3585" href="#" role="button"><span data-dcnode-id="3586" instrument_node="">116</span></a><span data-dcnode-id="3584" instrument_node="">).</span></p></div><div data-dcnode-id="3559" id="ch9.s35"><h4 data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">Effects on the liver</span></h4><p data-dcnode-id="3560"><span data-dcnode-id="3579" instrument_node="">Case reports of human exposure to PCE show that it can cause hepatotoxic effects in humans, which include abnormal liver function tests (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r48" data-dcnode-id="3577" href="#" role="button"><span data-dcnode-id="3578" instrument_node="">48</span></a><span data-dcnode-id="3576" instrument_node="">), cirrhosis, hepatitis, hepatomegaly and liver cell necrosis (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r44" data-dcnode-id="3574" href="#" role="button"><span data-dcnode-id="3575" instrument_node="">44</span></a><span data-dcnode-id="3573" instrument_node="">). A dose–response relationship in humans for the effects on the liver is not completely known. In case studies of high accidental exposures, effects on the liver have been reported. In limited studies in dry cleaning workers exposed to a TWA concentration of 143 mg/m</span><sup data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">3</span></sup><span data-dcnode-id="3570" instrument_node=""> (21 ppm) over a 6-year period, serum enzymes indicative of liver function were not affected (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r62" data-dcnode-id="3568" href="#" role="button"><span data-dcnode-id="3569" instrument_node="">62</span></a><span data-dcnode-id="3567" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r112" data-dcnode-id="3565" href="#" role="button"><span data-dcnode-id="3566" instrument_node="">112</span></a><span data-dcnode-id="3564" instrument_node="">). A study in dry cleaners frequently exposed to PCE concentrations of 16 ppm (8-hour TWA) revealed mild to moderate hepatic parenchymal changes as determined by hepatic ultrasonography (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r117" data-dcnode-id="3562" href="#" role="button"><span data-dcnode-id="3563" instrument_node="">117</span></a><span data-dcnode-id="3561" instrument_node="">).</span></p></div><div data-dcnode-id="3510" id="ch9.s36"><h4 data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">Renal effects</span></h4><p data-dcnode-id="3516"><span data-dcnode-id="3556" instrument_node="">Nephrotoxic effects have been described in humans (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r48" data-dcnode-id="3554" href="#" role="button"><span data-dcnode-id="3555" instrument_node="">48</span></a><span data-dcnode-id="3553" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r118" data-dcnode-id="3551" href="#" role="button"><span data-dcnode-id="3552" instrument_node="">118</span></a><span data-dcnode-id="3550" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r119" data-dcnode-id="3548" href="#" role="button"><span data-dcnode-id="3549" instrument_node="">119</span></a><span data-dcnode-id="3547" instrument_node="">). Symptoms of renal dysfunction, including proteinuria and haematuria, have been associated with accidental exposure to anaesthetic concentrations of PCE vapour (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="3545" href="#" role="button"><span data-dcnode-id="3546" instrument_node="">2</span></a><span data-dcnode-id="3544" instrument_node="">). In several cross-sectional studies in dry cleaning workers, the effect of PCE on renal function was examined. Female workers exposed for an average of 14 years to an estimated TWA concentration of 68 mg/m</span><sup data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">3</span></sup><span data-dcnode-id="3541" instrument_node=""> (10 ppm) had increased urinary levels of lysozyme and ß-glucuronidase suggestive of mild renal effects (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r120" data-dcnode-id="3539" href="#" role="button"><span data-dcnode-id="3540" instrument_node="">120</span></a><span data-dcnode-id="3538" instrument_node="">). No effects were observed in workers estimated to have been exposed to a TWA concentration of 142 mg/m</span><sup data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">3</span></sup><span data-dcnode-id="3535" instrument_node=""> (21 ppm) for 6 years (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r62" data-dcnode-id="3533" href="#" role="button"><span data-dcnode-id="3534" instrument_node="">62</span></a><span data-dcnode-id="3532" instrument_node="">). In a cross-sectional study, about 20 markers of early nephrotoxic effects were measured in workers in dry cleaning facilities (n = 50). Exposure was determined by analysing air samples collected during 4-hour periods randomly selected over the working week. The median exposure concentration was 102 mg/m</span><sup data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">3</span></sup><span data-dcnode-id="3529" instrument_node=""> (range, trace–580 mg/m</span><sup data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">3</span></sup><span data-dcnode-id="3526" instrument_node="">). Compared to the control population, the exposed group had significantly higher frequencies of abnormal values for a number of the markers in urine, including albumin, transferrin, tissue-nonspecific alkaline phosphatase and brush-border antigens. The significance of the findings cannot be easily assessed but may represent an early stage of clinically silent but potentially progressive renal disease (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r118" data-dcnode-id="3524" href="#" role="button"><span data-dcnode-id="3525" instrument_node="">118</span></a><span data-dcnode-id="3523" instrument_node="">). At an average airborne exposure of 8.4 mg/m</span><sup data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">3</span></sup><span data-dcnode-id="3520" instrument_node=""> (range 2.2–44.6), a PCE-related effect on the tubular reabsorption of retinol-binding protein in urine was observed in exposed workers from a dry cleaning shop (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r119" data-dcnode-id="3518" href="#" role="button"><span data-dcnode-id="3519" instrument_node="">119</span></a><span data-dcnode-id="3517" instrument_node="">).</span></p><p data-dcnode-id="3511"><span data-dcnode-id="3515" instrument_node="">Since there are sex- and species-dependent differences in bioactivation and detoxification pathways, more knowledge about the metabolism of PCE in several target organs and in different species is needed to improve human risk assessment (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r50" data-dcnode-id="3513" href="#" role="button"><span data-dcnode-id="3514" instrument_node="">50</span></a><span data-dcnode-id="3512" instrument_node="">).</span></p></div><div data-dcnode-id="3451" id="ch9.s37"><h4 data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">Reproductive and developmental effects</span></h4><p data-dcnode-id="3500"><span data-dcnode-id="3507" instrument_node="">A few epidemiological studies have reported reproductive or developmental abnormalities due to exposure to PCE in drinking-water. The 1998 Camp LeJeune study reported a weak association between PCE exposure due to contaminated drinking-water and birth weight outcomes for small-for-gestational age births. Stronger associations were observed between PCE exposure and birth weight for infants of mothers who were 35 years of age or older and for infants of mothers with a history of fetal death (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r121" data-dcnode-id="3505" href="#" role="button"><span data-dcnode-id="3506" instrument_node="">121</span></a><span data-dcnode-id="3504" instrument_node="">). Another study found oral cleft defects associated with PCE-contaminated drinking-water. The authors indicate that this study cannot resolve whether the drinking-water contaminants caused the adverse birth outcomes; these findings should therefore be followed up utilizing available drinking-water contamination databases (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r122" data-dcnode-id="3502" href="#" role="button"><span data-dcnode-id="3503" instrument_node="">122</span></a><span data-dcnode-id="3501" instrument_node="">).</span></p><p data-dcnode-id="3486"><span data-dcnode-id="3499" instrument_node="">In a comment on this paper, it is suggested that the oral cleft defects found are biologically plausible (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r123" data-dcnode-id="3497" href="#" role="button"><span data-dcnode-id="3498" instrument_node="">123</span></a><span data-dcnode-id="3496" instrument_node="">). According to these authors, a study of mothers with pregnancies affected by neural tube defects in Dublin (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r124" data-dcnode-id="3494" href="#" role="button"><span data-dcnode-id="3495" instrument_node="">124</span></a><span data-dcnode-id="3493" instrument_node="">) suggests a mechanism for the induction of neural tube defects related to a metabolic slowdown of the methionine synthase reaction. Recently, two cohort studies examined the effects of prenatal exposure to PCE-contaminated drinking-water on adverse birth outcome and risk of behavioural disorders. It was concluded that prenatal and early postnatal PCE exposure is not associated with disorders of attention, learning and behaviour (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r125" data-dcnode-id="3491" href="#" role="button"><span data-dcnode-id="3492" instrument_node="">125</span></a><span data-dcnode-id="3490" instrument_node="">). Further, it was suggested that prenatal PCE exposure does not have an adverse effect on birth weight or gestational duration (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r126" data-dcnode-id="3488" href="#" role="button"><span data-dcnode-id="3489" instrument_node="">126</span></a><span data-dcnode-id="3487" instrument_node="">).</span></p><p data-dcnode-id="3457"><span data-dcnode-id="3485" instrument_node="">The results of several studies have indicated that occupationally exposed women might suffer higher rates of spontaneous abortion (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r127" data-dcnode-id="3483" href="#" role="button"><span data-dcnode-id="3484" instrument_node="">127</span></a><span data-dcnode-id="3482" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r129" data-dcnode-id="3480" href="#" role="button"><span data-dcnode-id="3481" instrument_node="">129</span></a><span data-dcnode-id="3479" instrument_node="">). Exposure was classified by reported work history. A significant effect was found when the work tasks included dry cleaning for at least one hour daily or the women reported handling of PCE at least once a week (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r128" data-dcnode-id="3477" href="#" role="button"><span data-dcnode-id="3478" instrument_node="">128</span></a><span data-dcnode-id="3476" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r129" data-dcnode-id="3474" href="#" role="button"><span data-dcnode-id="3475" instrument_node="">129</span></a><span data-dcnode-id="3473" instrument_node="">). A significantly higher risk was found in operators compared to non-operators (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r127" data-dcnode-id="3471" href="#" role="button"><span data-dcnode-id="3472" instrument_node="">127</span></a><span data-dcnode-id="3470" instrument_node="">), but other studies have not found this association (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r130" data-dcnode-id="3468" href="#" role="button"><span data-dcnode-id="3469" instrument_node="">130</span></a><span data-dcnode-id="3467" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r131" data-dcnode-id="3465" href="#" role="button"><span data-dcnode-id="3466" instrument_node="">131</span></a><span data-dcnode-id="3464" instrument_node="">). Furthermore, a case-referent study performed within two cohorts did not give any substantial support to the hypothesis that exposure to PCE at work during pregnancy enhances the risk of adverse pregnancy outcome (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r132" data-dcnode-id="3462" href="#" role="button"><span data-dcnode-id="3463" instrument_node="">132</span></a><span data-dcnode-id="3461" instrument_node="">). A retrospective time-to-pregnancy study among Finnish women indicated a reduced ability to reproduce among 20 women exposed to PCE (concentration not clear) for 1–4 days a week or daily by inhalation. It should be noted that the studies have a number of limitations, primarily that exposure concentrations are not available (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r133" data-dcnode-id="3459" href="#" role="button"><span data-dcnode-id="3460" instrument_node="">133</span></a><span data-dcnode-id="3458" instrument_node="">).</span></p><p data-dcnode-id="3452"><span data-dcnode-id="3456" instrument_node="">The Camp Lejeune study of ATSDR (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r134" data-dcnode-id="3454" href="#" role="button"><span data-dcnode-id="3455" instrument_node="">134</span></a><span data-dcnode-id="3453" instrument_node="">) was not included in this guideline, since an error was made in the exposure classification; these data will be re-analysed by ATSDR at a later stage.</span></p></div><div data-dcnode-id="3406" id="ch9.s38"><h4 data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">Mutagenic and carcinogenic effects</span></h4><p data-dcnode-id="3444"><span data-dcnode-id="3448" instrument_node="">IARC concluded in 1995 that there is evidence for consistently positive associations between exposure to PCE and the risks for oesophageal and cervical cancer and non-Hodgkin's lymphoma. These associations appear unlikely to be due to chance, although confounding factors cannot be excluded and the total numbers in the cohort studies combined are relatively small. IARC therefore concluded that there is limited evidence for the carcinogenicity of PCE in humans (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r96" data-dcnode-id="3446" href="#" role="button"><span data-dcnode-id="3447" instrument_node="">96</span></a><span data-dcnode-id="3445" instrument_node="">).</span></p><p data-dcnode-id="3439"><span data-dcnode-id="3443" instrument_node="">PCE is reasonably anticipated to be a human carcinogen on the basis of limited evidence from studies in humans and sufficient evidence of carcinogenicity from studies in experimental animals. PCE has been studied by observing laundry and dry cleaning workers, who may also have been exposed to other solvents, especially TCE but also petroleum solvents. In several cohort and proportionate mortality studies, excesses have been reported of lymphosarcomas, leukaemias and cancers of the skin, colon, lung and urogenital tract. Some excess of lymphomas and of cancers of the larynx and urinary bladder was seen in a large cohort of dry cleaners. A familial cluster of chronic lymphocytic leukaemia has also been related to dry cleaning. Although these studies suggest a possible association between long-term occupational exposure to PCE and increased lymphatic malignancies and urogenital cancers, the evidence must be regarded as inconclusive because workers were exposed to petroleum solvents and other dry cleaning agents as well as PCE (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r135" data-dcnode-id="3441" href="#" role="button"><span data-dcnode-id="3442" instrument_node="">135</span></a><span data-dcnode-id="3440" instrument_node="">).</span></p><p data-dcnode-id="3428"><span data-dcnode-id="3438" instrument_node="">The results of a study in differently exposed dry cleaners and launderers indicated a reduction in oxidative DNA damage in exposed dry cleaners compared to launderers. The mean value for PCE in the blood of these dry cleaners was 0.078 mg/l, and the TWA was &lt; 5 ppm in air for 17 out of 18 dry cleaners. However, PCE could not clearly be identified as the source of the effect (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r136" data-dcnode-id="3436" href="#" role="button"><span data-dcnode-id="3437" instrument_node="">136</span></a><span data-dcnode-id="3435" instrument_node="">). In two studies for genetic effects (sister chromatid exchanges and/or chromosome aberrations) in lymphocytes of occupationally exposed workers, no clear-cut effects were found (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r6" data-dcnode-id="3433" href="#" role="button"><span data-dcnode-id="3434" instrument_node="">6</span></a><span data-dcnode-id="3432" instrument_node="">). Another study showed modulation of the expression of some genes related to cancer induction in human cord blood cells (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r137" data-dcnode-id="3430" href="#" role="button"><span data-dcnode-id="3431" instrument_node="">137</span></a><span data-dcnode-id="3429" instrument_node="">).</span></p><p data-dcnode-id="3417"><span data-dcnode-id="3427" instrument_node="">A population-based case-control study was undertaken to investigate the association between breast cancer and PCE exposure from public drinking-water (drinking-water consumption as well as bathing habits were taken into account). The same author performed a more extensive case-control study a few years later. Both studies suggest that women with the highest PCE exposure levels have a slightly to moderately increased risk of breast cancer. Analyses of the same data using a newly constructed personally delivered dose model to make a more accurate estimation of the exposure did not significantly change the subjects' exposure classification (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r138" data-dcnode-id="3425" href="#" role="button"><span data-dcnode-id="3426" instrument_node="">138</span></a><span data-dcnode-id="3424" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r140" data-dcnode-id="3422" href="#" role="button"><span data-dcnode-id="3423" instrument_node="">140</span></a><span data-dcnode-id="3421" instrument_node="">). An association between PCE exposure from public drinking-water and lung cancer and possibly colorectal cancer was suggested, based on another population-based case-control study (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r141" data-dcnode-id="3419" href="#" role="button"><span data-dcnode-id="3420" instrument_node="">141</span></a><span data-dcnode-id="3418" instrument_node="">).</span></p><p data-dcnode-id="3412"><span data-dcnode-id="3416" instrument_node="">A paper from 2003 assessed (based on specified methodological and scientific quality criteria) 44 epidemiological papers that provided reasonable data on up to 17 cancer sites. The authors concluded that no evidence for an association between breast, prostate, skin or brain cancer and exposure to PCE was demonstrated. A relationship between PCE and cancer of the oral cavity, liver, pancreas, cervix and lung was considered unlikely by the authors. Scientific evidence was considered inadequate for laryngeal, kidney, oesophageal and bladder cancers (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r142" data-dcnode-id="3414" href="#" role="button"><span data-dcnode-id="3415" instrument_node="">142</span></a><span data-dcnode-id="3413" instrument_node="">).</span></p><p data-dcnode-id="3407"><span data-dcnode-id="3411" instrument_node="">In 2006, the epidemiological literature since 1990 on occupational chlorinated solvent exposure was reviewed. The paper reviewed 28 studies of PCE, all but 5 of which focused on workers in the dry cleaning industry with few or no other chemical exposures. Within the study populations with multiple exposures, three studies found some increased risk of biliary and liver or brain cancer; in the other studies, no increased risk for renal cell carcinoma or for any cancer was found. Census records for those working as a “dry cleaner or laundry worker” or from a database of those being monitored for PCE exposure were linked to cancer registries (three studies) and statistically significant increased risks for liver and pancreatic cancer, Hodgkin's lymphoma and leukaemia were found. In general, findings in occupational cohort studies have not been consistent, even within the same industries (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r143" data-dcnode-id="3409" href="#" role="button"><span data-dcnode-id="3410" instrument_node="">143</span></a><span data-dcnode-id="3408" instrument_node="">).</span></p></div></div></div><div data-dcnode-id="3260" id="ch9.s39"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3401"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3402" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3403" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="3399" id="_ch9_s39_"><span data-dcnode-id="3400" instrument_node="">Health risk evaluation</span></h2><div data-dcnode-id="3335" id="ch9.s40"><h3 data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">Critical health outcomes</span></h3><p data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">The main health effects of concern are local irritation (eyes, mucous membrane
