s, respiratory tract and skin), effects on the CNS and cancer. Effects on the liver and kidneys have also been reported.</span></p><div data-dcnode-id="3384" id="ch9.s41"><h4 data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">CNS effects and local irritation</span></h4><p data-dcnode-id="3385"><span data-dcnode-id="3392" instrument_node="">The evidence is sufficient to conclude that PCE can cause irritation of mucous membranes and the respiratory tract. These effects generally occur at high concentrations. Acute exposure to PCE at air levels of 680–1360 mg/m</span><sup data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">3</span></sup><span data-dcnode-id="3389" instrument_node=""> (100–200 ppm) can cause irritation of the skin, eyes and upper respiratory tract in humans. Moreover non-cardiogenic pulmonary oedema, nausea, vomiting and diarrhoea can occur. CNS effects have been observed at high dose levels in rats and mice. In humans, CNS effects have also been observed with acute inhalation exposures of 340–2040 mg/m</span><sup data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">3</span></sup><span data-dcnode-id="3386" instrument_node=""> (50–300 ppm) of PCE. The evidence is sufficient to conclude that there is an association between PCE and CNS effects at sufficiently high concentrations. Since high concentrations typically do not occur in indoor environments for a long period of time, these end-points are not taken into account when setting the guideline value.</span></p></div><div data-dcnode-id="3365" id="ch9.s42"><h4 data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">Liver and kidney effects</span></h4><p data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">The evidence of an association between PCE exposure and effects on the liver is suggestive. Hepatic effects have been observed in rats and mice in subchronic studies. Case reports of accidental exposures of humans to PCE confirm that hepatotoxic effects can occur in humans, including abnormal liver function tests, cirrhosis, hepatitis, hepatomegaly and liver cell necrosis.</span></p><p data-dcnode-id="3366"><span data-dcnode-id="3379" instrument_node="">There is suggestive evidence of an association between PCE exposure and effects on the kidneys. In chronic studies, renal effects were observed at 1360 and 2710 mg/m</span><sup data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">3</span></sup><span data-dcnode-id="3376" instrument_node=""> (200 and 400 ppm) in rats and at 680 and 1360 mg/m</span><sup data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">3</span></sup><span data-dcnode-id="3373" instrument_node=""> (100 and 200 ppm) in mice. Reversible kidney damage in humans (e.g. proteinuria and haematuria) has been associated with accidental exposure to acutely toxic concentrations of PCE vapour. A long-term exposure study showed that renal effects may develop at lower concentrations, with the reported onset of renal damage occurring following exposure to a median concentration of 102 mg/m</span><sup data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">3</span></sup><span data-dcnode-id="3370" instrument_node=""> (range, trace–576 mg/m</span><sup data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">3</span></sup><span data-dcnode-id="3367" instrument_node="">).</span></p></div><div data-dcnode-id="3360" id="ch9.s43"><h4 data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">Reproductive and developmental effects</span></h4><p data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">A few epidemiological studies have reported developmental abnormalities due to PCE exposure in drinking-water (reduced birth weight and oral cleft defects). Other studies concluded that prenatal PCE exposure does not have an adverse effect on birth weight or gestational duration. Some studies have consistently indicated that occupationally exposed women might suffer higher rates of spontaneous abortion, while others found no association. All the above-mentioned studies have limitations, primarily that the exposure concentrations are not available. Therefore the evidence stays suggestive.</span></p></div><div data-dcnode-id="3336" id="ch9.s44"><h4 data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">Cancer risk</span></h4><p data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">IARC concluded that the results of the available animal bioassays provide sufficient evidence for carcinogenicity to animals. In these studies, an increased incidence of adenomas and carcinomas was observed in the livers of exposed mice. There is suggestive evidence from mechanistic studies that humans are likely to be less sensitive to the development of these tumours following PCE exposure. A low incidence of kidney tumours among male rats has been reported.</span></p><p data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">It can be concluded from this small and statistically non-significant increase, together with the data relating to the possible mechanism of induction, that the result in male rats is equivocal evidence only for a risk of renal cancer in humans.</span></p><p data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">The significance for humans of the increased incidence of mononuclear cell leukaemia, as observed in two studies in F344 rats, is unclear. This is due to the lack of understanding of the mechanism underlying the formation of this cancer type (which has a high background incidence) and the suggestion that it might be a rat-strain-specific effect.</span></p><p data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">IARC concluded in 1995 that there is evidence for consistently positive associations between exposure to PCE and the risks for oesophageal and cervical cancer and non-Hodgkin's lymphoma.</span></p><p data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node="">These associations appear unlikely to be due to chance, although confounding factors cannot be excluded and the total numbers in the cohort studies combined are relatively small.</span></p><p data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">A paper from 2003 assessed (based on specified methodological and scientific quality criteria) 44 epidemiological papers that provided reasonable data on up to 17 cancer sites. The authors concluded that no evidence for an association between breast, prostate, skin or brain cancer and exposure to PCE was demonstrated.</span></p><p data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">A relationship between PCE and cancer of the following sites was considered unlikely by the authors: oral cavity, liver, pancreas, cervix and lung. Scientific evidence was considered inadequate for laryngeal, kidney, oesophageal and bladder cancers. Since then, new studies have been published, but the evidence concerning the carcinogenicity of PCE is still not conclusive. The evidence for an association therefore remains suggestive.</span></p><p data-dcnode-id="3339"><span data-dcnode-id="3343" instrument_node="">From the weight of the evidence from mutagenicity studies, there are no indications that PCE is genotoxic. Although several in vitro studies indicate that conjugation of PCE with reduced glutathione (a minor biotransformation route demonstrated to occur in rodents) produces renal metabolites that are mutagenic in </span><i data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">S. typhimurium</span></i><span data-dcnode-id="3340" instrument_node=""> TA 100, the significance of the latter results for humans is doubtful. In two studies investigating genetic effects (sister chromatid exchanges and/or chromosome aberrations) in lymphocytes of occupationally exposed workers, no clear-cut effects were found.</span></p><p data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">In conclusion, carcinogenicity is not used as an end-point, since there are no indications that PCE is genotoxic and there is some uncertainty about the epidemiological evidence as well as the relevance of the animal carcinogenicity data to humans. However, because of the remaining uncertainty about the carcinogenicity of PCE, it should be kept under review.</span></p></div></div><div data-dcnode-id="3313" id="ch9.s45"><h3 data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">Health relevance of current indoor exposures</span></h3><p data-dcnode-id="3319"><span data-dcnode-id="3332" instrument_node="">Inhalation of PCE is the major route of exposure in the general population. Ambient air concentrations of PCE are generally &lt; 5 μg/m</span><sup data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">3</span></sup><span data-dcnode-id="3329" instrument_node=""> in urban areas and typically &lt; 1 μg/m</span><sup data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">3</span></sup><span data-dcnode-id="3326" instrument_node=""> in rural areas. Indoor concentrations are generally well below 20 μg/m</span><sup data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">3</span></sup><span data-dcnode-id="3323" instrument_node="">, with median concentrations ranging from 0.16 to 8.7 μg/m</span><sup data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">3</span></sup><span data-dcnode-id="3320" instrument_node=""> in the described studies. These concentrations are an order of magnitude below concentrations that can be relevant for health.</span></p><p data-dcnode-id="3314"><span data-dcnode-id="3318" instrument_node="">Indoor PCE air levels may be up to 5.0 mg/m</span><sup data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">3</span></sup><span data-dcnode-id="3315" instrument_node=""> (4–24-hour average) in buildings with dry cleaning operations where PCE is used. There is sufficient evidence to conclude that concentrations in premises next to dry cleaning operations can exceed safe concentrations. This should be the focus of concern.</span></p></div><div data-dcnode-id="3261" id="ch9.s46"><h3 data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">Conclusions of other reviews</span></h3><p data-dcnode-id="3306"><span data-dcnode-id="3310" instrument_node="">IARC concluded that there is evidence for consistently positive associations between exposure to PCE and the risks for oesophageal and cervical cancer and non-Hodgkin's lymphoma. PCE is classified by IARC as a Group 2A carcinogen (probably carcinogenic to humans) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r96" data-dcnode-id="3308" href="#" role="button"><span data-dcnode-id="3309" instrument_node="">96</span></a><span data-dcnode-id="3307" instrument_node="">).</span></p><p data-dcnode-id="3301"><span data-dcnode-id="3305" instrument_node="">The EU classified the substance as carcinogenic category 3 (substances that cause concern for humans owing to possible carcinogenic effects but in respect of which the available information is not adequate for making a satisfactory assessment) and risk phrase 40 (limited evidence of a carcinogenic effect) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r144" data-dcnode-id="3303" href="#" role="button"><span data-dcnode-id="3304" instrument_node="">144</span></a><span data-dcnode-id="3302" instrument_node="">).</span></p><p data-dcnode-id="3287"><span data-dcnode-id="3300" instrument_node="">USEPA does not currently have a classification for the carcinogenicity of PCE but has calculated a provisional inhalation unit risk estimate of 5.8 × 10</span><sup data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">−7</span></sup><span data-dcnode-id="3297" instrument_node=""> (μg/m</span><sup data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">3</span></sup><span data-dcnode-id="3294" instrument_node="">)</span><sup data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">−1</span></sup><span data-dcnode-id="3291" instrument_node="">. A provisional value is one that has not received Agency-wide review (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r145" data-dcnode-id="3289" href="#" role="button"><span data-dcnode-id="3290" instrument_node="">145</span></a><span data-dcnode-id="3288" instrument_node="">).</span></p><p data-dcnode-id="3282"><span data-dcnode-id="3286" instrument_node="">The United Kingdom Committees on Toxicity, Mutagenicity and Carcinogenicity of Chemicals in Food, Consumer Products and the Environment concluded that there was “no satisfactory epidemiological evidence to associate PCE exposure to cancer in the available cohort studies” (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r146" data-dcnode-id="3284" href="#" role="button"><span data-dcnode-id="3285" instrument_node="">146</span></a><span data-dcnode-id="3283" instrument_node="">).</span></p><p data-dcnode-id="3277"><span data-dcnode-id="3281" instrument_node="">The US National Institute for Occupational Safety and Health considers PCE to be a potential occupational carcinogen (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r147" data-dcnode-id="3279" href="#" role="button"><span data-dcnode-id="3280" instrument_node="">147</span></a><span data-dcnode-id="3278" instrument_node="">).</span></p><p data-dcnode-id="3262"><span data-dcnode-id="3276" instrument_node="">ATSDR has derived both an acute inhalation minimal risk level (MRL) of 1.38 mg/m</span><sup data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">3</span></sup><span data-dcnode-id="3273" instrument_node=""> (0.1 ppm) and a chronic inhalation MRL of 0.28 mg/m</span><sup data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">3</span></sup><span data-dcnode-id="3270" instrument_node="">
</span><sup data-dcnode-id="3267"><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.fn1" data-dcnode-id="3268" href="#" role="button"><span data-dcnode-id="3269" instrument_node="">1</span></a></sup><span data-dcnode-id="3266" instrument_node=""> (0.04 ppm) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="3264" href="#" role="button"><span data-dcnode-id="3265" instrument_node="">2</span></a><span data-dcnode-id="3263" instrument_node="">).</span></p></div></div><div data-dcnode-id="3093" id="ch9.s47"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3257"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3258" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3259" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="3255" id="_ch9_s47_"><span data-dcnode-id="3256" instrument_node="">Guidelines</span></h2><p data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">Carcinogenicity is not selected as the end-point for setting the guideline value for three reasons: the epidemiological evidence is equivocal, the animal tumours detected are not considered relevant to humans, and there are no indications that PCE is genotoxic. The derivation of a guideline value is at present based on two non-neoplastic effects as the critical end-point: impaired neurobehavioural performance and early renal changes.</span></p><p data-dcnode-id="3239"><span data-dcnode-id="3252" instrument_node="">On the basis of a long-term LOAEL for kidney effects of 102 mg/m</span><sup data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">3</span></sup><span data-dcnode-id="3249" instrument_node=""> in dry cleaning workers, a guideline value of 0.25 mg/m</span><sup data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">3</span></sup><span data-dcnode-id="3246" instrument_node=""> has been calculated. In deriving this guideline value, the LOAEL is converted to continuous exposure (dividing by a factor of 4.2 (168/40)) and divided by an uncertainty factor of 100 (10 for use of a LOAEL and 10 for intra-species variation). Recognizing that some uncertainty in the LOAEL exists because the effects observed at this level are not clear-cut and because of fluctuations in exposure levels, an alternative calculation was made based on the LOAEL in mice of 680 mg/m</span><sup data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">3</span></sup><span data-dcnode-id="3243" instrument_node=""> and using an appropriate uncertainty factor of 1000. This calculation yields a guideline value of 0.68 mg/m</span><sup data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">3</span></sup><span data-dcnode-id="3240" instrument_node="">.</span></p><p data-dcnode-id="3225"><span data-dcnode-id="3238" instrument_node="">A chronic inhalation MRL of 0.28 mg/m</span><sup data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">3</span></sup><span data-dcnode-id="3235" instrument_node=""> (0.04 ppm) has been derived by ATSDR based on the LOAEL of 15 ppm identified in the Ferroni study (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r110" data-dcnode-id="3233" href="#" role="button"><span data-dcnode-id="3234" instrument_node="">110</span></a><span data-dcnode-id="3232" instrument_node="">). The MRL was calculated from this concentration by expanding to continuous exposure (8/24 hours, 5/7 days) and dividing by an uncertainty factor of 100 (10 for use of a LOAEL and 10 for human variability). This reference found significantly prolonged reaction times in workers occupationally exposed to an average of 15 ppm for about 10 years (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r2" data-dcnode-id="3230" href="#" role="button"><span data-dcnode-id="3231" instrument_node="">2</span></a><span data-dcnode-id="3229" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r110" data-dcnode-id="3227" href="#" role="button"><span data-dcnode-id="3228" instrument_node="">110</span></a><span data-dcnode-id="3226" instrument_node="">).</span></p><p data-dcnode-id="3220"><span data-dcnode-id="3224" instrument_node="">The value and appropriateness of establishing a short-term guideline value is questionable because acute effects occur only at very high concentrations of 50 ppm (340 mg/m</span><sup data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">3</span></sup><span data-dcnode-id="3221" instrument_node="">) and higher, compared to generally observed levels in close proximity to dry cleaning facilities. Establishing a long-term value is more protective of human health.</span></p><p data-dcnode-id="3212"><span data-dcnode-id="3219" instrument_node="">On the basis of the overall health risk evaluation, the recommended guideline for year-long exposure is 0.25 mg/m</span><sup data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">3</span></sup><span data-dcnode-id="3216" instrument_node="">. This is the same as the previous WHO guideline (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r148" data-dcnode-id="3214" href="#" role="button"><span data-dcnode-id="3215" instrument_node="">148</span></a><span data-dcnode-id="3213" instrument_node="">).</span></p><blockquote data-dcnode-id="3209"><p data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">The guidelines section was formulated and agreed by the working group meeting in November 2009.</span></p></blockquote><div class="box" data-dcnode-id="3094" id="ch9.box1"><h3 data-dcnode-id="3206"><span class="title" data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">Summary of main evidence and decision-making in guideline formulation</span></span></h3><div data-dcnode-id="3201" id="ch9.box1.s1"><h4 data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">Critical outcome for guideline definition</span></h4><p data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">Effects in the kidney indicative of early renal disease and impaired neurobehavioural performance. Carcinogenicity is not used as an end-point as there are no indications that PCE is genotoxic and there is uncertainty about the epidemiological evidence and the relevance to humans of the animal carcinogenicity data.</span></p></div><div data-dcnode-id="3169" id="ch9.box1.s2"><h4 data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">Source of exposure–effect evidence</span></h4><dl class="temp-labeled-list" data-dcnode-id="3170"><dt data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">–</span></dt><dd data-dcnode-id="3185"><p class="no_top_margin" data-dcnode-id="3186"><span data-dcnode-id="3196" instrument_node="">Based on a health surveillance study of dry cleaning workers exposed to PCE, the long-term LOAEL for kidney effects was considered to be 102 mg/m</span><sup data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">3</span></sup><span data-dcnode-id="3193" instrument_node="">. This was adjusted for continuous exposure by dividing by a factor of 168/40. Further, factors of 10 for use of a LOAEL and 10 for intra-species variation were incorporated, leading to a guideline value of 0.25 mg/m</span><sup data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">3</span></sup><span data-dcnode-id="3190" instrument_node="">(</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r62" data-dcnode-id="3188" href="#" role="button"><span data-dcnode-id="3189" instrument_node="">62</span></a><span data-dcnode-id="3187" instrument_node="">).</span></p></dd><dt data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">–</span></dt><dd data-dcnode-id="3171"><p class="no_top_margin" data-dcnode-id="3172"><span data-dcnode-id="3182" instrument_node="">Based on a study of 30 female dry cleaning workers exposed to PCE for an average of 10 years (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r110" data-dcnode-id="3180" href="#" role="button"><span data-dcnode-id="3181" instrument_node="">110</span></a><span data-dcnode-id="3179" instrument_node="">), a LOAEL of 103 mg/m</span><sup data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">3</span></sup><span data-dcnode-id="3176" instrument_node=""> (15 ppm) has been derived and a chronic-duration inhalation MRL of 0.28 mg/m</span><sup data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">3</span></sup><span data-dcnode-id="3173" instrument_node=""> (0.04 ppm) calculated.</span></p></dd></dl></div><div data-dcnode-id="3137" id="ch9.box1.s3"><h4 data-dcnode-id="3167"><span data-dcnode-id="3168" instrument_node="">Supporting evidence</span></h4><dl class="temp-labeled-list" data-dcnode-id="3138"><dt data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">–</span></dt><dd data-dcnode-id="3150"><p class="no_top_margin" data-dcnode-id="3151"><span data-dcnode-id="3164" instrument_node="">Several epidemiological studies on renal changes and exposure to PCE, including studies in dry cleaning facilities. The significance of these findings cannot be easily assessed, but may represent a relationship between long-term exposure and effects on the kidney in humans (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r48" data-dcnode-id="3162" href="#" role="button"><span data-dcnode-id="3163" instrument_node="">48</span></a><span data-dcnode-id="3161" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r118" data-dcnode-id="3159" href="#" role="button"><span data-dcnode-id="3160" instrument_node="">118</span></a><span data-dcnode-id="3158" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r119" data-dcnode-id="3156" href="#" role="button"><span data-dcnode-id="3157" instrument_node="">119</span></a><span data-dcnode-id="3155" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r120" data-dcnode-id="3153" href="#" role="button"><span data-dcnode-id="3154" instrument_node="">120</span></a><span data-dcnode-id="3152" instrument_node="">).</span></p></dd><dt data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">–</span></dt><dd data-dcnode-id="3139"><p class="no_top_margin" data-dcnode-id="3140"><span data-dcnode-id="3147" instrument_node="">Associations between PCE exposure and neurobehavioural symptoms were suggested in two studies (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r108" data-dcnode-id="3145" href="#" role="button"><span data-dcnode-id="3146" instrument_node="">108</span></a><span data-dcnode-id="3144" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r109" data-dcnode-id="3142" href="#" role="button"><span data-dcnode-id="3143" instrument_node="">109</span></a><span data-dcnode-id="3141" instrument_node="">).</span></p></dd></dl></div><div data-dcnode-id="3114" id="ch9.box1.s4"><h4 data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">Results of other reviews</span></h4><dl class="temp-labeled-list" data-dcnode-id="3115"><dt data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">–</span></dt><dd data-dcnode-id="3124"><p class="no_top_margin" data-dcnode-id="3125"><span data-dcnode-id="3132" instrument_node="">ATSDR derived a chronic inhalation MRL of 0.28 mg/m</span><sup data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">3</span></sup><span data-dcnode-id="3129" instrument_node=""> (0.04 ppm) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r44" data-dcnode-id="3127" href="#" role="button"><span data-dcnode-id="3128" instrument_node="">44</span></a><span data-dcnode-id="3126" instrument_node="">).</span></p></dd><dt data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">–</span></dt><dd data-dcnode-id="3116"><p class="no_top_margin" data-dcnode-id="3117"><span data-dcnode-id="3121" instrument_node="">IARC: Group 2A (probably carcinogenic to humans) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r96" data-dcnode-id="3119" href="#" role="button"><span data-dcnode-id="3120" instrument_node="">96</span></a><span data-dcnode-id="3118" instrument_node="">).</span></p></dd></dl></div><div data-dcnode-id="3106" id="ch9.box1.s5"><h4 data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">Guideline</span></h4><p data-dcnode-id="3107"><span data-dcnode-id="3111" instrument_node="">0.25 mg/m</span><sup data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">3</span></sup><span data-dcnode-id="3108" instrument_node=""> – annual average.</span></p></div><div data-dcnode-id="3095" id="ch9.box1.s6"><h4 data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">Comments</span></h4><p data-dcnode-id="3096"><span data-dcnode-id="3103" instrument_node="">No change in the guideline as compared to </span><i data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">Air quality guidelines for Europe</span></i><span data-dcnode-id="3100" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch9.r148" data-dcnode-id="3098" href="#" role="button"><span data-dcnode-id="3099" instrument_node="">148</span></a><span data-dcnode-id="3097" instrumen
