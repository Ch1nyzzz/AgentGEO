</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Consumernotice.org adheres to the highest ethical standards for content production and distribution. All content is thoroughly researched and verified at each stage of the publication process.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Our writers and editors follow strict guidelines for written and visual content, including vetting all sources and verifying quotes and statistics, to guarantee honesty and integrity in our reporting.</span></p><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">We collaborate with legal and medical experts and consumer safety professionals to further ensure the accuracy of our content.</span></p><span data-dcnode-id="1645" instrument_node="">
</span></div><span data-dcnode-id="1643" instrument_node="">
</span></div><span data-dcnode-id="1641" instrument_node="">
</span></div><span data-dcnode-id="1639" instrument_node="">
</span></div><span data-dcnode-id="1637" instrument_node="">
</span></div><span data-dcnode-id="1635" instrument_node="">
</span><div class="c-content-builder" data-dcnode-id="959"><span data-dcnode-id="1634" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1620"><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">When you think about air pollution, you probably think about the air you breathe when you’re outside. But because we spend 90 percent of our time indoors — and indoor contaminants are usually more highly concentrated — it’s actually indoor air quality that more often affects us.</span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1629" instrument_node="">In fact, a growing body of research indicates that the air inside homes and office buildings is often dirtier than the air in some of the largest and most industrialized cities in the world, according to the U.S. Environmental Protection Agency. In other words, indoor air quality is an important </span><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumernotice.org/environmental/"><span data-dcnode-id="1628" instrument_node="">environmental health</span></a><span data-dcnode-id="1626" instrument_node=""> issue.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Indoor air pollution can cause an array of unpleasant symptoms, including headaches, coughs, dizziness, fatigue, and irritation of the eyes, nose and throat. Usually these symptoms will resolve when the source of pollution is eliminated. In some cases, though, repeated exposure to air pollution can lead to long-term health problems, such as lung disease, heart disease and cancer. </span></p><span data-dcnode-id="1621" instrument_node="">
</span></div><span data-dcnode-id="1619" instrument_node="">
</span><h2 class="h2" data-dcnode-id="1617" id="common-pollutants"><span data-dcnode-id="1618" instrument_node="">Common Pollutants</span></h2><span data-dcnode-id="1616" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1608"><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Indoor air pollution has a variety of causes, including outdoor sources. Outdoor air pollution generated by burning fossil fuels, for instance, can flow inside buildings through cracks, gaps and ventilation systems and become indoor pollution. </span></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Most of this pollution is particulate matter, or tiny particles of matter and droplets of liquid that can become suspended in the air and easily inhaled. Appliances that burn fuels for heating and cooking can also generate indoor particulate matter, as can tobacco smoke.</span></p><span data-dcnode-id="1609" instrument_node="">
</span></div><span data-dcnode-id="1607" instrument_node="">
</span><div class="c-list c-list--split" data-dcnode-id="1543"><span data-dcnode-id="1606" instrument_node="">
</span><h3 class="c-list__title" data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">
Other common indoor air pollutants include:
</span></h3><span data-dcnode-id="1603" instrument_node="">
</span><div class="c-list__content" data-dcnode-id="1545"><span data-dcnode-id="1602" instrument_node="">
</span><ul class="c-ul c-ul--split" data-dcnode-id="1547"><span data-dcnode-id="1601" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Carbon Monoxide</span></li><span data-dcnode-id="1598" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">
Radon</span></li><span data-dcnode-id="1595" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">
Nitrogen dioxide</span></li><span data-dcnode-id="1592" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">
Building material and furnishings</span></li><span data-dcnode-id="1589" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">
Asbestos</span></li><span data-dcnode-id="1586" instrument_node="">

Building and paint products</span></li><span data-dcnode-id="1583" instrument_node="">

Household cleaning products</span></li><span data-dcnode-id="1580" instrument_node="">

Formaldehyde from pressed wood products and other sources</span></li><span data-dcnode-id="1577" instrument_node="">

Mold and mildew</span></li><span data-dcnode-id="1571" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">
Bacteria and viruses</span></li><span data-dcnode-id="1568" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1564"><span data-dcnode-id="1567" instrument_node="">
</span><a data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumernotice.org/environmental/pesticides/"><span data-dcnode-id="1566" instrument_node="">Pesticides</span></a></li><span data-dcnode-id="1563" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">
Pet dander</span></li><span data-dcnode-id="1560" instrument_node="">

Volatile Organic Compounds (VOCs)</span></li><span data-dcnode-id="1557" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">
Cockroach droppings, saliva and body parts</span></li><span data-dcnode-id="1554" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">
Dust and dust mites</span></li><span data-dcnode-id="1551" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">
Pollen</span></li><span data-dcnode-id="1548" instrument_node="">
</span></ul><span data-dcnode-id="1546" instrument_node="">
</span></div><span data-dcnode-id="1544" instrument_node="">
</span></div><span data-dcnode-id="1542" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1537"><span data-dcnode-id="1541" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">A lack of adequate ventilation can contribute to the buildup of contaminants and make indoor air pollution worse. Inadequate ventilation is the primary cause of half the workplace indoor air investigations conducted by the National Institute for Occupational Safety and Health.</span></p><span data-dcnode-id="1538" instrument_node="">
</span></div><span data-dcnode-id="1536" instrument_node="">
</span><figure class="c-figure" data-dcnode-id="1527"><span data-dcnode-id="1535" instrument_node="">
</span><picture class="c-picture" data-dcnode-id="1529"><span data-dcnode-id="1534" instrument_node="">
</span><source data-dcnode-id="1533" srcset="https://www.consumernotice.org/wp-content/uploads/Mold-Indoor-Quality-banner-640x0-c-default.webp" type="image/webp"><span data-dcnode-id="1532" instrument_node="">
</span><img alt="Mold" class="o-image c-figure__image" data-dcnode-id="1531" height="213" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumernotice.org/wp-content/uploads/Mold-Indoor-Quality-banner-640x0-c-default.jpg&amp;raw" width="640"><span data-dcnode-id="1530" instrument_node="">
</span></picture><span data-dcnode-id="1528" instrument_node="">
</span></figure><span data-dcnode-id="1526" instrument_node="">
</span><h2 class="h2" data-dcnode-id="1524" id="mold"><span data-dcnode-id="1525" instrument_node="">Mold</span></h2><span data-dcnode-id="1523" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1509"><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1521" instrument_node="">Elevated humidity and high temperatures can also worsen indoor pollution by creating an environment that’s ripe for the growth of biological pollutants, such as </span><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumernotice.org/environmental/mold/"><span data-dcnode-id="1520" instrument_node="">mold</span></a><span data-dcnode-id="1518" instrument_node=""> and bacteria.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Molds are types of fungi that need moisture to grow. In nature, mold is useful because it helps to break down dead and decaying matter. But indoors, it can wreak havoc. Mold spores can become airborne and irritate your skin, eyes, nose, throat and lungs. Mold can also trigger allergy attacks and asthma episodes.</span></p><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">You can prevent and slow mold growth by keeping humidity levels at 50 percent or less, and keeping showers and cooking areas well ventilated. If you end up with a mold problem, you need to correct the issue that’s causing it and clean it up completely.</span></p><span data-dcnode-id="1510" instrument_node="">
</span></div><span data-dcnode-id="1508" instrument_node="">
</span><div class="c-list" data-dcnode-id="1476"><span data-dcnode-id="1507" instrument_node="">
</span><h3 class="c-list__title" data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">
You can also prevent a mold infestation by:
</span></h3><span data-dcnode-id="1504" instrument_node="">
</span><div class="c-list__content" data-dcnode-id="1478"><span data-dcnode-id="1503" instrument_node="">
</span><ul class="c-ul" data-dcnode-id="1480"><span data-dcnode-id="1502" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Identifying hidden leaks</span></li><span data-dcnode-id="1499" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">
Fixing leaks and water damage quickly</span></li><span data-dcnode-id="1496" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">
Performing routine maintenance and repairs</span></li><span data-dcnode-id="1493" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">
Using a dehumidifier</span></li><span data-dcnode-id="1490" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">
Using your stove’s exhaust hood to draw heat and moisture outside</span></li><span data-dcnode-id="1487" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">
Making sure clothes dryers are vented to the outdoors</span></li><span data-dcnode-id="1484" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">
Installing drain gutters to keep water away from your house’s foundation</span></li><span data-dcnode-id="1481" instrument_node="">
</span></ul><span data-dcnode-id="1479" instrument_node="">
</span></div><span data-dcnode-id="1477" instrument_node="">
</span></div><span data-dcnode-id="1475" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1470"><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">According to the Centers for Disease Control and Prevention, you can remove mold from hard surfaces with soap and water or with a homemade bleach solution made from no more than 1 cup of household laundry bleach and 1 gallon of water. If mold contamination is more severe, you may need to hire a professional. </span></p><span data-dcnode-id="1471" instrument_node="">
</span></div><span data-dcnode-id="1469" instrument_node="">
</span><figure class="c-figure" data-dcnode-id="1460"><span data-dcnode-id="1468" instrument_node="">
</span><picture class="c-picture" data-dcnode-id="1462"><span data-dcnode-id="1467" instrument_node="">
</span><source data-dcnode-id="1466" srcset="https://www.consumernotice.org/wp-content/uploads/Legionella-Indoor-Quality-640x0-c-default.webp" type="image/webp"><span data-dcnode-id="1465" instrument_node="">
</span><img alt="Legionella test tubes" class="o-image c-figure__image" data-dcnode-id="1464" height="213" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumernotice.org/wp-content/uploads/Legionella-Indoor-Quality-640x0-c-default.png&amp;raw" width="640"><span data-dcnode-id="1463" instrument_node="">
</span></picture><span data-dcnode-id="1461" instrument_node="">
</span></figure><span data-dcnode-id="1459" instrument_node="">
</span><h2 class="h2" data-dcnode-id="1457" id="legionella"><span data-dcnode-id="1458" instrument_node="">Legionella</span></h2><span data-dcnode-id="1456" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1442"><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Large water systems, such as those found in hospitals, hotels and cruise ships, can also harbor dangerous bacteria that may cause serious health problems.</span></p><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Legionella, the bacterium that causes Legionnaires’ disease, occurs naturally in lakes and streams. But when it infiltrates building water systems, it can multiply out of control. People become sick when they unknowingly inhale tiny aerosolized droplets of the tainted water.</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1448" instrument_node="">Cooling towers associated with large-scale air conditioning systems are one of the leading causes of Legionnaires’ outbreaks. As part of a study published in 2017 in </span><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article%3Fid%3D10.1371/journal.pone.0189937" target="blank_"><span data-dcnode-id="1447" instrument_node="">PLOS One</span></a><span data-dcnode-id="1445" instrument_node="">, researchers tested 196 cooling towers in eight of the nine continental United States climate regions. Overall, 84 percent were contaminated with Legionella bacteria. </span></p><span data-dcnode-id="1443" instrument_node="">
</span></div><span data-dcnode-id="1441" instrument_node="">
</span><div class="c-list" data-dcnode-id="1394"><span data-dcnode-id="1440" instrument_node="">
</span><h3 class="c-list__title" data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">
Other common reservoirs for legionella include:
</span></h3><span data-dcnode-id="1437" instrument_node="">
</span><div class="c-list__content" data-dcnode-id="1396"><span data-dcnode-id="1436" instrument_node="">
</span><ul class="c-ul" data-dcnode-id="1398"><span data-dcnode-id="1435" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Hot and cold water storage tanks</span></li><span data-dcnode-id="1432" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">
Water filters</span></li><span data-dcnode-id="1429" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">
Ice machines</span></li><span data-dcnode-id="1426" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">
Hot tubs</span></li><span data-dcnode-id="1423" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">
Evaporative air conditioners</span></li><span data-dcnode-id="1420" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">
Decorative fountains</span></li><span data-dcnode-id="1417" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">
Faucets</span></li><span data-dcnode-id="1414" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">
Showerheads and hoses</span></li><span data-dcnode-id="1411" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">
Faucet flow restrictors</span></li><span data-dcnode-id="1408" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">
Pipes, valves and fittings</span></li><span data-dcnode-id="1405" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">
Centrally installed misters and humidifiers</span></li><span data-dcnode-id="1402" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">
Certain types of medical equipment, such as CPAP machines, bronchoscopes and nebulizers</span></li><span data-dcnode-id="1399" instrument_node="">
</span></ul><span data-dcnode-id="1397" instrument_node="">
</span></div><span data-dcnode-id="1395" instrument_node="">
</span></div><span data-dcnode-id="1393" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1388"><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Symptoms of Legionnaires’ disease include coughing, headaches, muscle aches, fever and trouble breathing. With antibiotics, most people will completely recover from the illness, but 1 in 10 people who develop Legionnaires’ pneumonia will die.</span></p><span data-dcnode-id="1389" instrument_node="">
</span></div><span data-dcnode-id="1387" instrument_node="">
</span><figure class="c-figure" data-dcnode-id="1367"><span data-dcnode-id="1386" instrument_node="">
</span><a class="c-lightbox c-lightbox--image js-imageLightbox" data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumernotice.org/wp-content/uploads/LegionnairesDisease-1.png"><span data-dcnode-id="1385" instrument_node="">
</span><picture class="c-picture" data-dcnode-id="1379"><span data-dcnode-id="1384" instrument_node="">
</span><source data-dcnode-id="1383" srcset="https://www.consumernotice.org/wp-content/uploads/LegionnairesDisease-1-640x0-c-default.webp" type="image/webp"><span data-dcnode-id="1382" instrument_node="">
</span><img alt="Infographic about Legionnaires' Disease" class="o-image c-figure__image" data-dcnode-id="1381" height="557" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumernotice.org/wp-content/uploads/LegionnairesDisease-1-640x0-c-default.png&amp;raw" width="640"><span data-dcnode-id="1380" instrument_node="">
</span></picture><span data-dcnode-id="1378" instrument_node="">
</span><div class="c-lightbox__icon" data-dcnode-id="1371"><span data-dcnode-id="1377" instrument_node="">
</span><i class="o-icon o-icon--expand" data-dcnode-id="1376"></i><span data-dcnode-id="1375" instrument_node="">
</span><span data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Expand</span></span><span data-dcnode-id="1372" instrument_node="">
</span></div><span data-dcnode-id="1370" instrument_node="">
</span></a><span data-dcnode-id="1368" instrument_node="">
</span></figure><span data-dcnode-id="1366" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1358"><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">You can minimize the risk of Legionella at home by properly maintaining plumbing systems. It’s important to regularly flush your pipes with warm or hot water and not let water stagnate. You should also regularly clean showerheads.</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">If you have a fountain or a hot tub, you need to regularly drain and disinfect it. Humidifiers should also be emptied, cleaned and rinsed each day. If you use a nebulizer, rinse the bowl each time you use it and wash the entire chamber and mask every day with warm water and dishwashing liquid. Only use distilled water or water that’s been boiled in your nebulizer.</span></p><span data-dcnode-id="1359" instrument_node="">
</span></div><span data-dcnode-id="1357" instrument_node="">
</span><h2 class="h2" data-dcnode-id="1355" id="radon"><span data-dcnode-id="1356" instrument_node="">Radon Gas</span></h2><span data-dcnode-id="1354" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1346"><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Radon is the second leading cause of lung cancer after smoking. Radon is a radioactive gas that develops from the breakdown of uranium and other radioactive metals in soil, rocks and groundwater. </span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Because it occurs naturally, everyone is exposed to low levels of radon. This normal level of exposure is not usually considered dangerous. But if radon seeps into your home through cracks and crevices, high levels of the gas can accumulate and threaten your health.</span></p><span data-dcnode-id="1347" instrument_node="">
</span></div><span data-dcnode-id="1345" instrument_node="">
</span><div class="c-factbox" data-dcnode-id="1331"><span data-dcnode-id="1344" instrument_node="">
</span><div class="c-factbox__title" data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Did you know?</span></div><span data-dcnode-id="1341" instrument_node="">
</span><div class="c-factbox__copy" data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Radon leads to roughly 21,000 lung cancer deaths each year. Smokers exposed to radon face the greatest risk.</span></div><span data-dcnode-id="1338" instrument_node="">
</span><div class="c-factbox__sources" data-dcnode-id="1333"><span data-dcnode-id="1337" instrument_node="">
Source:
</span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/radon/health-risk-radon" rel="noopener" target="_blank"><span data-dcnode-id="1336" instrument_node="">U.S. Environmental Protection Agency</span></a><span data-dcnode-id="1334" instrument_node="">
</span></div><span data-dcnode-id="1332" instrument_node="">
</span></div><span data-dcnode-id="1330" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1313"><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Because radon has no smell or taste, and you can’t see it, it’s impossible to know it’s there unless you test for it. </span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1325" instrument_node="">Most home improvement stores sell inexpensive radon test kits. You can also purchase a radon test kit online from </span><a data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sosradon.org/test-kits" target="blank_"><span data-dcnode-id="1324" instrument_node="">Kansas State University’s National Radon Program Services</span></a><span data-dcnode-id="1322" instrument_node="">. Short-term test kits cost $15 and take two to four days. Long-term radon test kits take three to 12 months and cost $25. New Jersey residents must pay $10 extra because of state requirements.</span></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">The average level of radon indoors is approximately 1.3 picocuries per liter (pCi/L), according to the EPA. If your test shows radon levels of 4 pCi/L or higher, you’ll need to do a confirmation test and take steps to reduce radon levels. </span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Sealing cracks and increasing ventilation can help reduce radon levels, but the EPA recommends you hire a qualified contractor with experience in radon reduction techniques.</span></p><span data-dcnode-id="1314" instrument_node="">
</span></div><span data-dcnode-id="1312" instrument_node="">
</span><figure class="c-figure" data-dcnode-id="1303"><span data-dcnode-id="1311" instrument_node="">
</span><picture class="c-picture" data-dcnode-id="1305"><span data-dcnode-id="1310" instrument_node="">
</span><source data-dcnode-id="1309" srcset="https://www.consumernotice.org/wp-content/uploads/Asbestos-Indoor-Quality-banner-640x0-c-default.webp" type="image/webp"><span data-dcnode-id="1308" instrument_node="">
</span><img alt="Asbestos fibers" class="o-image c-figure__image" data-dcnode-id="1307" height="213" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumernotice.org/wp-content/uploads/Asbestos-Indoor-Quality-banner-640x0-c-default.png&amp;raw" width="640"><span data-dcnode-id="1306" instrument_node="">
</span></picture><span data-dcnode-id="1304" instrument_node="">
</span></figure><span data-dcnode-id="1302" instrument_node="">
</span><h2 class="h2" data-dcnode-id="1300" id="asbestos"><span data-dcnode-id="1301" instrument_node="">Asbestos</span></h2><span data-dcnode-id="1299" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1283"><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1294"><a data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumernotice.org/environmental/asbestos/"><span data-dcnode-id="1297" instrument_node="">Asbestos</span></a><span data-dcnode-id="1295" instrument_node=""> is a naturally occurring fibrous mineral that’s strong, flexible and heat resistant. Those qualities have made it a popular component in a variety of building materials, including insulation, vinyl flooring, roofing shingles, textured paint and other products.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1292" instrument_node="">But when inhaled or ingested, asbestos fibers are toxic to humans. Asbestos is the leading cause of </span><a data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumernotice.org/environmental/asbestos/mesothelioma/"><span data-dcnode-id="1291" instrument_node="">mesothelioma</span></a><span data-dcnode-id="1289" instrument_node="">, an aggressive and lethal cancer that affects the lining of the lungs, abdomen, heart and other organs.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">While some uses of asbestos are currently banned, many are not. And older homes, in particular, may have hidden asbestos everywhere.</span></p><span data-dcnode-id="1284" instrument_node="">
</span></div><span data-dcnode-id="1282" instrument_node="">
</span><div class="c-factbox" data-dcnode-id="1268"><span data-dcnode-id="1281" instrument_node="">
</span><div class="c-factbox__title" data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Asbestos in homes</span></div><span data-dcnode-id="1278" instrument_node="">
</span><div class="c-factbox__copy" data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Homes built or remodeled between World War I and 1980 are much more likely to contain asbestos. But the only way to know for sure if your home contains asbestos is to hire an asbestos professional. </span></div><span data-dcnode-id="1275" instrument_node="">
</span><div class="c-factbox__sources" data-dcnode-id="1270"><span data-dcnode-id="1274" instrument_node="">
Source:
</span><a data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20201028112515/http%3A//ci.marshfield.wi.us/Asbestos_in_older_homes.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1273" instrument_node="">City of Marshfield Wisconsin</span></a><span data-dcnode-id="1271" instrument_node="">
</span></div><span data-dcnode-id="1269" instrument_node="">
</span></div><span data-dcnode-id="1267" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1262"><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Asbestos becomes dangerous when it’s damaged or disturbed and tiny asbestos fibers go airborne. That’s why it’s critical to take precautions if you’re planning a home remodeling project. An asbestos professional can help you identify whether your home contains asbestos and take steps to reduce any potential exposure.</span></p><span data-dcnode-id="1263" instrument_node="">
</span></div><span data-dcnode-id="1261" instrument_node="">
</span><h2 class="h2" data-dcnode-id="1259" id="asthma-triggers"><span data-dcnode-id="1260" instrument_node="">Asthma Triggers</span></h2><span data-dcnode-id="1258" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1247"><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Air pollution is a common trigger for asthma, a chronic lung disease that inflames and constricts the airways. Typical symptoms of asthma include shortness of breath, coughing and wheezing. Severe asthma attacks can be life-threatening.</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Many common triggers, however, are invisible to the naked eye. </span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Dust mites, for instance, are microscopic, insect-like pests that feed off of the dead skin of people and pets. Even though you can’t see them, they are ever present and live in bedding, furniture, carpet, drapes and other places.</span></p><span data-dcnode-id="1248" instrument_node="">
</span></div><span data-dcnode-id="1246" instrument_node="">
</span><div class="c-list c-list--split" data-dcnode-id="1220"><span data-dcnode-id="1245" instrument_node="">
</span><h3 class="c-list__title" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">
Other common indoor pollutants that can trigger asthma include:
</span></h3><span data-dcnode-id="1242" instrument_node="">
</span><div class="c-list__content" data-dcnode-id="1222"><span data-dcnode-id="1241" instrument_node="">
</span><ul class="c-ul c-ul--split" data-dcnode-id="1224"><span data-dcnode-id="1240" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Pollen</span></li><span data-dcnode-id="1237" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">
Molds</span></li><span data-dcnode-id="1234" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">
Tobacco smoke and vape products</span></li><span data-dcnode-id="1231" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">
Pet dander</span></li><span data-dcnode-id="1228" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">
Cockroach droppings</span></li><span data-dcnode-id="1225" instrument_node="">
</span></ul><span data-dcnode-id="1223" instrument_node="">
</span></div><span data-dcnode-id="1221" instrument_node="">
</span></div><span data-dcnode-id="1219" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1208"><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">To reduce tobacco exposure, don’t allow smoking inside your house. Require those who do smoke to wear a specific jacket over their clothes when they smoke outside so they don’t bring “thirdhand” smoke, or tobacco residue, indoors with them.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">To cut down on pests like cockroaches, keep garbage outside of the home and don’t leave dirty dishes stacked in the sink. Standing water also attracts roaches, so fix any potential plumbing leaks and seal any crevices or cracks around pipes.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Be sure to vacuum frequently to help eliminate pollen, pet dander and dust. Also, wash your bedding frequently and consider investing in allergy-proof pillows and mattress covers.</span></p><span data-dcnode-id="1209" instrument_node="">
</span></div><span data-dcnode-id="1207" instrument_node="">
</span><figure class="c-figure" data-dcnode-id="1198"><span data-dcnode-id="1206" instrument_node="">
</span><picture class="c-picture" data-dcnode-id="1200"><span data-dcnode-id="1205" instrument_node="">
</span><source data-dcnode-id="1204" srcset="https://www.consumernotice.org/wp-content/uploads/Secondhand-Smoke-Indoor-Quality-640x0-c-default.webp" type="image/webp"><span data-dcnode-id="1203" instrument_node="">
</span><img alt="Smoke coming from cigarette" class="o-image c-figure__image" data-dcnode-id="1202" height="213" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumernotice.org/wp-content/uploads/Secondhand-Smoke-Indoor-Quality-640x0-c-default.png&amp;raw" width="640"><span data-dcnode-id="1201" instrument_node="">
</span></picture><span data-dcnode-id="1199" instrument_node="">
</span></figure><span data-dcnode-id="1197" instrument_node="">
</span><h2 class="h2" data-dcnode-id="1195" id="secondhand-smoke"><span data-dcnode-id="1196" instrument_node="">Secondhand Smoke</span></h2><span data-dcnode-id="1194" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1186"><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Secondhand smoke contains more than 7,000 substances and remains a major contributor to indoor air pollution, according to the EPA.</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Exposure to secondhand smoke has been linked to heart disease, stroke, lung cancer, sudden infant death syndrome (SIDS) and other ailments, and nonsmokers who breathe in secondhand smoke have a 20 percent to 30 percent higher risk of lung cancer.</span></p><span data-dcnode-id="1187" instrument_node="">
</span></div><span data-dcnode-id="1185" instrument_node="">
</span><div class="c-factbox" data-dcnode-id="1171"><span data-dcnode-id="1184" instrument_node="">
</span><div class="c-factbox__title" data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Deaths from secondhand smoke</span></div><span data-dcnode-id="1181" instrument_node="">
</span><div class="c-factbox__copy" data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Approximately 2.5 million nonsmokers have died because of secondhand smoke since 1964.</span></div><span data-dcnode-id="1178" instrument_node="">
</span><div class="c-factbox__sources" data-dcnode-id="1173"><span data-dcnode-id="1177" instrument_node="">
Source:
</span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/tobacco/data_statistics/fact_sheets/secondhand_smoke/general_facts/index.htm" rel="noopener" target="_blank"><span data-dcnode-id="1176" instrument_node="">Centers for Disease Control and Prevention</span></a><span data-dcnode-id="1174" instrument_node="">
</span></div><span data-dcnode-id="1172" instrument_node="">
</span></div><span data-dcnode-id="1170" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1162"><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Some people falsely believe that opening a window or using a filtration system will get rid of smoke. Ventilation and filtration may reduce secondhand smoke, but they can’t eliminate it. Secondhand smoke also travels from room to room within a house and can even spread between apartments.</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">As such, the only way to eliminate secondhand smoke and the risks associated with it is to prohibit smoking indoors.</span></p><span data-dcnode-id="1163" instrument_node="">
</span></div><span data-dcnode-id="1161" instrument_node="">
</span><h2 class="h2" data-dcnode-id="1159" id="carbon-monoxide"><span data-dcnode-id="1160" instrument_node="">Carbon Monoxide</span></h2><span data-dcnode-id="1158" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1150"><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Carbon monoxide, or CO, is an invisible and deadly killer. The toxic gas has no distinctive odor or taste, but it has a pronounced effect on your body. </span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">When you inhale CO, it enters your blood stream and attaches to hemoglobin. Normally hemoglobin transports oxygen to all your cells, but CO crowds out oxygen, and your oxygen-deprived cells begin to die.</span></p><span data-dcnode-id="1151" instrument_node="">
</span></div><span data-dcnode-id="1149" instrument_node="">
</span><figure class="c-figure" data-dcnode-id="1129"><span data-dcnode-id="1148" instrument_node="">
</span><a class="c-lightbox c-lightbox--image js-imageLightbox" data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumernotice.org/wp-content/uploads/Carbon-Monox-Poison-1.png"><span data-dcnode-id="1147" instrument_node="">
</span><picture class="c-picture" data-dcnode-id="1141"><span data-dcnode-id="1146" instrument_node="">
</span><source data-dcnode-id="1145" srcset="https://www.consumernotice.org/wp-content/uploads/Carbon-Monox-Poison-1-640x0-c-default.webp" type="image/webp"><span data-dcnode-id="1144" instrument_node="">
</span><img alt="Infographic about carbon monoxide poisoning" class="o-image c-figure__image" data-dcnode-id="1143" height="567" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.consumernotice.org/wp-content/uploads/Carbon-Monox-Poison-1-640x0-c-default.png&amp;raw" width="640"><span data-dcnode-id="1142" instrument_node="">
</span></picture><span data-dcnode-id="1140" instrument_node="">
</span><div class="c-lightbox__icon" data-dcnode-id="1133"><span data-dcnode-id="1139" instrument_node="">
</span><i class="o-icon o-icon--expand" data-dcnode-id="1138"></i><span data-dcnode-id="1137" instrument_node="">
</span><span data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Expand</span></span><span data-dcnode-id="1134" instrument_node="">
</span></div><span data-dcnode-id="1132" instrument_node="">
</span></a><span data-dcnode-id="1130" instrument_node="">
</span></figure><span data-dcnode-id="1128" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1123"><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">At low levels, CO exposure can cause fatigue. Individuals with heart issues might also experience chest pain. At high levels, carbon monoxide triggers headaches, dizziness, confusion, nausea and other flu-like symptoms. It can also kill you.</span></p><span data-dcnode-id="1124" instrument_node="">
</span></div><span data-dcnode-id="1122" instrument_node="">
</span><div class="c-list" data-dcnode-id="1090"><span data-dcnode-id="1121" instrument_node="">
</span><h3 class="c-list__title" data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">
Common sources of carbon monoxide include:
</span></h3><span data-dcnode-id="1118" instrument_node="">
</span><div class="c-list__content" data-dcnode-id="1092"><span data-dcnode-id="1117" instrument_node="">
</span><ul class="c-ul" data-dcnode-id="1094"><span data-dcnode-id="1116" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Leaking chimneys or furnaces</span></li><span data-dcnode-id="1113" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">
Generators and other gas-powered equipment</span></li><span data-dcnode-id="1110" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">
Backdrafts from furnaces, gas water heaters, wood stoves, fireplaces and gas stoves</span></li><span data-dcnode-id="1107" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">
Gas space heaters and unvented kerosene heaters</span></li><span data-dcnode-id="1104" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">
Automobile exhaust generated by an idling car in attached garage</span></li><span data-dcnode-id="1101" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">
Faulty gas ranges</span></li><span data-dcnode-id="1098" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">
Blocked, disconnected or improperly sized fireplace flues</span></li><span data-dcnode-id="1095" instrument_node="">
</span></ul><span data-dcnode-id="1093" instrument_node="">
</span></div><span data-dcnode-id="1091" instrument_node="">
</span></div><span data-dcnode-id="1089" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Because of these dangers, the U.S. Consumer Product Safety Commission urges you to install a carbon monoxide detector on each level of your home. The watchdog agency also recommends you have all fuel-burning appliances inspected annually to check for potential CO leaks. </span></p><span data-dcnode-id="1085" instrument_node="">
</span></div><span data-dcnode-id="1083" instrument_node="">
</span><h2 class="h2" data-dcnode-id="1081" id="volatile-organic-compounds-vocs"><span data-dcnode-id="1082" instrument_node="">Volatile Organic Compounds (VOCs)</span></h2><span data-dcnode-id="1080" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1069"><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Volatile organic compounds, also known as VOCs, include a number of different chemicals found in thousands of common household products, such as paints, varnishes, waxes, cosmetics, cleansers and disinfectants.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">The term volatile means they vaporize, or turn into a gas, very easily at room temperature.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">These organic compounds are released into the air when you use the product, but they’re also emitted while they’re being stored. While VOCs are found everywhere, the concentrations of these chemicals are two to five times higher indoors, on average, than outdoors, according to the EPA.</span></p><span data-dcnode-id="1070" instrument_node="">
</span></div><span data-dcnode-id="1068" instrument_node="">
</span><div class="c-list c-list--split" data-dcnode-id="1021"><span data-dcnode-id="1067" instrument_node="">
</span><h3 class="c-list__title" data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">
Common sources of VOCs include:
</span></h3><span data-dcnode-id="1064" instrument_node="">
</span><div class="c-list__content" data-dcnode-id="1023"><span data-dcnode-id="1063" instrument_node="">
</span><ul class="c-ul c-ul--split" data-dcnode-id="1025"><span data-dcnode-id="1062" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Aerosol sprays</span></li><span data-dcnode-id="1059" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">
Household cleaning products</span></li><span data-dcnode-id="1056" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">
Paints and paint strippers</span></li><span data-dcnode-id="1053" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">
Hobby and craft supplies</span></li><span data-dcnode-id="1050" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">
Moth repellents</span></li><span data-dcnode-id="1047" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">
Air fresheners</span></li><span data-dcnode-id="1044" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">
Pesticides</span></li><span data-dcnode-id="1041" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">
Clothes that have been dry-cleaned</span></li><span data-dcnode-id="1038" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">
Automotive products</span></li><span data-dcnode-id="1035" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">
Copy machines and printers</span></li><span data-dcnode-id="1032" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">
Glues and adhesives</span></li><span data-dcnode-id="1029" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">
Permanent markers</span></li><span data-dcnode-id="1026" instrument_node="">
</span></ul><span data-dcnode-id="1024" instrument_node="">
</span></div><span data-dcnode-id="1022" instrument_node="">
</span></div><span data-dcnode-id="1020" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="1009"><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Exposure to VOCs can cause a wide range of health effects. Short-term exposure to VOCs can cause irritation of your mucous membranes, headaches, visual disturbances and memory problems. </span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Longer exposure will also bother your eyes, nose and throat. In addition, you may also experience nausea, fatigue, dizziness and a loss of coordination. Long-term VOC exposure can also damage your liver, kidneys and central nervous system, and cause cancer.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Young children, people with asthma and the elderly may have more severe reactions to VOC exposure.</span></p><span data-dcnode-id="1010" instrument_node="">
</span></div><span data-dcnode-id="1008" instrument_node="">
</span><h3 class="h3" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Avoiding Formaldehyde and Other VOCs</span></h3><span data-dcnode-id="1005" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="994"><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">One of the most well known VOCs is formaldehyde. Common items that emit formaldehyde include pressed wood products, wood floor finishes and wallpaper. </span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Some types of fabric, drapes and foam insulation contain formaldehyde, too. Cigarette smoke also produces formaldehyde, as does burning wood, oil, gasoline and other combustible materials. </span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">And porous products, such as carpet and gypsum board, can absorb formaldehyde that’s been emitted by other products and release it later, according to the U.S. Consumer Product Safety Commission.</span></p><span data-dcnode-id="995" instrument_node="">
</span></div><span data-dcnode-id="993" instrument_node="">
</span><div class="c-list" data-dcnode-id="970"><span data-dcnode-id="992" instrument_node="">
</span><h3 class="c-list__title" data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">
The commission offers the following tips to reduce your exposure to VOCs:
</span></h3><span data-dcnode-id="989" instrument_node="">
</span><div class="c-list__content" data-dcnode-id="972"><span data-dcnode-id="988" instrument_node="">
</span><ul class="c-ul" data-dcnode-id="974"><span data-dcnode-id="987" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Avoid secondhand smoke and if you smoke, quit.</span></li><span data-dcnode-id="984" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">
Ventilate well when using products that contain VOCs and air out your house when you bring home new furnishings.</span></li><span data-dcnode-id="981" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">
Store unused chemicals in your garage or shed.</span></li><span data-dcnode-id="978" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">
Remove dry cleaned clothing from plastic bags and air them out near a window or outside.</span></li><span data-dcnode-id="975" instrument_node="">
</span></ul><span data-dcnode-id="973" instrument_node="">
</span></div><span data-dcnode-id="971" instrument_node="">
</span></div><span data-dcnode-id="969" instrument_node="">
</span><div class="c-wysiwyg" data-dcnode-id="961"><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Try to reduce that number of products you own that release VOCs. Opt for low-VOC paints and furnishings and choose solid wood items rather than composite wood. </span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">And avoid buying clothes made from fabric with durable-press finishings, such as rayon, corduroy and wrinkle-resistant cotton. These fabrics are more likely to contain formaldehyde. If you do buy them, wash them before you wear them.</span></p><span data-dcnode-id="962" instrument_node="">
</span></div><span data-dcnode-id="960" instrument_node="">
</span></div><span data-dcnode-id="958" instrument_node="">
</span><div class="c-disclaimer c-disclaimer--global" data-dcnode-id="954"><span data-dcnode-id="957" instrument_node="">
</span><i class="o-icon o-icon--warning" data-dcnode-id="956"></i><span data-dcnode-id="955" instrument_node="">
Please seek the advice of a qualified professional before making decisions about your health or finances.
</span></div><span data-dcnode-id="953" instrument_node="">
