ts than the upper airways (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r95" data-dcnode-id="5652" href="#" role="button"><span data-dcnode-id="5653" instrument_node="">95</span></a><span data-dcnode-id="5651" instrument_node="">). Values have been suggested of from 0.15 up to 1.25 mg/m</span><sup data-dcnode-id="5649"><span data-dcnode-id="5650" instrument_node="">3</span></sup><span data-dcnode-id="5648" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r66" data-dcnode-id="5646" href="#" role="button"><span data-dcnode-id="5647" instrument_node="">66</span></a><span data-dcnode-id="5645" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r67" data-dcnode-id="5643" href="#" role="button"><span data-dcnode-id="5644" instrument_node="">67</span></a><span data-dcnode-id="5642" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r77" data-dcnode-id="5640" href="#" role="button"><span data-dcnode-id="5641" instrument_node="">77</span></a><span data-dcnode-id="5639" instrument_node="">). Raw data on exposure–response relationships obtained from reported human exposure studies about irritating effects were used in a regression model. A value below 0.94 mg/m</span><sup data-dcnode-id="5637"><span data-dcnode-id="5638" instrument_node="">3</span></sup><span data-dcnode-id="5636" instrument_node=""> formaldehyde was considered safe against sensory irritation of the eyes for all workers; about 6% of workers may experience moderate irritation between 0.94 and 1.25 mg/m</span><sup data-dcnode-id="5634"><span data-dcnode-id="5635" instrument_node="">3</span></sup><span data-dcnode-id="5633" instrument_node="">, while none would experience severe irritation (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r98" data-dcnode-id="5631" href="#" role="button"><span data-dcnode-id="5632" instrument_node="">98</span></a><span data-dcnode-id="5630" instrument_node="">).</span></p><p data-dcnode-id="5570"><span data-dcnode-id="5628" instrument_node="">One of the key experimental studies involved 21 healthy subjects exposed double-blind and randomly to formaldehyde for 4 hours (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r79" data-dcnode-id="5626" href="#" role="button"><span data-dcnode-id="5627" instrument_node="">79</span></a><span data-dcnode-id="5625" instrument_node="">). Questionnaires and objective methods were used to evaluate eye and airway irritation and lung function. Eye irritation was found to be the most significant effect. Subjective sensory irritation was perceived at as low as 0.38 mg/m</span><sup data-dcnode-id="5623"><span data-dcnode-id="5624" instrument_node="">3</span></sup><span data-dcnode-id="5622" instrument_node=""> for the eyes and 0.63 mg/m</span><sup data-dcnode-id="5620"><span data-dcnode-id="5621" instrument_node="">3</span></sup><span data-dcnode-id="5619" instrument_node="">, with peaks up to 1.25 mg/m</span><sup data-dcnode-id="5617"><span data-dcnode-id="5618" instrument_node="">3</span></sup><span data-dcnode-id="5616" instrument_node="">, for the nose. Adjustment for the personal trait of negative affectivity (e.g. anxiety), however, led to a value of 0.63 mg/m</span><sup data-dcnode-id="5614"><span data-dcnode-id="5615" instrument_node="">3</span></sup><span data-dcnode-id="5613" instrument_node=""> for the eyes at constant exposure and 0.38 mg/m</span><sup data-dcnode-id="5611"><span data-dcnode-id="5612" instrument_node="">3</span></sup><span data-dcnode-id="5610" instrument_node=""> plus four brief peak exposures at 0.63 mg/m</span><sup data-dcnode-id="5608"><span data-dcnode-id="5609" instrument_node="">3</span></sup><span data-dcnode-id="5607" instrument_node="">. An increase in eye blink frequency, which reflects sensory stimulation of the trigeminal nerve but not necessarily in perception thereof, was observed at 0.63 mg/m</span><sup data-dcnode-id="5605"><span data-dcnode-id="5606" instrument_node="">3</span></sup><span data-dcnode-id="5604" instrument_node=""> formaldehyde baseline exposure plus four brief peak exposures at 1.25 mg/m</span><sup data-dcnode-id="5602"><span data-dcnode-id="5603" instrument_node="">3</span></sup><span data-dcnode-id="5601" instrument_node="">, but not without the peak exposures. The nasal flow resistance and lung function remained unaffected. Eye and nasal irritation did not occur in parallel in the low dose range because eyes are more sensitive; it also to some extent depended on personal factors (e.g. trait and odour). The authors concluded that a corrected lowest observed effect level (LOEL) is 0.63 mg/m</span><sup data-dcnode-id="5599"><span data-dcnode-id="5600" instrument_node="">3</span></sup><span data-dcnode-id="5598" instrument_node=""> without peak exposure, which agrees with the observations of Kulle et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r99" data-dcnode-id="5596" href="#" role="button"><span data-dcnode-id="5597" instrument_node="">99</span></a><span data-dcnode-id="5595" instrument_node="">). Lang et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r79" data-dcnode-id="5593" href="#" role="button"><span data-dcnode-id="5594" instrument_node="">79</span></a><span data-dcnode-id="5592" instrument_node="">) also concluded that the NOAEL for both subjective and objective eye irritation would be close to the LOEL, i.e. 0.63 mg/m</span><sup data-dcnode-id="5590"><span data-dcnode-id="5591" instrument_node="">3</span></sup><span data-dcnode-id="5589" instrument_node=""> at constant exposure; the effects were considered weak, because “less” and “somewhat” were ranked nearly equal. In addition, a slightly lower NOAEL was considered to be 0.38 mg/m</span><sup data-dcnode-id="5587"><span data-dcnode-id="5588" instrument_node="">3</span></sup><span data-dcnode-id="5586" instrument_node=""> with peaks of 0.75 mg/m</span><sup data-dcnode-id="5584"><span data-dcnode-id="5585" instrument_node="">3</span></sup><span data-dcnode-id="5583" instrument_node=""> formaldehyde. Sensory irritation in humans can be predicted from airway responses in mice (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r100" data-dcnode-id="5581" href="#" role="button"><span data-dcnode-id="5582" instrument_node="">100</span></a><span data-dcnode-id="5580" instrument_node="">). Further support for the Lang et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r79" data-dcnode-id="5578" href="#" role="button"><span data-dcnode-id="5579" instrument_node="">79</span></a><span data-dcnode-id="5577" instrument_node="">) estimate is obtained from the mouse bioassay (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r72" data-dcnode-id="5575" href="#" role="button"><span data-dcnode-id="5576" instrument_node="">72</span></a><span data-dcnode-id="5574" instrument_node="">), because the NOAEL was found experimentally to be 0.38 mg/m</span><sup data-dcnode-id="5572"><span data-dcnode-id="5573" instrument_node="">3</span></sup><span data-dcnode-id="5571" instrument_node="">.</span></p><p data-dcnode-id="5550"><span data-dcnode-id="5569" instrument_node="">As a first approximation, the sensory effect of formaldehyde together with other sensory airway irritants is additive (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r101" data-dcnode-id="5567" href="#" role="button"><span data-dcnode-id="5568" instrument_node="">101</span></a><span data-dcnode-id="5566" instrument_node="">). However, in a study of 130 women (mean age 27 years) exposed to 0.04 mg/m</span><sup data-dcnode-id="5564"><span data-dcnode-id="5565" instrument_node="">3</span></sup><span data-dcnode-id="5563" instrument_node=""> formaldehyde in a mixture of 23 typical indoor VOCs at a total of 25 mg/m</span><sup data-dcnode-id="5561"><span data-dcnode-id="5562" instrument_node="">3</span></sup><span data-dcnode-id="5560" instrument_node=""> plus ozone (0.08 mg/m</span><sup data-dcnode-id="5558"><span data-dcnode-id="5559" instrument_node="">3</span></sup><span data-dcnode-id="5557" instrument_node="">) for about 140 minutes, neither significant reported sensory irritation nor indication of nasal inflammation was observed (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r102" data-dcnode-id="5555" href="#" role="button"><span data-dcnode-id="5556" instrument_node="">102</span></a><span data-dcnode-id="5554" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r103" data-dcnode-id="5552" href="#" role="button"><span data-dcnode-id="5553" instrument_node="">103</span></a><span data-dcnode-id="5551" instrument_node="">).</span></p><p data-dcnode-id="5527"><span data-dcnode-id="5549" instrument_node="">No epidemiological study has been identified that unequivocally shows a direct association between formaldehyde and sensory irritation. In general, mixed exposures have encumbered definite conclusions about the effects of formaldehyde (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r104" data-dcnode-id="5547" href="#" role="button"><span data-dcnode-id="5548" instrument_node="">104</span></a><span data-dcnode-id="5546" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r107" data-dcnode-id="5544" href="#" role="button"><span data-dcnode-id="5545" instrument_node="">107</span></a><span data-dcnode-id="5543" instrument_node="">) and other explanations have been proposed for the reported symptoms, including psychosocial factors (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r108" data-dcnode-id="5541" href="#" role="button"><span data-dcnode-id="5542" instrument_node="">108</span></a><span data-dcnode-id="5540" instrument_node="">). Further, two studies reported no correlation between sensory irritation and formaldehyde concentrations in 23 offices (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r30" data-dcnode-id="5538" href="#" role="button"><span data-dcnode-id="5539" instrument_node="">30</span></a><span data-dcnode-id="5537" instrument_node="">) and in 59 kitchens (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r109" data-dcnode-id="5535" href="#" role="button"><span data-dcnode-id="5536" instrument_node="">109</span></a><span data-dcnode-id="5534" instrument_node="">). Mixed exposures also occur in the wood industry and hamper the interpretation of the effect of formaldehyde. Nasal irritation dominated relative to that of the eyes and throat and was highest among those working with medium-density fibreboard and other wood products. It was concluded that 0.17 mg/m</span><sup data-dcnode-id="5532"><span data-dcnode-id="5533" instrument_node="">3</span></sup><span data-dcnode-id="5531" instrument_node=""> formaldehyde was of minor importance for the reporting of symptoms (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r110" data-dcnode-id="5529" href="#" role="button"><span data-dcnode-id="5530" instrument_node="">110</span></a><span data-dcnode-id="5528" instrument_node="">).</span></p><p data-dcnode-id="5489"><span data-dcnode-id="5526" instrument_node="">The threshold for objective sensory irritation appears to be about 1 mg/m</span><sup data-dcnode-id="5524"><span data-dcnode-id="5525" instrument_node="">3</span></sup><span data-dcnode-id="5523" instrument_node=""> for workers. For the indoor environment (24 hours), a value of 0.125 mg/m</span><sup data-dcnode-id="5521"><span data-dcnode-id="5522" instrument_node="">3</span></sup><span data-dcnode-id="5520" instrument_node=""> was considered safe for the entire population against sensory irritation, including chronic sensory irritation (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r66" data-dcnode-id="5518" href="#" role="button"><span data-dcnode-id="5519" instrument_node="">66</span></a><span data-dcnode-id="5517" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r77" data-dcnode-id="5515" href="#" role="button"><span data-dcnode-id="5516" instrument_node="">77</span></a><span data-dcnode-id="5514" instrument_node="">). This value agrees with results obtained from a recent controlled human exposure study, where no subjective sensory irritation occurred in the eyes and upper airways below 0.38 mg/m</span><sup data-dcnode-id="5512"><span data-dcnode-id="5513" instrument_node="">3</span></sup><span data-dcnode-id="5511" instrument_node=""> formaldehyde (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r79" data-dcnode-id="5509" href="#" role="button"><span data-dcnode-id="5510" instrument_node="">79</span></a><span data-dcnode-id="5508" instrument_node="">). Two approaches have been used to protect the potentially more sensitive part of the population. An assessment factor of 4 has been suggested for extrapolation from the NOAEL to a level below the threshold for sensory irritation (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r101" data-dcnode-id="5506" href="#" role="button"><span data-dcnode-id="5507" instrument_node="">101</span></a><span data-dcnode-id="5505" instrument_node="">). An assessment factor of 5 has been derived from the standard deviation of nasal pungency thresholds (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r111" data-dcnode-id="5503" href="#" role="button"><span data-dcnode-id="5504" instrument_node="">111</span></a><span data-dcnode-id="5502" instrument_node="">). Thus, applying an assessment factor of 5 on the suggested NOAEL of 0.63 mg/m</span><sup data-dcnode-id="5500"><span data-dcnode-id="5501" instrument_node="">3</span></sup><span data-dcnode-id="5499" instrument_node=""> from the studies by Lang et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r79" data-dcnode-id="5497" href="#" role="button"><span data-dcnode-id="5498" instrument_node="">79</span></a><span data-dcnode-id="5496" instrument_node="">) and Kulle et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r99" data-dcnode-id="5494" href="#" role="button"><span data-dcnode-id="5495" instrument_node="">99</span></a><span data-dcnode-id="5493" instrument_node="">), a value of 0.125 mg/m</span><sup data-dcnode-id="5491"><span data-dcnode-id="5492" instrument_node="">3</span></sup><span data-dcnode-id="5490" instrument_node=""> is obtained. This value is also considered valid for children, because there is no indication that children are more susceptible to formaldehyde exposure than adults.</span></p><p data-dcnode-id="5475"><span data-dcnode-id="5488" instrument_node="">There is no indication that extending exposure beyond four hours would increase the formaldehyde irritative response or the sensitivity. This is based on the fact that the chemical reaction of formaldehyde on the TRPA1 receptor site is reversible (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r112" data-dcnode-id="5486" href="#" role="button"><span data-dcnode-id="5487" instrument_node="">112</span></a><span data-dcnode-id="5485" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r113" data-dcnode-id="5483" href="#" role="button"><span data-dcnode-id="5484" instrument_node="">113</span></a><span data-dcnode-id="5482" instrument_node="">). Inflammation may increase the receptor sensitivity, but neither eye nor airway inflammation has been reported at indoor concentrations of formaldehyde. Further, neither nasal damage nor inflammation was observed in rats during life-long exposure to 1.2 mg/m</span><sup data-dcnode-id="5480"><span data-dcnode-id="5481" instrument_node="">3</span></sup><span data-dcnode-id="5479" instrument_node=""> (1 ppm) formaldehyde (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r114" data-dcnode-id="5477" href="#" role="button"><span data-dcnode-id="5478" instrument_node="">114</span></a><span data-dcnode-id="5476" instrument_node="">).</span></p><p data-dcnode-id="5446"><b data-dcnode-id="5472"><i data-dcnode-id="5473"><span data-dcnode-id="5474" instrument_node="">Nasal histopatological changes.</span></i></b><span data-dcnode-id="5471" instrument_node=""> A Swedish study (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r115" data-dcnode-id="5469" href="#" role="button"><span data-dcnode-id="5470" instrument_node="">115</span></a><span data-dcnode-id="5468" instrument_node="">) investigated 70 workers in a chemical plant in which formaldehyde and products based on formaldehyde were produced as resins and, for example, used for impregnation of paper. Additionally, 100 workers employed in the furniture industry were investigated. The 36 controls were mainly clerks. The mean formaldehyde concentration was 0.3 mg/m</span><sup data-dcnode-id="5466"><span data-dcnode-id="5467" instrument_node="">3</span></sup><span data-dcnode-id="5465" instrument_node=""> (range 0.05–0.5 mg/m</span><sup data-dcnode-id="5463"><span data-dcnode-id="5464" instrument_node="">3</span></sup><span data-dcnode-id="5462" instrument_node="">) with frequent formaldehyde peaks above 1 mg/m</span><sup data-dcnode-id="5460"><span data-dcnode-id="5461" instrument_node="">3</span></sup><span data-dcnode-id="5459" instrument_node=""> in the chemical plant. The mean duration of exposure was 10.4 years. The furniture workers were exposed to 0.2–0.3 mg/m</span><sup data-dcnode-id="5457"><span data-dcnode-id="5458" instrument_node="">3</span></sup><span data-dcnode-id="5456" instrument_node=""> formaldehyde that seldom exceeded 0.5 mg/m</span><sup data-dcnode-id="5454"><span data-dcnode-id="5455" instrument_node="">3</span></sup><span data-dcnode-id="5453" instrument_node="">. The mean wood dust concentration was 1–2 mg/m</span><sup data-dcnode-id="5451"><span data-dcnode-id="5452" instrument_node="">3</span></sup><span data-dcnode-id="5450" instrument_node=""> and the mean duration of exposure was 9 years. Controls were exposed to a mean formaldehyde concentration of 0.09 mg/m</span><sup data-dcnode-id="5448"><span data-dcnode-id="5449" instrument_node="">3</span></sup><span data-dcnode-id="5447" instrument_node="">. Nasal biopsies were performed and evaluated by means of a nine-point scale (score 0–8), where category 1 was “stratified cuboid epithelium with loss of ciliated epithelium” and category 2 “mixed stratified cuboid/stratified squamous epithelium”.</span></p><p data-dcnode-id="5435"><span data-dcnode-id="5445" instrument_node="">The mean nasal biopsy score was 1.56 (range 0–4) in the controls, 2.07 (range 0–6) in the furniture workers (not statistically significant) and 2.16 (range 0–4) in the chemical plant (statistically significant). Within the formaldehyde exposure groups themselves, the histopathology scores were not exposure-dependent; exposure metrics were current formaldehyde concentrations (both formaldehyde groups were divided into exposure groups 0.1–0.24, 0.25–0.49 and ≥ 0.5 mg/m</span><sup data-dcnode-id="5443"><span data-dcnode-id="5444" instrument_node="">3</span></sup><span data-dcnode-id="5442" instrument_node=""> formaldehyde), current wood dust concentrations (furniture workers were divided into exposure groups 0.1–1, 1.1–2 and 2.1–4.9 mg/m</span><sup data-dcnode-id="5440"><span data-dcnode-id="5441" instrument_node="">3</span></sup><span data-dcnode-id="5439" instrument_node="">), cumulative formaldehyde exposures (both formaldehyde groups were divided into &lt; 1.5, 1.5–4.99 and ≥ 5 mg/m</span><sup data-dcnode-id="5437"><span data-dcnode-id="5438" instrument_node="">3</span></sup><span data-dcnode-id="5436" instrument_node="">.years) and duration of exposure (&lt; 5, 5–14, 15–24 and ≥ 25 years). Overall, this study cannot be used for risk assessment owing to the lack of an exposure-dependent effect.</span></p></div><div data-dcnode-id="5103" id="ch3.s15"><h4 data-dcnode-id="5432"><span data-dcnode-id="5433" instrument_node="">Lung effects (non-cancer)</span></h4><p data-dcnode-id="5403"><span data-dcnode-id="5431" instrument_node="">Formaldehyde alone does not cause IgE sensitization (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r116" data-dcnode-id="5429" href="#" role="button"><span data-dcnode-id="5430" instrument_node="">116</span></a><span data-dcnode-id="5428" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r117" data-dcnode-id="5426" href="#" role="button"><span data-dcnode-id="5427" instrument_node="">117</span></a><span data-dcnode-id="5425" instrument_node="">). Recent epidemiological studies of the occupational environment have not indicated an increase in sensitization to formaldehyde exposure (see below). Nevertheless, formaldehyde-induced sensitization has been hypothesized. Two causes have been suggested, inflammation and formaldehyde acting as an adjuvant for allergens, but they are not supported at normal indoor air concentrations. Inflammatory mediator response was absent on the exposure of human lung epithelial cells at 0.25 mg/m</span><sup data-dcnode-id="5423"><span data-dcnode-id="5424" instrument_node="">3</span></sup><span data-dcnode-id="5422" instrument_node=""> formaldehyde compared to clean air (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r118" data-dcnode-id="5420" href="#" role="button"><span data-dcnode-id="5421" instrument_node="">118</span></a><span data-dcnode-id="5419" instrument_node="">) and inflammation was not observed in life-long exposure of rats to 1.25 mg/m</span><sup data-dcnode-id="5417"><span data-dcnode-id="5418" instrument_node="">3</span></sup><span data-dcnode-id="5416" instrument_node=""> formaldehyde (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r119" data-dcnode-id="5414" href="#" role="button"><span data-dcnode-id="5415" instrument_node="">119</span></a><span data-dcnode-id="5413" instrument_node="">). However, increased lung inflammation, reduced lung function and higher allergen-specific IgE antibody levels have been reported in rodents immunized by intraperitoneal administration to the allergen ovalbumin and followed by different airborne formaldehyde exposures (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r116" data-dcnode-id="5411" href="#" role="button"><span data-dcnode-id="5412" instrument_node="">116</span></a><span data-dcnode-id="5410" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r120" data-dcnode-id="5408" href="#" role="button"><span data-dcnode-id="5409" instrument_node="">120</span></a><span data-dcnode-id="5407" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r121" data-dcnode-id="5405" href="#" role="button"><span data-dcnode-id="5406" instrument_node="">121</span></a><span data-dcnode-id="5404" instrument_node="">). The interpretation of these studies is not clear in terms of the risk assessment of combined human indoor exposure to formaldehyde and allergens due to intraperitoneal administration in the animals. Thus, evidence of lung effects must depend on human data.</span></p><p data-dcnode-id="5395"><b data-dcnode-id="5400"><i data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">Experimental studies.</span></i></b><span data-dcnode-id="5399" instrument_node=""> A number of human exposure studies have been carried out with lung function testing during the last decade (see </span><a class="figpopup" data-dcnode-id="5397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t1/%3Freport%3Dobjectonly" rid-figpopup="figch3t1" rid-ob="figobch3t1" target="object"><span data-dcnode-id="5398" instrument_node="">Table 3.1</span></a><span data-dcnode-id="5396" instrument_node="">).</span></p><p data-dcnode-id="5375"><span data-dcnode-id="5394" instrument_node="">The human exposure studies generally show that lung function is unaffected in both healthy and asthmatic people exposed for 1–4 hours to formaldehyde below 1 mg/m</span><sup data-dcnode-id="5392"><span data-dcnode-id="5393" instrument_node="">3</span></sup><span data-dcnode-id="5391" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r79" data-dcnode-id="5389" href="#" role="button"><span data-dcnode-id="5390" instrument_node="">79</span></a><span data-dcnode-id="5388" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r83" data-dcnode-id="5386" href="#" role="button"><span data-dcnode-id="5387" instrument_node="">83</span></a><span data-dcnode-id="5385" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r84" data-dcnode-id="5383" href="#" role="button"><span data-dcnode-id="5384" instrument_node="">84</span></a><span data-dcnode-id="5382" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r88" data-dcnode-id="5380" href="#" role="button"><span data-dcnode-id="5381" instrument_node="">88</span></a><span data-dcnode-id="5379" instrument_node="">). The limited effect on lung function and rhinitis is in agreement with a study in which formaldehyde inhalation had no effect on 95 patients with both upper and lower airway symptoms, when adjusted for placebo effects (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r86" data-dcnode-id="5377" href="#" role="button"><span data-dcnode-id="5378" instrument_node="">86</span></a><span data-dcnode-id="5376" instrument_node="">); further, the authors concluded that IgE-mediated formaldehyde allergy was nearly non-existent.</span></p><p data-dcnode-id="5343"><span data-dcnode-id="5374" instrument_node="">Two studies with asthmatics sensitive to grass pollen and dust mites (Der p 1), respectively, were investigated, in which formaldehyde exposure was combined with post-exposure to the allergens (in a season without grass pollen). In one study, increasing doses of inhaled grass pollen after exposure to 0.5 mg/m</span><sup data-dcnode-id="5372"><span data-dcnode-id="5373" instrument_node="">3</span></sup><span data-dcnode-id="5371" instrument_node=""> formaldehyde for one hour did not affect the lung function over an 8-hour period; a non-significant protective effect of formaldehyde was observed (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r82" data-dcnode-id="5369" href="#" role="button"><span data-dcnode-id="5370" instrument_node="">82</span></a><span data-dcnode-id="5368" instrument_node="">). The particle size distribution of the grass pollen was 20–40 μm (V. Ezratty, personal communication, 2010). In the other study, oral breathing of 0.09 mg/m</span><sup data-dcnode-id="5366"><span data-dcnode-id="5367" instrument_node="">3</span></sup><span data-dcnode-id="5365" instrument_node=""> formaldehyde for 30 minutes followed by exposure to dust mites (mean particle size 11 μm) resulted in a bronchial response at a lower dust mite allergen concentration relative to background air with 0.03 mg/m</span><sup data-dcnode-id="5363"><span data-dcnode-id="5364" instrument_node="">3</span></sup><span data-dcnode-id="5362" instrument_node=""> formaldehyde; the geometric mean PD</span><sub data-dcnode-id="5360"><span data-dcnode-id="5361" instrument_node="">20</span></sub><span data-dcnode-id="5359" instrument_node=""> for Der p 1 was 34 ng after formaldehyde and 45 ng after placebo (</span><i data-dcnode-id="5357"><span data-dcnode-id="5358" instrument_node="">P =</span></i><span data-dcnode-id="5356" instrument_node=""> 0.05) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r80" data-dcnode-id="5354" href="#" role="button"><span data-dcnode-id="5355" instrument_node="">80</span></a><span data-dcnode-id="5353" instrument_node="">). An alternative statistical test (Wilcoxon signed-rank test) of the published data showed no significance, thus illustrating how sensitively the statistical outcome depends on the test applied. Further, the effect is considered to have no clinical relevance, because an estimated inhaled allergen dose for 8 hours while resting would be less than 1 ng, based on standard respiratory rates for males, sampled dust mites, e.g. in mattresses (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r122" data-dcnode-id="5351" href="#" role="button"><span data-dcnode-id="5352" instrument_node="">122</span></a><span data-dcnode-id="5350" instrument_node="">) and assuming a room particle concentration of 100 μg/m</span><sup data-dcnode-id="5348"><span data-dcnode-id="5349" instrument_node="">3</span></sup><span data-dcnode-id="5347" instrument_node="">. This agrees with measured airborne concentrations of dust mites (Der f 1) in bedrooms (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r123" data-dcnode-id="5345" href="#" role="button"><span data-dcnode-id="5346" instrument_node="">123</span></a><span data-dcnode-id="5344" instrument_node="">).</span></p><p data-dcnode-id="5326"><b data-dcnode-id="5340"><i data-dcnode-id="5341"><span data-dcnode-id="5342" instrument_node="">Epidemiological studies (children and adults).</span></i></b><span data-dcnode-id="5339" instrument_node=""> Gilbert (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r69" data-dcnode-id="5337" href="#" role="button"><span data-dcnode-id="5338" instrument_node="">69</span></a><span data-dcnode-id="5336" instrument_node="">) reviewed epidemiological studies on formaldehyde and lung effects in the indoor environment. Studies from the occupational environment have also been evaluated (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="5334" href="#" role="button"><span data-dcnode-id="5335" instrument_node="">1</span></a><span data-dcnode-id="5333" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r68" data-dcnode-id="5331" href="#" role="button"><span data-dcnode-id="5332" instrument_node="">68</span></a><span data-dcnode-id="5330" instrument_node="">). Key studies with objective lung function testing are summarized in </span><a class="figpopup" data-dcnode-id="5328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t1/%3Freport%3Dobjectonly" rid-figpopup="figch3t1" rid-ob="figobch3t1" target="object"><span data-dcnode-id="5329" instrument_node="">Table 3.1</span></a><span data-dcnode-id="5327" instrument_node="">.</span></p><p data-dcnode-id="5309"><b data-dcnode-id="5323"><i data-dcnode-id="5324"><span data-dcnode-id="5325" instrument_node="">Children.</span></i></b><span data-dcnode-id="5322" instrument_node=""> Some case-control and cross-sectional studies have indicated a possible association between low formaldehyde exposure and asthma or sensitization to certain allergens (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r106" data-dcnode-id="5320" href="#" role="button"><span data-dcnode-id="5321" instrument_node="">106</span></a><span data-dcnode-id="5319" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r124" data-dcnode-id="5317" href="#" role="button"><span data-dcnode-id="5318" instrument_node="">124</span></a><span data-dcnode-id="5316" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r128" data-dcnode-id="5314" href="#" role="button"><span data-dcnode-id="5315" instrument_node="">128</span></a><span data-dcnode-id="5313" instrument_node="">). Briefly, these studies have complex co-exposures, which encumber the establishment of direct cause–effect and dose–response relationships for formaldehyde and the evaluation of confounding effects (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r69" data-dcnode-id="5311" href="#" role="button"><span data-dcnode-id="5312" instrument_node="">69</span></a><span data-dcnode-id="5310" instrument_node="">).</span></p><p data-dcnode-id="5271"><span data-dcnode-id="5308" instrument_node="">Formaldehyde measured in the bedrooms of 224 healthy children aged 6–13 years was not found to be associated with effects on lung function (FEV), but an increase in exhaled nitric oxide was associated with formaldehyde levels greater than 0.06 mg/m</span><sup data-dcnode-id="5306"><span data-dcnode-id="5307" instrument_node="">3</span></sup><span data-dcnode-id="5305" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r124" data-dcnode-id="5303" href="#" role="button"><span data-dcnode-id="5304" instrument_node="">124</span></a><span data-dcnode-id="5302" instrument_node="">). Another study was carried out in 80 homes with 148 children aged 7–14 years, of which 53 were asthmatics. An association (OR = 1.40) between formaldehyde exposure and atopy was found with a 0.01-mg/m</span><sup data-dcnode-id="5300"><span data-dcnode-id="5301" instrument_node="">3</span></sup><span data-dcnode-id="5299" instrument_node=""> increase in formaldehyde in the bedrooms. However, no association was identified between formaldehyde in the bedrooms and asthma incidents and lung effects (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r125" data-dcnode-id="5297" href="#" role="button"><span data-dcnode-id="5298" instrument_node="">125</span></a><span data-dcnode-id="5296" instrument_node="">). The result is difficult to interpret, because about one third of the children were also exposed to environmental tobacco smoke and possibly pollutants from nearby coal mines and power stations (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r129" data-dcnode-id="5294" href="#" role="button"><span data-dcnode-id="5295" instrument_node="">129</span></a><span data-dcnode-id="5293" instrument_node="">). In a third case-control study, formaldehyde was measured twice in homes (bedroom and living room) of 88 asthmatic children under three years of age and a non-asthmatic control group of 104 children (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r126" data-dcnode-id="5291" href="#" role="button"><span data-dcnode-id="5292" instrument_node="">126</span></a><span data-dcnode-id="5290" instrument_node="">). A formaldehyde concentration &gt; 0.06 mg/m</span><sup data-dcnode-id="5288"><span data-dcnode-id="5289" instrument_node="">3</span></sup><span data-dcnode-id="5287" instrument_node=""> in the bedroom was found to be associated with an increased risk of asthma. Potential bias could be created by gas heating and new materials in the homes, and the general difficulty of diagnosis in children. Further confounding factors are discussed by Gilbert (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r69" data-dcnode-id="5285" href="#" role="button"><span data-dcnode-id="5286" instrument_node="">69</span></a><span data-dcnode-id="5284" instrument_node="">). The most important confounding factor, however, is the presence of combustion products as indicated by reported high concentrations of traffic pollutants such as benzene, toluene, xylenes, nitrogen dioxide and sulfur dioxide in the homes of the children (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r130" data-dcnode-id="5282" href="#" role="button"><span data-dcnode-id="5283" instrument_node="">130</span></a><span data-dcnode-id="5281" instrument_node="">). Such pollutants are known to be associated with asthma in children (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r131" data-dcnode-id="5279" href="#" role="button"><span data-dcnode-id="5280" instrument_node="">131</span></a><span data-dcnode-id="5278" instrument_node="">), that is, the reported cases may be different apart from asthma and formaldehyde exposure (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r132" data-dcnode-id="5276" href="#" role="button"><span data-dcnode-id="5277" instrument_node="">132</span></a><span data-dcnode-id="5275" instrument_node="">). For further information about this particular study and the impact of combustion products and lung effects, see Nielsen et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r133" data-dcnode-id="5273" href="#" role="button"><span data-dcnode-id="5274" instrument_node="">133</span></a><span data-dcnode-id="5272" instrument_node="">).</span></p><p data-dcnode-id="5266"><span data-dcnode-id="5270" instrument_node="">Measured formaldehyde in living rooms and bedrooms did not differ in a univariate analysis between 90 matched pairs of homes of young asthmatics and non-asthmatics aged 4–17 years (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r134" data-dcnode-id="5268" href="#" role="button"><span data-dcnode-id="5269" instrument_node="">134</span></a><span data-dcnode-id="5267" instrument_node="">).</span></p><p data-dcnode-id="5255"><span data-dcnode-id="5265" instrument_node="">The formaldehyde-specific IgE level decreased in 8-year-old children when they moved to a new school with a lower formaldehyde level (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r128" data-dcnode-id="5263" href="#" role="button"><span data-dcnode-id="5264" instrument_node="">128</span></a><span data-dcnode-id="5262" instrument_node="">), although no association was identified between formaldehyde and reported symptoms, which encumbers the interpretation. One school study indicated an association between low formaldehyde values and airway effects (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r106" data-dcnode-id="5260" href="#" role="button"><span data-dcnode-id="5261" instrument_node="">106</span></a><span data-dcnode-id="5259" instrument_node="">), while another study failed to do so (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r135" data-dcnode-id="5257" href="#" role="button"><span data-dcnode-id="5258" instrument_node="">135</span></a><span data-dcnode-id="5256" instrument_node="">). However, the multiple co-exposure of animal allergens, moisture damage (fungi), traffic pollution and socioeconomic factors encumbers interpretation. In addition, chance significance is possible because of the high number of comparisons.</span></p><p data-dcnode-id="5247"><span data-dcnode-id="5254" instrument_node="">Formaldehyde-specific IgE was measured in 155 Japanese children randomly recruited from outpatient clinics, 122 asthmatics (mean age 9.5 years) and 33 without allergy (mean age 8.8 years) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r136" data-dcnode-id="5252" href="#" role="button"><span data-dcnode-id="5253" instrument_node="">136</span></a><span data-dcnode-id="5251" instrument_node="">). No correlation was found between severity of asthma and IgE levels and formaldehyde, which agrees with the findings of Kim et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r137" data-dcnode-id="5249" href="#" role="button"><span data-dcnode-id="5250" instrument_node="">137</span></a><span data-dcnode-id="5248" instrument_node="">). Formaldehyde-specific IgE was detected in only two asthmatic children and only at low levels. One child suffered from severe asthma, while the other had mild asthma.</span></p><p data-dcnode-id="5242"><span data-dcnode-id="5246" instrument_node="">In a cross-sectional case-control study, comparison of formaldehyde, total volatile organic compounds and dampness in the homes of 193 children (aged 9–11 years) with persistent wheezing and 223 controls showed that formaldehyde may increase wheezing. However, this may be interfered with or dominated by the effects of dampness (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r138" data-dcnode-id="5244" href="#" role="button"><span data-dcnode-id="5245" instrument_node="">138</span></a><span data-dcnode-id="5243" instrument_node="">).</span></p><p data-dcnode-id="5234"><span data-dcnode-id="5241" instrument_node="">In a similar cross-sectional case-control study of children aged 9–11 years, 245 with asthma symptoms within the last year and 329 controls, no association was found between formaldehyde exposure (median concentration 0.037 mg/m</span><sup data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">3</span></sup><span data-dcnode-id="5238" instrument_node="">) in the home and reported asthma, allergy, adverse lung function, bronchial hyper-reactivity or sensitization (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r139" data-dcnode-id="5236" href="#" role="button"><span data-dcnode-id="5237" instrument_node="">139</span></a><span data-dcnode-id="5235" instrument_node="">).</span></p><p data-dcnode-id="5214"><b data-dcnode-id="5231"><i data-dcnode-id="5232"><span data-dcnode-id="5233" instrument_node="">Adults.</span></i></b><span data-dcnode-id="5230" instrument_node=""> Mean exposures of 1.4 ± 0.7 mg/m</span><sup data-dcnode-id="5228"><span data-dcnode-id="5229" instrument_node="">3</span></sup><span data-dcnode-id="5227" instrument_node=""> caused a minor decrease in lung function among students dissecting cadavers (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r85" data-dcnode-id="5225" href="#" role="button"><span data-dcnode-id="5226" instrument_node="">85</span></a><span data-dcnode-id="5224" instrument_node="">), an effect that diminished over weeks. Three other studies with exposed students and controls failed to find dose–response relationships (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r87" data-dcnode-id="5222" href="#" role="button"><span data-dcnode-id="5223" instrument_node="">87</span></a><span data-dcnode-id="5221" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r89" data-dcnode-id="5219" href="#" role="button"><span data-dcnode-id="5220" instrument_node="">89</span></a><span data-dcnode-id="5218" instrument_node="">). A limited effect on lung function, and rhinitis, is in accord with a study of 95 patients with both upper and lower airway symptoms related to work that were challenged with inhaled formaldehyde (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r86" data-dcnode-id="5216" href="#" role="button"><span data-dcnode-id="5217" instrument_node="">86</span></a><span data-dcnode-id="5215" instrument_node="">). Formaldehyde had no effect when adjusted for placebo effects, and the authors concluded that IgE-mediated formaldehyde allergy was nonexistent.</span></p><p data-dcnode-id="5191"><span data-dcnode-id="5213" instrument_node="">In a prospective study of 998 pregnant Japanese women, a possible association was identified between formaldehyde levels (median 0.030 mg/m</span><sup data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">3</span></sup><span data-dcnode-id="5210" instrument_node="">, maximum 0.164 mg/m</span><sup data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">3</span></sup><span data-dcnode-id="5207" instrument_node="">) and atopic eczema, but not with asthma, allergy or rhinitis (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r140" data-dcnode-id="5205" href="#" role="button"><span data-dcnode-id="5206" instrument_node="">140</span></a><span data-dcnode-id="5204" instrument_node="">). Another prospective study involved 143 Japanese medical students exposed to 3.0 mg/m</span><sup data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">3</span></sup><span data-dcnode-id="5201" instrument_node=""> formaldehyde that responded to a questionnaire before and after a course in anatomy. Two students, one of whom was atopic, showed skin reaction to 1% formaldehyde solution (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r141" data-dcnode-id="5199" href="#" role="button"><span data-dcnode-id="5200" instrument_node="">141</span></a><span data-dcnode-id="5198" instrument_node="">). No association was found between reported asthma in 182 inhabitants from 59 homes and measured formaldehyde levels in their kitchens (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r109" data-dcnode-id="5196" href="#" role="button"><span data-dcnode-id="5197" instrument_node="">109</span></a><span data-dcnode-id="5195" instrument_node="">). Eczema, but not allergic respiratory effects, was reported in a study among Finish metal workers exposed to, inter alia, formaldehyde and metalworking fluids (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r142" data-dcnode-id="5193" href="#" role="button"><span data-dcnode-id="5194" instrument_node="">142</span></a><span data-dcnode-id="5192" instrument_node="">).</span></p><p data-dcnode-id="5183"><span data-dcnode-id="5190" instrument_node="">In a cross-sectional study, VOCs and formaldehyde emitted from newly painted surfaces were found to be associated with exacerbated asthma in a study of 252 asthmatics that were compared with 310 non-asthmatics (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r127" data-dcnode-id="5188" href="#" role="button"><span data-dcnode-id="5189" instrument_node="">127</span></a><span data-dcnode-id="5187" instrument_node="">). The low number of affected people, multiple exposures (e.g. wood smoke and pets), socio economic status and the possibility of chance significance have been suggested as potential sources of bias (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r133" data-dcnode-id="5185" href="#" role="button"><span data-dcnode-id="5186" instrument_node="">133</span></a><span data-dcnode-id="5184" instrument_node="">).</span></p><p data-dcnode-id="5169"><span data-dcnode-id="5182" instrument_node="">In summary, consistent cause-effect and dose-response relationships between formaldehyde and measurable lung effects have not been found in controlled human exposure studies and epidemiological studies below 1 mg/m</span><sup data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">3</span></sup><span data-dcnode-id="5179" instrument_node="">. In general, associations between formaldehyde and lung effects or sensitization in children in homes and schools have not been convincing owing to confounding factors and chance effects (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r17" data-dcnode-id="5177" href="#" role="button"><span data-dcnode-id="5178" instrument_node="">17</span></a><span data-dcnode-id="5176" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r77" data-dcnode-id="5174" href="#" role="button"><span data-dcnode-id="5175" instrument_node="">77</span></a><span data-dcnode-id="5173" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r132" data-dcnode-id="5171" href="#" role="button"><span data-dcnode-id="5172" instrument_node="">132</span></a><span data-dcnode-id="5170" instrument_node="">).</span></p><p data-dcnode-id="5158"><b data-dcnode-id="5166"><i data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">Release of formaldehyde from wood particles.</span></i></b><span data-dcnode-id="5165" instrument_node=""> It has been proposed that particles, such as allergens, may carry formaldehyde down to the lower airways (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r132" data-dcnode-id="5163" href="#" role="button"><span data-dcnode-id="5164" instrument_node="">132</span></a><span data-dcnode-id="5162" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r143" data-dcnode-id="5160" href="#" role="button"><span data-dcnode-id="5161" instrument_node="">143</span></a><span data-dcnode-id="5159" instrument_node="">). Indeed, combined effects between formaldehyde and particles have been reported.</span></p><p data-dcnode-id="5132"><span data-dcnode-id="5157" instrument_node="">In the only human exposure study, subjects reported more coughing and effects on the lungs when exposed to 0.5 mg/m</span><sup data-dcnode-id="5155"><span data-dcnode-id="5156" instrument_node="">3</span></sup><span data-dcnode-id="5154" instrument_node=""> active charcoal particles (1.4 μm diameter) and 3.5 mg/m</span><sup data-dcnode-id="5152"><span data-dcnode-id="5153" instrument_node="">3</span></sup><span data-dcnode-id="5151" instrument_node=""> formaldehyde (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r144" data-dcnode-id="5149" href="#" role="button"><span data-dcnode-id="5150" instrument_node="">144</span></a><span data-dcnode-id="5148" instrument_node="">). These effects are supported by studies on mice and guinea-pigs (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r145" data-dcnode-id="5146" href="#" role="button"><span data-dcnode-id="5147" instrument_node="">145</span></a><span data-dcnode-id="5145" instrument_node="">-</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r147" data-dcnode-id="5143" href="#" role="button"><span data-dcnode-id="5144" instrument_node="">147</span></a><span data-dcnode-id="5142" instrument_node="">), although the results are difficult to interpret for risk assessment because the concentrations are in general orders of magnitude higher than normally found indoors. Further, the amount of releasable formaldehyde from wood particles (&gt; 6 μm) into the respiratory tract has been estimated to be negligible under the conditions in which the particles (5 mg/m</span><sup data-dcnode-id="5140"><span data-dcnode-id="5141" instrument_node="">3</span></sup><span data-dcnode-id="5139" instrument_node="">) were exposed to 0.4 mg/m</span><sup data-dcnode-id="5137"><span data-dcnode-id="5138" instrument_node="">3</span></sup><span data-dcnode-id="5136" instrument_node=""> formaldehyde (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r148" data-dcnode-id="5134" href="#" role="button"><span data-dcnode-id="5135" instrument_node="">148</span></a><span data-dcnode-id="5133" instrument_node="">).</span></p><p data-dcnode-id="5106"><span data-dcnode-id="5131" instrument_node="">The release of formaldehyde from medium-density fibreboard has been measured to lie between 100 and 1000 μg/g dust during 6 hours in water at 35–37 °C (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r110" data-dcnode-id="5129" href="#" role="button"><span data-dcnode-id="5130" instrument_node="">110</span></a><span data-dcnode-id="5128" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r149" data-dcnode-id="5126" href="#" role="button"><span data-dcnode-id="5127" instrument_node="">149</span></a><span data-dcnode-id="5125" instrument_node="">). This shows that the maximum amount of releasable formaldehyde from inhaled dust particles is 2 μg/day for a respirable particle concentration of 100 μg/m</span><sup data-dcnode-id="5123"><span data-dcnode-id="5124" instrument_node="">3</span></sup><span data-dcnode-id="5122" instrument_node=""> and a respiratory rate of 20 m</span><sup data-dcnode-id="5120"><span data-dcnode-id="5121" instrument_node="">3</span></sup><span data-dcnode-id="5119" instrument_node="">/day Thus, estimated formaldehyde release is insignificant compared to the inhaled amount of gaseous formaldehyde per day (1 mg) at a concentration of 0.05 mg/m</span><sup data-dcnode-id="5117"><span data-dcnode-id="5118" instrument_node="">3</span></sup><span data-dcnode-id="5116" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r45" data-dcnode-id="5114" href="#" role="button"><span data-dcnode-id="5115" instrument_node="">45</span></a><span data-dcnode-id="5113" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r150" data-dcnode-id="5111" href="#" role="button"><span data-dcnode-id="5112" instrument_node="">150</span></a><span data-dcnode-id="5110" instrument_node="">) and in agreement with formaldehyde on ambient particles (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r151" data-dcnode-id="5108" href="#" role="button"><span data-dcnode-id="5109" instrument_node="">151</span></a><span data-dcnode-id="5107" instrument_node="">).</span></p><p data-dcnode-id="5104"><span data-dcnode-id="5105" instrument_node="">In summary, the reported studies on formaldehyde in the wood industry indicate that release of formaldehyde into the airways from inhaled particles in indoor environments is negligible compared to the inhalable formaldehyde.</span></p></div></div><div data-dcnode-id="5049" id="ch3.s16"><h3 data-dcnode-id="5100"><span data-dcnode-id="5101" instrument_node="">Susceptible groups (non-cancer)</span></h3><div data-dcnode-id="5069" id="ch3.s17"><h4 data-dcnode-id="5098"><span data-dcnode-id="5099" instrument_node="">Formaldehyde exposure alone</span></h4><p data-dcnode-id="5078"><span data-dcnode-id="5097" instrument_node="">Paustenbach et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r77" data-dcnode-id="5095" href="#" role="button"><span data-dcnode-id="5096" instrument_node="">77</span></a><span data-dcnode-id="5094" instrument_node="">), in their comprehensive review, concluded that hypersensitive groups (elderly people, asthmatics and children) could not be identified, nor could they identify any indication of sensitization by exposure to formaldehyde. This has been supported by comprehensive reviews during the last decade (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r66" data-dcnode-id="5092" href="#" role="button"><span data-dcnode-id="5093" instrument_node="">66</span></a><span data-dcnode-id="5091" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r67" data-dcnode-id="5089" href="#" role="button"><span data-dcnode-id="5090" instrument_node="">67</span></a><span data-dcnode-id="5088" instrument_node="">). Increased sensitivity is not considered biologically plausible. No studies on formaldehyde have been reported that show elderly people to be more susceptible; on the contrary, the elderly are generally less sensitive to sensory irritation (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r95" data-dcnode-id="5086" href="#" role="button"><span data-dcnode-id="5087" instrument_node="">95</span></a><span data-dcnode-id="5085" instrument_node="">), possibly decreasing after the age of 60 years (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r152" data-dcnode-id="5083" href="#" role="button"><span data-dcnode-id="5084" instrument_node="">152</span></a><span data-dcnode-id="5082" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r153" data-dcnode-id="5080" href="#" role="button"><span data-dcnode-id="5081" instrument_node="">153</span></a><span data-dcnode-id="5079" instrument_node="">).</span></p><p data-dcnode-id="5070"><span data-dcnode-id="5077" instrument_node="">Children may breathe more oronasally than adults, in addition to having higher respiration. DNA–protein cross-linking (DPX) has been shown in a computational fluid dynamic nasal model to be about 1.5 higher in adults than in children (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r154" data-dcnode-id="5075" href="#" role="button"><span data-dcnode-id="5076" instrument_node="">154</span></a><span data-dcnode-id="5074" instrument_node="">). This suggests that children are not more susceptible than adults, which agrees with predicted formaldehyde adsorption rates per unit surface area of the nasal cavity being equal in children and adults (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r73" data-dcnode-id="5072" href="#" role="button"><span data-dcnode-id="5073" instrument_node="">73</span></a><span data-dcnode-id="5071" instrument_node="">).</span></p></div><div data-dcnode-id="5050" id="ch3.s18"><h4 data-dcnode-id="5067"><span data-dcnode-id="5068" instrument_node="">Combined exposure</span></h4><p data-dcnode-id="5053"><span data-dcnode-id="5066" instrument_node="">One study showed that asthmatics sensitive to grass pollen are insensitive to formaldehyde prior to inhalation of grass pollen (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r82" data-dcnode-id="5064" href="#" role="button"><span data-dcnode-id="5065" instrument_node="">82</span></a><span data-dcnode-id="5063" instrument_node="">). Another study indicated that dust mite asthmatics may be more sensitive to a dust mite dose after formaldehyde exposure by mouth (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r80" data-dcnode-id="5061" href="#" role="button"><span data-dcnode-id="5062" instrument_node="">80</span></a><span data-dcnode-id="5060" instrument_node="">). The effect is not considered to have clinical relevance. Healthy people that suffer from nasal distress in their homes have been shown to exhibit swelling of the mucosa following exposure to 0.13 mg/m</span><sup data-dcnode-id="5058"><span data-dcnode-id="5059" instrument_node="">3</span></sup><span data-dcnode-id="5057" instrument_node=""> formaldehyde for two hours when compared with a control group (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r78" data-dcnode-id="5055" href="#" role="button"><span data-dcnode-id="5056" instrument_node="">78</span></a><span data-dcnode-id="5054" instrument_node="">).</span></p><p data-dcnode-id="5051"><span data-dcnode-id="5052" instrument_node="">In summary, the experimental and epidemiological literature on formaldehyde does not indicate an increase in susceptibility among children, elderly people and asthmatics. Nevertheless, people with a personal trait of negative affectivity may report more symptoms.</span></p></div></div><div data-dcnode-id="4149" id="ch3.s19"><h3 data-dcnode-id="5047"><span data-dcnode-id="5048" instrument_node="">Long-term (carcinogenic) effects of exposure to formaldehyde at indoor levels</span></h3><p data-dcnode-id="5030"><span data-dcnode-id="5046" instrument_node="">Formaldehyde is classified by IARC as carcinogenic to humans (Group 1) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="5044" href="#" role="button"><span data-dcnode-id="5045" instrument_node="">1</span></a><span data-dcnode-id="5043" instrument_node="">). In addition to sufficient evidence in experimental animals for upper airway carcinogenicity, IARC concluded that there is sufficient epidemiological evidence that formaldehyde causes nasopharyngeal cancer in humans. This was based on results from the U.S. National Cancer Institute (NCI) cohort and supported by the primarily positive findings in other studies. IARC (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="5041" href="#" role="button"><span data-dcnode-id="5042" instrument_node="">1</span></a><span data-dcnode-id="5040" instrument_node="">) found only limited epidemiological evidence that formaldehyde causes sinonasal cancer in humans and the overall balance of epidemiological evidence did not support a causal role for formaldehyde-induced cancer at other sites, including the oral cavity, oro- and hypopharynx, pancreas, larynx, lung and brain. IARC recently accepted that there is sufficient evidence that formaldehyde may cause myeloid leukaemia in humans (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r155" data-dcnode-id="5038" href="#" role="button"><span data-dcnode-id="5039" instrument_node="">155</span></a><span data-dcnode-id="5037" instrument_node="">). The change in classification of myeloid leukaemia was supported by two new studies (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r156" data-dcnode-id="5035" href="#" role="button"><span data-dcnode-id="5036" instrument_node="">156</span></a><span data-dcnode-id="5034" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r157" data-dcnode-id="5032" href="#" role="button"><span data-dcnode-id="5033" instrument_node="">157</span></a><span data-dcnode-id="5031" instrument_node="">).</span></p><p data-dcnode-id="4992"><span data-dcnode-id="5029" instrument_node="">Formaldehyde is genotoxic in multiple in vitro models and in exposed humans and laboratory animals (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="5027" href="#" role="button"><span data-dcnode-id="5028" instrument_node="">1</span></a><span data-dcnode-id="5026" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r64" data-dcnode-id="5024" href="#" role="button"><span data-dcnode-id="5025" instrument_node="">64</span></a><span data-dcnode-id="5023" instrument_node="">). Studies in humans showed increased DPX in workers exposed to formaldehyde, and genotoxicity and cytotoxicity are considered to play important roles in the carcinogenesis of formaldehyde in nasal tissues (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="5021" href="#" role="button"><span data-dcnode-id="5022" instrument_node="">1</span></a><span data-dcnode-id="5020" instrument_node="">), where cell proliferation due to cytotoxicity is considered a key element in the development of airway cancer (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r64" data-dcnode-id="5018" href="#" role="button"><span data-dcnode-id="5019" instrument_node="">64</span></a><span data-dcnode-id="5017" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r158" data-dcnode-id="5015" href="#" role="button"><span data-dcnode-id="5016" instrument_node="">158</span></a><span data-dcnode-id="5014" instrument_node="">). For this type of carcinogenic effect, the NOAEL and the use of assessment factors are considered appropriate for setting standards or guidelines for airborne exposures (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r159" data-dcnode-id="5012" href="#" role="button"><span data-dcnode-id="5013" instrument_node="">159</span></a><span data-dcnode-id="5011" instrument_node="">). On the contrary, the early risk assessments used linear low-dose extrapolations, which do not account for the sub-linearities in the observed concentration–response relationship (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="5009" href="#" role="button"><span data-dcnode-id="5010" instrument_node="">1</span></a><span data-dcnode-id="5008" instrument_node="">). The NOAEL approach has been used for setting health-based occupational exposure limits for formaldehyde, for example in Europe (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r64" data-dcnode-id="5006" href="#" role="button"><span data-dcnode-id="5007" instrument_node="">64</span></a><span data-dcnode-id="5005" instrument_node="">), Germany (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r160" data-dcnode-id="5003" href="#" role="button"><span data-dcnode-id="5004" instrument_node="">160</span></a><span data-dcnode-id="5002" instrument_node="">), Japan (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r161" data-dcnode-id="5000" href="#" role="button"><span data-dcnode-id="5001" instrument_node="">161</span></a><span data-dcnode-id="4999" instrument_node="">) and the United States (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r162" data-dcnode-id="4997" href="#" role="button"><span data-dcnode-id="4998" instrument_node="">162</span></a><span data-dcnode-id="4996" instrument_node="">), and for setting outdoor air standards in Germany (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r66" data-dcnode-id="4994" href="#" role="button"><span data-dcnode-id="4995" instrument_node="">66</span></a><span data-dcnode-id="4993" instrument_node="">).</span></p><div data-dcnode-id="4923" id="ch3.s20"><h4 data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">Biological mechanisms</span></h4><p data-dcnode-id="4967"><span data-dcnode-id="4989" instrument_node="">Formaldehyde is a normal component of the blood. In humans, exposure to about 2.5 mg/m</span><sup data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">3</span></sup><span data-dcnode-id="4986" instrument_node=""> airborne formaldehyde did not increase the blood level and exposure to less than 0.6 mg/m</span><sup data-dcnode-id="4984"><span data-dcnode-id="4985" instrument_node="">3</span></sup><span data-dcnode-id="4983" instrument_node=""> did not increase urinary formate excretion owing to rapid metabolism (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="4981" href="#" role="button"><span data-dcnode-id="4982" instrument_node="">1</span></a><span data-dcnode-id="4980" instrument_node="">). From a mathematical model describing the absorption and removal of inhaled formaldehyde in the human nose, it was predicted that exposures in the range of 0.125–12.5 mg/m</span><sup data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node="">3</span></sup><span data-dcnode-id="4977" instrument_node=""> cause only extremely small increases in blood formaldehyde levels compared to pre-exposure levels (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r50" data-dcnode-id="4975" href="#" role="button"><span data-dcnode-id="4976" instrument_node="">50</span></a><span data-dcnode-id="4974" instrument_node="">). In monkeys, 7.5 mg/m</span><sup data-dcnode-id="4972"><span data-dcnode-id="4973" instrument_node="">3</span></sup><span data-dcnode-id="4971" instrument_node=""> formaldehyde for 6 hours a day, 5 days a week for 4 weeks produced no increase in blood formaldehyde level. In rats, the half-time of formaldehyde is about one minute in the plasma after intravenous administration (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="4969" href="#" role="button"><span data-dcnode-id="4970" instrument_node="">1</span></a><span data-dcnode-id="4968" instrument_node="">). This indicates that normal indoor air levels of formaldehyde are not expected to increase internal organ exposures.</span></p><p data-dcnode-id="4944"><span data-dcnode-id="4966" instrument_node="">The mucosal effect in Wistar rats was studied at exposures to 0, 0.125, 1.25 or 12.5 mg/m</span><sup data-dcnode-id="4964"><span data-dcnode-id="4965" instrument_node="">3</span></sup><span data-dcnode-id="4963" instrument_node=""> formaldehyde for 6 hours a day, 5 days a week for 1 year (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r163" data-dcnode-id="4961" href="#" role="button"><span data-dcnode-id="4962" instrument_node="">163</span></a><span data-dcnode-id="4960" instrument_node="">) and 28 months (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r119" data-dcnode-id="4958" href="#" role="button"><span data-dcnode-id="4959" instrument_node="">119</span></a><span data-dcnode-id="4957" instrument_node="">). No histological effect was apparent at 1.25 mg/m</span><sup data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">3</span></sup><span data-dcnode-id="4954" instrument_node="">. In another study, nasal epithelial effects were observed at 2.5 mg/m</span><sup data-dcnode-id="4952"><span data-dcnode-id="4953" instrument_node="">3</span></sup><span data-dcnode-id="4951" instrument_node=""> in Fischer 344 rats exposed for 6 hours a day, 5 days a week for 6–24 months (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r164" data-dcnode-id="4949" href="#" role="button"><span data-dcnode-id="4950" instrument_node="">164</span></a><span data-dcnode-id="4948" instrument_node="">). This indicates a NOAEL of 1.25 mg/m</span><sup data-dcnode-id="4946"><span data-dcnode-id="4947" instrument_node="">3</span></sup><span data-dcnode-id="4945" instrument_node=""> for histopathological changes.</span></p><p data-dcnode-id="4924"><span data-dcnode-id="4943" instrument_node="">In the nasal tissue, formaldehyde reacts with glutathione to form S-(hydroxymethyl)glutathione, which is oxidized by the formaldehyde-dependent alcohol dehydrogenase to produce formate (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="4941" href="#" role="button"><span data-dcnode-id="4942" instrument_node="">1</span></a><span data-dcnode-id="4940" instrument_node="">). The half saturation of the enzyme is estimated to occur at 3.25 mg/m</span><sup data-dcnode-id="4938"><span data-dcnode-id="4939" instrument_node="">3</span></sup><span data-dcnode-id="4937" instrument_node=""> formaldehyde in the air (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r60" data-dcnode-id="4935" href="#" role="button"><span data-dcnode-id="4936" instrument_node="">60</span></a><span data-dcnode-id="4934" instrument_node="">) and, thus, higher exposure levels are expected to cause a disproportionate increase in cellular levels of formaldehyde. Formaldehyde causes DPX formation, which is non-linearly related to formaldehyde concentration. A conspicuous increase in DPX formation occurs above 2–4 mg/m</span><sup data-dcnode-id="4932"><span data-dcnode-id="4933" instrument_node="">3</span></sup><span data-dcnode-id="4931" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="4929" href="#" role="button"><span data-dcnode-id="4930" instrument_node="">1</span></a><span data-dcnode-id="4928" instrument_node="">). In the nasal tissue of animals, DPX is removed rapidly and not accumulated over the exposure period (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="4926" href="#" role="button"><span data-dcnode-id="4927" instrument_node="">1</span></a><span data-dcnode-id="4925" instrument_node="">).</span></p></div><div data-dcnode-id="4862" id="ch3.s21"><h4 data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node="">Nasal cancer in inhalation studies in rats</span></h4><p data-dcnode-id="4889"><span data-dcnode-id="4920" instrument_node="">Chronic exposure to about 7.5 mg/m</span><sup data-dcnode-id="4918"><span data-dcnode-id="4919" instrument_node="">3</span></sup><span data-dcnode-id="4917" instrument_node=""> formaldehyde and above caused squamous cell carcinoma of the nasal cavity of rats (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r67" data-dcnode-id="4915" href="#" role="button"><span data-dcnode-id="4916" instrument_node="">67</span></a><span data-dcnode-id="4914" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r158" data-dcnode-id="4912" href="#" role="button"><span data-dcnode-id="4913" instrument_node="">158</span></a><span data-dcnode-id="4911" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r165" data-dcnode-id="4909" href="#" role="button"><span data-dcnode-id="4910" instrument_node="">165</span></a><span data-dcnode-id="4908" instrument_node="">) with a non-linear concentration–response relationship (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r66" data-dcnode-id="4906" href="#" role="button"><span data-dcnode-id="4907" instrument_node="">66</span></a><span data-dcnode-id="4905" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r158" data-dcnode-id="4903" href="#" role="button"><span data-dcnode-id="4904" instrument_node="">158</span></a><span data-dcnode-id="4902" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r165" data-dcnode-id="4900" href="#" role="button"><span data-dcnode-id="4901" instrument_node="">165</span></a><span data-dcnode-id="4899" instrument_node="">). Exposure-dependent squamous cell carcinoma has not been observed at 2.5 mg/m</span><sup data-dcnode-id="4897"><span data-dcnode-id="4898" instrument_node="">3</span></sup><span data-dcnode-id="4896" instrument_node=""> (2 ppm) and lower formaldehyde concentrations (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="4894" href="#" role="button"><span data-dcnode-id="4895" instrument_node="">1</span></a><span data-dcnode-id="4893" instrument_node="">). Further, animal data mostly suggest that organs that are not in direct contact with formaldehyde do not develop neoplasms, presumably due to the fact that formaldehyde is highly reactive and rapidly metabolized locally (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r158" data-dcnode-id="4891" href="#" role="button"><span data-dcnode-id="4892" instrument_node="">158</span></a><span data-dcnode-id="4890" instrument_node="">).</span></p><p data-dcnode-id="4863"><span data-dcnode-id="4888" instrument_node="">The development of squamous cell carcinoma is considered to be related to a genotoxic effect that may be due to DPX (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r63" data-dcnode-id="4886" href="#" role="button"><span data-dcnode-id="4887" instrument_node="">63</span></a><span data-dcnode-id="4885" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r156" data-dcnode-id="4883" href="#" role="button"><span data-dcnode-id="4884" instrument_node="">156</span></a><span data-dcnode-id="4882" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r164" data-dcnode-id="4880" href="#" role="button"><span data-dcnode-id="4881" instrument_node="">164</span></a><span data-dcnode-id="4879" instrument_node="">) in addition to cytolethality-regenerative cellular proliferation (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r156" data-dcnode-id="4877" href="#" role="button"><span data-dcnode-id="4878" instrument_node="">156</span></a><span data-dcnode-id="4876" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r165" data-dcnode-id="4874" href="#" role="button"><span data-dcnode-id="4875" instrument_node="">165</span></a><span data-dcnode-id="4873" instrument_node="">); increased cell proliferation in the rat nose is considered to occur at about 2.5 mg/m</span><sup data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">3</span></sup><span data-dcnode-id="4870" instrument_node=""> formaldehyde and above (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r67" data-dcnode-id="4868" href="#" role="button"><span data-dcnode-id="4869" instrument_node="">67</span></a><span data-dcnode-id="4867" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r158" data-dcnode-id="4865" href="#" role="button"><span data-dcnode-id="4866" instrument_node="">158</span></a><span data-dcnode-id="4864" instrument_node="">).</span></p></div><div data-dcnode-id="4731" id="ch3.s22"><h4 data-dcnode-id="4860"><span data-dcnode-id="4861" instrument_node="">Lymphohaematopoietic malignancies in animals</span></h4><p data-dcnode-id="4852"><b data-dcnode-id="4857"><i data-dcnode-id="4858"><span data-dcnode-id="4859" instrument_node="">Drinking-water studies.</span></i></b><span data-dcnode-id="4856" instrument_node=""> Formaldehyde was administered in the drinking-water in a 2-year study in Wistar rats (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r168" data-dcnode-id="4854" href="#" role="button"><span data-dcnode-id="4855" instrument_node="">168</span></a><span data-dcnode-id="4853" instrument_node="">). Males were dosed with 0, 1.2, 15 or 82 mg/kg per day and females with 0, 1.8, 21 or 109 mg/kg per day. Each group comprised 50 rats of each sex. Treatment-related pathological effects were limited to changes in the stomach and the kidney in both sexes in the high-dose group; the kidney effect was considered secondary to the reduced intake of liquid. The incidence of tumours did not vary markedly be
