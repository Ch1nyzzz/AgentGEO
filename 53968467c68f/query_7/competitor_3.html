</span><div class="main-content lit-style" data-dcnode-id="591" itemscope="itemscope" itemtype="http://schema.org/CreativeWork"><div class="meta-content fm-sec" data-dcnode-id="6409"><h1 data-dcnode-id="6423" id="_NBK138711_"><span class="label" data-dcnode-id="6426"><span data-dcnode-id="6427" instrument_node=""> 3</span></span><span class="title" data-dcnode-id="6424" itemprop="name"><span data-dcnode-id="6425" instrument_node="">Formaldehyde</span></span></h1><p class="contrib-group" data-dcnode-id="6410"><span data-dcnode-id="6421" itemprop="author"><span data-dcnode-id="6422" instrument_node="">Debra A. Kaden</span></span><span data-dcnode-id="6420" instrument_node="">, </span><span data-dcnode-id="6418" itemprop="author"><span data-dcnode-id="6419" instrument_node="">Corinne Mandin</span></span><span data-dcnode-id="6417" instrument_node="">, </span><span data-dcnode-id="6415" itemprop="author"><span data-dcnode-id="6416" instrument_node="">Gunnar D. Nielsen</span></span><span data-dcnode-id="6414" instrument_node="">, and </span><span data-dcnode-id="6412" itemprop="author"><span data-dcnode-id="6413" instrument_node="">Peder Wolkoff</span></span><span data-dcnode-id="6411" instrument_node="">.</span></p></div><div class="jig-ncbiinpagenav body-content whole_rhythm" data-dcnode-id="592" data-jigconfig="allHeadingLevels: ['h2'],smoothScroll: false" id="ui-ncbiinpagenav-10" itemprop="text"><div data-dcnode-id="6343" id="ch3.s1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="6405"><span data-dcnode-id="6406" role="menubar"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="6407" href="#" role="menuitem" title="Go to other sections in this page"><span data-dcnode-id="6408" instrument_node="">Go to:</span></a></span></div><h2 class="ui-helper-clearfix" data-dcnode-id="6403" id="_ch3_s1_"><span data-dcnode-id="6404" instrument_node="">General description</span></h2><p data-dcnode-id="6398"><span data-dcnode-id="6402" instrument_node="">Formaldehyde (molecular formula H</span><sub data-dcnode-id="6400"><span data-dcnode-id="6401" instrument_node="">2</span></sub><span data-dcnode-id="6399" instrument_node="">-C=O; CAS number 50-00-0) is a colourless gas, flammable and highly reactive at room temperature. Formaldehyde can also be obtained commercially as a 30–50% (by weight) aqueous solution, known as formalin.</span></p><p data-dcnode-id="6396"><span data-dcnode-id="6397" instrument_node="">In ambient air, formaldehyde is quickly photo-oxidized in carbon dioxide. It also reacts very quickly with the hydroxyl radicals to give formic acid. The half-life estimated for these reactions is about one hour depending on the environmental conditions.</span></p><p data-dcnode-id="6376"><span data-dcnode-id="6395" instrument_node="">The main chemical and physical properties (of the pure substance) are as follows (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="6393" href="#" role="button"><span data-dcnode-id="6394" instrument_node="">1</span></a><span data-dcnode-id="6392" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r2" data-dcnode-id="6390" href="#" role="button"><span data-dcnode-id="6391" instrument_node="">2</span></a><span data-dcnode-id="6389" instrument_node="">): molecular mass 30.03 g/mol; relative vapour density 1.03–1.07 (air = 1); melting point −92 °C; and boiling point −19.1 °C. Formaldehyde is soluble in water (around 400 g/l at 20 °C), ethanol and chloroform and miscible with acetone, benzene and diethylether. The octanol/water partition coefficient (log K</span><sub data-dcnode-id="6387"><span data-dcnode-id="6388" instrument_node="">ow</span></sub><span data-dcnode-id="6386" instrument_node="">) is 0.35, the vapour pressure is 5.19 × 10</span><sup data-dcnode-id="6384"><span data-dcnode-id="6385" instrument_node="">5</span></sup><span data-dcnode-id="6383" instrument_node=""> Pa at 25 °C and the Henry's Law constant is 3.41 × 10</span><sup data-dcnode-id="6381"><span data-dcnode-id="6382" instrument_node="">−2</span></sup><span data-dcnode-id="6380" instrument_node=""> Pa.m</span><sup data-dcnode-id="6378"><span data-dcnode-id="6379" instrument_node="">3</span></sup><span data-dcnode-id="6377" instrument_node="">/mol at 25 °C.</span></p><p data-dcnode-id="6374"><span data-dcnode-id="6375" instrument_node="">Formaldehyde is ubiquitously found in the environment, because it is formed primarily by numerous natural sources and anthropogenic activities. In the environment, it is released through biomass combustion (forest and bush fires) or decomposition and through volcanoes, for example. Anthropogenic sources include direct ones such as on-site industrial emissions and fuel combustion from traffic. Other combustion processes (power plants, incineration, etc.) also represent sources of formaldehyde emissions in the atmosphere. However, formaldehyde is also extensively produced industrially worldwide for use in the manufacture of resins, as a disinfectant and fixative, or as a preservative in consumer products.</span></p><p data-dcnode-id="6372"><span data-dcnode-id="6373" instrument_node="">All these man-made products and uses are the major indirect sources of formaldehyde, in particular indoors. Finally, it should be noted that secondary formation of formaldehyde occurs in air through the oxidation of volatile organic compounds (VOCs) and reactions between ozone (mainly from outdoors) and alkenes (especially terpenes) have been widely described. The contribution of these secondary chemical processes to the ambient and indoor concentrations is still not fully quantified.</span></p><p data-dcnode-id="6361"><span data-dcnode-id="6371" instrument_node="">Common techniques to measure formaldehyde concentrations include both integrated active and passive methods. Formaldehyde is generally trapped on a sorbent impregnated with 2,4-dinitrophenylhydrazine (2,4-DNPH). Analysis is then conducted in the laboratory by high-performance liquid chromatography and ultraviolet detection at 350 nm. Detection and quantification limits around 1 μg/m</span><sup data-dcnode-id="6369"><span data-dcnode-id="6370" instrument_node="">3</span></sup><span data-dcnode-id="6368" instrument_node=""> can be achieved. The use of an ozone scrubber is recommended to remove the latter from the sample stream to prevent interference during the analysis. Recent comparisons of formaldehyde measurement techniques have shown that, in the presence of low relative humidity, 2,4-DNPH-based methods could underestimate concentrations (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r3" data-dcnode-id="6366" href="#" role="button"><span data-dcnode-id="6367" instrument_node="">3</span></a><span data-dcnode-id="6365" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r4" data-dcnode-id="6363" href="#" role="button"><span data-dcnode-id="6364" instrument_node="">4</span></a><span data-dcnode-id="6362" instrument_node="">).</span></p><div data-dcnode-id="6344" id="ch3.s2"><h3 data-dcnode-id="6359"><span data-dcnode-id="6360" instrument_node="">Conversion factors</span></h3><p data-dcnode-id="6345"><span data-dcnode-id="6358" instrument_node="">At 760 mmHg and 20 °C, 1 ppm = 1.249 mg/m</span><sup data-dcnode-id="6356"><span data-dcnode-id="6357" instrument_node="">3</span></sup><span data-dcnode-id="6355" instrument_node=""> and 1 mg/m</span><sup data-dcnode-id="6353"><span data-dcnode-id="6354" instrument_node="">3</span></sup><span data-dcnode-id="6352" instrument_node=""> = 0.801 ppm; at 25 °C, 1 ppm = 1.228 mg/m</span><sup data-dcnode-id="6350"><span data-dcnode-id="6351" instrument_node="">3</span></sup><span data-dcnode-id="6349" instrument_node=""> and 1 mg/m</span><sup data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">3</span></sup><span data-dcnode-id="6346" instrument_node=""> = 0.814 ppm.</span></p></div></div><div data-dcnode-id="6279" id="ch3.s3"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="6340"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="6341" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="6342" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="6338" id="_ch3_s3_"><span data-dcnode-id="6339" instrument_node="">Sources and pathways of exposure</span></h2><p data-dcnode-id="6318"><span data-dcnode-id="6337" instrument_node="">Indoor sources may be combustion processes such as smoking, heating, cooking, or candle or incense burning (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="6335" href="#" role="button"><span data-dcnode-id="6336" instrument_node="">1</span></a><span data-dcnode-id="6334" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r5" data-dcnode-id="6332" href="#" role="button"><span data-dcnode-id="6333" instrument_node="">5</span></a><span data-dcnode-id="6331" instrument_node="">). However, major sources in non-smoking environments appear to be building materials and consumer products that emit formaldehyde (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r5" data-dcnode-id="6329" href="#" role="button"><span data-dcnode-id="6330" instrument_node="">5</span></a><span data-dcnode-id="6328" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r6" data-dcnode-id="6326" href="#" role="button"><span data-dcnode-id="6327" instrument_node="">6</span></a><span data-dcnode-id="6325" instrument_node="">). This applies to new materials and products (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r7" data-dcnode-id="6323" href="#" role="button"><span data-dcnode-id="6324" instrument_node="">7</span></a><span data-dcnode-id="6322" instrument_node="">) but can last several months, particularly in conditions with high relative humidity and high indoor temperatures (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r8" data-dcnode-id="6320" href="#" role="button"><span data-dcnode-id="6321" instrument_node="">8</span></a><span data-dcnode-id="6319" instrument_node="">).</span></p><p data-dcnode-id="6316"><span data-dcnode-id="6317" instrument_node="">Formaldehyde sources in indoor environments include: furniture and wooden products containing formaldehyde-based resins such as particleboard, plywood and medium-density fibreboard; insulating materials (in the early 1980s, urea formaldehyde foam insulation was a major source of indoor pollution); textiles; do-it-yourself products such as paints, wallpapers, glues, adhesives, varnishes and lacquers; household cleaning products such as detergents, disinfectants, softeners, carpet cleaners and shoe products; cosmetics such as liquid soaps, shampoos, nail varnishes and nail hardeners; electronic equipment, including computers and photocopiers; and other consumer items such as insecticides and paper products.</span></p><p data-dcnode-id="6308"><span data-dcnode-id="6315" instrument_node="">As mentioned above, secondary formation of formaldehyde occurs indoors through chemical reactions between, for example, ozone and terpenes (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r9" data-dcnode-id="6313" href="#" role="button"><span data-dcnode-id="6314" instrument_node="">9</span></a><span data-dcnode-id="6312" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r10" data-dcnode-id="6310" href="#" role="button"><span data-dcnode-id="6311" instrument_node="">10</span></a><span data-dcnode-id="6309" instrument_node="">).</span></p><p data-dcnode-id="6291"><span data-dcnode-id="6307" instrument_node="">Taking all the indoor sources of formaldehyde into account, it is difficult to identify the major ones that contribute to indoor levels. During a large-scale indoor survey carried out between 1997 and 1999 in 876 homes in the United Kingdom, Raw et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r11" data-dcnode-id="6305" href="#" role="button"><span data-dcnode-id="6306" instrument_node="">11</span></a><span data-dcnode-id="6304" instrument_node="">) found that, depending on the age of the building, the presence of particleboard flooring in the home was the second most important determinant of indoor concentration. Clarisse et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r12" data-dcnode-id="6302" href="#" role="button"><span data-dcnode-id="6303" instrument_node="">12</span></a><span data-dcnode-id="6301" instrument_node="">) measured formaldehyde in the bedroom, the kitchen and the living room of 61 Parisian flats with no previous history of complaint for olfactory nuisance. They found that indoor levels depended on the age of wall or floor coverings (renovations less than one year old), smoking and ambient parameters (carbon dioxide levels and temperature). Using emission factors from the literature, the German Federal Institute for Risk Assessment found that pressed wood products were the major sources contributing to exposure through inhalation at home (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r13" data-dcnode-id="6299" href="#" role="button"><span data-dcnode-id="6300" instrument_node="">13</span></a><span data-dcnode-id="6298" instrument_node="">). Marchand et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r14" data-dcnode-id="6296" href="#" role="button"><span data-dcnode-id="6297" instrument_node="">14</span></a><span data-dcnode-id="6295" instrument_node="">) carried out aldehyde measurements in 162 homes in the Strasbourg area in 2004–2005. Variance analyses showed that formaldehyde concentration was a function of the age of the ceiling coverings for both bedrooms and living rooms. Formaldehyde concentrations tended to decrease with increasing furniture age for both living rooms and bedrooms, but the analyses were not significant. In Canada, Gilbert et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r15" data-dcnode-id="6293" href="#" role="button"><span data-dcnode-id="6294" instrument_node="">15</span></a><span data-dcnode-id="6292" instrument_node="">) measured formaldehyde levels in 96 homes in Quebec City in 2005. Formaldehyde concentrations were negatively correlated with air exchange rates. They were significantly elevated in homes heated by electricity, in those with new wooden or melamine furniture purchased in the previous 12 months, and in those where painting or varnishing had been done in the sampled room in the previous 12 months. Similarly, relative high levels that can be measured in schools are usually considered to be linked to the high density of furniture in the classrooms (and to poor ventilation).</span></p><p data-dcnode-id="6280"><span data-dcnode-id="6290" instrument_node="">The possible routes of exposure to formaldehyde are inhalation, ingestion and dermal absorption. Almost no data are available in the literature on dermal exposure (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r16" data-dcnode-id="6288" href="#" role="button"><span data-dcnode-id="6289" instrument_node="">16</span></a><span data-dcnode-id="6287" instrument_node="">). Concerning the oral pathway, exposure through food may not be negligible. Estimates of daily formaldehyde intake by six age groups of the general population in Canada were carried out to determine the relative contributions from different media (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r17" data-dcnode-id="6285" href="#" role="button"><span data-dcnode-id="6286" instrument_node="">17</span></a><span data-dcnode-id="6284" instrument_node="">). These calculations indicate that daily formaldehyde intake via inhalation is much lower than for intake from food. However, since critical effects associated with exposure to formaldehyde are directly linked to the site of contact, inhalation and ingestion are usually considered separately. Considering exclusively inhalation, indoor exposure contributes up to 98% to the integrated exposure (considering time–activity patterns and daily inhalation volume) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r16" data-dcnode-id="6282" href="#" role="button"><span data-dcnode-id="6283" instrument_node="">16</span></a><span data-dcnode-id="6281" instrument_node="">).</span></p></div><div data-dcnode-id="5998" id="ch3.s4"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="6276"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="6277" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="6278" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="6274" id="_ch3_s4_"><span data-dcnode-id="6275" instrument_node="">Indoor concentrations and relationship with outdoor levels</span></h2><p data-dcnode-id="6266"><span data-dcnode-id="6273" instrument_node="">A large review of formaldehyde concentrations worldwide in all types of indoor environment, including mobile homes, has been summarized by Salthammer et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r5" data-dcnode-id="6271" href="#" role="button"><span data-dcnode-id="6272" instrument_node="">5</span></a><span data-dcnode-id="6270" instrument_node="">). A second large review compiles information on indoor, outdoor and personal exposures to formaldehyde (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r18" data-dcnode-id="6268" href="#" role="button"><span data-dcnode-id="6269" instrument_node="">18</span></a><span data-dcnode-id="6267" instrument_node="">).</span></p><p data-dcnode-id="6258"><span data-dcnode-id="6265" instrument_node="">During a large indoor air survey carried out in homes by the Building Research Establishment (BRE) in the United Kingdom in 1997–1999, the geometric mean, 95th percentile and maximum value of three-day samples of formaldehyde in bedrooms (n = 833) were, respectively, 22.2, 61.2 and 171 μg/m</span><sup data-dcnode-id="6263"><span data-dcnode-id="6264" instrument_node="">3</span></sup><span data-dcnode-id="6262" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r11" data-dcnode-id="6260" href="#" role="button"><span data-dcnode-id="6261" instrument_node="">11</span></a><span data-dcnode-id="6259" instrument_node="">).</span></p><p data-dcnode-id="6250"><span data-dcnode-id="6257" instrument_node="">During Phase IV of the German longitudinal environmental survey 2003–2006 (GerES IV), formaldehyde was measured through passive samplers for one week in bedrooms of a randomly selected population of children and teen agers. The geometric mean, 95th percentile and maximum concentration (n = 586) were, respectively, 23.3, 47.7 and 68.9 μg/m</span><sup data-dcnode-id="6255"><span data-dcnode-id="6256" instrument_node="">3</span></sup><span data-dcnode-id="6254" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r19" data-dcnode-id="6252" href="#" role="button"><span data-dcnode-id="6253" instrument_node="">19</span></a><span data-dcnode-id="6251" instrument_node="">). These levels were lower than the concentrations measured previously in the framework of the GerES.</span></p><p data-dcnode-id="6233"><span data-dcnode-id="6249" instrument_node="">In the EXPOLIS study in Helsinki, the average air concentration of formaldehyde in homes was 41.4 μg/m</span><sup data-dcnode-id="6247"><span data-dcnode-id="6248" instrument_node="">3</span></sup><span data-dcnode-id="6246" instrument_node=""> (range 8.1–77.8 μg/m</span><sup data-dcnode-id="6244"><span data-dcnode-id="6245" instrument_node="">3</span></sup><span data-dcnode-id="6243" instrument_node="">) and at the workplace 15 μg/m</span><sup data-dcnode-id="6241"><span data-dcnode-id="6242" instrument_node="">3</span></sup><span data-dcnode-id="6240" instrument_node="">, whereas average personal exposure was 26.8 μg/m</span><sup data-dcnode-id="6238"><span data-dcnode-id="6239" instrument_node="">3</span></sup><span data-dcnode-id="6237" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r20" data-dcnode-id="6235" href="#" role="button"><span data-dcnode-id="6236" instrument_node="">20</span></a><span data-dcnode-id="6234" instrument_node="">).</span></p><p data-dcnode-id="6222"><span data-dcnode-id="6232" instrument_node="">Hutter et al. measured formaldehyde concentrations in 160 Austrian homes and found a median concentration of 25 μg/m</span><sup data-dcnode-id="6230"><span data-dcnode-id="6231" instrument_node="">3</span></sup><span data-dcnode-id="6229" instrument_node=""> and a maximum value of 115 μg/m</span><sup data-dcnode-id="6227"><span data-dcnode-id="6228" instrument_node="">3</span></sup><span data-dcnode-id="6226" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r21" data-dcnode-id="6224" href="#" role="button"><span data-dcnode-id="6225" instrument_node="">21</span></a><span data-dcnode-id="6223" instrument_node="">).</span></p><p data-dcnode-id="6214"><span data-dcnode-id="6221" instrument_node="">The French Observatory on Indoor Air Quality carried out a large monitoring campaign in 567 randomly selected dwellings between 2003 and 2005. The median concentration, 95th percentile and maximum value of formaldehyde following seven days of passive sampling in bedrooms (n = 554) were, respectively, 19.6, 46.7 and 86.3 μg/m</span><sup data-dcnode-id="6219"><span data-dcnode-id="6220" instrument_node="">3</span></sup><span data-dcnode-id="6218" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r22" data-dcnode-id="6216" href="#" role="button"><span data-dcnode-id="6217" instrument_node="">22</span></a><span data-dcnode-id="6215" instrument_node="">).</span></p><p data-dcnode-id="6203"><span data-dcnode-id="6213" instrument_node="">In Canada, Gilbert et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r15" data-dcnode-id="6211" href="#" role="button"><span data-dcnode-id="6212" instrument_node="">15</span></a><span data-dcnode-id="6210" instrument_node="">) measured formaldehyde levels in 96 homes in Quebec City between January and April 2005. The indoor concentrations ranged from 9.6 to 90 μg/m</span><sup data-dcnode-id="6208"><span data-dcnode-id="6209" instrument_node="">3</span></sup><span data-dcnode-id="6207" instrument_node="">, with a geometric mean of 29.5 mg/m</span><sup data-dcnode-id="6205"><span data-dcnode-id="6206" instrument_node="">3</span></sup><span data-dcnode-id="6204" instrument_node="">.</span></p><p data-dcnode-id="6195"><span data-dcnode-id="6202" instrument_node="">In the National Human Exposure Assessment Survey (NHEXAS) in Arizona, the median and 90th percentile indoor concentrations were, respectively, 21 and 46 μg/m</span><sup data-dcnode-id="6200"><span data-dcnode-id="6201" instrument_node="">3</span></sup><span data-dcnode-id="6199" instrument_node="">, about the same levels as those measured in Europe (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r21" data-dcnode-id="6197" href="#" role="button"><span data-dcnode-id="6198" instrument_node="">21</span></a><span data-dcnode-id="6196" instrument_node="">).</span></p><p data-dcnode-id="6187"><span data-dcnode-id="6194" instrument_node="">Dingle &amp; Franklin (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r23" data-dcnode-id="6192" href="#" role="button"><span data-dcnode-id="6193" instrument_node="">23</span></a><span data-dcnode-id="6191" instrument_node="">) observed, in a study carried out in 185 homes in Perth, Australia, indoor formaldehyde concentrations of between 2.5 and 133.7 μg/m</span><sup data-dcnode-id="6189"><span data-dcnode-id="6190" instrument_node="">3</span></sup><span data-dcnode-id="6188" instrument_node="">, i.e. the same range of concentrations as measured in other countries.</span></p><p data-dcnode-id="6167"><span data-dcnode-id="6186" instrument_node="">Formaldehyde concentrations in Japanese dwellings have been regularly measured within large-scale monitoring campaigns since the 1090s (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r24" data-dcnode-id="6184" href="#" role="button"><span data-dcnode-id="6185" instrument_node="">24</span></a><span data-dcnode-id="6183" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r25" data-dcnode-id="6181" href="#" role="button"><span data-dcnode-id="6182" instrument_node="">25</span></a><span data-dcnode-id="6180" instrument_node="">). The National Institute of Health Sciences conducted a first national field survey in 230 houses in 1996 and found an arithmetic mean concentration of 78 μg/m</span><sup data-dcnode-id="6178"><span data-dcnode-id="6179" instrument_node="">3</span></sup><span data-dcnode-id="6177" instrument_node=""> (range 5–600 μg/m</span><sup data-dcnode-id="6175"><span data-dcnode-id="6176" instrument_node="">3</span></sup><span data-dcnode-id="6174" instrument_node="">). During the last survey conducted in 2005 (n = 1181 homes), the arithmetic mean decreased to 31 μg/m</span><sup data-dcnode-id="6172"><span data-dcnode-id="6173" instrument_node="">3</span></sup><span data-dcnode-id="6171" instrument_node=""> (maximum concentration 300 μg/m</span><sup data-dcnode-id="6169"><span data-dcnode-id="6170" instrument_node="">3</span></sup><span data-dcnode-id="6168" instrument_node="">). In between, the Japanese authorities amended the national building codes and instituted restrictions on the use of formaldehyde-emitting materials for interior finishing.</span></p><p data-dcnode-id="6153"><span data-dcnode-id="6166" instrument_node="">In China, a large number of monitoring results are available for new homes, since it is mandatory to check whether the maximum allowable formaldehyde concentration in residential buildings (100 μg/m</span><sup data-dcnode-id="6164"><span data-dcnode-id="6165" instrument_node="">3</span></sup><span data-dcnode-id="6163" instrument_node="">) has been exceeded (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r26" data-dcnode-id="6161" href="#" role="button"><span data-dcnode-id="6162" instrument_node="">26</span></a><span data-dcnode-id="6160" instrument_node="">). The mean concentration in approximately 6000 recently refurbished dwellings in urban areas was 238 μg/m</span><sup data-dcnode-id="6158"><span data-dcnode-id="6159" instrument_node="">3</span></sup><span data-dcnode-id="6157" instrument_node=""> (remodelled after one year or less; measurements conducted between 1999 and 2006; mean outdoor level around 12 μg/m</span><sup data-dcnode-id="6155"><span data-dcnode-id="6156" instrument_node="">3</span></sup><span data-dcnode-id="6154" instrument_node="">).</span></p><p data-dcnode-id="6151"><span data-dcnode-id="6152" instrument_node="">Formaldehyde concentrations in dwellings vary according to:</span></p><ul data-dcnode-id="6123"><li class="half_rhythm" data-dcnode-id="6145"><div data-dcnode-id="6146"><span data-dcnode-id="6150" instrument_node="">the age of the building, since the release of formaldehyde decreases with time (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r11" data-dcnode-id="6148" href="#" role="button"><span data-dcnode-id="6149" instrument_node="">11</span></a><span data-dcnode-id="6147" instrument_node="">);</span></div></li><li class="half_rhythm" data-dcnode-id="6139"><div data-dcnode-id="6140"><span data-dcnode-id="6144" instrument_node="">temperature and relative humidity (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r8" data-dcnode-id="6142" href="#" role="button"><span data-dcnode-id="6143" instrument_node="">8</span></a><span data-dcnode-id="6141" instrument_node="">);</span></div></li><li class="half_rhythm" data-dcnode-id="6130"><div data-dcnode-id="6131"><span data-dcnode-id="6138" instrument_node="">the air exchange rate (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r11" data-dcnode-id="6136" href="#" role="button"><span data-dcnode-id="6137" instrument_node="">11</span></a><span data-dcnode-id="6135" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r15" data-dcnode-id="6133" href="#" role="button"><span data-dcnode-id="6134" instrument_node="">15</span></a><span data-dcnode-id="6132" instrument_node="">); and</span></div></li><li class="half_rhythm" data-dcnode-id="6124"><div data-dcnode-id="6125"><span data-dcnode-id="6129" instrument_node="">the season (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r11" data-dcnode-id="6127" href="#" role="button"><span data-dcnode-id="6128" instrument_node="">11</span></a><span data-dcnode-id="6126" instrument_node="">).</span></div></li></ul><p data-dcnode-id="6115"><span data-dcnode-id="6122" instrument_node="">Moreover, indoor concentrations can reach more than 200 μg/m</span><sup data-dcnode-id="6120"><span data-dcnode-id="6121" instrument_node="">3</span></sup><span data-dcnode-id="6119" instrument_node=""> close to somebody who is smoking in a room (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r27" data-dcnode-id="6117" href="#" role="button"><span data-dcnode-id="6118" instrument_node="">27</span></a><span data-dcnode-id="6116" instrument_node="">). There are many fewer data on offices compared to the residential environment.</span></p><p data-dcnode-id="6107"><span data-dcnode-id="6114" instrument_node="">A large monitoring campaign carried out in Germany between 2001 and 2004 in 419 rooms found a median indoor formaldehyde concentration of 28 μg/m</span><sup data-dcnode-id="6112"><span data-dcnode-id="6113" instrument_node="">3</span></sup><span data-dcnode-id="6111" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r28" data-dcnode-id="6109" href="#" role="button"><span data-dcnode-id="6110" instrument_node="">28</span></a><span data-dcnode-id="6108" instrument_node="">).</span></p><p data-dcnode-id="6099"><span data-dcnode-id="6106" instrument_node="">Over the period 2004–2007, the EU's Joint Research Centre in Ispra, Italy monitored priority pollutants, including formaldehyde, in European public buildings and environments where children frequently stay, such as schools and kindergartens (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r29" data-dcnode-id="6104" href="#" role="button"><span data-dcnode-id="6105" instrument_node="">29</span></a><span data-dcnode-id="6103" instrument_node="">). Formaldehyde concentrations in offices in public buildings (n = 94) varied from 3 to 33 μg/m</span><sup data-dcnode-id="6101"><span data-dcnode-id="6102" instrument_node="">3</span></sup><span data-dcnode-id="6100" instrument_node="">.</span></p><p data-dcnode-id="6091"><span data-dcnode-id="6098" instrument_node="">Formaldehyde concentrations were measured between 2001 and 2006 in office buildings in southern Finland (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r30" data-dcnode-id="6096" href="#" role="button"><span data-dcnode-id="6097" instrument_node="">30</span></a><span data-dcnode-id="6095" instrument_node="">). The occupants had complained of symptoms, but inspection by indoor air experts had not revealed any sources of pollutants. The mean formaldehyde concentration and maximum value were found to be 11 and 44 μg/m</span><sup data-dcnode-id="6093"><span data-dcnode-id="6094" instrument_node="">3</span></sup><span data-dcnode-id="6092" instrument_node="">, respectively.</span></p><p data-dcnode-id="6083"><span data-dcnode-id="6090" instrument_node="">In the United States, within the framework of the Building Assessment Survey and Evaluation (BASE) study (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r31" data-dcnode-id="6088" href="#" role="button"><span data-dcnode-id="6089" instrument_node="">31</span></a><span data-dcnode-id="6087" instrument_node="">), 100 office buildings were investigated between 1994 and 1998. Formaldehyde was detected in all the buildings. The 50th and 95th percentiles were 15 and 32 μg/m</span><sup data-dcnode-id="6085"><span data-dcnode-id="6086" instrument_node="">3</span></sup><span data-dcnode-id="6084" instrument_node="">, respectively.</span></p><p data-dcnode-id="6066"><span data-dcnode-id="6082" instrument_node="">In China, the mean formaldehyde concentration in 351 offices located all over the country (data from 1996–2005) was of the same order of magnitude as in recently refurbished dwellings, i.e. 256 μg/m</span><sup data-dcnode-id="6080"><span data-dcnode-id="6081" instrument_node="">3</span></sup><span data-dcnode-id="6079" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r26" data-dcnode-id="6077" href="#" role="button"><span data-dcnode-id="6078" instrument_node="">26</span></a><span data-dcnode-id="6076" instrument_node="">). In Hong Kong SAR, formaldehyde was measured in 422 air-conditioned offices; the geometric mean was found to be equal to 32 μg/m</span><sup data-dcnode-id="6074"><span data-dcnode-id="6075" instrument_node="">3</span></sup><span data-dcnode-id="6073" instrument_node=""> (± 2.7 μg/m</span><sup data-dcnode-id="6071"><span data-dcnode-id="6072" instrument_node="">3</span></sup><span data-dcnode-id="6070" instrument_node="">) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r32" data-dcnode-id="6068" href="#" role="button"><span data-dcnode-id="6069" instrument_node="">32</span></a><span data-dcnode-id="6067" instrument_node="">).</span></p><p data-dcnode-id="6046"><span data-dcnode-id="6065" instrument_node="">In France, in the frame of the International Study on Asthma and Allergies in Childhood (ISAAC), formaldehyde was measured in 1999 in 401 classrooms in 108 schools located in 6 cities (Strasbourg, Créteil, Reims, Marseille, Bordeaux and Clermont-Ferrand) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r33" data-dcnode-id="6063" href="#" role="button"><span data-dcnode-id="6064" instrument_node="">33</span></a><span data-dcnode-id="6062" instrument_node="">). Concentrations varied from 4 to 100 μg/m</span><sup data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">3</span></sup><span data-dcnode-id="6059" instrument_node=""> with a mean value of 27 μg/m</span><sup data-dcnode-id="6057"><span data-dcnode-id="6058" instrument_node="">3</span></sup><span data-dcnode-id="6056" instrument_node="">. In 50 Parisian kindergartens studied between 1999 and 2001, both in winter and in summer (n = 222), indoor formaldehyde concentrations ranged from 1.5 to 56 μg/m</span><sup data-dcnode-id="6054"><span data-dcnode-id="6055" instrument_node="">3</span></sup><span data-dcnode-id="6053" instrument_node=""> with a median value of 14 μg/m</span><sup data-dcnode-id="6051"><span data-dcnode-id="6052" instrument_node="">3</span></sup><span data-dcnode-id="6050" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r34" data-dcnode-id="6048" href="#" role="button"><span data-dcnode-id="6049" instrument_node="">34</span></a><span data-dcnode-id="6047" instrument_node="">).</span></p><p data-dcnode-id="6038"><span data-dcnode-id="6045" instrument_node="">In Germany, the indoor air quality was evaluated in 92 classrooms in the winter of 2004/2005 and in 75 classrooms in the summer of 2005 in southern Bavaria. Indoor formaldehyde concentrations ranged from 3.1 to 46.1 μg/m</span><sup data-dcnode-id="6043"><span data-dcnode-id="6044" instrument_node="">3</span></sup><span data-dcnode-id="6042" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r35" data-dcnode-id="6040" href="#" role="button"><span data-dcnode-id="6041" instrument_node="">35</span></a><span data-dcnode-id="6039" instrument_node="">).</span></p><p data-dcnode-id="6027"><span data-dcnode-id="6037" instrument_node="">Formaldehyde concentrations measured in European kindergartens by the EU's Joint Research Centre between 2004 and 2007 (n = 57) varied from 1.5 to 50 μg/m</span><sup data-dcnode-id="6035"><span data-dcnode-id="6036" instrument_node="">3</span></sup><span data-dcnode-id="6034" instrument_node="">, with an arithmetic mean of 17.4 μg/m</span><sup data-dcnode-id="6032"><span data-dcnode-id="6033" instrument_node="">3</span></sup><span data-dcnode-id="6031" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r29" data-dcnode-id="6029" href="#" role="button"><span data-dcnode-id="6030" instrument_node="">29</span></a><span data-dcnode-id="6028" instrument_node="">).</span></p><p data-dcnode-id="6016"><span data-dcnode-id="6026" instrument_node="">In Japan, formaldehyde concentrations measured in 50 schools in 2000 were around 14 μg/m</span><sup data-dcnode-id="6024"><span data-dcnode-id="6025" instrument_node="">3</span></sup><span data-dcnode-id="6023" instrument_node=""> in winter and 30 μg/m</span><sup data-dcnode-id="6021"><span data-dcnode-id="6022" instrument_node="">3</span></sup><span data-dcnode-id="6020" instrument_node=""> in summer (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r36" data-dcnode-id="6018" href="#" role="button"><span data-dcnode-id="6019" instrument_node="">36</span></a><span data-dcnode-id="6017" instrument_node="">).</span></p><p data-dcnode-id="5999"><span data-dcnode-id="6015" instrument_node="">Outdoor air does not contribute to indoor pollution (or the contribution is minor) since ambient levels are generally rather low. Mean ambient air background concentrations remain low compared to those indoors, typically around 1–4 μg/m</span><sup data-dcnode-id="6013"><span data-dcnode-id="6014" instrument_node="">3</span></sup><span data-dcnode-id="6012" instrument_node="">. Data from the HEXPOC report (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r16" data-dcnode-id="6010" href="#" role="button"><span data-dcnode-id="6011" instrument_node="">16</span></a><span data-dcnode-id="6009" instrument_node="">), collected from Brazil, Canada, Germany, Italy, Mexico, the Netherlands and the United States, provide ambient concentrations of 1.5–16.4 μg/m</span><sup data-dcnode-id="6007"><span data-dcnode-id="6008" instrument_node="">3</span></sup><span data-dcnode-id="6006" instrument_node=""> with a mean value of 7.2 μg/m</span><sup data-dcnode-id="6004"><span data-dcnode-id="6005" instrument_node="">3</span></sup><span data-dcnode-id="6003" instrument_node=""> (SD = 5.1 μg/m</span><sup data-dcnode-id="6001"><span data-dcnode-id="6002" instrument_node="">3</span></sup><span data-dcnode-id="6000" instrument_node="">). Consequently, the indoor : outdoor ratio is always far above 1. Formaldehyde can be qualified as a very specific indoor pollutant.</span></p></div><div data-dcnode-id="5841" id="ch3.s5"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="5995"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="5996" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="5997" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="5993" id="_ch3_s5_"><span data-dcnode-id="5994" instrument_node="">Kinetics and metabolism</span></h2><div data-dcnode-id="5944" id="ch3.s6"><h3 data-dcnode-id="5991"><span data-dcnode-id="5992" instrument_node="">Absorption</span></h3><p data-dcnode-id="5959"><span data-dcnode-id="5990" instrument_node="">Owing to its solubility in water, formaldehyde is rapidly absorbed in the respiratory and gastrointestinal tracts and metabolized. More than 90% of inhaled formaldehyde gas is absorbed and rapidly metabolized to formate in the upper respiratory tract (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r37" data-dcnode-id="5988" href="#" role="button"><span data-dcnode-id="5989" instrument_node="">37</span></a><span data-dcnode-id="5987" instrument_node="">). In rats, it is absorbed in the nasal passages (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r38" data-dcnode-id="5985" href="#" role="button"><span data-dcnode-id="5986" instrument_node="">38</span></a><span data-dcnode-id="5984" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r39" data-dcnode-id="5982" href="#" role="button"><span data-dcnode-id="5983" instrument_node="">39</span></a><span data-dcnode-id="5981" instrument_node="">); in primates, some absorption takes place in the nasal cavity as well as in the nasopharynx, trachea and bronchi (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r40" data-dcnode-id="5979" href="#" role="button"><span data-dcnode-id="5980" instrument_node="">40</span></a><span data-dcnode-id="5978" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r41" data-dcnode-id="5976" href="#" role="button"><span data-dcnode-id="5977" instrument_node="">41</span></a><span data-dcnode-id="5975" instrument_node="">). The mucociliary apparatus is an important defence system in the respiratory tract and may provide protection of the underlying epithelium from gases and vapours (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r42" data-dcnode-id="5973" href="#" role="button"><span data-dcnode-id="5974" instrument_node="">42</span></a><span data-dcnode-id="5972" instrument_node="">). Given the solubility of formaldehyde in mucus (water) and estimates of total mucus flow, as much as 22–42% of inhaled formaldehyde may be removed by mucus flow (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r37" data-dcnode-id="5970" href="#" role="button"><span data-dcnode-id="5971" instrument_node="">37</span></a><span data-dcnode-id="5969" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r43" data-dcnode-id="5967" href="#" role="button"><span data-dcnode-id="5968" instrument_node="">43</span></a><span data-dcnode-id="5966" instrument_node="">). It has been shown that when formaldehyde is mixed with particles, more of it is retained by the respiratory tract than when it is inhaled alone. This suggests that some particles can bind with gases and increase the retained dose of a gas (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r44" data-dcnode-id="5964" href="#" role="button"><span data-dcnode-id="5965" instrument_node="">44</span></a><span data-dcnode-id="5963" instrument_node="">). However, some estimates show that the deposited dose of formaldehyde in the particle phase is substantially smaller than the dose from the vapour phase (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r45" data-dcnode-id="5961" href="#" role="button"><span data-dcnode-id="5962" instrument_node="">45</span></a><span data-dcnode-id="5960" instrument_node="">).</span></p><p data-dcnode-id="5945"><span data-dcnode-id="5958" instrument_node="">Formaldehyde is absorbed rapidly and almost completely from the rodent intestinal tract (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r39" data-dcnode-id="5956" href="#" role="button"><span data-dcnode-id="5957" instrument_node="">39</span></a><span data-dcnode-id="5955" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r46" data-dcnode-id="5953" href="#" role="button"><span data-dcnode-id="5954" instrument_node="">46</span></a><span data-dcnode-id="5952" instrument_node="">). Although formaldehyde or its metabolites can penetrate human skin – it induces allergic contact dermatitis in humans – dermal absorption appears to be very slight (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r47" data-dcnode-id="5950" href="#" role="button"><span data-dcnode-id="5951" instrument_node="">47</span></a><span data-dcnode-id="5949" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r48" data-dcnode-id="5947" href="#" role="button"><span data-dcnode-id="5948" instrument_node="">48</span></a><span data-dcnode-id="5946" instrument_node="">).</span></p></div><div data-dcnode-id="5919" id="ch3.s7"><h3 data-dcnode-id="5942"><span data-dcnode-id="5943" instrument_node="">Endogenous sources of formaldehyde</span></h3><p data-dcnode-id="5937"><span data-dcnode-id="5941" instrument_node="">In humans, as in other animals, formaldehyde is an essential metabolic intermediate in all cells. It is produced endogenously from serine, glycine, methionine and choline, and it is generated in the demethylation of N-, O- and S-methyl compounds. It is an essential intermediate in the biosynthesis of purines, thymidine and certain amino acids (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r49" data-dcnode-id="5939" href="#" role="button"><span data-dcnode-id="5940" instrument_node="">49</span></a><span data-dcnode-id="5938" instrument_node="">).</span></p><p data-dcnode-id="5920"><span data-dcnode-id="5936" instrument_node="">Owing to its high reactivity at the site of contact and rapid metabolism, exposure of humans, monkeys or rats to formaldehyde by inhalation does not alter the concentration of formaldehyde in the blood from that endogenously present, which is about 2–3 mg/l for each of the three species. This concentration represents the total concentration of both free and reversibly bound endogenous formaldehyde in the blood. The absence of an increase is explained by the fact that formaldehyde reacts rapidly at the site of contact and is swiftly metabolized by human erythrocytes, as described below. From a mathematical model describing the absorption and removal of inhaled formaldehyde in the human nose, it was predicted that exposures in the range of 0.125–12.5 mg/m</span><sup data-dcnode-id="5934"><span data-dcnode-id="5935" instrument_node="">3</span></sup><span data-dcnode-id="5933" instrument_node=""> only cause extremely small increases in formaldehyde concentrations compared to the pre-exposure concentrations (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r50" data-dcnode-id="5931" href="#" role="button"><span data-dcnode-id="5932" instrument_node="">50</span></a><span data-dcnode-id="5930" instrument_node="">). Intravenous administration of formaldehyde to dogs, cats and monkeys also does not result in accumulation of formaldehyde in the blood, largely owing to its rapid metabolism (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="5928" href="#" role="button"><span data-dcnode-id="5929" instrument_node="">1</span></a><span data-dcnode-id="5927" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r39" data-dcnode-id="5925" href="#" role="button"><span data-dcnode-id="5926" instrument_node="">39</span></a><span data-dcnode-id="5924" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r46" data-dcnode-id="5922" href="#" role="button"><span data-dcnode-id="5923" instrument_node="">46</span></a><span data-dcnode-id="5921" instrument_node="">).</span></p></div><div data-dcnode-id="5903" id="ch3.s8"><h3 data-dcnode-id="5917"><span data-dcnode-id="5918" instrument_node="">Distribution</span></h3><p data-dcnode-id="5909"><span data-dcnode-id="5916" instrument_node="">Following a 6-hour inhalation exposure of rats to formaldehyde, about 40% of the inhaled compound was eliminated as expired carbon dioxide over a 70-hour period; 17% was excreted in the urine, 5% was eliminated in the faeces and 35–39% remained in the tissues and carcass, indicating that absorbed formaldehyde and its metabolites are rapidly removed by the mucosal blood supply and distributed throughout the body (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r39" data-dcnode-id="5914" href="#" role="button"><span data-dcnode-id="5915" instrument_node="">39</span></a><span data-dcnode-id="5913" instrument_node="">). In dogs, orally administered formaldehyde results in a rapid increase in formate levels in the blood. In rats, oral exposure results in about 40% being eliminated as carbon dioxide within 12 hours, 10% being excreted in the urine and 1% being excreted in the faeces (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r51" data-dcnode-id="5911" href="#" role="button"><span data-dcnode-id="5912" instrument_node="">51</span></a><span data-dcnode-id="5910" instrument_node="">).</span></p><p data-dcnode-id="5904"><span data-dcnode-id="5908" instrument_node="">Rodents excreted about 6.6% of the dermally applied dose in the urine over 72 hours, while 21–28% was collected in air traps, likely due to the evaporation of formaldehyde from the skin (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r52" data-dcnode-id="5906" href="#" role="button"><span data-dcnode-id="5907" instrument_node="">52</span></a><span data-dcnode-id="5905" instrument_node="">). Approximately 22–28% of the compound or its metabolites remained in the body, including the blood and skin at the site of application. In monkeys, less than 1% of dermally applied dose was excreted or exhaled, in contrast to rodents in which nearly 10% was eliminated by these routes. Coupled with the observation of lower blood levels in monkeys than in rodents, the results suggest that the skin of monkeys may be less permeable to aqueous formaldehyde than that of rodents.</span></p></div><div data-dcnode-id="5876" id="ch3.s9"><h3 data-dcnode-id="5901"><span data-dcnode-id="5902" instrument_node="">Metabolism and elimination</span></h3><p data-dcnode-id="5890"><span data-dcnode-id="5900" instrument_node="">Formaldehyde reacts rapidly at the site of contact and is swiftly metabolized in humans by erythrocytes, which contain the enzymes formaldehyde dehydrogenase and aldehyde dehydrogenase (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r53" data-dcnode-id="5898" href="#" role="button"><span data-dcnode-id="5899" instrument_node="">53</span></a><span data-dcnode-id="5897" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r56" data-dcnode-id="5895" href="#" role="button"><span data-dcnode-id="5896" instrument_node="">56</span></a><span data-dcnode-id="5894" instrument_node="">). Formaldehyde reacts virtually instantaneously with primary and secondary amines, thiols, hydroxyls and amides to form methylol derivatives. Formaldehyde acts as an electrophile and can react with macromolecules such as DNA, RNA and protein to form reversible adducts or irreversible cross-links (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="5892" href="#" role="button"><span data-dcnode-id="5893" instrument_node="">1</span></a><span data-dcnode-id="5891" instrument_node="">).</span></p><p data-dcnode-id="5885"><span data-dcnode-id="5889" instrument_node="">Formate, the metabolic product of formaldehyde, is incorporated in normal metabolic pathways or further oxidized to carbon dioxide. This becomes important when performing fate and transport studies with radio-labelled formaldehyde, as the label appears in all tissues due to the one-carbon pool. Formaldehyde disappears from the plasma with a half-time of about 1–1½ minutes, most of it being converted to carbon dioxide and exhaled via the lungs. Smaller amounts are excreted in the urine as formate salts and several other metabolites (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r47" data-dcnode-id="5887" href="#" role="button"><span data-dcnode-id="5888" instrument_node="">47</span></a><span data-dcnode-id="5886" instrument_node="">).</span></p><p data-dcnode-id="5877"><span data-dcnode-id="5884" instrument_node="">The primary metabolism system for formaldehyde involves an initial spontaneous reaction with glutathione to form S-hydroxymethylglutathione, followed by reaction facilitated by alcohol dehydrogenase to convert the intermediate to S-formylglutathione (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r57" data-dcnode-id="5882" href="#" role="button"><span data-dcnode-id="5883" instrument_node="">57</span></a><span data-dcnode-id="5881" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r58" data-dcnode-id="5879" href="#" role="button"><span data-dcnode-id="5880" instrument_node="">58</span></a><span data-dcnode-id="5878" instrument_node="">). This intermediate is then further metabolized by S-formylglutathione hydrolase to yield formate and reduced glutathione.</span></p></div><div data-dcnode-id="5842" id="ch3.s10"><h3 data-dcnode-id="5874"><span data-dcnode-id="5875" instrument_node="">Biomarkers of exposure</span></h3><p data-dcnode-id="5866"><span data-dcnode-id="5873" instrument_node="">To determine whether formate is a useful biomarker for human exposure to formaldehyde, urine was examined in veterinary medical students exposed to low concentrations of formaldehyde (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r59" data-dcnode-id="5871" href="#" role="button"><span data-dcnode-id="5872" instrument_node="">59</span></a><span data-dcnode-id="5870" instrument_node="">). Exposed students (formaldehyde air concentration &lt; 0.61 mg/m</span><sup data-dcnode-id="5868"><span data-dcnode-id="5869" instrument_node="">3</span></sup><span data-dcnode-id="5867" instrument_node=""> over a 3-week period) were compared to control subjects. The average baseline level of formate in the urine of 35 unexposed subjects was 12.5 mg/l, but this varied considerably both within and among subjects (range 2.4–28.4 mg/l). No significant changes in concentration were detected. Thus formate in urine does not appear to be a useful biomarker for human exposure, especially at low exposure concentrations.</span></p><p data-dcnode-id="5843"><span data-dcnode-id="5865" instrument_node="">Inhalation of formaldehyde leads to the formation of DNA–protein crosslinks in cells at the site of contact, particularly in the nasal respiratory mucosa of rats and monkeys. The formation of these cross-links is a sublinear function of the formaldehyde concentration in inhaled air from 0.86 to 18.4 mg/m</span><sup data-dcnode-id="5863"><span data-dcnode-id="5864" instrument_node="">3</span></sup><span data-dcnode-id="5862" instrument_node="">, and the yield of DNA–protein cross-links at a given inhaled concentration is approximately an order of magnitude lower in monkeys than in rats. There is no detectable accumulation of DNA–protein cross-links during repeated exposure. Application of a pharmacokinetic model to the data obtained in rats and monkeys indicates that the concentration of DNA–protein cross-links in the human nasal mucosa would be lower than those in rats and monkeys (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="5860" href="#" role="button"><span data-dcnode-id="5861" instrument_node="">1</span></a><span data-dcnode-id="5859" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r41" data-dcnode-id="5857" href="#" role="button"><span data-dcnode-id="5858" instrument_node="">41</span></a><span data-dcnode-id="5856" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r60" data-dcnode-id="5854" href="#" role="button"><span data-dcnode-id="5855" instrument_node="">60</span></a><span data-dcnode-id="5853" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r61" data-dcnode-id="5851" href="#" role="button"><span data-dcnode-id="5852" instrument_node="">61</span></a><span data-dcnode-id="5850" instrument_node="">). No data are available on DNA–protein cross-links in humans (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="5848" href="#" role="button"><span data-dcnode-id="5849" instrument_node="">1</span></a><span data-dcnode-id="5847" instrument_node="">). Carraro et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r62" data-dcnode-id="5845" href="#" role="button"><span data-dcnode-id="5846" instrument_node="">62</span></a><span data-dcnode-id="5844" instrument_node="">) have suggested that an immunological assay that measures the humoral immune response of adducts of formaldehyde and human serum albumin could be used as a biomarker of environmental exposure to formaldehyde, but such a marker has not been developed.</span></p></div></div><div data-dcnode-id="4148" id="ch3.s11"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="5838"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="5839" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="5840" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="5836" id="_ch3_s11_"><span data-dcnode-id="5837" instrument_node="">Health effects</span></h2><div data-dcnode-id="5792" id="ch3.s12"><h3 data-dcnode-id="5834"><span data-dcnode-id="5835" instrument_node="">Identification of studies</span></h3><p data-dcnode-id="5820"><span data-dcnode-id="5833" instrument_node="">The literature for the cancer part was indentified in PubMed with search terms that included “formaldehyde AND DNA-protein crosslink/crosslinks”, “formaldehyde AND genotoxic/genotoxicity AND blood AND lymphocyte”, “lymphatic AND tissue AND nose AND review”, “micronucleus AND test AND review”, “formaldehyde AND cancer AND meta-analysis”, “formaldehyde AND cancer AND humans”, “unit risk AND formaldehyde”, “Epstein-Barr AND nasopharyngeal cancer AND review”, “Hauptmann M AND nasopharyngeal carcinoma”, “Hauptmann M AND silver smithing”, “silver smithing AND nasopharyngeal carcinoma”, “silver smithing AND cancer”, “acid AND nasopharyngeal carcinoma AND review”, “nickel AND nasopharyngeal carcinoma”, “unit risk AND cancer AND review” and “Zhang L AND formaldehyde”. References were also obtained from IARC (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="5831" href="#" role="button"><span data-dcnode-id="5832" instrument_node="">1</span></a><span data-dcnode-id="5830" instrument_node="">), Bosetti et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r68" data-dcnode-id="5828" href="#" role="button"><span data-dcnode-id="5829" instrument_node="">68</span></a><span data-dcnode-id="5827" instrument_node="">) and the European Commission (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r64" data-dcnode-id="5825" href="#" role="button"><span data-dcnode-id="5826" instrument_node="">64</span></a><span data-dcnode-id="5824" instrument_node="">). Approximately 200 articles were deemed relevant and read. Of these, more than 120 were evaluated in detail; the relevance of these articles is discussed by Nielsen &amp; Wolkoff (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r65" data-dcnode-id="5822" href="#" role="button"><span data-dcnode-id="5823" instrument_node="">65</span></a><span data-dcnode-id="5821" instrument_node="">). However, articles were only included here if they were used directly in the derivation of the WHO indoor air guidelines.</span></p><p data-dcnode-id="5818"><span data-dcnode-id="5819" instrument_node="">For non-cancer effects, publications from the period 1997–2009 were searched with special emphasis on human effects. Except in special cases, animal and in vitro studies were excluded owing to the huge amount of human data. Formaldehyde was searched in combination with the following terms: allergy, asthma(tics), airway (irritation), bronchoconstriction, children, eye (irritation), inflammation, homes, IgE, (nasal) irritation, kindergartens, lung effects, lung function, offices, odour, schools, sensory irritation, sick-building syndrome, sensitization and trigeminal stimulation.</span></p><p data-dcnode-id="5798"><span data-dcnode-id="5817" instrument_node="">Eczema was not included except if retrieved in the above-mentioned searches. In addition to databases such as PubMed and Google Scholar, recent comprehensive reviews were considered (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r66" data-dcnode-id="5815" href="#" role="button"><span data-dcnode-id="5816" instrument_node="">66</span></a><span data-dcnode-id="5814" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r68" data-dcnode-id="5812" href="#" role="button"><span data-dcnode-id="5813" instrument_node="">68</span></a><span data-dcnode-id="5811" instrument_node="">), including Gilbert (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r69" data-dcnode-id="5809" href="#" role="button"><span data-dcnode-id="5810" instrument_node="">69</span></a><span data-dcnode-id="5808" instrument_node="">) and international reports (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="5806" href="#" role="button"><span data-dcnode-id="5807" instrument_node="">1</span></a><span data-dcnode-id="5805" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r17" data-dcnode-id="5803" href="#" role="button"><span data-dcnode-id="5804" instrument_node="">17</span></a><span data-dcnode-id="5802" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r64" data-dcnode-id="5800" href="#" role="button"><span data-dcnode-id="5801" instrument_node="">64</span></a><span data-dcnode-id="5799" instrument_node="">).</span></p><p data-dcnode-id="5793"><span data-dcnode-id="5797" instrument_node="">Of the 170 papers identified (and listed by Wolkoff &amp; Nielsen (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r70" data-dcnode-id="5795" href="#" role="button"><span data-dcnode-id="5796" instrument_node="">70</span></a><span data-dcnode-id="5794" instrument_node="">)), 90 were included in the discussion presented below addressing human exposure and epidemiological issues (65 studies), children (11 studies), animal studies (8 studies), cell studies (3 studies) and dust (4 studies).</span></p></div><div data-dcnode-id="5102" id="ch3.s13"><h3 data-dcnode-id="5790"><span data-dcnode-id="5791" instrument_node="">Respiratory effects of formaldehyde</span></h3><p data-dcnode-id="5776"><span data-dcnode-id="5789" instrument_node="">Nasal retention of formaldehyde in the moist layers covering the nasal mucosa exceeds 90–95%. For example, a maximum of 5% formaldehyde reaches the lower airways in dogs (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r71" data-dcnode-id="5787" href="#" role="button"><span data-dcnode-id="5788" instrument_node="">71</span></a><span data-dcnode-id="5786" instrument_node="">). The high retention is also deduced from a mouse bioassay, because only sensory irritation of the upper airways has been observed below 5 mg/m</span><sup data-dcnode-id="5784"><span data-dcnode-id="5785" instrument_node="">3</span></sup><span data-dcnode-id="5783" instrument_node=""> formaldehyde (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r72" data-dcnode-id="5781" href="#" role="button"><span data-dcnode-id="5782" instrument_node="">72</span></a><span data-dcnode-id="5780" instrument_node="">). Recent computational fluid dynamic calculations at boundary conditions of fast formaldehyde uptake indicate similar total nasal extraction in adults and children (on average 90%), and thus a limited amount of formaldehyde may traverse the nasal cavity (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r73" data-dcnode-id="5778" href="#" role="button"><span data-dcnode-id="5779" instrument_node="">73</span></a><span data-dcnode-id="5777" instrument_node="">).</span></p><p data-dcnode-id="5762"><span data-dcnode-id="5775" instrument_node="">Human exhaled air contains formaldehyde in concentrations in the order of 0.001–0.01 mg/m</span><sup data-dcnode-id="5773"><span data-dcnode-id="5774" instrument_node="">3</span></sup><span data-dcnode-id="5772" instrument_node="">, with an average value of about 0.005 mg/m</span><sup data-dcnode-id="5770"><span data-dcnode-id="5771" instrument_node="">3</span></sup><span data-dcnode-id="5769" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r74" data-dcnode-id="5767" href="#" role="button"><span data-dcnode-id="5768" instrument_node="">74</span></a><span data-dcnode-id="5766" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r76" data-dcnode-id="5764" href="#" role="button"><span data-dcnode-id="5765" instrument_node="">76</span></a><span data-dcnode-id="5763" instrument_node="">).</span></p><div data-dcnode-id="5434" id="ch3.s14"><h4 data-dcnode-id="5760"><span data-dcnode-id="5761" instrument_node="">Effects after acute and short-term exposure to formaldehyde at indoor levels (non-cancer effects)</span></h4><p data-dcnode-id="5734"><span data-dcnode-id="5759" instrument_node="">The effects include odour (which may cause discomfort), sensory irritation to the eyes and upper airways, lung effects (asthma and allergy) and finally eczema. These effects have been discussed in comprehensive reviews during the last decade (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r64" data-dcnode-id="5757" href="#" role="button"><span data-dcnode-id="5758" instrument_node="">64</span></a><span data-dcnode-id="5756" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r66" data-dcnode-id="5754" href="#" role="button"><span data-dcnode-id="5755" instrument_node="">66</span></a><span data-dcnode-id="5753" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r69" data-dcnode-id="5751" href="#" role="button"><span data-dcnode-id="5752" instrument_node="">69</span></a><span data-dcnode-id="5750" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r77" data-dcnode-id="5748" href="#" role="button"><span data-dcnode-id="5749" instrument_node="">77</span></a><span data-dcnode-id="5747" instrument_node="">), including international reports (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="5745" href="#" role="button"><span data-dcnode-id="5746" instrument_node="">1</span></a><span data-dcnode-id="5744" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r17" data-dcnode-id="5742" href="#" role="button"><span data-dcnode-id="5743" instrument_node="">17</span></a><span data-dcnode-id="5741" instrument_node="">). Selected key studies from the last decade about exposure–response relationships are listed in </span><a class="figpopup" data-dcnode-id="5739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t1/%3Freport%3Dobjectonly" rid-figpopup="figch3t1" rid-ob="figobch3t1" target="object"><span data-dcnode-id="5740" instrument_node="">Table 3.1</span></a><span data-dcnode-id="5738" instrument_node="">. They represent controlled, usually double-blind exposure studies, including both sexes, of which some were tested with both questionnaires and objective methods. In addition, </span><a class="figpopup" data-dcnode-id="5736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t1/%3Freport%3Dobjectonly" rid-figpopup="figch3t1" rid-ob="figobch3t1" target="object"><span data-dcnode-id="5737" instrument_node="">Table 3.1</span></a><span data-dcnode-id="5735" instrument_node=""> lists a number of epidemiological studies with lung function testing.</span></p><div class="iconblock whole_rhythm clearfix ten_col table-wrap" data-dcnode-id="5725" id="figch3t1"><a class="img_link icnblk_img figpopup" data-dcnode-id="5732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t1/%3Freport%3Dobjectonly" rid-figpopup="figch3t1" rid-ob="figobch3t1" target="object" title="Table 3.1"><img alt="Table 3.1. Effects on the airways in humans after acute and short-term exposure to formaldehyde." class="small-thumb" data-dcnode-id="5733" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t1/%3Freport%3Dthumb&amp;raw" src-large="/books/NBK138711/table/ch3.t1/?report=previmg"></a><div class="icnblk_cntnt" data-dcnode-id="5726"><h4 data-dcnode-id="5729" id="ch3.t1"><a data-dcnode-id="5730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t1/%3Freport%3Dobjectonly" rid-ob="figobch3t1" target="object"><span data-dcnode-id="5731" instrument_node="">Table 3.1</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">Effects on the airways in humans after acute and short-term exposure to formaldehyde. </span></p></div></div><p data-dcnode-id="5681"><b data-dcnode-id="5722"><i data-dcnode-id="5723"><span data-dcnode-id="5724" instrument_node="">Odour.</span></i></b><span data-dcnode-id="5721" instrument_node=""> A large number of odour thresholds have been reported for formaldehyde, varying from 0.05 to 0.5 mg/m</span><sup data-dcnode-id="5719"><span data-dcnode-id="5720" instrument_node="">3</span></sup><span data-dcnode-id="5718" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r90" data-dcnode-id="5716" href="#" role="button"><span data-dcnode-id="5717" instrument_node="">90</span></a><span data-dcnode-id="5715" instrument_node="">), some of which are listed in </span><a class="figpopup" data-dcnode-id="5713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t2/%3Freport%3Dobjectonly" rid-figpopup="figch3t2" rid-ob="figobch3t2" target="object"><span data-dcnode-id="5714" instrument_node="">Table 3.2</span></a><span data-dcnode-id="5712" instrument_node="">. Two recent studies, carried out under controlled olfactometric conditions, indicate that the odour threshold lies between 0.2 and 0.4 mg/m</span><sup data-dcnode-id="5710"><span data-dcnode-id="5711" instrument_node="">3</span></sup><span data-dcnode-id="5709" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r79" data-dcnode-id="5707" href="#" role="button"><span data-dcnode-id="5708" instrument_node="">79</span></a><span data-dcnode-id="5706" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r91" data-dcnode-id="5704" href="#" role="button"><span data-dcnode-id="5705" instrument_node="">91</span></a><span data-dcnode-id="5703" instrument_node="">); this also agrees with the fact that 33 subjects (mean age 30 years) perceived formaldehyde at about 0.3 mg/m</span><sup data-dcnode-id="5701"><span data-dcnode-id="5702" instrument_node="">3</span></sup><span data-dcnode-id="5700" instrument_node=""> (0.25 ppm) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r92" data-dcnode-id="5698" href="#" role="button"><span data-dcnode-id="5699" instrument_node="">92</span></a><span data-dcnode-id="5697" instrument_node="">). Lower values down to about 0.1 mg/m</span><sup data-dcnode-id="5695"><span data-dcnode-id="5696" instrument_node="">3</span></sup><span data-dcnode-id="5694" instrument_node="">, obtained under conditions of careful generation and monitoring of formaldehyde, have been reported for women (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r93" data-dcnode-id="5692" href="#" role="button"><span data-dcnode-id="5693" instrument_node="">93</span></a><span data-dcnode-id="5691" instrument_node="">). Olfactometric determination of odour thresholds depends on a number of experimental factors, such as air purity of the background, and possibly also personal factors such as smoking status and previous olfactory experience; generally, however, it is considered that lower values have higher validity than higher values (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r94" data-dcnode-id="5689" href="#" role="button"><span data-dcnode-id="5690" instrument_node="">94</span></a><span data-dcnode-id="5688" instrument_node="">). In addition, recent olfactometric studies indicate less intra- and inter-variability of sensitivity among subjects than in previous studies (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r94" data-dcnode-id="5686" href="#" role="button"><span data-dcnode-id="5687" instrument_node="">94</span></a><span data-dcnode-id="5685" instrument_node="">). In view of the above-mentioned studies, it is considered that a significant fraction of the population may perceive formaldehyde at or below 0.1 mg/m</span><sup data-dcnode-id="5683"><span data-dcnode-id="5684" instrument_node="">3</span></sup><span data-dcnode-id="5682" instrument_node="">.</span></p><div class="iconblock whole_rhythm clearfix ten_col table-wrap" data-dcnode-id="5672" id="figch3t2"><a class="img_link icnblk_img figpopup" data-dcnode-id="5679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t2/%3Freport%3Dobjectonly" rid-figpopup="figch3t2" rid-ob="figobch3t2" target="object" title="Table 3.2"><img alt="Table 3.2. Selected odour thresholds for formaldehyde." class="small-thumb" data-dcnode-id="5680" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t2/%3Freport%3Dthumb&amp;raw" src-large="/books/NBK138711/table/ch3.t2/?report=previmg"></a><div class="icnblk_cntnt" data-dcnode-id="5673"><h4 data-dcnode-id="5676" id="ch3.t2"><a data-dcnode-id="5677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t2/%3Freport%3Dobjectonly" rid-ob="figobch3t2" target="object"><span data-dcnode-id="5678" instrument_node="">Table 3.2</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="5674"><span data-dcnode-id="5675" instrument_node="">Selected odour thresholds for formaldehyde. </span></p></div></div><p data-dcnode-id="5661"><span data-dcnode-id="5671" instrument_node="">Both eye and upper airway sensory symptoms may be over-reported by odour cues, which cause perceptual uncertainty because of the difficulty of separating the simultaneous and integrated input from odours and sensory irritants (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r95" data-dcnode-id="5669" href="#" role="button"><span data-dcnode-id="5670" instrument_node="">95</span></a><span data-dcnode-id="5668" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r96" data-dcnode-id="5666" href="#" role="button"><span data-dcnode-id="5667" instrument_node="">96</span></a><span data-dcnode-id="5665" instrument_node="">). The perceived odour intensity will depend on a number of psychological factors, such as information about the risk of the chemical (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r97" data-dcnode-id="5663" href="#" role="button"><span data-dcnode-id="5664" instrument_node="">97</span></a><span data-dcnode-id="5662" instrument_node="">).</span></p><p data-dcnode-id="5629"><b data-dcnode-id="5658"><i data-dcnode-id="5659"><span data-dcnode-id="5660" instrument_node="">Sensory irritation.</span></i></b><span data-dcnode-id="5657" instrument_node=""> Generally, sensory irritation (nasal pungency) is perceived as an unpleasant sensation from the eyes and airways caused by stimulation of the trigeminal nerve endings by airborne sensory irritants (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r95" data-dcnode-id="5655" href="#" role="button"><span data-dcnode-id="5656" instrument_node="">95</span></a><span data-dcnode-id="5654" instrument_node="">). A number of reviews have assessed the threshold for self-reported sensory irritation. In general, the eyes are considered to be more sensitive to such irritan
