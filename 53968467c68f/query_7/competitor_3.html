90</span></a><span data-dcnode-id="4194" instrument_node="">) and to the data used for rates of nasal cell replication and death (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r189" data-dcnode-id="4192" href="#" role="button"><span data-dcnode-id="4193" instrument_node="">189</span></a><span data-dcnode-id="4191" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r191" data-dcnode-id="4189" href="#" role="button"><span data-dcnode-id="4190" instrument_node="">191</span></a><span data-dcnode-id="4188" instrument_node="">). For example, the instability of the estimates was seen when the current control group, comprising no squamous cell carcinoma among 341 controls, was used (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r189" data-dcnode-id="4186" href="#" role="button"><span data-dcnode-id="4187" instrument_node="">189</span></a><span data-dcnode-id="4185" instrument_node="">), although this frequency is in overall agreement with what would have been expected from the cumulative group by proportional scaling (0.57/341). Overall, the sensitivity analyses highlight the limited possibility of predicting risks from the rare events in the unexposed control group.</span></p><p data-dcnode-id="4167"><span data-dcnode-id="4183" instrument_node="">The importance of the replication rate of the initiated cell was addressed (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r189" data-dcnode-id="4181" href="#" role="button"><span data-dcnode-id="4182" instrument_node="">189</span></a><span data-dcnode-id="4180" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r191" data-dcnode-id="4178" href="#" role="button"><span data-dcnode-id="4179" instrument_node="">191</span></a><span data-dcnode-id="4177" instrument_node="">). Introducing a minor arbitrarily selected increase in cell division rate by formaldehyde exposure and using the entire historical control group of rats, the predicted human risk of respiratory cancer by the age of 80 years from lifetime exposure varied from about 0.02 to about 1 at 0.1 ppm formaldehyde. Thus, the sensitivity analysis showed that the assumed cell division rate of the initiated cell has a tremendous effect on the predicted risk. This led to the conclusion that the Conolly et al. model (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r175" data-dcnode-id="4175" href="#" role="button"><span data-dcnode-id="4176" instrument_node="">175</span></a><span data-dcnode-id="4174" instrument_node="">) is not reliable for estimating human risk, irrespective of whether the predictions by Crump et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r193" data-dcnode-id="4172" href="#" role="button"><span data-dcnode-id="4173" instrument_node="">193</span></a><span data-dcnode-id="4171" instrument_node="">) are at odds with human epidemiology, which was the main point of critique of the sensitivity analyses (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r194" data-dcnode-id="4169" href="#" role="button"><span data-dcnode-id="4170" instrument_node="">194</span></a><span data-dcnode-id="4168" instrument_node="">).</span></p><p data-dcnode-id="4156"><span data-dcnode-id="4166" instrument_node="">The 2004 estimate of Conolly et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r188" data-dcnode-id="4164" href="#" role="button"><span data-dcnode-id="4165" instrument_node="">188</span></a><span data-dcnode-id="4163" instrument_node="">) has to be taken cautiously. It is not an upper boundary (“worst-case consideration”), which can reach values – depending on the assumptions in the sensitivity analysis – that are incompatible with epidemiological findings. Beside the key event of cell proliferation in formaldehyde-induced nasal cancer identified in animal studies, the estimates by the International Programme on Chemical Safety (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r17" data-dcnode-id="4161" href="#" role="button"><span data-dcnode-id="4162" instrument_node="">17</span></a><span data-dcnode-id="4160" instrument_node="">) and Conolly et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r188" data-dcnode-id="4158" href="#" role="button"><span data-dcnode-id="4159" instrument_node="">188</span></a><span data-dcnode-id="4157" instrument_node="">) qualify the discussion about the size of the formaldehyde-induced risk as well as providing input to the selection of the assessment factor in the NOAEL approach.</span></p><p data-dcnode-id="4151"><span data-dcnode-id="4155" instrument_node="">A recent model study showed that formaldehyde exposure of children would result in less DPX formation than it would in adults exposed at the same level (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r154" data-dcnode-id="4153" href="#" role="button"><span data-dcnode-id="4154" instrument_node="">154</span></a><span data-dcnode-id="4152" instrument_node="">). Consequently, children are not expected to be more sensitive to any carcinogenic effect of formaldehyde than adults and are thus not considered separately in the further evaluation.</span></p></div></div></div><div data-dcnode-id="4023" id="ch3.s29"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="4145"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="4146" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="4147" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="4143" id="_ch3_s29_"><span data-dcnode-id="4144" instrument_node="">Health risk evaluation</span></h2><div data-dcnode-id="4103" id="ch3.s30"><h3 data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">Exposure evaluation</span></h3><p data-dcnode-id="4130"><span data-dcnode-id="4140" instrument_node="">The major exposure route for formaldehyde is inhalation. Although concentrations above 0.2 mg/m</span><sup data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">3</span></sup><span data-dcnode-id="4137" instrument_node=""> may be encountered in new or renovated buildings, in new furnishings and at hot and humid times of the year, levels on the average are less than 0.05 mg/m</span><sup data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">3</span></sup><span data-dcnode-id="4134" instrument_node=""> in homes and about half that in public buildings (</span><a class="figpopup" data-dcnode-id="4132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t4/%3Freport%3Dobjectonly" rid-figpopup="figch3t4" rid-ob="figobch3t4" target="object"><span data-dcnode-id="4133" instrument_node="">Table 3.4</span></a><span data-dcnode-id="4131" instrument_node="">). The most important way to control the formaldehyde concentration is the air exchange rate and the use of low-emitting materials and products. Environmental tobacco smoke and ozone-initiated reactions of alkene compounds may contribute to temporary peak levels. Outdoor concentrations are considerably lower, except in some major cities.</span></p><div class="iconblock whole_rhythm clearfix ten_col table-wrap" data-dcnode-id="4121" id="figch3t4"><a class="img_link icnblk_img figpopup" data-dcnode-id="4128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t4/%3Freport%3Dobjectonly" rid-figpopup="figch3t4" rid-ob="figobch3t4" target="object" title="Table 3.4"><img alt="Table 3.4. Mean exposure concentrations of formaldehyde in various environments, sampled over several days." class="small-thumb" data-dcnode-id="4129" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t4/%3Freport%3Dthumb&amp;raw" src-large="/books/NBK138711/table/ch3.t4/?report=previmg"></a><div class="icnblk_cntnt" data-dcnode-id="4122"><h4 data-dcnode-id="4125" id="ch3.t4"><a data-dcnode-id="4126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t4/%3Freport%3Dobjectonly" rid-ob="figobch3t4" target="object"><span data-dcnode-id="4127" instrument_node="">Table 3.4</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">Mean exposure concentrations of formaldehyde in various environments, sampled over several days. </span></p></div></div><p data-dcnode-id="4104"><span data-dcnode-id="4120" instrument_node="">Formaldehyde is a normal component of blood. Exposure to 2.4 mg/m</span><sup data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">3</span></sup><span data-dcnode-id="4117" instrument_node=""> did not increase the blood level and exposure to 0.5 mg/m</span><sup data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">3</span></sup><span data-dcnode-id="4114" instrument_node=""> did not result in an increase in urinary formate excretion due to rapid local metabolism (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="4112" href="#" role="button"><span data-dcnode-id="4113" instrument_node="">1</span></a><span data-dcnode-id="4111" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r37" data-dcnode-id="4109" href="#" role="button"><span data-dcnode-id="4110" instrument_node="">37</span></a><span data-dcnode-id="4108" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r43" data-dcnode-id="4106" href="#" role="button"><span data-dcnode-id="4107" instrument_node="">43</span></a><span data-dcnode-id="4105" instrument_node="">).</span></p></div><div data-dcnode-id="4043" id="ch3.s31"><h3 data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">Critical health outcomes</span></h3><p data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">Effects of formaldehyde in indoor air are generally expected to be limited to effects at the site of contact, specifically the eyes and nasal and upper airways. Effects are due to direct reactions with formaldehyde itself and do not appear to require metabolism.</span></p><div data-dcnode-id="4075" id="ch3.s32"><h4 data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">Non-cancer</span></h4><p data-dcnode-id="4089"><span data-dcnode-id="4096" instrument_node="">The acute symptom of formaldehyde at indoor exposure concentrations is sensory irritation of the eyes and upper airways. Human exposure studies indicate that 0.63 mg/m</span><sup data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">3</span></sup><span data-dcnode-id="4093" instrument_node=""> is the threshold for trigeminal stimulation of the eyes (e.g. increased blink frequency) and 0.38 mg/m</span><sup data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">3</span></sup><span data-dcnode-id="4090" instrument_node=""> is the threshold for subjective sensory irritation.</span></p><p data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">In general, the concentration perceived by the olfactory system is lower than that triggering sensory irritation of the eyes and airways, and people may therefore report symptoms at levels below its sensory irritation threshold.</span></p><p data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">Irritation effects of formaldehyde are not cumulative, based on the reversibility of the chemical reactions of formaldehyde-induced irritation and the lack of detectable accumulation of DNA protein cross-links during repeated exposures.</span></p><p data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">There is no evidence indicating an increased sensitivity to sensory irritation to formaldehyde among people often regarded as susceptible (asthmatics, children and older people).</span></p><p data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">Although some studies suggest that formaldehyde plays a role in airway sensitization, an association between formaldehyde and lung effects or sensitization in children have not been convincing owing to confounding factors in the studies, including exposure to traffic-related co-pollutants.</span></p><p data-dcnode-id="4076"><span data-dcnode-id="4080" instrument_node="">Lung function remains unaltered in adults at exposures below 1 mg/m</span><sup data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">3</span></sup><span data-dcnode-id="4077" instrument_node=""> formaldehyde.</span></p></div><div data-dcnode-id="4044" id="ch3.s33"><h4 data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">Cancer</span></h4><p data-dcnode-id="4059"><span data-dcnode-id="4072" instrument_node="">Formaldehyde can induce squamous cell carcinoma of the nasal cavity in rats and nasopharyngeal cancer in humans. Long-term exposure to 7.5 mg/m</span><sup data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">3</span></sup><span data-dcnode-id="4069" instrument_node=""> formaldehyde and above caused squamous cell carcinoma of the nasal cavity of rats with a non-linear, biphasic concentration–response relationship having the break point at or above 2.5 mg/m</span><sup data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">3</span></sup><span data-dcnode-id="4066" instrument_node="">. In humans, no excess nasopharyngeal cancer has been observed at mean exposure levels at or below 1.25 mg/m</span><sup data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">3</span></sup><span data-dcnode-id="4063" instrument_node=""> and with peak exposures below 5 mg/m</span><sup data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">3</span></sup><span data-dcnode-id="4060" instrument_node="">.</span></p><p data-dcnode-id="4045"><span data-dcnode-id="4058" instrument_node="">Exposure to formaldehyde has been suspected of leading to lymphohaematopoetic malignancies. However, most long-term inhalation carcinogenicity studies in rats, mice and hamsters do not suggest induction of lymphohaematopoetic malignancies by formaldehyde at levels associated with nasal cancer. In humans, the overall conclusions from three meta-analyses, as well as a recent study in embalmers, suggest that formaldehyde may be causally associated with lymphohaematopoetic malignancies. The recent study in embalmers found evidence of myeloid leukaemia but not other haematopoietic malignancies; the 8-hour time-weighted average formaldehyde intensity was 0.125–0.25 mg/m</span><sup data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">3</span></sup><span data-dcnode-id="4055" instrument_node="">, the average formaldehyde intensity while embalming was about 1.9–2.25 mg/m</span><sup data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">3</span></sup><span data-dcnode-id="4052" instrument_node="">, and peak exposure was about 10–13 mg/m</span><sup data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">3</span></sup><span data-dcnode-id="4049" instrument_node="">. This suggests that an effect on bone marrow or blood progenitor cells is possible at high exposure concentrations. However, since exposure to formaldehyde concentrations up to 2.5 mg/m</span><sup data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">3</span></sup><span data-dcnode-id="4046" instrument_node=""> has negligible influence on the endogenous formaldehyde blood level, protection against nasal cancer should also protect against leukaemia.</span></p></div></div><div data-dcnode-id="4029" id="ch3.s34"><h3 data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">Relevance for health of indoor air exposure</span></h3><p data-dcnode-id="4030"><span data-dcnode-id="4040" instrument_node="">The major exposure route of formaldehyde is inhalation from indoor sources. Formaldehyde is a normal component of blood. Exposure of humans to 2.5 mg/m</span><sup data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">3</span></sup><span data-dcnode-id="4037" instrument_node=""> formaldehyde did not increase the blood levels and exposure to 0.5 mg/m</span><sup data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">3</span></sup><span data-dcnode-id="4034" instrument_node=""> did not result in an increase in urinary formate excretion due to rapid metabolism. This suggests that formaldehyde levels normally encountered in indoor air, not exceeding 0.2 mg/m</span><sup data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">3</span></sup><span data-dcnode-id="4031" instrument_node="">, are not expected to increase internal organ exposure.</span></p></div><div data-dcnode-id="4024" id="ch3.s35"><h3 data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">Conclusions of other reviews</span></h3><p data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">Regulatory agencies in many countries have established guideline values for concentrations of formaldehyde in indoor air. IARC has classified formaldehyde as a human carcinogen (Group 1) based on sufficient epidemiological evidence of nasopharyngeal cancer, and a recent IARC working group also found sufficient evidence for myeloid leukaemia.</span></p></div></div><div data-dcnode-id="3840" id="ch3.s36"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="4020"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="4021" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="4022" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="4018" id="_ch3_s36_"><span data-dcnode-id="4019" instrument_node="">Guidelines</span></h2><p data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">An indoor air guideline for formaldehyde is appropriate because indoor exposures are the dominant contributor to personal exposures through inhalation and indoor concentrations may be high enough to cause adverse health effects.</span></p><p data-dcnode-id="4008"><span data-dcnode-id="4015" instrument_node="">The lowest concentration reported to cause sensory irritation of the eyes in humans is 0.38 mg/m</span><sup data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">3</span></sup><span data-dcnode-id="4012" instrument_node=""> for four hours. Increases in eye blink frequency and conjunctival redness appear at 0.6 mg/m</span><sup data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">3</span></sup><span data-dcnode-id="4009" instrument_node="">, which is considered equal to the NOAEL. There is no indication of accumulation of effects over time with prolonged exposure.</span></p><p data-dcnode-id="3994"><span data-dcnode-id="4007" instrument_node="">The perception of odour may result in some individuals reporting subjective sensory irritation, and individuals may perceive formaldehyde at concentrations below 0.1 mg/m</span><sup data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">3</span></sup><span data-dcnode-id="4004" instrument_node="">. However, this is not considered to be an adverse health effect. The NOAEL of 0.6 mg/m</span><sup data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node="">3</span></sup><span data-dcnode-id="4001" instrument_node=""> for the eye blink response is adjusted using an assessment factor of 5 derived from the standard deviation of nasal pungency (sensory irritation) thresholds, leading to a value of 0.12 mg/m</span><sup data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">3</span></sup><span data-dcnode-id="3998" instrument_node="">, which has been rounded down to 0.1 mg/m</span><sup data-dcnode-id="3996"><span data-dcnode-id="3997" instrument_node="">3</span></sup><span data-dcnode-id="3995" instrument_node="">. Neither increased sensitivity nor sensitization is considered plausible at such indoor concentrations in adults and children. This value is thus considered valid for short-term (30-minute) duration, and this threshold should not be exceeded at any 30-minute interval during a day.</span></p><p data-dcnode-id="3989"><span data-dcnode-id="3993" instrument_node="">Thus, a short-term (30-minute) guideline of 0.1 mg/m</span><sup data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">3</span></sup><span data-dcnode-id="3990" instrument_node=""> is recommended as preventing sensory irritation in the general population.</span></p><p data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">There is sufficient evidence that formaldehyde causes nasal cancer in animals and nasopharyngeal cancer in humans with a non-linear, biphasic concentration-response relationship. Carcinogenicity studies in rats, mice and hamsters do not show a consistent association between formaldehyde and lymphohaematopoetic malignancies. Associations between exposure to formaldehyde and nasopharyngeal malignancies and leukaemia in humans are limited to high exposure concentrations.</span></p><p data-dcnode-id="3979"><span data-dcnode-id="3986" instrument_node="">Increased cell proliferation due to cell damage is considered a key mechanism for the development of nasal malignancies following exposure to formaldehyde. Overall, indoor air effects of formaldehyde are expected to be limited to the site of contact, generally the nasal and upper airways. Increasing cell proliferation in the nasal mucosa of rats occurs at concentrations at and above 2.5 mg/m</span><sup data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">3</span></sup><span data-dcnode-id="3983" instrument_node=""> formaldehyde. The NOAEL for cell proliferation is 1.25 mg/m</span><sup data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">3</span></sup><span data-dcnode-id="3980" instrument_node=""> for long-term exposures.</span></p><p data-dcnode-id="3971"><span data-dcnode-id="3978" instrument_node="">Thus a threshold approach to setting a guideline for cancer effects is appropriate. Starting with the NOAEL of 1.25 mg/m</span><sup data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node="">3</span></sup><span data-dcnode-id="3975" instrument_node="">, assessment factors are applied. An interspecies assessment factor of 3 is proposed because the effect is local (non-systemic) and directly due to formaldehyde itself; for inter-individual variation, an assessment factor as low as 2 is proposed because sensitivity differences are not seen among different populations (asthmatics, children and older people). This would lead to a proposed guideline of 0.21 mg/m</span><sup data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">3</span></sup><span data-dcnode-id="3972" instrument_node=""> for the protection of health for long-term effects, including cancer.</span></p><p data-dcnode-id="3957"><span data-dcnode-id="3970" instrument_node="">An alternative approach was taken by several other groups, using a biologically motivated model. Their assessments led to a predicted additional risk of 2.7 × 10</span><sup data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">–8</span></sup><span data-dcnode-id="3967" instrument_node=""> for continuous lifetime exposure to 0.125 mg/m</span><sup data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">3</span></sup><span data-dcnode-id="3964" instrument_node=""> and a predicted additional risk of 10</span><sup data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">–6</span></sup><span data-dcnode-id="3961" instrument_node=""> or less for non-smokers continuously exposed to 0.25 mg/m</span><sup data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">3</span></sup><span data-dcnode-id="3958" instrument_node="">.</span></p><p data-dcnode-id="3946"><span data-dcnode-id="3956" instrument_node="">These two assessments (using a NOAEL/assessment factor approach and estimates from the biologically motivated models) yield similar results, with values of approximately 0.2 mg/m</span><sup data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">3</span></sup><span data-dcnode-id="3953" instrument_node="">. These values are above the guideline for short-term effects of 0.1 mg/m</span><sup data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">3</span></sup><span data-dcnode-id="3950" instrument_node="">. Thus use of the short-term (30-minute) guideline of 0.1 mg/m</span><sup data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">3</span></sup><span data-dcnode-id="3947" instrument_node=""> will also prevent long-term health effects, including cancer.</span></p><p data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">The use of low-emitting building materials and products, and preventing exposures to environmental tobacco smoke and other combustion emissions, will minimize exposure-related risk. In addition, ventilation can reduce indoor exposure to formaldehyde.</span></p><blockquote data-dcnode-id="3941"><p data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">The guidelines section was formulated and agreed by the working group meeting in November 2009.</span></p></blockquote><div class="box" data-dcnode-id="3841" id="ch3.box1"><h3 data-dcnode-id="3938"><span class="title" data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">Summary of main evidence and decision-making in guideline formulation</span></span></h3><div data-dcnode-id="3933" id="ch3.box1.s1"><h4 data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">Critical outcome for guideline definition</span></h4><p data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">Sensory irritation.</span></p></div><div data-dcnode-id="3916" id="ch3.box1.s2"><h4 data-dcnode-id="3931"><span data-dcnode-id="3932" instrument_node="">Source of exposure–effect evidence</span></h4><p data-dcnode-id="3917"><span data-dcnode-id="3930" instrument_node="">Experimental study reporting conjunctival redness and increases in eye blink frequency at a four-hour exposure of 0.63 mg/m</span><sup data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">3</span></sup><span data-dcnode-id="3927" instrument_node=""> considered as the NOAEL (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r79" data-dcnode-id="3925" href="#" role="button"><span data-dcnode-id="3926" instrument_node="">79</span></a><span data-dcnode-id="3924" instrument_node="">). This was adjusted using an assessment factor of 5 derived from the standard deviation of nasal pungency (sensory irritation) thresholds, leading to a value of 0.12 mg/m</span><sup data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">3</span></sup><span data-dcnode-id="3921" instrument_node="">, which has been rounded down to 0.1 mg/m</span><sup data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">3</span></sup><span data-dcnode-id="3918" instrument_node="">.</span></p></div><div data-dcnode-id="3881" id="ch3.box1.s3"><h4 data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">Supporting evidence</span></h4><dl class="temp-labeled-list" data-dcnode-id="3882"><dt data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">–</span></dt><dd data-dcnode-id="3897"><p class="no_top_margin" data-dcnode-id="3898"><span data-dcnode-id="3911" instrument_node="">Several reviews on sensorial irritation at exposure levels between 0.15 and 1.25 mg/m</span><sup data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">3</span></sup><span data-dcnode-id="3908" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r66" data-dcnode-id="3906" href="#" role="button"><span data-dcnode-id="3907" instrument_node="">66</span></a><span data-dcnode-id="3905" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r67" data-dcnode-id="3903" href="#" role="button"><span data-dcnode-id="3904" instrument_node="">67</span></a><span data-dcnode-id="3902" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r77" data-dcnode-id="3900" href="#" role="button"><span data-dcnode-id="3901" instrument_node="">77</span></a><span data-dcnode-id="3899" instrument_node="">).</span></p></dd><dt data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">–</span></dt><dd data-dcnode-id="3883"><p class="no_top_margin" data-dcnode-id="3884"><span data-dcnode-id="3894" instrument_node="">12 controlled, mostly double-blind studies on respiratory effects at exposures of 0.08–11.2 mg/m</span><sup data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">3</span></sup><span data-dcnode-id="3891" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r78" data-dcnode-id="3889" href="#" role="button"><span data-dcnode-id="3890" instrument_node="">78</span></a><span data-dcnode-id="3888" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r89" data-dcnode-id="3886" href="#" role="button"><span data-dcnode-id="3887" instrument_node="">89</span></a><span data-dcnode-id="3885" instrument_node="">).</span></p></dd></dl></div><div data-dcnode-id="3867" id="ch3.box1.s4"><h4 data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">Results of other reviews</span></h4><p data-dcnode-id="3868"><span data-dcnode-id="3878" instrument_node="">IARC: Group I (known human carcinogen) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="3876" href="#" role="button"><span data-dcnode-id="3877" instrument_node="">1</span></a><span data-dcnode-id="3875" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r155" data-dcnode-id="3873" href="#" role="button"><span data-dcnode-id="3874" instrument_node="">155</span></a><span data-dcnode-id="3872" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r186" data-dcnode-id="3870" href="#" role="button"><span data-dcnode-id="3871" instrument_node="">186</span></a><span data-dcnode-id="3869" instrument_node="">).</span></p></div><div data-dcnode-id="3859" id="ch3.box1.s5"><h4 data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">Guidelines</span></h4><p data-dcnode-id="3860"><span data-dcnode-id="3864" instrument_node="">0.1 mg/m</span><sup data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">3</span></sup><span data-dcnode-id="3861" instrument_node=""> (30-minute average concentration).</span></p></div><div data-dcnode-id="3842" id="ch3.box1.s6"><h4 data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">Comments</span></h4><dl class="temp-labeled-list" data-dcnode-id="3843"><dt data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">–</span></dt><dd data-dcnode-id="3852"><p class="no_top_margin" data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">The short-term guideline will also prevent effects on lung function as well as long-term health effects, including nasopharyngeal cancer and myeloid leukaemia.</span></p></dd><dt data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">–</span></dt><dd data-dcnode-id="3844"><p class="no_top_margin" data-dcnode-id="3845"><span data-dcnode-id="3849" instrument_node="">No change in the guideline as compared to </span><i data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">Air quality guidelines for Europe</span></i><span data-dcnode-id="3846" instrument_node="">, 2nd ed.</span></p></dd></dl></div></div></div><div data-dcnode-id="646" id="ch3.rl1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3837"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3838" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3839" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="3835" id="_ch3_rl1_"><span data-dcnode-id="3836" instrument_node="">References</span></h2><dl class="temp-labeled-list" data-dcnode-id="647"><dt data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">1.</span></dt><dd data-dcnode-id="3818"><div class="bk_ref" data-dcnode-id="3819" id="ch3.r1"><span class="ref-journal" data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">Formaldehyde, 2-butoxyethanol and 1-tert-butoxypropan-2-ol.</span></span><span data-dcnode-id="3830" instrument_node=""> Lyon: International Agency for Research on Cancer; 2006. Formaldehyde; pp. 39–325. (IARC Monographs on the Evaluation of the Carcinogenic Risk of Chemicals to Humans, Vol. 88) [</span><a data-dcnode-id="3826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih. /dt><dd data-dcnode-id="3786"><div class="bk_ref" data-dcnode-id="3787" id="ch3.r3"><span data-dcnode-id="3801" instrument_node="">Salthammer T, Mentese S. Comparison of analytical techniques for the determination of aldehydes in test chambers. </span><span data-dcnode-id="3794"><span class="ref-journal" data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">Chemosphere. </span></span><span data-dcnode-id="3798" instrument_node="">2008;</span><span class="ref-vol" data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">73</span></span><span data-dcnode-id="3795" instrument_node="">:1351–1356.</span></span><span data-dcnode-id="3793" instrument_node=""> [</span><a data-dcnode-id="3789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/18722643" ref="pagearea=cite-ref&amp;targetsite=entrez&amp;targetcat=link&amp;targettype=pubmed"><span data-dcnode-id="3792" instrument_node="">PubMed</span><span class="bk_prnt" data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">: 18722643</span></span></a><span data-dcnode-id="3788" instrument_node="">]</span></div></dd><dt data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">4.</span></dt><dd data-dcnode-id="3774"><div class="bk_ref" data-dcnode-id="3775" id="ch3.r4"><span data-dcnode-id="3783" instrument_node="">Wisthaler A, et al.  Technical Note: Intercomparison of formaldehyde measurements at the atmosphere simulation chamber SAPHIR. </span><span data-dcnode-id="3776"><span class="ref-journal" data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">Atmospheric Chemistry and Physics. </span></span><span data-dcnode-id="3780" instrument_node="">2008;</span><span class="ref-vol" data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">8</span></span><span data-dcnode-id="3777" instrument_node="">:2189–2200.</span></span></div></dd><dt data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_
