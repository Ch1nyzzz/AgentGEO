tween the groups. Thus, the number of tumour-bearing rats and the total number of tumours were lower in the high-dose males than in the control males.</span></p><p data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">Haematological tumours were limited to generalized histiocytic sarcoma in one male and myeloid leukaemia in another male, both in the high-dose group. No lymphoma appeared in the high-dose group and no exposure-dependent lymphoma appeared from the study of the auxiliary lymph nodes and the small intestine.</span></p><p data-dcnode-id="4845"><span data-dcnode-id="4849" instrument_node="">In another study (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r169" data-dcnode-id="4847" href="#" role="button"><span data-dcnode-id="4848" instrument_node="">169</span></a><span data-dcnode-id="4846" instrument_node="">), formaldehyde was administered to Wistar rats for up to 24 months at 0, 10, 50 or 300 mg/kg per day. Each group comprised 20 males and 20 females. None of the animals survived 24 months of exposure in the 300-mg/kg group and severe lesions were observed in the stomach. Additionally, serum urea nitrogen increased significantly in both sexes, suggesting an effect on the kidneys. There was no significant difference in the incidence of any kind of tumour among the groups.</span></p><p data-dcnode-id="4813"><span data-dcnode-id="4844" instrument_node="">In a 104-week study (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r170" data-dcnode-id="4842" href="#" role="button"><span data-dcnode-id="4843" instrument_node="">170</span></a><span data-dcnode-id="4841" instrument_node="">), Sprague-Dawley rats were exposed to 10, 50, 100, 500, 1000 or 1500 mg formaldehyde per litre drinking-water. Another group was treated with 15 mg methanol per litre. The treated groups each consisted of 50 males and 50 females, while a control group given tap water consisted of 100 males and 100 females. The animals were observed until they died. There was no difference in survival among the groups, but the number of tumour-bearing animals was significantly higher among males in the highest exposure group. In the female control, methanol and 10, 50, 100, 500, 1000 and 1500 mg/l formaldehyde groups, the percentages of animals with haemolymphoreticular neoplasia were 7, 10, 10, 14, 16, 14, 22</span><sup data-dcnode-id="4838"><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.fn1" data-dcnode-id="4839" href="#" role="button"><span data-dcnode-id="4840" instrument_node="">1</span></a></sup><span data-dcnode-id="4837" instrument_node=""> and 20</span><sup data-dcnode-id="4834"><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.fn1" data-dcnode-id="4835" href="#" role="button"><span data-dcnode-id="4836" instrument_node="">1</span></a></sup><span data-dcnode-id="4833" instrument_node="">, respectively. In the males, the percentage was 8, 20, 8, 20, 26</span><sup data-dcnode-id="4830"><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.fn2" data-dcnode-id="4831" href="#" role="button"><span data-dcnode-id="4832" instrument_node="">2</span></a></sup><span data-dcnode-id="4829" instrument_node="">, 24</span><sup data-dcnode-id="4826"><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.fn1" data-dcnode-id="4827" href="#" role="button"><span data-dcnode-id="4828" instrument_node="">1</span></a></sup><span data-dcnode-id="4825" instrument_node="">, 22</span><sup data-dcnode-id="4822"><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.fn1" data-dcnode-id="4823" href="#" role="button"><span data-dcnode-id="4824" instrument_node="">1</span></a></sup><span data-dcnode-id="4821" instrument_node=""> and 46</span><sup data-dcnode-id="4818"><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.fn2" data-dcnode-id="4819" href="#" role="button"><span data-dcnode-id="4820" instrument_node="">2</span></a></sup><span data-dcnode-id="4817" instrument_node="">, respectively. The study has a number of limitations (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="4815" href="#" role="button"><span data-dcnode-id="4816" instrument_node="">1</span></a><span data-dcnode-id="4814" instrument_node="">). This applies to the “pooling” of lymphomas and leukaemias (“haemolym-phoreticular neoplasia”), the lack of reporting of non-neoplastic lesions, and the absence of information on the incidence of haemolymphoreticular tumours in the historical controls. Further, the incidence in comparison with the methanol-treated group was significantly increased only in the high-dose males, but the dose–response relationship was statistically significant.</span></p><p data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">Overall, the drinking-water studies showed no consistent increase in lymphohaematopoietic malignancies. Where significant, the effects were at the high formaldehyde levels and exposure–response relationships were apparently nonlinear.</span></p><p data-dcnode-id="4800"><b data-dcnode-id="4808"><i data-dcnode-id="4809"><span data-dcnode-id="4810" instrument_node="">Inhalation studies.</span></i></b><span data-dcnode-id="4807" instrument_node=""> Groups of approximately 120 male and 120 female Fischer 344 rats and C57BL/6 × C3HF</span><sub data-dcnode-id="4805"><span data-dcnode-id="4806" instrument_node="">1</span></sub><span data-dcnode-id="4804" instrument_node=""> mice were exposed to 0, 2.5, 7 or 18 mg/m</span><sup data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">3</span></sup><span data-dcnode-id="4801" instrument_node=""> formaldehyde for 6 hours a day, 5 days a week for 24 months. The exposure period was followed by up to 6 months of non-exposure. Gross pathological examinations were performed on all animals that died or were sacrificed; histopathology was performed on 50 tissue samples per animal in the control and highly exposed groups.</span></p><p data-dcnode-id="4795"><span data-dcnode-id="4799" instrument_node="">Significantly increased mortality was observed both in male and female rats in the high-dose group and in males in the intermediate group. Survival in female mice was not affected by formaldehyde exposures. Exposed male mice had a slightly poorer survival, but this was not statistically significant. The significant formaldehyde-induced lesions were restricted to the nasal cavity and proximal trachea in both species (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r164" data-dcnode-id="4797" href="#" role="button"><span data-dcnode-id="4798" instrument_node="">164</span></a><span data-dcnode-id="4796" instrument_node="">).</span></p><p data-dcnode-id="4778"><span data-dcnode-id="4794" instrument_node="">The slides from the Kerns et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r164" data-dcnode-id="4792" href="#" role="button"><span data-dcnode-id="4793" instrument_node="">164</span></a><span data-dcnode-id="4791" instrument_node="">) study were re-evaluated by Woutersen (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r114" data-dcnode-id="4789" href="#" role="button"><span data-dcnode-id="4790" instrument_node="">114</span></a><span data-dcnode-id="4788" instrument_node="">) as well as by a recent IARC working group (see Baan et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r155" data-dcnode-id="4786" href="#" role="button"><span data-dcnode-id="4787" instrument_node="">155</span></a><span data-dcnode-id="4785" instrument_node="">) for a list of the working group members) to investigate the occurrence of lymphohaematopoietic malignancies. A mortality-adjusted trend test (the Peto mortality-prevalence test) was used to take into account early deaths due to nasal cancer that might have limited the detection of lymphohaematopoietic malignancies (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r114" data-dcnode-id="4783" href="#" role="button"><span data-dcnode-id="4784" instrument_node="">114</span></a><span data-dcnode-id="4782" instrument_node="">). No associations between formaldehyde exposure and leukaemia were seen in male or female rats at the end of the 24-month exposure period or in the 6-month recovery period. In male mice, rare lymphomas were seen at the end of the 24-month exposure period (1%, 1%, 1% and 0%, respectively, in the 0-, 2.5-, 7- and 18-mg/m</span><sup data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">3</span></sup><span data-dcnode-id="4779" instrument_node=""> exposure groups), whereas the trend was highly significant in female mice (17%, 16%, 9% and 29%, respectively). It was concluded that formaldehyde may induce lymphoma in female mice, which is clearly driven by the incidence in the top exposure group.</span></p><p data-dcnode-id="4761"><span data-dcnode-id="4777" instrument_node="">The IARC working group noted that 12, 17, 16 and 7 out of 120 female rats developed undifferentiated leukaemia in the 0-, 2.5-, 7- and 18-mg/m</span><sup data-dcnode-id="4775"><span data-dcnode-id="4776" instrument_node="">3</span></sup><span data-dcnode-id="4774" instrument_node=""> exposure groups, respectively, and that there was a markedly decreased survival in the 18-mg/m</span><sup data-dcnode-id="4772"><span data-dcnode-id="4773" instrument_node="">3</span></sup><span data-dcnode-id="4771" instrument_node=""> group. Based on a survival-adjusted analysis, the incidence of leukaemia in females exposed to 18 mg/m</span><sup data-dcnode-id="4769"><span data-dcnode-id="4770" instrument_node="">3</span></sup><span data-dcnode-id="4768" instrument_node=""> was increased compared to controls (</span><i data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node="">P</span></i><span data-dcnode-id="4765" instrument_node=""> = 0.0056; Tarone extension of the Cox test, </span><i data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">P</span></i><span data-dcnode-id="4762" instrument_node=""> &lt; 0.0167). The working group noted that this is a very common, spontaneously occurring neoplasm in the F344 rat strain.</span></p><p data-dcnode-id="4756"><span data-dcnode-id="4760" instrument_node="">These re-evaluations permit two conclusions. First, leukaemia may or many not be induced in Fischer 344 rats at 24 months of exposure to 18 mg/m</span><sup data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">3</span></sup><span data-dcnode-id="4757" instrument_node="">, at which a high incidence of nasal tumours occurred. Second, if lymphoma is induced by formaldehyde in female mice, the occurrence is at the very high exposure level at which there was high incidence of nasal tumours in rats. Thus, in rats the occurrence of nasal tumours is a more sensitive end-point than lymphohaematopoietic malignancies.</span></p><p data-dcnode-id="4748"><span data-dcnode-id="4755" instrument_node="">In another study, 100 Sprague-Dawley rats were exposed to 18 mg/m</span><sup data-dcnode-id="4753"><span data-dcnode-id="4754" instrument_node="">3</span></sup><span data-dcnode-id="4752" instrument_node=""> formaldehyde for 6 hours a day, 5 days a week for life. Complete necropsy was performed on each animal. Histological sections were performed from each lobe of the lung, trachea, larynx, liver, kidney, testes and other organs where gross pathology was present. There was an increased mortality in the formaldehyde group compared with the control group. In the formaldehyde group, three malignant lymphomas were observed. In the similar control group of 99 rats, two malignant lymphomas were observed, while three were observed in 99 colony controls (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r171" data-dcnode-id="4750" href="#" role="button"><span data-dcnode-id="4751" instrument_node="">171</span></a><span data-dcnode-id="4749" instrument_node="">).</span></p><p data-dcnode-id="4740"><span data-dcnode-id="4747" instrument_node="">In a 28-month study, male F-344 rats in groups of 32 were exposed to formaldehyde for 6 hours a day, 5 days a week at 0, 0.38, 2.5 or 18.8 mg/m</span><sup data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">3</span></sup><span data-dcnode-id="4744" instrument_node="">, plus a room control group. The number of rats alive at 18 months or later and thus available for histopathology was 19, 22, 17, 7 and 16, respectively. Haematological, biochemical and pathological examinations were performed. Tissues for histopathology were pituitary, thyroid, nasal region, trachea, oesophagus, stomach, small and large intestine, prostate gland, urinary bladder, muscle, femur, sciatic nerve, spinal cord, mesenteric lymph nodes and any other gross lesion. Increased mortality was observed at the highest exposure concentration. No microscopic lesions were attributed to formaldehyde exposure except those in the nasal cavity. Also, there was no exposure-related abnormal haematological finding (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r172" data-dcnode-id="4742" href="#" role="button"><span data-dcnode-id="4743" instrument_node="">172</span></a><span data-dcnode-id="4741" instrument_node="">).</span></p><p data-dcnode-id="4732"><span data-dcnode-id="4739" instrument_node="">Overall, the occurrence of lymphohaematopoietic malignancies in inhalation studies in rats and mice is not convincing. In general, there is lack of consistency across species (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r165" data-dcnode-id="4737" href="#" role="button"><span data-dcnode-id="4738" instrument_node="">165</span></a><span data-dcnode-id="4736" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r173" data-dcnode-id="4734" href="#" role="button"><span data-dcnode-id="4735" instrument_node="">173</span></a><span data-dcnode-id="4733" instrument_node="">). Nevertheless, if it is assumed that there is a causal association, the association was seen at high exposure levels, which caused a high incidence of nasal cancer in rats. Also, the exposure–response relationship seems to be non-linear.</span></p></div><div data-dcnode-id="4661" id="ch3.s23"><h4 data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">Assessment of cancer hazards in meta-analyses</span></h4><p data-dcnode-id="4718"><b data-dcnode-id="4726"><i data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node="">Oral cavity and pharynx, sinus and nasal cavity, and lung.</span></i></b><span data-dcnode-id="4725" instrument_node=""> Bosetti et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r63" data-dcnode-id="4723" href="#" role="button"><span data-dcnode-id="4724" instrument_node="">63</span></a><span data-dcnode-id="4722" instrument_node="">) conducted a meta-analysis based on six cohorts of industrial workers and professionals (pathologists, anatomists, embalmers and undertakers). No significant excess cancer risk was found in industrial workers and professionals for all cancers or for oral and pharyngeal cancer. The lung cancer risk was not affected in industrial workers (RR 1.06; 95% CI 0.92–1.23), whereas the risk was reduced in the professionals (RR 0.63; 95% CI 0.47–0.84). The study concluded that there was no appreciable risk for cancer of the oral cavity and pharynx, sinus and nasal cavity and lung. IARC (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="4720" href="#" role="button"><span data-dcnode-id="4721" instrument_node="">1</span></a><span data-dcnode-id="4719" instrument_node="">) also concluded that the overall balance of epidemiological evidence did not support a causal role for formaldehyde in cancer in the oral cavity, oro- and hypopharynx and lungs.</span></p><p data-dcnode-id="4710"><span data-dcnode-id="4717" instrument_node="">In the meta-analysis by Bosetti et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r63" data-dcnode-id="4715" href="#" role="button"><span data-dcnode-id="4716" instrument_node="">63</span></a><span data-dcnode-id="4714" instrument_node="">), the nasopharyngeal cancer risk was increased in industrial workers, but this was not statistically significant (RR 1.33; 95% CI 0.69–2.56). This was based on eight cancers in one study where six cancers were in one of ten plants and one cancer was from another cohort. No excess brain cancer risk was apparent in the industrial workers (RR 0.92; 95% CI 0.75–1.13) but the risk was significantly increased in the professionals (RR 1.56; 95% CI 1.24–1.96). The brain cancer risk is not consistent across the two types of study and it is not biologically plausible that formaldehyde causes brain cancer. This is in agreement with the evaluation of IARC (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="4712" href="#" role="button"><span data-dcnode-id="4713" instrument_node="">1</span></a><span data-dcnode-id="4711" instrument_node="">).</span></p><p data-dcnode-id="4702"><span data-dcnode-id="4709" instrument_node="">Pancreatic cancer was addressed in a meta-analysis that comprised 14 epidemiological studies. No exposure-dependent effect was apparent (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r174" data-dcnode-id="4707" href="#" role="button"><span data-dcnode-id="4708" instrument_node="">174</span></a><span data-dcnode-id="4706" instrument_node="">). This is in agreement with the IARC evaluation (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="4704" href="#" role="button"><span data-dcnode-id="4705" instrument_node="">1</span></a><span data-dcnode-id="4703" instrument_node="">).</span></p><p data-dcnode-id="4691"><span data-dcnode-id="4701" instrument_node="">Leukaemia was studied in a meta-analysis comprising 18 epidemiological studies (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r175" data-dcnode-id="4699" href="#" role="button"><span data-dcnode-id="4700" instrument_node="">175</span></a><span data-dcnode-id="4698" instrument_node="">). Heterogeneity was observed across studies and differences appeared between the RR of formaldehyde exposures in American (RR 1.2; 95% CI 1.0–1.4) and European workers (RR 0.9; 95% CI 0.7–1.1). Furthermore, the RR was different for various types of job: industrial workers (RR 0.9; 95% CI 0.8–1.0), embalmers (RR 1.6; 95% CI 1.2–2.0) and pathologists and anatomists (RR 1.4; 95% CI 1.0–1.9). Only three of the studies (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r176" data-dcnode-id="4696" href="#" role="button"><span data-dcnode-id="4697" instrument_node="">176</span></a><span data-dcnode-id="4695" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r178" data-dcnode-id="4693" href="#" role="button"><span data-dcnode-id="4694" instrument_node="">178</span></a><span data-dcnode-id="4692" instrument_node="">) evaluated leukaemia rates by exposure level. This meta-analysis concluded that the data do not provide consistent support for a relationship between formaldehyde exposure and leukaemia.</span></p><p data-dcnode-id="4686"><span data-dcnode-id="4690" instrument_node="">In the meta-analysis by Bosetti et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r63" data-dcnode-id="4688" href="#" role="button"><span data-dcnode-id="4689" instrument_node="">63</span></a><span data-dcnode-id="4687" instrument_node="">), significantly reduced risks of lymphatic and haematopoietic cancer were observed in the industrial workers (RR 0.85; 95% CI 0.74–0.96). In contrast, the risk was significantly increased in the professionals (RR 1.31; 95% CI 1.16–1.48), comprising pathologists, anatomists and embalmers. No excess in leukaemia risk appeared in industrial workers (RR 0.90; 95% CI 0.75–1.07) but the risk was significantly increased in the professionals (RR 1.39; 95% CI 1.15–1.68).</span></p><p data-dcnode-id="4681"><span data-dcnode-id="4685" instrument_node="">The most recent meta-analysis that includes all relevant cohort and case-control studies published through May 2009 found no increase in leukaemia. The meta-analysis summary RR was 1.05 (95% CI 0.93–1.20) for cohort studies and the summary OR was 0.99 (95% CI 0.71–1.37) for case-control studies (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r179" data-dcnode-id="4683" href="#" role="button"><span data-dcnode-id="4684" instrument_node="">179</span></a><span data-dcnode-id="4682" instrument_node="">).</span></p><p data-dcnode-id="4673"><span data-dcnode-id="4680" instrument_node="">While the three meta-analyses discussed above reported on the contrast between ever- vs never-exposed subjects and various combinations of lymphohaematopoietic cancers, a recent meta-analysis evaluated especially myeloid leukaemia from the highest exposure group of each study (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r180" data-dcnode-id="4678" href="#" role="button"><span data-dcnode-id="4679" instrument_node="">180</span></a><span data-dcnode-id="4677" instrument_node="">). Where several RRs were reported in a study, one RR was selected from each study in the order: peak exposure, average exposure intensity, cumulative exposure, exposure duration. For example, the accepted study groups were exposed to more than 2 ppm on average, with peak exposures above 4 ppm, or were exposed for more than 10 years. In the analysis by Zhang et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r180" data-dcnode-id="4675" href="#" role="button"><span data-dcnode-id="4676" instrument_node="">180</span></a><span data-dcnode-id="4674" instrument_node="">), the fixed effects model and the random effect model showed similar results, and therefore the results are from the fixed effects model. Thus, an increased risk was observed for all types of cancer combined (RR 1.25; 95% CI 1.12–1.39; N = 19), for all leukaemia (RR 1.54; 95% CI 1.24–1.91; N = 15), for myeloid leukaemia (RR 1.90; 95% CI 1.41–2.55; N = 6) and for multiple myeloma (RR 1.31; 95% CI 1.02–1.67; N = 9) but not for Hodgkin's lymphoma (RR 1.23; 95% CI 0.67–2.29; N = 8) or non-Hodgkin's lymphoma (RR 1.08; 95% CI 0.86–1.35; N = 11).</span></p><p data-dcnode-id="4662"><span data-dcnode-id="4672" instrument_node="">The increases in leukaemia, myeloid leukaemia and multiple myeloma in the Zhang et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r180" data-dcnode-id="4670" href="#" role="button"><span data-dcnode-id="4671" instrument_node="">180</span></a><span data-dcnode-id="4669" instrument_node="">) study were not consistently observed in the other studies (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r63" data-dcnode-id="4667" href="#" role="button"><span data-dcnode-id="4668" instrument_node="">63</span></a><span data-dcnode-id="4666" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r175" data-dcnode-id="4664" href="#" role="button"><span data-dcnode-id="4665" instrument_node="">175</span></a><span data-dcnode-id="4663" instrument_node="">). This may be explained by the fact that, if these types of cancer are caused by formaldehyde, they appear at high levels of formaldehyde.</span></p></div><div data-dcnode-id="4618" id="ch3.s24"><h4 data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">Cancer hazard studies in occupational cohorts</span></h4><p data-dcnode-id="4633"><span data-dcnode-id="4658" instrument_node="">To obtain concentration–response relationships for formaldehyde exposures based on human experiences, the cancer risk due to formaldehyde exposure is reviewed from the three largest and recently updated occupational cohorts, which were identified from IARC (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r1" data-dcnode-id="4656" href="#" role="button"><span data-dcnode-id="4657" instrument_node="">1</span></a><span data-dcnode-id="4655" instrument_node="">), from the formaldehyde documentation for setting a health-based occupational exposure limit by the Scientific Committee on Occupational Exposure Limits (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r64" data-dcnode-id="4653" href="#" role="button"><span data-dcnode-id="4654" instrument_node="">64</span></a><span data-dcnode-id="4652" instrument_node="">) and a recent review (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r63" data-dcnode-id="4650" href="#" role="button"><span data-dcnode-id="4651" instrument_node="">63</span></a><span data-dcnode-id="4649" instrument_node="">). The NCI cohort comprised 25 619 workers employed in 10 facilities producing or using formaldehyde. Workers were employed prior to 1 January 1966 and were followed through to 31 December 1994 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r177" data-dcnode-id="4647" href="#" role="button"><span data-dcnode-id="4648" instrument_node="">177</span></a><span data-dcnode-id="4646" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r181" data-dcnode-id="4644" href="#" role="button"><span data-dcnode-id="4645" instrument_node="">181</span></a><span data-dcnode-id="4643" instrument_node="">) and recently through to 31 December 2004 for lymphohaematopoietic malignancies (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r182" data-dcnode-id="4641" href="#" role="button"><span data-dcnode-id="4642" instrument_node="">182</span></a><span data-dcnode-id="4640" instrument_node="">). A cohort from six British factories, comprising 14 014 men employed after 1937, was followed through to December 2000 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r176" data-dcnode-id="4638" href="#" role="button"><span data-dcnode-id="4639" instrument_node="">176</span></a><span data-dcnode-id="4637" instrument_node="">). The U.S. National Institute for Occupational Safety and Health (NIOSH) established a cohort of 11 039 employees in three garment facilities; the study was updated through to 31 December 1998 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r178" data-dcnode-id="4635" href="#" role="button"><span data-dcnode-id="4636" instrument_node="">178</span></a><span data-dcnode-id="4634" instrument_node="">).</span></p><p data-dcnode-id="4628"><span data-dcnode-id="4632" instrument_node="">The cancer risks obtained from the three studies are shown in </span><a class="figpopup" data-dcnode-id="4630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t3/%3Freport%3Dobjectonly" rid-figpopup="figch3t3" rid-ob="figobch3t3" target="object"><span data-dcnode-id="4631" instrument_node="">Table 3.3</span></a><span data-dcnode-id="4629" instrument_node="">. The table is limited to anatomical sites that are directly exposed to airborne formaldehyde and to other sites where excess risks have been reported.</span></p><div class="iconblock whole_rhythm clearfix ten_col table-wrap" data-dcnode-id="4619" id="figch3t3"><a class="img_link icnblk_img figpopup" data-dcnode-id="4626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t3/%3Freport%3Dobjectonly" rid-figpopup="figch3t3" rid-ob="figobch3t3" target="object" title="Table 3.3"><img alt="Table 3.3. Cancer risks from formaldehyde exposure." class="small-thumb" data-dcnode-id="4627" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t3/%3Freport%3Dthumb&amp;raw" src-large="/books/NBK138711/table/ch3.t3/?report=previmg"></a><div class="icnblk_cntnt" data-dcnode-id="4620"><h4 data-dcnode-id="4623" id="ch3.t3"><a data-dcnode-id="4624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t3/%3Freport%3Dobjectonly" rid-ob="figobch3t3" target="object"><span data-dcnode-id="4625" instrument_node="">Table 3.3</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="4621"><span data-dcnode-id="4622" instrument_node="">Cancer risks from formaldehyde exposure. </span></p></div></div></div><div data-dcnode-id="4564" id="ch3.s25"><h4 data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">Nasopharyngeal cancer</span></h4><p data-dcnode-id="4587"><span data-dcnode-id="4615" instrument_node="">The relative risk of nasopharyngeal cancer was further evaluated by four metrics: average exposure intensity (mg/m</span><sup data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">3</span></sup><span data-dcnode-id="4612" instrument_node="">), highest peak exposure (mg/m</span><sup data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">3</span></sup><span data-dcnode-id="4609" instrument_node="">), cumulative exposure (mg/m</span><sup data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">3</span></sup><span data-dcnode-id="4606" instrument_node="">-years) and duration of exposure (years). In the average exposure intensity metric and the highest peak exposure metric, RRs were obtained with the unexposed group as the reference group. In the three average intensity exposure groups, &gt; 0 to &lt; 0.63 mg/m</span><sup data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">3</span></sup><span data-dcnode-id="4603" instrument_node="">, 0.63 to &lt; 1.25 mg/m</span><sup data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">3</span></sup><span data-dcnode-id="4600" instrument_node=""> and ≥ 1.25 mg/m</span><sup data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">3</span></sup><span data-dcnode-id="4597" instrument_node="">, the respective RRs were: not obtainable (0/3640 deaths), 0.38 (1/1405 deaths) and 1.67 (6/1450 deaths). Apparently, the increased risk was due to exposures ≥ 1.25 mg/m</span><sup data-dcnode-id="4595"><span data-dcnode-id="4596" instrument_node="">3</span></sup><span data-dcnode-id="4594" instrument_node="">, although the trend was not statistically significant. With the peak exposure metric, all exposed deaths were in the highest peak exposure group (≥ 5 mg/m</span><sup data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">3</span></sup><span data-dcnode-id="4591" instrument_node="">) and the trend was statistically significant. An exposure-dependent trend was found for the cumulative exposure metric (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r181" data-dcnode-id="4589" href="#" role="button"><span data-dcnode-id="4590" instrument_node="">181</span></a><span data-dcnode-id="4588" instrument_node="">), which was apparently driven by the highest exposure level.</span></p><p data-dcnode-id="4573"><span data-dcnode-id="4586" instrument_node="">Later, it was shown that the excess occurrence of nasopharyngeal cancer in the NCI study was driven by one of the 10 plants studied, where 6 of the 10 cases occurred. In this plant, the cases might or might not have been caused by formaldehyde exposure but by other risk factors such as “silver smithing” and “silver smithing or other metal work” (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r184" data-dcnode-id="4584" href="#" role="button"><span data-dcnode-id="4585" instrument_node="">184</span></a><span data-dcnode-id="4583" instrument_node="">). The only established occupational risk factor, wood dust, was considered a priori, but dropped because of very small numbers (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r184" data-dcnode-id="4581" href="#" role="button"><span data-dcnode-id="4582" instrument_node="">184</span></a><span data-dcnode-id="4580" instrument_node="">). Additionally, a low number of nasopharyngeal cancers in the reference group can cause unstable RR estimates (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r185" data-dcnode-id="4578" href="#" role="button"><span data-dcnode-id="4579" instrument_node="">185</span></a><span data-dcnode-id="4577" instrument_node="">). However, a recent IARC working group noted that it was unlikely that confounding or bias could explain the observed association (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r186" data-dcnode-id="4575" href="#" role="button"><span data-dcnode-id="4576" instrument_node="">186</span></a><span data-dcnode-id="4574" instrument_node="">).</span></p><p data-dcnode-id="4565"><span data-dcnode-id="4572" instrument_node="">It can be considered, however, for the purposes of indoor air guideline setting, that no excess nasopharyngeal cancer was reported at a mean formaldehyde exposure level at or below 1.25 mg/m</span><sup data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">3</span></sup><span data-dcnode-id="4569" instrument_node=""> and with peak exposures below 5 mg/m</span><sup data-dcnode-id="4567"><span data-dcnode-id="4568" instrument_node="">3</span></sup><span data-dcnode-id="4566" instrument_node="">.</span></p></div><div data-dcnode-id="4446" id="ch3.s26"><h4 data-dcnode-id="4562"><span data-dcnode-id="4563" instrument_node="">Lymphohaematopoietic malignancies</span></h4><p data-dcnode-id="4554"><span data-dcnode-id="4561" instrument_node="">The NCI study also evaluated the effect of average intensity and peak exposures on the occurrence of lymphohaematopoietic malignancies leading to 178 deaths (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r177" data-dcnode-id="4559" href="#" role="button"><span data-dcnode-id="4560" instrument_node="">177</span></a><span data-dcnode-id="4558" instrument_node="">). The lowest exposure groups were used as reference for evaluation of RRs. For the average exposure intensity, the reference group comprised exposures of 0.125–0.5 mg/m</span><sup data-dcnode-id="4556"><span data-dcnode-id="4557" instrument_node="">3</span></sup><span data-dcnode-id="4555" instrument_node="">.</span></p><p data-dcnode-id="4540"><span data-dcnode-id="4553" instrument_node="">The two higher exposure groups comprised exposures of 0.6–1.1 and ≥ 1.25 mg/m</span><sup data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">3</span></sup><span data-dcnode-id="4550" instrument_node="">. Lymphohaematopoietic malignancies were significantly increased in both groups, with a borderline significant trend. Hodgkin's lymphoma was significantly increased in the 0.6–1.1-mg/m</span><sup data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">3</span></sup><span data-dcnode-id="4547" instrument_node=""> group, with a significant exposure-dependent trend. Myeloid leukaemia was significantly increased at the highest exposure level, but the trend was not significant. For the peak exposure, the exposure in the reference group was 0.125–2.4 mg/m</span><sup data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">3</span></sup><span data-dcnode-id="4544" instrument_node=""> and the exposure in the two higher exposure groups was 2.5–4.9 and 5 mg/m</span><sup data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">3</span></sup><span data-dcnode-id="4541" instrument_node="">, respectively. Significantly increased RRs were observed for lymphohaematopoietic malignancies and leukaemia in the two highest exposure groups.</span></p><p data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">In the highest exposure group, the RR for myeloid leukaemia was also increased. For these three diseases, the trend in exposure-dependent effect was statistically significant. Additionally, the exposure-dependent trend was statistically significant for Hodgkin's lymphoma. The RR for leukaemia was not significantly associated with cumulative exposure.</span></p><p data-dcnode-id="4518"><span data-dcnode-id="4537" instrument_node="">When the study by Hauptmann et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r177" data-dcnode-id="4535" href="#" role="button"><span data-dcnode-id="4536" instrument_node="">177</span></a><span data-dcnode-id="4534" instrument_node="">) was reanalysed by Marsh &amp; Youk (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r187" data-dcnode-id="4532" href="#" role="button"><span data-dcnode-id="4533" instrument_node="">187</span></a><span data-dcnode-id="4531" instrument_node="">), it was shown that excess leukaemia and myeloid leukaemia were strongly influenced by a lower death rate in the reference groups compared to the national and local county SMRs. Using the national and local ratios, the SMRs for all leukaemia and myeloid leukaemia were very close to unity and were not significantly increased in the highest peak exposure category (≥ 5 mg/m</span><sup data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">3</span></sup><span data-dcnode-id="4528" instrument_node="">). To evaluate the robustness of the categorizations, new average exposure intensity categories were constructed whereby the highest exposure category was ≥ 0.93 mg/m</span><sup data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">3</span></sup><span data-dcnode-id="4525" instrument_node="">. Again, using the national and local county rates showed that the SMRs for all leukaemia and myeloid leukaemia were very close to unity and not significantly increased. Also, in this case, cumulative formaldehyde exposures were not associated with the development of leukaemia or myeloid leukaemia. Although this reanalysis does not support a causal association between formaldehyde exposure and leukaemia and myeloid leukaemia, for indoor air guideline setting one can take into account the fact that no excess lymphohaematopoietic malignancies occurred at a mean exposure level of formaldehyde below 0.93 mg/m</span><sup data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">3</span></sup><span data-dcnode-id="4522" instrument_node=""> and where peak exposures were below 5 mg/m</span><sup data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">3</span></sup><span data-dcnode-id="4519" instrument_node="">.</span></p><p data-dcnode-id="4483"><span data-dcnode-id="4517" instrument_node="">Recently, the NCI study updated lymphohaematopoietic risks through to 31 December 2004 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r182" data-dcnode-id="4515" href="#" role="button"><span data-dcnode-id="4516" instrument_node="">182</span></a><span data-dcnode-id="4514" instrument_node="">). SMRs were estimated from the United States mortality rate (</span><a class="figpopup" data-dcnode-id="4512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t3/%3Freport%3Dobjectonly" rid-figpopup="figch3t3" rid-ob="figobch3t3" target="object"><span data-dcnode-id="4513" instrument_node="">Table 3.3</span></a><span data-dcnode-id="4511" instrument_node="">). For lymphohaematopoietic malignancies, the 319 deaths resulted in similar SMRs in exposed and unexposed people: 0.94 (95% CI 0.84–1.06) and 0.86 (95% CI 0.61–1.21), respectively. Exposure-dependent trends were evaluated from exposure categories similar to the previous follow-up. For lymphohaematopoietic malignancies in the average formaldehyde intensity metric, neither of the two highest exposure groups showed an increased RR, nor was the exposure trend statistically significant. In the new follow-up, the RR for Hodgkin's lymphoma was significantly increased in the 0.63- to &lt; 1.25-mg/m</span><sup data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">3</span></sup><span data-dcnode-id="4508" instrument_node=""> group but not in the highest exposure group (≥ 1.25 mg/m</span><sup data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node="">3</span></sup><span data-dcnode-id="4505" instrument_node="">). The trend was statistically significant. Similar results appeared in the previous follow-up. Multiple myeloma was significantly increased among the non-exposed but not in the exposed groups. In the previous follow-up, the increase was not significant. In the peak exposure metric, lymphohaematopoietic malignancies were increased significantly in the highest exposure group (≥ 5 mg/m</span><sup data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">3</span></sup><span data-dcnode-id="4502" instrument_node="">) and the trend was significant. Apparently, it is driven by the highest exposure group. Thus, the RR in the next highest exposure group was not remarkably increased (1.17 (95% CI 0.86–1.59)) and close to the RR among the unexposed, which was 1.07 (95% CI 0.7–1.62). In the previous follow-up, the RRs in the two highest exposure groups were similar (1.71 and 1.87, respectively) and significantly increased in both groups. The trend was also significant. In the new follow-up, the RR of Hodgkin's lymphoma was increased significantly in the two highest exposure groups: 3.30 (95% CI 1.04–10.50) in the 2.5- to &lt; 5.0-mg/m</span><sup data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">3</span></sup><span data-dcnode-id="4499" instrument_node=""> group and 3.96 (95% CI 1.31–12.02) in the ≥ 5-mg/m</span><sup data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">3</span></sup><span data-dcnode-id="4496" instrument_node=""> group) with an exposure-dependent trend. In the previous follow-up, the trend was increased significantly but the RRs were approximately of the same size as in the recent follow-up. Except for a statistically increased RR of multiple myeloma in the non-exposed, no other remarkable RR appeared in the peak exposure group in the new follow-up study. For example, the RRs for multiple myeloma were 2.74 (95% CI 1.18–6.37) among the non-exposed, 1.0 in the reference group (≥ 0.13 to &lt; 2.5 mg/m</span><sup data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">3</span></sup><span data-dcnode-id="4493" instrument_node="">), 1.65 (95% CI 0.79–3.61) in the 2.5- to &lt; 5.0-mg/m</span><sup data-dcnode-id="4491"><span data-dcnode-id="4492" instrument_node="">3</span></sup><span data-dcnode-id="4490" instrument_node=""> group and 2.04 (95% CI 1.01–4.12) in the highest peak exposure group (≥ 5 mg/m</span><sup data-dcnode-id="4488"><span data-dcnode-id="4489" instrument_node="">3</span></sup><span data-dcnode-id="4487" instrument_node="">) with no exposure-dependent trend. In this case, the RRs in the exposed groups were lower than in the non-exposed group, which does not support a formaldehyde-dependent effect. In the similar peak exposure groups, the RRs of myeloid leukaemia were 0.82 (95% CI 0.25–2.67), 1.0, 1.30 (95% CI 0.58–2.92) and 1.78 (95% CI 0.87–3.64) with a non-significant trend. In the earlier follow-up, myeloid leukaemia was significantly increased in the highest exposure group (3.46 (95% CI 1.27–9.43)) with a highly significant trend (</span><i data-dcnode-id="4485"><span data-dcnode-id="4486" instrument_node="">P</span></i><span data-dcnode-id="4484" instrument_node=""> ≤ 0.009).</span></p><p data-dcnode-id="4469"><span data-dcnode-id="4482" instrument_node="">Summarizing the NCI study, it is of note that the RRs for Hodgkin's lymphoma increase abruptly from that in the reference group (peak exposure &gt; 0 to &lt; 2.5 mg/m</span><sup data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">3</span></sup><span data-dcnode-id="4479" instrument_node=""> and average intensity &gt; 0 to &lt; 0.63 mg/m</span><sup data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">3</span></sup><span data-dcnode-id="4476" instrument_node="">). Overall, as the RRs in the reference group and the non-exposed group were not significantly different, an exposure guideline for formaldehyde should consider that peak exposures should be below 2.5 mg/m</span><sup data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">3</span></sup><span data-dcnode-id="4473" instrument_node=""> and average exposures below 0.63 mg/m</span><sup data-dcnode-id="4471"><span data-dcnode-id="4472" instrument_node="">3</span></sup><span data-dcnode-id="4470" instrument_node=""> to protect against lymphohaematopoietic malignancies in general.</span></p><p data-dcnode-id="4452"><span data-dcnode-id="4468" instrument_node="">The United Kingdom cohort from six British factories comprised 14 014 men employed after 1937 and followed through to December 2000 (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r176" data-dcnode-id="4466" href="#" role="button"><span data-dcnode-id="4467" instrument_node="">176</span></a><span data-dcnode-id="4465" instrument_node="">). By the end of the follow-up, 5185 of the men had died. The overall mortality from all cancers was slightly higher than expected from national death rates (SMR 1.10; 95% CI 1.04–1.16), as was that from lung cancer (SMR 1.22; 95% CI 1.12–1.32) and from stomach cancer (SMR 1.31; 95% CI 1.11–1.54) (see </span><a class="figpopup" data-dcnode-id="4463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK138711/table/ch3.t3/%3Freport%3Dobjectonly" rid-figpopup="figch3t3" rid-ob="figobch3t3" target="object"><span data-dcnode-id="4464" instrument_node="">Table 3.3</span></a><span data-dcnode-id="4462" instrument_node="">). Lung and stomach cancers were further analysed using the local geographical variations in mortality. Lung cancer increased significantly (SMR 1.28; 95% CI 1.13–1.44) only in the highest exposed group where the formaldehyde level was greater than 2.5 mg/m</span><sup data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">3</span></sup><span data-dcnode-id="4459" instrument_node="">. No trend was seen at lower levels and, for example, the SMR in the range 0.75–2.5 mg/m</span><sup data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node="">3</span></sup><span data-dcnode-id="4456" instrument_node=""> was 0.99 (95% CI 0.74–1.30). However, there was a statistically non-significant decrease in the risk of death from lung cancer with duration of high exposure. The risk showed no increasing trend with time since first exposure. The authors interpreted lung cancer in the highest exposed group to be “rather large to be explained simply by a confounding effect of smoking” (which was not taken into account). Using the local mortality rate, stomach cancer was not exposure-dependent and was considered by the authors to be a less plausible outcome. For setting an indoor air guideline, the key information from this study is that no increase in lung cancer was apparent at formaldehyde levels of 5 mg/m</span><sup data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">3</span></sup><span data-dcnode-id="4453" instrument_node=""> or lower. No results on peak exposures and risk for myeloid leukaemia were provided.</span></p><p data-dcnode-id="4447"><span data-dcnode-id="4451" instrument_node="">NIOSH established a cohort of 11 039 employees in three garment facilities (The USA garment worker cohort). The study was updated through to 31 December 1998, by which time 2206 of the employees had died. The mortality from all malignant neoplasms was significantly less than expected (SMR 0.89; 95% CI 0.82–0.97), as was that for all digestive neoplasms (SMR 0.77; 95% CI 0.63–0.92). Myeloid leukaemia (ICD-9: 205) was significantly increased (13 deaths; SMR 1.91) after 20 or more years since first exposure, but the trend was not significant. Among workers with both 10 or more years of exposure and 20 years or more since first exposure, multiple-cause mortality from leukaemia was significantly increased almost two-fold (15 deaths; SMR 1.92; 95% CI 1.08–3.17). In addition to underlying cause of death, all causes listed on the death certificate were analysed using multiple cause mortality. Multiple cause mortality from myeloid leukaemia was significantly increased among this group (8 deaths; SMR 2.55; 95% CI 1.10–5.03) (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r178" data-dcnode-id="4449" href="#" role="button"><span data-dcnode-id="4450" instrument_node="">178</span></a><span data-dcnode-id="4448" instrument_node="">).</span></p></div><div data-dcnode-id="4287" id="ch3.s27"><h4 data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">Recent studies on lymphohaematopoietic effects</span></h4><p data-dcnode-id="4436"><span data-dcnode-id="4443" instrument_node="">Haematopoietic tissue damage was studied in 43 formaldehyde-exposed workers and 51 controls. The 8-hour time-weighted average was 1.6 and 0.03 mg/m</span><sup data-dcnode-id="4441"><span data-dcnode-id="4442" instrument_node="">3</span></sup><span data-dcnode-id="4440" instrument_node=""> and the 90 percentile 3.14 and 0.03 mg/m</span><sup data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">3</span></sup><span data-dcnode-id="4437" instrument_node="">, respectively. Peak exposure concentrations were not reported. Formaldehyde exposures were associated with reduced blood lymphocyte, granulocyte, platelet, red blood cell and total white blood cell counts; the total white blood cell count was reduced by 13.5% in the formaldehyde-exposed workers. Urinary benzene concentrations were low in both groups, thus excluding benzene exposure as a confounder. The findings were considered consistent with a bone-marrow-toxic effect due to formaldehyde. Peripheral blood cells from formaldehyde-exposed and control workers were cultivated to derive blood myeloid progenitor cells. The colony formation fell non-significantly by 20% in the formaldehyde-exposed workers and this was considered a toxic effect on the myeloid progenitor cells. Blood mononuclear cells from volunteers were cultivated in vitro to derive different lines of progenitor cells.</span></p><p data-dcnode-id="4419"><span data-dcnode-id="4435" instrument_node="">The addition of different dilutions of formalin to the cultures showed that formaldehyde reduced the number of generated colonies from all progenitor cell lines. This showed that formaldehyde can inhibit the proliferation of all progenitor cells if the endogenous formaldehyde level is increased due to formaldehyde exposure. Blood progenitor cells of the myeloid line were derived from 10 highly exposed workers (8-hour time-weighted median concentration 2.67 mg/m</span><sup data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">3</span></sup><span data-dcnode-id="4432" instrument_node=""> and 90th percentile 5.18 mg/m</span><sup data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">3</span></sup><span data-dcnode-id="4429" instrument_node="">) and 12 controls (8-hour time-weighted median concentration 0.03 mg/m</span><sup data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">3</span></sup><span data-dcnode-id="4426" instrument_node=""> and 90th percentile 0.03 mg/m</span><sup data-dcnode-id="4424"><span data-dcnode-id="4425" instrument_node="">3</span></sup><span data-dcnode-id="4423" instrument_node="">). Formaldehyde-exposed workers showed increased monosomy (loss) of chromosome 7 and an increase in trisomy of chromosome 8; these cytogenic changes are observed in myeloid leukaemia and myelodysplastic syndromes (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r154" data-dcnode-id="4421" href="#" role="button"><span data-dcnode-id="4422" instrument_node="">154</span></a><span data-dcnode-id="4420" instrument_node="">).</span></p><p data-dcnode-id="4405"><span data-dcnode-id="4418" instrument_node="">It should be noted that the study has limitations in relation to risk assessment of formaldehyde exposure at indoor air concentrations. First, the exposures are extremely high and thus the unreported peak exposure concentrations may have been at extremes. Second, no exposure–response relationship is established. Third, the very high exposure concentrations may be expected to cause mucosal damage that may influence both the nasal metabolism and absorption into the blood compartment; no information is available on the mucosal tissue. Fourth, the in vitro cell culture study is relevant for mechanistic considerations only, because no increase in formaldehyde has been observed in the blood compartment of humans due to formaldehyde exposure. This is supported by model calculations at about 2.5 mg/m</span><sup data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">3</span></sup><span data-dcnode-id="4415" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r50" data-dcnode-id="4413" href="#" role="button"><span data-dcnode-id="4414" instrument_node="">50</span></a><span data-dcnode-id="4412" instrument_node="">). Similar results were reached for extrapolations up to 12.5 mg/m</span><sup data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">3</span></sup><span data-dcnode-id="4409" instrument_node="">, but such extrapolations may be invalidated by the toxic effects on the mucosal membrane above 2.5 mg/m</span><sup data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">3</span></sup><span data-dcnode-id="4406" instrument_node="">. Overall, the interpretation of this study in relation to risk assessment is unclear. For the sake of transparency, it would have been desirable that all measured exposures other than to formaldehyde had been reported.</span></p><p data-dcnode-id="4385"><span data-dcnode-id="4404" instrument_node="">In a case-control study in the United States (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r157" data-dcnode-id="4402" href="#" role="button"><span data-dcnode-id="4403" instrument_node="">157</span></a><span data-dcnode-id="4401" instrument_node="">), 168 professionals employed in the funeral industry who died from lymphohaematopoietic malignancies were compared with 265 deceased matched controls from the same industry. The 8-hour time-weighted average formaldehyde intensity was about 0.125–2.5 mg/m</span><sup data-dcnode-id="4399"><span data-dcnode-id="4400" instrument_node="">3</span></sup><span data-dcnode-id="4398" instrument_node="">, the average intensity while embalming was about 1.9–2.25 mg/m</span><sup data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">3</span></sup><span data-dcnode-id="4395" instrument_node=""> and peak exposure was about 10–13 mg/m</span><sup data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">3</span></sup><span data-dcnode-id="4392" instrument_node="">. Four people died from nasopharyngeal cancer, but only two had been involved in embalming (OR 0.1 (95% CI 0.01–1.2)). No increase was observed in lymphoid malignancies (ICD-8 200–204), including Hodgkin's lymphoma (OR 0.5 (95% CI 0.1–2.6)), which was consistently elevated in the previous industrial cohort studies (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r177" data-dcnode-id="4390" href="#" role="button"><span data-dcnode-id="4391" instrument_node="">177</span></a><span data-dcnode-id="4389" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r182" data-dcnode-id="4387" href="#" role="button"><span data-dcnode-id="4388" instrument_node="">182</span></a><span data-dcnode-id="4386" instrument_node="">). The study observed a specific association between embalming and myeloid leukaemia (ICD-8 205). Thus, using a reference group of newer exposed with one case subject, the OR was 11.2 (95% CI 1.3–95.6).</span></p><p data-dcnode-id="4347"><span data-dcnode-id="4384" instrument_node="">The first analysis of myeloid leukaemia used a reference group of subjects that had not performed embalming. The duration of working in jobs that involved embalming showed a significant trend (</span><i data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">P</span></i><span data-dcnode-id="4381" instrument_node=""> = 0.02): in the categories &gt; 0–20, &gt; 20–34 and &gt; 34 years, the OR was 5.0 (95% CI 0.5–51.6), 12.9 (95% CI 1.4–117.1) and 13.6 (95% CI 1.6–119.7), respectively. No significant trend was observed with the number of embalmings. However, several significant ORs were observed. Thus, the number of performed embalmings were divided into &gt; 0–1422, &gt; 1422–3068 and &gt; 3068, where the OR was 7.6 (95% CI 0.8–73.5), 12.7 (95% CI 1.4–116.7) and 12.7 (95% CI 1.4–112.8), respectively. Exposure–response relationships for the different formaldehyde metrics were established. The peak exposure metric was the only metric that showed a significant trend (</span><i data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">P</span></i><span data-dcnode-id="4378" instrument_node=""> = 0.036). Peak formaldehyde exposures were divided into &gt; 0–8.75 mg/m</span><sup data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node="">3</span></sup><span data-dcnode-id="4375" instrument_node="">, &gt; 8.75–11.6 mg/m</span><sup data-dcnode-id="4373"><span data-dcnode-id="4374" instrument_node="">3</span></sup><span data-dcnode-id="4372" instrument_node=""> and &gt; 11.6 mg/m</span><sup data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">3</span></sup><span data-dcnode-id="4369" instrument_node="">, where the OR was 15.2 (95% CI 1.6–141.6), 8.0 (95% CI 0.9–74.0) and 13.0 (95% CI 1.4–116.9), respectively. The cumulative formaldehyde exposures (mg/m</span><sup data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">3</span></sup><span data-dcnode-id="4366" instrument_node="">-hours) were divided into &gt; 0–5073, &gt; 5073–11 566 and &gt; 11 566, where the OR was 10.2 (95% CI 1.1–95.6), 9.4 (95% CI 1.0–85.7) and 13.2 (95% CI 1.5–115.4), respectively. The average formaldehyde intensity while embalming was &gt; 0–1.75 mg/m</span><sup data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">3</span></sup><span data-dcnode-id="4363" instrument_node="">, &gt; 1.75–2.38 mg/m</span><sup data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">3</span></sup><span data-dcnode-id="4360" instrument_node=""> and &gt; 2.38 mg/m</span><sup data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">3</span></sup><span data-dcnode-id="4357" instrument_node="">, where the OR was 11.1 (95% CI 1.2–106.3), 14.8 (95% CI 1.6–136.9) and 9.5 (95% CI 1.1–86.0), respectively. The 8-hour time-weighted formaldehyde intensity was divided into &gt; 0–0.125 mg/m</span><sup data-dcnode-id="4355"><span data-dcnode-id="4356" instrument_node="">3</span></sup><span data-dcnode-id="4354" instrument_node="">, &gt; 0.125–0.225 mg/m</span><sup data-dcnode-id="4352"><span data-dcnode-id="4353" instrument_node="">3</span></sup><span data-dcnode-id="4351" instrument_node=""> and &gt; 0.225 mg/m</span><sup data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">3</span></sup><span data-dcnode-id="4348" instrument_node="">, where the OR was 8.4 (95% CI 0.8–79.3), 13.6 (95% CI 1.5–125.8) and 12.0 (95% CI 1.3–107.4), respectively. The cumulative formaldehyde exposure, the average formaldehyde intensity while embalming and the 8-hour time-weighted average intensity showed no statistically significant formaldehyde exposure-dependent trend. It is noted that, within each of the formaldehyde exposure metrics, the ORs showed little difference and had highly overlapping confidence intervals. This suggests that the statistical significances are driven mainly by exposure vs non-exposure and less by differences in exposure levels. Also, in each of the formaldehyde metrics, none of the trend tests within the formaldehyde groups themselves was statistically significant.</span></p><p data-dcnode-id="4345"><span data-dcnode-id="4346" instrument_node="">Because of the small number of exposed cases and related instability of the reference group, the authors performed additional exposure–response analyses with a larger reference group, including subjects with low exposure. The second analysis of myeloid leukaemia used a reference group whose members had performed fewer than 500 lifetime embalmings, allowing 5 case subjects in the reference group.</span></p><p data-dcnode-id="4340"><span data-dcnode-id="4344" instrument_node="">The duration of working in jobs with embalming showed a significant trend (</span><i data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">P</span></i><span data-dcnode-id="4341" instrument_node=""> = 0.02). In the categories &lt; 20, &gt; 20–34 and &gt; 34 years, the OR was 0.5 (95% CI 0.1–2.9), 3.2 (95% CI 1.0–10.1) and 3.9 (95% CI 1.2–12.5), respectively. No significant trend was observed with the number of embalmings, but significant ORs were observed at the highest exposure level. Thus, the numbers of performed embalmings were divided into ≥ 500–1422, &gt; 1422–3068 and &gt; 3068, where the OR was 1.2 (95% CI 0.3–5.5), 2.9 (95% CI 0.9–9.1) and 3.0 (95% CI 1.0–9.2), respectively.</span></p><p data-dcnode-id="4323"><span data-dcnode-id="4339" instrument_node="">The peak exposure metric was the only formaldehyde metric that showed a significant trend (</span><i data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">P</span></i><span data-dcnode-id="4336" instrument_node=""> = 0.036). Peak formaldehyde exposures were divided into ≤ 8.75 mg/m</span><sup data-dcnode-id="4334"><span data-dcnode-id="4335" instrument_node="">3</span></sup><span data-dcnode-id="4333" instrument_node="">, &gt; 8.75–11.6 mg/m</span><sup data-dcnode-id="4331"><span data-dcnode-id="4332" instrument_node="">3</span></sup><span data-dcnode-id="4330" instrument_node=""> and ≥ 11.6 mg/m</span><sup data-dcnode-id="4328"><span data-dcnode-id="4329" instrument_node="">3</span></sup><span data-dcnode-id="4327" instrument_node="">, where the OR was 2.9 (95% CI 0.9–9.8), 2.0 (95% CI 0.6–6.6) and 2.9 (95% CI 0.9–9.5), respectively. The trend was not statistically significant in the cumulative formaldehyde exposure, the average formaldehyde intensity while embalming and the 8-hour time-weighted intensity group. Only the highest cumulative formaldehyde exposure group (&gt; 11 566 mg/m</span><sup data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">3</span></sup><span data-dcnode-id="4324" instrument_node="">-hours) had a statistically elevated OR of 3.1 (95% CI 1.0–9.6). Except for this, the ORs were elevated (2.0–2.9) and very similar within each of the metrics, but none was significantly increased.</span></p><p data-dcnode-id="4321"><span data-dcnode-id="4322" instrument_node="">Also, in each of the metrics, none of the trend tests within the formaldehyde groups themselves was statistically significant. It is noted that the overall picture was similar to that in the first analysis except for the fact that the ORs fell by one third in this analysis, where a higher number of case subjects were available in the control group. Only one significant OR appeared in the formaldehyde exposure metrics, which was in strong contrast to the 10 significantly elevated ORs in the first analysis.</span></p><p data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">It is noted that there is a lack of exposure-dependent differences in OR within the different formaldehyde exposure levels in the different metrics. A lack of exposure-dependent effect could be due either to an inappropriate exposure assessment or to a lack of causality between formaldehyde exposure and myeloid leukaemia; the reference groups contained a low number of case subjects. The method of formaldehyde exposure has limitations, as the estimates were predicted by means of interviews and mathematical modelling rather than being based on measured exposures. Also, it is mentioned by the authors that the peak model was not validated. On the whole, this study cannot be used for risk assessment as it does not provide a convincing exposure–response relationship.</span></p><p data-dcnode-id="4305"><span data-dcnode-id="4318" instrument_node="">Comparison of the Zhang et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r156" data-dcnode-id="4316" href="#" role="button"><span data-dcnode-id="4317" instrument_node="">156</span></a><span data-dcnode-id="4315" instrument_node="">) and the Hauptmann et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r157" data-dcnode-id="4313" href="#" role="button"><span data-dcnode-id="4314" instrument_node="">157</span></a><span data-dcnode-id="4312" instrument_node="">) studies reveals some differences. The Zhang et al. study suggests an effect on all progenitor cells that results in decreased production of lymphocytes, granulocytes, platelets and red blood cells. Similar results were obtained from the in vitro cell cultures with different progenitor cell lines. In the Hauptmann et al. study, the effect was selective at the myeloid progenitor line. Overall, these studies have very high exposure intensities and thus do not contradict the fact that lymphohaematopoietic malignancies are not observed at lower levels, as derived from the 2003 study by Hauptmann et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r177" data-dcnode-id="4310" href="#" role="button"><span data-dcnode-id="4311" instrument_node="">177</span></a><span data-dcnode-id="4309" instrument_node="">) and its re-analysis by Marsh &amp; Youk (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r187" data-dcnode-id="4307" href="#" role="button"><span data-dcnode-id="4308" instrument_node="">187</span></a><span data-dcnode-id="4306" instrument_node="">).</span></p><p data-dcnode-id="4288"><span data-dcnode-id="4304" instrument_node="">The meta-analysis based on the highest exposure levels reported that formaldehyde caused leukaemia and especially myeloid leukaemia (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r180" data-dcnode-id="4302" href="#" role="button"><span data-dcnode-id="4303" instrument_node="">180</span></a><span data-dcnode-id="4301" instrument_node="">). Three hypotheses were proposed. First, formaldehyde could be transported by the blood to the bone marrow, where it could cause initiation in a stem or progenitor cell. Second, as a portion of the bone marrow stem and progenitor cells circulate in the peripheral blood, they may be initiated by formaldehyde absorbed into the blood. Third, initiation of the primitive pluripotent stem cells presented within the nasal mucosa could occur, followed by transport to the bone marrow. Similar arguments were analysed by Pyatt et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r173" data-dcnode-id="4299" href="#" role="button"><span data-dcnode-id="4300" instrument_node="">173</span></a><span data-dcnode-id="4298" instrument_node="">) and the two first hypotheses were not considered likely owing to the negligible amount of formaldehyde reaching the blood. However, nasal (portal-of-entry) effects caused by high formaldehyde exposure levels could be a plausible mechanism for Hodgkin's lymphoma. However, this was not consistent with the Zhang et al. meta-analysis (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r180" data-dcnode-id="4296" href="#" role="button"><span data-dcnode-id="4297" instrument_node="">180</span></a><span data-dcnode-id="4295" instrument_node="">). In summary, potentially offending levels can be considered to be in the range where formaldehyde has shown nasal effects in rats, as no lymphohaematopoietic malignancies were observed with mean exposures below 0.63 mg/m</span><sup data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">3</span></sup><span data-dcnode-id="4292" instrument_node=""> and peak exposures below 2.5 mg/m</span><sup data-dcnode-id="4290"><span data-dcnode-id="4291" instrument_node="">3</span></sup><span data-dcnode-id="4289" instrument_node="">, if caused by formaldehyde at all.</span></p></div><div data-dcnode-id="4150" id="ch3.s28"><h4 data-dcnode-id="4285"><span data-dcnode-id="4286" instrument_node="">Prediction of nasal cancer</span></h4><p data-dcnode-id="4268"><span data-dcnode-id="4284" instrument_node="">Formaldehyde can induce squamous cell carcinoma of the nasal cavity in rats. As a nasal effect would be consistent across species, it is considered the key to setting an indoor air guideline for carcinogenic effects of formaldehyde. The NOAEL approach for setting a guideline value is based mainly on the strongly non-linear relationship between formaldehyde exposure and development of squamous cell carcinoma in rats, largely corroborated by epidemiological studies. This approach accepts that the fall-off of the carcinogenic effect is so rapid that the observed NOAEL resembles a true NOAEL. Accepting these arguments, an indoor air guideline value can be set by dividing the appropriate NOAEL by one or more assessment factors (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r159" data-dcnode-id="4282" href="#" role="button"><span data-dcnode-id="4283" instrument_node="">159</span></a><span data-dcnode-id="4281" instrument_node="">). This approach considers the NOAEL for squamous cell carcinoma in rats (2.5 mg/m</span><sup data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node="">3</span></sup><span data-dcnode-id="4278" instrument_node="">), the NOAEL for nasal cytotoxicity in rats (1.25 mg/m</span><sup data-dcnode-id="4276"><span data-dcnode-id="4277" instrument_node="">3</span></sup><span data-dcnode-id="4275" instrument_node="">) and the potential development of malignancies in humans, which have not been encountered at mean exposures below 0.63 mg/m</span><sup data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">3</span></sup><span data-dcnode-id="4272" instrument_node=""> and peak exposures below 2.5 mg/m</span><sup data-dcnode-id="4270"><span data-dcnode-id="4271" instrument_node="">3</span></sup><span data-dcnode-id="4269" instrument_node=""> formaldehyde.</span></p><p data-dcnode-id="4245"><span data-dcnode-id="4267" instrument_node="">To obtain a deeper knowledge and thus a better risk assessment, a biologically motivated model has been developed that models exposures by computational fluid dynamics and the development of cancer from a two-stage clonal growth model (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r17" data-dcnode-id="4265" href="#" role="button"><span data-dcnode-id="4266" instrument_node="">17</span></a><span data-dcnode-id="4264" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r167" data-dcnode-id="4262" href="#" role="button"><span data-dcnode-id="4263" instrument_node="">167</span></a><span data-dcnode-id="4261" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r188" data-dcnode-id="4259" href="#" role="button"><span data-dcnode-id="4260" instrument_node="">188</span></a><span data-dcnode-id="4258" instrument_node="">). Formaldehyde was assumed to act as a direct mutagen with the effect considered proportional to the concentration of the pro-mutagenic DPX lesion. The DPX formation is considered linearly related to the formaldehyde concentration; the linear relation between formaldehyde and DPX concentrations can be considered a worst-case scenario in the low-dose range. At high concentrations, the model includes that cytolethality is followed by cell proliferation. Mutations are considered to occur during cell division, and a tumour cell arises when an initiated cell (modelled by DPX levels) acquires a second mutation (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r17" data-dcnode-id="4256" href="#" role="button"><span data-dcnode-id="4257" instrument_node="">17</span></a><span data-dcnode-id="4255" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r167" data-dcnode-id="4253" href="#" role="button"><span data-dcnode-id="4254" instrument_node="">167</span></a><span data-dcnode-id="4252" instrument_node="">). The relationship between formaldehyde exposure and the average cell division rate was J-shaped in rats. The rapid increase in cell proliferation occurred at a level that was not significantly different from a threshold model with a NOAEL set above 2.5 mg/m</span><sup data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">3</span></sup><span data-dcnode-id="4249" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r167" data-dcnode-id="4247" href="#" role="button"><span data-dcnode-id="4248" instrument_node="">167</span></a><span data-dcnode-id="4246" instrument_node="">). The two-stage clonal growth model was shown to predict nasal tumours in rats using a lifetime cumulative probability of squamous cell carcinoma with 13 animals with squamous cell carcinoma among 7684 control rats from the U.S. National Toxicology Program historical control database, and where several of the parameters were estimated from the best fit of the model to the experimental data.</span></p><p data-dcnode-id="4219"><span data-dcnode-id="4244" instrument_node="">The biologically motivated model was extended to humans and took into account that humans are oronasal breathers (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r17" data-dcnode-id="4242" href="#" role="button"><span data-dcnode-id="4243" instrument_node="">17</span></a><span data-dcnode-id="4241" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r188" data-dcnode-id="4239" href="#" role="button"><span data-dcnode-id="4240" instrument_node="">188</span></a><span data-dcnode-id="4238" instrument_node="">). For the general population, the predicted additional risk of upper respiratory tract cancer for non-smokers, associated with an 80-year continuous exposure to 0.125 mg/m</span><sup data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">3</span></sup><span data-dcnode-id="4235" instrument_node=""> formaldehyde, was about 2.7 × 10</span><sup data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">–8</span></sup><span data-dcnode-id="4232" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r17" data-dcnode-id="4230" href="#" role="button"><span data-dcnode-id="4231" instrument_node="">17</span></a><span data-dcnode-id="4229" instrument_node="">). The additional risk was estimated to be 10</span><sup data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">–6</span></sup><span data-dcnode-id="4226" instrument_node=""> or less for non-smokers exposed continuously to 0.25 mg/m</span><sup data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">3</span></sup><span data-dcnode-id="4223" instrument_node=""> formaldehyde (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r188" data-dcnode-id="4221" href="#" role="button"><span data-dcnode-id="4222" instrument_node="">188</span></a><span data-dcnode-id="4220" instrument_node="">).</span></p><p data-dcnode-id="4184"><span data-dcnode-id="4218" instrument_node="">The robustness of the model has been challenged by sensitivity analyses (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r189" data-dcnode-id="4216" href="#" role="button"><span data-dcnode-id="4217" instrument_node="">189</span></a><span data-dcnode-id="4215" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r191" data-dcnode-id="4213" href="#" role="button"><span data-dcnode-id="4214" instrument_node="">191</span></a><span data-dcnode-id="4212" instrument_node="">). Thus, the estimate is sensitive to the DPX half-life in the nose (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r190" data-dcnode-id="4210" href="#" role="button"><span data-dcnode-id="4211" instrument_node="">190</span></a><span data-dcnode-id="4209" instrument_node="">); the DPX half-life was accepted as 1.78 hours in the 2003 study by Conolly et al. (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r167" data-dcnode-id="4207" href="#" role="button"><span data-dcnode-id="4208" instrument_node="">167</span></a><span data-dcnode-id="4206" instrument_node="">) that was based on in vivo rat studies, but it was assumed to be 12.3 hours in the sensitivity analysis (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r190" data-dcnode-id="4204" href="#" role="button"><span data-dcnode-id="4205" instrument_node="">190</span></a><span data-dcnode-id="4203" instrument_node="">) on the basis of the half-life in immortalized cell lines (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r192" data-dcnode-id="4201" href="#" role="button"><span data-dcnode-id="4202" instrument_node="">192</span></a><span data-dcnode-id="4200" instrument_node="">). The estimated risks were sensitive to the incidence of squamous cell carcinoma in the rat control group data (</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r189" data-dcnode-id="4198" href="#" role="button"><span data-dcnode-id="4199" instrument_node="">189</span></a><span data-dcnode-id="4197" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#ch3.r190" data-dcnode-id="4195" href="#" role="button"><span data-dcnode-id="4196" instrument_node="">1
