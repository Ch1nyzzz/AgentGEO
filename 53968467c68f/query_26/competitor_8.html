</span><p data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">Our health depends upon clean water and air, but we tend to take these precious resources for granted until we wake up one day and realize they may not be so pure after all.</span></p><span data-dcnode-id="2730" instrument_node="">
</span><p data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">And that’s happening more and more – a city discovers lead in their drinking water, a natural disaster breaches the water supply, allowing impurities to contaminate the water or wastes from a concentrated animal feeding operation (CAFO) near your home has infiltrated your water source.</span></p><span data-dcnode-id="2727" instrument_node="">
</span><p data-dcnode-id="2722"><span data-dcnode-id="2726" instrument_node="">The reality is, there is some type of contaminant in many peoples’ water supply </span><em data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">most of the time</span></em><span data-dcnode-id="2723" instrument_node="">.</span></p><span data-dcnode-id="2721" instrument_node="">
</span><p data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">Questionable data collection, lax enforcement of the law and cities gaming the system have created a plethora of contaminant violations – and unsafe drinking water – for millions of people across the nation.</span></p><span data-dcnode-id="2718" instrument_node="">
</span><p data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">In fact, some of the worst impurities – like chlorine and fluoride – are added by municipalities in the name of clean water or good health.</span></p><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">Most contaminants aren’t visible to the naked eye, so it’s hard to tell how polluted your drinking water or air may be.</span></p><span data-dcnode-id="2712" instrument_node="">
</span><p data-dcnode-id="2707"><span data-dcnode-id="2711" instrument_node="">Take the air you breathe for example... While many people think of outdoor air when they hear ‘air pollution,’ the EPA has determined that </span><em data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">indoor</span></em><span data-dcnode-id="2708" instrument_node=""> air can contain two to five times, and potentially as much as 100 times, more contaminants than the air outdoors.</span></p><span data-dcnode-id="2706" instrument_node="">
</span><p data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">That doesn’t even include the potential for viruses, bacteria or mold in your air.</span></p><span data-dcnode-id="2703" instrument_node="">
</span><p data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Indoor air pollution has truly become one of the most serious environmental threats to your health. Yet, no government agency monitors or controls it, and studies on its health effects are limited.</span></p><span data-dcnode-id="2700" instrument_node="">
</span><p data-dcnode-id="2695"><span data-dcnode-id="2699" instrument_node="">To protect yourself and your family from the potential hazards of impure drinking water and dirty indoor air, </span><em data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">you must take matters into your own hands</span></em><span data-dcnode-id="2696" instrument_node="">.</span></p><span data-dcnode-id="2694" instrument_node="">
</span><p data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">Because of how critical clean air and water are to your health and well-being, we have solutions to fit everyone’s needs. Whether you live in an apartment or a house, rent or own, or spend much of your time traveling, clean water and indoor air can be yours.</span></p><span data-dcnode-id="2691" instrument_node="">
</span><figure class="extended center" data-dcnode-id="2686"><span data-dcnode-id="2690" instrument_node="">
</span><div data-dcnode-id="2688"><img alt="Close up photo of young man pouring water from faucet" class="rs-wide" data-dcnode-id="2689" data-src="//media.mercolamarket.com/assets/images/air-purifier/close-up-of-pouring-water-from-faucet.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.mercolamarket.com/airpurifier&amp;raw"></div><span data-dcnode-id="2687" instrument_node="">
</span></figure><span data-dcnode-id="2685" instrument_node="">
</span><h3 data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Your Water Supply May Not Be as Pure as You Think</span></h3><span data-dcnode-id="2682" instrument_node="">
</span><p data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Many people drink water directly from their tap, assuming that if it looks and tastes clean, it must be safe to drink.</span></p><span data-dcnode-id="2679" instrument_node="">
</span><p data-dcnode-id="2674"><span data-dcnode-id="2678" instrument_node="">Unfortunately, appearance and taste can be deceiving. Your water coming from public water sources is likely far more contaminated than you think </span><em data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">and not as pure as they claim</span></em><span data-dcnode-id="2675" instrument_node="">. The Environmental Working Group (EWG) recently proved it.</span></p><span data-dcnode-id="2673" instrument_node="">
</span><p data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">Testing for 500 different contaminants and analyzing tests from nearly 50,000 US water utilities in all 50 states, the EWG discovered 267 contaminants coming out of the average faucet.</span></p><span data-dcnode-id="2670" instrument_node="">
</span><p data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">Bottled water isn’t much better. Plastic water bottles may be convenient, but they have catastrophic consequences for the environment – and your health.</span></p><span data-dcnode-id="2667" instrument_node="">
</span><p data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">The most recent test of 47 bottled water brands, including both noncarbonated and carbonated varieties, revealed a significant problem with contamination from fluorinated chemicals known as perfluoroalkyl chemicals (PFAS), including the old “Teflon” chemicals, PFOA and PFOS.</span></p><span data-dcnode-id="2664" instrument_node="">
</span><p data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Effects on health from exposure to PFAS include liver toxicity, tumors, hypothyroidism, high cholesterol, obesity, hormone disruption, neurobehavioral effects, neonatal toxicity and death and immune system disruption.</span></p><span data-dcnode-id="2661" instrument_node="">
</span><p data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">Other tests reveal bottled water contains nearly twice as much microplastic particles as tap water. Researchers believe they come from not only the water itself but also from the bottle and cap manufacturing process.</span></p><span data-dcnode-id="2658" instrument_node="">
</span><p data-dcnode-id="2653"><span data-dcnode-id="2657" instrument_node="">When researchers tested 259 bottles of 11 popular bottled water brands, they found </span><em data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">on average 325 pieces of microplastic per liter of bottled water</span></em><span data-dcnode-id="2654" instrument_node="">. Only 17 of the 259 bottles were free of particles. One top brand actually contained 10,390 particles!</span></p><span data-dcnode-id="2652" instrument_node="">
</span><p data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">You don’t need to be a scientist to know that plastic in your body isn’t a good thing. Microplastic particles may contain toxins or harmful constituents. Researchers know they can mimic your hormone activity, but it’s too soon to know what other damage they may be causing.</span></p><span data-dcnode-id="2649" instrument_node="">
</span><h3 data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">The Problem With Chlorine in Your Water</span></h3><span data-dcnode-id="2646" instrument_node="">
</span><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">Chloramines have been used by water utilities since the 1930s to provide long-lasting disinfection as the water moves through pipes to consumers. Formed when ammonia is added to chlorine, chloramines are found in the drinking water of more than one in five Americans.</span></p><span data-dcnode-id="2643" instrument_node="">
</span><p data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">When chloramines or chlorine interact with organic matter found in your water, disinfection byproducts (DBPs) form. According to the Water Quality Association, byproducts from chloramine are suspected carcinogens, as are byproducts from chlorine.</span></p><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">DBPs are far more toxic than chlorine itself. In fact, DBPs are responsible for the vast majority of the toxic effects of chlorinated water.</span></p><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">Your blood, your kidneys and your liver all require a source of good clean water to detoxify your body from the toxic exposures you come into contact with every day</span></p><span data-dcnode-id="2634" instrument_node="">
.
</span><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">When you give your body water that is tainted with toxins leached from plastic, DBPs, volatile organic compounds (VOCs), pesticides or hormones, you are asking it to work twice as hard. Your body must first detoxify the water before it can be used to fuel your organs of detoxification.</span></p><span data-dcnode-id="2631" instrument_node="">
</span><p data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Clearly, the most efficient way to help your body both avoid and eliminate toxins is to provide it with the cleanest, purest water you can find. And that may be more of a challenge than you think.</span></p><span data-dcnode-id="2628" instrument_node="">
</span><p data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Chloramines are difficult to filter out of drinking water, and filters that remove chlorine may not remove chloramines. The only effective means to reduce chloramines in system-treated water is through the use of advanced carbon filtration systems.</span></p><span data-dcnode-id="2625" instrument_node="">
</span><p data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">Even well water can be problematic. Unless you are getting your water from a well that is located 800 feet or more below the ground surface, chances are your well water has been contaminated by toxic substances dumped into the ground over the years, such as herbicides, pesticides and heavy metals.</span></p><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Unless you have a whole house water filter, chlorine will vaporize from every toilet bowl in your home and when you wash your clothes, dishes or take a shower or bath.</span></p><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">Chlorine vapors, DBPs and chloroform gas may increase your risk of asthma, airway inflammation and respiratory allergies.</span></p><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2611"><span data-dcnode-id="2615" instrument_node="">The </span><strong class="product-name" data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Pure &amp; Clear Whole House Water Filtration Systems</span></strong><span data-dcnode-id="2612" instrument_node="">, for both city water and well water systems, filters out 97% of chlorine, chloramines, disinfection byproducts and VOCs at the source where the water enters your house.</span></p><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2609" instrument_node="">Using a three-stage filtration process, featuring a micron sediment pre-filter, a KDF water filter and a high-grade carbon water filter, our </span><strong class="product-name" data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Pure &amp; Clear Whole House Water Filtration System</span></strong><span data-dcnode-id="2606" instrument_node=""> is your worry-free solution for clean, pure water throughout your entire home.</span></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2601"><a data-dcnode-id="2602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.mercolamarket.com/waterfilters/whole-house-water-filters/"><span data-dcnode-id="2603" instrument_node="">Discover more about Pure &amp; Clear Whole House Water Filtration System</span></a></p><span data-dcnode-id="2600" instrument_node="">

</span><h3 data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">Does Your Drinking Water Contain Fluoride?</span></h3><span data-dcnode-id="2591" instrument_node="">
</span><p data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">Toxic fluoride may be creating a serious health risk in two-thirds of U.S. households.</span></p><span data-dcnode-id="2588" instrument_node="">
</span><p data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">Public health officials, and even many dentists, continue to claim that adding fluoride to public water supplies helps protect your teeth from decay. But how could that be true? When you drink a glass of fluoridated water, it hardly touches your teeth.</span></p><span data-dcnode-id="2585" instrument_node="">
</span><p data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Hundreds of studies document the risks of fluoride to human health. The following conditions are linked to fluoride exposure:</span></p><span data-dcnode-id="2582" instrument_node="">
</span><ul class="bullet" data-dcnode-id="2553"><span data-dcnode-id="2581" instrument_node="">
</span><li data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">Brain damage and reduced IQ in children</span></li><span data-dcnode-id="2578" instrument_node="">
</span><li data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">Impaired learning and memory</span></li><span data-dcnode-id="2575" instrument_node="">
</span><li data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Cardiovascular effects, including high blood pressure</span></li><span data-dcnode-id="2572" instrument_node="">
</span><li data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">Thyroid dysfunction</span></li><span data-dcnode-id="2569" instrument_node="">
</span><li data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Joint pain and stiffness</span></li><span data-dcnode-id="2566" instrument_node="">
</span><li data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">Bone fractures and reduced bone strength</span></li><span data-dcnode-id="2563" instrument_node="">
</span><li data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">Increased blood glucose levels and impaired glucose tolerance</span></li><span data-dcnode-id="2560" instrument_node="">
</span><li data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">Endocrine and hormonal effects</span></li><span data-dcnode-id="2557" instrument_node="">
</span><li data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">Insomnia and decreased melatonin production</span></li><span data-dcnode-id="2554" instrument_node="">
</span></ul><span data-dcnode-id="2552" instrument_node="">
</span><p data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">If your household includes pets, it’s important to know that fluoride is just as harmful to them – and maybe even more so because of their smaller body size.</span></p><span data-dcnode-id="2549" instrument_node="">

</span><h3 data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Beyond Your Drinking Water – What About Your Shower?</span></h3><span data-dcnode-id="2482" instrument_node="">
</span><figure class="right" data-dcnode-id="2477"><span data-dcnode-id="2481" instrument_node="">
</span><div data-dcnode-id="2479"><img alt="Shower Filter" class="rs-single" data-dcnode-id="2480" data-src="https://media.mercolamarket.com/assets/shopimages/18-114-Product_Primary_Image.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.mercolamarket.com/airpurifier&amp;raw"></div><span data-dcnode-id="2478" instrument_node="">
</span></figure><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2475" instrument_node="">There’s no question that drinking clear, filtered water is of utmost importance for your health. But did you know that </span><em data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">bathing</span></em><span data-dcnode-id="2472" instrument_node=""> in unfiltered tap water may actually be worse?</span></p><span data-dcnode-id="2470" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">On average, you ingest about one-half to a gallon of water per day… but you expose yourself to about 25 gallons of water when you shower.</span></p><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">That wouldn’t be a problem if the chlorine and its byproducts just washed off your body and flowed down the drain. A hot, steamy shower opens your pores, facilitating the absorption of chlorine and trihalomethanes (THMs), the Group B carcinogenic disinfection byproducts formed from the reaction of chlorine and organic matter.</span></p><span data-dcnode-id="2464" instrument_node="">
</span><p data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">The steam from a shower can contain up to 20 times the concentration of chlorine and byproducts and 70 to 90% of them vaporize before the water even hits the shower floor.</span></p><span data-dcnode-id="2461" instrument_node="">
</span><p data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">This makes them easy to inhale in high concentrations into your lungs. From there, these toxic substances are absorbed through your skin and pass directly into your bloodstream.</span></p><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">You can easily absorb as many toxins in one shower as you would drinking unfiltered tap water for an entire week.</span></p><span data-dcnode-id="2455" instrument_node="">
</span><p data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">Ideally, you want to not only filter out the chlorine in your shower water but also the disinfection byproducts, VOCs and other toxic chemicals.</span></p><span data-dcnode-id="2452" instrument_node="">
</span><p data-dcnode-id="2447"><span data-dcnode-id="2451" instrument_node="">Through a multi-stage filtration process, the </span><strong class="product-name" data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">Pure &amp; Clear Shower Filter</span></strong><span data-dcnode-id="2448" instrument_node=""> removes more than 90% of the chlorine in your tap water and reduces the synthetic chemicals, DBPs, heavy metals and VOCs that can vaporize during your shower.</span></p><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2441"><span data-dcnode-id="2445" instrument_node="">Easy to install, the </span><strong class="product-name" data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Pure &amp; Clear Shower Filter </span></strong><span data-dcnode-id="2442" instrument_node="">is a simple solution to the potential hazards in your shower water when you’re not using a whole home water filtration system.</span></p><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2437"><a data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.mercolamarket.com/waterfilters/shower-filter/"><span data-dcnode-id="2439" instrument_node="">Discover more about Pure &amp; Clear Shower Filter </span></a></p><span data-dcnode-id="2436" instrument_node="">
</span><h3 data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">How Clean Is Your Indoor Air?</span></h3><span data-dcnode-id="2433" instrument_node="">
</span><p data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">Whether you’re relaxing at home, working in a crowded office space or riding on public transportation, you’re exposed to a wide variety of airborne particles and contaminants.</span></p><span data-dcnode-id="2430" instrument_node="">
</span><p data-dcnode-id="2425"><span data-dcnode-id="2429" instrument_node="">Indoor air pollution is made up of solid and liquid particles that are suspended in the air – or </span><em data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">particulate matter</span></em><span data-dcnode-id="2426" instrument_node="">. These suspended particles can consist of dust, metals, smoke, liquid droplets, chemicals and pollen.</span></p><span data-dcnode-id="2424" instrument_node="">
</span><p data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">Take a look at your air-intake vent in your home. Particulate matter can build up and form a greasy dirty film.</span></p><span data-dcnode-id="2421" instrument_node="">
</span><p data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">Also, pay attention to how you feel, as that can tell you a lot about the quality of your indoor air. Do you sometimes experience any of these symptoms for no apparent reason?</span></p><span data-dcnode-id="2418" instrument_node="">
</span><ul class="bullet" data-dcnode-id="2392"><span data-dcnode-id="2417" instrument_node="">
</span><li data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Itchy, watery eyes</span></li><span data-dcnode-id="2414" instrument_node="">
</span><li data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Runny nose</span></li><span data-dcnode-id="2411" instrument_node="">
</span><li data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">Scratchy throat</span></li><span data-dcnode-id="2408" instrument_node="">
</span><li data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Headaches</span></li><span data-dcnode-id="2405" instrument_node="">
</span><li data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">Dizziness</span></li><span data-dcnode-id="2402" instrument_node="">
</span><li data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">Forgetfulness</span></li><span data-dcnode-id="2399" instrument_node="">
</span><li data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Fatigue</span></li><span data-dcnode-id="2396" instrument_node="">
</span><li data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">Moodiness</span></li><span data-dcnode-id="2393" instrument_node="">
</span></ul><span data-dcnode-id="2391" instrument_node="">
</span><p data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">These can be the immediate effects of particulate matter in your indoor air. Health effects can show up soon after exposure or they can take years to manifest in much more serious ways, affecting your entire body and brain.</span></p><span data-dcnode-id="2388" instrument_node="">
</span><figure class="extended center" data-dcnode-id="2383"><span data-dcnode-id="2387" instrument_node="">

</span></figure><span data-dcnode-id="2382" instrument_node="">
</span><h3 data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">9 Indoor Air Contaminants That May Be Lurking in Your Home or Office Right Now</span></h3><span data-dcnode-id="2379" instrument_node="">
</span><p data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">More than 1,500 substances can be found in the typical American home and some can emit toxic fumes. And more chemicals are approved every year for use by manufacturers with little or no safety testing.</span></p><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">So what types of contaminants and pollutants could be in your home right now?</span></p><span data-dcnode-id="2373" instrument_node="">
</span><ul class="bullet" data-dcnode-id="2326"><span data-dcnode-id="2372" instrument_node="">
</span><li data-dcnode-id="2368"><strong data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">Formaldehyde </span></strong><span data-dcnode-id="2369" instrument_node="">from paint, bookshelves, cabinets, beds, plastics, cosmetics, fabrics, pillows and drapes</span></li><span data-dcnode-id="2367" instrument_node="">
</span><li data-dcnode-id="2363"><strong data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">VOCs</span></strong><span data-dcnode-id="2364" instrument_node=""> from paint, pesticides, building and hobby materials, cleaners and cabinetry</span></li><span data-dcnode-id="2362" instrument_node="">
</span><li data-dcnode-id="2358"><strong data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Lead</span></strong><span data-dcnode-id="2359" instrument_node=""> from old paint (simply opening an old painted window can release it into your air)</span></li><span data-dcnode-id="2357" instrument_node="">
</span><li data-dcnode-id="2353"><strong data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Airborne bacteria and viruses</span></strong><span data-dcnode-id="2354" instrument_node=""> from humans, pets and ventilation systems</span></li><span data-dcnode-id="2352" instrument_node="">
</span><li data-dcnode-id="2348"><strong data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Flame-retardant chemicals</span></strong><span data-dcnode-id="2349" instrument_node=""> from furniture, carpeting and mattresses</span></li><span data-dcnode-id="2347" instrument_node="">
</span><li data-dcnode-id="2343"><strong data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Fragrances and other chemicals</span></strong><span data-dcnode-id="2344" instrument_node=""> from candles, air fresheners and cleaning and laundry supplies</span></li><span data-dcnode-id="2342" instrument_node="">
</span><li data-dcnode-id="2338"><strong data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Mold, mildew and other pollutants</span></strong><span data-dcnode-id="2339" instrument_node=""> from faulty plumbing and leaky foundations and roofs</span></li><span data-dcnode-id="2337" instrument_node="">
</span><li data-dcnode-id="2333"><strong data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Dander and allergens</span></strong><span data-dcnode-id="2334" instrument_node=""> from pets and other animals</span></li><span data-dcnode-id="2332" instrument_node="">
</span><li data-dcnode-id="2328"><strong data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Tobacco smoke</span></strong><span data-dcnode-id="2329" instrument_node="">, including second- and third-hand smoke</span></li><span data-dcnode-id="2327" instrument_node="">
</span></ul><span data-dcnode-id="2325" instrument_node="">
</span><p data-dcnode-id="2320"><span data-dcnode-id="2324" instrument_node="">Cooking is another source of indoor air pollution that you might not suspect. Roasting or frying food creates organic compound byproducts and without proper ventilation, these dust particles can reach levels </span><em data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">25 times</span></em><span data-dcnode-id="2321" instrument_node=""> higher than what’s considered “very unhealthy.”</span></p><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Most, if not all, of these substances present a significant threat to your health and your family’s health, including your pets. Some, like formaldehyde, certain VOCs and flame retardants are known or suspected carcinogens. Others can potentially harm your thyroid, IQ, memory and fertility.</span></p><span data-dcnode-id="2316" instrument_node="">
</span><p data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Size matters when it comes to pollutants. Particles 10 micrometers (or microns) in diameter or smaller (like the organic compounds, mold, metals, chemicals and pollen in your indoor air) can be inhaled, penetrate tissue and lodge deep inside your lungs. From there, they can enter your bloodstream and damage your heart and other organs.</span></p><span data-dcnode-id="2313" instrument_node="">

</span><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Your home is your sanctuary – your place to escape and relax, whether it’s just you, or with family, friends and pets. Who wants to worry about contaminants that can threaten your and their well-being?</span></p><span data-dcnode-id="2166" instrument_node="">

</span><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">There’s much comfort in knowing your indoor air is pure and your water is sparkly clean and free of contaminants.</span></p><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Order our effective and economical water and indoor air solutions today for your healthy home.</span></p><span data-dcnode-id="2154" instrument_node="">

</span><p data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Whether you’re relaxing at home, working in your office, or riding on public transportation, you’re exposed to a wide variety of airborne particles and contaminants.</span></p><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2143"><span data-dcnode-id="2147" instrument_node="">While many people focus on outdoor air when they hear “air pollution,” you may be surprised to learn that the EPA has discovered </span><em data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">indoor</span></em><span data-dcnode-id="2144" instrument_node=""> air contains two to five times and potentially as much as 100 times more contaminants than the air outdoors.</span></p><span data-dcnode-id="2142" instrument_node="">
</span><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Indoor air pollution has truly become one of the most serious environmental threats to your health. Yet, no government agency monitors or controls it, and studies on its health effects are limited.</span></p><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">So I ask you… Are you paying as much attention to what you’re breathing into your lungs as you are to what you’re eating and drinking? It may be just as important.</span></p><span data-dcnode-id="2136" instrument_node="">
</span><p data-dcnode-id="2131"><span data-dcnode-id="2135" instrument_node="">Over the next few minutes, I hope to increase your awareness of </span><em data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">what</span></em><span data-dcnode-id="2132" instrument_node=""> you may be inhaling. And I’d like to share with you options I’ve discovered to help you protect yourself and your loved ones from these invisible contaminants in indoor air, wherever you go.</span></p><span data-dcnode-id="2130" instrument_node="">

</span></figure><span data-dcnode-id="2124" instrument_node="">
</span><h3 data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">How Can You Tell If Your Indoor Air Is Polluted?</span></h3><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Most contaminants aren’t visible to the naked eye, so it’s hard to tell how polluted your indoor air may be.</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2113"><span data-dcnode-id="2117" instrument_node="">Indoor air pollution is made up of solid and liquid particles that are suspended in your air – or </span><em data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">particulate matter</span></em><span data-dcnode-id="2114" instrument_node="">.</span></p><span data-dcnode-id="2112" instrument_node="">
</span><p data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">These suspended particles can consist of dust, metals, smoke, liquid droplets, chemicals and pollen.</span></p><span data-dcnode-id="2109" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">One clue may be what you see on your air-intake vent in your home. Particulate matter can build up and form a greasy dirty film.</span></p><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2103"><em data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Even if you can’t see it, particulate matter continually floats through the air in your room, waiting to be captured by your intake vent or inhaled into your lungs.</span></em></p><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">A second clue to the quality of your indoor air might be how you feel. Do you sometimes experience any of these symptoms for no apparent reason?</span></p><span data-dcnode-id="2099" instrument_node="">
</span><ul class="bullet" data-dcnode-id="2073"><span data-dcnode-id="2098" instrument_node="">
</span><li data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Itchy, watery eyes</span></li><span data-dcnode-id="2095" instrument_node="">
</span><li data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">Runny nose</span></li><span data-dcnode-id="2092" instrument_node="">
</span><li data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Scratchy throat</span></li><span data-dcnode-id="2089" instrument_node="">
</span><li data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Headaches</span></li><span data-dcnode-id="2086" instrument_node="">
</span><li data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Dizziness</span></li><span data-dcnode-id="2083" instrument_node="">
</span><li data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Forgetfulness</span></li><span data-dcnode-id="2080" instrument_node="">
</span><li data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Fatigue</span></li><span data-dcnode-id="2077" instrument_node="">
</span><li data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Moodiness</span></li><span data-dcnode-id="2074" instrument_node="">
</span></ul><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">These can be the immediate effects of particulate matter in your indoor air. Health effects can show up soon after exposure or they can take years to manifest in much more serious ways, affecting your entire body and brain.</span></p><span data-dcnode-id="2069" instrument_node="">
</span><h3 data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">7 Indoor Air Contaminants That Could Be Hiding in Your Home Right Now</span></h3><span data-dcnode-id="2066" instrument_node="">
</span><p data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Over 1,500 substances may be found in the typical American home – some of which can emit toxic fumes.</span></p><span data-dcnode-id="2063" instrument_node="">
</span><p data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">And more chemicals are approved every year for use by manufacturers with little or no safety testing.</span></p><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2055"><span data-dcnode-id="2059" instrument_node="">So, what types of contaminants and pollutants could be in </span><em data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">your</span></em><span data-dcnode-id="2056" instrument_node=""> home right now?</span></p><span data-dcnode-id="2054" instrument_node="">
</span><ol class="numstyle" data-dcnode-id="2017"><span data-dcnode-id="2053" instrument_node="">
</span><li data-dcnode-id="2049"><strong data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Formaldehyde</span></strong><span data-dcnode-id="2050" instrument_node=""> from paint, bookshelves, cabinets, beds, plastics, cosmetics, fabrics, pillows and drapes</span></li><span data-dcnode-id="2048" instrument_node="">
</span><li data-dcnode-id="2044"><strong data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">VOCs</span></strong><span data-dcnode-id="2045" instrument_node="">, or volatile organic compounds, from paint, pesticides, building and hobby materials, cleaners and cabinetry</span></li><span data-dcnode-id="2043" instrument_node="">
</span><li data-dcnode-id="2039"><strong data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Lead</span></strong><span data-dcnode-id="2040" instrument_node=""> from old paint (simply opening an old painted window can release it into your air)</span></li><span data-dcnode-id="2038" instrument_node="">
</span><li data-dcnode-id="2034"><strong data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">Flame-retardant chemicals</span></strong><span data-dcnode-id="2035" instrument_node=""> from furniture, carpeting and mattresses</span></li><span data-dcnode-id="2033" instrument_node="">
</span><li data-dcnode-id="2029"><strong data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Fragrances and other chemicals</span></strong><span data-dcnode-id="2030" instrument_node=""> from candles and cleaning and laundry supplies</span></li><span data-dcnode-id="2028" instrument_node="">
</span><li data-dcnode-id="2024"><strong data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">Dander and allergens</span></strong><span data-dcnode-id="2025" instrument_node=""> from pets and other animals</span></li><span data-dcnode-id="2023" instrument_node="">
</span><li data-dcnode-id="2019"><strong data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Tobacco smoke</span></strong><span data-dcnode-id="2020" instrument_node="">, including second- and third-hand smoke</span></li><span data-dcnode-id="2018" instrument_node="">
</span></ol><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2007"><span data-dcnode-id="2015" instrument_node="">And here’s another source of indoor air pollution that you might not suspect: </span><strong data-dcnode-id="2012"><em data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">cooking</span></em></strong><span data-dcnode-id="2011" instrument_node="">. Roasting or frying food creates organic compound byproducts and without proper ventilation, Korean researchers have found the concentration of these dust particles can reach levels </span><em data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">25 times</span></em><span data-dcnode-id="2008" instrument_node=""> higher than what’s considered “very unhealthy.”</span></p><span data-dcnode-id="2006" instrument_node="">
</span><p data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Most, if not all of these substances, present a significant threat to your health and your family’s health, including your pets. Some, like formaldehyde, certain VOCs and flame retardants are known or suspected carcinogens. Others can potentially harm your thyroid, IQ, memory and fertility.</span></p><span data-dcnode-id="2003" instrument_node="">
</span><figure class="extended center" data-dcnode-id="1998"><span data-dcnode-id="2002" instrument_node="">
</span><div data-dcnode-id="2000"><img alt="Table design" class="rs-wide" data-dcnode-id="2001" data-src="//media.mercolamarket.com/assets/images/air-purifier/table-design.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.mercolamarket.com/airpurifier&amp;raw"></div><span data-dcnode-id="1999" instrument_node="">
</span></figure><span data-dcnode-id="1997" instrument_node="">
</span><h3 data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Beware the Potential Dangers of Room Air Fresheners</span></h3><span data-dcnode-id="1994" instrument_node="">
</span><p data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">A recent survey found that almost half of Americans use air fresheners at least once a week. And over a third of respondents use candles or incense to cover up smells and household odors.</span></p><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1986"><span data-dcnode-id="1990" instrument_node="">While a scented candle or air freshener might seem like a useful idea to disguise unwanted odors, they may be giving you something you </span><em data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">weren’t</span></em><span data-dcnode-id="1987" instrument_node=""> expecting: phthalates.</span></p><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Phthalates are potentially harmful chemicals that have been shown to cause hormonal abnormalities, birth defects and reproductive issues.</span></p><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Not a surprise, they are especially hazardous for use around children or pregnant women.</span></p><span data-dcnode-id="1979" instrument_node="">
</span><p data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">Unfortunately, phthalates aren’t just in scented products… They’re also found in children’s toys, nail polish and in perfumes.</span></p><span data-dcnode-id="1976" instrument_node="">
</span><p data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">When sprayed into the air, the phthalates become airborne and may be inhaled into your lungs or absorbed through your skin. Either way, they enter your bloodstream.</span></p><span data-dcnode-id="1973" instrument_node="">
</span><h3 data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Why Pollutant Particle Size Matters</span></h3><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Size matters when it comes to pollutants. Particles 10 micrometers (or microns) in diameter or smaller (like the organic compounds, mold, metals, chemicals and pollen in your indoor air) can be inhaled, penetrate tissue and lodge deep inside your lungs. From there they can enter your bloodstream and damage your heart and other organs.</span></p><span data-dcnode-id="1967" instrument_node="">
</span><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">To appreciate how small these particles truly are, below you can see how these common particles compare to a human hair and a few grains of beach sand (courtesy of the United States Environmental Protection Agency, or EPA):</span></p><span data-dcnode-id="1964" instrument_node="">
</span><figure class="text-centered" data-dcnode-id="1961"><img alt="particles in human hair" data-dcnode-id="1963" data-src="//media.mercolamarket.com/assets/images/air-purifier/particles-human-hair.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.mercolamarket.com/airpurifier&amp;raw"><span data-dcnode-id="1962" instrument_node=""> </span></figure><span data-dcnode-id="1960" instrument_node="">
</span><h3 data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">4 Solutions for Indoor Air Pollution – For Home, Work and Travel</span></h3><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">If you’re like the typical American, you spend as much as 97% of your time breathing indoor air, either working, sleeping, relaxing or riding public transportation.</span></p><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Doesn’t it make sense to have effective ways of improving the quality of the air you breathe, wherever you are?</span></p><span data-dcnode-id="1951" instrument_node="">

</span><ul class="bullet" data-dcnode-id="1911"><span data-dcnode-id="1944" instrument_node="">
</span><li data-dcnode-id="1937"><strong class="product-name" data-dcnode-id="1939"><span data-dcnode-id="1943" instrument_node="">Clear</span><em data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Air</span></em><span data-dcnode-id="1940" instrument_node=""> Whole Home Air Purifier</span></strong><span data-dcnode-id="1938" instrument_node=""> – for clearing the air of contaminants and pollutants in your home or large office space up to 3,000 sq. ft. on a single level</span></li><span data-dcnode-id="1936" instrument_node="">

</span><li data-dcnode-id="1921"><strong class="product-name" data-dcnode-id="1923"><span data-dcnode-id="1927" instrument_node="">Clear</span><em data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Air</span></em><span data-dcnode-id="1924" instrument_node=""> Room Air Purifier</span></strong><span data-dcnode-id="1922" instrument_node=""> – for clearing the air of contaminants and pollutants in a small room, bathroom or office up to 50 sq. ft.</span></li><span data-dcnode-id="1920" instrument_node="">
</span><li data-dcnode-id="1913"><strong class="product-name" data-dcnode-id="1915"><span data-dcnode-id="1919" instrument_node="">Clear</span><em data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Air</span></em><span data-dcnode-id="1916" instrument_node=""> Personal Air Purifier</span></strong><span data-dcnode-id="1914" instrument_node=""> – for clearing your personal air space or contaminants when using public transportation, working in a crowded office or visiting waiting rooms, movie theaters and other public spaces</span></li><span data-dcnode-id="1912" instrument_node="">
</span></ul><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">We’ll dive further into each of these – plus one other unique solution for your kitchen – but let’s first take a closer look at the innovative air-clearing technologies of our units, as each air purifier uses at least one of them.</span></p><span data-dcnode-id="1907" instrument_node="">
</span><h3 data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Invented for Use in Space by NASA</span></h3><span data-dcnode-id="1904" instrument_node="">
</span><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">The Advanced Photo Catalytic Oxidation Technology or PCO technology, was originally invented for use in space by NASA.</span></p><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">For extended stays in space, NASA realized their astronauts needed to grow plants for their survival. But first, they had to remove the ethylene in the air. Ethylene is to plants like carbon dioxide is to humans.</span></p><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Hence, PCO technology was born to remove unwanted gases like ethylene.</span></p><span data-dcnode-id="1895" instrument_node="">
</span><p data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">NASA still uses PCO technology today in their space program.</span></p><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">The Photo Catalytic Oxidation technology in our air purifiers destroys contaminates and it produces purifying plasma to eliminate odors and minor mold.</span></p><span data-dcnode-id="1889" instrument_node="">
</span><p data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">PCO cells have been proven to reduce potentially dangerous pollutants by more than 99% in less than 24 hours. Instead of simply covering up the source, it breaks down the actual molecules.</span></p><span data-dcnode-id="1886" instrument_node="">
</span><figure class="extended center" data-dcnode-id="1881"><span data-dcnode-id="1885" instrument_node="">
</span><div data-dcnode-id="1883"><img alt="Relaxed woman" class="rs-wide" data-dcnode-id="1884" data-src="//media.mercolamarket.com/assets/images/air-purifier/relaxed-woman.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.mercolamarket.com/airpurifier&amp;raw"></div><span data-dcnode-id="1882" instrument_node="">
</span></figure><span data-dcnode-id="1880" instrument_node="">
</span><h3 data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">A Continuous Stream of Millions of Negative Ions Leaves Your Air Smelling Fresh and Clean</span></h3><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Imagine a continuous stream of millions of ions circulating throughout your home, seeking out and neutralizing contaminants.</span></p><span data-dcnode-id="1874" instrument_node="">
</span><p data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">That’s what Needlepoint Ionization does…</span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">An active approach to air purification, Needlepoint Ionization travels to the pollutants in every corner of every room, rather than waiting for contaminants to enter the purifier.</span></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Most other technologies on the market, including popular HEPA filters, use a passive approach to purify the air. The air must actually come in contact with the unit to be cleaned.</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Here’s how Needlepoint Ionization effectively clears your air:</span></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Negative ions impart a charge to particles like dust or dander, causing them to attract other particles and clump together.</span></p><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">As more and more particles come together, the heavier they become. Eventually they enter your home’s</span></p><span data-dcnode-id="1856" instrument_node="">
</span><p data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">HVAC air filter or simply fall to the floor to be vacuumed up.</span></p><span data-dcnode-id="1853" instrument_node="">
Another plus of Needlepoint Ionization is its ability to reduce ultra-fine, even nano-sized particles. HEPA filters can only filter out particles 0.5 microns or larger.
</span><p data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Keep in mind it’s the ultra-fine particles that present the greatest potential threat to your health – much more so than the larger particles you can see.</span></p><span data-dcnode-id="1847" instrument_node="">
</span><h3 data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Leave It to Mother Nature to Come up with This Effective Air-Clearing Technique</span></h3><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">You’ve probably noticed how the air seems so fresh and clean when you’re out in the woods or up in the mountains.</span></p><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">That’s Mother Nature at work…</span></p><span data-dcnode-id="1838" instrument_node="">
</span><p data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Ozone, or O3, is a molecule made from three oxygen atoms. A natural component of the earth’s atmosphere, low levels of ozone exist in outdoor air, even right outside your window.</span></p><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Created by solar ultraviolet radiation and lightning, ozone is what cleans the outside air, especially after a thunderstorm.</span></p><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1827"><span data-dcnode-id="1831" instrument_node="">Scalable Activated Oxygen Purification uses activated oxygen, or ozone, to purify and clean your air. Another </span><em data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">active</span></em><span data-dcnode-id="1828" instrument_node=""> method of air purification, activated oxygen neutralizes odors instead of masking them, like with toxic air fresheners.</span></p><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Ozone is highly reactive so when it “cleans” or oxidizes an air pollutant, it loses one of its oxygen atoms and turns back into pure oxygen (O2). In fact, its half-life is very short – the amount of ozone in your air decreases by 50% in only 20 minutes.</span></p><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Once ozone oxidizes a pollutant, the contaminant loses its ability to cause odor or be allergenic or potentially harmful.</span></p><span data-dcnode-id="1820" instrument_node="">
</span><h3 data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">Scalable Low Level Ozone Purification – the Answer to Ozone Jitters</span></h3><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">As effective as it may be, ozone is something some people often have concerns about. However, once they have a clear understanding of it, they realize just how important ozone is for the quality of their air.</span></p><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">At its naturally occurring levels in nature – 0.01 to 0.05 ppm (parts per million) – ozone is effective and safe, but just like anything else in nature, including the sun and oxygen, bringing it indoors requires respect and control to avoid creating a safety hazard.</span></p><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1803"><span data-dcnode-id="1810" instrument_node="">With carefully designed air purifier controls, ozone can be a safe and effective tool against indoor air contaminants. </span><strong data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Scalable Low Level Purification</span></strong><span data-dcnode-id="1807" instrument_node=""> allows for </span><em data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">adjustable levels</span></em><span data-dcnode-id="1804" instrument_node=""> based on the square footage of your space to maintain levels of ozone well within the safety margin.</span></p><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Below you can see the LCD data display for the Scalable Low Level Purification set to its highest level – a safe level suitable for your entire home or a large 3,000 square-foot (sq ft) space. Simply scale down the control for smaller spaces, all the way down to 250 sq ft, for the right level of activated oxygen, or choose the “normal” mode for operation without ozone.</span></p><span data-dcnode-id="1799" instrument_node="">

</span><div class="faq" data-dcnode-id="592"><h5 data-dcnode-id="656"><strong data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Frequently Asked Questions</span></strong></h5><span data-dcnode-id="655" instrument_node="">
</span><ol class="accordion" data-accordion="" data-dcnode-id="593"><span data-dcnode-id="654" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="631"><a class="button radius" data-dcnode-id="651" href="#panel1a"><strong data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">1. Will the Whole Home Air Purifier take care of my home’s mold problem?</span></strong></a><span data-dcnode-id="650" instrument_node="">
</span><div class="content" data-dcnode-id="633" id="panel1a"><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Please understand that no air filter in the world will eliminate mold problems. You must find the source of the water leakage and stop water intrusion while you control the humidity inside your home. The other key variable is time. Be sure to jump on any mold problem the moment you find it. The longer you delay taking action, the more expensive the repairs will likely be.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Unfortunately, I speak from experience as I had to remediate a serious and costly mold issue in my home when I lived in Chicago.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="642" instrument_node="">Once you have your mold problem under control then you can use the </span><strong data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Whole Home Air Purifier</span></strong><span data-dcnode-id="639" instrument_node=""> to help with </span><em data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">minor </span></em><span data-dcnode-id="636" instrument_node="">mold issues and to help remove mold spores from your indoor air before they take hold.</span></p><span data-dcnode-id="634" instrument_node="">
</span></div><span data-dcnode-id="632" instrument_node="">
</span></li><span data-dcnode-id="630" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="619"><a class="button radius" data-dcnode-id="627" href="#panel2a"><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">2. I live in California. Why can’t I order the Whole Home, Room, Tabletop, Refrigerator and Personal Air Purifiers? </span></strong></a><span data-dcnode-id="626" instrument_node="">
</span><div class="content" data-dcnode-id="621" id="panel2a"><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">The Whole Home, Room, Tabletop, Refrigerator and Personal Air Purifiers are not California Air Resources Board (CARB) compliant, so we're not able to offer them for sale in the state of California at this time. If you already own one of our Air Purifiers, there is no restriction on ordering replacement parts.</span></p><span data-dcnode-id="622" instrument_node="">
</span></div><span data-dcnode-id="620" instrument_node="">
</span></li><span data-dcnode-id="618" instrument_node="">
</span><li class="accordion-navigation" data-dcnode-id="595"><a class="button radius" data-dcnode-id="615" href="#panel3a"><strong data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">3. Are the technologies used in the Whole Home Air Purifier more effective than HEPA filters?</span></strong></a><span data-dcnode-id="614" instrument_node="">
</span><div class="content" data-dcnode-id="597" id="panel3a"><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">HEPA, or “High Efficiency Particulate Air” filters have been used for a number of years. They must be regularly replaced and carefully tested and certified to avoid filter leakage. The real limitation of a HEPA filter is in how it purifies your air – it cleans your air passively. Room contaminants must find their way to the filter.</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="609" instrument_node="">The PCO technology used in the </span><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Whole Home Air Purifier </span></strong><span data-dcnode-id="606" instrument_node="">reflect recent advancements made in air purification technologies. Some experts believe that the PCO method may be the most advanced one to date.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="603" instrument_node="">PCO </span><em data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">actively </span></em><span data-dcnode-id="600" instrument_node="">clears your air of</span></p><span data-dcnode-id="598" instrument_node="">
</span></div><span data-dcnode-id="596" instrument_node="">
</span></li><span data-dcnode-id="594" instrument_node="">
