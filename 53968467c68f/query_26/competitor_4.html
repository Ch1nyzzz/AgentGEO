or-Emergency/dp/B083KBKJ8Q%3Fascsubtag%3Damzn1.osa.5862df61-cb66-433a-bc98-f25c7504d9f7.ATVPDKIKX0DER.en_US%26cv_ct_cx%3Dportable%2Bpower%2Bstation%26cv_ct_id%3Damzn1.osa.5862df61-cb66-433a-bc98-f25c7504d9f7.ATVPDKIKX0DER.en_US%26cv_ct_pg%3Dsearch%26cv_ct_we%3Dasin%26cv_ct_wn%3Dosp-single-source-earns-comm%26dchild%3D1%26keywords%3Dportable%2Bpower%2Bstation%26pd_rd_i%3DB083KBKJ8Q%26pd_rd_r%3Dc8654ed8-dcee-455b-8cb6-59cc2f59014c%26pd_rd_w%3D4u1er%26pd_rd_wg%3DoXb6P%26pf_rd_p%3D35b32c02-1b41-4e49-9b89-0297af2446e1%26pf_rd_r%3DF41FBY9WCEJNGES0THM6%26qid%3D1614415506%26sr%3D1-1-64f3a41a-73ca-403a-923c-8152c45485fe%26linkCode%3Dll1%26tag%3Dpivotordie-20%26linkId%3D72b398e9ecb22bbd769492f3dd9bb7df%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1711" instrument_node=""> (buy / amazon)</span></a><span data-dcnode-id="1709" instrument_node=""> / </span><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.ca/dp/B083KBKJ8Q%3F_encoding%3DUTF8%26aaxitk%3Db14f6c0482689ea0a96e044fb4227e72%26hsa_cr_id%3D8001567950501%26pd_rd_plhdr%3Dt%26pd_rd_r%3Dbabb5152-6b53-4417-bd11-74d3fc879422%26pd_rd_w%3Df0hpE%26pd_rd_wg%3D9Vr4O%26linkCode%3Dll1%26tag%3Dpodgio50-20%26linkId%3D36a0f7c4bc95369c01b2844723e8c3f7%26language%3Den_CA%26ref_%3Das_li_ss_tl" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1708" instrument_node="">Amazon Canada</span></a></figcaption></figure><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1703" instrument_node="">What’s an indoor generator? Well, it’s essentially a battery generator — completely silent and safe to use indoors, which makes them a must have for the inevitable power outages. They’re also referred to as “portable power stations.’ They’re my favorite type of generator because they produce clean energy, they’re silent, are easy to use and, super portable, are ideal to power all of your gadgets, and some are powerful enough to keep your fridge running during a power outage, like the </span><a data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/stores/GOAL%2BZERO/page/21725527-030B-490D-B866-10492C8C485E%3F%26linkCode%3Dll2%26tag%3Dpivotordie-20%26linkId%3Dca03ad7ccddfbbc8e9917697cf707ebb%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1702" instrument_node="">Goal Zero X Series.</span></a></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">I think you’ll be impressed with some of the indoor generators we review. The technology for these products have been increasing at a rapid rate over the past couple years.</span></p><span data-dcnode-id="1696" instrument_node="">
</span><span data-dcnode-id="1695" id="more-259"></span><span data-dcnode-id="1694" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1693"><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">I’ve been living in an apartment for about 4 years now, and rely on my computer for all the work that I do. This is a nice place, with everything that I could possibly need. Reliable high speed internet, friendly neighbors, and plenty of shops/ restaurants within a couple hundred meters. Even the weather is pretty nice in this part of the country.</span></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">We’re going to review a range of indoor battery generators to match whatever your needs might be. Everyone has a different budget and the amount of power you need will depend on a range of factors — BUT, we all have refrigerators and if you can afford it, get an indoor generator which can keep your fridge running. A fridge requires a generator with starting wattage between 1200W to 1500W. We’ll discuss this in detail later in the article.</span></p><span data-dcnode-id="1686" instrument_node="">

</span><h3 data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Sizing Up Your Apartment Generator Needs</span></h3><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">So what is the only issue for a guy like me who spends pretty much half the day on his computer? Power. Without electricity I can’t work from home, play, watch movies, or communicate with my friends and family. Plus, the fridge and washing machine are going to stop working. Now, we do have a large industrial grade backup generator installed in our apartment. However, it won’t run the fridge/ air conditioning/ bathroom water heater/ washing machine. Generator power is limited to a maximum of 5 amps at 220 volts, so exactly 1100 watts.</span></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">That’s enough to run the lights, fans, TV, Wi-Fi router, computer, etc. But not the 2100W Philips induction cooktop I recently purchased to be more self-sufficient during this pandemic. I do a lot more cooking these days, and need the fridge to store all my groceries. You never know when there might be another lock-down. Maybe you won’t have access to food, depending on the nature of the emergency.  In truth, the battery generators we cover in this article will only be adequate to get you through several days if the goal is to keep your basic electrical devices charged, and at most, one day if you want your fridge running. That’s enough for most people and will give you much peace at night knowing you can weather a storm.</span></p><span data-dcnode-id="1620" instrument_node="">

e-260" srcset="https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/EGO-Power-NEXUS-PST3040-1-1024x544.jpg 1024w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/EGO-Power-NEXUS-PST3040-1-300x160.jpg 300w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/EGO-Power-NEXUS-PST3040-1-768x408.jpg 768w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/EGO-Power-NEXUS-PST3040-1.jpg 1200w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></a><figcaption data-dcnode-id="1581"><span data-dcnode-id="1585" instrument_node="">EGO Power+ NEXUS PST3040 (</span><a data-dcnode-id="1583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/EGO-Power-PST3041-Portable-Station/dp/B07VVDVTJ1%3Fdchild%3D1%26keywords%3Dego%2Bnexus%2Bpower%2Bstation%2B3041%26qid%3D1613824383%26sr%3D8-13%26linkCode%3Dll1%26tag%3Dpivotordie-20%26linkId%3D2c2d97bc12165096d934553bd2714c2b%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1584" instrument_node="">bUY ON aMAZON</span></a><span data-dcnode-id="1582" instrument_node="">)</span></figcaption></figure><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">The backup generator in my area is guaranteed to work 90 percent of the time, but sometimes it’ll be down for maintenance or something like that, and that’s when I am left without power for up to 4 or 5 hours at a time. For a guy like me, that’s an eternity. So I’ve been thinking about purchasing a generator to power essential devices such as the refrigerator, computer, cooktop, router, etc. This will come in handy during storm season, or if our apartment generator is down for maintenance.</span></p><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">I do have a balcony, so there’s a slim possibility that I could run a portable inverter generator from there. However, I am not a fan of that idea and will tell you why. Gas-powered generators are noisy, so the people in neighboring flats probably won’t be a huge fan of it. You might think small 800 or 1000 watt inverter generators aren’t THAT loud, but try running a food processor with them. They stay around 50 decibels at half load or less. But once you crank up the load, they will get pretty loud.</span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">And that’s not the worst part either, my bed is at the edge of the room – next to the balcony. There is a door and a sliding window separating me from the exhaust fumes of a running generator. If you do your research on running a portable generator indoors, you’ll find that putting your generator within 5 to 7 feet of any doors or windows is a terrible idea. I don’t want to get poisoned by carbon monoxide in my sleep. A CO detector/ alarm unit will probably help, but I’m not taking that chance.</span></p><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">So, inverter generators are out of the equation for me. And probably for a lot of you reading this article as well. What you need is a portable power station, often referred to as an “indoor generator”. These are essentially giant battery packs connected to an inverter. The inverter takes power from the lithium ion battery pack, steps up the voltage and converts it to alternating current. Then this power is routed to the outlet panel of the generator. They are 100% silent, except for the cooling fans. And there are zero exhaust fumes. These two attributes make them perfect for apartment dwellers.</span></p><span data-dcnode-id="1567" instrument_node="">
</span><span data-dcnode-id="1564" instrument_node="">
</span><span data-dcnode-id="1562" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1561"><span data-dcnode-id="1560" instrument_node="">
</span><h3 data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">How Do You Decide Which Apartment Indoor Generator is Right for You?</span></h3><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">This one comes down to the kind of equipment you plan to run, how long you plan to run it, and how much space you have. Oh, and don’t forget the budget. Some of us can’t afford to spend several thousand dollars on a backup generator, especially if the power doesn’t go out that often. Most indoor generators are in the 500W to 1000W range. You definitely can run a TV or internet router with one of these. You can also use them to charge your phone or laptop multiple times. However, if you want to run more power hungry stuff or keep the refrigerator on for several hours a 500W indoor generator won’t be enough.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">I have reviewed some larger models in this article, one of them is the EGO Power+ NEXUS portable power station. This behemoth weighs over 36lbs with one 7.5Ah battery installed (you can install up to 4 7.5Ah batteries which brings the total weight up to 54lbs). And it can deliver 2000 watts of continuous power with 3000 watts of surge power. This is the kind of indoor generator you purchase when money is not a concern, and you have ample space in your apartment. For me, it’s not going to fit in the room because my living space is already pretty cramped as is. I barely have enough floor space in my room with a bed, chair, cabinet, and computer desk taking up most of the area.</span></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1550" instrument_node="">So yeah, floor space is another thing to consider when you purchase</span><a data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pivotordie.com/indoor-generators-for-apartments/"><span data-dcnode-id="1549" instrument_node=""> an indoor generator.</span></a><span data-dcnode-id="1547" instrument_node=""> If you have a balcony though, it’s not going to be an issue. Since you can just put the generator outside and hook up an extension cord to power your equipment inside the house. You also have to purchase the proper extension cord rated to handle the amount of power your appliances will draw. Ideally, you would have the generator inside the room and directly plug your appliances into the outlet panel. If you’re placing it outdoors, it also has to be rated for water and dust resistance. Some portable power stations aren’t designed for outdoor usage, especially the really cheap ones that are just meant to charge your phone or camera. So you have to be extra thorough with your research before purchasing one.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">If you want to run a fridge with your indoor generator, understand that food will start to spoil after 4 hours of no power. Therefore, let’s say you typically get outages of around 7 to 8 hours. You need a generator that can run the fridge for at least 4 hours. If it’s a freezer, it can keep temperatures under 0°C for a lot longer, typically 24 hours for a half-full unit and 48 hours for a filled up freezer. The more stuff you have in your freezer, the more negative heat energy it has packed up inside (so it stays cool for longer without power).</span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">So for most folks, you won’t require an indoor generator to power your freezer since the utility company will probably have fixed the issue long before 24 to 48 hours (unless a storm has done severe damage to the grid). For those of you who own a refrigerator though, an indoor generator is essential to prevent your food from spoiling.</span></p><span data-dcnode-id="1539" instrument_node="">
</span><span data-dcnode-id="1536" instrument_node="">
</span><span data-dcnode-id="1534" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1533"><span data-dcnode-id="1532" instrument_node="">
</span><h3 data-dcnode-id="1529"><strong data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">How much power do I need to run my fridge?</span></strong></h3><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">The best way for you to know this is to look at the plate or sticker behind or fridge that has all the voltage and current specifications on it. Multiply volts with amps to get watts consumed. Every make and model is different, and it’s hard to predict the power consumption of your fridge without knowing its volume or usage. A typical domestic household fridge uses 100 to 250 watts of power. Or between 1 to 2 kilowatt-hours of energy per day.</span></p><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">However, a fridge doesn’t consume the same amount of power throughout the entire duration it’s running. A thermostat within the fridge detects when temperatures are below 4°C and turns off the compressor motor. Then, the only thing that needs to be powered is the light when you open the fridge. The compressor cycles for around 8 to 12 hours per day on most fridges. When the compressor is off, power consumption drops drastically. When it kicks back on or defrosting cycles take place, power consumption maxes out. All this is also affected by how much food you have in the fridge and the ambient temperature (it will cycle on more often in summer).</span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1518"><strong data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Note</span></strong><span data-dcnode-id="1519" instrument_node="">: To be on the safe side, you need an indoor generator in the 1200 to 1500W range to power your fridge for the whole day. This is just my estimate, and you might have a large 500L side by side refrigerator running in the summer. In that case, you’ll be better off getting a 2000W portable power station/ indoor generator.</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1516" instrument_node="">► Refer to the </span><a data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//powerequipment.honda.com/generators/wattage-calculator" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1515" instrument_node="">Honda Generator Wattage Guide</span></a><span data-dcnode-id="1513" instrument_node=""> for more accurate numbers on how much power devices require to operate.</span></p><span data-dcnode-id="1511" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1510"><span data-dcnode-id="1509" instrument_node="">
</span><h2 data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Reviews / Indoor Generators For Apartments</span></h2><span data-dcnode-id="1506" instrument_node="">

</span><p data-dcnode-id="1459"><strong data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Features </span></strong><span data-dcnode-id="1460" instrument_node="">:</span></p><span data-dcnode-id="1458" instrument_node="">
</span><ul data-dcnode-id="1428"><li data-dcnode-id="1454"><strong data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Charge up to 9 devices at the same time</span></strong><span data-dcnode-id="1455" instrument_node="">: pushing 100 rated watts and 150 peak watts through (2) 120v household outlets, (2) usb ports, (1) quick charge usb port, (1) usb-c port, (3) 6mm 9-12v dc outlets – strong enough to easily power a 36″ led tv, box fans, or heated blankets</span></li><li data-dcnode-id="1450"><strong data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">155 watt-hours of lithium-ion battery</span></strong><span data-dcnode-id="1451" instrument_node=""> capacity – provides long-lasting power that charges smartphones up to 17 times, tablets up to 9 times, DSLR cameras up to 16 times, drones up to 23 times – delivers hours of power for a Nintendo switch, Bluetooth speakers, and GPS systems</span></li><li data-dcnode-id="1446"><strong data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Ultra Lightweight at 3.75 lbs.</span></strong><span data-dcnode-id="1447" instrument_node=""> The igen160s is lighter than a full 36 oz. Yeti rambler and smaller than a lunchbox – backpack ready mini generator with a convenient carrying handle and built-in flashlight and reading lights – perfect compact charging station for camping and other outdoor activities</span></li><li data-dcnode-id="1441"><span data-dcnode-id="1445" instrument_node="">Charges at home, on the go, or in the field</span><strong data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">: charges to 80% in less than 6 hours using a household outlet or in less than 7 hours </span></strong><span data-dcnode-id="1442" instrument_node="">in the car or with a solar panel (panel not included)</span></li><li data-dcnode-id="1437"><strong data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">CLEAN power apartment or home generator:</span></strong><span data-dcnode-id="1438" instrument_node=""> reduce your carbon footprint for more sustainable lifestyle – no obnoxious fumes, no messy maintenance, no noise pollution – whisper quiet indoor and outdoor generator</span></li><li data-dcnode-id="1433"><strong data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Safe for sensitive electronics </span></strong><span data-dcnode-id="1434" instrument_node="">with built-in device &amp; battery guard – short circuit, overload, and temperature protections prolongs battery lifespan &amp; safeguards against damage</span></li><li data-dcnode-id="1429"><strong data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Includes </span></strong><span data-dcnode-id="1430" instrument_node="">: ac adapter, dc adapter, cigarette lighter plug, manual – backed by 2-year coverage with limited service, labor, and parts coverage with nationwide customer service network</span></li></ul><span data-dcnode-id="1427" instrument_node="">
</span><p class="has-background" data-dcnode-id="1425" style="background-color:#f7f1e4"><span data-dcnode-id="1426" instrument_node="">“The iGen160s is an excellent solution for apartment dwellers and travelers who need a tiny power station to charge their phones, cameras, laptop, etc. It even has a built-in flashlight so you can navigate your way around the house at night in complete darkness when the power goes out. This 155W power station is small enough to be placed on the nightstand, next to your phone or lamp.”</span></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1421"><strong data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Overview:</span></strong></p><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">I really like this little Westinghouse generator because it is so incredibly tiny. And I mean TINY, at just over 8” in length and 7” in height. It isn’t very wide either, at just 3.77”. And the whole thing weighs just 3.75lbs, so you can easily toss one into your travel backpack along with a solar panel. This combined with a 60W solar panel gives you a sustainable long term solution for charging small devices like phones and cameras when you’re on the go.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1416" instrument_node="">Or if you live in an apartment, this makes sure that you’re never at danger of being isolated from the rest of the world if there’s a storm that takes out the grid. The iGen160s is very helpful for people working from home on laptops because it can run an Ultrabook with something like an Intel 10</span><sup data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">th</span></sup><span data-dcnode-id="1413" instrument_node=""> generation i3/i5 for up to 5 or 6 hours. Provided you turn down the display brightness, and aren’t doing any CPU intensive tasks. If you’re just watching videos, browsing the web, or using MS Word this Westinghouse indoor generator will run your 14 or 15” laptop for 5 to 6 hours (plus whatever charge your laptop battery already had before the power outage).</span></p><span data-dcnode-id="1411" instrument_node="">

</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">It can also act as a flashlight, since there is a LED light built into the front end. This can be toggled on and off very easily with your thumb while holding the carry handle. In fact, all the controls are accessible with your thumb when you’re holding the carry handle. You can also charge AC and DC devices simultaneously. For instance, you could have your phone and a Bluetooth speaker plugged into the USB ports for charging. But your camera battery is running low and you can’t power it from the wall because there’s an outage. Not a problem, just plug the charger into one of the two 120V AC outlets on the iGen160s. You can charge your phone, speaker, and camera battery – all at the same time.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">The iGen160s is not meant to be a replacement for an actual generator. In fact, it can’t power most standard home appliances like toasters, microwave ovens, hair dryers, electric/ induction cooktops, etc. But you could probably run a laptop or tv (not at the same time). The maximum output is 155 watts, but that’s only for a short burst. The rated continuous output is 100 watts.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">You can charge the iGen160s from any solar panel that has a DC13V-25V/2A Max port. It takes about 6hrs under ideal conditions (no clouds and direct exposure), or around 7 to 8 hours in not-so-ideal conditions. If you have a balcony in your apartment, charging this generator is super easy through solar power. It can also charge from a 12V car port, so you can drive around while this power station charges. There are 3 5.5mm 12V car ports on the iGen160s, along with a USB Type C port and multiple Type A ports (one of which supports quick charging).</span></p><span data-dcnode-id="1324" instrument_node="">

</span><p data-dcnode-id="1269"><strong data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Features </span></strong><span data-dcnode-id="1270" instrument_node="">:</span></p><span data-dcnode-id="1268" instrument_node="">
</span><ul data-dcnode-id="1243"><li data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">3000W Peak 2000Watt Continuous</span></li><li data-dcnode-id="1262"><strong data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">3x </span></strong><span data-dcnode-id="1263" instrument_node="">120V A/C Outlets</span></li><li data-dcnode-id="1258"><strong data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">4x</span></strong><span data-dcnode-id="1259" instrument_node=""> USB Ports</span></li><li data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Bright LED Display Shows Run Time</span></li><li data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Robust Steel Handles</span></li><li data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Battery Powered Alternative to Gas Generators</span></li><li data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Quiet Clean Power for Indoor and Outdoor Use</span></li><li data-dcnode-id="1246"><strong data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">4x</span></strong><span data-dcnode-id="1247" instrument_node=""> Port Battery Charger (when plugged in)</span></li><li data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Weather-Resistant Construction</span></li></ul><span data-dcnode-id="1242" instrument_node="">
</span><p class="has-background" data-dcnode-id="1240" style="background-color:#f1efe9"><span data-dcnode-id="1241" instrument_node="">“An indoor generator with the power to match gas generators, the EGO NEXUS can run nearly every appliance in a typical household. Fridge, TV, electric range, induction cooktop, water heater, desktop PC, air conditioner, etc. It is bulky and expensive, but well worth the price tag if you need a 100% gas and noise free emergency power source. Not only is the EGO NEXUS an excellent emergency generator for high rise apartments, but it’s also a very good camping and jobsite generator.”</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1236"><strong data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Overview:</span></strong></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">This is what you want if you’ve got ample floor space in the apartment and don’t mind lifting 50+ lbs. of weight whenever you need to transport the generator into another location. While it’s designed as a gas generator replacement, the EGO NEXUS can’t quite match the performance of a high-end portable gas generator.&nbsp; However, it has two very nice things going for it – zero noise, and zero gas. Since this thing is essentially a giant battery station with an inverter in the middle, there are no moving parts other than the cooling fans. And it does charge via solar power so you can comfortably spend several days or even weeks with the&nbsp; grid down for repairs. And you won’t miss out on any of the comforts of modern life such as TV, internet, refrigeration, air conditioning, etc. (unless you live in Alaska, in which case solar charging isn’t something to be excited about).</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1231" instrument_node="">There are 4 external mounting points for specially designed 5.0Ah or 7.5Ah battery packs. And you can have anywhere from 1 to 4 batteries installed at any given time. More batteries equals longer backup time, and the ability to run heavy draw equipment such as power tools. If you’ve got a CPAP machine for someone with </span><a data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/diseases-conditions/obstructive-sleep-apnea/symptoms-causes/syc-20352090" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1230" instrument_node="">sleep apnea</span></a><span data-dcnode-id="1228" instrument_node="">, this is one of the best indoor generators I can recommend. It is sturdy, weather-resistant, and has ample outlets for powering multiple devices.</span></p><span data-dcnode-id="1226" instrument_node="">

-6-768x832.jpg 768w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2021/06/EGO-Power-PST3041-Portable-Power-Station-6.jpg 1200w" data-lazy-sizes="(max-width: 945px) 100vw, 945px" data-lazy-src="http://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2021/06/EGO-Power-PST3041-Portable-Power-Station-6-945x1024.jpg?is-pending-load=1" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"&gt;&lt;noscript&gt;&lt;img loading="lazy" width="945" height="1024" src="http://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2021/06/EGO-Power-PST3041-Portable-Power-Station-6-945x1024.jpg" alt="At home and at work : EGO Power+ PST3041 3000W Nexus Portable Power Station" class="wp-image-855" srcset="https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2021/06/EGO-Power-PST3041-Portable-Power-Station-6-945x1024.jpg 945w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2021/06/EGO-Power-PST3041-Portable-Power-Station-6-277x300.jpg 277w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2021/06/EGO-Power-PST3041-Portable-Power-Station-6-768x832.jpg 768w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2021/06/EGO-Power-PST3041-Portable-Power-Station-6.jpg 1200w" sizes="(max-width: 945px) 100vw, 945px" /&gt;</span></noscript></a><figcaption data-dcnode-id="1216"><span data-dcnode-id="1219" instrument_node="">Use indoor or outdoors / at work or play </span><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/EGO-Power-PST3041-Portable-Station/dp/B07VVDVTJ1%3Fdchild%3D1%26keywords%3DEGO%2BPower%252B%2BPST3041%26qid%3D1624522098%26sr%3D8-2%26linkCode%3Dll1%26tag%3Dpivotordie-20%26linkId%3Dabe64fb00540616ddd3998b171f0f64d%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1218" instrument_node="">(buy on amazon)</span></a></figcaption></figure><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">One of the highlights of this indoor generator is its pure sine wave output, unlike many cheaper indoor generators which produce approximated sine wave power. The inverter in the NEXUS is of high quality, delivering power that is steady and clean for any sensitive electronic appliances. Like computers, smart TVs, phones, laptops, cameras, etc. The only real downside to this power station (other than the size) is the fact that it has just 3 AC outlets, despite being capable of supplying 2000 watts of continuous power and 3000W of surge power.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1201"><strong data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Note:</span></strong><span data-dcnode-id="1208" instrument_node=""> The </span><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/EGO-Power-PST3040-Portable-Included/dp/B07YKXT7GC%3Fdchild%3D1%26keywords%3DEGO%2BPower%252B%2BNEXUS%2BPST3040%26qid%3D1621320722%26sr%3D8-3%26linkCode%3Dll1%26tag%3Dpivotordie-20%26linkId%3D3ba3cc4398c09253ce704f86091f394d%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1207" instrument_node="">PST3040 is a tool-only model</span></a><span data-dcnode-id="1205" instrument_node="">, meaning you don’t get any batteries. You’ll have to purchase those separately; it accepts EGO ARC lithium-ion batteries of any capacity. For the best performance, you need to get </span><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/EGO-Power-BA4200-Lithium-Ion-Equipment/dp/B01FAW5GWY/ref%3Dsr_1_2%3Fdchild%3D1%26keywords%3DEGO%2BBA4200T%2B7.5Ah%2BBattery%26qid%3D1605211117%26sr%3D8-2" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1204" instrument_node="">7.5Ah EGO BA4200T</span></a><span data-dcnode-id="1202" instrument_node=""> batteries. You can link up the power station with your phone via Bluetooth or Wi-Fi, and turn outlets ON/OFF. You can also see battery charge status, watts per outlet, and other valuable information from a remote location.</span></p><span data-dcnode-id="1200" instrument_node="">

</span><div class="wp-block-button" data-dcnode-id="1149"><a class="wp-block-button__link has-background" data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.ca/EF-ECOFLOW-Portable-Generator-Emergency/dp/B083FR3762%3Fdchild%3D1%26keywords%3DDelta%2B1300%2BPower%2BStation%26qid%3D1621322701%26sr%3D8-1%26linkCode%3Dll1%26tag%3Dpodgio50-20%26linkId%3Dcfbec5ec1d406de32fe3298699fa2a98%26language%3Den_CA%26ref_%3Das_li_ss_tl" rel="noreferrer noopener" style="background-color:#000000" target="_blank"><span data-dcnode-id="1151" instrument_node="">Buy on Amazon Canada</span></a></div><span data-dcnode-id="1148" instrument_node="">
</span></div><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">“The Delta 1300 is relatively compact despite having more ports than most large indoor generators like the EGO Power+ NEXUS. It is one of the fastest charging power stations on the market, and can power a wide range of devices from refrigerators to laptops and blenders. The ideal mid-sized indoor generator for anyone living in an apartment who wants clean power.”</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1140"><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Overview:</span></strong></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">While it’s not much larger than a standard UPS for a desktop PC, the Delta 1300 packs a ton of juice for running essential appliances during a power outage. This is the one I would most likely purchase as an apartment dweller because of how versatile it is despite being so compact. There are 6 two-prong 120V AC outlets on the back (someone at EGO needs to take notes), each capable of up to 1800 watts of continuous power and 3300 watts of peak power.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">And you can power pretty much anything with this indoor generator – your PS4, 50” OLED TV, fridge, food processor, coffee machine, laptop, phone, lights, etc. It can store up to 1260Wh of energy in its Lithium Ion battery, and can actually output at extremely high rates relative to its battery capacity. Each AC port can supply up to 1800 watts of continuous power, which is just 200 less than what the EGO Power+ NEXUS can manage. Except this is less than half the size of the latter.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Runtime is another story though; your Delta 1300 won’t last very long when you draw the maximum 1800 watts of power. The EGO Power+ NEXUS on the other hand can accommodate four 7.5Ah batteries, each with a capacity of 420Wh. So it can run longer. But there isn’t a massive difference in runtime, more like 20 to 30 percent. And the Delta 1300 is a lighter, more easily manageable package. It also charges faster, going from 0 to 80 percent in just one hour (1.6hrs for empty to full). You can connect 4 ECOFLOW 110W solar panels to get it from full to zero in just 8 hours. You could purchase ECOFLOW solar panels, or use whatever existing panels you have since it has universal solar panel inputs.</span></p><span data-dcnode-id="1130" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1129"><span data-dcnode-id="1128" instrument_node="">
</span><h3 data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Jackery Portable Power Stations (240/ 500/ 1000 watts)</span></h3><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Jackery Explorer portable power stations are light, rugged, and designed for everything for indoor usage to camping and hiking. All Explorer series power stations support charging via solar panels, making them an excellent choice for people living off-grid. I am going to review 3 of their most popular models today – the E240, E500, and E1000.</span></p><span data-dcnode-id="1122" instrument_node="">

</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">“A handy lunchbox-sized portable 240W power station for apartments and campers. The Jackery Explorer 240 combines portability and ruggedness, weighing just 6.6lbs while being capable of running a mini cooler or laptop for several hours.”</span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1058"><strong data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Overview:</span></strong></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">All indoor generators are silent, but the E240 is especially quiet. One of the most noticeable differences when you plug a laptop into this and the Westinghouse iGen160s is that the Westinghouse power station will make these weird buzzing and clicking sounds. They are not very loud, but you can hear them if there’s nothing else going around nearby.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">For someone like me working alone at home in my room, that is especially noticeable. Not only does the E240 have significantly more capacity than the iGen160s, but it also runs dead silent even when you’re powering your MacBook Pro off of it. The E240 also integrates all 3 charging solutions (solar, 12V car adapter, 120V AC) into one single port for convenience. There are 2 5V USB Type A ports, no Type C ports though. And a single 120v AC port from the inverter. In terms of ports and weight, the iGen160s has the upper hand. But it lacks the ultra-quiet operation and higher capacity of the E240.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><hr class="wp-block-separator is-style-default" data-dcnode-id="1050"><span data-dcnode-id="1049" instrument_node="">

</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">“500 watts is enough to run a compact fridge or a television set for 3 to 4 hours, with enough capacity left over to power some LED lights during an emergency. You get more ports than the Explorer 240 and slightly over twice the capacity.&nbsp;&nbsp; ”</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="997"><strong data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Overview:</span></strong></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">While the E240 can run laptops and lights, it isn’t the best choice for when you want to run the TV or game console. The E500 is more suited to running things like your TV, media center, blender, CPAP machine, etc. It has over twice the capacity of the E240 and is about 2 inches bigger in every dimension. Still a very compact package, and weighs just 13.32lbs so you can easily carry it between the car and apartment. The Explorer 500 also supports charging from a solar panel and has a MPPT charge controller for faster charge times from solar power. For some reason it has only one 110V AC outlet (and still no Type C port).</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="992" instrument_node="">FACT : </span><a data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/maximum-power-point-tracking" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="991" instrument_node="">What is an MPPT charge controller? </span></a><span data-dcnode-id="989" instrument_node="">MPPT stands for : </span><strong data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Maximum power point tracking</span></strong><span data-dcnode-id="986" instrument_node="">. It’s basically an electronic system that maximizes the amount of power from photovoltaic (PV) modules under all the conditions it operates under. It optimizes power, plain and simple.</span></p><span data-dcnode-id="984" instrument_node="">
</span><blockquote class="wp-block-quote has-text-align-center" data-dcnode-id="978"><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">The efficiency of the system is optimized when the load characteristic changes to keep the power transfer at highest efficiency. This load characteristic is called the maximum power point (MPP). MPPT is the process of finding this point and keeping the load characteristic there. Electrical circuits can be designed to present arbitrary loads to the photovoltaic cells and then convert the voltage, current, or frequency to suit other devices or systems, and MPPT solves the problem of choosing the best load to be presented to the cells in order to get the most usable power out.</span></p><cite data-dcnode-id="979"><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maximum_power_point_tracking" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="981" instrument_node="">Wikipedia</span></a></cite></blockquote><span data-dcnode-id="977" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="976"><span data-dcnode-id="975" instrument_node="">

</span><p data-dcnode-id="921"><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Features </span></strong><span data-dcnode-id="922" instrument_node="">:</span></p><span data-dcnode-id="920" instrument_node="">
</span><ul data-dcnode-id="909"><li data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Larger Capacity and Higher Wattages: 1002Wh(46.4Ah) lithium battery capacity, 1000W Rated Power and 2000W Surge Power.</span></li><li data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Multiple Output Ports: Two USB-C, two USB, one DC carport &amp; three AC outlets (with the pure-sine wave).&nbsp;Going off-grid and being able to power your cameras, computers, communication devices and also a CPAP and electric grill.</span></li><li data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Green Outdoor Power Solution: Efficient solar charging with MPPT built-in makes it a solar generator for outdoor recreations. Charge the battery to full around 8 hours by connecting two SolarSaga 100W with an adapter cable (package included).</span></li><li data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Portable and Compact:&nbsp; Weighs only 22lbs, it is carry-friendly with an easy-carry handle.</span></li><li data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">The LCD screen with charge/discharge data and battery life status.</span></li></ul><span data-dcnode-id="908" instrument_node="">
</span><p class="has-background" data-dcnode-id="906" style="background-color:#edf2f4"><span data-dcnode-id="907" instrument_node="">“With 1000 watts of continuous power output and up to 2000 watts of surge power the EXPLORER 1000 is perfect for running your CPAP machine overnight or keeping the food from spoiling in the refrigerator. It can charge from a solar panel or 12V car adapter if you don’t have access to a wall outlet.”</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="902"><strong data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Overview:</span></strong></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">If you want outlets so you can actually run stuff with your indoor generator, get the Explorer 1000. This is the one I recommend over the E500 which barely has any ports. If you want to go compact by sacrificing some ports, get the E240. If you want the ability to power multiple devices simultaneously with longer run-times, get the E1000.</span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">It has 3 110V AC ports, each one can handle up to 1000W continuous and 2000W surge. You can run a blender, electric grill, coffee maker, crock-pot, or CPAP machine with this indoor generator. It can charge a MacBook Pro 13 up to 8 times, so you can get through multiple days of work. And it can power a 5W light for up to 76 hours. Also, this Explorer model has two Type C ports (finally).</span></p><span data-dcnode-id="895" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">

nstrument_node="">

</span><p data-dcnode-id="843"><strong data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Features </span></strong><span data-dcnode-id="844" instrument_node="">:</span></p><span data-dcnode-id="842" instrument_node="">
</span><ul data-dcnode-id="811"><li data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Engineered with precision here in the U.S. Every feature has a purpose, designed with a real-life use case in mind. Lightweight, portable power gives you the freedom to travel anywhere.</span></li><li data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Community of over 31,000 people around the world including disaster relief projects. Based along the Wasatch front in Salt Lake City, Utah.</span></li><li data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Professional grade power | Built to last and survive. Field-tested in a wide range of environments, from the Arctic to job sites to the home. Six different output ports let you power a range of devices including lights, phones, laptops, medical devices, cameras, portable fridges, and more.</span></li><li data-dcnode-id="832"><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">OUTLETS </span></strong><span data-dcnode-id="833" instrument_node="">: 2x USB-A, 18W USB-C, 60W USB-C PD, 6mm, 12V, 120V AC Inverter. 200 watt hours of lithium power charges your phone 16 times, laptop 4 times, and let’s you run LED lights for up to 42 hours.</span></li><li data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">High-speed 60W USB-C Power Delivery port lets you fast charge compatible laptops, smartphones, and tablets. Integrated MPPT charge controller ensures the most efficient solar charge possible. Recharge your Yeti 200X from the sun in as little as 2.5 hours with our 100W solar panels, or recharge from the wall in 4 hours with included 60W power supply.</span></li><li data-dcnode-id="826"><strong data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Safe and user-friendly </span></strong><span data-dcnode-id="827" instrument_node="">: We prioritize product safety, backed up with multiple layers of protections. Over and under voltage protections, temperature protections, battery management system to monitor individual cell and battery pack health. Yeti 200X comes backed with a 2-year warranty. All elements of the product from physical construction to user interface are designed for ease of use.</span></li><li data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">panels while away from the grid and keep it topped off from a wall outlet when you’re home.</span></li><li data-dcnode-id="820"><strong data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">FROM THE SUN </span></strong><span data-dcnode-id="821" instrument_node="">&nbsp;: Recharge from the sun by connecting a compatible solar panel, either the foldable Nomads or mountable Boulder solar panels. The higher the watts of the panel, the faster the charging times.</span></li><li data-dcnode-id="816"><strong data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">FROM THE WALL</span></strong><span data-dcnode-id="817" instrument_node=""> : Plug it into the wall. Fully recharges in 4 hours using included 60W power supply, or plug in with the Yeti X 120W Power Supply to halve that charge time.</span></li><li data-dcnode-id="812"><strong data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">FROM THE CAR</span></strong><span data-dcnode-id="813" instrument_node=""> &nbsp;: Plug into your vehicle’s 12V outlet using the Goal Zero Yeti Lithium 12V Car Charging Cable.</span></li></ul><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="809" instrument_node="">►</span><strong data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">NOTE</span></strong><span data-dcnode-id="806" instrument_node="">: Do not attempt to charge your Yeti Lithium from a 12V source using any other cable. Doing so may cause damage to the unit.</span></p><span data-dcnode-id="804" instrument_node="">
</span><p class="has-background" data-dcnode-id="802" style="background-color:#eaeff0"><span data-dcnode-id="803" instrument_node="">“With a wide selection of ports, tons of charging options including solar, and an extremely compact design the Goal Zero Yeti 200X will fulfill your needs perfectly. That is, if you just want something compact to charge your phone, laptop, and camera. ”</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="798"><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Overview:</span></strong></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">The Yeti 200X competes with both the Explorer 240 and iGen160s. It is heavier than the iGen160s, but lighter than the E240. And in terms of ports, it has both beat. The Yeti 200X has a great inverter that delivers 120 watts of continuous power, or 200 watts of surge power from the 187Wh Li-Ion NMC battery pack. &nbsp;You get two Type C ports, one of which is a 60W PD port that can also be used to charge the power station. There is a tiny cooling fan on the back that kicks in when temps get toasty. It’s extremely silent, and the noise is directed away from you.</span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">I really like the fact that the Yeti 200X can charge from solar, via Type C, or from your car with the 12V port. It can output up to 10 amps of power from its 12V car port, and the 6mm 12V port also supplies 10 amps of power for small tools. The Yeti 200X will power your laptop, drone, mobile phone, and run LED lights overnight. Or even a portable fan.</span></p><span data-dcnode-id="791" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="790"><span data-dcnode-id="789" instrument_node="">

</span><p data-dcnode-id="739"><strong data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Features </span></strong><span data-dcnode-id="740" instrument_node="">:</span></p><span data-dcnode-id="738" instrument_node="">
</span><ul data-dcnode-id="716"><li data-dcnode-id="733"><span data-dcnode-id="737" instrument_node="">F</span><strong data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">ASTEST PORTABLE POWER SUPPLY:</span></strong><span data-dcnode-id="734" instrument_node=""> CYPRESS chip with the PD fast charging protocol. Compared with other products that labeled but actually don’t have USB-PD 3.0 license, PPS240W01 electric generator can make you enjoy the pleasure of charging speed.</span></li><li data-dcnode-id="729"><strong data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">SAFEST POWER STATION:</span></strong><span data-dcnode-id="730" instrument_node=""> High stability lithium iron phosphate battery generator, 2000 cycles, PC V0 fireproof enclosure, UL, CE, FCC, PSE, ROHS certified, Abnormal alarm function for your emergency home use. Provides 12 months warranty.</span></li><li data-dcnode-id="725"><strong data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">SMALLEST SIZE </span></strong><span data-dcnode-id="726" instrument_node="">: Small generator, high integrated circuit, more space-saving, only 8 x 6.1 x 3.3in in a capacity of 75000mAh. Effective electrical energy conversion can reach 90%，2000 cycle, portable generators for camping quiet.</span></li><li data-dcnode-id="721"><strong data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">POWER UP MORE</span></strong><span data-dcnode-id="722" instrument_node=""> : Indoor/outdoor portable ac power, 3 DC Output(12V/8A), 2 USB-A Port(5V/2.4A each), 1 QC3.0 Port(5V/18W), 1 PD 45W USB-C Port(Two Way), 2 Pure Sine Wave AC Outlet(110/200W max), support 9 devices at the same time.</span></li><li data-dcnode-id="717"><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Power-Saving Solar Generators </span></strong><span data-dcnode-id="718" instrument_node="">: Automatic sleep/shutdown function. 2 minutes of non-us will automatically sleep, press any key to wake up. 5 minutes of non-use will automatically shut down.Press and hold the LED light button and the power button for 3S at the same time to turn off the automatic shutdown function.</span></li></ul><span data-dcnode-id="715" instrument_node="">
</span><p class="has-background" data-dcnode-id="713" style="background-color:#eaeef0"><span data-dcnode-id="714" instrument_node="">“This 240Wh power station is perfect for running your mobile fridge, portable fan, laptop, and other portable electronic gear. It has a nice leather carry handle and weighs just 2.7 kilos or 5.95lbs. It has a 45W USB Type C power delivery port for fast charging your phone or laptop.”</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="709"><strong data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Overview:</span></strong></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Energizer is one of the most famous battery companies, and now they’ve come out with their own compact power station. While it isn’t radical or revolutionary, it does a lot of little things very well that make it a superior choice over other super compact power stations. For starters, it has a 2-way 45W power delivery spec USB Type C port which you can use to charge phones, laptops, and the power station itself.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">The highlight of this Energizer power station is its ability to function in a wide range of climates. It can operate between temperatures ranging from just 23°F all the way up to 131°F. Unlike most other power stations that use Li-Ion batteries, this Energizer model is equipped with a Lifepo4 or Lithium Iron Phosphate battery. With superior thermal and chemical stability, the Lifepo4 batteries can stay safe under much higher temperatures compared to regular Li-ion. This comes in handy if you live in a particularly hot area, or have high ambient temperatures within the room (maybe you’ve got a gas stove running inside the apartment).</span></p><span data-dcnode-id="702" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="690"><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Energizer-Portable-Generators-Phosphate-Emergency/dp/B07ZFSW98T%3Fdchild%3D1%26keywords%3DEnergizer%2BPPS240W01%26qid%3D1605211909%26sr%3D8-1%26linkCode%3Dll1%26tag%3Dpivotordie-20%26linkId%3Ddab977e8f6344e145b58e8194e562309%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="nofollow noopener" target="_blank"><img alt="Energizer PPS240W01 : Portable Power Station" class="lazy-hidden wp-image-690 jetpack-lazy-image" data-dcnode-id="701" data-lazy-sizes="(max-width: 1013px) 100vw, 1013px" data-lazy-src="https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif?is-pending-load=1" data-lazy-srcset="" data-lazy-type="image" data-src="http://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-1013x1024.jpg" data-srcset="https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-1013x1024.jpg 1013w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-297x300.jpg 297w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-768x776.jpg 768w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator.jpg 1200w" height="1024" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1013"><noscript data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">&lt;img loading="lazy" width="1013" height="1024" src="https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif" data-lazy-type="image" data-src="http://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-1013x1024.jpg" alt="Energizer PPS240W01 : Portable Power Station" class="lazy lazy-hidden wp-image-690" srcset="" data-srcset="https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-1013x1024.jpg 1013w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-297x300.jpg 297w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-768x776.jpg 768w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator.jpg 1200w" sizes="(max-width: 1013px) 100vw, 1013px" /&gt;</span></noscript><noscript data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">&lt;img loading="lazy" width="1013" height="1024" src="http://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-1013x1024.jpg" alt="Energizer PPS240W01 : Portable Power Station" class="wp-image-690 jetpack-lazy-image" data-lazy-srcset="https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-1013x1024.jpg 1013w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-297x300.jpg 297w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-768x776.jpg 768w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator.jpg 1200w" data-lazy-sizes="(max-width: 1013px) 100vw, 1013px" data-lazy-src="http://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-1013x1024.jpg?is-pending-load=1" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"&gt;&lt;noscript&gt;&lt;img loading="lazy" width="1013" height="1024" src="http://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-1013x1024.jpg" alt="Energizer PPS240W01 : Portable Power Station" class="wp-image-690" srcset="https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-1013x1024.jpg 1013w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-297x300.jpg 297w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator-768x776.jpg 768w, https://3usoc414r21u35nxl24gal1m-wpengine.netdna-ssl.com/wp-content/uploads/2020/11/Energizer-PPS240W01-Power-Station-3-generator.jpg 1200w" sizes="(max-width: 1013px) 100vw, 1013px" /&gt;</span></noscript></a><figcaption data-dcnode-id="691"><span data-dcnode-id="695" instrument_node="">Highly underrated. (</span><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Energizer-Portable-Generators-Phosphate-Emergency/dp/B07ZFSW98T%3Fdchild%3D1%26keywords%3DEnergizer%2BPPS240W01%26qid%3D1605211909%26sr%3D8-1%26linkCode%3Dll1%26tag%3Dpivotordie-20%26linkId%3Ddab977e8f6344e145b58e8194e562309%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="694" instrument_node="">Amazon</span></a><span data-dcnode-id="692" instrument_node="">)</span></figcaption></figure><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">The same applies for super cool temperatures as well. As a result, battery drain and charging times are really consistent across a variety of ambient temperatures whether it be hot or cold. Lifepo4 batteries have longer lifetimes, so they retain more effective capacity after 500+ charging cycles compared to regular Li-Ion batteries.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">&nbsp;There are specially designed air ducts running along the length of the PPS240W01 to a cooling fan which turns on only if things start to get hot. Otherwise the unit is dead silent. It is much narrower than competing models from other brands, so you can easily fit one of these on your desk. There are two 5V Type A ports, two 120V 3-prong ports, a QC 3.0 USB port, three 12V DC outputs, and a 45W Type C port. It comes with a car charging cable, AC adapter, and cigarette lighter cable.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Price wise, it is relatively affordable. If you want something cheap and reliable to power your laptop, router, and lights during an outage, this is very good. It is also built tough and can be carried around pretty easily. Not everyone has a ton of money to throw around during these times, which makes the Energizer an excellent choice over more pricey options from Goal Zero.</span></p><span data-dcnode-id="680" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="679"><span data-dcnode-id="678" instrument_node="">

</span><p data-dcnode-id="622"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Overview:</span></strong></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">With a massive 1516Wh Li-Ion battery and MPPT charge controller, the Yeti 1500X can both charge extremely fast while also powering your devices for extended periods of time. It has the number 1500 in its name, but this is actually a 2000W continuous and 3500W surge power station. It has built-in W-Fi connectivity so you can link it up with your Yeti app. The latest version of the Yeti app allows you to track real-time power consumption and view historical power data. You can toggle individual ports on and off from your phone and set charging profiles to optimize battery life.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p class="has-text-align-center has-text-color has-background" data-dcnode-id="613" style="background-color:#e7eef4;color:#00369e"><strong data-dcnode-id="614"><span data-dcnode-id="617" instrument_node="">VIDEO | A Closer Look at the </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Portable-Station-Emergency-Inverter-Generator/dp/B08FX3S5LF%3Fdchild%3D1%26keywords%3DGoal%252BZero%252BYeti%252B1500X%26qid%3D1621331860%26sr%3D8-1-spons%26spLa%3DZW5jcnlwdGVkUXVhbGlmaWVyPUEyMDNPTVM4WDRDTFIyJmVuY3J5cHRlZElkPUEwOTEwNjAwMjQwOU9OMVpPOEFESSZlbmNyeXB0ZWRBZElkPUEwNTY2MzQ3M1NVQ0Q0UDhaTDRKQiZ3aWRnZXROYW1lPXNwX2F0ZiZhY3Rpb249Y2xpY2tSZWRpcmVjdCZkb05vdExvZ0NsaWNrPXRydWU%253D%26th%3D1%26linkCode%3Dll1%26tag%3Dpivotordie-20%26linkId%3D481f82f8b689f053dc81a44e7448fe14%26language%3Den_US%26ref_%3Das_li_ss_tl"><span data-dcnode-id="616" instrument_node="">YETI 1500X</span></a></strong></p><span data-dcnode-id="612" instrument_node="">
