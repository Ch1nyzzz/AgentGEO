</span></div></figure><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">The Yeti 1500X is optimized for solar power with its APP (Anderson Power Pole) input and MPPT charge controller. If you hook up three Boulder 200 panels (a total of 600W), it can charge up in less than 3 hours under ideal conditions. From the wall, it takes 14 hours to charge with the included adapter. Or 7 hours, if you’ve got a 230W outlet.</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">There is a bay for the Yeti Link expansion module. This allows you to connect an external power pack or integrated the Yeti 1500X into your car’s 12V power system for easier charging on the move. The bay also contains an 8mm 120W input port and APP 30 amp output for better cord management. I just wish they put more 120V AC ports on this power station, since it just has 2. The Yeti 1500X can run a laptop for 30+ hours, a mini fridge for up to 44 hours, a 1000W microwave for 2 hours. It can easily power a large side by side refrigerator for an entire day.</span></p><span data-dcnode-id="597" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="596"><span data-dcnode-id="595" instrument_node="">
</span><h3 data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">How Do Portable Power Stations Work?</span></h3><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="591" instrument_node="">How do indoor generators differ from a traditional gas generator? </span><strong data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Hint </span></strong><span data-dcnode-id="588" instrument_node="">: The gas </span><img alt="😃" class="emoji" data-dcnode-id="587" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f603.svg&amp;raw"></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="584" instrument_node="">A portable power station or indoor generator is just like the </span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uninterruptible_power_supply" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="583" instrument_node="">UPS (uninterruptible power supply)</span></a><span data-dcnode-id="581" instrument_node=""> that powers your computer during an outage. Just a lot bigger in capacity and with more ports. It contains a battery pack (typically lithium-ion) and an inverter. The battery pack outputs DC power which the inverter module converts into AC and steps up to the correct voltage and hertz (110 to 120 volts at 60Hz). All your home appliances run on AC power; some convert that back into DC with their own power supply (like your computer).</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Since there is no engine, you don’t get any fumes or noise like you would with a conventional generator. And that means no risks with running one of these indoors in an apartment or any other confined space. That’s not all, you also get pure sine wave power which is comparable in quality and stability to what you get from the wall through the utility grid. So any sensitive electronics with microchips will run just fine (OLED TV, computer, phone, camera, etc.).</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">All indoor generators are capable of supplying both DC and AC power, something only inverter generators could do before power stations became mainstream. They also have USB ports so you can power your phone or laptop directly. No need to clog up the AC outlets with adapters. So you can use the AC outlets to power something like a portable fan, fridge, TV, etc.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">They aren’t 100% silent however, since there is usually at least one fan to cool the inverter circuitry and/ or battery. After all, you have to keep batteries at an optimum temperature range if you want them to charge at high speeds. But these fans are smart and won’t kick in until they are required to. And they can modulate their RPM to only spin as fast as needed. So think of them like the fans in your computer case because the loudness levels are also similar.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">As of now, if you want to get emergency backup indoors a portable power station is the only generator you can buy.</span></p><span data-dcnode-id="567" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="566"><span data-dcnode-id="565" instrument_node="">
</span><h3 data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Portable Power Station vs Gas-Powered Generator</span></h3><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">There are pros and cons to both systems. Portable power stations are quiet and release zero toxic fumes. However, they can take quite a bit of time to charge. On the other hand, a gas powered generator can refuel in minutes. A portable gas generator will backup your laptop, TV, and other electrical appliances for a few hours at best. Whereas a gas generator can run for days before you need to shut it down.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">A gas generator can only be run outdoors in well-ventilated areas, but a portable power station can operate anywhere. Indoors outdoors, it doesn’t matter as long as you have the means to recharge it (solar, car, or wall power). Gas generators are generally heavier and physically larger for the same wattage compared to indoor generators. That’s because they have an engine, fuel tank, chassis, exhaust system , etc. Whereas an indoor generator just has a battery pack and inverter. These are much more compact and easier to pack into smaller spaces. Plus you don’t need a solid metal tube frame running around the whole thing for structural integrity since a simple plastic outer shell is enough.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="555" instrument_node="">In terms of reliability, I believe gas wins. It is going to work as long as you have fuel stored at home, and will turn on every time you pull that cord if you maintain it properly. And it will last decades with some parts replacements. Portable power stations have complicated electronic circuitry that is hard to repair at home unless you are really good with electronics. They also have batteries which lose their ability to hold charge after a few hundred charge cycles (usually after the 500</span><sup data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">th</span></sup><span data-dcnode-id="552" instrument_node=""> charge). And solar charging is sort of unreliable since you never know when the weather gods decide to be uncooperative and cover the sky with clouds.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Also, there’s something about trying to power your electronic equipment with a generator that itself requires electricity to function which really doesn’t feel right. If you’re serious about off-grid living a network of solar panels will do the job. And it’s super clean for the environment. A lot of people care about reducing their impact on the environment, trying to make power in cleaner and more sustainable ways.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">If you already power your home with solar energy, getting an indoor generator just makes sense over a gas powered generator. It synchronizes with the rest of your equipment and integrates into a smart home if the power station supports Wi-Fi/ Bluetooth connectivity. Plus, it’s safer with kids and pets in the house. The exterior of a portable power station doesn’t get very hot. So you don’t have to worry about someone getting burned by accidentally touching it. And since you don’t have to store gasoline, it reduces the potential risk or a fire hazard.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">For those of you living in apartments, the lease agreement might have rules prohibiting the use of gasoline generators. And you might violate local fire codes by storing gasoline in the apartment. One final thing to consider is the fact that portable power stations are quite expensive. You can get a decent inverter generator in the 1000 to 2000 watt range for under 1000 bucks. Conventional open-frame generators are even cheaper.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">But a 1000 to 2000 watt portable power station is much more costly. In the short term this might be a deterrent preventing you from considering one, especially with how our finances are thanks to this global pandemic. Many people don’t have a job and are stacking up on their debts. But think about it from a long term perspective. You spend zero money on gas, and can potentially get free power from solar panels. And you don’t have to think about what appliances you shouldn’t power, because the energy is clean sine wave just like what you get from the wall. It is also less hazardous and much easier to live with for people in apartments.</span></p><span data-dcnode-id="538" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="537"><span data-dcnode-id="536" instrument_node="">
</span><h3 data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Understanding The Technical Terms</span></h3><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Throughout this article, I’ve mentioned things like amps, volts, watt-hours, milliamp hours, etc. What do all these things mean? Why should you care? If you wish to purchase the right portable power station that is capable of powering all your essential equipment for the required amount of time, it’s important that you pay attention to what these terms mean.</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">On top of that, many manufacturers will manipulate data and present certain metrics in ways that make it seem as though their generator is better. A bigger number means better performance to many oblivious consumers. For example, the “Dominator 3000” from company “X” might actually be capable of 2000 watts continuous with 3000 watts of surge. Continuous power is the amount of power that the inverter can output reliably for an extended period of time. Surge power is only available for a few seconds, like when a motor needs that additional current draw at the start to overcome resistance before it gets running.&nbsp;</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Any appliance with just resistive load has the same starting and running watts. TVs, microwaves, hair dryers, computers, etc. have similar starting and running watts. But capacitive loads like what you find in pumps, compressors, etc. can have a starting wattage up to 2 or even 3 times higher than their running wattage. Refrigerators draw the most power when their compressor is working, same applies for air conditioners. A lot of power tools have high starting wattages. So you need larger power stations like the Yeti 1500X or EGO NEXUS to run jobsite tools/ air conditioners.</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Manufacturers measure the capacity of power station batteries with milliamp hour or mAh. But this isn’t indicative of how much power the battery can deliver, that is determined through watt hours. You multiply milliamp hours with volts to get power over time. For example, a 10000 mAh battery rated for 5V can deliver 50000 milliwatt hours or 50 Watt hours (Wh). Which means it can power a load of 50 watts for one hour.</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Watts = voltage x current. Think of it like a plumbing pipe. You have water flowing through this pipe. Voltage tells you the pressure difference between both ends of the pipe, or the water pressure/ force with which the water flows. Amperage is simply the volume of water flowing through a cross section of the pipe at any given second. Replace water with electrons and you have electricity. Volts measures the electric potential or “pressure” across a conductor while amps measures the volume of charge flowing through a cross section of the conductor at any given time.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">High draw appliances like washing machines, dishwashers, dryers, etc. require a lot of amps to work. And you need to make sure your portable power station’s inverter can handle that amount of current. Read the specs sheet, ensure that it can handle at least 15 or 20 amps if you wish to run tools or similar high draw equipment. Also pay attention to surge vs continuous wattage.</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="511"><strong data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Note:</span></strong><span data-dcnode-id="512" instrument_node=""> If you’re placing your generator on the balcony, make sure it has some level of water resistance since it’ll be subjected to rainfall and pooled up water. The outlets should have some kind of protective rubber cover on them to prevent moisture and dust from getting in contact with the pins. And make sure your extension cord doesn’t have any breaks in the insulation or you’ll get a nasty shock when you walk out into the balcony with water pooled up. All modern portable power stations have built-in overcurrent (excess current beyond the device rating) protection and will trigger the breakers when they detect a short, but you shouldn’t risk it. Keep yourself and your generator safe from the elements.</span></p><span data-dcnode-id="510" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="509"><span data-dcnode-id="508" instrument_node="">
</span><h3 data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Is It Safe To Use A Gas Generator on Your Balcony?</span></h3><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Nope. Conventional open-frame generators are a no-go since they have no catalytic converters and are not fuel-efficient. As a result they emit tons of fumes, a lot of which is dangerous carbon monoxide. CO or carbon monoxide is an odorless, tasteless gas that can seep into your living quarters. In small quantities it causes difficulty in breathing and nausea/ headaches. But in large enough quantities this gas can be lethal since it impedes the ability of your red blood cells (RBC) to absorb oxygen taken in by your lungs. It replaces the oxygen and bonds with your RBC’s, potentially causing vital organs like the heart and brain to fail. People have often died in their sleep because of CO poisoning. It happens all the time.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Carbon monoxide is odorless so you can’t tell if lethal fumes are surrounding you without a CO detector. Eventually you’ll feel light-headed, but by then, it’s too late. CO detectors are a must-have if you’re running a portable gas powered generator near the home. Never operate a gas generator less than 10 feet from an open door or window, and to be honest, err on the side of caution and keep gas generators as far away as possible from indoor spaces, including garages, barns and sheds. </span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Often times, storm hit areas employ portable generators to power their households when the grid is down. This is when you see a second wave of deaths (first wave from the storm itself). CO poisoning kills dozens every year. According to a report released by the CPSC in 2013, there were a total of 931 non-fire related deaths due to CO inhalation between 1999 and 2012. And 800 of these were from portable generators.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">There was this news story in April of 2015 in which a family of 8 was reported to have died from carbon monoxide poisoning. They had a generator running inside the house. Electricity had been shut off due to unpaid bills, and the father had been using a gasoline powered portable generator. Even if you live in a regular house and not an apartment, a generator is dangerous if it’s close enough to the home (10 feet or so). If you have a small porch or attached garage, don’t run a generator there. It should be at least 30 feet away from any doors or windows. The amount of CO emitted from a portable generator is several times higher than what comes out of a running car’s exhaust.</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="489"><strong data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Note:</span></strong><span data-dcnode-id="490" instrument_node=""> A Honda EU2200i is what I would choose if I had to put a generator on my balcony/ patio, it is quiet and extremely fuel efficient. I suggest you only get one if you live on the ground floor and your lease allows it. If you live in a high rise and run a gas generator on your balcony, the fumes might seep down into lower floors. Plus refueling and storing gas within apartment premises is a potential fire hazard. I am still against the idea.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Read more about generator safety :</span></p><span data-dcnode-id="485" instrument_node="">
</span><ul data-dcnode-id="478"><li data-dcnode-id="482"><a data-dcnode-id="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.generac.com/resources-and-tools/homeowner-resources/portable-generator-safety" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="484" instrument_node="">Generac guidelines for generator safety</span></a></li><li data-dcnode-id="479"><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.osha.gov/OshDoc/data_Hurricane_Facts/portable_generator_safety.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="481" instrument_node="">OSHA official overview of gas generator safety</span></a></li></ul><span data-dcnode-id="477" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="476"><span data-dcnode-id="475" instrument_node="">
</span><h3 data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Getting More Runtime Out Of Your Indoor Generator</span></h3><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="471" instrument_node="">Some indoor generators support parallel operation so you can hook them up with another unit of the same model. Or maybe an external battery pack if your generator supports it. The </span><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalzero.com/shop/yeti-accessories/yeti-link-expansion-module/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="470" instrument_node="">Goal Zero Yeti Link expansion module</span></a><span data-dcnode-id="468" instrument_node=""> allows you to chain an expansion tank with your Yeti 1000/ 1400/ 3000. These expansion packs are quite heavy and take up extra floor space. At that point, you might as well consider purchasing an inverter and a few batteries to power your entire home. A portable power station is essentially an inverter + battery pack built into a compact package that you can carry around.</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">If external battery packs and chaining generators aren’t an option, you could look into putting some solar panels on your balcony. This way you can charge the generator while it is powering your devices. Solar panels range from 60W all the way up to 200W. They are easy to store since they fold up, and come with convenient carry cases so you can take them outdoors with you on camping trips. Almost all modern portable power station support charging via solar panels.</span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Finally, you need to limit your power consumption. Just like dieting, you want to cut down on anything that isn’t necessary for you to function. If the power grid is down and you are on your own, do you really need to game on your powerful desktop PC? Just watch some movies on your laptop instead, or read a book. Both of those options consume much less power. Don’t try to run everything in the house, only the essential stuff that helps you survive. Like the fridge, lights, phone, laptop, internet router, etc. If you can get by without using the air conditioning or heater, do so. Can you make something basic with the crock-pot instead of turning on your 1000W microwave oven? Do you need that food processor, or can you manage with a mortar and pestle?</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">It all comes down to how frugal you can be, and what comforts you’re willing to sacrifice so you can make it through the entirety of the outage without any hiccups. Call up your utility company and ask when they expect the outage to be resolved. That should allow you to construct a plan on which appliances you can use and for how long with the amount of backup power you’ve got.</span></p><span data-dcnode-id="457" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="456"><span data-dcnode-id="455" instrument_node="">
</span><h3 data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">How The COVID-19 Pandemic Has Made Us More Self-Reliant</span></h3><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">If you haven’t already purchased a generator, now is the time to get one. You want to reduce your potential exposure to the CoVID-19 virus as much as possible, that means staying in your home and stocking up on rations. Especially if it’s hurricane season. Canned food, water, LED lights, etc. are all nice to have if you live in a storm-prone area like the Gulf Coast. Hurricane season is going to leave plenty of people without power, and you don’t want to constantly travel&nbsp; between the store/ gas station and your home.</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">If you live in a regular home you can afford to get a powerful gas generator — as far as space goes. You’ll have ample space between the gas generator and the windows. You can place your generator in the lawn, and hook it up to your home circuits with a transfer switch. But for people like me who are living in apartments, there is no such option. We can’t modify our homes with a transfer switch, or even run a generator. Our lease agreements have strict rules regarding noise and home modifications. So the best choice is to get something that is a simple plug and play system. Portable power stations emit zero toxic fumes, so you don’t have to worry about sleeping with one running in the background. They also make no noise, except for the little cooling fans which aren’t even audible if you’re more than 5 feet away.</span></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">I have been spending a lot of time watching cooking channels on YouTube, learning how to cook during this pandemic. It is a nice skill to have, and it keeps you healthy. Takeout is nice every once in a while, but you don’t want to turn it into a habit. It is bad for your body, and your wallet. Plus, with how many people we’ve got infected with the virus, you never know if the guy delivering your food is also handing over some complementary virus samples.</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">When you do order food, make sure you’re wearing a mask and sanitary gloves as you go to pick it up. Throw the packaging, ditch the gloves, and wash your hands thoroughly for at least 20 seconds with sanitizer or anti microbial hand-wash before you eat. The same applies when you buy groceries at the store (or order it online as I often do).</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">The pandemic has also increased our reliance on electronic gadgets. Most of us are locked up in our own homes, working and communicating with colleagues/ friends through Skype or Zoom calls. Computer and console sales are predicted to spike, and new hardware is almost always out of stock. The global crisis has forced people into their homes, and they are buying stuff that will help them weather this storm more comfortably. Personal fitness equipment, tablets for entertainment, game consoles, TVs, webcams, etc. are being sold at much higher rates.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">And guess what you need to power all this stuff – electricity. Hence searches on Google for indoor generators have spiked massively. And you have to understand that a lot of people in big cities live within apartments or condos. Some of these places don’t have a balcony, which makes a portable power station the only choice if you wish to run your computer or fridge during an outage.</span></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">If you’re cooking more and working from home, an indoor generator is something to consider. Not only is it safer and quieter than a gas generator, but it can also run your computer and other sensitive electronics. Conventional generators aren’t suited to powering laptops or phones because they don’t produce pure sine wave power.</span></p><span data-dcnode-id="431" instrument_node="">
</span><hr class="wp-block-separator is-style-default" data-dcnode-id="430"><span data-dcnode-id="429" instrument_node="">
</span><h3 data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Conclusion : Indoor Generators are a Valuable Device for your Apartment or Condo</span></h3><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">I hope this article gave you some perspective on how an indoor generator helps you work from home more comfortably, decreasing your reliance on the power grid. Solar charging is one of the best things if you live off-grid or in an area that is frequently affect by hurricanes. Even if the grid is down for weeks, you can power essential equipment with a couple of solar panels and your indoor generator.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Cooking your own food is a great way to save on money and boost your overall healthiness (as well as mentality). Induction cooktops are an excellent choice for students living in dorms, or people living in apartments. They don’t heat up the room as much as a gas stove and are very safe to use since they directly heat the utensil. You need a 1500 to 2000W indoor generator to power one of these, something like the Yeti 1500X or Delta 1300. Or maybe multiple indoor generators – one for the cooktop, and another for your fridge + computer.</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Take your financial situation into account, decide how many things you need to power, and how much floor space you have. I made sure to review a wide range of indoor generators in this article, some are tiny while others are massive. All of them are silent and don’t emit any fumes, so choose one that fits your needs and budget.</span></p><span data-dcnode-id="417" instrument_node="">
