</span><p data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">First of all, a personal insight: It’s quite a pleasure to review big air purifiers for large rooms. The reason is simple. When it comes to large room air purifiers, every air purifier brand brings its A-game.</span></p><span data-dcnode-id="2649" instrument_node="">
</span><p data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">Big air purifiers usually have the best filtration system (often H13 HEPA filters), highest CADR ratings, and higher maximal airflows. Many of these large air purifiers are the best brand models overall.</span></p><span data-dcnode-id="2646" instrument_node="">

</span><p data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">The two most important factors that determine the coverage area are the CADR rating and max. airflow.</span></p><span data-dcnode-id="2147" instrument_node="">
</span><h4 data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">CADR Rating</span></h4><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2140"><a data-dcnode-id="2142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/cadr-rating/"><span data-dcnode-id="2143" instrument_node="">CADR rating</span></a><span data-dcnode-id="2141" instrument_node=""> (Clean Air Delivery Rate) is an AHAM verified metrics that tells us how well does a particular air purifier captures air pollutants, such as dust, smoke, and pollen.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2139" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">An average air purifier will have a CADR rating of about 200. Large room air purifiers should have an above-average 200+ CADR rating in order to be able to handle large amounts of polluted indoor air.</span></p><span data-dcnode-id="2135" instrument_node="">
</span><p data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">If you look at the comparison table, you see that all big room air purifiers have 200+ CADR ratings (the exception is Molekule Air which doesn’t share CADR ratings). In fact, most of them have a 300+ CADR rating.</span></p><span data-dcnode-id="2132" instrument_node="">
</span><p data-dcnode-id="2127"><span data-dcnode-id="2131" instrument_node="">CADR of 350 is optimum for large rooms. The most powerful unit – </span><a data-dcnode-id="2129" href="#largeroom2"><span data-dcnode-id="2130" instrument_node="">Blueair Classic 680i</span></a><span data-dcnode-id="2128" instrument_node=""> – has an exceptional 450 CADR rating.</span></p><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2121"><span data-dcnode-id="2125" instrument_node="">On the low end, we have </span><a data-dcnode-id="2123" href="#largeroom5"><span data-dcnode-id="2124" instrument_node="">Hathaspace Smart 2.0</span></a><span data-dcnode-id="2122" instrument_node=""> with a 265 CADR rating. You can also see that Hathaspace has a lower coverage area. However, its prime advantage is the thorough 5-stage filtration system.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2120" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2119" instrument_node="">
</span><h4 data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Max. Airflow</span></h4><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Maximal airflow is the airflow an air purifier can create on its highest fan speed setting. Average max. airflow for an average air purifier is about 200 CFM. It only makes sense that the best large room air purifiers have a high 300+ CFM max. airflow.</span></p><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Not all air purifier brands share this information in the respective specification sheets. The Blueair Classic 680i has the most powerful fan that can generate an enormous 650 CFM airflow.</span></p><span data-dcnode-id="2110" instrument_node="">
</span><p data-dcnode-id="2105"><span data-dcnode-id="2109" instrument_node="">However, the well-balanced CADR-to-ACH ratio is more important than absolute numbers. You can check the </span><a data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/alen-breathesmart-75i-review/"><span data-dcnode-id="2108" instrument_node="">Alen BreatheSmart 75i review here</span></a><span data-dcnode-id="2106" instrument_node=""> to see how a well-balanced ratio looks like (it’s also an important factor that makes the 75i model the best air purifier in 2021).</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2104" id="AdThrive_Content_8_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">The important part then calculating the coverage area of large air cleaners is the number of air changes per hour.</span></p><span data-dcnode-id="2100" instrument_node="">
</span><p data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">To properly compare the coverage sizes of large air purifiers, we need to put them under the common denominator as far as ACH is concerned.</span></p><span data-dcnode-id="2097" instrument_node="">
</span><h4 data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Coverage Area At 2 ACH (Standard Coverage)</span></h4><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">2 air changes per hour (2 ACH) simple means a large air purifier will be able to completely change the air in a big room every 30 minutes. Hence, 2-times per hour.</span></p><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Applying this, you can see that most large air purifiers have a coverage area between 1,000 and 2,000 sq ft. That means you can use them for 1 large room, and 1 or more adjacent smaller rooms with ease.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2088" id="AdThrive_Content_9_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2087" instrument_node="">
</span><p data-dcnode-id="2082"><span data-dcnode-id="2086" instrument_node="">There are 2 exceptions to this rule. </span><a data-dcnode-id="2084" href="#largeroom3"><span data-dcnode-id="2085" instrument_node="">IQAir HealthPro Plus</span></a><span data-dcnode-id="2083" instrument_node=""> is the extra-large room air purifier with a gigantic 2813 sq ft coverage area.</span></p><span data-dcnode-id="2081" instrument_node="">
</span><p data-dcnode-id="2076"><span data-dcnode-id="2080" instrument_node="">On the other hand, the </span><a data-dcnode-id="2078" href="#largeroom5"><span data-dcnode-id="2079" instrument_node="">Hathaspace Smart 2.0</span></a><span data-dcnode-id="2077" instrument_node=""> has a coverage area of 750 sq ft at 2 ACH.</span></p><span data-dcnode-id="2075" instrument_node="">
</span><p data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">2 ACH is the standard number of air changes per hour for an air purifier. However, most experts do recommend more than 2 ACH. For example, people who tend to get a lot of allergies, are advised to use the 5 ACH calculation.</span></p><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2067"><span data-dcnode-id="2071" instrument_node="">You can read more about how to use the </span><a data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/air-changes-per-hour-calculator-and-formula/"><span data-dcnode-id="2070" instrument_node="">CFM formula to calculate ACH here</span></a><span data-dcnode-id="2068" instrument_node="">.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2066" id="AdThrive_Content_10_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2065" instrument_node="">
</span><h4 data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Coverage Area At 5 ACH (Intense Purification)</span></h4><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">At 5 ACH, a large room air purifier will change all the air in a room every 12 minutes. Of course, the room size for such an intensive air purification is thus reduced from 1,000 sq ft to 2,000 sq ft at 2 ACH.</span></p><span data-dcnode-id="2059" instrument_node="">
</span><p data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">At this intense 5 ACH purification, the coverage area of large air purifiers is between 300 and 1,000 sq ft.</span></p><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Realistically, you will get the most benefit by following the 5 ACH coverage area recommendations.</span></p><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2052" instrument_node="">We see that the best unit – </span><a data-dcnode-id="2050" href="#largeroom1"><span data-dcnode-id="2051" instrument_node="">Alen BreatheSmart 75i</span></a><span data-dcnode-id="2049" instrument_node=""> – can significantly improve air quality in rooms of about 520 sq ft. ‘About’ 520 sq ft means that it will do exceptionally well in 350 sq ft to 700 sq ft large rooms. It’s quite a useful interval to have in mind when checking the coverage areas on big air purifiers.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2047" id="AdThrive_Content_11_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Of course, the extra-large room air purifier by IQAir has a 1,000+ sq ft coverage area even at 5 ACH.</span></p><span data-dcnode-id="2043" instrument_node="">
</span><h4 data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">A Word About H13 Filters</span></h4><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">As previously stated, large room air purifiers are exceptionally well-engineered because all air purifier brands bring their A-game when designing them.</span></p><span data-dcnode-id="2037" instrument_node="">
</span><p data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">The most important part are the filters. More than half of all air purifiers on the market use True HEPA filters. That’s why it’s so magnificent to look at the list of the best large room air purifiers. Why?</span></p><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">Because most of them have the advantaged H13 HEPA filters. True HEPA filters can handle 0.3-micron air pollutants very well. By comparison, H13 HEPA filters Medify MA-112 use can handle 3-times smaller 0.1-micron air pollutants with increasing efficacy.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2031" id="AdThrive_Content_12_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2025"><span data-dcnode-id="2029" instrument_node="">HyperHEPA filters employed by </span><a data-dcnode-id="2027" href="#largeroom3"><span data-dcnode-id="2028" instrument_node="">IQAir HealthPro Plus</span></a><span data-dcnode-id="2026" instrument_node=""> can capture particles that are 0.003-micron in size which is just amazing.</span></p><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">In essence, the top-rated large room air purifiers really do have a battle of advanced filtration systems vs. sheer airflow power.</span></p><span data-dcnode-id="2021" instrument_node="">
</span><p data-dcnode-id="2016"><span data-dcnode-id="2020" instrument_node="">With that in mind, let’s have a look at the top choices for the big room air purifiers:</span><br data-dcnode-id="2019"><span data-dcnode-id="2018" instrument_node="">
</span><a data-dcnode-id="2017" name="largeroom5"></a></p><span data-dcnode-id="2015" instrument_node="">

</span></div></div></div><span data-dcnode-id="1908" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Medify MA-112 is the biggest large room air purifier with a tremendous 2,500 sq ft coverage at 2 ACH. It’s made by a well-known and reliable brand Medify. It’s the perfect combination of thorough H13 HEPA filtration (medical-grade filters) and high airflow; it gives the Medify MA-112 the capability to improve air quality in your entire home.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1905" id="AdThrive_Content_13_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1904" instrument_node="">
</span><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">The main advantage is the advanced H13 HEPA filters. If you look at the filter-by-filter, the Medify MA-112 3-filter system doesn’t look all that extraordinary; pre-filter, activated carbon filter, and HEPA filter are all there.</span></p><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">However, the main filter – HEPA filter – is not a standard HEPA filter (H10-H12, 99.7%, 0.3-micron specs). Medify uses the H13 filter; capable of removing 99.9% indoor air pollutants with 0.1-microns in size. This is the kind of filter that is used in hospital settings to maximize indoor air quality.</span></p><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">The secondary pre-filter, made out of polypropylene fibers is important if you have a cat or a dog in a large room. Have 2 pre-filters instead of a single one will thoroughly protect the HEPA filter by capturing all large air pollutants that come from pets.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1895" id="AdThrive_Content_14_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">The primary specification for every air purifier, large or small, is CADR rating. It is a measure of how well and how quickly an air purifier removes airborne pollutants. Medify MA-112 is superb in this aspect; in fact, it has the highest CADR rating of any large room air purifier. For a 500 CADR-rated unit you usually have to pay $1,000+. Medify, however, is all about price-performance: that’s why Medify MA-112 costs a lot less than $1,000 despite having the 500 CADR rating.</span></p><span data-dcnode-id="1891" instrument_node="">

</span><p data-dcnode-id="1201"><span data-dcnode-id="1205" instrument_node="">Coway is a brand that is known for one thing: sheer performance. The Coway Airmega 400 Smart is the best Coway air purifier for large rooms. It outperforms even the always-awarded Coway AP-1512HH Mighty; you can read more about that in the </span><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/best-coway-air-purifiers/"><span data-dcnode-id="1204" instrument_node="">Coway air purifier reviews here</span></a><span data-dcnode-id="1202" instrument_node="">.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1200" id="AdThrive_Content_27_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1198" instrument_node="">The performance Coway Airmega 400 Smart displays has to do with two things: powerful 340 CFM airflow and, even more importantly, the Max2 HEPA filters that ramp up the CADR rating to 350. Coway Airmega 400 Smart is the only large area air purifier besides the </span><a data-dcnode-id="1196" href="#largeroom1"><span data-dcnode-id="1197" instrument_node="">Alen BreatheSmart 75i</span></a><span data-dcnode-id="1195" instrument_node=""> that has a bigger CADR rating than the airflow.</span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">In translation, that means it’s exceptionally efficient at removing air pollutants such as smoke, pollen, dust in the recommended coverage area. With 1560 sq ft at 2 ACH and 624 sq ft at 5 ACH, the Coway Airmega 400 Smart has an ample coverage area that can cover even the very large rooms.</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">All Coway air purifiers are well-engineered. You can see that clearly in the large room Coway Airmega 400 Smart air purifier if you check the performance (high airflow, CADR rating) and surprisingly low noise levels.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1187" id="AdThrive_Content_28_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Coway Airmega 400 Smart is one of the best-performing air purifiers fit for large and even extra-large rooms. It also had user-friendly features like 1,2, 4, and 8-hour timer, Auto Mode, and Energy Star rating. It might land in the #4 place due to the lower coverage area but performance-wise it’s the best.</span></p><span data-dcnode-id="1183" instrument_node="">

><noscript data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">&lt;img class="usr" src="https://learnmetrics.com/wp-content/plugins/universal-star-rating/includes/image.php?img=06.png&amp;amp;px=14&amp;amp;max=5&amp;amp;rat=4.2" alt="4.2 out of 5 stars" style="height: 14px !important;"&gt;</span></noscript><img alt="4.2 out of 5 stars" class="usr lazyload" data-dcnode-id="1053" data-src="https://learnmetrics.com/wp-content/plugins/universal-star-rating/includes/image.php?img=06.png&amp;px=14&amp;max=5&amp;rat=4.2" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="height: 14px !important;"></td></tr></tbody></table><span data-dcnode-id="1045" instrument_node="">

</span><p data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node="">Among all the large room air purifiers, the Molekule Air PRO is the most exceptional one. If you check the </span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/molekule-reviews/"><span data-dcnode-id="1039" instrument_node="">review of Molekule air purifier</span></a><span data-dcnode-id="1037" instrument_node="">, you will find out exactly what makes it so special:</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1035" id="AdThrive_Content_30_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">The NASA-level PECO filtration technology. Instead of using the standard HEPA-based filtration system, all Molekule air purifiers use PECO filters that use photoelectric catalytic oxidation to destroy air pollutants. The additional benefit of that is the often disputed inactivation or destruction of certain bacteria and viruses.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Molekule Air PRO is the biggest Molekule air purifier with a 1000 sq ft coverage area at 2 ACH. Due to the novel filtration system, we don’t have max. airflow or CADR rating specifications.</span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">However, we do have noise levels. The minimum is 33 dB and the maximum is 64 dB; not ideal, obviously.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1025" id="AdThrive_Content_31_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1024" instrument_node="">

</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">It has a decent 1163 sq ft coverage area at 2 ACH and 465 sq ft at 5 ACH, thanks to the 320 CADR rating. But that’s pretty much it.</span></p><span data-dcnode-id="863" instrument_node="">

</span><h4 data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Large Room Air Purifiers FAQ</span></h4><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Let’s answer a few question about air cleaners and big rooms:</span></p><span data-dcnode-id="813" instrument_node="">
</span><h5 data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">What Is The Best Large Room Air Purifier?</span></h5><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="809" instrument_node="">As we have seen, there are many valid choices with the best one being the </span><a data-dcnode-id="807" href="#largeroom5"><span data-dcnode-id="808" instrument_node="">Medify MA-112</span></a><span data-dcnode-id="806" instrument_node="">. It’s a perfectly balanced air purifier, specifically designed for large bedrooms.</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">It has powerful airflow, 2,500 sq ft coverage, and a 500 CADR rating. Medify MA-112 is the very embodiment of the specification you want in a large room air purifier.</span></p><span data-dcnode-id="801" instrument_node="">
</span><h5 data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Can An Air Purifier Be Too Big For A Room?</span></h5><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">This is a common concern. An air purifier can be too big for a room. However, what really matters are the consequences of that: there are practically none.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Even if you big a very large air purifier that would be overkill for the room you put it in, it will do you no harm.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Of course, the unit price, replacement filters, and electricity bills will be higher, which is unpleasant but there are no documented real problems that would occur if you have an oversized air purifier in a room.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Will A Small Air Purifier Work In A Large Room?</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Doubtfully. If you’ve miscalculated the size of an air purifier and bought one that’s too small, it will not properly increase the indoor air quality in that room.</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Putting a small air purifier in a large room is better than nothing, obviously, but’s a job half done. The smaller air purifier will have a shorter lifespan, the replacement filters will have to be changed more frequently, and so on.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">The smartest thing to do is to buy a large air purifier for a large room. Simple.</span></p><span data-dcnode-id="777" instrument_node="">

</span><p data-dcnode-id="508"><span data-dcnode-id="512" instrument_node="">EER = BTU</span><sub data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">cooling</span></sub><span data-dcnode-id="509" instrument_node="">/W</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="506" instrument_node="">HSPF = BTU</span><sub data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">heating</span></sub><span data-dcnode-id="503" instrument_node="">/W</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">COP = Q (useful heat)/W (input work)</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="497" instrument_node="">ACH = CFM x 60/Area x Height</span><sub data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">ceiling</span></sub></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Total Heat (BTU/hr.) = 4.5 x CFM x Δh (std. air)</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Sensible Heat (BTU/hr) = 1.1 x CFM x Δt (std. air)</span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Latent Heat (BTU/hr) = 0.69 x CFM x Δgr. (std. air)</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">1 HP = 746 Watts</span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">1 kW = 3413 BTU</span></p><span data-dcnode-id="478" instrument_node="">
