</span><h1 data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">
    
       True HEPA Tower Air Purifier - Large
    
  </span></h1><span data-dcnode-id="2432" instrument_node="">
</span></div><span data-dcnode-id="2430" instrument_node="">

</span><div class="shg-c" data-dcnode-id="2417" id="s-91f1e537-48e7-4717-941e-db283a9305a2"><span data-dcnode-id="2427" instrument_node="">
</span><div class="shg-rich-text shg-theme-text-content" data-dcnode-id="2419"><p data-dcnode-id="2424" style="text-align: center;"><span data-dcnode-id="2425" style="font-size: 16px;"><span data-dcnode-id="2426" instrument_node="">The HoMedics True Tower HEPA Air Purifier can help you breathe easier at home. Built with a removable and replaceable carbon HEPA filter to tackle common household allergens like dust mites, pet dander and smoke pollution. Whilst the built-in UV-C Light actively cleans your home air of harmful bacterias found in mould and fungus. Will combat 99.97% of airborne particles and ensure the highest indoor air quality for your home environment.</span></span></p><span data-dcnode-id="2423" instrument_node="">
</span><p data-dcnode-id="2420" style="text-align: center;"><span data-dcnode-id="2421" style="font-size: 16px;"><span data-dcnode-id="2422" instrument_node="">This air purifier is perfect for cleaning larger rooms of up to 914.4FT²/H (based on 2.5m room height) or if you have an open plan design to your home. Minimal noise disturbance is also a big factor when finding the best air purifier, our HoMedics Tower Air Purifier benefits from whisper quiet oscillation to ensure every corner of the room is treated.</span></span></p></div><span data-dcnode-id="2418" instrument_node="">

</span><div class="shg-rich-text shg-theme-text-content" data-dcnode-id="2319"><p data-dcnode-id="2320" style="text-align: left;"><span data-dcnode-id="2321" instrument_node="">The best thing about True HEPA filters? They help your air stay fresher and cleaner for longer. HoMedics HEPA filter air purifiers help you breathe easier by removing up to 99.97% of airborne contaminants, from pet hair, allergens and pollen, to dust, smoke and unpleasant odours. Our models have an enhanced bacteria and virus killing UV-C feature - perfect for killing airborne germs and helping to keep you and your family safe.</span></p></div><span data-dcnode-id="2318" instrument_node="">
