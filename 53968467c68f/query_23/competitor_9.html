										Chris Michael					</span></span><span data-dcnode-id="4091" instrument_node="">
</span></li><span data-dcnode-id="4089" instrument_node="">

</span><div class="elementor-element elementor-element-2782cde8 elementor-widget elementor-widget-theme-post-content" data-dcnode-id="4046" data-element_type="widget" data-id="2782cde8" data-widget_type="theme-post-content.default"><span data-dcnode-id="4082" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="4048"><span data-dcnode-id="4081" instrument_node="">
</span><p data-dcnode-id="4077" style="text-align: left;"><span data-dcnode-id="4080" instrument_node="">As winter finally turns to summer having totally missed our Spring this year many people will stop using their dehumidifier and will be wondering where to store it out of the way. At the same time</span><img alt="" class="alignright size-full wp-image-1847" data-dcnode-id="4079" height="424" loading="lazy" sizes="(max-width: 283px) 100vw, 283px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.meaco.com/wp-content/uploads/2018/04/iStock_000017612094XSmall.jpg&amp;raw" srcset="https://blog.meaco.com/wp-content/uploads/2018/04/iStock_000017612094XSmall.jpg 283w, https://blog.meaco.com/wp-content/uploads/2018/04/iStock_000017612094XSmall-200x300.jpg 200w" width="283"><span data-dcnode-id="4078" instrument_node=""> the welcome warmth from the sun also sadly means for many people the start of allergy season.</span></p><span data-dcnode-id="4076" instrument_node="">
</span><p data-dcnode-id="4074" style="text-align: left;"><span data-dcnode-id="4075" instrument_node="">With a third of the British population suffering from some form of allergy in their lifetime and hay fever seemingly becoming more common with our children there is a need and the solution might well already be in your hallway!</span></p><span data-dcnode-id="4073" instrument_node="">
</span><p data-dcnode-id="4071" style="text-align: left;"><span data-dcnode-id="4072" instrument_node="">Owners of the Meaco 12L Low Energy and the Meaco 20L Low Energy dehumidifiers have that solution and don’t have to worry about trying to get their dehumidifier up the loft ladder!</span></p><span data-dcnode-id="4070" instrument_node="">
</span><p data-dcnode-id="4068" style="text-align: left;"><span data-dcnode-id="4069" instrument_node="">Both machines have an AP mode which stands for Air Purification Mode. Selecting this mode on the display turns off the dehumidification cycle and just runs the fan. Do this in conjunction with the machine’s HEPA filter and hey presto you have an air purifier.</span></p><span data-dcnode-id="4067" instrument_node="">
</span><p data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">So there is hopefully no need to spend any more money and yet another gadget for the home!</span></p><span data-dcnode-id="4064" instrument_node="">
</span><p data-dcnode-id="4062" style="text-align: left;"><span data-dcnode-id="4063" instrument_node="">A HEPA filter removes 99.7% of particles that have a size greater than 0.3µm which means that it is removing allergens much smaller than a human hair, things that you cannot see but your eyes and nose can certainly sense and react to!</span></p><span data-dcnode-id="4061" instrument_node="">
</span><p data-dcnode-id="4059" style="text-align: left;"><span data-dcnode-id="4060" instrument_node="">The HEPA filter cleans whatever air is being drawn through the dehumidifier so whether you are using the machine as a dehumidifier or just as an air purifier you benefit from cleaner air.</span></p><span data-dcnode-id="4058" instrument_node="">
</span><p data-dcnode-id="4056" style="text-align: left;"><span data-dcnode-id="4057" instrument_node="">This is why many people who are worried about mould, dust mites and dust buy one of the two Low Energy models for use in their homes all year round so that they can benefit from less mould growth in their bathroom or bedrooms, less dust mites in their beds thanks to the dehumidification and less spores, dander and dust in the air thanks to the HEPA filtration.</span></p><span data-dcnode-id="4055" instrument_node="">
</span><p data-dcnode-id="4050" style="text-align: left;"><span data-dcnode-id="4054" instrument_node="">So the </span><a data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meaco.com/collections/home-dehumidifiers"><span data-dcnode-id="4053" instrument_node="">12L and 20L Low Energy Dehumidifiers</span></a><span data-dcnode-id="4051" instrument_node=""> give you a true 2 in 1 solution to maintain a drier, healthier, cleaner solution for your home that, as the name suggest, costs less electricity to run.</span></p><span data-dcnode-id="4049" instrument_node="">
</span></div><span data-dcnode-id="4047" instrument_node="">

</span><p data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">Asley,</span></p><span data-dcnode-id="3739" instrument_node="">
</span><p data-dcnode-id="3735"><span data-dcnode-id="3738" instrument_node="">Anything that increases resistance to the airflow will effect the extraction, more details here </span><a data-dcnode-id="3736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meaco.com/products/meaco-12l-hepa-filter-pack-of-3" rel="nofollow ugc"><span data-dcnode-id="3737" instrument_node="">https://www.meaco.com/products/meaco-12l-hepa-filter-pack-of-3</span></a></p><span data-dcnode-id="3734" instrument_node="">
</span><p data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">But that is not likely to be why you are not getting below 50%rh.  Firstly why would you want to achieve lower because 50-55%rh is the correct level to be at for a home?  Secondly all of the time the dehumidifier is taking moisture out of the air you are adding it back in from breathing, cooking, drying laundry, showering and bathing etc.  So there is a constant battle going on.  In addition to this as you dry the air then the contents of the house start to dry and they add more moisture into the air.</span></p><span data-dcnode-id="3731" instrument_node="">
</span><p data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">So the issue in your intial question is not likely to be down to the HEPA filter but the factors I have listed above.</span></p><span data-dcnode-id="3728" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2691"><span data-dcnode-id="2710" instrument_node="">
</span><p data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">Thank you Chris. It’s great to get a personal reply from “Head of Corporate” these days. I can see that you place great importance on this, and I congratulate you for it.</span></p><span data-dcnode-id="2707" instrument_node="">
</span><p data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">I can see why some of your customers might see the droplet LED turning off as a fault. Personally, I like to see what’s going on, but if by staying lit it means fewer phone calls for your company to handle, I get it. It is a bit pandering though, no?</span></p><span data-dcnode-id="2704" instrument_node="">
</span><p data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">In terms of communication, you might want to mirror your responses here to customers’ email, because they have no idea at all that you have responded (I suspect this has happened an awful lot, given the low response rate to your thoughtful replies to customers on this Forum). Few are going to want to dig around trying to remember the category in which their comment resides here. Or maybe that’s intentional?</span></p><span data-dcnode-id="2701" instrument_node="">
</span><p data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">May I also make a design suggestion for the Meaco Platinum 20L? Include a floating luminescent plastic pip in the water level indicator. It is very hard to see at best, and was a criticism in the Which Review if I recall correctly. I realise that the machine will cut off when full, but it would be nice to monitor it visually.</span></p><span data-dcnode-id="2698" instrument_node="">
