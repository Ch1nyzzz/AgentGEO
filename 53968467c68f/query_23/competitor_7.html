</span><article class="post-7237 post type-post status-publish format-standard has-post-thumbnail hentry category-evidence tag-featured-posts" data-dcnode-id="169" id="post-7237" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="556" instrument_node="">
</span><div class="inside-article" data-dcnode-id="171"><span data-dcnode-id="555" instrument_node="">
</span><header class="entry-header" data-dcnode-id="534"><span data-dcnode-id="554" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="552" itemprop="headline"><span data-dcnode-id="553" instrument_node="">Do Air Purifiers Really Work? Research Suggests They Have Benefits</span></h1><span data-dcnode-id="551" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="536"><span data-dcnode-id="550" instrument_node="">
</span><span class="posted-on" data-dcnode-id="545"><time class="updated" data-dcnode-id="548" datetime="2021-05-26T16:54:07+00:00" itemprop="dateModified"><span data-dcnode-id="549" instrument_node="">May 26, 2021</span></time><time class="entry-date published" data-dcnode-id="546" datetime="2021-05-04T22:21:16+00:00" itemprop="datePublished"><span data-dcnode-id="547" instrument_node="">May 4, 2021</span></time></span><span data-dcnode-id="544" instrument_node=""> </span><span class="byline" data-dcnode-id="538"><span data-dcnode-id="543" instrument_node="">by </span><span class="author vcard" data-dcnode-id="539" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qualityhomeaircare.com/author/melanie/" itemprop="url" rel="nofollow" title="View all posts by Melanie Mavery"><span class="author-name" data-dcnode-id="541" itemprop="name"><span data-dcnode-id="542" instrument_node="">Melanie Mavery</span></span></a></span></span><span data-dcnode-id="537" instrument_node=""> </span></div><span data-dcnode-id="535" instrument_node="">
</span></header><span data-dcnode-id="533" instrument_node="">
</span><div class="entry-content" data-dcnode-id="218" itemprop="text"><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="531" instrument_node="">With the number of people with asthma and other respiratory diseases constantly </span><a class="rank-math-link" data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/asthma/asthma_stats/asthma-related-physician-visits_2010-2016.html" rel="noopener" target="_blank"><span data-dcnode-id="530" instrument_node="">increasing in the US</span></a><span data-dcnode-id="528" instrument_node=""> and </span><a class="rank-math-link" data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/47/3/985" rel="noopener" target="_blank"><span data-dcnode-id="527" instrument_node="">elsewhere</span></a><span data-dcnode-id="525" instrument_node="">, the world is desperate for solutions.</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">One of the solutions put forward to help prevent allergies and asthmatic reactions is air purifiers. But that begs the question, do air purifiers work?</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">As with all promising, relatively new technology, there is a lot of skepticism. This article will explain what air purifiers are, how they operate, and if they do indeed work.</span></p><span data-dcnode-id="517" instrument_node="">
</span><h2 data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">What are Air Purifiers?</span></h2><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">There is something wrong with the air we breathe. You know that I know that, everybody knows that. We know there are pollutants in the air, and quite frankly, there is very little we can do about those.</span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">In general, developing countries with a lot of manufacturing activities tend to have more pollution than others. We have all seen pictures or videos of cities covered in smug.</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">However, even developed countries like the US struggle with pollutants and allergens that cause or worsen the prevalence of respiratory illnesses such as asthma.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">But in either case, that is not the type of air pollution we can fight with an air purifier.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">What we can fight against are particulates in our homes, such as mold spores, pollen, pet dander, dust mites, and tobacco smoke.</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">These are the home pollutants that air purifiers filter, as they are the most common causes of respiratory allergic reactions.&nbsp;</span></p><span data-dcnode-id="496" instrument_node="">
</span><h2 data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">How do Air Purifiers Work?</span></h2><span data-dcnode-id="493" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="488"><span data-dcnode-id="492" instrument_node="">
</span><figure class="alignright size-large is-resized" data-dcnode-id="490"><img alt="" class="wp-image-7242" data-dcnode-id="491" height="265" loading="lazy" sizes="(max-width: 372px) 100vw, 372px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qualityhomeaircare.com/wp-content/uploads/2021/05/3-1-min.png&amp;raw" srcset="https://qualityhomeaircare.com/wp-content/uploads/2021/05/3-1-min.png 700w, https://qualityhomeaircare.com/wp-content/uploads/2021/05/3-1-min-300x214.png 300w" width="372"></figure><span data-dcnode-id="489" instrument_node="">
</span></div><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Air purifiers cleanse the air we breathe using different methods, depending on the size of the room, how toxic the air is, and your location.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">The three main ways they purify air are:</span></p><span data-dcnode-id="481" instrument_node="">
</span><h3 data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">1. Filtering particulates</span></h3><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">The most common type of air purification involves the use of high-efficiency particulate air (HEPA) or other filters to trap particulates. They can remove 0.3-micrometer particles and should remove at least 99.7% down.</span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Given that particulates are the major causes of allergic and asthmatic reactions indoors, this method of air purification can be very effective. However, as the filters hold the particulates, instead of eradicating them, they need to be replaced often.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">The one danger of this is that many cheap filters use paper or other organic materials that can encourage the growth of spores, which can worsen allergic reactions.</span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">So ensure that you only use synthetic materials, ionizing purifiers, or change the filters often.</span></p><span data-dcnode-id="466" instrument_node="">
</span><h3 data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">2. Kill germs</span></h3><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">This is what most people expect from an air purifier. The idea of a machine that instantly destroys all pollutants on contact is very appealing. These machines use thermodynamic sterilization and ultraviolet irradiation to kill microorganisms.</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">However, these can only be used in controlled environments such as labs and sterile rooms in hospitals, etc.</span></p><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">They are also quite expensive, as you can imagine, and maybe overkill, considering filtration systems are effective against most particulates.</span></p><span data-dcnode-id="454" instrument_node="">
</span><h3 data-dcnode-id="451"><strong data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">3. Remove volatile organic compounds (VOCs)</span></strong></h3><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Many of the chemical products we use in our homes, such as paints, varnishes, disinfectants, degreasers, and cleaners, have organic solvents.</span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Unfortunately, these products often release VOCs, which is why they are more prevalent indoors than outdoors.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="443" instrument_node="">VOCs have been reported to have </span><a class="rank-math-link" data-dcnode-id="441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/indoor-air-quality-iaq/volatile-organic-compounds-impact-indoor-air-quality" rel="noopener" target="_blank"><span data-dcnode-id="442" instrument_node="">adverse short and long-term effects on health</span></a><span data-dcnode-id="440" instrument_node="">. They may affect people with pre-existing respiratory conditions or cause them in healthy individuals.</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Some air purifiers are capable of removing VOCs to varying degrees. Given their high level of toxicity, this may be a deciding factor when choosing an air purifier.</span></p><span data-dcnode-id="435" instrument_node="">
</span><h2 data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">What Types of Air Purifiers are There?</span></h2><span data-dcnode-id="432" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="427"><span data-dcnode-id="431" instrument_node="">
</span><figure class="alignright size-large is-resized" data-dcnode-id="429"><img alt="" class="wp-image-7241" data-dcnode-id="430" height="242" loading="lazy" sizes="(max-width: 339px) 100vw, 339px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qualityhomeaircare.com/wp-content/uploads/2021/05/2-1-min.png&amp;raw" srcset="https://qualityhomeaircare.com/wp-content/uploads/2021/05/2-1-min.png 700w, https://qualityhomeaircare.com/wp-content/uploads/2021/05/2-1-min-300x214.png 300w" width="339"></figure><span data-dcnode-id="428" instrument_node="">
</span></div><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">There are quite a few air purifiers, each with its unique way of purifying the air, what they are helpful against, and where they can be used. Common types of air purifiers include:</span></p><span data-dcnode-id="423" instrument_node="">
</span><h3 data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">1. HEPA filter air purifiers</span></h3><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">As mentioned previously, these are the most common type of filter purifiers. Different types of products and designs can be called HEPA filters, with a range of applications from air purifiers to vacuum cleaners.</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">To be classified as such, the filter must only allow at most 0.03% of particles to go through, and none can be larger than 0.3 micrometers.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">There is also the ultra-low penetration air (ULPA) filter, which goes beyond the capabilities of standard HEPA filters. Despite the name, ULPA and HEPA must allow a certain amount of air to pass through, based on strict guidelines.</span></p><span data-dcnode-id="411" instrument_node="">
</span><h3 data-dcnode-id="408"><strong data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">2. Activated carbon air purifiers</span></strong></h3><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Unlike HEPA and ULPA, carbon air filters are designed to capture gasses in the air instead of particles.</span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Activated carbon can remove volatile organic compounds (VOCs) like formaldehyde, benzene, methylene chloride, and other pollutants like nitrogen oxides from the air by chemically binding them on tiny binding sites.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">The gases (air) pass through activated charcoal (the carbon) and stick to it. This is similar to how charcoal has been used for centuries to get rid of bad smells.</span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">For the charcoal to be more effective, it is ‘activated,’ meaning the surface area is significantly increased so that it can absorb more pollutants.</span></p><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">This type of cleaner is also known as adsorbents, not to be confused with absorbent. Instead of the gas being absorbed into the charcoal, it simply clings to the surface.</span></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">While these are highly effective against VOCs and gases, they are relatively ineffective against particles. Larger particles get trapped in the lattices of the carbon, but smaller ones are released back into the atmosphere.</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">So, if you are concerned about allergies and respiratory conditions caused by or exacerbated by dander, pollen, mold, or dust mites, activated carbon air purifiers won’t do the trick.</span></p><span data-dcnode-id="386" instrument_node="">
</span><h3 data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">3. Ionizing air purifiers</span></h3><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Unlike the previously discussed purifiers that filter out or prevent the flow of particles or pollutants, ionizing purifiers work best by allowing the particles to flow freely!</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">An ionizing purifier created charged molecules (ions) using corona discharge. This discharge causes the molecules to become either positively or negatively charged.</span></p><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">This positive or negative charge causes them to attract particles with the opposite charge.</span></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">As the dust and other particles stick to each other, they become heavier and eventually fall to the floor. They may also be drawn to carpets, curtains, chairs, or other stable objects in your home.</span></p><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Ionic purifiers, as they are also called, can be fanless or have a fan. The advantage of the fan is that it caused the air to circulate quicker. However, the fanless variants are quieter.</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">In order to make them more effective, ionizer air purifiers can come with a HEPA filter to remove particulates or activated carbon to combat VOCs.</span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="364" instrument_node="">As with all air purifiers, there is a downside, and this one is pretty huge. Ionizers can produce ozone, which is a lung irritant. The United States </span><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/indoor-air-quality-iaq/ozone-generators-are-sold-air-cleaners%23good-bad-ozone" rel="noopener" target="_blank"><span data-dcnode-id="363" instrument_node="">Environmental Protection Agency</span></a><span data-dcnode-id="361" instrument_node=""> (EPA) strongly advises against using any product that generates ozone.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">While ozone in the stratosphere is good, ozone in the atmosphere (the air we breathe) is terrible. On top of that, there is no research that suggests that ionizers that produce a harmless level of ozone are effective for air purification.</span></p><span data-dcnode-id="356" instrument_node="">
</span><h3 data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">4. Ozone generators</span></h3><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">based on our review of ionizers, you can already tell this is not going to be an option, but let’s dive in anyway.</span></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Ozone generators work similarly to ionizer air purifiers by releasing a corona discharge or UV light to alter the molecular state of oxygen.</span></p><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">The oxygen we breathe is dioxygen, meaning it has two molecules. When this oxygen gets an extra molecule, it becomes ozone.</span></p><span data-dcnode-id="344" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="339"><span data-dcnode-id="343" instrument_node="">
</span><figure class="alignright size-large is-resized" data-dcnode-id="341"><img alt="" class="wp-image-7243" data-dcnode-id="342" height="261" loading="lazy" sizes="(max-width: 365px) 100vw, 365px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qualityhomeaircare.com/wp-content/uploads/2021/05/4-min.png&amp;raw" srcset="https://qualityhomeaircare.com/wp-content/uploads/2021/05/4-min.png 700w, https://qualityhomeaircare.com/wp-content/uploads/2021/05/4-min-300x214.png 300w" width="365"></figure><span data-dcnode-id="340" instrument_node="">
</span></div><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Imagine a toad with three eyes, and you have an idea of why ozone is a bad idea.</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">While it is true that ozone can purify the air, it does more harm than good. Ozone is unstable, and the gas is harmful to people.</span></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">It also reacts with other chemicals and can create even more toxic molecules.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Ozone generators are also powerless against VOCs. On the contrary, ozone may even cause more VOC emissions from chemical compounds around the house, making it even more dangerous.</span></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">When a large quantity of ozone is released, it can be effective against pollutants. But, of course, this level is dangerous to people.</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Which is why it is only used on an industrial scale, where people are absent, and the area is adequately ventilated afterward.</span></p><span data-dcnode-id="320" instrument_node="">
</span><h3 data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">5. Ultraviolet radiation</span></h3><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">While short-wave UV light (UV-C light) can be used in ozone generators, it can also function independently. For example, ultraviolet radiation sterilizes microorganisms such as bacteria and viruses.</span></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">The devices are also known as UV germicidal irradiation (UVGI), and they have been used in different medical capacities over the years.</span></p><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">For this to work, the air that passes through the device must spend enough time for the microbes to be thoroughly incapacitated.</span></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">While the idea of an air purifier killing germs is intriguing, the reality is not so. While UV-C light is effective against microorganisms, it cannot filter particles, so it is limited in its ability to protect people with respiratory conditions.</span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">That is why UV-C light purifiers are often used with other options such as HEPA air filtration systems. But, on top of that, UV lights can cause ozone, which we have established as very harmful.</span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">So, even though large units can be effective against bacteria and viruses, the creation of ozone negates any perceived advantages. And so, for the time being, this type of air purifier should remain on the untouchables list.</span></p><span data-dcnode-id="299" instrument_node="">
</span><h3 data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">6. Industrial air purifier</span></h3><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">this isn’t technically a type of air purifier, as it could be any of the ones listed above, but significantly larger and more potent at cleaning the air.</span></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">These units have also overcome some of the barriers or restrictions of their residential substitutes, but they are either too large or too expensive to be used in homes.</span></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Some of these units are capable of filtering the air in an entire building ten times per minute.</span></p><span data-dcnode-id="287" instrument_node="">
</span><h2 data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Are Air Purifiers Effective?</span></h2><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">To answer the question ‘do air purifiers work?’ it is important to add: against what? Against dander, allergens, and particulates, air purifiers have proven to be effective.</span></p><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="280" instrument_node="">The EPA recommends portable air purifiers as a way of </span><a data-dcnode-id="278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/sites/production/files/2018-07/documents/guide_to_air_cleaners_in_the_home_2nd_edition.pdf" rel="noopener" target="_blank"><span data-dcnode-id="279" instrument_node="">improving indoor air quality</span></a><span data-dcnode-id="277" instrument_node="">, but with a strong caveat.&nbsp;</span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Air purifiers cannot wholly eradicate pollutants from your home. On top of that, they tend to target either particles and gases.</span></p><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">While HEPA and ULPA can eradicate most of the particles, some will escape, while others are already on floors and surfaces.</span></p><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">As a result, two things are recommended. The first one is prioritizing cleaning as the most important way of getting rid of allergens, dust, and toxins.</span></p><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">The second is to use an air cleaner that targets both particles and gases, such as a HEPA with activated carbon. This will protect not just people with respiratory infections against allergens but also protect healthy inhabitants from VOCs.</span></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Another way to make the most of air purifiers is to ensure that the clean air delivery rate (CADR) is the adequate size for the room. An air cleaner with a higher CADR and a fan will purify more air and quicker, making it more effective.</span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">It is also critical to ventilate your home correctly, even when you have a powerful air purifier. The primary concern about air purifiers is the creation of ozone.</span></p><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">As we have emphasized, it is best to stay away from ozone generators, UV lights, and ionizing air purifiers. Their disadvantages grossly overcome their benefits. Worst of all, they can actually worsen the health of the people they are trying to protect.</span></p><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="253" instrument_node="">When you do use the right air purifiers, you must also change the filters as often as necessary and keep them clean. Otherwise, even they can become </span><a class="rank-math-link" data-dcnode-id="251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qualityhomeaircare.com/health-risks-associated-with-poor-indoor-air-quality/"><span data-dcnode-id="252" instrument_node="">health hazards brought about by poor indoor air quality. </span></a></p><span data-dcnode-id="249" instrument_node="">
</span><h2 data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Summary</span></h2><span data-dcnode-id="246" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="241"><span data-dcnode-id="245" instrument_node="">
</span><figure class="alignright size-large is-resized" data-dcnode-id="243"><img alt="" class="wp-image-7244" data-dcnode-id="244" height="261" loading="lazy" sizes="(max-width: 366px) 100vw, 366px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qualityhomeaircare.com/wp-content/uploads/2021/05/5-min.png&amp;raw" srcset="https://qualityhomeaircare.com/wp-content/uploads/2021/05/5-min.png 700w, https://qualityhomeaircare.com/wp-content/uploads/2021/05/5-min-300x214.png 300w" width="366"></figure><span data-dcnode-id="242" instrument_node="">
</span></div><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">In brief, air purifiers have been shown to clean the air from dander, mold spores, dust mites, toxins, volatile organic compounds, and smoke.</span></p><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">While every air purifier can sterilize at least one type of pollutant, many variations are either not very effective or can release toxins into the air.</span></p><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">The best type of portable air purifiers can filter both particles and gases and not release any ozone.</span></p><span data-dcnode-id="231" instrument_node="">
</span><p data-dcnode-id="226"><span data-dcnode-id="230" instrument_node="">It is also important to change the filters often and not rely on air purifiers as the sole source or even the primary source of </span><a class="rank-math-link" data-dcnode-id="228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qualityhomeaircare.com/100-ways-to-improve-indoor-air-quality-in-your-home/"><span data-dcnode-id="229" instrument_node="">improving your home’s indoor air quality</span></a><span data-dcnode-id="227" instrument_node="">.</span></p><span data-dcnode-id="225" instrument_node="">
</span><p data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">The best way to protect people with allergic or respiratory concerns is to clean your home often, keep it ventilated, and use an air purifier with a high CADR.</span></p><span data-dcnode-id="222" instrument_node="">
</span><p data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Once you have all these things in place, you can expect to answer the question ‘do air purifiers work?” with an emphatic “Yes!”</span></p><span data-dcnode-id="219" instrument_node="">
</span></div><span data-dcnode-id="217" instrument_node="">
