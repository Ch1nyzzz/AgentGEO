</span><article class="post-6030 post type-post status-publish format-standard has-post-thumbnail hentry category-air-purifier-technology category-featured category-health" data-dcnode-id="1025" id="post-6030"><span data-dcnode-id="1384" instrument_node="">
</span><div class="eltdf-post-content" data-dcnode-id="1030"><span data-dcnode-id="1383" instrument_node="">
</span><div class="eltdf-post-text" data-dcnode-id="1032"><span data-dcnode-id="1382" instrument_node="">
</span><div class="eltdf-post-text-inner clearfix" data-dcnode-id="1034"><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" style="font-weight: 400;"><span data-dcnode-id="1380" instrument_node="">Air purifiers, on the surface, may seem deceptively simple — dirty air is drawn in through a vent and clean air is blown out. But the quality and technology of the mechanisms and filters inside these machines can make all the difference in determining just how effective they are at cleaning indoor air.</span></span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" style="font-weight: 400;"><span data-dcnode-id="1376" instrument_node="">In this post, we break down exactly what an air purifier is, why you may want one in your home, and what you should know about the different types of air filters.</span></span></p><span data-dcnode-id="1373" instrument_node="">
</span><h2 data-dcnode-id="1370"><span data-dcnode-id="1371" style="font-weight: 400;"><span data-dcnode-id="1372" instrument_node="">What is an air purifier, and how does it work?</span></span></h2><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" style="font-weight: 400;"><span data-dcnode-id="1368" instrument_node="">Air purifiers are designed to get rid of odors, allergens, dust and other unwanted airborne substances. Most have two main parts: a fan and a filter. The fan’s job is to circulate the air in a room by sucking in air and forcing it back out through the filter. As the air passes through the filter (or, in the case of some models, multiple filters), pollutants become trapped in it. If an air purifier is working well, the air that has passed through it will contain fewer pollutants than the air that has not passed through it.</span></span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1363" style="font-weight: 400;"><span data-dcnode-id="1364" instrument_node="">There is a wide variety of air purifiers on the market today. These units not only vary in size and price, but also in quality and technology. Whether you are looking to purchase an air purifier for home or business use, consider the following:&nbsp;</span></span></p><span data-dcnode-id="1361" instrument_node="">
</span><ul data-dcnode-id="1335"><span data-dcnode-id="1360" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1357" style="font-weight: 400;"><span data-dcnode-id="1358" style="font-weight: 400;"><span data-dcnode-id="1359" instrument_node="">The room size it is approved for;</span></span></li><span data-dcnode-id="1356" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1353" style="font-weight: 400;"><span data-dcnode-id="1354" style="font-weight: 400;"><span data-dcnode-id="1355" instrument_node="">The type of filter it uses (which will affect the type of pollutants it removes from the air);</span></span></li><span data-dcnode-id="1352" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1349" style="font-weight: 400;"><span data-dcnode-id="1350" style="font-weight: 400;"><span data-dcnode-id="1351" instrument_node="">How often you will need to clean or replace the filter;</span></span></li><span data-dcnode-id="1348" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1345" style="font-weight: 400;"><span data-dcnode-id="1346" style="font-weight: 400;"><span data-dcnode-id="1347" instrument_node="">The cost of replacement filters;&nbsp;</span></span></li><span data-dcnode-id="1344" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1341" style="font-weight: 400;"><span data-dcnode-id="1342" style="font-weight: 400;"><span data-dcnode-id="1343" instrument_node="">The design of the purifier (how bulky it is);</span></span></li><span data-dcnode-id="1340" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1337" style="font-weight: 400;"><span data-dcnode-id="1338" style="font-weight: 400;"><span data-dcnode-id="1339" instrument_node="">How loud the purifier is at different speeds.</span></span></li><span data-dcnode-id="1336" instrument_node="">
</span></ul><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" style="font-weight: 400;"><span data-dcnode-id="1333" instrument_node="">Much of this information can be found on a product’s box or manufacturer website. Online reviews and videos are also helpful sources of information on how an air purifier performs in real-world situations.</span></span></p><span data-dcnode-id="1330" instrument_node="">
</span><h2 data-dcnode-id="1327"><span data-dcnode-id="1328" style="font-weight: 400;"><span data-dcnode-id="1329" instrument_node="">Why you may want an air purifier: Types of indoor air pollution</span></span></h2><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1324" style="font-weight: 400;"><span data-dcnode-id="1325" instrument_node="">Not all air purifiers are created equal, and the same can be said of airborne pollutants. There are a wide variety of contaminants that can impact the quality of indoor air. For example, sources of air pollution include particulate matter, volatile organic compounds and bioaerosols. Exposure to each of the different types of airborne pollutants may lead to various adverse health effects.</span></span></p><span data-dcnode-id="1322" instrument_node="">
</span><h3 data-dcnode-id="1319"><span data-dcnode-id="1320" style="font-weight: 400;"><span data-dcnode-id="1321" instrument_node="">Particulate matter (PM)</span></span></h3><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" style="font-weight: 400;"><span data-dcnode-id="1317" instrument_node="">Particulate matter pollution is one of the most commonly discussed sources of bad air quality. It is a mix of solid particles and liquid droplets suspended in the air. PM can range in size, from dust (and dirt particles that you can see with your eyes) to tiny particles that can only be seen with a microscope. Because these particles are so small, they are very easy to breathe in. Often, you may not even realize you are being exposed to PM.&nbsp;</span></span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1312" style="font-weight: 400;"><span data-dcnode-id="1313" instrument_node="">The smallest particles — those less than 10 micrometers in diameter — are the ones that can have the most severe health effects because of the ease with which they can enter the lungs. Particles that are </span></span><a data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/what-is-pm-2-5-and-how-can-you-reduce-your-exposure/"><span data-dcnode-id="1310" style="font-weight: 400;"><span data-dcnode-id="1311" instrument_node="">less than 2.5 micrometers</span></span></a><span data-dcnode-id="1307" style="font-weight: 400;"><span data-dcnode-id="1308" instrument_node=""> in diameter can </span></span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0304416516300745"><span data-dcnode-id="1305" style="font-weight: 400;"><span data-dcnode-id="1306" instrument_node="">go a step further</span></span></a><span data-dcnode-id="1302" style="font-weight: 400;"><span data-dcnode-id="1303" instrument_node="">, in some cases leaving the lungs and entering the bloodstream and internal organs to cause even more damage. PM exposure can contribute to health problems, </span></span><a data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/pm-pollution/health-and-environmental-effects-particulate-matter-pm"><span data-dcnode-id="1300" style="font-weight: 400;"><span data-dcnode-id="1301" instrument_node="">such as</span></span></a><span data-dcnode-id="1297" style="font-weight: 400;"><span data-dcnode-id="1298" instrument_node="">:</span></span></p><span data-dcnode-id="1295" instrument_node="">
</span><ul data-dcnode-id="1273"><span data-dcnode-id="1294" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1291" style="font-weight: 400;"><span data-dcnode-id="1292" style="font-weight: 400;"><span data-dcnode-id="1293" instrument_node="">Nonfatal heart attacks;</span></span></li><span data-dcnode-id="1290" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1287" style="font-weight: 400;"><span data-dcnode-id="1288" style="font-weight: 400;"><span data-dcnode-id="1289" instrument_node="">Irregular heartbeat;</span></span></li><span data-dcnode-id="1286" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1283" style="font-weight: 400;"><span data-dcnode-id="1284" style="font-weight: 400;"><span data-dcnode-id="1285" instrument_node="">Aggravated asthma symptoms;</span></span></li><span data-dcnode-id="1282" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1279" style="font-weight: 400;"><span data-dcnode-id="1280" style="font-weight: 400;"><span data-dcnode-id="1281" instrument_node="">Decreased lung function;</span></span></li><span data-dcnode-id="1278" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1275" style="font-weight: 400;"><span data-dcnode-id="1276" style="font-weight: 400;"><span data-dcnode-id="1277" instrument_node="">Increased respiratory symptoms.</span></span></li><span data-dcnode-id="1274" instrument_node="">
</span></ul><span data-dcnode-id="1272" instrument_node="">
</span><h3 data-dcnode-id="1269"><span data-dcnode-id="1270" style="font-weight: 400;"><span data-dcnode-id="1271" instrument_node="">Volatile organic compounds (VOCs)</span></span></h3><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1266" style="font-weight: 400;"><span data-dcnode-id="1267" instrument_node="">Volatile organic compounds are a group of gaseous </span></span><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/air-quality-other-pollutants-beyond-particulate-matter-pm/"><span data-dcnode-id="1264" style="font-weight: 400;"><span data-dcnode-id="1265" instrument_node="">pollutants that affect indoor air quality</span></span></a><span data-dcnode-id="1261" style="font-weight: 400;"><span data-dcnode-id="1262" instrument_node="">. These compounds are often byproducts of industrial manufacturing. They can also be found in common household products, including cleaning products and disinfectants, paints and solvents, aerosol sprays and pesticides. Many hobby supplies, such as craft glue, also contain VOCs.</span></span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" style="font-weight: 400;"><span data-dcnode-id="1258" instrument_node="">The term VOC covers a wide range of substances, not all of which are harmful to human health. However, many can cause allergic reactions in sensitive individuals. Symptoms of VOC exposure may include skin reactions, nose and throat irritation, headaches, nausea, dizziness and fatigue.</span></span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1253" style="font-weight: 400;"><span data-dcnode-id="1254" instrument_node="">The Environmental Protection Agency (EPA) specifically recommends </span></span><a data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/indoor-air-quality-iaq/volatile-organic-compounds-impact-indoor-air-quality"><span data-dcnode-id="1251" style="font-weight: 400;"><span data-dcnode-id="1252" instrument_node="">reducing exposure to these VOCs</span></span></a><span data-dcnode-id="1248" style="font-weight: 400;"><span data-dcnode-id="1249" instrument_node="">:&nbsp;</span></span></p><span data-dcnode-id="1246" instrument_node="">
</span><ul data-dcnode-id="1221"><span data-dcnode-id="1245" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1235"><b data-dcnode-id="1236"><span data-dcnode-id="1244" instrument_node="">Benzene: </span><span data-dcnode-id="1242" style="font-weight: 400;"><span data-dcnode-id="1243" instrument_node="">Benzene can be found in cigarette smoke, vehicle exhaust and paint supplies. According to the Department of Health and Human Services, long-term exposure to high levels of benzene can </span></span><a data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emergency.cdc.gov/agent/benzene/basics/facts.asp"><span data-dcnode-id="1240" style="font-weight: 400;"><span data-dcnode-id="1241" instrument_node="">cause cancer</span></span></a><span data-dcnode-id="1237" style="font-weight: 400;"><span data-dcnode-id="1238" instrument_node=""> in humans.</span></span></b></li><span data-dcnode-id="1234" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1229"><b data-dcnode-id="1230"><span data-dcnode-id="1233" instrument_node="">Methylene chloride: </span><span data-dcnode-id="1231" style="font-weight: 400;"><span data-dcnode-id="1232" instrument_node="">A suspected carcinogen, methylene chloride can be found in paint strippers, adhesive removers and aerosol spray paints.</span></span></b></li><span data-dcnode-id="1228" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1223"><b data-dcnode-id="1224"><span data-dcnode-id="1227" instrument_node="">Perchloroethylene: </span><span data-dcnode-id="1225" style="font-weight: 400;"><span data-dcnode-id="1226" instrument_node="">This is the most common chemical used in dry cleaning, and it is also a suspected carcinogen.</span></span></b></li><span data-dcnode-id="1222" instrument_node="">
</span></ul><span data-dcnode-id="1220" instrument_node="">
</span><h3 data-dcnode-id="1217"><span data-dcnode-id="1218" style="font-weight: 400;"><span data-dcnode-id="1219" instrument_node="">Bioaerosols</span></span></h3><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" style="font-weight: 400;"><span data-dcnode-id="1215" instrument_node="">Though some (but not all) bioaerosols may technically be PM, they deserve a special category because of their unique characteristics. Bioaerosols are particles that are emitted or released from living beings, though they are not always alive themselves. These can include:</span></span></p><span data-dcnode-id="1212" instrument_node="">
</span><ul data-dcnode-id="1146"><span data-dcnode-id="1211" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1196"><b data-dcnode-id="1197"><span data-dcnode-id="1210" instrument_node="">Mold: </span><span data-dcnode-id="1208" style="font-weight: 400;"><span data-dcnode-id="1209" instrument_node="">A type of fungus, mold spreads by releasing airborne spores. </span></span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/molekule-air-purifier-indoor-mold/"><span data-dcnode-id="1206" style="font-weight: 400;"><span data-dcnode-id="1207" instrument_node="">Mold spores can be found virtually everywhere</span></span></a><span data-dcnode-id="1203" style="font-weight: 400;"><span data-dcnode-id="1204" instrument_node="">, though they are too small to be seen with the naked eye. Some people, including those with allergies or asthma, may be more sensitive to mold exposure and </span></span><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/which-air-purifier-is-best-for-bacteria-and-other-germs-in-a-home/"><span data-dcnode-id="1201" style="font-weight: 400;"><span data-dcnode-id="1202" instrument_node="">experience health effects</span></span></a><span data-dcnode-id="1198" style="font-weight: 400;"><span data-dcnode-id="1199" instrument_node=""> from exposure, such as coughing, wheezing, stuffy nose, sore throat, skin rashes and eye irritation.</span></span></b></li><span data-dcnode-id="1195" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1180"><b data-dcnode-id="1181"><span data-dcnode-id="1194" instrument_node="">Bacteria: </span><span data-dcnode-id="1192" style="font-weight: 400;"><span data-dcnode-id="1193" instrument_node="">Like mold spores, </span></span><a data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/which-air-purifier-is-best-for-bacteria-and-other-germs-in-a-home/"><span data-dcnode-id="1190" style="font-weight: 400;"><span data-dcnode-id="1191" instrument_node="">bacteria are abundant</span></span></a><span data-dcnode-id="1187" style="font-weight: 400;"><span data-dcnode-id="1188" instrument_node=""> in both indoor and outdoor air. Bacteria are a mostly harmless, natural part of life. In fact, some types of bacteria are necessary for our survival. However, certain strains, such as strep and staph, may </span></span><a data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//serc.carleton.edu/NAGTWorkshops/health/case_studies/microbes_air.html"><span data-dcnode-id="1185" style="font-weight: 400;"><span data-dcnode-id="1186" instrument_node="">cause serious illness</span></span></a><span data-dcnode-id="1182" style="font-weight: 400;"><span data-dcnode-id="1183" instrument_node="">.</span></span></b></li><span data-dcnode-id="1179" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1164"><b data-dcnode-id="1165"><span data-dcnode-id="1178" instrument_node="">Viruses: </span><span data-dcnode-id="1176" style="font-weight: 400;"><span data-dcnode-id="1177" instrument_node="">Another common airborne pollutant, viruses are often found in the air in quantities too small to affect humans. Many viruses, </span></span><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/flu/about/disease/spread.htm"><span data-dcnode-id="1174" style="font-weight: 400;"><span data-dcnode-id="1175" instrument_node="">like the flu</span></span></a><span data-dcnode-id="1171" style="font-weight: 400;"><span data-dcnode-id="1172" instrument_node="">, spread through liquid respiratory droplets that do not stay in the air for long. However, </span></span><a data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thelancet.com/article/S0140-6736%2821%2900869-2/fulltext"><span data-dcnode-id="1169" style="font-weight: 400;"><span data-dcnode-id="1170" instrument_node="">airborne transmission is possible</span></span></a><span data-dcnode-id="1166" style="font-weight: 400;"><span data-dcnode-id="1167" instrument_node=""> for some viruses.</span></span></b></li><span data-dcnode-id="1163" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1148"><b data-dcnode-id="1149"><span data-dcnode-id="1162" instrument_node="">Allergens: </span><span data-dcnode-id="1160" style="font-weight: 400;"><span data-dcnode-id="1161" instrument_node="">An allergen is a substance that triggers an immune system reaction. Though these substances are </span></span><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/ency/article/002229.htm"><span data-dcnode-id="1158" style="font-weight: 400;"><span data-dcnode-id="1159" instrument_node="">not dangerous</span></span></a><span data-dcnode-id="1155" style="font-weight: 400;"><span data-dcnode-id="1156" instrument_node="">, the immune system attacks them as if they were a serious threat to your health. </span></span><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/how-to-get-rid-of-allergens-in-every-room-of-your-home/"><span data-dcnode-id="1153" style="font-weight: 400;"><span data-dcnode-id="1154" instrument_node="">Common household allergens</span></span></a><span data-dcnode-id="1150" style="font-weight: 400;"><span data-dcnode-id="1151" instrument_node=""> include pollen, pet dander and dust mites.&nbsp;</span></span></b></li><span data-dcnode-id="1147" instrument_node="">
</span></ul><span data-dcnode-id="1145" instrument_node="">
</span><h2 data-dcnode-id="1142"><span data-dcnode-id="1143" style="font-weight: 400;"><span data-dcnode-id="1144" instrument_node="">What are the different kinds of air purifiers?</span></span></h2><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" style="font-weight: 400;"><span data-dcnode-id="1140" instrument_node="">The two main types of air pollution — gaseous pollution and particulate matter —&nbsp; can be removed from the air using specific types of filters. Not all air purifiers are equipped to handle the same kinds of airborne pollutants. If you are shopping for an air purifier, you can tell which pollutants it deals with by the type of filter it contains. The main types of air purifiers you will come across are:</span></span></p><span data-dcnode-id="1137" instrument_node="">
</span><h3 data-dcnode-id="1134"><span data-dcnode-id="1135" style="font-weight: 400;"><span data-dcnode-id="1136" instrument_node="">HEPA filters</span></span></h3><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1131" style="font-weight: 400;"><span data-dcnode-id="1132" instrument_node="">A HEPA filter is a type of mechanical filter that meets a standard of removing </span></span><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/indoor-air-quality-iaq/what-hepa-filter-1"><span data-dcnode-id="1129" style="font-weight: 400;"><span data-dcnode-id="1130" instrument_node="">at least 99.97%</span></span></a><span data-dcnode-id="1126" style="font-weight: 400;"><span data-dcnode-id="1127" instrument_node=""> of airborne particulate matter with a diameter of 0.3 micrometers (Note: Only </span></span><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/true-hepa-filter-what-it-is-and-what-it-isnt/"><span data-dcnode-id="1124" style="font-weight: 400;"><span data-dcnode-id="1125" instrument_node="">true HEPA filters</span></span></a><span data-dcnode-id="1121" style="font-weight: 400;"><span data-dcnode-id="1122" instrument_node=""> meet this standard. Other mechanical filters, sometimes marketed as HEPA-type filters, may trap PM at lower percentages). These filters are made up of a dense fiber mesh that traps particles as air flows through them.</span></span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1117" style="font-weight: 400;"><span data-dcnode-id="1118" instrument_node="">Unfortunately, while HEPA filters can remove a large percentage of particles from the air, they have no effect on gaseous pollutants, such as VOCs. If you are looking at an air purifier with a HEPA filter, check to see if it contains a second filter (most often a carbon filter) that can filter gaseous pollutants from the air.</span></span></p><span data-dcnode-id="1115" instrument_node="">
</span><h3 data-dcnode-id="1112"><span data-dcnode-id="1113" style="font-weight: 400;"><span data-dcnode-id="1114" instrument_node="">Carbon filters</span></span></h3><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1109" style="font-weight: 400;"><span data-dcnode-id="1110" instrument_node="">Unlike HEPA filters, carbon filters can remove gaseous pollutants, including VOCs, from the air. These filters are made with </span></span><a data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/activated-carbon-air-filter/"><span data-dcnode-id="1107" style="font-weight: 400;"><span data-dcnode-id="1108" instrument_node="">activated charcoal or another form of carbon</span></span></a><span data-dcnode-id="1104" style="font-weight: 400;"><span data-dcnode-id="1105" instrument_node="">. A process called adsorption causes chemical gases to stick to the outside of the carbon when air passes through the filter. Typically, these filters have a lattice structure to increase the surface area available to adsorb gaseous pollutants.&nbsp;</span></span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" style="font-weight: 400;"><span data-dcnode-id="1101" instrument_node="">Carbon filters can effectively remove VOCs and other toxic gases from the air, but they are ineffective against particulate matter. Because of their lattice structure, particles can simply pass through the holes in the filter.</span></span></p><span data-dcnode-id="1098" instrument_node="">
</span><h3 data-dcnode-id="1095"><span data-dcnode-id="1096" style="font-weight: 400;"><span data-dcnode-id="1097" instrument_node="">Ionizers</span></span></h3><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1092" style="font-weight: 400;"><span data-dcnode-id="1093" instrument_node="">Instead of using physical filters, </span></span><a data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/ionizer-air-purifiers-everything-you-need-to-know/"><span data-dcnode-id="1090" style="font-weight: 400;"><span data-dcnode-id="1091" instrument_node="">ionizing air purifiers use an electric current</span></span></a><span data-dcnode-id="1087" style="font-weight: 400;"><span data-dcnode-id="1088" instrument_node=""> to charge particles in the air. These charged particles are called ions, and they are attracted to particles and surfaces with an opposite charge. When ions adhere to other particles in the air, it creates a heavier, larger particle that will eventually settle on the ground or another surface instead of remaining in the air. Charged particles may also attach themselves to surface areas, such as walls, furniture and flooring.&nbsp;</span></span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1083" style="font-weight: 400;"><span data-dcnode-id="1084" instrument_node="">There are two main drawbacks to ionizers. First, they do not trap pollutants (unless they have a charged plate that attracts ions). Particles that have settled on the surfaces in your home can easily be kicked up by air flow or human activity. Second, many ionizers produce ozone as a byproduct, which is a pollutant in itself and can </span></span><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung.org/clean-air/outdoors/what-makes-air-unhealthy/ozone"><span data-dcnode-id="1081" style="font-weight: 400;"><span data-dcnode-id="1082" instrument_node="">cause adverse health effects</span></span></a><span data-dcnode-id="1078" style="font-weight: 400;"><span data-dcnode-id="1079" instrument_node="">.</span></span></p><span data-dcnode-id="1076" instrument_node="">
</span><h3 data-dcnode-id="1073"><span data-dcnode-id="1074" style="font-weight: 400;"><span data-dcnode-id="1075" instrument_node="">Ozone generators</span></span></h3><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1070" style="font-weight: 400;"><span data-dcnode-id="1071" instrument_node="">Ozone generators may be marketed as air purifiers, but they offer no real air purification benefit. The idea is that the ozone generated by the machine should react with pollution in the air to turn it into harmless carbon dioxide, oxygen, and water. However, ozone generators are </span></span><a data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/indoor-air-quality-iaq/ozone-generators-are-sold-air-cleaners%23generators-effective"><span data-dcnode-id="1068" style="font-weight: 400;"><span data-dcnode-id="1069" instrument_node="">not effective</span></span></a><span data-dcnode-id="1065" style="font-weight: 400;"><span data-dcnode-id="1066" instrument_node=""> at removing any type of pollution from the air. Not only that, but they actually </span></span><i data-dcnode-id="1062"><span data-dcnode-id="1063" style="font-weight: 400;"><span data-dcnode-id="1064" instrument_node="">create</span></span></i><span data-dcnode-id="1060" style="font-weight: 400;"><span data-dcnode-id="1061" instrument_node=""> ozone pollution. The EPA warns against using ozone generators in the home, as they can produce ozone at levels that are considered harmful to human health.&nbsp;</span></span></p><span data-dcnode-id="1058" instrument_node="">
</span><h3 data-dcnode-id="1055"><span data-dcnode-id="1056" style="font-weight: 400;"><span data-dcnode-id="1057" instrument_node="">PECO technology</span></span></h3><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1048"><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/how_peco_filters_work/"><span data-dcnode-id="1052" style="font-weight: 400;"><span data-dcnode-id="1053" instrument_node="">Photoelectrochemical oxidation (PECO) technology</span></span></a><span data-dcnode-id="1049" style="font-weight: 400;"><span data-dcnode-id="1050" instrument_node=""> — the technology found in Molekule air purifiers — removes pollutants from the air through a light-activated chemical reaction. This process traps larger particles and destroys organic pollutants at the molecular level, including VOCs and bioaerosols such as mold spores, viruses and bacteria.&nbsp;</span></span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" style="font-weight: 400;"><span data-dcnode-id="1046" instrument_node="">However, inorganic pollutants cannot be destroyed by this oxidation process. To address this, Molekule air purifiers use an additional Pre-Filter that traps many of the airborne particles that may not be affected by the PECO filter.</span></span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" style="font-weight: 400;"><span data-dcnode-id="1042" instrument_node="">PECO technology neutralizes airborne organic pollutants without creating harmful byproducts, such as ozone. In fact, ozone is one of the many forms of pollution that Molekule air purifiers can remove from the air.</span></span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" style="font-weight: 400;"><span data-dcnode-id="1038" instrument_node="">&nbsp;As you become more aware of the many types of pollution found in indoor air, it is a good idea to learn more about how to protect yourself and your loved ones. Now that you know more about air purifiers and how they work, you will be better equipped to choose the right one for your home or office. </span></span></p><span data-dcnode-id="1035" instrument_node="">
</span></div><span data-dcnode-id="1033" instrument_node="">
