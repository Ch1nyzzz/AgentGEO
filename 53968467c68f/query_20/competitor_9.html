</span><div class="text-copy bodyCopy auto" data-dcnode-id="647" id="article-body"><span data-dcnode-id="2506" instrument_node="">
</span><p data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">When it comes to tackling air pollution in your home, air purifiers are an essential piece of kit. Designed to tackle harmful air particles caused by pollution, as well as many allergens and household odors, a well-designed air purifier with a HEPA (high-efficiency particulate absorbing) filter can help you breathe easy, knowing your family is protected from pollutants.&nbsp;</span></p><p data-dcnode-id="2499"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2501" data-url="https://www.epa.gov/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/" rel="nofollow" target="_blank"><u data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">U.S. Environment Protection Agency</span></u></a><span data-dcnode-id="2500" instrument_node=""> (EPA) spokesperson Timothy Carroll confirmed that air purifiers can be an effective tool to improving air quality in the average home: “Portable air cleaners, also known as air purifiers or air sanitizers, are designed to filter the air in a single room or area, and they have the potential to improve the indoor air quality in that space. There are also air cleaners that can filter both particles and gases. The longer the air cleaner runs, the more air it filters.”</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2498" data-feat-ref="hawk-id-0" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="4496612859136791600" data-widget-type="seasonal"></aside><p data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">HEPA air filters are essential when it comes to removing allergens from your home’s air. A HEPA filter can trap pet dander and dust, both of which are common causes of allergies. &nbsp;</span></p><p data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">One way to tell if an air purifier will be effective in your space is to look at its CADR rate (Clean Air Delivery Rate). The higher the CADR rate, the more particles your air purifier will filter. So if you have a home with large rooms, look for an air purifier with the highest CADR rate you can afford. &nbsp;</span></p><p data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Some air purifiers even allow you to add essential oils, so that the clean air they push back out is scented. Perfect for that luxury touch, and it can boost your wellbeing too. Carroll recommends using your air purifier where you spend the most time, and for most people, that’s the bedroom.&nbsp;</span></p><div class="fancy-box" data-dcnode-id="2483"><div class="fancy_box-title" data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">What the experts say:</span></div><div class="fancy_box_body" data-dcnode-id="2484"><p data-dcnode-id="2485"><span data-dcnode-id="2489" instrument_node="">“Several studies suggest that using a portable air cleaner where people are spending time, such as in the bedroom while sleeping, may be more effective than leaving it in a central location, such as in the living room.” - Timothy Carroll, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2487" data-url="https://www.epa.gov/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/" rel="nofollow" target="_blank"><span data-dcnode-id="2488" instrument_node="">EPA</span></a><span data-dcnode-id="2486" instrument_node=""> spokesperson.</span></p></div></div><p data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">The very best purifiers run quietly and efficiently, but some purifiers’ higher settings can be too noisy for bedrooms. Look for a model that is capable of operating on full power with a maximum sound level of around 52 decibels, though we’d recommend a HEPA air purifier with a night mode for a truly restful night’s sleep. All our reviews feature decibel levels from quietest to loudest settings, so you’ll have an idea of what to expect.</span></p><p data-dcnode-id="2473"><span data-dcnode-id="2480" instrument_node="">If you’re looking for other ways to clean up the air inside your home, our guides to the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toptenreviews.com/best-dehumidifiers" target="_blank"><span data-dcnode-id="2479" instrument_node="">best dehumidifiers</span></a><span data-dcnode-id="2477" instrument_node=""> are ideal if you have condensation and mold. If the air in your home is too dry, check out our guide to the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toptenreviews.com/best-humidifiers" target="_blank"><span data-dcnode-id="2476" instrument_node="">best humidifiers</span></a><span data-dcnode-id="2474" instrument_node="">.</span></p><h3 class="article-body__section" data-dcnode-id="2470" id="section-9-best-air-purifiers-to-buy-right-now"><span data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">9 best air purifiers to buy right now</span></span></h3><h2 data-dcnode-id="2468" id="1-levoit-core-400s-best-air-purifier-overall"><span data-dcnode-id="2469" instrument_node="">1. Levoit Core 400S: Best air purifier overall</span></h2><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2457"><div class="image-full-width-wrapper" data-dcnode-id="2461"><div class="image-widthsetter" data-dcnode-id="2462" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="2463" style="padding-top:56.25%;"><picture data-dcnode-id="2464"><source alt="Image shows the Levoit Core 400S." class="lazy-image-van optional-image" data-dcnode-id="2467" data-normal="https://vanilla.futurecdn.net/toptenreviews/media/img/missing-image.  in every test, and often absorbed as much as 100%. We’re confident when we say that this air purifier can do the job other purifiers claim to, despite being a mid-range product.</span></p><p data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">Alongside a powerful performance, the Levoit Core 400S is easy and intuitive to use, with a companion app that allows you to select modes, set timers, and schedule your purifier to work where it’s needed most, Or you can simply set it to auto mode and let it do all the heavy lifting for you.&nbsp;</span></p><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">We were also impressed by how quietly this air purifier was during operation, especially in its lower settings. At just 37 decibels, it’s barely audible, so it’s ideal for light sleepers and kids’ rooms. Even higher settings are no louder than a normal conversation, so powering up a level during the daytime shouldn’t be a problem either.&nbsp;</span></p><p data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">With a sleek, matte, cylinder design, and a futuristic-looking control panel, the Levoit Core 400S also ticks all the boxes when it comes to presentation. And it’s light enough to move from room to room, when you need to.&nbsp;</span></p><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">The Levoit Core 400S could be the perfect option for you, if you’re looking for an effective air purifier that won’t blow the budget.&nbsp;</span></p><p data-dcnode-id="2322"><strong data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">Read our full </span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toptenreviews.com/levoit-core-400s-review" target="_blank"><strong data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Levoit Core 400S review</span></strong></a><s ="pros__entry" data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Great for houses with pets</span></div></span></div></div><div class="product-summary cons" data-dcnode-id="2161"><h4 data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">Reasons to avoid</span></h4><div class="product-summary__container" data-dcnode-id="2162"><span class="_hawk cons__value" data-dcnode-id="2163"><span class="cons__marker" data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">-</span></span><div class="cons__entry" data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Expensive</span></div></span></div></div></div><p data-dcnode-id="2157"><em data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Editor's note: This product is in the process of being tested.</span></em></p><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">The Rabbit Air MinusA2 is one of the best air purifiers you can buy, with great performance and plenty of smart features. That isn’t surprising: Rabbit Air is one of the leading companies in the air purifying industry. But it is impressive. Firstly, it's the most efficient air purifier we looked at: it only uses 62 watts while running, so it won't affect your electricity bill too much. It also has a unique aesthetic that makes it more attractive than the competition.&nbsp;</span></p><p data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">This air purifier is suitable for rooms up to 300 square feet, and comes with a six-stage air filtration system, making it particularly great for allergy and asthma sufferers. The Rabbit Air MinusA2 also has a built-in air quality sensor, which means this unit works automatically and informs you when the filters need to be replaced.&nbsp;</span></p><p data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">You can mount this air purifier on the wall, which is unique among the products we reviewed. Furthermore, Rabbit Air lets you choose from a variety of artwork for the front panel, effectively turning the unit into a decoration that doesn't detract from your home's décor. At nearly $600, it's more expensive, but the Rabbit Air MinusA2 is easily one of the best air purifiers out there.</span></p><p data-dcnode-id="2143"><strong data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Read our full </span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toptenreviews.com/air-purifiers-rabbitair-minusa2-review" target="_blank"><strong data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Rabbit Air MinusA2 review</span></strong></a><strong data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">.</span></strong></p><hr data-dcnode-id="2142"><h2 data-dcnode-id="2140" id="3-honeywell-hpa300-best-value-air-purifier"><span data-dcnode-id="2141" instrument_node="">3. Honeywell HPA300: Best value air purifier</span></h2><figure class="van-image-figure" data-bordeaux-image-check="" data-dcnode-id="2129"><div class="image-full-width-wrapper" data-dcnode-id="2133"><div class="image-widthsetter" data-dcnode-id="2134" style="max-width:2603px;"><p class="vanilla-image-block" data-dcnode-id="2135" style="padding-top:56.24%;"><picture data-dcnode-id="2136"><source alt="Best air purifiers: Honeywell HPA300 Air Purifier" class="lazy-image-van optional-image" data-dcnode-id="2139" data-normal="https://vanilla.futurecdn.net/toptenreviews/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/6DDecUc2d3pktHADeRRo7j.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/6DDecUc2d3pktHADeRRo7j.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/6DDecUc2d3pktHADeRRo7j-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/6DDecUc2d3pktHADeRRo7j-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/6DDecUc2d3 868" instrument_node="">Smart features</span></div></span></div></div><div class="product-summary cons" data-dcnode-id="1850"><h4 data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Reasons to avoid</span></h4><div class="product-summary__container" data-dcnode-id="1851"><span class="_hawk cons__value" data-dcnode-id="1857"><span class="cons__marker" data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">-</span></span><div class="cons__entry" data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Expensive</span></div></span><span class="_hawk cons__value" data-dcnode-id="1852"><span class="cons__marker" data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">-</span></span><div class="cons__entry" data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Higher settings are noisy</span></div></span></div></div></div><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">The Dyson Purifier Cool is probably the most stylish air purifier available. Its unusual bladeless hoop design marks it out as a talking point in any room, while its peerless functionality provides all the data you’ll ever need on your indoor air quality.&nbsp;</span></p><p data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">The purifier also doubles up as a fan in hotter weather, although this isn’t as powerful as some users would like. Users can activate, schedule and monitor their purifier via the Dyson app, allowing them to set fan speed, timers and check data on air quality, whether they’re home or away.</span></p><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Besides 10 settings, users can choose from auto mode, which senses air particles and adjusts the purifier’s settings accordingly, or night mode, setting the purifier to quietly purr while you have a good night’s rest. A built-in sleep timer allows you to turn off the purifier completely, whenever you want.&nbsp; in the process of being tested.</span></em></p><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">The Coway AP1512HH is an excellent all-round air purifier, delivering fresh, clean air, while remaining portable – and it's competitively priced too. It has an effective four-stage filtration process, with a washable pre-filter for large particles, and a carbon filter that catches odors. There's also a HEPA filter to suck in tiny particles like cigarette smoke and pollen, while the final fourth stage is an optional ionizer.&nbsp;</span></p><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">The Coway AP1512HH is quiet, producing just 58dB of sound. It comes with an auto mode that automatically detects the quality of the surrounding air and operates accordingly, plus it boasts an Energy Star certification, meaning it's energy-efficient. The AP1512HH also comes with a decent (if not generous) three-year warranty and weighs just 15 pounds, making it highly portable..</span></p><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">This combination of effective purification, portability and energy efficiency, along with a very affordable price, makes the Coway AP1512HH one of the best air purifiers you can buy – whatever your reason for wanting one.</span></p><p data-dcnode-id="1209"><strong data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Read our full </span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toptenreviews.com/air-purifiers-coway-ap1512hh-review" target="_blank"><strong data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Coway AP1512HH review</span></strong></a><strong data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">.</span></strong></p><hr data-dcnode-id="1208"><h2 data-dcnode-id="1206" id="9-whirlpool-whispure-best-air-purifier "947"><span data-dcnode-id="948" instrument_node="">Built-in night light</span></div></span></div></div><div class="product-summary cons" data-dcnode-id="925"><h4 data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Reasons to avoid</span></h4><div class="product-summary__container" data-dcnode-id="926"><span class="_hawk cons__value" data-dcnode-id="937"><span class="cons__marker" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">-</span></span><div class="cons__entry" data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Less effective filtering than some</span></div></span><span class="_hawk cons__value" data-dcnode-id="932"><span class="cons__marker" data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">-</span></span><div class="cons__entry" data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Highest setting is noisy</span></div></span><span class="_hawk cons__value" data-dcnode-id="927"><span class="cons__marker" data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">-</span></span><div class="cons__entry" data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Replacement filters are quite expensive</span></div></span></div></div></div><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">One of the lightest and most compact air purifiers on the market, the KOIOS EP1810 sits comfortably on a desktop or shelf, and is ideal if you’re looking for an air purifier you can take with you on vacation or business trips.</span></p><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Its one-click button control makes the KOIOS EP1810 the simplest air purifier to operate. But the lack of features offered by other air purifiers, such as being able to view performance on an LED display or connected app, means that you’re never sure how well it’s working. Being unable to turn the purifier on and off via an app, or schedule when it’s on, means that you run the risk of using it when you don’t need to, which can cost more in electricity bills.</span></p><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">On the plus side, the bonus night light makes it easy to find in darkened rooms. It can even double up as a night light for a child’s bedroom or nursery. &nbsp;And operating from a mains socket or a USB cable, it’s easy to plug in and go, straight out of the box.</span></p><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">When it comes to performance though, the KOIOS EP1810 leaves something to be desired. This air purifier lacks the power we’d expect from a True HEPA filter, and even its lowest setting may be too noisy for some.&nbsp;</span></p><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">If you’re looking for an air purifier with more features and functionality, or one that silently purrs away quietly while you get on with life, you may need to shell out more cash and buy a more expensive air purifier.&nbsp;</span></p><p data-dcnode-id="906"><strong data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Read our full </span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toptenreviews.com/koios-epi810-air-purifier-review" target="_blank"><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">KOIOS EPI810 review</span></strong></a><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">.</span></strong></p><h3 class="article-body__section" data-dcnode-id="903" id="section-the-cheapest-prices-on-the-best-air-purifiers"><span data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">The cheapest prices on the best air purifiers</span></span></h3><aside class="hawk-nest hawk-processed" data-dcnode-id="698" data-feat-ref="hawk-id-11" data-model-name="Rabbit Air MinusA2, Honeywel ews-us-8877486550121809000-20" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//target.georiot.com/Proxy.ashx%3Ftsid%3D45725%26GR_URL%3Dhttps%253A%252F%252Fwww.amazon.com%252Fdp%252FB00JFSVY0S%253Ftag%253Dhawk-future-20%2526linkCode%253Dogi%2526th%253D1%2526psc%253D1%2526ascsubtag%253Dtoptenreviews-us-8877486550121809000-20" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="714" instrument_node="">View</span></a></div><div class="hawk-grid-item-block-container hawk-grid-item-block-multimodelreview" data-button-type="" data-dcnode-id="708" data-name="allDeals" data-product-type="1000" data-stacked="0"><a class="hawk-all-deals-multimodelreview" data-dcnode-id="709" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toptenreviews.com/deals/compare%3Fmodel_name%3DWhirlpool%2520Whispure%2520AP51030K%26article_id%3Den_US_43_Review_20" rel="sponsored"><span data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">See all prices</span></span></a></div></div></div></div><div class="hawk-footer-container" data-dcnode-id="701"><div class="hawk-footer-description" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">We check over 250 million products every day for the best prices</span></div><div class="hawk-powered-by-container" data-dcnode-id="702"></div></div></div></div></aside><h3 class="article-body__section" data-dcnode-id="695" id="section-how-we-tested-the-best-air-purifiers"><span data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">How we tested the best air purifiers</span></span></h3><p data-dcnode-id="692"><em data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Editor's note: We are currently in the process of testing every single product included in this buying guide. The products that are not yet tested are indicated in the buying guide and in the individual reviews for transparency.</span></em></p><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">In order to find the best air purifiers out there, we conducted a meticulous and replicable testing process. Each air purifier was subjected to the same tests, and as much as possible, in the same conditions.</span></p><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">We tested the air purifier's purifying performance first in "normal" conditions (a single, mid-sized room in a house with no pets) and measured how it performed with a particle counter measuring particles as small as 0.3 microns. We took air quality readings at the start, then at the 15-minute and 30-minute marks while running the machine on its lowest setting. Then, we ran the air purifier again for 30 minutes on its highest setting, and measured the air quality by the end of that period. We reiterated those tests after burning matches and incense cones, to see how the machines would fare in high-particle count environments, simulating high pollution or pollen count.&nbsp;</span></p><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">We compared the performance achieved with the claims made by each purifier brand, and revealed our findings in the "Performance" section of each review.</span></p><h3 class="article-body__section" data-dcnode-id="683" id="section-choosing-the-best-air-purifier-for-you"><span data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Choosing the best air purifier for you</span></span></h3><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">The most important thing to consider when you’re purchasing a home air purifier, is what you want it to tackle. The very best air purifiers can remove harmful particles, absorb odors, and even provide extra features, such as night lights or cooling fans. But even expensive models sometimes struggle to remove particles that cause allergens, such as pollen, dust, pet dander, and particles emitted by household chemicals.&nbsp;</span></p><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">For example, if you have pets in your home, but some members of your household suffer from allergies to pet dander, make sure you find an air purifier that’s good at removing these particles. If you have hay fever, you’ll want an air purifier that’s great at trapping pollen. A quick look through the product specifications and reviews will usually tell you whether your air purifier does the job you want it to do.&nbsp;</span></p><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Think about the layout of your home too. If you have large rooms, you’ll need an air purifier that can tackle more square feet. If you have an open-plan kitchen-diner apartment, then your air purifier should be able to neutralize cooking odors and absorb harmful smoke particles. Will you want to move the air purifier from room to room? Then you’ll need a device that’s light enough to lift and move about.&nbsp;</span></p><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Finally, consider how much you want to spend. To get a high quality product, you should be ideally looking to spend a couple hundred dollars on an air purifier if you can. But that doesn’t mean cheaper models can’t do the job just as effectively, or that more expensive models always do a better job than their affordable counterparts.&nbsp;</span></p><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Consider what you want your air purifier to do and what you can spend, do the research, have a look at as many air purifiers as you can, and decide on the right model for your home. Our guide includes all the information you need to make the right decision.</span></p><h3 class="article-body__section" data-dcnode-id="670" id="section-what-the-experts-say"><span data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">What the experts say</span></span></h3><p data-dcnode-id="664"><span data-dcnode-id="669" instrument_node="">Experts agree that air purifiers can be an effective way to improve air quality in your home. Timothy Carroll, from the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="666" data-url="https://www.epa.gov/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/" rel="nofollow" target="_blank"><u data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">U.S. Environment Protection Agency</span></u></a><span data-dcnode-id="665" instrument_node=""> (EPA), says that most air purifiers have the potential to improve your home’s air.&nbsp;</span></p><figure data-dcnode-id="657"><blockquote data-dcnode-id="658"><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Most portable air cleaners can filter particles from the air, and some can filter the small particles of greatest health concern (PM2.5, that is, particles smaller than 2.5 microns in diameter)."</span></p><figcaption data-dcnode-id="659"><cite data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Timothy Carroll, EPA spokesperson</span></cite></figcaption></blockquote></figure><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">However, he’s quick to point out that no air purifier will eliminate all of the air pollutants in a home, and most air purifiers are designed to tackle just one single room or area.</span></p><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">It’s possible to increase the effectiveness of your air purifier by taking a few simple steps, says Carroll. These include reducing or removing the sources of indoor air pollutants, and ventilating where possible with clean outdoor air.</span></p><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">On the question of whether air purifiers can help to reduce the symptoms of an allergy, Carroll agrees that air purifiers can be one weapon in your armory. “Multiple studies with portable air cleaners that use a HEPA (high-efficiency particulate air) filter have found improvements in one or more allergy and/or asthma symptoms.” But, he adds, “studies do not always show major improvements, and they do not show improvements in all symptoms.” So it’s vital to remove the source of the allergen as well as using an air purifier.</span></p><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Carroll also points out that many allergens, such as large dust mite allergens, tend to settle out of the air quickly and accumulate on surfaces. So many may never reach your air purifier in the first place. And although air purifiers can help remove particles caused by mold, and help to reduce musty odors, Carroll says “they will not resolve a mold problem. To solve a mold problem, it is necessary to get rid of the source of the moisture and clean up the mold."</span></p><span data-dcnode-id="648" instrument_node="">
