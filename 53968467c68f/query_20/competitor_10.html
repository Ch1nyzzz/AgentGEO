 with an easy to use touch control panel with features that support your home's indoor air quality. Equipped with 4 fan speeds, air quality monitor, auto mode, UV-C, ionizer, sleep mode, timer and a child lock. The Air Quality Monitor detects the amount of particles in the  air and displays the air rating on an easy to read 3 color LED display. When in auto mode the GermGuardian reads real time air quality and automatically adjusts the fan speed, providing you with peace of mind that your unit is filtering your air accordingly. The built in ionizer option can be turned on to boost allergen control. The ionizer emits negative ions that attract microscopic allergens to form larger particles that can be easily trapped by the HEPA filter. In sleep mode, the unit will run in library quiet low speed and the display lights will turn off. The timer can be set for 2,4,6, and 8 hours, and is equipped with a child lock. This GermGuardian air purifier stands about 23 inches tall and provides powerful air cleaning for use in rooms up to 394 sq. feet.                                                                                                                                                 *Tested with Staphylococcus Albus, and Escherichia Coli, Aspergillus Niger, and Phi-X174.</span></div></div><a class="category-link" data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestbuy.com/site/heating-cooling-air-quality/air-purifiers/abcat0908001.c%3Fid%3Dabcat0908001"><span data-dcnode-id="1686" instrument_node="">See all Air Purifiers</span></a></div><meta content="This 6-in-1 Air Purifier Console with HEPA filter helps to relieve allergies by capturing 99.97% of dust and allergens as small as .3 microns in size. The activated carbon filter attacks common household odors including those caused by smoke, cooking and pets. It also works to reduce the many VOCs that are emitted by common household products and cleaning chemicals. Wit
