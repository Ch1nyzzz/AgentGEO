</span><span class="entry-author" data-dcnode-id="1071"><img alt="Jeff Flowers" class="avatar avatar-35 wp-user-avatar wp-user-avatar-35 alignnone photo" data-dcnode-id="1075" height="35" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1xmmzh397wwl19zunv1as9uy-wpengine.netdna-ssl.com/wp-content/uploads/2017/04/jeff-flowers-150x150.jpg&amp;raw" width="35"><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learn.allergyandair.com/author/jflowers/" rel="author" title="Posts by Jeff Flowers"><span data-dcnode-id="1074" instrument_node="">Jeff Flowers</span></a><span data-dcnode-id="1072" instrument_node=""> on October 14, 2015  </span></span><span data-dcnode-id="1070" instrument_node="">

</span><div class="entry-content" data-dcnode-id="921" itemprop="text"><p data-dcnode-id="1058"></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><img alt="Maintaining Your Vacuum Cleaner" class="featuredimg img-rounded" data-dcnode-id="1056" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1xmmzh397wwl19zunv1as9uy-wpengine.netdna-ssl.com/wp-content/uploads/2015/10/vacuum-maintenance.jpg&amp;raw" title="Maintaining Your Vacuum Cleaner"></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1053" instrument_node="">Your vacuum cleaner works hard to keep your home looking great and smelling good. For most homeowners, </span><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allergyandair.com/vacuum-cleaners/"><span data-dcnode-id="1052" instrument_node="">vacuum cleaners</span></a><span data-dcnode-id="1050" instrument_node=""> are often an investment into their home. And like any investment, ensuring it gets the proper care is the best way to protect it. </span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">There are a number of things you can do to help make sure your vacuum works as it should for many years to come.  Let’s take a look at seven maintenance tips you should know to help you take care of your vacuum cleaner. </span></p><span data-dcnode-id="1045" instrument_node="">
</span><h3 data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">1. Replace the Bag Regularly </span></h3><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">One of the quickest and easiest things you can do to maintain your vacuum cleaner is to replace the bag on a regular basis. Many people assume that bags only need to be replaced when they feel full. However, to keep your machine working at its best, you’ll want to replace the bag when it is about 2/3 full, not when it is completely packed with dirt. Debris needs room to enter the bag, and if there is already a large accumulation of debris inside it, there won’t be room for what the vacuum cleaner picks up and it will no longer work as efficiently as it should. </span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1036"><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allergyandair.com/shark-nv752-rotator-powered-lift-away-true-pet-vacuum-cleaner-nv752/NV752.html"><img alt="Shark HEPA Vacuum Cleaner - NV752" class="photopin33" data-dcnode-id="1038" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1xmmzh397wwl19zunv1as9uy-wpengine.netdna-ssl.com/wp-content/uploads/2015/10/shark-nv752-vacuum-cleaner.jpg&amp;raw" title="Shark HEPA Vacuum Cleaner - NV752"></a></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">There are certain signs you can look out for that indicate a bag is full, or getting close to it. The most obvious sign is when you vacuum an area and find it covered in debris that wasn’t there before. This typically happens because the bag is full, and debris escaped and made its way back onto the carpet. Another sign is when you notice the vacuum cleaner suction isn’t as strong as it should be.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1031" instrument_node="">One of the main benefits of </span><a data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learn.allergyandair.com/bagged-vs-bagless-vacuum-cleaners/"><span data-dcnode-id="1030" instrument_node="">owning a bagless vacuum cleaner</span></a><span data-dcnode-id="1028" instrument_node=""> is that you can see precisely how much dirt and debris is trapped inside the machine. Obviously, being able to see how full the inside canister will help you avoid all of the problems listed above and help you maintain your vacuum cleaner.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><h3 data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">2. Make Sure the Bag is Properly Attached</span></h3><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">It sounds easy to do, but with so many different brands, models and types of vacuum cleaners out there, attaching the bag may prove to be somewhat difficult for some people. This is especially true for those doing it for the first time. </span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">While the method of attaching a bag will differ from model to model, one thing does remain constant — you need to make sure that the opening of the bag is securely on the nozzle. If there are hooks, holders, or clips, you’ll want to firmly attach those in place as well. </span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">If the bag isn’t properly attached, you could find that debris doesn’t enter the bag as it should, but instead fills the inside of your vacuum cleaner. This can damage the cleaner, as the moving parts won’t be able to do their job as effectively as it could. And once this happens, it is virtually impossible to get all of the dirt out of the machine.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">In addition to attaching the bag, you also want to ensure that you buy the correct bags for your model. Each make of vacuum cleaner has so many different models, so you can wind up thinking you’re getting the right one when you’re not. If this happens, you may discover that the bag wasn’t as secure as you thought it could be. Check the reference number on your machine and compare it to the number on the bag to avoid purchasing one that doesn’t work. </span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Additionally, once you find the right bag, stock up on them. With so many new models coming out every year, you never know when the manufacturer will stop making bags for your older model vacuum cleaner. </span></p><span data-dcnode-id="1008" instrument_node="">
</span><h3 data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">3. Empty Bagless Models Often</span></h3><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Even though I briefly touched on this point above, I want to reinforce the importance of emptying the dirt and debris from a bagless vacuum as often as possible.  </span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="999"><img alt="How to Take Care Of Your Vacuum Cleaner" class="photopin33" data-dcnode-id="1001" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1xmmzh397wwl19zunv1as9uy-wpengine.netdna-ssl.com/wp-content/uploads/2015/10/how-to-take-care-of-your-vacuum-cleaner.jpg&amp;raw" title="How to Take Care Of Your Vacuum Cleaner"><span data-dcnode-id="1000" instrument_node=""> Many bagless machines have a marker indicating when to empty the receptacle. This is helpful, but even if the debris hasn’t reached this marker, it’s still wise to empty the receptacle anyway. I would suggest you empty it after every use. Don’t let the dirt and debris settle within the unit. And depending on the type of bagless unit you have, you may even want to rinse out the receptacle with water to ensure all of the dirt has been removed. </span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">When you empty it, you’ll also want to clean the attached filter. You can gently knock the filter against the garbage to loosen any clinging debris, or tiny particles that may be trapped inside. Then you can take your finger, or any other object that isn’t sharp, and remove dirt from in between the slats of the filter. It’s not necessary to remove every last bit, but doing a general cleaning of the filter can help it work properly. Some filters are even washable. </span></p><span data-dcnode-id="995" instrument_node="">
</span><h3 data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">4. Clean the Brush Roll</span></h3><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Occasionally, you’ll want to check the brush roll of your vacuum cleaner. Over time, certain items can get wrapped around the roll that can prevent it from spinning as well as it should. These things include floss, hair, and string.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">You can either remove these objects while the roll is in place, or you can remove it. I would only suggest removing the roll from the vacuum if you feel comfortable with doing so. You’ll be able to give it a deeper clean by removing it, but what’s the point of doing so if you can’t get it back on.  </span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">While it will differ from model to model, the roller of most vacuum cleaners are attached by a plate. So, you’ll first lift or remove the plate and then slide the roll out from the slots on either side. Once you’ve identified objects wrapped around the roll, you can remove them with your fingers or with scissors. Then gently pull these objects from the roll until they come completely off. You may even consider washing it off with soap and water, just to ensure that it’s as clean as possible. </span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Now that you have the brush roll off of the unit, you now have the unique opportunity to clean or replace the roll’s bearings, caps and inside that part of your vacuum.  It may not be damaged or too dirty, but a quick wipe with a damp rag will help clean off any sort of dirt or debris that may be trapped in those areas.</span></p><span data-dcnode-id="980" instrument_node="">
</span><h3 data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">5. Check the Belt</span></h3><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">After checking the brush roll, you may want to check the belt, which keeps the roll in place. If the belt isn’t tight against the roll, it may be time to replace it. Check to see if it is stretched out, frayed or narrow. Also make sure that the belt hasn’t slid out of place or become damaged in a particular spot. </span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">As a general rule, the belt should be replaced every six months to one year. This is not a solid number, however, as it really depends on the frequency of which you use your vacuum cleaner, not to mention the brand and model you’re using.  If you don’t use your vacuum cleaner very often, let’s say once every two or three weeks, then you likely won’t need to replace the belt twice a year. However, if you use it every single day, then maybe you’ll need to replace the belt every few months. </span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">If you do replace the belt, you can do so by removing the roll, sliding the belt off, and then sliding the new belt on. It’s easy to do, and not something that you need to take to a special technician. In fact, in the Instruction Manual that came with your vacuum cleaner, there’s probably step-by-step instructions for replacing the belt. </span></p><span data-dcnode-id="968" instrument_node="">
</span><h3 data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">6. Check the Filters &amp; Hoses</span></h3><span data-dcnode-id="965" instrument_node="">
</span><div class="photofloat30" data-dcnode-id="962"><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allergyandair.com/sebo-automatic-x4-pet-edition-upright-vacuum-cleaner-red-9559am/9559AM.html"><img alt="Sebo Upright Vacuum Cleaner - 9559AM" data-dcnode-id="964" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1xmmzh397wwl19zunv1as9uy-wpengine.netdna-ssl.com/wp-content/uploads/2015/10/sebo-9559am-vacuum-cleaner.jpg&amp;raw" title="Sebo Upright Vacuum Cleaner - 9559AM"></a></div><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Most vacuum cleaner models, particularly newer ones, have filters attached to help pick up particles that may contaminate your indoor air quality. If your vacuum cleaner has a filter, you’ll want to clean and periodically replace it. You can rinse a plastic filter, and shake a paper or fabric one, depending on how easy it is to remove. </span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="957" instrument_node="">The importance of keeping your filter clean cannot be stressed enough. This is especially true if you own a </span><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allergyandair.com/hepa-vacuum-cleaners/"><span data-dcnode-id="956" instrument_node="">vacuum cleaner with a HEPA filter</span></a><span data-dcnode-id="954" instrument_node="">, as that filter is designed to help improve your indoor air quality. Keeping that filter clean can play a role in how clean the air you breathe is. </span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Lastly, sometimes hoses get large objects trapped inside them. If you find that your hose attachment isn’t working right, a trapped object may be the culprit. You can find the object by peering into the hose or by sticking a hook inside it to see if it hits against something. Some of the most common objects to get caught inside hoses are socks, underwear or small toys. </span></p><span data-dcnode-id="949" instrument_node="">
</span><h3 data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">7. Take Your Vacuum to the Shop</span></h3><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">If you notice a problem with your vacuum cleaner and can’t determine the source of the trouble, you can always take it to a vacuum shop. These shops are generally inexpensive, and the clerk can usually fix your vacuum’s issue overnight or even the same day, depending on what the problem is. </span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="942" instrument_node="">If you’ve noticed that your vacuum just isn’t picking things up as thoroughly as it used to, the shop can replace parts for under $10, depending on what’s causing the problem and on the shop’s individual rates. Depending on how old your vacuum cleaner is, having somebody fix the problem for you may be the best route for you and your family. Oftentimes, however, it’ll just be easier to </span><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allergyandair.com/vacuum-cleaners/"><span data-dcnode-id="941" instrument_node="">buy a new vacuum cleaner</span></a><span data-dcnode-id="939" instrument_node="">. Especially with so many models and new technologies available, such as </span><a data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allergyandair.com/vacuum-cleaner-robots/"><span data-dcnode-id="938" instrument_node="">robot vacuums</span></a><span data-dcnode-id="936" instrument_node="">.</span></p><span data-dcnode-id="934" instrument_node="">
</span><h2 data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Final Thoughts on Vacuum Cleaner Maintenance</span></h2><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">A vacuum cleaner is a machine, and just like any other appliance in your home, proper maintenance is required to help keep it working as efficiently as it should. Because of its various working parts, it sometimes needs a little extra care and a thorough cleaning. This is easy to do when you know what it needs and how to do it. </span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Keeping your vacuum cleaner in good working order is easy to do and doesn’t take up very much time. Just a few minutes of maintenance work can add years to its life.  Replacing a vacuum cleaner can be expensive, but taking the time to keep it working well can be relatively quick and painless when you follow the tips above.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"></p><span data-dcnode-id="922" instrument_node="">
