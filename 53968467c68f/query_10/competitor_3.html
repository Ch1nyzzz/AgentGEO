</span><h1 class="entry-title" data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Medellín Pollution: A Major Downside for Expats Living in Medellín</span></h1><span data-dcnode-id="2342" instrument_node="">
</span><div class="post-meta vcard" data-dcnode-id="2325"><span data-dcnode-id="2341" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2340" instrument_node="">Posted by </span><a class="url fn" data-dcnode-id="2338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/author/jeff/" rel="author" title="Posts by Jeff"><span data-dcnode-id="2339" instrument_node="">Jeff</span></a><span data-dcnode-id="2337" instrument_node=""> | </span><span class="updated" data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Feb 12, 2019</span></span><span data-dcnode-id="2334" instrument_node=""> | </span><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/category/daily-life/expat-tips/" rel="tag"><span data-dcnode-id="2333" instrument_node="">Expat Tips</span></a><span data-dcnode-id="2331" instrument_node=""> | </span><a class="comments-link" data-dcnode-id="2328" href="#comments"><span data-dcnode-id="2330" instrument_node="">18 </span><span class="comment-bubble post-meta-icon" data-dcnode-id="2329" title="comment count"></span></a></p><span data-dcnode-id="2326" instrument_node="">
</span></div><span data-dcnode-id="2324" instrument_node="">
</span></div><span data-dcnode-id="2322" instrument_node="">
</span><div class="post-thumbnail header" data-dcnode-id="2318"><span data-dcnode-id="2321" instrument_node="">
</span><img alt="Medellín Pollution: A Major Downside for Expats Living in Medellín" data-dcnode-id="2320" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/wp-content/uploads/2019/02/Medellin-pollution-1024x640.jpg&amp;raw"><span data-dcnode-id="2319" instrument_node=""> </span></div><span data-dcnode-id="2317" instrument_node="">
</span><div class="post-wrap" data-dcnode-id="1904"><span data-dcnode-id="2316" instrument_node="">
</span><div class="post-content entry-content" data-dcnode-id="1906"><span data-dcnode-id="2315" instrument_node="">
</span><div class="at-above-post addthis_tool" data-dcnode-id="2314" data-url="https://medellinguru.com/medellin-pollution/"></div><p data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Pollution in Medellín is a major concern of expats living in Medellín or considering moving to the city. Pollution is a downside of living in Medellín.</span></p><span data-dcnode-id="2311" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">I have seen numerous comments about pollution in Medellín posted on blogs and Facebook groups. Examples of comments include “Medellín has some of the worst pollution on earth” and “pollution in Medellín is the worst I have experienced”. But in many cases these comments are inaccurate.</span></p><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2303"><span data-dcnode-id="2307" instrument_node="">However, pollution is one of the downsides of living in Medellín, which was included in a list of </span><a data-dcnode-id="2305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/downsides/"><span data-dcnode-id="2306" instrument_node="">11 downsides of living in Medellín</span></a><span data-dcnode-id="2304" instrument_node="">.</span></p><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2297"><span data-dcnode-id="2301" instrument_node="">According to the World Health Organization’s (WHO’s) </span><a data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.who.int/airpollution/data/cities/en/" onclick="javascript:window.open('https://www.who.int/airpollution/data/cities/en/'); return false;"><span data-dcnode-id="2300" instrument_node="">2018 Ambient Air Quality Database</span></a><span data-dcnode-id="2298" instrument_node="">, Medellín is ranked #9 out of the most polluted cities and towns in Latin America based on PM2.5 pollutants. Medellín’s location is in a canyon with mountains surrounding the city. This does not allow for easy dispersion of pollutants.</span></p><span data-dcnode-id="2296" instrument_node="">
</span><p data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">So, pollution generally stays in the metropolitan area. This is similar to the problem found in Denver. However, regular rain in Medellín can help clean the atmosphere.</span></p><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">Note the above photo is pollution in Medellín during a “red” alert in March 2017.</span></p><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2289" instrument_node="">Pollution is one of the downsides of living in Medellín but there are many benefits including the climate, cost of living and good healthcare. I previously covered </span><a data-dcnode-id="2287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/why-medellin/"><span data-dcnode-id="2288" instrument_node="">27 reasons why I chose to live in Medellín</span></a><span data-dcnode-id="2286" instrument_node="">.</span></p><span data-dcnode-id="2284" instrument_node="">
</span><h2 data-dcnode-id="2281"><strong data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Medellín Pollution: The Pollution Facts</span></strong></h2><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">Medellín does not have some of the “worst pollution on earth” as some expats appear to think. According to WHO’s database, there are over 330 cities and towns in the world that have worse pollution than in Medellín.</span></p><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">And the worst pollution in the world is actually found in India and China with over 260 cities and towns in these two countries with worse pollution than Medellín.</span></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Also, according to WHO, in Latin America several cities and towns have worse pollution than in Medellín. Lima, Peru; Monterrey, Mexico; five towns in Chile; and Guatemala all have worse air pollutant problems.</span></p><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">In addition, Bogotá in Colombia has a similar pollution problem to Medellín, as Bogotá is a large city that is also surrounded by mountains.</span></p><span data-dcnode-id="2268" instrument_node="">
</span><h2 data-dcnode-id="2265"><strong data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Medellín Pollution: Geographic Location Contributes to the Problem</span></strong></h2><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Medellín is located in the Aburrá Valley and is surrounded by mountains. This creates an adverse geographical condition for the horizontal circulation of air masses. And when combined with poor ventilation conditions (adverse weather) this contributes to the accumulation of pollutants and makes their removal difficult.</span></p><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">In the Aburrá Valley, the characteristics of meteorology and climatology frequently change due to:</span></p><span data-dcnode-id="2258" instrument_node="">
</span><ul data-dcnode-id="2244"><span data-dcnode-id="2257" instrument_node="">
</span><li data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Being located in the tropics</span></li><span data-dcnode-id="2254" instrument_node="">
</span><li data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">The topography</span></li><span data-dcnode-id="2251" instrument_node="">
</span><li data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">The possibility of high humidity</span></li><span data-dcnode-id="2248" instrument_node="">
</span><li data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">External forces</span></li><span data-dcnode-id="2245" instrument_node="">
</span></ul><span data-dcnode-id="2243" instrument_node="">
</span><p data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">These forces combine to modulate the atmospheric stability within the Aburrá Valley, which affects the ventilation and the removal of pollutants by dispersion and convection.</span></p><span data-dcnode-id="2240" instrument_node="">
</span><p data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Furthermore, in the Aburrá Valley, there normally are two periods each year with higher levels of air pollution, which is determined by meteorology.</span></p><span data-dcnode-id="2237" instrument_node="">
</span><p data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">In March each year is typically the transition between the dry season and the first rainy season, which is characterized by the presence of layers of low-lying clouds, which cause the accumulation of pollutants in the atmosphere. And this is when the highest concentrations of particulate material (PM10 and PM2.5) of the year typically occurs in Medellín.</span></p><span data-dcnode-id="2234" instrument_node="">
</span><p data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">And in September each year is the second transition between the dry season and the rainy season when an increase in the concentrations of particulate material is typically seen.</span></p><span data-dcnode-id="2231" instrument_node="">
</span><h2 data-dcnode-id="2228"><strong data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">Medellín Pollution: Particulate Matter (PM) Pollution</span></strong></h2><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Particulate matter pollution, aka PM, is the term for a mixture of solid particles and liquid droplets found in the air. Some PM, such as dust, dirt, soot and smoke, are large or dark enough to be seen with the naked eye. And others are so small they can only be detected using an electron microscope.</span></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">The EPA in the U.S. regulates two categories of PM for health and welfare reasons. And these two categories are used in pollutant monitoring systems used throughout the world:</span></p><span data-dcnode-id="2221" instrument_node="">
</span><ul data-dcnode-id="2213"><span data-dcnode-id="2220" instrument_node="">
</span><li data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">PM10 – are coarse and inhalable&nbsp;particles,&nbsp;with diameters that are generally between 2.5 and 10 micrometers.</span></li><span data-dcnode-id="2217" instrument_node="">
</span><li data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">PM2.5 – are very fine and inhalable particles,&nbsp;with diameters that are generally 2.5 micrometers and smaller</span></li><span data-dcnode-id="2214" instrument_node="">
</span></ul><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Medellín typically has more of a serious problem with PM2.5 and less of a problem with PM10. PM2.5 primarily comes from combustion from vehicles (cars, buses, motorcycles and trucks) and from fires and emissions (releases) from power plants and industrial facilities.</span></p><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">PM10 comes from a variety of sources including dust from roads, farms, dry riverbeds, construction sites and mines.</span></p><span data-dcnode-id="2206" instrument_node="">
</span><h2 data-dcnode-id="2203"><strong data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Medellín Pollution: Smog “Seasons” in Medellín</span></strong></h2><span data-dcnode-id="2202" instrument_node="">
</span><p data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Medellín normally has two smog “seasons” each year.&nbsp; This happens when the climate transitions from the dry season to the rainy season in March-April and in September-October each year. This is due to cooler and denser air sitting atop rising warm air, which traps pollutants in the Aburrá Valley.</span></p><span data-dcnode-id="2199" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">During the March-April 2016 smog “season”, citizen groups took to the streets of Medellín including Aire Medellin, Bicitertulia, Ciudadanos por el Aire, La Ciudad Verde, Low Carbon City, Siclas and Túnel Verde and called for air quality data for Medellín to be published.</span></p><span data-dcnode-id="2196" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">This pollution awareness campaign in 2016 resulted in air quality data being made publicly available online. In addition, the regional government began coordinating a comprehensive air quality management plan in collaboration with citizens, academia, the private sector and local and national authorities in 2017.</span></p><span data-dcnode-id="2193" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="2189" id="attachment_15090" style="width: 1034px"><img alt="Main sources of PM2.5 contaminants in Medellín, source: AMVA-UPB 2015" aria-describedby="caption-attachment-15090" class="size-large wp-image-15090" data-dcnode-id="2192" height="477" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/wp-content/uploads/2019/02/IMG_6002-1024x477.jpg&amp;raw" srcset="https://medellinguru.com/wp-content/uploads/2019/02/IMG_6002.jpg 1024w, https://medellinguru.com/wp-content/uploads/2019/02/IMG_6002-150x70.jpg 150w, https://medellinguru.com/wp-content/uploads/2019/02/IMG_6002-750x349.jpg 750w, https://medellinguru.com/wp-content/uploads/2019/02/IMG_6002-768x358.jpg 768w" width="1024"><p class="wp-caption-text" data-dcnode-id="2190" id="caption-attachment-15090"><span data-dcnode-id="2191" instrument_node="">Main sources of PM2.5 contaminants in Medellín, source: AMVA-UPB 2015</span></p></div><span data-dcnode-id="2188" instrument_node="">
</span><h2 data-dcnode-id="2185"><strong data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Medellín Pollution: Main Sources of Contaminants</span></strong></h2><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">The majority (79 percent) of the PM2.5 contaminants in Medellín reportedly comes from vehicles and only 21 percent comes from fixed sources such as power plants, as seen in the above figure.</span></p><span data-dcnode-id="2181" instrument_node="">
</span><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Between 2005 and 2015, the number of vehicles in the Aburrá Valley increased 182 percent from 478,000 in 2015 to 1.35 million in 2015.</span></p><span data-dcnode-id="2178" instrument_node="">
</span><p data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">The biggest increase from 2005 to 2015 was in motorcycles, which increased 411 percent from 139,000 motorcycles in 2005 to 710,186 motorcycles in 2015. And there are now more motorcycles than cars and taxis in Medellín.</span></p><span data-dcnode-id="2175" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="2171" id="attachment_8767" style="width: 1034px"><img alt="The Medellín Metro in El Centro" aria-describedby="caption-attachment-8767" class="size-large wp-image-8767" data-dcnode-id="2174" height="768" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/wp-content/uploads/2018/05/IMG_6107-1024x768.jpg&amp;raw" srcset="https://medellinguru.com/wp-content/uploads/2018/05/IMG_6107.jpg 1024w, https://medellinguru.com/wp-content/uploads/2018/05/IMG_6107-150x113.jpg 150w, https://medellinguru.com/wp-content/uploads/2018/05/IMG_6107-750x563.jpg 750w, https://medellinguru.com/wp-content/uploads/2018/05/IMG_6107-768x576.jpg 768w" width="1024"><p class="wp-caption-text" data-dcnode-id="2172" id="caption-attachment-8767"><span data-dcnode-id="2173" instrument_node="">The Medellín Metro in El Centro</span></p></div><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2169" instrument_node="">The </span><a data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/metro/"><span data-dcnode-id="2168" instrument_node="">Medellín Metro</span></a><span data-dcnode-id="2166" instrument_node=""> system transported over 298 million passengers in 2018, which was an increase of 3.8 percent from 2017. If Medellín did not have its metro system, the pollution problem would be much worse in the city with many more vehicles.</span></p><span data-dcnode-id="2164" instrument_node="">
</span><h2 data-dcnode-id="2161"><strong data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Medellín Pollution: Medellín Has a Comprehensive Air Quality Management Plan</span></strong></h2><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Medellín and the Aburrá valley has one of the most comprehensive air quality management plans in Latin America.</span></p><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">In 1998, the Aburrá Valley launched the Program for the Protection and Control of the Air Quality from the Metropolitan Area of the Aburrá Valley, which was the first metropolitan air quality management plan, issued in 2008.</span></p><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">But a new plan was developed in 2017 by the Aburrá Valley Metropolitan Area in collaboration with the Clean Air Institute, an international organization with significant experience in air quality management.</span></p><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2150" instrument_node="">This plan was approved by the 10 mayors of the Aburrá Valley Metropolitan Area in December 2017. The plan is known as the “Comprehensive Air Pollution Management Plan” (</span><em data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Plan Integral de Gestión de Contaminación del Aire</span></em><span data-dcnode-id="2147" instrument_node="">) or PIGECA.</span></p><span data-dcnode-id="2145" instrument_node="">
</span><p data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">According to Juan J. Castillo, Director of Environmental Health at the Clean Air Institute, about the PIGECA plan:</span></p><span data-dcnode-id="2142" instrument_node="">
</span><blockquote data-dcnode-id="2139"><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">It is one of the most comprehensive plans in the Latin American region, with concrete goals, abatement strategies and commitments from all sectors, with a communication strategy threaded through.</span></p></blockquote><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">This plan includes a key goal to transform towards a low emission mobility system, which includes:</span></p><span data-dcnode-id="2135" instrument_node="">
</span><ul data-dcnode-id="2115"><span data-dcnode-id="2134" instrument_node="">
</span><li data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Expansion, connectivity and integration of the infrastructure network for bicycles.</span></li><span data-dcnode-id="2131" instrument_node="">
</span><li data-dcnode-id="2126"><span data-dcnode-id="2130" instrument_node="">Promotion of bicycle use through the availability of the </span><a data-dcnode-id="2128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/encicla/"><span data-dcnode-id="2129" instrument_node="">Encicla public bicycle system</span></a><span data-dcnode-id="2127" instrument_node="">.</span></li><span data-dcnode-id="2125" instrument_node="">
</span><li data-dcnode-id="2120"><span data-dcnode-id="2124" instrument_node="">Encourage the use of public transport like the </span><a data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/metro/"><span data-dcnode-id="2123" instrument_node="">Medellín metro</span></a><span data-dcnode-id="2121" instrument_node="">.</span></li><span data-dcnode-id="2119" instrument_node="">
</span><li data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Discourage the use of a private vehicles.</span></li><span data-dcnode-id="2116" instrument_node="">
</span></ul><span data-dcnode-id="2114" instrument_node="">
</span><p data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">From January to August in 2018, Medellín only experienced one “red” alert day due to high pollution. This was down from 30 in 2016. And some in the city council saw that as evidence that PIGECA was working.</span></p><span data-dcnode-id="2111" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="2107" id="attachment_15230" style="width: 810px"><img alt="February 2019 vehicle restrictions due to pollution, courtesy of Area Metropolitana Valle de Aburrá" aria-describedby="caption-attachment-15230" class="size-full wp-image-15230" data-dcnode-id="2110" height="761" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/wp-content/uploads/2019/02/IMG_8302-1.jpg&amp;raw" srcset="https://medellinguru.com/wp-content/uploads/2019/02/IMG_8302-1.jpg 800w, https://medellinguru.com/wp-content/uploads/2019/02/IMG_8302-1-150x143.jpg 150w, https://medellinguru.com/wp-content/uploads/2019/02/IMG_8302-1-750x713.jpg 750w, https://medellinguru.com/wp-content/uploads/2019/02/IMG_8302-1-768x731.jpg 768w" width="800"><p class="wp-caption-text" data-dcnode-id="2108" id="caption-attachment-15230"><span data-dcnode-id="2109" instrument_node="">February 2019 vehicle restrictions due to pollution, courtesy of Area Metropolitana Valle de Aburrá</span></p></div><span data-dcnode-id="2106" instrument_node="">
</span><h2 data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Medellín Can Restrict Vehicles During Times with High Pollution</span></h2><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2098"><span data-dcnode-id="2102" instrument_node="">Medellín has a major problem with </span><a data-dcnode-id="2100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/medellin-pollution/"><span data-dcnode-id="2101" instrument_node="">pollution</span></a><span data-dcnode-id="2099" instrument_node="">&nbsp;during two times of the year during the transition from the dry season to the rainy season. Every time there is a transition between the dry and rainy seasons, clouds prevent the particulate material PM2.5, which is harmful to health, from being released into the atmosphere</span></p><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">So, the 10 municipalities in February 2019 have entered into a state of prevention due to the quality of the air that is breathed in the Aburrá Valley during this time of year. The above restrictions go into effect on Monday, February 18, 2019.</span></p><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">The restriction based on license plates is for private vehicles, freight vehicles, two and four-stroke motorcycles. The schedule in which the restriction is in effect in the 10 municipalities of the Medellín metropolitan area is in the mornings from 7:00&nbsp;to 8:30 am and in the afternoons from 5:30 pm to 7:00 pm.</span></p><span data-dcnode-id="2091" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="2087" id="attachment_10890" style="width: 810px"><img alt="Ciudadanos Cientificos App, courtesy of SIATA" aria-describedby="caption-attachment-10890" class="size-full wp-image-10890" data-dcnode-id="2090" height="458" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/wp-content/uploads/2018/08/CiudadanosCientificos.jpg&amp;raw" srcset="https://medellinguru.com/wp-content/uploads/2018/08/CiudadanosCientificos.jpg 800w, https://medellinguru.com/wp-content/uploads/2018/08/CiudadanosCientificos-150x86.jpg 150w, https://medellinguru.com/wp-content/uploads/2018/08/CiudadanosCientificos-750x429.jpg 750w, https://medellinguru.com/wp-content/uploads/2018/08/CiudadanosCientificos-768x440.jpg 768w" width="800"><p class="wp-caption-text" data-dcnode-id="2088" id="caption-attachment-10890"><span data-dcnode-id="2089" instrument_node="">Ciudadanos Cientificos App, courtesy of SIATA</span></p></div><span data-dcnode-id="2086" instrument_node="">
</span><h2 data-dcnode-id="2083"><strong data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Medellín Pollution: Pollution Monitoring</span></strong></h2><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Under Colombian law, all cities and towns with a population greater than 50,000 or where a problem of air pollutants&nbsp;is evident must have a pollution monitoring surveillance system in place.</span></p><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Medellin and the Aburrá Valley has a monitoring system with over 40 air-quality monitoring stations that actively monitor pollutant levels in many areas of the valley. This is reportedly over half of such monitoring stations in Colombia.</span></p><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Contributing to this is over 250 monitoring points in homes and places of work that have agreed to house a Sistema de Alertas Tempranas del Valle de Aburrá (SIETA) low-cost sensor for measuring air quality.</span></p><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">You can see the current pollutant levels at monitoring stations in the Medellin metro area using the Ciudadanos Científicos mobile app. Ciudadanos Científicos is a mobile app created by SIATA and financed by the Aburrá Valley Metropolitan Area, which permits you to track the real-time pollution levels at monitoring stations throughout the Medellín metro area.</span></p><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2069" instrument_node="">Also, the Ciudadanos Científicos app is available for free on&nbsp;</span><a data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dco.gov.siata.ciudadano_cientifico%26hl%3Den_US" onclick="javascript:window.open('https://play.google.com/store/apps/details?id=co.gov.siata.ciudadano_cientifico&amp;hl=en_US'); return false;"><span data-dcnode-id="2068" instrument_node="">Android</span></a><span data-dcnode-id="2066" instrument_node="">&nbsp;and&nbsp;</span><a data-dcnode-id="2064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itunes.apple.com/us/app/ciudadanos-cient%25C3%25ADficos/id1103931436%3Fmt%3D8" onclick="javascript:window.open('https://itunes.apple.com/us/app/ciudadanos-cient%C3%ADficos/id1103931436?mt=8'); return false;"><span data-dcnode-id="2065" instrument_node="">iPhone</span></a><span data-dcnode-id="2063" instrument_node="">.</span></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">The pollution level in Medellín and the Aburrá valley varies in different parts of the metro area, which can be seen using this mobile app. The worst pollution tends to be found in El Centro and other lower parts of the valley as well as in La Estrella and Itagüí.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Higher up the hills found in some neighborhoods like in Belén (Loma de los Bernal), El Poblado, Envigado and Sabaneta the pollutant levels can be lower. &nbsp;So, it’s possible to find a neighborhood with somewhat lower levels of particulate matter pollution.</span></p><span data-dcnode-id="2055" instrument_node="">
</span><h2 data-dcnode-id="2052"><strong data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">Medellín Pollution: Health Effects of Pollution</span></strong></h2><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Particulate matter pollution doesn’t impact everyone the same. It bothers some people much more than others. And the people most likely to be affected by pollutants include:</span></p><span data-dcnode-id="2048" instrument_node="">
</span><ul data-dcnode-id="2028"><span data-dcnode-id="2047" instrument_node="">
</span><li data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Older adults and the elderly</span></li><span data-dcnode-id="2044" instrument_node="">
</span><li data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Children under the age of 14 and babies</span></li><span data-dcnode-id="2041" instrument_node="">
</span><li data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">People with heart disease or coronary artery disease</span></li><span data-dcnode-id="2038" instrument_node="">
</span><li data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">People with lung diseases (such as asthma)</span></li><span data-dcnode-id="2035" instrument_node="">
</span><li data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Pregnant women</span></li><span data-dcnode-id="2032" instrument_node="">
</span><li data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Athletes who exercise vigorously outdoors</span></li><span data-dcnode-id="2029" instrument_node="">
</span></ul><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">If you have heart disease, breathing in particulate matter pollution can be serious and can even cause a heart attack. Symptoms include chest pain, feeling out of breath, fast heartbeat and being more tired than usual.</span></p><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Also, many scientific studies connect particulate matter pollution of a variety of other health issues, including:</span></p><span data-dcnode-id="2021" instrument_node="">
</span><ul data-dcnode-id="1989"><span data-dcnode-id="2020" instrument_node="">
</span><li data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">Asthma attacks</span></li><span data-dcnode-id="2017" instrument_node="">
</span><li data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Coughing and shortness of breath</span></li><span data-dcnode-id="2014" instrument_node="">
</span><li data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Damaged cells in the respiratory system</span></li><span data-dcnode-id="2011" instrument_node="">
</span><li data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Eye irritation</span></li><span data-dcnode-id="2008" instrument_node="">
</span><li data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Irregular heartbeat</span></li><span data-dcnode-id="2005" instrument_node="">
</span><li data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Loss of lung capacity</span></li><span data-dcnode-id="2002" instrument_node="">
</span><li data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Lung cancer</span></li><span data-dcnode-id="1999" instrument_node="">
</span><li data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Problems with babies at birth (i.e. low birth weight)</span></li><span data-dcnode-id="1996" instrument_node="">
</span><li data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Shortened life span and premature death of those with heart or lung diseases</span></li><span data-dcnode-id="1993" instrument_node="">
</span><li data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Trouble breathing</span></li><span data-dcnode-id="1990" instrument_node="">
</span></ul><span data-dcnode-id="1988" instrument_node="">
</span><p data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">Unfortunately, the human body is not very good at blocking or filtering PM2.5 pollution. PM2.5 particles are small enough to bypass your respiratory system defenses and get into your lungs where they can penetrate the bloodstream.</span></p><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Also, Elkin Martinez, an epidemiologist at Universidad de Antioquia, published a study that linked up to 3,000 deaths in&nbsp; 2016 which were reportedly associated with air pollution. This included 1,000 who died from lung disease, 500 from lung cancer and about 1,500 from cardiovascular disease, which were linked to PM2.5 pollutants.</span></p><span data-dcnode-id="1982" instrument_node="">
</span><h2 data-dcnode-id="1979"><strong data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Medellín Pollution: What to do When Pollution Levels are High?</span></strong></h2><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">When particulate matter PM2.5 levels are high you should limit the amount of air that you breathe while outside. Here are some tips:</span></p><span data-dcnode-id="1975" instrument_node="">
</span><ul data-dcnode-id="1955"><span data-dcnode-id="1974" instrument_node="">
</span><li data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Spend more time indoors, where particulate matter pollution levels tend to be lower.</span></li><span data-dcnode-id="1971" instrument_node="">
</span><li data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Choose easier outdoor activities like walking instead of running or other strenuous sports, so you don’t breathe as hard.</span></li><span data-dcnode-id="1968" instrument_node="">
</span><li data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">Avoid the busiest roads where PM pollution is worse because of emissions from cars, motorcycles, buses and trucks.</span></li><span data-dcnode-id="1965" instrument_node="">
</span><li data-dcnode-id="1957"><span data-dcnode-id="1964" instrument_node="">Choose cleaner transport methods: use the </span><a data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/metro/"><span data-dcnode-id="1963" instrument_node="">Medellín metro</span></a><span data-dcnode-id="1961" instrument_node="">, use the </span><a data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/encicla/"><span data-dcnode-id="1960" instrument_node="">Encicla public bike system</span></a><span data-dcnode-id="1958" instrument_node="">&nbsp;or share a ride.</span></li><span data-dcnode-id="1956" instrument_node="">
</span></ul><span data-dcnode-id="1954" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1950" id="attachment_15101" style="width: 1034px"><img alt="Medellín also has a pollution problem with the river that runs through the city, photo from the Industriales metro station by Felipe Restrepo Acosta" aria-describedby="caption-attachment-15101" class="size-large wp-image-15101" data-dcnode-id="1953" height="768" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medellinguru.com/wp-content/uploads/2019/02/IMG_6003-1024x768.jpg&amp;raw" srcset="https://medellinguru.com/wp-content/uploads/2019/02/IMG_6003.jpg 1024w, https://medellinguru.com/wp-content/uploads/2019/02/IMG_6003-150x113.jpg 150w, https://medellinguru.com/wp-content/uploads/2019/02/IMG_6003-750x563.jpg 750w, https://medellinguru.com/wp-content/uploads/2019/02/IMG_6003-768x576.jpg 768w" width="1024"><p class="wp-caption-text" data-dcnode-id="1951" id="caption-attachment-15101"><span data-dcnode-id="1952" instrument_node="">Medellín also has a pollution problem with the river that runs through the city, photo from the Industriales metro station by Felipe Restrepo Acosta</span></p></div><span data-dcnode-id="1949" instrument_node="">
</span><h2 data-dcnode-id="1946"><strong data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">The Bottom Line: Medellín Pollution</span></strong></h2><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Medellín has an air pollution problem due to a metro area population of about 4 million in the Aburrá Valley with all the vehicles plus the location in a valley surrounded by mountains, which does not permit easy dispersion of pollutants. But there are many cities and towns in the world with worse pollution levels than Medellín.</span></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">The pollution levels vary at different times in Medellín and the worst pollutant levels in Medellín are typically seen each year in March-April and September-October during the transition to the cloudy rainy seasons.</span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">Also, keep in mind that the pollutant levels also vary in different neighborhoods in the city. The&nbsp;Ciudadanos Científicos mobile app is the best way to monitor pollution in the city and see the pollutant levels in different neighborhoods.</span></p><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1929"><strong data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Sign up for the Free Medellin Guru Newsletter</span></strong><span data-dcnode-id="1933" instrument_node="">&nbsp;– You can see all of the previous&nbsp;</span><a data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//archive.aweber.com/awlist4750169" onclick="javascript:window.open('http://archive.aweber.com/awlist4750169'); return false;"><span data-dcnode-id="1932" instrument_node="">Medellin Guru weekly&nbsp;email newsletters and sign up here</span></a><span data-dcnode-id="1930" instrument_node="">.</span></p><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1925"><em data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Editors note: updated on February 13, 2019 with data from the WHO’s 2018 Ambient Air Quality Database.&nbsp;</span></em></p><span data-dcnode-id="1924" instrument_node="">
</span><p data-dcnode-id="1921"><em data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Editors note: updated on February 17, 2019 to add information that the 10 municipalities in the Aburrá Valley put in place vehicle restrictions in February 2019 to help improve the pollution in the city.</span></em></p><span data-dcnode-id="1920" instrument_node="">

</span><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Thanks so much for sharing this very helpful article and overview. There are many key challenges in Medellin, including reducing poverty, traffic,  security and pollution. We love living here and the city is making some progress on all fronts but not enough. Pollution is definitely a challenge and the city needs to do much more. I took encicla the other week and love bike share but the bike paths are still quite poor and the amount of pollution I breathed in biking was crazy. One of the key steps the city needs to do is reduce pollution from older trucks, buses, cars, motos (they are not doing enough) and of course try to switch the culture of car ownership to a city where people come first in all aspects.</span></p><span data-dcnode-id="1489" instrument_node="">
