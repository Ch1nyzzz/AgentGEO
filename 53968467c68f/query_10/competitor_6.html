</span><p data-dcnode-id="6235"><span data-dcnode-id="6236" instrument_node="">“3. Conclusion While there has been significant research and study into barriers to include persons with EH disabilities, critical obstacles remain.</span></p><span data-dcnode-id="6234" instrument_node="">
</span><p data-dcnode-id="6232"><span data-dcnode-id="6233" instrument_node="">Seeking help in the health system, trying to find and/or retain adequate housing or employment, entering public spaces, shopping, or using public transportation, limit the inclusion of persons with EH disabilities in our communities.</span></p><span data-dcnode-id="6231" instrument_node="">
</span><p data-dcnode-id="6229"><span data-dcnode-id="6230" instrument_node="">Much more needs to be done to acknowledge the significant hurdles faced by persons with EH disabilities.</span></p><span data-dcnode-id="6228" instrument_node="">

</span><h2 class="entry-title" data-dcnode-id="6073"><a data-dcnode-id="6074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seriouslysensitivetopollution.org/2019/12/15/the-canadian-human-rights-commissions-environmental-sensitivity-and-scent-free-policies/" rel="bookmark"><span data-dcnode-id="6075" instrument_node="">The Canadian Human Rights Commission’s “Environmental sensitivity and scent-free&nbsp;policies”</span></a></h2><span data-dcnode-id="6072" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="6056"><span data-dcnode-id="6071" instrument_node="">
</span><span class="meta-prep meta-prep-author" data-dcnode-id="6069"><span data-dcnode-id="6070" instrument_node="">Posted on</span></span><span data-dcnode-id="6068" instrument_node=""> </span><a data-dcnode-id="6065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seriouslysensitivetopollution.org/2019/12/15/the-canadian-human-rights-commissions-environmental-sensitivity-and-scent-free-policies/" rel="bookmark" title="1:55 am"><span class="entry-date" data-dcnode-id="6066"><span data-dcnode-id="6067" instrument_node="">December 15, 2019</span></span></a><span data-dcnode-id="6064" instrument_node=""> </span><span class="comments-link" data-dcnode-id="6058"><span class="meta-sep" data-dcnode-id="6062"><span data-dcnode-id="6063" instrument_node="">|</span></span><span data-dcnode-id="6061" instrument_node=""> </span><a data-dcnode-id="6059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seriouslysensitivetopollution.org/2019/12/15/the-canadian-human-rights-commissions-environmental-sensitivity-and-scent-free-policies/%23comments"><span data-dcnode-id="6060" instrument_node="">8 comments</span></a></span><span data-dcnode-id="6057" instrument_node="">
</span></div><span data-dcnode-id="6054" instrument_node="">
</span><div class="entry-content" data-dcnode-id="5986"><span data-dcnode-id="6053" instrument_node="">
</span><p data-dcnode-id="6044" style="text-align:center;"><span data-dcnode-id="6045" style="color:#000080;"><span data-dcnode-id="6052" instrument_node="">The Canadian Human Rights Commission’s</span><br data-dcnode-id="6051"><span data-dcnode-id="6050" instrument_node="">
</span><strong data-dcnode-id="6048"><span data-dcnode-id="6049" instrument_node="">Policy on Environmental Sensitivities</span></strong><br data-dcnode-id="6047"><span data-dcnode-id="6046" instrument_node="">
has been updated to add more on scent-free policies.</span></span></p><span data-dcnode-id="6043" instrument_node="">
</span><p data-dcnode-id="6036"><a data-dcnode-id="6041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seriouslysensitivetopollution.files.wordpress.com/2019/12/chrc-2019-policy-cover-image-banner-size.png"><img alt="" class="aligncenter size-large wp-image-10322" data-attachment-id="10322" data-comments-opened="1" data-dcnode-id="6042" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="CHRC 2019 Policy cover image banner size" data-large-file="https://seriouslysensitivetopollution.files.wordpress.com/2019/12/chrc-2019-policy-cover-image-banner-size.png?w=500" data-medium-file="https://seriouslysensitivetopollution.files.wordpress.com/2019/12/chrc-2019-policy-cover-image-banner-size.png?w=300" data-orig-file="https://seriouslysensitivetopollution.files.wordpress.com/2019/12/chrc-2019-policy-cover-image-banner-size.png" data-orig-size="990,363" data-permalink="https://seriouslysensitivetopollution.org/2019/12/15/the-canadian-human-rights-commissions-environmental-sensitivity-and-scent-free-policies/chrc-2019-policy-cover-image-banner-size/" height="183" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seriouslysensitivetopollution.files.wordpress.com/2019/12/chrc-2019-policy-cover-image-banner-size.png%3Fw%3D500%26h%3D183&amp;raw" srcset="https://seriouslysensitivetopollution.files.wordpress.com/2019/12/chrc-2019-policy-cover-image-banner-size.png?w=500&amp;h=183 500w, https://seriouslysensitivetopollution.files.wordpress.com/2019/12/chrc-2019-policy-cover-image-banner-size.png?w=150&amp;h=55 150w, https://seriouslysensitivetopollution.files.wordpress.com/2019/12/chrc-2019-policy-cover-image-banner-size.png?w=300&amp;h=110 300w, https://seriouslysensitivetopollution.files.wordpress.com/2019/12/chrc-2019-policy-cover-image-banner-size.png?w=768&amp;h=282 768w, https://seriouslysensitivetopollution.files.wordpress.com/2019/12/chrc-2019-policy-cover-image-banner-size.png 990w" width="500"></a><span data-dcnode-id="6040" instrument_node="">Image description: “</span><strong data-dcnode-id="6038"><span data-dcnode-id="6039" instrument_node="">Environmental sensitivity and scent-free policies</span></strong><span data-dcnode-id="6037" instrument_node="">” text on a blue background to the left, with a photo of a dark haired woman resting her chin on her hand, while looking wistfully (towards the title&nbsp; text) out a window with rain drops on it, on the right side.</span></p><span data-dcnode-id="6035" instrument_node="">
</span><p data-dcnode-id="6031"><strong data-dcnode-id="6033"><span data-dcnode-id="6034" instrument_node="">The new policy includes this</span></strong><span data-dcnode-id="6032" instrument_node="">:</span></p><span data-dcnode-id="6030" instrument_node="">
</span><p data-dcnode-id="6022"><span data-dcnode-id="6029" instrument_node="">“A scent-free policy is similar to other workplace policies such as</span><br data-dcnode-id="6028"><span data-dcnode-id="6027" instrument_node="">
anti-harassment policies. It applies to all employees and is intended to guide</span><br data-dcnode-id="6026"><span data-dcnode-id="6025" instrument_node="">
their conduct. If an employee does not comply with the policy, disciplinary</span><br data-dcnode-id="6024"><span data-dcnode-id="6023" instrument_node="">
action can be taken.”</span></p><span data-dcnode-id="6021" instrument_node="">
</span><p data-dcnode-id="6019"><span data-dcnode-id="6020" instrument_node="">and this:</span></p><span data-dcnode-id="6018" instrument_node="">
</span><p data-dcnode-id="6014"><span data-dcnode-id="6017" instrument_node="">“If an employee with environmental sensitivities needs to leave because of a trigger, this person should not suffer negative impacts because of their disability</span><br data-dcnode-id="6016"><span data-dcnode-id="6015" instrument_node="">
or their need for accommodation.”</span></p><span data-dcnode-id="6013" instrument_node="">
</span><p data-dcnode-id="6011"><span data-dcnode-id="6012" instrument_node="">&nbsp;</span></p><span data-dcnode-id="6010" instrument_node="">
</span><p data-dcnode-id="6004"><span data-dcnode-id="6009" instrument_node="">Visit the CHRC website to download the PDF:</span><br data-dcnode-id="6008"><span data-dcnode-id="6007" instrument_node="">
</span><a data-dcnode-id="6005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chrc-ccdp.gc.ca/eng/content/policy-environmental-sensitivities" rel="noopener" target="_blank"><span data-dcnode-id="6006" instrument_node="">https://www.chrc-ccdp.gc.ca/eng/content/policy-environmental-sensitivities</span></a></p><span data-dcnode-id="6003" instrument_node="">
</span><p data-dcnode-id="6001"><span data-dcnode-id="6002" instrument_node="">&nbsp;</span></p><span data-dcnode-id="6000" instrument_node="">
</span><p data-dcnode-id="5995"><strong data-dcnode-id="5998"><span data-dcnode-id="5999" instrument_node="">Full text of the policy</span></strong><br data-dcnode-id="5997"><span data-dcnode-id="5996" instrument_node="">
(as copied from their PDF for people who have difficulties with PDFs):</span></p><span data-dcnode-id="5994" instrument_node="">

</span><div class="entry-content" data-dcnode-id="5848"><span data-dcnode-id="5870" instrument_node="">
</span><p data-dcnode-id="5868"><span data-dcnode-id="5869" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5867" instrument_node="">
</span><p data-dcnode-id="5865"><span data-dcnode-id="5866" instrument_node="">It seems like the best way to clear up some confusion about being fragrance-free, is to provide a checklist of products and places where fragrances that can make you not be fragrance-free are found, so that you don’t inadvertently bring fragrances with you when going&nbsp; somewhere with a strict fragrance-free policy.</span></p><span data-dcnode-id="5864" instrument_node="">
</span><p data-dcnode-id="5862"><span data-dcnode-id="5863" instrument_node="">The checklist addresses some common misconceptions about what being fragrance-free really means.</span></p><span data-dcnode-id="5861" instrument_node="">
</span><p data-dcnode-id="5857"><span data-dcnode-id="5860" instrument_node="">Being fragrance-free is about more than not using perfume or cologne.</span><br data-dcnode-id="5859"><span data-dcnode-id="5858" instrument_node="">
It’s also not about skipping deodorant, as some people seem to think.</span></p><span data-dcnode-id="5856" instrument_node="">

</span><div class="_1mf _1mj" data-dcnode-id="4915"><span data-dcnode-id="4933" instrument_node="">Marie’s an </span><a data-dcnode-id="4931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seriouslysensitivetopollution.org/2017/05/15/endangered-human-art-project-bringing-awareness-to-chemical-sensitivity/" rel="noopener" target="_blank"><span data-dcnode-id="4932" instrument_node="">artist</span></a><span data-dcnode-id="4930" instrument_node=""> with severe mold sensitivity and MCS/ES, and has created an amazing </span><a data-dcnode-id="4928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dni8-MiL8LzU%26list%3DPLu3HbaZdPIMHsKGdxXEBwafm-8yh4Y-p9" rel="noopener" target="_blank"><span data-dcnode-id="4929" instrument_node="">slide show</span></a><span data-dcnode-id="4927" instrument_node=""> and </span><a data-dcnode-id="4925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seriouslysensitivetopollution.org/2020/02/22/endangered-human-in-jasper/" rel="noopener" target="_blank"><span data-dcnode-id="4926" instrument_node="">photo</span></a><span data-dcnode-id="4924" instrument_node=""> &nbsp;</span><a data-dcnode-id="4922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seriouslysensitivetopollution.org/2020/04/27/new-photography-exhibit-in-may-with-a-special-video-on-may-12th/" rel="noopener" target="_blank"><span data-dcnode-id="4923" instrument_node="">exhibits</span></a><span data-dcnode-id="4921" instrument_node=""> to raise awareness about the plight of people with environmental sensitivities and environmental illnesses, despite living in a dilapitated van, having to travel to the US for our winters because it’s too cold in a van here in Canada.</span><p data-dcnode-id="4920"></p><span data-dcnode-id="4919" instrument_node="">
</span><p data-dcnode-id="4917"><span data-dcnode-id="4918" instrument_node="">We really don’t have accessible housing for people with severe MCS/ES. I have several good online friends living in vehicles now because there’s no accessible housing. Marie is one of them, and she needs a reliable new (to her) van really soon, so that she can continue to live and create the beautiful, challenging, and awareness-raising art she lives for.</span></p><span data-dcnode-id="4916" instrument_node="">
</span></div><span data-dcnode-id="4914" instrument_node="">

</span></div><span data-dcnode-id="4907" instrument_node="">

</span><div class="_1mf _1mj" data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">Life in a specialized van is hard enough, but it’s not at all safe in the old one she’s been trying to maintain the last few years. The old van has come to the end of it’s life. She has been harassed by unscrupulous men a number of times when the van broke down, and she deserves better than this from our society.</span></div><span data-dcnode-id="4903" instrument_node="">
</span><div data-dcnode-id="4902"></div><span data-dcnode-id="4901" instrument_node="">
</span><div class="_1mf _1mj" data-dcnode-id="4899"><span data-dcnode-id="4900" instrument_node="">Let’s make sure she receives what she needs. No contribution is too small. Likewise, no donation is too big if you have more than you need.</span></div><span data-dcnode-id="4898" instrument_node="">

</span><p data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">The only thing that has changed, is that Maria is no longer with us. She lost her life in December 2020 after being subjected to too many exposures when spending time in hospitals with her father.</span></p><span data-dcnode-id="4049" instrument_node="">
</span><p data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">She wasn’t able to recover from those exposures, the broken heart of losing her father, and of the world that harms us instead of welcomes us.</span></p><span data-dcnode-id="4046" instrument_node="">
</span><p data-dcnode-id="4041"><span data-dcnode-id="4045" instrument_node="">The tribute her partner wrote when he informed the community of her passing can be found </span><a data-dcnode-id="4042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.craft.do/s/iUbJhPRypqqD78" rel="noopener" target="_blank"><strong data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">here.</span></strong></a></p><span data-dcnode-id="4040" instrument_node="">
</span><p data-dcnode-id="4038" style="text-align:left;"><span data-dcnode-id="4039" instrument_node="">I miss collaborating with Maria, I miss her creative energy, and her ability to do things in clear and concise ways.</span></p><span data-dcnode-id="4037" instrument_node="">
</span><p data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">She’d still be with us if hospitals and the rest of the world stopped inflicting unnecessary poisons on us all, and instead respected our human rights as well as their own vulnerability to 24/7 exposures to unnecessary hazardous substances.</span></p><span data-dcnode-id="4034" instrument_node="">
</span><p data-dcnode-id="4032" style="text-align:center;"><span data-dcnode-id="4033" instrument_node="">Her death is a great loss to the global MCS/ES community.</span></p><span data-dcnode-id="4031" instrument_node="">
</span><p data-dcnode-id="4029" style="text-align:center;"><span data-dcnode-id="4030" instrument_node="">…</span></p><span data-dcnode-id="4028" instrument_node="">
</span><p data-dcnode-id="4026" style="text-align:center;"><span data-dcnode-id="4027" instrument_node="">&nbsp;Rest in power Maria.</span></p><span data-dcnode-id="4025" instrument_node="">

</span></div><span data-dcnode-id="3935" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3915"><span data-dcnode-id="3934" instrument_node="">
</span><p data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">Traditionally May is MCS and MCS/ES Awareness Month.</span></p><span data-dcnode-id="3931" instrument_node="">
</span><p data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">After decades of awareness raising, it’s time to move on to welcoming action and accommodation, don’t you think?</span></p><span data-dcnode-id="3928" instrument_node="">
</span><p data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">Are people with MCS/ES, often referred to as Human Canaries, actually welcome in this world?</span></p><span data-dcnode-id="3925" instrument_node="">
</span><p data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">If you are a person with MCS/ES, please share in the comments if and how you are being accommodated and welcomed (or not) in this world.</span></p><span data-dcnode-id="3922" instrument_node="">
</span><p data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">If you are a person who doesn’t have MCS/ES, please share in the comments how you are accommodating and welcoming people with MCS/ES into the world.</span></p><span data-dcnode-id="3919" instrument_node="">
