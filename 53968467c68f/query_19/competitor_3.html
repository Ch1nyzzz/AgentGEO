</span><div class="shg-rich-text shg-theme-text-content" data-dcnode-id="1105"><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1138" style="text-align: left;"><strong data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">PREMIUM QUALITY</span></strong><span data-dcnode-id="1139" instrument_node=""> - HEPA filter captures dust and allergens as tiny as 0.3 microns to remove household dust, pet dander, mold spores, pollen, bacteria, germs, and PM2.5 particles. Ideal for anyone who suffers from allergies and asthma or looks for a way to create a cleaner and healthier home.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1133" style="text-align: left;"><strong data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">ELIMINATES ODORS</span></strong><span data-dcnode-id="1134" instrument_node=""> - Premium activated carbon pre-filters remove odors from pets, smoking, cooking and more. Use activated charcoal nano-technology to provide fresh clean air throughout a large room.</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1128" style="text-align: left;"><strong data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">SUPERIOR VALUE</span></strong><span data-dcnode-id="1129" instrument_node=""> - This complete air cleaner system includes a HEPA Filter along with 4 Precut Activated Carbon Pre-Filters. This complete set eliminates the need to cut, clean or vacuum prefilters and extends the life of the main HEPA filter. The VEVA 8000 offers the most affordable HEPA replacement filters of any air purifier. It also has the longest lasting filters on the market that only need to be changed every 6-12 months depending on usage.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1123" style="text-align: left;"><strong data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">PERFECT FOR HOME OR OFFICE</span></strong><span data-dcnode-id="1124" instrument_node=""> - The VEVA 8000 features an innovative and sleek design that guarantees the air purifier to be the perfect addition to any home or office. It can be changed from a tower air purifier to a tabletop air purifier by removing the base. 3 Stage Fan Speed ranges from Ultra Quiet to Turbo. Measures 9" x 8" x 23".</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1118" style="text-align: left;"><strong data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">SAFE FOR THE WHOLE FAMILY</span></strong><span data-dcnode-id="1119" instrument_node=""> - Ozoneless, does not use UV or Ions which produce trace amounts of measurable ozone, a harmful air pollutant. Has an automatic shut-off safety feature when the front panel is removed by a baby, a cat or a dog.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><ul data-dcnode-id="1111"><span data-dcnode-id="1116" instrument_node="">
</span><li data-dcnode-id="1113"><span class="a-size-large product-title-word-break" data-dcnode-id="1114" id="productTitle"><span data-dcnode-id="1115" instrument_node="">VEVA 8000 Elite Pro Series Air Purifier HEPA Filter &amp; 4 Premium Activated Carbon Pre Filters Removes Allergens, Smoke, Dust, Pet Dander &amp; Odor Complete Tower Air Cleaner Home &amp; Office, 325 Sq Ft.</span></span></li><span data-dcnode-id="1112" instrument_node="">
</span></ul><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1107" style="text-align: left;"><em data-dcnode-id="1108" style="font-size: 9px;"><span data-dcnode-id="1109" instrument_node="">Clean air is a core part of your health &amp; happiness. VEVA develops industry-leading air purification systems that deliver the cleanest air. VEVA puts customers first by focusing on providing the highest quality air purifiers and filters at the most affordable prices. This means your family can breathe the cleanest air possible.</span></em></p><span data-dcnode-id="1106" instrument_node="">

</span><p data-dcnode-id="870"><span data-dcnode-id="871" style="font-weight: 400;"><span data-dcnode-id="872" instrument_node="">The VEVA 8000 features an innovative and sleek design that guarantees the air purifier to be the perfect addition to any home or office. It can be changed from a tower air purifier to a tabletop air purifier by removing the base. 3 Stage Fan Speed ranges from Ultra Quiet to Turbo. Measures 9" x 8" x 23".</span></span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867" style="line-height: normal;"><span data-dcnode-id="868" instrument_node="">&nbsp;</span></p><span data-dcnode-id="866" instrument_node="">

</span><p data-dcnode-id="794" style="line-height: normal;"><span data-dcnode-id="795" style="font-weight: 400;"><span data-dcnode-id="796" instrument_node="">HEPA air filters capture dust and allergens as tiny as 0.3 microns to remove household dust, pet dander, mold spores, pollen, bacteria, germs, and PM2.5 particles. Ideal for anyone who suffers from allergies and asthma or looks for a way to create a cleaner and healthier home.</span></span></p><span data-dcnode-id="793" instrument_node="">

</span><p data-dcnode-id="782" style="line-height: normal;"><span data-dcnode-id="783" style="font-weight: 400;"><span data-dcnode-id="784" instrument_node="">Premium activated carbon pre-filters remove odors from pets, smoking, cooking and more. Use activated charcoal nano-technology to provide fresh clean air throughout a large room.</span></span></p><span data-dcnode-id="781" instrument_node="">

</span><p data-dcnode-id="770" style="line-height: normal;"><span data-dcnode-id="771" style="font-weight: 400;"><span data-dcnode-id="772" instrument_node="">This complete air cleaner system includes a HEPA Filter along with 4 Precut Activated Carbon Pre-Filters. This complete set eliminates the need to cut, clean or vacuum prefilters and extends the life of the main HEPA filter. The VEVA 8000 offers the most affordable HEPA replacement filters of any air purifier. </span></span></p></div><span data-dcnode-id="768" instrument_node="">

</span><div class="shg-rich-text shg-theme-text-content" data-dcnode-id="621"><h3 data-dcnode-id="640" style="line-height: normal;"><strong data-dcnode-id="641"><span data-dcnode-id="642" style="font-size: 18px;"><span data-dcnode-id="643" instrument_node="">THE PERFECT HEPA AIR PURIFIER FOR HOME OR OFFICE</span></span></strong></h3><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" style="font-weight: 400;"><span data-dcnode-id="638" instrument_node="">The VEVA 8000 features an innovative and sleek design that guarantees the air purifier to be the perfect addition to any home or office. It can be changed from a tower air purifier to a tabletop air purifier by removing the base. 3 Stage Fan Speed ranges from Ultra Quiet to Turbo. Measures 9" x 8" x 23".</span></span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633" style="line-height: normal;"><span data-dcnode-id="634" instrument_node="">&nbsp;</span></p><span data-dcnode-id="632" instrument_node="">

</span><p data-dcnode-id="622"><span data-dcnode-id="625" style="font-weight: 400;"><span data-dcnode-id="626" instrument_node="">Ozone-less, does not use UV or Ions which produce trace amounts of measurable ozone, a harmful air pollutant. Has an automatic shut-off safety feature when the front panel is removed by a baby, a cat or a dog</span></span><span data-dcnode-id="623" style="font-weight: 400;"><span data-dcnode-id="624" instrument_node="">.</span></span></p></div><span data-dcnode-id="620" instrument_node="">

</span><p data-dcnode-id="585" style="line-height: normal;"><span data-dcnode-id="586" style="font-weight: 400;"><span data-dcnode-id="587" instrument_node="">HEPA air filters capture dust and allergens as tiny as 0.3 microns to remove household dust, pet dander, mold spores, pollen, bacteria, germs, and PM2.5 particles. Ideal for anyone who suffers from allergies and asthma or looks for a way to create a cleaner and healthier home.</span></span></p><span data-dcnode-id="584" instrument_node="">

</span><p data-dcnode-id="573" style="line-height: normal;"><span data-dcnode-id="574" style="font-weight: 400;"><span data-dcnode-id="575" instrument_node=""> Premium activated carbon pre-filters remove odors from pets, smoking, cooking and more. Use activated charcoal nano-technology to provide fresh clean air throughout a large room.</span></span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570" style="line-height: normal;"><span data-dcnode-id="571" instrument_node="">&nbsp;</span></p><span data-dcnode-id="569" instrument_node="">
