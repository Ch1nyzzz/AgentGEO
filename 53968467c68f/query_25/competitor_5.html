</span><h1 class="entry-title" data-dcnode-id="822"><span data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">The Problem of Urban Sprawl</span></span></h1><span data-dcnode-id="821" instrument_node="">
</span><header class="entry-meta" data-dcnode-id="787"><span data-dcnode-id="820" instrument_node="">
</span><a class="cat-link" data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/explore/savingearth/category/biodiversity-loss"><span class="cat-icon" data-dcnode-id="818"><img data-dcnode-id="819" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/explore/savingearth/wp-content/uploads/sites/4/2019/04/Earth-ToDo-List-icons_Biodiversity-Loss.png&amp;raw"></span><span class="cat-label" data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Biodiversity Loss</span></span></a><span data-dcnode-id="814" instrument_node="">

.266 1.5 1.5 1.5h17c1.266 0 1.5-.22 1.5-1.5zm-.015-10.765c0-.91-.265-1.235-1.485-1.235h-17c-1.255 0-1.5.39-1.5 1.3l.015.14s9.035 6.22 10 6.56c1.02-.395 9.985-6.7 9.985-6.7l-.015-.065z" data-dcnode-id="795" fill="#FFF"></path></svg></span><span class="a2a_label" data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Email</span></span></a></div><span data-dcnode-id="788" instrument_node="">
</span></header><span data-dcnode-id="786" instrument_node="">
</span><div class="entry-content" data-dcnode-id="359"><span data-dcnode-id="785" instrument_node="">
</span><p class="has-drop-cap" data-dcnode-id="763"><strong data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Urban sprawl</span></strong><span data-dcnode-id="782" instrument_node="">, also called </span><strong data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">sprawl</span></strong><span data-dcnode-id="779" instrument_node=""> or</span><strong data-dcnode-id="777"><span data-dcnode-id="778" instrument_node=""> suburban sprawl</span></strong><span data-dcnode-id="776" instrument_node="">, the rapid expansion of the geographic extent of </span><a class="extlink" data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/city"><span data-dcnode-id="775" instrument_node="">cities</span></a><span data-dcnode-id="773" instrument_node=""> and towns, often characterized by low-density residential housing, single-use </span><a class="extlink" data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/zoning-land-use"><span data-dcnode-id="772" instrument_node="">zoning</span></a><span data-dcnode-id="770" instrument_node="">, and increased reliance on the private automobile for transportation. Urban sprawl is caused in part by the need to accommodate a rising urban population; however, in many metropolitan areas it results from a desire for increased living space and other residential amenities. Urban sprawl has been correlated with increased </span><a class="extlink" data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/energy"><span data-dcnode-id="769" instrument_node="">energy</span></a><span data-dcnode-id="767" instrument_node=""> use, </span><a class="extlink" data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/pollution-environment"><span data-dcnode-id="766" instrument_node="">pollution</span></a><span data-dcnode-id="764" instrument_node="">, and traffic congestion and a decline in community distinctiveness and cohesiveness. In addition, by increasing the physical and environmental “footprints” of metropolitan areas, the phenomenon leads to the destruction of wildlife habitat and to the fragmentation of remaining natural areas.</span></p><span data-dcnode-id="762" instrument_node="">
</span><div class="ad-unit ad-leaderboard acf/ad-billboard" data-dcnode-id="743" id="adunit-block_5cb3ece631fa3"><span data-dcnode-id="761" instrument_node="">
</span><div class="ad-wrapper" data-dcnode-id="745"><span data-dcnode-id="760" instrument_node="">
</span><span data-dcnode-id="758" instrument_node="">
</span><div class="none block-l" data-dcnode-id="753" id="div-gpt-ad-1554214027243-0" style="height:90px; width:728px;"><span data-dcnode-id="757" instrument_node="">
</span><span data-dcnode-id="754" instrument_node="">
</span></div><span data-dcnode-id="752" instrument_node="">
</span><div class="block none-l" data-dcnode-id="747" id="div-gpt-ad-1554214155739-0" style="height:50px; width:320px;"><span data-dcnode-id="751" instrument_node="">
</span><span data-dcnode-id="748" instrument_node="">
</span></div><span data-dcnode-id="746" instrument_node="">
</span></div><span data-dcnode-id="744" instrument_node="">
</span></div><span data-dcnode-id="742" instrument_node="">
</span><figure class="wp-block-pullquote" data-dcnode-id="736"><blockquote data-dcnode-id="737"><p data-dcnode-id="738"><span data-dcnode-id="741" instrument_node=""> </span><br data-dcnode-id="740"><span data-dcnode-id="739" instrument_node="">Urban sprawl has been correlated with increased energy use, pollution, and traffic congestion and a decline in community distinctiveness and cohesiveness. In addition, by increasing the physical and environmental “footprints” of metropolitan areas, the phenomenon leads to the destruction of wildlife habitat and to the fragmentation of remaining natural areas. </span></p></blockquote></figure><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">During the period of economic prosperity in the United States following the end of World War II, increased manufacturing output and new federal loan programs allowed many American citizens to purchase single-family homes and private automobiles. At the same time, continued road-building projects, most notably the onset of the Interstate Highway System in 1956, and other infrastructure development made it possible to build homes on land that was previously inaccessible. Compared with land in the cities, suburban land was relatively inexpensive, and the homes constructed on this land afforded more space to their occupants than inner-city dwellings. Some citizens moved to the suburbs to enjoy a lifestyle that was ostensibly closer to nature; however, others moved to escape the congestion, crime, and noise of the city. Suburban residents retained a connection to the city through their automobiles.</span></p><span data-dcnode-id="732" instrument_node="">
</span><span data-dcnode-id="730" instrument_node="">
</span><div class="jw-error jw-reset" data-dcnode-id="718" id="jwplayer_bQ0vMSHp_3TsAGUao_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="719"><div class="jw-icon jw-reset" data-dcnode-id="725"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="726" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="727"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="720"><div class="jw-error-text jw-reset-text" data-dcnode-id="721" data-nosnippet="" dir="auto"><span data-dcnode-id="724" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="723"></span><span data-dcnode-id="722" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div><span data-dcnode-id="717" instrument_node="">
</span><span data-dcnode-id="714" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="713" style="height:34px"></div><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="711" instrument_node="">Over time this migration to the suburbs, along with rising local populations, led to substantial increases in the geographic extent, or spatial footprint, of metropolitan areas in the United States. According to the U.S. Bureau of the Census, the causes of urban sprawl are divided equally between local population increases and lifestyle choices. For example, between 1970 and 1990, metropolitan areas in the western United States (such as </span><a class="extlink" data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Las-Vegas-Nevada"><span data-dcnode-id="710" instrument_node="">Las Vegas</span></a><span data-dcnode-id="708" instrument_node="">, Nevada, </span><a class="extlink" data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Seattle-Washington"><span data-dcnode-id="707" instrument_node="">Seattle</span></a><span data-dcnode-id="705" instrument_node="">, Washington, and </span><a class="extlink" data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Salt-Lake-City"><span data-dcnode-id="704" instrument_node="">Salt Lake City</span></a><span data-dcnode-id="702" instrument_node="">, Utah) experienced massive influxes of new residents that contributed to increases in their individual spatial footprints. On the other hand, in the metropolitan areas of the eastern and central United States, relatively modest population growth was also accompanied by significant spatial growth. For example, the population of the metropolitan areas of </span><a class="extlink" data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Chicago"><span data-dcnode-id="701" instrument_node="">Chicago</span></a><span data-dcnode-id="699" instrument_node="">, Illinois, </span><a class="extlink" data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Kansas-City-Missouri"><span data-dcnode-id="698" instrument_node="">Kansas City</span></a><span data-dcnode-id="696" instrument_node="">, Missouri, and </span><a class="extlink" data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Baltimore"><span data-dcnode-id="695" instrument_node="">Baltimore</span></a><span data-dcnode-id="693" instrument_node="">, Maryland, grew by 1 percent, 16 percent and 20 percent, respectively, between 1970 and 1990, but each area’s geographic extent grew by 24 percent, 55 percent, and 91 percent, respectively. The spatial footprints of major cities in the Midwest and the Northeast, such as </span><a class="extlink" data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Detroit"><span data-dcnode-id="692" instrument_node="">Detroit</span></a><span data-dcnode-id="690" instrument_node="">, Michigan, and </span><a class="extlink" data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Pittsburgh"><span data-dcnode-id="689" instrument_node="">Pittsburgh</span></a><span data-dcnode-id="687" instrument_node="">, Pennsylvania, grew approximately 30 percent even as the cities experienced declines in population over the same period.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="684" instrument_node="">For many years, urban sprawl was thought to be an exclusively American problem; however, this phenomenon is occurring in several other countries. According to data collected in 2002 by the European Environment Agency, the population of a subset of European countries increased by only 6 percent between 1980 and 2000; however, the spatial footprint of built-up areas within these countries increased by 20 percent. The spatial footprints of some metropolitan areas, such as </span><a class="extlink" data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Palermo"><span data-dcnode-id="683" instrument_node="">Palermo</span></a><span data-dcnode-id="681" instrument_node="">, Italy, expanded significantly more from the mid-1950s to the late 1990s. Palermo’s population rose 50 percent but its spatial footprint increased 200 percent over the period.</span></p><span data-dcnode-id="679" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="671"><figure class="alignright" data-dcnode-id="672"><img alt="" class="wp-image-2165" data-dcnode-id="678" height="768" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/explore/savingearth/wp-content/uploads/sites/4/2019/04/0000148448-1024x768.jpg&amp;raw" srcset="https://www.britannica.com/explore/savingearth/wp-content/uploads/sites/4/2019/04/0000148448-1024x768.jpg 1024w, https://www.britannica.com/explore/savingearth/wp-content/uploads/sites/4/2019/04/0000148448-768x576.jpg 768w" width="1024"><figcaption data-dcnode-id="673"><span data-dcnode-id="677" instrument_node="">Aerial view of a suburban neighbourhood in Las Vegas, Nevada. </span><br data-dcnode-id="676"><em data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Credit: ©iofoto/Shutterstock.com</span></em></figcaption></figure></div><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Worldwide, people are moving to cities. According to the United Nations Population Division, 29 percent of the world’s population lived in urban areas in 1950. By the late 2000s this figure had increased to about 49 percent. In developed countries this fraction was much higher. In the United States, for example, the urban population rose from roughly 64 percent in 1950 to about 81 percent in 2007. Similarly, Japan’s urban population increased from roughly 40 percent to about 66 percent over the same period. In contrast, less-affluent developing countries contain fewer urban residents. In India, for example, the urban population increased from 17 percent in 1950 to about 29 percent in 2007. Similarly, Egypt’s urban population rose from about 32 percent to approximately 43 percent over the same interval.</span></p><span data-dcnode-id="667" instrument_node="">
</span><h2 data-dcnode-id="664"><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Causes</span></strong></h2><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="662" instrument_node="">There are many factors that contribute to urban sprawl. As indicated by the statistics cited above, population increases alone do not account for increases in a metropolitan area’s urban extent. In many cases, urban sprawl has occurred in areas experiencing population declines, and some areas with rising populations experience little urban sprawl, especially in developing countries. </span><a class="extlink" data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/economic-growth"><span data-dcnode-id="661" instrument_node="">Economic growth</span></a><span data-dcnode-id="659" instrument_node=""> and </span><a class="extlink" data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/cultural-globalization"><span data-dcnode-id="658" instrument_node="">globalization</span></a><span data-dcnode-id="656" instrument_node=""> are often cited as the principal macroeconomic drivers of urban sprawl; however, increased affluence, attractive land and housing prices, and the desire for larger homes with more amenities (such as yards, household appliances, storage space, and privacy) play significant roles at the level of the individual. Many experts also believe that weak planning laws and single-use </span><a class="extlink" data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/zoning-land-use"><span data-dcnode-id="655" instrument_node="">zoning</span></a><span data-dcnode-id="653" instrument_node=""> also contribute to urban sprawl.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="650" instrument_node="">The construction of houses, utilities, and roads in the suburbs, along with the delivery of resources to suburban residents and workers, are integral components of the </span><a class="extlink" data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/gross-national-product"><span data-dcnode-id="649" instrument_node="">gross national product</span></a><span data-dcnode-id="647" instrument_node=""> of developed countries. Because much of the growth in a metropolitan area occurs at the fringes, large amounts of resources and services are directed there. Construction at the “urban fringe” is increasingly characterized by a standardization of design. Many suburban housing tracts contain similar or identical models that sit on parcels with identical or nearly identical specifications. Standardization reduces costs, since materials (which often come from sources overseas) can be ordered in bulk, and quickens the pace of construction. Some urban planners and social scientists have linked this trend toward design standardization to the rising influence of globalization.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="644" instrument_node="">Many urban planners maintain that modern suburban zoning laws have done much to promote urban sprawl. In the United States such laws tend to rely on single-use zoning, a practice that restricts an area to the development of one particular land-use type (such as single-family residential, multifamily residential, commercial, institutional, and light industrial) in an effort to separate “incompatible” land uses from one another. After the U.S. Supreme Court upheld the constitutionality of zoning regulations in </span><em data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Village of Euclid</span></em><span data-dcnode-id="641" instrument_node=""> v. </span><em data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Ambler Realty Company</span></em><span data-dcnode-id="638" instrument_node=""> (1926), the practice was largely adopted by American municipalities. As a result of the court decision, the term </span><em data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Euclidean zoning </span></em><span data-dcnode-id="635" instrument_node="">became synonymous with single-use zoning. Despite the honourable intentions of Euclidean zoning, it discourages the development of walkable communities. Homes built deep within housing tracts are located far away from stores, schools, and employment areas. As a result, residents often depend on automobiles. In contrast, in older urban neighbourhoods, diverse land-use types are typically interspersed with one another.</span></p><span data-dcnode-id="633" instrument_node="">
</span><div class="ad-unit ad-leaderboard acf/ad-billboard" data-dcnode-id="614" id="adunit-block_5cb3ed2231fa6"><span data-dcnode-id="632" instrument_node="">
</span><div class="ad-wrapper" data-dcnode-id="616"><span data-dcnode-id="631" instrument_node="">
</span><span data-dcnode-id="629" instrument_node="">
</span><div class="none block-l" data-dcnode-id="624" id="div-gpt-ad-1554214053685-0" style="height:90px; width:728px;"><span data-dcnode-id="628" instrument_node="">
</span><span data-dcnode-id="625" instrument_node="">
</span></div><span data-dcnode-id="623" instrument_node="">
</span><div class="block none-l" data-dcnode-id="618" id="div-gpt-ad-1554214177985-0" style="height:50px; width:320px;"><span data-dcnode-id="622" instrument_node="">
</span><span data-dcnode-id="619" instrument_node="">
</span></div><span data-dcnode-id="617" instrument_node="">
</span></div><span data-dcnode-id="615" instrument_node="">
</span></div><span data-dcnode-id="613" instrument_node="">
</span><h2 data-dcnode-id="610"><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Costs of urban sprawl</span></strong></h2><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="608" instrument_node="">On the surface, sprawling subdivisions and commercial zones are economic boons to local businesses and municipalities. The construction of dwellings, stores, and infrastructure creates employment opportunities. Homeowners and commercial ventures that move into the area often provide additional revenue to local governments in the form of </span><a class="extlink" data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/property-tax"><span data-dcnode-id="607" instrument_node="">property taxes</span></a><span data-dcnode-id="605" instrument_node=""> and </span><a class="extlink" data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/sales-tax"><span data-dcnode-id="604" instrument_node="">sales taxes</span></a><span data-dcnode-id="602" instrument_node="">. However, such development often produces drains on local environmental resources, shifts the economic burden of development to longtime residents, increases transportation and energy costs, and diminishes overall community character.</span></p><span data-dcnode-id="600" instrument_node="">
</span><h3 data-dcnode-id="597"><strong data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Environmental costs</span></strong></h3><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="595" instrument_node="">One of the most obvious environmental effects of widespread building construction is the destruction of wildlife </span><a class="extlink" data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/habitat-biology"><span data-dcnode-id="594" instrument_node="">habitat</span></a><span data-dcnode-id="592" instrument_node="">. To make way for human dwellings and their associated infrastructure, natural land is plowed under, graded, and paved. Slow-moving streams are often channeled to provide more efficient drainage for housing tracts and commercial areas. Although small areas of wildlife habitat remain, they may be too small to support all the native species that lived there before or may be widely separated from one another. This arrangement often forces wildlife to cross dangerous human-dominated landscapes to find food or mates.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="589" instrument_node="">Exurban low-density neighbourhoods consume more </span><a class="extlink" data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/energy"><span data-dcnode-id="588" instrument_node="">energy</span></a><span data-dcnode-id="586" instrument_node=""> per capita than their high-density counterparts closer to the city’s core. (An exurb is an affluent residential community located beyond the suburbs in a metropolitan area.) Energy for heating, cooking, cooling, lighting, and transportation is largely produced by burning </span><a class="extlink" data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/fossil-fuel"><span data-dcnode-id="585" instrument_node="">fossil fuels</span></a><span data-dcnode-id="583" instrument_node=""> (such as </span><a class="extlink" data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/gasoline-fuel"><span data-dcnode-id="582" instrument_node="">gasoline</span></a><span data-dcnode-id="580" instrument_node="">, home-heating </span><a class="extlink" data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/petroleum"><span data-dcnode-id="579" instrument_node="">oil</span></a><span data-dcnode-id="577" instrument_node="">, </span><a class="extlink" data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/natural-gas"><span data-dcnode-id="576" instrument_node="">natural gas</span></a><span data-dcnode-id="574" instrument_node="">, and </span><a class="extlink" data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/coal-fossil-fuel"><span data-dcnode-id="573" instrument_node="">coal</span></a><span data-dcnode-id="571" instrument_node="">), a process that contributes to </span><a class="extlink" data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/air-pollution"><span data-dcnode-id="570" instrument_node="">air pollution</span></a><span data-dcnode-id="568" instrument_node=""> and </span><a class="extlink" data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/global-warming"><span data-dcnode-id="567" instrument_node="">global warming</span></a><span data-dcnode-id="565" instrument_node="">. To reach their jobs in the city or other employment areas, many suburban workers must commute by automobile. By the early 21st century the average to-work commute time for Americans was 26.9 minutes, and the bulk of this was done by automobile. In addition, trips to grocery stores or other retail establishments in the suburbs must also be done by automobile. Air pollution produced by gasoline-powered automobiles can combine with other pollutants from industry to form photochemical </span><a class="extlink" data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/smog"><span data-dcnode-id="564" instrument_node="">smog</span></a><span data-dcnode-id="562" instrument_node="">.</span></p><span data-dcnode-id="560" instrument_node="">
</span><div class="wp-block-ugb-count-up ugb-countup ugb-countup--v3 ugb-countup--columns-1 ugb--background-opacity-5" data-dcnode-id="553"><div class="ugb-content-wrapper" data-dcnode-id="554"><div class="ugb-countup__item" data-dcnode-id="555"><div class="ugb-countup__counter" data-dcnode-id="558" data-delay="16" data-duration="1000" style="color: rgb(49, 49, 49); font-size: 40px; font-weight: 400; visibility: visible;"><span data-dcnode-id="559" instrument_node="">26.9</span></div><p class="ugb-countup__description" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">the number of minutes in the average American to-work commute</span></p></div></div></div><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Modern suburban dwellings are typically larger than their counterparts in cities, requiring more energy to heat them in the winter and cool them in the summer. Single-family houses and stand-alone commercial structures can also leak winter heating and summer cooling through multiple exterior walls. In contrast, city apartments not only are typically smaller but also are better able to retain these resources: heating and cooling have greater difficulty escaping because many apartment walls, ceilings, and floors are often shared with neighbouring units.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="548" instrument_node="">Vast areas of impermeable surfaces in built-up areas often replace water-absorbing vegetation and permeable soils. Residential and commercial roofs, roads, and parking spaces for automobiles greatly impede the absorption of water into the soil. Rainwater and snowmelt run off these surfaces and may quickly pool in areas of low elevation, increasing the risk of local </span><a class="extlink" data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/flood"><span data-dcnode-id="547" instrument_node="">flooding</span></a><span data-dcnode-id="545" instrument_node="">. Chemicals present on pavement at the time of rain are often carried with runoff as </span><a class="extlink" data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/water-pollution"><span data-dcnode-id="544" instrument_node="">water pollution</span></a><span data-dcnode-id="542" instrument_node="">, reducing water quality and threatening aquatic </span><a class="extlink" data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/ecosystem"><span data-dcnode-id="541" instrument_node="">ecosystems</span></a><span data-dcnode-id="539" instrument_node=""> downstream.</span></p><span data-dcnode-id="537" instrument_node="">
</span><h3 data-dcnode-id="534"><strong data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Economic costs</span></strong></h3><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Although the phenomenon of urban sprawl contributes greatly to various sectors of the economies of developed countries, there are several economic costs. Many of those costs are passed on to longtime residents of the community or are borne by the public at large. In the United States, current residents of a city or town typically subsidize new construction and infrastructure even before new residents move in. A portion of the tax revenue normally spent on existing neighbourhoods is allocated to the new development. As a result, fewer resources are available to maintain services (such as fire and police protection and the repair of roads and utilities) in older neighbourhoods, and many cities and towns often raise taxes to compensate.</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">After residents move in, they must contend with high transportation costs associated with automobile ownership and endure time-consuming commutes. Surburban residents pay higher energy fees on average than city dwellers. In addition, since homes, stores, workplaces, and schools are dispersed, suburbs pay more for bus transportation for school-age children, road construction and maintenance, and materials used to build infrastructure, such as electrical wire and pipes needed for energy and water delivery.</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="526" instrument_node="">Other economic costs are borne by the public at large. For example, new construction typically occurs on land formerly used for agriculture. As this land is converted to urban use, any new agricultural land must be created at the expense of natural areas (such as </span><a class="extlink" data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/forest"><span data-dcnode-id="525" instrument_node="">forests</span></a><span data-dcnode-id="523" instrument_node="">, </span><a class="extlink" data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/wetland"><span data-dcnode-id="522" instrument_node="">wetlands</span></a><span data-dcnode-id="520" instrument_node="">, and </span><a class="extlink" data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/grassland"><span data-dcnode-id="519" instrument_node="">grasslands</span></a><span data-dcnode-id="517" instrument_node="">). Free </span><a class="extlink" data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/ecosystem-services"><span data-dcnode-id="516" instrument_node="">ecosystem services</span></a><span data-dcnode-id="514" instrument_node=""> (such as flood control and water purification) and natural scenery are often lost or heavily degraded in the process of land conversion.</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">In newly developed urban areas, the practice of Euclidean zoning segregates housing types by size and income, separating wealthy residents from those in the middle and lower classes. Such economic stratification may also occur in older city neighbourhoods as wealthier residents move to newer housing tracts. A period of decay typically ensues: as the tax base erodes, much-needed repairs to roads and utilities are delayed or canceled.</span></p><span data-dcnode-id="509" instrument_node="">
</span><h3 data-dcnode-id="504"><strong data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Community</span></strong><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node=""> costs</span></strong></h3><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Many authorities argue that urban sprawl diminishes the local character of the community. Ubiquitous retail chains with extravagant signage and façades are often the first to move into newly developed areas. Small local businesses are often hidden by the visual noise of larger stores and restaurants or are clustered into strip malls. Smaller stores and restaurants may not be able to outcompete larger businesses or may be forced to close from lost sales due to changes in automobile traffic patterns that favour larger businesses. While residents may be comforted by the presence of familiar establishments, there is often very little in town centres and commercial zones to distinguish one community from the next.</span></p><span data-dcnode-id="500" instrument_node="">
</span><div class="ad-unit ad-leaderboard acf/ad-billboard" data-dcnode-id="481" id="adunit-block_5cb3ed1b31fa5"><span data-dcnode-id="499" instrument_node="">

</span><span data-dcnode-id="496" instrument_node="">
</span><div class="none block-l" data-dcnode-id="491" id="div-gpt-ad-1554214079806-0" style="height:90px; width:728px;"><span data-dcnode-id="495" instrument_node="">
</span><span data-dcnode-id="492" instrument_node="">
</span></div><span data-dcnode-id="490" instrument_node="">
</span><div class="block none-l" data-dcnode-id="485" id="div-gpt-ad-1554214205116-0" style="height:50px; width:320px;"><span data-dcnode-id="489" instrument_node="">
</span><span data-dcnode-id="486" instrument_node="">

</span></div><span data-dcnode-id="482" instrument_node="">
</span></div><span data-dcnode-id="480" instrument_node="">
</span><h2 data-dcnode-id="477"><strong data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Alternatives to urban sprawl</span></strong></h2><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Uncontrolled sprawling development does not occur in all communities. Several communities in Europe and North America have been proactive in combating the effects of urban sprawl. Some have developed urban growth boundaries beyond which construction is prohibited or severely restricted, whereas others limit the influence of urban sprawl through innovative land-use planning techniques or community cooperation.</span></p><span data-dcnode-id="473" instrument_node="">
</span><h3 data-dcnode-id="468"><strong data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Smart growth</span></strong><strong data-dcnode-id="469"><span data-dcnode-id="470" instrument_node=""> communities</span></strong></h3><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Among the many alternatives to urban sprawl, nearly all can be placed under the umbrella of “smart growth” or “New Urbanism.” Smart growth is a management strategy designed to direct the growth of urban areas, whereas New Urbanism focuses on the physical design of communities to create livable and walkable neighbourhoods. In their own ways, both strategies promote economic growth in cities and towns without many of the typical environmental, economic, and community costs associated with urban sprawl.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Advocates of smart growth contend that economic growth can serve the community if it maintains the vitality and distinctiveness of the community and the quality of life for the community’s residents. The movement holds to several principles, and advocates acknowledge that each community must make its own decisions concerning which principles to adhere to or emphasize. The principles of smart growth, which typically include elements of the New Urbanism, are provided below:</span></p><span data-dcnode-id="461" instrument_node="">
</span><ol data-dcnode-id="440"><li data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">An increase in housing opportunities for all.</span></li><li data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">The creation of pedestrian-friendly communities.</span></li><li data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">The encouragement of citizen participation in the community decision-making process.</span></li><li data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">The development of communities that are distinctive and unique.</span></li><li data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">The creation of opportunities that are favourable to the private sector, since private-sector involvement is essential to smart growth.</span></li><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">The integration of a variety of land-use types into the community.</span></li><li data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">The preservation of open space, agricultural areas, historic structures and sites, and environmental resources that provide critical services to the area.</span></li><li data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">An increase in transportation choices.</span></li><li data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">The support of urban development that includes, rather than excludes, existing neighbourhoods.</span></li><li data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">The design and construction of compact homes and businesses that use energy efficiently.</span></li></ol><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="438" instrument_node="">One key tool used by officials of cities and towns employing smart growth principles are urban growth boundaries. Urban growth boundaries involve the drawing of mapped lines that separate areas designated for urban expansion from open space and, beyond that, agriculture. The boundary is typically kept in place for a period of 20 years to encourage development within the city and discourage land speculation and subsequent building construction outside the boundary. The most well-known use of the urban growth boundary occurs in </span><a class="extlink" data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Portland-Oregon"><span data-dcnode-id="437" instrument_node="">Portland</span></a><span data-dcnode-id="435" instrument_node="">, Oregon. The boundary was put in place in 1979. Although Portland’s population increased by 50 percent between 1973 and 2008, new construction was contained within the urban growth boundary. Since that time the city centre has undergone extensive renovation and revitalization, and most areas within the boundary are served by an efficient </span><a class="extlink" data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/mass-transit"><span data-dcnode-id="434" instrument_node="">mass transit</span></a><span data-dcnode-id="432" instrument_node=""> system and </span><a class="extlink" data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/bicycle"><span data-dcnode-id="431" instrument_node="">bicycle</span></a><span data-dcnode-id="429" instrument_node=""> trails.</span></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="426" instrument_node="">Opponents of smart growth maintain that communities adopting its principles risk exacerbating existing road-congestion problems, unnecessarily burdening mass transit where it is already overused, and prohibitively increasing the operating costs for the private sector, which could induce businesses to relocate to areas governed by more growth-friendly rules. Some opponents say that smart growth does not solve the problem of sprawl, because cities and suburbs must eventually expand to serve rising local populations. If anything, smart growth slows urban sprawl, but it does not stop it where such policies are in place. Other opponents of smart growth maintain that the focus on medium- to high-density developments actually reduces </span><a class="extlink" data-dcnode-id="424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/biodiversity"><span data-dcnode-id="425" instrument_node="">biodiversity</span></a><span data-dcnode-id="423" instrument_node=""> in developed areas because all the land is given over to concentrated human uses.</span></p><span data-dcnode-id="421" instrument_node="">
</span><h3 data-dcnode-id="418"><strong data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Transit villages</span></strong></h3><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="409"><span data-dcnode-id="416" instrument_node="">Transit villages, whose residential and commercial areas are built around and served by mass transit networks, might also be linked with the smart growth movement. Before the widespread use of the automobile in the United States and other countries, mass transit, often in the form of </span><a class="extlink" data-dcnode-id="414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/streetcar"><span data-dcnode-id="415" instrument_node="">streetcars</span></a><span data-dcnode-id="413" instrument_node=""> powered by electricity, transported people within urban areas. Transit villages resurrect this old idea by rising up astride existing mass transit lines. They are attractive to </span><a class="extlink" data-dcnode-id="411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/environmentalism"><span data-dcnode-id="412" instrument_node="">environmentalists</span></a><span data-dcnode-id="410" instrument_node=""> because they encourage the construction of high-density developments that reduce reliance on private automobiles. The U.S. state of New Jersey has constructed several transit villages since the late 1990s.</span></p><span data-dcnode-id="408" instrument_node="">
</span><h3 data-dcnode-id="405"><strong data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Ecovillages and conservation developments</span></strong></h3><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Ecovillages are similar to transit villages. However, they may or may not be served by mass transit. Instead, residents needing to commute to nearby towns and suburbs participate in carpool and ride-share programs. Ecovillages are also characterized by politically involved residents who cooperate with one another to maintain the ecological sustainability of the village. They are often supplied with locally grown foods from nearby farms.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">In contrast, conservation developments typically involve individual residential tracts or neighbourhoods set within typical cities and suburbs. These developments may be centred on a particular natural feature or set of features to emphasize the interdependence between humans and the natural environment.</span></p><span data-dcnode-id="398" instrument_node="">
