10.3.4 Does crime-prevention spending actually reduce crime?
As the preceding discussion showed, a fundamental assumption in
the economic theory of crime is that the amount of crime falls as expen-
ditures on crime prevention rise. Although this assumption seems
uncontroversial, empirical evidence supporting it has been hard to
generate. Over the years, many studies have shown no effect of police
spending on crime, or a counterintuitive positive association. The
problem, however, was failure to account for the endogeneity of
such spending. In other words, cities will put lots of police into crime-
prone areas as they attempt to reduce crime, which can generate a
positive rather than a negative correlation between crime and police
presence.
   Steven Levitt (1997) was the ﬁrst to control for this endogeneity. He
did so by recognizing that police spending rises before elections as
incumbent politicians, seeking to improve their reelection chances, try
to reduce crime. Levitt used data on the timing of elections to isolate
the part of police spending that isn’t a response to fundamental crime
levels. Levitt found that spending on police, measured in this way, does
indeed lead to the expected reduction in crime.
   Levitt (2004) also attempts to isolate the factors underlying the
decline in crime that has occurred in the United States over the last
20 years. He identiﬁes several factors already captured in the model
as helping to explain the decline in crime between 1990 and 2000.
One factor is an increase in the sizes of police forces. Two others
are the increase in the capacity of prisons and the increase in the
number of inmates. As was seen above, these factors are captured
in the model by increases in the apprehension probability a and
the incarceration cost J. Levitt argues that neither gun control (which
raises e) nor an improvement in the labor market (which would raise
the legitimate-income curve in ﬁgure 10.3) has been an important
factor. But he makes the controversial claim that legalization of abor-
tion in the 1970s helped reduce crime 20 years later. He argues that,
with fewer unwanted babies coming of age, the young adult popula-
tion in the 1990s was better adjusted socially and thus better able to
earn income in legitimate activities. This change can be represented by
an upward shift in the legitimate-income curve in ﬁgure 10.3, which
reduces crime.

10.4 How to Divide a Police Force Between Rich and Poor
Neighborhoods

10.4.1 Basics
It was argued in chapter 8 that one important feature of public goods
is their uniform provision to all residents of a jurisdiction. Although
the nature of some public goods (national defense, for example) makes
it impossible to provide a higher level to some people than to others,
many public goods can be provided unequally. Crime prevention is one
such good. Even though cities try to provide a level of police protection
that is fairly uniform across neighborhoods, it is possible in principle
to withhold police from one neighborhood while providing frequent
police patrols in other neighborhoods. In view of this possibility, it is
interesting to study the police allocation problem in some detail,
drawing on elements of the economic theory of crime.5
    Suppose that a city consists of two neighborhoods, one rich and one
poor, and that these neighborhoods are equal in population. The city
has a ﬁxed total number of police, P, who can be divided between the
two neighborhoods in any fashion. If Pr and Pp denote the number of
police in the rich and the poor neighborhood, respectively, it follows
that Pr + Pp = P. The question of interest is how to allocate the police
between the neighborhoods.
    To allow a simple analysis, suppose that all crime in a neighborhood
is “internal”—that is, crimes are committed by residents of the neigh-
borhood against other neighborhood residents. Thus, in the poor
neighborhood, crimes involve poor criminals attacking poor victims,
and in the rich neighborhood, crimes involve rich criminals attacking
rich victims. This pattern rules out the case where poor criminals
commit crimes (such as house burglary) in the rich neighborhood.
Without this kind of crossover crime, what kind of crimes will occur
in the rich neighborhood? These crimes, where rich criminals prey on
rich victims, might consist of offenses like teenage vandalism and bank
embezzlement. The poor neighborhood’s crimes probably will include
armed robberies, drug-related killings, and other more serious offenses.
Although some “crossover crimes” occur in the real world, the internal-
crime assumption isn’t grossly unrealistic.
    With crime internal to a neighborhood, its level of crime depends
only on the number of police allocated to that neighborhood. It is thus

sense that the neighborhoods enjoy the same “opportunity” for protec-

police must be allocated to the poor neighborhood to equalize crime.
Conversely, equal opportunities yield unequal outcomes, since an equal
division of the police leads to more crime in the poor neighborhood.
   The choice between equal opportunities and equal outcomes is often
faced in discussions of public policy. For example, afﬁrmative-action
rules, which give minority job applicants an advantage in hiring, rep-
resent an attempt to generate equal outcomes via unequal opportuni-
ties. Liberals and conservatives have argued for decades about whether
society should attempt to offer equal outcomes or equal opportunities
(with liberals tending to favor the former), but there is no right answer
in this debate.

approach is to allocate the police using some measure of social welfare.
Total crime is a natural welfare measure, and in this case, the goal

10.5    Summary

The economic theory of crime depicts individuals as choosing between
criminal activity and legitimate employment to secure the best income.
Disadvantaged individuals, who would earn low incomes in legitimate
employment, thus tend to become criminals. Therefore, the number
of criminals in a city grows as the disadvantaged population rises,
and it falls with an increase in crime-prevention spending (which
reduces criminals’ incomes). When congestion effects are added to both
the criminal and police sides of the model, the possibility of multiple

11.1   Introduction

Amenity effects play a prominent role in popular discussions of real-
estate markets in the United States. For example, it is often argued that
the high housing prices on the West Coast are due in part to amenity
advantages, including a temperate climate and ocean access. More
generally, many commentators seem to view any West-Coast or East-
Coast location as superior to one in the interior of the country, thereby
justifying a bicoastal housing-price premium.
   The claim that the coasts are superior might be challenged by many
Americans, especially those happily living in the nation’s heartland.
But if the claim is granted, its implications for variation in the price of
housing would seem to be logical, relying on a compensating-
differential argument like that developed in chapter 2. In other words,
consumers living in a desirable region must pay for the privilege with
higher housing costs, while those residing in undesirable places must
be compensated via cheaper real estate. Housing prices would thus
appear to be a direct indicator of the quality of life in a region. Compar-
ing the prices of a standardized house (same square footage, lot size,
and so on) in two different regions would indicate which region is a
nicer place to live.
   Although this logic is appealing, the conclusion is premature. The
reason is that compensation in an interregional context can occur on
more dimensions than within a single city, where housing prices must
do all the work. To understand this point, recall that in the basic urban
model of chapter 2, in which everyone earned the same income, price
differences served to compensate for locational disadvantages (high
commuting costs in the suburbs). But since incomes can differ from
city to city, housing prices by themselves need not do all the work in
f232                                                                           Chapter 11



compensating for amenity differences across cities. Both housing prices
and incomes can vary to compensate consumers for intercity or inter-
regional differences in the quality of life.
   Once this possibility is admitted, the simple logic from above appears
to unravel. Although it was argued that housing should be expensive
in nice places, couldn’t incomes be the compensating factor? In other
words, couldn’t high-amenity regions instead have low incomes, which
would cancel their amenity beneﬁts and leave consumers equally well
off in all places? Without additional information, the answer is unclear.
   The key to resolving this ambiguity is to recognize that interregional
differences in real-estate prices and incomes affect economic agents
other than consumers. In particular, business ﬁrms care about real-
estate prices, which reﬂect the cost of an important input, ﬂoor space,
and ﬁrm costs also depend on consumer incomes, which represent the
cost of labor. As was seen in chapter 2, compensating differentials serve
to equate proﬁts across locations within a single city (recall low subur-
ban land rents). Thus, in an interregional context, variation in real-estate
prices and incomes should equalize ﬁrm proﬁts across regions while
also ensuring that consumers are equally well off everywhere.
   As will be seen below, this double compensation requirement is suf-
ﬁcient to pin down the theoretically permissible variations in housing
prices and incomes across regions with differing amenities, eliminating
the ambiguity identiﬁed above. One possible pattern is intuitively sen-
sible: A high-amenity region should have both high housing prices and
low incomes, so that both compensating factors work in tandem. But
other patterns are also theoretically possible. The analysis of these
patterns, presented in section 11.2, follows the seminal 1982 paper of
Jennifer Roback.
   Once it is recognized that both regional housing prices and incomes
are likely to vary with amenities, an obvious market-based measure of
the quality of life is no longer apparent. Housing prices no longer may
be a perfect indicator of the desirability of a location since incomes are
varying as well. The question, then, is how to use market information
to determine which places are nicest. The theoretical answer is pro-
vided by Roback (1982) and implemented by Blomquist, Berger, and
Hoehn (1988) and others. Section 11.3 discusses this approach and
presents the actual quality-of-life ranking that it generates.1 Section 11.4
discusses additional issues.

11.2   Theory: The Roback Model

11.2.1 Consumer analysis
In the urban model of chapter 2, consumer utility depended on con-
sumption of bread and housing, denoted by c and q. When the focus
is extended to include urban amenities, the utility function also depends
on an amenity variable, denoted by a. Although a will generally be a
vector, including average temperature, rainfall, crime, and other vari-
ables, it will be treated as a single index for simplicity in developing
the amenity model.
    In a given location, consumers will choose c and q to maximize
utility, now written as u(c, q, a). The utility level they achieve will
depend on the income they earn (y), on the price they pay per square
foot of housing (p), and on the amenity level. This dependence is sum-
marized in an “indirect utility function,” written as V(y, p, a). Since the
achieved utility level is high when income is high but low when
the housing price is high, the V function is increasing in y and decreas-
ing in p. If amenities are measured positively (capturing, for example,
the pleasantness rather than unpleasantness of the climate), the indirect
utility function is increasing in a.
    As in the urban model of chapter 2, a fundamental equilibrium
requirement is that consumers be equally well off in all locations. If this
requirement did not hold, consumers would move to locations offering
higher utility, bidding up housing prices or pushing down incomes
until utilities are equalized everywhere. With u denoting the uniform
utility level, the equal-utility requirement is written V(y, p, a) = u.
    As an illustration of the compensating-differential argument made
in the introductory section, suppose that incomes were somehow con-
strained to be equal in all locations. Then the housing price p would
have to do all the work in equalizing utilities between high-amenity
and low-amenity places. Since a higher a raises utility (as given by
the V function) whereas a higher p lowers it, a price increase of just the
right amount will keep V(y, p, a) constant between high-amenity and
low-amenity locations, ensuring that utility equals u in both places. But
the incomes will not necessarily be the same in the two locations, so
further investigation is needed.
    A useful tool in this investigation is a type of indifference curve,
which shows the different combinations of p and y that yield the same
utility, conditional on a given amenity level. Figure 11.1 shows two
such indifference curves. The lower curve corresponds to amenity level

11.2.2 Firm analysis
As was explained above, compensating differentials must also ensure
that ﬁrm proﬁts are equal across locations. To formalize this notion,
suppose that ﬁrms in the economy produce bread, the non-housing
commodity. As inputs, these ﬁrms use labor and “real estate,” which
corresponds to the ﬂoor space contained in factories and ofﬁces. Other
inputs could be used as well, but as long as their prices are the same
in all regions, these inputs can be ignored.
    Although consumers were portrayed as consuming housing, it is
useful to think of this commodity more generally as real estate, match-
ing the nature of the ﬁrm’s input. Thus, the analysis will portray both
ﬁrms and individuals as consuming real estate, with the difference
between residential and business real estate ignored for simplicity. As
a result, the price p should now be viewed as the price per square foot
of real estate, which is common across residential and business uses.
    With ﬁrms using labor and real estate as inputs, their costs depend
on the prices of these inputs, p and y. As was noted above, the con-
sumer income y also represents the cost of labor to ﬁrms. If bread
production occurs with constant returns to scale, then the cost per unit
of output is the same no matter how much bread a ﬁrm produces, and
it is given by the unit cost function C(y, p, a). Since higher input prices
raise costs, this cost function is increasing in both y and p.
    The appearance of a in the cost function indicates that costs also may
depend on amenities. To see how such a dependence may arise, con-
sider crime (or its inverse, public safety) as an amenity. Consumers
value public safety, but a safer city also reduces ﬁrm costs by reducing
the need for security guards and other crime-prevention measures. In
this case, the cost function would be decreasing in a, the level of public
safety. Firm costs might also depend on climate amenities. For example,
a ﬁrm located in a temperate climate could spend less on heating and
cooling for its ofﬁces and factories, so that the cost function would
again be decreasing in a, a measure of climate pleasantness. Although
it is harder to visualize cases in which costs rise with amenities, some
kinds of agricultural production might exhibit such a relationship. For
example, certain crops that beneﬁt from hot and humid conditions
would be more expensive (or impossible) to grow in more temperate
climates. A ﬁnal possibility is that costs are entirely independent of
f236                                                                   Chapter 11



amenities. For example, if the only relevant amenity were ocean access,
then as long a ﬁrm doesn’t rely on ocean shipping, there is no reason
for costs to depend on the ocean amenity.
   For ﬁrm proﬁts to be the same (equal to zero) in all locations, the
unit cost C(y, p, a) must equal the price of a unit of the bread output.
Since this price is normalized to 1, as in the urban model, the zero-proﬁt
condition is written C(y, p, a) = 1. This condition generates iso-proﬁt
curves, which are analogous to the consumer indifference curves from
ﬁgure 11.1. An iso-proﬁt curve shows, for a given amenity level, the
combinations of y and p that yield zero proﬁt.
   Iso-proﬁt curves are downward sloping, and ﬁgure 11.2 shows three
such curves. To see the reason for their negative slope, consider the
middle curve, which has a = a0, and start at the point where y = y' and
p = p'. If y were to increase, then the ﬁrm’s costs would rise, reducing

the zero proﬁt level, the real-estate price p would have to fall. Since a
higher y thus must be accompanied by a lower p, the iso-proﬁt curve
must be downward sloping.
   Now consider how a change in the amenity level affects the position
of the iso-proﬁt curve. Suppose that costs fall as the amenity level rises,

11.3   Measuring Urban Quality of Life

When amenities have little or no effect on ﬁrm costs, either real-estate
prices or incomes can be used as an indicator of quality of life from the
consumer ’s point of view. High real-estate prices would indicate the
places that are nicest to live, as would low incomes. But since the con-
nections between quality of life and real-estate prices and incomes can
be ambiguous when ﬁrm costs are strongly linked to amenities, neither
of these variables can be generally used with conﬁdence as an unam-
biguous indicator of quality of life. How, then, can market data be used
to identify the most desirable regions from the point of view of
consumers?
   Roback (1982) shows how, and her method is used by Blomquist
et al. (1988) and other researchers to measure urban quality of life.
The method ﬁrst recognizes that consumers care about many kinds
of amenities. The above model abstracted from this fact, but incorporat-
ing multiple amenities has no effect on the preceding analysis. Next,
Roback’s method assumes that amenities enter consumer utility
in a simple linear fashion. The utility function thus includes the
expression ∑ i=1 β i a i , where ai is the level of amenity i, βi is the marginal
               m


valuation of that amenity, and m is the total number of different
amenities. This weighted sum captures the contribution of amenities
to consumer utility, and it therefore constitutes a measure of quality
of life.

    The procedure for estimating the marginal valuations of amenities
is, unfortunately, somewhat complicated. The ﬁrst step is to run two
regressions, the ﬁrst of which relates housing prices in different regions
to regional amenity levels as well as to housing characteristics. This is
just a hedonic price regression like those discussed in chapter 6.3 The
second regression, known as a “hedonic wage equation,” relates
incomes for individual workers to the characteristics of the workers
(age, education, experience, and so on) and to the amenity levels in the
regions where they live. Note that, because the ﬁrst regression shows
the connection between real-estate prices and amenities and the second
shows the connection between incomes and amenities, the regressions
capture the kinds of patterns illustrated in ﬁgures 11.3–11.5. Also, since
the hedonic wage regression includes personal characteristics, it real-

thus earn different incomes, in contrast to model’s assumption of a
common y. The second and ﬁnal step in the procedure is to plug the
estimated amenity coefﬁcients from these two regressions into a par-
ticular formula, which then gives the β̂i values.

11.4   Additional Issues

11.4.1 Firms’ valuations of amen</span><span data-dcnode-id="134" instrument_node="">ities
The empirical procedure outlined above reveals consumer valuations
of amenities and generates quality-of-life rankings. But, amenities may
also affect ﬁrm proﬁts, and these effects could be used to generate an
analogous ranking of metropolitan areas from the perspective of ﬁrms.
   The procedure differs from the procedure for determining consumer
valuations only in the second step. The ﬁrst step again involves running
a hedonic wage regression and a hedonic regression of real-estate
prices, with the prices of business properties, rather than houses, now
the dependent variable. The estimated amenity coefﬁcients from these
regressions are again plugged into a formula, although a different one
than in the consumer case. The results give the marginal valuation of
amenities from the ﬁrm’s point of view (that is, the effect of amenities
on proﬁts). By applying these marginal valuations to existing amenity
levels, metropolitan areas can then be ranked from the perspective of
ﬁrms.
   In addition to generating quality-of-life rankings, Rosenthal and
Gabriel (2004) carry out an empirical exercise that is effectively equiva-

5. In addition to capturing amenities, Gabriel and Rosenthal’s ﬁxed effects capture addi-
tional unmeasured city characteristics that may account for the difference between their
ranking and that of Blomquist et al. (1988).
fUrban Quality-of-Life Measurement                                    245



lent to the procedure just explained, and they ﬁnd that the ranking of
metropolitan areas by ﬁrms is very different from the ranking by con-
sumers (reproduced here in table 11.1). This ﬁnding suggests that the
effects of amenities on consumer utilities and ﬁrm proﬁts are often not
in the same direction.

11.4.2 Amenities and migration
The model considered so far is an equilibrium model. It assumes that
consumer utilities and ﬁrm proﬁts are equalized in all locations. This
assumption may not be true in the real-world economy, which could
be in a disequilibrium state, with utilities or proﬁts higher in some
locations than in others. In such a situation, the economy will tend to
move toward equilibrium, with economic agents migrating toward
those locations that offer superior prospects. Consumer migration, in
particular, could lead to population ﬂows toward high-amenity regions,
where housing prices and incomes may not yet have adjusted so as to
cancel their amenity advantages. From studying regional population
growth in the period 1970–2000, Jordan Rappaport (2007) concludes
that migration did indeed ﬂow toward regions with nice weather.

11.5   Summary

Housing prices are often viewed as an indicator of a region’s quality
of life, but compensating differentials can also work along the income
dimension, with both prices and incomes varying to make consumers
equally well off in all locations. Once this additional dimension is rec-
ognized, an additional equilibrium condition (equal proﬁts for ﬁrms)
must be introduced to pin down the possible patterns of housing prices
and incomes across regions with different amenities. If the effect of
amenities on ﬁrm costs is small, then regions with desirable amenities
will have both high housing prices and low incomes. The empirical link
between amenities, prices, and incomes can be used to estimate con-
sumer valuations of amenities, and these valuations can then be used
to produce quality-of-life rankings. A similar procedure allows regions
to be ranked from the perspective of ﬁrms.
