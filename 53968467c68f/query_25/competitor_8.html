4.3   Market Failures and Urban Sprawl

4.3.1 The market failure related to open-space amenities
Urban economists have identiﬁed several market failures that may be
relevant to urban sprawl. The ﬁrst involves the amenity beneﬁts gener-
ated by open space, which are lost when this space is consumed by
urban development. Suppose, in particular, that each acre of agricul-
tural land yields b dollars of open-space beneﬁts to society, over and
above the beneﬁts resulting from the crops it produces. The problem is
that these open-space beneﬁts aren’t taken into account when the land
is converted from agricultural to urban use. Whereas the landowner
will rent his land to housing developers when the urban land rent r
they pay exceeds the rent rA paid by the farmer, society would make a
different calculation in the presence of open-space amenities. In par-
ticular, society (represented by a “social planner”) would want the
landowner to take the lost open-space beneﬁt of b into account when
deciding whether to switch an acre of land to urban use. The planner
would want the land switched only if the urban rent could compensate
for both the lost agriculture-rent income and the lost open-space
beneﬁts. Thus, the planner would want the land in urban use only if
r ≥ rA + b. From the planner ’s point of view, the boundary of the city
should be set at an x value where r = rA + b, not an x value where r = rA.
   In effect, the socially optimal city is the city that would emerge if the
agricultural rent were rA + b, not rA. This “effective” agricultural rent
includes the open-space beneﬁt generated by the land in addition to
the beneﬁt from its agricultural use, as measured by rA. The resulting
city is shown in ﬁgure 4.1, which is similar to ﬁgure 2.13. The higher
“effective” agricultural rent leads to all the effects discussed earlier,
including an upward shift in the urban land-rent curve and a decrease
in x . This latter effect provides the crucial conclusion: In the presence of
an open-space amenity, the socially optimal city is spatially smaller than the
city generated by the free-market equilibrium. Therefore, the free-market
city takes up too much space, exactly as the critics of urban sprawl
allege.
   What policy intervention could society carry out in order to ﬁx this
market failure? One possibility would be to use the price system, in the
form of a tax on developed land. Suppose that the landowner has to
pay a tax of b to the government on each acre of developed land that
he rents to a housing developer. Then, the landowner ’s net income

4.3.2 The market failure related to trafﬁc congestion
A second market failure relevant to urban sprawl is related to trafﬁc
congestion, and its source is the “congestion externality.” This external-
ity arises because the presence of a single extra car on a congested road
slows down all the other cars slightly, raising the time costs of com-
muting for their drivers. Even though each driver ’s loss is small,
summing these cost increases across all the affected drivers leads to a
total impact that is non-negligible. The problem is that, since these
congestion costs are felt by other drivers, no individual driver has an
incentive to take them into account in making decisions. The upshot is
that the private cost of commuting, which includes an individual’s own
time and money costs, is less than the social cost. This latter cost
includes the private-cost elements plus the externality damage done to
other drivers in the form of higher time costs resulting from the presence of
the extra car. To correct for the presence of this externality (and the
resulting market failure), commuters should be charged a congestion
toll equal to the dollar value of the congestion costs they impose on
other drivers. When this toll is charged, the commuting choices of
consumers will be better from society’s point of view than in the
absence of tolls.
   Chapter 5 will present a full analysis of congestion tolls and their
consequences in a non-spatial model. For present purposes, the goal is
to understand how the imposition of congestion tolls, which corrects
f76                                                                     Chapter 4



the congestion externality and eliminates the resulting market failure,
affects urban spatial structure. The answer is that the imposition of
tolls, by raising the cost of commuting, leads to a spatial shrinkage of
the city (a decline in x). In response to the higher cost of accessing the
central business district, urban residents choose to make shorter trips
on average, moving closer to the center. Since congestion tolls, by cor-
recting the market failure, lead to a socially optimal outcome, it follows
that the city’s spatial size in the free-market equilibrium, without tolls, is too
large. Thus, the free-market city again takes up too much space, exactly
as the critics of sprawl allege.
   The decline in x with congestion tolls is similar to the impact of
an increase in t in the urban model from chapter 2. However, it is
important to note that the earlier model doesn’t actually incorporate
trafﬁc congestion. If congestion were present, commuting cost per mile
t wouldn’t be a ﬁxed constant but would instead increase along with
the population L of the city. The reason is that trafﬁc volumes would
rise with L, clogging the city’s streets. In addition, the presence of
congestion would mean that the cost of commuting a mile near the
city center, where streets are highly congested, would be higher than
the cost in the less congested suburbs, so that t would depend on dis-
tance x.
   Urban models with congestion have been analyzed extensively,
however, and the qualitative effect of imposing congestion tolls in these
models is very similar to the effect of raising t in a model without
congestion. Tolls would be levied (perhaps electronically) for each mile
of travel, and the toll per mile would increase as the CBD was
approached, reﬂecting greater central congestion. In response, popula-
tion would shift toward the center, the land-rent curve would rotate
(as in ﬁgure 2.14), and x would fall.
   Unlike in the case of open-space amenities, there can be little dis-
agreement about the importance of the congestion-related market
failure and its effect on urban land areas. After careful study, congestion
tolls on the order of $0.17 per mile have been proposed by transporta-
tion economists.5 Mathematical analysis of urban models with trafﬁc
congestion shows that, when appropriate tolls are charged, x decreases
by approximately 10 percent, and population densities rise dramati-
cally near the city center.6

4.3.3 Other distortions affecting urban land areas
A number of other distortions, which may not be best described as
market failures, can also affect the urban land areas. These distortions
arise from the actions of governments, which means that they could be
called government failures rather than market failures.
   The ﬁrst such distortion is related to the ﬁnancing of urban infrastruc-
ture, such as streets, sewers, parks, and schools. To understand this
distortion, note ﬁrst that the provision of some types of infrastructure
may be subject to decreasing returns to scale. For example, extending
sewer lines farther and farther from the city center as suburbs expand
may entail increasing costs, with the lines and related pumping equip-
ment more expensive to build far from the center than closer in, given
the greater distance from sewage-treatment plants. Historically, these
higher costs were shared among all the city’s residents, with suburban
households not penalized for being more costly to serve. In particular,
infrastructure costs were paid through property taxes, and the city’s
property tax rate was raised slightly when taxes on new suburban houses
were insufﬁcient to pay the high infrastructure costs associated with
those houses. With the higher tax rate, the existing residents helped pay
for the cost of servicing the new suburban houses. As a consequence of
this cost sharing, the new suburban residents did not have to pay the
true “marginal cost” of providing infrastructure to their houses. As a
consequence, the cost of occupying a suburban house (inclusive of taxes)
would look artiﬁcially cheap to new residents, encouraging growth of
the suburbs. If the tax system instead made the new residents face the
true infrastructure costs associated with their houses, suburban growth

infrastructure, which encourages excessive urban expansion.
   In fact, taxation practices in many localities have changed in recent
years in a way that eliminates or reduces this underpricing distortion.
The change involves adoption of “impact fees,” which require housing
developers to pay directly for the cost of the infrastructure required by
their developments. Developers might pay a road impact fee or a
school impact fee, with the revenue used to cover the cost of roads and
schools that the government must build. Since these costs are passed
on to home buyers, they show up in a higher selling price for the house
rather than in property tax payments. But the ultimate effect is the
same: new suburban residents are charged for the marginal cost of
serving them. The use of impact fees, although not universal, tends to
eliminate the infrastructure-underpricing distortion, thus restraining
the excessive spatial growth of cities.
   Three other government ﬁnancial practices also affect urban land
areas. The ﬁrst effect operates through the federal income tax system,
which creates a “tax subsidy” to homeownership. As will be discussed
in more detail in chapter 6, this tax subsidy reduces the cost of home-
ownership for high-income households, encouraging large dwelling
sizes. Big houses in turn use lots of land, which causes cities to take up
more space than they would in the absence of a tax subsidy to home-
ownership. The second ﬁnancial practice is the subsidization of auto-
mobile transportation. This subsidy arises because gasoline taxes aren’t
high enough to cover the full cost of building and maintaining roads.
As a result, driving is artiﬁcially cheap (with t too low), and urban
residents do too much of it. The result is excessively long commute
trips and cities that are more spread out than they would be in the
absence of a subsidy, as was illustrated in ﬁgure 2.14. Public transit is
also subsidized, but these subsidies can be partly justiﬁed on grounds
of economic efﬁciency (which would require transit users to pay only
the low marginal cost of serving them). A third government ﬁnancial
practice works in the opposite direction, tending to restrict urban land
areas. This practice involves government policies toward agriculture,
which bolster farmers’ incomes through crop price supports and other
programs. By making farming more proﬁtable than it would otherwise
be, these policies allow farmers to pay higher land rents than would
be possible in their absence. Since a higher rA leads to a smaller urban
land area from the analysis in chapter 2 (recall ﬁgure 2.13), it follows

that cities are more compact than they would be in the absence of favor-

4.3.4 Sprawl and blight
As was mentioned above, critics of sprawl allege that excessive urban
spatial expansion depresses the incentive for redevelopment of down-
town areas, leading to decay and blight. Since the basic urban model
doesn’t recognize the deterioration of buildings as they age, it cannot
address this claim. However, using an extended version of the model
in which the extent of building maintenance is a decision variable of
housing developers, Brueckner and Helsley (2011) conﬁrm the connec-
tion between sprawl and blight. They show that the market failures
leading to sprawl also generate under-maintenance of buildings in the
central city. When sprawl remedies such as a development tax or con-
gestion tolls are imposed, the city becomes more compact and its
central-city buildings are revitalized, conﬁrming the allegations of the
sprawl critics.
   Others have argued that higher-income households move to the
suburbs to escape urban blight. From this perspective, blight causes
sprawl rather than vice versa. Each of these views probably contains
elements of truth.9

4.3.5 Scattered development and sprawl
So far, sprawl has been viewed as a problem of too much land being
devoted to housing, leading to a city that is too spread out. But many
commentators equate sprawl with the phenomenon of scattered devel-
opment, which leaves many areas of undeveloped land within the
outer boundaries of the city. Although scattered development may not
make the amount of land devoted to housing too large, critics argue
that it wastes resources by failing to generate compact cities.
   Scattered development poses a puzzle since it appears to raise com-
muting costs relative to compact development, an outcome that
consumers would seem not to favor. However, explicitly dynamic
models of cities, which put the model of chapter 2 into an intertemporal
context, show that housing developers may wish to leave some interior
land vacant as a city grows. Such land is reserved for later development
at high densities once future residents arrive, an outcome that can
be socially optimal. Despite this conclusion, criticisms of scattered

4.4   Behavioral Impacts of Urban Sprawl

Critics of sprawl allege that low-density suburban living puts distance
between people and makes them less likely to form friendships and to
engage in social activities. With their high population densities, central
cities instead put people in close proximity, thus (it is argued) stimulat-
ing interaction. Brueckner and Largey (2008) show that these claims are
exactly backward. They provide empirical evidence that social interac-
tion is higher, not lower, in less dense areas. They use a variety of
interaction measures from a national survey that indicate whether
people talk to their neighbors, belong to social clubs, and so on. For
most measures, interaction falls as density rises, indicating that there is
more interaction in the low-density suburbs than in central cities. Thus,
urban sprawl appears to promote, rather retard, social interaction.
   On the obesity question, the expectation is that automobile-reliant
suburban living promotes a sedentary lifestyle, contributing to obesity.
Central-city residents, in contrast, may walk more, and the resulting
exercise is expected to help maintain a proper weight. The expected
association between suburbanization and obesity is conﬁrmed by a
number of studies, but Eid et al. (2008) argue that self-selection may
drive the ﬁndings, with people who would be obese anyway tending
to choose suburban locations (perhaps because walking can be avoided).
They control for self-selection by focusing on individuals who moved
between central cities and suburbs, measuring their weight change.
The results show no impact of such a move, indicating that suburban
living has no causal effect on obesity.
   Thus, these two studies suggest that both of the alleged behavioral
impacts of urban sprawl are absent in the data.

4.5   Using Land-Use Controls to Attack Urban Sprawl

4.5.1 Urban growth boundaries and sprawl
The discussion in section 4.3 showed that two price-based instruments
can be used to address urban sprawl. The ﬁrst of these instruments

sprawl with scattered development.
fUrban Sprawl and Land-Use Controls                                         81



was a development tax, designed to correct the market failure associ-
ated with open-space amenities. The second was a congestion toll,
designed to correct the market failure associated with the congestion
externality.
   An alternative anti-sprawl instrument is quantity-based rather than
price-based, and it is known as an urban growth boundary (UGB). A
UGB attacks a symptom of sprawl (excessive spatial expansion), rather
than its root cause, by restricting the quantity of land that may be con-
verted to urban use. In terms of the model, a UGB imposes an upper
limit on x , the distance to the edge of the city, prohibiting development
beyond this limit.
   If properly set, a UGB has exactly the same effect as a development
tax. In ﬁgure 4.1, the socially optimal size of the city is x1, and it results
from imposing a development tax of b per acre. But the same outcome
could be generated by dropping the tax and instead imposing a UGB
that prevents development outside x1. The resulting boundary of the
city is obviously the same as under the tax, and exactly the same
upward shift in the urban land-rent curve occurs (leading to identical
urban spatial structures under the two instruments).
   UGBs are in place in a number of U.S. cities, the most famous
example being in Portland, Oregon. Since UGBs are easy to implement,
they tend to be preferred over development taxes and other price-based
instruments. But the use of a UGB involves the same pitfall as a devel-
opment tax used to preserve open space: potentially excessive restric-
tion of urban land areas. In other words, zealous policy makers,
believing that their city will tend to expand far too much, could impose
a draconian UGB that greatly restricts its land area. But if the average
consumer sees no beneﬁt from the preservation of open space, the
increase in density and living costs generated by the UGB represents a
pure loss, with no offsetting beneﬁt. Therefore, UGBs should be imposed
with great caution, recognizing the large downside from unwarranted
restriction of urban land areas.
   Is a UGB a good instrument for attacking the sprawl that results
from the congestion-related market failure? The answer might seem to
be afﬁrmative, since this market failure again leads to excessive spatial
expansion, a symptom that the UGB treats. But the UGB is in fact a
poor substitute for a congestion toll, as was shown by Brueckner (2007).
The problem is that the UGB treats one symptom without leading to
other needed adjustments in spatial structure. In particular, the UGB
tends to increase density throughout the city rather than causing a
f82                                                                            Chapter 4



substantial shift of population toward the center. This shift is socially
desirable given the congestion phenomenon, and a congestion toll
achieves it whereas a UGB doesn’t, even though it can shrink the city’s
land area. Thus, although the UGB is equivalent to a price-based
remedy in the case of the open-space market failure, this equivalence
doesn’t carry over to the congestion case.

4.5.2 Another motive for imposing a UGB
Although UGBs can be used to address market failures, other less noble
motives may lead to their adoption. These motives are explored in a
large body of research on “urban growth controls,” which suggests that
landowners have an incentive to restrict the supply of housing in a
city.11 A supply restriction drives up the price of land, conferring capital
gains on those who own it, while hurting renters, who pay a higher
price for their housing. This view suggests that UGBs might be imposed
even in the absence of a concern about sprawl, reﬂecting the power of
property owners to engineer policies for self-enrichment.
   To analyze this motive, recall that landowners in the urban model
are assumed to live outside the city. They live, say, in Florida, getting
their land-rent checks in the mail. This assumption is obviously unre-
alistic, but it allows a simple analysis. A more complicated model in
which the landowners live in the city can be constructed, and it has the
basically same message regarding the motive for imposing a UGB.

imposed. Landowners thus gain from imposing the UGB, and they

4.6   Other Types of Land-Use Controls

4.6.1 Building-height and density restrictions
A number of cities around the world have imposed building-height
restrictions. In the United States, the most prominent example is Wash-
ington, where no building in the District of Columbia portion of the
metro area can be taller than the U.S. Capitol. Another example is Paris,
where tall buildings are generally prohibited in the central city, although
a few high-rises exist as a result of past exceptions to the rule. A less
well-known case involves the Indian cities of Mumbai and Bangalore,
which have developed under tight height restrictions. Whereas the
Washington and Paris height limits are in place for aesthetic reasons,
those in India appear to be motivated by concerns that high population
densities might overwhelm aging urban infrastructure.
   Technically, height restrictions specify a limit on a building’s ﬂoor
area ratio (FAR). This ratio is equal to the square footage of ﬂoor space
in the building divided by the lot area. If a building covers its entire
lot, the ﬂoor space on each ﬂoor would equal the lot area, and an FAR
limit of 8 would then restrict the building’s height to 8 stories. If the
building covers half of its lot, the same FAR limit would restrict its
height to 16 stories.
   When height restrictions are imposed, they constrain land use in the
central part of the city, where buildings would otherwise be taller than
the limit. The urban model shows that the overall effect of a height limit
follows the pattern shown in ﬁgure 4.3, which plots FAR as a function
of distance. Building heights are at the FAR limit in the central part of
the city, thus being shorter than they would be in the absence of a limit.
But heights increase in the outer part of the city, as shown in the ﬁgure.

4.6.2 Zoning
The most pervasive land-use controls in U.S. cities are zoning laws.
These laws specify the allowable type of land use in a given area, the
broad categories being commercial, industrial, high-density residential,
and low-density residential (meaning detached houses). Typical zoning
laws include subcategories under these general headings, which may
involve FAR requirements.17
   Zoning laws are designed to separate land uses, with the goal of
limiting the impact of negative externalities. Factories, which generate
noise and perhaps pollution, are prohibited from locating amid resi-
dences or in shopping areas, and gas stations are prevented from locat-
ing in residential neighborhoods. Apartment buildings, which generate
trafﬁc and other nuisances, aren’t allowed to be built amid detached
single-family houses.

this diagram depicts a rectangular city located on an island (say, Man-

dirty. These negative externalities affect housing prices around the
factory locations. In order to be compensated for the presence of a
factory, consumers require a substantial discount in the housing price
p. Thus, p is lower within several blocks of each factory, as is shown in
the upper panel of ﬁgure 4.4.

   Might different land uses separate naturally, so that zoning laws will
not be necessary? For example, might the two factories in the above

be close to an interstate highway), so that no government intervention
is necessary? This view has motivated different approaches to zoning,
with some cities imposing no zoning laws at all. The most famous
example is Houston, which is not zoned.
   Land-use patterns in Houston don’t look much different from those
in other zoned cities, which suggests that zoning may not be essential.
However, Houston—a relatively young city that grew rapidly—
experienced more large-scale development than older American cities,
which grew in a more piecemeal fashion. Since a large housing sub-
division controlled by a single developer is designed to minimize nega-
tive externalities, commercial zones are located so as to limit the
negative effects of trafﬁc. As a result, the need for zoning laws is lower
in Houston than in a city where development is less coordinated and
where externalities may not be taken into account. Thus, the success of
non-zoning in Houston doesn’t necessarily mean that zoning could
have been forgone elsewhere.

4.6.3 Empirical evidence on the effects of land-use controls
There is a large empirical literature exploring the effect of land-use
controls on housing prices. With the model showing that UGBs,
building-height restrictions, other density restrictions, and impact fees
all raise the price p per unit of housing, the expected effect is in a posi-
tive direction. A common recent approach (see, for example, Ihlanfeldt
2007) is to measure the intensity of land-use restrictions using data
from a survey of local governments. The survey indicates how many
types of restrictions each government has in place (whether it has a
UGB, levies impact fees, and so on), and the intensity measure is a
simple count of the number of restrictions. This count measure is then
used as an explanatory variable in a regression in which the dependent
variable is a house price measure. The regression includes a variety of
other control variables. The results from this type of study typically
fUrban Sprawl and Land-Use Controls                                     89



show the expected effect: house prices in a locality rise with an increase
in the number of land restrictions in place.
   Taking a different approach to exploring the effects of regulation,
Glaeser, Gyourko, and Saks (2005) measured the gap between the price
per square foot of housing and construction cost per square foot in
different communities. Noting that the two values should be equal in
a competitive market, they argue that a large gap indicates the presence
of government regulations that inhibit housing supply.

4.7   Summary

Rising populations and incomes and falling commuting costs have led
to substantial spatial expansion of cities. Although these forces are
benign, they may be distorted by market failures, causing cities to
expand more than they should. Such market failures arise from open-
space amenities, which aren’t taken into account in development deci-
sions, and from trafﬁc congestion, which involves an externality. The
resulting overexpansion of cities can be addressed by price-based rem-
edies: a development tax in the presence of open-space amenities,
congestion tolls in the presence of trafﬁc congestion. An urban growth
boundary, a quantity-based remedy, can also be used to correct some
market failures. Regardless of the instrument used, policy makers
should recognize that excessively tight limits on urban spatial expan-
sion may reduce social welfare.
   In addition to UGBs, other land-use controls include building-height
restrictions and alternative types of density limits, which contribute to
urban sprawl while serving other goals. Zoning laws are also applied
in most cities, with the goal of minimizing negative externalities by
separating land uses.

5.1   Introduction

Road congestion is a universal problem. Commuters and other drivers
spend many hours each year stuck in slow-moving trafﬁc on streets
and freeways in cities around the world. The problem is severe in many
U.S. cities and often worse in other countries, especially in less devel-
oped regions. The millions of hours of personal time that are lost as a
result of congestion represent a large social cost.
   As was noted in chapter 4, road congestion involves an externality:
each car slows down all the other cars on a congested roadway by a
small amount, generating higher time costs for their drivers. These
costs add up to a non-negligible total even though they are individually
small, making the congestion externality quantitatively important. To
correct the externality, each car must pay a congestion toll equal to the
external costs it generates. Chapter 4 showed that when congestion
tolls are levied in the city portrayed by the urban model, the higher
cost of commuting leads the residents to shorten their commutes by
moving toward the central business district, which makes the city more
compact.
   This chapter analyzes the congestion externality and the imposition
of congestion tolls in more detail. Rather than using a model with ﬂex-
ible residence locations, in which the length of commute trips can
change as people move closer to the CBD, the length of these trips is
ﬁxed in the analysis. Commute trips are assumed to occur between a
suburb and the central city on a freeway of ﬁxed length, which is
subject to congestion. Commuters respond to congestion tolls on the
freeway not by changing the length of their commutes but by choosing
a different way of getting to work (commuter rail, for example) or by
choosing to travel at a different, uncongested time of day. In reality,
f92                                                                         Chapter 5



commuters would probably adjust to congestion tolls along these
dimensions while also moving their residences. But a model with a
ﬁxed commute is easy to analyze, and its lessons extend to more real-
istic settings. The rest of the chapter derives these lessons.

5.4   Trafﬁc Allocations: Equilibrium and Social Optimum

In addition to showing the smooth demand curve, ﬁgure 5.7 also shows
the AC and MC curves and their intersections with the D curve. These
intersections are crucial because they show the equilibrium trafﬁc
volume on the freeway as well as the socially optimal trafﬁc volume.
The equilibrium is represented by the intersection of D and AC, and
it has a trafﬁc volume of Teq. The social optimum is represented by the
intersection of D and MC, and it has a trafﬁc volume of Topt. Since
Teq &gt; Topt, too many cars use the freeway in equilibrium. The following
discussion explains why these intersections represent the equilibrium
and social optimum and why the freeway is overused.

5.4.1 The equilibrium
Since consumers, in deciding how to get to their workplaces, will
compare the private cost of using the freeway to their alternate cost, it
makes sense that the intersection of demand and AC represents the
equilibrium. Although this intersection tells how many cars use the
freeway in equilibrium (Teq), the description of the equilibrium involves
more than just a simple trafﬁc count. The identities of the freeway users,
as well as the identities of the commuters using their alternate routes,
must be speciﬁed. In equilibrium, commuters 1 through Teq use the
freeway, while commuters Teq + 1 through n use their alternate routes.
This division makes sense since commuters high on the list have
high alternate costs (which make the freeway attractive) while those
low on the list have low alternate costs (which make alternate routes
attractive).

a deﬁnition of this concept is needed. In the urban model of chapter

incentive to change location. The same notion applies in the congestion
model. An equilibrium allocation of trafﬁc has the property that
no commuter has an incentive to switch routes. In other words, no

5.4.2 The social optimum
The socially optimal trafﬁc allocation minimizes the total cost of commut-
ing, including the costs of both freeway users and alternate-route users.
Equivalently, the socially optimal allocation is one in which total com-
muting cost cannot be reduced by switching any commuter between routes.
In ﬁgure 5.7, the social optimum is represented by the intersection
between the demand curve and MC curve, which leads to a trafﬁc
volume Topt that is smaller than the equilibrium volume Teq.
    As with the equilibrium, the social optimum involves a particular
assignment of commuters to routes. Under the optimal allocation, com-
muters 1 through Topt use the freeway, while commuters Topt + 1 through
n use their alternate routes. As in the equilibrium allocation, the com-
muters with the highest alternate costs use the freeway, while those
with the lowest alternate costs use their alternative routes. But a social
planner would ask an intermediate group of commuters, Topt + 1
through Teq, to switch from the freeway to their alternate routes in order
to achieve the socially optimal allocation.

mizing total commuting cost, consider ﬁgure 5.9, which is similar to

5.5   Congestion Tolls

5.5.1 The toll schedule
The equilibrium has too many freeway commuters, and the reason
is that no commuter has an incentive to consider the social cost of
using the freeway. Commuters focus instead on the smaller private
cost, which doesn’t include the externality damage. The congested
freeway thus appears artiﬁcially cheap to commuters, with the result
that some commuters use it when society would prefer that they took
an alternate route instead. Naturally, the commuters who should be
diverted are those with the lowest alternate costs among the equilib-
rium group of freeway users (consumers Topt + 1 through Teq), for whom
a switch would be least objectionable. The remaining freeway users
have alternate costs high enough that society is happy to keep them on
the freeway.
   Stated differently, the problem is that consumers look at private
costs (the AC curve) in making decisions, while a social planner would
look at social costs (the MC curve) in deciding on the trafﬁc allocation.
In order to get commuters to do the right thing, society should
ensure that their decisions mimic those of the planner, which can
be done by forcing commuters to consider the MC curve in their
choices.
   This outcome can be achieved by charging congestion tolls, which
will raise the private cost of using the freeway until it coincides with
the MC curve. To generate this coincidence, the toll must equal the

5.5.2 Time-of-day considerations
The discussion so far has focused on rush-hour commuting without
considering other times of day, when the freeway is less crowded. For
example, at night, when fewer people need to travel, the demand
curve D for freeway use would be lower. In this case, D might intersect
the AC and MC curves on their ﬂat portion, where congestion is
absent. No externality damage is then present, and no toll is charged
(the electronic display would show a toll of zero). Therefore, an
idealized congestion-toll system would generate tolls that vary by time
of day. Tolls would be high during rush hours and zero at off-peak
times. In practice, however, the government may wish to collect addi-
tional toll revenue, so that tolls would be positive even during off-peak
hours. But to appropriately restrict rush-hour trafﬁc, a large toll dif-
ferential between the hours of peak use and the off-peak hours is
needed.
   Another observation concerns the model’s alternate-route option.
Other types of alternatives besides the commuter-rail and country-road
alternatives in ﬁgure 5.1 can be envisioned. Some alternatives might
involve use of the freeway itself. For example, the freeway could have
an uncongested lane dedicated to express bus service. Bus riders would
incur no congestion cost, but they would incur an inconvenience cost

   A better reinterpretation of the alternate route may be in a time-of-

alternate cost for the shoppers would be cost of an uncongested, off-

might happen for those rush-hour commuters with ﬂexible work
schedules, who might delay arriving at and leaving their workplaces
in order to avoid rush-hour tolls.

5.5.3 Real-world congestion tolls
Since 2000, congestion-toll systems have been adopted in two major
cities: London and Stockholm. They join Singapore, where a toll system
has been in place for decades. In each case, tolls are levied for entry
into the congested central city. Stockholm uses a purely electronic
payment system, and London uses a more complex approach where
video cameras record license plate numbers to verify electronic payment
of the toll.
   Adoption of toll systems must confront an issue that has been over-
looked in the analysis so far: political support for tolls. In order for such
support to be realized, the toll revenue, which constitutes a tax on com-
muters, must be returned in some fashion. Otherwise, commuters who
pay the toll will end up worse off and will not support its imposition.
To see this point, note that the private cost of using the freeway equals
the height of the AC curve at T = Teq without the toll, but equals the
height of the MC curve at T = Topt when the toll is present (see ﬁgure
5.7). As a result, commuters 1 through Topt, who continue to use the
f108                                                             Chapter 5



freeway when the toll is imposed, incur a higher cost and are worse
off, and they would vote against imposition of the toll system. But if
the toll revenue is returned to commuters, say by reducing income or
gasoline taxes for everyone (including commuters who don’t use the
freeway), a majority of the commuters may support imposition of the
toll system, making it politically feasible. Such support is necessary for
congestion tolls to be implemented.

5.5.4 Alternate price-based mechanisms
Because congestion tolls aren’t especially easy to implement, it is
natural to wonder if other price-based options might be available.
Raising the gasoline tax would increase the cost of road use. But since
all road users would pay the higher tax whether they travel at con-
gested or uncongested times, the tax increase wouldn’t have the desired
effect of reducing trafﬁc just during peak, congested hours. A more
effective alternative would focus on parking charges. After their
morning rush-hour trip, many workers enjoy free parking provided by
their employers. If workers instead had to pay for their parking at
market rates (which are usually high in big cities), with employers
raising their wages accordingly, the effect would be similar to levying
rush-hour congestion tolls. Rather than pay the new parking fees,
workers might pocket the money from higher wages and take public
transit to work. This simple idea, promoted by Shoup (2005), could
reduce peak-hour congestion.

Although the congestion externality is remedied by tolls, could subsi-

possible to generate an example, albeit a fanciful one, in which this
outcome would ensue. In particular, suppose that commuters beneﬁt
from the presence of more cars on the freeway at very low trafﬁc

However, it is convenient to ignore the ﬂat range, drawing the curve

use would be to pay for the cost of freeway construction (speciﬁcally,
the interest on the bonds used to ﬁnance the construction). But would
the toll revenue be enough to cover that cost, or would there be a
shortfall? The answer is given by the famous self-ﬁnancing theorem,
which says that, under reasonable conditions, the toll revenue exactly
pays for the cost of the freeway.8 Two conditions must hold. First, freeway
costs must exhibit constant returns to scale, so that doubling the free-
way’s width doubles its cost. Second, doubling the width of the freeway
and doubling the trafﬁc volume must leave trafﬁc speed (and thus
congestion) unchanged. Under these conditions, both of which are
plausible, tolls exactly cover the freeway’s cost, so that no additional
tax revenue is needed.

5.7   Application to Airport Congestion

Like freeways, airports around the world exhibit their own type of
congestion. When the number of planes attempting to land or take off
exceeds the number that the airport can handle per unit time, queues
develop, either on the ground or in the air. The result is ﬂight delays,
which impose time costs on passengers and resource costs on the air-

8. See Small and Verhoef 2007.
fFreeway Congestion                                                      113



lines. These resource costs include the cost of longer crew hours and
extra fuel (for planes queuing in the air) and reduced aircraft utilization
(planes stuck in trafﬁc can’t make as many ﬂights per day).
   As in the freeway case, aircraft using a congested airport impose
external costs by slowing down other planes. Therefore, each plane
should be charged a congestion toll that captures these external costs.
In response, some airlines might shift ﬂights from a congested airport
to an uncongested facility in the same city (analogous to an alternate
route in the freeway case). But most of the adjustment would be on
the time-of-day dimension. In other words, airlines would shift some
ﬂights to off-peak hours in response to the imposition of congestion
tolls.
   For example, a ﬂight from Hawaii scheduled to land in Chicago at
5 p.m., a peak hour, might be rescheduled to land at 8 p.m. instead.
Although the passengers (vacation travelers) could easily tolerate the
switch, a ﬂight arriving at 5 p.m. from New York (and full of business
travelers) wouldn’t be rescheduled. These passengers would want to
get home to their families at a reasonable hour after a day’s work in
New York, and the airline, recognizing this desire, wouldn’t reschedule
the ﬂight.
   Although the analogy between airport and freeway congestion is
close, there is one important difference. Freeway users are “atomistic,”
each being small, but airlines are “non-atomistic.” Rather than operat-
ing a single ﬂight, airlines tend to operate simultaneous ﬂights to dif-
ferent destinations from a single airport. These ﬂights can congest one
another, and airlines have an incentive to take this self-imposed conges-
tion into account. Recognizing that scheduling an extra peak-hour
ﬂight will slow down its other peak-hour ﬂights, an airline may be
reluctant to add the extra ﬂight. Airlines, then, “internalize” self-
imposed congestion, taking it into account in their scheduling deci-
sions. Since self-imposed congestion is recognized, the toll system need
not charge airlines for it. The toll system need only charge an airline
for the congestion imposed on other carriers, not for the congestion imposed
on itself.9
   As in the freeway case, airport congestion tolls would vary by time
of day, being high during peak hours and zero during off-peak hours,
when congestion is absent. Although such tolls could easily replace the
current system of aircraft landing fees, which are time-invariant and

9. For further discussion and references, see Brueckner 2002.
f114                                                             Chapter 5



depend on aircraft weight, congestion tolls aren’t currently levied at
any of the world’s airports, despite some past experimentation. Since
tolls would require only a change in the billing system currently used
to collect landing fees, they could be imposed with little resource cost
(in contrast to the larger investment required for freeways). The result-
ing gains to passengers and airlines could be substantial.

5.8   Summary

Freeway congestion involves an externality, with commuters not con-
sidering the congestion they impose on their fellow freeway users. As
a result, freeways are overused, and congestion tolls must be levied to
reduce trafﬁc to a socially optimal level. Tolls would be absent during
off-peak periods, but their presence during peak periods would cause
some travelers to use alternate routes or to travel at a different time of
day. Congestion can be reduced by an expansion of freeway capacity,
but expansions that eliminate congestion entirely aren’t socially desir-
able. The principles underlying freeway congestion tolls can also be
applied to airports, with some modiﬁcation.
f6       Housing Demand and Tenure Choice




6.1   Introduction

Housing is probably the most important commodity that consumers
purchase. It provides essential shelter and an environment for many
activities, most signiﬁcantly the activity of raising a family. Owner-
occupied housing is also an investment, usually providing capital gains
for homeowners in the long run. While housing consumption played
a central role in the urban model developed in earlier chapters, many
important aspects of the housing commodity were omitted. Housing
consumption was equated with the consumption of ﬂoor space, leaving
out many other housing attributes. Also, because everyone in the city
was assumed to be a renter, the issue of housing “tenure choice” (that
is, the choice between owning and renting) was ignored. The possibility
that consumers earn housing capital gains was thus suppressed, and
other elements such as mortgage costs that affect the cost of housing
were ignored.
    To provide a fuller picture of housing, this chapter introduces the
previously omitted elements. The chapter starts with a discussion of
the traditional demand function for housing and how it is estimated
empirically. The discussion then turns to the alternate approach in
which housing is treated as a bundle of attributes. Under this approach,
researchers are interested in the demands for individual attributes,
which are identiﬁed by ﬁrst estimating a “hedonic price function,” a
relationship that connects a house’s selling price to the levels of its
attributes. Returning to the traditional approach, the next task is to
derive the “user cost” of housing. The user cost incorporates previously
omitted elements (mortgage costs, capital gains, depreciation, and
taxes) to derive an accurate formula for the “effective” price per unit
of housing. The formula shows how taxes and the mortgage interest
f116                                                            Chapter 6



rate affect this price, and how optimistic capital-gains expectations can
cause “housing bubbles.”
   Renter-occupied housing and owner-occupied housing have differ-
ent user-cost formulas. These formulas can be used to analyze the
rent/own decision, which involves choosing the cheaper mode of
tenure. The resulting tenure-choice model offers predictions about the
factors that determine an economy’s homeownership rate. Other factors
that affect tenure choice but are not included in the model are also
discussed.

6.2   Housing Demand: The Traditional and Hedonic Approaches

6.2.1 The traditional approach
The traditional approach to housing demand assumes that housing
consumption can be measured unidimensionally—in other words, by
a single number. In the urban model, the unidimensional measure was
the amount of ﬂoor space in a dwelling. Empirical researchers, however,
have been able to estimate the demand function for housing without
having to specify exactly how consumption is measured.
   To see how, let the demand for housing be given by the demand
function

q = αpβyθ,
where q is housing consumption measured in some fashion, p is the
price per unit of housing, and y is income. The parameters β and θ,
which are negative and positive respectively, give the price and income
elasticities of demand. A goal of housing researchers is to estimate the
magnitudes of these elasticities. This estimation is made possible by
multiplying both sides of the above equation by p, which yields

pq = αpβ+1yθ.

If the demand equation applies to a renter, the expression pq on the left
of this equation is total “rent.” If the equation applies to an owner-
occupier, then p is the purchase price, as opposed the rental price, per
unit of housing, and pq is the value of the house. Let pq (housing
“expenditure”) be denoted by E, representing either rent or value. Then
the previous equation is written as

E = αpβ+1yθ.
After taking natural logarithms, it can be rewritten as
fHousing Demand and Tenure Choice                                         117



logE = γ + (β + 1) logp + θ logy,

where γ = logα. This new equation gives housing expenditure as a
function of the price p and income y, but its beauty is that the equation
doesn’t require physical measurement of housing consumption. The income
and price elasticities can be estimated by regression analysis using data
on rents or house values, and measures of price and income, without
having to decide how to measure housing consumption q.
   A measure of p, the price per unit of housing, is still needed, but
empirical researchers often use a city-level housing price index to
represent this variable. Then, individual data, drawn from households
in a variety of cities, is typically used to measure E and y. The usual
focus is on homeowners rather than renters, so that E measures house
values rather than rents. The elasticity estimates from such empirical
studies typically show that the elasticities satisfy –1 &lt; β &lt; 0 and
0 &lt; θ &lt; 1. Thus, housing demand is price inelastic, indicating low price
responsiveness. In addition, with θ &lt; 1, housing consumption rises less
than proportionally with income. As a result, housing expenditure
comprises a smaller and smaller share of income as y rises. For a
summary of evidence on the magnitudes of price and income elastici-
ties, see Mayo 1981.

6.2.2 The hedonic approach
In contrast to the traditional approach to housing demand, the
“hedonic” approach recognizes that a dwelling is a bundle of attri-
butes such as ﬂoor space and lot size, making it hard to measure
housing consumption using a single variable. Thus, instead of being
written as u(c, q), the consumer ’s utility function is written as u(c, a1,
a2, . . . , am), where ai is the level of the ith housing attribute, of which
there are m in total (recall that c is “bread” consumption). With pref-
erences expressed in this way, consumers have “demands” for indi-
vidual attributes rather than a demand for a generalized housing
commodity.
    To isolate these demands empirically, the ﬁrst step is to estimate a
“hedonic price function.” Such a function relates the selling price of a
house to the levels of its various attributes. A hedonic function can be
estimated using the kind of data available to real-estate agents and
home buyers, which includes a host of property characteristics.
However, the actual selling price of the house is used rather than the
seller ’s asking price.
f118                                                                          Chapter 6



   Grether and Mieszkowski (1974) estimated one of the ﬁrst hedonic
housing price regressions, using data on house sales in New Haven,
Connecticut, during the period 1962–1969. Here is the equation they
estimated:

House value = 36 + 5.2 × square footage + 0.89 × lot size + 800 ×
            number of bathrooms + 580 × family room + 830 ×
            ﬁreplace + 790 × one-car garage + 1,270 × two-car
            garage – 5.2 × average room size – 0.07 × age × square
            footage + additional attribute effects.

The hedonic coefﬁcients are known as the “implicit prices” of the attri-
butes, and the results show the magnitudes of these prices. The house
values in the sample are very low by today’s standards (averaging
$22,000), so the implicit prices are themselves modest. For example,
another 100 feet of ﬂoor space raises a house’s value by $520, and the
same increment to lot size raises the house’s value by $89. A second
bathroom is worth $800, a family room $580, and a ﬁreplace $830. Rela-
tive to a house without a garage, a one-car garage adds $790 to value
while a two-car garage adds $1,270. With square footage held constant,
smaller rooms reduce a house’s value. Older houses are also worth less.
Note that age is interacted with square footage, so that the dollar age
discount rises with the size of the house. Mieszkowski and Grether ’s
hedonic regression includes many additional variables capturing the
house’s condition, its exterior materials, and some of its interior
characteristics.
   The demand for housing attributes can be recovered in a second step
once the hedonic price function has been estimated.1 The approach is
basically to regress the implicit price on the level of the corresponding
attribute and on the characteristics of the household buying the house
(income, family size, and so on).2 The estimated coefﬁcient on the attri-
bute variable gives the slope of attribute demand function, thus reveal-
ing the price responsiveness of the consumer ’s attribute choice.

1. The two-step hedonic method was pioneered in a famous paper by Sherwin Rosen
(1974).
2. Because Mieszkowski and Grether ’s regression is linear, the implicit attribute prices
are constants. The dependent variable in the second-step procedure is thus constant,
which would rule out a proper second-step regression. (The authors did not attempt to
carry out such a regression, being interested only in the hedonic function itself.) More
ﬂexible speciﬁcations of the hedonic equation (semi-log, for example) generate non-
constant implicit prices, thus allowing the second step to be carried out. For an example
of a study that includes both steps, see Quigley 1982.

6.3   The User Costs of Housing

6.3.1 Preliminaries
To provide a fuller picture of cost of homeownership, and to analyze
the choice between owning and renting, it is necessary to return to the
traditional view of housing, in which consumption is measured in a
unidimensional fashion and a price per unit can be identiﬁed. When
housing is rented, the price per unit is simply the rental price, denoted
by p in the context of the urban model. But when a consumer owns the
housing she occupies, characterization of the cost per unit is more
complicated. As an owner, the consumer will make a mortgage
payment, pay property taxes, incur depreciation on the dwelling, and
earn housing capital gains. Additional costs of ownership include
maintenance costs and insurance.
    To capture these costs, let V denote the value of the house. In addi-
tion, let i denote the mortgage interest rate, h denote the property tax
rate, d denote the depreciation rate, and g denote the rate of capital
gains (the annual percentage change in house values). Suppose that the
consumer buys the house using a 100 percent mortgage, with no down
payment (the analysis is unchanged if a down payment is allowed). In
addition, suppose for simplicity that the mortgage is of the “interest-
only” kind. Then the consumer ’s annual interest cost is equal to iV (that
is, the interest rate times the amount of the mortgage loan, which
equals the house’s full value). Along with this cost, the property tax
payment is hV (the tax rate times the house’s value).3
    Depreciation captures the annual decline in the value of the house
as it wears out. Houses are thought to depreciate by 1–2 percent
per year, a decline that is captured by d. Therefore, the annual loss
due to depreciation is dV. Finally, general appreciation in house values
(due, say, to rising overall demand in the economy) leads to housing
capital gains, with g measuring the percentage gain in value. The
consumer then realizes a beneﬁt equal to gV each year, which tends
to offset the previous costs. It is possible, of course, that g could be
negative, in which case gV represents an actual cost. With all the previ-
ous elements gathered, the annual costs incurred by the homeowner
are given by (i + h + d – g)V. For simplicity, the costs of maintenance

the housing cost per unit of consumption is then (i + h + d – g)v. When
deciding whether to be an owner-occupier or a renter, a consumer

are tax deductible must be taken into account. Second, the rental price
p will depend on the value v per unit of housing, in a manner that again
depends on taxes, and this dependence must also be considered in
comparing the costs of owning and renting.

6.3.2 The tax treatment of housing
The tax treatment of owner-occupiers affects their housing costs, and
the tax treatment of the landlords who supply rental housing affects the
rents they charge, as reﬂected in p, the rental price per unit. Table 6.1
summarizes the treatment of the various housing-cost elements for both
owner-occupiers and landlords under the U.S. income tax code, indicat-
ing whether the costs are tax deductible. Mortgage interest, property
taxes, and depreciation are all tax deductible for landlords. Mortgage
interest and property taxes are deductible for owner-occupiers, but
depreciation isn’t.4
   The beneﬁts accruing to landlords are the rental income they earn
from their properties and the capital gains they enjoy. Both of these
beneﬁts are taxable, as can be seen in table 6.2. Capital gains are among
the beneﬁts accruing to owner-occupiers, as was discussed above. But
another beneﬁt consists of the rental payments they avoid by owning
rather renting their dwellings. This beneﬁt is measured by imputed rent,
which equals the amount the consumer would have to pay in rent if
she occupied her dwelling as a renter rather than an owner. This beneﬁt
isn’t taxable, and capital gains are also not taxable for most individuals
(to be taxed, they must exceed a high threshold).

4. In order to claim the deductions, an owner-occupier must itemize deductions in com-

treated as a landlord renting to herself. The owner-occupier would then
be viewed as paying herself rent (even though no money changes
hands), and this implicit income would be taxed. She would be allowed

failure to tax this beneﬁt is the main source of the tax subsidy to
homeownership.5

6.3.3 The user cost of owner-occupied housing
The tax deductibility of mortgage interest and property taxes requires
an adjustment in the previous formula for the owner-occupier ’s housing
cost. To make the adjustment, let τ denote the owner-occupier ’s income-
tax rate.6 Deductibility means that, for every dollar of mortgage interest
the owner-occupier pays, she can reduce her taxes by τ dollars via the
deduction. Therefore, a dollar of mortgage interest costs the owner-
occupier only 1 – τ dollars, and the same is true of property taxes.
Modifying the previous formula, the annual cost of housing is then
equal to

[(1 – τ)(i + h) + d – g]V,

where the cost (i + h)V of interest and property taxes is replaced by the
after-tax cost, (1 – τ)(i + h)V.
   As before, let V be replaced in this formula by vq, where v is the
purchase price per unit of housing. The owner-occupier ’s cost per unit
of housing, adjusted for taxes, is then given by

[(1 – τ)(i + h) + d – g]v = user cost of owner-occupied housing.

To capture housing demand by owner-occupiers in a realistic way,
this “user-cost” expression would replace the price per unit p in the
demand formula in subsection 6.2.1. The quantity demanded, q, will
then depend on all the elements in the user-cost formula. If the
purchase price per unit of housing v rises, q will fall, and the same
thing will happen if the mortgage interest rate i or the property tax
rate h were to rise. The effect of i establishes the important point that
the cost of a mortgage contributes to the cost of owner-occupied
housing.
   In addition, higher depreciation would raise the user cost, causing
the quantity demanded to fall, whereas an increase in the capital gains
rate g would have the opposite effect. By producing a ﬁnancial payoff
from homeownership, higher capital gains reduce its cost, thus giving
consumers an incentive to consume more housing.

6. For simplicity, the analysis makes an unrealistic assumption about taxes. In particular,
it assumes that a consumer is subject to a proportional income tax, paying a ﬁxed propor-
tion τ of taxable income to the government. In addition, as will be discussed later, τ is
assumed to be higher for higher-income individuals. This feature is meant to mimic the
actual income tax system, whose progressivity means that the marginal tax rate rises as
income increases. A fully realistic depiction of taxes would complicate the analysis
without changing its basic message.

6.3.4 Inﬂation and housing bubbles
Although the capital-gains effect provides the key to understanding
housing bubbles, ﬁrst consider the effect of a less dramatic phenome-
non: inﬂation that affects the prices of all goods. Suppose that the rate
of overall inﬂation rises by 1 percentage point (say, from 4 percent to
5 percent). Then g goes up by 0.01, and, in addition, the mortgage inter-
est rate rises by 0.01. This second effect occurs because the nominal
interest rate generally equals an underlying real interest rate plus the
rate of inﬂation.
   How do these combined changes and i and g affect the user cost of
owner-occupied housing? With Δ denoting change, the change in the
user cost is

[(1 – τ)Δi – Δg]v = [(1 – τ)(0.01) – 0.01]v = – 0.01τv &lt; 0.

Therefore, general inﬂation reduces the user cost, encouraging owner-
occupiers to demand more housing. This reduction in user cost means
that the tax code’s effect on housing costs is non-neutral with respect
to inﬂation.
   A housing bubble arises when widespread expectations of high
housing capital gains are self-fulﬁlling, so that the expectations
are conﬁrmed. From the user-cost formula, it is easy to see how a
bubble works. Suppose that consumers start to expect high housing
capital gains, so that g increases, but that they don’t expect generalized
inﬂation, so that i is unchanged. Then, as was noted above, the user
cost falls. But a lower user cost raises the demand for housing, so
that consumers increase their desired consumption. This higher
demand, in turn, drives housing prices up, conﬁrming and even height-
ening consumers’ capital-gains expectations. With even greater price
appreciation expected, demand via the user cost increases further,
fueling the bubble. This kind of process led to the large run-up in
U.S. housing prices over the period 2000–2006. The collapse of capital-
gains expectations, caused in part by the growing unaffordability of
houses over this period, led to a severe drop in prices and the end of
the bubble.
   Many observers argued that low mortgage interest rates also helped
to start the housing bubble, and this effect can be seen in the user-cost
formula. As was noted above, a low i pushes up the demand for
housing, leading to price escalation and the anticipation of further
capital gains.

6.3.5 The user cost of rental housing
To compute the user cost of rental housing, consider a landlord who
purchases a dwelling at a per-unit price of v and rents it out at a per-
unit price of p. Suppose that, like the consumer, the landlord buys the
property with a 100 percent mortgage, while paying property taxes and
incurring depreciation. Since all these costs are tax deductible, the
landlord’s after-tax cost per unit of housing purchased is

(1 – λ)(i + h + d)v,

where λ is the landlord’s income-tax rate. In addition, the landlord
earns capital gains at rate g, but he is able to keep only (1 – λ)gv of these
gains, since they are taxed. Finally, the landlord earns rental income of
p per unit of housing, but this income is taxed, leaving (1 – λ)p in after-
tax income. The landlord’s proﬁt per unit of housing, which equals
after-tax income minus after-tax costs, is then

(1 – λ)p – [(1 – λ)(i + h + d)v – (1 – λ)gv] = (1 – λ)[p – (i + h + d – g)v].

As was explained in chapter 2, competition in the housing market
drives proﬁt down to zero, and this outcome pertains to landlords as
well as housing developers. Therefore, the above proﬁt expression
must be zero, which means that the rental price p must bear a particular
relationship to the purchase price v. In particular, it must be true that

p = (i + h + d – g)v = user cost of rental housing.

Thus, the price p is equal to a user-cost expression that is similar to the user
cost of owner-occupied housing but doesn’t contain any income-tax term.7

6.4.1 Tenure choice in the basic model
In deciding whether to rent or to own, the consumer will choose the
cheaper tenure mode. In other words, the consumer will compare the
user costs under owning and renting, and then choose the mode with

6.4.2 Tenure choice with a realistic depreciation deduction
The depreciation term d in the formulas above is meant to represent
economic depreciation, which captures the actual wearing out of build-

accelerated depreciation, under which buildings are treated as wearing
out faster than they really do.8 Accordingly, let the depreciation rate
allowed for tax purposes be d + e, where e is the rate of excess deprecia-
tion over and above d, the rate of economic depreciation.
   Incorporating accelerated depreciation, the proﬁt expression for the
landlord is written as

(1 – λ)p – [(1 – λ)(i + h + d)v – λev – (1 – λ)gv]

Note that accelerated depreciation creates an additional taxing saving
of λev, equal to landlord’s tax rate λ times the dollar amount of excess
depreciation per unit of housing (ev). The second proﬁt expression
shows that net result is the addition of λev to the previous proﬁt
formula. As before, the landlord’s proﬁt must equal 0, and this require-
ment can be used to determine p. Setting the last proﬁt expression
above equal to 0 and solving for p yields

p = (i + h + d – g)v – λev/(1 – λ) = new user cost of rental housing.

6.4.3 Some other factors affecting tenure choice
A number of other factors not considered in the model may also affect
tenure choice.

Expected mobility Consumers incur substantial transaction costs in
buying and selling houses, including closing costs and commissions
for real-estate salespeople. Although these costs are worth bearing
occasionally when changing residences, their burden becomes more
signiﬁcant with frequent moves. Therefore, homeownership may be
the wrong choice for a consumer who expects to relocate relatively
soon.

Pride of ownership Consumers often take pride in being able to
own, rather than rent, the dwelling they occupy, and this feeling can
affect tenure choice. In the context of the model, pride of ownership
would appear as a negative cost, which would lead to a downward
shift in the owner-occupier ’s user-cost curve in ﬁgure 6.1. This
shift would reduce the cutoff tax rate τ̂ , with the result that the
homeownership rate would rise relative to a situation in which
pride of ownership is absent. This psychological effect is probably
a signiﬁcant determinant of homeownership, along with purely
economic forces.

Risk Although homeownership involves a risky investment, the
risk can be ampliﬁed in some situations. For example, a consumer
whose wage income is positively correlated with housing prices in
her city of residence is exposed to more risk than if income and
prices were uncorrelated. Such a consumer might work in a “company
town” such as Detroit, where bad times in the auto industry translate
into both downward pressure on incomes and capital losses on real
estate. If they are aware of this kind of double jeopardy, residents of
company towns may display less inclination toward homeownership,
or buy smaller houses, than consumers whose incomes aren’t correlated
with their city’s house prices. On the other hand, some risk considerations
can favor homeownership. For example, locking in housing costs
by purchasing a home with a ﬁxed-rate mortgage insulates the
consumer from the risk of year-to-year rent changes under the renting
option.16

16. For evidence on these two effects, see Davidoff 2006 and Sinai and Souleles 2005.
f130                                                            Chapter 6



Dislike of home-maintenance tasks It is sometimes argued that
people who dislike home-maintenance tasks, such as mowing the lawn,
will choose to rent rather become owner-occupiers. Renting shifts
responsibility for unpleasant household tasks to the landlord. This
argument may seem reasonable at ﬁrst, but it doesn’t make economic
sense. The reason is that an owner-occupier can always pay to have
someone else perform maintenance tasks. Since landlords implicitly
charge for maintenance costs anyway as part of rent, a homeowner ’s
cash outlay to maintenance providers (in lieu of spending personal
time) wouldn’t tip the balance away from ownership.

6.5 Down-Payment Requirements, Tenure Choice, and Mortgage
Default

6.5.1 Down payments and tenure choice
Traditionally, a home buyer was required to make a substantial down
payment. This requirement was weakened during the period of the
recent housing bubble, but down-payment requirements have been
stiffened again since the collapse of the housing market. Although
a down-payment requirement constitutes an important barrier to
homeownership, it plays no role in the model developed above. The
model simply looks at the annualized costs of owning versus renting,
portraying the consumer as taking the cheaper option without acknowl-
edging that an important hurdle to homeownership (the down
payment) must be cleared. Even though homeownership may be pre-
ferred on the basis of annualized costs, a consumer lacking the funds
for a down payment will not be able to act on this preference, so that
renting is the only option.
    Although young home buyers sometimes acquire down-payment
funds as a gift from their parents, accumulating a down payment
usually requires saving. Economic analysis of consumer saving shows
that a major factor inﬂuencing the willingness to save is an individual’s
“impatience.” In an economic context, “impatience” refers to the
strength of the consumer ’s desire for current as opposed to future
consumption, as captured by a subjective “discount factor.” Since an
impatient person values current consumption highly relative to future
consumption, such an individual will not be inclined to save. For such
a person, the act of saving boosts less-valued future consumption in
return for an unattractive sacriﬁce of highly valued current consump-
tion. A patient individual, who values current and future consumption
more nearly equally, will be more inclined to save.
fHousing Demand and Tenure Choice                                                        131



   Since impatience affects saving, and since saving is needed to accu-
mulate the down payment required for homeownership, impatience
and tenure choice are linked. An impatient consumer will be reluctant
to save enough to become a homeowner, whereas a patient consumer
will ﬁnd it easier to overcome the down-payment hurdle by saving the
required amount.
   With the model amended to include a down-payment requirement,
the following conclusions emerge. Consumers with income-tax rates
below the cutoff level τ̂ will still be renters. Consumers with tax rates
above τ̂ would like to be owners (based on annualized costs), but only
the patient individuals in this group will be able to accumulate the
required down payment. Among this high-tax-rate group, impatient
consumers will not save enough for a down payment and will end up
renting even though homeownership is preferable on the basis of annu-
alized costs.17

6.5.2 Mortgage default
Although the analysis so far presumes that consumers who become
homeowners will keep that status, an involuntary return to renter
status is likely when an owner-occupier defaults on the mortgage used
to purchase a house. “Default” means that the consumer stops making
the required monthly payments to the mortgage lender. The act of
default usually leads to foreclosure, under which the lender evicts the
resident, takes possession of the house, and sells it to a new buyer. After
defaulting, a consumer cannot get a mortgage on another house for a
number of years, which makes renting the only tenure option.
   The down-payment requirement discussed in subsection 6.5.1 is in
fact meant to reduce the likelihood of default. To see how the incentives
work, consider a simple setup in which the consumer buys a house at
the beginning of a period for an amount V and then lives in it until the
end of the period. To make the purchase, the consumer borrows M from
a mortgage lender and makes a down payment D using his or her own
funds, so that M + D = V. The new homeowner vacates the house at
the period’s end, at which time the mortgage amount M must be
repaid.18 The funds for this payment would come from sale of the house
at the end-of-period price, equal to V*.

    The price V* could lie below the initial purchase price V, and this
outcome raises the possibility of default. To see how, note that if the
consumer sells the house and pays back the mortgage M, the amount
of money left over is V* – M, which equals his “equity” in the house.
If the consumer instead defaults on the mortgage, failing to pay back
the balance M and letting the lender seize the house, he is left with
nothing. If V* – M &lt; 0, so that the sale price V* is less than the mortgage
amount (and equity is negative), the homeowner ends up “in the hole”
when paying off the mortgage, having to contribute out-of-pocket
funds to do so. He would thus be better off defaulting, in which case
he would come out even. This negative-equity default rule is modiﬁed
slightly when the consumer incurs “default costs,” denoted by C, which
capture the cost of an impaired credit rating, the costs associated with
moving out of the house, and the psychic costs (guilt) that defaulting
on a mortgage might bring. In this case, default will occur only when
V* – M &lt; –C, or when equity is more negative than – C. This rule again
minimizes out-of-pocket costs when leaving the house.
    A down payment makes default less likely because it reduces the
mortgage amount M (recall M = V – D), making it less likely that equity
V* – M is less than –C. More speciﬁcally, let V* – M be rewritten as

V* – (V – D) = D + (V* – V).

Thus, V* – M equals the down payment D plus the change in the
house’s value (which is negative when V* &lt; V). The default condition
is then

equity = V* – M = (V* – V) + D &lt; –C.
If the house’s value stays the same (V* = V), then equity equals D, a
positive value, so the consumer doesn’t default and gets his down
payment back after paying off the mortgage. If the house’s value falls,
then whether default occurs depends on the values of D and C. For a
given value of D, default is more likely the smaller is C. Similarly, for
a given value of C, default is more likely the smaller is D. Thus, for a
given decline in the house’s value, default is more likely to occur the
smaller are the down-payment and default costs.
    After the bursting of the recent housing bubble, mortgage default
and foreclosure were widespread. As a result, hundreds of thousands
of new homeowners returned to renter status, and the rate of home-
ownership declined. Many of the post-bubble defaults were driven by
the incentives captured by the three factors in the above default condi-
fHousing Demand and Tenure Choice                                                  133



tion. The ﬁrst of these factors was the severity of the decline in the
prices of houses, which made V* – V negative and large. The second
was the existence of many low-down-payment mortgages, which made
D small. The third factor was the presence of many borrowers with
poor credit ratings, who became homeowners through the use of “sub-
prime” mortgages that charged high interest rates (a new ﬁnancial
innovation). Such borrowers have little to lose from default since their
credit is already bad, so they have small values of C. Given these three
factors, the default condition was satisﬁed for huge numbers of hom-
eowners, encouraging mortgage defaults.19 Foreclosures followed these
defaults, and attempts by the lenders to resell the large number of
houses they seized ﬂooded the market and further contributed to the
post-bubble decline in housing values.
   Subsection 6.5.1 showed that the down-payment requirement is an
obstacle to homeownership, and that it must be overcome through
saving or other sources of funds. But a down payment, once accumu-
lated, gives the homeowner a ﬁnancial stake in his property (thus
discouraging default) by keeping equity positive even when prices
decline, as long as the decline isn’t too severe. Thus, although it repre-
sents a hurdle, a down payment preserves the incentive for owner-
occupancy under adverse market conditions.

6.6   Property Abuse and Tenure Choice

Another factor omitted from the model is the potential for property
abuse by renters. A renter may not have the same incentives as a hom-
eowner to take care of a dwelling, and these differing incentives can
affect tenure choice in a way not envisioned in the previous analysis.
The following analysis will show that since rents must cover the cost
of careless behavior by renters, they are high relative to the cost of
owner-occupancy, making that option more attractive.
   To understand the property-abuse issue, it is useful to develop a
simple model that suppresses many of the previous features. As in the

equals O + C when care is exercised and O + D when it isn’t. Since the
owner-occupier will make a care decision so as to minimize the cost, it
follows that care will be exercised when C &lt; D, and that care will not
be exercised when C &gt; D. In other words, if the cost of exercising care
is less than the loss in a house’s value from lack of care, the person will
exercise care, and otherwise he will not. Suppose that C &lt; D, so that
the owner-occupier exercises care. The cost of owning is then O + C.
    Now consider the behavior of renters. Letting P denote rent, the cost

exercises care, the cost of renting is P + C, but if no care is exercised,
the cost is P. Since the renter doesn’t own the property, there is no resale
