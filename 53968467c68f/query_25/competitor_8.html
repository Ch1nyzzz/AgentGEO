6.7   Summary

Whereas the traditional model of housing demand assumes that
housing consumption can be measured in a unidimensional fashion,
the hedonic price model treats housing as a bundle of attributes. Esti-
mation of a hedonic price function reveals the implicit prices of these
attributes. In order to provide a more realistic picture of housing costs,
which include mortgage interest and property taxes, a return to the
traditional model is needed. Incorporation of these cost elements then
yields user-cost expressions for owner-occupied and rental housing. By
comparing user costs, a household can decide whether renting or
owning is cheaper. The model predicts that high-income households,
whose high tax rates make the tax beneﬁts of owner-occupancy worth
a lot, prefer to own. Low-income households prefer to rent, thus enjoy-
ing the tax beneﬁts conferred on landlords. Other factors, such as pride
of ownership and down-payment requirements, also affect tenure
choice, as does the potential for property abuse by renters.
f7       Housing Policies




7.1   Introduction

Previous chapters discussed a number of government policies that
affect housing, including urban growth controls, zoning, and the
tax subsidy to homeownership. This chapter focuses on several addi-
tional policies that involve government intervention in the housing
market. The chapter starts by analyzing rent-control laws, under which
a city government attempts to limit the rents that landlords charge to
their tenants. Rent-control policies are in place in many cities through-
out the world, and it is important to gain an understanding of their
effects. Next, the discussion turns to housing-subsidy programs,
another way governments try to make housing more affordable for
consumers. Instead of limiting the rents that landlords can charge, the
government undertakes expenditures that make housing more afford-
able for renters, typically paying part of their rent. The last section of
the chapter focuses on the problem of homelessness and policies to
correct it.

7.2   Rent Control

7.2.1 How it works
Rent-control laws exist in many cities. The best-known U.S. example is
New York City, where controls have been in place since World War II.
Among other large cities, Los Angeles has a form of rent control. Many
smaller cities also control rents.
   Rent-control laws typically limit the rate of increase of rent for a
dwelling during a tenant’s period of residence. When a new tenant
moves in, the law usually allows the rent to be raised to the free-market
level. But the subsequent rate of increase is again restricted as long as
f138                                                                          Chapter 7



the new tenant stays in the dwelling. New buildings are often exempted
from rent control.1
   Rent control generates large beneﬁts for households living in con-
trolled dwellings, who often pay much less for housing than occupants
of buildings not covered by the law. These beneﬁts are the source of
political support for rent-control laws. But despite the existence of such
support, rent control generates a host of negative effects that make it
unpopular among economists. These effects include inadequate main-
tenance of dwellings, reduced incentives for new construction, and
misallocation of households to dwellings.
   Inadequate maintenance—a consequence of lower spending by
landlords—is a natural result of attempting to limit the landlord’s
income via a rent-control law. Since lower rental income leads to
reduced proﬁt, the landlord will try to recoup his loss by cutting costs,
and one cost that can be lowered easily is maintenance spending. By
this argument, dwellings in rent-controlled buildings should be less
well maintained than units in uncontrolled buildings. In effect, the
housing market responds to rent limits by reducing the quality of the
controlled units, so that tenants, to some extent, “get what they pay
for.” Striking empirical evidence illustrating this phenomenon is pro-
vided by Gyourko and Linneman (1990), who use data from New York
to show that rent-controlled buildings are more likely to be “dilapi-
dated” than uncontrolled buildings.
   The second negative effect of rent control, reduced incentives for new
development, may emerge even when newly constructed buildings are
exempt. Despite such an exemption, housing developers may be wary
of starting projects in rent-controlled cities, thinking that a future gov-
ernment may change the law, extending rent control to their buildings.
   The third negative effect, misallocation of households to dwellings,
is clear when it is recognized that households paying a low controlled
rent are reluctant to move. Having given up a rent-controlled apart-
ment, the household would have to start paying rent at the free-market
level, either in an uncontrolled apartment or in another rent-controlled
apartment vacated by its tenant. This reluctance to move may leave
rent-controlled units in the hands of the wrong people, denying access
to households who value the units most.
   Although the second negative effect and the third are fairly clear
intuitively, it is useful to analyze them in more detail using an explicit

7.2.2 The stock-ﬂow model
Since housing is durable, lasting for decades before replacement, the
existing stock of housing is much larger than the “ﬂow” of new con-
struction. In the United States, the stock of housing is around 100
million units, and the ﬂow of new units is (in normal times) between
1 million and 2 million units per year. The stock-ﬂow model captures
this distinction between the stock of housing and the ﬂow of new con-
struction. The model assumes that all housing is rented, ignoring the
owner-occupied side of the market for simplicity.
   The left panel of ﬁgure 7.1 represents the stock side of the housing
market. The quantity of housing, measured in square feet of ﬂoor space
and denoted by H, is represented on the horizontal axis, with the price
per square foot p on the vertical axis. The stock supply curve, labeled
S0, is a vertical line at a quantity H = H0, which equals the size of

7.2.3 Demand shock and the imposition of rent control
To understand the motivation for imposition of rent control and its
ultimate effects, consider a housing market that starts in equilibrium
and is then subject to a demand shock. Such a shock, which shifts the
demand curve to the right, could come from an increase in the popula-
tion in the market. For example, the Miami housing market received
such a shock after the Mariel boatlift in 1980, which added 125,000
Cuban refugees to the area’s population in only a few months.
   In the absence of rent control, the adjustment to such a demand
shock can be traced using the stock-ﬂow model, as in ﬁgure 7.2. Start-
ing at D, the demand curve shifts rightward to D' , and the price per
square foot of housing shoots up to p' . This price increase indicates the
increased scarcity of housing, a result of the presence of more demand-
ers in the market. Note that the stock hasn’t yet increased in response
to the demand shock, which means that the new larger population
must ﬁt in the same total square footage as before. To achieve this
outcome, some existing residents must reduce their consumption of
housing, perhaps by moving in with relatives.
   In response to the higher price, new construction surges, yielding a
net increase in the stock equal to m, as in the right panel of ﬁgure 7.2.
Further adjustments follow the path seen in ﬁgure 7.1, with the stock

7.2.5 Misallocation of households to dwellings under rent control
Misallocation of households to dwellings, the third negative effect of
rent control, can also be seen in ﬁgure 7.2. This misallocation arises
from the existence of excess demand for housing during the period when
the rent control is effective (when the stock is below Ĥ in size). Con-
sider, for example, the situation immediately after the demand shock,
when p = pc and the stock is still at size He. As can be seen from the
ﬁgure, the quantity of housing demanded at price pc equals Ĥ , while
the quantity of housing available is only He, so the excess demand
equals Ĥ – He.
   Under conditions of excess demand, a commodity usually ends up
being allocated among consumers in a capricious fashion, with those
valuing the good most not necessarily getting it. To make this point
concrete, imagine the Miami housing market after arrival of the Cuban
refugees in 1980. Focus on two households: a little old lady (a long-time
Miami resident) occupying a spacious three-bedroom apartment with
her cats, and a Cuban refugee family with three children and ample
ﬁnancial resources. In the absence of rent control, the large increase in

the price per square foot in the Miami market would push the rent for
the lady’s three-bedroom apartment beyond her ability to pay, and she
would move into her daughter ’s house. The Cuban family would take
over her vacated apartment, with their large household size and their
ample resources making the high rent worth paying. In contrast, with
rent control, the little old lady’s rent would rise only a bit, straining her
budget slightly. By cutting corners ﬁnancially, she would be able to stay
in her apartment. With many other existing Miami residents making
similar decisions, the Cuban family would be unable to ﬁnd any rental
housing at all. As a result, the family would move into the basement
of a house belonging to a relative (an earlier migrant from Cuba), living
in cramped, uncomfortable conditions. This outcome indicates excess
demand because the Cuban family would like to consume a substantial
amount of housing at the controlled price pc, but cannot do so.
   The outcome reﬂects a misallocation of households to dwellings. The
Cuban family, with a high demand for space and the ability to pay,
consumes an inadequate amount of shelter, while the little old lady
continues to occupy an amount of space that is inappropriately large
in view of the true scarcity of housing after the demand shock. The
problem is that rent control prevents the proper scarcity signal (a high
market price) from being transmitted, which allows the lady to con-
tinue to inhabit an apartment that would more appropriately be occu-
pied by the Cuban family.4 The lady, of course, is better off as a result
and would thus vote in favor of a rent-control law. But the outcome
isn’t the right one from society’s point of view. Rent control is thus an
example of a government policy that beneﬁts a particular interest
group (existing residents who would like to stay in their current dwell-
ings) at the expense of society as a whole.

7.2.6 Other justiﬁcations for rent control?
It could be argued that if beneﬁts from rent control accrue to a group
that society would like to help, such as low-income renters, then
the policy may still be worthwhile despite its broader negative effects.
But Gyourko and Linneman (1989) show that rent-control beneﬁts in
New York City are distributed in a highly unsystematic fashion, not
being concentrated among any particular social group. Gyourko and

   Another argument in favor of rent control is based on concerns about
monopoly power in the housing market.5 In a monopolized rental
housing market, with a single landlord controlling all the dwellings,
rents will be too high and the supply of housing will be too small. By
forcing rents downward, a rent-control law in this situation would
work just like price regulation of a natural monopoly (such as a public
utility), and it would be in society’s interest. The question, though, is
whether monopoly power should ever be a concern in the housing
market. Since ownership of rental housing is very diffuse in most
markets, with holdings seldom concentrated in just a few hands, this
concern seems misplaced. Therefore, imposing rent control as a response
to concerns about market power is probably not justiﬁed.

7.3   Housing-Subsidy Programs

7.3.1 Overview
Rather than imposing rent control, an alternative way of reducing
housing costs is to use government funds to explicitly subsidize con-
sumption. Housing subsidies exist in various forms throughout the
world, with the expenditures generally targeted to low-income groups.
In the United States, subsidy programs are distinct from the federal tax
subsidy to homeownership, which involves a “tax expenditure”
(forgone tax revenue) rather than an explicit subsidy. Before discussing
the actual form of U.S. programs, it is useful to present a general analy-
sis of the forms that housing subsidies may take.
   The analysis recognizes that housing-subsidy programs may serve
two possible goals. The ﬁrst is to raise the standard of living of the
targeted group, low-income households. A second goal may be to
reduce the negative externality associated with the existence of areas
of substandard housing in the city. The existence of such areas, which
will be referred to as “slums,” is likely to reduce the urban quality of

5. Arnott (1995) argues that rent control may be helpful in an imperfectly competitive
housing market.
f146                                                              Chapter 7



life even for those individuals not living in them. Therefore, non-poor
households may be willing to pay taxes in support of housing subsi-
dies, recognizing that the resulting “slum-reduction” effect makes
the city a nicer place to live. Given this twin focus, the analysis consid-
ers two effects of housing-subsidy programs: their effect on the stan-
dard of living (utility) of low-income households, and their
slum-reduction effect. The magnitude of the slum-reduction effect
depends solely on the increase in low-income housing consumption
generated by the subsidy, whereas the utility effect depends on the
consumption of both housing and bread (the non-housing good). As
will be seen, the effects of housing-subsidy programs can differ along
these two dimensions.

7.3.3 Actual housing-subsidy programs
In the 1950s and the 1960s, public housing was the most popular
housing-subsidy program, with hundreds of thousands of units of
public housing built by local governments. But public housing has
since fallen into disfavor, and many of the housing projects are being
demolished. The reason public housing has lost support is that, owing
to the high concentration of poor households, public housing projects
became breeding grounds for crime and other social problems. Instead
of improving the quality of life of low-income households through
better housing, the projects came to be viewed as offering a worse
environment than the status quo.
   The PRS program discussed above also has several real-world coun-
terparts, although their rules are superﬁcially different from those in
the model. Under actual PRS programs, the government, instead of
paying a fraction of household rent, pays a portion of a building’s
development cost, with the understanding that the units must be occu-
pied by low-income households at reduced rents. The effect of such an
arrangement, however, is identical to that of the model’s PRS program.
In earlier years, the Section 236 program subsidized developers’ costs,
but more recently, the Low-Income Housing Tax Credit (LIHTC)
program has been the source of these subsidies.
   Aside from the LIHTC program, the other important current
source of housing subsidies is the Section 8 program. This program is
often referred to as a “housing voucher” program, but it works
differently than the model’s food-stamp-style vouchers. Under Section
8, the government pays a portion of a low-income household’s rent,
with the payment going directly to the landlord. To compute the
payment, the “fair market rent” for a dwelling large enough to accom-
modate the household is determined on the basis of local market
conditions. The subsidy is then equal to the difference between this
rent and 30 percent of the household’s income. Thus, the household
receives adequate housing in return for only 30 percent of its (low)
income.
   The Section 8 program limits the household’s freedom of choice
somewhat, preventing government funds from being spent on bread.
Therefore, although it doesn’t match up exactly with any of the pro-
grams in the model, Section 8 is similar to the PH and PRS programs
in its effects, yielding substantial slum reduction rather than allowing
the household greater freedom in use of the subsidy. Therefore, the
main current housing-subsidy programs (PH, LIHTC, and Section 8)
fHousing Policies                                                                    153



appear to put the highest priority on slum reduction, paying less atten-
tion to raising the utility levels of low-income households.

7.3.4 Effects of housing subsidies on neighborhoods
The poor performance of public housing in the United States is partly
a consequence of the negative “neighborhood effects” caused by spatial
concentration of poor households. An experimental program called
Moving to Opportunity (MTO) tried to overcome these effects by relo-
cating some public-housing residents to subsidized dwellings in non-
poor neighborhoods. Because the residents were chosen randomly, the
effects of a better neighborhood on various household behavioral out-
comes (mental health, risky youth behavior, economic self-sufﬁciency
of adults) can be measured without concerns about self-selection. These
concerns would be present, for example, if only those households with
the strongest capacities to achieve better outcomes had signed up
for the relocation program. According to Kling, Liebman, and Katz
(2007), the effects of living in a better neighborhood aren’t as pro-
nounced as might have been expected.
   Many other studies have attempted to measure of the strength of
neighborhood effects by relating household outcomes to neighborhood
characteristics without the beneﬁt of MTO’s experimental approach.
But they must contend with the self-selection problem, which arises
because people choose the neighborhoods where they live instead of
being assigned under an experimental program.8

in Europe.9 Homeless individuals do not own or rent a dwelling,

7.5   Summary

Rent-control laws, which limit the rents that landlords can charge, are
a common type of government intervention in the housing market, but
they have negative effects. Rent control leads to undermaintenance of
existing dwellings and reduces the incentives to construct new ones.
By making tenants reluctant to move out of cheap rent-controlled
housing, rent control also distorts the allocation of households to dwell-
ings. Housing-subsidy programs also are meant to make housing more
affordable, and their effects differ depending on the design of the
subsidy. Public housing and proportional rent subsidies lead to a larger
increase in housing consumption by low-income households than
other programs. This effectiveness in slum reduction may lead higher-
income taxpayers (who ﬁnance subsidy programs) to favor programs
of these kinds. Homelessness can be addressed by subsidies and by the
availability of charitable shelters, but elimination of housing regula-
tions that limit the availability of small dwelling units can also help.

8.1   Introduction

In the United States, most of the public goods and services that people
consume are provided by local jurisdictions, not by the federal or state
governments. The federal government provides national defense, inter-
state highways, national parks, and some other less visible public
goods and services. State governments provide highways, parks, and
higher education through systems of public universities. But it is local
governments that provide elementary and secondary education, police
and ﬁre protection, mass transit, city streets, recreational facilities,
public health facilities, sewers and sanitation, and other goods and
services. These goods play a bigger role in people’s daily lives than the
goods provided by higher levels of government. As a result, the eco-
nomics of local public goods and services constitutes an important
segment of urban economics.
   There are many types of local governments in the United States. The
most important are cities, counties, and school districts. Another type
of government is the “special district,” which provides a particular
public good (say, sewage and sanitation) over an area that doesn’t
necessarily match up with the boundaries of cities or counties. This
complexity of local governmental structures isn’t fully captured in the
present chapter. But the analysis focuses on the most crucial feature of
the local public sector: the fact that there are “many” local govern-
ments, in contrast to the existence of a single federal government and
relatively few (ﬁfty) state governments.
   The multiplicity of local governments means that people can change
their consumption of public goods and services by changing the juris-
diction in which they live. For example, within a given metropolitan
area, a family can move from a school district with poorly funded
f160                                                                           Chapter 8



schools to one with well-funded schools, or from a city with few poorly
maintained parks, to one with many well-maintained parks. Such
freedom of choice through location is not so easily available when it
comes to public goods and services provided by the federal or state
governments. Getting affordable access to better public higher educa-
tion, for example, may require a major move to another state,1 and a
different level of national defense isn’t available at all unless one is
willing to move to another country.
   Moving from one local jurisdiction to another in order to get a dif-
ferent level of public goods and services is called “voting with one’s
feet,” and it plays a major role in the economics of the local public
sector. To develop this theme, the chapter starts with an analysis of
“socially optimal” provision of a particular public good: police protec-
tion. The crucial feature of a public good is that consumption of the
good (the protection offered by a policeman) is “shared” among con-
sumers. Given this property, the “social” beneﬁt from an added unit of
the public good is found by summing the additional beneﬁt from the
extra unit across all the residents, who share consumption of the unit.
The social beneﬁt is then compared with the cost of the extra unit.
When the two are equal, the level of provision of the public good is
socially optimal.
   In Western countries, the democratic process guides the provision of
public goods, but the process need not lead to a socially optimal
outcome. The voting process is likely to lead to the wrong level of the
public good, one either higher or lower than the socially optimal level.
But this conclusion can be overturned by voting with one’s feet. When
people are free to move across jurisdictions in search of their desired
levels of public goods, the right outcome emerges. Each jurisdiction
ends up providing a public-good level that is socially optimal for its
population. Indeed, according to the theory, voting with one’s feet
should lead to very simple jurisdictional population compositions.
Jurisdictions end up being homogeneous in the strength of individual
demands for the public good, with each resident desiring the same level
of that good. Some jurisdictions will be populated entirely by higher
demanders of the public good and others entirely by low demanders.
   This view of the local public sector, which is based on a famous
article by Charles Tiebout (1956), is developed in sections 8.2–8.4, which

8.5 discusses another method beyond majority voting for choosing a

   The ideas developed in this chapter apply to an economy in which
local jurisdictions have substantial autonomy, being fully free to set
taxes and choose the levels of public goods. Such autonomy exists in
the United States, in Canada, and in a few other countries, but else-
where local governments have less freedom. For example, localities
may receive much of their revenue from higher levels of government,
which may also dictate the public-good levels that are to be provided.2
Although a desire to follow the U.S. model has spurred some move-
ment toward ﬁscal decentralization in countries around the world, it
should be borne in mind that in most countries, local governments still
have less autonomy than the ones depicted in this chapter.

8.2   The Socially Optimal Level of a Public Good

To illustrate the choice of the socially optimal level of a public good, a
stylized example is useful. Suppose that the public good in question is
police protection, and let the level of the good be represented by the
number of policemen on the force, denoted by z. As z increases, the
level of police protection (and hence public safety) rises. Suppose that
the jurisdiction contains only three people, with consumer A living in
a large house, consumer B in a medium-size house, and consumer C
in a small house. Suppose that all three consumers worry about bur-
glary, which generates a loss that depends on the size of one’s house.
Big houses contain more things that can be stolen.

C, with the differences due to the different sizes of the consumers’
houses. This policeman patrols the entire city, passing by each house
and thus deterring burglars at each location.

of patrols, reducing the chances of burglary and generating addi-

8.3.3 Observations on the outcome under voting with one’s feet
Under the majority-voting process, individuals in some sense lack
freedom of choice, since they may have to settle for a public-good
level different from their preferred one. But voting with one’s feet
creates freedom of choice, mimicking a market outcome. In other
words, even though a consumer cannot usually satisfy his or her prefer-
ences as a voter, a consumer can “shop” for the public-good level he
or she prefers through choice of a place to live, as if z were being bought
in a market.
   The theory says that this “shopping” process should end up creating
homogeneous jurisdictions, each ﬁlled with individuals whose public-
good demands are identical. If demand differences are due to differ-
ences in consumer incomes, then the prediction is that jurisdictions
should be homogeneous by income, with some jurisdictions poor and
some rich. Rich jurisdictions would provide high levels of the public
good, and their residents would pay high taxes. Poor jurisdictions
would provide lower levels of z, and they would levy lower taxes, in
keeping with their residents’ lesser ability to pay.
   Is this strong prediction of the theory accurate? On the one hand,
cities do tend to differ in incomes, being viewed as high-income,
fLocal Public Goods and Services                                                      169



middle-income, or low-income places. But this separation is by no
means sharp, with most cities containing a diversity of income levels.5
   Since the model is highly stylized, leaving out many aspects of
reality, an imperfect match between its predictions and real-world pat-
terns is to be expected. For example, the model assumes that public
goods are the only factor determining locational choice, when in fact
many other considerations matter. A consumer ’s job location, for
example, may make moving to another city impractical even though
that city offers a preferred public-good level. This obstacle is especially
relevant when the urban areas in question are relatively isolated and
not especially large, as in the case of cities dispersed across an agricul-
tural region. Job considerations, however, may be less of an obstacle to
voting with one’s feet in a large metropolitan area. If a consumer works
in central business district of the metropolitan area, he could alter his
public-good consumption while keeping the same job by simply
moving from one suburban bedroom community to another, which
would only require changing the commute trip to work. Other obsta-
cles to voting with one’s feet may exist, including family ties that
restrict mobility or preferences for amenities (a peaceful rural environ-
ment, or a view of the ocean) that may be lost after a move.
   Despite these obstacles, public goods and services appear to play a
substantial role in location decisions for many households. Families
with school-age children, for example, often pay close attention to
school quality when selecting a place to live in a large metropolitan
area, choosing a school district with the best possible schools (subject
to the affordability of taxes and housing). Thus, even though real-world
patterns do not match the model’s homogeneity predictions closely, the
notion of voting with one’s feet seems to contain a strong element of
truth.

8.3.4 Voting with one’s feet under a property-tax system
The analysis so far assumes that consumers pay a “head tax” of cz/n
that is equal to their per capita share of the cost of the public good. This
tax is the same for all residents of a jurisdiction, rich or poor. In reality,
however, much of the funding for public goods at the local level comes
from the property tax, with the tax payment depending on the size of
the consumer ’s house and thus ultimately on his or her income.

houses than they can afford, ﬁscal zoning eliminates their incentive for

8.3.5 Equity issues under voting with one’s feet
Although separation of the rich and poor into homogeneous jurisdic-
tions is “efﬁcient,” with each consumer type getting exactly its pre-
ferred level of the public good, the outcome may seem inequitable. For
example, if the public good in question is education, the poor end up
living in jurisdictions with low taxes and correspondingly poor schools,
matching their low incomes. Society may view this outcome as unfair
and undesirable.
   One widely practiced remedy for this inequitable educational
outcome is state aid to local school districts. Under such an arrange-
ment, some state tax revenue (collected through state income and sales
taxes) is distributed to school districts, with poor districts getting more
aid than rich ones. The goal is to even out differences in school quality,
so that low-income children aren’t penalized in educational access by
the low tax bases in their areas of residence. However, differences in
school quality typically remain despite the existence of state-aid
systems, so that incentives to vote with one’s feet are still present.

The incentives for consumers to separate into homogeneous jurisdic-

   As rich households leave the central city, their departure is likely to
create ﬁscal distress. The previous public spending level in the central
city, which probably reﬂected a compromise between rich and poor
demands, becomes unsustainable in the absence of high-income resi-
dents. A painful process of cutting the central city’s budget must then
ensue.
   One remedy for such ﬁscal distress is aid from a higher level of
government. Although state-aid systems can help central cities cope
with the loss of rich households, another often-suggested remedy is the
creation of a metropolitan-area-wide governmental structure, which
would allow resources to be transferred from the suburbs to the central
city. However, political support for this remedy may be lacking, given
that it cancels some of the gains that rich households reap by forming
their own homogeneous jurisdictions.

8.3.7 Voting with one’s feet and peer-group effects
Voting with one’s feet may reduce the beneﬁts from “peer-group
effects”—neighborhood effects (see chapter 7) that usually arise in an
educational context. In the classroom, disadvantaged students from
low-income households typically perform better if their peers include
higher-income students, who beneﬁt to a greater extent from costly
extracurricular activities (tutoring, computer access, music lessons, and
so on) that may raise their level of general knowledge and make them
more receptive to learning.11 But since voting with one’s feet tends to
divide income groups into separate homogeneous jurisdictions, these
peer-group beneﬁts for low-income students may be reduced. Group
separation may also reduce peer-group effects not directly related to
education, such as the role-model beneﬁts that come from residential
intermixing of lower-income workers and successful higher-income
employees.12

8.4   Public-Good Congestion and Jurisdiction Sizes

8.4.1 Basics
In the three-person jurisdiction considered above, a public-good level
of z could be consumed at a per capita cost of cz/3, whereas the same
level would cost only cz/100 per capita in a jurisdiction of size 100.
This dramatic cost saving reﬂects the implicit assumption that z is a
pure public good, which means that a ﬁxed spending level can be spread
over more and more people as the population grows without any loss
in consumption of the good. This assumption is unrealistic for most
public goods, since spending usually must increase as the jurisdiction’s
population grows in order to maintain public consumption.
   In order to understand this point, consider the police example that
was used above. In the three-person jurisdiction, imagine that the
houses of the three consumers are far enough apart that it takes an hour
for a single police patrol to pass by each house. Thus, if the jurisdiction
has one policeman, he passes each house once per hour. If it has two
policemen on staggered patrols, each house is passed by two patrols
per hour, and so on. The number of patrols per hour (a natural measure
of police protection) is then equal to the number of policeman on the
force.
   Now suppose that the jurisdiction doubles in size to six consumers,
and that its spatial area doubles as a result. Now one policeman has
farther to travel and can pass by each house only once every 2 hours
instead of hourly. Thus, with one policeman, patrols per hour would
equal 1/2, and with two policemen, patrols per hour would equal 1.
To maintain a given level of police protection, say one patrol per hour,
the number of policemen on the force therefore must double from 1 to
2 when the community population doubles. To keep patrols per hour
constant at 2, the police force again must double (from two to four
ofﬁcers), and a similar doubling is required for other target values of
patrols per hour.
   Alternatively, the city might become denser as its population doubles,
so that its spatial area would less than double. Then, to maintain a
particular number of police patrols per hour as the city population
doubles, the size of the police force could less than double.
   When additional resources are needed in this fashion to keep public
consumption constant as a jurisdiction’s population grows, the public
good is said to be congested. To represent the cost of providing a con-
gested public good, let n denote the jurisdiction’s population size.
fLocal Public Goods and Services                                                         175



Then, the cost parameter c from above is replaced by an increasing
function c(n) that depends on n. The cost of providing a public con-
sumption level z to the jurisdiction’s n residents is then equal to c(n)z.
In the police example, z would be patrols per hour, and c(n) would be
proportional to n in the case in which the city’s spatial area doubles
when population doubles.13 The function would increase less than pro-
portionally with n in the rising-density case.
   Whereas the above discussion considered several different arbitrary
jurisdiction sizes (n = 3, n = 100), an optimal jurisdiction size usually
emerges when the public good is congested. The optimal size is the
value of n that minimizes the per capita cost of the public good. The
cost per capita is c(n)z/n, and for any z, this cost is lowest at the n value
that minimizes c(n)/n. Figure 8.6 shows the graph of c(n)/n, which is
depicted as U-shaped, and the resulting optimal jurisdiction size,
denoted by n*. Consumers will be best off if they live in jurisdictions
of size n*, getting the public good as cheaply as possible.

causes the cost of providing any given z to rise, as captured by the

the ratio c(n)/n. At the optimal jurisdiction size n*, these forces just
balance, with the loss resulting from additional congestion just cancel-

8.5   Capitalization and Property-Value Maximization

8.5.1 Capitalization
The analysis of voting with one’s feet under property taxation in
subsection 8.3.4 drew a connection between public goods and the
housing market. This connection has been a major focus of research in
public economics, with much attention directed to the phenomenon of
capitalization. This term refers to the link between house prices and
public-good levels, which comes from a compensating differential
like that in the urban model of chapter 2. The idea is that a renter
household should be willing to pay a higher rent in a jurisdiction with
a high public-good level than in a community that provides a lower z.
The higher rent payment leaves less money for bread, ensuring that
utility is the same in the high-z and low-z jurisdictions. Although capi-
talization thus might appear to undercut the incentive to vote with
one’s feet, homogeneous communities are still predicted to emerge
when it occurs.
   Sonstelie and Portney (1980) provide evidence that capitalization
indeed affects rents. They use a hedonic rent regression like those dis-
cussed in chapter 6, with the regression including measures of public-
good levels along with housing characteristics. The public-good
coefﬁcients are positive, showing that rents are indeed higher in high-z
jurisdictions, with housing characteristics held constant.
f180                                                                Chapter 8



   Rather than focusing on rents, most empirical research on capitaliza-
tion studies the link between house values and public goods. House
values are linked to rents in a simple fashion. The value of a rental
house is just the present discounted value of the net income that ﬂows
to its owner. If there are no operating costs, then value is just the present
value of the rent ﬂow. With Rj denoting the rent earned by house j and
θ denoting the interest rate, the value of house j then equals Rj/θ.18 But
the owners of rental properties face various operating costs, a major
one being the annual property-tax payment. If Tj is the property-tax
payment for house j, the net income equals Rj – Tj, so that the value of
the house is equal to (Rj – Tj)/θ.
   Since rent still depends on public-good levels, house value as given
by this formula also depends on those levels. But the formula shows
that another public-sector variable, property taxes, also affects house
values. Higher taxes leave less income for a house’s owner, thus
depressing the house’s value.
   Since the capitalization effect now includes both property taxes and
public-good levels, the Sonstelie-Portney-style hedonic regression must
be altered. The regression now uses house value rather than rent as
the dependent variable, and the house’s property-tax payment (or
the jurisdiction’s property-tax rate) now appears along with z as an
explanatory variable. Following the pioneering work of Oates (1969),
dozens of empirical studies have estimated such regressions, ﬁnding
the predicted positive z effect as well as a negative effect of property
taxes.

non in fact provides a way for local governments to set public-good
levels in a socially optimal manner.

the government: property values in the jurisdiction, which are needed
to compute individual property-tax bills. Under this approach, the
government sets z so as to maximize the jurisdiction’s aggregate prop-

    This analysis shows that if the jurisdictional government were
granted authority to set the public-good level, with voters relinquish-
ing their right to set it, then the social optimum could be achieved
through property-value maximization. Given that voters cherish their
right to decide public issues, such an abandonment of control may
seem implausible. But local governments do have the power to make
some spending adjustments without direct voter approval, and
property-value maximization could guide them to good decisions.
More generally, the analysis shows that it is reasonable to pay attention
to changes in property values when evaluating the desirability of
public policies. In many cities, local Chambers of Commerce often seem
to argue this point, and they are right.

8.6   Tax and Welfare Competition

8.6.1 Tax competition
So far, the existence of many jurisdictions that offer different public-
good levels and compete for residents (so as to achieve an optimal size)
has been portrayed as beneﬁcial, leading to a socially optimal outcome.
But economists have also recognized that interjurisdictional competi-
tion has a downside, resulting from particular effects of taxation that
have not been considered so far. These effects emerge when jurisdic-
tions rely on a property tax rather than using a head tax to ﬁnance
public spending.
   A property tax leads to unequal tax burdens that may encourage
intermixing of the rich and poor (as was seen in subsection 8.3.4). But
the tax may also affect the extent of investment in housing in a jurisdic-
tion. A high property tax reduces the return that developers earn from
housing investments, and this effect may cause the developers to move
their housing capital (the building materials used to produce struc-
tures) to a lower-tax jurisdiction where a better return can be earned.
Thus, jurisdictions with a high property-tax rate may end up with a
low tax base (low investment in housing) as developers move their
projects elsewhere. Aware of this reaction, local governments will be
reluctant to charge high property-tax rates, and each government will
therefore tend to keep its tax rate low. In doing so, each jurisdiction is
engaging in what is known as “tax competition.” But since property-tax
revenue pays for the public good, these low tax rates translate into low
levels of z. Each jurisdiction may realize that the resulting public-good
level is lower than the one consumers would prefer, but it knows that
raising its tax rate so as to raise z would just lead to a counterproduc-
tive loss of tax base.
   If jurisdictions could somehow agree to raise their tax rates simul-
taneously, in which case no housing capital would move, then a socially
desirable increase in public-good levels could be achieved. But since
this kind of tax coordination usually isn’t feasible, the outcome with
low public-good levels will persist. Tax competition thus leads to
underprovision of public goods, according to the theory.21
   Thus, although local control of public-good provision generates ben-
eﬁts through the possibility of voting with one’s feet, it also opens the
door to tax competition and its undesirable effects. This trade-off raises
an interesting question: Would it be better to eliminate local autonomy

21. See Wilson 1999 for a survey of the large theoretical literature on tax competition.
f184                                                                         Chapter 8



in the provision of public goods, and have the national government
dictate a uniform level of z across all jurisdictions along with a uniform
property-tax rate? With the resulting centralization of control, voting
with one’s feet wouldn’t be possible, but tax competition would stop.
Brueckner (2004) addressed this question and showed that the answer
is “It depends.” Centralization may be better than local autonomy
under some circumstances and worse under others.

8.6.2 Welfare competition
Welfare competition is similar to tax competition. To see how, ﬁrst note
that the welfare system in the United States, which supports poor
households with children, is administered at the state level. Each state
is free to set the level of its welfare beneﬁts, with the resulting expen-
ditures partly supported by federal grants. As a result, some states offer
generous welfare beneﬁts and others are less generous.
    Differences in welfare beneﬁts across states may lead to “welfare
migration,” a phenomenon in which poor households move to gener-
ous states in search of a better standard of living. This possibility
creates a situation very much like tax competition, with the mobile poor
now playing a role like that of housing capital. In particular, with
welfare migration, a state will attract a larger poor population if it
raises its welfare-beneﬁt level. This inﬂow creates a</span><span data-dcnode-id="136" instrument_node="">n extra burden for
taxpayers, given that the higher beneﬁt must be paid to the newcomers
as well as to the current poor residents. As a result, states will be reluc-
tant to raise welfare-beneﬁt levels, being less generous than they would
be if welfare migration didn’t occur. Thus, welfare beneﬁts are under-
provided, in the same way that public goods are underprovided under
tax competition.
    A remedy for the resulting underprovision can be implemented
through the structure of federal grants. If grants take a “matching”
form, with the federal government paying a percentage of the state’s
chosen welfare-beneﬁt level, then the perceived marginal cost to the
state of a dollar ’s increase in welfare beneﬁts will be lower. With the
matching rate set correctly, welfare beneﬁts will rise to a socially
optimal level despite the drag imposed by welfare migration. Until the
mid 1990s, the welfare system did include federal matching grants. But
welfare reform replaced this structure with a system of block grants
that fails to generate the correct incentives for states.22

8.6.3 Interjurisdictional competition as a disciplinary device
Although local governments have so far been portrayed as acting in
the best interests of their residents, other types of behavior are possible.
Local governments could produce public goods inefﬁciently as a result
of inattention or laziness. Alternatively, local governments could be
efﬁcient producers, but they could engage in “rent seeking,” in which
some tax revenue is diverted to uses that beneﬁt local ofﬁcials (nice
ofﬁces, generous pensions, and so on) without helping consumers.
   Competition between jurisdictions might help to limit such undesir-
able behavior. Jurisdictions in which inefﬁciency or rent seeking leads
to excessive taxes relative to the public goods provided will fail to
attract residents who are voting with their feet. They will also fail to
attract housing developers, who will build projects in jurisdictions with
lower tax burdens. These losses will tend to punish and thus eliminate
undesirable governmental behavior, reinforcing the positive side of
interjurisdictional competition.23

8.7   Summary

At the socially optimal level of a public good, the marginal social
beneﬁt of an additional unit is equal to the unit’s cost. Majority voting,
which often determines the level of public spending, unfortunately
doesn’t generally lead to socially optimal levels of public goods. But
voting with one’s feet, in which consumers “shop” across jurisdictions
for their preferred public-good levels, can generate the social optimum.
Ideally, this process should lead consumers to separate into homoge-
neous jurisdictions of optimal size, with the residents of each jurisdic-
tion having the same demand for public goods. But real-world frictions
prevent this idealized prediction from being perfectly realized.
Property-value maximization by local governments offers another way
of achieving optimal provision of public goods, though it is not likely
to replace the voting process. As jurisdictions worry about the loss of
housing investment, tax competition may keep local taxes too low,
offsetting the beneﬁts of voting with one’s feet. Welfare competition
may similarly lead to inadequately generous welfare beneﬁts.

9.1   Introduction

Pollution has reduced the quality of life in cities for hundreds of
years, especially since the dawn of the Industrial Revolution. Some
pollutants affect air quality, and others compromise the quality of
groundwater and the water in rivers. Beyond the local effects of pollu-
tion, the greenhouse gases produced by all types of combustion con-
tribute to global warming, with potentially harmful long-term effects
on the environment.
   In developed countries, urban air pollution has become less severe
as factories, power plants, and automobiles have gotten cleaner.
In addition, rivers and streams are less polluted than they once were.
But serious air-quality problems remain in some cities in developed
countries (Los Angeles, for example), and severe air pollution contin-
ues to afﬂict many cities in the developing world (Mexico City, for
example).
   Since air pollution should thus be high on anyone’s list of urban
problems, it is important to gain an understanding of policies that are
designed to reduce it. This chapter serves that goal by analyzing the
generation of pollution and policies that attempt to limit it. Section 9.2
considers a simple, stylized setting in which a single factory pollutes a
neighborhood, causing harm to the residents. The analysis shows that
the air pollution generated by the factory is higher than the socially
optimal level. Direct regulation of the factory’s pollution level is one
way of eliminating excess pollution, and imposition of a pollution
tax is another. Section 9.3 considers a different solution: bargaining
between the ﬁrm that owns the factory and the neighborhood’s resi-
dents. The analysis derives the famous Coase Theorem, which shows
that, under some circumstances, bargaining between the polluter and

the affected parties leads to the socially optimal pollution level. Section
9.4 considers a more realistic setting in which many factories contribute
to the pollution in an area. In this setting, a “cap-and-trade” system for
reducing pollution may be desirable.

9.2.2 The socially optimal level of pollution
If there were no penalty for polluting, the ﬁrm would keep increasing
pollution until the marginal beneﬁt from an additional unit was zero.
Thus, the ﬁrm would choose the “free pollution” level P, where MB
falls to zero and no money at all is spent on abatement. This pollution
level is not socially optimal, because the ﬁrm considers only its own
proﬁt, ignoring the damage to the neighborhood residents. This total
damage equals the area under the MD curve up to P, or C + E + F in
ﬁgure 9.4. Thus, as is typically the case with negative externalities, the
externality-generating activity occurs at too high a level.
    To ﬁnd the socially optimal level of pollution, the interests of both
the ﬁrm and the residents must be considered. An additional unit of
pollution is “desirable” from society’s point of view as long as the
beneﬁt to the ﬁrm from the additional unit exceeds the damage to
consumers. This relationship holds as long as the MB curve is higher
than the MD curve. Thus, starting at P = 0, pollution should be increased
up to the point where the MB and MD curves intersect. The resulting
pollution level, P* in ﬁgure 9.4, is socially optimal because the beneﬁt
from an additional unit of pollution just equals the damage it causes.
The socially optimal level of pollution thus lies well below the free-
pollution level.

is simply to note that the last few units of pollution are very costly to
clean up (the MB curve is high when P nears zero), and that these units
cause little damage anyway (the MD curve is low in this range). As a
result, it makes sense not to clean up these units, implying that it is
optimal to tolerate some pollution. The second way to see why zero
pollution is wrong is to suppose that all the shareholders in the ﬁrm
that owns the factory live in the neighborhood, and that the ﬁrm pays
out all of its proﬁts in dividends. Then, starting from P = 0, an increase
in pollution raises the ﬁrm’s proﬁts (as captured by MB), and thus
raises the residents’ dividend income, at the same time that it generates
dollar damages. The residents will accept the damage from an addi-

the dollar cost of the damages—that is, as long as MB &gt; MD. Thus, P*

shareholder-residents. This logic applies more broadly insofar as pol-
luting factories are usually publicly owned, so that the owners are
victims of the pollution created.

9.2.3 Achieving the social optimum
Whereas industrial factories polluted the environment wantonly
through much of the industrial era, it could be argued that nowadays
ﬁrms pay attention to their corporate images, which can be hurt by
unrestrained pollution. Although this point could be used to argue that
factories will no longer pollute at level P, it is almost certainly the case
that the socially optimal level, P*, cannot be achieved without govern-
ment intervention or some other type of action.

one hand, the government could regulate pollution directly by impos-

socially optimal level, P*. A ﬁrm seeking to minimize its abatement

approach would rely on what is known as a Pigouvian tax, after the

would set t equal to the common height of the MB and MD curves at

9.3 Bargaining as a Path to the Social Optimum: The Coase
Theorem

In a famous and inﬂuential article published in 1960, Ronald Coase
argued that bargaining between the party generating an externality
and those affected by it could, under some circumstances, lead to the
social optimum. As a result of bargaining, the externality-generating
activity would be set at the socially optimal level.
   Coase argued that two conditions must be satisﬁed for this outcome
to occur. First, the costs of engaging in the bargaining process must be
sufﬁciently low. If only a few individuals are affected by an externality
and only a single party generates it, a bargaining session can be
arranged with little cost. But if thousands of people are affected by the
externality, it will be difﬁcult and costly to organize a bargaining
session in which the interests of all the victims are represented. Bar-
gaining then may not be feasible. In the simple case presented in this
chapter, in which a factory pollutes a surrounding neighborhood,
suppose that the affected population is small enough that bargaining
costs are negligible, satisfying the ﬁrst of Coase’s requirements.
   Coase’s second requirement is that “property rights” must be
assigned. This requirement sounds abstract, but it is easily understood
in the context of the factory-and-neighborhood example. In this
example, there are two possible assignments of property rights. Under
the ﬁrst assignment, the ﬁrm has the right to pollute. Under the second
assignment, the neighborhood residents have the right to clean air.
Assignment of property rights is necessary because it sets the status
quo, the starting point for the bargaining process.
fPollution                                                              197



   When the ﬁrm has the right to pollute, the status quo will be the
free-pollution level, P . To achieve a lower level of pollution, the resi-
dents must induce the ﬁrm to reduce P, an outcome that requires a cash
payment to the ﬁrm in order to make the reduction worthwhile. In
contrast, when the residents have the right to clean air, the status quo
is P = 0. In order to avoid having to perform a costly complete cleanup
of the pollution, the ﬁrm must induce the residents to accept a higher
pollution level. It does so by making a cash payment to them.
   To understand the role of property rights, imagine the situation if
there were no clear assignment of such rights. The ﬁrm might then
choose the free-pollution level, but the residents would contest its right
to pollute that much. While recognizing that a cash payment would
make the ﬁrm reduce P, the residents, not accepting the legitimacy of
the status quo, would not be willing to make such a payment. A
property-rights assignment favoring the ﬁrm would provide this legiti-

9.4   Cap-and-Trade Systems

9.4.1 Background
Unfortunately, the stylized pollution scenario discussed so far isn’t an
accurate depiction of the real-world contexts in which most pollution
occurs. For example, in the Los Angeles metropolitan area, air pollution
mainly comes from the millions of cars, trucks, and buses using the
area’s streets and freeways. Thus, rather than emanating from a single
source, pollution is generated by a multitude of small sources and a
few large polluters. In addition, rather than affecting a single neighbor-
hood, the pollution affects millions of residents over hundreds of
square miles of land area. Similarly, the acid rain that affects a wide
portion of the Eastern Seaboard of the United States is the result of
pollution from a large number of coal-burning power plants and fac-
tories scattered across the eastern half of the country. In such situations,
bargaining between polluters and victims is obviously not practical as
a remedy for the pollution externality.
   To control pollution from automobiles, the U.S. government instead
relies on direct regulation. Automobile emission standards have greatly
reduced the amount of pollution generated by cars in the United States,
and fuel-economy standards have compounded these gains by reduc-
ing the amount of gasoline burned.
   In principle, pollution from large stationary sources (power plants
and factories) can be limited by imposing Pigouvian taxes. Govern-
ment regulators would measure the source’s pollution output and levy
a tax on each unit of pollution generated. As was explained above, the
tax would provide an incentive to install abatement equipment such as
smokestack scrubbers, which would reduce pollution and thus reduce
the source’s tax liability.
   Despite the feasibility of pollution taxes, a different system for con-
trolling pollution from stationary sources is used in the United States
and Europe. The system has some elements in common with the pol-
lution standard discussed above, and it is known as a “cap-and-trade”
system. Under such a system, certiﬁcates called “pollution rights” must
be acquired in order for a factory or power plant to emit pollution. One
pollution right entitles the holder to emit one unit (say, a ton) of pol-
lutants, so that a factory or power plant must acquire a number of
pollution rights that exactly matches its pollution output.
   Under a cap-and-trade system, the government ﬁrst decides how
much total pollution it will tolerate from polluters in a given area. Then,
fPollution                                                                201



it distributes (for free) a corresponding total number of pollution rights
among these factories and power plants. With this step, total pollution
is “capped” since its volume cannot exceed the number of distributed
pollution rights. The second feature of the system is that it allows trade.
The distributed pollution rights can be “traded” among the holders, a
process that would actually rely on a market in which pollution rights
are bought and sold. This system would allow dirty pollution sources,
for whom cleanup is very costly, to buy more pollution rights than they
received under the government distribution. Clean sources, who may
have gotten more pollution rights than they need, would sell some of
their allocation on the market. Under a variant of the cap-and-trade
system, there would be no initial distribution of pollution rights.
Instead, the government would simply sell a ﬁxed number of rights,
adjusting the price so that demand by polluters equals the ﬁxed supply.

9.4.2 Analysis
A cap-and-trade system has desirable properties, and to understand
them, more analysis is needed. Accordingly, consider a region that
contains n stationary pollution sources, say factories or power plants.
The level of pollution from polluter i is denoted by Pi, where i = 1, 2,
. . . , n. Pollution from all these sources stays within the region, and it
combines to generate a total pollution level of P = ∑ i =1 Pi , which is

the n polluters. Each polluter has an individual optimal pollution level,
denoted by Pi* for polluter i, with ∑ i =1 Pi * = P * .

    The social optimum is found in two steps. First, for any given total
pollution level P, the optimal distribution of this total across polluters
must be found. This distribution is the one that makes total abatement
costs as small as possible, holding total pollution ﬁxed at P.
    To see what the optimal distribution of pollution requires, suppose
that individual pollution levels Pi have been assigned to the polluters,

total pollution stays constant at P. Then, polluter k’s abatement costs
go down by MBk, while the abatement costs of polluter j rise by MBj.
But since MBk &gt; MBj, k’s cost decrease is larger than j’s cost increase, so
that total abatement costs fall. This conclusion means that any assign-
ment of pollution levels that leaves marginal beneﬁts unequal between
any pair of polluters cannot be optimal. Thus, marginal beneﬁts must
be the same for all polluters:

MB1 = MB2 = ⋅ ⋅ ⋅ = MBn – 1 = MBn.

With pollution assigned to equate marginal beneﬁts, the second step is
to choose the optimal total level of pollution, P*. This total is chosen
using the previous approach: at P*, the polluters’ common MB level is
equal to MD.
   As before, a substantial amount of information would be needed to
compute P* along with the Pi* values for the individual polluters. Each
polluter ’s MB curve must be known along with the MD curve. If this
information were available, the government could generate the social
optimum either by using pollution standards, with maximum pollu-
tion levels set for individual polluters, or by using a Pigouvian tax
system.
   In practice, governments do not have access to all this information.
As a result, they make no attempt to compute the optimal total level
of pollution. Instead, a government will, in effect, “guess” as to the
correct level of P, deciding in some fashion about the total pollution
level it will tolerate. But after making such a guess, the next challenge
is distribute the chosen total amount of pollution across polluters in an
optimal fashion, leading to the lowest possible abatement cost. The
beauty of the cap-and-trade system is that it achieves this goal.
   To see how, suppose that the government decides on a total pollution
level of P̂u0002. It then allocates Ri pollution rights to polluter i, with

chosen level of total pollution. A pollution right market comes into
being, so that polluters needing more rights than they were allocated
can buy them, and polluters with excess rights can sell them. Let the
market price of a pollution right be s.
fPollution                                                                    203



    Initially, each polluter can only pollute up to a level equal to the
number of pollution rights it has been allocated. If polluter i wants to
set Pi above Ri, then it must buy more pollution rights on the market
at the price s. The polluter ’s beneﬁt from an additional unit of pollution
(its proﬁt increase) is MBi, but it has to pay s for the additional pollution
right required to generate an additional unit. Thus, the net beneﬁt of
the additional unit of pollution is MBi – s. The polluter will increase its
pollution level Pi up to the point where this net beneﬁt equals zero, or
MBi = s.
    What if a polluter j has too many pollution rights and wants to sell
some? In this case, the polluter gets s for selling an additional pollution
right, but it then has to reduce its pollution, incurring MBj in additional
abatement costs. The net beneﬁt from selling the pollution right is then
s – MBj, and the ﬁrm will stop selling rights when this net beneﬁt is
zero, or when MBj = s. Thus, regardless of whether a polluter buys or
sells pollution rights, it equates its marginal beneﬁt to s in setting its
level of pollution.
    But if the MB’s of all the different polluters are equal to s, then they
all equal to one another, just as required under the socially optimal
distribution of pollution from above. Therefore, the cap-and-trade
system generates a socially optimal outcome, conditional on the gov-
ernment’s choice of P. In other words, the cap-and-trade system ensures
that the chosen total pollution level will be generated with the lowest
possible total abatement costs.4
    Note that the operation of the pollution-rights market will ensure
that sales and purchases of rights exactly balance, an outcome that
requires a market-clearing level for the price s. Another observation is
that the (conditional) social optimum will also emerge if polluters start
out with no pollution rights and must buy them from the government.
Then every polluter will be a buyer, and each equal will set MB equal
to the price s in choosing its level of pollution (and its purchase of pol-
lution rights). As before, all the MB’s are equal in the end.
    A ﬁnal point is that, when pollution rights are distributed for free,
the pattern of distribution can enrich some polluters while putting
burdens on others. In particular, ﬁrms who are allocated more pollution
rights than they need will earn windfall proﬁts from selling the excess,
while ﬁrms on the buying side, who were initially allocated too few
pollution rights, will see their proﬁts depressed by the required outlays.

9.4.3 Real-world cap-and-trade systems
The 1990 Clean Air Act created the Acid Rain Program, a cap-and-trade
system for regulating the emissions of sulfur dioxide (SO2) from U.S.
power plants using fossil fuels (coal, oil, and natural gas). At its outset,
the program required 261 power plants in 21 states to cut emissions,
with the goal of reducing acid rain in the eastern part of the United
States. The plants were given “emission allowances” (pollution rights),
and the total allotment decreased over time in order to generate the
desired emission reductions. By 2007, the program had reduced SO2
emissions by 50 percent relative to 1980 levels (Environmental Protec-
tion Agency 2009).
   The European Union in 2005 instituted a similar cap-and-trade
system focusing on emissions of greenhouse gases (carbon dioxide).
The system caps emissions from large sources such as power plants
and factories, and it covers a substantial share of CO2 emissions in
the EU.

9.5   Evidence on Air Pollution and Property Values

While the harm from air pollution could in principle be measured by
asking health experts to estimate it, another approach relies on infor-
mation from the housing market. If urban residents are harmed by air
pollution, then they will not pay as much for a house in a polluted area
as for one in an area with clean air. Thus, following the principles of
chapter 2, a compensating price differential will emerge between
houses in areas with good and bad air quality. This differential can, in
turn, be measured using a hedonic price regression like those discussed
in chapter 6. The estimated house-price differential is then a measure
of the dollar value of good air quality to consumers.
   The earliest hedonic air-quality study was by Ridker and Henning
(1967), and it used data on average sales prices, property characteristics
and neighborhood air quality for census tracts in the St. Louis metro-
politan area. Following this study, a large literature developed, and its
results are summarized by Smith and Huang (1995). Their overview
shows that the estimated value of air quality tends to vary widely
across different studies and that it is sometimes small in numerical
magnitude. More recently, Chay and Greenstone (2005) took an atypi-
cal approach by using county-level data, including the average value
of houses in the county, average air quality and other variables, instead
of using more disaggregated data.5 These authors use better statistical
fPollution                                                                             205



procedures than previous studies, which control for the possibility of
consumer self-selection across counties on the basis of air quality.6
   Their results show a larger air-quality impact on house values than
most earlier studies, with an estimated elasticity of –0.20 to –0.35
(implying that a 1 percent increase in air pollution reduces the value
of a house by between 1/5 and 1/3 of a percent). Using the estimates,
the authors calculate that tougher enforcement of U.S. air-quality stan-
dards over the 1970s generated an aggregate property-value increase
of $45 billion, which represents the dollar beneﬁt to consumers of the
resulting air-quality improvement.

9.6   Summary

Since pollution affects urban areas worldwide, it is important to under-
stand the workings of policies that are designed to attack excessive
pollution. One remedy for overpollution by a single stationary source
like a factory is a pollution standard, which imposes a pollution limit
equal to the socially optimal level. Another approach relies on a Pig-
ouvian tax, under which the polluter pays a tax per unit of pollution
generated. Although the information requirements for pollution stan-
dards and Pigouvian taxes are high, a simpler approach is to use a
non-Pigouvian tax, under which the tax liability for any level of pollu-
tion is just equal to the total damage it generates. When the costs of
bargaining are low and property rights over the pollution externality
have been assigned, excess pollution can be eliminated through bar-
gaining between the parties involved. This conclusion (the Coase
Theorem) means that government intervention may not be required to
reduce pollution. In more complex and realistic situations involving
multiple pollution sources, computing the socially optimal level of pol-
lution may be difﬁcult. However, the government can arbitrarily pick
a target level of total pollution and, by using a cap-and-trade system,
can ensure that this target is achieved with the lowest possible total
abatement cost.

10.1   Introduction

Like pollution, crime reduces the quality of life in cities, where it is
usually concentrated. In addition to imposing large losses on victims,
crime affects the patterns of daily living for everyone in cities where it
is high. Residents avoid certain dangerous areas, and they may be
reluctant to go out at night. Much crime is related to theft of property
(cars, wallets, household goods, and so on) or to protection of economic
interests (as when a drug lord is killed by a competitor). Other crimes
(assault or murder committed in the heat of anger, or rape), yield no
economic beneﬁt to the perpetrator.
   Property crime arises partly from the inability of potential criminals
to earn adequate livelihoods in legitimate activities, a limitation that
may be a consequence of their low abilities and education levels or
perhaps antisocial tendencies. This insight is the foundation of the
economic theory of crime, which is the main focus of this chapter.
Although property crime requires the presence of a disadvantaged
group, it also is spurred by the availability of “loot”: property owned
by a separate prosperous segment of the population, which can be
stolen by criminals. Thus, along with poverty, wealth plays a role in
the generation of property crime. A society’s standards of behavior may
also matter. Criminal activity may bring scorn on an individual from
his or her peers, which may reduce the incentives to carry it out.
   The level of crime also depends on the likelihood and the severity
of punishment. These factors, in turn, depend on the size of a city’s
police force (which determines the likelihood that a criminal will be
caught) and on the money spent on prisons (which determines the
capacity to impose long jail sentences on convicted criminals). Crime
is also made easier when criminals have access to guns. When guns
f208                                                                       Chapter 10



aren’t easy to obtain, crimes that involve the intimidation of victims
(store or bank robbery, for example) are harder to commit.
   The economic theory of crime incorporates all of the above factors:
the existence of a disadvantaged group, the presence of wealth, the
likelihood and severity of punishment, the ease with which crimes can
be committed, and society’s behavioral standards. The theory, origi-
nated in a paper published in 1968 by Gary Becker, is explained in
section 10.2. It is extended in section 10.3, which also discusses a more
recent approach to the analysis of crime that focuses on neighborhood
effects and social networks. Extending the public-sector analysis of
chapter 8, section 10.4 addresses a crime-related resource allocation
problem: how to divide a city’s police force between its rich and poor
neighborhoods.

10.2   The Economic Theory of Crime

10.2.1 A simple model
In order to develop a clear picture of how economic factors determine
the level of crime in a city, a simple model is useful. This model builds

criminals also decide on the “intensity” of their criminal activity (the

doesn’t consider the latter choice, assuming instead that each criminal

focuses on property crime, although it can be altered to apply to other
types of crime.

it. The second step would again be to determine the level of crime that
minimizes overall cost, now equal to victim cost plus combined police
and prison costs.

persuade them to try a life of crime even though there is no current

at which point even more legitimate workers would (according to the
stability arguments discussed above) have an incentive to switch.

10.3.2 Neighborhood effects, social networks, and crime
Chapter 7 argued that when disadvantaged households can escape the
negative neighborhood effects felt in poor areas by moving, the result
may be better labor-market outcomes for adults and better educational
outcomes for children. The Moving to Opportunity program provided
experimental evidence partly conﬁrming such improvements. Con-
versely, for poor households that remain in place, negative neighbor-
hood effects may contribute to bad life outcomes.
   Criminal behavior is such an outcome, and it can be generated
through neighborhood effects. Social networks in a neighborhood may
link individuals to other people who are criminals, and these linkages
may lead to criminal activity instead of legitimate employment. The
mechanism could be criminal “tutoring,” in which established crimi-
nals teach people in their social networks the skills needed for success
in criminal activity. In the context of the model, the better skills learned
through tutoring would reduce the effort e needed to commit crimes,
raising the incomes of criminals and making criminality more attrac-
tive. In addition, by putting individuals in touch with criminal role
models, social networks might reduce the perception of social stigma
from criminal activity, which also would reduce e.
   The criminal networks that develop through social ties often rely on
an individual known as a “key player.” Although many criminals in
the network may know him, they may not know one another directly,
fCrime                                                                 219



being connected only indirectly through their links to the key player.
Thus, if the police can identify the key player and arrest him, the crimi-
nal network may collapse, thereby reducing crime in the city. Using
network theory, Ballester, Calvó-Armengol, and Zenou (2006) show
how to identify the key player by using a measure that computes an
individual’s “centrality” in the network.
   The effects of social networks can also help explain the large differ-
ences in crime that are sometimes observed between otherwise identi-
cal neighborhoods, reinforcing the multiple-equilibria explanation. The
logic is presented by Zenou (2003). Relying on the more complex model
of Glaeser, Sacerdote, and Scheinkman (1996), Zenou shows that the
likelihood of either a very high or a very low crime level is greater
when people mimic the criminal behavior of others (which is observed
via social networks) than when they make decisions about criminal
behavior in isolation. In the isolation case, suppose that there are two
potential criminals, each of whom ﬂips a coin to decide whether or not
to engage in criminal activity. In the mimicking case, suppose that one
person ﬂips a coin and the other person then mimics his occupational
choice. Although the expected number of criminals is one in each case,
mimicking behavior ends up putting greater probability weight on the
extreme outcomes, in which the number of criminals is either two or
none. Therefore, mimicking behavior fostered by social networks can
produce large disparities in crime across neighborhoods.

10.3.3 Interjurisdictional competition in the context of crime
Chapter 8 analyzed tax and welfare competition, in which concern
about the loss of business investment or the attraction of poor migrants
kept spending on public goods and welfare payments inefﬁciently low.
A related outcome emerges in the case of spending on crime prevention
if criminals are mobile across jurisdictions. With criminal mobility, if
one jurisdiction increases its crime-prevention expenditures, then crim-
inals, spurred by a greater likelihood of arrest or longer imprisonment,
will relocate to other jurisdictions. The result will be an increase in
crime in the receiving jurisdictions. But since the original jurisdiction
doesn’t take this negative effect into account, thinking only about
the reduction in its own crime, it will tend to set crime-prevention
expenditures at too high a level.4 Thus, when criminals are mobile
across jurisdictions, jurisdictions will overspend on crime prevention.
