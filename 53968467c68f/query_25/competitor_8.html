ffPreface




This book offers a rigorous but nontechnical treatment of major topics
in urban economics. The book is directed toward several potential
audiences. It could be used as a main textbook, or possibly a supple-
mentary book, in an undergraduate or master ’s-level urban economics
course. It could be used as background reading in a PhD-level course
in which students would also read technical journal articles. It could
also be read by economists or researchers in other ﬁelds seeking to
learn what urban economics is about.
   To make the book accessible to a broad group of readers, the analysis
is mostly diagrammatic. A few chapters make use of some simple for-
mulas and a bit of algebra, but calculus is almost absent. Even though
the treatment is nontechnical, the analysis of urban topics attempts to
rely on rigorous economic reasoning. The orientation is conceptual,
with each chapter presenting and analyzing economic models that are
relevant to the issue at hand. In contrast to the cursory theoretical
development often found in undergraduate textbooks, the various
chapters offer thorough and exhaustive treatments of the relevant
models, with the goal of exposing the logic of economic reasoning and
teaching urban economics at the same time. Because of its conceptual
orientation, the book contains very little purely descriptive or factual
material of the kind usually found in textbooks. Instructors wishing to
expose students to such material could supplement the book with other
readings. Some topics not associated with sharply deﬁned models,
such as urban poverty, receive no coverage.
   Exercises are presented at the back of the book, for possible use
when it is employed as an undergraduate text. They develop numerical
examples based on the models presented in the chapters. Footnotes
throughout the chapters point to exercises that are relevant to the
current discussion.

larly extensive. No attempt is made to provide exhaustive citations of
the literature on each topic. Instead, one or two representative citations
might be given as part of the discussion of standard material that is
well accepted among urban economists. However, when a speciﬁc idea
advanced by a particular author is discussed, the appropriate citation

f1       Why Cities Exist




1.1   Introduction

In most countries, the population is highly concentrated in a spatial
sense. For example, cities occupy only about 2 percent of the land area
of the United States, with the rest vacant or inhabited at very low
population densities. Even in countries that lack America’s wide-open
spaces, spatial concentration of the population can be substantial, with
much of the land vacant. This chapter identiﬁes some forces that lead
to the spatial concentration of population. Thus, it identiﬁes forces that
help to explain the existence of cities.
   Depending on their orientation, different social scientists would
point to different explanations for the existence of cities. A military
historian, for example, might say that, unless populations are concen-
trated in cities (perhaps contained within high walls), defense against
attack would be difﬁcult. A sociologist might point out that people
like to interact socially, and that they must be spatially concentrated
in cities in order to do so. In contrast, economic explanations for
the existence of cities focus on jobs and the location of employment.
Economists argue that certain economic forces cause employment
to be concentrated in space. Concentrations of jobs lead to concentra-
tions of residences as people locate near their worksites. The result
is a city.
   The two main forces identiﬁed by economists that lead to spatial
concentration of jobs are scale economies and agglomeration econo-
mies. With scale economies, also known as “economies of scale” or
“increasing returns to scale,” business enterprises become more efﬁ-
cient at large scales of operation, producing more output per unit of
input than at smaller scales. Scale economies thus favor the formation
of large enterprises. Since scale economies apply to a single business
f2                                                                      Chapter 1



establishment (say, a factory), they favor the creation of large factories,
and thus they favor spatial concentrations of employment.1
   Whereas scale economies operate within a ﬁrm, without regard to
the external environment, agglomeration economies are external to a
ﬁrm. Agglomeration economies capture the beneﬁts enjoyed by a ﬁrm
when it locates amid other business enterprises. These beneﬁts include
potential savings in input costs, which may be lower when many ﬁrms
are present, as well as productivity gains. A productivity effect arises
because inputs (particularly labor) may be more productive when a
ﬁrm locates amid other business enterprises rather than in an isolated
spot. The mechanisms underlying these effects will be explained later
in the chapter.
   Transportation costs also inﬂuence where a ﬁrm locates, and they
can lead to, or reinforce, spatial concentration of jobs. This chapter
explains several different ways in which transportation costs affect the
formation of cities. The last section explores a special kind of agglom-
eration force: the kind that causes the clustering of retail establishments
and the creation of shopping malls.

1.2   Scale Economies

The role of scale economies in the formation of cities can be illustrated
with a simple example. Consider an island economy that produces only
one good: woven baskets. The baskets are exported, and sold to buyers
outside the island. The inputs to the basket-weaving process are labor
and reeds. With reeds growing everywhere on the island, the basket-
weaving factories and their workers can locate anywhere without
losing access to the raw-material input.
   The basket-weaving production process exhibits scale economies.
Output per worker is higher when a basket-weaving factory has many
workers than when it has only a few. The reason is the common one
underlying scale economies: division of labor. When a factory has
many workers, each can efﬁciently focus on a single task in the produc-
tion process, rather than carrying out all the steps himself. One worker
can gather the reeds, another can prepare the reeds for weaving, yet
another can do the actual weaving, and still another can prepare the
ﬁnished baskets for shipment.

The answer should be clear: given the greater efﬁciency of workers in

   But it is useful to verify this conclusion in a more systematic fashion.
Let α be output per worker in a factory of size 1, equal to the slope of
a line like A in ﬁgure 1.1 with LA = 1. Let β be output per worker in a
factory of size 100, equal to the slope of a line like B with LB = 100. From
the ﬁgure, it is clear that β &gt; α. Now consider table 1.1.
   The island economy’s total output of baskets equals (number of
factories) × (workers per factory) × (output per worker). Table 1.1
shows that this output expression is largest with one large factory. It
equals 100β, which is larger than the total output of 100α from the col-
lection of backyard factories, given β &gt; α.
   Since the island economy gains by having one large basket factory,
the economy would presumably be pushed toward this arrange-
ment, either by market forces or by central planning (if it is a command
economy). But once one large factory has been formed, the basket
workers will live near it, which will lead to the formation of a city.
   This story is highly stylized, but it captures the essential link between
scale economies and city formation, which will also be present in more
complicated and realistic settings. But something is missing from the
story. It can explain the formation of “company towns,” but it cannot
explain how truly large urban agglomerations arise.
   To see this point, consider a more realistic example in which the
production process is automobile assembly. This process clearly exhib-
its scale economies, since assembly plants tend to be large, typically
employing 2,000 workers or more. Thus, an assembly plant will lead to
a spatial concentration of employment, and these auto workers (and
their families) will in turn attract other establishments designed to serve
their personal needs—grocery stores, gas stations, doctor ’s ofﬁces, and

so on. The result will be a “company town” with the auto plant at its
center. But how large will this town be? In the absence of any other large
employer, its population may be limited in size, say to 25,000. The
upshot is that, while scale economies by themselves can generate a city,
it will not be as large as, say, Chicago or Houston. In order to generate
such a metropolis, many ﬁrms must locate together in close proximity.
For this outcome to occur, agglomeration economies must be present.

1.3   Agglomeration Economies

Agglomeration economies can be either pecuniary or technological.
Pecuniary agglomeration economies lead to a reduction in the cost of
a ﬁrm’s inputs without affecting the productivity of the inputs. Tech-
nological agglomeration economies raise the productivity of the inputs
without lowering their cost. Simply stated, pecuniary economies
make some inputs cheaper in large cities than in small ones, while
technological economies make inputs more productive in large cities
than in small ones.

1.3.1 Pecuniary agglomeration economies
The labor market offers examples of pecuniary agglomeration econo-
mies. Consider a big city, with a large concentration of jobs and thus a
large labor market, where many workers offer their labor services to
employers. Suppose a ﬁrm is trying to hire a specialized type of worker,
with skills that are rare among the working population. With its large
labor market, a few such workers might reside in a big city, and one
presumably could be hired with a modest advertising effort and modest
interviewing costs. However, the labor market of a small city probably
would contain no workers of the desired type. This absence would
force the employer to conduct a more costly search in other cities, and
to bring job candidates from afar for interviewing. The ﬁrm might also
have to pay relocation costs for a hired worker, adding to its already
high hiring costs. Thus, by locating in a big city, a ﬁrm may lower its
cost of hiring specialized labor. The existing employment concentration
in the big city thus attracts even more jobs as ﬁrms locate there to
reduce their hiring costs. The big city then becomes even bigger as a
result of this agglomeration effect.
   Locating in a big city could also reduce the cost of inputs supplied
by other ﬁrms (as opposed to labor inputs supplied by individual
workers). For example, the large market for commercial security
f6                                                                           Chapter 1



services in a big city would support many suppliers of security guards.
These suppliers would compete among one another, driving down
prices and thus lowering the cost of security services used in protecting
ofﬁce buildings or factories. Big-city competition could also reduce the
prices of other business services—legal and advertising services, com-
mercial cleaning and groundskeeping, and so on. The same effect could
also arise in the context of locally supplied physical inputs, such as ball
bearings for a production process or food inputs for the company caf-
eteria, where competition among big-city suppliers would reduce input
costs. As in the case of hiring costs, the job concentration in a big city
is self-reinforcing: once jobs become concentrated, even more ﬁrms will
want to locate in the big city to take advantage of the lower input costs
it offers.
    In some cases, a small-town location might mean that a particular
business service is entirely unavailable locally, just like the specialized
worker discussed above. For example, a ﬁrm might require special-
ized legal services (help with an antitrust issue, for example), and
there might be no local law ﬁrm with such expertise. The ﬁrm would
then have to pay high-priced lawyers to travel to its headquarters
from their big-city ofﬁces, or else would have to develop the required
expertise “in house” at high cost. In this case, higher input costs
arise from the sheer local unavailability of the service in the small
city rather than from the low degree of competition among local
suppliers.
    Firms also purchase transportation services, which are used in ship-
ping output to the market and in shipping inputs to the production
site. A ﬁrm can reduce its output shipping costs by locating near its
market, and it can reduce its input shipping costs by locating near its
suppliers. A big city, with its many households, is a likely market for
output, and it may also host many of a ﬁrm’s input suppliers. In this
situation, the ﬁrm can minimize its shipping costs for both output and
inputs by also locating in the big city. Note that the resulting pecuniary
agglomeration beneﬁt is slightly different from those discussed above.
Instead of facing a lower unit price of transportation services in the big
city (a lower cost per ton-mile), the ﬁrm beneﬁts from being able to
purchase less of these services because of its proximity to the market
and to suppliers.2

instead that input suppliers are in a different location, while the market

costs, but the inputs will have to come from afar. In this case, the loca-
tion with the lowest total transport cost may not be in the big city, so
that transport-related agglomeration economies may not be operative.
This case is discussed in detail later in the chapter.

1.3.2 Technological agglomeration economies
Technological agglomeration economies arise when a ﬁrm’s inputs are
more productive if it locates in a big city, amid a large concentration of
employment, than if it locates in a small city. To understand how such
an effect can arise, suppose that a high-technology ﬁrm spends sub-
stantial sums on research and development. This spending leads to
new technologies and products, which the ﬁrm can then patent, allow-
ing it to earn revenue from licensing its discoveries. Suppose for sim-
plicity that the ﬁrm’s output is measured by the number of patents it
generates per year, and that the only input is labor, measured by the
number of engineers the ﬁrm employs.

    This beneﬁcial effect could be a result of “knowledge spillovers”
across high-tech ﬁrms, which are a type of externality. While engineers
within a given ﬁrm collaborate intensively in producing patentable
ideas, spillovers arise when contact between engineers in different ﬁrms
also stimulates this productive process. For example, engineers from
different high-tech ﬁrms might socialize together, sharing a pitcher of
beer at a Friday “happy hour.” Although the engineers wouldn’t want
to divulge their company’s particular secrets, the happy-hour discus-
sion might cover more general ideas, and it might get the engineers
thinking in new directions. At work the following week, this stimula-
tion may start a process that eventually leads to patents that wouldn’t
have been generated otherwise. Thus, the engineers end up being more
productive because the large high-tech employment concentration
allows them to interact with peers doing similar work in other
companies.
    Although a big city is likely to have a concentration of high-tech
employment, allowing knowledge spillovers to occur, some big cities
may not have many high-tech ﬁrms. Thus, the big city/small city dis-
tinction may be less relevant for knowledge spillovers than it was for
pecuniary agglomeration economies. Instead, what may matter is the
extent of the city’s employment concentration in the industry in which
such spillovers occur. If a small or medium-size city happens to have
a big employment concentration in the relevant industry, it will offer
strong technological agglomeration economies for industry ﬁrms
despite its limited size.
    Might some kinds of knowledge spillovers occur across different
industries, so that a city where many different industries are repre-
sented is also is capable of generating technological agglomeration
economies? For example, might knowledge spillovers arise between
manufacturers of medical equipment and producers of computer soft-

ware? This type of linkage seems possible, and to the extent that it
exists, the overall employment level in a city (rather than employment
in a ﬁrm’s own industry) might be the source of technological agglom-
eration economies. City size may then capture the extent of such econo-
mies, as in the case of pecuniary agglomeration economies.
   As will be discussed further below, empirical research on agglom-
eration effects sometimes ﬁnds evidence of such a link between and
worker productivity and total employment (and thus city size). “Urban-
ization economies” is a name sometimes given to this effect. But the
empirical evidence for a link between productivity and own-industry
employment in a city is much stronger (this effect is referred to as
“localization economies”). Thus, technological agglomeration econo-
mies appear to operate more strongly within industries than across
industries.
   In addition to knowledge spillovers, several other channels for such
an agglomeration effect can be envisioned. When a city’s employment
in a particular industry is large, the existence of a large labor pool
makes replacement of workers easy. As a result, unproductive workers
can be ﬁred with little disruption to the ﬁrm, since they can be imme-
diately replaced. Recognizing this possibility, employees will work
hard, achieving higher productivity than in an environment in which
shirking on the job is harder to punish with dismissal.
   The large labor pool also gives employers a broad range of choice
in hiring decisions, which may make it harder for any individual to
secure a ﬁrst job in the industry. Workers may then have an incentive
to improve their credentials via additional education and training, and
these efforts would lead to higher productivity. Thus, the existence of
a large labor pool may raise productivity for workers trying to get a
job as well as for those worried about losing one.
   A third channel could arise through the phenomenon of “keeping
up with the Joneses.” In a city with high employment in a particular
industry, workers may be likely to socialize with employees working
for other ﬁrms in their industry, as was noted above. In addition to
making comparisons within their own ﬁrm, workers may then judge
their achievements against those of friends in other ﬁrms. This com-
parison may spur harder work as employees try to “look good” in the
eyes of a broader social set. Thus, in addition to being driven by knowl-
edge spillovers, the higher worker productivity associated with tech-
nological agglomeration economies could arise from these three other
sources.

investigated the connection between worker productivity and both
own-industry and total employment in a city (see Henderson 1986,
2003). As was noted earlier, such studies often ﬁnd evidence of an
own-industry effect for knowledge-intensive industries, in which spill-
overs are likely to occur, without ﬁnding much evidence of a total-
employment effect. Another empirical approach relates worker
productivity to employment density in a city (Ciccone and Hall 1996).
Yet another approach links the birth of new ﬁrms to own-industry
employment, on the belief that business startups are more likely to
occur in areas offering agglomeration economies (Rosenthal and
Strange 2003). A similar approach relates employment growth to own-
industry employment and other agglomeration factors (Glaeser et al.
1992). Other research focuses more explicitly on knowledge spillovers
by considering patent activity. A patent application must cite earlier
related patents, and some work shows that cited patents tend to be
from the same city as the patent application, indicating local knowl-
edge spillovers (Jaffe, Trajtenberg, and Henderson 1993). Other research
relates the level of patenting activity to a city’s employment density
(Carlino, Chatterjee, and Hunt 2007). This literature offers an over-
whelming body of evidence showing the existence of agglomeration
economies, mostly of the technological type.

1.5 The Interaction of Scale Economies and Transportation Costs
in the Formation of Cities

Although the desire to minimize transport costs can pull a factory
toward a particular location, these costs can also play a role in the
overall organization of production. In particular, transport costs can
help determine whether production is centralized in one large factory
or divided among a number of smaller establishments. The analysis in
section 1.2 showed that a single large factory was best, but transport
costs played no role in that analysis.
    To illustrate the interaction between scale economies and transport
costs, and to show how this interaction can affect the formation of
cities, consider a simple model adapted from Krugman 1991. Suppose
that the economy has ﬁve regions and a total population of N, with
N/5 people living in each region. The regions are represented as squares
in ﬁgure 1.7. Each person consumes one unit of a manufactured good,
which is produced with scale economies. In this setting, scale econo-
mies are best seen via the cost function C(Q), which gives the total cost
of producing Q units of the manufactured good. Scale economies mean
that the cost per unit of output declines as Q increases, with the factory
becoming more efﬁcient as the level of output expands. Thus, C(Q)/Q
falls as Q rises.

    The economy must produce N units of manufactured good to serve
the population. Two different arrangements of production are possible:
centralized and dispersed. Under dispersed production, a small factory,
producing N/5 units of output, would be located in each of the ﬁve
regions. These factories are represented by the small circles in ﬁgure
1.7. The cost per unit of output in each factory is C(N/5)/(N/5) ≡ λ.
Under centralized production, one large factory, represented by the
large circle, would be located in the central region, producing N units
of output at a cost per unit equal to C(N)/N ≡ θ. With scale economies,
the cost per unit of output is lower in a large factory than in a small
one, with θ &lt; λ. The total cost of production for the N units produced
in the economy is θN with centralized production and λN with dis-
persed production, and, since θ &lt; λ, total cost is lower in the centralized
case.
    Although this conclusion led to the superiority of one large factory
in the basket-weaving economy (where the output was exported),
another consideration comes into play in the present setting. Since the
manufactured good is consumed within the economy, adoption of cen-
tralized production means that output must be shipped from the large
factory to the regions where no manufacturing plant is present. These
shipments are represented in ﬁgure 1.7 by arrows. The need for ship-
ping is avoided, however, in the dispersed case, since each region has
its own factory. Let T denote the cost of shipping a unit of output from
the large factory to any of the remote regions. Since four regions lack
a factory, a total of 4N/5 units of the large factory’s output (which
equals N units) must be shipped, at a cost of 4TN/5. Note that N/5
units of output are consumed within the large factory’s region and thus
need not be shipped.
    The overall cost of the centralized and dispersed arrangements
includes both production cost and transportation cost. With transporta-
tion cost equal to zero in the dispersed case, the overall cost is just λN.
In the centralized case, the overall cost is θN + 4TN/5. Therefore, the
centralized (dispersed) case has a lower overall cost when λN is greater
(less) than θN + 4TN/5. Rearranging, it follows that centralized (dis-
persed) production is preferred when λ – θ is greater (less) than 4T/5.
The expression λ – θ is the difference between cost per unit of output
at the low output level of Q = N/5 and the higher output of Q = N, a
positive difference given the presence of scale economies. If scale econ-
omies are strong, so that the small factory is much less efﬁcient than
the large factory, then λ – θ will be large, and the ﬁrst inequality is likely

to hold, for a ﬁxed T. Conversely, for a ﬁxed value of λ – θ, the ﬁrst
inequality will be likely to hold when T is small. Therefore, centralized
production will be favored when scale economies are strong and trans-

economies lead to a substantial production-cost advantage for central-

isn’t offset by the cost of shipping the output.7

scale economies can interact with transportation costs in the location

1.6   Retail Agglomeration and the Economics of Shopping Centers

Another type of agglomeration phenomenon is retail agglomeration:
the spatial concentration of retail outlets. Cities have long had shop-
ping districts in which stores are concentrated. While such districts
were the result of uncoordinated store-location decisions, they have
been increasingly supplanted by shopping malls, whose owners
“orchestrate” the process of retail agglomeration.

   Two forces contribute to retail agglomeration. The ﬁrst is a desire by
shoppers to limit the costs of shopping trips, which include both time
costs and out-of-pocket costs (such as automobile expenses, including
the cost of gasoline). When a consumer has to visit multiple stores to
make a variety of purchases, the cost of the shopping trip is reduced
when the stores are in close proximity. Therefore, a multiple-stop
shopper would prefer to carry out his or her trip at a shopping district
or a mall rather than visiting a sequence of isolated stores. As a result,
stores are likely to attract more customer trafﬁc when they are spatially
concentrated than when they are dispersed, and this gain can stimulate
retail agglomeration.
   The second force leading to concentration of stores is the beneﬁt to
consumers of comparison shopping, which can arise even when only
one purchase is being made. The ability to compare similar products
will generate a better purchase decision, raising the beneﬁts from shop-
ping. Comparison shopping, easily done in a shopping district or a
mall, is costly when the stores are spatially separated. This added cost
may in fact be prohibitive relative to the beneﬁt, making comparison
shopping economical only on a visit to a shopping district or a mall.
Spatially concentrated stores can thus offer higher shopping beneﬁts
than isolated stores, leading to more customer trafﬁc. This gain for
stores will again stimulate retail agglomeration.
   Price competition between stores selling similar products is also
likely to be more intense when the stores are spatially concentrated.
This competition, which leads to lower prices, is beneﬁcial for consum-
ers but puts downward pressure on stores’ proﬁts. The resulting loss
tends to reduce the attractiveness of spatial concentration from the
viewpoint of stores, offsetting some of the gains described above. The
fact that owners of stores seem to prefer locations in malls and shop-
ping districts, however, suggests that the beneﬁcial forces dominate the
loss attributable to greater price competition.
   The beneﬁts of agglomeration can be viewed as arising from inter-
store externalities. For example, shoppers visiting a shoe store in a mall
may also visit a clothing store, and vice versa, so that each of the store
types gains from the presence of the other type. Such externalities may
be weaker, however, between other types of stores. For example, visi-
tors to clothing or shoe stores may have little reason to visit a toy store
or a specialty tobacco and pipe store, and vice versa. Inter-store exter-
nalities are illustrated in ﬁgure 1.8, where the widths of the arrows
represent the strength of the beneﬁcial effects between stores.

allocate the mall’s ﬁxed square footage to stores in a way that “opti-
mizes” the externality ﬂows, in the proper sense. The mall’s owner can
reap more rental income, and thus earn more proﬁt, by doing so.9

1.7   Summary

This chapter has discussed economic reasons for the existence of cities.
Scale economies, which favor the creation of large business establish-
ments, are capable of generating a moderate-size company town ori-
ented around a single large factory. But agglomeration economies,
which cause separate ﬁrms to locate near one another, are required for
job concentrations substantial enough to generate a big city. Techno-
logical agglomeration economies, which raise worker productivity, can
arise from knowledge spillovers among similar ﬁrms locating in close
proximity. Pecuniary agglomeration economies, in contrast, reduce
the cost of inputs without affecting their productivity. One pecuniary
effect is the saving on transportation costs when a ﬁrm locates in a city
that contains both its market and its input suppliers. But when the
suppliers are remote, transport-cost considerations may pull the ﬁrm

toward a remote location, generating an employment concentration far
from the market. Transport costs may also overturn the employment-
concentrating effect of scale economies. When output must be shipped
to consumers in dispersed locations, it may be better to forsake the
gains from scale by putting small factories in these locations. Finally,
retail agglomeration is generated by inter-store externalities, which
generate gains for individual stores when they locate in close spatial
proximity.

2.1   Introduction

Looking out the airplane window, an airline passenger landing in New
York or Chicago would see the features of urban spatial structure rep-
resented in a particularly dramatic fashion. In both of those cities, the
urban center has a striking concentration of tall buildings, with build-
ing heights gradually falling as distance from the center increases. The
tallest buildings in both cities are ofﬁce buildings and other commercial
structures, but the central areas also contain many tall residential build-
ings. Like the heights of the ofﬁce buildings, the heights of these resi-
dential structures decrease moving away from the center, dropping to
three and two stories as distance increases. Single-story houses become
common in the distant suburbs.
   Although it is less obvious from the airplane, an equally important
spatial feature of cities involves the sizes of individual dwellings (apart-
ments and houses). The dwellings within the tall residential buildings
near the city center tend to be relatively small in terms of square
footage, while suburban houses are much more spacious. Thus,
although building heights fall moving away from the center, dwelling
sizes increase.
   In walking around downtown residential neighborhoods in Chicago
or New York, the traveler would notice another difference not clearly
visible from the airplane. Relative to her suburban neighborhood at
home, there would be many more people on the streets in these down-
town neighborhoods, walking to restaurants, running errands, or
heading to their workplaces. This difference is due to the high popula-
tion density that prevails in central-city residential areas, which is also
reﬂected in activities on the street. Population density falls moving
away from the city center, reaching a much lower level in the suburbs.
f24                                                                           Chapter 2



   Other important regularities of urban spatial structure aren’t visible
at all from an airplane or from the street. These features involve real-
estate prices, and they require experience in real-estate transactions, or
familiarity with urban data, to grasp. First, whereas vacant lots usually
can be purchased for reasonable prices in the suburbs, vacant land near
the city center (when it is available) is dramatically more expensive per
acre. The same regularity applies to the price of housing ﬂoor space:
the rental or purchase price per square foot of housing is much higher
near the city center than in the suburbs. Consumers aren’t used to
thinking about prices on a per square foot basis (focusing instead on
the monthly rent or selling price for a dwelling), but any real-estate
agent knows that residential prices per square foot fall moving away
from the city center.
   Other regularities involve differences across cities rather than center-
suburban differences within a single city. To appreciate these differ-
ences, suppose that our traveler is from Omaha, Nebraska. When her
plane lands there on her return trip, she will notice that buildings in
central Omaha, though taller than those in Omaha’s suburbs, are much
shorter than those in the big city she just visited. In addition, if the
traveler had access to price data, she would see that a vacant lot in the
center of Omaha would be cheaper than one in the center of New York.
   Economists have formulated a mathematical model of cities that
attempts to capture all these regularities of urban spatial structure. This
chapter develops and explains the model. But it does so without relying
on mathematics, instead using an accessible diagrammatic approach.
As will be seen, the urban model successfully predicts the regularities
described above. Since the model thus gives an accurate picture of
cities, it can be used reliably for predictive purposes in a policy context.
For example, the model can predict how a city’s spatial structure would
change if the gasoline tax were raised substantially, thereby raising the
cost of driving. It can also be used to analyze how a variety of other
policies would affect a city’s spatial structure.
   The model presented in this chapter originated in the works of
William Alonso (1964), Richard Muth (1969), and Edwin Mills (1967).
Systematic derivation of the model’s predictions was ﬁrst done by
William Wheaton (1974) and later elaborated by Jan Brueckner (1987).1

2.2   Basic Assumptions

As is true of all economic models, the urban model is based on strategi-
cally chosen simpliﬁcations, which facilitate a simple analysis. These
simpliﬁcations are chosen to capture the essential features of cities,
leaving out details that may be less important. Once the model is ana-
lyzed and its predictions are derived, greater realism can be added,
often with little effect on the main conclusions.
    The ﬁrst assumption is that all the city’s jobs are in the center, in an
area called the “central business district” (CBD). In reality, many job
sites are outside city centers, scattered in various locations or else con-
centrated in remote employment subcenters. Thus, although job decen-
tralization (the movement of jobs out of the CBD) is a hallmark of
modern cities, this process is initially ignored in developing the model.
It therefore applies best to cities of the early to mid twentieth century,
in which jobs were more centralized than they are now. However, once
the model has been analyzed, it can be realistically modiﬁed to include
the formation of employment subcenters. As will be seen, many of its
lessons are unaffected.
    Since the goal is to analyze residential (as opposed to business) land
use, the CBD is collapsed to a single point at the city center, so that it
takes up no space. The model could easily be modiﬁed to allow the
CBD to have a positive land area, in which case the nature of land use
within the business area would become a focus in addition to residen-
tial land use outside the CBD.
    The second major assumption is that the city has a dense network
of radial roads. With such a network, a resident living some distance
from the CBD can travel to work in a radial direction, straight into the
center, as illustrated in ﬁgure 2.1. In reality, cities are criss-crossed by
freeways, which are often used in combination with surface streets to
access the CBD, thus leading to non-radial automobile commute paths
for many residents. As will be seen below, freeways can be added to
the model without changing its essential lessons.
    The third major assumption is that the city contains identical house-
holds. Each household has the same preferences over consumption
goods, and each earns the same income from work at the CBD. For
simplicity, household size is normalized to one, so that the city consists

2.3   Commuting Cost

Let x denote radial distance from a consumer ’s residence to the CBD.
The cost of commuting to work at the CBD is higher the larger is x,
and this cost generally has two components. The ﬁrst is a “money” (or
“out-of-pocket”) cost. For an automobile user, the money cost consists
of the cost of gasoline and insurance as well as depreciation on
the automobile. For a public-transit user, the money cost is simply
the transit fare. The second component of commuting cost is time cost,
which captures the “opportunity cost” of the time spent commuting—
time that is mostly unavailable for other productive or enjoyable
activities. Because a proper consideration of time cost makes the
analysis more complicated, this component of commuting cost is
ignored in developing the basic model. However, time cost is needed
in analyzing a city that contains different income groups, so it will be
re-introduced below.
fAnalyzing Urban Spatial Structure                                                       27



    The parameter t represents the per-mile cost of commuting. For a
resident living x miles from the CBD, total commuting cost per period
is then tx, or commuting cost per mile times distance. For an automo-
bile commuter, t would be computed as follows: Suppose that operat-
ing the automobile costs $0.45 per mile, a number close to the value
allowed by the Internal Revenue Service in deducting expenses for
business use of an auto. Then, a one-way trip to the CBD from a
residence at distance x costs 0.45x, and a round trip costs 0.90x. A
resident working 50 weeks per year will make 250 round trips to the
CBD. Multiplying the previous expression by this number yields
(250)0.90x = 225x as the commuting cost per year from distance x. Thus,
under these assumptions t would equal 225.2
    The fact that the same commuting-cost parameter (t) applies to all
residents reﬂects another implicit assumption of the model: all resi-
dents use the same transport mode to get to work. Urban models with
competing transport modes (and thus different possible mode choices)
have been developed, but they involve additional complexity.
    Let the income earned per period at the CBD by each resident be
denoted by y. Then disposable income, net of commuting cost, for a
resident living at distance x is equal to y – tx. This expression shows
that disposable income decreases as x increases, a consequence of a
longer and more costly commute. This fact is crucial in generating the
model’s predictions about urban spatial structure.

2.4   Consumer Analysis

As was mentioned earlier, city residents consume two goods: housing
and “bread.” Bread consumption is denoted by c, and since the price
per unit is normalized to $1, c gives dollars spent on bread (all goods
other than housing). Housing consumption is denoted by q, but the
physical units corresponding to q must be chosen. The problem is that
housing is a complicated good, with a variety of characteristics that
consumers value. The characteristics of housing include square footage
of ﬂoor space in the dwelling, yard size, construction quality, age, and
amenities (views, for example). Although a dwelling is then best

The budget constraint says that expenditure on bread (which equals c

spatial structure is that the price per square foot of housing ﬂoor space
declines as distance to the CBD increases. In other words, p falls as x

predicts this regularity. The demonstration makes use of a simple intui-

   The argument relies on a fundamental condition for consumer loca-
tional equilibrium. This equilibrium condition says that consumers
must be equally well off at all locations, achieving the same utility regardless
of where they live in the city. If this condition did not hold, then consum-
ers in a low-utility area could gain by moving into a high-utility area.
This incentive to move means that a locational equilibrium has not
been attained. The incentive is absent, implying that equilibrium has

   Utilities can be spatially uniform only if the price per unit of housing
ﬂoor space falls as distance increases. Since higher commuting costs
mean that disposable income falls as x increases, some offsetting beneﬁt
must be present to keep utility from falling. The offsetting beneﬁt is a
lower price per square foot of housing at greater distances. Then, even
though consumers living far from the center have less money to spend
(after paying high commuting costs) than those closer to the CBD, their
money goes farther given a lower p, allowing them to be just as well
off as people living closer in. The lower p thus compensates for the
disadvantage of higher commuting costs at distant locations.
   This explanation makes it clear that the lower p at distant suburban
locations serves as a compensating differential that reconciles suburban
residents to their long and costly commutes. Compensating differen-
tials also arise in many other economic contexts. For example, danger-
ous or unpleasant jobs must pay higher wages than more appealing
jobs with similar skill requirements. Otherwise, no one would do the
undesirable work. Like the lower suburban p, the higher wage recon-
ciles people to accepting a disadvantageous situation.4

think about spatial variation in p, another view that may seem easier
to understand focuses on “demand.” One might argue that the
“demand” for suburban locations is lower than the demand for central
locations given their high commuting cost. Lower demand then
depresses the price of housing at locations far from the CBD, causing
p to decline as x increases.

Now that the consumer ’s choice of dwelling size has been analyzed, the
next step is to ask what the buildings containing those dwellings look
like. To address this question, the focus shifts to the activities of housing
developers, who build structures and rent the space to consumers.7

close to the CBD are favorable since the developer can charge a high
price per square foot there for his output.
   In order for developers to be willing to build housing in all locations,
the proﬁt from doing so must be the same everywhere. But with close-in
locations offering higher revenue per square foot than suburban loca-
tions, proﬁts will not be uniform unless a compensating differential
exists on the cost side. With the capital cost ﬁxed, this compensating
differential must come from spatial variation in land rent r. In particu-
lar, land rent must be lower in the suburbs than at central locations.
With r falling as x increases, the revenue disadvantage of the suburbs
is offset, and the proﬁts from housing development remain constant
over space. Because land rent must do all the work in equalizing proﬁts,
given that i is ﬁxed, r must fall with distance much faster than p itself,
declining at a greater percentage rate. Therefore, the gap between
central-city values and suburban values is wider for r than for p.
   As in the consumer analysis, this compensating differential can be
viewed as a demand-based phenomenon. Developers will compete
vigorously for land in central locations because ﬂoor space built there
commands a high price. This competition bids up land rents near the
CBD. Conversely, developers’ lower demand for suburban land, a con-
sequence of the low housing revenue it offers, leads to a lower land
rent. Since competition for land among developers will bid up rent
until proﬁt is exhausted, the uniform proﬁt achieved through compen-
sating land-rent differentials is in fact a zero proﬁt level (corresponding
to “normal” economic proﬁt).
   The model thus predicts another one of the regularities of urban
spatial structure: declining land rent (and thus land value) as distance
to the CBD increases.9 This pattern, in turn, generates another regularity

2.6   Population Density

A ﬁnal intracity regularity is the decline of population density with
distance to the CBD, which the model also generates. Population
density, denoted by D, is equal to people per acre. But since dwellings
contain a single person, D is just dwellings per acre. Figure 2.8 illus-
trates the difference between dwellings per acre in the central city and
the suburbs. The central-city location has a tall building (with high
capital per acre) that is divided into small dwellings, while the subur-
ban location has a short building divided into large dwellings. From
the ﬁgure, dwellings per acre is clearly higher at the central-city loca-
tion than in the suburbs. In other words, since suburban buildings
have less ﬂoor space per acre of land and contain larger dwellings
than central-city buildings, the suburbs have fewer dwellings per
acre than the central city. Thus, D falls moving away from the CBD.

2.7   Intercity Predictions

As was explained earlier, the model also generates intercity predictions
that match observed regularities. For example, the model predicts that
large cities will have taller buildings than small cities. To generate these
predictions, it is necessary to analyze what might be called the “supply-
demand” equilibrium of the city. Basically, the equilibrium requirement
is that the city ﬁts its population, or that the “supply” of housing equals
the “demand” for it.
    The size of the land area occupied by a city determines how much
housing the city contains. The city’s land area is, in turn, the result of
competition between housing developers and farmers for use of the
land. Suppose that farmers are willing to pay a rent of rA per acre of
land. This agricultural rent will be high when the land is very produc-
tive or when the crops grown on it command a high price. Although
rA might vary with location, being higher near the delivery points for
agricultural output (where transport cost is low), this rent will instead
be viewed as constant over space, thus being independent of x. Figure
2.11 shows the graph of rA, which is a horizontal line, along with the
downward-sloping urban land-rent curve. Like the housing-price
curve in ﬁgure 2.3, the land-rent curve is convex, with r decreasing at
a decreasing rate as x increases.

2.7.1 The effects of population and agricultural land rent
Consider ﬁrst the effect of population size. The city is assumed to start
in equilibrium, exactly ﬁtting its population L. Then the population size
is hypothetically increased—a change that disrupts the equilibrium,
since the larger population doesn’t ﬁt in the existing city. The analysis
then deduces the changes in urban spatial structure that must occur in
order to restore equilibrium, allowing the city to ﬁt the now-larger
population.
   This thought experiment shows how the spatial structure of a par-
ticular city would respond to an increase in population. Since the city
gets rebuilt in response to the population increase (as will be explained
below), the predicted changes must be viewed as occurring over a very
long time period. But the results of the thought experiment can be
interpreted in a different, more useful way. In particular, the differences
between the pre-change and post-change cities can be used to predict
the differences between two separate cities, one small and one large, at
a given point in time. In other words, the long-run changes in spatial
structure that would occur in a single city as its population expands
should also be reﬂected in the differences between two coexisting cities
with different population sizes.

   Suppose a particular city, which starts in equilibrium, experiences a
one-time increase in its population L. The sequence of impacts unfolds
as follows:

1. Although the city’s housing stock ﬁt the original population, the
stock is now too small, leading to excess demand for housing (a housing
shortage).
2. This excess demand leads to an increase in the price per square foot
of housing p at all locations in the city.
3. With housing now more expensive, consumers choose smaller
dwelling sizes. Thus, q falls at all locations, an adjustment that occurs
in the long run as the city is rebuilt.
4. By raising housing revenue per square foot, the higher price p boosts
the proﬁts of housing developers. With development now more proﬁt-
able, developers compete more vigorously for land, driving up land
rent r at all locations.
5. In response to the higher cost of land, developers economize on its
use, constructing taller buildings at all locations. This change occurs in
the long run as the city is rebuilt.
6. With buildings taller and dwellings smaller at each location, the
number of dwellings per acre of land rises, leading to higher popula-
tion density D at all locations.
7. With r rising at all locations, the urban land-rent curve shifts up to
r1, as shown in ﬁgure 2.12 (where r0 is the original rent curve). As a
result, the distance x to the edge of the city increases from to x0 to x1 .
8. Since population density increases everywhere, and since the city’s
land area is now larger, it ﬁts a larger population. Thus, the excess demand
for housing is eliminated, restoring the supply-demand equilibrium.

Since these adjustments can be used to predict differences between
cities with small and large populations at a given point in time, the
following conclusions emerge. The larger city occupies more land than
the smaller city. At a given distance from the center, the larger city has
taller buildings, smaller dwellings, a higher housing price per square
foot, higher land rent, and higher population density than the small
city. These predictions match many of the observed differences between
large and small cities in the real world.16

2.7.2 The effects of commuting cost and income
Now consider the effect of an increase in the commuting-cost param-
eter t. Such an increase could be due to a higher price of gasoline, or
to an increase in the gasoline tax. When t increases, the existing spatial
pattern of housing prices doesn’t adequately compensate for long sub-
urban commutes. As a result, suburban commuters will want to move
toward the center to reduce their commuting costs. This movement
bids up housing prices near the CBD, and reduces them at suburban
locations. As a result, the housing-price curve rotates in a clockwise

direction. The proﬁt of housing developers then rises near the center
and falls in the suburbs, leading to stronger competition for central
land and weaker competition for suburban land. Land rents then rise
near the center and fall in the suburbs, causing a clockwise rotation in
the land-rent curve that mimics the rotation of the housing-price curve.
This rotation (seen in ﬁgure 2.14) leads to a decline in x from x0 to x1 .
Thus, with the higher commuting cost causing residents to move
inward, the land area of the city shrinks.
   In response to the land-rent rotation in the ﬁgure, building heights
rise near the center and fall in the city’s shrunken suburbs. Dwelling
sizes fall near the center, so that central population density rises given
the increase in building height. However, mathematical analysis shows
that the change in q is ambiguous in the suburbs, which makes the
change in density ambiguous there as well.

the European city is more compact, with a smaller land area than its

2.7.3 Migration between cities
The preceding analysis ignores the possibility of migration between
cities, in effect looking at a given city in isolation. To analyze intercity
migration, the ﬁrst step is to note that when L, rA, y, or t increases, the
welfare of urban residents (as measured by their common utility level)
is affected. When L increases, for example, the resulting increase in
the housing price p raises the city’s cost of living, which makes the
fAnalyzing Urban Spatial Structure                                                        49



residents worse off. Conversely, an increase in y makes the urban resi-
dents better off.17
   Given these effects, variation in L and y across cities can lead to
welfare differences, with residents reaching high utility levels in some
cities and low utilities in other cities. But if consumers are able to
migrate between cities, such utility differences are unsustainable. Just
as in the case of the intracity equilibrium, in which consumer utility
was the same at all locations, an intercity migration equilibrium must
make consumers equally well off regardless of which city they live in. If
this requirement were not met, people would move from low-utility
cities to high-utility cities until welfare was equalized.
   When migration is possible, a high-income city, where consumers
would otherwise be better off, must have a larger population than a
low-income city. The larger population cancels the welfare gain from
the higher income, leading to the same utilities in both cities. Intercity
migration is the source of the larger population: residents migrate from
the low-income city to the high-income one, and migration stops when
the city’s population has grown enough to cancel the advantage of its
higher income. Therefore, once intercity migration is allowed, the
model predicts a positive correlation between city population and income, a
relationship that has been conﬁrmed empirically.18
   Intercity migration requires reconsideration of the intercity predic-
tions made in section 2.6. Those predictions pertain to a “closed city,”
where migration is impossible and the population is set exogenously.
When migration is allowed, the “open city” model is appropriate
instead. Section 2.6 analyzed the effect of a higher income on the city’s
spatial structure with L held ﬁxed, but a different exercise is needed
for an open city. In this case, the higher y is automatically accompanied
by a larger L (a consequence of migration). The resulting effect on the
city’s spatial structure is then the combination of two separate effects:
the effect of a higher y, with L held ﬁxed, plus the additional effect of a
higher L. Since each change separately leads to an increase in x, the

2.8   Summary

This chapter has analyzed urban spatial structure using a diagram-
matic version of the standard urban model. The model generates real-
istic intracity predictions, which show that the price per square foot of
housing, land rent, building heights, and population density fall
moving away from the CBD, while dwelling size increases. The model
also generates intercity predictions, which show that more populous
cities are spatially larger, denser, and more expensive than small cities.
The model predicts realistic differences between desert cities and cities
located on productive agricultural land, as well as differences between
cities with expensive vs. cheap commuting and high vs. low incomes.
The model is a useful and powerful tool for understanding urban
spatial structure.

f3       Modiﬁcations of the Urban Model




3.1   Introduction

The urban model presented in chapter 2 imposed a number of simpli-
ﬁcations so that simple conclusions could be derived. The purpose of
this chapter is to introduce modiﬁcations to the model and appraise
their separate effects. The ﬁrst modiﬁcation adds a second income
group to the city, which then contains both “rich” and “poor” house-
holds. The second modiﬁcation adds a freeway to the city’s transporta-
tion system, so that all commutes are no longer radial. The third
modiﬁcation introduces job sites (either widely dispersed employment
locations or distinct subcenters) outside the central business district.
The fourth modiﬁcation explicitly recognizes the durability of housing
capital, allowing the city to contain both old and new buildings. The
ﬁfth modiﬁcation puts the model in the context of a developing country,
where rural–urban migration occurs.

3.2   A City with Two Income Groups

Suppose that, instead of having a common income, some households
in the city are rich, earning income yR, and some are poor, earning
income yP &lt; yR. In addition, suppose that money cost continues to be
the only commuting cost, which is then the same for both groups and
equal to t (time cost will be introduced below).
   An important question regarding the spatial structure of the two-
group city concerns the relative locations of the rich and poor residen-
tial areas. In reality, high-income households tend to locate in the
suburbs of U.S. cities, and poor households tend to live near the center.
What, then, does the model predict about the relative locations of the
two income groups?

be ﬂatter than the pP curve, so that price-curve diagram must look like ﬁgure
3.1. The location pattern in the ﬁgure, with the poor in the center and
the rich in the suburbs, is then a prediction of the model.
   The intuitive explanation for this prediction borrows from chapter
2’s analysis of the effect of y on urban spatial structure. That discussion
argued that the increase in desired dwelling size following from
an increase in income gives a household an incentive to move farther
from the CBD, to locations where the price per square foot is lower.
Because the rich are then drawn to low-p areas of the city, they are able
to outbid poor households for suburban locations. Poor households, in
contrast, can tolerate a high per-square-foot housing price better than
the rich because their dwellings are small. Therefore, the poor are able
to outbid the rich for housing in the center, where p is high.
   The predicted central location of the poor, however, depends cru-
cially on the absence of time cost as a component of commuting cost.
Including time cost in the model in a proper way would involve adding
a third good—leisure time—to the utility function. A longer commute
would then reduce the amount of time available for work and leisure,
and the consumer would end up valuing this loss at w per hour, where
w is the wage. However, the presence of leisure time in the model pre-
vents the derivation of many of the simple conclusions of chapter 2.
   A simpler, though ad hoc, approach to generating time costs is more
workable. The approach assumes that leisure time is ﬁxed, with com-
muting time (unrealistically) reducing available work hours in one-to-
one fashion. Then, if an extra mile of commuting distance reduces
work time by some fraction δ of an hour, that mile reduces income
by δw dollars. Adding this loss onto the money cost t of commuting
then yields a new commuting cost per mile, equal to m = δw + t. But
since the rich have higher wages than the poor (wR &gt; wP), two different
commuting costs emerge, equal to mR = δwR + t and mP = δwP + t,
with the rich one higher (mR &gt; mP). With this modiﬁcation, the slopes
of the housing-price curves are modiﬁed, with t replaced by mR or mP
in the slope expression. In other words, the slope of the pR curve is
f54                                                                           Chapter 3



equal to –mR/qR, and the slope of the pP curve is –mP/qP. But with mR &gt;
mP and qR &gt; qP, the relationship between the slopes is unclear: the pR
curve could either be ﬂatter or steeper than the pP curve at their inter-
section point. Thus, ﬁgure 3.1 could still apply, or the ﬁgure could be
reversed. In the latter case, the pR curve would be steeper than pP curve,
and the rich would live in the center and the poor would live in the
suburbs. Therefore, when time costs are present, the model doesn’t offer
a clear prediction about the relative locations of the rich and the poor.2
   The source of this ambiguity is the presence of two conﬂicting forces.
The desire to rent their large dwellings at a low price per square foot
pulls the rich toward the suburbs, while a desire to limit their high time
cost of commuting pulls the rich toward the center. Depending on the
relative strengths of these forces, either location for the rich group is
possible.3
   Although many American cities (including New York and Chicago)
have high-income enclaves near the CBD, the overall correlation
between income and distance from the center is positive in the United
States. The contrast between this strong pattern and the model’s ambig-
uous predictions is striking, and this disparity has prompted researchers
to seek other explanations for the observed pattern that do not rely on
a strict interpretation of the urban model. Glaeser, Kahn, and Rappaport
(2008), for example, use a transport mode-choice explanation. They
argue that the poor, being unable to afford automobiles, must rely on
public transit, and that central cities are the only parts of urban areas
that are dense enough to support convenient public transit (for example,
subways with closely spaced stations). The implication is that poor
households must live in central cities in order to have mobility, thus
yielding the location pattern observed in the United States.4

taken into account. According to their argument, high-income house-

from the CBD, these suburban locations end up attracting the rich,
whereas the poor occupy older dwellings near the center. But Brueck-

wear out and are replaced, the center ’s new housing may then attract

    The challenge faced by the urban model in explaining locational
patterns by income becomes even harder when it is realized that the
American pattern is not always repeated in other countries. For
example, the pattern is reversed in Paris, where the central city is rich
and the suburbs are poor. Other European cities, and some cities in
Latin America, also have a pattern opposite to that of the United States.
In attempt to explain the resulting puzzle, Brueckner, Thisse, and
Zenou (1999) focus on urban amenities such as historical monuments,
ﬁne architecture, and natural amenities, such as an ocean front or a
river front. They argue that if such amenities are present in the central
city, and if the rich value living near them more than do the poor, then
a force arises that may reverse the American locational pattern. Paris
is a prime example of a city with an amenity-rich center, and this theory
may explain why rich households occupy the central city rather than
living in the suburbs.
    The discussion in Brueckner, Thisse, and Zenou 1999 makes clear
another implicit omission in the development of the urban model in
chapter 2. In particular, locations in the basic model are distinguished
only by differences in commuting cost. In effect, amenities are absent,
so that aside from commuting-cost differences, no location is better or
worse than any other. This implicit assumption may be unrealistic for
some cities, in which case the model’s predictions about housing price
patterns and other spatial features may not be fully accurate.
    More generally, the foregoing discussion shows that the urban model
is less successful at explaining the locations of different income groups
within the city than at predicting regularities in spatial structure such
as the decline in building heights moving away from the CBD. Devel-
oping a better understanding of these group location patterns remains
a task for ongoing research.

3.3   Commuting by Freeway

The model so far portrays the city as having a dense network of radial
roads. Suppose instead that a single freeway passes through the city in
an east–west direction, allowing access to the CBD (see ﬁgure 3.2).
Suppose also that the freeway can be accessed from city streets at any
point, with an onramp available on every block. Since freeway trafﬁc
moves faster than trafﬁc on city streets, commuters living near the
freeway will use city streets to access it, driving the rest of the way to
work on the freeway. But some commuters will ﬁnd it better to use city
streets for their entire trip. Figure 3.2 shows that a commuter living at
location A will travel diagonally to the freeway and then to the CBD,
whereas a commuter living at location B will travel straight in to the
CBD on city streets without using the freeway.5 The freeway’s “catch-
ment area” (which consists of locations where use of the freeway is
preferable, such as A) consists of the two triangular-shaped areas inside
the dashed lines in the ﬁgure.
   Since freeway trips are fast, the distance traveled is no longer a
proper measure of commuting cost, assuming that time cost matters
along with money cost. As a result, a freeway-using commuter who
lives relatively far from the CBD in either the easterly or the westerly
direction will have the same commuting cost as a commuter who lives
closer to the CBD but in the northerly or the southerly direction and
commutes on slow city streets. In other words, locations A and B could
have the same commuting cost even though A is farther from the CBD.

3.4   Adding Employment Outside the CBD

As was mentioned earlier, not all employment in real-world cities is
concentrated in the CBD. Although employment may be high in the
center, additional jobs may be widely dispersed throughout the city or
concentrated in secondary employment centers. How do these different
employment patterns affect the predictions of the model?

3.4.1 Dispersed employment
Consider ﬁrst the dispersed-employment case, in which the CBD
remains the only job center but other businesses are scattered through-
out the city without any signiﬁcant spatial concentration. Consider a
CBD worker living at distance x* who makes a radial trip from his
residence that passes by one of these business establishments, which is
located at distance x** from the center. That employer could lure this
worker away from CBD employment by offering an income equal to
y – tx**. This income would give the worker a disposable income equal
to y – tx** – t(x* – x**), where the last term is commuting cost from the
residence distance x* to the noncentral location x** of the new work-
place. Since this disposable income expression reduces to y – tx* (note
that tx** cancels), which equals the worker ’s disposable income with
CBD commuting, the worker loses nothing from the switch and is thus
f58                                                              Chapter 3



happy to make it. Note that the worker saves tx** in commuting cost
by stopping at the noncentral job site rather than going all the way to
the CBD, and the employer cuts his income relative to the CBD income
y by exactly this amount, making the worker indifferent between the
two work sites.
   This argument shows that if dispersed employers located outside
the CBD pay incomes of I(x) = y – tx, where x is the distance of the
establishment from the center, then they can skim off previous CBD
commuters without affecting their disposable incomes. Since the spatial
decline of disposable income thus remains the same as in the case when
all jobs are at the CBD, all of the model’s predictions are unaffected.
Thus, a city where some jobs are at the CBD and the rest are dispersed
across other locations is indistinguishable from one where all the jobs
are centralized. The incomes paid at these dispersed worksites fall with
their distance to the CBD, a pattern known as a “wage gradient.”
Various empirical studies have established the existence of wage gra-
dients in real cities.6

possible reason for wasteful commuting is employment uncertainty.

keep her SBD job, and if laid off, she would expect to search for work
in the CBD. Maintaining a residence close to the CBD may then make
sense.9

3.4.3 Employment decentralization and spatial mismatch
When jobs move to the suburbs, the result may be worse employment
outcomes for some urban residents. Members of poor households
living near the CBD, who may belong to a racial minority, are now far
from the new jobs. Public transit service to the suburbs may be inad-
equate, making it hard to access the jobs from central-city residences.
In addition, racial discrimination may be present in suburban housing
markets, making it hard for the poor households to move near the jobs.
The result is what is known as “spatial mismatch”: an insurmountable

3.4.4 Commuting in the information age
The information age and the rise of the Internet have begun to change
commuting patterns, with many workers “telecommuting” from home
instead of physically commuting to job sites, at least for part of the
work week. Since with telecommuting, fewer commute trips are made
per period, the effect of this change is to decrease the commuting-cost
parameter t. Thus, as the results of subsection 2.7.2 suggest, the rise of
telecommuting should causes cities to spread out and become less
dense in their centers.11

3.5   Durable Housing Capital

The urban model as presented in chapter 2 doesn’t recognize age dif-
ferences between buildings. In effect, the model assumes that housing
capital is “perfectly malleable,” so that buildings can be easily replaced
as conditions change. Recall, in particular, the analysis of the supply-
demand equilibrium, in which the city was rebuilt in response to
changes in population or income. But a look at any real city shows
that this malleability assumption is inaccurate. In many locations, a
brand-new building stands next to a very old one, an outcome that
would never exist with malleable capital. With malleability, the old
structure wouldn’t have been left standing while the adjacent location
was redeveloped.
   When new and old buildings are in close proximity, the result may
be a pattern of building heights that violates the predictions of the
model. For example, the new building may be a tall high-rise structure,
while the old building, having been constructed decades earlier, may
be relatively short. But the model predicts that building heights should
decline smoothly as distance to the CBD increases, so that buildings
that are adjacent to one another should be nearly identical. The ques-
tion then is this: How do the predictions of the model change when it

3.6   Cities in Developing Countries

The analysis in chapter 2 brieﬂy considered a city that was open to
migration from other cities. However, it is interesting to consider a dif-
ferent type of open city: one that experiences in-migration from rural
areas rather than from other cities. This kind of migration plays an
important role in developing countries, where the growth of manufac-
turing and service production in cities attracts large numbers of workers
from the countryside. This process of rural–urban migration has been
largely completed in developed Western economies, leaving relatively
small rural populations, but it is still unfolding in a major way in
developing countries.
   The migration process often generates very large cities, and serious
urban problems, in developing countries. By adapting the urban model
from chapter 2, the equilibrium city size determined via rural–urban
migration can be analyzed.
   Suppose that rural residents earn an income yA, which is lower than
the urban income y. Since the rural residents live next to the ﬁelds
where they work, no commuting cost is incurred. Therefore, the rural
resident’s disposable income is just equal to yA.
   When will a rural resident want to move to the city? He will wish
to do so if earning the urban income y and paying for commuting and
urban housing makes him better off than living in the countryside. But
in order to decide whether migration will raise his standard of living,
the rural resident need only compare his situation with that of the
f66                                                                         Chapter 3



urban resident living at the city’s edge. The reason is that all urban
residents are equally well off (recall the fundamental urban equilibrium
condition), so that a comparison with any one of them is sufﬁcient to
judge relative standards of living.
   Comparison with the edge resident is especially easy because that
resident and the rural resident pay the same price for housing.13 There-
fore, standards of living can be compared by simply comparing disposable
incomes. For the edge resident, disposable income is just y – tx , urban
income minus commuting cost from the city’s edge. If this dispos-
able income is greater than yA, then the rural resident gains by moving
to the city, and he will do so (migration costs are assumed to be zero).
Since the incentive to move will be absent once y – tx becomes equal to
yA, the equality of these two values is the condition for rural–urban
migration equilibrium. In other words, no further incentive to move to
the city exists, and migration equilibrium is achieved, when y – tx = yA.
   To use this condition to determine the equilibrium city population
L, recall from the supply-demand analysis that x and L are positively
related, with an increase in population leading to an increase in x . As
a result, the city’s edge distance can be written as an increasing function
of L, with x = x (L). Substituting this function, the equilibrium condition
y – tx = yA can be rewritten as

y – tx (L) = yA.

This new condition determines the equilibrium value of the city’s pop-
ulation under the rural–urban migration process. When L is of just the
right size, y – tx (L) and yA will be equal, and there will be no incentive
for rural–urban migration.
    The above condition can be used to determine the effect of the rel-
evant variables on the equilibrium city size. For example, suppose yA
is low, perhaps as a result of poor agricultural productivity in the coun-
tryside. Then, to reach migration equilibrium, y – tx (L) must also have
a small magnitude. But this requirement means that x (L) must be large
and hence that L itself must be large. Therefore, in a country with a low
rural income, rural–urban migration will not stop until the city has
reached a large population size. This large population means a long
commute (and thus a low disposable income) for the edge resident,

3.7   Summary

This chapter has explored modiﬁcations of the urban model. In a city
with two income groups, the model predicts that the poor live in the
center and the rich live in the suburbs. But when a time-cost component
is added to commuting cost, the model no longer yields a clear predic-
tion as to where the rich and the poor live. Adding a freeway to the
radial road network changes the city’s shape without altering the main
qualitative conclusions of the model. Adding dispersed employment
has no effect on the model, while adding a secondary employment
center effectively creates a second city joined to the original one. When
housing capital is durable instead of malleable, spatial building-height
patterns become irregular, but the trend is still downward moving
away from the central business district, as in the basic model. The
model can also be used to analyze rural–urban migration and the
determination of city sizes in developing countries.

4.1   Introduction

Strong sentiment against “urban sprawl” has emerged in the United
States in recent years. Critics of sprawl argue that urban expansion
consumes too much agricultural land, leading to a loss of amenity
beneﬁts from open space as well as a loss of scarce farmland. They
also argue that the long commutes resulting from urban expansion
create excessive trafﬁc congestion and air pollution. In addition, they
allege that growth at the urban fringe depresses the incentive for rede-
velopment of land closer to city centers, leading to decay of downtown
areas. Some critics also claim that, by spreading people out, low-density
suburban development reduces social interaction, weakening the
bonds that underpin a healthy society. Finally, critics draw a link
between sprawl and obesity, arguing that life in the automobile-
dependent suburbs deprives people of the beneﬁts of exercise from
walking.
   Using data from satellite imagery from the period 1976–1992, Burch-
ﬁeld et al. (2006) document the spatial growth of U.S. cities. Although
their data show that only 1.9 percent of the U.S. land area was built
up by 1992, the percentage was much lower (1.3) in 1976, only 16
years earlier. Thus, the developed land area grew at the very high rate
of 2.5 percent per year over that period, with the share of developed
land rising by almost half. Other sources show that the rate of spatial
growth in many U.S. cities far exceeded their rates of population
growth.
   In response to concerns about sprawl, state and local governments
have adopted policies designed to restrict the spatial expansion of
cities. At least twelve states have enacted growth-management pro-
grams, the best-known being New Jersey’s 1998 commitment to spend
f70                                                                              Chapter 4



$1 billion of sales tax revenue to purchase half of the state’s remaining
vacant land. In addition, cities all over the country have imposed a
variety of anti-sprawl policies, including growth boundaries and
charges levied on development. The November 1998 election saw 240
anti-sprawl initiatives appearing on ballots nationwide, and many
additional measures were put before the voters in the 2000 election and
in subsequent contests.
   Do the criticisms of urban sprawl have merit? Do cities take up too
much space? Should policy measures designed to restrict the spatial
growth of cities be adopted? This chapter addresses these questions,
making use of t</span><span data-dcnode-id="140" instrument_node="">he urban model developed in chapters 2 and 3.1 Since
land-use controls offer one means of attacking sprawl, the chapter then
turns to an analysis of these policies. The discussion ﬁrst considers
urban growth boundaries, a primary tool for limiting sprawl, and it
then turns to other land-use controls, such as building-height restric-
tions and zoning, that aren’t related to sprawl.

The phenomenon lamented by the critics of sprawl, the spatial expan-

the manner predicted by the model.

appears to be caused mainly by “fundamental forces”: rising popula-

   With this understanding, it may be hard to ﬁnd fault in the process
of urban spatial expansion, even if its consequences (paving over the
landscape) may seem undesirable. After all, an expanding population
needs space in which to live, and higher incomes naturally cause
households to consume more land as they buy bigger dwellings. Also,
freeway investments meant to ease commuting naturally encourage
longer commutes and thus cause cities to spread out. Moreover, table

   But despite the apparently benign operation of the fundamental
forces, criticism of urban spatial expansion may be justiﬁed if these
forces are distorted by “market failures.” A market failure arises when
the decentralized activities of economic actors fail to achieve the right
outcome from society’s point of view. The classic example of market
failure is industrial pollution, where a dirty factory fails to consider the
damage caused by the pollution it creates and thus pollutes too much
(this problem is analyzed in detail in chapter 9). The question, then, is
whether market failures are present in the economic process that deter-
mines the spatial sizes of cities, making them too big from society’s
point of view.
