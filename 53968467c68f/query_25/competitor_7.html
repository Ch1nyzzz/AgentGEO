</span><div class="tdb-block-inner td-fix-index" data-dcnode-id="2894"><h1 class="tdb-title-text" data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">Terrace Gardening Advantages; Disadvantages</span></h1><div data-dcnode-id="2896"></div><div class="tdb-title-line" data-dcnode-id="2895"></div></div></div></div></div></div></div><div class="tdc-row" data-dcnode-id="2861" id="tdi_63"><div class="vc_row tdi_64 wpb_row td-pb-row" data-dcnode-id="2862"><span data-dcnode-id="2888" instrument_node="">

</span><div class="tdb-block-inner" data-dcnode-id="2530"><h3 data-dcnode-id="2845"><span data-dcnode-id="2846" id="Advantages_and_Disadvantages_of_terrace_gardening"><strong data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">Advantages and Disadvantages of terrace gardening</span></strong></span></h3><span data-dcnode-id="2844" instrument_node="">
</span><p data-dcnode-id="2834"><u data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">What is a terrace garden?</span></u><span data-dcnode-id="2841" instrument_node=""> The terrace garden is also called a </span><u data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">roof garden</span></u><span data-dcnode-id="2838" instrument_node="">, it is a garden in which vegetables, flowers, and fruits are developed on terraces, balconies or roofs of buildings. The </span><a data-ail="94" data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardeningtips.in/kitchen-garden-advantages-and-disadvantages" target="_self"><span data-dcnode-id="2837" instrument_node="">kitchen garden</span></a><span data-dcnode-id="2835" instrument_node="">, a normal in every Indian household, has now shifted to the roof due to constraints of space and is known as a terrace garden. Increasing pressure on land and escalating costs have added to its growing popularity.</span></p><span data-dcnode-id="2833" instrument_node="">
</span><h4 data-dcnode-id="2828"><span data-dcnode-id="2829" id="Advantages_of_Terrace_gardening"><strong data-dcnode-id="2830"><u data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">Advantages of Terrace gardening:</span></u></strong></span></h4><span data-dcnode-id="2827" instrument_node="">
</span><figure aria-describedby="caption-attachment-96" class="wp-caption aligncenter" data-dcnode-id="2823" id="attachment_96" style="width: 518px"><img alt="Advantages of Terrace Garden." class="size-full wp-image-96" data-dcnode-id="2826" height="600" sizes="(max-width: 518px) 100vw, 518px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardeningtips.in/wp-content/uploads/2019/04/Advantages-of-Terrace-Garden..jpg&amp;raw" srcset="https://gardeningtips.in/wp-content/uploads/2019/04/Advantages-of-Terrace-Garden..jpg 518w, https://gardeningtips.in/wp-content/uploads/2019/04/Advantages-of-Terrace-Garden.-259x300.jpg 259w, https://gardeningtips.in/wp-content/uploads/2019/04/Advantages-of-Terrace-Garden.-363x420.jpg 363w" title="Terrace Gardening Advantages; Disadvantages 1" width="518"><figcaption class="wp-caption-text" data-dcnode-id="2824" id="caption-attachment-96"><span data-dcnode-id="2825" instrument_node="">Advantages of Terrace Garden.</span></figcaption></figure><span data-dcnode-id="2822" instrument_node="">
</span><p data-dcnode-id="2817"><span data-dcnode-id="2821" instrument_node="">The </span><u data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">advantages of terrace gardening</span></u><span data-dcnode-id="2818" instrument_node=""> are given below;</span></p><div class="code-block code-block-3" data-dcnode-id="2807" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2816" instrument_node="">
</span><span data-dcnode-id="2814" instrument_node="">
</span><span data-dcnode-id="2812" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7693910671673147" data-ad-format="auto" data-ad-slot="7527137917" data-dcnode-id="2811" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="2810" instrument_node="">
</span></div><span data-dcnode-id="2806" instrument_node="">
</span><p data-dcnode-id="2801"><span data-dcnode-id="2805" instrument_node="">Some of the </span><u data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">benefits to health, aesthetics and the environment</span></u><span data-dcnode-id="2802" instrument_node=""> include:</span></p><span data-dcnode-id="2800" instrument_node="">
</span><ul data-dcnode-id="2777"><span data-dcnode-id="2799" instrument_node="">
</span><li data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">Reduce the indoor temperature by 6 to 8°C and can reduce air conditioning cost</span></li><span data-dcnode-id="2796" instrument_node="">
</span><li data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">Reduce overall heat absorption of buildings and insulate the building against heat &amp; cold</span></li><span data-dcnode-id="2793" instrument_node="">
</span><li data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">The convenience of safe, pesticide-free, healthy green and fresh fruits or vegetables</span></li><span data-dcnode-id="2790" instrument_node="">
</span><li data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">Conducive to a regular of physical exercise, clean air and being close to nature</span></li><span data-dcnode-id="2787" instrument_node="">
</span><li data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">Terrace garden increases the amount of oxygen in the air</span></li><span data-dcnode-id="2784" instrument_node="">
</span><li data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">It reduces sound pollution</span></li><span data-dcnode-id="2781" instrument_node="">
</span><li data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">Perform as a habitat for city-weary birds</span></li><span data-dcnode-id="2778" instrument_node="">
</span></ul><span data-dcnode-id="2776" instrument_node="">
</span><p data-dcnode-id="2772"><strong data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">Fresh and organic produce:</span></strong><span data-dcnode-id="2773" instrument_node=""> Having a terrace or roof garden gives you direct access to fresh vegetables and fruits. Nothing tastes improved than food cooked with vegetables plucked straight off the plant, or fruits are eaten in their freshest form.</span></p><div class="code-block code-block-3" data-dcnode-id="2762" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2771" instrument_node="">
</span><span data-dcnode-id="2769" instrument_node="">
</span><span data-dcnode-id="2767" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7693910671673147" data-ad-format="auto" data-ad-slot="7527137917" data-dcnode-id="2766" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="2765" instrument_node="">
</span></div><span data-dcnode-id="2761" instrument_node="">
</span><p data-dcnode-id="2757"><strong data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">It brings one closer to nature:</span></strong><span data-dcnode-id="2758" instrument_node=""> Nature is always has been man’s best friend. Terrace gardens bring a piece of nature to the house.</span></p><div class="code-block code-block-5" data-dcnode-id="2754" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2756" instrument_node="">
</span></div><span data-dcnode-id="2753" instrument_node="">
</span><p data-dcnode-id="2746"><strong data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">Helps in reducing pollution:</span></strong><span data-dcnode-id="2750" instrument_node=""> </span><u data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">Terrace garden plants increase oxygen production</span></u><span data-dcnode-id="2747" instrument_node=""> in the air. Having a garden means increasing the flow of oxygen and thus reducing pollution. The plants capture airborne pollutants &amp; filter toxic gases. They potentially control the quantity of carbon-di-oxide and other pollutants constantly released into the air. Your children breathe in the fresh air your garden brings in, which in turn helps them to increase a stronger immunity system.</span></p><div class="code-block code-block-3" data-dcnode-id="2736" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2745" instrument_node="">
</span><span data-dcnode-id="2743" instrument_node="">
</span><span data-dcnode-id="2741" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7693910671673147" data-ad-format="auto" data-ad-slot="7527137917" data-dcnode-id="2740" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="2739" instrument_node="">
</span></div><span data-dcnode-id="2735" instrument_node="">
</span><p data-dcnode-id="2725"><span data-dcnode-id="2731" style="color: #ff0000;"><strong data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">Read:</span></strong><span data-dcnode-id="2732" instrument_node=""> </span></span><a data-dcnode-id="2727" data-mil="94" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardeningtips.in/vegetable-terrace-gardening-a-complete-guide"><span data-dcnode-id="2728" style="color: #0000ff;"><strong data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">Terrace Vegetable Gardening</span></strong></span></a><span data-dcnode-id="2726" instrument_node="">.</span></p><span data-dcnode-id="2724" instrument_node="">
</span><p data-dcnode-id="2712"><strong data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">Improvement to the environment:</span></strong><span data-dcnode-id="2721" instrument_node=""> Our home prior to the terrace garden was extremely warm in the summer time.&nbsp; We have reduced the amount of light or heat being reflected off the roof.&nbsp; In addition, the garden plants are reducing the carbon monoxide from the environment. </span><u data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">How does terrace farming impact the environment?</span></u><span data-dcnode-id="2718" instrument_node=""> Graduated terrace steps are normally used to farm on hilly or mountainous terrain. Terraced fields decrease both </span><a data-ail="94" data-dcnode-id="2716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardeningtips.in/preparing-soil-for-vegetable-garden-a-full-guide" target="_self"><span data-dcnode-id="2717" instrument_node="">soil</span></a><span data-dcnode-id="2715" instrument_node=""> erosion and surface runoff, and can be used to support growing crops that require irrigation, such as rice.</span><strong data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">&nbsp;</span></strong></p><div class="code-block code-block-3" data-dcnode-id="2702" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2711" instrument_node="">
</span><span data-dcnode-id="2709" instrument_node="">
</span><span data-dcnode-id="2707" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7693910671673147" data-ad-format="auto" data-ad-slot="7527137917" data-dcnode-id="2706" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="2705" instrument_node="">
</span></div><span data-dcnode-id="2701" instrument_node="">
</span><p data-dcnode-id="2694"><strong data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">Helps in rainwater harvesting:</span></strong><span data-dcnode-id="2698" instrument_node=""> Terrace gardens retain </span><u data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">rainwater</span></u><span data-dcnode-id="2695" instrument_node=""> &amp; thus help in moderate the temperature. They also arrest the flow of stormwater, therefore decreasing the pressure on sewer systems when the flow is forceful.</span></p><div class="code-block code-block-4" data-dcnode-id="2686" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2693" instrument_node="">
</span><span data-dcnode-id="2691" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7693910671673147" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="5469708161" data-dcnode-id="2690" style="display:block; text-align:center;"></ins><span data-dcnode-id="2689" instrument_node="">
</span></div><span data-dcnode-id="2685" instrument_node="">
</span><p data-dcnode-id="2681"><strong data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Keeps the temperature cooler: </span></strong><span data-dcnode-id="2682" instrument_node="">The regular dew and evaporation cycle keeps the surface of the roof cool and thus provides a cool environment inside the house. Another fact that maintains the heat in check is that the light that is absorbed by all the vegetation on the terrace garden would otherwise be converted into heat energy in the absence of the plants.</span></p><span data-dcnode-id="2680" instrument_node="">
</span><p data-dcnode-id="2676"><strong data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">Aesthetic benefit:</span></strong><span data-dcnode-id="2677" instrument_node=""> Create your house visually appealing to the existence of a terrace garden. It beats any pricey &amp; modern uplift that you can do to your house.</span></p><span data-dcnode-id="2675" instrument_node="">
</span><p data-dcnode-id="2668"><strong data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Prevents soil erosion &amp; makes more efficient use of water:</span></strong><span data-dcnode-id="2672" instrument_node=""> Just like the rice terraces throughout Asia, </span><u data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">garden terracing can solve the trouble of soil erosion and water runoff</span></u><span data-dcnode-id="2669" instrument_node="">. For instance, if you have a graded lawn that slopes to the street which regularly sends dirt &amp; water into the gutter system, a terrace will naturally retain that water on flat planes instead. That way, you can use your hill &amp; save the drainage system from flooding.</span></p><div class="code-block code-block-3" data-dcnode-id="2658" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2667" instrument_node="">
</span><span data-dcnode-id="2665" instrument_node="">
</span><span data-dcnode-id="2663" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7693910671673147" data-ad-format="auto" data-ad-slot="7527137917" data-dcnode-id="2662" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="2661" instrument_node="">
</span></div><span data-dcnode-id="2657" instrument_node="">
</span><p data-dcnode-id="2652"><span data-dcnode-id="2656" instrument_node="">This is a good thing because some municipalities are writing legislature taking away government liability for flood damage to homes caused by sewage backups. The newer homes that are built on green spaces, the additional sewage backups will become a regular thing. </span><u data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">Where can one start a terrace garden?</span></u><span data-dcnode-id="2653" instrument_node=""> Terrace gardens can be created on almost all types of buildings like residential flats, individual houses, commercial hubs, godowns, and factories.</span></p><span data-dcnode-id="2651" instrument_node="">
</span><p data-dcnode-id="2641"><span data-dcnode-id="2648" style="color: #ff0000;"><strong data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Read:</span></strong></span><span data-dcnode-id="2647" instrument_node=""> </span><a data-dcnode-id="2643" data-mil="94" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardeningtips.in/starting-hydroponics-gardening-at-home"><span data-dcnode-id="2644" style="color: #0000ff;"><strong data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">How To Start Hydroponics At Home</span></strong></span></a><span data-dcnode-id="2642" instrument_node="">.</span></p><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2636"><strong data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">Creates natural steps &amp; a flat space for gardening:</span></strong><span data-dcnode-id="2637" instrument_node=""> If you have a sloped lawn, you know how difficult it can be to apply it for play or gardening. With the addition of some earth or compost, a terrace can include quite a few extra square feet for those purposes. The possibilities are continuous.</span></p><div class="code-block code-block-3" data-dcnode-id="2626" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2635" instrument_node="">
</span><span data-dcnode-id="2633" instrument_node="">
</span><span data-dcnode-id="2631" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7693910671673147" data-ad-format="auto" data-ad-slot="7527137917" data-dcnode-id="2630" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="2629" instrument_node="">
</span></div><span data-dcnode-id="2625" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2624" instrument_node="">The </span><u data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">greatest advantage of terrace gardening</span></u><span data-dcnode-id="2621" instrument_node=""> is that you relax in the lap of nature when you want. Apart from health &amp; environment, it has an aesthetic benefit too. It can make your home cooler by 6-8°C. Thus a big saving in air conditioning cost. You can also get fresh, clean air right at your home and enjoy the healthy and organically grown green &amp; fresh vegetables grown on your terrace.</span></p><span data-dcnode-id="2619" instrument_node="">
</span><h4 data-dcnode-id="2614"><span data-dcnode-id="2615" id="Disadvantages_of_Terrace_gardening"><strong data-dcnode-id="2616"><u data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">Disadvantages of Terrace gardening:</span></u></strong></span></h4><span data-dcnode-id="2613" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2612" instrument_node="">One </span><u data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">major disadvantage of terrace gardening</span></u><span data-dcnode-id="2609" instrument_node=""> is rainwater saturation of the ground. This happens when terracing retains too much water, which is absorbed into the ground or soil. The problem with ground saturation is that it can lead to water overflow through periods of heavy rains. This can end up source more damaging runoff than in unterraced areas. Additionally, if not accurately maintained, terraces can lead to greater </span><u data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">soil erosion</span></u><span data-dcnode-id="2606" instrument_node="">, often downslope from the terracing, than in non-terraced areas.</span></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Terrace garden requires huge inputs of labor to construct &amp; maintain, and when not properly maintained, the effects can be catastrophic. Unmaintained terraces can lead to mudslides, the creation of deep gulleys and increased soil erosion, mainly in sandy soils or on extremely steep terrains. Terracing also has been exposed to reduce soil quality via the leaching of important nutrients from the soil in some areas.</span></p><span data-dcnode-id="2601" instrument_node="">
