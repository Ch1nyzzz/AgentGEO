</span><div class="c-article-body" data-dcnode-id="878"><span data-dcnode-id="1734" instrument_node="">
</span><div class="c-article-section__content c-article-section__content--standfirst u-text-bold" data-dcnode-id="1731" lang="en"><p data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Local implementation and public scrutiny will make or break the government's urbanization strategy, say Xuemei Bai, Peijun Shi and Yansui Liu.</span></p></div><span data-dcnode-id="1730" instrument_node="">
</span><noscript data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">
</span></noscript><span data-dcnode-id="1727" instrument_node="">
</span><div class="c-article-section__content" data-dcnode-id="1716"><span data-dcnode-id="1726" instrument_node="">
</span><div class="c-article-section__illustration-center c-article-section__illustration u-clearfix" data-dcnode-id="1717" data-test="illustration" id="i1" style="width:300px;"><div class="c-article-section__figure c-article-section__figure--1-border" data-dcnode-id="1722"><picture data-dcnode-id="1723"><source data-dcnode-id="1725" srcset="//media.springernature.com/w300/springer-static/image/art%3A10.1038%2F509158a/MediaObjects/41586_2014_BF509158a_Figb_HTML.jpg?as=webp" type="image/webp"><img alt="" aria-describedby="i1-desc" class="c-article-section__figure--1-border-image" data-dcnode-id="1724" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/w300/springer-static/image/art%253A10.1038/509158a/MediaObjects/41586_2014_BF509158a_Figb_HTML.jpg&amp;raw" width="300"></picture></div><div class="c-article-section__figure-1-border-caption" data-dcnode-id="1718" data-test="image-caption" id="i1-desc" style="width:300px;"><span data-dcnode-id="1721" instrument_node="">Development in the city of Jiangyin, which lies close to the Yangtze River near China’s east coast.</span><span class="c-article-section__figure-credit" data-dcnode-id="1719" data-test="illustration-credit"><span data-dcnode-id="1720" instrument_node="">
            Credit: Kacper Kowalski/Panos Pictures</span></span></div></div></div><div class="c-article-section__content" data-dcnode-id="1698"><div class="c-article-section__illustration-right c-article-section__illustration u-clearfix" data-dcnode-id="1700" data-test="illustration" id="i2" style="width:164px;"><div class="c-article-section__figure c-article-section__figure--1-border" data-dcnode-id="1712"><picture data-dcnode-id="1713"><source data-dcnode-id="1715" srcset="//media.springernature.com/relative-r300-703_m1050/springer-static/image/art%3A10.1038%2F509158a/MediaObjects/41586_2014_BF509158a_Figa_HTML.png?as=webp" type="image/webp"><img alt="" aria-describedby="i2-desc" class="c-article-section__figure--1-border-image" data-dcnode-id="1714" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/relative-r300-703_m1050/springer-static/image/art%253A10.1038/509158a/MediaObjects/41586_2014_BF509158a_Figa_HTML.png&amp;raw" width="164"></picture></div><div class="c-article-section__figure-1-border-caption" data-dcnode-id="1701" data-test="image-caption" id="i2-desc" style="width:164px;"><span data-dcnode-id="1711" instrument_node="">
</span><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nature.com/news/first-exoplanet-seen-spinning-1.15132"><span data-dcnode-id="1710" instrument_node="">First rotation rate of an exoplanet measured</span></a><span data-dcnode-id="1708" instrument_node="">
</span><a data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nature.com/news/bird-reproduction-collapsed-after-oil-spill-1.15130"><span data-dcnode-id="1707" instrument_node="">Tanker disaster cut bird fertility in half</span></a><span data-dcnode-id="1705" instrument_node="">
</span><a data-dcnode-id="1703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nature.com/news/infectious-diseases-smallpox-watch-1.15115"><span data-dcnode-id="1704" instrument_node="">Searching mummies for ancient smallpox viruses</span></a><span data-dcnode-id="1702" instrument_node="">
</span></div></div><span data-dcnode-id="1699" instrument_node="">
</span></div><div class="c-article-section__content" data-dcnode-id="1695"><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">China is urbanizing at an unprecedented rate. It is perhaps the greatest human-resettlement experiment in history. Between 1978 and 2012, the fraction of the nation's population dwelling in cities increased from 17.9% to 52.6% (see 'Urban expansion'). If the current trend holds, China's urban population could top 1 billion people in the next two decades.</span></p></div><div class="c-article-section__content" data-dcnode-id="1692"><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">These are uncharted waters, but China has a plan. In March, the government released the National New-type Urbanization Plan, which sets targets for China's urban population fraction to rise by 1% a year to reach 60% by 2020.</span></p></div><div class="c-article-section__content" data-dcnode-id="1689"><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">The plan is comprehensive and ambitious. It covers almost every conceivable aspect of urbanization, from rural–urban migration and integration to the spatial distribution of and linkages between cities; sustainable development; institutional arrangements; and implementation. It sets numerical goals (see 'Government targets') and as a guiding principle emphasizes a sustainable and people-centred approach, paying more attention to welfare and well-being — a significant and positive shift from the current economic focus on land development. It also aims to rectify existing problems associated with the rapid urbanization in the past three decades.</span></p></div><div class="c-article-section__content" data-dcnode-id="1686"><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">The right national strategy is necessary. But it is not sufficient. It is local practices that will make or break China's urbanization plan.</span></p></div><div class="c-article-section__content" data-dcnode-id="1680"><p data-dcnode-id="1681"><span data-dcnode-id="1685" instrument_node="">
</span><b data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Government goals</span></b><span data-dcnode-id="1682" instrument_node="">
</span></p></div><div class="c-article-section__content" data-dcnode-id="1677"><p data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">President Xi Jinping and Premier Li Keqiang see sustainable urbanization as a policy priority for three reasons.</span></p></div><div class="c-article-section__content" data-dcnode-id="1666"><p data-dcnode-id="1667"><span data-dcnode-id="1676" instrument_node="">First, urbanization and industrialization are the two engines of modernization and economic growth. High-income countries typically have high urban population proportions — 70–90% for countries in the Organisation for Economic Co-operation and Development. By comparison, China's urbanization lags behind its industrialization. Research shows that urbanization does promote economic growth in China</span><sup data-dcnode-id="1673"><a aria-label="Reference 1" data-dcnode-id="1674" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d321197522e448" title="Bai, X., Chen, J. &amp;amp; Shi, P. Environ. Sci. Technol. 46, 132–139 (2012)."><span data-dcnode-id="1675" instrument_node="">1</span></a></sup><span data-dcnode-id="1672" instrument_node="">, even though the causal link between the two has been questioned</span><sup data-dcnode-id="1669"><a aria-label="Reference 2" data-dcnode-id="1670" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d321197522e452" title="Bloom, D. E., Canning, D. &amp;amp; Fink, G. Science 319, 772–775 (2008)."><span data-dcnode-id="1671" instrument_node="">2</span></a></sup><span data-dcnode-id="1668" instrument_node="">.</span></p></div><div class="c-article-section__content" data-dcnode-id="1663"><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Second, to keep its economy growing, China needs to shift from its current reliance on exports by spurring domestic demand. Urbanization enhances domestic consumption: per capita income in China is more than three times higher in urban than in rural communities.&nbsp;</span></p></div><div class="c-article-section__content" data-dcnode-id="1660"><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Third, urbanization can catalyse regional development. With less than 0.1 hectares of arable land per farmer, rural China has little room to boost income growth by expanding agriculture. Urbanization will reduce the poor agricultural population and the number of smallholder farms, and open up possibilities for accelerated rural development through large-scale, modernized farming practices.</span></p></div><div class="c-article-section__content" data-dcnode-id="1653"><p data-dcnode-id="1654"><span data-dcnode-id="1659" instrument_node="">Development is at the core of these rationales, and the government aims to do it in a sustainable way. Building and operating growing cities requires materials and energy, but the demand for some of these will exceed the country's supply capacity</span><sup data-dcnode-id="1656"><a aria-label="Reference 3" data-dcnode-id="1657" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d321197522e464" title="Shen, L., Cheng, S., Gunson, A. J. &amp;amp; Wan, H. Cities 22, 287–302 (2005)."><span data-dcnode-id="1658" instrument_node="">3</span></a></sup><span data-dcnode-id="1655" instrument_node="">. And daunting environmental and social challenges caused by past urbanization need to be avoided. </span></p></div><div class="c-article-section__content" data-dcnode-id="1643"><span data-dcnode-id="1652" instrument_node="">
</span><div class="c-article-section__illustration-center c-article-section__illustration u-clearfix" data-dcnode-id="1644" data-test="illustration" id="i3" style="width:703px;"><div class="c-article-section__figure c-article-section__figure--1-border" data-dcnode-id="1648"><picture data-dcnode-id="1649"><source data-dcnode-id="1651" srcset="//media.springernature.com/relative-r300-703_m1050/springer-static/image/art%3A10.1038%2F509158a/MediaObjects/41586_2014_BF509158a_Figc_HTML.jpg?as=webp" type="image/webp"><img alt="" aria-describedby="i3-desc" class="c-article-section__figure--1-border-image" data-dcnode-id="1650" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/relative-r300-703_m1050/springer-static/image/art%253A10.1038/509158a/MediaObjects/41586_2014_BF509158a_Figc_HTML.jpg&amp;raw" width="703"></picture></div><div class="c-article-section__figure-1-border-caption" data-dcnode-id="1645" data-test="image-caption" id="i3-desc" style="width:703px;"><span class="c-article-section__figure-credit" data-dcnode-id="1646" data-test="illustration-credit"><span data-dcnode-id="1647" instrument_node="">
            Credit: Sources: 1, China Statistical Yearbook; 2, National Bureau of Statistics of China</span></span></div></div></div><div class="c-article-section__content" data-dcnode-id="1640"><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">China aims to guide the development of urban areas according to their resource and environmental carrying capacity; improve land, water and other resource use efficiency; stabilize the employment of migrating workers; and promote green and low-carbon urban construction and operation. Its 12th Five-Year Plan for 2011–15 also aims to reduce construction land use per unit of gross domestic product (GDP) by 30%, energy intensity by 16% and carbon dioxide emission intensity by 17%.</span></p></div><div class="c-article-section__content" data-dcnode-id="1630"><p data-dcnode-id="1631"><span data-dcnode-id="1639" instrument_node="">There is, of course, a catch: if the income of new urban residents matches that of existing ones, the consumption that will fuel China's economic growth will present sustainability challenges to the country and other parts of the world. For example, the rise in CO</span><sub data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">2</span></sub><span data-dcnode-id="1636" instrument_node=""> emissions that would result if China's household consumption patterns converge with current US levels could not be offset by efficiency gains alone</span><sup data-dcnode-id="1633"><a aria-label="Reference 4" data-dcnode-id="1634" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d321197522e497" title="Guan, D., Hubacek, K., Weber, C. L., Peters, G. P. &amp;amp; Reiner, D. M. Glob. Environ. Change 18, 626–634 (2008)."><span data-dcnode-id="1635" instrument_node="">4</span></a></sup><span data-dcnode-id="1632" instrument_node="">. Promoting low-carbon lifestyles is mentioned in the plan only in passing and without concrete measures or targets for how they might be achieved. </span></p></div><div class="c-article-section__content" data-dcnode-id="1608"><p data-dcnode-id="1625"><span data-dcnode-id="1629" instrument_node="">
</span><a data-dcnode-id="1627" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1628" instrument_node="">Government targets</span></a><span data-dcnode-id="1626" instrument_node="">
</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1610" data-test="inline-table" id="table-1"><figure data-dcnode-id="1611"><figcaption class="c-article-table__figcaption" data-dcnode-id="1622"><b data-dcnode-id="1623" data-test="table-caption" id="Tab1"><span data-dcnode-id="1624" instrument_node="">Table 7.17175 Government targets</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1612"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="1613" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/509158a/tables/1" rel="nofollow"><span data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1614" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1615" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1616" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1619" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1618" fill-rule="evenodd"></path><span data-dcnode-id="1617" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1609" instrument_node="">
</span></div><div class="c-article-section__content" data-dcnode-id="1602"><p data-dcnode-id="1603"><span data-dcnode-id="1607" instrument_node="">
</span><b data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Policy challenges</span></b><span data-dcnode-id="1604" instrument_node="">
</span></p></div><div class="c-article-section__content" data-dcnode-id="1599"><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">To live the urban dream, China faces three policy challenges: land, people and the environment.</span></p></div><div class="c-article-section__content" data-dcnode-id="1592"><p data-dcnode-id="1593"><span data-dcnode-id="1598" instrument_node="">In the past decade, the urban built-up land area in China has grown by 78.5% — faster than its urban population, which grew by 46%. The rapid pace of landscape urbanization is driven by Chinese cities' over-reliance on income from land release</span><sup data-dcnode-id="1595"><a aria-label="Reference 1" data-dcnode-id="1596" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d321197522e881" title="Bai, X., Chen, J. &amp;amp; Shi, P. Environ. Sci. Technol. 46, 132–139 (2012)."><span data-dcnode-id="1597" instrument_node="">1</span></a></sup><span data-dcnode-id="1594" instrument_node="">, which can amount to 70% of their total revenue. Land-release income increased by a factor of six between 2005 and 2011.</span></p></div><div class="c-article-section__content" data-dcnode-id="1589"><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">About half of urban growth has been at the expense of arable land, raising concerns about food security. To curb the loss of agricultural land, the central government has introduced strict regulations, mandating that cities offset developed land by securing the same amount of arable land elsewhere or reducing the area of land used for rural housing.</span></p></div><div class="c-article-section__content" data-dcnode-id="1586"><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">These policies have had limited success, and in some cases, adverse consequences. In a desperate search for non-agricultural land to develop, cities have reclaimed wetlands and lakes and converted pristine mountains. At the same time, developed land is not being used efficiently — attention quickly shifts to the next development project.</span></p></div><div class="c-article-section__content" data-dcnode-id="1579"><p data-dcnode-id="1580"><span data-dcnode-id="1585" instrument_node="">The flow of people from rural communities to cities raises problems. Migrating peasant workers, currently estimated at 250 million, are prevented from integrating into urban communities by the household registration system. This restricts the official changing of citizens' permanent residence, and effectively limits those with rural registration from gaining access to urban medical insurance and other services. Migrants typically live in 'urban villages', often former villages or new shanty towns on the edge of a settlement, without adequate social security, health care or schools</span><sup data-dcnode-id="1582"><a aria-label="Reference 5" data-dcnode-id="1583" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d321197522e892" title="Liu, Y., Lu, S. &amp;amp; Chen, Y. J. Rural Stud. 32, 320–330 (2013)."><span data-dcnode-id="1584" instrument_node="">5</span></a></sup><span data-dcnode-id="1581" instrument_node="">.</span></p></div><div class="c-article-section__content" data-dcnode-id="1576"><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Although forbidden, 'forced urbanization' is widespread. Rural residential lands are being expropriated with insufficient compensation and inhabitants forced into newly developed apartment buildings. Peri-urban communities — those that straddle urban and rural areas — that are affected by expansion often become more vulnerable both socially and economically, with a sudden loss of traditional livelihoods such as farming and fishing, and without adequate skills and access to other jobs.</span></p></div><div class="c-article-section__content" data-dcnode-id="1573"><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Neglecting migrants' needs has enabled Chinese cities to grow at low cost. Now this strategy is backfiring. For example, the lack of security and sense of belonging of incoming workers in cities makes them reluctant to give up their rural land quota, which is left uncultivated. They invest their savings to build bigger houses back in the villages, often on agricultural land. Urban crimes and protests for appropriate pay by migrant workers are rising.</span></p></div><div class="c-article-section__content" data-dcnode-id="1566"><p data-dcnode-id="1567"><span data-dcnode-id="1572" instrument_node="">Although rural populations are smaller than urban ones, and falling, rural residential land use has increased rapidly. Four times more rural land than urban is being used for construction of all sorts, often inefficiently. More than 7.58 million hectares of potential arable land could be realized by optimizing rural residential land use — clearing up discarded residential plots</span><sup data-dcnode-id="1569"><a aria-label="Reference 6" data-dcnode-id="1570" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d321197522e904" title="Liu, Y., Yang, R. &amp;amp; Li, Y. J. Geograph. Sci. 23, 503–512 (2013)."><span data-dcnode-id="1571" instrument_node="">6</span></a></sup><span data-dcnode-id="1568" instrument_node="">, for example. Integrating migrating workers into urban life — for instance, by guaranteeing access to education and providing water and sanitation — has costs, but is essential to achieving the state's policy goals and maintaining social stability.</span></p></div><div class="c-article-section__content" data-dcnode-id="1551"><p data-dcnode-id="1552"><span data-dcnode-id="1565" instrument_node="">Urbanization is also linked to environmental and health problems</span><sup data-dcnode-id="1562"><a aria-label="Reference 7" data-dcnode-id="1563" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d321197522e911" title="Grimm, N. B. et al. Science 319, 756–760 (2008)."><span data-dcnode-id="1564" instrument_node="">7</span></a></sup><span data-dcnode-id="1561" instrument_node="">. About two-thirds of Chinese cities are short of water, exacerbated by severe surface and ground water pollution. Air and water quality in cities and the surrounding rural areas are deteriorating, with increases in respiratory diseases and cancer rates</span><sup data-dcnode-id="1558"><a aria-label="Reference 8" data-dcnode-id="1559" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d321197522e915" title="Chen, Z., Wang, J.-N., Ma, G.-X. &amp;amp; Zhang, Y.-S. Lancet 382, 1959–1960 (2013)."><span data-dcnode-id="1560" instrument_node="">8</span></a></sup><span data-dcnode-id="1557" instrument_node="">. In 2013, Beijing hit a high for the number of days with smog pollution — 46 of the first 100 days of the year. Illegal discharge of industrial wastewater, which contains heavy metals and other pollutants, around cities is blamed by some for more than 400 'cancer villages', in which cancer diagnoses and deaths are sometimes 20–30 times higher than the national average</span><sup data-dcnode-id="1554"><a aria-label="Reference 9" data-dcnode-id="1555" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d321197522e919" title="Liu, L. Environment 52, 8–21 (2010)."><span data-dcnode-id="1556" instrument_node="">9</span></a></sup><span data-dcnode-id="1553" instrument_node="">.</span></p></div><div class="c-article-section__content" data-dcnode-id="1548"><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Most city development has been in the eastern part of the country, particularly along the coast. The procession of urban and industrial development inland and westwards, to spread manufacturing across the country and reduce regional disparities, is clearly articulated in the government's strategy. But this could bring polluting industries into regions where fragile ecosystems are providing crucial services to the nation. Pollution in western China, for example, which is home to the sources of the Yangtze, Yellow and Lancang rivers, could have profound effects downstream.</span></p></div><div class="c-article-section__content" data-dcnode-id="1545"><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Environmental management strategies that stop at cities' administrative boundaries are no longer effective, as epitomized by the frequent regional smogs. Officials need to identify good ways to collaborate across city and regional boundaries.</span></p></div><div class="c-article-section__content" data-dcnode-id="1539"><p data-dcnode-id="1540"><span data-dcnode-id="1544" instrument_node="">
</span><b data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Local implementation</span></b><span data-dcnode-id="1541" instrument_node="">
</span></p></div><div class="c-article-section__content" data-dcnode-id="1536"><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">The National New-type Urbanization Plan aims to tackle some of these challenges. The household registration constraints will be removed or relaxed in towns and cities with populations of up to 5 million. Large investments are to be made to eradicate shanty towns and to provide basic infrastructure in the 'urban villages'.</span></p></div><div class="c-article-section__content" data-dcnode-id="1533"><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">A new land-management system will increase farmers' property rights, preventing undervalued or illegal land expropriation by local governments. It will restrict rural households from occupying more than one residential plot, putting a stop to rural-sprawl encroaching on arable land. Local governments will be rewarded with central funds for integrating rural populations into the urban system.</span></p></div><div class="c-article-section__content" data-dcnode-id="1530"><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">The devil, however, is in the detail. Some of these central government reforms conflict with local interests, inviting malpractice. Increased duties of care for migrants and restricted access to land for development will increase the burden on cities and reduce their net revenue.</span></p></div><div class="c-article-section__content" data-dcnode-id="1527"><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">There are many examples of cities behaving opportunistically. The city of Wuhan, for example, once known for its numerous lakes, has lost 70% of them to reclamation and development in the past 20 years. The Huai River Pollution Control Project, a high-profile, target-driven initiative led by the central government during the 1990s to clean up the heavily polluted river basin, failed when it collided with local income needs. The main measures — shutting down polluting industries and imposing stronger regulations on industrial pollutions — were relaxed after the target time frame.</span></p></div><div class="c-article-section__content" data-dcnode-id="1524"><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">To put people at the centre of policies, leaders need to move away from numerical indicators such as GDP growth or urbanization level, which are often pursued at any expense. City leaders need to be encouraged and rewarded for adopting more responsible and sustainable practices, such as taking care of migrating workers.</span></p></div><div class="c-article-section__content" data-dcnode-id="1521"><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node=""> Local officials must be made more accountable to deter malpractice. </span></p></div><div class="c-article-section__content" data-dcnode-id="1518"><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Local officials must be made more accountable to deter malpractice. Better methods for evaluating personnel and channels for public scrutiny of officials' actions, perhaps on the Internet, need to be established. Serious breaches of regulations must be punishable by law, instead of reprimanded with mere warnings and demotions in the party and the government system.</span></p></div><div class="c-article-section__content" data-dcnode-id="1515"><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Some cities are already doing well, exceeding the government's expectations. The city of Zhuhai, for example, has been spearheading the introduction of regulations and legal procedures for making and implementing urban-development plans, promoting public participation in the planning process and aligning urban-development goals with its social, economic, resource and environmental context. Zhuhai topped the sustainable-development ranking in the 2013 Urban Sustainability Index of Chinese cities.</span></p></div><div class="c-article-section__content" data-dcnode-id="1509"><p data-dcnode-id="1510"><span data-dcnode-id="1514" instrument_node="">
</span><b data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Way forward</span></b><span data-dcnode-id="1511" instrument_node="">
</span></p></div><div class="c-article-section__content" data-dcnode-id="1506"><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Governments must not shirk the responsibilities of protecting farmer's rights; providing proper social security and basic urban infrastructure; and ensuring better environmental quality and health outcomes in cities and surrounding regions. They must address risks and hazards such as flooding and smog.</span></p></div><div class="c-article-section__content" data-dcnode-id="1499"><p data-dcnode-id="1500"><span data-dcnode-id="1505" instrument_node="">Rapid urbanization is an enormous opportunity to introduce sustainable technologies and practices on a national scale. The latest plan, for example, aims to drastically improve the share of green buildings in new construction from 2% in 2012 to 50% by 2020, by improving green building codes and certificate and accreditation systems, making their adoption compulsory, and developing green construction materials. Efforts must be made to identify innovative practices, build up transferable knowledge and facilitate cross-city learning</span><sup data-dcnode-id="1502"><a aria-label="Reference 10" data-dcnode-id="1503" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d321197522e962" title="Bai, X., Roberts, B. &amp;amp; Chen, J. Environ. Sci. Policy 13, 312–325 (2010)."><span data-dcnode-id="1504" instrument_node="">10</span></a></sup><span data-dcnode-id="1501" instrument_node="">.</span></p></div><div class="c-article-section__content" data-dcnode-id="1496"><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">High-level policy intervention, if done properly, can be a powerful force for good. But to succeed, a tailored and adaptive policy approach that engages with local social, environmental, economic and cultural contexts and allows local innovation will be crucial.</span></p></div><div class="c-article-section__content" data-dcnode-id="1493"><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">The ultimate driver of urbanization is — and should continue to be — the aspiration of rural people to lead a better life. And that will be the ultimate measure of success. Urban residents, current and future, must have a say in shaping their cities. They are the ones who will give the verdict on, and live with, the outcome of China's urbanization policy.</span></p></div><span data-dcnode-id="1492" instrument_node="">
</span><section data-dcnode-id="1470" data-title="Change history"><div class="c-article-section" data-dcnode-id="1471" id="change-history-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1490" id="change-history"><span data-dcnode-id="1491" instrument_node="">Change history</span></h2><div class="c-article-section__content" data-dcnode-id="1472" id="change-history-content"><ul class="c-article-change-list" data-dcnode-id="1473"><li class="c-article-change-list__item u-mb-24" data-dcnode-id="1483" id="chg1"><ins data-dcnode-id="1484" datetime="2014-05-07"><h3 class="c-article-change-list__heading u-h3 u-pr-8 u-display-inline" data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">07 May 2014</span></h3><div class="c-article-change-list__details" data-dcnode-id="1485"><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">The print version of this article wrongly stated that more than 75.8 million hectares of arable land in China could be realized by optimizing rural residential land use. The correct figure is 7.58 million hectares.</span></p></div></ins></li><li class="c-article-change-list__item u-mb-24" data-dcnode-id="1474" id="chg2"><ins data-dcnode-id="1475" datetime="2014-05-21"><h3 class="c-article-change-list__heading u-h3 u-pr-8 u-display-inline" data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">21 May 2014</span></h3><div class="c-article-change-list__details" data-dcnode-id="1476"><p data-dcnode-id="1477"><span data-dcnode-id="1480" instrument_node="">A Correction to this paper has been published: </span><a data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1038/509423a"><span data-dcnode-id="1479" instrument_node="">https://doi.org/10.1038/509423a</span></a></p></div></ins></li></ul></div></div></section><div data-dcnode-id="1278" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="1279" data-title="References"><div class="c-article-section" data-dcnode-id="1280" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1468" id="Bib1"><span data-dcnode-id="1469" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="1281" id="Bib1-content"><div data-container-section="references" data-dcnode-id="1282"><ol class="c-article-references" data-dcnode-id="1292"><li class="c-article-references__item js-c-reading-companion-references-item" data-counter="1" data-dcnode-id="1446"><p class="c-article-references__text" data-dcnode-id="1460" id="ref-CR1"><span data-dcnode-id="1467" instrument_node="">Bai, X., Chen, J. &amp;amp; Shi, P. </span><i data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Environ. Sci. Technol.</span></i><span data-dcnode-id="1464" instrument_node=""> </span><b data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">46</span></b><span data-dcnode-id="1461" instrument_node="">, 132–139 (2012).</span></p><p class="c-article-references__links u-hide-print" data-dcnode-id="1447"><a aria-label="ADS reference 1" data-dcnode-id="1458" data-track="click" data-track-action="outbound reference" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//adsabs.harvard.edu/cgi-bin/nph-data_query%3Flink_type%3DABSTRACT%26bibcode%3D2012EnST...46..132B"><span data-dcnode-id="1459" instrument_node="">ADS</span></a><span data-dcnode-id="1457" instrument_node="">&nbsp;
