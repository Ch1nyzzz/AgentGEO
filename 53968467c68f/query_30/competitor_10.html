</span><h2 data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Air Purifier Types</span></h2><div class="articlecontentcontainer parbase" data-dcnode-id="355"><article class="grid-100 grid-parent v-spacing-large article-content-container" data-dcnode-id="356"><div class="grid-70 grid-parent" data-dcnode-id="357"><div class="grid-100 v-spacing-small" data-dcnode-id="360"><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Adding an air purifying system to your home can make life much more pleasant by removing pet dander, pollen, mold, chemical fumes and odors from the air. Sanitizing the air can also help ease chronic breathing conditions, such as asthma and seasonal allergies. When selecting the best air purifier for your home, it’s helpful to know that these devices are categorized by the type of filtration system they use.</span></p><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">There are several different home air purifier types, including HEPA and ionic devices. You’ll want to choose a model recommended for the size of the room in which you plan to use it. So be sure to check the cubic feet specification on the box. Although there are many variations in design and performance, machines with a larger surface area tend to work more quickly and efficiently than those with a smaller surface area. See the manufacturer’s specifications to see how many cubic feet of air a purifier can process in one minute. The higher the number, the better the overall performance, typically. If you’re concerned about energy usage, consider a smart air purifier that you can configure to turn off automatically at a certain time or as you move from room to room, using your smart device.</span></p></div><h2 class="grid-100 no-padding" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Activated Carbon and Activated Charcoal Air Purifiers</span></h2></div></article></div><div class="articlecontentcontainer parbase" data-dcnode-id="349"><article class="grid-100 grid-parent v-spacing-large article-content-container" data-dcnode-id="350"><div class="grid-70 grid-parent" data-dcnode-id="351"><div class="grid-100 v-spacing-small" data-dcnode-id="352"><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Activated carbon air purifiers and activated charcoal air purifiers remove various types of odor-causing particles from the air, such as pet odors and tobacco smoke, by reacting to them chemically and causing them to stick to the filter surface. The filter on this type of room air purifier must be replaced regularly, as indicated by the manufacturer, to keep your home odor free. Although activated carbon and activated charcoal purifiers fight unpleasant smells very well, some models are not as effective at removing bacteria, viruses, mold and mildew from the room air.</span></p></div></div></article></div><div class="articlecontentcontainer parbase" data-dcnode-id="340"><article class="grid-100 grid-parent v-spacing-large article-content-container" data-dcnode-id="341"><div class="grid-70 v-spacing-mini" data-dcnode-id="346" id="articlecontentcontai_751367652"><h2 data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">UV Air Purifiers</span></h2></div><div class="grid-70 grid-parent" data-dcnode-id="342"><div class="grid-100 v-spacing-small" data-dcnode-id="343"><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Ultraviolet (UV) air purifiers employ UV-C light (a type of ultraviolet light) to kill many harmful and irritating microorganisms in the air, such as mold, bacteria and viruses. UV-C technology is frequently used in a variety of applications in medical facilities to kill germs. Some UV air purifier models install in your home’s central air duct. Others employ both UV technology and activated carbon or HEPA filtration for added performance, as UV-C light alone may not remove odors as successfully as some other air-purification technologies. You will need to occasionally clean and replace the bulb on a UV purifier, according to the manufacturer’s recommendations, to maintain the device’s effectiveness.</span></p></div></div></article></div><div class="articlecontentcontainer parbase" data-dcnode-id="331"><article class="grid-100 grid-parent v-spacing-large article-content-container" data-dcnode-id="332"><div class="grid-70 v-spacing-mini" data-dcnode-id="337" id="articlecontentcontai_2119811544"><h2 data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Electrostatic Air Purifiers</span></h2></div><div class="grid-70 grid-parent" data-dcnode-id="333"><div class="grid-100 v-spacing-small" data-dcnode-id="334"><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">As the name suggests, electrostatic air purifiers use static electricity to cause irritants and other odor-causing particles in the air to cling to a removable collection plate. This type of purifier comes with the advantage of not requiring a filter, although some models do have an optional, replaceable prefilter. This model does require some maintenance: The collection-plate surface must be wiped down regularly, as indicated by the manufacturer. Some electrostatic air purifiers are not as effective against microorganisms as other types of purifiers.</span></p></div></div></article></div><div class="articlecontentcontainer parbase" data-dcnode-id="325"><article class="grid-100 grid-parent v-spacing-large article-content-container" data-dcnode-id="326"><div class="grid-70 grid-parent" data-dcnode-id="327"><div class="grid-100 v-spacing-small" data-dcnode-id="328"><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">True HEPA air purifiers have especially dense filters that are capable of eliminating up to 99.97% of all particles in the air that are larger than 0.3 microns. The acronym HEPA stands for “high-efficiency particulate air” filter, and a True HEPA filter must meet the minimum filtration requirements outlined by the US Department of Energy. Some filters may be labeled only as HEPA, without the word “true.” These filters may not meet the same rigorous performance standards but may be fine for general applications. Severe allergy sufferers may benefit the most from purifiers with a HEPA filter, as they combat mold, pollen, dust, dander and pet hair well. Like all purifiers that use disposable filters, these devices will need filter replacements, according to the manufacturer’s recommendations. Some HEPA filters may not be as effective against strong odors as activated carbon or activated charcoal filters.</span></p></div></div></article></div><div class="articlecontentcontainer parbase" data-dcnode-id="316"><article class="grid-100 grid-parent v-spacing-large article-content-container" data-dcnode-id="317"><div class="grid-70 v-spacing-mini" data-dcnode-id="322" id="articlecontentcontai_1555668111"><h2 data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Ionic Air Purifiers</span></h2></div><div class="grid-70 grid-parent" data-dcnode-id="318"><div class="grid-100 v-spacing-small" data-dcnode-id="319"><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Ionic air purifiers come in two basic varieties: filterless models and those that require a filter. Filterless air purifiers use electricity to create negatively charged ions that cause irritants to stick together and become too heavy to stay suspended in the air. Some filterless models may not use a fan, so they operate without noise. Other ionic purifiers are so called because they use a traditional filtration system that is enhanced with ionic-clumping technology. Some ionic purifiers may not remove bacteria and viruses from the air as well as other air purifier types do.</span></p></div></div></article></div><div class="articlecontentcontainer parbase" data-dcnode-id="300"><article class="grid-100 grid-parent v-spacing-large article-content-container" data-dcnode-id="301"><div class="grid-70 v-spacing-mini" data-dcnode-id="313" id="articlecontentcontai_766799708"><h2 data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Home Air Purifier Placement Tips</span></h2></div><div class="grid-70 grid-parent" data-dcnode-id="302"><div class="grid-100 v-spacing-small" data-dcnode-id="303"><ul class="list disc" data-dcnode-id="304" role="list" tabindex="0"><li data-dcnode-id="311" role="listitem"><span data-dcnode-id="312" instrument_node="">Room air purifiers are intended for use in a single room, so it’s best to have more than one.</span></li><li data-dcnode-id="309" role="listitem"><span data-dcnode-id="310" instrument_node="">Place a home air purifier in rooms where you spend the most time, like your living area and your bedroom.</span></li><li data-dcnode-id="307" role="listitem"><span data-dcnode-id="308" instrument_node="">Some models are more portable than others, so if you need a larger machine, look for one with wheels and a handle.</span></li><li data-dcnode-id="305" role="listitem"><span data-dcnode-id="306" instrument_node="">Check the cord length to make sure you can reach an outlet from your designated placement.</span></li></ul></div></div></article></div><span data-dcnode-id="299" instrument_node=""> </span></div><span data-dcnode-id="297" instrument_node="">
