</span></div></li><span data-dcnode-id="1395" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Many people have been waking up to the fact that, without one of the best air purifiers, the air quality in their homes can be very poor. In fact, research has shown that the air indoors that we breathe every day is often worse than that outside on all but the most polluted streets. This is because particles from traffic fumes, pollen and more are pulled in as we enter the front door or open a window, and there often isn’t enough ventilation to remove them.</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">This not only opens us up to the ill-effects of excess dust and pollution but means that chemicals from cleaning products, fresh paint, new furniture and cooking can’t escape either. If you are one of the millions of allergy sufferers, then you will know how much poor air quality exacerbates symptoms – damned if you open a window, but also vulnerable to anything trapped inside if you don’t.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1388"></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">But there’s good news – having an air purifier in the home can make a huge difference.</span></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">You may think that regular cleaning and vacuuming will keep the problem of bad air at bay, but this alone isn’t enough to eliminate anything smaller than dust particles. A dedicated air purifier will thoroughly clean the air throughout your home and, if you pick a good one that’s the right size for the room, you will really start to notice the difference.</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1380" instrument_node="">Read on to find out which of the best air purifiers is best for your circumstances and space and, if you’re also looking to defeat the heat, take a look at our roundup of the </span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.idealhome.co.uk/buying-guide-reviews/best-fans-198454"><span data-dcnode-id="1379" instrument_node="">best fans</span></a><span data-dcnode-id="1377" instrument_node="">.</span></p><span data-dcnode-id="1375" instrument_node="">

</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">If you’re looking for a quiet and unfussy air purifier that will fit into smaller spaces, then the Blueair Blue 3210 is ideal. Perfect for bedrooms or a home office, the Scandi-style machine is super-easy to set up and use.</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">To get started, you simply need to plug in the air purifier and tap the top control until you reach your desired setting. These include an Auto mode that uses the in-built sensor to clean the air in a space optimally, Night mode (reducing noise, fan speed and LED brightness), Everyday mode and Boosted mode. These last two do what they say on the tin, quietly toiling away in the background or working a bit harder, respectively.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">The light on the front changes colour to indicate current air quality, whether good, moderate or polluted. It will turn red when it’s time to change the filter, recommended around every six months.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Working in a room of around 17m2, the Blueair Blue 3210 will change the air in the space five times an hour, with this going down to about twice an hour in a room of 43m2. So basically, it should be placed in a smaller room to get the most out of the device. In return, it works very efficiently, using just 2W of power on its lowest setting (up to 10W).</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">The Scandi-style pre-filters are the real star here, though, giving you a choice of the arctic trail (dark grey) – included – winter reed (light grey), archipelago sand (pink), aurora light (green), and night waves (blue). These don’t just look pretty, either, catching larger particles and extending the life of the primary filter inside. To clean, you can just vacuum the outside or pop them in the wash.</span></p><span data-dcnode-id="1236" instrument_node="">

</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Another of our favourite small air purifiers, the Levoit Core 300, is ideal for those who don’t feel the need for smart home compatibility. Quiet on its lowest settings, it can clear an impressive area of 40m2, delivering a CADR (clean air delivery rate) of 187 m3/hr with its patented QuietKEAP technology.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">The controls are on top of the air purifier, allowing you to change the fan speed (low, medium or high), set a timer (2, 4, 6, or 8 hours) for auto-shutoff, or put it in night mode. This means you can have the machine in your bedroom without worrying about wasting energy or the LED lights keeping you up.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">One of the best things about the Core 300 is the customisable filters. The original filter is included, but you can also purchase filters specialising in pet allergies, toxin absorption, or mould and bacteria removal. When any of these need replacing, the check filter indicator light will activate, with it recommended you switch filters every 6-8 months.</span></p><span data-dcnode-id="1012" instrument_node="">

Filters: </span></strong><span data-dcnode-id="977" instrument_node="">HEPA, carbon</span><strong data-dcnode-id="974"><br data-dcnode-id="976"><span data-dcnode-id="975" instrument_node="">
Filtration rate: </span></strong><span data-dcnode-id="973" instrument_node="">99.95%</span><strong data-dcnode-id="970"><br data-dcnode-id="972"><span data-dcnode-id="971" instrument_node="">

</span><li data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Dyson’s engineering ensures clean, filtered air</span></li><span data-dcnode-id="947" instrument_node="">
</span></ul><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="942"><strong data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Reasons to avoid</span></strong></p><span data-dcnode-id="941" instrument_node="">
</span><ul data-dcnode-id="932"><span data-dcnode-id="940" instrument_node="">
</span><li data-dcnode-id="934"><span data-dcnode-id="939" instrument_node="">It’s louder than other purifiers, so not ideal for workspaces</span><strong data-dcnode-id="936"><br data-dcnode-id="938"><span data-dcnode-id="937" instrument_node="">
</span></strong><span data-dcnode-id="935" instrument_node="">
</span></li><span data-dcnode-id="933" instrument_node="">
</span></ul><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Dyson doesn’t pitch the Pure Cool Me as an air purifier that cleans all the air in a room, so it doesn’t give figures for recommended room size, air changes per hour or CADR. Instead, it is billed as a fan that cleans the air in the personal space around you. The idea is that it sits on your desk or bedside table and directs filtered air straight at you: your personal clean air bubble.</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">The industrial design is similar to Dyson’s larger Air Multiplier fans, but they don’t filter all the air: air that passes through the machine’s fan is filtered but then the clever design multiplies that air by pulling more (unfiltered) air along with it.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">The design is cute. It measures 401 x 254 x 274mm. You choose the angle of airflow up and down manually with your hand but there’s a small remote control for everything else. This attaches magnetically to the front when not in use. You’re a bit lost without it: only able to turn the fan on and off.</span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">With the remote, you can choose fan level (0-10), oscillation (off or 70 degrees), sleep timer (30 mins to 8 hours) and see how much life the filter has left. There is a filter change alert and its life is given as a year if used 12 hours a day.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">It uses an activated carbon and glass HEPA filter and the noise is 44-61dB. Unsurprisingly, it sounds like a fan.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">We tested the Dyson just like the others, to see what impact it had on air quality in an average-sized&nbsp;bedroom. The results weren’t terrible: it removed 67 per cent&nbsp;of PM2.5 and 79 per cent&nbsp;of PM10 particles in an hour. This means that despite not setting out to purify the air in the whole room, it does a better job of it than some.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">The focussed beam of air is pleasant and cool in the summer. So if you’re in the market for a fan anyway, and your budget stretches to the Dyson, it’s a good buy. It would be lovely on a bedside table or desk in the summer. But if your priority is air purification then you can get something better for much less.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="907"><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Ideal Home’s rating: 4 out of 5 stars</span></strong></p><span data-dcnode-id="906" instrument_node="">

</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Admittedly it’s the only air purifier here on wheels, but they are handy. The Philips is a similar size to the Blueair 480i and again has an industrial look and feel: like a home aircon unit or a large fan, humidifier or dehumidifier. In fact, the Philips is also a humidifier.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">It looks curvier and cuter than the Blueair but there’s a grille on the top, so you can’t put things on there. It’s on castors, which makes it much easier to move around – from room to room or just moving it out of the way when you’re vacuuming.</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Again it’s Wi-Fi and app-connected, giving you remote control, air quality monitoring, child lock, a sleep timer of 1-12 hours and more. Noise is rated at 64dB but that’s clearly at the highest of the four fan speeds: on the lowest speed, you can’t hear it. The auto mode is great, so it’s only loud when necessary.</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">The Philips is billed as suitable for a room size of up to 80m², which is large. There’s no figure given for how many air changes per hour. However, it does say: “In a room of 20 m², it can purify the air in less than 10 minutes, so the air gets cleaned more than 6.5 times an hour.”</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">It uses dual filters: HEPA and activated carbon pellets. CADR is given as 310m³/h and humidification 600ml/h. We didn’t use the humidifier while testing air quality.</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">In our test in a large room, it removed 87 per cent of PM2.5 and PM10 particles in an hour, which is good, but not as good as the Blueair 480i’s performance in the same room. It’s a pretty good workhorse for large spaces.</span></p><span data-dcnode-id="813" instrument_node="">

</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">If you’re on a really tight budget, this slim air purifier is better than no air purifier at all. It’s the size of a cookbook stood upright (333 x 248 x 133mm), so it doesn’t take up much space on a bedside table. The control is simply a lever on the right-hand side that chooses between the two speeds and off.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Noise levels are 40-50dB. It sounds like a fan in both settings, but it’s a white noise you could easily ignore and go to sleep with. Filter life is quoted as 2,000 hours of use, but there’s no filter change indicator.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Filtration is HEPA and carbon, but the size of the filter is small compared with others on the test, so, surprisingly, it claims to be suitable for a room measuring up to 28m². The technical data reveals that this is based on 1.75 air changes per hour. So if you want 5 air changes per hour, your room would have to be just under 10m², which sounds more realistic. CADRs for smoke, pollen and dust are 80, 89 and 79m³/h, much lower than others on the test.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">The test results bore out these. It removed 57 per cent of PM2.5 and 66 per cent of PM10 particles in an hour. This makes it the least effective air purifier on the test, but it’s also by far the cheapest. If you have a small bedroom, then using the Dimplex would improve air quality.</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="730"><strong data-dcnode-id="731"><em data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Ideal Home</span></em><span data-dcnode-id="732" instrument_node=""> rating: 3.5 out of 5 stars</span></strong></p><span data-dcnode-id="729" instrument_node="">

</span></ul><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Write enough group tests and you sometimes see an interesting phenomenon: identical products. This and the Xpelair seem to be exactly the same machine, but with slightly different styling to the cases and button design. As a reviewer, the phenomenon is most fun when the products are priced differently, but in this case, the price tags match, too.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Both machines offer three speeds and sleep timers (2, 4 or 6 hours), which makes them a good option for a bedroom. The filters are described slightly differently but on inspection, they are clearly identical.</span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">The Meaco’s is described as multi-stage filtration: dust pre-filter, HEPA, active charcoal, combined PCO (photocatalytic oxidation) and UVC (ultraviolet), and ioniser. The filter lasts around 6 months and there’s a filter change indicator. Noise is 30-50dB.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">The design is fairly compact but boxy. It lives on the floor, not a desk or table. I liked its clean lines a little more than the Xpelair and it’s fractionally smaller too. But they’re functionally the same machine.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Its recommended room size is given in m³ but, based on an average ceiling height, our maths made it 31m². That’s based on three air changes per hour. The Meaco website is helpful, giving a chart of multiple figures for room size depending on how often you want the air changing. CADR is given as 135m³/h for smoke, 142m³/h for dust and 151m³/h for pollen.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">On test, it removed 83 per cent of PM2.5 and 94 per cent of PM10 particles in an hour, which is a significant improvement in air quality but inferior to other models, which costs less, so it’s hard to recommend the Meaco unless you shop around and get a total bargain.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="635"><strong data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Ideal Home’s rating: 3.5 out of 5 stars</span></strong></p><span data-dcnode-id="634" instrument_node="">
</span><h2 data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">How to choose the best air purifier for your home</span></h2><span data-dcnode-id="631" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="627" id="attachment_271728" style="width: 1010px"><img alt="Blueair Blue 3210 on floor with dog" aria-describedby="caption-attachment-271728" class="lazyload blur-up size-full wp-image-271728" data-dcnode-id="630" data-sizes="auto" data-src="https://ksassets.timeincuk.net/wp/uploads/sites/56/2021/03/best-air-purifier-Blueair-Blue-3210-d.jpg" data-srcset="https://ksassets.timeincuk.net/wp/uploads/sites/56/2021/03/best-air-purifier-Blueair-Blue-3210-d.jpg 1000w, https://ksassets.timeincuk.net/wp/uploads/sites/56/2021/03/best-air-purifier-Blueair-Blue-3210-d-300x300.jpg 300w, https://ksassets.timeincuk.net/wp/uploads/sites/56/2021/03/best-air-purifier-Blueair-Blue-3210-d-630x630.jpg 630w, https://ksassets.timeincuk.net/wp/uploads/sites/56/2021/03/best-air-purifier-Blueair-Blue-3210-d-135x135.jpg 135w, https://ksassets.timeincuk.net/wp/uploads/sites/56/2021/03/best-air-purifier-Blueair-Blue-3210-d-320x320.jpg 320w, https://ksassets.timeincuk.net/wp/uploads/sites/56/2021/03/best-air-purifier-Blueair-Blue-3210-d-620x620.jpg 620w, https://ksassets.timeincuk.net/wp/uploads/sites/56/2021/03/best-air-purifier-Blueair-Blue-3210-d-920x920.jpg 920w" height="1000" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ksassets.timeincuk.net/wp/uploads/sites/56/2016/10/logo-ideal-home-placeholder-4.svg&amp;raw" width="1000"><p class="wp-caption-text" data-dcnode-id="628" id="caption-attachment-271728"><span data-dcnode-id="629" instrument_node="">Credit: Blueair</span></p></div><span data-dcnode-id="626" instrument_node="">
</span><h3 data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Do air purifiers work?</span></h3><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Yes. Read the reviews because some are better than others, and you should pick the right machine for your room size. But yes, they remove everything from dust to very fine particles from the air, quietly and invisibly.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">In the summer, opening doors and windows for ventilation is a great way to improve indoor air quality – unless you live on a really congested road. But in colder months, an air purifier is just the ticket.</span></p><span data-dcnode-id="617" instrument_node="">
</span><h3 data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Are air purifiers effective?</span></h3><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Improving indoor air quality is beneficial for anyone. Given a choice between walking down a polluted main road or a side road next to a park, you’d pick the latter every time. But, unfortunately, indoor air quality is under threat from wafted-in pollutants, allergens, dust particles, candles, open fires, Volatile Organic Compounds (VOCs) from cleaning products, and “off-gassing.”</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">This is a process where VOCs are released from paints and plastics for years. So using an air purifier is like taking the leafy side of the road. They can be beneficial if anyone in the family has asthma or allergies.</span></p><span data-dcnode-id="608" instrument_node="">
</span><h3 data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Where to place an air purifier</span></h3><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">The machine cleans and circulates all the air in the room. So the only thing that matters is not to place it too close to the wall or furniture. You want 10cm around it on all sides to guarantee airflow in and out of the air purifier.</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Room-wise, if you pick one room, pick the bedroom. You spend about a third of your life in there, hopefully with the door shut (which is better for fire safety, too). The clean air will help promote deep sleep, as well as being good for your health.</span></p><span data-dcnode-id="599" instrument_node="">
</span><h3 data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Do air purifiers remove smells?</span></h3><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Air purifiers that use activated carbon filters will remove the Volatile Organic Compounds (VOCs) that cause smells. That could be a musty smell or the particulates from a scented candle or aerosol.</span></p><span data-dcnode-id="593" instrument_node="">
</span><h3 data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">How long does it take for an air purifier to clean a room?</span></h3><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">It depends not just on the air purifier but how big the room is. Measure your floor space and look for a machine that promises to clean the air in a room of that size five times an hour. Which means it filters all the air in the room once every 12 minutes. Machines sometimes claim to clean large spaces, but they only promise to clean the air a couple of times an hour.</span></p><span data-dcnode-id="587" instrument_node="">
</span><h3 data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">What are the different types of filters, and which do I need?</span></h3><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">The more stages of filtration, the better to remove different sized particles.</span></p><span data-dcnode-id="581" instrument_node="">
</span><ul data-dcnode-id="567"><span data-dcnode-id="580" instrument_node="">
</span><li data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Dust pre-filter – think of air filtration like sifting sand on a beach. You want to remove the large pebbles first with a big sieve before using a finer one. Otherwise, the fine filter gets clogged up.</span></li><span data-dcnode-id="577" instrument_node="">
</span><li data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">HEPA filter – this catches more dust, pollens, other allergens, even bacteria, so you’ll breathe cleaner whether you suffer from pet allergies or hay fever. Our PM10 test results are a measurement of particles no bigger than 10 microns wide.</span></li><span data-dcnode-id="574" instrument_node="">
</span><li data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Electrostatic filtration – this charges small particles so that they stick more easily to the filters.</span></li><span data-dcnode-id="571" instrument_node="">
</span><li data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Active carbon is great for microscopic particles from traffic fumes, cigarette smoke, and the Volatile Organic Compounds (VOCs) that carry unpleasant smells. They can even remove viruses from the air. Our PM2.5 test results measure particles no bigger than 2.5 microns wide, which includes much tinier particles.</span></li><span data-dcnode-id="568" instrument_node="">
</span></ul><span data-dcnode-id="566" instrument_node="">
</span><h3 data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">How do I get the right-sized machine for my room?</span></h3><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Measure your floor space in m². Then pick a machine that promises to clean the air in the room five times an hour. Ceiling heights are pretty consistent, so this is accurate enough. If you enjoy maths homework, you can measure the volume of the space in m³ and look at the Clean Air Delivery Rate (CADR) of various machines to see which suits you best.</span></p><span data-dcnode-id="560" instrument_node="">
</span><h3 data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">What else should I think about when buying an air purifier?</span></h3><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Noise, if you’re sensitive to it, is measured in decibels (dB). If you want a discreet air purifier, consider a machine that’s quiet on its lowest setting. Or one with an auto mode that is quiet unless it needs to scrub the air more, which is unlikely in the middle of the night.</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Sleep timers are ok for the bedside, but surely it’s better to have a quiet machine that you can leave on, so the air is clean all night.</span></p><span data-dcnode-id="551" instrument_node="">
</span><h2 data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">How we test our air purifiers</span></h2><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Our testers Caramel and Caroline have decades of experience in reviewing technology products between them. Writing for, among others, The Evening Standard, The Express, The Guardian, The Independent, The Mail on Sunday, The Sunday Mirror, The Telegraph, and The Sunday Times, Caramel has long been part of the Ideal Home family and knows exactly what you’re looking for in an air purifier.</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">London’s air pollution, along with two tweens and a dog, meant that the air in Caramel’s house needed a good scrub. So she tested each machine rigorously at home, taking into account the size, price, controls, features, and noise levels, as well as the all-important air purification performance.</span></p><span data-dcnode-id="542" instrument_node="">

</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Performance was tested using expensive high-end industrial equipment, namely the Met One Instruments Model 804 Handheld Particle Counter. Caramel tested the room’s initial air quality for each air purifier and then tested it again after she had used the air purifier at its top setting for an hour.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Finally, she compared the two sets of results to establish how well the air had been cleaned.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">She focussed on the PM10 and PM2.5 figures for our test because these are the ones the World Health Organisation uses as air quality benchmarks. These are particles measuring no more than 10 microns and no more than 2.5 microns.</span></p><span data-dcnode-id="498" instrument_node="">
