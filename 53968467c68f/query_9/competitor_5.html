                        "><span data-dcnode-id="3989" instrument_node="">2014</span></a><span data-dcnode-id="3987" instrument_node="">). The technology behind such devices ranges from simple filters to hybrid treatment systems. Air purification/treatment technologies are briefly described below.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3984" id="Sec5"><span data-dcnode-id="3985" instrument_node="">Mechanical filtration</span></h3><p data-dcnode-id="3976"><span data-dcnode-id="3983" instrument_node="">Mechanical filtration is a simple and extensively used air purification technique for removing suspended particles from indoor air. Filters are essential components in all air conditioning systems, and can capture particles by interception, impact, or diffusion. This technique does not retain gases, although some studies have reported the removal of ozone by up to 36&nbsp;% in indoor air (Zhao et al. </span><a aria-label="Reference 2007" data-dcnode-id="3981" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR138" id="ref-link-section-d112910146e3208" title="Zhao P, Siegel JA, Corsi RL (2007) Ozone removal by HVAC filters. Atmos Environ 41(15):3151–3160"><span data-dcnode-id="3982" instrument_node="">2007</span></a><span data-dcnode-id="3980" instrument_node="">). Mechanical filters are progressively saturated by particles; thus, pressure loss is increased throughout time in service and, consequently, particle removal efficiency progressively decreases. This problem can be resolved by replacing the filter. The spent filters are new sources of contamination due to the accumulation of material that may promote the growth of harmful microorganisms (Yu et al. </span><a aria-label="Reference 2009" data-dcnode-id="3978" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR134" id="ref-link-section-d112910146e3211" title="Yu BF, Hu ZB, Liu M, Yang HL, Kong QX, Liu YH (2009) Review of research on air-conditioning systems and indoor air quality control for human health. Int J Refrig 32:3–20"><span data-dcnode-id="3979" instrument_node="">2009</span></a><span data-dcnode-id="3977" instrument_node="">).</span></p><p data-dcnode-id="3965"><span data-dcnode-id="3975" instrument_node="">Mechanical filter performance depends on different factors, such as the type of filter (Table&nbsp;</span><a data-dcnode-id="3973" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab5"><span data-dcnode-id="3974" instrument_node="">5</span></a><span data-dcnode-id="3972" instrument_node="">), material used for the filter media, air flow and velocity across the filter, the type of contaminants, and other associated processes (Zhao et al. </span><a aria-label="Reference 2007" data-dcnode-id="3970" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR138" id="ref-link-section-d112910146e3220" title="Zhao P, Siegel JA, Corsi RL (2007) Ozone removal by HVAC filters. Atmos Environ 41(15):3151–3160"><span data-dcnode-id="3971" instrument_node="">2007</span></a><span data-dcnode-id="3969" instrument_node="">). Additionally, the medium can be treated with viscous substances such as oils to promote the adhesion of particles onto the fibre (US EPA </span><a aria-label="Reference 2009" data-dcnode-id="3967" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d112910146e3223" title="U.S. Environmental Protection Agency (EPA) (2009) Residential air cleaners, 2nd edn. A summary of available information. 
                    http://www.epa.gov/iaq/pdfs/residential_air_cleaners.pdf
                    
                  . Accessed on 13 May 2012"><span data-dcnode-id="3968" instrument_node="">2009</span></a><span data-dcnode-id="3966" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3947" data-test="inline-table" id="table-5"><figure data-dcnode-id="3948"><figcaption class="c-article-table__figcaption" data-dcnode-id="3959"><b data-dcnode-id="3960" data-test="table-caption" id="Tab5"><span data-dcnode-id="3964" instrument_node="">Table&nbsp;5 Type of mechanical filters and comparison (Bliss </span><a aria-label="Reference 2005" data-dcnode-id="3962" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d112910146e3236" title="Bliss S (2005) Best practices guide to residential construction: materials, finishes, and details. Wiley, London"><span data-dcnode-id="3963" instrument_node="">2005</span></a><span data-dcnode-id="3961" instrument_node="">)</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3949"><a aria-label="Full size table 5" class="c-article__pill-button" data-dcnode-id="3950" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/tables/5" rel="nofollow"><span data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3951" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3952" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3953" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3956" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3955" fill-rule="evenodd"></path><span data-dcnode-id="3954" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3946" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3944" id="Sec6"><span data-dcnode-id="3945" instrument_node="">Electronic filtration</span></h3><p data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">There are two types of electronic filters that involve particle removal. Electrostatic precipitators are medium-cost devices in which particles are ionized and then deflected by an electric field to be trapped on opposite polarity plates. Their maintenance includes the regular removal and cleaning of the plates.</span></p><p data-dcnode-id="3934"><span data-dcnode-id="3941" instrument_node="">Conversely, ion generators or ionizers are high-cost devices without the need for replacement in which charged ions are dispersed into the air and attached to particles that become chemically charged and trapped in the filters. Nevertheless, those charged particles may adhere to nearby surfaces, such as walls, furniture and draperies, or become attracted to each other by their opposite charges, thereby forming a heavier particle that is deposited on the floor or any other surface (US EPA </span><a aria-label="Reference 2009" data-dcnode-id="3939" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d112910146e3385" title="U.S. Environmental Protection Agency (EPA) (2009) Residential air cleaners, 2nd edn. A summary of available information. 
                    http://www.epa.gov/iaq/pdfs/residential_air_cleaners.pdf
                    
                  . Accessed on 13 May 2012"><span data-dcnode-id="3940" instrument_node="">2009</span></a><span data-dcnode-id="3938" instrument_node="">). According to Bliss (</span><a aria-label="Reference 2005" data-dcnode-id="3936" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d112910146e3388" title="Bliss S (2005) Best practices guide to residential construction: materials, finishes, and details. Wiley, London"><span data-dcnode-id="3937" instrument_node="">2005</span></a><span data-dcnode-id="3935" instrument_node="">), the efficiency of electrostatic filters for a particle range of 0.3–6&nbsp;µm is over 90&nbsp;%, while this value oscillates between 75 and 95&nbsp;% for ion generators.</span></p><p data-dcnode-id="3926"><span data-dcnode-id="3933" instrument_node="">In electronic filters, pressure loss occurs more slowly than in mechanical filters, while other factors, such as certain chemicals, aerosols or high relative humidity, can negatively affect removal efficiency. MacIntosh et al. (</span><a aria-label="Reference 2008" data-dcnode-id="3931" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d112910146e3394" title="MacIntosh DL, Myatt TA, Ludwig JF, Baker BJ, Suh HH, Spengler JD (2008) Whole house particle removal and clean air delivery rates for in-duct and portable ventilation systems. J Air Waste Manag Assoc 58:1474–1482"><span data-dcnode-id="3932" instrument_node="">2008</span></a><span data-dcnode-id="3930" instrument_node="">) have observed higher particle removal rates in in-duct electrostatic precipitators compared with either induct or portable HEPA mechanical filters over an 80-min test period. In contrast, Mølgaard et al. (</span><a aria-label="Reference 2014" data-dcnode-id="3928" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d112910146e3397" title="Mølgaard B, Koivisto AJ, Hussein T, Hämeri K (2014) A new clean air delivery rate test applied to five portable indoor air cleaners. Aerosol Sci Technol 48:409–417"><span data-dcnode-id="3929" instrument_node="">2014</span></a><span data-dcnode-id="3927" instrument_node="">) have compared removal rates for particles with diameters above 100&nbsp;nm, and concluded that air cleaners based on filtration performed 1.4–4.3 and 2.5–7.5 times better than an electrostatic precipitator and an ion generator, respectively.</span></p><p data-dcnode-id="3915"><span data-dcnode-id="3925" instrument_node="">Although efficient in removing particles, electronic filters can generate hazardous charged particles (Guieysse et al. </span><a aria-label="Reference 2008" data-dcnode-id="3923" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d112910146e3403" title="Guieysse B, Hort C, Platel V, Munoz R, Ondarts M, Revah S (2008) Biological treatment of indoor air for VOC removal: potential and challenges. Biotechnol Adv 26(5):398–410"><span data-dcnode-id="3924" instrument_node="">2008</span></a><span data-dcnode-id="3922" instrument_node="">). They may also generate new pollutants such as ozone and other compounds derived from the ionization of VOCs. An ion generator installed in a 27&nbsp;m</span><sup data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">3</span></sup><span data-dcnode-id="3919" instrument_node=""> residential room by Waring and Siegel (</span><a aria-label="Reference 2011" data-dcnode-id="3917" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR122" id="ref-link-section-d112910146e3408" title="Waring MS, Siegel JA (2011) The effect of an ion generator on indoor air quality in a residential room. Indoor Air 21:267–276"><span data-dcnode-id="3918" instrument_node="">2011</span></a><span data-dcnode-id="3916" instrument_node="">) has increased concentrations of ultrafine particles (&lt;0.1&nbsp;µm), ozone, and to a lesser extent, the by-products of reactions initiated by ozone, such as aldehydes (formaldehyde and nonanal).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3913" id="Sec7"><span data-dcnode-id="3914" instrument_node="">Adsorption</span></h3><p data-dcnode-id="3905"><span data-dcnode-id="3912" instrument_node="">Adsorption has been successfully applied for retaining contaminants on the surface of an adsorbent material, such as activated carbon, zeolites, silica gel, activated alumina, mineral clay, and some polymers. Amongst them, activated carbon (AC) and hydrophobic zeolites are the most commonly used because of their large surface area and high adsorption capacity (Huang et al. </span><a aria-label="Reference 2003" data-dcnode-id="3910" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d112910146e3420" title="Huang ZH, Kang F, Liang KM, Hao J (2003) Breakthrough of methyethylketona and benzene vapors in activated carbon fiber beds. J Hazard Mater B98:107–115"><span data-dcnode-id="3911" instrument_node="">2003</span></a><span data-dcnode-id="3909" instrument_node="">; Kim and Ahn </span><a aria-label="Reference 2012" data-dcnode-id="3907" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d112910146e3423" title="Kim KJ, Ahn HG (2012) The effect of pore structure of zeolite on the adsorption of VOCs and their desorption properties by microwave heating. Microporous Mesoporous Mater 152:78–83"><span data-dcnode-id="3908" instrument_node="">2012</span></a><span data-dcnode-id="3906" instrument_node="">).</span></p><p data-dcnode-id="3894"><span data-dcnode-id="3904" instrument_node="">The use of an AC filter in a combined heating, ventilation and air conditioning system has been evaluated by Sidheswaran et al. (</span><a aria-label="Reference 2012" data-dcnode-id="3902" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d112910146e3429" title="Sidheswaran MA, Destaillats H, Sullivan DP, Cohn S, Fisk WJ (2012) Energy efficient indoor VOC air cleaning with activated carbon fiber (ACF) filters. Build Environ 47:357–367"><span data-dcnode-id="3903" instrument_node="">2012</span></a><span data-dcnode-id="3901" instrument_node="">). A mixture of VOCs with concentrations in the 20–30 ppbv range was treated, resulting in removal (retaining) efficiencies of 70–80&nbsp;% for most of the VOCs studied (toluene, benzene, o-xylene, 1-butanol, limonene, undecane, and formaldehyde). Cheng et al. (</span><a aria-label="Reference 2012" data-dcnode-id="3899" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d112910146e3432" title="Cheng HH, Hsieh CC, Tsai CH (2012) Antibacterial and regenerated characteristics of Ag-zeolite for removing bioaerosols in indoor environment. Aerosol Air Qual Res 12:409–419"><span data-dcnode-id="3900" instrument_node="">2012</span></a><span data-dcnode-id="3898" instrument_node="">) have impregnated a zeolite with metallic silver in order to obtain an adsorbent material with antibacterial properties. Over 95&nbsp;% of the bacteria and fungi were removed from indoor air. Jo and Yang (</span><a aria-label="Reference 2009" data-dcnode-id="3896" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d112910146e3435" title="Jo WK, Yang CH (2009) Granular-activated carbon adsorption followed by annular-type photocatalytic system for control of indoor aromatic compounds. Sep Purif Technol 66(3):430–442"><span data-dcnode-id="3897" instrument_node="">2009</span></a><span data-dcnode-id="3895" instrument_node="">) have studied the adsorption of benzene, toluene, ethylbenzene, and xylenes on AC at low concentrations (0.1–1 ppmv). The removal efficiencies obtained herein were close to or above 90&nbsp;%.</span></p><p data-dcnode-id="3877"><span data-dcnode-id="3893" instrument_node="">Regarding the disadvantages, high relative humidity (resulting in water condensation on the surface pores) and pollutant load variations compromise adsorption efficiency (Jo and Yang </span><a aria-label="Reference 2009" data-dcnode-id="3891" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d112910146e3441" title="Jo WK, Yang CH (2009) Granular-activated carbon adsorption followed by annular-type photocatalytic system for control of indoor aromatic compounds. Sep Purif Technol 66(3):430–442"><span data-dcnode-id="3892" instrument_node="">2009</span></a><span data-dcnode-id="3890" instrument_node="">). Additionally, not all the compounds adsorb effectively onto the adsorbent surface, and the regeneration of the depleted adsorbents involves significant additional costs (Manéro and Monneyron </span><a aria-label="Reference 2005" data-dcnode-id="3888" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d112910146e3444" title="Manéro MH, Monneyron P (2005) Traitement sélectif de l’air industriel pollué en COV par un procédé hybride adsorption-ozonation. Techniques de l’Ingénieur IN34. 
                    http://www.techniques-ingenieur.fr/res/pdf/encyclopedia/42600210-in34.pdf
                    
                  . Accessed 20 June 2012"><span data-dcnode-id="3889" instrument_node="">2005</span></a><span data-dcnode-id="3887" instrument_node="">). Jo and Yang (</span><a aria-label="Reference 2009" data-dcnode-id="3885" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d112910146e3447" title="Jo WK, Yang CH (2009) Granular-activated carbon adsorption followed by annular-type photocatalytic system for control of indoor aromatic compounds. Sep Purif Technol 66(3):430–442"><span data-dcnode-id="3886" instrument_node="">2009</span></a><span data-dcnode-id="3884" instrument_node="">) have concluded that a temperature of 300&nbsp;°C is required to obtain significant desorption yields (75–95&nbsp;%). Additionally, adsorbents should be regularly replaced in order to avoid the re-emission of the already adsorbed compounds (Liébana and Calleja </span><a aria-label="Reference 1998" data-dcnode-id="3882" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d112910146e3450" title="Liébana EA, Calleja AH (1998) El aire en interiores: métodos de control y depuración. Enciclopedia de Salud y Seguridad en el Trabajo 45:7–11. 
                    www.insht.es/InshtWeb/Contenidos/Documentacion/TextosOnline/EnciclopediaOIT/tomo2/45.pdf
                    
                  . Accessed 22 June 2012"><span data-dcnode-id="3883" instrument_node="">1998</span></a><span data-dcnode-id="3881" instrument_node="">). Another negative feature is that airborne bacteria can deposit on the adsorbent surface and thrive because of the high biocompatibility of the carbon materials (Pei et al. </span><a aria-label="Reference 2013" data-dcnode-id="3879" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d112910146e3453" title="Pei L, Zhou J, Zhang L (2013) Preparation and properties of Ag-coated activated carbon nanocomposites for indoor air quality control. Build Environ 63:108–113"><span data-dcnode-id="3880" instrument_node="">2013</span></a><span data-dcnode-id="3878" instrument_node="">).</span></p><p data-dcnode-id="3872"><span data-dcnode-id="3876" instrument_node="">Contaminant treatment or destruction is not pursued with this technology, as the pollutant is simply transferred from one phase to another, producing a hazardous waste that must be treated and/or disposed of properly. Nevertheless, Chen et al. (</span><a aria-label="Reference 2005" data-dcnode-id="3874" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d112910146e3459" title="Chen W, Zhang JS, Zhang Z (2005) Performance of air cleaners for removing multiple volatile organic compounds in indoor air. ASHRAE Trans 111(1):1101–1114"><span data-dcnode-id="3875" instrument_node="">2005</span></a><span data-dcnode-id="3873" instrument_node="">) have classified sorption filtration as the most effective off-the-shelf commercial technology for the general removal of indoor VOC pollutants. These authors tested fifteen air cleaners representing five different technologies (adsorption, photocatalytic oxidation, ozonation, cold plasma decomposition, and botanical biofiltration) for the removal of a mixture of 16 representative indoor VOCs. All sorption-related products recorded significant removal efficiencies for most pollutants (higher than 90&nbsp;%), and the application of specific sorption media guaranteed the entrapment of the most difficult ones (dichloromethane, formaldehyde, and acetaldehyde). Other technologies were rejected due to their defective implementation in commercial products (photocatalytic oxidation), marginal removal efficiency for certain VOCs (botanical biofiltration), or the generation of significant amounts of ozone (cold plasma decomposition and ozonation).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3870" id="Sec8"><span data-dcnode-id="3871" instrument_node="">Ozonation</span></h3><p data-dcnode-id="3862"><span data-dcnode-id="3869" instrument_node="">Ozone (O</span><sub data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">3</span></sub><span data-dcnode-id="3866" instrument_node="">) is an oxidizing agent produced in generators using oxygen from the air. Oxygen molecules (O</span><sub data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">2</span></sub><span data-dcnode-id="3863" instrument_node="">) are exposed to a corona discharge or UV radiation to produce several hundred milligrams per hour of ozone.</span></p><p data-dcnode-id="3845"><span data-dcnode-id="3861" instrument_node="">The use of indoor ozone generators as air purifiers increased over the 1990s, when they were marketed to consumers for their ability to eliminate odours and microbial agents (Hubbard et al. </span><a aria-label="Reference 2005" data-dcnode-id="3859" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d112910146e3477" title="Hubbard HF, Coleman BK, Sarwar G, Corsi RL (2005) Effects of an ozone-generating air purifier on indoor secondary particles in three residential dwellings. Indoor Air 15(6):432–444"><span data-dcnode-id="3860" instrument_node="">2005</span></a><span data-dcnode-id="3858" instrument_node="">). However, several studies have shown that an indoor ozone concentration in the range 50–100 ppbv (typical exposure limits) does not guarantee the efficient removal of many indoor VOC pollutants, and cannot compete with even moderate ventilation rates (Chen et al. </span><a aria-label="Reference 2005" data-dcnode-id="3856" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d112910146e3480" title="Chen W, Zhang JS, Zhang Z (2005) Performance of air cleaners for removing multiple volatile organic compounds in indoor air. ASHRAE Trans 111(1):1101–1114"><span data-dcnode-id="3857" instrument_node="">2005</span></a><span data-dcnode-id="3855" instrument_node="">; Hubbard et al. </span><a aria-label="Reference 2005" data-dcnode-id="3853" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d112910146e3483" title="Hubbard HF, Coleman BK, Sarwar G, Corsi RL (2005) Effects of an ozone-generating air purifier on indoor secondary particles in three residential dwellings. Indoor Air 15(6):432–444"><span data-dcnode-id="3854" instrument_node="">2005</span></a><span data-dcnode-id="3852" instrument_node="">; Weschler </span><a aria-label="Reference 2000" data-dcnode-id="3850" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR124" id="ref-link-section-d112910146e3486" title="Weschler CJ (2000) Ozone in indoor environments: concentration and chemistry. Indoor Air 10:269–288"><span data-dcnode-id="3851" instrument_node="">2000</span></a><span data-dcnode-id="3849" instrument_node="">). Thus, several public agencies, such as the federal department Health Canada, advise against using air cleaners that are designed to intentionally generate ozone because of concerns about possible health effects from exposure to higher levels of ozone (Health Canada </span><a aria-label="Reference 2012" data-dcnode-id="3847" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d112910146e3489" title="Health Canada (2012) Indoor air pollutant: ozone. 
                    http://www.hc-sc.gc.ca/ewh-semt/air/in/poll/ozone/index-eng.php
                    
                  . Accessed 29 May 2014"><span data-dcnode-id="3848" instrument_node="">2012</span></a><span data-dcnode-id="3846" instrument_node="">).</span></p><p data-dcnode-id="3834"><span data-dcnode-id="3844" instrument_node="">Esswein and Boeniger (</span><a aria-label="Reference 1994" data-dcnode-id="3842" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d112910146e3495" title="Esswein EJ, Boeniger MF (1994) Effect of an ozone-generating air-purifying device on reducing concentrations of formaldehyde in air. Appl Occup Environ Hyg 9(2):139–146"><span data-dcnode-id="3843" instrument_node="">1994</span></a><span data-dcnode-id="3841" instrument_node="">) have tested an ozone-generating device to treat formaldehyde at concentrations of 2.5 and 1.3 ppmv, with O</span><sub data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">3</span></sub><span data-dcnode-id="3838" instrument_node=""> concentrations of approximately 0.5 ppmv. No reduction in formaldehyde concentration was found using ozone at this concentration. Additionally, Hubbard et al. (</span><a aria-label="Reference 2005" data-dcnode-id="3836" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d112910146e3500" title="Hubbard HF, Coleman BK, Sarwar G, Corsi RL (2005) Effects of an ozone-generating air purifier on indoor secondary particles in three residential dwellings. Indoor Air 15(6):432–444"><span data-dcnode-id="3837" instrument_node="">2005</span></a><span data-dcnode-id="3835" instrument_node="">) have reported that the presence of ozone generators in homes contributes to the formation of secondary organic aerosols, especially in the presence of terpenes (usually present in cleaning agents and deodorizers).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3832" id="Sec9"><span data-dcnode-id="3833" instrument_node="">UV photolysis</span></h3><p data-dcnode-id="3824"><span data-dcnode-id="3831" instrument_node="">Ultraviolet (UV) radiation is known to have a removal effect on bioaerosols. It promotes the decomposition of contaminants, such as viruses, bacteria, chemicals, dust mites, animal dander and mould, through a process called photolysis oxidation or UV photolysis. The wavelength range with germicidal effect is between 200 and 365&nbsp;nm for air or surface disinfection. Nevertheless, photoreactor lamps emitting at 185 and 254&nbsp;nm wavelengths have been the ones usually tested (Wang et al. </span><a aria-label="Reference 2009" data-dcnode-id="3829" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d112910146e3511" title="Wang C, Xi JY, Hu HY, Yao Y (2009) Advantages of combined UV photodegradation and biofiltration processes to treat gaseous chlorobenzene. J Hazard Mater 171:1120–1125"><span data-dcnode-id="3830" instrument_node="">2009</span></a><span data-dcnode-id="3828" instrument_node="">; Zhao et al. </span><a aria-label="Reference 2013" data-dcnode-id="3826" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR139" id="ref-link-section-d112910146e3514" title="Zhao W, Yang Y, Dai J, Liu F, Wang Y (2013) VUV photolysis of naphthalene in indoor air: intermediates, pathways, and health risk. Chemosphere 91:1002–1008"><span data-dcnode-id="3827" instrument_node="">2013</span></a><span data-dcnode-id="3825" instrument_node="">).</span></p><p data-dcnode-id="3816"><span data-dcnode-id="3823" instrument_node="">UV-photolysis treatment is usually conducted at ambient temperature and pressure, which provides an inherent advantage over traditional thermal or chemical oxidation technologies. Furthermore, it is considered to be affordable and efficient (Chen et al. </span><a aria-label="Reference 2010" data-dcnode-id="3821" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d112910146e3520" title="Chen JM, Cheng ZW, Jiang YF, Zhang LL (2010) Direct VUV photodegradation of gaseous α-pinene in a spiral quartz reactor: intermediates, mechanism, and toxicity/biodegradability assessment. Chemosphere 81(9):1053–1060"><span data-dcnode-id="3822" instrument_node="">2010</span></a><span data-dcnode-id="3820" instrument_node="">). Its efficiency depends on the molar absorptivity of the target gas-phase pollutant at the wavelength used, the intensity of the UV light source, the initial concentrations of the different VOCs present in the waste-gas, relative humidity, and the concentration of added oxidants. Tseng and Li (</span><a aria-label="Reference 2005" data-dcnode-id="3818" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d112910146e3523" title="Tseng CC, Li CS (2005) Inactivation of virus-containing aerosols by ultraviolet germicidal irradiation. Aerosol Sci Technol 39:1136–1142"><span data-dcnode-id="3819" instrument_node="">2005</span></a><span data-dcnode-id="3817" instrument_node="">) have reported that airborne virus inactivation was lower at 55&nbsp;% relative humidity than that at 85&nbsp;%.</span></p><p data-dcnode-id="3799"><span data-dcnode-id="3815" instrument_node="">The application of UV photolysis is limited because of its tendency to produce ozone and radicals with harmful effects (Zhang et al. </span><a aria-label="Reference 2011" data-dcnode-id="3813" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR136" id="ref-link-section-d112910146e3529" title="Zhang Y, Moa J, Li Y, Sundell J, Wargocki P, Zhang J et al (2011) Can commonly-used fan-driven air cleaning technologies improve indoor air quality? A literature review. Atmos Environ 45:4329–4343"><span data-dcnode-id="3814" instrument_node="">2011</span></a><span data-dcnode-id="3812" instrument_node="">). In fact, UV radiation only removes some gaseous pollutants and, conversely, it might release toxic photoproducts, apart from being energy consuming (Guieysse et al. </span><a aria-label="Reference 2008" data-dcnode-id="3810" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d112910146e3532" title="Guieysse B, Hort C, Platel V, Munoz R, Ondarts M, Revah S (2008) Biological treatment of indoor air for VOC removal: potential and challenges. Biotechnol Adv 26(5):398–410"><span data-dcnode-id="3811" instrument_node="">2008</span></a><span data-dcnode-id="3809" instrument_node="">). Zhao et al. (</span><a aria-label="Reference 2013" data-dcnode-id="3807" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR139" id="ref-link-section-d112910146e3535" title="Zhao W, Yang Y, Dai J, Liu F, Wang Y (2013) VUV photolysis of naphthalene in indoor air: intermediates, pathways, and health risk. Chemosphere 91:1002–1008"><span data-dcnode-id="3808" instrument_node="">2013</span></a><span data-dcnode-id="3806" instrument_node="">) have studied the intermediates generated during the UV photolysis of naphthalene, and thirteen volatile and five semi-volatile organic by-products were identified, including highly harmful aldehydes (e.g., formaldehyde). Aldehydes are, in fact, recognized as the most important intermediates of toluene and xylene photolysis (Moussavi and Mohseni </span><a aria-label="Reference 2007" data-dcnode-id="3804" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d112910146e3538" title="Moussavi G, Mohseni M (2007) Using UV pretreatment to enhance biofiltration of mixtures of aromatic VOCs. J Hazard Mater 144:59–66"><span data-dcnode-id="3805" instrument_node="">2007</span></a><span data-dcnode-id="3803" instrument_node="">). Wang et al. (</span><a aria-label="Reference 2009" data-dcnode-id="3801" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d112910146e3541" title="Wang C, Xi JY, Hu HY, Yao Y (2009) Advantages of combined UV photodegradation and biofiltration processes to treat gaseous chlorobenzene. J Hazard Mater 171:1120–1125"><span data-dcnode-id="3802" instrument_node="">2009</span></a><span data-dcnode-id="3800" instrument_node="">) have reported that gaseous chlorobenzene is transformed into chlorophenol, phenol and certain organic acids, such as formic acid and acetic acid.</span></p><p data-dcnode-id="3791"><span data-dcnode-id="3798" instrument_node="">The photodegradation of α-pinene at concentrations of 500–600&nbsp;mg/m</span><sup data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">3</span></sup><span data-dcnode-id="3795" instrument_node=""> has been studied by Chen et al. (</span><a aria-label="Reference 2005" data-dcnode-id="3793" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d112910146e3549" title="Chen W, Zhang JS, Zhang Z (2005) Performance of air cleaners for removing multiple volatile organic compounds in indoor air. ASHRAE Trans 111(1):1101–1114"><span data-dcnode-id="3794" instrument_node="">2005</span></a><span data-dcnode-id="3792" instrument_node="">). Approximately 28, 39 and 60&nbsp;% of α-pinene were mineralized at residence times of 18, 45 and 90&nbsp;s, respectively. Some intermediates such as acetone, 3-hydroxy-α-pinene, glycoaldehyde, acetaldehyde, and 2-methylmalonaldehyde were identified.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3789" id="Sec10"><span data-dcnode-id="3790" instrument_node="">Photocatalytic oxidation</span></h3><p data-dcnode-id="3781"><span data-dcnode-id="3788" instrument_node="">Photocatalysis promotes the degradation and mineralization of contaminants in the air by using a semiconductor and an irradiation source in the presence of oxygen. The semiconductor plays the role of catalyst, and is activated in the presence of UV–Vis radiation. Thus, oxidation occurs by positively-charged holes as electron acceptors, generated by exciting an electron, only when the energy provided is higher than the band-gap energy. In addition, the positively-charged hole reacts with water molecules or OH</span><sup data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">−</span></sup><span data-dcnode-id="3785" instrument_node=""> to generate strong oxidant OH</span><sup data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">·</span></sup><span data-dcnode-id="3782" instrument_node=""> radicals.</span></p><p data-dcnode-id="3773"><span data-dcnode-id="3780" instrument_node="">Photocatalysis is a sustainable alternative to catalytic thermal oxidation, since the latter requires temperatures ranging from 200 to 1200&nbsp;°C, while photocatalysis can occur at room temperature (Shiraishi and Ishimatsu </span><a aria-label="Reference 2009" data-dcnode-id="3778" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d112910146e3567" title="Shiraishi F, Ishimatsu T (2009) Toluene removal from indoor air using a miniaturized photocatalytic air purifier including a preceding adsorption/desorption unit. Chem Eng Sci 64:2466–2472"><span data-dcnode-id="3779" instrument_node="">2009</span></a><span data-dcnode-id="3777" instrument_node="">). Compared to other techniques, it is affordable because it involves little maintenance and low power consumption (Shiraishi and Ishimatsu </span><a aria-label="Reference 2009" data-dcnode-id="3775" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d112910146e3570" title="Shiraishi F, Ishimatsu T (2009) Toluene removal from indoor air using a miniaturized photocatalytic air purifier including a preceding adsorption/desorption unit. Chem Eng Sci 64:2466–2472"><span data-dcnode-id="3776" instrument_node="">2009</span></a><span data-dcnode-id="3774" instrument_node="">).</span></p><p data-dcnode-id="3765"><span data-dcnode-id="3772" instrument_node="">In addition to the mineralization of many organic compounds, photocatalysis has also a proven bactericidal effect (Kim et al. </span><a aria-label="Reference 2006" data-dcnode-id="3770" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d112910146e3576" title="Kim JH, Seo G, Cho DL, Choi BC, Kim JB, Park HJ et al (2006) Development of air purification device through application of thin-film photocatalyst. Catal Today 111(3–4):271–274"><span data-dcnode-id="3771" instrument_node="">2006</span></a><span data-dcnode-id="3769" instrument_node="">). The use of photocatalysis has spread rapidly in recent years, and the booming market for indoor air purification products between 2002 and 2003 was attributed to products based on photocatalysis as the operating principle (Paz </span><a aria-label="Reference 2010" data-dcnode-id="3767" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d112910146e3579" title="Paz Y (2010) Application of TiO2 photocatalysis for air treatment: patents’ overview. Appl Catal B 99:448–460"><span data-dcnode-id="3768" instrument_node="">2010</span></a><span data-dcnode-id="3766" instrument_node="">).</span></p><p data-dcnode-id="3739"><span data-dcnode-id="3764" instrument_node="">TiO</span><sub data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">2</span></sub><span data-dcnode-id="3761" instrument_node=""> is currently the most widely used catalyst. It is an inexpensive, non-toxic, and biocompatible material that records high photo-efficiency and activity. Other semiconductors such as ZnO, ZnS, CdS, Fe</span><sub data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">2</span></sub><span data-dcnode-id="3758" instrument_node="">O</span><sub data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">3</span></sub><span data-dcnode-id="3755" instrument_node="">, SnO</span><sub data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">2</span></sub><span data-dcnode-id="3752" instrument_node=""> are also commonly used (Mo et al. </span><a aria-label="Reference 2009" data-dcnode-id="3750" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d112910146e3593" title="Mo J, Zhang Y, Xu Q, Lamson JJ, Zhao R (2009) Photocatalytic purification of volatile organic compounds in indoor air: a literature review. Atmos Environ 43:2229–2246"><span data-dcnode-id="3751" instrument_node="">2009</span></a><span data-dcnode-id="3749" instrument_node="">). Studies show that the yields of conversion rates and intermediate by-products vary for different pollutants, being influenced by relative humidity, initial concentration of the compound, recirculating air-flow rate or recycle ratio, residence time, wavelength and intensity of UV radiation, catalyst coating procedure, and its physical form and thickness, among others (Ao et al. </span><a aria-label="Reference 2003" data-dcnode-id="3747" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d112910146e3597" title="Ao CH, Lee SC, Mak CL, Chan LY (2003) Photodegradation of volatile organic compounds (VOCs) and NO for indoor air purification using TiO2: promotion versus inhibition effect of NO. Appl Catal B 42:119–129"><span data-dcnode-id="3748" instrument_node="">2003</span></a><span data-dcnode-id="3746" instrument_node="">; Wang et al. </span><a aria-label="Reference 2007" data-dcnode-id="3744" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d112910146e3600" title="Wang S, Ang HM, Tade MO (2007) Volatile organic compounds in indoor environment and photocatalytic oxidation: state of the art. Environ Int 33:694–705"><span data-dcnode-id="3745" instrument_node="">2007</span></a><span data-dcnode-id="3743" instrument_node="">; Quincy et al. </span><a aria-label="Reference 2010" data-dcnode-id="3741" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d112910146e3603" title="Quincy N, Vera M, Choi H, Puma G, Dionysiou D, Litter M, Destaillats H (2010) Effect of key parameters on the photocatalytic oxidation of toluene at low concentrations in air under 254&nbsp;+&nbsp;185&nbsp;nm UV irradiation. Appl Catal B 95:312–319"><span data-dcnode-id="3742" instrument_node="">2010</span></a><span data-dcnode-id="3740" instrument_node="">).</span></p><p data-dcnode-id="3725"><span data-dcnode-id="3738" instrument_node="">Quincy et al. (</span><a aria-label="Reference 2010" data-dcnode-id="3736" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d112910146e3610" title="Quincy N, Vera M, Choi H, Puma G, Dionysiou D, Litter M, Destaillats H (2010) Effect of key parameters on the photocatalytic oxidation of toluene at low concentrations in air under 254&nbsp;+&nbsp;185&nbsp;nm UV irradiation. Appl Catal B 95:312–319"><span data-dcnode-id="3737" instrument_node="">2010</span></a><span data-dcnode-id="3735" instrument_node="">) have evaluated the effect of residence time, relative humidity and film thickness for pure TiO</span><sub data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">2</span></sub><span data-dcnode-id="3732" instrument_node=""> photocatalysts as key parameters in the design of these types of reaction systems for the degradation of toluene at typical indoor concentrations (10–500 ppbv). These authors have reported toluene removal efficiencies of between 30 and 90&nbsp;%, with higher photodegradation intermediate production under low residence times and moderate humidity conditions. Vildozo et al. (</span><a aria-label="Reference 2011" data-dcnode-id="3730" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR115" id="ref-link-section-d112910146e3615" title="Vildozo D, Portela R, Ferronato C, Chovelon JM (2011) Photocatalytic oxidation of 2-propanol/toluene binary mixtures at indoor air concentration levels. Appl Catal B 107(3–4):347–354"><span data-dcnode-id="3731" instrument_node="">2011</span></a><span data-dcnode-id="3729" instrument_node="">) have studied photocatalytic oxidation (PCO) using TiO</span><sub data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">2</span></sub><span data-dcnode-id="3726" instrument_node=""> for treating mixtures of 2-propanol and toluene at concentrations representative of indoor air pollution (80–400 ppbv). In the absence of humidity, the conversion of the two pollutants almost reaches 100&nbsp;%, whereas the conversion of toluene is reduced to 50&nbsp;% in the presence of 60&nbsp;% relative humidity.</span></p><p data-dcnode-id="3717"><span data-dcnode-id="3724" instrument_node="">Volatile aldehydes are relatively stable by-products of the PCO of VOCs (Destaillats et al. </span><a aria-label="Reference 2012" data-dcnode-id="3722" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d112910146e3623" title="Destaillats H, Sleiman M, Sullivan DP, Jacquiod C, Sablayrolles J, Molins L (2012) Key parameters influencing the performance of photocatalytic oxidation (PCO) air purification under realistic indoor conditions. Appl Catal B 128:159–170"><span data-dcnode-id="3723" instrument_node="">2012</span></a><span data-dcnode-id="3721" instrument_node="">). Ourrad et al. (</span><a aria-label="Reference 2015" data-dcnode-id="3719" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d112910146e3626" title="Ourrad H, Thevenet F, Gaudion V, Riffault V (2015) Limonene photocatalytic oxidation at ppbv levels: assessment of gasphase reaction intermediates and secondary organic aerosol heterogeneous formation. Appl Catal B 168–169:183–194"><span data-dcnode-id="3720" instrument_node="">2015</span></a><span data-dcnode-id="3718" instrument_node="">) have identified 20 VOC reaction intermediates when limonene PCO was investigated for an initial concentration of 750 ppbv under dry air conditions. The gas–particle conversion of the reaction intermediates leads to the formation of secondary organic aerosol, which can penetrate deep into the lungs and be easily metabolized.</span></p><p data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">There are several challenges associated with the use of photocatalysts for indoor air treatment. Most investigations concentrate on contaminant degradation at ppmv levels, while ppbv concentrations have to be measured in indoor air. Other drawbacks are the short lifetime of the catalyst and the generation of harmful by-products.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3713" id="Sec11"><span data-dcnode-id="3714" instrument_node="">Cold plasma or non-thermal plasma (NTP)</span></h3><p data-dcnode-id="3699"><span data-dcnode-id="3712" instrument_node="">Plasma is a highly ionized gas produced by high voltage electrical discharges, and generally consisting of electrons, positive ions and neutral particles (atoms or molecules). Regarding the thermodynamic properties of plasma, there are three types: (1) full thermodynamic equilibrium plasma, (2) located thermodynamic equilibrium plasma, and (3) any plasma that is not in thermodynamic equilibrium, also called cold plasma or non-thermal plasma. The latter is commonly used for the treatment of indoor air, as it plays a multiple role in air purification. It precipitates particles through electrostatic phenomena, produces UV radiation, and thereby promotes the oxidation of molecules and the removal of viruses and bacteria. Additionally, it also produces free radicals and oxidant species, which promote the breaking of chemical bonds and the transformation of substances such as VOCs into CO</span><sub data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">2</span></sub><span data-dcnode-id="3709" instrument_node=""> and H</span><sub data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">2</span></sub><span data-dcnode-id="3706" instrument_node="">O (Fan et al. </span><a aria-label="Reference 2009" data-dcnode-id="3704" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d112910146e3643" title="Fan X, Zhu TL, Wang MY, Li XM (2009) Removal of low-concentration BTX in air using a combined plasma catalysis system. Chemosphere 75(10):1301–1306"><span data-dcnode-id="3705" instrument_node="">2009</span></a><span data-dcnode-id="3703" instrument_node="">). Cold plasma can be generated in different ways: pulsed or continuous corona discharge, dielectric barrier discharge, and glow discharge, but it is the continuous corona discharge that is usually used to generate the plasma because it reduces the formation of O</span><sub data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">3</span></sub><span data-dcnode-id="3700" instrument_node=""> during discharge.</span></p><p data-dcnode-id="3694"><span data-dcnode-id="3698" instrument_node="">Cold plasma requires lower energy requirements compared to thermal plasma, and it is very efficient at removing particulate matter and biological pollution. Liang et al. (</span><a aria-label="Reference 2012" data-dcnode-id="3696" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d112910146e3651" title="Liang Y, Wu Y, Sun K, Chen Q, Shen F, Zhang J, Yao M, Zhu T, Fang J (2012) Rapid inactivation of biological species in the air using atmospheric pressure nonthermal plasma. Environ Sci Technol 46(6):3360–3368"><span data-dcnode-id="3697" instrument_node="">2012</span></a><span data-dcnode-id="3695" instrument_node="">) have applied non-thermal plasma generated by a dielectric barrier discharge to inactivate bacterial and fungal aerosols from the lab-office environment, recording efficiencies of over 95&nbsp;% for bacteria and 85–98&nbsp;% for fungal species.</span></p><p data-dcnode-id="3677"><span data-dcnode-id="3693" instrument_node="">However, it has several disadvantages, such as poor energy efficiency, especially for the treatment of low VOC concentrations (Vandenbroucke et al. </span><a aria-label="Reference 2011" data-dcnode-id="3691" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d112910146e3657" title="Vandenbroucke AM, Morent R, De Geyter N, Leys C (2011) Non-thermal plasmas for non-catalytic and catalytic VOC abatement. J Hazard Mater 195:30–54"><span data-dcnode-id="3692" instrument_node="">2011</span></a><span data-dcnode-id="3690" instrument_node="">). The formation of NO</span><sub data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">x</span></sub><span data-dcnode-id="3687" instrument_node=""> and O</span><sub data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">3</span></sub><span data-dcnode-id="3684" instrument_node=""> as a consequence of plasma induction in the non-thermal plasma technology (NTP) reactor is unavoidable. Ozone was generated in the 150–280 ppmv range during the removal of formaldehyde at low concentration (2.2&nbsp;±&nbsp;0.1 ppmv) when using a link tooth wheel-cylinder plasma reactor energized by direct current. Mista and Kacprzyk (</span><a aria-label="Reference 2008" data-dcnode-id="3682" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d112910146e3664" title="Mista W, Kacprzyk R (2008) Decomposition of toluene using non-thermal plasma reactor at room temperature. Catal Today 137:345–349"><span data-dcnode-id="3683" instrument_node="">2008</span></a><span data-dcnode-id="3681" instrument_node="">) have reported the formation of 10 ppmv of NO</span><sub data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">x</span></sub><span data-dcnode-id="3678" instrument_node=""> when an air stream containing 70 ppmv was treated, with 93&nbsp;% removal efficiency.</span></p><p data-dcnode-id="3669"><span data-dcnode-id="3676" instrument_node="">There is a noticeable formation of undesirable by-products that could be more hazardous to a building’s occupants than the treated pollutants. Only 2–4&nbsp;% of methyl-ethyl-ketone converted to carbon dioxide, the remaining carbon being involved in the formation of intermediates, such as methyl nitrate and 2,3-butanedione (Ragazzi et al. </span><a aria-label="Reference 2014" data-dcnode-id="3674" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d112910146e3672" title="Ragazzi M, Tosi P, Rada EC, Torretta V, Schiavon M (2014) Effluents from MBT plants: plasma techniques for the treatment of VOCs. Waste Manag 34:2400–2406"><span data-dcnode-id="3675" instrument_node="">2014</span></a><span data-dcnode-id="3673" instrument_node="">). The oxidation of toluene and limonene was studied by Hoeben et al. (</span><a aria-label="Reference 2012" data-dcnode-id="3671" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d112910146e3675" title="Hoeben WFLM, Beckers FJCM, Pemen AJM, Van Heesch EJM, Kling WL (2012) Oxidative degradation of toluene and limonene in air by pulsed corona technology. J Phys D Appl Phys 45:055202"><span data-dcnode-id="3672" instrument_node="">2012</span></a><span data-dcnode-id="3670" instrument_node="">), obtaining a conversion of 74&nbsp;% for toluene and 81&nbsp;% for limonene, and generating by-products such as formic acid and carboxylic acids.</span></p><p data-dcnode-id="3658"><span data-dcnode-id="3668" instrument_node="">Indoor relative humidity has an impact on NTP performance. Electron density and the density of the reactive radicals can be modified by the addition of water vapour, and consequently, the decomposition process may be enhanced or suppressed, depending on the substances involved and the dominant pathway for pollutant destruction. Toluene, </span><i data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">n</span></i><span data-dcnode-id="3665" instrument_node="">-butane and formaldehyde removal were reported to increase with relative humidity, while the complete degradation of tetrachloromethane, methanol and dimethyl sulfide was adversely affected (Bo et al. </span><a aria-label="Reference 2007" data-dcnode-id="3663" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d112910146e3685" title="Bo ZH, Yan JH, Li XD, Chi Y, Cen KF, Chéron BG (2007) Effects of oxygen and water vapor on volatile organic compounds decomposition using gliding arc gas discharge. Plasma Chem Plasma Process 27:546–558"><span data-dcnode-id="3664" instrument_node="">2007</span></a><span data-dcnode-id="3662" instrument_node="">; Wan et al. </span><a aria-label="Reference 2011" data-dcnode-id="3660" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR117" id="ref-link-section-d112910146e3688" title="Wan Y, Fan X, Zhu T (2011) Removal of low-concentration formaldehyde in air by DC corona discharge plasma. Chem Eng J 171:314–319"><span data-dcnode-id="3661" instrument_node="">2011</span></a><span data-dcnode-id="3659" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3656" id="Sec12"><span data-dcnode-id="3657" instrument_node="">Biofiltration</span></h3><p data-dcnode-id="3645"><span data-dcnode-id="3655" instrument_node="">Biofilters are a cost-effective and eco-friendly alternative to physical–chemical air pollution control methods. This technology can treat a large variety of VOCs and inorganic gases, and the by-products are innocuous (Lu et al. </span><a aria-label="Reference 2010" data-dcnode-id="3653" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d112910146e3699" title="Lu Y, Liu J, Lu B, Jiang A, Wan C (2010) Study on the removal of indoor VOCs using biotechnology. J Hazard Mater 182:204–209"><span data-dcnode-id="3654" instrument_node="">2010</span></a><span data-dcnode-id="3652" instrument_node="">). Different bioreactor designs, such as packed bed bioreactor, bioscrubber, biotrickling filter (BTF), and membrane bioreactor, have been proposed for the treatment of gaseous pollutants (Kennes et al. </span><a aria-label="Reference 2009" data-dcnode-id="3650" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d112910146e3702" title="Kennes C, Montes M, Lopez ME, Veiga MC (2009) Waste gas treatment in bioreactors: environmental engineering aspects. Can J Civ Eng 36:1887–1894"><span data-dcnode-id="3651" instrument_node="">2009</span></a><span data-dcnode-id="3649" instrument_node="">). However, Guieysse et al. (</span><a aria-label="Reference 2008" data-dcnode-id="3647" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d112910146e3705" title="Guieysse B, Hort C, Platel V, Munoz R, Ondarts M, Revah S (2008) Biological treatment of indoor air for VOC removal: potential and challenges. Biotechnol Adv 26(5):398–410"><span data-dcnode-id="3648" instrument_node="">2008</span></a><span data-dcnode-id="3646" instrument_node="">) have highlighted the numerous challenges that have to be overcome before this technology can be implemented to tackle indoor pollution (i.e., poor pollutant transfer from gas phase to biofilm, limitations in the case of poorly soluble or recalcitrant substances, and the potential release of dust and microorganisms).</span></p><p data-dcnode-id="3631"><span data-dcnode-id="3644" instrument_node="">Lu et al. (</span><a aria-label="Reference 2010" data-dcnode-id="3642" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d112910146e3711" title="Lu Y, Liu J, Lu B, Jiang A, Wan C (2010) Study on the removal of indoor VOCs using biotechnology. J Hazard Mater 182:204–209"><span data-dcnode-id="3643" instrument_node="">2010</span></a><span data-dcnode-id="3641" instrument_node="">) have used a BTF to treat formaldehyde, benzene, toluene, and xylenes. The removal efficiencies are 100, 65–70, 93 and 85–90&nbsp;% for concentrations of 0–6.5, 2.2–46.7, 0.5–28.2 and 4.1–59.0 mg/m</span><sup data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">3</span></sup><span data-dcnode-id="3638" instrument_node="">, respectively. Ondarts et al. (</span><a aria-label="Reference 2010" data-dcnode-id="3636" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d112910146e3716" title="Ondarts M, Hort C,&nbsp;Platel V, Reguer S, Sochard S, Moynault L (2010) Developments and new applications of biological gas treatment systems for the removal of micro-pollution in indoor air: study of the design parameters and the associated potential. In: Proceedings of the 2010 Duke-UAM conference on biofiltration for air pollution control, pp 178–187"><span data-dcnode-id="3637" instrument_node="">2010</span></a><span data-dcnode-id="3635" instrument_node="">) have reported the high performance of a packed biofilter treating butanol, butyl-acetate, toluene, limonene, formaldehyde, undecane, and nitrogen dioxide at indoor concentrations ranging from 32 to 140&nbsp;µg/m</span><sup data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">3</span></sup><span data-dcnode-id="3632" instrument_node="">. The reported efficiency is higher than 90&nbsp;%, and some by-products (acetaldehyde, propanal, acetone, propionic acid, tert-butyl alcohol, ethanol, methanol, and 2-propanol) have been detected at very low concentrations.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3629" id="Sec13"><span data-dcnode-id="3630" instrument_node="">Botanical purification</span></h3><p data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">A botanical air purification system is a complementary biofiltration system composed of a vegetable plant and a packing material-substrate. The system passes polluted air through the plant’s root system, and uses either the leaves and/or the root bed to adsorb or absorb pollutants from indoor air. Consequently, pollutants become the potential nutrient source for bacterial communities in the soil, and plants enhance the population, diversity and activity of degrading rhizospheric microorganisms by releasing nutrients through their root system. A plant’s ability to take up VOCs is well documented in laboratory studies under controlled conditions, but further research on the full capacity of plants and their response in real indoor scenarios is needed.</span></p><p data-dcnode-id="3610"><span data-dcnode-id="3626" instrument_node="">Yoo et al. (</span><a aria-label="Reference 2006" data-dcnode-id="3624" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR133" id="ref-link-section-d112910146e3732" title="Yoo MH, Kwon YJ, Son KC, Kays SJ (2006) Efficacy of indoor plants for the removal of single and mixed volatile organic pollutants and physiological effects of the volatiles on the plants. J Am Soc Hortic Sci 131(4):452–458"><span data-dcnode-id="3625" instrument_node="">2006</span></a><span data-dcnode-id="3623" instrument_node="">) have found that toluene and benzene exposure adversely affected the rates of photosynthesis, stomatal conductance and transpiration of four plant species (</span><i data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">Hedera helix</span></i><span data-dcnode-id="3620" instrument_node=""> L., </span><i data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">Spathiphyllum wallisii</span></i><span data-dcnode-id="3617" instrument_node=""> Regal, </span><i data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">Syngonium podophyllum</span></i><span data-dcnode-id="3614" instrument_node=""> Schott. and </span><i data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">Cissus rhombifolia</span></i><span data-dcnode-id="3611" instrument_node=""> Vahl.). Furthermore, each plant’s response to a single compound was not necessarily indicative of the response when other compounds were present.</span></p><p data-dcnode-id="3587"><span data-dcnode-id="3609" instrument_node="">Hanoune (</span><a aria-label="Reference 2013" data-dcnode-id="3607" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d112910146e3750" title="Hanoune, B, Nicolas M, Guilhot J, Bulteau G, Cuny MA, Cuny D (2013) Inefficiency of passive plant-based systems for indoor air cleaning. In: ASHRAE IAQ 2013 conference collection: environmental health in low energy buildings, pp 31–35"><span data-dcnode-id="3608" instrument_node="">2013</span></a><span data-dcnode-id="3606" instrument_node="">) and Wang et al. (</span><a aria-label="Reference 2014" data-dcnode-id="3604" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d112910146e3753" title="Wang Z, Pei J, Zhang JS (2014) Experimental investigation of the formaldehyde removal mechanisms in a dynamic botanical filtration system for indoor air purification. J Hazard Mater 280:235–243"><span data-dcnode-id="3605" instrument_node="">2014</span></a><span data-dcnode-id="3603" instrument_node="">) have measured negligible clean air delivery rates (CADR, a parameter often used to quantify the air cleaning ability of portable air cleaners) of around 5–6&nbsp;m</span><sup data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">3</span></sup><span data-dcnode-id="3600" instrument_node="">/h per m</span><sup data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">2</span></sup><span data-dcnode-id="3597" instrument_node=""> bed for static potted plants in indoor rooms (no dynamic air flow through the bed). Hanoune (</span><a aria-label="Reference 2013" data-dcnode-id="3595" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d112910146e3760" title="Hanoune, B, Nicolas M, Guilhot J, Bulteau G, Cuny MA, Cuny D (2013) Inefficiency of passive plant-based systems for indoor air cleaning. In: ASHRAE IAQ 2013 conference collection: environmental health in low energy buildings, pp 31–35"><span data-dcnode-id="3596" instrument_node="">2013</span></a><span data-dcnode-id="3594" instrument_node="">) have estimated that several hundreds of </span><i data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">Scindapsus aureus</span></i><span data-dcnode-id="3591" instrument_node=""> plants would be required to provide the same CADR as a common ventilation system in an 8&nbsp;m</span><sup data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">3</span></sup><span data-dcnode-id="3588" instrument_node=""> chamber.</span></p><p data-dcnode-id="3567"><span data-dcnode-id="3586" instrument_node="">Other studies have found that the microorganisms in the growth medium (rhizosphere) play a major role in the removal of VOCs from the gaseous phase (Wood et al. </span><a aria-label="Reference 2002" data-dcnode-id="3584" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR126" id="ref-link-section-d112910146e3772" title="Wood A, Orwell RL, Tarran J, Torpy F, Burchett M (2002) Potted-plant/growth media interactions and capacities for removal of volatiles from indoor air. J Hortic Sci Biotechnol 77(1):120–129"><span data-dcnode-id="3585" instrument_node="">2002</span></a><span data-dcnode-id="3583" instrument_node="">; Orwell et al. </span><a aria-label="Reference 2004" data-dcnode-id="3581" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d112910146e3775" title="Orwell RI, Wood A, Tarran J, Torpy F, Burchett MD (2004) Removal of benzene by the indoor plant/substrate microcosm and implications for air quality. Water Air Soil Pollut 157:193–207"><span data-dcnode-id="3582" instrument_node="">2004</span></a><span data-dcnode-id="3580" instrument_node="">). In fact, microbial community-shifts were observed when VOC exposure ceased (Russell et al. </span><a aria-label="Reference 2014" data-dcnode-id="3578" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d112910146e3778" title="Russell JA, Hu Y, Chau L, Pauliushchyk M, Anastopoulos J, Anandan S, Waring MS (2014) Indoor-biofilter growth and exposure to airborne chemicals drive similar changes in plant root bacterial communities. Appl Environ Microbiol 80(16):4805–4813"><span data-dcnode-id="3579" instrument_node="">2014</span></a><span data-dcnode-id="3577" instrument_node="">). Kim et al. (</span><a aria-label="Reference 2014" data-dcnode-id="3575" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d112910146e3781" title="Kim KJ, Jung HH, Seo HW, Lee JA, Kays SJ (2014) Volatile toluene and xylene removal efficiency of foliage plants as affected by top to root zone size. HortSience 49(2):230–234"><span data-dcnode-id="3576" instrument_node="">2014</span></a><span data-dcnode-id="3574" instrument_node="">) have concluded that the efficiency of toluene and xylene removal by </span><i data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">Fatsia Japonica</span></i><span data-dcnode-id="3571" instrument_node=""> and </span><i data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">Dracaena fragrans</span></i><span data-dcnode-id="3568" instrument_node=""> increased as the root zone volume increased.</span></p><p data-dcnode-id="3550"><span data-dcnode-id="3566" instrument_node="">Xu et al. (</span><a aria-label="Reference 2011" data-dcnode-id="3564" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d112910146e3795" title="Xu Z, Wang L, Hou H (2011) Formaldehyde removal by potted plant–soil systems. J Hazard Mater 192:314–318"><span data-dcnode-id="3565" instrument_node="">2011</span></a><span data-dcnode-id="3563" instrument_node="">) have used a dynamic camera to study the removal of formaldehyde by three different plant species (</span><i data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">Chlorphytum comosum</span></i><span data-dcnode-id="3560" instrument_node="">, </span><i data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">Aloe vera</span></i><span data-dcnode-id="3557" instrument_node=""> and </span><i data-dcnode-id="3555"><span data-dcnode-id="3556" instrument_node="">Epipremnum aureum</span></i><span data-dcnode-id="3554" instrument_node="">). They concluded that formaldehyde assimilation was higher during the day than at night, and that roots played an important role in removing contaminants via adsorption mechanisms and/or enzymatic degradation. Microorganisms were responsible for about 50&nbsp;% of VOC removal during the day, and about 90&nbsp;% at night (Kim et al. </span><a aria-label="Reference 2014" data-dcnode-id="3552" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d112910146e3807" title="Kim KJ, Jung HH, Seo HW, Lee JA, Kays SJ (2014) Volatile toluene and xylene removal efficiency of foliage plants as affected by top to root zone size. HortSience 49(2):230–234"><span data-dcnode-id="3553" instrument_node="">2014</span></a><span data-dcnode-id="3551" instrument_node="">). Nevertheless, it is worth noting the relevant contribution plants make to aesthetic and mental wellbeing in indoor environments.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3548" id="Sec14"><span data-dcnode-id="3549" instrument_node="">Membrane separation</span></h3><p data-dcnode-id="3537"><span data-dcnode-id="3547" instrument_node="">The membrane separation technique relies on the use of a semipermeable membrane that allows the diffusion of certain VOCs from a gas stream to another fluid. Zeolite-based membranes have recently been developed for separating mixtures of gaseous compounds with similar boiling points or molecular weights, mixtures of alcohols, hydrocarbons and non-condensable gaseous compounds. Aguado et al. (</span><a aria-label="Reference 2004" data-dcnode-id="3545" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d112910146e3818" title="Aguado S, Polo AC, Bernal MP, Coronas J, Santamaría J (2004) Removal of pollutants from indoor air using zeolite membranes. J Membr Sci 240:159–166"><span data-dcnode-id="3546" instrument_node="">2004</span></a><span data-dcnode-id="3544" instrument_node="">) have shown that membranes based on zeolites are effective for the removal of formaldehyde, </span><i data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">n</span></i><span data-dcnode-id="3541" instrument_node="">-hexane and benzene, with permeation fluxes of 3300, 130 and 30&nbsp;mg/m</span><sup data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">2</span></sup><span data-dcnode-id="3538" instrument_node="">&nbsp;h, respectively, and concentrations in the 2–230 ppmv range. The main drawbacks are cleaning requirements, the increase in pressure drop, and greater mechanical resistance during operation.</span></p><p data-dcnode-id="3532"><span data-dcnode-id="3536" instrument_node="">Nevertheless, the research literature on membrane separation at low VOC levels is limited. Zhang et al. (</span><a aria-label="Reference 2012" data-dcnode-id="3534" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR137" id="ref-link-section-d112910146e3829" title="Zhang LZ, Zhang XR, Miao QZ, Pei LX (2012) Selective permeation of moisture and VOCs through polymer membranes used in total heat exchangers for indoor air ventilation. Indoor Air 22:321–330"><span data-dcnode-id="3535" instrument_node="">2012</span></a><span data-dcnode-id="3533" instrument_node="">) have reported that the material and properties of the polymeric moisture permeable membranes used in air-ventilation heat exchangers significantly reduce the transfer of unwanted pollutants (i.e., acetic acid, formaldehyde, acetaldehyde, toluene, and ethane), as well as the humidity from the exhaust air to the incoming fresh air, back to the indoor environment. They found that polyvinyl alcohol with lithium chloride as an additive, polyvinylpyrrolidone and polyacrylamide membranes were the best choices for use in air-to-air energy exchangers because of their high water vapour permeability and high selectivity. In contrast, polydimethylsiloxane was the least suitable material for this application, followed by polypropylene and ethylene cellulose.</span></p><p data-dcnode-id="3524"><span data-dcnode-id="3531" instrument_node="">Membrane modules have been installed in manned spacecraft, where a wide range of VOCs has been observed, including aliphatic and aromatic hydrocarbons, alcohols, aldehydes, and chlorinated aliphatic components. In these cases, membranes act as the sorption step, and physically disconnect the contaminated gas phase from a liquid inorganic solution where contaminants are depleted by microbial activity (Van Ras et al. </span><a aria-label="Reference 2005" data-dcnode-id="3529" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR113" id="ref-link-section-d112910146e3835" title="Van Ras N, Krooneman J, Ogink N, Willers H, D’Amico A, di Natale C et al (2005) Biological air filter for air-quality control. In: Wilson A (ed) Microgravity applications programme: successful teaming of science and industry. ESA publication SP-1290, Noordwijk, The Netherlands, pp 270–280"><span data-dcnode-id="3530" instrument_node="">2005</span></a><span data-dcnode-id="3528" instrument_node="">). A bench-scale filtration system proved to be effective in the removal of a mixture of indoor VOCs including chlorobenzene, 1,2-dichloroethane, BTEX, alcohols, methane, and acetone in a 20–200&nbsp;mg/m</span><sup data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">3</span></sup><span data-dcnode-id="3525" instrument_node=""> range.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3522" id="Sec15"><span data-dcnode-id="3523" instrument_node="">Additional features for conventional technologies</span></h3><p data-dcnode-id="3520"><span data-dcnode-id="3521" instrument_node="">The goal of efficiently and safely treating all kinds of indoor pollutants can be elusive. In spite of the wide range of benefits claimed by the manufacturers of air cleaning devices, all these systems have their drawbacks, and further research and development is required.</span></p><p data-dcnode-id="3515"><span data-dcnode-id="3519" instrument_node="">Although many abatement technologies for improving indoor air quality are frequently selected according to their efficiency in treating a certain set of pollutants, other additional features such as solid waste generation, energy consumption and commercial availability need to be considered (Table&nbsp;</span><a data-dcnode-id="3517" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab6"><span data-dcnode-id="3518" instrument_node="">6</span></a><span data-dcnode-id="3516" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3500" data-test="inline-table" id="table-6"><figure data-dcnode-id="3501"><figcaption class="c-article-table__figcaption" data-dcnode-id="3512"><b data-dcnode-id="3513" data-test="table-caption" id="Tab6"><span data-dcnode-id="3514" instrument_node="">Table&nbsp;6 Qualitative comparison of additional features amongst conventional abatement technologies</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3502"><a aria-label="Full size table 6" class="c-article__pill-button" data-dcnode-id="3503" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/tables/6" rel="nofollow"><span data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3504" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3505" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3506" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3509" instrument_node="">
