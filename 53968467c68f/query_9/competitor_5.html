</span><p data-dcnode-id="3494"><span data-dcnode-id="3498" instrument_node="">As far as the consumer market is concerned, only devices based on adsorption, photocatalysis, ozonation and filtration are widely commercialized today, with filtration being the most popular one (Fig.&nbsp;</span><a data-dcnode-id="3496" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3497" instrument_node="">1</span></a><span data-dcnode-id="3495" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3467" data-test="figure" data-title="Fig.&nbsp;1" id="figure-1"><figure data-dcnode-id="3468"><figcaption data-dcnode-id="3491"><b class="c-article-section__figure-caption" data-dcnode-id="3492" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="3493" instrument_node="">Fig.&nbsp;1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3479"><div class="c-article-section__figure-item" data-dcnode-id="3486"><a class="c-article-section__figure-link" data-dcnode-id="3487" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/figures/1" rel="nofollow"><picture data-dcnode-id="3488"><source data-dcnode-id="3490" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11157-015-9363-9/MediaObjects/11157_2015_9363_Fig1_HTML.gif?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="3489" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11157-015-9363-9/MediaObjects/11157_2015_9363_Fig1_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3480" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="3481"><span data-dcnode-id="3485" instrument_node="">The market for devices based on adsorption, filtration, photocatalysis and ozonation for improving indoor air quality (Adapted from Ribot et al. </span><a aria-label="Reference 2006" data-dcnode-id="3483" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d112910146e4171" title="Ribot B, Frochot D, Blondeau P, Ginestet A, Squinazi F, De Blay F et al (2006) Mise en place de protocoles de qualification des appareils d’épuration d’air. Convention ADEME-EDF no. 04 04 C 0080 Rapport Final"><span data-dcnode-id="3484" instrument_node="">2006</span></a><span data-dcnode-id="3482" instrument_node="">)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3469"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="3470" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/figures/1" rel="nofollow"><span data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3471" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3472" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3473" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3476" instrument_node="">

</span></a></div></figure></div><span data-dcnode-id="3466" instrument_node="">
</span><p data-dcnode-id="3446"><span data-dcnode-id="3465" instrument_node="">No single technology can comply with all these requirements simultaneously (Table&nbsp;</span><a data-dcnode-id="3463" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="3464" instrument_node="">4</span></a><span data-dcnode-id="3462" instrument_node="">), so many researchers have begun to explore the combination of several air purification technologies or innovative alternatives (Ao and Lee </span><a aria-label="Reference 2005" data-dcnode-id="3460" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d112910146e4189" title="Ao CH, Lee SC (2005) Indoor air purification by photocatalyst TiO2 immobilized on an activated carbon filter installed in an air cleaner. Chem Eng Sci 60:103–109"><span data-dcnode-id="3461" instrument_node="">2005</span></a><span data-dcnode-id="3459" instrument_node="">; Delagrange et al. </span><a aria-label="Reference 2006" data-dcnode-id="3457" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d112910146e4192" title="Delagrange S, Pinard L, Tatibouët JM (2006) Combination of a non-thermal plasma and a catalyst for toluene removal from air: manganese based oxide catalysts. Appl Catal B 68:92–98"><span data-dcnode-id="3458" instrument_node="">2006</span></a><span data-dcnode-id="3456" instrument_node="">; Kwong et al. </span><a aria-label="Reference 2008" data-dcnode-id="3454" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d112910146e4195" title="Kwong CW, Chao CYH, Hui KS, Wan MP (2008) Removal of VOCs from indoor environment by ozonation over different porous materials. Atmos Environ 42:2300–2311"><span data-dcnode-id="3455" instrument_node="">2008</span></a><span data-dcnode-id="3453" instrument_node="">; Lu et al. </span><a aria-label="Reference 2012" data-dcnode-id="3451" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d112910146e4198" title="Lu Y, Wang D, Wu Y, Ma C, Zhang X, Yang C (2012) Synergistic effect of nanophotocatalysis and non thermal plasma on the removal of indoor HCHO. Int J Photoenergy. ID 354032"><span data-dcnode-id="3452" instrument_node="">2012</span></a><span data-dcnode-id="3450" instrument_node="">; Ondarts et al. </span><a aria-label="Reference 2012" data-dcnode-id="3448" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d112910146e4202" title="Ondarts M, Hort C, Sochard S, Platel V, Moynault L, Seby F (2012) Evaluation of compost and a mixture of compost and activated carbon as biofilter media for the treatment of indoor air pollution. Environ Technol 33(3):273–284"><span data-dcnode-id="3449" instrument_node="">2012</span></a><span data-dcnode-id="3447" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="3057" data-title="Combined systems"><div class="c-article-section" data-dcnode-id="3058" id="Sec16-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3441" id="Sec16"><span data-dcnode-id="3442" instrument_node="">Combined systems</span></h2><div class="c-article-section__content" data-dcnode-id="3059" id="Sec16-content"><p data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">A universal technology for indoor air treatment has to be able to cope with a wide variety of pollutants at relatively low concentrations, perform effectively at room temperature and humidity, be noiseless and affordable, generate no waste, and consume little energy.</span></p><p data-dcnode-id="3434"><span data-dcnode-id="3438" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="3436" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3437" instrument_node="">2</span></a><span data-dcnode-id="3435" instrument_node=""> shows several combined alternatives that are currently under research, and have not yet been commercialized. The most relevant ones are described below.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3410" data-test="figure" data-title="Fig.&nbsp;2" id="figure-2"><figure data-dcnode-id="3411"><figcaption data-dcnode-id="3431"><b class="c-article-section__figure-caption" data-dcnode-id="3432" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="3433" instrument_node="">Fig.&nbsp;2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3422"><div class="c-article-section__figure-item" data-dcnode-id="3426"><a class="c-article-section__figure-link" data-dcnode-id="3427" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/figures/2" rel="nofollow"><picture data-dcnode-id="3428"><source data-dcnode-id="3430" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11157-015-9363-9/MediaObjects/11157_2015_9363_Fig2_HTML.gif?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="3429" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11157-015-9363-9/MediaObjects/11157_2015_9363_Fig2_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3423" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">Several combined systems under research for the treatment of indoor air</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3412"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="3413" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/figures/2" rel="nofollow"><span data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3414" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3415" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3416" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3419" instrument_node="">

</span><h3 class="c-article__sub-heading" data-dcnode-id="3407" id="Sec17"><span data-dcnode-id="3408" instrument_node="">Plasma-catalytic hybrid system</span></h3><p data-dcnode-id="3396"><span data-dcnode-id="3406" instrument_node="">Non-thermal plasma technology performs well for the treatment of VOCs, but the generation of toxic by-products during incomplete oxidation has limited its application (Holzer et al. </span><a aria-label="Reference 2002" data-dcnode-id="3404" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d112910146e4244" title="Holzer F, Roland U, Kopinke FD (2002) Combination of non-thermal plasma and heterogeneous catalysis for oxidation of volatile organic compounds. Part 1. Accessibility of the intra-particle volume. Appl Catal B 38:163–181"><span data-dcnode-id="3405" instrument_node="">2002</span></a><span data-dcnode-id="3403" instrument_node="">). The combination of NTP and a catalyst improves oxidation efficiency, thus avoiding or limiting by-product formation (Delagrange et al. </span><a aria-label="Reference 2006" data-dcnode-id="3401" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d112910146e4247" title="Delagrange S, Pinard L, Tatibouët JM (2006) Combination of a non-thermal plasma and a catalyst for toluene removal from air: manganese based oxide catalysts. Appl Catal B 68:92–98"><span data-dcnode-id="3402" instrument_node="">2006</span></a><span data-dcnode-id="3400" instrument_node="">). If the catalyst has a significant capacity for adsorbing pollutant molecules, the retention time in the reactor is prolonged, improving the overall removal efficiency (Vandenbroucke et al. </span><a aria-label="Reference 2011" data-dcnode-id="3398" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d112910146e4250" title="Vandenbroucke AM, Morent R, De Geyter N, Leys C (2011) Non-thermal plasmas for non-catalytic and catalytic VOC abatement. J Hazard Mater 195:30–54"><span data-dcnode-id="3399" instrument_node="">2011</span></a><span data-dcnode-id="3397" instrument_node="">).</span></p><p data-dcnode-id="3385"><span data-dcnode-id="3395" instrument_node="">Two reactor configurations have been proposed according to the catalyst position: in-plasma catalysis (IPC), where the catalyst is inside the plasma chamber (Fig.&nbsp;</span><a data-dcnode-id="3393" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3394" instrument_node="">3</span></a><span data-dcnode-id="3392" instrument_node="">a), or post-plasma catalysis (PPC) where the catalyst is downstream of the discharge zone (Fig.&nbsp;</span><a data-dcnode-id="3390" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3391" instrument_node="">3</span></a><span data-dcnode-id="3389" instrument_node="">b). Several porous and nonporous materials and metal-coated or bare materials have been used and tested as catalysts in both configurations (i.e., alumina, silica, zeolites, manganese oxides, and TiO</span><sub data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">2</span></sub><span data-dcnode-id="3386" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3355" data-test="figure" data-title="Fig.&nbsp;3" id="figure-3"><figure data-dcnode-id="3356"><figcaption data-dcnode-id="3382"><b class="c-article-section__figure-caption" data-dcnode-id="3383" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="3384" instrument_node="">Fig.&nbsp;3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3367"><div class="c-article-section__figure-item" data-dcnode-id="3377"><a class="c-article-section__figure-link" data-dcnode-id="3378" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/figures/3" rel="nofollow"><picture data-dcnode-id="3379"><source data-dcnode-id="3381" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11157-015-9363-9/MediaObjects/11157_2015_9363_Fig3_HTML.gif?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="3380" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11157-015-9363-9/MediaObjects/11157_2015_9363_Fig3_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3368" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="3369"><span data-dcnode-id="3376" instrument_node="">Configurations of plasma-catalyst reactor. </span><b data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">a</span></b><span data-dcnode-id="3373" instrument_node=""> IPC configuration, </span><b data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">b</span></b><span data-dcnode-id="3370" instrument_node=""> PPc configuration</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3357"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="3358" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/figures/3" rel="nofollow"><span data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3359" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3360" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3361" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3364" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3363" fill-rule="evenodd"></path><span data-dcnode-id="3362" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3354" instrument_node="">
</span><p data-dcnode-id="3337"><span data-dcnode-id="3353" instrument_node="">Fan et al. (</span><a aria-label="Reference 2009" data-dcnode-id="3351" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d112910146e4292" title="Fan X, Zhu TL, Wang MY, Li XM (2009) Removal of low-concentration BTX in air using a combined plasma catalysis system. Chemosphere 75(10):1301–1306"><span data-dcnode-id="3352" instrument_node="">2009</span></a><span data-dcnode-id="3350" instrument_node="">) have compared the results obtained by using NTP and a PPC reactor for the treatment of polluted air containing low concentrations of benzene, toluene and </span><i data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node="">p</span></i><span data-dcnode-id="3347" instrument_node="">-xylene. The removal efficiency when using NTP technology was 2, 19 and 49&nbsp;% for benzene, toluene and </span><i data-dcnode-id="3345"><span data-dcnode-id="3346" instrument_node="">p</span></i><span data-dcnode-id="3344" instrument_node="">-xylene, respectively. Nevertheless, treatment by CPC rendered a considerably higher removal efficiency of 94, 97 and 95&nbsp;%, respectively. Additionally, the emissions of O</span><sub data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">3</span></sub><span data-dcnode-id="3341" instrument_node=""> and NO</span><sub data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">2</span></sub><span data-dcnode-id="3338" instrument_node=""> were considerably reduced.</span></p><p data-dcnode-id="3332"><span data-dcnode-id="3336" instrument_node="">Van Durme et al. (</span><a aria-label="Reference 2009" data-dcnode-id="3334" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d112910146e4308" title="Van Durme J, Dewulf J, Demeestere K, Leys C, Van Langenhove H (2009) Post-plasma catalytic technology for the removal of toluene from indoor air: effect of humidity. Appl Catal B 87:78–83"><span data-dcnode-id="3335" instrument_node="">2009</span></a><span data-dcnode-id="3333" instrument_node="">) have investigated the effect of relative humidity (RH) on toluene removal in a PPC reactor tested with six different catalysts. Toluene removal efficiency in dry conditions was 90&nbsp;%, but in contrast, when the RH was 72&nbsp;% the removal efficiency decreased to 39&nbsp;%. The effect of catalyst activity and RH content on ozone decomposition rate has been investigated in dry and humid conditions. The physical and chemical properties of the catalysts strongly affect the ozone decomposition efficiencies obtained in the PPC reactor.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3330" id="Sec18"><span data-dcnode-id="3331" instrument_node="">Biological process&nbsp;+&nbsp;photocatalytic oxidation hybrid system</span></h3><p data-dcnode-id="3322"><span data-dcnode-id="3329" instrument_node="">Two different biological techniques have been combined with PCO for the treatment of VOCs (Fig.&nbsp;</span><a data-dcnode-id="3327" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3328" instrument_node="">4</span></a><span data-dcnode-id="3326" instrument_node="">). Thus, PCO can be combined with a BTF, with the latter being a pre-oxidation or a post-oxidation step (Fig.&nbsp;</span><a data-dcnode-id="3324" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3325" instrument_node="">4</span></a><span data-dcnode-id="3323" instrument_node="">a, b). BTF has the advantage of achieving high efficiency and stability for the treatment of hydrophilic VOCs. Additionally, PCO has a broad selectivity for VOCs, requiring little maintenance and low energy consumption.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3289" data-test="figure" data-title="Fig.&nbsp;4" id="figure-4"><figure data-dcnode-id="3290"><figcaption data-dcnode-id="3319"><b class="c-article-section__figure-caption" data-dcnode-id="3320" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="3321" instrument_node="">Fig.&nbsp;4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3301"><div class="c-article-section__figure-item" data-dcnode-id="3314"><a class="c-article-section__figure-link" data-dcnode-id="3315" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/figures/4" rel="nofollow"><picture data-dcnode-id="3316"><source data-dcnode-id="3318" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11157-015-9363-9/MediaObjects/11157_2015_9363_Fig4_HTML.gif?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="3317" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11157-015-9363-9/MediaObjects/11157_2015_9363_Fig4_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3302" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="3303"><span data-dcnode-id="3313" instrument_node="">Diagram of biological processes combined with photocatalytic oxidation (PCO). </span><b data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">a</span></b><span data-dcnode-id="3310" instrument_node=""> Biotrickling filter (BTF) combined with PCO, </span><b data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">b</span></b><span data-dcnode-id="3307" instrument_node=""> PCO combined with BTF, </span><b data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">c</span></b><span data-dcnode-id="3304" instrument_node=""> PCO combined with biofiltration (BF) system</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3291"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="3292" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/figures/4" rel="nofollow"><span data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3293" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3294" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3295" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3298" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3297" fill-rule="evenodd"></path><span data-dcnode-id="3296" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3283"><span data-dcnode-id="3287" instrument_node="">As far as BTF is concerned, the polluted air stream passes through a column with an inert packing material containing microorganisms. At the same time, a nutrient solution is continuously recycled through the filter bed (Rene et al. </span><a aria-label="Reference 2012" data-dcnode-id="3285" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d112910146e4356" title="Rene ER, Veiga MC, Kennes C (2012) Combined biological and physicochemical waste gas cleaning techniques. J Environ Sci Health Part A Toxic/Hazard Subst Environ Eng 47(7):920–939"><span data-dcnode-id="3286" instrument_node="">2012</span></a><span data-dcnode-id="3284" instrument_node="">). Regarding the PCO process, indoor VOCs are decomposed at ambient temperature, but the formation of harmful by-products is a major drawback.</span></p><p data-dcnode-id="3275"><span data-dcnode-id="3282" instrument_node="">Li et al. (</span><a aria-label="Reference 2007" data-dcnode-id="3280" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d112910146e4362" title="Li L, Zhang C, He H, Liu J (2007) An integrated system of biological and catalytic oxidation for the removal of o-xylene from exhaust. Catal Today 126:338–344"><span data-dcnode-id="3281" instrument_node="">2007</span></a><span data-dcnode-id="3279" instrument_node="">) have proposed the use of an integrated reactor consisting of a biofiltration unit and a catalytic oxidation unit to treat gaseous waste containing </span><i data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">o</span></i><span data-dcnode-id="3276" instrument_node="">-xylene. The integration of biological and catalytic oxidation processes allows minimizing the biofilter volume, improving the response to shock loads, and leading to high and stable removal efficiency.</span></p><p data-dcnode-id="3267"><span data-dcnode-id="3274" instrument_node="">He et al. (</span><a aria-label="Reference 2012" data-dcnode-id="3272" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d112910146e4371" title="He Z, Li J, Chen J, Chen Z, Li G, Sun G, An T (2012) Treatment of organic waste gas in a paint plant by combined technique of biotrickling filtration with photocatalytic oxidation. Chem Eng J 200–202:645–653"><span data-dcnode-id="3273" instrument_node="">2012</span></a><span data-dcnode-id="3271" instrument_node="">) have reported the advantages of using a BTF as a pre-treatment step (Fig.&nbsp;</span><a data-dcnode-id="3269" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3270" instrument_node="">4</span></a><span data-dcnode-id="3268" instrument_node="">a) for the removal of most of the VOCs emitted from paints (ethyl acetate, toluene, ethylbenzene, xylene and trimethylbenzene). Removal efficiencies range from 79.4 to 99.8&nbsp;%. BTF favours high long-term photocatalytic activity by avoiding catalyst deactivation. PCO maintains overall system efficiency when the biological reactor performance is limited or inhibited by specific pollutants and/or load fluctuations and changes in operating conditions.</span></p><p data-dcnode-id="3259"><span data-dcnode-id="3266" instrument_node="">As a consequence of the bactericidal effect of photooxidation, PCO is able to additionally eliminate possible microorganisms before being released from the biological system (Kim et al. </span><a aria-label="Reference 2006" data-dcnode-id="3264" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d112910146e4381" title="Kim JH, Seo G, Cho DL, Choi BC, Kim JB, Park HJ et al (2006) Development of air purification device through application of thin-film photocatalyst. Catal Today 111(3–4):271–274"><span data-dcnode-id="3265" instrument_node="">2006</span></a><span data-dcnode-id="3263" instrument_node="">). Spore deactivation efficiencies of around 98&nbsp;% have been recorded by Saucedo-Lucero et al. (</span><a aria-label="Reference 2014" data-dcnode-id="3261" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR98" id="ref-link-section-d112910146e4384" title="Saucedo-Lucero JO, Quijano G, Arriaga S, Muñoz R (2014) Hexane abatement and spore emission control in a fungal biofilter–photoreactor hybrid unit. J Hazard Mater 276:287–294"><span data-dcnode-id="3262" instrument_node="">2014</span></a><span data-dcnode-id="3260" instrument_node="">) in a fungal perlite-based biofilter coupled with PCO. These authors have contended that direct UV spore inactivation and the formation of oxidative radicals are the main spore inactivation mechanisms.</span></p><p data-dcnode-id="3251"><span data-dcnode-id="3258" instrument_node="">When using a PCO process before a biological system (Fig.&nbsp;</span><a data-dcnode-id="3256" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3257" instrument_node="">4</span></a><span data-dcnode-id="3255" instrument_node="">b, c), the prior oxidation of recalcitrant compounds (e.g., trichloroethylene) facilitates subsequent biodegradation. PCO can easily cope with unexpected variations in pollutant inlet concentrations, which cannot easily be overcome in biological systems (Palau et al. </span><a aria-label="Reference 2012" data-dcnode-id="3253" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d112910146e4393" title="Palau J, Penya-Roja JM, Gabaldon C, Alvarez-Hornos FJ, Martinez-Soria V (2012) Effect of pre-treatments based on UV photocatalysis and photo-oxidation on toluene biofiltration performance. J Chem Technol Biotechnol 87:65–72"><span data-dcnode-id="3254" instrument_node="">2012</span></a><span data-dcnode-id="3252" instrument_node="">).</span></p><p data-dcnode-id="3246"><span data-dcnode-id="3250" instrument_node="">Hinojosa-Reyes et al. (</span><a aria-label="Reference 2012" data-dcnode-id="3248" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d112910146e4399" title="Hinojosa-Reyes M, Rodríguez-González V, Arriaga S (2012) Enhancing ethylbenzene vapors degradation in a hybrid system based on photocatalytic oxidation UV/TiO2–In and a biofiltration process. J Hazard Mater 209–210:365–371"><span data-dcnode-id="3249" instrument_node="">2012</span></a><span data-dcnode-id="3247" instrument_node="">) have treated ethylbenzene in a combined PCO–BTF system and in each individual system. Compared to the individual efficiency of the PCO and BTF systems, the hybrid system enhanced the removal efficiency by 47 and 36&nbsp;%, respectively.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3244" id="Sec19"><span data-dcnode-id="3245" instrument_node="">Biological process&nbsp;+&nbsp;adsorption hybrid system</span></h3><p data-dcnode-id="3239"><span data-dcnode-id="3243" instrument_node="">Indoor air emissions usually carry fluctuating loads of contaminants throughout the daytime that could hinder the performance of bioreactors due to recurring starvation periods. Several researchers have solved this problem by installing adsorption filters upstream of the biological reactor, which could soften the sudden variations in the concentration, spikes and unstable loads of contaminants (Fig.&nbsp;</span><a data-dcnode-id="3241" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3242" instrument_node="">5</span></a><span data-dcnode-id="3240" instrument_node="">a). These pre‐filters could likewise desorb compounds to reduce the intensity of the starvation periods.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3209" data-test="figure" data-title="Fig.&nbsp;5" id="figure-5"><figure data-dcnode-id="3210"><figcaption data-dcnode-id="3236"><b class="c-article-section__figure-caption" data-dcnode-id="3237" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="3238" instrument_node="">Fig.&nbsp;5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3221"><div class="c-article-section__figure-item" data-dcnode-id="3231"><a class="c-article-section__figure-link" data-dcnode-id="3232" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/figures/5" rel="nofollow"><picture data-dcnode-id="3233"><source data-dcnode-id="3235" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11157-015-9363-9/MediaObjects/11157_2015_9363_Fig5_HTML.gif?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="3234" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11157-015-9363-9/MediaObjects/11157_2015_9363_Fig5_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3222" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="3223"><span data-dcnode-id="3230" instrument_node="">Two configurations of the combined biofiltration and adsorption processes. </span><b data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">a</span></b><span data-dcnode-id="3227" instrument_node=""> Adsorption column&nbsp;+&nbsp;BF, </span><b data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">b</span></b><span data-dcnode-id="3224" instrument_node=""> BF&nbsp;+&nbsp;adsorption column</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3211"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="3212" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/figures/5" rel="nofollow"><span data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3213" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3214" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3215" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3218" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3217" fill-rule="evenodd"></path><span data-dcnode-id="3216" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3208" instrument_node="">
</span><p data-dcnode-id="3203"><span data-dcnode-id="3207" instrument_node="">An adsorption column placed after a biofiltration treatment (Fig.&nbsp;</span><a data-dcnode-id="3205" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3206" instrument_node="">5</span></a><span data-dcnode-id="3204" instrument_node="">b) could restrain the emission of non-biodegrade pollutants and by-products from the bioreactor. Nevertheless, it is worth mentioning that operating failures that entail the loss of biological activity will cause a decrease in the adsorption column lifespan.</span></p><p data-dcnode-id="3198"><span data-dcnode-id="3202" instrument_node="">A mixture of a conventional biofilter support and AC may also be used in the same bioreactor, as proposed by Ondarts et al. (</span><a aria-label="Reference 2012" data-dcnode-id="3200" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d112910146e4448" title="Ondarts M, Hort C, Sochard S, Platel V, Moynault L, Seby F (2012) Evaluation of compost and a mixture of compost and activated carbon as biofilter media for the treatment of indoor air pollution. Environ Technol 33(3):273–284"><span data-dcnode-id="3201" instrument_node="">2012</span></a><span data-dcnode-id="3199" instrument_node="">), where, the performance of two biofilters packed with compost and a mixture of compost and AC have been compared for the treatment of eight typical indoor air pollutants. The results show that adding AC to the compost leads to a shorter acclimation period and more stable operation compared with the compost-based biofilter. Moreover, trichloroethylene, which is the only pollutant among the eight tested that is not degraded by biofiltration, is fully adsorbed by the compost/adsorption biofilter.</span></p><p data-dcnode-id="3193"><span data-dcnode-id="3197" instrument_node="">Dorado et al. (</span><a aria-label="Reference 2012" data-dcnode-id="3195" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d112910146e4454" title="Dorado AD, Lafuente J, Gabriel D, Gamisans X (2012) Interaction between sorption and biodegradation in a biofilter packed with activated carbon. Water Sci Technol 66(8):1743–1750"><span data-dcnode-id="3196" instrument_node="">2012</span></a><span data-dcnode-id="3194" instrument_node="">) have reported that high adsorption capacity materials not only play an important role during the start-up operation, but they are also important during steady operation. These authors found that microorganisms were able to oxidize the organic matter previously adsorbed on the surface of AC during starvation periods, and also during steady operation.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3191" id="Sec20"><span data-dcnode-id="3192" instrument_node="">Adsorption&nbsp;+&nbsp;photocatalysis hybrid system</span></h3><p data-dcnode-id="3180"><span data-dcnode-id="3190" instrument_node="">The use of an adsorbent before the PCO process (Fig.&nbsp;</span><a data-dcnode-id="3188" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3189" instrument_node="">6</span></a><span data-dcnode-id="3187" instrument_node="">) enhances the removal efficiency of indoor pollutants, as the adsorbent retains the pollutant from the gas stream, and partially avoids the early deactivation of the PCO catalyst. As an example, Shiraishi et al. (</span><a aria-label="Reference 2003" data-dcnode-id="3185" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d112910146e4468" title="Shiraishi F, Yamaguchi S, Ohbuchi Y (2003) A rapid treatment of formaldehyde in a highly tight room using a photocatalytic reactor combined with a continuous adsorption and desorption apparatus. Chem Eng Sci 58:929–934"><span data-dcnode-id="3186" instrument_node="">2003</span></a><span data-dcnode-id="3184" instrument_node="">) have used a photocatalytic reactor with an adsorption/desorption unit to treat a gas flow containing 0.6 ppmv of formaldehyde. In a further study, Shiraishi and Ishimatsu (</span><a aria-label="Reference 2009" data-dcnode-id="3182" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d112910146e4471" title="Shiraishi F, Ishimatsu T (2009) Toluene removal from indoor air using a miniaturized photocatalytic air purifier including a preceding adsorption/desorption unit. Chem Eng Sci 64:2466–2472"><span data-dcnode-id="3183" instrument_node="">2009</span></a><span data-dcnode-id="3181" instrument_node="">) have treated toluene in a similar system. They have concluded that if the desorption is carried out at high temperature, a higher amount of toluene is desorbed, and the rate of photocatalytic decomposition increases considerably, although energy consumption significantly increases, too.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3150" data-test="figure" data-title="Fig.&nbsp;6" id="figure-6"><figure data-dcnode-id="3151"><figcaption data-dcnode-id="3177"><b class="c-article-section__figure-caption" data-dcnode-id="3178" data-test="figure-caption-text" id="Fig6"><span data-dcnode-id="3179" instrument_node="">Fig.&nbsp;6</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3162"><div class="c-article-section__figure-item" data-dcnode-id="3172"><a class="c-article-section__figure-link" data-dcnode-id="3173" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/figures/6" rel="nofollow"><picture data-dcnode-id="3174"><source data-dcnode-id="3176" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11157-015-9363-9/MediaObjects/11157_2015_9363_Fig6_HTML.gif?as=webp" type="image/webp"><img alt="figure 6" aria-describedby="Fig6" data-dcnode-id="3175" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11157-015-9363-9/MediaObjects/11157_2015_9363_Fig6_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3163" data-test="bottom-caption" id="figure-6-desc"><p data-dcnode-id="3164"><span data-dcnode-id="3171" instrument_node="">Adsorption and photocatalysis hybrid system. </span><b data-dcnode-id="3169"><span data-dcnode-id="3170" instrument_node="">a</span></b><span data-dcnode-id="3168" instrument_node=""> System configuration, </span><b data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">b</span></b><span data-dcnode-id="3165" instrument_node=""> adsorption-photocatalytic process</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3152"><a aria-label="Full size image figure 6" class="c-article__pill-button" data-dcnode-id="3153" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure6 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/figures/6" rel="nofollow"><span data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3154" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3155" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3156" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3159" instrument_node="">

</span><p data-dcnode-id="3129"><span data-dcnode-id="3148" instrument_node="">A system combining AC adsorption and PCO has also been tested by Jo and Yang (</span><a aria-label="Reference 2009" data-dcnode-id="3146" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d112910146e4502" title="Jo WK, Yang CH (2009) Granular-activated carbon adsorption followed by annular-type photocatalytic system for control of indoor aromatic compounds. Sep Purif Technol 66(3):430–442"><span data-dcnode-id="3147" instrument_node="">2009</span></a><span data-dcnode-id="3145" instrument_node="">) to treat indoor air levels of BTEX. This system renders high removal efficiencies (close to 100&nbsp;%), although high desorption temperatures (300&nbsp;°C) are required. Ao et al. (</span><a aria-label="Reference 2003" data-dcnode-id="3143" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d112910146e4505" title="Ao CH, Lee SC, Mak CL, Chan LY (2003) Photodegradation of volatile organic compounds (VOCs) and NO for indoor air purification using TiO2: promotion versus inhibition effect of NO. Appl Catal B 42:119–129"><span data-dcnode-id="3144" instrument_node="">2003</span></a><span data-dcnode-id="3142" instrument_node="">) have sought to improve the photodegradation efficiency of BTEX under high humidity by combining the action of PCO and adsorption. The performance of a TiO</span><sub data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">2</span></sub><span data-dcnode-id="3139" instrument_node=""> filter and a TiO</span><sub data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">2</span></sub><span data-dcnode-id="3136" instrument_node="">/AC filter has been evaluated by Ao and Lee (</span><a aria-label="Reference 2005" data-dcnode-id="3134" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d112910146e4512" title="Ao CH, Lee SC (2005) Indoor air purification by photocatalyst TiO2 immobilized on an activated carbon filter installed in an air cleaner. Chem Eng Sci 60:103–109"><span data-dcnode-id="3135" instrument_node="">2005</span></a><span data-dcnode-id="3133" instrument_node="">) during the decomposition of toluene at very low concentrations (2.15 ppmv). The authors have concluded that the use of TiO</span><sub data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">2</span></sub><span data-dcnode-id="3130" instrument_node="">/AC not only increases the toluene pollutant removal efficiency (from 50 to 89.5&nbsp;%), but also reduces the amount of intermediate compounds released from the system.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3127" id="Sec21"><span data-dcnode-id="3128" instrument_node="">Hybrid ozonation systems</span></h3><p data-dcnode-id="3116"><span data-dcnode-id="3126" instrument_node="">Ozonation may be combined with other techniques to potentiate the ozone´s properties (Fig.&nbsp;</span><a data-dcnode-id="3124" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="3125" instrument_node="">7</span></a><span data-dcnode-id="3123" instrument_node="">). Many zeolites or related porous materials may act as a catalyst to accelerate the oxidising activity, and so when ozone is coupled with a suitable adsorbent (Fig.&nbsp;</span><a data-dcnode-id="3121" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="3122" instrument_node="">7</span></a><span data-dcnode-id="3120" instrument_node="">a), the overall conversion efficiency of the catalytic reaction may be increased, even at room temperature, while keeping the residual ozone level low. In addition, energy consumption may be minimized, as frequent regeneration and an intensive energy supply are not required. Kwong et al. (</span><a aria-label="Reference 2008" data-dcnode-id="3118" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d112910146e4532" title="Kwong CW, Chao CYH, Hui KS, Wan MP (2008) Removal of VOCs from indoor environment by ozonation over different porous materials. Atmos Environ 42:2300–2311"><span data-dcnode-id="3119" instrument_node="">2008</span></a><span data-dcnode-id="3117" instrument_node="">) have used ozonation with zeolites to remove toluene from indoor air at a concentration of 1.5 ppmv. About 90&nbsp;% of the toluene is removed, and over 98&nbsp;% of the ozone produced is consumed.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3083" data-test="figure" data-title="Fig.&nbsp;7" id="figure-7"><figure data-dcnode-id="3084"><figcaption data-dcnode-id="3113"><b class="c-article-section__figure-caption" data-dcnode-id="3114" data-test="figure-caption-text" id="Fig7"><span data-dcnode-id="3115" instrument_node="">Fig.&nbsp;7</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3095"><div class="c-article-section__figure-item" data-dcnode-id="3108"><a class="c-article-section__figure-link" data-dcnode-id="3109" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/figures/7" rel="nofollow"><picture data-dcnode-id="3110"><source data-dcnode-id="3112" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11157-015-9363-9/MediaObjects/11157_2015_9363_Fig7_HTML.gif?as=webp" type="image/webp"><img alt="figure 7" aria-describedby="Fig7" data-dcnode-id="3111" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11157-015-9363-9/MediaObjects/11157_2015_9363_Fig7_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3096" data-test="bottom-caption" id="figure-7-desc"><p data-dcnode-id="3097"><span data-dcnode-id="3107" instrument_node="">Different configurations of hybrid ozonation systems. </span><b data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">a</span></b><span data-dcnode-id="3104" instrument_node=""> Ozone&nbsp;+&nbsp;adsorption column, </span><b data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">b</span></b><span data-dcnode-id="3101" instrument_node=""> Ozone&nbsp;+&nbsp;BF, </span><b data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">c</span></b><span data-dcnode-id="3098" instrument_node=""> ozone&nbsp;+&nbsp;membrane bioreactor</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3085"><a aria-label="Full size image figure 7" class="c-article__pill-button" data-dcnode-id="3086" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure7 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/figures/7" rel="nofollow"><span data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3087" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3088" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3089" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3092" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3091" fill-rule="evenodd"></path><span data-dcnode-id="3090" instrument_node="">

</span><p data-dcnode-id="3074"><span data-dcnode-id="3081" instrument_node="">Maldonado-Díaz and Arriaga (</span><a aria-label="Reference 2014" data-dcnode-id="3079" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d112910146e4566" title="Maldonado-Díaz G, Arriaga S (2014) Biofiltration of high formaldehyde loads with ozone additions in long-term operation. Appl Microbiol Biotechnol. doi:
                    10.1007/s00253-014-5848-7
                    
                  
                        "><span data-dcnode-id="3080" instrument_node="">2014</span></a><span data-dcnode-id="3078" instrument_node="">) have continuously fed ozone into a biofilter (Fig.&nbsp;</span><a data-dcnode-id="3076" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="3077" instrument_node="">7</span></a><span data-dcnode-id="3075" instrument_node="">b), and as a result, they have recorded an improvement in the formaldehyde removal efficiency of up to 98&nbsp;%, as well as longer operating periods. These authors have found that ozone is responsible for effectively maintaining an optimal pH-range in the biofilter between 7.5 and 8.2, due to the carbonate species generated during the reactions between ozone and formaldehyde and its by-products. These authors have also reported that ozone addition decreases the content of exopolymeric substances (EPS) in the biofilm and biofilm thickness without modifying cell viability.</span></p><p data-dcnode-id="3060"><span data-dcnode-id="3073" instrument_node="">Conversely, Wang et al. (</span><a aria-label="Reference 2013" data-dcnode-id="3071" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR120" id="ref-link-section-d112910146e4575" title="Wang Z, Xiu G, Qiao T, Zhao K, Zhang D (2013) Coupling ozone and hollow fibers membrane bioreactor for enhanced treatment of gaseous xylene mixture. Bioresour Technol 130:52–58"><span data-dcnode-id="3072" instrument_node="">2013</span></a><span data-dcnode-id="3070" instrument_node="">) have used ozonation before a membrane bioreactor (MBR) previously inoculated with activated sludge to biodegrade xylene (Fig.&nbsp;</span><a data-dcnode-id="3068" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="3069" instrument_node="">7</span></a><span data-dcnode-id="3067" instrument_node="">c). The coupled system has a higher performance and stability for long-term operation than the single MBR system, which is explained by the biomass accumulation control promoted by the ozone. Likewise, Gu et al. (</span><a aria-label="Reference 2013" data-dcnode-id="3065" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d112910146e4581" title="Gu F, Xi J, Hu HY, Tang H (2013) A new biomass control method by continuous ozone injection in biofilters treating toluene. In: Proceedings of the 5th IWA odours and air emissions conference jointly held with 10th conference on biofiltration for air pollution control, 4–7 March 2013, San Francisco, CA, EU"><span data-dcnode-id="3066" instrument_node="">2013</span></a><span data-dcnode-id="3064" instrument_node="">) have used continuous ozone injections to improve toluene removal efficiency by biofiltration (Fig.&nbsp;</span><a data-dcnode-id="3062" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="3063" instrument_node="">7</span></a><span data-dcnode-id="3061" instrument_node="">b). This configuration has rendered good results in increasing toluene mineralization, in controlling the excessive accumulation of biomass on the packing material and, therefore, in controlling pressure drop increase.</span></p></div></div></section><section data-dcnode-id="3050" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="3051" id="Sec22-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3055" id="Sec22"><span data-dcnode-id="3056" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="3052" id="Sec22-content"><p data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">The number and type of chemical compounds identified and quantified indoors are continuously increasing, and the diversity in their physico-chemical properties makes their joint effective treatment difficult. Amongst commercialized treatment technologies, mechanical filtration is only effective for removing suspended particles, and it generates spent filters that are a new source of contamination. Electronic filtration is also effective for particle removal, although it can generate hazardous charged particles and new pollutants. With regard to adsorption systems, both high relative humidity and pollutant load variations compromise adsorption efficiency. The use of indoor ozone generators as air purifiers does not guarantee the efficient removal of many indoor chemical pollutants, and exposure to high levels of ozone can have a negative impact on occupants´ health. The application of UV photolysis is limited because of its tendency to produce ozone and radicals with harmful effects. Photocatalytic oxidation for indoor air treatment has been applied for contaminant degradation at ppmv levels, while ppbv concentrations have to be measured in indoor air, and their main drawbacks are the short lifetime of the catalyst and the generation of harmful by-products. Cold or non-thermal plasma and membrane separation are other standalone systems that are not yet on the market. Biological treatment systems such as biofiltration and botanical purification are other alternatives under development. In order to overcome many of these drawbacks, several of the aforementioned single technologies have been combined in double-treatment hybrid systems, such as the plasma&nbsp;+&nbsp;catalytic hybrid system, adsorption&nbsp;+&nbsp;photocatalysis hybrid system, and biological process&nbsp;+&nbsp;photocatalytic oxidation hybrid system. In this last proposal, the photocatalytic oxidation system can be combined with a BTF, with the latter being either a pre-oxidation or a post-oxidation step. Although hybrid technologies are not yet commercialized and further research is required, these systems might be the best abatement option to treat the variety of indoor pollutants in the next future.</span></p></div></div></section><span data-dcnode-id="3049" instrument_node="">
