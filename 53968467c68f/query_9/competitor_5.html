</span><meta content="Indoor air pollution is a complex issue involving a wide diversity and variability of pollutants that threats human health. In this context, major efforts should be made to enhance indoor air quality. Thus, it is important to start by the control of indoor pollution sources. Nevertheless, when the suppression or minimization of emission sources is insufficient, technically unfeasible, or economically unviable, abatement technologies have to be used. This review presents a general overview of single treatment techniques such as mechanical and electrical filtration, adsorption, ozonation, photolysis, photocatalytic oxidation, biological processes, and membrane separation. Since there is currently no technology that can be considered fully satisfactory for achieving “cleaner” indoor air, special attention is paid to combined purification technologies or innovative alternatives that are currently under research and have not yet been commercialized (plasma-catalytic hybrid systems, hybrid ozonation systems, biofilter-adsorption systems, etc.). These systems seem to be a good opportunity as they integrate synergetic advantages to achieve good indoor air quality." data-dcnode-id="5385" name="dc.description"><span data-dcnode-id="5384" instrument_node="">

</span><meta content="Indoor air pollution is a complex issue involving a wide diversity and variability of pollutants that threats human health. In this context, major efforts should be made to enhance indoor air quality. Thus, it is important to start by the control of indoor pollution sources. Nevertheless, when the suppression or minimization of emission sources is insufficient, technically unfeasible, or economically unviable, abatement technologies have to be used. This review presents a general overview of single treatment techniques such as mechanical and electrical filtration, adsorption, ozonation, photolysis, photocatalytic oxidation, biological processes, and membrane separation. Since there is currently no technology that can be considered fully satisfactory for achieving “cleaner” indoor air, special attention is paid to combined purification technologies or innovative alternatives that are currently under research and have not yet been commercialized (plasma-catalytic hybrid systems, hybrid ozonation systems, biofilter-adsorption systems, etc.). These systems seem to be a good opportunity as they integrate synergetic advantages to achieve good indoor air quality." data-dcnode-id="4983" property="og:description"><span data-dcnode-id="4982" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1638" data-track-component="article body"><span data-dcnode-id="4507" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="4500" data-gtm-vis-first-on-screen-50443292_562="1520" data-gtm-vis-first-on-screen-50443292_563="1547" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1520" data-gtm-vis-recent-on-screen-50443292_563="1547" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4501" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4505" id="Abs1"><span data-dcnode-id="4506" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4502" id="Abs1-content"><p data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">Indoor air pollution is a complex issue involving a wide diversity and variability of pollutants that threats human health. In this context, major efforts should be made to enhance indoor air quality. Thus, it is important to start by the control of indoor pollution sources. Nevertheless, when the suppression or minimization of emission sources is insufficient, technically unfeasible, or economically unviable, abatement technologies have to be used. This review presents a general overview of single treatment techniques such as mechanical and electrical filtration, adsorption, ozonation, photolysis, photocatalytic oxidation, biological processes, and membrane separation. Since there is currently no technology that can be considered fully satisfactory for achieving “cleaner” indoor air, special attention is paid to combined purification technologies or innovative alternatives that are currently under research and have not yet been commercialized (plasma-catalytic hybrid systems, hybrid ozonation systems, biofilter-adsorption systems, etc.). These systems seem to be a good opportunity as they integrate synergetic advantages to achieve good indoor air quality.</span></p></div></div></section><span data-dcnode-id="4499" instrument_node="">
</span><section data-dcnode-id="4327" data-gtm-vis-first-on-screen-50443292_562="1520" data-gtm-vis-first-on-screen-50443292_563="1547" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1520" data-gtm-vis-recent-on-screen-50443292_563="1547" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="4328" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4497" id="Sec1"><span data-dcnode-id="4498" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="4329" id="Sec1-content"><p data-dcnode-id="4486"><span data-dcnode-id="4496" instrument_node="">People’s lifestyles have changed dramatically over the past 40&nbsp;years, particularly in the industrialized nations. Increasing urbanization, technological development and specialized occupational activities are responsible for the long time people spend indoors (i.e., in offices, public transportation facilities, schools and shopping centres). Indoor air quality (IAQ) has therefore become an issue of great concern, as the prevalence of sick building syndrome (SBS), building related illness (BRI), and multiple chemical sensitivity (MCS) has been reported in recent decades (Lan et al. </span><a aria-label="Reference 2011" data-dcnode-id="4494" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d112910146e365" title="Lan L, Wargocki P, Wyon DP, Lian Z (2011) Effects of thermal discomfort in an office on perceived air quality, SBS symptoms, physiological responses, and human performance. Indoor Air 21:376–390"><span data-dcnode-id="4495" instrument_node="">2011</span></a><span data-dcnode-id="4493" instrument_node="">; Mallawaarachchi and De Silva </span><a aria-label="Reference 2012" data-dcnode-id="4491" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d112910146e368" title="Mallawaarachchi H, De Silva L (2012) Green framework to improve indoor air quality in buildings: reducing the impact of sick building syndrome on office workers in Sri Lanka: a literature review. In: International conference on sustainable built environment, 14–16 Dec 2012, Sri Lanka"><span data-dcnode-id="4492" instrument_node="">2012</span></a><span data-dcnode-id="4490" instrument_node="">). In addition, the World Health Organization (WHO) recently reported that air pollution caused around seven million premature deaths in 2012, of which 4.3 million were related to indoor air pollution (WHO </span><a aria-label="Reference 2014" data-dcnode-id="4488" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR131" id="ref-link-section-d112910146e371" title="World Health Organization (WHO) (2014) Public health, environmental and social determinants of health (PHE), Geneva. 
                    http://www.who.int/phe/health_topics/outdoorair/databases
                    
                  
                        "><span data-dcnode-id="4489" instrument_node="">2014</span></a><span data-dcnode-id="4487" instrument_node="">).</span></p><p data-dcnode-id="4472"><span data-dcnode-id="4485" instrument_node="">Any improvement in IAQ has been shown to directly benefit health and productivity, with the associated economic benefits. About 235 million people suffer from asthma in the world, and the socioeconomic cost attributable to indoor air pollutants in France alone is estimated at 20 billion euro per year (WHO </span><a aria-label="Reference 2013" data-dcnode-id="4483" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d112910146e377" title="World Health Organization (WHO) (2013) Asthma. Media Center. Fact Sheet No. 30. 
                    http://www.who.int/mediacentre/factsheets/fs307/en/
                    
                  
                        "><span data-dcnode-id="4484" instrument_node="">2013</span></a><span data-dcnode-id="4482" instrument_node="">; ANSES </span><a aria-label="Reference 2014a" data-dcnode-id="4480" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d112910146e380" title="ANSES: French Agency for Food, Environmental and Occupational Health &amp; Safety (2014a) Etude exploratoire du coût socio-économique des polluants de l’air intérieur. Rapport d’étude. 
                    http://www.anses.fr/en/documents/AUT-Ra-CoutAirInterieurSHS2014.pdf
                    
                  . Accessed 26 June 2014"><span data-dcnode-id="4481" instrument_node="">2014a</span></a><span data-dcnode-id="4479" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="4477" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d112910146e383" title="ANSES: French Agency for Food, Environmental and Occupational Health &amp; Safety (2014b) Valeurs guides de qualité d’air intérieur. 
                    https://www.anses.fr/fr/content/valeurs-guides-de-qualit%C3%A9-d%E2%80%99air-int%C3%A9rieur-vgai
                    
                  . Accessed 22 Dec 2014"><span data-dcnode-id="4478" instrument_node="">b</span></a><span data-dcnode-id="4476" instrument_node="">). Fisk et al. (</span><a aria-label="Reference 2011" data-dcnode-id="4474" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d112910146e386" title="Fisk WJ, Black P, Brunner G (2011) Benefits and costs of improved IEQ in U.S. offices. Indoor Air 21:357–367"><span data-dcnode-id="4475" instrument_node="">2011</span></a><span data-dcnode-id="4473" instrument_node="">) have also estimated the economic benefits of implementing scenarios for improving indoor environmental quality in the USA. These benefits are calculated to amount to approximately US$ 20 billion. Although these quantitative estimates are difficult to confirm with any certainty, the opportunity for substantial benefits is clear.</span></p><p data-dcnode-id="4449"><span data-dcnode-id="4471" instrument_node="">Regarding the regulation of IAQ in recent years, WHO singled out IAQ as one of its concerns in public health in 1979, and in 2010 specific indoor air quality guidelines were published by this organization (WHO </span><a aria-label="Reference 2010" data-dcnode-id="4469" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR129" id="ref-link-section-d112910146e392" title="World Health Organization (WHO) (2010) WHO guidelines for indoor air quality: selected pollutants. World Health Organization Regional Office for Europe, Copenhagen. 
                    http://www.euro.who.int/document/e71922.pdf
                    
                  
                        "><span data-dcnode-id="4470" instrument_node="">2010</span></a><span data-dcnode-id="4468" instrument_node="">). Other organizations in several countries have also adopted guidelines for certain priority indoor air pollutants that represent a risk for human health; some guidelines are listed in Table&nbsp;</span><a data-dcnode-id="4466" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="4467" instrument_node="">1</span></a><span data-dcnode-id="4465" instrument_node="">. In France, new regulations have been established concerning IAQ in public buildings. French Decree No. 2011-1727 establishes concentration values for formaldehyde and benzene. As far as formaldehyde is concerned, limit concentrations of 30 and 10&nbsp;μg/m</span><sup data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">3</span></sup><span data-dcnode-id="4462" instrument_node=""> are to be introduced in 2015 and 2022, respectively. The limit concentration for benzene in 2016 will be 2&nbsp;μg/m</span><sup data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">3</span></sup><span data-dcnode-id="4459" instrument_node=""> (the current limit is 5&nbsp;μg/m</span><sup data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node="">3</span></sup><span data-dcnode-id="4456" instrument_node="">) (Ministry of the Ecology, Suitable Development, Transport and Accommodation in France </span><a aria-label="Reference 2011a" data-dcnode-id="4454" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d112910146e405" title="Ministry of the Ecology, Suitable Development, Transport and Accommodation in France (2011a) Decrees No. 2011-1727 dated the 2nd of December 2011. 
                    http://www.legifrance.gouv.fr/affichTexte.do?cidTexte=JORFTEXT000024909119&amp;dateTexte=&amp;categorieLien=id
                    
                  . Accessed 24 June 2014"><span data-dcnode-id="4455" instrument_node="">2011a</span></a><span data-dcnode-id="4453" instrument_node="">). Concomitantly, French Decree No. 2011-1728 imposes the obligation to measure periodically those concentrations in public building. IAQ control in public buildings receiving children under the age of six will be compulsory as of 2015, followed in 2018 by primary schools, by high schools and leisure centres in 2020, and by other public buildings in 2023 (Ministry of the Ecology, Suitable Development, Transport and Accommodation in France </span><a aria-label="Reference 2011b" data-dcnode-id="4451" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d112910146e408" title="Ministry of the Ecology, Suitable Development, Transport and Accommodation in France (2011b) Decrees No. 2011-1728 dated the 2nd of December 2011. 
                    http://www.legifrance.gouv.fr/affichTexte.do?cidTexte=JORFTEXT000024909128&amp;categorieLien=id
                    
                  . Accessed 24 June 2014"><span data-dcnode-id="4452" instrument_node="">2011b</span></a><span data-dcnode-id="4450" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4434" data-test="inline-table" id="table-1"><figure data-dcnode-id="4435"><figcaption class="c-article-table__figcaption" data-dcnode-id="4446"><b data-dcnode-id="4447" data-test="table-caption" id="Tab1"><span data-dcnode-id="4448" instrument_node="">Table&nbsp;1 Indoor air quality guidelines in different countries</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4436"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="4437" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/tables/1" rel="nofollow"><span data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4438" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4439" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4440" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4443" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4442" fill-rule="evenodd"></path><span data-dcnode-id="4441" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4433" instrument_node="">
</span><p data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">Indoor air pollution (IAP) basically refers to a variety of chemical, biological and physical agents that pose a health threat or cause discomfort. In general terms, IAP can be classified as follows:</span></p><ul class="u-list-style-bullet" data-dcnode-id="4333"><span data-dcnode-id="4430" instrument_node="">
</span><li data-dcnode-id="4380"><span data-dcnode-id="4429" instrument_node="">
</span><p data-dcnode-id="4400"><span data-dcnode-id="4428" instrument_node="">
</span><i data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">Pollution by particulate matter</span></i><span data-dcnode-id="4425" instrument_node=""> (</span><i data-dcnode-id="4423"><span data-dcnode-id="4424" instrument_node="">PM</span></i><span data-dcnode-id="4422" instrument_node="">) Particulate matter refers to a wide range of particles (solid or even liquid) that are small enough to be airborne, and therefore inhaled by people. The particles vary considerably in size, but the smaller particles pose the highest health threat because they can travel deepest into the lungs. Ultra-fine particles with a diameter between 5.6 and 560&nbsp;nm are usual in indoor air, although the amount of particles of 10 or 2.5&nbsp;μm or less in diameter (PM</span><sub data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node="">10</span></sub><span data-dcnode-id="4419" instrument_node=""> and PM</span><sub data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">2.5</span></sub><span data-dcnode-id="4416" instrument_node="">, respectively) is more frequently measured. There are very few studies on the health effects of indoor PM</span><sub data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">10</span></sub><span data-dcnode-id="4413" instrument_node=""> and PM</span><sub data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">2.5</span></sub><span data-dcnode-id="4410" instrument_node="">, in comparison to the higher amount of studies on outdoor particles, but those available link PM to respiratory complaints (Weichenthal et al. </span><a aria-label="Reference 2007" data-dcnode-id="4408" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR123" id="ref-link-section-d112910146e1488" title="Weichenthal S, Dufresne A, Infante-Rivard C (2007) Indoor ultrafine particles and childhood asthma exploring a potential public health concern. Indoor Air 17(2):81–91"><span data-dcnode-id="4409" instrument_node="">2007</span></a><span data-dcnode-id="4407" instrument_node="">; Lin et al. </span><a aria-label="Reference 2011" data-dcnode-id="4405" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d112910146e1491" title="Lin LY, Chen HW, Su TL, Hong GB, Huang LC, Chuang KJ (2011) The effects of indoor particle exposure on blood pressure and heart rate among young adults: an air filtration-based intervention study. Atmos Environ 45(31):5540–5544"><span data-dcnode-id="4406" instrument_node="">2011</span></a><span data-dcnode-id="4404" instrument_node="">; Taner et al. </span><a aria-label="Reference 2013" data-dcnode-id="4402" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d112910146e1494" title="Taner S, Pekey B, Pekey H (2013) Fine particulate matter in the indoor air of barbeque restaurants: elemental compositions, sources and health risks. Sci Total Environ 454–455:79–87"><span data-dcnode-id="4403" instrument_node="">2013</span></a><span data-dcnode-id="4401" instrument_node="">).</span></p><span data-dcnode-id="4399" instrument_node="">
</span><p data-dcnode-id="4382"><span data-dcnode-id="4398" instrument_node="">The most notorious pollutant within this family is asbestos, which has been used on a large scale in a number of materials for construction. All forms of asbestos (chrysotile, crocidolite, amosite, tremolite, actinolite, and anthophyllite) have been found to cause mesothelioma and cancer of the lung, larynx, and ovary (International Agency for Research on Cancer </span><a aria-label="Reference 2012" data-dcnode-id="4396" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d112910146e1500" title="International Agency for Research on Cancer (2012) Asbestos (chrysotile, amosite, crocidolite, tremolite, actinolite, and anthophyllite). IARC Monogr Eval Carcinog Risks Hum 100C:219–309. 
                    http://monographs.iarc.fr/ENG/Monographs/vol100C/mono100C-11.pdf
                    
                  . Accessed 24 Jan 2015"><span data-dcnode-id="4397" instrument_node="">2012</span></a><span data-dcnode-id="4395" instrument_node="">). The WHO stated that at least 107,000 people die each year globally due to asbestos-related diseases. Therefore, many countries have already taken action to prohibit the use of all forms of asbestos, and other countries have imposed strict regulations to limit exposure (WHO </span><a aria-label="Reference 2014" data-dcnode-id="4393" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR131" id="ref-link-section-d112910146e1503" title="World Health Organization (WHO) (2014) Public health, environmental and social determinants of health (PHE), Geneva. 
                    http://www.who.int/phe/health_topics/outdoorair/databases
                    
                  
                        "><span data-dcnode-id="4394" instrument_node="">2014</span></a><span data-dcnode-id="4392" instrument_node="">). In France, a complete ban on asbestos was adopted since 1997, and at the European level, all extraction, manufacturing, and processing of asbestos fibres was prohibited in 1999 by Directive 99/77/EC (ANSES </span><a aria-label="Reference 2013" data-dcnode-id="4390" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d112910146e1506" title="ANSES: French Agency for Food, Environmental and Occupational Health &amp; Safety (2013) Asbestos: presentation, health effects, exposure and regulatory framework. 
                    https://www.anses.fr/en/content/asbestos
                    
                  . Accessed 28 Jan 2015"><span data-dcnode-id="4391" instrument_node="">2013</span></a><span data-dcnode-id="4389" instrument_node="">). The Australian government published a guide for householders and the general public to safely manage the risks arising from any occasional encounters with asbestos indoors or around their homes (Environment Health Standing Committee </span><a aria-label="Reference 2013" data-dcnode-id="4387" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d112910146e1509" title="Environment Health Standing Committee (enHealth) (2013) Asbestos: a guide for householders and the general public. Australian Health Protection Principal Committee, Canberra. 
                    http://www.health.gov.au/internet/publications/publishing.nsf/Content/asbestos-toc
                    
                  . Accessed 12 Jan 2015"><span data-dcnode-id="4388" instrument_node="">2013</span></a><span data-dcnode-id="4386" instrument_node="">) and the US Environmental Protection Agency (EPA) provides a listing of the laws and regulations governing asbestos (US EPA </span><a aria-label="Reference 2014" data-dcnode-id="4384" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR111" id="ref-link-section-d112910146e1512" title="U.S. Environmental Protection Agency (EPA) (2014) Asbestos laws and regulations. 
                    http://www2.epa.gov/asbestos/asbestos-laws-and-regulations
                    
                  . Accessed on 20 Jan 2015"><span data-dcnode-id="4385" instrument_node="">2014</span></a><span data-dcnode-id="4383" instrument_node="">).</span></p><span data-dcnode-id="4381" instrument_node="">
</span></li><span data-dcnode-id="4379" instrument_node="">
</span><li data-dcnode-id="4362"><span data-dcnode-id="4378" instrument_node="">
</span><p data-dcnode-id="4364"><span data-dcnode-id="4377" instrument_node="">
</span><i data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">Biological pollution</span></i><span data-dcnode-id="4374" instrument_node=""> It is essentially composed of animal allergens (dust mites and certain proteins contained in excrement and hair), bacteria, mould, fungi, spores, endotoxins, mycotoxins, and all kinds of living organisms with highly variable and complex characteristics. Recent studies have found a close relationship between these bioaerosols and more serious episodes of asthma, rhinitis and conjunctivitis (Casset and Braun </span><a aria-label="Reference 2010" data-dcnode-id="4372" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d112910146e1524" title="Casset A, Braun JJ (2010) Relationships between indoor allergens, sensitization, and allergic asthma and rhinitis symptoms. Rev Mal Respir 27(8):913–920"><span data-dcnode-id="4373" instrument_node="">2010</span></a><span data-dcnode-id="4371" instrument_node="">). In fact, aerosols are responsible for about 5–34&nbsp;% of all indoor pollution, and their abundance depends on indoor moisture and temperature conditions (Srikanth et al. </span><a aria-label="Reference 2008" data-dcnode-id="4369" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d112910146e1527" title="Srikanth P, Sudharsanam S, Steinberg R (2008) Bioaerosols in indoor environment: composition, health effects and analysis. Indian J Med Microbiol 26:302–312"><span data-dcnode-id="4370" instrument_node="">2008</span></a><span data-dcnode-id="4368" instrument_node="">; Nazaroff </span><a aria-label="Reference 2013" data-dcnode-id="4366" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d112910146e1530" title="Nazaroff WW (2013) Editorial. Four principles for achieving good indoor air quality. Indoor Air 23:353–356"><span data-dcnode-id="4367" instrument_node="">2013</span></a><span data-dcnode-id="4365" instrument_node="">).</span></p><span data-dcnode-id="4363" instrument_node="">
</span></li><span data-dcnode-id="4361" instrument_node="">
</span><li data-dcnode-id="4347"><span data-dcnode-id="4360" instrument_node="">
</span><p data-dcnode-id="4355"><span data-dcnode-id="4359" instrument_node="">
</span><i data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">Physical pollution</span></i><span data-dcnode-id="4356" instrument_node=""> Although several physical agents may be mentioned in this section, only temperature and electromagnetic fields (EMFs) will be addressed in detail. Air temperature has a significant impact on comfort, and thus on the perception of indoor air quality. Besides the discomfort they cause, high temperature and excessive humidity promote the spread of microorganisms (responsible for the aforementioned biological pollution), and may also favour secondary chemical reactions among the chemical compounds present in indoor air.</span></p><span data-dcnode-id="4354" instrument_node="">
</span><p data-dcnode-id="4349"><span data-dcnode-id="4353" instrument_node="">As far as EMFs are concerned, they are generated when charged particles are accelerated by alternating current in electrical conductors. There are two main forms of EMFs: radiofrequency (RF)-EMFs, which are produced by mobile phones and other communication devices, and extremely low-frequency (ELF)-EMFs, which are produced by power lines and many domestic appliances. As yet, no link has been found between health issues and electromagnetic pollution, but some agencies, such as “The Architectural and Transportation Barriers Compliance Board” in the USA, have reported an increasing number of complaints from people who suffer adverse effects derived from electromagnetic radiation (Kubba </span><a aria-label="Reference 2010" data-dcnode-id="4351" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d112910146e1545" title="Kubba S (2010) LEED practices, certification and accreditation handbook. Chap 7: Indoor environmental quality. Butterworth-Heinemann/Elsevier, Burlington, MA, pp 211–269"><span data-dcnode-id="4352" instrument_node="">2010</span></a><span data-dcnode-id="4350" instrument_node="">).</span></p><span data-dcnode-id="4348" instrument_node="">
</span></li><span data-dcnode-id="4346" instrument_node="">
</span><li data-dcnode-id="4335"><span data-dcnode-id="4345" instrument_node="">
</span><p data-dcnode-id="4337"><span data-dcnode-id="4344" instrument_node="">
</span><i data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">Chemical pollution</span></i><span data-dcnode-id="4341" instrument_node=""> This group comprises all the chemical compounds that can be found in indoor air. Over 400 different compounds have been identified, with very wide variations in both concentration and properties (Gale et al. </span><a aria-label="Reference 2009" data-dcnode-id="4339" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d112910146e1557" title="Gale RW, Cranor WL, Alvarez DA, Huckins JN, Petty JD (2009) Semivolatile organic compounds in residential air along the Arizona–Mexico border. Environ Sci Technol 43(9):3054–3060"><span data-dcnode-id="4340" instrument_node="">2009</span></a><span data-dcnode-id="4338" instrument_node="">).</span></p><span data-dcnode-id="4336" instrument_node="">
</span></li><span data-dcnode-id="4334" instrument_node="">
</span></ul><span data-dcnode-id="4332" instrument_node="">
</span><p data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">This article presents a review of the state-of-the-art in the study of indoor chemical pollution and technological alternatives for its effective treatment. Special attention is paid to the research on combined systems, as they seem to be a promising alternative for improving indoor air quality.</span></p></div></div></section><section data-dcnode-id="4252" data-gtm-vis-first-on-screen-50443292_562="1547" data-gtm-vis-first-on-screen-50443292_563="1547" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1547" data-gtm-vis-recent-on-screen-50443292_563="1547" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Indoor pollution sources"><div class="c-article-section" data-dcnode-id="4253" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4325" id="Sec2"><span data-dcnode-id="4326" instrument_node="">Indoor pollution sources</span></h2><div class="c-article-section__content" data-dcnode-id="4254" id="Sec2-content"><p data-dcnode-id="4320"><span data-dcnode-id="4324" instrument_node="">The pollutants that indoor occupants are exposed to today are substantially different from those they experienced 40&nbsp;years ago because pollution sources have dramatically changed (Weschler </span><a aria-label="Reference 2009" data-dcnode-id="4322" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d112910146e1574" title="Weschler CJ (2009) Changes in indoor pollutants since the 1950s. Atmos Environ 43:153–169"><span data-dcnode-id="4323" instrument_node="">2009</span></a><span data-dcnode-id="4321" instrument_node="">). Old construction materials considered to be “inert” have now been replaced by complex new materials such as polymers, chemically treated materials, and technologically developed paints, amongst others. Today, another feature of this pollution is related to the development of new building techniques and designs devoted to effective energy saving. Airtight or sealed constructions and an inappropriate ventilation rate in these new buildings are singled out as being responsible for the deterioration in indoor air quality.</span></p><p data-dcnode-id="4312"><span data-dcnode-id="4319" instrument_node="">Many studies reveal that building materials and human indoor activities are major sources of indoor pollution (Fromme et al. </span><a aria-label="Reference 2013" data-dcnode-id="4317" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d112910146e1580" title="Fromme H, Nitschke L, Boehmer S, Kiranoglu M, Göen T (2013) Exposure of German residents to ethylene and propylene glycol ethers in general and after cleaning scenarios. Chemosphere 90:2714–2721"><span data-dcnode-id="4318" instrument_node="">2013</span></a><span data-dcnode-id="4316" instrument_node="">; Gunschera et al. </span><a aria-label="Reference 2013" data-dcnode-id="4314" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d112910146e1583" title="Gunschera J, Mentese S, Salthammer T, Andersen JR (2013) Impact of building materials on indoor formaldehyde levels: effect of ceiling tiles, mineral fiber insulation and gypsum board. Build Environ 64:138–145"><span data-dcnode-id="4315" instrument_node="">2013</span></a><span data-dcnode-id="4313" instrument_node="">). The sources of chemical pollution can be grouped into three categories:</span></p><ul class="u-list-style-bullet" data-dcnode-id="4256"><span data-dcnode-id="4311" instrument_node="">
</span><li data-dcnode-id="4300"><span data-dcnode-id="4310" instrument_node="">
</span><p data-dcnode-id="4302"><span data-dcnode-id="4309" instrument_node="">
</span><i data-dcnode-id="4307"><span data-dcnode-id="4308" instrument_node="">Endogenous sources</span></i><span data-dcnode-id="4306" instrument_node=""> two endogenous sources may be mentioned: permanent sources and occasional sources. Regarding permanent sources, these include emissions from building materials, hardwood, plywood, laminated materials, insulators, adhesives, and paints and varnishes. According to some studies, approximately 40&nbsp;% of the overall air pollution inside buildings is attributed to building materials (Missia et al. </span><a aria-label="Reference 2010" data-dcnode-id="4304" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d112910146e1595" title="Missia L, Dafni A, Demetriou E, Michael N, Tolis EI, Bartzis JG (2010) Indoor exposure from building materials: a field study. Atmos Environ 44(35):4388–4395"><span data-dcnode-id="4305" instrument_node="">2010</span></a><span data-dcnode-id="4303" instrument_node="">). The occasional sources are related to human activities involving the use of different products for cleaning, disinfection, gardening, and personal care. Cooking is a major source of pollutants in dwellings and restaurants, with hospitals, public transport or offices producing their own specific pollution. Nevertheless, the impact of these sources is informed by other variables, such as standard of living, population, climate, and geographical location.</span></p><span data-dcnode-id="4301" instrument_node="">
</span></li><span data-dcnode-id="4299" instrument_node="">
</span><li data-dcnode-id="4291"><span data-dcnode-id="4298" instrument_node="">
</span><p data-dcnode-id="4293"><span data-dcnode-id="4297" instrument_node="">Human metabolism is also considered an endogenous source of contamination: isoprene and acetone are the most prominent pollutants included in the list of the 199 volatile organic compounds (VOCs) identified with reasonable certainty in human breath, with some of them being associated with diseases such as diabetes or lung cancer (De Lacy Costello et al. </span><a aria-label="Reference 2014" data-dcnode-id="4295" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d112910146e1604" title="De Lacy Costello B, Amann A, Al-Kateb H, Flynn C, Filipiak W, Khalid T, Osborne D, Ratcliffe NM (2014) A review of the volatiles from the healthy human body. J Breath Res. doi:
                    10.1088/1752-7155/8/1/014001
                    
                  
                        "><span data-dcnode-id="4296" instrument_node="">2014</span></a><span data-dcnode-id="4294" instrument_node="">).</span></p><span data-dcnode-id="4292" instrument_node="">
</span></li><span data-dcnode-id="4290" instrument_node="">
</span><li data-dcnode-id="4270"><span data-dcnode-id="4289" instrument_node="">
</span><p data-dcnode-id="4272"><span data-dcnode-id="4288" instrument_node="">
</span><i data-dcnode-id="4286"><span data-dcnode-id="4287" instrument_node="">Reaction products in an indoor environment</span></i><span data-dcnode-id="4285" instrument_node=""> In addition to the direct emission of primary pollutants from indoor sources, the formation of secondary pollutants from indoor gas-phase reactions is a very significant secondary source. The variety of chemicals in the different materials used in building and furnishing may undergo chemical reactions on the material´s surface or in the gas phase. Gaseous compounds with C=C bonds are prone to react with O</span><sub data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">3</span></sub><span data-dcnode-id="4282" instrument_node="">, NO</span><sub data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">x</span></sub><span data-dcnode-id="4279" instrument_node="">, OH radicals and other gases (Uhde and Salthammer </span><a aria-label="Reference 2007" data-dcnode-id="4277" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d112910146e1620" title="Uhde E, Salthammer T (2007) Impact of reaction products from building materials and furnishings on indoor air quality—a review of recent advances in indoor chemistry. Atmos Environ 41:3111–3128"><span data-dcnode-id="4278" instrument_node="">2007</span></a><span data-dcnode-id="4276" instrument_node="">). The ozonolysis of alkenes is reported to be a major pathway for OH formation indoors, and the photolysis of HONO makes a greater contribution to indoor OH than previously assumed (Gligorovski and Weschler </span><a aria-label="Reference 2013" data-dcnode-id="4274" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d112910146e1623" title="Gligorovski S, Weschler CJ (2013) The oxidative capacity of indoor atmospheres. Environ Sci Technol 47(24):13905–13906"><span data-dcnode-id="4275" instrument_node="">2013</span></a><span data-dcnode-id="4273" instrument_node="">). Thus, the oxidative capacity of indoor atmospheres has a significant impact on the level of indoor pollution, although further research is required on the mechanisms and products of oxidation processes.</span></p><span data-dcnode-id="4271" instrument_node="">
</span></li><span data-dcnode-id="4269" instrument_node="">
</span><li data-dcnode-id="4258"><span data-dcnode-id="4268" instrument_node="">
</span><p data-dcnode-id="4260"><span data-dcnode-id="4267" instrument_node="">
</span><i data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">Transfer from the outdoor environment</span></i><span data-dcnode-id="4264" instrument_node=""> Although sources of outdoor air pollution are both natural and anthropogenic, the most common sources derived from human activities are industry, road traffic, power stations, and the combustion of fossil fuels, such as coal, oil and gas. Regardless of their outdoor origin, several compounds such as acrolein have been found to concentrate indoors (Liu et al. </span><a aria-label="Reference 2006" data-dcnode-id="4262" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d112910146e1635" title="Liu W, Zhang J, Zhang L, Turpin BJ, Weisel CP, Morandi MT et al (2006) Estimating contributions of indoor and outdoor sources to indoor carbonyl concentrations in three urban areas of the United States. Atmos Environ 40:2202–2214"><span data-dcnode-id="4263" instrument_node="">2006</span></a><span data-dcnode-id="4261" instrument_node="">).</span></p><span data-dcnode-id="4259" instrument_node="">
</span></li><span data-dcnode-id="4257" instrument_node="">
</span></ul><span data-dcnode-id="4255" instrument_node="">
</span></div></div></section><section data-dcnode-id="4007" data-title="Chemical pollutants"><div class="c-article-section" data-dcnode-id="4008" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4250" id="Sec3"><span data-dcnode-id="4251" instrument_node="">Chemical pollutants</span></h2><div class="c-article-section__content" data-dcnode-id="4009" id="Sec3-content"><p data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">An increasing variety of chemical compounds has been found in indoor air. The main chemical pollutants detected in indoor air are as follows:</span></p><p data-dcnode-id="4225"><span data-dcnode-id="4247" instrument_node="">
</span><i data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">Carbon dioxide</span></i><span data-dcnode-id="4244" instrument_node=""> (CO</span><sub data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">2</span></sub><span data-dcnode-id="4241" instrument_node="">) is a metabolic product frequently used as an indicator of the overall level of air pollution and the need for ventilation in an occupied space. The maximum recommended occupational exposure limit is 5000 ppmv for an 8-h workday (time weighted average) (OSHA </span><a aria-label="Reference 2012" data-dcnode-id="4239" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d112910146e1656" title="OSHA (Occupational Safety and Health Administration) (2012) Sampling and analytical methods: carbon dioxide in workplace atmospheres. 
                    http://www.osha.gov/dts/sltc/methods/inorganic/id172/id172.html
                    
                  . Accessed 20 Jan 2015"><span data-dcnode-id="4240" instrument_node="">2012</span></a><span data-dcnode-id="4238" instrument_node="">). A typical indoor CO</span><sub data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">2</span></sub><span data-dcnode-id="4235" instrument_node=""> concentration range of between 350 and 2500 ppmv has been reported as safe (Sappänen et al. </span><a aria-label="Reference 1999" data-dcnode-id="4233" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR96" id="ref-link-section-d112910146e1661" title="Sappänen OA, Fisk WJ, Mendell MJ (1999) Association of ventilation rates and CO2 concentrations with health and other responses in commercial and institutional buildings. Indoor Air 9:226–252"><span data-dcnode-id="4234" instrument_node="">1999</span></a><span data-dcnode-id="4232" instrument_node="">). Nevertheless, Erdmann and Apte (</span><a aria-label="Reference 2004" data-dcnode-id="4230" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d112910146e1665" title="Erdmann CA, Apte MG (2004) Mucous membrane and lower respiratory building related symptoms in relation to indoor carbon dioxide concentrations in the 100-building BASE dataset. Indoor Air 14:127–134"><span data-dcnode-id="4231" instrument_node="">2004</span></a><span data-dcnode-id="4229" instrument_node="">) have found statistically significant associations between the mucous membrane and lower respiratory building-related symptoms, with increasing values in the difference between indoor and outdoor CO</span><sub data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">2</span></sub><span data-dcnode-id="4226" instrument_node=""> concentrations on a workday basis.</span></p><p data-dcnode-id="4202"><span data-dcnode-id="4224" instrument_node="">
</span><i data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">Inorganic gases</span></i><span data-dcnode-id="4221" instrument_node=""> are mainly represented by gaseous compounds such as carbon monoxide (CO), nitrogen oxides (NO</span><sub data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">x</span></sub><span data-dcnode-id="4218" instrument_node="">) and sulfur dioxide (SO</span><sub data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node="">2</span></sub><span data-dcnode-id="4215" instrument_node="">) whose concentrations are heavily influenced by outdoor levels (Weschler </span><a aria-label="Reference 2009" data-dcnode-id="4213" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d112910146e1680" title="Weschler CJ (2009) Changes in indoor pollutants since the 1950s. Atmos Environ 43:153–169"><span data-dcnode-id="4214" instrument_node="">2009</span></a><span data-dcnode-id="4212" instrument_node="">). Nevertheless, combustion appliances, tobacco smoke and the burning of incense can increase indoor levels. In Canada, CO levels as high as 115&nbsp;mg/m</span><sup data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">3</span></sup><span data-dcnode-id="4209" instrument_node=""> have been found in some domestic kitchens immediately after cooking with an unvented gas stove (Alberta Health </span><a aria-label="Reference 2012" data-dcnode-id="4207" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d112910146e1686" title="Alberta Health (2012) Environmental public health indoor air quality manual. A guide for environmental public health professionals. Government of Alberta. 
                    http://www.health.alberta.ca/documents/Indoor-Air-Quality-Manual-2012.pdf
                    
                  . Accessed 5 Jan 2015"><span data-dcnode-id="4208" instrument_node="">2012</span></a><span data-dcnode-id="4206" instrument_node="">). The health effects associated with inhaled CO vary with its concentration and exposure. At low levels (120–520 ppmv), CO has minor effects that are often confused with a cold. These symptoms include headache, dizziness, disorientation, nausea, and tiredness (Kotzias et al. </span><a aria-label="Reference 2005" data-dcnode-id="4204" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d112910146e1689" title="Kotzias D, Koistinen K, Kephalopulos S, Schlitt C, Carrer P, Maroni M et al (2005) The INDEX project—critical appraisal of the setting and implementation of indoor exposure limits in the EU. Report. European Commission—Joint Research Centre, Ispra, pp 51–74"><span data-dcnode-id="4205" instrument_node="">2005</span></a><span data-dcnode-id="4203" instrument_node="">).</span></p><p data-dcnode-id="4167"><span data-dcnode-id="4201" instrument_node="">The sum of nitric oxide (NO) and nitrogen dioxide (NO</span><sub data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">2</span></sub><span data-dcnode-id="4198" instrument_node="">) is commonly called nitrogen oxides or NO</span><sub data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">x</span></sub><span data-dcnode-id="4195" instrument_node="">. NO</span><sub data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">2</span></sub><span data-dcnode-id="4192" instrument_node=""> is of concern in indoor air due to its irritating effects on the respiratory tract (Wainman et al. </span><a aria-label="Reference 2001" data-dcnode-id="4190" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d112910146e1701" title="Wainman T, Weschler CJ, Lioy PJ (2001) Effects of Surface type and relative humidity on the production and concentration of nitrous acid in a model indoor environment. Environ Sci Technol 35:2200–2206"><span data-dcnode-id="4191" instrument_node="">2001</span></a><span data-dcnode-id="4189" instrument_node="">). Conversely, NO is not considered particularly toxic at typical concentrations. Indoor NO</span><sub data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node="">2</span></sub><span data-dcnode-id="4186" instrument_node=""> concentrations normally range from 30 to 40 ppbv, with occurrences as high as 100 ppbv (Wainman et al. </span><a aria-label="Reference 2001" data-dcnode-id="4184" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d112910146e1707" title="Wainman T, Weschler CJ, Lioy PJ (2001) Effects of Surface type and relative humidity on the production and concentration of nitrous acid in a model indoor environment. Environ Sci Technol 35:2200–2206"><span data-dcnode-id="4185" instrument_node="">2001</span></a><span data-dcnode-id="4183" instrument_node="">). Indoor concentrations of SO</span><sub data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">2</span></sub><span data-dcnode-id="4180" instrument_node=""> range from 0.5 to 32&nbsp;µg/m</span><sup data-dcnode-id="4178"><span data-dcnode-id="4179" instrument_node="">3</span></sup><span data-dcnode-id="4177" instrument_node=""> (Brauer et al. </span><a aria-label="Reference 2002" data-dcnode-id="4175" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d112910146e1714" title="Brauer M, Herderson S, Kirkham T, Lee KS, Rich K, Teschke K (2002) Review of the health risks associated with nitrogen dioxide and sulfur dioxide in indoor air. Report to Health Canada. University of British Colombia. 
                    https://circle.ubc.ca/bitstream/id/3561/IAQNO2SO2full.pdf
                    
                  . Accessed 15 Dec 2015"><span data-dcnode-id="4176" instrument_node="">2002</span></a><span data-dcnode-id="4174" instrument_node="">). The effects of SO</span><sub data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">2</span></sub><span data-dcnode-id="4171" instrument_node=""> exposure include difficulty in breathing, irritation of the throat and eyes, and coughing (WHO </span><a aria-label="Reference 2000" data-dcnode-id="4169" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR128" id="ref-link-section-d112910146e1719" title="World Health Organization (WHO) (2000) Air quality guidelines for Europe, 2nd edn. World Health Organization Regional Publications, European Series No. 91. Health Organization, Regional Office for Europe, Copenhagen. 
                    http://www.euro.who.int/document/e71922.pdf
                    
                  
                        "><span data-dcnode-id="4170" instrument_node="">2000</span></a><span data-dcnode-id="4168" instrument_node="">).</span></p><p data-dcnode-id="4147"><span data-dcnode-id="4166" instrument_node="">
</span><i data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">Ozone</span></i><span data-dcnode-id="4163" instrument_node=""> (O</span><sub data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">3</span></sub><span data-dcnode-id="4160" instrument_node="">) is a photochemical reaction product in polluted atmospheres, but it can also be released by devices such as air ionic purifiers, ozone generators, electrostatic filters, printers and copiers, among others. Low amounts of O</span><sub data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">3</span></sub><span data-dcnode-id="4157" instrument_node=""> (80–120 ppbv) can cause eye irritation, visual disturbances, headaches, dizziness, dry mouth and throat, chest tightness, and coughing (Sittig </span><a aria-label="Reference 1991" data-dcnode-id="4155" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d112910146e1733" title="Sittig M (1991) Handbook of toxic and hazardous chemicals and carcinogens, vol 2, 3rd edn. Noyes Publications, Park Ridge"><span data-dcnode-id="4156" instrument_node="">1991</span></a><span data-dcnode-id="4154" instrument_node="">). Exposure to relatively high concentrations of this gas has been associated with chest pain, coughing, difficulty in breathing, and respiratory tract irritation, as well as the worsening of respiratory diseases such as asthma (US EPA </span><a aria-label="Reference 1997" data-dcnode-id="4152" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR109" id="ref-link-section-d112910146e1736" title="U.S. Environmental Protection Agency (EPA) (1997) Health and environmental effects of ground-level ozone. OAQPS Fact Sheet. 
                    http://www.epa.gov/groundlevelozone/health.html
                    
                  . Accessed on 24 April 2014"><span data-dcnode-id="4153" instrument_node="">1997</span></a><span data-dcnode-id="4151" instrument_node="">). The WHO average guideline value is 100&nbsp;µg/m</span><sup data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">3</span></sup><span data-dcnode-id="4148" instrument_node=""> for an 8-h&nbsp;day.</span></p><p data-dcnode-id="4130"><span data-dcnode-id="4146" instrument_node="">
</span><i data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">Organic compounds</span></i><span data-dcnode-id="4143" instrument_node=""> comprise a group of hundreds of organic chemicals, but most of them are present at very low concentrations (parts per billion) (Weschler </span><a aria-label="Reference 2009" data-dcnode-id="4141" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d112910146e1748" title="Weschler CJ (2009) Changes in indoor pollutants since the 1950s. Atmos Environ 43:153–169"><span data-dcnode-id="4142" instrument_node="">2009</span></a><span data-dcnode-id="4140" instrument_node="">). The World Health Organization (WHO </span><a aria-label="Reference 1989" data-dcnode-id="4138" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d112910146e1751" title="World Health Organization (WHO) (1989) Indoor air quality: organic pollutants. Report WHO meeting, Berlin, 23–27 Aug 1987. EURO reports and studies 111. Regional Office for Europe, Copenhagen"><span data-dcnode-id="4139" instrument_node="">1989</span></a><span data-dcnode-id="4137" instrument_node="">) classifies organic compounds by their normal boiling point (&lt;0 to 50–100&nbsp;°C) into very volatile organic compounds (VVOCs), volatile organic compounds (VOCs), with a boiling point of 50–100 to 240–260&nbsp;°C, and semivolatile organic compounds (SVOCs) with a boiling point of 240–260 to 380–400&nbsp;°C. Some of these compounds are associated with allergies and adverse respiratory effects (Sundell </span><a aria-label="Reference 2004" data-dcnode-id="4135" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d112910146e1754" title="Sundell J (2004) On the history of indoor air quality and health. Indoor Air 14(7):51–58"><span data-dcnode-id="4136" instrument_node="">2004</span></a><span data-dcnode-id="4134" instrument_node="">), and others have been classified as known human carcinogens (Weschler </span><a aria-label="Reference 2009" data-dcnode-id="4132" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d112910146e1757" title="Weschler CJ (2009) Changes in indoor pollutants since the 1950s. Atmos Environ 43:153–169"><span data-dcnode-id="4133" instrument_node="">2009</span></a><span data-dcnode-id="4131" instrument_node="">).</span></p><p data-dcnode-id="4125"><span data-dcnode-id="4129" instrument_node="">Among the variety of indoor pollutants, Gallego et al. (</span><a aria-label="Reference 2009" data-dcnode-id="4127" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d112910146e1763" title="Gallego E, Roca X, Perales JF, Guardino X (2009) Determining indoor air quality and identifying the origin of odour episodes in indoor environments. J Environ Sci 21:333–339"><span data-dcnode-id="4128" instrument_node="">2009</span></a><span data-dcnode-id="4126" instrument_node="">) have identified 130 different VOCs in private homes, with alkanes being the largest group (32&nbsp;%), followed by aromatic hydrocarbons (17&nbsp;%) and esters and alkenes (7&nbsp;%).</span></p><p data-dcnode-id="4117"><span data-dcnode-id="4124" instrument_node="">The ratio between indoor and outdoor concentrations for certain common compounds in some particular environments reveals the main source (Table&nbsp;</span><a data-dcnode-id="4122" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="4123" instrument_node="">2</span></a><span data-dcnode-id="4121" instrument_node="">). Indoor/outdoor ratio values higher than 30 in private homes have been reported for acetaldehyde and xylene, which are directly linked to tobacco smoke and paints, respectively (Sarigiannis et al. </span><a aria-label="Reference 2011" data-dcnode-id="4119" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d112910146e1772" title="Sarigiannis DA, Karakitsios SP, Gotti A, Liakos IL, Katsoyiannis A (2011) Exposure to major volatile organic compounds and carbonyls in European indoor environments and associated health risk. Environ Int 37:743–765"><span data-dcnode-id="4120" instrument_node="">2011</span></a><span data-dcnode-id="4118" instrument_node="">). The presence of toluene is also widespread in schools, where a ratio of 25.2 has been found. As an indicator of the pollutants reported in furniture malls, benzene has a ratio of 7.9.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4102" data-test="inline-table" id="table-2"><figure data-dcnode-id="4103"><figcaption class="c-article-table__figcaption" data-dcnode-id="4114"><b data-dcnode-id="4115" data-test="table-caption" id="Tab2"><span data-dcnode-id="4116" instrument_node="">Table&nbsp;2 Indoor/outdoor ratio for certain common organic compounds in several indoor environments</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4104"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="4105" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/tables/2" rel="nofollow"><span data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4106" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4107" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4108" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4111" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4110" fill-rule="evenodd"></path><span data-dcnode-id="4109" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4101" instrument_node="">
</span><p data-dcnode-id="4090"><span data-dcnode-id="4100" instrument_node="">Huang et al. (</span><a aria-label="Reference 2011" data-dcnode-id="4098" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d112910146e2049" title="Huang Y, Ho SSH, Ho KF, Lee SC, Yu JZ, Louie PKK (2011) Characteristics and health impacts of VOCs and carbonyls associated with residential cooking activities in Hong Kong. J Hazard Mater 186:344–351"><span data-dcnode-id="4099" instrument_node="">2011</span></a><span data-dcnode-id="4097" instrument_node="">) have studied the environment in two households during cooking activities; the first one used a fuel consisting of 49&nbsp;% hydrogen and 28&nbsp;% methane, and the other one used a fuel with 75&nbsp;% propane and 25&nbsp;% butane. Elevated amounts of CO</span><sub data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">2</span></sub><span data-dcnode-id="4094" instrument_node=""> were measured in both homes, but the amount of CO was higher for the one that used propane and butane, which may be related to incomplete combustion. The presence of C2 compounds (ethane, ethene, and ethyne) in both homes was associated with the heating of meat products and fat. Activities such as roasting coffee beans emit high quantities of acetaldehyde (5233 ppbv) and other compounds, such as hydrogen sulfide (2398 ppbv) and methanethiol (2070 ppbv) (Kabir et al. </span><a aria-label="Reference 2010" data-dcnode-id="4092" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d112910146e2054" title="Kabir E, Kim KH, Ahn JW, Hong OF, Sohn JR (2010) Barbecue charcoal combustion as a potential source of aromatic volatile organic compounds and carbonyls. J Hazard Mater 174:492–499"><span data-dcnode-id="4093" instrument_node="">2010</span></a><span data-dcnode-id="4091" instrument_node="">). Other compounds present in kitchens are formaldehyde, toluene, hexanal, and acetone.</span></p><p data-dcnode-id="4076"><span data-dcnode-id="4089" instrument_node="">Other compounds with high ratios are shown in Table&nbsp;</span><a data-dcnode-id="4087" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="4088" instrument_node="">3</span></a><span data-dcnode-id="4086" instrument_node="">. The most noticeable cases involve α-pinene and </span><span class="u-small-caps" data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">d</span></span><span data-dcnode-id="4083" instrument_node="">-limonene, which have been reported in homes with indoor/outdoor (I/O) ratios of up to 145 and 97.3, respectively. Based on its characteristically pleasant odour, </span><span class="u-small-caps" data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">d</span></span><span data-dcnode-id="4080" instrument_node="">-limonene is used as a flavour and fragrance additive in food, household cleaning and polishing products, as well as in perfumes and personal care products, and can be found in solvents. α-Pinene is a naturally occurring terpene, which is emitted indoors by wood-based products, or contained in aerosol paint concentrates, cleaning and hygiene products, varnish removers, waterproofing solvents, and flavours (Geiss et al. </span><a aria-label="Reference 2011" data-dcnode-id="4078" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d112910146e2069" title="Geiss O, Giannopoulos G, Tirendi S, Barrero-Moreno J, Larsern BR, Kotzias D (2011) The AIRMEX study—VOC measurements in public buildings and schools/kindergartens in eleven European cities: statistical analysis of the data. Atmos Environ 45:3676–3684"><span data-dcnode-id="4079" instrument_node="">2011</span></a><span data-dcnode-id="4077" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4058" data-test="inline-table" id="table-3"><figure data-dcnode-id="4059"><figcaption class="c-article-table__figcaption" data-dcnode-id="4070"><b data-dcnode-id="4071" data-test="table-caption" id="Tab3"><span data-dcnode-id="4075" instrument_node="">Table&nbsp;3 Indoor concentrations of particular pollutants and indoor/outdoor ratio (Geiss et al. </span><a aria-label="Reference 2011" data-dcnode-id="4073" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d112910146e2082" title="Geiss O, Giannopoulos G, Tirendi S, Barrero-Moreno J, Larsern BR, Kotzias D (2011) The AIRMEX study—VOC measurements in public buildings and schools/kindergartens in eleven European cities: statistical analysis of the data. Atmos Environ 45:3676–3684"><span data-dcnode-id="4074" instrument_node="">2011</span></a><span data-dcnode-id="4072" instrument_node="">)</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4060"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="4061" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/tables/3" rel="nofollow"><span data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4062" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4063" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4064" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4067" instrument_node="">

</span></a></div></figure></div><span data-dcnode-id="4057" instrument_node="">
</span><p data-dcnode-id="4043"><span data-dcnode-id="4056" instrument_node="">Indoor environments in hospitals have their own specific contaminants, such as ethylene oxide, which is used for sterilization (Wang et al. </span><a aria-label="Reference 2007" data-dcnode-id="4054" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d112910146e2329" title="Wang S, Ang HM, Tade MO (2007) Volatile organic compounds in indoor environment and photocatalytic oxidation: state of the art. Environ Int 33:694–705"><span data-dcnode-id="4055" instrument_node="">2007</span></a><span data-dcnode-id="4053" instrument_node="">). Offices where photocopiers, computers and other devices are used also have specific pollutants, such as ozone, PM</span><sub data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">10</span></sub><span data-dcnode-id="4050" instrument_node="">, acetone, ethylbenzene, xylene, and styrene (Lee et al. </span><a aria-label="Reference 2001" data-dcnode-id="4048" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d112910146e2334" title="Lee SC, Lam S, Fai HK (2001) Characterization of VOCs, ozone, and PM10 emissions from office equipment in an environmental chamber. Build Environ 36:837–842"><span data-dcnode-id="4049" instrument_node="">2001</span></a><span data-dcnode-id="4047" instrument_node="">). Other examples of indoor VOC concentrations at different locations are shown in Table&nbsp;</span><a data-dcnode-id="4045" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="4046" instrument_node="">4</span></a><span data-dcnode-id="4044" instrument_node="">.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4025" data-test="inline-table" id="table-4"><figure data-dcnode-id="4026"><figcaption class="c-article-table__figcaption" data-dcnode-id="4037"><b data-dcnode-id="4038" data-test="table-caption" id="Tab4"><span data-dcnode-id="4042" instrument_node="">Table&nbsp;4 Indoor concentrations of common organic compounds in different environments (µg/m</span><sup data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">3</span></sup><span data-dcnode-id="4039" instrument_node="">)</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4027"><a aria-label="Full size table 4" class="c-article__pill-button" data-dcnode-id="4028" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11157-015-9363-9/tables/4" rel="nofollow"><span data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4029" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4030" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4031" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4034" instrument_node="">

</span><p data-dcnode-id="4010"><span data-dcnode-id="4023" instrument_node="">As better analytical instruments are being developed, sampling procedures are being standardized and instrument sensitivities improved, the number and type of compounds identified and quantified indoors are continuously increasing (Weschler </span><a aria-label="Reference 2009" data-dcnode-id="4021" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d112910146e3163" title="Weschler CJ (2009) Changes in indoor pollutants since the 1950s. Atmos Environ 43:153–169"><span data-dcnode-id="4022" instrument_node="">2009</span></a><span data-dcnode-id="4020" instrument_node="">; Panagiotaras et al. </span><a aria-label="Reference 2014" data-dcnode-id="4018" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d112910146e3166" title="Panagiotaras D, Nikolopoulos D, Petraki E, Kottou S, Koulougliotis D, Panayiotis et al (2014) Comprehensive experience for indoor air quality assessment: a review on the determination of volatile organic compounds (VOCs). J Phys Chem Biophys 4:159–171"><span data-dcnode-id="4019" instrument_node="">2014</span></a><span data-dcnode-id="4017" instrument_node="">). Bearing in mind the different types of VOC compounds and the diversity in their physico-chemical properties, a series of protocols and methodologies have been developed in order to achieve common indoor air sampling strategies and VOC quantitative analysis (Bacaloni et al. </span><a aria-label="Reference 2005" data-dcnode-id="4015" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d112910146e3169" title="Bacaloni A, Insogna S, Zoccolillo L (2005) Indoor air quality—volatile organic compounds: sources, sampling and analysis. In: Mazzeo N (ed) Chemistry, emission control, radioactive pollution and indoor air quality. doi:
                    10.5772/21645
                    
                  
                        "><span data-dcnode-id="4016" instrument_node="">2005</span></a><span data-dcnode-id="4014" instrument_node="">; Panagiotaras et al. </span><a aria-label="Reference 2014" data-dcnode-id="4012" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d112910146e3172" title="Panagiotaras D, Nikolopoulos D, Petraki E, Kottou S, Koulougliotis D, Panayiotis et al (2014) Comprehensive experience for indoor air quality assessment: a review on the determination of volatile organic compounds (VOCs). J Phys Chem Biophys 4:159–171"><span data-dcnode-id="4013" instrument_node="">2014</span></a><span data-dcnode-id="4011" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="3443" data-title="Treatment methods"><div class="c-article-section" data-dcnode-id="3444" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4005" id="Sec4"><span data-dcnode-id="4006" instrument_node="">Treatment methods</span></h2><div class="c-article-section__content" data-dcnode-id="3445" id="Sec4-content"><p data-dcnode-id="3994"><span data-dcnode-id="4004" instrument_node="">Three basic strategies may be applied to reduce indoor pollution, and therefore improve IAQ. The first strategy focuses on the control of the pollution source, which can be accomplished by its removal, confinement, or replacement (Liébana and Calleja </span><a aria-label="Reference 1998" data-dcnode-id="4002" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d112910146e3183" title="Liébana EA, Calleja AH (1998) El aire en interiores: métodos de control y depuración. Enciclopedia de Salud y Seguridad en el Trabajo 45:7–11. 
                    www.insht.es/InshtWeb/Contenidos/Documentacion/TextosOnline/EnciclopediaOIT/tomo2/45.pdf
                    
                  . Accessed 22 June 2012"><span data-dcnode-id="4003" instrument_node="">1998</span></a><span data-dcnode-id="4001" instrument_node="">). A second strategy involves improving the ventilation system by increasing the amount of outdoor air to dilute indoor pollutant concentrations. Nevertheless, this alternative does not necessarily negate the presence of pollutants above a safe limit (Zaatari et al. </span><a aria-label="Reference 2014" data-dcnode-id="3999" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR135" id="ref-link-section-d112910146e3186" title="Zaatari M, Nirlo E, Jareemit D, Crain N, Srebric J, Siegel J (2014) Ventilation and indoor air quality in retail stores: a critical review (RP-1596). HVAC&amp;R Res 20:276–294"><span data-dcnode-id="4000" instrument_node="">2014</span></a><span data-dcnode-id="3998" instrument_node="">) and may involve the potential risk of simply bringing in more pollutants from the outside, and what’s more, it is inconsistent with energy saving policies (Chithra and Shiva-Nagendra </span><a aria-label="Reference 2012" data-dcnode-id="3996" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d112910146e3189" title="Chithra VS, Shiva-Nagendra SM (2012) Indoor air quality investigations in a naturally ventilated school building located close to an urban roadway in Chennai, India. Build Environ 54:159–167"><span data-dcnode-id="3997" instrument_node="">2012</span></a><span data-dcnode-id="3995" instrument_node="">). Finally, the third strategy involves the use of purification/treatment technologies.</span></p><p data-dcnode-id="3986"><span data-dcnode-id="3993" instrument_node="">In sum, a trial set of four simple recommendations for improving indoor air quality has been reported (Nazaroff </span><a aria-label="Reference 2013" data-dcnode-id="3991" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d112910146e3195" title="Nazaroff WW (2013) Editorial. Four principles for achieving good indoor air quality. Indoor Air 23:353–356"><span data-dcnode-id="3992" instrument_node="">2013</span></a><span data-dcnode-id="3990" instrument_node="">): (1) Minimize indoor emissions; (2) Keep the area dry; (3) Ventilate well; and (4) Protect against outdoor pollution. When emission sources cannot be controlled or reduced for technical or financial reasons, air cleaning devices need to be used (Ayoko and Wang </span><a aria-label="Reference 2014" data-dcnode-id="3988" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d112910146e3198" title="Ayoko GA, Wang H (2014) Volatile organic compounds in indoor environments. In: Pluschke P, Schleibinger H (eds) Indoor air pollution, 2nd edn. Handbook of environmental chemistry. doi:
                    10.1007/698_2014_259
