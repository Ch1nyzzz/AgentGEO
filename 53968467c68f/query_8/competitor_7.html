</span><div class="eltdf-post-content" data-dcnode-id="1036"><span data-dcnode-id="1298" instrument_node="">
</span><div class="eltdf-post-text" data-dcnode-id="1038"><span data-dcnode-id="1297" instrument_node="">
</span><div class="eltdf-post-text-inner clearfix" data-dcnode-id="1040"><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1295" instrument_node="">Many now understand the dangers of secondhand smoke, and as a result, legislation has followed to limit indoor exposure. Yet sometimes you cannot fully control the source of smoke. If your neighbor is a smoker and secondhand smoke drifts from their apartment into yours, then you might be forced to deal with it. Or maybe you live in a fire-prone area, and </span><a data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/wildfire-smoke-what-you-should-know/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1294" instrument_node="">wildfire smoke</span></a><span data-dcnode-id="1292" instrument_node=""> is a real problem. Whatever your situation, there are steps you can take to improve it, and often an air purifier can help.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1284"><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.com/air-purifier-mh1%3Futm_campaign%3Dblog%26utm_content%3Dpost-cta"><picture class="sp-no-webp" data-dcnode-id="1286"><source data-dcnode-id="1289" srcset="https://molekule.science/wp-content/uploads/2019/02/molekule-air-purifier-top-view.webp" type="image/webp"><source data-dcnode-id="1288" srcset="https://molekule.science/wp-content/uploads/2019/02/molekule-air-purifier-top-view.jpg" type="image/jpeg"><img class="sp-no-webp" data-dcnode-id="1287" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/wp-content/uploads/2019/02/molekule-air-purifier-top-view.jpg&amp;raw" srcset="https://molekule.science/wp-content/uploads/2019/02/molekule-air-purifier-top-view.jpg"></picture></a></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1279" style="text-align: center;"><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.com/air-purifier-mh1%3Futm_campaign%3Dblog%26utm_content%3Dpost-cta" style="text-decoration: none;"><strong data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Read more about a new technology that can destroy VOCs and other pollutants from smoke.</span></strong></a></p><span data-dcnode-id="1278" instrument_node="">
</span><form action="https://molekule.com/air-purifier-mh1?utm_campaign=blog&amp;utm_content=post-cta" data-dcnode-id="1276" method="post"><input data-dcnode-id="1277" style="padding: 15px; background-color: #7befb2; display: block; margin: 0 auto; font-family: akkurat-pro-light; font-size: 0.95em; border: none; height: 100%; color: #535454;" type="submit" value="Learn more"></form><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">If you are faced with the task of finding the best air purifier for smoke, you probably know there is a lot of contradictory information out there about what is the best one. And the main reason for this is that smoke is a highly complex pollutant. People might use HEPA filters to filter particles in the air, but smoke is much more than just particles. It is also made up of harmful gases. There are also air purifiers out there solely designed to filter gases and odors. However, what is the best air purifier for smoke? Ultimately, it depends on the situation. Please remember that no matter how good an air purifier is at removing smoke, it will never be a complete solution and should not be a substitute for reducing or eliminating the source of smoke whenever possible.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><div class="toc_white no_bullets contracted" data-dcnode-id="1244" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="1264"><span data-dcnode-id="1271" instrument_node="">Contents</span><span data-dcnode-id="1270" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1265"><span data-dcnode-id="1269" instrument_node="">[</span><a data-dcnode-id="1267" href="#"><span data-dcnode-id="1268" instrument_node="">show</span></a><span data-dcnode-id="1266" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="1245" style="display: none;"><li data-dcnode-id="1261"><a data-dcnode-id="1262" href="#Why-is-smoke-so-essential-to-get-rid-of"><span data-dcnode-id="1263" instrument_node="">Why is smoke so essential to get rid of?</span></a></li><li data-dcnode-id="1258"><a data-dcnode-id="1259" href="#What-is-smoke"><span data-dcnode-id="1260" instrument_node="">What is smoke?</span></a></li><li data-dcnode-id="1255"><a data-dcnode-id="1256" href="#How-are-air-purifiers-designed-to-address-smoke"><span data-dcnode-id="1257" instrument_node="">How are air purifiers designed to address smoke?</span></a></li><li data-dcnode-id="1252"><a data-dcnode-id="1253" href="#What-is-the-best-air-purifier-for-smoke"><span data-dcnode-id="1254" instrument_node="">What is the best air purifier for smoke?</span></a></li><li data-dcnode-id="1249"><a data-dcnode-id="1250" href="#How-do-you-reduce-the-smell-of-smoke"><span data-dcnode-id="1251" instrument_node="">How do you reduce the smell of smoke?</span></a></li><li data-dcnode-id="1246"><a data-dcnode-id="1247" href="#What-is-the-best-solution-for-smoke"><span data-dcnode-id="1248" instrument_node="">What is the best solution for smoke?</span></a></li></ul></div><span data-dcnode-id="1243" instrument_node="">
</span><h2 data-dcnode-id="1240"><span data-dcnode-id="1241" id="Why-is-smoke-so-essential-to-get-rid-of"><span data-dcnode-id="1242" instrument_node="">Why is smoke so essential to get rid of?</span></span></h2><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1238" instrument_node="">You already know that smoke is harmful to health. But exactly how harmful can further inform your decision to take action. If you have children, older adults, or someone with a respiratory condition like asthma in your family, they are </span><a data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airnow.gov/index.cfm%3Faction%3Dsmoke.index" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1237" instrument_node="">more at risk</span></a><span data-dcnode-id="1235" instrument_node="">.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1232" instrument_node="">Smoke from wildfires, though harmful, is at least temporary. If you are trying to filter smoke from a regular source like secondhand smoke from a neighbor, it is even more important to take the first line of action, like asking them to avoid smoking nearby. The National Institutes of Health (NIH) </span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancer.gov/about-cancer/causes-prevention/risk/tobacco/cessation-fact-sheet" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1231" instrument_node="">says</span></a><span data-dcnode-id="1229" instrument_node=""> there are at least 250 harmful chemicals in tobacco smoke, and at least 69 are carcinogens, such as arsenic, benzene and formaldehyde. Secondhand smoke may </span><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancer.gov/about-cancer/causes-prevention/risk/tobacco/cessation-fact-sheet" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1228" instrument_node="">cause disease</span></a><span data-dcnode-id="1226" instrument_node=""> and premature death in nonsmoking adults and children. For children, exposure to secondhand smoke can cause an increased risk of SIDS, colds and bronchitis, and for those that already have asthma, can worsen their symptoms.</span></p><span data-dcnode-id="1224" instrument_node="">
</span><h2 data-dcnode-id="1219"><picture class="aligncenter wp-image-6665 size-full sp-no-webp" data-dcnode-id="1220"><source data-dcnode-id="1223" sizes="(max-width: 1250px) 100vw, 1250px" srcset="https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small.webp 1250w,https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-498x300.webp 498w,https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-1024x617.webp 1024w,https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-768x463.webp 768w,https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-1200x723.webp 1200w,https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-600x361.webp 600w,https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-150x90.webp 150w" type="image/webp"><source data-dcnode-id="1222" sizes="(max-width: 1250px) 100vw, 1250px" srcset="https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small.jpg 1250w, https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-498x300.jpg 498w, https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-1024x617.jpg 1024w, https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-768x463.jpg 768w, https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-1200x723.jpg 1200w, https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-600x361.jpg 600w, https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-150x90.jpg 150w" type="image/jpeg"><img alt="" class="aligncenter wp-image-6665 size-full sp-no-webp" data-dcnode-id="1221" height="753" loading="lazy" sizes="(max-width: 1250px) 100vw, 1250px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small.jpg&amp;raw" srcset="https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small.jpg 1250w, https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-498x300.jpg 498w, https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-1024x617.jpg 1024w, https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-768x463.jpg 768w, https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-1200x723.jpg 1200w, https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-600x361.jpg 600w, https://molekule.science/wp-content/uploads/2022/01/best-air-purifier-for-smoke-pollutants-small-150x90.jpg 150w" width="1250"></picture></h2><span data-dcnode-id="1218" instrument_node="">
</span><h2 data-dcnode-id="1215"><span data-dcnode-id="1216" id="What-is-smoke"><span data-dcnode-id="1217" instrument_node="">What is smoke?</span></span></h2><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">If there is nothing more you can do to reduce you and your family’s exposure to smoke, your next best option is an air purifier. Before you start looking for one, you need to know exactly what you are dealing with. As mentioned before, smoke is far from easy for an air purifier to address. The reason for this is because smoke is made up of two major types of pollutants: fine particles and gases, and usually an air purifier is designed to filter either one or the other and not both.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1198"><strong data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Particulate matter.</span></strong><span data-dcnode-id="1208" instrument_node=""> The first major type of pollutant in smoke is particulate matter, or fine particles. Particulate matter in smoke is a </span><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/indoor-air-quality-iaq/residential-air-cleaners-second-edition-summary-available-information" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1207" instrument_node="">mixture</span></a><span data-dcnode-id="1205" instrument_node=""> of solids and liquid droplets suspended in the air. Though some of these smoke particles you can see are dark or large enough to be seen by the naked eye, others are so tiny they can only be seen through an electron microscope. These fine particles are </span><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/burnwise/wood-smoke-and-your-health" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1204" instrument_node="">especially dangerous</span></a><span data-dcnode-id="1202" instrument_node=""> to health because they are small enough to enter the lungs, and may cause burning eyes, a runny nose, or even lung disease. Particulate matter in smoke can be smaller than</span><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2598558/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1201" instrument_node=""> 0.1 micrometers</span></a><span data-dcnode-id="1199" instrument_node=""> in size.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1190"><strong data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Gaseous pollutants</span></strong><span data-dcnode-id="1194" instrument_node="">. Particulate matter is serious enough, yet it is only half of the story. Smoke also contains harmful gases. These gaseous pollutants </span><a data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/indoor-air-quality-iaq/residential-air-cleaners-second-edition-summary-available-information" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1193" instrument_node="">include</span></a><span data-dcnode-id="1191" instrument_node=""> gases associated with combustion, like carbon monoxide or nitrogen oxides. Other gaseous pollutants are organic chemicals that are separate from particles–these organic chemicals are specifically called volatile organic compounds, or VOCs. The known carcinogens benzene and formaldehyde, among others, are VOCs.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><h2 data-dcnode-id="1186"><span data-dcnode-id="1187" id="How-are-air-purifiers-designed-to-address-smoke"><span data-dcnode-id="1188" instrument_node="">How are air purifiers designed to address smoke?</span></span></h2><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Now you know exactly what you are dealing with when it comes to smoke–harmful particles and gases. Why is that so important to understand? It is because the best air purifier for smoke has to reduce both. Like mentioned before, usually air purifiers are designed with only one technology–either they filter particles, or they filter gases. Be careful of some air purifiers that say they are the best for smoke, yet only filter one type of pollutant.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Below is information about the four types of air purifiers that could be used for smoke: HEPA (to filter particles), carbon (to filter gases), hybrid (to filter both) and Molekule (to remove both). It is important to understand what these units can do for smoke, so you can determine which air purifier will be the best one for your situation and the type of smoke you are dealing with.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1172"><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">HEPA filters.</span></strong><span data-dcnode-id="1176" instrument_node=""> If you want to filter particles, you might consider a HEPA filter. Yet whether or not an air purifier can remove a particle is based on size. A rating called a </span><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/indoor-air-quality-iaq/residential-air-cleaners-second-edition-summary-available-information%23table%25202" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1175" instrument_node="">MERV rating (from 1 to 20)</span></a><span data-dcnode-id="1173" instrument_node=""> tells you the smallest size of particle an air purifier filters. The higher the rating, the smaller the particle it can filter.&nbsp; A HEPA filter is designed to remove 99.97% of particles that are 0.3 micrometers or larger, with the idea that the most penetrating particle size (MPPS) is very near to 0.3 micrometers.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">However, the tiniest particles in smoke are smaller than 0.3 micrometers. Also, depending on the nature of the flow and the HEPA filtration media, the MPPS may be significantly less than 0.3 micrometers. This means that the most dangerous, tiniest particles in smoke might not be filtered by a HEPA filter. There is an exception: The highest level of HEPA filter (with a MERV of 20) can remove 99.99% of particles in the 0.1–0.2 micrometer range. However, these filters are used in electronics and pharmaceutical manufacturing and as a consumer you probably cannot buy one.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">But even a perfect HEPA filter is only doing part of the job when it comes to smoke. Much of the harm done by smoke comes from gaseous pollutants like carcinogenic VOCs, which a HEPA filter cannot remove.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1161"><strong data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Carbon filters.</span></strong><span data-dcnode-id="1162" instrument_node=""> These are designed to remove gases and odors, though of course none can remove them all. Carbon filters are primarily useful for organic compounds–also known as VOCs. Please remember that carbon monoxide is likely not addressed by any type of air purifier, and therefore carbon monoxide sensors (for detection) and adequate ventilation (for mitigation) are highly recommended where carbon monoxide may be an issue.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1159" instrument_node="">There are a couple of problems associated with carbon filters. One is they can quickly become saturated and have to be replaced often. If the carbon filter becomes saturated, toxic gases can be released from the filter back into the air. Even if the filter is not saturated, but the composition of gases in the air changes (say if a window is opened and more air is let inside) it has been </span><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.amazonaws.com/molekule/papers/U%2Bof%2BMinnesota%2B-%2BOzone%2Band%2Bother%2Bby-products%2Btesting%2B%281%29.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1158" instrument_node="">shown</span></a><span data-dcnode-id="1156" instrument_node=""> that gases on the filter surface can also be released back into the air (referred to as “outgassing”).</span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">What does this mean for you if you are thinking of using a carbon filter for smoke? Because it must be replaced according to saturation levels, it is best to get one with a high quantity of carbon to allow for a greater surface area for gases to stick to.</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1144"><strong data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Hybrid air purifiers.</span></strong><span data-dcnode-id="1148" instrument_node=""> There are a few air purifiers out there with two types of filtration, like a HEPA filter combined with a carbon filter. They are designed to filter both particles and gases, yet this may not make them necessarily better for smoke. The EPA </span><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/sites/production/files/2014-08/documents/residential_air_cleaning_devices.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1147" instrument_node="">states</span></a><span data-dcnode-id="1145" instrument_node=""> that their effectiveness may decrease because when the filters are arranged in a series, it can introduce greater air resistance. This in turn can reduce the delivery of clean air to the room or even cause some of the room’s air to miss the filter altogether. Reduced air delivery means that the device may not produce enough clean air to circulate throughout the room, and if the air bypasses the filter, then contaminated air may flow through the unit and not get filtered at all.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1136"><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">PECO air purifier. </span></strong><span data-dcnode-id="1140" instrument_node="">The </span><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.com/technology" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1139" instrument_node="">PECO technology</span></a><span data-dcnode-id="1137" instrument_node=""> (the technology inside a Molekule air purifier) can eliminate the dangerous VOCs in smoke. The Molekule air purifier also contains a mechanical filtration stage where air is first filtered of particles. The second stage is different from the others because though it removes gases from the air like a carbon filter, it uses a chemical reaction to destroy them. There are no organic vapors that stick to a filter that can be released back into the air. However, this process takes time, which could be longer than the time it takes for a carbon filter only to absorb the vapor.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><blockquote data-dcnode-id="1127"><p data-dcnode-id="1128"><span data-dcnode-id="1134" instrument_node="">To learn more about how different air purifiers work on smoke, </span><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/air-purifiers-work-smoke/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1133" instrument_node="">click </span></a><a data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/air-purifiers-work-smoke/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1131" instrument_node="">here</span></a><span data-dcnode-id="1129" instrument_node="">.</span></p></blockquote><span data-dcnode-id="1126" instrument_node="">
</span><h2 data-dcnode-id="1123"><span data-dcnode-id="1124" id="What-is-the-best-air-purifier-for-smoke"><span data-dcnode-id="1125" instrument_node="">What is the best air purifier for smoke?</span></span></h2><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Now you know the four air purification technologies that could be used for smoke. You have also read about their limitations. However, what you may not know is how each of them applies to your particular situation.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Ultimately, the best air purifier for smoke depends on if the device is needed for the short or long term, whether the source of the smoke is from wood/wildfires or tobacco, and what is the level of exposure.</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1113"><strong data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">For wildfire smoke (short-term):</span></strong></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1106"><a data-dcnode-id="1107" data-featherlight="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2.jpg"><picture class="alignnone size-full wp-image-1179 sp-no-webp" data-dcnode-id="1108"><source data-dcnode-id="1111" sizes="(max-width: 1600px) 100vw, 1600px" srcset="https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2.webp 1600w,https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-600x300.webp 600w,https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-500x250.webp 500w,https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-768x384.webp 768w,https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-1024x512.webp 1024w,https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-960x480.webp 960w" type="image/webp"><source data-dcnode-id="1110" sizes="(max-width: 1600px) 100vw, 1600px" srcset="https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2.jpg 1600w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-600x300.jpg 600w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-500x250.jpg 500w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-768x384.jpg 768w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-1024x512.jpg 1024w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-960x480.jpg 960w" type="image/jpeg"><img alt="Air purifier for wildfire smoke - trees surrounded by smoke" class="alignnone size-full wp-image-1179 sp-no-webp" data-dcnode-id="1109" height="800" loading="lazy" sizes="(max-width: 1600px) 100vw, 1600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2.jpg&amp;raw" srcset="https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2.jpg 1600w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-600x300.jpg 600w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-500x250.jpg 500w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-768x384.jpg 768w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-1024x512.jpg 1024w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-wildfire-smoke-2-960x480.jpg 960w" width="1600"></picture></a></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1104" instrument_node="">You have two options for wildfire smoke, where short-term exposure is hours or weeks. The </span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www3.epa.gov/airnow/wildfire_may2016.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1103" instrument_node="">major concern</span></a><span data-dcnode-id="1101" instrument_node=""> here is particulate matter. Because a HEPA filter can filter most particles pretty well, it is an acceptable option, though it cannot remove the tiniest ones.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">However, a HEPA filter cannot address the gases or odors of wildfire smoke. The best option for wildfire smoke if you want to filter both particles and gases is a PECO air purifier.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1093"><strong data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">For tobacco or wood smoke (high-level exposure, long-term):</span></strong></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">This kind of situation most likely does not apply to you. This is when tobacco smoke is often produced inside the home or a home where wood stoves (commonly used in developing countries) release a lot of smoke into the air. Here, both particles and gases would be a significant concern. There really is no air purifier that can sustain cleaning the air in this type of situation. Some hybrid air purifiers will void the warranty in this case. The only real solution would be to smoke outside and upgrade or replace wood stoves.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1086"><strong data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">For secondhand tobacco/wood smoke (low-level exposure) </span></strong></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1079"><a data-dcnode-id="1080" data-featherlight="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2.jpg"><picture class="alignnone size-full wp-image-1180 sp-no-webp" data-dcnode-id="1081"><source data-dcnode-id="1084" sizes="(max-width: 1600px) 100vw, 1600px" srcset="https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2.webp 1600w,https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-600x300.webp 600w,https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-500x250.webp 500w,https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-768x384.webp 768w,https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-1024x512.webp 1024w,https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-960x480.webp 960w" type="image/webp"><source data-dcnode-id="1083" sizes="(max-width: 1600px) 100vw, 1600px" srcset="https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2.jpg 1600w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-600x300.jpg 600w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-500x250.jpg 500w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-768x384.jpg 768w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-1024x512.jpg 1024w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-960x480.jpg 960w" type="image/jpeg"><img alt="best air purifier for cigarette smoke - hand with smoking cigarette" class="alignnone size-full wp-image-1180 sp-no-webp" data-dcnode-id="1082" height="800" loading="lazy" sizes="(max-width: 1600px) 100vw, 1600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2.jpg&amp;raw" srcset="https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2.jpg 1600w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-600x300.jpg 600w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-500x250.jpg 500w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-768x384.jpg 768w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-1024x512.jpg 1024w, https://molekule.science/wp-content/uploads/2018/01/best-air-purifier-for-smoke-cigarette-smoke-2-960x480.jpg 960w" width="1600"></picture></a></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1077" instrument_node="">This is a situation when secondhand cigarette smoke drifts inside from a neighboring apartment or when there is&nbsp;brief exposure to secondhand or wood smoke. In this case, the best air purifier would be the </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//molekule.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1076" instrument_node="">Molekule air purifier</span></a><span data-dcnode-id="1074" instrument_node="">, which addresses both of the major pollutant types in smoke. In Molekule’s case, the gaseous pollutants (except carbon monoxide and other combustion pollutants that no air purifier can address) will be eliminated.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Another option for low levels of secondhand/wood smoke is the hybrid air purifier, which also addresses both particulates and gases. However, in the long-term, it might come at a higher cost because of frequent filter replacements. If you choose a hybrid air purifier, a large quantity of carbon should be inside the filter to prevent too frequent replacement.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><h2 data-dcnode-id="1066"><span data-dcnode-id="1067" id="How-do-you-reduce-the-smell-of-smoke"><span data-dcnode-id="1068" instrument_node="">How do you reduce the smell of smoke?</span></span></h2><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1064" instrument_node="">Now you know what the best air purifier for smoke would be for your situation. However, another concern may linger—the smell. The best air purifiers for the odors of smoke include a carbon filter as a short-term solution (though these must be replaced often if there are high levels of smoke), or a Molekule air purifier as a long-term solution. However, the smell will remain even if you use an air purifier. Tobacco smoke sticks to everything—the carpet, the curtains, the sofa, even the paint on the walls. That is because so much of the odor (and chemicals) from smoke get trapped in rugs, curtains, and furniture. The California Department of Public Health </span><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdph.ca.gov/Programs/CCDPHP/DCDIC/CTCB/CDPH%2520Document%2520Library/Community/EducationalMaterials/ThirdhandSmokeFactSheet.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1063" instrument_node="">describes</span></a><span data-dcnode-id="1061" instrument_node=""> the residue that tobacco products leave behind as thirdhand smoke.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1058" instrument_node="">To </span><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//newscenter.lbl.gov/2013/06/20/berkeley-lab-confirms-thirdhand-smoke-causes-dna-damage/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1057" instrument_node="">dramatically </span></a><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//newscenter.lbl.gov/2013/06/20/berkeley-lab-confirms-thirdhand-smoke-causes-dna-damage/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1055" instrument_node="">reduce</span></a><span data-dcnode-id="1053" instrument_node=""> the levels of thirdhand smoke, you usually have to replace or substitute materials, such as change the carpet or repaint. Comprehensive cleaning, such as steam cleaning all the rugs and carpets, curtains, and even the upholstery on your furniture, can help to reduce odors and thirdhand smoke, though it is hard to clean completely. If your home has been exposed to smoke for a very long time (years or decades), this means that layers of thirdhand smoke have built up over a long time on household surfaces and in dust–in that case, it </span><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdph.ca.gov/Programs/CCDPHP/DCDIC/CTCB/CDPH%2520Document%2520Library/Community/EducationalMaterials/ThirdhandSmokeFactSheet.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1052" instrument_node="">may be necessary</span></a><span data-dcnode-id="1050" instrument_node=""> to do renovations like replacing wall boards and upholstery.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><h2 data-dcnode-id="1045"><span data-dcnode-id="1046" id="What-is-the-best-solution-for-smoke"><span data-dcnode-id="1047" instrument_node="">What is the best solution for smoke?</span></span></h2><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">You already know the answer to this question. The best solution for smoke is to remove (or reduce as much as possible) its source. But you might not be able to do that always. In the cases where have no other choice but to deal with smoke, an air purifier can help reduce levels of pollutants, and each type discussed in this article can offer benefits for reducing smoke. You should consider your particular situation and budget to invest in the best air purifier for your needs.</span></p><span data-dcnode-id="1041" instrument_node="">
