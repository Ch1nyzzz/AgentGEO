</span><h2 data-dcnode-id="5884" id="eportfolio_entry_9601"><span class="name" data-dcnode-id="5885"><span data-dcnode-id="5886" instrument_node="">4 Benefits of KN95 Masks </span></span></h2><span data-dcnode-id="5883" instrument_node="">
</span><form accept-charset="UTF-8" action="https://canvas.arcadia.edu/eportfolios/868/entries/9601" class="edit_eportfolio_entry" data-dcnode-id="5661" id="edit_page_form" method="post"><input data-dcnode-id="5882" name="utf8" type="hidden" value="✓"><input data-dcnode-id="5881" name="_method" type="hidden" value="patch"><input data-dcnode-id="5880" name="authenticity_token" type="hidden" value="UVxuUiRix0bcloLTLUCdnbVy+dRxvOl6j5qMi9qrDcwWEl8/C1Wvbe7B0Lxud9Gu2jrPkBf7rUu4scm6nppumQ=="><span data-dcnode-id="5879" instrument_node="">
</span><div class="form_content" data-dcnode-id="5872"><span data-dcnode-id="5878" instrument_node="">
</span><label data-dcnode-id="5876" for="eportfolio_entry_name"><span data-dcnode-id="5877" instrument_node="">Page Name:</span></label><span data-dcnode-id="5875" instrument_node="">
</span><input data-dcnode-id="5874" id="eportfolio_entry_name" name="eportfolio_entry[name]" type="text" value="4 Benefits of KN95 Masks "><span data-dcnode-id="5873" instrument_node="">
</span></div><span data-dcnode-id="5871" instrument_node="">
</span><div class="ui-sortable" data-dcnode-id="5729" id="page_content"><span data-dcnode-id="5870" instrument_node="">
</span><div class="section" data-dcnode-id="5731" id="page_section_0"><span data-dcnode-id="5869" instrument_node="">
</span><a class="move_link no-hover" data-dcnode-id="5867" href="#" title="Drag to rearrange sections"><img alt="Drag to rearrange sections" data-dcnode-id="5868" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//du11hjcvx0uqb.cloudfront.net/dist/images/move-e0f9bfc8dc.png&amp;raw"></a><span data-dcnode-id="5866" instrument_node="">
</span><div class="section_type_name" data-dcnode-id="5864"><span data-dcnode-id="5865" instrument_node="">
      Rich Text Content
  </span></div><span data-dcnode-id="5863" instrument_node="">
</span><div class="links" data-dcnode-id="5858"><span data-dcnode-id="5862" instrument_node="">
</span><a class="delete_page_section_link no-hover" data-dcnode-id="5860" href="#" title="Delete this section"><i class="icon-trash standalone-icon" data-dcnode-id="5861"></i></a><span data-dcnode-id="5859" instrument_node="">
</span></div><span data-dcnode-id="5857" instrument_node="">
</span><div class="section_content" data-dcnode-id="5745"><span data-dcnode-id="5856" instrument_node="">
</span><p data-dcnode-id="5853"><span data-dcnode-id="5854"><span data-dcnode-id="5855" instrument_node="">The ending of COVID-19 is not seen s. This pandemic is creating more demand. When WHO declared the preventive guidelines for people and instructed them to use a protective mask, the inhabitants started to buy the recommended masks and using hand sanitizers. The demand has risen ever since, and it is not going to go down anytime soon.&nbsp;</span></span></p><span data-dcnode-id="5852" instrument_node="">
</span><p data-dcnode-id="5843"><span data-dcnode-id="5850"><span data-dcnode-id="5851" instrument_node="">KN95 is the expected standard in China.&nbsp; Some of the regular </span></span><a class="external" data-dcnode-id="5846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hopehealthsupply.com/" target="_blank"><span data-dcnode-id="5847"><span data-dcnode-id="5848"><span data-dcnode-id="5849" instrument_node="">KN95 masks</span></span></span></a><span data-dcnode-id="5844"><span data-dcnode-id="5845" instrument_node="">&nbsp;are - GB2626-2006, GB262-2019, and GB19083-2010. Using a KN95 mask will give protection from all particles greater than 0.3 µm in diameter. The first KN95 masks came into the picture in April 2020, and the entire globe has been using them to stay far away from the infection.&nbsp;</span></span></p><span data-dcnode-id="5842" instrument_node="">
</span><p data-dcnode-id="5839"><span data-dcnode-id="5840"><span data-dcnode-id="5841" instrument_node="">It features five layers of protection and doesn't do any harm to the skin.</span></span></p><span data-dcnode-id="5838" instrument_node="">
</span><p data-dcnode-id="5835"><span data-dcnode-id="5836"><span data-dcnode-id="5837" instrument_node="">Considering we are talking about KN95 masks, it will be fruitful to share the four benefits. Let's get started!&nbsp;</span></span></p><span data-dcnode-id="5834" instrument_node="">
</span><h2 data-dcnode-id="5831"><strong data-dcnode-id="5832"><span data-dcnode-id="5833" instrument_node="">The 4 Benefits of KN95 Masks - EXPLAINED&nbsp;</span></strong></h2><span data-dcnode-id="5830" instrument_node="">
</span><ol data-dcnode-id="5824"><span data-dcnode-id="5829" instrument_node="">
</span><li data-dcnode-id="5826"><strong data-dcnode-id="5827"><span data-dcnode-id="5828" instrument_node=""> It's a Multi-layered Mask</span></strong></li><span data-dcnode-id="5825" instrument_node="">
</span></ol><span data-dcnode-id="5823" instrument_node="">
</span><p data-dcnode-id="5820"><span data-dcnode-id="5821"><span data-dcnode-id="5822" instrument_node="">KN95 is a multi-layered mask that generally has five-layer protection. Best quality, the nonwoven fabric used to make those layers of protection. The fabric is also hot air cotton and melt-blown fabric, which is hydrophobic and waterproof. The hot air cotton is there to make sure lower air velocity, and it is also soft for the skin. The rest of the layers performs particle filtration with hypo-allergic molecules.</span></span></p><span data-dcnode-id="5819" instrument_node="">
</span><p data-dcnode-id="5816"><span data-dcnode-id="5817"><span data-dcnode-id="5818" instrument_node="">A layered fabric construction contributes to its filtering efficiency with a better-designed mask. It is a 3D-designed mask with an adjustable nose clip which helps to fit better, and the elastic ear loop keeps the mask better positioned and tight.</span></span></p><span data-dcnode-id="5815" instrument_node="">
</span><ol data-dcnode-id="5809" start="2"><span data-dcnode-id="5814" instrument_node="">
</span><li data-dcnode-id="5811"><strong data-dcnode-id="5812"><span data-dcnode-id="5813" instrument_node=""> Efficiency&nbsp;</span></strong></li><span data-dcnode-id="5810" instrument_node="">
</span></ol><span data-dcnode-id="5808" instrument_node="">
</span><p data-dcnode-id="5805"><span data-dcnode-id="5806"><span data-dcnode-id="5807" instrument_node="">These masks are designed to provide more than or equals to 95% protection. These masks are much better than the surgical masks and give almost the same performance as the N95 masks. Commonly you can find KN95 masks are more effective against virtually any kind of airborne particle, virus, or bacteria. The efficiency of KN95 masks passed every regulatory organization like FDA, CDC, etc.</span></span></p><span data-dcnode-id="5804" instrument_node="">
</span><p data-dcnode-id="5801"><span data-dcnode-id="5802"><span data-dcnode-id="5803" instrument_node="">The KN95 can be put on in no time. It fits perfectly around the nose and face.&nbsp;</span></span></p><span data-dcnode-id="5800" instrument_node="">
</span><p data-dcnode-id="5797"><span data-dcnode-id="5798"><span data-dcnode-id="5799" instrument_node="">Most people do not cover the nose, which is not exactly good practice. If you inhale the virus through your nostrils, there are more chances of getting infected.&nbsp;</span></span></p><span data-dcnode-id="5796" instrument_node="">
</span><ol data-dcnode-id="5790" start="3"><span data-dcnode-id="5795" instrument_node="">
</span><li data-dcnode-id="5792"><strong data-dcnode-id="5793"><span data-dcnode-id="5794" instrument_node=""> WHO Approves</span></strong></li><span data-dcnode-id="5791" instrument_node="">
</span></ol><span data-dcnode-id="5789" instrument_node="">
</span><p data-dcnode-id="5786"><span data-dcnode-id="5787"><span data-dcnode-id="5788" instrument_node="">WHO had provided many regulations to follow about making or using respirators/masks to prevent coronavirus. So far, they have made sure that the KN95 masks can protect from COVID-19 infection and prevent it from spreading.&nbsp;</span></span></p><span data-dcnode-id="5785" instrument_node="">
</span><p data-dcnode-id="5782"><span data-dcnode-id="5783"><span data-dcnode-id="5784" instrument_node="">Health workers from all over the world are using KN95 as their primary protection. But keep in mind that it is not reusable!</span></span></p><span data-dcnode-id="5781" instrument_node="">
</span><ol data-dcnode-id="5775" start="4"><span data-dcnode-id="5780" instrument_node="">
</span><li data-dcnode-id="5777"><strong data-dcnode-id="5778"><span data-dcnode-id="5779" instrument_node=""> Recyclable&nbsp;</span></strong></li><span data-dcnode-id="5776" instrument_node="">
</span></ol><span data-dcnode-id="5774" instrument_node="">
</span><p data-dcnode-id="5771"><span data-dcnode-id="5772"><span data-dcnode-id="5773" instrument_node="">All the materials used in KN95 masks are recyclable. So these masks will not harm Mother Nature. Of course, you need to choose a brand that provides good-quality KN-95 masks. Did you know that the materials used to make this mask can be recycled into new fabric and produce new masks? Also, those materials will thoroughly mix with the earth if disposed of without harming.</span></span></p><span data-dcnode-id="5770" instrument_node="">
</span><p data-dcnode-id="5767"><strong data-dcnode-id="5768"><span data-dcnode-id="5769" instrument_node="">Takeaway Advice&nbsp;</span></strong></p><span data-dcnode-id="5766" instrument_node="">
</span><p data-dcnode-id="5763"><span data-dcnode-id="5764"><span data-dcnode-id="5765" instrument_node="">COVID-19 changed our life completely. It's been a year since it entered our planet and took several lives. Even though vaccinations are being administered, the virus is still out in the open. There are many active cases still.&nbsp;</span></span></p><span data-dcnode-id="5762" instrument_node="">
</span><p data-dcnode-id="5759"><span data-dcnode-id="5760"><span data-dcnode-id="5761" instrument_node="">Masks will be a part of our life from now on. Hence, you must invest in a good-quality one. Also, we will have to make sure that we are using the right products for our health safety.</span></span></p><span data-dcnode-id="5758" instrument_node="">
</span><p data-dcnode-id="5755"><span data-dcnode-id="5756"><span data-dcnode-id="5757" instrument_node="">In public opinion, the KN95 is the most favored mask in the market right now. People are saying that it is as easy to use and reliable as the WHO endorsed it.&nbsp;</span></span></p><span data-dcnode-id="5754" instrument_node="">
</span><p data-dcnode-id="5751"><span data-dcnode-id="5752"><span data-dcnode-id="5753" instrument_node="">Overall the KN95 provides safety to the public from COVID-19 and makes life a little bit easier in this global pandemic. Everyone should use it to stay protected! Despite the COVID-19 scare, offices are running, and schools/colleges are reopening in different parts of the globe.&nbsp;</span></span></p><span data-dcnode-id="5750" instrument_node="">
</span><p data-dcnode-id="5747"><span data-dcnode-id="5748"><span data-dcnode-id="5749" instrument_node="">If you want to stay healthy and protected, invest in a KN95 mask.&nbsp;</span></span></p><span data-dcnode-id="5746" instrument_node="">
</span></div><span data-dcnode-id="5744" instrument_node="">
</span><div data-dcnode-id="5733" style="display: none;"><span data-dcnode-id="5743" instrument_node="">

</span><textarea data-dcnode-id="5672" id="edit_page_content" name="eportfolio_entry[content]" style="width: 98%; height: 300px;">&lt;span data-dcnode-id="5673" instrument_node=""&gt;[{:section_type=&gt;"rich_text", :content=&gt;"&lt;p&gt;&lt;span&gt;The ending of COVID-19 is not seen s. This pandemic is creating more demand. When WHO declared the preventive guidelines for people and instructed them to use a protective mask, the inhabitants started to buy the recommended masks and using hand sanitizers. The demand has risen ever since, and it is not going to go down anytime soon.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;&lt;span&gt;KN95 is the expected standard in China.&amp;nbsp; Some of the regular &lt;/span&gt;&lt;a class=\"external\" href=\"https://www.hopehealthsupply.com/\" target=\"_blank\"&gt;&lt;span&gt;&lt;span&gt;KN95 masks&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span&gt;&amp;nbsp;are - GB2626-2006, GB262-2019, and GB19083-2010. Using a KN95 mask will give protection from all particles greater than 0.3 µm in diameter. The first KN95 masks came into the picture in April 2020, and the entire globe has been using them to stay far away from the infection.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;&lt;span&gt;It features five layers of protection and doesn't do any harm to the skin.&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;&lt;span&gt;Considering we are talking about KN95 masks, it will be fruitful to share the four benefits. Let's get started!&amp;nbsp;&lt;/span&gt;&lt;/p&gt;\n&lt;h2&gt;&lt;strong&gt;The 4 Benefits of KN95 Masks - EXPLAINED&amp;nbsp;&lt;/strong&gt;&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;strong&gt; It's a Multi-layered Mask&lt;/strong&gt;&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;&lt;span&gt;KN95 is a multi-layered mask that generally has five-layer protection. Best quality, the nonwoven fabric used to make those layers of protection. The fabric is also hot air cotton and melt-blown fabric, which is hydrophobic and waterproof. The hot air cotton is there to make sure lower air velocity, and it is also soft for the skin. The rest of the layers performs particle filtration with hypo-allergic molecules.&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;&lt;span&gt;A layered fabric construction contributes to its filtering efficiency with a better-designed mask. It is a 3D-designed mask with an adjustable nose clip which helps to fit better, and the elastic ear loop keeps the mask better positioned and tight.&lt;/span&gt;&lt;/p&gt;\n&lt;ol start=\"2\"&gt;\n&lt;li&gt;&lt;strong&gt; Efficiency&amp;nbsp;&lt;/strong&gt;&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;&lt;span&gt;These masks are designed to provide more than or equals to 95% protection. These masks are much better than the surgical masks and give almost the same performance as the N95 masks. Commonly you can find KN95 masks are more effective against virtually any kind of airborne particle, virus, or bacteria. The efficiency of KN95 masks passed every regulatory organization like FDA, CDC, etc.&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;&lt;span&gt;The KN95 can be put on in no time. It fits perfectly around the nose and face.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;&lt;span&gt;Most people do not cover the nose, which is not exactly good practice. If you inhale the virus through your nostrils, there are more chances of getting infected.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;\n&lt;ol start=\"3\"&gt;\n&lt;li&gt;&lt;strong&gt; WHO Approves&lt;/strong&gt;&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;&lt;span&gt;WHO had provided many regulations to follow about making or using respirators/masks to prevent coronavirus. So far, they have made sure that the KN95 masks can protect from COVID-19 infection and prevent it from spreading.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;&lt;span&gt;Health workers from all over the world are using KN95 as their primary protection. But keep in mind that it is not reusable!&lt;/span&gt;&lt;/p&gt;\n&lt;ol start=\"4\"&gt;\n&lt;li&gt;&lt;strong&gt; Recyclable&amp;nbsp;&lt;/strong&gt;&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;&lt;span&gt;All the materials used in KN95 masks are recyclable. So these masks will not harm Mother Nature. Of course, you need to choose a brand that provides good-quality KN-95 masks. Did you know that the materials used to make this mask can be recycled into new fabric and produce new masks? Also, those materials will thoroughly mix with the earth if disposed of without harming.&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Takeaway Advice&amp;nbsp;&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;&lt;span&gt;COVID-19 changed our life completely. It's been a year since it entered our planet and took several lives. Even though vaccinations are being administered, the virus is still out in the open. There are many active cases still.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;&lt;span&gt;Masks will be a part of our life from now on. Hence, you must invest in a good-quality one. Also, we will have to make sure that we are using the right products for our health safety.&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;&lt;span&gt;In public opinion, the KN95 is the most favored mask in the market right now. People are saying that it is as easy to use and reliable as the WHO endorsed it.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;&lt;span&gt;Overall the KN95 provides safety to the public from COVID-19 and makes life a little bit easier in this global pandemic. Everyone should use it to stay protected! Despite the COVID-19 scare, offices are running, and schools/colleges are reopening in different parts of the globe.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;&lt;span&gt;If you want to stay healthy and protected, invest in a KN95 mask.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;"}]&lt;/span&gt;</textarea><span data-dcnode-id="5671" instrument_node="">

            the window (</span><a class="sections_list_hover" data-dcnode-id="185" href="#"><b data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">show me</span></b></a><span data-dcnode-id="184" instrument_node="">). Each section can have multiple pages,
            shown on the right side of the window (</span><a class="pages_list_hover" data-dcnode-id="181" href="#"><b data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">show me</span></b></a><span data-dcnode-id="180" instrument_node="">).
        </span></div><span data-dcnode-id="178" instrument_node="">
</span></li><span data-dcnode-id="176" instrument_node="">
</span><li class="option content_step portfolio_step" data-dcnode-id="147"><span data-dcnode-id="175" instrument_node="">
</span><a class="header icon-document" data-dcnode-id="173" href="#"><span data-dcnode-id="174" instrument_node="">Portfolio Sections</span></a><span data-dcnode-id="172" instrument_node="">
</span><div class="details" data-dcnode-id="149" style="display: none;"><span data-dcnode-id="171" instrument_node="">
</span><div data-dcnode-id="151" style="font-size: 0.8em;"><span data-dcnode-id="170" instrument_node="">
</span><p data-dcnode-id="160"><span data-dcnode-id="169" instrument_node="">Sections are listed along the left side of the window
              (</span><a class="sections_list_hover" data-dcnode-id="166" href="#"><b data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">show me</span></b></a><span data-dcnode-id="165" instrument_node="">). Each section can have multiple pages inside of it.
              To organize or add sections, click the "Organize Sections" link
              (</span><a class="organize_sections_hover" data-dcnode-id="162" href="#"><b data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">show me</span></b></a><span data-dcnode-id="161" instrument_node="">).</span></p><span data-dcnode-id="159" instrument_node="">
</span><p data-dcnode-id="153"><span data-dcnode-id="158" instrument_node="">You can rename any section by clicking on the </span><i class="icon-edit" data-dcnode-id="157"></i><span data-dcnode-id="156" instrument_node=""> icon
              that appears, rearrange sections by clicking and dragging them,
              or delete sections by clicking the </span><i class="icon-end" data-dcnode-id="155"></i><span data-dcnode-id="154" instrument_node=""> icon.</span></p><span data-dcnode-id="152" instrument_node="">
</span></div><span data-dcnode-id="150" instrument_node="">
</span></div><span data-dcnode-id="148" instrument_node="">
</span></li><span data-dcnode-id="146" instrument_node="">
</span><li class="option content_step section_step" data-dcnode-id="119"><span data-dcnode-id="145" instrument_node="">
</span><a class="header icon-document" data-dcnode-id="143" href="#"><span data-dcnode-id="144" instrument_node="">Section Pages</span></a><span data-dcnode-id="142" instrument_node="">
</span><div class="details" data-dcnode-id="121" style="display: none;"><span data-dcnode-id="141" instrument_node="">
</span><div data-dcnode-id="123" style="font-size: 0.8em;"><span data-dcnode-id="140" instrument_node="">
</span><p data-dcnode-id="130"><span data-dcnode-id="139" instrument_node="">Sections have multiple pages. You can see the list of pages for
              the current section on the right side of the window (</span><a class="pages_list_hover" data-dcnode-id="136" href="#"><b data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">show me</span></b></a><span data-dcnode-id="135" instrument_node="">).
              To organize or add pages, click the "Organize/Manage Pages" link
              (</span><a class="organize_pages_hover" data-dcnode-id="132" href="#"><b data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">show me</span></b></a><span data-dcnode-id="131" instrument_node="">).</span></p><span data-dcnode-id="129" instrument_node="">
</span><p data-dcnode-id="125"><span data-dcnode-id="128" instrument_node="">You can rename any page by click on the </span><i class="icon-edit" data-dcnode-id="127"></i><span data-dcnode-id="126" instrument_node=""> icon that
              appears, delete a page by clicking the × icon, or
              rearrange the order of pages by click and dragging them.</span></p><span data-dcnode-id="124" instrument_node="">
</span></div><span data-dcnode-id="122" instrument_node="">
</span></div><span data-dcnode-id="120" instrument_node="">
</span></li><span data-dcnode-id="118" instrument_node="">
</span><li class="option edit_step" data-dcnode-id="104"><span data-dcnode-id="117" instrument_node="">
</span><a class="header" data-dcnode-id="115" href="#"><span data-dcnode-id="116" instrument_node="">Page Content</span></a><span data-dcnode-id="114" instrument_node="">
</span><div class="details" data-dcnode-id="106" style="display: none;"><span data-dcnode-id="113" instrument_node="">
            The content you see on a page is the same content any visitors
              will see. To edit this content, click the "</span><i class="icon-edit" data-dcnode-id="112"></i><span data-dcnode-id="111" instrument_node=""> Edit This Page"
              link (</span><a class="edit_content_hover" data-dcnode-id="108" href="#"><b data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">show me</span></b></a><span data-dcnode-id="107" instrument_node="">) and the page will change to editing mode.
          </span></div><span data-dcnode-id="105" instrument_node="">
</span></li><span data-dcnode-id="103" instrument_node="">
</span><li class="option editing_mode" data-dcnode-id="67" style="display: none;"><span data-dcnode-id="102" instrument_node="">

</span><div class="details" data-dcnode-id="69" style="display: none;"><span data-dcnode-id="98" instrument_node="">
</span><div data-dcnode-id="71" style="font-size: 0.8em;"><span data-dcnode-id="97" instrument_node="">
</span><p data-dcnode-id="87"><span data-dcnode-id="96" instrument_node="">Now you're editing! Rename the page or change commenting
                options (</span><a class="page_settings_hover" data-dcnode-id="93" href="#"><b data-dcnode-id="94"><span data-dcnode-id="95" instrument_node="">show me</span></b></a><span data-dcnode-id="92" instrument_node="">) if you like. You can save, preview or
                cancel your changes at any time by clicking the button on the
                right side (</span><a class="page_buttons_hover" data-dcnode-id="89" href="#"><b data-dcnode-id="90"><span data-dcnode-id="91" instrument_node="">show me</span></b></a><span data-dcnode-id="88" instrument_node="">).</span></p><span data-dcnode-id="86" instrument_node="">
</span><p data-dcnode-id="80"><span data-dcnode-id="85" instrument_node="">Content is divided into subsections, which each have a dotted
                border. You can delete or edit the contents of a subsection by
                clicking the </span><i class="icon-edit" data-dcnode-id="84"></i><span data-dcnode-id="83" instrument_node=""> or </span><img alt="Delete" data-dcnode-id="82" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//du11hjcvx0uqb.cloudfront.net/dist/images/delete-39059ba0a6.png&amp;raw"><span data-dcnode-id="81" instrument_node=""> icons at the top
                right corner of the subsection.</span></p><span data-dcnode-id="79" instrument_node="">
</span><p data-dcnode-id="73"><span data-dcnode-id="78" instrument_node="">To add new subsections, find and click the type of content you
                want to add in the options list on the right side of the page
                (</span><a class="page_add_subsection_hover" data-dcnode-id="75" href="#"><b data-dcnode-id="76"><span data-dcnode-id="77" instrument_node="">show me</span></b></a><span data-dcnode-id="74" instrument_node="">).</span></p><span data-dcnode-id="72" instrument_node="">
</span></div><span data-dcnode-id="70" instrument_node="">
</span></div><span data-dcnode-id="68" instrument_node="">
</span></li><span data-dcnode-id="66" instrument_node="">
</span><li class="option edit_step" data-dcnode-id="54"><span data-dcnode-id="65" instrument_node="">
</span><a class="header icon-settings" data-dcnode-id="63" href="#"><span data-dcnode-id="64" instrument_node="">ePortfolio Settings</span></a><span data-dcnode-id="62" instrument_node="">
</span><div class="details" data-dcnode-id="56" style="display: none;"><span data-dcnode-id="61" instrument_node="">
          To change the settings for your ePortfolio, click the "ePortfolio
            Settings" link (</span><a class="eportfolio_settings_hover" data-dcnode-id="58" href="#"><b data-dcnode-id="59"><span data-dcnode-id="60" instrument_node="">show me</span></b></a><span data-dcnode-id="57" instrument_node="">). You can rename the portfolio and also
            change whether it is public or private. Private portfolios are only

</span></li><span data-dcnode-id="53" instrument_node="">
