</span><p data-dcnode-id="583"><span data-dcnode-id="589" instrument_node="">For that reason, we combine technology, filtration innovation, and our own industry experience to implement premium quality </span><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aquaair.ab.ca/products/"><span data-dcnode-id="587" style="font-weight: 400;"><span data-dcnode-id="588" instrument_node="">filtration</span></span><span data-dcnode-id="586" instrument_node=""> systems</span></a><span data-dcnode-id="584" instrument_node=""> uniquely tailored to the needs of each of our customers across Edmonton and the surrounding Alberta regions. Furthermore, Aqua Air Systems offers the most energy-efficient Camfil air filter solutions available on the market today; from pre-filters, bag and box filters, to HEPA air filters.</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="581" instrument_node="">Our </span><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aquaair.ab.ca/contact/"><span data-dcnode-id="580" instrument_node="">filtration service</span></a><span data-dcnode-id="578" instrument_node=""> area extends across Western Canada, with a focus on the regions in Alberta North of Red Deer, including Edmonton, Fort Saskatchewan, Sherwood Park, Fort McMurray, Grande Prairie, and Yellowknife. Our filtration products deliver the finest indoor air quality, while simultaneously enabling building owners to reduce their energy consumption and carbon output.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="572"><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aquaair.ab.ca/products/"><span data-dcnode-id="575" instrument_node="">Air filters</span></a><span data-dcnode-id="573" instrument_node=""> and fume or vehicle exhaust removal are a truly essential part of our business. That’s why our goal is to provide our Alberta customers with clean air that is free of harmful dust, pollution, allergens, viruses, welding smoke, vehicle exhaust, and other contaminants. We carry a wide range of air treatment and fume removal filtration product lines, including Camfil, GPS, and Plymovent.</span></p><span data-dcnode-id="571" instrument_node="">
</span><div data-dcnode-id="530"><span data-dcnode-id="570" instrument_node="">
</span><h2 data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Reduce the Spread of Contaminants with an air purifier or air filter system</span></h2><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="566" instrument_node="">Proper </span><span data-dcnode-id="564" style="font-weight: 400;"><span data-dcnode-id="565" instrument_node="">air purification</span></span><span data-dcnode-id="563" instrument_node=""> is crucial to a well-run facility as well as a healthy indoor air environment. Our experienced and fully-trained air treatment experts take a preventative approach to protecting your Alberta air quality. The end result is that pure, clean air is delivered throughout your space on a steady, reliable basis.</span></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="560" instrument_node="">If that isn’t enough reason, remember, optimized </span><span data-dcnode-id="558" style="font-weight: 400;"><span data-dcnode-id="559" instrument_node="">air purification and filtration</span></span><span data-dcnode-id="557" instrument_node=""> systems can prevent disastrous equipment failures and costly shutdowns.</span></p><span data-dcnode-id="555" instrument_node="">
</span><h4 data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Discover how an air purifier system can help your home</span></h4><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="551" instrument_node="">Spending extended periods of time indoors without access to fresh air can make you feel tired and lethargic. High-quality </span><span data-dcnode-id="549" style="font-weight: 400;"><span data-dcnode-id="550" instrument_node="">air purification</span></span><span data-dcnode-id="548" instrument_node=""> preserves your equipment, safeguards the environment, and most importantly, protects your people. Our experience and commitment to air purification knows no bounds. That’s why we supply Alberta with complete </span><span data-dcnode-id="546" style="font-weight: 400;"><span data-dcnode-id="547" instrument_node="">air purification</span></span><span data-dcnode-id="545" instrument_node=""> products and systems that provide the best performance, capacity, and filtration efficiency for your dollar.</span></p><span data-dcnode-id="543" instrument_node="">
</span><h2 data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Visit Aqua Air for your HVAC and Air treatment needs today!</span></h2><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">At Aqua Air Systems, it is our goal is to provide our customers with high-quality, energy-efficient filtration systems and air purifier products, as well as deliver excellent service with the latest air treatment technology and develop long-lasting relationships.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">We specialize in critical environment filtration systems and air treatment products for laboratories, hospitals, pharmaceutical manufacturers, airports, educational institutions, theatres, and anywhere that quality air delivery and filtration systems are essential. Our state-of-the-art air treatment products include digital critical airflow control systems, custom-designed air handling systems, containment filtration systems, specialized exhaust fans, and fume filtration. New filtration technologies available include custom-designed air handling systems for new and retrofit applications.</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Contact Aqua Air for all your air delivery and filtration system needs!</span></p><span data-dcnode-id="531" instrument_node="">

</span><h4 class="obj-li-title obj-trigger" data-dcnode-id="481"><span data-dcnode-id="486" instrument_node="">Why is it important to have proper filtration tools in my home or buildings?                </span><a class="accordion-toggle" data-dcnode-id="485" href="#content-why-is-it-important-to-have-proper-filtration-tools-in-my-home-or-buildings"></a><span data-dcnode-id="484" instrument_node="">

</span><div class="obj-target obj-content-custom accordion-content" data-dcnode-id="469"><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="478" instrument_node="">There are many benefits to having </span><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">purified air</span></strong><span data-dcnode-id="475" instrument_node=""> in your Alberta home or workplace. Effective </span><span data-dcnode-id="473" style="font-weight: 400;"><span data-dcnode-id="474" instrument_node="">air purification</span></span><span data-dcnode-id="472" instrument_node=""> can mitigate many health hazards caused by chemicals, and other air pollutants. In turn, this can limit symptoms such as headaches, eye irritation, allergies, and fatigue which can all be due to the air in your home or workplaces not being clean enough.</span></p><span data-dcnode-id="470" instrument_node="">

</span><h1 class="obj-li-title obj-trigger" data-dcnode-id="459"><span data-dcnode-id="464" instrument_node="">Can air filtration systems reduce asthma symptoms?                </span><a class="accordion-toggle" data-dcnode-id="463" href="#content-can-air-filtration-systems-reduce-asthma-symptoms"></a><span data-dcnode-id="462" instrument_node="">
</span><i class="fas fa-caret-down" data-dcnode-id="461"></i><span data-dcnode-id="460" instrument_node="">
</span></h1><span data-dcnode-id="458" instrument_node="">
</span><div class="obj-target obj-content-custom accordion-content" data-dcnode-id="444"><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="456" instrument_node="">Depending on the model of the </span><strong data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">air purification system</span></strong><span data-dcnode-id="453" instrument_node=""> and air filters you utilize in your Alberta buildings, air treatment can be effective in preventing asthma symptoms and allergies. Filtration of airborne pollutants like pollen, dust, and animal dander can limit asthma symptoms and allergic reactions of the people in your building.</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="450" instrument_node="">See our </span><span data-dcnode-id="448" style="font-weight: 400;"><span data-dcnode-id="449" instrument_node="">air purification</span></span><span data-dcnode-id="447" instrument_node=""> products with high-efficiency MERV filters and pathogen-killing filtration technology for heightened indoor air quality.</span></p><span data-dcnode-id="445" instrument_node="">

</span></h3><span data-dcnode-id="433" instrument_node="">
</span><div class="obj-target obj-content-custom accordion-content" data-dcnode-id="419"><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="431" instrument_node="">The minimum efficiency reporting value is a number from 1 to 16 that is relative to an air filter’s efficiency based upon particle size. The higher the </span><b data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">MERV</span></b><span data-dcnode-id="428" instrument_node=""> rating, the more efficient the air filter is at removing particles. Although there are air filters that are MERV 16 through 20, they are usually only found in hospitals, clean rooms, and nuclear power plants. For home air filtration systems, most are rated anywhere between MERV 5 and 13.</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">The air filter rating is derived from a test method developed by the American Society of Heating, Refrigerating, and Air Conditioning Engineers (ASHRAE) in 1987. If your air filter has a high MERV rating, it’s very effective in preventing things like pollen, bacteria and pet dander from circulating throughout your building.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">However, your air filter might be so effective that it prevents air itself from circulating. The result could be less air circulation and decreased overall air quality in your home or workplace.</span></p><span data-dcnode-id="420" instrument_node="">
</span></div><span data-dcnode-id="418" instrument_node="">
</span></div><span data-dcnode-id="416" instrument_node="">
</span><div class="obj-li" data-dcnode-id="401" id="content-how-does-the-energy-cost-index-or-eci-rating-affect-my-air-treatment-system"><span data-dcnode-id="415" instrument_node="">
</span><h3 class="obj-li-title obj-trigger" data-dcnode-id="409"><span data-dcnode-id="414" instrument_node="">How does the Energy Cost Index or ECI rating affect my air treatment system?                </span><a class="accordion-toggle" data-dcnode-id="413" href="#content-how-does-the-energy-cost-index-or-eci-rating-affect-my-air-treatment-system"></a><span data-dcnode-id="412" instrument_node="">
</span><i class="fas fa-caret-down" data-dcnode-id="411"></i><span data-dcnode-id="410" instrument_node="">
</span></h3><span data-dcnode-id="408" instrument_node="">
</span><div class="obj-target obj-content-custom accordion-content" data-dcnode-id="403"><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">This air filter rating system examines the filter’s efficiency over its service lifetime, as well as the energy required to move air through that specific filter. Specifically, the formula is dollars per percent of air filter efficiency. The lower the value, the better the air filter.</span></p><span data-dcnode-id="404" instrument_node="">
</span></div><span data-dcnode-id="402" instrument_node="">
</span></div><span data-dcnode-id="400" instrument_node="">
</span><div class="obj-li" data-dcnode-id="382" id="content-can-purification-systems-get-rid-of-odour-in-my-home"><span data-dcnode-id="399" instrument_node="">
</span><h4 class="obj-li-title obj-trigger" data-dcnode-id="393"><span data-dcnode-id="398" instrument_node="">Can purification systems get rid of odour in my home?                </span><a class="accordion-toggle" data-dcnode-id="397" href="#content-can-purification-systems-get-rid-of-odour-in-my-home"></a><span data-dcnode-id="396" instrument_node="">
</span><i class="fas fa-caret-down" data-dcnode-id="395"></i><span data-dcnode-id="394" instrument_node="">
</span></h4><span data-dcnode-id="392" instrument_node="">
</span><div class="obj-target obj-content-custom accordion-content" data-dcnode-id="384"><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="390" instrument_node="">If installed with the correct air filters, </span><span data-dcnode-id="388" style="font-weight: 400;"><span data-dcnode-id="389" instrument_node="">air purification</span></span><span data-dcnode-id="387" instrument_node=""> systems can remove unpleasant or harmful odours from your home or workplace. Filters that are made with carbon, like those usually found in HEPA filters, are an effective way to eliminate harmful gases, molecules, chemicals, fumes and odours from the air.</span></p><span data-dcnode-id="385" instrument_node="">
</span></div><span data-dcnode-id="383" instrument_node="">
</span></div><span data-dcnode-id="381" instrument_node="">
</span><div class="obj-li" data-dcnode-id="366" id="content-what-are-hepa-air-filter-products"><span data-dcnode-id="380" instrument_node="">
</span><h5 class="obj-li-title obj-trigger" data-dcnode-id="374"><span data-dcnode-id="379" instrument_node="">What are HEPA air filter products?                </span><a class="accordion-toggle" data-dcnode-id="378" href="#content-what-are-hepa-air-filter-products"></a><span data-dcnode-id="377" instrument_node="">
</span><i class="fas fa-caret-down" data-dcnode-id="376"></i><span data-dcnode-id="375" instrument_node="">
</span></h5><span data-dcnode-id="373" instrument_node="">
</span><div class="obj-target obj-content-custom accordion-content" data-dcnode-id="368"><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">HEPA air filters are a high-efficiency particulate air filter. They are manufactured using recommended practices published by the Institute of Environmental Technologies, not ASHRAE.</span></p><span data-dcnode-id="369" instrument_node="">
</span></div><span data-dcnode-id="367" instrument_node="">
</span></div><span data-dcnode-id="365" instrument_node="">
</span><div class="obj-li" data-dcnode-id="350" id="content-what-is-an-electrostatic-air-filter"><span data-dcnode-id="364" instrument_node="">
</span><h5 class="obj-li-title obj-trigger" data-dcnode-id="358"><span data-dcnode-id="363" instrument_node="">What is an Electrostatic Air Filter?                </span><a class="accordion-toggle" data-dcnode-id="362" href="#content-what-is-an-electrostatic-air-filter"></a><span data-dcnode-id="361" instrument_node="">
</span><i class="fas fa-caret-down" data-dcnode-id="360"></i><span data-dcnode-id="359" instrument_node="">
</span></h5><span data-dcnode-id="357" instrument_node="">
</span><div class="obj-target obj-content-custom accordion-content" data-dcnode-id="352"><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Electrostatic air filters use a larger fibre size that is charged during manufacture to enhance its filtration efficiency.</span></p><span data-dcnode-id="353" instrument_node="">
</span></div><span data-dcnode-id="351" instrument_node="">
</span></div><span data-dcnode-id="349" instrument_node="">
</span></div><span data-dcnode-id="347" instrument_node="">
</span></div><span data-dcnode-id="345" instrument_node="">
</span></div><span data-dcnode-id="343" instrument_node="">
</span><span data-dcnode-id="340" instrument_node="">
</span></div><span data-dcnode-id="338" instrument_node="">
</span></div></div></div></div></div></div></div></div><div class="vc_row-full-width vc_clearfix" data-dcnode-id="329"></div><div class="vc_row wpb_row vc_row-fluid row-subscribe vc_custom_1557997415813 vc_row-has-fill" data-dcnode-id="259" data-vc-full-width="true" data-vc-full-width-init="true" style="position: relative; left: -15px; box-sizing: border-box; width: 1024px; padding-left: 15px; padding-right: 15px;"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="260"><div class="vc_column-inner" data-dcnode-id="261"><div class="wpb_wrapper" data-dcnode-id="262"><div class="obj obj-extra-content default" data-dcnode-id="273"><span data-dcnode-id="328" instrument_node="">
