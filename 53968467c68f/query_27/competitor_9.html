ecommended something else, but when I remembered the thing cleans air down to 0.1 microns, I changed my mind. But this is something I don’t like about this otherwise awesome filtration beast.</span></p><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">With this design, the air enters via the back, gets worked on, and exits via the front. For that reason, you won’t want to place this device behind a wall.</span></p><p data-dcnode-id="1414"><strong data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Note</span></strong><span data-dcnode-id="1415" instrument_node="">: the unit comes loaded with the filter already. But you shouldn’t start using the machine before removing the filter from its plastic cover. So, remove the lid at the back and take the 3-in-1 filter out. Next, remove the plastic cover and then reinsert the filter into place. Finally, plug the device in.</span></p><p data-dcnode-id="1410"><strong data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Another thing</span></strong><span data-dcnode-id="1411" instrument_node="">: make sure the tabs are sticking out when inserting the filter. That makes filter replacement very easy. And that goes for all other Medifys.</span></p><h2 data-dcnode-id="1406"><span class="ez-toc-section" data-dcnode-id="1409" id="4-Medify-MA-112-True-HEPA-H13-Review"></span><span data-dcnode-id="1408" instrument_node="">4. Medify MA-112 True HEPA H13 Review</span><span class="ez-toc-section-end" data-dcnode-id="1407"></span></h2><p data-dcnode-id="1399"><strong data-dcnode-id="1400"><span data-dcnode-id="1405" instrument_node="">Editor’s Rate: </span><img alt="4.5 out of 5 stars" class="usr" data-dcnode-id="1404" data-lazyloaded="1" data-src="https://dustfreerooms.com/wp-content/plugins/universal-star-rating/includes/image.php?img=01.png&amp;px=12&amp;max=5&amp;rat=4.5" src="data:image/gif;base64,R0lGODdhAQABAPAAAMPDwwAAACwAAAAAAQABAAACAkQBADs=" style="height: 12px !important;"><noscript data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">&lt;img class="usr" src="https://dustfreerooms.com/wp-content/plugins/universal-star-rating/includes/image.php?img=01.png&amp;amp;px=12&amp;amp;max=5&amp;amp;rat=4.5" alt="4.5 out of 5 stars" style="height: 12px !important;" /&gt;</span></noscript><span data-dcnode-id="1401" instrument_node=""> (4.5 / 5)</span></strong></p><h2 data-dcnode-id="1395"><span class="ez-toc-section" data-dcnode-id="1398" id="A-Quick-Overview-3"></span><span data-dcnode-id="1397" instrument_node="">A Quick Overview</span><span class="ez-toc-section-end" data-dcnode-id="1396"></span></h2><ul data-dcnode-id="1362"><li data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Dimensions: 15.3″ D x 15.7″ W x 28.3″ H</span></li><li data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Weight: 33.5 lbs</span></li><li data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Design: Rectangular, sleek, modern</span></li><li data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Color: Silver</span></li><li data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Filters: 2 prefilters, 2 True HEPA H13 filters, 2 activated carbon filters</span></li><li data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Filter Life: 6 months</span></li><li data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Air Quality Sensor: YES</span></li><li data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Smart Features: No</span></li><li data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">4 speeds</span></li><li data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Timer:YES</span></li><li data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Ionizer: YES</span></li><li data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Child Lock:YES</span></li><li data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Has Wheels</span></li><li data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Purification coverage: 2,400 sq ft</span></li><li data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">CADR: 950</span></li><li data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Energy Star rated: YES</span></li></ul><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Despite being the priciest, the Medify-112 is the most popular Medify indoor air pollution eliminator. It’s also the heaviest, and about 1.5″ shorter than the MA-440.</span></p><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Luckily, it has hidden wheels that make wheeling it to where it’s needed a breeze. I like that the wheels stay hidden from view.</span></p><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">It’s not bulky, though. It stays out of the way.</span></p><p data-dcnode-id="1347"><span data-dcnode-id="1355" instrument_node="">And yes, this purifier is pricey. It costs over $700 as of this date. But it delivers. I can’t think of a more accurate description for it than the following: </span><strong data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Cute</span></strong><span data-dcnode-id="1352" instrument_node="">, </span><strong data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">C</span></strong><b data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">ompact, Modern, and Powerful.</span></b></p><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Yes, the thing is damn powerful. It moves an insane volume of air on its highest setting. But on that setting, it’s intolerably loud.</span></p><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">On low, most new owners are surprised that such a powerful machine is that quiet. On medium, the noise increases significantly. However, its not worse than white noise that drowns out other noises. In fact, many people like running their machine on medium when going to bed. They say the noise lulls them to sleep.</span></p><p data-dcnode-id="1339"><span data-dcnode-id="1342" instrument_node="">Unlike its siblings, this unit uses 2 prefilters, 2 substantial carbon filters, and 2 H13 HEPA filters. It features two sets of powerful filters, 3 behind the front panel and 3 at the back.</span><strong data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node=""> I’m talking of 6 filters here. </span></strong></p><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Evidently, the MA-112 takes air filtration to a whole new level. That’s another reason I believe it’s the best Medify there is as of this writing.</span></p><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">The device draws dirty air in from two sides, the front and back. Do you know what that means? It means more comprehensive air filtration. The MA-112 is the fastest and most powerful MedifyAir air cleaner.</span></p><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Can you believe it changes the air in a 2,400 sq ft enclosed space 2 times every hour? And in a 1,200 sq ft room, the occupants see 4 air changes in 1 hour.</span></p><p data-dcnode-id="1327"><span data-dcnode-id="1332" instrument_node="">Doesn’t that sound like the</span><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dustfreerooms.com/basement-air-purifier/"><strong data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node=""> best air purifier for a stuffy basement</span></strong></a><span data-dcnode-id="1328" instrument_node="">?</span></p><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">The unit’s 2 H13 HEPA filters remove up to 99.97% of particles with a diameter of 0.3 microns or larger. But what makes these filters special? What makes them superior to True HEPA filters? It’s because they offer a more thorough filtration. These filters have been tested to eliminate up to 99.95% of 0.1-micron particles or larger. This is the one fact that sets Medifys apart from every other category of PRAC (portable room air cleaners).</span></p><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Do you live next to someone who smokes cigarettes or even marijuana? &nbsp;Yea, I know how that must feel. The smell seeps into your space the whole time they’re having fun. And that annoys you no end. But it’s their apartment, and they’ll continue having fun whenever they want.</span></p><p data-dcnode-id="1315"><span data-dcnode-id="1322" instrument_node="">Well, </span><a data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//no-smoke.org/smoker-next-door/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1321" instrument_node="">you could sue them</span></a><span data-dcnode-id="1319" instrument_node="">, according to the </span><strong data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">American Nonsmokers’ Rights Association</span></strong><span data-dcnode-id="1316" instrument_node="">. Strictly speaking, though, no law bars people from smoking in their apartment. But wait, do you you live in a multi-family property?&nbsp; With respect to such housing, some states and municipalities prohibit smoking in common areas.</span></p><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">You could sue the landlord and argue that they’ve let the place become inhabitable.&nbsp; Or the weed-loving neighbor and argue that their habit interferes with some of your rights.&nbsp; But court cases can drain you emotionally and economically. Plus, judges sometimes rule in favor of the smoker. Suing your smoking neighbor isn’t worth the hassle in most cases.</span></p><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">So, what’ll you do? Try out the Medify MA-112. You’ll love it.</span></p><p data-dcnode-id="1306"><span data-dcnode-id="1310" instrument_node="">Whether your problem is pet odors, marijuana smoke, wildfire smoke, or toxic exhaust fumes, the MA-112 is the real deal. </span><strong data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">I’ll let you in on a little secret</span></strong><span data-dcnode-id="1307" instrument_node="">. Of all the recommendations I’ve ever given on this website, the Medify-114 has received the most attention.</span></p><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">My readers buy tons of these air purifiers, and that’s no accident. Within 48 hours, your indoor air should feel a lot more fresher and cleaner than it’s ever been. This is probably the finest and most powerful air purifier in that price range.</span></p><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">How large is your moldy basement? 600 sq ft? Don’t worry. Just grab this beast. It has a CADR of 950, and you likely won’t find a better deal at that price. The manufacturer says to use the device for spaces as large as 1200 sq. ft. But my advice is use it for a smaller space to boost effectiveness.</span></p><p data-dcnode-id="1297"><span data-dcnode-id="1301" instrument_node="">Let’s ignore what the manufacturer says and focus</span><strong data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node=""> on AHAM’s 2/3 rule</span></strong><span data-dcnode-id="1298" instrument_node="">. If we follow this rule, we see that this device is best suited for rooms with a square footage of 633. That is, (2/3 x 950). As you can see, the device works best for basements measuring about 600–650 sq. ft.</span></p><p data-dcnode-id="1292"><span data-dcnode-id="1296" instrument_node="">Want to know what would happen if you selected the highest fan speed? You’d get an ACH of 8,. Yes, that’s right, you’d get </span><strong data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">8 air changes per hour</span></strong><span data-dcnode-id="1293" instrument_node="">. You can now see why I said the machine a monster.</span></p><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Like all Medifys, this purifier comes with a filter replacement reminder. Also, it has an air quality sensor that changes color depending on how clean or dirty the place is.</span></p><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">When the room is too dirty, the color shown is red. If the air quality is neither good nor bad, the color displayed is green. But when the machine finally purifies the air, the color turns blue. I feel that they should have used green for Good and blue for Fair.</span></p><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">In addition, the device shows you real-time PM2.5 numbers. You’ll see an actual number representing the actual air quality situation in your room. The higher the reading, the worse the quality is and vice versa. I like that the unit shows real-time PM2.5 numbers. These particles are very dangerous because they’re much smaller than PM10. If not controlled, they’ll finally end up in the body’s most sensitive organs including the heart and brain.</span></p><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">The unit’s easy-to-use panel is the first thing you see when standing next to this thing. It features 6 clearly marked buttons, which makes using the machine completely pain-free.&nbsp; The first button is the On/Off followed by speed setting one. The next one is the auto mode button followed by the 1, 2, 4, or 8-hour timer.</span></p><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Wouldn’t it be nice to be able to shut the thing off after a certain duration so you can save energy? The timer helps you do precisely that.</span></p><p data-dcnode-id="1277"><span data-dcnode-id="1281" instrument_node="">The auto mode offers lots of convenience. It’s a set and forget it feature that lets the machine operate itself. The auto mode button doubles up as a </span><strong data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">child lock. </span></strong><span data-dcnode-id="1278" instrument_node="">When you turn the feature on, your child can’t input a different setting.</span></p><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Changing the filter for the unit is incredibly easy, too. The nice thing about Medify filters is that they come in one cartridge. You won’t need to insert the 3 filters one after the other. Once you buy the replacement filters, tear the plastic cover and simply fit the cartridge inside the purifier. It’s that easy.</span></p><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Then there’s the night mode. Turning the night mode on dims the control panel’s brightness so you can sleep without issues. This mode also reduces device’s filtration speed so that it runs on low throughout the night.</span></p><p data-dcnode-id="1268"><span data-dcnode-id="1272" instrument_node="">Finally, you have the optional ionizer. Keep it turned off if asthma and allergic reactions bother you. If you have no breathing issues, consider leaving the ionizer turned on. It infuses the air with negative ions, and that has it feeling noticeably clean and </span><em data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">fresh</span></em><span data-dcnode-id="1269" instrument_node="">.</span></p><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">The ionizer gives off a little ozone, though. But the unit is CARB-tested and approved. That tells you that the concentrations pumped out never exceed safe levels (0.05 ppm).</span></p><h3 data-dcnode-id="1262"><span class="ez-toc-section" data-dcnode-id="1265" id="Maintenance-and-Energy-Consumption-2"></span><span data-dcnode-id="1264" instrument_node="">Maintenance and Energy Consumption</span><span class="ez-toc-section-end" data-dcnode-id="1263"></span></h3><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Change the filters twice each year or earlier if your air is really bad. Well, these filters are quite expensive. They’re selling at almost $140 on Amazon as of this writing. But you can get them at a slightly lower price on the manufacturer’s site. Since you’ll buy these filters twice a year, the total cost for filters would be $280.</span></p><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Luckily, this thing is Energy Star rated. It’s energy-efficient, and its rated power consumption is 95W. And that seems reasonable for a device this powerful. In a year, this sucks about 832.2 kWh of power.</span></p><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">If you multiply this number by 10 cents (assuming&nbsp; 1 kWh costs 10 cents), you get $83.22. The total cost of running this air purifier nonstop for 1 year is about $363.2. Well, that seems like a lot. I’d certainly not borrow to buy this. But if money isn’t tight for you, go for it. It’s worth every penny.</span></p><div class="wp-classic-pros-cons wppc-view3" data-dcnode-id="1202"><div class="wppc-boxs" data-dcnode-id="1203"><div class="wppc-box pros-content" data-dcnode-id="1219"><div class="wppc-header" data-dcnode-id="1249"><h4 class="wppc-content-title cons-title" data-dcnode-id="1250"><span class="ez-toc-section" data-dcnode-id="1253" id="Pros-4"></span><span data-dcnode-id="1252" instrument_node="">Pros</span><span class="ez-toc-section-end" data-dcnode-id="1251"></span></h4></div><ul class="wp-pros-cons-list wp-pros-list" data-dcnode-id="1220"><li class="joomdev_wpc_pro_single" data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Life Warranty</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Filter change indicator</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Wheels</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">360-degree cleaned air distribution</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Modern, easy-to-use controls</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Programmable timer</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Air quality sensor</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Real-time PM2.5 numbers shown</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">High CADR &amp; AHAM-tested</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Purifies a considerably large area</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Double filters</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Child safety lock</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Energy Star rated</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">CARB rated</span></li></ul></div><div class="wppc-box cons-content" data-dcnode-id="1204"><div class="wppc-header" data-dcnode-id="1214"><h4 class="wppc-content-title cons-title" data-dcnode-id="1215"><span class="ez-toc-section" data-dcnode-id="1218" id="Cons-4"></span><span data-dcnode-id="1217" instrument_node="">Cons</span><span class="ez-toc-section-end" data-dcnode-id="1216"></span></h4></div><ul class="wp-pros-cons-list wp-cons-list" data-dcnode-id="1205"><li class="joomdev_wpc_con_single" data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Not Wi-Fi enabled</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Not Alexa enabled</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Pricey</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Optional ionizer produces ozone</span></li></ul></div></div></div><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">For a device that pricey, I feel the MA-112 should offer smart features, specifically Wi-Fi and Alexa. What’s better than being able to use your smartphone to operate your device? And wouldn’t you love being able to say “Alexa, Tell Medify to turn fan speed to 3?</span></p><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">While these features don’t make the unit any less usable, it’d be really nice if they were included. However, this shouldn’t be a dealbreaker for most people. The many other great benefits the thing delivers sort of compensates for this.</span></p><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">And while it’s pricey, you can’t say the price seems excessive. For me, it’s a terrific machine with a reasonable price.</span></p><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">If it’s in your price range, buy it now. You’ll love it. I’d not be surprised if you came back here and order another Medify a month from now.</span></p><h2 data-dcnode-id="1190"><span class="ez-toc-section" data-dcnode-id="1193" id="5-Medify-440-Luxury-Spar-4-in-1-Review"></span><span data-dcnode-id="1192" instrument_node="">5. Medify-440 Luxury Spar 4-in-1 Review</span><span class="ez-toc-section-end" data-dcnode-id="1191"></span></h2><p data-dcnode-id="1181"><strong data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="1182"><span data-dcnode-id="1187" instrument_node="">Editor’s Rating: </span><img alt="3.5 out of 5 stars" class="usr" data-dcnode-id="1186" data-lazyloaded="1" data-src="https://dustfreerooms.com/wp-content/plugins/universal-star-rating/includes/image.php?img=01.png&amp;px=12&amp;max=5&amp;rat=3.5" src="data:image/gif;base64,R0lGODdhAQABAPAAAMPDwwAAACwAAAAAAQABAAACAkQBADs=" style="height: 12px !important;"><noscript data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">&lt;img class="usr" src="https://dustfreerooms.com/wp-content/plugins/universal-star-rating/includes/image.php?img=01.png&amp;amp;px=12&amp;amp;max=5&amp;amp;rat=3.5" alt="3.5 out of 5 stars" style="height: 12px !important;" /&gt;</span></noscript><span data-dcnode-id="1183" instrument_node=""> (3.5 / 5)</span></strong></p><h2 data-dcnode-id="1177"><span class="ez-toc-section" data-dcnode-id="1180" id="A-Quick-Overview-4"></span><span data-dcnode-id="1179" instrument_node="">A Quick Overview</span><span class="ez-toc-section-end" data-dcnode-id="1178"></span></h2><ul data-dcnode-id="1141"><li data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Dimensions: 8.26″ D x 8.26″ W x 12.20″ H</span></li><li data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Weight: 25 lbs</span></li><li data-dcnode-id="1169"><span data-dcnode-id="1172" instrument_node="">Design: </span><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">A slim, sleek design with a brown, textured front panel</span></strong></li><li data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Color: Brown and grayish</span></li><li data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Filters: 1 prefilter, 1 HEPA H13 filter, 1 activated carbon filter</span></li><li data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Filter Life: 6 months</span></li><li data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Air Quality Sensor: YES</span></li><li data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Ionizer: YES</span></li><li data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Timer: NO</span></li><li data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Smart Features: Bluetooth</span></li><li data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">4 cleaning Speeds including Turbo</span></li><li data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Area Purified: 700 sq ft</span></li><li data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">CADR: 220</span></li><li data-dcnode-id="1146"><strong data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Additional Features: Spa experience, aromatherapy, 16 relaxing sounds, and humidifier</span></strong></li><li data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Energy Star rated: Not yet</span></li><li data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Uses UV light</span></li></ul><p data-dcnode-id="1137"><span data-dcnode-id="1140" instrument_node="">The MA-440 stands out from its siblings in several ways. Actually, it’s a 4-in-1 deal, one you’ll want to try out. </span><strong data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">It looks like a giant, sleek smartphone&nbsp;standing on a sturdy base. </span></strong></p><h3 data-dcnode-id="1133"><span class="ez-toc-section" data-dcnode-id="1136" id="The-Air-Purifier-is-All-of-the-Following"></span><span data-dcnode-id="1135" instrument_node="">The Air Purifier is All of the Following:</span><span class="ez-toc-section-end" data-dcnode-id="1134"></span></h3><ol data-dcnode-id="1124"><li data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">It’s a humidifier.</span></li><li data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">It’s an air purifier.</span></li><li data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">It’s a mini-spar.</span></li><li data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">It offers up to 16 relaxing sounds that lull the user to sleep in no time.</span></li></ol><p data-dcnode-id="1112"><strong data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Imagine</span></strong><span data-dcnode-id="1119" instrument_node=""> saving tons of money on expensive spar experiences while breathing squeaky clean air scented with nice-smelling scents? </span><strong data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Imagine </span></strong><span data-dcnode-id="1116" instrument_node="">owning an air purifier that filters out particulates and other air pollutants down to 0.1 microns</span><strong data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">? </span></strong><span data-dcnode-id="1113" instrument_node="">Have you ever wondered if you could find an air purifier that purifies the air while humidifying it?</span></p><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">That’s the exact same experience you’ll get if you install this air purifier in your bedroom, small basement, or living room. The manufacturer made the unit with hotels as the target market. But who says you can’t enjoy hotel-like comfort right in your room?</span></p><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">The MA-440 is the device you want to use when winter comes around. Winter air should be moist, but it’s naturally drier than air in any other season.</span></p><p data-dcnode-id="1100"><span data-dcnode-id="1107" instrument_node="">Dealing with a severe winter is extremely challenging, and winter depression happens a lot. According to the </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/articles/how-moms-can-fight-seasonal-affective-disorder" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1106" instrument_node="">National Sleep Foundation</span></a><span data-dcnode-id="1104" instrument_node="">, the affected person feels less energetic and irritable. Health experts have given winter depression a technical name: it’s a </span><strong data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Seasonal Affective Disorder</span></strong><span data-dcnode-id="1101" instrument_node="">.</span></p><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">When you’re feeling this down, the last thing you want is more problems. But you can’t stop breathing. And the air is dry and heavy, making things feel a lot worse . If you have an MA-440 humming away in your room, winter will be a lot more tolerable. Even enjoyable.</span></p><p data-dcnode-id="1093"><span data-dcnode-id="1097" instrument_node="">This air purifier is like a mini-spar. If you’re like </span><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">25 percent</span></strong><span data-dcnode-id="1094" instrument_node=""> of Americans, you’ve visited a spa at least once. It’s no accident that spas have become super popular these days.</span></p><p data-dcnode-id="1088"><span data-dcnode-id="1092" instrument_node="">Visiting a spa delivers quite a few benefits. The spa experience helps reduce stress and makes you feel comfortable. Also, the body sweats, letting toxic substances out the body. I’m talking about </span><strong data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">natural detoxification</span></strong><span data-dcnode-id="1089" instrument_node=""> of your body here.</span></p><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Aside from that, the spa experience has been associated with a decreased risk for heart disease, cardiovascular diseases, and even early death. All these benefits add up to improved health and better sleep. Yes, better sleep. If you have trouble falling asleep, use this machine and see what happens. You’ll start sleeping like a log soon after crawling into bed.</span></p><p data-dcnode-id="1081"><span data-dcnode-id="1085" instrument_node="">Spa sessions aren’t the cheapest experiences out there. A spa session in a decent hotel in a major U.S. city can cost as much as $200. If you enjoy 5 weekly spa treatments, that’s </span><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">$1,000.</span></strong><span data-dcnode-id="1082" instrument_node=""> Well, that looks pretty much like rent money or car payment!</span></p><p data-dcnode-id="1071"><span data-dcnode-id="1080" instrument_node="">Fortunately, there’s a way to keep your costs down while enjoying a much better quality of life. </span><strong data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Here’s the spar </span></strong><b data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">alternative</span></b><span data-dcnode-id="1075" instrument_node="">: the MA-440. If costs around $400 or thereabout as of this date. </span><strong data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Please note that prices keep changing</span></strong><span data-dcnode-id="1072" instrument_node="">. The unit may cost significantly less or more by the time you get to read this post.</span></p><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Maybe you’re not paying $200 per session. Maybe you’re paying something like $50 per 45 minutes of spar experience in your city. If you receive 2 treatments each week, you’ll spend $400 every 1 month. But why continue spending that much when you could just use the MA-440? In just 1 month or so, this thing will have paid for itself.</span></p><p data-dcnode-id="1064"><span data-dcnode-id="1068" instrument_node="">The MA-440 offers many great features that come together into a comprehensive system that delivers tons of comfort. Its moisture function spews mist out into the room, moisturizing that dry, nasty winter air. And don’t worry about washing the tank — simply put the </span><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">UV sanitized cool mist function</span></strong><span data-dcnode-id="1065" instrument_node=""> to work.</span></p><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">When researching for this purifier, I couldn’t believe so much technology and functionalities could co-exist in one machine. Can you believe there’s a pump in there so you won’t have standing water ? There’s even a water purifier complete with a UV light so no harmful microbe ends up in your air. What’s not to love about the MA-440?</span></p><p data-dcnode-id="1058"><strong data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">How long does the water reservoir used by the MA-440 last</span></strong><span data-dcnode-id="1059" instrument_node="">? It holds about 1 gallon, and that’s enough for one night (about 8 hours).</span></p><p data-dcnode-id="1053"><span data-dcnode-id="1057" instrument_node="">Now let’s talk about </span><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">aromatherapy</span></strong><span data-dcnode-id="1054" instrument_node="">. Different cultures around the world have used aromatherapy, also referred to as essential oil therapy, for thousands of years. Today, thousands of companies have sprouted everywhere, claiming that their oils do this or that.</span></p><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">You might have heard that aromatherapy can help with asthma. But no scientific evidence (as of now) supports this claim. Essential oil therapy DOESN’T help allergy or asthma.</span></p><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">In fact, you may want to avoid these products if you have breathing issues. That’s because inhaling these oils (think VOCs) may cause irritation to your airways, worsening a bad situation. Aside from that, these oils may also cause irritation to the skin. If you have sensitive skin, stay away from them. Finally, these oils may harm children if swallowed. So, keep them out of children’s reach always.</span></p><p data-dcnode-id="1042"><strong data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Aromatherapy</span></strong><span data-dcnode-id="1046" instrument_node=""> isn’t meant to treat any disease.</span><strong data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node=""> So, </span></strong><span data-dcnode-id="1043" instrument_node="">don’t use any oil purported to help asthma without consulting your doctor. And if you want to use them, make sure to buy from a trusted company. Why? It’s because the FDA doesn’t regulate essential oils.</span></p><p data-dcnode-id="1037"><span data-dcnode-id="1041" instrument_node="">Now, we’ve got that out of the way. Now, let’s talk about the good side of aromatherapy — its </span><a data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/what-is-aromatherapy%23benefits" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1040" instrument_node="">benefits</span></a><span data-dcnode-id="1038" instrument_node="">. Aromatherapy is believed to help relieve pain, soothe joints, and even improve digestion. It may also help reduce stress, treat migraines and headaches, and boost the body’s disease-fighting ability.</span></p><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">What’s more, aromatherapy may help users sleep better while making them feel less anxious. Aside from that, it may help address discomfort during pregnancy.</span></p><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Whether these benefits are scientifically proven or not, users of essential oils love them. Maybe they love them because they work for them? Who knows. Here’s the thing: the MA-440 is an essential oil diffusing air purifier.</span></p><p data-dcnode-id="1025"><span data-dcnode-id="1032" instrument_node="">It comes loaded with 4 refreshing smells including </span><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Eucalyptus</span></strong><span data-dcnode-id="1029" instrument_node="">, </span><strong data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Island Breeze, Vanilla Mist, and Lavender Chamomile</span></strong><span data-dcnode-id="1026" instrument_node="">. You, your family, and visitors will love the scents that’ll pervade your home or office.</span></p><p data-dcnode-id="1021"><span data-dcnode-id="1024" instrument_node="">Does it take you hours to fall asleep? That comes to an end with this air purifier. That’s because on top of spewing out healthy, sleep-inducing essential oils, the MA-440 also produces at least</span><strong data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node=""> 16 relaxing soundscapes.</span></strong></p><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Some of these sounds are white noise, pink noise, and brown noise. You’ll also get nature sounds such as rain, ocean sounds, and night sounds. There’s also medication and spa sound categories. All of these sounds are an extra addition whose priority is to help you relax and fall asleep.</span></p><h3 data-dcnode-id="1015"><span class="ez-toc-section" data-dcnode-id="1018" id="The-Control-Pad-for-the-MA-440"></span><span data-dcnode-id="1017" instrument_node="">The Control Pad for the MA-440</span><span class="ez-toc-section-end" data-dcnode-id="1016"></span></h3><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">You likely imagine this air purifier comes dotted with many hard-to-figure-out buttons. On the contrary, the machine is quite easy to use, not finicky at all. It comes with a detachable 7″ tablet. The tablet has a simple user interface with large buttons, making operating the device a breeze.</span></p><p data-dcnode-id="1006"><span data-dcnode-id="1012" instrument_node="">Can you remote-control the MA-440? Yes, you can. The tablet is </span><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Bluetooth-enabled. </span></strong><span data-dcnode-id="1009" instrument_node="">It’s a special tablet that connects to your machine, allowing you to remote-control it. You can place the device on your nightstand for </span><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">hassle-free control.&nbsp;</span></strong></p><p data-dcnode-id="1001"><span data-dcnode-id="1005" instrument_node="">Here’s one more benefit of this air purifier. Like the other Medifys, it offers a night mode. If you feel that the light coming from the control panel (tablet) is too bright, dim it. Go to the lower left corner of the tablet and tap it until you have a </span><em data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">soft</span></em><span data-dcnode-id="1002" instrument_node=""> enough level of brightness. Dimming the light also lowers speed so you can sleep without disturbance.</span></p><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Also, the tablet reminds you when it’s time to replace the filter which lasts around 6 months. Also, when any component isn’t working properly, you’ll see a notification on the tablet.</span></p><p data-dcnode-id="993"><strong data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Is the MA-440 quiet?</span></strong><span data-dcnode-id="996" instrument_node=""> The machine struck me as surprisingly quiet on low and medium. It gets quite loud on high and Turbo, though, but it’s not deafeningly so. &nbsp;That’s because it uses high-quality DC motors that muffle the noise. Even when on Turbo, the machine produces no more than </span><strong data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">55 decibels.</span></strong></p><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">The unit offers 4 speeds namely Low, Medium, High, and Turbo. High and Turbo are for when you have nasty allergies and allergy season’s just kicked in. Leave the behemoth roaring for some time and then switch back to a lower setting, preferably medium.</span></p><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Finally, there’s an optional anion generator that ionizes the air, trapping pollutants inside the unit. If you’re sensitive to various allergens, consider keeping the ionizer turned off. But if you have no allergies or asthma, you’ll love what the ionizer does to your scented, purified air. With an ionizer, the air feels fresher and cleaner.</span></p><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">This air purifier treats about 700 sq. ft. rooms by circulating the air 2 times every 60 minutes. If the area is smaller (350 sq. ft.), the ACH rises to 4. Like every other Medify purifier except the MA-112, this one uses 3 filters that come in one cartridge.&nbsp; There’s a prefilter, an activated carbon filter, and a H13 HEPA filter. The unit removes 99.95% 0.1-micron pollutants and 99.97% of 0.3 micron or larger ones.</span></p><h3 data-dcnode-id="983"><span class="ez-toc-section" data-dcnode-id="986" id="Energy-Consumption-and-Maintenance"></span><span data-dcnode-id="985" instrument_node="">Energy Consumption and Maintenance</span><span class="ez-toc-section-end" data-dcnode-id="984"></span></h3><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">The MA-440 gobbles up 120W which sums to about 1051.2 kWh annually. Your electric bill will grow by about $105.12. Add the yearly filter replacement of about $250, and the cost grows to $355.2. Evidently, owning the MA-440 is pretty much like owing the MA-112 in terms of costs. While this machines demands serious financial commitment, it delivers tons of benefits as described above. But the price could sure be a little lower than that.</span></p><div class="wp-classic-pros-cons wppc-view3" data-dcnode-id="941"><div class="wppc-boxs" data-dcnode-id="942"><div class="wppc-box pros-content" data-dcnode-id="958"><div class="wppc-header" data-dcnode-id="974"><h4 class="wppc-content-title cons-title" data-dcnode-id="975"><span class="ez-toc-section" data-dcnode-id="978" id="Pros-5"></span><span data-dcnode-id="977" instrument_node="">Pros</span><span class="ez-toc-section-end" data-dcnode-id="976"></span></h4></div><ul class="wp-pros-cons-list wp-pros-list" data-dcnode-id="959"><li class="joomdev_wpc_pro_single" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Life Warranty</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Provides spar-like experiences</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Aromatherapy benefits</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Humidifies the air</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Portable</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Slim, sleek design</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Optional ionizer</span></li></ul></div><div class="wppc-box cons-content" data-dcnode-id="943"><div class="wppc-header" data-dcnode-id="953"><h4 class="wppc-content-title cons-title" data-dcnode-id="954"><span class="ez-toc-section" data-dcnode-id="957" id="Cons-5"></span><span data-dcnode-id="956" instrument_node="">Cons</span><span class="ez-toc-section-end" data-dcnode-id="955"></span></h4></div><ul class="wp-pros-cons-list wp-cons-list" data-dcnode-id="944"><li class="joomdev_wpc_con_single" data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Recently released</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Energy guzzler</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Replacement filters expensive</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">May produce ozone</span></li></ul></div></div></div><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">I’ve not encountered many air purifiers of any kind that consume 120W. But the MA-440 consumes that much energy. But that’s expected considering how much work this thing does. It’s humidifier, an air purifier, and a spa at the same time.</span></p><p data-dcnode-id="934"><span data-dcnode-id="938" instrument_node="">If you buy an air purifier and a dehumidifier, you’ll likely end up consuming the same amount of energy. Also, consider just how much spa money this unit could save you</span><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">. T</span></strong><span data-dcnode-id="935" instrument_node="">he additional $106 in your power bill won’t seem like much.</span></p><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">I also noted that the machine entered the market recently. That’s why there isn’t a single review on Amazon and even on the manufacturer’s site. But why worry when you can always return the thing if it’s not working? Remember: the MA-440, too, offers a lifetime warranty.</span></p><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">I’m not surprised that filters for this air purifier aren’t available on Amazon as of this writing. But they’re available on the manufacturer’s site. That’s because the unit is newly released by Medify (more on this later). They’re selling them at around $125, and they should be replaced twice every year.</span></p><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">does anyone think a company would sell air cleaning devices without availing parts and filters at some point? Actually, they told me that a truck carrying replacement filters was on its way to Amazon’s warehouses. They should be available pretty soon.</span></p><p data-dcnode-id="914"><span data-dcnode-id="927" instrument_node="">Well, the thing produces ozone if you leave the ionizer on. And as at </span><strong data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">18.10.2019</span></strong><span data-dcnode-id="924" instrument_node="">, the machine </span><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">wasn’t</span></strong><span data-dcnode-id="921" instrument_node=""> CARB-approved. I can’t say whether the quantities of ozone it pushes out are well within safe levels. But I honestly think the MA-440 will get approved just like its siblings were. Medify confirmed to me that t</span><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">his product has been entered for</span></strong><span data-dcnode-id="918" instrument_node=""> </span><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">consideration</span></strong><span data-dcnode-id="915" instrument_node=""> with CARB. I’ll come back here and update this list down the road.</span></p><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Quite frankly, I’ve not used this machine. I have 2 Honeywells and one Dyson, and they’re still serving me well. But don’t worry, I research extensively and keep engaging with manufacturers to make sure you get accurate information. The MA-440 4-in-1 looks like a great air purifier, judging from the specs and features.</span></p><p data-dcnode-id="908"><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">NOTE</span></strong><span data-dcnode-id="909" instrument_node="">: I dug around a bit about this machine and learned something interesting. Medify, the manufacturer of the MA-440 was established in 2017. But this device itself was released in 2014!</span></p><p data-dcnode-id="903"><span data-dcnode-id="907" instrument_node="">When I questioned that, Medify said that the MA-440 used to be sold under another brand called </span><strong data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">AireSpa</span></strong><span data-dcnode-id="904" instrument_node="">. The brand was owned by a seemingly small company called Innovaci.</span></p><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">So, I checked out AireSpa. And the device I saw there looks pretty similar to the MA-440. But that company had only one product (the AireSpa), and I assumed they must have been acquired by MedifyAir or something.</span></p><p data-dcnode-id="897"><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">I trust MedifyAir, though</span></strong><span data-dcnode-id="898" instrument_node="">. Why? It’s because the company has released 6 major products. That means quite a lot. That doesn’t look like a fly-by-night outfit to me. And save for the MA-440, the rest of the products seem to have rave reviews on Amazon.</span></p><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Frankly, though, I’d hesitate to buy the MA-440. Even though it’s associated with a stable company, there aren’t many reviews yet for this product. But there’s no reason not to buy it and see if all its amazing features work as promised. After all, the lifetime warranty protects you. The main reason I rated the unit 3.5 is that it has not many people had bought it and recommended it as of this post.</span></p><p data-dcnode-id="892"><strong data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Update</span></strong></p><p data-dcnode-id="887"><span data-dcnode-id="891" instrument_node="">As of 18.12.2019, there are at least </span><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">11 reviews</span></strong><span data-dcnode-id="888" instrument_node=""> on Amazon for this air purifier, and the overall rating was 4.1. I’ve been hearing quite a few good things about this machine. That’s why I’m revising the rating upwards from 3.5 to 4.0.</span></p><h2 data-dcnode-id="883"><span class="ez-toc-section" data-dcnode-id="886" id="6-Medify-MA-Smart-Review"></span><span data-dcnode-id="885" instrument_node="">6. Medify MA-Smart Review</span><span class="ez-toc-section-end" data-dcnode-id="884"></span></h2><p data-dcnode-id="876"><strong data-dcnode-id="877"><span data-dcnode-id="882" instrument_node="">Editor’s Rating: </span><img alt="4.5 out of 5 stars" class="usr" data-dcnode-id="881" data-lazyloaded="1" data-src="https://dustfreerooms.com/wp-content/plugins/universal-star-rating/includes/image.php?img=01.png&amp;px=12&amp;max=5&amp;rat=4.5" src="data:image/gif;base64,R0lGODdhAQABAPAAAMPDwwAAACwAAAAAAQABAAACAkQBADs=" style="height: 12px !important;"><noscript data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">&lt;img class="usr" src="https://dustfreerooms.com/wp-content/plugins/universal-star-rating/includes/image.php?img=01.png&amp;amp;px=12&amp;amp;max=5&amp;amp;rat=4.5" alt="4.5 out of 5 stars" style="height: 12px !important;" /&gt;</span></noscript><span data-dcnode-id="878" instrument_node=""> (4.5 / 5)</span></strong></p><h2 data-dcnode-id="872"><span class="ez-toc-section" data-dcnode-id="875" id="A-Quick-Overview-5"></span><span data-dcnode-id="874" instrument_node="">A Quick Overview</span><span class="ez-toc-section-end" data-dcnode-id="873"></span></h2><ul data-dcnode-id="843"><li data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Dimensions: 9.4″ D x 9.4″ W x 16.1″ H</span></li><li data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Weight: 10 lbs</span></li><li data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Design: Cylindrical, sleek</span></li><li data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Color: White</span></li><li data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Filters: 1 prefilter, 1 HEPA H13 filter, 1 activated carbon filter</span></li><li data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Filter Life: 4 months</span></li><li data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Particle Sensor: YES</span></li><li data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Smart Features: YES</span></li><li data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Ionizer: No</span></li><li data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Timer: YES</span></li><li data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Speed: 4 levels</span></li><li data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Area Purified: 500 sq. ft.</span></li><li data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">CADR: 220</span></li><li data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Energy Star rated: NO</span></li></ul><p data-dcnode-id="832"><span data-dcnode-id="842" instrument_node="">The Medify MA-Smart is the </span><strong data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">first and only smart Medify air purifier</span></strong><span data-dcnode-id="839" instrument_node="">. W</span><strong data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">hen was the MA-Smart released? </span></strong><span data-dcnode-id="836" instrument_node="">It’s released on</span><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node=""> May 2, 2019</span></strong><span data-dcnode-id="833" instrument_node=""> in New York, U.S.A.</span></p><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">It’s supposed to clean 1,000 square feet every 60 minutes. That’s one air circulation per hour, which isn’t good enough if you’re asthmatic. It’s pointless to use this in a 1,000 sq. ft. area.</span></p><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">If you have the unit in a 500 square feet room, it’ll do 2 air circulations in an hour. That’s better than just one circulation in an hour, but it’s not good enough. Buy the unit for a room not larger than 250 square feet because you’ll get at least 4 air changes per hour. Now, that’s a good enough ACH for everyone, including asthma and allergy sufferers.</span></p><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">The MA-Smart is Wi-Fi and Amazon Echo enabled. You can verbally give it instructions on what to do. You can also control it via your smartphone. If you’re the type that worships at the altar of technology, choose this air purifier.</span></p><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">The unit’s easy-tap control panel sits on the top. All the buttons you’ll ever need to operate the machine are there. It’s a clean, easy-to-operate panel, unlike many finicky ones I’ve seen.</span></p><p data-dcnode-id="819"><span data-dcnode-id="823" instrument_node="">To make the most of the device’s smart features, you’ll need to have the right devices. You need a smartphone/tablet to leverage the unit’s Wi-Fi capability. And you need </span><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Amazon’s Echo</span></strong><span data-dcnode-id="820" instrument_node=""> or other similar speaker to get the most out of Alexa.</span></p><p data-dcnode-id="811"><span data-dcnode-id="818" instrument_node="">Download the Smart Life App and link your phone to it. You should easily control the purifier from any corner of the house. No longer will you need to pad across the room to give a command to the machine. </span><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Note</span></strong><span data-dcnode-id="815" instrument_node="">: to pair up your air purifier with the Smart App, </span><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">you need a 2.4 GHz Wi-Fi connection</span></strong><span data-dcnode-id="812" instrument_node="">. You can’t use 5 GHz networks currently.</span></p><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">For Alexa, you’ll have to download the Alexa app as well as the appropriate skill and connect your air purifier. It’s easy, takes minutes. Once you do that, you can control your machine from anywhere. And you can actually speak to it, which is cool.</span></p><p data-dcnode-id="804"><span data-dcnode-id="808" instrument_node="">Like all Medifys except the MA-112, the MA-Smart uses a 3-in-1 filter. The filter comes pre-installed. All you’ve got to do is plug it in. But wait, have you removed the plastic sheath that covers the filter?</span><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node=""> DON’T use the machine until you’ve done that. </span></strong><span data-dcnode-id="805" instrument_node="">Same goes for the other 5 machines from this company.</span></p><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">And like the MA-18, the MA-Smart features a simple, sleek cylindrical design. I’d say the MA-18 looks better than its sibling. Maybe that’s just my eyes. But if aesthetic appeal was the only important aspect, I’d rather have the MA-18 sitting in my living room than this option.</span></p><p data-dcnode-id="795"><span data-dcnode-id="801" instrument_node="">Every purifier from this brand uses a HEPA H13 filter to get rid of up to 99.97% of particles larger than 0.3 microns. And this air purifier is no exception. If there are </span><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">100,000 </span></strong><span data-dcnode-id="798" instrument_node="">mold spores or dust particles&nbsp;floating in your air now, this machine would bundle out </span><strong data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">99,970 of them! </span></strong></p><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">It gets better. This filter has been tested to eradicate about 99.95% of all particles 0.1 microns or larger. It can’t get better than that. The Medifys are a rare cluster of air purification devices with the capability of filtering down to 0.1 microns. That’s a really good thing since the smallest particles are usually the most lethal.</span></p><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">But before the air gets to the H13 filter, it passes via the prefilter. The prefilter is normally included to do preliminary filtration before the air passes on to the medical grade filter. It removes large-size particles including pet hair, pet dander, some dust, lint, and more. As a result, the main particulate matter filter (H13) will have less work to do. And that means it’ll last longer than it would if there was no prefilter. But that’s of little consequence since the filters come as a single cartridge. Meaning they’ re changed at the same time.</span></p><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">The last filter in the 3-in-1 cartridge is the activated carbon filter. This filter is included to help reduce odors and toxic VOCs such as formaldehyde.&nbsp; The 3-in-1 filter will typically serve you for 4 months before replacement.</span></p><p data-dcnode-id="784"><span data-dcnode-id="788" instrument_node="">With this or any other Medify, formaldehyde, benzene, and other VOCs will stop adulterating your indoor air. Or at least, they won’t bother you as much. I think this machine and all its siblings are the best solutions for road traffic pollution. They’re also great at </span><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dustfreerooms.com/is-this-the-best-air-purifier-for-construction-dust-find-out/"><span data-dcnode-id="787" instrument_node="">removing construction dust</span></a><span data-dcnode-id="785" instrument_node="">, mold, asbestos, pollen, tobacco smoke, and more.</span></p><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Ask any allergy and asthma sufferer that uses a Medify. They’ll tell you there’s nothing better in life than being able to breathe without difficult. They no longer fret over the possibility that they’re inhaling gallons of PM2.5 every day.</span></p><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Using a powerful motor, this device sucks in dirty air from all directions. Most air purifiers pull in just one or two directions. Such machines must be positioned&nbsp; centrally, sometimes getting in the way. Good thing is you can place this smart thing behind a wall, and its effectiveness won’t reduce dramatically. The air comes out via the top, just like it does in all air purifiers offering 360-degree air intake.</span></p><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">You can choose any of 4 fan speeds, or you can opt to have it purify on auto. On low, it’s very quiet. One medium, it gets louder, and that’s not surprising. But it’s not disturbingly loud on the setting. At worst, it’s white noise which most people actually like. On high, it does get pretty loud, and a light sleeper probably won’t sleep well.</span></p><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Other features offered by the MA-Smart include filter replacement indicator, air quality sensor, night mode, and auto shutoff timer.</span></p><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">The night mode switches the unit to low which dims the control panel lights. And the timer makes it possible to decide how long your device should clean the air before shutting itself off. The available options are 1,2,4, and 8.</span></p><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">In my opinion, a timer is one of the most important features in an air cleaning device. It boosts the unit’s convenience. Plus, it can save you lots of energy over the long term.</span></p><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Let’s now look at this air cleaner’s air quality sensor. You’ll see a 360-degree base light that changes color in accordance with changes in the room’s air quality.</span></p><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">When the quality is good, the color stays green and when it needs a little improvement, it displays yellow. But if the air is swarming with allergens, the color you’ll see is red.</span></p><p data-dcnode-id="763"><span data-dcnode-id="767" instrument_node="">Consider setting the unit on auto so it can adjust its speed in accordance with your room’s current air quality situation. If the air needs a bit of filtration, the sensor </span><em data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">commands</span></em><span data-dcnode-id="764" instrument_node=""> the unit to crank up the speed. And once the air is clean, the reverse happens — the unit returns to a lower speed.</span></p><h3 data-dcnode-id="759"><span class="ez-toc-section" data-dcnode-id="762" id="Maintenance-and-Energy-Consumption-3"></span><span data-dcnode-id="761" instrument_node="">Maintenance and Energy Consumption</span><span class="ez-toc-section-end" data-dcnode-id="760"></span></h3><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Filter replacement should happen every 4 months. At this point, I can’t seem to find replacement filters either on Amazon or the producer’s site. But I emailed MedifyAir, and they did say they’ll release replacement filters for this unit in 2 weeks. Actually, they said a load of filters was on its way to Amazon. The filters will cost $59, which is kind of steep. That’s going to be $177 annually on filters and electricity.</span></p><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">I engaged MedifyAir about the issue of Energy Star certification. They said the unit isn’t rated yet. However, they did say they’d applied for the same, and they’d get back to me once they heard from the EPA.</span></p><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">However, they told me the thing uses 50W, and that adds up to 438 kWh per year. That’d cost you around $43.80, and the total costs would come to $220.80.</span></p><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Well, that’s more than the cost of the device. The thing works, though. You must decide whether $221 seems reasonable to you. One thing you need to know is that high-quality filters aren’t cheap. And cheap filters usually don’t do a thing for the user.</span></p><div class="wp-classic-pros-cons wppc-view3" data-dcnode-id="705"><div class="wppc-boxs" data-dcnode-id="706"><div class="wppc-box pros-content" data-dcnode-id="722"><div class="wppc-header" data-dcnode-id="744"><h4 class="wppc-content-title cons-title" data-dcnode-id="745"><span class="ez-toc-section" data-dcnode-id="748" id="Pros-6"></span><span data-dcnode-id="747" instrument_node="">Pros</span><span class="ez-toc-section-end" data-dcnode-id="746"></span></h4></div><ul class="wp-pros-cons-list wp-pros-list" data-dcnode-id="723"><li class="joomdev_wpc_pro_single" data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Life Warranty</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Wi-Fi &amp; Alexa-enabled</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Affordable</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Quiet on low</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Portable</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Auto mode</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Programmable timer (1,2,4,8 hours)</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Filter replacement indicator</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">No ozone</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">360 degree air intake</span></li></ul></div><div class="wppc-box cons-content" data-dcnode-id="707"><div class="wppc-header" data-dcnode-id="717"><h4 class="wppc-content-title cons-title" data-dcnode-id="718"><span class="ez-toc-section" data-dcnode-id="721" id="Cons-6"></span><span data-dcnode-id="720" instrument_node="">Cons</span><span class="ez-toc-section-end" data-dcnode-id="719"></span></h4></div><ul class="wp-pros-cons-list wp-cons-list" data-dcnode-id="708"><li class="joomdev_wpc_con_single" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Not Energy Star rated</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Not CARB-rated</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">5 GHz Wi-Fi connection not supported</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Base light can’t be turned off</span></li></ul></div></div></div><p data-dcnode-id="700"><span data-dcnode-id="704" instrument_node="">This purifier is yet to get approved by CARB, and it’s not Energy Star rated. But the manufacturer told me they’d applied to CARB for consideration. The machine’s siblings got a </span><em data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">clean bill of health</span></em><span data-dcnode-id="701" instrument_node=""> from CARB recently. And there’s no reason to believe this unit won’t endure the tests.</span></p><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Even though it’s not CARB rated, you have nothing to fear since it doesn’t produce ozone (has no ionizer). And while it’s not Energy Star rated, it consumes only 50W. That’s how much energy your laptop consumes in an hour.</span></p><p data-dcnode-id="693"><span data-dcnode-id="697" instrument_node="">I love that the device is </span><em data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">smart</span></em><span data-dcnode-id="694" instrument_node="">. You can turn it off or on from a different room. You can also fire it up or power it off even when you’re away from home. It’s Wi-Fi enabled; you can connect it to the Smart Life app for more convenience.</span></p><p data-dcnode-id="689"><span data-dcnode-id="692" instrument_node="">Also, you can link the MA-Smart to Amazon Alexa. If you do that, operating your device becomes easy and fun. </span><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Simply tell the thing, “Alexa, turn on air purifier.” </span></strong></p><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">However, you can’t pair the unit up with the Smart App unless you’re using a 2.4 GHz Wi-Fi connection. So, you may need to adjust the settings on your router. &nbsp;Currently, 5 GHz Wi-Fi networks aren’t supported. But that’s not a problem. Why? Because the 2.4 GHz frequency happens to be the standard with all internet providers.</span></p><p data-dcnode-id="683"><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">But why won’t the ring of light that encircles the MA-Smart’s base turn off?</span></strong><span data-dcnode-id="684" instrument_node=""> Luckily, the light isn’t too hard on the eyes. It wouldn’t bother most people. Besides, you can always select the sleep mode which automatically turns the light off.</span></p><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">The MA-Smart is the only Smart Medify I’ve seen. I asked the company why the MA-112 wasn’t a smart device despite it being pricey. The answer I got seemed to make some sense. They researched and found that many consumers actually didn’t value smart features that much. And that people usually operated their purifier without using these features even when the machine had them. Do you think they’re right? Let me know in the comments.</span></p><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">And now, here’s the brand spanking new Medify air purifier I promised to review, the Medify MA-25.</span></p><h3 data-dcnode-id="675"><span class="ez-toc-section" data-dcnode-id="678" id="7-Medify-MA-25-Medical-Grade-True-HEPA-H13-Air-Purifier"></span><span data-dcnode-id="677" instrument_node="">7. Medify MA-25 Medical-Grade (True HEPA H13) Air Purifier</span><span class="ez-toc-section-end" data-dcnode-id="676"></span></h3><p data-dcnode-id="668"><strong data-dcnode-id="669"><span data-dcnode-id="674" instrument_node="">Editor’s rating: </span><img alt="4.5 out of 5 stars" class="usr" data-dcnode-id="673" data-lazyloaded="1" data-src="https://dustfreerooms.com/wp-content/plugins/universal-star-rating/includes/image.php?img=01.png&amp;px=12&amp;max=5&amp;rat=4.5" src="data:image/gif;base64,R0lGODdhAQABAPAAAMPDwwAAACwAAAAAAQABAAACAkQBADs=" style="height: 12px !important;"><noscript data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">&lt;img class="usr" src="https://dustfreerooms.com/wp-content/plugins/universal-star-rating/includes/image.php?img=01.png&amp;amp;px=12&amp;amp;max=5&amp;amp;rat=4.5" alt="4.5 out of 5 stars" style="height: 12px !important;" /&gt;</span></noscript><span data-dcnode-id="670" instrument_node=""> (4.5 / 5)</span></strong></p><h2 data-dcnode-id="664"><span class="ez-toc-section" data-dcnode-id="667" id="A-Quick-Overview-6"></span><span data-dcnode-id="666" instrument_node="">A Quick Overview</span><span class="ez-toc-section-end" data-dcnode-id="665"></span></h2><ul data-dcnode-id="633"><li data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Dimensions: 9.5″ x 15″ x 20″ H</span></li><li data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Weight: 18 lbs</span></li><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Design: Rectangular</span></li><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Color: White</span></li><li data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Filters: 2 prefilters, 2 HEPA H13 filters, 2 activated carbon filters</span></li><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Filter Life: 4-6 months</span></li><li data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Air Quality Sensor: NO</span></li><li data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Smart Features: No</span></li><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Ionizer: No</span></li><li data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Timer: YES</span></li><li data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Speed options: 3</span></li><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Area Purified: up to 1000 square feet</span></li><li data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">CADR: 250</span></li><li data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Energy Star rated: YES</span></li><li data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">CARB rated: YES</span></li></ul><p data-dcnode-id="628"><span data-dcnode-id="632" instrument_node="">Like the MA-112, the Medify MA-25 comes with a set of 2 fine fiber-packed filters. I really love that. In fact, it’s the only other Medify that offers dual filtration. With this machine, polluted indoor air streams into the filtration </span><em data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">compartment</span></em><span data-dcnode-id="629" instrument_node=""> from two sides rather than just one side. That means faster and more intensive air purification in the same amount of time.</span></p><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">And like the Medify MA-40, the Medify MA-25 offers a sleek, fuss-free, easy-tap, tempered-glass control panel. Now, look at your smartphone. Do you see how its screen looks like? Yes, that’s what tempered glass looks like. The panel looks really nice. What’s more, it’s scratchproof. Here’s where all the buttons you’ll ever need to get the most out of this workhorse are found.</span></p><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">You can increase or reduce filtration speed. On low and medium settings, it runs ultra quietly. You’d easily think the machine was doing nothing for you! But the highest settings hums a little louder. However, the noise isn’t annoyingly loud.</span></p><p data-dcnode-id="619"><span data-dcnode-id="623" instrument_node="">At night, you’ll want to turn on the </span><em data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">night-use mode</span></em><span data-dcnode-id="620" instrument_node="">. This mode automatically changes fan speed to low, dimming the light. At that point, just crash and dream all night until your alarm disrupts everything the next morning!</span></p><p data-dcnode-id="614"><span data-dcnode-id="618" instrument_node="">The air purifier is AHAM-verified with a CADR of 250. Putting the device in a 250 square feet room assures you of at least </span><strong data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">4 complete air changes every hour</span></strong><span data-dcnode-id="615" instrument_node="">. What if you want to run this dust-eater in your 1000 square feet musty basemen? Go ahead and place it down there. But, understand you won’t get more than ONE air circulation per hour in such a large space. I recommend you use this in your living room or bedroom.</span></p><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Two people working on a task achieve success much faster than one pair of hands. Similarly, 2 sets of filters filtering boatloads of indoor air pollution work harder and faster than one set. The 2 prefilters capture large dirt particles while the 2 True HEPA medical-grade H13 filters remove at least 99.97% of ultrafine particles.</span></p><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">By the way, what’s a medical-grade air purifier? A medical-grade air purifier uses advanced True HEPA filters called medical-grade H13 filters. These are much better than True HEPA filters. While both help to drastically minimize PM2.5, the medical-grade one may be expected to offer more comprehensive filtration.</span></p><p data-dcnode-id="605"><span data-dcnode-id="609" instrument_node="">Medical-grade filters have been shown to remove airborne particles with a diameter of 0.1 microns or even smaller. </span><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Don’t</span></strong><span data-dcnode-id="606" instrument_node=""> return the product just because the box says the product removes 99.97% of 0.3-micron particulates. What the description fails to state is that the filters capture up to 99.50% of 0.1-micron particles. Isn’t this the weapon you need to fight off all those filthy airborne particles calling the shots in your home?</span></p><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Additional features include a child-lock so your pet or child won’t change the current settings. Also, you get a timer (8 hours) as well as a filter replacement indicator. But that’s as smart as it gets. You won’t be able to control this product using Amazon Alexa. In addition, there’s no app to help you control the unit via phone. I feel those omissions shouldn’t be viewed as dealbreakers.</span></p><p data-dcnode-id="595"><span data-dcnode-id="602" instrument_node="">As far as </span><strong data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">certifications</span></strong><span data-dcnode-id="599" instrument_node="">, the unit boasts every critical </span><em data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">endorsement</span></em><span data-dcnode-id="596" instrument_node=""> you’d want. The device is AHAM-rated, Energy Star rated, and ETL certified. In other words, it’s has known filtration efficiency level. Plus, it won’t shoot your electric bill to the moon. Also, it’s been tested and certified safe for home use.</span></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Finally, the Medify MA-25 is CARB certified. You certainly can buy and use it in California, arguably America’s strictest state when it comes to product safety.</span></p><p data-dcnode-id="589"><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Note </span></strong><span data-dcnode-id="590" instrument_node="">that the Medify MA-25 doesn’t come with an ionizer. So, it’s not an ozone factory.</span></p><div class="wp-c
