id="2293" instrument_node="">!</span></p><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Here’s What the NEW Medify MA-25 looks like</span></p><h3 data-dcnode-id="2280"><span class="ez-toc-section" data-dcnode-id="2289" id="7-Medify-MA-25-Medical-Grade-H13-True-HEPA-Air-Purifier-Best-Value"></span><span data-dcnode-id="2288" instrument_node="">7. </span><a data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B081NWVMCH/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB081NWVMCH%26linkCode%3Dam2%26tag%3Dwakabura10000-20%26linkId%3D921cb0ce4da5b7321c5dbd50b32d4574" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2287" instrument_node="">Medify MA-25 Medical-Grade H13 True HEPA Air Purifier</span></a><img alt="" border="0" class="entered error" data-dcnode-id="2285" data-lazyloaded="1" data-ll-status="error" data-src="//ir-na.amazon-adsystem.com/e/ir?t=wakabura10000-20&amp;l=am2&amp;o=1&amp;a=B081NWVMCH" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ir-na.amazon-adsystem.com/e/ir%3Ft%3Dwakabura10000-20%26l%3Dam2%26o%3D1%26a%3DB081NWVMCH&amp;raw" style="border: none !important; margin: 0px !important;" width="1"><noscript data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">&lt;img style="border: none !important; margin: 0px !important;" src="//ir-na.amazon-adsystem.com/e/ir?t=wakabura10000-20&amp;amp;l=am2&amp;amp;o=1&amp;amp;a=B081NWVMCH" alt="" width="1" height="1" border="0" /&gt;</span></noscript><span data-dcnode-id="2282" instrument_node=""> (Best Value)</span><span class="ez-toc-section-end" data-dcnode-id="2281"></span></h3><p data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">View image after the first paragraph of this post.</span></p><p data-dcnode-id="2274"><strong data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">It’s No secret — I Love Medifys. </span></strong><span data-dcnode-id="2275" instrument_node="">They’re beautiful and clean the air powerfully and fast. I’ve been researching air purification solutions for quite some time now. And I sure have come across many great options.</span></p><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">But I can say without fear of contradiction that Medify offers some of the best air cleaners on Earth.</span></p><p data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">It’s easy to get carried away while describing a product you love. But I always strive to communicate objectively. You won’t find salesy content here. If while writing these Medify air purifier reviews I found a downright-crappy device, be assured I didn’t praise it.</span></p><p data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Yes, I’m a marketer. And I’ll earn a small commission if you end up buying any of these air cleaners. But I’m a decent chap who never calls white objects black and vice-versa.</span></p><p data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Believe it or not, I’ve seen some of my readers buying products whose cons outnumbered the pros! Why did that happen? It’s because they felt I was honest and straightforward about the opinions I offer here.</span></p><p data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">If you ever feel I’m just trying to push products rather than trying to be helpful, call me out. Shame me, and make sure to tell others about this website and my glaring dishonesty. A shameless, slimy salesperson deserves no better than that.</span></p><h2 data-dcnode-id="2260"><span class="ez-toc-section" data-dcnode-id="2263" id="MedifyAir-the-Manufacturer"></span><span data-dcnode-id="2262" instrument_node="">MedifyAir, the Manufacturer</span><span class="ez-toc-section-end" data-dcnode-id="2261"></span></h2><p data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">What do MGM Grand, The Redbury, Resorts Casino Hotel, Trump International Hotel, Sheraton Grand, Marriot, and Hilton have in common? They all love Medifys.</span></p><p data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">I’m not saying buy Medify just because big-name companies buy them, though. I’m simply saying that many credible brands think this company’s air filtration devices are great.</span></p><p data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">They don’t buy these machines because they’re cute (they are by the way). They favor them because they work.</span></p><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">But why should you trust this company? They’re not the only great air purifiers manufacturer in the world. So, what makes them stand out?</span></p><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Medify was established in 2017, and that makes it almost a new company. But the people behind it are seasoned engineers and finance experts that understand how to make a business work. Together, they bring to the table a combined experience spanning over 50 years.</span></p><p data-dcnode-id="2246"><span data-dcnode-id="2249" instrument_node="">The company has been tinkering with air filtration technology developing it, testing it, improving it, and fine-tuning it. As a result, the air cleaning devices they make are some of the best on the market. I mean, how many air options purify the air down to 0.1 microns? Very few indeed</span><strong data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">. </span></strong></p><p data-dcnode-id="2238"><span data-dcnode-id="2245" instrument_node="">Do you know why you should choose air purifiers that filter the air down to 0.1 microns? It’s because you want to live long. You don’t want to be among the </span><strong data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">over 8,000,000 people</span></strong><span data-dcnode-id="2242" instrument_node=""> dying each year due to air pollution. Let that sink in. Over 8 million people lose their lives to air pollution (both </span><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dustfreerooms.com/a-comprehensive-air-purifier-buying-guide-for-people-who-hate-making-costly-mistakes/"><span data-dcnode-id="2241" instrument_node="">indoor and outdoor air pollution</span></a><span data-dcnode-id="2239" instrument_node="">) every year!</span></p><p data-dcnode-id="2235"><strong data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">Two major kinds of air pollution are: </span></strong></p><ol data-dcnode-id="2230"><li data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">Indoor air pollution</span></li><li data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Outdoor air pollution (also called ambient air pollution)</span></li></ol><p data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">Air pollution refers to a whole spectrum of very small particles that when inhaled can cause dire complications. These particles are classified into two types: PM2.5 and PM10.</span></p><p data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">PM means particulate matter. PM2.5 refers to all particles whose diameter is smaller than 2.5 microns. One micron is a very small unit of measurement. It equals about 0.00004 inches. By contrast, PM10 are particles with diameter ranging between 2.5 and 10 microns.</span></p><p data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Your eyes can’t detect anything smaller than 50 microns. And the diameter of your hair is roughly 80-100 microns. Most PM10 and PM2.5 particles are microscopic — you’d need a powerful electron microscope to see them.</span></p><p data-dcnode-id="2211"><a data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/pm-pollution/particulate-matter-pm-basics" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2223" instrument_node="">The EPA</span></a><span data-dcnode-id="2221" instrument_node=""> calls PM10 </span><strong data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">inhalable particles</span></strong><span data-dcnode-id="2218" instrument_node=""> while referring to PM2.5 as </span><strong data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">fine inhalable</span></strong><span data-dcnode-id="2215" instrument_node=""> </span><strong data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">particles</span></strong><span data-dcnode-id="2212" instrument_node="">.The naked eye can detect some PM10 particles either because they’re large or are quite dark.</span></p><p data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node="">While both </span><a data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dustfreerooms.com/do-hepa-air-purifiers-remove-pm2-5/"><span data-dcnode-id="2209" instrument_node="">PM2.5 and PM10</span></a><span data-dcnode-id="2207" instrument_node=""> are lethal air pollutants, PM2.5 are terrifying because they’re extremely small. For that reason, PM2.5 can travel to the remotest cells in the body and cause havoc there.</span></p><p data-dcnode-id="2201"><span data-dcnode-id="2205" instrument_node="">Most </span><a data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dustfreerooms.com/levoit-lv-h134-vs-levoit-lv-pur131-vs-levoit-lv-pur131s/"><span data-dcnode-id="2204" instrument_node="">True HEPA air purifiers</span></a><span data-dcnode-id="2202" instrument_node=""> remove both PM10 and PM2.5. If you visit Amazon now, you’ll see that most of these devices handle particles 0.3 microns in diameter or larger. But as noted above, you should worry more about 0.1 particles than 0.3 micron particles. Generally, the smaller the particle, the more potentially harmful.</span></p><p data-dcnode-id="2191"><strong data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">All</span></strong><span data-dcnode-id="2198" instrument_node=""> </span><strong data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Medifys</span></strong><span data-dcnode-id="2195" instrument_node="">&nbsp;help eradicate particles as small as 0.1 microns. They can filter out face powder particles whose diameter ranges from 0.1 – 30 microns. They also can effectively take out paint pigments, household dust, mold, bacteria, viruses, and pollen</span><strong data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">.</span></strong><span data-dcnode-id="2192" instrument_node=""> In addition, they can easily eliminate particles coming from burning wood, tobacco smoke, pet dander, skin flakes, and asbestos. That’s the Medify advantage.</span></p><h2 data-dcnode-id="2187"><span class="ez-toc-section" data-dcnode-id="2190" id="11-Reasons-to-Buy-a-Medify"></span><span data-dcnode-id="2189" instrument_node="">11 Reasons to Buy a Medify</span><span class="ez-toc-section-end" data-dcnode-id="2188"></span></h2><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Let’s jump right in.</span></p><h3 data-dcnode-id="2181"><span class="ez-toc-section" data-dcnode-id="2184" id="1-Lifetime-Warranty"></span><span data-dcnode-id="2183" instrument_node="">1. Lifetime Warranty</span><span class="ez-toc-section-end" data-dcnode-id="2182"></span></h3><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">MedifyAir is probably the only manufacturer that provides a lifetime guarantee for all their products. As long as you replace filters when you should, they’ll fix your unit or replace it.</span></p><p data-dcnode-id="2172"><span data-dcnode-id="2178" instrument_node="">Now, compare Medify’s lifetime warranty with 1-2 year warranties typically provided by many brands. See, buying a Medify offers complete peace-of-mind. They surely must have absolute confidence in their products. Think about it again </span><strong data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">— </span></strong><span data-dcnode-id="2175" instrument_node="">ALL Medifys come with a lifetime warranty</span><strong data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">. </span></strong></p><h3 data-dcnode-id="2168"><span class="ez-toc-section" data-dcnode-id="2171" id="2-Some-Medifys-Are-CARB-rated"></span><span data-dcnode-id="2170" instrument_node="">2. Some Medifys Are CARB-rated</span><span class="ez-toc-section-end" data-dcnode-id="2169"></span></h3><p data-dcnode-id="2163"><span data-dcnode-id="2167" instrument_node="">Renters and homeowners in California can use some Medifys because they’re CARB-certified. They’re safe to use in this state. California doesn’t allow products producing over </span><strong data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">0.05 ppm of ozone</span></strong><span data-dcnode-id="2164" instrument_node=""> to be sold within the state. So, with the CARB-rated options, you and your loved ones have nothing to worry about.</span></p><p data-dcnode-id="2152"><span data-dcnode-id="2162" instrument_node="">While researching for this article, I discovered that out of 6 products made by Medify, </span><strong data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">only</span></strong><span data-dcnode-id="2159" instrument_node=""> </span><strong data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">3 are CARB-approved</span></strong><span data-dcnode-id="2156" instrument_node="">. Read more about CARB certification </span><a data-dcnode-id="2154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ww2.arb.ca.gov/our-work/programs/air-cleaners-ozone-products/california-certified-air-cleaning-devices" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2155" instrument_node="">here</span></a><span data-dcnode-id="2153" instrument_node="">.</span></p><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">The Medify MA-14, MA-40, and MA-112 are CARB-tested and approved. But the MA-440, MA-18 and MA-Smart aren’t CARB-certified as of this writing. I’ll update this section if and when any new developments happen.</span></p><h3 data-dcnode-id="2146"><span class="ez-toc-section" data-dcnode-id="2149" id="3-Some-Are-AHAM-certified"></span><span data-dcnode-id="2148" instrument_node="">3. Some Are AHAM-certified</span><span class="ez-toc-section-end" data-dcnode-id="2147"></span></h3><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">AHAM is a private organization that performs a series of tests on air filtration product to rate them.&nbsp; Manufacturers aren’t required to have their offerings tested by AHAM, though. It’s AHAM that provides the CADR info you see on most air cleaners.</span></p><p data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">But why is CADR info important? Why should you care? There’s a lot of confusion surrounding this number. But what is it, and what does it exactly measure?</span></p><p data-dcnode-id="2134"><span data-dcnode-id="2141" instrument_node="">CADR is an abbreviation for </span><strong data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Clean Air Delivery Rate. </span></strong><span data-dcnode-id="2138" instrument_node="">It’s a universally accepted </span><em data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">language</span></em><span data-dcnode-id="2135" instrument_node=""> of describing an air purifier’s efficiency. It gives an indication of how fast or slow a purifier is.</span></p><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">AHAM tests these machines and comes up with 3 critical clean air delivery rate numbers for every machine. It bases the ratings on each machine’s effectiveness in terms of handling 3 common particles. These are smoke, dust, and pollen.</span></p><p data-dcnode-id="2124"><span data-dcnode-id="2131" instrument_node="">The CADR for smoke represents how well a particular type of air purifier removes </span><strong data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">0.09- 1-micron </span></strong><span data-dcnode-id="2128" instrument_node="">smoke particles. Similarly, the CADR for dust showcases the device’s effectiveness in handing dust particles in the </span><strong data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">0.5-3 micron range</span></strong><span data-dcnode-id="2125" instrument_node="">. Finally, we have the CADR for pollen. The number expresses the purifier’s effectiveness in terms of eliminating pollen particles ranging between 5 and 11 microns in diameter.</span></p><p data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Two factors come into play when calculating a CADR rating. These are the air purifier’s air flow and filter efficiency. CADR numbers indicate how much sanitized air a device delivers when running on the highest speed. If you run your device on a lower fan speed, you’ll have a lower CADR than what the unit is rated for. Keep that in mind when shopping.</span></p><p data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">I advise my readers to always buy an air purifier with a greater CADR than they need. Why? It’s because people don’t run air purifiers on high the whole time. But everyone wants their unit to work effectively even on low.</span></p><p data-dcnode-id="2109"><span data-dcnode-id="2119" instrument_node="">Many people in the United States today battle </span><a data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dustfreerooms.com/"><span data-dcnode-id="2118" instrument_node="">allergies and asthma</span></a><span data-dcnode-id="2116" instrument_node="">. Breathing in these allergen triggers makes their life miserable. Luckily, portable room air cleaners have been </span><strong data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">scientifically proven</span></strong><span data-dcnode-id="2113" instrument_node=""> to help with allergies and asthma. Read more about whether </span><a data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dustfreerooms.com/a-comprehensive-air-purifier-buying-guide-for-people-who-hate-making-costly-mistakes/"><span data-dcnode-id="2112" instrument_node="">air purifiers offer any relief for allergy and asthma</span></a><span data-dcnode-id="2110" instrument_node=""> sufferers.</span></p><p data-dcnode-id="2104"><span data-dcnode-id="2108" instrument_node="">The 3 CADR numbers mentioned above provide a reliable way to compare different air cleaners. If you’re looking at two AHAM-rated options, always take the one with a higher number. All other things being equal, that device should perform better than its competitor in terms of purifying your air. </span><strong data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Y</span></strong><span data-dcnode-id="2105" instrument_node="">ou’re advised to always pick products whose CADR value is over 100 — the higher the better.</span></p><p data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Additionally, this number helps you to estimate the amount of room a given air purifier can effectively clean. If you multiply the CADR number by 2/3, you should get the room size the machine is built for. For instance, a device with a CADR of 330 is designed to treat rooms measuring about 220 sq ft.</span></p><p data-dcnode-id="2097"><span data-dcnode-id="2101" instrument_node="">In the U.S., CADR is expressed as CFM, which means </span><strong data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Cubic Feet Per Minute</span></strong><span data-dcnode-id="2098" instrument_node="">. In Asia and Europe, however, CADR is expressed as CMH, Cubic Meters Per Hour.</span></p><p data-dcnode-id="2094"><strong data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">I CFM =1.699011 cubic meter per hour. </span></strong></p><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">So, what’s the relationship between CADR and CFM? I’ll answer that. Assume a particular purifier moves 100 cubic feet of air every 60 minutes (CFM of 100), and its filter efficiency is 80%. This machine’s CADR should be 80. As you can clearly see, CADR is a product of efficiency and airflow. That is, (80/100 x 100).</span></p><p data-dcnode-id="2084"><span data-dcnode-id="2091" instrument_node="">Good news: </span><strong data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">ALL Medifys </span></strong><span data-dcnode-id="2088" instrument_node="">offer CADR numbers. You can easily compare them with other choices and see how they stack up. The </span><strong data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Medify MA-40</span></strong><span data-dcnode-id="2085" instrument_node="">, for example, offers a CADR of 330.</span></p><p data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">In this post, I’ll tell you everything about these air cleaners. I’ll lay bare both the good and the bad. And I never omit ugly things about a purifier if I encounter them.</span></p><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">If I tell you these or any other air purifiers work, rest assured they do. Similarly, if I point out that a certain purifier doesn’t make the grade, don’t buy it. If you do, you’ll almost always lament your decision down the road.</span></p><h3 data-dcnode-id="2076"><span class="ez-toc-section" data-dcnode-id="2079" id="4-Medifys-Look-Great"></span><span data-dcnode-id="2078" instrument_node="">4. Medifys Look Great</span><span class="ez-toc-section-end" data-dcnode-id="2077"></span></h3><p data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Let’s admit it — most air cleaning devices aren’t cute. I’d even say that the air purifier market today has more than its fair share of ugly products.</span></p><p data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">So, what do I think about Medifys? Well, I can’t say they’re the cutest I’ve seen. But they look every inch like the sleek, modern devices they are. And because these machines are mostly black or white, they plug nicely into the existing color scheme.</span></p><h3 data-dcnode-id="2068"><span class="ez-toc-section" data-dcnode-id="2071" id="5-They-Effectively-Remove-Both-PM25-and-PM10"></span><span data-dcnode-id="2070" instrument_node="">5. They Effectively Remove Both PM2.5 and PM10</span><span class="ez-toc-section-end" data-dcnode-id="2069"></span></h3><p data-dcnode-id="2063"><span data-dcnode-id="2067" instrument_node="">With MedifyAir filtration technology, you’ll worry less about asbestos, tobacco smoke, VOCs, </span><a data-dcnode-id="2065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dustfreerooms.com/is-this-the-best-air-purifier-for-construction-dust-find-out/"><span data-dcnode-id="2066" instrument_node="">construction dust</span></a><span data-dcnode-id="2064" instrument_node="">, and more. Also, household dust, pet dander, pollen, and other allergens will have to look for a new home.</span></p><p data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">If allergies and asthma bothered you, consider buying a Medify. Of course, they won’t cure your allergies or asthma, but you’ll start enjoying your life. You’ll start sleeping much better, and all the sniffling will soon be history. You’ll start looking forward to spring with all the beauty, newness, and hope it brings.</span></p><p data-dcnode-id="2056"><span data-dcnode-id="2060" instrument_node="">And does your home stand near a busy road? If yes, your indoor environment possibly contains loads of benzene and nitrogen dioxides. These pollutants are potentially dangerous. You need the </span><a data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dustfreerooms.com/best-air-purifier-for-exhaust-fumes/"><span data-dcnode-id="2059" instrument_node="">best air purifier for exhaust fumes</span></a><span data-dcnode-id="2057" instrument_node=""> to handle them.</span></p><h3 data-dcnode-id="2052"><span class="ez-toc-section" data-dcnode-id="2055" id="6-Theyre-Easy-to-Use"></span><span data-dcnode-id="2054" instrument_node="">6. They’re Easy to Use</span><span class="ez-toc-section-end" data-dcnode-id="2053"></span></h3><p data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Simply get your device out of the box and plug it in. The filters come pre-installed. Simply plug them in, turn them on, choose your preferred speed and voila! clean, crisp air.</span></p><p data-dcnode-id="2045"><span data-dcnode-id="2049" instrument_node="">With most air-</span><em data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">freshening</span></em><span data-dcnode-id="2046" instrument_node=""> devices, you have to fit the filters in correctly before you can use your machine. And if you insert the filters wrongly, the unit likely won’t work.</span></p><p data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Remember: ALWAYS remove the plastic that wraps the filter before plugging any of the Medifys in. If you forget that, you’ll end up complaining your device isn’t working effectively.</span></p><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Also, filter replacement is a breeze. Grab the cartridge (containing prefilter, activated carbon, and H13 filter) and insert it into place. That’s all. Remove the plastic wrapping, though.</span></p><h3 data-dcnode-id="2037"><span class="ez-toc-section" data-dcnode-id="2040" id="7-Designed-in-the-USA"></span><span data-dcnode-id="2039" instrument_node="">7. Designed in the U.S.A</span><span class="ez-toc-section-end" data-dcnode-id="2038"></span></h3><p data-dcnode-id="2032"><span data-dcnode-id="2036" instrument_node="">Most of us have bought a product(s) made outside of the United States. And that’s ok. But here’s a self-evident truth</span><strong data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">. </span></strong><span data-dcnode-id="2033" instrument_node="">Products manufactured in the United States trump those made in China and other countries. That’s why US-made goods tend to be more expensive. But they also (often) last longer and perform better than knock offs from god-knows-where.</span></p><p data-dcnode-id="2028"><strong data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Medify is a U.S.-owned company</span></strong><span data-dcnode-id="2029" instrument_node="">. Every time you buy a Medify, you’re supporting America. You’re creating employment for fellow Americans. That’s a duty every American must take seriously in this day and age of cutthroat competition between countries.</span></p><p data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">But I also noted that some of the company’s representatives didn’t sound American. I felt English wasn’t their first language. In fact, one of them said he was in Asia. That’s why he couldn’t do for me a small favor I’d requested. Is it possible the company outsources some of the manufacturing to an Asian country for obvious reasons? That’s likely possible.</span></p><p data-dcnode-id="2022"><strong data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Update</span></strong><span data-dcnode-id="2023" instrument_node="">: I recently learned that these dust and allergen-removing machines are designed in the U.S. but made in china. I don’t know what to think of that, but the products do what they’re designed to do: clean dirty air.</span></p><h3 data-dcnode-id="2018"><span class="ez-toc-section" data-dcnode-id="2021" id="8-Small-American-Business-Owned-by-a-Veteran"></span><span data-dcnode-id="2020" instrument_node="">8. Small American Business Owned by a Veteran</span><span class="ez-toc-section-end" data-dcnode-id="2019"></span></h3><p data-dcnode-id="2014"><strong data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">You probably didn’t know that Medify is owned by a Vet</span></strong><span data-dcnode-id="2015" instrument_node="">. Proud of men and women who’ve fought gallantly for America? If yes, you’ll want to support them wherever you can. If you’ve never done an act of kindness to a Vet, now is the time.</span></p><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">You’ve supported faceless behemoths for years. It’s about time you gave a small deserving company like Medify a chance.</span></p><p data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Maybe you don’t want to support Medify because it’s a small business or because a Vet owns it. But shouldn’t you support them because they’re an American business that sells high-quality items?</span></p><h3 data-dcnode-id="2006"><span class="ez-toc-section" data-dcnode-id="2009" id="9-Filter-Replacement-Indicator"></span><span data-dcnode-id="2008" instrument_node="">9. Filter Replacement Indicator</span><span class="ez-toc-section-end" data-dcnode-id="2007"></span></h3><p data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">All 7 Medifys come with a filter replacement reminder so you don’t need to remember dates. That’s really cool feature.</span></p><h3 data-dcnode-id="2000"><span class="ez-toc-section" data-dcnode-id="2003" id="10-Energy-Star-Certification"></span><span data-dcnode-id="2002" instrument_node="">10. Energy Star Certification</span><span class="ez-toc-section-end" data-dcnode-id="2001"></span></h3><p data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">The Medify MA-112, Medify MA-14, Medify MA-40, and MA-112 are Energy Star rated. But the MA-18, the MA-Smart, and MA-440 are not certified yet.</span></p><p data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">However, Medify said they’re working on getting them certified. An Energy Star certified device consumes a known amount of electricity per hour. Also, it’s significantly more efficient than one that’s not.</span></p><h3 data-dcnode-id="1992"><span class="ez-toc-section" data-dcnode-id="1995" id="11-They-Use-a-Substantial-Amount-of-Carbon"></span><span data-dcnode-id="1994" instrument_node="">11. They Use a Substantial Amount of Carbon</span><span class="ez-toc-section-end" data-dcnode-id="1993"></span></h3><p data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Except for the MA-14, every Medify uses at least 1 activated carbon filter. The MA-112 uses 2, though. This filter comes loaded with high-surface area granulated carbon which adsorbs odors and smoke.</span></p><p data-dcnode-id="1982"><span data-dcnode-id="1989" instrument_node="">According to the </span><strong data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Journal of the Air Pollution Control Association</span></strong><span data-dcnode-id="1986" instrument_node="">, activated carbon filters are great at eliminating smells. In fact, they remove up to </span><a data-dcnode-id="1984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/pdf/10.1080/00022470.1963.10468157" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1985" instrument_node="">50 percent of their own weight</span></a><span data-dcnode-id="1983" instrument_node=""> in radioactive gases, odors, noxious gases, and fumes.</span></p><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">So, if toxic exhaust fumes and harmful VOCs such as formaldehyde are your scariest threats, buy a purifier that offers a substantial quantity of carbon. Luckily, all Medifys use a substantial amount of carbon. Meaning they remove more gaseous pollutants than thinner filters do.</span></p><h2 data-dcnode-id="1976"><span class="ez-toc-section" data-dcnode-id="1979" id="Cons-of-Medify-Air-Purifiers"></span><span data-dcnode-id="1978" instrument_node="">Cons of Medify Air Purifiers</span><span class="ez-toc-section-end" data-dcnode-id="1977"></span></h2><p data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Very few products are 100% perfect, and this company’ offerings are no exception.</span></p><h3 data-dcnode-id="1970"><span class="ez-toc-section" data-dcnode-id="1973" id="1-Some-Are-Pricey"></span><span data-dcnode-id="1972" instrument_node="">1. Some Are Pricey</span><span class="ez-toc-section-end" data-dcnode-id="1971"></span></h3><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Admittedly, Medifys aren’t the cheapest devices you can buy. The MA-112, for instance, costs over $700 as of this writing. But these options are high-quality products that effectively do the job.</span></p><p data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">Pricey doesn’t always mean high-quality, though. But in the case of Medifys, however, the prices seem justifiable.</span></p><p data-dcnode-id="1962"><span data-dcnode-id="1965" instrument_node="">If money is a serious constraint for you, consider buying any of these budget</span><a data-dcnode-id="1963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dustfreerooms.com/best-budget-air-purifiers-under-100-that-work/"><span data-dcnode-id="1964" instrument_node="">&nbsp; air purifiers under $100.</span></a></p><h3 data-dcnode-id="1958"><span class="ez-toc-section" data-dcnode-id="1961" id="2-Most-Medifys-Arent-Smart"></span><span data-dcnode-id="1960" instrument_node="">2. Most Medifys Aren’t “Smart”</span><span class="ez-toc-section-end" data-dcnode-id="1959"></span></h3><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Only one Medify purifier is Wi-Fi enabled. And it’s not even the one you think — not the MA-112. It’s a lower-priced model, the MA-Smart. Also, the MA-Smart is the only one in the series that’s compatible with Google Home and Alexa.</span></p><p data-dcnode-id="1951"><span data-dcnode-id="1955" instrument_node="">Well, the MA-440 can also be remotely controlled. But for the MA-440, you don’t even get to use an app to control the device. You get a special tablet that lets you man the thing. But you need to be within 10 feet of the machine since you’re relying on Bluetooth technology. So, strictly speaking, only the MA-Smart is truly </span><em data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">smart</span></em><span data-dcnode-id="1952" instrument_node="">.</span></p><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">That doesn’t seem to make any sense to me. I feel these smart features should have gone to the MA-40 or MA-112. But that’s the way it is.</span></p><p data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Yes, Medifys are great, but I feel more of them should be Wi-Fi enabled.</span></p><h3 data-dcnode-id="1943"><span class="ez-toc-section" data-dcnode-id="1946" id="3-Some-Medifys-Produce-Ozone"></span><span data-dcnode-id="1945" instrument_node="">3. Some Medifys Produce Ozone</span><span class="ez-toc-section-end" data-dcnode-id="1944"></span></h3><p data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Ozone can irritate or inflame sensitive airways. People struggling with asthma or allergies are generally advised to avoid ozone generators. Some Medifys such as the Medify MA-440, Medify MA-40, MA-18, and Medify MA-112 pump out a certain quantity of ozone. Good news: most of these machines are CARB-certified. I explained why this certification matters above.</span></p><h2 data-dcnode-id="1937"><span class="ez-toc-section" data-dcnode-id="1940" id="Medify-Air-Purifier-Reviews"></span><span data-dcnode-id="1939" instrument_node="">Medify Air Purifier Reviews</span><span class="ez-toc-section-end" data-dcnode-id="1938"></span></h2><p data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">What’s is the best Medify air purifier? Let’s scrutinize these 6 Medifys and see if they’re worth it.</span></p><p data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">So, let’s dive in.</span></p><h2 data-dcnode-id="1929"><span class="ez-toc-section" data-dcnode-id="1932" id="1-Medify-M-14-True-HEPA-Filter-H13-Review"></span><span data-dcnode-id="1931" instrument_node="">1. Medify M-14 True HEPA Filter H13 Review</span><span class="ez-toc-section-end" data-dcnode-id="1930"></span></h2><p data-dcnode-id="1922"><strong data-dcnode-id="1923"><span data-dcnode-id="1928" instrument_node="">Editor’s Rating: </span><img alt="4.2 out of 5 stars" class="usr" data-dcnode-id="1927" data-lazyloaded="1" data-src="https://dustfreerooms.com/wp-content/plugins/universal-star-rating/includes/image.php?img=01.png&amp;px=12&amp;max=5&amp;rat=4.2" src="data:image/gif;base64,R0lGODdhAQABAPAAAMPDwwAAACwAAAAAAQABAAACAkQBADs=" style="height: 12px !important;"><noscript data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">&lt;img class="usr" src="https://dustfreerooms.com/wp-content/plugins/universal-star-rating/includes/image.php?img=01.png&amp;amp;px=12&amp;amp;max=5&amp;amp;rat=4.2" alt="4.2 out of 5 stars" style="height: 12px !important;" /&gt;</span></noscript><span data-dcnode-id="1924" instrument_node=""> (4.2 / 5)</span></strong></p><h2 data-dcnode-id="1918"><span class="ez-toc-section" data-dcnode-id="1921" id="A-Quick-Overview"></span><span data-dcnode-id="1920" instrument_node="">A Quick Overview</span><span class="ez-toc-section-end" data-dcnode-id="1919"></span></h2><ul data-dcnode-id="1882"><li data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Dimensions: 8.26″ D x 8.26″ W x 12.20″ H</span></li><li data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">Weight: 5.3 lbs</span></li><li data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Design: Slim rectangular shape. Sleek and simple</span></li><li data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Color: White</span></li><li data-dcnode-id="1905"><span data-dcnode-id="1909" instrument_node="">Filters: 1 prefilter, 1 HEPA H13 filter, </span><em data-dcnode-id="1906"><strong data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">no carbon filter</span></strong></em></li><li data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Filter Life: 4 months</span></li><li data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Particle Sensor: No</span></li><li data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Filter Replacement Light: YES</span></li><li data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Smart Features: No</span></li><li data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Timer:NO</span></li><li data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Ionizer: NO</span></li><li data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Child Lock: NO</span></li><li data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Fan Speed: 3</span></li><li data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Area Purified: 200 sq ft</span></li><li data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">CADR: 120</span></li><li data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Energy Star rating: YES</span></li></ul><p data-dcnode-id="1877"><span data-dcnode-id="1881" instrument_node="">The Medify MA-14 offers impressive air cleaning effectiveness in a sleek, simple package. It’s designed to freshen the air in bedrooms, dorm rooms, baby nurseries, and enclosed offices. Its </span><em data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">cleaning power</span></em><span data-dcnode-id="1878" instrument_node=""> covers up to 200 sq ft.</span></p><p data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">The unit’s easy-to-use control panel is on the machine’s front-facing side. You can power the machine on and off and choose one one of 3 fan speeds. You can also turn the sleep mode on or off. Or turn off all the lights.</span></p><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Suppose you run the MA-14 on high in an enclosed area measuring 12 ft. x 10 ft. for 60 minutes.&nbsp; The device would circulate the air at least 4 times. And if the area were larger (470 sq. ft.), the machine would circulate the air once in 60 minutes. The smaller the room, the more the circulations.</span></p><p data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">Standing only 12.20″, this unit isn’t bulky, so,&nbsp; no headaches when handling it. Also, it looks cute. You can place it in the living room without worry.</span></p><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Its HEPA H13 filters remove 99.97% of larger-than-0.3-micron particles and 99.95% of particles 0.1 microns or larger. That means it’s great for PM10 and PM2.5 removal.</span></p><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Unfortunately, the unit lacks an particle sensor. So, you can’t see how much PM2.5 it’s removing. It works, though. Users typically notice an appreciable difference in their indoor air quality in about 48 hours.</span></p><p data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">On low, you might think the machine isn’t pulling at all — it’s super quiet. Place it in your bedroom, and you’ll sleep peacefully through the night.</span></p><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">On medium, the MA-14 moves the air more powerfully, and quite predictably,&nbsp; it’s a little louder. But it’s a white noise that pretty much anyone can take.</span></p><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">On the highest setting, the highest level of noise the machine produces is 55 decibels. That’s a bit loud, and I doubt a light sleeper would fall sleep at that speed. But that’s the maximum level of noise I’ve seen with many comparable devices.</span></p><h3 data-dcnode-id="1857"><span class="ez-toc-section" data-dcnode-id="1860" id="Maintenance-and-Energy-Consumption"></span><span data-dcnode-id="1859" instrument_node="">Maintenance and Energy Consumption</span><span class="ez-toc-section-end" data-dcnode-id="1858"></span></h3><p data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">You’ll have to replace the filters 3 times each year. The filters cost around $40 on Amazon. But MedifyAir sells them at a cheaper price. So, that’s about $120 on filters annually. That’s about as much as the unit’s cost.</span></p><p data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Shocked?</span></p><p data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">In general, high-quality lower-priced models tend to have relatively expensive filters. But $120 for air with considerably less PM10 and PM2.5 doesn’t look like such a bad deal.</span></p><p data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">The unit’s rated power consumption is 26 watts or about 227.76 kWh per year. At a rate of 10 cents per kWh, you’re looking at $22.78. The annual cost of operating the MA-14 therefore adds up to about $142.78.</span></p><div class="wp-classic-pros-cons wppc-view3" data-dcnode-id="1801"><div class="wppc-boxs" data-dcnode-id="1802"><div class="wppc-box pros-content" data-dcnode-id="1820"><div class="wppc-header" data-dcnode-id="1842"><h4 class="wppc-content-title cons-title" data-dcnode-id="1843"><span class="ez-toc-section" data-dcnode-id="1846" id="Pros"></span><span data-dcnode-id="1845" instrument_node="">Pros</span><span class="ez-toc-section-end" data-dcnode-id="1844"></span></h4></div><ul class="wp-pros-cons-list wp-pros-list" data-dcnode-id="1821"><li class="joomdev_wpc_pro_single" data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Lifetime warranty</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Portable</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Simple, sleek design</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Filter change indicator</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">CARB-approved</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">CADR-rated</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Energy Star rated</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">No ozone produced</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Sleep mode</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Great price</span></li></ul></div><div class="wppc-box cons-content" data-dcnode-id="1803"><div class="wppc-header" data-dcnode-id="1815"><h4 class="wppc-content-title cons-title" data-dcnode-id="1816"><span class="ez-toc-section" data-dcnode-id="1819" id="Cons"></span><span data-dcnode-id="1818" instrument_node="">Cons</span><span class="ez-toc-section-end" data-dcnode-id="1817"></span></h4></div><ul class="wp-pros-cons-list wp-cons-list" data-dcnode-id="1804"><li class="joomdev_wpc_con_single" data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">No carbon filter</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">No particle sensor</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Not Wi-Fi &amp; Alexa-enabled</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Night light too bright</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">No timer</span></li></ul></div></div></div><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Comparable devices come with a carbon filter, but this unit doesn’t. That’s not something I like. However, the HEPA H13 filters the air down to 0.1 microns.</span></p><p data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">And unlike the higher-priced MA-112, this unit offers 1 prefilter and 1 HEPA H13 filter. But that’s pretty much what comparable competitors offer. So I won’t count that against the unit.</span></p><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">But I’d love to see a particle sensor. It’d also be nice if they incorporated smart features such as Wi-Fi and Alexa in future versions of this model. Low-priced models tend not to have smart features, though.</span></p><p data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">However,lack of smart features doesn’t detract from the machine’s usefulness.</span></p><p data-dcnode-id="1788"><span data-dcnode-id="1792" instrument_node="">Would you like to check out a couple more low-cost options that work? Here’s a list of </span><a data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dustfreerooms.com/best-budget-air-purifiers-under-100-that-work/"><span data-dcnode-id="1791" instrument_node="">5 effective air purifiers that cost under $100</span></a><span data-dcnode-id="1789" instrument_node="">.</span></p><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">It’s nice that the unit features a night mode, too. You can use it as a night light. Simply turn it on, and you get a blue light that fades in and out of your bedroom.</span></p><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">But this light might be too hard on some eyes. So, how do you shut off the intrusive MA-14’s nightlight? It’s easy — go to the panel and press the light icon.</span></p><p data-dcnode-id="1779"><span data-dcnode-id="1783" instrument_node="">And what does Medify’s </span><strong data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">lifetime warranty mean</span></strong><span data-dcnode-id="1780" instrument_node="">? I posed this question to MedifyAir. They said they’ll replace faulty parts or even the whole unit throughout its life. However, the user MUST have been replacing filters every 4 months (for this unit).</span></p><p data-dcnode-id="1775"><span data-dcnode-id="1778" instrument_node="">It’d also be nice if it had a timer. Luckily, the unit isn’t a power guzzler</span><strong data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">.</span></strong></p><h2 data-dcnode-id="1771"><span class="ez-toc-section" data-dcnode-id="1774" id="2-Medify-MA-18-True-HEPA-Filter-H13-Review"></span><span data-dcnode-id="1773" instrument_node="">2. Medify MA-18 True HEPA Filter (H13) Review</span><span class="ez-toc-section-end" data-dcnode-id="1772"></span></h2><p data-dcnode-id="1764"><strong data-dcnode-id="1765"><span data-dcnode-id="1770" instrument_node="">Editor’s Rating: </span><img alt="4 out of 5 stars" class="usr" data-dcnode-id="1769" data-lazyloaded="1" data-src="https://dustfreerooms.com/wp-content/plugins/universal-star-rating/includes/image.php?img=01.png&amp;px=12&amp;max=5&amp;rat=4" src="data:image/gif;base64,R0lGODdhAQABAPAAAMPDwwAAACwAAAAAAQABAAACAkQBADs=" style="height: 12px !important;"><noscript data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">&lt;img class="usr" src="https://dustfreerooms.com/wp-content/plugins/universal-star-rating/includes/image.php?img=01.png&amp;amp;px=12&amp;amp;max=5&amp;amp;rat=4" alt="4 out of 5 stars" style="height: 12px !important;" /&gt;</span></noscript><span data-dcnode-id="1766" instrument_node=""> (4 / 5)</span></strong></p><h2 data-dcnode-id="1760"><span class="ez-toc-section" data-dcnode-id="1763" id="A-Quick-Overview-2"></span><span data-dcnode-id="1762" instrument_node="">A Quick Overview</span><span class="ez-toc-section-end" data-dcnode-id="1761"></span></h2><ul data-dcnode-id="1727"><li data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Dimensions: 8.26″ D x 8.26″ W x 11.20″ H</span></li><li data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Weight: 5.3 lbs</span></li><li data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Design: Cute, Compact, cylindrical</span></li><li data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Color: White and black</span></li><li data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Filters: 3-in-1 filter (prefilter, H13, and carbon)</span></li><li data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Filter Life: 4 months</span></li><li data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Particle Sensor: YES</span></li><li data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Filter Replacement Light: YES</span></li><li data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Smart Features: No</span></li><li data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Speed: 3 settings</span></li><li data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Timer: NO</span></li><li data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Ionizer: YES</span></li><li data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Child Lock:NO</span></li><li data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Area Purified: 380 sq ft</span></li><li data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">CADR: 150</span></li><li data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Energy Star rated:Not yet</span></li></ul><p data-dcnode-id="1723"><span data-dcnode-id="1726" instrument_node="">The MA-18 is not only cut but also super easy to operate. It’s a mid-range air cleaning device made for 380 sq. ft. rooms. Unlike some of its siblings, this unit has an elegant cylindrical design. It’s a practical design that supports 360-degree air intake. </span><strong data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Sanitized air comes out via the top, in all directions.</span></strong></p><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Although MedifyAir says this unit is meant for 380 sq. spaces, I’d recommend it for a much smaller room, especially if you battle allergic reactions. If you have asthma or allergies, use it for rooms not a square foot larger than 200. In such a room, you should get at least 4 air circulations every hour.</span></p><p data-dcnode-id="1716"><span data-dcnode-id="1720" instrument_node="">Generally, people with respiratory issues should pick a device whose ACH (in the patient’s room) is at least 4. </span><strong data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Pro tip</span></strong><span data-dcnode-id="1717" instrument_node="">: ALWAYS buy a machine designed for a significantly larger room.</span></p><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">This unit comes in a modern design that offers touchscreen convenience. The controls sit atop the unit, and it features 4 responsive buttons. There’s a power button to turn the unit on or off. Also, there are 3 buttons marked 1, 2, 3 representing 3 speed settings namely Low, Medium, and High.</span></p><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">On low, the unit operates surprisingly quietly. The medium setting gets a bit louder, but nothing insane. You’ll sleep soundly at this setting. On high, it gets quite loud, as you’d expect. But that’s because it’s moving tons of air per minute.</span></p><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">This machine uses a 3-in-1 filter comprising of a prefilter, an activated carbon filter, and a HEPA H13 filter. If you have dogs or cats and are a little worried about pet odors, you can use this unit. It removes pet odors, smoke, cooking odors, and other odors pretty well.</span></p><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Well, your dog’s bed may still smell like your dog. But the smell will stop wafting out to the rest of the house. Other contaminants eradicated include household dust, dust mites, pollen, mold, and pet dander.</span></p><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">It’s also quite effective, like all Medifys, for removing VOCs such as formaldehyde and benzene. That makes this machine a great companion for people living in areas with heavy traffic pollution.</span></p><p data-dcnode-id="1701"><span data-dcnode-id="1705" instrument_node="">Lastly, there’s an </span><strong data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">optional</span></strong><span data-dcnode-id="1702" instrument_node=""> ionizer that helps keep the air smelling clean and fresh.</span></p><h3 data-dcnode-id="1697"><span class="ez-toc-section" data-dcnode-id="1700" id="Maintenance-and-Power-Consumption"></span><span data-dcnode-id="1699" instrument_node="">Maintenance and Power Consumption</span><span class="ez-toc-section-end" data-dcnode-id="1698"></span></h3><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Filter replacement should be done after every 4 months. But you’ll change the filters sooner than that if you live in a highly polluted area. They cost about the same price as those for the MA-14. So, be ready to shell out about $120 annually for filters.</span></p><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">As to power usage, this unit consumes about 35W. In a year (assuming the unit runs 24/7), you’d spend about 306.6 kWh. At 10 cents for every kWh, your electric bill would grow by about $30.66, bringing the total to about $150.66.</span></p><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Do you think paying that much for unadulterated air makes sense? I think it does.</span></p><div class="wp-classic-pros-cons wppc-view3" data-dcnode-id="1639"><div class="wppc-boxs" data-dcnode-id="1640"><div class="wppc-box pros-content" data-dcnode-id="1658"><div class="wppc-header" data-dcnode-id="1684"><h4 class="wppc-content-title cons-title" data-dcnode-id="1685"><span class="ez-toc-section" data-dcnode-id="1688" id="Pros-2"></span><span data-dcnode-id="1687" instrument_node="">Pros</span><span class="ez-toc-section-end" data-dcnode-id="1686"></span></h4></div><ul class="wp-pros-cons-list wp-pros-list" data-dcnode-id="1659"><li class="joomdev_wpc_pro_single" data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Life Warranty</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">360-degree air intake</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Filter change indicator</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">360-degree air distribution</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Affordable</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Sleep mode</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Portable</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Looks great</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">CARB &amp; AHAM-rated</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Ionizer</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Filter replacement a breeze</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Child safety lock</span></li></ul></div><div class="wppc-box cons-content" data-dcnode-id="1641"><div class="wppc-header" data-dcnode-id="1653"><h4 class="wppc-content-title cons-title" data-dcnode-id="1654"><span class="ez-toc-section" data-dcnode-id="1657" id="Cons-2"></span><span data-dcnode-id="1656" instrument_node="">Cons</span><span class="ez-toc-section-end" data-dcnode-id="1655"></span></h4></div><ul class="wp-pros-cons-list wp-cons-list" data-dcnode-id="1642"><li class="joomdev_wpc_con_single" data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">No smart features</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">No particle sensor</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">May produce ozone</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">No timer</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Not Energy Star rated</span></li></ul></div></div></div><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">At that price, I’d expect the unit to have a particle sensor. But the thing works, and the air feels clean and fresh within hours of installing it.</span></p><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Well, the unit produces a certain amount of ozone whenever the ionizer is turned on. However, the concentration stays within safe limits (0.05 ppm). But if you don’t like the idea of breathing in whatever amount of ozone, just turn the ionizer off.</span></p><h2 data-dcnode-id="1631"><span class="ez-toc-section" data-dcnode-id="1634" id="3-Medify-MA-40-Review"></span><span data-dcnode-id="1633" instrument_node="">3. Medify MA-40 Review</span><span class="ez-toc-section-end" data-dcnode-id="1632"></span></h2><p data-dcnode-id="1624"><strong data-dcnode-id="1625"><span data-dcnode-id="1630" instrument_node="">Editor’s Rating: </span><img alt="4.2 out of 5 stars" class="usr" data-dcnode-id="1629" data-lazyloaded="1" data-src="https://dustfreerooms.com/wp-content/plugins/universal-star-rating/includes/image.php?img=01.png&amp;px=12&amp;max=5&amp;rat=4.2" src="data:image/gif;base64,R0lGODdhAQABAPAAAMPDwwAAACwAAAAAAQABAAACAkQBADs=" style="height: 12px !important;"><noscript data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">&lt;img class="usr" src="https://dustfreerooms.com/wp-content/plugins/universal-star-rating/includes/image.php?img=01.png&amp;amp;px=12&amp;amp;max=5&amp;amp;rat=4.2" alt="4.2 out of 5 stars" style="height: 12px !important;" /&gt;</span></noscript><span data-dcnode-id="1626" instrument_node=""> (4.2 / 5)</span></strong></p><h2 data-dcnode-id="1620"><span class="ez-toc-section" data-dcnode-id="1623" id="A-Quick-Overview-Specs-and-Features"></span><span data-dcnode-id="1622" instrument_node="">A Quick Overview: Specs and Features</span><span class="ez-toc-section-end" data-dcnode-id="1621"></span></h2><ul data-dcnode-id="1589"><li data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Dimensions: 10.9″ D x 9.9″ W x 22″ H</span></li><li data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Weight: 15.5 lbs</span></li><li data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Design: Compact, sleek, rectangular design.</span></li><li data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Color: Black or White</span></li><li data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Filters: 1 prefilter, 1 HEPA H13 filters, 1 activated carbon filter</span></li><li data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Filter Life: 6 months</span></li><li data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">PM2.5 particle Sensor: YES</span></li><li data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Smart Features: No</span></li><li data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">3 cleaning speeds</span></li><li data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Timer: YES</span></li><li data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Anion generator: YES</span></li><li data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Child-lock: YES</span></li><li data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Purification Coverage: 800 square feet (800 sq ft)</span></li><li data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">CADR: 330</span></li><li data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Energy Star rated: YES</span></li></ul><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">The Medify MA-40 is the smaller version of the Medify MA-112. And it offers all the features its larger sibling does. But unlike the MA-112, the Medify MA-40 uses one set of filters. I’d also say the MA40 looks somewhat cuter than the mightier MA-112 does.</span></p><p data-dcnode-id="1582"><span data-dcnode-id="1586" instrument_node="">It’s black or white, and as you know, these colors blend in well with most colors. No need to repaint your interiors to accommodate the new appliance.&nbsp; When it comes to indoor air pollution </span><em data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">eaters</span></em><span data-dcnode-id="1583" instrument_node="">, I’ve seen real eyesores, but the MA40 isn’t one of those. And since its weight is only 15.5 lbs, pushing it around should be easy.</span></p><h3 data-dcnode-id="1578"><span class="ez-toc-section" data-dcnode-id="1581" id="Coverage"></span><span data-dcnode-id="1580" instrument_node="">Coverage</span><span class="ez-toc-section-end" data-dcnode-id="1579"></span></h3><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">The unit offers 2 air changes per hour in rooms measuring 800 square feet. If you’re asthmatic, though, you won’t want to use it for 800 square feet rooms. Consider buying the unit for 400 sq ft spaces. The device would circulate the air 4 times in 60 minutes in an area that large. Similarly, you’d get considerably more air changes per hour in a much smaller room. But you really shouldn’t use it to purify very small spaces as it’d be overkill.</span></p><h3 data-dcnode-id="1572"><span class="ez-toc-section" data-dcnode-id="1575" id="Filtration"></span><span data-dcnode-id="1574" instrument_node="">Filtration</span><span class="ez-toc-section-end" data-dcnode-id="1573"></span></h3><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Like the MA-18, this machine uses a prefilter for trapping pet hair, fibers, pet dander and other large particulates. It also features a highly efficient H13 HEPA filter, like all Medifys. And its medical-grade H13 True HEPA filter eliminates 99.97% of particulates equal to or larger than 0.3 microns. This filter takes away your worries regarding pollen, dust, asbestos, dust mites, mold spores, and more.</span></p><p data-dcnode-id="1565"><span data-dcnode-id="1569" instrument_node="">Since it’s a H13 filter, it should also remove 99.95% of ultra-small particles in the </span><strong data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">0.12 to 0.25 range.</span></strong><span data-dcnode-id="1566" instrument_node=""> These are extremely small PM2.5 particles, and you NEVER want to end up in your lungs. They particles are known to cause tons of irreparable damage.</span></p><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">The unit’s substantial carbon filter with carbon pellets tackles toxic fumes, odors, smoke, and VOCs such as formaldehyde. Evidently, it’d be a great device for people living in areas receiving high levels of vehicular pollution.</span></p><p data-dcnode-id="1558"><span data-dcnode-id="1562" instrument_node="">Also, it features an optional negative ion generator (ionizer). The ionizer releases negatively charged ions (anions) into the air, giving it a fresh, clean feel. Have asthma or live with allergies? Don’t worry. The ionizer is an optional feature. I mean, you can easily turn off the anion generator any time you want. If you’re healthy, it’s a good idea to leave the anion producer on. The manufacturer states that this additional filtration capability adds to the overall purification power of the MA40, by as much as </span><strong data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">8 percent</span></strong><span data-dcnode-id="1559" instrument_node="">.</span></p><p data-dcnode-id="1554"><strong data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Note</span></strong><span data-dcnode-id="1555" instrument_node=""> that the machine expels purified air via the front. So, you MUST stand the unit facing into the room and away from the wall or air circulation would be hindered. This isn’t something I like very much, but it’s not a good enough reason to reject this offer.</span></p><h3 data-dcnode-id="1550"><span class="ez-toc-section" data-dcnode-id="1553" id="Timer"></span><span data-dcnode-id="1552" instrument_node="">Timer</span><span class="ez-toc-section-end" data-dcnode-id="1551"></span></h3><p data-dcnode-id="1540"><span data-dcnode-id="1549" instrument_node="">But unlike the MA-14 and MA-18, the Medify MA-40 air purifier comes with an auto shutoff timer. This addition lets you instruct the machine about how long it should run before shutting itself. That’s a cool feature for people who are away working for hours each day. Is that you? If yes, you’ll always come home to squeaky clean air that smells </span><em data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">fresh</span></em><span data-dcnode-id="1546" instrument_node=""> and </span><em data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">healthy</span></em><span data-dcnode-id="1543" instrument_node="">. You can time your device to automatically power off after </span><strong data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">1, 2, 4, or 8 hours.</span></strong></p><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Replacing the filters is very easy, too. Simply remove the panel at the back of the machine and snap them (filters) into place. All 3 filters come in a single cartridge, so you won’t waste time installing them.</span></p><h3 data-dcnode-id="1534"><span class="ez-toc-section" data-dcnode-id="1537" id="Whats-Tempered-Glass"></span><span data-dcnode-id="1536" instrument_node="">What’s Tempered Glass?</span><span class="ez-toc-section-end" data-dcnode-id="1535"></span></h3><p data-dcnode-id="1528"><span data-dcnode-id="1533" instrument_node="">The control panel is made of high-quality tempered glass. Anything unique or special about this type of glass? </span><strong data-dcnode-id="1530"><a data-dcnode-id="1531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abrisatechnologies.com/2015/04/annealing-vs-tempering-glass-strengthening/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1532" instrument_node="">Tempered glass</span></a></strong><span data-dcnode-id="1529" instrument_node=""> is essentially normal annealed glass that’s gone through a further thermally controlled strengthening process. The process applies two kinds of pressure on the glass: compression on the outer glass surfaces and tension on the inner ones.</span></p><p data-dcnode-id="1525"><strong data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">The result? </span></strong></p><p data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Hard, scratch-resistant tempered glass that won’t shatter into jagged shards after mechanical shocks or sudden changes in temperature. What does that mean? Safety. Glass without sharp edges wouldn’t cause as much injury as regular, sharp-edged, untreated annealed glass.</span></p><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">I’m sure you’ve seen tempered glass before. It’s the kind of material used on modern mobile phones, your car’s windshield, and that lovely glass table in the living room. Also, tempered glass makes the MA40 very easy to clean. Just grab a soft piece of cloth and wipe off the dirt.</span></p><h3 data-dcnode-id="1517"><span class="ez-toc-section" data-dcnode-id="1520" id="Particle-Sensor"></span><span data-dcnode-id="1519" instrument_node="">Particle Sensor</span><span class="ez-toc-section-end" data-dcnode-id="1518"></span></h3><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">The air quality sensor assesses your room’s air quality and tells the fan what to do. If the air quality needs improvement, the fan automatically ramps up the speed and vice-versa.</span></p><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">The particle sensor is on the unit’s front-facing side and changes in color to reflect the current indoor pollution situation. If the air is good, the sensor shows blue. And if the air is just ok or fair the color turns green. But if the air quality needs massive improvement, the color becomes red.</span></p><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">I think it’d have been better to have blue indicating “Ok” and green meaning “Good.”</span></p><h3 data-dcnode-id="1507"><span class="ez-toc-section" data-dcnode-id="1510" id="Child-lock"></span><span data-dcnode-id="1509" instrument_node="">Child-lock</span><span class="ez-toc-section-end" data-dcnode-id="1508"></span></h3><p data-dcnode-id="1502"><span data-dcnode-id="1506" instrument_node="">Another useful feature is the</span><strong data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node=""> childlock. </span></strong><span data-dcnode-id="1503" instrument_node="">The feature&nbsp;keeps your adorable kids and pets from interfering with your settings. I found that deactivating the childlock doesn’t work as smoothly as I’d hoped. You must press hold the childlock button for about half a minute to do it. But that seems to be a minor issue and doesn’t reduce the product’s overall convenience.</span></p><h3 data-dcnode-id="1498"><span class="ez-toc-section" data-dcnode-id="1501" id="Night-Mode"></span><span data-dcnode-id="1500" instrument_node="">Night Mode</span><span class="ez-toc-section-end" data-dcnode-id="1499"></span></h3><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">When bedtime comes and the purifier is running on auto mode, the control panel automatically gets dimmed. The only light that remains unaffected is the power button and the particle sensor. But the amount of light they emit isn’t too bright. Anyone would sleep well enough with this mellow illumination on.</span></p><h3 data-dcnode-id="1492"><span class="ez-toc-section" data-dcnode-id="1495" id="Noise-Levels-of-the-MA40"></span><span data-dcnode-id="1494" instrument_node="">Noise Levels of the MA40</span><span class="ez-toc-section-end" data-dcnode-id="1493"></span></h3><p data-dcnode-id="1487"><span data-dcnode-id="1491" instrument_node="">The machine may be the ultimate filtration workhorse, but it won’t beat your eardrums to pulp at any speed. However, it’s not like super quiet. The highest fan speed </span><em data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">thunders</span></em><span data-dcnode-id="1488" instrument_node=""> 66 dB , and that’s honestly too loud. But it’s unlikely you’d want to hit the sack with that setting on!</span></p><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">On low, the thing does get quieter, but not very quiet at&nbsp; 50dB. Luckily, 50 dB is way more tolerable than 66 dB. Plus, you can position the machine as far away as possible so the noise won’t bother you that much. While overall performance drops when you choose Low, you’d still get an adequate and consistent level of performance.</span></p><h3 data-dcnode-id="1481"><span class="ez-toc-section" data-dcnode-id="1484" id="Maintenance-and-power-consumption"></span><span data-dcnode-id="1483" instrument_node="">Maintenance and power consumption</span><span class="ez-toc-section-end" data-dcnode-id="1482"></span></h3><p data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">Filters should be changed semiannually, about 3,000 hours of filter-life. Replacement filters are easily available on Amazon and other places. Search for </span><strong data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Genuine Medify Replacement filter B07MTQFFNT</span></strong><span data-dcnode-id="1477" instrument_node="">. At the moment, they cost around $40 on Amazon (prices keep changing), so that’ll set you back $80 every year. It’s Energy Star certified comes with a Wattage of 68W.</span></p><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">If you run it 365 days a year, you’ll ratchet up your energy bill by about $59.57. The total costs would be $139.57. That’s how much you’ll part with for a constant supply of clean, healthy air. By the way, the recommended voltage outlet for the MA40 is 110V-120V and the frequency is the usual 60 Hz.</span></p><div class="wp-classic-pros-cons wppc-view3" data-dcnode-id="1422"><div class="wppc-boxs" data-dcnode-id="1423"><div class="wppc-box pros-content" data-dcnode-id="1437"><div class="wppc-header" data-dcnode-id="1467"><h4 class="wppc-content-title cons-title" data-dcnode-id="1468"><span class="ez-toc-section" data-dcnode-id="1471" id="Pros-3"></span><span data-dcnode-id="1470" instrument_node="">Pros</span><span class="ez-toc-section-end" data-dcnode-id="1469"></span></h4></div><ul class="wp-pros-cons-list wp-pros-list" data-dcnode-id="1438"><li class="joomdev_wpc_pro_single" data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Life Warranty</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Filter change indicator</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">LED air quality sensor</span></li><li data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">A safe, easy-touch tempered-glass control panel</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Portable</span></li><li data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Cleans up to 800 sq ft</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Timer (1, 2, 4, 8 hours)</span></li><li data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Removes sub-0.1-micron airborne particles</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Night mode</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">CARB, AHAM,&amp;ETL certified</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Energy Star rated</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Auto mode</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Optional ionizer</span></li><li class="joomdev_wpc_pro_single" data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Child safety lock</span></li></ul></div><div class="wppc-box cons-content" data-dcnode-id="1424"><div class="wppc-header" data-dcnode-id="1432"><h4 class="wppc-content-title cons-title" data-dcnode-id="1433"><span class="ez-toc-section" data-dcnode-id="1436" id="Cons-3"></span><span data-dcnode-id="1435" instrument_node="">Cons</span><span class="ez-toc-section-end" data-dcnode-id="1434"></span></h4></div><ul class="wp-pros-cons-list wp-cons-list" data-dcnode-id="1425"><li class="joomdev_wpc_con_single" data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Not Wi-Fi &amp; Alexa enabled</span></li><li class="joomdev_wpc_con_single" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Air enters via the back and exits via the front</span></li><li data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">May produce ozone but anion generator optional</span></li></ul></div></div></div><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Given the unit’s price, I feel MedifyAir should have given consumers at least the Wi-Fi feature. I’d have r
