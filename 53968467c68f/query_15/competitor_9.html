                    Verified Buyer
                </span></strong></div></div><div class="rvw-bd" data-dcnode-id="486"><span class="ca-txt-cpt" data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Original review: Oct. 16, 2017</span></span><p data-dcnode-id="504"></p><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">I have had my Oreck for 4 years. It is a great product. The company and customer service is what sucks. Bought this from Costco. Only place you should buy - their return policy is great and you don't need your receipt as it's connected to your membership card. $239.99 compared to $400+. Costco returned the unit for me twice in the first year because it was crackling so much. Turns out I just had to kick the cats out of the room because it was their airborne hair it was zapping... found it out the hard way but thanks Costco. Hasn't zapped since!</span></p><p data-dcnode-id="501"></p><div aria-labelledby="review-entry-2936337-btn" class="js-collapsed" data-dcnode-id="494" id="review-entry-2936337"><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Now 4 years later I decide I should buy a replacement odour absorber and the cell cleaning detergent (had just used soap and water for so long and wanted to give a good clean). So two items cost $85 with tax and shipping. Wow should of just bought a new unit. They sent me a odour absorber that looks like a total knockoff.</span></p><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Not the same as the one you get with your new product. You can see right through it. The cell cleaner they sent me looks nothing like the one on the website. It comes in a dollar store bottle with a taped on label and a nozzle that doesn't fit (you physically can't spray the cleaner because you can't clamp the trigger). So as I attempt to squeeze the trigger... the cell cleaner leaks everywhere all over my hands. Oh and the half the label deteriorated too (not like there was anything important on there anyway).</span></p><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">There is NO safety or precautionary measures on the bottle. NOTHING! No "don't get on skin, don't get in eyes, if contact wash thoroughly." No Keep out of reach of kids. No whmis labels or Material safety data information... law suit waiting to happen. I just want a new absorber and cleaner sent to me or a complete refund. Still waiting on them to get back to me!</span></p></div><div class="rvw-bd-glry js-rvw-bd-glry" data-dcnode-id="489" data-target-id="2936337"><div class="rvw-bd-glry__img" data-ca-modal-active-pic="1" data-ca-modal-collection="[{&quot;src&quot;: &quot;https://media.consumeraffairs.com/files/reviews/oreck-air-purifiers_178521.jpg&quot;, &quot;thumbnail&quot;: &quot;https://media.consumeraffairs.com/files/cache/reviews/oreck-air-purifiers_178521_thumbnail.jpg&quot;, &quot;name&quot;: &quot;&quot;}, {&quot;src&quot;: &quot;https://media.consumeraffairs.com/files/reviews/oreck-air-purifiers_178524.jpg&quot;, &quot;thumbnail&quot;: &quot;https://media.consumeraffairs.com/files/cache/reviews/oreck-air-purifiers_178524_thumbnail.jpg&quot;, &quot;name&quot;: &quot;&quot;}, {&quot;title&quot;: &quot;Oreck Air Purifiers&quot;}]" data-ca-modal-type="gallery" data-dcnode-id="492" data-more-images="1+" data-required-scripts="[&quot;ca_reviews_thumbnails&quot;, &quot;ca_styleguide_modal_gallery&quot;]"><img alt="" class="lazy-load loaded" data-dcnode-id="493" data-src="https://media.consumeraffairs.com/files/cache/reviews/oreck-air-purifiers_178521_thumbnail.jpg" height="90" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.consumeraffairs.com/files/cache/reviews/oreck-air-purifiers_178521_thumbnail.jpg&amp;raw" width="90"></div><div class="rvw-bd-glry__img" data-ca-modal-active-pic="2" data-ca-modal-collection="[{&quot;src&quot;: &quot;https://media.consumeraffairs.com/files/reviews/oreck-air-purifiers_178521.jpg&quot;, &quot;thumbnail                     Verified Reviewer
                </span></strong></div></div><div class="rvw-bd" data-dcnode-id="446"><span class="ca-txt-cpt" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Original review: Sept. 25, 2017</span></span><p data-dcnode-id="455"></p><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">It seems that reviews are either far to one end of the spectrum, or the other. I'm guessing this would be attributed to misunderstanding of use and expectations?? I have had no issues with this unit and have used it in my bedroom for the last 8 years. As an asthma sufferer for almost my entire life I feel that this product does its job helping to keep the air in my room clean, while I sleep. Noise is minimal on low.</span></p><p data-dcnode-id="452"></p><div aria-labelledby="review-entry-2864514-btn" class="js-collapsed" data-dcnode-id="449" id="review-entry-2864514"><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Clean up really isn't rocket science, either. When the red light flashes I remove the Truman Cell and place it in a sink of warm water and mild dish soap, to soak for a bit. When I'm done I wrap the cell in a towel and allow it to dry overnight. If it's not entirely dry when you replace the cell, the lights will still flash. In this case I allow it further drying time. It may take a day but I don't see an issue with this when it is working 3 weeks straight to clean the air that goes into my lungs...and for 8 years lol. It's amazing to see how much junk is collected from your air in such a short time span, and not to mention that you ultimately don't have to clean the same junk off the surfaces in your home as dust. Yay. It's a win-win, to me.</span></p></div><a aria-controls="review-entry-2864514" aria-expanded="false" class="ca-a exp-btn ca-a--bld-no-undln" data-dcnode-id="447" data-expand-binded="true" data-expand-collapse="{&quot;expandText&quot;:&quot;Read full review&quot;, &quot;collapseText&quot;: &quot;View less&                 </span></strong></div></div><div class="rvw-bd" data-dcnode-id="367"><span class="ca-txt-cpt" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Original review: Jan. 30, 2017</span></span><p data-dcnode-id="376"></p><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">I purchased the Oreck Proshield Air Purifier in Jan 2017 and used for 3 days. On my third day of usage I had the unit standing vertically on its base provided and the back of this unit was facing a white receptacle. After I had this unit running for approximately 3 hours I returned to switch off. This is when I noticed that the white receptacle had somehow turned a dirty white; so I took my index finger to wipe off and yes it came away with black, dusty/dirty particles. When investigating closer I realised that the back of this unit has vents and through these vents a black soot like dust was being displaced into the air while the unit is "air purifying". </span></p><p data-dcnode-id="373"></p><div aria-labelledby="review-entry-2166048-btn" class="js-collapsed" data-dcnode-id="370" id="review-entry-2166048"><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">I called their customer service and asked them of why this was occurring and their answer was they did not know why and to have my unit checked out by local technician. Well, guess what if their customer or someone from their technical department cannot help to understand what is occurring with this unit then I will be returning to the store for a refund. This item I purchased from my local Costco Wholesaler.</span></p></div><a aria-controls="review-entry-2166048" aria-expanded="false" class="ca-a exp-btn ca-a--bld-no-undln" data-dcnode-id="368" data-expand-binded="true" data-expand-collapse="{&quot;expandText&quot;:&quot;Read full review&quot;, &quot;collapseText&quot;: &quot;View less&quot;, &quot;target&quot;: [&quot;#review-entry-2166048&quot;]}" data-expand-collapse-action="ex derstand what all of these other people are complaining about. I mean how much easier can it get? And how much better warranty can you get anywhere?? Eight years!! Seriously, People!</span></p><p data-dcnode-id="337"></p><div aria-labelledby="review-entry-1902131-btn" class="js-collapsed" data-dcnode-id="334" id="review-entry-1902131"><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">As far as cleaning goes, just buck up &amp; get the cleaner from Oreck. I have tried many other cleaners &amp; nothing comes close! It takes a while to dry and if it's still wet, the red light will come on immediately. We usually clean ours every two or three weeks. I LOVE this machine! It removes odors so quickly, and on the lowest speed it is still very functional and relatively quiet. We have ours in our bedroom when DH's nose gets stuffy &amp; he says it helps hugely. I just love the fresh clean smell in the room when I walk in when he is sleeping with it on. Totally different than without it! The noise is just kind of a white noise, actually helps me sleep better because then I can't hear any other little house sounds or birds or anything. We had a Honeywell with a charcoal filter before, The Oreck is waaayyy better!</span></p></div><a aria-controls="review-entry-1902131" aria-expanded="false" class="ca-a exp-btn ca-a--bld-no-undln" data-dcnode-id="332" data-expand-binded="true" data-expand-collapse="{&quot;expandText&quot;:&quot;Read full review&quot;, &quot;collapseText&quot;: &quot;View less&quot;, &quot;target&quot;: [&quot;#review-entry-1902131&quot;]}" data-expand-collapse-action="expand" data-uapi-content-toggle="review_text" id="review-entry-1902131-btn"><span data-dcnode-id="333" instrument_node="">

                    Verified Reviewer
                </span></strong></div></div><div class="rvw-bd" data-dcnode-id="256"><span class="ca-txt-cpt" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Original review: June 30, 2016</span></span><p data-dcnode-id="265"></p><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">While reading various reviews of the ProShield Air Purifier, I noted that people were generally having a difficult time cleaning their unit thoroughly without damaging it. I am a smoker and would clean my unit once every two weeks. Unfortunately I had a house-sitter for two months and during that time the unit was on, but not cleaned. It was a mess and had completely shut down on its own. I sprayed Fantastic (original formula) between the grates and the black goo running out of it was unbelievable. Even the wires were caked. </span></p><p data-dcnode-id="262"></p><div aria-labelledby="review-entry-1683091-btn" class="js-collapsed" data-dcnode-id="259" id="review-entry-1683091"><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">I soaked it overnight in a basin of Fantastic diluted with water. It was effective but not completely, though the water was black. I purchased TSP in powder form, diluted it with water, soaked it overnight and WOW! No scrubbing required, though I did hold the handle on top and swished it back and forth to get the cleanser moving over the grates and wires. IMPORTANT not to scrub or insert anything within the collector cell. I let it air dry completely, reinserted into the unit and, thankfully, it's as it should be! Whew!! Hope this helps those that are in need of a solution to this problem. Consider it solved!</span></p></div><a aria-controls="review-entry-1683091" aria-expanded="false" class="ca-a exp-btn ca-a--bld-no-undln" data-dcnode-id="257" data-expand-binded="true" data-expand-collapse="{&quot;expandText&quot;:&quot;Read full review&quot;, &quot;collapseText&quot;: &quot;View less&quot;, &quot;target&quot;
