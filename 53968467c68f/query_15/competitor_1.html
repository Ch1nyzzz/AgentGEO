</span><h3 class="mb-md-4 mb-3 text-secondary" data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">1 Max HEPA Purifier</span></h3><span data-dcnode-id="1163" instrument_node="">

</span><h3 class="text-initial text-gray-800 mb-md-7 mb-3" data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">How The Max HEPA Air Purifier Provides Cleaner Air</span></h3><span data-dcnode-id="1140" instrument_node="">
</span><div class="row align-items-start" data-dcnode-id="1071"><span data-dcnode-id="1139" instrument_node="">
</span><div class="col-12 me-auto" data-dcnode-id="1073"><span data-dcnode-id="1138" instrument_node="">
</span><div class="product-desc__long pt-0" data-dcnode-id="1075"><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">With the v-hepa Max we've redesigned the filters to make them larger. With both HEPA filtration and filter seals ensure you get the cleanest air possible. Better than HEPA-type filters. We make larger filters means they last longer (12 months of continuous use). Designed for room sizes up to 600 sq ft (20' x 30').</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Simple to use, low cost to operate and quieter than other HEPA air cleaners in this price range. (Max HEPA at 34dB to 53dB as compared to 60dB-70dB). This is important as the noise level doubles with every 10dB of sound.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1127"><span class="text-primary" data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Pre-Filter:</span></span><span data-dcnode-id="1128" instrument_node="">The air first enters the pre-filter. This is where we remove the largest airborne particles. This enhances the filter life and performance of the other filters. The Max pre-filter is durable so you can clean with a vacuum cleaner if needed however do not wash it in water.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1122"><span class="text-primary" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">v-HEPA Filter:</span></span><span data-dcnode-id="1123" instrument_node="">The most effective type of air filter. Removes pet dander allergies, pet hair, mold spores, dust mites, pollen, allergens and other solid particles. Effectively removes 99+% of airborne pollutant particles that pass through the system. In addition, the Max removes other airborne particulates. Unique low air flow resistance technology makes the HEPA air purifier more powerful. We also added a seal around the filter to ensure the air does not by-pass the HEPA filter. This further provides cleaner air.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1117"><span class="text-primary" data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Activated Carbon Filter:</span></span><span data-dcnode-id="1118" instrument_node="">A stand-alone carbon filter (not a small carbon pre-filter) that you need for air pollution and light odors. The activated carbon filter can remove some tobacco smoke odors however if you have a strong smoke smell you will be better off with the EJ120 Air Purifier. The EJ has specially treated activated carbon for better air purifications in the removal of cigarette smoke and stronger odors. The EJ120 is also great for chemical gases, wildfire smoke and other gases.</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1112"><span class="text-primary" data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Anion:</span></span><span data-dcnode-id="1113" instrument_node="">The nano piezo-electric ions makes your room more like a natural environment. A Journal of Hygiene study found negative ions improve efficiency of filters. Other studies (including those by the U.S. Dept. of Agriculture) found ions to be effective against dust.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">While there are benefits to ions you have to be careful. We have written a lot about ozone and HEPA filters versus ionic air purifier. The Max has been tested by the top independent lab in the US. The results show no ozone in the test chamber. The Max is also certified by the California Air Resources Board. The negative ion on the Max can be turned off with the press of a button. This is an important feature that several air purifiers do not have. The last thing you want your air filtration system to do is create air pollution.</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1101"><span class="text-primary" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Intelligent Air Quality System:</span></span><span data-dcnode-id="1105" instrument_node="">Gives you a visual sign of the indoor air quality in your room from the front of the air purifier. If operated in auto mode the fan speed will change depending on the air quality reading of the air pollutants. When first started the sensor may flash "AQS" for the first ten minutes. This is to show that the Air Quality Sensor is warming up and calibrating. </span><span class="text-primary" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Note:</span></span><span data-dcnode-id="1102" instrument_node=""> the air quality sensor works in many but not all environments. It measures fine particles so may not record dust or mold that you can see (larger particles). If you feel it is not reading properly we suggest you run the air purifier on a manual fan speed (not Auto mode).</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1096"><span class="text-primary" data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Miscellaneous Air Purification Information:</span></span><span data-dcnode-id="1097" instrument_node="">To learn more we encourage you to read our customer reviews. It's an honor to help so many of you breathe clean air.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">If you need a whole house air filtration system, we offer whole house air purifier bundles of the Max air cleaner so you can place one in each room. We also have our commercial air purifier and air scrubber line that can clean large spaces up to 1,700 sq ft.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">If you are a smoker or suffering from second-hand smoke then you should see our EJ120 Air Purifier and ERIK650A Air Purifier. These have significantly more activated carbon to better remove cigarette smoke odors as well as the tobacco smoke particles.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1085"><span class="text-primary" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Activated Carbon Filter:</span></span><span data-dcnode-id="1086" instrument_node="">we suggest placing the air purifier in the room where you spend most of your time. For most this is a bedroom where the unit stays plugged in and runs 24/7 or whenever you are in the room.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Finally, if you want to learn all about air purifiers please see our Beginner's Guide to an Air Purifier. This guide covers everything from how a HEPA air filter, carbon-pre-filter and activated carbon filters work. We go in depth on the CADR ratings scale and how to make sure your air cleaner with work for your square footage. And how the MERV filter ratings work and compare a true HEPA filter to a HEPA-type filter. We show how to choose a HEPA filtration system whether you need to remove dust mites, pet dander, pet hair, mold spores, pollen, tobacco smoke or even formaldehyde and other volatile organic compounds.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1077"><span class="text-primary" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Troubleshooting:</span></span><span data-dcnode-id="1078" instrument_node="">If the air purifier does not power on, remove the front cover and the filters and re-insert each. A safety switch ensures the filters are pressed all the way in and the cover is completely closed. In shipment the cover may open slightly or the filters may move a little. Also, if you press the Auto button, the fan speed display will reflect the air quality reading. Not the current operating fan speed so there can be a difference. We suggest setting the fan speed where you would like it and then press Auto. If the sensor shows 0 or 1 bars the fan speed will show as Silent, 2 bars is Middle, 3 bars is Strong and 4 bars is Turbo.</span></p><span data-dcnode-id="1076" instrument_node="">
</span></div><span data-dcnode-id="1074" instrument_node="">
