</span><div class="et_pb_text_inner" data-dcnode-id="630"><h3 data-dcnode-id="631" style="text-align: center;"><strong data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Our Products Are All Made In The USA &amp; Canada, Not China</span></strong></h3></div><span data-dcnode-id="629" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_5 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="552"><span data-dcnode-id="627" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="554"><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">&nbsp;</span></p><span data-dcnode-id="624" instrument_node="">
</span><h2 data-dcnode-id="620"><span data-dcnode-id="621" style="font-size: large;"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Our HEPA Air Purifiers Really Do Out Clean And Outperform All Others</span></strong></span></h2><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Our 100 percent sealed HEPA air purifiers made by Airpura and Austin Air Systems quickly remove the airborne dust, dust mite and pet allergens from your indoor air environment. These powerful but still quiet units also include multiple pounds of activated carbon for adsorption and removal of outgassing chemicals.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="615" instrument_node="">Our top quality </span><strong data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">(Made In Canada)</span></strong><span data-dcnode-id="612" instrument_node=""> Airpura UV600 HEPA air purifiers include models with medical grade, non ozone producing germicidal (UV) ultraviolet light systems. These germicidal units are considered essential products by the WHO (World Health Organization) to destroy biological contaminants with a UV dosage of 30,000 Micro-Watts Sec / 2 of power.</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" style="font-family: inherit; font-weight: normal;"><span data-dcnode-id="609" instrument_node="">This safe and powerful ultraviolet light dosage quickly destroys all harmful airborne mold spores, germs, bacteria and all contagious airborne viruses from the air you breathe. Hospitals, Healthcare Facilities and schools have been purchasing our Airpura UV600 HEPA air purifier by the thousands to protect their doctors, staff and the patients they are treating and caring for! Schools are protecting their teachers and students nationwide with our virus destroying Airpura UV600 units! The urgent fact is, the best HEPA air purifier for destroying the killer virus we are all dealing with is the Airpura UV600&nbsp;</span></span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">The United States EPA benefit from multiple UV600 units to successfully clean and protect the indoor air quality in their Washington DC basement offices that were experiencing mold problems and the El Paso US Border Patrol utilize many of our UV600 HEPA air purifiers to protect the indoor air quality for the staff in their office spaces and in their housing units to protect the detainees from airborne viruses and disease!</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="602" instrument_node="">Both private industry and US State department offices around the world utilize UV600 units to protect their office staff from the poor indoor air quality that people suffer from due to ineffective or nonexistent factory air pollution standards that allow the indoor air to become contaminated!</span><span data-dcnode-id="601" style="font-family: inherit; font-weight: normal;"></span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" style="font-size: medium; font-family: inherit; font-weight: normal;"></span></p><span data-dcnode-id="596" instrument_node="">
</span><h3 data-dcnode-id="592"><span data-dcnode-id="593" style="font-size: large;"><strong data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">100% Sealed HEPA Vacuum Cleaners / Never Dust Again After Vacuuming</span></strong></span></h3><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" style="font-size: medium;"></span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="587" instrument_node="">&nbsp; Our powerful Air Storm HEPA vacuum cleaners</span><strong data-dcnode-id="585"><span data-dcnode-id="586" instrument_node=""> (Made In The USA)</span></strong><span data-dcnode-id="584" instrument_node=""> are 100 percent sealed against any&nbsp;leakage while vacuuming. You will never have to dust your home after vacuuming again! The dust collector bags can be filled to the very top with zero loss of suction or cleaning ability!</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Air Storm HEPA vacuum cleaners are made to last over 35 years. They are also lightweight, easy to operate! They are designed to out clean and outperform all other vacuum cleaners worldwide!</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Many of our HEPA air purifiers, air cleaners and HEPA vacuum cleaners go to schools, police department evidence rooms, dentist offices, doctor offices and abatement companies!</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Our many repeat customers include United States Government agencies that include&nbsp; US Government buildings around the world, Navy base offices, Army bases and deployed patriot missile system outposts worldwide! Our Air Storm HEPA vacuum cleaners were sold to the White House itself to keep it clean and healthy!&nbsp;</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" style="font-size: large;"><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Lifetime Electrostatic Air Filters Protect Your A/C System And Your Home</span></strong></span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="567" instrument_node="">Customers love our </span><strong data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">(Made In The USA)</span></strong><span data-dcnode-id="564" instrument_node=""> LIFETIME washable self charging electrostatic A/C air filters that are 90% efficient and custom made to size to remove a huge amount of dust and allergens in A/C air conditioning or furnace systems in their homes! Our Superior self charging electrostatic A/C air filters do not restrict air flow to your A/C system while creating a quickly noticeable cleaner and healthier indoor air environment to protect your family, pets, electronic devices and home furnishings.</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="559" style="color: #e02b20;"><strong data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">NOTE:</span></strong></span><span data-dcnode-id="558" instrument_node=""> The majority of our products are sold to everyday families. This is to keep their indoor air environments clean at a very high level for noticeable dust, allergy and asthma control. For more information please call us for a 100% free indoor air quality and allergy product consultation to make sure that you are getting the proper product(s) that fit your direct needs! </span><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Call direct at 561-629-5618</span></strong></p></div><span data-dcnode-id="553" instrument_node="">
</span></div><span data-dcnode-id="551" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_2 et_pb_column_16 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="503"><span data-dcnode-id="549" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_6 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="542"><span data-dcnode-id="548" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="544"><h3 data-dcnode-id="545" style="text-align: center;"><strong data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">The Meaning Of HEPA</span></strong></h3></div><span data-dcnode-id="543" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_7 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="530"><span data-dcnode-id="541" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="532"><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Many people ask what The HEPA abbreviation stands for. It’s very common to see the word HEPA in the air purification and vacuum cleaner industry. The letters in HEPA stand for High-Efficiency Particulate Arrestor (or Air Filter).</span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Our product standards require that the filters in our HEPA air purifiers, and vacuum cleaners, are at least 99.97 percent efficient down to a 0.3-micron particle size. Therefore, this is extremely efficient and required for catching the absolute smallest particles of airborne dust and allergens.</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">The HEPA products we offer pass the highest USA Government standards! This is because they only allow totally clean and healthy allergen free air back into the much cleaner indoor air environment. Therefore, you can enjoy a much healthier life and breathe easier!</span></p></div><span data-dcnode-id="531" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_8 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="523"><span data-dcnode-id="529" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="525"><h3 data-dcnode-id="526" style="text-align: center;"><strong data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Our Standards Are&nbsp;Superior For All Of Our Customers</span></strong></h3></div><span data-dcnode-id="524" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_9 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="505"><span data-dcnode-id="522" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="507"><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">As always, Absolute Air Purifiers, Air Cleaners and Allergy Products continue to work tirelessly, through the years. Therefore we always provide our many thousands of customers with the highest quality products.</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">We always strive to provide the absolute best customer service. Hence, our mission is to improve the quality of life for our many customers that suffer from allergies, asthma &amp; COPD.</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Our HEPA air purifiers with germicidal UV light systems are of the highest medical quality to destroy dangerous germs, airborne viruses and bacteria. They compliment our 100 percent sealed HEPA vacuum cleaners to protect people with allergies, asthma and immune dysfunctions.</span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">This is for keeping the indoor air clean to be germ, bacteria and virus free for people with different types of cancer going through chemotherapy and transplants! The air must be super clean to protect the immune system for people having bone marrow, stem cell and organ transplants!</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">&nbsp;We always provide the absolute highest quality air purification systems and allergy products on the market. Most noteworthy, these include all of our HEPA air purifiers including models with medical grade non-ozone producing ultraviolet light systems, HEPA air cleaners and 100% sealed HEPA vacuum cleaners that never lose suction or cleaning ability even when their dust collector bag is filled to the top with 15 pounds of sand!</span></p></div><span data-dcnode-id="506" instrument_node="">
</span></div><span data-dcnode-id="504" instrument_node="">
</span></div><span data-dcnode-id="502" instrument_node="">

</span></div><div class="et_pb_column et_pb_column_1_2 et_pb_column_18 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="457"><span data-dcnode-id="497" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_10 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="490"><span data-dcnode-id="496" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="492"><h3 data-dcnode-id="493"><strong data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;We Test Our Allergy Products</span></strong></h3></div><span data-dcnode-id="491" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_11 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="459"><span data-dcnode-id="489" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="461"><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">All of our allergy products go through a minimum of 3 years of rigorous testing. This is done personally by the owner of this company, Barry Cohen to make sure our products are always up to our own highest personal standards. We know for sure that you are ALWAYS receiving the very best unequaled allergy control products.&nbsp;This is in addition to the&nbsp;excellent&nbsp;customer service you deserve and will always receive.</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="485" instrument_node="">We only sell the very best HEPA air purifiers, air cleaners, HEPA vacuum cleaners and allergy products. </span><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Please note that none of our products are made in China!</span></strong></p><span data-dcnode-id="481" instrument_node="">
</span><h3 data-dcnode-id="477"><span data-dcnode-id="478" style="font-size: x-large;"><strong data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">All Of Our Products Are Proudly Made In The USA &amp; Canada!</span></strong></span></h3><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Our top quality brands include, Airpura, Austin Air, AP-3000, Absolute self charging electrostatic A/C Air Filters, NIKRO, Air Storm HEPA vacuum cleaners and more!</span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Our HEPA air purifiers, air cleaners, HEPA vacuum cleaners and lifetime washable custom made to size self charging electrostatic air filters for air conditioning /&nbsp;furnace systems remove all&nbsp;airborne allergens, outgassing chemicals and biological contaminants from your indoor air environment!</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Without these top quality products the airborne triggers that circulate through your home’s indoor air often lead to allergy, asthma and COPD flare-ups. Don’t suffer! Take action to protect and clean your homes indoor air quality.</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">When sufficient amounts of these allergens and contaminants accumulate in your body they can have a negative affect on your immune system and you can become very sick.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">The solution is&nbsp;avoidance by removing these triggers from your indoor air environment. Clean indoor air is healing to the body for a noticeable increase in health and wellness!</span></p></div><span data-dcnode-id="460" instrument_node="">
</span></div><span data-dcnode-id="458" instrument_node="">

</span><div class="et_pb_blurb_description" data-dcnode-id="364"><h3 data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Returns and Policies</span></h3><span data-dcnode-id="442" instrument_node="">
</span><h3 data-dcnode-id="438"><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aircleaners.com/"><span data-dcnode-id="441" instrument_node="">Aircleaners.com</span></a><span data-dcnode-id="439" instrument_node="">&nbsp;Company Terms,&nbsp;Shipping And Return Policy</span></h3><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="434"><strong data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">We offer FREE SHIPPING to the lower 48 Continental United States. Call for free shipping to Canada on all Airpura Products. Alaska, Hawaii and all USA territories will be charged actual cost of shipping. Canada will be charged actual cost of shipping on everything except for Airpura products that ship for free. If you are outside of the lower 48 Continental United States please E-Mail us or call for shipping prices.&nbsp; </span></strong></p><span data-dcnode-id="433" instrument_node="">
</span><h3 data-dcnode-id="428"><span data-dcnode-id="430" style="color: #ffffff;"><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aircleaners.com/" style="color: #ffffff;"><span data-dcnode-id="432" instrument_node="">Aircleaners.com</span></a></span><span data-dcnode-id="429" instrument_node=""> Products Fair Return Policy</span></h3><span data-dcnode-id="427" instrument_node="">
</span><h3 data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Lowest Advertised Prices</span></h3><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="421"><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">All of our top quality air cleaners, air purifiers, and allergy products ship out brand new and factory direct by UPS or Federal Express quickly to you. This is at the Guaranteed Lowest Advertised Prices From Established Legitimate Factory Dealers. </span></strong></p><span data-dcnode-id="420" instrument_node="">
</span><h3 data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">All Of Our Products Are Factory Sealed</span></h3><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="414"><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">All products are factory sealed from the manufacturers. This is to ensure that you always receive fresh brand new products. Since we do care about our customer’s safety and health we feel that this is an important issue. Therefore we never sell or resell items as new that have been opened, used, contaminated, returned or demonstrated.&nbsp; Many other companies unethically resell used or opened products. All of our products are under full factory warranties. </span></strong></p><span data-dcnode-id="413" instrument_node="">
</span><h3 data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Quick Replacement Of Shipping Damaged Or Factory Defective Products</span></h3><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="407"><strong data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">All of our Air Purifiers, Air Cleaners, HEPA Vacuum Cleaners, Electrostatic Air Filters &amp; other Allergy Product returns will be quickly replaced if damaged in shipping or found to be factory defective. Damaged or factory defective products must be returned to the matching&nbsp;factory&nbsp;within 30 days of&nbsp;receiving the product.</span></strong></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="398"><strong data-dcnode-id="399"><span data-dcnode-id="405" instrument_node=""> Please quickly call us (</span><span data-dcnode-id="401" style="color: #ffffff;"><span data-dcnode-id="404" instrument_node="">air</span><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cleaners.com/" rel="noopener" style="color: #ffffff;" target="_blank"><span data-dcnode-id="403" instrument_node="">cleaners.com</span></a></span><span data-dcnode-id="400" instrument_node="">) by phone for a required factory return&nbsp;authorization number that must be clearly printed on the products box. All shipping damaged or factory defective replacement products will be picked up at no charge to the customer by the matching factory.&nbsp;There will be absolutely ZERO replacement cost to the customer for shipping damaged or factory defective products being replaced. </span></strong></p><span data-dcnode-id="397" instrument_node="">
</span><h3 data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Product Returns For Non Defective Items</span></h3><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="391"><b data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">All non defective product returns must be addressed to and shipped back to the matching factory it came from by the customer. This must be done within 30 calendar days of the product delivery date to the customer. </span></b></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="387"><b data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Please know that Airpura and other air purifier factories charge up to a 25% restocking fee for all non defective air purifiers that have been used, contaminated and then returned. This fee is because all of the now contaminated filters in the air purifier must be destroyed.&nbsp; These units are then replaced with brand new filters&nbsp; before the returned unit can be re-sold (as a used unit) by the factory (Not By Us). We never sell used or refurbished&nbsp;units!&nbsp;</span></b></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="383"><b data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">All returned products must be in new condition! We recommend insuring returned products before shipping them back to the factory.&nbsp;&nbsp;The customer must call or E-Mail us (aircleaners.com&nbsp;) for a Return Authorization number and that RA number must be clearly printed the on the box or package that is being returned to the products matching factory. </span></b></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="379"><b data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Customers will be responsible for paying all shipping &amp; return costs for non-defective items. The return costs will be deducted from the customers refund. We sell expensive products. If customer cancels his or her order after credit card has batched and the order has not shipped yet the customer will be responsible to pay all credit card charges for the initial order and the refund cost only.</span></b></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="375"><b data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">PLEASE NOTE: We urge all customers to be absolutely&nbsp;sure they are purchasing our products to keep them for removing the many triggers from their indoor air for the absolute best dust, allergy, asthma, smoke and odor control!&nbsp;&nbsp;</span></b></p><span data-dcnode-id="374" instrument_node="">

</span><p data-dcnode-id="365"><strong data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">We always provide excellent customer service to our many customers! However the customer is responsible for all collection costs and legal fees incurred from non-payments or from chargebacks that have not been accepted by Aircleaners.com&nbsp;</span></strong></p></div><span data-dcnode-id="363" instrument_node="">
