</span><div class="fl-module-content fl-node-content" data-dcnode-id="3732"><span data-dcnode-id="3739" instrument_node="">
</span><h1 class="fl-heading" data-dcnode-id="3734"><span data-dcnode-id="3738" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">Indoor air pollution is comprised of many types of contaminates: from visible dust and pollen; to microbes, odors, and VOCs*</span></span><span data-dcnode-id="3735" instrument_node="">
</span></h1><span data-dcnode-id="3733" instrument_node="">
</span></div><span data-dcnode-id="3731" instrument_node="">
</span></div><span data-dcnode-id="3729" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-5e45939b853ea" data-dcnode-id="3700" data-node="5e45939b853ea"><span data-dcnode-id="3728" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="3702"><span data-dcnode-id="3727" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="3704"><span data-dcnode-id="3726" instrument_node="">
</span><p data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">No single technology can reduce air contamination in the many forms and sizes in which it exists.</span></p><span data-dcnode-id="3723" instrument_node="">
</span><p data-dcnode-id="3713"><span data-dcnode-id="3721" style="color: #333333;"><span data-dcnode-id="3722" instrument_node="">Solaris IAQ components are a unique set of Indoor Air Quality (IAQ) improvement products, each focused on a specific type of indoor air pollution. While they can operate independently,&nbsp;</span></span><span data-dcnode-id="3720" instrument_node="">they are also designed to work as a group creating an efficient, integrated whole house indoor air quality improvement </span><i data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">system</span></i><span data-dcnode-id="3717" instrument_node=""> that not only makes the air genuinely fresher and healthier top to bottom, they can at the same time </span><i data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">reduce</span></i><span data-dcnode-id="3714" instrument_node=""> the cost of cooling and heating the air in your home.</span></p><span data-dcnode-id="3712" instrument_node="">
</span><p data-dcnode-id="3706"><span data-dcnode-id="3707" style="color: #333333;"><span data-dcnode-id="3711" instrument_node="">*VOCs are </span><em data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">Volatile Organic Compounds.</span></em><span data-dcnode-id="3708" instrument_node=""> They range from toxic fumes (like exhaust and pool odors) to everyday odors from cooking and cleaning — as well as pet, bathroom, laundry, and other musty, unpleasant smells.</span></span></p><span data-dcnode-id="3705" instrument_node="">
</span></div><span data-dcnode-id="3703" instrument_node="">

</span><p data-dcnode-id="2501" style="text-align: center;"><span data-dcnode-id="2502" instrument_node="">For convenience and efficiency, a Solaris IAQ system is powered and monitored by a single power module. This single connection to available power provides proper energy to each component. It also tells you the status of any UV lamps in the system.</span></p><span data-dcnode-id="2500" instrument_node="">

</span><p data-dcnode-id="2468" style="text-align: center;"><span data-dcnode-id="2469" instrument_node="">As the air enters the HVAC system ions are added that react with nano-particulates. The ions cause these normally un-filterable particles to attract and group together. Placing ionization just "upstream" of the filter enables it to capture particles much smaller than was previously possible.</span></p><span data-dcnode-id="2467" instrument_node="">

</span><p data-dcnode-id="2435" style="text-align: center;"><span data-dcnode-id="2436" instrument_node="">Filtration is fundamental to cleaning the air. Ultravation Solaris filter fibers are hypoallergenic, high capacity, and high efficiency throughout their lifespan for practical, effective air cleaning with minimized filter changes and air flow resistance.</span></p><span data-dcnode-id="2434" instrument_node="">

</span><p data-dcnode-id="2363" style="text-align: center;"><span data-dcnode-id="2370" instrument_node="">Installed after the cooling coil, a Solaris PCO air purifier breaks down odors, toxic gases and VOCs. It also kills bacteria and viruses circulating through the HVAC system. Two PCO air purifier models available: </span><a data-dcnode-id="2368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/374989788%23pco"><span data-dcnode-id="2369" instrument_node="">active/adjustable</span></a><span data-dcnode-id="2367" instrument_node=""> or </span><a data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/374989788%23carboncapture"><span data-dcnode-id="2366" instrument_node="">carbon-capture</span></a><span data-dcnode-id="2364" instrument_node="">.</span></p><span data-dcnode-id="2362" instrument_node="">

</span><span class="fl-heading-text" data-dcnode-id="2318"><span data-dcnode-id="2322" instrument_node="">SOLARIS</span><sup data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">®</span></sup><span data-dcnode-id="2319" instrument_node=""> IAQ System Control Center</span></span><span data-dcnode-id="2317" instrument_node="">

</span><span class="fl-heading-text" data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">The ultimate in IAQ system flexibility and convenience!</span></span><span data-dcnode-id="2305" instrument_node="">
</span></h3><span data-dcnode-id="2303" instrument_node="">
</span></div><span data-dcnode-id="2301" instrument_node="">
</span></div><span data-dcnode-id="2299" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-5e45939b8542e" data-dcnode-id="2257" data-node="5e45939b8542e"><span data-dcnode-id="2298" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="2259"><span data-dcnode-id="2297" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="2261"><span data-dcnode-id="2296" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2295" instrument_node="">A complete Indoor Air Quality System…One central control center!</span><span class="Apple-converted-space" data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2287"><span data-dcnode-id="2290" instrument_node="">Convenience, efficient operation, smart monitoring.</span><span class="Apple-converted-space" data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2286" instrument_node="">
</span><p data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">The best way to effectively keep the air in your home cleaner, fresher, and healthier from top-to-bottom is to use devices that specialize in the various types of contamination found in household air. Using the HVAC system to collect air to be purified and to distribute the purified air makes great sense! So we design and manufacture IAQ products that excel in each category and place them strategically in the HVAC airstream. And, to add convenience and efficiency, Solaris IAQ products integrate into a centrally-powered and monitored IAQ system that operates completely unobtrusively and prevents the HVAC system itself from becoming a generator of contamination.</span></p><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2279"><span data-dcnode-id="2282" instrument_node="">The Solaris IAQ component control center is the central power and status monitor for a Solaris integrated IAQ system. It is flexible for customized effectiveness and provides a central control panel for system-wide UV lamp status.</span><span class="Apple-converted-space" data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2278" instrument_node="">
</span><ul data-dcnode-id="2263"><span data-dcnode-id="2277" instrument_node="">
</span><li data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">Versatile for connecting the right combination of IAQ components</span></li><span data-dcnode-id="2274" instrument_node="">
</span><li data-dcnode-id="2270"><span data-dcnode-id="2273" instrument_node="">Readily installs in a convenient location for viewing status. Operates on a standard 110VAC outlet or auto-senses up to 277VAC.</span><span class="Apple-converted-space" data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="2269" instrument_node="">
</span><li data-dcnode-id="2265"><span data-dcnode-id="2268" instrument_node="">Includes visual and audible alarms that indicate UV lamp operational status and to remind when replacements are required.</span><span class="Apple-converted-space" data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="2264" instrument_node="">
</span></ul><span data-dcnode-id="2262" instrument_node="">

</span><h3 class="fl-heading" data-dcnode-id="1972"><span data-dcnode-id="1976" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Electronic air cleaner reduces ultra-fine particulates and freshens the indoor air</span></span><span data-dcnode-id="1973" instrument_node="">
</span></h3><span data-dcnode-id="1971" instrument_node="">
</span></div><span data-dcnode-id="1969" instrument_node="">
</span></div><span data-dcnode-id="1967" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-5e45939b853ff" data-dcnode-id="1889" data-node="5e45939b853ff"><span data-dcnode-id="1966" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1891"><span data-dcnode-id="1965" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="1893"><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">The Solaris Air ionizer is an electronic air cleaner that reduces ultra-fine particulates and freshens the air by breaking down odors, volatile organic compounds (VOCs) and other chemical/molecular contamination.</span></p><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">The Solaris Ionizer makes it possible to remove the microscopic particles known as nano-particulates that would otherwise pass through filtration. These are particles so small and light they remain suspended in air, are able to evade normal breathing defenses and can enter into the lungs and in some cases the bloodstream. When installed just prior to the filter, the microscopic particles are drawn into the HVAC system. The ionizer statically charges the particulate causing large groups of them to gather and be captured in the nearby filter.</span></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">What are the sources of ultra-fine air contamination?</span></p><span data-dcnode-id="1955" instrument_node="">
</span><ul data-dcnode-id="1932"><span data-dcnode-id="1954" instrument_node="">
</span><li data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Smoke, smog, ultra-fine atmospheric dust, coal soot</span></li><span data-dcnode-id="1951" instrument_node="">
</span><li data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">Common household odors from cooking, cleaning, and laundry, exercise and bathrooms.</span></li><span data-dcnode-id="1948" instrument_node="">

</span><div class="fl-module fl-module-heading fl-node-5e45939b85496" data-dcnode-id="1626" data-node="5e45939b85496"><span data-dcnode-id="1636" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1628"><span data-dcnode-id="1635" instrument_node="">
</span><h4 class="fl-heading" data-dcnode-id="1630"><span data-dcnode-id="1634" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Solaris filtration is highly effective yet very practical</span></span><span data-dcnode-id="1631" instrument_node="">
</span></h4><span data-dcnode-id="1629" instrument_node="">
</span></div><span data-dcnode-id="1627" instrument_node="">
</span></div><span data-dcnode-id="1625" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-5e45939b85494" data-dcnode-id="1602" data-node="5e45939b85494"><span data-dcnode-id="1624" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1604"><span data-dcnode-id="1623" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="1606"><span data-dcnode-id="1622" instrument_node="">
</span><ul data-dcnode-id="1608"><span data-dcnode-id="1621" instrument_node="">
</span><li data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">High efficiency is maintained over the life of the filter.</span></li><span data-dcnode-id="1618" instrument_node="">
</span><li data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">They last up to a full year.</span></li><span data-dcnode-id="1615" instrument_node="">
</span><li data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Very low maintenance unlike other designs such as electronic filters that need frequent cleaning.</span></li><span data-dcnode-id="1612" instrument_node="">
</span><li data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">They are “easy” on the HVAC blower due to their layered design&nbsp; – helping keep your electric bill minimized (see ratings below).</span></li><span data-dcnode-id="1609" instrument_node="">
</span></ul><span data-dcnode-id="1607" instrument_node="">
</span></div><span data-dcnode-id="1605" instrument_node="">
</span></div><span data-dcnode-id="1603" instrument_node="">
</span></div><span data-dcnode-id="1601" instrument_node="">
</span><div class="fl-module fl-module-heading fl-node-5e45939b85495" data-dcnode-id="1590" data-node="5e45939b85495"><span data-dcnode-id="1600" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1592"><span data-dcnode-id="1599" instrument_node="">
</span><h4 class="fl-heading" data-dcnode-id="1594"><span data-dcnode-id="1598" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">High efficiency filtration means cleaner air with minimized air flow resistance</span></span><span data-dcnode-id="1595" instrument_node="">
</span></h4><span data-dcnode-id="1593" instrument_node="">
</span></div><span data-dcnode-id="1591" instrument_node="">
</span></div><span data-dcnode-id="1589" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-5e45939b85497" data-dcnode-id="1569" data-node="5e45939b85497"><span data-dcnode-id="1588" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1571"><span data-dcnode-id="1587" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="1573"><span data-dcnode-id="1586" instrument_node="">
</span><ul data-dcnode-id="1575"><span data-dcnode-id="1585" instrument_node="">
</span><li data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Minimum Efficiency Reporting Value (MERV) is the industry standardized performance rating system for particulate capture and pressure drop, or air flow resistance.</span></li><span data-dcnode-id="1582" instrument_node="">
</span><li data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Solaris' MERV 11 rated filters achieve this particulate capture performance with the same low air resistance of a standard MERV 8 filter.</span></li><span data-dcnode-id="1579" instrument_node="">
</span><li data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Solaris' MERV 13 rated filters achieve this higher particulate capture performance with the same air resistance of a typical MERV 11 filter.</span></li><span data-dcnode-id="1576" instrument_node="">
</span></ul><span data-dcnode-id="1574" instrument_node="">
</span></div><span data-dcnode-id="1572" instrument_node="">
</span></div><span data-dcnode-id="1570" instrument_node="">
</span></div><span data-dcnode-id="1568" instrument_node="">
</span><div class="fl-module fl-module-photo fl-node-5e45939b8549b" data-dcnode-id="1555" data-node="5e45939b8549b"><span data-dcnode-id="1567" instrument_node="">

</span><div class="fl-module-content fl-node-content" data-dcnode-id="1545"><span data-dcnode-id="1552" instrument_node="">
</span><h4 class="fl-heading" data-dcnode-id="1547"><span data-dcnode-id="1551" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">MERV 13 filtration endorsed by ASHRAE and NY Department of Health</span></span><span data-dcnode-id="1548" instrument_node="">
</span></h4><span data-dcnode-id="1546" instrument_node="">
</span></div><span data-dcnode-id="1544" instrument_node="">
</span></div><span data-dcnode-id="1542" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-5f7b64897e83c" data-dcnode-id="1528" data-node="5f7b64897e83c"><span data-dcnode-id="1541" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1530"><span data-dcnode-id="1540" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="1532"><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">The American Society of Heating, Refrigerating and Air-Conditioning Engineers (ASHRAE), has endorsed and recommended the use of MERV 13 filtration as one method of minimizing the spread of bacteria and viruses. The state of New York has required the use of MERV 13 filtration for malls aver 800,000 square feet (during the pandemic).</span></p><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Solaris MERV 13 filters offer this level of performance for residences and office environments, with the added benefit of very low air flow restriction— equally that of the more standard MERV 11.</span></p><span data-dcnode-id="1533" instrument_node="">
</span></div><span data-dcnode-id="1531" instrument_node="">
</span></div><span data-dcnode-id="1529" instrument_node="">
</span></div><span data-dcnode-id="1527" instrument_node="">
</span><div class="fl-module fl-module-heading fl-node-5f7b64aa77436" data-dcnode-id="1516" data-node="5f7b64aa77436"><span data-dcnode-id="1526" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1518"><span data-dcnode-id="1525" instrument_node="">
</span><h4 class="fl-heading" data-dcnode-id="1520"><span data-dcnode-id="1524" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Taking MERV 13 to next level / increasing microbe destruction</span></span><span data-dcnode-id="1521" instrument_node="">
</span></h4><span data-dcnode-id="1519" instrument_node="">
</span></div><span data-dcnode-id="1517" instrument_node="">
</span></div><span data-dcnode-id="1515" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-5f7b64cf3bc0f" data-dcnode-id="1504" data-node="5f7b64cf3bc0f"><span data-dcnode-id="1514" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1506"><span data-dcnode-id="1513" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="1508"><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">You can effectively achieve even higher MERV performance by adding a Solaris air ionizer to your HVAC system and placing it just before the filter. Ionization causes nano-particulates of all kinds — biological and otherwise — to gather into stoically charged groups at a size easily captured in a MERV 13 filter. Further, the ions flowing into the filter itself disinfects the fibers for healthier air and safer filter changes.</span></p><span data-dcnode-id="1509" instrument_node="">
</span></div><span data-dcnode-id="1507" instrument_node="">

</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Layered air filter design collects particles—large to small—through the entire thickness of the filter, instead of simply piling debris up on the leading edge.</span></p><span data-dcnode-id="1451" instrument_node="">

</span><li data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Solaris 5" pleated filters start with high efficiency and maintain it evenly over the life of the filter, reducing maintenance.</span></li><span data-dcnode-id="1424" instrument_node="">
</span><li data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Electronic filters start with good efficiency but gradually lose it as the collectors become loaded. These filters require frequent cleaning.</span></li><span data-dcnode-id="1421" instrument_node="">
</span><li data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Standard 1" “Furnace filters” start with low efficiency and quickly fill which actually makes them very efficient but also causes a sharp rise in air flow resistance. The purchase of one Solaris filter eliminates the purchase of up to twelve 1" furnace filters, as well as the inconvenience of multiple filter changes.</span></li><span data-dcnode-id="1418" instrument_node="">

</span><div class="fl-module-content fl-node-content" data-dcnode-id="1062"><span data-dcnode-id="1069" instrument_node="">
</span><h3 class="fl-heading" data-dcnode-id="1064"><span data-dcnode-id="1068" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">The Solaris Carbon Capture PCO Air Purifier, removes air pollution far too small for filters to capture!</span></span><span data-dcnode-id="1065" instrument_node="">
</span></h3><span data-dcnode-id="1063" instrument_node="">
</span></div><span data-dcnode-id="1061" instrument_node="">
</span></div><span data-dcnode-id="1059" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-61b8cba23b3f8" data-dcnode-id="1025" data-node="61b8cba23b3f8"><span data-dcnode-id="1058" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1027"><span data-dcnode-id="1057" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="1029"><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">The Solaris SLX-CAT captures odors, VOCs and other air pollutants much like the catalytic converter in your car. The photocatalytic process breaks down the complex molecules of odors, VOCs and other toxic pollutants that can be harmful and can trigger respiratory irritation.</span></p><span data-dcnode-id="1053" instrument_node="">
</span><ul data-dcnode-id="1031"><span data-dcnode-id="1052" instrument_node="">
</span><li data-dcnode-id="1048"><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Odor and VOCs </span></strong><span data-dcnode-id="1049" instrument_node="">(volatile organic compounds): While the three activated-carbon panels reliably capture the molecules of odors and other toxins, the patented TiO2+silver/zinc PCO formulation infused into the activated-carbon under UV-C light, converts the pollutant molecules back into the normal components of fresh, clean air. Odors destroyed come from pools areas, laundry, bathrooms, kitchens—even trash bins and the family pet–as well as from products like cleaning agents, new paint, carpets, and other renovation materials.</span></li><span data-dcnode-id="1047" instrument_node="">
</span><li data-dcnode-id="1043"><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Smoke:</span></strong><span data-dcnode-id="1044" instrument_node=""> Smoke is broken down in much the same way that the catalytic converter reduces pollution from your car’s exhaust.</span></li><span data-dcnode-id="1042" instrument_node="">
</span><li data-dcnode-id="1038"><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Bacteria and viruses:</span></strong><span data-dcnode-id="1039" instrument_node=""> The purifier’s photocatalyst, augmented by UV-C light, work to disinfect the HVAC airstream, killing airborne bacteria and viruses passing through the HVAC system, reducing the chance of colds, flu, and worse.</span></li><span data-dcnode-id="1037" instrument_node="">
</span><li data-dcnode-id="1033"><strong data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Allergens:</span></strong><span data-dcnode-id="1034" instrument_node=""> Microscopic allergens are captured and destroyed.</span></li><span data-dcnode-id="1032" instrument_node="">
</span></ul><span data-dcnode-id="1030" instrument_node="">
</span></div><span data-dcnode-id="1028" instrument_node="">
</span></div><span data-dcnode-id="1026" instrument_node="">

</span><span class="fl-heading-text" data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Key performance and environmental benefits</span></span><span data-dcnode-id="1018" instrument_node="">
</span></h4><span data-dcnode-id="1016" instrument_node="">

</span><ul data-dcnode-id="973"><span data-dcnode-id="1008" instrument_node="">
</span><li data-dcnode-id="1004"><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">No chemicals, ozone or by products:</span></strong><span data-dcnode-id="1005" instrument_node=""> The Solaris SLX-CAT simple adds nothing to the air.</span></li><span data-dcnode-id="1003" instrument_node="">
</span><li data-dcnode-id="999"><strong data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Unobtrusive and silent:</span></strong><span data-dcnode-id="1000" instrument_node=""> Installed out of the way in the HVAC system, the SLX-CAT has no fans or blowers to add noise.</span></li><span data-dcnode-id="998" instrument_node="">
</span><li data-dcnode-id="994"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Energy efficient!</span></strong><span data-dcnode-id="995" instrument_node=""> The SLX-CAT uses no more power than a small light bulb.</span></li><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="989"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">3-year UV lamp</span></strong><span data-dcnode-id="990" instrument_node=""> Longest UV lamp lifespan available</span></li><span data-dcnode-id="988" instrument_node="">
</span><li data-dcnode-id="985"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Lifetime purifier system warranty</span></strong></li><span data-dcnode-id="984" instrument_node="">
</span><li data-dcnode-id="980"><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Self-cleaning / maintenance free!</span></strong><span data-dcnode-id="981" instrument_node=""> The Solaris PCO process automatically cleans/re-charges the activated-carbon panels when it releases the converted and harmless molecules.</span></li><span data-dcnode-id="979" instrument_node="">

</span><span class="fl-heading-text" data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">How Solaris SLX-CAT breaks down air contamination</span></span><span data-dcnode-id="786" instrument_node="">

</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Odors, bacteria, viruses and other complex airborne contamination are captured in the activated carbon modules. The contamination is then transformed into simplified molecules that naturally occur in the air.</span></p><span data-dcnode-id="774" instrument_node="">

</span><h3 class="fl-heading" data-dcnode-id="614"><span data-dcnode-id="618" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Solaris air purifiers remove air contamination beyond the reach of filtration — improving the air at the molecular level.</span></span><span data-dcnode-id="615" instrument_node="">
</span></h3><span data-dcnode-id="613" instrument_node="">
</span></div><span data-dcnode-id="611" instrument_node="">
</span></div><span data-dcnode-id="609" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-5e45939b85423" data-dcnode-id="573" data-node="5e45939b85423"><span data-dcnode-id="608" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="575"><span data-dcnode-id="607" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="577"><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Solaris photocatalytic (PCO) air purifier uniquely combines the technologies of germicidal UV light, photocatalytic oxidation, and ionization to break down the molecules of common household air contamination.</span></p><span data-dcnode-id="603" instrument_node="">
</span><ul data-dcnode-id="579"><span data-dcnode-id="602" instrument_node="">
</span><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Destroys household odors, VOCs and toxic fumes. These include odors from pools areas, laundry, bathrooms, kitchens—even trash bins and the family pet–as well as from products like cleaning agents, new paint, carpets, and other renovation materials.</span></li><span data-dcnode-id="599" instrument_node="">
</span><li data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Germicidal UV and PCO work together to disinfect the HVAC air stream killing airborne microbes, reducing the chance of colds, flu, and worse.</span></li><span data-dcnode-id="596" instrument_node="">
</span><li data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Solaris PCO leads the industry with more than 200 sq inches of PCO purification power! Layered PCO surfaces are coated with a proprietary and patented titanium dioxide + silver/zinc ion PCO formulation to maximize pathogen and odor reduction.</span></li><span data-dcnode-id="593" instrument_node="">
</span><li data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">The Solaris PCO purifier is designed for homes and buildings up to up to 5000 sq ft. with adjustable oxidation levels that maintain maximum germicidal UV intensity at all times.</span></li><span data-dcnode-id="590" instrument_node="">
</span><li data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">The 4X Plasma Generator emits ions that freshen indoor air in the same way a thunderstorm freshens the air outdoors. The ions electrically charge microscopic dust particulates causing them to gather into grouped particles that either fall out of the air, or are captured in air filtration.</span></li><span data-dcnode-id="587" instrument_node="">
</span><li data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Solaris' dual spectrum UV lamp exposes microbes to a lethal dose of UV-C light. The lamp's intensity kills up to 99% of germs instantly while breaking down chemical fumes and allergens.</span></li><span data-dcnode-id="584" instrument_node="">
</span><li data-dcnode-id="581"><strong data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Lifetime purifier system warranty.</span></strong></li><span data-dcnode-id="580" instrument_node="">
</span></ul><span data-dcnode-id="578" instrument_node="">
</span></div><span data-dcnode-id="576" instrument_node="">

</span><p data-dcnode-id="85"><span data-dcnode-id="86" instrument_node="">Solaris® is the culmination of more than 20 years of experience in the application of UV light and other technologies for disinfection and decontamination. We are specialists in indoor air quality improvement technology. Our air cleaning systems advance the state-of-the-art in efficient particulate removal. Our photocatalytic process, that combines UV and photo-chemical nanotechnology to destroy odors from VOCs (volatile organic compounds) and other sources, is nothing short of revolutionary! And we continue to define the state-of-the-art in UV equipment designed for surface irradiation and airstream disinfection. Simply put, our goal is to apply the best that today's technology has to offer, to designing and manufacturing highly innovative products that create the healthiest indoor environments possible...hence our name: Ultravation!</span></p><span data-dcnode-id="84" instrument_node="">
