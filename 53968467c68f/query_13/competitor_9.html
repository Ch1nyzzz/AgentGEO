</span><span data-dcnode-id="1443"><span data-dcnode-id="1446" instrument_node="">
  I have been looking for an air purifier to keep the air in my house clean, as well as keep the dust down. I’ve tried several different types that had different functions, and they seemed to work for just a short amount of time, before the air filter needed to be replaced, and the replacement filters were either hard to find, or to expensive.</span><br data-dcnode-id="1445"><span data-dcnode-id="1444" instrument_node="">I found Sirena Twister on Amazon. I had never heard about using water to clean the air, and that intrigued me. How could water really clean the air in my home?? I read through the reviews, but I wasn’t expecting much, and figured I would return it if I didn’t like it. I set it up, and I thought there is no way that this would work! I left it running and after an hour and a half it started making really funny noises ~ like something got sucked in there. I still let it run, and the next morning I changed the water, and wiped the inside, like I read in a review. The water didn’t look dirty, but I thought, I have more time to see if I liked it, I’d send it back. I’ve been using this now for several weeks, and I have to say, that I’m impressed with this air purifier! Each day that I change the water, I see how it is working to clean the air. There are days that the water looks almost gray in color ~ yuck! We had severe weather,  last week that brought up fires that had  been burning a few state’s away, and the weather reports were saying that the air quality outside would be bad for a few days. Each day I can see how much this is working, and keeping the air clean and safe. I am so glad that I took a chance and bought this! I highly recommend this this has made such a difference in our home!!
</span></span><span data-dcnode-id="1442" instrument_node="">
