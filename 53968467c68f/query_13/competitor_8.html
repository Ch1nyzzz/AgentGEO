-dcnode-id="499" instrument_node=""> </span><img alt="" class="pos-featured-bg-hidden true" data-dcnode-id="498" sizes="(max-width: 639px) 98vw, (max-width: 1199px) 64vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//735330.smushcdn.com/1314443/wp-content/uploads/2018/10/filterfornosmokebg.jpg%3Flossy%3D0%26strip%3D1%26webp%3D1&amp;raw" srcset="https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/filterfornosmokebg-220x110.jpg?lossy=0&amp;strip=1&amp;webp=1 220w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/filterfornosmokebg-300x150.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/filterfornosmokebg.jpg?size=380x190&amp;lossy=0&amp;strip=1&amp;webp=1 380w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/filterfornosmokebg-640x320.jpg?lossy=0&amp;strip=1&amp;webp=1 640w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/filterfornosmokebg-768x384.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/filterfornosmokebg.jpg?lossy=0&amp;strip=1&amp;webp=1 1024w"><span data-dcnode-id="497" instrument_node=""> </span></div><span data-dcnode-id="495" instrument_node=""> </span><div class="entry-content" data-dcnode-id="319"><span data-dcnode-id="494" instrument_node=""> </span><div class="hth-nonreview-article-inner-container" data-dcnode-id="410"><span data-dcnode-id="493" instrument_node=""> </span><div class="fsn-row full-width-row fsn-62684cd191cd1 light" data-dcnode-id="424" style="background-repeat:repeat;background-position:left top;background-attachment:scroll;background-size:auto;"><div class="container-fluid" data-dcnode-id="425"><div class="row" data-dcnode-id="426"><div class="col-sm-12" data-dcnode-id="427"><div class="fsn-column-inner fsn-62684cd191da1 light" data-dcnode-id="428"><div class="fsn-text fsn-62684cd191e2a" data-dcnode-id="488"><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Smoke poses a unique problem, both for HVAC systems as well as their filters. Cigarette smoke released indoors doesn’t go away once the smoke seems to disappear: small microbes left in the air are responsible for the smell and stains that can permeate a living space forever.</span></p><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Smokers or those what live with smokers need to be especially careful with their air filters, as these small devices provide a powerful line of defense against indefinite cigarette smells and decreased air quality. Often, carbon filters (sometimes known as carbon-activated filters) are recommended to help. For those smokers that want to make sure that their cigarette doesn’t linger any longer than it needs to, this article goes over the best air filter for smoke, ways to combat that smoke smell, and how carbon filters might just be your greatest ally.</span></p></div><div class="fsn-text fsn-62684cd191e35" data-dcnode-id="459"><h3 data-dcnode-id="485"><b data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">What You Need in an Air Filter</span></b></h3><p data-dcnode-id="483"><img alt="" class="img-responsive" data-dcnode-id="484" height="1080" loading="lazy" sizes="(max-width: 639px) 98vw, (max-width: 1199px) 64vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1094304836-1.jpg%3Fsize%3D1920x1080%26lossy%3D0%26strip%3D1%26webp%3D1&amp;raw" srcset="https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1094304836-1-300x169.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1094304836-1.jpg?size=380x214&amp;lossy=0&amp;strip=1&amp;webp=1 380w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1094304836-1-640x360.jpg?lossy=0&amp;strip=1&amp;webp=1 640w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1094304836-1-768x432.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1094304836-1-1024x576.jpg?lossy=0&amp;strip=1&amp;webp=1 1024w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1094304836-1-1088x612.jpg?lossy=0&amp;strip=1&amp;webp=1 1088w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1094304836-1.jpg?size=1140x641&amp;lossy=0&amp;strip=1&amp;webp=1 1140w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1094304836-1-1200x675.jpg?lossy=0&amp;strip=1&amp;webp=1 1200w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1094304836-1.jpg?size=1520x855&amp;lossy=0&amp;strip=1&amp;webp=1 1520w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_1094304836-1.jpg?lossy=0&amp;strip=1&amp;webp=1 1920w" width="1920"></p><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">More so than most, living spaces that include cigarette smoke need a filter designed to tackle just about anything. That means that you’ll need to know what your HVAC air filter can do to help it function properly.</span></p><h5 data-dcnode-id="478"><b data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Air Purifiers &amp; HVAC Systems</span></b></h5><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">HVAC filters are your first line of defense against cigarette smoke. HVAC stands for heating, ventilation and air conditioning, and while you may be familiar with heating and conditioning, it is the ventilation component that is most important in this instance. HVAC systems will typically ventilate the air within the home by sucking in the air, filtering it as well as heating or cooling it, and releasing it back into your home. After smoking, microbes released into the air will be pulled through your HVAC system’s filter and then pushed throughout the rest of the system. That’s why high efficiency and great filtration is important.</span></p><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">MERV stands for minimum efficiency reporting value and is a quick way for homeowners to understand the quality of their filter. MERV ratings range from 1-20, but we’ll be mostly focused on the range acceptable for homes: 8-13. While going below the 8-13 metric is acceptable in some cases, homes with smoke in them need to go as high as our HVAC system will allow us. Using a filter with a high MERV rating will help you put your best foot forward in cleaning the air.</span></p><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Unfortunately, this filter is not going to be able to do all of the work for you. For living spaces like the bedroom or the living room, guests staying for long periods of time may still notice the smoke or feel its effects. That’s why we recommend investing in a good air purifier to go alongside your high-efficiency HVAC air filter. Air purifiers operate as more efficient air ventilation products. HVAC air filters have to be designed to take on the brunt of the entire home, which is why they can be less effective at filtration overall. Air purifiers will only work on the air in the room in which they are located, which means the MERV ratings will be higher.</span></p><h5 data-dcnode-id="469"><b data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">HEPA Explained</span></b></h5><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">HEPA stands for high-efficiency particulate air and is a standard of excellence that is used from air filters to vacuum cleaners. When using an air purifier, finding a HEPA filter is going to be crucial because HEPA filters are more effective than almost all other filters for handling cigarette smoke.</span></p><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">HEPA filters, much like HVAC air filters with high MERV ratings, are going to cost more overall. The increased density of the filter must come at a cost, but for cigarette smoke, this is a necessary expense. You won’t find an air filter that’s specifically going to handle cigarette smoke. If you seek out HEPA filtration in both your air purifier as well as in household appliances like your vacuum cleaner, then you can be assured that you’re cleaning the air in your home to the best of your ability.</span></p><h5 data-dcnode-id="462"><b data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Deodorizing Capability</span></b></h5><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">For many people, investing in a filter for smoke occurs to get rid of the smell rather than the microbes left behind by the smoke. To remove the odors of cigarette smoke completely is going to require more work, but it will be worth it. Make sure that your air purifier is either equipped with a deodorizing agent or can utilize a deodorizing filter. This is where carbon filters become your number one ally for cigarette smoke.</span></p></div><div class="fsn-text fsn-62684cd191e3e" data-dcnode-id="437"><h3 data-dcnode-id="456"><strong data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Carbon Filters</span></strong></h3><p data-dcnode-id="454"><img alt="" class="img-responsive" data-dcnode-id="455" height="1080" loading="lazy" sizes="(max-width: 639px) 98vw, (max-width: 1199px) 64vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_764854111-1.jpg%3Fsize%3D1920x1080%26lossy%3D0%26strip%3D1%26webp%3D1&amp;raw" srcset="https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_764854111-1-300x169.jpg?lossy=0&amp;strip=1&amp;webp=1 300w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_764854111-1.jpg?size=380x214&amp;lossy=0&amp;strip=1&amp;webp=1 380w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_764854111-1-640x360.jpg?lossy=0&amp;strip=1&amp;webp=1 640w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_764854111-1-768x432.jpg?lossy=0&amp;strip=1&amp;webp=1 768w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_764854111-1-1024x576.jpg?lossy=0&amp;strip=1&amp;webp=1 1024w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_764854111-1-1088x612.jpg?lossy=0&amp;strip=1&amp;webp=1 1088w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_764854111-1.jpg?size=1140x641&amp;lossy=0&amp;strip=1&amp;webp=1 1140w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_764854111-1-1200x675.jpg?lossy=0&amp;strip=1&amp;webp=1 1200w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_764854111-1.jpg?size=1520x855&amp;lossy=0&amp;strip=1&amp;webp=1 1520w, https://735330.smushcdn.com/1314443/wp-content/uploads/2018/10/shutterstock_764854111-1.jpg?lossy=0&amp;strip=1&amp;webp=1 1920w" width="1920"></p><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Carbon filters, otherwise-known as carbon-activated filters or charcoal filters, give you the most control over the smells in your home. By combining the filtration of a high MERV rating with the strength of a HEPA filter as well as a deodorizing agent, you can hope to improve your air quality from just about every angle.</span></p><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Carbon filters are a premium product that will certainly cost you more than the average fiberglass option. Still, this is your best bet for removing smoke, odors, and even carcinogens from your living space.</span></p><h5 data-dcnode-id="447"><b data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Activated Carbon Explained </span></b></h5><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Activated carbon or activated charcoal, for those unfamiliar, may sound like a bit of alternative science. Everything about how these products work, however, relies on simple chemistry. Carbon is a naturally absorptive chemical. This comes from the ionic bonds on the carbon atoms themselves and extends outward to the types of carbon we see and use today. Charcoal, for example, is nearly entirely carbon.</span></p><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">When carbon is activated, or created in a way that is highly porous, the surface area of the carbon to the air is increased exponentially. This gives filters an opportunity to force dirty air over the pores in the hopes of losing the debris in the process. Because activated carbon can pull most substances towards it, it is used in increasingly unique locations to provide deodorization and more effective cleaning. For example, you can purchase an activated carbon toothbrush that can work in much the same manner as a carbon filter.</span></p><p data-dcnode-id="438"><span data-dcnode-id="442" instrument_node="">Since the product is naturally absorptive, any small debris, dirt, spare microbes, and more are at risk of getting filtered out. This is exactly why activated carbon is highly effective against spores, dander, smoke, and other odorous home substances. You can find high quality USA made carbon air filters </span><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//filterbuy.com/air-filter-sizes/"><span data-dcnode-id="441" instrument_node="">here</span></a><span data-dcnode-id="439" instrument_node="">. Carbon filters are perfect for pet owners, humid spaces, and just about anywhere that impurities are lying around.</span></p></div><div class="fsn-text fsn-62684cd191e44" data-dcnode-id="429"><h3 data-dcnode-id="434"><b data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Final Thoughts</span></b></h3><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">As you can see, getting the best air filter for smoke isn’t easy. Filtration for cigarette smoke in the work is going to take the highest quality air filter along with carbon activated properties, air purifiers, and effective home cleaning strategies. It’s often the little things that have the biggest impact for smells, so we highly recommend utilizing an air purifier either in the room that is smoked in the most often, or in the bedroom to ensure quality sleep with quality air.</span></p><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">The best way you can take the strain off of your HVAC system and air purifier is to smoke near an open window or entirely outside. This will take a significant strain off of your HVAC system and allow you to breathe in the best air possible.</span></p></div></div></div></div></div></div><div class="test" data-dcnode-id="423" style="display: none;"></div><div class="buyers-guide-section" data-dcnode-id="419"><div class="accordion-buyersmenu hth-inner-review-content bg-list-mainclass" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node=""> </span></div><p data-dcnode-id="420"></p></div><p data-dcnode-id="416"><span data-dcnode-id="418" instrument_node=""> </span></p><div class="accordion-buyersmenu faq-bg-mainclass" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node=""> </span></div><div class="accordion-buyersmenu" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node=""> </span></div><p data-dcnode-id="411"></p></div><span data-dcnode-id="409" instrument_node=""> </span><div class="hth-nonreview-article-inner-container" data-dcnode-id="321"><span data-dcnode-id="408" instrument_node=""> </span><h3 data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Further Reading</span></h3><span data-dcnode-id="405"
