</span><section class="section section--no-top-padding" data-dcnode-id="575"><span data-dcnode-id="858" instrument_node="">
</span><div class="container" data-dcnode-id="577"><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="856" instrument_node="">Below, you will find information on air pollution health effects research since the year 2000. You can also view all health-related research projects, ongoing and completed, in our </span><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/research-results.php%3Fcategory%3DHealth%2520Exposure"><span data-dcnode-id="855" instrument_node="">Research Projects database</span></a><span data-dcnode-id="853" instrument_node="">. CARB staff provide monthly updates regarding the latest research findings on health and air pollution. Presentations for health updates are provided at </span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/health/healthup/healthup.htm"><span data-dcnode-id="852" instrument_node="">https://www.arb.ca.gov/research/health/healthup/healthup.htm.</span></a></p><h2 data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Children's Health &amp; Exposure</span></h2><p data-dcnode-id="840"><strong data-dcnode-id="845"><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/chs/chs.htm"><span data-dcnode-id="847" instrument_node="">Children's Health Study</span></a></strong><span data-dcnode-id="844" instrument_node=""> (</span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60245"><span data-dcnode-id="843" instrument_node="">Contract 94-331</span></a><span data-dcnode-id="841" instrument_node="">, Completed in 2004) The Children's Health Study was a prospective study of about 6,000 children living in 12 Southern California communities with varying ambient air pollution profiles. The primary purpose of the study was to determine whether air pollution causes chronic adverse respiratory health effects. Results indicated that children's lung function growth was adversely affected by air pollution. New cases of asthma and asthma exacerbations were associated with ambient air pollution levels and school absences from acute respiratory illnesses followed rises in ozone levels.</span></p><p data-dcnode-id="831"><strong data-dcnode-id="836"><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/faces/faces.htm"><span data-dcnode-id="839" instrument_node="">The Fresno Asthmatic Children's Environment Study</span></a><span data-dcnode-id="837" instrument_node=""> (FACES)</span></strong><span data-dcnode-id="835" instrument_node=""> (</span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60631"><span data-dcnode-id="834" instrument_node="">Contract 99-322</span></a><span data-dcnode-id="832" instrument_node="">, Completed in 2006) project was focused on the effects of particulate matter air pollution, in combination with other ambient air pollutants and bioaerosols, on asthma in young children in Fresno, California.</span></p><p data-dcnode-id="823"><strong data-dcnode-id="828"><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/delfino/delfino.htm"><span data-dcnode-id="830" instrument_node="">Huntington Park Asthma Study</span></a></strong><span data-dcnode-id="827" instrument_node=""> (</span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60129"><span data-dcnode-id="826" instrument_node="">Contract 99-302</span></a><span data-dcnode-id="824" instrument_node="">, Completed in 2002) This study was focused on the effects of air pollution, particularly air toxics, on 26 Hispanic asthmatic school children. The overall goal was to evaluate acute respiratory health effects of volatile organic compounds and other air pollutants in children in a highly industrialized area of Los Angeles flanked by major freeways and trucking routes. The results showed that ambient volatile organic compounds, criteria pollutants and organic and elemental carbon were associated with asthma symptoms.</span></p><p data-dcnode-id="815"><strong data-dcnode-id="820"><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64715"><span data-dcnode-id="822" instrument_node="">Traffic and Asthma in Economically Disadvantaged Neighborhoods</span></a></strong><span data-dcnode-id="819" instrument_node=""> (</span><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64715"><span data-dcnode-id="818" instrument_node="">Contract 04-323</span></a><span data-dcnode-id="816" instrument_node="">, Completed in 2001) Children who live in economically disadvantaged areas with high traffic density may be particularly susceptible to asthma exacerbation from air pollution exposure. The objective of this study was to examine the associations between traffic and asthma symptoms, provide additional information related to environmental justice issues, and help develop a model for future traffic studies.</span></p><p data-dcnode-id="807"><strong data-dcnode-id="812"><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64480"><span data-dcnode-id="814" instrument_node="">Refining Estimates for the East Bay Children's Respiratory Health Study</span></a></strong><span data-dcnode-id="811" instrument_node=""> (</span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64480"><span data-dcnode-id="810" instrument_node="">Contract 03-327</span></a><span data-dcnode-id="808" instrument_node="">, Completed in 2008) The East Bay Children's Respiratory Health Study collected primary data on the concentrations of traffic-related pollutants and on the health of children attending elementary schools in Alameda County, California. The objective of this study was to refine estimates of residential and school exposure to traffic-related pollutants. Its findings elucidated associations between traffic and health, provided methodological guidance for future traffic studies, and addressed issues of environmental justice.</span></p><p data-dcnode-id="796"><strong data-dcnode-id="804"><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/schoolbus/schoolbus.htm"><span data-dcnode-id="806" instrument_node="">Children's School Bus Study and Follow-Up: Exhaust Intrusion into School Buses</span></a></strong><span data-dcnode-id="803" instrument_node=""> (</span><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60203"><span data-dcnode-id="802" instrument_node="">Contract 00-322</span></a><span data-dcnode-id="800" instrument_node="">, Completed in 2003; and </span><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64895"><span data-dcnode-id="799" instrument_node="">Contract 03-343</span></a><span data-dcnode-id="797" instrument_node="">, Completed in 2006)&nbsp; The Children's School Bus Exposure Study characterized the range of children's exposures to diesel vehicle-related pollutants and other vehicle pollutants during their commutes to school. Results indicated that for some buses, significantly higher exposures of vehicle-related pollutants occurred during the bus commutes than roadway pollutant concentrations alone would indicate. The results from this study demonstrated the importance of intrusion of the tailpipe exhaust back into the bus cabin. A follow-up study was conducted to better understand the phenomenon of bus self-pollution and to investigate whether simple measures such as window and door seal replacement or&nbsp;enhancement might provide a cost-effective and simple way to reduce children's exposures to school bus exhaust.</span></p><p data-dcnode-id="785"><strong data-dcnode-id="793"><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/indoor/pcs/pcs.htm"><span data-dcnode-id="795" instrument_node="">Environmental Health Conditions in California's Portable Classrooms</span></a></strong><span data-dcnode-id="792" instrument_node=""> (</span><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64790"><span data-dcnode-id="791" instrument_node="">Contract 00-317</span></a><span data-dcnode-id="789" instrument_node="">, Completed in 2003) CARB and the CA Department of Health Services conducted a comprehensive study of the environmental health conditions in portable and traditional classrooms at several hundred schools throughout California. Numerous problems were found, including inadequate ventilation, high classroom noise levels, poor thermal comfort, high formaldehyde levels, moisture problems, toxic residues in floor dust and inadequate lighting. A </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/indoor/pcs/leg_rpt/leg_rpt.htm"><span data-dcnode-id="788" instrument_node="">Report to the Legislature</span></a><span data-dcnode-id="786" instrument_node=""> was also provided in November 2004.</span></p><h2 data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Asthma / Respiratory Health</span></h2><p data-dcnode-id="775"><strong data-dcnode-id="780"><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64766"><span data-dcnode-id="782" instrument_node="">Inhaled Fine Particle Effects on Lungs</span></a></strong><span data-dcnode-id="779" instrument_node=""> (</span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64766"><span data-dcnode-id="778" instrument_node="">Contract 05-342</span></a><span data-dcnode-id="776" instrument_node="">, Completed in 2010) The objective of this study was to determine how chronic fine particle exposures during the period of rapid lung growth could impact lung development and if any observed deficits become permanent. The investigators used controlled animal exposures (mice) and a mobile exposure system using the Versatile Aerosol Concentration Enrichment System (VACES) particle concentrator.</span></p><p data-dcnode-id="767"><strong data-dcnode-id="772"><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64725"><span data-dcnode-id="774" instrument_node="">Inflammatory Response to Short-Term Particle Exposure</span></a></strong><span data-dcnode-id="771" instrument_node=""> (</span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64725"><span data-dcnode-id="770" instrument_node="">Contract 05-341</span></a><span data-dcnode-id="768" instrument_node="">, Completed in 2010) The goal of this project is to determine how airway and cardiovascular function in healthy and asthmatic humans is altered by short-term exposure to concentrated ambient particulate matter (PM) in controlled exposures. The results from this study indicated how sensitive individuals respond to short-term exposures to levels of PM encountered in situations such as highly polluted days or in areas of very high traffic.</span></p><p data-dcnode-id="759"><strong data-dcnode-id="764"><a data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64792"><span data-dcnode-id="766" instrument_node="">Genotype Effect on Ozone-induced Airway Inflammation</span></a></strong><span data-dcnode-id="763" instrument_node=""> (</span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64792"><span data-dcnode-id="762" instrument_node="">Contract 03-315</span></a><span data-dcnode-id="760" instrument_node="">, Completed in 2012) Genotypes of the GSTM1 gene may explain the wide range of responsiveness to ozone exposure observed among both healthy and asthmatic people. This study investigated whether GSTM1 genotype influences airway inflammatory responses of asthmatic subjects exposed to ozone. The results of the study are critical to development of adequately protective ambient air quality standards.</span></p><p data-dcnode-id="751"><strong data-dcnode-id="756"><a data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D59924"><span data-dcnode-id="758" instrument_node="">Effects of Smoke on Airway Function and Inflammation</span></a></strong><span data-dcnode-id="755" instrument_node=""> (</span><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D59924"><span data-dcnode-id="754" instrument_node="">Contract 97-322</span></a><span data-dcnode-id="752" instrument_node="">, Completed in 2003) The results of this project suggest that short exposures to very high concentrations of smoke from rice field burning is capable of inducing airway inflammation in healthy individuals and in individuals with asthma or allergic rhinitis.</span></p><p data-dcnode-id="737"><strong data-dcnode-id="748"><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60206"><span data-dcnode-id="750" instrument_node="">Nitrogen Dioxide Effects in Asthmatics</span></a></strong><span data-dcnode-id="747" instrument_node=""> (</span><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60206"><span data-dcnode-id="746" instrument_node="">Contract 00-337</span></a><span data-dcnode-id="744" instrument_node="">, Completed in 2004) The results from this study suggest that most asthmatics do not have a late phase response to inhaled allergen following three-hour exposure to 0.4 ppm nitrogen dioxide (NO</span><sub data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">2</span></sub><span data-dcnode-id="741" instrument_node="">), although some may experience an early phase response. In addition, NO</span><sub data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">2</span></sub><span data-dcnode-id="738" instrument_node=""> exposure did not alter lung function or induce non-allergic airway inflammation.</span></p><p data-dcnode-id="729"><strong data-dcnode-id="734"><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60340"><span data-dcnode-id="736" instrument_node="">Nitric Oxide Effects on Lung Function</span></a></strong><span data-dcnode-id="733" instrument_node=""> (</span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60340"><span data-dcnode-id="732" instrument_node="">Contract 97-329</span></a><span data-dcnode-id="730" instrument_node="">, Completed in 2001) This literature review concluded that nitric oxide (NO) can be both beneficial and injurious and suggests that ambient concentrations of NO could affect cardiopulmonary regulation, pulmonary inflammation, asthma and other inflammatory lung diseases, host defense, immune responses and platelet function.</span></p><h2 data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Cardiovascular Health</span></h2><p data-dcnode-id="719"><strong data-dcnode-id="724"><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64724"><span data-dcnode-id="726" instrument_node="">Cardiovascular Health Effects of In-Vehicle Particle Exposure</span></a></strong><span data-dcnode-id="723" instrument_node=""> (</span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60340"><span data-dcnode-id="722" instrument_node="">Contract 04-324</span></a><span data-dcnode-id="720" instrument_node="">, Completed in 2010) The purpose of this study was to investigate possible links between exposures to freeway-related ultrafine and fine particles and cardiovascular effects through controlled, on-road exposures of human volunteer subjects. The results will aid CARB in evaluating the importance of motor vehicle related ultrafine particles on cardiovascular health.</span></p><p data-dcnode-id="711"><strong data-dcnode-id="716"><a data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64794"><span data-dcnode-id="718" instrument_node="">Cardiovascular Effects of Ozone Exposure</span></a></strong><span data-dcnode-id="715" instrument_node=""> (</span><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64794"><span data-dcnode-id="714" instrument_node="">Contract 04-322</span></a><span data-dcnode-id="712" instrument_node="">, Completed in 2011) This study investigated the effect of ozone exposure on heart rate variability, inflammation and coagulability. The results provided a biological basis for epidemiological findings that this pollutant can induce adverse cardiovascular effects.</span></p><p data-dcnode-id="703"><strong data-dcnode-id="708"><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64732"><span data-dcnode-id="710" instrument_node="">Effects of Inhaled Particles on Cardiovascular Disease</span></a></strong><span data-dcnode-id="707" instrument_node=""> (</span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64732"><span data-dcnode-id="706" instrument_node="">Contract 04-320</span></a><span data-dcnode-id="704" instrument_node="">, Completed in 2010) Exposure to levels of particulate matter (PM) found in California has been linked to an increased risk of cellular inflammation and heart disease. This study examined the link between particle-induced inflammation and the development of atherosclerosis in normal and atherosclerosis-prone mice, using both fine and ultrafine PM exposures.</span></p><p data-dcnode-id="695"><strong data-dcnode-id="700"><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64806"><span data-dcnode-id="702" instrument_node="">Air Pollution Exposure Effects and Cardiovascular Disease in Teachers</span></a></strong><span data-dcnode-id="699" instrument_node=""> (</span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64806"><span data-dcnode-id="698" instrument_node="">Contract 06-336</span></a><span data-dcnode-id="696" instrument_node="">, Completed in 2011) This study investigated the effects of long-term exposure to particulate air pollution and various gaseous pollutants on cardiovascular and cardiopulmonary disease incidence and mortality in a study group of California teachers and whether these effects are related to exposure to traffic emissions. This study provided additional evidence that long-term exposure to air pollution is associated with mortality from heart disease, and also demonstrated that exposure to particulate matter is associated with the incidence of new cases of stroke.</span></p><h2 data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Indoor Health and Exposure</span></h2><p data-dcnode-id="678"><strong data-dcnode-id="690"><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64830"><span data-dcnode-id="692" instrument_node="">Indoor Exposures in Child Care Facilities</span></a></strong><span data-dcnode-id="689" instrument_node=""> and </span><strong data-dcnode-id="686"><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D65278"><span data-dcnode-id="688" instrument_node="">Follow-up: Possible Health Risks</span></a></strong><span data-dcnode-id="685" instrument_node=""> (</span><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64830"><span data-dcnode-id="684" instrument_node="">Contract 08-305</span></a><span data-dcnode-id="682" instrument_node="">, Completed in 2012; and </span><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D65278"><span data-dcnode-id="681" instrument_node="">Contract 12-330</span></a><span data-dcnode-id="679" instrument_node="">, Completed in 2015) These studies examined environmental characteristics and contaminant levels in air and dust of 40 California early childhood education (ECE) facilities. The initial study detected over 40 volatile organic compounds (VOC) in the air of these child care facilities. The follow-up study involved detailed analyses of many of the VOCs and their potential health risks.</span></p><p data-dcnode-id="670"><strong data-dcnode-id="675"><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64716"><span data-dcnode-id="677" instrument_node="">Ultrafine Particles in Schoolrooms and Homes</span></a></strong><span data-dcnode-id="674" instrument_node=""> (</span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64716"><span data-dcnode-id="673" instrument_node="">Contract 05-305</span></a><span data-dcnode-id="671" instrument_node="">, Completed in 2010) This study identified and improved our understanding of the factors that influence ultrafine particle levels in schoolrooms and homes by characterizing the generation of ultrafines from indoor sources and measuring infiltration from outdoors (heavily traveled roadways).</span></p><p data-dcnode-id="662"><strong data-dcnode-id="667"><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64742"><span data-dcnode-id="669" instrument_node="">Health Impacts of Indoor Particulate Matter</span></a></strong><span data-dcnode-id="666" instrument_node=""> (</span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64742"><span data-dcnode-id="665" instrument_node="">Contract 05-302</span></a><span data-dcnode-id="663" instrument_node="">, Completed in 2010) Few studies had examined health impacts from particulate matter (PM) from indoor sources. This study identified and quantified the relative toxicities of particulate matter from indoor sources, including cooking, fireplace wood burning, candle and incense burning, and vacuuming.</span></p><p data-dcnode-id="654"><strong data-dcnode-id="659"><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64697"><span data-dcnode-id="661" instrument_node="">Field Study of Ventilation and Indoor Air Quality in New Homes</span></a></strong><span data-dcnode-id="658" instrument_node=""> (</span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64697"><span data-dcnode-id="657" instrument_node="">Contract 04-310</span></a><span data-dcnode-id="655" instrument_node="">, Completed in 2009) The overall objective of this study was to obtain information on ventilation practices and indoor air quality in new single-family detached homes in California. Results will help determine the adequacy of ventilation in new homes for possible revisions to the state energy efficiency standards, and provide current indoor pollutant concentration data for California residences.</span></p><p data-dcnode-id="646"><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60560"><strong data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Cleaning Agents and Indoor Air Chemistry</span></strong></a><span data-dcnode-id="650" instrument_node=""> (</span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60560"><span data-dcnode-id="649" instrument_node="">Contract 01-336</span></a><span data-dcnode-id="647" instrument_node="">, Completed in 2006) The investigators measured toxic emissions from cleaning products and indoor reactions between emissions and ozone. Some cleaning products emitted measurable indoor concentrations of ethylene-based glycol&nbsp;ethers and terpenes. When the cleaning products were used in the presence of ozone, a number of pollutants were formed, including formaldehyde.</span></p><h2 data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Particulate Matter (PM) Health Effects</span></h2><p data-dcnode-id="636"><strong data-dcnode-id="641"><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64668"><span data-dcnode-id="643" instrument_node="">Ultrafine Particulate Matter and Cardiorespiratory Health in the Elderly</span></a></strong><span data-dcnode-id="640" instrument_node=""> (</span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64668"><span data-dcnode-id="639" instrument_node="">Contract 03-329</span></a><span data-dcnode-id="637" instrument_node="">, Completed in 2009) The National Institute of Environmental Health Sciences funded a major health study that includes collection of health outcome data from elderly people who live in Southern California. The objective of this study was to enhance indoor and outdoor air monitoring of ultrafine and fine particles in several Southern California communities and to evaluate oxidative stress in elderly residents of retirement homes.</span></p><p data-dcnode-id="628"><strong data-dcnode-id="633"><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60195"><span data-dcnode-id="635" instrument_node="">Particulate Toxicity: Effects in Susceptible Humans</span></a></strong><span data-dcnode-id="632" instrument_node="">&nbsp;(</span><a data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60195"><span data-dcnode-id="631" instrument_node="">Contract 99-314</span></a><span data-dcnode-id="629" instrument_node="">, Completed in 2004) This study showed that in asthmatics, particulate carbon and ammonium nitrate exposures caused significant decreases in spirometric pulmonary function (SPF), some changes in airway cell distribution and heart rate variability (HRV) and no changes in gene expression. However, combined exposure to particles and ozone, in addition to decreases in SPF, produced increases in several inflammatory associated cells, increases in protein and gene expression, and multiple changes in HRV.</span></p><p data-dcnode-id="620"><strong data-dcnode-id="625"><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64906"><span data-dcnode-id="627" instrument_node="">Particulate Toxicity: Respiratory Effects</span></a></strong><span data-dcnode-id="624" instrument_node=""> (</span><a data-dcnode-id="622" href="ttps://www.arb.ca.gov/research/single-project.php?row_id=64906"><span data-dcnode-id="623" instrument_node="">Contract 96-310</span></a><span data-dcnode-id="621" instrument_node="">, Completed in 2000) This study's findings in both an animal model of allergic airways disease and human asthmatics suggest the airway epithelium is an important target of particle-induced effects associated with inflammation and the perturbation of proinflammatory cytokines present in the lungs.</span></p><p data-dcnode-id="612"><strong data-dcnode-id="617"><a data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60196"><span data-dcnode-id="619" instrument_node="">Particulate Toxicity: Respiratory Effects in an Animal Model</span></a></strong><span data-dcnode-id="616" instrument_node=""> (</span><a data-dcnode-id="614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D60196"><span data-dcnode-id="615" instrument_node="">Contract 99-315</span></a><span data-dcnode-id="613" instrument_node="">, Completed in 2004) This study demonstrated changes in blood pressure and heart rate variability consistent with an adverse effect of particulate matter on the heart. Significant changes were seen in an animal model, the senescent (geriatric) rat. Macrophage changes were seen in human subjects.</span></p><h2 data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Immune Effects</span></h2><p data-dcnode-id="596"><strong data-dcnode-id="607"><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D58790"><span data-dcnode-id="609" instrument_node="">Nitrogen Dioxide Effects on Macrophage Responses</span></a></strong><span data-dcnode-id="606" instrument_node=""> (</span><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D58790"><span data-dcnode-id="605" instrument_node="">Contract 95-311</span></a><span data-dcnode-id="603" instrument_node="">, Completed in 1998) Results showed that multi-day exposures to nitrogen dioxide (NO</span><sub data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">2</span></sub><span data-dcnode-id="600" instrument_node="">) do not affect the body's production of macrophage cells nor the cells' ability to recognize invading pathogens and recruit other infection-fighting cells. However, following NO</span><sub data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">2</span></sub><span data-dcnode-id="597" instrument_node=""> exposure, macrophages released more potentially toxic inflammatory chemicals that could cause lung damage.</span></p><h2 data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Community Health</span></h2><p data-dcnode-id="586"><strong data-dcnode-id="591"><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64727"><span data-dcnode-id="593" instrument_node="">Air Pollution and Environmental Justice</span></a></strong><span data-dcnode-id="590" instrument_node=""> (</span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arb.ca.gov/research/single-project.php%3Frow_id%3D64727"><span data-dcnode-id="589" instrument_node="">Contract 04-308</span></a><span data-dcnode-id="587" instrument_node="">, Completed in 2010) This project sought to develop diverse methodological approaches to address environmental justice (EJ) concerns of relevance to air pollution regulation in California. The project consisted of several interlocking research projects, including: 1) a landscape analysis of environmental hazard and air pollution burden disparities in the Bay Area; 2) development of an Environmental Justice Screening Method (EJSM) to identify areas of environmental justice concern with regard to the cumulative impacts of hazard proximity, air pollution, exposure and estimated health risk, and social vulnerability; 3) the implementation of the EJSM to evaluate a hypothetical siting of a power plant facility; 4) a statewide analysis of the association between ambient pollution exposures and adverse perinatal outcomes; 5) the implementation of a community-based participatory ground truthing research project to evaluate the coverage of emissions inventory databases of localized emission sources and sensitive receptors and to build community confidence in the research and regulatory process.</span></p><h2 data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Additional Resources</span></h2><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Find additional research projects through our catalog at&nbsp;</span></p><p data-dcnode-id="579"><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ww2.arb.ca.gov/our-work/programs/research-planning/research-division-contracts"><span data-dcnode-id="581" instrument_node="">https://ww2.arb.ca.gov/our-work/programs/research-planning/research-division-contracts</span></a></p><span data-dcnode-id="578" instrument_node="">
