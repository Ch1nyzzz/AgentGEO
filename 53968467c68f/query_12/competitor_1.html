ent_node="">2</span></sub><sup data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">2-</span></sup><span data-dcnode-id="336" instrument_node="">) inferring that the decomposition of O</span><sub data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">2</span></sub><sup data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">2-</span></sup><span data-dcnode-id="331" instrument_node=""> is the rate-determining step. On the other side, the reaction of the atomic oxygen with ozone would be rate-determining for Co</span><sub data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">3</span></sub><span data-dcnode-id="328" instrument_node="">O</span><sub data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">4</span></sub><span data-dcnode-id="325" instrument_node="">, as revealed by the low efficiency but no O</span><sub data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">2</span></sub><sup data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">2-</span></sup><span data-dcnode-id="320" instrument_node=""> signal. However, the synergy of Mn and Co in (Mn,Co)</span><sub data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">3</span></sub><span data-dcnode-id="317" instrument_node="">O</span><sub data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">4</span></sub><span data-dcnode-id="314" instrument_node=""> accelerates both the rate-determining steps obtaining high efficiency, which provides a new idea to develop catalysts in ozone elimination.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="291"><div class="sub-heading" data-dcnode-id="303"><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0959652622004760" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="307" id="citing-articles-article4-title"><span data-dcnode-id="308" instrument_node="">Building material toxicity and life cycle assessment: A systematic critical review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">2022, Journal of Cleaner Production</span></div></div><div class="buttons" data-dcnode-id="297"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="298" type="button"><span class="button-link-text" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="299" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="300"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="292"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="293" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="294"><p data-dcnode-id="295" id="abspara0010"><span data-dcnode-id="296" instrument_node="">This review systematically analyses the most relevant contributions published in the area of toxicity of building materials and their evaluation from the perspective of life cycle analysis to give a critical view of the relationship between the two fields. For this review, the systematic literature review methodology was chosen. With this methodology, it is possible to identify the most important sources and obtain a complete reading of the state of the question. The review shows that most articles on the toxicity of building materials focus on the usage phase, ignoring the life cycle perspective. On the other hand, the different Life Cycle Assessment methodologies start from different inventories, so the results will vary depending on the chosen method. In all cases, the predictions on toxicity are underestimated, so they are considered a secondary impact, and also the effects of bioaccumulation have not been integrated into the methodology. The main conflictive points found are discussed, such as the lack of coverage of substances widely used in the construction sector or the need to integrate new impacts.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="258"><div class="sub-heading" data-dcnode-id="285"><a data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1005030221006319" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="289" id="citing-articles-article5-title"><span data-dcnode-id="290" instrument_node="">Flexible and disposable paper-based gas sensor using reduced graphene oxide/chitosan composite</span></h3></a><div class="article-source ellipsis" data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">2022, Journal of Materials Science and Technology</span></div></div><div class="buttons" data-dcnode-id="279"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="280" type="button"><span class="button-link-text" data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="281" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="282"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="259"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="260" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="261"><p data-dcnode-id="262" id="spara009"><span data-dcnode-id="278" instrument_node="">Nitrogen dioxide (NO</span><sub data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">2</span></sub><span data-dcnode-id="275" instrument_node="">) is a representative toxicant in air pollution that mostly arises from the exhaust gas released by automobiles. It is related to various respiratory diseases such as pneumonia and sudden infant death syndrome. Additionally, because the toxicity of nitrogen dioxide is high in overpopulated areas (</span><em data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">i.e.</span></em><span data-dcnode-id="272" instrument_node="">, a capital or metropolis), the development of simple, practical, and facile sensors is highly needed. This work presents a flexible and disposable paper-based NO</span><sub data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">2</span></sub><span data-dcnode-id="269" instrument_node=""> sensor based on a reduced graphene oxide/chitosan (rGO/CS) composite. The synthesized rGO/CS composite can be easily flexed and deformed into various shapes, which are attributed to chitosan molecules that function as a dispersion and reduction agent and support material. In addition, this composite can be attached to paper owing to its adhesive property; hence it can be utilized in versatile applications in a disposable manner. By analyzing the conductive change of the rGO/CS composite when it reacts with NO</span><sub data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">2</span></sub><span data-dcnode-id="266" instrument_node="">, we can detect nitrogen dioxide in a concentration range of 0–100 ppm with a detection limit of 1 ppm. Moreover, we performed NO</span><sub data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">2</span></sub><span data-dcnode-id="263" instrument_node=""> detection in the exhaust gas released by automobiles using the rGO/CS composite for practical application. The results indicated that the rGO/CS composite has the potential to be used in feasible gas sensing as a facile and disposable sensor under various conditions.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-40049098469%26md5%3Da44cc913603c56249d4fbf6d1c1441c" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="255" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="256"></path></svg><span class="button-alternative-text" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="242"><dl class="footnote" data-dcnode-id="243"><dt class="footnote-label" data-dcnode-id="247"></dt><dd class="u-margin-xxl-left" data-dcnode-id="244"><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Disclosure of potential conflict of interest: J. A. Bernstein has consultant arrangements with Medpointe, Cornerstone, and Flint Industries; has received research support from Merck, GlaxoSmithKline, and Medpointe; has served on the speakers' bureau for AstraZeneca, GlaxoSmithKline, UCB-Sanofi Aventis, Novartis, Merck, and Tera; and has served as an expert witness in legal cases regarding environmental issues. E. Horner is employed by and owns stock in Air Quality Sciences; has provided litigation support to both defendant and plaintiff attorneys; and has received grants/research support from the American Society of Heating, Refrig
