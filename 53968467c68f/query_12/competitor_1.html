se from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6381" instrument_node="">airway response</span></a><span data-dcnode-id="6379" instrument_node="">.</span></span><a class="workspace-trigger" data-dcnode-id="6375" href="#bib32" name="bbib32"><sup data-dcnode-id="6376"><span data-dcnode-id="6377" instrument_node="">32</span></sup></a><span data-dcnode-id="6374" instrument_node=""> Although these limited studies are intriguing, these findings are inconclusive and require further investigation in larger populations to determine their significance.</span></p></section></section></section><section data-dcnode-id="6322" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6368"><span data-dcnode-id="6369" instrument_node="">Tobacco smoke: passive and sidestream exposure</span></h2><p data-dcnode-id="6363" id="para0060"><span data-dcnode-id="6367" instrument_node="">Tobacco is the leading cause of preventable death. Tobacco smoke contains more than 4000 chemicals in the form of particles and gases, many of which are known or suspected carcinogens.</span><a class="workspace-trigger" data-dcnode-id="6364" href="#bib33" name="bbib33"><sup data-dcnode-id="6365"><span data-dcnode-id="6366" instrument_node="">33</span></sup></a></p><p data-dcnode-id="6349" id="para0065"><span data-dcnode-id="6362" instrument_node="">The 2001 European Community Respiratory Health Survey reported that 65% of respondents identified at least 1 smoking parent during their childhood, and 39% currently were being exposed to ETS.</span><a class="workspace-trigger" data-dcnode-id="6359" href="#bib34" name="bbib34"><sup data-dcnode-id="6360"><span data-dcnode-id="6361" instrument_node="">34</span></sup></a><span data-dcnode-id="6354"><span data-dcnode-id="6358" instrument_node=""> In the United States, 37% of adult nontobacco users reported ETS exposure at home or work, yet 88% demonstrated detectable serum </span><a class="topic-link" data-dcnode-id="6356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/cotinine" title="Learn more about cotinine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6357" instrument_node="">cotinine</span></a><span data-dcnode-id="6355" instrument_node=""> levels.</span></span><a class="workspace-trigger" data-dcnode-id="6351" href="#bib35" name="bbib35"><sup data-dcnode-id="6352"><span data-dcnode-id="6353" instrument_node="">35</span></sup></a><span data-dcnode-id="6350" instrument_node=""> Young children in particular who spend most of their time in the home are at increased risk for even greater exposures to tobacco smoke if their mothers smoke.</span></p><p data-dcnode-id="6323" id="para0070"><span data-dcnode-id="6348" instrument_node="">Several studies in adults have shown a dose-response relationship between ETS exposure and chronic respiratory tract symptoms in the home and workplace.</span><a class="workspace-trigger" data-dcnode-id="6345" href="#bib36" name="bbib36"><sup data-dcnode-id="6346"><span data-dcnode-id="6347" instrument_node="">36</span></sup></a><span data-dcnode-id="6340"><span data-dcnode-id="6344" instrument_node=""> A meta-analysis of 7 studies in infancy and early childhood reported an odds ratio of 1.98 for an increased risk of </span><a class="topic-link" data-dcnode-id="6342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/wheeze" title="Learn more about wheezing from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6343" instrument_node="">wheezing</span></a><span data-dcnode-id="6341" instrument_node=""> with ETS exposure. Jaakkola et al</span></span><a class="workspace-trigger" data-dcnode-id="6337" href="#bib37" name="bbib37"><sup data-dcnode-id="6338"><span data-dcnode-id="6339" instrument_node="">37</span></sup></a><span data-dcnode-id="6332"><span data-dcnode-id="6336" instrument_node=""> reported that school-age children were 1.24 to 1.40 more likely to experience increased </span><a class="topic-link" data-dcnode-id="6334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/lower-respiratory-tract" title="Learn more about lower respiratory tract from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6335" instrument_node="">lower respiratory tract</span></a><span data-dcnode-id="6333" instrument_node=""> symptoms if they had ETS exposure. More studies are needed to determine whether ETS can cause or exacerbate asthma. Studies thus far have found that ETS exposure in the home can increase the risk of developing asthma from 40% to 200%. Although currently there are no longitudinal studies in adults demonstrating that ETS can reduce lung function, several longitudinal studies in children have demonstrated this effect.</span></span><a class="workspace-trigger" data-dcnode-id="6329" href="#bib38" name="bbib38"><sup data-dcnode-id="6330"><span data-dcnode-id="6331" instrument_node="">38</span></sup></a><span data-dcnode-id="6324"><span data-dcnode-id="6328" instrument_node=""> Additional longitudinal studies are needed to define better the relationship between ETS and other adverse health effects in susceptible subpopulations such as&nbsp;children and the elderly. These studies require methodology that can better measure the cumulative effect of ETS exposure on subjects. However, the currently available evidence supports a concerted </span><a class="topic-link" data-dcnode-id="6326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/public-health-policy" title="Learn more about public health policy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6327" instrument_node="">public health policy</span></a><span data-dcnode-id="6325" instrument_node=""> directed at reducing or preventing ETS exposure in public settings and in the home.</span></span></p></section><section data-dcnode-id="6181" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6320"><span data-dcnode-id="6321" instrument_node="">Indoor particulate matter</span></h2><section data-dcnode-id="6273" id="sec4.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6318"><span data-dcnode-id="6319" instrument_node="">Classification</span></h3><p data-dcnode-id="6307" id="para0075"><span data-dcnode-id="6313"><span data-dcnode-id="6317" instrument_node="">The regulation of ambient PM and the implementation of enforcement laws for emissions by the US Environment Protection Agency have made a significant step in improving outdoor air&nbsp;quality. However, there has been growing concern about the adverse health effects of indoor </span><a class="topic-link" data-dcnode-id="6315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/particulate-matter" title="Learn more about particulate matter from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6316" instrument_node="">particulate matter</span></a><span data-dcnode-id="6314" instrument_node=""> and its associated chemical or biological agents. In industrialized countries, people spend approximately 22 hours of their time indoors. Recent studies have demonstrated an association between indoor PM and respiratory illness including asthma.</span></span><a class="workspace-trigger" data-dcnode-id="6311" href="#bib39" name="bbib39"><span data-dcnode-id="6312" instrument_node="">39</span></a><span data-dcnode-id="6310" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6308" href="#bib40" name="bbib40"><span data-dcnode-id="6309" instrument_node="">40</span></a></p><p data-dcnode-id="6281" id="para0080"><span data-dcnode-id="6290"><span data-dcnode-id="6306" instrument_node="">The adverse effects of indoor PM are dependent on deposition in the respiratory tract and the ability of the respiratory tree to remove them, which is directly related to particle size and chemical composition. For example, coarse PM generated indoors (2.5-10 μm) tends to deposit in the nasal, pharyngeal, and laryngeal regions of the respiratory system, whereas fine (0.1-2.5 μm) and ultrafine (&lt;0.1 μm) PM generated indoors and outdoors tends to deposit in the tracheobronchial region and </span><a class="topic-link" data-dcnode-id="6304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/alveoli" title="Learn more about alveoli from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6305" instrument_node="">alveoli</span></a><span data-dcnode-id="6291"><span data-dcnode-id="6303" instrument_node="">. </span><a class="topic-link" data-dcnode-id="6301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/organic-pollutant" title="Learn more about Organic pollutants from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6302" instrument_node="">Organic pollutants</span></a><span data-dcnode-id="6292"><span data-dcnode-id="6300" instrument_node=""> can adsorb onto the surface of these particles, contributing to important adverse health effects. The large surface area of smaller PM (ie, ultrafine PM) allows these particles to carry greater amounts of </span><a class="topic-link" data-dcnode-id="6298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/air-toxics" title="Learn more about air toxics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6299" instrument_node="">air toxics</span></a><span data-dcnode-id="6293"><span data-dcnode-id="6297" instrument_node=""> (ie, polycyclic aromatic hydrocarbons [PAH], metals, and quinones) that can deposit in the </span><a class="topic-link" data-dcnode-id="6295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/lower-respiratory-tract" title="Learn more about lower respiratory tract from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6296" instrument_node="">lower respiratory tract</span></a><span data-dcnode-id="6294" instrument_node="">, thereby having a greater effect on causing or aggravating respiratory diseases, such as asthma.</span></span></span></span></span><a class="workspace-trigger" data-dcnode-id="6288" href="#bib40" name="bbib40"><span data-dcnode-id="6289" instrument_node="">40</span></a><span data-dcnode-id="6287" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6285" href="#bib41" name="bbib41"><span data-dcnode-id="6286" instrument_node="">41</span></a><span data-dcnode-id="6284" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6282" href="#bib42" name="bbib42"><span data-dcnode-id="6283" instrument_node="">42</span></a></p><p data-dcnode-id="6274" id="para0085"><span data-dcnode-id="6280" instrument_node="">Indoor PM can also be classified according to its sources, which include ETS, cooking, heating, consumer products, building materials, house dust, particle resuspension from human activity such as vacuuming and foot traffic, outdoor particle infiltration, and secondary organic aerosols.</span><a class="workspace-trigger" data-dcnode-id="6278" href="#bib43" name="bbib43"><span data-dcnode-id="6279" instrument_node="">43</span></a><span data-dcnode-id="6277" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6275" href="#bib44" name="bbib44"><span data-dcnode-id="6276" instrument_node="">44</span></a></p></section><section data-dcnode-id="6228" id="sec4.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6271"><span data-dcnode-id="6272" instrument_node="">Health effects of indoor PM</span></h3><p data-dcnode-id="6229" id="para0090"><span data-dcnode-id="6270" instrument_node="">Indoor PM has been associated with increased respiratory symptoms.</span><a class="workspace-trigger" data-dcnode-id="6267" href="#bib45" name="bbib45"><sup data-dcnode-id="6268"><span data-dcnode-id="6269" instrument_node="">45</span></sup></a><span data-dcnode-id="6266" instrument_node=""> A study conducted in 421 houses in northern-central Italy showed a positive correlation between indoor PM</span><sub data-dcnode-id="6264"><span data-dcnode-id="6265" instrument_node="">2.5</span></sub><span data-dcnode-id="6259"><span data-dcnode-id="6263" instrument_node=""> exposure and the presence of </span><a class="topic-link" data-dcnode-id="6261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/bronchitis" title="Learn more about bronchitis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6262" instrument_node="">bronchitis</span></a><span data-dcnode-id="6260" instrument_node=""> and asthmatic symptoms, especially during the winter season.</span></span><a class="workspace-trigger" data-dcnode-id="6256" href="#bib45" name="bbib45"><sup data-dcnode-id="6257"><span data-dcnode-id="6258" instrument_node="">45</span></sup></a><span data-dcnode-id="6251"><span data-dcnode-id="6255" instrument_node=""> A study conducted in Oslo homes showed that indoor </span><a class="topic-link" data-dcnode-id="6253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/suspended-particulate-matter" title="Learn more about suspended PM from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6254" instrument_node="">suspended PM</span></a><span data-dcnode-id="6252" instrument_node=""> contained a large amount of potential allergen carriers (ie, soot particles &lt;1 μm).</span></span><a class="workspace-trigger" data-dcnode-id="6248" href="#bib46" name="bbib46"><sup data-dcnode-id="6249"><span data-dcnode-id="6250" instrument_node="">46</span></sup></a><span data-dcnode-id="6239"><span data-dcnode-id="6247" instrument_node=""> The presence of organic pollutants together with these allergens or </span><a class="topic-link" data-dcnode-id="6245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/endotoxin" title="Learn more about endotoxin from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6246" instrument_node="">endotoxin</span></a><span data-dcnode-id="6240"><span data-dcnode-id="6244" instrument_node=""> may exert a proinflammatory effect, leading to the exacerbation of </span><a class="topic-link" data-dcnode-id="6242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/allergic-disease" title="Learn more about allergic diseases from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6243" instrument_node="">allergic diseases</span></a><span data-dcnode-id="6241" instrument_node=""> such as asthma.</span></span></span><a class="workspace-trigger" data-dcnode-id="6237" href="#bib46" name="bbib46"><span data-dcnode-id="6238" instrument_node="">46</span></a><span data-dcnode-id="6236" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6234" href="#bib47" name="bbib47"><span data-dcnode-id="6235" instrument_node="">47</span></a><span data-dcnode-id="6233" instrument_node=""> Several studies have reported that children living within 100 meters of the freeway experienced more respiratory symptoms than those living further away, suggesting that adverse health effects can be attributed to both outdoor PM exposure and exposure to PM that permeates inside from the outdoors, causing poor IAQ.</span><a class="workspace-trigger" data-dcnode-id="6230" href="#bib48" name="bbib48"><sup data-dcnode-id="6231"><span data-dcnode-id="6232" instrument_node="">48</span></sup></a></p></section><section data-dcnode-id="6182" id="sec4.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6226"><span data-dcnode-id="6227" instrument_node="">Potential mechanisms of indoor PM–related respiratory illness</span></h3><p data-dcnode-id="6183" id="para0095"><span data-dcnode-id="6221"><span data-dcnode-id="6225" instrument_node="">Mechanisms by which PM exerts its adverse </span><a class="topic-link" data-dcnode-id="6223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/respiratory-physiology" title="Learn more about respiratory effects from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6224" instrument_node="">respiratory effects</span></a><span data-dcnode-id="6222" instrument_node=""> by acting as a possible adjuvant have been reviewed previously.</span></span><a class="workspace-trigger" data-dcnode-id="6219" href="#bib1" name="bbib1"><span data-dcnode-id="6220" instrument_node="">1</span></a><span data-dcnode-id="6218" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6216" href="#bib49" name="bbib49"><span data-dcnode-id="6217" instrument_node="">49</span></a><span data-dcnode-id="6211"><span data-dcnode-id="6215" instrument_node=""> Indoor PM may carry toxic pollutants and reaction products into the airway, generating </span><a class="topic-link" data-dcnode-id="6213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/oxidative-stress" title="Learn more about oxidative stress from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6214" instrument_node="">oxidative stress</span></a><span data-dcnode-id="6212" instrument_node="">.</span></span><a class="workspace-trigger" data-dcnode-id="6208" href="#bib46" name="bbib46"><sup data-dcnode-id="6209"><span data-dcnode-id="6210" instrument_node="">46</span></sup></a><span data-dcnode-id="6207" instrument_node=""> Many organic chemicals (eg, PAH and quinones) associated with ambient PM are redox active and have been shown to induce proinflammatory responses through the generation of oxidative stress.</span><a class="workspace-trigger" data-dcnode-id="6205" href="#bib50" name="bbib50"><span data-dcnode-id="6206" instrument_node="">50</span></a><span data-dcnode-id="6204" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6202" href="#bib51" name="bbib51"><span data-dcnode-id="6203" instrument_node="">51</span></a><span data-dcnode-id="6201" instrument_node=""> Finally, reactive compounds, such as radicals and organic compounds, generated from the interactions between indoor PM, O</span><sub data-dcnode-id="6199"><span data-dcnode-id="6200" instrument_node="">3</span></sub><span data-dcnode-id="6198" instrument_node="">, or NO</span><sub data-dcnode-id="6196"><span data-dcnode-id="6197" instrument_node="">2</span></sub><span data-dcnode-id="6195" instrument_node=""> can also have proinflammatory effects.</span><a class="workspace-trigger" data-dcnode-id="6193" href="#bib6" name="bbib6"><span data-dcnode-id="6194" instrument_node="">6</span></a><span data-dcnode-id="6192" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6190" href="#bib11" name="bbib11"><span data-dcnode-id="6191" instrument_node="">11</span></a><span data-dcnode-id="6189" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6187" href="#bib12" name="bbib12"><span data-dcnode-id="6188" instrument_node="">12</span></a><span data-dcnode-id="6186" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6184" href="#bib49" name="bbib49"><span data-dcnode-id="6185" instrument_node="">49</span></a></p></section></section><section data-dcnode-id="5921" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6179"><span data-dcnode-id="6180" instrument_node="">Building-related illnesses associated with indoor air pollutants</span></h2><section data-dcnode-id="6111" id="sec5.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6177"><span data-dcnode-id="6178" instrument_node="">SBS</span></h3><p data-dcnode-id="6161" id="para0100"><em data-dcnode-id="6175"><span data-dcnode-id="6176" instrument_node="">Sick building</span></em><span data-dcnode-id="6170"><span data-dcnode-id="6174" instrument_node=""> is a term first used to describe workplaces with poor ventilation where an excess above the expected numbers of occupants report symptoms of fatigue, headache, nasal, eye or skin irritation, sore throat, and cough that temporally occur with being in the building and improve away from the building. </span><a class="topic-link" data-dcnode-id="6172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/sick-building-syndrome" title="Learn more about SBS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6173" instrument_node="">SBS</span></a><span data-dcnode-id="6171" instrument_node=""> has been defined as having 3 or more symptoms including dry or irritated eyes, sore or dry throat, stuffy or runny nose, unusual fatigue, and weekly headaches that improve away from work.</span></span><a class="workspace-trigger" data-dcnode-id="6167" href="#bib52" name="bbib52"><sup data-dcnode-id="6168"><span data-dcnode-id="6169" instrument_node="">52</span></sup></a><span data-dcnode-id="6162"><span data-dcnode-id="6166" instrument_node=""> However, although this definition may be useful for </span><a class="topic-link" data-dcnode-id="6164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/cohort-effect" title="Learn more about epidemiologic studies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6165" instrument_node="">epidemiologic studies</span></a><span data-dcnode-id="6163" instrument_node="">, it has limited clinical utility because the symptoms are nonspecific. The diagnosis of SBS remains very controversial because of the lack of objective biomarkers relating symptoms with indoor environmental exposures.</span></span></p><p data-dcnode-id="6143" id="para0105"><span data-dcnode-id="6152"><span data-dcnode-id="6160" instrument_node="">Multiple epidemiologic studies have been inconsistent in identifying specific associated factors. Putative factors that may be involved include problems with temperature, humidity control, lighting (glare), sound/vibration, overcrowding, job stress, and job dissatisfaction. Air quality factors may involve inadequate ventilation, poor building maintenance, increased dust, </span><a class="topic-link" data-dcnode-id="6158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/volatile-organic-compound" title="Learn more about volatile organic compounds from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6159" instrument_node="">volatile organic compounds</span></a><span data-dcnode-id="6153"><span data-dcnode-id="6157" instrument_node=""> (eg, new furnishings, photocopy machines), bioaerosols, </span><a class="topic-link" data-dcnode-id="6155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/endotoxin" title="Learn more about endotoxin from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6156" instrument_node="">endotoxin</span></a><span data-dcnode-id="6154" instrument_node="">, and fungal contamination. The lack of consistent findings in these studies suggests that several factors may be responsible for the symptomatic complaints by inhabitants. In 1 study, an attempt was made to look at symptomatic relief using UV germicidal lights to reduce bioaerosol in a putative sick building.</span></span></span><a class="workspace-trigger" data-dcnode-id="6149" href="#bib53" name="bbib53"><sup data-dcnode-id="6150"><span data-dcnode-id="6151" instrument_node="">53</span></sup></a><span data-dcnode-id="6148" instrument_node=""> In this double-blind multiple crossover study design, installed UV irradiation units resulted in a 99% reduction of microbial and endotoxin concentrations on irradiated surfaces. This was associated with an overall mean 20% reduction in work symptoms, 30% reduction in mucosal symptoms, and 40% reduction in respiratory symptoms.</span><a class="workspace-trigger" data-dcnode-id="6145" href="#bib53" name="bbib53"><sup data-dcnode-id="6146"><span data-dcnode-id="6147" instrument_node="">53</span></sup></a><span data-dcnode-id="6144" instrument_node=""> However, the health benefits of central UV systems in homes or office buildings require further investigation.</span></p><p data-dcnode-id="6112" id="para0110"><span data-dcnode-id="6122"><span data-dcnode-id="6134"><span data-dcnode-id="6138"><span data-dcnode-id="6142" instrument_node="">Regardless, whether or not one believes that SBS exists, it is imperative that the allergist/clinical immunologist have a practical approach for evaluating these cases when they present in the outpatient setting. A careful environmental history should be obtained to ascertain details of their exposure and whether other workers are also experiencing similar symptoms. Objective diagnostic tests such as </span><a class="topic-link" data-dcnode-id="6140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/skin-allergy" title="Learn more about allergy skin from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6141" instrument_node="">allergy skin</span></a><span data-dcnode-id="6139" instrument_node=""> testing, </span></span><a class="topic-link" data-dcnode-id="6136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/pulmonary-function-testing" title="Learn more about pulmonary function testing from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6137" instrument_node="">pulmonary function testing</span></a><span data-dcnode-id="6135" instrument_node="">, </span></span><a class="topic-link" data-dcnode-id="6132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/methacholine" title="Learn more about methacholine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6133" instrument_node="">methacholine</span></a><span data-dcnode-id="6123"><span data-dcnode-id="6127"><span data-dcnode-id="6131" instrument_node=""> provocation, and appropriate blood work should be performed to exclude more prevalent and diagnostically accurate conditions such as chronic allergic or </span><a class="topic-link" data-dcnode-id="6129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/vasomotor-rhinitis" title="Learn more about nonallergic rhinitis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6130" instrument_node="">nonallergic rhinitis</span></a><span data-dcnode-id="6128" instrument_node=""> and/or asthma. Finally, other controversial idiopathic syndromes often manifest simultaneously with SBS such as </span></span><a class="topic-link" data-dcnode-id="6125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/chronic-fatigue-syndrome" title="Learn more about chronic fatigue syndrome from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6126" instrument_node="">chronic fatigue syndrome</span></a><span data-dcnode-id="6124" instrument_node=""> and idiopathic environmental intolerance (also known as </span></span></span><span data-dcnode-id="6118"><em data-dcnode-id="6119"><a class="topic-link" data-dcnode-id="6120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/multiple-chemical-sensitivity" title="Learn more about multiple chemical sensitivity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6121" instrument_node="">multiple chemical sensitivity</span></a></em></span><span data-dcnode-id="6113"><span data-dcnode-id="6117" instrument_node="">). These individuals frequently complain of upper and lower respiratory symptoms in addition to neurocognitive problems after exposure to chemical odors and </span><a class="topic-link" data-dcnode-id="6115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/irritant-agent" title="Learn more about irritants from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6116" instrument_node="">irritants</span></a><span data-dcnode-id="6114" instrument_node=""> in and out of the workplace. However, similar to SBS, there are no objective biomarkers available that link environmental exposures with clinical symptoms associated with these syndromes.</span></span></p></section><section data-dcnode-id="5922" id="sec5.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6109"><span data-dcnode-id="6110" instrument_node="">Microbial contamination in damp buildings</span></h3><p data-dcnode-id="6103" id="para0115"><span data-dcnode-id="6108" instrument_node="">Moisture damage and consequent mold contamination have been commonly reported in homes, schools, offices, and hospitals. In addition to mold, yeasts, wood-rotting fungi, and bacteria can grow in moist building materials.</span><a class="workspace-trigger" data-dcnode-id="6105" href="#bib54" name="bbib54"><sup data-dcnode-id="6106"><span data-dcnode-id="6107" instrument_node="">54</span></sup></a><span data-dcnode-id="6104" instrument_node=""> Furthermore, dampness can damage building materials and furnishings, leading to off-gassing of chemicals (eg, formaldehyde) and release of nonbiological particles.</span></p><p data-dcnode-id="6021" id="para0120"><span data-dcnode-id="6102" instrument_node="">Numerous studies conducted worldwide have reported an association between dampness or mold and adverse health effects.</span><a class="workspace-trigger" data-dcnode-id="6100" href="#bib55" name="bbib55"><span data-dcnode-id="6101" instrument_node="">55</span></a><span data-dcnode-id="6099" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6097" href="#bib56" name="bbib56"><span data-dcnode-id="6098" instrument_node="">56</span></a><span data-dcnode-id="6096" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6094" href="#bib57" name="bbib57"><span data-dcnode-id="6095" instrument_node="">57</span></a><span data-dcnode-id="6081"><span data-dcnode-id="6093" instrument_node=""> Moisture and microorganisms in buildings can affect human health by a variety of biological mechanisms, including infections, allergic or </span><a class="topic-link" data-dcnode-id="6091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/hypersensitive-response" title="Learn more about hypersensitivity reactions from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6092" instrument_node="">hypersensitivity reactions</span></a><span data-dcnode-id="6082"><span data-dcnode-id="6086"><span data-dcnode-id="6090" instrument_node="">, and irritant reactions. Allergens, (1-3)-β-D-glucan, mVOCs, and </span><a class="topic-link" data-dcnode-id="6088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/mycotoxin" title="Learn more about mycotoxins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6089" instrument_node="">mycotoxins</span></a><span data-dcnode-id="6087" instrument_node=""> are among the proposed components that may contribute to some these adverse health effects. Fungal allergens are typically proteins or </span></span><a class="topic-link" data-dcnode-id="6084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/glycoprotein" title="Learn more about glycoproteins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6085" instrument_node="">glycoproteins</span></a><span data-dcnode-id="6083" instrument_node=""> that can be structural components of the cell or produced by the cell such as enzymes and metabolic byproducts that are released into the environment.</span></span></span><a class="workspace-trigger" data-dcnode-id="6078" href="#bib58" name="bbib58"><sup data-dcnode-id="6079"><span data-dcnode-id="6080" instrument_node="">58</span></sup></a><span data-dcnode-id="6069"><span data-dcnode-id="6077" instrument_node=""> The release of allergen from </span><a class="topic-link" data-dcnode-id="6075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/bacterial-spore" title="Learn more about spores from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6076" instrument_node="">spores</span></a><span data-dcnode-id="6070"><span data-dcnode-id="6074" instrument_node=""> has been shown to increase during </span><a class="topic-link" data-dcnode-id="6072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/spore-germination" title="Learn more about spore germination from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6073" instrument_node="">spore germination</span></a><span data-dcnode-id="6071" instrument_node="">.</span></span></span><a class="workspace-trigger" data-dcnode-id="6066" href="#bib58" name="bbib58"><sup data-dcnode-id="6067"><span data-dcnode-id="6068" instrument_node="">58</span></sup></a><span data-dcnode-id="6057"><span data-dcnode-id="6061"><span data-dcnode-id="6065" instrument_node=""> (1-3)-β-D-glucan is a biologically active </span><a class="topic-link" data-dcnode-id="6063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/glucose-polymer" title="Learn more about polyglucose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6064" instrument_node="">polyglucose</span></a><span data-dcnode-id="6062" instrument_node=""> molecule composing as much as 60% of the mold cell wall, some </span></span><a class="topic-link" data-dcnode-id="6059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/soil-microflora" title="Learn more about soil bacteria from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6060" instrument_node="">soil bacteria</span></a><span data-dcnode-id="6058" instrument_node="">, and plants.</span></span><a class="workspace-trigger" data-dcnode-id="6054" href="#bib59" name="bbib59"><sup data-dcnode-id="6055"><span data-dcnode-id="6056" instrument_node="">59</span></sup></a><span data-dcnode-id="6049"><span data-dcnode-id="6053" instrument_node=""> Mycotoxins are nonvolatile </span><a class="topic-link" data-dcnode-id="6051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/secondary-metabolite" title="Learn more about secondary metabolites from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6052" instrument_node="">secondary metabolites</span></a><span data-dcnode-id="6050" instrument_node="">.</span></span><a class="workspace-trigger" data-dcnode-id="6046" href="#bib60" name="bbib60"><sup data-dcnode-id="6047"><span data-dcnode-id="6048" instrument_node="">60</span></sup></a><span data-dcnode-id="6041"><span data-dcnode-id="6045" instrument_node=""> Their production may be triggered by competition with other microorganisms or by unfavorable environmental growth conditions, such as nutritional starvation. Allergens, (1-3)-β-D-glucan, and mycotoxins may be dispersed into the air in </span><a class="topic-link" data-dcnode-id="6043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/fungus-spore" title="Learn more about fungal spores from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6044" instrument_node="">fungal spores</span></a><span data-dcnode-id="6042" instrument_node=""> and mycelial cells. Recently it has been shown that these fungal components may also be carried by smaller ultrafine and even nanosize particles called </span></span><em data-dcnode-id="6039"><span data-dcnode-id="6040" instrument_node="">fragments</span></em><span data-dcnode-id="6038" instrument_node="">, which have been shown to contain allergens, mycotoxins, and (1-3)-β-D-glucan.</span><a class="workspace-trigger" data-dcnode-id="6036" href="#bib61" name="bbib61"><span data-dcnode-id="6037" instrument_node="">61</span></a><span data-dcnode-id="6035" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6033" href="#bib62" name="bbib62"><span data-dcnode-id="6034" instrument_node="">62</span></a><span data-dcnode-id="6032" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6030" href="#bib63" name="bbib63"><span data-dcnode-id="6031" instrument_node="">63</span></a><span data-dcnode-id="6029" instrument_node=""> Because of their small size, fungal fragments can stay in the air longer than larger spores with the potential to penetrate deep into the alveolar region when inhaled.</span><a class="workspace-trigger" data-dcnode-id="6026" href="#bib63" name="bbib63"><sup data-dcnode-id="6027"><span data-dcnode-id="6028" instrument_node="">63</span></sup></a><span data-dcnode-id="6025" instrument_node=""> However, studies that demonstrate the relationship between inhaled fungal fragments and clinical disease in humans are lacking.</span><a class="workspace-trigger" data-dcnode-id="6022" href="#bib55" name="bbib55"><sup data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">55</span></sup></a></p><p data-dcnode-id="5994" id="para0125"><span data-dcnode-id="6020" instrument_node="">Allergic reactions caused by microbial agents have been well described.</span><a class="workspace-trigger" data-dcnode-id="6017" href="#bib60" name="bbib60"><sup data-dcnode-id="6018"><span data-dcnode-id="6019" instrument_node="">60</span></sup></a><span data-dcnode-id="6012"><span data-dcnode-id="6016" instrument_node=""> The most common allergic disorders secondary to fungi are </span><a class="topic-link" data-dcnode-id="6014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/allergic-rhinitis" title="Learn more about allergic rhinitis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6015" instrument_node="">allergic rhinitis</span></a><span data-dcnode-id="6013" instrument_node=""> and asthma.</span></span><a class="workspace-trigger" data-dcnode-id="6010" href="#bib56" name="bbib56"><span data-dcnode-id="6011" instrument_node="">56</span></a><span data-dcnode-id="6009" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6007" href="#bib57" name="bbib57"><span data-dcnode-id="6008" instrument_node="">57</span></a><span data-dcnode-id="6006" instrument_node=""> However, sensitization to molds as a result of chronic indoor exposure may not be as common as for other indoor allergens. One study reported only about 5% of students in moisture-damaged schools were allergic to mold.</span><a class="workspace-trigger" data-dcnode-id="6003" href="#bib64" name="bbib64"><sup data-dcnode-id="6004"><span data-dcnode-id="6005" instrument_node="">64</span></sup></a><span data-dcnode-id="5998"><span data-dcnode-id="6002" instrument_node=""> A more recent study evaluating subjects with suspected mold-related health effects also demonstrated that the majority of the individuals were nonatopic; however, the subjects who were sensitized to mold were more likely to be exposed to the specific molds in their </span><a class="topic-link" data-dcnode-id="6000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/indoor-environment" title="Learn more about indoor environment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6001" instrument_node="">indoor environment</span></a><span data-dcnode-id="5999" instrument_node=""> on the basis of mold sampling reports by certified industrial hygienists.</span></span><a class="workspace-trigger" data-dcnode-id="5995" href="#bib65" name="bbib65"><sup data-dcnode-id="5996"><span data-dcnode-id="5997" instrument_node="">65</span></sup></a></p><p data-dcnode-id="5983" id="para0130"><span data-dcnode-id="5989"><span data-dcnode-id="5993" instrument_node="">Glucans can have proinflammatory capabilities and have been suggested to be involved in adverse nonallergenic respiratory health effects. Interestingly, 2 recent studies in school children (5-13 years old) and infants have shown a possible protective effect on atopic </span><a class="topic-link" data-dcnode-id="5991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/wheeze" title="Learn more about wheeze from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5992" instrument_node="">wheeze</span></a><span data-dcnode-id="5990" instrument_node=""> in relation to high (1-3)-β-D-glucan concentrations in house dust.</span></span><a class="workspace-trigger" data-dcnode-id="5987" href="#bib59" name="bbib59"><span data-dcnode-id="5988" instrument_node="">59</span></a><span data-dcnode-id="5986" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5984" href="#bib66" name="bbib66"><span data-dcnode-id="5985" instrument_node="">66</span></a></p><p data-dcnode-id="5923" id="para0135"><span data-dcnode-id="5978"><span data-dcnode-id="5982" instrument_node="">The health effects of fungal toxins in human beings remain highly controversial. Most of the knowledge on the health effects of fungal toxins is gained from agricultural settings and </span><a class="topic-link" data-dcnode-id="5980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/ingestion" title="Learn more about ingestion from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5981" instrument_node="">ingestion</span></a><span data-dcnode-id="5979" instrument_node=""> of contaminated feed by livestock. There are increasing number of case studies that are attempting to establish a possible role of airborne exposure to mycotoxins in mold-contaminated buildings.</span></span><a class="workspace-trigger" data-dcnode-id="5976" href="#bib62" name="bbib62"><span data-dcnode-id="5977" instrument_node="">62</span></a><span data-dcnode-id="5975" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5973" href="#bib67" name="bbib67"><span data-dcnode-id="5974" instrument_node="">67</span></a><span data-dcnode-id="5972" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5970" href="#bib68" name="bbib68"><span data-dcnode-id="5971" instrument_node="">68</span></a><span data-dcnode-id="5969" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5967" href="#bib69" name="bbib69"><span data-dcnode-id="5968" instrument_node="">69</span></a><span data-dcnode-id="5966" instrument_node=""> Mycotoxins produced by </span><span data-dcnode-id="5962"><em data-dcnode-id="5963"><a class="topic-link" data-dcnode-id="5964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/stachybotrys-chartarum" title="Learn more about Stachybotrys chartarum from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5965" instrument_node="">Stachybotrys chartarum</span></a></em></span><span data-dcnode-id="5957"><span data-dcnode-id="5961" instrument_node=""> were implicated in a cluster of acute </span><a class="topic-link" data-dcnode-id="5959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/pulmonary-hemorrhage" title="Learn more about pulmonary hemorrhage from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5960" instrument_node="">pulmonary hemorrhage</span></a><span data-dcnode-id="5958" instrument_node=""> (diffuse bleeding or hemorrhage in the alveoli) cases in infants in Cleveland.</span></span><a class="workspace-trigger" data-dcnode-id="5955" href="#bib68" name="bbib68"><span data-dcnode-id="5956" instrument_node="">68</span></a><span data-dcnode-id="5954" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5952" href="#bib70" name="bbib70"><span data-dcnode-id="5953" instrument_node="">70</span></a><span data-dcnode-id="5951" instrument_node=""> The role of </span><em data-dcnode-id="5949"><span data-dcnode-id="5950" instrument_node="">S chartarum</span></em><span data-dcnode-id="5948" instrument_node=""> in these cases has been extensively debated in the literature and still remains highly controversial because these studies did not directly measure mycotoxins in the air.</span><a class="workspace-trigger" data-dcnode-id="5945" href="#bib71" name="bbib71"><sup data-dcnode-id="5946"><span data-dcnode-id="5947" instrument_node="">71</span></sup></a><span data-dcnode-id="5940"><span data-dcnode-id="5944" instrument_node=""> Acute effects, such as </span><a class="topic-link" data-dcnode-id="5942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/pulmonary-inflammation" title="Learn more about lung inflammation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5943" instrument_node="">lung inflammation</span></a><span data-dcnode-id="5941" instrument_node=""> and hemorrhagic exudates in the alveolar lumina, have been shown in animal studies using high doses of mycotoxin-containing spores.</span></span><a class="workspace-trigger" data-dcnode-id="5937" href="#bib72" name="bbib72"><sup data-dcnode-id="5938"><span data-dcnode-id="5939" instrument_node="">72</span></sup></a><span data-dcnode-id="5936" instrument_node=""> Although a recent review by the United States Institute of Medicine concluded that </span><em data-dcnode-id="5934"><span data-dcnode-id="5935" instrument_node="">in vitro</span></em><span data-dcnode-id="5933" instrument_node=""> and </span><em data-dcnode-id="5931"><span data-dcnode-id="5932" instrument_node="">in vivo</span></em><span data-dcnode-id="5930" instrument_node=""> studies suggest biological plausibility between </span><em data-dcnode-id="5928"><span data-dcnode-id="5929" instrument_node="">S chartarum</span></em><span data-dcnode-id="5927" instrument_node=""> exposure and health effects, more extensive research is needed to clarify this highly controversial area.</span><a class="workspace-trigger" data-dcnode-id="5924" href="#bib55" name="bbib55"><sup data-dcnode-id="5925"><span data-dcnode-id="5926" instrument_node="">55</span></sup></a></p></section></section><section data-dcnode-id="5888" id="sec6"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5919"><span data-dcnode-id="5920" instrument_node="">Current methods for monitoring IAQ</span></h2><p data-dcnode-id="5889" id="para0140"><span data-dcnode-id="5918" instrument_node="">Diagnostic techniques used for IAQ evaluations are usually divided into a qualitative and a quantitative phase.</span><a class="workspace-trigger" data-dcnode-id="5915" href="#bib73" name="bbib73"><sup data-dcnode-id="5916"><span data-dcnode-id="5917" instrument_node="">73</span></sup></a><span data-dcnode-id="5914" instrument_node=""> Instrumentation used during the qualitative IAQ evaluation is limited and is intended primarily to supplement the investigators visual observations. Direct-reading instruments are used to measure relative humidity, room temperature, O</span><sub data-dcnode-id="5912"><span data-dcnode-id="5913" instrument_node="">3</span></sub><span data-dcnode-id="5907"><span data-dcnode-id="5911" instrument_node="">, </span><a class="topic-link" data-dcnode-id="5909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/carbon-monoxide" title="Learn more about CO from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5910" instrument_node="">CO</span></a><span data-dcnode-id="5908" instrument_node="">, CO</span></span><sub data-dcnode-id="5905"><span data-dcnode-id="5906" instrument_node="">2</span></sub><span data-dcnode-id="5904" instrument_node="">, and particulate concentrations. The qualitative evaluation for microbial contaminants includes an assessment of the building and heating, ventilating, and air-conditioning (HVAC) system for water damage and moisture problems, including condensation and the presence of visible mold or musty odors indicative of mVOCs.</span><a class="workspace-trigger" data-dcnode-id="5901" href="#bib26" name="bbib26"><sup data-dcnode-id="5902"><span data-dcnode-id="5903" instrument_node="">26</span></sup></a><span data-dcnode-id="5896"><span data-dcnode-id="5900" instrument_node=""> The qualitative evaluation for </span><a class="topic-link" data-dcnode-id="5898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/volatile-organic-compound" title="Learn more about VOCs from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5899" instrument_node="">VOCs</span></a><span data-dcnode-id="5897" instrument_node=""> includes an observance of odors, building renovation, specialized office equipment, pressed wood products, and cleaning products used.&nbsp;Methodologies for collecting and culturing dust, bulk, and&nbsp;air sampling are discussed in more detail elsewhere.</span></span><a class="workspace-trigger" data-dcnode-id="5894" href="#bib73" name="bbib73"><span data-dcnode-id="5895" instrument_node="">73</span></a><span data-dcnode-id="5893" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5891" href="#bib74" name="bbib74"><span data-dcnode-id="5892" instrument_node="">74</span></a><span data-dcnode-id="5890" instrument_node=""> Environmental testing should be restricted to specific situations that warrant further assessment of the relationship between IAQ and clinical symptoms.</span></p></section><section data-dcnode-id="5846" id="sec7"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5886"><span data-dcnode-id="5887" instrument_node="">How to create a healthier indoor environment</span></h2><section data-dcnode-id="5878" id="sec7.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5884"><span data-dcnode-id="5885" instrument_node="">Building procedures</span></h3><p data-dcnode-id="5879" id="para0145"><span data-dcnode-id="5883" instrument_node="">The allergy specialist should have some familiarity with building a healthy home because patients are frequently presenting with health complaints related to poor IAQ attributed to their home or workplace. The 3 primary considerations in improving IAQ are (1) evaluation of construction failures that allow moisture into the walls of a building, (2) poor ventilation causing excessive humidity and accumulation of gaseous and/or chemical exposure from materials in the living space, and (3) poorly designed or failing HVAC systems that contribute to poor air circulation. An extensive overview of building sciences and the guidelines for new home construction can be found at </span><a data-dcnode-id="5881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.healthhouse.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5882" instrument_node="">http://www.healthhouse.org</span></a><span data-dcnode-id="5880" instrument_node="">. Building a healthy home should take into account costs versus energy savings and improved health outcomes. Further studies are needed to confirm the health benefits of healthy home construction.</span></p></section><section data-dcnode-id="5859" id="sec7.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5876"><span data-dcnode-id="5877" instrument_node="">IAQ standards</span></h3><p data-dcnode-id="5860" id="para0150"><span data-dcnode-id="5875" instrument_node="">In contrast with the industrial workplace setting, quantitative standards for chemical, biological, and particulate exposures as well as ventilation requirements have not been well established and are not routinely monitored. Although some government entities provide guidelines related to IAQ concerns, these generally take the form of recommendations for the control or elimination of sources and strategies for exposure reduction, rather than for achieving pollutant levels below some specific air concentration (</span><a class="workspace-trigger" data-dcnode-id="5873" href="#tbl1" name="btbl1"><span data-dcnode-id="5874" instrument_node="">Table I</span></a><span data-dcnode-id="5872" instrument_node="">). Legislation such as Clean Indoor Air acts ban or restrict smoking in workplaces and in public places and reduce exposures to ETS for workers and patrons.</span><a class="workspace-trigger" data-dcnode-id="5869" href="#bib75" name="bbib75"><sup data-dcnode-id="5870"><span data-dcnode-id="5871" instrument_node="">75</span></sup></a><span data-dcnode-id="5868" instrument_node=""> The Environmental Protection Agencys IAQ Tools for Schools program addresses IAQ management in schools by providing guidance for those aspects of building maintenance, housekeeping, and daily school operations that can influence IAQ, such as the importance of preventing water intrusion; carefully selecting, using, and storing cleaning and pesticide products; and ensuring proper ventilation. This program also provides resources and strategies for remediation of allergen and irritant-induced IAQ problems and strategies to maintain good IAQ over time.</span><a class="workspace-trigger" data-dcnode-id="5865" href="#bib76" name="bbib76"><sup data-dcnode-id="5866"><span data-dcnode-id="5867" instrument_node="">76</span></sup></a><span data-dcnode-id="5864" instrument_node=""> These voluntary programs are gaining widespread acceptance.</span><a class="workspace-trigger" data-dcnode-id="5861" href="#bib76" name="bbib76"><sup data-dcnode-id="5862"><span data-dcnode-id="5863" instrument_node="">76</span></sup></a></p></section><section data-dcnode-id="5847" id="sec7.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5857"><span data-dcnode-id="5858" instrument_node="">Conclusion</span></h3><p data-dcnode-id="5848" id="para0155"><span data-dcnode-id="5856" instrument_node="">This review was prepared with the goal of providing allergists with a balanced perception of indoor pollution and how to apply this information in the evaluation of individual patients who present with suspected symptoms arising from poor IAQ. As the patients foremost advocate, the allergy consultant should be prepared to acquire and maintain expertise in environmental factors that directly affect </span><a class="topic-link" data-dcnode-id="5854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/genetic-susceptibility" title="Learn more about genetic susceptibilities from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5855" instrument_node="">genetic susceptibilities</span></a><span data-dcnode-id="5849"><span data-dcnode-id="5853" instrument_node=""> inherent in </span><a class="topic-link" data-dcnode-id="5851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/allergic-disease" title="Learn more about allergic diseases from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5852" instrument_node="">allergic diseases</span></a><span data-dcnode-id="5850" instrument_node="">. Evaluation of an individual patients exposure also requires that the allergist be familiar with methodologies for monitoring IAQ and interpreting results in the context of the patients exposure history. Finally, the allergist should be informed about existing indoor and outdoor air quality standards with the goal of advising patients about rational environmental control interventions.</span></span></p></section></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="5840"><button class="button button-anchor" data-dcnode-id="5841" type="button"><span class="button-text" data-dcnode-id="5842"><span data-dcnode-id="5843" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="5839"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="611" id="bibliography0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5837"><span data-dcnode-id="5838" instrument_node="">References</ ticle-title ellipsis text-s" data-dcnode-id="605" id="citing-articles-article0-title"><span data-dcnode-id="606" instrument_node="">A systematic review on 2D materials for volatile organic compound sensing</span></h3></a><div class="article-source ellipsis" data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">2022, Coordination Chemistry Reviews</span></div></div><div class="buttons" data-dcnode-id="595"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="596" type="button"><span class="button-link-text" data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="597" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="598"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="587"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="588" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="589"><p data-dcnode-id="590" id="sp0010"><span data-dcnode-id="594" instrument_node="">Volatile organic compounds (VOCs) are organic chemicals that are toxic and detrimental to the human body and the environment. Therefore, a great mandate for the selective as well as sensitive recognition of VOCs, process control, environmental monitoring, and medical diagnosis is necessary. In the last few years, various forms of nanomaterials have been explored for gas and VOCs sensing with the detection on the miniaturized scale using various sensing approaches including optical, chemiresistive, and electrochemical techniques. Two-dimensional (2D) materials have received tremendous attention owing to their unique structure and extraordinary physical as well as chemical properties which make them an attractive platform for numerous applications including electronics, optoelectronics, energy storage and conversion, catalysis, and chemical sensors. 2D-materials offer unique sensing properties with extremely high sensitivity which is particularly important for the detection of toxic pollutants such as nitrogen dioxide (NO</span><sub data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">2</span></sub><span data-dcnode-id="591" instrument_node="">) and toxic VOCs such as benzene and formaldehyde. This review emphasizes the state-of-the-art recent developments in synthesis, VOCs sensing performance and sensing mechanism of numerous 2D-materials including graphene, graphene oxide (GO), graphene nanoplatelets (Gr-NPls), graphene nanosheets (GNs), transition metal dichalcogenides (TMDs), hexagonal boron nitride (h-BN), MXenes, black phosphorus (BP) and graphdiyne etc. A brief descriptions of various synthesis approaches of 2D materials are given along with their fundamental VOCs sensing mechanisms. Finally, the performances of various 2D-materials derived VOC sensors are summarized.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="541"><div class="sub-heading" data-dcnode-id="580"><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0045653522004143" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="584" id="citing-articles-article1-title"><span data-dcnode-id="585" instrument_node="">Sandwich-like photocatalyst MIL-101@TiO&lt;inf&gt;2&lt;/inf&gt;@PDVB with water resistance for efficient oxidation of toluene</span></h3></a><div class="article-source ellipsis" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">2022, Chemosphere</span></div></div><div class="buttons" data-dcnode-id="574"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="575" type="button"><span class="button-link-text" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="576" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="577"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="542"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="543" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="544"><p data-dcnode-id="545" id="abspara0010"><span data-dcnode-id="573" instrument_node="">The coordination of H</span><sub data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">2</span></sub><span data-dcnode-id="570" instrument_node="">O with the metal nodes of MOFs destroys the framework of MOFs, which severely inhibits the application of MOFs in the actual environment. In this work, sandwich-like MIL-101@TiO</span><sub data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">2</span></sub><span data-dcnode-id="567" instrument_node="">@PDVB composite was synthesized by in-situ hydrothermal and thermal deposition methods and used for the photocatalytic oxidation of toluene under high humidity. The result showed that the composite material had outstanding hydrophobic property with a water contact angle of 142.5°. When relative humidity (RH) was 60%, MIL-101@TiO</span><sub data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">2</span></sub><span data-dcnode-id="564" instrument_node="">@PDVB and MIL-101@TiO</span><sub data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">2</span></sub><span data-dcnode-id="561" instrument_node=""> exhibited an excellent photocatalytic activity for toluene degradation. When RH was 90%, the photocatalytic activity of MIL-101@TiO</span><sub data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">2</span></sub><span data-dcnode-id="558" instrument_node=""> was severely inhibited, while MIL-101@TiO</span><sub data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">2</span></sub><span data-dcnode-id="555" instrument_node="">@PDVB showed high resistance to water. The semi-encapsulated form of PDVB effectively resisted the erosion of H</span><sub data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">2</span></sub><span data-dcnode-id="552" instrument_node="">O while providing enough ·OH, and ensured the effective contact between the composites and toluene molecules. MIL-101@TiO</span><sub data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">2</span></sub><span data-dcnode-id="549" instrument_node="">@PDVB also exhibited remarkable adsorption-photocatalytic performance in the degradation of liquid phase organic pollutant. MIL-101@TiO</span><sub data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">2</span></sub><span data-dcnode-id="546" instrument_node="">@PDVB maintained high stability in long-term alkali resistance experiment and cyclic reaction test. This work provided new insights for the preparation of hydrophobic MOFs based functional materials and their applications for photocatalytic purification of VOCs.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="502"><div class="sub-heading" data-dcnode-id="535"><a data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0169433222003713" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="539" id="citing-articles-article2-title"><span data-dcnode-id="540" instrument_node="">Large-sized α-MoO&lt;inf&gt;3&lt;/inf&gt; layered single crystals for superior NO&lt;inf&gt;2&lt;/inf&gt; gas sensing</span></h3></a><div class="article-source ellipsis" data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">2022, Applied Surface Science</span></div></div><div class="buttons" data-dcnode-id="529"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="530" type="button"><span class="button-link-text" data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="531" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="532"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="503"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="504" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="505"><p data-dcnode-id="506" id="sp0015"><span data-dcnode-id="528" instrument_node="">Molybdenum trioxide (MoO</span><sub data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">3</span></sub><span data-dcnode-id="525" instrument_node="">) has attracted considerable research interest due to its unique structural and electronic properties. Herein, we report a monolithic and scalable NO</span><sub data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">2</span></sub><span data-dcnode-id="522" instrument_node=""> gas sensor based on centimeter-sized single-crystalline α-MoO</span><sub data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">3</span></sub><span data-dcnode-id="519" instrument_node=""> synthesized via vapor phase transport method. A combination of advanced characterization probes were utilized to study morphology, composition and crystalline structures of the as-synthesized crystals. At the optimal operating temperature of 100&nbsp;°C, the centimeter-sized α-MoO</span><sub data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">3</span></sub><span data-dcnode-id="516" instrument_node=""> single crystal based sensor shows an outstanding sensitivity towards NO</span><sub data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">2</span></sub><span data-dcnode-id="513" instrument_node=""> with a limit of detection as low as 5&nbsp;ppb, as well as superior selectivity and reversibility. The scalability and the intrinsic sensing response are further demonstrated by microscale sensor devices fabricated on individual exfoliated α-MoO</span><sub data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">3</span></sub><span data-dcnode-id="510" instrument_node=""> nanoribbons. Our study presents promising opportunities to develop a high-performance gas sensing platform based on crystalline α-MoO</span><sub data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">3</span></sub><span data-dcnode-id="507" instrument_node=""> to enable monolithic, scalable and integrable sensing technologies.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="309"><div class="sub-heading" data-dcnode-id="496"><a data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0926337321010523" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="500" id="citing-articles-article3-title"><span data-dcnode-id="501" instrument_node="">High performance ozone decomposition spinel (Mn,Co)&lt;inf&gt;3&lt;/inf&gt;O&lt;inf&gt;4&lt;/inf&gt; catalyst accelerating the rate-determining step</span></h3></a><div class="article-source ellipsis" data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">2022, Applied Catalysis B: Environmental</span></div></div><div class="buttons" data-dcnode-id="490"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="491" type="button"><span class="button-link-text" data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="492" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="493"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="310"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="311" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="312"><p data-dcnode-id="313" id="sp0055"><span data-dcnode-id="489" instrument_node="">At present, it is still a challenge to develop ozone decomposition catalysts with high efficiency and high humidity resistance. Herein, a series of spinel (Mn,Co)</span><sub data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">3</span></sub><span data-dcnode-id="486" instrument_node="">O</span><sub data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">4</span></sub><span data-dcnode-id="483" instrument_node=""> catalysts are synthesized by coprecipitation method. Compared with the Mn</span><sub data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">3</span></sub><span data-dcnode-id="480" instrument_node="">O</span><sub data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">4</span></sub><span data-dcnode-id="477" instrument_node=""> and Co</span><sub data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">3</span></sub><span data-dcnode-id="474" instrument_node="">O</span><sub data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">4</span></sub><span data-dcnode-id="471" instrument_node=""> analogues, the obtained (Mn,Co)</span><sub data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">3</span></sub><span data-dcnode-id="468" instrument_node="">O</span><sub data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">4</span></sub><span data-dcnode-id="465" instrument_node=""> has </span><span class="math" data-dcnode-id="407"><span class="MathJax_Preview" data-dcnode-id="464" style=""></span><span class="MathJax_SVG" data-dcnode-id="410" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><msubsup is=&quot;true&quot;><mrow is=&quot;true&quot;><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>Co</mi></mrow><mrow is=&quot;true&quot;><msup is=&quot;true&quot;><mrow is=&quot;true&quot;><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>Co</mi></mrow><mrow is=&quot;true&quot;><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>III</mi></mrow></msup></mrow><mrow is=&quot;true&quot;><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>II</mi><mo is=&quot;true&quot;>&amp;#xD7;</mo></mrow></msubsup></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="430" focusable="false" height="3.428ex" role="img" style="vertical-align: -1.108ex;" viewBox="0 -999.2 2881.7 1476.1" width="6.693ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="431" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="432" is="true"><g data-dcnode-id="458" is="true"><g data-dcnode-id="459" is="true"><use data-dcnode-id="462" href="#MJMATHI-43"><path d="M50 252Q50 367 117 473T286 641T490 704Q580 704 633 653Q6
