</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id2&quot; lang=&quot;en&quot;><div id=&quot;aep-abstract-sec-id3&quot;><h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot;>Background</h3><p id=&quot;simple-para0015&quot;>There is growing public awareness regarding the risk associated with poor indoor air quality in the home and workplace. Because Americans spend approximately 22 hours every day indoors, susceptible individuals are at much greater risk of adverse health effects from chronic low levels of exposure to indoor air pollutants over time. Along with particulate matter, gases such as ozone, nitrogen dioxide, carbon monoxide, and sulfur dioxide; microbial and chemical volatile organic compounds; passive smoke; and outdoor ambient air are the most common types of air pollutants encountered indoors.</p></div><div id=&quot;aep-abstract-sec-id4&quot;><h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot;>Objective</h3><p id=&quot;simple-para0020&quot;>To provide the allergists with necessary information that will assist them in making useful recommendations to patients seeking advice regarding indoor environmental triggers beyond traditional perennial allergens.</p></div><div id=&quot;aep-abstract-sec-id5&quot;><h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot;>Methods</h3><p id=&quot;simple-para0025&quot;>Review of the literature pertaining to indoor exposure and health effects of gaseous and particular matter.</p></div><div id=&quot;aep-abstract-sec-id6&quot;><h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot;>Results</h3><p id=&quot;simple-para0030&quot;>Indoor pollutants act as respiratory irritants, toxicants, and adjuvants or carriers of allergens.</p></div><div id=&quot;aep-abstract-sec-id7&quot;><h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot;>Conclusion</h3><p id=&quot;simple-para0035&quot;>The allergist should be prepared to evaluate patient exposure to allergic and nonallergic triggers and understand how outdoor air pollution is affecting indoor environments. This requires being familiar with methodologies for monitoring and interpreting indoor air quality and interpreting results in the context of the patients exposure history and advising patients about rational environmental control interventions.</p></div></div></div>" data-dcnode-id="8075" lang="en" name="citation_abstract"><span data-dcnode-id="8074" instrument_node="">

" data-dcnode-id="7366" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="7369" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="7370" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="7367"><span data-dcnode-id="7368" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="7356" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="7359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.jaci.2007.10.045" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="7360" instrument_node="">https://doi.org/10.1016/j.jaci.2007.10.045</span></a><a class="rights-and-content" data-dcnode-id="7357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0091674907022099%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7358" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="7355"></section><section class="ReferencedArticles" data-dcnode-id="7354"></section><div class="PageDivider" data-dcnode-id="7353"></div><div class="Abstracts u-font-serif" data-dcnode-id="7301" id="abstracts"><div class="abstract author" data-dcnode-id="7302" id="aep-abstract-id2" lang="en"><div data-dcnode-id="7329" id="aep-abstract-sec-id3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7351"><span data-dcnode-id="7352" instrument_node="">Background</span></h3><p data-dcnode-id="7330" id="simple-para0015"><span data-dcnode-id="7350" instrument_node="">There is growing public awareness regarding the risk associated with poor indoor air quality in the home and workplace. Because Americans spend approximately 22 hours every day indoors, susceptible individuals are at much greater risk of adverse health effects from chronic low levels of exposure to indoor air pollutants over time. Along with </span><a class="topic-link" data-dcnode-id="7348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/particulate-matter" title="Learn more about particulate matter from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7349" instrument_node="">particulate matter</span></a><span data-dcnode-id="7331"><span data-dcnode-id="7343"><span data-dcnode-id="7347" instrument_node="">, gases such as ozone, </span><a class="topic-link" data-dcnode-id="7345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/nitrogen-dioxide" title="Learn more about nitrogen dioxide from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7346" instrument_node="">nitrogen dioxide</span></a><span data-dcnode-id="7344" instrument_node="">, </span></span><a class="topic-link" data-dcnode-id="7341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/carbon-monoxide" title="Learn more about carbon monoxide from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7342" instrument_node="">carbon monoxide</span></a><span data-dcnode-id="7332"><span data-dcnode-id="7336"><span data-dcnode-id="7340" instrument_node="">, and </span><a class="topic-link" data-dcnode-id="7338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/sulfur-dioxide" title="Learn more about sulfur dioxide from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7339" instrument_node="">sulfur dioxide</span></a><span data-dcnode-id="7337" instrument_node="">; microbial and chemical </span></span><a class="topic-link" data-dcnode-id="7334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/volatile-organic-compound" title="Learn more about volatile organic compounds from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7335" instrument_node="">volatile organic compounds</span></a><span data-dcnode-id="7333" instrument_node="">; passive smoke; and outdoor ambient air are the most common types of air pollutants encountered indoors.</span></span></span></p></div><div data-dcnode-id="7324" id="aep-abstract-sec-id4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7327"><span data-dcnode-id="7328" instrument_node="">Objective</span></h3><p data-dcnode-id="7325" id="simple-para0020"><span data-dcnode-id="7326" instrument_node="">To provide the allergists with necessary information that will assist them in making useful recommendations to patients seeking advice regarding indoor environmental triggers beyond traditional perennial allergens.</span></p></div><div data-dcnode-id="7319" id="aep-abstract-sec-id5"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7322"><span data-dcnode-id="7323" instrument_node="">Methods</span></h3><p data-dcnode-id="7320" id="simple-para0025"><span data-dcnode-id="7321" instrument_node="">Review of the literature pertaining to indoor exposure and health effects of gaseous and particular matter.</span></p></div><div data-dcnode-id="7311" id="aep-abstract-sec-id6"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7317"><span data-dcnode-id="7318" instrument_node="">Results</span></h3><p data-dcnode-id="7312" id="simple-para0030"><span data-dcnode-id="7316" instrument_node="">Indoor pollutants act as respiratory </span><a class="topic-link" data-dcnode-id="7314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/irritant-agent" title="Learn more about irritants from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7315" instrument_node="">irritants</span></a><span data-dcnode-id="7313" instrument_node="">, toxicants, and adjuvants or carriers of allergens.</span></p></div><div data-dcnode-id="7303" id="aep-abstract-sec-id7"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7309"><span data-dcnode-id="7310" instrument_node="">Conclusion</span></h3><p data-dcnode-id="7304" id="simple-para0035"><span data-dcnode-id="7308" instrument_node="">The allergist should be prepared to evaluate patient exposure to allergic and nonallergic triggers and understand how outdoor air pollution is affecting </span><a class="topic-link" data-dcnode-id="7306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/indoor-environment" title="Learn more about indoor environments from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7307" instrument_node="">indoor environments</span></a><span data-dcnode-id="7305" instrument_node="">. This requires being familiar with methodologies for monitoring and interpreting indoor air quality and interpreting results in the context of the patients exposure history and advising patients about rational environmental control interventions.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="7278" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="7290"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="7291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirec ><span data-dcnode-id="7235"><span data-dcnode-id="7236" instrument_node="">ETS</span></span><div class="keyword" data-dcnode-id="7232"><span data-dcnode-id="7233"><span data-dcnode-id="7234" instrument_node="">Environmental tobacco smoke</span></span></div></div><div class="keyword" data-dcnode-id="7225"><span data-dcnode-id="7229"><span data-dcnode-id="7230" instrument_node="">IAQ</span></span><div class="keyword" data-dcnode-id="7226"><span data-dcnode-id="7227"><span data-dcnode-id="7228" instrument_node="">Indoor air quality</span></span></div></div><div class="keyword" data-dcnode-id="7219"><span data-dcnode-id="7223"><span data-dcnode-id="7224" instrument_node="">mVOC</span></span><div class="keyword" data-dcnode-id="7220"><span data-dcnode-id="7221"><span data-dcnode-id="7222" instrument_node="">Microbial volatile organic compound</span></span></div></div><div class="keyword" data-dcnode-id="7213"><span data-dcnode-id="7217"><span data-dcnode-id="7218" instrument_node="">PM</span></span><div class="keyword" data-dcnode-id="7214"><span data-dcnode-id="7215"><span data-dcnode-id="7216" instrument_node="">Particulate matter</span></span></div></div><div class="keyword" data-dcnode-id="7207"><span data-dcnode-id="7211"><span data-dcnode-id="7212" instrument_node="">SBS</span></span><div class="keyword" data-dcnode-id="7208"><span data-dcnode-id="7209"><span data-dcnode-id="7210" instrument_node="">Sick building syndrome</span></span></div></div><div class="keyword" data-dcnode-id="7201"><span data-dcnode-id="7205"><span data-dcnode-id="7206" instrument_node="">TVOC</span></span><div class="keyword" data-dcnode-id="7202"><span data-dcnode-id="7203"><span data-dcnode-id="7204" instrument_node="">Total volatile organic compound</span></span></div></div><div class="keyword" data-dcnode-id="7195"><span data-dcnode-id="7199"><span data-dcnode-id="7200" instrument_node="">VOC</span></span><div class="keyword" data-dcnode-id="7196"><span data-dcnode-id="7197"><span data-dcnode-id="7198" instrument_node="">Volatile organic compound</span></span></div></div></div></div><span data-dcnode-id="7192" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="5844" id="body"><div data-dcnode-id="5845"><div data-dcnode-id="6888"><p data-dcnode-id="7141" id="para0005"><span data-dcnode-id="7191" instrument_node="">Recently the health effects of outdoor air pollution were reviewed in detail.</span><a class="workspace-trigger" data-dcnode-id="7188" href="#bib1" name="bbib1"><sup data-dcnode-id="7189"><span data-dcnode-id="7190" instrument_node="">1</span></sup></a><span data-dcnode-id="7183"><span data-dcnode-id="7187" instrument_node=""> There is growing public awareness regarding the risk associated with poor indoor air quality (IAQ) in the home and workplace. Because Americans spend approximately 22 hours every day indoors, susceptible individuals are at much greater risk of adverse health effects from chronic low levels of exposure to indoor air pollutants over time. Along with </span><a class="topic-link" data-dcnode-id="7185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/particulate-matter" title="Learn more about particulate matter from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7186" instrument_node="">particulate matter</span></a><span data-dcnode-id="7184" instrument_node=""> (PM), gases such as ozone (O</span></span><sub data-dcnode-id="7181"><span data-dcnode-id="7182" instrument_node="">3</span></sub><span data-dcnode-id="7176"><span data-dcnode-id="7180" instrument_node="">), </span><a class="topic-link" data-dcnode-id="7178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/nitrogen-dioxide" title="Learn more about nitrogen dioxide from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7179" instrument_node="">nitrogen dioxide</span></a><span data-dcnode-id="7177" instrument_node=""> (NO</span></span><sub data-dcnode-id="7174"><span data-dcnode-id="7175" instrument_node="">2</span></sub><span data-dcnode-id="7165"><span data-dcnode-id="7173" instrument_node="">), </span><a class="topic-link" data-dcnode-id="7171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/carbon-monoxide" title="Learn more about carbon monoxide from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7172" instrument_node="">carbon monoxide</span></a><span data-dcnode-id="7166"><span data-dcnode-id="7170" instrument_node=""> (CO), and </span><a class="topic-link" data-dcnode-id="7168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/sulfur-dioxide" title="Learn more about sulfur dioxide from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7169" instrument_node="">sulfur dioxide</span></a><span data-dcnode-id="7167" instrument_node=""> (SO</span></span></span><sub data-dcnode-id="7163"><span data-dcnode-id="7164" instrument_node="">2</span></sub><span data-dcnode-id="7158"><span data-dcnode-id="7162" instrument_node="">); microbial and chemical </span><a class="topic-link" data-dcnode-id="7160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/volatile-organic-compound" title="Learn more about volatile organic compounds from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7161" instrument_node="">volatile organic compounds</span></a><span data-dcnode-id="7159" instrument_node=""> (VOCs); and passive smoke are the most common types of air pollutants encountered indoors. A major limitation of understanding the adverse health effects of&nbsp;these specific air pollutants is the inability directly to equate measurable ambient air concentrations to personal exposure. To complicate matters, in the nonoccupational indoor setting, environmental exposures are often more subtle and not readily recognized. In the most extreme cases, controversial terms like </span></span><span data-dcnode-id="7154"><em data-dcnode-id="7155"><a class="topic-link" data-dcnode-id="7156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/sick-building-syndrome" title="Learn more about sick building syndrome from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7157" instrument_node="">sick building syndrome</span></a></em></span><span data-dcnode-id="7153" instrument_node=""> (SBS), </span><em data-dcnode-id="7151"><span data-dcnode-id="7152" instrument_node="">toxic mold syndrome</span></em><span data-dcnode-id="7150" instrument_node="">, and </span><span data-dcnode-id="7146"><em data-dcnode-id="7147"><a class="topic-link" data-dcnode-id="7148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/multiple-chemical-sensitivity" title="Learn more about multiple chemical sensitivity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7149" instrument_node="">multiple chemical sensitivity</span></a></em></span><span data-dcnode-id="7145" instrument_node=""> have been coined for lack of a better way to characterize unexplained constellation of symptoms that are attributed to some exposure in the home or nonindustrial occupational setting. Furthermore, very little information is available regarding permissible exposure levels for the home or nonindustrial workplace for known indoor air pollutants. Many experts recommend indoor air pollutant levels be maintained at 50% or&nbsp;less than the National Ambient Air Quality Standards for outdoor air pollutants established by the Environmental Protection Agency (</span><a class="workspace-trigger" data-dcnode-id="7143" href="#tbl1" name="btbl1"><span data-dcnode-id="7144" instrument_node="">Table I</span></a><span data-dcnode-id="7142" instrument_node="">). This review attempts to provide allergists with necessary information that will assist them in making useful recommendations to patients seeking advice regarding indoor environmental triggers beyond traditional perennial allergens.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6889" id="tbl1"><span class="captions" data-dcnode-id="7129"><span data-dcnode-id="7130"><p data-dcnode-id="7131" id="simple-para0005"><span class="label" data-dcnode-id="7139"><span data-dcnode-id="7140" instrument_node="">Table I</span></span><span data-dcnode-id="7138" instrument_node="">. </span><span data-dcnode-id="7137" instrument_node="">National Ambient Air Quality Standards (adapted from </span><a data-dcnode-id="7135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.epa.gov/air/criteria.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7136" instrument_node="">http://www.epa.gov/air/criteria.html</span></a><span data-dcnode-id="7134" instrument_node="">)</span><a class="workspace-trigger" data-dcnode-id="7132" href="#tblfn1" name="btblfn1"><span data-dcnode-id="7133" instrument_node="">∗</span></a></p></span></span><div class="groups" data-dcnode-id="6961"><table data-dcnode-id="6962"><thead data-dcnode-id="7119"><tr class="rowsep-1" data-dcnode-id="7120"><th data-dcnode-id="7127" scope="col"><span data-dcnode-id="7128" instrument_node="">Pollutant</span></th><th data-dcnode-id="7125" scope="col"><span data-dcnode-id="7126" instrument_node="">Primary standards</span></th><th data-dcnode-id="7123" scope="col"><span data-dcnode-id="7124" instrument_node="">Averaging times</span></th><th data-dcnode-id="7121" scope="col"><span data-dcnode-id="7122" instrument_node="">Secondary standards</span></th></tr></thead><tbody data-dcnode-id="6963"><tr class="valign-top" data-dcnode-id="7105"><td data-dcnode-id="7117"><span data-dcnode-id="7118" instrument_node="">CO</span></td><td data-dcnode-id="7112"><span data-dcnode-id="7116" instrument_node="">9 ppm (10 mg/m</span><sup data-dcnode-id="7114"><span data-dcnode-id="7115" instrument_node="">3</span></sup><span data-dcnode-id="7113" instrument_node="">)</span></td><td data-dcnode-id="7108"><span data-dcnode-id="7111" instrument_node="">8-Hour</span><a class="workspace-trigger" data-dcnode-id="7109" href="#tblfn2" name="btblfn2"><span data-dcnode-id="7110" instrument_node="">†</span></a></td><td data-dcnode-id="7106"><span data-dcnode-id="7107" instrument_node="">None</span></td></tr><tr class="valign-top" data-dcnode-id="7092"><td data-dcnode-id="7104"></td><td data-dcnode-id="7099"><span data-dcnode-id="7103" instrument_node="">35 ppm (40 mg/m</span><sup data-dcnode-id="7101"><span data-dcnode-id="7102" instrument_node="">3</span></sup><span data-dcnode-id="7100" instrument_node="">)</span></td><td data-dcnode-id="7095"><span data-dcnode-id="7098" instrument_node="">1-Hour</span><a class="workspace-trigger" data-dcnode-id="7096" href="#tblfn2" name="btblfn2"><span data-dcnode-id="7097" instrument_node="">†</span></a></td><td data-dcnode-id="7093"><span data-dcnode-id="7094" instrument_node="">None</span></td></tr><tr class="valign-top" data-dcnode-id="7078"><td data-dcnode-id="7088"><span data-dcnode-id="7091" instrument_node="">NO</span><sub data-dcnode-id="7089"><span data-dcnode-id="7090" instrument_node="">2</span></sub></td><td data-dcnode-id="7083"><span data-dcnode-id="7087" instrument_node="">0.053 ppm (100 μg/m</span><sup data-dcnode-id="7085"><span data-dcnode-id="7086" instrument_node="">3</span></sup><span data-dcnode-id="7084" instrument_node="">)</span></td><td data-dcnode-id="7081"><span data-dcnode-id="7082" instrument_node="">Annual (arithmetic mean)</span></td><td data-dcnode-id="7079"><span data-dcnode-id="7080" instrument_node="">Same as primary</span></td></tr><tr class="valign-top" data-dcnode-id="7060"><td data-dcnode-id="7074"><span data-dcnode-id="7077" instrument_node="">PM</span><sub data-dcnode-id="7075"><span data-dcnode-id="7076" instrument_node="">10</span></sub></td><td data-dcnode-id="7070"><span data-dcnode-id="7073" instrument_node="">Revoked</span><sup data-dcnode-id="7071"><span data-dcnode-id="7072" instrument_node="">‡</span></sup></td><td data-dcnode-id="7065"><span data-dcnode-id="7069" instrument_node="">Annual</span><a class="workspace-trigger" data-dcnode-id="7067" href="#tblfn3" name="btblfn3"><span data-dcnode-id="7068" instrument_node="">‡</span></a><span data-dcnode-id="7066" instrument_node=""> (arithmetic mean)</span></td><td data-dcnode-id="7061"><span data-dcnode-id="7064" instrument_node="">Revoked</span><a class="workspace-trigger" data-dcnode-id="7062" href="#tblfn3" name="btblfn3"><span data-dcnode-id="7063" instrument_node="">‡</span></a></td></tr><tr class="valign-top" data-dcnode-id="7048"><td data-dcnode-id="7059"></td><td data-dcnode-id="7055"><span data-dcnode-id="7058" instrument_node="">150 μg/m</span><sup data-dcnode-id="7056"><span data-dcnode-id="7057" instrument_node="">3</span></sup></td><td data-dcnode-id="7051"><span data-dcnode-id="7054" instrument_node="">24-Hour</span><a class="workspace-trigger" data-dcnode-id="7052" href="#tblfn4" name="btblfn4"><span data-dcnode-id="7053" instrument_node="">§</span></a></td><td data-dcnode-id="7049"><span data-dcnode-id="7050" instrument_node="">Same as primary</span></td></tr><tr class="valign-top" data-dcnode-id="7032"><td data-dcnode-id="7044"><span data-dcnode-id="7047" instrument_node="">PM</span><sub data-dcnode-id="7045"><span data-dcnode-id="7046" instrument_node="">2.5</span></sub></td><td data-dcnode-id="7040"><span data-dcnode-id="7043" instrument_node="">15.0 μg/m</span><sup data-dcnode-id="7041"><span data-dcnode-id="7042" instrument_node="">3</span></sup></td><td data-dcnode-id="7035"><span data-dcnode-id="7039" instrument_node="">Annual</span><a class="workspace-trigger" data-dcnode-id="7037" href="#tblfn5" name="btblfn5"><span data-dcnode-id="7038" instrument_node="">‖</span></a><span data-dcnode-id="7036" instrument_node=""> (arithmetic mean)</span></td><td data-dcnode-id="7033"><span data-dcnode-id="7034" instrument_node="">Same as primary</span></td></tr><tr class="valign-top" data-dcnode-id="7020"><td data-dcnode-id="7031"></td><td data-dcnode-id="7027"><span data-dcnode-id="7030" instrument_node="">35 μg/m</span><sup data-dcnode-id="7028"><span data-dcnode-id="7029" instrument_node="">3</span></sup></td><td data-dcnode-id="7023"><span data-dcnode-id="7026" instrument_node="">24-Hour</span><a class="workspace-trigger" data-dcnode-id="7024" href="#tblfn6" name="btblfn6"><span data-dcnode-id="7025" instrument_node="">¶</span></a></td><td data-dcnode-id="7021"><span data-dcnode-id="7022" instrument_node="">Same as primary</span></td></tr><tr class="valign-top" data-dcnode-id="7007"><td data-dcnode-id="7016"><span data-dcnode-id="7019" instrument_node="">O</span><sub data-dcnode-id="7017"><span data-dcnode-id="7018" instrument_node="">3</span></sub></td><td data-dcnode-id="7014"><span data-dcnode-id="7015" instrument_node="">0.08 ppm</span></td><td data-dcnode-id="7010"><span data-dcnode-id="7013" instrument_node="">8-Hour</span><a class="workspace-trigger" data-dcnode-id="7011" href="#tblfn7" name="btblfn7"><span data-dcnode-id="7012" instrument_node="">#</span></a></td><td data-dcnode-id="7008"><span data-dcnode-id="7009" instrument_node="">Same as primary</span></td></tr><tr class="valign-top" data-dcnode-id="6996"><td data-dcnode-id="7006"></td><td data-dcnode-id="7004"><span data-dcnode-id="7005" instrument_node="">0.12 ppm</span></td><td data-dcnode-id="6999"><span data-dcnode-id="7003" instrument_node="">1-Hour</span><a class="workspace-trigger" data-dcnode-id="7001" href="#tblfn8" name="btblfn8"><span data-dcnode-id="7002" instrument_node="">∗∗</span></a><span data-dcnode-id="7000" instrument_node=""> (applies only in limited areas)</span></td><td data-dcnode-id="6997"><span data-dcnode-id="6998" instrument_node="">Same as primary</span></td></tr><tr class="valign-top" data-dcnode-id="6987"><td data-dcnode-id="6994"><span data-dcnode-id="6995" instrument_node="">Sulfur oxides</span></td><td data-dcnode-id="6992"><span data-dcnode-id="6993" instrument_node="">0.03 ppm</span></td><td data-dcnode-id="6990"><span data-dcnode-id="6991" instrument_node="">Annual (arithmetic mean)</span></td><td data-dcnode-id="6988"><span data-dcnode-id="6989" instrument_node="">—</span></td></tr><tr class="valign-top" data-dcnode-id="6977"><td data-dcnode-id="6986"></td><td data-dcnode-id="6984"><span data-dcnode-id="6985" instrument_node="">0.14 ppm</span></td><td data-dcnode-id="6980"><span data-dcnode-id="6983" instrument_node="">24-hour</span><a class="workspace-trigger" data-dcnode-id="6981" href="#tblfn2" name="btblfn2"><span data-dcnode-id="6982" instrument_node="">†</span></a></td><td data-dcnode-id="6978"><span data-dcnode-id="6979" instrument_node="">—</span></td></tr><tr class="valign-top" data-dcnode-id="6964"><td data-dcnode-id="6976"></td><td data-dcnode-id="6974"><span data-dcnode-id="6975" instrument_node="">—</span></td><td data-dcnode-id="6970"><span data-dcnode-id="6973" instrument_node="">3-hour</span><a class="workspace-trigger" data-dcnode-id="6971" href="#tblfn2" name="btblfn2"><span data-dcnode-id="6972" instrument_node="">†</span></a></td><td data-dcnode-id="6965"><span data-dcnode-id="6969" instrument_node="">0.5 ppm (1300 μg/m</span><sup data-dcnode-id="6967"><span data-dcnode-id="6968" instrument_node="">3</span></sup><span data-dcnode-id="6966" instrument_node="">)</span></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="6890"><dt data-dcnode-id="6959" id="tblfn1"><span data-dcnode-id="6960" instrument_node="">∗</span></dt><dd data-dcnode-id="6947"><p data-dcnode-id="6948"><em data-dcnode-id="6957"><span data-dcnode-id="6958" instrument_node="">Primary standards</span></em><span data-dcnode-id="6956" instrument_node="">, limits set to protect public health, especially sensitive subpopulations such as patients with asthma, the elderly, and children. </span><em data-dcnode-id="6954"><span data-dcnode-id="6955" instrument_node="">Secondary standards</span></em><span data-dcnode-id="6949"><span data-dcnode-id="6953" instrument_node="">, limits set to protect public welfare such as visibility and damage to crops, animals, and buildings. Levels for </span><a class="topic-link" data-dcnode-id="6951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/volatile-organic-compound" title="Learn more about VOCs from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6952" instrument_node="">VOCs</span></a><span data-dcnode-id="6950" instrument_node=""> have not been established.</span></span></p></dd><dt data-dcnode-id="6945" id="tblfn2"><span data-dcnode-id="6946" instrument_node="">†</span></dt><dd data-dcnode-id="6942"><p data-dcnode-id="6943"><span data-dcnode-id="6944" instrument_node="">Not to be exceeded more than once per year.</span></p></dd><dt data-dcnode-id="6940" id="tblfn3"><span data-dcnode-id="6941" instrument_node="">‡</span></dt><dd data-dcnode-id="6934"><p data-dcnode-id="6935"><span data-dcnode-id="6939" instrument_node="">Because of a lack of evidence linking health problems to long-term exposure to coarse particle pollution, the agency revoked the annual PM</span><sub data-dcnode-id="6937"><span data-dcnode-id="6938" instrument_node="">10</span></sub><span data-dcnode-id="6936" instrument_node=""> standard in 2006 (effective December 17, 2006).</span></p></dd><dt data-dcnode-id="6932" id="tblfn4"><span data-dcnode-id="6933" instrument_node="">§</span></dt><dd data-dcnode-id="6929"><p data-dcnode-id="6930"><span data-dcnode-id="6931" instrument_node="">Not to be exceeded more than once per year on average over a period of 3 years.</span></p></dd><dt data-dcnode-id="6927" id="tblfn5"><span data-dcnode-id="6928" instrument_node="">‖</span></dt><dd data-dcnode-id="6918"><p data-dcnode-id="6919"><span data-dcnode-id="6926" instrument_node="">To attain this standard, the 3-year average of the weighted annual mean PM</span><sub data-dcnode-id="6924"><span data-dcnode-id="6925" instrument_node="">2.5</span></sub><span data-dcnode-id="6923" instrument_node=""> concentrations from single or multiple community-oriented monitors must not exceed 15.0 μg/m</span><sup data-dcnode-id="6921"><span data-dcnode-id="6922" instrument_node="">3</span></sup><span data-dcnode-id="6920" instrument_node="">.</span></p></dd><dt data-dcnode-id="6916" id="tblfn6"><span data-dcnode-id="6917" instrument_node="">¶</span></dt><dd data-dcnode-id="6910"><p data-dcnode-id="6911"><span data-dcnode-id="6915" instrument_node="">To attain this standard, the 3-year average of the 98th percentile of 24-hour concentrations at each population-oriented monitor within an area must not exceed 35 μg/m</span><sup data-dcnode-id="6913"><span data-dcnode-id="6914" instrument_node="">3</span></sup><span data-dcnode-id="6912" instrument_node=""> (effective December 17, 2006).</span></p></dd><dt data-dcnode-id="6908" id="tblfn7"><span data-dcnode-id="6909" instrument_node="">#</span></dt><dd data-dcnode-id="6902"><p data-dcnode-id="6903"><span data-dcnode-id="6907" instrument_node="">To attain this standard, the 3-year average of the fourth-highest daily maximum 8-hour average O</span><sub data-dcnode-id="6905"><span data-dcnode-id="6906" instrument_node="">3</span></sub><span data-dcnode-id="6904" instrument_node=""> concentrations measured at each monitor within an area over each year must not exceed 0.08 ppm.</span></p></dd><dt data-dcnode-id="6900" id="tblfn8"><span data-dcnode-id="6901" instrument_node="">∗∗</span></dt><dd data-dcnode-id="6891"><p data-dcnode-id="6892"><span data-dcnode-id="6899" instrument_node="">(1) The standard is attained when the expected number of days per calendar year with maximum hourly average concentrations above 0.12 ppm is ≤1. (2) As of June 15, 2005, the Environmental Protection Agency revoked the 1-hour O</span><sub data-dcnode-id="6897"><span data-dcnode-id="6898" instrument_node="">3</span></sub><span data-dcnode-id="6896" instrument_node=""> standard in all areas except the fourteen 8-hour O</span><sub data-dcnode-id="6894"><span data-dcnode-id="6895" instrument_node="">3</span></sub><span data-dcnode-id="6893" instrument_node=""> nonattainment Early Action Compact (EAC) areas.</span></p></dd></dl></div></div><section data-dcnode-id="6370" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6886"><span data-dcnode-id="6887" instrument_node="">Specific indoor air pollutants</span></h2><section data-dcnode-id="6816" id="sec2.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6882"><span data-dcnode-id="6885" instrument_node="">O</span><sub data-dcnode-id="6883"><span data-dcnode-id="6884" instrument_node="">3</span></sub></h3><p data-dcnode-id="6817" id="para0010"><span data-dcnode-id="6881" instrument_node="">Acute exposure to O</span><sub data-dcnode-id="6879"><span data-dcnode-id="6880" instrument_node="">3</span></sub><span data-dcnode-id="6874"><span data-dcnode-id="6878" instrument_node=""> produces decrements in pulmonary function and exercise capacity and induces </span><a class="topic-link" data-dcnode-id="6876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/respiratory-tract-inflammation" title="Learn more about airways inflammation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6877" instrument_node="">airways inflammation</span></a><span data-dcnode-id="6875" instrument_node=""> in both healthy individuals and those with pre-existing airways disease (ie, asthma, chronic obstructive pulmonary disease).</span></span><a class="workspace-trigger" data-dcnode-id="6872" href="#bib2" name="bbib2"><span data-dcnode-id="6873" instrument_node="">2</span></a><span data-dcnode-id="6871" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6869" href="#bib3" name="bbib3"><span data-dcnode-id="6870" instrument_node="">3</span></a><span data-dcnode-id="6868" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6866" href="#bib4" name="bbib4"><span data-dcnode-id="6867" instrument_node="">4</span></a><span data-dcnode-id="6865" instrument_node=""> In individuals with allergy, O</span><sub data-dcnode-id="6863"><span data-dcnode-id="6864" instrument_node="">3</span></sub><span data-dcnode-id="6858"><span data-dcnode-id="6862" instrument_node=""> acts as an adjuvant, enhancing the </span><a class="topic-link" data-dcnode-id="6860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/hypersensitive-response" title="Learn more about allergic response from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6861" instrument_node="">allergic response</span></a><span data-dcnode-id="6859" instrument_node=""> to inhaled allergen.</span></span><a class="workspace-trigger" data-dcnode-id="6855" href="#bib5" name="bbib5"><sup data-dcnode-id="6856"><span data-dcnode-id="6857" instrument_node="">5</span></sup></a><span data-dcnode-id="6850"><span data-dcnode-id="6854" instrument_node=""> Interactions between ozone and </span><a class="topic-link" data-dcnode-id="6852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/particulate-matter" title="Learn more about particulate matter from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6853" instrument_node="">particulate matter</span></a><span data-dcnode-id="6851" instrument_node=""> in office settings has also been reported.</span></span><a class="workspace-trigger" data-dcnode-id="6847" href="#bib6" name="bbib6"><sup data-dcnode-id="6848"><span data-dcnode-id="6849" instrument_node="">6</span></sup></a><span data-dcnode-id="6846" instrument_node=""> O</span><sub data-dcnode-id="6844"><span data-dcnode-id="6845" instrument_node="">3</span></sub><span data-dcnode-id="6843" instrument_node="">-induced health effects are dependent on the dose and concentration of O</span><sub data-dcnode-id="6841"><span data-dcnode-id="6842" instrument_node="">3</span></sub><span data-dcnode-id="6836"><span data-dcnode-id="6840" instrument_node=""> deposited in the lung and the individuals </span><a class="topic-link" data-dcnode-id="6838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/lung-ventilation" title="Learn more about ventilation rate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6839" instrument_node="">ventilation rate</span></a><span data-dcnode-id="6837" instrument_node=""> and duration of exposure. Main sources of indoor O</span></span><sub data-dcnode-id="6834"><span data-dcnode-id="6835" instrument_node="">3</span></sub><span data-dcnode-id="6833" instrument_node=""> are from outdoor O</span><sub data-dcnode-id="6831"><span data-dcnode-id="6832" instrument_node="">3</span></sub><span data-dcnode-id="6826"><span data-dcnode-id="6830" instrument_node=""> resources as well as </span><a class="topic-link" data-dcnode-id="6828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/air-purifier" title="Learn more about air purifiers from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6829" instrument_node="">air purifiers</span></a><span data-dcnode-id="6827" instrument_node=""> (electrostatic precipitators, negative ion generators, and ozone generators), which are marketed to the public to provide relief from numerous respiratory ailments as well as to reduce odors and destroy microbes. These devices have been shown to increase indoor O</span></span><sub data-dcnode-id="6824"><span data-dcnode-id="6825" instrument_node="">3</span></sub><span data-dcnode-id="6823" instrument_node=""> concentrations in the range of 16 to 453 ppb.</span><a class="workspace-trigger" data-dcnode-id="6821" href="#bib7" name="bbib7"><span data-dcnode-id="6822" instrument_node="">7</span></a><span data-dcnode-id="6820" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6818" href="#bib8" name="bbib8"><span data-dcnode-id="6819" instrument_node="">8</span></a></p></section><section data-dcnode-id="6748" id="sec2.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6812"><span data-dcnode-id="6815" instrument_node="">NO</span><sub data-dcnode-id="6813"><span data-dcnode-id="6814" instrument_node="">2</span></sub></h3><p data-dcnode-id="6749" id="para0015"><span data-dcnode-id="6811" instrument_node="">Because more than half of all households in the United States use gas, the primary source of indoor NO</span><sub data-dcnode-id="6809"><span data-dcnode-id="6810" instrument_node="">2</span></sub><span data-dcnode-id="6808" instrument_node=""> is gas-fueled cooking and heating appliances. An extensive literature has examined the link between NO</span><sub data-dcnode-id="6806"><span data-dcnode-id="6807" instrument_node="">2</span></sub><span data-dcnode-id="6793"><span data-dcnode-id="6805" instrument_node=""> exposure and duration causing adverse </span><a class="topic-link" data-dcnode-id="6803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/respiratory-physiology" title="Learn more about respiratory effects from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6804" instrument_node="">respiratory effects</span></a><span data-dcnode-id="6794"><span data-dcnode-id="6802" instrument_node=""> in </span><a class="topic-link" data-dcnode-id="6800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/susceptible-population" title="Learn more about susceptible populations from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6801" instrument_node="">susceptible populations</span></a><span data-dcnode-id="6795"><span data-dcnode-id="6799" instrument_node="">, but results are inconclusive. There is recent good evidence suggesting that children with </span><a class="topic-link" data-dcnode-id="6797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/atopy" title="Learn more about atopy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6798" instrument_node="">atopy</span></a><span data-dcnode-id="6796" instrument_node=""> or asthma, infants who are at risk of developing asthma, and female adults are more sensitive to the respiratory effects of NO</span></span></span></span><sub data-dcnode-id="6791"><span data-dcnode-id="6792" instrument_node="">2</span></sub><span data-dcnode-id="6790" instrument_node=""> exposure.</span><a class="workspace-trigger" data-dcnode-id="6788" href="#bib9" name="bbib9"><span data-dcnode-id="6789" instrument_node="">9</span></a><span data-dcnode-id="6787" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6785" href="#bib10" name="bbib10"><span data-dcnode-id="6786" instrument_node="">10</span></a><span data-dcnode-id="6784" instrument_node=""> Indoor NO</span><sub data-dcnode-id="6782"><span data-dcnode-id="6783" instrument_node="">2</span></sub><span data-dcnode-id="6781" instrument_node=""> exposure may also enhance asthmatic reactions to inhaled allergens.</span><a class="workspace-trigger" data-dcnode-id="6778" href="#bib11" name="bbib11"><sup data-dcnode-id="6779"><span data-dcnode-id="6780" instrument_node="">11</span></sup></a><span data-dcnode-id="6777" instrument_node=""> In the United States, elevated indoor NO</span><sub data-dcnode-id="6775"><span data-dcnode-id="6776" instrument_node="">2</span></sub><span data-dcnode-id="6774" instrument_node=""> levels are more prevalent in lower-income housing developments because of poor ventilation, small apartment size, and frequent use of gas stoves for supplemental heating.</span><a class="workspace-trigger" data-dcnode-id="6771" href="#bib12" name="bbib12"><sup data-dcnode-id="6772"><span data-dcnode-id="6773" instrument_node="">12</span></sup></a><span data-dcnode-id="6766"><span data-dcnode-id="6770" instrument_node=""> </span><a class="topic-link" data-dcnode-id="6768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/nitrous-acid" title="Learn more about Nitrous acid from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6769" instrument_node="">Nitrous acid</span></a><span data-dcnode-id="6767" instrument_node="">, a product of primary combustion formed as a secondary product of NO</span></span><sub data-dcnode-id="6764"><span data-dcnode-id="6765" instrument_node="">2</span></sub><span data-dcnode-id="6755"><span data-dcnode-id="6763" instrument_node=""> and other </span><a class="topic-link" data-dcnode-id="6761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/nitrogen-oxide" title="Learn more about nitrogen oxides from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6762" instrument_node="">nitrogen oxides</span></a><span data-dcnode-id="6756"><span data-dcnode-id="6760" instrument_node=""> and water, is also found on indoor surfaces. </span><a class="topic-link" data-dcnode-id="6758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/nitrous-oxide" title="Learn more about Nitrous oxides from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6759" instrument_node="">Nitrous oxides</span></a><span data-dcnode-id="6757" instrument_node=""> acidic nature makes it capable of causing respiratory damage leading to respiratory symptoms in patients with asthma at concentrations of 650 ppb over 3 hours.</span></span></span><a class="workspace-trigger" data-dcnode-id="6753" href="#bib10" name="bbib10"><span data-dcnode-id="6754" instrument_node="">10</span></a><span data-dcnode-id="6752" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6750" href="#bib13" name="bbib13"><span data-dcnode-id="6751" instrument_node="">13</span></a></p></section><section data-dcnode-id="6687" id="sec2.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6744"><span data-dcnode-id="6747" instrument_node="">SO</span><sub data-dcnode-id="6745"><span data-dcnode-id="6746" instrument_node="">2</span></sub></h3><p data-dcnode-id="6688" id="para0020"><span data-dcnode-id="6740"><a class="topic-link" data-dcnode-id="6742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/sulfur-dioxide" title="Learn more about Sulfur dioxide from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6743" instrument_node="">Sulfur dioxide</span></a><span data-dcnode-id="6741" instrument_node=""> is a primary combustion product of fossil fuels that can be grouped together with acid aerosols and particles to form a complex group of distinct air pollutants associated with a&nbsp;wide array of adverse health effects, including short-term respiratory morbidity and mortality.</span></span><a class="workspace-trigger" data-dcnode-id="6737" href="#bib14" name="bbib14"><sup data-dcnode-id="6738"><span data-dcnode-id="6739" instrument_node="">14</span></sup></a><span data-dcnode-id="6732"><span data-dcnode-id="6736" instrument_node=""> Chamber studies have determined that </span><a class="topic-link" data-dcnode-id="6734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/kerosene" title="Learn more about kerosene from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6735" instrument_node="">kerosene</span></a><span data-dcnode-id="6733" instrument_node=""> heaters are the major source of sulfate aerosols and indoor SO</span></span><sub data-dcnode-id="6730"><span data-dcnode-id="6731" instrument_node="">2</span></sub><span data-dcnode-id="6729" instrument_node="">.</span><a class="workspace-trigger" data-dcnode-id="6726" href="#bib15" name="bbib15"><sup data-dcnode-id="6727"><span data-dcnode-id="6728" instrument_node="">15</span></sup></a><span data-dcnode-id="6725" instrument_node=""> Some early controlled chamber studies have demonstrated that SO</span><sub data-dcnode-id="6723"><span data-dcnode-id="6724" instrument_node="">2</span></sub><span data-dcnode-id="6718"><span data-dcnode-id="6722" instrument_node=""> can cause </span><a class="topic-link" data-dcnode-id="6720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/bronchoconstriction" title="Learn more about bronchoconstriction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6721" instrument_node="">bronchoconstriction</span></a><span data-dcnode-id="6719" instrument_node=""> in healthy adults and adults with asthma, but a more recent study found that SO</span></span><sub data-dcnode-id="6716"><span data-dcnode-id="6717" instrument_node="">2</span></sub><span data-dcnode-id="6715" instrument_node=""> (200 ppb) and its reaction products (sulfuric acid 200 μg/m</span><sup data-dcnode-id="6713"><span data-dcnode-id="6714" instrument_node="">3</span></sup><span data-dcnode-id="6712" instrument_node=""> and ammonium bisulfate 2000 μg/m</span><sup data-dcnode-id="6710"><span data-dcnode-id="6711" instrument_node="">3</span></sup><span data-dcnode-id="6705"><span data-dcnode-id="6709" instrument_node="">) caused no significant change in </span><a class="topic-link" data-dcnode-id="6707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/spirometry" title="Learn more about spirometry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6708" instrument_node="">spirometry</span></a><span data-dcnode-id="6706" instrument_node=""> or symptoms in healthy subjects and subjects with asthma.</span></span><a class="workspace-trigger" data-dcnode-id="6703" href="#bib16" name="bbib16"><span data-dcnode-id="6704" instrument_node="">16</span></a><span data-dcnode-id="6702" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6700" href="#bib17" name="bbib17"><span data-dcnode-id="6701" instrument_node="">17</span></a><span data-dcnode-id="6699" instrument_node=""> However, a recently published report examining the effect of indoor heating sources on respiratory symptoms in nonsmoking women reported that a 10-ppb increase in SO</span><sub data-dcnode-id="6697"><span data-dcnode-id="6698" instrument_node="">2</span></sub><span data-dcnode-id="6692"><span data-dcnode-id="6696" instrument_node=""> was associated with increased </span><a class="topic-link" data-dcnode-id="6694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/wheeze" title="Learn more about wheezing from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6695" instrument_node="">wheezing</span></a><span data-dcnode-id="6693" instrument_node=""> and chest tightness.</span></span><a class="workspace-trigger" data-dcnode-id="6689" href="#bib18" name="bbib18"><sup data-dcnode-id="6690"><span data-dcnode-id="6691" instrument_node="">18</span></sup></a></p></section><section data-dcnode-id="6641" id="sec2.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6685"><span data-dcnode-id="6686" instrument_node="">CO</span></h3><p data-dcnode-id="6642" id="para0025"><span data-dcnode-id="6684" instrument_node="">Carbon monoxide is a tasteless, odorless, colorless, and nonirritating gas produced by incomplete combustion of organic material and is the leading cause of poisoning in the United States.</span><a class="workspace-trigger" data-dcnode-id="6681" href="#bib19" name="bbib19"><sup data-dcnode-id="6682"><span data-dcnode-id="6683" instrument_node="">19</span></sup></a><span data-dcnode-id="6672"><span data-dcnode-id="6676"><span data-dcnode-id="6680" instrument_node=""> The main sources of indoor </span><a class="topic-link" data-dcnode-id="6678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/carbon-monoxide" title="Learn more about CO from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6679" instrument_node="">CO</span></a><span data-dcnode-id="6677" instrument_node=""> are gas appliances, unvented kerosene heaters, and environmental tobacco smoke (ETS). The main health effect of CO is a result of its ability to impair the </span></span><a class="topic-link" data-dcnode-id="6674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/oxygen-affinity" title="Learn more about oxygen binding capacity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6675" instrument_node="">oxygen binding capacity</span></a><span data-dcnode-id="6673" instrument_node=""> of hemoglobin, which can cause headaches, nausea, dizziness, breathlessness, and fatigue, and with high exposures can lead to coma and death.</span></span><a class="workspace-trigger" data-dcnode-id="6669" href="#bib19" name="bbib19"><sup data-dcnode-id="6670"><span data-dcnode-id="6671" instrument_node="">19</span></sup></a><span data-dcnode-id="6664"><span data-dcnode-id="6668" instrument_node=""> The severity of </span><a class="topic-link" data-dcnode-id="6666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/carbon-monoxide-intoxication" title="Learn more about CO poisoning from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6667" instrument_node="">CO poisoning</span></a><span data-dcnode-id="6665" instrument_node=""> is dependent on concentration, length of exposure, and the general underlying health status of the exposed individual. Because carboxy-hemoglobin concentrations in blood&nbsp;are cumulative over time, prolonged exposure to low concentrations can result in considerable health effects.</span></span><a class="workspace-trigger" data-dcnode-id="6661" href="#bib19" name="bbib19"><sup data-dcnode-id="6662"><span data-dcnode-id="6663" instrument_node="">19</span></sup></a><span data-dcnode-id="6660" instrument_node=""> Burnett et al</span><a class="workspace-trigger" data-dcnode-id="6657" href="#bib20" name="bbib20"><sup data-dcnode-id="6658"><span data-dcnode-id="6659" instrument_node="">20</span></sup></a><span data-dcnode-id="6656" instrument_node=""> found that CO, compared with the other major indoor gaseous pollutants, NO</span><sub data-dcnode-id="6654"><span data-dcnode-id="6655" instrument_node="">2</span></sub><span data-dcnode-id="6653" instrument_node="">, SO</span><sub data-dcnode-id="6651"><span data-dcnode-id="6652" instrument_node="">2</span></sub><span data-dcnode-id="6650" instrument_node="">, and O</span><sub data-dcnode-id="6648"><span data-dcnode-id="6649" instrument_node="">3</span></sub><span data-dcnode-id="6643"><span data-dcnode-id="6647" instrument_node="">, was the strongest predictor&nbsp;of elderly patients being hospitalized for </span><a class="topic-link" data-dcnode-id="6645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/congestive-heart-failure" title="Learn more about congestive heart failure from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6646" instrument_node="">congestive heart failure</span></a><span data-dcnode-id="6644" instrument_node="">.</span></span></p></section><section data-dcnode-id="6371" id="sec2.5"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6639"><span data-dcnode-id="6640" instrument_node="">VOCs</span></h3><section data-dcnode-id="6478" id="sec2.5.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6637"><span data-dcnode-id="6638" instrument_node="">Chemical</span></h4><div data-dcnode-id="6528"><p data-dcnode-id="6617" id="para0030"><span data-dcnode-id="6628"><span data-dcnode-id="6632"><span data-dcnode-id="6636" instrument_node="">Primary product sources of </span><a class="topic-link" data-dcnode-id="6634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/volatile-organic-compound" title="Learn more about VOCs from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6635" instrument_node="">VOCs</span></a><span data-dcnode-id="6633" instrument_node=""> in buildings include office furniture, cabinetry, carpet tile, vinyl wall coverings, paints, and adhesives. Primary </span></span><a class="topic-link" data-dcnode-id="6630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/formaldehyde" title="Learn more about formaldehyde from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6631" instrument_node="">formaldehyde</span></a><span data-dcnode-id="6629" instrument_node=""> emitters are paints, adhesives, insulations, cabinetry, workstations, ceiling tile, and wallboard. Building occupants and activities are also major sources of these indoor chemicals. </span></span><a class="workspace-trigger" data-dcnode-id="6626" href="#tbl2" name="btbl2"><span data-dcnode-id="6627" instrument_node="">Table II</span></a><span data-dcnode-id="6625" instrument_node=""> lists some of these common building sources and their associated VOCs. The combination of these chemical sources in buildings can result in the occupant being exposed to anywhere from 50 to 300 different individual VOCs, each present in a microgram per cubic meter concentration range (μg/m</span><sup data-dcnode-id="6623"><span data-dcnode-id="6624" instrument_node="">3</span></sup><span data-dcnode-id="6618"><span data-dcnode-id="6622" instrument_node="">). This complex “chemical soup” frequently results in odors that lead to complaints by occupants in these nonindustrial </span><a class="topic-link" data-dcnode-id="6620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/indoor-environment" title="Learn more about indoor environments from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6621" instrument_node="">indoor environments</span></a><span data-dcnode-id="6619" instrument_node="">.</span></span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6529" id="tbl2"><span class="captions" data-dcnode-id="6608"><span data-dcnode-id="6609"><p data-dcnode-id="6610" id="simple-para0010"><span class="label" data-dcnode-id="6615"><span data-dcnode-id="6616" instrument_node="">Table II</span></span><span data-dcnode-id="6614" instrument_node="">. </span><a class="topic-link" data-dcnode-id="6612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/volatile-organic-compound" title="Learn more about VOCs from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6613" instrument_node="">VOCs</span></a><span data-dcnode-id="6611" instrument_node=""> and their sources</span></p></span></span><div class="groups" data-dcnode-id="6530"><table data-dcnode-id="6531"><thead data-dcnode-id="6598"><tr class="rowsep-1" data-dcnode-id="6599"><th data-dcnode-id="6606" scope="col"><span data-dcnode-id="6607" instrument_node="">Source</span></th><th data-dcnode-id="6604" scope="col"><span data-dcnode-id="6605" instrument_node="">VOCs</span></th><th data-dcnode-id="6602" scope="col"><span data-dcnode-id="6603" instrument_node="">Source</span></th><th data-dcnode-id="6600" scope="col"><span data-dcnode-id="6601" instrument_node="">VOCs</span></th></tr></thead><tbody data-dcnode-id="6532"><tr class="valign-top" data-dcnode-id="6589"><td data-dcnode-id="6596"><span data-dcnode-id="6597" instrument_node="">Adhesives/ sealants</span></td><td data-dcnode-id="6594"><span data-dcnode-id="6595" instrument_node="">Formaldehyde, butyl ether, vinyl cyclohexane, 2-propenoic acid, propylene glycol</span></td><td data-dcnode-id="6592"><span data-dcnode-id="6593" instrument_node="">Paints</span></td><td data-dcnode-id="6590"><span data-dcnode-id="6591" instrument_node="">Toluene, propylene glycol, ethylene glycol, butyl propionate, methyl propanol</span></td></tr><tr class="valign-top" data-dcnode-id="6580"><td data-dcnode-id="6587"><span data-dcnode-id="6588" instrument_node="">Carpet</span></td><td data-dcnode-id="6585"><span data-dcnode-id="6586" instrument_node="">4-Phenylcyclohexene, vinyl acetate, styrene, dodecanol, acetaldehyde</span></td><td data-dcnode-id="6583"><span data-dcnode-id="6584" instrument_node="">Printers/copiers</span></td><td data-dcnode-id="6581"><span data-dcnode-id="6582" instrument_node="">Styrene, ethylbenzene, xylenes, benzene, 2-ethyl-1-hexanol</span></td></tr><tr class="valign-top" data-dcnode-id="6571"><td data-dcnode-id="6578"><span data-dcnode-id="6579" instrument_node="">Cleaning chemicals</span></td><td data-dcnode-id="6576"><span data-dcnode-id="6577" instrument_node="">Limonene, isopentane, isopropanol, butoxyethanol, 1,4 dichlorobenzene</span></td><td data-dcnode-id="6574"><span data-dcnode-id="6575" instrument_node="">Resilient/rubber flooring</span></td><td data-dcnode-id="6572"><span data-dcnode-id="6573" instrument_node="">Styrene, dodecane, benzothiazole, vinyl acetate, cyclohexane</span></td></tr><tr class="valign-top" data-dcnode-id="6562"><td data-dcnode-id="6569"><span data-dcnode-id="6570" instrument_node="">Linoleum</span></td><td data-dcnode-id="6567"><span data-dcnode-id="6568" instrument_node="">Acetic acid, hexanal, hexanoic acid, pentanoic acid, decane</span></td><td data-dcnode-id="6565"><span data-dcnode-id="6566" instrument_node="">Textiles</span></td><td data-dcnode-id="6563"><span data-dcnode-id="6564" instrument_node="">Formaldehyde, acrylonitrile, acetaldehyde, decane, tetradecane</span></td></tr><tr class="valign-top" data-dcnode-id="6553"><td data-dcnode-id="6560"><span data-dcnode-id="6561" instrument_node="">Millwork</span></td><td data-dcnode-id="6558"><span data-dcnode-id="6559" instrument_node="">formaldehyde, 2-pentylfuran, benzaldehyde, hexanal, pentanal</span></td><td data-dcnode-id="6556"><span data-dcnode-id="6557" instrument_node="">Wall covering</span></td><td data-dcnode-id="6554"><span data-dcnode-id="6555" instrument_node="">Naphthalene, methyl pyrrolidinone, styrene, phenol, ethyl hexanoic acid</span></td></tr><tr class="valign-top" data-dcnode-id="6544"><td data-dcnode-id="6551"><span data-dcnode-id="6552" instrument_node="">Office furniture</span></td><td data-dcnode-id="6549"><span data-dcnode-id="6550" instrument_node="">formaldehyde, acetaldehyde, butylacetate, hexanal, cyclohexanone</span></td><td data-dcnode-id="6547"><span data-dcnode-id="6548" instrument_node="">Window shades</span></td><td data-dcnode-id="6545"><span data-dcnode-id="6546" instrument_node="">Ethyl hexanoic acid, decanol, dodecene, ethyl hexanol, naphthalene</span></td></tr><tr class="valign-top" data-dcnode-id="6533"><td data-dcnode-id="6542"><span data-dcnode-id="6543" instrument_node="">Building occupants</span></td><td colspan="3" data-dcnode-id="6534"><span data-dcnode-id="6541" instrument_node="">Benzene from tobacco smoke (ETS) and attached garages, limonene (a terpene) and various siloxane compounds (eg, decamethylcyclopentasiloxane) from personal care products including antiperspirants and deodorants, tetrachloroethylene from dry-cleaned clothing, and C</span><sub data-dcnode-id="6539"><span data-dcnode-id="6540" instrument_node="">12</span></sub><span data-dcnode-id="6538" instrument_node=""> to C</span><sub data-dcnode-id="6536"><span data-dcnode-id="6537" instrument_node="">16</span></sub><span data-dcnode-id="6535" instrument_node=""> alkanes from hand and body lotion, moisturizing soaps, and cosmetics</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="6500" id="para0035"><span data-dcnode-id="6515"><span data-dcnode-id="6523"><span data-dcnode-id="6527" instrument_node="">Adverse health responses attributed but not proven to be caused by VOCs in nonindustrial indoor environments include (1) </span><a class="topic-link" data-dcnode-id="6525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/irritant-agent" title="Learn more about irritant from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6526" instrument_node="">irritant</span></a><span data-dcnode-id="6524" instrument_node=""> effects resulting from </span></span><a class="topic-link" data-dcnode-id="6521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/mucosa" title="Learn more about mucous membrane from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6522" instrument_node="">mucous membrane</span></a><span data-dcnode-id="6516"><span data-dcnode-id="6520" instrument_node=""> irritation, (2) systemic effects such as fatigue and difficulty concentrating, and (3) toxic effects such as </span><a class="topic-link" data-dcnode-id="6518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/carcinogenicity" title="Learn more about carcinogenicity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6519" instrument_node="">carcinogenicity</span></a><span data-dcnode-id="6517" instrument_node="">.</span></span></span><a class="workspace-trigger" data-dcnode-id="6513" href="#bib21" name="bbib21"><span data-dcnode-id="6514" instrument_node="">21</span></a><span data-dcnode-id="6512" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6510" href="#bib22" name="bbib22"><span data-dcnode-id="6511" instrument_node="">22</span></a><span data-dcnode-id="6509" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6507" href="#bib23" name="bbib23"><span data-dcnode-id="6508" instrument_node="">23</span></a><span data-dcnode-id="6506" instrument_node=""> The strongest association has been with VOCs causing mucous membrane irritation.</span><a class="workspace-trigger" data-dcnode-id="6504" href="#bib22" name="bbib22"><span data-dcnode-id="6505" instrument_node="">22</span></a><span data-dcnode-id="6503" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6501" href="#bib23" name="bbib23"><span data-dcnode-id="6502" instrument_node="">23</span></a></p><p data-dcnode-id="6495" id="para0040"><span data-dcnode-id="6499" instrument_node="">Formaldehyde is the VOC most familiar to the general public that has been associated with indoor air pollution. The major sources of formaldehyde are from indoor construction materials such as particleboard, fiberboard, and plywood. Formaldehyde concentrations are higher in residential buildings compared with office buildings because of the relatively large ratio of pressed wood products to air volume in homes.</span><a class="workspace-trigger" data-dcnode-id="6496" href="#bib24" name="bbib24"><sup data-dcnode-id="6497"><span data-dcnode-id="6498" instrument_node="">24</span></sup></a></p><p data-dcnode-id="6479" id="para0045"><span data-dcnode-id="6494" instrument_node="">The sum of all individual VOCs, referred to as TVOCs (total volatile organic compounds), measured in μg/m</span><sup data-dcnode-id="6492"><span data-dcnode-id="6493" instrument_node="">3</span></sup><span data-dcnode-id="6491" instrument_node="">, are often used as a guide to determine whether chemical levels are elevated in air samples. These levels often reflect the potential for occupant irritation and discomfort.</span><a class="workspace-trigger" data-dcnode-id="6488" href="#bib24" name="bbib24"><sup data-dcnode-id="6489"><span data-dcnode-id="6490" instrument_node="">24</span></sup></a><span data-dcnode-id="6487" instrument_node=""> In new office buildings, the TVOC concentration at the time of initial occupancy is often 50 to 100 times higher than outdoor air. Occupants almost always complain when TVOC levels are 3000 μg/m</span><sup data-dcnode-id="6485"><span data-dcnode-id="6486" instrument_node="">3</span></sup><span data-dcnode-id="6484" instrument_node=""> or higher.</span><a class="workspace-trigger" data-dcnode-id="6481" href="#bib24" name="bbib24"><sup data-dcnode-id="6482"><span data-dcnode-id="6483" instrument_node="">24</span></sup></a><span data-dcnode-id="6480" instrument_node=""> IAQ guidelines have been incorporated into the design and construction specifications for new buildings and to a lesser extent homes to reduce VOCs to allowable levels on the basis of current toxicologic information on health, irritation, and odor hazards.</span></p></section><section data-dcnode-id="6372" id="sec2.5.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6476"><span data-dcnode-id="6477" instrument_node="">Microbial</span></h4><p data-dcnode-id="6442" id="para0050"><span data-dcnode-id="6459"><span data-dcnode-id="6463"><span data-dcnode-id="6475" instrument_node="">More than 200 microbial VOCs (mVOCs) have&nbsp;been associated with different fungi including alcohols, </span><a class="topic-link" data-dcnode-id="6473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/aldehyde" title="Learn more about aldehydes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6474" instrument_node="">aldehydes</span></a><span data-dcnode-id="6464"><span data-dcnode-id="6472" instrument_node="">, </span><a class="topic-link" data-dcnode-id="6470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/ketone" title="Learn more about ketones from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6471" instrument_node="">ketones</span></a><span data-dcnode-id="6465"><span data-dcnode-id="6469" instrument_node="">, </span><a class="topic-link" data-dcnode-id="6467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/terpene" title="Learn more about terpenes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6468" instrument_node="">terpenes</span></a><span data-dcnode-id="6466" instrument_node="">, esters, amines, and </span></span></span></span><a class="topic-link" data-dcnode-id="6461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/aromatic-compound" title="Learn more about aromatic compounds from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6462" instrument_node="">aromatic compounds</span></a><span data-dcnode-id="6460" instrument_node=""> as well as sulfur-containing and nitrogen-containing compounds.</span></span><a class="workspace-trigger" data-dcnode-id="6456" href="#bib25" name="bbib25"><sup data-dcnode-id="6457"><span data-dcnode-id="6458" instrument_node="">25</span></sup></a><span data-dcnode-id="6451"><span data-dcnode-id="6455" instrument_node=""> Moisture problems with molds located behind surfaces or inside building materials can lead to increased release of mVOCs manifested as mildew/musty odors. It has been suggested that mVOCs could be used as </span><a class="topic-link" data-dcnode-id="6453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/radioactive-tracer" title="Learn more about tracers from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6454" instrument_node="">tracers</span></a><span data-dcnode-id="6452" instrument_node=""> for suspected microbial contamination in building materials when occupants complain of moldy/mildew odors and/or indoor air-related symptoms.</span></span><a class="workspace-trigger" data-dcnode-id="6448" href="#bib26" name="bbib26"><sup data-dcnode-id="6449"><span data-dcnode-id="6450" instrument_node="">26</span></sup></a><span data-dcnode-id="6447" instrument_node=""> In water-damaged buildings, both the microbial species and the growth substrate (building materials) affect the mVOC profile in indoor air.</span><a class="workspace-trigger" data-dcnode-id="6444" href="#bib27" name="bbib27"><sup data-dcnode-id="6445"><span data-dcnode-id="6446" instrument_node="">27</span></sup></a><span data-dcnode-id="6443" instrument_node=""> However, use of mVOCs as tracers of microbial contamination can be problematic if other sources of these compounds originating from traffic, human activities, or normal building materials are not taken into account.</span></p><p data-dcnode-id="6373" id="para0055"><span data-dcnode-id="6441" instrument_node="">Indoor microbial VOCs have been associated with eye, nose, and throat irritation; cough and wheezing; fatigue; headache; dizziness; and nausea.</span><a class="workspace-trigger" data-dcnode-id="6438" href="#bib28" name="bbib28"><sup data-dcnode-id="6439"><span data-dcnode-id="6440" instrument_node="">28</span></sup></a><span data-dcnode-id="6437" instrument_node=""> Limited mVOC challenge studies have been conducted. Nasal provocation studies in a healthy individual using a relatively high concentration of the mVOC, 1-octen-3-ol (10 mg/m</span><sup data-dcnode-id="6435"><span data-dcnode-id="6436" instrument_node="">3</span></sup><span data-dcnode-id="6414"><span data-dcnode-id="6426"><span data-dcnode-id="6430"><span data-dcnode-id="6434" instrument_node="">), caused </span><a class="topic-link" data-dcnode-id="6432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/eye-irritation" title="Learn more about eye irritation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6433" instrument_node="">eye irritation</span></a><span data-dcnode-id="6431" instrument_node=""> and headache associated with an increases in </span></span><a class="topic-link" data-dcnode-id="6428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/lysozyme" title="Learn more about lysozyme from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6429" instrument_node="">lysozyme</span></a><span data-dcnode-id="6427" instrument_node="">, </span></span><a class="topic-link" data-dcnode-id="6424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/myeloperoxidase" title="Learn more about myeloperoxidase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6425" instrument_node="">myeloperoxidase</span></a><span data-dcnode-id="6415"><span data-dcnode-id="6419"><span data-dcnode-id="6423" instrument_node="">, and </span><a class="topic-link" data-dcnode-id="6421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/eosinophil-cationic-protein" title="Learn more about eosinophilic cationic protein from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6422" instrument_node="">eosinophilic cationic protein</span></a><span data-dcnode-id="6420" instrument_node=""> (ECP) in </span></span><a class="topic-link" data-dcnode-id="6417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/nasal-irrigation" title="Learn more about nasal lavage from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6418" instrument_node="">nasal lavage</span></a><span data-dcnode-id="6416" instrument_node=""> fluid obtained postchallenge.</span></span></span><a class="workspace-trigger" data-dcnode-id="6411" href="#bib29" name="bbib29"><sup data-dcnode-id="6412"><span data-dcnode-id="6413" instrument_node="">29</span></sup></a><span data-dcnode-id="6410" instrument_node=""> More recently, a 3-methylfuran (1 mg/m</span><sup data-dcnode-id="6408"><span data-dcnode-id="6409" instrument_node="">3</span></sup><span data-dcnode-id="6403"><span data-dcnode-id="6407" instrument_node="">) nasal provocation challenge caused an increase in myeloperoxidase and lysozyme in nasal lavage associated with a decrease in </span><a class="topic-link" data-dcnode-id="6405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/forced-vital-capacity" title="Learn more about forced vital capacity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6406" instrument_node="">forced vital capacity</span></a><span data-dcnode-id="6404" instrument_node="">.</span></span><a class="workspace-trigger" data-dcnode-id="6400" href="#bib30" name="bbib30"><sup data-dcnode-id="6401"><span data-dcnode-id="6402" instrument_node="">30</span></sup></a><em data-dcnode-id="6398"><span data-dcnode-id="6399" instrument_node="">In vitro</span></em><span data-dcnode-id="6389"><span data-dcnode-id="6393"><span data-dcnode-id="6397" instrument_node=""> studies using </span><a class="topic-link" data-dcnode-id="6395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/lung-lavage" title="Learn more about bronchoalveolar lavage from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6396" instrument_node="">bronchoalveolar lavage</span></a><span data-dcnode-id="6394" instrument_node=""> cells incubated with mVOCs (2-methyl-1-propanol, 3-methyl-1-butanol, 2-methyl-1-butanol and 1-pentanol) resulted in increased </span></span><a class="topic-link" data-dcnode-id="6391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/histamine-release" title="Learn more about histamine release from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6392" instrument_node="">histamine release</span></a><span data-dcnode-id="6390" instrument_node="">.</span></span><a class="workspace-trigger" data-dcnode-id="6386" href="#bib31" name="bbib31"><sup data-dcnode-id="6387"><span data-dcnode-id="6388" instrument_node="">31</span></sup></a><span data-dcnode-id="6385" instrument_node=""> Finally, in a mold-sensitized individual, inhalational challenge to 3-methylfuran (1 mg/m</span><sup data-dcnode-id="6383"><span data-dcnode-id="6384" instrument_node="">3</span></sup><span data-dcnode-id="6378"><span data-dcnode-id="6382" instrument_node="">) was demonstrated to induce both an early and a late </span><a class="topic-link" data-dcnode-id="6380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/airway-response" title="Learn more about airway respon
