</span><h1 class="entry-title" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Health and Environmental Effects of Air Pollution</span></h1><span data-dcnode-id="675" instrument_node=""> </span><div class="entry-meta entry-category" data-dcnode-id="668"><span data-dcnode-id="674" instrument_node="">
</span><span class="cat-links" data-dcnode-id="670"><span data-dcnode-id="673" instrument_node=""> </span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//air-pollution.in/category/health-effects/" rel="category tag"><span data-dcnode-id="672" instrument_node="">Health</span></a></span><span data-dcnode-id="669" instrument_node=""> </span></div><span data-dcnode-id="666" instrument_node="">
</span></header><span data-dcnode-id="664" instrument_node="">
</span><span data-dcnode-id="662" instrument_node="">
</span><div class="entry-content" data-dcnode-id="442"><span data-dcnode-id="661" instrument_node="">
</span><div class="post-thumbnail" data-dcnode-id="657"><span data-dcnode-id="660" instrument_node="">
</span><img alt="Air pollution the silent killer" class="attachment-gist-large-thumb size-gist-large-thumb wp-post-image" data-dcnode-id="659" height="620" sizes="(max-width: 1170px) 100vw, 1170px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//air-pollution.in/wp-content/uploads/2019/05/Air-Pollution-Blog-Image-1170x620.jpg&amp;raw" srcset="http://air-pollution.in/wp-content/uploads/2019/05/Air-Pollution-Blog-Image-1170x620.jpg 1170w, http://air-pollution.in/wp-content/uploads/2019/05/Air-Pollution-Blog-Image-300x159.jpg 300w, http://air-pollution.in/wp-content/uploads/2019/05/Air-Pollution-Blog-Image-768x407.jpg 768w, http://air-pollution.in/wp-content/uploads/2019/05/Air-Pollution-Blog-Image-1024x542.jpg 1024w, http://air-pollution.in/wp-content/uploads/2019/05/Air-Pollution-Blog-Image.jpg 1875w" width="1170"><span data-dcnode-id="658" instrument_node=""> </span></div><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653" style="text-align: justify;"><span data-dcnode-id="654" instrument_node="">Air pollution is the world’s largest killer and responsible for thousands of deaths worldwide every year. Carbon monoxide, sulfur dioxide, nitrogen oxides, ozone, particulate matter, lead and PM 2.5 are the major contributors to indoor air pollution. Air pollution is the result of combustion from space heating, industrial and vehicular emission, which causes and exacerbates several diseases such as asthma cancer, pulmonary illnesses, and heart disease. Not only these, but there are also different effects of air pollution on human health and these may be:</span></p><span data-dcnode-id="652" instrument_node="">
</span><ul data-dcnode-id="638" style="text-align: justify;"><span data-dcnode-id="651" instrument_node="">
</span><li data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Irritation of the eyes, nose, and throat</span></li><span data-dcnode-id="648" instrument_node="">
</span><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Wheezing, coughing and problem in breathing</span></li><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Worsening of lungs and heart problems</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Increased risk of heart attack</span></li><span data-dcnode-id="639" instrument_node="">
</span></ul><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635" style="text-align: justify;"><span data-dcnode-id="636" instrument_node="">Long-term exposure to air pollution also affects the reproductive, neurological, and respiratory systems. In some major cases, it can even cause death.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632" style="text-align: justify;"><span data-dcnode-id="633" id="more-170"></span></p><span data-dcnode-id="631" instrument_node="">
</span><div class="counter-hierarchy counter-decimal ez-toc-grey" data-dcnode-id="584" id="ez-toc-container"><span data-dcnode-id="630" instrument_node="">

</span><span class="ez-toc-title-toggle" data-dcnode-id="623"><a class="ez-toc-pull-right ez-toc-btn ez-toc-btn-xs ez-toc-btn-default ez-toc-toggle" data-dcnode-id="624"><i class="ez-toc-glyphicon ez-toc-icon-toggle" data-dcnode-id="625"></i></a></span></div><span data-dcnode-id="621" instrument_node="">

minimize_the_exposure_of_Indoor_Air_Pollution" title="How to minimize the exposure of Indoor Air Pollution?"><span data-dcnode-id="592" instrument_node="">How to minimize the exposure of Indoor Air Pollution?</span></a></li><li data-dcnode-id="587"><a data-dcnode-id="588" href="#The_Bottom_Line" title="The Bottom Line"><span data-dcnode-id="589" instrument_node="">The Bottom Line</span></a></li></ul></nav></div><span data-dcnode-id="583" instrument_node="">
</span><h2 data-dcnode-id="580" style="text-align: justify;"><span class="ez-toc-section" data-dcnode-id="581" id="Heath_Effects_of_Air_Pollution_on_Human"><span data-dcnode-id="582" instrument_node="">Heath Effects of Air Pollution on Human</span></span></h2><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><img alt="health effects of air pollution on Human" class="aligncenter wp-image-177 size-full" data-dcnode-id="578" height="710" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//air-pollution.in/wp-content/uploads/2016/12/health-effects-air-pollution.jpg&amp;raw" srcset="http://air-pollution.in/wp-content/uploads/2016/12/health-effects-air-pollution.jpg 1000w, http://air-pollution.in/wp-content/uploads/2016/12/health-effects-air-pollution-300x213.jpg 300w, http://air-pollution.in/wp-content/uploads/2016/12/health-effects-air-pollution-768x545.jpg 768w" width="1000"></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574" style="text-align: justify;"><span data-dcnode-id="575" instrument_node="">Air pollution is a major for people who are sensitive to common air pollutants such as ground-level ozone and pollutants. Air pollution has an adverse effect on children, people with heart diseases and asthma patients. Generally, if you are young and in a good state of health, exposure to moderate air pollution levels will not lead to any serious short-term effects. However, long term exposure to air pollution can lead to some serious effects on human health.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571" style="text-align: justify;"><span data-dcnode-id="572" instrument_node="">The most common pollutants found in the environment includes:</span></p><span data-dcnode-id="570" instrument_node="">
</span><ul data-dcnode-id="553"><span data-dcnode-id="569" instrument_node="">
</span><li data-dcnode-id="565" style="text-align: justify;"><strong data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Nitrogen dioxide, sulphur dioxide, ozone, carbon monoxide and particles</span></strong><span data-dcnode-id="566" instrument_node="">– Irritates the airway of the lungs.</span></li><span data-dcnode-id="564" instrument_node="">
</span><li data-dcnode-id="560" style="text-align: justify;"><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Carbon monoxide </span></strong><span data-dcnode-id="561" instrument_node="">– Prevents the uptake of oxygen by the blood which leads to the reduction of oxygen supplied to the heart.</span></li><span data-dcnode-id="559" instrument_node="">
</span><li data-dcnode-id="555" style="text-align: justify;"><strong data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Particles </span></strong><span data-dcnode-id="556" instrument_node="">– Particles can be carried deep into the lungs which can cause inflammation and worsening of heart and lung diseases.</span></li><span data-dcnode-id="554" instrument_node="">
</span></ul><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="551" instrument_node="">Also Read: </span><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//air-pollution.in/heres-air-pollution-skin/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="550" instrument_node="">How Air Pollution Affects Your Skin</span></a></p><span data-dcnode-id="547" instrument_node="">
</span><h2 data-dcnode-id="544" style="text-align: justify;"><span class="ez-toc-section" data-dcnode-id="545" id="Effects_of_Air_Pollution_on_Environment"><span data-dcnode-id="546" instrument_node="">Effects of Air Pollution on Environment</span></span></h2><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Air pollution not only harms human health but also causes environmental effects. It can directly contaminate the surface of water bodies, soil and even kill crops or reduce their yield. There are other impacts of air pollution on the environment and these are mentioned below.</span></p><span data-dcnode-id="540" instrument_node="">
</span><h3 data-dcnode-id="537" style="text-align: justify;"><span class="ez-toc-section" data-dcnode-id="538" id="Acid_Rain"><span data-dcnode-id="539" instrument_node="">Acid Rain</span></span></h3><span data-dcnode-id="536" instrument_node="">
</span><figure aria-describedby="caption-attachment-172" class="wp-caption aligncenter" data-dcnode-id="532" id="attachment_172" style="width: 600px"><img alt="environmental-effects-acid-rain" class="wp-image-172 size-full" data-dcnode-id="535" height="360" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//air-pollution.in/wp-content/uploads/2016/12/acid-rain-effects-air-pollution.gif&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="533" id="caption-attachment-172"><span data-dcnode-id="534" instrument_node="">Source: Department of Environmental Conservation</span></figcaption></figure><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="526" style="text-align: justify;"><span data-dcnode-id="530" instrument_node="">Acid rain contains a harmful amount of sulphuric and nitric acids, which are formed when sulphur oxides and nitrogen oxides released into the atmosphere while fossil fuels are burned. As per </span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="529" instrument_node="">Environmental Protection Agency</span></a><span data-dcnode-id="527" instrument_node=""> of the United States, these acids fall either in wet form (rain, snow, or fog) or dry form (Gas and particulates), thereby affecting the environment. Acid rain kills trees and harms animals, fish, and other wildlife and makes soil unfit for habitat.</span></p><span data-dcnode-id="525" instrument_node="">
</span><h3 data-dcnode-id="522" style="text-align: justify;"><span class="ez-toc-section" data-dcnode-id="523" id="Eutrophication"><span data-dcnode-id="524" instrument_node="">Eutrophication</span></span></h3><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><img alt="environmental-effects-eutrophication" class="aligncenter wp-image-174 size-full" data-dcnode-id="520" height="371" loading="lazy" sizes="(max-width: 652px) 100vw, 652px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//air-pollution.in/wp-content/uploads/2016/12/eutrophication-effects-air-pollution.png&amp;raw" srcset="http://air-pollution.in/wp-content/uploads/2016/12/eutrophication-effects-air-pollution.png 652w, http://air-pollution.in/wp-content/uploads/2016/12/eutrophication-effects-air-pollution-300x171.png 300w" width="652"></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516" style="text-align: justify;"><span data-dcnode-id="517" instrument_node="">A high concentration of nitrogen and phosphorous from different sources such as fertilizer run-off lead to eutrophication. Air emissions of nitrogen oxides from vehicles, power plants also contribute to the nitrogen entering aquatic ecosystems.</span></p><span data-dcnode-id="515" instrument_node="">
</span><h3 data-dcnode-id="512" style="text-align: justify;"><span class="ez-toc-section" data-dcnode-id="513" id="Haze"><span data-dcnode-id="514" instrument_node="">Haze</span></span></h3><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><img alt="environmental-effects-haze" class="aligncenter wp-image-176 size-full" data-dcnode-id="510" height="366" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//air-pollution.in/wp-content/uploads/2016/12/haze-effect-air-pollution.jpg&amp;raw" srcset="http://air-pollution.in/wp-content/uploads/2016/12/haze-effect-air-pollution.jpg 650w, http://air-pollution.in/wp-content/uploads/2016/12/haze-effect-air-pollution-300x169.jpg 300w" width="650"></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506" style="text-align: justify;"><span data-dcnode-id="507" instrument_node="">The presence of smoke, dust and different types of airborne particles cause haze. Some particles are directly emitted to the atmosphere by sources such as power plants, industrial facilities, vehicles, and construction activities. Exposure to smog causes eye, nose and throat irritation and breathing problems.</span></p><span data-dcnode-id="505" instrument_node="">
</span><h3 data-dcnode-id="502" style="text-align: justify;"><span class="ez-toc-section" data-dcnode-id="503" id="Effects_on_wildlife"><span data-dcnode-id="504" instrument_node="">Effects on wildlife</span></span></h3><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499" style="text-align: justify;"><span data-dcnode-id="500" instrument_node="">Like humans, animals also experience health problems if they are exposed to concentrations of air toxins over time. Air toxins result in birth defects, reproductive problems, and disease in animals.</span></p><span data-dcnode-id="498" instrument_node="">
</span><h3 data-dcnode-id="495" style="text-align: justify;"><span class="ez-toc-section" data-dcnode-id="496" id="Ozone_depletion"><span data-dcnode-id="497" instrument_node="">Ozone depletion</span></span></h3><span data-dcnode-id="494" instrument_node="">
</span><figure aria-describedby="caption-attachment-178" class="wp-caption aligncenter" data-dcnode-id="490" id="attachment_178" style="width: 450px"><img alt="environmental-effects-ozone-depletion" class="wp-image-178 size-full" data-dcnode-id="493" height="300" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//air-pollution.in/wp-content/uploads/2016/12/ozone-depletion-effect-air-pollution.jpg&amp;raw" srcset="http://air-pollution.in/wp-content/uploads/2016/12/ozone-depletion-effect-air-pollution.jpg 450w, http://air-pollution.in/wp-content/uploads/2016/12/ozone-depletion-effect-air-pollution-300x200.jpg 300w" width="450"><figcaption class="wp-caption-text" data-dcnode-id="491" id="caption-attachment-178"><span data-dcnode-id="492" instrument_node="">Source: Buzzle.com</span></figcaption></figure><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487" style="text-align: justify;"><span data-dcnode-id="488" instrument_node="">Ozone is a gas that is both present on the ground level and Earth’s upper atmosphere known as the stratosphere. At ground level, ozone harms human health as a pollutant. However, in the stratosphere, ozone forms a layer, which protects everyone on earth from the harmful ultra-violet rays. Thinning of the ozone layer causes more UV rays to reach earth. This will lead to serious diseases like skin cancer, and cataract.</span></p><span data-dcnode-id="486" instrument_node="">
</span><h3 data-dcnode-id="483" style="text-align: justify;"><span class="ez-toc-section" data-dcnode-id="484" id="Global_climate_change"><span data-dcnode-id="485" instrument_node="">Global climate change</span></span></h3><span data-dcnode-id="482" instrument_node="">
</span><figure aria-describedby="caption-attachment-175" class="wp-caption aligncenter" data-dcnode-id="478" id="attachment_175" style="width: 698px"><img alt="environmental-effect-greenhouse-effect" class="wp-image-175 size-full" data-dcnode-id="481" height="412" loading="lazy" sizes="(max-width: 698px) 100vw, 698px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//air-pollution.in/wp-content/uploads/2016/12/greenhouse-effect-effect-air-pollution.png&amp;raw" srcset="http://air-pollution.in/wp-content/uploads/2016/12/greenhouse-effect-effect-air-pollution.png 698w, http://air-pollution.in/wp-content/uploads/2016/12/greenhouse-effect-effect-air-pollution-300x177.png 300w" width="698"><figcaption class="wp-caption-text" data-dcnode-id="479" id="caption-attachment-175"><span data-dcnode-id="480" instrument_node="">Source: C2es.org</span></figcaption></figure><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475" style="text-align: justify;"><span data-dcnode-id="476" instrument_node="">Earth’s atmosphere contains a specific balance of naturally occurring gases that trap the sun’s heat near the Earth’s surface. This “greenhouse effect” keeps Earth’s temperature stable. Humans have disturbed this balance by producing more greenhouse gases, including carbon dioxide and methane. As a result, Earth’s atmosphere is trapping more of sun’s heat causing the temperature to rise.</span></p><span data-dcnode-id="474" instrument_node="">
</span><h2 data-dcnode-id="471"><span class="ez-toc-section" data-dcnode-id="472" id="How_Outdoor_Air_Pollution_Impact_Indoor_Air_Quality_and_Health"><span data-dcnode-id="473" instrument_node="">How Outdoor Air Pollution Impact Indoor Air Quality and Health?</span></span></h2><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468" style="text-align: justify;"><span data-dcnode-id="469" instrument_node="">Not just outdoor but indoor air pollution is harmful to health. Outdoor air pollution is responsible for deteriorating the indoor air quality, making it typically 2-5 times worse than you have expected. Outdoor air pollutant enters your home through door &amp; windows, cracks in walls, thereby making the indoor air more toxic. Breathing impure air leads to a number of respiratory diseases such as lung cancer, chronic obstructive pulmonary disease, and asthma.</span></p><span data-dcnode-id="467" instrument_node="">
</span><h2 data-dcnode-id="464" style="text-align: justify;"><span class="ez-toc-section" data-dcnode-id="465" id="How_to_minimize_the_exposure_of_Indoor_Air_Pollution"><span data-dcnode-id="466" instrument_node="">How to minimize the exposure of Indoor Air Pollution?</span></span></h2><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461" style="text-align: justify;"><span data-dcnode-id="462" instrument_node="">In addition to outdoor pollution, it is equally essential to keep yourself safe from indoor air pollution. &nbsp;Ventilate your home wisely, which will help regularly disperse the indoor air pollutants. As tobacco contains more than 4,000 chemicals including 60 carcinogens, it is important that you never smoke indoors. Install high-performance HEPA air purifier that can effectively remove 99.97% of particles present in the air and make the indoor air healthy and pollution free.</span></p><span data-dcnode-id="460" instrument_node="">
</span><h2 data-dcnode-id="457" style="text-align: justify;"><span class="ez-toc-section" data-dcnode-id="458" id="The_Bottom_Line"><span data-dcnode-id="459" instrument_node="">The Bottom Line</span></span></h2><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454" style="text-align: justify;"><span data-dcnode-id="455" instrument_node="">Long-exposure to air pollution affects the environment. Considering the adverse effect of air pollution, it is necessary to take some steps to reduce its effects. The excessive level of outdoor pollution also has an effect on the indoor air quality exposing you to constant danger.</span></p><span data-dcnode-id="453" instrument_node="">
