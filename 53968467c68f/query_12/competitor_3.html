</span><meta content="Since the early 1970s, the health effects of indoor air pollution have been investigated with increasing intensity. Consequently, a large body of literature is now available on diverse aspects of indoor air pollution: sources, concentrations, health effects, engineering, and policy. This review begins with a review of the principal pollutants found in indoor environments and their sources. Subsequently, exposure to indoor air pollutants and health effects are considered, with an emphasis on those indoor air quality problems of greatest concern at present: passive exposure to tobacco smoke, nitrogen dioxide from gas-fueled cooking stoves, formaldehyde exposure, radon daughter exposure, and the diverse health problems encountered by workers in newer sealed office buildings. The review concludes by briefly addressing assessment of indoor air quality, control technology, research needs, and clinical implications." data-dcnode-id="212" lang="" name="citation_abstract"><span data-dcnode-id="211" instrument_node="">

</span><h2 class="title" data-dcnode-id="100"><span data-dcnode-id="101" instrument_node="">
        Abstract
        
      </span></h2><span data-dcnode-id="99" instrument_node="">
</span><div class="abstract-content selected" data-dcnode-id="94" id="enc-abstract"><span data-dcnode-id="98" instrument_node="">
</span><p data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">
      
      Since the early 1970s, the health effects of indoor air pollution have been investigated with increasing intensity. Consequently, a large body of literature is now available on diverse aspects of indoor air pollution: sources, concentrations, health effects, engineering, and policy. This review begins with a review of the principal pollutants found in indoor environments and their sources. Subsequently, exposure to indoor air pollutants and health effects are considered, with an emphasis on those indoor air quality problems of greatest concern at present: passive exposure to tobacco smoke, nitrogen dioxide from gas-fueled cooking stoves, formaldehyde exposure, radon daughter exposure, and the diverse health problems encountered by workers in newer sealed office buildings. The review concludes by briefly addressing assessment of indoor air quality, control technology, research needs, and clinical implications.
    </span></p><span data-dcnode-id="95" instrument_node="">
