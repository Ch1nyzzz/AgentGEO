</span><h1 class="entry-title" data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Indoor Air Pollution: Sources and Effects</span></h1><p class="et_pb_title_meta_container" data-dcnode-id="1032"><a data-dcnode-id="1033" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//justenergy.com/blog/category/energy-conservation/" rel="category tag"><span data-dcnode-id="1034" instrument_node="">Energy Conservation</span></a></p><span data-dcnode-id="1031" instrument_node="">
</span></div><span data-dcnode-id="1029" instrument_node="">
</span></div><div class="et_pb_module et_pb_post_content et_pb_post_content_0_tb_body" data-dcnode-id="662" id="single-post-content"><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Whether it’s in school, the office, on the subway or simply at home, most people spend about 90% of their time indoors. And while we often talk about the amount of pollution in our atmosphere, we rarely consider the quality of the air that we’re breathing when we are inside.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">However, indoor air pollution has been shown to have considerable effects on both long and short term health and is thought to be responsible for 4.3 million deaths each year.[1] Find out what you can do to improve the quality of air in your home.</span></p><span data-dcnode-id="1021" instrument_node="">
</span><h2 data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">What Is Indoor Air Pollution?</span></h2><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Simply put, indoor air pollution refers to any contamination of the air within a building. Pollutants are generally grouped into the following categories: molds, solvents, pesticides, smoke, pet dander, and gases. Most properties will suffer from indoor air pollution to some degree. The quality of your indoor air (IAQ) is a measure of how the air inside of a building affects its occupants’ health and comfort.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Indoor air pollution has become a more pressing concern in recent years due to the construction of more energy-efficient homes. These properties tend to be relatively airtight, meaning that the air inside can quickly become stagnant and pollutant levels rapidly rise.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Elsewhere, the burning of fuels such as coal, wood, and gas for heating and cooking produce a large number of toxic chemicals. These include formaldehyde and carbon monoxide, as well as particulates and other dangerous compounds. Without effective ventilation, these chemicals are inhaled and can cause serious damage to your health in a myriad of ways.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><h2 data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">How Does Indoor Air Pollution Affect Human Health?</span></h2><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">A reduction in fresh air exchange in modern buildings has given rise to a phenomenon known as “sick building syndrome”, or SBS). This is commonly caused by a combination of poor ventilation and poorly-maintained air conditioning.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">The symptoms of sick building syndrome improve when you leave the premises and get worse the longer you stay there. The most common symptoms include:</span></p><span data-dcnode-id="1000" instrument_node="">
</span><ul data-dcnode-id="974"><span data-dcnode-id="999" instrument_node="">
</span><li data-dcnode-id="996"><span data-dcnode-id="997" style="font-weight: 400;"><span data-dcnode-id="998" instrument_node="">Headaches</span></span></li><span data-dcnode-id="995" instrument_node="">
</span><li data-dcnode-id="992"><span data-dcnode-id="993" style="font-weight: 400;"><span data-dcnode-id="994" instrument_node="">Blocked sinuses or a runny nose</span></span></li><span data-dcnode-id="991" instrument_node="">
</span><li data-dcnode-id="988"><span data-dcnode-id="989" style="font-weight: 400;"><span data-dcnode-id="990" instrument_node="">Skin rashes</span></span></li><span data-dcnode-id="987" instrument_node="">
</span><li data-dcnode-id="984"><span data-dcnode-id="985" style="font-weight: 400;"><span data-dcnode-id="986" instrument_node="">Itchy eyes</span></span></li><span data-dcnode-id="983" instrument_node="">
</span><li data-dcnode-id="980"><span data-dcnode-id="981" style="font-weight: 400;"><span data-dcnode-id="982" instrument_node="">Drowsiness</span></span></li><span data-dcnode-id="979" instrument_node="">
</span><li data-dcnode-id="976"><span data-dcnode-id="977" style="font-weight: 400;"><span data-dcnode-id="978" instrument_node="">Difficulty breathing</span></span></li><span data-dcnode-id="975" instrument_node="">
</span></ul><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Bear in mind that these symptoms are extremely common and can be caused by a wide range of issues including typical allergies. If you are experiencing these symptoms sporadically, or continually no matter where you are, it is unlikely that sick building syndrome is the cause.</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">If, however, you experience these symptoms—and they continue to get worse—every time you are in a certain building, SBS may be to blame. To alleviate the symptoms yourself, you can try the following:</span></p><span data-dcnode-id="967" instrument_node="">
</span><ul data-dcnode-id="947"><span data-dcnode-id="966" instrument_node="">
</span><li data-dcnode-id="963"><span data-dcnode-id="964" style="font-weight: 400;"><span data-dcnode-id="965" instrument_node="">Open windows or doors to let fresh air in</span></span></li><span data-dcnode-id="962" instrument_node="">
</span><li data-dcnode-id="957"><span data-dcnode-id="960" style="font-weight: 400;"><span data-dcnode-id="961" instrument_node="">Reduce the thermostat to about </span></span><span data-dcnode-id="958" style="font-weight: 400;"><span data-dcnode-id="959" instrument_node="">66°F</span></span></li><span data-dcnode-id="956" instrument_node="">
</span><li data-dcnode-id="953"><span data-dcnode-id="954" style="font-weight: 400;"><span data-dcnode-id="955" instrument_node="">Try taking more regular breaks from your desk</span></span></li><span data-dcnode-id="952" instrument_node="">
</span><li data-dcnode-id="949"><span data-dcnode-id="950" style="font-weight: 400;"><span data-dcnode-id="951" instrument_node="">Where possible take in some fresh air by walking outside</span></span></li><span data-dcnode-id="948" instrument_node="">
</span></ul><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">If you are experiencing these symptoms while you are at work you should ask your manager or employer to look into the cause of the problem. Alternatively, if this occurs in another building you rent, talk to your building manager or landlord. Some of the causes of sick building syndrome can be highly dangerous given continued exposure and should not be treated lightly.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="940"><a data-dcnode-id="941" data-wpel-link="internal" href="tel:+1-866-288-3105" rel="noopener noreferrer" target="_blank"><img alt="Looking for Terrific Home Energy Plans? Call 866-288-3015 - Just Energy Customer Service is Waiting!" class="aligncenter wp-image-12213 size-full" data-dcnode-id="942" data-popupalt-original-title="null" height="90" loading="lazy" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 720px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.justenergy.com/wp-content/uploads/2020/12/cta-banner-justenergy-rates-call-5.jpg&amp;raw" srcset="https://assets.justenergy.com/wp-content/uploads/2020/12/cta-banner-justenergy-rates-call-5.jpg 720w, https://assets.justenergy.com/wp-content/uploads/2020/12/cta-banner-justenergy-rates-call-5-480x60.jpg 480w" title="Looking for Terrific Home Energy Plans? Call 866-288-3015 - Just Energy Customer Service is Waiting!" width="720"></a></p><span data-dcnode-id="939" instrument_node="">
</span><h2 data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Sources of Indoor Air Pollution</span></h2><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">There are many sources that can be responsible for indoor air pollution, some of which are recognizable due to their odor, but there are many that fly under the radar.</span></p><span data-dcnode-id="933" instrument_node="">
</span><h3 data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Mold</span></h3><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Mold is a form of fungus which grows from spores that latch onto damp areas in buildings. It digests the materials it lands on, and can grow on many types of surfaces. It is prevalent in moist environments and is most common during the winter months and in more humid climates.</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">As there are many types of fungus that cause mold, it can take on a wide variety of features. Mold may be white, black, green or yellow, and can appear to be slick, fuzzy or rough in texture. Worryingly, mold can release a range of hazardous toxins into the air and can cause many different symptoms—and is a particular concern to babies, children, older adults, and those with existing skin problems, respiratory problems, or weakened immune systems.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="918" style="text-align: center;"><a data-dcnode-id="922" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//justenergy.com/blog/indoor-air-pollution-sources-and-effects/attachment/tobacco-smoke-indoor-air-pollution/" rel="attachment wp-att-13645"><img alt="Tobacco Smoke Indoor Air Pollution" class="aligncenter wp-image-13645 size-full" data-dcnode-id="923" data-popupalt-original-title="null" height="306" loading="lazy" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 600px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.justenergy.com/wp-content/uploads/2019/02/tobacco-smoke-indoor-air-pollution.jpg&amp;raw" srcset="https://assets.justenergy.com/wp-content/uploads/2019/02/tobacco-smoke-indoor-air-pollution.jpg 600w, https://assets.justenergy.com/wp-content/uploads/2019/02/tobacco-smoke-indoor-air-pollution-480x245.jpg 480w" title="Tobacco Smoke Indoor Air Pollution" width="600"></a><a data-dcnode-id="919" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/E2Za-uZQM7k" rel="follow external noopener noreferrer" target="_blank"><span data-dcnode-id="920" style="font-size: 8pt;"><span data-dcnode-id="921" instrument_node="">source</span></span></a></p><span data-dcnode-id="917" instrument_node="">
</span><h3 data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Tobacco Smoke</span></h3><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">A major cause of indoor air pollution, environmental tobacco smoke, or secondhand smoke—causes over 40,000 deaths in the U.S. each year.[2] The inhalation of cigarette smoke is particularly harmful to children, increasing the risk of sudden infant death syndrome (SIDS), severe asthma, ear problems, and acute respiratory infections.[3]</span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Moreover, cigarette smoke contains at least 70 carcinogens, chemicals that have been proven to cause cancers, as well as around 7,000 other chemicals that your body could do without.[4] When inhaled, these chemicals can cause illnesses such as chronic obstructive pulmonary disease (COPD) and other cardiovascular diseases which lead to heart attacks, as well as other serious complications.</span></p><span data-dcnode-id="908" instrument_node="">
</span><h3 data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Carpet</span></h3><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Carpets act like traps for indoor pollutants, easily absorbing mold spores, particulates from smoke, allergens, and other harmful substances. Research has found that even some toxic gases can settle into carpets.[5] While some may argue that this trap keeps occupants safe, pollutants caught in carpets can be easily disturbed simply by walking on them.</span></p><span data-dcnode-id="902" instrument_node="">
</span><h3 data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Household Products</span></h3><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Many day-to-day products present in almost every home can cause indoor air pollution. These include:</span></p><span data-dcnode-id="896" instrument_node="">
</span><ul data-dcnode-id="870"><span data-dcnode-id="895" instrument_node="">
</span><li data-dcnode-id="892"><span data-dcnode-id="893" style="font-weight: 400;"><span data-dcnode-id="894" instrument_node="">Cleaning agents and disinfectants</span></span></li><span data-dcnode-id="891" instrument_node="">
</span><li data-dcnode-id="888"><span data-dcnode-id="889" style="font-weight: 400;"><span data-dcnode-id="890" instrument_node="">Paints</span></span></li><span data-dcnode-id="887" instrument_node="">
</span><li data-dcnode-id="884"><span data-dcnode-id="885" style="font-weight: 400;"><span data-dcnode-id="886" instrument_node="">Glues and solvents</span></span></li><span data-dcnode-id="883" instrument_node="">
</span><li data-dcnode-id="880"><span data-dcnode-id="881" style="font-weight: 400;"><span data-dcnode-id="882" instrument_node="">Personal care products</span></span></li><span data-dcnode-id="879" instrument_node="">
</span><li data-dcnode-id="876"><span data-dcnode-id="877" style="font-weight: 400;"><span data-dcnode-id="878" instrument_node="">Air fresheners</span></span></li><span data-dcnode-id="875" instrument_node="">
</span><li data-dcnode-id="872"><span data-dcnode-id="873" style="font-weight: 400;"><span data-dcnode-id="874" instrument_node="">Candles</span></span></li><span data-dcnode-id="871" instrument_node="">
</span></ul><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">These products may emit volatile organic compounds (VOCs), which can cause issues such as eye, nose or throat irritation, headaches, nausea, organ damage, and even cancer in some extreme cases.[6]</span></p><span data-dcnode-id="866" instrument_node="">
</span><h3 data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Appliances</span></h3><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Many homes and offices contain space heaters, ovens, furnaces, fireplaces and water heaters that burn fuels such as gas, kerosene, oil, coal or wood for energy. As combustion can be extremely dangerous, most appliances are rigorously tested to ensure they are safe for use. However, if the appliance is faulty, it can produce toxic gases such as carbon monoxide, sulfur dioxide, and other compounds including hazardous aldehydes.</span></p><span data-dcnode-id="860" instrument_node="">
</span><h3 data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Radon</span></h3><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">A completely odorless and inert gas, radon can seep up through the ground and diffuse into the air in your building. When it undergoes decay, radon emits radiation which can attach to dust particles and pass into the lungs causing damage. Although it may seem strange, surveys have shown that radon concentration indoors is an order of magnitude higher than those typically found outdoors.[7]</span></p><span data-dcnode-id="854" instrument_node="">
</span><h3 data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Pet Dander</span></h3><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">You might not think of pet dander when you think of indoor pollutants, but for many allergy sufferers, it’s an acute irritant that can make some indoor environments vexing.&nbsp; Pet dander is comprised of microscopic flakes of skin shed by household pets, meaning that hairless breeds can cause symptoms like coughing, sneezing, watery eyes, and chest tightness.[8]</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">It is important to note that air temperature, humidity, and circulation can produce symptoms similar to those of indoor air pollution, and simply turning down the thermostat may help.</span></p><span data-dcnode-id="845" instrument_node="">
</span><h2 data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">How to Improve Indoor Air Quality</span></h2><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">So if you are suffering from indoor air pollution, how do you improve the quality of the air you’re breathing in? Let’s take a look at a few solutions.</span></p><span data-dcnode-id="839" instrument_node="">
</span><h3 data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">HEPA filters</span></h3><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">High-efficiency particulate air (HEPA) filters can be employed as air purifiers or attached to vacuum devices in order to remove dust, spores, mites and other particles from the air. According to The Institute of Environmental Sciences and Technology[9], an appliance can only be considered a HEPA filter if it traps 99.97% of particles 0.3 microns or larger.&nbsp;For context, emissions from a car starting up begin at 1 micron.</span></p><span data-dcnode-id="833" instrument_node="">
</span><h3 data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Vacuum</span></h3><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Vacuuming is extremely important to improve indoor air quality, especially if you have carpets and pets. It is recommended that you vacuum at least 3 times a week in order to keep dust levels low.</span></p><span data-dcnode-id="827" instrument_node="">
</span><h3 data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">HVAC filters</span></h3><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Heating, ventilation, and air conditioning filters, HVAC filters purify the air that enters and exits the various units located throughout your property. These filters ensure that your systems work efficiently and reduce the amount of irritating particles circulating in the air.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="818"><a data-dcnode-id="819" data-wpel-link="internal" href="tel:+1-866-288-3105" rel="noopener noreferrer" target="_blank"><img alt="Call Just Energy at 866-288-3015 - The Right Energy Plan for Your Home!" class="aligncenter wp-image-12204 size-full" data-dcnode-id="820" data-popupalt-original-title="null" height="90" loading="lazy" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 720px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.justenergy.com/wp-content/uploads/2020/12/cta-banner-justenergy-rates-call-2.jpg&amp;raw" srcset="https://assets.justenergy.com/wp-content/uploads/2020/12/cta-banner-justenergy-rates-call-2.jpg 720w, https://assets.justenergy.com/wp-content/uploads/2020/12/cta-banner-justenergy-rates-call-2-480x60.jpg 480w" title="Call Just Energy at 866-288-3015 - The Right Energy Plan for Your Home!" width="720"></a></p><span data-dcnode-id="817" instrument_node="">
</span><h3 data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Plants</span></h3><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Houseplants have been shown by NASA to be “nature’s life support system”, and are an essential component in improving indoor air quality. They not only absorb carbon dioxide from the air, but particulates that attach to CO2 too. Microorganisms in the soil have also been found to remove volatile organic compounds from the air.[10]</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">These same NASA findings also suggest that indoor plants are an excellent way to help control air pollution and mitigate its effects.</span></p><span data-dcnode-id="808" instrument_node="">
</span><h3 data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Reduce clutter</span></h3><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">The more clutter you have in your home, the more places there are for dust to hide. Decluttering will not only help clear your mind, but help clean the air too!</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="797" style="text-align: center;"><a data-dcnode-id="800" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//justenergy.com/blog/indoor-air-pollution-sources-and-effects/attachment/outdoor-air-pollution-city-foggy-polluted/" rel="attachment wp-att-13641"><img alt="Outdoor Air Pollution | City Foggy Polluted" class="aligncenter size-full wp-image-13641" data-dcnode-id="801" data-popupalt-original-title="null" height="273" loading="lazy" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 600px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.justenergy.com/wp-content/uploads/2019/02/outdoor-air-pollution-city-foggy-polluted.jpg&amp;raw" srcset="https://assets.justenergy.com/wp-content/uploads/2019/02/outdoor-air-pollution-city-foggy-polluted.jpg 600w, https://assets.justenergy.com/wp-content/uploads/2019/02/outdoor-air-pollution-city-foggy-polluted-480x218.jpg 480w" title="Outdoor Air Pollution | City Foggy Polluted" width="600"></a><span data-dcnode-id="798" style="font-size: 8pt;"><span data-dcnode-id="799" instrument_node="">source</span></span></p><span data-dcnode-id="796" instrument_node="">
</span><h2 data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Next Steps in Reducing Air Pollution</span></h2><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="792" instrument_node="">Aside from all the household sources of indoor air pollution, you might also be worried about outdoor air pollution, especially if you live in an area with lots of car traffic or local industry. </span><a data-dcnode-id="790" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//justenergy.com/blog/health-effects-air-pollution-solutions/"><span data-dcnode-id="791" instrument_node="">Outdoor air pollution</span></a><span data-dcnode-id="789" instrument_node=""> is a public health problem in many densely populated areas, but anywhere you live, you can make an effort to reduce your contribution by using less energy at home. Adopt a </span><a data-dcnode-id="787" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//justenergy.com/blog/are-smart-thermostats-worth-it/"><span data-dcnode-id="788" instrument_node="">smart thermostat</span></a><span data-dcnode-id="786" instrument_node="">, buy green energy, or even go car-free certain days of the week to help lower your individual footprint!</span></p><span data-dcnode-id="784" instrument_node="">
