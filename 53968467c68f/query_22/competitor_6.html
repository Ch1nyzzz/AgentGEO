    </span></button><span data-dcnode-id="1737" instrument_node=""> </span><span data-dcnode-id="1735" instrument_node=""> </span><span data-dcnode-id="1733" instrument_node=""> </span><div class="v-portal" data-dcnode-id="1732" style="display: none;"></div><span data-dcnode-id="1731" instrument_node=""> </span></div></div><span data-dcnode-id="1727" instrument_node=""> </span><a class="hidden md:block btn btn--gray-light w-full mt-2 px-0 text-xs" data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating"><span data-dcnode-id="1726" instrument_node="">+ Shop Cooling &amp; Heating </span></a></div></div></div></div></div></div><span data-dcnode-id="1718" instrument_node=""> </span><img alt="Snowflake divider image" class="w-full" data-dcnode-id="1717" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/assets/air-conditioner-buying-guide/divider.png&amp;raw"><span data-dcnode-id="1716" instrument_node=""> </span><div class="container pb-20 markdown" data-dcnode-id="1531"><h2 class="text-center text-custom-aircon" data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">What To Consider</span></h2><span data-dcnode-id="1713" instrument_node=""> </span><p class="text-center py-2" data-dcnode-id="1708"><span data-dcnode-id="1712" instrument_node="">When comparing </span><a data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1711" instrument_node="">air conditioners</span></a><span data-dcnode-id="1709" instrument_node=""> there are a few key things to consider;</span></p><span data-dcnode-id="1707" instrument_node=""> </span><div class="grid grid-cols-1 md:grid-cols-2 gap-20 text-center" data-dcnode-id="1532"><div class="markdown" data-dcnode-id="1656"><img alt="Power icon" class="mx-auto" data-dcnode-id="1706" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/assets/air-conditioner-buying-guide/consider-power.png&amp;raw"><span data-dcnode-id="1705" instrument_node=""> </span><h3 class="text-3xl text-custom-aircon-light" data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Power</span></h3><span data-dcnode-id="1702" instrument_node=""> </span><p data-dcnode-id="1697"><span data-dcnode-id="1701" instrument_node="">How much power are you going to need to adequately cool your home? </span><a data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1700" instrument_node="">Air conditioners</span></a><span data-dcnode-id="1698" instrument_node=""> vary in power output. If you choose one with an output that is too low for the space you’re trying to cool, you’ll find it won’t cool your space down very well.</span></p><span data-dcnode-id="1696" instrument_node=""> </span><p class="mt-2" data-dcnode-id="1688"><span data-dcnode-id="1695" instrument_node="">Generally, if you’re wondering what size </span><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1694" instrument_node="">air conditioner</span></a><span data-dcnode-id="1692" instrument_node=""> to buy you’ll want to follow these guidelines when selecting an </span><a data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1691" instrument_node="">air conditioner</span></a><span data-dcnode-id="1689" instrument_node="">:</span></p><span data-dcnode-id="1687" instrument_node=""> </span><ul class="mt-2" data-dcnode-id="1657"><li class="list-none" data-dcnode-id="1682"><span data-dcnode-id="1686" instrument_node="">For rooms up to 20 m</span><sup data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">2</span></sup><span data-dcnode-id="1683" instrument_node=""> you will need air conditioners that are 2 - 2.5 kW</span></li><span data-dcnode-id="1681" instrument_node=""> </span><li class="list-none" data-dcnode-id="1676"><span data-dcnode-id="1680" instrument_node="">For rooms 20 - 40 m</span><sup data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">2</span></sup><span data-dcnode-id="1677" instrument_node=""> you will need air conditioners that are 2.5 - 5 kW</span></li><span data-dcnode-id="1675" instrument_node=""> </span><li class="list-none" data-dcnode-id="1670"><span data-dcnode-id="1674" instrument_node="">For rooms 40 - 60 m</span><sup data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">2</span></sup><span data-dcnode-id="1671" instrument_node=""> you will need air conditioners that are 4 - 6 kW</span></li><span data-dcnode-id="1669" instrument_node=""> </span><li class="list-none" data-dcnode-id="1664"><span data-dcnode-id="1668" instrument_node="">For rooms 60 - 80 m</span><sup data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">2</span></sup><span data-dcnode-id="1665" instrument_node=""> you will need air conditioners that are 5 - 7 kW</span></li><span data-dcnode-id="1663" instrument_node=""> </span><li class="list-none" data-dcnode-id="1658"><span data-dcnode-id="1662" instrument_node="">For rooms 80+ m</span><sup data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">2</span></sup><span data-dcnode-id="1659" instrument_node=""> you will need air conditioners that are 6 - 9 kW</span></li></ul></div><span data-dcnode-id="1655" instrument_node=""> </span><div class="markdown" data-dcnode-id="1617"><img alt="Cost icon" class="mx-auto" data-dcnode-id="1654" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/assets/air-conditioner-buying-guide/consider-cost.png&amp;raw"><span data-dcnode-id="1653" instrument_node=""> </span><h3 class="text-3xl text-custom-aircon-light" data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Cost</span></h3><span data-dcnode-id="1650" instrument_node=""> </span><p data-dcnode-id="1618"><span data-dcnode-id="1649" instrument_node="">How much do </span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1648" instrument_node="">air conditioners</span></a><span data-dcnode-id="1646" instrument_node=""> cost? The cost to purchase an </span><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1645" instrument_node="">air conditioner</span></a><span data-dcnode-id="1643" instrument_node=""> could range from a few hundred dollars to thousands. Factors that can impact pricing include the size, type, brand and features of the model you are purchasing. Time of year can also have an impact, as </span><a data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1642" instrument_node="">air conditioners</span></a><span data-dcnode-id="1640" instrument_node=""> are sometimes cheaper to purchase and </span><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/delivery"><span data-dcnode-id="1639" instrument_node="">install</span></a><span data-dcnode-id="1637" instrument_node=""> in the off-season months. You may also need to factor in </span><a data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/delivery"><span data-dcnode-id="1636" instrument_node="">installation</span></a><span data-dcnode-id="1634" instrument_node=""> costs, as certain types of </span><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1633" instrument_node="">air conditioners</span></a><span data-dcnode-id="1631" instrument_node=""> such as </span><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning/split-system-air-conditioners"><span data-dcnode-id="1630" instrument_node="">split system</span></a><span data-dcnode-id="1628" instrument_node=""> and evaporative, will need to be </span><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/delivery"><span data-dcnode-id="1627" instrument_node="">installed</span></a><span data-dcnode-id="1625" instrument_node=""> by a professional. Once your system is </span><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/delivery"><span data-dcnode-id="1624" instrument_node="">installed</span></a><span data-dcnode-id="1622" instrument_node=""> you’ll also need to think about ongoing running costs and maintenance. </span><a data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1621" instrument_node="">Air conditioners</span></a><span data-dcnode-id="1619" instrument_node=""> with features like human detection and eco settings can save money on running costs.</span></p></div><span data-dcnode-id="1616" instrument_node=""> </span><div class="markdown" data-dcnode-id="1602"><img alt="Fan speed icon" class="mx-auto" data-dcnode-id="1615" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/assets/air-conditioner-buying-guide/consider-fan-speed.png&amp;raw"><span data-dcnode-id="1614" instrument_node=""> </span><h3 class="text-3xl text-custom-aircon-light" data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Fan speed</span></h3><span data-dcnode-id="1611" instrument_node=""> </span><p data-dcnode-id="1603"><span data-dcnode-id="1610" instrument_node="">Most </span><a data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1609" instrument_node="">air conditioners</span></a><span data-dcnode-id="1607" instrument_node=""> will use a fan to circulate warm or cool air around a room. It’s a good idea to look for models that have multiple fan speed options; from high - for fast cooling, to low - to keep noise and draftiness at a minimum. Some </span><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1606" instrument_node="">air conditioners</span></a><span data-dcnode-id="1604" instrument_node=""> will have automatic settings, to adjust to the conditions in your home, and energy efficient eco settings.</span></p></div><span data-dcnode-id="1601" instrument_node=""> </span><div class="markdown" data-dcnode-id="1587"><img alt="Noise icon" class="mx-auto" data-dcnode-id="1600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/assets/air-conditioner-buying-guide/consider-noise.png&amp;raw"><span data-dcnode-id="1599" instrument_node=""> </span><h3 class="text-3xl text-custom-aircon-light" data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Noise</span></h3><span data-dcnode-id="1596" instrument_node=""> </span><p data-dcnode-id="1588"><span data-dcnode-id="1595" instrument_node="">A noisy </span><a data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1594" instrument_node="">air conditioner</span></a><span data-dcnode-id="1592" instrument_node=""> can be disruptive to your daily activities. Before you purchase a new </span><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1591" instrument_node="">air conditioner</span></a><span data-dcnode-id="1589" instrument_node="">, it’s a good idea to consider how much noise it produces. Most will range from about 19 dB to about 53 dB. Under 30 dB is around the typical noise level you would expect from a quieter home. A system that is too loud inside the home may keep you awake or become annoying, whilst noisy outside exhaust fans may bother your neighbours.</span></p></div><span data-dcnode-id="1586" instrument_node=""> </span><div class="markdown" data-dcnode-id="1569"><img alt="Location icon" class="mx-auto" data-dcnode-id="1585" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/assets/air-conditioner-buying-guide/consider-location.png&amp;raw"><span data-dcnode-id="1584" instrument_node=""> </span><h3 class="text-3xl text-custom-aircon-light" data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Location</span></h3><span data-dcnode-id="1581" instrument_node=""> </span><p data-dcnode-id="1570"><span data-dcnode-id="1580" instrument_node="">Before you choose your new </span><a data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1579" instrument_node="">air conditioner</span></a><span data-dcnode-id="1577" instrument_node="">, you should take the time to consider where it will be positioned. Finding the best location for your </span><a data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1576" instrument_node="">air conditioner</span></a><span data-dcnode-id="1574" instrument_node=""> will help you to more efficiently cool your home down. A </span><a data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning/split-system-air-conditioners"><span data-dcnode-id="1573" instrument_node="">split system</span></a><span data-dcnode-id="1571" instrument_node=""> facing an open place space for instance, may do more to cool down your home than one that blows directly onto another wall.</span></p></div><span data-dcnode-id="1568" instrument_node=""> </span><div class="markdown" data-dcnode-id="1557"><img alt="Features icon" class="mx-auto" data-dcnode-id="1567" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/assets/air-conditioner-buying-guide/consider-features.png&amp;raw"><span data-dcnode-id="1566" instrument_node=""> </span><h3 class="text-3xl text-custom-aircon-light" data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Features</span></h3><span data-dcnode-id="1563" instrument_node=""> </span><p data-dcnode-id="1558"><span data-dcnode-id="1562" instrument_node="">Many </span><a data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1561" instrument_node="">air conditioners</span></a><span data-dcnode-id="1559" instrument_node=""> come with clever extra features like mobile app control, human presence sensors and sleep modes. Features like delay modes and demand response enabling can also help you to manage your energy costs and take advantage of off-peak tariffs.</span></p></div><span data-dcnode-id="1556" instrument_node=""> </span><div class="markdown" data-dcnode-id="1533"><img alt="Installation icon" class="mx-auto" data-dcnode-id="1555" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/assets/air-conditioner-buying-guide/consider-installation.png&amp;raw"><span data-dcnode-id="1554" instrument_node=""> </span><h3 class="text-3xl text-custom-aircon-light" data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Installation</span></h3><span data-dcnode-id="1551" instrument_node=""> </span><p data-dcnode-id="1534"><span data-dcnode-id="1550" instrument_node="">Almost all </span><a data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1549" instrument_node="">air conditioners</span></a><span data-dcnode-id="1547" instrument_node=""> will require professional </span><a data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/delivery"><span data-dcnode-id="1546" instrument_node="">installation</span></a><span data-dcnode-id="1544" instrument_node=""> unless they are </span><a data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning/portable-air-conditioners"><span data-dcnode-id="1543" instrument_node="">portable</span></a><span data-dcnode-id="1541" instrument_node="">. Professional </span><a data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/delivery"><span data-dcnode-id="1540" instrument_node="">installation</span></a><span data-dcnode-id="1538" instrument_node=""> ensures that your new air-con unit is handled correctly and safely. Incorrect installation could void your warranty, so it’s important it’s done right. At Retravision we offer </span><a data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/delivery"><span data-dcnode-id="1537" instrument_node="">professional delivery and install</span></a><span data-dcnode-id="1535" instrument_node="">, so you can rest easy!</span></p></div></div></div><span data-dcnode-id="1530" instrument_node=""> </span><div class="bg-custom-aircon-lighter py-8" data-dcnode-id="1385"><div class="container container--py markdown" data-dcnode-id="1386"><h2 class="text-custom-aircon" data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">FAQs</span></h2><span data-dcnode-id="1527" instrument_node=""> </span><h4 class="text-gray-darksubtle" data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Do portable air conditioners use a lot of electricity?</span></h4><span data-dcnode-id="1524" instrument_node=""> </span><p data-dcnode-id="1520"><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning/portable-air-conditioners"><span data-dcnode-id="1523" instrument_node="">Portable air conditioners</span></a><span data-dcnode-id="1521" instrument_node="">, whilst very convenient and affordable upfront, are not the most energy efficient option on the market. Most use quite a lot of power relative to their size and can quickly become expensive to run all the time. They are best used in smaller spaces over shorter periods of time, trying to cool your whole home with one will likely leave you with a big energy bill at the end of the month. </span></p><span data-dcnode-id="1519" instrument_node=""> </span><h4 class="text-gray-darksubtle" data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">What should I look for when buying an air conditioner?</span></h4><span data-dcnode-id="1516" instrument_node=""> </span><p data-dcnode-id="1508"><span data-dcnode-id="1515" instrument_node="">There are a number of things you should look for when buying a new </span><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1514" instrument_node="">air conditioner</span></a><span data-dcnode-id="1512" instrument_node="">. Firstly, you should consider the type of </span><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1511" instrument_node="">air conditioner</span></a><span data-dcnode-id="1509" instrument_node=""> and how much power it uses. Look at measurements like its energy efficiency rating and its dehumidification level, which tells you how much moisture it removes from the air. You should also consider features such as energy saving switches, check filter lights, oscillating vents, sleep modes, app control and timers - all of which can help you to control your energy usage. It’s also important to check out the manufacturing warranties on the models that you are considering. </span></p><span data-dcnode-id="1507" instrument_node=""> </span><h4 class="text-gray-darksubtle" data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">What is the disadvantage of inverter AC?</span></h4><span data-dcnode-id="1504" instrument_node=""> </span><p data-dcnode-id="1496"><span data-dcnode-id="1503" instrument_node="">The main disadvantage of an </span><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning/split-system-air-conditioners"><span data-dcnode-id="1502" instrument_node="">inverter AC</span></a><span data-dcnode-id="1500" instrument_node=""> is that they can be an expensive investment initially, although they will save you a lot in running costs. For some, the need to use a </span><a data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/delivery"><span data-dcnode-id="1499" instrument_node="">professional installer</span></a><span data-dcnode-id="1497" instrument_node=""> can also be off-putting. </span></p><span data-dcnode-id="1495" instrument_node=""> </span><h4 class="text-gray-darksubtle" data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Are energy efficient air conditioners worth it?</span></h4><span data-dcnode-id="1492" instrument_node=""> </span><p data-dcnode-id="1478"><span data-dcnode-id="1491" instrument_node="">With energy costs on the rise in Australia, it’s certainly worth considering investing in an </span><a data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1490" instrument_node="">air conditioner</span></a><span data-dcnode-id="1488" instrument_node=""> with energy saving features. Energy efficient units could save you a lot of money in running costs, and are particularly worthwhile if you live in a fairly hot climate and need to run your </span><a data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1487" instrument_node="">AC</span></a><span data-dcnode-id="1485" instrument_node=""> often. Many Australians will run their </span><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1484" instrument_node="">air conditioners</span></a><span data-dcnode-id="1482" instrument_node=""> consistently throughout summer, and find that their energy bills are much higher as a result. To avoid a nasty bill shock at the end of the month, we recommend investing in </span><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1481" instrument_node="">AC's</span></a><span data-dcnode-id="1479" instrument_node=""> with better energy efficiency ratings. </span></p><span data-dcnode-id="1477" instrument_node=""> </span><h4 class="text-gray-darksubtle" data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">How much should a new air conditioner cost?</span></h4><span data-dcnode-id="1474" instrument_node=""> </span><p data-dcnode-id="1460"><span data-dcnode-id="1473" instrument_node="">How much your </span><a data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1472" instrument_node="">air conditioner</span></a><span data-dcnode-id="1470" instrument_node=""> should cost will depend on a number of factors; like the type and how many units you're planning to purchase and </span><a data-dcnode-id="1468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/delivery"><span data-dcnode-id="1469" instrument_node="">install</span></a><span data-dcnode-id="1467" instrument_node="">. A </span><a data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning/split-system-air-conditioners"><span data-dcnode-id="1466" instrument_node="">split system</span></a><span data-dcnode-id="1464" instrument_node=""> for instance may cost you just a few hundred dollars or up to $5000 or more if you’re planning to </span><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/delivery"><span data-dcnode-id="1463" instrument_node="">install</span></a><span data-dcnode-id="1461" instrument_node=""> several units around your home. How much you ultimately pay will depend on your unique requirements. </span></p><span data-dcnode-id="1459" instrument_node=""> </span><h4 class="text-gray-darksubtle" data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Is it cheaper to buy an air conditioner in the winter?</span></h4><span data-dcnode-id="1456" instrument_node=""> </span><p data-dcnode-id="1430"><span data-dcnode-id="1455" instrument_node="">In many cases it can be cheaper to buy an </span><a data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1454" instrument_node="">air conditioner</span></a><span data-dcnode-id="1452" instrument_node=""> in the winter. Not only will you find discounts available on purchasing </span><a data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1451" instrument_node="">AC models</span></a><span data-dcnode-id="1449" instrument_node="">, you’ll also find that many </span><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/delivery"><span data-dcnode-id="1448" instrument_node="">installers</span></a><span data-dcnode-id="1446" instrument_node=""> will perform work more cheaply. Many </span><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning/portable-air-conditioners"><span data-dcnode-id="1445" instrument_node="">portable</span></a><span data-dcnode-id="1443" instrument_node="">, </span><a data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning/window-air-conditioners"><span data-dcnode-id="1442" instrument_node="">window</span></a><span dat -id="1419" instrument_node=""> you’re operating in your home. Generally you can expect running an </span><a data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1418" instrument_node="">air con</span></a><span data-dcnode-id="1416" instrument_node=""> of medium size to cost you between $400-$500 a year* . These costs may increase if you are cooling larger areas or using your </span><a data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/cooling-heating/air-conditioning"><span data-dcnode-id="1415" instrument_node="">air conditioner</span></a><span data-dcnode-id="1413" instrument_node=""> to heat your home.</span></p><span data-dcnode-id="1411" instrument_node=""> </span><h4 class="text-gray-darksubtle" data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">How can you save on air conditioning costs?</span></h4><span data-dcnode-id="1408" instrument_node=""> </span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Here are some tips to keep in mind if you’d like to keep your electricity bill to a minimum:</span></p><span data-dcnode-id="1405" instrument_node=""> </span><ol data-dcnode-id="1387"><li data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Ensure your home is properly insulated as this can increase the efficiency and effectiveness of your air-con</span></li><span data-dcnode-id="1402" instrument_node=""> </span><li data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Clean your filters regularly</span></li><span data-dcnode-id="1399" instrument_node=""> </span><li data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Use energy saving features</span></li><span data-dcnode-id="1396" instrument_node=""> </span><li data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Keep </span></label><span data-dcnode-id="1062" instrument_node=""> </span><select class="form-select w-full" data-dcnode-id="999" name="MERGE13"><option data-dcnode-id="1060">Please select...</option> <option data-dcnode-id="1057" value="Online">I'm an online shopper...</option> <option data-code="6841" data-dcnode-id="1054" value="Murray Oakley Discount Electrical Retravision">Murray Oakley Discount Electrical Retravision</option> <option data-code="6220" data-dcnode-id="1051" value="Retravision Albany">Retravision Albany</option> <option data-code="6240" data-dcnode-id="1048" value="Retravision Bridgetown">Retravision Bridgetown</option> <option data-code="6215" data-dcnode-id="1045" value="Retravision Bunbury">Retravision Bunbury</option> <option data-code="6222" data-dcnode-id="1042" value="Retravision Busselton">Retravision Busselton</option> <option data-code="6162" data-dcnode-id="1039" value="Retravision Cannington">Retravision Cannington</option> <option data-code="6210" data-dcnode-id="1036" value="Retravision Esperance">Retravision Esperance</option> <option data-code="6330" data-dcnode-id="1033" value="Mitchell and Brown Retravision Geraldton">Mitchell and Brown Retravision Geraldton</option> <option data-code="6457" data-dcnode-id="1030" value="Retravision Harvey">Retravision Harvey</option> <option data-code="6168" data-dcnode-id="1027" value="Retravision Joondalup">Retravision Joondalup</option> <option data-code="6916" data-dcnode-id="1024" value="Retravision Kadina">Retravision Kadina</option> <option data-code="6206" data-dcnode-id="1021" value="Retravision Kalgoorlie - Electrical, Furniture &amp; Bedding">Retravision Kalgoorlie - Electrical, Furniture &amp; Bedding</option> <option data-code="6190" data-dcnode-id="1018" value="Retravision Karratha">Retravision Karratha</option> <option data-code="6313" data-dcnode-id="1015" value="Retravision Kununurra">Retravision Kununurra</option> <option data-code="6214" data-dcnode-id="1012" value="Retravision Manjimup">Retravision Manjimup</option> <option data-code="6217" data-dcnode-id="1009" value="Retravision Margaret River">Retravision Margaret River</option> <option data-code="6164" data-dcnode-id="1006" value="Retravision O'Connor">Retravision O'Connor</option> <option data-code="6129" data-dcnode-id="1003" value="Retravision Osborne Park">Retravision Osborne Park</option> <option data-code="6312" data-dcnode-id="1000" value="Retravision South Hedland">Retravision South Hedland</option></select></div></div><span data-dcnode-id="996" instrument_node=""> </span><input data-dcnode-id="995" name="MERGE12" type="hidden" value=""><span data-dcnode-id="994" instrument_node=""> </span><div class="clear" data-dcnode-id="990" id="mce-responses"><div class="response" data-dcnode-id="993" id="mce-error-response" style="display: none;"></div><span data-dcnode-id="992" instrument_node=""> </span><div class="response" data-dcnode-id="991" id="mce-success-response" style="display: none;"></div></div><span data-dcnode-id="989" instrument_node=""> </span><div aria-hidden="true" data-dcnode-id="987" style="position: absolute; left: -5000px;"><input data-dcnode-id="988" name="b_fa8981bcfba1c4c5b6c230beb_a0aa4ac966" tabindex="-1" type="text" value=""></div><span data-dcnode-id="986" instrument_node=""> </span><input class="button btn btn--secondary sm:w-auto w-full" data-dcnode-id="985" id="mc-embedded-subscribe" name="subscribe" type="submit" value="Subscribe"></div></form></div></div></div><span data-dcnode-id="979" instrument_node=""> </span><p class="mt-6" data-dcnode-id="974"><span data-dcnode-id="978" instrument_node="">You can view our Data Collection statement </span><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/privacy-policy" target="_blank"><span data-dcnode-id="977" instrument_node="">here</span></a><span data-dcnode-id="975" instrument_node="">.</span></p></div></div></div><span data-dcnode-id="970" instrument_node=""> </span><div aria-hidden="true" class="modal micromodal-slide" data-dcnode-id="915" id="click-collect-modal"><div class="modal__overlay" data-dcnode-id="916" data-micromodal-close="" tabindex="-1"><div aria-labelledby="subscribe-modal-title" aria-modal="true" class="modal__container relative" data-dcnode-id="917" role="dialog"><button class="modal__close" data-dcnode-id="968"><i aria-label="Close modal" class="modal__close-icon icon icon-cross" data-dcnode-id="969" data-micromodal-close=""></i></button><span data-dcnode-id="967" instrument_node=""> </span><h3 class="mb-6" data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">How does 2 Hour Click &amp; Collect work?</span></h3><span data-dcnode-id="964" instrument_node=""> </span><div class="markdown text-sm" data-dcnode-id="918"><p data-dcnode-id="961"><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/click-and-collect-terms-and-conditions"><span data-dcnode-id="963" instrument_node="">Tell me about Retravision's COVID-19 protocols for Click &amp; Collect</span></a></p><ol data-dcnode-id="923" start="1"><li data-dcnode-id="958"><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Select your products, add to your Cart and proceed to Checkout;</span></p></li><li data-dcnode-id="955"><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Enter the ‘Postcode’ and ‘Suburb’ from which you wish to collect, during ‘Step 1 - Billing Details’ of the checkout;</span></p></li><li data-dcnode-id="952"><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">During ‘Step 2 - Delivery Options’ of the checkout, select your preferred Retravision collection location;</span></p></li><li data-dcnode-id="949"><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Once you have selected your preferred Retravision collection location, you can proceed to the next stage of the checkout, and complete the rest of your order as normal;</span></p></li><li data-dcnode-id="946"><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Retravision will send you a receipt confirmation email of your order, once validated, you will receive a Tax Invoice, which you will be required to present at the time of collecting your order, from your chosen Retravision store;</span></p></li><li data-dcnode-id="943"><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Collect your purchase from your nominated Retravision store.</span></p></li><li data-dcnode-id="940"><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Your Retravision purchase is subject to a fraud analytic pre-screening that is undertaken during the payment process. If there are any difficulties with processing your order, you will be contacted by the Retravision Online Team to discuss the status of your purchase. Retravision Online reserves the right to cancel any orders which do not pass our fraud checks. For privacy reasons, we may not be able to disclose the reason for your order being cancelled. For further information please contact the Retravision Online Team at online@retravision.com.au or phone 1300 173 872.</span></p></li><li data-dcnode-id="937"><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">The ability of Retravision to organise the collection of your purchase, including within the specified time frames, is subject to anything outside the reasonable control of Retravision.</span></p></li><li data-dcnode-id="927"><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">If you elect to use Click &amp; Collect, you will receive the following from Retravision:</span></p><ol data-dcnode-id="928" start="1"><li data-dcnode-id="932"><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">a confirmation email confirming receipt of your order</span></p></li><li data-dcnode-id="929"><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">an email attaching your tax invoice from Retravision.</span></p></li></ol></li><li data-dcnode-id="924"><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">To the extent that these Click &amp; Collect Terms and Conditions conflict with or are contradictory to the general Retravision Terms and Conditions of Sale, these Click &amp; Collect Terms and Conditions prevail to the extent of any inconsistency.</span></p></li></ol><span data-dcnode-id="922" instrument_node=""> </span><p class="text-center" data-dcnode-id="919"><a class="btn btn--secondary" data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/click-and-collect-terms-and-conditions"><span data-dcnode-id="921" instrument_node="">More Info</span></a></p></div></div></div></div><span data-dcnode-id="914" instrument_node=""> </span><div aria-hidden="true" class="modal micromodal-slide" data-dcnode-id="612" id="delivery-modal"><div class="modal__overlay" data-dcnode-id="613" data-micromodal-close="" tabindex="-1"><div aria-labelledby="subscribe-modal-title" aria-modal="true" class="modal__container relative" data-dcnode-id="614" role="dialog"><button class="modal__close" data-dcnode-id="912"><i aria-label="Close modal" class="modal__close-icon icon icon-cross" data-dcnode-id="913" data-micromodal-close=""></i></button><span data-dcnode-id="911" instrument_node=""> </span><h3 class="mb-6" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Delivery Information</span></h3><span data-dcnode-id="908" instrument_node=""> </span><div class="markdown text-sm" data-dcnode-id="615"><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Retravision provides delivery services to the majority of Australia, however, the type of services and the cost will vary dependent on a number of factors </span></p><ul data-dcnode-id="896"><li data-dcnode-id="903"><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Where the stock is coming from (Warehouse).</span></p></li><li data-dcnode-id="900"><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Where you are located.</span></p></li><li data-dcnode-id="897"><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">The size of the package(s) being delivered.</span></p></li></ul><h4 data-dcnode-id="893"><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">In our Retravision delivery service areas </span></strong></h4><p data-dcnode-id="890"><strong data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">For Larger Items (generally anything &gt; 25kg)</span></strong></p><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Retravision offers in Home Delivery Services to selected areas within Western Australia, South Australia, Northern Territory, Victoria, New South Wales and Queensland. </span></p><p data-dcnode-id="885"><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">For Smaller Items (generally anything &lt; 25kg)</span></strong></p><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Retravision partners with a number of courier services. A dynamic delivery quote can be obtained by entering your postcode/suburb on the product page, or in the checkout.</span></p><p data-dcnode-id="880"><strong data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">For All Items</span></strong></p><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">For areas that we are unable to service via our in home delivery service, we attempt to provide a courier/post option.</span></p><h4 data-dcnode-id="875"><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Home Delivery Services </span></strong></h4><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">You can obtain pricing and information on available delivery services by entering your postcode/suburb on the product page, or at checkout.</span></p><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Our affiliated transport company will make contact with you to arrange a suitable delivery day and time window, while a precise time is not guaranteed, we will provide you with one of the following.</span></p><ul data-dcnode-id="864"><li data-dcnode-id="868"><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">A text message/call 30 minutes prior to your delivery.</span></p></li><li data-dcnode-id="865"><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">or A tracking link, so you can live-track the progress of your delivery.</span></p></li></ul><p data-dcnode-id="861"><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Timeframes</span></strong></p><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">If a delivery timeframe is not provided at the time of checkout, the following guidelines generally apply.</span></p><ul data-dcnode-id="835"><li data-dcnode-id="856"><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">If items are in stock, Home Delivery services are normally completed between [1 - 3] Business Days and temporarily [7-10] Business Days for NSW which is a fair estimate based on an average of delivery times.*</span></p></li><li data-dcnode-id="848"><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">If there are any delays, such as warehouse transfer delays, then we will notify you at time of booking your delivery.</span></p><p data-dcnode-id="849"><strong data-dcnode-id="850"><em data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">***PLEASE NOTE</span></em><span data-dcnode-id="851" instrument_node="">*** </span></strong></p></li><li data-dcnode-id="844"><p data-dcnode-id="845"><strong data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">There are sometimes delays in shipping when one or more of our warehouses are affected by a partial or full shutdown due to the ongoing issues with the Corona Virus pandemic. Retravision and our delivery partners will keep you informed along the way if there are any abnormal delays with your delivery. </span></strong></p></li><li data-dcnode-id="840"><p data-dcnode-id="841"><strong data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">We have a number of temporary measures in place during the surge in cases of the Omicron variant of Coronavirus. Our NSW deliveries are fulfilled from our QLD Warehouse which creates a transfer delay of up to 7 days. </span></strong></p></li><li data-dcnode-id="836"><p data-dcnode-id="837"><strong data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">We will continue to adjust our delivery parameters to ensure the safety of our staff, delivery partners and our customers, whilst still maintaining our best effort to delivery to our customers in a reasonable timeframe.</span></strong></p></li></ul><h4 data-dcnode-id="832"><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Retravision Delivery Service (Selected Areas in WA)</span></strong></h4><ul data-dcnode-id="822"><li data-dcnode-id="829"><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node=""> Delivery to the address nominated at checkout.</span></p></li><li data-dcnode-id="826"><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node=""> Locating the appliance to the appropriate room where practically possible.</span></p></li><li data-dcnode-id="823"><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node=""> Unpacking and taking away the packaging.</span></p></li></ul><h4 data-dcnode-id="819"><strong data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">All other states (subject to availability)</span></strong></h4><p data-dcnode-id="816"><strong data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Retravision Bronze Delivery</span></strong></p><ul data-dcnode-id="809"><li data-dcnode-id="813"><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node=""> Delivery to the address nominated at checkout.</span></p></li><li data-dcnode-id="810"><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node=""> Locating the appliance to the appropriate room where practically possible.</span></p></li></ul><p data-dcnode-id="806"><strong data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Retravision Silver Delivery</span></strong></p><ul data-dcnode-id="796"><li data-dcnode-id="803"><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node=""> Delivery to the address nominated at checkout.</span></p></li><li data-dcnode-id="800"><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node=""> Locating the appliance to the appropriate room where practically possible.</span></p></li><li data-dcnode-id="797"><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node=""> Unpack and taking away the packaging.</span></p></li></ul><p data-dcnode-id="793"><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Retravision Gold Delivery</span></strong></p><ul data-dcnode-id="780"><li data-dcnode-id="790"><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node=""> Delivery to the address nominated at checkout.</span></p></li><li data-dcnode-id="787"><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node=""> Unpack and taking away the packaging.</span></p></li><li data-dcnode-id="784"><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node=""> Locating the appliance to the appropriate room/alcove where practically possible.</span></p></li><li data-dcnode-id="781"><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node=""> Taking away and disposal of the appliance that is being replaced.</span></p></li></ul><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">*In NSW, QLD and VIC, we are unable to detach or attach anything to your plumbing/taps. </span></p><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">** Service does not include connecting/plumbing in water to refrigerators</span></p><p data-dcnode-id="773"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Direct Delivery</span></strong></p><ul data-dcnode-id="769"><li data-dcnode-id="770"><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Our Brand partners sometimes offer a direct from warehouse delivery service. Direct delivery will become an option at checkout if it's available. </span></p></li></ul><ul data-dcnode-id="765"><li data-dcnode-id="766"><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">The service offering varies and is mentioned in the product description. It can range from a simple drop-off, to a full installation*</span></p></li></ul><p data-dcnode-id="762"><strong data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Courier Service (TNT Road/Air)</span></strong></p><ul data-dcnode-id="758"><li data-dcnode-id="759"><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Courier services are deliver to door for standard residential deliveries. </span></p></li></ul><ul data-dcnode-id="748"><li data-dcnode-id="755"><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Signature is required on delivery. Under Social Distancing protocols, your name may be taken/verified verbally to minimise physical contact.</span></p></li><li data-dcnode-id="752"><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">If no one is present for the delivery, a calling card will be left. Re-Delivery may incur additional fees, alternatively, your parcel may be sent to the nearest collection point.</span></p></li><li data-dcnode-id="749"><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">If one of more of your appliances is heavier than 32kg then it may be delivered on a pallet, in this instance it will be delivered to the edge of your premises not to door. Deliveries of items &gt; 32kg to apartment complexes are to the ground floor only and you may require your own lifting equipment.</span></p></li></ul><p data-dcnode-id="745"><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Australia Post</span></strong></p><ul data-dcnode-id="735"><li data-dcnode-id="742"><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Packages less than 25kg are often delivered by Australia Post. </span></p></li><li data-dcnode-id="739"><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Signature is required on delivery. Under Social Distancing protocols, your name may be taken/verified verbally to minimise physical contact.</span></p></li><li data-dcnode-id="736"><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">If you are not present for the delivery then a calling card will be left and your item will be available for pickup at the nearest collection point within 1 business day (weekday) of the delivery attempt.</span></p></li></ul><h3 data-dcnode-id="732"><strong data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">How to prepare for your delivery</span></strong></h3><ul data-dcnode-id="710"><li data-dcnode-id="729"><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Make sure someone is home that is authorised to take delivery, we can't deliver unless someone is present.</span></p></li><li data-dcnode-id="726"><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Make sure any pets are secured during the delivery, we don't want fluffy escaping.</span></p></li><li data-dcnode-id="723"><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Ensure there is nothing obstructing our service personnel from delivering your appliance. It's a good idea to check/measure doorways for large appliances.</span></p></li><li data-dcnode-id="720"><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">For deliveries where we are taking away an appliance, ensure it has been emptied of all it's contents and cleaned. </span></p></li><li data-dcnode-id="717"><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Please make sure you notify our delivery service of the following prior to delivery - Difficult access, steep driveways, limited parking, Stairs/Elevators, flooring that is polished or damaged.</span></p></li><li data-dcnode-id="714"><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">For appliances that attach to plumbing. Because in most cases we can't attach new appliances to your plumbing, it is a good idea to disconnect old appliances (if applicable) early and inspect your plumbing for leaks before attaching your new appliance.</span></p></li><li data-dcnode-id="711"><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">If you have selected a delivery option where we take-away your old appliance. Please make sure it is disconnected from plumbing, power and can easily be removed from it's recess. </span></p></li></ul><p data-dcnode-id="707"><strong data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Things we don't include unless stated in the service description</span></strong></p><ul data-dcnode-id="691"><li data-dcnode-id="704"><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node=""> Any cabinetry works.</span></p></li><li data-dcnode-id="701"><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node=""> Any plumbing works. This includes both disconnection and connection.</span></p></li><li data-dcnode-id="698"><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node=""> Modifications to the appliance to allow it to fit in its location.</span></p></li><li data-dcnode-id="695"><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node=""> Locating your appliance to anywhere that is inaccessible via a standard freight trolley.</span></p></li><li data-dcnode-id="692"><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node=""> Locating your appliance on anywhere above ground floor (accommodations can be made with prior notice).</span></p></li></ul><p data-dcnode-id="688"><strong data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Damages</span></strong></p><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">We'd like to be able to say that everything we sell makes it to it's destination without any hiccups, but sometimes, damages can occur during transit. </span></p><ul data-dcnode-id="676"><li data-dcnode-id="683"><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Retravision insures your order for loss or damage of the item(s) while it is in transit to its destination. </span></p></li><li data-dcnode-id="680"><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Where possible, please inspect your packaging and product (where possible) at time of delivery. Please notify the delivery driver and our staff on 1300 173 872 if you are unsatisfied with the condition your order has arrived in. Our team will work with you to find a suitable solution.</span></p></li><li data-dcnode-id="677"><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">If you plan to store your order for a period of time before using/installing it, then we advise that you unpack, inspect then repack your item(s) before storing it. As we are unable to cover damages that occur after delivery. </span></p></li></ul><p data-dcnode-id="673"><strong data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Return Orders</span></strong></p><ul data-dcnode-id="660"><li data-dcnode-id="667"><p data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">We will arrange for the return of any items (subject to our </span><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/returns-policy" target="_blank"><span data-dcnode-id="671" instrument_node="">returns policy</span></a><span data-dcnode-id="669" instrument_node="">).</span></p></li><li data-dcnode-id="664"><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">If the return is related to an authorised change of mind, cancellation or exchange then we will find the cheapest/safest way to return the product, the cost of return plus any applicable re-stock fee will be on-charged to you.</span></p></li><li data-dcnode-id="661"><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">For any other returns (faulty, damaged, authorised warranty return) we will cover the cost of return to our nearest warehouse.</span></p></li></ul><p data-dcnode-id="657"><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Re-Delivery</span></strong></p><ul data-dcnode-id="653"><li data-dcnode-id="654"><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Re-Delivery is possible in most cases, charges for re-delivery are capped at the original amount of the delivery. If the original delivery was free, then it is capped at $100. If the delivery was failed due to an issue caused by us or one of our providers then we do not charge for re-delivery.</span></p></li></ul><h4 data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">COVID-19 Protocols</span></h4><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Retravision takes the COVID-19 pandemic very seriously and has implemented the following changes to our delivery process.</span></p><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">All of our staff and contractors are required to follow strict hygiene protocols and will sanitise their equipment and hands before and after every delivery.</span></p><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Our delivery drivers are required to ask the following questions:</span></p><ul data-dcnode-id="635"><li data-dcnode-id="642"><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Have you or anyone else in your household exhibited any cold like symptoms in the last 7 days?</span></p></li><li data-dcnode-id="639"><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Have you or anyone else in your household returned from overseas in the last 14 days?</span></p></li><li data-dcnode-id="636"><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Do you wish for our drivers to leave your parcel in a secure location on your property?</span></p></li></ul><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">If the answer is YES to any of these questions, our delivery staff will not enter your property, and will leave your items in a secure location on your property. Photographic evidence and GPS tagging will be used to identify that the delivery has been completed.</span></p><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Regardless of the answers to the questions above, we will not require a signature on delivery, nor will the driver be required to present you with any paperwork. This is to ensure that there is zero contact between you and our driver.</span></p><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Please still have your ID ready to show a driver from a distance (no closer than 1.5 metres).</span></p><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">If our driver is unable to complete a delivery due to any health or security concerns then they will inform you and leave the property. Our staff will then reach out to organise another delivery (if possible) or a full refund.</span></p><h4 data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Availability</span></h4><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Products can sell very quickly, you may find that you look at an item and the next minute it’s gone! Once you’re at checkout we can generally be certain that the item will be available for you (subject to shipping requirements). If you checkout with an item that is order in, one of our representatives will be in touch with you to advise availability.</span></p><p data-dcnode-id="620"><em data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Last updated 02/22</span></em></p><span data-dcnode-id="619" instrument_node=""> </span><p class="text-center" data-dcnode-id="616"><a class="btn btn--secondary" data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retravision.com.au/delivery"><span data-dcnode-id="618" instrument_node="">More Info</span></a></p></div></div></div></div><span data-dcnode-id="611" instrument_node=""> </span><div aria-hidden="true" class="modal micromodal-slide" data-dcnode-id="597" id="backorder-modal"><div class="modal__overlay" data-dcnode-id="598" data-micromodal-close="" tabindex="-1"><div aria-labelledby="subscribe-modal-title" aria-modal="true" class="modal__container relative" data-dcnode-id="599" role="dialog"><button class="modal__close" data-dcnode-id="609"><i aria-label="Close modal" class="modal__close-icon icon icon-cross" data-dcnode-id="610" data-micromodal-close=""></i></button><span data-dcnode-id="608" instrument_node=""> </span><h3 class="mb-6" data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Backorder Information</span></h3><span data-dcnode-id="605" instrument_node=""> </span><div class="markdown text-sm" data-dcnode-id="600"><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Unfortunately this item is not currently in stock. If you choose to continue with your online order, we will dispatch your item for delivery when stock becomes available, or you can opt to visit us in-store for local pick-up orders. Please note that lead times vary depending on the supplier and model. Once you have made your order we will contact you within 24 hours with an estimated delivery time frame.</span></p><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">If you are happy to proceed, please continue with your order below &amp; select your preferred delivery option.</span></p></div></div></div></div><span data-dcnode-id="596" instrument_node=""> </span><div aria-hidden="true" class="modal micromodal-slide" data-dcnode-id="487" id="humm-modal"><div class="modal__overlay" data-dcnode-id="488" data-micromodal-close="" tabindex="-1"><div aria-labelledby="humm-modal-title" aria-modal="true" class="modal__container relative" data-dcnode-id="489" role="dialog"><button class="modal__close" data-dcnode-id="594"><i aria-label="Close modal" class="modal__close-icon icon icon-cross" data-dcnode-id="595" data-micromodal-close=""></i></button><span data-dcnode-id="593" instrument_node=""> </span><iframe data-dcnode-id="490" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.shophumm.com.au/content/html/moreInfoModal.html&amp;raw"><html data-dcnode-id="492"><head data-dcnode-id="588"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="592" name="viewport"/><span data-dcnode-id="591" instrument_node="">
