</span><div class="card-title h2" data-dcnode-id="4447"><span data-dcnode-id="4448" instrument_node="">Features</span></div><span data-dcnode-id="4446" instrument_node="">
</span><div class="card-text" data-dcnode-id="4371"><span data-dcnode-id="4445" instrument_node="">
</span><ul data-dcnode-id="4395"><span data-dcnode-id="4444" instrument_node="">
</span><li data-dcnode-id="4439"><span data-dcnode-id="4443" instrument_node="">Patented Captures &amp; Kills</span><sup data-dcnode-id="4441"><span data-dcnode-id="4442" instrument_node="">®</span></sup><span data-dcnode-id="4440" instrument_node="">&nbsp;technology</span></li><span data-dcnode-id="4438" instrument_node="">
</span><li data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">Long-lasting MERV 15 filter</span></li><span data-dcnode-id="4435" instrument_node="">
</span><li data-dcnode-id="4431"><span data-dcnode-id="4434" instrument_node="">Captures 95% of particles</span><sup data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">1</span></sup></li><span data-dcnode-id="4430" instrument_node="">
</span><li data-dcnode-id="4408"><span data-dcnode-id="4429" instrument_node="">Inactivates 99% of select virus and bacteria, including:</span><sup data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">2</span></sup><span data-dcnode-id="4426" instrument_node="">
</span><ul data-dcnode-id="4410"><span data-dcnode-id="4425" instrument_node="">
</span><li data-dcnode-id="4423"><span data-dcnode-id="4424" instrument_node="">Human influenza</span></li><span data-dcnode-id="4422" instrument_node="">
</span><li data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node="">Common cold surrogate</span></li><span data-dcnode-id="4419" instrument_node="">
</span><li data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">Streptococcus pyrogenes</span></li><span data-dcnode-id="4416" instrument_node="">
</span><li data-dcnode-id="4412"><span data-dcnode-id="4415" instrument_node="">Coronavirus</span><sup data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">2</span></sup></li><span data-dcnode-id="4411" instrument_node="">
</span></ul><span data-dcnode-id="4409" instrument_node="">
</span></li><span data-dcnode-id="4407" instrument_node="">
</span><li data-dcnode-id="4405"><span data-dcnode-id="4406" instrument_node="">Narrow cabinet design for easier installation in tight spaces</span></li><span data-dcnode-id="4404" instrument_node="">
</span><li data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">Helps protect heating and cooling equipment&nbsp;</span></li><span data-dcnode-id="4401" instrument_node="">
</span><li data-dcnode-id="4397"><span data-dcnode-id="4400" instrument_node="">10-year parts limited warranty upon timely registration (excludes filter replacements)</span><sup data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">3</span></sup></li><span data-dcnode-id="4396" instrument_node="">
</span></ul><span data-dcnode-id="4394" instrument_node="">
</span><div data-dcnode-id="4391"><font data-dcnode-id="4392" size="1"><br data-dcnode-id="4393"></font></div><span data-dcnode-id="4390" instrument_node="">
</span><div data-dcnode-id="4386"><sup data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">1</span></sup><span data-dcnode-id="4387" instrument_node=""> Based on third-party testing (2012) showing 95% of particles size 1.0 to 3.0 microns captured.</span></div><span data-dcnode-id="4385" instrument_node="">
</span><div data-dcnode-id="4378"><sup data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">2</span></sup><span data-dcnode-id="4382" instrument_node="">The Evolution Air Purifier has demonstrated effectiveness against the murine coronavirus, based on third-party testing (2020) showing a &gt;99% inactivation, which is a virus similar to the human novel coronavirus (SARS-CoV-2) that causes COVID-19. Therefore, the Infinity Air Purifier can be expected to be effective against SARS-CoV-2 when used in accordance with its directions for use. Third-party testing (2012, 2007) also shows ≥99% inactivation for the type of virus that causes common colds, Streptococcus pyogenes and human influenza. Airborne particles must flow through your HVAC system and be trapped by the MERV 15 Evolution filter to be inactivated at 99%. The Evolution air purifier achieves a MERV 15 rating based on third-party testing (2012) showing 95% of particles size 1.0 to 3.0 microns captured and 85% of particles size 0.3 to 1.0 microns captured. </span><a data-dcnode-id="4380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bryant.com/en/us/learn-how-it-works/" title="Learn How It Works - Page metadata"><span data-dcnode-id="4381" instrument_node="">Learn how it works</span></a><span data-dcnode-id="4379" instrument_node="">.</span></div><span data-dcnode-id="4377" instrument_node="">
</span><div data-dcnode-id="4373"><sup data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">3</span></sup><span data-dcnode-id="4374" instrument_node="">To the original owner, when product is used in an owner-occupied residence, a 10-year parts limited warranty upon timely registration of your new equipment. Warranty period is 5 years if not registered within 90 days. Jurisdictions where warranty benefits cannot be conditioned on registration will automatically receive a 10-year parts limited warranty. See warranty certificate for complete details.</span></div><span data-dcnode-id="4372" instrument_node="">
</span></div><span data-dcnode-id="4370" instrument_node="">
</span></div><span data-dcnode-id="4368" instrument_node="">
</span></div><span data-dcnode-id="4366" instrument_node="">

</span><div class="card-title h2" data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">Specifications</span></div><span data-dcnode-id="4361" instrument_node="">

</span><h4 data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">PERFORMANCE</span></h4><span data-dcnode-id="4357" instrument_node="">

</span><div data-dcnode-id="4346"><strong data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">Rated airflow</span></strong><span data-dcnode-id="4347" instrument_node="">&nbsp;1620:1200 cu/ft/min; 1625:1400 cu/ft/min; 2020:1400 cu/ft/min; 2025: 1750 cu/ft/min; 2420:1750 cu/ft/min</span></div><span data-dcnode-id="4345" instrument_node="">
</span><div data-dcnode-id="4341"><strong data-dcnode-id="4343"><span data-dcnode-id="4344" instrument_node="">Pressure drop&nbsp;</span></strong><span data-dcnode-id="4342" instrument_node=""> Creates minimal airflow resistance</span></div><span data-dcnode-id="4340" instrument_node="">

</span><div data-dcnode-id="4293"><span data-dcnode-id="4326" instrument_node="">
