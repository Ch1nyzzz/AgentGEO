</span><h2 class="et_pb_slide_title" data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">ENVIROKLENZ AIR CARTRIDGE VS. COLIPHAGE PHIX174</span></h2><div class="et_pb_slide_content" data-dcnode-id="2124"><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">In this chamber study, the EnviroKlenz Air System was used with only the EnviroKlenz Air Cartridge inside. The test unit was placed in a sealed test chamber measuring 1000 cubic feet and a microbial suspension was aspirated into the chamber. Air samples were taken from the test chamber once the unit was turned on, at intervals over a period of 8 hours. The process was then repeated without the test unit in the chamber to provide the natural decay results. Air sampling took place using an SKC BioStage Single-stage impactor for 30 seconds at 12L/min.</span></p><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2136"><em data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">*Note: No HEPA filter or UV-C lights were used in this test.</span></em></p><span data-dcnode-id="2135" instrument_node="">
</span><p data-dcnode-id="2129"><em data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">*Tested at a third-party, Intertek Labs.</span></em><br data-dcnode-id="2132"><em data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Report #104371720COL-003</span></em></p><span data-dcnode-id="2128" instrument_node="">
</span><p data-dcnode-id="2125"><strong data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">The EnviroKlenz Technology effectively removes Coliphage PhiX174 at 99.9% in 2 hours.</span></strong></p></div><span data-dcnode-id="2123" instrument_node="">

</span><h5 class="et_pb_toggle_title" data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">How many square feet can the Air Systems Cover?</span></h5><span data-dcnode-id="1913" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1910"><p data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">The EnviroKlenz Air System treats 250 cubic feet per minute on the highest speed setting and ideally, you want to achieve 3-5 air exchanges per hour in the area you are using the system. In a typical home (assuming approximately 10-foot high ceiling), this equates out to be around ~ 1000 square feet or less.</span></p></div><span data-dcnode-id="1909" instrument_node=""> </span><span data-dcnode-id="1907" instrument_node="">
</span></div><span data-dcnode-id="1905" instrument_node=""> </span><div class="et_pb_module et_pb_toggle et_pb_toggle_9 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1890"><span data-dcnode-id="1903" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">What is the difference between the Air System Plus and Air System?</span></h5><span data-dcnode-id="1900" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1894"><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">The EnviroKlenz Air System Plus is larger and contains (2) UVC Bulbs, which help germicidal irradiation and internal cleaning of the system. There are also indicator lights that inform you when individual UV-C lamps need to be replaced.</span></p><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">While the EnviroKlenz Air System does not contain the (2) UVC Bulbs and is smaller in size.</span></p></div><span data-dcnode-id="1893" instrument_node=""> </span><span data-dcnode-id="1891" instrument_node="">
</span></div><span data-dcnode-id="1889" instrument_node=""> </span><div class="et_pb_module et_pb_toggle et_pb_toggle_10 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1877"><span data-dcnode-id="1887" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">How many speeds does the unit have?</span></h5><span data-dcnode-id="1884" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1881"><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">The EnviroKlenz Air Systems have 4 speeds, they are 85 CFM, 150 CFM, 200 CFM, and 250 CFM.</span></p></div><span data-dcnode-id="1880" instrument_node=""> </span><span data-dcnode-id="1878" instrument_node="">
</span></div><span data-dcnode-id="1876" instrument_node=""> </span><div class="et_pb_module et_pb_toggle et_pb_toggle_11 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1864"><span data-dcnode-id="1874" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">How long will the filters last?</span></h5><span data-dcnode-id="1871" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1868"><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">The HEPA filter will last approximately 2 years. The EnviroKlenz Air Cartridge will typically last 6 months. The actual lifetime is dependent on environmental conditions and chemical pollution concentration present in the environment it is used in.</span></p></div><span data-dcnode-id="1867" instrument_node=""> </span><span data-dcnode-id="1865" instrument_node="">
</span></div><span data-dcnode-id="1863" instrument_node=""> </span><div class="et_pb_module et_pb_toggle et_pb_toggle_12 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1851"><span data-dcnode-id="1861" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">How long do I need to run the unit before I notice a difference in the air quality?</span></h5><span data-dcnode-id="1858" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1855"><p data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Often you can start to notice improvements within hours, but depending on the environmental conditions and contamination level it may be faster or longer.</span></p></div><span data-dcnode-id="1854" instrument_node=""> </span><span data-dcnode-id="1852" instrument_node="">
</span></div><span data-dcnode-id="1850" instrument_node=""> </span><div class="et_pb_module et_pb_toggle et_pb_toggle_13 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1838"><span data-dcnode-id="1848" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Will the EnviroKlenz Air System remove both odors and chemical odors?</span></h5><span data-dcnode-id="1845" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1842"><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Yes. The EnviroKlenz Air Cartridge installs right into the unit to remove viruses, VOCs, chemical odors, and fragrances.</span></p></div><span data-dcnode-id="1841" instrument_node=""> </span><span data-dcnode-id="1839" instrument_node="">
</span></div><span data-dcnode-id="1837" instrument_node=""> </span><div class="et_pb_module et_pb_toggle et_pb_toggle_14 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1825"><span data-dcnode-id="1835" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">How does the EnviroKlenz Air Systems compare to other air purifiers?</span></h5><span data-dcnode-id="1832" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1829"><p data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">Many air purifiers focus on particulate removal and neglect proper chemical neutralization. The EnviroKlenz Air System combines particulate removal and chemical neutralization into one system.</span></p></div><span data-dcnode-id="1828" instrument_node=""> </span><span data-dcnode-id="1826" instrument_node="">
</span></div><span data-dcnode-id="1824" instrument_node=""> </span><div class="et_pb_module et_pb_toggle et_pb_toggle_15 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1812"><span data-dcnode-id="1822" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">How is this technology different from Carbon?</span></h5><span data-dcnode-id="1819" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1816"><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Carbon is a commonly used material in odor control applications. It absorbs odors; however, it does have several serious disadvantages. Most significantly, carbon only physisorbs toxic, noxious, and other odor-causing molecules, meaning that the unwanted chemicals do not react chemically with the carbon and can be released later and cause the re-emergence of an odor believed to have been initially neutralized or eliminated. Changes in humidity or temperature can hasten this process, causing the odors and other unwanted chemicals to be released back into the air. EnviroKlenz® products have proven to be highly efficient “adsorptive neutralizers” for chemicals making them not only competitively advantageous over carbon, but ideal in multiple chemical sensitive situations. When the EnviroKlenz materials come into contact with the airborne pollutant, the metal oxides’ active sites first capture the chemical then initiate the neutralization process. This type of action is needed for the numerous types of pollutants that possess a variety of different functional groups. The increased surface area, unique physical morphology, high chemical reactivity, and functional porosity, all contribute to the enhanced chemical adsorption and neutralizing characteristics of EnviroKlenz.</span></p></div><span data-dcnode-id="1815" instrument_node=""> </span><span data-dcnode-id="1813" instrument_node="">
</span></div><span data-dcnode-id="1811" instrument_node=""> </span><span data-dcnode-id="1809" instrument_node="">
