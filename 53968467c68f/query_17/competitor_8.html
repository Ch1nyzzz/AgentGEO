</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="777" style="font-size: small;"><span data-dcnode-id="778" style="font-family: Arial;"><span data-dcnode-id="779" instrument_node="">Listed below are a few of the questions that we get from time to time and thought we'd put the most often asked questions in one place on our website to save you from scouring the web looking for bits and pieces of this information. Of course this is not everything that is out there in the world of air purification, but it's a good start so that you can begin your journey. As always, if there is something that you can't find on our website, please do not hesitate to&nbsp;</span></span></span><span data-dcnode-id="763" style="font-size: small;"><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usairpurifiers.com/contact-us.html" target="_blank"><span data-dcnode-id="775" style="font-family: Arial;"><span data-dcnode-id="776" instrument_node="">contact us</span></span></a><span data-dcnode-id="764" style="font-family: Arial;"><span data-dcnode-id="773" instrument_node="">&nbsp;and ask the experts.&nbsp;</span><br data-dcnode-id="772"><span data-dcnode-id="771" instrument_node=""> </span><br data-dcnode-id="770"><span data-dcnode-id="769" instrument_node=""> In most instances, you don't have to go too far for more information because all the information you are looking for, for the most part, is probably found somewhere on this website or in the heads of our experts should you need to give us a call.&nbsp;</span><br data-dcnode-id="768"><span data-dcnode-id="767" instrument_node=""> </span><br data-dcnode-id="766"><span data-dcnode-id="765" instrument_node=""> Here are a couple of other areas of our website to help you on your quest for more air purification knowledge. Good Luck!</span></span></span></p><span data-dcnode-id="761" instrument_node="">

</span></ul><span data-dcnode-id="740" instrument_node="">
</span><h3 data-dcnode-id="736"><span data-dcnode-id="737" style="font-size: medium;"><span data-dcnode-id="738" style="font-family: Arial;"><span data-dcnode-id="739" instrument_node="">What is an air purifier?</span></span></span></h3><span data-dcnode-id="735" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="728"><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" style="font-size: small;"><span data-dcnode-id="732" style="font-family: Arial;"><span data-dcnode-id="733" instrument_node="">An air purifier is an electronic appliance that is used in homes and workplaces to improve overall indoor air quality. Air Purifiers use several different air purification technologies to clean and purify the air in a given space.</span></span></span></p><span data-dcnode-id="729" instrument_node="">
</span></div><span data-dcnode-id="727" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="724" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="720"><span data-dcnode-id="721" style="font-family: Arial;"><span data-dcnode-id="722" style="font-size: medium;"><span data-dcnode-id="723" instrument_node="">Why would I buy an air purifier?</span></span></span></h3><span data-dcnode-id="719" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="712"><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" style="font-family: Arial;"><span data-dcnode-id="716" style="font-size: small;"><span data-dcnode-id="717" instrument_node="">In most instances, an air purifier is purchased to improve overall indoor air quality in a home or office or to assist in removing certain pollutants from the air that are known to trigger or enhance allergies or asthma in humans or animals. Helps to lessen the possibility of a person contracting allergies or asthma if they don't have them already and also offers relief from allergy and asthma symptoms for those who already do suffer from them.</span></span></span></p><span data-dcnode-id="713" instrument_node="">
</span></div><span data-dcnode-id="711" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="708" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="704"><span data-dcnode-id="705" style="font-family: Arial;"><span data-dcnode-id="706" style="font-size: medium;"><span data-dcnode-id="707" instrument_node="">How does an air purifier work?</span></span></span></h3><span data-dcnode-id="703" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="680"><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" style="font-size: small;"><span data-dcnode-id="684" style="font-family: Arial;"><span data-dcnode-id="701" instrument_node="">There are several different air purification technologies in the market, but the most common way an air purifier works is to draw air from a given space, such as a living room, into the unit and then have it pass through several layers of filtering devices within the unit and then have it recycled and released back into the room, through a vent from the unit, as clean or purified air.</span><br data-dcnode-id="700"><span data-dcnode-id="699" instrument_node=""> </span><br data-dcnode-id="698"><span data-dcnode-id="697" instrument_node=""> Usually these filtering devices consist of a spongy&nbsp;</span><span data-dcnode-id="695" style="text-decoration: underline;"><span data-dcnode-id="696" instrument_node="">prefilter</span></span><span data-dcnode-id="694" instrument_node="">&nbsp;(for filtering large airborne pollutants such as dust and pet dander), a&nbsp;</span><span data-dcnode-id="692" style="text-decoration: underline;"><span data-dcnode-id="693" instrument_node="">HEPA filter</span></span><span data-dcnode-id="691" instrument_node="">&nbsp;(for&nbsp; filtering smaller particles such as pollen, mold and mildew spores), a&nbsp;</span><span data-dcnode-id="689" style="text-decoration: underline;"><span data-dcnode-id="690" instrument_node="">Charcoal filter</span></span><span data-dcnode-id="688" instrument_node="">&nbsp;(for filtering odors and gases), and then sometimes even&nbsp;</span><span data-dcnode-id="686" style="text-decoration: underline;"><span data-dcnode-id="687" instrument_node="">UV (Ultraviolet) light sterilization</span></span><span data-dcnode-id="685" instrument_node="">&nbsp;(for filtering airborne microorganisms such as bacteria and viruses). Once these airborne pollutants are passed through these filtering devices within the unit, they become trapped and remain within those filtering devices while the clean (filtered) air is then released back into the room, cleaner than when it entered the air purifier. This process is repeated over and over within a given space, keeping the area free from airborne contaminants while the air purifier is turned on.</span></span></span></p><span data-dcnode-id="681" instrument_node="">
</span></div><span data-dcnode-id="679" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="676" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="672"><span data-dcnode-id="673" style="font-size: medium;"><span data-dcnode-id="674" style="font-family: Arial;"><span data-dcnode-id="675" instrument_node="">Why choose activated carbon over ozone?</span></span></span></h3><span data-dcnode-id="671" instrument_node="">

</span><div class="toggle-box" data-dcnode-id="582"><span data-dcnode-id="667" instrument_node="">
</span><span data-dcnode-id="666" instrument_node="">

</span><ul data-dcnode-id="629"><span data-dcnode-id="660" instrument_node="">
</span><li data-dcnode-id="656"><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Effective:</span></strong><span data-dcnode-id="657" instrument_node=""> Widely used by the military and heavy industry for chemical and odor control</span></li><span data-dcnode-id="655" instrument_node="">
</span><li data-dcnode-id="651"><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Economical:</span></strong><span data-dcnode-id="652" instrument_node=""> Carbon canisters can be refilled, low electricity draw</span></li><span data-dcnode-id="650" instrument_node="">
</span><li data-dcnode-id="646"><strong data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Reliable:</span></strong><span data-dcnode-id="647" instrument_node=""> Simple, yet effective technology that is more reliable and easier to maintain</span></li><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="641"><strong data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Safe:</span></strong><span data-dcnode-id="642" instrument_node=""> Does not create or aggravate respiratory problems, which makes it a safer technology for staff and clients during and after use</span></li><span data-dcnode-id="640" instrument_node="">
</span><li data-dcnode-id="636"><strong data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Versatile:</span></strong><span data-dcnode-id="637" instrument_node=""> Ideal for occupied buildings, can be used in any type of environment</span></li><span data-dcnode-id="635" instrument_node="">
</span><li data-dcnode-id="631"><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Responsible:</span></strong><span data-dcnode-id="632" instrument_node=""> Does not create new pollutants</span></li><span data-dcnode-id="630" instrument_node="">
</span></ul><span data-dcnode-id="628" instrument_node="">
</span></td><td data-dcnode-id="595" width="50%"><strong data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">The drawbacks of ozone machines</span></strong><span data-dcnode-id="623" instrument_node="">
</span><ul data-dcnode-id="600"><span data-dcnode-id="622" instrument_node="">
</span><li data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Expensive to run, high electricity draw</span></li><span data-dcnode-id="619" instrument_node="">
</span><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Ozone must reach toxic levels to be effective against microorganisms, consequently ozone "blasts" are usually over Federal safety limits</span></li><span data-dcnode-id="616" instrument_node="">
</span><li data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Not suitable for occupied buildings</span></li><span data-dcnode-id="613" instrument_node="">
</span><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">May cause serious respiratory problems for staff or clients</span></li><span data-dcnode-id="610" instrument_node="">
</span><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Not useful in high humidity environments</span></li><span data-dcnode-id="607" instrument_node="">
</span><li data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Oxidation can create other pollutants</span></li><span data-dcnode-id="604" instrument_node="">
</span><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Complicated maintenance, higher incidence of product or component failure</span></li><span data-dcnode-id="601" instrument_node="">
</span></ul><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; (From Electrocorp)</span></p><span data-dcnode-id="596" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" style="font-size: small;"><span data-dcnode-id="586" style="font-family: Arial;"><span data-dcnode-id="587" instrument_node="">&nbsp;</span></span></span></p><span data-dcnode-id="583" instrument_node="">
</span></div><span data-dcnode-id="581" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="577"><span data-dcnode-id="578" style="font-size: medium;"><span data-dcnode-id="579" style="font-family: Arial;"><span data-dcnode-id="580" instrument_node="">Will an air purifier cure my asthma or allergies?</span></span></span></h3><span data-dcnode-id="576" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="569"><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" style="font-size: small;"><span data-dcnode-id="573" style="font-family: Arial;"><span data-dcnode-id="574" instrument_node="">No. They are there to assist and lessen the effects airborne pollutants have on a human body, but not to cure them. Cleaning the air of these airborne pollutants and irritants will give many allergy and asthma sufferers much needed relief from the symptoms associated with their ailment.</span></span></span></p><span data-dcnode-id="570" instrument_node="">
</span></div><span data-dcnode-id="568" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="565" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="561"><span data-dcnode-id="562" style="font-size: medium;"><span data-dcnode-id="563" style="font-family: Arial;"><span data-dcnode-id="564" instrument_node="">What is a HEPA filter and what can I expect it to do for me?</span></span></span></h3><span data-dcnode-id="560" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="553"><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="556" style="font-family: Arial;"><span data-dcnode-id="557" style="font-size: small;"><span data-dcnode-id="558" instrument_node="">HEPA stands for High Efficiency Particulate Air. It was a technology developed in the 1940s by the U.S. Atomic Energy Commission to fulfill a top-secret need for an efficient way to filter radioactive particulate contaminants. HEPA is a type of highly efficient filtration media that removes microscopic particles from air passing through the filter. There are different ranges of efficiencies depending on the particle size. The most efficient form of HEPA removes 99.97% of particles (from the air within a specific space) that are the size of 0.3 microns or larger that pass through the filter. What does this mean? For every 10,000 particles entering the HEPA filter, an average of 3 would pass all the way through the filter. A HEPA air purifier filter will not capture gasses and odors. That is why activated charcoal is normally used in conjunction with a HEPA filter. It will capture the pollutants, such as gasses and odors, that the HEPA filter misses.</span></span></span></p><span data-dcnode-id="554" instrument_node="">
</span></div><span data-dcnode-id="552" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">&nbsp;</span></div><span data-dcnode-id="549" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="544"><strong data-dcnode-id="545"><span data-dcnode-id="546" style="font-size: medium;"><span data-dcnode-id="547" style="font-family: Arial;"><span data-dcnode-id="548" instrument_node="">How often will I need to replace filters?</span></span></span></strong></div><span data-dcnode-id="543" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="529"><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="539" style="font-family: Arial;"><span data-dcnode-id="540" style="font-size: small;"><span data-dcnode-id="541" instrument_node="">Please refer to the&nbsp;</span></span></span><span data-dcnode-id="532" style="font-family: Arial;"><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usairpurifiers.com/filter-maintenance.html" target="_blank"><span data-dcnode-id="536" style="font-size: small;"><strong data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Average Filter Maintenance Timetable</span></strong></span></a><span data-dcnode-id="533" style="font-size: small;"><span data-dcnode-id="534" instrument_node="">&nbsp;on our website or to the product pages within our website for more info by individual products and models.</span></span></span></p><span data-dcnode-id="530" instrument_node="">
</span></div><span data-dcnode-id="528" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="525" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="521"><span data-dcnode-id="522" style="font-size: medium;"><span data-dcnode-id="523" style="font-family: Arial;"><span data-dcnode-id="524" instrument_node="">What airborne pollutants does an air purifier filter?</span></span></span></h3><span data-dcnode-id="520" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="513"><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" style="font-size: small;"><span data-dcnode-id="517" style="font-family: Arial;"><span data-dcnode-id="518" instrument_node="">An air purifier uses several different filtering (purification) technologies to remove airborne pollutants such as dust, smoke, pollen, pet dander, mold &amp; mildew spores, bacteria &amp; viruses, and other airborne particulates as small as 0.3 microns.</span></span></span></p><span data-dcnode-id="514" instrument_node="">
</span></div><span data-dcnode-id="512" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="509" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="505"><span data-dcnode-id="506" style="font-size: medium;"><span data-dcnode-id="507" style="font-family: Arial;"><span data-dcnode-id="508" instrument_node="">Why are air purifiers needed?</span></span></span></h3><span data-dcnode-id="504" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="481"><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" style="font-size: small;"><span data-dcnode-id="485" style="font-family: Arial;"><span data-dcnode-id="502" instrument_node="">The air inside many homes often is many times more polluted than outside air. Here are some little known facts about the air inside many homes:</span><br data-dcnode-id="501"><span data-dcnode-id="500" instrument_node=""> </span><br data-dcnode-id="499"><span data-dcnode-id="498" instrument_node=""> •&nbsp; The Environmental Protection Agency (EPA) estimates that indoor air pollutant levels may be as many as two to five times higher than the pollutant levels outdoors.</span><br data-dcnode-id="497"><span data-dcnode-id="496" instrument_node=""> </span><br data-dcnode-id="495"><span data-dcnode-id="494" instrument_node=""> •&nbsp; Indoor air pollution is one of the top environmental concerns in the country</span><br data-dcnode-id="493"><span data-dcnode-id="492" instrument_node=""> </span><br data-dcnode-id="491"><span data-dcnode-id="490" instrument_node=""> •&nbsp; Americans spend up to 90 percent of their time indoors which can be alarming considering current indoor air quality concerns.</span><br data-dcnode-id="489"><span data-dcnode-id="488" instrument_node=""> </span><br data-dcnode-id="487"><span data-dcnode-id="486" instrument_node=""> •&nbsp; Indoor air pollutants such as tobacco smoke, pollen, mold, dust and animal dander often are associated with asthmatic and allergic reactions in people.</span></span></span></p><span data-dcnode-id="482" instrument_node="">
</span></div><span data-dcnode-id="480" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="477" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="473"><span data-dcnode-id="474" style="font-family: Arial;"><span data-dcnode-id="475" style="font-size: medium;"><span data-dcnode-id="476" instrument_node="">What contributes to poor indoor air quality?</span></span></span></h3><span data-dcnode-id="472" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="465"><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="468" style="font-family: Arial;"><span data-dcnode-id="469" style="font-size: small;"><span data-dcnode-id="470" instrument_node="">Today's homes often are built energy efficient to "hold" air inside - avoiding heat loss in the winter and heat gain in the summer. Of course, what's better for your energy bills isn't necessarily better for indoor air quality. This type of “tight” construction often doesn't allow the home to breathe. Pollutants become trapped within a home or workplace which in the past, or in a non-energy efficient home, would have been released outside the home by natural means.</span></span></span></p><span data-dcnode-id="466" instrument_node="">
</span></div><span data-dcnode-id="464" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="461" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="457"><span data-dcnode-id="458" style="font-family: Arial;"><span data-dcnode-id="459" style="font-size: medium;"><span data-dcnode-id="460" instrument_node="">What are the primary sources of air pollution?</span></span></span></h3><span data-dcnode-id="456" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="412"><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" style="font-family: Arial;"><span data-dcnode-id="451" style="font-size: small;"><span data-dcnode-id="453" style="text-decoration: underline;"><span data-dcnode-id="454" instrument_node="">Tobacco smoke</span></span><span data-dcnode-id="452" instrument_node="">. For years the EPA has reported the link between second-hand smoke and negative health effects.</span></span></span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" style="font-family: Arial;"><span data-dcnode-id="443" style="font-size: small;"><span data-dcnode-id="447" instrument_node=""> </span><span data-dcnode-id="445" style="text-decoration: underline;"><span data-dcnode-id="446" instrument_node="">Pollen</span></span><span data-dcnode-id="444" instrument_node="">&nbsp;comes from trees, flowers and grass, and even opening a door can allow millions of these particles into a home. Some people are particularly sensitive to the presence of certain pollen particles.</span></span></span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="434" style="font-family: Arial;"><span data-dcnode-id="435" style="font-size: small;"><span data-dcnode-id="439" instrument_node=""> People who are allergic to cats and dogs are actually allergic to the dander flakes their pets shed.</span><span data-dcnode-id="437" style="text-decoration: underline;"><span data-dcnode-id="438" instrument_node="">Dander</span></span><span data-dcnode-id="436" instrument_node="">&nbsp;can remain in a home long after the presence of the animal is gone.</span></span></span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" style="font-family: Arial;"><span data-dcnode-id="416" style="font-size: small;"><span data-dcnode-id="431" instrument_node=""> </span><span data-dcnode-id="429" style="text-decoration: underline;"><span data-dcnode-id="430" instrument_node="">Mold and mildew</span></span><span data-dcnode-id="428" instrument_node="">&nbsp;which are typically found in the shower, kitchen or basement, are plant spores that grow any place that's warm and humid.</span><br data-dcnode-id="427"><span data-dcnode-id="426" instrument_node=""> </span><br data-dcnode-id="425"><span data-dcnode-id="424" instrument_node=""> </span><span data-dcnode-id="422" style="text-decoration: underline;"><span data-dcnode-id="423" instrument_node="">Dust</span></span><span data-dcnode-id="421" instrument_node="">&nbsp;is a collection of many different types of particles including our own skin cells, dirt tracked in from the outside and other particles from objects in the house.</span><br data-dcnode-id="420"><span data-dcnode-id="419" instrument_node=""> </span><br data-dcnode-id="418"><span data-dcnode-id="417" instrument_node=""> All of these items and more contribute to current poor indoor air quality conditions.</span></span></span></p><span data-dcnode-id="413" instrument_node="">
</span></div><span data-dcnode-id="411" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="408" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="404"><span data-dcnode-id="405" style="font-size: medium;"><span data-dcnode-id="406" style="font-family: Arial;"><span data-dcnode-id="407" instrument_node="">How loud are air purifiers?</span></span></span></h3><span data-dcnode-id="403" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="343"><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" style="font-family: Arial;"><span data-dcnode-id="400" style="font-size: small;"><span data-dcnode-id="401" instrument_node="">The type, brand, and speed of an air purifier are directly related to how loud the purifier is.&nbsp; A typical air purifier that uses filters to purify the air that is ran on low (the recommend speed) is very comparable to the sound of a small house fan.</span></span></span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" style="font-family: Arial;"><span data-dcnode-id="394" style="font-size: small;"><br data-dcnode-id="396"><span data-dcnode-id="395" instrument_node=""> Most air purifiers loudest fan setting is set to equal the decibel level of normal human conversation. That is so, even at the highest fan setting, you do not have to talk over it if you are having a conversation in a room where the air purifier is set to a high fan speed. In most instances, the high setting is only going to be used for a quick cleaning of the air in a room and then placed on a medium or low fan setting to maintain the air quality in the room. The medium and low fan settings are usually no louder than Central Heating and Air Conditioning coming on through the vents inside of a dwelling. The lower settings (medium and low fan speeds) are similar in decibel level to "white noise" which is beneficial for concentration, relaxation, and better overall sleeping.</span></span></span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" style="font-family: Arial;"><span data-dcnode-id="347" style="font-size: small;"><strong data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Noise Level:</span></strong><span data-dcnode-id="388" instrument_node="">&nbsp;This number is measured in decibels (dB). The higher number indicates a higher level of noise.&nbsp; Below are examples of the noise level ratings for common appliances:</span><br data-dcnode-id="387"><span data-dcnode-id="386" instrument_node=""> </span><br data-dcnode-id="385"><span data-dcnode-id="384" instrument_node=""> </span><strong data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Painful:&nbsp;</span></strong><br data-dcnode-id="381"><span data-dcnode-id="380" instrument_node=""> 120-150 dB = Rock Concerts, Firearms</span><br data-dcnode-id="379"><span data-dcnode-id="378" instrument_node=""> 90 dB = Truck Traffic, Lawnmower</span><br data-dcnode-id="377"><span data-dcnode-id="376" instrument_node=""> </span><br data-dcnode-id="375"><span data-dcnode-id="374" instrument_node=""> </span><strong data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Very loud:&nbsp;</span></strong><br data-dcnode-id="371"><span data-dcnode-id="370" instrument_node=""> 80 dB = Alarm Clock, Busy Street</span><br data-dcnode-id="369"><span data-dcnode-id="368" instrument_node=""> 70 dB = Vacuum Cleaner</span><br data-dcnode-id="367"><span data-dcnode-id="366" instrument_node=""> 60 dB = Conversation, Dishwasher</span><br data-dcnode-id="365"><span data-dcnode-id="364" instrument_node=""> </span><br data-dcnode-id="363"><span data-dcnode-id="362" instrument_node=""> </span><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Moderate:&nbsp;</span></strong><br data-dcnode-id="359"><span data-dcnode-id="358" instrument_node=""> 50 dB = Moderate Rainfall</span><br data-dcnode-id="357"><span data-dcnode-id="356" instrument_node=""> 40 dB = Quiet room</span><br data-dcnode-id="355"><span data-dcnode-id="354" instrument_node=""> </span><br data-dcnode-id="353"><span data-dcnode-id="352" instrument_node=""> </span><strong data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Faint:&nbsp;</span></strong><br data-dcnode-id="349"><span data-dcnode-id="348" instrument_node=""> 30 dB = Whisper, Quiet Library</span></span></span></p><span data-dcnode-id="344" instrument_node="">
</span></div><span data-dcnode-id="342" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="339" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="335"><span data-dcnode-id="336" style="font-family: Arial;"><span data-dcnode-id="337" style="font-size: medium;"><span data-dcnode-id="338" instrument_node="">I have an 800 sq ft townhouse with 2 levels, will an air purifier certified for 1500 square feet be enough to clean the air in the entire townhouse?</span></span></span></h3><span data-dcnode-id="334" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="286"><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="316" style="font-family: Arial;"><span data-dcnode-id="317" style="font-size: small;"><span data-dcnode-id="332" instrument_node="">Only if it were that simple. Air purifiers work best in the areas that they are contained to, such as living quarters or bedrooms, for example. An air purifier&nbsp;</span><span data-dcnode-id="330" style="text-decoration: underline;"><span data-dcnode-id="331" instrument_node="">cannot</span></span><span data-dcnode-id="329" instrument_node="">&nbsp;go through walls, around corners, down hallways, and down flights of stairs to clean the air in a living or working space. There will be some residual cleaning effects of those areas immediately surrounding the main cleaning area (such as a hallway outside a bedroom), but for the most part, only the immediate area that the air purifier is placed into will give the best air cleaning results.&nbsp;</span><br data-dcnode-id="328"><span data-dcnode-id="327" instrument_node=""> </span><br data-dcnode-id="326"><span data-dcnode-id="325" instrument_node=""> When buying an air purifier, consider the area or areas that you want to put it into. Those will be the area sizes you will need to use to compare models. Try to find an air purifier that is certified to clean more square footage than the area that you are putting it into. That will allow for the air to be cleaned faster and more often. A rule of thumb is that an air purifier should be certified to cover at least one-third more square footage than the area you are placing it into.&nbsp;</span><br data-dcnode-id="324"><span data-dcnode-id="323" instrument_node=""> </span><br data-dcnode-id="322"><span data-dcnode-id="321" instrument_node=""> </span><span data-dcnode-id="319" style="font-weight: bold;"><span data-dcnode-id="320" instrument_node="">Example:</span></span><span data-dcnode-id="318" instrument_node="">&nbsp;You want to clean the air in a 600 sqft living room, you should purchase an air purifier that is certified for at least 900 sqft or more to effectively clean that area. That being said, please understand, you can purchase an air purifier that is certified for equal or lesser square footage (or less than a third more as indicated in the example above) than the area you want to clean, but realize that it will not be as effective and will clean the air at a slower rate and less often.</span></span></span></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="310" style="font-family: Arial;"><span data-dcnode-id="311" style="font-size: small;"><strong data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Here are your options if you want to clean an entire apartment, condo, home, etc.:&nbsp;</span></strong></span></span><br data-dcnode-id="309"><span data-dcnode-id="308" instrument_node=""> </span><br data-dcnode-id="307"><span data-dcnode-id="306" instrument_node=""> </span><span data-dcnode-id="299" style="font-family: Arial;"><span data-dcnode-id="300" style="font-size: small;"><span data-dcnode-id="305" instrument_node="">If working within a budget and since air purifiers are portable, you can move the air purifier from area to area to clean the air in those spaces. An example would be to run the air purifier in the living room during the day and then move it into the bedroom at night.&nbsp;</span><br data-dcnode-id="304"><span data-dcnode-id="303" instrument_node=""> </span><br data-dcnode-id="302"><span data-dcnode-id="301" instrument_node=""> If money or a budget are not a concern, multiple units throughout the living or working space would be the best option. This would allow for uninterrupted cleaning in those areas at all times without having to move it from one area to another. </span></span></span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="293"><span data-dcnode-id="294" style="font-family: Arial;"><span data-dcnode-id="295" style="font-size: small;"><span data-dcnode-id="296" instrument_node="">When an area is divided by floors, walls, and/or doors, it is best to use multiple units throughout the living or working space. This would allow for uninterrupted cleaning in those areas at all times without having to move it from one area to another. </span></span></span></p><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="289" style="font-family: Arial;"><span data-dcnode-id="290" style="font-size: small;"><span data-dcnode-id="291" instrument_node="">When in doubt it is always best to go with a purifier that is certified for more square footage than the area you want to filter.</span></span></span></p><span data-dcnode-id="287" instrument_node="">
</span></div><span data-dcnode-id="285" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="282" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="278"><span data-dcnode-id="279" style="font-family: Arial;"><span data-dcnode-id="280" style="font-size: medium;"><span data-dcnode-id="281" instrument_node="">Can I open my windows in a room where I am using an air purifier and should I also then close the doors to that room, as well?</span></span></span></h3><span data-dcnode-id="277" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="266"><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="268"><span data-dcnode-id="269" style="font-family: Arial;"><span data-dcnode-id="270" style="font-size: small;"><span data-dcnode-id="275" instrument_node="">Open windows are usually a good thing unless you live in an industrial or dirty area where you can't get the benefits from opening your windows to let in some good old fashioned fresh air from outside. There will be some pollutants, such as pollen, that will enter the room, but for the most part, they'll find their way inside the room whether the windows are opened or closed. It would just be a matter of how much would come in if the windows were closed. If you can open a window in a room while the air purifier is working, it is not a bad idea to mix in a little fresh air, as well.&nbsp;</span><br data-dcnode-id="274"><span data-dcnode-id="273" instrument_node=""> </span><br data-dcnode-id="272"><span data-dcnode-id="271" instrument_node=""> Doors opened or closed, it does not really matter. The air purifier is going to clean the area it is immediately contained to, regardless. If you do not want further contaminants from an outside source entering the room while cleaning it with an air purifier, close both windows and doors for maximum effectiveness. But, if they do happen to be left open, the air purifier will clean the new pollutants that enter the room from a window or door, as well.</span></span></span></p><span data-dcnode-id="267" instrument_node="">
</span></div><span data-dcnode-id="265" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="262" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="257"><span data-dcnode-id="258" style="font-size: medium;"><span data-dcnode-id="259" style="font-family: Arial;"><span data-dcnode-id="261" instrument_node="">I have a mold concern in my house possibly behind one of my walls, will an air purifier remove the mold issue?&nbsp; If not, will it help with the mold spores that are airborne?</span><br data-dcnode-id="260"></span></span></h3><span data-dcnode-id="256" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="225"><span data-dcnode-id="255" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" style="font-family: Arial;"><span data-dcnode-id="248" style="font-size: small;"><span data-dcnode-id="253" style="font-weight: bold; text-decoration: underline;"><span data-dcnode-id="254" instrument_node="">No.</span></span><span data-dcnode-id="252" instrument_node="">&nbsp;We need to be clear on that point. Air purifiers can help to prevent a mold problem from starting and spreading in a home, but cannot remove a pre-existing mold problem. Mold can be a&nbsp;</span><span data-dcnode-id="250" style="text-decoration: underline;"><span data-dcnode-id="251" instrument_node="">very dangerous</span></span><span data-dcnode-id="249" instrument_node="">&nbsp;concern in a home and should be dealt with by a professional abatement company for the mold problem first. Once the mold has been professionally removed, placing an air purifier in the cleaned area of a home will help the problem from reoccurring.</span></span></span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="233"><span data-dcnode-id="240" style="text-decoration: underline;"><strong data-dcnode-id="241"><span data-dcnode-id="242" style="font-family: Arial;"><span data-dcnode-id="243" style="font-size: small;"><span data-dcnode-id="244" instrument_node="">Yes,</span></span></span></strong></span><span data-dcnode-id="237" style="font-family: Arial;"><span data-dcnode-id="238" style="font-size: small;"><span data-dcnode-id="239" instrument_node=""> it will help reduce the mold spores that are airborne so you aren't constantly breathing them. However, it is highly recommended to resolve the cause of the mold to prevent it from </span></span></span><span data-dcnode-id="234" style="font-family: Arial;"><span data-dcnode-id="235" style="font-size: small;"><span data-dcnode-id="236" instrument_node="">becoming worse.</span></span></span></p><span data-dcnode-id="232" instrument_node="">
</span><p data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">&nbsp;</span></p><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">&nbsp;</span></p><span data-dcnode-id="226" instrument_node="">
</span></div><span data-dcnode-id="224" instrument_node="">
</span><h3 class="toggle" data-dcnode-id="220"><span data-dcnode-id="221" style="font-family: Arial;"><span data-dcnode-id="222" style="font-size: medium;"><span data-dcnode-id="223" instrument_node="">I don't like to dust. Will an air purifier allow me to never dust again in my home?</span></span></span></h3><span data-dcnode-id="219" instrument_node="">
</span><div class="toggle-box" data-dcnode-id="212"><span data-dcnode-id="218" instrument_node="">
