</span><h1 data-dcnode-id="1781"><a data-dcnode-id="1782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awaragroup.com/blog/impact-of-robotization-on-labor-market/"><span data-dcnode-id="1783" instrument_node="">Robotization and Automation: Impact on the Labor Market</span></a></h1><span data-dcnode-id="1780" instrument_node="">
</span><div class="text" data-dcnode-id="962"><span data-dcnode-id="1779" instrument_node="">
</span><div class="cresta-share-icon fourth_style" data-dcnode-id="1760" id="crestashareiconincontent"><div class="sbutton-total-no" data-buffershares="0" data-dcnode-id="1777" data-okshares="0" data-pinterestshares="0" data-redditshares="0" data-tumblrshares="0" data-twittershares="0" data-vkshares="0" data-xingshares="0" id="total-shares-content"></div><div class="sbutton crestaShadow facebook-cresta-share cresta-float-shadow" data-dcnode-id="1774" id="facebook-cresta-c"><a data-dcnode-id="1775" data-name="Share to Facebook" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.awaragroup.com%252Fblog%252Fimpact-of-robotization-on-labor-market%252F%26t%3DRobotization%2Band%2BAutomation%253A%2BImpact%2Bon%2Bthe%2BLabor%2BMarket" onclick="window.open(this.href,'targetWindow','toolbars=0,location=0,status=0,menubar=0,scrollbars=1,resizable=1,width=640,height=320,left=200,top=200');return false;" rel="nofollow"><i class="cs c-icon-cresta-facebook" data-dcnode-id="1776"></i></a></div><div class="sbutton crestaShadow twitter-cresta-share noCount noCountTwo cresta-float-shadow" data-dcnode-id="1771" id="twitter-cresta-c"><a data-dcnode-id="1772" data-name="Share to Twitter" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DRobotization%2Band%2BAutomation%253A%2BImpact%2Bon%2Bthe%2BLabor%2BMarket%26url%3Dhttps%253A%252F%252Fwww.awaragroup.com%252Fblog%252Fimpact-of-robotization-on-labor-market%252F%26via%3DAwaraGroup" onclick="window.open(this.href,'targetWindow','toolbars=0,location=0,status=0,menubar=0,scrollbars=1,resizable=1,width=640,height=320,left=200,top=200');return false;" rel="nofollow"><i class="cs c-icon-cresta-twitter" data-dcnode-id="1773"></i></a></div><div class="sbutton crestaShadow linkedin-cresta-share cresta-float-shadow" data-dcnode-id="1768" id="linkedin-cresta-c"><a data-dcnode-id="1769" data-name="Share to Linkedin" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/shareArticle%3Fmini%3Dtrue%26url%3Dhttps%253A%252F%252Fwww.awaragroup.com%252Fblog%252Fimpact-of-robotization-on-labor-market%252F%26title%3DRobotization%2Band%2BAutomation%253A%2BImpact%2Bon%2Bthe%2BLabor%2BMarket%26source%3Dhttps%3A//www.awaragroup.com/" onclick="window.open(this.href,'targetWindow','toolbars=0,location=0,status=0,menubar=0,scrollbars=1,resizable=1,width=640,height=320,left=200,top=200');return false;" rel="nofollow"><i class="cs c-icon-cresta-linkedin" data-dcnode-id="1770"></i></a></div><div class="sbutton crestaShadow vk-cresta-share cresta-float-shadow" data-dcnode-id="1765" id="vk-cresta-c"><a data-dcnode-id="1766" data-name="Share to VK" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vk.com/share.php%3Furl%3Dhttps%253A%252F%252Fwww.awaragroup.com%252Fblog%252Fimpact-of-robotization-on-labor-market%252F" onclick="window.open(this.href,'targetWindow','toolbars=0,location=0,status=0,menubar=0,scrollbars=1,resizable=1,width=640,height=320,left=200,top=200');return false;" rel="nofollow"><i class="cs c-icon-cresta-vkontakte" data-dcnode-id="1767"></i></a></div><div class="sbutton crestaShadow xing-cresta-share cresta-float-shadow" data-dcnode-id="1762" id="xing-cresta-c"><a data-dcnode-id="1763" data-name="Share to Xing" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.xing.com/spi/shares/new%3Furl%3Dhttps%253A%252F%252Fwww.awaragroup.com%252Fblog%252Fimpact-of-robotization-on-labor-market%252F" onclick="window.open(this.href,'targetWindow','toolbars=0,location=0,status=0,menubar=0,scrollbars=1,resizable=1,width=640,height=320,left=200,top=200');return false;" rel="nofollow"><i class="cs c-icon-cresta-xing" data-dcnode-id="1764"></i></a></div><div data-dcnode-id="1761" style="clear: both;"></div></div><div data-dcnode-id="1759" style="clear: both;"></div><p data-dcnode-id="1756" style="text-align: justify;"><span data-dcnode-id="1757" instrument_node="">Have you noticed that today there are more and more media headlines about the robots and full automation taking our jobs in almost every field and industry? If we take it for granted, the areas in which our company operates are also at risk. We decided to find out how bad it actually is and whether it is true that we should beware of technological advancement instead of craving for advantages and benefits it will give us.</span></p><span data-dcnode-id="1755" instrument_node="">
</span><h2 data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">No Hope, Just Desperation</span></h2><span data-dcnode-id="1752" instrument_node="">
</span><p data-dcnode-id="1746" style="text-align: justify;"><span data-dcnode-id="1751" instrument_node="">The report published in January 2016 by the World Economic Forum (WEF)</span><sup data-dcnode-id="1748"><a data-dcnode-id="1749" href="#_edn1" name="_ednref1"><span data-dcnode-id="1750" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1747" instrument_node=""> states that by 2020 due to the integration of new technologies 7.1 million people will lose their jobs, mostly white-collar workers engaged in office and administrative routines. At the same time, only 2 million new jobs are to be created in computer and mathematical, architecture, and engineering industries.</span></p><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1739" style="text-align: justify;"><span data-dcnode-id="1744" instrument_node="">Robots already perform two-thirds of work on the Cambridge Industries Group plant in Shanghai</span><sup data-dcnode-id="1741"><a data-dcnode-id="1742" href="#_edn2" name="_ednref2"><span data-dcnode-id="1743" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1740" instrument_node="">, and the factory is going to automate production by 90% in the near future. Also the factory’s management has a plan to completely replace all employees with robots.</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1732" style="text-align: justify;"><span data-dcnode-id="1737" instrument_node="">One of the UN reports</span><sup data-dcnode-id="1734"><a data-dcnode-id="1735" href="#_edn3" name="_ednref3"><span data-dcnode-id="1736" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1733" instrument_node=""> says that developing countries will suffer the most from automation: about 2/3 of their population may lose work. Developed countries may breathe easily: those “endangered” jobs have long since disappeared there.</span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1721" style="text-align: justify;"><span data-dcnode-id="1730" instrument_node="">In October 2016, ChinaTechNews published the article</span><sup data-dcnode-id="1727"><a data-dcnode-id="1728" href="#_edn4" name="_ednref4"><span data-dcnode-id="1729" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1726" instrument_node=""> about Foxconn, Taiwan company which assembles iPhones for Apple: they hired 40,000 robots and fired 60,000 people, and intends to start the manufacture of robotic workers, that will eventually replace the company’s human employees. Terry Gou, Chairman of the Board at Foxconn, said that according to plans the number of robots will increase by 20-30% annually. As a result</span><sup data-dcnode-id="1723"><a data-dcnode-id="1724" href="#_edn6" name="_ednref6"><span data-dcnode-id="1725" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1722" instrument_node="">, the company’s factories will employ a minimum number of employees responsible for production, logistics, testing, and control.</span></p><span data-dcnode-id="1720" instrument_node="">
</span><h2 data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">But Maybe Not Everything Is So Bad</span></h2><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1711" style="text-align: justify;"><span data-dcnode-id="1716" instrument_node="">In 2016 ManpowerGroup interviewed</span><sup data-dcnode-id="1713"><a data-dcnode-id="1714" href="#_edn7" name="_ednref7"><span data-dcnode-id="1715" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1712" instrument_node=""> 18,000 employers from 43 countries around the world about the impact of automation on their business. In the short term, the report was rather optimistic: only 12% of managers in the next 2 years are going to reduce staff due to the introduction of automation. Many employers are deterred by the cost of automation implementations and the need for special skills among workers. Companies from Italy, Guatemala, and Peru are the most positive about the impact of new technologies on the labor market — they expect an increase in the number of jobs. However, a quarter of the surveyed companies from India predict a reduction in the number of staff due to automation. The same goes for employers from Bulgaria, Slovakia, and Slovenia, but to a lesser extent.</span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1704" style="text-align: justify;"><span data-dcnode-id="1709" instrument_node="">IT company Infosys shares some good news: their survey</span><sup data-dcnode-id="1706"><a data-dcnode-id="1707" href="#_edn8" name="_ednref8"><span data-dcnode-id="1708" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1705" instrument_node=""> of 1,600 companies from the United States, France, Australia, India, Britain, Germany, and China has shown that 80% of executives are going to retrain employees whose work could be taken away by artificial intelligence.</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1697" style="text-align: justify;"><span data-dcnode-id="1702" instrument_node="">Amazon has recently announced</span><sup data-dcnode-id="1699"><a data-dcnode-id="1700" href="#_edn9" name="_ednref9"><span data-dcnode-id="1701" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1698" instrument_node=""> that they plan to create 100,000 new jobs in the United States in the next 18 months (i.e., the company’s staff will increase by about 50% to 280,000 people). The online retailer will need both software developers and warehouse employees. Note that Amazon is one of those companies that actively implement robots in their activities to automate the process of assembling and packing orders. Over the past year, the army of Amazon’s robots grew by 50%[10] and reached the total count of 45,000 machines. Among the robots there are “babies” half a meter tall, able to move around the warehouse at a speed of 8 km/h and carry loads of up to 317 kg, and huge robotic manipulators designed to move heavy pallets. At the same time, Amazon does not intend to use robots everywhere: machines are used only where it is truly cost-effective.</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1694" style="text-align: justify;"><span data-dcnode-id="1695" instrument_node="">See how this looks in practice in the short video below.</span></p><span data-dcnode-id="1693" instrument_node="">
</span><div class="youtube-player" data-dcnode-id="1689" data-id="JXkMevbjga4"><div data-dcnode-id="1690" data-id="JXkMevbjga4"><img data-dcnode-id="1692" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/JXkMevbjga4/hqdefault.jpg&amp;raw"><div class="play" data-dcnode-id="1691"></div></div></div><span data-dcnode-id="1688" instrument_node="">
</span><h2 data-dcnode-id="1683"><span data-dcnode-id="1687" instrument_node="">The Future That Works: McKinsey Global Institute Research</span><sup data-dcnode-id="1684"><a data-dcnode-id="1685" href="#_edn11" name="_ednref11"><span data-dcnode-id="1686" instrument_node="">[11]</span></a></sup></h2><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680" style="text-align: justify;"><span data-dcnode-id="1681" instrument_node="">McKinsey analysts studied more than 2,000 tasks performed by people of 800 different occupations and came to the following conclusion: almost half of the work that costs employers 15 trillion dollars can be automated using present-day technologies. At the same time only about 5% of these professions can be automated completely with the help of existing technologies and another 60% of occupations can be automated by at least a third.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677" style="text-align: justify;"><span data-dcnode-id="1678" instrument_node="">The tasks most subject to automation include both monotonous predictable physical work, and the collection and processing of data. According to McKinsey analysts, 81% of the time that workers spend on manual labor can be passed on to robots; automation of data processing will save 69% of employees’ work hours, and automation of data collection – 64% of the time previously spent on these processes.</span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674" style="text-align: justify;"><span data-dcnode-id="1675" instrument_node="">For example, in the US, such work accounts for 51% of total working time and costs employers $2.7 trillion. It predominates in production, hospitality industry, catering, retail, and a number of some middle-skill jobs.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671" style="text-align: justify;"><span data-dcnode-id="1672" instrument_node="">Theoretically, by 2055, half of all the work done by people can go to robots. Perhaps this will happen 20 years earlier, or maybe 20 years later – it all depends on many factors: technical capabilities; the cost of developing new technologies and their implementation; demand and supply on labor market and labor costs; economic climate; legal regulation and the influence of society.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668" style="text-align: justify;"><span data-dcnode-id="1669" instrument_node="">Some tasks are much more difficult to automate. As a rule, they are related to planning; interaction with customers, colleagues, and suppliers; use of knowledge and experience for decision-making; creativity; and management and development of personnel.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665" style="text-align: justify;"><span data-dcnode-id="1666" instrument_node="">In theory, automation may affect 1.2 billion people, whose total salary is $14.6 trillion. At the same time, half of these figures fall on the economies of four countries: China, India, Japan, and the United States. In Europe, most of the automation will take place in five countries: France, Germany, Italy, Spain, and the United Kingdom: 62 million people or a combined salary of $1.9 trillion.</span></p><span data-dcnode-id="1664" instrument_node="">

</span><p data-dcnode-id="1243" style="text-align: justify;"><span data-dcnode-id="1244" instrument_node="">Should we be afraid that robots will drive us out of our jobs? Let’s try to find the answer in history.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240" style="text-align: justify;"><span data-dcnode-id="1241" instrument_node="">In the US, the percentage of the population engaged in agriculture fell from 40% in 1900 to 2% in 2000, and for manufacturing industry from 25% in 1950 to less than 10% in 2010. In both cases, the disappearance of jobs in some areas resulted in the emergence of brand new professions. However, in the past it was mostly manual labor of low-skilled workers that was replaced, now it is high-paid specialists with higher education who are at risk of losing their jobs.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237" style="text-align: justify;"><span data-dcnode-id="1238" instrument_node="">An example from banking sphere: people used to believe that the appearance of ATMs would entail massive layoffs of banking employees (tellers). In practice, it turned out to be quite the opposite. Why did this happen? There are 2 reasons for this. First, ATMs allowed saving part of the funds that were used by banks to open new branches. In spite of the fact that not many tellers were required in each branch, it allowed keeping the position from disappearing. Second, ATMs are not able to perform one simple job – to establish relationships with customers (with small businesses in particular), which was much more important. In the case of tellers, the very purpose of their work has changed: the emphasis has shifted from dispersing cash to working with people.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234" style="text-align: justify;"><span data-dcnode-id="1235" instrument_node="">Another example: in 2011, McKinsey analysts estimated how the Internet affected the French labor market. The survey showed that over 15 years the Internet has deprived 500,000 people of work, but at the same time created 1.2 million new jobs (meaning that the disappearance of each old workplace created 2.4 new jobs).</span></p><span data-dcnode-id="1233" instrument_node="">
</span><h2 data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Why Robots Have Not yet Captured the Labor Market</span></h2><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228" style="text-align: justify;"><span data-dcnode-id="1229" instrument_node="">Whatever scientists have boasted about their achievements, robots are still not perfect. Specialists of McKinsey name the areas in which artificial intelligence loses to people (although it has already advanced a great deal):</span></p><span data-dcnode-id="1227" instrument_node="">
</span><ul data-dcnode-id="1198"><span data-dcnode-id="1226" instrument_node="">
</span><li data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">generating novel patterns / categories</span></li><span data-dcnode-id="1223" instrument_node="">
</span><li data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">logical thinking / problem solving</span></li><span data-dcnode-id="1220" instrument_node="">
</span><li data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">creativity</span></li><span data-dcnode-id="1217" instrument_node="">
</span><li data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">coordination of actions with several objects (interaction with other devices and people)</span></li><span data-dcnode-id="1214" instrument_node="">
</span><li data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">understanding human language (i.e., not computer language)</span></li><span data-dcnode-id="1211" instrument_node="">
</span><li data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">determining emotional state and social status</span></li><span data-dcnode-id="1208" instrument_node="">
</span><li data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">ability to draw the right conclusions from the emotional state and social position of the interlocutor, and respond correctly</span></li><span data-dcnode-id="1205" instrument_node="">
</span><li data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">ability to express an emotional response that is appropriate for a particular situation</span></li><span data-dcnode-id="1202" instrument_node="">
</span><li data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">mobility</span></li><span data-dcnode-id="1199" instrument_node="">
</span></ul><span data-dcnode-id="1197" instrument_node="">
</span><h2 data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">What Should Workers and Employers Be Prepared For</span></h2><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192" style="text-align: justify;"><span data-dcnode-id="1193" instrument_node="">No matter how things turn out, companies and their employees should be prepared to face changes.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1185" style="text-align: justify;"><span data-dcnode-id="1190" instrument_node="">According to the study</span><sup data-dcnode-id="1187"><a data-dcnode-id="1188" href="#_edn13" name="_ednref13"><span data-dcnode-id="1189" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1186" instrument_node="">, by ManpowerGroup, technologies change the requirements for employees: to supplement robots (rather than compete with them), people need to develop such qualities as creativity, emotional intelligence, and cognitive flexibility. And companies should invest more in staff training or even in their retraining.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1181" style="text-align: justify; padding-left: 30px;"><strong data-dcnode-id="1182"><em data-dcnode-id="1183"></em></strong></p><div class="codeless_sc" data-dcnode-id="1161"><div class="blockquote" data-dcnode-id="1162"><strong data-dcnode-id="1178"><em data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Emotional intelligence</span></em></strong><em data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">&nbsp;</span></em><em data-dcnode-id="1171"><span data-dcnode-id="1175" instrument_node="">(</span><strong data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">EI</span></strong><span data-dcnode-id="1172" instrument_node="">) is the capability of individuals to recognize their own, and other people’s&nbsp;emotions</span></em><em data-dcnode-id="1165"><span data-dcnode-id="1170" instrument_node="">, to discern between different feelings and label them appropriately, to use emotional information to guide thinking and behavior, and to manage and/or adjust emotions to adapt environments or achieve one’s goal(s).</span><sup data-dcnode-id="1166"><a data-dcnode-id="1167" href="#_edn14" name="_ednref14"><strong data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">[14]</span></strong></a></sup></em><br data-dcnode-id="1164"><span class="source" data-dcnode-id="1163"></span></div></div><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1159" style="text-align: justify; padding-left: 30px;"></p><div class="codeless_sc" data-dcnode-id="1144"><div class="blockquote" data-dcnode-id="1145"><strong data-dcnode-id="1156"><em data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Cognitive flexibility</span></em></strong><em data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">&nbsp;</span></em><em data-dcnode-id="1148"><span data-dcnode-id="1153" instrument_node="">has been described as the mental ability to switch between thinking about two different concepts, and to think about multiple concepts simultaneously.</span><sup data-dcnode-id="1149"><a data-dcnode-id="1150" href="#_edn15" name="_ednref15"><strong data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">[15]</span></strong></a></sup></em><br data-dcnode-id="1147"><span class="source" data-dcnode-id="1146"></span></div></div><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1137" style="text-align: justify;"><span data-dcnode-id="1142" instrument_node="">Deloitte also shared some interesting trends</span><sup data-dcnode-id="1139"><a data-dcnode-id="1140" href="#_edn16" name="_ednref16"><span data-dcnode-id="1141" instrument_node="">[16]</span></a></sup><span data-dcnode-id="1138" instrument_node="">. In February, the company’s specialists published a survey which included over 10,000 directors and HRDs from 140 countries.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134" style="text-align: justify;"><span data-dcnode-id="1135" instrument_node="">Brett Walsh (Head of Deloitte Global Human Capital group) states that while technologies, artificial intelligence, and robotics are changing business models and ways of organizing work, companies should think about reviewing their management practices and organizational models. Companies should already take into account the main trends that were identified during the study:</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131" style="text-align: justify;"><span data-dcnode-id="1132" instrument_node="">Organizations should already be heeding the main trends that were identified during the study:</span></p><span data-dcnode-id="1130" instrument_node="">
</span><ul data-dcnode-id="1098"><span data-dcnode-id="1129" instrument_node="">
</span><li data-dcnode-id="1127" style="text-align: justify;"><span data-dcnode-id="1128" instrument_node="">88% of representatives of surveyed companies see creating of the organization of the future as a priority. Flexibility plays a decisive role – companies must replace a complex management hierarchy with teams that are able to make their own decisions.</span></li><span data-dcnode-id="1126" instrument_node="">
</span><li data-dcnode-id="1124" style="text-align: justify;"><span data-dcnode-id="1125" instrument_node="">83% of managers stress the importance of career development and training. Statics has no place in the modern world: continuous training of employees is critical for the successful development of business in the era of digital technologies.</span></li><span data-dcnode-id="1123" instrument_node="">
</span><li data-dcnode-id="1121" style="text-align: justify;"><span data-dcnode-id="1122" instrument_node="">81% of representatives believe that one of the most important goals for companies is to attract talents. Social networks and analytical and cognitive systems change the process of recruiting staff fundamentally, determining which candidate is best suited for a particular position, team or company.</span></li><span data-dcnode-id="1120" instrument_node="">
</span><li data-dcnode-id="1118" style="text-align: justify;"><span data-dcnode-id="1119" instrument_node="">Corporate culture and engagement have a strong impact on work experience. 79% of respondents believe that the working environment, the welfare of employees, and time management become mandatory in the field of personnel management.</span></li><span data-dcnode-id="1117" instrument_node="">
</span><li data-dcnode-id="1115" style="text-align: justify;"><span data-dcnode-id="1116" instrument_node="">78% recognize the importance of new methods of staff performance management, which assume regular feedback from employees and switching from performance evaluation to training and development of personnel. Working in teams also plays an increasing role, so the company should evaluate the results of not an individual employee, but of the team this employee is a part of, and its role in the achievement of the company’s goals.</span></li><span data-dcnode-id="1114" instrument_node="">
</span><li data-dcnode-id="1112" style="text-align: justify;"><span data-dcnode-id="1113" instrument_node="">78% mention the importance of leadership. Today, more than ever, companies need not just strong leaders – they need leaders of a completely different type. They must be a new generation of more flexible executives with a good knowledge of digital technologies. Such leaders must be able to form a team and lead it; bring people together and support involvement; develop a culture of innovation, learning, and continuous self-improvement.</span></li><span data-dcnode-id="1111" instrument_node="">
</span><li data-dcnode-id="1109" style="text-align: justify;"><span data-dcnode-id="1110" instrument_node="">There is a new generation of products and solutions in the field of human resources management that include mobile applications and artificial intelligence technologies that are easy to learn and use and allow managers to track important indicators in almost real time. 73% of companies stress the importance of using such systems.</span></li><span data-dcnode-id="1108" instrument_node="">
</span><li data-dcnode-id="1106" style="text-align: justify;"><span data-dcnode-id="1107" instrument_node="">71% of respondents note the importance of using analytical methods for data related to employees. Such tools should help organizations better understand the capabilities of their employees, and consequently these tools will be able to provide more personalized recommendations for each individual employee.</span></li><span data-dcnode-id="1105" instrument_node="">
</span><li data-dcnode-id="1103" style="text-align: justify;"><span data-dcnode-id="1104" instrument_node="">69% of managers recognize the importance of ethnic and sociocultural diversity and employee participation in decision-making and company life.</span></li><span data-dcnode-id="1102" instrument_node="">
</span><li data-dcnode-id="1100" style="text-align: justify;"><span data-dcnode-id="1101" instrument_node="">Companies should not regard their officially employed staff as the only workforce, and 63% of managers recognize the importance of augmented labor. Automation, cognitive computing, crowdsourcing, freelance workers – these are the forces that already changing the familiar concept of workflow. Starting in 2017, business should think about the introduction of new digital technologies, and train staff to use them. Companies also need to rethink not only the process of work that is subject to automation, but also the very role of a person who is capable of something that is not accessible to a machine: empathy, communication, persuasion, individual approach, ability to solve problems and think strategically. In the future, these qualities can have the greatest value for organizations.</span></li><span data-dcnode-id="1099" instrument_node="">
</span></ul><span data-dcnode-id="1097" instrument_node="">
</span><h2 data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">What May Happen on a More Global Level</span></h2><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092" style="text-align: justify;"><span data-dcnode-id="1093" instrument_node="">The relocation of the factories to Asia was explained by savings due to cheaper labor. The only inconvenience was that the production was far from the end users, which means additional costs and more time for transportation. But now robots are becoming cheaper than cheap manual labor. In addition, a high degree of automation can improve production speed and performance.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1085" style="text-align: justify;"><span data-dcnode-id="1090" instrument_node="">For this reason, Adidas plans to relocate its footwear production back to Germany</span><sup data-dcnode-id="1087"><a data-dcnode-id="1088" href="#_edn17" name="_ednref17"><span data-dcnode-id="1089" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1086" instrument_node="">, as well as to open a robotic plant in the US, then in the UK or France.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082" style="text-align: justify;"><span data-dcnode-id="1083" instrument_node="">It is possible that other major producers will jump on this bandwagon as well, and gradually production will fully return to its original countries.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079" style="text-align: center;"><span data-dcnode-id="1080" instrument_node="">__________</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1073" style="text-align: justify;"><span data-dcnode-id="1077" instrument_node="">With the further development of technologies, automation can affect many more areas than it does today. But it’s more than likely that this process will take decades. Nevertheless, even now robots are able to replace not only workers in production. In our </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awaragroup.com/blog/technologies-that-will-not-steal-our-jobs/"><span data-dcnode-id="1076" instrument_node="">next article</span></a><span data-dcnode-id="1074" instrument_node=""> we will tell you about real examples of how automation comes to various spheres of human activity (accounting, agriculture, call centers, construction, government, healthcare, hospitality, insurance, legal advice, logistics/transport, manufacturing, mass media, public catering, recruitment, retail)&nbsp;and share our thoughts on whether these technologies can really put people out of jobs.</span></p><span data-dcnode-id="1072" instrument_node="">
