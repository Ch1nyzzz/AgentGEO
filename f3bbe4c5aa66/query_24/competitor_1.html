</span><h2 data-dcnode-id="1499"><span class="mw-headline" data-dcnode-id="1507" id="History"><span data-dcnode-id="1508" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="1500"><span class="mw-editsection-bracket" data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">[</span></span><a data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSelf-driving_truck%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="1504" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1498" instrument_node="">
</span><h3 data-dcnode-id="1488"><span class="mw-headline" data-dcnode-id="1496" id="1990_decade"><span data-dcnode-id="1497" instrument_node="">1990 decade</span></span><span class="mw-editsection" data-dcnode-id="1489"><span class="mw-editsection-bracket" data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">[</span></span><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSelf-driving_truck%26action%3Dedit%26section%3D2" title="Edit section: 1990 decade"><span data-dcnode-id="1493" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1486" instrument_node="">As recorded in June 1995 in </span><a class="mw-redirect" data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Popular_Science_Magazine" title="Popular Science Magazine"><span data-dcnode-id="1485" instrument_node="">Popular Science Magazine</span></a><span data-dcnode-id="1483" instrument_node="">, self-driving trucks were being developed for combat convoys, whereby only the lead truck would be driven by a human and the following trucks would rely on </span><a data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Satellite" title="Satellite"><span data-dcnode-id="1482" instrument_node="">satellite</span></a><span data-dcnode-id="1480" instrument_node="">, an </span><a class="mw-redirect" data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inertial_guidance_system" title="Inertial guidance system"><span data-dcnode-id="1479" instrument_node="">inertial guidance system</span></a><span data-dcnode-id="1477" instrument_node=""> and ground-speed sensors.</span><sup class="reference" data-dcnode-id="1474" id="cite_ref-2"><a data-dcnode-id="1475" href="#cite_note-2"><span data-dcnode-id="1476" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1473" instrument_node="">
</span><a data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Komatsu_Limited" title="Komatsu Limited"><span data-dcnode-id="1472" instrument_node="">Komatsu</span></a><span data-dcnode-id="1470" instrument_node=""> made the earliest development in Autonomous Trucks testing a fleet of 5 Ultra Class truck of 290 Mt in Codelco Mine Radomiro Tomic in Chile in 2005</span><sup class="reference" data-dcnode-id="1467" id="cite_ref-3"><a data-dcnode-id="1468" href="#cite_note-3"><span data-dcnode-id="1469" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1466" instrument_node=""> then in 2007 was installed the first working fleet in the mine Gabriela Mistral in Chile, also a Codelco property.</span><sup class="reference" data-dcnode-id="1463" id="cite_ref-4"><a data-dcnode-id="1464" href="#cite_note-4"><span data-dcnode-id="1465" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1462" instrument_node="">
</span></p><span data-dcnode-id="1460" instrument_node="">
</span><h3 data-dcnode-id="1450"><span class="mw-headline" data-dcnode-id="1458" id="2010_decade"><span data-dcnode-id="1459" instrument_node="">2010 decade</span></span><span class="mw-editsection" data-dcnode-id="1451"><span class="mw-editsection-bracket" data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">[</span></span><a data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSelf-driving_truck%26action%3Dedit%26section%3D3" title="Edit section: 2010 decade"><span data-dcnode-id="1455" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1439"><span data-dcnode-id="1448" instrument_node="">Lockheed Martin with funding from the U.S. Army developed an autonomous truck convoying system that uses a lead truck operated by a human driver with a number of trucks following autonomously.</span><sup class="reference" data-dcnode-id="1445" id="cite_ref-5"><a data-dcnode-id="1446" href="#cite_note-5"><span data-dcnode-id="1447" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1444" instrument_node=""> Developed as part of the Army's Autonomous Mobility Applique System (AMAS), the system consists of an autonomous driving package that has been installed on more than nine types of vehicles and has completed more than 55,000 hours of driving at speeds up to 64 kilometres per hour (40&nbsp;mph) as of 2014.</span><sup class="reference" data-dcnode-id="1441" id="cite_ref-6"><a data-dcnode-id="1442" href="#cite_note-6"><span data-dcnode-id="1443" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1440" instrument_node=""> As of 2017 the Army was planning to field 100–200 trucks as part of a rapid-fielding program.
</span></p><p data-dcnode-id="1423"><span data-dcnode-id="1438" instrument_node="">In Europe, truck </span><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Platoon_%28automobile%29" title="Platoon (automobile)"><span data-dcnode-id="1437" instrument_node="">platooning</span></a><span data-dcnode-id="1435" instrument_node=""> was being considered with the </span><a data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Safe_Road_Trains_for_the_Environment" title="Safe Road Trains for the Environment"><span data-dcnode-id="1434" instrument_node="">Safe Road Trains for the Environment</span></a><span data-dcnode-id="1432" instrument_node=""> approach, a project that ended in September 2012.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1425" style="white-space:nowrap;"><span data-dcnode-id="1431" instrument_node="">[</span><i data-dcnode-id="1427"><a data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1429" title="This claim needs references to reliable sources. (October 2018)"><span data-dcnode-id="1430" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1426" instrument_node="">]</span></sup><span data-dcnode-id="1424" instrument_node="">
</span></p><p data-dcnode-id="1396"><a data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caterpillar_Inc." title="Caterpillar Inc."><span data-dcnode-id="1422" instrument_node="">Caterpillar Inc.</span></a><span data-dcnode-id="1420" instrument_node=""> made early developments in 2013 with the Robotics Institute at Carnegie Mellon University to improve efficiency and reduce cost at various mining and construction sites.</span><sup class="reference" data-dcnode-id="1417" id="cite_ref-7"><a data-dcnode-id="1418" href="#cite_note-7"><span data-dcnode-id="1419" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1416" instrument_node=""> Companies such as </span><a data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Codelco" title="Codelco"><span data-dcnode-id="1415" instrument_node="">Codelco</span></a><span data-dcnode-id="1413" instrument_node=""> Chilean State Mining Company, </span><a data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suncor_Energy" title="Suncor Energy"><span data-dcnode-id="1412" instrument_node="">Suncor Energy</span></a><span data-dcnode-id="1410" instrument_node="">, a </span><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada" title="Canada"><span data-dcnode-id="1409" instrument_node="">Canadian</span></a><span data-dcnode-id="1407" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Energy_company" title="Energy company"><span data-dcnode-id="1406" instrument_node="">energy company</span></a><span data-dcnode-id="1404" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rio_Tinto_Group" title="Rio Tinto Group"><span data-dcnode-id="1403" instrument_node="">Rio Tinto Group</span></a><span data-dcnode-id="1401" instrument_node=""> were among the first to replace human-operated trucks with driverless commercial trucks run by computers.</span><sup class="reference" data-dcnode-id="1398" id="cite_ref-8"><a data-dcnode-id="1399" href="#cite_note-8"><span data-dcnode-id="1400" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1397" instrument_node="">
</span></p><p data-dcnode-id="1392"><b data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">2016</span></b><span data-dcnode-id="1393" instrument_node="">
</span></p><p data-dcnode-id="1369"><a class="mw-redirect" data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Otto_%28company%29" title="Otto (company)"><span data-dcnode-id="1391" instrument_node="">Otto</span></a><span data-dcnode-id="1389" instrument_node="">, demonstrated their self-driving trucks on the highway before being acquired by Uber in August 2016.</span><sup class="reference" data-dcnode-id="1386" id="cite_ref-9"><a data-dcnode-id="1387" href="#cite_note-9"><span data-dcnode-id="1388" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1385" instrument_node=""> In May 2017, San Francisco-based startup Embark</span><sup class="reference" data-dcnode-id="1382" id="cite_ref-10"><a data-dcnode-id="1383" href="#cite_note-10"><span data-dcnode-id="1384" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1381" instrument_node=""> announced a partnership with truck manufacturer </span><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peterbilt" title="Peterbilt"><span data-dcnode-id="1380" instrument_node="">Peterbilt</span></a><span data-dcnode-id="1378" instrument_node=""> to test and deploy autonomous technology in Peterbilt's vehicles.</span><sup class="reference" data-dcnode-id="1375" id="cite_ref-11"><a data-dcnode-id="1376" href="#cite_note-11"><span data-dcnode-id="1377" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1374" instrument_node=""> Waymo has also said to be testing autonomous technology in trucks,</span><sup class="reference" data-dcnode-id="1371" id="cite_ref-12"><a data-dcnode-id="1372" href="#cite_note-12"><span data-dcnode-id="1373" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1370" instrument_node=""> however no timeline has been given for the project.
</span></p><p data-dcnode-id="1351"><span data-dcnode-id="1368" instrument_node="">In April 2016, trucks from major manufacturers including </span><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volvo" title="Volvo"><span data-dcnode-id="1367" instrument_node="">Volvo</span></a><span data-dcnode-id="1365" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daimler_AG" title="Daimler AG"><span data-dcnode-id="1364" instrument_node="">Daimler</span></a><span data-dcnode-id="1362" instrument_node=""> completed a week of autonomous driving across </span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe" title="Europe"><span data-dcnode-id="1361" instrument_node="">Europe</span></a><span data-dcnode-id="1359" instrument_node="">, organized by the </span><a data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netherlands" title="Netherlands"><span data-dcnode-id="1358" instrument_node="">Dutch</span></a><span data-dcnode-id="1356" instrument_node="">, in an effort to get self-driving trucks on the road. Volvo has also developed its own autonomous trucks, called Vera.</span><sup class="reference" data-dcnode-id="1353" id="cite_ref-13"><a data-dcnode-id="1354" href="#cite_note-13"><span data-dcnode-id="1355" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1352" instrument_node="">
</span></p><p data-dcnode-id="1332"><span data-dcnode-id="1350" instrument_node="">In 2016, Anheuser-Busch Inc. and Uber Technologies Inc. joined together and successfully made the first commercial delivery of beer using a self-driving truck. No human action had involved in the driving process and the truck travelled 120 miles.</span><sup class="reference" data-dcnode-id="1347" id="cite_ref-14"><a data-dcnode-id="1348" href="#cite_note-14"><span data-dcnode-id="1349" instrument_node="">[14]</span></a></sup><span data-dcnode-id="1346" instrument_node="">  Another big player investing in this technology is </span><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Google" title="Google"><span data-dcnode-id="1345" instrument_node="">Google</span></a><span data-dcnode-id="1343" instrument_node="">, through its spin-off </span><a data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waymo" title="Waymo"><span data-dcnode-id="1342" instrument_node="">Waymo</span></a><span data-dcnode-id="1340" instrument_node=""> which also delivers freights in </span><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atlanta" title="Atlanta"><span data-dcnode-id="1339" instrument_node="">Atlanta</span></a><span data-dcnode-id="1337" instrument_node="">.</span><sup class="reference" data-dcnode-id="1334" id="cite_ref-15"><a data-dcnode-id="1335" href="#cite_note-15"><span data-dcnode-id="1336" instrument_node="">[15]</span></a></sup><span data-dcnode-id="1333" instrument_node="">
</span></p><p data-dcnode-id="1328"><b data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">2018</span></b><span data-dcnode-id="1329" instrument_node="">
</span></p><p data-dcnode-id="1319"><span data-dcnode-id="1327" instrument_node="">In February 2018, </span><a data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Starsky_Robotics" title="Starsky Robotics"><span data-dcnode-id="1326" instrument_node="">Starsky Robotics</span></a><span data-dcnode-id="1324" instrument_node="">, the San Francisco-based autonomous truck company, completed a 7-mile (11&nbsp;km) fully driverless trip in Florida without a human in the truck, though one was available to take over by remote control. Starsky Robotics became the first player in the self-driving truck game to drive in fully autonomous mode on a public road without a person in the cab.</span><sup class="reference" data-dcnode-id="1321" id="cite_ref-16"><a data-dcnode-id="1322" href="#cite_note-16"><span data-dcnode-id="1323" instrument_node="">[16]</span></a></sup><span data-dcnode-id="1320" instrument_node="">
</span></p><p data-dcnode-id="1303"><span data-dcnode-id="1318" instrument_node="">In July 2018, Uber announced it was shuttering the truck-focused branch of its autonomous vehicles program as part of a reorganization of its Advanced Technologies Group following the </span><a data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Death_of_Elaine_Herzberg" title="Death of Elaine Herzberg"><span data-dcnode-id="1317" instrument_node="">fatal Uber autonomous passenger vehicle crash</span></a><span data-dcnode-id="1315" instrument_node=""> in Tempe, AZ in March 2018.</span><sup class="reference" data-dcnode-id="1312" id="cite_ref-17"><a data-dcnode-id="1313" href="#cite_note-17"><span data-dcnode-id="1314" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1311" instrument_node=""> Shortly after Uber shut down its autonomous truck efforts, two autonomous truck startups, Kodiak Robotics and Ike, were announced featuring alumni from the Uber program.</span><sup class="reference" data-dcnode-id="1308" id="cite_ref-18"><a data-dcnode-id="1309" href="#cite_note-18"><span data-dcnode-id="1310" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="1305" id="cite_ref-19"><a data-dcnode-id="1306" href="#cite_note-19"><span data-dcnode-id="1307" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1304" instrument_node="">
</span></p><p data-dcnode-id="1294"><span data-dcnode-id="1302" instrument_node="">In September 2018, </span><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ford_Motor_Company" title="Ford Motor Company"><span data-dcnode-id="1301" instrument_node="">Ford</span></a><span data-dcnode-id="1299" instrument_node=""> unveiled its own vision of the heavy-duty truck of the future as the F-Vision semi concept which will be a Level 4 autonomous vehicle.</span><sup class="reference" data-dcnode-id="1296" id="cite_ref-20"><a data-dcnode-id="1297" href="#cite_note-20"><span data-dcnode-id="1298" instrument_node="">[20]</span></a></sup><span data-dcnode-id="1295" instrument_node="">
</span></p><p data-dcnode-id="1272"><span data-dcnode-id="1293" instrument_node="">In November 2018, Embark Trucks announced a pilot with national truck fleet </span><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ryder" title="Ryder"><span data-dcnode-id="1292" instrument_node="">Ryder</span></a><span data-dcnode-id="1290" instrument_node=""> and </span><a data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frigidaire" title="Frigidaire"><span data-dcnode-id="1289" instrument_node="">Frigidaire</span></a><span data-dcnode-id="1287" instrument_node=""> appliance manufacturer </span><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electrolux" title="Electrolux"><span data-dcnode-id="1286" instrument_node="">Electrolux</span></a><span data-dcnode-id="1284" instrument_node=""> to deliver refrigerators via autonomous truck from El Paso, TX to Palm Springs, CA.</span><sup class="reference" data-dcnode-id="1281" id="cite_ref-21"><a data-dcnode-id="1282" href="#cite_note-21"><span data-dcnode-id="1283" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1280" instrument_node=""> During the pilot, manually-driven Ryder trucks provided first and last mile delivery while Embark autonomous trucks carried the load as far as 306 miles at a time on </span><a data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interstate_10" title="Interstate 10"><span data-dcnode-id="1279" instrument_node="">I-10</span></a><span data-dcnode-id="1277" instrument_node="">.</span><sup class="reference" data-dcnode-id="1274" id="cite_ref-22"><a data-dcnode-id="1275" href="#cite_note-22"><span data-dcnode-id="1276" instrument_node="">[22]</span></a></sup><span data-dcnode-id="1273" instrument_node="">
</span></p><p data-dcnode-id="1268"><b data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">2019</span></b><span data-dcnode-id="1269" instrument_node="">
</span></p><p data-dcnode-id="1256"><span data-dcnode-id="1267" instrument_node="">In May 2019, the company </span><a class="new" data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTuSimple%26action%3Dedit%26redlink%3D1" title="TuSimple (page does not exist)"><span data-dcnode-id="1266" instrument_node="">TuSimple</span></a><span data-dcnode-id="1264" instrument_node=""> announced a contract for a two-week pilot delivering mail for the </span><a data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Postal_Service" title="United States Postal Service"><span data-dcnode-id="1263" instrument_node="">United States Postal Service</span></a><span data-dcnode-id="1261" instrument_node="">. The company planned to run five round trips between Dallas, Texas and Phoenix, Arizona, with two humans on board. The company started in 2015 and already runs daily cargo for customers in Arizona.</span><sup class="reference" data-dcnode-id="1258" id="cite_ref-23"><a data-dcnode-id="1259" href="#cite_note-23"><span data-dcnode-id="1260" instrument_node="">[23]</span></a></sup><span data-dcnode-id="1257" instrument_node="">
</span></p><p data-dcnode-id="1239"><span data-dcnode-id="1255" instrument_node="">As of June 2019</span><sup class="plainlinks noexcerpt noprint asof-tag update" data-dcnode-id="1252" style="display:none;"><a class="external text" data-dcnode-id="1253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSelf-driving_truck%26action%3Dedit"><span data-dcnode-id="1254" instrument_node="">[update]</span></a></sup><span data-dcnode-id="1251" instrument_node="">, </span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Starsky_Robotics" title="Starsky Robotics"><span data-dcnode-id="1250" instrument_node="">Starsky Robotics</span></a><span data-dcnode-id="1248" instrument_node=""> became the first company to operate fully unmanned on public highways at 55MPH with nobody in the cab of the truck.</span><sup class="reference" data-dcnode-id="1245" id="cite_ref-24"><a data-dcnode-id="1246" href="#cite_note-24"><span data-dcnode-id="1247" instrument_node="">[24]</span></a></sup><span data-dcnode-id="1244" instrument_node=""> Unable to raise additional funding, Starsky shut down operations on March 19, 2020.</span><sup class="reference" data-dcnode-id="1241" id="cite_ref-25"><a data-dcnode-id="1242" href="#cite_note-25"><span data-dcnode-id="1243" instrument_node="">[25]</span></a></sup><span data-dcnode-id="1240" instrument_node="">
</span></p><p data-dcnode-id="1230"><span data-dcnode-id="1238" instrument_node="">In December 2019, </span><a class="mw-redirect mw-disambig" data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plus_%28company%29" title="Plus (company)"><span data-dcnode-id="1237" instrument_node="">Plus</span></a><span data-dcnode-id="1235" instrument_node=""> conducted the industry's first cross-country commercial freight run using a self-driving truck, carrying 40,000 pounds of butter 2,800 miles for Land O'Lakes from Tulare, CA to Quakertown, PA.</span><sup class="reference" data-dcnode-id="1232" id="cite_ref-26"><a data-dcnode-id="1233" href="#cite_note-26"><span data-dcnode-id="1234" instrument_node="">[26]</span></a></sup><span data-dcnode-id="1231" instrument_node="">
</span></p><span data-dcnode-id="1229" instrument_node="">
</span><h3 data-dcnode-id="1219"><span class="mw-headline" data-dcnode-id="1227" id="2020_decade"><span data-dcnode-id="1228" instrument_node="">2020 decade</span></span><span class="mw-editsection" data-dcnode-id="1220"><span class="mw-editsection-bracket" data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">[</span></span><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSelf-driving_truck%26action%3Dedit%26section%3D4" title="Edit section: 2020 decade"><span data-dcnode-id="1224" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1214"><b data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">2020</span></b><span data-dcnode-id="1215" instrument_node="">
</span></p><p data-dcnode-id="1208"><span data-dcnode-id="1213" instrument_node="">In March 2020, the company TuSimple expanded its freight-hauling pilot program with UPS. Currently, the company run 20 trips a week to haul cargo for UPS between Phoenix and Tucson, Arizona, and between Phoenix and El Paso, Texas.</span><sup class="reference" data-dcnode-id="1210" id="cite_ref-27"><a data-dcnode-id="1211" href="#cite_note-27"><span data-dcnode-id="1212" instrument_node="">[27]</span></a></sup><span data-dcnode-id="1209" instrument_node="">
</span></p><p data-dcnode-id="1199"><span data-dcnode-id="1207" instrument_node="">In March 2020, </span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waymo" title="Waymo"><span data-dcnode-id="1206" instrument_node="">Waymo</span></a><span data-dcnode-id="1204" instrument_node=""> announced the official launch of Waymo Via, which includes the use of autonomous Class 8 trucks for delivery.</span><sup class="reference" data-dcnode-id="1201" id="cite_ref-28"><a data-dcnode-id="1202" href="#cite_note-28"><span data-dcnode-id="1203" instrument_node="">[28]</span></a></sup><span data-dcnode-id="1200" instrument_node="">
</span></p><p data-dcnode-id="1190"><span data-dcnode-id="1198" instrument_node="">In July 2020, </span><a class="new" data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLocomation%26action%3Dedit%26redlink%3D1" title="Locomation (page does not exist)"><span data-dcnode-id="1197" instrument_node="">Locomation</span></a><span data-dcnode-id="1195" instrument_node=""> completed a two week pilot with Wilson Logistics where Locomation trucks hauled commercial cargo between Portland, OR and Nampa, ID over I-84.</span><sup class="reference" data-dcnode-id="1192" id="cite_ref-29"><a data-dcnode-id="1193" href="#cite_note-29"><span data-dcnode-id="1194" instrument_node="">[29]</span></a></sup><span data-dcnode-id="1191" instrument_node="">
</span></p><p data-dcnode-id="1184"><span data-dcnode-id="1189" instrument_node="">Also in July 2020, Aurora opened an office in Texas to expand testing of self-driving trucks with commercial routes in the Dallas Fort Worth area by the end of the year.</span><sup class="reference" data-dcnode-id="1186" id="cite_ref-30"><a data-dcnode-id="1187" href="#cite_note-30"><span data-dcnode-id="1188" instrument_node="">[30]</span></a></sup><span data-dcnode-id="1185" instrument_node="">
</span></p><span data-dcnode-id="1183" instrument_node="">
</span><dl data-dcnode-id="1180"><dt data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">2022</span></dt></dl><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1178" instrument_node="">An amendment to a United Nations Regulation on Automated Lane Keeping Systems for their use in heavy vehicles including trucks, buses and coaches is expected to enter into force in June 2022 in the 54 Contracting Parties to the 1958 Agreement, which already apply UN Regulation 157.</span><sup class="reference" data-dcnode-id="1175" id="cite_ref-31"><a data-dcnode-id="1176" href="#cite_note-31"><span data-dcnode-id="1177" instrument_node="">[31]</span></a></sup><span data-dcnode-id="1174" instrument_node="">
</span></p><span data-dcnode-id="1172" instrument_node="">
