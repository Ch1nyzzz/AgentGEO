</span><h3 data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Lane Centering</span></h3><span data-dcnode-id="866" instrument_node="">
</span><div class="readmore-content" data-dcnode-id="860"><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">One of the ways to demonstrate the benefits of autonomous trucking is to break down the tasks of driving to its basic fundamentals. For example, one of the core responsibilities of any driver is to keep the vehicle centered within the driving lane. In this graphic we compare the effectiveness of our autonomous trucking system to that of a human driver.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">As you can see the autonomous system does a far better job keeping the vehicle centered within the lane, in fact the self-driving technology keeps the vehicle centered to within 5 cm.</span></p></div><span data-dcnode-id="859" instrument_node=""> </span></div><span data-dcnode-id="857" instrument_node="">

</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">This is TuSimple’s Website Privacy Policy (“Privacy Policy”). To TuSimple (“we” or “us” or “our”), your privacy is of the utmost importance. This Privacy Policy explains how we collect, use, disclose, share, and safeguard your personal information when you visit our website. at www.TuSimple.com, engage with our marketing operations, or when you contact us, including through email or social media. For simplicity, in this Privacy Statement we call all of these activities “interacting with TuSimple.” Please read this Privacy Policy carefully. If you do not agree with the terms of this Privacy Policy, please do not access this website.</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">This Privacy Policy applies to information we collect when you use our websites and other products and services that link to this Privacy Policy (collectively, the "Services"). We may supply a different privacy policy in relation to some of our Services, and that policy will apply to any information provided to or collected by us pursuant to those Services.This Privacy Statement does not apply to personal information we obtain from individuals interacting with other TuSimple products and services such as vehicles or mobile applications.&nbsp;</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">We operate in the United States and this Privacy Statement is intended for users located in the United States. If you are located outside of the U.S., please be aware that the information we collect will be processed in the U.S. and will be subject to U.S. law. By accessing or using the Services or otherwise providing information to us, you consent to the processing, transfer and storage of information in and to the U.S. and other countries, where you may not have the same rights and protections as you do under local law.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><br data-dcnode-id="517"></p><span data-dcnode-id="515" instrument_node="">

</span><li data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Information You Provide. This information may include personally identifiable information, such as your name, address, email address, phone number, and demographic information, such as your age, gender, hometown, and interests.&nbsp;</span></li><span data-dcnode-id="505" instrument_node="">

</span><li data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">We may also collect information disclosed when entering contests, sweepstakes, or submitting surveys we, or a third-party on our behalf, may run.&nbsp;</span></li><span data-dcnode-id="498" instrument_node="">
</span><li data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Data provided by you from communications and other feedback, including questions, vulnerability reports, and other messages you address to us directly such as email or online forms may also be collected.&nbsp;</span></li><span data-dcnode-id="495" instrument_node="">
</span></ul><span data-dcnode-id="493" instrument_node="">
</span><li data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Automatically Collected Information. When you visit our website, we may use automatic data collection technologies to collect certain information, such as:&nbsp;</span></li><span data-dcnode-id="490" instrument_node="">
</span><ul data-dcnode-id="461"><span data-dcnode-id="489" instrument_node="">
</span><li data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Access times;</span></li><span data-dcnode-id="486" instrument_node="">
</span><li data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">The pages you have viewed directly before and after accessing the website.</span></li><span data-dcnode-id="483" instrument_node="">
</span><li data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Internet Protocol (“IP”) addresses of the devices you're using to interact with us online;&nbsp;</span></li><span data-dcnode-id="480" instrument_node="">
</span><li data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Tools such as cookies and other local storage used by websites and web browsers to maintain information regarding your previous activities on a site;</span></li><span data-dcnode-id="477" instrument_node="">
</span><li data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Information regarding your internet connection including your Internet Service Provider, connection type, and approximate city level location of your internet connection based on IP address;&nbsp;</span></li><span data-dcnode-id="474" instrument_node="">

</span><li data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Specific interactions with our Website (such as which pages you viewed, in what order, and how long you engaged with each page); and</span></li><span data-dcnode-id="465" instrument_node="">

</span></ul><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">The technologies we use for this automatic data collection may include cookies, web beacons, tracking pixels, and other tracking technologies on our website, including:</span></p><span data-dcnode-id="455" instrument_node="">
</span><ul data-dcnode-id="444"><span data-dcnode-id="454" instrument_node="">
</span><li data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Google Analytics. We use Google Analytics to help us understand your use of our website and the popularity of certain content so we can improve your experience. You can learn about Google’s privacy practices at www.google.com/policies/privacy/partners/, and you can opt out of Google Analytics by downloading the Google Analytics opt-out browser add-on, available at https://tools.google.com/dlpage/gaoptout.</span></li><span data-dcnode-id="451" instrument_node="">
</span><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">LinkedIn Insights Tag. We use LinkedIn Insights Tag to retarget our website visitors and learn insights about your interactions with our LinkedIn advertisements. You can learn about LinkedIn’s privacy practices at www.linkedin.com/legal/privacy-policy, and you can opt out of LinkedIn Insights Tag at www.linkedin.com/psettings/.</span></li><span data-dcnode-id="448" instrument_node="">
</span><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Google Ads. We use Google Ads to help us determine how effective our ad campaigns are. You can learn about Google’s privacy practices relating to Google Ads at policies.google.com/privacy, and you can prevent your participation in Google Ads conversion tracking by setting your browser to block cookies from the domain www.googleadservices.com.</span></li><span data-dcnode-id="445" instrument_node="">
</span></ul><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Like many companies, we and our service providers may use "cookies" and other tracking technologies to gather information about your visit to our Website (see “Information We Collect” above). We use these tools to measure site activity, provide a better user experience, and to deliver, evaluate and tailor our marketing communications and online advertisements for you. Cookies are used by websites and web browsers to maintain information regarding your previous activities on a website, including what content has been displayed to you. Cookies are also used to optimize the performance of our Website.</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Some content, including advertisements, on our website may be served by third parties, including advertisers and ad networks. These third parties may use cookies, alone or in conjunction with pixels, web beacons or other tracking technologies, to collect information about you when you use our website. The information they collect may be associated with your personal information or they may collect information, including personal information, about your online activities over time and across different websites and other online services. They may use this information to provide you with personalized ads or other targeted content. You can generally opt out of receiving personalized ads from third party advertisers and ad networks who are members of the Network Advertising Initiative (NAI) or who follow the Digital Advertising Alliance’s Self-Regulatory Principles for Online Behavioral Advertising by visiting the opt out pages on the NAI website and DAA website.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">We may use the personal information you provide to us or that we collect about you to:</span></p><span data-dcnode-id="434" instrument_node="">
</span><ul data-dcnode-id="428"><span data-dcnode-id="433" instrument_node="">
</span><li data-dcnode-id="430"><strong data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Respond to an email or other inquiry or request, including to fulfill your request to subscribe to a TuSimple newsletter;</span></strong></li><span data-dcnode-id="429" instrument_node="">

</span><ul data-dcnode-id="422"><span data-dcnode-id="426" instrument_node="">
</span><li data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Customize your experience on our website;</span></li><span data-dcnode-id="423" instrument_node="">

</span><li data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Protect the rights and property of TuSimple, our users, and others;&nbsp;</span></li><span data-dcnode-id="372" instrument_node="">

</span><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">We will not sell or rent your personal information to anyone.</span></p><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">At all times, TuSimple reserves the right to disclose your personal information where required by law or to comply with a valid legal process (such as a search warrant, subpoena, or court order), to investigate or remedy potential violations of our policies, to protect TuSimple’s rights or property, or during emergencies when personal safety is at risk.</span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">We may also share your personal information with our third-party service providers (but only as necessary to provide services to us) and our affiliates, in which case we will require those third-party service providers and affiliates to keep such information confidential and use it only for the purposes for which we disclose it to them.</span></p><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Among the third-party service providers that TuSimple uses, and which may collect your personal information on TuSimple’s behalf in order to provide services to TuSimple, are the following:</span></p><span data-dcnode-id="349" instrument_node="">
</span><ul data-dcnode-id="338"><span data-dcnode-id="348" instrument_node="">
</span><li data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">MailChimp. We use MailChimp to send newsletters and related communications when you sign up for a newsletter subscription or otherwise opt into communications from us. You can review MailChimp’s privacy policy at https://mailchimp.com/legal/privacy.</span></li><span data-dcnode-id="345" instrument_node="">
</span><li data-dcnode-id="340"><span data-dcnode-id="344" instrument_node="">Greenhouse. We use Greenhouse to assist with our employee recruitment and hiring process. You can review Greenhouse’s privacy policy at </span><a data-dcnode-id="342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenhouse.io/privacy-policy"><span data-dcnode-id="343" instrument_node="">https://www.greenhouse.io/privacy-policy</span></a><span data-dcnode-id="341" instrument_node="">.</span></li><span data-dcnode-id="339" instrument_node="">
</span></ul><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Finally, we may share your personal information with a buyer or other successor company in the event of a merger, divestiture, restructuring, reorganization, dissolution, or other sale or transfer of some or all of TuSimple’s assets, whether as a going concern or as part of a bankruptcy, liquidation, or similar proceeding, in which personal information held by TuSimple about our website visitors is among the assets transferred.</span></p><span data-dcnode-id="334" instrument_node="">
</span><h3 data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Your Choices</span></h3><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="330" instrument_node="">If you have any questions as to how we collect and use your personal information, or would like to opt out of any future contacts from us, please contact us at </span><a data-dcnode-id="328" href="mailto:privacy@tusimple.ai"><span data-dcnode-id="329" instrument_node="">privacy@tusimple.ai</span></a><span data-dcnode-id="327" instrument_node="">. In addition, to the extent required by applicable law, you may have the right to request access to or delete your personal information. If you wish to do any of these things, please contact us at the email address listed above.</span></p><span data-dcnode-id="325" instrument_node="">
</span><h3 data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Do Not Track Features</span></h3><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Most web browsers and some mobile operating systems include a Do-Not-Track (“DNT”) feature or setting you can activate to signal your privacy preference not to have data about your online browsing activities monitored and collected. There is no final uniform technology standard for recognizing and implementing DNT signals. As a result, we do not currently respond to DNT browser signals or any other mechanism that automatically communicates your choice not to be tracked online. If a standard for online tracking is adopted that we must follow in the future, we will inform you about that practice in a revised version of this Privacy Policy.</span></p><span data-dcnode-id="319" instrument_node="">
</span><h3 data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Links to External Websites</span></h3><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">For your convenience and informational purposes, our Website may contain links to external websites that are not owned or controlled by TuSimple. TuSimple has no control over, and assumes no responsibility for, the content, privacy policies, or practices of any external websites. If you visit such sites, your activities and the collection, use, and disclosure of information will be subject to the privacy policies and terms of the external websites or services, and not this Privacy Statement.</span></p><span data-dcnode-id="313" instrument_node="">
</span><h3 data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Children’s Privacy</span></h3><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">TuSimple’s website is not intended for children. It is intended for adults. We do not knowingly collect personal information from children under the age of 13. If we find out that a child under 13 has given us personal information, we will take steps to delete that information.</span></p><span data-dcnode-id="307" instrument_node="">
</span><h3 data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Security</span></h3><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">We have implemented reasonable measures designed to secure your personal information from accidental loss and from unauthorized access, use, alteration and disclosure. But no security measures are 100% secure and, thus, we cannot guarantee the security of your information. Any transmission of personal information is at your own risk. We are not responsible for the circumvention by any third party of any privacy settings or security measures we implement.</span></p><span data-dcnode-id="301" instrument_node="">
</span><h3 data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Job Candidate Privacy</span></h3><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">For information regarding your privacy as a candidate for a position with TuSimple, please visit our Candidate Privacy Statement.</span></p><span data-dcnode-id="295" instrument_node="">
</span><h3 data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Privacy Inquiries and Information Requests</span></h3><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">In some places you may have certain rights under privacy and data protection laws. These may include the right to request to have your personal information updated or deleted, to access your personal information, or to object to TuSimple using that personal information for certain purposes. These rights are subject to verification and certain exceptions. If you are a California resident, for instance, state law affords you certain privacy rights. You can learn more about these in the next section, “California Privacy Rights and Additional Information.”</span></p><span data-dcnode-id="289" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="288" instrument_node="">No matter where you are from, if you have questions or concerns about TuSimple’s privacy practices or this Privacy Statement, please contact us at </span><a data-dcnode-id="286" href="mailto:privacy@tusimple.ai"><span data-dcnode-id="287" instrument_node="">privacy@tusimple.ai</span></a><span data-dcnode-id="285" instrument_node="">.</span></p><span data-dcnode-id="283" instrument_node="">
</span><h2 data-dcnode-id="280"><strong data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">California Privacy Rights and Additional Information</span></strong></h2><span data-dcnode-id="279" instrument_node="">
</span><h3 data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">California Data Access and Deletion Rights</span></h3><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">If you are a California resident, the California Consumer Privacy Act (“CCPA”) allows you to make certain requests about your personal information (as defined in the CCPA). Specifically, the CCPA allows you to request that we:</span></p><span data-dcnode-id="273" instrument_node="">
</span><ul data-dcnode-id="259"><span data-dcnode-id="272" instrument_node="">
</span><li data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Inform you about the categories of personal information we collect or disclose about you; the categories of sources of such information; the business or commercial purpose for collecting your personal information; and the categories of third-parties with whom we share/disclose personal information.&nbsp;</span></li><span data-dcnode-id="269" instrument_node="">
</span><li data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Provide access to and/or a copy of certain personal information we hold about you.</span></li><span data-dcnode-id="266" instrument_node="">
</span><li data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Delete certain personal information we have about you.</span></li><span data-dcnode-id="263" instrument_node="">
</span><li data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Provide you with information about the financial incentives that we offer to you, if any.</span></li><span data-dcnode-id="260" instrument_node="">
</span></ul><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Please note that certain information may be exempt from such requests under California law. For example, we need certain information in order to provide our Website to you.</span></p><span data-dcnode-id="255" instrument_node="">
</span><ul data-dcnode-id="247"><span data-dcnode-id="254" instrument_node="">
</span><li data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Verification: Depending on the sensitivity of the information you are requesting and the type of request you are making, we will take reasonable steps to verify your identity based on the information that we currently possess. This may include, at a minimum, verifying your contact information and matching it with our records.</span></li><span data-dcnode-id="251" instrument_node="">
</span><li data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Authorized Agent: You are also permitted to designate an authorized agent to submit certain requests on your behalf. In order for an authorized agent to be verified, you must provide the authorized agent with signed, written permission to make such requests or a power of attorney. We may also follow up with you to verify your identity before processing the authorized agent’s request.&nbsp;</span></li><span data-dcnode-id="248" instrument_node="">
</span></ul><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">The CCPA further provides you with the right not to be discriminated against (as provided for by applicable law) for exercising your access or deletion rights.</span></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="242" instrument_node="">If you would like to exercise these rights please contact us as </span><a data-dcnode-id="240" href="mailto:privacy@tusimple.ai"><span data-dcnode-id="241" instrument_node="">privacy@tusimple.ai</span></a><span data-dcnode-id="239" instrument_node="">.</span></p><span data-dcnode-id="237" instrument_node="">
</span><h3 data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">California “Shine the Light” Disclosure</span></h3><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">If you are a California resident you have the right to request information from TuSimple regarding the manner in which TuSimple shares certain categories of your personal information with third-parties, for the third-parties’ direct marketing purposes. We do not share personal information for such purposes.</span></p><span data-dcnode-id="231" instrument_node="">

</span><p data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">We reserve the right to make changes to this Privacy Policy from time to time and for any reason. You should check this Privacy Policy regularly to see if there have been any changes. We will alert you about any changes by updating the “Updated” date of this Privacy Policy. You will be deemed to have been made aware of, will be subject to, and will be deemed to have accepted changes in any revised Privacy Policy by your continued use of the website after the date the revised Privacy Policy is posted.</span></p><span data-dcnode-id="225" instrument_node="">
</span><h3 data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Questions and Comments</span></h3><span data-dcnode-id="222" instrument_node="">

</span><div class="mt-40 mb-40" data-dcnode-id="213"><span data-dcnode-id="215" instrument_node=""> </span><hr class="line" data-dcnode-id="214"></div><span data-dcnode-id="212" instrument_node="">
</span><h2 data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">TuSimple Privacy Statement for Applicants and Candidates</span></h2><span data-dcnode-id="209" instrument_node="">
</span><p data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">This Privacy Statement explains what information we collect during the application and recruitment process, how we use that information, and how you may access and update it.</span></p><span data-dcnode-id="206" instrument_node="">
</span><h3 data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Scope</span></h3><span data-dcnode-id="203" instrument_node="">
</span><p data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">TuSimple’s hiring process consists of multiple steps designed to evaluate your skills and qualifications for a particular position. When you choose to participate in the TuSimple hiring process, TuSimple may collect or obtain personal information about you. This information may include:</span></p><span data-dcnode-id="200" instrument_node="">
</span><ul data-dcnode-id="174"><span data-dcnode-id="199" instrument_node="">
</span><li data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Name, address, email address, telephone number, and other contact information</span></li><span data-dcnode-id="196" instrument_node="">
</span><li data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Resume or CV and employment history</span></li><span data-dcnode-id="193" instrument_node="">
</span><li data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Driving history (where applicable)</span></li><span data-dcnode-id="190" instrument_node="">
</span><li data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">Voluntary demographic information, including gender, race, ethnicity, citizenship, and/or nationality</span></li><span data-dcnode-id="187" instrument_node="">
</span><li data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Veteran status</span></li><span data-dcnode-id="184" instrument_node="">
</span><li data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Health information (only if required by law)</span></li><span data-dcnode-id="181" instrument_node="">
</span><li data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">A government-issued ID (only where required by job responsibilities)</span></li><span data-dcnode-id="178" instrument_node="">
</span><li data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">US Work Authorization Documentation</span></li><span data-dcnode-id="175" instrument_node="">
</span></ul><span data-dcnode-id="173" instrument_node="">
</span><p data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">TuSimple will use the information that you provide to assist in our recruitment and hiring process, including the following:</span></p><span data-dcnode-id="170" instrument_node="">
</span><ul data-dcnode-id="153"><span data-dcnode-id="169" instrument_node="">
</span><li data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">Evaluating you for current and future job opportunities, including matching your skills and interests to applicable job requirements;&nbsp;</span></li><span data-dcnode-id="166" instrument_node="">
</span><li data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Communicating with you throughout the hiring process;&nbsp;</span></li><span data-dcnode-id="163" instrument_node="">
</span><li data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">Complying with applicable laws, regulations, legal processes or government requests or inquiries; and&nbsp;</span></li><span data-dcnode-id="160" instrument_node="">
</span><li data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">Improving our hiring and/or recruitment processes, including improving our diversity and inclusion efforts.&nbsp;</span></li><span data-dcnode-id="157" instrument_node="">
</span><li data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">If you are offered and accept employment with TuSimple, information collected about you during the hiring process may become part of your employment record.</span></li><span data-dcnode-id="154" instrument_node="">
</span></ul><span data-dcnode-id="152" instrument_node="">
</span><h3 data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">Data Retention and Deletion</span></h3><span data-dcnode-id="149" instrument_node="">
</span><p data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">We will retain your personal information for the period necessary to fulfill the purposes outlined in this statement unless longer retention is required by law or for auditing purposes.&nbsp;</span></p><span data-dcnode-id="146" instrument_node="">
</span><h3 data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">Privacy Inquiries and Correcting Your Information</span></h3><span data-dcnode-id="143" instrument_node="">
</span><p data-dcnode-id="139"><span data-dcnode-id="142" instrument_node="">If you have concerns or questions about this Privacy Statement for Applicants and Candidates or about TuSimple’s privacy practices, you may contact us at </span><a data-dcnode-id="140" href="mailto:privacy@tusimple.ai"><span data-dcnode-id="141" instrument_node="">privacy@tusimple.ai</span></a></p><span data-dcnode-id="138" instrument_node="">
</span><p data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">In some places, you may have certain rights under data protection law. These may include the right to have your information updated or deleted, to access your information, or to object to TuSimple using it for certain purposes.</span></p><span data-dcnode-id="135" instrument_node="">
</span><p data-dcnode-id="130"><span data-dcnode-id="134" instrument_node="">If you wish to access, correct, or delete your information, please contact </span><a data-dcnode-id="132" href="mailto:privacy@tusimple.ai"><span data-dcnode-id="133" instrument_node="">privacy@tusimple.ai</span></a><span data-dcnode-id="131" instrument_node="">. We will process requests in accordance with applicable law, and there may be circumstances where we are not able to comply with your request.</span></p><span data-dcnode-id="129" instrument_node="">
</span><h3 data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">Updates to Privacy Statement</span></h3><span data-dcnode-id="126" instrument_node="">
</span><p data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">We may update this Privacy Statement from time to time. We will post any changes to this policy to this page.</span></p><span data-dcnode-id="123" instrument_node="">
