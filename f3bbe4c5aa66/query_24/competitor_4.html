:16%"></section><section class="container" data-dcnode-id="604"><div class="section-mission" data-dcnode-id="605"><h1 class="wow fadeInUp" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">OUR MISSION</span></h1><p class="wow fadeInUp sub" data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Plus’s mission is to be the leading self-driving truck company that makes long-haul trucking safer, cheaper, more comfortable, and better for the environment.</span></p><p class="wow fadeInUp text" data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Trucking is the backbone of our country’s economy, society and our personal lives, quietly moving goods we use and eat every day. We are applying automated driving technology to trucks today so that fleets and drivers can start benefiting from this revolutionary technology. Our automated driving system, PlusDrive, will improve the lives of truck drivers around the world, while saving lives lost to heavy truck-related accidents and making our world greener through reduced carbon emissions.</span></p></div></section><section class="section-drive" data-dcnode-id="568"><div class="container" data-dcnode-id="569"><div class="wow fadeInUp" data-dcnode-id="599"><h1 data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">INTRODUCING PlusDrive</span></h1><p class="sub-title" data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Automated Driving System for Heavy Trucks</span></p></div><div class="row" data-dcnode-id="570"><div class="wow fadeInLeft col-xs-12 col-sm-6 drive-item" data-dcnode-id="592"><img alt="PlusDrive vest" data-dcnode-id="598" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.ai/images/home/Truck_icon-6e9439179a.svg&amp;raw"><div data-dcnode-id="593"><p class="title" data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Designed for Safety</span></p><p class="text" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Safety is our top priority, with every truck equipped with a 360° multi-modal sensor fusion system.</span></p></div></div><div class="wow fadeInRight col-xs-12 col-sm-6 drive-item" data-dcnode-id="585"><img alt="PlusDrive vest" data-dcnode-id="591" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.ai/images/home/Gas_icon-803046e4a7.svg&amp;raw"><div data-dcnode-id="586"><p class="title" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Optimized for Performance</span></p><p class="text" data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">We care about the environment, and have designed our system with proprietary algorithms that are constantly optimizing fuel use, thus saving an estimated at least 10% in fuel costs and leaving everyone with a greener planet.</span></p></div></div><div class="wow fadeInLeft col-xs-12 col-sm-6 drive-item" data-dcnode-id="578"><img alt="PlusDrive vest" data-dcnode-id="584" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.ai/images/home/Software_icon-8e690cb2fc.svg&amp;raw"><div data-dcnode-id="579"><p class="title" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Scaled for Learning</span></p><p class="text" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Our advanced trucks have a closed-loop learning system and offer seamless over-the-air software upgrades.</span></p></div></div><div class="wow fadeInRight col-xs-12 col-sm-6 drive-item" data-dcnode-id="571"><img alt="PlusDrive vest" data-dcnode-id="577" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.ai/images/home/Satisfaction_icon-8cf7ca4ac9.svg&amp;raw"><div data-dcnode-id="572"><p class="title" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Validated by Customers</span></p><p class="text" data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Customer satisfaction is important to us. PlusDrive trucks have been tested by top fleets, and are ready to be deployed by top fleets and trucks manufacturers.</span></p></div></div></div></div></section><section class="section-white" data-dcnode-id="558"><div class="container" data-dcnode-id="559"><div class="row section" data-dcnode-id="560"><div class="full wow fadeInLeft col-xs-12 col-sm-7" data-dcnode-id="566"><img alt="Available on Multiple Platforms" data-dcnode-id="567" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.ai/images/home/section-platform-0-ec342f0652.jpg&amp;raw"></div><div class="wow fadeInRight col-xs-12 col-sm-5 text no-overlap" data-dcnode-id="561"><h1 data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Available on Multiple Platforms</span></h1><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">PlusDrive can be installed on an existing truck or as an upfit option on new trucks by truck manufacturers.</span></p></div></div></div></section><section class="section-white section-production" data-dcnode-id="538"><div class="line-up" data-dcnode-id="554"><div data-dcnode-id="555"><img alt="line" class="wow fadeInUp" data-dcnode-id="557" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.ai/images/home/line-left-7ff5be63de.svg&amp;raw"><div class="point" data-dcnode-id="556"></div></div></div><div class="container" data-dcnode-id="543"><div class="row section" data-dcnode-id="544"><div class="wow fadeInLeft col-xs-12 col-sm-5 text" data-dcnode-id="547"><h1 data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">First Self-Driving Trucking Developer to Start Production</span></h1><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">PlusDrive will power the flagship product of the world’s largest heavy truck maker, FAW, starting with the production of the FAW J7L3 in 2021. J7L3 was jointly developed by Plus and FAW.</span></p><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">The J7L3 will also be sold on China’s dominant freight platform of Full Truck Alliance, which serves 10 million truckers and five million shippers.</span></p></div><div class="full wow fadeInRight col-xs-12 col-sm-7" data-dcnode-id="545"><img alt="First Autonomous Trucking Developer to Start Production" data-dcnode-id="546" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.ai/images/home/section-production-0-5fc9fe3f55.jpg&amp;raw"></div></div></div><div class="line-down" data-dcnode-id="539"><div data-dcnode-id="540"><img alt="line" class="wow fadeInUp" data-dcnode-id="542" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.ai/images/home/line-right-acd890625c.svg&amp;raw"><div class="point" data-dcnode-id="541"></div></div></div></section><section class="section-white" data-dcnode-id="528"><div class="container" data-dcnode-id="529"><div class="row section" data-dcnode-id="530"><div class="full wow fadeInLeft col-xs-12 col-sm-7" data-dcnode-id="536"><img alt="Customer Deliveries Start in 2021" data-dcnode-id="537" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.ai/images/home/section-customer-0-afaf2e800b.jpg&amp;raw"></div><div class="wow fadeInRight col-xs-12 col-sm-5 text" data-dcnode-id="531"><h1 data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Customer Deliveries Start in 2021</span></h1><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">We have started delivering PlusDrive to early customers in the U.S. and China.</span></p></div></div></div></section><section class="section-global" data-dcnode-id="474"><div class="container" data-dcnode-id="475"><h1 class="wow fadeInUp" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">GLOBAL COMMERCIALIZATION F
