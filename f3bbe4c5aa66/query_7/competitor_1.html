node=""></span><span data-dcnode-id="1020" instrument_node=""></span></div></div></div></div><div class="sc-1wurrur-0 eulHgk" data-cy="Icons" data-dcnode-id="974"><div class="sc-16h3fns-0 chwtln Icons__Outer-Container" data-dcnode-id="975"><div class="MuiGrid-root Icons__Inner-Container MuiGrid-container MuiGrid-spacing-xs-3" data-dcnode-id="976"><div class="MuiGrid-root Icons__Item-Container MuiGrid-item MuiGrid-grid-xs-12 MuiGrid-grid-sm-6 MuiGrid-grid-md-3" data-cy="Icons__Item-Container" data-dcnode-id="1008"><img alt="icon" data-dcnode-id="1015" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.ctfassets.net/5965pury2lcm/41aJDlcs8xESKLjfabgpNb/dba36900b7334b2ad32fe4de9e3cde30/Icon-light-hourglass.svg&amp;raw"><div class="Icons__Text-Container" data-dcnode-id="1009"><p class="sc-edeore-3 fxxRtL Icons__Title" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Citizen services delivery</span></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="1010"></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Whether it is swift and accurate&nbsp;delivery of critical resources and&nbsp;benefit processing, or contact&nbsp;center&nbsp;activities, people in&nbsp;government everywhere need&nbsp;to work smarter. And personal&nbsp;digital assistants&nbsp;that take on&nbsp;time-consuming routine tasks&nbsp;can help.

</span></p><p></p></div></div><div class="MuiGrid-root Icons__Item-Container MuiGrid-item MuiGrid-grid-xs-12 MuiGrid-grid-sm-6 MuiGrid-grid-md-3" data-cy="Icons__Item-Container" data-dcnode-id="995"><img alt="icon" data-dcnode-id="1007" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.ctfassets.net/5965pury2lcm/2hSCZadWx96MlPeOCqK810/d6a34f3a66c7e4d21d89bbd0d047454d/Icon-light-technology.svg&amp;raw"><div class="Icons__Text-Container" data-dcnode-id="996"><p class="sc-edeore-3 fxxRtL Icons__Title" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Technology modernization</span></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="997"></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Digital assistants emulate human keystrokes and "read" screens to move data from old systems to new ones—quickly, securely, and without errors—with no “rip and replace." RPA also works with existing technology to modernize operations without changing your current systems.
</span></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">
