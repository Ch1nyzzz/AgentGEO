</span><p data-dcnode-id="1481"><span data-dcnode-id="1485" instrument_node="">Business operations have been moving toward digital transformation for years now. But as the world embraces the advantages brought about by </span><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//financesonline.com/artificial-intelligence-statistics/"><span data-dcnode-id="1484" instrument_node="">trends in artificial intelligence</span></a><span data-dcnode-id="1482" instrument_node=""> and machine learning technology, we have also been moving farther away from traditional practices, including manual jobs.</span></p><p data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">The loss of employment has been exacerbated by the disruptions that came with COVID-19 since the beginning of 2020. But as the economy struggles to slowly recover, little hope remains for the reinstatement of several jobs. The reason behind this is the accelerated adoption of modern automation technologies, such as </span><a data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artificial-intelligence.financesonline.com/"><span data-dcnode-id="1479" instrument_node="">artificial intelligence software</span></a><span data-dcnode-id="1477" instrument_node="">, in order for businesses to adapt to the new work environment.</span></p><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">The question, however, is what percentage of jobs have been lost to automation? In this article, we have gathered relevant jobs lost to automation statistics. The goal is not only to give you an overview of how many jobs were lost to automation but also to illustrate the shift in skill needed as new job roles emerge.</span></p><p data-dcnode-id="1472"><img alt="jobs lost to automation statistics - infographic" class="aligncenter wp-image-296015 lazyloaded" data-dcnode-id="1473" data-src="https://financesonline.com/uploads/2021/05/financesonline_infographics_Job_Lost_Automation_Statistics_04052021_v1-1024x1024.png" data-srcset="https://s.financesonline.com/uploads/2021/05/financesonline_infographics_Job_Lost_Automation_Statistics_04052021_v1-1024x1024.png 1024w, https://s.financesonline.com/uploads/2021/05/financesonline_infographics_Job_Lost_Automation_Statistics_04052021_v1-300x300.png 300w, https://s.financesonline.com/uploads/2021/05/financesonline_infographics_Job_Lost_Automation_Statistics_04052021_v1-150x150.png 150w, https://s.financesonline.com/uploads/2021/05/financesonline_infographics_Job_Lost_Automation_Statistics_04052021_v1-768x768.png 768w, https://s.financesonline.com/uploads/2021/05/financesonline_infographics_Job_Lost_Automation_Statistics_04052021_v1-1536x1536.png 1536w, https://s.financesonline.com/uploads/2021/05/financesonline_infographics_Job_Lost_Automation_Statistics_04052021_v1-2048x2048.png 2048w, https://s.financesonline.com/uploads/2021/05/financesonline_infographics_Job_Lost_Automation_Statistics_04052021_v1-48x48.png 48w, https://s.financesonline.com/uploads/2021/05/financesonline_infographics_Job_Lost_Automation_Statistics_04052021_v1-145x145.png 145w, https://s.financesonline.com/uploads/2021/05/financesonline_infographics_Job_Lost_Automation_Statistics_04052021_v1-50x50.png 50w" height="800" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//financesonline.com/uploads/2021/05/financesonline_infographics_Job_Lost_Automation_Statistics_04052021_v1-1024x1024.png&amp;raw" srcset="https://s.financesonline.com/uploads/2021/05/financesonline_infographics_Job_Lost_Automation_Statistics_04052021_v1-1024x1024.png 1024w, https://s.financesonline.com/uploads/2021/05/financesonline_infographics_Job_Lost_Automation_Statistics_04052021_v1-300x300.png 300w, https://s.financesonline.com/uploads/2021/05/financesonline_infographics_Job_Lost_Automation_Statistics_04052021_v1-150x150.png 150w, https:/ </span></div><h3 class="bg-title" data-dcnode-id="1438" id="predictions"><span data-dcnode-id="1439" instrument_node="">Automation Adoption Predictions and Statistics</span></h3><p data-dcnode-id="1433"><span data-dcnode-id="1437" instrument_node="">Before we delve into the current state of job displacement due to automation, let us first look back at that part of the pre-COVID-19 era, which depicted the same scenario. In 2017, McKinsey &amp; Company released a report, which presented data-driven predictions of </span><a data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/~/media/mckinsey/industries/public%2520and%2520social%2520sector/our%2520insights/what%2520the%2520future%2520of%2520work%2520will%2520mean%2520for%2520jobs%2520skills%2520and%2520wages/mgi%2520jobs%2520lost-jobs%2520gained_report_december%25202017.pdf" rel="nofollow"><span data-dcnode-id="1436" instrument_node="">how automation could transform the workforce</span></a><span data-dcnode-id="1434" instrument_node=""> before 2030. Below are some of the relevant jobs lost to automation statistics revealed in the study.</span></p><ul data-dcnode-id="1410"><span data-dcnode-id="1432" instrument_node="">
</span><li data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">By 2030, around 39 million Americans could lose their jobs due to the shift toward automation.</span></li><span data-dcnode-id="1429" instrument_node="">
</span><li data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Nearly 50% of hours spent on work-related tasks could be automated by 2030 depending on the speed of adopting existing technologies.</span></li><span data-dcnode-id="1426" instrument_node="">
</span><li data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Approximately 2,000 work-related activities across 800 professions have the potential to be automated.</span></li><span data-dcnode-id="1423" instrument_node="">
</span><li data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Less than 5% of occupations can be fully automated within a decade.</span></li><span data-dcnode-id="1420" instrument_node="">
</span><li data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">81% of predictable physical work-related tasks could be automated by adopting existing automation technologies.</span></li><span data-dcnode-id="1417" instrument_node="">
</span><li data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Mortgage origination in the US had the highest potential (88%) for automation technology to replace manual labor.</span></li><span data-dcnode-id="1414" instrument_node="">
</span><li data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Jobs that require high school level education or less are more susceptible to being automated than occupations that require post-secondary and college or higher degrees.</span></li><span data-dcnode-id="1411" instrument_node="">
</span></ul><p data-dcnode-id="1405"><span data-dcnode-id="1409" instrument_node="">Furthermore, another study by PricewaterhouseCoopers UK (PwC UK) looks into the potential long-term </span><a data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pwc.co.uk/economic-services/assets/international-impact-of-automation-feb-2018.pdf" rel="nofollow"><span data-dcnode-id="1408" instrument_node="">impact of automation on jobs across various industries</span></a><span data-dcnode-id="1406" instrument_node=""> around the world within over a ten-year timeframe. Below are some of the relevant statistics from the study.</span></p><ul data-dcnode-id="1394"><span data-dcnode-id="1404" instrument_node="">
</span><li data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">At the time of the survey, 37% of workers were concerned about the possibility of losing employment due to automation.</span></li><span data-dcnode-id="1401" instrument_node="">
</span><li data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">More than 50% of jobs in the transportation and storage sectors are at risk of being automated by 2030—the highest potential job displacement rate across different industries.</span></li><span data-dcnode-id="1398" instrument_node="">
</span><li data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">On the other hand, jobs in the education sector will be the least affected by the adoption of automation technologies.</span></li><span data-dcnode-id="1395" instrument_node="">
</span></ul><p data-dcnode-id="1389"><span data-dcnode-id="1393" instrument_node="">In a more recent report by the World Economic Forum on </span><a data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.weforum.org/reports/the-future-of-jobs-report-2020/in-full" rel="nofollow"><span data-dcnode-id="1392" instrument_node="">the future of jobs</span></a><span data-dcnode-id="1390" instrument_node="">, it shows how automation adoption has not been disrupted by the global pandemic. Instead, utilizing modern technologies has been accelerated, and so as the plans to automate tasks and job roles in the next five years. Moreover, part of the reasons behind reducing the number of workers is the plan to go instead with contractors, which creates jobs lost to automation vs outsourcing scenario.</span></p><ul data-dcnode-id="1375"><span data-dcnode-id="1388" instrument_node="">
</span><li data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">43% of employers are still set on cutting down on their workforce to make way for technology integration.</span></li><span data-dcnode-id="1385" instrument_node="">
</span><li data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Meanwhile, 41% of employers plan instead to hire contractors to perform tasks that require specific skills.</span></li><span data-dcnode-id="1382" instrument_node="">
</span><li data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Among the expectations of employers is to reduce the number of redundant roles by 6.4%.</span></li><span data-dcnode-id="1379" instrument_node="">
</span><li data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">By 2025, the estimated number of jobs that might be displaced due to automation and outsourcing is 85 million.</span></li><span data-dcnode-id="1376" instrument_node="">
</span></ul><div class="custom-chart" data-anim="true" data-dcnode-id="1110" data-img-script="https://financesonline.com/media/themes/fot/dist/js/vendor/dom-to-image.min.js" data-percent="1"><span data-dcnode-id="1374" instrument_node="">

</span></div><h3 class="bg-title" data-dcnode-id="1108" id="world"><span data-dcnode-id="1109" instrument_node="">Job Displacement Statistics Across the World</span></h3><p data-dcnode-id="1100"><span data-dcnode-id="1107" instrument_node="">Previously, we noted the </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//financesonline.com/10-disappearing-jobs-that-wont-exist-in-10-years-professions-that-wont-guarantee-career-opportunities/"><span data-dcnode-id="1106" instrument_node="">10 jobs that will not exist in 10 years</span></a><span data-dcnode-id="1104" instrument_node="">. As businesses across industries transition to digital operations, many roles are being deemed redundant and are therefore at risk of being </span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//financesonline.com/machine-learning-statistics/"><span data-dcnode-id="1103" instrument_node="">performed by machine learning technology</span></a><span data-dcnode-id="1101" instrument_node=""> and AI algorithms. But although the same trend is happening in different industries across the globe, the level of impact varies significantly by country.</span></p><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">For example, more than 40% of Eastern Europe’s economies are dominated by industrial production. Meanwhile, the United States’ economy, as well as the United Kingdom’s, are more services-centric. Between the workers from Eastern European countries, the US, and UK, workers from the former are more susceptible to job displacement as industrial production processes are easier to automate. Now, let us take a look at other relevant statistics below.</span></p><ul data-dcnode-id="1081"><span data-dcnode-id="1097" instrument_node="">
</span><li data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">As of 2020, 36% of organizations worldwide agreed that AI technology will transform their business operations within one to three years. (Ammanath et al., 2020; Liu, 2020)</span></li><span data-dcnode-id="1094" instrument_node="">
</span><li data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Meanwhile, in the US insurance industry, the accounting sector has the highest potential displacement rate (49%) by 2030 due to the adoption of automation technology. (Statista Research Department, 2020; McKinsey &amp; Company, 2020)</span></li><span data-dcnode-id="1091" instrument_node="">
</span><li data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">In China, around 72 million jobs in the services sector are in danger of being replaced by AI and related technologies by 2037. (Statista Research Department, 2020)</span></li><span data-dcnode-id="1088" instrument_node="">
</span><li data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Slovakia and Slovenia have the highest potential job automation rates (44% and 42%, respectively) across the 27 Organisation for Economic Co-operation and Development countries. (PwC UK, n.d.)</span></li><span data-dcnode-id="1085" instrument_node="">
</span><li data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Furthermore, Finland and South Korea have the lowest share of existing jobs that can potentially be automated (both at 22%). (PwC UK)</span></li><span data-dcnode-id="1082" instrument_node="">
</span></ul><p data-dcnode-id="1079"><img alt="job displacement in the US accounting sector and China" class="aligncenter wp-image-295320 lazyloaded" data-dcnode-id="1080" data-src="https://financesonline.com/uploads/2021/04/job-displacement-in-the-US-accounting-sector-and-China.jpg" data-srcset="https://s.financesonline.com/uploads/2021/04/job-displacement-in-the-US-accounting-sector-and-China.jpg 1020w, https://s.financesonline.com/uploads/2021/04/job-displacement-in-the-US-accounting-sector-and-China-300x235.jpg 300w, https://s.financesonline.com/uploads/2021/04/job-displacement-in-the-US-accounting-sector-and-China-768x602.jpg 768w, https://s.financesonline.com/uploads/2021/04/job-displacement-in-the-US-accounting-sector-and-China-61x48.jpg 61w, https://s.financesonline.com/uploads/2021/04/job-displacement-in-the-US-accounting-sector-and-China-185x145.jpg 185w" height="471" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//financesonline.com/uploads/2021/04/job-displacement-in-the-US-accounting-sector-and-China.jpg&amp;raw" srcset="https://s.financesonline.com/uploads/2021/04/job-displacement-in-the-US-accounting-sector-and-China.jpg 1020w, https://s.financesonline.com/uploads/2021/04/job-displacement-in-the-US-accounting-sector-and-China-300x235.jpg 300w, https://s.financesonline.com/uploads/2021/04/job-displacement-in-the-US-accounting-sector-and-China-768x602.jpg 768w, https://s.financesonline.com/uploads/2021/04/job-displacement-in-the-US-accounting-sector-and-China-61x48.jpg 61w, https://s.financesonline.com/uploads/2021/04/job-displacement-in-the-US-accounting-sector-and-China-185x145.jpg 185w" width="600"></p><h3 class="bg-title" data-dcnode-id="1077" id="workers"><span data-dcnode-id="1078" instrument_node="">Demographics of Workers at Risk of Job Displacement from Automation</span></h3><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">As we uncover more jobs lost to automation statistics, we also learn that age, gender, educational attainment, etc., can play a factor in determining which workers are more at risk of job displacement due to digitization and automation.</span></p><ul data-dcnode-id="1061"><span data-dcnode-id="1074" instrument_node="">
</span><li data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">In the US, workers between the ages of 18 to 34 are the most affected by job displacement from automation. (Feldman, 2019)</span></li><span data-dcnode-id="1071" instrument_node="">
</span><li data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">By the late 2020s, nearly 25% of women workers are at risk of being displaced compared to more than 15% of men. (PwC UK)</span></li><span data-dcnode-id="1068" instrument_node="">
</span><li data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Highly educated men and women have higher opportunities to work in sectors where they are less likely to be displaced due to technology integration. (PwC UK)</span></li><span data-dcnode-id="1065" instrument_node="">
</span><li data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Men with a lower level of education are more at risk of automation than women with the same educational level (52% and 29%, respectively. (PwC UK)</span></li><span data-dcnode-id="1062" instrument_node="">
</span></ul><div class="custom-chart" data-anim="true" data-dcnode-id="804" data-export="true" data-home-url="https://financesonline.com"><span data-dcnode-id="1056" instrument_node="">
</span><div class="stacked-horizontal-bar" data-dcnode-id="809"><span data-dcnode-id="1055" instrument_node="">

to, &quot;Lucida Sans Unicode&quot;, Arial; font-size: 16pt; white-space: nowrap; margin-left: 0px; margin-top: 0px; left: 32.5px; top: 17px; color: rgb(0, 86, 145); font-weight: 300; text-align: center; width: 681px; display: block;"><h3 class="chartist-header" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Number of Jobs Potentially Lost to Displacement from Automation</span></h3></span><span class="highcharts-subtitle" data-dcnode-id="816" data-z-index="4" style="position: absolute; font-family: Lato, &quot;Lucida Sans Unicode&quot;, Arial; font-size: 13pt; white-space: nowrap; margin-left: 0px; margin-top: 0px; left: 194px; top: 72px; color: rgb(0, 0, 0);"><h4 class="chartist-subtitle" data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">By 2030 - By Age Group, in Thousands</span></h4></span><span class="highcharts-caption" data-dcnode-id="813" data-z-index="4" style="position: absolute; font-family: &quot;Lucida Grande&quot;, &quot;Lucida Sans Unicode&quot;, Arial, Helvetica, sans-serif; font-size: 14px; white-space: nowrap; margin: 0px; left: 491px; top: 409px; color: rgb(0, 0, 0);"><span data-dcnode-id="815" instrument_node="">Designed by </span><img data-dcnode-id="814" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//financesonline.com/media/themes/fot/dist/img/svg/logo_black.svg&amp;raw" style="display: inline-block;margin: 0;position: absolute;top: -25px;width: 165px;min-width: 165px;left: calc(100% - 10px);height: 75px;" width="150"></span></div></div><span data-dcnode-id="810" instrument_node="">
</span></div><span data-dcnode-id="808" instrument_node="">
</span><p class="charts-source" data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Source: McKinsey Global Institute</span></p><div class="clearfix" data-dcnode-id="805"></div></div><h3 class="bg-title" data-dcnode-id="802" id="impact"><span data-dcnode-id="803" instrument_node="">The Impact of Coronavirus on Job Displacement from Automation</span></h3><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">As if a large portion of the world’s population does not have to worry enough about the loss of employment due to the COVID-19 pandemic, job recovery is also being threatened. According to a 2020 report by the World Economic Forum (WEF), among the roles that can be displaced in the near future include data entry clerks; accounting, bookkeeping, and payroll clerks; administrative and executive secretaries; accountants and auditors; assembly and factory workers; and business services and administrative managers.</span></p><ul data-dcnode-id="780"><span data-dcnode-id="799" instrument_node="">
</span><li data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Around 85 million jobs can be displaced by 2025 as a new generation of smart machines takes over a larger portion of job roles. (World Economic Forum, 2020)</span></li><span data-dcnode-id="796" instrument_node="">
</span><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">43% of businesses reveal that they are set to cut down on their workforce due to the integration of new technology. (World Economic Forum, 2020)</span></li><span data-dcnode-id="793" instrument_node="">
</span><li data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Almost 50% of the CEOs surveyed plan to significantly increase their long-term investment on digital transformation. (PwC, 2021)</span></li><span data-dcnode-id="790" instrument_node="">
</span><li data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Among the core goals of 36% of CEOs is to focus on technology and automation to boost productivity. (PwC, 2021)</span></li><span data-dcnode-id="787" instrument_node="">
</span><li data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">In Central and Eastern Europe (CEE), 36% of the jobs threatened by the COVID-19 pandemic are also at risk of being displaced because of automation adoption by 2030. (McKinsey &amp; Company, 2020)</span></li><span data-dcnode-id="784" instrument_node="">
</span><li data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Still, in CEE, the wholesale and retail industry has the highest number of jobs (approximately 805,000) at risk of displacement due to COVID-19 and robotic process automation. (Sava, 2021; McKinsey &amp; Company, 2020)</span></li><span data-dcnode-id="781" instrument_node="">
</span></ul><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">To alleviate the impact of job displacement from automation, employers and employees alike turn to online learning for upskilling and reskilling training.</span></p><ul data-dcnode-id="755"><span data-dcnode-id="777" instrument_node="">
</span><li data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Employers expect to offer reskilling and upskilling to 70% of their workforce by 2025.</span></li><span data-dcnode-id="774" instrument_node="">
</span><li data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">40% of workers are estimated to require reskilling for a period of six months.</span></li><span data-dcnode-id="771" instrument_node="">
</span><li data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Despite employer’s desire to upskill or reskill more than half of their employees, only 42% will grab the opportunity to learn.</span></li><span data-dcnode-id="768" instrument_node="">
</span><li data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">21% of businesses are able to utilize public funds for their employees’ reskilling and upskilling plans.</span></li><span data-dcnode-id="765" instrument_node="">
</span><li data-dcnode-id="760"><span data-dcnode-id="764" instrument_node="">The interest in personal development courses has increased by 88% among workers who access government-supported </span><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//financesonline.com/top-20-most-affordable-lms-software/"><span data-dcnode-id="763" instrument_node="">LMS tools</span></a><span data-dcnode-id="761" instrument_node="">.</span></li><span data-dcnode-id="759" instrument_node="">
</span><li data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">50% of workers who have been displaced are planned to be redeployed by their employers.</span></li><span data-dcnode-id="756" instrument_node="">
</span></ul><p data-dcnode-id="753"><img alt="job displacement due to technology" class="aligncenter wp-image-295321 lazyloaded" data-dcnode-id="754" data-src="https://financesonline.com/uploads/2021/04/job-displacement-due-to-technology.jpg" data-srcset="https://s.financesonline.com/uploads/2021/04/job-displacement-due-to-technology.jpg 1020w, https://s.financesonline.com/uploads/2021/04/job-displacement-due-to-technology-300x206.jpg 300w, https://s.financesonline.com/uploads/2021/04/job-displacement-due-to-technology-768x527.jpg 768w, https://s.financesonline.com/uploads/2021/04/job-displacement-due-to-technology-70x48.jpg 70w, https://s.financesonline.com/uploads/2021/04/job-displacement-due-to-technology-211x145.jpg 211w" height="412" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//financesonline.com/uploads/2021/04/job-displacement-due-to-technology.jpg&amp;raw" srcset="https://s.financesonline.com/uploads/2021/04/job-displacement-due-to-technology.jpg 1020w, https://s.financesonline.com/uploads/2021/04/job-displacement-due-to-technology-300x206.jpg 300w, https://s.financesonline.com/uploads/2021/04/job-displacement-due-to-technology-768x527.jpg 768w, https://s.financesonline.com/uploads/2021/04/job-displacement-due-to-technology-70x48.jpg 70w, https://s.financesonline.com/uploads/2021/04/job-displacement-due-to-technology-211x145.jpg 211w" width="600"></p><h3 class="bg-title" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Reskilling and/or Upskilling Can Save Jobs</span></h3><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">The unprecedented disruption brought by COVID-19 has only aggravated the situation of workers who are already threatened by the digitization and automation of work-related tasks. Hope, however, is not completely lost as there are ways for workers to either keep their roles or learn to perform a new one. Reskilling or upskilling workers is not a new trend, but the economic downturn caused by the pandemic has led businesses to realize that human capital investment is extremely valuable.</span></p><p data-dcnode-id="744"><span data-dcnode-id="748" instrument_node="">According to WEF’s 2020 report on the future of jobs, 40% of the core skills of workers are expected to change in the next five years. And while reskilling and/or upskilling is not 100% applicable to all workers in danger of getting displaced, it can help those who are qualified and are willing to train to adapt to the rapidly changing work environment. This practice, of course, is best done in tandem with the </span><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//financesonline.com/top-5-learning-management-systems-business-use/"><span data-dcnode-id="747" instrument_node="">best learning management systems for business</span></a><span data-dcnode-id="745" instrument_node="">.</span></p><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">&nbsp;</span></p><p data-dcnode-id="739"><strong data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">References:</span></strong></p><ol data-dcnode-id="635"><span data-dcnode-id="738" instrument_node="">
