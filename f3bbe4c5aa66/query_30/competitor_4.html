</span><i class="gfg-icon gfg-icon_thumbs" data-dcnode-id="918"></i></button></div></div></div><div class="media" data-dcnode-id="905"><div class="meta" data-dcnode-id="906"><ul data-dcnode-id="907"><li data-dcnode-id="908"><span class="strong" data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Last Updated :</span></span><span data-dcnode-id="911" instrument_node="">
</span><span data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">03 Feb, 2022</span></span></li></ul></div></div><div class="text" data-dcnode-id="692"><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">If an object changes its position with respect to time, the object is known to be in motion. The path for the motion shall vary, it is what defines the different types of motion. If the motion is only in one coordinate, it becomes 1-D or one-dimensional motion, if the motion is in two coordinates, it becomes 2-D or two-dimensional motion, if the motion includes all the three coordinates, it becomes a 3-D or three-dimensional motion. Motion is known to a relative, and it is explained through the frame of reference. Let’s start by learning what Frame of Reference is,</span></p><h3 data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Frame of Reference</span></h3><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Suppose two friends are standing on the opposite sides of the road and a vehicle is passing by them. Friends 1 realizes that the vehicle is passing by his right side while friend 2 realizes that the vehicle is passing by his left side. They observed two different situations for the same vehicle, this is because they have a different frame of reference. The frame of reference is generated by the reference points which is different in both of the friends’ cases. The reference points were the opposite sides of the roads in this case.</span></p><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">In Physics, there are three coordinates, and they are mutually perpendicular to each other. The co-ordinate geometry is actually the space in real life. The coordinates coincide with each other and where they do, the values of all the coordinates are at 0. It is called as the origin. The origin is the Reference point. Humans see the world with their eyes as the reference point and all the motion occurs relative to their position.</span></p><div data-dcnode-id="896" id="GFG_AD_gfg_mobile_336x280"></div><p data-dcnode-id="894"><img data-dcnode-id="895" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.geeksforgeeks.org/wp-content/uploads/20210614141729/1d1.PNG&amp;raw" width="386"></p><h3 data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">One-Dimensional Motion</span></h3><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">One-dimensional motion or rectilinear motion is motion in a straight line, only covering one of the three coordinates. For example, a train moving on a straight track, motion under free fall.</span></p><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Linear motion or rectilinear motion can be of two types,&nbsp;</span></p><p data-dcnode-id="885"><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Uniform Linear motion</span></strong></p><blockquote data-dcnode-id="882"><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Motion is known to be uniform when the body covers equal distance in equal amount of time moving on a straight line.</span></p></blockquote><p data-dcnode-id="879"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Non- uniform Linear motion</span></strong></p><blockquote data-dcnode-id="876"><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Motion is known to be non-uniform when the body covers unequal distance in equal amount of time moving on a straight line.</span></p></blockquote><h3 data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Distance</span></h3><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Distance is the total path covered by the object in motion, irrespective of the direction of the path. Distance is known to be a scalar quantity as only path length covered is measured and the direction of motion is not taken into account. The distance can only be positive.&nbsp;</span></p><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Distance gives detailed information of the entire path covered during motion. Distance is represented as ‘d’ and it is not represented with an arrow as the direction is not involved.&nbsp;</span></p><p data-dcnode-id="868"><img data-dcnode-id="869" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.geeksforgeeks.org/wp-content/uploads/20210614182708/1d2.PNG&amp;raw"></p><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Distance covered from A to B = (x+ y) units.</span></p><blockquote data-dcnode-id="863"><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Formula for Distance (d) = Speed × Time</span></p></blockquote><h3 data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Displacement</span></h3><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Displacement is defined as the total change in the position of the object along with the direction of motion. Displacement is known to be vector quantity as along with the magnitude of the changed position, the direction of the motion is also taken into account. Displacement can be positive, negative, or zero.</span></p><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Displacement does not give detailed information of the entire path length, the initial and the final position is required for the calculation of the displacement. Displacement is represented as ‘S’ and an arrow is used to indicate that displacement is a vector quantity. Displacement always has a straight-lined path as the initial and final points are directly connected to find the displacement.</span></p><p data-dcnode-id="855"><img data-dcnode-id="856" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.geeksforgeeks.org/wp-content/uploads/20210614183434/1d3.PNG&amp;raw" width="318"></p><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Displacement from A to B= z units (in the south-east direction).</span></p><blockquote data-dcnode-id="850"><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Formula for Displacement= velocity × time.</span></p></blockquote><h3 data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Sample Problems</span></h3><p data-dcnode-id="845"><strong data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Question 1: List out at least 3 differences between distance and displacement.</span></strong></p><p data-dcnode-id="842"><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Answer:</span></strong></p><blockquote data-dcnode-id="814"><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Difference between distance and displacement,</span></p><figure class="table" data-dcnode-id="815"><table data-dcnode-id="816"><tbody data-dcnode-id="817"><tr data-dcnode-id="833"><td data-dcnode-id="837"><strong data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Distance</span></strong></td><td data-dcnode-id="834"><strong data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Displacement</span></strong></td></tr><tr data-dcnode-id="828"><td data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Distance is the total path length</span></td><td data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">It is the length between initial and final points.</span></td></tr><tr data-dcnode-id="823"><td data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Distance has no direction</span></td><td data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Displacement has direction</span></td></tr><tr data-dcnode-id="818"><td data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Distance gives detailed info about path length</span></td><td data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Displacement does not give detailed information about the path length.</span></td></tr></tbody></table></figure></blockquote><p data-dcnode-id="811"><strong data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Question 2: What is the distance and displacement from the given figure,</span></strong></p><p data-dcnode-id="809"><img data-dcnode-id="810" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.geeksforgeeks.org/wp-content/uploads/20210614185333/1d4.PNG&amp;raw" width="336"></p><p data-dcnode-id="806"><strong data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Solution:</span></strong></p><blockquote data-dcnode-id="794"><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Distance is the total path length,</span></p><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Distance = (3+ 4) m = 7meters.</span></p><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Displacement is the direct line from A to B,</span></p><p data-dcnode-id="797"><span data-dcnode-id="799" instrument_node="">Displacement=&nbsp;</span><img alt="\sqrt{3^2+4^2}= \sqrt{9+ 16}= \sqrt{25}= 5meters" class="ql-img-inline-formula quicklatex-auto-format" data-dcnode-id="798" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.geeksforgeeks.org/wp-content/ql-cache/quicklatex.com-ed95ba1c65b7eea19b4e5a09c78057b0_l3.svg&amp;raw" style="vertical-align:-4px" title="Rendered by QuickLaTeX.com" width="445"></p><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Therefore, Displacement= 5 meters (south- east direction).</span></p></blockquote><p data-dcnode-id="791"><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Question 3: A particle has covered a distance of 1000 meters and a displacement of 200 meters in 1minute 40 seconds. Find the Speed and Velocity of the particle during motion?</span></strong></p><p data-dcnode-id="788"><strong data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Solution:</span></strong></p><blockquote data-dcnode-id="777"><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Time taken = 1 minute 40 seconds = 100 seconds</span></p><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Speed= distance/ time</span></p><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Speed= 1000/ 100 = 10m/sec</span></p><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Velocity= displacement/ time</span></p><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Velocity= 200/100 = 2&nbsp;m/sec</span></p></blockquote><p data-dcnode-id="774"><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Question 4: A boy is facing North, and he starts moving, he walked 5 meters straight and then turns right and walked 3 meters, then he turns right and again walks 5 meters. What is the distance and displacement covered by the boy?</span></strong></p><p data-dcnode-id="771"><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Solution:</span></strong></p><blockquote data-dcnode-id="760"><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">The figure for the path traveled by the boy shall look like,</span></p><p data-dcnode-id="767"><img data-dcnode-id="768" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.geeksforgeeks.org/wp-content/uploads/20210614192008/1d5.PNG&amp;raw" width="201"></p><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Distance Covered by the boy= (5+ 3+ 5) m = 13m</span></p><p data-dcnode-id="763"><img data-dcnode-id="764" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.geeksforgeeks.org/wp-content/uploads/20210614192521/1d6.PNG&amp;raw"></p><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Displacement= 3&nbsp;m (in the east direction)</span></p></blockquote><p data-dcnode-id="757"><strong data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Question 5: The speed and the velocity of a car is given as 5 m/sec, and the time taken in the whole journey is 5 minutes, what are the observations drawn from that information?</span></strong></p><p data-dcnode-id="754"><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Solution:</span></strong></p><blockquote data-dcnode-id="741"><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Time taken in the whole journey= 5 minutes= 5× 60= 300 seconds.</span></p><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Speed given= 5 m/sec</span></p><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Distance= 5× 300= 1500 meters= 1.5 km</span></p><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Velocity= 5 m/sec</span></p><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Displacement= 5× 300= 1500 meters= 1.5 km.</span></p><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Observation- The distance and the displacement are both equal since the speed and the velocity of the car is equal. Therefore, it can be said that the car has traveled only in a straight direction.</span></p></blockquote><p data-dcnode-id="735"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Question 6: A boy decided to take a walk around his town in the</span></strong><span data-dcnode-id="738" instrument_node=""> </span><strong data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">evening, he started from his home and traveled approximately 1500 meters in 30 minutes. He finally came back to his home. Find the values of the following quantities,</span></strong></p><ul data-dcnode-id="725"><li data-dcnode-id="732"><strong data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Speed</span></strong></li><li data-dcnode-id="729"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Displacement</span></strong></li><li data-dcnode-id="726"><strong data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Velocity</span></strong></li></ul><p data-dcnode-id="722"><strong data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Solution:</span></strong></p><blockquote data-dcnode-id="711"><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Given: Distance= 1500 meters, Time= 30 minutes= 30× 60 seconds= 1800 seconds.</span></p><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Speed = distance/ time</span></p><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Speed= 1500/1800= 0.833 m/sec</span></p><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Displacement= 0 meters (as the boy finally came back to his house, so the initial and the final point coincided).</span></p><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Velocity = Displacement/ time= 0/ 1800= 0 m/sec</span></p></blockquote><div class="textBasedMannualAds_2" data-dcnode-id="707"><p data-dcnode-id="708"><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//practice.geeksforgeeks.org/events/rec/step-up-coding-school%3Futm_source%3Dgfg%26utm_medium%3Din-article%26utm_campaign%3Dbi-wizard" rel="noopener" target="_blank"><img alt="" class="ad_course_banner" data-dcnode-id="710" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.geeksforgeeks.org/wp-content/post-ads-banner/2022-05-24-10-54-13-BIwizardInArticleAd.webp&amp;raw"></a></p></div><div class="clear hideIt" data-dcnode-id="693" id="personalNoteDiv"><div class="personalNoteHeader clear" data-dcnode-id="700"><span class="noteHeaderText" data-dcnode-id="
