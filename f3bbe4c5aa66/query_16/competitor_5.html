"><time class="entry-date updated-date" data-dcnode-id="4283" datetime="2021-01-31T01:10:09-06:00" itemprop="dateModified"><span data-dcnode-id="4284" instrument_node=""> Last Updated : January 31, 2021</span></time><span data-dcnode-id="4282" instrument_node=""> | </span></span><span data-dcnode-id="4280" instrument_node=""> </span><span class="byline" data-dcnode-id="4274"><span data-dcnode-id="4279" instrument_node="">by </span><span class="author vcard" data-dcnode-id="4275" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="4276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redbus2us.com/author/admin/" itemprop="url" rel="author" title="View all posts by Kumar"><span class="author-name" data-dcnode-id="4277" itemprop="name"><span data-dcnode-id="4278" instrument_node="">Kumar</span></span></a></span></span><span data-dcnode-id="4273" instrument_node=""> | </span><span class="comments-link" data-dcnode-id="4270"><a data-dcnode-id="4271" href="#comments"><span data-dcnode-id="4272" instrument_node="">111 Comments </span></a></span></div></header><div class="entry-content" data-dcnode-id="3142" itemprop="text"><p data-dcnode-id="4263"><span data-dcnode-id="4267" instrument_node="">As some of you know, recently </span><a data-dcnode-id="4265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redbus2us.com/h1b-perm-wage-levels-rule/"><span data-dcnode-id="4266" instrument_node="">H1B, PERM wage levels rule that was submitted</span></a><span data-dcnode-id="4264" instrument_node=""> to OMB and later withdrawn. It was published as an interim final rule to Federal register on Oct 8th, 2020 and effective now. We will review the background, current wage levels, new wage levels, and impact in this article.</span></p><p class="has-background" data-dcnode-id="4259" style="background-color:#f5e4b4"><strong data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">Update</span></strong><span data-dcnode-id="4260" instrument_node=""> : The below rule is not effective as it was cancelled by court in first week of December 2020. But, in January 2021, a final rule was issued with revised wage levels by DOL.  Read first section of article.</span></p><p data-dcnode-id="4254"><span data-dcnode-id="4258" instrument_node="">This prevailing wage level changes rule is going to impact few hundred thousand H1B holders, we will look at the impact at the end. Also, in terms of timing, this comes at the same time as new H1B rules also kick in by DHS to </span><a data-dcnode-id="4256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redbus2us.com/new-h1b-definition-change-one-year-approvals-others/"><span data-dcnode-id="4257" instrument_node="">Strengthen H1B program with change in Definition, 1-year Approvals, Others</span></a><span data-dcnode-id="4255" instrument_node="">. &nbsp;</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="4253" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><p data-dcnode-id="4252"></p><span data-dcnode-id="4251" instrument_node=""> </span><div data-dcnode-id="3960" style="width: 100%; height: 100%; margin: auto; display: block;"><div class="primisslate" data-dcnode-id="3961" id="primisPlayerContainerDiv"><iframe data-dcnode-id="4250" frameborder="0" id="google_ads_iframe_dummy_sekindoParent344" marginheight="0" marginwidth="0" scrolling="no" style="width: 1px; height: 1px; position: absolute;" title="Primis Frame"></iframe><div data-dcnode-id="3962" id="primis_container_div" style="display: block; z-index: initial; position: relative; text-align: initial; margin: 0px; padding: 0px; border-width: 0px; width: 100%; height: 214px;"><div data-dcnode-id="3964" id="primis_playerSekindoSPlayer6265a8a5a1e19" style="overflow: hidden; position: absolute; z-index: 1 !important; top: 23px; left: 0px; width: 340px; height: 191px;"><div da t_node="">th</span></sup><span data-dcnode-id="3794" instrument_node="">&nbsp;&nbsp;percentile</span></td><td data-dcnode-id="3788"><span data-dcnode-id="3792" instrument_node="">62</span><sup data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">nd</span></sup><span data-dcnode-id="3789" instrument_node="">&nbsp;&nbsp;percentile</span></td><td data-dcnode-id="3783"><span data-dcnode-id="3787" instrument_node="">53</span><sup data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">rd</span></sup><span data-dcnode-id="3784" instrument_node=""> percentile</span></td></tr><tr data-dcnode-id="3764"><td data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">Wage Level III</span></td><td data-dcnode-id="3775"><span data-dcnode-id="3779" instrument_node="">50</span><sup data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">th</span></sup><span data-dcnode-id="3776" instrument_node="">&nbsp;&nbsp;percentile</span></td><td data-dcnode-id="3770"><span data-dcnode-id="3774" instrument_node="">78</span><sup data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">th</span></sup><span data-dcnode-id="3771" instrument_node="">&nbsp;&nbsp;percentile</span></td><td data-dcnode-id="3765"><span data-dcnode-id="3769" instrument_node="">72</span><sup data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">nd</span></sup><span data-dcnode-id="3766" instrument_node=""> percentile</span></td></tr><tr data-dcnode-id="3746"><td data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">Wage Level IV</span></td><td data-dcnode-id="3757"><span data-dcnode-id="3761" instrument_node="">67</span><sup data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">th</span></sup><span data-dcnode-id="3758" instrument_node="">&nbsp;&nbsp;percentile</span></td><td data-dcnode-id="3752"><span data-dcnode-id="3756" instrument_node="">95</span><sup data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">th</span></sup><span data-dcnode-id="3753" instrument_node="">&nbsp;percentile</span></td><td data-dcnode-id="3747"><span data-dcnode-id="3751" instrument_node="">&nbsp; 90</span><sup data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">th</span></sup><span data-dcnode-id="3748" instrument_node=""> percentile</span></td></tr></tbody></table><figcaption data-dcnode-id="3741"><em data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">H1B, PERM Wage Levels Changes </span></em></figcaption></figure><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3739" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><h2 data-dcnode-id="3736" id="h-courts-cancel-implementing-the-h1b-perm-wage-levels-changes-rule"><span data-dcnode-id="3737" id="Courts-Cancel-Implementing-the-H1B-PERM-Wage-Levels-Changes-Rule"><span data-dcnode-id="3738" instrument_node="">Courts Cancel Implementing the H1B, PERM Wage Levels Changes Rule</span></span></h2><p data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">In first week of December, 2020,  there were two judgments given by two courts canceling the implementation of the H1B, PERM Wage Levels Changes Regulation that is described in the below article.  Below are the details.</span></p><ul data-dcnode-id="3717"><li data-dcnode-id="3728"><strong data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">Court in California :</span></strong><span data-dcnode-id="3731" instrument_node=""> A California Court issued an order cancelling the entire H1B, PERM Wage Levels Change Rule, including DHS rule on Strengthening H1B program.. The lawsuit was filed by US Chamber of Commerce stating that DOL and DHS did not follow proper notice and comment period.  For more info read –&nbsp;</span><a data-dcnode-id="3729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redbus2us.com/court-cancels-h1b-rules-wage-levels-rule/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3730" instrument_node="">Court Cancels H1B Wage Levels, 1 Year H1B Approvals rules.</span></a></li><li data-dcnode-id="3724"><strong data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">Court in New Jersey :</span></strong><span data-dcnode-id="3725" instrument_node=""> A lawsuit was filed by IT Serve to stop implementing the rule at a Court in New Jersey. The judgment was given by this court  with an injunction order to stop implementation of the Wage Levels Changes Rule for H1B and PERM.</span></li><li data-dcnode-id="3718"><strong data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">DOL Announcement</span></strong><span data-dcnode-id="3721" instrument_node=""> : Based on these two Court Orders, US Dept of Labor issued Official Announcement stating that they are cancelling the implementation of the H1B Wage Levels Change Rule. For complete information, read&nbsp;</span><a data-dcnode-id="3719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redbus2us.com/dol-cancels-h1b-perm-wage-levels-change-rule/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3720" instrument_node="">DOL Update – Cancel the H1B, PERM Wage Levels Change Rule.</span></a></li></ul><hr class="wp-block-separator" data-dcnode-id="3716"><h2 data-dcnode-id="3712" id="h-background-for-rule-to-set-new-wage-levels-for-h1b-perm"><span data-dcnode-id="3713" id="Background-for-Rule-to-set-New-Wage-Levels-for-H1B-PERM"><strong data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">Background for Rule to set New Wage Levels for H1B, PERM</span></strong></span></h2><p data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">US Dept of Labor gave an extensive amount of citations and history of the wage levels and the reasons to change the current prevailing wage levels for H1B LCA &amp; PERM programs. The key reasons for the current changes are primarily driven by the below factors</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3709" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><ul data-dcnode-id="3689"><li data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">Better protect wages and jobs for US workers</span></li><li data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">Reduce incentives to hire foreign workers over US Workers</span></li><li data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">Current Unemployment situation in US with COVID-19</span></li><li data-dcnode-id="3699"><span data-dcnode-id="3702" instrument_node="">President Trump’s </span><a data-dcnode-id="3700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redbus2us.com/news-trumps-signs-executive-order-h1b-visa-program-impact/"><span data-dcnode-id="3701" instrument_node="">Buy American, Hire American Executive Order</span></a></li><li data-dcnode-id="3694"><span data-dcnode-id="3698" instrument_node="">President </span><a data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redbus2us.com/trump-signs-exec-order-to-ban-entry-of-h1b-l1-h4-j1-until-dec-2020/"><span data-dcnode-id="3697" instrument_node="">Trump’s Travel Ban for H1B</span></a><span data-dcnode-id="3695" instrument_node=""> holders tied to labor market</span></li><li data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">Outdated Wage Levels system used by DOL for H1B, PERM</span></li><li data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">Negative Impact of Labor Market due to H1Bs, PERM with general Wage Levels</span></li></ul><h2 data-dcnode-id="3685" id="h-current-h1b-prevailing-wage-levels-percentiles"><span data-dcnode-id="3686" id="Current-H1B-Prevailing-Wage-Levels-Percentiles"><strong data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">Current H1B Prevailing Wage Levels, Percentiles</span></strong></span></h2><p data-dcnode-id="3680"><span data-dcnode-id="3684" instrument_node="">Currently, there are four prevailing wage levels defined that are used by US Dept of Labor for </span><a data-dcnode-id="3682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redbus2us.com/what-is-h1b-lca-why-file-it-salary-processing-times-dol/"><span data-dcnode-id="3683" instrument_node="">H1B Visa LCAs</span></a><span data-dcnode-id="3681" instrument_node=""> and PERM programs.&nbsp; The prevailing wage levels for a position vary by experience, education and locality.&nbsp; They are as defined as below</span></p><ul data-dcnode-id="3648"><li data-dcnode-id="3673"><strong data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">Wage Level 1 – Entry Level&nbsp;</span></strong><span data-dcnode-id="3677" instrument_node="">: This is for entry level workers with basic understanding of job. This wage level corresponds to </span><strong data-dcnode-id="3674"><em data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">17th percentile.</span></em></strong></li><li data-dcnode-id="3665"><strong data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">Wage Level&nbsp;2 – Qualified:&nbsp;</span></strong><span data-dcnode-id="3670" instrument_node="">This wage level is for qualified workers with education, experience, who can do moderate tasks with limited judgment. This wage level corresponds to </span><strong data-dcnode-id="3667"><em data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">34th percentile</span></em></strong><span data-dcnode-id="3666" instrument_node="">.</span></li><li data-dcnode-id="3658"><strong data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">Wage Level 3 – Experienced&nbsp;</span></strong><span data-dcnode-id="3662" instrument_node="">: This wage level is for experienced workers with deeper experience by education and experience. This level work requires judgment and may also manage people. This wage level corresponds to </span><strong data-dcnode-id="3659"><em data-dcnode-id="3660"><span data-dcnode-id="3661" instrument_node="">50th percentile.</span></em></strong></li><li data-dcnode-id="3650"><strong data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">Wage Level 4 – Fully Competent:&nbsp;</span></strong><span data-dcnode-id="3655" instrument_node="">This wage level is for most expert level of workers, who can do complex tasks and can exercise a lot of judgment in their activities, including management responsibilities too. This wage level corresponds to </span><strong data-dcnode-id="3652"><em data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">67th percentile</span></em></strong><span data-dcnode-id="3651" instrument_node="">.</span></li><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3649" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div></ul><p data-dcnode-id="3643"><span data-dcnode-id="3647" instrument_node="">If you want to know more, read </span><a data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redbus2us.com/h1b-minimum-wage-or-lca-prevailing-wage-for-a-position-in-an-area-in-usa/"><span data-dcnode-id="3646" instrument_node="">What are H1B Prevailing Wage Levels, How to find them</span></a><span data-dcnode-id="3644" instrument_node=""> ?</span></p><p data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">Now, that you have some background, let’s look at the new changes that will be implemented by the US Dept of Labor (DOL) regulation.</span></p><p class="has-background" data-dcnode-id="3637" style="background-color:#f6f188"><span data-dcnode-id="3640" instrument_node="">A Lawsuit was filed on the changes in Wage Levels to H1B. Read </span><a data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redbus2us.com/lawsuit-on-h1b-wage-levels-increase/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3639" instrument_node="">Lawsuit Details, Key Argument Points  – H1B Wage Levels Change</span></a></p><h2 data-dcnode-id="3633" id="h-regulation-document-by-dol-overview-approach-used"><span data-dcnode-id="3634" id="Regulation-Document-by-DOL-Overview-Approach-used"><strong data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">Regulation Document by DOL – Overview, Approach used</span></strong></span></h2><p data-dcnode-id="3628"><span data-dcnode-id="3632" instrument_node="">The Regulatory Document that is published by US Dept of Labor is 157 pages.</span><strong data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node=""> </span></strong><span data-dcnode-id="3629" instrument_node="">Most of the text is background and analysis for changes. They start with the background of the H1B and PERM program, how wage levels came into existence.&nbsp; They talk about the similarities of H1B program and PERM program and why it makes sense to have same prevailing wage levels for both H1B and PERM.</span></p><p data-dcnode-id="3626"><span data-dcnode-id="3627" instrument_node="">They talk about the reasons for change stating the reason to preserve American Jobs as per INA and President Trump’s Executive orders. They talk about the adverse effects of low wages and how it impacts US workers based on many studies. They also share how low prevailing wages provide opportunity for US employers to hire foreign workers at lesser wages than US workers. &nbsp;</span></p><p data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">See below screenshot from regulation text.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3623" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><figure class="wp-block-image size-large" data-dcnode-id="3613"><picture class="wp-image-18929 sp-no-webp" data-dcnode-id="3617"><source data-dcnode-id="3622" data-sizes="(max-width: 720px) 100vw, 720px" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Why-US-Dept-of-Labor-Changing-Wage-Levels.webp 720w,https://redbus2us.com/wp-content/uploads/2020/10/Why-US-Dept-of-Labor-Changing-Wage-Levels-300x140.webp 300w,https://redbus2us.com/wp-content/uploads/2020/10/Why-US-Dept-of-Labor-Changing-Wage-Levels-100x47.webp 100w" type="image/webp"><source data-dcnode-id="3621" data-sizes="(max-width: 720px) 100vw, 720px" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Why-US-Dept-of-Labor-Changing-Wage-Levels.png 720w, https://redbus2us.com/wp-content/uploads/2020/10/Why-US-Dept-of-Labor-Changing-Wage-Levels-300x140.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/Why-US-Dept-of-Labor-Changing-Wage-Levels-100x47.png 100w" type="image/png"><img alt="Why US Dept of Labor Changing Wage Levels" class="wp-image-18929 sp-no-webp perfmatters-lazy" data-dcnode-id="3620" data-sizes="(max-width: 720px) 100vw, 720px" data-src="https://redbus2us.com/wp-content/uploads/2020/10/Why-US-Dept-of-Labor-Changing-Wage-Levels.png" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Why-US-Dept-of-Labor-Changing-Wage-Levels.png 720w, https://redbus2us.com/wp-content/uploads/2020/10/Why-US-Dept-of-Labor-Changing-Wage-Levels-300x140.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/Why-US-Dept-of-Labor-Changing-Wage-Levels-100x47.png 100w" height="337" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='720'%20height='337'%20viewBox='0%200%20720%20337'%3E%3C/svg%3E" width="720"><noscript data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">&lt;img src="https://redbus2us.com/wp-content/uploads/2020/10/Why-US-Dept-of-Labor-Changing-Wage-Levels.png" class="wp-image-18929 sp-no-webp" alt="Why US Dept of Labor Changing Wage Levels" height="337" width="720" srcset="https://redbus2us.com/wp-content/uploads/2020/10/Why-US-Dept-of-Labor-Changing-Wage-Levels.png 720w, https://redbus2us.com/wp-content/uploads/2020/10/Why-US-Dept-of-Labor-Changing-Wage-Levels-300x140.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/Why-US-Dept-of-Labor-Changing-Wage-Levels-100x47.png 100w" sizes="(max-width: 720px) 100vw, 720px"&gt;</span></noscript></picture><figcaption data-dcnode-id="3614"><em data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">Why US Dept of Labor Changing Wage Levels</span></em></figcaption></figure><h2 data-dcnode-id="3608" id="h-why-current-prevailing-wage-levels-are-wrong"><span data-dcnode-id="3609" id="Why-current-Prevailing-Wage-Levels-are-wrong"><strong data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">Why current Prevailing Wage Levels are wrong &nbsp;</span></strong><span data-dcnode-id="3610" instrument_node="">&nbsp;</span></span></h2><p data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">US Dept of Labor says that current prevailing wage levels used for H1B and PERM programs are based on OES (Occupational Employment Statistics) Survey Program. The OES prevailing wage levels are very generic and not tailored for H1B and PERM. &nbsp;They do not really factor in the DHS or USCIS requirements for H1B Workers that are related to specialty occupation.</span></p><p data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">Especially, they highlight telling that the current wage levels are artificially low and do not reflect wages for high skilled workers in a specialty occupation. See below screenshot from rule text.</span></p><figure class="wp-block-image size-large" data-dcnode-id="3591"><picture class="wp-image-18930 sp-no-webp" data-dcnode-id="3598"><source data-dcnode-id="3603" data-sizes="(max-width: 730px) 100vw, 730px" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Why-current-wage-levels-are-wrong-.webp 730w,https://redbus2us.com/wp-content/uploads/2020/10/Why-current-wage-levels-ar trument_node="">27.02% </span></strong><strong data-dcnode-id="3363"></strong></td><td data-dcnode-id="3358"><strong data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">25.67% </span></strong><strong data-dcnode-id="3359"></strong></td></tr></tbody></table><figcaption data-dcnode-id="3352"><em data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">Top 20 LCA/H-1B Employers based on Certifications, as of 6/30/2020,” Employment and Training Administration, accessed August 2020.</span></em></figcaption></figure><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3350" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><p data-dcnode-id="3345"><span data-dcnode-id="3349" instrument_node="">The above table indicates how actual H1B Employees are paid </span><strong data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">about 20%</span></strong><span data-dcnode-id="3346" instrument_node=""> higher than the prevailing wages in the region than regular workers. DOL rationale is that these stats clearly indicate that current prevailing wages in place for H1B workers are low and have to be changed.</span></p><p data-dcnode-id="3340"><span data-dcnode-id="3344" instrument_node="">Similarly, for PERM program as well they put up prevailing wage level data and show that PERM wages offered in labor certification is about </span><strong data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">16.7%</span></strong><span data-dcnode-id="3341" instrument_node=""> more than the prevailing wages for regular workers. Again, this data tells them that the wage levels for PERM is also low and have to be changed.</span></p><p data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">Now that you know the full background and DOL rationale, let’s look at the new prevailing wage levels changed for H1B and PERM.</span></p><h2 data-dcnode-id="3334" id="h-new-prevailing-wage-levels-for-h1b-perm"><span data-dcnode-id="3335" id="New-Prevailing-Wage-Levels-for-H1B-PERM"><strong data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">New Prevailing Wage Levels for H1B, PERM</span></strong></span></h2><p data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">US Dept of Labor talks about their approach used based on stats and formulas on how they have come up with the new wage levels. We will not cover that here and directly get to the gist of it.&nbsp; The revised prevailing wage levels for H1B workers are as below</span></p><figure class="wp-block-table" data-dcnode-id="3258"><table data-dcnode-id="3262"><tbody data-dcnode-id="3263"><tr data-dcnode-id="3316"><td data-dcnode-id="3329"><strong data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">Prevailing Wage Level</span></strong></td><td data-dcnode-id="3326"><strong data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">H1B LCA, PERM Wage levels &nbsp;Before &nbsp;</span></strong></td><td data-dcnode-id="3317"><strong data-dcnode-id="3323"><span class="has-inline-color has-luminous-vivid-orange-color" data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">New</span></span></strong><span data-dcnode-id="3322" instrument_node=""> </span><strong data-dcnode-id="3318"><span data-dcnode-id="3321" instrument_node="">H1B LCA, PERM Wage levels &nbsp;with</span><span class="has-inline-color has-luminous-vivid-orange-color" data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node=""> Regulation &nbsp;</span></span></strong></td></tr><tr data-dcnode-id="3303"><td data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">Wage Level I</span></td><td data-dcnode-id="3309"><span data-dcnode-id="3313" instrument_node="">17</span><sup data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">th</span></sup><span data-dcnode-id="3310" instrument_node=""> percentile</span></td><td data-dcnode-id="3304"><span data-dcnode-id="3308" instrument_node="">45</span><sup data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">th</span></sup><span data-dcnode-id="3305" instrument_node=""> percentile</span></td></tr><tr data-dcnode-id="3290"><td data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">Wage Level II</span></td><td data-dcnode-id="3296"><span data-dcnode-id="3300" instrument_node="">34</span><sup data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">th</span></sup><span data-dcnode-id="3297" instrument_node=""> &nbsp;percentile</span></td><td data-dcnode-id="3291"><span data-dcnode-id="3295" instrument_node="">62</span><sup data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">nd</span></sup><span data-dcnode-id="3292" instrument_node=""> &nbsp;percentile</span></td></tr><tr data-dcnode-id="3277"><td data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">Wage Level III</span></td><td data-dcnode-id="3283"><span data-dcnode-id="3287" instrument_node="">50</span><sup data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">th</span></sup><span data-dcnode-id="3284" instrument_node=""> &nbsp;percentile</span></td><td data-dcnode-id="3278"><span data-dcnode-id="3282" instrument_node="">78</span><sup data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">th</span></sup><span data-dcnode-id="3279" instrument_node=""> &nbsp;percentile</span></td></tr><tr data-dcnode-id="3264"><td data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">Wage Level IV</span></td><td data-dcnode-id="3270"><span data-dcnode-id="3274" instrument_node="">67</span><sup data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">th</span></sup><span data-dcnode-id="3271" instrument_node=""> &nbsp;percentile</span></td><td data-dcnode-id="3265"><span data-dcnode-id="3269" instrument_node="">95</span><sup data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">th</span></sup><span data-dcnode-id="3266" instrument_node=""> percentile</span></td></tr></tbody></table><figcaption data-dcnode-id="3259"><em data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">Changes to Prevailing Wage Levels for H1B, PERM Programs </span></em></figcaption></figure><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3257" id="AdThrive_Content_8_desktop" style="min-height: 250px;"></div><p data-dcnode-id="3254"><strong data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">How to interpret the Change in Prevailing Wage Levels?</span></strong></p><p data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">What the above changes to prevailing wage levels &nbsp;technically means is that, if a company used to hire an entry level worker on H1B Visa using Level I wage before, now they have to pay Level III wage for the same entry level worker.</span></p><p data-dcnode-id="3244"><span data-dcnode-id="3251" instrument_node="">&nbsp;</span><strong data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">Example</span></strong><span data-dcnode-id="3248" instrument_node=""> – </span><strong data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">California</span></strong><span data-dcnode-id="3245" instrument_node=""> : Just to give you a perspective of the change, see below wage levels from FLC Data Center for Computer Occupation in California. In the past, the employer would have paid anywhere around $70,720 per year to get entry level H1B worker. Now, the employer has to pay between$110,000 and $120,370.&nbsp; If the company want to hire a mid to senior level person, they need to pay now much over $145,000, maybe $160,000 or more to meet the prevailing wage level requirement. &nbsp;Hopefully that is clear.</span></p><figure class="wp-block-image size-large" data-dcnode-id="3234"><picture class="wp-image-18938 sp-no-webp" data-dcnode-id="3238"><source data-dcnode-id="3243" data-sizes="(max-  height="238" width="556" srcset="https://redbus2us.com/wp-content/uploads/2020/10/Prevailing-Wage-Levels-Californai-Computer-Occupation.png 556w, https://redbus2us.com/wp-content/uploads/2020/10/Prevailing-Wage-Levels-Californai-Computer-Occupation-300x128.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/Prevailing-Wage-Levels-Californai-Computer-Occupation-100x43.png 100w" sizes="(max-width: 556px) 100vw, 556px"&gt;</span></noscript></picture><figcaption data-dcnode-id="3235"><em data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">Prevailing Wage Levels California Computer Occupation</span></em></figcaption></figure><p data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">Below is the regulatory text screenshot for your reference.</span></p><figure class="wp-block-image size-large" data-dcnode-id="3225"><picture class="wp-image-18931 sp-no-webp" data-dcnode-id="3226"><source data-dcnode-id="3231" data-sizes="(max-width: 720px) 100vw, 720px" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Old-and-New-Prevailing-Wage-levels-for-H1B-PERM.webp 720w,https://redbus2us.com/wp-content/uploads/2020/10/Old-and-New-Prevailing-Wage-levels-for-H1B-PERM-300x105.webp 300w,https://redbus2us.com/wp-content/uploads/2020/10/Old-and-New-Prevailing-Wage-levels-for-H1B-PERM-100x35.webp 100w" type="image/webp"><source data-dcnode-id="3230" data-sizes="(max-width: 720px) 100vw, 720px" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Old-and-New-Prevailing-Wage-levels-for-H1B-PERM.png 720w, https://redbus2us.com/wp-content/uploads/2020/10/Old-and-New-Prevailing-Wage-levels-for-H1B-PERM-300x105.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/Old-and-New-Prevailing-Wage-levels-for-H1B-PERM-100x35.png 100w" type="image/png"><img alt="Old and New Prevailing Wage levels for H1B PERM" class="wp-image-18931 sp-no-webp perfmatters-lazy" data-dcnode-id="3229" data-sizes="(max-width: 720px) 100vw, 720px" data-src="https ass="wp-block-image size-large" data-dcnode-id="3209"><picture class="wp-image-18954 sp-no-webp" data-dcnode-id="3213"><source data-dcnode-id="3218" data-sizes="(max-width: 720px) 100vw, 720px" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Compare-Wage-Levels-H1BGrader.webp 720w,https://redbus2us.com/wp-content/uploads/2020/10/Compare-Wage-Levels-H1BGrader-300x193.webp 300w,https://redbus2us.com/wp-content/uploads/2020/10/Compare-Wage-Levels-H1BGrader-100x64.webp 100w" type="image/webp"><source data-dcnode-id="3217" data-sizes="(max-width: 720px) 100vw, 720px" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Compare-Wage-Levels-H1BGrader.png 720w, https://redbus2us.com/wp-content/uploads/2020/10/Compare-Wage-Levels-H1BGrader-300x193.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/Compare-Wage-Levels-H1BGrader-100x64.png 100w" type="image/png"><img alt="Compare Wage Levels H1BGrader" class="wp-image-18954 sp-no-webp perfmatters-lazy" data-dcnode-id="3216" data-sizes="(max-width: 720px) 100vw, 720px" data-src="https://redbus2us.com/wp-content/uploads/2020/10/Compare-Wage-Levels-H1BGrader.png" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Compare-Wage-Levels-H1BGrader.png 720w, https://redbus2us.com/wp-content/uploads/2020/10/Compare-Wage-Levels-H1BGrader-300x193.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/Compare-Wage-Levels-H1BGrader-100x64.png 100w" height="464" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='720'%20height='464'%20viewBox='0%200%20720%20464'%3E%3C/svg%3E" width="720"><noscript data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">&lt;img src="https://redbus2us.com/wp-content/uploads/2020/10/Compare-Wage-Levels-H1BGrader.png" class="wp-image-18954 sp-no-webp" alt="Compare Wage Levels H1BGrader" height="464" width="720" srcset="https://redbus2us.com/wp-content/uploads/2020/10/Compare-Wage-Levels-H1BGrader.png 720w, https://redbus2us.com/wp-content/uploads/2020/10/Compare-Wage-Levels-H1BGrader-300x193.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/Compare-Wage-Levels-H1BGrader-100x64.png 100w" sizes="(max-width: 720px) 100vw, 720px"&gt;</span></noscript></picture><figcaption data-dcnode-id="3210"><em data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">Compare Wage Levels H1BGrader.com</span></em></figcaption></figure><h2 data-dcnode-id="3205" id="h-new-h1b-wage-levels-rule-effective-date"><span data-dcnode-id="3206" id="New-H1B-Wage-Levels-rule-effective-Date"><strong data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">New H1B Wage Levels rule effective Date</span></strong></span></h2><p data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">As per regulation text, the new H1B, PERM wage levels will be effective from the day the regulation is published in Federal register. &nbsp;The official regulation was published in the Federal register on October 8th, 2020.  So, the new wage levels are effective from October 8th, 2020.  See below screenshot with effective date from Federal Register. There is a 30 days comment period as it is interim final rule.</span></p><figure class="wp-block-image size-large" data-dcnode-id="3196"><picture class="wp-image-18944 sp-no-webp" data-dcnode-id="3197"><source data-dcnode-id="3202" data-sizes="(max-width: 500px) 100vw, 500px" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Effective-Date-Wage-Levels-Rule.webp 500w,https://redbus2us.com/wp-content/uploads/2020/10/Effective-Date-Wage-Levels-Rule-300x172.webp 300w,https://redbus2us.com/wp-content/uploads/2020/10/Effective-Date-Wage-Levels-Rule-100x57.webp 100w" type="image/webp"><source data-dcnode-id="3201" data-sizes="(max-width: 500px) 100vw, 500px" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Effective-Date-Wage-Levels-Rule.png 500w, https://redbus2us.com/wp-content/uploads/2020/10/Effective-Date-Wage-Levels-Rule-300x172.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/Effective-Date-Wage-Levels-Rule-100x57.png 100w" type="image/png"><img alt="Effective Date Wage Levels Rule" class="wp-image-18944 sp-no-webp perfmatters-lazy" data-dcnode-id="3200" data-sizes="(max-width: 500px) 100vw, 500px" data-src="https://redbus2us.com/wp-content/uploads/2020/10/Effective-Date-Wage-Levels-Rule.png" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Effective-Date-Wage-Levels-Rule.png 500w, https://redbus2us.com/wp-content/uploads/2020/10/Effective-Date-Wage-Levels-Rule-300x172.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/Effective-Date-Wage-Levels-Rule-100x57.png 100w" height="287" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='500'%20height='287'%20viewBox='0%200%20500%20287'%3E%3C/svg%3E" width="500"><noscript data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">&lt;img src="https://redbus2us.com/wp-content/uploads/2020/10/Effective-Date-Wage-Levels-Rule.png" class="wp-image-18944 sp-no-webp" alt="Effective Date Wage Levels Rule" height="287" width="500" srcset="https://redbus2us.com/wp-content/uploads/2020/10/Effective-Date-Wage-Levels-Rule.png 500w, https://redbus2us.com/wp-content/uploads/2020/10/Effective-Date-Wage-Levels-Rule-300x172.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/Effective-Date-Wage-Levels-Rule-100x57.png 100w" sizes="(max-width: 500px) 100vw, 500px"&gt;</span></noscript></picture></figure><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3195" id="AdThrive_Content_10_desktop" style="min-height: 250px;"></div><h2 data-dcnode-id="3191" id="h-who-does-the-new-wage-levels-rule-apply-to"><span data-dcnode-id="3192" id="Who-does-the-New-Wage-Levels-Rule-apply-to"><strong data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">Who does the New Wage Levels Rule apply to ?</span></strong></span></h2><p data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">The new wage levels rule is applicable to PERM applications with pending Prevailing Wage Level determinations on the effective date(Oct 8, 2020) of the regulation, new PERM applications filed on or after the effective date of the new rule. Also, for H1B LCAs filed with DOL on or after the effective(Oct 8, 2020) date of the regulation.</span></p><p data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">DOL clearly tells that they will not apply the new prevailing wage levels to previously approved prevailing wage determinations or PERM applications that were approved, including LCAs. &nbsp;Below is the exact regulatory text screenshot.</span></p><figure class="wp-block-image size-large" data-dcnode-id="3177"><picture class="wp-image-18933 sp-no-webp" data-dcnode-id="3181"><source data-dcnode-id="3186" data-sizes="(max-width: 730px) 100vw, 730px" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Wage-Levels-Changes-Who-will-it-apply-to-1.webp 730w,https://redbus2us.com/wp-content/uploads/2020/10/Wage-Levels-Changes-Who-will-it-apply-to-1-300x153.webp 300w,https://redbus2us.com/wp-content/uploads/2020/10/Wage-Levels-Changes-Who-will-it-apply-to-1-100x51.webp 100w" type="image/webp"><source data-dcnode-id="3185" data-sizes="(max-width: 730px) 100vw, 730px" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Wage-Levels-Changes-Who-will-it-apply-to-1.png 730w, https://redbus2us.com/wp-content/uploads/2020/10/Wage-Levels-Changes-Who-will-it-apply-to-1-300x153.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/Wage-Levels-Changes-Who-will-it-apply-to-1-100x51.png 100w" type="image/png"><img alt="Wage Levels Changes - Who will it apply to " class="wp-image-18933 sp-no-webp perfmatters-lazy" data-dcnode-id="3184" data-sizes="(max-width: 730px) 100vw, 730px" data-src="https://redbus2us.com/wp-content/uploads/2020/10/Wage-Levels-Changes-Who-will-it-apply-to-1.png" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/Wage-Levels-Changes-Who-will-it-apply-to-1.png 730w, https://redbus2us.com/wp-content/uploads/2020/10/Wage-Levels-Changes-Who-will-it-apply-to-1-300x153.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/Wage-Levels-Changes-Who-will-it-apply-to-1-100x51.png 100w" height="372" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='730'%20height='372'%20viewBox='0%200%20730%20372'%3E%3C/svg%3E" width="730"><noscript data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">&lt;img src="https://redbus2us.com/wp-content/uploads/2020/10/Wage-Levels-Changes-Who-will-it-apply-to-1.png" class="wp-image-18933 sp-no-webp" alt="Wage Levels Changes - Who will it apply to " height="372" width="730" srcset="https://redbus2us.com/wp-content/uploads/2020/10/Wage-Levels-Changes-Who-will-it-apply-to-1.png 730w, https://redbus2us.com/wp-content/uploads/2020/10/Wage-Levels-Changes-Who-will-it-apply-to-1-300x153.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/Wage-Levels-Changes-Who-will-it-apply-to-1-100x51.png 100w" sizes="(max-width: 730px) 100vw, 730px"&gt;</span></noscript></picture><figcaption data-dcnode-id="3178"><em data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">Wage Levels Changes – Who will it apply to and Not apply to </span></em></figcaption></figure><h2 data-dcnode-id="3173" id="h-impact-of-the-new-wage-levels-changes-400k-h1b-holders"><span data-dcnode-id="3174" id="Impact-of-the-New-Wage-Levels-Changes-400K-H1B-holders"><strong data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">Impact of the New Wage Levels Changes ? 400K H1B holders ?</span></strong></span></h2><p data-dcnode-id="3168"><span data-dcnode-id="3172" instrument_node="">The impact of the new H1B and PERM prevailing levels is going to be huge, if they continue to be effective. H1BGrader.com website has done detail analysis saying that </span><a data-dcnode-id="3170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//h1bgrader.com/blog/h1b-wage-levels-rule-pw-distributions/"><span data-dcnode-id="3171" instrument_node="">H1B wage levels rule can impact 275K jobs </span></a><span data-dcnode-id="3169" instrument_node="">. As per their report and analysis, there are about 275,000 H1B holders ( added Level 1 – 63,815 and Level 2 – 214,197 job LCA count for FY 2020 – until Q3 June 30) who would be impacted, when they go for new H1B LCA for FY 2020.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3167" id="AdThrive_Content_11_desktop" style="min-height: 250px;"></div><p data-dcnode-id="3162"><span data-dcnode-id="3166" instrument_node="">But, the impact could be far more, if you see data for FY 2019, which is full year data, which has Level II workers at 316K, and Level 1 workers at 88K, this totals to over 400K H1B LCAs. So, the expected impact could be about 400K H1B holder, when they go for new LCAs. &nbsp;Below is the graph from their blog. &nbsp;You can check their </span><a data-dcnode-id="3164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//h1bgrader.com/blog/top-15-h1b-employers-h1b-wage-levels/"><span data-dcnode-id="3165" instrument_node="">Top 15 H1B Employer Wage Level Distribution</span></a><span data-dcnode-id="3163" instrument_node=""> report as well to get an idea. &nbsp;</span></p><figure class="wp-block-image size-large" data-dcnode-id="3152"><picture class="wp-image-18934 sp-no-webp" data-dcnode-id="3156"><source data-dcnode-id="3161" data-sizes="(max-width: 590px) 100vw, 590px" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees.webp 590w,https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees-300x300.webp 300w,https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees-150x150.webp 150w,https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees-100x100.webp 100w" type="image/webp"><source data-dcnode-id="3160" data-sizes="(max-width: 590px) 100vw, 590px" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees.png 590w, https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees-300x300.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees-150x150.png 150w, https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees-100x100.png 100w" type="image/png"><img alt="H1B Wage Levels Impacted Employees" class="wp-image-18934 sp-no-webp perfmatters-lazy" data-dcnode-id="3159" data-sizes="(max-width: 590px) 100vw, 590px" data-src="https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees.png" data-srcset="https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees.png 590w, https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees-300x300.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees-150x150.png 150w, https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees-100x100.png 100w" height="592" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='590'%20height='592'%20viewBox='0%200%20590%20592'%3E%3C/svg%3E" width="590"><noscript data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">&lt;img src="https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees.png" class="wp-image-18934 sp-no-webp" alt="H1B Wage Levels Impacted Employees" height="592" width="590" srcset="https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees.png 590w, https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees-300x300.png 300w, https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees-150x150.png 150w, https://redbus2us.com/wp-content/uploads/2020/10/H1B-Wage-Levels-Impacted-Employees-100x100.png 100w" sizes="(max-width: 590px) 100vw, 590px"&gt;</span></noscript></picture><figcaption data-dcnode-id="3153"><em data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">H1B Wage Levels Impacted Employees</span></em></figcaption></figure><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3151" id="AdThrive_Content_12_desktop" style="min-height: 250px;"></div><p data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">We can expect similar impact for PERM program as well, we do not have any data points to share the impact on how many exactly would be impacted.</span></p><p data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">What do you think of the changes to the H1B wage levels and PERM wage Levels? Share your thoughts in comments.</span></p><p data-dcnode-id="3143"><span data-dcnode-id="3146" instrument_node="">You can check the</span><a data-dcnode-id="3144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalregister.gov/documents/2020/10/08/2020-22132/strengthening-wage-protections-for-the-temporary-and-permanent-employment-of-certain-aliens-in-the"><span data-dcnode-id="3145" instrument_node=""> official Regulation Report on Wage Levels</span></a></p></div><footer aria-label="Entry meta" class="entry-meta" data-dcnode-id="3132"><span data-dcnode-id="3141" instrument_node=""> </span><span class="cat-links" data-dcnode-id="3133"><span class="gp-icon icon-categories" data-dcnode-id="3138"><svg aria-hidden="true" data-dcnode-id="3139" height="1em" viewBox="0 0 512 512" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M0 112c0-26.51 21.49-48 48-48h110.014a48 48 0 0143.592 27.907l12.349 26.791A16 16 0 00228.486 128H464c26.51 0 48 21.49 48 48v224c0 26.51-21.49 48-48 48H48c-26.51 0-48-21.49-48-48V112z" data-dcnode-id="3140"></path></svg></span><span class="screen-reader-text" data-dcnode-id="313 nt_node="">111 Comments</span></h3><ol class="comment-list" data-dcnode-id="403"><li class="comment even thread-even depth-1 parent" data-dcnode-id="2999" id="comment-1528023"><article class="comment-body" data-dcnode-id="3084" id="div-comment-1528023" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="3094"><div class="comment-author-info" data-dcnode-id="3095"><div class="comment-author vcard" data-dcnode-id="3103" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="3106" instrument_node=""> </span><cite class="fn" data-dcnode-id="3104" itemprop="name"><span data-dcnode-id="3105" instrument_node="">pradeep</span></cite></div><div class="entry-meta comment-metadata" data-dcnode-id="3096"><span data-dcnode-id="3102" instrument_node=""> </span><a data-dcnode-id="3097" href="#comment-1528023"><span data-dcnode-id="3101" instrument_node=""> </span><time data-dcnode-id="3099" datetime="2020-11-25T12:31:58-06:00" itemprop="datePublished"><span data-dcnode-id="3100" instrument_node=""> November 25, 2020 at 12:31 pm </span></time><span data-dcnode-id="3098" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="3085" itemprop="text"><p data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">Hey Everyone,</span></p><p data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">Here is my situation. My current wage  per year  is 89K on level 1. New wage level for my area is 100k which is basically stopping my H1B extension. If my employer increase my pay by changing the role , will it be ok? or shall I wait for law suit results?  I have two months left for my extension .</span></p><span data-dcnode-id="3089" instrument_node=""> </span><span class="reply" data-dcnode-id="3086"><a aria-label="Reply to pradeep" class="comment-reply-link" data-belowelement="div-comment-1528023" data-commentid="1528023" data-d ly</span></a></span></div></article><ul class="children" data-dcnode-id="1874"><li class="comment even depth-2 parent" data-dcnode-id="1875" id="comment-1520844"><article class="comment-body" data-dcnode-id="1990" id="div-comment-1520844" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="2000"><div class="comment-author-info" data-dcnode-id="2001"><div class="comment-author vcard" data-dcnode-id="2009" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="2012" instrument_node=""> </span><cite class="fn" data-dcnode-id="2010" itemprop="name"><span data-dcnode-id="2011" instrument_node="">M23RR</span></cite></div><div class="entry-meta comment-metadata" data-dcnode-id="2002"><span data-dcnode-id="2008" instrument_node=""> </span><a data-dcnode-id="2003" href="#comment-1520844"><span data-dcnode-id="2007" instrument_node=""> </span><time data-dcnode-id="2005" datetime="2020-10-12T20:21:58-05:00" itemprop="datePublished"><span data-dcnode-id="2006" instrument_node=""> October 12, 2020 at 8:21 pm </span></time><span data-dcnode-id="2004" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="1991" itemprop="text"><p data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">I have a counter question.. Can we go in canada for stamping of H1b anymore? I believe there was a mandate for all foreign nationals to go in home country for stamping and not the third country, in effect from many years. If you can, please let me know, I am in same boat.</span></p><p data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">On the possible reply to your situation, you and I both when go to stamping either in India or canada, we go for interview and our last pay checks are not meeting prevailing wage levels, we wont be entertained for a even a second and given 22g RFE to meet the min wage level requirements document to present…See the other comment just below, the guy has PWD approved but attorny is saying cant file labor without new prevailing wage update…possibly going to get RFE…</span></p><span data-dcnode-id="1995" instrument_node=""> </span><span class="reply" data-dcnode-id="1992"><a aria-label="Reply to M23RR" class="comment-reply-link" data-belowelement="div-comment-1520844" data-commentid="1520844" data-dcnode-id="1993" data-postid="18928" data-replyto="Reply to M23RR" data-respondelement="respond" href="#comment-1520844" rel="nofollow"><span data-dcnode-id="1994" instrument_node="">Reply</span></a></span></div></article><ul class="children" data-dcnode-id="1876"><li class="comment odd alt depth-3 parent" data-dcnode-id="1922" id="comment-1520848"><article class="comment-body" data-dcnode-id="1967" id="div-comment-1520848" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="1977"><div class="comment-author-info" data-dcnode-id="1978"><div class="comment-author vcard" data-dcnode-id="1986" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1989" instrument_node=""> </span><cite class="fn" data-dcnode-id="1987" itemprop="name"><span data-dcnode-id="1988" instrument_node="">Rajesh Reddy</span></cite></div><div class="entry-meta comment-metadata" data-dcnode-id="1979"><span data-dcnode-id="1985" instrument_node=""> </span><a data-dcnode-id="1980" href="#comment-1520848"><span data-dcnode-id="1984" instrument_node=""> </span><time data-dcnode-id="1982" datetime="2020-10-12T20:50:07-05:00" itemprop="datePublished"><span data-dcnode-id="1983" instrument_node=""> October 12, 2020 at 8:50 pm </span></time><span data-dcnode-id="1981" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="1968" itemprop="text"><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Filing Labor and getting Visa stamp for already approved petition are two different things.</span></p><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">Wage level would impact labor filling,  but if you already have approved petition then yes no need to worry abt stamping.</span></p><span data-dcnode-id="1972" instrument_node=""> </span><span class="reply" data-dcnode-id="1969"><a aria-label="Reply to Rajesh Reddy" class="comment-reply-link" data-belowelement="div-comment-1520848" data-commentid="1520848" data-dcnode-id="1970" data-postid="18928" data-replyto="Reply to Rajesh Reddy" data-respondelement="respond" href="#comment-1520848" rel="nofollow"><span data-dcnode-id="1971" instrument_node="">Reply</span></a></span></div></article><ul class="children" data-dcnode-id="1923"><li class="comment even depth-4 parent" data-dcnode-id="1924" id="comment-1520853"><article class="comment-body" data-dcnode-id="1946" id="div-comment-1520853" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="1954"><div class="comment-author-info" data-dcnode-id="1955"><div class="comment-author vcard" data-dcnode-id="1963" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1966" instrument_node=""> </span><cite class="fn" data-dcnode-id="1964" itemprop="name"><span data-dcnode-id="1965" instrument_node="">M23RR</span></cite></div><div class="entry-meta comment-metadata" data-dcnode-id="1956"><span data-dcnode-id="1962" instrument_node=""> </span><a data-dcnode-id="1957" href="#comment-1520853"><span data-dcnode-id="1961" instrument_node=""> </span><time data-dcnode-id="1959" datetime="2020-10-12T21:58:26-05:00" itemprop="datePublished"><span data-dcnode-id="1960" instrument_node=""> October 12, 2020 at 9:58 pm </span></time><span data-dcnode-id="1958" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="1947" itemprop="text"><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Yes, of course they are different. But re-read it what I meant to say.. you need not to go for new wage level H1b new percentile…  but you should preferably should have salary range at least near to prevailing wage.. Let me give you and example.. Old prevailing wage was 65K and employee was at 74k when petition was approved for next three years. Now the employee goes for stamping after a year lets say next year in 2021.. and having the salary same 74k, immigration officer is not going to ask him to show new wage level percentiles.. means in 2021 prevailaing wage is 80k then employee need not to have 110K being 45th percentile of that wage, but yes, he should have atleast 80K since that is existing wage… or else how would employee or employer justify that with salary of 75K approved visa in 2020, some one in 2021 is able to called specialty occupation holder where current normal PWD is 80k… hope you got it this itme</span></p><span data-dcnode-id="1951" instrument_node=""> </span><span class="reply" data-dcnode-id="1948"><a aria-label="Reply to M23RR" class="comment-reply-link" data-belowelement="div-comment-1520853" data-commentid="1520853" data-dcnode-id="1949" data-postid="18928" data-replyto="Reply to M23RR" data-respondelement="respond" href="#comment-1520853" rel="nofollow"><span data-dcnode-id="1950" instrument_node="">Reply</span></a></span></div></article><ul class="children" data-dcnode-id="1925"><li class="comment odd alt depth-5" data-dcnode-id="1926" id="comment-1520869"><article class="comment-body" data-dcnode-id="1927" id="div-comment-1520869" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="1933"><div class="comment-author-info" data-dcnode-id="1934"><div class="comment-author vcard" data-dcnode-id="1942" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1945" instrument_node=""> </span><cite class="fn" data- e data-dcnode-id="1914" datetime="2020-10-13T00:00:39-05:00" itemprop="datePublished"><span data-dcnode-id="1915" instrument_node=""> October 13, 2020 at 12:00 am </span></time><span data-dcnode-id="1913" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="1902" itemprop="text"><p data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">“PWD approved but attorny is saying cant file labor without new prevailing wage update…possibly going to get RFE…”. Did you check if with your attorney or just implying?  If that is the case all PERM in the process will result in RFE.</span></p><span data-dcnode-id="1906" instrument_node=""> </span><span class="reply" data-dcnode-id="1903"><a aria-label="Reply to Need_Info_PERM" class="comment-reply-link" data-belowelement="div-comment-1520867" data-commentid="1520867" data-dcnode-id="1904" data-postid="18928" data-replyto="Reply to Need_Info_PERM" data-respondelement="respond" href="#comment-1520867" rel="nofollow"><span data-dcnode-id="1905" instrument_node="">Reply</span></a></span></div></article><ul class="children" data-dcnode-id="1878"><li class="comment odd alt depth-4" data-dcnode-id="1879" id="comment-1520920"><article class="comment-body" data-dcnode-id="1880" id="div-comment-1520920" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="1888"><div class="comment-author-info" data-dcnode-id="1889"><div class="comment-author vcard" data-dcnode-id="1897" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1900" instrument_node=""> </span><cite class="fn" data-dcnode-id="1898" itemprop="name"><span data-dcnode-id="1899" instrument_node="">M23RR</span></cite></div><div class="entry-meta comment-metadata" data-dcnode-id="1890"><span data-dcnode-id="1896" instrument_node=""> </span><a data-dcnode-id="1891" href="#comment-1520920"><span data-dcnode-id="1895" instrument_node=""> </span><time data-dcnode-id="1893" datetime="2020-10-13T10:57:15-05:00" itemprop="datePublished"><span data-dcnode-id="1894" instrument_node=""> October 13, 2020 at 10:57 am </span></time><span data-dcnode-id="1892" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="1881" itemprop="text"><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Not implying, just putting a point. Ask our selves, what and how the wage related RFEs were raised and treated till today?? One must be above the OLD or New percentile range respectively to their filed LCA dates. But wage must be always the prevailing wage.. So here you can go for old percetile of prevailing wage, 17th for level 1 and no need to go new ranges, but yes, the percentile you are taling should always be w.r.t. prevailing wage of the same year and not the current year. I have visa approved till April 23, doesnt mean I can go with old prevailing wages with old percentile range till then. Yes I can use old 17th percentile range, but it has to w.r.t. new prevailing wage when i apply my extension in 2023..</span></p><span data-dcnode-id="1885" instrument_node=""> </span><span class="reply" data-dcnode-id="1882"><a aria-label="Reply to M23RR" class="comment-reply-link" data-belowelement="div-comment-1520920" data-commentid="1520920" data-dcnode-id="1883" data-postid="18928" data-replyto="Reply to M23RR" data-respondelement="respond" href="#comment-1520920" rel="nofollow"><span data-dcnode-id="1884" instrument_node="">Reply</span></a></span></div></article></li></ul></li></ul></li></ul></li><div class="adthrive-ad adthrive-content adthrive-content-20" data-dcnode-id="1872" id="AdThrive_Content_21_desktop" style="min-height: 250px;"></div><li class="comment even thread-even depth-1 parent" data-dcnode-id="1645" id="comment-1520433"><article class="comment-body" data-dcnode-id="1849" id="div-comment-1520433" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="1859"><div class="comment-author-info" data-dcnode-id="1860"><div class="comment-author vcard" data-dcnode-id="1868" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1871" instrument_node=""> </span><cite class="fn" data-dcnode-id="1869" itemprop="name"><span data-dcnode-id="1870" instrument_node="">Need_Info_PERM</span></cite></div><div class="entry-meta comment-metadata" data-dcnode-id="1861"><span data-dcnode-id="1867" instrument_node=""> </span><a data-dcnode-id="1862" href="#comment-1520433"><span data-dcnode-id="1866" instrument_node=""> </span><time data-dcnode-id="1864" datetime="2020-10-09T12:54:25-05:00" itemprop="datePublished"><span data-dcnode-id="1865" instrument_node=""> October 9, 2020 at 12:54 pm </span></time><span data-dcnode-id="1863" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="1850" itemprop="text"><p data-dcnode-id="1855"><span data-dcnode-id="1858" instrument_node="">I had PWD approved and my PERM is filed on 8th Oct using approved PWD. As per attorney, new PERM can be filed if PWD is approved before 8th Oct but here it is mentioned that even new PERM needs to follow the new wedge level even if PWD is approved with the old wedge level.</span><br data-dcnode-id="1857"><span data-dcnode-id="1856" instrument_node=""> Similarly, if LCA is already approved before the 8th Oct then new H1B can be filed with old wedge level. Please let me know your opinion here.</span></p><span data-dcnode-id="1854" instrument_node=""> </span><span class="reply" data-dcnode-id="1851"><a aria-label="Reply to Need_Info_PERM" class="comment-reply-link" data-belowelement="div-comment-1520433" data-commentid="1520433" data-dcnode-id="1852" data-postid="18928" data-replyto="Reply to Need_Info_PERM" data-respondelement="respond" href="#comment-1520433" rel="nofollow"><span data-dcnode-id="1853" instrument_node="">Reply</span></a></span></div></article><ul class="children" data-dcnode-id="1646"><li class="comment odd alt depth-2 parent" data-dcnode-id="1694" id="comment-1520435"><article class="comment-body" data-dcnode-id="1808" id="div-comment-1520435" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="1836"><div class="comment-author-info" data-dcnode-id="1837"><div class="comment-author vcard" data-dcnode-id="1845" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1848" instrument_node=""> </span><cite class="fn" data-dcnode-id="1846" itemprop="name"><span data-dcnode-id="1847" instrument_node="">Sriram</span></cite></div><div class="entry-meta comment-metadata" data-dcnode-id="1838"><span data-dcnode-id="1844" instrument_node=""> </span><a data-dcnode-id="1839" href="#comment-1520435"><span data-dcnode-id="1843" instrument_node=""> </span><time data-dcnode-id="1841" datetime="2020-10-09T13:20:42-05:00" itemprop="datePublished"><span data-dcnode-id="1842" instrument_node=""> October 9, 2020 at 1:20 pm </span></time><span data-dcnode-id="1840" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="1809" itemprop="text"><p data-dcnode-id="1832"><span data-dcnode-id="1835" instrument_node="">I referred this…</span><br data-dcnode-id="1834"><span data-dcnode-id="1833" instrument_node=""> https://www.dol.gov/sites/dolgov/files/ETA/oflc/pdfs/H-1B-Prevailing-Wage-IFR-FAQs-20201008.pdf</span></p><p data-dcnode-id="1814"><span data-dcnode-id="1831" instrument_node="">Q. I have previously filed ETA Form 9089, which is pending with the Atlanta National</span><br data-dcnode-id="1830"><span data-dcnode-id="1829" instrument_node=""> Processing Center. Does the Interim Final Rule, Strengthening Wage Protections for the</span><br data-dcnode-id="1828"><span data-dcnode-id="1827" instrument_node=""> Temporary and Permanent Employment of Certain Aliens in the United States (85 FR</span><br data-dcnode-id="1826"><span data-dcnode-id="1825" instrument_node=""> 63872) affect the outcome of my previously filed and pending ETA Form 9089?</span><br data-dcnode-id="1824"><span data-dcnode-id="1823" instrument_node=""> A. No, even if you have not previously filed your ETA Form 9089, so long as you possess a</span><br data-dcnode-id="1822"><span data-dcnode-id="1821" instrument_node=""> valid prevailing wage determination issued on Form ETA-9141 before October 8, 2020, the</span><br data-dcnode-id="1820"><span data-dcnode-id="1819" instrument_node=""> effective date of the Interim Final Rule, Strengthening Wage Protections for the Temporary and</span><br data-dcnode-id="1818"><span data-dcnode-id="1817" instrument_node=""> Permanent Employment of Certain Aliens in the United States (85 FR 63872), your subsequently</span><br data-dcnode-id="1816"><span data-dcnode-id="1815" instrument_node=""> filed ETA Form 9089 is not affected.</span></p><span data-dcnode-id="1813" instrument_node=""> </span><span class="reply" data-dcnode-id="1810"><a aria-label="Reply to Sriram" class="comment-reply-link" data-belowelement="div-comment-1520435" data-commentid="1520435" data-dcnode-id="1811" data-postid="18928" data-replyto="Reply to Sriram" data-respondelement="respond" href="#comment-1520435" rel="nofollow"><span data-dcnode-id="1812" instrument_node="">Reply</span></a></span></div></article><ul class="children" data-dcnode-id="1695"><li class="comment even depth-3 parent" data-dcnode-id="1742" id="comment-1520445"><article class="comment-body" data-dcnode-id="1787" id="div-comment-1520445" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="1795"><div class="comment-author-info" data-dcnode-id="1796"><div class="comment-author vcard" data-dcnode-id="1804" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="18 he best</span></cite></div><div class="entry-meta comment-metadata" data-dcnode-id="1167"><span data-dcnode-id="1173" instrument_node=""> </span><a data-dcnode-id="1168" href="#comment-1520201"><span data-dcnode-id="1172" instrument_node=""> </span><time data-dcnode-id="1170" datetime="2020-10-08T21:09:23-05:00" itemprop="datePublished"><span data-dcnode-id="1171" instrument_node=""> October 8, 2020 at 9:09 pm </span></time><span data-dcnode-id="1169" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="1156" itemprop="text"><p data-dcnode-id="1161"><span data-dcnode-id="1164" instrument_node="">Employer has to pay new wage levels when they are failing new labor applications for extensions or new Visas from today.. so in the case you mentioned, till 2023 employer can keep the current salary…</span><br data-dcnode-id="1163"><span data-dcnode-id="1162" instrument_node=""> Remember privileging wages are going to be reviewed every year like before, hence by 2023 prevailing wage  levels may raise from todays new level.</span></p><span data-dcnode-id="1160" instrument_node=""> </span><span class="reply" data-dcnode-id="1157"><a aria-label="Reply to Give the best" class="comment-reply-link" data-belowelement="div-comment-1520201" data-commentid="1520201" data-dcnode-id="1158" data-postid="18928" data-replyto="Reply to Give the best" data-respondelement="respond" href="#comment-1520201" rel="nofollow"><span data-dcnode-id="1159" instrument_node="">Reply</span></a></span></div></article></li></ul></li><li class="comment odd alt thread-even depth-1 parent" data-dcnode-id="1081" id="comment-1520166"><article class="comment-body" data-dcnode-id="1119" id="div-comment-1520166" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="1139"><div class="comment-author-info" data-dcnode-id="1140"><div class="comment-author vcard" data-dcnode-id="1148" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1151" instrument_node=""> </span><cite class="fn" data-dcnode-id="1149" itemprop="name"><span data-dcnode-id="1150" instrument_node="">Muthukumar</span></cite></div><div class="entry-meta comment-metadata" data-dcnode-id="1141"><span data-dcnode-id="1147" instrument_node=""> </span><a data-dcnode-id="1142" href="#comment-1520166"><span data-dcnode-id="1146" instrument_node=""> </span><time data-dcnode-id="1144" datetime="2020-10-08T17:47:43-05:00" itemprop="datePublished"><span data-dcnode-id="1145" instrument_node=""> October 8, 2020 at 5:47 pm </span></time><span data-dcnode-id="1143" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="1120" itemprop="text"><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Hi,</span></p><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">I am currently in USA. I initially came as consultant and had visa till Sep 2020. Later I got a full time (different employer) which came along with extension and my new i979 has expiry date till Aug 2022. Last year I went to india but did not go for stamping. While entering to USA, I got I94 till Aug 2022.</span></p><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Now, My visa in my passport expired on Sep 2020 (last month). I know I can stay in USA until my i797 &amp; I94 is valid. However due some medical urgency, I am planning to visit india this year end.</span></p><p data-dcnode-id="1125"><span data-dcnode-id="1132" instrument_node="">1) Since my visa in passport expired, I cannot reenter to USA without new stamping, correct?</span><br data-dcnode-id="1131"><span data-dcnode-id="1130" instrument_node=""> 2) If yes, am I eligible for dropbox and if yes, how long I am eligible?</span><br data-dcnode-id="1129"><span data-dcnode-id="1128" instrument_node=""> 3) Is the embassy in Chennai open for dropbox?</span><br data-dcnode-id="1127"><span data-dcnode-id="1126" instrument_node=""> 4) How probable that embassy will reject dropbox and ask me to come for an interview?</span></p><span data-dcnode-id="1124" instrument_node=""> </span><span class="reply" data-dcnode-id="1121"><a aria-label="Reply to Muthukumar" class="comment-reply-link" data-belowelement="div-comment-1520166" data-commentid="1520166" data-dcnode-id="1122" data-postid="18928" data-replyto="Reply to Muthukumar" data-respondelement="respond" href="#comment-1520166" rel="nofollow"><span data-dcnode-id="1123" instrument_node="">Reply</span></a></span></div></article><ul class="children" data-dcnode-id="1082"><li class="comment even depth-2" data-dcnode-id="1083" id="comment-1520423"><article class="comment-body" data-dcnode-id="1084" id="div-comment-1520423" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="1106"><div class="comment-author-info" data-dcnode-id="1107"><div class="comment-author vcard" data-dcnode-id="1115" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1118" instrument_node=""> </span><cite class="fn" data-dcnode-id="1116" itemprop="name"><span data-dcnode-id="1117" instrument_node="">Nirmala</span></cite></div><div class="entry-meta comment-metadata" data-dcnode-id="1108"><span data-dcnode-id="1114" instrument_node=""> </span><a data-dcnode-id="1109" href="#comment-1520423"><span data-dcnode-id="1113" instrument_node=""> </span><time data-dcnode-id="1111" datetime="2020-10-09T10:19:00-05:00" itemprop="datePublished"><span data-dcnode-id="1112" instrument_node=""> October 9, 2020 at 10:19 am </span></time><span data-dcnode-id="1110" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="1085" itemprop="text"><p data-dcnode-id="1090"><span data-dcnode-id="1105" instrument_node="">1) Since my visa in passport expired, I cannot reenter to USA without new stamping, correct?</span><br data-dcnode-id="1104"><span data-dcnode-id="1103" instrument_node=""> Yes</span><br data-dcnode-id="1102"><span data-dcnode-id="1101" instrument_node=""> 2) If yes, am I eligible for dropbox and if yes, how long I am eligible?</span><br data-dcnode-id="1100"><span data-dcnode-id="1099" instrument_node=""> Yes, you are eligibl for drop box until 1 year from your visa expiry date</span><br data-dcnode-id="1098"><span data-dcnode-id="1097" instrument_node=""> 3) Is the embassy in Chennai open for dropbox?</span><br data-dcnode-id="1096"><span data-dcnode-id="1095" instrument_node=""> I guess yes, I got drop box stamped i Hyderabad two times earlier</span><br data-dcnode-id="1094"><span data-dcnode-id="1093" instrument_node=""> 4) How probable that embassy will reject dropbox and ask me to come for an interview?</span><br data-dcnode-id="1092"><span data-dcnode-id="1091" instrument_node=""> it’s very rare. Most of the drop boxes result into visa an d you can collect your passport by hand in OFC.  You got OFC and give your thumbprints and within 5 days you will get a message to collect your passport at OFC.</span></p><span data-dcnode-id="1089" instrument_node=""> </span><span class="reply" data-dcnode-id="1086"><a aria-label="Reply to Nirmala" class="comment-reply-link" data-belowelement="div-comment-1520423" data-commentid="1520423" data-dcnode-id="1087" data-postid="18928" data-replyto="Reply to Nirmala" data-respondelement="respond" href="#comment-1520423" rel="nofollow"><span data-dcnode-id="1088" instrument_node="">Reply</span></a></span></div></article></li></ul></li><li class="comment odd alt thread-odd thread-alt depth-1 parent" data-dcnode-id="1034" id="comment-1520149"><article class="comment-body" data-dcnode-id="1058" id="div-comment-1520149" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="1068"><div class="comment-author-info" data-dcnode-id="1069"><div class comment-author vcard" data-dcnode-id="748" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="752" instrument_node=""> </span><cite class="fn" data-dcnode-id="749" itemprop="name"><a class="url" data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//garadhya%40gmail.com/" rel="external nofollow ugc"><span data-dcnode-id="751" instrument_node="">Girish</span></a></cite></div><div class="entry-meta comment-metadata" data-dcnode-id="741"><span data-dcnode-id="747" instrument_node=""> </span><a data-dcnode-id="742" href="#comment-1520005"><span data-dcnode-id="746" instrument_node=""> </span><time data-dcnode-id="744" datetime="2020-10-07T13:45:41-05:00" itemprop="datePublished"><span data-dcnode-id="745" instrument_node=""> October 7, 2020 at 1:45 pm </span></time><span data-dcnode-id="743" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="726" itemprop="text"><p data-dcnode-id="731"><span data-dcnode-id="738" instrument_node="">Reading this article, I feel the impact has a chain reaction as follows –</span><br data-dcnode-id="737"><span data-dcnode-id="736" instrument_node=""> 1 ) H1-B employers have to start paying more wage to their employees in order to maintain the NEW prevailing wage level.</span><br data-dcnode-id="735"><span data-dcnode-id="734" instrument_node=""> 2) H1-B employees have to upgrade their skill levels, knowledge and expertise so that their employers are able to justify the wage they have to provide and satisfy prevailing wage criteria.</span><br data-dcnode-id="733"><span data-dcnode-id="732" instrument_node=""> 3)  H1-B employees have to be more valuable, profitable, good revenue generating for their employers so that they retain can retain employees and confidentally file LCAs and PERMs for them.</span></p><span data-dcnode-id="730" instrument_node=""> </span><span class="reply" data-dcnode-id="727"><a aria-label="Reply to Girish" class="comment-reply-link" data-belowelement="div-comment-1520005" data-commentid="1520005" data-dcnode-id="728" data-postid="18928" data-replyto="Reply to Girish" data-respondelement="respond" href="#comment-1520005" rel="nofollow"><span data-dcnode-id="729" instrument_node="">Reply</span></a></span></div></article><ul class="children" data-dcnode-id="651"><li class="comment byuser comment-author-admin bypostauthor even depth-2 parent" data-dcnode-id="652" id="comment-1520042"><article class="comment-body" data-dcnode-id="702" id="div-comment-1520042" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="712"><div class="comment-author-info" data-dcnode-id="713"><div class="comment-author vcard" data-dcnode-id="721" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="724" instrument_node=""> </span><cite class="fn" data-dcnode-id="722" itemprop="name"><span data-dcnode-id="723" instrument_node="">Kumar</span></cite></div><div class="entry-meta comment-metadata" data-dcnode-id="714"><span data-dcnode-id="720" instrument_node=""> </span><a data-dcnode-id="715" href="#comment-1520042"><span data-dcnode-id="719" instrument_node=""> </span><time data-dcnode-id="717" datetime="2020-10-07T19:17:26-05:00" itemprop="datePublished"><span data-dcnode-id="718" instrument_node=""> October 7, 2020 at 7:17 pm </span></time><span data-dcnode-id="716" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="703" itemprop="text"><p data-dcnode-id="708"><span data-dcnode-id="711" instrument_node="">Girish,</span><br data-dcnode-id="710"><span data-dcnode-id="709" instrument_node=""> yes, valid points. The bigger issue is, are employers willing to pay such a high premium wage for H1B workers, when they can get someone else with similar skills for a lower wage.</span></p><span data-dcnode-id="707" instrument_node=""> </span><span they were not able to find candidates in USA with  skills and talent that they are looking for.</span></p><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">If the above fact is true, companies will raise the salary. If not, we will see H1B workers being replaced in the near future.</span></p><span data-dcnode-id="662" instrument_node=""> </span><span class="reply" data-dcnode-id="659"><a aria-label="Reply to h1baspirant" class="comment-reply-link" data-belowelement="div-comment-1520163" data-commentid="1520163" data-dcnode-id="660" data-postid="18928" data-replyto="Reply to h1baspirant" data-respondelement="respond" href="#comment-1520163" rel="nofollow"><span data-dcnode-id="661" instrument_node="">Reply</span></a></span></div></article></li></ul></li></ul></li></ul></li><li class="comment odd alt thread-even depth-1 parent" data-dcnode-id="545" id="comment-1520004"><article class="comment-body" data-dcnode-id="627" id="div-comment-1520004" itemscope="" itemtype="https://schema.org/Comment"><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="637"><div class="comment-author-info" data-dcnode-id="638"><div class="comment-author vcard" data-dcnode-id="646" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="649" instrument_node=""> </span><cite class="fn" data-dcnode-id="647" itemprop="name"><span data-dcnode-id="648" instrument_node="">Anonymous</span></cite></div><div class="entry-meta comment-metadata" data-dcnode-id="639"><span data-dcnode-id="645" instrument_node=""> </span><a data-dcnode-id="640" href="#comment-1520004"><span data-dcnode-id="644" instrument_node=""> </span><time data-dcnode-id="642" datetime="2020-10-07T13:41:54-05:00" itemprop="datePublished"><span data-dcnode-id="643" instrument_node=""> October 7, 2020 at 1:41 pm </span></time><span data-dcnode-id="641" instrument_node=""> </span></a></div></div></footer><div class="comment-content" data-dcnode-id="628" itemprop="tex
