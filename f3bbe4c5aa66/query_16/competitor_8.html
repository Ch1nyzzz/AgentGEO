</span><div class="has_ae_slider elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-34d9c89d ae-bg-gallery-type-default" data-dcnode-id="1098" data-element_type="column" data-id="34d9c89d"><span data-dcnode-id="1175" instrument_node="">

</span><div class="elementor-element elementor-element-7bba5712 elementor-widget elementor-widget-heading" data-dcnode-id="1165" data-element_type="widget" data-id="7bba5712" data-widget_type="heading.default"><span data-dcnode-id="1172" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1167"><span data-dcnode-id="1171" instrument_node="">
</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Take this step to offset rising costs  </span></h2><span data-dcnode-id="1168" instrument_node=""> </span></div><span data-dcnode-id="1166" instrument_node="">
</span></div><span data-dcnode-id="1164" instrument_node="">
</span><div class="elementor-element elementor-element-7187680b elementor-widget elementor-widget-text-editor" data-dcnode-id="1104" data-element_type="widget" data-id="7187680b" data-widget_type="text-editor.default"><span data-dcnode-id="1163" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1106"><span data-dcnode-id="1162" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1108"><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1160" instrument_node="">The </span><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bls.gov/news.release/pdf/cpi.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1158" style="text-decoration: underline; color: #33cccc;"><span data-dcnode-id="1159" instrument_node="">Department of Labor</span></span></a><span data-dcnode-id="1156" instrument_node=""> (DOL) stated that consumer prices rose 5.4% during the 12 months ending in September 2021. Inflation at a wholesale level climbed 8.3% from August 2020 to August 2021. Most notably, the Social Security Administration announced that beneficiaries will get a cost-of-living adjustment in 2022 of 5.9%, the largest increase in decades. It’s becoming clear that </span><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cainwatters.com/digitalblogs/2021-inflation-fears/" rel="noopener" target="_blank"><span data-dcnode-id="1154" style="text-decoration: underline; color: #33cccc;"><span data-dcnode-id="1155" instrument_node="">inflation fears</span></span></a><span data-dcnode-id="1152" instrument_node=""> are substantiated.</span></p><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Although practice owners may not be feeling the effects of it on the consumer level at this time, it is already having a large impact on employee wages.</span></p><p data-dcnode-id="1143"><span data-dcnode-id="1148" instrument_node="">Partner and CPA </span><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cainwatters.com/tom-sanders/" rel="noopener" target="_blank"><span data-dcnode-id="1146" style="text-decoration: underline; color: #33cccc;"><span data-dcnode-id="1147" instrument_node="">Tom Sanders</span></span></a><span data-dcnode-id="1144" instrument_node=""> reminds, “Wages are usually the single largest expense for most businesses, especially true for dental practices. When the economy is performing well and there is a shortage of labor, like the U.S. is experiencing now, companies need to increase wages to both retain staff and attract qualified candidates.”</span></p><h5 data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Rising wages creates cost-push inflation</span></h5><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">The first and primary concern as a business owner should be to maintain your highly qualified team and keep the culture and morale of your office strong. This ensures a continuation of high-quality service to your patients, practice efficiency and profitability.</span></p><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">We all know the difficulties that high employee turnover creates; increased labor costs, time spent training new employees, bad morale, lower profit margin and poor patient experience. With inflation effecting employees’ personal bottom line, even those practices who have an extremely loyal staff and strong cultures are at risk.</span></p><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Your employees are seeing a dramatic rise in their everyday cost of living.&nbsp; From increased rent, high gas prices and of course, higher prices for food, goods and services. A standard 2-4% raise (that matched inflation over the past few decades) simply won’t cut it in 2021.&nbsp; That will be viewed as a decrease in pay for your employees who are seeing their personal expenses rise by 5-6%, if not more.</span></p><p data-dcnode-id="1129"><span data-dcnode-id="1134" instrument_node="">If you position your practice on the front end of this by offering salary increases now, before the desperation sets in, you can get ahead of this problem. Being proactive will keep morale and retention up, which is especially important </span><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cainwatters.com/digitalblogs/hiring-challenges-dental-practices/" rel="noopener" target="_blank"><span data-dcnode-id="1132" style="text-decoration: underline; color: #33cccc;"><span data-dcnode-id="1133" instrument_node="">during a labor shortage</span></span></a><span data-dcnode-id="1130" instrument_node="">.</span></p><h5 data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">CUTTING COSTS WON’T CUT IT</span></h5><p data-dcnode-id="1123"><span data-dcnode-id="1126" instrument_node="">Salary increases are needed, but it doesn’t have to come at the expense of eroding profit margins.&nbsp;</span><strong data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Practices will not be able to cut costs on supplies to ease the impact of rising payroll this time. Additionally, owners should not try to absorb the costs themselves.</span></strong></p><p data-dcnode-id="1117"><span data-dcnode-id="1122" instrument_node="">Our advisors suggest salaries </span><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cainwatters.com/hdypc" rel="noopener" target="_blank"><span data-dcnode-id="1120" style="text-decoration: underline; color: #33cccc;"><span data-dcnode-id="1121" instrument_node="">stay within the following percentage-of-collections ranges</span></span></a><span data-dcnode-id="1118" instrument_node=""> in order to keep your overhead healthy. In preparation for salary increases, if you find yourself outside of this range, it’s time to regain balance.</span></p><ul data-dcnode-id="1110"><li data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">General &amp; Pediatric Dentists: 20-24% of Collections</span></li><li data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Orthodontic &amp; Periodontic: 18-20% of Collections</span></li><li data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Oral Surgery &amp; Endodontic: 15-17% of Collections</span></li></ul><span data-dcnode-id="1109" instrument_node=""> </span></div><span data-dcnode-id="1107" instrument_node="">
</span></div><span data-dcnode-id="1105" instrument_node="">
</span></div><span data-dcnode-id="1103" instrument_node="">

</span><div class="elementor-widget-container" data-dcnode-id="1076"><span data-dcnode-id="1083" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1078"><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">To offset the increase in payroll costs, practices need to prepare to put in place aggressive fee increases on their services. At a minimum, fees should increase by the same percentage amount as the average salary raise percentage. For some, even more.</span></p><span data-dcnode-id="1079" instrument_node=""> </span></div><span data-dcnode-id="1077" instrument_node="">
</span></div><span data-dcnode-id="1075" instrument_node="">
</span></div><span data-dcnode-id="1073" instrument_node="">
</span></div><span data-dcnode-id="1071" instrument_node="">
</span></div><span data-dcnode-id="1069" instrument_node="">
</span></div><span data-dcnode-id="1067" instrument_node="">
</span></div><span data-dcnode-id="1065" instrument_node="">
</span></div><span data-dcnode-id="1063" instrument_node="">
</span></section><span data-dcnode-id="1061" instrument_node="">
</span><section class="has_ae_slider elementor-section elementor-top-section elementor-element elementor-element-1b85f8cc elementor-section-boxed elementor-section-height-default elementor-section-height-default ae-bg-gallery-type-default" data-dcnode-id="988" data-element_type="section" data-id="1b85f8cc"><span data-dcnode-id="1060" instrument_node="">
</span><div class="elementor-container elementor-column-gap-default" data-dcnode-id="990"><span data-dcnode-id="1059" instrument_node="">
</span><div class="elementor-row" data-dcnode-id="992"><span data-dcnode-id="1058" instrument_node="">
</span><div class="has_ae_slider elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-46e0343 ae-bg-gallery-type-default" data-dcnode-id="994" data-element_type="column" data-id="46e0343"><span data-dcnode-id="1057" instrument_node="">
</span><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="996"><span data-dcnode-id="1056" instrument_node="">
</span><div class="elementor-widget-wrap" data-dcnode-id="998"><span data-dcnode-id="1055" instrument_node="">
</span><div class="elementor-element elementor-element-5f8f5155 elementor-widget elementor-widget-text-editor" data-dcnode-id="1000" data-element_type="widget" data-id="5f8f5155" data-widget_type="text-editor.default"><span data-dcnode-id="1054" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1002"><span data-dcnode-id="1053" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1004"><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">PPO practices will need to increase fees more than practices that are primarily fee-for-service since only a portion of their patient base will initially be paying higher costs, due to the lag in increasing insurance reimbursement rates.</span></p><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">If you don’t think you can implement the entire fee increase all at once, some practices may want to consider doing multiple fee increases in a given year. For example, a practice could increase fees in December of this year, and then again 6-9 months into 2022, with each fee increase being roughly 4-5%.</span></p><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">“Although no one likes it, raising fees are a natural part of doing business,” Tom says. “Every single business needs to annually evaluate costs and adjust accordingly.”</span></p><p data-dcnode-id="1040"><span data-dcnode-id="1045" instrument_node="">By keeping lines of communication open with your patients, and engaging your staff along each step of the way, there are </span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cainwatters.com/digitalblogs/how-to-raise-fees-increase-profitability-and-keep-patients/" rel="noopener" target="_blank"><span data-dcnode-id="1043" style="text-decoration: underline; color: #33cccc;"><span data-dcnode-id="1044" instrument_node="">best practices for increasing fees</span></span></a><span data-dcnode-id="1041" instrument_node=""> while still keeping patients happy.</span></p><h5 data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">THE MATH CHECKS OUT</span></h5><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Let’s look at an example. We have a general dentistry practice that brings in $1.2 million in collections and an annual staff payroll of $264,000, or 22% of collections. Given the inflation situation, the practice owner makes some adjustments.</span></p><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">She implements a wage increase effective 1/1/2022 that averages 6% across her entire staff. As a result, her payroll costs increase by $15,840. This means total compensation is now $279,840 or 23% of collections.</span></p><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">This doctor will see a 1% decrease in profit margin if no action is taken. While this may not seem like a large decrease, keep in mind that the doctor’s personal costs at home are also increasing 5-6% in a high-inflation environment.</span></p><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Additionally, the practice is likely to see an increase in other bills like supplies, lab, rent, property taxes and insurance as other vendors will also be increasing prices. She then takes another important step:</span></p><p data-dcnode-id="1026"><span data-dcnode-id="1029" instrument_node="">She implements a 6% fee increase on 1/1/2022, generating up to $72,000 of increased revenue for the practice if 100% of the fee increase is realized (for this example this is a fee-for-service practice). </span><strong data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Now, with increased collections at $1,272,000, payroll costs are maintained at 22%. </span></strong></p><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Maintaining the same payroll costs as a percent of collections allows the doctor to cover the rising costs of inflation on their personal and home budget.</span></p><h5 data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">WINDOW OF OPPORTUNITY</span></h5><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Forward-thinking practices need to take this step before year end. If you position your practice on the front end of this and offer salary increases now, before the desperation sets in, you can get ahead of the staffing problem and maintain the quality of service your patients expect.</span></p><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Businesses that offer high-quality products or services will have pricing power in their local economies.&nbsp; This pricing power will allow you to increase your fees to cover these necessary payroll adjustments and should help you maintain overall profit margins while keeping your talented staff in place, motivated and providing exceptional services.</span></p><p data-dcnode-id="1012"><span data-dcnode-id="1017" instrument_node="">This is a unique window of opportunity. Everyone is aware of this problem, and consumers will understand. Surveys say </span><a data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//civicscience.com/americans-are-beginning-to-feel-the-after-burn-of-inflation/" rel="noopener" target="_blank"><span data-dcnode-id="1015" style="text-decoration: underline; color: #33cccc;"><span data-dcnode-id="1016" instrument_node="">87% of the country</span></span></a><span data-dcnode-id="1013" instrument_node=""> is concerned with inflation and rising costs, which means your patients are too. This offers a sense of understanding.</span></p><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">“It’s a difficult business decision, but we need to get past that hesitation,” Tom says. “The reward is that certain businesses can actually drive growth in a high-inflation environment, as long as the businesses are proactive and not reactive.”</span></p><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Dental practices have this ability, especially if they are providing high-quality patient care and 5-star service. These are the businesses that can issue price increases and at the end of the day, maintain or increase profit margins.</span></p><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Volatile times make it even more important to have an advisor on your side that can keep your practice ahead of the curve. Your CWA advisor can help you through the process of determining the right payroll and fee increase that will help you maintain profit margin through this time.</span></p><span data-dcnode-id="1005" instrument_node=""> </span></div><span data-dcnode-id="1003" instrument_node="">
</span></div><span data-dcnode-id="1001" instrument_node="">
</span></div><span data-dcnode-id="999" instrument_node="">
