</span><div class="Layout Layer--one" data-dcnode-id="703"><span data-dcnode-id="744" instrument_node="">
</span><div class="Layout__row" data-dcnode-id="705"><span data-dcnode-id="743" instrument_node="">
</span><div class="Layout__col Layout__col-lg-6 Layout__col-lg-center Layout__col-md-8 Layout__col-md-center Layout__col-sm-10 Layout__col-sm-center Layout__col-xs-12 Layout__col-xs-left Theme-Column" data-dcnode-id="707"><span data-dcnode-id="742" instrument_node="">
</span><div class="Theme-Layer-BodyText" data-dcnode-id="709"><span data-dcnode-id="741" instrument_node="">
</span><div class="Theme-Layer-BodyText--inner" data-dcnode-id="713"><span data-dcnode-id="740" instrument_node="">
</span><p class="" data-dcnode-id="735"><span data-dcnode-id="739" instrument_node="">At its meeting in Brussels on 20 June 2019, the European Council agreed on an </span><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">agenda for the EU for the next five years</span></strong><span data-dcnode-id="736" instrument_node="">. 'A new strategic agenda 2019-2024' sets out the priority areas that will steer the work of the European Council and provide guidance for the work programmes of other EU institutions.
                    </span></p><span data-dcnode-id="734" instrument_node="">
</span><p class="" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">The strategic agenda focuses on four main priorities: </span></p><span data-dcnode-id="731" instrument_node="">
</span><ul class="Theme-Layer-BodyText-List-Unordered" data-dcnode-id="718"><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">protecting citizens and freedoms</span></li><span data-dcnode-id="728" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">developing a strong and vibrant economic base</span></li><span data-dcnode-id="725" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">building a climate-neutral, green, fair and social Europe</span></li><span data-dcnode-id="722" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">promoting European interests and values on the global stage  </span></li><span data-dcnode-id="719" instrument_node="">
</span></ul><span data-dcnode-id="717" instrument_node="">
</span><p class="" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">It also sets out how to achieve those objectives.</span></p><span data-dcnode-id="714" instrument_node="">
</span></div><span data-dcnode-id="712" instrument_node="">
</span><div class="FullSize Theme-Overlay" data-dcnode-id="711" style="opacity:0"></div><span data-dcnode-id="710" instrument_node="">

</span><div class="Layout Layer--one" data-dcnode-id="563"><span data-dcnode-id="613" instrument_node="">
</span><div class="Layout__row" data-dcnode-id="565"><span data-dcnode-id="612" instrument_node="">
</span><div class="Layout__col Layout__col-lg-6 Layout__col-lg-center Layout__col-md-8 Layout__col-md-center Layout__col-sm-10 Layout__col-sm-center Layout__col-xs-12 Layout__col-xs-left Theme-Column" data-dcnode-id="567"><span data-dcnode-id="611" instrument_node="">
</span><div class="Theme-Layer-BodyText" data-dcnode-id="569"><span data-dcnode-id="610" instrument_node="">
</span><div class="Theme-Layer-BodyText--inner" data-dcnode-id="573"><span data-dcnode-id="609" instrument_node="">
</span><p class="" data-dcnode-id="604"><span data-dcnode-id="608" instrument_node="">Europe must be a place where people feel free and safe. The EU must defend the fundamental rights and freedoms of its citizens and </span><strong data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">protect them against existing and emerging threats</span></strong><span data-dcnode-id="605" instrument_node="">.
                    </span></p><span data-dcnode-id="603" instrument_node="">
</span><p class="" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">The main priorities of the European Council in this area are:
                    </span></p><span data-dcnode-id="600" instrument_node="">
</span><ul class="Theme-Layer-BodyText-List-Unordered" data-dcnode-id="577"><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">effective control of the external borders
</span></li><span data-dcnode-id="597" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">fighting illegal migration and human trafficking through better cooperation with countries of origin and transit
</span></li><span data-dcnode-id="594" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">agreeing an effective asylum policy
</span></li><span data-dcnode-id="591" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">ensuring proper functioning of Schengen
</span></li><span data-dcnode-id="588" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">improving cooperation and information-sharing to fight terrorism and cross-border crime
</span></li><span data-dcnode-id="585" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">increasing the EU's resilience against both natural and man-made disasters
</span></li><span data-dcnode-id="582" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="579"><span data-dcnode-id="581" instrument_node="">protecting our societies from malicious cyber activities, hybrid threats and disinformation
</span><br data-dcnode-id="580"></li><span data-dcnode-id="578" instrument_node="">
</span></ul><span data-dcnode-id="576" instrument_node="">
</span><ul class="Theme-Layer-BodyText-List-Unordered" data-dcnode-id="575"></ul><span data-dcnode-id="574" instrument_node="">

</span><p class="" data-dcnode-id="464"><span data-dcnode-id="468" instrument_node="">Europe's </span><strong data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">competitiveness, prosperity, jobs and role on the global stage all depend on a strong economic base</span></strong><span data-dcnode-id="465" instrument_node="">. In this field, the European Council is focusing on:</span></p><span data-dcnode-id="463" instrument_node="">
</span><ul class="Theme-Layer-BodyText-List-Unordered" data-dcnode-id="440"><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">deepening the Economic and Monetary Union</span></li><span data-dcnode-id="460" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">completing the banking and capital markets union
</span></li><span data-dcnode-id="457" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">strengthening the international role of the euro
</span></li><span data-dcnode-id="454" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">strengthening cohesion in the EU
</span></li><span data-dcnode-id="451" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">working on all aspects of the digital revolution and artificial intelligence: infrastructure, connectivity, services, data, regulation and investment</span></li><span data-dcnode-id="448" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">reducing the fragmentation of European research, development and innovation activities
</span></li><span data-dcnode-id="445" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="442"><span data-dcnode-id="444" instrument_node="">ensuring fair competition within the EU and on the global stage
</span><br data-dcnode-id="443"></li><span data-dcnode-id="441" instrument_node="">

</span><div class="Layout Layer--one" data-dcnode-id="291"><span data-dcnode-id="338" instrument_node="">
</span><div class="Layout__row" data-dcnode-id="293"><span data-dcnode-id="337" instrument_node="">
</span><div class="Layout__col Layout__col-lg-6 Layout__col-lg-center Layout__col-md-8 Layout__col-md-center Layout__col-sm-10 Layout__col-sm-center Layout__col-xs-12 Layout__col-xs-left Theme-Column" data-dcnode-id="295"><span data-dcnode-id="336" instrument_node="">
</span><div class="Theme-Layer-BodyText" data-dcnode-id="297"><span data-dcnode-id="335" instrument_node="">
</span><div class="Theme-Layer-BodyText--inner" data-dcnode-id="301"><span data-dcnode-id="334" instrument_node="">
</span><p class="" data-dcnode-id="326"><span data-dcnode-id="333" instrument_node="">Europe needs to step up its </span><strong data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">action to manage climate change</span></strong><span data-dcnode-id="330" instrument_node="">, </span><strong data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">which is an 'existential threat'</span></strong><span data-dcnode-id="327" instrument_node="">. It also needs to embrace technological evolution and globalisation while making sure that no-one is left behind. Priority actions identified by the European Council include:</span></p><span data-dcnode-id="325" instrument_node="">
</span><ul class="Theme-Layer-BodyText-List-Unordered" data-dcnode-id="303"><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">ensuring that EU policies are consistent with the Paris Agreement
</span></li><span data-dcnode-id="322" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">accelerating the transition to renewables and increasing energy efficiency
</span></li><span data-dcnode-id="319" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">reducing dependence on outside sources, diversifying supplies and investing in solutions for the mobility of the future
</span></li><span data-dcnode-id="316" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="314"><span data-dcnode-id="315" instrument_node=""> improving the quality of our air and waters
</span></li><span data-dcnode-id="313" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">promoting sustainable agriculture
</span></li><span data-dcnode-id="310" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">implementing the European Pillar of Social Rights at EU and member state level
</span></li><span data-dcnode-id="307" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">calling on all EU countries to move forward and step up their climate action
</span></li><span data-dcnode-id="304" instrument_node="">
</span></ul><span data-dcnode-id="302" instrument_node="">
</span></div><span data-dcnode-id="300" instrument_node="">

</span><div class="Layout Layer--one" data-dcnode-id="156"><span data-dcnode-id="201" instrument_node="">
</span><div class="Layout__row" data-dcnode-id="158"><span data-dcnode-id="200" instrument_node="">
</span><div class="Layout__col Layout__col-lg-6 Layout__col-lg-center Layout__col-md-8 Layout__col-md-center Layout__col-sm-10 Layout__col-sm-center Layout__col-xs-12 Layout__col-xs-left Theme-Column" data-dcnode-id="160"><span data-dcnode-id="199" instrument_node="">
</span><div class="Theme-Layer-BodyText" data-dcnode-id="162"><span data-dcnode-id="198" instrument_node="">
</span><div class="Theme-Layer-BodyText--inner" data-dcnode-id="166"><span data-dcnode-id="197" instrument_node="">
</span><p class="" data-dcnode-id="192"><span data-dcnode-id="196" instrument_node="">In a world of increasing uncertainty, complexity and change, the EU needs to pursue a strategic course of action and increase its capacity to act autonomously to </span><strong data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">safeguard its interests, uphold its values and way of life, and help shape the global future</span></strong><span data-dcnode-id="193" instrument_node="">. In this area, the European Council has agreed the following key actions:</span></p><span data-dcnode-id="191" instrument_node="">
</span><ul class="Theme-Layer-BodyText-List-Unordered" data-dcnode-id="168"><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">supporting the UN and key multilateral organisations
</span></li><span data-dcnode-id="188" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">promoting sustainable development and implementing the 2030 agenda
</span></li><span data-dcnode-id="185" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">cooperating with partner countries on migration
</span></li><span data-dcnode-id="182" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">upholding the European perspective for European states able and willing to join the EU
</span></li><span data-dcnode-id="179" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">developing a comprehensive partnership with Africa
</span></li><span data-dcnode-id="176" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">ensuring ambitious and robust trade policy, within the reformed WTO and at the bilateral level between the EU and it partners
</span></li><span data-dcnode-id="173" instrument_node="">
</span><li class="Theme-Layer-BodyText-ListItem" data-dcnode-id="170"><span data-dcnode-id="172" instrument_node="">cooperating closely with NATO
</span><br data-dcnode-id="171"></li><span data-dcnode-id="169" instrument_node="">
</span></ul><span data-dcnode-id="167" instrument_node="">
</span></div><span data-dcnode-id="165" instrument_node="">
</span><div class="FullSize Theme-Overlay" data-dcnode-id="164" style="opacity:0"></div><span data-dcnode-id="163" instrument_node="">

</span><div class="Layout__col Layout__col-lg-6 Layout__col-lg-center Layout__col-md-8 Layout__col-md-center Layout__col-sm-10 Layout__col-sm-center Layout__col-xs-12 Layout__col-xs-left Theme-Column" data-dcnode-id="107"><span data-dcnode-id="146" instrument_node="">
</span><div class="Theme-Layer-BodyText" data-dcnode-id="109"><span data-dcnode-id="145" instrument_node="">
</span><div class="Theme-Layer-BodyText--inner" data-dcnode-id="113"><span data-dcnode-id="144" instrument_node="">
</span><h2 class="Theme-Layer-BodyText-Heading-Large" data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">Delivering on our priorities</span></h2><span data-dcnode-id="141" instrument_node="">
</span><p class="" data-dcnode-id="136"><span data-dcnode-id="140" instrument_node="">This strategic agenda is the first step in a process that will be </span><strong data-dcnode-id="138"><span data-dcnode-id="139" instrument_node="">taken forward by the EU institutions and the member states</span></strong><span data-dcnode-id="137" instrument_node="">. The European Council will follow the implementation of these priorities closely and will define further general political directions and priorities as necessary.</span></p><span data-dcnode-id="135" instrument_node="">
</span><div class="InlineElement InlineElement--Divider__container" data-dcnode-id="131"><span data-dcnode-id="134" instrument_node="">
</span><hr class="Theme-Layer-BodyText-Divider null null" data-dcnode-id="133"><span data-dcnode-id="132" instrument_node="">
</span></div><span data-dcnode-id="130" instrument_node="">
</span><div data-dcnode-id="121"><span data-dcnode-id="129" instrument_node="">
</span><blockquote class="Theme-Layer-BodyText-Blockquote" data-dcnode-id="123"><span data-dcnode-id="128" instrument_node="">The EU must be big on big and small on small. It must leave economic and social actors the space to breathe, to create and to innovate. It will be important to engage with citizens, civil society and social partners, as well as with regional and local actors.</span><footer data-dcnode-id="125"><cite class="Theme-Layer-BodyText-QuoteCite" data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">EU strategic agenda 2019-2024</span></cite></footer><span data-dcnode-id="124" instrument_node="">
