</span><p data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">In recent years, there has been a convergence of several global megatrends which are having a major impact on all aspects of the Nordic economy, society and environment.&nbsp; Climate change, migration, rapid demographic developments, digitalization and automation, increasing urban-rural divides, and growing socio-economic inequalities are some of the main threats facing the Nordic Region. Nordregio is focused on identifying practical Nordic policy solutions to help overcome these challenges and promote socio-economic growth and environmental sustainability across the Nordic Region.</span></p><span data-dcnode-id="3036" instrument_node="">
</span><p data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">The Nordregio Strategy 2021-2024 has been written as a collaborative effort by our staff members in close cooperation with Nordregio’s Board of Directors, which represents the Nordic countries, Faroe Islands, Greenland and Åland. The strategy outlines our main mission and core research focus areas, which have been carefully aligned to address the key objectives and needs of policymakers and practitioners outlined within Nordic cooperation steering documents.</span></p><span data-dcnode-id="3033" instrument_node="">
</span><p data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">The overarching goals that guide Nordregio’s research are outlined in the Nordic Council of Ministers’ Action Plan for Vision 2030, which is approved by the Ministers for Nordic Co-operation. The Action Plan defines the work to achieve the objectives of the Vision through a series of initiatives linked to the Vision’s three strategic priorities: a green Nordic Region, a competitive Nordic Region, and a socially sustainable Nordic Region.</span></p><span data-dcnode-id="3030" instrument_node="">
</span><p data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">During the 2021-2024 period, Nordregio is committed to delivering high quality scientific, evidence-based research designed to provide policymakers and practitioners with sustainable policies to help overcome the main challenges faced by Nordic regions and municipalities. Our research will contribute substantially towards Nordic cooperation and synergies, while also showcasing Nordic policies, experience and competences internationally.</span></p><span data-dcnode-id="3027" instrument_node="">
</span><p data-dcnode-id="3022"><span data-dcnode-id="3026" instrument_node="">The Board approved the Nordregio Strategy on the 15</span><sup data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">th</span></sup><span data-dcnode-id="3023" instrument_node=""> of April 2021.</span></p><span data-dcnode-id="3021" instrument_node="">

</span><p data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">Nordregio is recognised and respected as a leading Nordic research institute within the broad research fields of regional development, policy and planning. We specialize in applied research that analyzes and evaluates the latest development trends in policy areas central to Nordic regional economic growth, competitiveness and sustainable development. Nordregio contributes towards meeting existing and future challenges facing the Nordic countries, Faroe Islands, Greenland and Åland, by facilitating cooperation, knowledge sharing and learning between national, regional and local stakeholders in the search for sustainable Nordic policy solutions. &nbsp;</span></p><span data-dcnode-id="2903" instrument_node="">

</span><p data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">Nordic cooperation is based on the idea that the Nordic countries are stronger and can achieve more by working together. Cooperation creates Nordic synergies and added value, generating social capital, innovative thinking and learning in the search for shared solutions to global and regional challenges. Now, more than ever, Nordic collaboration is needed to help overcome the socio-economic impacts of the Covid-19 pandemic. Working together is also essential for meeting the challenges posed by global megatrends, including climate change, digitalization and automation, rapid demographic developments, increasing urban-rural divides, and growing socio-economic inequalities. Nordic cooperation transcends national borders and political barriers; collaboration is based on open knowledge sharing and the pooling of resources, which strengthens Nordic countries both internally and on the global stage.</span></p><span data-dcnode-id="2838" instrument_node="">

</span><h1 data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Nordregio's mission</span></h1><span data-dcnode-id="2785" instrument_node="">
</span></div><span data-dcnode-id="2783" instrument_node="">

</span><p data-dcnode-id="2753"><strong data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">Nordregio's mission</span></strong><span data-dcnode-id="2754" instrument_node=""> is to provide Nordic policymakers and practitioners with new knowledge and tools to support the formulation and implementation of effective socio-economic and environmentally sustainable regional development policies.</span></p><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2744"><span data-dcnode-id="2751" instrument_node="">By facilitating cooperation between Nordic stakeholders, we generate Nordic synergies which create added value and contribute towards meeting </span><a data-dcnode-id="2749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.norden.org/en/declaration/our-vision-2030"><span data-dcnode-id="2750" instrument_node="">the Nordic Vision 2030</span></a><span data-dcnode-id="2748" instrument_node=""> and the implementation of </span><a data-dcnode-id="2746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pub.norden.org/politiknord2021-704/"><span data-dcnode-id="2747" instrument_node="">the Nordic Regional Cooperation Programme 2021-2024</span></a><span data-dcnode-id="2745" instrument_node="">. These include the integration of horizontal perspectives on sustainable development, gender equality, and a youth perspective. Our research also contributes towards the implementation of global policy objectives, including those outlined in the United Nation's Agenda 2030 and Sustainable Development Goals (SDGs), and the European Union's Macro-Regional Strategy for the Baltic Sea Region, Green Deal, Urban Agenda, Digital Agenda, and Circular Economy and Bio-Economy Initiatives.</span></p><span data-dcnode-id="2743" instrument_node="">
</span><p data-dcnode-id="2739"><strong data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">To fulfil our mission </span></strong><span data-dcnode-id="2740" instrument_node="">and generate Nordic synergies, the following objectives and principles guide our everyday operations:</span></p><span data-dcnode-id="2738" instrument_node="">
</span><ul data-dcnode-id="2696"><span data-dcnode-id="2737" instrument_node="">
</span><li data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">Producing high-quality, scientific, evidence-based research that can be understood and used by policymakers and practitioners to provide sustainable policies for regions and municipalities across the Nordic Region.</span></li><span data-dcnode-id="2734" instrument_node="">
</span><li data-dcnode-id="2725"><span data-dcnode-id="2733" instrument_node="">Developing Nordic statistical databases and being a hub for Nordic cross-border and comparative demographic,&nbsp;</span><span data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">economic, social, and environmental</span></span><span data-dcnode-id="2730" instrument_node=""> statistics at national, regional and local levels – with the </span><strong data-dcnode-id="2727"><em data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">State of the Nordic Region</span></em></strong><span data-dcnode-id="2726" instrument_node=""> report as the bi-annual flagship publication.</span></li><span data-dcnode-id="2724" instrument_node="">
</span><li data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">Critically compare past and present Nordic data at different geographic scales to find innovative solutions for implementing SDGs and predicting future socio-economic and demographic trends.</span></li><span data-dcnode-id="2721" instrument_node="">
</span><li data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">Identifying best practice Nordic collaborative governance and territorial place-based policymaking processes built on local knowledge and expertise.</span></li><span data-dcnode-id="2718" instrument_node="">
</span><li data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">Supporting policymakers by engaging stakeholders and citizens in policymaking processes and research projects to facilitate science-society-policy interfaces, based on Nordic knowledge co-creation, exchange and uptake between researchers, policymakers, stakeholders and citizens.</span></li><span data-dcnode-id="2715" instrument_node="">
</span><li data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">Generating and promoting synergies between different policy sectors.</span></li><span data-dcnode-id="2712" instrument_node="">
</span><li data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">Widely communicating Nordic solutions and comparative research findings across ministries, regions and municipalities to facilitate the implementation of new policies and increase stakeholder and citizen awareness.</span></li><span data-dcnode-id="2709" instrument_node="">
</span><li data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">Being a trusted international research project partner.</span></li><span data-dcnode-id="2706" instrument_node="">
</span><li data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">Showcasing Nordic policy solutions and competitiveness in Europe and beyond.</span></li><span data-dcnode-id="2703" instrument_node="">
</span><li data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Creating an institutional environment of equality and openness designed to facilitate deliberation and analytical thinking amongst staff and research based on integrity, self-reflexivity, cooperation, and daring to challenge conventional thinking.</span></li><span data-dcnode-id="2700" instrument_node="">
</span><li data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Ensuring that employment at Nordregio is a valuable stepping stone for attractive future working positions.</span></li><span data-dcnode-id="2697" instrument_node="">
</span></ul><span data-dcnode-id="2695" instrument_node="">

</span><p data-dcnode-id="2582"><span data-dcnode-id="2621" instrument_node="">As a strategic research institute, we align our research competencies to meet the needs of our main stakeholders, including the Nordic Council of Ministers and the national and regional authorities responsible for regional development in the Nordic countries, Faroe Islands, Greenland and Åland. Our main research areas are closely connected to the prioritized themes of the </span><a data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pub.norden.org/politiknord2021-704/"><span data-dcnode-id="2620" instrument_node="">Nordic Cooperation Programme for Regional Policy and Planning</span></a><em data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node=""> </span></em><span data-dcnode-id="2616" instrument_node="">and the </span><a data-dcnode-id="2614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.norden.org/en/declaration/our-vision-2030"><span data-dcnode-id="2615" instrument_node="">Nordic Vision 2030</span></a><span data-dcnode-id="2613" instrument_node="">. The goal of the Nordic Cooperation Programme for Regional Policy and Planning is to promote learning and knowledge building for national, regional, and local policymakers and practitioners within the fields of regional development and physical planning.&nbsp;</span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">The Cooperation Programme contributes</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">&nbsp;towards implementing the three strategic priorities for a green, competitive and socially sustainable Nordic Region</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">&nbsp;outlined in the Nordic Vision 2030</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">. For the period 2021-2024, these priority cooperation areas are mirrored within three thematic groups</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">&nbsp;</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">(TGs)&nbsp;</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">composed of senior officials from relevant ministries in the five&nbsp;</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">Nordic&nbsp;</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">countries,&nbsp;</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2589"><span class="BCX9 NormalTextRun SCXW74385443" data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">in the Faroe Islands, Greenland and the&nbsp;</span></span><span class="BCX9 NormalTextRun SCXW74385443 SpellingErrorV2" data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">Åland</span></span><span data-dcnode-id="2590" instrument_node="">, from regional authorities, cross-border committees, and the&nbsp;</span></span><span data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">North Atlantic Cooperation (</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">NORA):</span></span><span class="BCX9 EOP SCXW74385443" data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2581" instrument_node="">

</span><li data-dcnode-id="2561"><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2563"><strong data-dcnode-id="2570"><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">T</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">hematic g</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">roup&nbsp;</span></span></strong><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2566"><strong data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">A:</span></strong><span data-dcnode-id="2567" instrument_node=""> A green and inclusive urban development</span></span><span class="BCX9 EOP SCXW74385443" data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2562" instrument_node="">

</span><p data-dcnode-id="2547"><strong data-dcnode-id="2554"><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">T</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">hematic group&nbsp;</span></span></strong><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2550"><strong data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">B:</span></strong><span data-dcnode-id="2551" instrument_node=""> A green and inclusive rural development</span></span><span class="BCX9 EOP SCXW74385443" data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2546" instrument_node="">

</span><li data-dcnode-id="2527"><span data-dcnode-id="2543" instrument_node="">
</span><p data-dcnode-id="2529"><strong data-dcnode-id="2536"><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">T</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">hematic g</span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">roup&nbsp;</span></span></strong><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2532"><strong data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">C: </span></strong><span data-dcnode-id="2533" instrument_node="">Green, innovative and resilient regions</span></span><span class="BCX9 EOP SCXW74385443 TrackedChange" data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2528" instrument_node="">

</span><div data-dcnode-id="2507"><span class="BCX9 SCXW74385443 TrackedChange" data-dcnode-id="2514"><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2515"><span class="BCX9 NormalTextRun SCXW74385443 SpellingErrorV2" data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">Nordregio</span></span></span></span><span class="BCX9 SCXW74385443 TrackedChange" data-dcnode-id="2511"><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">&nbsp;is the secretariat for these three thematic groups and the main actor in the implementation of research related activities within them.</span></span></span><span class="BCX9 SCXW74385443 TextRun" data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">&nbsp;Working within the scope of the thematic groups,&nbsp;</span></span><span data-dcnode-id="2508" instrument_node="">Nordregio's core overarching research areas are:</span></div><span data-dcnode-id="2506" instrument_node="">
</span><div data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">&nbsp;</span></div><span data-dcnode-id="2503" instrument_node="">
</span><p data-dcnode-id="2499"><strong data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Regional development: </span></strong><span data-dcnode-id="2500" instrument_node="">Promoting regional development is an essential element of Nordic cooperation. Nordic countries are committed to working together to&nbsp;find&nbsp;innovative ways to enhance regional economic growth, social development and&nbsp;environmental sustainability. Nordregio's research on regional development covers a range of different geographic areas, thematic policy fields and sectors. We contribute to regional development in four main ways: 1) monitoring economic, social and environmental regional development trends across the Nordics; 2) identifying challenges and enablers for sustainable regional development; 3) providing practical ideas and recommendations for maximizing regional development and growth opportunities, and 4) encouraging the development of regional innovation ecosystems and cross-sectoral synergies through the facilitation of collaboration between policymakers and stakeholders. In the 2021-2024 period, Nordregio's research in this field will focus on identifying and exploring Nordic regional development challenges and opportunities in relation to green, innovative and resilient regions. This includes research on blue and green growth, labour market policies, mobility of competencies and skills, as well as regional leadership.</span></p><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2494"><strong data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">Rural development: </span></strong><span data-dcnode-id="2495" instrument_node="">Nordregio carries&nbsp;out research on rural development from a social science perspective considering the different aspects of sustainability for rural, remote, and sparsely populated regions across the Nordic countries. We contribute to knowledge building and rural development policies in different ways. Firstly, we carry out comparative research on socio-economic and environmental issues through both quantitative analyses and qualitative studies. Secondly, we analyse the challenges and opportunities associated with the diversity of rural areas, which helps build the knowledge base on rural issues by highlighting good practices, making policy recommendations, and fostering collaboration across sectors. Nordregio’s research in rural development for the upcoming 2021-2024 period will provide answers to the present challenges and potential areas of development with rural areas. This research will focus on large societal transformations related to the wellbeing of people, economic opportunities for businesses, development of skills and the functioning of labour markets, integration of newcomers, and the overall quality of life and sustainability of rural communities. The future opportunities of rural areas are connected to value creation in diversified economies, the utilisation of the abundance of natural resources, and the development of human and institutional knowledge about the management of a just and green transition, benefitting local communities and regions and contributing local solutions to mitigate climate change. Further, there are still challenges connected to regional social and economic imbalances between urban and rural areas in terms of population growth and&nbsp;access to jobs and services. Achieving a socially just and green transition is also of primary importance for the future of rural areas.&nbsp; Finally, our research contributes to ensuring social sustainability through the inclusion of groups with different cultures, gender, age, or education within local communities.</span></p><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2489"><strong data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Urban planning:</span></strong><span data-dcnode-id="2490" instrument_node=""> From a social science research perspective, Nordregio contributes to increasing knowledge on the main challenges, drivers, and enablers to support ecologically responsive, socially just, and economically inclusive Nordic cities. This involves monitoring Nordic planning systems and investigating planning processes and practices, strategies, and solutions in the built environment. It also includes understanding the different roles of planning authorities across different levels of governance and their roles in supporting and regulating local land use. Equally important is the analysis of the relationship between public and private actors in shaping and implementing these processes. Nordregio’s research underlines questions, such as, how to plan for climate-neutral cities, while striving for equality, social inclusion, and opportunities for all urban citizens, regardless of age, life situation, functional ability and income. Finding a balance between efficiency and legitimacy is another stronghold of Nordregio’s enquiry, with attention on how particular policies, programs and/or technological solutions enable or hinder the participation of people in urban life. As part of a critical approach to urban planning, Nordregio brings forward new planning and design visions that shed light on how to bridge principles that, at first glance, seem contradictory, such as densifying urban structures whilst preserving green spaces.&nbsp; During 2021-2024, Nordregio aims to advance knowledge on the transformative capacities of cities to deal with emergent challenges such as adapting to a changing climate, coping with resource&nbsp;scarcity, increasing segregation and growing urban health inequalities. Nordregio also aims to continue comparing the Nordic planning systems and how various stakeholders contribute to achieving national cross-sectoral targets (e.g. climate, biodiversity) through the means of urban and regional planning. The impact of the COVID-19 pandemic and its effect on urban areas, such as town centres, access to green spaces and recreational areas, office spaces, university towns, and the impacts on both transport systems within and between cities, will also be of importance for Nordregio.</span></p><span data-dcnode-id="2488" instrument_node="">
</span><p data-dcnode-id="2474"><strong data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">Demography:</span></strong><span data-dcnode-id="2485" instrument_node=""> Population changes affect&nbsp;Nordic society and the economy, at both the national and regional levels. The populations of the Nordic countries continue to slowly increase but are ageing which has implications for the sustainability of the Nordic welfare model. In recent decades, about two-thirds of the population increase in the Nordic Region has come from net immigration. This has resulted in much more diverse populations but there are integration challenges, especially when people arrive as refugees. At the regional level, there has been a long-term trend of urbanisation of people migrating from rural and peripheral areas into the larger urban settlements in the Nordic countries. This presents challenges of equal welfare provision across all regions, when rural areas loose younger and more educated persons – a majority of whom are women - and their tax base shrinks. The Nordic countries are unique in a European context in having large, sparsely populated areas as part of their northern regions. Over the 2021-2024 period, analysis of the social and economic implications of these demographic trends continues to be a key research focus of Nordregio. This will include a section devoted to the demographic implications of the covid-19 pandemic in our flagship publication, the </span><em data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">State of the Nordic Region</span></em><span data-dcnode-id="2482" instrument_node="">.&nbsp;</span><br data-dcnode-id="2481"><span data-dcnode-id="2480" instrument_node="">
&nbsp;</span><br data-dcnode-id="2479"><span data-dcnode-id="2478" instrument_node="">
</span><strong data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">Governance: </span></strong><span data-dcnode-id="2475" instrument_node="">The Nordic Region has a long history and tradition of cross-border, interregional and intermunicipal collaborative governance. Nordregio's innovative approach to governance research contributes to increasing knowledge of the main drivers, challenges and enablers of Nordic cooperation. We possess extensive in-house knowledge and expertise in relation to a range of key governance concepts - territorial governance, collaborative governance and multi-level governance. Our main role in several projects is to observe, monitor and evaluate governance processes. The lessons learned from this research provide&nbsp;policymakers and practitioners with practical information regarding best practices on future collaborative efforts across different levels of governance and policy areas. For example, our research has explored and developed the key dimensions of the concepts of territorial governance and collaborative governance in the fields: regional development, maritime spatial planning, research and innovation, rural policy and Nordic public service delivery. We also work closely with public authorities and stakeholders in developing territorial place-based governance structures and assisting in the preparation of regional smart specialization strategies. In the 2021-2024 period, Nordregio will continue to research innovative governance mechanisms, tools and instruments that promote 'active subsidiarity' and integrate local knowledge and expertise into Nordic policymaking processes. One of the main strengths of Nordregio's multidisciplinary team is that we can apply the governance concept from different research backgrounds and perspectives. This diversity allows room for adaptation, flexibility and openness when meeting the requirements of funding bodies and project partners that define the governance concept differently.</span></p><span data-dcnode-id="2473" instrument_node="">

</span><h1 data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Nordregio's multi-disciplinary research toolbox</span></h1><span data-dcnode-id="2445" instrument_node="">

</span><p data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Nordregio adopts a multi-disciplinary approach to research within these core fields. Our research team has a broad competence base in a range of sub-disciplines within the social sciences, including urban planning, human geography, political science, spatial planning, institutional economics, natural resource and environmental economics, business economics, sociology, anthropology and GIS/cartography. Our wide range of competences and the interdisciplinary nature of our research team help us to meet the needs of our diverse client base. We are also able to approach research tasks from different perspectives, helping to foster a working environment built on deliberation and mutual learning. Nordregio has a broad research toolbox specializing in the following research approaches and methods: &nbsp;</span></p><span data-dcnode-id="2414" instrument_node="">
</span><p data-dcnode-id="2410"><strong data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Applied research: </span></strong><span data-dcnode-id="2411" instrument_node="">We conduct solution-oriented and applied research that addresses global and Nordic issues from both a research perspective and the viewpoint of policymakers and practitioners. Nordregio works on commissioned projects that help policymakers and practitioners at the national, regional and local levels to tackle economic, social, planning and governance challenges. We are an active participant and reliable partner in European, Nordic and national research programme projects, including Horizon Europe, ESPON, Interreg, NordForsk, Formas, Vinnova and The Research Council of Norway. Our research focuses on identifying Nordic best policy practices and providing policy solutions and recommendations for policymakers and practitioners, disseminated through practical and easily understandable reports, illustrative maps, policy briefs and workshops/webinars. &nbsp;</span></p><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2405"><strong data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Quantitative analyses, GIS and cartography: </span></strong><span data-dcnode-id="2406" instrument_node="">Over a long period of time, cartographic visualization of demographic and socio-economic patterns and trends has been a widely applied tool in Nordregio’s knowledge production and communication and is still relevant today for guiding policy and decision-making processes. Our main quantitative research methods include statistical analysis, register-based data series, surveys, questionnaires and GIS. Our quantitative analyses are mostly based on harmonized municipal and regional statistics, collected from official data sources. Nordregio has the competencies to apply this data, not only in comparative studies, but also using statistical methods, such as spatial econometrics and cluster analysis. These methods can help identify significant relationships across time and between countries, regions and municipalities. Nordregio has a long experience working with such data sources provided by national statistical institutes and Eurostat for building established indicators, composite indices and typologies contributing towards a better understanding of regional development trends in the Nordic Region and beyond. Nordregio also has a long experience in visualizing societal patterns and trends on different types of thematic maps, and we continuously update our mapping solutions. Recent technological developments enabled us to diversify our visualization formats, which has resulted in the online mapping, tool&nbsp;NordMap, our newly released Nordic Service Mapper and the production of Story Maps. Alongside cartography and visualization tools, Nordregio is actively enlarging its modelling capabilities towards emerging data formats and advanced quantitative analysis methods. In the era of big data and artificial intelligence, geographical analysis shall adopt new perspectives and methods when dealing with traditional themes in territorial comparative research. This process is enabled by the increasing amount of georeferenced data from mobile devices, remote sensing, social media and other sources. New data managing procedures and algorithms adapted from other sciences are increasingly applied for the analysis and prediction of spatial dynamics. These emerging methods shall complement mature methods in regional economics, and it is this combination of methods that shall allow Nordregio to advance in the quantitative interpretation of socio-economic and environmental phenomena with a marked territorial expression. This development in turn will increase our capacity to provide better guidance for ‘place-based’ policymaking in the Nordics.</span></p><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2400"><strong data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">Qualitative analysis: </span></strong><span data-dcnode-id="2401" instrument_node="">Our qualitative research methods include desk-based analysis of primary policy documentation, academic literature reviews, semi-structured interviews, focus group interviews, and qualitative stakeholder surveys/questionnaires. &nbsp;We also conduct ethnographic studies, such as participant observation. Nordregio's comparative research focus means that many of the research projects undertaken at the institute are built on the extensive use of case studies. These case studies can be prospective or retrospective and examine a variety of geographic scales. The use of individual and comparative case studies allows for a more in-depth analysis of an event or policy and governance process. Where purely quantitative data falls short, the case study approach offers a complementary qualitative perspective through which the perceptions and views of stakeholders themselves can be examined in more detail. Our case studies focus on understanding the role of organisations, policies, actor groups and individuals. They explore the narratives and storytelling of individuals from different actor groups, sharing their experience and perceptions of policies or socio-economic developments, as a means of gaining additional ‘micro-level’ perspectives. They also serve to highlight obstacles, enablers, policy options and possible future directions. Stories from individuals are used in story maps – a welcome addition to Nordregio’s communication portfolio.</span></p><span data-dcnode-id="2399" instrument_node="">
</span><p data-dcnode-id="2395"><strong data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Facilitating stakeholder and citizen engagement: </span></strong><span data-dcnode-id="2396" instrument_node="">Nordregio researchers and communications team provide different types of fora where Nordic public authorities and practitioners can collaborate and work together to share knowledge and seek solutions to common problems. We encourage open and transparent cooperation between Nordic policymakers and stakeholders. Nordregio has vast experience in supporting and implementing stakeholder engagement, offering guidelines to policymakers on how to set-up and implement interactive Multi-Actor-Platforms (MAPs) and participatory planning processes. We are also striving to proactively involve citizens in research and policymaking, as establishing strong science-society-policy interfaces is important for improving the quality of policies, establishing trust and social capital, enhancing legitimacy, and providing tailored solutions to territorial issues that directly affect citizens lives. Nordregio is, therefore, focused on examining the potential of digitals tools for increasing citizen engagement, particularly underrepresented and minority groups.</span></p><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2390"><strong data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Evaluations: </span></strong><span data-dcnode-id="2391" instrument_node="">Nordregio has extensive experience conducting evaluations of European, national, regional and local programmes and projects. Every evaluation assignment is unique, so we strive to apply research methods well adapted to each type of evaluation based on sound scientific research evidence. For this purpose, Nordregio's own carefully crafted in-house evaluation model can be adapted and tailored to deliver high quality ex-ante, interim and ex-post evaluations for policymakers and practitioners. We specialize in conducting ex-ante territorial evaluations, based on focused SWOT analyses, that can be used directly to inform the development of regional policies and smart specialisation strategies. &nbsp;</span></p><span data-dcnode-id="2389" instrument_node="">
</span><p data-dcnode-id="2385"><strong data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">Future studies: </span></strong><span data-dcnode-id="2386" instrument_node="">Nordregio uses different methods and techniques for foreseeing or capturing future outcomes to provide policymakers and practitioners with reliable information on possible future development trends on which decisions can be based. Forecasting is a quantitative approach primarily applied to predict future outcomes based on an analysis of past and present trends. Scenario building is used to describe alternative images of the future by developing descriptive narratives. Finally, Nordregio adopts foresight analysis as a qualitative method for identifying local socio-economic strategies based on a structured dialogue with relevant actors.</span></p><span data-dcnode-id="2384" instrument_node="">

</span><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Operating at the international, national, regional and local levels, Nordregio's research covers a wide geographic and multi-locality scope, with an emphasis on the Nordic and Baltic Sea Regions, Europe and the Arctic. In the 2021-2024 period our research will focus on the following governance levels:</span></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2325"><strong data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Nordic Region: </span></strong><span data-dcnode-id="2326" instrument_node="">Nordregio's primary geographic focus is the Nordic Region. The Nordic Regional Cooperation Programme outlines that Nordregio's core responsibility is to work with Nordic national and regional/local policymakers, stakeholders and cross-border committees to enhance knowledge on Nordic regional development trends. These regional trends are highlighted in Nordregio's bi-annual flagship publication 'The State of the Nordic Region'.</span></p><span data-dcnode-id="2324" instrument_node="">
</span><p data-dcnode-id="2320"><strong data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">Baltic Sea Region: </span></strong><span data-dcnode-id="2321" instrument_node="">Nordic countries are active members of the EU Macro-regional Strategy for the Baltic Sea Region (EUSBSR). Nordregio helps facilitate cross-border interactions between Baltic Sea Regions through their participation in EUSBSR flagship projects and EU Interreg cross-border programmes. &nbsp;</span></p><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2315"><strong data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Pan-European: </span></strong><span data-dcnode-id="2316" instrument_node="">The proactive engagement of Nordic countries in EU research funding is important, not only for regional socio-economic growth, but also for maintaining the Nordic Region's status as one of Europe's leading innovative regions. Nordregio's participation in EU projects plays an important function in providing a platform for international learning and benchmarking and the dissemination of good practice examples of Nordic innovation and collaboration to European and international audiences.</span></p><span data-dcnode-id="2314" instrument_node="">
</span><p data-dcnode-id="2310"><strong data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Arctic: </span></strong><span data-dcnode-id="2311" instrument_node="">The Nordic Region is the most northernly located geographical area within both global and European contexts and, as such, brings a unique perspective regarding Arctic issues. Six of the nine regions which are commonly defined as the Arctic are within the Nordic Region. Nordregio works with public authorities and stakeholders in the Arctic to research and find policy solutions on issues, such as adaptation to climate change and permafrost degradation, inclusive governance practices on natural resource management for indigenous people, as well as socio-economic development.</span></p><span data-dcnode-id="2309" instrument_node="">
</span></div><span data-dcnode-id="2307" instrument_node="">

</span><div class="contentblock" data-bottomborder="" data-bottommargin="sm" data-class="" data-contentblock="75996" data-contenttype="post" data-dcnode-id="2230" data-fullcontent="0" data-leftmargin="" data-rightmargin="" data-topmargin=""><span data-dcnode-id="2253" instrument_node="">
</span><p data-dcnode-id="2242"><strong data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Nordregio </span></strong><span data-dcnode-id="2250" instrument_node="">is an institute under the Nordic Council of Ministers (NCM) founded in 1997. Our obligations towards the NCM are delineated in a Strategic Mandate which is included in the Nordic Cooperation Programme for Regional Policy and Planning 2020-2024 and an Annual Grant Letter. NCM's steering model includes two annual meetings between the NCM's secretariat and Nordregio.</span><br data-dcnode-id="2249"><span data-dcnode-id="2248" instrument_node="">
&nbsp;</span><br data-dcnode-id="2247"><span data-dcnode-id="2246" instrument_node="">
</span><strong data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">The Nordregio Board of Directors</span></strong><span data-dcnode-id="2243" instrument_node=""> is responsible for content-related strategic planning based on the main goals of the institution outlined by the Nordic Council of Ministers. The Board of Directors is policymaking and advisory body that focuses on addressing issues of major importance concerning the institute's main objectives and future direction. The Board meets normally four times per year and represents stakeholders in each Nordic country, the Faroe Islands, Greenland and Åland.</span></p><span data-dcnode-id="2241" instrument_node="">
</span><p data-dcnode-id="2237"><strong data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">The Nordic Committee of Senior Officials for Regional Policy (EK-R)</span></strong><span data-dcnode-id="2238" instrument_node=""> is Nordregio's main stakeholder and client and is responsible for the implementation of the Nordic Cooperation Programme for Regional Policy and Planning and developing its thematic working groups. Nordregio's Director participates in the committee's meetings approximately four times per year.</span></p><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2232"><strong data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">The Nordic Council of Ministers for Business, Energy and Regional Policy (MR-NER)</span></strong><span data-dcnode-id="2233" instrument_node=""> approves the Nordic Cooperation Programme and the budget for the regional sector, including Nordregio's basic funding. The Council normally meets once a year and is responsible for appointing members to Nordregio's Board.</span></p><span data-dcnode-id="2231" instrument_node="">

</span><h2 data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Just green transition</span></h2><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2114" instrument_node="">
</span><p data-dcnode-id="2107"><strong data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Thematic background: </span></strong><span data-dcnode-id="2111" instrument_node="">Just green transition refers to the transformation of our economies towards climate-neutrality, ensuring that no one is left behind (EU Green Deal). This transition lies at the very heart of the Nordic 2030 Vision, whereby the region’s economy continues to grow and to reinforce social inclusion, whilst decoupling from resource depletion and environmental degradation. As regions and cities adapt their economies to meet the ambitious climate goals in our region, some sectors and territories will be severely affected; in particular,&nbsp;activities with high dependence on fossil fuels, like petroleum refining, will gradually decline. Cities and regions hosting declining industries will require support to mitigate the adverse social effects of climate transitions and develop alternative economic activities. Other areas specialized in greenhouse gas-intensive industries will experience processes of&nbsp;technology substitution, which will lead to functional dependencies between sectors and&nbsp;potential cascade effects. Finally, some areas with a strong competitive position in emerging sectors will attract significant investments and should work to avoid windfall economic benefits. In sum, the just green transitions will need to be </span><em data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">planned and monitored</span></em><span data-dcnode-id="2108" instrument_node="">, so that the economic and social costs of the transition to a climate-neutral economy are minimized.</span></p><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2102"><strong data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Expertise:</span></strong><span data-dcnode-id="2103" instrument_node=""> Nordregio has built up extensive knowledge on institutional and organisational aspects of the just green transition, as well as the reconciliation of these goals with social priorities. Nordregio has&nbsp;produced overviews of policy instruments and “good practice” case studies of national, regional and local governance supporting innovation and entrepreneurship for green growth, and examined relevant factors hindering and promoting social justice and social inclusion. Nordregio has provided technical support to the European Commission for the preparation of the so-called Just Transition Plans for several areas in the Nordic Region. Results from these initiatives have been disseminated and discussed with national, regional and local stakeholders in the Nordics.</span></p><span data-dcnode-id="2101" instrument_node="">
</span></div><span data-dcnode-id="2099" instrument_node="">

</span><p data-dcnode-id="2036"><strong data-dcnode-id="2038"><span data-dcnode-id="2041" instrument_node="">Future research direction:</span><span data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">&nbsp;</span></span></strong><span data-dcnode-id="2037" instrument_node="">Nordregio aims to support subnational governance actors, notably regions and municipalities, in the process of transitioning towards carbon free economies in a&nbsp;socially fair&nbsp;and inclusive way. We will contribute to the development of just green transitions by producing policy-relevant knowledge at different territorial levels on key aspects of the transition, including:</span></p><span data-dcnode-id="2035" instrument_node="">
</span><ul data-dcnode-id="2015"><span data-dcnode-id="2034" instrument_node="">
</span><li data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">Providing territorial evidence on the impacts of green transitions, identifying which Nordic regions are mostly affected by the transitions, how different social groups are affected,&nbsp;and which type of support they require to facilitate socially fair transformations.</span></li><span data-dcnode-id="2031" instrument_node="">
</span><li data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Assessing what contributes to a well-functioning green transition labour market, including the need for relevant education among the youth population and reskilling older and existing employees.</span></li><span data-dcnode-id="2028" instrument_node="">
</span><li data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">Examining multi-level territorial processes for governing green transitions, focusing on existing regional economic structures and past economic trajectories, but also governance and institutional structures, resources, capabilities and competences, business cultures and supportive measures.</span></li><span data-dcnode-id="2025" instrument_node="">

</span><h2 data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Bioeconomy and circular economy</span></h2><span data-dcnode-id="1973" instrument_node="">
</span><p data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1966"><strong data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Thematic background:&nbsp;</span></strong><span data-dcnode-id="1967" instrument_node="">The move towards bio and circular economies focuses on reducing waste, extending the lifespan of products, and curbing the utilization of natural resources by changing consumption patterns and encouraging industries and businesses to collaborate in sharing and reusing materials. The bio and circular economy consist of those parts of the economy that make use of renewable biological resources from land and water for the mutual benefit of business, society and nature. The Nordic Region is well endowed with natural assets and resources with the bio and circular economy providing huge potential for future socio-economic and environmentally sustainable regional development in both rural and urban areas. The transformation to a bio and circular economy demands both technical and institutional innovation to ensure that bio-based industries and businesses are contributing to environmentally and socially sustainable economic growth. This transformation can provide reduced climate emissions, new jobs and skills, and economic growth in rural and urban areas if appropriate&nbsp;place-based and cross-sectoral organisational&nbsp;structures and innovation ecosystems are cultivated and effectively implemented.</span></p><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1961"><strong data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Expertise: </span></strong><span data-dcnode-id="1962" instrument_node="">Nordregio has conducted extensive research on the rapidly developing bio and circular economies within Nordic rural, urban and coastal settings. We are interested in examining the institutions, policies and governance processes required to facilitate the green&nbsp;and blue innovation at the heart of bioeconomy and circular economy activities. Our research in this area has analysed examples of existing and new industries and business built on natural materials to measure the potential impact of bio and circular economy activities on economic growth and job creation in the Nordic Region. We have also provided new knowledge and insights for policymakers and practitioners on bioeconomy and circular economy best practices related to bio and circular economy innovation ecosystems, regional and cross-border industrial symbiosis, cross-sectoral synergies and climate-based entrepreneurship and youth skills development.</span></p><span data-dcnode-id="1960" instrument_node="">

</span><h2 data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Regional resilience</span></h2><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1808" instrument_node="">
</span><p data-dcnode-id="1804"><strong data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Thematic background: </span></strong><span data-dcnode-id="1805" instrument_node="">The notion of regional resilience is useful for analysing the preparedness and vulnerability of systems and institutions (e.g. regions, communities) to change in response to global shocks and disturbances (e.g. economic, technological, and health crises). Resilience has become increasingly relevant in a global context due to growing political and economic uncertainty and rapid technological and environmental changes. The Covid-19 pandemic has exposed the weaknesses of our welfare systems, value-chains, and global governance structures (including the Nordic Co-operation).</span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1799"><strong data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Expertise: </span></strong><span data-dcnode-id="1800" instrument_node="">Nordregio has conducted several studies and activities addressing regional resilience in multiple regions within the Nordic countries, as well as in cross-border regions. Nordregio applies resilience as an analytical framework and tool to examine how robust and adaptable regional economies and societies are to shocks. Nordregio projects have applied Resilience Systems Analysis (RSA) as a methodology to investigate resilience in case study regions. RSA builds on risk analysis, but instead of focusing on risks alone, or single events, it considers a wide complexity of factors, events and actors that compose a system (e.g. a region) and their interlinkages over time.</span></p><span data-dcnode-id="1798" instrument_node="">

</span><p data-dcnode-id="1739"><strong data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Future research direction: </span></strong><span data-dcnode-id="1740" instrument_node="">Nordregio will continue addressing regional resilience in multiple regions in the Nordic countries and cross-sectorally, especially in projects focusing on climate adaptation and the circular economy. In doing so, vulnerability analysis&nbsp;can be developed as a diagnostic&nbsp;tool to support policymaking and planning. Key considerations for future work in this field at Nordregio are:</span></p><span data-dcnode-id="1738" instrument_node="">

</span><h2 data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Digitalisation</span></h2><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1675"><strong data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Thematic background:</span></strong><span data-dcnode-id="1676" instrument_node=""> Digitalisation refers to the transformation of all sectors of our economy, government and society based on the large-scale adoption of existing and emerging digital technologies and the data they generate. It is a cross-cutting theme which plays out in a range of ways at the different geographical scales and in different contexts. Indeed, digitalisation is an important topic from an urban and regional development perspective, as urban, regional, and rural policy is increasingly expected to be "smart". This means incorporating technological innovations in place-based policymaking, as well as the pursuit of policies and approaches that enable places at different geographical scales to respond to the complex array of challenges and opportunities associated with digitalisation. Another important aspect is assessing and evaluating the impact of digitalisation on the automation of the Nordic labour market. &nbsp;</span></p><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1670"><strong data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Expertise:</span></strong><span data-dcnode-id="1671" instrument_node=""> Nordregio's research on digitalisation covers a diverse range of fields, including&nbsp;health and wellbeing, sustainable development, labour market effects, digitalisation among small and medium sized enterprises, fisheries, innovation, digital inclusion, and urban planning. Nordregio also has considerable expertise related to the governance of the digital transition and is committed to supporting an integrated and equitable approach to digital infrastructure provision across the region by providing up-to-date and harmonised data on Nordic access to broadband and availability of 5G services. We have also conducted wide ranging studies on the impact of automation on the Nordic labour market. &nbsp;</span></p><span data-dcnode-id="1669" instrument_node="">

</span><p data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1527"><strong data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Thematic background: </span></strong><span data-dcnode-id="1528" instrument_node="">The Nordic Region has long been characterized by stable labour markets and high labour market participation. With high levels of education, strong innovative capacity, export driven economies and a large welfare sector, the Nordic labour markets have been able to cope with economic shocks and challenges, such as financial crises. The economic challenges caused by the Covid-19 pandemic, along with major trends such as ageing population, automation, digitalisation and the green transition, present new challenges to the Nordic countries and regions relating to the development of new skills, up-skilling, re-skilling, lifelong learning and skills governance.</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1522"><strong data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Expertise: </span></strong><span data-dcnode-id="1523" instrument_node="">Nordregio has extensive experience in working with regional development from different perspectives, including skills and the labour market. Our expertise is in economic, demographic, and spatial perspectives on changing labour markets in the Nordic regions, digitalisation, integration, youth and gender perspectives on labour market and skills governance in regional skills ecosystems. Nordregio competences comprise working with both quantitative spatial data and qualitative data in different territorial contexts; urban, rural, remote and cross-border regions.</span></p><span data-dcnode-id="1521" instrument_node="">

</span><p data-dcnode-id="1454"><strong data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Future research direction:</span></strong><span data-dcnode-id="1455" instrument_node=""> Digitalisation and the green transition are expected to have a large influence on the Nordic labour markets and the aim is to produce knowledge that can inform policymakers and planners. Remote working is expected to have implications for how work is organised and for spatial patterns of workplaces, housing and welfare services. The green transition will require not only innovative capacity but also new skills. In the coming period, Nordregio’s research in this area will focus on:</span></p><span data-dcnode-id="1453" instrument_node="">

</span><h2 data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Blue economy and marine governance</span></h2><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1390"><strong data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Thematic background:</span></strong><span data-dcnode-id="1391" instrument_node=""> Marine-based or marine related activities and sectors, often coined the blue economy, play a pivotal role in the Nordic Region. The sustainable blue bioeconomy covers a range of areas, including food provision, transports, coastal tourism and recreation, renewable energy production and biotechnology. The sustainable use and governance of the seas will be a key part of the Nordic green transition, the promotion of resilient coastal Nordic economies and citizen well-being. However, with increasing human-related pressures on the seas, marine and coastal ecosystems are under stress, and conflicts between sectors competing for blue space need to be resolved. The Nordic coastal regions, especially the Arctic, will also be affected by climate change with deep implications for the natural environment and coastal societies. Harnessing the full potential of the Nordic blue economy means promoting the sustainable growth of maritime sectors, the blue bioeconomy and innovation, while safeguarding biodiversity and ecosystem services that seas provide, as well as tackling the effects of climate change.&nbsp;</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1385"><strong data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Expertise:</span></strong><span data-dcnode-id="1386" instrument_node=""> Nordregio’s marine expertise includes blue governance and the dynamics of the blue economy in the Nordics, Baltic Sea Region and beyond. In this field, we have conducted wide ranging research in relation to maritime spatial planning and land-sea interactions, cross-border collaboration and stakeholder involvement, sectoral synergies and conflicts, sustainable bioeconomy opportunities and the economic mapping of value creation of different sea-use sectors.</span></p><span data-dcnode-id="1384" instrument_node="">

</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1248"><strong data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Thematic background: </span></strong><span data-dcnode-id="1249" instrument_node="">Scientific research and innovation remain the hallmarks of the modern knowledge-based economy. As innovation is becoming increasingly regional, the focus on place-based policies has emerged as a priority within the European Union and in Nordic countries at large. Policies, such as smart specialisation strategies, are connecting regional development and innovation closer together. Playing on regional strengths, Nordic regions are encouraged to trace out new areas of innovative and economic activity by combining areas of regional expertise and competitive advantage. This requires enhanced levels of good governance. Partnerships, and triple-, quadruple and quintuple helices are key approaches to ensure regional innovation and development policies that meet the needs of regional businesses and industries.&nbsp;The&nbsp;Nordic Vision 2030 clearly states the importance of retaining Nordic competitiveness as part of being the most sustainable region in the world. Innovation is key to fulfilling this vision.&nbsp;</span></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1243"><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Expertise: </span></strong><span data-dcnode-id="1244" instrument_node="">Nordregio&nbsp;has extensive experience working with regional innovation policy analyses and possesses&nbsp;considerable expertise in regional development and governance analyses. Combined, these competences provide&nbsp;a solid foundation for developing Nordic regional innovation systems theory. Nordregio&nbsp;also has the competitive advantage of possessing the necessary data and tools to&nbsp;continuously improve our qualitative and&nbsp;qualitative research methods in this field (e.g., surveys, statistics).&nbsp;&nbsp;</span></p><span data-dcnode-id="1242" instrument_node="">

</span><h2 data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Mobility and accessibility</span></h2><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1094"><strong data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Thematic background: </span></strong><span data-dcnode-id="1095" instrument_node="">Mobility refers to movement and the ability for people and goods to relocate from one place to another. Nordic free movement is a cornerstone of Nordic cooperation and is laid down in Nordic agreements, such as the Passport Union and the Common Labour Market. In the Vision 2030, the aim is to make the Nordic Region the world’s most integrated region by 2030. The concept of mobility is closely connected to the concept of accessibility which describes the geographical and physical parameters that determine the possibilities for people to reach a desired opportunity, activity or service. To enhance regional development and achieve the Agenda 2030 goals, it is important to further understand the spatial and temporal dimensions of mobility and accessibility throughout the Nordic Region.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1089"><strong data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Expertise: </span></strong><span data-dcnode-id="1090" instrument_node="">Nordregio has a long experience of working with different perspectives on regional development, where mobility and accessibility are key aspects. This competence comprises working with different territorial contexts; urban, rural, cross-regional, and cross-national. Nordregio’s expertise includes analysing quantitative spatial data on patterns of mobility and accessibility and qualitative data, including institutional factors enabling and hampering mobility and accessibility within the Nordic Region. Examples of tools for studying these processes include comparative institutional analysis, GIS-based and other quantitative analysis.</span></p><span data-dcnode-id="1088" instrument_node="">

</span><p data-dcnode-id="1001"><strong data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Future research direction: </span></strong><span data-dcnode-id="1002" instrument_node="">Nordregio will continue to contribute to knowledge on spatial patterns of Nordic mobility and accessibility and to inform and contribute to policymaking and spatial planning. The focus of the area is to collect data and analyse Nordic mobility and accessibility for different kinds of amenities and services. During the 2021-2024 period, our research will focus on:</span></p><span data-dcnode-id="1000" instrument_node="">
</span><ul data-dcnode-id="983"><span data-dcnode-id="999" instrument_node="">
</span><li data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Collecting and analysing data on Nordic mobility, including migration and commuting.</span></li><span data-dcnode-id="996" instrument_node="">
</span><li data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Assessing mobility barriers hampering Nordic integration, e.g., through comparative institutional analysis.</span></li><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Exploring mobility and accessibility to services through new methods, e.g., the use of mobile data.</span></li><span data-dcnode-id="990" instrument_node="">
</span><li data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Monitoring technological developments like the 5G roll-out in the Nordic and Baltic countries.&nbsp;</span></li><span data-dcnode-id="987" instrument_node="">
</span><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Examining the phenomena of multi-locality, e.g., multiple seasonal residences.</span></li><span data-dcnode-id="984" instrument_node="">

</span><h2 data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Wellbeing and health</span></h2><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">&nbsp;</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="934"><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Thematic background: </span></strong><span data-dcnode-id="935" instrument_node="">The concept of wellbeing is used to measure life satisfaction levels based on health and socioeconomic dimensions beyond GDP and other more traditional economic indicators. While Nordic countries perform well in many areas of wellbeing, there are also inequalities within and between the countries, which challenge the core characteristics of the Nordic welfare model, such as a high level of equality and trust. Increasing digitalisation and the use of distance-spanning technologies within healthcare and social care has, however, large potential to overcome some of the regional inequalities if existing digital divides are addressed.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="929"><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Expertise: </span></strong><span data-dcnode-id="930" instrument_node="">Nordregio has substantial expertise in analysing traditional welfare indicators in the Nordic Region. Over recent years, we have built up our knowledge base in the themes of health, wellbeing and the use of distance-spanning technologies in healthcare and social care. Recent Nordregio research within this thematic area has analysed the use of digital solutions within healthcare and social care and its impacts on regional development and economic, social, and environmental sustainability, with a particular focus on sparsely populated areas of the Nordic Region.</span></p><span data-dcnode-id="928" instrument_node="">

</span><h2 data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Social inclusion</span></h2><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">&nbsp;</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="796"><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Thematic background: </span></strong><span data-dcnode-id="797" instrument_node="">Social inclusion in society is about enhancing every person’s chance to live a full life. Social inequalities, related to issues like public health, political participation, long-term unemployment, good housing conditions and schooling access, develop along patterns of socioeconomic differences, gender gaps and residential segregation. While the Nordic welfare system is well-equipped to balance inequalities, it struggles to fully include the more disadvantaged share of the population and improve their life chances. &nbsp;Successful social and labour market integration of immigrant men and women is of utmost importance and the need for effective policies and practices have become politically and economically prominent. Spatial segregation between social groups is also a great challenge for equality in Nordic societies, and has become even more urgent to address following the Covid-19 pandemic that has struck ethnic minorities and vulnerable groups hard.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="786"><strong data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Exp</span></strong><strong data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">ertise: </span></strong><span data-dcnode-id="790" instrument_node="">Nordregio has built up extensive knowledge on migration as well as social cohesion and community engagement. In close collaboration with the Nordic Integration Program (</span><a data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.integrationnorden.org/"><span data-dcnode-id="789" instrument_node="">www.integrationnorden.org</span></a><span data-dcnode-id="787" instrument_node="">), numerous quantitative reports, case studies, and policy briefs have been produced, shared and discussed with Nordic officials working with social and economic integration of refugees and migrants (especially women and youth) at national and local levels. Nordregio's knowledge in harmonising data, to make indicators comparable across national borders and over time, can assist local, regional and national authorities to make informed decisions about migration and integration of individuals from EU and non-EU countries. Correct and contemporary data offer a possibility to compare with and learn from the situation in other parts of the Nordic Region and allow for a balanced perspective on migration. Furthermore, Nordregio has in-depth knowledge and expertise in policy analysis concerning housing policy, area-based initiatives, segregation, and the role of civil society for successful integration.</span></p><span data-dcnode-id="785" instrument_node="">

</span><ul data-dcnode-id="690"><span data-dcnode-id="712" instrument_node="">
</span><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Providing policy-relevant knowledge for planning socially sustainable cities and communities;</span></li><span data-dcnode-id="709" instrument_node="">
</span><li data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Harmonising&nbsp;social inclusion data to make indicators comparable across national borders;</span></li><span data-dcnode-id="706" instrument_node="">
</span><li data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Mapping and compiling existing research on effective policies, initiatives and methods for community and labour market integration of men and women - in rural and urban areas;</span></li><span data-dcnode-id="703" instrument_node="">

</span><li data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Examining ways to increase the participation of youth and older citizens in local development and in the green and social transitions;</span></li><span data-dcnode-id="694" instrument_node="">

</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Our communication and engagement activities aim to fulfill Nordregio's mission as an active knowledge-broker between practitioners, researchers, and policymakers. In practice, this requires planning activities with project teams and stakeholders that enhance impact, policy relevance and engagement, so that we make sure we contribute towards the targets In the Nordic Vision and create Nordic added value. New tools to assess research impact and communicate results to increase usability for key target groups will be tested during 2021-2024. The cross-sectoral nature of the Nordic Vision and Agenda 2030 also calls for increased focus on cross-sectoral approaches in our communication work.&nbsp;</span></p><span data-dcnode-id="628" instrument_node="">

</span><p data-dcnode-id="610"><custa data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Nordregio's&nbsp;communication activities are based on seven&nbsp;fundamental principles:&nbsp;&nbsp;</span></custa></p><span data-dcnode-id="609" instrument_node="">
</span><div data-dcnode-id="565"><span data-dcnode-id="608" instrument_node="">

</span><li data-dcnode-id="601"><span data-dcnode-id="605" instrument_node="">​Making Nordregio's research results and maps easily </span><strong data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">accessible </span></strong><span data-dcnode-id="602" instrument_node="">- using online channels and webinars - for target groups and stakeholders in a way that builds our Nordic brand and promotes the Nordic Vision.</span></li><span data-dcnode-id="600" instrument_node="">
</span><li data-dcnode-id="596"><strong data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Mapping our stakeholders' needs </span></strong><span data-dcnode-id="597" instrument_node="">to ensure that Nordregio's outputs are tailored to meet the knowledge needs of key target groups and stakeholders and can be useful in current policy development processes. &nbsp;</span></li><span data-dcnode-id="595" instrument_node="">
</span><li data-dcnode-id="591"><strong data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Collaborating </span></strong><span data-dcnode-id="592" instrument_node="">&nbsp;with relevant Nordic and national associations and networks of regional developers and urban planners to facilitate knowledge exchange, co-creation of policy recommendations, and Nordic added value.&nbsp;</span></li><span data-dcnode-id="590" instrument_node="">
</span><li data-dcnode-id="586"><strong data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Maintaining a dialogue</span></strong><span data-dcnode-id="587" instrument_node=""> with our funders, clients, research partners, and users/target groups. &nbsp;</span></li><span data-dcnode-id="585" instrument_node="">
</span><li data-dcnode-id="581"><strong data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Working closely</span></strong><span data-dcnode-id="582" instrument_node=""> with Nordregio's researchers in the tendering process and all larger projects to map stakeholders and ensure relevance, engagement, and results dissemination with Nordic added value. &nbsp;</span></li><span data-dcnode-id="580" instrument_node="">
</span><li data-dcnode-id="576"><strong data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Encouraging networking</span></strong><span data-dcnode-id="577" instrument_node=""> and social media engagement of Nordregio's researchers to further enhance outreach. &nbsp;</span></li><span data-dcnode-id="575" instrument_node="">

</span><li data-dcnode-id="524"><strong data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">National governments and agencies</span></strong><span data-dcnode-id="525" instrument_node=""> focusing on regional development and related policy areas&nbsp;&nbsp;</span></li><span data-dcnode-id="523" instrument_node="">
