</span><div class="OutlineElement Ltr BCX9 SCXW163969167" data-dcnode-id="410" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow: visible; cursor: text; clear: both; position: relative; direction: ltr; font-family: Calibri, Calibri_MSFontService, sans-serif; font-size: 14.6667px; background-color: rgb(255, 255, 255);"><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Nordregio disseminates key research findings widely to a range of different audiences using the most up to date publication tools and media channels, including:&nbsp; &nbsp;</span></p><span data-dcnode-id="464" instrument_node="">

</span><li data-dcnode-id="454"><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Newsletters </span></strong><span data-dcnode-id="455" instrument_node="">promoting new publications&nbsp;and event invitations to thematic subscription lists</span></li><span data-dcnode-id="453" instrument_node="">

</span><li data-dcnode-id="444"><strong data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Video, podcasts and Social Media</span></strong><span data-dcnode-id="445" instrument_node=""> – FB, Twitter, LinkedIn, Instagram and&nbsp;our YouTube channel &nbsp;</span></li><span data-dcnode-id="443" instrument_node="">

</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Over the coming programme period, Nordregio will continue to use innovative methods for effectively disseminating research findings to key stakeholder groups. Our main priorities are:&nbsp; &nbsp;</span></p><span data-dcnode-id="384" instrument_node="">
</span><div class="OutlineElement Ltr BCX9 SCXW122706775" data-dcnode-id="346" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow: visible; cursor: text; clear: both; position: relative; direction: ltr; font-family: Calibri, Calibri_MSFontService, sans-serif; font-size: 14.6667px; background-color: rgb(255, 255, 255);"><span data-dcnode-id="383" instrument_node="">
</span><ul data-dcnode-id="348"><span data-dcnode-id="382" instrument_node="">
</span><li class="Paragraph SCXW122706775 BCX9" data-dcnode-id="380" style="padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext;"><span data-dcnode-id="381" instrument_node="">Assisting the thematic groups to plan coordinated project activities to enhance impact, policy relevance and knowledge exchange for practitioners and policymakers.&nbsp;&nbsp;</span></li><span data-dcnode-id="379" instrument_node="">
</span><li class="Paragraph SCXW122706775 BCX9" data-dcnode-id="377" style="padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext;"><span data-dcnode-id="378" instrument_node="">Developing new new tools for measuring research dissemination impact including stakeholder assessment surveys.&nbsp;</span></li><span data-dcnode-id="376" instrument_node="">
</span><li class="Paragraph SCXW122706775 BCX9" data-dcnode-id="374" style="padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext;"><span data-dcnode-id="375" instrument_node="">Improving website accessibility: Upgrade Nordregio.org to meet requirements stated in the new EU Web Accessibilty Directive - in collaboration with NCM and SiteImprove.</span></li><span data-dcnode-id="373" instrument_node="">
</span><li class="Paragraph SCXW122706775 BCX9" data-dcnode-id="371" style="padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext;"><span data-dcnode-id="372" instrument_node="">Increasing Social Media visibility by attracting more followers and involving staff in content generation and sharing of videos, animations, storymaps, podcasts, etc.&nbsp;</span></li><span data-dcnode-id="370" instrument_node="">
</span><li class="Paragraph SCXW122706775 BCX9" data-dcnode-id="368" style="padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext;"><span data-dcnode-id="369" instrument_node="">Developing effective formats for videos and podcasts.</span></li><span data-dcnode-id="367" instrument_node="">
</span><li class="Paragraph SCXW122706775 BCX9" data-dcnode-id="365" style="padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext;"><span data-dcnode-id="366" instrument_node="">Ensuring maps are shared more strategically.</span></li><span data-dcnode-id="364" instrument_node="">
</span><li class="Paragraph SCXW122706775 BCX9" data-dcnode-id="362" style="padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext;"><span data-dcnode-id="363" instrument_node="">Improving presentations with the focus on speaking skills, power points with images and thought-provoking storytelling. Add new perspectives, use animations and videos. &nbsp;</span></li><span data-dcnode-id="361" instrument_node="">
</span><li class="Paragraph SCXW122706775 BCX9" data-dcnode-id="359" style="padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext;"><span data-dcnode-id="360" instrument_node="">Exploring new formats for online and IRL events to increase&nbsp;interactivity and stakeholder relevance: webinars, roundtables, marketplaces, speed-dating and other networking forms. Use engaging moderators.&nbsp;&nbsp;</span></li><span data-dcnode-id="358" instrument_node="">
</span><li class="Paragraph SCXW122706775 BCX9" data-dcnode-id="356" style="padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext;"><span data-dcnode-id="357" instrument_node="">Collaborating with stakeholders and relevant organisations and make sure we participate in key national events for practitioners. &nbsp;</span></li><span data-dcnode-id="355" instrument_node="">
</span><li class="Paragraph SCXW122706775 BCX9" data-dcnode-id="353" style="padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext;"><span data-dcnode-id="354" instrument_node="">Promoting Nordic identity by highlighting our Nordic affiliation, the Nordic Vision and Nordic added value.</span></li><span data-dcnode-id="352" instrument_node="">
</span><li class="Paragraph SCXW122706775 BCX9" data-dcnode-id="350" style="padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext;"><span data-dcnode-id="351" instrument_node="">Enhancing cross-sectoral collaboration by building new partnerships within the Nordic Council of Ministers and other Nordic institutions and policy sectors to broaden our visibility, increase relevance, and underline sustainability dimensions:&nbsp;Agenda 2030, gender and youth. &nbsp;​</span></li><span data-dcnode-id="349" instrument_node="">
</span></ul><span data-dcnode-id="347" instrument_node="">

</span><h2 data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Our organisational structure</span></h2><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">&nbsp;</span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Nordregio offers an international and multi-disciplinary research environment with some 50 members of staff from the Nordic Region and around the globe. Nordregio's management team consists of a Director, Research Director, Head of Communications, Head of GIS, and Head of Administration. The core research team is made up of Senior Research Fellows, Senior Research Advisors, Research Fellows, Junior Research Fellows and Senior and Junior Cartographers/GIS Analysts. Nordregio's research team is supported by the Director and the Research Director in the development of research projects. Maps &amp; data provided by the GIS department are important aspects in many of Nordregios projects. Dissemination activities and stakeholder networks are coordinated by the communication team, and the administrative unit is responsible for accounting, financial reporting, HR, IT, and other administrative tasks.</span></p><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">&nbsp;</span></p><span data-dcnode-id="279" instrument_node="">
</span></div><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="274"><custa data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">A project run organisation with delegated responsibility</span></custa></p><span data-dcnode-id="273" instrument_node="">
</span><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Nordregio is a flat organisation and work is carried out in project teams made up of junior and senior researchers, along with GIS experts and communications specialists. Teamwork is a particularly important aspect of Nordregio's research activities and much of the responsibility for projects is delegated to project teams. Project team members are selected based on their expertise in relation to the task at hand, so the main goals and objectives of the project are met. Project leaders are assigned to each team and they are responsible for managing the project and effectively delegating work amongst team members to ensure the smooth flow of the project and that deadlines are met. Nordregio has a professional approach where the institution and the employees, are organised in a strategic, efficient, and inclusive way to ensure efficient project organisation, and implementation. This is formalized using the Nordregio Project Management Model that contains, among other things, descriptions of roles and responsibilities, rules and other aids used for running a project.</span></p><span data-dcnode-id="270" instrument_node="">
</span></div><span data-dcnode-id="268" instrument_node="">

</span><h2 data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Our board</span></h2><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">&nbsp;</span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">The Nordregio Board of Directors is responsible for long-term strategic planning. They consist of one member from each of the five Nordic states (Denmark, Finland, Iceland, Norway, and Sweden) plus one observer from each of the three autonomous territories (the Faroe Islands, Greenland and Åland), as well as a member elected by the staff of Nordregio.</span></p><span data-dcnode-id="245" instrument_node="">

</span><div class="chaptertitle" data-dcnode-id="229" data-id="72012" data-title="    Working at Nordregio  "><span data-dcnode-id="230" instrument_node="">&nbsp;</span></div><span data-dcnode-id="228" instrument_node="">

</span><h2 data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Working at Nordregio</span></h2><span data-dcnode-id="204" instrument_node="">
</span><p data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">&nbsp;</span></p><span data-dcnode-id="201" instrument_node="">
</span><p data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Nordregio is recognized and respected as a leading Nordic research institution within the broad research fields of urban and regional development studies. Working at Nordregio means being part of a truly international research environment focusing on sustainable regional development in the Nordic Region and beyond. Our researchers conduct applied and policy-oriented research and participate in and lead Nordic and international research projects and programmes. Nordregio offers significant career development potential in terms of enhancing competencies through applied and policy-relevant research, achieving an international network of contacts, as well as getting extensive experience in team and project management. Nordregio also offers rich opportunities to collaborate with regional and municipal stakeholders in the Nordic Region.</span></p><span data-dcnode-id="198" instrument_node="">
</span></div><span data-dcnode-id="196" instrument_node="">
</span><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">&nbsp;</span></p><span data-dcnode-id="193" instrument_node="">
</span><p data-dcnode-id="190"><custa data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Staff development</span></custa></p><span data-dcnode-id="189" instrument_node="">
</span><p data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Nordregio offers significant personal and professional development and is a stepping stone for future attractive employment. We provide the opportunity for employees to develop their knowledge and research competences through active participation in a range of diverse projects in different policy areas. We also offer employees the chance to study for a PhD and provide additional support and training in the form of internal and external courses on research methods and article writing. Development talks, where individual goals are set and discussed, are held annually with all employees and viewed as essential for positive career development. Nordregio is also a popular destination for academics and practitioners wishing to develop and refine their scientific research skills. Guest researcher positions are available for established academics and internships are provided for junior researchers looking to develop their work experience and professional portfolios.</span></p><span data-dcnode-id="186" instrument_node="">
</span><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">&nbsp;</span></p><span data-dcnode-id="183" instrument_node="">
</span><p data-dcnode-id="180"><custa data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Working environment</span></custa></p><span data-dcnode-id="179" instrument_node="">
</span><p data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Nordregio's office is situated in the heart of Stockholm, Sweden, on the beautiful and picturesque island of Skeppsholmen. The premises are based in a house built in 1876 that was formerly the home of the Royal Naval Academy. Nordregio is acknowledged as a popular and attractive working place. The goal of Nordregio's HR policy is to create favourable working conditions through the development of a good physical and social working environment. We conduct annual working environment surveys to be able to identify areas for improvement. Nordregio has a zero-tolerance policy for discrimination and harassment. We also recognize the importance of good physical health and, therefore, we offer regular health care examinations, weekly massages, and funding for physical recreation, including gym cards. Working at Nordregio can at times involve a high workload and therefore work with stress prevention and other aspects of creating a good working environment are important at Nordregio. We believe that working at Nordregio should be stimulating and give room for constant learning.</span></p><span data-dcnode-id="176" instrument_node="">
</span><p data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">&nbsp;</span></p><span data-dcnode-id="173" instrument_node="">
</span><p data-dcnode-id="170"><custa data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Equal opportunities</span></custa></p><span data-dcnode-id="169" instrument_node="">
</span><p data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">Nordregio shall be an equal workplace where all employees regardless of age, gender, religious or other beliefs, ethnicity, disabilities, transgender identity, or sexual orientation are able to thrive and able to progress professionally. Nordregio shall in planning and decision making consider the effects on equality and diversity. The gender equality work is also an important part of the systematic efforts to improve Nordregio's work environment and should be included as an integrated and natural part of the daily operations. The work to promote equal rights and opportunities shall take place in cooperation with the employees. Since a lot of Nordregio's research is based on comparative international studies, it is necessary to have staff with different national backgrounds. Ethnical and cultural diversity is an asset for Nordregio and a part of the institute's success. The international environment is also contributing to Nordregio's attractiveness as a workplace.</span></p><span data-dcnode-id="166" instrument_node="">
</span><p data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">&nbsp;</span></p><span data-dcnode-id="163" instrument_node="">
</span><p data-dcnode-id="160"><custa data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">Staff cooperation</span></custa></p><span data-dcnode-id="159" instrument_node="">
</span><p data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">Cooperation is an important part of creating the conditions for an active and collaborative working environment. Nordregio's cooperation agreement signed by the Director and the Local Union Club is designed to provide a structure for open dialogue between employer and employees. Cooperation helps build on mutual respect, openness, involvement, proactivity, and efficiency, which requires effective communication on all levels. Staff participation is an important aspect in the management of Nordregio and this is achieved through cooperation meetings with the Local Union Club, biweekly staff meetings and staff representation on the board.</span></p><span data-dcnode-id="156" instrument_node="">
