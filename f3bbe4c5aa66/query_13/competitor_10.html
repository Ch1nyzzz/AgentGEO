d the </span><a class="jsx-3866816511 underlined" data-dcnode-id="4477" data-id="y-0tQYg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dni.gov/files/ODNI/documents/assessments/ATA-2021-Unclassified-Report.pdf" rel="noreferrer noopener" target="_blank"><span class="jsx-1f24ab0bc0e7a45f" contenteditable="false" data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">&nbsp;</span></span><span data-dcnode-id="4480" instrument_node="">full document here</span><span class="jsx-1f24ab0bc0e7a45f" contenteditable="false" data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">&nbsp;</span></span></a><span data-dcnode-id="4476" instrument_node="">. </span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-XSgKBQ" data-dcnode-id="4467" id="n-XSgKBQ" style=""><div class="jsx-2232305058 grid-item-lite" data-dcnode-id="4468"><div class="jsx-1588508986 text-viewer" data-dcnode-id="4469"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="4470" data-testid="Paragraph"><span data-dcnode-id="4471" instrument_node="">This StoryMap is a synthesis of the original document: key points have been paraphrased for brevity and links are provided throughout to additional information and documents available at the Homeland Security Digital Library.</span></p></div></div></div><div class="jsx-3722964222 layout-wrapper" data-blockid="n-Rh2FGM" data-dcnode-id="4463" id="n-Rh2FGM" style=""><div class="jsx-2232305058 grid-item-lite" data-dcnode-id="4464"><div class="jsx-3012778718 separator-wrapper" data-dcnode-id="4465"><hr class="jsx-3012778718 separator diamonds-triple" data-dcnode-id="4466"></div></div></div><div class="jsx-3687683707 layout-wrapper" data-blockid="n-KIdtM4" data-dcnode-id="4451" id="n-KIdtM4" style=""><div class="jsx-2232305058 grid-item-lite" data-dcnode-id="4452"><div class="jsx-2498616645 text-container" data-dcnode-id="4453"><div class="jsx-2498616645 link-spacer-container" data-dcnode-id="4457"><div class="jsx-2498616645 link-spacer" data-dcnode-id="4458"><button aria-label="Copy section link" class="jsx-2498616645 link-button" data-dcnode-id="4459"><span class="jsx-3394329499 icon" data-dcnode-id="4460"><svg class="jsx-3394329499" data-dcnode-id="4461" viewBox="0 0 16 16"><path class="jsx-3394329499" d="M5 9.5a4.505 4.505 0 0 0 .048.493c-.007-.007-.016-.011-.023-.018l-3-3a3.5 3.5 0 1 1 4.95-4.95l3 3a3.486 3.486 0 0 1-1.31 5.76l-.226-.225a1.484 1.484 0 0 1-.37-.631 2.495 2.495 0 0 0 1.199-4.197l-3-3a2.5 2.5 0 1 0-3.536 3.536L5.09 8.625A4.498 4.498 0 0 0 5 9.5zm11 3a3.475 3.475 0 0 0-1.025-2.475l-3-3c-.007-.007-.016-.011-.023-.018A4.505 4.505 0 0 1 12 7.5a4.498 4.498 0 0 1-.089.876l2.357 2.356a2.5 2.5 0 0 1-.009 3.544 2.561 2.561 0 0 1-3.527-.008l-3-3a2.5 2.5 0 0 1-.094-3.436 2.43 2.43 0 0 1 1.3-.74 1.485 1.485 0 0 0-.377-.652l-.222-.222a3.482 3.482 0 0 0-1.314 5.757l3 3a3.5 3.5 0 0 0 4.937.012l-.351-.355.352.355A3.476 3.476 0 0 0 16 12.5z" data-dcnode-id="4462"></path></svg></span></button></div></div><div class="jsx-1588508986 text-viewer" data-dcnode-id="4454"><h2 class="jsx-2891742943 heading jsx-3405162541" data-dcnode-id="4455" data-testid="Heading"><span data-dcnode-id="4456" instrument_node="">Foreword</span></h2></div></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-9OhGK7" data-dcnode-id="4446" id="n-9OhGK7" style=""><div class="jsx-2232305058 grid-item-lite" data-dcnode-id="4447"><div class="jsx-1588508986 text-viewer" data-dcnode-id="4448"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="4449" data-testid="Paragraph"><span data-dcnode-id="4450" instrument_node="">In the coming year, the United States and its allies will face a diverse array of threats that are playing out amidst the global disruption resulting from the COVID-19 pandemic and against the backdrop of great power competition, the disruptive effects of ecological degradation and a changing climate, an increasing number of empowered non-state actors, and rapidly evolving technology. The complexity of the threats, their intersections, and the potential for cascading events in an increasingly interconnected and mobile world create new challenges for the intelligence community.</span></p></div></div></div><div class="jsx-2306440420 layout-wrapper" data-blockid="n-vIXMBd" data-dcnode-id="4023" id="n-vIXMBd" style=""><div class="jsx-387707729 immersive-container" data-dcnode-id="4024"><div class="jsx-3f9ea0437cf4a588 immersive sidecar jsx-2853478890 slideshow" data-dcnode-id="4025"><span class="jsx-3f9ea0437cf4a588 first-create-dock-node first-create-node sentinel-sidecar jsx-818063092" data-dcnode-id="4445"></span><span class="jsx-3f9ea0437cf4a588 sentinel-top-docked top-sentinel sentinel-sidecar jsx-3348360478" data-dcnode-id="4444"></span><span class="jsx-3f9ea0437cf4a588 sentinel-bottom-docked bottom-sentinel sentinel-sidecar jsx-959216826" data-dcnode-id="4443"></span><span class="sentinel-top-interactable" data-dcnode-id="4442"></span><span class="sentinel-bottom-interactable" data-dcnode-id="4441"></span><div class="jsx-3438414262 jsx-69578666 nav-dots-container" data-dcnode-id="4431" data-testid="nav-dots-container"><div class="jsx-3438414262 jsx-69578666 nav-dots-wrapper horizontal" data-dcnode-id="4432"><div class="jsx-2304080660" data-dcnode-id="4433"><div class="jsx-2304080660 nav-numbers horizontal" data-dcnode-id="4434"><span class="jsx-2304080660 number-part" data-dcnode-id="4439" data-testid="nav-number"><span data-dcnode-id="4440" instrument_node="">01</span></span><span class="jsx-2304080660 number-part" data-dcnode-id="4437"><span data-dcnode-id="4438" instrument_node=""> / </span></span><span class="jsx-2304080660 number-part" data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">10</span></span></div></div></div></div><div class="jsx-3436799100 arrow-container-outer end" data-dcnode-id="4423"><button aria-label="Next slide" class="jsx an></strong><strong data-dcnode-id="4227" data-testid="CustomText-Bold"><span data-dcnode-id="4228" instrument_node="">.</span></strong></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-a4apXG" data-dcnode-id="4218" id="n-a4apXG" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="4219"><div class="jsx-1588508986 text-viewer" data-dcnode-id="4220"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="4221" data-testid="Paragraph"><span data-dcnode-id="4222" instrument_node="">ISIS, al-Qa‘ida, and Iran and its militant allies continue to plot terrorist attacks against US persons and interests, including to varying degrees in the United States. Despite leadership losses, terrorist groups have shown great resiliency and are taking advantage of ungoverned areas to rebuild.</span></p></div></div></div></div></div></div></div></div></div></div><div class="jsx-1455454507 immersive-narrative-panel slideshow bottom-spacing vertical-start" data-dcnode-id="4179"><span class="jsx-4006882689 landmark" data-dcnode-id="4210"></span><span class="jsx-1455454507 sentinel" data-dcnode-id="4209"></span><div class="jsx-1554715474 content-container" data-dcnode-id="4180"><div class="jsx-2291908907 grid-container" data-dcnode-id="4181"><div class="jsx-4129763333 white-space-item" data-dcnode-id="4208"></div><div class="jsx-2522647875 grid-item" data-dcnode-id="4182"><div class="jsx-163163940 narrative-panel-wrapper" data-dcnode-id="4183"><div class="jsx-427859569 layout-wrapper" data-blockid="n-CMDgHn" data-dcnode-id="4196" id="n-CMDgHn" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="4197"><div class="jsx-767830309 text-container" data-dcnode-id="4198"><div class="jsx-767830309 link-spacer-container" data-dcnode-id="4202"><div class="jsx-767830309 link-spacer" data-dcnode-id="4203"><button aria-label="Copy section link" class="jsx-767830309 link-button flashy" data-dcnode-id="4204"><span class="jsx-3394329  data-testid="Paragraph"><strong data-dcnode-id="4036" data-testid="CustomText-Bold"><span data-dcnode-id="4037" instrument_node="">Regional conflicts continue to fuel humanitarian crises, undermine stability, and threaten US persons and interests</span></strong><span data-dcnode-id="4035" instrument_node="">. Some have direct implications for US security. For example, the fighting in Afghanistan, Iraq, and Syria has direct bearing on US forces, while tensions between nuclear-armed India and Pakistan remain a concern for the world. The iterative violence between Israel and Iran, the activity of foreign powers in Libya, and conflicts in other areas—including Africa, Asia, and the Middle East—have the potential to escalate or spread.</span></p></div></div></div></div></div></div></div></div></div></div></div><div class="jsx-3722964222 layout-wrapper" data-blockid="n-SoM5Jm" data-dcnode-id="4019" id="n-SoM5Jm" style=""><div class="jsx-2232305058 grid-item-lite" data-dcnode-id="4020"><div class="jsx-3012778718 separator-wrapper" data-dcnode-id="4021"><hr class="jsx-3012778718 separator diamonds-triple" data-dcnode-id="4022"></div></div></div><div class="jsx-3687683707 layout-wrapper" data-blockid="n-vKvTG5" data-dcnode-id="4007" id="n-vKvTG5" style=""><div class="jsx-2232305058 grid-item-lite" data-dcnode-id="4008"><div class="jsx-2498616645 text-container" data-dcnode-id="4009"><div class="jsx-2498616645 link-spacer-container" data-dcnode-id="4013"><div class="jsx-2498616645 link-spacer" data-dcnode-id="4014"><button aria-label="Copy section link" class="jsx-2498616645 link-button" data-dcnode-id="4015"><span class="jsx-3394329499 icon" data-dcnode-id="4016"><svg class="jsx-3394329499" data-dcnode-id="4017" viewBox="0 0 16 16"><path class="jsx-3394329499" d="M5 9.5a4.505 4.505 0 0 0 .048.493c-.007-.007-.016-.011-.023-.018l-3-3a3.5 3.5 0 1 1 4.95-4.95l3 3a3.486 3.486 0 0 1-1.31 5.76l-.226-.225a1.484 1.484 0 0 1-.37-.631 2.495 2.495 0 0 0 1.199-4.197l-3-3a2.5 2.5 0 1 0-3 gy to reduce dependence on foreign technology, military advances, and promote economic growth.</span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-i4VKoz" data-dcnode-id="3939" id="n-i4VKoz" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3940"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3941"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="3942" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="3959" data-testid="ListItem"><strong data-dcnode-id="3960" data-testid="CustomText-Bold"><span data-dcnode-id="3961" instrument_node="">Beijing views Washington’s economic measures since 2018 as part of a broader US effort to contain China’s rise</span></strong></li><li class="jsx-2443493739" data-dcnode-id="3957" data-testid="ListItem"><span data-dcnode-id="3958" instrument_node="">China touts its success containing the COVID-19 pandemic as evidence of its superiority</span></li><li class="jsx-2443493739" data-dcnode-id="3955" data-testid="ListItem"><span data-dcnode-id="3956" instrument_node="">Beijing is increasingly combining its growing military power with its economic, technological, and diplomatic clout to secure its regional preeminence</span></li><li class="jsx-2443493739" data-dcnode-id="3953" data-testid="ListItem"><span data-dcnode-id="3954" instrument_node="">China pursues international cooperation at Washington’s expense</span></li><li class="jsx-2443493739" data-dcnode-id="3951" data-testid="ListItem"><span data-dcnode-id="3952" instrument_node="">Beijing will continue to promote the Belt and Road Initiative (BRI) to expand China’s economic, political, and military presence abroad, while trying to reduce waste and exploitative practices, which have led to international criticism</span></li><li class="jsx-2443493739" data-dcnode-id="3949" data-testid="ListItem"><span data-dcnode-id="3950" instrument_node="">China will try to increase its influence using “vaccine diplomacy,” giving countries favored access to the COVID-19 vaccines it is developing</span></li><li class="jsx-2443493739" data-dcnode-id="3947" data-testid="ListItem"><span data-dcnode-id="3948" instrument_node="">China also will promote new international norms for technology and human rights, emphasizing state sovereignty and political stability over individual rights</span></li><li class="jsx-2443493739" data-dcnode-id="3945" data-testid="ListItem"><span data-dcnode-id="3946" instrument_node="">China will remain the top threat to US technological competitiveness as the CCP targets key technology sectors and proprietary commercial and military technology</span></li><li class="jsx-2443493739" data-dcnode-id="3943" data-testid="ListItem"><span data-dcnode-id="3944" instrument_node="">Beijing uses a variety of tools, from public investment to espionage and theft, to advance its technological capabilities.</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-Q1msaP" data-dcnode-id="3934" id="n-Q1msaP" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3935"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3936"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="3937" data-testid="Paragraph"><span data-dcnode-id="3938" instrument_node=""></span></p></div></div></div></div><div class="jsx-2725731731 jsx-2740958957 container partial-screen main" data-dcnode-id="3924"><div class="jsx-2250096075 pageable-item" data-dcnode-id="3925"><div class="jsx-340043825 media-panel" data-dcnode-id="3926"><figure class="jsx-1457788057 jsx-2266002647 media-wrapper fill-parent" data-dcnode-id="3927"><div class="jsx-1457788057 jsx-2266002647 media-wrapper-children fill-parent" data-dcnode-id="3928"><div class="jsx-1404383478 jsx-2332015599 parent" data-dcnode-id="3929"><div class="jsx-1404383478 jsx-2332015599 reparent-wrapper" data-dcnode-id="3930" role="button" tabindex="0"><div class="jsx-45237df65323a1d8 image- 43493739" data-dcnode-id="3833" data-testid="ListItem"><span data-dcnode-id="3834" instrument_node="">Uses growing numbers of air, naval, and maritime law enforcement platforms to signal to Southeast Asian countries that China has effective control over contested areas</span></li><li class="jsx-2443493739" data-dcnode-id="3831" data-testid="ListItem"><span data-dcnode-id="3832" instrument_node="">China pressuring Japan over contested areas in the East China Sea</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-5kwEBR" data-dcnode-id="3821" id="n-5kwEBR" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3822"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3823"><p class="jsx-731443379 jsx-4064512605 jsx-1682594651" data-dcnode-id="3824" data-testid="LargeParagraph"><span class="jsx-3520327608" data-dcnode-id="3825" data-testid="CustomText-Color"><span data-dcnode-id="3826" instrument_node="">Taiwan</span></span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-vs5jcJ" data-dcnode-id="3809" id="n-vs5jcJ" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3810"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3811"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="3812" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="3819" data-testid="ListItem"><span data-dcnode-id="3820" instrument_node="">Beijing will press Taiwan authorities to move toward unification</span></li><li class="jsx-2443493739" data-dcnode-id="3817" data-testid="ListItem"><span data-dcnode-id="3818" instrument_node="">Condemn what it views as increased US-Taiwan engagement</span></li><li class="jsx-2443493739" data-dcnode-id="3815" data-testid="ListItem"><span data-dcnode-id="3816" instrument_node="">Expect that friction will grow as Beijing steps up attempts to portray Taipei as internationally isolated and dependent on the mainland for economic prosperity</ -id="3749"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="3750" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="3758" data-testid="ListItem"><span data-dcnode-id="3759" instrument_node="">PLA to continue pursuing overseas military installations and access agreements</span></li><li class="jsx-2443493739" data-dcnode-id="3756" data-testid="ListItem"><span data-dcnode-id="3757" instrument_node="">PLA Navy and PLA Air Force are the largest in the region</span></li><li class="jsx-2443493739" data-dcnode-id="3754" data-testid="ListItem"><span data-dcnode-id="3755" instrument_node="">China continues to field advanced long-range platforms that improve ability to project power</span></li><li class="jsx-2443493739" data-dcnode-id="3751" data-testid="ListItem"><strong data-dcnode-id="3752" data-testid="CustomText-Bold"><span data-dcnode-id="3753" instrument_node="">The PLA Rocket Force’s highly accurate short-, medium-, and intermediate-range conventional systems are capable of holding US and allied bases in the region at risk</span></strong></li></ul></div></div></div></div><div class="jsx-1455454507 immersive-narrative-panel jsx-4118827883 docked bottom-spacing" data-dcnode-id="3703"><span class="jsx-3628064243 landmark" data-dcnode-id="3745"></span><span class="jsx-1455454507 sentinel" data-dcnode-id="3744"></span><div class="jsx-427859569 layout-wrapper" data-blockid="n-chigQ7" data-dcnode-id="3732" id="n-chigQ7" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3733"><div class="jsx-767830309 text-container" data-dcnode-id="3734"><div class="jsx-767830309 link-spacer-container" data-dcnode-id="3738"><div class="jsx-767830309 link-spacer" data-dcnode-id="3739"><button aria-label="Copy section link" class="jsx-767830309 link-button" data-dcnode-id="3740"><span class="jsx-3394329499 icon" data-dcnode-id="3741"><svg class="jsx-3394329499" data-dcnode-id="3742" viewBox="0 0 16 16"><path class="jsx-3394329499" d="M5 9.5a4.505 4.505 0 "jsx-601971424 grid-item-lite" data-dcnode-id="3722"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3723"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="3724" data-testid="Paragraph"><span data-dcnode-id="3725" instrument_node="">China is building a larger and increasingly capable nuclear missile force that is:</span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-oWz6Sf" data-dcnode-id="3709" id="n-oWz6Sf" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3710"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3711"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="3712" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="3719" data-testid="ListItem"><span data-dcnode-id="3720" instrument_node="">More survivable</span></li><li class="jsx-2443493739" data-dcnode-id="3717" data-testid="ListItem"><span data-dcnode-id="3718" instrument_node="">More diverse</span></li><li class="jsx-2443493739" data-dcnode-id="3715" data-testid="ListItem"><span data-dcnode-id="3716" instrument_node="">On higher alert than in the past</span></li><li class="jsx-2443493739" data-dcnode-id="3713" data-testid="ListItem"><span data-dcnode-id="3714" instrument_node="">Includes nuclear missile systems designed to manage regional escalation and ensure an intercontinental second-strike capability</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-6OE1Im" data-dcnode-id="3704" id="n-6OE1Im" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3705"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3706"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="3707" data-testid="Paragraph"><span data-dcnode-id="3708" instrument_node=""></span></p></div></div></div></div><div class="jsx-1455454507 immersive-narrative-panel jsx-4118827883 docked bottom-spacing" data-dcnode-id="3662"><span class="jsx-3628064243 landm id="3511" instrument_node="">Demonstrate Russia’s ability to shape global events</span></li><li class="jsx-2443493739" data-dcnode-id="3508" data-testid="ListItem"><span data-dcnode-id="3509" instrument_node="">Continue to develop its military, nuclear, space, cyber, and intelligence capabilities</span></li><li class="jsx-2443493739" data-dcnode-id="3506" data-testid="ListItem"><span data-dcnode-id="3507" instrument_node="">Leverage its energy resources abroad</span></li><li class="jsx-2443493739" data-dcnode-id="3504" data-testid="ListItem"><span data-dcnode-id="3505" instrument_node="">Influence campaigns</span></li><li class="jsx-2443493739" data-dcnode-id="3502" data-testid="ListItem"><span data-dcnode-id="3503" instrument_node="">Strategic intelligence and counterterrorism cooperation</span></li><li class="jsx-2443493739" data-dcnode-id="3500" data-testid="ListItem"><span data-dcnode-id="3501" instrument_node="">Military aid and combined exercises</span></li><li class="jsx-2443493739" data-dcnode-id="3498" data-testid="ListItem"><span data-dcnode-id="3499" instrument_node="">Mercenary operations and assassinations</span></li><li class="jsx-2443493739" data-dcnode-id="3496" data-testid="ListItem"><span data-dcnode-id="3497" instrument_node="">Arms sales</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-xhybM8" data-dcnode-id="3486" id="n-xhybM8" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3487"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3488"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="3489" data-testid="Paragraph"><span class="jsx-3520327608" data-dcnode-id="3490" data-testid="CustomText-Color"><span data-dcnode-id="3491" instrument_node="">We expect Moscow to seek opportunities for pragmatic cooperation with Washington on its own terms, and we assess that Russia does not want a direct conflict with US forces.</span></span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-mOvHmP" data-dcnode-id="3476" id="n-mOvHmP" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3477"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3478"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="3479" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="3484" data-testid="ListItem"><span data-dcnode-id="3485" instrument_node="">Russian officials have long believed that the United States is conducting its own “influence campaigns” to undermine Russia</span></li><li class="jsx-2443493739" data-dcnode-id="3482" data-testid="ListItem"><span data-dcnode-id="3483" instrument_node="">Russia seeks mutual noninterference with US in both countries’ domestic affairs</span></li><li class="jsx-2443493739" data-dcnode-id="3480" data-testid="ListItem"><span data-dcnode-id="3481" instrument_node="">Russia seeks US recognition of Russia’s claimed sphere of influence over much of the former Soviet Union</span></li></ul></div></div></div></div><div class="jsx-2725731731 jsx-2025045871 container partial-screen end main" data-dcnode-id="3466"><div class="jsx-2250096075 pageable-item" data-dcnode-id="3467"><div class="jsx-340043825 media-panel" data-dcnode-id="3468"><figure class="jsx-1457788057 jsx-2266002647 media-wrapper fill-parent" data-dcnode-id="3469"><div class="jsx-1457788057 jsx-2266002647 media-wrapper-children fill-parent" data-dcnode-id="3470"><div class="jsx-1404383478 jsx-2332015599 parent" data-dcnode-id="3471"><div class="jsx-1404383478 jsx-2332015599 reparent-wrapper" data-dcnode-id="3472" role="button" tabindex="0"><div class="jsx-45237df65323a1d8 image-container fill-parent jsx-2856828968" data-blockid="n-AZTNID" data-dcnode-id="3473"><img alt="" class="jsx-833037043 image jsx-3609982598 is-cropped hidden loading" data-dcnode-id="3474" height="1300" loading="lazy" width="1950"></div></div></div></div></figure></div></div></div><div class="jsx-1455454507 immersive-narrative-panel jsx-4191260521 docked bottom-spacing" data-dcnode-id="3363"><span class="jsx-3628064243 landmark" data-dcnode-id="3465"></span><span class="jsx-1455454507 sentinel" data-dcnode-id="3464"></span><div class="jsx-427859569 layout-wrapper" data-blockid="n-fn9MEH" data-dcnode-id="3452" id="n-fn9MEH" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3453"><div class="jsx-767830309 text-container" data-dcnode-id="3454"><div class="jsx-767830309 link-spacer-container" data-dcnode-id="3458"><div class="jsx-767830309 link-spacer" data-dcnode-id="3459"><button aria-label="Copy section link" class="jsx-767830309 link-button" data-dcnode-id="3460"><span class="jsx-3394329499 icon" data-dcnode-id="3461"><svg class="jsx-3394329499" data-dcnode-id="3462" viewBox="0 0 16 16"><path class="jsx-3394329499" d="M5 9.5a4.505 4.505 0 0 0 .048.493c-.007-.007-.016-.011-.023-.018l-3-3a3.5 3.5 0 1 1 4.95-4.95l3 3a3.486 3.486 0 0 1-1.31 5.76l-.226-.225a1.484 1.484 0 0 1-.37-.631 2.495 2.495 0 0 0 1.199-4.197l-3-3a2.5 2.5 0 1 0-3.536 3.536L5.09 8.625A4.498 4.498 0 0 0 5 9.5zm11 3a3.475 3.475 0 0 0-1.025-2.475l-3-3c-.007-.007-.016-.011-.023-.018A4.505 4.505 0 0 1 12 7.5a4.498 4.498 0 0 1-.089.876l2.357 2.356a2.5 2.5 0 0 1-.009 3.544 2.561 2.561 0 0 1-3.527-.008l-3-3a2.5 2.5 0 0 1-.094-3.436 2.43 2.43 0 0 1 1.3-.74 1.485 1.485 0 0 0-.377-.652l-.222-.222a3.482 3.482 0 0 0-1.314 5.757l3 3a3.5 3.5 0 0 0 4.937.012l-.351-.355.352.355A3.476 3.476 0 0 0 16 12.5z" data-dcnode-id="3463"></path></svg></span></button></div></div><div class="jsx-1588508986 text-viewer" data-dcnode-id="3455"><h3 class="jsx-2925699544 heading jsx-3405162541" data-dcnode-id="3456" data-testid="Heading"><span data-dcnode-id="3457" instrument_node="">Regional and Global Activities</span></h3></div></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-o2VPyl" data-dcnode-id="3447" id="n-o2VPyl" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3448"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3449"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="3450" data-testid="Paragraph"><span data-dcnode-id="3451" instrument_node="">We expect Moscow to insert itself into crises when Russian interests are at stake, it can turn a power vacuum into an opportunity, or the anticipated costs of action are low.</span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-AXuDT0" data-dcnode-id="3441" id="n-AXuDT0" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3442"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3443"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="3444" data-testid="Paragraph"><span class="jsx-3520327608" data-dcnode-id="3445" data-testid="CustomText-Color"><span data-dcnode-id="3446" instrument_node="">Russia probably will continue to expand its global military, intelligence, security, commercial, and energy footprint and build partnerships with US allies and adversaries alike—most notably Russia’s growing strategic cooperation with China—to achieve its objectives.</span></span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-N4IJ8g" data-dcnode-id="3425" id="n-N4IJ8g" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3426"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3427"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="3428" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="3439" data-testid="ListItem"><span data-dcnode-id="3440" instrument_node="">Russia’s Federal Security Service (FSB) organized the assassination of a Chechen separatist in a Berlin park in 2019</span></li><li class="jsx-2443493739" data-dcnode-id="3437" data-testid="ListItem"><span data-dcnode-id="3438" instrument_node="">The FSB tried to kill opposition activist Aleksey Navalnyy inside Russia in 2020 with a fourth-generation chemical agent </span></li><li class="jsx-2443493739" data-dcnode-id="3435" data-testid="ListItem"><span data-dcnode-id="3436" instrument_node="">Middle East and North Africa: Moscow using involvement in Syria and Libya to increase its clout, undercut US leadership, present itself as an indispensable mediator, and gain military access rights and economic opportunities</span></li><li class="jsx-2443493739" data-dcnode-id="3433" data-testid="ListItem"><span data-dcnode-id="3434" instrument_node="">Western Hemisphere: Russia has expanded its engagement with Venezuela, supported Cuba, and used arms sales and energy agreements to try to expand access to markets and natural resources in Latin America, in part to offset some of the effects of sanctions</span></li><li class="jsx-2443493739" data-dcnode-id="3431" data-testid="ListItem"><span data-dcnode-id="3432" instrument_node="">Soviet Union: Moscow positioned to increase its role in the Caucasus, intervene in Belarus, and continue destabilization efforts against Ukraine while settlement talks remain stalled and low-level fighting continues</span></li><li class="jsx-2443493739" data-dcnode-id="3429" data-testid="ListItem"><span data-dcnode-id="3430" instrument_node="">Russia has used energy as a foreign policy tool to coerce cooperation and force states to the negotiating table.</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-WKjksm" data-dcnode-id="3416" id="n-WKjksm" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3417"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3418"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="3419" data-testid="Paragraph"><span class="jsx-2750261700" data-dcnode-id="3422" data-testid="CustomText-Color"><em data-dcnode-id="3423" data-testid="CustomText-Italic"><span data-dcnode-id="3424" instrument_node="">Additional Reading:</span></em></span><em data-dcnode-id="3420" data-testid="CustomText-Italic"><span data-dcnode-id="3421" instrument_node=""> </span></em></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-zPh55W" data-dcnode-id="3403" id="n-zPh55W" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3404"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3405"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="3406" data-testid="Paragraph"><a class="jsx-828965247 underlined" data-dcnode-id="3408" data-id="TB3yCRi" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hsdl.org/%3Fabstract%26did%3D850891" rel="noreferrer noopener" target="_blank"><span class="jsx-1f24ab0bc0e7a45f" contenteditable="false" data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">&nbsp;</span></span><span class="jsx-3520327608" data-dcnode-id="3411" data-testid="CustomText-Color"><em data-dcnode-id="3412" data-testid="CustomText-Italic"><span data-dcnode-id="3413" instrument_node="">Russia: Poisoning of Alexei Navalny and U.S. Policy</span></em></span><span class="jsx-1f24ab0bc0e7a45f" contenteditable="false" data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">&nbsp;</span></span></a><span data-dcnode-id="3407" instrument_node=""> (Congressional Research Service, March 4, 2021)</span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-Buf9at" data-dcnode-id="3390" id="n-Buf9at" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3391"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3392"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="3393" data-testid="Paragraph"><a class="jsx-828965247 underlined" data-dcnode-id="3395" data-id="dq6W5Kx" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hsdl.org/%3Fabstract%26did%3D853332" rel="noreferrer noopener" target="_blank"><span class="jsx-1f24ab0bc0e7a45f" contenteditable="false" data-dcnode-id="3401"><span data-dcnode-id="3402" instrume 3></div></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-SJ4fXm" data-dcnode-id="3334" id="n-SJ4fXm" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3335"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3336"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="3337" data-testid="Paragraph"><span class="jsx-3520327608" data-dcnode-id="3338" data-testid="CustomText-Color"><span data-dcnode-id="3339" instrument_node="">We expect Moscow’s military posture and behavior—including military modernization, use of military force, and the integration of information warfare—to challenge the interests of the United States and its allies.</span></span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-CeTSlw" data-dcnode-id="3322" id="n-CeTSlw" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3323"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3324"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="3325" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="3332" data-testid="ListItem"><span data-dcnode-id="3333" instrument_node="">Despite flat or even declining defense spending, Russia will emphasize new weapons that present increased threats to the United States</span></li><li class="jsx-2443493739" data-dcnode-id="3330" data-testid="ListItem"><span data-dcnode-id="3331" instrument_node="">Will continue its foreign military engagements, conducting training exercises, and incorporating lessons from its involvement in Syria and Ukraine</span></li><li class="jsx-2443493739" data-dcnode-id="3328" data-testid="ListItem"><span data-dcnode-id="3329" instrument_node="">Moscow has the wherewithal to deploy forces in strategically important regions but the farther it deploys from Russia, the less able it probably will be to sustain intensive combat operations</span></li><li class="jsx-2443493739" data-dcnode-id="3326" data-testid="ListItem"><span data-dcnode-id="3327" instrument_node="">Private military and security companies managed by Russian oligarchs close to the Kremlin extend Moscow’s military reach at low cost but limited tactical proficiency</span></li></ul></div></div></div></div><div class="jsx-2725731731 jsx-2025045871 container partial-screen end main" data-dcnode-id="3312"><div class="jsx-4067684299 pageable-item" data-dcnode-id="3313"><div class="jsx-340043825 media-panel" data-dcnode-id="3314"><figure class="jsx-1457788057 jsx-2266002647 media-wrapper fill-parent" data-dcnode-id="3315"><div class="jsx-1457788057 jsx-2266002647 media-wrapper-children fill-parent" data-dcnode-id="3316"><div class="jsx-1404383478 jsx-2332015599 parent" data-dcnode-id="3317"><div class="jsx-1404383478 jsx-2332015599 reparent-wrapper" data-dcnode-id="3318" role="button" tabindex="0"><div class="jsx-45237df65323a1d8 image-container fill-parent jsx-2856828968" data-blockid="n-xhjiyP" data-dcnode-id="3319"><img alt="" class="jsx-833037043 image jsx-1146853927 is-cropped hidden loading" data-dcnode-id="3320" height="1300" loading="lazy" width="1950"></div></div></div></div></figure></div></div></div><div class="jsx-1455454507 immersive-narrative-panel jsx-4191260521 docked bottom-spacing" data-dcnode-id="3275"><span class="jsx-3628064243 landmark" data-dcnode-id="3311"></span><span class="jsx-1455454507 sentinel" data-dcnode-id="3310"></span><div class="jsx-427859569 layout-wrapper" data-blockid="n-w9Q1J0" data-dcnode-id="3298" id="n-w9Q1J0" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3299"><div class="jsx-767830309 text-container" data-dcnode-id="3300"><div class="jsx-767830309 link-spacer-container" data-dcnode-id="3304"><div class="jsx-767830309 link-spacer" data-dcnode-id="3305"><button aria-label="Copy section link" class="jsx-767830309 link-button" data-dcnode-id="3306"><span class="jsx-3394329499 icon" data-dcnode-id="3307"><svg class="jsx-3394329499" data-dcnode-id="3308" viewBox ses the capabilities of its strategic and nonstrategic weapons.</span></div></blockquote></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-cnpLeO" data-dcnode-id="3276" id="n-cnpLeO" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3277"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3278"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="3279" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="3288" data-testid="ListItem"><span data-dcnode-id="3289" instrument_node="">Russia also remains a nuclear-material security concern, despite improvements to physical security at Russian nuclear sites since the 1990s</span></li><li class="jsx-2443493739" data-dcnode-id="3286" data-testid="ListItem"><span data-dcnode-id="3287" instrument_node="">Moscow views its nuclear capabilities as necessary to maintain deterrence and achieve its goals in a potential conflict against the United States and NATO</span></li><li class="jsx-2443493739" data-dcnode-id="3284" data-testid="ListItem"><span data-dcnode-id="3285" instrument_node="">Moscow sees a credible nuclear weapons deterrent as the ultimate guarantor of the Russian Federation</span></li><li class="jsx-2443493739" data-dcnode-id="3282" data-testid="ListItem"><span data-dcnode-id="3283" instrument_node="">Russia is building a large, diverse, and modern set of nonstrategic systems, which are capable of delivering nuclear or conventional warheads</span></li><li class="jsx-2443493739" data-dcnode-id="3280" data-testid="ListItem"><span data-dcnode-id="3281" instrument_node="">Moscow believes such systems offer options to deter adversaries, control the escalation of potential hostilities, and counter US and allied troops near its border.</span></li></ul></div></div></div></div><div class="jsx-1455454507 immersive-narrative-panel jsx-4191260521 docked bottom-spacing" data-dcnode-id="3204"><span class="jsx-3628064243 landmark" data-dcnode-id="3274"></span><span cl cnode-id="3164" data-testid="ListItem"><span data-dcnode-id="3165" instrument_node="">May share its technology and expertise with other countries, including US adversaries.</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-Ht4hg1" data-dcnode-id="3145" id="n-Ht4hg1" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3146"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3147"><p class="jsx-731443379 jsx-4064512605 jsx-1682594651" data-dcnode-id="3148" data-testid="LargeParagraph"><span class="jsx-3520327608" data-dcnode-id="3158" data-testid="CustomText-Color"><span data-dcnode-id="3159" instrument_node="">Moscow conducted influence operations against US elections in </span></span><a class="jsx-828965247 underlined" data-dcnode-id="3151" data-id="0hPImOI" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hsdl.org/%3Fabstract%26did%3D824221" rel="noreferrer noopener" target="_blank"><span class="jsx-1f24ab0bc0e7a45f" contenteditable="false" data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">&nbsp;</span></span><span class="jsx-3520327608" data-dcnode-id="3154" data-testid="CustomText-Color"><span data-dcnode-id="3155" instrument_node="">2016</span></span><span class="jsx-1f24ab0bc0e7a45f" contenteditable="false" data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">&nbsp;</span></span></a><span class="jsx-3520327608" data-dcnode-id="3149" data-testid="CustomText-Color"><span data-dcnode-id="3150" instrument_node="">, 2018, and 2020.</span></span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-pUSvkR" data-dcnode-id="3138" id="n-pUSvkR" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="3139"><div class="jsx-1588508986 text-viewer" data-dcnode-id="3140"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="3141" data-testid="Paragraph"><span class="jsx-2750261700" data-dcnode ta-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="2993" data-testid="ListItem"><span data-dcnode-id="2994" instrument_node="">Diplomacy</span></li><li class="jsx-2443493739" data-dcnode-id="2991" data-testid="ListItem"><span data-dcnode-id="2992" instrument_node="">Expanding nuclear program</span></li><li class="jsx-2443493739" data-dcnode-id="2989" data-testid="ListItem"><span data-dcnode-id="2990" instrument_node="">Military sales and acquisition</span></li><li class="jsx-2443493739" data-dcnode-id="2987" data-testid="ListItem"><span data-dcnode-id="2988" instrument_node="">Proxy and partner attacks.</span></li></ul></div></div></div><div class="jsx-1310918052 layout-wrapper" data-blockid="n-4gpELN" data-dcnode-id="2975" id="n-4gpELN" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="2976"><div class="jsx-1588508986 text-viewer" data-dcnode-id="2977"><blockquote class="jsx-1885586597 jsx-634407262 jsx-935938296" data-dcnode-id="2978" data-testid="SquareCenter"><div class="jsx-1656858818 square-quote start" data-dcnode-id="2979"><div class="jsx-1656858818 decoration-container" contenteditable="false" data-dcnode-id="2981"><img alt="" class="jsx-2059741444 decoration square-quote-decoration jsx-e3a1bc1265e10083" contenteditable="false" data-dcnode-id="2982" role="presentation" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAE4AAABECAYAAAAvMQN7AAAFu0lEQVR4Xs2czY4bRRCAq/DeCbwA5Akg4Q7Kxr4CWu4QNndARHJvhEQgEsr2SlkJ7iDBPUhwteMI7hB4ARaewHC3t1D7T+Px9ExVdXV7c9xU99R83fXbPUbY079bzr12AHhOQEdj7//bkxrRx/bdybfhP8f+9G6TEO5D4RW0ZwDwEhH9DgiHVwlegIYAx4ENAXzXBK84uCq09aJdJXh9595HwO+rG6oJXlFwfedeRILngHi9vtOvArwmaJvFre28YuACNCCYIOLNmHvYJ7w2aE3wioDjQNun2a7cxx8cf7822yLgBu7kKQAcchRbyUxG/vS2QF4t2uRzuyejB9nBVSNUt0JLCQL6YOz9D1x5rZwG2tqdZAWngQZAD0beP9TC4I5rC1Qtc0wJ6HpInbKBGzj3GAA/5b5IW84kmYMjK/G5lfmmM6Bbz7z/M/wtCzhOhNpXOqKEBjOg19fQsoDTQAOiC0K4UaJ6UASqRp9ruuMGw/tvA9JPHHOJmYBwrEhc43MvCT9+evbom/qDzMBpIlRQpm4CIhICYQ20WJ1qZqpaaKXSDlWgIvpxfObfi61N8o7TQouZgGATsUQ1Pp Item"><span data-dcnode-id="2974" instrument_node="">Iran sees itself as locked in a struggle with the United States and its regional allies</span></li><li class="jsx-2443493739" data-dcnode-id="2971" data-testid="ListItem"><span data-dcnode-id="2972" instrument_node="">Tehran’s actions will reflect its perceptions of US, Israeli, and Gulf state hostility; its ability to project force through conventional arms and proxy forces; and its desire to extract diplomatic and economic concessions from the international community</span></li><li class="jsx-2443493739" data-dcnode-id="2969" data-testid="ListItem"><span data-dcnode-id="2970" instrument_node="">Iran’s willingness to conduct attacks probably will hinge on its perception of the United States’ willingness to respond, its ability to conduct attacks without triggering direct conflict, and the prospect of jeopardizing potential US sanctions relief</span></li><li class="jsx-2443493739" data-dcnode-id="2967" data-testid="ListItem"><span data-dcnode-id="2968" instrument_node="">Regime leaders probably will be reluctant to engage diplomatically in talks with the United States</span></li><li class="jsx-2443493739" data-dcnode-id="2965" data-testid="ListItem"><span data-dcnode-id="2966" instrument_node="">Iran remains committed to countering US pressure, although Tehran is also wary of becoming involved in a full-blown conflict</span></li></ul></div></div></div></div><div class="jsx-2725731731 jsx-2740958957 container partial-screen main" data-dcnode-id="2951"><div class="jsx-2250096075 pageable-item" data-dcnode-id="2952"><div class="jsx-340043825 media-panel" data-dcnode-id="2953"><figure class="jsx-1457788057 jsx-2266002647 media-wrapper fill-parent" data-dcnode-id="2954"><div class="jsx-1457788057 jsx-2266002647 media-wrapper-children fill-parent" data-dcnode-id="2955"><div class="jsx-1404383478 jsx-2332015599 parent" data-dcnode-id="2956"><div class="jsx-1404383478 jsx-2332015599 reparent-wrapper" data-dcnode-id="2957" rgely attributed to Iran-backed Iraqi Shia militias</span></li><li class="jsx-2443493739" data-dcnode-id="2921" data-testid="ListItem"><span data-dcnode-id="2922" instrument_node="">Iran will rely on its Shia militia allies and their associated political parties</span></li><li class="jsx-2443493739" data-dcnode-id="2919" data-testid="ListItem"><span data-dcnode-id="2920" instrument_node="">Tehran continues to leverage ties to Iraqi Shia groups and leaders to circumvent US sanctions</span></li><li class="jsx-2443493739" data-dcnode-id="2917" data-testid="ListItem"><span data-dcnode-id="2918" instrument_node="">Try to force the United States to withdraw through political pressure and kinetic strikes</span></li><li class="jsx-2443493739" data-dcnode-id="2915" data-testid="ListItem"><span data-dcnode-id="2916" instrument_node="">Iraqi politicians, such as Prime Minister Mustafa al-Kadhimi, will attempt to balance Baghdad’s relations with Iran and the United States in an effort to avoid Iraq becoming an arena for conflict between the two countries</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-7Ktzif" data-dcnode-id="2902" id="n-7Ktzif" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="2903"><div class="jsx-1588508986 text-viewer" data-dcnode-id="2904"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="2905" data-testid="Paragraph"><span class="jsx-3520327608" data-dcnode-id="2908" data-testid="CustomText-Color"><strong data-dcnode-id="2909" data-testid="CustomText-Bold"><span data-dcnode-id="2910" instrument_node="">Iran is determined to maintain influence in Syria</span></strong></span><span class="jsx-3520327608" data-dcnode-id="2906" data-testid="CustomText-Color"><span data-dcnode-id="2907" instrument_node="">.</span></span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-LMjzmU" data-dcnode-id="2894" id="n-LMjzmU" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="2895"><div class="jsx-1588508986 text-viewer" data-dcnode-id="2896"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="2897" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="2900" data-testid="ListItem"><span data-dcnode-id="2901" instrument_node="">Iran is pursuing a permanent military presence and economic deals in Syria</span></li><li class="jsx-2443493739" data-dcnode-id="2898" data-testid="ListItem"><span data-dcnode-id="2899" instrument_node="">Build its regional influence, support Hizballah, and threaten Israel</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-4H8JNF" data-dcnode-id="2885" id="n-4H8JNF" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="2886"><div class="jsx-1588508986 text-viewer" data-dcnode-id="2887"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="2888" data-testid="Paragraph"><span class="jsx-3520327608" data-dcnode-id="2891" data-testid="CustomText-Color"><strong data-dcnode-id="2892" data-testid="CustomText-Bold"><span data-dcnode-id="2893" instrument_node="">Iran will remain a destabilizing force in Yemen</span></strong></span><span class="jsx-3520327608" data-dcnode-id="2889" data-testid="CustomText-Color"><span data-dcnode-id="2890" instrument_node="">.</span></span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-vobLhC" data-dcnode-id="2877" id="n-vobLhC" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="2878"><div class="jsx-1588508986 text-viewer" data-dcnode-id="2879"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="2880" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="2883" data-testid="ListItem"><span data-dcnode-id="2884" instrument_node="">Tehran continues support to the Huthis—including supplying ballistic and cruise missiles as well as unmanned systems</span></li><li class="jsx-2443493739" data-dcnode-id="2881" data-testid="ListItem"><span data-dcnode-id="2882" instrument_node="">Poses a threat to US partners and interests, notably through strikes on Saudi Arabia</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-sJkIzW" data-dcnode-id="2868" id="n-sJkIzW" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="2869"><div class="jsx-1588508986 text-viewer" data-dcnode-id="2870"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="2871" data-testid="Paragraph"><span class="jsx-3520327608" data-dcnode-id="2874" data-testid="CustomText-Color"><strong data-dcnode-id="2875" data-testid="CustomText-Bold"><span data-dcnode-id="2876" instrument_node="">Tehran remains a threat to Israel</span></strong></span><span class="jsx-3520327608" data-dcnode-id="2872" data-testid="CustomText-Color"><span data-dcnode-id="2873" instrument_node="">.</span></span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-i1ccD0" data-dcnode-id="2860" id="n-i1ccD0" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="2861"><div class="jsx-1588508986 text-viewer" data-dcnode-id="2862"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="2863" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="2866" data-testid="ListItem"><span data-dcnode-id="2867" instrument_node="">Directly through its missile forces</span></li><li class="jsx-2443493739" data-dcnode-id="2864" data-testid="ListItem"><span data-dcnode-id="2865" instrument_node="">Indirectly through its support of Hizballah and other terrorist groups</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-qaljBY" data-dcnode-id="2851" id="n-qaljBY" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="2852"><div class="jsx-1588508986 text-viewer" data-dcnode-id="2853"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="2854" data-testid="Paragraph"><span clas ta-dcnode-id="2741"><div class="jsx-1588508986 text-viewer" data-dcnode-id="2742"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="2743" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="2750" data-testid="ListItem"><span data-dcnode-id="2751" instrument_node="">Iran has threatened to retaliate against US officials for the Soleimani killing in January 2020 and attempted to conduct lethal operations in the United States previously</span></li><li class="jsx-2443493739" data-dcnode-id="2748" data-testid="ListItem"><span data-dcnode-id="2749" instrument_node="">US law enforcement has arrested numerous individuals with connections to Iran as agents of influence or for collecting information on Iranian dissidents in the United States</span></li><li class="jsx-2443493739" data-dcnode-id="2746" data-testid="ListItem"><span data-dcnode-id="2747" instrument_node="">Iran’s security forces have been linked to attempted assassination and kidnapping plots in Europe, the Middle East, and South Asia</span></li><li class="jsx-2443493739" data-dcnode-id="2744" data-testid="ListItem"><span data-dcnode-id="2745" instrument_node="">Iran probably can most readily target US interests in the Middle East and South Asia because it has assets and proxies in the region with access to weapons and explosives.</span></li></ul></div></div></div></div><div class="jsx-1455454507 immersive-narrative-panel jsx-4118827883 docked bottom-spacing" data-dcnode-id="2676"><span class="jsx-3628064243 landmark" data-dcnode-id="2738"></span><span class="jsx-1455454507 sentinel" data-dcnode-id="2737"></span><div class="jsx-427859569 layout-wrapper" data-blockid="n-B2u5l5" data-dcnode-id="2725" id="n-B2u5l5" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="2726"><div class="jsx-767830309 text-container" data-dcnode-id="2727"><div class="jsx-767830309 link-spacer-container" data-dcnode-id="2731"><div class="jsx-767830309 link-spacer" data-dcnode-id="2732"><button aria-labe urrently undertaking the key nuclear weapons-development activities that we judge would be necessary to produce a nuclear device.</span></div></blockquote></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-qLWP34" data-dcnode-id="2699" id="n-qLWP34" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="2700"><div class="jsx-1588508986 text-viewer" data-dcnode-id="2701"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="2702" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="2715" data-testid="ListItem"><span data-dcnode-id="2716" instrument_node="">Following the US withdrawal from the JCPOA agreement in May 2018, Iranian officials have abandoned some of Iran’s commitments and resumed some nuclear activities that exceed the JCPOA limits</span></li><li class="jsx-2443493739" data-dcnode-id="2713" data-testid="ListItem"><span data-dcnode-id="2714" instrument_node="">Since June 2019, Iran has increased the size and enrichment level of its uranium stockpile beyond JCPOA limits</span></li><li class="jsx-2443493739" data-dcnode-id="2711" data-testid="ListItem"><span data-dcnode-id="2712" instrument_node="">Iran has consistently cast its resumption of nuclear activities as a reversible response to the US withdrawal from the JCPOA and messaged that it would return to full compliance if the United States also fulfilled its JCPOA commitments</span></li><li class="jsx-2443493739" data-dcnode-id="2709" data-testid="ListItem"><span data-dcnode-id="2710" instrument_node="">If Tehran does not receive sanctions relief, Iranian officials probably will consider options ranging from further enriching uranium up to 60 percent to designing and building a new 40 Megawatt Heavy Water reactor</span></li><li class="jsx-2443493739" data-dcnode-id="2707" data-testid="ListItem"><span data-dcnode-id="2708" instrument_node="">Since September 2019, Iran has ignored restrictions on advanced centrifuge research and development and restarted uranium enrichment operations at the deeply buried Fordow facility</span></li><li class="jsx-2443493739" data-dcnode-id="2705" data-testid="ListItem"><span data-dcnode-id="2706" instrument_node="">January 2021, Iran began to enrich uranium up to 20 percent and started R&amp;D with the stated intent to produce uranium metal for research reactor fuel</span></li><li class="jsx-2443493739" data-dcnode-id="2703" data-testid="ListItem"><span data-dcnode-id="2704" instrument_node="">February 2021, it produced gram quantities of natural uranium metal in a laboratory experiment.</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-KB3omZ" data-dcnode-id="2690" id="n-KB3omZ" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="2691"><div class="jsx-1588508986 text-viewer" data-dcnode-id="2692"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="2693" data-testid="Paragraph"><span class="jsx-2750261700" data-dcnode-id="2696" data-testid="CustomText-Color"><em data-dcnode-id="2697" data-testid="CustomText-Italic"><span data-dcnode-id="2698" instrument_node="">Additional Reading:</span></em></span><em data-dcnode-id="2694" data-testid="CustomText-Italic"><span data-dcnode-id="2695" instrument_node=""> </span></em></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-IrHhVn" data-dcnode-id="2677" id="n-IrHhVn" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="2678"><div class="jsx-1588508986 text-viewer" data-dcnode-id="2679"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="2680" data-testid="Paragraph"><a class="jsx-828965247 underlined" data-dcnode-id="2682" data-id="Hx4CUrr" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hsdl.org/%3Fabstract%26did%3D853360" rel="noreferrer noopener" target="_blank"><span class="jsx-1f24ab0bc0e7a45f" contenteditable="false" data-dcnode-id="2688"><span data-dcnode-id="2689 "jsx-2443493739" data-dcnode-id="2436" data-testid="ListItem"><span data-dcnode-id="2437" instrument_node="">Actively engaged in ballistic missile research and development</span></li><li class="jsx-2443493739" data-dcnode-id="2434" data-testid="ListItem"><span data-dcnode-id="2435" instrument_node="">Pyongyang’s chemical and biological weapons (CBW) efforts persist</span></li><li class="jsx-2443493739" data-dcnode-id="2432" data-testid="ListItem"><span data-dcnode-id="2433" instrument_node="">Announced end to North Korea’s self-imposed moratorium on nuclear weapons and ICBM testing in December 2019</span></li><li class="jsx-2443493739" data-dcnode-id="2430" data-testid="ListItem"><span data-dcnode-id="2431" instrument_node="">So far has not conducted long-range missile testing and has left the door open to future denuclearization talks with the United States</span></li><li class="jsx-2443493739" data-dcnode-id="2428" data-testid="ListItem"><span data-dcnode-id="2429" instrument_node="">Kim may be considering whether to resume long-range missile or nuclear testing this year to try to force the United States to deal with him on Pyongyang’s terms.</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-XtsW4o" data-dcnode-id="2415" id="n-XtsW4o" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="2416"><div class="jsx-1588508986 text-viewer" data-dcnode-id="2417"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="2418" data-testid="Paragraph"><span class="jsx-2750261700" data-dcnode-id="2421" data-testid="CustomText-Color"><em data-dcnode-id="2422" data-testid="CustomText-Italic"><span data-dcnode-id="2423" instrument_node="">Additional Reading:</span></em></span><em data-dcnode-id="2419" data-testid="CustomText-Italic"><span data-dcnode-id="2420" instrument_node=""> </span></em></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-aJoQkm" data-dcnode-id="2402" id="n-aJo "jsx-601971424 grid-item-lite" data-dcnode-id="1471"><div class="jsx-1588508986 text-viewer" data-dcnode-id="1472"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="1473" data-testid="Paragraph"><span data-dcnode-id="1474" instrument_node="">Even in the midst of a global pandemic that shuttered countries and significantly reduced travel, global CO2 emissions only decreased by less than 6-percent in 2020.</span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-1RJ55v" data-dcnode-id="1465" id="n-1RJ55v" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="1466"><div class="jsx-1588508986 text-viewer" data-dcnode-id="1467"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="1468" data-testid="Paragraph"><span data-dcnode-id="1469" instrument_node="">By December 2020, they had rebounded to previous monthly levels as countries began to reopen, an indication of how strongly emissions are coupled to economic growth.</span></p></div></div></div></div></div></div></div></div><div class="jsx-1455454507 immersive-narrative-panel slideshow last bottom-spacing vertical-start" data-dcnode-id="1407"><span class="jsx-4006882689 landmark" data-dcnode-id="1459"></span><span class="jsx-1455454507 sentinel" data-dcnode-id="1458"></span><div class="jsx-1554715474 content-container" data-dcnode-id="1408"><div class="jsx-2291908907 grid-container" data-dcnode-id="1409"><div class="jsx-4129763333 white-space-item" data-dcnode-id="1457"></div><div class="jsx-2522647875 grid-item" data-dcnode-id="1410"><div class="jsx-163163940 narrative-panel-wrapper" data-dcnode-id="1411"><div class="jsx-427859569 layout-wrapper" data-blockid="n-hLrib0" data-dcnode-id="1445" id="n-hLrib0" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="1446"><div class="jsx-767830309 text-container" data-dcnode-id="1447"><div class="jsx-767830309 link-spacer-container" data-dcnode-id="1451"><div class="jsx-767830309 l rid-item-lite" data-dcnode-id="1436"><div class="jsx-1588508986 text-viewer" data-dcnode-id="1437"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="1438" data-testid="Paragraph"><span data-dcnode-id="1439" instrument_node="">Pandemic restrictions will remain a check on cross-border movements, but strains global humanitarian response mechanisms and funding.</span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-SWkvRt" data-dcnode-id="1430" id="n-SWkvRt" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="1431"><div class="jsx-1588508986 text-viewer" data-dcnode-id="1432"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="1433" data-testid="Paragraph"><span data-dcnode-id="1434" instrument_node="">Migration and displacement will heighten humanitarian needs, increase the risk of political upheaval, exacerbate other health crisis risks, and aid recruitment and radicalization by militant groups.</span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-ggLmek" data-dcnode-id="1425" id="n-ggLmek" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="1426"><div class="jsx-1588508986 text-viewer" data-dcnode-id="1427"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="1428" data-testid="Paragraph"><span data-dcnode-id="1429" instrument_node="">Additional Reading:</span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-UFTK72" data-dcnode-id="1412" id="n-UFTK72" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="1413"><div class="jsx-1588508986 text-viewer" data-dcnode-id="1414"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="1415" data-testid="Paragraph"><a class="jsx-2003087615 underlined" data-dcnode-id="1417" data-id="nah8KBH" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hsdl.org/%3Fabstract%26did%3D3918" rel="nore sx-1588508986 text-viewer" data-dcnode-id="1271"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="1272" data-testid="Paragraph"><span data-dcnode-id="1275" instrument_node="">ISIS-inspired attacks very likely will remain the primary ISIS threat to the US homeland this year</span><span data-dcnode-id="1274" instrument_node="">, rat</span><span data-dcnode-id="1273" instrument_node="">her than plots operationally supported or directed by ISIS, given the logistical and security challenges the group would need to overcome to deploy and support attackers in the United States.</span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-gKGKaI" data-dcnode-id="1257" id="n-gKGKaI" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="1258"><div class="jsx-1588508986 text-viewer" data-dcnode-id="1259"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="1260" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="1267" data-testid="ListItem"><span data-dcnode-id="1268" instrument_node="">ISIS will attempt to expand its insurgency in Iraq and Syria, where it has been attacking prominent local leaders, security elements, infrastructure, and reconstruction efforts</span></li><li class="jsx-2443493739" data-dcnode-id="1265" data-testid="ListItem"><span data-dcnode-id="1266" instrument_node="">The appeal of ISIS’s ideology almost certainly will endure, even if it appeals to a narrower audience</span></li><li class="jsx-2443493739" data-dcnode-id="1263" data-testid="ListItem"><span data-dcnode-id="1264" instrument_node="">The group will continue to use its media to encourage global supporters to conduct attacks without direction from ISIS leadership</span></li><li class="jsx-2443493739" data-dcnode-id="1261" data-testid="ListItem"><span data-dcnode-id="1262" instrument_node="">ISIS’s degraded media capabilities probably will hamper its ability to inspire its previous high pace of attacks and attract recruits and new supporters.</span></li></ul></div></div></div></div><div class="jsx-2725731731 jsx-2740958957 container partial-screen main" data-dcnode-id="1242"><div class="jsx-4067684299 pageable-item" data-dcnode-id="1243"><div class="jsx-340043825 media-panel" data-dcnode-id="1244"><figure class="jsx-1457788057 jsx-2266002647 media-wrapper fill-parent" data-dcnode-id="1245"><div class="jsx-1457788057 jsx-2266002647 media-wrapper-children fill-parent" data-dcnode-id="1251"><div class="jsx-1404383478 jsx-2332015599 parent" data-dcnode-id="1252"><div class="jsx-1404383478 jsx-2332015599 reparent-wrapper" data-dcnode-id="1253" role="button" tabindex="0"><div class="jsx-45237df65323a1d8 image-container fill-parent jsx-2856828968" data-blockid="n-VBKJKf" data-dcnode-id="1254"><img alt="The shrine of Zakr al-Deen in Shingal (Sinjar) is sacred to the Shia and was destroyed by the Islamic State." aria-label="The shrine of Zakr al-Deen in Shingal (Sinjar) is sacred to the Shia and was destroyed by the Islamic State." class="jsx-833037043 image jsx-3609982598 is-cropped hidden loading" data-dcnode-id="1255" height="4160" loading="lazy" width="6240"></div></div></div></div><span aria-label="Attribution" class="jsx-3941146293 icon-information jsx-1341031318" data-dcnode-id="1246"><button aria-expanded="false" class="jsx-3724131527 popover-target" data-dcnode-id="1247"><span class="jsx-204432553 icon jsx-1188032263" data-dcnode-id="1248"><svg class="jsx-204432553" data-dcnode-id="1249" viewBox="0 0 24 24"><path class="jsx-204432553" d="M12.5 7.5a1 1 0 1 1 1-1 1.002 1.002 0 0 1-1 1zM13 18V9h-2v1h1v8h-1v1h3v-1zm9.8-5.5A10.3 10.3 0 1 1 12.5 2.2a10.297 10.297 0 0 1 10.3 10.3zm-1 0a9.3 9.3 0 1 0-9.3 9.3 9.31 9.31 0 0 0 9.3-9.3z" data-dcnode-id="1250"></path></svg></span></button></span></figure></div></div></div><div class="jsx-1455454507 immersive-narrative-panel jsx-4118827883 docked bottom-spacing" data-dcnode-id="1204"><span class="jsx-3628064243 landmark" data-dcnode-id="1241"> 4"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="1125" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="1141" data-testid="ListItem"><span data-dcnode-id="1142" instrument_node="">.Racially or ethnically motivated threats</span></li><li class="jsx-2443493739" data-dcnode-id="1139" data-testid="ListItem"><span data-dcnode-id="1140" instrument_node="">Antigovernment or antiauthority threats</span></li><li class="jsx-2443493739" data-dcnode-id="1137" data-testid="ListItem"><span data-dcnode-id="1138" instrument_node="">Espouse an often overlapping mix of white supremacist, neo-Nazi, and exclusionary cultural-nationalist beliefs</span></li><li class="jsx-2443493739" data-dcnode-id="1135" data-testid="ListItem"><span data-dcnode-id="1136" instrument_node="">Transnational connections via often loose online communities to like-minded individuals and groups in the West</span></li><li class="jsx-2443493739" data-dcnode-id="1132" data-testid="ListItem"><strong data-dcnode-id="1133" data-testid="CustomText-Bold"><span data-dcnode-id="1134" instrument_node="">Threat has increased since 2015</span></strong></li><li class="jsx-2443493739" data-dcnode-id="1130" data-testid="ListItem"><span data-dcnode-id="1131" instrument_node="">Extremists often see themselves as part of a broader global movement, most attacks have been carried out by individuals or small, independent cells</span></li><li class="jsx-2443493739" data-dcnode-id="1128" data-testid="ListItem"><span data-dcnode-id="1129" instrument_node="">Violent extremists who promote the superiority of the white race have been responsible for at least 26 lethal attacks that killed more than 141 people and for dozens of disrupted plots in the West since 2015</span></li><li class="jsx-2443493739" data-dcnode-id="1126" data-testid="ListItem"><span data-dcnode-id="1127" instrument_node="">Australia, Germany, Norway, and the United Kingdom consider white racially or ethnically motivated violent extremists, including Neo-Nazi groups, to be the fastest growing terrorist threat they face.</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-JABt12" data-dcnode-id="1113" id="n-JABt12" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="1114"><div class="jsx-1588508986 text-viewer" data-dcnode-id="1115"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="1116" data-testid="Paragraph"><span class="jsx-2750261700" data-dcnode-id="1119" data-testid="CustomText-Color"><em data-dcnode-id="1120" data-testid="CustomText-Italic"><span data-dcnode-id="1121" instrument_node="">Additional Reading:</span></em></span><em data-dcnode-id="1117" data-testid="CustomText-Italic"><span data-dcnode-id="1118" instrument_node=""> </span></em></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-8Pdjp7" data-dcnode-id="1100" id="n-8Pdjp7" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="1101"><div class="jsx-1588508986 text-viewer" data-dcnode-id="1102"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="1103" data-testid="Paragraph"><a class="jsx-828965247 underlined" data-dcnode-id="1105" data-id="TH0XVE1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dhs.gov/sites/default/files/publications/2020_10_06_homeland-threat-assessment.pdf" rel="noreferrer noopener" target="_blank"><span class="jsx-1f24ab0bc0e7a45f" contenteditable="false" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">&nbsp;</span></span><span class="jsx-3520327608" data-dcnode-id="1108" data-testid="CustomText-Color"><em data-dcnode-id="1109" data-testid="CustomText-Italic"><span data-dcnode-id="1110" instrument_node="">Homeland Threat Assessment October 2020</span></em></span><span class="jsx-1f24ab0bc0e7a45f" contenteditable="false" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">&nbsp;</span></span></a><span data-dcno 050"><p class="jsx-731443379 jsx-4064512605 jsx-1682594651" data-dcnode-id="1051" data-testid="LargeParagraph"><span class="jsx-3520327608" data-dcnode-id="1052" data-testid="CustomText-Color"><span data-dcnode-id="1053" instrument_node="">Mexican Traffickers</span></span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-BqXZNi" data-dcnode-id="1036" id="n-BqXZNi" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="1037"><div class="jsx-1588508986 text-viewer" data-dcnode-id="1038"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="1039" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="1046" data-testid="ListItem"><span data-dcnode-id="1047" instrument_node="">Dominate the smuggling of cocaine, fentanyl, heroin, marijuana, and methamphetamine into the United States</span></li><li class="jsx-2443493739" data-dcnode-id="1044" data-testid="ListItem"><span data-dcnode-id="1045" instrument_node="">Produce heroin, marijuana, and methamphetamine in Mexico</span></li><li class="jsx-2443493739" data-dcnode-id="1042" data-testid="ListItem"><span data-dcnode-id="1043" instrument_node="">Obtain cocaine from South American suppliers</span></li><li class="jsx-2443493739" data-dcnode-id="1040" data-testid="ListItem"><span data-dcnode-id="1041" instrument_node="">Will make progress producing high-quality fentanyl through this year, using chemical precursors from Asia.</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-EawXcA" data-dcnode-id="1030" id="n-EawXcA" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="1031"><div class="jsx-1588508986 text-viewer" data-dcnode-id="1032"><p class="jsx-731443379 jsx-4064512605 jsx-1682594651" data-dcnode-id="1033" data-testid="LargeParagraph"><span class="jsx-3520327608" data-dcnode-id="1034" data-testid="CustomText-Color"><span data-dcnode-id="1035" instrument_node="">Drug Deaths</span></span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-16gtAI" data-dcnode-id="1020" id="n-16gtAI" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="1021"><div class="jsx-1588508986 text-viewer" data-dcnode-id="1022"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="1023" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="1028" data-testid="ListItem"><span data-dcnode-id="1029" instrument_node="">Total number of overdose deaths increased from 2018 to 2019</span></li><li class="jsx-2443493739" data-dcnode-id="1026" data-testid="ListItem"><span data-dcnode-id="1027" instrument_node="">Opioids—particularly fentanyl—are involved in more than half those deaths</span></li><li class="jsx-2443493739" data-dcnode-id="1024" data-testid="ListItem"><span data-dcnode-id="1025" instrument_node="">As of July 2020, total number of overdose deaths continue to rise</span></li></ul></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-66MVzh" data-dcnode-id="1014" id="n-66MVzh" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="1015"><div class="jsx-1588508986 text-viewer" data-dcnode-id="1016"><p class="jsx-731443379 jsx-4064512605 jsx-1682594651" data-dcnode-id="1017" data-testid="LargeParagraph"><span class="jsx-3520327608" data-dcnode-id="1018" data-testid="CustomText-Color"><span data-dcnode-id="1019" instrument_node="">Transnational Criminal Organizations</span></span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-BvVTdx" data-dcnode-id="1004" id="n-BvVTdx" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="1005"><div class="jsx-1588508986 text-viewer" data-dcnode-id="1006"><ul class="jsx-1964413819 bullet-list" data-dcnode-id="1007" data-testid="BulletList"><li class="jsx-2443493739" data-dcnode-id="1012" data-testid="ListItem"><span data-dcnode-id="1013" instrument_node="">Continue to employ cyber tools to steal from US and foreign businesses</span> e East</span></h3><p class="jsx-668558506 description" data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">The Middle East will remain a region characterized by pervasive conflicts: active insurgencies, persistent terrorism, protests, sparring between countries.</span></p></div></div></div><div aria-label="Iraq. Click to expand." class="jsx-1687558161 item" data-dcnode-id="897" role="button" tabindex="0"><div class="jsx-2250806927 grid-container jsx-4263004401 list-container" data-dcnode-id="898"><span class="jsx-46506650 landmark" data-dcnode-id="908"></span><div class="jsx-3980731591 grid-item" data-dcnode-id="904"><div class="jsx-1273901214 thumbnail-container" data-dcnode-id="905"><div class="jsx-1273901214 thumbnail jsx-454553c39f8d8679" data-dcnode-id="906"><img alt="builder.immersive.slidesPanel.slidePlaceholder" class="jsx-1033365006 image thumbnail jsx-454553c39f8d8679" data-dcnode-id="907" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.arcgis.com/sharing/rest/content/items/6262b5866d81480384e05d61be3e72ba/resources/JazFgYH5620WE_AGVWdLN.jpeg%3Fw%3D200&amp;raw"></div></div></div><div class="jsx-645475124 grid-item jsx-8c1b96077670e436 contents" data-dcnode-id="899"><h3 class="jsx-668558506 title" data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Iraq</span></h3><p class="jsx-668558506 description" data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">The Iraqi Government almost certainly will continue to struggle to fight ISIS and control Iranian-backed Shia militias.</span></p></div></div></div><div aria-label="Libya. Click to expand." class="jsx-1687558161 item" data-dcnode-id="885" role="button" tabindex="0"><div class="jsx-2250806927 grid-container jsx-4263004401 list-container" data-dcnode-id="886"><span class="jsx-46506650 landmark" data-dcnode-id="896"></span><div class="jsx-3980731591 grid-item" data-dcnode-id="892"><div class="jsx-1273901214 thumbnail-contai <span data-dcnode-id="879" instrument_node="">Syria</span></h3><p class="jsx-668558506 description" data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Conflict, economic decline, and humanitarian crises will plague Syria during the next few years, and threats to US forces will increase.</span></p></div></div></div><div aria-label="Asia. Click to expand." class="jsx-1687558161 item" data-dcnode-id="861" role="button" tabindex="0"><div class="jsx-2250806927 grid-container jsx-4263004401 list-container" data-dcnode-id="862"><span class="jsx-46506650 landmark" data-dcnode-id="872"></span><div class="jsx-3980731591 grid-item" data-dcnode-id="868"><div class="jsx-1273901214 thumbnail-container" data-dcnode-id="869"><div class="jsx-1273901214 thumbnail jsx-454553c39f8d8679" data-dcnode-id="870"><img alt="builder.immersive.slidesPanel.slidePlaceholder" class="jsx-1033365006 image thumbnail jsx-454553c39f8d8679" data-dcnode-id="871" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.arcgis.com/sharing/rest/content/items/6262b5866d81480384e05d61be3e72ba/resources/U7-8REoPoa_lOePuBA33W.jpeg%3Fw%3D200&amp;raw"></div></div></div><div class="jsx-645475124 grid-item jsx-8c1b96077670e436 contents" data-dcnode-id="863"><h3 class="jsx-668558506 title" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Asia</span></h3><p class="jsx-668558506 description" data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">The Burmese military’s February seizure of power, detention of State Counselor Aung San Suu Kyi, and declaration of a one-year state of emergency marked a break in that country’s democratic transition and ushered in new societal instability and widespread popular protests amidst COVID-19-related economic strains.</span></p></div></div></div><div aria-label="Latin America. Click to expand." class="jsx-1687558161 item" data-dcnode-id="849" role="button" tabindex="0"><div class="jsx-2250806927 grid sx-4064512605 jsx-1682594651" data-dcnode-id="802" data-testid="Paragraph"><span data-dcnode-id="803" instrument_node="">The Taliban is likely to make gains on the battlefield, and the Afghan Government will struggle to hold the Taliban at bay if the coalition withdraws support.</span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-ylgHKX" data-dcnode-id="794" id="n-ylgHKX" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="795"><div class="jsx-1588508986 text-viewer" data-dcnode-id="796"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="797" data-testid="Paragraph"><span data-dcnode-id="798" instrument_node="">Kabul continues to face setbacks on the battlefield, and the Taliban is confident it can achieve military victory.</span></p></div></div></div><div class="jsx-4096002737 layout-wrapper" data-blockid="n-eTgcIb" data-dcnode-id="789" id="n-eTgcIb" style=""><div class="jsx-601971424 grid-item-lite" data-dcnode-id="790"><div class="jsx-1588508986 text-viewer" data-dcnode-id="791"><p class="jsx-4273749082 jsx-4064512605 jsx-1682594651" data-dcnode-id="792" data-testid="Paragraph"><span data-dcnode-id="793" instrument_node="">Afghan forces continue to secure major cities and other government strongholds, but they remain tied down in defensive missions and have struggled to hold recaptured territory or reestablish a presence in areas abandoned in 2020.</span></p></div></div></div></div><button class="jsx-593719627 button text close-button jsx-3684798952" data-dcnode-id="786" type="button"><span data-dcnode-id="787" instrument_node="">Back to overview</span></button></div></div><div class="jsx-77204672 content-container" data-dcnode-id="712"><span class="jsx-3449029061 landmark" data-dcnode-id="783"></span><span class="jsx-77204672 sentinel" data-dcnode-id="782"></span><div class="jsx-77204672 media-wrapper" data-dcnode-id="758"><div class="jsx-1404383478 jsx-2332015599 parent" data-dcnode-id="759"
