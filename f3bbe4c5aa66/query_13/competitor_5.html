</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">The rapid pace of technological change is confronting national security professionals with an ever-changing array of potential threats beyond conventional military attacks and weapons systems. New civilian technologies such as drones, 3D printing, and artificial intelligence are already changing the battlefield and security space. Adapting to these new challenges requires an adaptive national security and defense apparatus which can recognize and respond to the new emerging technologies.</span></p><span data-dcnode-id="1385" instrument_node="">
