</span><main class="site-main" data-dcnode-id="253" id="main"><span data-dcnode-id="898" instrument_node="">
</span><article class="post-2940 post type-post status-publish format-standard has-post-thumbnail hentry category-blog infinite-scroll-item" data-dcnode-id="255" id="post-2940" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="897" instrument_node="">
</span><div class="inside-article" data-dcnode-id="257"><span data-dcnode-id="896" instrument_node="">
</span><header aria-label="Content" class="entry-header" data-dcnode-id="882"><span data-dcnode-id="895" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="893" itemprop="headline"><span data-dcnode-id="894" instrument_node="">Jobs Lost to Automation Statistics: Is Your Job on the List?</span></h1><span data-dcnode-id="892" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="884"><span data-dcnode-id="891" instrument_node="">
</span><span class="posted-on" data-dcnode-id="886"><time class="updated" data-dcnode-id="889" datetime="2022-04-02T19:34:12+00:00" itemprop="dateModified"><span data-dcnode-id="890" instrument_node="">April 2, 2022</span></time><time class="entry-date published" data-dcnode-id="887" datetime="2021-06-22T00:35:58+00:00" itemprop="datePublished"><span data-dcnode-id="888" instrument_node="">June 22, 2021</span></time></span><span data-dcnode-id="885" instrument_node=""> </span></div><span data-dcnode-id="883" instrument_node="">
</span></header><span data-dcnode-id="881" instrument_node="">
</span><div class="entry-content" data-dcnode-id="259" itemprop="text"><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">New machines in the 21st century can create a problem with unemployment, as the people that lost their jobs need to find another vocation. Jobs lost to automation statistics show that some jobs disappear entirely, while others are just being reshaped under new conditions.</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Researchers disagree on how automation will affect long-term employment. Some predict that the unemployment rate will rise, while others think the new technologies will bring new business opportunities and create jobs that didn’t exist before.</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Automation and artificial intelligence are making progress on a daily level. New machines and computer programs are making jobs faster and easier, and we will see the massive impact of automation on employment in the years to come. Millions of people have already lost jobs in the USA.</span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">So, what are predictions?</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Read on.</span></p><span data-dcnode-id="865" instrument_node="">
</span><section class="wp-block-uagb-section uagb-section__wrap uagb-section__background-undefined uagb-block-39f6b891 editors" data-dcnode-id="840"><div class="uagb-section__overlay" data-dcnode-id="864"></div><div class="uagb-section__inner-wrap" data-dcnode-id="841"><span data-dcnode-id="863" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Crucial Automation and Job Loss Statistics – Editor’s Choice</span></h2><span data-dcnode-id="860" instrument_node="">
</span><ul data-dcnode-id="843"><li data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">One-fourth of jobs in the US are in danger of automation</span></li><li data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">The number of robots doing human jobs increases by 14% each year</span></li><li data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Workers at junior positions face the biggest threat of automation</span></li><li data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">By 2030, artificial intelligence is expected to add $15 trillion to the world economy</span></li><li data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">55% of the jobs that don’t require a bachelor’s degree are in jeopardy of automation</span></li><li data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">One-third of jobs could no longer exist in the next 25 years</span></li><li data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">55% of workers think automation will boost their productivity</span></li><li data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Storage, manufacturing, and transportation are facing the biggest chance to be fully automated</span></li></ul><span data-dcnode-id="842" instrument_node="">
</span></div></section><span data-dcnode-id="839" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="838" style="height:50px"></div><span data-dcnode-id="837" instrument_node="">
</span><h4 data-dcnode-id="834"><strong data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">1. Over 25% of Americans feel threatened by automation.</span></strong></h4><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Most Americans say they feel threatened by new technologies. Research shows that 35% of all jobs could become obsolete by 2030. Speaking in numbers, 57 million employees might face job loss.</span></p><span data-dcnode-id="830" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="819"><figure class="aligncenter size-full" data-dcnode-id="820"><picture class="wp-image-10667" data-dcnode-id="824"><span data-dcnode-id="829" instrument_node="">
</span><source data-dcnode-id="828" data-lazy-srcset="https://whattobecome.com/wp-content/uploads/2022/04/1-Threat-of-Job-Loss-Due-to-Automation.jpg.webp" srcset="https://whattobecome.com/wp-content/uploads/2022/04/1-Threat-of-Job-Loss-Due-to-Automation.jpg.webp" type="image/webp"><span data-dcnode-id="827" instrument_node="">
</span><img alt="" class="entered lazyloaded" data-dcnode-id="826" data-lazy-src="https://whattobecome.com/wp-content/uploads/2022/04/1-Threat-of-Job-Loss-Due-to-Automation.jpg" data-ll-status="loaded" height="440" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whattobecome.com/wp-content/uploads/2022/04/1-Threat-of-Job-Loss-Due-to-Automation.jpg&amp;raw" width="768"><span data-dcnode-id="825" instrument_node="">
</span></picture><span data-dcnode-id="823" instrument_node="">
</span><noscript data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">&lt;picture class="wp-image-10667"&gt;
&lt;source type="image/webp" srcset="https://whattobecome.com/wp-content/uploads/2022/04/1-Threat-of-Job-Loss-Due-to-Automation.jpg.webp"/&gt;
&lt;img width="768" height="440" src="https://whattobecome.com/wp-content/uploads/2022/04/1-Threat-of-Job-Loss-Due-to-Automation.jpg" alt=""/&gt;
&lt;/picture&gt;
</span></noscript></figure></div><span data-dcnode-id="818" instrument_node="">
</span><h4 data-dcnode-id="815"><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">2. Almost 40% of people fear losing their jobs because of mechanization.</span></strong></h4><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Automation and job loss statistics show that people are more and more concerned about losing their jobs to automation or robots. The number of worried workers has increased by 4% since 2014.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">People think that every business is at risk, not just the jobs that don’t require education. However, the majority of them also think robotics and automation could never replace a human being.</span></p><span data-dcnode-id="808" instrument_node="">
</span><h4 data-dcnode-id="805"><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">3. Every year, 14% more robots start performing some human jobs.</span></strong></h4><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">When talking about jobs lost due to technology, we can’t ignore the increased utilization of robots in almost every industry. New discoveries speed up this course, and the predictions are that the number of robots will go up even faster.</span></p><span data-dcnode-id="801" instrument_node="">
</span><h4 data-dcnode-id="798"><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">4. More than half of employees think the primary goal of automation is productivity growth.</span></strong></h4><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">When it comes to automation and jobs, almost 60% of workers think that automation will help them be more productive. Also, analysis shows that business owners want automation to improve their employees’ productivity, reduce risks, and avoid mistakes. Only 11% of employers want to use new inventions to replace human employees.</span></p><span data-dcnode-id="794" instrument_node="">
</span><h4 data-dcnode-id="791"><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">5. 70% of employees would work on themselves to upgrade their professional skills.</span></strong></h4><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Data on jobs at risk of automation reveal that people consider improving their skills just to retain their jobs. 70% of people are willing to do whatever it takes to stay as competitive as robots.</span></p><span data-dcnode-id="787" instrument_node="">
</span><h4 data-dcnode-id="784"><strong data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">6. 55% of workers will need upskilling or reskilling to keep their jobs.</span></strong></h4><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="782" instrument_node="">Technological improvements don’t only affect automation and job loss, but also people. More than half of workers will have to gain new skills, and almost 35% will have to take courses. Many will have to significantly </span><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jofibo.com/blog/interpersonal-skills" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="781" instrument_node="">improve their skills</span></a><span data-dcnode-id="779" instrument_node=""> to retain jobs.</span></p><span data-dcnode-id="777" instrument_node="">
</span><h4 data-dcnode-id="774"><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">7. Three industries are facing the chance to be fully automated – storage, transportation, and manufacturing.</span></strong></h4><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">No one can precisely tell how many jobs will be lost to automation, but research from 2017 suggests three waves of automation will influence various industries. Some industries are at greater risk than others. For example, one of the waves will be the period when improved computer programs outperform people in data analysis.</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">The augmentation and the independence rush will hit industries such as storage and transportation, and the same thing will happen to manufacturers. The construction industry is one of the jobs at risk of automation, as well.</span></p><span data-dcnode-id="767" instrument_node="">
</span><h4 data-dcnode-id="764"><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">8. AI will most likely add $15 trillion to the world economy by 2030.</span></strong></h4><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">The GDP growth is predicted to be vast. It will increase by 25% in China and 14% in North America. A big part of the profits will come from product improvements, and automation will increase the affordability and attractiveness of the product, as AI replacing jobs statistics show.</span></p><span data-dcnode-id="760" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="749"><figure class="aligncenter size-full" data-dcnode-id="750"><picture class="wp-image-10668" data-dcnode-id="754"><span data-dcnode-id="759" instrument_node="">
</span><source data-dcnode-id="758" data-lazy-srcset="https://whattobecome.com/wp-content/uploads/2022/04/8-Potential-Boost-to-Global-GDP-From-AI-by-2030.jpg.webp" srcset="https://whattobecome.com/wp-content/uploads/2022/04/8-Potential-Boost-to-Global-GDP-From-AI-by-2030.jpg.webp" type="image/webp"><span data-dcnode-id="757" instrument_node="">
</span><img alt="" class="entered lazyloaded" data-dcnode-id="756" data-lazy-src="https://whattobecome.com/wp-content/uploads/2022/04/8-Potential-Boost-to-Global-GDP-From-AI-by-2030.jpg" data-ll-status="loaded" height="638" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whattobecome.com/wp-content/uploads/2022/04/8-Potential-Boost-to-Global-GDP-From-AI-by-2030.jpg&amp;raw" width="768"><span data-dcnode-id="755" instrument_node="">
</span></picture><span data-dcnode-id="753" instrument_node="">
</span><noscript data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">&lt;picture class="wp-image-10668"&gt;
&lt;source type="image/webp" srcset="https://whattobecome.com/wp-content/uploads/2022/04/8-Potential-Boost-to-Global-GDP-From-AI-by-2030.jpg.webp"/&gt;
&lt;img width="768" height="638" src="https://whattobecome.com/wp-content/uploads/2022/04/8-Potential-Boost-to-Global-GDP-From-AI-by-2030.jpg" alt=""/&gt;
&lt;/picture&gt;
</span></noscript></figure></div><span data-dcnode-id="748" instrument_node="">
</span><h4 data-dcnode-id="745"><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">9. 55% of vocations that don’t require a college degree could easily be automated.</span></strong></h4><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Administration jobs and manufacturing will proceed to be at the greatest risk of mechanization in the next few years. All the positions that don’t require a college degree are at high risk, as well.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Robots will do one-fourth of these jobs. Also, almost 80% of food preparation jobs could be automated. Jobs lost to automation statistics say these jobs are in sharp contrast to careers such as psychology or education.</span></p><span data-dcnode-id="738" instrument_node="">
</span><h4 data-dcnode-id="735"><strong data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">10. Rural parts of Europe and America are at a high risk of job loss. Alabama and Arkansas show the potential risk could be higher than 65%.</span></strong></h4><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Big cities on the east and west coast of the US are booming because the IT sector is located there. Automation and artificial intelligence will most likely bring new job opportunities for the people in these areas.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">At the same time, states in the heart of the US will face the risk of job loss due to automation because people in rural areas won’t be able to find a new vocation as easily. On top of that, they mostly work in industries like transportation and agriculture.</span></p><span data-dcnode-id="728" instrument_node="">
</span><h4 data-dcnode-id="725"><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">11. By 2022, jobs done by humans could drop by more than 10%.</span></strong></h4><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="723" instrument_node="">Nowadays, people do 70% of all tasks, while robots do the rest. If these unfavorable&nbsp;</span><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whattobecome.com/blog/unemployment-trends/%3Fswcfpc%3D1"><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">unemployment trends</span></strong></a><span data-dcnode-id="719" instrument_node="">&nbsp;continue, predictions are that humans will be doing less than 60% of the work in the future.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Automation replacing jobs will be evident, especially in information technology. What’s more, it will take one share of communicating and coordinating.</span></p><span data-dcnode-id="714" instrument_node="">
</span><h4 data-dcnode-id="711"><strong data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">12. 17% of the jobs held by women and 24% of jobs held by men are in danger of automation.</span></strong></h4><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">This gap is so great because more men work in production, manufacturing, or transportation. Men dominate industries such as building and installation, and they are at the highest automation risk level. Most women work in professions that are at low risk of automation.</span></p><span data-dcnode-id="707" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="696"><figure class="aligncenter size-full" data-dcnode-id="697"><picture class="wp-image-10670" data-dcnode-id="701"><span data-dcnode-id="706" instrument_node="">
</span><source data-dcnode-id="705" data-lazy-srcset="https://whattobecome.com/wp-content/uploads/2022/04/12-Danger-of-Automation-by-Gender.jpg.webp" srcset="https://whattobecome.com/wp-content/uploads/2022/04/12-Danger-of-Automation-by-Gender.jpg.webp" type="image/webp"><span data-dcnode-id="704" instrument_node="">
</span><img alt="" class="entered lazyloaded" data-dcnode-id="703" data-lazy-src="https://whattobecome.com/wp-content/uploads/2022/04/12-Danger-of-Automation-by-Gender.jpg" data-ll-status="loaded" height="369" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whattobecome.com/wp-content/uploads/2022/04/12-Danger-of-Automation-by-Gender.jpg&amp;raw" width="768"><span data-dcnode-id="702" instrument_node="">
</span></picture><span data-dcnode-id="700" instrument_node="">
</span><noscript data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">&lt;picture class="wp-image-10670"&gt;
&lt;source type="image/webp" srcset="https://whattobecome.com/wp-content/uploads/2022/04/12-Danger-of-Automation-by-Gender.jpg.webp"/&gt;
&lt;img width="768" height="369" src="https://whattobecome.com/wp-content/uploads/2022/04/12-Danger-of-Automation-by-Gender.jpg" alt=""/&gt;
&lt;/picture&gt;
</span></noscript></figure></div><span data-dcnode-id="695" instrument_node="">
</span><h4 data-dcnode-id="692"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">13. Workers aged 18 to 25 are at a 50% automation risk.</span></strong></h4><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Junior positions are the easiest to be replaced. Older workers (up to 54 years of age) face a 40% automation risk. Younger workers perform highly repetitive tasks. They often work in the food service and preparation industry, which is highly rated by the jobs automation risk calculator.</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Young workers make up 10% of America’s workforce, but they hold 30% of food prep and service jobs, and robots can easily replace them.</span></p><span data-dcnode-id="685" instrument_node="">
</span><h4 data-dcnode-id="682"><strong data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">14. One-third of current jobs didn’t exist 30 years ago.</span></strong></h4><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Automation doesn’t always entail job loss or low productivity of human workers. Sometimes, it leads to automation job displacement. Workers also tend to think that automation will bring them new job opportunities and higher salaries.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Employees are willing to learn new programs and acquire new skills if that means they will find a new job easily. On the other hand, economists think modern automation is different and that its main goal is to displace rather than improve humans’ work. That means there will be more jobs lost to automation by 2030.</span></p><span data-dcnode-id="675" instrument_node="">
</span><h4 data-dcnode-id="672"><strong data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">15. Robots could take over 20 million jobs in the next decade.</span></strong></h4><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Each robot can do what 1.6 human workers can. That means that millions of employees could be replaced in the next ten years. Regions that are marked as low-income areas will experience a greater impact of automation than high-income regions.</span></p><span data-dcnode-id="668" instrument_node="">
</span><h4 data-dcnode-id="665"><strong data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">16. Purchases of medical robots increase by 50% every year.</span></strong></h4><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">By 2050, the need for investment in healthcare will increase. Robots that work in medical services are now worth $2 billion.</span></p><span data-dcnode-id="661" instrument_node="">
</span><h4 data-dcnode-id="658"><strong data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">17. Automation can boost global GDP by 1.5% every year.</span></strong></h4><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Although jobs lost to automation statistics show that many workers could lose their jobs, it can positively influence the global GDP. However, employees who lose their job would need to be employed again to sustain long-term economic growth.</span></p><span data-dcnode-id="654" instrument_node="">
</span><h4 data-dcnode-id="651"><strong data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">18. Seven million people in America lost their jobs in the last 15 years due to automation.</span></strong></h4><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">When automation started influencing production, citizens gained access to cheaper products, while large workforce sectors were left jobless. Once they can find new jobs, they face a reduction in wages of up to 30%, automation and job loss statistics show.</span></p><span data-dcnode-id="647" instrument_node="">
</span><h4 data-dcnode-id="644"><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">19. Two-thirds of workers think automation will bring them better jobs.</span></strong></h4><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">The International Federation of Robotics found that, even though the number of jobs lost by automation keeps rising, people are still very optimistic about the benefits it could bring. The survey found out that workers that are at the greatest risk hope to get better employment.</span></p><span data-dcnode-id="640" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Jobs Lost to Automation Statistics — Conclusion</span></h3><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Automation is one of the most powerful forces that have been changing and reshaping the modern world. Every similar change has brought great disturbances to how the market works and the sort of businesses that people do.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Artificial intelligence and robotics will eliminate some jobs and create a better work environment for everyone. People will be educated in fields such as computing and design. Robots will take over manual labor, and people will do jobs that require more critical thinking and planning.</span></p><span data-dcnode-id="631" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Frequently Asked Questions (FAQ)</span></h3><span data-dcnode-id="628" instrument_node="">
</span><div class="wp-block-uagb-faq uagb-faq__outer-wrap uagb-block-f9d89f2f uagb-faq-icon-row uagb-faq-layout-accordion uagb-faq-expand-first-false uagb-faq-inactive-other-true uagb-faq-equal-height" data-dcnode-id="263" data-faqtoggle="true" role="tablist"><div class="uagb-faq__wrap uagb-buttons-layout-wrap" data-dcnode-id="264"><span data-dcnode-id="627" instrument_node="">
</span><div class="wp-block-uagb-faq-child uagb-faq-child__outer-wrap uagb-block-f104e80d" data-dcnode-id="608"><div class="uagb-faq-child__wrapper" data-dcnode-id="609"><div class="uagb-faq-item" data-dcnode-id="610" role="tab" tabindex="0"><div class="uagb-faq-questions-button uagb-faq-questions" data-dcnode-id="618"><span class="uagb-icon uagb-faq-icon-wrap" data-dcnode-id="624"><svg data-dcnode-id="625" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm144 276c0 6.6-5.4 12-12 12h-92v92c0 6.6-5.4 12-12 12h-56c-6.6 0-12-5.4-12-12v-92h-92c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h92v-92c0-6.6 5.4-12 12-12h56c6.6 0 12 5.4 12 12v92h92c6.6 0 12 5.4 12 12v56z" data-dcnode-id="626"></path></svg></span><span class="uagb-icon-active uagb-faq-icon-wrap" data-dcnode-id="621"><svg data-dcnode-id="622" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zM124 296c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h264c6.6 0 12 5.4 12 12v56c0 6.6-5.4 12-12 12H124z" data-dcnode-id="623"></path></svg></span><span class="uagb-question" data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">What is job automation?</span></span></div><div class="uagb-faq-content" data-dcnode-id="611"><span data-dcnode-id="612"><p data-dcnode-id="613"><span data-dcnode-id="617" instrument_node="">Automation is the use of computer-controlled devices or electronics to control the work process. It is very significant when it comes to the working environment because it controls and fastens the processes. In most cases, automation can replace labor.</span><br data-dcnode-id="616"><br data-dcnode-id="615"><span data-dcnode-id="614" instrument_node="">For example, when it comes to planting seeds, machines will do that more precisely than humans ever could – and much faster. Automation is essential in transportation, manufacturing, and facility operations. Job automation nowadays exists in all industries, even in sales and marketing.</span></p></span></div></div></div></div><span data-dcnode-id="607" instrument_node="">
</span><div class="wp-block-uagb-faq-child uagb-faq-child__outer-wrap uagb-block-2772f448" data-dcnode-id="588"><div class="uagb-faq-child__wrapper" data-dcnode-id="589"><div class="uagb-faq-item" data-dcnode-id="590" role="tab" tabindex="0"><div class="uagb-faq-questions-button uagb-faq-questions" data-dcnode-id="598"><span class="uagb-icon uagb-faq-icon-wrap" data-dcnode-id="604"><svg data-dcnode-id="605" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm144 276c0 6.6-5.4 12-12 12h-92v92c0 6.6-5.4 12-12 12h-56c-6.6 0-12-5.4-12-12v-92h-92c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h92v-92c0-6.6 5.4-12 12-12h56c6.6 0 12 5.4 12 12v92h92c6.6 0 12 5.4 12 12v56z" data-dcnode-id="606"></path></svg></span><span class="uagb-icon-active uagb-faq-icon-wrap" data-dcnode-id="601"><svg data-dcnode-id="602" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zM124 296c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h264c6.6 0 12 5.4 12 12v56c0 6.6-5.4 12-12 12H124z" data-dcnode-id="603"></path></svg></span><span class="uagb-question" data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">What percentage of jobs have been lost to automation?</span></span></div><div class="uagb-faq-content" data-dcnode-id="591"><span data-dcnode-id="592"><p data-dcnode-id="593"><span data-dcnode-id="597" instrument_node="">In the last 15 years, 2% of people in the US have lost their jobs due to automation. This figure might look small, but in real numbers, it is around 7 million people.</span><br data-dcnode-id="596"><br data-dcnode-id="595"><span data-dcnode-id="594" instrument_node="">Pessimists think that only people who specialize in positions that can’t be automated will have jobs in the near future. They say that artists and musicians are safe for now. Workers without a college degree are facing the biggest danger of automation.</span></p></span></div></div></div></div><span data-dcnode-id="587" instrument_node="">
</span><div class="wp-block-uagb-faq-child uagb-faq-child__outer-wrap uagb-block-08cf4e0d" data-dcnode-id="568"><div class="uagb-faq-child__wrapper" data-dcnode-id="569"><div class="uagb-faq-item" data-dcnode-id="570" role="tab" tabindex="0"><div class="uagb-faq-questions-button uagb-faq-questions" data-dcnode-id="578"><span class="uagb-icon uagb-faq-icon-wrap" data-dcnode-id="584"><svg data-dcnode-id="585" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm144 276c0 6.6-5.4 12-12 12h-92v92c0 6.6-5.4 12-12 12h-56c-6.6 0-12-5.4-12-12v-92h-92c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h92v-92c0-6.6 5.4-12 12-12h56c6.6 0 12 5.4 12 12v92h92c6.6 0 12 5.4 12 12v56z" data-dcnode-id="586"></path></svg></span><span class="uagb-icon-active uagb-faq-icon-wrap" data-dcnode-id="581"><svg data-dcnode-id="582" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zM124 296c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h264c6.6 0 12 5.4 12 12v56c0 6.6-5.4 12-12 12H124z" data-dcnode-id="583"></path></svg></span><span class="uagb-question" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">What jobs are at risk of being lost to robots?</span></span></div><div class="uagb-faq-content" data-dcnode-id="571"><span data-dcnode-id="572"><p data-dcnode-id="573"><span data-dcnode-id="577" instrument_node="">Research shows that 25% of the workforce is endangered by job automation. Low-wage earners and men are more prone to this problem than some other groups. Robots could easily do food preparation, administration, and transportation. </span><br data-dcnode-id="576"><br data-dcnode-id="575"><span data-dcnode-id="574" instrument_node="">Creative and executive jobs will still exist, and so will domestic service jobs and personal care. In other words, all the jobs that need some interpersonal skills and emotions will continue to be around.</span></p></span></div></div></div></div><span data-dcnode-id="567" instrument_node="">
</span><div class="wp-block-uagb-faq-child uagb-faq-child__outer-wrap uagb-block-8ae287c9" data-dcnode-id="531"><div class="uagb-faq-child__wrapper" data-dcnode-id="532"><div class="uagb-faq-item" data-dcnode-id="533" role="tab" tabindex="0"><div class="uagb-faq-questions-button uagb-faq-questions" data-dcnode-id="558"><span class="uagb-icon uagb-faq-icon-wrap" data-dcnode-id="564"><svg data-dcnode-id="565" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm144 276c0 6.6-5.4 12-12 12h-92v92c0 6.6-5.4 12-12 12h-56c-6.6 0-12-5.4-12-12v-92h-92c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h92v-92c0-6.6 5.4-12 12-12h56c6.6 0 12 5.4 12 12v92h92c6.6 0 12 5.4 12 12v56z" data-dcnode-id="566"></path></svg></span><span class="uagb-icon-active uagb-faq-icon-wrap" data-dcnode-id="561"><svg data-dcnode-id="562" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zM124 296c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h264c6.6 0 12 5.4 12 12v56c0 6.6-5.4 12-12 12H124z" data-dcnode-id="563"></path></svg></span><span class="uagb-question" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">What jobs will be automated by 2030?</span></span></div><div class="uagb-faq-content" data-dcnode-id="534"><span data-dcnode-id="535"><p data-dcnode-id="536"><span data-dcnode-id="557" instrument_node="">People’s labor is no longer needed in some professions. Some jobs are more easily automated than others, and researchers think some vocations will cease to exist by 2030. They are:</span><br data-dcnode-id="556"><br data-dcnode-id="555"><span data-dcnode-id="554" instrument_node="">– Insurance officers</span><br data-dcnode-id="553"><span data-dcnode-id="552" instrument_node="">– Manufacturing vocations</span><br data-dcnode-id="551"><span data-dcnode-id="550" instrument_node="">– Customer service</span><br data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">– Research and data entry</span><br data-dcnode-id="547"><span data-dcnode-id="546" instrument_node="">– Production line jobs</span><br data-dcnode-id="545"><span data-dcnode-id="544" instrument_node="">– TV advertising</span><br data-dcnode-id="543"><span data-dcnode-id="542" instrument_node="">– Fast food jobs</span><br data-dcnode-id="541"><span data-dcnode-id="540" instrument_node="">– Delivery services</span><br data-dcnode-id="539"><br data-dcnode-id="538"><span data-dcnode-id="537" instrument_node="">Some researchers say that any job that can be learned will stop existing.</span></p></span></div></div></div></div><span data-dcnode-id="530" instrument_node="">
</span><div class="wp-block-uagb-faq-child uagb-faq-child__outer-wrap uagb-block-2fd1411e" data-dcnode-id="482"><div class="uagb-faq-child__wrapper" data-dcnode-id="483"><div class="uagb-faq-item" data-dcnode-id="484" role="tab" tabindex="0"><div class="uagb-faq-questions-button uagb-faq-questions" data-dcnode-id="521"><span class="uagb-icon uagb-faq-icon-wrap" data-dcnode-id="527"><svg data-dcnode-id="528" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm144 276c0 6.6-5.4 12-12 12h-92v92c0 6.6-5.4 12-12 12h-56c-6.6 0-12-5.4-12-12v-92h-92c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h92v-92c0-6.6 5.4-12 12-12h56c6.6 0 12 5.4 12 12v92h92c6.6 0 12 5.4 12 12v56z" data-dcnode-id="529"></path></svg></span><span class="uagb-icon-active uagb-faq-icon-wrap" data-dcnode-id="524"><svg data-dcnode-id="525" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zM124 296c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h264c6.6 0 12 5.4 12 12v56c0 6.6-5.4 12-12 12H124z" data-dcnode-id="526"></path></svg></span><span class="uagb-question" data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">What jobs are least likely to be automated?</span></span></div><div class="uagb-faq-content" data-dcnode-id="485"><span data-dcnode-id="486"><p data-dcnode-id="487"><span data-dcnode-id="520" instrument_node="">Some research says that certain professions have less than a 1% chance of being automated. Here they are:</span><br data-dcnode-id="519"><br data-dcnode-id="518"><span data-dcnode-id="517" instrument_node="">– Physical therapist</span><br data-dcnode-id="516"><span data-dcnode-id="515" instrument_node="">– Installers and repairers</span><br data-dcnode-id="514"><span data-dcnode-id="513" instrument_node="">– Audiologist</span><br data-dcnode-id="512"><span data-dcnode-id="511" instrument_node="">– Emergency management directors</span><br data-dcnode-id="510"><span data-dcnode-id="509" instrument_node="">– Healthcare workers</span><br data-dcnode-id="508"><span data-dcnode-id="507" instrument_node="">– Surgeons</span><br data-dcnode-id="506"><span data-dcnode-id="505" instrument_node="">– Sales engineers</span><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node="">– Nutritionists</span><br data-dcnode-id="502"><span data-dcnode-id="501" instrument_node="">– Police officers</span><br data-dcnode-id="500"><span data-dcnode-id="499" instrument_node="">– Dentists</span><br data-dcnode-id="498"><span data-dcnode-id="497" instrument_node="">– Teachers</span><br data-dcnode-id="496"><span data-dcnode-id="495" instrument_node="">– Professors</span><br data-dcnode-id="494"><span data-dcnode-id="493" instrument_node="">– Psychologists</span><br data-dcnode-id="492"><span data-dcnode-id="491" instrument_node="">– Detectives</span><br data-dcnode-id="490"><br data-dcnode-id="489"><span data-dcnode-id="488" instrument_node="">Jobs that don’t involve repetitive tasks will continue to exist because machines still don’t know how to treat toothaches or stomachaches. They still can’t make big corporate decisions.</span></p></span></div></div></div></div><span data-dcnode-id="481" instrument_node="">
</span><div class="wp-block-uagb-faq-child uagb-faq-child__outer-wrap uagb-block-bed5ca31" data-dcnode-id="462"><div class="uagb-faq-child__wrapper" data-dcnode-id="463"><div class="uagb-faq-item" data-dcnode-id="464" role="tab" tabindex="0"><div class="uagb-faq-questions-button uagb-faq-questions" data-dcnode-id="472"><span class="uagb-icon uagb-faq-icon-wrap" data-dcnode-id="478"><svg data-dcnode-id="479" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm144 276c0 6.6-5.4 12-12 12h-92v92c0 6.6-5.4 12-12 12h-56c-6.6 0-12-5.4-12-12v-92h-92c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h92v-92c0-6.6 5.4-12 12-12h56c6.6 0 12 5.4 12 12v92h92c6.6 0 12 5.4 12 12v56z" data-dcnode-id="480"></path></svg></span><span class="uagb-icon-active uagb-faq-icon-wrap" data-dcnode-id="475"><svg data-dcnode-id="476" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zM124 296c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h264c6.6 0 12 5.4 12 12v56c0 6.6-5.4 12-12 12H124z" data-dcnode-id="477"></path></svg></span><span class="uagb-question" data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">What jobs are at risk of automation?</span></span></div><div class="uagb-faq-content" data-dcnode-id="465"><span data-dcnode-id="466"><p data-dcnode-id="467"><span data-dcnode-id="471" instrument_node="">Research by McKinsey &amp; Company found that one in three jobs we know today could be automated. The same study says that 5% of jobs could completely disappear or be done by robots or computers.</span><br data-dcnode-id="470"><br data-dcnode-id="469"><span data-dcnode-id="468" instrument_node="">We are talking about vocations such as food delivery, construction, office administration, manufacturing, retail, data entry keyers, library technicians, and telemarketers. Even medicine could be changed by artificial intelligence. But for now, human lives are still in human hands.</span></p></span></div></div></div></div><span data-dcnode-id="461" instrument_node="">
</span><div class="wp-block-uagb-faq-child uagb-faq-child__outer-wrap uagb-block-676329fb" data-dcnode-id="442"><div class="uagb-faq-child__wrapper" data-dcnode-id="443"><div class="uagb-faq-item" data-dcnode-id="444" role="tab" tabindex="0"><div class="uagb-faq-questions-button uagb-faq-questions" data-dcnode-id="452"><span class="uagb-icon uagb-faq-icon-wrap" data-dcnode-id="458"><svg data-dcnode-id="459" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm144 276c0 6.6-5.4 12-12 12h-92v92c0 6.6-5.4 12-12 12h-56c-6.6 0-12-5.4-12-12v-92h-92c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h92v-92c0-6.6 5.4-12 12-12h56c6.6 0 12 5.4 12 12v92h92c6.6 0 12 5.4 12 12v56z" data-dcnode-id="460"></path></svg></span><span class="uagb-icon-active uagb-faq-icon-wrap" data-dcnode-id="455"><svg data-dcnode-id="456" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zM124 296c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h264c6.6 0 12 5.4 12 12v56c0 6.6-5.4 12-12 12H124z" data-dcnode-id="457"></path></svg></span><span class="uagb-question" data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Does automation create more jobs?</span></span></div><div class="uagb-faq-content" data-dcnode-id="445"><span data-dcnode-id="446"><p data-dcnode-id="447"><span data-dcnode-id="451" instrument_node="">Automation doesn’t necessarily mean job loss for millions of people. It could also be a great job opportunity. A report from the MansPower Group predicts that some jobs that robots won’t be able to do will be invented to do what robots can’t.</span><br data-dcnode-id="450"><br data-dcnode-id="449"><span data-dcnode-id="448" instrument_node="">In some manufacturing companies, owners already teach their employees how to do new jobs because manufacturing is one of the sectors that will most probably disappear. That’s why business owners want to give their workers proper education – to prepare when the switch comes.</span></p></span></div></div></div></div><span data-dcnode-id="441" instrument_node="">
</span><div class="wp-block-uagb-faq-child uagb-faq-child__outer-wrap uagb-block-7996586a" data-dcnode-id="422"><div class="uagb-faq-child__wrapper" data-dcnode-id="423"><div class="uagb-faq-item" data-dcnode-id="424" role="tab" tabindex="0"><div class="uagb-faq-questions-button uagb-faq-questions" data-dcnode-id="432"><span class="uagb-icon uagb-faq-icon-wrap" data-dcnode-id="438"><svg data-dcnode-id="439" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm144 276c0 6.6-5.4 12-12 12h-92v92c0 6.6-5.4 12-12 12h-56c-6.6 0-12-5.4-12-12v-92h-92c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h92v-92c0-6.6 5.4-12 12-12h56c6.6 0 12 5.4 12 12v92h92c6.6 0 12 5.4 12 12v56z" data-dcnode-id="440"></path></svg></span><span class="uagb-icon-active uagb-faq-icon-wrap" data-dcnode-id="435"><svg data-dcnode-id="436" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zM124 296c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h264c6.6 0 12 5.4 12 12v56c0 6.6-5.4 12-12 12H124z" data-dcnode-id="437"></path></svg></span><span class="uagb-question" data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">What percentage of jobs are automated?</span></span></div><div class="uagb-faq-content" data-dcnode-id="425"><span data-dcnode-id="426"><p data-dcnode-id="427"><span data-dcnode-id="431" instrument_node="">According to estimates, 47% of jobs will be automated shortly. For now, this number is smaller – 2% of jobs have been fully automated. Some are switchboard operators, bowling alley pinsetters, elevator operators, film projectionists, knocker-uppers, check-out cashiers, and railway station ticket sellers.</span><br data-dcnode-id="430"><br data-dcnode-id="429"><span data-dcnode-id="428" instrument_node="">Some jobs are being partially automated but still need humans to direct the machines, so we can’t say that people lost their jobs to automation – their jobs just changed.</span></p></span></div></div></div></div><span data-dcnode-id="421" instrument_node="">
</span><div class="wp-block-uagb-faq-child uagb-faq-child__outer-wrap uagb-block-63e915cc" data-dcnode-id="402"><div class="uagb-faq-child__wrapper" data-dcnode-id="403"><div class="uagb-faq-item" data-dcnode-id="404" role="tab" tabindex="0"><div class="uagb-faq-questions-button uagb-faq-questions" data-dcnode-id="412"><span class="uagb-icon uagb-faq-icon-wrap" data-dcnode-id="418"><svg data-dcnode-id="419" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm144 276c0 6.6-5.4 12-12 12h-92v92c0 6.6-5.4 12-12 12h-56c-6.6 0-12-5.4-12-12v-92h-92c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h92v-92c0-6.6 5.4-12 12-12h56c6.6 0 12 5.4 12 12v92h92c6.6 0 12 5.4 12 12v56z" data-dcnode-id="420"></path></svg></span><span class="uagb-icon-active uagb-faq-icon-wrap" data-dcnode-id="415"><svg data-dcnode-id="416" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zM124 296c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h264c6.6 0 12 5.4 12 12v56c0 6.6-5.4 12-12 12H124z" data-dcnode-id="417"></path></svg></span><span class="uagb-question" data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Is accounting at risk of automation?</span></span></div><div class="uagb-faq-content" data-dcnode-id="405"><span data-dcnode-id="406"><p data-dcnode-id="407"><span data-dcnode-id="411" instrument_node="">Machines can complete all repetitive tasks much faster than humans. What’s more, they can learn new information and improve their performance. Machines can already do audits, taxes, and payroll.</span><br data-dcnode-id="410"><br data-dcnode-id="409"><span data-dcnode-id="408" instrument_node="">These processes are now much faster, so many accountants are worried about the billable hours and whether their services will be required. Even though automation is changing accounting, artificial intelligence will still need human guidance.</span></p></span></div></div></div></div><span data-dcnode-id="401" instrument_node="">
</span><div class="wp-block-uagb-faq-child uagb-faq-child__outer-wrap uagb-block-36a8421e" data-dcnode-id="385"><div class="uagb-faq-child__wrapper" data-dcnode-id="386"><div class="uagb-faq-item" data-dcnode-id="387" role="tab" tabindex="0"><div class="uagb-faq-questions-button uagb-faq-questions" data-dcnode-id="392"><span class="uagb-icon uagb-faq-icon-wrap" data-dcnode-id="398"><svg data-dcnode-id="399" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm144 276c0 6.6-5.4 12-12 12h-92v92c0 6.6-5.4 12-12 12h-56c-6.6 0-12-5.4-12-12v-92h-92c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h92v-92c0-6.6 5.4-12 12-12h56c6.6 0 12 5.4 12 12v92h92c6.6 0 12 5.4 12 12v56z" data-dcnode-id="400"></path></svg></span><span class="uagb-icon-active uagb-faq-icon-wrap" data-dcnode-id="395"><svg data-dcnode-id="396" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zM124 296c-6.6 0-12-5.4-12-12v-56c0-6.6 5.4-12 12-12h264c6.6 0 12 5.4 12 12v56c0 6.6-5.4 12-12 12H124z" data-dcnode-id="397"></path></svg></span><span class="uagb-question" data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">How many jobs are being lost to automation?</span></span></div><div class="uagb-faq-content" data-dcnode-id="388"><span data-dcnode-id="389"><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">A study by Oxford University predicts that 47% of all the jobs in the USA will be automated in the next two decades. PwC, on the other hand, predicts that 38% of jobs are prone to automation, and the McKinsey report says around 50% of work tasks are automatable at the moment. The most cited jobs lost to automation statistics mention these studies.</span></p></span></div></div></div></div><span data-dcnode-id="384" instrument_node="">
