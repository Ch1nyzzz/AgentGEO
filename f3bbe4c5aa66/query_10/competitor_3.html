</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id14&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Summary</h2><div id=&quot;aep-abstract-sec-id15&quot;><p id=&quot;sp005&quot;>This article explores in depth the role of indigenous and foreign innovation efforts in technological change and catching up and their interactions in the emerging economies. It presents original evidence and argues that, despite the potential offered by globalization and a liberal trade regime, the benefits of international technology diffusion can only be delivered with parallel indigenous innovation efforts and the presence of modern institutional and governance structures and conducive innovation systems. This conclusion is compounded by the expected inappropriateness of Northern technology for countries in the developing South that calls for greater efforts to develop indigenous innovation. In this sense, indigenous and foreign innovation efforts are complementary.</p></div></div></div>" data-dcnode-id="5068" lang="en" name="citation_abstract"><span data-dcnode-id="5067" instrument_node="">

ment_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="4556" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="4559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.worlddev.2010.05.009" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="4560" instrument_node="">https://doi.org/10.1016/j.worlddev.2010.05.009</span></a><a class="rights-and-content" data-dcnode-id="4557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0305750X11000647%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4558" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="4555"></section><section class="ReferencedArticles" data-dcnode-id="4554"></section><div class="PageDivider" data-dcnode-id="4553"></div><div class="Abstracts u-font-serif" data-dcnode-id="4546" id="abstracts"><div class="abstract author" data-dcnode-id="4547" id="aep-abstract-id14" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">Summary</span></h2><div data-dcnode-id="4548" id="aep-abstract-sec-id15"><p data-dcnode-id="4549" id="sp005"><span data-dcnode-id="4550" instrument_node="">This article explores in depth the role of indigenous and foreign innovation efforts in technological change and catching up and their interactions in the emerging economies. It presents original evidence and argues that, despite the potential offered by globalization and a liberal trade regime, the benefits of international technology diffusion can only be delivered with parallel indigenous innovation efforts and the presence of modern institutional and governance structures and conducive innovation systems. This conclusion is compounded by the expected inappropriateness of Northern technology for countries in the developing South that calls for greater efforts to develop indigenous innovation. In this sense, indigenous and foreign innovation efforts are complementary.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="4523" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="4535"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0305750X10002238"><svg class="icon icon-navigate-left" data-dcnode-id="4544" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="4545"></path></svg><span class="button-alternative-text" data-dcnode-id="4537"><strong data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="4524"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0305750X11000659"><span class="button-alternative-text" data-dcnode-id="4528"><strong data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="4526" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="4527"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="4504"><div class="keywords-section" data-dcnode-id="4505" id="aep-keywords-id16"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">Key words</span></h2><div class="keyword" data-dcnode-id="4518"><span data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">indigenous innovation</span></span></div><div class="keyword" data-dcnode-id="4515"><span data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">technology transfer</span></span></div><div class="keyword" data-dcnode-id="4512"><span data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">technological capabilities</span></span></div><div class="keyword" data-dcnode-id="4509"><span data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">technological change</span></span></div><div class="keyword" data-dcnode-id="4506"><span data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">emerging economies</span></span></div></div></div><span data-dcnode-id="4503" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3577" id="body"><div data-dcnode-id="3583"><section data-dcnode-id="4425" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4497"><span data-dcnode-id="4502" instrument_node="">1</span><span data-dcnode-id="4500" instrument_node="">. </span><span data-dcnode-id="4498" instrument_node="">Introduction</span></h2><p data-dcnode-id="4483" id="p0005"><span data-dcnode-id="4496" instrument_node="">It is widely recognized that differences in productivity are a major source of cross country income variations and that technological change is a driver of productivity growth. Technological innovation is, therefore, a key element of industrialization and catch-up in developing countries. One of the controversies is whether the sources of technological change are indigenous or rather based on foreign innovation efforts, or a combination of the two, and which combination. On the one hand, innovation is costly, risky, and path-dependent. Hence it is more efficient for developing countries simply to acquire foreign technology created in developed countries. In principle, if innovations were easy to diffuse and adopt regardless of their nature and type, a technologically backward country could catch up rapidly by absorbing the most advanced technologies (</span><a class="workspace-trigger" data-dcnode-id="4494" href="#b0365" name="bb0365"><span data-dcnode-id="4495" instrument_node="">Barro and Sala-i-Martin, 1995</span></a><span data-dcnode-id="4493" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4491" href="#b0120" name="bb0120"><span data-dcnode-id="4492" instrument_node="">Eaton and Kortum, 1995</span></a><span data-dcnode-id="4490" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4488" href="#b0190" name="bb0190"><span data-dcnode-id="4489" instrument_node="">Grossman, 1994</span></a><span data-dcnode-id="4487" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4485" href="#b0315" name="bb0315"><span data-dcnode-id="4486" instrument_node="">Romer, 1994</span></a><span data-dcnode-id="4484" instrument_node="">). With the expectation to “trade market for technology,” many developing countries “raced to the bottom” to attract foreign direct investment (FDI) using various financial and fiscal incentive schemes.</span></p><p data-dcnode-id="4454" id="p0010"><span data-dcnode-id="4482" instrument_node="">On the other hand, there is the view that technology diffusion and adoption is neither costless nor unconditional. It relies on substantial and well-directed technological efforts (</span><a class="workspace-trigger" data-dcnode-id="4480" href="#b0245" name="bb0245"><span data-dcnode-id="4481" instrument_node="">Lall, 2001</span></a><span data-dcnode-id="4479" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4477" href="#b0250" name="bb0250"><span data-dcnode-id="4478" instrument_node="">Lall, 2005</span></a><span data-dcnode-id="4476" instrument_node="">) and on absorptive capacity (</span><a class="workspace-trigger" data-dcnode-id="4474" href="#b0105" name="bb0105"><span data-dcnode-id="4475" instrument_node="">Cohen &amp; Levinthal, 1989</span></a><span data-dcnode-id="4473" instrument_node="">). An additional related difficulty in the debate on indigenous </span><em data-dcnode-id="4471"><span data-dcnode-id="4472" instrument_node="">versus</span></em><span data-dcnode-id="4470" instrument_node=""> foreign technology upgrading is due to the fact that technical change is often biased in a particular direction and foreign technologies developed in industrialized countries may not be appropriate to the economic and social conditions of developing countries (</span><a class="workspace-trigger" data-dcnode-id="4468" href="#b0005" name="bb0005"><span data-dcnode-id="4469" instrument_node="">Acemoglu, 2002</span></a><span data-dcnode-id="4467" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4465" href="#b0030" name="bb0030"><span data-dcnode-id="4466" instrument_node="">Atkinson and Stiglitz, 1969</span></a><span data-dcnode-id="4464" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4462" href="#b0055" name="bb0055"><span data-dcnode-id="4463" instrument_node="">Basu and Weil, 1998</span></a><span data-dcnode-id="4461" instrument_node="">). In addition, we cannot simplistically assume that the private interests of multinationals coincide with the social interests of the host countries (</span><a class="workspace-trigger" data-dcnode-id="4459" href="#b0355" name="bb0355"><span data-dcnode-id="4460" instrument_node="">Lall and Urata, 2003</span></a><span data-dcnode-id="4458" instrument_node="">). The available empirical evidence on the effects of the sources of indigenous or foreign innovation is mixed. Studies largely fail to provide convincing evidence indicating significant positive technological transfer and spillover effect of FDI on the local firms.</span><a class="workspace-trigger" data-dcnode-id="4455" href="#fn1" name="bfn1"><sup data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">1</span></sup></a></p><p data-dcnode-id="4452" id="p0015"><span data-dcnode-id="4453" instrument_node="">Within this broad and ongoing debate, the role of indigenous innovation and its diffusion/spillover effect in the catching up process has not received the attention it deserves. Many relevant questions still remain unanswered. Thus, what are the drivers of technological change and catching up in developing countries, and in middle income countries in particular? To what extent can developing countries successfully build up their own modern industries through technology acquisition via imports and FDI? What are the roles of indigenous innovation and its diffusion? What is the relationship between indigenous innovation and the acquisition of foreign technology in an increasingly globalized world, and how does this interaction change to respond to the specific characteristics of a country? How does integration in global value chains enable a developing country to access to and learn from foreign technology? This Special Section addresses these questions, based on a series of empirical studies on technology acquisition through FDI and indigenous innovation in the emerging economies.</span></p><p data-dcnode-id="4443" id="p0020"><span data-dcnode-id="4451" instrument_node="">Impressively rapid economic growth in Brazil, India, and China in the past three decades is changing the landscape of the world economy.</span><a class="workspace-trigger" data-dcnode-id="4448" href="#fn2" name="bfn2"><sup data-dcnode-id="4449"><span data-dcnode-id="4450" instrument_node="">2</span></sup></a><span data-dcnode-id="4447" instrument_node=""> These countries are catching up fast with the leading industrial countries, and this process is becoming a remarkable economic force influencing the world economy. They account for about 40% of world total population, 13% of world total income (in 2007), and most importantly, their incomes are rising at a speed similar to that of Japan and Korea during their take-off period (</span><a class="workspace-trigger" data-dcnode-id="4445" href="#b0340" name="bb0340"><span data-dcnode-id="4446" instrument_node="">World Bank, 2007</span></a><span data-dcnode-id="4444" instrument_node="">). The emergence of these economies has important implications for the world, not only in terms of its economic impact, but also in terms of their experiences in guiding and promoting the growth process. These countries have opened up to international trade and investment though to different degrees and with different speed and strategies, while at the same time they all have put an increasing emphasis on indigenous knowledge creation and innovation, though again to different extents and with varying success. Experiences from these emerging economies may provide valuable lessons also for other developing countries with regard to industrial, technology, and trade policies.</span></p><p data-dcnode-id="4426" id="p0025"><span data-dcnode-id="4442" instrument_node="">The remainder of this introductory article proceeds as follows. Section </span><a class="workspace-trigger" data-dcnode-id="4440" href="#s0010" name="bs0010"><span data-dcnode-id="4441" instrument_node="">2</span></a><span data-dcnode-id="4439" instrument_node=""> examines some stylized facts on these emerging economies. Section </span><a class="workspace-trigger" data-dcnode-id="4437" href="#s0015" name="bs0015"><span data-dcnode-id="4438" instrument_node="">3</span></a><span data-dcnode-id="4436" instrument_node=""> analyzes the possible benefits from international technology transfer and the transmission channels. Section </span><a class="workspace-trigger" data-dcnode-id="4434" href="#s0045" name="bs0045"><span data-dcnode-id="4435" instrument_node="">4</span></a><span data-dcnode-id="4433" instrument_node=""> discusses the importance of the appropriateness of technology for catch-up and the capabilities of developing countries in creating new technology. Section </span><a class="workspace-trigger" data-dcnode-id="4431" href="#s0050" name="bs0050"><span data-dcnode-id="4432" instrument_node="">5</span></a><span data-dcnode-id="4430" instrument_node=""> discusses the interactions between foreign technology transfer and indigenous innovation. Section </span><a class="workspace-trigger" data-dcnode-id="4428" href="#s0055" name="bs0055"><span data-dcnode-id="4429" instrument_node="">6</span></a><span data-dcnode-id="4427" instrument_node=""> concludes with an evaluation of the evidence and discusses policy implications for other developing countries struggling for technology upgrading and catch-up.</span></p></section><section data-dcnode-id="3946" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4419"><span data-dcnode-id="4424" instrument_node="">2</span><span data-dcnode-id="4422" instrument_node="">. </span><span data-dcnode-id="4420" instrument_node="">Technology and economic take-off in the emerging economies</span></h2><div data-dcnode-id="4377"><p data-dcnode-id="4403" id="p0030"><span data-dcnode-id="4418" instrument_node="">The rise of these emerging economies is changing the landscape of the world economy. The average annual GDP growth rate of China in the past 30</span><span data-dcnode-id="4416" instrument_node="">&nbsp;</span><span data-dcnode-id="4414" instrument_node="">years, for instance, has been as high as 9.8%, more than three times the average 3.0% annual growth rate of the world economy. In 2007, the annual GDP growth rate was 13.0% in China, 9.1% in India, and 5.4% in Brazil. Again, all growth rates which were substantially higher than the world average growth rate in 2007 of 3.8%. In 2008, in spite of the crisis, these economies continued to grow much faster that the world 1.7% average: 9.0% in China, 6.1% in India, and 5.1% in Brazil.</span><a class="workspace-trigger" data-dcnode-id="4411" href="#fn3" name="bfn3"><sup data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">3</span></sup></a><span data-dcnode-id="4410" instrument_node=""> By 2007, China was ranked among the four largest economies in the world in terms of total GDP. The pace and duration of economic growth of these economies resembles Korea and Japan’s performances during the three decades after 1960 (</span><a class="workspace-trigger" data-dcnode-id="4408" href="#f0005" name="bf0005"><span data-dcnode-id="4409" instrument_node="">Figure 1</span></a><span data-dcnode-id="4407" instrument_node="">). The combination of this fast growth with the large size of these economies makes them a significant economic development experience with a global impact (</span><a class="workspace-trigger" data-dcnode-id="4405" href="#b0155" name="bb0155"><span data-dcnode-id="4406" instrument_node="">Freeman, 2005</span></a><span data-dcnode-id="4404" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="4378" id="f0005"><span data-dcnode-id="4393"><img alt="" data-dcnode-id="4402" height="289" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0305750X11000647-gr1.jpg&amp;raw"><span data-dcnode-id="4401" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4394"><li data-dcnode-id="4395"><a class="anchor download-link u-font-sans" data-dcnode-id="4396" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0305750X11000647-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4397"><span data-dcnode-id="4400" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4379"><span data-dcnode-id="4380"><p data-dcnode-id="4381" id="sp010"><span class="label" data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">Figure 1</span></span><span data-dcnode-id="4390" instrument_node="">. </span><span data-dcnode-id="4388" instrument_node="">Growth rate of BASIC economies in comparison with Japan and Korea. </span><em data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">Source:</span></em><span data-dcnode-id="4385" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="4383" href="#b0340" name="bb0340"><span data-dcnode-id="4384" instrument_node="">World Bank (2007)</span></a><span data-dcnode-id="4382" instrument_node="">.</span></p></span></span></figure></div><div data-dcnode-id="4225"><p data-dcnode-id="4365" id="p0035"><span data-dcnode-id="4376" instrument_node="">Technological capabilities in these emerging economies—a central driver of technological upgrading—have also grown significantly, and in some industries they are catching-up with the industrialized countries. Since 2000, China and India have experienced a rapid surge of patent application. The number of patents that belong to so-called Triadic Patent Families</span><a class="workspace-trigger" data-dcnode-id="4373" href="#fn4" name="bfn4"><sup data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">4</span></sup></a><span data-dcnode-id="4372" instrument_node=""> applied by Chinese researchers has increased more than seven times over the period from 2000 to 2007. For India the number has increased about three times (</span><a class="workspace-trigger" data-dcnode-id="4370" href="#f0010" name="bf0010"><span data-dcnode-id="4371" instrument_node="">Figure 2</span></a><span data-dcnode-id="4369" instrument_node="">). China’s export market share of R&amp;D intensive products increased from 3% to 13% over the period 2000–08 moving close to the 15% and 19% market share held by the United States and the European Union 15 countries as a whole. This illustrates the rapid structural change and industry upgrading which is currently taking place in China (</span><a class="workspace-trigger" data-dcnode-id="4367" href="#t0005" name="bt0005"><span data-dcnode-id="4368" instrument_node="">Table 1</span></a><span data-dcnode-id="4366" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="4343" id="f0010"><span data-dcnode-id="4355"><img alt="" data-dcnode-id="4364" height="251" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0305750X11000647-gr2.jpg&amp;raw"><span data-dcnode-id="4363" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4356"><li data-dcnode-id="4357"><a class="anchor download-link u-font-sans" data-dcnode-id="4358" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0305750X11000647-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4359"><span data-dcnode-id="4362" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4344"><span data-dcnode-id="4345"><p data-dcnode-id="4346" id="sp015"><span class="label" data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">Figure 2</span></span><span data-dcnode-id="4352" instrument_node="">. </span><span data-dcnode-id="4350" instrument_node="">Granted patents belong to Triadic patent families. </span><em data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">Source:</span></em><span data-dcnode-id="4347" instrument_node=""> OECD. R&amp;D efforts in selected countries, 2006.</span></p></span></span></figure><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4226" id="t0005"><span class="captions" data-dcnode-id="4335"><span data-dcnode-id="4336"><p data-dcnode-id="4337" id="sp025"><span class="label" data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">Table 1</span></span><span data-dcnode-id="4340" instrument_node="">. </span><span data-dcnode-id="4338" instrument_node="">Export market share (%): R&amp;D intensive industries</span></p></span></span><div class="groups" data-dcnode-id="4236"><table data-dcnode-id="4237"><thead data-dcnode-id="4324"><tr class="rowsep-1 valign-top" data-dcnode-id="4325"><th class="align-left" data-dcnode-id="4334" scope="col"></th><th class="align-center" data-dcnode-id="4332" scope="col"><span data-dcnode-id="4333" instrument_node="">1995</span></th><th class="align-center" data-dcnode-id="4330" scope="col"><span data-dcnode-id="4331" instrument_node="">2000</span></th><th class="align-center" data-dcnode-id="4328" scope="col"><span data-dcnode-id="4329" instrument_node="">2005</span></th><th class="align-center" data-dcnode-id="4326" scope="col"><span data-dcnode-id="4327" instrument_node="">2008</span></th></tr></thead><tbody data-dcnode-id="4238"><tr class="valign-top" data-dcnode-id="4313"><td class="align-left" data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">Japan</span></td><td class="align-center" data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">14.51</span></td><td class="align-center dcnode-id="4246"></td><td class="align-center" data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">0.10</span></td><td class="align-center" data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">0.12</span></td><td class="align-center" data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">0.10</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4227"></p><p data-dcnode-id="4232" id="sp030"><em data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">Note:</span></em><span data-dcnode-id="4233" instrument_node=""> Five R&amp;D intensive industries are: aerospace, electronics, instruments, office machine, and pharmaceutical. The figure is a simple average of the share of the five industries.</span></p><p data-dcnode-id="4228" id="sp035"><em data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">Source:</span></em><span data-dcnode-id="4229" instrument_node=""> OECD STAN.</span></p><p></p></div></div><div data-dcnode-id="3947"><p data-dcnode-id="4214" id="p0040"><span data-dcnode-id="4224" instrument_node="">Of course, despite sharing common features such as their large size, these emerging countries are very diverse in their factor endowments, economic structure and development history, and strategy. All these countries have opened up to international trade and investment. While Brazil mostly relied on its large domestic market (trade/GDP ratio was 27% in 2007), India relied much more on the international economy with a trade/GDP ratio of 46% in 2007, and China experienced a dramatic export-led growth path with a trade/GDP ratio as high as 76% in 2007 All of these countries have also significantly reduced tariff barriers and opened up to imports of foreign goods. Over the 1990–2006 period, the average weighted tariff rate was reduced from 27% to 7% in Brazil, from 41% to 5% in China, and from 83% to 14% in India. All of them have also opened up to international direct investment with China and Brazil enjoying an average FDI/GDP ratio of 3.2% and 3.4% over the period 2000–05. While the figure in India was lower than that in China and Brazil at 0.9%, it has been increasing rapidly since the liberalization. These countries have also spent significant and rising shares of GDP on royalty and licensing fees for foreign technology acquisition: from 0.8% (India) to 2.6% (China). They have sent many students abroad for education and introduced various policies to attract overseas diasporas to return to their countries (</span><a class="workspace-trigger" data-dcnode-id="4222" href="#t0010" name="bt0010"><span data-dcnode-id="4223" instrument_node="">Table 2</span></a><span data-dcnode-id="4221" instrument_node="">). On the other hand, China, India, and Brazil, are putting great efforts in indigenous capabilities building. These three countries together with the United States and the Russian Federation stand as the top five countries in the world in terms of number of university enrolments in 2007 (</span><a class="workspace-trigger" data-dcnode-id="4219" href="#b0110" name="bb0110"><span data-dcnode-id="4220" instrument_node="">Dahlman, 2010</span></a><span data-dcnode-id="4218" instrument_node="">). Their expenditure on research and development (R&amp;D) has also increased exponentially. In 2006, the total R&amp;D expenditure in China was greater than that of Germany, United Kingdom, and France and was about a third of that in the European Union as a whole. In terms of its gross R&amp;D expenditure to GDP ratio, China is now moving close to the European Union average (</span><a class="workspace-trigger" data-dcnode-id="4216" href="#f0015" name="bf0015"><span data-dcnode-id="4217" instrument_node="">Figure 3</span></a><span data-dcnode-id="4215" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3976" id="t0010"><span class="captions" data-dcnode-id="4206"><span data-dcnode-id="4207"><p data-dcnode-id="4208" id="sp040"><span class="label" data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">Table 2</span></span><span data-dcnode-id="4211" instrument_node="">. </span><span data-dcnode-id="4209" instrument_node="">Acquisition of foreign knowledge: Brazil, China, and India</span></p></span></span><div class="groups" data-dcnode-id="3991"><table data-dcnode-id="3992"><thead data-dcnode-id="4196"><tr class="rowsep-1 valign-top" data-dcnode-id="4197"><th class="align-left" data-dcnode-id="4204" scope="col"><span data-dcnode-id="4205" instrument_node="">Trade as% of GDP</span></th><th class="align-center" data-dcnode-id="4202" scope="col"><span data-dcnode-id="4203" instrument_node="">Brazil</span></th><th class="align-center" data-dcnode-id="4200" scope="col"><span data-dcnode-id="4201" instrument_node="">China</span></th><th class="align-center" data-dcnode-id="4198" scope="col"><span data-dcnode-id="4199" instrument_node="">India</span></th></tr></thead><tbody data-dcnode-id="3993"><tr class="valign-top" data-dcnode-id="4179"><td class="align-left" data-dcnode-id="4192"><span data-dcnode-id="4195" instrument_node="">1980</span><br data-dcnode-id="4194"><span data-dcnode-id="4193" instrument_node="">2007</span></td><td class="align-center" data-dcnode-id="4188"><span data-dcnode-id="4191" instrument_node="">22</span><br data-dcnode-id="4190"><span data-dcnode-id="4189" instrument_node="">27</span></td><td class="align-center" data-dcnode-id="4184"><span data-dcnode-id="4187" instrument_node="">21</span><br data-dcnode-id="4186"><span data-dcnode-id="4185" instrument_node="">76</span></td><td class="align-center" data-dcnode-id="4180"><span data-dcnode-id="4183" instrument_node="">15</span><br data-dcnode-id="4182"><span data-dcnode-id="4181" instrument_node="">46</span></td></tr><tr class="valign-top" data-dcnode-id="4176"><td class="align-left" colspan="4" data-dcnode-id="4177"><br data-dcnode-id="4178"></td></tr><tr class="valign-top" data-dcnode-i
