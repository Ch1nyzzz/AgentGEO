"4022" instrument_node="">⁎</span></sup></a></td><td class="align-center" data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">21,556</span></td><td class="align-center" data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node="">421,128</span></td><td class="align-center" data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">153,312</span></td></tr><tr class="valign-top" data-dcnode-id="4003"><td class="align-left" data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">As percentage of students studying abroad</span></td><td class="align-center" data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">0.77</span></td><td class="align-center" data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">15.03</span></td><td class="align-center" data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">5.47</span></td></tr><tr class="valign-top" data-dcnode-id="3994"><td class="align-left" data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">As percentage of tertiary students in country</span></td><td class="align-center" data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">0.4</span></td><td class="align-center" data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">1.9</span></td><td class="align-center" data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">1.1</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="3983"></p><p data-dcnode-id="3984" id="sp045"><em data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">Source:</span></em><span data-dcnode-id="3988" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="3986" href="#b0110" name="bb0110"><span data-dcnode-id="3987" instrument_node="">Dahlman (2010)</span></a><span data-dcnode-id="3985" instrument_node="">.</span></p><p></p><dl class="footnotes" data-dcnode-id="3977"><dt data-dcnode-id="3981" id="tblfn1"><span data-dcnode-id="3982" instrument_node="">⁎</span></dt><dd data-dcnode-id="3978"><p data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">The total number of tertiary students studying outside their home country was 2,800,470.</span></p></dd></dl></div><figure class="figure text-xs" data-dcnode-id="3948" id="f0015"><span data-dcnode-id="3966"><img alt="" data-dcnode-id="3975" height="266" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0305750X11000647-gr3.jpg&amp;raw"><span data-dcnode-id="3974" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3967"><li data-dcnode-id="3968"><a class="anchor download-link u-font-sans" data-dcnode-id="3969" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0305750X11000647-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3970"><span data-dcnode-id="3973" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3949"><span data-dcnode-id="3950"><p data-dcnode-id="3951" id="sp020"><span class="label" data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">Figure 3</span></span><span data-dcnode-id="3963" instrument_node="">. </span><span data-dcnode-id="3961" instrument_node="">Spending on R&amp;D as% of GDP. </span><em data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">Source:</span></em><span data-dcnode-id="3958" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="3956" href="#b0345" name="bb0345"><span data-dcnode-id="3957" instrument_node="">World Bank (2010)</span></a><span data-dcnode-id="3955" instrument_node="">. </span><em data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">Note:</span></em><span data-dcnode-id="3952" instrument_node=""> Area of the bubbles shows the size of gross R&amp;D expenditure.</span></p></span></span></figure></div></section><section data-dcnode-id="3725" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3940"><span data-dcnode-id="3945" instrument_node="">3</span><span data-dcnode-id="3943" instrument_node="">. </span><span data-dcnode-id="3941" instrument_node="">International technology diffusion and technological upgrading in developing countries</span></h2><p data-dcnode-id="3926" id="p0045"><span data-dcnode-id="3939" instrument_node="">As discussed earlier, innovation is costly, risky, and path-dependent. This may provide a rationale for poor countries to rely on foreign technology acquisition for technological development. Foreign sources of technology account for a large part of productivity growth in most countries. In fact, most innovation activities are largely concentrated in a few developed countries: the US, Japan, and a number of European countries. International technology diffusion is, therefore, an important condition for economic growth. If foreign technologies are easy to diffuse and adopt, a technologically backward country can catch up rapidly, even leapfrog through the acquisition and more rapid deployment of the most advanced technologies (</span><a class="workspace-trigger" data-dcnode-id="3937" href="#b0120" name="bb0120"><span data-dcnode-id="3938" instrument_node="">Eaton and Kortum, 1995</span></a><span data-dcnode-id="3936" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3934" href="#b0190" name="bb0190"><span data-dcnode-id="3935" instrument_node="">Grossman, 1994</span></a><span data-dcnode-id="3933" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3931" href="#b0315" name="bb0315"><span data-dcnode-id="3932" instrument_node="">Romer, 1994</span></a><span data-dcnode-id="3930" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3928" href="#b0320" name="bb0320"><span data-dcnode-id="3929" instrument_node="">Soete, 1985</span></a><span data-dcnode-id="3927" instrument_node="">).</span></p><p data-dcnode-id="3921" id="p0050"><span data-dcnode-id="3925" instrument_node="">Technology is nonrival. The marginal costs for additional use are negligible. Although Frontier technology created through innovation enjoys rents, the public good nature of knowledge suggests that it can generate positive externalities (or spillovers) to others who are also exposed to this knowledge in various ways. However, although some of the technologies can be codified, a large amount of technological knowledge is tacit. Therefore, knowledge spillovers are geographically bounded (</span><a class="workspace-trigger" data-dcnode-id="3923" href="#b0210" name="bb0210"><span data-dcnode-id="3924" instrument_node="">Jaffe, Trajtenberg, &amp; Henderson, 1993</span></a><span data-dcnode-id="3922" instrument_node="">) due to the requirement of proximity for the transfer of tacit knowledge.</span></p><p data-dcnode-id="3913" id="p0055"><span data-dcnode-id="3920" instrument_node="">Technology can be diffused between firms and across regions and countries through various transmission mechanisms (</span><a class="workspace-trigger" data-dcnode-id="3918" href="#b0295" name="bb0295"><span data-dcnode-id="3919" instrument_node="">Pietrobelli, 1996</span></a><span data-dcnode-id="3917" instrument_node="">). These include: (i) movement of goods through international trade; (ii) movement of capital through inward and outward foreign direct investment (FDI and OFDI); (iii) movement of people through migration, travel, and foreign education of students and workers; (iv) international research collaboration; (v) diffusion through media and internet of disembodied knowledge; (vi) integration into global value chains to benefit from the foreign technology transferred within the supply chain. Some knowledge is transferred intentionally from the knowledge owner to the recipient—and this may spur a learning process—but a large proportion of knowledge spillovers take place as unintended knowledge leakage. In recent years the mode of innovation is becoming more and more open and is making good use of external resources. International knowledge diffusion can, therefore, benefit firms’ innovation at every stage of the innovation process. The growing technological diversification of companies makes successful integration of new external knowledge into the innovation process increasingly important. Such successful integration further fosters innovation performance. The factors that explain the accelerating trend of utilizing external sources of knowledge include, among other things, technological convergence, declining transaction costs of acquiring external R&amp;D inputs, and shortening product cycle times (</span><a class="workspace-trigger" data-dcnode-id="3915" href="#b0275" name="bb0275"><span data-dcnode-id="3916" instrument_node="">Narula, 2003</span></a><span data-dcnode-id="3914" instrument_node="">).</span></p><section data-dcnode-id="3844" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3907"><span data-dcnode-id="3912" instrument_node="">(a)</span><span data-dcnode-id="3910" instrument_node="">. </span><span data-dcnode-id="3908" instrument_node="">Foreign direct investment and technology transfer</span></h3><p data-dcnode-id="3881" id="p0060"><span data-dcnode-id="3906" instrument_node="">Foreign direct investment as a bundle of technological, managerial knowledge, and financial capital has been regarded as a major vehicle for the transfer of advanced foreign technology to developing countries for a long time (</span><a class="workspace-trigger" data-dcnode-id="3904" href="#b0115" name="bb0115"><span data-dcnode-id="3905" instrument_node="">Dunning, 1994</span></a><span data-dcnode-id="3903" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3901" href="#b0235" name="bb0235"><span data-dcnode-id="3902" instrument_node="">Lall, 1992</span></a><span data-dcnode-id="3900" instrument_node="">). Multinational enterprises (MNEs) are regarded as the major driver of R&amp;D in the world. They are also likely to offer training to their employees though in an uneven fashion depending on the case/industry. MNEs are also found to have internal incentives to transfer technology across border to share technology between parent companies and subsidiaries (</span><a class="workspace-trigger" data-dcnode-id="3898" href="#b0260" name="bb0260"><span data-dcnode-id="3899" instrument_node="">Markusen, 2002</span></a><span data-dcnode-id="3897" instrument_node="">). Therefore, it is expected that in the medium- to long-run, local firms will benefit from MNEs spillovers and linkages. The competition effect of FDI is also expected to push inefficient firms to exit from the market and force other local firms to innovate to be competitive. Technology transfer may take place within the foreign-investing firm through imported machinery and equipments and through labor training. Horizontal technology spillovers may occur from foreign investing firms to other firms in the same industry and/or the same region via demonstration effects and the movement of trained labor from foreign to local firms (</span><a class="workspace-trigger" data-dcnode-id="3895" href="#b0080" name="bb0080"><span data-dcnode-id="3896" instrument_node="">Caves, 1974</span></a><span data-dcnode-id="3894" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3892" href="#b0145" name="bb0145"><span data-dcnode-id="3893" instrument_node="">Fosfuri et al., 2001</span></a><span data-dcnode-id="3891" instrument_node="">). There may also be vertical technology spillovers taking place between foreign and local suppliers and customers within the value chain through forward and backward linkages (</span><a class="workspace-trigger" data-dcnode-id="3889" href="#b0215" name="bb0215"><span data-dcnode-id="3890" instrument_node="">Javorcik, 2004</span></a><span data-dcnode-id="3888" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3886" href="#b0305" name="bb0305"><span data-dcnode-id="3887" instrument_node="">Pietrobelli and Rabellotti, 2007</span></a><span data-dcnode-id="3885" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3883" href="#b0310" name="bb0310"><span data-dcnode-id="3884" instrument_node="">Pietrobelli and Saliola, 2008</span></a><span data-dcnode-id="3882" instrument_node="">).</span></p><p data-dcnode-id="3867" id="p0065"><span data-dcnode-id="3880" instrument_node="">Some empirical research shows that technology transferred through FDI has positive effects on developing countries (</span><a class="workspace-trigger" data-dcnode-id="3878" href="#b0125" name="bb0125"><span data-dcnode-id="3879" instrument_node="">Eden et al., 1997</span></a><span data-dcnode-id="3877" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3875" href="#b0225" name="bb0225"><span data-dcnode-id="3876" instrument_node="">Kokko et al., 1996</span></a><span data-dcnode-id="3874" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3872" href="#b0075" name="bb0075"><span data-dcnode-id="3873" instrument_node="">Buckley et al., 2002</span></a><span data-dcnode-id="3871" instrument_node="">). However, some of these studies suffer from several limitations: they are carried out at the industry level and are likely to be affected by the endogeneity between industry productivity and industry level FDI intensity, and they fail to control for firm level heterogeneity. An exception is the paper by </span><a class="workspace-trigger" data-dcnode-id="3869" href="#b0215" name="bb0215"><span data-dcnode-id="3870" instrument_node="">Javorcik (2004)</span></a><span data-dcnode-id="3868" instrument_node=""> who investigated the vertical spillovers from FDI through the supply chain using firm level panel data from Lithuania and did find significant positive spillovers effects from backward linkages.</span></p><p data-dcnode-id="3856" id="p0070"><span data-dcnode-id="3866" instrument_node="">However, despite the possible benefits of technology transfer and FDI spillovers, these may also have significantly negative effects on technological upgrading in the domestic firms. This may be due to a variety of reasons. First, FDI may make the competing domestic firms worse off, and even crowd them out from the market (</span><a class="workspace-trigger" data-dcnode-id="3864" href="#b0025" name="bb0025"><span data-dcnode-id="3865" instrument_node="">Aitken and Harrison, 1999</span></a><span data-dcnode-id="3863" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3861" href="#b0205" name="bb0205"><span data-dcnode-id="3862" instrument_node="">Hu and Jefferson, 2002</span></a><span data-dcnode-id="3860" instrument_node="">). The strong competition from foreign subsidiaries may reduce local firms’ R&amp;D efforts (</span><a class="workspace-trigger" data-dcnode-id="3858" href="#b0285" name="bb0285"><span data-dcnode-id="3859" instrument_node="">OECD, 2002</span></a><span data-dcnode-id="3857" instrument_node="">). Moreover, foreign subsidiaries may remain as enclaves in a developing country with lack of effective linkages with the local economy.</span></p><p data-dcnode-id="3845" id="p0075"><span data-dcnode-id="3855" instrument_node="">Many developing countries have established export processing zones (EPZs) to attract FDI. Research on such EPSz in developing countries found that foreign firms located in these EPZs were mostly engaged in process trade based on cheap unskilled or semi-skilled labor available in the host country and did not generate sufficient linkages with the local economy (</span><a class="workspace-trigger" data-dcnode-id="3853" href="#b0220" name="bb0220"><span data-dcnode-id="3854" instrument_node="">Johansson, 1994</span></a><span data-dcnode-id="3852" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="3850" href="#b0160" name="bb0160"><span data-dcnode-id="3851" instrument_node="">Fu (2004)</span></a><span data-dcnode-id="3849" instrument_node=""> finds that processing trade-oriented FDI in coastal regions of China generated limited linkages and weak spillovers across regions which exacerbated the existing regional inequalities in China. Using a large firm level panel dataset from China, Fu &amp; Gong (this issue) find depressive effects of foreign R&amp;D labs on local firms in China. This is likely due to the strong competition for talents, resources, and markets between foreign and indigenous firms, and to the limited linkages between foreign and local firms. Most of the foreign R&amp;D labs indicated that they have no intention to collaborate with local firms, universities or research institutions due to concerns on IPR protection (</span><a class="workspace-trigger" data-dcnode-id="3847" href="#b0350" name="bb0350"><span data-dcnode-id="3848" instrument_node="">Zhou, 2006</span></a><span data-dcnode-id="3846" instrument_node="">).</span></p></section><section data-dcnode-id="3783" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3838"><span data-dcnode-id="3843" instrument_node="">(b)</span><span data-dcnode-id="3841" instrument_node="">. </span><span data-dcnode-id="3839" instrument_node="">FDI is not an unalloyed blessing</span></h3><p data-dcnode-id="3830" id="p0080"><span data-dcnode-id="3837" instrument_node="">FDI is not an unalloyed blessing for technology transfer in developing countries. There are many necessary pre-conditions to meet for an effective technology transfer process. First, trade policy matters. It is argued that openness facilitates linkages and directs resources to the “right” sectors, as well as a competitive and dynamic environment (</span><a class="workspace-trigger" data-dcnode-id="3835" href="#b0045" name="bb0045"><span data-dcnode-id="3836" instrument_node="">Balasubramanyam, Salisu, &amp; Sapsford, 1996</span></a><span data-dcnode-id="3834" instrument_node="">). Heavy restrictions on foreign investors and import substitution policy provide foreign affiliates with low incentives for technology transfer (</span><a class="workspace-trigger" data-dcnode-id="3832" href="#b0025" name="bb0025"><span data-dcnode-id="3833" instrument_node="">Aitken &amp; Harrison, 1999</span></a><span data-dcnode-id="3831" instrument_node="">). Second, legal and regulatory policies especially those related to intellectual property rights (IPR) are important. Foreign firms will not bring core technology into their subsidiaries in developing countries with weak IPR protection. They have also little incentive to invest in R&amp;D and innovate in an environment with weak IPR protection. Third, there need to be sufficient linkages between foreign and local firms to make effective technology transfer possible. Over a certain period China has required joint venture as a condition for FDI inflows. China and Brazil both have negotiated export and local content requirements on FDI in certain industries such as the automobile industry so as to create linkages between foreign and local firms. They have also imposed training requirements on FDI in some cases, for example, Motorola in China.</span></p><p data-dcnode-id="3819" id="p0085"><span data-dcnode-id="3829" instrument_node="">Fourth, FDI with different characteristics also benefit technology transfer to a different extent. For example, we expect that investments made by R&amp;D-intensive MNEs from R&amp;D active countries will </span><em data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">ceteris paribus</span></em><span data-dcnode-id="3826" instrument_node=""> transfer more technology. Technological gaps between foreign and local firms also matter. The relationship between the strength of spillovers and the technology gap follows an inverted-U shape. Spillovers are found to be present when the technology gaps are moderate and when they are much larger (</span><a class="workspace-trigger" data-dcnode-id="3824" href="#b0225" name="bb0225"><span data-dcnode-id="3825" instrument_node="">Kokko et al., 1996</span></a><span data-dcnode-id="3823" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3821" href="#b0270" name="bb0270"><span data-dcnode-id="3822" instrument_node="">Meyer, 2004</span></a><span data-dcnode-id="3820" instrument_node="">). Finally, the most necessary condition for effective technology transfer is sufficient absorptive capacity, which we will discuss below.</span></p><p data-dcnode-id="3817" id="p0090"><span data-dcnode-id="3818" instrument_node="">Fu and Gong (this issue) contribute to this debate in a new and original fashion. They explore the sources/drivers of technology upgrading in China in its recent wave of science and technology take-off using a recent manufacturing firm-level panel dataset for 2001–05. They decompose total factor productivity growth into technical change and efficiency improvement and examine the drivers of these changes. Their results suggest that FDI has served as a vehicle transferring advanced foreign technology from global reservoirs of knowledge. This improves static technological capabilities through imported machines and equipments. However, R&amp;D activities of foreign firms appear to exert a significant negative effect on local firms’ technical change. Instead, it is collective indigenous innovation that contributes to the dynamic technological capabilities of local firms and pushes forward the technological Frontier.</span></p><p data-dcnode-id="3815" id="p0095"><span data-dcnode-id="3816" instrument_node="">Firm-level evidence from India further supports this hypothesis. Using an unbalanced panel data of 1843 Indian manufacturing firms operating during the period 1994–2005, Sasidharan and Kathuria (this issue) examine the relationship between FDI and domestic firms’ R&amp;D in the post-liberalization regime. In most regression specifications, they find that the foreign equity participation acts as a disincentive for investment in R&amp;D. Foreign presence has a positive effect on the R&amp;D intensity of only new domestic firms, which were incorporated after 1985, during the newly liberalized regime.</span></p><p data-dcnode-id="3789" id="p0100"><span data-dcnode-id="3814" instrument_node="">Technology spillovers from FDI may also take place along the spatial/regional dimension. Although knowledge is a nonrival public production asset, which can generate positive externalities or spillovers to others (</span><a class="workspace-trigger" data-dcnode-id="3812" href="#b0185" name="bb0185"><span data-dcnode-id="3813" instrument_node="">Griliches, 1979</span></a><span data-dcnode-id="3811" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3809" href="#b0280" name="bb0280"><span data-dcnode-id="3810" instrument_node="">Nelson, 1959</span></a><span data-dcnode-id="3808" instrument_node="">), knowledge spillovers are geographically localized (</span><a class="workspace-trigger" data-dcnode-id="3806" href="#b0035" name="bb0035"><span data-dcnode-id="3807" instrument_node="">Audretsch, 1998</span></a><span data-dcnode-id="3805" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3803" href="#b0040" name="bb0040"><span data-dcnode-id="3804" instrument_node="">Audretsch and Feldman, 1996</span></a><span data-dcnode-id="3802" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3800" href="#b0210" name="bb0210"><span data-dcnode-id="3801" instrument_node="">Jaffe et al., 1993</span></a><span data-dcnode-id="3799" instrument_node="">), and there may be geographic boundaries to information flows or knowledge spillovers among the firms in an industry (</span><a class="workspace-trigger" data-dcnode-id="3797" href="#b0265" name="bb0265"><span data-dcnode-id="3798" instrument_node="">Marshall, 1920</span></a><span data-dcnode-id="3796" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3794" href="#b0230" name="bb0230"><span data-dcnode-id="3795" instrument_node="">Krugman, 1991</span></a><span data-dcnode-id="3793" instrument_node="">). Social bonds fostering trust and frequent face-to-face contacts may facilitate knowledge and information flows among agents located within the same area (</span><a class="workspace-trigger" data-dcnode-id="3791" href="#b0070" name="bb0070"><span data-dcnode-id="3792" instrument_node="">Breschi &amp; Lissoni, 2001</span></a><span data-dcnode-id="3790" instrument_node="">). These spatially bounded knowledge spillovers allow companies operating nearby important knowledge sources to introduce innovations at a faster rate than rival firms located elsewhere.</span></p><p data-dcnode-id="3784" id="p0105"><span data-dcnode-id="3788" instrument_node="">Using product innovation information for nearly 40,000 Chinese firms in high technology industries over the period 2000–05, </span><a class="workspace-trigger" data-dcnode-id="3786" href="#b0090" name="bb0090"><span data-dcnode-id="3787" instrument_node="">Chen, Li, and Shapiro (2008)</span></a><span data-dcnode-id="3785" instrument_node=""> investigate the impact of foreign direct investment (FDI) on the product innovation activity of Chinese firms. They find that in locations with a strong clustering of innovative foreign firms, local firms benefit from knowledge spillovers and are themselves more likely to introduce product innovations. However, this does not occur in locations where foreign concentration is measured not by innovations but by employment or capital. After controlling for firm- and location-level effects, no general evidence of industry-level spillovers from FDI in the high-technology industries emerges from their analysis. This is consistent with the findings from Fu and Gong (this issue) and Sasidharan and Kathuria (this issue). The clustering of only innovation activities by foreign firms has a knowledge spillover impact on local firms.</span></p></section><section data-dcnode-id="3763" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3777"><span data-dcnode-id="3782" instrument_node="">(c)</span><span data-dcnode-id="3780" instrument_node="">. </span><span data-dcnode-id="3778" instrument_node="">Imports and technology transfer</span></h3><p data-dcnode-id="3766" id="p0110"><span data-dcnode-id="3776" instrument_node="">Imports of machinery and equipments are another important channel for foreign technology acquisition. Cross country studies on bilateral imports data suggest imports as an important channel for countries to acquire advanced technology and enhance competitiveness (</span><a class="workspace-trigger" data-dcnode-id="3774" href="#b0100" name="bb0100"><span data-dcnode-id="3775" instrument_node="">Coe and Helpman, 1995</span></a><span data-dcnode-id="3773" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3771" href="#b0135" name="bb0135"><span data-dcnode-id="3772" instrument_node="">Fagerberg, 1994</span></a><span data-dcnode-id="3770" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3768" href="#b0150" name="bb0150"><span data-dcnode-id="3769" instrument_node="">Freeman and Soete, 1997</span></a><span data-dcnode-id="3767" instrument_node="">). Note, however, that technology transferred through imports of machinery and equipments is embedded in this machinery. Products that used these imported machines will probably be of higher quality, but this does not mean that developing countries thus necessarily master the technology of designing and producing those advanced machines. Substantial technological learning and reverse engineering are required to grasp the technologies embedded in the imported machinery.</span></p><p data-dcnode-id="3764" id="p0115"><span data-dcnode-id="3765" instrument_node="">Li (this issue) empirically investigates the effect of three types of investment in acquiring technological knowledge (in-house R&amp;D, importing foreign technology and purchasing domestic technology) on the innovation output of Chinese domestic firms in hi-tech industries based on a dataset constructed from a panel of 21 four-digit hi-tech sectors over the period 1995–2004. The results show that investing in foreign technology alone does not enhance innovation in domestic firms, unless it is coupled with an industry’s own in-house R&amp;D effort. On the contrary, domestic technology purchases alone are found to contribute to innovation, suggesting that indigenous technology is much easier to be absorbed by domestic firms.</span></p></section><section data-dcnode-id="3737" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3757"><span data-dcnode-id="3762" instrument_node="">(d)</span><span data-dcnode-id="3760" instrument_node="">. </span><span data-dcnode-id="3758" instrument_node="">Internationalization of R&amp;D and technology transfer</span></h3><p data-dcnode-id="3752" id="p0120"><span data-dcnode-id="3756" instrument_node="">Internationalization of R&amp;D activities by Multinational Enterprises (MNEs) has been a major trend in recent years (</span><a class="workspace-trigger" data-dcnode-id="3754" href="#b0330" name="bb0330"><span data-dcnode-id="3755" instrument_node="">UNCTAD, 2006</span></a><span data-dcnode-id="3753" instrument_node="">). Many developing and developed countries introduced various selective policies to attract R&amp;D-related FDI, with the hope that such investments would contribute to the technological capabilities building of the host country. The evidence on these effects is not clear-cut yet, but Franco, Ray and Ray (this issue) provide original evidence from a comparative study of the innovation practices of multinational affiliates in Brazil and India. Their paper seeks to identify MNE’s Innovation Practices (IPs) in these emerging economies through the analysis of the technological asset-seeking patterns pursued by MNEs. Although both countries have similarities in location advantages (large internal markets and abundance of natural resources), MNE affiliates appear to follow significant differences within and across-countries in terms of their innovation-oriented strategies. While MNEs in Brazil have taken more “stand-alone” practices, focused on one specific kind of technological asset-seeking strategy (licensing, physical capital, or skilled human resources), MNEs in India have adopted a more integrated approach, using complementary IPs and combining different kinds of local and foreign knowledge to leverage innovative capabilities. The results suggest that MNEs have different levels of involvement with local productive and innovation systems in Brazil and India. Such heterogeneity in technological assets-seeking MNEs behavior combined with different country competences in attracting knowledge intensive foreign investments have created different opportunities for these countries to transfer technology and enter global value chains (GVCs).</span></p><p data-dcnode-id="3738" id="p0125"><span data-dcnode-id="3751" instrument_node="">In the case of China, innovation practices of MNEs have been mostly of “stand-alone” type in the three decades after the reforms. Foreign R&amp;D centers are reported to have limited interest in sharing knowledge with domestic firms and R&amp;D labs (</span><a class="workspace-trigger" data-dcnode-id="3749" href="#b0085" name="bb0085"><span data-dcnode-id="3750" instrument_node="">Chang et al., 2006</span></a><span data-dcnode-id="3748" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3746" href="#b0350" name="bb0350"><span data-dcnode-id="3747" instrument_node="">Zhou, 2006</span></a><span data-dcnode-id="3745" instrument_node="">). This may perhaps be explained by the strict intellectual property rights protection of these high-end MNEs against the indigenous firms. Consistently, Fu and Gong (this issue) found that R&amp;D activities of foreign invested firms at the industry level exert a negative spillover effect on technical change of indigenous firms. Foreign R&amp;D activities may well intensify competition for the limited domestic talent pool (</span><a class="workspace-trigger" data-dcnode-id="3740" href="#b0085" name="bb0085"><span data-dcnode-id="3744" instrument_node="">Chang </span><em data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">et al.</span></em><span data-dcnode-id="3741" instrument_node="">, 2006</span></a><span data-dcnode-id="3739" instrument_node="">) and crowd out indigenous firms from local labor, resource, and product markets.</span></p></section><section data-dcnode-id="3726" id="s0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3731"><span data-dcnode-id="3736" instrument_node="">(e)</span><span data-dcnode-id="3734" instrument_node="">. </span><span data-dcnode-id="3732" instrument_node="">Integration into global value chain and technology transfer</span></h3><p data-dcnode-id="3729" id="p0130"><span data-dcnode-id="3730" instrument_node="">International knowledge and innovation exchange and collaboration, through for example, inter-firm and intra-firm networks and Global Value Chains (GVC) has a significant impact on the innovation and technology upgrading of those firm that successfully integrate in the GVC. In developing countries this argument becomes even more stringent, given that a new frontier innovation is scarcely created and the bulk of knowledge and technology needs to be imported. For firms in developing countries integration in GVCs does not only represent a new market for their products, but it does also play a growing and crucial role to access knowledge and enhance learning and innovation. However, the literature has not yet clearly settled how innovation systems and GVCs interact, and how this interaction is likely to affect enterprise learning.</span></p><p data-dcnode-id="3727" id="p0135"><span data-dcnode-id="3728" instrument_node="">Pietrobelli and Rabellotti (this issue) argue that the different characteristics of the value chains have an impact on the mechanisms of learning prevailing in the chain. The learning mechanisms can be very different in the various forms of governance the chain may have: they can be the result of pressure to accomplish international standards or they can be facilitated by a direct involvement of the chain leaders when the competence of suppliers is low and the risk of unsatisfactory compliance is very high. When the competences among actors in the chain are complementary, the learning mechanism is mutual and based on intense face-to-face interactions. Secondly, as Innovation Systems (IS) open up to foreign knowledge, the relationship between GVCs and IS turns nonlinear and endogenous, with each mutually affecting the other. The authors expect that a well-structured and efficient IS may help to reduce the complexity of transactions, and, therefore, make transactions based on arms’ length or on relational forms of GVC governance possible. In other words, the risk of falling into a captive relationship, or even of being acquired by a leader, diminishes with a stronger IS. The system of organizations in charge of Metrology, Standards, Testing and Quality (MSTQ) plays a central role in this interaction, and may affect the convenience of different forms of governance for developing country firms’ learning and innovation.</span></p></section></section><section data-dcnode-id="3676" id="s0045"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3719"><span data-dcnode-id="3724" instrument_node="">4</span><span data-dcnode-id="3722" instrument_node="">. </span><span data-dcnode-id="3720" instrument_node="">Indigenous innovations, appropriate technology, and catching-up</span></h2><p data-dcnode-id="3710" id="p0140"><span data-dcnode-id="3718" instrument_node="">Despite the possible benefits from international technology transfer and the prospect of income convergence among countries brought about by this technology diffusion, empirical evidence on the gains from international knowledge spillovers is mixed.</span><a class="workspace-trigger" data-dcnode-id="3715" href="#fn5" name="bfn5"><sup data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">5</span></sup></a><span data-dcnode-id="3714" instrument_node=""> Cross country studies observed increasing income inequalities between rich and poor countries and the marginalization of the poorest African countries. One of the explanations of these income divergences is that foreign technology may be inappropriate with respect to the local socio-economic and technical conditions since technological change is a “localized learning by doing” process (</span><a class="workspace-trigger" data-dcnode-id="3712" href="#b0030" name="bb0030"><span data-dcnode-id="3713" instrument_node="">Atkinson &amp; Stiglitz, 1969</span></a><span data-dcnode-id="3711" instrument_node="">). All this points to the importance of indigenous innovation efforts for technology upgrading, and catching-up in particular.</span></p><p data-dcnode-id="3690" id="p0145"><span data-dcnode-id="3709" instrument_node="">There are different methods and technologies for production. Different technologies are specific to particular combinations of inputs (</span><a class="workspace-trigger" data-dcnode-id="3707" href="#b0055" name="bb0055"><span data-dcnode-id="3708" instrument_node="">Basu &amp; Weil, 1998</span></a><span data-dcnode-id="3706" instrument_node="">). For a particular country, appropriate technology is “a technology tailored to fit the psychosocial and biophysical context prevailing in a particular location and period” (</span><a class="workspace-trigger" data-dcnode-id="3704" href="#b0325" name="bb0325"><span data-dcnode-id="3705" instrument_node="">Stewart, 1983</span></a><span data-dcnode-id="3703" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3701" href="#b0335" name="bb0335"><span data-dcnode-id="3702" instrument_node="">Willoughby, 1990</span></a><span data-dcnode-id="3700" instrument_node="">). Foreign technology may not fit the specific socio-economic and technical context prevailing in the technology recipient. Moreover, because of the innovator’s incentive to maximize innovation returns, technical change will be biased to make optimal use of the conditions and factor suppliers in the country where the technology is developed (</span><a class="workspace-trigger" data-dcnode-id="3698" href="#b0005" name="bb0005"><span data-dcnode-id="3699" instrument_node="">Acemoglu, 2002</span></a><span data-dcnode-id="3697" instrument_node="">). Many developing countries use technologies developed in the North, but the factor endowments in the South are significantly different from those in the North. Therefore, these advanced technologies, no matter whether imported or transferred through FDI, will be inappropriate to the conditions in the South, and hence less productive (</span><a class="workspace-trigger" data-dcnode-id="3695" href="#b0005" name="bb0005"><span data-dcnode-id="3696" instrument_node="">Acemoglu, 2002</span></a><span data-dcnode-id="3694" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3692" href="#b0010" name="bb0010"><span data-dcnode-id="3693" instrument_node="">Acemoglu and Zilibotti, 1999</span></a><span data-dcnode-id="3691" instrument_node="">). The direction of technical change and, therefore, the inappropriateness of the foreign technology used in the South provides a powerful explanation of the increasing income gap across countries. This issue is especially important for the middle income countries trying to catch-up. Although imported technology may contribute to economic growth, the South using inappropriate technology will grow at a lower rate than the North, and the income gap will persist or even rise.</span></p><p data-dcnode-id="3688" id="p0150"><span data-dcnode-id="3689" instrument_node="">Fu and Gong (this issue) extend the existing literature to the industry level and argue that in a country that has abundant endowments of unskilled and semi-skilled labor, foreign technology may be less appropriate for the labor-intensive low-technology sector than indigenous technology. The appropriateness of foreign technology may increase as the technology-intensity of sectors rises. Since developing countries possess abundant unskilled and semi-skilled labor, indigenous technology will be biased toward this factor. In other words, technologies created in labor-abundant countries may be un-skilled labor augmenting. In low-technology industries that use un-skilled labor intensively, labor-augmenting indigenous technology will be more efficient than foreign technology. In contrast, foreign technology from industrial countries will be skilled-labor augmenting, and it will be more efficient than indigenous technology in the technology-intensive sector that uses skilled-labor intensively.</span></p><p data-dcnode-id="3677" id="p0155"><span data-dcnode-id="3687" instrument_node="">Moreover, the middle-income countries have accumulated a pool of knowledge and skills, and their factor endowments have become different from those of the least developing countries and of the industrialized countries. Therefore, the large middle-income economies are more likely to generate “intermediate” innovations with medium-level technology intensity than smaller economies with the same degree of capital scarcity (</span><a class="workspace-trigger" data-dcnode-id="3685" href="#b0140" name="bb0140"><span data-dcnode-id="3686" instrument_node="">Findlay, 1978</span></a><span data-dcnode-id="3684" instrument_node="">). These middle-income countries can reap the gains from investment in such technologies by selling patents, obtaining royalty payments or investing in smaller and less advanced developing countries (</span><a class="workspace-trigger" data-dcnode-id="3682" href="#b0290" name="bb0290"><span data-dcnode-id="3683" instrument_node="">Perez &amp; Soete, 1988</span></a><span data-dcnode-id="3681" instrument_node="">). Given the disparities in financial and human capital across different regional or economic/social groups in these large middle-income countries, Fu and Gong (this issue) expect that such intermediate technology will be generated by the relative skill and capital-rich group of firms in these economies. Using empirical evidence from a recent Chinese manufacturing firm-level panel dataset for 2001–05, they show that local firms, especially private and share-holding companies, dominate the technological frontier in the low- and medium-technology industries. Indigenous innovation and its diffusion are the driving forces of the dynamic technological capabilities building in the indigenous sector. Instead, foreign firms dominate the high-technology industry. Their study suggests a “two-leg forward” strategy for developing countries.</span><a class="workspace-trigger" data-dcnode-id="3678" href="#fn6" name="bfn6"><sup data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">6</span></sup></a></p></section><section data-dcnode-id="3633" id="s0050"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3670"><span data-dcnode-id="3675" instrument_node="">5</span><span data-dcnode-id="3673" instrument_node="">. </span><span data-dcnode-id="3671" instrument_node="">Foreign technology transfer and indigenous innovation: complements or substitutes</span></h2><p data-dcnode-id="3665" id="p0160"><span data-dcnode-id="3669" instrument_node="">What is the relationship between foreign technology transfer and indigenous innovation? Should a developing country rely solely on foreign technology because innovation is costly, risky, and path-dependent, or completely depend on indigenous innovation since foreign technologies do not fit the local socio-economic and technical context? Or should they pursue both strategies with different emphasis but at different development stages and in different industries, as suggested by </span><a class="workspace-trigger" data-dcnode-id="3667" href="#b0020" name="bb0020"><span data-dcnode-id="3668" instrument_node="">Aghion and Howitt (2005)</span></a><span data-dcnode-id="3666" instrument_node="">?</span></p><p data-dcnode-id="3639" id="p0165"><span data-dcnode-id="3664" instrument_node="">As discussed earlier, several conditions need to be fulfilled to obtain effective technology transfer to developing countries. A crucial condition is the level of absorptive capacity. Technology transfer can be partial because of the costs and variations in capacity to adopt new technology. The benefits from international knowledge transfer are hence subject to the existence of adequate absorptive capacity of the local firms and organizations—that is the ability of an organization to identify, assimilate, and exploit knowledge from its surrounding environment (</span><a class="workspace-trigger" data-dcnode-id="3662" href="#b0105" name="bb0105"><span data-dcnode-id="3663" instrument_node="">Cohen and Levinthal, 1989</span></a><span data-dcnode-id="3661" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3659" href="#b0170" name="bb0170"><span data-dcnode-id="3660" instrument_node="">Girma, 2005</span></a><span data-dcnode-id="3658" instrument_node="">). In turn, absorptive capacity depends on the human capital and R&amp;D expenditures of the receiving country or organization. Cross country studies find that there is a minimum necessary threshold level of human capital (</span><a class="workspace-trigger" data-dcnode-id="3656" href="#b0120" name="bb0120"><span data-dcnode-id="3657" instrument_node="">Eaton and Kortum, 1995</span></a><span data-dcnode-id="3655" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3653" href="#b0360" name="bb0360"><span data-dcnode-id="3654" instrument_node="">Xu, 2000</span></a><span data-dcnode-id="3652" instrument_node="">), and smaller firm-size or a lower share of skilled workers may hinder absorptive capacity (</span><a class="workspace-trigger" data-dcnode-id="3650" href="#b0170" name="bb0170"><span data-dcnode-id="3651" instrument_node="">Girma, 2005</span></a><span data-dcnode-id="3649" instrument_node="">). Another important component of absorptive capacity are the R&amp;D activities carried out by local firms that play the dual role of creating knowledge and promoting learning and absorptive capacity (</span><a class="workspace-trigger" data-dcnode-id="3647" href="#b0015" name="bb0015"><span data-dcnode-id="3648" instrument_node="">Aghion and Howitt, 1998</span></a><span data-dcnode-id="3646" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3644" href="#b0180" name="bb0180"><span data-dcnode-id="3645" instrument_node="">Griffith et al., 2004</span></a><span data-dcnode-id="3643" instrument_node="">). R&amp;D activities in local universities and research institutions also importantly contribute to a region’s (a country’s) absorptive capacity. In sum, there are multiple avenues whereby indigenous R&amp;D is necessary to obtain greater gains from foreign technology transfer. Li (this issue) and </span><a class="workspace-trigger" data-dcnode-id="3641" href="#b0165" name="bb0165"><span data-dcnode-id="3642" instrument_node="">Fu (2008)</span></a><span data-dcnode-id="3640" instrument_node=""> both support this hypothesis based on experiences from China. Foreign technology will generate a positive effect on local firms’ technological change and upgrading only insofar as sufficient indigenous R&amp;D activities and human capital are present.</span></p><p data-dcnode-id="3634" id="p0170"><span data-dcnode-id="3638" instrument_node="">On the other hand, would openness to FDI—and the ensuing foreign technology transfer—crowd out local R&amp;D? Sasidharan and Kathuria (this issue) address this major research question and examine the relationship between FDI and domestic firms’ R&amp;D in the post-liberalization regime in India. They find that foreign equity participation acts as a disincentive for investment in R&amp;D in most cases but for new local firms. This is consistent with </span><a class="workspace-trigger" data-dcnode-id="3636" href="#b0255" name="bb0255"><span data-dcnode-id="3637" instrument_node="">Lokshin, Gils, and Bauer (2008)</span></a><span data-dcnode-id="3635" instrument_node=""> who suggest that in Europe internal and external R&amp;D are complementary to each other, and that institutional and governance structures play a significant role in this process. Thus, it may well be that in India the new firms born during the liberalization regime with modern institutional and governance structures, are more likely to effectively integrate the benefits from domestic and foreign innovation efforts.</span></p></section><section data-dcnode-id="3584" id="s0055"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3627"><span data-dcnode-id="3632" instrument_node="">6</span><span data-dcnode-id="3630" instrument_node="">. </span><span data-dcnode-id="3628" instrument_node="">Conclusions</span></h2><p data-dcnode-id="3622" id="p0175"><span data-dcnode-id="3626" instrument_node="">The articles in this Special Section explore in depth the role of indigenous and foreign innovation efforts in technological change and catching up, and their interactions in the emerging economies. The evidence suggests that, despite the potential offered by globalization and a liberal trade regime, the benefits of international technology diffusion can only be delivered with parallel indigenous innovation efforts (Li, this issue; </span><a class="workspace-trigger" data-dcnode-id="3624" href="#b0165" name="bb0165"><span data-dcnode-id="3625" instrument_node="">Fu, 2008</span></a><span data-dcnode-id="3623" instrument_node="">) and the presence of modern institutional and governance structures and a conducive innovation system (Sasidharan and Kathuria, this issue, Pietrobelli and Rabellotti, this issue). In this sense, indigenous and foreign innovation efforts are complementary. Without proactive indigenous innovation efforts, foreign technology remains only static technology embedded in imported machines which will never turn into real indigenous technological capability. This conclusion is compounded by the expected inappropriateness of Northern technology for countries in the developing South, that calls for greater efforts to develop indigenous innovation crucial for technological change and catch up, especially in the middle income countries (Fu and Gong, this issue). Without indigenous innovation, the income gap between developed and developing countries can never be closed. This needed complementarity of indigenous and foreign innovation efforts is due to several self-reinforcing reasons.</span></p><p data-dcnode-id="3602" id="p0180"><span data-dcnode-id="3621" instrument_node="">First, technology diffusion and adoption is not costless and unconditional. The speed of diffusion and adoption, and thereby of technological capabilities building, depends on the firms’ absorptive capacity and complementary assets. Empirical evidence from the emerging economies illustrates this (</span><a class="workspace-trigger" data-dcnode-id="3619" href="#b0165" name="bb0165"><span data-dcnode-id="3620" instrument_node="">Fu, 2008</span></a><span data-dcnode-id="3618" instrument_node="">; Li, this issue). Second, only in the presence of local innovation capacity will MNEs adopt a more integrated innovation practice, which has greater linkages with the local economy and thereby enables greater opportunities of knowledge transfer (Franco </span><em data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">et al.</span></em><span data-dcnode-id="3615" instrument_node="">, this issue). Third, the greater use of external knowledge is accompanied by a parallel decrease of the presence of internal R&amp;D departments (</span><a class="workspace-trigger" data-dcnode-id="3613" href="#b0095" name="bb0095"><span data-dcnode-id="3614" instrument_node="">Chesbrough, 2003</span></a><span data-dcnode-id="3612" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3610" href="#b0200" name="bb0200"><span data-dcnode-id="3611" instrument_node="">Howells et al., 2004</span></a><span data-dcnode-id="3609" instrument_node="">), especially in research-intensive industries (</span><a class="workspace-trigger" data-dcnode-id="3607" href="#b0065" name="bb0065"><span data-dcnode-id="3608" instrument_node="">Bönte, 2003</span></a><span data-dcnode-id="3606" instrument_node="">). Studies reported in this special issue could not support the hypothesis of positive spillover effects from R&amp;D activities of MNEs on the innovation and technical change of local firms, due to significant disincentives on local firms and crowding out of local R&amp;D (Fu and Gong, this issue). Fourth, the inappropriateness of foreign technology in these emerging markets contributes to explain the poor statistical significance and even the negative effects of FDI spillover. As </span><a class="workspace-trigger" data-dcnode-id="3604" href="#b0240" name="bb0240"><span data-dcnode-id="3605" instrument_node="">Lall (2003)</span></a><span data-dcnode-id="3603" instrument_node=""> suggests, the higher a country moves up the industrial ladder, the more important local capabilities and innovation are. While FDI can facilitate the development of basic operational capabilities, they may be less efficient means of deepening capabilities. Collective indigenous innovation efforts are found to be a major driver of indigenous technical change (Fu and Gong, this issue).</span></p><p data-dcnode-id="3585" id="p0185"><span data-dcnode-id="3601" instrument_node="">Admittedly, developing countries face a dilemma of resource constraints to meet the high investment costs and high-risk challenges of innovation (</span><a class="workspace-trigger" data-dcnode-id="3599" href="#b0130" name="bb0130"><span data-dcnode-id="3600" instrument_node="">Erdilek, 1984</span></a><span data-dcnode-id="3598" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3596" href="#b0195" name="bb0195"><span data-dcnode-id="3597" instrument_node="">Hoekman et al., 2004</span></a><span data-dcnode-id="3595" instrument_node="">). The North–South technology gap in several industries remains remarkably persistent. Experiences from the emerging economies suggest that, in order to maximize the benefits from innovation and accelerate catching-up, the explicit and well-focused encouragement of indigenous innovation and acquisitions of foreign knowledge must work in parallel (Fu and Gong, this issue). Neither autonomous innovations nor FDI-reliant strategies can be used independently (</span><a class="workspace-trigger" data-dcnode-id="3593" href="#b0240" name="bb0240"><span data-dcnode-id="3594" instrument_node="">Lall, 2003</span></a><span data-dcnode-id="3592" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3590" href="#b0300" name="bb0300"><span data-dcnode-id="3591" instrument_node="">Pietrobelli, 2000</span></a><span data-dcnode-id="3589" instrument_node="">). Relying solely on one of them would not be optimal for technological capability development and catching up. The Chinese model (and to a lesser degree also the Indian and Brazilian ones) of walking on two legs proposes a strategy to maximize the benefits for the developing country. </span><em data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">How</span></em><span data-dcnode-id="3586" instrument_node=""> to select and shape the best combinations at different stages of development and for different countries and industries is a question of utmost relevance for future research. Fu and Gong (this issue) suggest that there are multi-tier choices of technology rather than the simple bi-dimensional North–South divide. Technologies developed in labor-rich emerging economies will be more appropriate to the factor endowments mix in other populous developing countries; and technologies created in land/resource-rich emerging economies will be more appropriate to other land/resource abundant countries. They will also be easier to diffuse and absorb by other local firms. Following this hint, South–South trade and FDI will represent effective vehicles for the diffusion of these technologies, and policies should follow suit consistently. In sum, the encouragement of indigenous R&amp;D and innovation activities remains an indispensable centrepiece of an innovation strategy targeting the assimilation and adaptation of foreign technology and the acceleration of technological learning and capabilities building.</span></p></section></div><section data-dcnode-id="3578" id="aep-acknowledgment-id17"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">Acknowledgments</span></h2><p data-dcnode-id="3579" id="p0195"><span data-dcnode-id="3580" instrument_node="">The authors thank participants at SLPTMD Oxford Conference (May 2008) and an anonymous referee for helpful and constructive comments and UNIDO for financial support. The opinions expressed in the paper are of the authors and do not necessarily reflect those of their respective organizations.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="3570"><button class="button button-anchor" data-dcnode-id="3574" type="button"><span class="button-text" data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">Special issue articles</span></span></button><button class="button button-anchor" data-dcnode-id="3571" type="button"><span class="button-text" data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="3569"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="468" id="bi0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="469" id="bs0005"><dl class="references" data-dcnode-id="470" id="reference-links-bs0005"><dt class="label" data-dcnode-id="3564"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="3565" href="#bb0005" id="ref-id-b0005"><span data-dcnode-id="3566" instrument_node="">Acemoglu, 2002</span></a></dt><dd class="reference" data-dcnode-id="3530"><div class="contribution" data-dcnode-id="3555"><span data-dcnode-id="3563" instrument_node="">D.</span><span data-dcnode-id="3561" instrument_node=""> </span><span data-dcnode-id="3559" instrument_node="">Acemoglu</span><div data-dcnode-id="3556"><strong class="title" data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">Directed technical change</span></strong></div></div><div class="host" data-dcnode-id="3535"><span data-dcnode-id="3554" instrument_node="">Review of Economic Studies</span><span data-dcnode-id="3552" instrument_node="">, </span><span data-dcnode-id="3550" instrument_node="">69</span><span data-dcnode-id="3548" instrument_node=""> (</span><span data-dcnode-id="3546" instrument_node="">2002</span><span data-dcnode-id="3544" instrument_node="">)</span><span data-dcnode-id="3542" instrument_node="">, pp. </span><span data-dcnode-id="3540" instrument_node="">781</span><span
