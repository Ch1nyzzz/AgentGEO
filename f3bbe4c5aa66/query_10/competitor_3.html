Features%2520and%2520impacts%2520of%2520the%2520internationalisation%2520of%2520RD%2520by%2520transnational%2520corporations%3A%2520Chinas%2520case.%2520In%2520Globalisation%2520of%2520RD%2520and%2520Developing%2520Countries%2C%2520New%2520York%2520and%2520Geneva%3A%2520UNCTAD%2C%2520United%2520Nations." rel="noopener noreferrer" target="_blank"><span data-dcnode-id="474" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="343" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="344"><div class="PageDivider" data-dcnode-id="467"></div><header data-dcnode-id="464" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Cited by (358)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="345"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="346"><ul data-dcnode-id="352"><li class="ListArticleItem" data-dcnode-id="443"><div class="sub-heading" data-dcnode-id="458"><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0166497222000232" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="462" id="citing-articles-article0-title"><span data-dcnode-id="463" instrument_node="">What is driving robotisation in the automotive value chain? Empirical evidence on the role of FDIs and domestic capabilities in technology adoption</span></h3></a><div class="article-source ellipsis" data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">2022, Technovation</span></div></div><div class="buttons" data-dcnode-id="452"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="453" type="button"><span class="button-link-text" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="454" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="455"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="444"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="445" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="446"><p data-dcnode-id="447" id="abspara0010"><span data-dcnode-id="451" instrument_node="">With a focus on a key production technology of the fourth industrial revolution, we look at the measurable impact of inward foreign direct investments (FDIs) and other host-country-specific factors on the adoption of industrial robots along two main segments of the automotive value chain. We find that FDIs </span><em data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">per se</span></em><span data-dcnode-id="448" instrument_node=""> do not have a significant effect on the adoption of industrial robots in the host country, but they become significant when interacted with proxies of host countries’ innovation capabilities. Using disaggregated data on robotisation and controlling for endogeneity, we also find that the combination of FDIs and local innovation capacity only impact on robot adoption in the case of the automotive assembly segment. Instead, host-country-specific factors characterising the local industrial eco-system drive robotisation in the components supply segment of the automotive value chain more than in its assembly segment. This confirms the importance of domestic productive capabilities development in the process of manufacturing automation, but also reveals that remarkable heterogeneity exists within the automotive sectoral value chain in terms of drivers of technology adoption.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="425"><div class="sub-heading" data-dcnode-id="437"><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2665972722000095" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="441" id="citing-articles-article1-title"><span data-dcnode-id="442" instrument_node="">Indigenous versus foreign innovation and ecological footprint: Dynamic threshold effect of corruption</span></h3></a><div class="article-source ellipsis" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">2022, Environmental and Sustainability Indicators</span></div></div><div class="buttons" data-dcnode-id="431"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="432" type="button"><span class="button-link-text" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="433" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="434"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="426"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="427" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="428"><p data-dcnode-id="429" id="abspara0010"><span data-dcnode-id="430" instrument_node="">As humanity's quest for natural resources is progressively exceeding Earth's biological rate of regeneration, environmental issues such as greenhouse gas accumulation in the atmosphere, ocean acidification and groundwater depletion is accelerating. The ecological footprint provides a method for measuring how much lands can support the consumption of the natural resources. This study examines in depth the role of indigenous and foreign innovation on ecological footprint as well as the potential interaction between them in 105 countries classified into developed and developing countries. In addition, we consider the effect of corruption on ecological footprint using dynamic panel threshold regression over the period from 1992 to 2017. The Cross-Sectionally Augmented Autoregressive Distributed Lag (CS-ARDL) estimator is used to tackle the heterogeneity and cross-sectional dependence in the data. The results demonstrate that indigenous and foreign innovations and their interaction significantly reduce ecological footprint in developed countries. By contrast, indigenous and foreign innovations have a crowding-out effect on ecological footprint in developing countries. Based on the dynamic threshold regression results, the indigenous and foreign innovations and their interaction significantly increase ecological footprint of developed countries when corruption crosses the threshold point. In developing countries, when corruption exceeds the threshold point, the inhibiting effects of indigenous and foreign innovations and their interaction further increase. For control variables, economic growth and urbanization significantly increase ecological footprint of these countries. Finally, developed and developing countries should collaborate to build comprehensive sustainable growth mechanisms in order to make resource-friendly technologies affordable for all income level countries.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="407"><div class="sub-heading" data-dcnode-id="419"><a data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0925527322000275" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="423" id="citing-articles-article2-title"><span data-dcnode-id="424" instrument_node="">Exploring the mediating effect of managerial ability on knowledge diversity and innovation performance in reverse cross-border M&amp;amp;As: Evidence from Chinese manufacturing corporations</span></h3></a><div class="article-source ellipsis" data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">2022, International Journal of Production Economics</span></div></div><div class="buttons" data-dcnode-id="413"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="414" type="button"><span class="button-link-text" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="415" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="416"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="408"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="409" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="410"><p data-dcnode-id="411" id="abspara0010"><span data-dcnode-id="412" instrument_node="">There has been an increasing trend that multinational corporations from emerging economies (EMNCs) undertake cross-border mergers and acquisitions (M&amp;As) with corporations in developed economies. As a burgeoning pattern of outward direct investment, reverse cross-border M&amp;As enable EMNCs to access technological resources that are conducive to enhancing innovation efficiency. Deal activity involving Western corporations buying into emerging economies has been extensively studied; conversely, the nature and consequences of reverse cross-border M&amp;As can hardly be explained by internationalization theories. Furthermore, extant studies paid less attention to how diversified knowledge resources affect EMNCs' innovation performance. In contrast, heterogeneous and diversified knowledge has been proven to be vital for generating novel knowledge combinations. We also believe that managerial ability will affect how acquirers reorganize and integrate knowledge, thereby influencing post-acquisition innovation performance. Drawing from the knowledge-based view and upper echelon theory, this study adopted the data of Chinese listed manufacturing corporations that engaged in reverse cross-border M&amp;As from 2010 to 2018 to explore the influencing mechanisms between the two dimensions of knowledge diversity and innovation performance of multinational manufacturing corporations from emerging economies, while managerial ability was additionally analyzed as a mediator of the above relationships. The empirical findings suggested that manufacturing corporations with higher knowledge diversity present better post-acquisition innovation performance. Managerial ability plays a fully mediating effect between the knowledge heterogeneity and innovation performance of EMNCs but imposes a partially mediating effect between technological diversity and innovation performance. The findings help enrich the understanding of the integrating process of reverse cross-border M&amp;A and the endogenous function mechanism of how knowledge diversity and managerial ability affect the promotion of EMNCs’ innovation performance.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="389"><div class="sub-heading" data-dcnode-id="401"><a data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0959652622007247" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="405" id="citing-articles-article3-title"><span data-dcnode-id="406" instrument_node="">Pollution halo or pollution haven? A CGE appraisal for Iran</span></h3></a><div class="article-source ellipsis" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">2022, Journal of Cleaner Production</span></div></div><div class="buttons" data-dcnode-id="395"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="396" type="button"><span class="button-link-text" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="397" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="398"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="390"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="391" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="392"><p data-dcnode-id="393" id="abspara0010"><span data-dcnode-id="394" instrument_node="">The present study aimed to assess the environmental effects of FDI considering the pollution haven and halo hypotheses. The originality of this article lies in the fact that FDI modeling was done using environmental CGE models, including the modeling of scale, composition, and technique effects of FDI. We execute four scenarios that allow us to consider the impacts of FDI inflow. The results of the first and second scenarios (50% and 100% shock to FDI, respectively) revealed that CO2 emissions increased; however, the increase was more intense in the second scenario. A comparison of these two scenarios indicated that higher FDI leads to higher pollution. In addition, the scale and composition effects were positive, and the technique effect was negative in both scenarios. Nonetheless, the pollution haven hypothesis was confirmed. The third and fourth scenarios (100% shock to FDI with 2.5% and 5% energy efficiency improvement) showed that CO2 emissions increased at a slower rate compared with the first and second scenarios. Moreover, the scale and composition effects were positive, while the technique effect was negative. The comparison of the third and fourth scenarios revealed that higher energy efficiency growth led to decreased CO2 emissions; also, the technique effect became more negative, the scale effect became more positive, and the composition effect decreased. Overall, provided that FDI was accompanied by improvement of energy efficiency, carbon intensity decreased in a way that might lead to a reduction in CO2 emissions. We found that if energy efficiency improvement reached more than 10%, pollution resulting from FDI became negative, and the technique and composition effects nullified the scale effect. Therefore, the pollution halo hypothesis was confirmed. Based on these results, it is recommended that policymakers seek energy-efficient investment with high technology levels to improve the environmental quality and lower the use of polluting energy inputs such as gas.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="371"><div class="sub-heading" data-dcnode-id="383"><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0197397522000376" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="387" id="citing-articles-article4-title"><span data-dcnode-id="388" instrument_node="">Land marketization and urban innovation capability: Evidence from China</span></h3></a><div class="article-source ellipsis" data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">2022, Habitat International</span></div></div><div class="buttons" data-dcnode-id="377"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="378" type="button"><span class="button-link-text" data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="379" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="380"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="372"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="373" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="374"><p data-dcnode-id="375" id="abspara0010"><span data-dcnode-id="376" instrument_node="">The economic effect of land marketization reform has been widely discussed, but its effect on urban innovation capability still lacks adequate investigation. Based on urban panel data and micro-industrial enterprise data of China, we investigated how land marketization affects urban innovation capability. Our results demonstrate that land marketization has promoted urban innovation capability, and the effect presents temporal and spatial heterogeneity. The results remain robust when considering different marketization measurement methods and endogenous problems. Mechanism analysis indicates that land marketization promotes urban innovation capability mainly through the financing and selection effects; that is, land marketization eases urban financing constraints and then increases innovation investment (financing effect), while enterprises are forced to innovate to survive in a competitive land market (selection effect). An effective way to stimulate urban innovation capability would be to establish and improve land market competition and market transaction mechanisms. For China, further deepening the market-oriented reform of land factors is the crux of realizing high-quality development.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="353"><div class="sub-heading" data-dcnode-id="365"><a data-dcnode-id="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0040162522000622" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="369" id="citing-articles-article5-title"><span data-dcnode-id="370" instrument_node="">Appropriate technology and energy security: From the perspective of biased technological change</span></h3></a><div class="article-source ellipsis" data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">2022, Technological Forecasting and Social Change</span></div></div><div class="buttons" data-dcnode-id="359"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="360" type="button"><span class="button-link-text" data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="361" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="362"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="354"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="355" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="356"><p data-dcnode-id="357" id="spara014"><span data-dcnode-id="358" instrument_node="">The heavy import dependence on oil and natural gas has threatened China's energy security. This paper discusses how to reduce the input preference for import-dependent energy (i.e., oil and natural gas) in China's manufacturing sector by selecting appropriate technology. Firstly, we estimate the biased level of import-dependent energy through a heterogeneous stochastic frontier analysis model, and employ the system generalized method of moments (SGMM) strategy to investigate the effects of various sources of technological change on the biased level of import-dependent energy. Secondly, we examine the moderating effect of the absorptive capacity on the biased level of import-dependent energy. The results show that both the horizontal and backward technological spillover effects from foreign-funded enterprises and technology purchase significantly reduce the biased level of import-dependent energy, while the forward technological spillovers of foreign-funded enterprises, the learning-by-exporting effect and the command-and-control policy increase the biased level. Except for indigenous technological innovation, improving the absorptive capacity will magnify the impact of other sources of technological change. Therefore, the government should encourage technology purchase, invite high-quality foreign-funded enterprises, and optimize the direction of indigenous technological innovation.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-79957950994%26md5%3D3126618bae0f9f6e736eaf4aab6895" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="350" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="351"></path></svg><span class="button-alternative-text" data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="277"><dl class="footnote" data-dcnode-id="326"><dt class="footnote-label" data-dcnode-id="339"><sup data-dcnode-id="340"><a data-dcnode-id="341" href="#bfn1"><span data-dcnode-id="342" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="327"><p data-dcnode-id="328"><span data-dcnode-id="338" instrument_node="">For surveys of the literature on spillovers from FDI see </span><a class="workspace-trigger" data-dcnode-id="336" href="#b0175" name="bb0175"><span data-dcnode-id="337" instrument_node="">Görg and Strobl, 2001</span></a><span data-dcnode-id="335" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="333" href="#b0060" name="bb0060"><span data-dcnode-id="334" instrument_node="">Blomström and Kokko, 1998</span></a><span data-dcnode-id="332" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="330" href="#b0270" name="bb0270"><span data-dcnode-id="331" instrument_node="">Meyer (2004)</span></a><span data-dcnode-id="329" instrument_node="">.</span></p></dd></dl><dl class="footnote" data-dcnode-id="318"><dt class="footnote-label" data-dcnode-id="322"><sup data-dcnode-id="323"><a data-dcnode-id="324" href="#bfn2"><span data-dcnode-id="325" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="319"><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">South Africa and Russia are often included in this group. However, in this paper we rather focus on the two largest Asian countries and on Brazil, on which new evidence has become available.</span></p></dd></dl><dl class="footnote" data-dcnode-id="310"><dt class="footnote-label" data-dcnode-id="314"><sup data-dcnode-id="315"><a data-dcnode-id="316" href="#bfn3"><span data-dcnode-id="317" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="311"><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">In 2009 China’s GDP grew at 8.7%, and India’s at 5.7.</span></p></dd></dl><dl class="footnote" data-dcnode-id="302"><dt class="footnote-label" data-dcnode-id="306"><sup data-dcnode-id="307"><a data-dcnode-id="308" href="#bfn4"><span data-dcnode-id="309" instrument_node="">4</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="303"><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">These are patents applied for/granted in the US, Europe and Japan.</span></p></dd></dl><dl class="footnote" data-dcnode-id="286"><dt class="footnote-label" data-dcnode-id="298"><sup data-dcnode-id="299"><a data-dcnode-id="300" href="#bfn5"><span data-dcnode-id="301" instrument_node="">5</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="287"><p data-dcnode-id="288"><a class="workspace-trigger" data-dcnode-id="296" href="#b0175" name="bb0175"><span data-dcnode-id="297" instrument_node="">Görg and Strobl, 2001</span></a><span data-dcnode-id="295" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="293" href="#b0060" name="bb0060"><span data-dcnode-id="294" instrument_node="">Blomström and Kokko, 1998</span></a><span data-dcnode-id="292" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="290" href="#b0270" name="bb0270"><span data-dcnode-id="291" instrument_node="">Meyer (2004)</span></a><span data-dcnode-id="289" instrument_node=""> are excellent surveys of the literature on spillovers from FDI.</span></p></dd></dl><dl class="footnote" data-dcnode-id="278"><dt class="footnote-label" data-dcnode-id="282"><sup data-dcnode-id="283"><a data-dcnode-id="284" href="#bfn6"><span data-dcnode-id="285" instrument_node="">6</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="279"><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">This conclusion is also supported by other studies that show how firms have little difficulty in absorbing technological knowledge purchased domestically (Li, this issue).</span></p></dd></dl></div><a class="anchor abstract-link" data-dcnode-id="274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0305750X11000647"><span class="anchor-text" data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="271"><span class="copyright-line" data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Copyright © 2011 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="126"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="127"><section class="SpecialIssueArticles" data-dcnode-id="151" id="special-issue-articles"><div class="part-of-issue u-padding-s-bottom" data-dcnode-id="237"><h2 class="part-of-issue-text u-h4" data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Part of special issue:</span></h2><div data-dcnode-id="243"><a class="part-of-issue-title" data-dcnode-id="265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/journal/0305750X/39/7"><span data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Special Section (pp. 1204-1270): Foreign Technology and Indigenous Innovation in the Emerging Economies</span></span></a><div class="part-of-issue-editors" data-dcnode-id="244"><span data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Edited by </span></span><div class="authors" data-dcnode-id="245"><span data-
