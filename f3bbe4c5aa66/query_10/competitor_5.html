</span><meta content="The relationship between technological changeand environmental policy has receivedincreasing attention from scholars and policymakers alike over the past ten years. This ispartly because the environmental impacts ofsocial activity are significantly affected bytechnological change, and partly becauseenvironmental policy interventions themselvescreate new constraints and incentives thataffect the process of technologicaldevelopments. Our central purpose in thisarticle is to provide environmental economistswith a useful guide to research ontechnological change and the analytical toolsthat can be used to explore further theinteraction between technology and theenvironment. In Part 1 of the article, weprovide an overview of analytical frameworksfor investigating the economics oftechnological change, highlighting key issuesfor the researcher. In Part 2, we turn ourattention to theoretical analysis of theeffects of environmental policy ontechnological change, and in Part 3, we focuson issues related to the empirical analysis oftechnology innovation and diffusion. Finally,we conclude in Part 4 with some additionalsuggestions for research." data-dcnode-id="4396" name="dc.description"><span data-dcnode-id="4395" instrument_node="">

</span><meta content="Environmental Policy and Technological Change - Environmental and Resource Economics" data-dcnode-id="4024" property="og:title"><span data-dcnode-id="4023" instrument_node="">
</span><meta content="The relationship between technological changeand environmental policy has receivedincreasing attention from scholars and policymakers alike over the past ten years. This ispartly because the environmental impacts ofsocial activity are significantly affected bytechnological change, and partly becauseenvironmental policy interventions themselvescreate new constraints and incentives thataffect the process of technologicaldevelopments. Our central purpose in thisarticle is to provide environmental economistswith a useful guide to research ontechnological change and the analytical toolsthat can be used to explore further theinteraction between technology and theenvironment. In Part 1 of the article, weprovide an overview of analytical frameworksfor investigating the economics oftechnological change, highlighting key issuesfor the researcher. In Part 2, we turn ourattention to theoretical analysis of theeffects of environmental policy ontechnological change, and in Part 3, we focuson issues related to the empirical analysis oftechnology innovation and diffusion. Finally,we conclude in Part 4 with some additionalsuggestions for research." data-dcnode-id="4022" property="og:description"><span data-dcnode-id="4021" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="3583" data-gtm-vis-first-on-screen-50443292_562="566" data-gtm-vis-first-on-screen-50443292_563="566" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="566" data-gtm-vis-recent-on-screen-50443292_563="566" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="3584" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3588" id="Abs1"><span data-dcnode-id="3589" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="3585" id="Abs1-content"><p data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">The relationship between technological changeand environmental policy has receivedincreasing attention from scholars and policymakers alike over the past ten years. This ispartly because the environmental impacts ofsocial activity are significantly affected bytechnological change, and partly becauseenvironmental policy interventions themselvescreate new constraints and incentives thataffect the process of technologicaldevelopments. Our central purpose in thisarticle is to provide environmental economistswith a useful guide to research ontechnological change and the analytical toolsthat can be used to explore further theinteraction between technology and theenvironment. In Part 1 of the article, weprovide an overview of analytical frameworksfor investigating the economics oftechnological change, highlighting key issuesfor the researcher. In Part 2, we turn ourattention to theoretical analysis of theeffects of environmental policy ontechnological change, and in Part 3, we focuson issues related to the empirical analysis oftechnology innovation and diffusion. Finally,we conclude in Part 4 with some additionalsuggestions for research.</span></p></div></div></section><span data-dcnode-id="3582" instrument_node="">
