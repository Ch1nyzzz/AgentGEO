</span><h1 data-dcnode-id="2589" id="screen_reader_content"><span data-dcnode-id="2593" instrument_node="">
                The labor market in Germany,
                    2000–2018                                    </span><span class="version-label" data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">Updated</span></span><span data-dcnode-id="2590" instrument_node="">
</span></h1><span data-dcnode-id="2588" instrument_node="">
</span><h3 data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">The transformation of a notoriously rigid labor
                        market into a role model of its own style is essentially complete</span></h3><span data-dcnode-id="2585" instrument_node="">
</span></div><span data-dcnode-id="2583" instrument_node="">
</span><div class="article-user-list" data-dcnode-id="2541"><span data-dcnode-id="2582" instrument_node="">

</span><a data-dcnode-id="2531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.iza.org/articles/the-labor-market-in-germany"><span data-dcnode-id="2532" instrument_node="">one-pager</span></a><span data-dcnode-id="2530" instrument_node="">
</span><a class="active" data-dcnode-id="2528" href="javascript:void(0)"><span data-dcnode-id="2529" instrument_node="">full article</span></a><span data-dcnode-id="2527" instrument_node="">

</span></div><span data-dcnode-id="2523" instrument_node="">
</span><h2 data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Elevator pitch</span></h2><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">The EU's largest economy, Germany, has managed
                        to find an effective and unique combination of flexibility and rigidity in
                        its labor market. Institutions that typically characterize rigid labor
                        markets are effectively balanced by flexibility instruments. Important
                        developments since 2000 include steadily decreasing unemployment rates
                        (since 2005), increasing participation rates, and (since 2011) moderately
                        increasing labor compensation. The German labor market was remarkably robust
                        to the impacts of the Great Recession, thus providing a useful case study
                        for other developed countries.</span></p><span data-dcnode-id="2517" instrument_node="">
</span><figure data-dcnode-id="2513"><span data-dcnode-id="2516" instrument_node="">
</span><img alt="Aggregate unemployment rate and real
                        average wages" data-dcnode-id="2515" data-target="" id="izawol.379-figure-000001" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.iza.org/uploads/articles/516/images/IZAWOL.379.ga.png&amp;raw"><span data-dcnode-id="2514" instrument_node="">
</span></figure><span data-dcnode-id="2512" instrument_node="">
</span><h2 data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Key findings</span></h2><span data-dcnode-id="2509" instrument_node="">
</span><div class="article-columns" data-dcnode-id="2468"><span data-dcnode-id="2508" instrument_node="">
</span><div class="clumn" data-dcnode-id="2491"><span data-dcnode-id="2507" instrument_node="">
</span><h3 data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Pros</span></h3><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">Unemployment is generally low, but especially youth
                                    unemployment is very low by international comparison, which
                                    appears related to the dual apprenticeship system.</span></p><span data-dcnode-id="2501" instrument_node="">
</span><p data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">While participation rates have been basically increasing across
                                    the board since the mid-2000s, the increase has been
                                    particularly strong among older workers.</span></p><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">Considering aggregate figures, Germany’s labor market was
                                    hardly affected by the Great Recession—especially in terms of
                                    aggregate employment.</span></p><span data-dcnode-id="2495" instrument_node="">
</span><p data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">The labor market remains rather rigid by international
                                    comparison, but the country manages to avoid many negative side
                                    effects that are typically associated with rigidity.</span></p><span data-dcnode-id="2492" instrument_node="">
</span></div><span data-dcnode-id="2490" instrument_node="">
</span><div class="clumn" data-dcnode-id="2470"><span data-dcnode-id="2489" instrument_node="">
</span><h3 data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Cons</span></h3><span data-dcnode-id="2486" instrument_node="">
</span><p data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">The trend toward favoring academic education over vocational
                                    training threatens the important role of the dual apprenticeship
                                    system.</span></p><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Given comparatively high labor costs it is important that
                                    Germany remains productive and innovative.</span></p><span data-dcnode-id="2480" instrument_node="">
</span><p data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">The return of protectionism is a threat to the German model,
                                    which continues to rely to a substantial extent on exports and
                                    imports.</span></p><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">The reduction of unemployment during the last decade is mostly
                                    driven by demographic factors in East Germany; the unemployed do
                                    not proportionally benefit from the increase in
                                employment.</span></p><span data-dcnode-id="2474" instrument_node="">
</span><p data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">Demographic change jeopardizes the sustainability of the
                                    country’s success, especially when taking structural
                                    disadvantages in immigration policy into account.</span></p><span data-dcnode-id="2471" instrument_node="">
</span></div><span data-dcnode-id="2469" instrument_node="">
</span></div><span data-dcnode-id="2467" instrument_node="">
</span><h2 data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Author's main message</span></h2><span data-dcnode-id="2464" instrument_node="">
</span><p data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">The German labor market is in good shape:
                        unemployment is low, participation rates are high, and wages are increasing
                        moderately. The labor market has also been remarkably robust to policy
                        experiments, such as the introduction of a statutory minimum wage, and to
                        demand side shocks, such as the Great Recession. However, future risks are
                        on the European and global level, including issues such as Brexit, the
                        stability of the EU and the Eurozone, and the return of protectionism.
                        Additionally, the country appears relatively unprepared for the likely
                        impacts of demographic and technological change.</span></p><span data-dcnode-id="2461" instrument_node="">
</span><h2 data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Motivation</span></h2><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2457"></p><div data-dcnode-id="2448"><p data-dcnode-id="2449"><span data-dcnode-id="2456" instrument_node="">Germany is the EU's largest economy. As such,
                        the country's development from the “sick man of Europe” in the early 2000s
                        to an “economic superstar” has received global attention </span><a class="text-reference" data-dcnode-id="2454" data-type="bible" href="#izawol.379-biblStruct-000003"><span data-dcnode-id="2455" instrument_node="">[1]</span></a><span data-dcnode-id="2453" instrument_node="">. The country not only
                        successfully managed to escape the unemployment trap it was caught in for
                        decades, but it also performed exceptionally well during and after the Great
                        Recession. It is therefore even argued that Germany could be a reference
                        model for other countries with labor market turmoil. However, it appears at
                        least difficult, if not impossible, to effectively replicate the German
                        model </span><a class="text-reference" data-dcnode-id="2451" data-type="bible" href="#izawol.379-biblStruct-000004"><span data-dcnode-id="2452" instrument_node="">[2]</span></a><span data-dcnode-id="2450" instrument_node="">. This article focuses on
                        important developments in the German labor market during the period from
                        2000 to 2018. The successful transformation of a notoriously rigid labor
                        market into a role model of its own style coincides with the labor market
                        reforms in the mid-2000s.</span></p></div><p data-dcnode-id="2447"></p><span data-dcnode-id="2446" instrument_node="">
</span><h2 data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Discussion of pros and cons</span></h2><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2442"></p><div data-dcnode-id="2267"><p data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">For many years, the key challenge for Germany
                        was to reduce high and persistent unemployment. Overcoming this problem was
                        crucial for the sick man of Europe. Although the phenomenon of successive,
                        recession-related waves of increasing unemployment was viewed as a European
                        problem in general, Germany served as the prime example for the pattern of
                        high and rising unemployment.</span></p><p data-dcnode-id="2435"><span data-dcnode-id="2439" instrument_node="">The continuous rise in unemployment until the
                        mid-2000s can clearly be seen in </span><a class="scroll-to-img" data-dcnode-id="2437" data-type="figure" href="#izawol.379-figure-000003"><span data-dcnode-id="2438" instrument_node="">Figure 1</span></a><span data-dcnode-id="2436" instrument_node="">. Germany's high
                        unemployment rate has often been linked to high levels of employment
                        protection, high labor costs, and strict regulation of labor markets. As a
                        result, aggregate unemployment figures peaked in 2005. During that year,
                        almost five million workers were on average unemployed in Germany. Since
                        then, this number has been more than halved to about 2.3 million unemployed
                        persons in 2018.</span></p><div class="figures" data-dcnode-id="2432"><p class="article_image" data-dcnode-id="2433"><img alt="Unemployment" data-dcnode-id="2434" data-target="" id="izawol.379-figure-000003" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.iza.org/uploads/articles/516/images/IZAWOL.379-chart1.png&amp;raw"></p></div><div data-dcnode-id="2356"><h3 data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">Labor market reforms and beyond:
                            Combining flexibility and rigidity</span></h3><p data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">How did Germany manage this U-turn in the
                            labor market? The short answer is that it has found a way to balance
                            institutions that typically characterize rigid labor markets on the one
                            hand with flexibility instruments on the other hand.</span></p><p data-dcnode-id="2420"><span data-dcnode-id="2427" instrument_node="">In this context, the labor market reforms
                            (“Hartz reforms”) certainly play an important role. Introduced between
                            2003 and 2005, they mainly comprised the following changes </span><a class="text-reference" data-dcnode-id="2425" data-type="bible" href="#izawol.379-biblStruct-000004"><span data-dcnode-id="2426" instrument_node="">[2]</span></a><span data-dcnode-id="2424" instrument_node="">, </span><a class="text-reference" data-dcnode-id="2422" data-type="bible" href="#izawol.379-biblStruct-000005"><span data-dcnode-id="2423" instrument_node="">[3]</span></a><span data-dcnode-id="2421" instrument_node="">: with the reforms, employment
                            services and related activities became fundamentally restructured,
                            flexible forms of employment such as fixed-term contracts, temporary
                            agency work, and marginal employment became more attractive,
                            unemployment benefit duration for the elderly was lowered, and all
                            welfare recipients considered able to work were included in activation
                            schemes. A key element was the abolition of means-tested unemployment
                            assistance, an intermediate form of unemployment compensation, which in
                            principle could be received without a time limit until retirement age.
                            Item-wise approved welfare payments were replaced by a monthly lump-sum.
                            In total, these changes led to a significant reduction of long-term
                            unemployment benefits and stricter monitoring activities for the
                            unemployed.</span></p><p data-dcnode-id="2409"><span data-dcnode-id="2419" instrument_node="">As a result, the labor market reforms
                            successfully addressed the German labor supply problem as, among other
                            things, incentives for job search were improved, ineffective policy
                            instruments such as job creation schemes were abolished, and the
                            requirements for the unemployed to prove ongoing job search efforts were
                            enforced </span><a class="text-reference" data-dcnode-id="2417" data-type="bible" href="#izawol.379-biblStruct-000004"><span data-dcnode-id="2418" instrument_node="">[2]</span></a><span data-dcnode-id="2416" instrument_node="">. These changes improved the
                            functioning of the German labor market by increasing the effectiveness
                            of active labor market policy and, most importantly, lowering
                            reservation wages of the unemployed </span><a class="text-reference" data-dcnode-id="2414" data-type="bible" href="#izawol.379-biblStruct-000005"><span data-dcnode-id="2415" instrument_node="">[3]</span></a><span data-dcnode-id="2413" instrument_node="">. Hence, an accelerated
                            matching between unemployed workers and job vacancies was observed. Also
                            a decrease in separation rates after the reforms, especially among the
                            elderly, has substantially contributed to declining unemployment </span><a class="text-reference" data-dcnode-id="2411" data-type="bible" href="#izawol.379-biblStruct-000006"><span data-dcnode-id="2412" instrument_node="">[4]</span></a><span data-dcnode-id="2410" instrument_node="">.</span></p><p data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">However, a closer inspection also indicates
                            that the returns to the reforms occurred mainly during the first three
                            to four years after their implementation, at least with regard to the
                            reduction of unemployment. Although overall unemployment has continued
                            to decrease by almost a million since 2008, this decline is
                            predominantly due to a decline of unemployment in East Germany. In West
                            Germany, however, the reduction of unemployment has been largely
                            stagnating since then. The decline of unemployment in East Germany is
                            mainly driven by demographic reasons and has little to do with the
                            reforms. The generation who lost their jobs in East Germany during the
                            economic transition after the fall of the Berlin Wall is gradually
                            entering retirement age. One should note that the employment rate in the
                            former German Democratic Republic was above 90%. During the economic
                            transition, it rapidly adjusted to the West German level, leaving behind
                            a substantial number of redundant workers who ended up as long-term
                            unemployed.</span></p><p data-dcnode-id="2402"><span data-dcnode-id="2406" instrument_node="">In the absence of the demographic effect,
                            the German labor market as a whole would look less rosy than it actually
                            does. The unemployed are obviously not proportionally benefiting from
                            the remarkable increase in employment that occurred during the last
                            decade. Paradoxically, while unemployment has been stagnating in West
                            Germany in recent years and employment has been steadily rising, almost
                            the opposite holds in East Germany: unemployment has been falling
                            remarkably in East Germany, although employment has been increasing only
                            modestly (see </span><a class="scroll-to-img" data-dcnode-id="2404" data-type="figure" href="#izawol.379-figure-000004"><span data-dcnode-id="2405" instrument_node="">Figure 2</span></a><span data-dcnode-id="2403" instrument_node="">).</span></p><div class="figures" data-dcnode-id="2399"><p class="article_image" data-dcnode-id="2400"><img alt="Unemployment and employment in East Gemany
                        and West Germany (2007 = 100)" data-dcnode-id="2401" data-target="" id="izawol.379-figure-000004" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.iza.org/uploads/articles/516/images/IZAWOL.379-chart2.png&amp;raw"></p></div><p data-dcnode-id="2391"><span data-dcnode-id="2398" instrument_node="">Beyond that, additional elements that have
                            developed more gradually should also be viewed as effective responses to
                            labor market rigidities in Germany. One example is the country's
                            vocational education and training system. </span><a class="scroll-to-img" data-dcnode-id="2396" data-type="figure" href="#izawol.379-figure-000005"><span data-dcnode-id="2397" instrument_node="">Figure 3</span></a><span data-dcnode-id="2395" instrument_node=""> shows that, although following a
                            similar pattern, youth unemployment rates have been consistently lower
                            than adult unemployment rates during the entire period from 2000 to
                            2018. This is quite exceptional in the European context </span><a class="text-reference" data-dcnode-id="2393" data-type="bible" href="#izawol.379-biblStruct-000007"><span data-dcnode-id="2394" instrument_node="">[5]</span></a><span data-dcnode-id="2392" instrument_node="">.</span></p><div class="figures" data-dcnode-id="2388"><p class="article_image" data-dcnode-id="2389"><img alt="Aggregate unemployment rate versus youth
                        unemployment rate" data-dcnode-id="2390" data-target="" id="izawol.379-figure-000005" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.iza.org/uploads/articles/516/images/IZAWOL.379-chart3.png&amp;raw"></p></div><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">The role of the dual apprenticeship system
                            cannot be overrated in achieving this outcome. In addition to being an
                            effective mechanism to provide skills and qualifications in demand, it
                            also acts as a much-needed counterbalance to hiring barriers in
                            school-to-work transitions. Offering an apprenticeship position is
                            associated with non-negligible costs, but employers receive in return a
                            very reliable and authentic signal about a worker's productivity—at his
                            or her future workplace—during this period of usually three years. This
                            signal is moreover very valuable and credible for other employers who
                            can rely on a standardized certification of qualifications. Having such
                            an effective screening device for young workers in place is particularly
                            important in the German context where employment protection legislation
                            is rather strict. Employers would otherwise be very reluctant to hire
                            young workers without having learned about their productivity in advance
                            (or at least having obtained a credible signal). Except for a short
                            probationary period, they cannot simply hire and fire workers to test
                            their actual productivity.</span></p><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">While the share of academic among all
                            training in Germany is still below the average share in OECD countries
                            (44.5% in 2015), it has been steadily rising in recent cohorts, from
                            slightly more than 20% around 2000 to more than 30% in 2017. This
                            development threatens the important role and function of the dual
                            apprenticeship system. Contrary to the dual apprenticeship system, the
                            academic training system is largely supply-driven, which bears the
                            danger of producing an increasing mismatch between skill supply and
                            skill demand.</span></p><p data-dcnode-id="2376"><span data-dcnode-id="2383" instrument_node="">Another example of how Germany effectively
                            balances institutions generating labor market rigidities on the one hand
                            with flexibility instruments on the other hand relates to substantial
                            increases in participation rates, especially among older workers. This
                            is perhaps the greatest achievement in the German labor market during
                            the period from 2000 to 2018: an increasing proportion of the
                            working-age population has (re-)entered the labor force. </span><a class="scroll-to-img" data-dcnode-id="2381" data-type="figure" href="#izawol.379-figure-000006"><span data-dcnode-id="2382" instrument_node="">Figure 4</span></a><span data-dcnode-id="2380" instrument_node=""> shows that while the increase in
                            participation rates has occurred across the board, it has been more
                            pronounced among particular groups. For example, the participation rate
                            of female workers increased by roughly 10 percentage points (pp) and
                            that of low-skilled workers by about 5 pp during the same period. Most
                            strikingly, the participation rate of older workers (aged 55 to 64)
                            increased from merely 43% in 2000 to more than 73% in 2018, a 30 pp rise
                            in less than two decades. This was mainly triggered by the labor market
                            reforms, which effectively reduced monetary incentives for early
                            retirement. It is worth noting that the increase in participation rates
                            among older workers was not at the cost of decreasing activity or
                            unemployment rates among younger workers </span><a class="text-reference" data-dcnode-id="2378" data-type="bible" href="#izawol.379-biblStruct-000008"><span data-dcnode-id="2379" instrument_node="">[6]</span></a><span data-dcnode-id="2377" instrument_node="">.</span></p><div class="figures" data-dcnode-id="2373"><p class="article_image" data-dcnode-id="2374"><img alt="Participation rates" data-dcnode-id="2375" data-target="" id="izawol.379-figure-000006" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.iza.org/uploads/articles/516/images/IZAWOL.379-chart4.png&amp;raw"></p></div><p data-dcnode-id="2368"><span data-dcnode-id="2372" instrument_node="">It should also be noted that the abolition
                            of early retirement options took away an important flexibility channel
                            for firms. Before the reforms, firms used early retirement (at least
                            partly financed indirectly via the unemployment insurance system) as a
                            means to circumvent strict employment protection legislation for older
                            workers </span><a class="text-reference" data-dcnode-id="2370" data-type="bible" href="#izawol.379-biblStruct-000005"><span data-dcnode-id="2371" instrument_node="">[3]</span></a><span data-dcnode-id="2369" instrument_node="">. But when these options were
                            abolished in the mid-2000s, and the bridge into early retirement was
                            essentially removed, firms (as well as workers who typically used to be
                            more than happy to retire early without major cuts in their effective
                            pension schemes) were not only theoretically, but now also practically
                            confronted with strict employment protection legislation.</span></p><p data-dcnode-id="2357"><span data-dcnode-id="2367" instrument_node="">Importantly, these flexible forms of
                            employment were mostly created </span><em data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">in addition</span></em><span data-dcnode-id="2364" instrument_node=""> to
                            permanent full-time jobs that are subject to social security
                            contributions. Hence, the share of people in the working-age population
                            holding a job that may be labeled as “standard employment” has not only
                            been fairly stable at around 40% since the early 2000s </span><a class="text-reference" data-dcnode-id="2362" data-type="bible" href="#izawol.379-biblStruct-000009"><span data-dcnode-id="2363" instrument_node="">[7]</span></a><span data-dcnode-id="2361" instrument_node="">, it has even increased in
                            absolute terms. Simultaneously, the inactive population has markedly
                            declined over the last 20 years, since there has been an increase in the
                            share of people holding other flexible jobs. For example, the share of
                            temporary agency work did increase, but it has stabilized at around 2%
                            of all employed persons in recent years—which is roughly the same
                            fraction as in the US, France, or Japan </span><a class="text-reference" data-dcnode-id="2359" data-type="bible" href="#izawol.379-biblStruct-000010"><span data-dcnode-id="2360" instrument_node="">[8]</span></a><span data-dcnode-id="2358" instrument_node="">.</span></p></div><div data-dcnode-id="2293"><h3 data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">Competitiveness, inequality, and the
                            Great Recession</span></h3><p data-dcnode-id="2349"><span data-dcnode-id="2353" instrument_node="">Germany improved its international
                            competitiveness as the percentage changes to unit labor costs in </span><a class="scroll-to-img" data-dcnode-id="2351" data-type="figure" href="#izawol.379-figure-000007"><span data-dcnode-id="2352" instrument_node="">Figure 5</span></a><span data-dcnode-id="2350" instrument_node=""> show. Especially in the early
                            2000s, growth rates of this measure were comparatively small in
                            Germany—and in many years even negative. This is in stark contrast to
                            the development in other countries such as the US, the UK, France, or
                            Italy, where unit labor costs increased, often at rapid rates (except
                            for the US in 2002). In recent years, however, the development of unit
                            labor costs in Germany has been comparable to that in other economies
                            (in terms of percentage changes). Finally, it should be noted that the
                            strong increase in unit labor costs in 2009 was related to Germany's
                            unique and specific reaction to the Great Recession, which will be
                            discussed below.</span></p><div class="figures" data-dcnode-id="2346"><p class="article_image" data-dcnode-id="2347"><img alt="Unit labor costs" data-dcnode-id="2348" data-target="" id="izawol.379-figure-000007" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.iza.org/uploads/articles/516/images/IZAWOL.379-chart5.png&amp;raw"></p></div><p data-dcnode-id="2341"><span data-dcnode-id="2345" instrument_node="">An important factor in this context is wage
                            restraint. Union wages increased only moderately, but, equally
                            important, unions and employers increasingly used the collective
                            bargaining process to arrive at more flexible labor arrangements </span><a class="text-reference" data-dcnode-id="2343" data-type="bible" href="#izawol.379-biblStruct-000004"><span data-dcnode-id="2344" instrument_node="">[2]</span></a><span data-dcnode-id="2342" instrument_node="">. This was, for example,
                            possible via so-called opening clauses in the contracts between unions
                            and employers’ associations that are valid at times of crisis. Such
                            clauses became increasingly common and were associated with greater wage
                            dispersion and higher employment growth. The more flexible labor
                            arrangements allowed for the adjustment, restructuring, and reorganizing
                            of existing work arrangements not only at the industry or sector level,
                            but also at the firm level.</span></p><p data-dcnode-id="2330"><span data-dcnode-id="2340" instrument_node="">This (localized) flexibility is also a very
                            important factor in explaining Germany's resilience to the Great
                            Recession, which hit the country mainly through declining exports. It
                            thus arrived as a transitory external demand shock, which was different
                            from what many other economies experienced </span><a class="text-reference" data-dcnode-id="2338" data-type="bible" href="#izawol.379-biblStruct-000004"><span data-dcnode-id="2339" instrument_node="">[2]</span></a><span data-dcnode-id="2337" instrument_node="">. </span><a class="scroll-to-img" data-dcnode-id="2335" data-type="figure" href="#izawol.379-figure-000008"><span data-dcnode-id="2336" instrument_node="">Figure 6</span></a><span data-dcnode-id="2334" instrument_node=""> shows that decline in output was
                            nonetheless large—GDP decreased by 4.7% in 2009 relative to the previous
                            year. Surprisingly, while working hours declined by a similar magnitude,
                            total employment remained relatively constant. This phenomenon has been
                            referred to as “internal flexibility” and represents a core strength of
                            Germany's labor market in recent years, contributing to its resilience
                            to the Great Recession </span><a class="text-reference" data-dcnode-id="2332" data-type="bible" href="#izawol.379-biblStruct-000012"><span data-dcnode-id="2333" instrument_node="">[9]</span></a><span data-dcnode-id="2331" instrument_node="">.</span></p><div class="figures" data-dcnode-id="2327"><p class="article_image" data-dcnode-id="2328"><img alt="GDP, employment, and working hours" data-dcnode-id="2329" data-target="" id="izawol.379-figure-000008" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.iza.org/uploads/articles/516/images/IZAWOL.379-chart6.png&amp;raw"></p></div><p data-dcnode-id="2316"><span data-dcnode-id="2326" instrument_node="">Although the weight attached to each factor
                            may differ, the following aspects are generally considered as being
                            highly relevant in this context: (i) the specific nature of the economic
                            shock that hit Germany, (ii) the concrete policy responses during the
                            critical period (mainly the expansion of short-time work), (iii) the
                            significant reforms that had improved the functioning and resistance of
                            the country's labor market, (iv) a relatively strict dismissal
                            protection, (v) rather strong incentives for firms to use working time
                            accounts, and (vi) long-term demographic trends which are expected to
                            result in shortages of skilled labor. Ultimately, it is likely that the
                            combination of these factors resulted in adjustments of hours per worker
                            rather than the number of workers </span><a class="text-reference" data-dcnode-id="2324" data-type="bible" href="#izawol.379-biblStruct-000004"><span data-dcnode-id="2325" instrument_node="">[2]</span></a><span data-dcnode-id="2323" instrument_node="">. Firms also followed this
                            strategy of internal flexibility because employment did not expand
                            during the previous boom </span><a class="text-reference" data-dcnode-id="2321" data-type="bible" href="#izawol.379-biblStruct-000012"><span data-dcnode-id="2322" instrument_node="">[9]</span></a><span data-dcnode-id="2320" instrument_node="">, and they largely
                            viewed the shock as only temporary and anticipated a rather quick
                            recovery (which then actually happened, as documented by the development
                            of GDP in </span><a class="scroll-to-img" data-dcnode-id="2318" data-type="figure" href="#izawol.379-figure-000008"><span data-dcnode-id="2319" instrument_node="">Figure 6</span></a><span data-dcnode-id="2317" instrument_node="">). For precisely these reasons,
                            Germany was able to preserve its production capacities during the Great
                            Recession, so that they were immediately available when demand increased
                            again. The country still reaps the benefits from its advantageous
                            starting position after the crisis.</span></p><p data-dcnode-id="2305"><span data-dcnode-id="2315" instrument_node="">The gain in competitiveness has been
                            accompanied by rising wage inequality. As has been the case in many
                            countries, wage inequality has widened substantially in Germany over the
                            past two decades </span><a class="text-reference" data-dcnode-id="2313" data-type="bible" href="#izawol.379-biblStruct-000013"><span data-dcnode-id="2314" instrument_node="">[10]</span></a><span data-dcnode-id="2312" instrument_node="">. For example, from 1996 to
                            2009 the gap between the 20th and 80th percentile of the wage
                            distribution widened by approximately 20 log points, which is roughly
                            comparable to the corresponding rise in the US during the 1980s </span><a class="text-reference" data-dcnode-id="2310" data-type="bible" href="#izawol.379-biblStruct-000014"><span data-dcnode-id="2311" instrument_node="">[11]</span></a><span data-dcnode-id="2309" instrument_node="">. However, </span><a class="scroll-to-img" data-dcnode-id="2307" data-type="figure" href="#izawol.379-figure-000009"><span data-dcnode-id="2308" instrument_node="">Figure 7</span></a><span data-dcnode-id="2306" instrument_node=""> shows that the trend toward growing
                            wage inequality has been largely offset by the tax and transfer system,
                            but also by intra-household arrangements. Inequality of disposable
                            incomes has remained largely constant over the past 15 years.</span></p><div class="figures" data-dcnode-id="2302"><p class="article_image" data-dcnode-id="2303"><img alt="Wage and income inquality" data-dcnode-id="2304" data-target="" id="izawol.379-figure-000009" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.iza.org/uploads/articles/516/images/IZAWOL.379-chart7.png&amp;raw"></p></div><p data-dcnode-id="2294"><span data-dcnode-id="2301" instrument_node="">There are several explanations for the
                            general trend of increasing wage inequality. For example, the way
                            workers sort to workplaces may have fundamentally changed, as documented
                            by an increasing tendency for very productive workers to sort to
                            establishments offering larger wage premiums </span><a class="text-reference" data-dcnode-id="2299" data-type="bible" href="#izawol.379-biblStruct-000014"><span data-dcnode-id="2300" instrument_node="">[11]</span></a><span data-dcnode-id="2298" instrument_node="">. This may also be linked to
                            the relative fall in collective bargaining coverage among these firms.
                            Increasing wage inequality in Germany is thus related to changes in
                            employment behavior, even though it is important to stress that a large
                            part of this increase is compensated by payments made by the welfare
                            state </span><a class="text-reference" data-dcnode-id="2296" data-type="bible" href="#izawol.379-biblStruct-000015"><span data-dcnode-id="2297" instrument_node="">[12]</span></a><span data-dcnode-id="2295" instrument_node="">.</span></p></div><div data-dcnode-id="2268"><h3 data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">Demographic change, immigration
                            policy, and technological change</span></h3><p data-dcnode-id="2286"><span data-dcnode-id="2290" instrument_node="">In the future Germany will increasingly have
                            to deal with the impacts of demographic change. The country's population
                            and labor force are projected to age and to decline. According to
                            projections by the Federal Statistical Office, the working-age
                            population will shrink tremendously. Between 2020 and 2060, the number
                            of people aged 20–64 years is expected to decline by up to 15 million,
                            or 30% </span><a class="text-reference" data-dcnode-id="2288" data-type="bible" href="#izawol.379-biblStruct-000016"><span data-dcnode-id="2289" instrument_node="">[13]</span></a><span data-dcnode-id="2287" instrument_node="">.</span></p><p data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">The impacts of demographic change will be
                            heterogeneous across regions, with regions that already face structural
                            problems presumably being more strongly affected. Furthermore, the
                            declining and aging population jeopardizes the innovative potential of
                            Germany as a whole, which is all the more important in a high-wage
                            country that relies on a productive and innovative workforce. It also
                            threatens the sustainability of the country's social security system, as
                            the baby boom generation reaches retirement age within the next 20
                            years.</span></p><p data-dcnode-id="2279"><span data-dcnode-id="2283" instrument_node="">A further increase in participation rates
                            will be unable to compensate for this decline, as these figures are
                            already approaching their natural limits. Hence, to balance population
                            decline and aging, immigration rates would have to go up tremendously
                            compared to the past. </span><a class="scroll-to-img" data-dcnode-id="2281" data-type="figure" href="#izawol.379-figure-000010"><span data-dcnode-id="2282" instrument_node="">Figure 8</span></a><span data-dcnode-id="2280" instrument_node=""> shows that net
                            immigration has increased substantially in recent years. These numbers
                            put Germany on a level playing field with other major
                            immigrant-receiving countries, such as the US and Canada. But
                            predominantly, humanitarian migrants and citizens from other countries
                            of the EU have moved to Germany.</span></p><div class="figures" data-dcnode-id="2276"><p class="article_image" data-dcnode-id="2277"><img alt="Migration" data-dcnode-id="2278" data-target="" id="izawol.379-figure-000010" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.iza.org/uploads/articles/516/images/IZAWOL.379-chart8.png&amp;raw"></p></div><p data-dcnode-id="2271"><span data-dcnode-id="2275" instrument_node="">Ongoing technological change, currently
                            often referred to as “digitalization,” will have potentially large
                            impacts on global, national, and regional labor markets. But at least so
                            far, this form of technological change appears to have had no disruptive
                            impacts on the German labor market </span><a class="text-reference" data-dcnode-id="2273" data-type="bible" href="#izawol.379-biblStruct-000009"><span data-dcnode-id="2274" instrument_node="">[7]</span></a><span data-dcnode-id="2272" instrument_node="">. While it is true that
                            continuous structural changes can be observed, it is hard to establish
                            causal links to digitalization.</span></p><p data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">Nevertheless, Germany seems relatively
                            unprepared for technological change. The country has two Achilles’ heels
                            in this context, whose consequences will be very likely aggravated in
                            the digital era: the first one relates to the marketing of innovations,
                            which is rather weak, and the second to the start-up scene, which is
                            still not well established. Additionally, through new emerging forms of
                            employment that are not covered by standard institutions, digitalization
                            also threatens the sustainability of the social security system, which
                            is already under pressure from demographic change.</span></p></div></div><p data-dcnode-id="2266"></p><span data-dcnode-id="2265" instrument_node="">
</span><h2 data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">Limitations and gaps</span></h2><span data-dcnode-id="2262" instrument_node="">
</span><p data-dcnode-id="2261"></p><div data-dcnode-id="2254"><p data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">While the German labor market has been
                        remarkably robust to policy experiments and to demand side shocks in recent
                        years, the question remains whether this will be the case also in other
                        domains where policy reforms are currently debated, or where such reforms
                        have recently been introduced. Examples include the implementation of
                        sanctions for unemployed workers receiving welfare benefits, the regulations
                        governing working time and its documentation, and the regulatory framework
                        for temporary agency work. Also the effects of recent reforms of the pension
                        system, including the reintroduction of early retirement options for
                        particular subgroups of the population, have yet to be rigorously
                        analyzed.</span></p><p data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">While aggregate unemployment has been
                        continuously decreasing in recent years and the German labor market is
                        generally in a very good shape, the country's long-term unemployment rate
                        exceeds the OECD average. The reasons why the number of long-term unemployed
                        has stagnated for several years have yet to be determined.</span></p><p data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">The integration of a larger number of refugees
                        that arrived in Germany, especially since 2015, constitutes a societal
                        challenge. It remains to be seen how various integration programs have
                        affected their integration into education, labor markets, and society.</span></p></div><p data-dcnode-id="2253"></p><span data-dcnode-id="2252" instrument_node="">
</span><h2 data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Summary and policy advice</span></h2><span data-dcnode-id="2249" instrument_node="">
</span><p data-dcnode-id="2248"></p><div data-dcnode-id="2243"><p data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">The German labor market is still rather rigid,
                        but many negative side effects that are typically associated with such
                        rigidity have not materialized due to accompanying instruments that enhanced
                        flexibility. These changes characterize a very successful “German model,”
                        balancing rigidity and flexibility in a symbiotic manner, one which may be
                        hard to replicate in other countries. But while the German labor market is
                        currently in excellent shape, this certainly does not imply that this
                        situation will last forever. It also does not imply that flexibility could
                        be constrained without cost. The costs associated with policies limiting the
                        current amount of flexibility could be huge, and could even lead back to the
                        path of the sick man of Europe.</span></p><p data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">Long-term developments such as demographic
                        change and digitalization require forward-looking reforms. One specific area
                        for policy action is immigration policy, in which a system focusing on
                        economic needs and the labor market should be encouraged. Another area where
                        reforms will become inevitable is the social security system. A declining
                        and aging population as well as more flexible forms of employment require
                        new answers from social policy. Finally, an improvement to the academic
                        system could be made by having universities provide information on the
                        employment prospects and career paths of their graduates, allowing college
                        entrants to make informed decisions and avoid obtaining useless
                        qualifications. This would at least partly complement the largely
                        demand-driven portfolio of occupational training with demand-oriented
                        elements also in the academic system, and thus help to avoid moving toward
                        overeducation and mismatch.</span></p></div><p data-dcnode-id="2242"></p><span data-dcnode-id="2241" instrument_node="">

                        for helpful comments, and Patrizia Massner and Pia Molitor for their
