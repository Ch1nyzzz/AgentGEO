node="">Education and Literacy</span></a></li><li data-dcnode-id="1587"><a data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/energy-and-environment.html" title="RAND energy and environmental analyses examine the implications of existing and proposed energy policies on the environment. Building on a long history of policy research, RAND helps balance the need for environmental protections and economic development."><span data-dcnode-id="1589" instrument_node="">Energy and Environment</span></a></li><li data-dcnode-id="1584"><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/health-health-care-and-aging.html" title="RAND advances understanding of health and health behaviors, and examines how the organization and financing of care affect costs, quality, and access. Our body of research includes innovative studies of health insurance, health care reform, and health information technology, as well as obesity, substance abuse, and PTSD. RAND findings also help inform policies that aim to improve the health of seniors and the care they receive."><span data-dcnode-id="1586" instrument_node="">Health, Health Care, and Aging</span></a></li><li data-dcnode-id="1581"><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/homeland-security-and-public-safety.html" title="RAND conducts analyses and makes recommendations to strengthen the U.S. Department of Homeland Security across its full set of missions to prevent terrorism and enhance security, secure and manage America's borders, enforce and administer immigration laws, safeguard and secure cyberspace, and strengthen preparedness and resilience. In the area of public safety, RAND research addresses drug policy, crime, prison reform, and prisoner reentry, and other topics."><span data-dcnode-id="1583" instrument_node="">Homeland Security and Public Safety</span></a></li><li data-dcnode-id="1578"><a data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/infrastructure-and-transportation.html" title="RAND research addresses the challenges of developing, managing, and protecting energy, transportation, water, communications, and other critical infrastructure throughout the world."><span data-dcnode-id="1580" instrument_node="">Infrastructure and Transportation</span></a></li><li data-dcnode-id="1575"><a data-dcnode-id="1576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/international-affairs.html" title="RAND's international affairs research comprises a range of cross-cutting issues, including global economies and trade, space and maritime security, diplomacy, global health and education, nation building, and regional security and stability. RAND also analyzes the policies and effectiveness of international organizations such as the UN, NATO, European Union, and ASEAN."><span data-dcnode-id="1577" instrument_node="">International Affairs</span></a></li><li data-dcnode-id="1572"><a data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/law-and-business.html" title="RAND work in law, business, and regulation includes analyses of alternative dispute resolution, asbestos litigation, workers' compensation, insurance, and other civil justice matters. This research often has implications for the private sector, such as entrepreneurs facing legal and regulatory hurdles, or multinational corporations dealing with corporate ethics and governance issues."><span data-dcnode-id="1574" instrument_node="">Law and Business</span></a></li><li data-dcnode-id="1569"><a data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/national-security-and-terrorism.html" title="RAND conducts a broad array of national security research for the U.S. Department of Defense and allied ministries of defense. Our federally funded research and development centers (FFRDCs) explore threat assessment, military acquisition, technology, recruitment and personnel management, counterinsurgency, intelligence, and readiness. RAND is a world leader in terrorism research. Studies address such topics as terrorism financing and strategies to undermine violent extremism."><span data-dcnode-id="1571" instrument_node="">National Security and Terrorism</span></a></li><li data-dcnode-id="1566"><a data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/science-and-technology.html" title="RAND experts have often been among the pioneers of key scientific research, including computer analysis, satellite development, military technology, and the foundations of the Internet. RAND's research has also resulted in the development of new methodologies and ways of analyzing policy issues, from the Delphi method to Robust Decision Making."><span data-dcnode-id="1568" instrument_node="">Science and Technology</span></a></li><li data-dcnode-id="1563"><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/workers-and-the-workplace.html" title="Demand for educated, versatile workers who can interpret complex information and adapt to innovation is higher than ever. RAND pursues research that helps people, organizations, and governments understand how workers can remain engaged and productive in a changing global economy. Studies address workforce development, gender equity in the workplace, working conditions, and workplace wellness programs."><span data-dcnode-id="1565" instrument_node="">Workers and the Workplace</span></a></li></ul><span data-dcnode-id="1561" instrument_node="">

</span><div class="product-main" data-dcnode-id="627"><span data-dcnode-id="649" instrument_node="">
</span><div class="abstract product-page-abstract" data-dcnode-id="645"><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Part of a RAND study on the measurement of racial discrimination in the economic sphere. Although neoclassical theory can offer a coherent and plausible explanation of the impact of racial discrimination and accounts in a gross way for the known facts, some problems remain. This Memorandum describes a simple model by which an employer can purchase black labor at a fixed price; for this labor he must choose some point on an indifference curve between wages and the proportion of whites in the firm. The implications — no wage differentials on the one hand and segregation on the other — are respectively contrary to and harmonious with observation. Thus, there is a failure of convexity — extreme alternatives are preferred to compromises. Technical analysis of the model is presented in notes following the text. </span></p></div><span data-dcnode-id="644" instrument_node="">
