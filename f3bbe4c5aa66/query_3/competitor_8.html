atnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/wp-content/themes/wordpress-covid-19-v1.3.1/assets/flags/se.svg&amp;raw"><span data-dcnode-id="827" instrument_node="">Sweden</span></a><span data-dcnode-id="825" instrument_node=""> </span><a class="dropdown-item" data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/crisis-monitor/switzerland/"><img data-dcnode-id="824" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/wp-content/themes/wordpress-covid-19-v1.3.1/assets/flags/ch.svg&amp;raw"><span data-dcnode-id="823" instrument_node="">Switzer­land</span></a><span data-dcnode-id="821" instrument_node=""> </span><a class="dropdown-item" data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/crisis-monitor/uk/"><img data-dcnode-id="820" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/wp-content/themes/wordpress-covid-19-v1.3.1/assets/flags/gb.svg&amp;raw"><span data-dcnode-id="819" instrument_node="">United Kingdom</span></a><span data-dcnode-id="817" instrument_node=""> </span><a class="dropdown-item" data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/crisis-monitor/us/"><img data-dcnode-id="816" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/wp-content/themes/wordpress-covid-19-v1.3.1/assets/flags/us.svg&amp;raw"><span data-dcnode-id="815" instrument_node="">United States</span></a><span data-dcnode-id="813" instrument_node=""> </span></div><span data-dcnode-id="811" instrument_node="">

</span><div class="row monitor-block" data-dcnode-id="764"><span data-dcnode-id="804" instrument_node="">
</span><div class="col-12 col-md-8" data-dcnode-id="799"><span data-dcnode-id="803" instrument_node="">
</span><p class="monitor-intro" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Italy was the first European country to enter lockdown in order to contain the spread of COVID-19. While managing the health crisis, the Italian gov­ern­ment in­tro­duced several measures to limit the economic con­se­quences of the pandemic. The cushion provided by short-​time work programs and the sus­pen­sion of the layoffs have limited the short-​term effects of COVID-19 on the labor market. However, there are signals that as soon as these safety nets will be over em­ploy­ment levels will be severely hit: between April 2019 and April 2020, the share of inactive workers increased and the labor demand shrunk. </span></p><span data-dcnode-id="800" instrument_node="">
</span></div><span data-dcnode-id="798" instrument_node="">
</span><div class="col-12 col-md-4 monitor-sidebar" data-dcnode-id="766"><span data-dcnode-id="797" instrument_node=""> </span><h2 data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Authors</span></h2><span data-dcnode-id="794" instrument_node="">
</span><div class="monitor-authors" data-dcnode-id="782"><span data-dcnode-id="793" instrument_node=""> </span><div class="monitor-author" data-dcnode-id="784"><span data-dcnode-id="792" instrument_node=""> </span><img data-dcnode-id="791" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/wp-content/uploads/2020/06/IZA_Colussi_Tommaso.jpg&amp;raw"><span data-dcnode-id="790" instrument_node=""> </span><p class="author-name" data-dcnode-id="786"><span data-dcnode-id="789" instrument_node="">Tommaso Colussi                                                </span><span data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Catholic Uni­ver­sity Milan and IZA</span></span></p><span data-dcnode-id="785" instrument_node=""> </span></div><span data-dcnode-id="783" instrument_node=""> </span></div><span data-dcnode-id="781" instrument_node=""> </span><h2 data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Downloads</span></h2><span data-dcnode-id="778" instrument_node=""> </span><div class="monitor-download" data-dcnode-id="768"><span data-dcnode-id="777" instrument_node="">
</span><a class="top-dl" data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iza.org/wc/files/downloads/iza__crisismonitor_countryreport_it_202010.pdf"><span data-dcnode-id="776" instrument_node="">
</span><img data-dcnode-id="775" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/wp-content/uploads/2020/06/iza__crisismonitor_countryreport_it_202010_Seite_1.png&amp;raw"><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Country report Italy, October 2020</span></p><span data-dcnode-id="771" instrument_node="">

</span><div class="entry-content" data-dcnode-id="327"><span data-dcnode-id="760" instrument_node="">
</span><div class="accordion" data-dcnode-id="329" id="country-accordion"><span data-dcnode-id="759" instrument_node=""> </span><div class="card" data-dcnode-id="692"><span data-dcnode-id="758" instrument_node="">
</span><div class="card-header" data-dcnode-id="747" id="heading-1"><span data-dcnode-id="757" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="749"><span data-dcnode-id="756" instrument_node="">
</span><button aria-controls="collapse-1" aria-expanded="true" class="btn-link" data-dcnode-id="751" data-target="#collapse-1" data-toggle="collapse" type="button"><span data-dcnode-id="755" instrument_node="">Labor market impact of COVID-19 </span><a class="compare" data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/crisis-monitor/compare/impact"><span data-dcnode-id="754" instrument_node="">compare</span></a><i aria-hidden="true" class="fas fa-chevron-down" data-dcnode-id="752"></i></button><span data-dcnode-id="750" instrument_node="">
</span></h2><span data-dcnode-id="748" instrument_node="">
</span></div><span data-dcnode-id="746" instrument_node="">
</span><div aria-labelledby="heading-1" class="collapse answerpane show" data-dcnode-id="694" data-parent="#country-accordion" id="collapse-1"><span data-dcnode-id="745" instrument_node="">
</span><div class="card-body" data-dcnode-id="696"><p data-dcnode-id="735"><span data-dcnode-id="744" instrument_node="">In March 2020, Italy’s in­dus­trial pro­duc­tion fell almost 30% and GDP con­tracted 4.7% as a con­se­quence of the lockdown measures. In April 2020, Italy hit a new record low for in­dus­trial pro­duc­tion, which con­tracted by 19.1% relative to March.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="743" href="#enit1" id="enit1-ref"></a><span data-dcnode-id="742" instrument_node=""> However, the effects of the lockdown on em­ploy­ment levels have not yet man­i­fested; the cushion provided by social safety nets and the sus­pen­sion of the layoffs have limited the short-​term effects of COVID-19 on the labor market. At the end of March 2020, the National Institute of Sta­tis­tics (ISTAT) reg­is­tered a decrease in the un­em­ploy­ment rate relative to March 2019, i.e. -11.1%, while the em­ploy­ment rate only decreased by 0.1%.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="741" href="#enit2" id="enit2-ref"></a><span data-dcnode-id="740" instrument_node=""> The decline in un­em­ploy­ment continued in April, reaching the lowest figure since 2007; this however reflected a con­sid­er­able increase in the number of eco­nom­i­cally inactive people, as shown by the figure below. At the same time, the em­ploy­ment rate in April only decreased by 1.2% with respect to March 2020. Since July 2020, em­ploy­ment has started growing at a constant rate (+0.4% on a monthly basis).</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="739" href="#enit3" id="enit3-ref"></a><span data-dcnode-id="738" instrument_node=""> However, em­ploy­ment levels in August 2020 are still 1.8% lower than the ones reg­is­tered in August 2019. The drop in the number of employed is largely due to fixed term contracts not being renewed.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="737" href="#enit4" id="enit4-ref"></a><span data-dcnode-id="736" instrument_node=""> Figure 1 further shows that the un­em­ploy­ment rate has increased since June 2020; this is mainly driven by the decline of the number of inactive workers in the third quarter of 2020 (-4.1% relative to Q2 2020).</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="731"><a data-dcnode-id="732" data-featherlight="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/wp-content/uploads/2020/10/itf1.png"><img alt="" class="alignnone size-full wp-image-2067" data-dcnode-id="733" height="1297" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/wp-content/uploads/2020/10/itf1.png&amp;raw" width="2000"></a></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">Italy has adopted sectoral lockdown measures to contain the spread of COVID-19: the gov­ern­ment decided to shut down non-​essential busi­nesses, involving almost 8 million employed people. Workers employed in financial, banking and insurance sectors, as well as in public ad­min­is­tra­tion and pro­fes­sional services could continue their activity from home. On the contrary, workers employed in man­u­fac­tur­ing, con­struc­tion, tourism and retail suffered the most (Barbieri et al. 2020)</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="728" href="#enit5" id="enit5-ref"></a><span data-dcnode-id="727" instrument_node="">. In April 2020, the Italian Social Security Ad­min­is­tra­tion (INPS) reg­is­tered an increase in the requests for subsidies for temporary re­duc­tions of hours worked (i.e. Cassa In­te­grazione Guadagni) of about 2,953% with respect to April 2019. ISTAT estimated that in the second quarter of 2020 hours worked decreased by about 20% with respect to the 2019. Further, the Italian GDP has reg­is­tered a  quarter-​over- quarter decline of 12.8%.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="726" href="#enit6" id="enit6-ref"></a></p><span data-dcnode-id="724" instrument_node="">
</span><ol class="footnotes" data-dcnode-id="698"><span data-dcnode-id="723" instrument_node="">
</span><li data-dcnode-id="720" id="enit1"><span data-dcnode-id="722" instrument_node="">https://www.istat.it/it/archivio/244211 </span><a aria-label="Back to content" class="footnote" data-dcnode-id="721" href="#enit1-ref"></a></li><span data-dcnode-id="719" instrument_node="">
</span><li data-dcnode-id="716" id="enit2"><span data-dcnode-id="718" instrument_node="">https://www.istat.it/it/files//2020/04/Occupati-​e-disoccupati-marzo-2020.pdf </span><a aria-label="Back to content" class="footnote" data-dcnode-id="717" href="#enit2-ref"></a></li><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="712" id="enit3"><span data-dcnode-id="714" instrument_node="">https://www.istat.it/it/files//2020/10/Occupati-​e-disoccupati-agosto-2020.pdf </span><a aria-label="Back to content" class="footnote" data-dcnode-id="713" href="#enit3-ref"></a></li><span data-dcnode-id="711" instrument_node="">
</span><li data-dcnode-id="708" id="enit4"><span data-dcnode-id="710" instrument_node="">https://www.istat.it/it/files/2020/09/Mercato-​del-lavoro-II-trim_2020.pdf </span><a aria-label="Back to content" class="footnote" data-dcnode-id="709" href="#enit4-ref"></a></li><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="704" id="enit5"><span data-dcnode-id="706" instrument_node="">https://voxeu.org/article/covid-19-​workerss-exposure-risk-and-lockdown </span><a aria-label="Back to content" class="footnote" data-dcnode-id="705" href="#enit5-ref"></a></li><span data-dcnode-id="703" instrument_node="">
</span><li data-dcnode-id="700" id="enit6"><span data-dcnode-id="702" instrument_node="">https://www.istat.it/en/archivio/247057 </span><a aria-label="Back to content" class="footnote" data-dcnode-id="701" href="#enit6-ref"></a></li><span data-dcnode-id="699" instrument_node="">
</span></ol><span data-dcnode-id="697" instrument_node="">
</span></div><span data-dcnode-id="695" instrument_node="">
</span></div><span data-dcnode-id="693" instrument_node="">
</span></div><span data-dcnode-id="691" instrument_node=""> </span><div class="card" data-dcnode-id="657"><span data-dcnode-id="690" instrument_node="">
</span><div class="card-header" data-dcnode-id="679" id="heading-2"><span data-dcnode-id="689" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="681"><span data-dcnode-id="688" instrument_node="">
</span><button aria-controls="collapse-2" aria-expanded="false" class="btn-link collapsed" data-dcnode-id="683" data-target="#collapse-2" data-toggle="collapse" type="button"><span data-dcnode-id="687" instrument_node="">Orientation and targeting of adopted measures </span><a class="compare" data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/crisis-monitor/compare/measures"><span data-dcnode-id="686" instrument_node="">compare</span></a><i aria-hidden="true" class="fas fa-chevron-down" data-dcnode-id="684"></i></button><span data-dcnode-id="682" instrument_node="">
</span></h2><span data-dcnode-id="680" instrument_node="">
</span></div><span data-dcnode-id="678" instrument_node="">
</span><div aria-labelledby="heading-2" class="collapse answerpane" data-dcnode-id="659" data-parent="#country-accordion" id="collapse-2"><span data-dcnode-id="677" instrument_node="">
</span><div class="card-body" data-dcnode-id="661"><p data-dcnode-id="669"><span data-dcnode-id="676" instrument_node="">On May 14th, the Italian gov­ern­ment approved the third and most ambitious in­ter­ven­tion, the </span><em data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Decreto Rilancio</span></em><span data-dcnode-id="673" instrument_node=""> (Relaunch Decree), to revive the Italian economy. This 55-​billion-euro plan aims at helping busi­nesses with non-​repayable grants and tax breaks; a sizable amount, about 16 billion euros, has been allocated to strengthen and broaden tools for income support, such as </span><em data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Cassa In­te­grazione Guadagni</span></em><span data-dcnode-id="670" instrument_node=""> (short-​time work programs), and al­lowances for self-​employed.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">This decree followed two previous in­ter­ven­tions, the Cura Italia (Save Italy) and the Decreto Liquidità (Liquidity Decree). The first one was an immediate response to the COVID-19 outbreak, which aimed at (i) strengthen the heath care service, (ii) support busi­nesses and families by pumping liquidity and sus­pend­ing tax payments, (iii) and preserve em­ploy­ment levels by extending temporary un­em­ploy­ment benefits to all firms and by sus­pend­ing layoffs for the coming 2 months. The Decreto Liquidità instead mainly focuses on firms; the measures involved state guar­an­tees for 200 billion euros in favor of banks, ul­ti­mately enabling them to grant loans to firms of all sizes. The guar­an­tees cover between 70% and 90% of the loan amounts, depending on firms’ char­ac­ter­is­tics.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">The first two in­ter­ven­tions suffered from delays and dif­fi­cul­ties in their im­ple­men­ta­tion, mainly because of the excessive bu­reau­cracy in the ap­pli­ca­tion pro­ce­dures for accessing benefits and loans. The Relaunch Decree should simplify ad­min­is­tra­tive pro­ce­dures by cutting down bu­reau­cracy.</span></p><span data-dcnode-id="662" instrument_node="">
</span></div><span data-dcnode-id="660" instrument_node="">
</span></div><span data-dcnode-id="658" instrument_node="">
</span></div><span data-dcnode-id="656" instrument_node=""> </span><div class="card" data-dcnode-id="607"><span data-dcnode-id="655" instrument_node="">
</span><div class="card-header" data-dcnode-id="644" id="heading-3"><span data-dcnode-id="654" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="646"><span data-dcnode-id="653" instrument_node="">
</span><button aria-controls="collapse-3" aria-expanded="false" class="btn-link collapsed" data-dcnode-id="648" data-target="#collapse-3" data-toggle="collapse" type="button"><span data-dcnode-id="652" instrument_node="">Immediate liquidity support to businesses </span><a class="compare" data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/crisis-monitor/compare/impact"><span data-dcnode-id="651" instrument_node="">compare</span></a><i aria-hidden="true" class="fas fa-chevron-down" data-dcnode-id="649"></i></button><span data-dcnode-id="647" instrument_node="">
</span></h2><span data-dcnode-id="645" instrument_node="">
</span></div><span data-dcnode-id="643" instrument_node="">
</span><div aria-labelledby="heading-3" class="collapse answerpane" data-dcnode-id="609" data-parent="#country-accordion" id="collapse-3"><span data-dcnode-id="642" instrument_node="">
</span><div class="card-body" data-dcnode-id="611"><p data-dcnode-id="635"><span data-dcnode-id="641" instrument_node="">The </span><em data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Cura Italia </span></em><span data-dcnode-id="638" instrument_node=""> in­ter­ven­tion in­tro­duced social safety nets for self-​employed and seasonal workers, two cat­e­gories that generally do not have access to such benefits. These workers were expected to receive a 600-euro allowance for the month of March. The allowance was then extended for the months of April and May and raised to 1,000 euros for seasonal workers employed in tourism. The im­ple­men­ta­tion of this measure was quite suc­cess­ful, although some delays in the payments were reg­is­tered. The Social Security Ad­min­is­tra­tion (INPS) received 4.8 million requests for the allowance, 83% of them were accepted and processed.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="637" href="#enit7" id="enit7-ref"></a><span data-dcnode-id="636" instrument_node=""> The payments for the month of March were issued Between April 14 and April 23 while the payment for the month of April will be delivered by the end of May.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Ad­di­tion­ally, the gov­ern­ment com­pen­sated shop owners by granting them tax credits to cover 60 percent of their March rent payment. The self-​employed with mortgages can further ask to have their payments suspended for up to 18 months, con­di­tional on their revenues falling by more than third.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="630" instrument_node="">Following the </span><em data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Liquidity</span></em><span data-dcnode-id="627" instrument_node=""> decrees, small and medium firms (PMI) have access the Central Guarantee Fund. This Fund allows PMIs to take new loans with a maximum duration of six years (lately extended to 10 year); these loans will be 100% guar­an­teed by the Italian gov­ern­ment for a maximum amount of 25,000 euros; further, the capital will not have to be repaid until 18 months after the loan has been disbursed. There are not yet official numbers on the take-up rate by Italian firms; according to a recent study (Boitani et al, 2020)</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="626" href="#enit8" id="enit8-ref"></a><span data-dcnode-id="625" instrument_node="">, the number of firms granted a loan was about 300,000 out of a potential pool of 2 million firms. An excessive bu­reau­cracy in the loan ap­pli­ca­tion is one of the reasons for this low figure. </span></p><span data-dcnode-id="623" instrument_node="">
</span><ol class="footnotes" data-dcnode-id="613"><span data-dcnode-id="622" instrument_node="">
</span><li data-dcnode-id="619" id="enit7"><span data-dcnode-id="621" instrument_node="">https://www.inps.it/do­cal­le­gat­iNP/Mig/Allegati/Audizione_19_maggio_2020_Senato_PT.pdf </span><a aria-label="Back to content" class="footnote" data-dcnode-id="620" href="#enit7-ref"></a></li><span data-dcnode-id="618" instrument_node="">
</span><li data-dcnode-id="615" id="enit8"><span data-dcnode-id="617" instrument_node="">https://www.lavoce.info/archives/66692/garanzie-​bancarie-lemergenza-deve-cambiare-le-regole/ </span><a aria-label="Back to content" class="footnote" data-dcnode-id="616" href="#enit8-ref"></a></li><span data-dcnode-id="614" instrument_node="">
</span></ol><span data-dcnode-id="612" instrument_node="">
</span></div><span data-dcnode-id="610" instrument_node="">
</span></div><span data-dcnode-id="608" instrument_node="">
</span></div><span data-dcnode-id="606" instrument_node=""> </span><div class="card" data-dcnode-id="541"><span data-dcnode-id="605" instrument_node="">
</span><div class="card-header" data-dcnode-id="594" id="heading-4"><span data-dcnode-id="604" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="596"><span data-dcnode-id="603" instrument_node="">
</span><button aria-controls="collapse-4" aria-expanded="false" class="btn-link collapsed" data-dcnode-id="598" data-target="#collapse-4" data-toggle="collapse" type="button"><span data-dcnode-id="602" instrument_node="">Support of dependent workers </span><a class="compare" data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/crisis-monitor/compare/worker-support"><span data-dcnode-id="601" instrument_node="">compare</span></a><i aria-hidden="true" class="fas fa-chevron-down" data-dcnode-id="599"></i></button><span data-dcnode-id="597" instrument_node="">
</span></h2><span data-dcnode-id="595" instrument_node="">
</span></div><span data-dcnode-id="593" instrument_node="">
</span><div aria-labelledby="heading-4" class="collapse answerpane" data-dcnode-id="543" data-parent="#country-accordion" id="collapse-4"><span data-dcnode-id="592" instrument_node="">
</span><div class="card-body" data-dcnode-id="545"><p data-dcnode-id="586"><span data-dcnode-id="591" instrument_node="">The Cura Italia decree limited the negative effects of the COVID-19 outbreak on em­ploy­ment mainly by sus­pend­ing the layoffs for two months. At the end of March 2020, the National Institute of Sta­tis­tics (ISTAT) reg­is­tered a decrease in the em­ploy­ment rate by about 0.1% with respect to March 2019.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="590" href="#enit9" id="enit9-ref"></a><span data-dcnode-id="589" instrument_node=""> However, this sus­pen­sion, which has been further extended until December 2020, will not prevent firms from dis­miss­ing workers in the future. The measures promoted by the Italian gov­ern­ment only mitigated the effects of the pandemic on the demand for labor:  a recent study shows that in March 2020 the net job creation was about 60% lower than the one reg­is­tered in the previous year (Anastasia et al. 2020)</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="588" href="#enit10" id="enit10-ref"></a><span data-dcnode-id="587" instrument_node="">. At the same time, the share of inactive in the labor market increased by 2.3% and the un­em­ploy­ment rate decreased by 11.1% thus sug­gest­ing an increase in the number of un­em­ployed in­di­vid­u­als who stopped looking for a job during the lockdown.</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="584" instrument_node="">To sustain income, the Italian gov­ern­ment extended Cassa In­te­grazione Guadagni (CIG), i.e. short-​time work, to all firms in­de­pen­dently of the sector of activity and size. The CIG is a tool that allows workers to tem­porar­ily receive un­em­ploy­ment benefits, which generally accounts for 80% of the total salary, while still keeping their job.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="583" href="#enit11" id="enit11-ref"></a><span data-dcnode-id="582" instrument_node=""> Once firms restart their ac­tiv­i­ties, employees can go back to work as usual. In April and May 2020, the total number of requests for un­em­ploy­ment benefits almost exceeded the whole number of requests received in 2009, one of the worst years in terms of em­ploy­ment outcomes.  As of May 21th, the Social Security Ad­min­is­tra­tion (INPS) received more than 1.1 million requests for Cassa In­te­grazione Guadagni (CIG), 869,000 were au­tho­rized but only 510,000 were actually processed and paid. These delays are due to the long and complex procedure to grant workers the un­em­ploy­ment benefit and to the increase in the number of ap­pli­ca­tions following the lockdown.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="581" href="#enit12" id="enit12-ref"></a><span data-dcnode-id="580" instrument_node=""> The Relaunch Decree should ease and shorten the procedure for un­em­ploy­ment benefits. As of June 2020, out of roughly 3.5 million ben­e­fi­cia­ries, 30,342 workers are still waiting for their benefits to be paid.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="579" href="#enit13" id="enit13-ref"></a></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="576" instrument_node="">A recent report produced by INPS and the Bank of Italy (Bovini et al. 2020) found that in March and April 2020 51% of the Italian firms, ac­count­ing for 40% of the private sector em­ploy­ment, adopted short time work schemes. On average, this allowed firms to save about 1,100 euros per employee; at the same time, employees saw their hours worked reduced by about 90% and ex­pe­ri­enced a 27% loss in their gross monthly wage.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="575" href="#enit14" id="enit14-ref"></a></p><span data-dcnode-id="573" instrument_node="">
</span><ol class="footnotes" data-dcnode-id="547"><span data-dcnode-id="572" instrument_node="">
</span><li data-dcnode-id="569" id="enit9"><span data-dcnode-id="571" instrument_node="">https://www.istat.it/it/files//2020/04/Occupati-​e-disoccupati-marzo-2020.pdf </span><a aria-label="Back to content" class="footnote" data-dcnode-id="570" href="#enit9-ref"></a></li><span data-dcnode-id="568" instrument_node="">
</span><li data-dcnode-id="565" id="enit10"><span data-dcnode-id="567" instrument_node="">https://www.lavoce.info/archives/65325/mercato-​del-lavoro-gia-contagiato-dal-covid-19/ </span><a aria-label="Back to content" class="footnote" data-dcnode-id="566" href="#enit10-ref"></a></li><span data-dcnode-id="564" instrument_node="">
</span><li data-dcnode-id="561" id="enit11"><span data-dcnode-id="563" instrument_node="">See Giupponi and Landais “Sub­si­diz­ing Labor Hoarding in Re­ces­sions: The Em­ploy­ment &amp; Welfare Effects of Short Time Work” for an extensive review of the func­tion­ing of the CIG </span><a aria-label="Back to content" class="footnote" data-dcnode-id="562" href="#enit11-ref"></a></li><span data-dcnode-id="560" instrument_node="">
</span><li data-dcnode-id="557" id="enit12"><span data-dcnode-id="559" instrument_node="">https://www.inps.it/nuovo­por­taleinps/default.aspx?itemdir=53641 </span><a aria-label="Back to content" class="footnote" data-dcnode-id="558" href="#enit12-ref"></a></li><span data-dcnode-id="556" instrument_node="">
</span><li data-dcnode-id="553" id="enit13"><span data-dcnode-id="555" instrument_node="">https://www.inps.it/do­cal­le­gat­iNP/Mig/Al­le­gatiNews/Notizia_int_salariali_covid_11-9-20_1.pdf </span><a aria-label="Back to content" class="footnote" data-dcnode-id="554" href="#enit13-ref"></a></li><span data-dcnode-id="552" instrument_node="">
</span><li data-dcnode-id="549" id="enit14"><span data-dcnode-id="551" instrument_node="">https://www.inps.it/do­cal­le­gat­iNP/Mig/Dati_analisi_bilanci/Studi_e_analisi/Prime_evidenze_CIG_28072020_Final.pdf </span><a aria-label="Back to content" class="footnote" data-dcnode-id="550" href="#enit14-ref"></a></li><span data-dcnode-id="548" instrument_node="">
</span></ol><span data-dcnode-id="546" instrument_node="">
</span></div><span data-dcnode-id="544" instrument_node="">
</span></div><span data-dcnode-id="542" instrument_node="">
</span></div><span data-dcnode-id="540" instrument_node=""> </span><div class="card" data-dcnode-id="469"><span data-dcnode-id="539" instrument_node="">
</span><div class="card-header" data-dcnode-id="528" id="heading-5"><span data-dcnode-id="538" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="530"><span data-dcnode-id="537" instrument_node="">
</span><button aria-controls="collapse-5" aria-expanded="false" class="btn-link collapsed" data-dcnode-id="532" data-target="#collapse-5" data-toggle="collapse" type="button"><span data-dcnode-id="536" instrument_node="">Working conditions and work organization </span><a class="compare" data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/crisis-monitor/compare/conditions"><span data-dcnode-id="535" instrument_node="">compare</span></a><i aria-hidden="true" class="fas fa-chevron-down" data-dcnode-id="533"></i></button><span data-dcnode-id="531" instrument_node="">
</span></h2><span data-dcnode-id="529" instrument_node="">
</span></div><span data-dcnode-id="527" instrument_node="">
</span><div aria-labelledby="heading-5" class="collapse answerpane" data-dcnode-id="471" data-parent="#country-accordion" id="collapse-5"><span data-dcnode-id="526" instrument_node="">
</span><div class="card-body" data-dcnode-id="473"><p data-dcnode-id="522"><span data-dcnode-id="525" instrument_node="">As of mid-April 2020, six weeks after the beginning of the Italian lockdown, the share of workers who (tem­porar­ily or per­ma­nently) stopped working was estimated to be around 34% (Galasso, 2020).</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="524" href="#enit15" id="enit15-ref"></a><span data-dcnode-id="523" instrument_node=""> Among different oc­cu­pa­tions, blue collar workers were the most affected by the lockdown: 50% of them had to stop working.  As expected, the lockdown affected oc­cu­pa­tions and jobs that could not be done remotely; when con­sid­er­ing white collars, only 18% could not work as a result of the lockdown, this is because a high share of these workers (about 66%) could continue doing their job from home. Similarly, about 50% of service sector employees could continue working from home and only 28% of them had to stop working.</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="520" instrument_node="">Italy has one of the most advanced legal frame­works for smart working (Ichino 2020), however this practice is not wide­spread es­pe­cially among small and medium firms.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="519" href="#enit16" id="enit16-ref"></a><span data-dcnode-id="518" instrument_node=""> According to a study by Corso (2020)</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="517" href="#enit17" id="enit17-ref"></a><span data-dcnode-id="516" instrument_node="">, only 12% of small and medium firms in Italy have smart working ini­tia­tives, however this number is on the rise. Although the re­stric­tions imposed by the lockdown cannot be seen as “real” smart working, but rather forced “tele­work­ing”, the Covid-19 emergency high­lighted the potential of smart working and companies that had already in­tro­duced models of smart working found them­selves at an advantage. This pushed companies, uni­ver­si­ties and public ad­min­is­tra­tion into con­sid­er­ing the adoption of new tech­nolo­gies that allow employees to work from home.</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="513" instrument_node="">Uni­ver­si­ties were the first in­sti­tu­tions to react by setting lectures, seminars, exam and grad­u­a­tion sessions online. By the end of February most of Italian uni­ver­si­ties already adapted to the COVID shock and were able to restart their ac­tiv­i­ties.  A good response and adap­ta­tion also came from schools all over Italy. The public ad­min­is­tra­tion workers were able to perform their task from home, such as employees of the Social Security Ad­min­is­tra­tion who have managed and processed the huge amount of ap­pli­ca­tions for un­em­ploy­ment benefits (Garibaldi, 2020).</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="512" href="#enit18" id="enit18-ref"></a></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="509" instrument_node="">According to a recent survey (Boeri and Caiumi, 2020), 70% of managers in­ter­viewed adopted tech­nolo­gies to allow employees to work remotely. However, only 51% of the firms think that this type of smart working would be ben­e­fi­cial in the future once the COVID-​emergency will be over.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="508" href="#enit19" id="enit19-ref"></a></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="505" instrument_node="">Finally, the closure of schools and kinder­gartens have placed a par­tic­u­lar burden on families. This may have lasting effects on labor force par­tic­i­pa­tion and household work arrange­ments. Del Boca et al. (2020) find that during the pandemic in Italy, women spent sig­nif­i­cantly more time on housework than men, as the ad­di­tional care re­spon­si­bil­i­ties caused by school and childcare closures fell to women.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="504" href="#enit20" id="enit20-ref"></a><span data-dcnode-id="503" instrument_node=""> The impact of the lockdown on labor market outcomes may be larger for women as a con­se­quence of unequal in­tra­house­hold dis­tri­b­u­tion of ad­di­tional work.</span></p><span data-dcnode-id="501" instrument_node="">
</span><ol class="footnotes" data-dcnode-id="475"><span data-dcnode-id="500" instrument_node="">
</span><li data-dcnode-id="497" id="enit15"><span data-dcnode-id="499" instrument_node="">The data come from a survey (REPEAT) in­ter­view­ing about 1,000 in­di­vid­u­als rep­re­sen­ta­tive of the Italian pop­u­la­tion. More in­for­ma­tion on REPEAT – REp­re­sen­ta­tions, PEr­cep­tions and ATtitudes on the Covid-19 – can be found here: http://www.sci­ence­spo.fr/cevipof/at­ti­tudes­on­covid19</span><a aria-label="Back to content" class="footnote" data-dcnode-id="498" href="#enit15-ref"></a></li><span data-dcnode-id="496" instrument_node="">
</span><li data-dcnode-id="493" id="enit16"><span data-dcnode-id="495" instrument_node="">https://www.lavoce.info/archives/63816/se-​lepidemia-mette-le-ali-allo-smart-working/ </span><a aria-label="Back to content" class="footnote" data-dcnode-id="494" href="#enit16-ref"></a></li><span data-dcnode-id="492" instrument_node="">
</span><li data-dcnode-id="489" id="enit17"><span data-dcnode-id="491" instrument_node="">https://www.som.polimi.it/en/smart-​working-during-the-time-of-the-coronavirus/ </span><a aria-label="Back to content" class="footnote" data-dcnode-id="490" href="#enit17-ref"></a></li><span data-dcnode-id="488" instrument_node="">
</span><li data-dcnode-id="485" id="enit18"><span data-dcnode-id="487" instrument_node="">https://www.lavoce.info/archives/64787/il-​mercato-del-lavoro-si-scopre-smart/ </span><a aria-label="Back to content" class="footnote" data-dcnode-id="486" href="#enit18-ref"></a></li><span data-dcnode-id="484" instrument_node="">
</span><li data-dcnode-id="481" id="enit19"><span data-dcnode-id="483" instrument_node="">Although this response varies by type of activity, i.e. 61% among firms in banking and finance, while 32% among firms in tourism. Source: https://www.lavoce.info/archives/64486/lavori-​che-possiamo-continuare-a-svolgere/ </span><a aria-label="Back to content" class="footnote" data-dcnode-id="482" href="#enit19-ref"></a></li><span data-dcnode-id="480" instrument_node="">
</span><li data-dcnode-id="477" id="enit20"><span data-dcnode-id="479" instrument_node="">https://voxeu.org/article/women-​s-work-housework-and-childcare-and-during-covid-19/ </span><a aria-label="Back to content" class="footnote" data-dcnode-id="478" href="#enit20-ref"></a></li><span data-dcnode-id="476" instrument_node="">
</span></ol><span data-dcnode-id="474" instrument_node="">
</span></div><span data-dcnode-id="472" instrument_node="">
</span></div><span data-dcnode-id="470" instrument_node="">
</span></div><span data-dcnode-id="468" instrument_node=""> </span><div class="card" data-dcnode-id="407"><span data-dcnode-id="467" instrument_node="">
</span><div class="card-header" data-dcnode-id="456" id="heading-6"><span data-dcnode-id="466" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="458"><span data-dcnode-id="465" instrument_node="">
</span><button aria-controls="collapse-6" aria-expanded="false" class="btn-link collapsed" data-dcnode-id="460" data-target="#collapse-6" data-toggle="collapse" type="button"><span data-dcnode-id="464" instrument_node="">New labor market entrants </span><a class="compare" data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/crisis-monitor/compare/newcomers"><span data-dcnode-id="463" instrument_node="">compare</span></a><i aria-hidden="true" class="fas fa-chevron-down" data-dcnode-id="461"></i></button><span data-dcnode-id="459" instrument_node="">
</span></h2><span data-dcnode-id="457" instrument_node="">
</span></div><span data-dcnode-id="455" instrument_node="">
</span><div aria-labelledby="heading-6" class="collapse answerpane" data-dcnode-id="409" data-parent="#country-accordion" id="collapse-6"><span data-dcnode-id="454" instrument_node="">
</span><div class="card-body" data-dcnode-id="411"><p data-dcnode-id="450"><span data-dcnode-id="453" instrument_node="">Grad­u­at­ing in a recession has negative and long-run effects on the wages and em­ploy­ment prospects of workers (Oreopolus et al 2012)</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="452" href="#enit21" id="enit21-ref"></a><span data-dcnode-id="451" instrument_node="">.</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="448" instrument_node="">The share of inactive in April 2020 increased by 11.1% relative to April 2019. This is because in­di­vid­u­als stopped looking for a job, including new labor market entrants. Further, the demand for labor has shrunk since the beginning of the lockdown as shown by Anastasia et al. (2020). In September 2020, the Italian Social Security Ad­min­is­tra­tion presented new figures about labor turnover in the first two quarters of 2020. Relative to 2019, the number of new jobs activated in 2020 decreased by more than 9%,</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="447" href="#enit22" id="enit22-ref"></a><span data-dcnode-id="446" instrument_node=""> while the number of job sep­a­ra­tions stayed more or less constant, as shown in Figure 2. The decline in new jobs continued in the second quarter of 2020; at the same time, job sep­a­ra­tions started de­creas­ing in the second quarter of 2020, as a result of the sus­pen­sion of layoffs. Relative to the first two quarters of 2019, the Italian labor market ex­pe­ri­enced a 1.5 million and 988,000 drop in the number of new jobs and job sep­a­ra­tions, re­spec­tively; this resulted into a loss of about 578,000 jobs, mainly fixed term contracts (i.e. 73%).</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="441"><a data-dcnode-id="442" data-featherlight="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/wp-content/uploads/2020/10/itf2.png"><img alt="" class="alignnone size-full wp-image-2069" data-dcnode-id="443" height="1339" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/wp-content/uploads/2020/10/itf2.png&amp;raw" width="2000"></a></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="439" instrument_node="">Some Italian regions provide daily and more detailed in­for­ma­tion on labor turnover. For instance, in the region of  Veneto, the number of new jobs activated in the private sector between February 23 and June 14 2019 was about 204,000; in 2020 the same figure decreased to 100,000 (-51%), while job sep­a­ra­tions decreased of about 21% (from 145,000 to 107,000).</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="438" href="#enit23" id="enit23-ref"></a></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="435" instrument_node="">As young workers have the lowest fatality rate and the lowest risk of needing health­care, they should be employed to revive the economy (Anelli et al. 2020).</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="434" href="#enit24" id="enit24-ref"></a><span data-dcnode-id="433" instrument_node=""> However, the em­ploy­ment prospects of new labor market entrants are par­tic­u­larly bleak. Workers between 15-34 years old ex­pe­ri­enced the largest drop in em­ploy­ment and an increase in both in­ac­tiv­ity and un­em­ploy­ment rates. So far, no measures to fa­cil­i­tate the job search have been in­tro­duced by the Italian Gov­ern­ment. Moreover, the National Agency for Active Labour Market Policies (ANPAL) has not been par­tic­u­larly re­spon­sive.</span></p><span data-dcnode-id="431" instrument_node="">
</span><ol class="footnotes" data-dcnode-id="413"><span data-dcnode-id="430" instrument_node="">
</span><li data-dcnode-id="427" id="enit21"><span data-dcnode-id="429" instrument_node="">https://www.nber.org/digest/nov06/w12159.html </span><a aria-label="Back to content" class="footnote" data-dcnode-id="428" href="#enit21-ref"></a></li><span data-dcnode-id="426" instrument_node="">
</span><li data-dcnode-id="423" id="enit22"><span data-dcnode-id="425" instrument_node="">https://www.lavoro.gov.it/notizie/Documents/Nota-​Trimestrale-Occupazione-II-2020.pdf </span><a aria-label="Back to content" class="footnote" data-dcnode-id="424" href="#enit22-ref"></a></li><span data-dcnode-id="422" instrument_node="">
</span><li data-dcnode-id="419" id="enit23"><span data-dcnode-id="421" instrument_node="">https://www.vene­tola­voro.it/documents/10180/1693590/Misure%2095_Covid-19 </span><a aria-label="Back to content" class="footnote" data-dcnode-id="420" href="#enit23-ref"></a></li><span data-dcnode-id="418" instrument_node="">
</span><li data-dcnode-id="415" id="enit24"><span data-dcnode-id="417" instrument_node="">https://voxeu.org/article/transition-​steps-stop-covid-19-​without-killing-world-economy </span><a aria-label="Back to content" class="footnote" data-dcnode-id="416" href="#enit24-ref"></a></li><span data-dcnode-id="414" instrument_node="">
</span></ol><span data-dcnode-id="412" instrument_node="">
</span></div><span data-dcnode-id="410" instrument_node="">
</span></div><span data-dcnode-id="408" instrument_node="">
</span></div><span data-dcnode-id="406" instrument_node=""> </span><div class="card" data-dcnode-id="363"><span data-dcnode-id="405" instrument_node="">
</span><div class="card-header" data-dcnode-id="394" id="heading-7"><span data-dcnode-id="404" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="396"><span data-dcnode-id="403" instrument_node="">
</span><button aria-controls="collapse-7" aria-expanded="false" class="btn-link collapsed" data-dcnode-id="398" data-target="#collapse-7" data-toggle="collapse" type="button"><span data-dcnode-id="402" instrument_node="">Policy innovations and labor market trends </span><a class="compare" data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/crisis-monitor/compare/trends"><span data-dcnode-id="401" instrument_node="">compare</span></a><i aria-hidden="true" class="fas fa-chevron-down" data-dcnode-id="399"></i></button><span data-dcnode-id="397" instrument_node="">
</span></h2><span data-dcnode-id="395" instrument_node="">
</span></div><span data-dcnode-id="393" instrument_node="">
</span><div aria-labelledby="heading-7" class="collapse answerpane" data-dcnode-id="365" data-parent="#country-accordion" id="collapse-7"><span data-dcnode-id="392" instrument_node="">
</span><div class="card-body" data-dcnode-id="367"><p data-dcnode-id="388"><span data-dcnode-id="391" instrument_node="">During the lockdown, firms, uni­ver­si­ties, and the public ad­min­is­tra­tion adopted smart-​working practices for their employees to carry on their ac­tiv­i­ties. These practices are likely to continue if their impact on workers’ pro­duc­tiv­ity is not negative; this clearly depends on whether workers adapt to the new tech­nolo­gies and on the type of jobs performed, e.g. the frequency of in­ter­ac­tions with other people. According to Boeri et al. (2020), jobs that can be carried out remotely are only a small fraction of all jobs, i.e. 24%.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="390" href="#enit25" id="enit25-ref"></a><span data-dcnode-id="389" instrument_node=""> This share however could be lower if some essential sectors, such as schools and childcare, do not resume their ac­tiv­i­ties.  </span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="386" instrument_node="">A key challenge for policy makers then becomes to get people back to work without putting their health at risk. The question is then to mitigate the work-​security tradeoff by iden­ti­fy­ing sectors of the economy that have the lowest levels of exposure to the virus, physical proximity and de­mo­graphic char­ac­ter­is­tics of their workforce (Barbieri et al. 2020).</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="385" href="#enit26" id="enit26-ref"></a><span data-dcnode-id="384" instrument_node=""> Still, the pro­por­tion of safe jobs in Italy remains below 50%. </span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">If a large share of the workforce could not go back to work, firms may increase in­vest­ments in au­toma­tion or re­or­ga­nize pro­duc­tion lines in order to continue their ac­tiv­i­ties. While robots are generally perceived by workers as a threat for their jobs, they may help pre­serv­ing labor by allowing firm to expand their pro­duc­tion (Boeri et al. 2020). </span></p><span data-dcnode-id="379" instrument_node="">
</span><ol class="footnotes" data-dcnode-id="369"><span data-dcnode-id="378" instrument_node="">
</span><li data-dcnode-id="375" id="enit25"><span data-dcnode-id="377" instrument_node="">https://voxeu.org/article/mitigating-​work-security-trade </span><a aria-label="Back to content" class="footnote" data-dcnode-id="376" href="#enit25-ref"></a></li><span data-dcnode-id="374" instrument_node="">
</span><li data-dcnode-id="371" id="enit26"><span data-dcnode-id="373" instrument_node="">https://voxeu.org/article/covid-19-​workerss-exposure-risk-and-lockdown </span><a aria-label="Back to content" class="footnote" data-dcnode-id="372" href="#enit26-ref"></a></li><span data-dcnode-id="370" instrument_node="">
</span></ol><span data-dcnode-id="368" instrument_node="">
</span></div><span data-dcnode-id="366" instrument_node="">
</span></div><span data-dcnode-id="364" instrument_node="">
</span></div><span data-dcnode-id="362" instrument_node=""> </span><div class="card" data-dcnode-id="331"><span data-dcnode-id="361" instrument_node="">
</span><div class="card-header" data-dcnode-id="350" id="heading-8"><span data-dcnode-id="360" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="352"><span data-dcnode-id="359" instrument_node="">
</span><button aria-controls="collapse-8" aria-expanded="false" class="btn-link collapsed" data-dcnode-id="354" data-target="#collapse-8" data-toggle="collapse" type="button"><span data-dcnode-id="358" instrument_node="">Next steps and fiscal viability </span><a class="compare" data-dcnode-id="356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//covid-19.iza.org/crisis-monitor/compare/viability"><span data-dcnode-id="357" instrument_node="">compare</span></a><i aria-hidden="true" class="fas fa-chevron-down" data-dcnode-id="355"></i></button><span data-dcnode-id="353" instrument_node="">
</span></h2><span data-dcnode-id="351" instrument_node="">
</span></div><span data-dcnode-id="349" instrument_node="">
</span><div aria-labelledby="heading-8" class="collapse answerpane" data-dcnode-id="333" data-parent="#country-accordion" id="collapse-8"><span data-dcnode-id="348" instrument_node="">
</span><div class="card-body" data-dcnode-id="335"><p data-dcnode-id="344"><span data-dcnode-id="347" instrument_node="">The Italian Gov­ern­ment extended social safety nets to support workers and their families. These measures only postponed the effects of COVID-19 on the Italian labor market but as soon as these will be over em­ploy­ment levels will be severely hit; it is essential that the Italian gov­ern­ment will be ready and prepared when it happens. As suggested by Lucifora (2020), the Italian gov­ern­ment should invest in ALMP that should trace and treat newly un­em­ployed workers.</span><a aria-describedby="footnote-label" class="footnote" data-dcnode-id="346" href="#enit27" id="enit27-ref"></a><span data-dcnode-id="345" instrument_node=""> In par­tic­u­lar these in­ter­ven­tion should sustain the workers who is going to lose a job and fa­cil­i­tate his/her job search process by (i) iden­ti­fy­ing and (ii) de­vel­op­ing skills and qual­i­fi­ca­tions needed by the firms in the labor market.</span></p><span data-dcnode-id="343" instrument_node="">
</span><ol class="footnotes" data-dcnode-id="337"><span data-dcnode-id="342" instrument_node="">
</span><li data-dcnode-id="339" id="enit27"><span data-dcnode-id="341" instrument_node="">https://www.lavoce.info/archives/66863/disoccupazione-​un-contagio-annunciato/ </span><a aria-label="Back to content" class="footnote" data-dcnode-id="340" href="#enit27-ref"></a></li><span data-dcnode-id="338" instrument_node="">
</span></ol><span data-dcnode-id="336" instrument_node="">
</span></div><span data-dcnode-id="334" instrument_node="">
</span></div><span data-dcnode-id="332" instrument_node="">
</span></div><span data-dcnode-id="330" instrument_node=""> </span></div><span data-dcnode-id="328" instrument_node="">
</span></div><span data-dcnode-id="326" instrument_node="">
</span></div><span data-dcnode-id="324" instrument_node="">
</span><div class="col-12 col-md-4 monitor-sidebar align-self-start sticky-top" data-dcnode-id="164"><span data-dcnode-id="323" instrument_node="">
</span><div class="accordion" data-dcnode-id="166" id="qaccordion"><span data-dcnode-id="322" instrument_node="">
</span><h2 data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Expert Survey Ques­tion­naire </span></h2><span data-dcnode-id="319" instrument_node="">
</span><div class="card" data-dcnode-id="301"><span data-dcnode-id="318" instrument_node="">
</span><div class="card-header" data-dcnode-id="309" id="heading-1"><span data-dcnode-id="317" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="311"><span data-dcnode-id="316" instrument_node="">
</span><button aria-controls="collapse-1" aria-expanded="true" class="btn-link" data-dcnode-id="313" data-target="#collapse-1" data-toggle="collapse" type="button"><span data-dcnode-id="315" instrument_node="">Labor market impact of COVID-19</span><i aria-hidden="true" class="fas fa-chevron-down" data-dcnode-id="314"></i></button><span data-dcnode-id="312" instrument_node="">
</span></h2><span data-dcnode-id="310" instrument_node="">
</span></div><span data-dcnode-id="308" instrument_node="">
</span><div aria-labelledby="heading-1" class="collapse show" data-dcnode-id="303" data-parent="#qaccordion" id="collapse-1"><span data-dcnode-id="307" instrument_node="">
</span><div class="card-body" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">How do you asses the current impact of COVID-19 on the labor market in your country in terms of em­ploy­ment, un­em­ploy­ment, sectors, and firms? Who is affected the most? What do you see in terms of sectoral em­ploy­ment reactions, and regarding permanent, fixed-​term or agency workers? Are current figures and estimates more or less in line with earlier forecasts or are there some un­ex­pected or even sur­pris­ing de­vi­a­tions?</span></div><span data-dcnode-id="304" instrument_node="">
</span></div><span data-dcnode-id="302" instrument_node="">
</span></div><span data-dcnode-id="300" instrument_node="">
</span><div class="card" data-dcnode-id="282"><span data-dcnode-id="299" instrument_node="">
</span><div class="card-header" data-dcnode-id="290" id="heading-2"><span data-dcnode-id="298" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="292"><span data-dcnode-id="297" instrument_node="">
</span><button aria-controls="collapse-2" aria-expanded="false" class="btn-link collapsed" data-dcnode-id="294" data-target="#collapse-2" data-toggle="collapse" type="button"><span data-dcnode-id="296" instrument_node="">Orientation and targeting of adopted measures </span><i aria-hidden="true" class="fas fa-chevron-down" data-dcnode-id="295"></i></button><span data-dcnode-id="293" instrument_node="">
</span></h2><span data-dcnode-id="291" instrument_node="">
</span></div><span data-dcnode-id="289" instrument_node="">
</span><div aria-labelledby="heading-2" class="collapse" data-dcnode-id="284" data-parent="#qaccordion" id="collapse-2"><span data-dcnode-id="288" instrument_node="">
</span><div class="card-body" data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">What is the general ori­en­ta­tion and targeting of the measures adopted to tackle the labor market impact of COVID-19 in your country? Is the summary in the OECD inventory ap­pro­pri­ate? Have there been recent changes or new ini­tia­tives? How do you assess the overall policy set adopted so far? Have certain aspects or target groups been neglected in the policy packages adopted?</span></div><span data-dcnode-id="285" instrument_node="">
</span></div><span data-dcnode-id="283" instrument_node="">
</span></div><span data-dcnode-id="281" instrument_node="">
</span><div class="card" data-dcnode-id="263"><span data-dcnode-id="280" instrument_node="">
</span><div class="card-header" data-dcnode-id="271" id="heading-3"><span data-dcnode-id="279" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="273"><span data-dcnode-id="278" instrument_node="">
</span><button aria-controls="collapse-3" aria-expanded="false" class="btn-link collapsed" data-dcnode-id="275" data-target="#collapse-3" data-toggle="collapse" type="button"><span data-dcnode-id="277" instrument_node="">Immediate liquidity support to businesses</span><i aria-hidden="true" class="fas fa-chevron-down" data-dcnode-id="276"></i></button><span data-dcnode-id="274" instrument_node="">
