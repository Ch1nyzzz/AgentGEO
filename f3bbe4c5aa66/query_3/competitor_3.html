</span><div data-dcnode-id="611" id="startts"><span data-dcnode-id="757" instrument_node=""> </span><table border="0" cellspacing="0" class="tinymce_table" data-dcnode-id="749" style="border-collapse: collapse; ; width: 100px; margin: 0px auto;"><tbody data-dcnode-id="750"><tr data-dcnode-id="754"><td data-dcnode-id="755"><img alt="U.S. Federal Reserve Board Chairman Jerome Powell listens during his re-nomination hearing by the Senate Banking, Housing and Urban Affairs Committee on Capitol Hill, in Washington, U.S., Jan. 11. Reuters-Yonhap" data-dcnode-id="756" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.koreatimes.co.kr/upload/newsV2/images/202201/537688eeebd7433b9c28cec439ca51f9.jpg/dims/resize/740/optimize&amp;raw" width="740"></td></tr><tr data-dcnode-id="751"><td class="view_caption" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">U.S. Federal Reserve Board Chairman Jerome Powell listens during his re-nomination hearing by the Senate Banking, Housing and Urban Affairs Committee on Capitol Hill, in Washington, U.S., Jan. 11. Reuters-Yonhap</span></td></tr></tbody></table><span data-dcnode-id="706"><span data-dcnode-id="747"><br data-dcnode-id="748"></span><span data-dcnode-id="744"><span data-dcnode-id="746" instrument_node="">The pressures pushing prices to multi-decade highs are likely to last through the middle of the year, and the U.S. central bank is ready to respond to this risk, but policymakers are committed to extending the economic expansion to promote employment, Federal Reserve chief Jerome Powell said Tuesday.</span><br data-dcnode-id="745"></span><span data-dcnode-id="742"><br data-dcnode-id="743"></span><span data-dcnode-id="739"><span data-dcnode-id="741" instrument_node="">The world's largest economy is on a strong footing, and with inflation rising and employment recovering, "The economy no longer needs or wants the very highly accommodative policy" provided by the Fed in response to the COVID-19 pandemic, Powell told lawmakers, underlining the likelihood interest rate increases are coming.</span><br data-dcnode-id="740"></span><span data-dcnode-id="737"><br data-dcnode-id="738"></span><span data-dcnode-id="734"><span data-dcnode-id="736" instrument_node="">Surging prices for cars, housing and food have become a political liability for Democratic President Joe Biden, who in November tapped Powell, a Republican, to continue in his role as Fed chief for another four years, and also named Fed Governor Lael Brainard, a fellow Democrat, to serve as Powell's vice chair.</span><br data-dcnode-id="735"></span><span data-dcnode-id="732"><br data-dcnode-id="733"></span><span data-dcnode-id="729"><span data-dcnode-id="731" instrument_node="">In the nomination hearing before the Senate Banking Committee, Powell again vowed that the Fed will do all it can to ensure high inflation does not become entrenched.</span><br data-dcnode-id="730"></span><span data-dcnode-id="727"><br data-dcnode-id="728"></span><span data-dcnode-id="724"><span data-dcnode-id="726" instrument_node="">Economists are projecting that government data due out Wednesday will show annual consumer price inflation hitting 7 percent in December, its highest level in 40 years, and the issue dominated the questions from senators.</span><br data-dcnode-id="725"></span><span data-dcnode-id="722"><br data-dcnode-id="723"></span><span data-dcnode-id="719"><span data-dcnode-id="721" instrument_node="">Inflation is "very near the top of the list" of risks to the economic outlook, Powell said, acknowledging the current rate is now "very far above target."</span><br data-dcnode-id="720"></span><span data-dcnode-id="717"><br data-dcnode-id="718"></span><span data-dcnode-id="714"><span data-dcnode-id="716" instrument_node="">But the Fed chief attributed most of the price surge to a "mismatch" between supply and demand caused by global logistics snarls, although policymakers also are watching wage growth carefully.</span><br data-dcnode-id="715"></span><span data-dcnode-id="712"><br data-dcnode-id="713"></span><span data-dcnode-id="709"><span data-dcnode-id="711" instrument_node="">The central bank expects a "return to normal supply conditions" in the coming months, but "if we see inflation persisting at high levels longer than expected... we will use our tools to get inflation back."</span><br data-dcnode-id="710"></span><span data-dcnode-id="707"><br data-dcnode-id="708"></span></span><table border="0" cellspacing="0" class="tinymce_table" data-dcnode-id="698" style="border-collapse: collapse; ; width: 100px; margin: 0px auto;"><tbody data-dcnode-id="699"><tr data-dcnode-id="703"><td data-dcnode-id="704"><img alt="U.S. Federal Reserve Board Chairman Jerome Powell listens during his re-nomination hearing by the Senate Banking, Housing and Urban Affairs Committee on Capitol Hill, in Washington, U.S., Jan. 11. Reuters-Yonhap" data-dcnode-id="705" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.koreatimes.co.kr/upload/newsV2/images/202201/a624a6708605438bae997f113af05ef0.jpg&amp;raw" width="740"></td></tr><tr data-dcnode-id="700"><td class="view_caption" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Federal Reserve Board Chairman Jerome Powell is sworn in during his re-nomination hearing by the Senate Banking, Housing and Urban Affairs Committee on Capitol Hill, in Washington, Jan. 11. AFP-Yonhap</span></td></tr></tbody></table><span data-dcnode-id="614"><span data-dcnode-id="696"><br data-dcnode-id="697"></span><span data-dcnode-id="693"><strong data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Fostering full employment</span></strong></span><span data-dcnode-id="691"><br data-dcnode-id="692"></span><span data-dcnode-id="689"><br data-dcnode-id="690"></span><span data-dcnode-id="686"><span data-dcnode-id="688" instrument_node="">The Fed is in the process of winding down its bond buying stimulus program, which will end in March, and is expected to raise the benchmark lending rate off zero soon after.</span><br data-dcnode-id="687"></span><span data-dcnode-id="684"><br data-dcnode-id="685"></span><span data-dcnode-id="681"><span data-dcnode-id="683" instrument_node="">While Powell stressed that policymakers have not decided on the timing or any rate increases, some economists and even some Fed officials say that first move could come in March.</span><br data-dcnode-id="682"></span><span data-dcnode-id="679"><br data-dcnode-id="680"></span><span data-dcnode-id="676"><span data-dcnode-id="678" instrument_node="">"It's time to move away from emergency pandemic settings," Powell said.</span><br data-dcnode-id="677"></span><span data-dcnode-id="674"><br data-dcnode-id="675"></span><span data-dcnode-id="671"><span data-dcnode-id="673" instrument_node="">"The labor market is recovering incredibly rapidly," he added, with the jobless rate falling "pretty close to half-century lows" at 3.9 percent in December.</span><br data-dcnode-id="672"></span><span data-dcnode-id="669"><br data-dcnode-id="670"></span><span data-dcnode-id="666"><span data-dcnode-id="668" instrument_node="">Still, removing the stimulus measures "should not have negative effects" on employment, Powell said.</span><br data-dcnode-id="667"></span><span data-dcnode-id="664"><br data-dcnode-id="665"></span><span data-dcnode-id="661"><span data-dcnode-id="663" instrument_node="">In fact, getting price rises to return to around the Fed's 2 percent target is key to ensuring the U.S. economy continues to expand, and brings more people into the labor force, he said.</span><br data-dcnode-id="662"></span><span data-dcnode-id="659"><br data-dcnode-id="660"></span><span data-dcnode-id="656"><span data-dcnode-id="658" instrument_node="">"High inflation is a severe threat to the achievement of maximum employment and to achieving a long expansion that can give us that."</span><br data-dcnode-id="657"></span><span data-dcnode-id="654"><br data-dcnode-id="655"></span><span data-dcnode-id="651"><span data-dcnode-id="653" instrument_node="">Businesses nationwide have complained that they struggle to fill open positions, and record numbers of workers have left their jobs while the share of adults in the labor force has barely budged in recent months, even as wages have risen.</span><br data-dcnode-id="652"></span><span data-dcnode-id="649"><br data-dcnode-id="650"></span><span data-dcnode-id="646"><span data-dcnode-id="648" instrument_node="">Powell acknowledged that child care is one factor keeping the participation rate down, as the industry also has struggled to find workers.</span><br data-dcnode-id="647"></span><span data-dcnode-id="644"><br data-dcnode-id="645"></span><span data-dcnode-id="640"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Markets reassured</span></strong><br data-dcnode-id="641"></span><span data-dcnode-id="638"><br data-dcnode-id="639"></span><span data-dcnode-id="635"><span data-dcnode-id="637" instrument_node="">The central bank is juggling competing forces amid the global pandemic, with price spikes that took policymakers by surprise coupled with workers reluctant or unable to return to their jobs.</span><br data-dcnode-id="636"></span><span data-dcnode-id="633"><br data-dcnode-id="634"></span><span data-dcnode-id="630"><span data-dcnode-id="632" instrument_node="">Some senators and observers argue the Fed has waited too long to fight back against inflation and even the three rate hikes many predict the central bank will approve this year will not be enough.</span><br data-dcnode-id="631"></span><span data-dcnode-id="628"><br data-dcnode-id="629"></span><span data-dcnode-id="625"><span data-dcnode-id="627" instrument_node="">The Fed's easy money policies were a boon to financial markets during the pandemic, but the central bank's recent signals that they will roll them back has spooked investors, sending share prices tumbling at times, especially in the tech sector.</span><br data-dcnode-id="626"></span><span data-dcnode-id="623"><br data-dcnode-id="624"></span><span data-dcnode-id="620"><span data-dcnode-id="622" instrument_node="">Powell's measured testimony seemed to reassure traders, and Wall Street shares finished Tuesday's trading solidly higher.</span><br data-dcnode-id="621"></span><span data-dcnode-id="618"><br data-dcnode-id="619"></span><span data-dcnode-id="615"><span data-dcnode-id="617" instrument_node="">"The markets are taking these comments as fairly benign," Scotiabank analyst Shaun Osborn told AFP. (AFP)</span><br data-dcnode-id="616"></span></span><br data-dcnode-id="613"><br data-dcnode-id="612"></div><span data-dcnode-id="610" instrument_node="">
