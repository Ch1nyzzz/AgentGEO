</span><div class="withTextSize" data-dcnode-id="7060" id="widgets"><a class="facsimile available" data-dcnode-id="7068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/pdf/290" id="wDownload" title="Download PDF file"><span class="fileinfo" data-dcnode-id="7069"><span data-dcnode-id="7070" instrument_node="">PDF 944k</span></span></a><span data-dcnode-id="7067" instrument_node=""> </span><a data-dcnode-id="7065" href="mailto:?subject=Globalization%20and%20Labor%20Markets%20in%20the%20Developing%20World:%20Gendered%20Dynamics&amp;body=Globalization%20and%20Labor%20Markets%20in%20the%20Developing%20World:%20Gendered%20Dynamics%20%0Ae-cadernos%20CES%20%0Ahttp:%2F%2Fjournals.openedition.org%2Feces%2F290%20%0A%0A1.%20Introduction:%20Globalization%20and%20Associated%20Changes%20Since%20the%201970s%20the%20world%20economy%20has%20been%20going%20through%20substantial%20changes%20through%20which%20new%20patterns%20of%20production%2C%20new%20technologies%20and%20new%20labor%20control%20systems%20have%20been%20introduced%20(Standing%2C%201999).%20Globalization%20has%20brought%20major%20transformations%20in%20goods%2C%20capital%20and%20labor.%20To%20begin%20with%2C%20in%20terms%20of%20goods%2C%20%E2%80%9Cproduction%20has%20changed%20from%20a%20linear%20assembly%20line%20(Fordist%20production)%20to%20a%20networked%20form%20of%20production%20that%20depends%20on%20outs...%20%0A%0ASevil%20Acar%2C%20%C2%AB%20Globalization%20and%20Labor%20Markets%20in%20the%20Developing%20World:%20Gendered%20Dynamics%20%C2%BB%2C%20%20e-cadernos%20CES%20%5BOnline%5D%2C%2005%20%7C%202009%2C%20posto%20online%20no%20dia%2001%20setembro%202009%2C%20consultado%20o%2025%20abril%202022.%20URL%20:%20http:%2F%2Fjournals.openedition.org%2Feces%2F290%20%3B%20DOI%20:%2010.4000%2Feces.290%20%0A%0A" id="wSend" title="Assinalar este documento"><span data-dcnode-id="7066" instrument_node="">Assinalar este documento</span></a><a data-dcnode-id="7064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/290" id="wPrint" title="Imprimir este documento"></a><a data-dcnode-id="7063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/290" id="wTextSize-largest" title="Tamanho do texto: muito grande"></a><a data-dcnode-id="7062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/290" id="wTextSize-large" title="Tamanho do texto: grande"></a><a class="current" data-dcnode-id="7061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/290" id="wTextSize-medium" title="Tamanho do texto: normal"></a></div><span data-dcnode-id="7058" instrument_node="">
</span><div class="text wResizable medium" data-dcnode-id="2592"><span data-dcnode-id="7057" instrument_node="">
</span><h1 class="texte" data-dcnode-id="7054"><a data-dcnode-id="7055" href="#tocfrom1n1" id="tocto1n1"><span data-dcnode-id="7056" instrument_node="">1. Introduction: Globalization and Associated Changes</span></a></h1><span data-dcnode-id="7053" instrument_node="">
</span><p class="texte" data-dcnode-id="7046"><span class="paranumber" data-dcnode-id="7051"><span data-dcnode-id="7052" instrument_node="">1</span></span><span data-dcnode-id="7050" instrument_node="">Since the 1970s the world economy has been going through substantial changes through which new patterns of production, new technologies and new labor control systems have been introduced (Standing, 1999). Globalization has brought major transformations in goods, capital and labor. To begin with, in terms of goods, “production has changed from a linear assembly line (Fordist production) to a networked form of production that depends on outsourcing or subcontracting around the world to different manufacturers” (Bayes, 2005: 7)</span><em data-dcnode-id="7048"><span data-dcnode-id="7049" instrument_node="">, </span></em><span data-dcnode-id="7047" instrument_node="">becoming a more flexible form of production, able to adapt itself to varying conditions related to resources and other factors of production. In this sense, the new form of production is capable of creating or abolishing jobs without any time limit (Bayes, 2005).</span></p><span data-dcnode-id="7045" instrument_node="">
</span><p class="texte" data-dcnode-id="7041"><span class="paranumber" data-dcnode-id="7043"><span data-dcnode-id="7044" instrument_node="">2</span></span><span data-dcnode-id="7042" instrument_node="">Second, with the deregulation of capital flow restrictions, international capital flows have been moving easily into both developed and developing countries in the form of foreign direct investment, loans and bonds. While this rose the accessibility to different economic opportunities for international capital, it brought together capital’s ease of entering and exiting any country that served up high profit possibilities. This ease usually left many developing countries with bankruptcies, current account deficits, and financial crises and eventually with more poverty and lost jobs (Standing, 1999).</span></p><span data-dcnode-id="7040" instrument_node="">
</span><p class="texte" data-dcnode-id="7036"><span class="paranumber" data-dcnode-id="7038"><span data-dcnode-id="7039" instrument_node="">3</span></span><span data-dcnode-id="7037" instrument_node="">Third, in terms of labor, companies have been shifting their location of production to cheap-labor abundant parts of the world mostly because of the cost reduction motive that still continues to drive them. This often means female labor which is usually employed in inhumane and unsafe working conditions and is usually low-paid at very low labor standards. </span></p><span data-dcnode-id="7035" instrument_node="">
</span><p class="texte" data-dcnode-id="7031"><span class="paranumber" data-dcnode-id="7033"><span data-dcnode-id="7034" instrument_node="">4</span></span><span data-dcnode-id="7032" instrument_node="">This paper aims to explore the gender dimensions of globalization and recent production networks (such as free trade areas and export processing zones) in terms of employment and labor standards in light of the data and statistics from UNCTAD, International Labor Organization and International Confederation of Free Trade Unions.</span></p><span data-dcnode-id="7030" instrument_node="">
</span><h1 class="texte" data-dcnode-id="7027"><a data-dcnode-id="7028" href="#tocfrom1n2" id="tocto1n2"><span data-dcnode-id="7029" instrument_node="">2. Recent Developments in World Trade and Investment</span></a></h1><span data-dcnode-id="7026" instrument_node="">
</span><p class="texte" data-dcnode-id="7022"><span class="paranumber" data-dcnode-id="7024"><span data-dcnode-id="7025" instrument_node="">5</span></span><span data-dcnode-id="7023" instrument_node="">The world economy has been going through substantial changes since the 1970s. We have been witnessing to an increased liberal orientation in policy-making, followed by growing volumes of international trade, foreign direct investment (FDI) and other financial flows, and novel forms of economic integration promoted by developments in information technologies (Dejardin, 2008). For instance, the share of inward and outward global FDI stocks in world GDP grew from below 5% in 1980 to around 25% in 2006 (OECD, 2008). The amount of FDI inflows reached 648 billion dollars in 2004 while it was only 59 billion dollars in 1982, while GDP in current prices only more than tripled during the same period (see Table I). By the same token, international trade volume has followed an increasing trend fostered by trade liberalization, namely by the removal of obstacles to trade, by regulations put forward by the World Trade Organization, by easier access to regional or global markets and by decreased costs of transportation, coordination and communication. Exports of goods and non-factor services reached the value of 11 069 billion dollars in 2004 with an annual growth rate of 20,1%. It is striking that the annual growth rate of exports always exceeded the annual growth rate of global output between 1986 and 2004, except the year 2001, in which the September 11 terrorist attacks took place in the US.</span></p><span data-dcnode-id="7021" instrument_node="">
</span><div class="textIcon" data-dcnode-id="7005"><span data-dcnode-id="7020" instrument_node="">
</span><p class="titreillustration" data-dcnode-id="7018"><span data-dcnode-id="7019" instrument_node="">Table I: Selected indicators of FDI and international production, 1982-2004 (Billions of dollars and per cent)</span></p><a data-dcnode-id="7016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-1-small580.jpg" rel="iconSet"><img alt="Table I: Selected indicators of FDI and international production, 1982-2004 (Billions of dollars and per cent)" data-dcnode-id="7017" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-1-small480.jpg&amp;raw"></a><div class="textIconAccess" data-dcnode-id="7010"><a class="iconZoom" data-dcnode-id="7014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-1-small580.jpg" rel="nofollow"><span data-dcnode-id="7015" instrument_node="">Aumentar</span></a><span data-dcnode-id="7013" instrument_node=""> </span><a class="iconOrig" data-dcnode-id="7011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-1.jpg" rel="nofollow"><span data-dcnode-id="7012" instrument_node="">Original (jpeg, 160k)</span></a></div><span data-dcnode-id="7009" instrument_node="">
</span><p class="creditillustration" data-dcnode-id="7007"><span data-dcnode-id="7008" instrument_node="">Source: UNCTAD (2005), World Investment Report (2005:14)</span></p><span data-dcnode-id="7006" instrument_node="">
</span></div><span data-dcnode-id="7004" instrument_node="">
</span><p class="texte" data-dcnode-id="7000"><span class="paranumber" data-dcnode-id="7002"><span data-dcnode-id="7003" instrument_node="">6</span></span><span data-dcnode-id="7001" instrument_node="">Contributing to these figures, another recent phenomenon has arisen. Following the fast transition of many developing and relatively closed economies to more open trade policies has also increased the participation of those countries in world trade. China and India are two major economies that are changing the face of globalization with their huge populations. The estimates of IMF in World Economic Outlook (2007) show that these two countries led to a fourfold rise in the effective global labor force over the past two decades. </span></p><span data-dcnode-id="6999" instrument_node="">
</span><p class="texte" data-dcnode-id="6992"><span class="paranumber" data-dcnode-id="6997"><span data-dcnode-id="6998" instrument_node="">7</span></span><span data-dcnode-id="6996" instrument_node="">Coe (2007) points out that the changing nature of globalization through technological progress, specifically the sharp reduction of communication and coordination costs, “have allowed the emergence of global supply chains that are increasingly fragmented geographically” (Coe, 2007: 7). Baldwin (2006) characterized this change by defining two “unbundlings” of globalization that are rooted in technological advances followed by diminished cost of trade and increased volume of trade. The first unbundling he mentioned started in the late 19</span><sup data-dcnode-id="6994"><span data-dcnode-id="6995" instrument_node="">th</span></sup><span data-dcnode-id="6993" instrument_node=""> with the necessity of producing goods close to the point they are consumed. With the second unbundling, accelerating more recently, the need to perform production close to consumption locations came to an end resulting in the spread of factory activities to offshore service sector jobs in their far offices. The second unbundling was also called as fragmentation, offshoring, vertical specialization, and slicing up the value-added chain. In order to survive supply chains, international trade has been rapidly evolving towards the exchange of intermediate inputs rather than in final goods or commodities. Increasingly, with the help of technological progress, intermediate inputs that were previously non-tradable (like business services) are now becoming tradable. Baldwin depicts a figure of the Japanese automobile and electronics plants in East Asia as an example for the evolution of the second bundling. He highlights how spectacularly the second unbundling rose in East Asia starting from 1985. Japanese manufacturers offshored some of their labor-intensive activities to the nearby countries such as China, Thailand, Malaysia, Indonesia and Vietnam. The most obvious reason for this was the increased wages in Japan and decreased comparative advantage of Japanese companies in manufacturing (Baldwin, 2006: 23). </span></p><span data-dcnode-id="6991" instrument_node="">
</span><p class="texte" data-dcnode-id="6987"><span class="paranumber" data-dcnode-id="6989"><span data-dcnode-id="6990" instrument_node="">8</span></span><span data-dcnode-id="6988" instrument_node="">Figure I displays the trends in world trade of total merchandise, intermediate goods and other commercial services between 1988 and 2006. What is striking here is that all are at an increasing trend since 1988. The trade in intermediates exceeded five times of its amount in 1988. </span></p><span data-dcnode-id="6986" instrument_node="">
</span><div class="textIcon" data-dcnode-id="6962"><span data-dcnode-id="6985" instrument_node="">
</span><p class="titreillustration" data-dcnode-id="6983"><span data-dcnode-id="6984" instrument_node="">Figure I: Trends in world trade of total merchandise, intermediate goods and other commercial services, 1988-2006</span></p><a data-dcnode-id="6981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-2-small580.jpg" rel="iconSet"><img alt="Figure I: Trends in world trade of total merchandise, intermediate goods and other commercial services, 1988-2006" data-dcnode-id="6982" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-2-small480.jpg&amp;raw"></a><div class="textIconAccess" data-dcnode-id="6975"><a class="iconZoom" data-dcnode-id="6979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-2-small580.jpg" rel="nofollow"><span data-dcnode-id="6980" instrument_node="">Aumentar</span></a><span data-dcnode-id="6978" instrument_node=""> </span><a class="iconOrig" data-dcnode-id="6976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-2.jpg" rel="nofollow"><span data-dcnode-id="6977" instrument_node="">Original (jpeg, 72k)</span></a></div><span data-dcnode-id="6974" instrument_node="">
</span><p class="legendeillustration" data-dcnode-id="6970"><em data-dcnode-id="6972"><span data-dcnode-id="6973" instrument_node="">Note: </span></em><span data-dcnode-id="6971" instrument_node="">Data are normalized at 100 in 1988.</span></p><span data-dcnode-id="6969" instrument_node="">
</span><p class="creditillustration" data-dcnode-id="6964"><span data-dcnode-id="6968" instrument_node="">Source</span><em data-dcnode-id="6966"><span data-dcnode-id="6967" instrument_node="">:</span></em><span data-dcnode-id="6965" instrument_node=""> WTO calculations based on UN COMTRADE and WTO statistics database.</span></p><span data-dcnode-id="6963" instrument_node="">
</span></div><span data-dcnode-id="6961" instrument_node="">
</span><p class="texte" data-dcnode-id="6957"><span class="paranumber" data-dcnode-id="6959"><span data-dcnode-id="6960" instrument_node="">9</span></span><span data-dcnode-id="6958" instrument_node="">Table II exhibits the offshoring shares of the five countries that have the highest and lowest imported inputs in their production. Again, it is noticeable that goods are offshored much more than services across all countries. Offshored services account for less than the half of the goods offshored. It is striking that countries that are smaller in terms of resources appear to offshore more than larger ones. World Trade Report (2008) shows that countries that are large enough and labor and/or capital abundant take the opportunity of exploiting economies of scale and do not need to offshore part of their inputs. Contrarily, small countries choose to intensify their available resources in a smaller number of stages of production and tend to offshore the rest.</span></p><span data-dcnode-id="6956" instrument_node="">
</span><div class="textIcon" data-dcnode-id="6937"><span data-dcnode-id="6955" instrument_node="">
</span><p class="titreillustration" data-dcnode-id="6953"><span data-dcnode-id="6954" instrument_node="">Table II: Goods and service offshoring by country, 2000 (imported inputs as per cent of total inputs)</span></p><a data-dcnode-id="6951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-3-small580.png" rel="iconSet"><img alt="Table II: Goods and service offshoring by country, 2000 (imported inputs as per cent of total inputs)" data-dcnode-id="6952" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-3-small480.png&amp;raw"></a><div class="textIconAccess" data-dcnode-id="6945"><a class="iconZoom" data-dcnode-id="6949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-3-small580.png" rel="nofollow"><span data-dcnode-id="6950" instrument_node="">Aumentar</span></a><span data-dcnode-id="6948" instrument_node=""> </span><a class="iconOrig" data-dcnode-id="6946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-3.png" rel="nofollow"><span data-dcnode-id="6947" instrument_node="">Original (png, 106k)</span></a></div><span data-dcnode-id="6944" instrument_node="">
</span><p class="creditillustration" data-dcnode-id="6939"><span data-dcnode-id="6943" instrument_node="">Source:</span><em data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node=""> </span></em><span data-dcnode-id="6940" instrument_node="">World Trade report, 2008. WTO calculations based on OECD Input-Output tables.</span></p><span data-dcnode-id="6938" instrument_node="">
</span></div><span data-dcnode-id="6936" instrument_node="">
</span><p class="texte" data-dcnode-id="6932"><span class="paranumber" data-dcnode-id="6934"><span data-dcnode-id="6935" instrument_node="">10</span></span><span data-dcnode-id="6933" instrument_node="">Beside global supply chains, another striking phenomenon in the age of globalization is the set up of export processing zones (EPZs) which are defined as “industrial zones with special incentives to attract foreign investors, in which imported products undergo some degree of processing before being exported again” by ILO (2007). These zones have enlarged to technological and scientific parks and can even be a country, a province or a town. EPZs are constructed with different names in different countries such as maquilas in Mexico and special economic zones (SEZs) in China. These zones are created with the aims of generating employment, gaining foreign currency, nourishing exports, contributing to the spread of technology and skills, developing underprivileged regions and flourishing the economy as a whole. The number of zones has been increasing rapidly since the 1990s and reached 3500 in 2006 (Figure II). 66 millions of workers were employed in 2006. Female workers account for 60-70% of the zone workforce worldwide, mounting up to 90% in some regions (ILO, 2007; Milberg, 2007).</span></p><span data-dcnode-id="6931" instrument_node="">
</span><p class="titreillustration" data-dcnode-id="6929"><span data-dcnode-id="6930" instrument_node="">Figure II: Development of Export Processing Zones</span></p><span data-dcnode-id="6928" instrument_node="">
</span><span data-dcnode-id="6927" instrument_node="">
</span><span data-dcnode-id="6926" instrument_node="">
</span><span data-dcnode-id="6920" instrument_node="">

</span><p class="texte" data-dcnode-id="6683"><span class="paranumber" data-dcnode-id="6685"><span data-dcnode-id="6686" instrument_node="">11</span></span><span data-dcnode-id="6684" instrument_node="">To sum up, world’s production has changed both in quantity and in form, depending more on subcontracting or outsourcing and being more flexible, generating new jobs and relocating labor more easily.</span></p><span data-dcnode-id="6682" instrument_node="">
</span><h1 class="texte" data-dcnode-id="6679"><a data-dcnode-id="6680" href="#tocfrom1n3" id="tocto1n3"><span data-dcnode-id="6681" instrument_node="">3. Labor Markets and Feminization of Labor Force</span></a></h1><span data-dcnode-id="6678" instrument_node="">
</span><p class="texte" data-dcnode-id="6674"><span class="paranumber" data-dcnode-id="6676"><span data-dcnode-id="6677" instrument_node="">12</span></span><span data-dcnode-id="6675" instrument_node="">The increased liberal orientation in policy-making and the recent trends in production, investment and trade patterns have had a significant impact on labor markets, in general, and on gendered dynamics in labor markets, in particular. The world has been experiencing feminization of labor since the 1970s (Standing 1989), which may be explained by various factors such as export-led growth, structural adjustment, economic crises, etc. (Cagatay and Ozler, 1995; Baslevent and Onaran, 2004; Ecevit, 1998). </span></p><span data-dcnode-id="6673" instrument_node="">
</span><p class="texte" data-dcnode-id="6669"><span class="paranumber" data-dcnode-id="6671"><span data-dcnode-id="6672" instrument_node="">13</span></span><span data-dcnode-id="6670" instrument_node="">In 1995, Cagatay and Ozler explain the feminization of the labor force in terms of long-term development and structural adjustment. They point to the U-shaped characteristic of women’s labor force participation which is observed along different stages of capitalist development. They underline the dual work burden on women as reproducers and producers which causes the U-shape. They investigate whether changes in the paths of economic development have influenced or brought together the feminization of labor force. Using the data of 165 countries for the years 1985 and 1990 from World Bank resources, they carry out econometric analysis to estimate the female share of the labor force. The variables expected to determine this ratio are demographic factors like fertility, urbanization and female education; Gross National Product (GNP) per capita and other economic variables such as openness, changes in income distribution and degree of economic expansion. The effect of adjustment is included in the model being represented by the involvement of the country in adjustment programs and also by the effects of these programs reflected on the economic indicators. The findings can be summarized as follows: Being consistent with the theoretical arguments, the female share of the labor force declines as the urban share of population increases (Cagatay and Ozler, 1995: 1888). All structural adjustment variables are found to have significant and positive influence on female share of the labor force. They find out that countries which are more intensively involved in structural adjustment processes have turned to an outward oriented growth policy and have increased their share of exports in their Gross Domestic Product (GDP) and experienced a feminization of the labor force. They further find that the worsening of income distribution has a positive impact on feminization. </span></p><span data-dcnode-id="6668" instrument_node="">
</span><p class="texte" data-dcnode-id="6664"><span class="paranumber" data-dcnode-id="6666"><span data-dcnode-id="6667" instrument_node="">14</span></span><span data-dcnode-id="6665" instrument_node="">Cagatay (2001) asserts that men and women are differently affected by trade policies and performance because they are differently located and have different types of command over economic resources. She further stresses that “gender-based inequalities impact differently on trade policy outcomes, depending on the type of economy and sector, with the result that trade liberalization policies may not yield expected results”; and that “gender analysis is essential to the formulation of trade policies that enhance rather than hinder gender equality and human development” (Cagatay, 2001: 5). Similarly, Cagatay and Erturk (2004) argue that globalization have made gender differentiated impacts due to the unequal access to and control over assets and economic resources. They point out that globalization together with economic liberalization has led to losses in livelihoods of many people, especially in poor countries that did not have available resources that could give a hand to these people. </span></p><span data-dcnode-id="6663" instrument_node="">
</span><p class="texte" data-dcnode-id="6653"><span class="paranumber" data-dcnode-id="6661"><span data-dcnode-id="6662" instrument_node="">15</span></span><span data-dcnode-id="6660" instrument_node="">Standing (1999) highlights five labor market implications of global economic changes. First, the increasing selectivity of the state regarding the attribution of welfare benefits has led to “additional worker” effects, that is, to women’s entrance in the labor market during recessionary periods, and to their permanence as a result of a growing sense of income insecurity. Second, increasingly market-regulated economics has </span><em data-dcnode-id="6658"><span data-dcnode-id="6659" instrument_node="">“</span></em><span data-dcnode-id="6657" instrument_node="">weakened the defense of employment security regulations and customary practices preserving job security</span><em data-dcnode-id="6655"><span data-dcnode-id="6656" instrument_node="">” </span></em><span data-dcnode-id="6654" instrument_node="">(Standing, 1999: 585). This is reflected in the attempts of firms to easily fire workers or employ workers with decreased standards and rights or even search for cheaper sources of labor overseas. Third, removing or weakening the minimum wage legislations, many countries have decreased the income security of the employed. As a result, low-wage employment became the norm leading to “a substitution of women for men”. Fourth, increasing emphasis on trade liberalization and export-led industrialization has had implications for women's labor force participation especially in less-developed countries. As mentioned above, Standing emphasizes the search of firms for much lower labor costs giving priority to the type of workers who are ready or willing to be employed with low wages:</span></p><span data-dcnode-id="6652" instrument_node="">
</span><blockquote data-dcnode-id="6647"><span data-dcnode-id="6651" instrument_node="">
</span><p class="citation" data-dcnode-id="6649"><span data-dcnode-id="6650" instrument_node="">In industrialized and industrializing countries, firms have turned to forms of labor offering the prospect of minimizing fixed non-wage costs. As a result, they have turned increasingly to casual labor, contract labor, outsourcing, home-working and other forms of subcontracting. As part of this flexibilization, there has been an “informalization” of employment across the world. Although the dichotomy of “formal” and “informal” sectors has always been misleading, a growing proportion of jobs possess what may be called informal characteristics, i.e., without regular wages, benefits, employment protection, and so on. Such forms of employment have been compatible with characteristics presumed to be associated with women workers - irregular labor force participation, willingness to work for low wages, static jobs requiring no accumulation of technical skills and status, etc. The informalization could thus be expected to be a major factor stimulating the growth of female employment across the world. (Standing, 1999: 585)</span></p><span data-dcnode-id="6648" instrument_node="">
</span></blockquote><span data-dcnode-id="6646" instrument_node="">
</span><p class="texte" data-dcnode-id="6639"><span class="paranumber" data-dcnode-id="6644"><span data-dcnode-id="6645" instrument_node="">16</span></span><span data-dcnode-id="6643" instrument_node="">Fifth, Standing stresses the changing skill and job structures due to the recently introduced production techniques around the world. He remarks two trends concerning the changes in skill and job structures, first being the decline in the share of jobs that require “craft skills learned through apprenticeship or prolonged on-the-job learning” and second being the “skill polarization”. Since it has been conventional to perceive crafts as the field of men, the step-down of them together with the modified character of skill are expected to have affected the gender division of labor. Skill polarization refers to the requirement that a minority of workers dominate specialist skills while a majority “possess minor training, typically imparted through modules of employable skill, in which docility, application, rote learning and related capacities figure prominently”</span><em data-dcnode-id="6641"><span data-dcnode-id="6642" instrument_node=""> </span></em><span data-dcnode-id="6640" instrument_node="">(Standing, 1999: 585). This polarization has brought together greater reliance on external rather than internal labor markets, “since fewer workers are in progressive jobs while more are in static jobs involving little upward mobility or returns to on-the-job continuity”. </span></p><span data-dcnode-id="6638" instrument_node="">
</span><blockquote data-dcnode-id="6633"><span data-dcnode-id="6637" instrument_node="">
</span><p class="citation" data-dcnode-id="6635"><span data-dcnode-id="6636" instrument_node="">This diminishing return to on-the-job continuity has been one reason for resorting to casual or temporary labor, or for job-rotating, and has been a determinant of the tendency to collapse job classifications into more broadly based job clusters, such that workers can be shifted from one set of tasks to another from time to time. This has been a trend in many labor markets, and has represented a growth of job insecurity that has accompanied the growth of income and employment insecurity marking the shift to more flexible labor markets. So, the primary hypothesis is that the growing labor market flexibility and the diverse forms of insecurity have encouraged greater female labor force participation and employment. (Standing, 1999: 585)</span></p><span data-dcnode-id="6634" instrument_node="">
</span></blockquote><span data-dcnode-id="6632" instrument_node="">
</span><p class="texte" data-dcnode-id="6628"><span class="paranumber" data-dcnode-id="6630"><span data-dcnode-id="6631" instrument_node="">17</span></span><span data-dcnode-id="6629" instrument_node="">In line with what Standing (1999) proposes above, UNCTAD (2004) addresses that more and more women are likely to be in non-regular or atypical employment, even among wage and salaried workers.</span></p><span data-dcnode-id="6627" instrument_node="">
</span><blockquote data-dcnode-id="6622"><span data-dcnode-id="6626" instrument_node="">
</span><p class="citation" data-dcnode-id="6624"><span data-dcnode-id="6625" instrument_node="">Whereas men are more likely to be hired in core, regular and better-paid positions, women are increasingly being hired in peripheral, insecure, less-valued jobs including home-based, casual or temporary work. These jobs are normally characterized by very low pay, irregular income, little or no job or income security and lack of social protection (UNCTAD, 2004: 5).</span></p><span data-dcnode-id="6623" instrument_node="">
</span></blockquote><span data-dcnode-id="6621" instrument_node="">
</span><p class="texte" data-dcnode-id="6617"><span class="paranumber" data-dcnode-id="6619"><span data-dcnode-id="6620" instrument_node="">18</span></span><span data-dcnode-id="6618" instrument_node="">Bayes (2005) also summarizes the influences of globalization on women mainly as the feminization of the labor force and changes in the family structure. She also points to the increasing inequalities among women as a consequence of the liberal orientation of the state, the erosion of welfare and income distributions and privatization policies. She also recalls the arguments made by Standing (1999) regarding the feminization of labor.</span></p><span data-dcnode-id="6616" instrument_node="">
</span><p class="texte" data-dcnode-id="6612"><span class="paranumber" data-dcnode-id="6614"><span data-dcnode-id="6615" instrument_node="">19</span></span><span data-dcnode-id="6613" instrument_node="">A report by the World Commission on the Social Dimension of Globalization confirms that globalization has led to serious gender imbalances in some countries. It argues that the level of gender equality prevailing in the norms, institutions and policies of a country at the time of integration into the global economy determines the extent of this imbalance. The report further adds that integration into the global economy affects women from different social groups in a particular country in different ways. What still remains as a fact is that gender inequalities in many developing countries are so deep-rooted and so long-standing that the social cost of globalization continues to fall disproportionately on women. One example is the increase in the amount of imported subsidized agricultural products and consumer goods, leading to declining livelihoods of formerly women producers. Another example is the increased entry of foreign firms that has wiped out women from their lands or displaced them for raw materials essential to their productive activities (World Commission on the Social Dimension of Globalization, 2004: 47). To sum up, economic globalization has had serious and mostly negative implications on women’s employment and standards of life.</span></p><span data-dcnode-id="6611" instrument_node="">
</span><h1 class="texte" data-dcnode-id="6608"><a data-dcnode-id="6609" href="#tocfrom1n4" id="tocto1n4"><span data-dcnode-id="6610" instrument_node="">4. An Examination of the World’s Labor Force in Gendered Statistics</span></a></h1><span data-dcnode-id="6607" instrument_node="">
</span><p class="texte" data-dcnode-id="6603"><span class="paranumber" data-dcnode-id="6605"><span data-dcnode-id="6606" instrument_node="">20</span></span><span data-dcnode-id="6604" instrument_node="">The economic activity patterns in recent years show that world employment-to-population ratios are more or less stagnant for both sexes since the year 1998. But there is a huge gap between the female and male employment-to-population rates for the all years recorded below (Table III). For instance, the male employment-to-population ratio was 64,8% in 2007, while the female employment-to-population ratio was only 49,4% in developed economies and the European Union. The gaps are even more striking in Middle East and North Africa. The male employment-to-population ratios were respectively 69% and 68%, whereas the female employment-to-population ratios were only 21,7% and 23,4% in the Middle East and North Africa in 2007. The ratios differ also from region to region noticeably. Middle East has strikingly the lowest female employment-to-population ratio (22%) in 2008, while East Asia has the highest female employment-to-population ratio (67,1%) for the same year. The ratio including both sexes is also the highest in East Asia mounting up to 71,4% in 2008.</span></p><span data-dcnode-id="6602" instrument_node="">
</span><div class="textIcon" data-dcnode-id="6586"><span data-dcnode-id="6601" instrument_node="">
</span><p class="titreillustration" data-dcnode-id="6599"><span data-dcnode-id="6600" instrument_node="">Table III: World and regional estimates of employment-to-population ratios</span></p><a data-dcnode-id="6597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-4-small580.jpg" rel="iconSet"><img alt="Table III: World and regional estimates of employment-to-population ratios" data-dcnode-id="6598" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-4-small480.jpg&amp;raw"></a><div class="textIconAccess" data-dcnode-id="6591"><a class="iconZoom" data-dcnode-id="6595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-4-small580.jpg" rel="nofollow"><span data-dcnode-id="6596" instrument_node="">Aumentar</span></a><span data-dcnode-id="6594" instrument_node=""> </span><a class="iconOrig" data-dcnode-id="6592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-4.jpg" rel="nofollow"><span data-dcnode-id="6593" instrument_node="">Original (jpeg, 344k)</span></a></div><span data-dcnode-id="6590" instrument_node="">
</span><p class="creditillustration" data-dcnode-id="6588"><span data-dcnode-id="6589" instrument_node="">Source: ILO Global Employment Trends Model *2008 preliminary estimates.</span></p><span data-dcnode-id="6587" instrument_node="">
</span></div><span data-dcnode-id="6585" instrument_node="">
</span><p class="texte" data-dcnode-id="6581"><span class="paranumber" data-dcnode-id="6583"><span data-dcnode-id="6584" instrument_node="">21</span></span><span data-dcnode-id="6582" instrument_node="">Among different regions, significant changes in total employment-to-population ratios from 1998 to 2008 have been observed in Latin America and the Caribbean. The total increase in the ratio has been 3,3% in the last ten years. East Asia has experienced a decrease of 3,2% in its male employment-to-population ratio between the same ten years, while a significant 7,1% increase of female employment-to-population ratio in Latin America and the Caribbean has been observed (see Table III).</span></p><span data-dcnode-id="6580" instrument_node="">
</span><p class="texte" data-dcnode-id="6576"><span class="paranumber" data-dcnode-id="6578"><span data-dcnode-id="6579" instrument_node="">22</span></span><span data-dcnode-id="6577" instrument_node="">When we examine the employment-to-population ratios for individual countries in a more detailed way, we notice that there is an important number of countries with very low female employment to population ratios (as low as 30% or even below) and 11 countries with a female employment to population rate of at least 70% (see Figure III). We know that most of the countries with the highest female employment-population rates (Vietnam, Madagascar, Mozambique, Malawi, United Republic of Tanzania and Burundi) and with the lowest female employment-population rates (West Bank and Gaza Strip, Egypt, Sudan, Oman, Morocco, Jordan, Tunisia, Lesotho, Turkey, Yemen and Namibia) have EPZs in the form of small areas, wide areas, industry-specific zones or performance-specific zones (WEPZA website). </span></p><span data-dcnode-id="6575" instrument_node="">
</span><div class="textIcon" data-dcnode-id="6559"><span data-dcnode-id="6574" instrument_node="">
</span><p class="titreillustration" data-dcnode-id="6572"><span data-dcnode-id="6573" instrument_node="">Figure III: Economies with female employment-to-population ratios below 30 per cent or above 70 per cent, 2006</span></p><a data-dcnode-id="6570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-5-small580.jpg" rel="iconSet"><img alt="Figure III: Economies with female employment-to-population ratios below 30 per cent or above 70 per cent, 2006" data-dcnode-id="6571" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-5-small480.jpg&amp;raw"></a><div class="textIconAccess" data-dcnode-id="6564"><a class="iconZoom" data-dcnode-id="6568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-5-small580.jpg" rel="nofollow"><span data-dcnode-id="6569" instrument_node="">Aumentar</span></a><span data-dcnode-id="6567" instrument_node=""> </span><a class="iconOrig" data-dcnode-id="6565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-5.jpg" rel="nofollow"><span data-dcnode-id="6566" instrument_node="">Original (jpeg, 172k)</span></a></div><span data-dcnode-id="6563" instrument_node="">
</span><p class="creditillustration" data-dcnode-id="6561"><span data-dcnode-id="6562" instrument_node="">Source: ILO Global Employment Trends Model</span></p><span data-dcnode-id="6560" instrument_node="">
</span></div><span data-dcnode-id="6558" instrument_node="">
</span><p class="texte" data-dcnode-id="6554"><span class="paranumber" data-dcnode-id="6556"><span data-dcnode-id="6557" instrument_node="">23</span></span><span data-dcnode-id="6555" instrument_node="">As far as the unemployment statistics are concerned, the number of people who were unemployed showed significant changes across years (Figure IV). 165,9 million people in the world were unemployed in 1998 whereas this number reached 190,2 million in 2008. The world unemployment rate seems to be more stagnant around 6% in the last ten years, making an exceptional decline below 6% in 2007.</span></p><span data-dcnode-id="6553" instrument_node="">
</span><div class="textIcon" data-dcnode-id="6537"><span data-dcnode-id="6552" instrument_node="">
</span><p class="titreillustration" data-dcnode-id="6550"><span data-dcnode-id="6551" instrument_node="">Figure IV: Global unemployment trends, 1998-2008**</span></p><a data-dcnode-id="6548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-6-small580.jpg" rel="iconSet"><img alt="Figure IV: Global unemployment trends, 1998-2008**" data-dcnode-id="6549" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-6-small480.jpg&amp;raw"></a><div class="textIconAccess" data-dcnode-id="6542"><a class="iconZoom" data-dcnode-id="6546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-6-small580.jpg" rel="nofollow"><span data-dcnode-id="6547" instrument_node="">Aumentar</span></a><span data-dcnode-id="6545" instrument_node=""> </span><a class="iconOrig" data-dcnode-id="6543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-6.jpg" rel="nofollow"><span data-dcnode-id="6544" instrument_node="">Original (jpeg, 64k)</span></a></div><span data-dcnode-id="6541" instrument_node="">

</span><p class="texte" data-dcnode-id="6532"><span class="paranumber" data-dcnode-id="6534"><span data-dcnode-id="6535" instrument_node="">24</span></span><span data-dcnode-id="6533" instrument_node="">As demonstrated by the OECD statistics in Figure V, the year 2005 was a turning point for the reported groups of countries at which unemployment rates started to decline. However, this decline was not sustained that long and increases in unemployment rates became observable again in the year 2007, when the signs of the recent financial crisis started to be apparent for the first time.</span></p><span data-dcnode-id="6531" instrument_node="">

</span><li data-dcnode-id="6520"><span class="num" data-dcnode-id="6526"><span data-dcnode-id="6527" instrument_node="">1</span></span><span data-dcnode-id="6525" instrument_node=""> </span><span data-dcnode-id="6523" lang="en" xml:lang="en"><span data-dcnode-id="6524" instrument_node="">`EU-15` refers to the 15 countries in the European Union before the expansion on 1 May 2004, when e </span></span><a data-dcnode-id="6521" href="#ftn1"><span data-dcnode-id="6522" instrument_node="">(...)</span></a></li><span data-dcnode-id="6519" instrument_node="">

</span></div><a data-dcnode-id="6508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-7-small580.jpg" rel="iconSet"><img alt="Figure V: Unemployment Rates by Region (Both sexes, age 15-64)1" data-dcnode-id="6509" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-7-small480.jpg&amp;raw"></a><div class="textIconAccess" data-dcnode-id="6502"><a class="iconZoom" data-dcnode-id="6506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-7-small580.jpg" rel="nofollow"><span data-dcnode-id="6507" instrument_node="">Aumentar</span></a><span data-dcnode-id="6505" instrument_node=""> </span><a class="iconOrig" data-dcnode-id="6503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-7.jpg" rel="nofollow"><span data-dcnode-id="6504" instrument_node="">Original (jpeg, 92k)</span></a></div><span data-dcnode-id="6501" instrument_node="">

</span><p class="texte" data-dcnode-id="6492"><span class="paranumber" data-dcnode-id="6494"><span data-dcnode-id="6495" instrument_node="">25</span></span><span data-dcnode-id="6493" instrument_node="">Being much higher than male unemployment rates in more developed regions of the world, female unemployment rates decreased between 2005 and 2007 and then started to climb again apparently in North America, OECD and G-7 countries. The decreasing trend of female unemployment rates continues even after 2007 in European countries. Both male and female unemployment rates are higher in Europe, compared to North America and Oceania at each year between 2000 and 2008 (see Figures VI and VII).</span></p><span data-dcnode-id="6491" instrument_node="">
</span><div class="textIcon" data-dcnode-id="6475"><span data-dcnode-id="6490" instrument_node="">

</span><p class="titreillustration" data-dcnode-id="6471"><span data-dcnode-id="6472" instrument_node="">Figure VII: Unemployment Rates by Region (Women, age 15-64)</span></p><a data-dcnode-id="6469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-9-small580.jpg" rel="iconSet"><img alt="Figure VII: Unemployment Rates by Region (Women, age 15-64)" data-dcnode-id="6470" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-9-small480.jpg&amp;raw"></a><div class="textIconAccess" data-dcnode-id="6463"><a class="iconZoom" data-dcnode-id="6467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-9-small580.jpg" rel="nofollow"><span data-dcnode-id="6468" instrument_node="">Aumentar</span></a><span data-dcnode-id="6466" instrument_node=""> </span><a class="iconOrig" data-dcnode-id="6464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-9.jpg" rel="nofollow"><span data-dcnode-id="6465" instrument_node="">Original (jpeg, 92k)</span></a></div><span data-dcnode-id="6462" instrument_node="">
</span><p class="creditillustration" data-dcnode-id="6460"><span data-dcnode-id="6461" instrument_node="">Source: Derived by the author from OECD Labor Statistics</span></p><span data-dcnode-id="6459" instrument_node="">
</span></div><span data-dcnode-id="6457" instrument_node="">
</span><p class="texte" data-dcnode-id="6453"><span class="paranumber" data-dcnode-id="6455"><span data-dcnode-id="6456" instrument_node="">26</span></span><span data-dcnode-id="6454" instrument_node="">Most of the world’s employed population (43,3%) works in the services sector, while 33,5% is employed in agriculture and 23,2% works in the industrial sector in the year 2008. The region that is highly engaged in agriculture is Sub-Saharan Africa. Developed economies and the European Union are relatively more engaged in services sectors. There is a noticeable shift from agriculture to other sectors around the world as a whole and in each individual region beginning from 1998 to the year 2008. This shift seems to be captured mostly by the services sectors. The shift from agriculture to industry and services is most striking in East Asia between 1998 and 2008. In the Middle East the shift was mainly from agriculture to services (see Table IV).</span></p><span data-dcnode-id="6452" instrument_node="">
</span><div class="textIcon" data-dcnode-id="6436"><span data-dcnode-id="6451" instrument_node="">
</span><p class="titreillustration" data-dcnode-id="6449"><span data-dcnode-id="6450" instrument_node="">Table IV: World and Regional Estimates of Employment by Sector</span></p><a data-dcnode-id="6447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-10.jpg" rel="iconSet"><img alt="Table IV: World and Regional Estimates of Employment by Sector" data-dcnode-id="6448" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-10-small480.jpg&amp;raw"></a><div class="textIconAccess" data-dcnode-id="6441"><a class="iconZoom" data-dcnode-id="6445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-10.jpg" rel="nofollow"><span data-dcnode-id="6446" instrument_node="">Aumentar</span></a><span data-dcnode-id="6444" instrument_node=""> </span><a class="iconOrig" data-dcnode-id="6442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-10.jpg" rel="nofollow"><span data-dcnode-id="6443" instrument_node="">Original (jpeg, 204k)</span></a></div><span data-dcnode-id="6440" instrument_node="">
</span><p class="creditillustration" data-dcnode-id="6438"><span data-dcnode-id="6439" instrument_node="">Source: ILO Global Employment Trends *2008 preliminary estimates.</span></p><span data-dcnode-id="6437" instrument_node="">
</span></div><span data-dcnode-id="6435" instrument_node="">
</span><p class="texte" data-dcnode-id="6431"><span class="paranumber" data-dcnode-id="6433"><span data-dcnode-id="6434" instrument_node="">27</span></span><span data-dcnode-id="6432" instrument_node="">It is worth noting that EPZ employment was found to increase by 217,27% in the Middle East between 2002 and 2006, while the increase was 91,18% in Asia, 157,77% in Eastern and Central Europe and 104,10% in Sub-Saharan Africa (ILO, 2007). This may be an indicator of the shift from agriculture to other sectors in those regions as well.</span></p><span data-dcnode-id="6430" instrument_node="">
</span><div class="textandnotes" data-dcnode-id="6411"><span data-dcnode-id="6429" instrument_node="">
</span><ul class="sidenotes" data-dcnode-id="6420"><span data-dcnode-id="6428" instrument_node="">
</span><li data-dcnode-id="6422"><span class="num" data-dcnode-id="6426"><span data-dcnode-id="6427" instrument_node="">2</span></span><span data-dcnode-id="6425" instrument_node=""> </span><span data-dcnode-id="6423" lang="en" xml:lang="en"><span data-dcnode-id="6424" instrument_node="">For further comments on these figures, see Dejardin (2008).</span></span></li><span data-dcnode-id="6421" instrument_node="">
</span></ul><span data-dcnode-id="6419" instrument_node="">
</span><p class="texte" data-dcnode-id="6413"><span class="paranumber" data-dcnode-id="6417"><span data-dcnode-id="6418" instrument_node="">28</span></span><span data-dcnode-id="6416" instrument_node="">If we go through the gender decomposition of employment in different sectors, we observe that nearly 40% of the wage employment in non-agricultural sector in the world is composed of women workers. The female shares of the non-agricultural sector in developed and developing countries such as The Commonwealth of Independent States (Europe and Asia), Latin America and East Asia are both higher and on an increasing trend since 1990, compared to less-developed regions. Female shares rose even in Western Asia, Southern Asia, Sub-Saharan Africa and Oceania between 1990 and 2006 (see Figures VIII and IX). Dejardin (2008) explains these trends with the increased demand for woman workers in export industries. The expansion of women’s paid employment is most observable in developing countries, but it has been observed even in countries which are known for the traditionally low rates of female labor force participation (e.g. Bangladesh). The figures below demonstrate female shares of wage employment in non-agricultural sectors across regions and selected Asian countries respectively. There have been noticeable increases in women’s share of total employment in manufacturing, especially in Sri Lanka since 1995 and in Thailand and Singapore since 2000. The lowest ratio across years between 1980 and 2005 was around 20% in the selected Asian countries.</span><a class="footnotecall" data-dcnode-id="6414" href="#ftn2" id="bodyftn2"><span data-dcnode-id="6415" instrument_node="">2</span></a></p><span data-dcnode-id="6412" instrument_node="">

</span><p class="creditillustration" data-dcnode-id="6379"><span data-dcnode-id="6380" instrument_node="">Source: Dejardin (2008&nbsp;: 5), derived from ILO Global Employement Trends</span></p><span data-dcnode-id="6378" instrument_node="">

</span><p class="texte" data-dcnode-id="6372"><span class="paranumber" data-dcnode-id="6374"><span data-dcnode-id="6375" instrument_node="">29</span></span><span data-dcnode-id="6373" instrument_node="">Primo (2003), Carr and Chen (2002) and Dejardin (2008) address the changing structure of jobs with globalization and argue that exports are becoming more information-based, requiring more skills and specialization such as software development and investment analysis. While these jobs are promising for women and men who have accomplished modest levels of education, and offer higher pay opportunities, most women remain with traditional occupations, such as export manufacturing. The authors convey the idea that these developments help to replicate the gender division of labor. Consistent with this, women are stuck in conventional jobs in banking, telecommunications and insurance sectors, and “in the low-skilled end of the hierarchy: simple, single-tasked jobs such as data-entry, invoicing, payroll administration and routine accounting; and call centre work” (Dejardin, 2008: 6). This kind of low-skilled jobs are mostly intense in the Caribbean, China, India, Malaysia and the Philippines employing women in a majority. For example, in Jamaica, women construct 100% of the data entry workers in “digiports” and in India, similarly, most of the data entry jobs in banking, airlines and insurance firms are occupied by women (Mitter, 2003). On the contrary, in countries such as Brazil, India and Malaysia, women were introduced and welcomed into more skilled jobs like software programming and computer analysis. However, it is noted that many of these women come from more privileged or more advantageous backgrounds and they are less in numbers. It is also another fact that these occupations are usually featured with long working hours, stringent productivity targets, lack of job security, and limited long-term career prospects (Dejardin, 2008).</span></p><span data-dcnode-id="6371" instrument_node="">
</span><p class="texte" data-dcnode-id="6367"><span class="paranumber" data-dcnode-id="6369"><span data-dcnode-id="6370" instrument_node="">30</span></span><span data-dcnode-id="6368" instrument_node="">Employment rates of women and men differ according to their marital status across countries. Table V presents the employment rates of men and women in selected countries for the year 2006. Except the category of divorced people, men always have higher employment rates than women in Bulgaria, Czech Republic, Greece, Hungary, Poland, Portugal, Spain and Turkey. Strikingly, divorced women in Bulgaria and Poland have higher employment rates than that of divorced men. Divorced women are more eager to participate in employment compared to never married, married or widowed women. Among the selected countries, Portugal has the highest female employment rate (50.8%) in 2006 while Turkey has the lowest (22.3%).</span></p><span data-dcnode-id="6366" instrument_node="">

</span><p class="texte" data-dcnode-id="4421"><span class="paranumber" data-dcnode-id="4423"><span data-dcnode-id="4424" instrument_node="">32</span></span><span data-dcnode-id="4422" instrument_node="">Table VII displays employment patterns in terms of job tenure, measured by the length of time workers have been in their current or main job or with their current employer. This information is valuable for estimating the degree of fluidity in the labor market and for identifying the areas of economic activity where the turnover of labor is rapid, or otherwise. Thus far, OECD has collected and reported data for a reduced number of European countries. Among the countries considered, women in Portugal exhibit the longest time of job tenure in years (counting 13 years on average). Men have the longest job tenure in Italy and Luxembourg. Lowest job tenure accounts are encountered in Denmark, Ireland, Spain and the United Kingdom for women and Denmark and Hungary for men on average.</span></p><span data-dcnode-id="4420" instrument_node="">

</span><p class="creditillustration" data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">Source: OECD Statistics</span></p><span data-dcnode-id="2706" instrument_node="">
</span><p class="texte" data-dcnode-id="2702"><span class="paranumber" data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">34</span></span><span data-dcnode-id="2703" instrument_node="">Table IX displays the numbers and shares of the working poor in total employment. The situation is not gladdening according to both definitions of being a working poor. If we define it as earning less than 1.25 USD a day, the world had 822 millions of working poor in 1997 and 609.5 millions in 2007. These numbers correspond to shares of 32.7% and 20.6% respectively in total employment. More than half of the working population is considered as a working poor in Sub-Saharan Africa according to this definition. </span></p><span data-dcnode-id="2701" instrument_node="">
</span><div class="textIcon" data-dcnode-id="2685"><span data-dcnode-id="2700" instrument_node="">
</span><p class="titreillustration" data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Table IX: Working Poor Indicators, World and Regions</span></p><a data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-13.jpg" rel="iconSet"><img alt="Table IX: Working Poor Indicators, World and Regions" data-dcnode-id="2697" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-13-small480.jpg&amp;raw"></a><div class="textIconAccess" data-dcnode-id="2690"><a class="iconZoom" data-dcnode-id="2694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-13.jpg" rel="nofollow"><span data-dcnode-id="2695" instrument_node="">Aumentar</span></a><span data-dcnode-id="2693" instrument_node=""> </span><a class="iconOrig" data-dcnode-id="2691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.openedition.org/eces/docannexe/image/290/img-13.jpg" rel="nofollow"><span data-dcnode-id="2692" instrument_node="">Original (jpeg, 133k)</span></a></div><span data-dcnode-id="2689" instrument_node="">
</span><p class="creditillustration" data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">Source: ILO, Trends Econometric Models, December 2008</span></p><span data-dcnode-id="2686" instrument_node="">
</span></div><span data-dcnode-id="2684" instrument_node="">
</span><p class="texte" data-dcnode-id="2680"><span class="paranumber" data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">35</span></span><span data-dcnode-id="2681" instrument_node="">The situation is even worse when we take into account the definition of the working poor as the ones that earn less than 2 USD a day. In 2007, 40.6% of the employed people in the world constituted the working poor and a strikingly high majority, as much as 82.2%, of the total employed in Sub-Saharan Africa were considered as the working poor according to this definition.</span></p><span data-dcnode-id="2679" instrument_node="">
</span><p class="texte" data-dcnode-id="2675"><span class="paranumber" data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">36</span></span><span data-dcnode-id="2676" instrument_node="">I now turn back to the labor force in EPZs. Rewarded with special incentives to attract foreign investors, EPZs have engaged in a broad range of activities such as tourist resorts, high-tech industries and financial services. But most of the activity, being concentrated on textiles, clothing and electronics, is still low-tech and requires low-skill labor. Although these zones have created new employment opportunities, especially for young women that would otherwise work in the domestic sector or agriculture, it is not easy to figure out how much these jobs contributed to the net changes in employment. What is more problematic is the difficulty of finding reliable data on the quality, cost and duration of jobs in EPZs. It should be noted that these zones also led to a decrease in the number of jobs in some countries, such as Mexico. There is moreover a high rate of turnover in the zones causing workers to stay usually no more than five years in their jobs (ICFTU, 2004). </span></p><span data-dcnode-id="2674" instrument_node="">
</span><p class="texte" data-dcnode-id="2670"><span class="paranumber" data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">37</span></span><span data-dcnode-id="2671" instrument_node="">Regarding the labor rights in EPZs, the situation is not gladdening. In most of the countries, firms investing in EPZs are exempt from employment legislation and, moreover, national labor laws are not implied in most of the countries (e.g. Dominican Republic, Philippines and Mexico). For instance, six EPZs in Bangladesh are exempt from laws establishing freedom of association and the right to bargain collectively. EPZ workers in Kenya were not allowed to join trade unions until the year 2003. Union activity causes dismissal from jobs and in some cases violence towards workers in many EPZs. It is further claimed that women are considered less likely to join a union since they are seen as more disciplined, careful and more obedient than men (ICFTU, 2004: 9). </span></p><span data-dcnode-id="2669" instrument_node="">
</span><p class="texte" data-dcnode-id="2665"><span class="paranumber" data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">38</span></span><span data-dcnode-id="2666" instrument_node="">Gender discrimination, lack of health and safety conditions and excessive working hours are the norm in most EPZs. ICFTU Report on Export Processing Zones (2003) has staggering observations and detections about the situation of woman workers in EPZs. The report asserts that women are often subject to various forms of discrimination that influence their day-to day work and career development. </span></p><span data-dcnode-id="2664" instrument_node="">
</span><blockquote data-dcnode-id="2656"><span data-dcnode-id="2663" instrument_node="">
</span><p class="citation" data-dcnode-id="2658"><span data-dcnode-id="2662" instrument_node="">Most EPZ-based companies take no account of the specific needs of women workers, such as suitable working hours, rights during pregnancy, maternity leave or crèche facilities. In some cases, they are forced to resign when reaching the fourth month of pregnancy, or are not allowed to return to work after the child is born. The pregnancy tests imposed by some employers in the </span><em data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">maquilas</span></em><span data-dcnode-id="2659" instrument_node=""> of Mexico are a striking example of the serious discrimination suffered by women workers. In the factories located along the US border, women are often forced to show used sanitary towels to prove that they are not pregnant. Pregnant workers are placed under such pressure that they are forced to resign, or are illegally dismissed. (ICFTU, 2003: 11)</span></p><span data-dcnode-id="2657" instrument_node="">
</span></blockquote><span data-dcnode-id="2655" instrument_node="">
</span><p class="texte" data-dcnode-id="2651"><span class="paranumber" data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">39</span></span><span data-dcnode-id="2652" instrument_node="">The report further exemplifies these conditions in the EPZs of China, Bangladesh, Haiti, Honduras and many other countries with case studies and interviews. </span></p><span data-dcnode-id="2650" instrument_node="">
</span><p class="texte" data-dcnode-id="2646"><span class="paranumber" data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">40</span></span><span data-dcnode-id="2647" instrument_node="">The Kenya Human Rights Commission (KHRC), “The Manufacture of Poverty: The Untold Story of EPZs in Kenya", reports:</span></p><span data-dcnode-id="2645" instrument_node="">
</span><blockquote data-dcnode-id="2640"><span data-dcnode-id="2644" instrument_node="">
</span><p class="citation" data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">Commonly hired on short-term contracts – or with no contract at all – women work at high speed for low wages, in unhealthy conditions, and they are forced to put in long hours to earn enough just to get by. Most get no sick leave or maternity leave, few are enrolled in health schemes and almost none have savings for the future. The insecurity of these jobs is not only material: they work under threats of sexual harassment. Traditionally, women are the care-givers in the home – raising children and caring for sick and elderly relatives. Women are still forced to play that role even when they have become cash-earners. Doubly burdened, and with little support from their governments or employers to manage, the stress can destroy their own health, break up their family lives and undermine their children’s chances of a better future. (KHRC, 2004: 11)</span></p><span data-dcnode-id="2641" instrument_node="">
</span></blockquote><span data-dcnode-id="2639" instrument_node="">
</span><p class="texte" data-dcnode-id="2635"><span class="paranumber" data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">41</span></span><span data-dcnode-id="2636" instrument_node="">Being firstly established in the 1980s, China has many special economic zones even in the form of cities and millions of workers are employed in these zones. Recalling the documentary film of sweatshop workers “China Blue”, directed by Micha X. Peled (2005), including children at the age of 14-15, millions of woman employees work in factories, usually without occupational safety and health, for long hours, at low wages, often not paid on time, and migrant workers live in poor conditions and without humane treatment.</span></p><span data-dcnode-id="2634" instrument_node="">
</span><p class="texte" data-dcnode-id="2630"><span class="paranumber" data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">42</span></span><span data-dcnode-id="2631" instrument_node="">Although firms investing in EPZs continue to hire women to give them unskilled, repetitive tasks in the highly labor-intensive industries, this state of affairs might change in the future if EPZ production shifts to higher-technology, employing the more skilled male workers in detriment of female workers.</span></p><span data-dcnode-id="2629" instrument_node="">
</span><h1 class="texte" data-dcnode-id="2626"><a data-dcnode-id="2627" href="#tocfrom1n5" id="tocto1n5"><span data-dcnode-id="2628" instrument_node="">5. Conclusion</span></a></h1><span data-dcnode-id="2625" instrument_node="">
</span><p class="texte" data-dcnode-id="2621"><span class="paranumber" data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">43</span></span><span data-dcnode-id="2622" instrument_node="">The increased liberal orientation of trade policies and the recent trends in production, investment and trade patterns have had a significant impact on the labor markets. Growing labor market flexibility and income insecurity has pushed more women into the labor force (feminization). However, more people are unemployed year by year, although unemployment rates seem to be stagnant around 6% in the last ten years. Female unemployment rates are still higher than that of males. Nevertheless, we should note here that it is not the number of employed women that is of the highest importance, but their working environment, health and safety conditions and the extent to which labor rights are implied. </span></p><span data-dcnode-id="2620" instrument_node="">
</span><p class="texte" data-dcnode-id="2616"><span class="paranumber" data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">44</span></span><span data-dcnode-id="2617" instrument_node="">Increased demand for women in export industries has led to rising female shares of employment in non-agricultural sector. Growth of subcontracting, outsourcing, offshore production and EPZs has demanded more labor force, especially female. Unfortunately, women have no job security, they encounter terrible working conditions, disparities in wages and increased mobility. Wage inequality and poverty still remain as the norm in the era of globalization despite the high levels of output growth, international trade and investment. This brings to mind the question whether recent neoliberal policies and free trade expansion have improved, as promised, people’s lives, or not. If not, what kind of policies do we need for more equitable growth and development? </span></p><span data-dcnode-id="2615" instrument_node="">
</span><p class="texte" data-dcnode-id="2611"><span class="paranumber" data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">45</span></span><span data-dcnode-id="2612" instrument_node="">The problem of non-availability of reliable statistics to compare labor market characteristics such as wages, gender wage gap, work hours and so forth continues to be of crucial importance hindering the possibility of seeing the real picture of the labor market.</span></p><span data-dcnode-id="2610" instrument_node="">
</span><blockquote data-dcnode-id="2605"><span data-dcnode-id="2609" instrument_node="">
</span><p class="citation" data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">While the international community has made a commitment to achieving full employment and decent work for all, this goal seems ever more distant in view of recent trends such as growing unemployment and underemployment, the phenomenon of ‘jobless growth’, the growing ‘casualization’ of employment relations, the promotion of labor flexibility at the expense of welfare security, de-industrialization and the continued decline of peasant agriculture. (Ocampo and Jomo, 2007)</span></p><span data-dcnode-id="2606" instrument_node="">
</span></blockquote><span data-dcnode-id="2604" instrument_node="">
</span><p class="texte" data-dcnode-id="2600"><span class="paranumber" data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">46</span></span><span data-dcnode-id="2601" instrument_node="">The gender dimensions of these problems thus remain of crucial importance to be further studied.</span></p><span data-dcnode-id="2599" instrument_node="">
