supporting Smart City policy: Evaluation of the electric car use in Lorraine Region</span></em></th><td data-dcnode-id="6946"><span data-dcnode-id="6947" instrument_node="">PI/QL</span></td></tr><tr data-dcnode-id="6939"><th data-dcnode-id="6942" scope="row"><em data-dcnode-id="6943"><span data-dcnode-id="6944" instrument_node="">Excluding citizens from the European smart city: The discourse practices of pursuing and granting smartness</span></em></th><td data-dcnode-id="6940"><span data-dcnode-id="6941" instrument_node="">IE/QL</span></td></tr><tr data-dcnode-id="6933"><th data-dcnode-id="6936" scope="row"><em data-dcnode-id="6937"><span data-dcnode-id="6938" instrument_node="">A Multiple-Attribute Decision Making-based approach for smart city rankings design</span></em></th><td data-dcnode-id="6934"><span data-dcnode-id="6935" instrument_node="">PI/IE/QL</span></td></tr><tr data-dcnode-id="6927"><th data-dcnode-id="6930" scope="row"><em data-dcnode-id="6931"><span data-dcnode-id="6932" instrument_node="">Heuristic for the localization of new shops based on business and social criteria</span></em></th><td data-dcnode-id="6928"><span data-dcnode-id="6929" instrument_node="">IE/QL</span></td></tr><tr data-dcnode-id="6921"><th data-dcnode-id="6924" scope="row"><em data-dcnode-id="6925"><span data-dcnode-id="6926" instrument_node="">The relationship between regional compactness and regional innovation capacity (RIC): Empirical evidence from a national study</span></em></th><td data-dcnode-id="6922"><span data-dcnode-id="6923" instrument_node="">IE</span></td></tr><tr data-dcnode-id="6915"><th data-dcnode-id="6918" scope="row"><em data-dcnode-id="6919"><span data-dcnode-id="6920" instrument_node="">Investigating ‘anywhere working’ as a mechanism for alleviating traffic congestion in smart cities</span></em></th><td data-dcnode-id="6916"><span data-dcnode-id="6917" instrument_node="">PI/QL</span></td></tr><tr data-dcnode-id="6909"><th data-dcnode-id="6912" scope="row"><em data-dcnode-id="6913"><span data-dcnode-id="6914" instrument_node="">A cross-disciplinary path to healthy and energy efficient buildings</span></em></th><td data-dcnode-id="6910"><span data-dcnode-id="6911" instrument_node="">PI/QL</span></td></tr><tr data-dcnode-id="6903"><th data-dcnode-id="6906" scope="row"><em data-dcnode-id="6907"><span data-dcnode-id="6908" instrument_node="">Intermediaries for knowledge transfer in integrated energy planning of urban districts</span></em></th><td data-dcnode-id="6904"><span data-dcnode-id="6905" instrument_node="">PI/QL</span></td></tr><tr data-dcnode-id="6897"><th data-dcnode-id="6900" scope="row"><em data-dcnode-id="6901"><span data-dcnode-id="6902" instrument_node="">Combining co-citation clustering and text-based analysis to reveal the main development paths of smart cities</span></em></th><td data-dcnode-id="6898"><span data-dcnode-id="6899" instrument_node="">PI/IE/QL</span></td></tr><tr data-dcnode-id="6891"><th data-dcnode-id="6894" scope="row"><em data-dcnode-id="6895"><span data-dcnode-id="6896" instrument_node="">Strategic principles for smart city development: A multiple case study analysis of European best practices</span></em></th><td data-dcnode-id="6892"><span data-dcnode-id="6893" instrument_node="">PI/IE/QL</span></td></tr><tr data-dcnode-id="6885"><th data-dcnode-id="6888" scope="row"><em data-dcnode-id="6889"><span data-dcnode-id="6890" instrument_node="">Εnhancing social networking in smart cities: Privacy and security borderlines</span></em></th><td data-dcnode-id="6886"><span data-dcnode-id="6887" instrument_node="">IE/QL</span></td></tr><tr data-dcnode-id="6879"><th data-dcnode-id="6882" scope="row"><em data-dcnode-id="6883"><span data-dcnode-id="6884" instrument_node="">To the smart city and beyond? Developing a typology of smart urban innovation</span></em></th><td data-dcnode-id="6880"><span data-dcnode-id="6881" instrument_node="">PI/IE/QL</span></td></tr><tr data-dcnode-id="6873"><th data-dcnode-id="6876" scope="row"><em data-dcnode-id="6877"><span data-dcnode-id="6878" instrument_node="">Implementing citizen centric technology in developing smart cities: A model for predicting the acceptance of urban technologies</span></em></th><td data-dcnode-id="6874"><span data-dcnode-id="6875" instrument_node="">PI/IE/QL</span></td></tr><tr data-dcnode-id="6867"><th data-dcnode-id="6870" scope="row"><em data-dcnode-id="6871"><span data-dcnode-id="6872" instrument_node="">Towards the smart city 2.0: Empirical evidence of using smartness as a tool for tackling social challenges</span></em></th><td data-dcnode-id="6868"><span data-dcnode-id="6869" instrument_node="">PI/IE/QL</span></td></tr><tr data-dcnode-id="6861"><th data-dcnode-id="6864" scope="row"><em data-dcnode-id="6865"><span data-dcnode-id="6866" instrument_node="">An exploration of smart city approaches by international ICT firms</span></em></th><td data-dcnode-id="6862"><span data-dcnode-id="6863" instrument_node="">IE/QL</span></td></tr><tr data-dcnode-id="6855"><th data-dcnode-id="6858" scope="row"><em data-dcnode-id="6859"><span data-dcnode-id="6860" instrument_node="">Navigating platform urbanism</span></em></th><td data-dcnode-id="6856"><span data-dcnode-id="6857" instrument_node="">PI/QL</span></td></tr><tr data-dcnode-id="6849"><th data-dcnode-id="6852" scope="row"><em data-dcnode-id="6853"><span data-dcnode-id="6854" instrument_node="">Measuring the extent to which Londoners are willing to pay for public art in their city</span></em></th><td data-dcnode-id="6850"><span data-dcnode-id="6851" instrument_node="">IE/QL</span></td></tr><tr data-dcnode-id="6843"><th data-dcnode-id="6846" scope="row"><em data-dcnode-id="6847"><span data-dcnode-id="6848" instrument_node="">Business Model Innovation for Urban Smartization</span></em></th><td data-dcnode-id="6844"><span data-dcnode-id="6845" instrument_node="">IE</span></td></tr><tr data-dcnode-id="6837"><th data-dcnode-id="6840" scope="row"><em data-dcnode-id="6841"><span data-dcnode-id="6842" instrument_node="">Municipalities' understanding of the Smart City concept: an exploratory analysis in Belgium</span></em></th><td data-dcnode-id="6838"><span data-dcnode-id="6839" instrument_node="">PI/IE/QL</span></td></tr><tr data-dcnode-id="6831"><th data-dcnode-id="6834" scope="row"><em data-dcnode-id="6835"><span data-dcnode-id="6836" instrument_node="">Identifying and supporting exploratory and exploitative models of innovation in municipal urban planning; Key challenges from seven Norwegian energy ambitious neighborhood pilots</span></em></th><td data-dcnode-id="6832"><span data-dcnode-id="6833" instrument_node="">PI/IE/QL</span></td></tr><tr data-dcnode-id="6825"><th data-dcnode-id="6828" scope="row"><em data-dcnode-id="6829"><span data-dcnode-id="6830" instrument_node="">Towards a service-dominant platform for public value co-creation in a smart city: Evidence from two metropolitan cities in China</span></em></th><td data-dcnode-id="6826"><span data-dcnode-id="6827" instrument_node="">PI/IE/QL</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="6769" id="p0195"><span data-dcnode-id="6819" instrument_node="">In detail, more than one-third of the sample (i.e. twelve papers) provides the reader with some conceptualizations, approaches, and typologies to read and interpret the smart cities phenomenon through more critical lenses. </span><a class="workspace-trigger" data-dcnode-id="6817" href="#bb0035" name="bbb0035"><span data-dcnode-id="6818" instrument_node="">Andreani et al. (2018)</span></a><span data-dcnode-id="6816" instrument_node=""> argue about how to move the locus of inquiry from a technocentric and universalist approach on smart cities – mainly predictable, overplanned, top-down, efficient, and quantitative – towards a design-driven and human-centric approach – which is more unintentional, temporary, democratic, creative, and qualitative. Drawing from research pursued within the ‘Real Cities/Bergamo 2035’ joint initiative between the University of Bergamo and the Graduate School of Design at Harvard University, authors focused on mid-sized European cities; three scenarios were investigated: the adaptive street environments, the responsive urban safety, and the dynamic retail spaces. The proposed model is articulated into three interwoven components: a grounded vision, addressing the ideation of alternative futures that stem from specific needs or local opportunities; an embraced technology, elaborating on the role played by urban technologies in augmenting the inner intelligence of places; and an urban co-evolution, fostering a mutually-constructive interaction between the urban players (i.e. citizens, researchers and designers, and stakeholders) for collaborative innovation. </span><a class="workspace-trigger" data-dcnode-id="6814" href="#bb0135" name="bbb0135"><span data-dcnode-id="6815" instrument_node="">Dameri et al. (2018)</span></a><span data-dcnode-id="6813" instrument_node=""> conceptualize smart cities as a glocal strategy. A smart city is global since it is a phenomenon spreading all over the world, with some shared features and interdependencies: they attract investments, talents, and innovative firms; however, it is a local phenomenon as each city shows unique characteristics and problems policy makers can only deal with by means of specific solutions: it suffices to think about the geographical and territorial specificities, the cultural milieu, the needs and traditions of the communities. By comparing Italian (Bologna, Milan, Turin, Florence, and Genoa) and Chinese (Shanghai, Beijing, Tianjin, Guangzhou, and Chengdu) cities, authors develop a theoretical framework based on four dimensions: people (smart citizens; smart city actors such as firms, universities, private bodies; people involvement), government (political institutions; powers distribution; smart city governance processes; priorities), infrastructure (better use of energy; renewal energy source; buildings efficiency; efficient services like transport), and land (environmental and geographical aspects; cultural history and heritage; logistics). It results that the Italian and Chinese smart city implementation path differ since the former exhibits a bottom-up approach as a result of the following local drivers (existing infrastructures, lack of a national smart city strategy, decentralized governance, lack of funding to support smart cities initiatives), whereas the latter follow a top-down approach deriving from a national smart city strategy. </span><a class="workspace-trigger" data-dcnode-id="6811" href="#bb0170" name="bbb0170"><span data-dcnode-id="6812" instrument_node="">Escolar et al. (2018)</span></a><span data-dcnode-id="6810" instrument_node=""> review the existing ranking for smart cities highlighting their major weaknesses in the overlook of technological criteria. To fill this gap, they advance a methodological approach for developing smart cities rankings based on technological and smartness criteria; they do it by applying a multi-attribute decision making-based approach (MADM). The smartness dimension authors propose considers thirty-eight ICT indicators related to the main enabling technologies for smart cities realization: sensors and actuators, networking, platforms and services deployed, applications, standardization level, and metrics to determine their impact on the city. By testing their method on three case studies (Seoul, Santander, and New York), authors highlight its strengths (i.e. coherence with the most commonly accepted vision of the IoT and smart cities, set of new ICT and smartness indicators, and easy extension with new indicators) and weaknesses (i.e. subjectivity of the MADM method, limited number of cities involved in the ranking). </span><a class="workspace-trigger" data-dcnode-id="6808" href="#bb0355" name="bbb0355"><span data-dcnode-id="6809" instrument_node="">Mora et al. (2018a)</span></a><span data-dcnode-id="6807" instrument_node=""> rely on two hybrid techniques to unveil the main development paths of smart cities; precisely, they combine co-citation clustering and text-based analysis to perform their bibliometric study (</span><a class="workspace-trigger" data-dcnode-id="6805" href="#bb0045" name="bbb0045"><span data-dcnode-id="6806" instrument_node="">Appio et al., 2014</span></a><span data-dcnode-id="6804" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6802" href="#bb0050" name="bbb0050"><span data-dcnode-id="6803" instrument_node="">Appio et al., 2016</span></a><span data-dcnode-id="6801" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6799" href="#bb0190" name="bbb0190"><span data-dcnode-id="6800" instrument_node="">Glanzel and Thijs, 2011</span></a><span data-dcnode-id="6798" instrument_node="">). They show that research on smart cities is diverging into five development paths: experimental, ubiquitous, corporate, European, and holistic. Importantly, four main dichotomies emerge which are mainly rooted into the cognitive-epistemological structure of the smart city research and challenge the scientific community: techno-led or holistic, top-down or bottom-up, double or triple/quadruple helix, mono-dimensional or integrated. The ambiguity generated by these dichotomies challenges policy makers in setting a proper smart cities development agenda. Moving from the need deal with these dichotomies, </span><a class="workspace-trigger" data-dcnode-id="6796" href="#bb0360" name="bbb0360"><span data-dcnode-id="6797" instrument_node="">Mora et al. (2018b)</span></a><span data-dcnode-id="6795" instrument_node=""> investigate the validity of the strategic principles for smart city development by comparing four cities considered to be leading examples of European smart cities: Amsterdam, Barcelona, Helsinki, Vienna. Through a best practice analysis, the authors identify six strategic principles to support the decision-making process and speed up the effective deployment of smart technologies in European urban environments: look beyond technology; move towards a quadruple-helix collaborative model; combine top-down (government-led) and bottom-up (community-driven); build a strategic framework; boost the digital transformation by establishing a smart city accelerator; adopt an integrated intervention logic. In reviewing what constitutes the smart in smart cities, </span><a class="workspace-trigger" data-dcnode-id="6793" href="#bb0385" name="bbb0385"><span data-dcnode-id="6794" instrument_node="">Nilssen (2018)</span></a><span data-dcnode-id="6792" instrument_node=""> concluded that the concept of smartness should be understood as a collection of developmental features; smart cities initiatives have to be able to effectively connect the wide range of existing activities, adopting a holistic approach. The latter should be based on a typology of smart urban innovations based on new technological practices, products, and services; organizational project-based levers internal to the municipal organization; public-private networks and triple helix collaborative models; and a rhetoric dimension inspiring the vision of an innovative urbanism. She discusses her typology in the light of the smart cities initiatives in the city of BodØ (Norway). </span><a class="workspace-trigger" data-dcnode-id="6790" href="#bb0450" name="bbb0450"><span data-dcnode-id="6791" instrument_node="">Sepasgozar et al. (2018)</span></a><span data-dcnode-id="6785"><span data-dcnode-id="6789" instrument_node=""> advance a new Urban Services Technology Acceptance Model (USTAM), which is aimed at assisting governments and business to develop appropriate ‘urban service’ technologies for local contexts and emerging economies. Major emphasis is posed on the relevance of local knowledge as a source of innovative potential for smart cities. Their model is able to assess to what extent the behavior intention to use UST is influenced by factors such as service quality, self-efficacy, a number of TAM factors (i.e. perceived security, relative advantages, perceived of use, perceived usefulness, compatibility, reliability), as well as factors stemming from the </span><a class="topic-link" data-dcnode-id="6787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/social-cognitive-theory" title="Learn more about social cognitive theory from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6788" instrument_node="">social cognitive theory</span></a><span data-dcnode-id="6786" instrument_node=""> (i.e. work facilitating, cost reduction, energy saving, and time saving). </span></span><a class="workspace-trigger" data-dcnode-id="6783" href="#bb0495" name="bbb0495"><span data-dcnode-id="6784" instrument_node="">Trencher (2018)</span></a><span data-dcnode-id="6782" instrument_node=""> argues about the need to move from a smart city 1.0 approach towards a smart city 2.0. A smart city 1.0 revolves around a centralized approach with exogenous development has at its focus the diffusion of smart technologies for corporate and economic interests; the role of citizens is rather passive; the objective of the technology and experimentations is to optimize infrastructures and services, serve the demand side interests and spur new business opportunities, and address the universal technical agendas (energy, transport, economy). On the contrary, a smart city 2.0 approach is focused on people, governance, and policy; citizens have an active role as co-creators of innovations, problem solvers, and planners; the objective of technology and experimentation is to mitigate or solve social problems, enhance citizens' wellbeing and public services, and address specific endogenous problems and citizen's needs. Smart city 2.0 is clearly a decentralized approach in which diverse actors are involved and the development is endogenous to the system. Then, the author explains how the concept of Smart City 2.0 works by looking at the case of a Japanese city – Aizuwakamatsu – where explicit attention to tackle social issues and address citizens' needs is articulated and formalized in project documents. </span><a class="workspace-trigger" data-dcnode-id="6780" href="#bb0145" name="bbb0145"><span data-dcnode-id="6781" instrument_node="">Desdemoustier et al. (2018)</span></a><span data-dcnode-id="6779" instrument_node=""> investigate how – and to what extent – 113 Belgian municipalities understand the concept of Smart Cities. Findings suggested the creation of a typology of understandings comprising four dimensions: technological (a technology implementation), societal (a human, sustainable and institutional positioning), comprehensive (an integration of technology, human-centricity, sustainability, and institutional factors) and non-existent (an absence of understanding). Interestingly, municipalities engaged in comprehensive understanding find setting up smart city projects highly difficult; those with non-existent knowledge do not adhere to the phenomenon. </span><a class="workspace-trigger" data-dcnode-id="6777" href="#bb0380" name="bbb0380"><span data-dcnode-id="6778" instrument_node="">Nielsen et al. (2018)</span></a><span data-dcnode-id="6776" instrument_node=""> read the smart cities phenomenon through the lenses of the ambidextrous organizations. Through a multiple cases analysis, they study seven pilot projects in Norwegian municipalities, developers, and universities. They find that developing an ambidextrous capability alongside leveraging upon a bottom-up capacity building could be the right way to adapt recent technological advancements to emerging smart cities programs. </span><a class="workspace-trigger" data-dcnode-id="6774" href="#bb0095" name="bbb0095"><span data-dcnode-id="6775" instrument_node="">Camboim et al. (2018)</span></a><span data-dcnode-id="6773" instrument_node=""> come up with an integrated framework to make a city smarter on the basis of extant literature, interviews with experts, and insights from four smart cities projects (Amsterdam, Barcelona, Lisbon, Vienna). Their framework identified three steps: smart strategies, where governance takes the lead of the transformation process from a traditional city into a smart city; smart projects, in which socio-institutional, techno-economic and environmental and urban factors are the main drivers; and smart performance inflected in terms of sustainable socioeconomic development. Finally, </span><a class="workspace-trigger" data-dcnode-id="6771" href="#bb0535" name="bbb0535"><span data-dcnode-id="6772" instrument_node="">Yu et al. (2018)</span></a><span data-dcnode-id="6770" instrument_node=""> argue about the possibility to adopt the concept of service dominant platform (SDP) to help the city stakeholders to co-create smart cities. By combining the foundational elements of the service-dominant logic (SDL) with platform theory, they propose three dynamic conceptual pillars play a role: value proposition, value in exchange, and value in use, consisting of ten sub-elements articulated on four dimensions namely, openness, services innovation, governance, and resources. Findings from a business-oriented platform in Guangzhou (i.e. WeChat) and a government-oriented platform in Shanghai (i.e. Citizen Cloud) show that smart city initiatives subsume the multi-parties formulation of a co-creation sustainable strategy.</span></p><p data-dcnode-id="6710" id="p0200"><span data-dcnode-id="6768" instrument_node="">The remaining papers (i.e. nineteen) can be grouped into four clusters labeled as follows: business models for smart cities (</span><a class="workspace-trigger" data-dcnode-id="6766" href="#bb0005" name="bbb0005"><span data-dcnode-id="6767" instrument_node="">Abbate et al., 2018</span></a><span data-dcnode-id="6765" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6763" href="#bb0085" name="bbb0085"><span data-dcnode-id="6764" instrument_node="">Brock et al., 2018</span></a><span data-dcnode-id="6762" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6760" href="#bb0435" name="bbb0435"><span data-dcnode-id="6761" instrument_node="">Schiavone et al., 2018</span></a><span data-dcnode-id="6759" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6757" href="#bb0500" name="bbb0500"><span data-dcnode-id="6758" instrument_node="">Van den Buuse and Kolk, 2018</span></a><span data-dcnode-id="6756" instrument_node="">); applications to tackle specific smart cities challenges (</span><a class="workspace-trigger" data-dcnode-id="6754" href="#bb0030" name="bbb0030"><span data-dcnode-id="6755" instrument_node="">Amer et al., 2018</span></a><span data-dcnode-id="6753" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6751" href="#bb0210" name="bbb0210"><span data-dcnode-id="6752" instrument_node="">Grimaldi et al., 2018</span></a><span data-dcnode-id="6750" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6748" href="#bb0230" name="bbb0230"><span data-dcnode-id="6749" instrument_node="">Hopkins and McKay, 2018</span></a><span data-dcnode-id="6747" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6745" href="#bb0320" name="bbb0320"><span data-dcnode-id="6746" instrument_node="">Lex et al., 2018</span></a><span data-dcnode-id="6744" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6742" href="#bb0370" name="bbb0370"><span data-dcnode-id="6743" instrument_node="">Moustaka et al., 2018</span></a><span data-dcnode-id="6741" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6739" href="#bb0480" name="bbb0480"><span data-dcnode-id="6740" instrument_node="">Tanguy and Kumar, 2018</span></a><span data-dcnode-id="6738" instrument_node="">); actions and roles of stakeholders of the smart cities triple/quadruple helix (</span><a class="workspace-trigger" data-dcnode-id="6736" href="#bb0065" name="bbb0065"><span data-dcnode-id="6737" instrument_node="">Ardito et al., 2018</span></a><span data-dcnode-id="6735" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6733" href="#bb0130" name="bbb0130"><span data-dcnode-id="6734" instrument_node="">Corsini et al., 2018</span></a><span data-dcnode-id="6732" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6730" href="#bb0150" name="bbb0150"><span data-dcnode-id="6731" instrument_node="">Dupont et al., 2018</span></a><span data-dcnode-id="6729" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6727" href="#bb0165" name="bbb0165"><span data-dcnode-id="6728" instrument_node="">Engelbert et al., 2018</span></a><span data-dcnode-id="6726" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6724" href="#bb0335" name="bbb0335"><span data-dcnode-id="6725" instrument_node="">Lindkvist et al., 2018</span></a><span data-dcnode-id="6723" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6721" href="#bb0505" name="bbb0505"><span data-dcnode-id="6722" instrument_node="">Van der Graaf and Ballon, 2018</span></a><span data-dcnode-id="6720" instrument_node="">); policies for smart cities (</span><a class="workspace-trigger" data-dcnode-id="6718" href="#bb0100" name="bbb0100"><span data-dcnode-id="6719" instrument_node="">Caragliu and Del Bo, 2018</span></a><span data-dcnode-id="6717" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6715" href="#bb0125" name="bbb0125"><span data-dcnode-id="6716" instrument_node="">Contreras and Platania, 2018</span></a><span data-dcnode-id="6714" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6712" href="#bb0220" name="bbb0220"><span data-dcnode-id="6713" instrument_node="">Hamidi et al., 2018</span></a><span data-dcnode-id="6711" instrument_node="">).</span></p><p data-dcnode-id="6693" id="p0205"><span data-dcnode-id="6709" instrument_node="">Concerning the first cluster – business models for smart cities – </span><a class="workspace-trigger" data-dcnode-id="6707" href="#bb0005" name="bbb0005"><span data-dcnode-id="6708" instrument_node="">Abbate et al. (2018)</span></a><span data-dcnode-id="6706" instrument_node=""> explore the activities and strategic goals of twenty-one small and medium enterprises (SMEs) operating in eight different European countries that took part to </span><em data-dcnode-id="6704"><span data-dcnode-id="6705" instrument_node="">FrontierCities</span></em><span data-dcnode-id="6703" instrument_node="">, one of the nine FIWARE (Future Internet-ware) Accelerators focused on smart cities. The aim is understanding what type of business models they can adopt when exploiting the technological potential of an IoT platform. Authors reveal that only key resources can be considered as the core element in the customized products and service business model, while key activities and key partners stand as complementary variable; then, when firms aim at developing smart cities projects have to consider the cooperation with customer capabilities as the main key resources; customers become an important part of the puzzle in order for firms to deploy proper business models. By carrying out an in-depth case study at Philips Lighting, </span><a class="workspace-trigger" data-dcnode-id="6701" href="#bb0085" name="bbb0085"><span data-dcnode-id="6702" instrument_node="">Brock et al. (2018)</span></a><span data-dcnode-id="6700" instrument_node=""> show what type of business models are relevant for the smart city market. Philips is searching for new ways to create and capture value within different smart city ecosystems; four of them – Amsterdam, Eindhoven, Stratumseind, and Veghel – are instrumental to unveil the main business models: marbles business model, in which there is no integration of value creation or value capture activities between the different parties, and everything is developed in-house and sold as a one-off sale; Tetris business model, where value is created individually, while an extended set of revenue models are introduced that build on each other and can be shared across the ecosystem; Jenga business model, characterized by an extended value creation, where different ecosystem actors learn from each other, though with limited revenue potential for the individual parties; finally, the Jigsaw Puzzle business model, in which we have an extended value creation and value capture, by leveraging synergies within an ecosystem to jointly create the most value for customers and the ecosystem. </span><a class="workspace-trigger" data-dcnode-id="6698" href="#bb0435" name="bbb0435"><span data-dcnode-id="6699" instrument_node="">Schiavone et al. (2018)</span></a><span data-dcnode-id="6697" instrument_node=""> apply the business model canvas to the smart cities literature. They identify the revenue stream, cost structure, key resources, key activities, key partners, the value creation, customer relationships, market segments, and channels identifying the basic building blocks of the smart city business model canvas. Finally, </span><a class="workspace-trigger" data-dcnode-id="6695" href="#bb0500" name="bbb0500"><span data-dcnode-id="6696" instrument_node="">Van den Buuse and Kolk (2018)</span></a><span data-dcnode-id="6694" instrument_node=""> investigate the strategic approaches three multinational enterprises (MNEs) from the ICT industry (IBM, Cisco, Accenture) adopt as suppliers of smart city technologies. Evidence from firm-specific programs like IBM's Smarter Cities, Cisco's Smart+Connected Communities, and Accenture's Intelligent Cities, shows that both non-location-bound firms specific advantages (e.g., building resources and capabilities in management from heterogeneous urban contexts, building a position as international smart city technology supplier in a potential growth market, exploring complementarities between existing resources and capabilities in ICT and urban domains, among others) and location-bound firms specific advantages (e.g., building relationships with city governments in prime cities for the spread of smart cities technologies, building expert knowledge of specific urban system and infrastructures in a local context, gaining access to local knowledge clusters and urban stakeholders in a local context) are relevant components of the three MNEs' business models.</span></p><p data-dcnode-id="6673" id="p0210"><span data-dcnode-id="6692" instrument_node="">In the second cluster – applications to tackle specific smart cities challenges – </span><a class="workspace-trigger" data-dcnode-id="6690" href="#bb0030" name="bbb0030"><span data-dcnode-id="6691" instrument_node="">Amer et al. (2018)</span></a><span data-dcnode-id="6689" instrument_node=""> introduce a new method in order to alleviate vehicular traffic congestion in smart cities. This method is a centralized dynamic multi-objective optimization algorithm based on vehicular ad hoc networks (VANETs); it integrates a centralized simulated annealing (CSA) algorithm with the VIKOR method as a cost function. The aim of the CSA-VIKOR method is to provide the drivers with the optimal paths according to multiple criteria in order to meet the diverse navigation requirements of the drivers. The optimization algorithms, tested into the city centers of Turin and Birmingham, results in journeys improvements concerning the minimum travel time, the minimum travel distance, the minimum fuel consumption, the minimum amount of emissions, or a combination of the four. Still on traffic congestion, this time in Melbourne, </span><a class="workspace-trigger" data-dcnode-id="6687" href="#bb0230" name="bbb0230"><span data-dcnode-id="6688" instrument_node="">Hopkins and McKay (2018)</span></a><span data-dcnode-id="6686" instrument_node=""> explore the role of environmental factors (climate change, global warming, greenhouse gas emissions, atmospheric issues), economic factors (service economy, information-based work activities, decoupling work task from place, skill, and performance-based work), technological factors (widespread access to Internet, dematerialization, employee flexibility, bring-your-own-device practices, distributed teams) on the ‘anywhere working’ practices (worker attitudes towards adoption, and current commuter behavior). In turn, they also assess the benefits and constraints of the ‘anywhere working.’ The heuristic proposed by </span><a class="workspace-trigger" data-dcnode-id="6684" href="#bb0210" name="bbb0210"><span data-dcnode-id="6685" instrument_node="">Grimaldi et al. (2018)</span></a><span data-dcnode-id="6683" instrument_node=""> deals with the desertification of urban areas due to the massive close of local shops in contexts hit by the financial crisis. Their heuristic entails business and social criteria and results coming from the computational experiment run in the Sant Andreu district (Barcelona) show that an effective smart city policy faces urban degeneration by decreasing the risks of uniformity, mono-business activity, and gentrification of the neighborhood. Another contribution comes from a cross-disciplinary collaboration framed within four sub-themes: local energy systems, indoor climate in buildings, social and organizational conditions, and political circumstances (</span><a class="workspace-trigger" data-dcnode-id="6681" href="#bb0320" name="bbb0320"><span data-dcnode-id="6682" instrument_node="">Lex et al., 2018</span></a><span data-dcnode-id="6680" instrument_node="">). Authors propose a digital platform to deal with the indoor climate in public buildings in Copenhagen and argue about the importance to enacting micro-social cross-boundary collaborations among all the involved stakeholders as a way to create concrete scientific and practical insights on smart city development initiatives. By analyzing the case of Trikala (Greece), </span><a class="workspace-trigger" data-dcnode-id="6678" href="#bb0370" name="bbb0370"><span data-dcnode-id="6679" instrument_node="">Moustaka et al. (2018)</span></a><span data-dcnode-id="6677" instrument_node=""> pay attention to the publicly available data generated by people and shared on online social networks (OSN), providing measures to improve their privacy and security, smoothening the risks, and boost community's engagement in smart cities. OSN is conceptualized as sensors of urban dynamics with unquestionable advantages but not negligible threats and vulnerabilities. The interactions between smart people/smart living and privacy/security concerns are discussed and a multi-stage behavioral pattern model is advanced. Participation on OSN, education, and training for secure behavior, tools and software for privacy and security protection, data privacy legislative framework lead to better key performance indicators in smart cities. Finally, </span><a class="workspace-trigger" data-dcnode-id="6675" href="#bb0480" name="bbb0480"><span data-dcnode-id="6676" instrument_node="">Tanguy and Kumar (2018)</span></a><span data-dcnode-id="6674" instrument_node=""> give to art projects the role extant literature on smart cities neglected. They explore the impact of public art projects on the life and demand of citizens in London. By collecting data from two public art initiatives organized by the MTArt Agency they show that Londoners are willing to pay for more public art in local areas; furthermore, these projects call for a transversal involvement of art experts, urban planners, economists, sociologists, political scientists, and citizens.</span></p><p data-dcnode-id="6644" id="p0215"><span data-dcnode-id="6672" instrument_node="">The third cluster discusses the actions and roles of stakeholders of the smart cities triple/quadruple helix. </span><a class="workspace-trigger" data-dcnode-id="6670" href="#bb0065" name="bbb0065"><span data-dcnode-id="6671" instrument_node="">Ardito et al. (2018)</span></a><span data-dcnode-id="6669" instrument_node=""> argue that knowledge-based urban development (KBUD) frameworks are increasingly permeating the smart cities debate. They outline a 2 × 2 matrix on the basis of two dimensions: knowledge management (KM) issues, where project partners may address KM governance in different ways and KM processes can change according to the knowledge domain; knowledge management domains, by considering whether knowledge stems from similar or distant fields. A first quadrant captures KM governance when knowledge of project partners is used; the second quadrant analyzes KM governance when external knowledge is used; the third quadrant focuses on KM processes in cases of knowledge coming from project partners; a final quadrant presents cases of KM processes when external knowledge is used. By selecting cases of smart cities initiatives from Italian, English, American, Spanish, and Belgian cities, they investigate the role of universities (i.e. knowledge intermediary, provider, evaluator, gatekeeper in the triple or quadruple helix configurations). </span><a class="workspace-trigger" data-dcnode-id="6667" href="#bb0165" name="bbb0165"><span data-dcnode-id="6668" instrument_node="">Engelbert et al. (2018)</span></a><span data-dcnode-id="6666" instrument_node=""> focus their study on the role of citizens in the smart cities discourse. Moving from a characterization of a smart city as an assemblage of ‘peripheral’ smart city network practices and ‘central’ smart city project practices, they critically examine the political-economic ambitions of those cities able to grant the recognition ‘smart’ (i.e. European Research and Innovation Schemes) and those needing to ‘pursue’ it (i.e. post-crisis municipalities). Through such a differentiation, they figure out why the majority of the smart cities initiatives tend to exclude the needs and interests of citizens. Still focusing on the role of citizens, </span><a class="workspace-trigger" data-dcnode-id="6664" href="#bb0150" name="bbb0150"><span data-dcnode-id="6665" instrument_node="">Dupont et al. (2018)</span></a><span data-dcnode-id="6663" instrument_node=""> investigate the user representations French citizens in the Lorrain Region have when they confront with specific technologies like electric cars. Four complementary aspects characterize the social representation: the possibility of action of the subject on the system, the stimuli caused by the system, how the user will identify with the system, as well as the overall attraction. Authors were also able to qualify the pragmatic and hedonic attributes of the relationship between potential users and the image and attractiveness of the electric cars. </span><a class="workspace-trigger" data-dcnode-id="6661" href="#bb0130" name="bbb0130"><span data-dcnode-id="6662" instrument_node="">Corsini et al. (2018)</span></a><span data-dcnode-id="6660" instrument_node=""> still focus on the role of citizens in contributing to the energy systems in a smart city initiative. Through a bibliometric analysis and visual representation (</span><a class="workspace-trigger" data-dcnode-id="6658" href="#bb0060" name="bbb0060"><span data-dcnode-id="6659" instrument_node="">Appio et al., 2017</span></a><span data-dcnode-id="6657" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6655" href="#bb0055" name="bbb0055"><span data-dcnode-id="6656" instrument_node="">Appio et al., 2017</span></a><span data-dcnode-id="6654" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6652" href="#bb0510" name="bbb0510"><span data-dcnode-id="6653" instrument_node="">Van Eck and Waltman, 2010</span></a><span data-dcnode-id="6651" instrument_node="">) of an overall set of 74,932 academic papers, they show that city dwellers are rarely at the core of energy transition agendas. Instead, research overemphasizes the role of technological advancements for energy production and consumption. Authors argue about those socio-technical imaginaries that put citizens at the core of a participatory smart city revolution. Still concerning energy planning practices in urban districts, </span><a class="workspace-trigger" data-dcnode-id="6649" href="#bb0335" name="bbb0335"><span data-dcnode-id="6650" instrument_node="">Lindkvist et al. (2018)</span></a><span data-dcnode-id="6648" instrument_node=""> examine the role of intermediaries for knowledge transfer in early, progressed, and implemented project stages. Findings from ongoing projects based in Norway, Spain, France, Sweden, and Austria, show that intermediaries are absent in the fuzzy front end of the project while showing up later as problem solvers. Authors call for more integrated planning practices in which intermediaries become part of the helix of stakeholders since the very early stages of the process. Finally, </span><a class="workspace-trigger" data-dcnode-id="6646" href="#bb0505" name="bbb0505"><span data-dcnode-id="6647" instrument_node="">Van der Graaf and Ballon (2018)</span></a><span data-dcnode-id="6645" instrument_node=""> investigate the role of a social traffic and navigation application, Waze, operationalizing the concept of platform urbanism in which citizens, private and public organizations interact. By exploring the manifestations of dynamics in mobility practices occurring between commerce and community in the city, they found out a (complex and new) socio-spatial construct is emerging. Important questions arise concerning the role of urban and transportation management and planning in the public space of the city.</span></p><p data-dcnode-id="6633" id="p0220"><span data-dcnode-id="6643" instrument_node="">In the fourth cluster, which emphasizes the policies for smart cities, </span><a class="workspace-trigger" data-dcnode-id="6641" href="#bb0125" name="bbb0125"><span data-dcnode-id="6642" instrument_node="">Contreras and Platania (2018)</span></a><span data-dcnode-id="6640" instrument_node=""> investigate the role of policies in climate change in the London Environment Strategy (LES) within the London smart city initiative. By using a zero mean-reverting model for greenhouse gas emissions, the quantitatively analyze the consistency of the LSE framework with the 2020 Zero Carbon objectives. Different policy scenarios are considered by focusing on the domestic, industrial and commercial, and transport sectors. Their simulation study shows that considering the 2000–2014 greenhouse emission trend, the industrial and commercial sector and the domestic sector present levels far from the 2050 zero level objective; only the transport sector improves the historical trend. This is the result of the smart mobility and smart environment policies proposed within the LSE framework. </span><a class="workspace-trigger" data-dcnode-id="6638" href="#bb0100" name="bbb0100"><span data-dcnode-id="6639" instrument_node="">Caragliu and Del Bo (2018)</span></a><span data-dcnode-id="6637" instrument_node=""> assess the impact of smart cities policies on urban innovation. They collect data from 309 European metropolitan areas on the basis of six axes: human capital, social capital, transport infrastructure, ICT infrastructure, natural resources, and e-government. Results from the propensity score matching estimates show that smart city policies do have a non-negligible positive impact on urban innovation measured through patenting activity, especially in high-tech classes. They also show that these policies stimulate innovation, which in turn increases the city's stock of knowledge. Finally, </span><a class="workspace-trigger" data-dcnode-id="6635" href="#bb0220" name="bbb0220"><span data-dcnode-id="6636" instrument_node="">Hamidi et al. (2018)</span></a><span data-dcnode-id="6634" instrument_node=""> explore the link between regional compactness and the regional innovation capacity (RIC). Compact urban forms are characterized by walkability, higher street connectivity, and greater accessibility to urban amenities, jobs-housing balance, and mixed land use in addition to density. They measure regional compactness by borrowing the recently released Metropolitan Compactness Index (MIC), which includes 21 built environmental features and captures several dimensions of sprawl. Their study finds that all the three RIC indicators – the average number of patents, firm innovations, and number of innovative small firms – are positively associated with regional compactness. Their findings have an impact on the physical and social landscapes of cites, call for investments in increasing accessibility and improving public transit as factors contributing to agglomeration economies and innovation production.</span></p></section></section><section data-dcnode-id="6480" id="s0070"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6627" id="st0080"><span data-dcnode-id="6630" instrument_node="">6</span><span data-dcnode-id="6629" instrument_node="">. </span><span data-dcnode-id="6628" instrument_node="">Towards a research agenda</span></h2><p data-dcnode-id="6625" id="p0225"><span data-dcnode-id="6626" instrument_node="">Despite the value of the thirty-one articles presented, this special issue leaves space for scientists, practitioners and policy makers to further explore the subject of smart cities.</span></p><p data-dcnode-id="6577" id="p0230"><span data-dcnode-id="6624" instrument_node="">One research avenue could deal with the </span><em data-dcnode-id="6622"><span data-dcnode-id="6623" instrument_node="">risks and benefits</span></em><span data-dcnode-id="6621" instrument_node=""> of implementing smart cities initiatives. In fact, in this paper we have discussed mostly the potential benefits of smart cities. However, one must keep in mind the dangers and threats posed by this explosion in data and algorithms. Among the risks cited in the literature are ideological manipulation (</span><a class="workspace-trigger" data-dcnode-id="6619" href="#bb0365" name="bbb0365"><span data-dcnode-id="6620" instrument_node="">Morozov and Bria, 2018</span></a><span data-dcnode-id="6618" instrument_node="">), the corporatization of city governance (</span><a class="workspace-trigger" data-dcnode-id="6616" href="#bb0405" name="bbb0405"><span data-dcnode-id="6617" instrument_node="">Paroutis et al., 2014</span></a><span data-dcnode-id="6615" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6613" href="#bb0465" name="bbb0465"><span data-dcnode-id="6614" instrument_node="">Söderström et al., 2014</span></a><span data-dcnode-id="6612" instrument_node="">), hackable networks vulnerable to cyber-attacks and a tendency to normalize a surveillance state (</span><a class="workspace-trigger" data-dcnode-id="6610" href="#bb0075" name="bbb0075"><span data-dcnode-id="6611" instrument_node="">Bauman and Lyon, 2013</span></a><span data-dcnode-id="6609" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6607" href="#bb0160" name="bbb0160"><span data-dcnode-id="6608" instrument_node="">Ellul, 2012</span></a><span data-dcnode-id="6606" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6604" href="#bb0270" name="bbb0270"><span data-dcnode-id="6605" instrument_node="">Kitchin, 2014</span></a><span data-dcnode-id="6603" instrument_node="">). Surveillance come from the need of security and the means to reach it are the new available techniques and technologies (</span><a class="workspace-trigger" data-dcnode-id="6601" href="#bb0075" name="bbb0075"><span data-dcnode-id="6602" instrument_node="">Bauman and Lyon, 2013</span></a><span data-dcnode-id="6600" instrument_node="">); and if we consider that we moved from an era in which threats came from outside the city to a world in which threats come from within the city, the risk to build a Panopticon society (</span><a class="workspace-trigger" data-dcnode-id="6598" href="#bb0345" name="bbb0345"><span data-dcnode-id="6599" instrument_node="">Lyon, 2006</span></a><span data-dcnode-id="6597" instrument_node="">) is seducing. According to </span><a class="workspace-trigger" data-dcnode-id="6595" href="#bb0310" name="bbb0310"><span data-dcnode-id="6596" instrument_node="">Lehr (2018)</span></a><span data-dcnode-id="6594" instrument_node="">, a city cannot be called ‘smart’ unless it has solved the complex issues associated with privacy in a world of ubiquitous data, social interactions, and artificial intelligence. </span><a class="workspace-trigger" data-dcnode-id="6592" href="#bb0410" name="bbb0410"><span data-dcnode-id="6593" instrument_node="">Perera et al. (2014)</span></a><span data-dcnode-id="6587"><span data-dcnode-id="6591" instrument_node=""> list a series of challenges facing smart cities in the domains of technology (lack of integration across government systems, interoperability, standardization, availability and compatibility of software, systems and applications); security and privacy (threats from hackers and intruders, threats from viruses, worms and trojans; </span><a class="topic-link" data-dcnode-id="6589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/breach-of-privacy" title="Learn more about breach of privacy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6590" instrument_node="">breach of privacy</span></a><span data-dcnode-id="6588" instrument_node="">, theft of personal data) and socio-cultural barriers (trust, social acceptance, resistance to change, usability, digital illiteracy). These barriers cannot be overcome simply with technological solutions. They must be followed by legal frameworks such as Europe's General Data Protection Regulation (</span></span><a class="workspace-trigger" data-dcnode-id="6585" href="#bb0180" name="bbb0180"><span data-dcnode-id="6586" instrument_node="">EU, 2016</span></a><span data-dcnode-id="6584" instrument_node="">), active policies for developing human and social capitals through training programs, civic awareness campaigns and curriculum reforms in schools and universities. They have to articulate and engage all stakeholders in the public and private sectors, develop standards and protocols, facilitate bottom-up as well as propose top-down guidelines. Therefore, Smart Governance (e.g., </span><a class="workspace-trigger" data-dcnode-id="6582" href="#bb0420" name="bbb0420"><span data-dcnode-id="6583" instrument_node="">Ruhlandt, 2018</span></a><span data-dcnode-id="6581" instrument_node="">) emerges probably as the key factor mediating the other dimensions of the model in order to assure that projects remain within </span><em data-dcnode-id="6579"><span data-dcnode-id="6580" instrument_node="">ethical boundaries</span></em><span data-dcnode-id="6578" instrument_node="">, that stakeholders constantly communicate and learn from each other and that the resulting products and services ultimately have a positive impact on the well-being of smart city dwellers. International standards for smart cities (such as ISO 37122) could provide basic guidelines to all stakeholders involved.</span></p><p data-dcnode-id="6542" id="p0235"><span data-dcnode-id="6576" instrument_node="">Future studies could focus on examining the ways actors, groups, organizations and stakeholders develop strategies (</span><a class="workspace-trigger" data-dcnode-id="6574" href="#bb0405" name="bbb0405"><span data-dcnode-id="6575" instrument_node="">Paroutis et al., 2014</span></a><span data-dcnode-id="6573" instrument_node="">) to deal with the risks and benefits associated with smart cities. The contradictory but interrelated nature of smart city objectives means that studying them could benefit from recent advancements found in ambidexterity and paradox studies (</span><a class="workspace-trigger" data-dcnode-id="6571" href="#bb0275" name="bbb0275"><span data-dcnode-id="6572" instrument_node="">Knight and Paroutis, 2017</span></a><span data-dcnode-id="6570" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6568" href="#bb0315" name="bbb0315"><span data-dcnode-id="6569" instrument_node="">Lewis, 2000</span></a><span data-dcnode-id="6567" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6565" href="#bb0400" name="bbb0400"><span data-dcnode-id="6566" instrument_node="">Papachroni et al., 2016</span></a><span data-dcnode-id="6564" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6562" href="#bb0460" name="bbb0460"><span data-dcnode-id="6563" instrument_node="">Smith, 2014</span></a><span data-dcnode-id="6561" instrument_node="">), for example by studying the rhetorical practices groups and organizations develop over time to deal with the tensions associated with smart city initiatives (</span><a class="workspace-trigger" data-dcnode-id="6559" href="#bb0080" name="bbb0080"><span data-dcnode-id="6560" instrument_node="">Bednarek et al., 2017</span></a><span data-dcnode-id="6558" instrument_node="">). Another area of research could conceptualize and study smart cities as business ecosystems and platforms (</span><a class="workspace-trigger" data-dcnode-id="6556" href="#bb0250" name="bbb0250"><span data-dcnode-id="6557" instrument_node="">Jacobides et al., 2018</span></a><span data-dcnode-id="6555" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6553" href="#bb0290" name="bbb0290"><span data-dcnode-id="6554" instrument_node="">Kretschmer and Claussen, 2016</span></a><span data-dcnode-id="6552" instrument_node="">) where multiple actors and organizations act and interact over time to implement innovative solutions (</span><a class="workspace-trigger" data-dcnode-id="6550" href="#bb0300" name="bbb0300"><span data-dcnode-id="6551" instrument_node="">Kumaraswamy et al., 2018</span></a><span data-dcnode-id="6549" instrument_node="">). For such future studies, the hybrid model we proposed earlier (see </span><a class="workspace-trigger" data-dcnode-id="6547" href="#f0005" name="bf0005"><span data-dcnode-id="6548" instrument_node="">Fig. 1</span></a><span data-dcnode-id="6546" instrument_node="">) can assist scholars and policy makers visualize and appreciate the interdependent nature of physical infrastructure, innovation ecosystems and quality of life in smart cities. Overall, understanding the processes and practices related with the social challenges and impact of smart cities represents a fundamental area for future research (</span><a class="workspace-trigger" data-dcnode-id="6544" href="#bb0090" name="bbb0090"><span data-dcnode-id="6545" instrument_node="">Burgelman et al., 2018</span></a><span data-dcnode-id="6543" instrument_node="">). Such research endeavors will be impactful in providing stakeholders, policy makers and social actors with the means, processes and technological solutions to measure and then improve the social impact of smart city initiatives.</span></p><p data-dcnode-id="6533" id="p0240"><span data-dcnode-id="6541" instrument_node="">Another risk class to be considered deals with the transformation of the urban landscape. Contributions and intellectual leaps are necessary to introduce and contrast utopian and dystopian representations of the intelligent city in the XXII century. Essays like the one written by </span><a class="workspace-trigger" data-dcnode-id="6539" href="#bb0525" name="bbb0525"><span data-dcnode-id="6540" instrument_node="">Wells in 1897</span></a><span data-dcnode-id="6534"><span data-dcnode-id="6538" instrument_node=""> can be of inspiration to see how – and to what extent – urban transformations which tend to pose too much emphasis on the technocracy show huge social inequalities, overcrowded skyscrapers in few megalopolis crossed by congested air traffic, with countryside completely abandoned, few big corporations managing the world economy, and citizens living and working under an uncontrollable mental </span><a class="topic-link" data-dcnode-id="6536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/hypnosis" title="Learn more about hypnosis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6537" instrument_node="">hypnosis</span></a><span data-dcnode-id="6535" instrument_node="">. Driving the debate outwards to present the emergence of Orwellian scenarios can help policy makers to focus their actions on more utopian models of intelligent cities.</span></span></p><p data-dcnode-id="6507" id="p0245"><span data-dcnode-id="6532" instrument_node="">Relatedly, and asking how we should live in the city, </span><a class="workspace-trigger" data-dcnode-id="6530" href="#bb0440" name="bbb0440"><span data-dcnode-id="6531" instrument_node="">Sennett, 2012</span></a><span data-dcnode-id="6529" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6527" href="#bb0445" name="bbb0445"><span data-dcnode-id="6528" instrument_node="">Sennett, 2018</span></a><span data-dcnode-id="6526" instrument_node=""> looks at the city as an ‘open city’ that embeds complexity, ambiguity, and uncertainty. By distinguishing between two aspects of the city, namely the </span><em data-dcnode-id="6524"><span data-dcnode-id="6525" instrument_node="">ville</span></em><span data-dcnode-id="6523" instrument_node="">, which refers to the built environment, and the </span><em data-dcnode-id="6521"><span data-dcnode-id="6522" instrument_node="">cité</span></em><span data-dcnode-id="6520" instrument_node="">, which refers to the modes of life and place attachments to which urbanity leads, Richard Sennett explains why long-term and large-scale urban planning is difficult. This frustration is rooted into the huge divide between the </span><em data-dcnode-id="6518"><span data-dcnode-id="6519" instrument_node="">ville</span></em><span data-dcnode-id="6517" instrument_node=""> and the </span><em data-dcnode-id="6515"><span data-dcnode-id="6516" instrument_node="">cité</span></em><span data-dcnode-id="6514" instrument_node="">, which traces back to the nineteenth century when Baron Hausmann's boulevards, Ildefons Cerdà's </span><em data-dcnode-id="6512"><span data-dcnode-id="6513" instrument_node="">Eixample</span></em><span data-dcnode-id="6511" instrument_node=""> in Barcelona, and Frederick Olmsted's Central Park were mainly aimed at refashioning neglecting the way people behave in the city. This divorce went on in the twentieth century with the Chicago School, Le Corbusier, Jacobs, and Mumford's visions. For Sennett, the core ethical problem in any city is dealing with others; moving from this ethical issue, and with the aim to facilitate a city that is porous, incomplete and multiple, he suggests ways to remake the </span><em data-dcnode-id="6509"><span data-dcnode-id="6510" instrument_node="">cité</span></em><span data-dcnode-id="6508" instrument_node=""> by focusing on urban design, emphasizing the presence of permeable open spaces and variegated type-forms, creating co-development practices by experts and public.</span></p><p data-dcnode-id="6481" id="p0250"><em data-dcnode-id="6505"><span data-dcnode-id="6506" instrument_node="">Shape and size</span></em><span data-dcnode-id="6504" instrument_node=""> of the city matter (</span><a class="workspace-trigger" data-dcnode-id="6502" href="#bb0070" name="bbb0070"><span data-dcnode-id="6503" instrument_node="">Batty, 2014</span></a><span data-dcnode-id="6501" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6499" href="#bb0530" name="bbb0530"><span data-dcnode-id="6500" instrument_node="">West, 2017</span></a><span data-dcnode-id="6498" instrument_node="">). Current statistics</span><a class="workspace-trigger" data-dcnode-id="6495" href="#fn0005" name="bfn0005"><sup data-dcnode-id="6496"><span data-dcnode-id="6497" instrument_node="">1</span></sup></a><span data-dcnode-id="6494" instrument_node=""> show that by 2030 the world's population is projected to be 8.5 billion, increasing to 9.7 billion by 2050 and 11.2 billion by 2100; moreover, if 1950 only 30% of the population lived in cities, in 2050 this percentage is expected to grow to 70% (already nowadays more than half of the world lives in cities). New cities will necessarily emerge and become centers of the new civilizations, life, and knowledge for centuries. These trends will challenge cites' services and infrastructures in terms of scalability, environmental impact, security as they are supposed to adapt in order to support this population growth. New research can be carried out by conceptualizing cities as complex adaptive systems (</span><a class="workspace-trigger" data-dcnode-id="6492" href="#bb0530" name="bbb0530"><span data-dcnode-id="6493" instrument_node="">West, 2017</span></a><span data-dcnode-id="6491" instrument_node="">); but differently from companies and human beings, they (almost) never die and are remarkably resilient; their urban metabolism – which is the sum total of the technical and socio-economic processes that occur in cities, resulting in growth, production of energy and elimination of waste (</span><a class="workspace-trigger" data-dcnode-id="6489" href="#bb0260" name="bbb0260"><span data-dcnode-id="6490" instrument_node="">Kennedy et al., 2007</span></a><span data-dcnode-id="6488" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6486" href="#bb0265" name="bbb0265"><span data-dcnode-id="6487" instrument_node="">Kennedy et al., 2011</span></a><span data-dcnode-id="6485" instrument_node="">) – is what needs to be investigated since it provides with the basis to develop laws and indicators aimed to disentangle the dynamics of the visible city (material and tangible components like roads, buildings, etc.) and the invisible city (immaterial and intangible components like social networks and information). Central to this debate become the </span><em data-dcnode-id="6483"><span data-dcnode-id="6484" instrument_node="">suburbs-city centers' dynamics</span></em><span data-dcnode-id="6482" instrument_node="">. If it is true that the majority of people will live in cities, it seems (from current trends) that many of them populate the suburbs. Smart cities can be the way to rethink the role of suburbs as a bridge to connect the city with the others and become the center of interconnections with new communities. This can give a new role to small cities, rural areas and villages in that they can potentially benefit from the Internet revolution and repopulate: in fact, smart working practices take place to rethink one's lifestyle and promote factors such as sociability and well-being, which are increasingly difficult to maintain in large cities (or megalopolises). Jean-Jacques Rousseau had already thought of this when he stressed the need for people to distance from the cities and return to the villages.</span></p></section><section data-dcnode-id="6457" id="s0075"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6476" id="st0085"><span data-dcnode-id="6479" instrument_node="">7</span><span data-dcnode-id="6478" instrument_node="">. </span><span data-dcnode-id="6477" instrument_node="">Conclusions</span></h2><p data-dcnode-id="6458" id="p0255"><span data-dcnode-id="6471"><span data-dcnode-id="6475" instrument_node="">In this introduction to the special issue of the </span><a class="topic-link" data-dcnode-id="6473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/technological-forecasting" title="Learn more about Technological Forecasting from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6474" instrument_node="">Technological Forecasting</span></a><span data-dcnode-id="6472" instrument_node=""> and Social Change “Understanding Smart Cities: Innovation Ecosystems, Technological Advancements, and Societal Challenges” we discussed the broader theme of Smart Cities and attempted to reframe associated topics and practices in prior work. Next, we introduced the papers in the special issue and linked them to the proposed hybrid framework. Finally, we offered a research agenda which points out the urgent need to develop a </span></span><em data-dcnode-id="6469"><span data-dcnode-id="6470" instrument_node="">science of smart cities</span></em><span data-dcnode-id="6468" instrument_node="">, in which criticalities and tensions (</span><a class="workspace-trigger" data-dcnode-id="6466" href="#bb0025" name="bbb0025"><span data-dcnode-id="6467" instrument_node="">Almirall et al., 2016</span></a><span data-dcnode-id="6465" instrument_node="">), contrasting views (</span><a class="workspace-trigger" data-dcnode-id="6463" href="#bb0200" name="bbb0200"><span data-dcnode-id="6464" instrument_node="">Greenfield, 2013</span></a><span data-dcnode-id="6462" instrument_node="">), strategic planning and wise urban policies (</span><a class="workspace-trigger" data-dcnode-id="6460" href="#bb0445" name="bbb0445"><span data-dcnode-id="6461" instrument_node="">Sennett, 2018</span></a><span data-dcnode-id="6459" instrument_node="">), through a balanced adoption of qualitative and quantitative approaches, coexist and further stimulate a constructive and critical debate. Thus, we hope this special issue will inspire future work on the nature and challenges of current and future smart cities initiatives.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="6448"><button class="button button-anchor" data-dcnode-id="6452" type="button"><span class="button-text" data-dcnode-id="6453"><span data-dcnode-id="6454" instrument_node="">Special issue articles</span></span></button><button class="button button-anchor" data-dcnode-id="6449" type="button"><span class="button-text" data-dcnode-id="6450"><span data-dcnode-id="6451" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="6447"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="411" id="bi0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6445"><span data-dcnode-id="6446" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="412" id="bs0005"><dl class="references" data-dcnode-id="413" id="reference-links-bs0005"><dt class="label" data-dcnode-id="6442"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="6443" href="#bbb0005" id="ref-id-bb0005"><span data-dcnode-id="6444" instrument_node="">Abbate et al., 2018</span></a></dt><dd class="reference" data-dcnode-id="6386" id="rf0005"><div class="contribution" data-dcnode-id="6409"><span data-dcnode-id="6441" instrument_node="">T.</span><span data-dcnode-id="6439" instrument_node=""> </span><span data-dcnode-id="6437" instrument_node="">Abbate</span><span data-dcnode-id="6435" instrument_node="">, </span><span data-dcnode-id="6433" instrument_node="">F.</span><span data-dcnode-id="6431" instrument_node=""> </span><span data-dcnode-id="6429" instrument_node="">Cesaroni</span><span data-dcnode-id="6427" instrument_node="">, </span><span data-dcnode-id="6425" instrument_node="">M.C.</span><span data-dcnode-id="6423" instrument_node=""> </span><span data-dcnode-id="6421" instrument_node="">Cinici</span><span data-dcnode-id="6419" instrument_node="">, </span><span data-dcnode-id="6417" instrument_node="">M.</span><span data-dcnode-id="6415" instrument_node=""> </span><span data-dcnode-id="6413" instrument_node="">Villari</span><div data-dcnode-id="6410" id="ref-id-rf0005"><strong class="title" data-dcnode-id="6411"><span data-dcnode-id="6412" instrument_node="">Business models for developing smart cities. A fuzzy set qualitative comparative analysis of an IoT platform</span></strong></div></div><div class="host" data-
