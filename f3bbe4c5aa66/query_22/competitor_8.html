</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0005&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0005&quot;><p id=&quot;sp0025&quot;>Smart Cities initiatives are spreading all around the globe at a phenomenal pace. Their bold ambition is to increase the competitiveness of local communities through innovation while increasing the quality of life for its citizens through better public services and a cleaner environment. Prior research has shown contrasting views and a multitude of dimensions and approaches to look at this phenomenon. In spite of the fact that this can stimulate the debate, it lacks a systematic assessment and an integrative view. The papers in the special issue on “Understanding Smart Cities: Innovation Ecosystems, Technological Advancements, and Societal Challenges” take stock of past work and provide new insights through the lenses of a hybrid framework. Moving from these premises, we offer an overview of the topic by featuring possible linkages and thematic clusters. Then, we sketch a novel research agenda for scholars, practitioners, and policy makers who wish to engage in – and build – a critical, constructive, and conducive discourse on Smart Cities.</p></div></div></div>" data-dcnode-id="8984" lang="en" name="citation_abstract"><span data-dcnode-id="8983" instrument_node="">

></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="8386" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="8389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.techfore.2018.12.018" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="8390" instrument_node="">https://doi.org/10.1016/j.techfore.2018.12.018</span></a><a class="rights-and-content" data-dcnode-id="8387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0040162518319954%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8388" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="8385"></section><section class="ReferencedArticles" data-dcnode-id="8384"></section><div class="PageDivider" data-dcnode-id="8383"></div><div class="Abstracts u-font-serif" data-dcnode-id="8376" id="abstracts"><div class="abstract author" data-dcnode-id="8377" id="ab0005" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8381"><span data-dcnode-id="8382" instrument_node="">Abstract</span></h2><div data-dcnode-id="8378" id="as0005"><p data-dcnode-id="8379" id="sp0025"><span data-dcnode-id="8380" instrument_node="">Smart Cities initiatives are spreading all around the globe at a phenomenal pace. Their bold ambition is to increase the competitiveness of local communities through innovation while increasing the quality of life for its citizens through better public services and a cleaner environment. Prior research has shown contrasting views and a multitude of dimensions and approaches to look at this phenomenon. In spite of the fact that this can stimulate the debate, it lacks a systematic assessment and an integrative view. The papers in the special issue on “Understanding Smart Cities: Innovation Ecosystems, Technological Advancements, and Societal Challenges” take stock of past work and provide new insights through the lenses of a hybrid framework. Moving from these premises, we offer an overview of the topic by featuring possible linkages and thematic clusters. Then, we sketch a novel research agenda for scholars, practitioners, and policy makers who wish to engage in – and build – a critical, constructive, and conducive discourse on Smart Cities.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="8353" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="8365"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0040162519304639"><svg class="icon icon-navigate-left" data-dcnode-id="8374" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="8375"></path></svg><span class="button-alternative-text" data-dcnode-id="8367"><strong data-dcnode-id="8372"><span data-dcnode-id="8373" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="8370"><span data-dcnode-id="8371" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8368"><span data-dcnode-id="8369" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="8354"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0040162518300052"><span class="button-alternative-text" data-dcnode-id="8358"><strong data-dcnode-id="8363"><span data-dcnode-id="8364" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="8361"><span data-dcnode-id="8362" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8359"><span data-dcnode-id="8360" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="8356" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="8357"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="8331"><div class="keywords-section" data-dcnode-id="8332" id="ks0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8351"><span data-dcnode-id="8352" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="8348" id="kw0005"><span data-dcnode-id="8349" id="tx0010"><span data-dcnode-id="8350" instrument_node="">Smart cities</span></span></div><div class="keyword" data-dcnode-id="8345" id="kw0010"><span data-dcnode-id="8346" id="tx0015"><span data-dcnode-id="8347" instrument_node="">Hybrid framework</span></span></div><div class="keyword" data-dcnode-id="8342" id="kw0015"><span data-dcnode-id="8343" id="tx0020"><span data-dcnode-id="8344" instrument_node="">Physical infrastructure</span></span></div><div class="keyword" data-dcnode-id="8339" id="kw0020"><span data-dcnode-id="8340" id="tx0025"><span data-dcnode-id="8341" instrument_node="">Quality of life</span></span></div><div class="keyword" data-dcnode-id="8336" id="kw0025"><span data-dcnode-id="8337" id="tx0030"><span data-dcnode-id="8338" instrument_node="">Innovation</span></span></div><div class="keyword" data-dcnode-id="8333" id="kw0030"><span data-dcnode-id="8334" id="tx0035"><span data-dcnode-id="8335" instrument_node="">Review</span></span></div></div></div><span data-dcnode-id="8330" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="6455" id="body"><div data-dcnode-id="6456"><section data-dcnode-id="8114" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8326" id="st0015"><span data-dcnode-id="8329" instrument_node="">1</span><span data-dcnode-id="8328" instrument_node="">. </span><span data-dcnode-id="8327" instrument_node="">Introduction and motivation</span></h2><p data-dcnode-id="8318" id="p0005"><span data-dcnode-id="8325" instrument_node="">There are hundreds of smart city projects currently being developed around the world (</span><a class="workspace-trigger" data-dcnode-id="8323" href="#bb0305" name="bbb0305"><span data-dcnode-id="8324" instrument_node="">Lee et al., 2014</span></a><span data-dcnode-id="8322" instrument_node="">). Smart Cities initiatives aim to “provide more efficient services to citizens, to monitor and optimize existing infrastructure, to increase collaboration amongst different economic actors and to encourage innovative business models in both private and public sectors” (</span><a class="workspace-trigger" data-dcnode-id="8320" href="#bb0350" name="bbb0350"><span data-dcnode-id="8321" instrument_node="">Marsal-Llacuna et al., 2015, p. 618</span></a><span data-dcnode-id="8319" instrument_node="">). Ultimately, smart cities strive to increase the competitiveness of local communities through innovation while increasing the quality of life for its citizens through better public services and a cleaner environment.</span></p><p data-dcnode-id="8282" id="p0010"><span data-dcnode-id="8313"><span data-dcnode-id="8317" instrument_node="">In order to achieve these goals, smart cities rely on state-of-the-art information technology (e.g., fiber optic networks, sensors and connected devices, open data analytics, </span><a class="topic-link" data-dcnode-id="8315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/internet-of-things" title="Learn more about internet of things from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8316" instrument_node="">internet of things</span></a><span data-dcnode-id="8314" instrument_node="">, ICT-enabled participatory planning frameworks) on the one hand (</span></span><a class="workspace-trigger" data-dcnode-id="8311" href="#bb0015" name="bbb0015"><span data-dcnode-id="8312" instrument_node="">Albino et al., 2015</span></a><span data-dcnode-id="8310" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8308" href="#bb0470" name="bbb0470"><span data-dcnode-id="8309" instrument_node="">Stratigea et al., 2015</span></a><span data-dcnode-id="8307" instrument_node="">), and on human capital (e.g., research universities, knowledge-intensive companies and public institutions) on the other hand (</span><a class="workspace-trigger" data-dcnode-id="8305" href="#bb0010" name="bbb0010"><span data-dcnode-id="8306" instrument_node="">Ahvenniemi et al., 2017</span></a><span data-dcnode-id="8304" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8302" href="#bb0375" name="bbb0375"><span data-dcnode-id="8303" instrument_node="">Neirotti et al., 2014</span></a><span data-dcnode-id="8301" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="8299" href="#bb9605" name="bbb9605"><span data-dcnode-id="8300" instrument_node="">Angelidou (2014)</span></a><span data-dcnode-id="8298" instrument_node=""> calls the former “hard” smart cities strategies (smart buildings, smart energy grids, smart water management, smart mobility) and the latter “soft” strategies (developing human and social capital through education, culture, social inclusion, social innovation). It is widely assumed that the digital infrastructure of modern cities offers a unique opportunity to facilitate entrepreneurship, creativity, and innovation in order to drive local economic growth (</span><a class="workspace-trigger" data-dcnode-id="8296" href="#bb0285" name="bbb0285"><span data-dcnode-id="8297" instrument_node="">Kraus et al., 2015</span></a><span data-dcnode-id="8295" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8293" href="#bb0205" name="bbb0205"><span data-dcnode-id="8294" instrument_node="">Grimaldi and Fernandez, 2015</span></a><span data-dcnode-id="8292" instrument_node="">). The city of London, for instance, has based its smart city initiative on four dimensions: a) technology innovation; b) open data and transparency; c) collaboration and engagement; d) efficiency and resource management (</span><a class="workspace-trigger" data-dcnode-id="8290" href="#bb0040" name="bbb0040"><span data-dcnode-id="8291" instrument_node="">Angelidou, 2015</span></a><span data-dcnode-id="8289" instrument_node="">). These dimensions echo </span><a class="workspace-trigger" data-dcnode-id="8287" href="#bb0305" name="bbb0305"><span data-dcnode-id="8288" instrument_node="">Lee and co-authors' (2014)</span></a><span data-dcnode-id="8286" instrument_node=""> six enablers of smart city development: urban openness, service innovation, partnership formation, urban proactiveness, infrastructure integration, and smart city governance. </span><a class="workspace-trigger" data-dcnode-id="8284" href="#bb0105" name="bbb0105"><span data-dcnode-id="8285" instrument_node="">Chourabi et al. (2012)</span></a><span data-dcnode-id="8283" instrument_node=""> propose an “integrative framework” involving the dimensions of organization, policy, and technology as the pillars of smart city initiatives, surrounded by secondary factors such as governance, people/communities, economy, infrastructure, and natural environment.</span></p><p data-dcnode-id="8268" id="p0015"><span data-dcnode-id="8281" instrument_node="">Alternative frameworks highlight the “transboundary” nature of smart city projects. Thus </span><a class="workspace-trigger" data-dcnode-id="8279" href="#bb9605" name="bbb9605"><span data-dcnode-id="8280" instrument_node="">Angelidou (2014)</span></a><span data-dcnode-id="8278" instrument_node=""> suggests the necessity to go beyond the “hard versus soft” infrastructure dichotomy and to also consider the national versus local implications for smart city projects; the new (green field) versus the existing (brownfields) approaches to urban development; and the economic versus geographic approaches. Similarly, </span><a class="workspace-trigger" data-dcnode-id="8276" href="#bb0415" name="bbb0415"><span data-dcnode-id="8277" instrument_node="">Ramaswami and co-authors (2016)</span></a><span data-dcnode-id="8275" instrument_node=""> suggest thinking about the local infrastructure provision (the smart management of energy, buildings, public spaces, waste and sanitation, food supply, water supply and transportation) as subject to a larger flow of national and global actors and institutions. The performance of these initiatives must be measured in terms of their environmental, economic, and social benefits (</span><a class="workspace-trigger" data-dcnode-id="8273" href="#bb0010" name="bbb0010"><span data-dcnode-id="8274" instrument_node="">Ahvenniemi et al., 2017</span></a><span data-dcnode-id="8272" instrument_node="">). These initiatives can also be studied from a strategic perspective, as they can spark the emergence of new value chains in the firms and stakeholders involved in designing and executing smart city projects (</span><a class="workspace-trigger" data-dcnode-id="8270" href="#bb0405" name="bbb0405"><span data-dcnode-id="8271" instrument_node="">Paroutis et al., 2014</span></a><span data-dcnode-id="8269" instrument_node="">).</span></p><p data-dcnode-id="8263" id="p0020"><span data-dcnode-id="8267" instrument_node="">According to the neo-evolutionary perspective of the Triple Helix framework, smart city projects represent a unique innovation platform for companies, government agencies, and researchers (</span><a class="workspace-trigger" data-dcnode-id="8265" href="#bb0325" name="bbb0325"><span data-dcnode-id="8266" instrument_node="">Leydesdorff and Deakin, 2011</span></a><span data-dcnode-id="8264" instrument_node="">). In this perspective, smart cities are perceived above all as “Intelligent Communities”, collaborative ecosystems that facilitate innovation, by creating linkages among citizens, government, businesses, and educational institutions. These innovative clusters foster the development of high added value activities of the “knowledge economy.”</span></p><p data-dcnode-id="8258" id="p0025"><span data-dcnode-id="8262" instrument_node="">To capture most of these elements, Bill Hutchison (</span><a class="workspace-trigger" data-dcnode-id="8260" href="#bb0235" name="bbb0235"><span data-dcnode-id="8261" instrument_node="">Hutchison et al., 2011</span></a><span data-dcnode-id="8259" instrument_node="">) created a 5-level pyramid framework called “Intelligent Community Open Architecture – i-COA®.” The first two levels correspond to the “hard” smart city strategies (places and infrastructure). The top three levels (collaboration ecosystems, applications, and life) correspond to “soft” strategies. This framework has the merits of being synthetic, easy to visualize, and suggests that the ultimate goal of smart cities is not merely to connect hardware and infrastructure, but to create collaborative environments where innovation and quality of life can thrive.</span></p><div data-dcnode-id="8225"><p data-dcnode-id="8250" id="p0030"><span data-dcnode-id="8257" instrument_node="">All of these models are indebted to </span><a class="workspace-trigger" data-dcnode-id="8255" href="#bb9620" name="bbb9620"><span data-dcnode-id="8256" instrument_node="">Giffinger et al.'s (2007)</span></a><span data-dcnode-id="8254" instrument_node=""> seminal classification of smart city characteristics around six key dimensions: quality of life (Smart Living), competitiveness (Smart Economy), social and human capital (Smart People), public and social services and citizen participation (Smart Governance), transport and communication infrastructure (Smart Mobility), and natural resources (Smart Environment). For the purposes of this discussion, therefore, we propose to merge Hutchison's and Giffinger's frameworks as a background to understand how smart cities may foster collaboration ecosystems that may improve both the standards of living and the competitiveness of urban spaces (</span><a class="workspace-trigger" data-dcnode-id="8252" href="#f0005" name="bf0005"><span data-dcnode-id="8253" instrument_node="">Fig. 1</span></a><span data-dcnode-id="8251" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="8226" id="f0005"><span data-dcnode-id="8234"><img alt="Fig. 1" aria-describedby="ca0005" data-dcnode-id="8249" height="312" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0040162518319954-gr1.jpg&amp;raw"><span data-dcnode-id="8248" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8235"><li data-dcnode-id="8242"><a class="anchor download-link u-font-sans" data-dcnode-id="8243" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0040162518319954-gr1_lrg.jpg" target="_blank" title="Download high-res image (338KB)"><span class="anchor-text" data-dcnode-id="8244"><span data-dcnode-id="8247" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8245"><span data-dcnode-id="8246" instrument_node="">Download high-res image (338KB)</span></span></span></a></li><li data-dcnode-id="8236"><a class="anchor download-link u-font-sans" data-dcnode-id="8237" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0040162518319954-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8238"><span data-dcnode-id="8241" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8239"><span data-dcnode-id="8240" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8227"><span data-dcnode-id="8228" id="ca0005"><p data-dcnode-id="8229" id="sp0005"><span class="label" data-dcnode-id="8232"><span data-dcnode-id="8233" instrument_node="">Fig. 1</span></span><span data-dcnode-id="8231" instrument_node="">. </span><span data-dcnode-id="8230" instrument_node="">An adaptation of Hutchison's i-COA® framework highlighting Giffinger's smart city elements.</span></p></span></span></figure></div><p data-dcnode-id="8214" id="p0035"><span data-dcnode-id="8224" instrument_node="">Urban strategist Boyd </span><a class="workspace-trigger" data-dcnode-id="8222" href="#bb0110" name="bbb0110"><span data-dcnode-id="8223" instrument_node="">Cohen (2013)</span></a><span data-dcnode-id="8221" instrument_node=""> developed a “Smart City Wheel” that suggests how to measure the six dimensions of Giffinger's model. At the risk of oversimplifying the problem, this model has the merit of reducing the metrics of each dimension to three indicators only. It is a good synthesis of an introductory discussion about smart cities limits and possibilities. However, it lacks the structural perspective of Hutchinson's i-COA® framework to create a hierarchy of smart city elements. Indeed, according to Hutchinson's model, every smart city project must start with the physical infrastructure (Smart Environment and Smart Mobility). This is the basis for creating innovation ecosystems based on human and social capital (Smart People and Smart Economy). Such de-centralized initiatives require articulation and coordination by public entities or public-private partnerships (Smart Governance). The </span><em data-dcnode-id="8219"><span data-dcnode-id="8220" instrument_node="">raison d'être</span></em><span data-dcnode-id="8218" instrument_node=""> for these governance structures is to provide better quality of life solutions to smart city citizens (Smart Living). Thus, by combining Giffinger's classic categories and organizing them according to Hutchinson's pyramid, we suggest a visual diagram of how to design, implement and measure smart city programs (see </span><a class="workspace-trigger" data-dcnode-id="8216" href="#f0005" name="bf0005"><span data-dcnode-id="8217" instrument_node="">Fig. 1</span></a><span data-dcnode-id="8215" instrument_node="">).</span></p><div data-dcnode-id="8115"><p data-dcnode-id="8206" id="p0040"><span data-dcnode-id="8213" instrument_node="">According to </span><a class="workspace-trigger" data-dcnode-id="8211" href="#bb0155" name="bbb0155"><span data-dcnode-id="8212" instrument_node="">Dustdar et al. (2017)</span></a><span data-dcnode-id="8210" instrument_node="">, most definitions of smart cities are infrastructure-centric, focusing on installation and subsequent management of connected devices and analytics of data. </span><a class="workspace-trigger" data-dcnode-id="8208" href="#t0005" name="bt0005"><span data-dcnode-id="8209" instrument_node="">Table 1</span></a><span data-dcnode-id="8207" instrument_node=""> corroborates this perception. As seen above, few definitions emphasize the three dimensions simultaneously. The hybrid framework proposed here attempts to avoid this bias by emphasizing the role of infrastructure in smart city projects simply as a means to achieving more collaborative innovation ecosystems and ultimately leading to a higher quality of citizens' life. In the following session, we conduct a literature review based on these three elements of the proposed hybrid model.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="8116" id="t0005"><span class="captions" data-dcnode-id="8199"><span data-dcnode-id="8200" id="ca0010"><p data-dcnode-id="8201" id="sp0010"><span class="label" data-dcnode-id="8204"><span data-dcnode-id="8205" instrument_node="">Table 1</span></span><span data-dcnode-id="8203" instrument_node="">. </span><span data-dcnode-id="8202" instrument_node="">We summarize a number of smart cities definitions from the literature, classifying its primary focus in terms of the three components described above: physical infrastructure (PI), quality of life (QL), and innovation ecosystems (IE).</span></p></span></span><div class="groups" data-dcnode-id="8117"><table data-dcnode-id="8118"><thead data-dcnode-id="8191"><tr class="rowsep-1 valign-top" data-dcnode-id="8192"><th data-dcnode-id="8197" scope="col"><span data-dcnode-id="8198" instrument_node="">Definition of smart city</span></th><th data-dcnode-id="8195" scope="col"><span data-dcnode-id="8196" instrument_node="">Authors</span></th><th data-dcnode-id="8193" scope="col"><span data-dcnode-id="8194" instrument_node="">Focus</span></th></tr></thead><tbody data-dcnode-id="8119"><tr data-dcnode-id="8182"><th data-dcnode-id="8188" scope="row"><em data-dcnode-id="8189"><span data-dcnode-id="8190" instrument_node="">A city that monitors and integrates conditions of all of its critical infrastructure including roads, bridges, tunnels, rails, subways, airports, seaports, communications, water, power, even major buildings can better optimize its resources, plan its preventive maintenance activities, and monitor security aspects while maximizing services to its citizens</span></em></th><td data-dcnode-id="8185"><a class="workspace-trigger" data-dcnode-id="8186" href="#bb0215" name="bbb0215"><span data-dcnode-id="8187" instrument_node="">Hall (2000)</span></a></td><td class="align-center" data-dcnode-id="8183"><span data-dcnode-id="8184" instrument_node="">PI</span></td></tr><tr data-dcnode-id="8172"><th data-dcnode-id="8178" scope="row"><em data-dcnode-id="8179"><span data-dcnode-id="8181" instrument_node="">A city well performing in a forward-looking way in economy, people governance, mobility, environment, and living built on the smart combination of endowments and activities of self-decisive, independent, and aware citizens </span><span data-dcnode-id="8180" instrument_node="">&nbsp;</span></em></th><td data-dcnode-id="8175"><a class="workspace-trigger" data-dcnode-id="8176" href="#bb9620" name="bbb9620"><span data-dcnode-id="8177" instrument_node="">Giffinger et al. (2007)</span></a></td><td class="align-center" data-dcnode-id="8173"><span data-dcnode-id="8174" instrument_node="">PI/IE/QL</span></td></tr><tr data-dcnode-id="8163"><th data-dcnode-id="8169" scope="row"><em data-dcnode-id="8170"><span data-dcnode-id="8171" instrument_node="">The use of smart computing technologies to make the critical infrastructure components and service of a city—which include city administration, education, health care, public safety, real estate, transportation, and utilities—more intelligent, interconnected, and efficient</span></em></th><td data-dcnode-id="8166"><a class="workspace-trigger" data-dcnode-id="8167" href="#bb0515" name="bbb0515"><span data-dcnode-id="8168" instrument_node="">Washburn et al. (2009)</span></a></td><td class="align-center" data-dcnode-id="8164"><span data-dcnode-id="8165" instrument_node="">PI</span></td></tr><tr data-dcnode-id="8154"><th data-dcnode-id="8160" scope="row"><em data-dcnode-id="8161"><span data-dcnode-id="8162" instrument_node="">Instrumented, interconnected and intelligent. Instrumented refers to sources of near-real-time real-world data from both physical and virtual sensors. Interconnected means the integration of those data into an enterprise computing platform and the communication of such information among the various city services. Intelligent refers to the inclusion of complex analytics, modeling, optimization, and visualization in the operational business processes to make better operational decisions.</span></em></th><td data-dcnode-id="8157"><a class="workspace-trigger" data-dcnode-id="8158" href="#bb0225" name="bbb0225"><span data-dcnode-id="8159" instrument_node="">Harrison et al. (2010)</span></a></td><td class="align-center" data-dcnode-id="8155"><span data-dcnode-id="8156" instrument_node="">PI</span></td></tr><tr data-dcnode-id="8145"><th data-dcnode-id="8151" scope="row"><em data-dcnode-id="8152"><span data-dcnode-id="8153" instrument_node="">Smart cities are those that are combining ICT and Web 2.0 technology with other organizational, design and planning efforts to de-materialize and speed up bureaucratic processes and help to identify new, innovative solutions to city management complexity, in order to improve sustainability and “liveability”.</span></em></th><td data-dcnode-id="8148"><a class="workspace-trigger" data-dcnode-id="8149" href="#bb0490" name="bbb0490"><span data-dcnode-id="8150" instrument_node="">Toppeta (2010)</span></a></td><td class="align-center" data-dcnode-id="8146"><span data-dcnode-id="8147" instrument_node="">IE/QL</span></td></tr><tr data-dcnode-id="8138"><th data-dcnode-id="8142" scope="row"><em data-dcnode-id="8143"><span data-dcnode-id="8144" instrument_node="">Systems of people interacting with and using flows of energy, materials, services and financing to catalyse sustainable economic development, resilience, and high quality of life</span></em></th><td data-dcnode-id="8141"></td><td class="align-center" data-dcnode-id="8139"><span data-dcnode-id="8140" instrument_node="">PI/IE/QL</span></td></tr><tr data-dcnode-id="8129"><th data-dcnode-id="8135" scope="row"><em data-dcnode-id="8136"><span data-dcnode-id="8137" instrument_node="">A coherent urban development strategy developed and managed by city governments seeking to plan and align in the long term the management of the various city's infrastructural assets and municipal services with the sole objective of proving the quality of life for the citizens.</span></em></th><td data-dcnode-id="8132"><a class="workspace-trigger" data-dcnode-id="8133" href="#bb0155" name="bbb0155"><span data-dcnode-id="8134" instrument_node="">Dustdar et al. (2017)</span></a></td><td class="align-center" data-dcnode-id="8130"><span data-dcnode-id="8131" instrument_node="">PI/QL</span></td></tr><tr data-dcnode-id="8120"><th data-dcnode-id="8126" scope="row"><em data-dcnode-id="8127"><span data-dcnode-id="8128" instrument_node="">Provide better services for citizens; provide a better life environment where smart policies, practices and technology are put to the service of citizens; achieve their sustainability and environmental goals in a more innovative way; Identify the need for smart infrastructure; facilitate innovation and growth; and build a dynamic and innovative economy ready for the challenges of tomorrow.</span></em></th><td data-dcnode-id="8123"><a class="workspace-trigger" data-dcnode-id="8124" href="#bb0245" name="bbb0245"><span data-dcnode-id="8125" instrument_node="">ISO (2018)</span></a></td><td class="align-center" data-dcnode-id="8121"><span data-dcnode-id="8122" instrument_node="">PI/IE/QL</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="8027" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8110" id="st0020"><span data-dcnode-id="8113" instrument_node="">2</span><span data-dcnode-id="8112" instrument_node="">. </span><span data-dcnode-id="8111" instrument_node="">The physical infrastructure of smart cities</span></h2><p data-dcnode-id="8098" id="p0045"><span data-dcnode-id="8109" instrument_node="">According to certain estimates (</span><a class="workspace-trigger" data-dcnode-id="8107" href="#bb0475" name="bbb0475"><span data-dcnode-id="8108" instrument_node="">Suzuki, 2017</span></a><span data-dcnode-id="8102"><span data-dcnode-id="8106" instrument_node="">), 180,000 people migrate to cities across the globe every single day, which represents over 65 million new urban dwellers a year. The challenges created by this massive urban migration in terms of housing, electricity, heating, and schooling (not to mention job creation) are overwhelming. In order to develop intelligent solutions, a combination of smart networks (Internet of Data, </span><a class="topic-link" data-dcnode-id="8104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/internet-of-things" title="Learn more about Internet of Things from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8105" instrument_node="">Internet of Things</span></a><span data-dcnode-id="8103" instrument_node="">, Internet of Services and Internet of People) can be used to minimize environmental impact while maximizing social well-being and promoting collaborative eco-systems (</span></span><a class="workspace-trigger" data-dcnode-id="8100" href="#bb0240" name="bbb0240"><span data-dcnode-id="8101" instrument_node="">Ijaz et al., 2016</span></a><span data-dcnode-id="8099" instrument_node="">).</span></p><p data-dcnode-id="8090" id="p0050"><span data-dcnode-id="8097" instrument_node="">The Internet of Data has been among us since the inception of the Arpanet project in the 1960s. However, the advent of widespread broadband communication infrastructure in offices and homes in the 21st century dramatically increased the velocity, volume, variety, veracity and value of data transfers (commonly called Big Data networks). These massive data streams are derived not just from human-created content (blogs, social networks, video conferencing, etc.), but also from machines exchanging data among themselves (Internet of Things). Coupled with sophisticated statistical algorithms to gather, visualize and analyze this flow, Big Data has created opportunities to learn in real-time about how to improve traffic, save energy, regulate public transit, reduce waste and pollution and improve safety in large urban centers across the world (</span><a class="workspace-trigger" data-dcnode-id="8095" href="#bb0270" name="bbb0270"><span data-dcnode-id="8096" instrument_node="">Kitchin, 2014</span></a><span data-dcnode-id="8094" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8092" href="#bb0330" name="bbb0330"><span data-dcnode-id="8093" instrument_node="">Lim et al., 2018</span></a><span data-dcnode-id="8091" instrument_node="">).</span></p><p data-dcnode-id="8082" id="p0055"><span data-dcnode-id="8089" instrument_node="">This Internet of Data in smart cities is increasingly dominated by the growing Internet of Things ecosystem. In the last two decades, there has been a dramatic acceleration of hardware performance at lower costs (based on Moore's Law) coupled with drastic miniaturization of components, leading to the ubiquity of smart objects. In 2003, there were an estimated 500 million connected devices worldwide or 0.08 object per person. This proportion increased to 1.84 in 2010 (12.5 billion connected devices to 6.8 billion humans) and reached 3.47 in 2015 (25 billion Internet of Things components to 7.2 billion humans). This ratio is expected to reach 6.58 by 2020 (</span><a class="workspace-trigger" data-dcnode-id="8087" href="#bb0475" name="bbb0475"><span data-dcnode-id="8088" instrument_node="">Suzuki, 2017</span></a><span data-dcnode-id="8086" instrument_node="">). The convergence of Big Data, Internet of Things and Artificial Intelligence promises to create better places (parks, buildings, homes) by providing smarter infrastructure (transportation, energy, waste management). These correspond to Giffinger's Smart Environment and Smart Mobility elements (</span><a class="workspace-trigger" data-dcnode-id="8084" href="#f0005" name="bf0005"><span data-dcnode-id="8085" instrument_node="">Fig. 1</span></a><span data-dcnode-id="8083" instrument_node="">). The following paragraphs discuss each of these domains.</span></p><section data-dcnode-id="8051" id="s0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8078" id="st0025"><span data-dcnode-id="8081" instrument_node="">2.1</span><span data-dcnode-id="8080" instrument_node="">. </span><span data-dcnode-id="8079" instrument_node="">Smart Environment</span></h3><p data-dcnode-id="8076" id="p0060"><span data-dcnode-id="8077" instrument_node="">Smart Environment initiatives involve the use of technology to improve crucial aspects of city living such as waste disposal, food growth, pollution control, smart electric grids, housing quality, and facility management. This session presents a few state-of-the-art examples of how the Internet of Data and the Internet of Things can help reduce the ecological footprint of smart cities.</span></p><p data-dcnode-id="8071" id="p0065"><span data-dcnode-id="8075" instrument_node="">According to </span><a class="workspace-trigger" data-dcnode-id="8073" href="#bb0410" name="bbb0410"><span data-dcnode-id="8074" instrument_node="">Perera et al. (2014)</span></a><span data-dcnode-id="8072" instrument_node="">, the widespread use of IoT sensors (such as Radio Frequency Identification chips, proximity detectors, pressure sensors, optical sensors) can drastically change the way we manage the smart city environment. City councils may optimize garbage collection, sorting and recycling by deploying low-cost smart sensors in garbage cans, trucks and recycling plants that share real-time data about the quantity and the quality of urban waste in each neighborhood. This intelligence may not only facilitate decision making in terms of logistics and urban strategy but can also inform educational campaigns to improve recycling behavior.</span></p><p data-dcnode-id="8062" id="p0070"><span data-dcnode-id="8066"><span data-dcnode-id="8070" instrument_node="">In agriculture, sensors can monitor plant growth under different conditions, pest control and soil conditions, allowing bio-scientists and microbiologists to develop customized treatments to minimize the use of toxic pesticides and fertilizers. Pollution control is another major field of IoT application. Sensors can help detect and prevent wildfires, automatically alert against the level of microparticles and other air pollutants, improve prediction, visualization and simulation of city pollution. </span><a class="topic-link" data-dcnode-id="8068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/wireless-sensor" title="Learn more about Wireless Sensor from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8069" instrument_node="">Wireless Sensor</span></a><span data-dcnode-id="8067" instrument_node=""> Networks can be deployed in buses, bus stations, metro wagons and private vehicles to monitor emissions while also learning about how to make them more energy efficient (</span></span><a class="workspace-trigger" data-dcnode-id="8064" href="#bb0255" name="bbb0255"><span data-dcnode-id="8065" instrument_node="">Jamil et al., 2015</span></a><span data-dcnode-id="8063" instrument_node="">).</span></p><p data-dcnode-id="8057" id="p0075"><span data-dcnode-id="8061" instrument_node="">Concerning energy distribution opportunities, the so-called “smart grid” architecture allows the deployment of systems that optimize the use of renewable energy sources based on real-time statistics about usage. These grids are capable of self-healing (or at least self-diagnosis) in severe weather conditions, reducing outages and improving the quality of service. Thanks to connected solar panels, connected meters, virtual power plants and microgrids, consumers can become net-positive energy providers to the grid (“prosumers”). This can be done by storing extra capacity in connected battery packs that can redistribute energy in peak hours (</span><a class="workspace-trigger" data-dcnode-id="8059" href="#bb0280" name="bbb0280"><span data-dcnode-id="8060" instrument_node="">Koutitas, 2018</span></a><span data-dcnode-id="8058" instrument_node="">).</span></p><p data-dcnode-id="8052" id="p0080"><span data-dcnode-id="8056" instrument_node="">Finally, better infrastructure can be created through the development of smart homes, smart buildings, and connected facility management initiatives (</span><a class="workspace-trigger" data-dcnode-id="8054" href="#bb0020" name="bbb0020"><span data-dcnode-id="8055" instrument_node="">Al-Hader and Rodzi, 2009</span></a><span data-dcnode-id="8053" instrument_node="">). In the consumer space, Artificial Intelligence algorithms can learn about the habits of home dwellers and optimize heating through connected thermostats; security can be increased through connected cameras, the ubiquity of intelligent fridges can help individuals, supermarkets and food producers to better regulate their stocks, possibly reducing food waste. Concerning business environments, advanced facility management applications are being developed to monitor and improve electricity, communication, water, sewer, gas, and air conditioning systems. These may rely on internal, private data monitoring systems coupled with open data Geographic Information Systems (GIS) provided by government agencies to create better facility management and production processes, increasing productivity and reducing costs.</span></p></section><section data-dcnode-id="8028" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8047" id="st0030"><span data-dcnode-id="8050" instrument_node="">2.2</span><span data-dcnode-id="8049" instrument_node="">. </span><span data-dcnode-id="8048" instrument_node="">Smart Mobility</span></h3><p data-dcnode-id="8042" id="p0085"><span data-dcnode-id="8046" instrument_node="">One of the key motivations of smart city projects is to improve the current state of congestion in most urban areas. Solutions range from autonomous vehicles that reduce the need for car ownership to deploying sensors in critical urban infrastructure such as roads, rails, subways, bridges, tunnels, seaports and airports. These sensors can provide valuable data on how to fluidify traffic, reduce accidents, improve public transport and make parking faster and easier. Out of 42 smart city projects studied by </span><a class="workspace-trigger" data-dcnode-id="8044" href="#bb0140" name="bbb0140"><span data-dcnode-id="8045" instrument_node="">Dameri and Ricciardi (2017)</span></a><span data-dcnode-id="8043" instrument_node="">, almost half (18) were focused on these types of solutions.</span></p><p data-dcnode-id="8037" id="p0090"><span data-dcnode-id="8041" instrument_node="">Long before self-driving cars become the norm, Vehicular Social Networks (VSNs) are emerging as one of the main short-term smart mobility trends (</span><a class="workspace-trigger" data-dcnode-id="8039" href="#bb0390" name="bbb0390"><span data-dcnode-id="8040" instrument_node="">Ning et al., 2017</span></a><span data-dcnode-id="8038" instrument_node="">). VSNs (such as the community around Google's Waze app) can integrate GPS data from thousands of real-time drivers and their smartphones with anomaly detection mechanisms (both human and algorithmic). In a near future, vehicle-to-vehicle and vehicle-to-infrastructure communication frameworks will complete this ecosystem to enable not only more accurate traffic information but also better cooperative navigation solutions, car sharing, theft control, safety warnings and cruise control.</span></p><p data-dcnode-id="8029" id="p0095"><span data-dcnode-id="8036" instrument_node="">Mobility should not only concern vehicles and infrastructure but above all quality of life of citizens. One of the less technological yet essential ingredients of mobility in smart cities is “walkability” (</span><a class="workspace-trigger" data-dcnode-id="8034" href="#bb0295" name="bbb0295"><span data-dcnode-id="8035" instrument_node="">Kumar and Dahiya, 2017</span></a><span data-dcnode-id="8033" instrument_node="">). Cities like Paris and Nice are decreasing the number of car lanes in key transit corridors to make way for pedestrians and bicycles. This effort to disincentivize motorized vehicles cannot be done without the careful study of traffic data and how to compensate with alternative routes as well as increased public transportation quality and availability. Barcelona, for instance, offers an augmented reality service to facilitate commuter's decisions such as finding the closest bus stops, metro stations, trams, and trains. The city is integrating data generated by different smart services into a unified urban mobility platform in partnership with Cisco (</span><a class="workspace-trigger" data-dcnode-id="8031" href="#bb9650" name="bbb9650"><span data-dcnode-id="8032" instrument_node="">Zygiaris, 2013</span></a><span data-dcnode-id="8030" instrument_node="">). Furthermore, walkability initiatives can be complemented by other ecological short-range mobility solutions such as electric bikes, scooters and mini-scooters shared through a free-floating, pay-per-use business model.</span></p></section></section><section data-dcnode-id="7954" id="s0025"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8023" id="st0035"><span data-dcnode-id="8026" instrument_node="">3</span><span data-dcnode-id="8025" instrument_node="">. </span><span data-dcnode-id="8024" instrument_node="">Innovation ecosystems in smart cities</span></h2><p data-dcnode-id="8021" id="p0100"><span data-dcnode-id="8022" instrument_node="">As previously mentioned, the infrastructure of smart cities can create a unique collaborative ecosystem in which citizens, prosumers, industries, universities and research centers may develop innovative products, services, and solutions. Contrary to traditional double-sided marketplaces in which only two types of stakeholders participate (supply and demand), a smart city ecosystem involves a multitude of actors engaged in public and private consumption, production, education, research, entertainment and professional activities. This collaboration demands high levels of both human and social capital, as the innovation process is based on knowledge and learning (Smart People). In places where these Triple Helix dynamics is found (knowledge creation and knowledge application articulated by local government), creativity and innovation lead to more competitive and attractive local environments (Smart Economy). Both dimensions are discussed below.</span></p><section data-dcnode-id="7993" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8017" id="st0040"><span data-dcnode-id="8020" instrument_node="">3.1</span><span data-dcnode-id="8019" instrument_node="">. </span><span data-dcnode-id="8018" instrument_node="">Smart People</span></h3><p data-dcnode-id="8012" id="p0105"><span data-dcnode-id="8016" instrument_node="">Smart cities can foster both human capital and social capital development (</span><a class="workspace-trigger" data-dcnode-id="8014" href="#bb0490" name="bbb0490"><span data-dcnode-id="8015" instrument_node="">Toppeta, 2010</span></a><span data-dcnode-id="8013" instrument_node="">). Human capital can be defined as the skills and competencies embedded in an individual or a group, whereas social capital is the quality and the number of links connecting social institutions. The interdependent nature of these two concepts is essential for understanding how smart cities increase productivity and innovation in local ecosystems.</span></p><p data-dcnode-id="8004" id="p0110"><span data-dcnode-id="8011" instrument_node="">According to </span><a class="workspace-trigger" data-dcnode-id="8009" href="#bb0195" name="bbb0195"><span data-dcnode-id="8010" instrument_node="">Goldin (2016)</span></a><span data-dcnode-id="8008" instrument_node="">, the concept of human capital can be traced back to Adam Smith's Wealth of Nations. The pioneering work of Robert Solow in the 1950s demonstrated that the majority of productivity growth in society derived not as much from technology (capital) as from human knowledge and creativity, which are the two essential components of innovation. In smart cities, the presence of universities and other higher education institutions are essential to developing human capital, with clear impacts on economic growth as a result. Indeed, according to </span><a class="workspace-trigger" data-dcnode-id="8006" href="#bb0455" name="bbb0455"><span data-dcnode-id="8007" instrument_node="">Shapiro (2006)</span></a><span data-dcnode-id="8005" instrument_node="">, growth in a metropolitan area's concentration of college-educated residents is directly correlated with employment growth. The same is not true of high school educated citizens, however; this result emphasizes the knowledge intensity required to increase employability.</span></p><p data-dcnode-id="7999" id="p0115"><span data-dcnode-id="8003" instrument_node="">As </span><a class="workspace-trigger" data-dcnode-id="8001" href="#bb0185" name="bbb0185"><span data-dcnode-id="8002" instrument_node="">Florida (2014)</span></a><span data-dcnode-id="8000" instrument_node=""> warns, though, it is not sufficient to develop human capital, cities must retain and attract talent by making living there fun and engaging. Pittsburgh, for instance, has excellent universities but fails to create an innovative environment as dynamic as Boston's or San Francisco's, partly because it has a less exciting city life for young, talented graduates. Open minded, tolerant communities attract a diverse pool of creative workers, which are the basis for developing social capital in innovation ecosystems.</span></p><p data-dcnode-id="7994" id="p0120"><span data-dcnode-id="7998" instrument_node="">Social capital must be reinforced by carefully targeted public policies. By attracting talent and investments and providing high standards of living in terms of security, health and leisure infrastructure, cities become a natural environment for creative minds to gather, share and learn. Indeed, individual talent would not have as much economic impact without the institutional relations surrounding and binding them. Thus, according to </span><a class="workspace-trigger" data-dcnode-id="7996" href="#bb0120" name="bbb0120"><span data-dcnode-id="7997" instrument_node="">Coleman (1988)</span></a><span data-dcnode-id="7995" instrument_node="">, whereas physical capital is embedded in material resources and human capital is embodied in the skills and knowledge acquired by an individual, social capital exists in the relationships of trust among persons and institutions. He argues that social capital is necessary to create human capital and vice versa. They are mutually reinforcing, as is exemplified in the case of “knowledge economy” initiatives discussed below.</span></p></section><section data-dcnode-id="7955" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7989" id="st0045"><span data-dcnode-id="7992" instrument_node="">3.2</span><span data-dcnode-id="7991" instrument_node="">. </span><span data-dcnode-id="7990" instrument_node="">Smart Economy</span></h3><p data-dcnode-id="7984" id="p0125"><span data-dcnode-id="7988" instrument_node="">Thanks to the hardware infrastructure, on the one hand, and the social and human capital abundancy, on the other, smart cities can develop more competitive business environments. Thus, Smart Environment, Mobility and People are the basis for the innovative business models of the Smart Economy. Smart cities often create technology hubs to facilitate the sharing of knowledge in the forms of research centers, start-up incubators, and accelerators, as well as innovation parks. According to the Triple Helix perspective (</span><a class="workspace-trigger" data-dcnode-id="7986" href="#bb0325" name="bbb0325"><span data-dcnode-id="7987" instrument_node="">Leydesdorff and Deakin, 2011</span></a><span data-dcnode-id="7985" instrument_node="">), the physical proximity of talented individuals, innovative companies and government agencies can lead to a knowledge economy environment based on social networks of trust, sharing and learning.</span></p><p data-dcnode-id="7976" id="p0130"><span data-dcnode-id="7983" instrument_node="">A notorious example of the virtues of such a knowledge economy hub is The Research Triangle Park (RTP), implemented near the city of Raleigh in the 1960s. The RTP is credited as having been the main source of territorial economic growth in North Carolina in the last 60 years. According to </span><a class="workspace-trigger" data-dcnode-id="7981" href="#bb0520" name="bbb0520"><span data-dcnode-id="7982" instrument_node="">Weddle (2009)</span></a><span data-dcnode-id="7980" instrument_node="">, before the RTP this region was one of the poorest in the Southeast, mostly a backwater tobacco farmland. Today, thanks largely to the successful attraction of companies like IBM, Cisco, Glaxo Smith Kline, and BASF and the resulting virtuous relationships (hiring, cooperative research) with the Universities of Duke, UNC and NCS, the region is one of the wealthiest, most creative hotspots for technology in the US. Such a success has inspired several Smart Cities to create knowledge economy initiatives to increase territorial attractiveness and thus create better quality jobs with all the positive externalities that entail (</span><a class="workspace-trigger" data-dcnode-id="7978" href="#bb0340" name="bbb0340"><span data-dcnode-id="7979" instrument_node="">Luger and Goldstein, 1991</span></a><span data-dcnode-id="7977" instrument_node="">).</span></p><p data-dcnode-id="7967" id="p0135"><span data-dcnode-id="7975" instrument_node="">Innovative cities and technology parks are natural magnets for open innovation projects. </span><a class="workspace-trigger" data-dcnode-id="7973" href="#bb0430" name="bbb0430"><span data-dcnode-id="7974" instrument_node="">Schaffers et al. (2011)</span></a><span data-dcnode-id="7968"><span data-dcnode-id="7972" instrument_node=""> argue that when advanced IT infrastructures are developed locally by public-private partnerships, communities of lead users emerge both in companies and university labs. They cite the example of Nice in France, where a “living lab” was created around a green mobility project. This initiative involved the regional institution for air measurement quality, the local research institute dealing with the </span><a class="topic-link" data-dcnode-id="7970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/internet-of-things" title="Learn more about Internet of Things from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7971" instrument_node="">Internet of Things</span></a><span data-dcnode-id="7969" instrument_node=""> solutions (INRIA), the Internet Foundation for the New Generation, which facilitated workshops among local users, as well as a small company which provided access to electric cars, environmental data, and sensors. Citizens could participate in the project through the internet, developing Arduino-assembled kits to conduct experiments and by building their own sensors. In this co-creation process, users become “prosumers” and contribute directly to the development of the project. Such an initiative would not have been possible without the social and human capital surrounding the Technopole of Sophia Antipolis near Nice, where several of the participants were physically located. This kind of open innovation is facilitated by the synergy and creativity that emerge from open collaboration in the knowledge economy.</span></span></p><p data-dcnode-id="7956" id="p0140"><span data-dcnode-id="7966" instrument_node="">The ICT infrastructure of smart cities can also facilitate the emergence of innovative, cloud-based business models. </span><a class="workspace-trigger" data-dcnode-id="7964" href="#bb0410" name="bbb0410"><span data-dcnode-id="7965" instrument_node="">Perera et al. (2014)</span></a><span data-dcnode-id="7963" instrument_node="">, for instance, mention the innovation possibilities created by Infrastructure-as-a-Service (IaaS), Platform-as-a-Service (PaaS) and Software-as-a-Service (SaaS) business models. These new services (often called XaaS for “Anything as a Service”) can use the flexibility of cloud computing to create turn-key solutions to businesses and start-ups, reducing the entry barriers to develop new ideas and test new solutions for citizen well-being. Sensing-as-a-Service business models can, for example, use Open Data protocols from shared sensors infrastructure to gather real-time information about traffic, weather conditions, pollution, and logistics, making them available to companies or government agencies wishing to create smart services solutions. These business solutions can be provided by regional, national or multinational partnerships, which emphasizes the transboundary, hard </span><em data-dcnode-id="7961"><span data-dcnode-id="7962" instrument_node="">plus</span></em><span data-dcnode-id="7960" instrument_node=""> soft nature of smart cities as previously discussed (</span><a class="workspace-trigger" data-dcnode-id="7958" href="#bb9605" name="bbb9605"><span data-dcnode-id="7959" instrument_node="">Angelidou, 2014</span></a><span data-dcnode-id="7957" instrument_node="">).</span></p></section></section><section data-dcnode-id="7901" id="s0040"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7950" id="st0050"><span data-dcnode-id="7953" instrument_node="">4</span><span data-dcnode-id="7952" instrument_node="">. </span><span data-dcnode-id="7951" instrument_node="">Quality of life in smart cities</span></h2><p data-dcnode-id="7948" id="p0145"><span data-dcnode-id="7949" instrument_node="">As seen in the cases of Sophia Antipolis (France) and the Research Triangle Park (USA) briefly described above, the collaboration among knowledge workers (Smart People) to create an innovation ecosystem (Smart Economy) requires a great deal of local articulation among stakeholders (Smart Governance), often led by government agents or Public-Private Partnerships (PPPs). The decentralized nature of smart cities imposes effective coordination among hundreds of actors using an information and communication system that allows stakeholders to be aware of each other's movements and to facilitate active involvement and mutual support. In order to improve quality of life of a community through better services in the domains of health, public entertainment, and social bonding, real or virtual communities must be created and managed using state-of-the-art technology.</span></p><section data-dcnode-id="7918" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7944" id="st0055"><span data-dcnode-id="7947" instrument_node="">4.1</span><span data-dcnode-id="7946" instrument_node="">. </span><span data-dcnode-id="7945" instrument_node="">Smart Governance</span></h3><p data-dcnode-id="7936" id="p0150"><span data-dcnode-id="7943" instrument_node="">According to the European Innovation Partnership on Smart Cities and Communities (</span><a class="workspace-trigger" data-dcnode-id="7941" href="#bb0175" name="bbb0175"><span data-dcnode-id="7942" instrument_node="">EIP, 2013, p. 101</span></a><span data-dcnode-id="7940" instrument_node="">), the role of Governance Entities is to “manage information flows among stakeholders, collecting/aggregating/processing data related to value-added processes in smart cities”. GEs also may certify data quality and integrity, enable financial mechanisms, coordinate stakeholders (including citizens) throughout the value chains and generate both internal and external awareness about smart city initiatives. Typical roles in such Governance Entities include promoting, executing, financing, warrantying and certifying projects. </span><a class="workspace-trigger" data-dcnode-id="7938" href="#bb0105" name="bbb0105"><span data-dcnode-id="7939" instrument_node="">Chourabi et al. (2012)</span></a><span data-dcnode-id="7937" instrument_node=""> also emphasize the role of these bodies in assuring transparency, accountability, communication, and participation among all organizations involved.</span></p><p data-dcnode-id="7928" id="p0155"><span data-dcnode-id="7935" instrument_node="">“Smart” Governance presupposes the innovative use of ICT infrastructure to achieve those goals, providing all stakeholders with a simplified, one-stop experience based on service application integration (</span><a class="workspace-trigger" data-dcnode-id="7933" href="#bb0485" name="bbb0485"><span data-dcnode-id="7934" instrument_node="">Tokoro, 2015</span></a><span data-dcnode-id="7932" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="7930" href="#bb0155" name="bbb0155"><span data-dcnode-id="7931" instrument_node="">Dustdar et al. (2017)</span></a><span data-dcnode-id="7929" instrument_node=""> argue that such a solution should involve the following tools: a) Data analytics and real-time process diagnosis: b) Activity coordination and social orchestration of smart city initiatives; c) Citizen communication; d) Infrastructure management and e) Services management; f) Incentives management. Far from a trivial integration effort, this convergence could be essential to create a central dashboard for governance and intelligence.</span></p><p data-dcnode-id="7919" id="p0160"><span data-dcnode-id="7927" instrument_node="">Incentives management is, to these authors, an essential ingredient of smart city governance. Indeed, based on evidence from the longstanding tradition of Self-Determination Theory (</span><a class="workspace-trigger" data-dcnode-id="7925" href="#bb0425" name="bbb0425"><span data-dcnode-id="7926" instrument_node="">Ryan and Deci, 2000</span></a><span data-dcnode-id="7920"><span data-dcnode-id="7924" instrument_node="">), they argue that government bodies should build both intrinsic (value-driven) motivation schemes as well as extrinsic ones (external rewards to compensate for the lack of intrinsic motivation) into their projects. Whereas intrinsic motivation (such as curiosity, </span><a class="topic-link" data-dcnode-id="7922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/altruism" title="Learn more about altruism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7923" instrument_node="">altruism</span></a><span data-dcnode-id="7921" instrument_node="">, competitiveness) is stronger and longer-lasting, it is harder to manage. It is more adapted to the left side of our hybrid model (live/play). Extrinsic motivation mechanisms (financial incentives, public sanctions) are more controllable, but also more volatile. They are more adapted to the right side of our model (work, learn).</span></span></p></section><section data-dcnode-id="7902" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7914" id="st0060"><span data-dcnode-id="7917" instrument_node="">4.2</span><span data-dcnode-id="7916" instrument_node="">. </span><span data-dcnode-id="7915" instrument_node="">Smart Living</span></h3><p data-dcnode-id="7909" id="p0165"><span data-dcnode-id="7913" instrument_node="">The culmination of all the preceding layers is the well-being of citizens. The </span><a class="workspace-trigger" data-dcnode-id="7911" href="#bb0395" name="bbb0395"><span data-dcnode-id="7912" instrument_node="">OECD (2017)</span></a><span data-dcnode-id="7910" instrument_node=""> defines well-being as a result of local material conditions, quality of life, and sustainability. This final section analyzes how Smart Environment, Mobility, People, Economy, and Governance may lead to Smart Living in modern cities. According to the OECD Better-Life Initiative framework (2017), smart living must include initiatives to improve health, education and social services and empower citizen participation (e-Government projects). It must have positive environmental impacts, reduce vulnerability and improve safety. Quality of life also should rely on better jobs, housing, and infrastructure (material conditions) as much on the preservation and development of natural, economic, human and social capitals.</span></p><p data-dcnode-id="7907" id="p0170"><span data-dcnode-id="7908" instrument_node="">All of these elements can be positively influenced by the use of information and communication technologies in smart cities. Indeed, we've seen how real-time information coupled with sophisticated algorithms can improve the energy infrastructure, monitor environmental threats and fluidify public transit (Smart Environment and Mobility); how it can help create value through better collaboration and innovation tools for learning and working (Smart People and Economy) and how all of these efforts can be coordinated through centralized Smart Governance tools.</span></p><p data-dcnode-id="7903" id="p0175"><a class="workspace-trigger" data-dcnode-id="7905" href="#bb0140" name="bbb0140"><span data-dcnode-id="7906" instrument_node="">Dameri and Ricciardi (2017)</span></a><span data-dcnode-id="7904" instrument_node=""> cite two examples of Smart Living solutions (out of 24 projects identified in this category in their survey). In Spain, several cities have adopted a centralized digital solution to deliver real-time information about beach quality, mobility, touristic infrastructures, and public services. In the case of Rome, a platform was created to facilitate the relationship between citizens and government agencies, supporting entrepreneurship, events management, city security, and tourism. The other examples cited in this text complete the picture of how infrastructure and innovation through better information systems can lead to a better quality of life in smart cities.</span></p></section></section><section data-dcnode-id="6631" id="s0055"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7897" id="st0065"><span data-dcnode-id="7900" instrument_node="">5</span><span data-dcnode-id="7899" instrument_node="">. </span><span data-dcnode-id="7898" instrument_node="">Overview of the special issue contributions</span></h2><section data-dcnode-id="7036" id="s0060"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7893" id="st0070"><span data-dcnode-id="7896" instrument_node="">5.1</span><span data-dcnode-id="7895" instrument_node="">. </span><span data-dcnode-id="7894" instrument_node="">Descriptive statistics</span></h3><div data-dcnode-id="7039"><p data-dcnode-id="7888" id="p0180"><span data-dcnode-id="7892" instrument_node="">Following an extensive blind peer-review process a total of thirty-one papers were accepted for inclusion to the special issue, on the basis of established selection criteria: novelty and originality of the discussed topics, methods, and/or approaches; overall consistency with the aims of the call for papers; relevance both for the academic and practitioner debates. As editors of the special issue, we would like to take this opportunity to thank all the reviewers involved in the process for their constructive feedback during the multiple review rounds. </span><a class="workspace-trigger" data-dcnode-id="7890" href="#t0010" name="bt0010"><span data-dcnode-id="7891" instrument_node="">Table 2</span></a><span data-dcnode-id="7889" instrument_node=""> provides an overview of the universities/research centers/companies, departments, countries, and number of co-authors for each special issue paper.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="7040" id="t0010"><span class="captions" data-dcnode-id="7881"><span data-dcnode-id="7882" id="ca0015"><p data-dcnode-id="7883" id="sp0015"><span class="label" data-dcnode-id="7886"><span data-dcnode-id="7887" instrument_node="">Table 2</span></span><span data-dcnode-id="7885" instrument_node="">. </span><span data-dcnode-id="7884" instrument_node="">Descriptive statistics of accepted contributions.</span></p></span></span><div class="groups" data-dcnode-id="7041"><table data-dcnode-id="7042"><thead data-dcnode-id="7865"><tr class="rowsep-1 valign-top" data-dcnode-id="7866"><th data-dcnode-id="7879" scope="col"><span data-dcnode-id="7880" instrument_node="">Title</span></th><th data-dcnode-id="7877" scope="col"><span data-dcnode-id="7878" instrument_node="">Universities, companies</span></th><th data-dcnode-id="7875" scope="col"><span data-dcnode-id="7876" instrument_node="">Departments</span></th><th data-dcnode-id="7873" scope="col"><span data-dcnode-id="7874" instrument_node="">Countries</span></th><th data-dcnode-id="7871" scope="col"><span data-dcnode-id="7872" instrument_node="">#Co-authors</span></th><th data-dcnode-id="7869" scope="col"><span data-dcnode-id="7870" instrument_node="">#Universities/Companies</span></th><th data-dcnode-id="7867" scope="col"><span data-dcnode-id="7868" instrument_node="">#Departments</span></th></tr></thead><tbody data-dcnode-id="7043"><tr data-dcnode-id="7849"><th data-dcnode-id="7862" scope="row"><em data-dcnode-id="7863"><span data-dcnode-id="7864" instrument_node="">Business models for developing smart cities. A fuzzy set qualitative comparative analysis of an IoT platform</span></em></th><td data-dcnode-id="7860"><span data-dcnode-id="7861" instrument_node="">University of Messina</span></td><td data-dcnode-id="7858"><span data-dcnode-id="7859" instrument_node="">Department of Economics; Department of Mathematical Sciences, Physical Sciences, and Earth Science</span></td><td class="align-center" data-dcnode-id="7856"><span data-dcnode-id="7857" instrument_node="">IT</span></td><td class="align-center" data-dcnode-id="7854"><span data-dcnode-id="7855" instrument_node="">4</span></td><td class="align-center" data-dcnode-id="7852"><span data-dcnode-id="7853" instrument_node="">1</span></td><td class="align-center" data-dcnode-id="7850"><span data-dcnode-id="7851" instrument_node="">2</span></td></tr><tr data-dcnode-id="7833"><th data-dcnode-id="7846" rowspan="4" scope="row"><em data-dcnode-id="7847"><span data-dcnode-id="7848" instrument_node="">Centralized simulated annealing for alleviating vehicular congestion in smart cities</span></em></th><td data-dcnode-id="7844"><span data-dcnode-id="7845" instrument_node="">University of Sheffield</span></td><td data-dcnode-id="7842"><span data-dcnode-id="7843" instrument_node="">Department of Automatic Control and Systems Engineering</span></td><td class="align-center" data-dcnode-id="7840"><span data-dcnode-id="7841" instrument_node="">UK</span></td><td class="align-center" data-dcnode-id="7838"><span data-dcnode-id="7839" instrument_node="">6</span></td><td class="align-center" data-dcnode-id="7836"><span data-dcnode-id="7837" instrument_node="">4</span></td><td class="align-center" data-dcnode-id="7834"><span data-dcnode-id="7835" instrument_node="">4</span></td></tr><tr data-dcnode-id="7823"><td data-dcnode-id="7831"><span data-dcnode-id="7832" instrument_node="">Southern Technical University</span></td><td data-dcnode-id="7829"><span data-dcnode-id="7830" instrument_node="">Technical Institute Qurna</span></td><td class="align-center" data-dcnode-id="7827"><span data-dcnode-id="7828" instrument_node="">IQ</span></td><td data-dcnode-id="7826"></td><td data-dcnode-id="7825"></td><td data-dcnode-id="7824"></td></tr><tr data-dcnode-id="7813"><td data-dcnode-id="7821"><span data-dcnode-id="7822" instrument_node="">UAE University</span></td><td data-dcnode-id="7819"><span data-dcnode-id="7820" instrument_node="">College of Information Technology</span></td><td class="align-center" data-dcnode-id="7817"><span data-dcnode-id="7818" instrument_node="">AE</span></td><td data-dcnode-id="7816"></td><td data-dcnode-id="7815"></td><td data-dcnode-id="7814"></td></tr><tr data-dcnode-id="7803"><td data-dcnode-id="7811"><span data-dcnode-id="7812" instrument_node="">University of Leeds</span></td><td data-dcnode-id="7809"><span data-dcnode-id="7810" instrument_node="">Electronic and Electrical Engineering School</ nstrument_node="">University of Chinese Academy of</span><br data-dcnode-id="7059"><span data-dcnode-id="7058" instrument_node="">Sciences</span></td><td data-dcnode-id="7053"><span data-dcnode-id="7056" instrument_node="">Institutes of Science and Development,</span><br data-dcnode-id="7055"><span data-dcnode-id="7054" instrument_node="">Chinese Academy of Sciences;</span></td><td class="align-center" data-dcnode-id="7051"><span data-dcnode-id="7052" instrument_node="">CN</span></td><td class="align-center" data-dcnode-id="7049"><span data-dcnode-id="7050" instrument_node="">4</span></td><td class="align-center" data-dcnode-id="7047"><span data-dcnode-id="7048" instrument_node="">1</span></td><td class="align-center" data-dcnode-id="7045"><span data-dcnode-id="7046" instrument_node="">1</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="7037" id="p0185"><span data-dcnode-id="7038" instrument_node="">We received contributions from twenty-one countries; approximately 45% of the researchers work in institutions located in Italy, United Kingdom, and The Netherlands. A total number of twenty-nine among scholars and practitioners wrote for this special issue, with an average of 3.4 authors per paper; 60% of the contributions have been co-authored by no more than three co-authors, whereas 7% by a single author, and 14% by six authors. In terms of institutions and departments, two universities/companies and two departments on average worked together to build up the study, with a maximum of six. It is worthy of notice the level of interdisciplinarity in undertaking such an endeavor: among the many disciplines, we highlight management, economics, mathematics, computer science, art, engineering, innovation, architecture, design, sustainability, history, energy, and anthropology. Under these respects, the spirit of the call for papers was successfully accomplished since its aim was to stimulate interdisciplinary collaboration and build up a community to enact a constructive discourse around Smart Cities.</span></p></section><section data-dcnode-id="6632" id="s0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7032" id="st0075"><span data-dcnode-id="7035" instrument_node="">5.2</span><span data-dcnode-id="7034" instrument_node="">. </span><span data-dcnode-id="7033" instrument_node="">Reviewing the content</span></h3><div data-dcnode-id="6820"><p data-dcnode-id="7027" id="p0190"><span data-dcnode-id="7031" instrument_node="">The thirty-one papers comprising this special issue advance our understanding of the underlying technological and societal challenges smart cities initiatives pose to academics, practitioners, and policy makers. It is worth noting that this collection of papers is heterogeneous in terms of theoretical approaches, empirical methodologies, and focus of the investigation, spanning a wide range of conceptual approaches and research designs. In so doing, it exposes the reader to diverse ideas and methods, thus having the potential to stimulate creative scholarly conversations on the topic (</span><a class="workspace-trigger" data-dcnode-id="7029" href="#t0015" name="bt0015"><span data-dcnode-id="7030" instrument_node="">Table 3</span></a><span data-dcnode-id="7028" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="6821" id="t0015"><span class="captions" data-dcnode-id="7017"><span data-dcnode-id="7018" id="ca0020"><p data-dcnode-id="7019" id="sp0020"><span class="label" data-dcnode-id="7025"><span data-dcnode-id="7026" instrument_node="">Table 3</span></span><span data-dcnode-id="7024" instrument_node="">. </span><span data-dcnode-id="7023" instrument_node="">Overview of the contributions in the light of our hybrid framework (</span><a class="workspace-trigger" data-dcnode-id="7021" href="#f0005" name="bf0005"><span data-dcnode-id="7022" instrument_node="">Fig. 1</span></a><span data-dcnode-id="7020" instrument_node="">).</span></p></span></span><div class="groups" data-dcnode-id="6822"><table data-dcnode-id="6823"><thead data-dcnode-id="7011"><tr class="rowsep-1 valign-top" data-dcnode-id="7012"><th data-dcnode-id="7015" scope="col"><span data-dcnode-id="7016" instrument_node="">Title</span></th><th data-dcnode-id="7013" scope="col"><span data-dcnode-id="7014" instrument_node="">Focus</span></th></tr></thead><tbody data-dcnode-id="6824"><tr data-dcnode-id="7005"><th data-dcnode-id="7008" scope="row"><em data-dcnode-id="7009"><span data-dcnode-id="7010" instrument_node="">Business models for developing smart cities. A fuzzy set qualitative comparative analysis of an IoT platform</span></em></th><td data-dcnode-id="7006"><span data-dcnode-id="7007" instrument_node="">PI/IE/QL</span></td></tr><tr data-dcnode-id="6999"><th data-dcnode-id="7002" scope="row"><em data-dcnode-id="7003"><span data-dcnode-id="7004" instrument_node="">Centralized simulated annealing for alleviating vehicular congestion in smart cities</span></em></th><td data-dcnode-id="7000"><span data-dcnode-id="7001" instrument_node="">PI</span></td></tr><tr data-dcnode-id="6993"><th data-dcnode-id="6996" scope="row"><em data-dcnode-id="6997"><span data-dcnode-id="6998" instrument_node="">Reframing technologically enhanced urban scenarios: A design research model towards human centered smart cities</span></em></th><td data-dcnode-id="6994"><span data-dcnode-id="6995" instrument_node="">PI/IE/QL</span></td></tr><tr data-dcnode-id="6987"><th data-dcnode-id="6990" scope="row"><em data-dcnode-id="6991"><span data-dcnode-id="6992" instrument_node="">The role of universities in the knowledge management of smart city projects</span></em></th><td data-dcnode-id="6988"><span data-dcnode-id="6989" instrument_node="">IE/QL</span></td></tr><tr data-dcnode-id="6981"><th data-dcnode-id="6984" scope="row"><em data-dcnode-id="6985"><span data-dcnode-id="6986" instrument_node="">Light the way for smart cities: Lessons from Philips Lighting</span></em></
