instrument_node="">2013</span><span data-dcnode-id="428" instrument_node="">)</span><span data-dcnode-id="426" instrument_node="">, pp. </span><span data-dcnode-id="424" instrument_node="">217</span><span data-dcnode-id="422" instrument_node="">-</span><span data-dcnode-id="420" instrument_node="">231</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="415"><span data-dcnode-id="418" instrument_node=""></span><a aria-describedby="ref-id-rf9039" class="link" data-dcnode-id="416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DSmart%2520city%2520reference%2520model%253A%2520Assisting%2520planners%2520to%2520conceptualize%2520the%2520building%2520of%2520smart%2520city%2520innovation%2520ecosystems%26publication_year%3D2013%26author%3DS.%2520Zygiaris" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="417" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="289" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="290"><div class="PageDivider" data-dcnode-id="410"></div><header data-dcnode-id="407" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Cited by (149)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="291"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="292"><ul data-dcnode-id="298"><li class="ListArticleItem" data-dcnode-id="389"><div class="sub-heading" data-dcnode-id="401"><a data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0148296322002764" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="405" id="citing-articles-article0-title"><span data-dcnode-id="406" instrument_node="">Innovation in emerging economies: Research on the digital economy driving high-quality green development</span></h3></a><div class="article-source ellipsis" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">2022, Journal of Business Research</span></div></div><div class="buttons" data-dcnode-id="395"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="396" type="button"><span class="button-link-text" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="397" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="398"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="390"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="391" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="392"><p data-dcnode-id="393" id="sp0010"><span data-dcnode-id="394" instrument_node="">This paper measures the level of urban digital economy and high-quality green development in China, seeking to reveal the mechanisms and influences of&nbsp;the digital economy in a unified framework. The results demonstrate that the digital economy can directly drive high-quality green development, and industrial structure adjustment and green technology innovation are significant mediating mechanisms. Meanwhile, it has positive nonlinear effects on high-quality green development, but the marginal effects are clearly diminishing. Further study shows city-specific heterogeneity effects, and digital dividends in eastern cities, key urban agglomerations, and high-level cities are more fully released. Moreover, the digital economy can affect high-quality green development in neighboring areas through spatial spillover effects. The conclusions are robust after adopting instrumental variables and smart city construction as a quasi-natural experiment. The findings could provide decision-making references for policymakers and professionals in emerging economies to enhance green development.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="371"><div class="sub-heading" data-dcnode-id="383"><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0048733322000166" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="387" id="citing-articles-article1-title"><span data-dcnode-id="388" instrument_node="">The stakeholder value proposition of digital platforms in an urban ecosystem</span></h3></a><div class="article-source ellipsis" data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">2022, Research Policy</span></div></div><div class="buttons" data-dcnode-id="377"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="378" type="button"><span class="button-link-text" data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="379" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="380"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="372"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="373" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="374"><p data-dcnode-id="375" id="spara022"><span data-dcnode-id="376" instrument_node="">Using a mixed-method approach, we assess the conditions under which digital platforms can successfully deliver their stakeholder value propositions (SVP)—declarative statements that the digital platform makes about how it adds value or solves a problem for target stakeholders—in cities. We examine the popular digital platform Airbnb in the touristic city of Barcelona and analyze the extent to which it delivers its value proposition to guests, hosts, and the city. Evidence suggests that Airbnb in Barcelona closely resembles the existing hotel industry, reinforcing over-tourism and inequality, which explains the adverse reactions Airbnb has faced from the city. We contrast this with the case of a nearby non-touristic city, Igualada, where the platform has delivered on its SVP. Our findings suggest that, while complex and gradual, the process of joint value creation between the digital platform and its stakeholders is possible and can be beneficial under conditions of mutual adjustment and business model adaptation. We uncover the substantive, localized, and dynamic characteristics of the SVP design process and discuss the academic, policymaking, and managerial implications of adequate platform design.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="353"><div class="sub-heading" data-dcnode-id="365"><a data-dcnode-id="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2444569X2200018X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="369" id="citing-articles-article2-title"><span data-dcnode-id="370" instrument_node="">Do organizations really evolve? The critical link between organizational culture and organizational innovation toward organizational effectiveness: Pivotal role of organizational resistance</span></h3></a><div class="article-source ellipsis" data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">2022, Journal of Innovation and Knowledge</span></div></div><div class="buttons" data-dcnode-id="359"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="360" type="button"><span class="button-link-text" data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="361" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="362"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="354"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="355" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="356"><p data-dcnode-id="357" id="spara016"><span data-dcnode-id="358" instrument_node="">In today's global economy, organizational effectiveness and innovation have become top priorities, putting pressure on all businesses worldwide. Therefore, this study aims to explore the impact of organizational culture on effectiveness through organizational innovation. We analyzed organizational resistance as a boundary condition on the relation of organizational innovation and effectiveness to seek whether organizational resistance enhances the positive effect of organizational innovation on effectiveness and on the indirect effect of organizational culture on the effectiveness of organization via organizational effectiveness. Organizational resistance is important because it occurs when employees understand how they fit into the new way of doing things, such that organizational innovation has a positive impact on organizational effectiveness. The data were collected in two waves from 280 manager-employee dyads operating in Pakistan's banking industry. The outcomes indicated that organizational culture positively influences organizational effectiveness; therefore, this relationship is mediated by organizational innovation. The positive influence of organizational innovation on organizational effectiveness is greater among individuals who embraced improvements rapidly than among those who did not. Additionally, organizational resistance reinforces the relationship between organizational culture and effectiveness through organizational innovation, such that the relationship is greater for those who embrace compliant advancement. Thus, the theoretical and practical implications of this study are discussed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="335"><div class="sub-heading" data-dcnode-id="347"><a data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0019850122000128" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="351" id="citing-articles-article3-title"><span data-dcnode-id="352" instrument_node="">Temporality, temporariness and keystone actor capabilities in innovation ecosystems</span></h3></a><div class="article-source ellipsis" data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">2022, Industrial Marketing Management</span></div></div><div class="buttons" data-dcnode-id="341"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="342" type="button"><span class="button-link-text" data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="343" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="344"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="336"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="337" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="338"><p data-dcnode-id="339" id="sp0020"><span data-dcnode-id="340" instrument_node="">The last years have witnessed a growing scholarly interest in innovation ecosystems, including how keystone actors establish and orchestrate collaborative innovation. In parallel, temporary collaborative innovation efforts are becoming increasingly important to address societal problems. Temporary structures are also used to create a sense of urgency to prompt change. Thus, innovation ecosystems often incorporate temporary structures. However, while keystone actor capabilities to orchestrate an ecosystem over its lifecycle have been studied, the needs for capabilities to coordinate multiple parallel processes with different temporal logics have not been addressed. In this paper, we contribute to the literature on innovation ecosystems in industrial marketing research by examining the challenges and opportunities associated with temporary structures in an innovation ecosystem. Furthermore, we theorize on the implications for the keystone actor orchestration capabilities. The paper is based on a longitudinal case study of a construction project that was used by a keystone actor to gain momentum in its innovation work. Fourteen innovation projects, each involving external partners, were connected to the construction project. We conclude that temporary structures are powerful to enhance innovation, but that preparation is essential to enable the seizing of opportunities in a collaborative and transitory context. Specific orchestration capabilities relate to integrating a linear, time-bound logic with an iterative innovation logic, and to matching ambitions in at the temporary systems with capabilities at the level of the permanent organizations. An important aspect is to find a balance between temporary external resources and long-term internal resources.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="317"><div class="sub-heading" data-dcnode-id="329"><a data-dcnode-id="332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0040162521008581" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="333" id="citing-articles-article4-title"><span data-dcnode-id="334" instrument_node="">The structural model of indicators for evaluating the quality of urban smart living</span></h3></a><div class="article-source ellipsis" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">2022, Technological Forecasting and Social Change</span></div></div><div class="buttons" data-dcnode-id="323"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="324" type="button"><span class="button-link-text" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="325" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="326"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="318"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="319" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="320"><p data-dcnode-id="321" id="spara011"><span data-dcnode-id="322" instrument_node="">In current century, in order to address increasing demands of twentieth-century man, science is rapidly advancing in various fields on the basis of vast information and communications technology. The quality of life in a smart city will be undoubtedly affected by such an approach and the impact of smartness concept had led to a new viewpoint on the correlation between different aspects of assessment of urban life quality and smart city phenomenon. This study aims to design a structural model and identify the importance order and impact factor of features influencing quality of smart urban life through structural equations adopting a Partial Least Squares (PLS) approach in Tehran metropolis. Significance of this study is reflected in increasing influence of smart technologies in citizens’ lives. Results show that integration of dimensions of health and hygiene, public education, security, social coherence and participation, consumption of resources and the environment, culture, and at last development of housing and buildings with development of smart information and communications are the most significant contributory factors in improvement of quality of smart urban life. Furthermore, education and enhancement of awareness are of utmost importance as indicators influencing dimensions of health and hygiene as well as security.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="299"><div class="sub-heading" data-dcnode-id="311"><a data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0160791X22000173" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="315" id="citing-articles-article5-title"><span data-dcnode-id="316" instrument_node="">Analyzing the factors that influence the seeking and sharing of information on the smart city digital platform: Empirical evidence from Indonesia</span></h3></a><div class="article-source ellipsis" data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">2022, Technology in Society</span></div></div><div class="buttons" data-dcnode-id="305"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="306" type="button"><span class="button-link-text" data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="307" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="308"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="300"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="301" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="302"><p data-dcnode-id="303" id="abspara0010"><span data-dcnode-id="304" instrument_node="">Smart city initiatives are considered as the solutions for urban problems. One dimension of a smart city, i.e., smart people/society, suggests that a smart city requires high-quality social interactions and social relationships that help cities connect with their residents and the outside world. For this purpose, smart cities in Indonesia have developed digital platforms (internet websites and mobile applications) to disseminate the cities' programs and information and facilitate sharing of information among its residents. This study aimed to investigate the factors that affect the seeking and sharing of information on the smart city digital platforms. We used a quantitative approach by conducting surveys in 8 smart cities in Indonesia, with 1161 respondents. The survey data were analyzed using structural equation modeling (SEM). The results showed that social factors (sense of belonging and seeking reputations) have dominant roles in determining residents' intention to seek information on smart city platforms. In turn, the intention to seek information is the key factor that affects the residents' intention to share information on the smart city platforms and on their online social network. This paper provides insights on the factors that need more attention from smart city administrators to improve resident engagement and enhance the dimension of smart people.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85058788370%26md5%3Dbaddde77ad84d584c9314c8a39ab8" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="296" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="297"></path></svg><span class="button-alternative-text" data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="278"><dl class="footnote" data-dcnode-id="279"><dt class="footnote-label" data-dcnode-id="285"><sup data-dcnode-id="286"><a data-dcnode-id="287" href="#bfn0005"><span data-dcnode-id="288" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="280"><p data-dcnode-id="281" id="np0005"><a data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.un.org/development/desa/en/news/population/world-population-prospects-2017.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="284" instrument_node="">https://www.un.or
