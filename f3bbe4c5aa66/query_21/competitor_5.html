asks and processes, it makes everyone in the healthcare system—patients, partners, caregivers, administrators, and communities—feel a whole lot better.</span></p></div><div class="sc-dutt1s-0 eKxwOq" data-dcnode-id="928"><div class="sc-dutt1s-1 kiBSmO" data-dcnode-id="929"><div class="sc-1cztezi-2" data-dcnode-id="930"><div class="sc-1cztezi-3 bHkeFC" data-cy="VideoPlayer-Image" data-dcnode-id="931"><img alt="What is a UiPath Software Robot" class="VideoPlayer__Image-File" data-dcnode-id="934" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uipath.com/cdn-cgi/image/width%3D732%2Cformat%3Dauto/https%3A////images.ctfassets.net/5965pury2lcm/34ph0lSQdW6CDxIAMAL0Ko/5064986ca53fa0914a2e003db58de3bb/What-is-UiPath-Software-Robot.png&amp;raw"><div class="sc-1cztezi-0 Yvvoi" data-dcnode-id="933"></div><div class="sc-1cztezi-4 ieOZlb" data-dcnode-id="932"></div></div></div></div></div></div><div class="sc-1ykc49b-0 ehejpr ContentBlock--Light" data-cy="ContentBlock" data-dcnode-id="918"><div class="sc-16h3fns-0 chwtln" data-dcnode-id="919"><div class="ContentBlock__Inner-Container" data-dcnode-id="920"><h2 class="sc-edeore-11 kCUFHD ContentBlock__Headline" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Get proven remedies for your biggest healthcare challenges</span></h2><p class="sc-edeore-6 lcquB ContentBlock__Body" data-dcnode-id="921"></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="924"></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="923"></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="922"></p><p></p></div></div></div><div class="sc-1wurrur-0 jppTjR" data-cy="Icons" data-dcnode-id="894"><div class="sc-16h3fns-0 chwtln Icons__Outer-Container" data-dcnode-id="895"><div class="MuiGrid-root Icons__Inner-Container MuiGrid-container MuiGrid-spacing-xs-3" data-dcnode-id="896"><div class="MuiGrid-root Icons__Item-Container MuiGrid-item MuiGrid-grid-xs-12 MuiGrid-grid-sm-6 MuiGrid-grid-md-4" data-cy="Icons__Item-Container" data-dcnode-id="912"><img alt="icon" data-dcnode-id="917" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.ctfassets.net/5965pury2lcm/5W9DkxDas7CsF6FsSvU4BH/06605197858b15cae525cc03cf4f8958/Icon-light-business-partnerup-alt.svg&amp;raw"><div class="Icons__Text-Container" data-dcnode-id="913"><p class="sc-edeore-7 eHwIng" data-dcnode-id="914"></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Improve patient experience from scheduling to visits to treatments to&nbsp;billing. RPA can take friction, time, and cost out&nbsp;of the equation—and make sure providers have&nbsp;the data and the time for optimal care&nbsp;decisions.</span></p><p></p></div></div><div class="MuiGrid-root Icons__Item-Container MuiGrid-item MuiGrid-grid-xs-12 MuiGrid-grid-sm-6 MuiGrid-grid-md-4" data-cy="Icons__Item-Container" data-dcnode-id="903"><img alt="icon" data-dcnode-id="911" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.ctfassets.net/5965pury2lcm/rK2nYIe6LF1l8ULOUL5ip/173bb9eaaeeb750d7c43a467da6feff7/Icon-light-robot-attended.svg&amp;raw"><div class="Icons__Text-Container" data-dcnode-id="904"><p class="sc-edeore-7 eHwIng" data-dcnode-id="905"></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="906"><span data-dcnode-id="910" instrument_node="">Our robots can emulate human keystrokes&nbsp;and call on </span><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uipath.com/product/document-understanding"><span data-dcnode-id="909" instrument_node="">UiPath&nbsp;Document Understanding&nbsp;</span></a><span data-dcnode-id="907" instrument_node="">to 'read' screens.&nbsp;So&nbsp;you can use robots,&nbsp;instead of people, as the conduits linking&nbsp;new and legacy systems, apps, and external&nbsp;systems across your community and&nbsp;ecosystem.</span></p><p></p></div></div><div class="MuiGrid-root Icons__Item-Container MuiGrid-item MuiGrid-grid-xs-12 MuiGrid-grid-sm-6 MuiGrid-grid-md-4" data-cy="Icons__Item-Container" data-dcnode-id="897"><img alt="icon" data-dcnode-id="902" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.ctfassets.net/5965pury2lcm/5mLBNeN0NPTaCN0bYrhF2K/cbc6bfc8d49a06ddee5c2cc16ee9511d/Icon-light-fast-roi.svg&amp;raw"><div class="Icons__Text-Container" data-dcnode-id="898"><p class="sc-edeore-7 eHwIng" data-dcnode-id="899"></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Reduce costs, increase speed, improve accuracy and compliance.  Even in a medium-sized healthcare&nbsp;system, employees spend millions of&nbsp;hours each year on repetitive, manual&nbsp;tasks that UiPath robots can do instead.</span></p><p></p></div></div></div></div></div><div class="sc-1wurrur-0 fOQCNN" data-cy="Icons" data-dcnode-id="870"><div class="sc-16h3fns-0 chwtln Icons__Outer-Container" data-dcnode-id="871"><div class="MuiGrid-root Icons__Inner-Container MuiGrid-container MuiGrid-spacing-xs-3" data-dcnode-id="872"><div class="MuiGrid-root Icons__Item-Container MuiGrid-item MuiGrid-grid-xs-12 MuiGrid-grid-sm-6 MuiGrid-grid-md-4" data-cy="Icons__Item-Container" data-dcnode-id="888"><img alt="icon" data-dcnode-id="893" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.ctfassets.net/5965pury2lcm/6tJTFASoSZNh2DhHqgF2rP/d816685988d1bf7bf076b1144c8c4b8e/Icon-light-iconName-3.svg&amp;raw"><div class="Icons__Text-Container" data-dcnode-id="889"><p class="sc-edeore-7 eHwIng" data-dcnode-id="890"></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Transform healthcare professionals from ‘overburdened’ to 'overjoyed.' Give every provider a&nbsp;digital assistant&nbsp;to do&nbsp;the admin tasks connected with patient&nbsp;visits, so they can spend more time with&nbsp;patients, not paperwork.</span></p><p></p></div></div><div class="MuiGrid-root Icons__Item-Container MuiGrid-item MuiGrid-grid-xs-12 MuiGrid-grid-sm-6 MuiGrid-grid-md-4" data-cy="Icons__Item-Container" data-dcnode-id="879"><img alt="icon" data-dcnode-id="887" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.ctfassets.net/5965pury2lcm/40PSGUOQ716OZYv7CTMLg4/5c5b521227e3a66f8816d4012670b33f/Icon-light-app-3rd-party-2.svg&amp;raw"><div class="Icons__Text-Container" data-dcnode-id="880"><p class="sc-edeore-7 eHwIng" data-dcnode-id="881"></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">Expand data analytics with ease. With&nbsp;</span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uipath.com/product/rpa-ai-integration-with-ai-center"><span data-dcnode-id="885" instrument_node="">AI Center</span></a><span data-dcnode-id="883" instrument_node="">, you can insert artificial&nbsp;intelligence (AI) and machine learning&nbsp;models into automations with simple&nbsp;drag-and-drop action to support&nbsp;evidence-based medicine, operational&nbsp;analytics, and much more.</span></p><p></p></div></div><div class="MuiGrid-root Icons__Item-Container MuiGrid-item MuiGrid-grid-xs-12 MuiGrid-grid-sm-6 MuiGrid-grid-md-4" data-cy="Icons__Item-Container" data-dcnode-id="873"><img alt="icon" data-dcnode-id="878" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.ctfassets.net/5965pury2lcm/5Y8OhqZcdOloTBkh7dyeGX/3c5dfe06383ff32bb291ef53644813d6/Icon-light-refresh.svg&amp;raw"><div class="Icons__Text-Container" data-dcnode-id="874"><p class="sc-edeore-7 eHwIng" data-dcnode-id="875"></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Reduce denied and rejected claims to speed up payment. UiPath robots can ensure timely follow-up and accurate submissions and resubmissions. And they can automatically generate reports to analyze reason codes.</span></p><p></p></div></div></div></div></div><div class="sc-1ykc49b-0 dnMoXb ContentBlock--Grey" data-cy="ContentBlock" data-dcnode-id="858"><div class="sc-16h3fns-0 chwtln" data-dcnode-id="859"><div class="ContentBlock__Inner-Container" data-dcnode-id="860"><h2 class="sc-edeore-11 kCUFHD ContentBlock__Headline" data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">One-third* of all healthcare provider tasks are automatable—like these</span></h2><div class="ContentBlock__Fineprint-Container" data-dcnode-id="861"><p class="sc-edeore-8 sc-edeore-18 kOpsxz hKLajA ContentBlock__Fineprint" data-dcnode-id="862"></p><p class="sc-edeore-7 eHwIng" data-dcnode-id="863"><span data-dcnode-id="867" instrument_node="">*</span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/business-functions/operations/our-insights/making-healthcare-more-affordable-through-scalable-automation" rel="noopener" target="_blank"><span data-dcnode-id="866" instrument_node="">McKinsey</span></a><span data-dcnode-id="864" instrument_node=""></span></p><p></p></div></div></div></div><div class="sc-jz6g33-0 glORds" data-cy="VerticalTab" data-dcnode-id="575"><div class="sc-16h3fns-0 chwtln" data-dcnode-id="576"><div class="MuiGrid-root VerticalTabs__Grid-Container MuiGrid-container MuiGrid-spacing-xs-3" data-dcnode-id="577"><div class="MuiGrid-root VerticalTabs__Menu MuiGrid-item MuiGrid-grid-xs-12 MuiGrid-grid-sm-12 MuiGrid-grid-md-4" data-dcnode-id="785"><ul data-dcnode-id="786"><li class="VerticalTabs__Active--Desktop" data-dcnode-id="844"><p class="sc-edeore-3 fxxRtL VerticalTabs__Label" data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Scheduling</span></p><div class="VerticalTabs__Accordion-Item" data-dcnode-id="845"><p class="sc-edeore-7 eHwIng VerticalTabs__Item-Body" data-dcnode-id="846"></p><ul class="richText-styled-list" data-dcnode-id="849"><li class="richText-styled-list-items" data-dcnode-id="853"><p class=
