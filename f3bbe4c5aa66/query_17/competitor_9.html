</span><div class="span12 widget-span widget-type-blog_content" data-dcnode-id="678" data-w="12" data-widget-type="blog_content" data-x="0" style=""><span data-dcnode-id="802" instrument_node="">
</span><div class="blog-section inner-blog-section" data-dcnode-id="717"><span data-dcnode-id="801" instrument_node="">
</span><div class="blog-post-wrapper aeroPostWrapper" data-dcnode-id="719"><span data-dcnode-id="800" instrument_node="">
</span><div class="post-body" data-dcnode-id="720"><span data-dcnode-id="799" instrument_node="">
</span><div class="main-body" data-dcnode-id="722"><span data-dcnode-id="798" instrument_node="">
</span><div class="mf-blog-body" data-dcnode-id="773"><span data-dcnode-id="797" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_rich_text" data-dcnode-id="775" data-hs-cos-general-type="meta_field" data-hs-cos-type="rich_text" id="hs_cos_wrapper_post_body" style=""><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Emergence of AI in healthcare has instigated a fear among people about losing jobs, eventually slowing down the adoption of AI among healthcare workers. Most federal governments and policy makers have a misconception that with increasing adoption of AI, jobs would become redundant, thus adversely affecting the economic goal of job creation.</span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">On the contrary, it is being analyzed that with adoption of AI, the employment opportunities are going to increase, and new age skills would be in great demand. Many jobs like care giving and rehabilitation require human emotions and utmost care which AI cannot currently replicate. AI is integrated in healthcare organizations to assist with care provision, not replace it. Moreover, as AI continues to evolve in healthcare, there would be more jobs created for new skill sets.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">AI in healthcare would have advantages of increased efficiency and decreased costs of treatment, leading to higher volume of care delivered. This would result in higher profits and employment opportunities. Thus, it is a misconception that AI would replace healthcare workers; In reality, it can lead to an increase in demand of a qualified workforce and improve efficiency in services like diagnostics, patient engagement and precision medicine.</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">AI is now addressing identified gaps in healthcare services. With its growing population, the world is seeing a shortage of healthcare workers, and this gap continues to widen. As per the World Health Organisation (WHO), the world will be short of about 13 million healthcare workers by 2035. Moreover, training physicians and health workers has been challenging as the demand for qualified trainers remains largely unmet in various countries.</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Additionally, a report published by WHO found there is an estimated shortage of about 17.4 million healthcare workers and an availability of only 4.45 skilled health professionals per 1000 people globally. This results in increased demand for healthcare professionals.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">AI could potentially replace certain administrative jobs such as those associated with medical record maintenance and patient engagement, and at the same time, also increase the demand for specialized professionals.</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">At Mindfields, we have been driving innovation and excellence by leveraging disrupting technologies to optimize business processes that enable our clients to 'Grow for tomorrow'. To learn more about applications of Artificial Intelligence in Healthcare and the technology landscape, download Mindfields’ AI in Healthcare report.</span></p></span><span data-dcnode-id="774" instrument_node="">
</span></div><span data-dcnode-id="772" instrument_node="">
