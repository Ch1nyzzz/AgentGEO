ew figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s41745-020-00208-y/figures/2" rel="nofollow"><span data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1422" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1423" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1424" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1427" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1426" fill-rule="evenodd"></path><span data-dcnode-id="1425" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1412"><span data-dcnode-id="1417" instrument_node="">Through NeuroTouch™, a clinician can create a stimulus for patients such as touch (vibrations), temperature (hot &amp; cold) and pressure (planar pressure for vascular assessment). The responses are then quantified, digitized and stored safely in the cloud. An algorithm then analyses and interprets the data and provides a report to the clinician. The product reduces subjectivity in tests and quantifies the responses of diabetic patient’s predisposition to developing peripheral neuropathy and the clinician can then advise for further referrals, which reduces the chances of future complications</span><sup data-dcnode-id="1414"><a aria-label="Reference 41" data-dcnode-id="1415" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d153379457e1126" title="
https://www.neurotouch.co/

. Accessed 25 Aug 2020"><span data-dcnode-id="1416" instrument_node="">41</span></a></sup><span data-dcnode-id="1413" instrument_node="">.</span></p><p data-dcnode-id="1406"><span data-dcnode-id="1411" instrument_node="">The product has been validated in Manipal University and CMC Vellore India and&nbsp;is currently being used by more than 100 hospitals including leading hospitals in India such as NIMHANS, Bangalore, Military Hospital Hyderabad and the endocrinology department of Narayana Health, Bangalore. Since its deployment in 2019, Neuro Touch™ has already screened 11,000 patients and clinicians have been informed by the interpreted report</span><sup data-dcnode-id="1408"><a aria-label="Reference 41" data-dcnode-id="1409" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d153379457e1133" title="
https://www.neurotouch.co/

. Accessed 25 Aug 2020"><span data-dcnode-id="1410" instrument_node="">41</span></a></sup><span data-dcnode-id="1407" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="1382" data-title="Neurosynaptic’s ReMedi-Remote Monitoring in Rural Settings"><div class="c-article-section" data-dcnode-id="1383" id="Sec16-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1401" id="Sec16"><span data-dcnode-id="1402" instrument_node="">Neurosynaptic’s ReMedi-Remote Monitoring in Rural Settings</span></h2><div class="c-article-section__content" data-dcnode-id="1384" id="Sec16-content"><p data-dcnode-id="1395"><span data-dcnode-id="1400" instrument_node="">As mentioned earlier, India has a relatively poor doctors per unit population ratio. This alludes to the fact that the requirement for teleconsultation is high. Neurosynaptic’s is a telemedicine company in India and its ReMedi platform product has solutions to diagnose 20 different diagnostic parameters including ECG, blood pressure, auscultation, oxygen saturation, fetal doppler, blood and urine test. ReMedi, that&nbsp;uses Android based platforms, is powered by lithium polymer rechargeable battery and connects through 3G or Wi-fi</span><sup data-dcnode-id="1397"><a aria-label="Reference 42" data-dcnode-id="1398" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d153379457e1145" title="
https://neurosynaptic.com/

. Accessed 25 Aug 2020"><span data-dcnode-id="1399" instrument_node="">42</span></a></sup><span data-dcnode-id="1396" instrument_node="">.</span></p><p data-dcnode-id="1385"><span data-dcnode-id="1394" instrument_node="">Over the last 16&nbsp;years of being operational, ReMedi has operationalized 2500 telehealth centres in rural India and has active projects in 12 states as well as in eight countries in Africa and South East Asia through different implementation partners. This has resulted in providing consultation to 25,000 patients</span><sup data-dcnode-id="1391"><a aria-label="Reference 42" data-dcnode-id="1392" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d153379457e1152" title="
https://neurosynaptic.com/

. Accessed 25 Aug 2020"><span data-dcnode-id="1393" instrument_node="">42</span></a></sup><span data-dcnode-id="1390" instrument_node="">. During&nbsp;the COVID-19&nbsp;pandemic the need for telemedicine increased and Neurosynaptic received several times more queries about their telemedicine platforms that they have developed indicating the high demand brought by COVID-19. Neurosynaptic developed two more products that were IoT enabled and&nbsp;which provided screening, testing, tracking and reporting of COVID-19</span><sup data-dcnode-id="1387"><a aria-label="Reference 42" data-dcnode-id="1388" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d153379457e1156" title="
https://neurosynaptic.com/

. Accessed 25 Aug 2020"><span data-dcnode-id="1389" instrument_node="">42</span></a></sup><span data-dcnode-id="1386" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="1332" data-title="CareNX: IoT Enabled Solution for Screening for Maternal Care"><div class="c-article-section" data-dcnode-id="1333" id="Sec17-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1380" id="Sec17"><span data-dcnode-id="1381" instrument_node="">CareNX: IoT Enabled Solution for Screening for Maternal Care</span></h2><div class="c-article-section__content" data-dcnode-id="1334" id="Sec17-content"><p data-dcnode-id="1374"><span data-dcnode-id="1379" instrument_node="">CareNx is a medtech startup that is primarily focused on pregnancy care, antenatal care and high-risk pregnancy management. It has built a portfolio of solutions, that are IoT enabled, in pregnancy care such as Homecare, Fetosense (a non-stress test/cardiotocography machine) and AnandiMaa (portable antenatal pregnancy care kit for rural community)</span><sup data-dcnode-id="1376"><a aria-label="Reference 43" data-dcnode-id="1377" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d153379457e1168" title="
https://caremother.in/

. Accessed 25 Aug 2020"><span data-dcnode-id="1378" instrument_node="">43</span></a></sup><span data-dcnode-id="1375" instrument_node="">.</span></p><p data-dcnode-id="1365"><span data-dcnode-id="1373" instrument_node="">Fetosense consists of a portable kit with wireless probe which allows remote monitoring with a smart phone and results can also be stored in the cloud. Similarly, AnandiMaa consists of&nbsp;an antenatal care kit consisting of a Hb meter, a glucometer, a fetal Doppler amongst other devices and the data is smartly analysed by an algorithm and the results then inform a gynaecologist or a healthcare worker about high risk pregnancies and further referrals for the expectant mother for diagnosis and treatment. The portfolio of product helps identify and track high risk pregnancy in hospitals, home, and rural settings&nbsp;(Figs. </span><a data-dcnode-id="1371" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1372" instrument_node="">3 &amp; 4</span></a><span data-dcnode-id="1370" instrument_node="">)&nbsp;</span><sup data-dcnode-id="1367"><a aria-label="Reference 43" data-dcnode-id="1368" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d153379457e1178" title="
https://caremother.in/

. Accessed 25 Aug 2020"><span data-dcnode-id="1369" instrument_node="">43</span></a></sup><span data-dcnode-id="1366" instrument_node="">.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1341" data-test="figure" data-title="Figures 3 &amp; 4:" id="figure-3"><figure data-dcnode-id="1342"><figcaption data-dcnode-id="1362"><b class="c-article-section__figure-caption" data-dcnode-id="1363" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="1364" instrument_node="">Figures 3 &amp; 4:</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1353"><div class="c-article-section__figure-item" data-dcnode-id="1357"><a class="c-article-section__figure-link" data-dcnode-id="1358" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s41745-020-00208-y/figures/3" rel="nofollow"><picture data-dcnode-id="1359"><source data-dcnode-id="1361" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs41745-020-00208-y/MediaObjects/41745_2020_208_Fig3_HTML.jpg?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="1360" height="242" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s41745-020-00208-y/MediaObjects/41745_2020_208_Fig3_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1354" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">CareNx antenatal product being used for health check-up in rural India&nbsp;(from Shantanu Pathak).</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1343"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="1344" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s41745-020-00208-y/figures/3" rel="nofollow"><span data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1345" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1346" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1347" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1350" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1349" fill-rule="evenodd"></path><span data-dcnode-id="1348" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1335"><span data-dcnode-id="1340" instrument_node="">CareNx’s foot print has expanded to eleven states in India, clocking 100&nbsp;K home visits, and the products have screened 35,000 mothers in rural settings (covering 500 villages). The company has collaborated with more than ten NGOs and five hospitals in the last few years of operations</span><sup data-dcnode-id="1337"><a aria-label="Reference 43" data-dcnode-id="1338" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d153379457e1202" title="
https://caremother.in/

. Accessed 25 Aug 2020"><span data-dcnode-id="1339" instrument_node="">43</span></a></sup><span data-dcnode-id="1336" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="1173" data-title="A Closer Look at National Digital Health Mission (NDHM) and its Founding Document NDHB"><div class="c-article-section" data-dcnode-id="1174" id="Sec18-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1330" id="Sec18"><span data-dcnode-id="1331" instrument_node="">A Closer Look at National Digital Health Mission (NDHM) and its Founding Document NDHB</span></h2><div class="c-article-section__content" data-dcnode-id="1175" id="Sec18-content"><p data-dcnode-id="1321"><span data-dcnode-id="1329" instrument_node="">On 15th August 2020, the PM of India announced the launch of NDHM which is founded on the initial vision report by Niti Aayog called National Digital Health Blueprint. The blueprint articulates that it evolved from the Government’s (in this case MoH&amp;FW) policy vision to create a National Digital Health Ecosystem (NDHE) and the word is explicitly pointed out in the blueprint (“</span><i data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">an Ecosystem and NOT a system</span></i><span data-dcnode-id="1326" instrument_node="">”)</span><sup data-dcnode-id="1323"><a aria-label="Reference 35" data-dcnode-id="1324" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d153379457e1218" title="Niti Aayog (2019) National Digital Health Blueprint. 
https://www.nhp.gov.in/NHPfiles/National_Digital_Health_Blueprint_Report_comments_invited.pdf

. Accessed  25 Aug  2020"><span data-dcnode-id="1325" instrument_node="">35</span></a></sup><span data-dcnode-id="1322" instrument_node="">.</span></p><p data-dcnode-id="1308"><span data-dcnode-id="1320" instrument_node="">The blueprint further mentions that it is designed as a “</span><i data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">layered framework, with its Vision and a set of principles at the core, surrounded by the other layers relating to Digital Health Infrastructure, Digital Health Data Hubs, Building Blocks, Standards and Regulations, and an Institutional Framework for its implementation</span></i><span data-dcnode-id="1317" instrument_node="">” (</span><sup data-dcnode-id="1314"><a aria-label="Reference 31" data-dcnode-id="1315" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d153379457e1228" title="
https://inc42.com/datalab/telemedicine-market-opportunity-in-indian-healthtech/https://inc42.com/datalab/telemedicine-market-opportunity-in-indian-healthtech/

. Accessed 25 Aug 2020"><span data-dcnode-id="1316" instrument_node="">31</span></a></sup><span data-dcnode-id="1313" instrument_node="">). The NDHB principles mention universal health coverage (UHC), inclusiveness, security and privacy by design, education and empowerment of citizens, a set of Registries as single sources of truth, open standards, open APIs and a minimalistic approach and further highlights the issues regarding interoperability, data security, privacy and patient safety and data quality</span><sup data-dcnode-id="1310"><a aria-label="Reference 35" data-dcnode-id="1311" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d153379457e1232" title="Niti Aayog (2019) National Digital Health Blueprint. 
https://www.nhp.gov.in/NHPfiles/National_Digital_Health_Blueprint_Report_comments_invited.pdf

. Accessed  25 Aug  2020"><span data-dcnode-id="1312" instrument_node="">35</span></a></sup><span data-dcnode-id="1309" instrument_node="">. The blueprint is exhaustive and has provided high level guidance for implementation.</span></p><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">NDHM is woven with the patient being at the centre of this designed ecosystem and mentions a personal health identifier or a Health ID (akin to or with likely linkages to Aadhar number- another unique identifier number) which will contain all medical and health related data of the patient including prescriptions, diagnostics reports and other outpatients and in-patients visits to hospital. This data, with patient’s consent, will be shareable amongst healthcare providers. NDHM is, to begin with, voluntary, and will be trialed in a few states initially.</span></p><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Indeed, the scale of NDHM is massive and will usher&nbsp;in a universal health program in India. The concerns about privacy and data protection need to be clarified.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1302" id="Sec19"><span data-dcnode-id="1303" instrument_node="">Conclusion: Future Gazing The Iot In Healthcare In The Indian Scenario &amp; Its Linkages To Global Trends</span></h3><span data-dcnode-id="1301" instrument_node="">
</span><ol class="u-list-style-none" data-dcnode-id="1177"><span data-dcnode-id="1300" instrument_node="">
</span><li data-dcnode-id="1278"><span data-dcnode-id="1299" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">1.</span></span><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">COVID-19 as a pivot for India’s IoT in Healthcare. Leveraging the opportunity</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1292" instrument_node="">IoT in healthcare (or digital health) will play an increasingly important role in India’s healthcare landscape as the country builds and strengthens its digital infrastructure. While telemedicine and remote monitoring were gaining ground in India, the turbulence caused by COVID-19 provided a pivot for digital health to leapfrog. It has been reported that in-person outpatient’s traffic fell by 70–80% and hospitals quickly initiated plans to leverage telemedicine platforms. The awareness about digital health increased manifold during the time of pandemic. The latest data from eSanjeevani (The Ministry of Health’s tele-consultation platform) shows over 200&nbsp;K remote consultations since its launch in November 2019 thus indicating the immense potential for growth in digital healthcare</span><sup data-dcnode-id="1289"><a aria-label="Reference 44" data-dcnode-id="1290" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d153379457e1263" title="
https://health.economictimes.indiatimes.com/news/health-it/health-ministrys-esanjeevani-telemedicine-service-records-2-lakh-tele-consultations/77635053

. Accessed 25 Aug 2020"><span data-dcnode-id="1291" instrument_node="">44</span></a></sup><span data-dcnode-id="1288" instrument_node="">. Since its inception, the e-Sanjeevani platform has been implemented by 23 states across India and cover more than 75% of the Indian population</span><sup data-dcnode-id="1285"><a aria-label="Reference 44" data-dcnode-id="1286" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d153379457e1267" title="
https://health.economictimes.indiatimes.com/news/health-it/health-ministrys-esanjeevani-telemedicine-service-records-2-lakh-tele-consultations/77635053

. Accessed 25 Aug 2020"><span data-dcnode-id="1287" instrument_node="">44</span></a></sup><span data-dcnode-id="1284" instrument_node="">.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">When the pandemic dust settles and our daily lives are recalibrated, digital health will have climbed the ladder of strategic needs of hospitals, big and small across the country. This has the potential to improve healthcare delivery and reduce fraud and leakages in the system to rent seeking agencies. Additionally, it will fuel investments to make organisations including hospitals and healthcare providers to be “digitally ready”.</span></p><span data-dcnode-id="1279" instrument_node="">
</span></li><span data-dcnode-id="1277" instrument_node="">
</span><li data-dcnode-id="1263"><span data-dcnode-id="1276" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">2.</span></span><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Leveraging the Opportunity by technology startups, hospitals and other stakeholders- Improved regulation of IoT enabled Medtech products: the Make in India moment</span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">It is evident that the opportunity in front of India is extraordinarily massive and India should leverage this opportunity to be self-reliant or Atmanirbhar as the recent statements by the Government have alluded to. If the digital health implementation is done optimally, it will open massive opportunities for new technology startups to leverage the infrastructure of the national health stack and build solutions that can truly scale. The innovative ideas in digital health will bring new business models of healthcare delivery alleviating the challenges that India faces in this sector. As the case studies have highlighted, the hospitals, NGOs and other stakeholders are starting to collaborate with new technology startups and this collaboration is set to exponentially grow. It is also important to recognize that many of these “Make in India” products, with high quality and affordability, will have relevance in other geographies such as South East Asia and the African Continent. As Western healthcare is strained, many of the solutions will also have relevance in those markets.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">The regulation of medtech devices in India need to integrate the rapid changes occurring in the field especially w.r.t to software as a medical device including adaptive software and the role of artificial intelligence in generating data that informs clinical decisions.</span></p><span data-dcnode-id="1264" instrument_node="">
</span></li><span data-dcnode-id="1262" instrument_node="">
</span><li data-dcnode-id="1245"><span data-dcnode-id="1261" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">3.</span></span><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Patient’s safety and ownership of data at the centre of NDHM</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">NDHM rightly identifies&nbsp;the patient at the centre of the healthcare ecosystem. NDHB clearly outlines this as well as other areas of importance chiefly inclusiveness. While NDHM is voluntary to begin with, but experience with large mission based Aadhar tells us that it may soon become mandatory. Watertight safeguard measures should be taken and it is critical that the safety and security of patient’s data remains paramount. It is already mandated that Indian patient data be stored in local servers; it is crucial that this&nbsp;is implemented.</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">The blueprint mentions a centralized repository but clarity regarding data ownership should be explicitly stated especially whether it is the patient or the state who has the final ownership of data, the legal consequences of data breach, malware attacks and theft and finally the right of patients to erase healthcare data and the ‘right to be forgotten’.</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">In a country where large swathes still lack digital literacy and understanding of fundamental rights about data and its privacy, it becomes a challenge to raise awareness regarding data privacy. A sustained awareness campaign regarding issues related to data privacy and rights need to be created by the government in partnership with civil society groups.</span></p><span data-dcnode-id="1246" instrument_node="">
</span></li><span data-dcnode-id="1244" instrument_node="">
</span><li data-dcnode-id="1230"><span data-dcnode-id="1243" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">4.</span></span><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">The Digital Equivalence across regions will vary &amp; the need for public investments in IT &amp; health-IT infrastructure is high, role of PPP models is important</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">India faces a digital divide and access to digital infrastructure for its citizen remains highly heterogenous. Therefore, the digital equivalence between regions of the country will vary and this will have implications on adoption of IoT tools for healthcare leading to uneven delivery. Indeed, it is critical that starting from Sub-Centres and PHCs, the IT infrastructure of the healthcare system be strengthened.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">India’s mobile telephony has grown immensely over the last two decades and the data rates are extremely affordable in comparison to the&nbsp;rest of the world. The mobile telephony user base is set to expand even further and smart phone usage will increase. This bodes well for the growth of IoT or digital tools in healthcare. India also has to invest heavily in the latest of network technology.</span></p><span data-dcnode-id="1231" instrument_node="">
</span></li><span data-dcnode-id="1229" instrument_node="">
</span><li data-dcnode-id="1215"><span data-dcnode-id="1228" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">5.</span></span><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Behavioural change for adoption of IoT in Healthcare. Developing trust for the new interface between doctors and patients</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">As digital health and IoT tools take off, and a significant portion of consultation and healthcare delivery becomes remote, the behaviour patterns of interaction between healthcare worker or a practitioner with the patient will evolve. It is crucial that trust is built over this interaction and the sociological implication of this needs to be studied.</span></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">It is also crucial that the doctors and other healthcare workers are provided continuous training with regards to new technology and new interface that the technology brings. Similarly, patients and lay persons should be made aware to learn about the emerging new technologies and implications of it on their healthcare needs.</span></p><span data-dcnode-id="1216" instrument_node="">
</span></li><span data-dcnode-id="1214" instrument_node="">
</span><li data-dcnode-id="1203"><span data-dcnode-id="1213" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">6.</span></span><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Skilling the new knowledge workers in IoT in Healthcare and Digital Health</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">As the demand for IoT in healthcare increases, India will need new skilled human resources and the skill gaps in this arena have to be taken into account. Our pedagogies (in high school, undergraduate and post-graduate institutions) should include IoT in healthcare and the scientific, technological, societal and legal issues inherent in this emerging field.</span></p><span data-dcnode-id="1204" instrument_node="">
</span></li><span data-dcnode-id="1202" instrument_node="">
</span><li data-dcnode-id="1191"><span data-dcnode-id="1201" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">7.</span></span><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Boost in R&amp;D in IoT in Healthcare is required &amp; creation of a “Centre for Digital &amp; Network Society”</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">India needs to massively invest in R&amp;D of various areas of IoT, from hardware to software as well as in robotics, artificial intelligence and internet security, digital payment systems, data storage, data encryption technology and data transmission technology. These areas need significant funding both in basic and translational aspects of emerging technologies. It is pertinent to create linkages to industry and funding for startups in this area be boosted. It is suggested that a new “centre for digital &amp; network society” is established in our topmost scientific institutions such as the Indian Institute of Science with the mandate to study and roadmap new developments in digital technologies that will impact our societies in the future.</span></p><span data-dcnode-id="1192" instrument_node="">
</span></li><span data-dcnode-id="1190" instrument_node="">
</span><li data-dcnode-id="1179"><span data-dcnode-id="1189" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">8.</span></span><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">There is no turning back to the new digital future</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">As NDHM is implemented, it will show&nbsp;a tantalizing view of the future. The positive outcomes for India especially in the healthcare sector including raising the general health indicators is possible. India can become one of the leading digital societies in the world. The information and the knowledge generated will fuel new innovations in this arena and beyond. There is no turning back to a new future.</span></p><span data-dcnode-id="1180" instrument_node="">
</span></li><span data-dcnode-id="1178" instrument_node="">
</span></ol><span data-dcnode-id="1176" instrument_node="">
