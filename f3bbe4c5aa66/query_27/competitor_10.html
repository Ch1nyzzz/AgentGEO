</span><meta content="The digitization of data including health data (referred to as Internet of Things-IoT in Healthcare) and its usage in delivery of healthcare has been growing rapidly across the world. The COVID-19 pandemic has been a pivot for exponential growth of IoT in healthcare. Several rapidly evolving technologies are converging to influence the trajectory of IoT in healthcare. There are several challenges in technology development, healthcare delivery as well as issues related to privacy of data, digital divide, role of government and other stakeholders, behaviour and adoption by medical doctors and hospitals. The review article provides an overview of the emergence of IoT in healthcare globally, the intricacies of different factors impinging its current status and recommends policy intervention for an optimal roadmap of IoT in healthcare in the Indian context." data-dcnode-id="2639" name="dc.description"><span data-dcnode-id="2638" instrument_node="">

</span><meta content="The Impact of IoT in Healthcare: Global Technological Change &amp; The Roadmap to a Networked Architecture in India - Journal of the Indian Institute of Science" data-dcnode-id="2457" property="og:title"><span data-dcnode-id="2456" instrument_node="">
</span><meta content="Abstract The digitization of data including health data (referred to as Internet of Things-IoT in Healthcare) and its usage in delivery of healthcare has been growing rapidly across the world. The COVID-19 pandemic has been a pivot for exponential growth of IoT in healthcare. Several rapidly evolving technologies are converging to influence the trajectory of IoT in healthcare. There are several challenges in technology development, healthcare delivery as well as issues related to privacy of data, digital divide, role of government and other stakeholders, behaviour and adoption by medical doctors and hospitals. The review article provides an overview of the emergence of IoT in healthcare globally, the intricacies of different factors impinging its current status and recommends policy intervention for an optimal roadmap of IoT in healthcare in the Indian context." data-dcnode-id="2455" property="og:description"><span data-dcnode-id="2454" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="709" data-track-component="article body"><span data-dcnode-id="2028" instrument_node="">
</span><section data-dcnode-id="2021" data-gtm-vis-first-on-screen-50443292_562="663" data-gtm-vis-first-on-screen-50443292_563="664" data-gtm-vis-polling-id-50443292_562="119" data-gtm-vis-polling-id-50443292_563="126" data-gtm-vis-recent-on-screen-50443292_562="662" data-gtm-vis-recent-on-screen-50443292_563="664" data-gtm-vis-total-visible-time-50443292_562="9700" data-gtm-vis-total-visible-time-50443292_563="9600" lang="en"><div class="c-article-section" data-dcnode-id="2022" id="Abs1-section"><div class="c-article-section__content" data-dcnode-id="2023" id="Abs1-content"><h3 class="c-article__sub-heading" data-dcnode-id="2026" data-test="abstract-sub-heading"><span data-dcnode-id="2027" instrument_node="">Abstract</span></h3><p data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">The digitization of data including health data (referred to as Internet of Things-IoT in Healthcare) and its usage in delivery of healthcare has been growing rapidly across the world. The COVID-19 pandemic has been a pivot for exponential growth of IoT in healthcare. Several rapidly evolving technologies are converging to influence the trajectory of IoT in healthcare. There are several challenges in technology development, healthcare delivery as well as issues related to privacy of data, digital divide, role of government and other stakeholders, behaviour and adoption by medical doctors and hospitals. The review article provides an overview of the emergence of IoT in healthcare globally, the intricacies of different factors impinging its current status and recommends policy intervention for an optimal roadmap of IoT in healthcare in the Indian context.</span></p></div></div></section><span data-dcnode-id="2020" instrument_node="">
</span><section data-dcnode-id="1998" data-gtm-vis-first-on-screen-50443292_562="663" data-gtm-vis-first-on-screen-50443292_563="664" data-gtm-vis-polling-id-50443292_562="120" data-gtm-vis-polling-id-50443292_563="127" data-gtm-vis-recent-on-screen-50443292_562="663" data-gtm-vis-recent-on-screen-50443292_563="664" data-gtm-vis-total-visible-time-50443292_562="9600" data-gtm-vis-total-visible-time-50443292_563="9600" data-title="Introduction: The Advent of New Technologies, Internet Of Things (IoT) and Convergence"><div class="c-article-section" data-dcnode-id="1999" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2018" id="Sec1"><span data-dcnode-id="2019" instrument_node="">Introduction: The Advent of New Technologies, Internet Of Things (IoT) and Convergence</span></h2><div class="c-article-section__content" data-dcnode-id="2000" id="Sec1-content"><p data-dcnode-id="2010"><span data-dcnode-id="2017" instrument_node="">The last two decades have seen extraordinary speeds of technological revolution in the realms of science, including biosciences, and engineering. There has been tremendous progress in the development of molecular biological tools, optical and imaging tools such as tomography, additive and subtractive manufacturing, new fabrication technologies, robotics, sensor technologies, miniaturization of semiconductor chips and of energy storage, increase in computational power and parallel processing, storage of data on semiconductor chips and&nbsp;growth of telecommunication networks. There is also rapid convergence of many of these technologies into what is euphemistically called as the 4th Paradigm of Science</span><sup data-dcnode-id="2011"><a aria-label="Reference 1" data-dcnode-id="2015" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d153379457e395" title="Tony H, Stewart T, Kristin . Accessed 25 Aug 2020"><span data-dcnode-id="1852" instrument_node="">17</span></a></sup><span data-dcnode-id="1849" instrument_node="">. This spurt in usage of telemedicine has also been seen in other countries such as China and Italy to name a few</span><sup data-dcnode-id="1846"><a aria-label="Reference 16" data-dcnode-id="1847" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d153379457e561" title="Webster P (2020) Virtual Healthcare in era of Covid19. Lancet 395(10231):1180–1181"><span data-dcnode-id="1848" instrument_node="">16</span></a></sup><span data-dcnode-id="1845" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="1823" data-gtm-vis-first-on-screen-50443292_562="663" data-gtm-vis-first-on-screen-50443292_563="664" data-gtm-vis-polling-id-50443292_562="124" data-gtm-vis-polling-id-50443292_563="131" data-gtm-vis-recent-on-screen-50443292_562="663" data-gtm-vis-recent-on-screen-50443292_563="664" data-gtm-vis-total-visible-time-50443292_562="9600" data-gtm-vis-total-visible-time-50443292_563="9500" data-title="Consumer Healthcare and Wearables: Real time health data"><div class="c-article-section" data-dcnode-id="1824" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1839" id="Sec5"><span data-dcnode-id="1840" instrument_node="">Consumer Healthcare and Wearables: Real time health data</span></h2><div class="c-article-section__content" data-dcnode-id="1825" id="Sec5-content"><p data-dcnode-id="1826"><span data-dcnode-id="1838" instrument_node="">The consumer healthcare or the wearable segment of IoT started gaining pace as consumer wellbeing devices were developed such as Fitbit™ and Apple Inc.’s smartwatches. These wireless enabled devices could count steps, estimate calories consumed, monitor heartbeat and other cardiac physiology, monitor sleep and provide feedback that is continuous and on-demand. These physiological data could also be transmitted to the cloud and eventually to the care giver for consultation and clinical decisions</span><sup data-dcnode-id="1832"><a aria-label="Reference 8" data-dcnode-id="1836" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d153379457e573" title="Deloitte, Medtech and Internet of Medical Things (2018) 
https://www2.deloitte.com/content/dam/Deloitte/global/Documents/Life-Sciences-Health-Care/gx-lshc-medtech-iomt-brochure.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1837" instrument_node="">8</span></a><span data-dcnode-id="1835" instrument_node="">, </span><a aria-label="Reference 12" data-dcnode-id="1833" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d153379457e576" title="Bengal Chamber of Commerce (2018) Reimagining the possible in the Indian healthcare ecosystem with emerging technologies, 2018. 
https://www.pwc.in/assets/pdfs/publications/2018/reimagining-the-possible-in-the-indian-healthcare-ecosystem-with-emerging-technologies.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1834" instrument_node="">12</span></a></sup><span data-dcnode-id="1831" instrument_node="">. Many of these features were incorporated into mobile phones as the processing capabilities of mobile phones increased in geometric progression over the last decade. With time, more sophisticated remote monitoring devices were developed such as AliveCor™ that can measure ECG data and received US Food and Drug Administration (FDA) approval, later Apple Inc. also developed and integrated a similar wearable ECG in its Apple watch-4</span><sup data-dcnode-id="1828"><a aria-label="Reference 18" data-dcnode-id="1829" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d153379457e580" title="Hendrickson Z (2019) AliveCor drops Kardiaband apple watch accessory—but it isn't losing much. 
https://www.businessinsider.com/alivecor-cut-ties-with-apple-2019-8?r=DE&amp;IR=T

. Accessed 25 Aug 2020"><span data-dcnode-id="1830" instrument_node="">18</span></a></sup><span data-dcnode-id="1827" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="1787" data-gtm-vis-first-on-screen-50443292_562="663" data-gtm-vis-first-on-screen-50443292_563="664" data-gtm-vis-polling-id-50443292_562="125" data-gtm-vis-polling-id-50443292_563="132" data-gtm-vis-recent-on-screen-50443292_562="663" data-gtm-vis-recent-on-screen-50443292_563="664" data-gtm-vis-total-visible-time-50443292_562="9600" data-gtm-vis-total-visible-time-50443292_563="9500" data-title="The Digitization of Critical Care and Digital Pathology"><div class="c-article-section" data-dcnode-id="1788" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1821" id="Sec6"><span data-dcnode-id="1822" instrument_node="">The Digitization of Critical Care and Digital Pathology</span></h2><div class="c-article-section__content" data-dcnode-id="1789" id="Sec6-content"><p data-dcnode-id="1811"><span data-dcnode-id="1820" instrument_node="">Rapid digitization is taking place in the hospital environment. Many major firms are developing platforms such that multitudes of devices in a hospital can be connected. For example, Philips’ Healthsuite, which is an open platform, allows medical devices to share data to a platform which can then process and do analysis of the data that can then be retrieved by healthcare workers including clinicians and nurses (in their mobiles or desktops) amongst others and play a role in informing clinicians’ decisions</span><sup data-dcnode-id="1817"><a aria-label="Reference 8" data-dcnode-id="1818" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d153379457e593" title="Deloitte, Medtech and Internet of Medical Things (2018) 
https://www2.deloitte.com/content/dam/Deloitte/global/Documents/Life-Sciences-Health-Care/gx-lshc-medtech-iomt-brochure.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1819" instrument_node="">8</span></a></sup><span data-dcnode-id="1816" instrument_node="">. Philips has also developed&nbsp;an eICU program that combines audio-visual technology along with predictive analytics and data visualization to lay down a centrally monitored intensive care in hospitals (from 50 to 500 ICU beds) through connected devices that provide real time data that helps intensivists and their team provide rapid integrated care across a hospital system</span><sup data-dcnode-id="1813"><a aria-label="Reference 19" data-dcnode-id="1814" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d153379457e597" title="Philips ICU Telemedicine Program (2019) 
https://www.usa.philips.com/healthcare/resources/landing/teleicu

. Accessed 25 Aug 2020"><span data-dcnode-id="1815" instrument_node="">19</span></a></sup><span data-dcnode-id="1812" instrument_node="">.</span></p><p data-dcnode-id="1790"><span data-dcnode-id="1810" instrument_node="">Another area of IoT is networked data generated and captured from medical devices in critical care settings, diagnosis and monitoring of patients in hospitals such as from CT and MRI scanners, X-ray and mammography devices with integrated HER and imaging outputs that can aid in faster clinical decisions</span><sup data-dcnode-id="1807"><a aria-label="Reference 8" data-dcnode-id="1808" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d153379457e604" title="Deloitte, Medtech and Internet of Medical Things (2018) 
https://www2.deloitte.com/content/dam/Deloitte/global/Documents/Life-Sciences-Health-Care/gx-lshc-medtech-iomt-brochure.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1809" instrument_node="">8</span></a></sup><span data-dcnode-id="1806" instrument_node="">. Digital pathology is the term used to describe actionable information generated using artificial intelligence algorithms on images of diseased tissues including wounds, tumours and other disease conditions</span><sup data-dcnode-id="1800"><a aria-label="Reference 8" data-dcnode-id="1804" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d153379457e608" title="Deloitte, Medtech and Internet of Medical Things (2018) 
https://www2.deloitte.com/content/dam/Deloitte/global/Documents/Life-Sciences-Health-Care/gx-lshc-medtech-iomt-brochure.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1805" instrument_node="">8</span></a><span data-dcnode-id="1803" instrument_node="">, </span><a aria-label="Reference 11" data-dcnode-id="1801" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d153379457e611" title="Niazi MKK, Parwani AV, MN G (2019) Digital pathology and artificial intelligence. Lancet Oncol 20(5):E253–261"><span data-dcnode-id="1802" instrument_node="">11</span></a></sup><span data-dcnode-id="1799" instrument_node="">. Several leading medtech companies such as Philips have brought digital pathology products to the market for example Philips’ Intellisite™ is the first whole slide imaging product that received US FDA approval</span><sup data-dcnode-id="1796"><a aria-label="Reference 20" data-dcnode-id="1797" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d153379457e615" title="Pantanowitz L, Sharma A, Carter AB, Kurc T, Sussman A, Saltz J (2018) Twenty years of digital pathology: an overview of the road travelled, what is on the horizon, and the emergence of vendor-neutral archives. J Pathol Inform 9:40. 
https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6289005/

. Accessed 25 Aug 2020"><span data-dcnode-id="1798" instrument_node="">20</span></a></sup><span data-dcnode-id="1795" instrument_node="">. In another example that illustrates how medtech firms are combining capabilities, GE and Roche diagnostics have partnered to provide clinical insights to oncologists through development of dashboards that combine GE’s healthcare imaging and Roche’s capabilities in biomarker, tissue pathology and genomics data and to help clinicians make treatment decisions</span><sup data-dcnode-id="1792"><a aria-label="Reference 8" data-dcnode-id="1793" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d153379457e619" title="Deloitte, Medtech and Internet of Medical Things (2018) 
https://www2.deloitte.com/content/dam/Deloitte/global/Documents/Life-Sciences-Health-Care/gx-lshc-medtech-iomt-brochure.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1794" instrument_node="">8</span></a></sup><span data-dcnode-id="1791" instrument_node="">. Similarly, other global firms such as Siemens have digital pathology products and new medtech companies such as Proscia are building digital pathology technology for oncology.</span></p></div></div></section><section data-dcnode-id="1770" data-title="Making Hospitals Smart-Management of Hospital Assets and Workflows"><div class="c-article-section" data-dcnode-id="1771" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1785" id="Sec7"><span data-dcnode-id="1786" instrument_node="">Making Hospitals Smart-Management of Hospital Assets and Workflows</span></h2><div class="c-article-section__content" data-dcnode-id="1772" id="Sec7-content"><p data-dcnode-id="1779"><span data-dcnode-id="1784" instrument_node="">Hospitals can be viewed as asset and information intensive organisations. Another use case example of IoT enabled devices and hospital assets such as beds is tracking the utilisation of hospital assets in real time as well as hospital inventory management increasing the efficiency of operations</span><sup data-dcnode-id="1781"><a aria-label="Reference 8" data-dcnode-id="1782" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d153379457e631" title="Deloitte, Medtech and Internet of Medical Things (2018) 
https://www2.deloitte.com/content/dam/Deloitte/global/Documents/Life-Sciences-Health-Care/gx-lshc-medtech-iomt-brochure.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1783" instrument_node="">8</span></a></sup><span data-dcnode-id="1780" instrument_node="">.</span></p><p data-dcnode-id="1773"><span data-dcnode-id="1778" instrument_node="">Other emerging areas where IoT is starting to create impact is prosthetics, implanted medical devices such as hip joints, defibrillators, nerve stimulators, robotic surgeries to name a few</span><sup data-dcnode-id="1775"><a aria-label="Reference 8" data-dcnode-id="1776" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d153379457e638" title="Deloitte, Medtech and Internet of Medical Things (2018) 
https://www2.deloitte.com/content/dam/Deloitte/global/Documents/Life-Sciences-Health-Care/gx-lshc-medtech-iomt-brochure.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1777" instrument_node="">8</span></a></sup><span data-dcnode-id="1774" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="1763" data-title="Global Challenges and Issues of IoT in Healthcare"><div class="c-article-section" data-dcnode-id="1764" id="Sec8-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1768" id="Sec8"><span data-dcnode-id="1769" instrument_node="">Global Challenges and Issues of IoT in Healthcare</span></h2><div class="c-article-section__content" data-dcnode-id="1765" id="Sec8-content"><p data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">As IoT becomes an indivisible part of healthcare several challenges that cut across geographical lines are emerging. Chiefly they relate to the issues of interoperability, cybersecurity, data privacy and regulation&nbsp;as outlined in sections 9–11.</span></p></div></div></section><section data-dcnode-id="1720" data-title="Interoperability"><div class="c-article-section" data-dcnode-id="1721" id="Sec9-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1761" id="Sec9"><span data-dcnode-id="1762" instrument_node="">Interoperability</span></h2><div class="c-article-section__content" data-dcnode-id="1722" id="Sec9-content"><p data-dcnode-id="1751"><span data-dcnode-id="1760" instrument_node="">Interoperability is one of the biggest challenges faced by the medtech industry as new products are being developed on heterogenous platforms, especially the standards for data collection, storage and transmission used by health systems, including hospital information systems (HIS). Interoperability can be broadly defined as “the ability of two or more systems to exchange information and use the information that has been exchanged”</span><sup data-dcnode-id="1757"><a aria-label="Reference 21" data-dcnode-id="1758" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d153379457e658" title="Lehne M, Sass J, Essenwanger A et al (2019) Why digital medicine depends on interoperability. Dig Med 2:79–83"><span data-dcnode-id="1759" instrument_node="">21</span></a></sup><span data-dcnode-id="1756" instrument_node="">. Interoperability can be further classified into the following</span><sup data-dcnode-id="1753"><a aria-label="Reference 21" data-dcnode-id="1754" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d153379457e662" title="Lehne M, Sass J, Essenwanger A et al (2019) Why digital medicine depends on interoperability. Dig Med 2:79–83"><span data-dcnode-id="1755" instrument_node="">21</span></a></sup><span data-dcnode-id="1752" instrument_node="">.</span></p><ul class="u-list-style-dash" data-dcnode-id="1723"><span data-dcnode-id="1750" instrument_node="">
</span><li data-dcnode-id="1745"><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">technical interoperability that includes data exchange between two systems for e.g. USB to the laptop,</span></p><span data-dcnode-id="1746" instrument_node="">
</span></li><span data-dcnode-id="1744" instrument_node="">
</span><li data-dcnode-id="1739"><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">syntactic interoperability that specifies format and structure of the data which is specified by standard setting organizations such as Health Level 7 International (HL7) and Fast Healthcare Interoperability Resources (FHIR),</span></p><span data-dcnode-id="1740" instrument_node="">
</span></li><span data-dcnode-id="1738" instrument_node="">
</span><li data-dcnode-id="1725"><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1736" instrument_node="">semantic interoperability that covers the diversity of usage of medical terminologies, ontologies and nomenclatures. There are standard domain specific nomenclatures laboratory observations (Logical Observations Identifiers Names and Codes, LOINC), medicines (Identification of Medicinal Products, IMDP), genes (HUGO Gene Nomenclature Committee, HGNP) and phenotypic abnormalities (Human Phenotype Ontology, HPO) </span><sup data-dcnode-id="1733"><a aria-label="Reference 21" data-dcnode-id="1734" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d153379457e684" title="Lehne M, Sass J, Essenwanger A et al (2019) Why digital medicine depends on interoperability. Dig Med 2:79–83"><span data-dcnode-id="1735" instrument_node="">21</span></a></sup><span data-dcnode-id="1732" instrument_node="">. Navigating interoperability issues will be one of the key issues as IoT in healthcare presence deepens across the world</span><sup data-dcnode-id="1729"><a aria-label="Reference 21" data-dcnode-id="1730" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d153379457e688" title="Lehne M, Sass J, Essenwanger A et al (2019) Why digital medicine depends on interoperability. Dig Med 2:79–83"><span data-dcnode-id="1731" instrument_node="">21</span></a></sup><span data-dcnode-id="1728" instrument_node="">.</span></p><span data-dcnode-id="1726" instrument_node="">
</span></li><span data-dcnode-id="1724" instrument_node="">
</span></ul></div></div></section><section data-dcnode-id="1667" data-title="Cybersecurity, Data Privacy and Ownership"><div class="c-article-section" data-dcnode-id="1668" id="Sec10-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1718" id="Sec10"><span data-dcnode-id="1719" instrument_node="">Cybersecurity, Data Privacy and Ownership</span></h2><div class="c-article-section__content" data-dcnode-id="1669" id="Sec10-content"><p data-dcnode-id="1709"><span data-dcnode-id="1717" instrument_node="">Voluminous amount of data especially personalized data is being generated by networked medical devices. This data then is stored in systems and exchanged amongst different stakeholders including healthcare providers (both public and private providers) such as hospitals, payers and insurance companies and researchers</span><sup data-dcnode-id="1711"><a aria-label="Reference 8" data-dcnode-id="1715" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d153379457e702" title="Deloitte, Medtech and Internet of Medical Things (2018) 
https://www2.deloitte.com/content/dam/Deloitte/global/Documents/Life-Sciences-Health-Care/gx-lshc-medtech-iomt-brochure.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1716" instrument_node="">8</span></a><span data-dcnode-id="1714" instrument_node="">, </span><a aria-label="Reference 10" data-dcnode-id="1712" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d153379457e705" title="Canadian Medical Association (2019) The future of technology in health and health care a primer. 
https://www.cma.ca/sites/default/files/pdf/health-advocacy/activity/2018-08-15-future-technology-health-care-e.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1713" instrument_node="">10</span></a></sup><span data-dcnode-id="1710" instrument_node="">.</span></p><p data-dcnode-id="1700"><span data-dcnode-id="1708" instrument_node="">There are concerns about data privacy and security especially since patient identifiable data about health and wellbeing is collected by the IoT enabled devices. One of the underlying policy debates is the ownership of the patient’s data and its ethical use as well as the patient’s (or individual’s) right to erase personal information from a database</span><sup data-dcnode-id="1702"><a aria-label="Reference 22" data-dcnode-id="1706" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d153379457e712" title="
https://www.hhs.gov/hipaa/for-professionals/security/laws-regulations/index.html

. Accessed 25 Aug 2020"><span data-dcnode-id="1707" instrument_node="">22</span></a><span data-dcnode-id="1705" instrument_node="">, </span><a aria-label="Reference 23" data-dcnode-id="1703" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d153379457e715" title="Ghafur S, Grass E, Jennings NR, Drazi A (2019) The challenges of cybersecurity in healthcare: the UK National Health Service as a case study. Lancet 1:e10–e12"><span data-dcnode-id="1704" instrument_node="">23</span></a></sup><span data-dcnode-id="1701" instrument_node="">.</span></p><p data-dcnode-id="1686"><span data-dcnode-id="1699" instrument_node="">The U.S. Department of Health and Human Services (HHS) brought one of the earliest regulations on data management and privacy in 1996 called the The Health Insurance Portability and Accountability Act of 1996 (HIPAA) with privacy and security rules</span><sup data-dcnode-id="1696"><a aria-label="Reference 22" data-dcnode-id="1697" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d153379457e722" title="
https://www.hhs.gov/hipaa/for-professionals/security/laws-regulations/index.html

. Accessed 25 Aug 2020"><span data-dcnode-id="1698" instrument_node="">22</span></a></sup><span data-dcnode-id="1695" instrument_node="">. The HIPAA security rules cover the healthcare providers, insurance companies and clearing houses and aims to protect the privacy of individuals’ health information (called protected health information, PHI) while being flexible to allow for new technologies to improve the quality of health care and delivery</span><sup data-dcnode-id="1692"><a aria-label="Reference 22" data-dcnode-id="1693" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d153379457e726" title="
https://www.hhs.gov/hipaa/for-professionals/security/laws-regulations/index.html

. Accessed 25 Aug 2020"><span data-dcnode-id="1694" instrument_node="">22</span></a></sup><span data-dcnode-id="1691" instrument_node="">. Additionally, the rules provide procedures for covered entities to assure confidentiality, integrity and availability of PHI</span><sup data-dcnode-id="1688"><a aria-label="Reference 22" data-dcnode-id="1689" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d153379457e730" title="
https://www.hhs.gov/hipaa/for-professionals/security/laws-regulations/index.html

. Accessed 25 Aug 2020"><span data-dcnode-id="1690" instrument_node="">22</span></a></sup><span data-dcnode-id="1687" instrument_node="">.</span></p><p data-dcnode-id="1676"><span data-dcnode-id="1685" instrument_node="">Cyberattacks and ransomware are continual risks that health systems face globally. One can imagine how critical care within hospitals especially ICU care, surgeries and many other procedures could get negatively impacted by cyberattacks. In 2017, the WannaCry ransomware attack severely disabled the National Health Service (NHS) in England in which NHS staff were unable to access patient information and data thereby impacting critical services</span><sup data-dcnode-id="1682"><a aria-label="Reference 23" data-dcnode-id="1683" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d153379457e737" title="Ghafur S, Grass E, Jennings NR, Drazi A (2019) The challenges of cybersecurity in healthcare: the UK National Health Service as a case study. Lancet 1:e10–e12"><span data-dcnode-id="1684" instrument_node="">23</span></a></sup><span data-dcnode-id="1681" instrument_node="">. Similarly, in the USA cybertheft of 80 million health insurance records occurred in 2015</span><sup data-dcnode-id="1678"><a aria-label="Reference 23" data-dcnode-id="1679" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d153379457e741" title="Ghafur S, Grass E, Jennings NR, Drazi A (2019) The challenges of cybersecurity in healthcare: the UK National Health Service as a case study. Lancet 1:e10–e12"><span data-dcnode-id="1680" instrument_node="">23</span></a></sup><span data-dcnode-id="1677" instrument_node="">.</span></p><p data-dcnode-id="1670"><span data-dcnode-id="1675" instrument_node="">These security concerns have led to US’s National Institute of Standards and Technology instituting a cybersecurity framework in 2018 that has taken on-board stakeholders from the US government and private players to collaborate to safeguard and improve healthcare cyber assets across the country</span><sup data-dcnode-id="1672"><a aria-label="Reference 23" data-dcnode-id="1673" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d153379457e749" title="Ghafur S, Grass E, Jennings NR, Drazi A (2019) The challenges of cybersecurity in healthcare: the UK National Health Service as a case study. Lancet 1:e10–e12"><span data-dcnode-id="1674" instrument_node="">23</span></a></sup><span data-dcnode-id="1671" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="1626" data-title="Medtech Software and Digital Health Regulation: Software as a Medical Device"><div class="c-article-section" data-dcnode-id="1627" id="Sec11-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1665" id="Sec11"><span data-dcnode-id="1666" instrument_node="">Medtech Software and Digital Health Regulation: Software as a Medical Device</span></h2><div class="c-article-section__content" data-dcnode-id="1628" id="Sec11-content"><p data-dcnode-id="1656"><span data-dcnode-id="1664" instrument_node="">While the issues of standards regarding data and cyber security have been mentioned earlier in the article, one of the areas that is rapidly evolving is Medtech device regulation especially&nbsp;in the software domain. As networked devices take centre stage in the digital healthcare space, software and its quality, efficacy and robustness become important since digital healthcare like many other fields are being strengthened to take decisions and these will invariably impact patient’s health. The US FDA especially the Center for Devices and Radiological Health (CDRH) has provided the stewardship in regulating medtech products for many decades throughout the product development journey including product registrations (510&nbsp;K) and post marketing surveillance</span><sup data-dcnode-id="1658"><a aria-label="Reference 24" data-dcnode-id="1662" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d153379457e761" title="USFDA (2020) 
https://www.fda.gov/medical-devices/device-advice-comprehensive-regulatory-assistance

. Accessed 25 Aug 2020"><span data-dcnode-id="1663" instrument_node="">24</span></a><span data-dcnode-id="1661" instrument_node="">, </span><a aria-label="Reference 25" data-dcnode-id="1659" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d153379457e764" title="Longitude Prize Sprint Webinar (2020) 
https://longitudeprize.org/events/sprint-workshop-1-navigating-medtech-regulation-pathways-developed-and-emerging-markets

. Accessed 25 Aug 2020"><span data-dcnode-id="1660" instrument_node="">25</span></a></sup><span data-dcnode-id="1657" instrument_node="">.</span></p><p data-dcnode-id="1635"><span data-dcnode-id="1655" instrument_node="">FDA has issued a Digital Health Action Plan outlining its efforts in&nbsp;the digital health sphere</span><sup data-dcnode-id="1652"><a aria-label="Reference 24" data-dcnode-id="1653" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d153379457e771" title="USFDA (2020) 
https://www.fda.gov/medical-devices/device-advice-comprehensive-regulatory-assistance

. Accessed 25 Aug 2020"><span data-dcnode-id="1654" instrument_node="">24</span></a></sup><span data-dcnode-id="1651" instrument_node="">. Additionally, it is developing a Digital Health Software Precertification Pilot Program that will facilitate the development&nbsp;of </span><i data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">"a more streamlined and efficient regulatory oversight of software based medical devices</span></i><span data-dcnode-id="1648" instrument_node="">”</span><sup data-dcnode-id="1645"><a aria-label="Reference 24" data-dcnode-id="1646" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d153379457e778" title="USFDA (2020) 
https://www.fda.gov/medical-devices/device-advice-comprehensive-regulatory-assistance

. Accessed 25 Aug 2020"><span data-dcnode-id="1647" instrument_node="">24</span></a></sup><span data-dcnode-id="1644" instrument_node="">. US FDA has started classifying “Software as a Medical Device” (SAMD) and cites the definition used by International Medical Device Regulators Forum (IMDRF) that states “software intended to be used for one or more medical purposes that perform these purposes without being part of a hardware medical device” </span><sup data-dcnode-id="1641"><a aria-label="Reference 24" data-dcnode-id="1642" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d153379457e782" title="USFDA (2020) 
https://www.fda.gov/medical-devices/device-advice-comprehensive-regulatory-assistance

. Accessed 25 Aug 2020"><span data-dcnode-id="1643" instrument_node="">24</span></a></sup><span data-dcnode-id="1640" instrument_node="">. It has also partnered with IMDRF to form a working group on SAMD and has developed quality management systems and a framework of clinical evaluation for SAMD</span><sup data-dcnode-id="1637"><a aria-label="Reference 26" data-dcnode-id="1638" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d153379457e786" title="
https://www.fda.gov/medical-devices/digital-health/software-medical-device-samd

. Accessed 25 Aug 2020"><span data-dcnode-id="1639" instrument_node="">26</span></a></sup><span data-dcnode-id="1636" instrument_node="">.</span></p><p data-dcnode-id="1629"><span data-dcnode-id="1634" instrument_node="">As one can imagine, software development is a rapidly evolving field and regulators have to constantly keep pace with changes. For example, artificial intelligence (AI) and machine learning (ML) have impacted software development especially in the realm of “adaptive software” which learn from data being generated by the device as well as make clinical decisions such as in digital pathology including detection of cancer and cardiovascular disease. FDA has issued a discussion paper on impact of AI &amp; ML on software real life modifications and its premarket review</span><sup data-dcnode-id="1631"><a aria-label="Reference 27" data-dcnode-id="1632" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d153379457e793" title="
https://www.fda.gov/medical-devices/software-medical-device-samd/artificial-intelligence-and-machine-learning-software-medical-device

. Accessed 25 Aug 2020"><span data-dcnode-id="1633" instrument_node="">27</span></a></sup><span data-dcnode-id="1630" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="1591" data-title="The Indian Healthcare Scenario"><div class="c-article-section" data-dcnode-id="1592" id="Sec12-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1624" id="Sec12"><span data-dcnode-id="1625" instrument_node="">The Indian Healthcare Scenario</span></h2><div class="c-article-section__content" data-dcnode-id="1593" id="Sec12-content"><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">The advent and integration of Western medicine in India took place during the nineteenth and twentieth century and the architecture of the public health system was inherited from the British era with a tiered approach of tertiary, secondary and primary healthcare system. Over the last seven decades since independence,&nbsp;the healthcare ecosystem in India has grown to be one of the largest sectors in the country.</span></p><p data-dcnode-id="1616"><span data-dcnode-id="1621" instrument_node="">The market size of Indian healthcare is expected to grow to US$372 billion in 2022 from US$280 billion in 2020 with more than 74% in the private health system and out of pocket (OOP) payments</span><sup data-dcnode-id="1618"><a aria-label="Reference 28" data-dcnode-id="1619" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d153379457e809" title="
https://www.ibef.org/industry/healthcare-india.aspx

. Accessed 25 Aug 2020"><span data-dcnode-id="1620" instrument_node="">28</span></a></sup><span data-dcnode-id="1617" instrument_node="">.</span></p><p data-dcnode-id="1607"><span data-dcnode-id="1615" instrument_node="">The public healthcare system is a tiered structure with Sub Centres, Primary Healthcare Centres (PHCs) and Community Health Centres (CHCs). Many PHCs and Sub Centres in rural India are resource starved leading to increasing pressure on CHCs and tertiary health centres such as All India Institute of Medical Sciences (AIIMS). One also has to be mindful that many areas of India are remote and access still remains a challenge especially in mountainous areas as well as rural areas in the hinterland. While there has been growth in the healthcare infrastructure, which is indeed growing, however, India has historically invested anywhere between 1 and 1.5% of its GDP on healthcare with current estimates of around 1.6% (1). There are growing disparities in healthcare delivery between rural and urban India. Health data indicates that there is one doctor available for every 1445 Indians, while the WHO recommendation is for one doctor per every thousand population. Almost 2/3rd of the total number of doctors are located in the urban areas while the rural population in India is 66% of the total population of India</span><sup data-dcnode-id="1609"><a aria-label="Reference 12" data-dcnode-id="1613" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d153379457e816" title="Bengal Chamber of Commerce (2018) Reimagining the possible in the Indian healthcare ecosystem with emerging technologies, 2018. 
https://www.pwc.in/assets/pdfs/publications/2018/reimagining-the-possible-in-the-indian-healthcare-ecosystem-with-emerging-technologies.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1614" instrument_node="">12</span></a><span data-dcnode-id="1612" instrument_node="">, </span><a aria-label="Reference 29" data-dcnode-id="1610" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d153379457e819" title="
https://www.business-standard.com/article/pti-stories/doctor-patient-ratio-in-india-less-than-who-prescribed-norm-of-1-1000-govt-119111901421_1.html

. Accessed 25 Aug 2020"><span data-dcnode-id="1611" instrument_node="">29</span></a></sup><span data-dcnode-id="1608" instrument_node="">.</span></p><p data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">The disease burden in India reflects the health burdens of the developing world (with high incidences of infectious diseases such as TB and malaria) as well as the developed world (with growing incidences of chronic diseases such as diabetes, cancer and cardio-vascular diseases). Indicators for maternal and child health, malnutrition, stunting, low birth weight babies have improved but still are a concern.</span></p><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">In the last few years, the Government of India has brought a slew of measures to alleviate the healthcare situation in India. Government has provided its green signal in continuation of the National Health Mission (NHM) and a budget of US$4.8 billion has been allocated to NHM in the 2020–21 budget. Other measures such as the Ayushman Bharat-Pradhan Mantri Jan Arogya Yojana which aims to cover 100 million households (500 million Indians) with insurance through subsidized paperless health payments for procedures that are also linked to a Unique Identification number such as Aadhaar.</span></p><p data-dcnode-id="1594"><span data-dcnode-id="1602" instrument_node="">Health policy makers understand that there is a need for infusion of technology in the healthcare sector to make it more productive, widen the net to increase access and augment the last mile delivery</span><sup data-dcnode-id="1596"><a aria-label="Reference 12" data-dcnode-id="1600" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d153379457e833" title="Bengal Chamber of Commerce (2018) Reimagining the possible in the Indian healthcare ecosystem with emerging technologies, 2018. 
https://www.pwc.in/assets/pdfs/publications/2018/reimagining-the-possible-in-the-indian-healthcare-ecosystem-with-emerging-technologies.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1601" instrument_node="">12</span></a><span data-dcnode-id="1599" instrument_node="">, </span><a aria-label="Reference 29" data-dcnode-id="1597" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d153379457e836" title="
https://www.business-standard.com/article/pti-stories/doctor-patient-ratio-in-india-less-than-who-prescribed-norm-of-1-1000-govt-119111901421_1.html

. Accessed 25 Aug 2020"><span data-dcnode-id="1598" instrument_node="">29</span></a></sup><span data-dcnode-id="1595" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="1533" data-title="The Indian Landscape of IoT in Healthcare: Building IT Strengths and Regulatory Oversight"><div class="c-article-section" data-dcnode-id="1534" id="Sec13-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1589" id="Sec13"><span data-dcnode-id="1590" instrument_node="">The Indian Landscape of IoT in Healthcare: Building IT Strengths and Regulatory Oversight</span></h2><div class="c-article-section__content" data-dcnode-id="1535" id="Sec13-content"><p data-dcnode-id="1583"><span data-dcnode-id="1588" instrument_node="">IoT has made rapid strides in India. Telemedicine especially remote monitoring started making its mark in&nbsp;the early 2000s through initiatives by&nbsp;the Indian Space Research Organisation (ISRO) and healthcare providers such as Narayana Hrudalaya that is part of Narayana Health (NH), which runs several hospitals across India. In 2003, NH &amp; ISRO had partnered to provide tele-consultations in cardiac care which had provided consultations to more than 50K&nbsp;patients</span><sup data-dcnode-id="1585"><a aria-label="Reference 30" data-dcnode-id="1586" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d153379457e848" title="
https://pharmabiz.com/NewsDetails.aspx?aid=70033&amp;sid=1

. Accessed 25 Aug 2020"><span data-dcnode-id="1587" instrument_node="">30</span></a></sup><span data-dcnode-id="1584" instrument_node="">.</span></p><p data-dcnode-id="1566"><span data-dcnode-id="1582" instrument_node="">The Information Technology (IT) Act 2000 provided early oversight to the telemedicine sector in India, however it lacked any clear guidelines for data privacy, security and confidentiality. Some initial guidelines were recommended in 2003 by the IT Ministry. Other oversight measures followed such as the Information Technology (Reasonable security practices and procedures and sensitive personal data information) Rules 2011 and the Information Technology (Intermediaries Guidelines) Rules 2011</span><sup data-dcnode-id="1576"><a aria-label="Reference 31" data-dcnode-id="1580" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d153379457e855" title="
https://inc42.com/datalab/telemedicine-market-opportunity-in-indian-healthtech/https://inc42.com/datalab/telemedicine-market-opportunity-in-indian-healthtech/

. Accessed 25 Aug 2020"><span data-dcnode-id="1581" instrument_node="">31</span></a><span data-dcnode-id="1579" instrument_node="">, </span><a aria-label="Reference 32" data-dcnode-id="1577" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d153379457e858" title="Nishith Desai Associate, Digital Health in India (2020) 
https://www.nishithdesai.com/fileadmin/user_upload/pdfs/Research_Papers/Digital_Health_in_India.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1578" instrument_node="">32</span></a></sup><span data-dcnode-id="1575" instrument_node="">. Additionally, the Ministry of Health &amp; Family Welfare (MoH&amp;FW) notified Electronic Health Records (EHR) standards in 2013 and further revised it in 2016</span><sup data-dcnode-id="1572"><a aria-label="Reference 33" data-dcnode-id="1573" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d153379457e862" title="Ministry of Health &amp; Family Welfare, Electronic Health Record Standard for India (2016) 
https://main.mohfw.gov.in/sites/default/files/17739294021483341357.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1574" instrument_node="">33</span></a></sup><span data-dcnode-id="1571" instrument_node="">. In March 2020, just before India went into a national lockdown for COVID-19, MoH&amp;FW in partnership with Niti Aayog released guidelines for telemedicine (titled Telemedicine Practice Guidelines) that touched upon the behavioral and ethical aspects of consultation between a registered medical practitioner with patients through video, voice, text messaging and social platforms. It outlined the responsibilities for medical practitioner as well as guidelines on e-prescription</span><sup data-dcnode-id="1568"><a aria-label="Reference 34" data-dcnode-id="1569" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d153379457e866" title="Telemedicine Practice Guidelines (2020) 
https://www.mohfw.gov.in/pdf/Telemedicine.pdf

. Accessed 25 Aug 2020"><span data-dcnode-id="1570" instrument_node="">34</span></a></sup><span data-dcnode-id="1567" instrument_node="">.</span></p><p data-dcnode-id="1560"><span data-dcnode-id="1565" instrument_node="">In 2018, Niti Aayog unveiled the National Health Stack that has laid down the architecture of building health IT systems in India. This was further consolidated in&nbsp;the form of the&nbsp;National Digital Health Blueprint (2019) and recently in August 2020, the Government of India launched its National Digital Health Mission (NDHM)</span><sup data-dcnode-id="1562"><a aria-label="Reference 35" data-dcnode-id="1563" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d153379457e873" title="Niti Aayog (2019) National Digital Health Blueprint. 
https://www.nhp.gov.in/NHPfiles/National_Digital_Health_Blueprint_Report_comments_invited.pdf

. Accessed  25 Aug  2020"><span data-dcnode-id="1564" instrument_node="">35</span></a></sup><span data-dcnode-id="1561" instrument_node="">.</span></p><p data-dcnode-id="1554"><span data-dcnode-id="1559" instrument_node="">In the last two decades, the IT infrastructure of India has grown including mobile telephony networks and access to&nbsp;the digital cloud. Several big private hospital chains have digitized their health records and have created EHR systems</span><sup data-dcnode-id="1556"><a aria-label="Reference 36" data-dcnode-id="1557" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d153379457e880" title="
https://health.economictimes.indiatimes.com/news/health-it/india-bullish-on-ai-in-healthcare-without-ehr/73118990

. Accessed 25 Aug 2020"><span data-dcnode-id="1558" instrument_node="">36</span></a></sup><span data-dcnode-id="1555" instrument_node="">.</span></p><p data-dcnode-id="1548"><span data-dcnode-id="1553" instrument_node="">An example of digital transformation in hospital systems is the Narayana Health (NH)&nbsp;group of hospitals that is globally known for providing affordable healthcare at scale. NH has aimed to develop a home-grown hospital information system (called NH-Atma) over the next few years which will be entirely cloud based and cover the entire NH network. Similarly, NH has developed a data analytics platform called NH-Medha to crunch and extract information which will not only improve hospital’s efficiencies but also aid in clinical decisions. NH has also developed an in-house messaging platform (NH-Kaizala) to facilitate better communication amongst health staff</span><sup data-dcnode-id="1550"><a aria-label="Reference 37" data-dcnode-id="1551" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d153379457e888" title="Narayana Health Annual Report, 2018–19 (2019) 
https://www.narayanahealth.org/sites/default/files/download/annual-reports/Annual_Report_2018_19.pdf

. Accessed  25 Aug 2020"><span data-dcnode-id="1552" instrument_node="">37</span></a></sup><span data-dcnode-id="1549" instrument_node="">.</span></p><p data-dcnode-id="1542"><span data-dcnode-id="1547" instrument_node="">NH has partnered with the government to operationalise e-Health centres that have cloud connectivity integrated with EHR, a&nbsp;unique identification system and diagnostic services. NH has operationalized nine e-Health centres spread over various states including Karnataka, West Bengal, Rajasthan and Gujarat and, in the year 2016–17, these centres have cumulatively conducted more than 17,000 tele-consultations</span><sup data-dcnode-id="1544"><a aria-label="Reference 37" data-dcnode-id="1545" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d153379457e895" title="Narayana Health Annual Report, 2018–19 (2019) 
https://www.narayanahealth.org/sites/default/files/download/annual-reports/Annual_Report_2018_19.pdf

. Accessed  25 Aug 2020"><span data-dcnode-id="1546" instrument_node="">37</span></a></sup><span data-dcnode-id="1543" instrument_node="">.</span></p><p data-dcnode-id="1536"><span data-dcnode-id="1541" instrument_node="">Focusing on screening and alleviating conditions in chronic diseases such as diabetes, NH instituted an online diabetic management and care system in 2018 and had previously launched another diabetes outpatient application (called CURA in 2016) with the belief that “a diabetologist sitting at home in front of a computer can treat 10 times more patients than seeing patients physically in clinic” and CURA had treated 34,000 patients within two years of its launch</span><sup data-dcnode-id="1538"><a aria-label="Reference 37" data-dcnode-id="1539" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d153379457e902" title="Narayana Health Annual Report, 2018–19 (2019) 
https://www.narayanahealth.org/sites/default/files/download/annual-reports/Annual_Report_2018_19.pdf

. Accessed  25 Aug 2020"><span data-dcnode-id="1540" instrument_node="">37</span></a></sup><span data-dcnode-id="1537" instrument_node="">. The case study of NH illustrates how a hospital network in India has primed itself with a stated goal to digitally transform itself.</span></p></div></div></section><section data-dcnode-id="1480" data-title="The Indian Healthcare and Medtech Startups and&nbsp;SMEs &amp; Their Leap into Digital Health"><div class="c-article-section" data-dcnode-id="1481" id="Sec14-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1531" id="Sec14"><span data-dcnode-id="1532" instrument_node="">The Indian Healthcare and Medtech Startups and&nbsp;SMEs &amp; Their Leap into Digital Health</span></h2><div class="c-article-section__content" data-dcnode-id="1482" id="Sec14-content"><p data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Since the beginning of the millennium there has been a growing trend of health technology startups in India and many such as Practo, Lybrate and Mfine have concentrated on digital health mostly focusing on home care and management. These companies have been steadily growing in the fast growing market of home care in India.</span></p><p data-dcnode-id="1507"><span data-dcnode-id="1528" instrument_node="">In the meantime, over the last two decades, there has been a massive shift in the number of active medtech (devices and diagnostics) startups and SMEs in India through support provided by different arms of the Indian government such as&nbsp;the Technology Development Board (TDB), the then NMITLI program of the Department of Science &amp; Technology (DST), the Department of Biotechnology (DBT), BIRAC, Millennium Alliance (an initiative supported by the DST, FICCI &amp; USAID) and the Indo USA Science &amp; Technology Fund (IUSSTF), Bill &amp; Melinda Gates Foundation and the Wellcome Trust</span><sup data-dcnode-id="1519"><a data-dcnode-id="1 nd wounds that may proceed to gangrene and in many cases amputation of limbs</span><sup data-dcnode-id="1468"><a aria-label="Reference 41" data-dcnode-id="1469" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d153379457e1085" title="
https://www.neurotouch.co/

. Accessed 25 Aug 2020"><span data-dcnode-id="1470" instrument_node="">41</span></a></sup><span data-dcnode-id="1467" instrument_node=""> .</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1442" data-test="figure" data-title="Figure 1:" id="figure-1"><figure data-dcnode-id="1443"><figcaption data-dcnode-id="1463"><b class="c-article-section__figure-caption" data-dcnode-id="1464" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="1465" instrument_node="">Figure 1:</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1454"><div class="c-article-section__figure-item" data-dcnode-id="1458"><a class="c-article-section__figure-link" data-dcnode-id="1459" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s41745-020-00208-y/figures/1" rel="nofollow"><picture data-dcnode-id="1460"><source data-dcnode-id="1462" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs41745-020-00208-y/MediaObjects/41745_2020_208_Fig1_HTML.jpg?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="1461" height="418" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s41745-020-00208-y/MediaObjects/41745_2020_208_Fig1_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1455" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Neuro Touch™.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1444"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="1445" data-test=" </span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1450" fill-rule="evenodd"></path><span data-dcnode-id="1449" instrument_node="">
