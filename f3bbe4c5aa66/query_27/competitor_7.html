</span><header class="block-single__header" data-dcnode-id="3369"><span data-dcnode-id="3393" instrument_node="">
</span><h1 class="block-single__title" data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">3 Examples of Modular and Prefab Hospitals Constructed to Fight COVID-19</span></h1><span data-dcnode-id="3390" instrument_node="">
</span><p class="block-single__excerpt" data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">During COVID-19, the AEC industry has supported those on the front lines, building modular hospitals around the world at breakneck speeds.</span></p><span data-dcnode-id="3387" instrument_node="">
</span><div class="block-single__meta" data-dcnode-id="3371"><span data-dcnode-id="3386" instrument_node="">
</span><a class="block-single__author" data-dcnode-id="3384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redshift.autodesk.com/author/malderton/"><span data-dcnode-id="3385" instrument_node="">by Matt Alderton</span></a><span data-dcnode-id="3383" instrument_node="">
</span><div class="block-single__topic" data-dcnode-id="3373"><span data-dcnode-id="3382" instrument_node="">
</span><a class="post-category" data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redshift.autodesk.com/category/construction/"><span data-dcnode-id="3381" instrument_node="">Construction</span></a><span data-dcnode-id="3379" instrument_node="">                              - </span><span class="block-single__date" data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">Oct 20 2021</span></span><span data-dcnode-id="3376" instrument_node="">
</span><span class="block-single__read-time" data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">- 12 min read</span></span></div><span data-dcnode-id="3372" instrument_node="">
</span></div><span data-dcnode-id="3370" instrument_node="">
</span></header><span data-dcnode-id="3368" instrument_node="">
</span><figure class="block-single__main-image wp-caption" data-dcnode-id="3361"><span data-dcnode-id="3367" instrument_node="">
</span><img alt="modular hospitals Huoshenshan Hospital in Wuhan, China" class="prop-max-width wp-post-image" data-dcnode-id="3366" height="550" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.redshift.autodesk.com/2020/07/modular-hospitals-Header.jpg&amp;raw" width="1100"><span data-dcnode-id="3365" instrument_node=""> </span><figcaption class="wp-caption-text" data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">
                            The 1,000-bed Huoshenshan Hospital in Wuhan, China, was designed in 24 hours and built in 10 days. Courtesy of CITIC ADI.                          </span></figcaption><span data-dcnode-id="3362" instrument_node="">
</span></figure><span data-dcnode-id="3360" instrument_node="">
</span></div><span data-dcnode-id="3358" instrument_node="">
</span></div><span data-dcnode-id="3356" instrument_node="">
</span><div class="block-single__body" data-dcnode-id="2260"><span data-dcnode-id="3355" instrument_node="">
</span><div class="container boxes" data-dcnode-id="2262"><span data-dcnode-id="3354" instrument_node="">
</span><div class="box box-1 grid-1" data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">
</span></div><span data-dcnode-id="3351" instrument_node="">
</span><div class="block-single__entry box box-2 grid-7" data-dcnode-id="2992"><span data-dcnode-id="3350" instrument_node="">
</span><div class="block-single__content" data-dcnode-id="3046"><span data-dcnode-id="3349" instrument_node="">
</span><ul data-dcnode-id="3339"><li data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">Ad hoc, modular, and prefab hospitals have helped emergency responders fight the coronavirus pandemic.</span></li><span data-dcnode-id="3346" instrument_node="">
</span><li data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">Hospitals that would normally take months or years to construct have been finished in weeks.</span></li><span data-dcnode-id="3343" instrument_node="">
</span><li data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">These three examples of modular hospitals show how collaboration and technology can help address future problems and emergencies.</span></li><span data-dcnode-id="3340" instrument_node="">
</span></ul><p data-dcnode-id="3337"><span data-dcnode-id="3338" id="more-34464"></span></p><span data-dcnode-id="3336" instrument_node="">
</span><p data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">Since the beginning of the coronavirus pandemic, the architecture, engineering, and construction (AEC) industries have supported those serving on the front lines of rapid-response health care. Building ad hoc, modular, and prefab hospitals for communities facing unprecedented clinical demand turned AEC experts into emergency responders, delivering high-quality projects amid exceptional circumstances.</span></p><span data-dcnode-id="3333" instrument_node="">
</span><p data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">These new practices will serve the construction industry in future crises—and perhaps even in the course of returning to more normal business modalities. Here, projects in three countries—China, Mexico, and England—illustrate what this extraordinary situation demanded, how teams mobilized, and the knowledge they gained.</span></p><span data-dcnode-id="3330" instrument_node="">
</span><h2 data-dcnode-id="3327"><strong data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">1. Huoshenshan and Leishenshan Hospitals (China)</span></strong></h2><span data-dcnode-id="3326" instrument_node="">
</span><p data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">Wuhan, China, emerged as the world’s first coronavirus hot spot in January 2020. With cases and deaths quickly climbing, the local government assembled an all-star team of designers and builders for a monumental task: Build a temporary, 1,000-bed hospital in just 10 days.</span></p><span data-dcnode-id="3323" instrument_node="">
</span><figure aria-describedby="caption-attachment-34470" class="wp-caption alignnone" data-dcnode-id="3318" id="attachment_34470" style="width: 700px"><img alt="modular hospitals A design plan for the Huoshenshan " class="size-full wp-image-34470 prop-full-width" data-dcnode-id="3322" height="400" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.redshift.autodesk.com/2020/07/modular-hospitals-Huoshenshan-design.jpg&amp;raw" width="700"><figcaption class="wp-caption-text" data-dcnode-id="3319" id="caption-attachment-34470"><span data-dcnode-id="3321" instrument_node="">A design plan for the Huoshenshan Hospital in Wuhan, China. Courtesy of CITIC ADI.
</span><p data-dcnode-id="3320"></p></figcaption></figure><span data-dcnode-id="3317" instrument_node="">
</span><p data-dcnode-id="3316"></p><p data-dcnode-id="3305"><span data-dcnode-id="3315" instrument_node="">On Jan. 23, 2020, two days before the start of Lunar New Year, Wuhan officials announced a citywide lockdown. By afternoon, the phone was ringing at </span><a data-dcnode-id="3313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.group.citic/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3314" instrument_node="">CITIC General Institute of Architectural Design and Research</span></a><span data-dcnode-id="3312" instrument_node=""> (CITIC ADI) and </span><a data-dcnode-id="3310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//english.cscec.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3311" instrument_node="">China State Construction 3rd Bureau Engineering</span></a><span data-dcnode-id="3309" instrument_node="">&nbsp;(CSCEC-3), which designed and built the Huoshenshan Hospital, respectively, using </span><a data-dcnode-id="3307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redshift.autodesk.com/history-of-prefabrication/"><span data-dcnode-id="3308" instrument_node="">prefabrication</span></a><span data-dcnode-id="3306" instrument_node=""> construction methods.</span></p><span data-dcnode-id="3304" instrument_node="">
</span><p data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">“Under the leadership of the headquarters, a design team of more than 60 people was assembled for the Huoshenshan project in about one hour,” says Jiqiang Hu, director of CITIC ADI’s Digital Design Research Center. “Within 30 minutes, our designers were already on their way to the site for a field survey. We were all eager to take part in this project and contribute to the fight against the epidemic.”</span></p><span data-dcnode-id="3301" instrument_node="">
</span><p data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">A project so large would typically take six months to design and up to three more years to build. “We had to race against time, as people’s lives were at stake,” Hu says. CITIC ADI submitted a ground-leveling scheme in five hours, finalized a design plan in 24 hours, and delivered construction drawings in 60 hours.</span></p><span data-dcnode-id="3298" instrument_node="">
</span><p data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">
</span></p><div class="site-ad" data-ad="34166" data-dcnode-id="3274" data-post="34464" data-track-ad="notrack" id="ad-34166"><span data-dcnode-id="3295" instrument_node="">
</span><aside data-dcnode-id="3276" id="inline_ad1"><span data-dcnode-id="3294" instrument_node="">
</span><a class="site-ad card-ad-inline" data-dcnode-id="3278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.autodesk.com/campaigns/aec-return-to-workplace%3Fmktvar004%3D3861634002%26internalc%3Dtrue" target="_blank"><span data-dcnode-id="3293" instrument_node="">
</span><div class="col-1 box" data-dcnode-id="3289"><span data-dcnode-id="3292" instrument_node="">
</span><img alt="" class="card-ad-inline__image wp-post-image" data-dcnode-id="3291" height="270" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.redshift.autodesk.com/2020/06/salus-inline.jpg&amp;raw" width="540"><span data-dcnode-id="3290" instrument_node=""> </span></div><span data-dcnode-id="3288" instrument_node="">
</span><div class="col-2 box" data-dcnode-id="3280"><span data-dcnode-id="3287" instrument_node="">
</span><div class="card-ad-inline__content" data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">Ready to rethink the built world during COVID-19?</span></div><span data-dcnode-id="3284" instrument_node="">
</span><div class="card-ad-inline__action component-button" data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">Innovate Now</span></div><span data-dcnode-id="3281" instrument_node="">
</span></div><span data-dcnode-id="3279" instrument_node="">
</span></a><span data-dcnode-id="3277" instrument_node="">
</span></aside><span data-dcnode-id="3275" instrument_node="">
</span></div><span data-dcnode-id="3273" instrument_node="">
</span><span data-dcnode-id="3270" instrument_node="">
</span><span data-dcnode-id="3269" instrument_node="">
</span><p data-dcnode-id="3266"></p><span data-dcnode-id="3265" instrument_node="">
</span><p data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">CITIC ADI attributes its speed largely to its methodology. It used a “relay” approach to design, with personnel working two shifts for continuous design progress. Construction was done concurrently instead of consecutively. “We pushed forward various procedures in parallel or even reverse order,” Hu says. “Basically, we were doing designing, construction, scheme modification, and adjustment all at the same time.”</span></p><span data-dcnode-id="3262" instrument_node="">
</span><p data-dcnode-id="3245"><span data-dcnode-id="3261" instrument_node="">Technology also was key. Upon receiving the project, the project coordinator issued a company-wide call for assistance via WeChat. Using </span><a data-dcnode-id="3259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redshift.autodesk.com/bim-building-information-modeling/"><span data-dcnode-id="3260" instrument_node="">BIM (Building Information Modeling)</span></a><span data-dcnode-id="3258" instrument_node="">—including Autodesk </span><a data-dcnode-id="3256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.autodesk.com/products/revit/overview"><span data-dcnode-id="3257" instrument_node="">Revit</span></a><span data-dcnode-id="3255" instrument_node=""> and </span><a data-dcnode-id="3253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.autodesk.com/products/navisworks/overview%3Fplc%3DNAVSIM%26term%3D1-YEAR%26support%3DADVANCED%26quantity%3D1"><span data-dcnode-id="3254" instrument_node="">Navisworks</span></a><span data-dcnode-id="3252" instrument_node=""> for digital modeling, </span><a data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.autodesk.com/RVT/en/Detail/Index%3Fid%3D2629595860167800202%26appLang%3Den%26os%3DWin64" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3251" instrument_node="">Enscape</span></a><span data-dcnode-id="3249" instrument_node=""> for model rendering, and </span><a data-dcnode-id="3247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.autodesk.com/products/civil-3d/overview%3Fplc%3DCIV3D%26term%3D1-YEAR%26support%3DADVANCED%26quantity%3D1"><span data-dcnode-id="3248" instrument_node="">Civil 3D</span></a><span data-dcnode-id="3246" instrument_node=""> for field leveling and site planning—allowed the teams to visualize designs, integrate specialties, and share data in real time, all of which accelerated the work.</span></p><span data-dcnode-id="3244" instrument_node="">
</span><p data-dcnode-id="3236"><span data-dcnode-id="3243" instrument_node="">BIM also facilitated rapid construction of a testing lab to provide screening and diagnosis support to Wuhan and its surrounding communities. On Jan. 29, </span><a data-dcnode-id="3241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.ccccltd.cn/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3242" instrument_node="">CCCC Second Harbour Engineering Company</span></a><span data-dcnode-id="3240" instrument_node=""> was tasked with building the Fire Eye laboratory in just six days. The inflatable, 6,000-square-foot structure, one of eight operated by the </span><a data-dcnode-id="3238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.genomics.cn/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3239" instrument_node="">Beijing Genomics Institute</span></a><span data-dcnode-id="3237" instrument_node=""> (BGI), required complex air-pressure and pollutant-discharge systems, which presented construction challenges.</span></p><span data-dcnode-id="3235" instrument_node="">
</span><figure aria-describedby="caption-attachment-34472" class="wp-caption alignnone" data-dcnode-id="3231" id="attachment_34472" style="width: 700px"><img alt="modular hospitals fire eye lab " class="size-full wp-image-34472 prop-full-width" data-dcnode-id="3234" height="400" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.redshift.autodesk.com/2020/07/modular-hospitals-Fire-Eye-Lab.jpg&amp;raw" width="700"><figcaption class="wp-caption-text" data-dcnode-id="3232" id="caption-attachment-34472"><span data-dcnode-id="3233" instrument_node="">The Fire Eye lab was built in just six days, using BIM technology for virtual design and construction. Courtesy of CCCC.</span></figcaption></figure><span data-dcnode-id="3230" instrument_node="">
</span><p data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">“The project team decided to use BIM technology for virtual design and construction,” says Fuqiang Chen, deputy general manager of CCCC Wuhan Zhixing International Engineering Consulting. “With the help of the BIM model, the design intention of the new lab was fully expressed, and the integration of electromechanical pipeline was deepened. The model assisted site technical personnel as they communicated with designers and the owner, avoiding collisions and rework of the electromechanical pipeline and saving as much construction time as possible.”</span></p><span data-dcnode-id="3227" instrument_node="">
</span><p data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">As the hospital’s general contractor, CSCEC-3 achieved success through diligent planning—down to the hour and, in some cases, the minute. “For example, immediately after the field is leveled, the ground-laying work and the transportation of the prefab modules must get started,” says Yewen Wu, CSCEC-3’s Huoshenshan and Leishenshan hospital field BIM engineer. “If it is too early, it will cause congestion, and if it is too late, it will delay the schedule. Every step needs to be precisely planned, with the right schedule for labor, equipment, transportation, and materials.”</span></p><span data-dcnode-id="3224" instrument_node="">
</span><figure aria-describedby="caption-attachment-34473" class="wp-caption alignright" data-dcnode-id="3220" id="attachment_34473" style="width: 400px"><img alt="modular hospitals leishenshan" class="size-full wp-image-34473 prop-full-width" data-dcnode-id="3223" height="200" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.redshift.autodesk.com/2020/07/modular-hospitals-Leishenshan-half-col.png&amp;raw" width="400"><figcaption class="wp-caption-text" data-dcnode-id="3221" id="caption-attachment-34473"><span data-dcnode-id="3222" instrument_node="">The 1,600-bed Leishenshan Hospital was created using a dynamic design process and built in 13 days. Courtesy of the 3rd company of CSCEC-3.</span></figcaption></figure><span data-dcnode-id="3219" instrument_node="">
</span><p data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">Expert planning helped CSCEC-3 quickly erect a second 1,600-bed temporary hospital in Wuhan, Leishenshan Hospital, using the same prefab approach. It was designed by the Central-South Architectural Design Institute (CSADI), which assembled more than 80 designers—40 recruited at warp speed on Lunar New Year’s Eve—who produced construction drawings in three days.</span></p><span data-dcnode-id="3216" instrument_node="">
</span><p data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">“This project is a single building, which was built quickly by way of container-box and steel-frame assembly,” says Songmin Zhang, deputy chief architect of CSADI and director of the Leishenshan Hospital Project. “The challenge was that the design drawings needed to be adjusted in real time in coordination with the deployment of construction personnel, materials, and machines. Within the three-day construction-drawing time limit, most of the drawings had been completed by CSADI, but the designer still needed to monitor construction progress to revise the drawings on-site.” Thanks in no small part to CSADI’s dynamic design process, construction was completed in only 13 days.</span></p><span data-dcnode-id="3213" instrument_node="">
</span><h2 data-dcnode-id="3210"><strong data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">2. CEMEX Hospitals (Mexico)</span></strong></h2><span data-dcnode-id="3209" instrument_node="">
</span><p data-dcnode-id="3204"><span data-dcnode-id="3208" instrument_node="">The novel coronavirus arrived in Mexico in late February 2020. By mid-March, </span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cemex.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3207" instrument_node="">CEMEX</span></a><span data-dcnode-id="3205" instrument_node="">—a Mexican manufacturer and distributor of building materials—realized that to meet the coming demand for critical care, Mexico would need more hospital beds. But CEMEX was not directly involved in the hospital business.</span></p><span data-dcnode-id="3203" instrument_node="">
</span><p data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">“We really wanted to support in some way,” says Enrique Rodríguez, manager of engineering and infrastructure and government projects at CEMEX. “However, the projects we were involved in on a day-to-day basis—roads, dams, or wind farms—are not directly related to fighting the pandemic. The idea arose that an internal project, where we would develop prefabricated subsidized housing for employees working on remote sites, could evolve into a concept for manufacturing and installing prefabricated hospitals. Knowing the country’s need, this idea would really serve the population.”</span></p><span data-dcnode-id="3200" instrument_node="">
</span><figure aria-describedby="caption-attachment-34476" class="wp-caption alignnone" data-dcnode-id="3196" id="attachment_34476" style="width: 700px"><img alt="modular hospitals cemex exterior" class="size-full wp-image-34476 prop-full-width" data-dcnode-id="3199" height="467" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.redshift.autodesk.com/2020/07/modular-hospitals-Cemex-exterior.jpg&amp;raw" width="700"><figcaption class="wp-caption-text" data-dcnode-id="3197" id="caption-attachment-34476"><span data-dcnode-id="3198" instrument_node="">CEMEX used prefab-housing-design techniques to develop mobile hospital models. Courtesy of CEMEX.</span></figcaption></figure><span data-dcnode-id="3195" instrument_node="">
</span><p data-dcnode-id="3190"><span data-dcnode-id="3194" instrument_node="">CEMEX carried out a laser survey of its subsidized housing project and re-created the design in Revit, leading with its technological business unit, called </span><a data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.construhub.com/home" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3193" instrument_node="">Construhub</span></a><span data-dcnode-id="3191" instrument_node="">. This became the starting point for a mobile hospital model, developed in collaboration with Mexican companies seeking to add value to the project. Teams worked together on the design to mitigate late-breaking change orders, even providing opportunities for public-health institutions to virtually walk through the site before construction began.</span></p><span data-dcnode-id="3189" instrument_node="">
</span><p data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">The BIM model took less than three weeks to perfect. Work then commenced on hospitals in Monterrey, Nuevo León; Ciudad Juárez, Chihuahua; Culiacán, Sinaloa; Fresnillo, Zacatecas; Tlalnepantla, state of Mexico; and Puebla, Puebla. The efficiencies gained from BIM helped expedite these six temporary hospitals, which were built using prefabricated antibacterial concrete and installed in 15 days.</span></p><span data-dcnode-id="3186" instrument_node="">
</span><p data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">“BIM helped us not lose the project’s essence: prefabricated, durable, intelligent, and affordable hospitals,” Rodríguez says. “This represented a great effort to achieve the best design-build proposal from the group of interdisciplinary companies that participated. We always maintained fluid and transparent communication with our clients, which was the key to achieving a functional hospital model meeting the needs of patient care and medical staff.”</span></p><span data-dcnode-id="3183" instrument_node="">
</span><figure aria-describedby="caption-attachment-34477" class="wp-caption alignnone" data-dcnode-id="3179" id="attachment_34477" style="width: 700px"><img alt="modular hospitals cemex interior " class="size-full wp-image-34477 prop-full-width" data-dcnode-id="3182" height="394" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.redshift.autodesk.com/2020/07/modular-hospitals-Cemex-interior.jpg&amp;raw" width="700"><figcaption class="wp-caption-text" data-dcnode-id="3180" id="caption-attachment-34477"><span data-dcnode-id="3181" instrument_node="">Inside a CEMEX-built hospital. Courtesy of CEMEX.</span></figcaption></figure><span data-dcnode-id="3178" instrument_node="">
</span><h2 data-dcnode-id="3175"><strong data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">3. NHS Nightingale Hospital Birmingham (England)</span></strong></h2><span data-dcnode-id="3174" instrument_node="">
</span><p data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">When it became clear how easily COVID-19 could spread, governments banned large gatherings, meetings, and events. As a result, convention centers worldwide sat empty—including those in the United Kingdom. The UK government turned to the vacant convention centers to support the National Health Service (NHS) and establish temporary hospitals in the event of a surge in demand arising from the pandemic.</span></p><span data-dcnode-id="3171" instrument_node="">
</span><p data-dcnode-id="3160"><span data-dcnode-id="3170" instrument_node="">Named for </span><a data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/scientist/florence-nightingale" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3169" instrument_node="">Florence Nightingale</span></a><span data-dcnode-id="3167" instrument_node="">, the founder of modern nursing, these so-called Nightingale Hospitals were conceived on March 24, 2020, when the NHS announced its first field hospital at East London’s </span><a data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.excel.london/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3166" instrument_node="">ExCeL London</span></a><span data-dcnode-id="3164" instrument_node=""> convention center. Just a few days later, on March 28, the NHS selected </span><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.interserve.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3163" instrument_node="">Interserve Construction</span></a><span data-dcnode-id="3161" instrument_node=""> to develop its second field hospital: the NHS Nightingale Hospital Birmingham at the National Exhibition Centre (NEC).</span></p><span data-dcnode-id="3159" instrument_node="">
</span><p data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">Interserve was a rational choice because it had helped build the NEC, and its offices were located nearby. “We were told that the NHS needed 800 critical-care beds within two weeks,” says Project Director Vince Kesterton. “It was pretty nerve-racking because there aren’t projects of that scale that you turn over in two weeks. It just doesn’t happen.”</span></p><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3151"><span data-dcnode-id="3155" instrument_node="">To make an unprecedented task manageable, Kesterton made a list of everything that had to be accomplished, then worked backward to determine what resources and schedule would be required. “It quickly became apparent that we needed three eight-hour working shifts, 24 hours a day, seven days a week, and that we needed to use our entire supply chain working together.” Kesterton asked subcontractors to cease work on other projects and send as much labor to Birmingham as possible. The resulting team of more than 450 Interserve employees and contractors, plus 60 </span><a data-dcnode-id="3153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.army.mod.uk/who-we-are/corps-regiments-and-units/brigade-of-gurkhas/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3154" instrument_node="">Gurkhas</span></a><span data-dcnode-id="3152" instrument_node=""> from the British Army, worked more than 90,000 construction hours building a temporary hospital spanning the equivalent of 11 soccer fields.</span></p><span data-dcnode-id="3150" instrument_node="">
</span><figure aria-describedby="caption-attachment-34478" class="wp-caption alignnone" data-dcnode-id="3146" id="attachment_34478" style="width: 700px"><img alt="modular hospitals NHS Nightingale Hospital Birmingham" class="size-full wp-image-34478 prop-full-width" data-dcnode-id="3149" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.redshift.autodesk.com/2020/07/modular-hospitals-Nightingale-workers.jpg&amp;raw" width="700"><figcaption class="wp-caption-text" data-dcnode-id="3147" id="caption-attachment-34478"><span data-dcnode-id="3148" instrument_node="">To build the NHS Nightingale Hospital Birmingham in England, 450 Interserve employees and contractors and 60 Gurkhas from the British Army worked 90,000 construction hours. Courtesy of Interserve.</span></figcaption></figure><span data-dcnode-id="3145" instrument_node="">
</span><p data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">“Naturally, people want to work a standard day,” Kesterton says. “But we had to be very strict with our trades to make sure we had three shifts that were productive around the clock. The average person worked 10 or 11 hours a day, but people wanted to put in the time because of the project’s purpose. There was a lot of goodwill.”</span></p><span data-dcnode-id="3142" instrument_node="">
</span><p data-dcnode-id="3137"><span data-dcnode-id="3141" instrument_node="">The project was divided across five exhibition halls, where activity was carefully orchestrated using </span><a data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//construction.autodesk.com/products/plangrid" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3140" instrument_node="">PlanGrid</span></a><span data-dcnode-id="3138" instrument_node="">, an Autodesk cloud solution, to document progress and communicate issues. While flooring was being laid in one hall, walls were being installed in the next and service cables in another. Whenever an issue was discovered in one hall that might affect progress in another, a picture was taken and shared in the cloud for resolution.</span></p><span data-dcnode-id="3136" instrument_node="">
</span><p data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">“It was a good method for speeding things up, rather than using paper,” Kesterton says, adding that working this way meant constant progress without requiring contractors to step all over each other, essential to observing government-mandated social-distancing rules.</span></p><span data-dcnode-id="3133" instrument_node="">
</span><p data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">“Social distancing was difficult because we often had 400 or 500 workers on-site at one time,” says Kesterton, who appointed a health and safety manager with a team of designated “spotters” whose job was to enforce social distancing. “We’re very fortunate: We didn’t have anybody test positive for coronavirus.”</span></p><span data-dcnode-id="3130" instrument_node="">
</span><figure aria-describedby="caption-attachment-34480" class="wp-caption alignnone" data-dcnode-id="3126" id="attachment_34480" style="width: 700px"><img alt="modular hospitals Nightingale Hospital construction " class="size-full wp-image-34480 prop-full-width" data-dcnode-id="3129" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.redshift.autodesk.com/2020/07/modular-hospitals-Nightingale-crane1.jpg&amp;raw" width="700"><figcaption class="wp-caption-text" data-dcnode-id="3127" id="caption-attachment-34480"><span data-dcnode-id="3128" instrument_node="">Nightingale Hospital construction activities were coordinated across five exhibit halls and three around-the-clock shifts. Courtesy of Interserve.</span></figcaption></figure><span data-dcnode-id="3125" instrument_node="">
</span><p data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">On April 16, just two weeks after work began, Interserve delivered 800 beds to the NHS, which already had commissioned a second phase with another 400 beds that was delivered two weeks later. Fortunately, Kesterton says, none of the beds has ever been used. “It’s strange,” he says. “Everybody worked really hard on this project, but nobody wanted it to actually be used. And, thankfully, it wasn’t.”</span></p><span data-dcnode-id="3122" instrument_node="">
</span><h2 data-dcnode-id="3119"><strong data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">Extraordinary Circumstances, Lasting Lessons</span></strong></h2><span data-dcnode-id="3118" instrument_node="">
</span><p data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">The COVID-19 pandemic is an extraordinary circumstance that has demanded an extraordinary response. When the dust finally settles, the designers and builders who met the moment will have many learned lessons that promise to outlast it. Responses to future challenges—whether ordinary construction conundrums or international emergencies—promise increased speed and efficiency.</span></p><span data-dcnode-id="3115" instrument_node="">
</span><p data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">In Wuhan, the value of technology shines brighter thanks to the success of Huoshenshan and Leishenshan hospitals. “Technology is the king,” says CSCEC-3’s Wu. “Technicians are constantly improving the construction plan on-site, and the process needs to be as simple as possible while not compromising existing functions.”</span></p><span data-dcnode-id="3112" instrument_node="">
</span><p data-dcnode-id="3107"><span data-dcnode-id="3111" instrument_node="">Simplicity breeds efficiency, says Hu, who emphasizes the importance of BIM to the process. “Using BIM to create an information-sharing </span><a data-dcnode-id="3109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redshift.autodesk.com/connected-data-for-owners/"><span data-dcnode-id="3110" instrument_node="">platform for owners</span></a><span data-dcnode-id="3108" instrument_node="">, management companies, construction contractors, construction teams, and other units to realize data sharing on the same platform makes communication more convenient, collaboration closer, and management more effective,” he says.</span></p><span data-dcnode-id="3106" instrument_node="">
</span><aside class="component-recommended-inline" data-dcnode-id="3100"><span data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">See Also:</span></span><span data-dcnode-id="3103" instrument_node=""> </span><a data-dcnode-id="3101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//redshift.autodesk.com/sustainable-highway/"><span data-dcnode-id="3102" instrument_node="">Building Europe’s First Sustainable Highway</span></a></aside><span data-dcnode-id="3099" instrument_node="">
</span><p data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">For CSADI, designing Leishenshan Hospital showed the value of working in the cloud. “At present, the general situation in China is that remote collaboration has not formed at scale,” Zhang says. “When an emergency comes, there is no efficient coordination mechanism. In this project, the concept of the cloud has gradually become popular, such as remote offices and video conferencing. Because of this opportunity, CSADI is preparing to establish a private cloud enterprise-collaboration mechanism.”</span></p><span data-dcnode-id="3096" instrument_node="">
</span><p data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">In Mexico, CEMEX learned the value of collaboration through technology, which has the potential to streamline future projects by aligning builders and clients. “The fact that the client can virtually walk through a project and make recommendations is great,” says CEMEX Manager of Segment Development and New Business Eileen Hernández. “The expectation is very close to what we are delivering, because the client was involved from the beginning.”</span></p><span data-dcnode-id="3093" instrument_node="">
</span><p data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">But technology alone won’t increase speed and collaboration; according to Kesterton, relationships are also crucial. Kesterton attributes the NHS Nightingale Hospital Birmingham’s success largely to the strong rapport he had with employees, contractors, and the client. “You need to get to know people on a personal level,” he says. “Then, if there are times when things get difficult, those people will be more flexible to help you overcome issues.”</span></p><span data-dcnode-id="3090" instrument_node="">
</span><p data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Which leads to perhaps the most powerful lesson of all: When stakeholders work as a team, anything is possible. “The biggest learning for me is what you can achieve if you have to achieve it,” Kesterton says. “If someone said to me a few months back that we were going to install 1,200 critical-care beds for £30 million over a three- to four-week period, I would have said it wasn’t possible. But when you actually accomplish that level of output and production, it makes you realize what can be achieved when everybody pulls together to work toward the same outcome.”</span></p><span data-dcnode-id="3087" instrument_node="">
</span><h2 data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">Modular Building FAQ</span></h2><span data-dcnode-id="3084" instrument_node="">
</span><h3 data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">What is modular building?</span></h3><span data-dcnode-id="3081" instrument_node="">
</span><p data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">Modular building is a building constructed with prefabricated components, constructed offsite. Examples of these preconstructed components can include premade steel frames, container boxes, concrete walls, and more.</span></p><span data-dcnode-id="3078" instrument_node="">
</span><h3 data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">What are the advantages of modular building?</span></h3><span data-dcnode-id="3075" instrument_node="">
</span><p data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">Some advantages of the modular hospitals constructed for first responders include:</span></p><span data-dcnode-id="3072" instrument_node="">
</span><ul data-dcnode-id="3062"><li data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">Speed of construction</span></li><span data-dcnode-id="3069" instrument_node="">
</span><li data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Low waste</span></li><span data-dcnode-id="3066" instrument_node="">
</span><li data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">Ability to repurpose components</span></li><span data-dcnode-id="3063" instrument_node="">
</span></ul><p data-dcnode-id="3059"><em data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">This article has been updated. It originally published in July 2020.</span></em></p><span data-dcnode-id="3058" instrument_node="">
</span><span data-dcnode-id="3056" instrument_node="">
</span><span data-dcnode-id="3054" instrument_node="">
