</span><div class="headerReadability" data-dcnode-id="1710"><h1 data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">13 Examples of Technological Change</span></h1></div><span data-dcnode-id="1709" instrument_node="">

</span><div class="s101" data-dcnode-id="1701"><span class="smallblogy" data-dcnode-id="1702"><span data-dcnode-id="1706" instrument_node="">&nbsp;</span><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/johnSpacey" rel="author"><span data-dcnode-id="1705" instrument_node="">John Spacey</span></a><span data-dcnode-id="1703" instrument_node="">, April 16, 2016 updated on December 02, 2017</span></span></div><span data-dcnode-id="1700" instrument_node="">
</span><div class="vSpacer" data-dcnode-id="1699"></div><div class="readability" data-dcnode-id="1473" id="mainreadable"><span class="blogy" data-dcnode-id="1474"><span data-dcnode-id="1698" instrument_node="">
</span><picture class="headerImg" data-dcnode-id="1692"><source data-dcnode-id="1697" height="180" media="(max-width: 400px)" srcset="https://green.simplicable.com/images/291p/China-2969-152.jpg" width="291"><source data-dcnode-id="1696" height="217" media="(max-width: 600px)" srcset="https://green.simplicable.com/images/midthumb/China-2969-152.jpg" width="350"><source data-dcnode-id="1695" height="402" media="(max-width: 800px)" srcset="https://green.simplicable.com/images/thumbnails/China-2969-152.jpg" width="650"><source data-dcnode-id="1694" height="489" media="(min-width: 800px)" srcset="https://midori.simplicable.com/images/header/China-2969-152.jpg" width="790"><img class="headerImg" data-dcnode-id="1693" height="489" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//midori.simplicable.com/images/header/China-2969-152.jpg&amp;raw" width="790"></picture><div class="d001" data-dcnode-id="1691"></div><strong data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Technological change</span></strong><span data-dcnode-id="1688" instrument_node=""> is a process of invention, </span><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/commercialization"><span data-dcnode-id="1687" instrument_node="">commercialization</span></a><span data-dcnode-id="1685" instrument_node=""> and improvement of technology. It is an </span><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/exponential-vs-hyperbolic"><span data-dcnode-id="1684" instrument_node="">exponential</span></a><span data-dcnode-id="1682" instrument_node=""> or </span><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/exponential-vs-hyperbolic"><span data-dcnode-id="1681" instrument_node="">hyperbolic</span></a><span data-dcnode-id="1679" instrument_node=""> process whereby new technologies make the invention of new technologies easier and faster resulting in </span><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/accelerating-change"><span data-dcnode-id="1678" instrument_node="">accelerating change</span></a><span data-dcnode-id="1676" instrument_node="">. The following are common types of technological change.</span><div class="d001" data-dcnode-id="1675"></div><span data-dcnode-id="1673" instrument_node="">
</span><ins class="adsbygoogle mobileOnly" data-ad-client="ca-pub-0273803752039757" data-ad-format="rectangle" data-ad-slot="3688079285" data-dcnode-id="1672" data-full-width-responsive="false" style="min-height: 250px;"></ins><span data-dcnode-id="1671" instrument_node="">
</span><span data-dcnode-id="1668" instrument_node="">
</span><div class="vSpacerDouble" data-dcnode-id="1667"></div><h2 data-dcnode-id="1664"><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/productivity"><span data-dcnode-id="1666" instrument_node="">Productivity</span></a></h2><span data-dcnode-id="1663" instrument_node="">Tools that allow people to </span><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/productivity"><span data-dcnode-id="1662" instrument_node="">produce more</span></a><span data-dcnode-id="1660" instrument_node=""> in an hour of work. For example, accounting software that freed accounting departments from cumbersome paper-based processes.</span><div class="d001" data-dcnode-id="1659"></div><h2 data-dcnode-id="1656"><a data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/efficiency"><span data-dcnode-id="1658" instrument_node="">Efficiency</span></a></h2><span data-dcnode-id="1655" instrument_node="">Technologies such as </span><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/automation"><span data-dcnode-id="1654" instrument_node="">automation</span></a><span data-dcnode-id="1652" instrument_node=""> that allows firms to </span><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/efficiency"><span data-dcnode-id="1651" instrument_node="">produce more with a unit of input</span></a><span data-dcnode-id="1649" instrument_node="">.</span><div class="d001" data-dcnode-id="1648"></div><span data-dcnode-id="1646" instrument_node="">
</span><ins class="adsbygoogle mobileOnly" data-ad-client="ca-pub-0273803752039757" data-ad-format="rectangle" data-ad-slot="7961849294" data-dcnode-id="1645" data-full-width-responsive="false" style="min-height: 250px;"></ins><span data-dcnode-id="1644" instrument_node="">
</span><span data-dcnode-id="1641" instrument_node="">
</span><div class="vSpacerDouble" data-dcnode-id="1640"></div><h2 data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Health</span></h2><span data-dcnode-id="1637" instrument_node="">Medicine, medical devices and other technologies that treat or prevent disease.</span><div class="d001" data-dcnode-id="1636"></div><h2 data-dcnode-id="1633"><a data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/knowledge"><span data-dcnode-id="1635" instrument_node="">Knowledge</span></a></h2><span data-dcnode-id="1632" instrument_node="">Tools that help people to create, manage and share </span><a data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/knowledge"><span data-dcnode-id="1631" instrument_node="">knowledge</span></a><span data-dcnode-id="1629" instrument_node=""> such as the internet.</span><div class="d001" data-dcnode-id="1628"></div><h2 data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Entertainment</span></h2><span data-dcnode-id="1625" instrument_node="">Technology such as games that transform leisure time.</span><div class="d001" data-dcnode-id="1624"></div><h2 data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Society</span></h2><span data-dcnode-id="1621" instrument_node="">Technology that directly or indirectly changes societies such as social media.</span><div class="d001" data-dcnode-id="1620"></div><span data-dcnode-id="1618" instrument_node="">
</span><ins class="adsbygoogle mobileOnly" data-ad-client="ca-pub-0273803752039757" data-ad-format="rectangle" data-ad-slot="9871698235" data-dcnode-id="1617" data-full-width-responsive="false" style="min-height: 250px;"></ins><span data-dcnode-id="1616" instrument_node="">
</span><span data-dcnode-id="1613" instrument_node="">
</span><div class="vSpacerDouble" data-dcnode-id="1612"></div><h2 data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Politics</span></h2><span data-dcnode-id="1609" instrument_node="">Changes to the way that people track current events and form political opinions using information tools.</span><div class="d001" data-dcnode-id="1608"></div><h2 data-dcnode-id="1605"><a data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/culture"><span data-dcnode-id="1607" instrument_node="">Culture</span></a></h2><a data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/culture"><span data-dcnode-id="1604" instrument_node="">Culture</span></a><span data-dcnode-id="1602" instrument_node=""> is a stabilizing force that doesn't change easily. Nevertheless, technology changes culture over time. For example, 20th century American culture was greatly influenced by technologies such as the automobile and television.</span><div class="d001" data-dcnode-id="1601"></div><h2 data-dcnode-id="1598"><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/economics"><span data-dcnode-id="1600" instrument_node="">Economics</span></a></h2><span data-dcnode-id="1597" instrument_node="">Technology creates economic shifts. For example, </span><a data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/automation"><span data-dcnode-id="1596" instrument_node="">automation</span></a><span data-dcnode-id="1594" instrument_node=""> may cause short or long term disruptions to labor markets.</span><div class="d001" data-dcnode-id="1593"></div><span data-dcnode-id="1591" instrument_node="">
</span><ins class="adsbygoogle mobileOnly" data-ad-client="ca-pub-0273803752039757" data-ad-format="rectangle" data-ad-slot="7544607396" data-dcnode-id="1590" data-full-width-responsive="false" style="min-height: 250px;"></ins><span data-dcnode-id="1589" instrument_node="">
</span><span data-dcnode-id="1586" instrument_node="">
</span><div class="vSpacerDouble" data-dcnode-id="1585"></div><h2 data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Industries</span></h2><span data-dcnode-id="1582" instrument_node="">Technology creates new </span><a data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/business-models"><span data-dcnode-id="1581" instrument_node="">business models</span></a><span data-dcnode-id="1579" instrument_node=""> and disrupts old ones.</span><div class="d001" data-dcnode-id="1578"></div><h2 data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Environment</span></h2><span data-dcnode-id="1575" instrument_node="">Technology may create waste that harms ecosystems, the climate system and </span><a data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/quality-of-life"><span data-dcnode-id="1574" instrument_node="">quality of life</span></a><span data-dcnode-id="1572" instrument_node="">. In theory, technologies such as renewable energy can also reduce some of this </span><a data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/environmental-issues"><span data-dcnode-id="1571" instrument_node="">impact</span></a><span data-dcnode-id="1569" instrument_node="">.</span><div class="d001" data-dcnode-id="1568"></div><h2 data-dcnode-id="1565"><a data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/transportation"><span data-dcnode-id="1567" instrument_node="">Transportation</span></a></h2><a data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/transportation"><span data-dcnode-id="1564" instrument_node="">Transportation</span></a><span data-dcnode-id="1562" instrument_node=""> tends to become faster and safer with time. </span><div class="d001" data-dcnode-id="1561"></div><span data-dcnode-id="1559" instrument_node="">
</span><ins class="adsbygoogle mobileOnly" data-ad-client="ca-pub-0273803752039757" data-ad-format="rectangle" data-ad-slot="4167920426" data-dcnode-id="1558" data-full-width-responsive="false"></ins><span data-dcnode-id="1557" instrument_node="">
