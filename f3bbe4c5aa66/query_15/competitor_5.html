de-id="849" instrument_node="">Technology is taking retail phygital</span></a></li><li data-dcnode-id="844"><a data-dcnode-id="845" href="#h-1-internet-of-things"><span data-dcnode-id="846" instrument_node="">1. Internet of Things&nbsp;</span></a></li><li data-dcnode-id="841"><a data-dcnode-id="842" href="#h-2-facial-recognition"><span data-dcnode-id="843" instrument_node="">2. Facial recognition</span></a></li><li data-dcnode-id="838"><a data-dcnode-id="839" href="#h-3-autonomous-delivery-robots-and-store-assistants"><span data-dcnode-id="840" instrument_node="">3. Autonomous delivery robots and store assistants</span></a></li><li data-dcnode-id="835"><a data-dcnode-id="836" href="#h-4-cashierless-stores"><span data-dcnode-id="837" instrument_node="">4. Cashierless stores&nbsp;</span></a></li><li data-dcnode-id="832"><a data-dcnode-id="833" href="#h-5-augmented-shopping"><span data-dcnode-id="834" instrument_node="">5. Augmented Shopping</span></a></li><li data-dcnode-id="829"><a data-dcnode-id="830" href="#h-6-voice-commerce"><span data-dcnode-id="831" instrument_node="">6. Voice Commerce</span></a></li><li data-dcnode-id="826"><a data-dcnode-id="827" href="#h-7-and-of-course-it-s-all-underpinned-by-ai"><span data-dcnode-id="828" instrument_node="">7. And of course, it’s all underpinned by AI</span></a></li></ul></div></ul></div><div class="col-lg-9 col-md-9 col-sm-12 contentSinglePost" data-dcnode-id="492"><div class="OuterPost" data-dcnode-id="493"><p data-dcnode-id="821"></p><p data-dcnode-id="816"><span data-dcnode-id="820" instrument_node="">Shopping has always been seriously big business – with total global retail sales reaching </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//financesonline.com/retail-statistics/"><span data-dcnode-id="819" instrument_node="">$26.29 trillion</span></a><span data-dcnode-id="817" instrument_node=""> in 2019. Yet, the actual retail experience has changed radically from just a generation ago. The only option then was to walk into a store, or if you were feeling particularly adventurous, perhaps buy from a mail order catalogue. Fast forward to today, however, and technological advancements in the retail industry have opened up a whole new world of possibilities.</span></p><p data-dcnode-id="815"></p><p data-dcnode-id="814"></p><h2 data-dcnode-id="812" id="h-technology-is-taking-retail-phygital"><span data-dcnode-id="813" instrument_node="">Technology is taking retail phygital</span></h2><p data-dcnode-id="811"></p><p data-dcnode-id="810"></p><p data-dcnode-id="805"><span data-dcnode-id="809" instrument_node="">The holy grail for retailers in recent years has been omnichannel. And with good reason. According to </span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.digitalcommerce360.com/2013/12/31/why-omnichannel-strategy-matters/"><span data-dcnode-id="808" instrument_node="">Aberdeen Group</span></a><span data-dcnode-id="806" instrument_node="">, companies that provide a consistent service quality across multiple channels retain 89 percent of their customers – companies that don’t are only able to retain 33 percent.&nbsp;</span></p><p data-dcnode-id="804"></p><p data-dcnode-id="803"></p><p data-dcnode-id="795"><span data-dcnode-id="802" instrument_node="">But, despite the largely </span><a aria-label="unified experience (opens in a new tab)" data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//acquire.io/platform/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="801" instrument_node="">unified experience</span></a><span data-dcnode-id="799" instrument_node=""> an omnichannel approach provides, it has still been possible to clearly delineate between these channels and touchpoints (e.g. ecommerce vs. in-store). Now, technology has started to blur these boundaries, </span><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//acquire.io/blog/prepare-e-shop-for-digital-customers/"><span data-dcnode-id="798" instrument_node="">bringing the online and offline world ever closer together</span></a><span data-dcnode-id="796" instrument_node=""> and augmenting our everyday reality.</span></p><p data-dcnode-id="794"></p><p data-dcnode-id="793"></p><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">This new phenomenon is known as phygital: a shopping journey in which physical experiences and digital technologies intertwine to enhance one another. Physical channels are enriched by digital technology, while digital channels become more human. The net result is a more personalized and engaging experience.&nbsp;</span></p><p data-dcnode-id="790"></p><p data-dcnode-id="789"></p><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">This march towards a phygital future is only possible thanks to unprecedented technological innovation. If you’re intrigued, here are seven technological advancements in the retail industry that will make you say wow.</span></p><p data-dcnode-id="786"></p><p data-dcnode-id="785"></p><h2 data-dcnode-id="783" id="h-1-internet-of-things"><span data-dcnode-id="784" instrument_node="">1. Internet of Things&nbsp;</span></h2><p data-dcnode-id="782"></p><p data-dcnode-id="781"></p><figure class="wp-block-image" data-dcnode-id="779"><img alt="Heat map of IoT Opportunities" data-dcnode-id="780" data-src="https://lh5.googleusercontent.com/r3EJcVAcJr_t_MNB04DvxxqJ_zn8V_1kkU7rEAxQ6q9ocv5eMRFWpYoJsmomhNgQo_t5TIDxnZKr_bJXWJi2UE9Dw1pv6RDSB-Q66hhylsuTew-6rF_3Z9o9maS2LbmQqE1lFSAd"></figure><p data-dcnode-id="778"></p><p data-dcnode-id="777"></p><p data-dcnode-id="774"><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/louiscolumbus/2016/11/27/roundup-of-internet-of-things-forecasts-and-market-estimates-2016/%232cb65eb4292d"><span data-dcnode-id="776" instrument_node="">Image source</span></a></p><p data-dcnode-id="773"></p><p data-dcnode-id="772"></p><p data-dcnode-id="767"><span data-dcnode-id="771" instrument_node="">The Internet of Things (IoT) is a network of literally billions of physical devices communicating with each other and sharing data. IoT has massive potential for the retail industry, providing a way to create even more engaging and innovative shopping experiences – one of the reasons why Juniper Research predicted retail spending on IoT technologies would reach </span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.juniperresearch.com/press/press-releases/retail-spend-on-iot-to-reach-2-5bn-by-2020"><span data-dcnode-id="770" instrument_node="">US$2.5 billion by 2020</span></a><span data-dcnode-id="768" instrument_node="">.</span></p><p data-dcnode-id="766"></p><p data-dcnode-id="765"></p><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">In fact, IoT is already being put to good use in many areas. One of these applications is beacons – small wireless devices powered by Bluetooth Low Energy (BLE) that transmit a continuous signal. Smartphones are able to pick up on the signal, which they pass into a cloud server. The cloud server can then push out targeted content to a specific smartphone. Microlocation can even drill down to particular aisles within a single store. The potential for data gathering is simply immense, allowing more granular customer segmentation and personalization than ever before.&nbsp;</span></p><p data-dcnode-id="762"></p><p data-dcnode-id="761"></p><p data-dcnode-id="756"><span data-dcnode-id="760" instrument_node="">US retailer </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.hubspot.com/marketing/beacon-technology"><span data-dcnode-id="759" instrument_node="">Macy’s uses these beacons</span></a><span data-dcnode-id="757" instrument_node="">. When a customer opens the Macy's app in-store, the app registers their exact location. Say, for example, the customer is in the beauty products section. The app can remind the customer of particular beauty brands or products they have previously liked online and help move the customer towards purchasing them in-store, perhaps through a tailored offer.</span></p><p data-dcnode-id="755"></p><p data-dcnode-id="754"></p><p data-dcnode-id="749"><span data-dcnode-id="753" instrument_node="">Another practical application of this technology comes in the form of RFID tags. These smart barcodes give you total visibility for products all the way through the purchasing process. Athletic apparel supplier </span><a data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fungscholars.org/wp-content/uploads/2019/01/Ten_digital_trends_shaping_the_future_of_retail.pdf"><span data-dcnode-id="752" instrument_node="">Lululemon uses RFID tags</span></a><span data-dcnode-id="750" instrument_node=""> to update and keep track of inventory levels in stores all over the world, improving inventory accuracy to 98 percent.</span></p><p data-dcnode-id="748"></p><p data-dcnode-id="747"></p><h2 data-dcnode-id="745" id="h-2-facial-recognition"><span data-dcnode-id="746" instrument_node="">2. Facial recognition</span></h2><p data-dcnode-id="744"></p><p data-dcnode-id="743"></p><figure class="wp-block-image" data-dcnode-id="741"><img alt="Facial recognition" data-dcnode-id="742" data-src="https://lh5.googleusercontent.com/3SmyApESGOV5lRrQmfEjQQ5I745L-0rLyvK4Loz1hC-snzfcysve27et996ZK4l2zYLGQIfGwwtn9GOCSPULQuhEu74wF7w5fiHAZTBpy8SKY3RYKwiBDb9YxD4dnTuBOKoHqWdc"></figure><p data-dcnode-id="740"></p><p data-dcnode-id="739"></p><p data-dcnode-id="736"><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/illustrations/face-detection-scan-scanning-4760281/"><span data-dcnode-id="738" instrument_node="">Image source</span></a></p><p data-dcnode-id="735"></p><p data-dcnode-id="734"></p><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Identifying customers at the point of sale – by using loyalty cards, for example – is no longer good enough for retailers. They want to know who the people in-store are before they buy so they can deliver a personalized shopping experience. Yet, most stores don’t have the luxury of recognizing every single face that comes through the door.&nbsp;</span></p><p data-dcnode-id="731"></p><p data-dcnode-id="730"></p><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">This is where facial recognition software can step into the breach, scanning thousands of reference points across a person's face to identify their unique ‘face-print’ (much like we all have our own unique fingerprints).</span></p><p data-dcnode-id="727"></p><p data-dcnode-id="726"></p><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Identifying customers this way gives your staff visibility into the types of products customers might purchase, and how much they are likely to spend – so they can roll out the VIP treatment for those high value shoppers.&nbsp;&nbsp;</span></p><p data-dcnode-id="723"></p><p data-dcnode-id="722"></p><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Facial recognition technology can even help your sales staff better respond to customers’ needs, deciphering any changes in your customers’ emotion and then notifying your staff so they can attend to distressed or confused shoppers right away.</span></p><p data-dcnode-id="719"></p><p data-dcnode-id="718"></p><p data-dcnode-id="707"><span data-dcnode-id="717" instrument_node="">Another obvious implication of this technology is around loss prevention – especially useful given American retailers lose almost </span><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shopify.co.uk/retail/119922883-retailers-lose-45-billion-annually-to-theft-heres-how-signage-can-offset-that"><span data-dcnode-id="716" instrument_node="">$50 billion</span></a><span data-dcnode-id="714" instrument_node=""> annually to theft (shoplifting accounts for 36.5 percent of those losses). Your security staff might not spot a shoplifter sneaking in again, but the software certainly can. It can even compare faces against a database of known shoplifters to provide proactive theft prevention. Facial recognition in retail decreases shoplifting by </span><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facefirst.com/blog/retail-loss-prevention-and-violent-crime-statistics/"><span data-dcnode-id="713" instrument_node="">34 percent</span></a><span data-dcnode-id="711" instrument_node="">. That means better value for your customers </span><em data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">and</span></em><span data-dcnode-id="708" instrument_node=""> more money in your pocket.</span></p><p data-dcnode-id="706"></p><p data-dcnode-id="705"></p><p data-dcnode-id="700"><span data-dcnode-id="704" instrument_node="">This may all seem rather Orwelian. Despite facial recognition being a way to provide people with the personalized experience they want (e.g. </span><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//grow.segment.com/Segment-2017-Personalization-Report.pdf"><span data-dcnode-id="703" instrument_node="">41 percent of consumers</span></a><span data-dcnode-id="701" instrument_node=""> expect representatives in a brand’s physical store to know what they have purchased online), there will also be shoppers who would see it as a gross violation of their privacy. So, to address any ethical concerns, facial recognition must only be used where someone has explicitly opted-in (rather than using assumed consent, for example).</span></p><p data-dcnode-id="699"></p><p data-dcnode-id="698"></p><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Shoppers could sign themselves up to the scheme and use their smartphone to perform the facial scan, or potentially even visit a dedicated booth in-store. Whatever the mechanism, it’s vital retailers retain trust by placing shoppers in control of the experience.&nbsp;</span></p><p data-dcnode-id="695"></p><p data-dcnode-id="694"></p><h2 data-dcnode-id="692" id="h-3-autonomous-delivery-robots-and-store-assistants"><span data-dcnode-id="693" instrument_node="">3. Autonomous delivery robots and store assistants</span></h2><p data-dcnode-id="691"></p><p data-dcnode-id="690"></p><figure class="wp-block-image" data-dcnode-id="688"><img alt="robotic store assistants" data-dcnode-id="689" data-src="https://lh6.googleusercontent.com/sdlOetaHInanJIfu9xoxyQaJkC3vIgiBc6pkdqIyBZivMg7-ThBaFrj7OgIoP8ejXKMGieiMNEXGz6GbsM889I_BS80-85T9qDysZXmOstf_6Nb1TPn-SfyZUrAA_7eYSKT3_xq8"></figure><p data-dcnode-id="687"></p><p data-dcnode-id="686"></p><p data-dcnode-id="683"><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.ca/pin/522628731736450534/"><span data-dcnode-id="685" instrument_node="">Image source</span></a></p><p data-dcnode-id="682"></p><p data-dcnode-id="681"></p><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Sci-fi has long painted a picture of a world where robots are commonplace in our daily interactions. That vision has never really become a reality. But, in retail at least, that might be about to change.&nbsp;</span></p><p data-dcnode-id="678"></p><p data-dcnode-id="677"></p><p data-dcnode-id="672"><span data-dcnode-id="676" instrument_node="">According to Boston Consulting Group (BCG), the global robotics market is estimated to reach USD 87 Billion by 2025 – more than half is likely to go to the retail market. The size of the global customer service robots market, meanwhile, is projected to increase from the estimated US$53.77 million in 2016 to </span><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tractica.com/research/customer-service-robots/"><span data-dcnode-id="675" instrument_node="">US$87.97</span></a><span data-dcnode-id="673" instrument_node=""> million by the end of 2022, according to market intelligence firm Tractica.&nbsp;</span></p><p data-dcnode-id="671"></p><p data-dcnode-id="670"></p><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Imagine robotic store assistants, with built-in 3D scanners that help them recognize products and even lead your customers to products by navigating through the store. What happens if the customer has a question the robot can’t answer? No problem. The robot simply starts up a video conference with a human staff member who can assist them as required.&nbsp;</span></p><p data-dcnode-id="667"></p><p data-dcnode-id="666"></p><p data-dcnode-id="661"><span data-dcnode-id="665" instrument_node="">Robots can also be used in the supply chain – checking stock, identifying errors in pricing, and locating misplaced items, for example. The data they gather helps to </span><a aria-label="improve the customer experience (opens in a new tab)" data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//acquire.io/blog/customer-experience-strategy/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="664" instrument_node="">improve the customer experience</span></a><span data-dcnode-id="662" instrument_node=""> by optimizing store layouts and processes.&nbsp;</span></p><p data-dcnode-id="660"></p><p data-dcnode-id="659"></p><p data-dcnode-id="651"><span data-dcnode-id="658" instrument_node="">Robotics has already transformed Distribution Center (DC) operations, with retail giant Amazon reportedly using </span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fungscholars.org/wp-content/uploads/2019/01/Ten_digital_trends_shaping_the_future_of_retail.pdf"><span data-dcnode-id="657" instrument_node="">more than 100,000 robots</span></a><span data-dcnode-id="655" instrument_node=""> to move stock around warehouses and group items for order fulfillment, leading to a </span><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cmswire.com/customer-experience/how-amazons-robot-army-is-driving-customer-experience/"><span data-dcnode-id="654" instrument_node="">20 percent</span></a><span data-dcnode-id="652" instrument_node=""> drop in operating costs. Now, technological advancements in the retail industry are starting to robotize last-mile delivery, too. Amazon has famously been trialing drones in preparation of launching an Amazon Prime Air, a service that promises to get items from order to delivery in 30 minutes or less – provided they are under 5 pounds in weight that is.&nbsp;&nbsp;</span></p><p data-dcnode-id="650"></p><p data-dcnode-id="649"></p><p data-dcnode-id="644"><span data-dcnode-id="648" instrument_node="">Not to be outdone, Alibaba announced a last-mile delivery robot called the </span><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theverge.com/circuitbreaker/2018/5/31/17413836/alibaba-driverless-robot-deliver-packages-speed"><span data-dcnode-id="647" instrument_node="">G Plus</span></a><span data-dcnode-id="645" instrument_node="">, with plans to use it for delivering parcels, groceries, and food within residential areas. Customers won’t be left twiddling their thumbs as they wait either – they can monitor the entire journey via smartphone.</span></p><p data-dcnode-id="643"></p><p data-dcnode-id="642"></p><h2 data-dcnode-id="640" id="h-4-cashierless-stores"><span data-dcnode-id="641" instrument_node="">4. Cashierless stores&nbsp;</span></h2><p data-dcnode-id="639"></p><p data-dcnode-id="638"></p><figure class="wp-block-image" data-dcnode-id="636"><img alt="Amazon Go cashierless stores" data-dcnode-id="637" data-src="https://lh5.googleusercontent.com/6in3NFMtJyM_E8boyQNP5IxTJTmjS6q2U7cVDjfx93hkHJYYHK6k-amtV_ljfc2SbROc3pG8QlP-Iu5e2GXaz64BAdvOG-7uNkQC_S9oEJiu9U8j8yg8qnJSs-ssgnV4g-0WMXPF"></figure><p data-dcnode-id="635"></p><p data-dcnode-id="634"></p><p data-dcnode-id="631"><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techxplore.com/news/2020-03-amazon-cashierless-tech-rival-retailers.html"><span data-dcnode-id="633" instrument_node="">Image source</span></a></p><p data-dcnode-id="630"></p><p data-dcnode-id="629"></p><p data-dcnode-id="624"><span data-dcnode-id="628" instrument_node="">The idea of queue-busting cashierless stores has been given extra impetus by social distancing measures imposed on the back of COVID-19. </span><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/press-releases/2020-04-07/87-of-shoppers-prefer-to-shop-in-stores-with-touchless-or-robust-self-checkout-options-during-covid-19-pandemic"><span data-dcnode-id="627" instrument_node="">One survey</span></a><span data-dcnode-id="625" instrument_node=""> looking at shifts in shopping habits due to the pandemic found that 87 percent of customers would likely choose stores with contactless or self-checkout options.&nbsp;</span></p><p data-dcnode-id="623"></p><p data-dcnode-id="622"></p><p data-dcnode-id="614"><span data-dcnode-id="621" instrument_node="">The ability for customers to simply walk out of the store with their items being scanned automatically and the total debited from their account will likely soon become widespread. Amazon originally pioneered this approach through the </span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justwalkout.com/"><span data-dcnode-id="620" instrument_node="">Just Walk Out</span></a><span data-dcnode-id="618" instrument_node=""> system, put into practice through </span><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/b%3Fie%3DUTF8%26node%3D16008589011"><span data-dcnode-id="617" instrument_node="">Amazon Go</span></a><span data-dcnode-id="615" instrument_node=""> stores.</span></p><p data-dcnode-id="613"></p><p data-dcnode-id="612"></p><p data-dcnode-id="607"><span data-dcnode-id="611" instrument_node="">Taking this approach even further, it’s also possible to develop an almost entirely touch-free shopping system. With COVID-19 concerns likely to stick around for a while, we may start to see customers scanning barcodes and </span><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.beaconstac.com/2019/04/best-qr-code-generator-how-to-select-the-right-qr-code-generator" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="610" instrument_node="">QR codes</span></a><span data-dcnode-id="608" instrument_node="">, not only to pay for products, but to receive information about those products right into their smartphones, too. This will both cut down on direct product handling and address sustainability and accountability concerns by being more transparent around production methods.</span></p><p data-dcnode-id="606"></p><p data-dcnode-id="605"></p><h2 data-dcnode-id="603" id="h-5-augmented-shopping"><span data-dcnode-id="604" instrument_node="">5. Augmented Shopping</span></h2><p data-dcnode-id="602"></p><p data-dcnode-id="601"></p><figure class="wp-block-image" data-dcnode-id="599"><img alt="Ikea using Augmented Reality" data-dcnode-id="600" data-src="https://lh3.googleusercontent.com/zFQnmQ2NJjscd-2j2vv3s18H2HD4VFKshfl1M2mseiR1fVAnt3Y255RP7WyUrGKG-RkuLMlZ_2cje6WZGefe-65oqDCyQKqPLNbY7o0XRcSwCVTNChj-hrTmJ2o5xmbt5WfMbH6R"></figure><p data-dcnode-id="598"></p><p data-dcnode-id="597"></p><p data-dcnode-id="594"><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//digiday.com/marketing/ikea-using-augmented-reality/"><span data-dcnode-id="596" instrument_node="">Image source</span></a></p><p data-dcnode-id="593"></p><p data-dcnode-id="592"></p><p data-dcnode-id="587"><span data-dcnode-id="591" instrument_node="">Perhaps the flagship technology for creating a phygital future comes in the form of AR/VR. And, it seems customers are on board with it. </span><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bizreport.com/2016/10/report-reveals-impact-of-augmented-reality-on-retail.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="590" instrument_node="">According to one report</span></a><span data-dcnode-id="588" instrument_node="">, nearly two-thirds (61 percent) of U.S adults surveyed said that augmented reality has influenced where they shop.&nbsp;</span></p><p data-dcnode-id="586"></p><p data-dcnode-id="585"></p><p data-dcnode-id="580"><span data-dcnode-id="584" instrument_node="">COVID-19 measures have played a huge role in increasing the demand for AR systems, allowing customers to adopt a “try-before-you-buy” approach in absentia, and helping replicate, and even build on, the </span><a aria-label="in-store experience  (opens in a new tab)" data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//acquire.io/blog/the-future-of-in-store-experience-post-covid-19/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="583" instrument_node="">in-store experience </span></a><span data-dcnode-id="581" instrument_node="">online.&nbsp;</span></p><p data-dcnode-id="579"></p><p data-dcnode-id="578"></p><p data-dcnode-id="573"><span data-dcnode-id="577" instrument_node="">Ikea, for example, created the </span><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wired.co.uk/article/ikea-place-augmented-reality-app-space-10"><span data-dcnode-id="576" instrument_node="">“Ikea’s Place” app</span></a><span data-dcnode-id="574" instrument_node="">, allowing shoppers to access 3,200 items from Ikea’s inventory via a live view function on their smartphone, and use AR functionality to see how specific items would look, positioning them virtually within rooms in their home, before committing to purchase.</span></p><p data-dcnode-id="572"></p><p data-dcnode-id="571"></p><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">AR promises to radically change the in-store experience, too. In fashion retail, smart mirrors will bring previously unthinkable levels of interactivity. Customers won’t even need to get undressed to try out a whole new wardrobe, with virtual changing rooms allowing them to superimpose items and outfits and gather the opinions of friends by sharing images to social media.&nbsp;</span></p><p data-dcnode-id="568"></p><p data-dcnode-id="567"></p><p data-dcnode-id="563"><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pymnts.com/news/retail/2017/oak-labs-retail-data-mirror/"><span data-dcnode-id="566" instrument_node="">Oak labs</span></a><span data-dcnode-id="564" instrument_node=""> use similar technology to create interactive changing rooms. The smart mirrors recommend other items customers often pair with the products customers are trying, helping complete their outfits, and bringing the convenience of online shopping in store. The process produces a wealth of rich data, too. For example, you can see what the conversion rates for particular items are from the dressing room to checkout and adjust the products and product range accordingly.&nbsp;&nbsp;</span></p><p data-dcnode-id="562"></p><p data-dcnode-id="561"></p><h2 data-dcnode-id="559" id="h-6-voice-commerce"><span data-dcnode-id="560" instrument_node="">6. Voice Commerce</span></h2><p data-dcnode-id="558"></p><p data-dcnode-id="557"></p><figure class="wp-block-image" data-dcnode-id="555"><img alt="Voice Commerce Sales are set to reach $5B in UK and §40B in US by 2022." data-dcnode-id="556" data-src="https://lh6.googleusercontent.com/bCUEhWRvE33BuqVZxXR6Dx7yFpaG4W9V4Jw97PfKW26YyaaQHCukSoo61mQ93_ecVUlENKMRAnmfI49Sf9RPwLs56oTGL1QvBJfQXdXuS__BXNcGyiQiaoE_DpLJgjmHMe3LHcEJ"></figure><p data-dcnode-id="554"></p><p data-dcnode-id="553"></p><p data-dcnode-id="550"><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consulterce.com/voice-commerce/"><span data-dcnode-id="552" instrument_node="">Image source</span></a></p><p data-dcnode-id="549"></p><p data-dcnode-id="548"></p><p data-dcnode-id="543"><span data-dcnode-id="547" instrument_node="">Ever since Apple’s Siri came on the scene, voice assistant technology has exploded in popularity, and has now even started to break free of smartphones and spread into other devices. One</span><a data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalpublicmedia.com/smart-audio-report/latest-report/"><span data-dcnode-id="546" instrument_node=""> survey</span></a><span data-dcnode-id="544" instrument_node=""> showed that 60 million people now have at least one smart speaker system at home. For many, product research, price comparison, and now even product purchases, are all just a few utterances away.&nbsp;</span></p><p data-dcnode-id="542"></p><p data-dcnode-id="541"></p><p data-dcnode-id="533"><span data-dcnode-id="540" instrument_node="">Walmart has capitalized on this development by creating the Walmart Voice Ordering service. Customers can use any device powered by </span><a data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.walmart.com/ideas/discover-online-grocery/google-assistant-voice-ordering-for-walmart-grocery-pickup-delivery/354497"><span data-dcnode-id="539" instrument_node="">Google Assistant</span></a><span data-dcnode-id="537" instrument_node=""> or</span><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corporate.walmart.com/newsroom/2019/11/11/hey-siri-add-to-walmart-introducing-a-new-shortcut-for-online-grocery"><span data-dcnode-id="536" instrument_node=""> Siri</span></a><span data-dcnode-id="534" instrument_node=""> to add products to the cart. Shoppers simply need to say “Hey Siri/Google, add to Walmart” and name the product. The items are then packed and delivered by the customer’s chosen method.&nbsp;</span></p><p data-dcnode-id="532"></p><p data-dcnode-id="531"></p><p data-dcnode-id="526"><span data-dcnode-id="530" instrument_node="">7-Eleven Inc.</span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prnewswire.com/news-releases/voice-your-7now-order-300960087.html"><span data-dcnode-id="529" instrument_node=""> also launched</span></a><span data-dcnode-id="527" instrument_node=""> a voice ordering within its 7NOW Delivery app. Customers can open a 7NOW app by saying “Hey, Alexa! / OK, Google! Open 7NOW.”, and similarly place goods into their basket purely using voice commands. Once it’s paid for, the shopping is delivered to customers within 30 minutes.&nbsp;</span></p><p data-dcnode-id="525"></p><p data-dcnode-id="524"></p><h2 data-dcnode-id="522" id="h-7-and-of-course-it-s-all-underpinned-by-ai"><span data-dcnode-id="523" instrument_node="">7. And of course, it’s all underpinned by AI</span></h2><p data-dcnode-id="521"></p><p data-dcnode-id="520"></p><p data-dcnode-id="515"><span data-dcnode-id="519" instrument_node="">It’s impossible to talk about technological advancements in the retail industry without bringing artificial intelligence into the conversation. And rightly so. AI powers so much of the change happening in the retail sector. In fact, Servion Global Solutions has predicted that by 2025, </span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aibusiness.com/document.asp%3Fdoc_id%3D760184%26site%3Daibusiness"><span data-dcnode-id="518" instrument_node="">95 percent of customer interactions</span></a><span data-dcnode-id="516" instrument_node=""> will be powered by AI.</span></p><p data-dcnode-id="514"></p><p data-dcnode-id="513"></p><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Perhaps the most common way shoppers encounter AI at the moment is through product recommendations – something we have almost come to take for granted. Now, AI technology is driving further change by allowing other technologies to reach their full potential. Scan-and-go shopping, facial recognition, and so many other advancements all rely on AI.</span></p><p data-dcnode-id="510"></p><p data-dcnode-id="509"></p><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Technology is at the very heart of the future of retail. And, as this technology continues to push the boundaries of what’s possible, shoppers’ expectations rise in tandem. They want retailers to deliver the kind of ground-breaking, phygital, and personalized experiences that make them say wow. Do that and you’ll be more likely to stay relevant well into the future.&nbsp;</span></p><p data-dcnode-id="506"></p><div data-dcnode-id="497"><span data-dcnode-id="505" instrument_node=""> </span><span data-dcnode-id="503" instrument_node=""> </span><span data-dcnode-id="501" instrument_node=""> </span><span data-dcnode-id="498" instrument_node=""> </span></div><div class="clearfix" data-dcnode-id="496"></div><div class="clearfix" data-dcnode-id="495"></div><section class="removeSummryBar removeSummryBarNew" data-dcnode-id="494"></section></div></div></div></div></div></section><div class="clearfix" data-dcnode-id="487"></div><section class="commentingSectionBlog" data-dcnode-id="425" id="commentable"><div class="container" data-dcnode-id="
