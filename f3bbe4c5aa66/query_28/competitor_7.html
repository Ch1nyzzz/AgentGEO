</span></td></tr><tr class="summary" data-dcnode-id="1234"><td colspan="3" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Michigan Technological University College of Forest Resources and Environmental Science and the Northern Institute of Applied Climate Science (NIACS; www.niacs.org) are seeking a Climate Change Specialist (Research Scientist I) to synthesize and communicate scientific information on how a changing climate may affect terrestrial ecosystems of the Midwest. This position will review and synthesize literature to describe potential land management responses that may reduce climate risks while helping systems adapt to a changing climate. The position will work collaboratively with the NIACS team to create science-based information products, provide training, and technical assistance to natural resource managers working across a variety of regional ecosystems, including: forests, grasslands, and wetlands. 

Applicants who are committed to promoting a sense of belonging and contributing to a diverse, equitable, and inclusive learning environment for all are strongly encouraged to apply (https://www.mtu.edu/diversity-inclusion/). Applications from women, BIPOC, and LGBTQ+ scholars are highly encouraged to apply.
This position may require travel (up to 10% of time) to locations in the Upper Midwest. 

This position has the potential to be filled by a remote employee working in the United States. During the interview process applicants will be able to discuss specific requirements for remote work in this position.

Full consideration will be provided to all candidates who apply on or before April 4, 2022.</span></td></tr></tbody></table></div><span data-dcnode-id="1228" instrument_node="">
