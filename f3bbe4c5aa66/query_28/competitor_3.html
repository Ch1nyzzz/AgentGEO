</span><section class="page-section page-section--col-light-grey videobghost" data-dcnode-id="1086" data-parallax="true" data-wcmmode="false" id="content-free-1-0ea0" style="
                    height:;

                    background-position:center top; 
                    background-image:; 
                    background-color:;                                 
                    "><span data-dcnode-id="1179" instrument_node="">
</span><div class="parsys sectionpar" data-dcnode-id="1088"><span data-dcnode-id="1178" instrument_node="">
</span><div class="parsys_column pwccol2-longform" data-dcnode-id="1091"><div class="parsys_column pwccol2-longform-c0" data-dcnode-id="1102"><div class="text parbase nobg section" data-dcnode-id="1104"><span data-dcnode-id="1177" instrument_node="">
</span><div class="text-component" data-dcnode-id="1108" data-emptytext="Edit Text"><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1173"><b data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">A wave of new technologies is emerging. Many of these technologies have already generated a great deal of discussion. Examples include the implementation of artificial intelligence, application of nanotechnology, utilisation of the possibilities involving big data and the roll-out of 3D printing.</span></b></p><span data-dcnode-id="1172" instrument_node="">
</span><h3 data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">No future visions but concrete investment decisions</span></h3><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">We are now on the verge of these technologies becoming visible all around us. It is therefore no longer sufficient to merely sketch future visions, but concrete investment decisions must now be taken. This also means that organisations must already possess or must quickly develop an understanding of the opportunities and threats that these technologies bring with them.</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Consequently, we are not just concerned with immediate opportunities, such as those provided by 3D printing for the retail and transport sectors. It is readily apparent all around us that successful organisations are aptly capable of deploying new technologies in order to improve results in several areas.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><h3 data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Eleven technological breakthroughs</span></h3><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">We have investigated eleven technological breakthroughs that, in the coming five to ten years, will have substantial impact on organisations, consumers and markets where organisations and consumers interact.</span></p><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">These include: big data, cloud computing, DNA sequencing, energy storage, advanced robot technology, internet of things, artificial intelligence, mobile internet, mobile payments, nanotechnology and 3D-printing.</span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">These technologies:</span></p><span data-dcnode-id="1151" instrument_node="">
</span><ul data-dcnode-id="1137"><span data-dcnode-id="1150" instrument_node="">
</span><li data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">increase the efficiency and effectiveness of organisations by means of far-reaching automation;</span></li><span data-dcnode-id="1147" instrument_node="">
</span><li data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">better match market supply and demand and facilitate transactions by more transparency and predictive ability;</span></li><span data-dcnode-id="1144" instrument_node="">
</span><li data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">increase the influence of consumers on business processes and final products / services by having then take responsibility for (parts of) business processes; or</span></li><span data-dcnode-id="1141" instrument_node="">
</span><li data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">improve the general well-being of people by making new products and services fully available.</span></li><span data-dcnode-id="1138" instrument_node="">
</span></ul><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">These areas of impact will be briefly discussed below.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><h3 data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Automated organisations</span></h3><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Technology makes it possible for organisations to automate a large number of business processes. In this way, labour intensive and therefore expensive as well as error-sensitive processes are replaced by means of technology. Technologies that make this increasingly possible include advanced robot technology, artificial intelligence and cloud computing.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><h3 data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Facilitating markets</span></h3><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Various technologies can be used to enable markets to function more efficiently. They make it easier for suppliers and consumers to find one another and execute transactions between each other. This not only involves bringing together products / services and the needs that now exist among consumers, but also estimating future needs and requirements on the basis of information that is becoming available in increasingly more accurate and reliable forms. New technologies that make this possible include the internet of things, big data and mobile payments.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><h3 data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Influential consumers</span></h3><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Technology is enabling consumers to assume increasingly more of the duties and responsibilities of organisations. The value chains of companies can, to an ever stronger extent, be taken over in whole or in part by the consumer, this no matter if they, for instance, involve design, financing or production. Technologies that make this increasingly possible include mobile internet, energy storage and 3D printing.</span></p><span data-dcnode-id="1115" instrument_node="">
</span><h3 data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">New products and services</span></h3><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Two new technologies in particular will take care of a large number of products and services that were, up to now, considered to be impossible. With the aid of nanotechnology and DNA sequencing, we will be able to produce better materials and products for affordable prices. The areas of application are very broad, extending from health care to air and space travel, from agriculture to electronics.</span></p><span data-dcnode-id="1109" instrument_node="">
</span></div><span data-dcnode-id="1107" instrument_node="">

82" instrument_node="">Advertising Cookies</span></h3></div></li></ul></div><div class="ot-tab-desc ot-sdk-eight ot-sdk-columns" data-dcnode-id="123"><div aria-labelledby="ot-pvcy-hdr" class="ot-desc-cntr" data-dcnode-id="169" id="ot-tab-desc" role="tabpanel" tabindex="0"><h4 data-dcnode-id="175" id="ot-pvcy-hdr"><span data-dcnode-id="176" instrument_node="">Your Privacy</span></h4><p class="ot-grp-desc" data-dcnode-id="170" id="ot-pc-desc"><span data-dcnode-id="174" instrument_node="">When you visit any web site, it may store or retrieve information on your browser, mostly in the form of cookies. This information might be about you, your preferences or your device and is mostly used to make the site work as you expect it to. The information does not usually directly identify you, but it can give you a more personalised web experience.
