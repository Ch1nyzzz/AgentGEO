</span><article class="article-block" data-dcnode-id="1909"><span data-dcnode-id="2148" instrument_node="">
</span><div class="article-body" data-dcnode-id="1911"><span data-dcnode-id="2147" instrument_node="">
</span><div class="container" data-dcnode-id="1927"><span data-dcnode-id="2146" instrument_node="">
</span><div class="row justify-content-center" data-dcnode-id="1929"><span data-dcnode-id="2145" instrument_node="">
</span><div class="col-lg-8 cms-styles" data-dcnode-id="1931"><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">The lifeblood of a healthy healthcare organization is a happy and well-engaged staff, from food service and facility maintenance employees to clinical professionals like physicians and nurses. To ensure a happy healthcare workforce, medical staffing, employee engagement and retention need to be top priorities of healthcare HR professionals.</span></p><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Unfortunately, many healthcare organizations lack concrete plans or programs for healthcare talent management, or the programs they have in place are antiquated and in need of updating. In this post, we educate healthcare HR professionals on ways to improve medical staffing by better engaging and retaining employees.</span></p><span data-dcnode-id="2138" instrument_node="">
</span><h2 data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Why Engagement and Retention is Important for Medical Staffing</span></h2><span data-dcnode-id="2135" instrument_node="">
</span><p data-dcnode-id="2130"><span data-dcnode-id="2134" instrument_node="">Healthcare employee turnover is high, according to a </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.leadersfortoday.com/resources/lft-industry-survey-may-2017/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2133" instrument_node="">Leaders for Today (LPT) survey report</span></a><span data-dcnode-id="2131" instrument_node="">, which included 852 participants of both clinical and non-clinical healthcare workers. The survey found that 43 percent of respondents reported they have been with their current organization for fewer than two years and 65.7 percent reported they have been with their hospital for fewer than five years. More than one-third of LPT survey respondents plan to leave their current organization within two years, and 68.6 percent plan to leave in five years.</span></p><span data-dcnode-id="2129" instrument_node="">
</span><section class="insights-offset-cta alignright bg-blue-dark default" data-dcnode-id="2103"><span data-dcnode-id="2128" instrument_node="">
</span><div class="container" data-dcnode-id="2105"><span data-dcnode-id="2127" instrument_node="">
</span><div class="row justify-content-center" data-dcnode-id="2107"><span data-dcnode-id="2126" instrument_node="">
</span><div class="col-lg text-center" data-dcnode-id="2109"><span data-dcnode-id="2125" instrument_node="">
</span><h3 class="heading-4" data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">
                    Dig Deeper                </span></h3><span data-dcnode-id="2122" instrument_node="">
</span><p class="heading-2" data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">How RPO Can Solve The Top Challenges In Healthcare Talent Acquisition</span></p><span data-dcnode-id="2119" instrument_node="">
</span><div class="btn-row" data-dcnode-id="2111"><span data-dcnode-id="2118" instrument_node="">
</span><a class="btn btn-primary btn-gradient" data-dcnode-id="2116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peoplescout.com/insights/healthcare-ebook/"><span data-dcnode-id="2117" instrument_node="">

</span><p data-dcnode-id="2094"><span data-dcnode-id="2101" instrument_node="">What’s more, the financial costs of high turnover can be significant for healthcare organizations. The </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//medicaleconomics.modernmedicine.com/medical-economics/news/hospitals-employing-physicians-see-greater-losses" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2100" instrument_node="">turnover of a physician represents a $200,000 loss</span></a><span data-dcnode-id="2098" instrument_node=""> for a healthcare organization, according to a 2016 report from B.E. Smith, while </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nsinursingsolutions.com/Files/assets/library/retention-institute/NationalHealthcareRNRetentionReport2016.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2097" instrument_node="">the loss of a nurse can cost up to $58,400 annually according to NSI Nursing Solution’s report</span></a><span data-dcnode-id="2095" instrument_node="">. By better engaging employees, healthcare organizations will not only raise morale and lower employee turnover, but they will also improve their bottom line.</span></p><span data-dcnode-id="2093" instrument_node="">
</span><h2 data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Four Key Areas of Medical Staffing and Employee Engagement</span></h2><span data-dcnode-id="2090" instrument_node="">
</span><p data-dcnode-id="2082"><span data-dcnode-id="2089" instrument_node="">Developing an effective medical staffing strategy is a challenge, especially with the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peoplescout.com/insights/managing-skills-shortage-health-care/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2088" instrument_node="">healthcare industry experiencing a shortage of medical professionals</span></a><span data-dcnode-id="2086" instrument_node="">. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peoplescout.com/insights/healthcare-workforce-planning/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2085" instrument_node="">Healthcare workforce planning</span></a><span data-dcnode-id="2083" instrument_node=""> can help resolve some medical staffing issues. However, organizations also need to factor in the following areas to ensure strong employee engagement and retention:</span></p><span data-dcnode-id="2081" instrument_node="">
</span><ul data-dcnode-id="2068"><li data-dcnode-id="2077"><strong data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Onboarding new employees: </span></strong><span data-dcnode-id="2078" instrument_node="">Involves training, educating and getting new employees comfortably situated in their new position.</span></li><li data-dcnode-id="2073"><strong data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Engaging employees: </span></strong><span data-dcnode-id="2074" instrument_node="">Involves managing and developing employees to become more engaged with the organization.</span></li><li data-dcnode-id="2069"><strong data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Retaining employees:</span></strong><span data-dcnode-id="2070" instrument_node=""> Involves expanding responsibilities of employees as well as offering incentives to stay with an organization.</span></li></ul><span data-dcnode-id="2067" instrument_node="">
</span><h2 data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Medical Staffing Basics: Onboarding New Healthcare Employees</span></h2><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Making sure new hires are comfortable, connected and productive as soon as possible is essential for the success of a comprehensive medical staffing program. New hires need to know how they fit into an organization and understand how their roles support the healthcare organization’s goals. When a healthcare organization takes the time to cultivate relationships with new hires, those employees feel like part of the team from day one and are more likely to stay in their positions.</span></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Having a strong support structure is vital for new hires, managers should work to create a support network for their new hires in their departments to help them get up to speed as soon as possible. Managers should also be as available as possible to answer questions and provide feedback to new hires.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Instead of waiting for new hires to introduce themselves to their new co-workers, healthcare HR professionals should actively introduce new hires to their teams before their start date. This can be done with email notifications or a brief in-person meeting. Veteran employees should also conduct regular follow-ups with new hires once they have started to make sure they are acclimating well to their new environment.</span></p><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2052"><strong data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">Additional on-boarding suggestions:</span></strong></p><span data-dcnode-id="2051" instrument_node="">
</span><ul data-dcnode-id="2040"><li data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Appoint point persons and mentors to welcome and orient new hires for the first 90-days of employment.</span></li><li data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Before a new hire’s start date, send him/her a card or letter welcoming them to the organization and include important paperwork, employee handbook and benefits package along with an agenda letting them know what to expect on their first day.</span></li><li data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Make sure the employee’s work area is ready.</span></li><li data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Create lunch plans for new hire’s first few days, helping her/him feel at ease and welcome. This can also can serve as a way to introduce them to the team.</span></li><li data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Promptly educate new hires on the healthcare organization’s culture and unwritten rules. For example, what is the preferred method of communication – email, phone, chat programs or in-person meetings?</span></li></ul><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2034"><span data-dcnode-id="2038" instrument_node="">Successfully onboarding employees can be one of the most effective weapons in a healthcare organization’s arsenal. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shrm.org/foundation/ourwork/initiatives/resources-from-past-initiatives/Documents/Onboarding%2520New%2520Employees.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2037" instrument_node="">Studies have illustrated that well-designed onboarding programs</span></a><span data-dcnode-id="2035" instrument_node=""> can quickly transform new hires into dedicated employees, reducing the costs associated with turnover and improving overall employee morale.</span></p><span data-dcnode-id="2033" instrument_node="">
</span><h2 data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Engaging Healthcare Employees</span></h2><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Employee engagement is one of the most important elements of successful medical staffing. Highly engaged employees often have persistent feelings of work fulfillment. This work fulfillment can often translate into increased enthusiasm and passion in employees, resulting in higher than average levels of focus and energy put into their jobs.</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2026" instrument_node="">Employee engagement has become more important to healthcare HR professionals because there is </span><a data-dcnode-id="2024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//explorance.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2025" instrument_node="">growing evidence that employee engagement correlates</span></a><span data-dcnode-id="2023" instrument_node=""> to positive outcomes for individual, group and organizational performance in the areas of productivity, retention, turnover, patient care and loyalty. Here are a few practices healthcare organizations can do to better engage employees.</span></p><span data-dcnode-id="2021" instrument_node="">
</span><p data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Professional development: For healthcare professionals—especially clinical employees—the opportunity to learn and grow professionally is very important. To better engage employees, healthcare organizations should look to create a positive learning environment for employees who seek additional skills and professional experiences. Learning opportunities can pay long-term dividends, the skills and new experiences gained by employees through education and training can be utilized to improve performance in their current position, or they can transition into vacant positions, lessening the need for hiring new personnel.</span></p><span data-dcnode-id="2018" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2017" style="height:20px"></div><span data-dcnode-id="2016" instrument_node="">
</span><h4 data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Offer better work-life balance</span></h4><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Healthcare workers experience the same challenges in their personal lives as employees in other industries, they are trying to balance childcare, school schedules and needing time away from work. Adding some freedom to an employee’s daily, weekly or monthly schedule is often seen as a big plus for employees and can be more important than compensation in some cases.</span></p><span data-dcnode-id="2010" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2009" style="height:20px"></div><span data-dcnode-id="2008" instrument_node="">
</span><h4 data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Working relationships and mentorship</span></h4><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Strong bonds and relationships between team members are important for professional growth. Veteran employees who have been with an organization for years have a lot of experience, knowledge and advice to impart to younger and less experienced employees looking for career guidance. To build better employee engagement, healthcare organizations should create a formal mentoring program. Healthcare organizations can ask seasoned employees to guide younger ones in their careers to help engage both the mentor and mentee, giving a sense of purpose and direction to both parties.</span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="1999"><strong data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Additional employee engagement suggestions:</span></strong></p><span data-dcnode-id="1998" instrument_node="">
</span><ul data-dcnode-id="1977"><li data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Make staff meetings a time to celebrate successes and highlight individual achievements.</span></li><li data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Have managers involve employees in determining their career path goals and development plan.</span></li><li data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Promote values such as integrity, empowerment, perseverance, equality, discipline and accountability into the organization.</span></li><li data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Let employees know they matter and make a difference within the organization.</span></li><li data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">Give employees responsibilities and new challenges.</span></li><li data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">Give employees thank you cards for going the extra mile.</span></li><li data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Implement employee suggestions and ideas to show you care and value their input.</span></li><li data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">Create opportunities for employees to become a “leader” in something they are interested in and knowledgeable about.</span></li><li data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Ask employees work-appropriate questions about their family life, hobbies and interests.</span></li><li data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Always provide staff the care, tools and resources needed to be successful in their position.</span></li></ul><span data-dcnode-id="1976" instrument_node="">
</span><p data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">By better engaging employees, medical staffing efforts will see reduced turnover and higher levels of job satisfaction among employees.&nbsp;Remember, managers are key in engaging employees and must pay attention to staff needs to help create a positive working environment.</span></p><span data-dcnode-id="1973" instrument_node="">
</span><h2 data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Retaining Healthcare Employees</span></h2><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Employee retention is certainly one of the most important ingredients for success for healthcare organizations. Improving employee retention allows organizations to avoid the high cost associated with replacing employees, improves patient care and enhancing the overall quality of service to the communities served. Below are a few ways healthcare organizations can improve their employee retention efforts.</span></p><span data-dcnode-id="1967" instrument_node="">
</span><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Offer flexible scheduling: Scheduling can be a rather difficult part of medical staffing. A healthcare workers’ schedule can be exhausting, as they often have to work long and unpredictable hours. To better retain employees, healthcare organizations should consider offering a wide array of scheduling options. Employees will appreciate an organization’s attempts to accommodate their personal lives and needs, and in turn, become more loyal to an organization as a result. Employees who have more control of their schedules tend to feel more job satisfaction and often stay with an organization longer.</span></p><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Remove frustrating obstacles: Many employees may truly love their jobs, but due to obstacles and unnecessary challenges associated with performing their duties, they become burned out. For instance, nurses might get inundated with never-ending paperwork. This may result in nurses feeling unsatisfied with their work. A solution to this challenge could be to implement a new technology to streamline the paperwork process. Without an overload, nurses will most likely feel greater satisfaction because their workload is more balanced between administrative and clinical work.</span></p><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Conduct stay interviews: Interviewing employees is often reserved for before hiring or after an employee resigns their position. Stay interviews should be conducted at least once a year with employees on a one-on-one basis in a neutral setting.&nbsp;Employees should be asked questions about their frustrations and issues and about ideas on how improvements can be made for them.</span></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1954"><strong data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Questions to include in stay interviews</span></strong><span data-dcnode-id="1955" instrument_node="">:</span></p><span data-dcnode-id="1953" instrument_node="">
</span><ul data-dcnode-id="1942"><li data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">What about your job makes you eager to get to work?</span></li><li data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">What makes you want to hit the snooze button instead of coming to work?</span></li><li data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">If you were to leave the organization, what would you miss the most?</span></li><li data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">What would be the one thing, if it changed in your current position, would make you consider leaving?</span></li><li data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">What would be the one thing you would change about your department if you could?</span></li></ul><span data-dcnode-id="1941" instrument_node="">
</span><p data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">Employees who are treated well will often feel a sense of obligation or duty to their organization. As a healthcare employer, each action an organization takes to improve employee job satisfaction, morale and productivity is a step towards improving retention and improving medical staffing outcomes.</span></p><span data-dcnode-id="1938" instrument_node="">
</span><h2 data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Conclusion</span></h2><span data-dcnode-id="1935" instrument_node="">
</span><p data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">For healthcare organizations, medical staffing is only as successful as their ability to engage and retain the best healthcare professionals. To achieve this end, organizations must be consistently vigilant of their employees’ needs and must develop talent carefully to keep employees engaged and committed to their job.</span></p><span data-dcnode-id="1932" instrument_node="">
</span></div><span data-dcnode-id="1930" instrument_node="">
</span></div><span data-dcnode-id="1928" instrument_node="">
</span></div><span data-dcnode-id="1926" instrument_node="">

</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="85" tabindex="0"><span data-dcnode-id="265" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="264"></div><span data-dcnode-id="263" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="87" role="dialog"><span data-dcnode-id="262" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="258" role="button" tabindex="0"><span data-dcnode-id="261" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="260"></i><span data-dcnode-id="259" instrument_node=""> </span></span><span data-dcnode-id="257" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="89"><span data-dcnode-id="256" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="91"><strong class="acsb-title-main" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Compliance status</span></strong><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="236" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="230" instrument_node="">
</span><ol data-dcnode-id="204"><span data-dcnode-id="229" instrument_node="">
</span><li data-dcnode-id="217"><strong class="acsb-title" data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="226" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="225"><br data-dcnode-id="224"><span data-dcnode-id="223" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="222"><br data-dcnode-id="221"><span data-dcnode-id="220" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="219"><br data-dcnode-id="218"></li><span data-dcnode-id="216" instrument_node="">
</span><li data-dcnode-id="206"><strong class="acsb-title" data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="213" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="212"><br data-dcnode-id="211"><span data-dcnode-id="210" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="209"><br data-dcnode-id="208"><span data-dcnode-id="207" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="205" instrument_node="">
</span></ol><span data-dcnode-id="203" instrument_node="">
</span><strong data-dcnode-id="200" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="201" lang="EN-US"><span data-dcnode-id="202" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="199" instrument_node="">
</span><ul data-dcnode-id="167"><span data-dcnode-id="198" instrument_node="">
</span><li data-dcnode-id="194"><strong class="acsb-title" data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="195" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="193" instrument_node="">
</span><li data-dcnode-id="189"><strong class="acsb-title" data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="190" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="188" instrument_node="">
</span><li data-dcnode-id="184"><strong class="acsb-title" data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="185" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="183" instrument_node="">
</span><li data-dcnode-id="179"><strong class="acsb-title" data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="180" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="178" instrument_node="">
</span><li data-dcnode-id="174"><strong class="acsb-title" data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="175" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="173" instrument_node="">
</span><li data-dcnode-id="169"><strong class="acsb-title" data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="170" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="168" instrument_node="">
</span></ul><span data-dcnode-id="166" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="163"><span data-dcnode-id="164" lang="EN-US"><span data-dcnode-id="165" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="162" instrument_node="">
</span><ol data-dcnode-id="104"><span data-dcnode-id="161" instrument_node="">
</span><li data-dcnode-id="154"><strong class="acsb-title" data-dcnode-id="157"><span data-dcnode-id="159" lang="EN-US"><span data-dcnode-id="160" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="158" instrument_node="">–</span></strong><span data-dcnode-id="155" lang="EN-US"><span data-dcnode-id="156" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="153" instrument_node="">
</span><li data-dcnode-id="146"><span data-dcnode-id="149" lang="EN-US"><strong class="acsb-title" data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="150" instrument_node="">&nbsp;</span></span><span data-dcnode-id="147" lang="EN-US"><span data-dcnode-id="148" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="145" instrument_node="">
</span><li data-dcnode-id="139"><span data-dcnode-id="141" lang="EN-US"><strong class="acsb-title" data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">Animations –</span></strong><span data-dcnode-id="142" instrument_node="">&nbsp;</span></span><span data-dcnode-id="140" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="138" instrument_node="">
</span><li data-dcnode-id="131"><span data-dcnode-id="134" lang="EN-US"><strong class="acsb-title" data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="135" instrument_node="">&nbsp;</span></span><span data-dcnode-id="132" lang="EN-US"><span data-dcnode-id="133" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="130" instrument_node="">
</span><li data-dcnode-id="123"><span data-dcnode-id="126" lang="EN-US"><strong class="acsb-title" data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="127" instrument_node="">&nbsp;</span></span><span data-dcnode-id="124" lang="EN-US"><span data-dcnode-id="125" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="122" instrument_node="">
</span><li data-dcnode-id="115"><span data-dcnode-id="118" lang="EN-US"><strong class="acsb-title" data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="119" instrument_node="">&nbsp;</span></span><span data-dcnode-id="116" lang="EN-US"><span data-dcnode-id="117" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="114" instrument_node="">
</span><li data-dcnode-id="106"><strong class="acsb-title" data-dcnode-id="111"><span data-dcnode-id="112" lang="EN-US"><span data-dcnode-id="113" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="107" lang="EN-US"><strong class="acsb-title" data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">–</span></strong><span data-dcnode-id="108" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="105" instrument_node="">
</span></ol><span data-dcnode-id="103" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="101"><span data-dcnode-id="102" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="100" instrument_node="">
</span><p data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="97" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="95"><span data-dcnode-id="96" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="94" instrument_node="">
</span><p data-dcnode-id="92"><span data-dcnode-id="93" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="90" instrument_node=""> </span></div><span data-dcnode-id="88" instrument_node=""> </span></div><span data-dcnode-id="86" instrument_node="">
