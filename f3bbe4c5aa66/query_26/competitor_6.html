</span><p class="post-meta" data-dcnode-id="5333"><span data-dcnode-id="5337" instrument_node="">Posted By </span><a data-dcnode-id="5335" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5336" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5334" instrument_node=""> on Aug 12, 2020</span></p><span data-dcnode-id="5332" instrument_node=""> </span><p data-dcnode-id="5330"><span data-dcnode-id="5331" instrument_node="">The Department of Veteran Affairs (VA) Office of Inspector General (OIG) has conducted a review of VA facilities and community providers to identify any barriers that are hampering the use of health information exchanges (HIEs). OIG identified several issues that need to be addressed to improve the exchange of health information. HIEs are used to share healthcare information for the purpose of coordinating and improving the continuity of care for veterans enrolled in a VA facility. Following a pilot program, the VA introduced the Veterans Health Information Exchange (VHIE), which uses two methods for sharing veterans’ data between VA facilities and members of VA healthcare teams: VA Exchange and VA Direct. OIG conducted a survey and interviews at 48 lower complexity Level 2 and 3 Veterans Health Administration (VHA) facilities, along with interviews of staff in the VHIE Program Office. OIG also met with the Office of Information Technology, Office of Community Care, Office of Rural Health, Cerner, and two state HIEs. According to the VHIE Program Office Director, all 140 VA...</span></p><span data-dcnode-id="5329" instrument_node=""> </span></div><span data-dcnode-id="5327" instrument_node=""> </span><span data-dcnode-id="5325" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5285"><span data-dcnode-id="5289" instrument_node="">Posted By </span><a data-dcnode-id="5287" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5288" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5286" instrument_node=""> on Jul 10, 2020</span></p><span data-dcnode-id="5284" instrument_node=""> </span><p data-dcnode-id="5282"><span data-dcnode-id="5283" instrument_node="">Following the decision of the HHS’ Centers for Medicare and Medicaid Services (CMS) to expand access to telehealth services and increase coverage in response to the COVID-19 pandemic, states introduced temporary emergency waivers to their telehealth laws. There have been increasing calls for the changes to telehealth regulations to be made permanent and several states, including Massachusetts, Colorado, and Idaho, and recently taken steps to see the recent changes to telehealth laws continue&nbsp;after the COVID-19 public health emergency is declared over. Massachusetts Makes COVID-19 Telehealth Policy Changes Permanent On March 16, 2020, the Massachusetts Board of Registration in Medicine (BORIM) approved a new policy that states the same standard of care applies to in-person and telehealth visits and a face-to-face encounter is not a pre-requisite for a telehealth visit.&nbsp;The policy was introduced on a temporary basis in response to COVID-19, but on June 26, 2020, BORIM made the policy change permanent. This is the first telehealth-specific policy to be adopted by BORIM and...</span></p><span data-dcnode-id="5281" instrument_node=""> </span></div><span data-dcnode-id="5279" instrument_node=""> </span><span data-dcnode-id="5277" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5237"><span data-dcnode-id="5241" instrument_node="">Posted By </span><a data-dcnode-id="5239" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5240" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5238" instrument_node=""> on Jun 18, 2020</span></p><span data-dcnode-id="5236" instrument_node=""> </span><p data-dcnode-id="5234"><span data-dcnode-id="5235" instrument_node="">The Senate Health, Education, Labor, and Pensions (HELP) Committee is considering which of the 31 recent changes to telehealth policies should be kept in place when the COVID-19 national public health emergency comes to an end. The temporary changes to policies on telehealth have served to expand access during the COVID-19 public health emergency. These changes were necessary to help prevent the spread of COVID-19 and ensure that Americans are given easy access to medical services. During the COVID-19 crisis, patients have embraced the new approach and many have taken advantage of virtual visits and are using remote monitoring tools. The June 17, 2020 Senate HELP Committee meeting was convened to explore which of the recent changes should be made permanent or at least be extended once the COVID-19 crisis comes to an end. All members of the committee supported making at least some of the recent changes permanent, with HELP Committee Chairman Sen. Lamar Alexander (R-Tenn.) advocating two permanent changes: The elimination of limitations on originating sites and the expansion of the...</span></p><span data-dcnode-id="5233" instrument_node=""> </span></div><span data-dcnode-id="5231" instrument_node=""> </span><span data-dcnode-id="5229" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5189"><span data-dcnode-id="5193" instrument_node="">Posted By </span><a data-dcnode-id="5191" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5192" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5190" instrument_node=""> on Jun 18, 2020</span></p><span data-dcnode-id="5188" instrument_node=""> </span><p data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">On June 16, 2020, The National Association of Attorneys General (NAAG) wrote to Google and Apple to express concern about consumer privacy related to COVID-19 contact tracing and exposure notification apps. NAAG has made recommendations to help protect the personally identifiable information and sensitive health data of the millions of consumers who will be urged to download the apps to help control COVID-19. “Digital contact tracing may provide a valuable tool to understand the spread of COVID-19 and assist the public health response to the pandemic,” explained the state AGs in the letter. “However, such technology also poses a risk to consumers’ personally identifiable information, including sensitive health information, that could continue long after the present public health emergency ends.” Privacy protections are essential for ensuring that users of the apps do not have sensitive data exposed or used for purposes other than helping to control the spread of COVID-19. Without privacy protections, consumers will simply not download the apps, which will decrease their...</span></p><span data-dcnode-id="5185" instrument_node=""> </span></div><span data-dcnode-id="5183" instrument_node=""> </span><span data-dcnode-id="5181" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5141"><span data-dcnode-id="5145" instrument_node="">Posted By </span><a data-dcnode-id="5143" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5144" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5142" instrument_node=""> on Jun 4, 2020</span></p><span data-dcnode-id="5140" instrument_node=""> </span><p data-dcnode-id="5138"><span data-dcnode-id="5139" instrument_node="">A bipartisan group of Senators have introduced a bill that aims to regulate contact tracing and exposure notification apps that will be used to control the spread of COVID-19. The Exposure Notification Privacy Act is one of three bills that aim to regulate contact tracing apps to protect the privacy of Americans. The other two bills failed to gather enough support. It is hoped a bipartisan bill will have a greater chance of being passed. Contact tracing and exposure notification technologies are currently being explored as a way of controlling the spread of COVID-19. Google and Apple have both developed the technology to support contact tracing via mobile phones using low energy Bluetooth. When a user downloads a contact tracing app it will log encounters with other individuals who have also downloaded the app. When someone is diagnosed with COVID-19, the encounter data in the app is used to notify all individuals who may have been infected by that person. Contact tracing and exposure notification apps have been used in other countries and have helped reduce the spread of COVID-19,...</span></p><span data-dcnode-id="5137" instrument_node=""> </span></div><span data-dcnode-id="5135" instrument_node=""> </span><span data-dcnode-id="5133" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5045"><span data-dcnode-id="5049" instrument_node="">Posted By </span><a data-dcnode-id="5047" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5048" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5046" instrument_node=""> on Apr 23, 2020</span></p><span data-dcnode-id="5044" instrument_node=""> </span><p data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">LuxSci, a Massachusetts-based provider of HIPAA-compliant email communication services, has announced that its HIPAA-compliant transactional email service has been made available free of charge to organizations delivering COVID-19-related health or safety information. The COVID-19 pandemic has placed healthcare organizations under a great deal of strain. During these difficult times it is essential for critical information to be communicated quickly and efficiently. Laboratories conducting diagnostic COVID-19 tests need to communicate test results as quickly as possible to ensure infected patients can be isolated and provided with appropriate medical care. A HIPAA-compliant email service can help laboratories meet the demands the pandemic has placed on them and speed up time-sensitive communications. “Email communication sounds mundane, but right now it can literally save lives and help us bootstrap our way back to normal more safely.&nbsp; As the country starts to open up and we struggle to socially distance, knowing your results days or hours sooner may be the difference between...</span></p><span data-dcnode-id="5041" instrument_node=""> </span></div><span data-dcnode-id="5039" instrument_node=""> </span><span data-dcnode-id="5037" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4997"><span data-dcnode-id="5001" instrument_node="">Posted By </span><a data-dcnode-id="4999" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5000" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4998" instrument_node=""> on Mar 23, 2020</span></p><span data-dcnode-id="4996" instrument_node=""> </span><p data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">On March 22, 2020, the HHS’ Centers for Medicare and Medicaid Services (CMS) announced it is easing the burden on clinicians, healthcare providers, and facilities that are participating in the Quality Payment Program and other reporting programs due to the 2019 Novel Coronavirus (COVID-19) pandemic. The CMS is granting exceptions and extensions to reporting requirements for the 1.2 million clinicians that are participating in the Quality Payment Program and are on the front lines fighting against the virus and COVID-19 respiratory disease. “The Trump Administration is cutting bureaucratic red tape so the healthcare delivery system can direct its time and resources toward caring for patients,” explained CMS Administrator Seema Verma. The CMS has recognized that quality measure data collection and reporting for services during the COVID-19 crisis may not reflect the true level of performance in areas such as cost, readmissions, and the patient experience. The move will also ease the burden on clinicians during these exceptional circumstances. Policy exceptions and...</span></p><span data-dcnode-id="4993" instrument_node=""> </span></div><span data-dcnode-id="4991" instrument_node=""> </span><span data-dcnode-id="4989" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4949"><span data-dcnode-id="4953" instrument_node="">Posted By </span><a data-dcnode-id="4951" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4952" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4950" instrument_node=""> on Mar 16, 2020</span></p><span data-dcnode-id="4948" instrument_node=""> </span><p data-dcnode-id="4946"><span data-dcnode-id="4947" instrument_node="">TigerConnect, the provider of the most widely used secure healthcare communications platform in the United States, has announced that U.S. health systems and hospitals can use its platform free of charge to help support COVID-19 related communications during the novel coronavirus pandemic. TigerConnect has been tracking COVID-19 and the impact it is having on the U.S. healthcare system. Unsurprisingly given the rapid spread of the virus, use of its secure communications platform has surged. The company also reports that it is receiving an increasing number of calls from customers looking to expand licenses to make sure all staff have access to the platform to expedite internal and external communication and support isolation workflows. The TigerConnect platform can be used to create dedicated channels for COVID-19 communications to provide support for patients and staff members. The platform ensures instant and immediate communication of preparedness plans, staff schedules, guidelines on infection control and isolation protocols, and other critical information. Users of the...</span></p><span data-dcnode-id="4945" instrument_node=""> </span></div><span data-dcnode-id="4943" instrument_node=""> </span><span data-dcnode-id="4941" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4901"><span data-dcnode-id="4905" instrument_node="">Posted By </span><a data-dcnode-id="4903" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4904" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4902" instrument_node=""> on Mar 9, 2020</span></p><span data-dcnode-id="4900" instrument_node=""> </span><p data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">On March 6, 2020, the Office of Information and Regulatory Affairs’ Office of Management and Budget announced it has completed its review of the rules proposed by two HHS agencies in February 2019 to tackle interoperability and information blocking. On March 9, 2020 the HHS’ Centers for Medicare and Medicaid Services (CMS) and the HHS’ Office of the National Coordinator of Health Information Technology (ONC) released their final rules which change how healthcare delivery organizations, health insurers, and patients exchange health data. The interoperability and information blocking rules were required by the Medicare Access and CHIP Reauthorization Act of 2015 (MACRA) and the 21st Century Cures Act of 2016. They are intended to make it easier for healthcare data to be exchanged between providers, insurers, and patients and are a key part of creating a patient-centric healthcare system and put patients in control of their own health records. “These rules are the start of a new chapter in how patients experience American healthcare, opening up countless new opportunities for...</span></p><span data-dcnode-id="4897" instrument_node=""> </span></div><span data-dcnode-id="4895" instrument_node=""> </span><span data-dcnode-id="4893" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4853"><span data-dcnode-id="4857" instrument_node="">Posted By </span><a data-dcnode-id="4855" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4856" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4854" instrument_node=""> on Mar 5, 2020</span></p><span data-dcnode-id="4852" instrument_node=""> </span><p data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">12 vulnerabilities – collectively called SweynTooth – have been identified by researchers at the Singapore University of Technology and Design which are present in the Bluetooth Low Energy (BLE) software development kits used by at least 7 manufacturers of software-on-a-chip (SOC) chipsets. SOCs are used in smart home devices, fitness trackers, wearable health devices, and medical devices and give them their wireless connectivity. SoCs with the SweynTooth vulnerabilities are used in insulin pumps, pacemakers, and blood glucose monitors as well as hospital equipment such as ultrasound machines and patient monitors. It is not yet known exactly how many medical devices and wearable health devices are impacted by the flaws as manufacturers obtain their SoCs from several sources. Some security researchers believe millions of medical devices could be vulnerable. SoCs are used in around 500 different products. Hundreds of millions of devices could be affected. The vulnerabilities are present in SoCs from Cypress, Dialog Semiconductors, Microchip, NXP Semiconductors,...</span></p><span data-dcnode-id="4849" instrument_node=""> </span></div><span data-dcnode-id="4847" instrument_node=""> </span><span data-dcnode-id="4845" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4805"><span data-dcnode-id="4809" instrument_node="">Posted By </span><a data-dcnode-id="4807" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4808" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4806" instrument_node=""> on Feb 6, 2020</span></p><span data-dcnode-id="4804" instrument_node=""> </span><p data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">The medical device manufacturer Medtronic has issued patches to correct flaws in its CareLink 2090 and CareLink Encore 29901 programmers, implantable cardioverter defibrillators (ICDs), and cardiac resynchronization therapy defibrillators (CRT-Ds). The vulnerabilities were first identified by security researchers in 2018 and 2019. When Medtronic was informed about the vulnerabilities, mitigations were quickly published to reduce the risk of exploitation of the vulnerabilities and allow customers to continue to use the affected products safely. The development and release of patches for these complex and safety-critical devices has taken a long time due to the required regulatory approval process. “Development and validation can take a significant amount of time and also includes a required regulatory review process before we can distribute updates to products. Medtronic worked to develop security remediations quickly while also ensuring the patches continue to maintain comprehensive safety and functionality,” explained Medtronic. In 2018, Security researchers Billy Rios and...</span></p><span data-dcnode-id="4801" instrument_node=""> </span></div><span data-dcnode-id="4799" instrument_node=""> </span><span data-dcnode-id="4797" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4757"><span data-dcnode-id="4761" instrument_node="">Posted By </span><a data-dcnode-id="4759" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4760" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4758" instrument_node=""> on Jan 24, 2020</span></p><span data-dcnode-id="4756" instrument_node=""> </span><p data-dcnode-id="4754"><span data-dcnode-id="4755" instrument_node="">Critical vulnerabilities have been identified in GE Healthcare patient monitoring products by a security researcher at CyberMDX. Elad Luz, Head of Research at CyberMDX, identified six vulnerabilities, five of which have been rated critical and one high severity. The five critical vulnerabilities have been assigned the maximum CVSS v3 score of 10 out of 10. The other vulnerability has a CVSS v3 score of 8.5 out of 10. Exploitation of the flaws could render the affected products unusable. Remote attackers could also alter the functionality of vulnerable devices, including changing or disabling alarm settings, and steal protected health information stored on the devices. CyberMDX initially investigated the CARESCAPE Clinical Information Center (CIC) Pro product, but discovered the flaws affected patient monitors, servers, and telemetry systems. The vulnerabilities have been collectively named MDHex and are tracked under the CVEs: CVE-2020-6961, CVE-2020-6962, CVE-2020-6963, CVE-2020-6964, CVE-2020- 6965, and CVE-2020-6966. GE Healthcare has confirmed that the vulnerabilities could...</span></p><span data-dcnode-id="4753" instrument_node=""> </span></div><span data-dcnode-id="4751" instrument_node=""> </span><span data-dcnode-id="4749" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4709"><span data-dcnode-id="4713" instrument_node="">Posted By </span><a data-dcnode-id="4711" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4712" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4710" instrument_node=""> on Dec 4, 2019</span></p><span data-dcnode-id="4708" instrument_node=""> </span><p data-dcnode-id="4706"><span data-dcnode-id="4707" instrument_node="">Cyberattacks on healthcare organizations have increased in frequency and severity in the past year, according to recently published research from Malwarebytes. In its latest report – Cybercrime Tactics and Techniques: The 2019 State of Healthcare – Malwarebytes offers insights into the main threats that have plagued the healthcare industry over the past year and explains how hackers are penetrating the defenses of healthcare organizations to gain access to sensitive healthcare data. Cyberattacks on healthcare organizations can have severe consequences. As we have seen on several occasions this year, attacks can cause severe disruption to day to day operations at hospitals often resulting in delays in healthcare provision. In at least two cases, cyberattacks have resulted in healthcare organizations permanently closing their doors and a recent study has shown that cyberattacks contribute to an increase in heart attack mortality rates. Even though the attacks can cause considerable harm to patients, attacks are increasing in frequency and severity. Malwarebytes data shows the...</span></p><span data-dcnode-id="4705" instrument_node=""> </span></div><span data-dcnode-id="4703" instrument_node=""> </span><span data-dcnode-id="4701" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4661"><span data-dcnode-id="4665" instrument_node="">Posted By </span><a data-dcnode-id="4663" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4664" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4662" instrument_node=""> on Nov 21, 2019</span></p><span data-dcnode-id="4660" instrument_node=""> </span><p data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">The Stop Marketing And Revealing The Wearables And Trackers Consumer Health (Smartwatch) Data Act, has been introduced by Sens. Bill Cassidy, M.D., (R-Louisiana) and Jacky Rosen, (D-Nevada). The new legislation will ensure that health data collected through fitness trackers, smartwatches, and health apps cannot be sold or shared without consumer consent. The Health Insurance Portability and Accountability Act (HIPAA) applies to health data collected, received, stored, maintained, or transmitted by HIPAA-covered entities and their business associates. Some of the same information is collected, stored, and transmitted by fitness trackers, wearable devices, and health apps. That information can be used, shared, or sold, without consent. Consumers have no control over who can access their health data. The new legislation aims to address that privacy gap. The bill prohibits the transfer, sale, sharing, or access to any non-anonymized consumer health information or other individually identifiable health information that is collected, recorded, or derived from personal consumer devices to...</span></p><span data-dcnode-id="4657" instrument_node=""> </span></div><span data-dcnode-id="4655" instrument_node=""> </span><span data-dcnode-id="4653" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4613"><span data-dcnode-id="4617" instrument_node="">Posted By </span><a data-dcnode-id="4615" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4616" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4614" instrument_node=""> on Nov 20, 2019</span></p><span data-dcnode-id="4612" instrument_node=""> </span><p data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">Leaders of the House Committee on Energy and Commerce are seeking answers from Google and Ascension on Project Nightingale. The Department of Health and Human Services’ Office for Civil Rights has also confirmed that an investigation has been launched to determine if HIPAA Rules have been followed. The collaboration between Google and Ascension was revealed to the public last week. The Wall Street Journal reported that Ascension was transferring millions of patient health records to Google as part of an initiative called Project Nightingale. A whistleblower at Google had contacted the WSJ to raise concerns about patient privacy. A variety of internal documents were shared with reporters on the extent of the partnership and the number of Google employees who had access to Ascension patients’ data. Under the partnership, the records of approximately 50 million patients will be provided to Google, 10 million of which have already been transferred. According to the WSJ report, 150 Google employees are involved with the project and have access to patient data. The whistleblower stated...</span></p><span data-dcnode-id="4609" instrument_node=""> </span></div><span data-dcnode-id="4607" instrument_node=""> </span><span data-dcnode-id="4605" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4565"><span data-dcnode-id="4569" instrument_node="">Posted By </span><a data-dcnode-id="4567" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4568" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4566" instrument_node=""> on Nov 18, 2019</span></p><span data-dcnode-id="4564" instrument_node=""> </span><p data-dcnode-id="4562"><span data-dcnode-id="4563" instrument_node="">TigerConnect has released its 2019 State of Healthcare Communications Report, which shows that continuing reliance on decades-old, inefficient communications technology is negatively impacting patients and is contributing to the increasing cost of healthcare provision. For the report, TigerConnect surveyed more than 2,000 patients and 200 healthcare employees to assess the current state of communications in healthcare and gain insights into areas where communication inefficiencies are causing problems. The responses clearly show that communication in healthcare is broken. 52% of healthcare organizations are experiencing communication disconnects that impact patients on a daily basis or several times a week. Those communication inefficiencies are proving frustrating for healthcare employees and patients alike. The report reveals most hospitals are still heavily reliant on communications technology from the 1970s. 89% of hospitals still use faxes and 39% are still using pagers in some departments, roles, or even across the entire organization. The world may have moved on, but...</span></p><span data-dcnode-id="4561" instrument_node=""> </span></div><span data-dcnode-id="4559" instrument_node=""> </span><span data-dcnode-id="4557" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4517"><span data-dcnode-id="4521" instrument_node="">Posted By </span><a data-dcnode-id="4519" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4520" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4518" instrument_node=""> on Nov 1, 2019</span></p><span data-dcnode-id="4516" instrument_node=""> </span><p data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">The National Institute of Standards and Technology (NIST) has released its final Big Data Interoperability Framework (NBDIF) to help with the creation of data analysis software tools that can run on any computing platform and be easily moved from one computing platform to another. NBDIF is the culmination of several years of work and collaboration with more than 800 experts from the government, academia, and private sector. The final document is divided into nine volumes covering big data definitions and taxonomies, use case &amp; requirements, privacy and security, reference architecture, roadmap standards, a reference architecture interface, and modernization and adoption. The main purpose of NBDIF is to guide developers on the creation and deployment of widely useful tools for big data analysis that can be used on different computing platforms; from a single laptop computer to multi-node cloud-based environments. Developers need to create their big data analysis tools to allow them to easily be moved from one platform to another and allow data analysts to be able to switch to...</span></p><span data-dcnode-id="4513" instrument_node=""> </span></div><span data-dcnode-id="4511" instrument_node=""> </span><span data-dcnode-id="4509" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4469"><span data-dcnode-id="4473" instrument_node="">Posted By </span><a data-dcnode-id="4471" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4472" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4470" instrument_node=""> on Oct 16, 2019</span></p><span data-dcnode-id="4468" instrument_node=""> </span><p data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">Gartner has published its 2019 Market Guide for Cloud Service Providers to Healthcare Delivery Organizations (HDOs). The report contains an analysis of the healthcare cloud market and explains how the cloud can be a viable option for healthcare organizations seeking greater efficiency and flexibility than is achievable with traditional on-premises infrastructure. Many healthcare organizations are now realizing the value of cloud-based solutions and how intelligent use of the cloud can help improve efficiency, eliminate waste, and drive down the cost of healthcare delivery. The industry may lag behind other sectors in terms of cloud adoption, but the landscape is changing fast as the healthcare cloud market matures. Healthcare CIOs are now viewing the cloud as an extension of their internal infrastructure. While initially there was a great deal of skepticism about the cloud due to the security risks and potential for costs to spiral out of control, there is now widespread acceptance that the cloud can serve as an IT service delivery model and the healthcare industry is now much more...</span></p><span data-dcnode-id="4465" instrument_node=""> </span></div><span data-dcnode-id="4463" instrument_node=""> </span><span data-dcnode-id="4461" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4421"><span data-dcnode-id="4425" instrument_node="">Posted By </span><a data-dcnode-id="4423" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4424" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4422" instrument_node=""> on Sep 18, 2019</span></p><span data-dcnode-id="4420" instrument_node=""> </span><p data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">A recent investigation by ProPublica, the German public broadcaster Bayerischer Rundfunk, and vulnerability and analysis firm, Greenbone Networks has revealed millions of medical images contained in image storage systems are freely accessible online and require no authentication to view or download the images. Those images, which include X-rays, MRI, and CT scans, are stored in picture archiving and communications systems (PACS) connected to the Internet. Greenbone Networks audited 2,300 Internet-connected PACS between July and September 2019 and set up a RadiAnt DICOM Viewer to access the images stored on open PACS servers. Those servers were found to contain approximately 733 million medical images of which 399.5 million could be viewed and downloaded. The researchers found 590 servers required no authentication whatsoever to view medical images. PACS use the digital imaging and communications in medicine (DICOM) standard to view, process, store, and transmit the images. In most cases, a DICOM viewer would be required to access the images, but in some cases, all that is required...</span></p><span data-dcnode-id="4417" instrument_node=""> </span></div><span data-dcnode-id="4415" instrument_node=""> </span><span data-dcnode-id="4413" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4373"><span data-dcnode-id="4377" instrument_node="">Posted By </span><a data-dcnode-id="4375" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4376" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4374" instrument_node=""> on Sep 18, 2019</span></p><span data-dcnode-id="4372" instrument_node=""> </span><p data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">The National Cybersecurity Center of Excellence (NCCoE) has issued new draft NIST mobile device security guidance to help organizations mitigate the risks introduced by corporate-owned personally enabled (COPE) devices. Mobile devices allow employees to access resources essential for their work duties, no matter where those individuals are located. As such, the devices allow organizations to improve efficiency and productivity, but the devices bring unique threats to an organization. The devices typically have an always-on Internet connection and the devices often lack the robust security controls that are applied to devices such as desktop computers. Malicious or risky apps can be downloaded to mobile devices by users without the knowledge or authorization of the IT department. App downloads could introduce malware and app permissions could allow unauthorized access to sensitive data. Organizations therefore need to have total visibility into all mobile devices used by employees for work activities and they must ensure that mobile device security risks are effectively mitigated....</span></p><span data-dcnode-id="4369" instrument_node=""> </span></div><span data-dcnode-id="4367" instrument_node=""> </span><span data-dcnode-id="4365" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4325"><span data-dcnode-id="4329" instrument_node="">Posted By </span><a data-dcnode-id="4327" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4328" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4326" instrument_node=""> on Sep 9, 2019</span></p><span data-dcnode-id="4324" instrument_node=""> </span><p data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">Becton Dickinson (BD) has discovered a vulnerability in its Pyxis drug dispensing cabinets which could allow an unauthorized individual to use expired credentials to access patient data and medications. The vulnerability was discovered by BD, which self-reported the flaw to the Department of Homeland Security’s Cybersecurity and Infrastructure Security Agency (CISA). ICS-CERT has recently issued an advisory about the flaw. The vulnerability affects Pyxis ES versions 1.3.4 to 1.6.1 and Pyxis Enterprise Server with Windows Server versions 4.4 through 4.12. The vulnerability – tracked as CVE-2019-13517 – is a session fixation flaw in which existing access privileges are not properly coordinated with the expiration of access when a vulnerable device is joined to an Active Directory (AD) domain. This means the credentials of a previously authenticated user could be used to gain access to a vulnerable device under certain configurations. This would allow an attacker to obtain the same level of privileges as the user whose credentials are being used, which could give access to patient...</span></p><span data-dcnode-id="4321" instrument_node=""> </span></div><span data-dcnode-id="4319" instrument_node=""> </span><span data-dcnode-id="4317" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4277"><span data-dcnode-id="4281" instrument_node="">Posted By </span><a data-dcnode-id="4279" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4280" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4278" instrument_node=""> on Sep 3, 2019</span></p><span data-dcnode-id="4276" instrument_node=""> </span><p data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">82% of healthcare providers that have implemented Internet-of-Things (IoT) devices have experienced a cyberattack on at least one of those devices over the course of the past 12 months, according to the Global Connected Industries Cybersecurity Survey from Swedish software company Irdeto. For the report, Irdeto surveyed 700 security leaders from healthcare organizations and firms in the transportation, manufacturing, and IT industries in the United States, United Kingdom, Germany, China, and Japan. Attacks on IoT devices were common across all those industry sectors, but healthcare organizations experienced the most cyberattacks out of all industries under study. The biggest threat from these IoT cyberattacks is theft of patient data. The attacks also have potential to compromise end user safety, result in the loss of intellectual property, operational downtime and damage to the organization’s reputation. The failure to effectively secure the devices could also potentially result in a regulatory fine. When asked about the consequences of a cyberattack on IoT devices, the biggest...</span></p><span data-dcnode-id="4273" instrument_node=""> </span></div><span data-dcnode-id="4271" instrument_node=""> </span><span data-dcnode-id="4269" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4229"><span data-dcnode-id="4233" instrument_node="">Posted By </span><a data-dcnode-id="4231" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4232" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4230" instrument_node=""> on Jul 26, 2019</span></p><span data-dcnode-id="4228" instrument_node=""> </span><p data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">The National Institute of Standards and Technology’s (NIST) National Cybersecurity Center of Excellence (NCCoE) has issued draft mobile device security guidance to help organizations improve the security of corporately-owned personally-enabled (COPE) mobile devices and reduce the risk the devices pose to network security. Mobile devices are now essential in modern business. They provide easy access to resources and data and allow employees to work more efficiently. Mobile devices are increasingly being used to perform everyday enterprise tasks, which means they are used to access, view, and transmit sensitive data. The devices introduce new threats to the enterprise that do not exist for traditional IT devices such as desktop computers and mobile devices are subject to different types of attacks. A different approach is therefore required to ensure mobile devices are secured and risks are effectively managed. Mobile devices are typically always on and always connected to the Internet and they are often used to access corporate networks remotely via untrusted networks. Malicious...</span></p><span data-dcnode-id="4225" instrument_node=""> </span></div><span data-dcnode-id="4223" instrument_node=""> </span><span data-dcnode-id="4221" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4181"><span data-dcnode-id="4185" instrument_node="">Posted By </span><a data-dcnode-id="4183" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4184" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4182" instrument_node=""> on Jul 24, 2019</span></p><span data-dcnode-id="4180" instrument_node=""> </span><p data-dcnode-id="4178"><span data-dcnode-id="4179" instrument_node="">Healthcare organizations often turn to a HIPAA compliant cloud vendor or Managed Service Provider to help them ensure electronic patient records are secured and they are in compliance with the Health Insurance Portability and Accountability Act (HIPAA). HIPAA contains an extensive set of rules for healthcare organizations which were introduced in 1996 to improve privacy and security of patient information, eliminate waste in healthcare, and combat fraud. This legislative act introduced new and legally binding requirements for healthcare providers to secure their systems, improve privacy and security protections, and keep health data private and confidential at all times. The Act and its subsequent updates have served to strengthen privacy protections, give patients new rights, and ensure that all healthcare organizations achieve a minimum standard of data security. It may seem that HIPAA is at odds with cloud computing, but there is nothing in HIPAA legislation that prohibits use of the cloud for sharing or storing patient data. HIPAA covered entities can use cloud platforms and...</span></p><span data-dcnode-id="4177" instrument_node=""> </span></div><span data-dcnode-id="4175" instrument_node=""> </span><span data-dcnode-id="4173" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4133"><span data-dcnode-id="4137" instrument_node="">Posted By </span><a data-dcnode-id="4135" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4136" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4134" instrument_node=""> on Jun 24, 2019</span></p><span data-dcnode-id="4132" instrument_node=""> </span><p data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node="">Cybercriminals are managing to find and exploit vulnerabilities to gain access to healthcare networks and patient data with increasing regularity. The past two months have been the worst and second worst ever months for healthcare data breaches in terms of the number of breaches reported. Phishing attacks on healthcare organizations have increased and email is now the most common location of breached protected health information. However, a recent analysis of the data breaches reported to the Department of Health and Human Services’ Office for Civil Rights (OCR) in the past 12 months has revealed servers to be the biggest risk. Servers were found to be involved in more than half of all healthcare data breaches. Clearwater Cyberintelligence Institute (CCI) analyzed the 90 healthcare data breaches reported to OCR in the past 12 months. Those breaches resulted in the exposure, impermissible disclosure, or theft of the records of more than 9 million individuals. The CCI analysis revealed 54% of all reported breaches of 500 or more healthcare records were in some way related to servers....</span></p><span data-dcnode-id="4129" instrument_node=""> </span></div><span data-dcnode-id="4127" instrument_node=""> </span><span data-dcnode-id="4125" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4085"><span data-dcnode-id="4089" instrument_node="">Posted By </span><a data-dcnode-id="4087" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4088" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4086" instrument_node=""> on Jun 6, 2019</span></p><span data-dcnode-id="4084" instrument_node=""> </span><p data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">The cloud-based data protection and disaster recovery specialist, iland, has launched a new, highly automated disaster recovery solution. The new offering – Autopilot Managed Recovery for Disaster Recovery as a Service (DRaaS) – is a fully managed business continuity solution that has been developed to help businesses speed up application recovery following a data loss event or downtime. Autopilot Managed Recovery is integrated with Veeam and Zerto, but customers do not interact directly with that technology, which simplified disaster recovery. The solution is ideally suited to organizations with limited DR experience and internal disaster recovery resources and allows them to keep their business online and mission-critical applications available. The solution is easy to implement and maintain, and extensive support is offered, both pre-sales in the project management, planning and design stage, through to deployment and the entire customer life cycle. As the name suggests, Autopilot Managed Recovery includes fully-managed failover/failback of virtual machines, managed...</span></p><span data-dcnode-id="4081" instrument_node=""> </span></div><span data-dcnode-id="4079" instrument_node=""> </span><span data-dcnode-id="4077" instrument_node="">

</span><p class="post-meta" data-dcnode-id="4037"><span data-dcnode-id="4041" instrument_node="">Posted By </span><a data-dcnode-id="4039" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="4040" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="4038" instrument_node=""> on May 22, 2019</span></p><span data-dcnode-id="4036" instrument_node=""> </span><p data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">Most hospitals and physicians have now adopted electronic medical records, yet only half of patients have been offered access to their medical records online, according to a new report from the HHS’ Office of the National Coordinator for Health Information Technology (ONC). Two of the aims of the 21st Century Cures Act were to make it easier for patents to access their health information and to improve education of patients about their rights to access their health data. The ONC conducted its Health Information Trends Survey (HINTS) to determine whether patients are being offered access to their medical records online and whether they have exercised that right and have viewed medical records that have been made available. In 2018, there was no change in the number of patients being offered access to their medical records online. As was the case in 2017, 51% of patients were given that opportunity. However, the number of patients using that access to view or download their medical records increased. 30% of patients who were given the option had viewed their records at least once,...</span></p><span data-dcnode-id="4033" instrument_node=""> </span></div><span data-dcnode-id="4031" instrument_node=""> </span><span data-dcnode-id="4029" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3941"><span data-dcnode-id="3945" instrument_node="">Posted By </span><a data-dcnode-id="3943" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3944" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3942" instrument_node=""> on May 10, 2019</span></p><span data-dcnode-id="3940" instrument_node=""> </span><p data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">The second Senate HELP Committee hearing on the proposed roles for implementing the electronic medical records provisions of the 21st Century Cures Act has taken place this week. The Committee heard from National Coordinator for Health IT, Donald Rucker, and Director and Center for Medicare And Medicaid Services Chief Medical Officer, Kate Goodrich, M.D. The hearings aim to find a way forward to ensure the efficient accessing and sharing of health information between care providers and patients. The prevention of information blocking is one of the main goals. By allowing health information to flow freely between providers and be shared with patients, the cost of healthcare can be significantly reduced. According to Dr. Brett James of the National Academies, as much as 50% of the costs of healthcare are unnecessary. Patients are having to repeat tests because their information cannot be shared between different healthcare providers and there is considerable duplication of administrative tasks as a result of information blocking. Earlier this year both the CMS and ONC proposed new...</span></p><span data-dcnode-id="3937" instrument_node=""> </span></div><span data-dcnode-id="3935" instrument_node=""> </span><span data-dcnode-id="3933" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3893"><span data-dcnode-id="3897" instrument_node="">Posted By </span><a data-dcnode-id="3895" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3896" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3894" instrument_node=""> on May 7, 2019</span></p><span data-dcnode-id="3892" instrument_node=""> </span><p data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">The National institute of Standards and Technology (NIST) has issued a request for information (RFI) seeking feedback from industry stakeholders to inform the development of new standards and tools to support systems that use artificial intelligence (AI) technologies. February’s Executive Order on Maintaining American Leadership in Artificial Intelligence requires NIST to create a plan for developing technical standards and tools to support the creation of reliable, robust and trustworthy AI-based systems, along with tools that will are necessary or helpful in reducing barriers to the safe testing and deployment of AI-based systems. NIST is seeking comments from stakeholders to improve its understanding of the current uses of AI, the opportunities offered by AI-based systems, and the challenges currently faced. &nbsp;NIST hopes stakeholder comments will help to determine current priority areas. The RFI has three main areas of focus: The status of and plans for AI technical standards and related tools development Defining and achieving U.S. leadership in AI standards Prioritizing federal...</span></p><span data-dcnode-id="3889" instrument_node=""> </span></div><span data-dcnode-id="3887" instrument_node=""> </span><span data-dcnode-id="3885" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3845"><span data-dcnode-id="3849" instrument_node="">Posted By </span><a data-dcnode-id="3847" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3848" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3846" instrument_node=""> on Apr 25, 2019</span></p><span data-dcnode-id="3844" instrument_node=""> </span><p data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">MD Anderson Cancer Center, the world’s leading cancer research center, has recently fired three scientists over espionage fears after being alerted by the National Institutes of Health (NiH) to irregularities involving grant recipients. NiH, the largest public funder of biomedical research in the United States, had been instructed by federal officials to investigate certain professors who were believed to be in violation of granting agency policies. NiH, assisted by the FBI, discovered potential conflicts of interest and unreported foreign income by five members of MD Anderson staff. NiH sent emails to MD Anderson in 2018 and demanded a response within 30 days. The failure to take action could potentially result in NiH withholding essential funding. MD Anderson received $148 million in NiH grants in 2018. In response to the accusations, MD Anderson conducted an investigation and initiated termination procedures for three professors, two of whom resigned from their posts before proceedings started. The fourth professor was investigated but termination was not deemed to be warranted....</span></p><span data-dcnode-id="3841" instrument_node=""> </span></div><span data-dcnode-id="3839" instrument_node=""> </span><span data-dcnode-id="3837" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3797"><span data-dcnode-id="3801" instrument_node="">Posted By </span><a data-dcnode-id="3799" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3800" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3798" instrument_node=""> on Apr 24, 2019</span></p><span data-dcnode-id="3796" instrument_node=""> </span><p data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">The HHS’ Office of the National Coordinator for Health IT (ONC) has released the second draft of its Trusted Exchange Framework and Common Agreement (TEFCA) and is seeking comments on the updated text. The purpose of TEFCA is to help ensure there is seamless, interoperable exchange of health information, which is critical to the creation of a health system that empowers providers and patients and delivers better healthcare at a lower cost. The 21st Century Cures Act promoted a national framework and common agreement for the trusted exchange of health information. The framework is required as there is currently no core exchange mechanism that can be used by healthcare providers, health plans, vendors, public health departments, and federal, state, local and tribal governments. Trusted exchange is too complex. Currently, multiple exchange methods need to be used. The majority of hospitals use three or four exchange methods and three in ten use more than five methods. This approach is inefficient and expensive. Healthcare organizations are having to build several point-to-point...</span></p><span data-dcnode-id="3793" instrument_node=""> </span></div><span data-dcnode-id="3791" instrument_node=""> </span><span data-dcnode-id="3789" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3749"><span data-dcnode-id="3753" instrument_node="">Posted By </span><a data-dcnode-id="3751" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3752" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3750" instrument_node=""> on Apr 23, 2019</span></p><span data-dcnode-id="3748" instrument_node=""> </span><p data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">The Department of Health and Human Services has extended the deadline for submitting comments on its proposed rules to promote the interoperability of health information technology and electronic protected health information. Two new rules were released on February 11, 2019 by the Office of the National Coordinator for Health IT (ONC) and the Centers for Medicare and Medicaid Services (CMS). The purpose of the new rules is to support the secure access, exchange, and use of electronic health information. The rules cover technical and healthcare industry factors that are proving to be barriers to the interoperability of health information and are limiting the ability of patients to gain access to their health data. The deadline has been extended to give the public and industry stakeholders more time to read the proposed rules and provide meaningful input that can be used to help achieve the objectives of the rules. The extension has come in response to feedback from many stakeholders who have asked for more time to review the rules, which have potential to cause a range of issues for...</span></p><span data-dcnode-id="3745" instrument_node=""> </span></div><span data-dcnode-id="3743" instrument_node=""> </span><span data-dcnode-id="3741" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3605"><span data-dcnode-id="3609" instrument_node="">Posted By </span><a data-dcnode-id="3607" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3608" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3606" instrument_node=""> on Apr 9, 2019</span></p><span data-dcnode-id="3604" instrument_node=""> </span><p data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">AI-based medical devices can be used to identify diseases and individuals at risk of developing medical conditions. They can perform a great deal of time-consuming work on behalf of doctors and radiologists and can help to speed up the diagnosis of diseases. Faster diagnoses mean patients can receive treatment more quickly at a time when it is most likely to be effective. They can also help to identify the most effective treatments to allow personalized medicine to be provided. Currently, the U.S. Food &amp; Drug Administration (FDA) performs reviews of medical devices as part of its market authorization processes. Generally, in order to be granted market authorization the algorithms used by the devices need to be locked and not have the ability to learn each time they are used. These locked algorithms can be subsequently updated by developers at intervals using new data, but after those updates have been applied, the devices need to be subjected to a further manual review and the updated algorithm must be validated. The FDA authorized two AI-based medical devices in 2018: An...</span></p><span data-dcnode-id="3601" instrument_node=""> </span></div><span data-dcnode-id="3599" instrument_node=""> </span><span data-dcnode-id="3597" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3557"><span data-dcnode-id="3561" instrument_node="">Posted By </span><a data-dcnode-id="3559" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3560" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3558" instrument_node=""> on Apr 5, 2019</span></p><span data-dcnode-id="3556" instrument_node=""> </span><p data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">Six new HIPAA compliant Alexa skills have been launched by Amazon that allow protected health information to be transmitted without violating HIPAA Rules. The new HIPAA compliant Alexa skills were developed by six different companies that have participated in the Amazon Alexa healthcare program. The new skills allow patients to schedule appointments, find urgent care centers, receive updates from their care providers, access their latest blood sugar reading, and check the status of their prescriptions. This is not the first time that Alexa skills have been developed, but a stumbling block has been the requirements of the HIPAA Privacy Rule, which limit the use of voice technology with protected health information. Now, thanks to HIPAA compliant data transfers, the voice assistant can now be used by a select group of healthcare organizations to communicate PHI without violating the HIPAA Privacy Rule. &nbsp;You can read more about the issues related to virtual assistants and HIPAA compliance here. Amazon has stated that it plans to work with many other developers through an invite-only...</span></p><span data-dcnode-id="3553" instrument_node=""> </span></div><span data-dcnode-id="3551" instrument_node=""> </span><span data-dcnode-id="3549" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3509"><span data-dcnode-id="3513" instrument_node="">Posted By </span><a data-dcnode-id="3511" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3512" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3510" instrument_node=""> on Apr 5, 2019</span></p><span data-dcnode-id="3508" instrument_node=""> </span><p data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">There is growing concern about hackers gaining access to medical devices and conducting attacks to cause harm to patients. Now malware has been created that can add fake tumors to CT scans. The malware is not being used in real-world attacks. It has been created by researchers at the Ben Gurion University Cybersecurity&nbsp;Center in Israel to demonstrate just how easy it is to exploit vulnerabilities in medical imaging equipment. In addition to adding tumors to medical images the malware could be used to remove real tumors. The former could be conducted for political reasons such as preventing a candidate from running for office, the latter would prevent individuals from receiving treatment for a life-threatening illness. The technique could also be used for insurance fraud, sabotaging of medical trials, and cyber terrorism. Prior to a patient being prescribed radiation therapy or chemotherapy additional tests would be performed and the incorrect diagnosis would be identified, but patients would still be caused considerable emotional distress. The removal of tumors to make the patient...</span></p><span data-dcnode-id="3505" instrument_node=""> </span></div><span data-dcnode-id="3503" instrument_node=""> </span><span data-dcnode-id="3501" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3461"><span data-dcnode-id="3465" instrument_node="">Posted By </span><a data-dcnode-id="3463" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3464" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3462" instrument_node=""> on Apr 3, 2019</span></p><span data-dcnode-id="3460" instrument_node=""> </span><p data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">Health information is the least likely data type to be encrypted, according to the Global Encryption Trends Study conducted by the Ponemon Institute on behalf of cryptographic solution provider nCipher. The study was conducted on 5,856 people across several industry sectors in 14 countries, including the United States. The aim of the study was to investigate data encryption trends, the types of data most likely to be encrypted, how extensively encryption has been adopted to improve security, and the challenges faced by companies when encrypting data. The study shows the use of encryption has steadily increased over the past four years. 45% of surveyed organizations said they have an overall encryption plan or strategy that is applied across the whole organization. 42% said they have a limited encryption plan or strategy, with encryption only used on certain applications and data types. 13% of respondents said they do not use encryption at all on any type of data. The use of encryption varies considerably from country to country. Germany leads the world with the highest prevalence...</span></p><span data-dcnode-id="3457" instrument_node=""> </span></div><span data-dcnode-id="3455" instrument_node=""> </span><span data-dcnode-id="3453" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3413"><span data-dcnode-id="3417" instrument_node="">Posted By </span><a data-dcnode-id="3415" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3416" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3414" instrument_node=""> on Apr 2, 2019</span></p><span data-dcnode-id="3412" instrument_node=""> </span><p data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">Amazon has announced that it has developed a new system that allows identifying protected health information contained in medical images to be automatically removed to prevent patients from being identified from the images. Medical images often have patients’ protected health information stored as text within the image, including the patient’s name, date of birth, age, and other metrics. Prior to the images being used for research, authorization must be obtained from the patient or all identifying data must be permanently removed. &nbsp;Removing PHI from images requires a manual check and alteration of the image to redact the PHI and that can be an expensive and time-consuming process, especially when large number of images must be de-identified. The new system uses Amazon’s Rekognition machine-learning service, which can detect and extract text from images. The text is then fed through Amazon Comprehend Medical to identify any PHI. In combination with Python code it is possible to quickly redact any PHI in the images. The system works on PNG, JPEG, and DICOM images. A confidence score...</span></p><span data-dcnode-id="3409" instrument_node=""> </span></div><span data-dcnode-id="3407" instrument_node=""> </span><span data-dcnode-id="3405" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3365"><span data-dcnode-id="3369" instrument_node="">Posted By </span><a data-dcnode-id="3367" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3368" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3366" instrument_node=""> on Mar 22, 2019</span></p><span data-dcnode-id="3364" instrument_node=""> </span><p data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">Two vulnerabilities have been identified in the Conexus telemetry protocol used by Medtronic MyCarelink monitors, CareLink monitors, CareLink 2090 programmers, and 17 implanted cardiac devices. Both vulnerabilities require a low level of skill to exploit, although adjacent access to a vulnerable device would be required to exploit either vulnerability. The most serious vulnerability, rated critical, is a lack of authentication and authorization controls in the Conexus telemetry protocol which would allow an attacker with adjacent short-range access to a vulnerable device to inject, replay, modify, and/or intercept data within the telemetry communication when the product’s radio is turned on. An attacker could potentially change memory in a vulnerable implanted cardiac device which could affect the functionality of the device. The vulnerability is being tracked as CVE-2019-6538 and has been assigned a CVSS v3 base score of 9.3. A second, medium severity vulnerability concerns the transmission of sensitive information in cleartext. Since the Conexus telemetry protocol does not use...</span></p><span data-dcnode-id="3361" instrument_node=""> </span></div><span data-dcnode-id="3359" instrument_node=""> </span><span data-dcnode-id="3357" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3317"><span data-dcnode-id="3321" instrument_node="">Posted By </span><a data-dcnode-id="3319" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3320" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3318" instrument_node=""> on Mar 15, 2019</span></p><span data-dcnode-id="3316" instrument_node=""> </span><p data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">U.S. Sens.&nbsp;Mark R. Warner&nbsp;(D-VA) and Cory Gardner (R-CO), co-chairs of the Senate Cybersecurity Caucus, and Sens.&nbsp;Maggie Hassan&nbsp;(D-NH) and&nbsp;Steve Daines&nbsp;(R-MT) have introduced The Internet of Things Improvement Act, which requires all IoT devices purchased by the U.S. government to meet minimum security standards. A companion bill has been introduced in the House by Representatives by Reps. Robin Kelly&nbsp;(D-IL) and&nbsp;Will Hurd&nbsp;(R-TX). Ericcson has predicted there will be 18 billion IoT devices in use by 2022 and IDC predicts IoT spending will reach $1.2 trillion the same year. As the number of IoT devices in use grows, so does concern about the security risk posed by the devices. Sen. Warner wants to make sure that a baseline for security is achieved before any IoT device is allowed to connect to a government network and wants to use the purchasing power of the U.S. government to help establish minimum standards of security for IoT devices. Currently IoT devices are coming to market with scant cybersecurity protections. When cybersecurity measures are integrated into IoT devices, it is...</span></p><span data-dcnode-id="3313" instrument_node=""> </span></div><span data-dcnode-id="3311" instrument_node=""> </span><span data-dcnode-id="3309" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3269"><span data-dcnode-id="3273" instrument_node="">Posted By </span><a data-dcnode-id="3271" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3272" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3270" instrument_node=""> on Mar 14, 2019</span></p><span data-dcnode-id="3268" instrument_node=""> </span><p data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">Framingham, MA-based Rave Mobile Safety has published the results of its annual workplace safety and preparedness survey. The report shows that while preparedness for emergency is better than in 2017, there is still considerable room for improvement, especially in healthcare and education. The survey was conducted on 540 full time employees in the United States across several industries. The aim of the survey was to identify trends in emergency planning, obtain the views of employees about workplace safety, and find out more about the efforts that have been made to ensure effective communication in the event of an emergency and alert employees at risk. The survey shows companies are increasingly developing plans for modern emergencies, such as active shooters, workplace violence, and cyberattacks and system outages. However, greater effort is required to ensure that emergency plans are communicated to employees. Some 20% of workers were unaware of emergency plans for cyberattacks and system outages and 18% of workers were unaware of the emergency plan for active shooters and...</span></p><span data-dcnode-id="3265" instrument_node=""> </span></div><span data-dcnode-id="3263" instrument_node=""> </span><span data-dcnode-id="3261" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3221"><span data-dcnode-id="3225" instrument_node="">Posted By </span><a data-dcnode-id="3223" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3224" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3222" instrument_node=""> on Mar 12, 2019</span></p><span data-dcnode-id="3220" instrument_node=""> </span><p data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">Web forms offer healthcare organizations an easy way to digitally collect information from patients, but care must be taken not to violate HIPAA Rules. To collect any health data, HIPAA compliant online forms must be used. HIPAA Compliant Online Forms Must be Used for Collecting Health Information The HIPAA Privacy and Security Rules requires all HIPAA-covered entities and business associates to implement a range of safeguards to ensure the confidentiality, integrity, and availability of protected health information. Online forms are not specifically mentioned in the HIPAA text, but the Privacy and Security Rules do apply to online forms. Large healthcare organizations are more likely to have in-house staff with the skills to create forms that comply with HIPAA Rules, but many covered entities take advantage of the convenience of third-party webform solutions. There are many companies that offer HIPAA compliant online forms software that allows forms to be quickly spun up and used for a wide range of purposes such as onboarding new patients, obtaining consent, collecting payments,...</span></p><span data-dcnode-id="3217" instrument_node=""> </span></div><span data-dcnode-id="3215" instrument_node=""> </span><span data-dcnode-id="3213" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3173"><span data-dcnode-id="3177" instrument_node="">Posted By </span><a data-dcnode-id="3175" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3176" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3174" instrument_node=""> on Mar 11, 2019</span></p><span data-dcnode-id="3172" instrument_node=""> </span><p data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">The Verizon Mobile Security Index 2019 report indicates 25% of healthcare organizations have experienced a security breach involving a mobile device in the past 12 months. All businesses face similar risks from mobile devices, but healthcare organizations appear to be addressing risks better than most other industry sectors. Out of the eight industry sectors surveyed, healthcare experienced the second lowest number of mobile security incidents behind manufacturing/transportation. Healthcare mobile security breaches have fallen considerably since 2017 when 35% of surveyed healthcare organizations said they had experienced a mobile security breach in the past 12 months. While the figures suggest that healthcare organizations are getting better at protecting mobile devices, Verizon suggests that may not necessarily be the case. Healthcare organizations may simply be struggling to identify security incidents involving mobile devices. 85% of surveyed healthcare organizations were confident that their security defenses were effective and 83% said they believed they would be able to...</span></p><span data-dcnode-id="3169" instrument_node=""> </span></div><span data-dcnode-id="3167" instrument_node=""> </span><span data-dcnode-id="3165" instrument_node="">
