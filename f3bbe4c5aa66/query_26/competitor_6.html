</span><p class="post-meta" data-dcnode-id="7541"><span data-dcnode-id="7545" instrument_node="">Posted By </span><a data-dcnode-id="7543" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="7544" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="7542" instrument_node=""> on Mar 18, 2022</span></p><span data-dcnode-id="7540" instrument_node=""> </span><p data-dcnode-id="7538"><span data-dcnode-id="7539" instrument_node="">Healthcare hacking incidents have been steadily rising for a number of years. There was a 45% increase in hacking/IT incidents between 2019 and 2020, and in 2021, 66% of breaches of unsecured electronic protected health information were due to hacking and other IT incidents. A large percentage of those breaches could have been prevented if HIPAA-regulated entities were fully compliant with the HIPAA Security Rule. The Department of Health and Human Services’ Office for Civil Rights explained in its March 2022 cybersecurity newsletter that compliance with the HIPAA Security Rule will prevent or substantially mitigate most cyberattacks. Most cyberattacks on the healthcare industry are financially motivated and are conducted to steal electronic protected health information or encrypt patient data to prevent legitimate access. The initial access to healthcare networks is gained via tried and tested methods such as phishing attacks and the exploitation of known vulnerabilities and weak authentication protocols, rather than exploiting previously unknown vulnerabilities. Prevention of...</span></p><span data-dcnode-id="7537" instrument_node=""> </span></div><span data-dcnode-id="7535" instrument_node=""> </span><span data-dcnode-id="7533" instrument_node="">

</span><p class="post-meta" data-dcnode-id="7493"><span data-dcnode-id="7497" instrument_node="">Posted By </span><a data-dcnode-id="7495" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="7496" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="7494" instrument_node=""> on Feb 23, 2022</span></p><span data-dcnode-id="7492" instrument_node=""> </span><p data-dcnode-id="7490"><span data-dcnode-id="7491" instrument_node="">The National Cybersecurity Center of Excellence (NCCoE) has published the final version of NIST guidance on Securing Telehealth Remote Patient Monitoring Ecosystem (SP 1800-30). Healthcare delivery organizations have been increasingly adopting telehealth and remote patient monitoring (RPM) systems to improve the care they provide to patients while reducing costs. Patient monitoring systems have traditionally only been used in healthcare facilities but there are advantages to using these solutions in patients’ homes. Many patients prefer to receive care at home, the cost of receiving that care is reduced, and healthcare delivery organizations benefit from freeing up bed space and being able to treat more patients. While there are advantages to be gained from the provision of virtual care and the remote monitoring of patients in their homes, telehealth and RPM systems can introduce vulnerabilities that could put sensitive patient data at risk and if RPM systems are not adequately protected, they could be vulnerable to cyberattacks that could disrupt patient monitoring services....</span></p><span data-dcnode-id="7489" instrument_node=""> </span></div><span data-dcnode-id="7487" instrument_node=""> </span><span data-dcnode-id="7485" instrument_node="">

</span><p class="post-meta" data-dcnode-id="7445"><span data-dcnode-id="7449" instrument_node="">Posted By </span><a data-dcnode-id="7447" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="7448" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="7446" instrument_node=""> on Feb 14, 2022</span></p><span data-dcnode-id="7444" instrument_node=""> </span><p data-dcnode-id="7442"><span data-dcnode-id="7443" instrument_node="">Healthcare privacy laws in the United States are due an update to bring them into the modern age to ensure individually identifiable health information is protected no matter how it is collected and shared. The Health Insurance Portability and Accountability Act (HIPAA) Privacy Rule is now more than 2 decades old, and while the Department of Health and Human Services (HHS) has proposed updates to the HIPAA Privacy Rule that are due to be finalized this year, even if the proposed HIPAA Privacy Rule changes are signed into law, there will still be regulatory gaps that place health data at risk. The use of technology for healthcare and health information has grown in a way that could not be envisaged when the Privacy Rule was signed into law. Health information is now being collected by health apps and other technologies, and individuals’ sensitive health information is being shared with and sold by technology companies. The HIPAA Privacy and Security Rules introduced requirements to ensure the privacy and security of health data, but HIPAA only applies to HIPAA-covered entities –...</span></p><span data-dcnode-id="7441" instrument_node=""> </span></div><span data-dcnode-id="7439" instrument_node=""> </span><span data-dcnode-id="7437" instrument_node="">

</span><h2 data-dcnode-id="7403"><a data-dcnode-id="7404" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/what-does-hipaa-stand-for/"><span data-dcnode-id="7405" instrument_node="">What Does HIPAA Stand For?</span></a></h2><span data-dcnode-id="7402" instrument_node="">
</span><p class="post-meta" data-dcnode-id="7397"><span data-dcnode-id="7401" instrument_node="">Posted By </span><a data-dcnode-id="7399" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="7400" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="7398" instrument_node=""> on Feb 10, 2022</span></p><span data-dcnode-id="7396" instrument_node=""> </span><p data-dcnode-id="7394"><span data-dcnode-id="7395" instrument_node="">Many articles discussing what does HIPAA stand for fail to give a complete answer. Most state that HIPAA is an acronym of the Health Insurance Portability and Accountability Act of 1996 and that it led to the development of standards for the privacy of Protected Health Information. However, few articles discussing what does HIPAA stand for explain how a bill with the objective of reforming the health insurance industry evolved into an act of legislation that now controls how healthcare data is safeguarded. To best fully explain what does HIPAA stand for, it is a necessary to look at the state of the health insurance industry prior to 1996. The industry had grown from a handful of companies offering accident insurance in the 1850s – and employer-sponsored disability insurance from 1911 onwards – into a multi-billion dollar business by the end of the twentieth century. However, at the time, the healthcare insurance industry was governed by a hotchpotch of federal and state legislation. The reason for the hotchpotch of legislation was that, in the early days, many...</span></p><span data-dcnode-id="7393" instrument_node=""> </span></div><span data-dcnode-id="7391" instrument_node=""> </span><span data-dcnode-id="7389" instrument_node="">

</span><p class="post-meta" data-dcnode-id="7349"><span data-dcnode-id="7353" instrument_node="">Posted By </span><a data-dcnode-id="7351" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="7352" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="7350" instrument_node=""> on Feb 4, 2022</span></p><span data-dcnode-id="7348" instrument_node=""> </span><p data-dcnode-id="7346"><span data-dcnode-id="7347" instrument_node="">Celo has launched a new healthcare messaging platform for teams in the United States, with U.S. operations run from its Seattle, WA headquarters and led by Celo’s chief growth officer, Jack Clough. Healthcare organizations have been slow to adopt modern communications technologies compared to other industry sectors and pagers, faxes, and email are still extensively used for communication between care teams, even though these outdated modes of communication are inefficient. In other industry sectors, instant messaging solutions have been widely adopted and have been shown to improve collaboration between individuals and teams and improve communication efficiency. There are problems with using generic business messaging products and services in healthcare. The solutions tend to lack the features required by healthcare organizations and many lack the required privacy and security measures to allow healthcare data to be communicated via the platforms and are a compliance risk. Secure messaging app providers are classed as business associates under HIPAA, and many messaging app...</span></p><span data-dcnode-id="7345" instrument_node=""> </span></div><span data-dcnode-id="7343" instrument_node=""> </span><span data-dcnode-id="7341" instrument_node="">

</span><p class="post-meta" data-dcnode-id="7301"><span data-dcnode-id="7305" instrument_node="">Posted By </span><a data-dcnode-id="7303" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="7304" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="7302" instrument_node=""> on Feb 2, 2022</span></p><span data-dcnode-id="7300" instrument_node=""> </span><p data-dcnode-id="7298"><span data-dcnode-id="7299" instrument_node="">A new report from Kaspersky shows the massive increase in telehealth has placed healthcare data at risk. Vulnerabilities have been found in the technologies that support telemedicine, many of which have not yet been addressed. Massive Increase in the Use of Telehealth The COVID-19 pandemic has led to an increase in virtual visits, with healthcare providers increasing access to telehealth care to help curb infections and cut costs. Virtual visits are conducted via the telephone, video-conferencing apps, and other platforms, and a host of new technologies and products such as wearable devices for measuring vital signs, implanted sensors, and cloud services are also being used to support telehealth. Data from McKinsey shows telemedicine usage has increased by 38% since before the emergence of SARS-Cov-2 and COVID-19, and the CDC reports that between June 26, 2020, and November 6, 2020, around 30% of all consultations with doctors were taking place virtually. &nbsp;Kaspersky says that its own data indicate 91% of healthcare providers around the world have implemented the technology to give...</span></p><span data-dcnode-id="7297" instrument_node=""> </span></div><span data-dcnode-id="7295" instrument_node=""> </span><span data-dcnode-id="7293" instrument_node="">

</span><p class="post-meta" data-dcnode-id="7253"><span data-dcnode-id="7257" instrument_node="">Posted By </span><a data-dcnode-id="7255" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="7256" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="7254" instrument_node=""> on Jan 24, 2022</span></p><span data-dcnode-id="7252" instrument_node=""> </span><p data-dcnode-id="7250"><span data-dcnode-id="7251" instrument_node="">A recent study by the healthcare IoT security platform provider Cynerio has revealed 53% of connected medical devices and other healthcare IoT devices have at least one unaddressed critical vulnerability that could potentially be exploited to gain access to networks and sensitive data or affect the availability of the devices. The researchers also found a third of bedside healthcare IoT devices have at least one unpatched critical vulnerability that could affect service availability, data confidentiality, or place patient safety in jeopardy. The researchers analyzed the connected device footprints at more than 300 hospitals to identify risks and vulnerabilities in their Internet of Medical Things (IoMT) and IoT devices. IV pumps are the most commonly used healthcare IoT device, making up around 38% of a hospital’s IoT footprint. It is these devices that were found to be the most vulnerable to attack, with 73% having a vulnerability that could threaten patient safety, service availability, or result in data theft. 50% of VOIP systems contained vulnerabilities, with ultrasound...</span></p><span data-dcnode-id="7249" instrument_node=""> </span></div><span data-dcnode-id="7247" instrument_node=""> </span><span data-dcnode-id="7245" instrument_node="">

</span><p class="post-meta" data-dcnode-id="7205"><span data-dcnode-id="7209" instrument_node="">Posted By </span><a data-dcnode-id="7207" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="7208" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="7206" instrument_node=""> on Jan 19, 2022</span></p><span data-dcnode-id="7204" instrument_node=""> </span><p data-dcnode-id="7202"><span data-dcnode-id="7203" instrument_node="">The Department of Health and Human Services’ Office of the National Coordinator for Health IT has released the final version of its Trusted Exchange Framework and the Common Agreement (TEFCA) – a governance framework for nationwide health information exchange. Two previous versions of TEFCA have been released, the first in 2018 and the second in 2019, with the final version taking into consideration feedback provided by healthcare industry stakeholders. TEFCA was a requirement of the 21st Century Cures Act and has been 5 years in the making. The announcement this week sees the HHS finally move into the implementation phase of TEFCA. The Trusted Exchange Framework is a set of non-binding foundational principles for health information exchange and outlines propositions for standardization, cooperation, privacy, security, access, equity, openness and transparency, and public health. The second component is the common agreement, which is a legal contract that a Qualified Health Information Network (QHIN) enters into with the ONC’s Recognized Coordinating Entity (RCE). The RCE, the...</span></p><span data-dcnode-id="7201" instrument_node=""> </span></div><span data-dcnode-id="7199" instrument_node=""> </span><span data-dcnode-id="7197" instrument_node="">

</span><h2 data-dcnode-id="7163"><a data-dcnode-id="7164" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/hipaa-social-media/"><span data-dcnode-id="7165" instrument_node="">HIPAA Social Media Rules</span></a></h2><span data-dcnode-id="7162" instrument_node="">
</span><p class="post-meta" data-dcnode-id="7157"><span data-dcnode-id="7161" instrument_node="">Posted By </span><a data-dcnode-id="7159" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="7160" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="7158" instrument_node=""> on Jan 12, 2022</span></p><span data-dcnode-id="7156" instrument_node=""> </span><p data-dcnode-id="7154"><span data-dcnode-id="7155" instrument_node="">HIPAA was enacted several years before social media networks such as Facebook and Instagram were launched, so there are no specific HIPAA social media rules. However, as with all healthcare-related communications, the HIPAA Privacy Rule still applies whenever covered entities or business associates – or employees of either – use social media networks. There are many benefits to be gained from using social media. Social media networks allow healthcare organizations to interact with patients and get them more involved in their own healthcare. Healthcare organizations can quickly and easily communicate important messages or provide information about new services. Healthcare providers can attract new patients via social media networks. However, there is also considerable potential for HIPAA rules and patient privacy to be violated on social media networks. So how can healthcare organizations and their employees use social media without violating HIPAA Rules? HIPAA and Social Media Healthcare organizations must implement a HIPAA social media policy to reduce the risk of...</span></p><span data-dcnode-id="7153" instrument_node=""> </span></div><span data-dcnode-id="7151" instrument_node=""> </span><span data-dcnode-id="7149" instrument_node="">

</span><h2 data-dcnode-id="7115"><a data-dcnode-id="7116" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/what-is-hipaa-certification/"><span data-dcnode-id="7117" instrument_node="">What is HIPAA Certification?</span></a></h2><span data-dcnode-id="7114" instrument_node="">
</span><p class="post-meta" data-dcnode-id="7109"><span data-dcnode-id="7113" instrument_node="">Posted By </span><a data-dcnode-id="7111" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="7112" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="7110" instrument_node=""> on Jan 3, 2022</span></p><span data-dcnode-id="7108" instrument_node=""> </span><p data-dcnode-id="7106"><span data-dcnode-id="7107" instrument_node="">HIPAA certification has two meanings. It can either be a point in time accreditation demonstrating an organization has passed a HIPAA compliance audit, or a recognition that members of the organization´s workforce have achieved the level of HIPAA knowledge required to comply with the organization´s policies and procedures. Both are useful accreditations to have. There are two things organizations and their workforces should be aware of before undertaking a HIPAA certification program. There are no requirements in HIPAA for organizations and/or their workforces to certify compliance, and certification is not a “get out of jail free card” that will absolve negligent parties from HIPAA violations. So why get certified? Why Get Certified as being HIPAA Compliant? The first reason for getting certified is that, in order to achieve an accreditation, organizations will have to adopt best privacy practices and implement the administrative, technical, and physical safeguards of the HIPAA Security Rule. This in itself will reduce the likelihood of HIPAA violations and data breaches – leading...</span></p><span data-dcnode-id="7105" instrument_node=""> </span></div><span data-dcnode-id="7103" instrument_node=""> </span><span data-dcnode-id="7101" instrument_node="">

</span><p class="post-meta" data-dcnode-id="7061"><span data-dcnode-id="7065" instrument_node="">Posted By </span><a data-dcnode-id="7063" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="7064" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="7062" instrument_node=""> on Dec 17, 2021</span></p><span data-dcnode-id="7060" instrument_node=""> </span><p data-dcnode-id="7058"><span data-dcnode-id="7059" instrument_node="">In 2019, it was alarming that healthcare data breaches were being reported at a rate of more than 1 a day. In 2021, there have been several months where healthcare data breaches have been occurring at a rate of more than 2 per day. With data breaches occurring so regularly and ransomware attacks disrupting healthcare services, it is no surprise that many patients do not have much trust in their healthcare providers to protect sensitive personally identifiable information (PII). That has been confirmed by a recent survey conducted by Dynata on behalf of Semafone. 56% of patients at private practices said they do not trust their healthcare providers to protect PII and payment information. Smaller healthcare providers have smaller budgets for cybersecurity than larger healthcare networks, but trust in large hospital networks is far lower. Only 33% of patients of large hospital networks trusted them to be able to safeguard their PII. The HHS’ Office for Civil Rights, the main enforcer of HIPAA compliance, has stepped up enforcement of compliance with the HIPAA Rules in recent years and...</span></p><span data-dcnode-id="7057" instrument_node=""> </span></div><span data-dcnode-id="7055" instrument_node=""> </span><span data-dcnode-id="7053" instrument_node="">

</span><p class="post-meta" data-dcnode-id="7013"><span data-dcnode-id="7017" instrument_node="">Posted By </span><a data-dcnode-id="7015" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="7016" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="7014" instrument_node=""> on Dec 13, 2021</span></p><span data-dcnode-id="7012" instrument_node=""> </span><p data-dcnode-id="7010"><span data-dcnode-id="7011" instrument_node="">One of the most serious healthcare ransomware attacks occurred in Ireland earlier this year. The Health Service Executive (HSE), the Republic of Ireland’s national health system, suffered a major attack that resulted in Conti ransomware being deployed and forced its National Healthcare Network to be taken offline. That meant healthcare professionals across the country were prevented from accessing all HSE IT systems, including clinical care systems, patient records, laboratory systems, payroll, and other clinical and non-clinical systems which caused major disruption to healthcare services across the country. Following the attack, the HSE Board commissioned PricewaterhouseCoopers (PWC) to conduct an independent post-incident review into the attack to establish the facts related to technical and operational preparedness and the circumstances that allowed the attackers to gain access to its systems, exfiltrate sensitive data, encrypt files, and extort the HSE. Cybersecurity Failures that are Common in the Healthcare Industry PWC’s recently published report highlights a number of...</span></p><span data-dcnode-id="7009" instrument_node=""> </span></div><span data-dcnode-id="7007" instrument_node=""> </span><span data-dcnode-id="7005" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6965"><span data-dcnode-id="6969" instrument_node="">Posted By </span><a data-dcnode-id="6967" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6968" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6966" instrument_node=""> on Dec 7, 2021</span></p><span data-dcnode-id="6964" instrument_node=""> </span><p data-dcnode-id="6962"><span data-dcnode-id="6963" instrument_node="">Many healthcare organizations would like to be able to send protected health information via email, but how do you make your email HIPAA compliant? What must be done before electronic PHI (ePHI) can be sent via email to patients and other healthcare organizations? How to Make Your Email HIPAA Compliant Whether you need to make your email HIPAA compliant will depend on how you plan to use email with ePHI. If you will only ever send emails internally, it may not be necessary to make your email HIPAA compliant. If your email network is behind a firewall, it is not necessary to encrypt your emails. &nbsp;Encryption is only required when your emails are sent beyond your firewall. However, access controls to email accounts are required, as it is important to ensure that only authorized individuals can access email accounts that contain ePHI. If you want to use email to send ePHI externally – beyond your firewall – you will need to make your email HIPAA-compliant. There are many email service providers that offer an encrypted email service, but not all are HIPAA compliant and incorporate all...</span></p><span data-dcnode-id="6961" instrument_node=""> </span></div><span data-dcnode-id="6959" instrument_node=""> </span><span data-dcnode-id="6957" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6917"><span data-dcnode-id="6921" instrument_node="">Posted By </span><a data-dcnode-id="6919" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6920" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6918" instrument_node=""> on Nov 30, 2021</span></p><span data-dcnode-id="6916" instrument_node=""> </span><p data-dcnode-id="6914"><span data-dcnode-id="6915" instrument_node="">The Cybersecurity and Infrastructure Security Agency (CISA) has published new guidance for enterprises to help them secure mobile devices and safely access enterprise resources using mobile devices. The Enterprise Mobility Management (EMM) system checklist has been created to help businesses implement best practices to mitigate vulnerabilities and block threats that could compromise mobile devices and the enterprise networks to which they connect.&nbsp;The steps outlined in the checklist are easy for enterprises to implement and can greatly improve mobile device security and allow mobile devices to be safely used to access business networks. CISA recommends a security-focused approach to mobile device management. When selecting mobile devices that meet enterprise requirements, an assessment should be performed to identify potential supply chain risks. The Mobile Device Management (MDM) system should be configured to update automatically to ensure it is always running the latest version of the software and patches are applied automatically to fix known vulnerabilities. A policy should be...</span></p><span data-dcnode-id="6913" instrument_node=""> </span></div><span data-dcnode-id="6911" instrument_node=""> </span><span data-dcnode-id="6909" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6869"><span data-dcnode-id="6873" instrument_node="">Posted By </span><a data-dcnode-id="6871" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6872" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6870" instrument_node=""> on Nov 15, 2021</span></p><span data-dcnode-id="6868" instrument_node=""> </span><p data-dcnode-id="6866"><span data-dcnode-id="6867" instrument_node="">13 vulnerabilities have been identified in the Siemens Nucleus RTOS TCP/IP stack that could potentially be exploited remotely by threat actors to achieve arbitrary code execution, conduct a denial-of-service attack, and obtain sensitive information. The vulnerabilities, dubbed NUCLEUS:13, affect the TCP/IP stack and related FTP and TFTP services of the networking component (Nucleus NET) of the Nucleus Real-Time Operating System (RTOS), which is used in many safety-critical devices. In healthcare, Nucleus is used in medical devices such as anesthesia machines and patient monitors. One critical vulnerability has been identified that allows remote code execution which has a CVSS v3 severity score of 9.8 out of 10. Ten of the vulnerabilities are rated high severity flaws, with CVSS scores ranging from 7.1 to 8.8. There are also two medium-severity flaws with CVSS scores of 6.5 and 5.3. The vulnerabilities were identified by security researchers at Forescout Research Labs, with assistance provided by researchers at Medigate. The vulnerabilities affect the following Nucleus RTOS...</span></p><span data-dcnode-id="6865" instrument_node=""> </span></div><span data-dcnode-id="6863" instrument_node=""> </span><span data-dcnode-id="6861" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6821"><span data-dcnode-id="6825" instrument_node="">Posted By </span><a data-dcnode-id="6823" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6824" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6822" instrument_node=""> on Oct 27, 2021</span></p><span data-dcnode-id="6820" instrument_node=""> </span><p data-dcnode-id="6818"><span data-dcnode-id="6819" instrument_node="">Is AWS HIPAA compliant? Amazon Web Services has all the protections to satisfy the HIPAA Security Rule and Amazon will sign a business associate agreement with healthcare organizations. So, is AWS HIPAA compliant? Yes. And No. AWS can be HIPAA compliant, but it is also easy to make configuration mistakes that will leave protected health information (PHI) unprotected and accessible by unauthorized individuals, violating HIPAA Rules. Amazon Will Sign a Business Associate Agreement for AWS Amazon is keen for healthcare organizations to use AWS, and as such, a business associate agreement will be signed. Under that agreement, Amazon will support the security, control, and administrative processes required under HIPAA. Previous, under the terms of the AWS BAA, the AWS HIPAA compliance program required covered entities and business associates to use Amazon EC2 Dedicated Instances or Dedicated Hosts to process Protected Health Information (PHI), although that is now no longer the case. As part of its efforts to help healthcare organizations use AWS safely and securely without violating...</span></p><span data-dcnode-id="6817" instrument_node=""> </span></div><span data-dcnode-id="6815" instrument_node=""> </span><span data-dcnode-id="6813" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6773"><span data-dcnode-id="6777" instrument_node="">Posted By </span><a data-dcnode-id="6775" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6776" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6774" instrument_node=""> on Oct 22, 2021</span></p><span data-dcnode-id="6772" instrument_node=""> </span><p data-dcnode-id="6770"><span data-dcnode-id="6771" instrument_node="">B. Braun has released software updates to fix five vulnerabilities in its Infusomat Space and Perfusor Space Infusion Pumps. The vulnerabilities could be exploited remotely in a low complexity attack. In North America, the flaws affect Battery pack SP with WiFi (All software Versions 028U000061 and earlier) that have been installed in an Infusomat Space Infusion Pump or a Perfusor Space Infusion pump, and SpaceStation with SpaceCom 2 (All software Versions 012U000061 and earlier). The vulnerabilities were identified by Douglas McKee and Philippe Laulheret of McAfee, who reported them to B. Braun. The most serious vulnerability is a critical flaw in B. Braun SpaceCom2&nbsp;that has been assigned a CVSS severity score of 9 out of 10. The flaw – tracked as CVE-2021-33885 – is due to insufficient verification of data authenticity and could be exploited by a remote attacker to send malicious data to the device, which would be used in place of the correct data. An improper input validation flaw – CVE-2021-33886 – would allow a remote unauthenticated attacker to gain user-level command-line...</span></p><span data-dcnode-id="6769" instrument_node=""> </span></div><span data-dcnode-id="6767" instrument_node=""> </span><span data-dcnode-id="6765" instrument_node="">

</span><h2 data-dcnode-id="6731"><a data-dcnode-id="6732" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/secure-patient-information-phi/"><span data-dcnode-id="6733" instrument_node="">How to Secure Patient Information (PHI)</span></a></h2><span data-dcnode-id="6730" instrument_node="">
</span><p class="post-meta" data-dcnode-id="6725"><span data-dcnode-id="6729" instrument_node="">Posted By </span><a data-dcnode-id="6727" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6728" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6726" instrument_node=""> on Oct 13, 2021</span></p><span data-dcnode-id="6724" instrument_node=""> </span><p data-dcnode-id="6722"><span data-dcnode-id="6723" instrument_node="">HIPAA requires healthcare organizations of all sizes to secure protected health information (PHI), but how can covered entities secure patient information? If you are asked how you secure patient information, could you provide an answer? How Can You Secure Patient Information? HIPAA requires healthcare organizations and their business associates to implement safeguards to ensure the confidentiality, integrity, and availability of PHI, although there is little detail provided on how to secure patient information in HIPAA regulations. This is intentional, as the pace that technology is advancing is far greater than the speed at which HIPAA can be updated. If details were included, they would soon be out of date. Technology is constantly changing and new vulnerabilities are being discovered in systems and software previously thought to be secure. Securing patient information is therefore not about implementing security solutions and forgetting about them. To truly secure patient information you must regularly review your security controls, update policies and procedures, maintain...</span></p><span data-dcnode-id="6721" instrument_node=""> </span></div><span data-dcnode-id="6719" instrument_node=""> </span><span data-dcnode-id="6717" instrument_node="">

</span><h2 data-dcnode-id="6683"><a data-dcnode-id="6684" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/why-is-hipaa-important/"><span data-dcnode-id="6685" instrument_node="">Why is HIPAA Important?</span></a></h2><span data-dcnode-id="6682" instrument_node="">
</span><p class="post-meta" data-dcnode-id="6677"><span data-dcnode-id="6681" instrument_node="">Posted By </span><a data-dcnode-id="6679" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6680" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6678" instrument_node=""> on Oct 12, 2021</span></p><span data-dcnode-id="6676" instrument_node=""> </span><p data-dcnode-id="6674"><span data-dcnode-id="6675" instrument_node="">The Health Insurance Portability and Accountability Act (HIPAA) is a landmark piece of legislation, but why is HIPAA important? What changes did HIPAA introduce and what are the benefits to the healthcare industry and patients? HIPAA was introduced in 1996, primarily to address one particular issue: Insurance coverage for individuals that are between jobs. Without HIPAA, employees faced a loss of insurance coverage when they were between jobs. A second goal of HIPAA was to prevent healthcare fraud and ensure that all ‘protected health information’ was appropriately secured and to restrict access to health data to authorized individuals. Why is HIPAA Important for Healthcare Organizations? HIPAA introduced a number of important benefits for the healthcare industry to help with the transition from paper records to electronic copies of health information. HIPAA has helped to streamline administrative healthcare functions, improve efficiency in the healthcare industry, and ensure protected health information is shared securely. The standards for recording health data and electronic...</span></p><span data-dcnode-id="6673" instrument_node=""> </span></div><span data-dcnode-id="6671" instrument_node=""> </span><span data-dcnode-id="6669" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6581"><span data-dcnode-id="6585" instrument_node="">Posted By </span><a data-dcnode-id="6583" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6584" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6582" instrument_node=""> on Sep 30, 2021</span></p><span data-dcnode-id="6580" instrument_node=""> </span><p data-dcnode-id="6578"><span data-dcnode-id="6579" instrument_node="">The National Security Agency (NSA) and the Cybersecurity and Infrastructure Security Agency (CISA) have issued new guidance on selecting and improving the security of Virtual Private Networks (VPN) solutions. VPN solutions allow remote workers to securely connect to business networks. Data traffic is routed through an encrypted virtual tunnel to prevent the interception of sensitive data and to block external attacks. VPNs are an attractive target for hackers, and vulnerabilities in VPN solutions have been targeted by several Advanced Persistent Threat (APT) groups. APT actors have been observed exploiting vulnerabilities in VPN solutions to remotely gain access to business networks, harvest credentials, remotely execute code on the VPN devices, hijack encrypted traffic sessions, and obtain sensitive data from the devices. Several common vulnerabilities and exposures (CVEs)&nbsp;have been weaponized to gain access to the vulnerable devices, including Pulse Connect Secure SSL VPN (CVE-2019-11510), Fortinet FortiOS SSL VPN (CVE-2018-13379), and Palo Alto Networks&nbsp;PAN-OS&nbsp;(CVE_2020-2050)....</span></p><span data-dcnode-id="6577" instrument_node=""> </span></div><span data-dcnode-id="6575" instrument_node=""> </span><span data-dcnode-id="6573" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6533"><span data-dcnode-id="6537" instrument_node="">Posted By </span><a data-dcnode-id="6535" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6536" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6534" instrument_node=""> on Sep 16, 2021</span></p><span data-dcnode-id="6532" instrument_node=""> </span><p data-dcnode-id="6530"><span data-dcnode-id="6531" instrument_node="">Developers of health apps and wearable devices such as fitness trackers that collect health data have been warned by the Federal Trade Commission (FTC) that they are required to comply with the FTC Health Breach Notification Rule and must notify consumers about data breaches. The FTC Health Breach Notification Rule was introduced in 2009 as part of the American Recovery and Reinvestment Act of 2009, and requires individuals to be notified if there is a breach of their health data. The Health Breach Notification Rule applies to vendors of personal health records and associated companies, but in a policy statement issued on September 16, 2021, the FTC said health apps and other connected devices that collect or use the health information of U.S. consumers are also covered by Rule. The policy statement was approved during an open meeting on Wednesday by a vote of 3-2. The FTC Health Breach Notification Rule applies to health apps and wearable devices that collect health information from a consumer and can draw information from multiple sources, such as through an API that allows...</span></p><span data-dcnode-id="6529" instrument_node=""> </span></div><span data-dcnode-id="6527" instrument_node=""> </span><span data-dcnode-id="6525" instrument_node="">

</span><h2 data-dcnode-id="6491"><a data-dcnode-id="6492" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/future-of-hipaa/"><span data-dcnode-id="6493" instrument_node="">Future of HIPAA: Reflections at the 25th Anniversary of HIPAA</span></a></h2><span data-dcnode-id="6490" instrument_node="">
</span><p class="post-meta" data-dcnode-id="6485"><span data-dcnode-id="6489" instrument_node="">Posted By </span><a data-dcnode-id="6487" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6488" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6486" instrument_node=""> on Aug 21, 2021</span></p><span data-dcnode-id="6484" instrument_node=""> </span><p data-dcnode-id="6482"><span data-dcnode-id="6483" instrument_node="">The Health Insurance Portability and Accountability Act is now 25 years old. How effective has this healthcare law been and what is the future of HIPAA? It is now exactly 25 years to the day since the Health Insurance Portability and Accountability Act (HIPAA) was signed into law by President Clinton. On August 21, 1996, when President Clinton added his signature to the legislation, few people would have realized how HIPAA would evolve and grow into the comprehensive national health privacy law that it is today. It is difficult to argue that HIPAA has not been an overall success, but the legislation has attracted a fair amount of criticism over the years, especially due to the considerable administrative burden it initially placed on healthcare organizations. On balance, the improvements to healthcare that have come from compliance with HIPAA more than outweigh the negatives. The biggest successes are the improvements to patient privacy and data security, the rights given to patients with respect to their healthcare data, greater efficiency in the healthcare system, and changes...</span></p><span data-dcnode-id="6481" instrument_node=""> </span></div><span data-dcnode-id="6479" instrument_node=""> </span><span data-dcnode-id="6477" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6437"><span data-dcnode-id="6441" instrument_node="">Posted By </span><a data-dcnode-id="6439" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6440" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6438" instrument_node=""> on Jul 29, 2021</span></p><span data-dcnode-id="6436" instrument_node=""> </span><p data-dcnode-id="6434"><span data-dcnode-id="6435" instrument_node="">IBM Security has published its 2021 Cost of a Data Breach Report, which shows data breach costs have risen once again and are now at the highest level since IBM started publishing the reports 17 years ago. There was a 10% year-over-year increase in data breach costs, with the average cost rising to $4.24 million per incident. Healthcare data breaches are the costliest, with the average cost increasing by $2 million to $9.42 million per incident. Ransomware attacks cost an average of $4.62 million per incident. The large year-over-year increase in data breach costs has been attributed to the drastic operational shifts due to the pandemic. With employees forced to work remotely during the pandemic, organizations had to rapidly adapt their technology. The pandemic forced 60% of organizations to move further into the cloud. Such a rapid change resulted in vulnerabilities being introduced and security often lagged behind the rapid IT changes. Remote working also hindered organizations’ ability to quickly respond to security incidents and data breaches. According to IBM, data breaches...</span></p><span data-dcnode-id="6433" instrument_node=""> </span></div><span data-dcnode-id="6431" instrument_node=""> </span><span data-dcnode-id="6429" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6389"><span data-dcnode-id="6393" instrument_node="">Posted By </span><a data-dcnode-id="6391" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6392" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6390" instrument_node=""> on Jul 21, 2021</span></p><span data-dcnode-id="6388" instrument_node=""> </span><p data-dcnode-id="6386"><span data-dcnode-id="6387" instrument_node="">Google Drive is a useful tool for sharing documents, but can those documents contain PHI? Is Google Drive HIPAA compliant? Is Google Drive HIPAA Compliant? The answer to the question, “Is Google Drive HIPAA compliant?” is yes and no. HIPAA compliance is less about technology and more about how technology is used. Even a software solution or cloud service that is billed as being HIPAA-compliant can easily be used in a manner that violates HIPAA Rules. G Suite – formerly Google Apps, of which Google Drive is a part – does support HIPAA compliance. The service does not violate HIPAA Rules provided HIPAA Rules are followed by users. G Suite incorporates all of the necessary controls to make it a HIPAA-compliant service and can therefore be used by HIPAA-covered entities to share PHI (in accordance with HIPAA Rules), provided the account is configured correctly and standard security practices are applied. The use of any software or cloud platform in conjunction with protected health information requires the vendor of the service to sign a HIPAA-compliant business...</span></p><span data-dcnode-id="6385" instrument_node=""> </span></div><span data-dcnode-id="6383" instrument_node=""> </span><span data-dcnode-id="6381" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6341"><span data-dcnode-id="6345" instrument_node="">Posted By </span><a data-dcnode-id="6343" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6344" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6342" instrument_node=""> on Jun 30, 2021</span></p><span data-dcnode-id="6340" instrument_node=""> </span><p data-dcnode-id="6338"><span data-dcnode-id="6339" instrument_node="">President Biden’s Cybersecurity Executive Order requires all federal agencies to reevaluate their approach to cybersecurity, develop new methods of evaluating software, and implement modern security approaches to reduce risk, such as encryption for data at rest and in transit, multi-factor authentication, and using a zero-trust approach to security. One of the first requirements of the Executive Order was for the National Institute of Standards and Technology (NIST) to publish a definition of critical software, which the Cybersecurity and Infrastructure Security Agency (CISA) will use to create a list of all software covered by the Executive Order and for creating security rules that federal agencies will be required to follow when purchasing and deploying the software. These measures will help to prevent cyberattacks such as the SolarWinds Orion supply chain attack that saw the systems of several federal agencies infiltrated by state-sponsored Russian hackers. The Executive Order required NIST to publish its critical software definition within 45 days. NIST sought input from...</span></p><span data-dcnode-id="6337" instrument_node=""> </span></div><span data-dcnode-id="6335" instrument_node=""> </span><span data-dcnode-id="6333" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6293"><span data-dcnode-id="6297" instrument_node="">Posted By </span><a data-dcnode-id="6295" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6296" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6294" instrument_node=""> on Jun 30, 2021</span></p><span data-dcnode-id="6292" instrument_node=""> </span><p data-dcnode-id="6290"><span data-dcnode-id="6291" instrument_node="">The Government Accountability Office has published a report following a review of the organizational approach to cybersecurity of the U.S. Department of Health and Human Services (HHS). The study was conducted because both the HHS and the healthcare and public health sector are heavily reliant on information systems to fulfil their missions, which include providing healthcare services and responding to national health emergencies. Should any information systems be disrupted, it could have major implications for the HHS and healthcare sector organizations and could be catastrophic for Americans who rely on their services. “A cyberattack resulting in the disruption of IT systems supporting pharmacies, hospitals, and physicians’ offices would interfere with the approval and distribution of the life-saving medications and other products needed by patients and healthcare facilities,” said the GAO in the report. The HHS must implement safeguards in place to protect its computer systems from cyber threat actors looking to obtain sensitive data to commit fraud and identity theft,...</span></p><span data-dcnode-id="6289" instrument_node=""> </span></div><span data-dcnode-id="6287" instrument_node=""> </span><span data-dcnode-id="6285" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6245"><span data-dcnode-id="6249" instrument_node="">Posted By </span><a data-dcnode-id="6247" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6248" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6246" instrument_node=""> on Jun 7, 2021</span></p><span data-dcnode-id="6244" instrument_node=""> </span><p data-dcnode-id="6242"><span data-dcnode-id="6243" instrument_node="">The National Institute of Standards and Technology (NIST) has published a new report on the use of biometric authentication on mobile devices to allow first responders to gain rapid access to sensitive data, while ensuring that information can only be accessed by authorized individuals. Many public safety organizations (PSOs) are now using mobile devices to access sensitive data from any location, but ensuring access is secure and only authorized individuals can use the devices to view that information has previously relied on the use of passwords. Passwords can be secure; however, passwords need to be complex to resist brute force attempts to guess passwords. Having to type in a long and complex password can hinder access to essential data. Oftentimes, access to sensitive data needs to be provided immediately. It is not practical for first responders to have to type in a password. Any delay, even one that lasts just a few seconds, has potential to exacerbate an emergency. Biometrics offers a more secure authentication option than passwords and could allow access to data much more...</span></p><span data-dcnode-id="6241" instrument_node=""> </span></div><span data-dcnode-id="6239" instrument_node=""> </span><span data-dcnode-id="6237" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6197"><span data-dcnode-id="6201" instrument_node="">Posted By </span><a data-dcnode-id="6199" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6200" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6198" instrument_node=""> on Jun 1, 2021</span></p><span data-dcnode-id="6196" instrument_node=""> </span><p data-dcnode-id="6194"><span data-dcnode-id="6195" instrument_node="">In this post we explore some of the leading solutions to find the best password manager for the healthcare industry – One that is easy to use, reasonably priced and, most importantly considering the extent to which the industry is targeted by hackers, has excellent security. HIPAA and Password Management The HIPAA Security Rule was signed into law at a time when the requirements for password complexity were far lower, fewer passwords had to be created and remembered, and cracking passwords was a long and slow process. In the 18 years since the HIPAA Security Rule took effect, a lot has changed. The changes to best practices over time is the reason why the HIPAA Security rule is not technology specific. The Security Rule was written to be flexible to allow for changes to best practices. What was perfectly acceptable in 2003 for passwords, is no where near enough in 2021. The HIPAA Security Rule has provisions covering passwords. The technical safeguards of the HIPAA Security Rule (45 CFR § 164.312), require covered entities to implement technical procedures for systems that maintain...</span></p><span data-dcnode-id="6193" instrument_node=""> </span></div><span data-dcnode-id="6191" instrument_node=""> </span><span data-dcnode-id="6189" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6101"><span data-dcnode-id="6105" instrument_node="">Posted By </span><a data-dcnode-id="6103" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6104" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6102" instrument_node=""> on May 11, 2021</span></p><span data-dcnode-id="6100" instrument_node=""> </span><p data-dcnode-id="6098"><span data-dcnode-id="6099" instrument_node="">In 2010, the Office of the National Coordinator for Health Information Technology (ONC) – a branch of Department for Health and Human Services (HHS) – published “10 Best Practices for the Small Healthcare Environment” (PDF). The publication – the ONC claimed – was “not intended to provide guidance on how to comply with HIPAA”, but rather “a first step to the effective setup of new EHR systems in a way that minimizes the risk to health information maintained in EHRs”. However, the timing of the publication was not an accident. A year earlier, Congress had passed the HITECH Act and Meaningful Use program which incentivized Covered Entities to adopt technology for creating, maintaining, and providing access to Protected Health Information. The HITECH Act also required Business Associates to comply with HIPAA for the first time and, as many Business Associates operate in “small healthcare environments”, the publication was relevant. The publication also came at a time when larger Covered Entities, who had not previously adopted technologies such as EHR systems, were now doing so to...</span></p><span data-dcnode-id="6097" instrument_node=""> </span></div><span data-dcnode-id="6095" instrument_node=""> </span><span data-dcnode-id="6093" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6053"><span data-dcnode-id="6057" instrument_node="">Posted By </span><a data-dcnode-id="6055" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6056" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6054" instrument_node=""> on May 7, 2021</span></p><span data-dcnode-id="6052" instrument_node=""> </span><p data-dcnode-id="6050"><span data-dcnode-id="6051" instrument_node="">According to the Administrative Guidelines of the HIPAA Security Rule, Covered Entities and Business Associates must create procedures for “creating, changing, and safeguarding passwords” (45 CFR § 164.308). The inclusion of the word “changing” implies passwords only have a certain lifecycle. But is that really the case? And, if so, what are the HIPAA password expiration requirements? The concept of HIPAA password expiration requirements goes back to the early 2000s when, within a short time of each other, the Department of Health and Human Services (HHS) issued the HIPAA Final Security Rule (2003) and the National Institute of Standards and Technology (NIST) issued “Special Publication 800-63” (2004), which included a section on password best practices. At the time “Special Publication 800-63 Appendix A” was issued, Covered Entities were preparing to meet the compliance requirements of the Security Rule by the 2006 deadline. However, the language of the Security Rule is deliberately flexible to cover as many different types of Covered Entity as possible, open to interpretation,...</span></p><span data-dcnode-id="6049" instrument_node=""> </span></div><span data-dcnode-id="6047" instrument_node=""> </span><span data-dcnode-id="6045" instrument_node="">

</span><p class="post-meta" data-dcnode-id="6005"><span data-dcnode-id="6009" instrument_node="">Posted By </span><a data-dcnode-id="6007" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="6008" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="6006" instrument_node=""> on May 1, 2021</span></p><span data-dcnode-id="6004" instrument_node=""> </span><p data-dcnode-id="6002"><span data-dcnode-id="6003" instrument_node="">The sharing of passwords across multiple platforms is a bad idea. If one platform suffers a data breach, all other systems that have the same password set could also easily be compromised. Even though the reuse of passwords is unwise, and many organizations have policies in place prohibiting employees from recycling passwords, it remains a common practice. Many organizations have implemented policies, procedures and technology to prevent weak passwords from being used and they force end users to change their passwords frequently, but it is difficult for organizations to prevent password recycling. The practice has recently been investigated by Preempt. Preempt has developed a tool that can be used by enterprises to assess the strength of the passwords used by their employees. The tool reports on the accounts that have weak passwords set, allowing the enterprise to take action. The tool also compares passwords to a database of 10 million passwords compromised in previous data breaches that are now in the hands of cybercriminals. An analysis of data from enterprises that downloaded...</span></p><span data-dcnode-id="6001" instrument_node=""> </span></div><span data-dcnode-id="5999" instrument_node=""> </span><span data-dcnode-id="5997" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5957"><span data-dcnode-id="5961" instrument_node="">Posted By </span><a data-dcnode-id="5959" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5960" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5958" instrument_node=""> on Apr 2, 2021</span></p><span data-dcnode-id="5956" instrument_node=""> </span><p data-dcnode-id="5954"><span data-dcnode-id="5955" instrument_node="">The Health Insurance Portability and Accountability Act (HIPAA) was signed into law in August 1996 and led to the development of the HIPAA Privacy Rule in 2003 and the HIPAA Security Rule in 2005, but how did the Health Information Technology for Economic and Clinical Health (HITECH) Act change HIPAA and what is the relationship between HITECH, HIPAA, and electronic health and medical records? What is the Relationship Between HITECH and HIPAA and Medical Records? Title I of HIPAA is concerned with the portability of health insurance and protecting the rights of workers between jobs to ensure health insurance coverage is maintained, which have nothing to do with the HITECH Act. However, there is a strong relationship between HITECH and HIPAA Title II. Title II of HIPAA includes the administrative provisions, patient privacy protections, and security controls for health and medical records and other forms of protected health information (PHI). One of the main aims of the HITECH Act was to encourage the adoption of electronic health and medical records by creating financial incentives...</span></p><span data-dcnode-id="5953" instrument_node=""> </span></div><span data-dcnode-id="5951" instrument_node=""> </span><span data-dcnode-id="5949" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5909"><span data-dcnode-id="5913" instrument_node="">Posted By </span><a data-dcnode-id="5911" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5912" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5910" instrument_node=""> on Mar 15, 2021</span></p><span data-dcnode-id="5908" instrument_node=""> </span><p data-dcnode-id="5906"><span data-dcnode-id="5907" instrument_node="">Microsoft Teams is a popular communications platform used by many businesses to communicate more effectively, but can the solution be used in healthcare? Is Microsoft Teams HIPAA compliant? Microsoft Teams is a unified communication platform that includes workplace chat, video meetings, and file sharing and can be integrated into a range of different applications. The platform can be used to improve communication and collaboration in the workplace and with business associates. The platform is based on Office 365 (click here for information on Office 365 and HIPAA). Office 365 can be used in a HIPAA compliant manner, but in order for Microsoft Teams to be HIPAA compliant it must include a range of security features to keep any electronic protected health information secure. In the security compliance section of the Microsoft website, Microsoft explains that Microsoft Teams delivers advanced security and compliance and is included in its Tier-D compliance category. Tier D services have safeguards active by default and are compliant with ISO 27001, ISO 27018, SSAE16 SOC 1 and SOC 2,...</span></p><span data-dcnode-id="5905" instrument_node=""> </span></div><span data-dcnode-id="5903" instrument_node=""> </span><span data-dcnode-id="5901" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5861"><span data-dcnode-id="5865" instrument_node="">Posted By </span><a data-dcnode-id="5863" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5864" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5862" instrument_node=""> on Mar 9, 2021</span></p><span data-dcnode-id="5860" instrument_node=""> </span><p data-dcnode-id="5858"><span data-dcnode-id="5859" instrument_node="">On March 4, 2021, Senator Robert Menendez (D-New Jersey), and Reps. Bonnie Watson Coleman (D-New Jersey) and Mikie Sherrill (D-New Jersey) wrote a letter urging the Federal Trade Commission (FTC) to start enforcing the Health Breach Notification Rule. The Federal Trade Commission (FTC) has a mandate to protect Americans from bad actors that betray consumer trust and misuse consumers’ healthcare data and has the authority to take enforcement action but is not enforcing compliance with the Health Breach Notification Rule. The Health Breach Notification Rule was introduced as part of the American Recovery and Reinvestment Act of 2009 and requires vendors of personal health records, PHR related entities, and third-party service providers to inform consumers about unauthorized disclosures of personal health information. The Health Breach Notification Rule applies to entities not covered by the Health Insurance Portability and Accountability Act (HIPAA), and has similar provisions to the HIPAA Breach Notification Rule. While the HHS’ Office for Civil Rights has enforced compliance with...</span></p><span data-dcnode-id="5857" instrument_node=""> </span></div><span data-dcnode-id="5855" instrument_node=""> </span><span data-dcnode-id="5853" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5813"><span data-dcnode-id="5817" instrument_node="">Posted By </span><a data-dcnode-id="5815" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5816" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5814" instrument_node=""> on Feb 16, 2021</span></p><span data-dcnode-id="5812" instrument_node=""> </span><p data-dcnode-id="5810"><span data-dcnode-id="5811" instrument_node="">The personally identifiable health information of millions of individuals is being exposed through the Application Programming Interfaces (APIs) used by mobile health (mHealth) applications, according to a recent study published by cybersecurity firm Approov. Ethical hacker and researcher Allissa Knight conducted the study to determine how secure popular mHealth apps are and whether it is possible to gain access to users’ sensitive health data. One of the provisos of the study was she would not be permitted to name any of the apps if vulnerabilities were identified. She assessed 30 of the leading mHealth apps and discovered all were vulnerable to API attacks which could allow unauthorized individuals to gain access to full patient records, including personally identifiable information (PII) and protected health information (PHI), indicating security issues are systemic. mHealth apps have proven to be invaluable during the COVID-19 pandemic and are now increasingly relied on by hospitals and healthcare providers. According to Pew Research, mHealth apps are now generating more user...</span></p><span data-dcnode-id="5809" instrument_node=""> </span></div><span data-dcnode-id="5807" instrument_node=""> </span><span data-dcnode-id="5805" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5765"><span data-dcnode-id="5769" instrument_node="">Posted By </span><a data-dcnode-id="5767" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5768" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5766" instrument_node=""> on Feb 2, 2021</span></p><span data-dcnode-id="5764" instrument_node=""> </span><p data-dcnode-id="5762"><span data-dcnode-id="5763" instrument_node="">Two members of the Department of Veteran Affairs’ (VA) information technology staff are alleged to have made false representations about the privacy and security risks of a big data AI project between the VA and a private company that would have seen the private and confidential health data of tens of millions of veterans fed into the AI system. An administrative investigation was conducted by the VA Office of Inspector General (OIG) into a potential conflict of interest related to a cooperative research and development agreement (CRADA) between the VA and a private company in 2016. The purpose of the collaboration was to improve the health and wellness of veterans using AI and deep learning technology developed by Flow Health. The project aimed to identify common elements that make people susceptible to disease, identify potential treatments and possible side effects to inform care decisions and to improve the accuracy of diagnoses. The CRADA would have resulted in the private and confidential health data, including genomic data, of all veterans who had received medical treatment...</span></p><span data-dcnode-id="5761" instrument_node=""> </span></div><span data-dcnode-id="5759" instrument_node=""> </span><span data-dcnode-id="5757" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5717"><span data-dcnode-id="5721" instrument_node="">Posted By </span><a data-dcnode-id="5719" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5720" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5718" instrument_node=""> on Jan 22, 2021</span></p><span data-dcnode-id="5716" instrument_node=""> </span><p data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">Information blocking by electronic health record (EHR) vendors is still highly prevalent, despite recent policymaking that prohibits information blocking practices, according to a recent study published in the Journal of the American Medical Informatics Association (JAMIA). To identify the extent of the problem, the researchers conducted a national survey of health information exchange organizations (HIEs). HIEs were chosen as they are directly connected to EHR vendors and health systems and are therefore in an ideal position to assess interoperability and data sharing. 86 out of the 106 HIEs that met the qualification criteria responded and answered three questions: How often do EHR vendors and health systems practice information blocking? How are these information blocking practices conducted? What is the impact of local market competitiveness on information blocking behavior? A majority of HIEs (55%) reported cases of information blocking by EHR vendors at least some of the time and 14% said all EHR vendors engaged in information blocking. 30% of respondents said information...</span></p><span data-dcnode-id="5713" instrument_node=""> </span></div><span data-dcnode-id="5711" instrument_node=""> </span><span data-dcnode-id="5709" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5669"><span data-dcnode-id="5673" instrument_node="">Posted By </span><a data-dcnode-id="5671" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5672" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5670" instrument_node=""> on Jan 22, 2021</span></p><span data-dcnode-id="5668" instrument_node=""> </span><p data-dcnode-id="5666"><span data-dcnode-id="5667" instrument_node="">The Biden administration has appointed Micky Tripathi as the National Coordinator for Health IT at the Department of Health and Human Services’ Office. Tripathi will head the Office of the National Coordinator for Health IT, which is tasked with coordinating efforts to implement advanced health information technology to ensure the secure exchange of health information. The ONC is currently overseeing efforts to provide Americans with easy access to their health records through their smartphones and is implementing 21st Century Cures Act provisions that promote health IT interoperability and prohibit information blocking. Tripathi has a wealth of experience in secure health information exchange and is aware of the current interoperability issues in the healthcare industry. Prior to joining the ONC, Tripathi was most recently the chief alliance officer at the healthcare analytics and software company Arcadia, where he was responsible for developing partnerships to enhance healthcare with advanced IT technology. Tripathi has also served as manager of the strategy and management...</span></p><span data-dcnode-id="5665" instrument_node=""> </span></div><span data-dcnode-id="5663" instrument_node=""> </span><span data-dcnode-id="5661" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5573"><span data-dcnode-id="5577" instrument_node="">Posted By </span><a data-dcnode-id="5575" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5576" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5574" instrument_node=""> on Dec 9, 2020</span></p><span data-dcnode-id="5572" instrument_node=""> </span><p data-dcnode-id="5570"><span data-dcnode-id="5571" instrument_node="">Data show 70% of delays in providing treatment to patients is due to miscommunication, so resolving the problems that result in miscommunication in healthcare is key to improving quality of care, clinical outcomes, and the patient experience. One of the biggest contributory factors to miscommunication is the use of outdated communications systems, which has long been a problem in healthcare. Fortunately, there is a solution that has been shown to greatly improve communication efficiency and reduce the potential for errors and miscommunication – a secure texting platform. To find out more about secure, HIPAA-compliant messaging and how it can make care teams immediately more efficient&nbsp;and effective, we invite you to join this upcoming webinar. During the webinar you will discover how this single change can lead to major improvements in collaboration, save valuable time, decrease costs, and lead to happier staff and patients. The webinar is being hosted by TigerConnect, the leading secure healthcare messaging provider, and will take place on Wednesday, December 9 at 10 a.m. PT / 1...</span></p><span data-dcnode-id="5569" instrument_node=""> </span></div><span data-dcnode-id="5567" instrument_node=""> </span><span data-dcnode-id="5565" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5525"><span data-dcnode-id="5529" instrument_node="">Posted By </span><a data-dcnode-id="5527" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5528" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5526" instrument_node=""> on Nov 25, 2020</span></p><span data-dcnode-id="5524" instrument_node=""> </span><p data-dcnode-id="5522"><span data-dcnode-id="5523" instrument_node="">On Friday last week, the Department of Health and Human Services’ Centers for Medicare and Medicaid Services (CMS) and Office of Inspector General (OIG) published final rules that aim to improve the coordination of care and reduce regulatory barriers. Both final rules contain safe harbor provisions that allow hospitals and healthcare delivery systems to donate cybersecurity technology to physician practices. The CMS released the final version of the 627-page Modernizing and Clarifying the Physician Self-Referral Regulations, commonly called Stark Law, and the OIG finalized revisions to the 1,049-page Safe Harbors Under the Anti-Kickback Statute and Civil Monetary Penalty Rules Regarding Beneficiary Inducements. Physician practices often have limited resources, which makes it difficult for them to implement solutions to address cybersecurity risks. Without the necessary protections, sensitive healthcare data could be accessed by unauthorized individuals, stolen, deleted, or encrypted by threat actors. Threat actors could also conduct attacks on small physician practices and...</span></p><span data-dcnode-id="5521" instrument_node=""> </span></div><span data-dcnode-id="5519" instrument_node=""> </span><span data-dcnode-id="5517" instrument_node="">

</span><p class="post-meta" data-dcnode-id="5381"><span data-dcnode-id="5385" instrument_node="">Posted By </span><a data-dcnode-id="5383" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="5384" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="5382" instrument_node=""> on Sep 4, 2020</span></p><span data-dcnode-id="5380" instrument_node=""> </span><p data-dcnode-id="5378"><span data-dcnode-id="5379" instrument_node="">The Department of Health and Human Services’ Office for Civil Rights has announced it has published additional resources for mobile health app developers and has updated and renamed its Health App Developer Portal. The portal – Resources for Mobile Health Apps Developers – provides guidance for mobile health app developers on the HIPAA Privacy, Security, and Breach Notification Rules and how they apply to mobile health apps and application programming interfaces (APIs). The portal includes a guidance document on Health App Use Scenarios and HIPAA, which explains when mHealth applications must comply with the HIPAA Rules and if an app developer will be classed as a business associate. “Building privacy and security protections into technology products enhances their value by providing some assurance to users that the information is secure and will be used and disclosed only as approved or expected,” explained OCR. “Such protections are sometimes required by federal and state laws, including the HIPAA Privacy, Security, and Breach Notification Rules.” The portal provides access to...</span></p><span data-dcnode-id="5377" instrument_node=""> </span></div><span data-dcnode-id="5375" instrument_node=""> </span><span data-dcnode-id="5373" instrument_node="">
