</span><p class="post-meta" data-dcnode-id="3125"><span data-dcnode-id="3129" instrument_node="">Posted By </span><a data-dcnode-id="3127" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3128" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3126" instrument_node=""> on Feb 26, 2019</span></p><span data-dcnode-id="3124" instrument_node=""> </span><p data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">The National Health Service (NHS) has commissioned a report on the costs of pagers and the extent of their use in NHS Trusts in the UK. The study revealed around 130,000 pagers are used in NHS Trusts – Approximately 10% of the world’s pagers – and the annual cost is around £6.6 million ($8.73 million). Advantages and Disadvantages of Pagers in Healthcare Pagers have served the healthcare industry well for several decades and they are still useful devices. Pagers are easy to use, they are small, easy to carry, and batteries can last months between charges. The pager system uses its own transmitters and frequencies and the signals can pass through structures. Consequently, coverage is excellent, and communication is fast and reliable. Pagers have one function and they perform that task very well. However, there are many drawbacks to pagers in healthcare. Most of the pagers used by NHS Trusts do not support two-way communication. When a message is received, a doctor must find a phone and call a number to receive the message. When an immediate response is not possible, messages are...</span></p><span data-dcnode-id="3121" instrument_node=""> </span></div><span data-dcnode-id="3119" instrument_node=""> </span><span data-dcnode-id="3117" instrument_node="">

</span><h2 data-dcnode-id="3083"><a data-dcnode-id="3084" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/mobile-device-security-guidance/"><span data-dcnode-id="3085" instrument_node="">NIST NCCoE Releases Mobile Device Security Guide</span></a></h2><span data-dcnode-id="3082" instrument_node="">
</span><p class="post-meta" data-dcnode-id="3077"><span data-dcnode-id="3081" instrument_node="">Posted By </span><a data-dcnode-id="3079" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3080" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3078" instrument_node=""> on Feb 22, 2019</span></p><span data-dcnode-id="3076" instrument_node=""> </span><p data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">The National Cybersecurity Center of Excellence&nbsp;(NCCoE) has released final guidance on mobile device security to help organizations secure mobile devices and prevent data breaches. Mobile devices offer convenience and allow data to be accessed from any location. Not only do they allow healthcare organizations to make cost savings, they are vital for remote workers who need access to patients’ health information. Mobile devices allow onsite and offsite workers to communicate information quickly and they can help to improve patient care and outcomes. However, mobile devices introduce security risks. Stolen devices can be used to gain access to corporate email accounts, contacts, calendars, and other sensitive information stored on the devices or accessible through them. There have been many cases where mobile healthcare devices have been lost or stolen causing the exposure of patients’ protected health information. Mobile device security failures have resulted in several financial penalties for HIPAA covered entities, including a $4,348,000 civil monetary penalty for University of...</span></p><span data-dcnode-id="3073" instrument_node=""> </span></div><span data-dcnode-id="3071" instrument_node=""> </span><span data-dcnode-id="3069" instrument_node="">

</span><p class="post-meta" data-dcnode-id="3029"><span data-dcnode-id="3033" instrument_node="">Posted By </span><a data-dcnode-id="3031" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="3032" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="3030" instrument_node=""> on Feb 12, 2019</span></p><span data-dcnode-id="3028" instrument_node=""> </span><p data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">On Monday, February 11, 2019, the HHS’ Office of the National Coordinator for Health Information Technology (ONC) and the Centers for Medicare and Medicaid Services (CMS) released new rules covering patient data access and information blocking. The aim of the new rules is to advance interoperability and support the meaningful exchange and use of health information. The rules are intended to increase competition, encourage innovation, and give patients control over their health data. One of the main goals is to make health information accessible via application programming interfaces (APIs). Currently consumers use a wide range of smartphone apps for paying bills and accessing information. It should be just as easy to gain access to healthcare data through apps and for healthcare data to be provided electronically at no cost. One of the main requirements of the new rules is for healthcare providers and health plans to implement data sharing technologies that support the transition of care to new healthcare providers and health plans. Whenever a patient wishes to start seeing a new...</span></p><span data-dcnode-id="3025" instrument_node=""> </span></div><span data-dcnode-id="3023" instrument_node=""> </span><span data-dcnode-id="3021" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2981"><span data-dcnode-id="2985" instrument_node="">Posted By </span><a data-dcnode-id="2983" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2984" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2982" instrument_node=""> on Feb 12, 2019</span></p><span data-dcnode-id="2980" instrument_node=""> </span><p data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">Each year, HIMSS conducts a survey to gather information about security experiences and cybersecurity practices at healthcare organizations. The survey provides insights into the state of cybersecurity in healthcare and identifies attack trends and common security gaps. 166 health information security professionals were surveyed for the 2019 HIMSS Cybersecurity Survey, which was conducted from November to December 2018. This year’s survey revealed security incidents are a universal phenomenon in healthcare. Almost three quarters (74%) of healthcare organizations experienced a significant security breach in the past 12 months. 22% said they had not experienced a significant security incident in the past year. The figures are in line with the 2018 HIMSS Cybersecurity Survey, when 21% of respondents said they had not experienced a significant security incident. In 2018, 82% of hospital systems reported a significant security incident, as did almost two thirds of non-acute and vendor organizations. The most common actors implicated in security incidents were online scam artists (28%)...</span></p><span data-dcnode-id="2977" instrument_node=""> </span></div><span data-dcnode-id="2975" instrument_node=""> </span><span data-dcnode-id="2973" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2933"><span data-dcnode-id="2937" instrument_node="">Posted By </span><a data-dcnode-id="2935" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2936" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2934" instrument_node=""> on Feb 7, 2019</span></p><span data-dcnode-id="2932" instrument_node=""> </span><p data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">The Tampa, FL-based electronic health record (EHR) software developer Greenway Health LLC has agreed to settle violations of the False Claims Act with the Department of Justice for $57.25 million. The case concerns Greenway Health’s EHR product Prime Suite. The DOJ alleged that by misrepresenting the capabilities of the product, users submitted false claims to the U.S. government. Further, Greenway Health was alleged to have provided unlawful remuneration to users to induce them to recommend the EHR product to other healthcare providers. The U.S. government provided incentives to healthcare organizations to encourage them to transition to EHRs from paper records through the Meaningful Use program. Most healthcare providers have now made the change and now rely on EHR systems to support the healthcare decision process. It is therefore essential that EHR products allow patient health information to be recorded and transmitted accurately. In order for healthcare providers to qualify for Meaningful Use payments, they must only use EHR products that have been certified as meeting...</span></p><span data-dcnode-id="2929" instrument_node=""> </span></div><span data-dcnode-id="2927" instrument_node=""> </span><span data-dcnode-id="2925" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2885"><span data-dcnode-id="2889" instrument_node="">Posted By </span><a data-dcnode-id="2887" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2888" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2886" instrument_node=""> on Jan 30, 2019</span></p><span data-dcnode-id="2884" instrument_node=""> </span><p data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">The Healthcare and Public Health Sector Coordinating Council (HSCC) has issued a new cybersecurity framework for medical devices. Medical device vendors, healthcare providers, and other healthcare industry stakeholders that adopt the voluntary framework will be able to improve the security of medical devices throughout their lifecycle. The HSCC is a coalition of private sector critical healthcare infrastructure entities that have partnered with the government to identify and mitigate threats and vulnerabilities facing the healthcare sector. The group comprises more than 200 healthcare industry and government organizations. Together they work on developing strategies to address current and emerging cybersecurity challenges faced by the healthcare sector. More than 80 organizations contributed to the development of the Medical Device and Health IT Joint Security Plan (JSP), which builds on recommendations made by the Healthcare Industry Cybersecurity Task Force established by the Department of Health and Human Services following the passing of the Cybersecurity Information Sharing...</span></p><span data-dcnode-id="2881" instrument_node=""> </span></div><span data-dcnode-id="2879" instrument_node=""> </span><span data-dcnode-id="2877" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2837"><span data-dcnode-id="2841" instrument_node="">Posted By </span><a data-dcnode-id="2839" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2840" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2838" instrument_node=""> on Jan 30, 2019</span></p><span data-dcnode-id="2836" instrument_node=""> </span><p data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Becton, Dickinson and Company (BD) has identified an improper access control vulnerability in its BD FACSLyric flow cytometry solution. If the flaw is exploited, an attacker could gain access to administrative level privileges on a vulnerable workstation and execute commands. The vulnerability requires a low level of skill to exploit. BD extensively tests its software for potential vulnerabilities and promptly corrects flaws. BD is currently taking steps to mitigate the vulnerability for all users of vulnerable FACSLyric flow cytometry solutions. The flaw (CVE-2019-6517) is due to improper enforcement of user access control for privileged accounts. It has been given a CVSS v3 base score of 6.8 – Medium severity. BD self-reported the vulnerability to the National Cybersecurity &amp; Communications Integration Center (NCCIC). The vulnerability is present in the following cytometry solutions: BD FACSLyric Research Use Only, Windows 10 Professional Operating System, U.S. and Malaysian Releases (Nov 2017 and Nov 2018) The U.S. release of BD FACSLyric IVD Windows 10 Professional...</span></p><span data-dcnode-id="2833" instrument_node=""> </span></div><span data-dcnode-id="2831" instrument_node=""> </span><span data-dcnode-id="2829" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2789"><span data-dcnode-id="2793" instrument_node="">Posted By </span><a data-dcnode-id="2791" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2792" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2790" instrument_node=""> on Jan 23, 2019</span></p><span data-dcnode-id="2788" instrument_node=""> </span><p data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">A new report from Radware has provided insights into the threat landscape in 2018 and the spiraling cost of cyberattacks. The report shows there has been a 52% increase in the cost of cyberattacks on businesses in since 2017. For the report, Radware surveyed 790 managers, network engineers, security engineers, CIOs, CISOs, and other professionals in organizations around the globe. Respondents to the survey were asked about the issues they have faced preparing for and mitigating cyberattacks and the estimated cost of those attacks. The 2018 Threat Landscape 93% of surveyed firms said they had experienced a cyberattack in the past 12 months. The biggest threat globally was ransomware and other extortion-based attacks, which accounted for 51% of all attacks. In 2017, 60% of cyberattacks involved ransoms. The reduction has been attributed to cybercriminals switching from ransomware to cryptocurrency mining malware. Political attacks and hacktivism accounted for 31% of attacks, down from 34% in 2017. The motive behind 31% of attacks was unknown, which demonstrates that attackers are now...</span></p><span data-dcnode-id="2785" instrument_node=""> </span></div><span data-dcnode-id="2783" instrument_node=""> </span><span data-dcnode-id="2781" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2741"><span data-dcnode-id="2745" instrument_node="">Posted By </span><a data-dcnode-id="2743" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2744" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2742" instrument_node=""> on Jan 23, 2019</span></p><span data-dcnode-id="2740" instrument_node=""> </span><p data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">Seven leading hospital associations, including the American Hospital Association (AHA), are calling for an industry-wide effort to improve data sharing. The new report seeks to enlist and expand public and private stakeholder support to accelerate interoperability and help remove the barriers to data sharing. In order to achieve the full potential of the nation’s healthcare system, health data must flow freely. Only then will it be possible to provide the best possible care to patients, properly engage people in their health, improve public health, and ensure new models of healthcare succeed. Effective sharing of patient data strengthens care coordination, improves safety and quality, empowers patients and their families, increases efficiency, reduces healthcare costs, and supports the accurate tracking of diseases and the creation of robust public health registries. The report explains that great progress is being made to improve interoperability of health IT systems and ensure that patients data can be accessed regardless of location or system. 93% of hospitals now allow patients...</span></p><span data-dcnode-id="2737" instrument_node=""> </span></div><span data-dcnode-id="2735" instrument_node=""> </span><span data-dcnode-id="2733" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2693"><span data-dcnode-id="2697" instrument_node="">Posted By </span><a data-dcnode-id="2695" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2696" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2694" instrument_node=""> on Jan 23, 2019</span></p><span data-dcnode-id="2692" instrument_node=""> </span><p data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">The U.S. Department of Homeland Security Industrial Control Systems Cyber Emergency Team (US-CERT) has issued an advisory about three vulnerabilities affecting Dräger Infinity Delta patient monitoring devices. The flaws affect all versions of Infinity Delta, Delta XL, Kappa, and infinity Explorer C700 patient monitoring devices. The flaws could lead to the disclosure of sensitive information stored in device logs, be leveraged to conduct Denial of Service (DoS) attacks, or could potentially allow an attacker to gain full control of the operating system of a vulnerable device. The flaws were discovered by Marc Ruef and Rocco Gagliardi of scip AG. The vulnerabilities are detailed below, in order of severity: CVE-2018-19014 (CWE-532) – Exposure of Information in Log Files Log files are not appropriately secured and are accessible over an unauthenticated network. An attacker could gain access to device log files and view sensitive information relating to the internals of the monitor, location of the device, and its wired network configuration. The flaw has been assigned a CVSS v3 base...</span></p><span data-dcnode-id="2689" instrument_node=""> </span></div><span data-dcnode-id="2687" instrument_node=""> </span><span data-dcnode-id="2685" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2645"><span data-dcnode-id="2649" instrument_node="">Posted By </span><a data-dcnode-id="2647" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2648" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2646" instrument_node=""> on Jan 3, 2019</span></p><span data-dcnode-id="2644" instrument_node=""> </span><p data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">The Department of Homeland Security (DHS) United States Computer Emergency Readiness Team (US-CERT) has issued an alert about increased Chinese malicious cyber activity targeting IT service providers such as Managed Service Provider (MSPs), Managed Security Service Providers (MSSPs), Cloud Service Providers (CSPs) and their customers. The attacks take advantage of trust relationships between IT service providers and their customers. A successful cyberattack on a CSP, MSP or MSSP can give the attackers access to healthcare networks and sensitive patient data. The DHS Cybersecurity and Infrastructure Security Agency (CISA) has issued technical details on the tactics and techniques used by Chinese threat actors to gain access to services providers’ networks and the systems of their customers. The information has been shared to allow network defenders to take action to block the threats and reduce exposure to the Chinese threat actors’ activities. Guidance has been released for IT service providers and their customers on the steps that should be taken to improve security to prevent...</span></p><span data-dcnode-id="2641" instrument_node=""> </span></div><span data-dcnode-id="2639" instrument_node=""> </span><span data-dcnode-id="2637" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2597"><span data-dcnode-id="2601" instrument_node="">Posted By </span><a data-dcnode-id="2599" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2600" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2598" instrument_node=""> on Jan 2, 2019</span></p><span data-dcnode-id="2596" instrument_node=""> </span><p data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">The U.S. Department of Health and Human Services has issued voluntary cybersecurity best practices for healthcare organizations and guidelines for managing cyber threats and protecting patients. Healthcare technologies are essential for providing care to patients, yet those technologies introduce risks. If those risks are not properly managed they can result in disruption to healthcare operations, costly data breaches, and harm to patients. The HHS notes that $6.2 billion was lost by the U.S. Health Care System in 2016 as a result of data breaches and 4 out of 5 physicians in the United States have experienced some form of cyberattack. The average cost of a data breach for a healthcare organization is now $2.2 million. “Cybersecurity is everyone’s responsibility.&nbsp;It is the responsibility of every organization working in healthcare and public health,”&nbsp;said Janet Vogel, HHS Acting Chief Information Security Officer. “In all of our efforts, we must recognize and leverage the value of partnerships among government and industry stakeholders to tackle the shared problems...</span></p><span data-dcnode-id="2593" instrument_node=""> </span></div><span data-dcnode-id="2591" instrument_node=""> </span><span data-dcnode-id="2589" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2549"><span data-dcnode-id="2553" instrument_node="">Posted By </span><a data-dcnode-id="2551" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2552" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2550" instrument_node=""> on Nov 23, 2018</span></p><span data-dcnode-id="2548" instrument_node=""> </span><p data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">The National Institute of Standards and Technology’s National Cybersecurity Center of Excellence (NCCoE) has released a draft paper covering the privacy and security risks of telehealth and remote monitoring devices along with best practices for securing the telehealth and remote monitoring ecosystem. Patient monitoring systems have traditionally been deployed within healthcare facilities; however, there has been an increase in the use of remote patient monitoring systems in patients’ homes in recent years. While these systems are straightforward to secure in a controlled environment such as a hospital, the use of these systems in patients’ homes introduces new risks. Managing the risks and ensuring the remote monitoring systems and devices have an equivalent level of security as in-house systems can be a major challenge. The purpose of the paper is to create a reference architecture which addresses the security and privacy risks and provides practical steps that can be taken to improve the overall security of the remote patient monitoring environment. The paper addresses...</span></p><span data-dcnode-id="2545" instrument_node=""> </span></div><span data-dcnode-id="2543" instrument_node=""> </span><span data-dcnode-id="2541" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2501"><span data-dcnode-id="2505" instrument_node="">Posted By </span><a data-dcnode-id="2503" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2504" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2502" instrument_node=""> on Nov 20, 2018</span></p><span data-dcnode-id="2500" instrument_node=""> </span><p data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">The American Medical Informatics Association (AMIA) is calling for the Trump Administration to tighten data privacy rules through greater alignment of HIPAA and the Common Rule and recommends adoption of a more integrated approach to privacy that includes both the healthcare and consumer sectors. The call follows a request for comment by the NTIA to initiate a conversation about consumer privacy. In a letter to the National Telecommunications and Information Administration (NTIA), a division of the Department of Commerce, AMIA explained that its comments are informed by extensive experience of dealing with both the Health Insurance Portability and Accountability Act and the Federal Protections for Human Subjects Research (Common Rule). Currently, there is a patchwork of federal and state regulations that complicates compliance and creates information sharing challenges which results in ‘perverse outcomes’ due to different interpretations of existing privacy policies. AMIA illustrated the problem of the current patchwork of privacy policies using Pennsylvania and New Jersey as an...</span></p><span data-dcnode-id="2497" instrument_node=""> </span></div><span data-dcnode-id="2495" instrument_node=""> </span><span data-dcnode-id="2493" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2453"><span data-dcnode-id="2457" instrument_node="">Posted By </span><a data-dcnode-id="2455" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2456" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2454" instrument_node=""> on Nov 15, 2018</span></p><span data-dcnode-id="2452" instrument_node=""> </span><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">The U.S. Department of Homeland Security will be forming a new agency solely focused on cybersecurity following the passing of new legislation by Congress. The Cybersecurity and Infrastructure Security Agency Act of 2018 (CISA Act) amends the Homeland Security Act of 2002 can calls for DHS to form a new Cybersecurity and Infrastructure Security Agency. The CISA Act was unanimously passed by the House of Representatives and just awaits the president’s signature. The new agency will be formed through the reorganization of the National Protection and Programs Directorate (NPPD) and will have the same status as other DHS agencies such as the U.S. Secret Service. The NPPD is already responsible for reducing and eliminating threats to U.S. critical physical and cyber infrastructure, with cybersecurity elements covered by the Office of Cybersecurity and Communications and the National Risk Management Center. NPPD currently coordinates IT security initiatives with other entities, local, state, tribal and territorial governments and the private sector and oversees cybersecurity at federal...</span></p><span data-dcnode-id="2449" instrument_node=""> </span></div><span data-dcnode-id="2447" instrument_node=""> </span><span data-dcnode-id="2445" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2405"><span data-dcnode-id="2409" instrument_node="">Posted By </span><a data-dcnode-id="2407" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2408" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2406" instrument_node=""> on Nov 8, 2018</span></p><span data-dcnode-id="2404" instrument_node=""> </span><p data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">ICS-CERT has issued an advisory concerning five vulnerabilities that have been identified in Roche Point of Care handheld medical devices. Four vulnerabilities are high risk and one has been rated medium risk. Successful exploitation of the vulnerabilities could allow an unauthorized individual to gain access to the vulnerable devices, modify system settings to alter device functionality, and execute arbitrary code. The vulnerabilities affect the following Roche Point of Care handheld medical devices. Accu-Chek Inform II (except Accu-Chek Inform II Base Unit Light and Accu-Chek Inform II Base Unit NEW with Software 04.00.00 or later) CoaguChek Pro II CoaguChek XS Plus &amp; XS Pro Cobas h 232 POC Including the related base units (BU), base unit hubs and handheld base units (HBU). CVE-2018-18564 is an improper access control vulnerability. An attacker in the adjacent network could execute arbitrary code on the system using a specially crafted message. The vulnerability is rated high severity and has been assigned a CVSS v3 base score of 8.3. The vulnerability is present in:...</span></p><span data-dcnode-id="2401" instrument_node=""> </span></div><span data-dcnode-id="2399" instrument_node=""> </span><span data-dcnode-id="2397" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2357"><span data-dcnode-id="2361" instrument_node="">Posted By </span><a data-dcnode-id="2359" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2360" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2358" instrument_node=""> on Nov 8, 2018</span></p><span data-dcnode-id="2356" instrument_node=""> </span><p data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">The HHS’ Office of Inspector General (OIG) has published the findings of an audit of the FDA’s policies and procedures for addressing medical device cybersecurity in the postmarket phase.&nbsp; Several deficiencies in FDA policies and procedures were identified by OIG auditors. Ensuring the safety, security, and effectiveness of medical devices is a key management challenge for the Department of Health and Human Services. It is the responsibility of the U.S. Food and Drug Administration (FDA) to ensure all medical devices that come to market are secure and incorporate cybersecurity protections to prevent cyberattacks that could alter the functionality of the devices which could cause harm to patients. The FDA has developed policies and procedures to ensure that cybersecurity protections are reviewed before medical devices come to market and the agency has plans and processes for addressing medical device issues, such as cybersecurity incidents, in the postmarket stage. However, OIG determined that those plans and practices are insufficient in several areas. One area of weakness concerns...</span></p><span data-dcnode-id="2353" instrument_node=""> </span></div><span data-dcnode-id="2351" instrument_node=""> </span><span data-dcnode-id="2349" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2309"><span data-dcnode-id="2313" instrument_node="">Posted By </span><a data-dcnode-id="2311" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2312" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2310" instrument_node=""> on Oct 18, 2018</span></p><span data-dcnode-id="2308" instrument_node=""> </span><p data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">The U.S. Food and Drug Administration (FDA) and the Department of Homeland Security (DHS) have announced a memorandum of agreement to implement a new framework to increase collaboration and improve coordination of their efforts to increase medical device security. The security of medical devices has long been a concern. Cybersecurity flaws in medical devices could potentially be exploited to cause patients harm, and with an increasing number of medical devices now connecting to healthcare networks, it is more important than ever to ensure adequate protections are in place to ensure patient safety and threats are rapidly identified, addressed and mitigated. Medical devices are a potential weak point that could be exploited to gain access to healthcare networks and sensitive data, they could be used to gain a foothold to launch further cyberattacks that could prevent healthcare providers from providing care to patients. Vulnerabilities could also be exploited to deliberately cause harm to patients. While the latter is not believed to have occurred to date, it is a very real...</span></p><span data-dcnode-id="2305" instrument_node=""> </span></div><span data-dcnode-id="2303" instrument_node=""> </span><span data-dcnode-id="2301" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2213"><span data-dcnode-id="2217" instrument_node="">Posted By </span><a data-dcnode-id="2215" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2216" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2214" instrument_node=""> on Oct 16, 2018</span></p><span data-dcnode-id="2212" instrument_node=""> </span><p data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">The U.S. Food and Drug Administration (FDA) has issued a warning about vulnerabilities in certain Medtronic implantable cardiac device programmers which could potentially be exploited by hackers to change the functionality of the programmer during implantation or follow up visits. Approximately 34,000 vulnerable programmers are currently in use. The programmers are used by physicians to obtain performance data, to check the status of the battery, and to reprogram the settings on Medtronic cardiac implantable electrophysiology devices (CIEDs) such as pacemakers, implantable defibrillators, cardiac resynchronization devices, and insertable cardiac monitors. The flaws are present in Medtronic CareLink 2090 and CareLink Encore 29901 programmers, specifically how the devices connect with the Medtronic Software Distribution Network (SDN) over the internet. The connection is required to download software updates for the programmer and firmware updates for Medtronic CIEDs. While a virtual private network (VPN) is used to establish a connection between the programmers and the Medtronic SDN,...</span></p><span data-dcnode-id="2209" instrument_node=""> </span></div><span data-dcnode-id="2207" instrument_node=""> </span><span data-dcnode-id="2205" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2165"><span data-dcnode-id="2169" instrument_node="">Posted By </span><a data-dcnode-id="2167" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2168" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2166" instrument_node=""> on Oct 4, 2018</span></p><span data-dcnode-id="2164" instrument_node=""> </span><p data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">The ECRI Institute, a non-profit organization that researches new approaches to improve patient care, has published its annual list of the top ten health technology hazards for 2019. The purpose of the list is to help healthcare organizations identify possible sources of danger or issues with technology that have potential to cause patients harm to allow them to take action to reduce the risk of adverse events occurring. To create the list, ECRI Institute engineers, scientists, clinicians and patient safety analysts used expertise gained through testing of medical devices, investigating safety incidents, assessing hospital practices, reviewing literature and talking to healthcare professionals and medical device suppliers to identify the main threats to medical devices and systems that warrant immediate attention. Weighting factors used to produce the final top 10 list includes the likelihood of hazards causing severe injury or death, the frequency of incidents, the number of individuals likely to be affected, insidiousness, effect on the healthcare organization, and the actions...</span></p><span data-dcnode-id="2161" instrument_node=""> </span></div><span data-dcnode-id="2159" instrument_node=""> </span><span data-dcnode-id="2157" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2117"><span data-dcnode-id="2121" instrument_node="">Posted By </span><a data-dcnode-id="2119" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2120" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2118" instrument_node=""> on Oct 1, 2018</span></p><span data-dcnode-id="2116" instrument_node=""> </span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">The National Institute of Standards and Technology (NIST) has released a draft guidance document that aims to help federal agencies and other organizations understand the challenges associated with securing Internet of Things (IoT) devices and manage the cybersecurity and privacy risks that IoT devices can introduce. The guidance document – Considerations for Managing Internet of Things (IoT) Cybersecurity and Privacy Risks (NIST IR 8228) is the first in a series of new publications address cybersecurity and privacy together and the document is the foundation for a series of further publications that will explore IoT device cybersecurity and privacy in more detail. “IoT is a rapidly evolving and expanding collection of diverse technologies that interact with the physical world. Many organizations are not necessarily aware of the large number of IoT devices they are already using and how IoT devices may affect cybersecurity and privacy risks differently than conventional information technology devices,” explained NIST. In the guidance document, NIST identifies three high-level...</span></p><span data-dcnode-id="2113" instrument_node=""> </span></div><span data-dcnode-id="2111" instrument_node=""> </span><span data-dcnode-id="2109" instrument_node="">

</span><p class="post-meta" data-dcnode-id="2069"><span data-dcnode-id="2073" instrument_node="">Posted By </span><a data-dcnode-id="2071" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="2072" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="2070" instrument_node=""> on Sep 20, 2018</span></p><span data-dcnode-id="2068" instrument_node=""> </span><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Jotform has announced that it has released an enterprise version of its HIPAA forms software&nbsp;to allow large healthcare organizations to collect and manage data more efficiently. JotForm is a leading developer of online form software and has more than four million users worldwide. The company’s software solution has been adopted by many enterprises for creating a wide range of data collection forms, although up until now, they were required to use multiple accounts within the same organization. In order to centralize and simplify data collection, the company developed a product to specifically meet the needs of enterprises. Enterprise users can now manage all of their data through a single umbrella account. JotForm Enterprise has no submission limits nor restrictions on the number of forms that can be created and used. The solution includes custom domains for forms, white-labeling for branding purposes, and a suite of management tools. Earlier in 2018, JotForm announced that it is now a HIPAA forms software provider and will sign business associate agreements with healthcare...</span></p><span data-dcnode-id="2065" instrument_node=""> </span></div><span data-dcnode-id="2063" instrument_node=""> </span><span data-dcnode-id="2061" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1973"><span data-dcnode-id="1977" instrument_node="">Posted By </span><a data-dcnode-id="1975" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1976" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1974" instrument_node=""> on Sep 6, 2018</span></p><span data-dcnode-id="1972" instrument_node=""> </span><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">In its August 2018 cybersecurity newsletter, the Department of Health and Human Services’ Office for Civil Rights has reminded HIPAA-covered entities of the importance of implementing physical, technical, and administrative safeguards to ensure the confidentiality, integrity, and availability of electronic protected health information (ePHI) that is processed, transmitted, or stored on electronic media and devices. Electronic devices such as desktop computers, laptops, servers, smartphones, and tablets play a vital role in the healthcare, as do electronic media such as hard drives, zip drives, tapes, memory cards, and CDs/DVDs. However, the portability of many of those devices/media means they can easily be misplaced, lost, or stolen. Physical controls are therefore essential. Anyone with physical access to electronic devices or media, whether healthcare employees or malicious actors, potentially have the ability to view, change, or delete data. Device configurations could be altered or malicious software such as ransomware or malware could be installed. All of these actions...</span></p><span data-dcnode-id="1969" instrument_node=""> </span></div><span data-dcnode-id="1967" instrument_node=""> </span><span data-dcnode-id="1965" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1925"><span data-dcnode-id="1929" instrument_node="">Posted By </span><a data-dcnode-id="1927" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1928" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1926" instrument_node=""> on Aug 31, 2018</span></p><span data-dcnode-id="1924" instrument_node=""> </span><p data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">The National Cybersecurity Center of Excellence (NCCoE) and the National Institute of Standards and Technology (NIST) have released the final version of the NIST Cybersecurity Practice Guide for Securing Wireless Infusion Pumps in healthcare delivery organizations. Wireless infusion pumps are no longer standalone devices. They can be connected to a range of different healthcare systems, networks, and other devices and can be a major cybersecurity risk. If malicious actors are able to gain access to the wireless infusion pump ecosystem, settings could be altered on the pumps or malware could be installed that causes the devices to malfunction, resulting in operational and safety risks. An attack on the devices could result in patients coming to harm, protected health information could be exposed, and a compromise could result in disruption to healthcare services, reputation damage, and considerable financial costs. Securing wireless infusion pumps is a challenge. Standard cybersecurity solutions such as anti-virus software may affect the ability of the device to function correctly...</span></p><span data-dcnode-id="1921" instrument_node=""> </span></div><span data-dcnode-id="1919" instrument_node=""> </span><span data-dcnode-id="1917" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1781"><span data-dcnode-id="1785" instrument_node="">Posted By </span><a data-dcnode-id="1783" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1784" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1782" instrument_node=""> on Aug 9, 2018</span></p><span data-dcnode-id="1780" instrument_node=""> </span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">OpenEMR is an open-source electronic health record management system that is used by many thousands of healthcare providers around the world. It is the leading free-to-use electronic medical record platform and is extremely popular. Around 5,000 physician offices and small healthcare providers in the United States are understood to be using OpenEMR and more than 15,000 healthcare facilities worldwide have installed the platform. Around 100 million patients have their health information stored in the database. Recently, the London-based computer research organization Project Insecurity uncovered a slew of vulnerabilities in the source code which could potentially be exploited to gain access to highly sensitive patient information, and potentially lead to the theft of all patients’ health information. The Project Insecurity team chose to investigate EMR and EHR systems due to the large number of healthcare data breaches that have been reported in recent years. OpenEMR was the natural place to start as it was the most widely used EMR system and with it being open-source, it was easy...</span></p><span data-dcnode-id="1777" instrument_node=""> </span></div><span data-dcnode-id="1775" instrument_node=""> </span><span data-dcnode-id="1773" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1733"><span data-dcnode-id="1737" instrument_node="">Posted By </span><a data-dcnode-id="1735" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1736" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1734" instrument_node=""> on Aug 8, 2018</span></p><span data-dcnode-id="1732" instrument_node=""> </span><p data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">An advisory has been issued by ICS-CERT about vulnerabilities in MedTronic MyCareLink Patient Monitors and the MiniMed 508 Insulin Pump. This is the second advisory to be issued about MyCareLink Patient Monitors in the past six weeks. In June, ICS-CERT issued a warning about the use of a hard-coded password (CVE-2018-8870) and an exposed dangerous method or function vulnerability (CVE-2018-8868). The latest vulnerabilities to be discovered are an insufficient verification of data authenticity flaw (CVE-2018-10626) and the storage of passwords in a recoverable format (CVE-2018-10622). The vulnerabilities are present in all versions of the Medtronic MyCareLink 24950 and 24952 Patient Monitors. If an attacker were to obtain per-product credentials from the monitor and the paired implanted cardiac device, it would be possible for invalid data to be uploaded to the Medtronic Carelink network due to insufficient verification of the authenticity of uploaded data. The vulnerability has been assigned a CVSS v3 score of 4.4 (medium severity). The way that passwords are stored could allow...</span></p><span data-dcnode-id="1729" instrument_node=""> </span></div><span data-dcnode-id="1727" instrument_node=""> </span><span data-dcnode-id="1725" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1685"><span data-dcnode-id="1689" instrument_node="">Posted By </span><a data-dcnode-id="1687" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1688" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1686" instrument_node=""> on Aug 7, 2018</span></p><span data-dcnode-id="1684" instrument_node=""> </span><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">In its July Cybersecurity Newsletter, the Department of Health and Human Services’ Office for Civil Rights has reminded HIPAA covered entities about HIPAA Rules for disposing of electronic devices and media. Prior to electronic equipment being scrapped, decommissioned, returned to a leasing company or resold, all electronic protected health information (ePHI) on the devices must be disposed of in a secure manner. HIPAA Rules for disposing of electronic devices cover all electronic devices capable of storing PHI, including desktop computers, laptops, servers, tablets, mobile phones, portable hard drives, zip drives, and other electronic storage devices such as CDs, DVDs, and backup tapes. Healthcare organizations also need to be careful when disposing of other electronic equipment such as fax machines, photocopiers, and printers, many of which store data on internal hard drives. These devices in particular carry a high risk of a data breach at the end of life as they are not generally thought of as devices capable of storing ePHI. If electronic devices are not disposed of securely...</span></p><span data-dcnode-id="1681" instrument_node=""> </span></div><span data-dcnode-id="1679" instrument_node=""> </span><span data-dcnode-id="1677" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1637"><span data-dcnode-id="1641" instrument_node="">Posted By </span><a data-dcnode-id="1639" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1640" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1638" instrument_node=""> on Jul 30, 2018</span></p><span data-dcnode-id="1636" instrument_node=""> </span><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Cofense has developed a new product which will soon be added to its portfolio of anti-phishing solutions for healthcare organizations and incorporated into its phishing-specific security orchestration, automation and response (SOAR) platform. The announcement comes at a time when the healthcare industry has been experiencing an uptick in phishing attacks. The past few months have seen a large number of healthcare organizations fall victims to phishing attacks that have resulted in cybercriminals gaining access to employee’s email accounts and the PHI contained therein. Perimeter security defenses can be enhanced to greatly reduce the number of malicious emails that reach employees’ inboxes, but even when multiple security solutions are deployed they will not block all phishing threats. Security awareness training is essential to reduce susceptibility to phishing attacks by conditioning employees to stop and think before clicking links in emails or opening questionable email attachments and to report suspicious emails to their security teams. However, security teams can struggle to...</span></p><span data-dcnode-id="1633" instrument_node=""> </span></div><span data-dcnode-id="1631" instrument_node=""> </span><span data-dcnode-id="1629" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1589"><span data-dcnode-id="1593" instrument_node="">Posted By </span><a data-dcnode-id="1591" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1592" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1590" instrument_node=""> on Jul 27, 2018</span></p><span data-dcnode-id="1588" instrument_node=""> </span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">The United States Computer Emergency Readiness Team (US-CERT) has warned businesses about the increasing risk of cyberattacks on enterprise resource planning (ERP) systems such as the cloud-based ERPs developed by SAP and Oracle. These web-based applications are used to manage a variety of business operations, including finances, payroll, billing, logistics, and human resources functions. Consequently, these systems contain a treasure trove of sensitive data – The exact types of data sought by cybercriminals for fraud and cyber espionage. Further, many businesses rely on their ERP systems to function. A cyberattack that takes those systems out of action can have catastrophic consequences, making the systems an attractive target for sabotage by hacktivists and nation state backed hacking groups. The US-CERT warning follows a joint report on the increasing risk of ERP system attacks by cybersecurity firms Digital Shadows and Onapsis. The report focused on two of most widely used ERP systems: SAP HANA and Oracle E-Business. The authors explained that the number of publicly available...</span></p><span data-dcnode-id="1585" instrument_node=""> </span></div><span data-dcnode-id="1583" instrument_node=""> </span><span data-dcnode-id="1581" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1541"><span data-dcnode-id="1545" instrument_node="">Posted By </span><a data-dcnode-id="1543" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1544" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1542" instrument_node=""> on Jul 19, 2018</span></p><span data-dcnode-id="1540" instrument_node=""> </span><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">The U.S. Food and Drug Administration has released new guidance on the use of EHR data in clinical investigations and emphasized that appropriate controls should be put in place to ensure the confidentiality, integrity, and availability of data. While the guidance is non-binding, it provides healthcare organizations with valuable information on steps to take when deciding whether to use EHRs as a source of data for clinical investigations, how to use them and ensure the quality and integrity of EHR data, and how to make sure that any data collected and used as an electronic source of data meets the FDA’s inspection, recordkeeping and data retention requirements. The aim of the guidance is to promote the interoperability of EHR and EDC systems and facilitate the use of EHR data in clinical investigations, such as long-term studies on the safety and effectiveness of drugs, medical devices, and combination products. The guidance does not apply to data collected for registries and natural history studies, the use of EHR data to evaluate the feasibility of trial design or as a...</span></p><span data-dcnode-id="1537" instrument_node=""> </span></div><span data-dcnode-id="1535" instrument_node=""> </span><span data-dcnode-id="1533" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1493"><span data-dcnode-id="1497" instrument_node="">Posted By </span><a data-dcnode-id="1495" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1496" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1494" instrument_node=""> on Jul 10, 2018</span></p><span data-dcnode-id="1492" instrument_node=""> </span><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">The UK’s National Health Service (NHS) has announced that approximately 150,000 patients who had opted out of having their health data shared for the purposes of clinical research and planning have had their data shared against their wishes. In the UK, there are two types of opt-outs patients can choose if they do not want their confidential health data shared. A type 1 opt-out allows patients to stop the health data held in their general practitioner (GP) medical record from being used for anything other than their individual care. A Type 2 opt-out is used to prevent health care data being shared by NHS Digital for purposes other than providing individual care. 150,000 patients who had registered a Type 2 opt-out have had their data shared. The impermissible sharing of health data occurred as a result of an error by one of its EHR vendors, TPP. TPP provides the NHS with the SystmOne EHR system, which is use in many GP practices throughout the UK. A coding error in the system meant that these Type 2 requests were not passed on to NHS Digital, and as a result, NHS Digital was...</span></p><span data-dcnode-id="1489" instrument_node=""> </span></div><span data-dcnode-id="1487" instrument_node=""> </span><span data-dcnode-id="1485" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1445"><span data-dcnode-id="1449" instrument_node="">Posted By </span><a data-dcnode-id="1447" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1448" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1446" instrument_node=""> on Jul 6, 2018</span></p><span data-dcnode-id="1444" instrument_node=""> </span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">HIMSS has released its June Healthcare and Cross-Sector Cybersecurity Report in which healthcare organizations are warned about the risk of exploitation of vulnerabilities in application programming interfaces, man-in the middle attacks, cookie tampering, and distributed denial of service (DDoS) attacks. Healthcare organizations have also been advised to be alert to the possibility of USB devices being used to gain access to isolated networks and the increase in used of Unicode characters to create fraudulent domains for use in phishing attacks. API Attacks Could Be the Next Big Attack Vector Perimeter defenses are improving, making it harder for cybercriminals to gain access to healthcare networks. However, alternative avenues are being explored by hackers looking for an easier route to gain access to sensitive data. Vulnerabilities in API’s could be a weak point and several cybersecurity experts believe APIs could well prove to be the next biggest cyber-attack vector. API usage in application development has become the norm, after all, it is easier to use a third-party solution...</span></p><span data-dcnode-id="1441" instrument_node=""> </span></div><span data-dcnode-id="1439" instrument_node=""> </span><span data-dcnode-id="1437" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1301"><span data-dcnode-id="1305" instrument_node="">Posted By </span><a data-dcnode-id="1303" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1304" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1302" instrument_node=""> on Jul 2, 2018</span></p><span data-dcnode-id="1300" instrument_node=""> </span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">ICS-CERT has issued an advisory about two recently discovered vulnerabilities in Medtronic MyCareLink patient monitors. The devices are used by patients with implantable cardiac devices to transmit their heart rhythm data directly to their clinicians. While the devices have safeguards in place and transmit information over a secure Internet connection, the vulnerabilities could potentially be exploited by a malicious actor to gain privileged access to the operating system of the devices. The vulnerabilities – a hard-coded password vulnerability (CWE-259 / CVE-2018-8870) and an exposed dangerous method of function (CWE-749 / CVE-2018-8868) vulnerability – exist in all versions of 24950 and 24952 MyCareLink Monitors. The former has been assigned a CVSS v3 score of 6.4 and the latter a CVSS v3 score of 6.2. The vulnerabilities were discovered by security researcher Peter Morgan of Clever Security, who reported the issues to NCCCIC. Exploitation of the hard-coded password vulnerability would require physical access to the device. After removing the case, an individual could...</span></p><span data-dcnode-id="1297" instrument_node=""> </span></div><span data-dcnode-id="1295" instrument_node=""> </span><span data-dcnode-id="1293" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1205"><span data-dcnode-id="1209" instrument_node="">Posted By </span><a data-dcnode-id="1207" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1208" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1206" instrument_node=""> on Jun 13, 2018</span></p><span data-dcnode-id="1204" instrument_node=""> </span><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">A recent HIMSS survey has confirmed that medical device security is a strategic priority for most healthcare organizations, yet fewer than half of healthcare providers have an approved budget for tackling security flaws in medical devices. For the study, HIMSS surveyed 101 healthcare industry practitioners in the United States and Asia on behalf of global IT company Unisys. 85% of respondents to the survey said medical device security was a strategic priority and 58% said it was a high priority, yet only 37% of respondents had an approved budget to implement their cybersecurity strategy for medical devices. Small to medium sized healthcare providers were even less likely to have appropriate funds available, with 71% of companies lacking the funds for medical device security improvements. Vulnerabilities in medical devices are frequently being identified. ICS-CERT has issued several recent advisories about flaws in a wide range of devices. In many cases, flaws are identified and corrected before they can be exploited by cybercriminals, although the WannaCry attacks last year showed...</span></p><span data-dcnode-id="1201" instrument_node=""> </span></div><span data-dcnode-id="1199" instrument_node=""> </span><span data-dcnode-id="1197" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1157"><span data-dcnode-id="1161" instrument_node="">Posted By </span><a data-dcnode-id="1159" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1160" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1158" instrument_node=""> on Jun 12, 2018</span></p><span data-dcnode-id="1156" instrument_node=""> </span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">90% of hospitals and 94% of physicians have adopted mobile technology and say it is helping to improve patient safety and outcomes, according to a recent survey conducted by Black Book Research. The survey was conduced on 770 hospital-based users and 1,279 physician practices between Q4, 2017 and Q1, 2018. The survey revealed 96% of hospitals are planning on investing in a new clinical communications platform this year or have already adopted a new, comprehensive communications platform. 85% of surveyed hospitals and 83% of physician practices have already adopted a secure communication platform to improve communications between care teams, patients, and their families. Secure text messaging platform are fast becoming the number one choice due to the convenience of text messages, the security offered by the platforms, and the improvements they make to productivity and profitability. 98% of hospitals and 77% of physician practices said they have implemented secure, encrypted email and are using intrusion detection systems to ensure breaches are detected rapidly. Many providers of...</span></p><span data-dcnode-id="1153" instrument_node=""> </span></div><span data-dcnode-id="1151" instrument_node=""> </span><span data-dcnode-id="1149" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1109"><span data-dcnode-id="1113" instrument_node="">Posted By </span><a data-dcnode-id="1111" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1112" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1110" instrument_node=""> on Jun 6, 2018</span></p><span data-dcnode-id="1108" instrument_node=""> </span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Apple has launched a new application programming interface (API) for developers that will allow them to create health apps that incorporate patients’ EHR data. Patients who load their EHR data into the Apple Health Records app will be able to pass the information directly to third party apps. The move allows app developers to create a wide range of apps that can help patients manage their care. &nbsp;The first apps that will be allowed to access EHR data, if permitted by the patient, should be available in the fall to coincide with the release of iOS 12. One such app that can be used in connection with EHR data through the Apple Health Records app is Medisafe. The Medisafe app will allow patients of participating health systems to download their prescriptions lists and set reminders when their medications need to be taken. The app will also alert them to any potentially harmful interactions between their medications. Apple suggests apps could be developed to help patients manage their medical conditions. Access to EHR data will allow those apps to provide more accurate and useful...</span></p><span data-dcnode-id="1105" instrument_node=""> </span></div><span data-dcnode-id="1103" instrument_node=""> </span><span data-dcnode-id="1101" instrument_node="">

</span><p class="post-meta" data-dcnode-id="1061"><span data-dcnode-id="1065" instrument_node="">Posted By </span><a data-dcnode-id="1063" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1064" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1062" instrument_node=""> on May 14, 2018</span></p><span data-dcnode-id="1060" instrument_node=""> </span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Warnings have been issued by the Department of Homeland Security’s (DHS) Industrial Control Systems Cyber Emergency Response Team (ICS-CERT) about vulnerabilities in several medical devices manufactured by Silex Technology, GE Healthcare, and Phillips. If the vulnerabilities were to be exploited, an unauthorized individual could potentially take control of the devices. Phillips Brilliance CT Scanners In early May, Phillips alerted the National Cybersecurity and Communications Integration Center (NCCIC) about security vulnerabilities affecting its Brilliance CT scanners. Phillips has been working to remediate the vulnerabilities and has been working with DHS to alert users of its devices to help them reduce risk. There have been no reports received to suggest any of the vulnerabilities have been exploited in the wild. Three vulnerabilities have been discovered to affect the following scanners: Brilliance 64 version 2.6.2 and below Brilliance iCT versions 4.1.6 and below Brillance iCT SP versions 3.2.4 and below Brilliance CT Big Bore 2.3.5 and below See ICS-CERT advisory...</span></p><span data-dcnode-id="1057" instrument_node=""> </span></div><span data-dcnode-id="1055" instrument_node=""> </span><span data-dcnode-id="1053" instrument_node="">

</span><h2 data-dcnode-id="1019"><a data-dcnode-id="1020" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/how-to-defend-against-insider-threats-in-healthcare/"><span data-dcnode-id="1021" instrument_node="">How to Defend Against Insider Threats in Healthcare</span></a></h2><span data-dcnode-id="1018" instrument_node="">
</span><p class="post-meta" data-dcnode-id="1013"><span data-dcnode-id="1017" instrument_node="">Posted By </span><a data-dcnode-id="1015" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="1016" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="1014" instrument_node=""> on Apr 26, 2018</span></p><span data-dcnode-id="1012" instrument_node=""> </span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">One of the biggest data security challenges is how to defend against insider threats in healthcare. Insiders are responsible for more healthcare data breaches than hackers, making the industry unique. Verizon’s Protected Health Information Data Breach Report highlights the extent of the problem. The report shows 58% of all healthcare data breaches and security incidents are the result of insiders. Healthcare organizations also struggle to detect insider breaches, with many breaches going undetected for months or even years. One healthcare employee at a Massachusetts hospital was discovered to have been accessing healthcare records without authorization for 14 years before the privacy violations were detected, during which time the records of more than 1,000 patients had been viewed. Healthcare organizations must not only take steps to reduce the potential for insider breaches, they should also implement technological solutions, policies, and procedures that allow breaches to be detected rapidly when they do occur. What are Insider Threats? Before explaining how healthcare...</span></p><span data-dcnode-id="1009" instrument_node=""> </span></div><span data-dcnode-id="1007" instrument_node=""> </span><span data-dcnode-id="1005" instrument_node="">

</span><p class="post-meta" data-dcnode-id="965"><span data-dcnode-id="969" instrument_node="">Posted By </span><a data-dcnode-id="967" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="968" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="966" instrument_node=""> on Apr 25, 2018</span></p><span data-dcnode-id="964" instrument_node=""> </span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">The continued use of outdated software and the failure to patch vulnerabilities promptly is making cyberattacks on healthcare organizations too easy. This was clearly highlighted by the WannaCry ransomware attacks in May 2017. U.S healthcare providers may have escaped relatively unscathed, but that was not the case across the Atlantic in the UK. The NHS was hit particularly badly by WannaCry. Were it not for the discovery of a kill switch by a security researcher, it could have been a similar story in the U.S. This week, Symantec published a report on a recently discovered threat group that has been attacking healthcare organizations for three years and accessing highly sensitive information. Lateral movement within a network has been made easy due to the continued use of outdated operating systems. These are just two examples of several over the past couple of years and the attacks will continue unless action is taken to address the issue. In the UK, a post-WannaCry assessment by the health industry’s governing body revealed the NHS is still badly prepared for similar attacks....</span></p><span data-dcnode-id="961" instrument_node=""> </span></div><span data-dcnode-id="959" instrument_node=""> </span><span data-dcnode-id="957" instrument_node="">

</span><h2 data-dcnode-id="923"><a data-dcnode-id="924" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/hipaa-compliant-form-software/"><span data-dcnode-id="925" instrument_node="">JotForm Announces HIPAA Compliant Form Software</span></a></h2><span data-dcnode-id="922" instrument_node="">
</span><p class="post-meta" data-dcnode-id="917"><span data-dcnode-id="921" instrument_node="">Posted By </span><a data-dcnode-id="919" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="920" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="918" instrument_node=""> on Apr 14, 2018</span></p><span data-dcnode-id="916" instrument_node=""> </span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Healthcare providers that want to collect data from patients via websites and patient portals need to develop their own forms that meet HIPAA requirements or use HIPAA compliant form software. Regardless of the option chosen, safeguards must be incorporated into forms to ensure the confidentiality and integrity of protected health information (PHI) and satisfy the requirements of the HIPAA Security Rule. Safeguards must protect PHI throughout the collection process, both at rest and in transit. Collecting information using physical forms is practical in certain situations, although that places an administrative burden on employees who must enter form data into hospital systems. Transitioning to digital forms improves efficiency. Patients can complete prescription fill requests online, provide updates to their medical histories, and make online online. Healthcare providers can also create digital onboarding forms to efficiently sign up new patients, obtain consent forms, and create online questionnaires. Healthcare providers can avoid headaches by using third-party HIPAA compliant...</span></p><span data-dcnode-id="913" instrument_node=""> </span></div><span data-dcnode-id="911" instrument_node=""> </span><span data-dcnode-id="909" instrument_node="">

</span><p class="post-meta" data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">Posted By </span><a data-dcnode-id="871" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="872" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="870" instrument_node=""> on Mar 20, 2018</span></p><span data-dcnode-id="868" instrument_node=""> </span><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">We have compiled healthcare data breach statistics from October 2009 when the Department of Health and Human Services’ Office for Civil Rights first started publishing summaries of healthcare data breaches on its website. The healthcare data breach statistics below only include data breaches of 500 or more records as smaller breaches are not published by OCR. The breaches include closed cases and breaches still being investigated by OCR. Our healthcare data breach statistics clearly show there has been an upward trend in data breaches over the past 9 years, with 2017 seeing more data breaches reported than any other year since records first started being published. There have also been notable changes over the years in the main causes of breaches. The loss/theft of healthcare records and electronic protected health information dominated the breach reports between 2009 and 2015, although better policies and procedures and the use of encryption has helped reduce these easily preventable breaches. Our healthcare data breach statistics show the main causes of healthcare data breaches...</span></p><span data-dcnode-id="865" instrument_node=""> </span></div><span data-dcnode-id="863" instrument_node=""> </span><span data-dcnode-id="861" instrument_node="">

</span><p class="post-meta" data-dcnode-id="821"><span data-dcnode-id="825" instrument_node="">Posted By </span><a data-dcnode-id="823" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="824" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="822" instrument_node=""> on Feb 26, 2018</span></p><span data-dcnode-id="820" instrument_node=""> </span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">PhishMe, the leading provider of human phishing defense solutions, has announced that from February 26, 2018, the firm will be known as Cofense. Along with the name change, the firm has announced it has been acquired by a private equity syndicate, which valued the firm at $400 million. PhishMe was formed in 2007 with the aim of developing products and services to tackle the growing threat from phishing. Employees have long been viewed as the weakest link in security, yet the human element of security defenses was often neglected. Over the years, PhishMe developed its products and services to help companies improve their last line of defense and turn security liabilities into security assets. PhishMe has helped thousands of organizations improve their defenses against phishing through training and phishing simulations. The firm has also developed a range of associated products and services including a reporting platform that has now been adopted by more than 2 million users, as well as incident response and threat intelligence services. While phishing defense is still at the heart...</span></p><span data-dcnode-id="817" instrument_node=""> </span></div><span data-dcnode-id="815" instrument_node=""> </span><span data-dcnode-id="813" instrument_node="">
