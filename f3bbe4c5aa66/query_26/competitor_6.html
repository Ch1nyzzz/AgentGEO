</span><p class="post-meta" data-dcnode-id="773"><span data-dcnode-id="777" instrument_node="">Posted By </span><a data-dcnode-id="775" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="776" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="774" instrument_node=""> on Feb 19, 2018</span></p><span data-dcnode-id="772" instrument_node=""> </span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Healthcare organizations can benefit greatly from transitioning to the cloud, but it is essential to understand the requirements for cloud computing to ensure HIPAA compliance. In this post we explain some important considerations for healthcare organizations looking to take advantage of the cloud, HIPAA compliance considerations when using cloud services for storing, processing, and sharing ePHI, and we will dispel some of the myths about cloud computing and HIPAA compliance. Myths About Cloud Computing and HIPAA Compliance There are many common misconceptions about the cloud and HIPAA compliance, which in some cases prevent healthcare organizations from taking full advantage of the cloud, and in others could result in violations of HIPAA Rules. Some of the common myths about cloud computing and HIPAA compliance are detailed below: Use of a ‘HIPAA compliant’ cloud service provider will ensure HIPAA Rules are not violated False: A cloud service provider can incorporate all the necessary safeguards to ensure the service or platform can be used in a HIPAA compliant manner, but it is...</span></p><span data-dcnode-id="769" instrument_node=""> </span></div><span data-dcnode-id="767" instrument_node=""> </span><span data-dcnode-id="765" instrument_node="">

</span><h2 data-dcnode-id="731"><a data-dcnode-id="732" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/box-hipaa-compliant/"><span data-dcnode-id="733" instrument_node="">Is Box HIPAA Compliant?</span></a></h2><span data-dcnode-id="730" instrument_node="">
</span><p class="post-meta" data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">Posted By </span><a data-dcnode-id="727" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="728" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="726" instrument_node=""> on Feb 13, 2018</span></p><span data-dcnode-id="724" instrument_node=""> </span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Is Box HIPAA compliant? Can Box be used by healthcare organizations for the storage of documents containing protected health information or would doing so be a violation of HIPAA Rules? An assessment of the security controls of the Box cloud storage and content management service and its suitability for use in healthcare. What is Box? Box is a cloud storage and content management service that supports collaboration and file-sharing. Users can share files, invite others to view, edit or upload content. Box can be used for personal use; however, businesses need to sign up for either a business, enterprise, or elite account. Is Box Covered by the Conduit Exception Rule? The HIPAA conduit exception rule was introduced to allow HIPAA covered entities to use certain communications channels without having to obtain a business associate agreement. The conduit exception rule applies to telecoms companies and Internet service providers that act as conduits through which data flows. Cloud storage services are not covered under the HIPAA conduit exception rule, even if those entities claim...</span></p><span data-dcnode-id="721" instrument_node=""> </span></div><span data-dcnode-id="719" instrument_node=""> </span><span data-dcnode-id="717" instrument_node="">

</span><p class="post-meta" data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">Posted By </span><a data-dcnode-id="679" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="680" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="678" instrument_node=""> on Jan 30, 2018</span></p><span data-dcnode-id="676" instrument_node=""> </span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">The Centers for Medicare &amp; Medicaid Services (CMS) has recently issued a reminder that eligible hospitals and Critical Access Hospitals (CAHs) participating in Electronic Health Record Incentive Schemes must use the QualityNet Secure Portal (QNet) to submit Meaningful Use attestations in 2018. Back in October, CMS announced it was transitioning Meaningful Use attestations to QNet. Previously two separate systems had been used for attestations and reporting clinical quality measures; but, in order to simplify reporting requirements and streamline data submissions, the QNet portal would be used for both from January 2nd 2018. From October, eligible hospitals and CAHs new to QNet had the opportunity to enroll on the system and get used to how it worked, while existing QNet users were advised to add an MU role to their accounts. From the beginning of this month, the QNet system opened for attestations relating to the 2017 calendar year. The attestation period closes on February 28th. Different Processes for Medicare and Medicaid Hospitals Although attempting to simplify the...</span></p><span data-dcnode-id="673" instrument_node=""> </span></div><span data-dcnode-id="671" instrument_node=""> </span><span data-dcnode-id="669" instrument_node="">

</span><h2 data-dcnode-id="635"><a data-dcnode-id="636" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/iphone-users-can-view-health-records-apple-health-app/"><span data-dcnode-id="637" instrument_node="">iPhone Users Can View Their Health Records Through the Apple Health App</span></a></h2><span data-dcnode-id="634" instrument_node="">
</span><p class="post-meta" data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">Posted By </span><a data-dcnode-id="631" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="632" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="630" instrument_node=""> on Jan 26, 2018</span></p><span data-dcnode-id="628" instrument_node=""> </span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Patients are being encouraged to obtain copies of their health records and to take a more active role in their own healthcare. Many hospitals are now providing patients with access to some of their health records through patient portals. Apple has now taken ease of access one step further. The company’s Health app has been updated to include a section that allows users to view their medical records directly on their iPhones. The health app will show allergies, test results, diagnoses, procedures, immunizations, and medications and other health information that is typically available through patient portals. When new information is added to patients’ records, they will receive a notification from the app. The Health app is available with iOS 11.3, and is based on Fast Healthcare Interoperability Resources (FHIR) – a standard for transferring and sharing electronic medical records. Data transmitted to the user’s iPhone is encrypted to prevent unauthorized access, and the app is protected by the user’s iPhone passcode to keep the records confidential. Participating hospitals and...</span></p><span data-dcnode-id="625" instrument_node=""> </span></div><span data-dcnode-id="623" instrument_node=""> </span><span data-dcnode-id="621" instrument_node="">

</span><h2 data-dcnode-id="587"><a data-dcnode-id="588" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/amazon-seeks-hipaa-expert-new-healthcare-venture/"><span data-dcnode-id="589" instrument_node="">Amazon Seeks HIPAA Expert for New Healthcare Venture</span></a></h2><span data-dcnode-id="586" instrument_node="">
</span><p class="post-meta" data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">Posted By </span><a data-dcnode-id="583" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="584" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="582" instrument_node=""> on Jan 17, 2018</span></p><span data-dcnode-id="580" instrument_node=""> </span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Amazon has posted a new job vacancy for a HIPAA Compliance Lead, confirming the retail giant is making a move into the healthcare sector. The HIPAA Compliance Lead will be responsible for creating a HIPAA compliance program to ensure its technology and business processes meet the terms of its BAA and the management of all aspects of that compliance program. The new recruit should have at least 5 years of HIPAA experience in an enterprise, experience with the FDA and 510(k) process, 7+ years’ experience in an information technology setting including exposure to software development/auditing, a thorough understanding of HIPAA/HITECH and OIG compliance standards, and experience with business intelligence and analytics tools. Applicants must also have an understanding of HIPAA privacy and security requirements, and how those standards map to ISO 27001, SOC 1/2/3, NIST 800-53. Amazon already offers its cloud platform – Amazon Web Services (AWS) – to healthcare organizations, with AWS supporting HIPAA compliance and Amazon prepared to sign a business associate agreement with...</span></p><span data-dcnode-id="577" instrument_node=""> </span></div><span data-dcnode-id="575" instrument_node=""> </span><span data-dcnode-id="573" instrument_node="">

</span><h2 data-dcnode-id="539"><a data-dcnode-id="540" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/largest-healthcare-data-breaches-2017/"><span data-dcnode-id="541" instrument_node="">Largest Healthcare Data Breaches of 2017</span></a></h2><span data-dcnode-id="538" instrument_node="">
</span><p class="post-meta" data-dcnode-id="533"><span data-dcnode-id="537" instrument_node="">Posted By </span><a data-dcnode-id="535" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="536" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="534" instrument_node=""> on Jan 4, 2018</span></p><span data-dcnode-id="532" instrument_node=""> </span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">This article details the largest healthcare data breaches of 2017 and compares this year’s breach tally to the past two years, which were both record-breaking years for healthcare data breaches. 2015 was a particularly bad year for the healthcare industry, with some of the largest healthcare data breaches ever discovered. There was the massive data breach at Anthem Inc., the likes of which had never been seen before. 78.8 million healthcare records were compromised in that single cyberattack, and there were also two other healthcare data breaches involving 10 million or more records. 2015 was the worst ever year in terms of the number of healthcare records exposed or stolen. 2016 was a better year for the healthcare industry in terms of the number of healthcare records exposed in data breaches. There was no repeat of the mega data breaches of the previous year. Yet, the number of incidents increased significantly. 2016 was the worst ever year in terms of the number of breaches reported by HIPAA-covered entities and their business associates. So how have healthcare organizations...</span></p><span data-dcnode-id="529" instrument_node=""> </span></div><span data-dcnode-id="527" instrument_node=""> </span><span data-dcnode-id="525" instrument_node="">

</span><h2 data-dcnode-id="491"><a data-dcnode-id="492" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/cms-text-messages-in-healthcare/"><span data-dcnode-id="493" instrument_node="">CMS Clarifies Position on Use of Text Messages in Healthcare</span></a></h2><span data-dcnode-id="490" instrument_node="">
</span><p class="post-meta" data-dcnode-id="485"><span data-dcnode-id="489" instrument_node="">Posted By </span><a data-dcnode-id="487" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="488" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="486" instrument_node=""> on Jan 3, 2018</span></p><span data-dcnode-id="484" instrument_node=""> </span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">In November, the Centers for Medicare and Medicaid Services (CMS) explained in emails to healthcare providers that the use of text messages in healthcare is prohibited due to concerns about security and patient privacy. SMS messages are not secure. The CMS was concerned that the use of text messages in healthcare will lead to the exposure of sensitive patient data and could threaten the integrity of medical records. While this is understandable as far as SMS messages are concerned, many secure messaging applications satisfy all the requirements of HIPAA – e.g. transmission security, access and authentication controls, audit controls, and safeguards to ensure the integrity of PHI. The use of secure messaging platforms was raised with the CMS by some hospitals; however, the position of the CMS, based on the emails, appeared to be a total ban on the use of text messages in healthcare, even the use of secure messaging platforms. In the emails, the CMS said, “After meeting with vendors regarding these [secure messaging] products, it was determined they cannot always ensure the privacy...</span></p><span data-dcnode-id="481" instrument_node=""> </span></div><span data-dcnode-id="479" instrument_node=""> </span><span data-dcnode-id="477" instrument_node="">

</span><h2 data-dcnode-id="443"><a data-dcnode-id="444" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/70-healthcare-organizations-adopted-off-premises-computing/"><span data-dcnode-id="445" instrument_node="">70% of Healthcare Organizations Have Adopted Off-Premises Computing</span></a></h2><span data-dcnode-id="442" instrument_node="">
</span><p class="post-meta" data-dcnode-id="437"><span data-dcnode-id="441" instrument_node="">Posted By </span><a data-dcnode-id="439" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="440" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="438" instrument_node=""> on Dec 15, 2017</span></p><span data-dcnode-id="436" instrument_node=""> </span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">A recent survey of 144 U.S-based healthcare organizations has shown the majority have already adopted off-premises computing for applications and IT infrastructure. The popularity of off-premises solutions is growing steadily. The KLAS Research study revealed 70% of healthcare organizations have moved at least some of their applications and IT infrastructure to the cloud. Out of the organizations that have, almost 60% are using a cloud or hosting environment for EHR applications. 69% of healthcare organizations said they would consider utilizing off-premises cloud solutions, or are actively expanding the use of those solutions. Cerner is the leader in off-premises computing for EHR applications, although Epic is attracting considerable interest, with many of its customers considering switching from its on-premises solutions to its data center. One of the fastest growing areas is Infrastructure-as-a-Service (IaaS) as it enables healthcare organizations to leverage off-premise infrastructure rather than having to build a data center. Amazon leads the way in this area and is the...</span></p><span data-dcnode-id="433" instrument_node=""> </span></div><span data-dcnode-id="431" instrument_node=""> </span><span data-dcnode-id="429" instrument_node="">

</span><h2 data-dcnode-id="395"><a data-dcnode-id="396" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/gotomeeting-hipaa-compliant/"><span data-dcnode-id="397" instrument_node="">Is GoToMeeting HIPAA Compliant?</span></a></h2><span data-dcnode-id="394" instrument_node="">
</span><p class="post-meta" data-dcnode-id="389"><span data-dcnode-id="393" instrument_node="">Posted By </span><a data-dcnode-id="391" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hipaajournal.com/author/hipaajournal/" rel="author" title="Posts by HIPAA Journal"><span data-dcnode-id="392" instrument_node="">HIPAA Journal</span></a><span data-dcnode-id="390" instrument_node=""> on Dec 8, 2017</span></p><span data-dcnode-id="388" instrument_node=""> </span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Is GoToMeeting HIPAA complaint? Can GoToMeeting be used by HIPAA-covered entities and their business associates for communicating protected health information without violating HIPAA Rules? GoToMeeting is an online meeting and video conferencing solution offered by LogMeIn. The service is one of many conferencing and desktop sharing solutions that can improve communication and collaboration, with many benefits for healthcare organizations. In order for collaboration tools to be used by healthcare organizations that are required to comply with Health Insurance Portability and Accountability Act&nbsp;Rules, tools must a subject to a risk analysis and determined to meet the security standards demanded by HIPAA. Fail to ensure that a particular service is HIPAA compliant and you could violate the privacy of patients, breach HIPAA Rules, and potentially have to cover a sizable financial penalty for non-compliance. It should be pointed out that no software or communications platform can be truly HIPAA-compliant. Even if appropriate safeguards are incorporated to ensure the confidentiality,...</span></p><span data-dcnode-id="385" instrument_node=""> </span></div><span data-dcnode-id="383" instrument_node=""> </span><span data-dcnode-id="381" instrument_node="">
