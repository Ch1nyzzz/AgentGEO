</span><p data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">With the world constantly getting smaller, businesses need to have a firm understanding of globalization and what it can mean for their operation. Globalization can affect all areas of life and, while there are certainly some advantages, there are also a few drawbacks which are important to be aware of too.
 
</span></p><h2 data-dcnode-id="3150"><strong data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">Increased Competition</span></strong></h2><span data-dcnode-id="3149" instrument_node="">
</span><p data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">One of the most obvious effects of globalization is the drastic increase in competition that businesses face now. It used to be that you were only competing against those in your particular region but now consumers can choose brands from all over the world. Additionally, you will find that many international markets undercut rates which makes it much harder for businesses to survive. The increased competition can make it hard to succeed and stand out from the crowd which is why digital marketing has become such a large and important industry.
</span></p><h2 data-dcnode-id="3144"><strong data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">No Location Restrictions</span></strong></h2><span data-dcnode-id="3143" instrument_node="">
</span><p data-dcnode-id="3138"><span data-dcnode-id="3142" instrument_node="">The flip side of the increased competition is that it also means that businesses have a much larger customer base to target. Instead of targeting people in your local area, businesses can now target customers all over the globe which can help them to drive success and enhance their brand reputation. This is particularly true for ecommerce businesses which is why so many entrepreneurs are now turning to this industry. Although it can be relatively easy to get set up and running and get funding through </span><span data-dcnode-id="3140" style="color: #000000;"><span data-dcnode-id="3141" instrument_node="">ecommerce business loans</span></span><span data-dcnode-id="3139" instrument_node="">, it is still a highly competitive industry to operate in.</span></p><span data-dcnode-id="3137" instrument_node="">
</span><h2 data-dcnode-id="3134"><strong data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">Sharing of Information &amp; Technology</span></strong></h2><span data-dcnode-id="3133" instrument_node="">
</span><p data-dcnode-id="3128"><span data-dcnode-id="3132" instrument_node="">A major benefit to globalization is the sharing of information and technology that now happens across borders. Industries are able to thrive and satisfy customers when they can share information and technology which is now not only possible but easy thanks to globalisation. This has seen remarkable advances in key technologies like artificial intelligence, automation and </span><span data-dcnode-id="3130" style="color: #000000;"><span data-dcnode-id="3131" instrument_node="">virtual reality</span></span><span data-dcnode-id="3129" instrument_node=""> in recent years which can be of great help to business while also being in the consumers’ best interests too.
</span></p><h2 data-dcnode-id="3125"><strong data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">Employment</span></strong></h2><span data-dcnode-id="3124" instrument_node="">
</span><p data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">Another key area which has been impacted by globalization is employment. Globalization has helped many people to find rewarding work and allowed businesses to find highly skilled employees, plus it has also helped the rise of outsourcing which can help businesses to reduce costs and get work carried out by specialists while providing flexible work for individuals.
</span></p><p data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">As you can see, globalization has had a significant impact on business and this will only continue in the coming years. There are benefits and drawbacks to globalization but it is something that all business owners need to be aware of and understand how it might impact their business operation. Making the most of the benefits while mitigating the drawbacks will be crucial for success in the coming years and could help your business to become a global success.</span></p><span data-dcnode-id="3119" instrument_node="">

</span><div class="article_cover_container" data-dcnode-id="2093" style="background-image: url(https://www.bbntimes.com/images/articles/global-economy/Sad_Fishing_.jpeg);"><div class="bg" data-dcnode-id="2096"></div><h1 data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Sadfishing - The Latest Toxic Social Media Trend</span></h1></div><span data-dcnode-id="2090" instrument_node=""> </span><div class="jm-allpage-space" data-dcnode-id="1598"><span data-dcnode-id="2089" instrument_node=""> </span><div data-dcnode-id="2072" id="jm-mainpage"><span data-dcnode-id="2088" instrument_node=""> </span><div data-dcnode-id="2074" id="jm-mainpage-in"><span data-dcnode-id="2087" instrument_node=""> </span><div class="scheme_2 clearfix" data-dcnode-id="2076" id="jm-main"><span data-dcnode-id="2086" instrument_node=""> </span><div data-dcnode-id="2078" id="jm-content"><span data-dcnode-id="2085" instrument_node=""> </span><div class="jm-content-in" data-dcnode-id="2080"><span data-dcnode-id="2084" instrument_node=""> </span><div data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node=""> </span></div><span data-dcnode-id="2081" instrument_node=""> </span></div><span data-dcnode-id="2079" instrument_node=""> </span></div><span data-dcnode-id="2077" instrument_node=""> </span></div><span data-dcnode-id="2075" instrument_node=""> </span></div><span data-dcnode-id="2073" instrument_node=""> </span></div><span data-dcnode-id="2071" instrument_node=""> </span><div data-dcnode-id="1600" id="jm-mainpage"><span data-dcnode-id="2070" instrument_node=""> </span><div data-dcnode-id="1602" id="jm-mainpage-in"><span data-dcnode-id="2069" instrument_node=""> </span><div class="scheme_2 clearfix" data-dcnode-id="1604" id="jm-main"><span data-dcnode-id="2068" instrument_node=""> </span><div data-dcnode-id="1926" id="jm-content"><span data-dcnode-id="2067" instrument_node=""> </span><div class="jm-content-in" data-dcnode-id="1928"><span data-dcnode-id="2066" instrument_node=""> </span><div data-dcnode-id="1930" id="jm-maincontent"><span data-dcnode-id="2065" instrument_node=""> </span><div class="cont-maincontent fadeIn" data-dcnode-id="1932"><span data-dcnode-id="2064" instrument_node=""> </span><div class="item-page" data-dcnode-id="1934"><span data-dcnode-id="2063" instrument_node=""> </span><div class="article-tittle" data-dcnode-id="2058"><span data-dcnode-id="2062" instrument_node=""> </span><h2 data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">Sadfishing - The Latest Toxic Social Media Trend</span></h2><span data-dcnode-id="2059" instrument_node=""> </span></div><span data-dcnode-id="2057" instrument_node=""> </span><div class="top-infos-article" data-dcnode-id="2037"><span data-dcnode-id="2056" instrument_node=""> </span><div class="left-top" data-dcnode-id="2039"><span data-dcnode-id="2055" instrument_node=""> </span><span class="author-article" data-dcnode-id="2047"><span data-dcnode-id="2054" instrument_node=""> </span><a class="author_img" data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbntimes.com/steve-blakeman" lazy-style="loaded" style="background-image: url('https://www.bbntimes.com//images/articles/companies/Steve_Blakeman.jpg');"><span data-dcnode-id="2053" instrument_node=""> </span></a><span data-dcnode-id="2051" instrument_node=""> </span><a class="author_name" data-dcnode-id="2049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbntimes.com/steve-blakeman"><span data-dcnode-id="2050" instrument_node=""> Steve Blakeman </span></a><span data-dcnode-id="2048" instrument_node=""> </span></span><span data-dcnode-id="2046" instrument_node=""> </span><span class="date-publication" data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">12/11/2019</span></span><span data-dcnode-id="2043" instrument_node=""> </span><span class="content-count-msg" data-dcnode-id="2041" onclick=""><span data-dcnode-id="2042" instrument_node="">6</span></span><span data-dcnode-id="2040" instrument_node=""> </span></div><span data-dcnode-id="2038" instrument_node=""> </span></div><span data-dcnode-id="2036" instrument_node=""> </span><div class="bloc-content" data-dcnode-id="1989"><span data-dcnode-id="2035" instrument_node=""> </span><div class="wv-button-placeholder" data-dcnode-id="2034"></div><span data-dcnode-id="2033" instrument_node=""> </span><div class="pull-left item-image" data-dcnode-id="2029"><span data-dcnode-id="2032" instrument_node=""> </span><img alt="" data-dcnode-id="2031" itemprop="image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbntimes.com//images/articles/global-economy/Sad_Fishing_.jpeg&amp;raw"><span data-dcnode-id="2030" instrument_node=""> </span></div><span data-dcnode-id="2028" instrument_node=""> </span><div class="ember-view" data-dcnode-id="1991" id="ember57"><span data-dcnode-id="2027" instrument_node=""> </span><div class="reader-article-content" data-dcnode-id="1993" dir="ltr"><span data-dcnode-id="2026" instrument_node=""> </span><p data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">We've had Tweeps, sliding into your DM's, Vaguebooking and Sharebait and now comes along Sadfishing which is being hailed as a toxic threat especially to young children. </span></p><p data-dcnode-id="2019"><span data-dcnode-id="2023" instrument_node="">If you don't know what sadfishing is then the simple explanation is an online behaviour whereby the poster makes a claim about their emotional state (often exaggerated it is claimed) to glean sympathy from the reader / viewer. Famous exponents of the trend include the likes of&nbsp;</span><a data-dcnode-id="2021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mirror.co.uk/news/uk-news/kendall-jenner-inspired-sadfishing-trend-20376882" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2022" instrument_node="">Kendall Jenner</span></a><span data-dcnode-id="2020" instrument_node="">&nbsp;and Justine Bieber (two examples that should surely put anybody off replicating it I would have thought but seemingly not). </span></p><p data-dcnode-id="2014"><span data-dcnode-id="2018" instrument_node="">In a recent report by&nbsp;</span><a data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.digitalawarenessuk.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2017" instrument_node="">Digital Awareness UK</span></a><span data-dcnode-id="2015" instrument_node="">&nbsp;sadfishing is making it increasingly more difficult for young people who are facing genuine mental health difficulties to seek online support. Their study of 50,000 children aged 11 to 16 discovered that a significant proportion of them who had posted something about their mental wellbeing had in fact had the opposite effect of gaining empathy and had in fact been bullied as a consequence of their postings.</span></p><span data-dcnode-id="2013" instrument_node=""> </span><p data-dcnode-id="2008"><span data-dcnode-id="2012" instrument_node="">The issue was discussed earlier today on UK breakfast TV show&nbsp;</span><a data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.itv.com/goodmorningbritain" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2011" instrument_node="">Good Morning Britain</span></a><span data-dcnode-id="2009" instrument_node="">&nbsp;where they talked about how young people look at examples of sadfishing by their favourite celebrities and witness the outpouring of emotion from their fans in the form of likes and positive comments. In turn they decide to replicate the action by posting their own version of their woes with the expectation that they themselves will receive some level of positivity that would boost their confidence. The truth is that oftentimes the reverse of what they expect happens... either they receive very little sympathy or, even worse, they get ridiculed for their actions. </span></p><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">As one teenage respondent in the study said: “I got a lot of people commenting on and ‘liking’ my post but then some people said I was sadfishing the next day at school for attention. Sharing my feelings online has made me feel worse in some ways." </span></p><p data-dcnode-id="2001"><span data-dcnode-id="2005" instrument_node="">The report was commissioned by the Headmasters’ and Headmistresses’ Conference (HMC) and offers guidance to parents and teachers to watch out for the trend and monitor their childrens' social media activity. It echoes the findings of another earlier report by the Organisation for Economic Co-operation and Development (OECD) which studied 250,000 teachers in 48 countries and that report claimed that schools in England had the&nbsp;</span><a data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/education-48692953" rel="nofollow noopener" target="_blank"><span data-dcnode-id="2004" instrument_node="">highest incidence of problems with online behaviour</span></a><span data-dcnode-id="2002" instrument_node="">.</span></p><span data-dcnode-id="2000" instrument_node=""> </span><p data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">So have you witnessed this new social media phenomenon? Do you believe that it really is toxic or is it just an innocuous way that young people can express their feelings? As ever I am keen to hear your thoughts... </span></p><p data-dcnode-id="1997"></p><p data-dcnode-id="1996"></p><p data-dcnode-id="1995"></p><p data-dcnode-id="1994"></p></div><span data-dcnode-id="1992" instrument_node=""> </span></div><span data-dcnode-id="1990" instrument_node=""> </span></div><span data-dcnode-id="1988" instrument_node=""> </span><div class="moduletable bbb" data-dcnode-
