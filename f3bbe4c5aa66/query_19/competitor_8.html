</span></div></blockquote><p data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">The development of the Tudor laws thus suggests that skilled artisans were still important for the English economy in the late eighteenth century, but their importance rapidly decreased in the 1820s. This would support the hypothesis that technical change was deskilling during the first industrialization. However, using changes in legislation as a skill-bias indicator is problematic, as the political process is often detached from economic realities and it is difficult to ascertain what were the “real” causes behind changes in legislation, and why they occurred at particular points in time.</span></p><p data-dcnode-id="2587"><i data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">Patents</span></i><span data-dcnode-id="2594" instrument_node=""> are another widely used indicator for ascertaining technical change biases. MacLeod (</span><a aria-label="Reference 1988" data-dcnode-id="2592" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d224658289e834" title="MacLeod, C. (1988). Inventing the industrial revolution. The English patent system 1660–1800. Cambridge: Cambridge University Press."><span data-dcnode-id="2593" instrument_node="">1988</span></a><span data-dcnode-id="2591" instrument_node="">) investigated the English patent system and found, in support of Smith’s hypothesis, that in the late eighteenth century most inventions were labelled (by the inventors themselves) as “deskilling.” Patents of course have severe limitations as indicators for the bias of technical change. The propensity to patent an invention depends strongly on social, cultural, and economic circumstances, which greatly vary over time. Furthermore, the fact that a new technology has been patented tells us nothing about its adoption and diffusion, or its subsequent adaptation (cf. Bruland </span><a aria-label="Reference 2004" data-dcnode-id="2589" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d224658289e837" title="Bruland, K. (2004). Industrialisation and technological change. In R. Floud &amp; J. Paul (Eds.), The Cambridge economic history of modern Britain. Volume I: Industrialisation, 1700–1860 (pp. 117–147). Cambridge: Cambridge University Press."><span data-dcnode-id="2590" instrument_node="">2004</span></a><span data-dcnode-id="2588" instrument_node="">, p. 123).</span></p><p data-dcnode-id="2561"><span data-dcnode-id="2586" instrument_node="">Recently, another very frequently used indicator for skill-biased technical change is the </span><i data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">wage premium</span></i><span data-dcnode-id="2583" instrument_node="">. The idea is that if wages for skilled workers are increasing faster than those for unskilled ones, this may be taken to indicate that because of skill-biased technological change demand for skilled workers is increasing faster than for unskilled ones. Data on wage premiums were also used to estimate the technological bias of the eighteenth and nineteenth centuries. Studies on the historical development of the wage premium show some evidence for Smith’s deskilling hypothesis: In accordance with Smith’s theoretical suggestions the “skill premium” sharply dropped around 1730 in England (Rahman </span><a aria-label="Reference 2007" data-dcnode-id="2581" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d224658289e846" title="Rahman, A. S. (2007). The English skill premium puzzle, 1750–1913. Maryland: United States Naval Academy."><span data-dcnode-id="2582" instrument_node="">2007</span></a><span data-dcnode-id="2580" instrument_node="">). Results on the wage premium of the nineteenth century are more ambiguous: Supporting the hypothesis of predominately skill-biased technological change in the nineteenth century, Williamson and Lindert (</span><a aria-label="Reference 1980" data-dcnode-id="2578" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d224658289e849" title="Williamson, J. G., &amp; Lindert, P. H. (1980). American inequality: A macroeconomic history. New York: Academic Press."><span data-dcnode-id="2579" instrument_node="">1980</span></a><span data-dcnode-id="2577" instrument_node="">) and Katz and Margo (</span><a aria-label="Reference 2013" data-dcnode-id="2575" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d224658289e852" title="Katz, L.F., &amp; Margo, R.A. (2013). Technical change and the relative demand for skilled labor: The United States in historical perspective, NBER Working Paper No. 18752."><span data-dcnode-id="2576" instrument_node="">2013</span></a><span data-dcnode-id="2574" instrument_node="">) found that the wage premium for skilled workers increased during the nineteenth century in the United States. In contrast, Margo and Villaflor (</span><a aria-label="Reference 1987" data-dcnode-id="2572" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d224658289e855" title="Margo, R. A., &amp; Villaflor, G. C. (1987). The growth of wages in antebellum America: new evidence. The Journal of Economic History, 47(4), 873–895."><span data-dcnode-id="2573" instrument_node="">1987</span></a><span data-dcnode-id="2571" instrument_node="">) found no evidence for a premium increase between 1820 and 1856. According to Feinstein (</span><a aria-label="Reference 1988" data-dcnode-id="2569" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d224658289e859" title="Feinstein, C. (1988). The rise and fall of the Williamson curve. Did British capitalism breed inequality? The Journal of Economic History, 48(3), 699–729."><span data-dcnode-id="2570" instrument_node="">1988</span></a><span data-dcnode-id="2568" instrument_node="">), the skill premium shows some marked up and down movements, but for the entire nineteenth century it shows no clear trend. For England, Williamson (</span><a aria-label="Reference 1985" data-dcnode-id="2566" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d224658289e862" title="Williamson, J. G. (1985). Did British capitalism breed inequality? Boston/London: Allen and Unwin."><span data-dcnode-id="2567" instrument_node="">1985</span></a><span data-dcnode-id="2565" instrument_node="">) finds a sharp skill premium rise from the beginning of the nineteenth century to the mid-century, before it fell again in the late nineteenth century. Clark (</span><a aria-label="Reference 2007" data-dcnode-id="2563" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d224658289e865" title="Clark, G. (2007). A farewell to alms. A brief economic history of the world. Princeton/Oxford: Princeton University Press."><span data-dcnode-id="2564" instrument_node="">2007</span></a><span data-dcnode-id="2562" instrument_node="">, pp. 180–181) found that skill premiums for English workers were relatively stable between 1370 and 1800, before they fell sharply in the first half and again at the end of the nineteenth century.</span></p><p data-dcnode-id="2544"><span data-dcnode-id="2560" instrument_node="">Overall, what does the wage premium tell us? First, there is some evidence that Smith was right! During his lifetime, the wage premium sharply dropped in England. More contradictory is the empirical evidence for the nineteenth century: Katz and Margo (</span><a aria-label="Reference 2013" data-dcnode-id="2558" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d224658289e871" title="Katz, L.F., &amp; Margo, R.A. (2013). Technical change and the relative demand for skilled labor: The United States in historical perspective, NBER Working Paper No. 18752."><span data-dcnode-id="2559" instrument_node="">2013</span></a><span data-dcnode-id="2557" instrument_node="">) found rising premiums in the United States, whereas Clark (</span><a aria-label="Reference 2007" data-dcnode-id="2555" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d224658289e874" title="Clark, G. (2007). A farewell to alms. A brief economic history of the world. Princeton/Oxford: Princeton University Press."><span data-dcnode-id="2556" instrument_node="">2007</span></a><span data-dcnode-id="2554" instrument_node="">) reported falling premiums in England. According to Williamson (</span><a aria-label="Reference 1985" data-dcnode-id="2552" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d224658289e877" title="Williamson, J. G. (1985). Did British capitalism breed inequality? Boston/London: Allen and Unwin."><span data-dcnode-id="2553" instrument_node="">1985</span></a><span data-dcnode-id="2551" instrument_node="">) the “first” English industrial revolution was skill-biased and the “second” unskilled-biased. In contrast Mitch (</span><a aria-label="Reference 1999" data-dcnode-id="2549" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d224658289e880" title="Mitch, D. (1999). The role of education and skill in the British industrial revolution. In J. Mokyr (Ed.), The British industrial revolution an economic perspective (2nd ed.). Boulder: Westview Press."><span data-dcnode-id="2550" instrument_node="">1999</span></a><span data-dcnode-id="2548" instrument_node="">, p. 269) found no clear upward trend for the wage premium. Hence, the evidence for skill- or unskilled-biased technological change based on wage premiums is mixed and contradictory: overall, the data show no clear trend for the wage premium in the frequently studied nineteenth century, neither for the United States nor for England. However, more generally skill premiums seem to be an insufficient approximation for the skill-bias of technical change, because they depend also on institutions, political ideas, the supply of skilled and unskilled labour, and the bargaining power of the two groups of workers. For example, nineteenth-century wage premiums depended strongly on the possibility of the trade unions to exclude unskilled workers from becoming members of the profession (Bruland </span><a aria-label="Reference 1982" data-dcnode-id="2546" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d224658289e883" title="Bruland, K. (1982). Industrial conflict as a source of technical innovation: three cases. Economy and Society, 11(2), 91–121."><span data-dcnode-id="2547" instrument_node="">1982</span></a><span data-dcnode-id="2545" instrument_node="">, p. 100).</span></p><p data-dcnode-id="2510"><i data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">Apprentice numbers</span></i><span data-dcnode-id="2541" instrument_node=""> are a further indicator frequently used for ascertaining biased technological change. Several studies indicate that formal and informal apprenticeships were of great importance for skill-acquisition in the eighteenth and nineteenth centuries (Feldman and Van der Beek </span><a aria-label="Reference 2016" data-dcnode-id="2539" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d224658289e892" title="Floud, R. C. (1974). The adolescence of American engineering competition, 1860–1900. The Economic History Review, 27(1), 57–71."><span data-dcnode-id="2540" instrument_node="">2016</span></a><span data-dcnode-id="2538" instrument_node="">). “Apprenticeship was the main form of training” (Mokyr and Voth </span><a aria-label="Reference 2010" data-dcnode-id="2536" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d224658289e895" title="Mokyr, J., &amp; Voth, H.-J. (2010). Understanding growth in Europe. 1700–1870: Theory and evidence. In S. Broadberry &amp; K. H. O’Rourke (Eds.), The Cambridge economic history of modern Europe volume 1.1700–1870 (pp. 7–42). Cambridge: Cambridge University Press."><span data-dcnode-id="2537" instrument_node="">2010</span></a><span data-dcnode-id="2535" instrument_node="">, p. 31). Apprenticeships often, but not always, required previous formal schooling (Mitch </span><a aria-label="Reference 2004" data-dcnode-id="2533" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d224658289e898" title="Mitch, D. (2004). Education and skill of the British labour force. In R. Floud &amp; J. Paul (Eds.), The Cambridge economic history of modern Britain. Volume I: Industrialisation, 1700–1860 (pp. 332–357). Cambridge: Cambridge University Press."><span data-dcnode-id="2534" instrument_node="">2004</span></a><span data-dcnode-id="2532" instrument_node="">, p. 342), so that apprenticeships and schooling are complements and not substitutes, but informal apprentices more and more replaced guild members and artisanal professions (Mitch </span><a aria-label="Reference 2004" data-dcnode-id="2530" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d224658289e901" title="Mitch, D. (2004). Education and skill of the British labour force. In R. Floud &amp; J. Paul (Eds.), The Cambridge economic history of modern Britain. Volume I: Industrialisation, 1700–1860 (pp. 332–357). Cambridge: Cambridge University Press."><span data-dcnode-id="2531" instrument_node="">2004</span></a><span data-dcnode-id="2529" instrument_node="">, p. 348). Contrary to the Adam Smith hypothesis, the data on apprentice agreements also support the skill-bias hypothesis, because the number of apprentices rose sharply from 1710 to 1772 (Feldman and Van der Beek </span><a aria-label="Reference 2016" data-dcnode-id="2527" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d224658289e904" title="Floud, R. C. (1974). The adolescence of American engineering competition, 1860–1900. The Economic History Review, 27(1), 57–71."><span data-dcnode-id="2528" instrument_node="">2016</span></a><span data-dcnode-id="2526" instrument_node="">). Wages for journeymen educated by apprentices also were significantly higher than those of unskilled labourers (Justman and Van der Beek </span><a aria-label="Reference 2015" data-dcnode-id="2524" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d224658289e908" title="Justman, M., &amp; Van der Beek, K. (2015). Market forces shaping human capital in eighteenth-century London, The Economic History Review, 68(4), 1177–1202."><span data-dcnode-id="2525" instrument_node="">2015</span></a><span data-dcnode-id="2523" instrument_node="">). On the other hand, Dunlop (</span><a aria-label="Reference 1912" data-dcnode-id="2521" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d224658289e911" title="Dunlop, J. O. (1912). English apprenticeship and child labour. A history. London: Fisher Unwin."><span data-dcnode-id="2522" instrument_node="">1912</span></a><span data-dcnode-id="2520" instrument_node="">) reports a strong erosion of the English formal apprenticeship system in the eighteenth century, thus seemingly supporting Smith’s view. However, with regard to skill acquisition those “new style apprenticeships,” which emerged in several industries (More </span><a aria-label="Reference 1980" data-dcnode-id="2518" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d224658289e914" title="More, C. (1980). Skill and the English working class, 1870–1914. London: Croom Helm."><span data-dcnode-id="2519" instrument_node="">1980</span></a><span data-dcnode-id="2517" instrument_node="">, p. 43), were not necessarily worse than the old ones. In the second half of the nineteenth century, apprenticeships have been very important education agreements for the English and German industry (Broadberry </span><a aria-label="Reference 2004" data-dcnode-id="2515" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d224658289e917" title="Broadberry, S. (2004). Human capital and skills. In R. Floud &amp; J. Paul (Eds.), The Cambridge economic history of modern Britain Volume II. : Economic maturity, 1860–1939 (pp. 56–73). Cambridge: Cambridge University Press."><span data-dcnode-id="2516" instrument_node="">2004</span></a><span data-dcnode-id="2514" instrument_node="">). But while in England the importance of apprentices increased strongly, the apprenticeship rates in the United States declined markedly (Elbaum </span><a aria-label="Reference 1989" data-dcnode-id="2512" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d224658289e920" title="Elbaum, B. (1989). Why apprenticeship persisted in Britain. But not in the United States. The Journal of Economic History, 49(2), 337–349."><span data-dcnode-id="2513" instrument_node="">1989</span></a><span data-dcnode-id="2511" instrument_node="">). It seems tha, at least for the later nineteenth century, apprentices became more important in particular for the English industry. Nevertheless, apprentice numbers are not a reliable approximation for skills, because apprenticeship durations differ widely and the shares of formal and informal apprenticeships are fluctuating considerably.</span></p><p data-dcnode-id="2499"><span data-dcnode-id="2509" instrument_node="">To summarize: literacy rates increased strongly between 1700 and 1900. Furthermore, apprentice numbers rose sharply in late nineteenth century, after having declined intermittently. Apart from “official” apprenticeships there are many indications that informal education (Mokyr and Voth </span><a aria-label="Reference 2010" data-dcnode-id="2507" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d224658289e926" title="Mokyr, J., &amp; Voth, H.-J. (2010). Understanding growth in Europe. 1700–1870: Theory and evidence. In S. Broadberry &amp; K. H. O’Rourke (Eds.), The Cambridge economic history of modern Europe volume 1.1700–1870 (pp. 7–42). Cambridge: Cambridge University Press."><span data-dcnode-id="2508" instrument_node="">2010</span></a><span data-dcnode-id="2506" instrument_node="">, p. 33) as well as learning-by-doing became much more important during the industrialization. For example, Bessen (</span><a aria-label="Reference 2011" data-dcnode-id="2504" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d224658289e929" title="Bessen, J. (2011). Was mechanization de-skilling? The origins of task-biased technical change. Boston University School of Law Working Paper No. 11–13.
                        "><span data-dcnode-id="2505" instrument_node="">2011</span></a><span data-dcnode-id="2503" instrument_node="">) found a strong learning-by-doing effect for loom weavers, which also translated into large wage premiums for skilled weavers. There is an ongoing discussion on whether the wage premiums for skilled workers have increased during the industrial revolution or not. Even if there is no clear empirical evidence for the skilling or deskilling tendencies of industrialization, the hypothesis that technical change in the eighteenth and nineteenth centuries was deskilling in nature lacks empirical evidence. Hence, nobody found a clear evidence for the widely shared assumption that industrialization was predominately deskilling. Overall, we find mixed empirical evidence for the bias of technical change but no clear trend that would suggest that technical change was predominantly deskilling in the eighteenth and nineteenth centuries. Also, it would be hard to explain why, after two-hundred years of deskilling technological change, the total number of skilled workers was still high at the end of the nineteenth century. According to Baxter (</span><a aria-label="Reference 1868" data-dcnode-id="2501" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d224658289e932" title="Baxter, R. D. (1868). National income. The United Kingdom. London: Macmillan and Co."><span data-dcnode-id="2502" instrument_node="">1868</span></a><span data-dcnode-id="2500" instrument_node="">), there were 1.123.000 high-skilled workers, 3.819.000 low-skilled workers, and 2.830.000 unskilled labourers in England and Wales in 1867. Thus in 1867 more than 60% of the English and Welsh labour force was high-skilled or low-skilled, and only 40% unskilled.</span></p></div></div></section><section data-dcnode-id="2427" data-title="The transformation of qualifications"><div class="c-article-section" data-dcnode-id="2428" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2494" id="Sec6"><span data-dcnode-id="2495" instrument_node="">The transformation of qualifications</span></h2><div class="c-article-section__content" data-dcnode-id="2429" id="Sec6-content"><p data-dcnode-id="2462"><span data-dcnode-id="2493" instrument_node="">Even if there was no clear deskilling bias of technological change, the required skills changed dramatically in the eighteenth and nineteenth centuries. As in all other phases of capitalism, skills became important that a generation ago did not even exist, while others have been completely superseded. According to Mokyr, “the need for different as opposed to fewer skills characterized the Industrial Revolution” (</span><a aria-label="Reference 2009" data-dcnode-id="2491" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d224658289e943" title="Mokyr, J. (2009). The enlightened economy, an economic history of Britain 1700–1850. New Haven/London: Yale University Press."><span data-dcnode-id="2492" instrument_node="">2009</span></a><span data-dcnode-id="2490" instrument_node="">, p. 348). But with the perpetual emergence of new skill requirements and changing skill-contents, it must be recognized that “the distinction between skilled and unskilled labour is, of course, constantly shifting; technical progress creates new categories of employment and calls for continual redefinition of skill. Skilled labour at the beginning of the nineteenth century was very different from skilled labour at the end” (Habakkuk </span><a aria-label="Reference 1962" data-dcnode-id="2488" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d224658289e946" title="Habakkuk, J. H. (1962). American and British technology in the nineteenth century, the search for labor-saving invention. Cambridge: Cambridge University Press."><span data-dcnode-id="2489" instrument_node="">1962</span></a><span data-dcnode-id="2487" instrument_node="">, p. 22). While this makes intertemporal comparisons of overall skill levels rather difficult, some economic historians have argued that it is still possible to identify marked changes in the </span><i data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">skill distribution</span></i><span data-dcnode-id="2484" instrument_node=""> in the late nineteenth century. According to Mokyr, “the overall level of skills was not so much lower or higher, but their distribution was becoming more skewed” (</span><a aria-label="Reference 2009" data-dcnode-id="2482" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d224658289e952" title="Mokyr, J. (2009). The enlightened economy, an economic history of Britain 1700–1850. New Haven/London: Yale University Press."><span data-dcnode-id="2483" instrument_node="">2009</span></a><span data-dcnode-id="2481" instrument_node="">, p. 348). By using the concept of a </span><i data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">skill distribution</span></i><span data-dcnode-id="2478" instrument_node="">, rather than a binary high/low skill distinction, it becomes possible to refer to changes in the skew of the skill distribution. So a more right skewed distribution, as described by Mokyr, signifies a growing concentration of people at the low skill level together with a smaller growing concentration at the high skill end. In the nineteenth century, this meant that “in addition to the deskilling of many of the old handicrafts there was also the rise of a new ‘labour aristocracy’ based on new production skills associated with the machinery” (von Tunzelmann </span><a aria-label="Reference 1995" data-dcnode-id="2476" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d224658289e959" title="Von Tunzelmann, N. G. (1995). Technology and industrial progress. Aldershot: Edward Elgar."><span data-dcnode-id="2477" instrument_node="">1995</span></a><span data-dcnode-id="2475" instrument_node="">, p. 126). It could be argued, of course, that this is precisely what Smith had foreseen: In this reading, his prediction had been that industrialization will lead to </span><i data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">labour polarisation</span></i><span data-dcnode-id="2472" instrument_node="">. The industrialization generated a demand for well-educated and highly skilled (and handsomely paid) craftsmen, but also, at the same time, a much larger demand for unskilled labour (which often could, and was, performed by children and women): “The technological changes of the nineteenth century created a demand for highly skilled mechanics and engineers in the upper tail of the distribution, while possibly reducing the need for skills among manual labourers” (Mokyr and Voth </span><a aria-label="Reference 2010" data-dcnode-id="2470" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d224658289e965" title="Mokyr, J., &amp; Voth, H.-J. (2010). Understanding growth in Europe. 1700–1870: Theory and evidence. In S. Broadberry &amp; K. H. O’Rourke (Eds.), The Cambridge economic history of modern Europe volume 1.1700–1870 (pp. 7–42). Cambridge: Cambridge University Press."><span data-dcnode-id="2471" instrument_node="">2010</span></a><span data-dcnode-id="2469" instrument_node="">, p. 29). The evolution of a “labour aristocracy” in various British industries in the late nineteenth century has been vividly described by Gray (</span><a aria-label="Reference 1981" data-dcnode-id="2467" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d224658289e968" title="Gray, R. (1981). The aristocracy of labour in nineteenth-century Britain, c.1850–1900. London and Basingstoke: The Macmillian Press LTD."><span data-dcnode-id="2468" instrument_node="">1981</span></a><span data-dcnode-id="2466" instrument_node="">). In the United States in the second half of the nineteenth century, the manufacturing industry demanded increasingly high-skilled white-collar workers and low-skilled or unskilled manual workers, but middle-skilled artisans were hollowed out. However, this does not apply to the whole economy, where the share of high-skilled workers increased, that of the middle-skilled remained fairly stable, and that of low-skilled workers declined in the course of the nineteenth century (Katz and Margo </span><a aria-label="Reference 2013" data-dcnode-id="2464" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d224658289e971" title="Katz, L.F., &amp; Margo, R.A. (2013). Technical change and the relative demand for skilled labor: The United States in historical perspective, NBER Working Paper No. 18752."><span data-dcnode-id="2465" instrument_node="">2013</span></a><span data-dcnode-id="2463" instrument_node="">).</span></p><p data-dcnode-id="2430"><span data-dcnode-id="2461" instrument_node="">Qualification transformations are not similar to unskilled-biased technological change, but often generate grave social and economic disturbances as well. The perpetual shifting of required skills incessantly changes the social order and individuals’ places in society. This dynamic change of social order is always a very conflict-ridden and, for some members of society, quite painful process. The skills needed after the introduction of an innovation are typically not the same ones as those demanded before. Persons trained for professions that are made obsolete by technical change in general do not command the professional skills demanded afterwards, as Babbage succinctly observed: “Unfortunately, the class of persons driven out of the old employment are not always qualified for the new one” (</span><a aria-label="Reference 1835" data-dcnode-id="2459" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d224658289e977" title="Babbage, C. (1835). On the economy of machinery and manufactures (4th ed.). London: Reprinted by Charles Knight."><span data-dcnode-id="2460" instrument_node="">1835</span></a><span data-dcnode-id="2458" instrument_node="">, p. 335). The change in needed skills and the resulting change in people’s social position—“the two thousand persons thrown out of work are not exactly of the same class as those called into employment by the power-looms” (Babbage </span><a aria-label="Reference 1835" data-dcnode-id="2456" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d224658289e980" title="Babbage, C. (1835). On the economy of machinery and manufactures (4th ed.). London: Reprinted by Charles Knight."><span data-dcnode-id="2457" instrument_node="">1835</span></a><span data-dcnode-id="2455" instrument_node="">, p. 339)—was the cause of many nineteenth-century conflicts. The transformation of qualifications in the eighteenth and nineteenth centuries often led to the paradoxical situation of unemployed or downgraded craftsmen, on the one hand, and a shortage of skilled labour, on the other hand. For example, the United States faced a strong shortage of high-skilled white-collar workers in the nineteenth century (Katz and Margo </span><a aria-label="Reference 2013" data-dcnode-id="2453" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d224658289e983" title="Katz, L.F., &amp; Margo, R.A. (2013). Technical change and the relative demand for skilled labor: The United States in historical perspective, NBER Working Paper No. 18752."><span data-dcnode-id="2454" instrument_node="">2013</span></a><span data-dcnode-id="2452" instrument_node="">, p. 7), and in Britain the industrialization of the late eighteenth and early nineteenth century led to a shortage of skilled workers (Pollard </span><a aria-label="Reference 1965" data-dcnode-id="2450" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d224658289e986" title="Pollard, S. (1965). The genesis of modern management. A study of the industrial revolution in Great Britain. Cambridge: Harvard University Press."><span data-dcnode-id="2451" instrument_node="">1965</span></a><span data-dcnode-id="2449" instrument_node="">, p. 160). The invention of cotton machines involved the establishment of two distinctive groups of workers: high-skilled and well-paid workers in the machine-producing sector and unskilled low-wage workers in the cotton industry (Bruland </span><a aria-label="Reference 2004" data-dcnode-id="2447" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d224658289e989" title="Bruland, K. (2004). Industrialisation and technological change. In R. Floud &amp; J. Paul (Eds.), The Cambridge economic history of modern Britain. Volume I: Industrialisation, 1700–1860 (pp. 117–147). Cambridge: Cambridge University Press."><span data-dcnode-id="2448" instrument_node="">2004</span></a><span data-dcnode-id="2446" instrument_node="">, p. 139). Scotland also faced the problem of skilled labour shortages in many industrial sectors such as mining, pottery and glass-making, bleaching, and nail-making (Devine </span><a aria-label="Reference 2004" data-dcnode-id="2444" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d224658289e993" title="Devine, T. M. (2004). Scotland. In R. Floud &amp; J. Paul (Eds.), The Cambridge economic history of modern Britain. Volume II: Economic maturity, 1860–1939 (pp. 388–416). Cambridge: Cambridge University Press."><span data-dcnode-id="2445" instrument_node="">2004</span></a><span data-dcnode-id="2443" instrument_node="">, p. 412). At the same time, industrialization caused incredibly bad working conditions for masses of unskilled men, women, and children. It was often the synchrony of the displacement of craftsmen by low-skilled industrial workers and the simultaneously rising demand for high-skilled workers, which made the industrialization process so ambivalent for skilled labourers. For example, Chin et al. (</span><a aria-label="Reference 2006" data-dcnode-id="2441" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d224658289e996" title="Chin, A., Juhn, C., &amp; Thompson, P. (2006). Technical change and the demand for skills during the second industrial revolution. Evidence from the merchant marine, 1891-1912. The Review of Economics and Statistics, 88(3), 572–578."><span data-dcnode-id="2442" instrument_node="">2006</span></a><span data-dcnode-id="2440" instrument_node="">) show that the invention and adoption of the steam-engine in the nineteenth century has considerably increased the merchant marines’ demand for high-skilled engineers, but simultaneously simplified the tasks to be performed by sailors and unskilled seamen. Similarly, the introduction of self-acting spinning mules on the one hand increased child-labour and the employment of unskilled women, but on the other hand it also led to a higher demand for skilled spinners (Lazonick </span><a aria-label="Reference 1979" data-dcnode-id="2438" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d224658289e999" title="Lazonick, W. H. (1979). Industrial relations and technical change: the case of the self-acting mule. Cambridge Journal of Economics, 3(3), 231–262."><span data-dcnode-id="2439" instrument_node="">1979</span></a><span data-dcnode-id="2437" instrument_node="">). This polarisation is found also in other industrial sectors, “occupations like papermaking in the early part of the century, and shoemaking in the later part, changed from hand to machine trades, and even if the skill involved was not less, it was certainly different and acquired in a different way” (More </span><a aria-label="Reference 1980" data-dcnode-id="2435" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d224658289e1002" title="More, C. (1980). Skill and the English working class, 1870–1914. London: Croom Helm."><span data-dcnode-id="2436" instrument_node="">1980</span></a><span data-dcnode-id="2434" instrument_node="">, p. 47). Barnett (</span><a aria-label="Reference 1925" data-dcnode-id="2432" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d224658289e1005" title="Barnett, G. E. (1925). Chapters on machinery and labor. The Quarterly Journal of Economics, 40(1), 111–133."><span data-dcnode-id="2433" instrument_node="">1925</span></a><span data-dcnode-id="2431" instrument_node="">) also shows that many innovations in the late nineteenth century were skill-enhancing as well as skill-replacing. Thus, in the history of eighteenth- and nineteenth-century industrialization process, we find few innovations that have been unambiguously skill-reducing or skill-enhancing in nature. Most of them rather increased the demand for particular skills, which frequently had to be newly acquired, and at the same time made others redundant. Hence, industrialization led simultaneously to skilled labour shortages and a huge “Lumpenproletariat.”</span></p></div></div></section><section data-dcnode-id="2326" data-title="The induction of biased technological change"><div class="c-article-section" data-dcnode-id="2327" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2425" id="Sec7"><span data-dcnode-id="2426" instrument_node="">The induction of biased technological change</span></h2><div class="c-article-section__content" data-dcnode-id="2328" id="Sec7-content"><p data-dcnode-id="2417"><span data-dcnode-id="2424" instrument_node="">We found that many classical economists believed that technical change was predominantly deskilling during the eighteenth and nineteenth centuries. However, the authors under consideration put forward different views on what caused this bias. In accordance with recent discussions on technological change biases, the classical authors’ views can be divided into two categories: those who argue that the bias is determined </span><i data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">exogenously</span></i><span data-dcnode-id="2421" instrument_node=""> by technological trends and those who regard the bias as being </span><i data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">endogenously</span></i><span data-dcnode-id="2418" instrument_node=""> determined by various socio-economic factors.</span></p><p data-dcnode-id="2412"><span data-dcnode-id="2416" instrument_node="">In the recent literature the increased demand for skilled labour in the twentieth century is seen by some authors as arising from a specific </span><i data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">General purpose technology</span></i><span data-dcnode-id="2413" instrument_node="">: new information and communication technologies that are skill-biased “by nature.” Others hold that an increase in the relative supply of skilled labour has induced capital goods producers to direct their R&amp;D activities towards developing new, more skilled-labour-complementary technologies. In a similar way, some classical authors also argued that the division of labour, mechanization, and industrialization simply happened to have a particular technological bias “by nature,” while others suggested that social and economic factors, such as relative factor endowments, or strikes, bargaining power, etc., have at least co-determined the direction of technical change.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2410" id="Sec8"><span data-dcnode-id="2411" instrument_node="">Biased technological change as an unintended by-product of progress</span></h3><p data-dcnode-id="2396"><span data-dcnode-id="2409" instrument_node="">In Smith’s view, the increasing division of labour was caused by enlarged markets that made it necessary to increase productivity in order to supply the rising demand. At the same time, increased division of labour and rising labour productivity also boosted demand because of falling commodity prices. Thus the increasing division of labour is both </span><i data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">induced by</span></i><span data-dcnode-id="2406" instrument_node=""> enlarged markets and also </span><i data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">inducing</span></i><span data-dcnode-id="2403" instrument_node=""> the enlargement of markets (see Brugger </span><a aria-label="Reference 2013" data-dcnode-id="2401" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d224658289e1041" title="Brugger, F. (2013). Die Richtung und die Induktion des technischen Fortschritts. Eine volkswirtschaftliche und soziologische Perspektive. Akademikerverlag: Saarbrücken."><span data-dcnode-id="2402" instrument_node="">2013</span></a><span data-dcnode-id="2400" instrument_node="">, pp. 9–11). But for Smith, the deskilling bias of technical change was neither induced by an increasing endowment with unskilled labourers nor by attempts at breaking the wage bargaining power of skilled workers, but was rather an unintended by-product of the new production organization. Smith takes the deskilling nature of technical progress as </span><i data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">exogenously</span></i><span data-dcnode-id="2397" instrument_node=""> given. This view was challenged by some studies that argue that relative factor endowments provided incentives for innovating in certain directions already in the late eighteenth and early nineteenth century.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2394" id="Sec9"><span data-dcnode-id="2395" instrument_node="">Induced technical change and relative factor supplies</span></h3><p data-dcnode-id="2365"><span data-dcnode-id="2393" instrument_node="">In much of the recent literature, relative factor endowments are considered to be the main driving force for the direction of technical change and it has been suggested that a comparison between England and the United States indicates that the technical change bias was strongly influenced by relative factor endowments already in the nineteenth century. Because in the United States the relative endowment with skilled labour was higher than in Britain, the wage differential between skilled and unskilled labour was much smaller in the United States than in England (Clark </span><a aria-label="Reference 1916" data-dcnode-id="2391" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d224658289e1055" title="Clark, V. S. (1916). History of Manufactures in the United States 1607–1860. Washington D.C.: Carnegie Institution of Washington."><span data-dcnode-id="2392" instrument_node="">1916</span></a><span data-dcnode-id="2390" instrument_node="">, p. 392). Owing to skilled labour being relatively “cheaper” in the United States, more machinery that requires skilled labour for its operation was developed and used than in England (Brinley </span><a aria-label="Reference 1954" data-dcnode-id="2388" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d224658289e1058" title="Brinley, T. (1954). Migration and economic growth, a study of Great Britain and the Atlantic economy. Cambridge: Cambridge University Press."><span data-dcnode-id="2389" instrument_node="">1954</span></a><span data-dcnode-id="2387" instrument_node="">, p. 165; Habakkuk </span><a aria-label="Reference 1962" data-dcnode-id="2385" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d224658289e1061" title="Habakkuk, J. H. (1962). American and British technology in the nineteenth century, the search for labor-saving invention. Cambridge: Cambridge University Press."><span data-dcnode-id="2386" instrument_node="">1962</span></a><span data-dcnode-id="2384" instrument_node="">, pp. 151–152). This so-called “Habakkuk hypothesis,” according to which US factories used more skilled-labour complementary techniques because of the relative abundance of skilled labourers was supported by empirical evidence (see, for instance, Floud </span><a aria-label="Reference 1974" data-dcnode-id="2382" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d224658289e1064" title="Floud, R. C. (1974). The adolescence of American engineering competition, 1860–1900. The Economic History Review, 27(1), 57–71."><span data-dcnode-id="2383" instrument_node="">1974</span></a><span data-dcnode-id="2381" instrument_node="">). That relative factor endowments influenced the choice of techniques in the nineteenth century is supported also by comparative studies for specific industries, for instance by comparing the English and American cotton industry. Because of the relative abundance of skilled cotton-industry workers in Lancashire and their shortage in the United States the use of mule spinners was much more common in Lancashire (Sandberg </span><a aria-label="Reference 1969" data-dcnode-id="2379" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d224658289e1067" title="Sandberg, L. G. (1969). American rings and English mules: the role of economic rationality. The Quarterly Journal of Economics, 83(1), 25–43."><span data-dcnode-id="2380" instrument_node="">1969</span></a><span data-dcnode-id="2378" instrument_node="">; Leunig </span><a aria-label="Reference 1996" data-dcnode-id="2376" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d224658289e1071" title="Leunig, T. (1996). The myth of the corporate economy: Great Britain’s cotton textile industry, 1900–1913. Business and Economic History, 25(2), 53–67."><span data-dcnode-id="2377" instrument_node="">1996</span></a><span data-dcnode-id="2375" instrument_node="">). More recently, Broadberry and Gupta (</span><a aria-label="Reference 2009" data-dcnode-id="2373" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d224658289e1074" title="Brugger, F. (2013). Die Richtung und die Induktion des technischen Fortschritts. Eine volkswirtschaftliche und soziologische Perspektive. Akademikerverlag: Saarbrücken."><span data-dcnode-id="2374" instrument_node="">2009</span></a><span data-dcnode-id="2372" instrument_node="">) showed that, due to high wages, English cotton manufacturing was unable to compete with Indian producers in the seventeenth and eighteenth centuries. The shortage of cheap labour in England, due to high productivity in other industries and higher living costs, was a serious disadvantage for the labour-intensive cotton sector. Lack of international competitiveness forced the English cotton industry to search for new techniques. This lead to the development of “Spinning Mule” and “Spinning Jenny”—innovations that helped to restore the competitiveness of the English cotton industry. According to these studies, </span><i data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">differences</span></i><span data-dcnode-id="2369" instrument_node=""> and </span><i data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">changes</span></i><span data-dcnode-id="2366" instrument_node=""> in relative factor endowments strongly influenced the technical change bias in the eighteenth and nineteenth centuries.</span></p><p data-dcnode-id="2354"><span data-dcnode-id="2364" instrument_node="">Recently, the induced technical change argument was revived by Allen (</span><a aria-label="Reference 2009" data-dcnode-id="2362" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d224658289e1086" title="Allen, R. C. (2009). The British industrial revolution in global perspective. Cambridge: Cambridge University Press."><span data-dcnode-id="2363" instrument_node="">2009</span></a><span data-dcnode-id="2361" instrument_node="">), who claimed that England was characterized by a special price structure in the eighteenth century: “Wages were high and energy was cheap. These prices led directly to the Industrial revolution by giving firms strong incentives to invent technologies that substituted capital and coal for labour” (2009, p. 22). Allen suggests that in the pre-industrialization phase, as well as in the early stages of the first industrialization, ‘high wages were a consequence of the vigorous economic growth of the period and led to further growth as new technologies were invented to economize on expensive English labour’ (2009, p. 55). According to Allen, the high wage economy was caused by the commercial expansion that preceded the early industrialization. It meant that many English could afford more education for their children, since in England “apprenticeship … was the standard way of conveying craft skills. Typically, parents had to make a lump-sum payment to a master when their child was taken on, and the ability to save this sum was eased when incomes were high” (2009, p. 262). The prevalence of high wages “facilitated all sorts of skill acquisition. … Widespread literacy, numeracy and craft competence reflected the demand for skills in the advanced economies, and the high wages those economies generated gave workers the money to pay for schooling and apprenticeships” (2009, pp. 55–56). Consequently, “eighteenth-century Britain was much more abundantly endowed with human capital, and that is an important reason for the technological breakthroughs of the period. … Britain had more inventors because the population became more literate, numerate and skilled” (2009, pp. 238–239). Allen agrees with Mokyr (</span><a aria-label="Reference 2002" data-dcnode-id="2359" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d224658289e1089" title="Mokyr, J. (2002). The gifts of Athena: Historical origins of the knowledge economy. Princeton: Princeton University Press."><span data-dcnode-id="2360" instrument_node="">2002</span></a><span data-dcnode-id="2358" instrument_node="">), that “the Industrial Revolution would have come to naught if the vital few had not been supported by second- and third-tier inventors, who made the micro-inventions that improved the efficiency and extended the scope of the macro-inventions” (2009, p. 240). The key to British technological success was that its rich endowment of competent skilled artisans gave it a comparative advantage in micro-inventions (2009, p. 258 see also Meisenzahl and Mokyr </span><a aria-label="Reference 2012" data-dcnode-id="2356" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d224658289e1092" title="Meisenzahl R.R., &amp; Mokyr, J. (2012). The rate and direction of invention in the British industrial revolution, in Josh Lerner and Scott Stern (Eds), The Rate and Direction of Inventive Activity Revisited, National Bureau of Economic Research (pp. 443479). Chicago: University of Chicago Press."><span data-dcnode-id="2357" instrument_node="">2012</span></a><span data-dcnode-id="2355" instrument_node="">).</span></p><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">The eighteenth-century high wages not only provided the means for more skill acquisition, but also strong incentives for introducing labour-saving technologies. In the period from 1760 to 1830, Allen argues, “innovation in the British cotton industry relentlessly saved labour, the scarce and expensive factor of production” (2009, p. 184). Allen further suggests dividing the innumerable inventions of the British industrial revolution into “macro-inventions,” which are associated with technological breakthroughs due to new scientific or technical knowledge, and “micro-inventions,” which consist of adaptations and minor improvements due to “local learning.” The former, he argues, exhibited a particular bias, which made them suitable only for Britain, not for Continental Europe: High wages and cheap energy led to the invention of labour-saving and energy-intensive (i.e., coal-intensive) technologies. The subsequent “micro-inventions,” however, then exhibited no particular bias anymore:</span></p><blockquote class="c-blockquote" data-dcnode-id="2346"><div class="c-blockquote__body" data-dcnode-id="2347"><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">In their youth, they [the inventions] were decidedly British in their biases. As they matured, these biases wore away, and the inventions were adapted to any circumstances. At that point, the Industrial Revolution diffused to the continent [and] to North America. … This life span took a century and a half. (2009, p. 136)</span></p><span data-dcnode-id="2348" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2338"><span data-dcnode-id="2345" instrument_node="">Allen seeks to support his thesis by focusing on selected examples of British micro-inventions. One such example is the self-acting mule, which was invented in the late 1820s by Richard Roberts: “His aim was to eliminate the jobs of the high wage spinners who had operated the mules, and in that he succeeded—thus providing a neat example of factor prices directing invention” (2009, p. 208) However, Allen is well aware of the standard objection to factor-price induced technical change: Profit-maximizing firms are interested in reducing unit production costs in general and therefore are indifferent between saving capital or labour.</span><sup data-dcnode-id="2340"><a data-dcnode-id="2341" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Footnote </span></span><span data-dcnode-id="2342" instrument_node="">8</span></a></sup><span data-dcnode-id="2339" instrument_node=""> He seeks to address this objection--rather insufficiently—by emphasizing “the cost of R&amp;D and the expectations about the bias of the resulting technology” (2009, p. 137). He is clear about the fact that</span></p><blockquote class="c-blockquote" data-dcnode-id="2329"><div class="c-blockquote__body" data-dcnode-id="2330"><span data-dcnode-id="2337" instrument_node="">
</span><p data-dcnode-id="2332"><span data-dcnode-id="2336" instrument_node="">implicit in this analysis is the idea that firms undertaking R&amp;D knew what they were aiming at, at least in economic terms. It would be hard to argue with this assumption in the case of the inventions that increased the use of coal, for they were clearly aimed at changing factor proportions in the direction of a cheaper input. The assumption is not as immediately obvious in the case of machines. Was Hargreaves aiming at saving labour with the spinning jenny and Arkwright with the water frame? (Allen </span><a aria-label="Reference 2009" data-dcnode-id="2334" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d224658289e1120" title="Allen, R. C. (2009). The British industrial revolution in global perspective. Cambridge: Cambridge University Press."><span data-dcnode-id="2335" instrument_node="">2009</span></a><span data-dcnode-id="2333" instrument_node="">, p. 142)</span></p><span data-dcnode-id="2331" instrument_node="">
</span></div></blockquote></div></div></section><section data-dcnode-id="2195" data-title="Deskilling innovations as a weapon in the class struggle"><div class="c-article-section" data-dcnode-id="2196" id="Sec10-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2324" id="Sec10"><span data-dcnode-id="2325" instrument_node="">Deskilling innovations as a weapon in the class struggle</span></h2><div class="c-article-section__content" data-dcnode-id="2197" id="Sec10-content"><p data-dcnode-id="2313"><span data-dcnode-id="2323" instrument_node="">Unlike the recent contributions to biased technological change, some classical economists have argued that the </span><i data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">endogenous</span></i><span data-dcnode-id="2320" instrument_node=""> bias of technological change is not due to relative factor endowments and relative factor prices, but is also, and perhaps mainly, an instrument for raising the capitalists’ bargaining power in the class struggle. As outlined above, one-hundred years after Smith, Marx also diagnosed predominantly deskilling tendencies of technical change. But unlike Smith, for whom the deskilling bias is an unintended by-product of the increasing division of labour, Marx sees technical deskilling as a bourgeois weapon in the class struggle: By substituting machines for workers, capitalists deliberately seek to reduce skilled workers’ bargaining power. Machinists are easy to replace by unskilled workers, including women and children, and therefore have a much weaker bargaining position than highly specialised and well-trained workers. In times of high strike frequency, capitalists got shown quite plainly that specialised skilled workers are pivotal for production and difficult to replace. Therefore, strikes provided incentives for capitalists to search for deskilling innovations: “In England, strikes have regularly given rise to the invention and application of new machines. Machines were, it may be said, the weapon employed by the capitalists to quell the revolt of specialist labour” (Marx </span><a aria-label="Reference 1963" data-dcnode-id="2318" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d224658289e1136" title="Marx, K. (1963) [1847]. The poverty of philosophy. Moscow, Foreign Languages Publishing House."><span data-dcnode-id="2319" instrument_node="">1963</span></a><span data-dcnode-id="2317" instrument_node="">, pp. 167–168) Marx asserted that “from 1825 onwards, almost all the new inventions were the result of collisions between the worker and the employer who sought at all costs to depreciate the workers’ specialized ability” (</span><a aria-label="Reference 1963" data-dcnode-id="2315" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d224658289e1139" title="Marx, K. (1963) [1847]. The poverty of philosophy. Moscow, Foreign Languages Publishing House."><span data-dcnode-id="2316" instrument_node="">1963</span></a><span data-dcnode-id="2314" instrument_node="">, p. 140).</span></p><p data-dcnode-id="2302"><span data-dcnode-id="2312" instrument_node="">Well, the nineteenth century was a time of strong skilled-craftsmen unions, at least in some sectors (see Foster </span><a aria-label="Reference 1974" data-dcnode-id="2310" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d224658289e1145" title="Foster, J. (1974). Class struggle and the industrial revolution. Early industrial capitalism in three English towns. London: Weidenfeld and Nicholson."><span data-dcnode-id="2311" instrument_node="">1974</span></a><span data-dcnode-id="2309" instrument_node="">), deep mistrust between management and labour (Magee </span><a aria-label="Reference 2004" data-dcnode-id="2307" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d224658289e1148" title="Magee, G. B. (2004). Manufacturing and technological change. In R. Floud &amp; J. Paul (Eds.), The Cambridge economic history of modern Britain. Volume II: Economic maturity, 1860–1939 (pp. 74–99). Cambridge: Cambridge University Press."><span data-dcnode-id="2308" instrument_node="">2004</span></a><span data-dcnode-id="2306" instrument_node="">, pp. 93–94), high labour turnover, and on-going resistance of skilled workers (Bruland </span><a aria-label="Reference 2004" data-dcnode-id="2304" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d224658289e1151" title="Bruland, K. (2004). Industrialisation and technological change. In R. Floud &amp; J. Paul (Eds.), The Cambridge economic history of modern Britain. Volume I: Industrialisation, 1700–1860 (pp. 117–147). Cambridge: Cambridge University Press."><span data-dcnode-id="2305" instrument_node="">2004</span></a><span data-dcnode-id="2303" instrument_node="">, p. 139). There is a relatively comprehensive empirical literature on whether Marx’s hypothesis was correct that major strikes have induced capitalists to search for skilled-labour-saving innovations. Most notable is Nathan Rosenberg’s article from 1969, entitled “The Direction of Technological Change: Inducement Mechanisms and Focusing Devices,” which emphasized the bargaining-power-reducing component of nineteenth-century innovations:</span></p><blockquote class="c-blockquote" data-dcnode-id="2293"><div class="c-blockquote__body" data-dcnode-id="2294"><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2296"><span data-dcnode-id="2300" instrument_node="">The apparent recalcitrance of nineteenth-century English labor, especially skilled labor, in accepting the discipline and the terms of factory employment provided an inducement to technical change. … The view was widely expressed in nineteenth-century England … that strikes were a major reason for innovations … . We have, moreover, the evidence of numerous inventors themselves, who testified that they undertook the search process, which led to a particular invention, as the result of a strike or the threat of a strike. (Rosenberg </span><a aria-label="Reference 1969" data-dcnode-id="2298" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d224658289e1158" title="Rosenberg, N. (1969). The direction of technological change: inducement mechanisms and focusing devices. Economic Development and Cultural Change, 18(1), 1–24."><span data-dcnode-id="2299" instrument_node="">1969</span></a><span data-dcnode-id="2297" instrument_node="">, p. 12)</span></p><span data-dcnode-id="2295" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2249"><span data-dcnode-id="2292" instrument_node="">According to Rosenberg, many skilled-labour-saving innovations appear irrational, because they did not reduce unit costs, at least from a short-run perspective. Or, as Bruland put it, entrepreneurs apparently based their choice of production methods not only on the production costs that are associated with a certain technique, but also took into account which kind of labour was needed to run a certain machinery, whether the needed workers are organized in unions or not, and whether they are easy to replace in a strike, etc. (</span><a aria-label="Reference 1982" data-dcnode-id="2290" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d224658289e1165" title="Bruland, K. (1982). Industrial conflict as a source of technical innovation: three cases. Economy and Society, 11(2), 91–121."><span data-dcnode-id="2291" instrument_node="">1982</span></a><span data-dcnode-id="2289" instrument_node="">, p. 95). Hence, the strong anti-skilled labour bias of many innovations is not fully explained by short-run profit maximization: “</span><i data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">It may well even be that the apparently irrational determination of so many nineteenth-century firms to introduce labour-saving innovations (irrational from the point of view of modern theory) really arose from their determination to engage in rational long-term planning—a procedure which was impossible as long as strikes possibilities by indispensable skilled personnel hung like a sword of Damocles over their heads.”</span></i><span data-dcnode-id="2286" instrument_node=""> (Rosenberg </span><a aria-label="Reference 1969" data-dcnode-id="2284" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d224658289e1171" title="Rosenberg, N. (1969). The direction of technological change: inducement mechanisms and focusing devices. Economic Development and Cultural Change, 18(1), 1–24."><span data-dcnode-id="2285" instrument_node="">1969</span></a><span data-dcnode-id="2283" instrument_node="">, p. 22) Apart from Rosenberg, authors such as Habakkuk (</span><a aria-label="Reference 1962" data-dcnode-id="2281" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d224658289e1174" title="Habakkuk, J. H. (1962). American and British technology in the nineteenth century, the search for labor-saving invention. Cambridge: Cambridge University Press."><span data-dcnode-id="2282" instrument_node="">1962</span></a><span data-dcnode-id="2280" instrument_node="">), Floud (</span><a aria-label="Reference 1974" data-dcnode-id="2278" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d224658289e1177" title="Floud, R. C. (1974). The adolescence of American engineering competition, 1860–1900. The Economic History Review, 27(1), 57–71."><span data-dcnode-id="2279" instrument_node="">1974</span></a><span data-dcnode-id="2277" instrument_node="">, p. 105), Lazonick (</span><a aria-label="Reference 1979" data-dcnode-id="2275" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d224658289e1181" title="Lazonick, W. H. (1979). Industrial relations and technical change: the case of the self-acting mule. Cambridge Journal of Economics, 3(3), 231–262."><span data-dcnode-id="2276" instrument_node="">1979</span></a><span data-dcnode-id="2274" instrument_node="">, pp. 233 ff.), Bruland (</span><a aria-label="Reference 1982" data-dcnode-id="2272" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d224658289e1184" title="Bruland, K. (1982). Industrial conflict as a source of technical innovation: three cases. Economy and Society, 11(2), 91–121."><span data-dcnode-id="2273" instrument_node="">1982</span></a><span data-dcnode-id="2271" instrument_node="">), MacLeod (</span><a aria-label="Reference 1988" data-dcnode-id="2269" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d224658289e1187" title="MacLeod, C. (1988). Inventing the industrial revolution. The English patent system 1660–1800. Cambridge: Cambridge University Press."><span data-dcnode-id="2270" instrument_node="">1988</span></a><span data-dcnode-id="2268" instrument_node="">, p. 170), and Mokyr (</span><a aria-label="Reference 1990" data-dcnode-id="2266" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d224658289e1190" title="Mokyr, J. (1990). The lever of riches, technological creativity and economic progress. Oxford: Oxford University Press."><span data-dcnode-id="2267" instrument_node="">1990</span></a><span data-dcnode-id="2265" instrument_node="">) have also recognized incentives for entrepreneurs to direct the search for inventions towards methods that reduce the bargaining position of workers: “There are several instances where the desire to diminish the bargaining power of skilled craft labour provided a strong incentive to install machines which replaced it by unskilled labour” (Habakkuk </span><a aria-label="Reference 1962" data-dcnode-id="2263" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d224658289e1193" title="Habakkuk, J. H. (1962). American and British technology in the nineteenth century, the search for labor-saving invention. Cambridge: Cambridge University Press."><span data-dcnode-id="2264" instrument_node="">1962</span></a><span data-dcnode-id="2262" instrument_node="">, p. 153), and “inventors wished to substitute away from labor to reduce the bargaining power of unions or because they believed their workers to be untrustworthy” (Mokyr </span><a aria-label="Reference 1990" data-dcnode-id="2260" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d224658289e1196" title="Mokyr, J. (1990). The lever of riches, technological creativity and economic progress. Oxford: Oxford University Press."><span data-dcnode-id="2261" instrument_node="">1990</span></a><span data-dcnode-id="2259" instrument_node="">, p. 165). Hence “The result [of on-going struggles between skilled workers and entrepreneurs] can be seen in the changing structure of the labour force. Between 1841 and 1861 the proportion of skilled workers in the Oldham industry declined from about 70 to 40 per cent (with equivalent increases in the number of labouring and semi-skilled jobs)” (Foster </span><a aria-label="Reference 1974" data-dcnode-id="2257" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d224658289e1200" title="Foster, J. (1974). Class struggle and the industrial revolution. Early industrial capitalism in three English towns. London: Weidenfeld and Nicholson."><span data-dcnode-id="2258" instrument_node="">1974</span></a><span data-dcnode-id="2256" instrument_node="">, p. 227) Even if the deskilling pressure of nineteenth-century technical change is often overestimated (von Tunzelmann </span><a aria-label="Reference 1995" data-dcnode-id="2254" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d224658289e1203" title="Von Tunzelmann, N. G. (1995). Technology and industrial progress. Aldershot: Edward Elgar."><span data-dcnode-id="2255" instrument_node="">1995</span></a><span data-dcnode-id="2253" instrument_node="">, p. 111), there is sufficient evidence to conclude that strikes have been a major factor in inducing entrepreneurs to search for and implement bargaining-power-reducing innovations, as stated by Marx. Besides introducing deskilling innovations employers also followed a second tactic in order to impair the workers’ bargaining position by installing “a new pacemaker grade inside the labor force’ (Foster </span><a aria-label="Reference 1974" data-dcnode-id="2251" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d224658289e1206" title="Foster, J. (1974). Class struggle and the industrial revolution. Early industrial capitalism in three English towns. London: Weidenfeld and Nicholson."><span data-dcnode-id="2252" instrument_node="">1974</span></a><span data-dcnode-id="2250" instrument_node="">, p. 231). By paying skilled senior workers for the whole work process and inviting them to hire unskilled workers on their own account, skilled workers became a kindt of “semi-capitalists.”</span></p><p data-dcnode-id="2238"><span data-dcnode-id="2248" instrument_node="">As Marx noted, other nineteenth-century political economists shared his view that breaking the workers’ bargaining power was a strong incentive to innovate in a certain direction. Charles Babbage, in particular, also pointed out that strikes may have induced innovations that are to the detriment of workers: “The improvements which are often made in machinery in consequence of “a strike” amongst the workmen, most frequently do injury, of greater or less duration, to that particular class which gave rise to them” (Babbage </span><a aria-label="Reference 1835" data-dcnode-id="2246" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d224658289e1212" title="Babbage, C. (1835). On the economy of machinery and manufactures (4th ed.). London: Reprinted by Charles Knight."><span data-dcnode-id="2247" instrument_node="">1835</span></a><span data-dcnode-id="2245" instrument_node="">, p. 297) And Andrew Ure (</span><a aria-label="Reference 1969" data-dcnode-id="2243" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d224658289e1215" title="Ure, A. (1969 [1861]). The philosophy of manufactures: Or, an exposition of the scientific, moral, and commercial economy of the factory system of Great Britain. New York: B. Franklin."><span data-dcnode-id="2244" instrument_node="">1969</span></a><span data-dcnode-id="2242" instrument_node=""> [1861], pp. 364–71), in his typical anti-union manner, even made strikes responsible for the workers’ distress, arguing that the latter had forced cotton producers to “request” the invention of less skill-intensive techniques. He contended that strikes have been “injuries inflicted on their own body by the unions” (ibid., p. 364), in the sense that “during a disastrous turmoil of this kind, in Hyde, Stayley-bridge, and the adjoining factory townships, several of the capitalists, […] had recourse to the celebrated machinists Messrs. Sharp and Co., of Manchester, requesting them to direct the inventive talents of their partner, Mr. Roberts, to the construction of a self-acting mule, in order to emancipate the trade from galling slavery and impeding ruin” (ibid., pp. 366–367). In this way, increased mechanization enabled the capitalist to get rid of “restive spinners, and to become once more master of his mill, which is no small advantage” (ibid., p. 365). According to Ure, without those class struggles and the high costs they inflicted on the owners of the cotton mills, further mechanization and displacement of skilled workers would not have taken place at this time. This is confirmed also by Bruland, who noted that “within the British textile industry in the early nineteenth century, a direct causal relationship can be identified between particular arenas of industrial conflict and particular kinds of technical innovations” (</span><a aria-label="Reference 1982" data-dcnode-id="2240" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d224658289e1218" title="Bruland, K. (1982). Industrial conflict as a source of technical innovation: three cases. Economy and Society, 11(2), 91–121."><span data-dcnode-id="2241" instrument_node="">1982</span></a><span data-dcnode-id="2239" instrument_node="">, p. 94). According to Bruland, also in the case of spinners, wool-combers, and calico printers, strikes have led to further mechanization and replacement of skilled workers:</span></p><blockquote class="c-blockquote" data-dcnode-id="2229"><div class="c-blockquote__body" data-dcnode-id="2230"><span data-dcnode-id="2237" instrument_node="">
</span><p data-dcnode-id="2232"><span data-dcnode-id="2236" instrument_node="">We can thus understand certain specific avenues of technical change, and hence certain aspects of the technical structure of production, in terms of the struggles over power, control and distribution, which are endemic within production systems in capitalist economies. (Bruland </span><a aria-label="Reference 1982" data-dcnode-id="2234" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d224658289e1225" title="Bruland, K. (1982). Industrial conflict as a source of technical innovation: three cases. Economy and Society, 11(2), 91–121."><span data-dcnode-id="2235" instrument_node="">1982</span></a><span data-dcnode-id="2233" instrument_node="">, p. 94)</span></p><span data-dcnode-id="2231" instrument_node="">
