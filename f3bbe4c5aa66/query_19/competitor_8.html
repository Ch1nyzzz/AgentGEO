</span></div></blockquote><p data-dcnode-id="2218"><span data-dcnode-id="2228" instrument_node="">Marx identified the manufacturing division of labour as an instrument of capitalists to gain power over the workers and control over the labour process. Numerous contributions to the “labour process” literature have pursued and confirmed Marx’s perspective, for both the nineteenth and twentieth centuries. Harry Braverman (</span><a aria-label="Reference 1974" data-dcnode-id="2226" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d224658289e1230" title="Braverman, H. (1974). Labor and monopoly capital. New York and London: Monthly Review Press."><span data-dcnode-id="2227" instrument_node="">1974</span></a><span data-dcnode-id="2225" instrument_node="">), who started this stream of literature, applied it to explain the rise of a white-collar working class through the mechanization of office work, which led to the deskilling and displacing of clerical workers. In his classic study, he also noted the importance of what has since been called the “Babbage Principle.”</span><sup data-dcnode-id="2220"><a data-dcnode-id="2221" href="#Fn9"><span class="u-visually-hidden" data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Footnote </span></span><span data-dcnode-id="2222" instrument_node="">9</span></a></sup><span data-dcnode-id="2219" instrument_node=""> It states that:</span></p><blockquote class="c-blockquote" data-dcnode-id="2209"><div class="c-blockquote__body" data-dcnode-id="2210"><span data-dcnode-id="2217" instrument_node="">
</span><p data-dcnode-id="2212"><span data-dcnode-id="2216" instrument_node="">the master manufacturer, by dividing the work to be executed into different processes, each requiring different degrees of skill or of force, can purchase exactly that precise quantity of both which is necessary for each process; whereas, if the whole work were executed by one workman, that person must possess sufficient skill to perform the most difficult, and sufficient strength to execute the most laborious, of those operations into which the art is divided. (Babbage </span><a aria-label="Reference 1835" data-dcnode-id="2214" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d224658289e1247" title="Babbage, C. (1835). On the economy of machinery and manufactures (4th ed.). London: Reprinted by Charles Knight."><span data-dcnode-id="2215" instrument_node="">1835</span></a><span data-dcnode-id="2213" instrument_node="">, pp. 175-176)</span></p><span data-dcnode-id="2211" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2198"><span data-dcnode-id="2208" instrument_node="">The underlying rationale of Babbage’s principle is that a worker who performs high-skill tasks must receive a wage commensurate to his skill level, even though he regularly has to perform work of lower skill levels as well. If instead the labour process is divided among several workers, however, overall labour costs can be considerably reduced by assigning only high-skill tasks to high-cost workers, and by limiting low-skill tasks to low-paid workers. According to Braverman, “the most common mode of lowering the cost of labor is exemplified by the Babbage principle: break it up into its simplest elements. … The labor power capable of performing the process may be purchased more cheaply as dissociated elements than as a capacity integrated in a single worker. … Every step in the labor process is divorced, so far as possible, from special knowledge and training and reduced to simple labor” (</span><a aria-label="Reference 1974" data-dcnode-id="2206" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d224658289e1255" title="Braverman, H. (1974). Labor and monopoly capital. New York and London: Monthly Review Press."><span data-dcnode-id="2207" instrument_node="">1974</span></a><span data-dcnode-id="2205" instrument_node="">, pp. 79–83). Along partly similar lines, Marglin (</span><a aria-label="Reference 1974" data-dcnode-id="2203" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d224658289e1258" title="Marglin, Stephen A. (1974/75), What do Bosses do? The origins and functions of hierarchy in capitalist production, Review of Radical Political Economy, 6, pp. 60–112; and 7, pp. 20–37."><span data-dcnode-id="2204" instrument_node="">1974</span></a><span data-dcnode-id="2202" instrument_node="">) has attempted to explain the direction of technological and organizational change associated with the industrial revolution by “the resort of economically and politically powerful classes to innovation in order to change the distribution of income in their favor (rather than to increase its size)” (1974, p. 104). More specifically, he claimed that neither “the minute division of labor that characterized the putting-out system” nor “the development of the centralized organization that characterizes the factory system … took place primarily for reasons of technical superiority. Rather than providing more output for the same inputs, these innovations in work organization were introduced so that the capitalist got himself a larger share of the pie at the expense of the worker, and it is only the </span><i data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">subsequent</span></i><span data-dcnode-id="2199" instrument_node=""> growth in the size of the pie that has obscured the class interest that was at the root of these innovations” (1974, p. 62).</span></p></div></div></section><section data-dcnode-id="2185" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="2186" id="Sec11-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2193" id="Sec11"><span data-dcnode-id="2194" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="2187" id="Sec11-content"><p data-dcnode-id="2188"><span data-dcnode-id="2192" instrument_node="">The main aim of this article is to compare the views of the classical political economists on the effects of technical change on labour markets, in particular on the demand for skilled and unskilled labor, with the empirical evidence that emerges from studies of economic historians. In Smith’s view, technical change is predominantly deskilling. The lean empirical evidence we could find for the period of Smith’s lifetime confirms that many innovations have been deskilling in nature, but there are also indications for skill-biased change. One-hundred years later, Marx stated that entrepreneurs deliberately search for innovations with a deskilling bias, in order to break skilled workers’ bargaining power. The evidence assembled by economic historians for the late nineteenth century shows that strikes and other situations where entrepreneurs got shown the bargaining power of skilled workers quite plainly gave them a strong incentive to search for bargaining power reducing—and thus deskilling—new technologies. While Smith regarded the deskilling bias as an unintended by-product of technological change, Marx argued that under certain circumstances deskilling is the goal of innovations. Some classical authors—most notably Charles Babbage—argued that labelling nineteenth-century technological change a just “deskilling” is an untenable simplification. Artisans were not only replaced by unskilled machinists, but also a variety of newly needed skills arose. Empirical evidence indicates that nineteenth-century technical change was accompanied by marked </span><i data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">skill transformations—</span></i><span data-dcnode-id="2189" instrument_node="">various skills became redundant while new ones arose—but we found no evidence that technical change was on average predominantly deskilling in this period. Hence, the often-viewed opinion that nineteenth-century technical change had a strong overall bias against skilled labour may be due to a generalisation of catchy stories, but lacks empirical support. In fact, nineteenth-century technical change came with an extensive transformation of demanded skills and a change in the skew of the skill distribution, rather than with a deskilling bias alone.</span></p></div></div></section><span data-dcnode-id="2184" instrument_node="">
</span><section data-dcnode-id="2118" data-title="Notes"><div class="c-article-section" data-dcnode-id="2119" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2182" id="notes"><span data-dcnode-id="2183" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="2120" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="2121"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="2175" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="2176"><p data-dcnode-id="2177"><span data-dcnode-id="2181" instrument_node="">However, for measuring skill-biased technical change by employing the (appropriately modified) Solovian production function approach “it is not necessary to specify what makes a worker more skilled than another: it could be education, innate ability or experience” (Violante </span><a aria-label="Reference 2008" data-dcnode-id="2179" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d224658289e442" title="Violante, G. L. (2008). Skill-biased technical change. In S. N. Durlauf &amp; L. E. Blume (Eds.), The new Palgrave dictionary of economics (2nd ed.). London: Palgrave Macmillan."><span data-dcnode-id="2180" instrument_node="">2008</span></a><span data-dcnode-id="2178" instrument_node="">, p. 8).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="2165" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="2166"><p data-dcnode-id="2167"><span data-dcnode-id="2174" instrument_node="">See Spengler (</span><a aria-label="Reference 1977" data-dcnode-id="2172" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d224658289e460" title="Spengler, J. J. (1977). Adam Smith on human capital. American Economic Review, 67(1), 32–36."><span data-dcnode-id="2173" instrument_node="">1977</span></a><span data-dcnode-id="2171" instrument_node="">) and Kurz and Salvadori (</span><a aria-label="Reference 1995" data-dcnode-id="2169" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d224658289e463" title="Kurz, H. D., Salvadori, N. (1995). Theory of Production. A Long-Period Analysis. Cambridge: Cambridge University Press."><span data-dcnode-id="2170" instrument_node="">1995</span></a><span data-dcnode-id="2168" instrument_node="">, pp. 327–331).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="2158" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="2159"><p data-dcnode-id="2160"><span data-dcnode-id="2164" instrument_node="">As is well-known, according to Smith the negative consequences of the division of labour can be mitigated and partly offset by education (cf. </span><i data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">WN</span></i><span data-dcnode-id="2161" instrument_node="">, V.i.f.52–61).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="2154" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="2155"><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">‘The principal basis of manufacture [is] the separation of the labourer from his means of production, and the conversion of these means into capital…. The rules of the guilds, … by limiting most strictly the number of apprentices and journeymen that a single master could employ, prevented him from becoming a capitalist’ (1954 [1867], p. 339).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="5." data-dcnode-id="2150" id="Fn5"><div class="c-article-footnote--listed__content" data-dcnode-id="2151"><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">“Although manufacture creates … a simple separation of the labourers into skilled and unskilled, simultaneously with their hierarchic arrangement in classes, yet the number of unskilled labourers, owing to the preponderating influence of the skilled, remains very limited.” (1954 [1867], p. 346)</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="6." data-dcnode-id="2143" id="Fn6"><div class="c-article-footnote--listed__content" data-dcnode-id="2144"><p data-dcnode-id="2145"><span data-dcnode-id="2149" instrument_node="">“The greater division of labour enables one worker to do the work of five, ten or twenty … Labour is simplified. The special skill of the worker becomes worthless. Therefore, as labour becomes more unsatisfying, more repulsive, competition increases and wages decrease.” (Marx </span><a aria-label="Reference 1977" data-dcnode-id="2147" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d224658289e620" title="Marx, K. (1977)[1847]. Wage labour and capital. In Marx Engels Collected Works, vol. 9, Articles from the Neue Rheinische Zeitung, London: Lawrence &amp; Wishart."><span data-dcnode-id="2148" instrument_node="">1977</span></a><span data-dcnode-id="2146" instrument_node=""> [1849], pp. 225–6)</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="7." data-dcnode-id="2139" id="Fn7"><div class="c-article-footnote--listed__content" data-dcnode-id="2140"><p data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">“The special skill of each individual insignificant factory operative vanishes as an infinitesimal quantity before the science, the gigantic physical forces, and the mass of labour that are embodied in the factory mechanism.” (1954 [1867], p. 399)</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="8." data-dcnode-id="2129" id="Fn8"><div class="c-article-footnote--listed__content" data-dcnode-id="2130"><p data-dcnode-id="2131"><span data-dcnode-id="2138" instrument_node="">Allen rightly notes that “a high wage might not imply high labour costs if the high wage workers were more productive than the low wage workers” (2009, p. 143). He fails to note, however, that because in standard neoclassical theory in equilibrium each factor must be remunerated according to its marginal productivity, there is no incentive to direct the R&amp;D activity towards the saving of any particular factor (Salter </span><a aria-label="Reference 1960" data-dcnode-id="2136" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d224658289e1108" title="Salter, W. E. G. (1960). Productivity and technical change. Cambridge: Cambridge University Press."><span data-dcnode-id="2137" instrument_node="">1960</span></a><span data-dcnode-id="2135" instrument_node="">). For a critical discussion of the neoclassical approach to induced technical change, see Brugger and Gehrke (</span><a aria-label="Reference 2017" data-dcnode-id="2133" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d224658289e1111" title="Brugger, F., &amp; Gehrke, C. (2017). The neoclassical approach to induced technical change. Metroeconomica, 68(4), 730–776."><span data-dcnode-id="2134" instrument_node="">2017</span></a><span data-dcnode-id="2132" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="9." data-dcnode-id="2122" id="Fn9"><div class="c-article-footnote--listed__content" data-dcnode-id="2123"><p data-dcnode-id="2124"><span data-dcnode-id="2128" instrument_node="">Although Braverman is frequently credited with having coined this term, it had in fact already been used by Alfred Marshall, who referred to it as “Babbage’s great principle of economical production, according to which every worker is set to the most difficult and important tasks of which he is capable, and only to those” (</span><a aria-label="Reference 1919" data-dcnode-id="2126" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d224658289e1238" title="Marshall, A. (1919). Industry and trade. London: Macmillan."><span data-dcnode-id="2127" instrument_node="">1919</span></a><span data-dcnode-id="2125" instrument_node="">, p. 149).</span></p></div></li></ol></div></div></section><div data-dcnode-id="1310" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="1311" data-title="References"><div class="c-article-section" data-dcnode-id="1312" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2116" id="Bib1"><span data-dcnode-id="2117" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="1313" id="Bib1-content"><div data-container-section="references" data-dcnode-id="1314"><ul class="c-article-references" data-dcnode-id="1324"><li class="c-article-references__item js-c-reading-companion-references-item" data-dcnode-id="2103"><p class="c-article-references__text" data-dcnode-id="2111" id="ref-CR1"><span data-dcnode-id="2115" instrument_node="">Acemoglu, D. (1998). Why do new technologies complement skills? Directed technical change and wage inequality. </span><i data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Quarterly Journal of Economics, 113</span></i><span data-dcnode-id="2112" instrument_node="">(3), 1055–1090.</span></p><p class="c-article-references__links u-hide-print" data-dcnode-id="2104"><a aria-label="Article reference 1" data-dcnode-id="2109" data-track="clic
