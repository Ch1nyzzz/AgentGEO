</span><meta content="This article reviews and brings together two literatures: classical political economists’ views on the skilling or deskilling nature of technological change in England, during the eighteenth and nineteenth centuries when they wrote, are compared with the empirical evidence about the skill effects of technological change that emerges from studies of economic historians. In both literatures, we look at both the skill impacts of technological change and at the “inducement mechanisms” that are envisaged for the introduction of new technologies. Adam Smith and Karl Marx both regarded the deskilling of the labour force as the predominant form of biased technical change, but other authors such as Charles Babbage also took account of capital-skill complementarities and skill-enhancing effects of technological change. For Smith, the deskilling bias was an unintended by-product of the increasing division of labour, which in his view “naturally” led to ever more simplification of workers’ tasks. As opposed to Smith, Marx considered unskilled-biased technical change as a bourgeois weapon in the class struggle for impairing the workers’ bargaining position. Studies of economic historians lend support to Marx’s hypothesis about the inducement mechanisms for the introduction of unskilled-biased innovations, but have produced no clear-cut empirical evidence for a deskilling tendency of eighteenth- and nineteenth-century technological change as a whole. Industrialization in the eighteenth and nineteenth centuries rather led to labour polarization, by simultaneously deskilling a large part of the workforce and raising the demand for some (but fewer) high-skilled workers." data-dcnode-id="3728" name="dc.description"><span data-dcnode-id="3727" instrument_node="">

</span><meta content="Skilling and deskilling: technological change in classical economic theory and its empirical evidence - Theory and Society" data-dcnode-id="3478" property="og:title"><span data-dcnode-id="3477" instrument_node="">
</span><meta content="This article reviews and brings together two literatures: classical political economists’ views on the skilling or deskilling nature of technological change in England, during the eighteenth and nineteenth centuries when they wrote, are compared with the empirical evidence about the skill effects of technological change that emerges from studies of economic historians. In both literatures, we look at both the skill impacts of technological change and at the “inducement mechanisms” that are envisaged for the introduction of new technologies. Adam Smith and Karl Marx both regarded the deskilling of the labour force as the predominant form of biased technical change, but other authors such as Charles Babbage also took account of capital-skill complementarities and skill-enhancing effects of technological change. For Smith, the deskilling bias was an unintended by-product of the increasing division of labour, which in his view “naturally” led to ever more simplification of workers’ tasks. As opposed to Smith, Marx considered unskilled-biased technical change as a bourgeois weapon in the class struggle for impairing the workers’ bargaining position. Studies of economic historians lend support to Marx’s hypothesis about the inducement mechanisms for the introduction of unskilled-biased innovations, but have produced no clear-cut empirical evidence for a deskilling tendency of eighteenth- and nineteenth-century technological change as a whole. Industrialization in the eighteenth and nineteenth centuries rather led to labour polarization, by simultaneously deskilling a large part of the workforce and raising the demand for some (but fewer) high-skilled workers." data-dcnode-id="3476" property="og:description"><span data-dcnode-id="3475" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1131" data-track-component="article body"><span data-dcnode-id="3040" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="3033" data-gtm-vis-first-on-screen-50443292_562="1959" data-gtm-vis-first-on-screen-50443292_563="1960" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1959" data-gtm-vis-recent-on-screen-50443292_563="1960" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="3034" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3038" id="Abs1"><span data-dcnode-id="3039" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="3035" id="Abs1-content"><p data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">This article reviews and brings together two literatures: classical political economists’ views on the skilling or deskilling nature of technological change in England, during the eighteenth and nineteenth centuries when they wrote, are compared with the empirical evidence about the skill effects of technological change that emerges from studies of economic historians. In both literatures, we look at both the skill impacts of technological change and at the “inducement mechanisms” that are envisaged for the introduction of new technologies. Adam Smith and Karl Marx both regarded the deskilling of the labour force as the predominant form of biased technical change, but other authors such as Charles Babbage also took account of capital-skill complementarities and skill-enhancing effects of technological change. For Smith, the deskilling bias was an unintended by-product of the increasing division of labour, which in his view “naturally” led to ever more simplification of workers’ tasks. As opposed to Smith, Marx considered unskilled-biased technical change as a bourgeois weapon in the class struggle for impairing the workers’ bargaining position. Studies of economic historians lend support to Marx’s hypothesis about the inducement mechanisms for the introduction of unskilled-biased innovations, but have produced no clear-cut empirical evidence for a deskilling tendency of eighteenth- and nineteenth-century technological change as a whole. Industrialization in the eighteenth and nineteenth centuries rather led to labour polarization, by simultaneously deskilling a large part of the workforce and raising the demand for some (but fewer) high-skilled workers.</span></p></div></div></section><span data-dcnode-id="3032" instrument_node="">
</span><div class="c-article-section__content c-article-section__content--separator" data-dcnode-id="3029"><p data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">Technical change and its effects on wealth, consumption, employment, and income distribution were key themes in the writings of the classical economic theorists. Adam Smith’s discussion of the causes and effects of the increasing division of labour was followed by the compensation debates between Say, Malthus, Sismondi, and McCulloch, until Ricardo and Marx opened, with their contributions on the machinery problem, one of the longest and most intensive debates in the history of economic theory. But in most of these studies an analytical framework with homogenous labour was employed for the sake of simplicity—this holds in particular for the contributions of Ricardo and Marx on the effects of the introduction of machinery on the conditions of the working class.</span></p></div><div class="c-article-section__content" data-dcnode-id="3026"><p data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">However, the classical economists were aware of the fact that labour displacement and compensation are not the only important aspects of the impact of technical change on the conditions of workers. Even if innovations do not lead to mass unemployment, they nevertheless change employments dramatically—in terms of working conditions, demands for professional skills, bargaining positions, etc. In the works of Adam Smith, John R. McCulloch, Jean-Baptiste Say, Andrew Ure, Charles Babbage, and Karl Marx we find at least some hints on how, when, and why technical change is likely to increase, diminish, or shift the demand for skilled and unskilled labour. It is perhaps because classical economics is so closely associated with the labour theory of value that classical contributions on heterogeneous labour, such as skill-biased or unskilled-biased technical change, are almost forgotten.</span></p></div><div class="c-article-section__content" data-dcnode-id="3017"><p data-dcnode-id="3018"><span data-dcnode-id="3025" instrument_node="">The purpose of this article is to review the views of the classical economists on biased technical change and its induction and to contrast these views with the available empirical evidence. Accordingly, we first provide a summary account of the ideas of major classical economists on the skill effects of technological changes and then investigate the empirical evidence for different theoretical views on the skilling and deskilling character of eighteenth- and nineteenth-century technological change. We show that the widely shared view—among both classical economists and some modern growth theorists—that prior to the twentieth century technical change was predominantly deskilling, is </span><i data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">not</span></i><span data-dcnode-id="3022" instrument_node=""> confirmed by empirical data. In addition, we also discuss the classical economists’ views about possible “inducement mechanisms” that might have led to technological changes with a particular bias. We then also outline what the recent growth theory literature on biased technological change, in which it is generally assumed that the innovation bias is induced by (changing) relative factor endowments with skilled and unskilled labour (see, in particular, Acemoglu </span><a aria-label="Reference 1998" data-dcnode-id="3020" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d224658289e369" title="Acemoglu, D. (1998). Why do new technologies complement skills? Directed technical change and wage inequality. Quarterly Journal of Economics, 113(3), 1055–1090."><span data-dcnode-id="3021" instrument_node="">1998</span></a><span data-dcnode-id="3019" instrument_node="">), might be able to “learn” from the classical political economists.</span></p></div><div class="c-article-section__content" data-dcnode-id="3011"><p data-dcnode-id="3012"><span data-dcnode-id="3016" instrument_node="">As we shall see, the general presumption of classical political economists that the early stages of industrial capitalism were characterized by a clear deskilling trend is not well supported by empirical evidence, which is much more mixed. What, then, prevented the classical economists from correctly assessing the direction of skill change? In our view, this question necessitates different answers for different authors. Adam Smith, who witnessed only the beginning of the Industrial revolution in the mid-eighteenth century, related technological change to the increasing </span><i data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">division of labour</span></i><span data-dcnode-id="3013" instrument_node=""> that “naturally” accompanied the economic development of capitalist societies. For him, a greater division of labour must inevitably be associated with a simplification of the tasks to be performed by each individual worker. He thus simply projected observations from his own immediate experience into future technological developments. Karl Marx, on the other hand, was writing in the third quarter of the nineteenth century, when the manufacturing system had already given way to the emergence of “modern industry” in England. In his case, the presumption of a deskilling bias derived from his narrow “class struggle view” of the induction of technological change: innovations, he argued, were deliberately aimed at simplifying the workers’ tasks in order to enable the replacement of skilled workers by unskilled ones. He simply could not imagine that capitalists would intentionally introduce skill-enhancing technologies and thereby impair their own bargaining position in the class struggle.</span></p></div><section data-dcnode-id="2671" data-gtm-vis-first-on-screen-50443292_562="1960" data-gtm-vis-first-on-screen-50443292_563="1964" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1960" data-gtm-vis-recent-on-screen-50443292_563="1964" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="The classical economists’ contributions to biased technological change"><div class="c-article-section" data-dcnode-id="2672" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3009" id="Sec1"><span data-dcnode-id="3010" instrument_node="">The classical economists’ contributions to biased technological change</span></h2><div class="c-article-section__content" data-dcnode-id="2673" id="Sec1-content"><p data-dcnode-id="3004"><span data-dcnode-id="3008" instrument_node="">In the context of the so-called “new growth theory” there has been a renaissance of economic discussions on biased technological change. Many recent studies deal with the question whether increasing wage premiums for skilled workers can be explained by skill-biased technological change (see Brugger and Gehrke </span><a aria-label="Reference 2017" data-dcnode-id="3006" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d224658289e385" title="Brugger, F., &amp; Gehrke, C. (2017). The neoclassical approach to induced technical change. Metroeconomica, 68(4), 730–776."><span data-dcnode-id="3007" instrument_node="">2017</span></a><span data-dcnode-id="3005" instrument_node="">). The argument is that an increasing supply of skilled labour has induced profit-maximizing capital goods producers to search more intensively for new technologies that are complementary to skilled labour. Due to the more widespread use of skilled-labour complementary capital goods, the relative demand for skilled labour increased and therefore the skill premium rose. Hence skill-biased technical change functions as a possible explanation for the conundrum that skill supply and skill premiums increased in tandem.</span></p><p data-dcnode-id="2978"><span data-dcnode-id="3003" instrument_node="">While these studies mainly focus on technological change in the twentieth and twenty first centuries, it is suggested in many of those contributions (Acemoglu </span><a aria-label="Reference 1998" data-dcnode-id="3001" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d224658289e391" title="Acemoglu, D. (1998). Why do new technologies complement skills? Directed technical change and wage inequality. Quarterly Journal of Economics, 113(3), 1055–1090."><span data-dcnode-id="3002" instrument_node="">1998</span></a><span data-dcnode-id="3000" instrument_node="">, </span><a aria-label="Reference 2002" data-dcnode-id="2998" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d224658289e394" title="Acemoglu, D. (2002). Directed technical change. The Review of Economic Studies, 69(4), 781–809."><span data-dcnode-id="2999" instrument_node="">2002</span></a><span data-dcnode-id="2997" instrument_node="">, </span><a aria-label="Reference 2009" data-dcnode-id="2995" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d224658289e397" title="Acemoglu, D. (2009). Introduction to modern economic growth. Princeton: Princeton University Press."><span data-dcnode-id="2996" instrument_node="">2009</span></a><span data-dcnode-id="2994" instrument_node="">; Goldin and Katz </span><a aria-label="Reference 1998" data-dcnode-id="2992" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d224658289e400" title="Goldin, C., &amp; Katz, L. F. (1998). The origins of technology-skill complementarity. Quarterly Journal of Economics, 113(3), 693–732."><span data-dcnode-id="2993" instrument_node="">1998</span></a><span data-dcnode-id="2991" instrument_node="">; Funk and Vogel </span><a aria-label="Reference 2004" data-dcnode-id="2989" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d224658289e403" title="Funk, P., &amp; Vogel, T. (2004). Endogenous skill bias. Journal of Economic Dynamics and Control, 28(11), 2155–2193."><span data-dcnode-id="2990" instrument_node="">2004</span></a><span data-dcnode-id="2988" instrument_node="">) that in the nineteenth century technical change was predominantly deskilling, but that things have changed since then. “Stories” on how the shift from small-scale artisanal production to large-scale factory production led to the replacement of high-skilled artisans by unskilled factory workers, frequently women and children, are the main source of evidence for the presumption that in the nineteenth century technical change must have been deskilling in nature. However, gut-wrenching stories about nineteenth-century working conditions are helpful to understand the inhumane and dreadful conditions under which large parts of the population had to work and live, but may be bad guides for ascertaining the technical change bias. And also accounts based on “realistic stories” of contemporary fiction writers such as Thomas Carlyle, Charles Dickens, William Morris, and John Ruskin, the existence of highly visible losers and hidden winners (Manning </span><a aria-label="Reference 2004" data-dcnode-id="2986" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d224658289e407" title="Manning, A. (2004). We can work it out: the impact of technological change on the demand for low-skill workers. Scottish Journal of Political Economy, 51(5), 581–608."><span data-dcnode-id="2987" instrument_node="">2004</span></a><span data-dcnode-id="2985" instrument_node="">), and the reliance on </span><i data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">indirect</span></i><span data-dcnode-id="2982" instrument_node=""> empirical evidence based on “indicators” and “approximations” (Bessen </span><a aria-label="Reference 2011" data-dcnode-id="2980" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d224658289e413" title="Bessen, J. (2011). Was mechanization de-skilling? The origins of task-biased technical change. Boston University School of Law Working Paper No. 11–13.
                        "><span data-dcnode-id="2981" instrument_node="">2011</span></a><span data-dcnode-id="2979" instrument_node="">), may give a misleading picture of the nineteenth-century technical change bias.</span></p><p data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Economic historians, apart from providing historical accounts of technological changes during the Industrial Revolution, have also recently begun using quantitative data to estimate the technological change bias. Employing various indicators for biased technological change and exploring a host of different data sources, recent empirical studies attempt to account for the quantitative effects of industrialization on the demand for skilled and unskilled labour.</span></p><p data-dcnode-id="2962"><span data-dcnode-id="2975" instrument_node="">In modern growth theory, skill-biased technical change is defined as a shift in the production function that favors skilled over unskilled labour: It is a non-neutral technological change that increases the relative marginal productivity, and therefore also the relative wage, of skilled labour. Accordingly, an increase in the relative wage of skilled labour, that is, an increase in the so-called “college premium” (or “skill premium”), can ceteris paribus serve as an indicator of skill-biased technical change. Empirically, skill-biased technical change is usually measured residually by assuming an aggregate production function with capital (</span><i data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">K</span></i><span data-dcnode-id="2972" instrument_node="">) and labour (</span><i data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">L</span></i><span data-dcnode-id="2969" instrument_node="">) as inputs, in which the labour input, </span><i data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">L</span></i><span data-dcnode-id="2966" instrument_node="">, is specified as a constant elasticity of substitution (CES) function of skilled and unskilled labour with factor-specific productivities. From time series data on relative wages and on relative factor supplies, this modified Solovian production function can then be used, with a given estimate of the elasticity of substitution between the two types of labour, to calculate the skill-biased technical change measure (Violante </span><a aria-label="Reference 2008" data-dcnode-id="2964" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d224658289e431" title="Violante, G. L. (2008). Skill-biased technical change. In S. N. Durlauf &amp; L. E. Blume (Eds.), The new Palgrave dictionary of economics (2nd ed.). London: Palgrave Macmillan."><span data-dcnode-id="2965" instrument_node="">2008</span></a><span data-dcnode-id="2963" instrument_node="">).</span></p><p data-dcnode-id="2940"><span data-dcnode-id="2961" instrument_node="">In the modern approach, the distinction between “skilled” and “unskilled labour” is typically based on differences in “years of schooling and higher education.”</span><sup data-dcnode-id="2956"><a data-dcnode-id="2957" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">Footnote </span></span><span data-dcnode-id="2958" instrument_node="">1</span></a></sup><span data-dcnode-id="2955" instrument_node=""> Adam Smith’s use of these terms in the </span><i data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">Wealth of Nations</span></i><span data-dcnode-id="2952" instrument_node=""> (</span><a aria-label="Reference 1976" data-dcnode-id="2950" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d224658289e450" title="Smith, A. (1976 [1776]). In R.H. Campbell, A.S. Skinner &amp; W.B. Todd (Eds.), An inquiry into the nature and causes of the wealth of nations , Oxford: Clarendon Press."><span data-dcnode-id="2951" instrument_node="">1976</span></a><span data-dcnode-id="2949" instrument_node=""> [1776]; </span><i data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">WN</span></i><span data-dcnode-id="2946" instrument_node=""> hereafter) is partly, but not fully in line with the modern usage. Smith generally employs the term “common labour” for unskilled labour, that is, for labour that can be performed without first acquiring specific skills by way of education or professional training, apprenticeship, or learning-by-doing. As regards Smith’s concept of “skilled labour,” he saw two different types of learning or ways of acquiring skills to be involved: (formal) education and experience, i.e., “learning-by-doing.” Smith drew a strict analogy between an item of fixed physical capital (“a machine”) and skilled labour power, and thus he can be said to have anticipated the concept of “human capital.”</span><sup data-dcnode-id="2941"><a data-dcnode-id="2942" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Footnote </span></span><span data-dcnode-id="2943" instrument_node="">2</span></a></sup></p><blockquote class="c-blockquote" data-dcnode-id="2931"><div class="c-blockquote__body" data-dcnode-id="2932"><span data-dcnode-id="2939" instrument_node="">
</span><p data-dcnode-id="2934"><span data-dcnode-id="2938" instrument_node="">When any expensive machine is erected, the extraordinary work performed by it before it is worn out, it must be expected, will replace the capital laid out upon it, with at least the ordinary profits. A man educated at the expence of much labour and time to any of those employments which require extraordinary dexterity and skill, may be compared to one of those expensive machines. The work which he learns to perform, it must be expected, over and above the usual wages of common labour, will replace to him the whole expence of his education, with at least the ordinary profits of an equally valuable capital. It must do this too in a reasonable time, regard being had to the very uncertain duration of human life, in the same manner as to the more certain duration of the machine. (</span><i data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">WN</span></i><span data-dcnode-id="2935" instrument_node="">, I.x.b.6)</span></p><span data-dcnode-id="2933" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2923"><span data-dcnode-id="2930" instrument_node="">Smith claimed that “the difference between the wages of skilled labour and those of common labour, is founded upon this principle” (</span><i data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">WN</span></i><span data-dcnode-id="2927" instrument_node="">, I.x.b.7). For Smith, a wage premium for skilled labour is thus a compensation for expenses incurred in the formation of “human capital”. However, Smith also recognized that some of these expenses are not incurred by individuals, but rather by the public at large, and that “human capital” is not merely a private capital, but also forms part of society’s capital stock; compare Smith’s treatment of the acquired skills of a population as a part of the nation’s capital stock in Chapter 1 of Book II of the </span><i data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">WN</span></i><span data-dcnode-id="2924" instrument_node="">, where he emphasizes the public good character of a better educated workforce.</span></p><p data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">Reading classical economists’ contributions on skill-enhancing and deskilling technological change, one can easily obtain the image that technical change was heavily deskilling in the eighteenth and nineteenth centuries. In particular, major representatives of classical economics like Adam Smith and Karl Marx appear to have been strong advocates of the deskilling technological change hypothesis. They prominently argued that industrialization and mechanisation caused a strong deskilling tendency, in the sense that the duties formerly conducted by craftsmen got reduced to a few simple and recurrent operations, which allowed skilled artisans to be replaced by unskilled women and children. Given these views of prominent classical economists, it is not surprising that recent contributions follow their assessment in suggesting that before the twentieth century technical change was deskilling in nature. Nevertheless, already in the nineteenth century we find contemporary authors who were much more optimistic with regard to the impact of technological change on the demand for skilled labour. For example, Charles Babbage considered new techniques to have been often more skilled-labour-intensive than the replaced ones. Therefore the relationships among industrialization, mechanisation, and skilled labour demand are not as straightforward as they may appear at first sight. The empirical evidence on the bias of technological change in the eighteenth and nineteenth centuries is in fact rather mixed, as we shall see below.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2919" id="Sec2"><span data-dcnode-id="2920" instrument_node="">The pessimistic view: Adam Smith</span></h3><p data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">According to Adam Smith, technical change increases (labour) productivity, real wages, and employment, and it decreases prices, and therefore widens the extent of the market and raises wealth and prosperity. Hence, for Smith technical change is a success story close to Pareto superiority, were it not for a strong unskilled labour bias. Smith is rather optimistic that discharged craftsmen will more or less “immediately” find new employment or may even continue in their former occupation and see only their tasks changed. However, whereas in their former jobs the craftsmen had to command and perform various skills, the new jobs often consist only of a few simple and repetitive operations.</span></p><p data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">For Smith, technical change, which he identified with “increasing division of labour,” is generally associated with both skill-reducing and skill-enhancing tendencies, at least in the early stages of the industrialization process. On the one hand, Smith emphasized, in his famous chapter the “Causes of Improvement in the productive Powers of Labour” where he refers to industrial pin-making, that</span></p><blockquote class="c-blockquote" data-dcnode-id="2906"><div class="c-blockquote__body" data-dcnode-id="2907"><span data-dcnode-id="2914" instrument_node="">
</span><p data-dcnode-id="2909"><span data-dcnode-id="2913" instrument_node="">The greatest improvement in the productive powers of labour, and the greater part of the skill, dexterity, and judgment with which it is any where directed or applied, seem to have been the effects of the division of labour. (</span><i data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">WN</span></i><span data-dcnode-id="2910" instrument_node="">, I.i.1)</span></p><span data-dcnode-id="2908" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">He also argued that particular professional skills are not primarily a result of natural differences in individual human capacities, that is, of “innate abilities”, but rather emanate from learning-by-doing (or from learning-on-the-job):</span></p><blockquote class="c-blockquote" data-dcnode-id="2892"><div class="c-blockquote__body" data-dcnode-id="2893"><span data-dcnode-id="2903" instrument_node="">
</span><p data-dcnode-id="2895"><span data-dcnode-id="2902" instrument_node="">The difference of natural talents in different men is, in reality, much less than we are aware of; and the very different genius which appears to distinguish men of different professions … is not upon many occasions so much the cause, as the </span><i data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">effect</span></i><span data-dcnode-id="2899" instrument_node=""> of the division of labour. The difference between the most dissimilar characters, between a philosopher and a common street porter, for example, seems to arise not so much from nature, as from habit, custom, and education. (</span><i data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">WN</span></i><span data-dcnode-id="2896" instrument_node="">, I.ii.4; emphasis added)</span></p><span data-dcnode-id="2894" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">The increasing division of labour provides scope for gaining specialized experience, and thus for acquiring, developing, and enhancing particular skills. To the extent that it allows workers to gain such experience and to participate in the formation of such habits and customs, the increasing division of labour is skill-enhancing. However, Smith draws a most dismal picture of the impact of the division of labour on the “common labourer” when, in the context of a discussion of the need for public provision of education, he describes the consequences of industrial working conditions:</span></p><blockquote class="c-blockquote" data-dcnode-id="2881"><div class="c-blockquote__body" data-dcnode-id="2882"><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2884"><span data-dcnode-id="2888" instrument_node="">In the progress of the division of labour, the employment of the far greater part of those who live by labour, that is, of the great body of the people, comes to be confined to a few very simple operations; frequently to one or two. (</span><i data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">WN</span></i><span data-dcnode-id="2885" instrument_node="">, V.i.f.50)</span></p><span data-dcnode-id="2883" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2873"><span data-dcnode-id="2880" instrument_node="">The negative effects of the division of labour arise primarily from the fact that industrial production confines common workers to repetitive debilitating mechanical activity in the labour process—which, for Smith, is both </span><i data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">caused by</span></i><span data-dcnode-id="2877" instrument_node=""> and </span><i data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">causing</span></i><span data-dcnode-id="2874" instrument_node=""> the replacement of workers by machinery, as Tony Aspromourgos has pointed out:</span></p><blockquote class="c-blockquote" data-dcnode-id="2864"><div class="c-blockquote__body" data-dcnode-id="2865"><span data-dcnode-id="2872" instrument_node="">
</span><p data-dcnode-id="2867"><span data-dcnode-id="2871" instrument_node="">The growth of labour productivity from division of labour is due to its making labourers like machines, with associated ill consequences for their intellectual and physical constitution, and their sensibilities … . It is this, really, which makes this specialization </span><i data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">partly</span></i><span data-dcnode-id="2868" instrument_node=""> cause the invention of new machines: the resulting increase in the simplicity and repetitiveness—indeed, in the mechanical nature—of labour activity provides increasing scope for labour to be replaced with machines, including in this process the workers themselves perceiving potential innovations in machinery. (2009, p. 139)</span></p><span data-dcnode-id="2866" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">The observation that progress (division of labour) exhibits a strongly deskilling bias prompted Smith to write one of his most-quoted paragraphs:</span></p><blockquote class="c-blockquote" data-dcnode-id="2848"><div class="c-blockquote__body" data-dcnode-id="2849"><span data-dcnode-id="2861" instrument_node="">
</span><p data-dcnode-id="2851"><span data-dcnode-id="2860" instrument_node="">The man whose whole life is spent in performing a few simple operations, … has no occasion to exert his understanding, or to exercise his invention in finding out expedients for removing difficulties which never occur. He naturally loses, therefore, the habit of such exertion, and generally becomes as stupid and ignorant as it is possible for a human creature to become. The torpor of his mind renders him, not only incapable of relishing or bearing a part in any rational conversation, but of conceiving any generous, noble, or tender sentiment … . His dexterity at his own particular trade seems, in this manner, to be acquired at the expence of his intellectual, social, and martial virtues. But in every improved and civilized society this is the state into which the laboring poor, that is, the great body of the people, must necessarily fall, unless government takes some pains to prevent it. (</span><i data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">WN</span></i><span data-dcnode-id="2857" instrument_node="">, V.i.f.50)</span><sup data-dcnode-id="2852"><a data-dcnode-id="2853" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">Footnote </span></span><span data-dcnode-id="2854" instrument_node="">3</span></a></sup></p><span data-dcnode-id="2850" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">In Smith’s view, technical change is not detrimental to labour as a whole—it increases overall employment—but this holds good only for a certain kind of labour, namely for unskilled labour. At the same time, however, the improvements and introduction of machinery that accompany the increasing division of labour are a substitute for skills. Thus, in Smith’s view, technical change is predominantly unskilled-biased “in nature.”</span></p><p data-dcnode-id="2835"><span data-dcnode-id="2845" instrument_node="">In Smith’s lifetime, as well as in his writings, machinery played not yet an important role, in contrast to the early- and mid-nineteenth century period in which Ricardo and Marx lived. Smith refers to the increased use of machinery as a particular kind of technical change that is likely to become more important in the future. In line with some of the later economic discussion on deskilling and skill-biased technological change and the sociological discussion on automatization (see Brugger </span><a aria-label="Reference 2013" data-dcnode-id="2843" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d224658289e567" title="Brugger, F. (2013). Die Richtung und die Induktion des technischen Fortschritts. Eine volkswirtschaftliche und soziologische Perspektive. Akademikerverlag: Saarbrücken."><span data-dcnode-id="2844" instrument_node="">2013</span></a><span data-dcnode-id="2842" instrument_node="">) Smith already anticipated the ambivalence of mechanisation for skilled workers. On the one hand, little imagination is needed to see that as a handicraft carpenter is replaced by a machine of which he remains, if at all, only a “functional part,” the skills demanded of him are radically reduced. On the other hand, for the development and maintenance of machinery a profound technical knowledge is needed like never before; hence, mechanisation is accompanied by a need for “machine-makers” and for “philosophers or men of speculation” (</span><i data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">WN</span></i><span data-dcnode-id="2839" instrument_node="">, I.i.9), as Smith pointed out. Thus in Smith’s view technical change creates at the same time a well-educated “knowledge aristocracy,” whose only task is to invent new machinery (Rosenberg </span><a aria-label="Reference 1965" data-dcnode-id="2837" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d224658289e573" title="Rosenberg, N. (1965). Adam Smith on the division of labour: two views or one? Economica, 32, 127–139."><span data-dcnode-id="2838" instrument_node="">1965</span></a><span data-dcnode-id="2836" instrument_node="">, pp. 134–136), and an ignorant workforce of common labourers. Overall, it seems that Smith envisaged the deskilling tendency of technical change to be far stronger than the skill-enhancing one.</span></p><p data-dcnode-id="2824"><span data-dcnode-id="2834" instrument_node="">Like the progress optimist Smith the compensation optimists Say and McCulloch also discussed the deskilling or skill-displacing tendencies of innovations, at least in some short passages. McCulloch (</span><a aria-label="Reference 1821" data-dcnode-id="2832" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d224658289e579" title="McCulloch, J.R. (1821). The opinions of Messrs. say, Sismondi, and Malthus on the effects of machinery and accumulation, stated and examined. Edinburgh Review, 35, pp. 102–123."><span data-dcnode-id="2833" instrument_node="">1821</span></a><span data-dcnode-id="2831" instrument_node="">, p. 115) contends that “no improvement of machinery can possibly diminish the demand for labour, or reduce the rate of wages.” However, like Smith, he saw in the possible deskilling or rather skill-displacing tendency of many innovations the only negative by-product that technical progress may have: “The only hardship which it [innovations] ever imposes on the labourer is, that in some cases it forces him to change his business” (McCulloch </span><a aria-label="Reference 1821" data-dcnode-id="2829" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d224658289e582" title="McCulloch, J.R. (1821). The opinions of Messrs. say, Sismondi, and Malthus on the effects of machinery and accumulation, stated and examined. Edinburgh Review, 35, pp. 102–123."><span data-dcnode-id="2830" instrument_node="">1821</span></a><span data-dcnode-id="2828" instrument_node="">, p. 115). Hence, for McCulloch it is possible that innovations make certain professions redundant. But he was very optimistic that displaced professionals will easily find new jobs in other industries where similar skills are needed. “The various subordinate branches of all the great departments of industry have so many things in common, that an individual who has attained to any considerable proficiency in one, has seldom much difficulty in attaining to a like proficiency in any other” (ibid.) Thus McCulloch, unlike Smith, does not believe that technical change as a whole has strong deskilling tendencies. Say illustrates with some examples the deskilling effects of machinery introduction (Say </span><a aria-label="Reference 1807" data-dcnode-id="2826" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d224658289e585" title="Say, J.-B. (1807). In J. H. Ludwig (Ed.), Abhandlung über die National-Ökonomie oder einfache Darstellung der Art und Weise wie die Reichtümer entstehen, verteilt und verzehret werden. Halle/Leipzig: München Verlagshandlung."><span data-dcnode-id="2827" instrument_node="">1807</span></a><span data-dcnode-id="2825" instrument_node="">, p. 40&nbsp;f.), but we found no indication that he associates major social problems with deskilling technical progress.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2822" id="Sec3"><span data-dcnode-id="2823" instrument_node="">Marx and Babbage</span></h4><p data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">The most profound contributions on deskilling and skilling technical change were made by Karl Marx and Charles Babbage in the late nineteenth century, when classical economic theory was on its peak. In line with Smith, Marx argued that technological change was predominantly deskilling. Skilled professionals are replaced by unskilled women, children, or urban newcomers from rural areas. In sharp contrast to Smith, however, Marx also argued that technical change is not deskilling “by nature” or accidentally, but rather this is because capitalists deliberately search for deskilling innovations in order to break the bargaining power of skilled workers.</span></p><p data-dcnode-id="2803"><span data-dcnode-id="2819" instrument_node="">In his analysis of the development from medieval handicraft to the modern factory system Marx distinguished between the age of “manufactures” and “modern industry.” “Division of labour and manufactures” designates a phase of handicraft workshop industry in the seventeenth and eighteenth century, which preceded “modern industry,” associated by Marx with the early nineteenth century. What set off manufactures from earlier production of handicraft or industrial articles was a new organizational form: a workshop of handicraftsmen, each carrying out one or a few specific tasks, under capitalist control.</span><sup data-dcnode-id="2814"><a data-dcnode-id="2815" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">Footnote </span></span><span data-dcnode-id="2816" instrument_node="">4</span></a></sup><span data-dcnode-id="2813" instrument_node=""> In the workshop the labour process was divided into individual tasks, but the individual operations were still dependent on the skill of the workmen, and retained the character of a handicraft. Compared to “modern industry,” manufactures still lack a number of important characteristics. First, the existence of a hierarchical organizational structure prevented the full application of division of labour. Manufacturers still required skilled workers (“specialized detail labourers”), and the number of unskilled labourers could not be extended beyond certain limits.</span><sup data-dcnode-id="2808"><a data-dcnode-id="2809" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">Footnote </span></span><span data-dcnode-id="2810" instrument_node="">5</span></a></sup><span data-dcnode-id="2807" instrument_node=""> Secondly, the application of scientific principles in the rationalization of the labour process was hindered by the narrow technical basis of handicraft, since all steps in the production process had to be capable of being carried out by hand. Third, the greatest disadvantage of the manufacturing division of labour was the inability of capital to seize control of the whole labour time of manufacturing workers (Berg </span><a aria-label="Reference 1994" data-dcnode-id="2805" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d224658289e610" title="Berg, M. (1994). The age of manufactures, 1700–1820, industry, innovation and work in Britain (2nd ed.). London and New York: Routledge."><span data-dcnode-id="2806" instrument_node="">1994</span></a><span data-dcnode-id="2804" instrument_node="">, p. 63).</span></p><p data-dcnode-id="2792"><span data-dcnode-id="2802" instrument_node="">Although Marx stressed the deskilling bias of the manufacturing system,</span><sup data-dcnode-id="2797"><a data-dcnode-id="2798" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">Footnote </span></span><span data-dcnode-id="2799" instrument_node="">6</span></a></sup><span data-dcnode-id="2796" instrument_node=""> he noted that it also entailed skill-enhancing and/or skill-transforming elements: ‘Manufacture, in fact, produces the skill of the detail labourer, by reproducing and systematically driving to an extreme within the workshop, the naturally developed differentiation of trades’ (</span><a aria-label="Reference 1954" data-dcnode-id="2794" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d224658289e625" title="Marx, K. (1954) [1867]. Capital, vol. I. London: Lawrence and Wishart."><span data-dcnode-id="2795" instrument_node="">1954</span></a><span data-dcnode-id="2793" instrument_node=""> [1867], p. 321). The detail labourer requires, and therefore acquires, very specific skills, compared to the artificer. However, according to Marx the overall skill content is nonetheless reduced:</span></p><blockquote class="c-blockquote" data-dcnode-id="2783"><div class="c-blockquote__body" data-dcnode-id="2784"><span data-dcnode-id="2791" instrument_node="">
</span><p data-dcnode-id="2786"><span data-dcnode-id="2790" instrument_node="">Manufacture begets, in every handicraft that it seizes upon, a class of so-called unskilled labourers, a class which handicraft strictly excluded. Alongside the hierarchic gradation there steps the simple separation of the labourers into skilled and unskilled. For the latter, the cost of apprenticeship vanishes; for the former, it diminishes, compared with that of artificers, in consequence of the functions being simplified. (</span><a aria-label="Reference 1954" data-dcnode-id="2788" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d224658289e632" title="Marx, K. (1954) [1867]. Capital, vol. I. London: Lawrence and Wishart."><span data-dcnode-id="2789" instrument_node="">1954</span></a><span data-dcnode-id="2787" instrument_node=""> [1867], p. 331)</span></p><span data-dcnode-id="2785" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Yet handicraft skills, although simplified, are still of overwhelming importance in the “manufacturing division of labour”:</span></p><blockquote class="c-blockquote" data-dcnode-id="2772"><div class="c-blockquote__body" data-dcnode-id="2773"><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2775"><span data-dcnode-id="2779" instrument_node="">Since handicraft skill is the foundation of manufacture, and since the mechanization of manufacture as a whole possesses no objective framework which would be independent of the workers themselves, capital is constantly compelled to wrestle with the insubordination of the workers. (</span><a aria-label="Reference 1954" data-dcnode-id="2777" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d224658289e641" title="Marx, K. (1954) [1867]. Capital, vol. I. London: Lawrence and Wishart."><span data-dcnode-id="2778" instrument_node="">1954</span></a><span data-dcnode-id="2776" instrument_node=""> [1867]: 346)</span></p><span data-dcnode-id="2774" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">The novel element and characteristic feature of “modern industry,” as opposed to manufacturing, consists in the use of “machines” in the labour process, with far-reaching consequences:</span></p><blockquote class="c-blockquote" data-dcnode-id="2761"><div class="c-blockquote__body" data-dcnode-id="2762"><span data-dcnode-id="2769" instrument_node="">
</span><p data-dcnode-id="2764"><span data-dcnode-id="2768" instrument_node="">Along with the tool, the skill of the workman in handling it passes over to the machine … . Thereby the technical foundation on which is based the division of labour in Manufacture, is swept away … . The organized group, peculiar to manufacture, is replaced by the connexion between the head workman and his few assistants. The essential division is, into workmen who are actually employed on the machines … and into mere attendants (almost exclusively children) of these workmen. In addition … there is a numerically unimportant class of persons, whose occupation it is to look after the whole of the machinery and repair it from time to time; such as engineers, mechanics, joiners, &amp;c. This is a superior class of workmen, some of them scientifically educated, others brought up to a trade; it is distinct from the operating class. (</span><a aria-label="Reference 1954" data-dcnode-id="2766" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d224658289e650" title="Marx, K. (1954) [1867]. Capital, vol. I. London: Lawrence and Wishart."><span data-dcnode-id="2767" instrument_node="">1954</span></a><span data-dcnode-id="2765" instrument_node=""> [1867], p. 396)</span></p><span data-dcnode-id="2763" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">While the newly evolving, but “numerically unimportant” class of workers in modern industry consists of highly-skilled workmen, the main impact of the modern methods with regard to the former two classes is clearly associated by Marx with a deskilling bias of technical change:</span></p><blockquote class="c-blockquote" data-dcnode-id="2750"><div class="c-blockquote__body" data-dcnode-id="2751"><span data-dcnode-id="2758" instrument_node="">
</span><p data-dcnode-id="2753"><span data-dcnode-id="2757" instrument_node="">Modern industry … sweeps away by technical means the manufacturing division of labour, under which each man is bound hand and foot for life to a single detail-operation. At the same time, the capitalistic form of that industry reproduces this same division of labour in a still more monstrous shape; in the factory proper, by converting the workman into a living appendage of the machine; and everywhere outside the Factory, partly by the sporadic use of machinery and machine workers, partly by re-establishing the division of labour on a fresh basis by the general introduction of the labour of women and children, and of cheap and unskilled labour. (</span><a aria-label="Reference 1954" data-dcnode-id="2755" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d224658289e660" title="Marx, K. (1954) [1867]. Capital, vol. I. London: Lawrence and Wishart."><span data-dcnode-id="2756" instrument_node="">1954</span></a><span data-dcnode-id="2754" instrument_node=""> [1867], pp. 454-455)</span></p><span data-dcnode-id="2752" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2739"><span data-dcnode-id="2749" instrument_node="">This </span><i data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">deskilling</span></i><span data-dcnode-id="2746" instrument_node=""> bias is clearly considered by Marx as the major characteristic feature of modern industry in the early and mid-nineteenth century.</span><sup data-dcnode-id="2741"><a data-dcnode-id="2742" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">Footnote </span></span><span data-dcnode-id="2743" instrument_node="">7</span></a></sup><span data-dcnode-id="2740" instrument_node=""> But it is little noticed that Marx also suggested that this was already beginning to change, because the “technical basis” of modern industry is inherently “revolutionary” rather than conservative:</span></p><blockquote class="c-blockquote" data-dcnode-id="2730"><div class="c-blockquote__body" data-dcnode-id="2731"><span data-dcnode-id="2738" instrument_node="">
</span><p data-dcnode-id="2733"><span data-dcnode-id="2737" instrument_node="">Modern industry … is continually causing changes not only in the technical basis of production but also in the functions of the labourer … .Modern industry, by its very nature, … necessitates variation of labour, fluency of function, universal mobility of the labourer … . Modern industry imposes the necessity of recognizing, as a fundamental law of production, variation of work, consequently fitness of the labourer for varied work, consequently the greatest possible development of his varied aptitudes. (</span><a aria-label="Reference 1954" data-dcnode-id="2735" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d224658289e678" title="Marx, K. (1954) [1867]. Capital, vol. I. London: Lawrence and Wishart."><span data-dcnode-id="2736" instrument_node="">1954</span></a><span data-dcnode-id="2734" instrument_node=""> [1867], pp. 457-458)</span></p><span data-dcnode-id="2732" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">For Marx, then, modern industry necessitated, and therefore would soon also enforce, the development of a better educated, less specialized, and more flexibly deployable workforce:</span></p><blockquote class="c-blockquote" data-dcnode-id="2719"><div class="c-blockquote__body" data-dcnode-id="2720"><span data-dcnode-id="2727" instrument_node="">
</span><p data-dcnode-id="2722"><span data-dcnode-id="2726" instrument_node="">Modern industry, indeed, compels society, under penalty of death, to replace the detail-worker of to-day, crippled by life-long repetition of one and the same trivial operation, and thus reduced to the mere fragment of a man, by the fully developed individual, fit for a variety of labours, ready to face any change of production, and to whom the different social functions he performs, are but so many modes of giving free scope to his own natural and acquired powers. (</span><a aria-label="Reference 1954" data-dcnode-id="2724" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d224658289e687" title="Marx, K. (1954) [1867]. Capital, vol. I. London: Lawrence and Wishart."><span data-dcnode-id="2725" instrument_node="">1954</span></a><span data-dcnode-id="2723" instrument_node=""> [1867], p. 45)</span></p><span data-dcnode-id="2721" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">First signs of this change were already visible, Marx argued, in the early 1860s in terms of the establishment of technical and agricultural schools, which were introduced in order to prepare the workforce for more varied and more complicated tasks to be performed (ibid.).</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2715" id="Sec4"><span data-dcnode-id="2716" instrument_node="">A more optimistic view</span></h4><p data-dcnode-id="2674"><span data-dcnode-id="2714" instrument_node="">Marx was very pessimistic about the deskilling bias of technical change, at least with regard to the phase of the manufacturing division of labour and the early phase of modern industry. Marx may be right that innovations induced by strikes and other class conflicts are predominantly deskilling, but this is not necessarily the case for the overall nineteenth-century technological change. The English polymath Charles Babbage was one of the economists who questioned the belief that technical change is predominantly deskilling. “</span><i data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">Frequently the new labour [demanded by new machines] requires [ …</span></i><span data-dcnode-id="2711" instrument_node="">] </span><i data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">a higher degree of skill than the old [technique].</span></i><span data-dcnode-id="2708" instrument_node="">’ (Babbage </span><a aria-label="Reference 1835" data-dcnode-id="2706" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d224658289e708" title="Babbage, C. (1835). On the economy of machinery and manufactures (4th ed.). London: Reprinted by Charles Knight."><span data-dcnode-id="2707" instrument_node="">1835</span></a><span data-dcnode-id="2705" instrument_node="">, p. 335) His main argument is—following Smith—that just looking at the person running the machine is misleading, because this ignores </span><i data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">“the skill called into action in building the new factories, in constructing the new machinery”</span></i><span data-dcnode-id="2702" instrument_node=""> (ibid., p. 340). Hence, it may be true that the deskilling effect of introducing new machinery was for the production by itself on average stronger than the skilling one (cf. O'Rourke et al. </span><a aria-label="Reference 2013" data-dcnode-id="2700" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d224658289e714" title="O'Rourke, K. H., Rahman, A. S., &amp; Taylor, A. M. (2013). Luddites, the industrial revolution, and the demographic transition. Journal of Economic Growth, 18(4), 373–409."><span data-dcnode-id="2701" instrument_node="">2013</span></a><span data-dcnode-id="2699" instrument_node="">, p. 1)—even that may be questioned: “</span><i data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">In the operation of the new machines too there were some which […] required more rather than less skilled labour per unit of output”</span></i><span data-dcnode-id="2696" instrument_node=""> (Habakkuk </span><a aria-label="Reference 1962" data-dcnode-id="2694" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d224658289e721" title="Habakkuk, J. H. (1962). American and British technology in the nineteenth century, the search for labor-saving invention. Cambridge: Cambridge University Press."><span data-dcnode-id="2695" instrument_node="">1962</span></a><span data-dcnode-id="2693" instrument_node="">, p. 154). But it should be clear that “</span><i data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">changes in the British economy went far deeper than just the transformation of industrial artisans into low-skill factory workers”</span></i><span data-dcnode-id="2690" instrument_node=""> (Mokyr </span><a aria-label="Reference 2009" data-dcnode-id="2688" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d224658289e727" title="Mokyr, J. (2009). The enlightened economy, an economic history of Britain 1700–1850. New Haven/London: Yale University Press."><span data-dcnode-id="2689" instrument_node="">2009</span></a><span data-dcnode-id="2687" instrument_node="">, p. 348). The point is that machinery may have often downgraded handicraft workers to machinists repeating all day long a few manual tasks, but has at the same time created a demand for highly skilled engineers planning the production process, constructing new machinery, maintaining the machinery etc.; “</span><i data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">new factories needed managers, engineers, machinists, accountants, foremen, mechanics […]”</span></i><span data-dcnode-id="2684" instrument_node=""> (ibid.). Looking back on more than one-hundred years of mechanisation and automatization steadily more sectors became mechanized and therefore artisans are nowadays required more for cultural-artistic than for technical reasons. Concurrently the machinery became steadily more complex, resulting in more skill requirements: “</span><i data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Improved machines, however, almost invariably required more skill to make them than did the simpler machines”</span></i><span data-dcnode-id="2681" instrument_node=""> (Habakkuk </span><a aria-label="Reference 1962" data-dcnode-id="2679" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d224658289e737" title="Habakkuk, J. H. (1962). American and British technology in the nineteenth century, the search for labor-saving invention. Cambridge: Cambridge University Press."><span data-dcnode-id="2680" instrument_node="">1962</span></a><span data-dcnode-id="2678" instrument_node="">, p. 154). In addition, also the complexity of production organization, and controlling increased continuously. Whether on average the deskilling or the skilling effect of technical change in the nineteenth century was stronger is a very difficult empirical question, but one thing should be clear: The conclusion that technical change was entirely deskilling in the nineteenth century cannot be sustained: “</span><i data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">In many cases, the capital-intensive technique required, for its construction plus operation, more skilled labour per unit of output than the labour-intensive technique</span></i><span data-dcnode-id="2675" instrument_node="">” (ibid., p. 21).</span></p></div></div></section><section data-dcnode-id="2496" data-title="Empirical evidence for skill-biased and deskilling technical change"><div class="c-article-section" data-dcnode-id="2497" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2669" id="Sec5"><span data-dcnode-id="2670" instrument_node="">Empirical evidence for skill-biased and deskilling technical change</span></h2><div class="c-article-section__content" data-dcnode-id="2498" id="Sec5-content"><p data-dcnode-id="2661"><span data-dcnode-id="2668" instrument_node="">In the last two decades there has been a growing empirical interest in the eighteenth- and nineteenth-century technical change bias. Among economic historians, it is common to speak of two industrialization phases between 1750 and 1900: the first occurred from ca. 1790 to 1830 and the second one from ca. 1850 to 1900 (Allen </span><a aria-label="Reference 2009" data-dcnode-id="2666" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d224658289e754" title="Allen, R. C. (2009). The British industrial revolution in global perspective. Cambridge: Cambridge University Press."><span data-dcnode-id="2667" instrument_node="">2009</span></a><span data-dcnode-id="2665" instrument_node="">). In the new growth theory literature there is a widespread presumption that the first industrialization was predominantly deskilling or skill-reducing, whereas the second one was skill-biased or skill-enhancing (for more details, see Brugger </span><a aria-label="Reference 2013" data-dcnode-id="2663" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d224658289e757" title="Brugger, F. (2013). Die Richtung und die Induktion des technischen Fortschritts. Eine volkswirtschaftliche und soziologische Perspektive. Akademikerverlag: Saarbrücken."><span data-dcnode-id="2664" instrument_node="">2013</span></a><span data-dcnode-id="2662" instrument_node="">).</span></p><p data-dcnode-id="2647"><span data-dcnode-id="2660" instrument_node="">Investigating empirically the eighteenth- and nineteenth-century bias of technological change comes with two main problems that are closely interrelated: 1) What are “skills”? 2) How should one measure “technical change bias”? Following Smith, in our understanding, professional skills are acquired from formal education like schooling, formal apprenticeships, or professional trainings </span><i data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">as well as</span></i><span data-dcnode-id="2657" instrument_node=""> from learning-by-doing, work experience, and informal apprenticeships. Because skills and skill intensity can be measured only indirectly (Atack et al. </span><a aria-label="Reference 2004" data-dcnode-id="2655" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d224658289e766" title="Atack, J., Bateman, F., &amp; Margo, R. A. (2004). Skill intensity and rising wage dispersion in nineteenth-century American manufacturing. The Journal of Economic History, 64(1), 172–192."><span data-dcnode-id="2656" instrument_node="">2004</span></a><span data-dcnode-id="2654" instrument_node="">), empirical studies have to rely on </span><i data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">indirect indicators</span></i><span data-dcnode-id="2651" instrument_node=""> or </span><i data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">approximations</span></i><span data-dcnode-id="2648" instrument_node="">, such as literacy rates, average years of schooling, numbers of patents, apprentices, or guild members, or the size of the female workforce and of child work, in order to obtain estimates of the technical change bias. Unfortunately, however, empirical results differ widely depending on which approximation or indirect indicator is used.</span></p><p data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">Accordingly, the question of how to measure the skill bias of technical change is a serious and still unresolved (and perhaps unresolvable) problem in empirical studies. What would constitute a good measure? Obviously, one would be looking for an “indicator” that is capable of registering changes in the demand for skills that emanate from the introduction of new technologies without being affected by other changes. However, no such measure seems to exist. Moreover, by posing the above question, one is lead immediately to ask various sub-questions: Should we be interested in the aggregate demand for skill (which is to some extent a result of compositional shifts in employment)? Or is it of more interest to follow only the transformation of skill requirements in particular industries as the technologies change (such as, for instance, the textile industry)? Or should we look at multiple levels of aggregation (in which case the further question emerges of how to combine findings from different levels of aggregation in a meaningful way)? We cannot pretend to have answers to these questions. However, in our view, it is clear that the introduction of a new technology in a particular industry must inevitably affect also the skill requirements of workers in some other industries, because the economic system consists of a set of interrelated industries mutually supplying each other with inputs. Measuring skill changes in aggregative terms therefore seems preferable and more informative than focusing on industry case studies alone. In the following, we report briefly on the results of various studies, organized along the “indicators” that have been used.</span></p><p data-dcnode-id="2626"><i data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Literacy rates</span></i><span data-dcnode-id="2642" instrument_node=""> are very frequently employed as an approximation for the bias of technological change. Looking at literacy rates, industrialization as a whole appears to be a success story: In England, illiteracy rates decreased from over 90% in 1500 to less than 10% in 1900 (Cressy </span><a aria-label="Reference 1980" data-dcnode-id="2640" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d224658289e783" title="Cressy, D. (1980). Literacy and the social order. reading and writing in Tudor and Stuart England. Cambridge: Cambridge University Press."><span data-dcnode-id="2641" instrument_node="">1980</span></a><span data-dcnode-id="2639" instrument_node="">, p. 177). At the beginning of the eighteenth century, industrial workers with a literacy rate of around 50–60% were amongst the best educated workforce compared with, for example, construction workers, butchers, or miners, whose literacy rates were much lower (ibid., p. 131–132). Country comparisons also show that more industrialized countries like England and the United States tended to have higher literacy rates in the mid-nineteenth century than less industrialized and more agrarian ones, like Austria or Spain (Vincent </span><a aria-label="Reference 2000" data-dcnode-id="2637" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d224658289e786" title="Vincent, D. (2000). The rise of mass literacy. Reading and writing in modern Europe. Cambridge: Polity Press."><span data-dcnode-id="2638" instrument_node="">2000</span></a><span data-dcnode-id="2636" instrument_node="">). Adam Smith’s view that technical change was predominantly deskilling during his lifetime is contradicted by the empirical evidence: literacy rates increased strongly between 1710 and 1790 (Cressy </span><a aria-label="Reference 1980" data-dcnode-id="2634" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d224658289e789" title="Cressy, D. (1980). Literacy and the social order. reading and writing in Tudor and Stuart England. Cambridge: Cambridge University Press."><span data-dcnode-id="2635" instrument_node="">1980</span></a><span data-dcnode-id="2633" instrument_node="">, p. 177). On the other hand, however, the data on literacy rates also support the hypothesis of a deskilling bias of the first industrialization phase because, in contrast to the strong increase in literacy rates in the long run, the overall rates show no clear trend for the period between 1790 and 1830, at least for English males. It must be noted, though, that literacy rates are a questionable indicator for the bias of technical change, because they undeniably depend on many social factors that are not directly related to the bias of technical change, such as political institutions, moral and cultural ideas, religion, or public funding for education. Furthermore, literacy increased in tandem for both skilled and unskilled workers (Nicholas and Nicholas </span><a aria-label="Reference 1992" data-dcnode-id="2631" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d224658289e792" title="Nicholas, S. J., &amp; Nicholas, J. (1992). Male literacy, “deskilling”, and the industrial revolution. The Journal of Interdisciplinary History, 23(1), 1–18."><span data-dcnode-id="2632" instrument_node="">1992</span></a><span data-dcnode-id="2630" instrument_node="">)—although the literacy rate of the former group has of course been consistently higher than that of the latter. Finally, literacy rates were on the rise long before the industrial revolution took off (Mokyr and Voth </span><a aria-label="Reference 2010" data-dcnode-id="2628" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d224658289e795" title="Mokyr, J., &amp; Voth, H.-J. (2010). Understanding growth in Europe. 1700–1870: Theory and evidence. In S. Broadberry &amp; K. H. O’Rourke (Eds.), The Cambridge economic history of modern Europe volume 1.1700–1870 (pp. 7–42). Cambridge: Cambridge University Press."><span data-dcnode-id="2629" instrument_node="">2010</span></a><span data-dcnode-id="2627" instrument_node="">, p. 30).</span></p><span data-dcnode-id="2625" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="2623" id="FPar3"><span data-dcnode-id="2624" instrument_node="">Export restrictions</span></h3><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">An unusual but interesting indicator of the skill-bias of technical change in the late eighteenth century can be seen in the establishment and subsequent repeal of the “Tudor laws”:</span></p><span data-dcnode-id="2619" instrument_node="">
</span><blockquote class="c-blockquote" data-dcnode-id="2610"><div class="c-blockquote__body" data-dcnode-id="2611"><span data-dcnode-id="2618" instrument_node="">
</span><p data-dcnode-id="2613"><span data-dcnode-id="2617" instrument_node="">Throughout most of the mercantilist period, skills and technology were largely embodied in human beings, not in machines. Therefore, in 1718, 1750 and 1765 Parliament developed restrictive laws centered on skilled craftsmen [i.e., the Tudor laws]. Moving on in time to the period of early Classical economic thought and the beginning of the Industrial Revolution, machines began being produced as commodities and the technology embodied in them became an additional focus of legislation. As a result of this new focus, in 1774 and 1781 the Tudor laws were expanded to include severe restrictions on the export of machines. (Elmslie </span><a aria-label="Reference 1993" data-dcnode-id="2615" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d224658289e813" title="Elmslie, B. (1993). Free trade in a world of internationally mobile technology: The orthodoxy then and now. Eastern Economic Journal, 19(1), 91–97."><span data-dcnode-id="2616" instrument_node="">1993</span></a><span data-dcnode-id="2614" instrument_node="">, pp. 91-92)</span></p><span data-dcnode-id="2612" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">Interestingly, in the first quarter of the nineteenth century, the restrictions on the emigration of skilled artisans were no longer considered necessary:</span></p><blockquote class="c-blockquote" data-dcnode-id="2599"><div class="c-blockquote__body" data-dcnode-id="2600"><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2606" instrument_node="">In 1825, the House of Commons appointed a Select Committee on Artisans and Machinery to look at the possibility of amending or repealing Britain’s laws restricting the exportation of certain types of machines as well as those prohibiting the emigration of skilled artisans. The Committee reported to the House that while the laws restricting “the combinations of workmen and the emigration of artisans” should be repealed, the effects of the laws on the exportation of machinery required “further inquiry.” (Ellis 1825, p. 386; quoted from Elmslie </span><a aria-label="Reference 1993" data-dcnode-id="2604" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d224658289e822" title="Elmslie, B. (1993). Free trade in a world of internationally mobile technology: The orthodoxy then and now. Eastern Economic Journal, 19(1), 91–97."><span data-dcnode-id="2605" instrument_node="">1993</span></a><span data-dcnode-id="2603" instrument_node="">, p. 92)</span></p><span data-dcnode-id="2601" instrument_node="">
