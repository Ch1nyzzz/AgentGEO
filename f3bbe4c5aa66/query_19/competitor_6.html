></div></aside><div class="col-sm-12 col-md-9 col-lg-9" data-dcnode-id="1648" id="main" role="main"><div class="blog-post" data-dcnode-id="1838"><h1 class="post-title" data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">What is the role of a school social worker?</span></h1></div><p data-dcnode-id="1835"><img alt="A school social worker in her role gesturing to a student to assist him with his issue" class="alignright wp-image-32740" data-dcnode-id="1837" height="319" sizes="(max-width: 320px) 100vw, 320px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.une.edu/wp-content/uploads/2019/05/School-social-worker-role-1024x1022.jpg&amp;raw" srcset="https://online.une.edu/wp-content/uploads/2019/05/School-social-worker-role-1024x1022.jpg 1024w, https://online.une.edu/wp-content/uploads/2019/05/School-social-worker-role-150x150.jpg 150w, https://online.une.edu/wp-content/uploads/2019/05/School-social-worker-role-300x300.jpg 300w, https://online.une.edu/wp-content/uploads/2019/05/School-social-worker-role-768x767.jpg 768w, https://online.une.edu/wp-content/uploads/2019/05/School-social-worker-role-60x60.jpg 60w, https://online.une.edu/wp-content/uploads/2019/05/School-social-worker-role.jpg 1200w" width="320"><span data-dcnode-id="1836" instrument_node="">Have you ever been asked, or ever wondered, what it is that a school social worker does? The question is understandable; it’s an incredibly diverse position. The role of a school social worker involves communicating and collaborating with students, parents, teachers, administrators, government officials, and anyone else who can help them encourage students’ success.</span></p><p data-dcnode-id="1825"><span data-dcnode-id="1834" instrument_node="">With the </span><strong data-dcnode-id="1831"><a data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/childrensmentalhealth/data.html"><span data-dcnode-id="1833" instrument_node="">increasing rates of depression, anxiety, and suicide rates in children</span></a></strong><span data-dcnode-id="1830" instrument_node="">, school social workers are also at the forefront of a movement to understand and address the stresses in students’ lives from a young age. Due in part to this need and other rising issues, the </span><strong data-dcnode-id="1827"><a data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bls.gov/ooh/community-and-social-service/social-workers.htm"><span data-dcnode-id="1829" instrument_node="">Bureau of Labor Statistics projects that the social work field will grow by 14 percent by 2026</span></a></strong><span data-dcnode-id="1826" instrument_node="">. School social workers and their many responsibilities are poised to make a major impact on the next generation of students.</span></p><p data-dcnode-id="1822" style="text-align: center;"><a class="ctabutton" data-dcnode-id="1823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.une.edu/social-work%3Fsrc%3DBlog%26detail%3DSchoolSocialWorkerRoles" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1824" instrument_node="">DOWNLOAD OUR ONLINE MSW PROGRAM GUIDE</span></a></p><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Here’s a quick guide to the role of a school social worker:</span></p><h2 data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">1. Truancy Officer</span></h2><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Everything starts with attendance. If a student consistently doesn’t show up to school, the school social worker may need to visit their home to find out what’s going on or otherwise work with the student to motivate them to go to class.</span></p><h2 data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">2. Counselor &amp; Case Manager</span></h2><p data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Each student has their own story, challenges, and resource needs. School social workers must simultaneously coordinate each case while acting as a listening ear and a shoulder to lean on. Developing relationships with each individual student is paramount to school social worker duties. It would be difficult to connect a student with the right resources if you don’t understand why they’re having trouble! Childhood psychology, crisis intervention, and conflict resolution are among that skills school social workers can use to help each student feel secure and ready to learn.</span></p><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">School social workers may also need to oversee a school’s compliance with laws relating to neglect, abuse, sexual harassment, disability, and so on.</span></p><h2 data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">3. Mediator &amp; Advocate</span></h2><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">School social workers look at both the external and internal factors that may be affecting a student’s ability to learn. If there is a teacher or peer that is affecting the student, the school social worker can step in to bring both sides of the issue to light and negotiate a path forward. If a student’s home life is detrimental in some way, school social workers coach the student to learn and effectively use coping skills. If a student’s issue is with mental, emotional, behavioral, or physical challenges, the school social worker can work with key people in the child’s life to develop their education plan and connect them with appropriate community resources.</span></p><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">In any of these cases, the school social worker acts as a strong supporting force on behalf of the student. They are also tasked with keeping teachers, administrators, and professional staff apprised of the student’s challenges and progress.</span></p><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">School social workers could even be called upon or take it upon themselves to enact wider change by advocating for public policy that affects students.</span></p><p align="center" data-dcnode-id="1797"><strong data-dcnode-id="1798"><span data-dcnode-id="1801" instrument_node="">Read More:&nbsp;</span><a data-dcnode-id="1799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.une.edu/blog/online-public-policy-course-interprofessional/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1800" instrument_node="">Learn about our online course GPH 702 – Policy: An Interprofessional Approach</span></a></strong></p><h2 data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">4. Distributor of Resources</span></h2><p data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">School social workers act as a central hub of information and connections. Once they work with students and parents to understand their needs, they then reach out to a variety of agencies—often public, governmental, and/or non-profit—to acquire resources to fulfill those needs. This may include coordinating transportation, donations, physical or mental health appointments, free or discounted meals, holiday events, trainings, homeschooling, service pet adoptions, or anything else that could help a student remove barriers in their path to academic and personal success.</span></p><h2 data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">5. Teacher of Adults</span></h2><p data-dcnode-id="1785"><span data-dcnode-id="1790" instrument_node="">Part of a school social worker’s advocacy work is to teach teachers and administrators how to understand and facilitate the difficulties students may be having. To do this, school social workers may plan and run programs to raise awareness of at-risk populations, identify signs of child abuse or neglect, teach behavioral management strategies, help students with learning or developmental challenges, and take social and cultural factors into account. These programs might be at the individual teacher, school, or district level and use </span><strong data-dcnode-id="1787"><a data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.une.edu/blog/four-steps-create-engaging-presentations-materials-adult-audiences/"><span data-dcnode-id="1789" instrument_node="">adult learning theory skills</span></a></strong><span data-dcnode-id="1786" instrument_node=""> to be as effective as possible.</span></p><h3 data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Are you ready to take on the role of a school social worker?</span></h3><p data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">A school social worker is an incredible ally for students, and each child that successfully makes it to graduation and beyond is the best possible reward.</span></p><p data-dcnode-id="1775"><span data-dcnode-id="1780" instrument_node="">Do these roles and responsibilities sound like a perfect match for you? If so, you should first be aware that many states require school social workers to hold a master’s degree or higher from a Council on Social Work Education (CSWE) accredited school. (</span><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.une.edu/sites/default/files/List%2520for%2520State%2520Licensing%2520Board%2520info.pdf"><strong data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Check your state’s regulations here</span></strong></a><span data-dcnode-id="1776" instrument_node="">!)</span></p><p data-dcnode-id="1769"><span data-dcnode-id="1774" instrument_node="">At UNE Online, our 100% online, asynchronous, CSWE-accredited master’s program offers courses such as </span><strong data-dcnode-id="1771"><a data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.une.edu/blog/spotlight-online-social-work-course-electives/"><span data-dcnode-id="1773" instrument_node="">Contemporary Controversies and Narrative Therapy</span></a></strong><span data-dcnode-id="1770" instrument_node=""> can help you become or evolve as a school social worker.</span></p><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">If you would like more information, we welcome you to:</span></p><p data-dcnode-id="1764" style="text-align: center;"><a class="ctabutton" data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.une.edu/social-work%3Fsrc%3DBlog%26detail%3DSchoolSocialWorkerRoles" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1766" instrument_node="">DOWNLOAD THE ONLINE MSW PROGRAM GUIDE</span></a></p><div class="postmeta" data-dcnode-id="1751"><span data-dcnode-id="1763" instrument_node=""> By </span><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.une.edu/blog/author/awillardune-edu/" rel="author" title="Posts by Allison Willard"><span data-dcnode-id="1762" instrument_node="">Allison Willard</span></a><span data-dcnode-id="1760" instrument_node=""> on June 10th, 2019  in </span><a data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.une.edu/blog/category/blog/" rel="category tag"><span data-dcnode-id="1759" instrument_node="">Blog</span></a><span data-dcnode-id="1757" instrument_node="">, </span><a data-dcnode-id="1755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.une.edu/blog/category/blog/online-learning/" rel="category tag"><span data-dcnode-id="1756" instrument_node="">Online Graduate School</span></a><span data-dcnode-id="1754" instrument_node="">, </span><a data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index= </span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="85" tabindex="0"><span data-dcnode-id="265" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="264"></div><span data-dcnode-id="263" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="87" role="dialog"><span data-dcnode-id="262" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="258" role="button" tabindex="0"><span data-dcnode-id="261" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="260"></i><span data-dcnode-id="259" instrument_node=""> </span></span><span data-dcnode-id="257" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="89"><span data-dcnode-id="256" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="91"><strong class="acsb-title-main" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Compliance status</span></strong><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="236" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="230" instrument_node="">
</span><ol data-dcnode-id="204"><span data-dcnode-id="229" instrument_node="">
</span><li data-dcnode-id="217"><strong class="acsb-title" data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="226" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="225"><br data-dcnode-id="224"><span data-dcnode-id="223" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="222"><br data-dcnode-id="221"><span data-dcnode-id="220" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="219"><br data-dcnode-id="218"></li><span data-dcnode-id="216" instrument_node="">
</span><li data-dcnode-id="206"><strong class="acsb-title" data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="213" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="212"><br data-dcnode-id="211"><span data-dcnode-id="210" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="209"><br data-dcnode-id="208"><span data-dcnode-id="207" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="205" instrument_node="">
</span></ol><span data-dcnode-id="203" instrument_node="">
</span><strong data-dcnode-id="200" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="201" lang="EN-US"><span data-dcnode-id="202" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="199" instrument_node="">
</span><ul data-dcnode-id="167"><span data-dcnode-id="198" instrument_node="">
</span><li data-dcnode-id="194"><strong class="acsb-title" data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="195" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="193" instrument_node="">
</span><li data-dcnode-id="189"><strong class="acsb-title" data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="190" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="188" instrument_node="">
</span><li data-dcnode-id="184"><strong class="acsb-title" data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="185" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="183" instrument_node="">
</span><li data-dcnode-id="179"><strong class="acsb-title" data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="180" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="178" instrument_node="">
</span><li data-dcnode-id="174"><strong class="acsb-title" data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="175" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="173" instrument_node="">
</span><li data-dcnode-id="169"><strong class="acsb-title" data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="170" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="168" instrument_node="">
</span></ul><span data-dcnode-id="166" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="163"><span data-dcnode-id="164" lang="EN-US"><span data-dcnode-id="165" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="162" instrument_node="">
</span><ol data-dcnode-id="104"><span data-dcnode-id="161" instrument_node="">
</span><li data-dcnode-id="154"><strong class="acsb-title" data-dcnode-id="157"><span data-dcnode-id="159" lang="EN-US"><span data-dcnode-id="160" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="158" instrument_node="">–</span></strong><span data-dcnode-id="155" lang="EN-US"><span data-dcnode-id="156" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="153" instrument_node="">
</span><li data-dcnode-id="146"><span data-dcnode-id="149" lang="EN-US"><strong class="acsb-title" data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="150" instrument_node="">&nbsp;</span></span><span data-dcnode-id="147" lang="EN-US"><span data-dcnode-id="148" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="145" instrument_node="">
</span><li data-dcnode-id="139"><span data-dcnode-id="141" lang="EN-US"><strong class="acsb-title" data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">Animations –</span></strong><span data-dcnode-id="142" instrument_node="">&nbsp;</span></span><span data-dcnode-id="140" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="138" instrument_node="">
</span><li data-dcnode-id="131"><span data-dcnode-id="134" lang="EN-US"><strong class="acsb-title" data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="135" instrument_node="">&nbsp;</span></span><span data-dcnode-id="132" lang="EN-US"><span data-dcnode-id="133" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="130" instrument_node="">
</span><li data-dcnode-id="123"><span data-dcnode-id="126" lang="EN-US"><strong class="acsb-title" data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="127" instrument_node="">&nbsp;</span></span><span data-dcnode-id="124" lang="EN-US"><span data-dcnode-id="125" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="122" instrument_node="">
</span><li data-dcnode-id="115"><span data-dcnode-id="118" lang="EN-US"><strong class="acsb-title" data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="119" instrument_node="">&nbsp;</span></span><span data-dcnode-id="116" lang="EN-US"><span data-dcnode-id="117" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="114" instrument_node="">
</span><li data-dcnode-id="106"><strong class="acsb-title" data-dcnode-id="111"><span data-dcnode-id="112" lang="EN-US"><span data-dcnode-id="113" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="107" lang="EN-US"><strong class="acsb-title" data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">–</span></strong><span data-dcnode-id="108" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="105" instrument_node="">
</span></ol><span data-dcnode-id="103" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="101"><span data-dcnode-id="102" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="100" instrument_node="">
</span><p data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="97" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="95"><span data-dcnode-id="96" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="94" instrument_node="">
</span><p data-dcnode-id="92"><span data-dcnode-id="93" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="90" instrument_node=""> </span></div><span data-dcnode-id="88" instrument_node=""> </span></div><span data-dcnode-id="86" instrument_node="">
