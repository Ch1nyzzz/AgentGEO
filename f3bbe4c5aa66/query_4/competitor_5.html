></td><td class="align-char" data-dcnode-id="4699"><span data-dcnode-id="4700" instrument_node="">0.04</span></td><td class="align-char" data-dcnode-id="4697"><span data-dcnode-id="4698" instrument_node="">0.09*</span></td><td class="align-char" data-dcnode-id="4695"><span data-dcnode-id="4696" instrument_node="">0.79</span></td><td data-dcnode-id="4694"></td><td data-dcnode-id="4693"></td></tr><tr data-dcnode-id="4670"><td class="align-left" data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">Self-rated performance</span></td><td class="align-char" data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">7.89</span></td><td class="align-char" data-dcnode-id="4686"><span data-dcnode-id="4687" instrument_node="">0.74</span></td><td class="align-char" data-dcnode-id="4684"><span data-dcnode-id="4685" instrument_node="">−0.03</span></td><td class="align-char" data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">−0.32***</span></td><td class="align-char" data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">−0.15***</span></td><td class="align-char" data-dcnode-id="4678"><span data-dcnode-id="4679" instrument_node="">0.24***</span></td><td class="align-char" data-dcnode-id="4676"><span data-dcnode-id="4677" instrument_node="">0.45***</span></td><td class="align-char" data-dcnode-id="4674"><span data-dcnode-id="4675" instrument_node="">0.04</span></td><td class="align-char" data-dcnode-id="4672"><span data-dcnode-id="4673" instrument_node="">0.80</span></td><td data-dcnode-id="4671"></td></tr><tr data-dcnode-id="4647"><td class="align-left" data-dcnode-id="4668"><span data-dcnode-id="4669" instrument_node="">Supervisor-rated performance</span></td><td class="align-char" data-dcnode-id="4666"><span data-dcnode-id="4667" instrument_node="">3.33</span></td><td class="align-char" data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">0.70</span></td><td class="align-char" data-dcnode-id="4662"><span data-dcnode-id="4663" instrument_node="">−0.09</span></td><td class="align-char" data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">−0.06</span></td><td class="align-char" data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">0.07</span></td><td class="align-char" data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">0.08</span></td><td class="align-char" data-dcnode-id="4654"><span data-dcnode-id="4655" instrument_node="">0.11*</span></td><td class="align-char" data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">−0.10</span></td><td class="align-char" data-dcnode-id="4650"><span data-dcnode-id="4651" instrument_node="">0.07</span></td><td class="align-char" data-dcnode-id="4648"><span data-dcnode-id="4649" instrument_node="">–</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4621"></p><p data-dcnode-id="4622"><em data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">Note</span></em><span data-dcnode-id="4641" instrument_node="">: ***</span><em data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">p</span></em><span data-dcnode-id="4638" instrument_node="">&nbsp;</span><span data-dcnode-id="4637" instrument_node="">&lt;</span><span data-dcnode-id="4636" instrument_node="">&nbsp;</span><span data-dcnode-id="4635" instrument_node="">.01; **</span><em data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">p</span></em><span data-dcnode-id="4632" instrument_node="">&nbsp;</span><span data-dcnode-id="4631" instrument_node="">&lt;</span><span data-dcnode-id="4630" instrument_node="">&nbsp;</span><span data-dcnode-id="4629" instrument_node="">.05; *</span><em data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node="">p</span></em><span data-dcnode-id="4626" instrument_node="">&nbsp;</span><span data-dcnode-id="4625" instrument_node="">&lt;</span><span data-dcnode-id="4624" instrument_node="">&nbsp;</span><span data-dcnode-id="4623" instrument_node="">.10; numbers on the diagonal are coefficient alpha; supervisor-rated performance is a single-item indicant.</span></p><p></p></div></div><p data-dcnode-id="4604"><span data-dcnode-id="4618" instrument_node="">To test the hypotheses, we developed a series of regressions representing the expected relationships. Due to our focus upon interaction effects, we fit the models using three-stage least squares (3SLS). This does not permit the estimation of measurement error, but is less limiting than structural equations models with regard to cross-product terms while still allowing for simultaneous estimation of hierarchical regression models. There is no corollary of OLS </span><em data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">R</span></em><sup data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">2</span></sup><span data-dcnode-id="4613" instrument_node=""> in 3SLS. Rather, System Weighted </span><em data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">R</span></em><sup data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node="">2</span></sup><span data-dcnode-id="4608" instrument_node=""> is a measure of the average variance explained by the simultaneous equations divided by the total system variance, thus it measures the fit of the joint model. For interpretability we used mean-centered variables (</span><a class="workspace-trigger" data-dcnode-id="4606" href="#bib17" name="bbib17"><span data-dcnode-id="4607" instrument_node="">Echambadi and Hess 2007</span></a><span data-dcnode-id="4605" instrument_node="">).</span></p><p data-dcnode-id="4504"><span data-dcnode-id="4603" instrument_node="">Results are reported in </span><a class="workspace-trigger" data-dcnode-id="4601" href="#fig1" name="bfig1"><span data-dcnode-id="4602" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4600" instrument_node="">. The System Weighted </span><em data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">R</span></em><sup data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">2</span></sup><span data-dcnode-id="4595" instrument_node=""> for the simultaneous equations was .27. Our results are largely consistent with published literature with the exception of role conflict. Role conflict has only direct effects on job satisfaction (</span><em data-dcnode-id="4593"><span data-dcnode-id="4594" instrument_node="">β</span></em><span data-dcnode-id="4592" instrument_node="">&nbsp;</span><span data-dcnode-id="4590" instrument_node="">=</span><span data-dcnode-id="4588" instrument_node="">&nbsp;</span><span data-dcnode-id="4586" instrument_node="">−.25, </span><em data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">p</span></em><span data-dcnode-id="4583" instrument_node="">&nbsp;</span><span data-dcnode-id="4581" instrument_node="">&lt;</span><span data-dcnode-id="4579" instrument_node="">&nbsp;</span><span data-dcnode-id="4577" instrument_node="">.01), and thus is not mediated by job efficacy. Consistent with published literature, however, we find RA (</span><em data-dcnode-id="4575"><span data-dcnode-id="4576" instrument_node="">β</span></em><span data-dcnode-id="4574" instrument_node="">&nbsp;</span><span data-dcnode-id="4572" instrument_node="">=</span><span data-dcnode-id="4570" instrument_node="">&nbsp;</span><span data-dcnode-id="4568" instrument_node="">−.84, </span><em data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">p</span></em><span data-dcnode-id="4565" instrument_node="">&nbsp;</span><span data-dcnode-id="4563" instrument_node="">&lt;</span><span data-dcnode-id="4561" instrument_node="">&nbsp;</span><span data-dcnode-id="4559" instrument_node="">.01) and FWC (</span><em data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">β</span></em><span data-dcnode-id="4556" instrument_node="">&nbsp;</span><span data-dcnode-id="4554" instrument_node="">=</span><span data-dcnode-id="4552" instrument_node="">&nbsp;</span><span data-dcnode-id="4550" instrument_node="">−.15, </span><em data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">p</span></em><span data-dcnode-id="4547" instrument_node="">&nbsp;</span><span data-dcnode-id="4545" instrument_node="">&lt;</span><span data-dcnode-id="4543" instrument_node="">&nbsp;</span><span data-dcnode-id="4541" instrument_node="">.01) are negatively related to job efficacy. Further, job efficacy is positively and significantly related to job satisfaction (</span><em data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">β</span></em><span data-dcnode-id="4538" instrument_node="">&nbsp;</span><span data-dcnode-id="4536" instrument_node="">=</span><span data-dcnode-id="4534" instrument_node="">&nbsp;</span><span data-dcnode-id="4532" instrument_node="">.30, </span><em data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">p</span></em><span data-dcnode-id="4529" instrument_node="">&nbsp;</span><span data-dcnode-id="4527" instrument_node="">&lt;</span><span data-dcnode-id="4525" instrument_node="">&nbsp;</span><span data-dcnode-id="4523" instrument_node="">.01) and self-rated performance (</span><em data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">β</span></em><span data-dcnode-id="4520" instrument_node="">&nbsp;</span><span data-dcnode-id="4518" instrument_node="">=</span><span data-dcnode-id="4516" instrument_node="">&nbsp;</span><span data-dcnode-id="4514" instrument_node="">.55, </span><em data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">p</span></em><span data-dcnode-id="4511" instrument_node="">&nbsp;</span><span data-dcnode-id="4509" instrument_node="">&lt;</span><span data-dcnode-id="4507" instrument_node="">&nbsp;</span><span data-dcnode-id="4505" instrument_node="">.01).</span></p><p data-dcnode-id="4437"><span data-dcnode-id="4503" instrument_node="">Due to their central role in our model, we conducted additional analyses to examine the mediating roles of job efficacy and job satisfaction. First, we tested the role of job efficacy in mediating the relationships between the three stressors and job satisfaction. The simple effects above demonstrate that FWC is related to job efficacy which is in turn related to job satisfaction. We then tested to see if FWC had a direct effect on job satisfaction by fitting a competing system in which FWC was included in the regression model predicting job satisfaction. The results showed that the resulting parameter estimate was not significant (</span><em data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">β</span></em><span data-dcnode-id="4500" instrument_node="">&nbsp;</span><span data-dcnode-id="4498" instrument_node="">=</span><span data-dcnode-id="4496" instrument_node="">&nbsp;</span><span data-dcnode-id="4494" instrument_node="">−.05, </span><em data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">p</span></em><span data-dcnode-id="4491" instrument_node="">&nbsp;</span><span data-dcnode-id="4489" instrument_node="">=</span><span data-dcnode-id="4487" instrument_node="">&nbsp;</span><span data-dcnode-id="4485" instrument_node="">.54) and there was no change to System Weighted </span><em data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">R</span></em><sup data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">2</span></sup><span data-dcnode-id="4480" instrument_node="">. Thus, these data indicate that job efficacy completely mediates the effect of FWC on job satisfaction. Similar analysis was done to test mediation for the other two stressors. RA (</span><em data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">β</span></em><span data-dcnode-id="4477" instrument_node="">&nbsp;</span><span data-dcnode-id="4475" instrument_node="">=</span><span data-dcnode-id="4473" instrument_node="">&nbsp;</span><span data-dcnode-id="4471" instrument_node="">−.21, </span><em data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">p</span></em><span data-dcnode-id="4468" instrument_node="">&nbsp;</span><span data-dcnode-id="4466" instrument_node="">&lt;</span><span data-dcnode-id="4464" instrument_node="">&nbsp;</span><span data-dcnode-id="4462" instrument_node="">.01) has direct and indirect effects (through job efficacy: </span><em data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">β</span></em><span data-dcnode-id="4459" instrument_node="">&nbsp;</span><span data-dcnode-id="4457" instrument_node="">=</span><span data-dcnode-id="4455" instrument_node="">&nbsp;</span><span data-dcnode-id="4453" instrument_node="">−.84, </span><em data-dcnode-id="4451"><span data-dcnode-id="4452" instrument_node="">p</span></em><span data-dcnode-id="4450" instrument_node="">&nbsp;</span><span data-dcnode-id="4448" instrument_node="">&lt;</span><span data-dcnode-id="4446" instrument_node="">&nbsp;</span><span data-dcnode-id="4444" instrument_node="">.01)) on job satisfaction indicating that job efficacy is a partial mediator of the RA job-satisfaction relationship (</span><a class="workspace-trigger" data-dcnode-id="4442" href="#fig1" name="bfig1"><span data-dcnode-id="4443" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4441" instrument_node="">). Finally, as noted, RC has only direct effects on job satisfaction and is not mediated by job efficacy (</span><a class="workspace-trigger" data-dcnode-id="4439" href="#fig1" name="bfig1"><span data-dcnode-id="4440" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4438" instrument_node="">).</span></p><p data-dcnode-id="4373"><span data-dcnode-id="4436" instrument_node="">We conducted similar analyses to examine the mediating role of job efficacy with respect to self-rated performance. A model which allowed direct effects of RA and FWC on self-rated performance revealed that FWC was not significantly related to self-rated performance (</span><em data-dcnode-id="4434"><span data-dcnode-id="4435" instrument_node="">β</span></em><span data-dcnode-id="4433" instrument_node="">&nbsp;</span><span data-dcnode-id="4431" instrument_node="">=</span><span data-dcnode-id="4429" instrument_node="">&nbsp;</span><span data-dcnode-id="4427" instrument_node="">−.06, </span><em data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">p</span></em><span data-dcnode-id="4424" instrument_node="">&nbsp;</span><span data-dcnode-id="4422" instrument_node="">&lt;</span><span data-dcnode-id="4420" instrument_node="">&nbsp;</span><span data-dcnode-id="4418" instrument_node="">.35) while RA was significantly related to self-rated performance (</span><em data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">β</span></em><span data-dcnode-id="4415" instrument_node="">&nbsp;</span><span data-dcnode-id="4413" instrument_node="">=</span><span data-dcnode-id="4411" instrument_node="">&nbsp;</span><span data-dcnode-id="4409" instrument_node="">−.14, </span><em data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">p</span></em><span data-dcnode-id="4406" instrument_node="">&nbsp;</span><span data-dcnode-id="4404" instrument_node="">&lt;</span><span data-dcnode-id="4402" instrument_node="">&nbsp;</span><span data-dcnode-id="4400" instrument_node="">.03). However, System Weighted </span><em data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">R</span></em><sup data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">2</span></sup><span data-dcnode-id="4395" instrument_node=""> decreased (to .25) when these effects were included in the model. Even when the latter relationship was the only additional effect included in the model, it decreased System Weighted </span><em data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">R</span></em><sup data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">2</span></sup><span data-dcnode-id="4390" instrument_node=""> (to .26). Thus, even though the parameter estimate is significant, average model fit is degraded by including this path. Based on this, we concluded that the best model included job efficacy as a full mediator of both the FWC</span><span data-dcnode-id="4388" instrument_node="">&nbsp;</span><span data-dcnode-id="4386" instrument_node="">→</span><span data-dcnode-id="4384" instrument_node="">&nbsp;</span><span data-dcnode-id="4382" instrument_node="">self-rated performance relationship and the RA</span><span data-dcnode-id="4380" instrument_node="">&nbsp;</span><span data-dcnode-id="4378" instrument_node="">→</span><span data-dcnode-id="4376" instrument_node="">&nbsp;</span><span data-dcnode-id="4374" instrument_node="">self-rated performance relationship.</span></p><p data-dcnode-id="4295"><span data-dcnode-id="4372" instrument_node="">Finally, we examined the mediating effect of job satisfaction on the job efficacy</span><span data-dcnode-id="4370" instrument_node="">&nbsp;</span><span data-dcnode-id="4368" instrument_node="">→</span><span data-dcnode-id="4366" instrument_node="">&nbsp;</span><span data-dcnode-id="4364" instrument_node="">supervisor-rated performance relationship. We found that a direct effect of job efficacy on supervisor-rated performance was not significant (</span><em data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">β</span></em><span data-dcnode-id="4361" instrument_node="">&nbsp;</span><span data-dcnode-id="4359" instrument_node="">=</span><span data-dcnode-id="4357" instrument_node="">&nbsp;</span><span data-dcnode-id="4355" instrument_node="">.05, </span><em data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">p</span></em><span data-dcnode-id="4352" instrument_node="">&nbsp;</span><span data-dcnode-id="4350" instrument_node="">=</span><span data-dcnode-id="4348" instrument_node="">&nbsp;</span><span data-dcnode-id="4346" instrument_node="">.45) and produced no change to System Weighted </span><em data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">R</span></em><sup data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">2</span></sup><span data-dcnode-id="4341" instrument_node="">. We carried this analysis a step further by examining whether the job efficacy</span><span data-dcnode-id="4339" instrument_node="">&nbsp;</span><span data-dcnode-id="4337" instrument_node="">→</span><span data-dcnode-id="4335" instrument_node="">&nbsp;</span><span data-dcnode-id="4333" instrument_node="">supervisor-rated performance relationship was moderated by competitive climate. The data indicate that a competitive climate does not moderate the relationship (</span><em data-dcnode-id="4331"><span data-dcnode-id="4332" instrument_node="">β</span></em><span data-dcnode-id="4330" instrument_node="">&nbsp;</span><span data-dcnode-id="4328" instrument_node="">=</span><span data-dcnode-id="4326" instrument_node="">&nbsp;</span><span data-dcnode-id="4324" instrument_node="">−.02, </span><em data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">p</span></em><span data-dcnode-id="4321" instrument_node="">&nbsp;</span><span data-dcnode-id="4319" instrument_node="">=</span><span data-dcnode-id="4317" instrument_node="">&nbsp;</span><span data-dcnode-id="4315" instrument_node="">.76). Thus, we conclude that job satisfaction fully mediates the effect of job efficacy on supervisor-rated performance. It is important to note that the three stress constructs are not significantly related to supervisor-rated performance (</span><a class="workspace-trigger" data-dcnode-id="4313" href="#tbl1" name="btbl1"><span data-dcnode-id="4314" instrument_node="">Table 1</span></a><span data-dcnode-id="4312" instrument_node="">). Thus, job satisfaction is a full mediator of the RC</span><span data-dcnode-id="4310" instrument_node="">&nbsp;</span><span data-dcnode-id="4308" instrument_node="">→</span><span data-dcnode-id="4306" instrument_node="">&nbsp;</span><span data-dcnode-id="4304" instrument_node="">and RA</span><span data-dcnode-id="4302" instrument_node="">&nbsp;</span><span data-dcnode-id="4300" instrument_node="">→</span><span data-dcnode-id="4298" instrument_node="">&nbsp;</span><span data-dcnode-id="4296" instrument_node="">supervisor-rated performance relationships.</span></p><div data-dcnode-id="4225"><p data-dcnode-id="4261"><span data-dcnode-id="4294" instrument_node="">For the moderating effects, which is the focus of our study, the analysis revealed that a competitive climate lessens the adverse effect of RA on job self-efficacy perceptions (</span><em data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">β</span></em><span data-dcnode-id="4291" instrument_node="">&nbsp;</span><span data-dcnode-id="4289" instrument_node="">=</span><span data-dcnode-id="4287" instrument_node="">&nbsp;</span><span data-dcnode-id="4285" instrument_node="">.44, </span><em data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">p</span></em><span data-dcnode-id="4282" instrument_node="">&nbsp;</span><span data-dcnode-id="4280" instrument_node="">&lt;</span><span data-dcnode-id="4278" instrument_node="">&nbsp;</span><span data-dcnode-id="4276" instrument_node="">.01), but does not influence the effects of the other role stressors on either job satisfaction or efficacy. The simple slope analysis (</span><a class="workspace-trigger" data-dcnode-id="4274" href="#bib1" name="bbib1"><span data-dcnode-id="4275" instrument_node="">Aiken and West 1991</span></a><span data-dcnode-id="4273" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4271" href="#bib28" name="bbib28"><span data-dcnode-id="4272" instrument_node="">Irwin and McClelland, 2001</span></a><span data-dcnode-id="4270" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4268" href="#bib27" name="bbib27"><span data-dcnode-id="4269" instrument_node="">Irwin and McClelland, 2003</span></a><span data-dcnode-id="4267" instrument_node="">) in </span><a class="workspace-trigger" data-dcnode-id="4265" href="#fig2" name="bfig2"><span data-dcnode-id="4266" instrument_node="">Fig. 2</span></a><span data-dcnode-id="4264" instrument_node="">a</span><span data-dcnode-id="4262" instrument_node=""> diagrams this interaction. When RA is perceived as low, job efficacy is high under both high and low competitiveness. In contrast, when RA is high, employees who perceived the climate to be competitive had higher levels of job efficacy. These results support H1b and the sanction motivation perspective.</span></p><figure class="figure text-xs" data-dcnode-id="4226" id="fig2"><span data-dcnode-id="4251"><img alt="" data-dcnode-id="4260" height="634" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0022435909000141-gr2.jpg&amp;raw"><span data-dcnode-id="4259" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4252"><li data-dcnode-id="4253"><a class="anchor download-link u-font-sans" data-dcnode-id="4254" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0022435909000141-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4255"><span data-dcnode-id="4258" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4256"><span data-dcnode-id="4257" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4227"><span data-dcnode-id="4228"><p data-dcnode-id="4229"><span class="label" data-dcnode-id="4249"><span data-dcnode-id="4250" instrument_node="">Fig. 2</span></span><span data-dcnode-id="4248" instrument_node="">. </span><span data-dcnode-id="4246" instrument_node="">Simple slope graphs of interaction effects: (a) role ambiguity</span><span data-dcnode-id="4244" instrument_node="">&nbsp;</span><span data-dcnode-id="4242" instrument_node="">×</span><span data-dcnode-id="4240" instrument_node="">&nbsp;</span><span data-dcnode-id="4238" instrument_node="">competitive climate interaction and (b) job satisfaction</span><span data-dcnode-id="4236" instrument_node="">&nbsp;</span><span data-dcnode-id="4234" instrument_node="">×</span><span data-dcnode-id="4232" instrument_node="">&nbsp;</span><span data-dcnode-id="4230" instrument_node="">competitive climate interaction.</span></p></span></span></figure></div><p data-dcnode-id="4199"><span data-dcnode-id="4224" instrument_node="">The analysis also tested the moderating effect of competitive climate on the relationship between job satisfaction and supervisor evaluations, producing results that supported H2b. The results revealed that higher perceived levels of competitiveness enhance the positive effect of job satisfaction on supervisor-rated performance (</span><em data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">β</span></em><span data-dcnode-id="4221" instrument_node="">&nbsp;</span><span data-dcnode-id="4219" instrument_node="">=</span><span data-dcnode-id="4217" instrument_node="">&nbsp;</span><span data-dcnode-id="4215" instrument_node="">.77, </span><em data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">p</span></em><span data-dcnode-id="4212" instrument_node="">&nbsp;</span><span data-dcnode-id="4210" instrument_node="">&lt;</span><span data-dcnode-id="4208" instrument_node="">&nbsp;</span><span data-dcnode-id="4206" instrument_node="">.01). Thus, as seen in the simple slope analysis in </span><a class="workspace-trigger" data-dcnode-id="4204" href="#fig2" name="bfig2"><span data-dcnode-id="4205" instrument_node="">Fig. 2</span></a><span data-dcnode-id="4203" instrument_node="">b (</span><a class="workspace-trigger" data-dcnode-id="4201" href="#bib1" name="bbib1"><span data-dcnode-id="4202" instrument_node="">Aiken and West 1991</span></a><span data-dcnode-id="4200" instrument_node="">), when competitive climate is perceived to be low, there are no differences in supervisor evaluations across levels of job satisfaction. In contrast, when perceptions of competitive climate are high, supervisor evaluations are positively correlated with job satisfaction.</span></p></section><section data-dcnode-id="4094" id="aep-section-id21"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">Discussion and implications</span></h2><p data-dcnode-id="4194"><span data-dcnode-id="4195" instrument_node="">The present research investigates the moderating influence of perceived competitive climate upon the effects of three role stressors (RC, RA, and FWC) on perceptions of job efficacy, job satisfaction, self-performance ratings, and supervisor performance ratings among retail employees. The results partially supported the hypotheses. The first hypothesis proposed that employee perceptions of the organization's competitive climate would moderate the relationship between role stressors and job efficacy. The sanction fear perspective suggested that high levels of competitiveness would increase the negative relationship between the role stressors and job efficacy. In contrast, the sanction motivation perspective resulted in the opposite prediction. Consistent with our expectations, the results supported the sanction motivation perspective. When employees perceived the climate of the organization to be highly competitive, the negative relationship between RA and job efficacy was significantly reduced. This is an important managerial finding in that it suggests a potentially beneficial outcome upon employee psychological health associated with the creation of a competitive in-store climate.</span></p><p data-dcnode-id="4189"><span data-dcnode-id="4193" instrument_node="">The second hypothesis predicted that perceived competitive climate would moderate the relationship between job satisfaction and supervisor-rated performance. The results supported the hypothesis. When employees perceived the internal climate to be relatively competitive, supervisor ratings of performance were positively related to employees’ expressed levels of job satisfaction. In contrast, when the internal climate was perceived to be relatively uncompetitive, there was no relationship between job satisfaction and supervisor ratings of performance. It appears that employees who are motivated by, and enjoying working in, an internally competitive environment demonstrate behaviors that are appreciated by store supervisors. As suggested by the findings of </span><a class="workspace-trigger" data-dcnode-id="4191" href="#bib2" name="bbib2"><span data-dcnode-id="4192" instrument_node="">Arndt, Arnold, and Landry (2006)</span></a><span data-dcnode-id="4190" instrument_node=""> in relation to a polychronic-orientation and retail employee fit with an environment, it appears that appropriately matching the employee with the managerially desired retail climate, although oftentimes challenging, is very important and will likely pay a performance dividend.</span></p><p data-dcnode-id="4178"><span data-dcnode-id="4188" instrument_node="">An important question concerns the lack of effects for role conflict on job efficacy (a seemingly straightforward prediction from previous research). The proposition that job efficacy is a mediating variable can be traced to work regarding the “process” of stress creation within the individual (</span><a class="workspace-trigger" data-dcnode-id="4186" href="#bib46" name="bbib46"><span data-dcnode-id="4187" instrument_node="">Pearlin et al. 1981</span></a><span data-dcnode-id="4185" instrument_node="">). Pearlin and colleagues argued that role strains cause an erosion of feelings of job mastery. Thus, the stressors act through the perceived confidence of having the ability to carry out the tasks (i.e., perceived job efficacy). The proposal that multiple role stressors negatively impact perceived self-capabilities is supported by the work by </span><a class="workspace-trigger" data-dcnode-id="4183" href="#bib23" name="bbib23"><span data-dcnode-id="4184" instrument_node="">Halbesleben and Buckley (2004)</span></a><span data-dcnode-id="4182" instrument_node="">, who found that role stressors negatively impact one's feelings of being able to accomplish personal goals. This relationship is also supported by research in organizational behavior. For example, </span><a class="workspace-trigger" data-dcnode-id="4180" href="#bib50" name="bbib50"><span data-dcnode-id="4181" instrument_node="">Raghuram and Wiesenfeld (2004)</span></a><span data-dcnode-id="4179" instrument_node=""> found the stress created by nonwork–work conflict among virtual workers to be negatively related to efficacy, which was then negatively related to the occurrence of felt stress. The primary appraisal of a stressful situation negatively influences the secondary appraisal of one's ability to minimize or avoid harm, which is represented by job efficacy.</span></p><p data-dcnode-id="4140"><span data-dcnode-id="4177" instrument_node="">Given this, it could be that in our scenario the effects of role conflict are bound with ambiguity and family conflict. That is, the correlation of role conflict with job efficacy was </span><em data-dcnode-id="4175"><span data-dcnode-id="4176" instrument_node="">r</span></em><span data-dcnode-id="4174" instrument_node="">&nbsp;</span><span data-dcnode-id="4172" instrument_node="">=</span><span data-dcnode-id="4170" instrument_node="">&nbsp;</span><span data-dcnode-id="4168" instrument_node="">−.29. Thus, the bivariate relationship is significant. Additional analyses revealed that the correlation between role ambiguity and family conflict was quite low (</span><em data-dcnode-id="4166"><span data-dcnode-id="4167" instrument_node="">r</span></em><span data-dcnode-id="4165" instrument_node="">&nbsp;</span><span data-dcnode-id="4163" instrument_node="">=</span><span data-dcnode-id="4161" instrument_node="">&nbsp;</span><span data-dcnode-id="4159" instrument_node="">.16). In contrast, role conflict had higher correlations with role ambiguity and family conflict (</span><em data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">r</span></em><span data-dcnode-id="4156" instrument_node="">&nbsp;</span><span data-dcnode-id="4154" instrument_node="">=</span><span data-dcnode-id="4152" instrument_node="">&nbsp;</span><span data-dcnode-id="4150" instrument_node="">.30 and </span><em data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">r</span></em><span data-dcnode-id="4147" instrument_node="">&nbsp;</span><span data-dcnode-id="4145" instrument_node="">=</span><span data-dcnode-id="4143" instrument_node="">&nbsp;</span><span data-dcnode-id="4141" instrument_node="">.32, respectively), suggesting that the effects of role conflict upon job efficacy may be accounted for by the effects of role ambiguity and family conflict.</span></p><section data-dcnode-id="4110" id="aep-section-id22"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">Theoretical contributions</span></h3><p data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">These results provide insights into cognitive appraisal theory research. Importantly, the results emphasize the critical nature of investigating environmental moderating conditions (e.g., perceived competitive climate) when studying the effects of role stressors. As predicted by appraisal theory, retail employees make appraisals that affect their felt stress. First, RA and FWC negatively affect job efficacy, thereby reducing one's perceived ability to minimize the potential harm of a role stressor through effectively carrying out one's work role, which ultimately lowers the strength of the relationship to job satisfaction for the employee. Such an effect is most pronounced, as noted above, in relation to the family–work role stressor.</span></p><p data-dcnode-id="4134"><span data-dcnode-id="4135" instrument_node="">Second, the significant moderating effect of competitive climate supports the sanction motivation perspective. That is, it appears that employees in competitive retail climates are able to take action to overcome role stressors (as opposed to withdrawing), at least in relation to RA. We suggested that role ambiguity in a competitive climate allows a retail employee to innovate, adapt, or adopt solutions that positively influence the employee's perceived ability to perform. Further, through the positive influence such proactive behavior has upon job satisfaction, the more satisfied employee will then be perceived as higher performing by his/her immediate supervisor. As suggested by appraisal theory, the negative effects that a competitive climate can have on an employee and his/her performance may be lessened as a result of the employee's ability to “deal with” the stressor in an effective manner (i.e., a positive secondary appraisal).</span></p><p data-dcnode-id="4111"><span data-dcnode-id="4133" instrument_node="">Our results shed additional light on the relationship between employee expressed job satisfaction and supervisor-rated performance. While the published literature has expressed divergent views of the direction of causality (</span><a class="workspace-trigger" data-dcnode-id="4131" href="#bib40" name="bbib40"><span data-dcnode-id="4132" instrument_node="">MacKenzie, Podsakof, and Ahearne 1998</span></a><span data-dcnode-id="4130" instrument_node="">) and whether a relationship exists at all (</span><a class="workspace-trigger" data-dcnode-id="4128" href="#bib26" name="bbib26"><span data-dcnode-id="4129" instrument_node="">Iaffaldano and Muchinsky's 1985</span></a><span data-dcnode-id="4127" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4125" href="#bib31" name="bbib31"><span data-dcnode-id="4126" instrument_node="">Judge et al., 2001</span></a><span data-dcnode-id="4124" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4122" href="#bib53" name="bbib53"><span data-dcnode-id="4123" instrument_node="">Saari and Judge, 2004</span></a><span data-dcnode-id="4121" instrument_node="">), the current research suggests that the relationship may be contingent on the competitive climate of the workplace. Further research is warranted in this area. We also note that by including both supervisor ratings of performance as well as self-ratings of performance, we add to the ongoing discussion concerning potential differences between these constructs (</span><a class="workspace-trigger" data-dcnode-id="4119" href="#bib45" name="bbib45"><span data-dcnode-id="4120" instrument_node="">Netemeyer and Maxham 2007</span></a><span data-dcnode-id="4118" instrument_node="">). The results of our study support the idea that supervisor ratings and self-ratings do not converge (</span><a class="workspace-trigger" data-dcnode-id="4116" href="#bib29" name="bbib29"><span data-dcnode-id="4117" instrument_node="">Jaramillo, Carrillat, and Locander 2005</span></a><span data-dcnode-id="4115" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4113" href="#bib45" name="bbib45"><span data-dcnode-id="4114" instrument_node="">Netemeyer and Maxham 2007</span></a><span data-dcnode-id="4112" instrument_node="">).</span></p></section><section data-dcnode-id="4095" id="aep-section-id23"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">Managerial contributions</span></h3><p data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">The present research is the first to examine the interplay between role stressors, job efficacy, job satisfaction, and one element of the organizational environment—competitive climate. In so doing, we provide insight into the process through which role stressors influence performance measures. Our theoretical reasoning and the empirical evidence point to the important role played by job efficacy in the retail store. As anticipated, we find that job stress in the form of role ambiguity and family–work conflict negatively impacts the employees’ belief in their ability to perform their role in the retail organization. This, in turn, impacts their perceived level of job satisfaction and self-evaluation of job performance. Thus, retail managers should strive to build an employee's sense of control over, and confidence in, his/her ability to execute role responsibilities.</span></p><p data-dcnode-id="4104"><span data-dcnode-id="4105" instrument_node="">In order to accomplish this, we draw upon the empirical evidence here which suggests that minimizing stress due to family–work conflict and role ambiguity is a fundamental part of increasing employee job efficacy. Our findings in relation to the competitive climate moderator, therefore, address at least a part of this concern. That is, the creation of a competitive internal climate might help to reduce ambiguity by encouraging the employee to seek help when confronted with ambiguity. Further, help in the way of in-store training or the provision of educational material might provide employees with suggestions that can help the individual to better balance work and life roles. Similarly, it is not uncommon for retailers to provide employee “hotlines” that are available 24-h a day to help employees work through difficult work/life situations.</span></p><p data-dcnode-id="4096"><span data-dcnode-id="4103" instrument_node="">Further highlighting the managerial significance of competitive climate's influence upon role ambiguity, our findings are similar to those observed in past research involving frontline service employees (</span><a class="workspace-trigger" data-dcnode-id="4101" href="#bib57" name="bbib57"><span data-dcnode-id="4102" instrument_node="">Singh 2000</span></a><span data-dcnode-id="4100" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="4098" href="#bib57" name="bbib57"><span data-dcnode-id="4099" instrument_node="">Singh (2000)</span></a><span data-dcnode-id="4097" instrument_node=""> found task control could act as a “buffer” to certain role stressor effects. In our research, we identify competitive climate as a potential “buffer.” Role ambiguity in a competitive climate might provide the employee with the opportunity to confront the ambiguity through increased freedom of action, thereby creating a more satisfied and, ultimately, more productive employee. To be clear, our results do suggest that the absence of role ambiguity is always better in terms of the employees’ perceived self-efficacy. The primary finding is that in a relatively competitive environment, role ambiguity is not as significant a stressor as it is in the relatively uncompetitive environment. Alternatively, in a situation in which role ambiguity is exogenously determined managers should foster a competitive climate.</span></p></section></section><section data-dcnode-id="4063" id="aep-section-id24"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">Limitations and future research</span></h2><p data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">An interesting question concerns why perceived competitive climate failed to moderate the effects of RC and FWC on job efficacy. It appears that while a competitive climate lessens the impact of role ambiguity (which is, as discussed above, important to job efficacy), role conflict and family–work conflict tend to have effects that are invariant to the competitive nature of the workplace. One potential reason for this could be that ambiguity can be dealt with by purposeful action (i.e., problem-focused coping) which is motivated by a competitive climate. That is, an obvious solution to ambiguity when there are sanctions for underperforming is to seek help. On the other hand, internal competition does not appear to prompt such an obvious response in relation to either RC or FWC. Perhaps, as suggested in our managerial implications, managers could take action to make it clearer to employees that taking direct action to reduce RC or FWC also can have very positive effects on work performance. Future research should focus upon teasing out conditions that might spur proactive coping with these role stressors. One possibility suggested by a reviewer is that job efficacy may act as a moderator instead of a mediator. While our data do not support this contention, it may be worthy of future investigation with a different sample.</span></p><p data-dcnode-id="4085"><span data-dcnode-id="4089" instrument_node="">In this research we chose to focus on family–work conflict, that is, the extent to which family concerns conflict with the employees’ ability to perform their job. This was a natural choice since the focus of this research was on both job efficacy and the perceived competitiveness of the work climate and since FWC has not been frequently studied in the retail environment. However, </span><a class="workspace-trigger" data-dcnode-id="4087" href="#bib44" name="bbib44"><span data-dcnode-id="4088" instrument_node="">Netemeyer, Thomas, and Boles (2004)</span></a><span data-dcnode-id="4086" instrument_node=""> also have suggested that work–family conflict, or the extent to which work conflicts with the employee's family life, is an important stressor on employees. Given the variable and long work hours faced by retail managers, sales representatives, and other retail employees, WFC may be a source of stress for retail employees. Future research should investigate the impact of WFC on job efficacy and or job satisfaction.</span></p><p data-dcnode-id="4074"><span data-dcnode-id="4084" instrument_node="">A second question concerns why job satisfaction interacts with a competitive climate to significantly influence supervisor-rated performance, but yet has no effect on self-ratings. Previous research indicates that in order for measures of supervisor-rated and self-rated performance to converge they need to be based on a common evaluative mechanism (</span><a class="workspace-trigger" data-dcnode-id="4082" href="#bib29" name="bbib29"><span data-dcnode-id="4083" instrument_node="">Jaramillo, Carrillat, and Locander 2005</span></a><span data-dcnode-id="4081" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="4079" href="#bib49" name="bbib49"><span data-dcnode-id="4080" instrument_node="">Posthuma (2000)</span></a><span data-dcnode-id="4078" instrument_node=""> established that supervisors focus on output as the single most important factor when evaluating their employees. To the extent that the employees rely on factors other than pure output during their self-assessments of performance, then it is not surprising that results will vary across the two dimensions of performance. As it pertains to our findings, it may be likely that the relationship between the employee's job satisfaction and performance is only affected by organizational climate if the evaluative base for measuring performance is output driven (</span><a class="workspace-trigger" data-dcnode-id="4076" href="#bib45" name="bbib45"><span data-dcnode-id="4077" instrument_node="">Netemeyer and Maxham 2007</span></a><span data-dcnode-id="4075" instrument_node="">).</span></p><p data-dcnode-id="4066"><span data-dcnode-id="4073" instrument_node="">Another explanation for the divergent findings is derived from </span><a class="workspace-trigger" data-dcnode-id="4071" href="#bib19" name="bbib19"><span data-dcnode-id="4072" instrument_node="">Festinger's (1954)</span></a><span data-dcnode-id="4070" instrument_node=""> social comparison theory. In order to arrive at an evaluation of performance, comparisons with relevant others are often made. </span><a class="workspace-trigger" data-dcnode-id="4068" href="#bib29" name="bbib29"><span data-dcnode-id="4069" instrument_node="">Jaramillo, Carrillat, and Locander (2005)</span></a><span data-dcnode-id="4067" instrument_node=""> suggest that, because a manager has access to more information concerning the relevant others’ performance, it is not surprising that the end evaluation will differ from that of the employee (who does not have access to the same information). In our study, it may be likely that the relationship between the employee's job satisfaction and performance is enhanced by a high degree of competitiveness only when the evaluator has access to accurate information related to how referent others have performed. If the evaluator does not have this information then the relationship does not hold.</span></p><p data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">One limitation of the research is that the measure of competitive climate was taken from the perspective of employees, rather than from an independent source, in a single retail chain. Future research that implements multi-level analysis using multiple employees from within each store and multiple stores from within multiple chains is necessary. Unfortunately, this was not possible in the present research because our study occurred within a single chain without a guarantee of multiple respondents per retail store.</span></p></section><section data-dcnode-id="4042" id="aep-section-id25"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">Conclusion</span></h2><p data-dcnode-id="4055"><span data-dcnode-id="4060" instrument_node="">A cohesive, theory-based investigation of the influence of a competitive in-store climate upon the effects of role stressors on job efficacy, job satisfaction, and the self-rated and supervisor-rated performance of retail employees was presented in this research. Based upon the study's findings, the environment in which retail employees operate significantly influences both employee attitudes (i.e., job efficacy and satisfaction) as well as behaviors (i.e., performance) resulting from potential job stressors. Given such findings, the authors hope that this research will serve as a launching point for future studies investigating role stressors, and that the application of cognitive appraisal theory and the investigation of relevant environmental variables might become commonplace in role stress research.</span><br data-dcnode-id="4059"><strong data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">Executive summary</span></strong><br data-dcnode-id="4056"></p><p data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">Role stress, which is defined as an enduring state of mental taxation resulting in the potential for negative psychological, social, and behavioral outcomes, accounts for more variance in retail employee performance than skill, motivation, personal aptitude, or organizational factors. Obviously, given the importance of role stress to retail employee well-being and performance, studying those things that create stressful environments for retail employees is important, Further, the investigation of potential means of reducing the negative performance effects of retail role stress is important and may help to further our general understanding of how to better manage retail employees.</span></p><p data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">Interestingly, investigation of store-level environmental conditions that might influence the ultimate effect of retail stressors is rare. In the present study, the authors address this need by investigating the effect of an internally competitive climate on the relationship between job stressors (i.e., role conflict, role ambiguity, and family–work conflict) and job efficacy/satisfaction, as well as efficacy/satisfaction and performance. A competitive climate exists at the store-level to the extent that employees perceive their rewards to be contingent upon comparisons of their performance against their peers. We propose the counter-intuitive idea that a competitive store-level climate can benefit retail employees in relation to the effects of role stressors. Drawing upon cognitive appraisal theory, a discussion of how a competitive climate may actually work to reduce the negative effects associated with retail role stressors is presented.</span></p><p data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">Cognitive appraisal theory offers specific insight into organizational competitiveness and its potential influence upon the effects of a role stressor. Cognitive appraisal may be described as a process through which a retail employee evaluates whether a particular encounter with the environment is relevant to his or her well-being, and if so, in what ways. If the presence of role stressors is perceived to be problematic, then the employee will assess other factors within the work environment that are likely to influence the individual's ability to cope with the role stressor. That is, if the individual perceives detrimental role stressors then s/he might consider competitive climate. The question then becomes: will the perceived level of competitiveness be more likely to soothe or exacerbate the employee's fear related to these stressors?</span></p><p data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">To address this research question, survey data were collected from a national sample of retail store employees of a large U.S.-based retailer that has a single, broad-based product line and targets both consumer and commercial customers. The observed results partially supported our hypotheses that a competitive climate would positively influence the relationship between role stressors and employee efficacy, satisfaction, and performance. Specifically, when retail employees perceived the climate of the organization to be highly competitive, the negative effect of role ambiguity (i.e., an uncertainty regarding expected role behaviors) upon an employee's perception of his/her ability to fulfill job-related tasks was significantly reduced. It appears that the creation of a competitive internal climate might help to reduce ambiguity by encouraging the employee to seek help when confronted with ambiguity. In essence, the employee is motivated to seek assistance due to the potentially negative impact ambiguity would have upon one's ability to perform well within a competitive environment. This is an important managerial finding in that it suggests a potentially beneficial outcome upon employee psychological health associated with the creation of a competitive in-store climate.</span></p><p data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">We also predicted that perceived competitive climate would positively influence the relationship between job satisfaction and performance. The results supported the prediction. When retail employees perceived the internal climate to be relatively competitive, supervisor ratings of performance were positively related to employees’ expressed levels of job satisfaction. In contrast, when the internal climate was perceived to be relatively uncompetitive, there was no relationship between job satisfaction and supervisor ratings of performance. It appears that employees who are motivated by, and enjoying working in, an internally competitive environment demonstrate behaviors that are appreciated by store supervisors.</span></p><p data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">In summary, the present research is the first to examine the interplay between role stressors, job efficacy, job satisfaction, and one element of the organizational environment—competitive climate. In so doing, we provide insight into the process through which role stressors influence performance measures. Our theoretical reasoning and the empirical evidence point to the important role played by job efficacy in the retail store. As anticipated, we find that job stress in the form of role ambiguity negatively impacts an employee's belief in his/her ability to perform his/her role in the retail organization. This effect is weakened within a competitive in-store climate. Efficacy, in turn, impacts an employee's perceived level of job satisfaction, which has a positive effect upon a manager's rating of employee job performance. Again, this positive relationship is strengthened within a competitive in-store climate. Thus, retail managers should strive to build an employee's sense of control over, and confidence in, his/her ability to execute role responsibilities. Further, retail managers should be aware of the potentially positive effects of in-store competition.</span></p></section></div><section data-dcnode-id="4036" id="aep-acknowledgment-id26"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">Acknowledgement</span></h2><p data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">The authors wish to thank Greg Marshall and Tom Brown for their assistance in obtaining the data for the study. We also are grateful for the helpful comments of the Editors and three anonymous reviewers.</span></p></section><div class="Appendices" data-dcnode-id="3882"><section data-dcnode-id="3883" id="app1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4032"><span data-dcnode-id="4035" instrument_node="">Appendix A</span><span data-dcnode-id="4033" instrument_node="">. </span></h2><p data-dcnode-id="4028"><em data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">Scales used in the questionnaire</span></em><span data-dcnode-id="4029" instrument_node=""> (* indicates an item dropped from the final analysis)</span></p><p data-dcnode-id="4008"><em data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">Job-Efficacy</span></em><span data-dcnode-id="4025" instrument_node="">: 9-Point Likert scales.</span></p><dl class="list" data-dcnode-id="4009"><dd class="list-description" data-dcnode-id="4022"><p data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">In my job I feel in control of what is happening to me.</span></p></dd><dd class="list-description" data-dcnode-id="4019"><p data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">Once I make up my mind, I can reach my job-related goals.</span></p></dd><dd class="list-description" data-dcnode-id="4016"><p data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">I have a great deal of will power in completing my job tasks.</span></p></dd><dd class="list-description" data-dcnode-id="4013"><p data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">In my job, when I make a decision, I carry it out.</span></p></dd><dd class="list-description" data-dcnode-id="4010"><p data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">I am confident in my ability to achieve my goals in this job.</span></p></dd></dl><p></p><p data-dcnode-id="3985"><em data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">Job Satisfaction</span></em><span data-dcnode-id="4005" instrument_node="">: 9-Point Likert scales.</span></p><dl class="list" data-dcnode-id="3986"><dd class="list-description" data-dcnode-id="4002"><p data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">Overall, I am extremely satisfied with my job.</span></p></dd><dd class="list-description" data-dcnode-id="3999"><p data-dcnode-id="4000"><span data-dcnode-id="4001" instrument_node="">I enjoy coming to work every day.</span></p></dd><dd class="list-description" data-dcnode-id="3996"><p data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">My work gives me a sense of accomplishment.</span></p></dd><dd class="list-description" data-dcnode-id="3993"><p data-dcnode-id="3994"><span data-dcnode-id="3995" instrument_node="">My job is exciting.</span></p></dd><dd class="list-description" data-dcnode-id="3990"><p data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">My job is satisfying.</span></p></dd><dd class="list-description" data-dcnode-id="3987"><p data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">I’m really doing something worthwhile in my job.</span></p></dd></dl><p></p><p data-dcnode-id="3968"><em data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">Competitive Climate</span></em><span data-dcnode-id="3982" instrument_node="">: 9-Point Likert scales.</span></p><dl class="list" data-dcnode-id="3969"><dd class="list-description" data-dcnode-id="3979"><p data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">My manager frequently compares my results with those of other employees.*</span></p></dd><dd class="list-description" data-dcnode-id="3976"><p data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">The amount of recognition you get in this company depends on how your performance compares to other employees.</span></p></dd><dd class="list-description" data-dcnode-id="3973"><p data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">Everybody is concerned with finishing at the top of the performance rankings.</span></p></dd><dd class="list-description" data-dcnode-id="3970"><p data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">My coworkers frequently compare their performance with mine.</span></p></dd></dl><p></p><p data-dcnode-id="3954"><em data-dcnode-id="3966"><span data-dcnode-id="3967" instrument_node="">Self-rated Performance</span></em><span data-dcnode-id="3965" instrument_node="">: 9-Point scales anchored by “Among the Worst and Among the Best”.</span></p><dl class="list" data-dcnode-id="3955"><dd class="list-description" data-dcnode-id="3962"><p data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">Overall quantity of work I perform.</span></p></dd><dd class="list-description" data-dcnode-id="3959"><p data-dcnode-id="3960"><span data-dcnode-id="3961" instrument_node="">Overall quality of work I perform.</span></p></dd><dd class="list-description" data-dcnode-id="3956"><p data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">My overall job performance.</span></p></dd></dl><p></p><p data-dcnode-id="3946"><em data-dcnode-id="3952"><span data-dcnode-id="3953" instrument_node="">Supervisor-Rated Performance</span></em><span data-dcnode-id="3951" instrument_node="">: Single Item 5-Point scale anchored by “Much Above Average” and “Much Below Average.” (This item was reverse coded.)</span></p><dl class="list" data-dcnode-id="3947"><dd class="list-description" data-dcnode-id="3948"><p data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">What is the Employee's Overall Performance?</span></p></dd></dl><p></p><p data-dcnode-id="3926"><em data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">Family–Work Conflict</span></em><span data-dcnode-id="3943" instrument_node="">: 9-Point Likert scales.</span></p><dl class="list" data-dcnode-id="3927"><dd class="list-description" data-dcnode-id="3940"><p data-dcnode-id="3941"><span data-dcnode-id="3942" instrument_node="">Family-related strain interferes with my ability to perform job-related duties.</span></p></dd><dd class="list-description" data-dcnode-id="3937"><p data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">I have to put off doing things at work because of the demands of my home life.</span></p></dd><dd class="list-description" data-dcnode-id="3934"><p data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">The demands of my family or spouse/partner interfere with work-related activities.</span></p></dd><dd class="list-description" data-dcnode-id="3931"><p data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">My home life interferes with me fulfilling my responsibilities at work.</span></p></dd><dd class="list-description" data-dcnode-id="3928"><p data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">Things I want to do at work get done because of the demands of my family.*</span></p></dd></dl><p></p><p data-dcnode-id="3903"><em data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">Role Ambiguity</span></em><span data-dcnode-id="3923" instrument_node="">: 7-Point scales anchored by Very False–Very true.</span></p><dl class="list" data-dcnode-id="3904"><dd class="list-description" data-dcnode-id="3920"><p data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">I feel certain about how much authority I have.</span></p></dd><dd class="list-description" data-dcnode-id="3917"><p data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">I have clear, planned goals and objectives for my job.</span></p></dd><dd class="list-description" data-dcnode-id="3914"><p data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">I know that I have divided my time properly.*</span></p></dd><dd class="list-description" data-dcnode-id="3911"><p data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">I know what my responsibilities are.</span></p></dd><dd class="list-description" data-dcnode-id="3908"><p data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">I know exactly what is expected of me.</span></p></dd><dd class="list-description" data-dcnode-id="3905"><p data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">The explanation is clear of what has to be done.</span></p></dd></dl><p></p><p data-dcnode-id="3886"><em data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">Role Conflict</span></em><span data-dcnode-id="3900" instrument_node="">: 7-Point scales anchored by Very False–Very true.</span></p><dl class="list" data-dcnode-id="3887"><dd class="list-description" data-dcnode-id="3897"><p data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">I have to buck a rule or policy in order to carry out an assignment.*</span></p></dd><dd class="list-description" data-dcnode-id="3894"><p data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">I receive incompatible requests from two or more people.</span></p></dd><dd class="list-description" data-dcnode-id="3891"><p data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">I receive an assignment without adequate resources and materials to execute it.</span></p></dd><dd class="list-description" data-dcnode-id="3888"><p data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">I have to do things that should be done differently.</span></p></dd></dl><p></p><p data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">Notes: (1) For role-conflict and role-ambiguity, respondents were asked “To what extent do the following conditions apply to you in your job with ________?” (2) Items with stars were removed because of cross-loadings. (3) The supervisor-performance rating was taken from the performance evaluation instrument employed by the company between 1 and 3 months after the employee completed the survey.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="3877"><button class="button button-anchor" data-dcnode-id="3878" type="button"><span class="button-text" data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="3876"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="401" id="aep-bibliography-id69"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="402" id="aep-bibliography-sec-id70"><dl class="references" data-dcnode-id="403" id="reference-links-aep-
