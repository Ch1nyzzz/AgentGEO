ng Research</span><span data-dcnode-id="426" instrument_node="">, </span><span data-dcnode-id="424" instrument_node="">20</span><span data-dcnode-id="422" instrument_node=""> (</span><span data-dcnode-id="420" instrument_node="">1983</span><span data-dcnode-id="418" instrument_node="">)</span><span data-dcnode-id="416" instrument_node="">, pp. </span><span data-dcnode-id="414" instrument_node="">36</span><span data-dcnode-id="412" instrument_node="">-</span><span data-dcnode-id="410" instrument_node="">44</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="405"><span data-dcnode-id="408" instrument_node=""></span><a class="link" data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DA%2520Quantitative%2520Review%2520of%2520Research%2520Design%253A%2520Effects%2520on%2520Response%2520Rates%2520to%2520Questionnaires%26publication_year%3D1983%26author%3DJ.%2520Yu%26author%3DH.%2520Cooper" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="407" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="267" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="268"><div class="PageDivider" data-dcnode-id="400"></div><header data-dcnode-id="397" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Cited by (53)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="269"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="270"><ul data-dcnode-id="276"><li class="ListArticleItem" data-dcnode-id="379"><div class="sub-heading" data-dcnode-id="391"><a data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0969698921002927" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="395" id="citing-articles-article0-title"><span data-dcnode-id="396" instrument_node="">The influences of cooperative climate, competitive climate and customer empowerment on service creativity</span></h3></a><div class="article-source ellipsis" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">2021, Journal of Retailing and Consumer Services</span></div></div><div class="buttons" data-dcnode-id="385"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="386" type="button"><span class="button-link-text" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="387" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="388"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="380"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="381" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="382"><p data-dcnode-id="383" id="abspara0010"><span data-dcnode-id="384" instrument_node="">To extend the relationship between customer empowerment and creativity, this study explores the mediating effects of intrinsic and extrinsic motivations (individual level). The study aims to clarify whether cooperative and competitive climates influence service creativity through intrinsic and extrinsic motivations (across level). A matching sample of 333 coaches and customers from 30 stores in the fitness industry was used to examine the study hypotheses by employing Mplus 8.3 statistical software. The results show that (1) customer empowerment and cooperative climate have significant positive effects on service creativity (that is, the service creativity of coaches); (2) the intrinsic motivation of coaches mediates the relationship between customer empowerment and service creativity; and (3) the intrinsic motivation of coaches mediates the relationship between cooperative climate and service creativity, but the mediating mechanism of extrinsic motivation does not exist in the relationship between competitive climate and service creativity.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="361"><div class="sub-heading" data-dcnode-id="373"><a data-dcnode-id="376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0022435921000294" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="377" id="citing-articles-article1-title"><span data-dcnode-id="378" instrument_node="">How Customer Requests Influence Frontline Employee Job Outcomes: The Role of Personal Appraisal Tendencies and Situational Customer Demandingness</span></h3></a><div class="article-source ellipsis" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">2021, Journal of Retailing</span></div></div><div class="buttons" data-dcnode-id="367"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="368" type="button"><span class="button-link-text" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="369" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="370"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="362"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="363" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="364"><p data-dcnode-id="365" id="spar0100"><span data-dcnode-id="366" instrument_node="">This study investigates how customer requests, a common phenomenon, influence frontline employee (FLE) job outcomes. We propose and demonstrate that (1) FLEs possess tendencies to appraise customer requests in both positive (i.e., challenge appraisal tendency) and negative (i.e., hindrance appraisal tendency) ways, (2) higher levels of challenge appraisal tendency result in higher levels of FLE performance and lower levels of turnover (mediated through job engagement), (3) higher levels of hindrance appraisal tendency lead to increased FLE turnover (mediated through job stress), (4) the effects of FLE appraisal tendencies on situational engagement and stress are magnified when a specific customer request is deemed to be more (rather than less) demanding, and (5) customer request appraisal tendencies are shaped by the interaction between FLEs’ level of prosocial motivation and intrinsic motivation. These results are very encouraging for managers as they imply that FLE responses to customer requests are not determined by the nature of the requests themselves (which is beyond their control) but, rather, they are a function of how FLEs construe customer requests, a process that can be influenced through organizational human resource practices.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="337"><div class="sub-heading" data-dcnode-id="349"><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0278431918309782" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="359" id="citing-articles-article2-title"><span data-dcnode-id="360" instrument_node="">Evil customers, an angel boss and coopetitive coworkers: Burnout of frontline employees</span></h3></a><div class="article-source ellipsis" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">2019, International Journal of Hospitality Management</span></div><div class="CitedSection" data-dcnode-id="350"><div class="snippet" data-dcnode-id="351"><div class="cite-header" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Organizations may also implant the significance of teamwork in these workshops, which helps to create a cooperative climate in the workplace. It is suggested that companies should still appreciate healthy competition among the employees, as a reasonable level of competition could spice up work performance and promote organizational health (Arnold et al., 2009; Baruch and Lin, 2012). Meanwhile, organizations could also encourage affective mutual support between fellow teammates through team-based activities such as games, sharing sessions, gatherings, and retreats.</span></p></div></div></div><div class="buttons" data-dcnode-id="343"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="344" type="button"><span class="button-link-text" data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="345" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="346"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="338"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="339" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="340"><p data-dcnode-id="341" id="spar0075"><span data-dcnode-id="342" instrument_node="">The customer is not always right, but he or she is always the customer. Building on the cognitive appraisal theory, a multilevel design was adopted to examine how customer incivility arouses burnout of frontline employees in resort retail stores and in turn jeopardizes their brand commitment. The moderating effects of workplace dynamics, including managers’ emotional intelligence and customer orientation as well as coopetitive coworker climates, are also examined. A mixed result implies that an angel manager to employees will alleviate the stress induced by uncivil customers, while an angel manager to customers could unexpectedly add to the pressure on the sales force. In addition, customer-induced burnout is reduced by cooperative coworkers but not exacerbated by intra-team competition. This study advances the research on hospitality frontline employees’ workplace distress by investigating a tripartite customer–manager–coworker dynamic and provides managerial insights for service industries to improve employees’ psychological well-being.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="319"><div class="sub-heading" data-dcnode-id="331"><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261517719300354" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="335" id="citing-articles-article3-title"><span data-dcnode-id="336" instrument_node="">Hotel employee's artificial intelligence and robotics awareness and its impact on turnover intention: The moderating roles of perceived organizational support and competitive psychological climate</span></h3></a><div class="article-source ellipsis" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">2019, Tourism Management</span></div></div><div class="buttons" data-dcnode-id="325"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="326" type="button"><span class="button-link-text" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="327" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="328"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="320"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="321" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="322"><p data-dcnode-id="323" id="abspara0010"><span data-dcnode-id="324" instrument_node="">The advent of machines powered by artificial intelligence (AI) and robotics technologies have already strongly influenced the hospitality industry, and the effects of its replacement upon the human workforce has been a highly debated topic. Despite this, empirical evidence in the form of published empirical studies have yet to appear in academic journals that present compelling evidence addressing what hospitality employees’ awareness of those potential impacts could be pertaining to AI and robotics specifically applied within the context of their turnover intention and future employment prospects. The purpose of this study was to present new empirical findings on this issue using data from a sample of 468 full-time five star hotel employees in Guangzhou, China. AI and robotics awareness was found to be significantly associated with employee turnover intention. This relationship was moderated by perceived organizational support and competitive psychological climate. Implications and directions for future research are provided.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="301"><div class="sub-heading" data-dcnode-id="313"><a data-dcnode-id="316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0969698918301139" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="317" id="citing-articles-article4-title"><span data-dcnode-id="318" instrument_node="">Bullseye: An argument for effectively managing retail stakeholder relationships</span></h3></a><div class="article-source ellipsis" data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">2019, Journal of Retailing and Consumer Services</span></div></div><div class="buttons" data-dcnode-id="307"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="308" type="button"><span class="button-link-text" data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="309" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="310"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="302"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="303" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="304"><p data-dcnode-id="305" id="abspara0010"><span data-dcnode-id="306" instrument_node="">We introduce the idea of a “stakeholder concentration index” to understand how focusing on relationships with a few stakeholders (rather than many) impacts a retailer's annual sales. By estimating a series of equations, we show that the most successful retailers build relationships with many stakeholders. We also show that the most successful retailers have very active stakeholder management strategies, as evidenced by their issuance of many press announcements. Finally, we begin the process of identifying those stakeholders that are most (least) important to achieving high sales. We specifically find that employees have the largest direct impact on retail sales, while investors and the legal and regulatory community have the smallest impacts. Ultimately, this research advances marketing theory and provides retailers with a strategic direction as they deploy resources.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="277"><div class="sub-heading" data-dcnode-id="289"><a data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1048984316300133" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="299" id="citing-articles-article5-title"><span data-dcnode-id="300" instrument_node="">The subjective well-being of group leaders as explained by the quality of leader–member exchange</span></h3></a><div class="article-source ellipsis" data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">2016, Leadership Quarterly</span></div><div class="CitedSection" data-dcnode-id="290"><div class="snippet" data-dcnode-id="291"><div class="cite-header" data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Given the manifold social demands inherent in being a leader (Day et al., 2004), the responsibilities of leadership heighten the salience of social exchange. In fact, efforts to interact effectively with numerous group members can give rise to stress from conflicting demands (Arnold, Flaherty, Voss, &amp; Mowen, 2009) as well as challenging interpersonal transactions (Courtright et al., 2014). A related consideration is that each person has limited amounts of energy and resources to expend in the workplace, so that the allocation of time, energy, and other limited resources causes resource depletion (Hobfoll, 1989).</span></p></div></div></div><div class="buttons" data-dcnode-id="283"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="284" type="button"><span class="button-link-text" data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="285" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="286"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="278"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="279" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="280"><p data-dcnode-id="281" id="sp0055"><span data-dcnode-id="282" instrument_node="">Although a great deal of research explores the ramifications of leader–member exchange (LMX) quality for the well-being of followers, leader well-being is largely overlooked. To address this gap, we investigate whether leaders' well-being, in the form of positive affect and job stress, can be explained by LMX quality at the group level of analysis. We analyzed data from 1297 group members within 162 groups matched with individual leaders. Results showed that leaders' positive affect and job stress were uniquely explained by LMX differentiation (group-member data), even after several relevant variables, including fundamental leader attitudes and average LMX (group-member data), were taken into account. A subsequent analytical step revealed a significant interaction between average LMX and LMX differentiation for leader job stress, yet not for leader positive affect. Specifically, the positive relationship between LMX differentiation and leader job stress was discovered to be greater at low average LMX than at high average LMX. Overall, the findings highlight leaders' well-being as a promising avenue for future LMX research and a group level of analysis as useful in studying social exchange.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-66049106596%26md5%3Df8a97bfcc124d45f1b54ff25dd784b38" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="274" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="275"></path></svg><span class="button-alternative-text" data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="242"><dl class="footnote" data-dcnode-id="259"><dt class="footnote-label" data-dcnode-id="263"><sup data-dcnode-id="264"><a data-dcnode-id="265" href="#bfn1"><span data-dcnode-id="266" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="260"><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Tel.: +1 405 744 8653.</span></p></dd></dl><dl class="footnote" data-dcnode-id="251"><dt class="footnote-label" data-dcnode-id="255"><sup data-dcnode-id="256"><a data-dcnode-id="257" href="#bfn2"><span data-d
