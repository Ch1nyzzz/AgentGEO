</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id8&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id9&quot;><p>Cognitive appraisal theory is used to investigate the influence of perceived competitive climate in the retail store upon the relationship between three role stressors (i.e., role ambiguity, role conflict, and family–work conflict) and job efficacy, job satisfaction, and the self- and supervisor-rated performance of retail professionals. Results indicate that the effect of role ambiguity on job efficacy is moderated by perceived competitive climate, such that the harmful effect of role ambiguity is lessened when competitive climate is high, thus highlighting a potential benefit of stress reduction through an increase in perceptions of competitive climate. In addition, the influence of job satisfaction on supervisor ratings of performance is moderated by perceived competitive climate, such that higher levels of job satisfaction result in improved supervisor ratings when the competitive climate is perceived to be high.</p></div></div></div>" data-dcnode-id="5913" lang="en" name="citation_abstract"><span data-dcnode-id="5912" instrument_node="">

n"><svg class="icon icon-share" data-dcnode-id="5427" focusable="false" height="16" viewBox="0 0 128 128" width="16"><path d="m9e1 112c-6.62 0-12-5.38-12-12s5.38-12 12-12 12 5.38 12 12-5.38 12-12 12zm-66-36c-6.62 0-12-5.38-12-12s5.38-12 12-12 12 5.38 12 12-5.38 12-12 12zm66-6e1c6.62 0 12 5.38 12 12s-5.38 12-12 12-12-5.38-12-12 5.38-12 12-12zm0 62c-6.56 0-12.44 2.9-16.48 7.48l-28.42-15.28c0.58-1.98 0.9-4.04 0.9-6.2s-0.32-4.22-0.9-6.2l28.42-15.28c4.04 4.58 9.92 7.48 16.48 7.48 12.14 0 22-9.86 22-22s-9.86-22-22-22-22 9.86-22 22c0 1.98 0.28 3.9 0.78 5.72l-28.64 15.38c-4.02-4.34-9.76-7.1-16.14-7.1-12.14 0-22 9.86-22 22s9.86 22 22 22c6.38 0 12.12-2.76 16.14-7.12l28.64 15.38c-0.5 1.84-0.78 3.76-0.78 5.74 0 12.14 9.86 22 22 22s22-9.86 22-22-9.86-22-22-22z" data-dcnode-id="5428"></path></svg><span class="button-text" data-dcnode-id="5425"><span data-dcnode-id="5426" instrument_node="">Share</span></span></button></div></div></div><div class="ExportCitation u-display-inline-block" data-dcnode-id="5413" id="export-citation"><div class="popover export-citation-popover" data-dcnode-id="5414" id="export-citation-popover"><div data-dcnode-id="5415" id="popover-trigger-export-citation-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="5416" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="5419" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="5420" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="5417"><span data-dcnode-id="5418" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="5406" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="5409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.jretai.2009.02.002" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="5410" instrument_node="">https://doi.org/10.1016/j.jretai.2009.02.002</span></a><a class="rights-and-content" data-dcnode-id="5407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0022435909000141%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5408" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="5405"></section><section class="ReferencedArticles" data-dcnode-id="5404"></section><div class="PageDivider" data-dcnode-id="5403"></div><div class="Abstracts u-font-serif" data-dcnode-id="5396" id="abstracts"><div class="abstract author" data-dcnode-id="5397" id="aep-abstract-id8"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">Abstract</span></h2><div data-dcnode-id="5398" id="aep-abstract-sec-id9"><p data-dcnode-id="5399"><span data-dcnode-id="5400" instrument_node="">Cognitive appraisal theory is used to investigate the influence of perceived competitive climate in the retail store upon the relationship between three role stressors (i.e., role ambiguity, role conflict, and family–work conflict) and job efficacy, job satisfaction, and the self- and supervisor-rated performance of retail professionals. Results indicate that the effect of role ambiguity on job efficacy is moderated by perceived competitive climate, such that the harmful effect of role ambiguity is lessened when competitive climate is high, thus highlighting a potential benefit of stress reduction through an increase in perceptions of competitive climate. In addition, the influence of job satisfaction on supervisor ratings of performance is moderated by perceived competitive climate, such that higher levels of job satisfaction result in improved supervisor ratings when the competitive climate is perceived to be high.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="5373" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="5385"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0022435909000177"><svg class="icon icon-navigate-left" data-dcnode-id="5394" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="5395"></path></svg><span class="button-alternative-text" data-dcnode-id="5387"><strong data-dcnode-id="5392"><span data-dcnode-id="5393" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="5390"><span data-dcnode-id="5391" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5388"><span data-dcnode-id="5389" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="5374"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0022435908000547"><span class="button-alternative-text" data-dcnode-id="5378"><strong data-dcnode-id="5383"><span data-dcnode-id="5384" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="5376" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="5377"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="5354"><div class="keywords-section" data-dcnode-id="5355" id="aep-keywords-id10"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5371"><span data-dcnode-id="5372" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="5368"><span data-dcnode-id="5369"><span data-dcnode-id="5370" instrument_node="">Cognitive appraisal theory</span></span></div><div class="keyword" data-dcnode-id="5365"><span data-dcnode-id="5366"><span data-dcnode-id="5367" instrument_node="">Role stress</span></span></div><div class="keyword" data-dcnode-id="5362"><span data-dcnode-id="5363"><span data-dcnode-id="5364" instrument_node="">Competitive climate</span></span></div><div class="keyword" data-dcnode-id="5359"><span data-dcnode-id="5360"><span data-dcnode-id="5361" instrument_node="">Role ambiguity</span></span></div><div class="keyword" data-dcnode-id="5356"><span data-dcnode-id="5357"><span data-dcnode-id="5358" instrument_node="">Job satisfaction</span></span></div></div></div><span data-dcnode-id="5353" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3881" id="body"><div data-dcnode-id="4041"><p data-dcnode-id="5339"><span data-dcnode-id="5352" instrument_node="">Retail employees must continually balance the expectations of management and customers. Not surprisingly, role-related stressors (e.g., role conflict and role ambiguity) have been found to present a particular problem for these boundary spanners, contributing to a potentially stressful internal environment (e.g., long hours with high performance expectations) encountered by retail employees (</span><a class="workspace-trigger" data-dcnode-id="5350" href="#bib51" name="bbib51"><span data-dcnode-id="5351" instrument_node="">Rhoads et al. 2002</span></a><span data-dcnode-id="5349" instrument_node="">). Role stress, defined as an enduring state of mental taxation resulting in the potential for negative psychological, psycho-social, and behavioral outcomes (</span><a class="workspace-trigger" data-dcnode-id="5347" href="#bib54" name="bbib54"><span data-dcnode-id="5348" instrument_node="">Sager and Wilson 1995</span></a><span data-dcnode-id="5346" instrument_node="">), accounts for more variance in boundary-spanner performance than skill, motivation, personal aptitude, or organizational factors (</span><a class="workspace-trigger" data-dcnode-id="5344" href="#bib14" name="bbib14"><span data-dcnode-id="5345" instrument_node="">Churchill et al. 1985</span></a><span data-dcnode-id="5343" instrument_node="">). Studying role stress and potential means of reducing the negative effects of retail role stressors is important and may help to further our understanding of how to better manage retail employees (</span><a class="workspace-trigger" data-dcnode-id="5341" href="#bib47" name="bbib47"><span data-dcnode-id="5342" instrument_node="">Peterson and Balasubramanian 2002</span></a><span data-dcnode-id="5340" instrument_node="">).</span></p><p data-dcnode-id="5328"><span data-dcnode-id="5338" instrument_node="">Interestingly, investigation of environmental conditions that might influence the ultimate effect of retail stressors is rare. In the present study, the authors address this need by investigating the moderating role of an internally competitive climate (</span><a class="workspace-trigger" data-dcnode-id="5336" href="#bib10" name="bbib10"><span data-dcnode-id="5337" instrument_node="">Brown, Cron, and Slocum 1998</span></a><span data-dcnode-id="5335" instrument_node="">) on the relationship between job stressors and job efficacy/satisfaction, as well as efficacy/satisfaction and performance. A competitive climate exists at the store-level to the extent that employees perceive their rewards to be contingent upon comparisons of their performance against their peers (</span><a class="workspace-trigger" data-dcnode-id="5333" href="#bib10" name="bbib10"><span data-dcnode-id="5334" instrument_node="">Brown, Cron, and Slocum 1998</span></a><span data-dcnode-id="5332" instrument_node="">). We propose the counter-intuitive idea that a competitive store-level climate can benefit retail employees in relation to the effects of role stressors. That is, drawing upon cognitive appraisal theory, a discussion of how a competitive climate may actually work to reduce the negative effects associated with retail role stressors is presented. Applying appraisal theory is a key contribution to retailing research since this theory was specifically developed to understand, explain, and predict the effects of perceived organizational stressors in relation to key environmental conditions (</span><a class="workspace-trigger" data-dcnode-id="5330" href="#bib36" name="bbib36"><span data-dcnode-id="5331" instrument_node="">Lazarus 1999</span></a><span data-dcnode-id="5329" instrument_node="">).</span></p><p data-dcnode-id="5320"><span data-dcnode-id="5327" instrument_node="">This investigation is both timely and important given the increasingly competitive and stressful nature of the retail work environment. For example, the combination of retail management's emphasis on increasing the productivity level of individual workers while concurrently reducing man-hours (i.e., getting more done with less) has heightened the importance of self-reliance (</span><a class="workspace-trigger" data-dcnode-id="5325" href="#bib44" name="bbib44"><span data-dcnode-id="5326" instrument_node="">Netemeyer, Thomas, and Boles 2004</span></a><span data-dcnode-id="5324" instrument_node="">). Competitive cost pressures have led to reductions in the number of store-level managers, which have increased stress for all store-level employees (</span><a class="workspace-trigger" data-dcnode-id="5322" href="#bib51" name="bbib51"><span data-dcnode-id="5323" instrument_node="">Rhoads et al. 2002</span></a><span data-dcnode-id="5321" instrument_node="">). Further, corporate retail management commonly emphasizes competition among stores to both “beat” last year's sales figures and perform better than comparable within-chain stores. In at least some cases, management is likely to pass such performance expectations down to the store-level in the form of internal competition among employees. Thus, store-level retail employees are likely to perceive the presence, to varying extents, of both job stressors and a competitive climate. In view of these trends, a more structured investigation into the interaction of retail role stress and competitive climate is necessary.</span></p><p data-dcnode-id="5318"><span data-dcnode-id="5319" instrument_node="">Our research broadens the study of the effects of role stress variables by employing cognitive appraisal theory to develop moderating hypotheses concerning the interrelationships among the constructs of role conflict, role ambiguity, family–work conflict, job efficacy, job satisfaction, and a competitive organizational climate. The next section provides background information on the constructs of interest and cognitive appraisal theory. Next, we briefly discuss expected main effects, and then focus in more detail on the importance of perceived competitive climate as a moderating condition. After developing hypotheses, we present an empirical study that investigates the constructs within the context of a major U.S. retailer. The results reveal that perceived in-store competitive climate moderates key relationships among the constructs. The managerial implications of these results are then discussed.</span></p><section data-dcnode-id="5225" id="aep-section-id11"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5316"><span data-dcnode-id="5317" instrument_node="">Background</span></h2><p data-dcnode-id="5308"><span data-dcnode-id="5315" instrument_node="">Role stress research in marketing shares its conceptualization with the seminal work by </span><a class="workspace-trigger" data-dcnode-id="5313" href="#bib33" name="bbib33"><span data-dcnode-id="5314" instrument_node="">Kahn et al. (1964)</span></a><span data-dcnode-id="5312" instrument_node="">. The focus of much of the empirical research in marketing has been upon role conflict and ambiguity as primary representations of role stress. While the framework does not assess the mental health of an organizational member directly, it does highlight the need to consider the individual's </span><em data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">perception</span></em><span data-dcnode-id="5309" instrument_node=""> of his/her environment, and its associated effect, when considering the attitudinal and behavioral responses to that environment.</span></p><p data-dcnode-id="5297"><span data-dcnode-id="5307" instrument_node="">In this research paradigm, it is generally assumed that stressors impact job-related outcomes through a psychological tension that is created by the stressor (</span><a class="workspace-trigger" data-dcnode-id="5305" href="#bib33" name="bbib33"><span data-dcnode-id="5306" instrument_node="">Kahn et al. 1964</span></a><span data-dcnode-id="5304" instrument_node="">). The assumption that stressors lead to psychological stress is rooted in the sociological perspective of role theory adopted by Kahn and colleagues. In this theory, a </span><em data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">system</span></em><span data-dcnode-id="5301" instrument_node=""> (i.e., a firm, company, and organization) is subjected to “stress” through incompatible or ill-defined expectations placed on its members (i.e., employees) and through their interactions with internal as well as external constituencies. A central notion is that having expectations placed upon the employee from more than one “boss” may have deleterious consequences (</span><a class="workspace-trigger" data-dcnode-id="5299" href="#bib52" name="bbib52"><span data-dcnode-id="5300" instrument_node="">Rizzo, House, and Lirtzman 1970</span></a><span data-dcnode-id="5298" instrument_node="">).</span></p><div data-dcnode-id="5269"><p data-dcnode-id="5289"><span data-dcnode-id="5296" instrument_node="">More recent research has extended the investigation of role stressors to include those that go beyond role ambiguity and role conflict. As </span><a class="workspace-trigger" data-dcnode-id="5294" href="#bib44" name="bbib44"><span data-dcnode-id="5295" instrument_node="">Netemeyer, Brashear-Alejandro, and Boles (2004)</span></a><span data-dcnode-id="5293" instrument_node=""> note, family-related stressors should, at a minimum, be included when researching the potential effects of role stressors upon boundary-spanning employees. Netemeyer and colleagues found that family-related stressors had a stronger effect on employee outcomes than either role conflict or ambiguity. Based upon this research, we include role conflict (RC), role ambiguity (RA), and family–work conflict (FWC) in our empirical model (see </span><a class="workspace-trigger" data-dcnode-id="5291" href="#fig1" name="bfig1"><span data-dcnode-id="5292" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5290" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="5270" id="fig1"><span data-dcnode-id="5279"><img alt="" data-dcnode-id="5288" height="380" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0022435909000141-gr1.jpg&amp;raw"><span data-dcnode-id="5287" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5280"><li data-dcnode-id="5281"><a class="anchor download-link u-font-sans" data-dcnode-id="5282" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0022435909000141-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5283"><span data-dcnode-id="5286" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5284"><span data-dcnode-id="5285" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5271"><span data-dcnode-id="5272"><p data-dcnode-id="5273"><span class="label" data-dcnode-id="5277"><span data-dcnode-id="5278" instrument_node="">Fig. 1</span></span><span data-dcnode-id="5276" instrument_node="">. </span><span data-dcnode-id="5274" instrument_node="">Empirical model results.</span></p></span></span></figure></div><p data-dcnode-id="5261"><span data-dcnode-id="5268" instrument_node="">The present research employs the conceptualizations of role stress variables used by </span><a class="workspace-trigger" data-dcnode-id="5266" href="#bib44" name="bbib44"><span data-dcnode-id="5267" instrument_node="">Netemeyer, Brashear-Alejandro, and Boles (2004, p. 50)</span></a><span data-dcnode-id="5265" instrument_node="">. First, role conflict results from an employee feeling that the demands and expectations of certain job requirements are incompatible with the demands and expectations of other job requirements. For example, a customer request from a retail employee that a cash refund be given without a receipt, when this is contrary to organizational policy, would create a feeling of conflict. Second, role ambiguity reflects employee uncertainty regarding which job behaviors are most appropriate in a given situation. An employee who is given multiple tasks without directive as to prioritization may experience the stress of ambiguity. For example, a retail manager who is directed to have multiple shelf plan-o-gram changes completed by a given date, with no indication of importance of completion order or how this is to be accomplished with limited personnel, all while still performing “routine” and every day duties, would likely experience ambiguity. These expectations for quick and varied work are often then passed along to the individual employee, each of whom would have a unique carrying capacity to deal with such expectations (</span><a class="workspace-trigger" data-dcnode-id="5263" href="#bib2" name="bbib2"><span data-dcnode-id="5264" instrument_node="">Arndt, Arnold, and Landry 2006</span></a><span data-dcnode-id="5262" instrument_node="">). Third, family–work conflict represents a situation in which demands created by the family interfere with performing work-related responsibilities. A retail employee who puts off a given assignment at work to fulfill a family role, or who must think of ways to appease a complaining spouse or child regarding extended absences from home due to long work hours would likely experience this stressor.</span></p><section data-dcnode-id="5226" id="aep-section-id12"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5259"><span data-dcnode-id="5260" instrument_node="">Cognitive appraisal theory and job stressors</span></h3><p data-dcnode-id="5251"><span data-dcnode-id="5258" instrument_node="">Cognitive appraisal theory offers specific insight into organizational competitiveness as a potential moderator of a role stressor. Cognitive appraisal may be described as “a process through which the person evaluates whether a particular encounter with the environment is relevant to his or her well-being, and if so, in what ways” (</span><a class="workspace-trigger" data-dcnode-id="5256" href="#bib20" name="bbib20"><span data-dcnode-id="5257" instrument_node="">Folkman et al. 1986</span></a><span data-dcnode-id="5255" instrument_node="">, p. 992). Appraisal theory explains why the perceived importance of an environmental stimulus (e.g., a role stressor) should matter (</span><a class="workspace-trigger" data-dcnode-id="5253" href="#bib36" name="bbib36"><span data-dcnode-id="5254" instrument_node="">Lazarus 1999</span></a><span data-dcnode-id="5252" instrument_node="">). At the heart of cognitive appraisal theory is the notion that individuals make appraisals that affect the stress that they feel in response to an environmental stimulus (e.g., an ongoing conflict between family and workplace demands). Thus, the same stimulus may be stressful to one person but not to another.</span></p><p data-dcnode-id="5240"><span data-dcnode-id="5250" instrument_node="">While cognitive appraisals may be viewed as unconscious cognitive-affective responses, </span><a class="workspace-trigger" data-dcnode-id="5248" href="#bib35" name="bbib35"><span data-dcnode-id="5249" instrument_node="">Lazarus and Folkman (1984)</span></a><span data-dcnode-id="5247" instrument_node=""> contend that cognitive appraisals extend such responses to include cognitive activity lasting over a long period of time and involving substantial complex reasoning. Formally, cognitive appraisals represent the ongoing mental processing of a situation with respect to an individual's well-being. As such, it aids greatly in the explanation of responses to role stressors, because such stressors tend to be recurrent (chronic), as opposed to isolated (acute), events (</span><a class="workspace-trigger" data-dcnode-id="5245" href="#bib56" name="bbib56"><span data-dcnode-id="5246" instrument_node="">Sikora, Beaty, and Forward 2004</span></a><span data-dcnode-id="5244" instrument_node="">). The working definition of stress adopted here parallels the conceptualization offered by cognitive appraisal theory. </span><a class="workspace-trigger" data-dcnode-id="5242" href="#bib35" name="bbib35"><span data-dcnode-id="5243" instrument_node="">Lazarus and Folkman (1984)</span></a><span data-dcnode-id="5241" instrument_node=""> view stress as stemming from a relationship between the person and environment that is appraised as taxing resources and endangering well-being.</span></p><p data-dcnode-id="5232"><span data-dcnode-id="5239" instrument_node="">For cognitive appraisal theorists, stress is viewed as an outcome of two appraisals—primary and secondary. The primary appraisal is a specific evaluation of the impact that an environmental stimulus will have on the individual (i.e., how will the role stressor personally affect the retail employee?). Research in cognitive appraisal theory supports the proposition that retail employees make evaluations of potential harm or loss associated with situations of role stress (</span><a class="workspace-trigger" data-dcnode-id="5237" href="#bib35" name="bbib35"><span data-dcnode-id="5238" instrument_node="">Lazarus and Folkman 1984</span></a><span data-dcnode-id="5236" instrument_node="">, p. 34). When the individual's evaluation of the environmental stimulus is either positive or irrelevant to the individual's well-being, no further appraisal is necessary. However, when the stimulus is evaluated as stressful to the individual's well-being, then the primary evaluation of situational stressors leads to the secondary appraisal, which is an individual's assessment of his/her ability (means available) to avoid or minimize harm or loss. Further, an assessment of a potentially negative stressor is accompanied by an individual's recognition of the “type” of stressor being encountered (</span><a class="workspace-trigger" data-dcnode-id="5234" href="#bib36" name="bbib36"><span data-dcnode-id="5235" instrument_node="">Lazarus 1999</span></a><span data-dcnode-id="5233" instrument_node="">). In this regard the situational environment becomes all the more important as different types of stress (e.g., role conflict, role ambiguity, and family) would be potentially dealt with through divergent behavioral patterns based upon the type of environment in which the stressor occurs. Such evaluations influence the nature of the secondary appraisal.</span></p><p data-dcnode-id="5227"><span data-dcnode-id="5231" instrument_node="">While role stressors activate primary appraisal, it is the secondary appraisal, and the associated environment in which this appraisal is made, that influences the ultimate effect of the stressor variable (</span><a class="workspace-trigger" data-dcnode-id="5229" href="#bib56" name="bbib56"><span data-dcnode-id="5230" instrument_node="">Sikora, Beaty, and Forward 2004</span></a><span data-dcnode-id="5228" instrument_node="">). Thus, perceptions of the environment that influence the stressors’ effects operate as either moderating or mediating conditions, with our focus here being upon the moderating influence of competitive climate. Such a construct is a key representation of a secondary appraisal element and, as such, is proposed to be a key determinant of a role stressor's ultimate influence.</span></p></section></section><section data-dcnode-id="5035" id="aep-section-id13"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5223"><span data-dcnode-id="5224" instrument_node="">Hypotheses</span></h2><section data-dcnode-id="5177" id="aep-section-id14"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5221"><span data-dcnode-id="5222" instrument_node="">Stressors, job efficacy, satisfaction, and performance</span></h3><p data-dcnode-id="5204"><span data-dcnode-id="5220" instrument_node="">In total, the deleterious effects of stressors (RC, RA, and FWC) on important outcomes, such as job satisfaction, job efficacy and performance, are well-established in the retailing literature (</span><a class="workspace-trigger" data-dcnode-id="5218" href="#bib6" name="bbib6"><span data-dcnode-id="5219" instrument_node="">Bettencourt and Brown 2003</span></a><span data-dcnode-id="5217" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5215" href="#bib9" name="bbib9"><span data-dcnode-id="5216" instrument_node="">Boles, Wood, and Johnson 2003</span></a><span data-dcnode-id="5214" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5212" href="#bib44" name="bbib44"><span data-dcnode-id="5213" instrument_node="">Netemeyer, Brashear-Alejandro, and Boles 2004</span></a><span data-dcnode-id="5211" instrument_node="">) and will not be revisited here as formal hypotheses. Similarly, the positive effect of job efficacy on job satisfaction is also understood (</span><a class="workspace-trigger" data-dcnode-id="5209" href="#bib48" name="bbib48"><span data-dcnode-id="5210" instrument_node="">Piccolo et al. 2005</span></a><span data-dcnode-id="5208" instrument_node="">). In line with this research, we expect that there will be a negative relationship between retail role stressors (RC, RA, and FWC) and job efficacy, which we define as an individual's belief regarding the likelihood that a particular course of action or behavior can be carried out (</span><a class="workspace-trigger" data-dcnode-id="5206" href="#bib5" name="bbib5"><span data-dcnode-id="5207" instrument_node="">Bandura 1977</span></a><span data-dcnode-id="5205" instrument_node="">). In retailing, this implies an individual's belief that s/he is capable of carrying out job tasks necessary to achieve work-related goals.</span></p><p data-dcnode-id="5178"><span data-dcnode-id="5203" instrument_node="">Similarly, we expect that job efficacy is positively related to job satisfaction, which we define as a positive emotional state resulting from the appraisal of an individual's job or job experiences (</span><a class="workspace-trigger" data-dcnode-id="5201" href="#bib39" name="bbib39"><span data-dcnode-id="5202" instrument_node="">Locke 1969</span></a><span data-dcnode-id="5200" instrument_node="">). Further, as demonstrated in previous research (</span><a class="workspace-trigger" data-dcnode-id="5198" href="#bib23" name="bbib23"><span data-dcnode-id="5199" instrument_node="">Halbesleben and Buckley, 2004</span></a><span data-dcnode-id="5197" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5195" href="#bib46" name="bbib46"><span data-dcnode-id="5196" instrument_node="">Pearlin et al., 1981</span></a><span data-dcnode-id="5194" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5192" href="#bib50" name="bbib50"><span data-dcnode-id="5193" instrument_node="">Raghuram and Wiesenfeld, 2004</span></a><span data-dcnode-id="5191" instrument_node="">), job efficacy will partially or fully mediate the negative relationship between role stressors and job satisfaction, implying that efficacy itself will positively affect job satisfaction (</span><a class="workspace-trigger" data-dcnode-id="5189" href="#bib13" name="bbib13"><span data-dcnode-id="5190" instrument_node="">Carver and Scheier, 1990</span></a><span data-dcnode-id="5188" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5186" href="#bib25" name="bbib25"><span data-dcnode-id="5187" instrument_node="">Hsee and Abelson, 1991</span></a><span data-dcnode-id="5185" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5183" href="#bib41" name="bbib41"><span data-dcnode-id="5184" instrument_node="">McDonald and Siegall, 1992</span></a><span data-dcnode-id="5182" instrument_node="">), while also positively influencing job performance (</span><a class="workspace-trigger" data-dcnode-id="5180" href="#bib30" name="bbib30"><span data-dcnode-id="5181" instrument_node="">Jex and Gudanowski 1992</span></a><span data-dcnode-id="5179" instrument_node="">).</span></p></section><section data-dcnode-id="5103" id="aep-section-id15"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5175"><span data-dcnode-id="5176" instrument_node="">Competitive climate moderator</span></h3><p data-dcnode-id="5161"><span data-dcnode-id="5174" instrument_node="">As noted, a competitive climate exists to the extent that employees perceive their rewards to be contingent upon comparisons of their performance against their peers (</span><a class="workspace-trigger" data-dcnode-id="5172" href="#bib10" name="bbib10"><span data-dcnode-id="5173" instrument_node="">Brown, Cron, and Slocum 1998</span></a><span data-dcnode-id="5171" instrument_node="">)—a situation that often exists in retailing (</span><a class="workspace-trigger" data-dcnode-id="5169" href="#bib22" name="bbib22"><span data-dcnode-id="5170" instrument_node="">Grow, Brady, and Arndt 2006</span></a><span data-dcnode-id="5168" instrument_node="">). Although a retail employee's organization may operate in a highly competitive environment (e.g., </span><a class="workspace-trigger" data-dcnode-id="5166" href="#bib15" name="bbib15"><span data-dcnode-id="5167" instrument_node="">Draganska and Klapper 2007</span></a><span data-dcnode-id="5165" instrument_node="">), it is the level of competitiveness at the store-level that will likely determine the effects of job stressors (</span><a class="workspace-trigger" data-dcnode-id="5163" href="#bib10" name="bbib10"><span data-dcnode-id="5164" instrument_node="">Brown, Cron, and Slocum 1998</span></a><span data-dcnode-id="5162" instrument_node="">).</span></p><p data-dcnode-id="5144"><span data-dcnode-id="5160" instrument_node="">Organizations may differ in the competitiveness of the work climate (</span><a class="workspace-trigger" data-dcnode-id="5158" href="#bib10" name="bbib10"><span data-dcnode-id="5159" instrument_node="">Brown, Cron, and Slocum 1998</span></a><span data-dcnode-id="5157" instrument_node="">) and employees may differ in their perception of the competitive climate. Organizations characterized by high competitiveness tend to adopt rules that allocate scarce resources among members in a way that encourages competition. Distributive norms are utilized by the organization to discover differences among retail employees both in terms of their potential to contribute to the organization and their actual contribution (</span><a class="workspace-trigger" data-dcnode-id="5155" href="#bib32" name="bbib32"><span data-dcnode-id="5156" instrument_node="">Kabanoff 1991</span></a><span data-dcnode-id="5154" instrument_node="">). In order to encourage and reward the contributions of top performers, outcomes (e.g., compensation and promotion) are distributed according to input (e.g., revenues generated). Marketing research has demonstrated that, while not universal, it is not uncommon for retail employees (especially in banking, services, or managerial/supervisory roles) to operate in competitively oriented climates (</span><a class="workspace-trigger" data-dcnode-id="5152" href="#bib6" name="bbib6"><span data-dcnode-id="5153" instrument_node="">Bettencourt and Brown 2003</span></a><span data-dcnode-id="5151" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5149" href="#bib18" name="bbib18"><span data-dcnode-id="5150" instrument_node="">Evans, Arnold, and Grant 1999</span></a><span data-dcnode-id="5148" instrument_node="">). For example, </span><a class="workspace-trigger" data-dcnode-id="5146" href="#bib38" name="bbib38"><span data-dcnode-id="5147" instrument_node="">Livingstone, Roberts, and Chonko (1995)</span></a><span data-dcnode-id="5145" instrument_node=""> note the competitive nature of promotions, salary increases, recognition for achievement, or incentive awards among retail personnel.</span></p><p data-dcnode-id="5139"><span data-dcnode-id="5143" instrument_node="">As </span><a class="workspace-trigger" data-dcnode-id="5141" href="#bib10" name="bbib10"><span data-dcnode-id="5142" instrument_node="">Brown, Cron, and Slocum (1998)</span></a><span data-dcnode-id="5140" instrument_node=""> note, employees examine their organization's practices in light of their own personal situations to evaluate the impact of these practices on their personal well-being. Consistent with appraisal theory, we argue that the retail employee will assess role stressors (primary appraisal). If the presence of role stressors is perceived to be problematic, then the employee will assess other factors within the work environment that are likely to influence the individual's ability to cope with the role stressor (secondary appraisal). That is, if the individual perceives detrimental role stressors then s/he will consider competitive climate. The question then becomes: will the perceived level of competitiveness be more likely to soothe or exacerbate the employee's fear related to these stressors? Based on existing research and theory, arguments can be made for two possible effects.</span></p><p data-dcnode-id="5128"><span data-dcnode-id="5138" instrument_node="">First, in a competitive climate an employee will perceive a high likelihood of “sanctions” if performance is below expectations (</span><a class="workspace-trigger" data-dcnode-id="5136" href="#bib21" name="bbib21"><span data-dcnode-id="5137" instrument_node="">Goffman, 1956</span></a><span data-dcnode-id="5135" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5133" href="#bib33" name="bbib33"><span data-dcnode-id="5134" instrument_node="">Kahn et al., 1964</span></a><span data-dcnode-id="5132" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5130" href="#bib7" name="bbib7"><span data-dcnode-id="5131" instrument_node="">Biddle, 1979</span></a><span data-dcnode-id="5129" instrument_node="">). Because role stressors make it more difficult to fulfill implied role expectations, employees are continually required to balance the expectations of management, customers, and family. In a competitive climate, the negative effects of the stressors will be exacerbated by the fear of poor evaluations and of sanctions from management that would accompany low performance (i.e., the climate limits one's ability to minimize harm from the stressor). This fear, then, inhibits the employee's perception that he or she is effective on the job.</span></p><p data-dcnode-id="5120"><span data-dcnode-id="5127" instrument_node="">The proposal that high levels of competitiveness increase the negative effects of role stressors is supported by cognitive comparison processes. A competitive climate would be associated with an increase in comparisons with other employees, enhancing the negative effects of role stressors (</span><a class="workspace-trigger" data-dcnode-id="5125" href="#bib12" name="bbib12"><span data-dcnode-id="5126" instrument_node="">Buunk, Van der Zee, and VanYperen 2001</span></a><span data-dcnode-id="5124" instrument_node="">). Buunk and colleagues suggest that the social cognitive processes underlying role stress is made worse through the process of comparison. Put simply, the anticipated lack of social support that would accompany a competitive climate would cause further stress to the individual (</span><a class="workspace-trigger" data-dcnode-id="5122" href="#bib55" name="bbib55"><span data-dcnode-id="5123" instrument_node="">Seers et al. 1983</span></a><span data-dcnode-id="5121" instrument_node="">). We call this conceptualization the “sanction fear” perspective.</span></p><p data-dcnode-id="5115"><span data-dcnode-id="5119" instrument_node="">On the other hand, some researchers suggest that a competitive organizational climate may spur employees to seek help and strive to break the typical negative cycle caused by role stressors (</span><a class="workspace-trigger" data-dcnode-id="5117" href="#bib4" name="bbib4"><span data-dcnode-id="5118" instrument_node="">Bakker, Demerouti, and Verbeke 2004</span></a><span data-dcnode-id="5116" instrument_node="">). If the retail employee perceives that poor performance will lead to organizational sanctions, then the employee will be less likely to allow the job stressors to continue to negatively influence job outcomes. From this perspective, the organization's competitive climate acts as a cue to change. As a result, when competitiveness is high, it causes the employee to break the negative cycle caused by job stressors. We call this perspective “sanction motivation.”</span></p><p data-dcnode-id="5104"><span data-dcnode-id="5114" instrument_node="">Of the two, we prefer the sanction motivation perspective. While stressors are exogenously created, employees sometimes possess at least partial ability to resolve the stressor (</span><a class="workspace-trigger" data-dcnode-id="5112" href="#bib37" name="bbib37"><span data-dcnode-id="5113" instrument_node="">LePine, Podsakoff, and LePine 2005</span></a><span data-dcnode-id="5111" instrument_node="">). For example, an employee faced with a role ambiguous situation may be able to create clarity for themselves that overcomes the ambiguity. That is, such an employee may perceive that the ambiguity in role definition allows for some degrees of freedom in finding solutions, adapting solutions to exigent circumstances, or applying solutions from other contexts to the current situation. A likely result is a stronger belief in one's ability to perform a given role. Such freedom to innovate, adopt, and or adapt is more likely to occur in more competitive climates than in relatively uncompetitive climates. That is, in a highly competitive climate employees are likely to find that effort expended on proactively coping will lead to noticeable performance differences relative to their competitive set and, thus, lead to valued outcomes or the avoidance of negative outcomes. Accordingly, we hypothesize:</span></p><section data-dcnode-id="5105"><p data-dcnode-id="5108" id="aep-enunciation-id16"><strong data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">H1</span></strong></p><p data-dcnode-id="5106"><span data-dcnode-id="5107" instrument_node="">In comparison to a low competitive climate, in a highly competitive climate the negative relationship between a retail employee's perception of (a) role conflict, (b) role ambiguity, and (c) family–work conflict and job efficacy is diminished.</span></p></section><p></p></section><section data-dcnode-id="5036" id="aep-section-id17"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">Competitive climate moderation of job satisfaction on performance ratings</span></h3><p data-dcnode-id="5070"><span data-dcnode-id="5100" instrument_node="">The relationship between job satisfaction and job performance has been widely debated (e.g. </span><a class="workspace-trigger" data-dcnode-id="5098" href="#bib40" name="bbib40"><span data-dcnode-id="5099" instrument_node="">MacKenzie, Podsakoff, and Ahearne 1998</span></a><span data-dcnode-id="5097" instrument_node="">). Empirical evidence regarding the job satisfaction</span><span data-dcnode-id="5095" instrument_node="">&nbsp;</span><span data-dcnode-id="5093" instrument_node="">→</span><span data-dcnode-id="5091" instrument_node="">&nbsp;</span><span data-dcnode-id="5089" instrument_node="">job performance relationship is variable (</span><a class="workspace-trigger" data-dcnode-id="5087" href="#bib11" name="bbib11"><span data-dcnode-id="5088" instrument_node="">Brown and Peterson 1993</span></a><span data-dcnode-id="5086" instrument_node="">). For example, </span><a class="workspace-trigger" data-dcnode-id="5084" href="#bib26" name="bbib26"><span data-dcnode-id="5085" instrument_node="">Iaffaldano and Muchinsky's (1985)</span></a><span data-dcnode-id="5083" instrument_node=""> review of the satisfaction—performance literature suggests that the statistical correlation between the two constructs (.17) is “illusory.” Other researchers disagree with this conclusion (</span><a class="workspace-trigger" data-dcnode-id="5081" href="#bib53" name="bbib53"><span data-dcnode-id="5082" instrument_node="">Saari and Judge 2004</span></a><span data-dcnode-id="5080" instrument_node="">). In a recent and comprehensive review of the satisfaction–performance relationship, </span><a class="workspace-trigger" data-dcnode-id="5078" href="#bib31" name="bbib31"><span data-dcnode-id="5079" instrument_node="">Judge and colleagues (2001)</span></a><span data-dcnode-id="5077" instrument_node=""> show that, when corrected for sampling and measurement errors, the average correlation between the two constructs increases to .30. They conclude that the correlation between satisfaction and performance is positive and significant. The relationship between satisfaction and valued employee behaviors has been explored and demonstrated in a retail context (</span><a class="workspace-trigger" data-dcnode-id="5075" href="#bib6" name="bbib6"><span data-dcnode-id="5076" instrument_node="">Bettencourt and Brown 2003</span></a><span data-dcnode-id="5074" instrument_node="">). Also supportive is research that demonstrates individuals in a positive mood perform better on creative, interpersonal, and decision-making tasks (</span><a class="workspace-trigger" data-dcnode-id="5072" href="#bib3" name="bbib3"><span data-dcnode-id="5073" instrument_node="">Ashby, Isen, and Turken 1999</span></a><span data-dcnode-id="5071" instrument_node="">).</span></p><p data-dcnode-id="5062"><span data-dcnode-id="5069" instrument_node="">We propose that differences in the perceived competitiveness of the retail work environment may, at least partly, account for the divergent findings concerning the relationship between job satisfaction and supervisor-rated performance. Again, two predictions can be formulated as to the direction of the relationship. Consistent with the sanction motivation perspective, one possibility is that as a competitive climate signals the satisfied employee to </span><em data-dcnode-id="5067"><span data-dcnode-id="5068" instrument_node="">confront</span></em><span data-dcnode-id="5066" instrument_node=""> the challenge, it becomes more likely that positive affect will lead to better performance (i.e., performance ratings increase). Cognitive appraisal theory (</span><a class="workspace-trigger" data-dcnode-id="5064" href="#bib34" name="bbib34"><span data-dcnode-id="5065" instrument_node="">Lazarus and Launier 1978</span></a><span data-dcnode-id="5063" instrument_node="">) suggests that such proactive confrontation is consistent with problem-focused coping, and tends to result in positive outcomes.</span></p><p data-dcnode-id="5045"><span data-dcnode-id="5061" instrument_node="">On the other hand, consistent with the sanction fear perspective, a competitive climate may be perceived as causing undue pressure by the otherwise satisfied employee. In such instances, the employee may “cope” with the challenge by decreasing effort (withdrawing), thus interrupting the beneficial effect of a positive mood on performance. Such activity is consistent with emotion-focused coping; or dealing with a problem by avoiding functional attempts to overcome the problem (</span><a class="workspace-trigger" data-dcnode-id="5059" href="#bib34" name="bbib34"><span data-dcnode-id="5060" instrument_node="">Lazarus and Launier 1978</span></a><span data-dcnode-id="5058" instrument_node="">). These competing lines of thought are consistent with prior research investigating confronting versus coping explanations of RC (</span><a class="workspace-trigger" data-dcnode-id="5056" href="#bib8" name="bbib8"><span data-dcnode-id="5057" instrument_node="">Boles and Babin 1996</span></a><span data-dcnode-id="5055" instrument_node="">); this suggests that some boundary employees perform better when conflict is present (</span><a class="workspace-trigger" data-dcnode-id="5053" href="#bib16" name="bbib16"><span data-dcnode-id="5054" instrument_node="">Dubinsky and Hartley 1986</span></a><span data-dcnode-id="5052" instrument_node="">) while others cope with conflict by reducing job activity (</span><a class="workspace-trigger" data-dcnode-id="5050" href="#bib11" name="bbib11"><span data-dcnode-id="5051" instrument_node="">Brown and Peterson 1993</span></a><span data-dcnode-id="5049" instrument_node="">). And, as noted, the competing activities are also consistent with alternative behaviors proposed by cognitive appraisal theory (</span><a class="workspace-trigger" data-dcnode-id="5047" href="#bib34" name="bbib34"><span data-dcnode-id="5048" instrument_node="">Lazarus and Launier 1978</span></a><span data-dcnode-id="5046" instrument_node="">).</span></p><p data-dcnode-id="5037"><span data-dcnode-id="5044" instrument_node="">Again, we anticipate that sanction motivation will be a better explanation of observed phenomena in the relatively more competitive climate. In competitive climates the emphasis is results-oriented. An aspect of a relatively competitive climate is employee-to-employee comparisons. An employee is likely to find that overcoming challenges and producing results leads to both an increased sense of job satisfaction and increased recognition in the form of better performance evaluations. On the other hand, an employee using, for example, avoidance behaviors in a relatively more competitive climate is likely to find unfavorable comparisons to their competitive set. Accordingly, the employee is less likely to feel satisfied in the job and more likely to receive negative recognition in the form of inferior performance evaluations. In a relatively uncompetitive climate such links between job satisfaction and performance are unlikely to be observed. In these climates, job performance is more likely to be a multi-attribute evaluation in which such issues as ability to get along with others and having a positive attitude are more highly weighted. Thus, cognitive appraisal reasoning suggests that a positive correlation between job satisfaction and performance evaluations will occur in the relatively more competitive climate while no correlation will exist in the relatively uncompetitive environments. Formally stated:</span></p><section data-dcnode-id="5038"><p data-dcnode-id="5041" id="aep-enunciation-id18"><strong data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">H2</span></strong></p><p data-dcnode-id="5039"><span data-dcnode-id="5040" instrument_node="">The positive relationship between a retail employee's job satisfaction and (a) self-rated and (b) supervisor-rated performance will be stronger in a more competitive climate.</span></p></section><p></p></section></section><section data-dcnode-id="4967" id="aep-section-id19"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node="">Methods</span></h2><p data-dcnode-id="5022"><span data-dcnode-id="5032" instrument_node="">Data were collected from a national sample of retail store employees of a large U.S.-based retailer that has a single, broad-based product line and targets both consumer and commercial customers. This organization was chosen because it provided two equally important aspects for our research: (1) the opportunity to match employee responses to supervisor evaluations and (2) substantial variability in responses to our independent variables due to expected store-to-store variation in management styles and operating environments. Packets containing a five-page survey, a supporting letter from the company's regional director of human resources, and a self-addressed business reply envelope were sent to the home addresses of 2,010 employees in the southeastern U.S. The sample plan was cross-sectional rather than nested within store. The cover page of the survey informed respondents that their responses were completely confidential and that no one from the company would see them. However, to match responses with managerial performance evaluations anonymity had to be sacrificed. Therefore, respondents signed a consent form and provided their printed names. The organization requested that a second survey not be sent. Such procedures often suppress response rates (</span><a class="workspace-trigger" data-dcnode-id="5030" href="#bib24" name="bbib24"><span data-dcnode-id="5031" instrument_node="">Helgeson, Voss, and Terpening 2002</span></a><span data-dcnode-id="5029" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5027" href="#bib58" name="bbib58"><span data-dcnode-id="5028" instrument_node="">Yammarino, Skinner, and Childers 1991</span></a><span data-dcnode-id="5026" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5024" href="#bib59" name="bbib59"><span data-dcnode-id="5025" instrument_node="">Yu and Cooper 1983</span></a><span data-dcnode-id="5023" instrument_node="">).</span></p><p data-dcnode-id="5020"><span data-dcnode-id="5021" instrument_node="">Thirty-six survey packets were returned due to bad addresses while four respondents failed to complete at least half the items on one or more multi-item scales and were excluded from the data sets (remaining missing items were replaced via mean substitution resulting in 32 replacements out of 18,834 data points). We received 374 usable employee responses for a response rate of roughly 19 percent. Subsequently, we were able to match the responses of 262 employees with a supervisor's evaluation supplied by the firm. In the analysis reported below, we used the maximum amount of data available for the model. Thus, only if the model included supervisor-rated performance did we limit the data set to 262, otherwise using the 374 responses.</span></p><p data-dcnode-id="4988"><span data-dcnode-id="5019" instrument_node="">Eighty-three percent (83 percent) of respondents were male, 56 percent of respondents spent more than 70 percent of their working time in contact with customers, median respondent age was 38, and median number of years working for the company was six. Because we were limited to a single mail out, we tested for response bias by comparing the early and late respondents on each construct. None of the effects approached significance (all </span><em data-dcnode-id="5017"><span data-dcnode-id="5018" instrument_node="">p</span></em><span data-dcnode-id="5016" instrument_node="">-values greater than .60). Respondents were asked to indicate their job title in an open-ended question. These respondents were coded into three general categories: managers/assistant managers (42 percent of respondents), product specialist/sales representatives (37 percent), and others (21 percent; including customer service representatives, customer consultants, etc.). Tests on the constructs of interest showed a difference on one construct: competitive climate. On this construct employees in the other category (</span><em data-dcnode-id="5014"><span data-dcnode-id="5015" instrument_node="">M</span></em><span data-dcnode-id="5013" instrument_node="">&nbsp;</span><span data-dcnode-id="5011" instrument_node="">=</span><span data-dcnode-id="5009" instrument_node="">&nbsp;</span><span data-dcnode-id="5007" instrument_node="">4.73) perceived the climate as significantly less competitive than either the sales (</span><em data-dcnode-id="5005"><span data-dcnode-id="5006" instrument_node="">M</span></em><span data-dcnode-id="5004" instrument_node="">&nbsp;</span><span data-dcnode-id="5002" instrument_node="">=</span><span data-dcnode-id="5000" instrument_node="">&nbsp;</span><span data-dcnode-id="4998" instrument_node="">6.28) or managerial employees (</span><em data-dcnode-id="4996"><span data-dcnode-id="4997" instrument_node="">M</span></em><span data-dcnode-id="4995" instrument_node="">&nbsp;</span><span data-dcnode-id="4993" instrument_node="">=</span><span data-dcnode-id="4991" instrument_node="">&nbsp;</span><span data-dcnode-id="4989" instrument_node="">5.80). We note here that none of the managerial employees were the evaluating supervisor for any of the other employees in the sample.</span></p><p data-dcnode-id="4968"><span data-dcnode-id="4987" instrument_node="">We used or adapted existing measures for constructs (see </span><a class="workspace-trigger" data-dcnode-id="4985" href="#app1" name="bapp1"><span data-dcnode-id="4986" instrument_node="">Appendix A</span></a><span data-dcnode-id="4984" instrument_node="">). A measure of RA was taken from </span><a class="workspace-trigger" data-dcnode-id="4982" href="#bib52" name="bbib52"><span data-dcnode-id="4983" instrument_node="">Rizzo, House, and Lirtzman (1970)</span></a><span data-dcnode-id="4981" instrument_node="">. Each of the six items in the original scale ended with the phrase “…in my selling position.” Because our respondents also included supervisors, we changed the phrase to read “…in my job.” The measure of RC, also from </span><a class="workspace-trigger" data-dcnode-id="4979" href="#bib52" name="bbib52"><span data-dcnode-id="4980" instrument_node="">Rizzo, House, and Lirtzman (1970)</span></a><span data-dcnode-id="4978" instrument_node="">, included the four items that most directly pertained to the retail jobs. The third stressor, family–work conflict, was measured by a five item scale from </span><a class="workspace-trigger" data-dcnode-id="4976" href="#bib43" name="bbib43"><span data-dcnode-id="4977" instrument_node="">Netemeyer, Boles, and McMurrian (1996)</span></a><span data-dcnode-id="4975" instrument_node="">. Job satisfaction was assessed by six items, which were taken from a mix of previous scales designed to measure the construct. The measure of a competitive climate was adapted from </span><a class="workspace-trigger" data-dcnode-id="4973" href="#bib10" name="bbib10"><span data-dcnode-id="4974" instrument_node="">Brown, Cron, and Slocum 1998)</span></a><span data-dcnode-id="4972" instrument_node="">. The measure of job efficacy was adapted from a measure of general self-efficacy developed by </span><a class="workspace-trigger" data-dcnode-id="4970" href="#bib42" name="bbib42"><span data-dcnode-id="4971" instrument_node="">Mowen (2000)</span></a><span data-dcnode-id="4969" instrument_node="">.</span></p></section><section data-dcnode-id="4198" id="aep-section-id20"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4965"><span data-dcnode-id="4966" instrument_node="">Results</span></h2><div data-dcnode-id="4619"><p data-dcnode-id="4834"><span data-dcnode-id="4964" instrument_node="">Confirmatory factor analysis of the measurement model resulted in marginal fit indices (</span><em data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">χ</span></em><sup data-dcnode-id="4960"><span data-dcnode-id="4961" instrument_node="">2</span></sup><span data-dcnode-id="4959" instrument_node="">&nbsp;</span><span data-dcnode-id="4957" instrument_node="">=</span><span data-dcnode-id="4955" instrument_node="">&nbsp;</span><span data-dcnode-id="4953" instrument_node="">1331.7, </span><em data-dcnode-id="4951"><span data-dcnode-id="4952" instrument_node="">df</span></em><span data-dcnode-id="4950" instrument_node="">&nbsp;</span><span data-dcnode-id="4948" instrument_node="">=</span><span data-dcnode-id="4946" instrument_node="">&nbsp;</span><span data-dcnode-id="4944" instrument_node="">474, </span><em data-dcnode-id="4942"><span data-dcnode-id="4943" instrument_node="">p</span></em><span data-dcnode-id="4941" instrument_node="">&nbsp;</span><span data-dcnode-id="4939" instrument_node="">&lt;</span><span data-dcnode-id="4937" instrument_node="">&nbsp;</span><span data-dcnode-id="4935" instrument_node="">.001), CFI</span><span data-dcnode-id="4933" instrument_node="">&nbsp;</span><span data-dcnode-id="4931" instrument_node="">=</span><span data-dcnode-id="4929" instrument_node="">&nbsp;</span><span data-dcnode-id="4927" instrument_node="">.89, TLI</span><span data-dcnode-id="4925" instrument_node="">&nbsp;</span><span data-dcnode-id="4923" instrument_node="">=</span><span data-dcnode-id="4921" instrument_node="">&nbsp;</span><span data-dcnode-id="4919" instrument_node="">.87, and RMSEA</span><span data-dcnode-id="4917" instrument_node="">&nbsp;</span><span data-dcnode-id="4915" instrument_node="">=</span><span data-dcnode-id="4913" instrument_node="">&nbsp;</span><span data-dcnode-id="4911" instrument_node="">.070). Analysis revealed cross-loadings among a number of the items. As a result, one item was removed from each of the following scales: family conflict, RA, RC, competitive climate, and job efficacy. The fit indices of the revised model were satisfactory (</span><em data-dcnode-id="4909"><span data-dcnode-id="4910" instrument_node="">χ</span></em><sup data-dcnode-id="4907"><span data-dcnode-id="4908" instrument_node="">2</span></sup><span data-dcnode-id="4906" instrument_node="">&nbsp;</span><span data-dcnode-id="4904" instrument_node="">=</span><span data-dcnode-id="4902" instrument_node="">&nbsp;</span><span data-dcnode-id="4900" instrument_node="">874.5, </span><em data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">df</span></em><span data-dcnode-id="4897" instrument_node="">&nbsp;</span><span data-dcnode-id="4895" instrument_node="">=</span><span data-dcnode-id="4893" instrument_node="">&nbsp;</span><span data-dcnode-id="4891" instrument_node="">329, </span><em data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">p</span></em><span data-dcnode-id="4888" instrument_node="">&nbsp;</span><span data-dcnode-id="4886" instrument_node="">&lt;</span><span data-dcnode-id="4884" instrument_node="">&nbsp;</span><span data-dcnode-id="4882" instrument_node="">.001), CFI</span><span data-dcnode-id="4880" instrument_node="">&nbsp;</span><span data-dcnode-id="4878" instrument_node="">=</span><span data-dcnode-id="4876" instrument_node="">&nbsp;</span><span data-dcnode-id="4874" instrument_node="">.92, TLI</span><span data-dcnode-id="4872" instrument_node="">&nbsp;</span><span data-dcnode-id="4870" instrument_node="">=</span><span data-dcnode-id="4868" instrument_node="">&nbsp;</span><span data-dcnode-id="4866" instrument_node="">.90, and RMSEA</span><span data-dcnode-id="4864" instrument_node="">&nbsp;</span><span data-dcnode-id="4862" instrument_node="">=</span><span data-dcnode-id="4860" instrument_node="">&nbsp;</span><span data-dcnode-id="4858" instrument_node="">.067). Composite reliabilities (</span><em data-dcnode-id="4856"><span data-dcnode-id="4857" instrument_node="">r</span></em><sub data-dcnode-id="4854"><span data-dcnode-id="4855" instrument_node="">xx</span></sub><span data-dcnode-id="4853" instrument_node="">&nbsp;</span><span data-dcnode-id="4851" instrument_node="">&gt;</span><span data-dcnode-id="4849" instrument_node="">&nbsp;</span><span data-dcnode-id="4847" instrument_node="">.70) and coefficient alphas (</span><em data-dcnode-id="4845"><span data-dcnode-id="4846" instrument_node="">α</span></em><span data-dcnode-id="4844" instrument_node="">&nbsp;</span><span data-dcnode-id="4842" instrument_node="">&gt;</span><span data-dcnode-id="4840" instrument_node="">&nbsp;</span><span data-dcnode-id="4838" instrument_node="">.80) were satisfactory. Zero-order correlations and coefficient alphas are provided in </span><a class="workspace-trigger" data-dcnode-id="4836" href="#tbl1" name="btbl1"><span data-dcnode-id="4837" instrument_node="">Table 1</span></a><span data-dcnode-id="4835" instrument_node="">.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4620" id="tbl1"><span class="captions" data-dcnode-id="4826"><span data-dcnode-id="4827"><p data-dcnode-id="4828"><span class="label" data-dcnode-id="4832"><span data-dcnode-id="4833" instrument_node="">Table 1</span></span><span data-dcnode-id="4831" instrument_node="">. </span><span data-dcnode-id="4829" instrument_node="">Descriptive statistics and bivariate correlations.</span></p></span></span><div class="groups" data-dcnode-id="4644"><table data-dcnode-id="4645"><thead class="valign-top" data-dcnode-id="4803"><tr data-dcnode-id="4804"><th class="rowsep-1" data-dcnode-id="4825" scope="col"></th><th class="rowsep-1 align-left" data-dcnode-id="4823" scope="col"><span data-dcnode-id="4824" instrument_node="">Mean</span></th><th class="rowsep-1 align-left" data-dcnode-id="4821" scope="col"><span data-dcnode-id="4822" instrument_node="">S.D.</span></th><th class="rowsep
