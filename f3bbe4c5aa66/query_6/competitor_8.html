</span><p data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">The way people are shopping is changing and economic indicators have been terrible for the industry lately. The need for new retail innovation ideas and trends is growing stronger.</span></p><span data-dcnode-id="3384" instrument_node="">
</span><p data-dcnode-id="3379"><span data-dcnode-id="3383" instrument_node="">As of July 2018 </span><a data-dcnode-id="3381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailymail.co.uk/news/article-5907167/Daily-Mail-campaign-save-Britains-high-streets-50-000-retail-jobs-cut.html%3FITO%3D1490%26ns_mchannel%3Drss%26ns_campaign%3D1490" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3382" instrument_node="">up to 50,000 retail jobs have disappeared</span></a><span data-dcnode-id="3380" instrument_node="">. And only within the last six months, COVID-19 has further decimated the role of retail in our society. </span></p><span data-dcnode-id="3378" instrument_node="">
</span><p data-dcnode-id="3368"><strong data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">Changes in consumer habits</span></strong><span data-dcnode-id="3375" instrument_node=""> are one of the principal reasons. For the last 4 years, the UK has topped</span><strong data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node=""> </span></strong><span data-dcnode-id="3372" instrument_node="">the list of countries with </span><a data-dcnode-id="3370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invespcro.com/blog/global-online-retail-spending-statistics-and-trends/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3371" instrument_node="">online retail sales as a&nbsp;percentage of total retail sales (15,6%)</span></a><span data-dcnode-id="3369" instrument_node="">. </span></p><span data-dcnode-id="3367" instrument_node="">
</span><p data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">It is also the second country with the highest e-commerce revenue on average&nbsp;per online shopper in the world (£1629), with only the US ahead.</span></p><span data-dcnode-id="3364" instrument_node="">
</span><p data-dcnode-id="3357"><span data-dcnode-id="3363" instrument_node="">These giant retail spaces aren’t going instinct, they’re finding a second life in </span><a data-dcnode-id="3361" href="#vocational-training" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3362" instrument_node="">surprising ways</span></a><span data-dcnode-id="3360" instrument_node=""> with retail innovation ideas </span><br data-dcnode-id="3359"><br data-dcnode-id="3358"></p><span data-dcnode-id="3356" instrument_node="">

</span><h3 data-dcnode-id="3204"><span class="ez-toc-section" data-dcnode-id="3207" id="Things_were_getting_bad_for_the_retail_sector_prior_to_the_pandemic"></span><span data-dcnode-id="3206" instrument_node="">Things were getting bad for the retail sector prior to the pandemic. </span><span class="ez-toc-section-end" data-dcnode-id="3205"></span></h3><span data-dcnode-id="3203" instrument_node="">
</span><p data-dcnode-id="3199"><a data-dcnode-id="3201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/lifeandstyle/2018/feb/22/casual-dining-crunch-jamies-italian-strada-byron-struggling" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3202" instrument_node="">A 2016 study conducted by YouGov</span></a><span data-dcnode-id="3200" instrument_node=""> showed that eating out was the primal source of spending in London. People eating out more often and at a higher cost meant even mid-market restaurants were closing by the dozens. The situation for physical retail and dining was already grim before a global pandemic hit.</span></p><span data-dcnode-id="3198" instrument_node="">
</span><p data-dcnode-id="3190"><span data-dcnode-id="3197" instrument_node="">The casual dining retail market has been over-exploited in London for at least the last decade, following the enormous food and beverage business present in the city. Nowadays, the hottest retail innovation lies in </span><strong data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">food delivery services</span></strong><span data-dcnode-id="3194" instrument_node="">, with companies like Uber leading the way with its </span><a data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//table.skift.com/2017/08/16/how-ubereats-works-with-restaurants/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3193" instrument_node="">UberEats</span></a><span data-dcnode-id="3191" instrument_node=""> section. </span></p><span data-dcnode-id="3189" instrument_node="">
</span><p data-dcnode-id="3184"><span data-dcnode-id="3188" instrument_node="">In fact, UberEats is bigger than its mothership in 19 European cities, including the British capital, </span><a data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nordic.businessinsider.com/ubereats-is-outgrowing-uber-in-some-cities-2017-12%3Fr%3DUS%26IR%3DT" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3187" instrument_node="">where they are able to deliver food in under 25 minutes,</span></a><span data-dcnode-id="3185" instrument_node=""> one of the fastest runs in the world.</span></p><span data-dcnode-id="3183" instrument_node="">
</span><p data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">This proves that even the biggest and most consolidated business sectors are suffering deep changes in the UK, where new doors are opening as the traditional activity is being challenged and new retail trends are emerging.</span></p><span data-dcnode-id="3180" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3166"><picture class="wp-image-12622" data-dcnode-id="3174"><span data-dcnode-id="3179" instrument_node="">

</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3164" style="height:100px"></div><span data-dcnode-id="3163" instrument_node="">
</span><h2 data-dcnode-id="3157"><span class="ez-toc-section" data-dcnode-id="3162" id="The_retail_downturn_started_10_years_ago"></span><strong data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">The retail downturn</span></strong><span data-dcnode-id="3159" instrument_node=""> started 10 years ago</span><span class="ez-toc-section-end" data-dcnode-id="3158"></span></h2><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3148"><span data-dcnode-id="3155" instrument_node="">Everything that screams traditional retail is </span><strong data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">currently</span></strong><span data-dcnode-id="3152" instrument_node=""> </span><strong data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">struggling </span></strong><span data-dcnode-id="3149" instrument_node="">in the country, more so in its capital city – London.</span></p><span data-dcnode-id="3147" instrument_node="">
</span><p data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">London might be a prime example of how and why the retail industry needs to change. </span></p><span data-dcnode-id="3144" instrument_node="">
</span><p data-dcnode-id="3136"><span data-dcnode-id="3143" instrument_node="">The current economic situation and the global pandemic have become a perfect storm for </span><strong data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">retail</span></strong><span data-dcnode-id="3140" instrument_node=""> </span><strong data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">innovation</span></strong><span data-dcnode-id="3137" instrument_node="">. </span></p><span data-dcnode-id="3135" instrument_node="">
</span><p data-dcnode-id="3129"><span data-dcnode-id="3134" instrument_node="">It was just a matter of time and logic, but now </span><em data-dcnode-id="3131"><strong data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">retail innovation</span></strong></em><span data-dcnode-id="3130" instrument_node=""> is happening at light speed out of necessity. </span></p><span data-dcnode-id="3128" instrument_node="">
</span><p data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">With rent rates going up, business margins becoming harder to reap, low salaries weighing down the middle class. </span></p><span data-dcnode-id="3125" instrument_node="">
</span><p data-dcnode-id="3121"><span data-dcnode-id="3124" instrument_node="">The convenience of online shopping and food delivery going from an alternative to a way of life. Retail stores are facing omens of doom.</span><br data-dcnode-id="3123"><br data-dcnode-id="3122"></p><span data-dcnode-id="3120" instrument_node="">
</span><h3 data-dcnode-id="3116"><span class="ez-toc-section" data-dcnode-id="3119" id="Retail_industry_and_taxes"></span><span data-dcnode-id="3118" instrument_node="">Retail industry and taxes</span><span class="ez-toc-section-end" data-dcnode-id="3117"></span></h3><span data-dcnode-id="3115" instrument_node="">
</span><p data-dcnode-id="3111"><a data-dcnode-id="3113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailymail.co.uk/news/article-5907167/Daily-Mail-campaign-save-Britains-high-streets-50-000-retail-jobs-cut.html%3FITO%3D1490%26ns_mchannel%3Drss%26ns_campaign%3D1490" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3114" instrument_node="">Taxes are on the rise for major retailers in the city center</span></a><span data-dcnode-id="3112" instrument_node="">, while online stores and non-central shopping centers avoid the taxman’s ax. </span></p><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3105"><span data-dcnode-id="3109" instrument_node="">Pricey business rental rates are also counterproductive. Basically, cities are </span><strong data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">out-pricing </span></strong><span data-dcnode-id="3106" instrument_node="">every potential retail renter that could afford to run their business in these locations.</span></p><span data-dcnode-id="3104" instrument_node="">
</span><p data-dcnode-id="3101"><span data-dcnode-id="3103" instrument_node="">Big retailers have so many open fronts that it has become impossible to survive in an environment that condemns them no matter what strategy they take. The situation is looking gloomy.</span><br data-dcnode-id="3102"></p><span data-dcnode-id="3100" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3099" style="height:100px"></div><span data-dcnode-id="3098" instrument_node="">
</span><h2 data-dcnode-id="3093"><span class="ez-toc-section" data-dcnode-id="3097" id="Where_are_the_window_shoppers"></span><strong data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">Where are the window shoppers?</span></strong><span class="ez-toc-section-end" data-dcnode-id="3094"></span></h2><span data-dcnode-id="3092" instrument_node="">
</span><p data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">Gone. Thanks Corona Virus. </span></p><span data-dcnode-id="3089" instrument_node="">
</span><p data-dcnode-id="3084"><span data-dcnode-id="3088" instrument_node="">More important than the changing landscape of businesses is the fact that </span><a data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/stevendennis/2018/03/19/physical-retail-is-not-dead-boring-retail-is-understanding-retails-great-bifurcation/%23b39211e19815" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3087" instrument_node="">people just don’t stop by anymore</span></a><span data-dcnode-id="3085" instrument_node="">. Again, prior to Covid-19, foot traffic that led to purchase was down. </span></p><span data-dcnode-id="3083" instrument_node="">
</span><p data-dcnode-id="3078"><span data-dcnode-id="3082" instrument_node="">Traditional “window shopping” is slowing. Many use the opportunity to compare and then buy online. That explains the </span><strong data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">huge success</span></strong><span data-dcnode-id="3079" instrument_node=""> of Amazon and any service similar to it.</span></p><span data-dcnode-id="3077" instrument_node="">
</span><p data-dcnode-id="3072"><span data-dcnode-id="3076" instrument_node="">Not in vain, the first </span><a data-dcnode-id="3074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/technology/2016/dec/14/amazon-claims-first-successful-prime-air-drone-delivery" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3075" instrument_node="">Amazon Prime Air drone delivery</span></a><span data-dcnode-id="3073" instrument_node=""> happened in Cambridge in 2016. The service to the general public could be available in the near future if upcoming laws in air traffic control allow for drone delivery. </span></p><span data-dcnode-id="3071" instrument_node="">
</span><p data-dcnode-id="3062"><span data-dcnode-id="3070" instrument_node="">It doesn’t seem like a society that is openly preparing itself for </span><strong data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">retail innovation</span></strong><span data-dcnode-id="3067" instrument_node=""> or perhaps a </span><em data-dcnode-id="3064"><strong data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">retail revolution</span></strong></em><span data-dcnode-id="3063" instrument_node="">. </span></p><span data-dcnode-id="3061" instrument_node="">
</span><p data-dcnode-id="3056"><span data-dcnode-id="3060" instrument_node="">Thus, the culture of </span><a data-dcnode-id="3058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//latimesblogs.latimes.com/jacketcopy/2009/10/in-praise-of-browsing.html" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3059" instrument_node="">browsing is coming to an end</span></a><span data-dcnode-id="3057" instrument_node="">. </span></p><span data-dcnode-id="3055" instrument_node="">
</span><p data-dcnode-id="3050"><span data-dcnode-id="3054" instrument_node="">Nowadays, even when people do swerve into shops to browse, they usually do it because they’re considering purchasing those products </span><strong data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">online </span></strong><span data-dcnode-id="3051" instrument_node="">after finding the best deal. </span></p><span data-dcnode-id="3049" instrument_node="">
</span><p data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">Big storefront surfaces are closing at an alarming rate, even those that were apparently solidly established. The high streets, which hold over half of London’s jobs, feel helpless in the face of a deep crisis that is threatening their integrity. New trends in retail are therefore crucial for survival.</span></p><span data-dcnode-id="3046" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3032"><picture class="wp-image-12677" data-dcnode-id="3040"><span data-dcnode-id="3045" instrument_node="">

</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="3030" style="height:100px"></div><span data-dcnode-id="3029" instrument_node="">
</span><h2 data-dcnode-id="3022"><span class="ez-toc-section" data-dcnode-id="3028" id="Retail_Trends_Innovation_The_death_of_malls"></span><span data-dcnode-id="3027" instrument_node="">Retail Trends &amp; Innovation: </span><strong data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">The death of malls</span></strong><span data-dcnode-id="3024" instrument_node=""> </span><span class="ez-toc-section-end" data-dcnode-id="3023"></span></h2><span data-dcnode-id="3021" instrument_node="">
</span><p data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">The old-fashioned multi-space, include-all malls were never going to have a place in the near future of consumer culture in their current form. </span></p><span data-dcnode-id="3018" instrument_node="">
</span><p data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">Perhaps, the demise of entire multinational chain stores that used to be part of the city’s landscape was not so obviously near, but it is happening, nonetheless.</span></p><span data-dcnode-id="3015" instrument_node="">
</span><p data-dcnode-id="2998"><span data-dcnode-id="3014" instrument_node="">Once (not so long ago) solid businesses like </span><a data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2018/jun/07/house-of-fraser-to-close-more-than-half-of-its-british-stores" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3013" instrument_node="">House of Fraser</span></a><span data-dcnode-id="3011" instrument_node="">, </span><a data-dcnode-id="3009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesun.co.uk/money/5691232/toys-r-us-store-closure-uk-administration-closing-down-sale/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3010" instrument_node="">Toys“R”Us</span></a><span data-dcnode-id="3008" instrument_node="">, </span><a data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.maplin.co.uk/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3007" instrument_node="">Maplin</span></a><span data-dcnode-id="3005" instrument_node=""> or </span><a data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailymail.co.uk/news/article-5431713/Sir-Philip-Green-discussed-selling-Topshop-despite-denial.html" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="3004" instrument_node="">BHS</span></a><span data-dcnode-id="3002" instrument_node=""> have all </span><strong data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">closed down</span></strong><span data-dcnode-id="2999" instrument_node="">, leaving an uncertain future ahead. For the record, BHS sold for just £1 by Topshop owner Sir Philip Green to Retail Acquisitions Ltd. in London, 2015. </span></p><span data-dcnode-id="2997" instrument_node="">
</span><p data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">You know the sea is getting rough when the big ships are starting to sink.</span></p><span data-dcnode-id="2994" instrument_node="">
</span><p data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">There are so many newly emptied commercial spaces, that the commercial and shopping districts look unrecognizable. </span></p><span data-dcnode-id="2991" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2990" style="height:100px"></div><span data-dcnode-id="2989" instrument_node="">
</span><h2 data-dcnode-id="2984"><span class="ez-toc-section" data-dcnode-id="2988" id="Emerging_Retail_Innovation"></span><strong data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">Emerging Retail Innovation</span></strong><span class="ez-toc-section-end" data-dcnode-id="2985"></span></h2><span data-dcnode-id="2983" instrument_node="">
</span><p data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">Despite the clearly inauspicious times, a new multi-brand adventure shaped by several big retail brands began last March. </span></p><span data-dcnode-id="2980" instrument_node="">
</span><p data-dcnode-id="2972"><span data-dcnode-id="2979" instrument_node="">When they opened a </span><a data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/news/business/news/westfield-london-white-city-largest-shopping-centre-europe-expansion-john-lewis-hm-a8265071.html" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2978" instrument_node="">£600 million, 740,000 sq ft extension at the Westfield London mall</span></a><span data-dcnode-id="2976" instrument_node="">, it became </span><strong data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">the largest mall in Europe</span></strong><span data-dcnode-id="2973" instrument_node="">. </span></p><span data-dcnode-id="2971" instrument_node="">
</span><p data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">Some of these brands are Primark, Urban Decay, Currys Pc World, or Bravissimo, kings of retail that want to offer a battle for the revolution of their sector by diging deep into retail innovation.</span></p><span data-dcnode-id="2968" instrument_node="">
</span><p data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">It’s still too early to speculate on their success. Just as it’s yet to be seen whether this extension opened as a result of savvy business expansion. </span></p><span data-dcnode-id="2965" instrument_node="">
</span><p data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">Or perhaps it’s a last-ditch desperate attempt to save a collectively failing businesses by serving up a “newer” look on the dying model.</span></p><span data-dcnode-id="2962" instrument_node="">
</span><p data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">Even though online shopping has changed the entire game, it would be naive to point it out as the only culprit to blame for the drastic changes. </span></p><span data-dcnode-id="2959" instrument_node="">
</span><p data-dcnode-id="2954"><span data-dcnode-id="2958" instrument_node="">The state of the economy plays a </span><strong data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">crucial </span></strong><span data-dcnode-id="2955" instrument_node="">part in consumer behavior. </span></p><span data-dcnode-id="2953" instrument_node="">
</span><p data-dcnode-id="2948"><span data-dcnode-id="2952" instrument_node="">Plain and simple, people have </span><em data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">less </span></em><span data-dcnode-id="2949" instrument_node="">money to spend, and physical retail stores aren’t considered as an option anymore.</span></p><span data-dcnode-id="2947" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2933"><picture class="wp-image-12678" data-dcnode-id="2941"><span data-dcnode-id="2946" instrument_node="">

</span><h2 data-dcnode-id="2923"><span class="ez-toc-section" data-dcnode-id="2929" id="Retail_Trends_Innovation_The_rise_of_fast_fashion_in_retail"></span><span data-dcnode-id="2928" instrument_node="">Retail Trends &amp; Innovation: </span><strong data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">The rise of fast fashion</span></strong><span data-dcnode-id="2925" instrument_node=""> in retail</span><span class="ez-toc-section-end" data-dcnode-id="2924"></span></h2><span data-dcnode-id="2922" instrument_node="">
</span><p data-dcnode-id="2917"><span data-dcnode-id="2921" instrument_node="">If there is one sector that has suffered the most pronounced change, it’s </span><strong data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">the fashion and clothing industry</span></strong><span data-dcnode-id="2918" instrument_node="">. </span></p><span data-dcnode-id="2916" instrument_node="">
</span><p data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">Long since gone are the days when malls bloomed with myriads of customers who went from one store to another, looking for clothes in the best way they knew.</span></p><span data-dcnode-id="2913" instrument_node="">
</span><p data-dcnode-id="2905"><span data-dcnode-id="2912" instrument_node="">Today, in a list of the </span><a data-dcnode-id="2910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.businessinsider.com/the-coolest-fashion-startups-in-london-2015-9%3Fr%3DUK%26IR%3DT%231-farfetch--independent-fashion-thats-all-in-one-place-14" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2911" instrument_node="">14 coolest fashion startups in London made by Business Insider</span></a><span data-dcnode-id="2909" instrument_node="">, ALL of these retail operators perform </span><strong data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">solely online</span></strong><span data-dcnode-id="2906" instrument_node="">. </span></p><span data-dcnode-id="2904" instrument_node="">
</span><p data-dcnode-id="2896"><span data-dcnode-id="2903" instrument_node="">Needless to say, the future (and present) of fashion is closer to models like </span><a data-dcnode-id="2901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fashionunited.uk/news/business/5-reasons-why-asos-continues-to-be-successful/2017081825534" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2902" instrument_node="">ASOS</span></a><span data-dcnode-id="2900" instrument_node=""> or </span><a data-dcnode-id="2898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.news.com.au/finance/business/retail/meet-the-boohoo-billionaires-who-turned-a-market-stall-into-a-44-billion-fashion-empire/news-story/3c2b09be2deedcf0c62bea8402f52da5" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2899" instrument_node="">Boohoo’s</span></a><span data-dcnode-id="2897" instrument_node=""> than that of traditional physical stores.</span></p><span data-dcnode-id="2895" instrument_node="">
</span><p data-dcnode-id="2890"><span data-dcnode-id="2894" instrument_node="">Currently, physical brands like </span><a data-dcnode-id="2892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fashionunited.uk/news/retail/inditex-opens-the-zara-store-of-tomorrow-at-westfield-stratford/2018051729700" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2893" instrument_node="">Zara are breaking the mold to dynamize their stores</span></a><span data-dcnode-id="2891" instrument_node=""> in order to maintain the customer flow. </span></p><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2881"><span data-dcnode-id="2888" instrument_node="">The other “big fish” in this retail field know that they need to come up with new retail innovations and trends in order to compete with an </span><strong data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">ever-growing</span></strong><span data-dcnode-id="2885" instrument_node=""> </span><strong data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">e-commerce market</span></strong><span data-dcnode-id="2882" instrument_node="">, which is even stronger in a city like London. </span></p><span data-dcnode-id="2880" instrument_node="">
</span><p data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">Customers are getting more used to immediacy, more choices, and the capacity to shop 24/7. </span></p><span data-dcnode-id="2877" instrument_node="">
</span><p data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">Big retailers need to find out how to amortize the cost of their physical retail.</span></p><span data-dcnode-id="2874" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2860"><picture class="wp-image-12623" data-dcnode-id="2868"><span data-dcnode-id="2873" instrument_node="">
</span><source data-dcnode-id="2872" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://klintmarketing.com/wp-content/uploads/2020/09/2-min.png.webp 1024w, https://klintmarketing.com/wp-content/uploads/2020/09/2-min-300x199.png.webp 300w, https://klintmarketing.com/wp-content/uploads/2020/09/2-min-768x510.png.webp 768w, https://klintmarketing.com/wp-content/uploads/2020/09/2-min-150x100.png.webp 150w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20680'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="2871" instrument_node="">

</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2858" style="height:100px"></div><span data-dcnode-id="2857" instrument_node="">
</span><h2 data-dcnode-id="2851"><span class="ez-toc-section" data-dcnode-id="2856" id="Retail_Trends_Innovation_Generation_Z_is_pushing_the_limits_of_innovation_in_retail"></span><span data-dcnode-id="2855" instrument_node="">Retail Trends &amp; Innovation: </span><strong data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">Generation Z is pushing the limits of innovation in retail</span></strong><span class="ez-toc-section-end" data-dcnode-id="2852"></span></h2><span data-dcnode-id="2850" instrument_node="">
</span><p data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">Teenagers, for example, have grown out of what used to be their preference. </span></p><span data-dcnode-id="2847" instrument_node="">
</span><p data-dcnode-id="2842"><span data-dcnode-id="2846" instrument_node="">The iconic brand-centered fashion, forcing entire consolidated companies and chains dedicated to that standard to their </span><strong data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">breaking point</span></strong><span data-dcnode-id="2843" instrument_node="">. </span></p><span data-dcnode-id="2841" instrument_node="">
</span><p data-dcnode-id="2837"><a data-dcnode-id="2839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2015/feb/25/clothing-retailers-teens-abercrombie-fitch-wet-seal-aeropostale-hollister" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2840" instrument_node="">Brands like Hollister, Aeropostale, American Eagle, Wet Seal or Abrecrombie &amp; Fitch</span></a><span data-dcnode-id="2838" instrument_node="">, once widely popular, are fighting for relevancy in a fast-changing retail scene.</span></p><span data-dcnode-id="2836" instrument_node="">
</span><p data-dcnode-id="2828"><span data-dcnode-id="2835" instrument_node="">Apart from its fashion-wise loss of popularity, Abercrombie &amp; Fitch has made </span><a data-dcnode-id="2833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/life-style/fashion/news/abercrombie-fitch-model-tells-of-racism-sexual-harassment-and-discrimination-at-store-10175646.html" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2834" instrument_node="">countless headlines</span></a><span data-dcnode-id="2832" instrument_node="">&nbsp;due to the social </span><a data-dcnode-id="2830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//klintmarketing.com/35-rebranding-fails/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2831" instrument_node="">scandals surrounding the brand.</span></a><span data-dcnode-id="2829" instrument_node=""> </span></p><span data-dcnode-id="2827" instrument_node="">
</span><p data-dcnode-id="2822"><span data-dcnode-id="2826" instrument_node="">There have been some </span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/the-abercrombie-and-fitch-disaster-timeline-how-abercrombie-and-fitch-ceo-mike-jeffries-screwed-up-americas-sexiest-brand-2012-6" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2825" instrument_node="">scandals</span></a><span data-dcnode-id="2823" instrument_node="">. </span></p><span data-dcnode-id="2821" instrument_node="">
</span><p data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">Abercrombie grew to become the flagship of failing brand-centered fashion retailers in terms of decadence.</span></p><span data-dcnode-id="2818" instrument_node="">
</span><p data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">It also shares a constant with the others; all of these large retail corporations suffer from the same malfunction.</span></p><span data-dcnode-id="2815" instrument_node="">
</span><p data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Their formulaic look, forever showing the same personality on models who seem to not have been updated for years -not even in their hairstyle choices.</span></p><span data-dcnode-id="2812" instrument_node="">
</span><p data-dcnode-id="2809"><em data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Abercrombie and Fitch’s awful marketing choices have put them at the bottom of the food chain, and not even their male models can save them from fading out.</span></em></p><span data-dcnode-id="2808" instrument_node="">
</span><p data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Newer generations have struck the coup de grace on this archaic idea of teenagers. </span></p><span data-dcnode-id="2805" instrument_node="">
</span><p data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Billion-dollar retailers have gotten lazy and keep using the same marketing techniques, expecting to get the acceptance of teenagers one decade after the other, instead of finding and implementing new retail trends.</span></p><span data-dcnode-id="2802" instrument_node="">
</span><p data-dcnode-id="2798"><strong data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">The result is simple.</span></strong><span data-dcnode-id="2799" instrument_node=""> </span></p><span data-dcnode-id="2797" instrument_node="">
</span><p data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">Most large retailers are out of touch with today’s demands and ideals of a new generation. </span></p><span data-dcnode-id="2794" instrument_node="">
</span><p data-dcnode-id="2789"><span data-dcnode-id="2793" instrument_node="">And their neglectful, </span><em data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">live-on-the-victories-of-yesterday</span></em><span data-dcnode-id="2790" instrument_node=""> type of mentality has condemned them to their own grave.</span></p><span data-dcnode-id="2788" instrument_node="">
</span><p data-dcnode-id="2781"><a data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2015/feb/25/clothing-retailers-teens-abercrombie-fitch-wet-seal-aeropostale-hollister" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2787" instrument_node="">19-year-old college student</span></a><span data-dcnode-id="2785" instrument_node=""> Emily Evans, states, “</span><em data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">Wearing clothes made by a company that advertises their brand on all of their clothes and charges so much for it seems a bit obnoxious to me now</span></em><span data-dcnode-id="2782" instrument_node="">”.</span></p><span data-dcnode-id="2780" instrument_node="">
</span><h3 data-dcnode-id="2771"><span class="ez-toc-section" data-dcnode-id="2779" id="Innovation_Resources_Check_out_Really_Good_Innovation_for_resources"></span><br data-dcnode-id="2778"><span data-dcnode-id="2777" instrument_node="">Innovation Resources: Check out </span><a data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reallygoodinnovation.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2776" instrument_node="">Really Good Innovation</span></a><span data-dcnode-id="2774" instrument_node=""> for resources </span><br data-dcnode-id="2773"><span class="ez-toc-section-end" data-dcnode-id="2772"></span></h3><span data-dcnode-id="2770" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2769" style="height:57px"></div><span data-dcnode-id="2768" instrument_node="">
</span><h2 data-dcnode-id="2762"><span class="ez-toc-section" data-dcnode-id="2767" id="Green_Innovation_and_Social_Impact_is_the_new_cool"></span><span data-dcnode-id="2766" instrument_node="">Green Innovation and </span><strong data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">Social Impact is the new “cool”</span></strong><span class="ez-toc-section-end" data-dcnode-id="2763"></span></h2><span data-dcnode-id="2761" instrument_node="">
</span><p data-dcnode-id="2753"><span data-dcnode-id="2760" instrument_node="">Newer generations put value on the “</span><a data-dcnode-id="2758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/the-nonprofit-revolution/zeitgeist-tips-for-generation-z-ers-who-hear-the-call-of-the-social-impact-sector-f1df0fbe1478" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2759" instrument_node="">social impact</span></a><span data-dcnode-id="2757" instrument_node="">” of their decisions, and this includes their </span><strong data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">fashion choices</span></strong><span data-dcnode-id="2754" instrument_node="">. </span></p><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2745"><span data-dcnode-id="2751" instrument_node="">They don’t mind spending a bit more if said brand stands out for its </span><a data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/c/corp-social-responsibility.asp" rel="noreferrer noopener nofollow" target="_blank"><em data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">corporate social responsibility</span></em><span data-dcnode-id="2748" instrument_node=""> (CSR)</span></a><span data-dcnode-id="2746" instrument_node="">. </span></p><span data-dcnode-id="2744" instrument_node="">
</span><p data-dcnode-id="2739"><span data-dcnode-id="2743" instrument_node="">This is the case of the </span><a data-dcnode-id="2741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.businessinsider.com/free-people-is-urban-outfitters-secret-weapon-2015-8%3Fr%3DUS%26IR%3DT%26IR%3DT" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2742" instrument_node="">online success of Free People</span></a><span data-dcnode-id="2740" instrument_node=""> (a branch of Urban Outfitters whose impact is even bigger than its mother company, with a 14% rise in sales against its 2% in 2015). </span></p><span data-dcnode-id="2738" instrument_node="">
</span><p data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Thanks to their strategy in showcasing an entire lifestyle through their social media and blog.</span></p><span data-dcnode-id="2735" instrument_node="">
</span><p data-dcnode-id="2727"><span data-dcnode-id="2734" instrument_node="">Another brand called </span><a data-dcnode-id="2732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vapourbeauty.com/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2733" instrument_node="">Vapour Organic Beauty</span></a><span data-dcnode-id="2731" instrument_node="">&nbsp;sells the type of natural beauty products that </span><strong data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">turn&nbsp;Generation Z crazy</span></strong><span data-dcnode-id="2728" instrument_node="">, and they’re breaking the bank. </span></p><span data-dcnode-id="2726" instrument_node="">
</span><p data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">Traditional brands are also doing their part. </span></p><span data-dcnode-id="2723" instrument_node="">
</span><p data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">Some have been centering themselves towards CSR for a long time. </span></p><span data-dcnode-id="2720" instrument_node="">
</span><p data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">Microsoft, Lego, Sony, or BMW are just some that fit in this category.</span></p><span data-dcnode-id="2717" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2703"><picture class="wp-image-12624" data-dcnode-id="2711"><span data-dcnode-id="2716" instrument_node="">
</span><source data-dcnode-id="2715" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://klintmarketing.com/wp-content/uploads/2020/09/3-min.png.webp 1024w, https://klintmarketing.com/wp-content/uploads/2020/09/3-min-300x199.png.webp 300w, https://klintmarketing.com/wp-content/uploads/2020/09/3-min-768x510.png.webp 768w, https://klintmarketing.com/wp-content/uploads/2020/09/3-min-150x100.png.webp 150w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20680'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="2714" instrument_node="">

</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2701" style="height:100px"></div><span data-dcnode-id="2700" instrument_node="">
</span><h3 data-dcnode-id="2696"><span class="ez-toc-section" data-dcnode-id="2699" id="Generation_Z_wants_to_show_that_theyre_conscious_of_the_effects_of_their_purchases"></span><span data-dcnode-id="2698" instrument_node="">Generation Z wants to show that they’re conscious of the effects of their purchases. </span><span class="ez-toc-section-end" data-dcnode-id="2697"></span></h3><span data-dcnode-id="2695" instrument_node="">
</span><p data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Generation Z consumers care about many issues that newer companies have started enthusiastically implementing into their business strategies: </span></p><span data-dcnode-id="2692" instrument_node="">
</span><ul data-dcnode-id="2675"><li data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">human trafficking</span></li><li data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">exploitation of minors</span></li><li data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">unfair wage conditions</span></li><li data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">environmental impact</span></li><li data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">sexism</span></li><li data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">diversity imbalance</span></li><li data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">animal abuse… </span></li><li data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">and the list goes on</span></li></ul><span data-dcnode-id="2674" instrument_node="">
</span><p data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">The young generation wants to feel good about buying from an organization that fits their identity. </span></p><span data-dcnode-id="2671" instrument_node="">
</span><p data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">There’s an idealism that’s never been seen before and companies are struggling to align themselves to this image.</span></p><span data-dcnode-id="2668" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2667" style="height:100px"></div><span data-dcnode-id="2666" instrument_node="">
</span><h2 data-dcnode-id="2661"><span class="ez-toc-section" data-dcnode-id="2665" id="But%E2%80%A6_young_money_is_the_scarcest_in_decades"></span><strong data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">But… young money is the scarcest in decades</span></strong><span class="ez-toc-section-end" data-dcnode-id="2662"></span></h2><span data-dcnode-id="2660" instrument_node="">
</span><p data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">Having a part-time job as a teenager used to be very usual in the second half of the 20th century. </span></p><span data-dcnode-id="2657" instrument_node="">
</span><p data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">It was a part of growing up to be a young adult, a wage of valuable experience to face the real world in the upcoming years. </span></p><span data-dcnode-id="2654" instrument_node="">
</span><p data-dcnode-id="2649"><span data-dcnode-id="2653" instrument_node="">However, this custom is no longer so for </span><a data-dcnode-id="2651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.businessinsider.com/generation-z-teen-jobs-2018-5%3Fr%3DUS%26IR%3DT%26IR%3DT" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2652" instrument_node="">Generation Z in the US</span></a><span data-dcnode-id="2650" instrument_node="">, not because they refuse to work. </span></p><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2643"><span data-dcnode-id="2647" instrument_node="">Their lives are </span><strong data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">much different</span></strong><span data-dcnode-id="2644" instrument_node=""> than in 1979 when labor force participation by 16-19-year-olds peaked.</span></p><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">The teenagers of today go through incredibly stressful school life, with society pressuring them with homework, extra courses, and every possible educational activity to force them into an ultra-competitive professional environment. </span></p><span data-dcnode-id="2639" instrument_node="">
</span><p data-dcnode-id="2634"><span data-dcnode-id="2638" instrument_node="">That lack of extra free time might be a result of extracurricular activities. A college degree isn’t an option anymore, but a </span><strong data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">requirement</span></strong><span data-dcnode-id="2635" instrument_node="">. </span></p><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2630"><span data-dcnode-id="2632" instrument_node="">School is so absorbing that honors students are never free, not even during the summer when part-time jobs usually take place.</span><br data-dcnode-id="2631"></p><span data-dcnode-id="2629" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2628" style="height:100px"></div><span data-dcnode-id="2627" instrument_node="">
</span><h2 data-dcnode-id="2622"><span class="ez-toc-section" data-dcnode-id="2626" id="Less_cash_from_entry_level_jobs_for_young_people_less_retail_spending"></span><strong data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">Less cash from entry level jobs for young people = less retail spending</span></strong><span class="ez-toc-section-end" data-dcnode-id="2623"></span></h2><span data-dcnode-id="2621" instrument_node="">
</span><p data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">Apart from this, almost all economic indicators are against young adults of the future. </span></p><span data-dcnode-id="2618" instrument_node="">
</span><p data-dcnode-id="2614"><a data-dcnode-id="2616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.businessinsider.com/generation-z-teen-jobs-2018-5%3Fr%3DUS%26IR%3DT%26IR%3DT" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2617" instrument_node="">Jobs pay worse than in 1979</span></a><span data-dcnode-id="2615" instrument_node="">, and they are usually reserved for unemployed college graduates or people born outside the country. </span></p><span data-dcnode-id="2613" instrument_node="">
</span><p data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">Thus, teenagers don’t usually have a lot of money of their own, unable to spend.</span></p><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2609" instrument_node="">When they do have some spare cash, they prefer to spend it on&nbsp;</span><a data-dcnode-id="2607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2015/feb/25/clothing-retailers-teens-abercrombie-fitch-wet-seal-aeropostale-hollister" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2608" instrument_node="">electronics or fast casual restaurants</span></a><span data-dcnode-id="2606" instrument_node="">. Priorities have put aside the usual inclination for retail at that age gap.</span></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2603" instrument_node="">Generation Z´s expense habits also </span><a data-dcnode-id="2601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alabamamediagroup.com/2018/03/07/gen-z-spending-habits-infographic/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2602" instrument_node="">gravitate towards two trending tendencies</span></a><span data-dcnode-id="2600" instrument_node="">. </span></p><span data-dcnode-id="2598" instrument_node="">
</span><ol data-dcnode-id="2590"><li data-dcnode-id="2593"><span data-dcnode-id="2597" instrument_node="">Buying a lot of “</span><a data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/paularosenblum/2015/05/21/fast-fashion-has-completely-disrupted-apparel-retail/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2596" instrument_node="">cheap clothes</span></a><span data-dcnode-id="2594" instrument_node="">” as opposed to a few expensive or statement pieces</span></li><li data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">Pouring their money into high-quality clothing that isn’t centered on advertising its own identity as a brand.</span></li></ol><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Since no fast fashion is faster than online fashion, big brands definitely need to find and implement new retail innovation ideas and trends in order to adapt to new times. </span></p><span data-dcnode-id="2586" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2585" instrument_node="">Currently, the UK is the </span><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shopify.com/enterprise/ecommerce-fashion-industry" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2584" instrument_node="">third largest online market for fashion in the entire world ($99 billion)</span></a><span data-dcnode-id="2582" instrument_node="">.</span></p><span data-dcnode-id="2580" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2565"><figure class="aligncenter size-large" data-dcnode-id="2566"><picture class="wp-image-12681" data-dcnode-id="2574"><span data-dcnode-id="2579" instrument_node="">

</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2563" style="height:100px"></div><span data-dcnode-id="2562" instrument_node="">
</span><h2 data-dcnode-id="2557"><span class="ez-toc-section" data-dcnode-id="2561" id="What_will_replace_the_empty_retail_shops"></span><strong data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">What will replace the empty retail shops?</span></strong><span class="ez-toc-section-end" data-dcnode-id="2558"></span></h2><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">London is going through one of its biggest retail business crises of the last few decades. </span></p><span data-dcnode-id="2553" instrument_node="">
</span><p data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">Most importantly, there doesn’t seem to be one conventional solution, and the effects reach all aspects of a society with too many jobs on the line to be ignored.</span></p><span data-dcnode-id="2550" instrument_node="">
</span><p data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">Owning large chains is just not as profitable anymore, and for some, filing for bankruptcy looks like the only real way out. </span></p><span data-dcnode-id="2547" instrument_node="">
</span><p data-dcnode-id="2542"><span data-dcnode-id="2546" instrument_node="">Many big corporate retail companies are </span><strong data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">desperate </span></strong><span data-dcnode-id="2543" instrument_node="">to find the right solution in a labyrinth that feels too intricate and abrupt. </span></p><span data-dcnode-id="2541" instrument_node="">
</span><p data-dcnode-id="2536"><span data-dcnode-id="2540" instrument_node="">However many of the largest retailers refuse to </span><strong data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">start the process of adaptation and explore </span></strong><span data-dcnode-id="2537" instrument_node=""> new retail innovation ideas and trends.</span></p><span data-dcnode-id="2535" instrument_node="">
</span><p data-dcnode-id="2529"><span data-dcnode-id="2534" instrument_node="">The phrase “</span><strong data-dcnode-id="2531"><a data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.constructionleadershipcouncil.co.uk/wp-content/uploads/2016/10/Farmer-Review.pdf" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2533" instrument_node="">modernize or die</span></a></strong><span data-dcnode-id="2530" instrument_node="">,” comes to mind. </span></p><span data-dcnode-id="2528" instrument_node="">
</span><p data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">This is the consistent battle cry of disruptive startups that have been slashing through the bureaucracy and processes of their enterprise counterparts. </span></p><span data-dcnode-id="2525" instrument_node="">
</span><p data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">This means that corporations need to take a page out of a startup’s book via innovation or risk losing everything.</span></p><span data-dcnode-id="2522" instrument_node="">
</span><p data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Just like in any other seemingly apocalyptic moment of an economy, an end can mean a new beginning. </span></p><span data-dcnode-id="2519" instrument_node="">
</span><p data-dcnode-id="2514"><span data-dcnode-id="2518" instrument_node="">The sinking of retail empires could mean an </span><strong data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">opportunity </span></strong><span data-dcnode-id="2515" instrument_node="">for new companies to be born out of learned lessons of failures and new ideas. </span></p><span data-dcnode-id="2513" instrument_node="">
</span><p data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Swift action and drastic change before the point of no return could equate to a brighter future for these large-scale retailers.</span></p><span data-dcnode-id="2510" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2509" style="height:100px"></div><span data-dcnode-id="2508" instrument_node="">
</span><h2 data-dcnode-id="2503"><span class="ez-toc-section" data-dcnode-id="2507" id="Startups_with_retail_technology"></span><strong data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Startups with retail technology</span></strong><span class="ez-toc-section-end" data-dcnode-id="2504"></span></h2><span data-dcnode-id="2502" instrument_node="">
</span><p data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">Understanding the needs of the market is usually easier for startups than for older players in the game. </span></p><span data-dcnode-id="2499" instrument_node="">
</span><p data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">The door for change is more open than ever. </span></p><span data-dcnode-id="2496" instrument_node="">
</span><p data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Future successful companies need to understand how the new London landscape should look in order to convince people to return to spending their money&nbsp;on the high-streets.</span></p><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">In fact, London could be the perfect experimentation lab for a new way of understanding retail and commerce in general. </span></p><span data-dcnode-id="2490" instrument_node="">
</span><p data-dcnode-id="2486"><a data-dcnode-id="2488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.london.gov.uk/what-we-do/regeneration/high-streets" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2489" instrument_node="">Two thirds of Londoners live within a five minute walk of a high street</span></a><span data-dcnode-id="2487" instrument_node="">. </span></p><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">The average citizen is very prone to spend their time and money around their local area. </span></p><span data-dcnode-id="2482" instrument_node="">
</span><p data-dcnode-id="2477"><span data-dcnode-id="2481" instrument_node="">Opportunities seem endless in a city that has over </span><strong data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">600 high streets</span></strong><span data-dcnode-id="2478" instrument_node=""> scattered throughout its boroughs.</span></p><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">This is the perfect setup for new businesses; a bunch of streets meant for commerce, close to people who are eager for good local experiences.</span></p><span data-dcnode-id="2473" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2458"><figure class="aligncenter size-large" data-dcnode-id="2459"><picture class="wp-image-12714" data-dcnode-id="2467"><span data-dcnode-id="2472" instrument_node="">

</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="2449"><span data-dcnode-id="2448" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2447" style="height:100px"></div><span data-dcnode-id="2446" instrument_node="">
</span><h2 data-dcnode-id="2441"><span class="ez-toc-section" data-dcnode-id="2445" id="Unique_experiences_in_retail_draw_a_crowd"></span><strong data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Unique experiences in retail draw a crowd</span></strong><span class="ez-toc-section-end" data-dcnode-id="2442"></span></h2><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">There is a lot of space ready to be taken and turned into spots that give a local area character and personality. </span></p><span data-dcnode-id="2437" instrument_node="">
</span><p data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">But most importantly, activity and novel experiences happen here. </span></p><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2431"><span data-dcnode-id="2433" instrument_node="">For startups, the opportunity isn’t so much in putting effort into reconverting Oxford Circus or Regent Street through the next multi-million dollar company. But in studying the boroughs to make the most of an endless sea of possibilities.</span><br data-dcnode-id="2432"></p><span data-dcnode-id="2430" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2429" style="height:100px"></div><span data-dcnode-id="2428" instrument_node="">
</span><h2 data-dcnode-id="2422"><span class="ez-toc-section" data-dcnode-id="2427" id="Breaking_the_conventional_mold_in_retail_spaces"></span><strong data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Breaking the conventional mold</span></strong><span data-dcnode-id="2424" instrument_node=""> in retail spaces</span><span class="ez-toc-section-end" data-dcnode-id="2423"></span></h2><span data-dcnode-id="2421" instrument_node="">
</span><p data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">If we take the whole equation and put the focus on the fact that consumers (particularly young consumers) are eager for a better user experience.</span></p><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">We’ve got the perfect mix for a fruitful brainstorming session. </span></p><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2410"><span data-dcnode-id="2414" instrument_node="">An analysis of all the factors at stake results in a simple answer.</span><strong data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node=""> People need to find a reason to leave their homes</span></strong><span data-dcnode-id="2411" instrument_node="">. </span></p><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2404"><span data-dcnode-id="2408" instrument_node="">Even </span><a data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/industries/retail/our-insights/the-future-of-grocery-in-store-and-online" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2407" instrument_node="">grocery shopping</span></a><span data-dcnode-id="2405" instrument_node=""> needs to be rethought because large grocery shopping spaces aren’t free from the revolution in retail.</span></p><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Nowadays things like shopping, listening to music, watching movies, gaming, and a long number of activities can be done from home, but that doesn’t make it impossible to convince people to enjoy themselves and buy stuff offline.</span></p><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2395"><span data-dcnode-id="2399" instrument_node="">Over time, the only brick-and-mortar commerce that will stay alive will be those who offer </span><em data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">experiences</span></em><span data-dcnode-id="2396" instrument_node=""> to people. </span></p><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Those who can’t be skipped because of what it means to be in them. Looking at the picture from its brightest angle. </span></p><span data-dcnode-id="2391" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2390" instrument_node="">We could assume that physical retail doesn’t necessarily have to die, </span><a data-dcnode-id="2388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/stevendennis/2018/03/19/physical-retail-is-not-dead-boring-retail-is-understanding-retails-great-bifurcation/%237acaa6ff1981" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2389" instrument_node="">but boring retail is surely in the line of the scaffold</span></a><span data-dcnode-id="2387" instrument_node="">.</span></p><span data-dcnode-id="2385" instrument_node="">
</span><p data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Plus, non-traditional businesses like pop-up stores, street food markets, co-working spaces, click-and-collect stores, etc., usually find it easier to avoid the tyranny of high rents.</span></p><span data-dcnode-id="2382" instrument_node="">
</span><p data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Need retail innovation ideas? We can give you some.</span></p><span data-dcnode-id="2379" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2378" style="height:50px"></div><span data-dcnode-id="2377" instrument_node="">

</span><h2 data-dcnode-id="2291"><span class="ez-toc-section" data-dcnode-id="2295" id="Whats_happening_in_retail_innovation_around_the_world"></span><strong data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">What’s happening in retail innovation around the world?</span></strong><span class="ez-toc-section-end" data-dcnode-id="2292"></span></h2><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2289" instrument_node="">With so many large empty spaces,&nbsp;</span><a data-dcnode-id="2287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/andriacheng/2018/07/08/brick-and-mortar-retail-is-far-from-dead-just-look-at-whos-moving-in-to-replace-toys-r-us/%2349effed42d7b" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2288" instrument_node="">newer not-so-typical companies</span></a><span data-dcnode-id="2286" instrument_node=""> are filling the gaps.</span></p><span data-dcnode-id="2284" instrument_node="">
</span><p data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">The focus is on repurposing large spaces to fit the needs of the community. </span></p><span data-dcnode-id="2281" instrument_node="">
</span><p data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Many are skeptical about the effectiveness of total retail innovation. There are plenty of examples abroad of where the re-purposing of spaces has been a success.&nbsp;</span></p><span data-dcnode-id="2278" instrument_node="">
</span><p data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">The examples listed below are cases of retail innovation taking place inside of London and globally which have shown positive results.</span></p><span data-dcnode-id="2275" instrument_node="">
</span><p data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Here are some of the novelties that are taking up old retail space.</span></p><span data-dcnode-id="2272" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2271" style="height:100px"></div><span data-dcnode-id="2270" instrument_node="">
</span><h2 data-dcnode-id="2264"><span class="ez-toc-section" data-dcnode-id="2269" id="Retail_Trends_Innovation_Retail_showrooms"></span><span data-dcnode-id="2268" instrument_node="">Retail Trends &amp; Innovation: R</span><strong data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">etail showrooms</span></strong><span class="ez-toc-section-end" data-dcnode-id="2265"></span></h2><span data-dcnode-id="2263" instrument_node="">
</span><p data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Mainly in London, showrooms within retail have become one of the most successful innovative business models of the last decade. </span></p><span data-dcnode-id="2260" instrument_node="">
</span><p data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Apart from acting as the innovative twist that fashion industry needs in order to stay relevant, they’re shaping the community and giving their city areas a new flavor.</span></p><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2246"><span data-dcnode-id="2256" instrument_node="">The hit of places like </span><a data-dcnode-id="2254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//uk.fashionnetwork.com/news/Designers-say-new-LC-M-showroom-space-is-a-success%2C614287.html%23.W03bgdj7S34" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2255" instrument_node="">London Collections: Men</span></a><span data-dcnode-id="2253" instrument_node="">, which has carved its own niche in the British fashion scene, has proven that a new model is </span><strong data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">possible</span></strong><span data-dcnode-id="2250" instrument_node="">. </span><a data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider-trends.com/15-of-the-uks-fastest-growing-retailers/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2249" instrument_node="">Six out of the fifteen fastest-growing retail figures</span></a><span data-dcnode-id="2247" instrument_node=""> in London have showrooms as a part of their strategy.</span></p><span data-dcnode-id="2245" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2230"><figure class="aligncenter size-large" data-dcnode-id="2231"><picture class="wp-image-12642" data-dcnode-id="2239"><span data-dcnode-id="2244" instrument_node="">

</span><h2 data-dcnode-id="2221"><span class="ez-toc-section" data-dcnode-id="2226" id="Reta_Retail_Trends_Innovation_Hospitality"></span><span data-dcnode-id="2225" instrument_node="">Reta Retail Trends &amp; Innovation: </span><strong data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Hospitality</span></strong><span class="ez-toc-section-end" data-dcnode-id="2222"></span></h2><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2215"><span data-dcnode-id="2219" instrument_node="">The global hotel industry’s market size </span><a data-dcnode-id="2217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/247264/total-revenue-of-the-global-hotel-industry/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2218" instrument_node="">has grown by 20,67% since 2014</span></a><span data-dcnode-id="2216" instrument_node="">. It’s now worth 495,17 billion US dollars. </span></p><span data-dcnode-id="2214" instrument_node="">
</span><p data-dcnode-id="2209"><span data-dcnode-id="2213" instrument_node="">Some hotel chains like </span><a data-dcnode-id="2211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.across-magazine.com/retail-hotel-real-estate/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2212" instrument_node="">Ruby Hotels</span></a><span data-dcnode-id="2210" instrument_node=""> understand the value of retail space. </span></p><span data-dcnode-id="2208" instrument_node="">
</span><p data-dcnode-id="2203"><span data-dcnode-id="2207" instrument_node="">They opened their Ruby Marie at the end of 2015 as their second Vienna location, filling up six floors of space </span><a data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hetras.shijigroup.com/post/a-second-ruby-for-vienna-a-historic-gem-turned-trendy-hotel" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2206" instrument_node="">taken from the historic Vienna Stafa Tower department store</span></a><span data-dcnode-id="2204" instrument_node="">.</span></p><span data-dcnode-id="2202" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2201" instrument_node="">The idea was to create a modern hotel that doesn’t require a large entrance and reception on the ground floor, another sign of innovation that also makes it </span><strong data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">possible</span></strong><span data-dcnode-id="2198" instrument_node=""> for hotels to make it into spaces they would’ve never even considered before.</span></p><span data-dcnode-id="2196" instrument_node="">

</span><h2 data-dcnode-id="2170"><span class="ez-toc-section" data-dcnode-id="2176" id="Retail_Trends_Innovation_Wellness_Incorporated_Into_Retail_Spaces"></span><span data-dcnode-id="2175" instrument_node="">Retail Trends &amp; Innovation: </span><strong data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Wellness</span></strong><span data-dcnode-id="2172" instrument_node=""> Incorporated Into Retail Spaces</span><span class="ez-toc-section-end" data-dcnode-id="2171"></span></h2><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">New business models have resurfaced in the wellness industry to adapt to big spaces left behind by bankrupt retailers. </span></p><span data-dcnode-id="2166" instrument_node="">
</span><p data-dcnode-id="2158"><span data-dcnode-id="2165" instrument_node="">Such is the case of </span><a data-dcnode-id="2163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/forbestreptalks/2015/06/17/meet-the-hair-salon-franchise-that-turns-stylists-into-entrepreneurs/%237284545a106c" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2164" instrument_node="">Sola Salons</span></a><span data-dcnode-id="2162" instrument_node="">, a company that made it </span><a data-dcnode-id="2160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/pictures/5578a4ebe4b017853ece86aa/no--1-sola-salon-studios/%232d957cb554d6" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2161" instrument_node="">#1 into the Best Franchises to Buy in 2015 Forbes list</span></a><span data-dcnode-id="2159" instrument_node="">. </span></p><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">It works as a coworking-style business where its franchises lease big retail spaces to subdivide them into small salons.</span></p><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2149"><span data-dcnode-id="2153" instrument_node="">Their success lies in the fact that they </span><strong data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">raise competition</span></strong><span data-dcnode-id="2150" instrument_node=""> between talented entrepreneurs. </span></p><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">For example, a hair salon is more than a hair salon. </span></p><span data-dcnode-id="2145" instrument_node="">
</span><p data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">They’re a storefront for new stylists, who can easily rent a place and start their own business.</span></p><span data-dcnode-id="2142" instrument_node="">

</span><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">With life expectancy increasing every year, the population pyramid is looking ideal for some business that caters to a graying generation, specifically in the health sector. </span></p><span data-dcnode-id="2112" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2111" instrument_node="">One of the companies that are going to take up old retail space in the US is </span><a data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hhnmag.com/articles/3496-urgent-care-2-0-new-entrants-help-spur-the-evolution-of-an-old-model" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2110" instrument_node="">GoHealth</span></a><span data-dcnode-id="2108" instrument_node="">. </span></p><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2101"><span data-dcnode-id="2105" instrument_node="">It’s an urgent care service that has grown a lot thanks to the increasingly accepted idea that healthcare </span><strong data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">must have</span></strong><span data-dcnode-id="2102" instrument_node=""> a reserved space in the improvement of communities.</span></p><span data-dcnode-id="2100" instrument_node="">
