</span><p data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">The fitness industry can proudly say that it is supporting itself in one of the pillars of today’s society. </span></p><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Maintaining a healthy lifestyle that is partly if not mainly, based on physical activity. </span></p><span data-dcnode-id="2069" instrument_node="">
</span><p data-dcnode-id="2064"><span data-dcnode-id="2068" instrument_node="">Everything that has to do with fitness is </span><strong data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">successful</span></strong><span data-dcnode-id="2065" instrument_node=""> today. </span></p><span data-dcnode-id="2063" instrument_node="">
</span><p data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">From supplement companies to Instagram models there are new business models that are proving profitable in large spaces. </span></p><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2055"><span data-dcnode-id="2059" instrument_node="">CrossFit warehouses, rock climbing centers, group classes, and personal trainer-focused gym chains are among </span><strong data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">the most profitable</span></strong><span data-dcnode-id="2056" instrument_node=""> business models of today.</span></p><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2046"><span data-dcnode-id="2053" instrument_node="">A quick search for Planet Fitness, one of the sector’s referents, shows that it will be taking over </span><a data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bizjournals.com/sanantonio/news/2016/09/12/planet-fitnessnew-lease-set-to-backfill-former.html" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2052" instrument_node="">former grocery store spaces</span></a><span data-dcnode-id="2050" instrument_node=""> or even </span><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eu.delawareonline.com/story/money/business/2017/08/23/planet-fitness-take-over-former-best-buy-site-off-kirkwood-highway/588944001/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2049" instrument_node="">Best Buy stores</span></a><span data-dcnode-id="2047" instrument_node=""> in the US. </span></p><span data-dcnode-id="2045" instrument_node="">
</span><p data-dcnode-id="2038"><a data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/lifeandstyle/shortcuts/2017/may/08/the-budget-gym-boom-how-low-cost-clubs-are-driving-up-membership" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2044" instrument_node="">In London, the business of budget gyms is exploding</span></a><span data-dcnode-id="2042" instrument_node="">. They sprout up where fast-food retail restaurants used to be, and </span><strong data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">one in seven</span></strong><span data-dcnode-id="2039" instrument_node=""> Brits is already a member.</span></p><span data-dcnode-id="2037" instrument_node="">
</span><p data-dcnode-id="2032"><span data-dcnode-id="2036" instrument_node="">Other sports facilities that are growing thanks to the appearance of large, newly empty spaces are </span><a data-dcnode-id="2034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.athleticbusiness.com/gym-fieldhouse/empty-big-box-stores-repurposed-as-gyms.html" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2035" instrument_node="">rock climbing centers</span></a><span data-dcnode-id="2033" instrument_node="">. </span></p><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2030" instrument_node="">Many re-purposing projects are replacing retail spaces like the old Walmart in Durham, North Carolina in favor of a </span><a data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2009/04/05/business/05mall.html" rel="nofollow"><span data-dcnode-id="2029" instrument_node="">wave</span></a><a data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2009/04/05/business/05mall.html" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="2027" instrument_node="">–</span></a><a data-dcnode-id="2024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2009/04/05/business/05mall.html" rel="nofollow"><span data-dcnode-id="2025" instrument_node="">making machines</span></a><span data-dcnode-id="2023" instrument_node="">. </span></p><span data-dcnode-id="2021" instrument_node="">

</span><p data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Just like other forms of retail, grocery shopping also needs to adapt to new consumer needs. </span></p><span data-dcnode-id="1993" instrument_node="">
</span><p data-dcnode-id="1988"><span data-dcnode-id="1992" instrument_node="">In London, people have gotten used to gimmicks like </span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/technology/2015/jun/30/amazon-one-hour-deliveries-central-london" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1991" instrument_node="">one-hour delivery grocery shopping</span></a><span data-dcnode-id="1989" instrument_node="">. </span></p><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1982"><span data-dcnode-id="1986" instrument_node="">The service has </span><strong data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">skyrocketed </span></strong><span data-dcnode-id="1983" instrument_node="">ever since Amazon broke the ice. This is a clear sign that things need to change if physical grocery shopping wants to stay alive.</span></p><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Apart from fast delivery, the grocery stores of today are navigating through two other waters. </span></p><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">The trendy model of an eco-friendly, organic business and the futuristic, completely unique user experience.</span></p><span data-dcnode-id="1975" instrument_node="">

</span></div><figcaption data-dcnode-id="1960"><span data-dcnode-id="1963" instrument_node="">Moby Mart concept by Wheelys | Video courtesy of </span><a data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/channel/UCmMSe6gTO-ptcRLhhpjU0rQ" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1962" instrument_node="">Wheelys</span></a></figcaption></figure><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1951"><a data-dcnode-id="1956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.convinceandconvert.com/podcasts/episodes/how-sprouts-farmers-market-is-serving-up-social-retail-success/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1957" instrument_node="">Sprouts Farmers Market</span></a><span data-dcnode-id="1955" instrument_node="">, with their offer of organic, natural and gluten-free products, has seen unparalleled success. The “farmers market” style shopping experience is </span><a data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/andriacheng/2018/07/08/brick-and-mortar-retail-is-far-from-dead-just-look-at-whos-moving-in-to-replace-toys-r-us/%233a5540fc2d7b" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1954" instrument_node="">taking up large space formerly occupied by Toys”R”Us</span></a><span data-dcnode-id="1952" instrument_node="">. </span></p><span data-dcnode-id="1950" instrument_node="">
</span><p data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">With regard to total innovation, many new concept stores have sprung up across the globe. </span></p><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1943"><a data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fastcompany.com/40429419/this-tiny-grocery-store-is-mobile-self-driving-and-run-by-ai" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1946" instrument_node="">Future mobile, self-driving stores</span></a><span data-dcnode-id="1944" instrument_node=""> have already appeared. </span></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">The idea is being managed by Wheelys, a company that sells hi-tech bikes remodeled as mobile cafés for 1% of what it would cost to start a new Starbucks. And they’re doing pretty well because they’re sold out.</span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1938" instrument_node="">Wheely’s new self-driving grocery store is called Moby, </span><a data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fastcompany.com/40429419/this-tiny-grocery-store-is-mobile-self-driving-and-run-by-ai" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1937" instrument_node="">and the first prototype is already being tested in Shanghai</span></a><span data-dcnode-id="1935" instrument_node="">.</span></p><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1932" instrument_node="">Models closer in the future are the ones we are already enjoying, like the ones Amazon offers, with their </span><a data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techradar.com/news/internet/amazonfresh-has-arrived-in-the-uk-here-s-how-it-works-1322982" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1931" instrument_node="">Fresh</span></a><span data-dcnode-id="1929" instrument_node=""> and </span><a data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.geekwire.com/2016/amazon-go-works-technology-behind-online-retailers-groundbreaking-new-grocery-store/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1928" instrument_node="">Go</span></a><span data-dcnode-id="1926" instrument_node=""> concepts.</span></p><span data-dcnode-id="1924" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1923" style="height:100px"></div><span data-dcnode-id="1922" instrument_node="">
</span><h2 data-dcnode-id="1915"><span class="ez-toc-section" data-dcnode-id="1921" id="Retail_Trends_Innovation_Microhousing_in_Retail"></span><span data-dcnode-id="1920" instrument_node="">Retail Trends &amp; Innovation: </span><strong data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Microhousing</span></strong><span data-dcnode-id="1917" instrument_node=""> in Retail</span><span class="ez-toc-section-end" data-dcnode-id="1916"></span></h2><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Mall spaces are starting to be rethought into something completely different from retail. </span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1910" instrument_node="">Among the newest ideas to make mall space useful again is </span><a data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theglobeandmail.com/report-on-business/industry-news/property-report/regional-malls-evolve-into-town-centres/article37097182/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1909" instrument_node="">the reconversion of an entire mall</span></a><span data-dcnode-id="1907" instrument_node=""> in Vancouver Island, British Columbia. </span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1904" instrument_node="">From an enclosed mega building to a </span><strong data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">neighborhood</span></strong><span data-dcnode-id="1901" instrument_node="">. Apart from 875,000 sq ft of office (and, yes, some retail space) the new concept will count on rental suites and town-homes for revenue.</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1898" instrument_node="">Learn more about how </span><a data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fortune.com/simon-mall-landlord-real-estate/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1897" instrument_node="">malls are being repurposed to be successful again</span></a><span data-dcnode-id="1895" instrument_node="">.</span></p><span data-dcnode-id="1893" instrument_node="">

</span><h2 data-dcnode-id="1873" id="vocational-training"><span class="ez-toc-section" data-dcnode-id="1877" id="Vocational_training_and_university_centers"></span><strong data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Vocational training and university centers</span></strong><span class="ez-toc-section-end" data-dcnode-id="1874"></span></h2><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1868"><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//kut.org/post/how-austin-turned-dead-department-store-community-college" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1871" instrument_node="">The death of a JCPenney in 2014 in Austin, Texas</span></a><span data-dcnode-id="1869" instrument_node="">, drove the community to find a creative solution to reuse the space. </span></p><span data-dcnode-id="1867" instrument_node="">
</span><p data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">The Austin Community College picked it up to create their new Highlands campus. </span></p><span data-dcnode-id="1864" instrument_node="">
</span><p data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Established in the 200,000 sq ft space left by the defunct department store.</span></p><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">They opened with 32 classrooms, 6 science labs, and a library. </span></p><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1853"><span data-dcnode-id="1857" instrument_node="">Students were delighted to stay there because </span><em data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">“the design and architecture made it feel like a home”</span></em><span data-dcnode-id="1854" instrument_node="">, as one of them declared. </span></p><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1851" instrument_node="">In the UK, a very similar case happened when </span><a data-dcnode-id="1849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/education/2009/dec/08/office-blocks-shops-converted-schools" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1850" instrument_node="">a school opened a new building using a former office block</span></a><span data-dcnode-id="1848" instrument_node="">.</span></p><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Other educational facilities innovation that have found room amongst the sinking of the physical retail industry are vocational training centers. </span></p><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1838"><span data-dcnode-id="1842" instrument_node="">In Montgomery, Alabama, the building left empty by an old mall </span><a data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eu.montgomeryadvertiser.com/story/news/education/2016/08/29/mpact-breathes-new-life-old-mall/89512548/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1841" instrument_node="">was turned into the MPACT, Montgomery Preparatory Academy for Career Technologies</span></a><span data-dcnode-id="1839" instrument_node="">. </span></p><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">This facility teaches 450 students to prepare to directly join the workforce and fill the occupational gap present in the area.</span></p><span data-dcnode-id="1834" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1822"><picture class="wp-image-12652" data-dcnode-id="1828"><span data-dcnode-id="1833" instrument_node="">

</span><h2 data-dcnode-id="1814"><span class="ez-toc-section" data-dcnode-id="1818" id="How_does_the_new_retail_landscape_look_in_London"></span><strong data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">How does the new retail landscape look in London?</span></strong><span class="ez-toc-section-end" data-dcnode-id="1815"></span></h2><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Pop-up stores, showrooms, and event rooms are becoming so popular in London that it’s nearly impossible to organize data to talk about them. </span></p><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">They’re incredibly minimalist and convenient because they can move whenever and wherever they want. </span></p><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">This is giving way to new architecture tenders, RFPs, and opportunities alongside fueling a new business. </span></p><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">When spaces need to be created or redesigned, there is an immediate effect. </span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1800" instrument_node="">These new businesses are constantly in search of where they’re needed, </span><a data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fastcompany.com/40429419/this-tiny-grocery-store-is-mobile-self-driving-and-run-by-ai" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1799" instrument_node="">which is the same idea that supports what could be the grocery store of the future</span></a><span data-dcnode-id="1797" instrument_node="">.</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1790"><span data-dcnode-id="1794" instrument_node="">The knowledge you can gain from these innovative spaces in London is </span><strong data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">enormous</span></strong><span data-dcnode-id="1791" instrument_node="">. </span></p><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Just one simple Google search will blow your mind. </span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1785" instrument_node="">For now, it will suffice to get to know </span><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//icetank.com/%3Fgclid%3DEAIaIQobChMIzuuZroGX3AIVR1XTCh3plg7pEAAYAiAAEgImDfD_BwE" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1784" instrument_node="">Icetank</span></a><span data-dcnode-id="1782" instrument_node="">, an event space in Covent Garden. </span></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1779" instrument_node="">A free-entry festival like </span><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sevendials.co.uk/whats-on/seven-dials-soundtrack-2019/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1778" instrument_node="">Seven Dials Soundtrack</span></a><span data-dcnode-id="1776" instrument_node="">, which features shopping opportunities like a 20% off </span><a data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.businessinsider.com/generation-z-teen-jobs-2018-5%3Fr%3DUS%26IR%3DT%26IR%3DT" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1775" instrument_node="">Duke &amp; Dexter</span></a><span data-dcnode-id="1773" instrument_node=""> or promotions at Dinny Hall.</span></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1767"><a data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eventbrite.com/e/nextgen-experiences-concept-store-presented-by-ldc-tickets-46940923566" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1770" instrument_node="">Or a concept store like Nextgen</span></a><span data-dcnode-id="1768" instrument_node="">, which lasted three weeks during July and featured brands that include adjectives like “free-thinking”, “empowering” “recycling” or “handmade.”</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1765" instrument_node="">Remember </span><a data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freepeople.com/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1764" instrument_node="">Free People</span></a><span data-dcnode-id="1762" instrument_node="">? They also had a </span><a data-dcnode-id="1760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freepeople.com/uk/uk-endless-summer-popup/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1761" instrument_node="">pop-up store</span></a><span data-dcnode-id="1759" instrument_node=""> in London located in Shoreditch.</span></p><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1756" instrument_node="">In search of new authentic local experiences, Londoners are creating </span><strong data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">pop-up stores</span></strong><span data-dcnode-id="1753" instrument_node="">.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">A must-have in the city’s radiography. </span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">The simple need for change has spurred innovation and new business models as the old ones kept tumbling down. </span></p><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">The commercial retail landscape of London has changed quite a lot during the last decade. </span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">These are a few of the new kids on the block that have touched the sky of success.</span></p><span data-dcnode-id="1739" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1738" style="height:100px"></div><span data-dcnode-id="1737" instrument_node="">
</span><h2 data-dcnode-id="1731"><span class="ez-toc-section" data-dcnode-id="1736" id="Spaces_for_leisure_retail_industry_innovation"></span><strong data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Spaces for leisure</span></strong><span data-dcnode-id="1733" instrument_node=""> = retail industry innovation</span><span class="ez-toc-section-end" data-dcnode-id="1732"></span></h2><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">The leisure business in London has become one of the most successful ones following the death of the retail giants. </span></p><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1723"><a data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2018/feb/17/uk-retail-industry--gloom-high-street-shift-consumers" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1726" instrument_node="">So much so that crazy golf operator Swingers has taken up a third of the former BHS store in Oxford Street</span></a><span data-dcnode-id="1724" instrument_node="">. The other two-thirds are a market-style dining hall that will open in September and an outlet by Reserved, a Polish fashion chain specialized in off-price retail.</span></p><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1721" instrument_node="">Peter Cooper, director of Hammerson shopping centers, </span><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2018/feb/17/uk-retail-industry--gloom-high-street-shift-consumers" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1720" instrument_node="">backs up the statement,</span></a><span data-dcnode-id="1718" instrument_node=""> “</span><em data-dcnode-id="1714"><span data-dcnode-id="1717" instrument_node="">in order to beat the online shopping figures, malls and town centers </span><strong data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">need to provide experiences that can’t be enjoyed at home</span></strong></em><span data-dcnode-id="1713" instrument_node="">.”</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1710" instrument_node="">In the borough of Barnet, there’s work being done to open </span><a data-dcnode-id="1708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.barnet.gov.uk/citizen-home/news/Work-begins-on-Barnet-s-new-leisure-centres.html" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1709" instrument_node="">two £41.5million leisure centers</span></a><span data-dcnode-id="1707" instrument_node="">, which will include things like a sports hall, several pools, a café, a library, several fitness areas, and a multi-use games area.</span></p><span data-dcnode-id="1705" instrument_node="">

</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1689" style="height:100px"></div><span data-dcnode-id="1688" instrument_node="">
</span><h2 data-dcnode-id="1682"><span class="ez-toc-section" data-dcnode-id="1687" id="Coworking_spaces_re-purposing_retail"></span><strong data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Coworking spaces</span></strong><span data-dcnode-id="1684" instrument_node=""> re-purposing retail</span><span class="ez-toc-section-end" data-dcnode-id="1683"></span></h2><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">The “coworking space business” has become the cornerstone of the slow but steady change of the commercial landscape. </span></p><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1674"><a data-dcnode-id="1676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.deskmag.com/en/the-complete-2017-coworking-forecast-more-than-one-million-people-work-from-14000-coworking-spaces-s" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1677" instrument_node="">A survey ran by DeskMag</span></a><span data-dcnode-id="1675" instrument_node=""> showed that by the end of 2017 there were going to be over 14,000 co-working spaces in the world, and 1.2 million people would have worked in one of them.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1672" instrument_node="">WeWork has been the company that shaped it all. In March 2018, the London press published that, what is considered as the biggest co-working brand in the world, could seal a deal with </span><a data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theinvestor.jll/news/world/retail/retail-looks-co-working-space-extra-revenue/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1671" instrument_node="">Debenhams</span></a><span data-dcnode-id="1669" instrument_node=""> to open a new center in its flagship store in Oxford Street.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">In light of the disastrous traction of WeWork, it will be interesting to see if the co-working space revolution continues. </span></p><span data-dcnode-id="1664" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1650"><picture class="wp-image-12654" data-dcnode-id="1658"><span data-dcnode-id="1663" instrument_node="">

</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1648" style="height:100px"></div><span data-dcnode-id="1647" instrument_node="">
</span><h2 data-dcnode-id="1642"><span class="ez-toc-section" data-dcnode-id="1646" id="Bringing_inspiration_to_the_market"></span><strong data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Bringing inspiration to the market</span></strong><span class="ez-toc-section-end" data-dcnode-id="1643"></span></h2><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1640" instrument_node="">Apart from enjoying its own success, WeWork has helped create new unconventional solutions for what to do with these large empty spaces. One of their offices hosted the creation of </span><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.crainsnewyork.com/article/20151020/TECHNOLOGY/151019859/like-wework-blender-provides-shared-workspace-but-takes-it-upscale-for-the-cultured-crowd" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1639" instrument_node="">Blender</span></a><span data-dcnode-id="1637" instrument_node="">, a new co-working company whose objective is to create trendy-looking offices for creative companies.</span></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1634" instrument_node="">They are also </span><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/jennawang/2018/07/06/wework-dives-into-retail-with-wemrkt/%2361185a2f451a" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1633" instrument_node="">preparing their launch to retail with WeMRKT</span></a><span data-dcnode-id="1631" instrument_node="">, a new venture featuring products created by 10 WeWork member companies that won a competition in April. The new space, which will be located at WeWork 205 Hudson in New York City, will sell office supplies, food, drinks, and more.</span></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1628" instrument_node="">In London, </span><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//coworkhub.co/about/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1627" instrument_node="">a startup called Cowork Hub</span></a><span data-dcnode-id="1625" instrument_node=""> was launched in 2012 by a financial training company CEO who couldn’t find affordable office space. After 6 years, it has moved from an industrial area like North Acton to Notting Hill.</span></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1618"><span data-dcnode-id="1622" instrument_node="">Another space disrupting company, </span><a data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outsite.co/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1621" instrument_node="">Outsite</span></a><span data-dcnode-id="1619" instrument_node="">, features beautiful co-working places that can be enjoyed while on a “workation”, a holiday to a new and exciting office in an exotic country. </span></p><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Thus, there is still plenty of space to make a new co-working business possible.</span></p><span data-dcnode-id="1614" instrument_node="">

</span><p data-dcnode-id="1595"><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/laurabegleybloom/2017/12/29/7-travel-coworking-spaces-that-will-give-you-serious-wanderlust/%232541eb923c89" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1598" instrument_node="">Coworking spaces are taking over</span></a><span data-dcnode-id="1596" instrument_node="">. They have become one of the most accurate ideas to fill in large empty spaces. They are profitable and innovative. but, principally, a great response to the dire need for affordable office space.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1593" style="height:100px"></div><span data-dcnode-id="1592" instrument_node="">
</span><h2 data-dcnode-id="1587"><span class="ez-toc-section" data-dcnode-id="1591" id="Popping_new_retail_innovation_ideas"></span><strong data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Popping new retail innovation ideas</span></strong><span class="ez-toc-section-end" data-dcnode-id="1588"></span></h2><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Pop-up stores have been the most exciting idea for fashion brands in the last few years. </span></p><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1582" instrument_node="">Apart from setting them up in typical places like festivals or cultural events, brands are seriously considering making pop-ups their “</span><strong data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">next big thing</span></strong><span data-dcnode-id="1579" instrument_node="">”. </span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1576" instrument_node="">It’s proven so successful, </span><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fashionunited.uk/news/retail/inditex-opens-the-zara-store-of-tomorrow-at-westfield-stratford/2018051729700" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1575" instrument_node="">that Zara has done something similar</span></a><span data-dcnode-id="1573" instrument_node=""> in an experiment that ended up becoming the newest example of innovation for one of its biggest stores in London.</span></p><span data-dcnode-id="1571" instrument_node="">

</span><h2 data-dcnode-id="1549"><span class="ez-toc-section" data-dcnode-id="1553" id="Ice_cream_parlors"></span><strong data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Ice cream parlors</span></strong><span class="ez-toc-section-end" data-dcnode-id="1550"></span></h2><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Ice cream retail has been one of the biggest booms in London and its high streets for the past two years. </span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1544" instrument_node="">Their formula of success resides in the popularization of the concept of Italian </span><em data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">gelato</span></em><span data-dcnode-id="1541" instrument_node="">. </span></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1538" instrument_node="">A frozen treat with lower fat content than traditional ice cream that has taken the high streets by storm. Since</span><a data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/life-style/food-and-drink/news/appetite-for-lower-fat-ice-cream-feeds-high-street-gelato-boom-2349313.html" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1537" instrument_node=""> 2016, 80 new </span></a><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/life-style/food-and-drink/news/appetite-for-lower-fat-ice-cream-feeds-high-street-gelato-boom-2349313.html" rel="noreferrer noopener nofollow" target="_blank"><em data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">gelato</span></em><span data-dcnode-id="1533" instrument_node=""> parlours</span></a><span data-dcnode-id="1531" instrument_node=""> have opened across London, and the industry is already worth millions of pounds.</span></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1528" instrument_node="">With new trends in ice cream concepts appearing every year, which is the case of ideas like </span><a data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//icewaveshow.com/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1527" instrument_node="">Ice Wave</span></a><span data-dcnode-id="1525" instrument_node="">, ice cream waffle sandwiches, or </span><a data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sbs.com.au/food/article/2016/11/30/ice-cream-taco-and-other-ice-cool-trends-make-us-glad-summer-here" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1524" instrument_node="">ice cream tacos</span></a><span data-dcnode-id="1522" instrument_node="">, coming up with the next big thing shouldn’t be hard.</span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1519" instrument_node="">Another great innovation in the world of ice cream that needs to be taken into account is the one made by </span><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/nancygagliardi/2014/10/31/female-entrepreneurs-are-redefining-the-business-of-ice-cream/%231941e10cb0f2" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1518" instrument_node="">Robyn Sue Fisher, the woman behind Smitten Ice Cream</span></a><span data-dcnode-id="1516" instrument_node="">. </span></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1513" instrument_node="">Apart from producing personalized ice cream flavors with their patented Brrr machine, Fisher decided to try out </span><strong data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">a new strategy</span></strong><span data-dcnode-id="1510" instrument_node=""> by pulling the Brrr around town with a Radio Flyer wagon.</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">She would tweet her locations and approach customers’ homes as a traditional ice cream truck.</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Don’t forget the motto, your ice cream should be eco-friendly and as natural as possible. </span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">If you go so far as to offer organic products, you will form a loyal crowd in no time.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1485"><picture class="wp-image-12658" data-dcnode-id="1493"><span data-dcnode-id="1498" instrument_node="">
</span><source data-dcnode-id="1497" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://klintmarketing.com/wp-content/uploads/2020/09/15-min-1.png.webp 1024w, https://klintmarketing.com/wp-content/uploads/2020/09/15-min-1-300x199.png.webp 300w, https://klintmarketing.com/wp-content/uploads/2020/09/15-min-1-768x510.png.webp 768w, https://klintmarketing.com/wp-content/uploads/2020/09/15-min-1-150x100.png.webp 150w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20680'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="1496" instrument_node="">

</span><h2 data-dcnode-id="1477"><span class="ez-toc-section" data-dcnode-id="1481" id="Dover_Street_Market"></span><strong data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Dover Street Market</span></strong><span class="ez-toc-section-end" data-dcnode-id="1478"></span></h2><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Concept stores have become a thing. People love them, and they continue to bloom as the retail landscape in London changes. </span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1472" instrument_node="">Apart from constituting great places to shop at, they offer that </span><strong data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">authentic local experience</span></strong><span data-dcnode-id="1469" instrument_node=""> locals yearn for. </span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1466" instrument_node="">Such is the case of one of the most popular street markets of London, the </span><a data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theoneoff.com/journal/best-retail-innovation-london-march-2018/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1465" instrument_node="">Dover Street Market</span></a><span data-dcnode-id="1463" instrument_node="">.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">It was created by Rei Kawakubo and her husband Adrian Joffe, president of Comme des Garçons. </span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">It’s five stories tall and displays a selection of unusual couture brands. Its interior design is very well cared for, with a great choice of materials and environments for each of its rooms. </span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">It is one of the best examples of contemporary luxury fashion, and people want to stop by because it feels like visiting an art gallery.</span></p><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1451" instrument_node="">London is full of great innovative retail ideas that are taking back the customers thanks to their good understanding of </span><strong data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">user experience</span></strong><span data-dcnode-id="1448" instrument_node="">. In June, brands like </span><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tomdixon.net/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1447" instrument_node="">Tom Dixon</span></a><span data-dcnode-id="1445" instrument_node="">, </span><a data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gq-magazine.co.uk/article/giorgio-armani-london-store" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1444" instrument_node="">Giorgio Armani</span></a><span data-dcnode-id="1442" instrument_node="">, or </span><a data-dcnode-id="1440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.isseymiyake.com/en/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1441" instrument_node="">Issey Miyake</span></a><span data-dcnode-id="1439" instrument_node=""> launched their new, revolutionary physical stores in London, </span><a data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider-trends.com/the-best-london-retail-openings/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1438" instrument_node="">and it’s working</span></a><span data-dcnode-id="1436" instrument_node="">.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1420"><picture class="wp-image-12660" data-dcnode-id="1428"><span data-dcnode-id="1433" instrument_node="">

</span><h2 data-dcnode-id="1411"><span class="ez-toc-section" data-dcnode-id="1416" id="Retail_Trends_Innovation_Bars_-_Interactive_Experiences"></span><span data-dcnode-id="1415" instrument_node=""> Retail Trends &amp; Innovation: Bars – </span><strong data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Interactive Experiences</span></strong><span class="ez-toc-section-end" data-dcnode-id="1412"></span></h2><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Going out to the pub with friends will surely never get old. </span></p><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">But competition is way too high to not get a bit worried about it. </span></p><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1403" instrument_node="">Bars will eventually face the same problem as retail giants, they will need to offer </span><strong data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">something new</span></strong><span data-dcnode-id="1400" instrument_node=""> to customers if they want to turn into their best choice.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1397" instrument_node="">An example of this would be </span><a data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecauldron.io/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1396" instrument_node="">The Cauldron</span></a><span data-dcnode-id="1394" instrument_node="">, a Harry Potter-themed pub where visitors can create their own beverages by mixing different ingredients in a pewter cauldron. </span></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">They can also wear robes, use wands and visit the pub’s herbs and plants indoor crop.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">If you think bars will always have it easy, don’t forget the current mid-market restaurant crisis. </span></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Even when a business section seems popular and successful, overcrowding can become its worst enemy. Standing out is a must in the near future.</span></p><span data-dcnode-id="1383" instrument_node="">

</span><p data-dcnode-id="1344"><span data-dcnode-id="1348" instrument_node="">They are so successful that Londoners </span><strong data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">just can’t live without them</span></strong><span data-dcnode-id="1345" instrument_node="">. </span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1342" instrument_node="">Office outings and groups from all walks of life seem to enjoy the concept of </span><a data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/bisnow/2017/08/25/escape-rooms-how-these-unconventional-tenants-break-free-from-retails-woes/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1341" instrument_node="">working through a mystery</span></a><span data-dcnode-id="1339" instrument_node=""> for fun, and this type of entertainment has become a perfect way to fill up large spaces. </span></p><span data-dcnode-id="1337" instrument_node="">

</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">These businesses require minimal upfront investment and have operating hours that rival any other business on the market.</span></p><span data-dcnode-id="1323" instrument_node="">

</span><p data-dcnode-id="1247"><span data-dcnode-id="1251" instrument_node="">This project took place as a </span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.retailgazette.co.uk/blog/2018/01/zara-open-first-ever-click-click-store-london/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1250" instrument_node="">2150 sq ft pop up store</span></a><span data-dcnode-id="1248" instrument_node=""> while their flagship at the mall was being renovated, to keep the activity going while the “traditional” store was closed.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">The idea was perpetuated by being included at the refurbished main store.</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Making it the first one in the world to have four sections: </span></p><span data-dcnode-id="1240" instrument_node="">
</span><ul data-dcnode-id="1231"><li data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">men’s</span></li><li data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">women’s</span></li><li data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">children’s </span></li><li data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">click-and-collect.</span></li></ul><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Thus, customers can pick up online orders placed before 2 pm on the same day. Convenience is innovation.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1226" instrument_node="">A warehouse operated by a robot can handle up to </span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fashionunited.uk/news/retail/inditex-opens-the-zara-store-of-tomorrow-at-westfield-stratford/2018051729700" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1225" instrument_node="">2400 packages simultaneously</span></a><span data-dcnode-id="1223" instrument_node="">. </span></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1220" instrument_node="">Apart from this, the new store offers </span><strong data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">RFID technology interactive mirrors</span></strong><span data-dcnode-id="1217" instrument_node="">. </span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">They detect the clothes a customer is holding to provide more information on the item, as well as ideas to match said item to complete an outfit.</span></p><span data-dcnode-id="1212" instrument_node="">

</span><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">This type of store combines technology and convenience to make users want to stop by instead of ordering their food cart online.</span></p><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1157" instrument_node="">The giant of distribution </span><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theconversation.com/with-its-purchase-of-whole-foods-is-amazons-goal-to-revolutionise-food-distribution-93161" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1156" instrument_node="">debuted Amazon Fresh in London in 2016.</span></a><span data-dcnode-id="1154" instrument_node=""> </span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">A service that allows customers to have fruit and vegetables delivered to their homes within 2 hours for a monthly fee. </span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1148" instrument_node="">For this service to turn into reality, Amazon purchased big warehouses, such as a&nbsp;</span><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/technology/2015/aug/10/amazon-leases-warehouse-prime-position-deliver-food-london" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1147" instrument_node="">former Tesco one in Weybridge, Surrey</span></a><span data-dcnode-id="1145" instrument_node="">. </span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1142" instrument_node="">They have been taking over the leases of several retailers to buy more warehouses that are </span><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/technology/2015/aug/10/amazon-leases-warehouse-prime-position-deliver-food-london" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1141" instrument_node="">strategically placed</span></a><span data-dcnode-id="1139" instrument_node=""> to make the biggest possible impact.</span></p><span data-dcnode-id="1137" instrument_node="">

</span><p data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">Instead of googling their online shop, </span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bryson.co.uk/news/view/revamped-flagship-london-store-niketown" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1046" instrument_node="">people that came to buy a pair of Hypervenom 3’s</span></a><span data-dcnode-id="1044" instrument_node=""> were directed by a member of staff to an area with football benches and lockers, simulating a real locker room.</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">After receiving their perfect-sized boots out of a locker, they could test them at a trial zone cage where they could kick a ball into a wall with several holes that differed in height, checking whether their choice was good.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1038" instrument_node="">Nowadays, the store counts on a variety of </span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//demodern.com/projects/nike-community-wall" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1037" instrument_node="">“community walls” or interactive screens</span></a><span data-dcnode-id="1035" instrument_node=""> where users can consult the best outfit option for the product they have in their hands. </span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">They can see which products are currently popular among buyers, or learn more about free activities conducted at NikeTown.</span></p><span data-dcnode-id="1030" instrument_node="">

</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Celebrated as the most innovative company of 2015, Warby Parker is an online retailer of prescription glasses that began as a startup. </span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="999" instrument_node="">They ended up taking the lead as an offline business as well. </span><a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fastcompany.com/40483807/how-warby-parker-reinvented-the-eye-test" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="998" instrument_node="">They offer comprehensive eye exams</span></a><span data-dcnode-id="996" instrument_node=""> which can be received in 13 of their 60 locations, and also through their Prescription Check app.</span></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="993" instrument_node="">They have built </span><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inc.com/kevin-j-ryan/neil-blumenthal-warby-parker-retail-store-design.html" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="992" instrument_node="">showrooms that look like bookstores</span></a><span data-dcnode-id="990" instrument_node=""> and are constantly overcrowded despite the demise of the library business, and use AI in their flagships. </span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Also, their employees are specifically trained to understand consumer data and offer an individual experience.</span></p><span data-dcnode-id="985" instrument_node="">
</span><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="969"><div class="wp-block-embed__wrapper" data-dcnode-id="974"><span data-dcnode-id="984" instrument_node="">

</span><h2 data-dcnode-id="959"><span class="ez-toc-section" data-dcnode-id="965" id="The_Future_Beyond_Innovation_In_Smart_Cities"></span><span data-dcnode-id="964" instrument_node="">The </span><strong data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Future: Beyond Innovation</span></strong><span data-dcnode-id="961" instrument_node=""> In Smart Cities</span><span class="ez-toc-section-end" data-dcnode-id="960"></span></h2><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">The city of tomorrow is quickly approaching. </span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">It will come together thanks to the disrupting ideas that reshape cities to be convenient for the future society. </span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="951" instrument_node="">There are companies that are taking on&nbsp;</span><a data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.walktheroom.com/work/urban-escape" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="950" instrument_node="">massive projects to repurpose not only individual slots but entire city blocks</span></a><span data-dcnode-id="948" instrument_node="">. </span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">In a way that challenges our traditional vision of community and spaces.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="942" instrument_node="">Before we know it, </span><strong data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">the cities of today will look much different than we used to know them</span></strong><span data-dcnode-id="939" instrument_node="">.</span></p><span data-dcnode-id="937" instrument_node="">

</span><h2 data-dcnode-id="906"><span class="ez-toc-section" data-dcnode-id="910" id="Conclusion"></span><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Conclusion</span></strong><span class="ez-toc-section-end" data-dcnode-id="907"></span></h2><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">What if retail just needs a face wash? </span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">What if the opportunity is there, but just needs to be taken in the right way? </span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Perhaps the future of physical retail isn’t as easy as it used to be. </span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Open a store full of products that people usually buy, and they will buy them.</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="892" instrument_node="">The physical retail of today needs to make concepts like </span><strong data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">user experience, technology, personalized attention, data usage, and interior design converge into a well-balanced mix</span></strong><span data-dcnode-id="889" instrument_node="">. </span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Some big companies are already doing it, and some small ones are being born thanks to a good understanding of the situation.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">Getting more in touch with the </span><strong data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">consumer experience</span></strong><span data-dcnode-id="880" instrument_node=""> will help established companies do better, and small ones get out there. </span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Some are already doing it, and London is a crucial capital city for this kind of innovation.</span></p><span data-dcnode-id="875" instrument_node="">
