lass="jobsearch-JobDescriptionSection-sectionItemKey icl-u-textBold" data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Salary</span></div><span class="icl-u-xs-mr--xs" data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Up to $40 an hour</span></span></div><div class="jobsearch-JobDescriptionSection-sectionItem" data-dcnode-id="1964"><div class="jobsearch-JobDescriptionSection-sectionItemKey icl-u-textBold" data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Job Type</span></div><div data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Full-time</span></div></div></div></div><div class="mosaic-zone" data-dcnode-id="1960" id="mosaic-aboveFullJobDescription"><div class="mosaic mosaic-provider-company-info-salary mosaic-rst" data-dcnode-id="1961" id="mosaic-provider-company-info-salary"></div></div><h2 class="jobsearch-JobDescriptionSection-jobDescriptionTitle icl-u-xs-my--md" data-dcnode-id="1958" id="jobDescriptionTitle"><span data-dcnode-id="1959" instrument_node="">Full Job Description</span></h2><div class="jobsearch-jobDescriptionText" data-dcnode-id="1737" id="jobDescriptionText"><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1946"><b data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">HIRING IMMEDIATELY!</span></b><br data-dcnode-id="1954"/><b data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Great Career Opportunity!</span></b><br data-dcnode-id="1951"/><b data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">Company Paid Pension!</span></b><br data-dcnode-id="1948"/><span data-dcnode-id="1947" instrument_node="">Americold is looking for full-time Warehouse Order Selectors for our facility in Tolleson, Az.</span></p><span data-dcnode-id="1945" instrument_node="">
</span><ul data-dcnode-id="1915"><span data-dcnode-id="1944" instrument_node="">
</span><li data-dcnode-id="1941"><b data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">Up to $40/hour with base pay plus performance &amp; attendance incentives!</span></b></li><span data-dcnode-id="1940" instrument_node="">
</span><li data-dcnode-id="1937"><b data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">All shifts available, weekends required.</span></b></li><span data-dcnode-id="1936" instrument_node="">
</span><li data-dcnode-id="1933"><b data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">$2000 bonus after 8 weeks, $2000 bonus after 120 days, $2500 bonus after 1 year! Up to $6500 in bonuses in one year!</span></b></li><span data-dcnode-id="1932" instrument_node="">
</span><li data-dcnode-id="1929"><b data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Earn up to an additional $.50/hour after your first week for working all scheduled hours, increases to an additional $1/hour after 4 weeks, and $2/hour after 8 weeks.</span></b></li><span data-dcnode-id="1928" instrument_node="">
</span><li data-dcnode-id="1925"><b data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Pension Plan with Contribution!</span></b></li><span data-dcnode-id="1924" instrument_node="">
</span><li data-dcnode-id="1921"><b data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Low Cost Health Care!</span></b></li><span data-dcnode-id="1920" instrument_node="">
</span><li data-dcnode-id="1917"><b data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Discount Groceries!</span></b></li><span data-dcnode-id="1916" instrument_node="">
</span></ul><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1899"><b data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Overview: </span></b><br data-dcnode-id="1911"/><span data-dcnode-id="1910" instrument_node="">Americold provides temperature-controlled warehousing and transportation to food producers, restaurants, schools, and retail outlets such as grocery stores. We're proud to provide an essential link in the food industry supply chain and to help put food on tables around the world.</span><br data-dcnode-id="1909"/><span data-dcnode-id="1908" instrument_node="">Based in Atlanta, Georgia, Americold owns and operates temperature-controlled warehouses around the world. We have over 16,000 associates and offer a wide variety of career opportunities - from warehouse forklift operators and supervisors to accounting, administration, business development, customer support, engineering, transportation, and technology solutions positions.</span><br data-dcnode-id="1907"/><b data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Primary Responsibility: </span></b><br data-dcnode-id="1904"/><span data-dcnode-id="1903" instrument_node="">Under general supervision, the Warehouse Order Selector will assemble and select cases from pick slots for store orders daily in an accurate, efficient, productive manner and assembles order onto plastic pallets using a Talkman and pallet jack.</span><br data-dcnode-id="1902"/><b data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">Essential Functions: </span></b></p><span data-dcnode-id="1898" instrument_node="">
</span><ul data-dcnode-id="1863"><span data-dcnode-id="1897" instrument_node="">
</span><li data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Prepares and loads voice template into Talkman unit for specific warehouse selecting location.</span></li><span data-dcnode-id="1894" instrument_node="">
</span><li data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Performs visual and operational vehicle safety inspections and reports any unsafe vehicles to shift supervisor or maintenance personnel.</span></li><span data-dcnode-id="1891" instrument_node="">
</span><li data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Responsible for ensuring that all cases and pallets are properly identified with the correct store number.</span></li><span data-dcnode-id="1888" instrument_node="">
</span><li data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Performs count/exception on pick slot locations if quantities are less than requested by Talkman.</span></li><span data-dcnode-id="1885" instrument_node="">
</span><li data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Secures selected cases and conducts final pallet preparations by wrapping selected load and applying shipping labels.</span></li><span data-dcnode-id="1882" instrument_node="">
</span><li data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Prepares and places assembled case pick pallets and moves assembled pallets from picking areas to a dock door or staging area.</span></li><span data-dcnode-id="1879" instrument_node="">
</span><li data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Observes, reports and corrects (when appropriate) all unsafe and unsanitary conditions that could cause employee and/or customer accidents.</span></li><span data-dcnode-id="1876" instrument_node="">
</span><li data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">Comply with OSHA standards.</span></li><span data-dcnode-id="1873" instrument_node="">
</span><li data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">Assist in maintaining the security of the warehouse.</span></li><span data-dcnode-id="1870" instrument_node="">
</span><li data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Maintain a clean, neat, and orderly work environment.</span></li><span data-dcnode-id="1867" instrument_node="">
