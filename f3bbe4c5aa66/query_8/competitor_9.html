</span><div class="news-article--content" data-dcnode-id="868"><span data-dcnode-id="1297" instrument_node="">
</span><div class="news-article--content--body" data-dcnode-id="1230" itemprop="articleBody"><span data-dcnode-id="1296" instrument_node="">
</span><div class="news-article--content--body--inner" data-dcnode-id="1232"><span data-dcnode-id="1295" instrument_node="">
</span><div class="paragraph paragraph--type--content-block-text paragraph--view-mode--default" data-dcnode-id="1234"><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1291"><em data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">This is part 3 of a three-part series examining the effects of robots and automation on employment, based on new research from economist and Institute Professor Daron Acemoglu.&nbsp;</span></em></p><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Modern technology affects different workers in different ways. In some white-collar jobs — designer, engineer — people become more productive with sophisticated software at their side. In other cases, forms of automation, from robots to phone-answering systems, have simply replaced factory workers, receptionists, and many other kinds of employees.</span></p><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Now a new study co-authored by an MIT economist suggests automation has a bigger impact on the labor market and income inequality than previous research would indicate — and identifies the year 1987 as a key inflection point in this process, the moment when jobs lost to automation stopped being replaced by an equal number of similar workplace opportunities.</span></p><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">“Automation is critical for understanding inequality dynamics,” says MIT economist Daron Acemoglu, co-author of a newly published paper detailing the findings.</span></p><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Within industries adopting automation, the study shows, the average “displacement” (or job loss) from 1947-1987 was 17 percent of jobs, while the average “reinstatement” (new opportunities) was 19 percent. But from 1987-2016, displacement was 16 percent, while reinstatement was just 10 percent. In short, those factory positions or phone-answering jobs are not coming back.</span></p><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">“A lot of the new job opportunities that technology brought from the 1960s to the 1980s benefitted low-skill workers,” Acemoglu adds. “But from the 1980s, and especially in the 1990s and 2000s, there’s a double whammy for low-skill workers: They’re hurt by displacement, and the new tasks that are coming, are coming slower and benefitting high-skill workers.”</span></p><p data-dcnode-id="1276"><span data-dcnode-id="1280" instrument_node="">The new paper, “Unpacking Skill Bias: Automation and New Tasks,” will appear in the May issue of the </span><em data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">American Economic Association: Papers and Proceedings</span></em><span data-dcnode-id="1277" instrument_node="">. The authors are Acemoglu, who is an Institute Professor at MIT, and Pascual Restrepo PhD ’16, an assistant professor of economics at Boston University.</span></p><p data-dcnode-id="1273"><strong data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Low-skill workers: Moving backward</span></strong></p><p data-dcnode-id="1268"><span data-dcnode-id="1272" instrument_node="">The new paper is one of several studies Acemoglu and Restrepo have conducted recently examining the effects of robots and automation in the workplace. In a just-published paper, they </span><a data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.mit.edu/2020/how-many-jobs-robots-replace-0504"><span data-dcnode-id="1271" instrument_node="">concluded that across the U.S. from 1993 to 2007, each new robot replaced 3.3 jobs</span></a><span data-dcnode-id="1269" instrument_node="">.</span></p><p data-dcnode-id="1263"><span data-dcnode-id="1267" instrument_node="">In still another new paper, Acemoglu and Restrepo examined French industry from 2010 to 2015. They </span><a data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.mit.edu/2020/robots-help-firms-workers-struggle-0505"><span data-dcnode-id="1266" instrument_node="">found that firms that quickly adopted robots became more productive and hired more workers, while their competitors fell behind and shed workers — with jobs again being reduced overall</span></a><span data-dcnode-id="1264" instrument_node="">.</span></p><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">In the current study, Acemoglu and Restrepo construct a model of technology’s effects on the labor market, while testing the model’s strength by using empirical data from 44 relevant industries. (The study uses U.S. Census statistics on employment and wages, as well as economic data from the Bureau of Economic Analysis and the Bureau of Labor Studies, among other sources.)</span></p><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">The result is an alternative to the standard economic modeling in the field, which has emphasized the idea of “skill-biased” technological change — meaning that technology tends to benefit select high-skilled workers more than low-skill workers, helping the wages of high-skilled workers more, while the value of other workers stagnates. Think again of highly trained engineers who use new software to finish more projects more quickly: They become more productive and valuable, while workers lacking synergy with new technology are comparatively less valued. &nbsp;</span></p><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">However, Acemoglu and Restrepo think even this scenario, with the prosperity gap it implies, is still too benign. Where automation occurs, lower-skill workers are not just failing to make gains; they are actively pushed backward financially. Moreover, &nbsp;Acemoglu and Restrepo note, the standard model of skill-biased change does not fully account for this dynamic; it estimates that productivity gains and real (inflation-adjusted) wages of workers should be higher than they actually are.</span></p><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">More specifically, the standard model implies an estimate of about 2 percent annual growth in productivity since 1963, whereas annual productivity gains have been about 1.2 percent; it also estimates wage growth for low-skill workers of about 1 percent per year, whereas real wages for low-skill workers have actually dropped since the 1970s.</span></p><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">“Productivity growth has been lackluster, and real wages have fallen,” Acemoglu says. “Automation accounts for both of those.” Moreover, he adds, “Demand for skills has gone down almost exclusely in industries that have seen a lot of automation.”</span></p><p data-dcnode-id="1250"><strong data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Why “so-so technologies” are so, so bad</span></strong></p><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Indeed, Acemoglu says, automation is a special case within the larger set of technological changes in the workplace. As he puts it, automation “is different than garden-variety skill-biased technological change,” because it can replace jobs without adding much productivity to the economy.</span></p><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Think of a self-checkout system in your supermarket or pharmacy: It reduces labor costs without making the task more efficient. The difference is the work is done by you, not paid employees. These kinds of systems are what Acemoglu and Restrepo have termed “so-so technologies,” because of the minimal value they offer.</span></p><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">“So-so technologies are not really doing a fantastic job, nobody’s enthusiastic about going one-by-one through their items at checkout, and nobody likes it when the airline they’re calling puts them through automated menus,” Acemoglu says. “So-so technologies are cost-saving devices for firms that just reduce their costs a little bit but don’t increase productivity by much. They create the usual displacement effect but don’t benefit other workers that much, and firms have no reason to hire more workers or pay other workers more.”</span></p><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">To be sure, not all automation resembles self-checkout systems, which were not around in 1987. Automation at that time consisted more of printed office records being converted into databases, or machinery being added to sectors like textiles and furniture-making. Robots became more commonly added to heavy industrial manufacturing in the 1990s. Automation is a suite of technologies, continuing today with software and AI, which are inherently worker-displacing.</span></p><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">“Displacement is really the center of our theory,” Acemoglu says. “And it has grimmer implications, because wage inequality is associated with disruptive changes for workers. It’s a much more Luddite explanation.”</span></p><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">After all, the Luddites — British textile mill workers who destroyed machinery in the 1810s — may be synonymous with technophobia, but their actions were motivated by economic concerns; they knew machines were replacing their jobs. That same displacement continues today, although, Acemoglu contends, the net negative consequences of technology on jobs is not inevitable. We could, perhaps, find more ways to produce job-enhancing technologies, rather than job-replacing innovations.</span></p><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">“It’s not all doom and gloom,” says Acemoglu. “There is nothing that says technology is all bad for workers. It is the choice we make about the direction to develop technology that is critical.”</span></p><span data-dcnode-id="1235" instrument_node="">
</span></div><span data-dcnode-id="1233" instrument_node="">
</span></div><span data-dcnode-id="1231" instrument_node="">
</span></div><span data-dcnode-id="1229" instrument_node="">
