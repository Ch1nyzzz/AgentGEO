</span><div class="section post-body" data-dcnode-id="1115"><span data-dcnode-id="1314" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_rich_text" data-dcnode-id="1117" data-hs-cos-general-type="meta_field" data-hs-cos-type="rich_text" id="hs_cos_wrapper_post_body" style=""><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">“Automation.”</span></p><span data-dcnode-id="1311" instrument_node="">
</span><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">When you hear that word, what comes to mind?</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">The answer most likely depends on your familiarity with our industry. To many people outside the automation industry, the first thought that might pop up is:</span></p><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1300"><strong data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">"Will my job be replaced by a robot?"</span></strong></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">The concern is valid for a lot of people all over the world. If we’re being honest, there is no simple answer.</span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1295" instrument_node="">One of the goals of the International Society of Automation (ISA) is to </span><strong data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">educate folks about automation</span></strong><span data-dcnode-id="1292" instrument_node="">. We cover a lot of the more technical aspects in depth, such as best practices, new technologies, and the broader implications of Industry 4.0. It seems, however, as though we rarely discuss the 800-pound gorilla in the room. Today, let’s tackle it.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><h2 data-dcnode-id="1288" style="font-weight: normal;"><span data-dcnode-id="1289" instrument_node="">First, a Little Background</span></h2><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1286" instrument_node="">The anxiety over automation is widespread. People from many different backgrounds and beliefs share it, and if you look around at world events, it makes sense. Automation shows up in the news a lot these days, and it’s rarely good. A former 2020 U.S. presidential candidate's campaign was devoted to proving that automation leads to mass unemployment. We see reports like </span><a data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/business-48760799"><span data-dcnode-id="1285" instrument_node="">this one</span></a><span data-dcnode-id="1283" instrument_node=""> from Oxford Economics predicting that robots will replace up to 20 million factory jobs by 2030. It’s a real possibility that many of the tasks that make up your typical work day in 2020 won’t be necessary in five or 10 years. We can’t predict what the jobs of the future will be, for the </span><span data-dcnode-id="1281" style="font-weight: bold;"><span data-dcnode-id="1282" instrument_node="">first time in history</span></span><span data-dcnode-id="1280" instrument_node="">.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">“The automation issue” is often simplified into two sides that are “for automation” and “against automation.” It can be difficult to convince anyone on either “side” to really listen to each other’s points, but the situation is more complex than a simple yes or no. There is no easy answer to today’s challenges, or one single valid viewpoint.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1274" instrument_node="">To help illustrate their arguments, analysts on both “sides” often point to the </span><strong data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">automotive industry trends of the 1970s and 1980s</span></strong><span data-dcnode-id="1271" instrument_node="">, when factories across the U.S. shut down due to outsourcing, and the first robots were brought in to replace workers who, until then, had good-paying reliable jobs.</span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1265"><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">On one side</span></strong><span data-dcnode-id="1266" instrument_node="">, you have those who claim most workers from that era were retrained into other, more modern, higher-paying jobs—but realistically, that wasn’t true for everyone.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1260"><strong data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">On the other side</span></strong><span data-dcnode-id="1261" instrument_node="">, you have the fact that many people who worked at these plants for 15 or 20 years lost their jobs overnight to a machine—but while these jobs were disappearing, new technologies were being introduced, along with new job opportunities.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Change is not kind to everyone, but it is inevitable.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><h2 data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">We Can Agree on the Basic Facts</span></h2><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">If you have an opinion on automation, regardless of where you stand, there are a couple of basic facts on which you’ll probably agree.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><h3 data-dcnode-id="1247"><em data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">1. Technology is always changing, and tech changes lead to job changes.</span></em></h3><span data-dcnode-id="1246" instrument_node="">
</span><br data-dcnode-id="1245"><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1243" instrument_node="">This has been true since humans first learned to use stone tools—when, as you might imagine, the need for someone to make and use these tools also arose. Even those who try to limit certain aspects of how we use technology (think, for example, about a family deciding to curb its smart phone use at the dinner table), </span><strong data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">usually still rely on that technology</span></strong><span data-dcnode-id="1240" instrument_node=""> in their everyday lives. In the global economy, opinions on technology don’t matter nearly as much as the </span><strong data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">cold, hard data </span></strong><span data-dcnode-id="1237" instrument_node="">on whether people actually use it.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Technology changes aren’t always bad for human workers, either. In many cases, they’re a huge positive.</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">If you typically work in an office, can you imagine what your day-to-day routine would look like without a computer, a smart phone, or email?</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Industrial and factory workers certainly wouldn’t want to go back to the days when broken equipment, injuries, and fatalities were commonplace.</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1225" instrument_node="">There are many instances where automation has come in to improve people’s work and lives. </span><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.mit.edu/2020/robots-help-firms-workers-struggle-0505" rel="noopener" target="_blank"><span data-dcnode-id="1224" instrument_node="">A recent MIT study</span></a><span data-dcnode-id="1222" instrument_node="">&nbsp;found that manufacturers that were quick to add robots to their production lines </span><span data-dcnode-id="1220" style="font-weight: bold;"><span data-dcnode-id="1221" instrument_node="">actually increased employee hours worked</span></span><span data-dcnode-id="1219" instrument_node=""> in a five-year period. Wages rose as well. Productivity and profits increased for these companies—and so did growth and market share, leading to the need for more workers. (Job losses were more concentrated in companies that dragged their feet on new technology.)</span></p><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1216" instrument_node="">When we only look back at history to see what was lost, we sometimes—understandably—neglect the long view. Take our first example with the automotive industry. At the same time automotive work in the U.S. was heading overseas, the entire computing industry was in its infancy. Jobs were created that didn’t exist before computing became widespread. The geographic distribution didn’t quite overlap with automotive jobs lost, and </span><a data-dcnode-id="1214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brookings.edu/bpea-articles/recessions-and-the-costs-of-job-loss/" rel="noopener" target="_blank"><span data-dcnode-id="1215" instrument_node="">this displacement led to lasting hardship for many</span></a><span data-dcnode-id="1213" instrument_node="">, although some got lucky. In time, younger generations found </span><strong data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">(or invented)</span></strong><span data-dcnode-id="1210" instrument_node=""> new areas of technology in which they could focus their professional lives.</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1207" instrument_node="">No one likes to think about it, but realistically, some jobs </span><em data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">will</span></em><span data-dcnode-id="1204" instrument_node=""> be eliminated by automation. Still, </span><strong data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">this technological revolution is different</span></strong><span data-dcnode-id="1201" instrument_node=""> than the one in the 1970s and 1980s. The Industrial Internet of Things (IIoT), robotics, and smart devices are being implemented all over the world, and they all still rely on humans.</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1198" instrument_node="">Highly automated jobs in these fields will still need a human being to give a stamp of approval or to step in and correct problems, although humans will need to learn new processes of doing so. It’s </span><a data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com.au/heres-why-youre-better-off-retraining-employees-than-hiring-new-staff-2018-6"><span data-dcnode-id="1197" instrument_node="">much more cost-effective</span></a><span data-dcnode-id="1195" instrument_node=""> to retrain existing employees on these new systems than it would be to hire a brand new workforce.</span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1192" instrument_node="">Besides, does anyone feel truly fulfilled standing on an assembly line, turning the same repetitive widgets for eight to ten hours each day? </span><span data-dcnode-id="1190" style="font-style: italic;"><span data-dcnode-id="1191" instrument_node="">Industry Week</span></span><span data-dcnode-id="1189" instrument_node=""> </span><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.industryweek.com/leadership/article/22028491/does-manufacturing-need-a-culture-makeover"><span data-dcnode-id="1188" instrument_node="">recently reported</span></a><span data-dcnode-id="1186" instrument_node=""> on a study that found that manufacturing workers are the least engaged at work, lagging behind other industry sectors by 8 percentage points. With more complex tasks and responsibilities unlocked by automation, work could become more engaging.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1183" instrument_node="">It’s a very real concern that jobs are being affected by new technologies. The only questions left are: in what ways, and </span><strong data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">what can be done to improve the human experience</span></strong><span data-dcnode-id="1180" instrument_node="">. This brings us to the second basic fact we mentioned earlier:</span></p><span data-dcnode-id="1178" instrument_node="">
</span><h3 data-dcnode-id="1175"><em data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">2. The workforce still needs humans.</span></em></h3><span data-dcnode-id="1174" instrument_node="">
</span><br data-dcnode-id="1173"><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1171" instrument_node="">Humans still have the upper hand when it comes to human interaction—or “</span><span data-dcnode-id="1169" style="font-weight: bold;"><span data-dcnode-id="1170" instrument_node="">soft skills</span></span><span data-dcnode-id="1168" instrument_node="">,” as you might call them today. According to a recent report from the Royal Bank of Canada (RBC) called “</span><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rbc.com/dms/enterprise/futurelaunch/humans-wanted-how-canadian-youth-can-thrive-in-the-age-of-disruption.html"><span data-dcnode-id="1167" instrument_node="">Humans Wanted</span></a><span data-dcnode-id="1165" instrument_node="">,” Canada’s top five most in-demand job skills from 2019 through 2022 are active listening, speaking, critical thinking, reading comprehension, and monitoring. (Virtually every other nation needs the same top five.) When it comes to these essential workforce skills, humans are still more reliable and more efficient than any technology. Even if you end up changing industries halfway through your career, maintaining and improving your abilities in these core areas will serve you well.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1162" instrument_node="">Not only is employee retraining or “reskilling” more cost-effective to employers, it benefits the </span><span data-dcnode-id="1160" style="font-weight: bold;"><span data-dcnode-id="1161" instrument_node="">long-term personal growth</span></span><span data-dcnode-id="1159" instrument_node=""> of employees. Looking a few years further down the road, education will become even more crucial than it is today. The existing workforce needs to continually reinvent themselves, “reskilling” on the job to learn new systems as technology evolves. As the older generation retires, younger generations must learn the legacy systems as well as adapt to changing technologies. </span><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2012/07/why-top-young-managers-are-in-a-nonstop-job-hunt"><span data-dcnode-id="1158" instrument_node="">Job-hopping is becoming more commonplace</span></a><span data-dcnode-id="1156" instrument_node="">, and any program that contributes to employee training, personal development, and education will be one more reason for people to stick around.</span></p><span data-dcnode-id="1154" instrument_node="">
</span><h2 data-dcnode-id="1149"><span data-dcnode-id="1153" instrument_node="">What Does the Future Hold for </span><em data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">You</span></em><span data-dcnode-id="1150" instrument_node="">?</span></h2><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1147" instrument_node="">Instead of being concerned that a robot or machine will take your job, learn to be the human that builds, fixes, maintains, or programs the machines. The worst thing we can do is to feel helpless. At the current rate of technological change, we’ll likely need to </span><strong data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">keep learning for the rest of our careers</span></strong><span data-dcnode-id="1144" instrument_node="">, so we might as well embrace it. With the advent of new fields such as renewable energy, cloud computing, blockchain, and more, the right skills will ensure you the right job in tech.</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1141" instrument_node="">Even if you aren’t interested in high-tech paths like software engineering, or if you like being outside and working with your hands, </span><strong data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">you can find a good job that's right for you</span></strong><span data-dcnode-id="1138" instrument_node="">. Cities all around the world are making investments in energy-efficient infrastructure and the growth of renewable energy—which means that jobs like solar panel installation, water/wastewater engineers and technicians, and civil engineers will always be in demand wherever you live.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1135" instrument_node="">Jobs in five to 10 years certainly won’t look like they do today. Some won’t exist. There will also be new job descriptions that we can’t even imagine today. As an automation professional who cares about the automation community, it will be up to you to create new opportunities to reskill yourself, your team, and those just starting their careers. You could start by signing up for an upcoming class from </span><a data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.isa.org/training-certifications/isa-training/training-events-calendar/"><span data-dcnode-id="1134" instrument_node="">ISA Training</span></a><span data-dcnode-id="1132" instrument_node="">, or mentoring someone in your field through the ISA Mentor Program. Employers also need to offer more on-the-job training, or risk losing their best employees to companies that do so.</span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">The future is coming, whether we like it or not. We can weather its changes, and even thrive, but we need to begin now.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><hr data-dcnode-id="1126"><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1123" style="font-style: italic;"><span data-dcnode-id="1124" instrument_node="">Interested in reading more articles like this? </span></span><a data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.isa.org/subscribe" rel="noopener" style="font-style: italic;" target="_blank"><span data-dcnode-id="1122" instrument_node="">Subscribe to ISA Interchange</span></a><span data-dcnode-id="1119" style="font-style: italic;"><span data-dcnode-id="1120" instrument_node=""> and receive weekly emails with links to our latest interviews, news, thought leadership, tips, and more from the automation industry.</span></span></p></span><span data-dcnode-id="1116" instrument_node="">
