</span><p data-dcnode-id="1380"><span data-dcnode-id="1387" instrument_node="">Not long ago the </span><strong data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">rapid adaptation</span></strong><span data-dcnode-id="1384" instrument_node=""> of Automated Teller Machines (</span><strong data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">ATMs</span></strong><span data-dcnode-id="1381" instrument_node="">) had a similar effect on the labor market.</span></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1378" instrument_node="">While the </span><strong data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">bank tellers</span></strong><span data-dcnode-id="1375" instrument_node=""> per bank office </span><strong data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">decreased</span></strong><span data-dcnode-id="1372" instrument_node="">, the ATMs lowered the costs of opening new offices and the </span><strong data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">number of offices</span></strong><span data-dcnode-id="1369" instrument_node=""> started </span><strong data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">increasing</span></strong><span data-dcnode-id="1366" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1363" instrument_node="">This, eventually, led to </span><strong data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">banks hiring even more employees</span></strong><span data-dcnode-id="1360" instrument_node="">, including bank tellers.&nbsp;</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1357" instrument_node="">There was a change, however, and </span><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">automation impacted</span></strong><span data-dcnode-id="1354" instrument_node=""> bank tellers’ jobs.</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1351" instrument_node="">They started focusing more on </span><strong data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">customer relations</span></strong><span data-dcnode-id="1348" instrument_node="">, as their </span><strong data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">routine tasks became automated</span></strong><span data-dcnode-id="1345" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1343" instrument_node="">

</span><p data-dcnode-id="1336"><em data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">(Source: BBC)</span></em></p><span data-dcnode-id="1335" instrument_node="">

</span><p data-dcnode-id="1313"><span data-dcnode-id="1320" instrument_node="">According to the report, in the UK, about</span><strong data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node=""> seven million existing jobs could be displaced by AI</span></strong><span data-dcnode-id="1317" instrument_node=""> between 2017 - 2037. However, around </span><strong data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">7.2 million new jobs</span></strong><span data-dcnode-id="1314" instrument_node=""> will appear in the process.&nbsp;</span></p><span data-dcnode-id="1312" instrument_node="">

</span><p data-dcnode-id="1260"><span data-dcnode-id="1267" instrument_node="">Jobs lost to automation statistics reveal that, in 2018, about</span><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node=""> 71% of total task hours were being completed by humans</span></strong><span data-dcnode-id="1264" instrument_node="">, while&nbsp; </span><strong data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">29% was being completed by machines</span></strong><span data-dcnode-id="1261" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1259" instrument_node="">

</span><h3 data-dcnode-id="1204" id="all-about-those-soft-skills-future-job-augmentation"><strong data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">All About Those Soft Skills: Future Job Augmentation</span></strong></h3><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1202" instrument_node="">Experts predict that the </span><strong data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">employment of the future</span></strong><span data-dcnode-id="1199" instrument_node=""> will revolve around skills our </span><strong data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">robot fellows don’t have the capacity to pull off</span></strong><span data-dcnode-id="1196" instrument_node="">... yet (and some believe if they ever do humans are doomed).&nbsp;</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1193" instrument_node="">As </span><strong data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">technology starts taking over jobs</span></strong><span data-dcnode-id="1190" instrument_node="">, we’ll have to </span><strong data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">start looking for ways to adapt</span></strong><span data-dcnode-id="1187" instrument_node=""> to the new labor environment.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">It’s true that:</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1181" instrument_node="">Scientists have made some significant progress in</span><strong data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node=""> AI development</span></strong><span data-dcnode-id="1178" instrument_node=""> in recent years.&nbsp;</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1175" instrument_node="">They’ve been able to make</span><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techjury.net/blog/machine-learning-algorithms/"><span data-dcnode-id="1174" instrument_node=""> </span><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">machines that perform meaningful tasks</span></strong></a><span data-dcnode-id="1170" instrument_node=""> even outside the assembly line. They’ve also been able to </span><strong data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">produce remarkable results</span></strong><span data-dcnode-id="1167" instrument_node=""> in pattern recognition and pattern generation.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">But, it’s early to speculate whether “the robots are out to get us all”.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Occupations involving human touch or soft skills are an option for those of us with jobs at risk of automation.&nbsp;</span></p><span data-dcnode-id="1159" instrument_node="">
</span><h3 data-dcnode-id="1156" id="the-jobs-of-the-future"><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">The Jobs of the Future</span></strong></h3><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">As mentioned above jobs in sectors where human care and understanding are needed will start becoming more important as automation spreads.&nbsp;</span></p><span data-dcnode-id="1152" instrument_node="">
</span><h4 data-dcnode-id="1149" id="healthcare"><strong data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Healthcare</span></strong></h4><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Care for our seniors (Basically, you and me in the not-so-distant future. There, I said it.) is one of the areas AI won’t have as a significant impact as elsewhere.&nbsp;</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">With the global population steadily aging, it’s estimated that by 2030 there will be at least 300 million more people above the age of 65 than there were in 2014.&nbsp;&nbsp;</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">And that will affect the number of carers as it’s unlikely that their jobs will be eliminated by technology.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">McKinsey Global Institute forecasts that:</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Aging will create a noticeable demand for a range of occupations including doctors, nurses, and health technicians. And we’ll also see an increase in the number of nursing assistants and home health aides.&nbsp;</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Personal carers, in general, will become one of the most sought out jobs. The forecast expects growth by 50 million to 85 million jobs in the field.</span></p><span data-dcnode-id="1130" instrument_node="">
</span><h4 data-dcnode-id="1127" id="consumption-driven-by-emerging-economies"><strong data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Consumption, Driven by Emerging Economies</span></strong></h4><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">While the emerging economies will most significantly feel the wave of jobs that will be automated, it’s also projected that we’ll see an increase in consumption coming specifically from the new consumer classes of those economies.&nbsp;</span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1122" instrument_node="">McKinsey reports growth of</span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/featured-insights/urbanization/urban-world-the-global-consumers-to-watch" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1121" instrument_node=""> $23 trillion between 2015 and 2030</span></a><span data-dcnode-id="1119" instrument_node="">.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">The effect of the new consumers will affect the countries generating the income, but also in the countries, they’re importing goods from.&nbsp;</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Globally, experts believe this rise in consumption can create between 250 million and 280 million jobs.&nbsp;</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Education and healthcare will have leading positions.&nbsp;</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Forecasts paint a picture of automation and jobs going hand-in-hand.&nbsp;</span></p><span data-dcnode-id="1105" instrument_node="">
</span><h4 data-dcnode-id="1102" id="the-age-of-it-professionals"><strong data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">The Age of IT Professionals</span></strong></h4><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">McKinsey Global report continues with projections that spending on technology could grow by more than 50% between 2015 and 2030. They expect about half of that to come from information-technology services, which will create opportunities for job growth between 20 and 50 million globally.&nbsp;</span></p><span data-dcnode-id="1098" instrument_node="">
</span><h4 data-dcnode-id="1095" id="architects-and-engineers"><strong data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Architects and Engineers</span></strong></h4><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Those two professions are also likely to see a rise in numbers. Depending on the way the investments in infrastructure and building are developing, the required specialists could very well grow between 80 and 200 million.&nbsp;</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Those technology taking over jobs statistics don’t look as frightening now, right?</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">But let’s add:</span></p><span data-dcnode-id="1085" instrument_node="">
</span><h4 data-dcnode-id="1082" id="climate-change-and-renewable-energy"><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Climate Change and Renewable Energy</span></strong></h4><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1080" instrument_node="">To mitigate the environmental changes we’re facing, we’ll need </span><strong data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">professionals engaged in the field of solar and wind technology</span></strong><span data-dcnode-id="1077" instrument_node="">. Based on the forecast of McKinsey Global, this might involved </span><strong data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">hiring workers</span></strong><span data-dcnode-id="1074" instrument_node=""> tasked with </span><strong data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">manufacturing</span></strong><span data-dcnode-id="1071" instrument_node="">, </span><strong data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">construction</span></strong><span data-dcnode-id="1068" instrument_node="">, and </span><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">installation jobs</span></strong><span data-dcnode-id="1065" instrument_node=""> in that sector.&nbsp;</span></p><span data-dcnode-id="1063" instrument_node="">
</span><h4 data-dcnode-id="1060" id="money-in-house-choirs"><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Money in House Choirs</span></strong></h4><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1058" instrument_node="">Another trend the research considers is the </span><strong data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">marketization of housework</span></strong><span data-dcnode-id="1055" instrument_node="">, which previously wasn’t part of the economic equation. Pushed by the growing percentage of the female workforce, jobs like childcare and education, cleaning, cooking, and gardening might see a rise of 50 to 90 million jobs. &nbsp;</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">So it’s unsure that we’ll see artificial intelligence taking those jobs yet.&nbsp;</span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">The truth is:</span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Since the robots have started taking over (not like in “The Matrix”, though) we see a positive increase in productivity.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><h3 data-dcnode-id="1041" id="economy-expansion"><strong data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Economy Expansion</span></strong></h3><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Automation can boost the global economy by 1.4% annually according to McKinsey</span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">The research admits that automation will impact economic growth significantly and will propose the mechanization of up to 30% of the jobs globally by 2030. Still, researchers are confident this wouldn’t necessarily mean massive layoffs.&nbsp;</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">It could rather propose a transition into new positions and responsibilities for the people with jobs with the highest chances of automation.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><h3 data-dcnode-id="1028" id="reconciliation"><strong data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Reconciliation</span></strong></h3><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">The reality is that willingly or not, we will feel the effects of AI displacement. Job loss to automation is going to happen, and it’s a good thing.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">And it’s up to us to decide whether we’ll see automation and future jobs as a challenge or an opportunity.</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">The future of jobs involves a complex, problem-solving attitude. That will certainly require continuous investment in our most valuable asset - our minds.&nbsp;</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">But.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">AI could aid more people in finding their “calling” in life.&nbsp;</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">And if that involves base jumps, so be it.&nbsp;</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Adaptation is key and we all have no choice but to adapt to changes.&nbsp;</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">So it’s important that we start preparing ourselves, individually and as societies, for the transition already set in motion.&nbsp;</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Some will be more vulnerable and will need help in reconciling with the new labor market, no doubt.&nbsp;</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Nonetheless...</span></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Change comes without asking, so be ready and fear not those jobs lost to automation statistics.&nbsp;</span></p><span data-dcnode-id="994" instrument_node="">
</span></div><span data-dcnode-id="992" instrument_node="">
</span></div><span data-dcnode-id="990" instrument_node="">
