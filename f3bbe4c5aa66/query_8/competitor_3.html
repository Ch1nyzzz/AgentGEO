</span><meta content="When industrial robots are adopted by firms in a local labor market, some workers are displaced and become unemployed. Other workers that are not directly affected by automation may however fear that these new technologies might replace their working tasks in the future. This fear of a possible future replacement is important because it negatively affects workers’ job satisfaction at present. This paper studies the extent to which automation affects workers’ job satisfaction, and whether this effect differs for high- versus low-skilled workers. The empirical analysis uses microdata for several thousand workers in Norway from the Working Life Barometer survey for the period 2016–2019, combined with information on the introduction of industrial robots in Norway from the International Federation of Robotics. Our identification strategy exploits variation in the pace of introduction of industrial robots in Norwegian regions and industries since 2007 to instrument workers’ fear of replacement. The results indicate that automation in industrial firms in recent years have induced 40% of the workers that are currently in employment to fear that their work might be replaced by a smart machine in the future. Such fear of future replacement does negatively affect workers’ job satisfaction at present. This negative effect is driven by low-skilled workers, which are those carrying out routine-based tasks, and who are therefore more exposed to the risks of automation." data-dcnode-id="3853" name="description"><span data-dcnode-id="3852" instrument_node="">

</span><div class="abstract toc-section abstract-type-" data-dcnode-id="2850" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="2861" data-toc="abstract0" id="abstract0" name="abstract0" title="Abstract"></a><h2 data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">Abstract</span></h2><div class="abstract-content" data-dcnode-id="2851"><a class="link-target" data-dcnode-id="2858" id="article1.front1.article-meta1.abstract1.p1" name="article1.front1.article-meta1.abstract1.p1"></a><p data-dcnode-id="2853"><span data-dcnode-id="2857" instrument_node="">When industrial robots are adopted by firms in a local labor market, some workers are displaced and become unemployed. Other workers that are not directly affected by automation may however fear that these new technologies might replace their working tasks in the future. This fear of a possible future replacement is important because it negatively affects workers’ job satisfaction at present. This paper studies the extent to which automation affects workers’ job satisfaction, and whether this effect differs for high- versus low-skilled workers. The empirical analysis uses microdata for several thousand workers in Norway from the </span><em data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">Working Life Barometer</span></em><span data-dcnode-id="2854" instrument_node=""> survey for the period 2016–2019, combined with information on the introduction of industrial robots in Norway from the International Federation of Robotics. Our identification strategy exploits variation in the pace of introduction of industrial robots in Norwegian regions and industries since 2007 to instrument workers’ fear of replacement. The results indicate that automation in industrial firms in recent years have induced 40% of the workers that are currently in employment to fear that their work might be replaced by a smart machine in the future. Such fear of future replacement does negatively affect workers’ job satisfaction at present. This negative effect is driven by low-skilled workers, which are those carrying out routine-based tasks, and who are therefore more exposed to the risks of automation.</span></p><span data-dcnode-id="2852" instrument_node="">
</span></div></div><span data-dcnode-id="2849" instrument_node="">
</span><div class="articleinfo" data-dcnode-id="2803" xmlns:plos="http://plos.org"><p data-dcnode-id="2845"><strong data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">Citation: </span></strong><span data-dcnode-id="2846" instrument_node="">Schwabe H, Castellacci F (2020) Automation, workers’ skills and job satisfaction. PLoS ONE 15(11):
           e0242929.
        
        https://doi.org/10.1371/journal.pone.0242929</span></p><p data-dcnode-id="2841"><strong data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">Editor: </span></strong><span data-dcnode-id="2842" instrument_node="">Petri Böckerman, University of Jyvaskyla, FINLAND</span></p><p data-dcnode-id="2831"><strong data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">Received: </span></strong><span data-dcnode-id="2838" instrument_node="">May 1, 2020; </span><strong data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">Accepted: </span></strong><span data-dcnode-id="2835" instrument_node="">November 3, 2020; </span><strong data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">Published: </span></strong><span data-dcnode-id="2832" instrument_node=""> November 30, 2020</span></p><p data-dcnode-id="2824"><strong data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">Copyright: </span></strong><span data-dcnode-id="2828" instrument_node=""> © 2020 Schwabe, Castellacci. This is an open access article distributed under the terms of the </span><a data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//creativecommons.org/licenses/by/4.0/"><span data-dcnode-id="2827" instrument_node="">Creative Commons Attribution License</span></a><span data-dcnode-id="2825" instrument_node="">, which permits unrestricted use, distribution, and reproduction in any medium, provided the original author and source are credited.</span></p><p data-dcnode-id="2815"><strong data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">Data Availability: </span></strong><span data-dcnode-id="2821" instrument_node="">The main dataset used to produce the results presented in the study are third-party data available from the Working Life Barometer survey (Arbeidslivsbarometer).The survey is provided by the Confederation of Vocational Unions (YS), a politically independent umbrella organization for labor unions, and organized by the Work Research Institute in Norway. URL: </span><a data-dcnode-id="2819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ys.no/ys-jobber-med/ys-arbeidslivsbarometer/"><span data-dcnode-id="2820" instrument_node="">https://ys.no/ys-jobber-med/ys-arbeidslivsbarometer/</span></a><span data-dcnode-id="2818" instrument_node=""> Data are available from the YS for researchers who meet the criteria for access to confidential data. To get access, users have to create a user account at YS. The authors had no special access privileges to the data. For further information about the access to this dataset, users can contact YS by e-mail: </span><a data-dcnode-id="2816" href="mailto:post@ys.no"><span data-dcnode-id="2817" instrument_node="">post@ys.no</span></a></p><p data-dcnode-id="2808"><strong data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Funding: </span></strong><span data-dcnode-id="2812" instrument_node="">- Initials of authors: FC &amp; HS - Grant number: 247921 - Funder: Research Council of Norway - URL: </span><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forskningsradet.no/"><span data-dcnode-id="2811" instrument_node="">https://www.forskningsradet.no/</span></a><span data-dcnode-id="2809" instrument_node=""> - The funders had no role in study design, data collection and analysis, decision to publish, or preparation of the manuscript.</span></p><p data-dcnode-id="2804"><strong data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Competing interests: </span></strong><span data-dcnode-id="2805" instrument_node=""> The authors have declared that no competing interests exist.</span></p></div><span data-dcnode-id="2802" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2707" id="section1" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="2801" data-toc="sec001" id="sec001" name="sec001" title="1. Introduction"></a><h2 data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">1. Introduction</span></h2><a class="link-target" data-dcnode-id="2798" id="article1.body1.sec1.p1" name="article1.body1.sec1.p1"></a><p data-dcnode-id="2781"><span data-dcnode-id="2797" instrument_node="">Industrial robotics and artificial intelligence (AI) have in the last few years increasingly been used in production activities. This has led to the automation of many tasks that were previously carried out by workers, and that can now be performed by smart machines. The fear that these technological advances may have dramatic consequences on the future of labor has fostered the recent development of new economics research studying the effects of automation on employment [</span><a class="ref-tip" data-dcnode-id="2795" href="#pone.0242929.ref001"><span data-dcnode-id="2796" instrument_node="">1</span></a><span data-dcnode-id="2794" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2792" href="#pone.0242929.ref002"><span data-dcnode-id="2793" instrument_node="">2</span></a><span data-dcnode-id="2791" instrument_node="">]. Recent models and empirical evidence on this topic show that automation can have negative effects on employment demand and wages, and particularly so for workers that perform routine-based tasks that can more easily be displaced [</span><a class="ref-tip" data-dcnode-id="2789" href="#pone.0242929.ref003"><span data-dcnode-id="2790" instrument_node="">3</span></a><span data-dcnode-id="2788" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2786" href="#pone.0242929.ref004"><span data-dcnode-id="2787" instrument_node="">4</span></a><span data-dcnode-id="2785" instrument_node="">]. On the other hand, however, these new technologies may also have positive effects by increasing productivity [</span><a class="ref-tip" data-dcnode-id="2783" href="#pone.0242929.ref005"><span data-dcnode-id="2784" instrument_node="">5</span></a><span data-dcnode-id="2782" instrument_node="">].</span></p><span data-dcnode-id="2780" instrument_node="">
</span><a class="link-target" data-dcnode-id="2779" id="article1.body1.sec1.p2" name="article1.body1.sec1.p2"></a><p data-dcnode-id="2768"><span data-dcnode-id="2778" instrument_node="">This recent research has so far focused on the effects of automation, industrial robots and artificial intelligence on labor demand and wages. However, while employment and wages are two central dimensions shaping individual workers’ well-being, it is also important to point out that other non-pecuniary aspects do contribute to shape workers’ well-being, and that automation may potentially have important impacts on these [</span><a class="ref-tip" data-dcnode-id="2776" href="#pone.0242929.ref006"><span data-dcnode-id="2777" instrument_node="">6</span></a><span data-dcnode-id="2775" instrument_node="">]. Specifically, if workers fear that their occupation might be replaced by a smart machine in the future, such prospect and uncertainty about future working conditions may arguably affect their job satisfaction at present [</span><a class="ref-tip" data-dcnode-id="2773" href="#pone.0242929.ref007"><span data-dcnode-id="2774" instrument_node="">7</span></a><span data-dcnode-id="2772" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2770" href="#pone.0242929.ref008"><span data-dcnode-id="2771" instrument_node="">8</span></a><span data-dcnode-id="2769" instrument_node="">].</span></p><span data-dcnode-id="2767" instrument_node="">
</span><a class="link-target" data-dcnode-id="2766" id="article1.body1.sec1.p3" name="article1.body1.sec1.p3"></a><p data-dcnode-id="2758"><span data-dcnode-id="2765" instrument_node="">Why should we care about the impacts of automation on workers’ job satisfaction? The reason is twofold. First, since individuals spend a substantial part of their life at work, job satisfaction experienced in working life does indeed represent an important component of individuals’ overall subjective well-being [</span><a class="ref-tip" data-dcnode-id="2763" href="#pone.0242929.ref009"><span data-dcnode-id="2764" instrument_node="">9</span></a><span data-dcnode-id="2762" instrument_node="">]. Second, workers that are not happy and experience dissatisfaction with their job have typically lower motivation and efforts [</span><a class="ref-tip" data-dcnode-id="2760" href="#pone.0242929.ref010"><span data-dcnode-id="2761" instrument_node="">10</span></a><span data-dcnode-id="2759" instrument_node="">], and higher turnover rates. Therefore, if a large number of workers in the economy fear to be replaced by smart machines in the future, this fear may lead to mental stress and anxiety at present, as well as hamper productivity and innovation in the economy.</span></p><span data-dcnode-id="2757" instrument_node="">
</span><a class="link-target" data-dcnode-id="2756" id="article1.body1.sec1.p4" name="article1.body1.sec1.p4"></a><p data-dcnode-id="2748"><span data-dcnode-id="2755" instrument_node="">In spite of the relevance of this topic, to the best of our knowledge only two papers have recently explored the relationship between automation and workers’ well-being. Abeliansky and Beulmann [</span><a class="ref-tip" data-dcnode-id="2753" href="#pone.0242929.ref011"><span data-dcnode-id="2754" instrument_node="">11</span></a><span data-dcnode-id="2752" instrument_node="">] focuses on workers’ mental health in Germany; and Schwabe [</span><a class="ref-tip" data-dcnode-id="2750" href="#pone.0242929.ref012"><span data-dcnode-id="2751" instrument_node="">12</span></a><span data-dcnode-id="2749" instrument_node="">] studies workers’ life satisfaction in a sample of European countries. Neither of these studies, though, investigates explicitly the impacts of automation on job satisfaction.</span></p><span data-dcnode-id="2747" instrument_node="">
</span><a class="link-target" data-dcnode-id="2746" id="article1.body1.sec1.p5" name="article1.body1.sec1.p5"></a><p data-dcnode-id="2741"><span data-dcnode-id="2745" instrument_node="">Further, these recent works do not study the role of workers’ skills, and how these may affect the relationship between automation and well-being. The literature on automation and employment clearly shows that the effects of the introduction of industrial robots largely differ for high-skilled and low-skilled workers. It is therefore paramount to investigate whether the effects of automation on job satisfaction can have different effects on workers’ well-being depending on their skill levels. In short, the question investigated in the present paper is the following: </span><em data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Does automation affect workers’ job satisfaction–and how does this effect differ for high- versus low-skilled workers</span></em><span data-dcnode-id="2742" instrument_node="">?</span></p><span data-dcnode-id="2740" instrument_node="">
</span><a class="link-target" data-dcnode-id="2739" id="article1.body1.sec1.p6" name="article1.body1.sec1.p6"></a><p data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">To study this question, it is useful to distinguish two related dimensions. The first side of the link between automation and job satisfaction is that the introduction of industrial robots in local labor markets will affect workers’ expectations about their future jobs, i.e. it will lead some workers to fear that part of their working tasks might be replaced by a smart machine in the future. The second dimension is that these expectations about the future, and particularly the anticipated fear of replacement, will negatively affect workers’ subjective well-being at present.</span></p><span data-dcnode-id="2736" instrument_node="">
</span><a class="link-target" data-dcnode-id="2735" id="article1.body1.sec1.p7" name="article1.body1.sec1.p7"></a><p data-dcnode-id="2721"><span data-dcnode-id="2734" instrument_node="">Empirically, we operationalize this idea by making use of a two-stage econometric model, in which fear of replacement and job satisfaction are the dependent variables of the first and the second stage, respectively. The empirical analysis uses microdata for several thousand workers in Norway from the </span><em data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">Working Life Barometer</span></em><span data-dcnode-id="2731" instrument_node=""> survey (</span><em data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">Arbeidslivsbarometer</span></em><span data-dcnode-id="2728" instrument_node="">) (four annual surveys for the period 2016–2019), combined with information on the introduction of industrial robots in Norway from the </span><em data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">International Federation of Robotics</span></em><span data-dcnode-id="2725" instrument_node=""> (IFR) dataset. Our identification strategy exploits variation in the pace of introduction of industrial robots in Norwegian regions and industries between 2007 and </span><em data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">t</span></em><span data-dcnode-id="2722" instrument_node=""> (i.e. the time at which each of the four surveys was carried out).</span></p><span data-dcnode-id="2720" instrument_node="">
</span><a class="link-target" data-dcnode-id="2719" id="article1.body1.sec1.p8" name="article1.body1.sec1.p8"></a><p data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">The results indicate that automation in industrial firms in recent years has induced workers that are currently in employment to fear that their work might be replaced by a smart machine in the future, and that this effect is stronger for low-skilled workers. Further, our findings show that fear of future replacement does negatively affect workers’ job satisfaction at present, and that such negative effect is in particular significant for low-skilled workers, which are those carrying out routine-based tasks, and who are therefore more exposed to the risks of automation.</span></p><span data-dcnode-id="2716" instrument_node="">
</span><a class="link-target" data-dcnode-id="2715" id="article1.body1.sec1.p9" name="article1.body1.sec1.p9"></a><p data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">On the whole, these results contribute to, and extend, the recent literature on automation and employment by shifting the focus to important nonpecuniary impacts that are reflected in workers’ expectations, fears and job satisfaction, and showing that workers’ skills is an important variable moderating the effects of automation on subjective well-being.</span></p><span data-dcnode-id="2712" instrument_node="">
</span><a class="link-target" data-dcnode-id="2711" id="article1.body1.sec1.p10" name="article1.body1.sec1.p10"></a><p data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">The paper is organized as followed. Section 2 reviews the literature on automation and employment. Section 3 points out the conceptual mechanisms that are relevant to explain the effects of automation on job satisfaction. Section 4 presents the data and indicators. Section 5 discusses the empirical methods. Section 6 presents the results. Section 7 concludes and discusses the main contributions and implications.</span></p><span data-dcnode-id="2708" instrument_node="">
</span></div><span data-dcnode-id="2706" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2540" id="section2" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="2705" data-toc="sec002" id="sec002" name="sec002" title="2. Literature"></a><h2 data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">2. Literature</span></h2><span data-dcnode-id="2702" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2616" id="section1"><a class="link-target" data-dcnode-id="2701" id="sec003" name="sec003" title="Effects of automation on employment and wages"></a><span data-dcnode-id="2700" instrument_node="">
</span><h3 data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Effects of automation on employment and wages</span></h3><span data-dcnode-id="2697" instrument_node="">
</span><a class="link-target" data-dcnode-id="2696" id="article1.body1.sec2.sec1.p1" name="article1.body1.sec2.sec1.p1"></a><p data-dcnode-id="2688"><span data-dcnode-id="2695" instrument_node="">Automation, industrial robotics and artificial intelligence have in the last few years experienced substantial advances and found an increasing number of applications in production activities. Artificial intelligence and robotics have developed as two distinct scientific and technological fields for a long time, and only recently they have converged and cross-fertilized [</span><a class="ref-tip" data-dcnode-id="2693" href="#pone.0242929.ref013"><span data-dcnode-id="2694" instrument_node="">13</span></a><span data-dcnode-id="2692" instrument_node="">]. Frank et al. [</span><a class="ref-tip" data-dcnode-id="2690" href="#pone.0242929.ref002"><span data-dcnode-id="2691" instrument_node="">2</span></a><span data-dcnode-id="2689" instrument_node="">] presents relevant illustrations of this recent convergence, and it discusses challenges for research on the economic effects of AI and automation. This has spurred the recent development of a strand of scholarly research studying the effects of these new technologies on employment.</span></p><span data-dcnode-id="2687" instrument_node="">
</span><a class="link-target" data-dcnode-id="2686" id="article1.body1.sec2.sec1.p2" name="article1.body1.sec2.sec1.p2"></a><p data-dcnode-id="2678"><span data-dcnode-id="2685" instrument_node="">A starting point of this literature is the canonical model of skilled bias [</span><a class="ref-tip" data-dcnode-id="2683" href="#pone.0242929.ref014"><span data-dcnode-id="2684" instrument_node="">14</span></a><span data-dcnode-id="2682" instrument_node="">], according to which new skilled-bias technologies lead to polarization and increasing differences in employment opportunities and wages between skilled and unskilled workers. Sachs and Kotlikoff [</span><a class="ref-tip" data-dcnode-id="2680" href="#pone.0242929.ref015"><span data-dcnode-id="2681" instrument_node="">15</span></a><span data-dcnode-id="2679" instrument_node="">] present a simple framework in which smart machines substitute directly for young unskilled labor, whereas they are complementary to older skilled workers. Young unskilled workers experience lower wages, which in turn lead to lower saving and investments in human and physical capital–thus perpetuating and strengthening the gap between young unskilled and older skilled workers over time.</span></p><span data-dcnode-id="2677" instrument_node="">
</span><a class="link-target" data-dcnode-id="2676" id="article1.body1.sec2.sec1.p3" name="article1.body1.sec2.sec1.p3"></a><p data-dcnode-id="2659"><span data-dcnode-id="2675" instrument_node="">Such pessimistic prediction on the future of employment is however not shared by other works in this field. Taking a long-run historical perspective, Autor [</span><a class="ref-tip" data-dcnode-id="2673" href="#pone.0242929.ref016"><span data-dcnode-id="2674" instrument_node="">16</span></a><span data-dcnode-id="2672" instrument_node="">] and Mokyr et al. [</span><a class="ref-tip" data-dcnode-id="2670" href="#pone.0242929.ref001"><span data-dcnode-id="2671" instrument_node="">1</span></a><span data-dcnode-id="2669" instrument_node="">] argue that, as in other times in history, technological progress will lead to major structural changes in the quantity and content of work, but it will arguably not lead to a complete substitution of capital for labor. Houseman [</span><a class="ref-tip" data-dcnode-id="2667" href="#pone.0242929.ref017"><span data-dcnode-id="2668" instrument_node="">17</span></a><span data-dcnode-id="2666" instrument_node="">] provides empirical evidence that, although manufacturing employment in the US has declined since early 2000s, this is mainly explained by international trade and global competition effects, and there is weak support in the data for the argument that such decrease in employment is due to automation. More recently, McGuinness et al. [</span><a class="ref-tip" data-dcnode-id="2664" href="#pone.0242929.ref018"><span data-dcnode-id="2665" instrument_node="">18</span></a><span data-dcnode-id="2663" instrument_node="">] and Klenert et al. [</span><a class="ref-tip" data-dcnode-id="2661" href="#pone.0242929.ref019"><span data-dcnode-id="2662" instrument_node="">19</span></a><span data-dcnode-id="2660" instrument_node="">] present empirical studies that indicate that automation technologies and industrial robots have actually positive effects on employment. On the one hand, automation leads to a creative destruction process that may on the whole increase the overall demand for labor. On the other hand, it may contribute to reduce routine-based working tasks, which are typically monotonous and physically straining, thus improving the quality of work.</span></p><span data-dcnode-id="2658" instrument_node="">
</span><a class="link-target" data-dcnode-id="2657" id="article1.body1.sec2.sec1.p4" name="article1.body1.sec2.sec1.p4"></a><p data-dcnode-id="2640"><span data-dcnode-id="2656" instrument_node="">A more nuanced perspective that considers both negative and positive effects of automation on employment is presented by studies of the job polarization hypothesis. In short, the main idea of this research is that automation technologies complement highly skilled labor, explaining its expansion and wage growth in recent years in most advanced countries. On the other hand, middle-skilled workers are those more negatively affected by routine-biased technical change, because their tasks are relatively easier to automate. As for low-skilled workers, and particularly those employed in personal services occupations, these often perform manual and personal communication tasks that are not that easy to automate yet. Hence, the resulting pattern is that middle-skilled workers have in recent years shifted towards low-skilled employment occupations, which have consequently grown and experienced higher wages. All in all, this explains the observed increasing polarization in the job market, with the growth of employment and wages for high- and low-skilled workers, and a corresponding decline for middle-skilled occupations [</span><a class="ref-tip" data-dcnode-id="2654" href="#pone.0242929.ref003"><span data-dcnode-id="2655" instrument_node="">3</span></a><span data-dcnode-id="2653" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2651" href="#pone.0242929.ref004"><span data-dcnode-id="2652" instrument_node="">4</span></a><span data-dcnode-id="2650" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2648" href="#pone.0242929.ref016"><span data-dcnode-id="2649" instrument_node="">16</span></a><span data-dcnode-id="2647" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2645" href="#pone.0242929.ref020"><span data-dcnode-id="2646" instrument_node="">20</span></a><span data-dcnode-id="2644" instrument_node="">]. Beaudry et al. [</span><a class="ref-tip" data-dcnode-id="2642" href="#pone.0242929.ref021"><span data-dcnode-id="2643" instrument_node="">21</span></a><span data-dcnode-id="2641" instrument_node="">] argue however that the demand for high-skilled workers has declined after 2000 due to decreasing returns to investments in information and communication technologies (ICTs), and that high-skilled have then begun to compete for lower-skilled jobs. This study, though, is based on empirical evidence on ICT investments in general, and it does not focus specifically on the effects of AI and automation.</span></p><span data-dcnode-id="2639" instrument_node="">
</span><a class="link-target" data-dcnode-id="2638" id="article1.body1.sec2.sec1.p5" name="article1.body1.sec2.sec1.p5"></a><p data-dcnode-id="2618"><span data-dcnode-id="2637" instrument_node="">Acemoglu and Restrepo [</span><a class="ref-tip" data-dcnode-id="2635" href="#pone.0242929.ref022"><span data-dcnode-id="2636" instrument_node="">22</span></a><span data-dcnode-id="2634" instrument_node="">] present a theoretical framework that is useful to study both negative and positive effects of industrial robots on employment and wages. The model points out two contrasting effects of industrial automation: a </span><em data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">displacement</span></em><span data-dcnode-id="2631" instrument_node=""> effect that negatively affects the demand for employment and the wages of workers that perform routine-based tasks; and a </span><em data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">productivity</span></em><span data-dcnode-id="2628" instrument_node=""> effect that creates benefits for workers that perform non-routine tasks (in the automated sector as well as in other sectors and occupations of the economy). This study also presents empirical evidence that corroborates the model’s predictions on the effects of industrial robots on employment and wages in US manufacturing industries between 1990 and 2007. In line with evidence presented by other recent works [</span><a class="ref-tip" data-dcnode-id="2626" href="#pone.0242929.ref005"><span data-dcnode-id="2627" instrument_node="">5</span></a><span data-dcnode-id="2625" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2623" href="#pone.0242929.ref023"><span data-dcnode-id="2624" instrument_node="">23</span></a><span data-dcnode-id="2622" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2620" href="#pone.0242929.ref024"><span data-dcnode-id="2621" instrument_node="">24</span></a><span data-dcnode-id="2619" instrument_node="">], their results show that overall the displacement (negative) effect of the introduction of industrial robots has until now been stronger than the productivity (positive) effect.</span></p><span data-dcnode-id="2617" instrument_node="">
</span></div><span data-dcnode-id="2615" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2542" id="section2"><a class="link-target" data-dcnode-id="2614" id="sec004" name="sec004" title="Effects of automation on job satisfaction"></a><span data-dcnode-id="2613" instrument_node="">
</span><h3 data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">Effects of automation on job satisfaction</span></h3><span data-dcnode-id="2610" instrument_node="">
</span><a class="link-target" data-dcnode-id="2609" id="article1.body1.sec2.sec2.p1" name="article1.body1.sec2.sec2.p1"></a><p data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">This recent strand of research has so far focused on the effects of automation, industrial robots and artificial intelligence on aggregate patterns of labor demand and wages for different countries and industries. However, research has not investigated yet the impacts that these new technologies may have on individual workers’ subjective well-being. Do workers fear that their occupation might be replaced by a smart machine in the future, and if so how does that prospect affect their current job satisfaction?.</span></p><span data-dcnode-id="2606" instrument_node="">
</span><a class="link-target" data-dcnode-id="2605" id="article1.body1.sec2.sec2.p2" name="article1.body1.sec2.sec2.p2"></a><p data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">Job satisfaction is the subjective well-being of workers (i.e. their own assessment of the well-being they experience at work). This is an obviously crucial dimension for economic analysis and policy. First, since individuals spend a substantial part of their life at work, job satisfaction experienced in working life represents an important component of individuals’ overall subjective well-being. Second, workers that are not happy and experience dissatisfaction with their job have typically lower motivation and efforts, and higher turnover rates. This, in turn, weakens productivity and innovation in the economy.</span></p><span data-dcnode-id="2602" instrument_node="">
</span><a class="link-target" data-dcnode-id="2601" id="article1.body1.sec2.sec2.p3" name="article1.body1.sec2.sec2.p3"></a><p data-dcnode-id="2587"><span data-dcnode-id="2600" instrument_node="">The literature on job satisfaction is wide-ranging, and it has extensively investigated a variety of factors that explain why some individuals report higher subjective well-being than others [</span><a class="ref-tip" data-dcnode-id="2598" href="#pone.0242929.ref007"><span data-dcnode-id="2599" instrument_node="">7</span></a><span data-dcnode-id="2597" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2595" href="#pone.0242929.ref008"><span data-dcnode-id="2596" instrument_node="">8</span></a><span data-dcnode-id="2594" instrument_node="">]. However, only a few studies have so far explicitly investigated the relationships between the widespread diffusion and application of digital technologies and job satisfaction [</span><a class="ref-tip" data-dcnode-id="2592" href="#pone.0242929.ref025"><span data-dcnode-id="2593" instrument_node="">25</span></a><span data-dcnode-id="2591" instrument_node="">]. Kaplan and Schulhofer-Wohl [</span><a class="ref-tip" data-dcnode-id="2589" href="#pone.0242929.ref006"><span data-dcnode-id="2590" instrument_node="">6</span></a><span data-dcnode-id="2588" instrument_node="">], using data from the American Time Use survey, discusses the nonpecuniary implications of changes in the occupational structure in the US in recent decades, i.e. the effects of these structural changes on different aspects of job satisfaction such as reported happiness, stress and meaning at work. The work indicates that the changing occupational structure has not only led to polarization in terms of skills and wages, but it has also determined substantial changes in workers’ feelings about the job they have and the tasks they perform.</span></p><span data-dcnode-id="2586" instrument_node="">
</span><a class="link-target" data-dcnode-id="2585" id="article1.body1.sec2.sec2.p4" name="article1.body1.sec2.sec2.p4"></a><p data-dcnode-id="2580"><span data-dcnode-id="2584" instrument_node="">Two recent papers explore the relationship between automation and workers’ well-being. Abeliansky and Beulmann [</span><a class="ref-tip" data-dcnode-id="2582" href="#pone.0242929.ref011"><span data-dcnode-id="2583" instrument_node="">11</span></a><span data-dcnode-id="2581" instrument_node="">] present an empirical study on the impact of automation on the mental health of workers (which is one important dimension reflecting stress and weak job satisfaction). The analysis uses individual-level data from the German Socioeconomic Panel for the period 2002–2014 linked to industry-level data on use of industrial robots in 21 manufacturing sectors in Germany. The results indicate that automation negatively affects workers’ mental health, and this effect is related to the fear of having lower wages and worse economic conditions in the future.</span></p><span data-dcnode-id="2579" instrument_node="">
</span><a class="link-target" data-dcnode-id="2578" id="article1.body1.sec2.sec2.p5" name="article1.body1.sec2.sec2.p5"></a><p data-dcnode-id="2573"><span data-dcnode-id="2577" instrument_node="">Schwabe [</span><a class="ref-tip" data-dcnode-id="2575" href="#pone.0242929.ref012"><span data-dcnode-id="2576" instrument_node="">12</span></a><span data-dcnode-id="2574" instrument_node="">] makes use of worker-level data from the Eurobarometer survey for European countries (period 2012–2017) to investigate the relationships between fear of replacement and workers’ subjective well-being (measured by life satisfaction, which is as well-known an evaluative dimension of individuals’ well-being). The results of this study find that fear of replacement affects life satisfaction, but the direction of this effect does largely depend on age. In line with models of skill-bias and job polarization (see section 2.1), younger workers regard replacement as a possible threat to their job opportunities in the future, whereas older workers look at it as a positive technological development that is not likely to affect them directly, and that will arguably enhance well-being and prosperity in the society.</span></p><span data-dcnode-id="2572" instrument_node="">
</span><a class="link-target" data-dcnode-id="2571" id="article1.body1.sec2.sec2.p6" name="article1.body1.sec2.sec2.p6"></a><p data-dcnode-id="2566"><span data-dcnode-id="2570" instrument_node="">These two studies provide an important starting point for the present work. None of them, though, investigates explicitly the role of workers’ skills, which is however a key dimension in the literature on the employment effects of automation briefly reviewed in section 2.1. In the job satisfaction literature too, education and skill levels represent one of the central factors affecting the job satisfaction of workers [</span><a class="ref-tip" data-dcnode-id="2568" href="#pone.0242929.ref026"><span data-dcnode-id="2569" instrument_node="">26</span></a><span data-dcnode-id="2567" instrument_node="">].</span></p><span data-dcnode-id="2565" instrument_node="">
</span><a class="link-target" data-dcnode-id="2564" id="article1.body1.sec2.sec2.p7" name="article1.body1.sec2.sec2.p7"></a><p data-dcnode-id="2544"><span data-dcnode-id="2563" instrument_node="">Two contrasting mechanisms link education and job satisfaction. On the one hand, a higher skill level increases the chances that an employee will have a higher wage level and a more interesting and rewarding job, which enhance job satisfaction. On the other hand, however, various empirical studies have found that–after controlling for income earnings–the correlation between education level and subjective well-being at work is negative [</span><a class="ref-tip" data-dcnode-id="2561" href="#pone.0242929.ref008"><span data-dcnode-id="2562" instrument_node="">8</span></a><span data-dcnode-id="2560" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2558" href="#pone.0242929.ref027"><span data-dcnode-id="2559" instrument_node="">27</span></a><span data-dcnode-id="2557" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2555" href="#pone.0242929.ref028"><span data-dcnode-id="2556" instrument_node="">28</span></a><span data-dcnode-id="2554" instrument_node="">]. This can be explained in the light of prospect theory [</span><a class="ref-tip" data-dcnode-id="2552" href="#pone.0242929.ref029"><span data-dcnode-id="2553" instrument_node="">29</span></a><span data-dcnode-id="2551" instrument_node="">]. When an individual invests more time in education and human capital formation, her expectations about the desired job will also be higher, and it will therefore be more likely that the worker will feel more critical and less satisfied with her actual working conditions if these high expectations are unmet. In particular, empirical research indicates that overqualified workers report significant lower levels of job satisfaction than others [</span><a class="ref-tip" data-dcnode-id="2549" href="#pone.0242929.ref026"><span data-dcnode-id="2550" instrument_node="">26</span></a><span data-dcnode-id="2548" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2546" href="#pone.0242929.ref030"><span data-dcnode-id="2547" instrument_node="">30</span></a><span data-dcnode-id="2545" instrument_node="">].</span></p><span data-dcnode-id="2543" instrument_node="">
</span></div><span data-dcnode-id="2541" instrument_node="">
</span></div><span data-dcnode-id="2539" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2423" id="section3" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="2538" data-toc="sec005" id="sec005" name="sec005" title="3. Question and propositions"></a><h2 data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">3. Question and propositions</span></h2><a class="link-target" data-dcnode-id="2535" id="article1.body1.sec3.p1" name="article1.body1.sec3.p1"></a><p data-dcnode-id="2530"><span data-dcnode-id="2534" instrument_node="">The question investigated in the present paper is the following: </span><em data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">Does automation affect workers’ job satisfaction–and how does this effect differ for high- versus low-skilled workers</span></em><span data-dcnode-id="2531" instrument_node="">? The first part of the question refers to the main impact of automation on job satisfaction, which as noted above has not been analyzed in previous research yet. The second part of the question suggests that fear of replacement can have different effects on workers’ well-being depending on their skill levels, and it seeks to investigate these moderation effects.</span></p><span data-dcnode-id="2529" instrument_node="">
</span><a class="link-target" data-dcnode-id="2528" id="article1.body1.sec3.p2" name="article1.body1.sec3.p2"></a><p data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Conceptually, the link between automation and job satisfaction can be analyzed in two steps. The first is that the introduction of industrial robots in local labor markets will arguably affect workers’ expectations about their future jobs, which means that some workers will fear that some of their tasks, or even their whole job, might be replaced by a smart machine in the future. The second step is that these expectations about the future, and particularly the anticipated fear of replacement, will affect workers’ job satisfaction at present.</span></p><span data-dcnode-id="2525" instrument_node="">
</span><a class="link-target" data-dcnode-id="2524" id="article1.body1.sec3.p3" name="article1.body1.sec3.p3"></a><p data-dcnode-id="2519"><span data-dcnode-id="2523" instrument_node="">Our empirical analysis will consider both of these conceptual steps in a two-stage empirical model, and investigate whether the related impacts are stronger for high-skilled or for low-skilled workers. We point out below here the main effects that we expect to find in the empirical analysis, and how these can be explained in the light of the literature reviewed in this section. As noted below, some of the effects of interest are stronger for high-skilled workers, whereas others are more relevant for low-skilled workers, so that the overall net moderation effect cannot be pointed out </span><em data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">ex-ante</span></em><span data-dcnode-id="2520" instrument_node="">, but it will have to be established based on the empirical evidence.</span></p><span data-dcnode-id="2518" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2475" id="section1"><a class="link-target" data-dcnode-id="2517" id="sec006" name="sec006" title="I. Fear of replacement"></a><span data-dcnode-id="2516" instrument_node="">
</span><h3 data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">I. Fear of replacement</span></h3><span data-dcnode-id="2513" instrument_node="">
</span><a class="link-target" data-dcnode-id="2512" id="article1.body1.sec3.sec1.p1" name="article1.body1.sec3.sec1.p1"></a><p data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">The introduction of industrial robots in the local labor market increases the likelihood that some workers will be replaced by smart machines in the future. These technological changes and their applications in firms in local labor markets will therefore induce some workers that are currently employed to fear that they might be replaced in the future (or at least that some of their tasks might be).</span></p><span data-dcnode-id="2509" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2477" id="section1"><a class="link-target" data-dcnode-id="2508" id="sec007" name="sec007" title="Moderation effects"></a><h4 data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Moderation effects.</span></h4><a class="link-target" data-dcnode-id="2505" id="article1.body1.sec3.sec1.sec1.p1" name="article1.body1.sec3.sec1.sec1.p1"></a><p data-dcnode-id="2500"><span data-dcnode-id="2504" instrument_node="">The introduction of industrial robots will arguably have different impacts for high- </span><em data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">versus</span></em><span data-dcnode-id="2501" instrument_node=""> low-skilled workers. We envisage two contrasting effects.</span></p><span data-dcnode-id="2499" instrument_node="">
</span><a class="link-target" data-dcnode-id="2498" id="article1.body1.sec3.sec1.sec1.p2" name="article1.body1.sec3.sec1.sec1.p2"></a><p data-dcnode-id="2494"><em data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">Fear of replacement is stronger for the low-skilled</span></em><span data-dcnode-id="2495" instrument_node="">. These workers are more exposed to the risks of displacement from automation because they typically carry out routine tasks that can more easily be automated (see literature in section 2.1).</span></p><span data-dcnode-id="2493" instrument_node="">
</span><a class="link-target" data-dcnode-id="2492" id="article1.body1.sec3.sec1.sec1.p3" name="article1.body1.sec3.sec1.sec1.p3"></a><p data-dcnode-id="2485"><em data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Fear of replacement is stronger for the high-skilled</span></em><span data-dcnode-id="2489" instrument_node="">. High-skilled workers are typically also more educated individuals who read more and follow media debates on robots, automation and their negative consequences for employment. Hence, high skilled workers are arguably more exposed to peer effects, which may translate in a greater fear about the future of employment. Contrary to this argument, we may however posit that workers of higher education typically have a better ability to understand and anticipate that these new technologies will also have positive effects for their future tasks and wages, as well as for the overall productivity of the economy–i.e. they are arguably be more forward-looking [</span><a class="ref-tip" data-dcnode-id="2487" href="#pone.0242929.ref031"><span data-dcnode-id="2488" instrument_node="">31</span></a><span data-dcnode-id="2486" instrument_node="">].</span></p><span data-dcnode-id="2484" instrument_node="">
</span><a class="link-target" data-dcnode-id="2483" id="article1.body1.sec3.sec1.sec1.p4" name="article1.body1.sec3.sec1.sec1.p4"></a><p data-dcnode-id="2479"><strong data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Proposition 1:</span></strong><span data-dcnode-id="2480" instrument_node=""> The introduction of industrial robots in the local labor market will negatively affect low-skilled workers more than high-skilled workers if the former effect is stronger than the latter.</span></p><span data-dcnode-id="2478" instrument_node="">
</span></div><span data-dcnode-id="2476" instrument_node="">
</span></div><span data-dcnode-id="2474" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2425" id="section2"><a class="link-target" data-dcnode-id="2473" id="sec008" name="sec008" title="II. Job satisfaction"></a><span data-dcnode-id="2472" instrument_node="">
</span><h3 data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">II. Job satisfaction</span></h3><span data-dcnode-id="2469" instrument_node="">
</span><a class="link-target" data-dcnode-id="2468" id="article1.body1.sec3.sec2.p1" name="article1.body1.sec3.sec2.p1"></a><p data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">The second aspect of our conceptual analysis refers to the impacts that fear of replacement will have for workers’ subjective well-being. The main expectation is that fear of replacement in the future will negatively affect job satisfaction at present. The main reason is that the prospect to become unemployed, or to be taken away some of the current working tasks, will negatively affect wage and financial conditions expected for the future, thus creating uncertainty about future job prospects and personal finance, and hence lower job satisfaction.</span></p><span data-dcnode-id="2465" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2427" id="section1"><a class="link-target" data-dcnode-id="2464" id="sec009" name="sec009" title="Moderation effects"></a><h4 data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">Moderation effects.</span></h4><a class="link-target" data-dcnode-id="2461" id="article1.body1.sec3.sec2.sec1.p1" name="article1.body1.sec3.sec2.sec1.p1"></a><p data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Fear of replacement will arguably have different impacts on job satisfaction for high- versus low-skilled workers. We posit the following contrasting effects.</span></p><span data-dcnode-id="2458" instrument_node="">
</span><a class="link-target" data-dcnode-id="2457" id="article1.body1.sec3.sec2.sec1.p2" name="article1.body1.sec3.sec2.sec1.p2"></a><p data-dcnode-id="2444"><em data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">The negative effects on job satisfaction will be stronger for the low-skilled</span></em><span data-dcnode-id="2454" instrument_node="">. If replaced, these workers will on average have fewer possibilities to find another occupation in the labor market. Acemoglu and Restrepo [</span><a class="ref-tip" data-dcnode-id="2452" href="#pone.0242929.ref022"><span data-dcnode-id="2453" instrument_node="">22</span></a><span data-dcnode-id="2451" instrument_node="">] and Blanas et al. [</span><a class="ref-tip" data-dcnode-id="2449" href="#pone.0242929.ref020"><span data-dcnode-id="2450" instrument_node="">20</span></a><span data-dcnode-id="2448" instrument_node="">] document in fact that displacement effects of industrial robots on employment and wages are stronger and more significant for low-education workers. On the other hand, as noted in section 2.1, extant research suggests that automation technologies can have more positive effects on high-skilled workers, increasing the demand for labor, wages and the complexity and interest of their tasks [</span><a class="ref-tip" data-dcnode-id="2446" href="#pone.0242929.ref018"><span data-dcnode-id="2447" instrument_node="">18</span></a><span data-dcnode-id="2445" instrument_node="">].</span></p><span data-dcnode-id="2443" instrument_node="">
</span><a class="link-target" data-dcnode-id="2442" id="article1.body1.sec3.sec2.sec1.p3" name="article1.body1.sec3.sec2.sec1.p3"></a><p data-dcnode-id="2435"><em data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">The negative effects on job satisfaction will be stronger for the high-skilled</span></em><span data-dcnode-id="2439" instrument_node="">. According to prospect theory [</span><a class="ref-tip" data-dcnode-id="2437" href="#pone.0242929.ref029"><span data-dcnode-id="2438" instrument_node="">29</span></a><span data-dcnode-id="2436" instrument_node="">], individuals that invest more time in education and human capital formation will also have higher expectations about the working conditions that they desire and expect to have in the future, and be less satisfied with their job if this does not match the high expectations the individual has. Hence, highly educated workers, when facing the prospect of changing jobs and tasks in the future, may be those that have more to lose from automation, precisely because they are the individuals who have invested more in their human capital formation, and they have therefore higher expectations about the working conditions that they feel they deserve.</span></p><span data-dcnode-id="2434" instrument_node="">
</span><a class="link-target" data-dcnode-id="2433" id="article1.body1.sec3.sec2.sec1.p4" name="article1.body1.sec3.sec2.sec1.p4"></a><p data-dcnode-id="2429"><strong data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">Proposition 2:</span></strong><span data-dcnode-id="2430" instrument_node=""> Fear of replacement will negatively affect the job satisfaction of low-skilled workers more than that of high-skilled workers if the former effect is stronger than the latter.</span></p><span data-dcnode-id="2428" instrument_node="">
</span></div><span data-dcnode-id="2426" instrument_node="">
</span></div><span data-dcnode-id="2424" instrument_node="">
</span></div><span data-dcnode-id="2422" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2190" id="section4" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="2421" data-toc="sec010" id="sec010" name="sec010" title="4. Data"></a><h2 data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">4. Data</span></h2><span data-dcnode-id="2418" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2303" id="section1"><a class="link-target" data-dcnode-id="2417" id="sec011" name="sec011" title="Individual-level data"></a><span data-dcnode-id="2416" instrument_node="">
</span><h3 data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">Individual-level data</span></h3><span data-dcnode-id="2413" instrument_node="">
</span><a class="link-target" data-dcnode-id="2412" id="article1.body1.sec4.sec1.p1" name="article1.body1.sec4.sec1.p1"></a><p data-dcnode-id="2404"><span data-dcnode-id="2411" instrument_node="">We use the </span><em data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">Working Life Barometer</span></em><span data-dcnode-id="2408" instrument_node=""> survey (</span><em data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Arbeidslivsbarometer</span></em><span data-dcnode-id="2405" instrument_node="">), which provides annual microdata for several thousand Norwegian workers. The survey is provided by the Confederation of Vocational Unions (YS), a politically independent umbrella organization for labor unions, and organized by the Work Research Institute in Norway. TNS Gallup collects the data targeting a large random sample of Norwegian workers aged 18–67 years. Our analysis makes use of the four surveys carried out in the years 2016 to 2019, which include information on the main variables of interest for this study, and particularly workers’ subjective assessments of the threats of automation, and their job satisfaction.</span></p><span data-dcnode-id="2403" instrument_node="">
</span><a class="link-target" data-dcnode-id="2402" id="article1.body1.sec4.sec1.p2" name="article1.body1.sec4.sec1.p2"></a><p data-dcnode-id="2391"><span data-dcnode-id="2401" instrument_node="">The main target variable in the study is job satisfaction, which is measured by means of responses to the survey question: “</span><em data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">How satisfied are you with your job</span></em><span data-dcnode-id="2398" instrument_node="">?</span><em data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">”</span></em><span data-dcnode-id="2395" instrument_node="">. Respondents indicate their satisfaction level on a 1–5 scale (“Very dissatisfied”; “Pretty dissatisfied”; “Neither satisfied nor dissatisfied”; “Pretty satisfied”; “Very satisfied”). The main explanatory variable is fear of replacement. This is measured by means of responses to the following survey question: “</span><em data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">Do you think some of your current tasks could be done by machine instead</span></em><span data-dcnode-id="2392" instrument_node="">?”. Fear of replacement is a dummy variable: respondents who answer yes to this question take value 1, whereas workers who do not think that their tasks could be replaced by a machine take value 0. It is important to observe that this survey question measures workers’ assessment of the possibility that their tasks could be replaced by machines (cognitive reaction), and not directly the fear to lose their job as a consequence of automation (emotional reaction). However, as we will show later in the results section, this survey question is closely related to other survey questions that measure workers’ fear of losing their job, and it is therefore reasonable to use it as a proxy measure of fear of replacement. It is also worthwhile to note that only workers who are currently employed are asked to answer the question on fear of replacement, whereas unemployed individuals must skip this part of the questionnaire. Hence, our analysis focuses on the beliefs of workers who are potentially exposed to automation, but it does not consider those individuals that have already been laid off due to automation.</span></p><span data-dcnode-id="2390" instrument_node="">
</span><a class="link-target" data-dcnode-id="2389" id="article1.body1.sec4.sec1.p3" name="article1.body1.sec4.sec1.p3"></a><p data-dcnode-id="2375"><span data-dcnode-id="2388" instrument_node="">Next, another important variable in our study is the skill-level of workers, which is measured by their education level, distinguishing workers with a completed University degree </span><em data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">versus</span></em><span data-dcnode-id="2385" instrument_node=""> those without tertiary education. In terms of control variables, the </span><em data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Working Life Barometer</span></em><span data-dcnode-id="2382" instrument_node=""> survey also provides employee-level demographic and socio-economic information such as age, gender, income, union membership, and occupation type. In total, we analyze responses from 10,051 workers aged 19–68 years. </span><a data-dcnode-id="2380" href="#pone-0242929-t001"><span data-dcnode-id="2381" instrument_node="">Table 1</span></a><span data-dcnode-id="2379" instrument_node=""> presents a list of the variables used in the analysis, and </span><a data-dcnode-id="2377" href="#pone-0242929-t002"><span data-dcnode-id="2378" instrument_node="">Table 2</span></a><span data-dcnode-id="2376" instrument_node=""> reports some descriptive statistics.</span></p><span data-dcnode-id="2374" instrument_node="">
</span><a class="link-target" data-dcnode-id="2373" id="pone-0242929-t001" name="pone-0242929-t001"></a><div class="figure" data-dcnode-id="2339" data-doi="10.1371/journal.pone.0242929.t001"><div class="img-box" data-dcnode-id="2369"><a data-dcnode-id="2371" data-doi="10.1371/journal.pone.0242929" data-uri="10.1371/journal.pone.0242929.t001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0242929.t001" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="2372" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0242929.t001&amp;raw"></a><div class="expand" data-dcnode-id="2370"></div></div><div class="figure-inline-download" data-dcnode-id="2348"><span data-dcnode-id="2368" instrument_node="">
          Download:
          </span><ul data-dcnode-id="2349"><li data-dcnode-id="2362"><a data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0242929.t001"><div class="definition-label" data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="2356"><a data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0242929.t001"><div class="definition-label" data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="2350"><a data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0242929.t001"><div class="definition-label" data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="2344"><span data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Table 1. </span></span><span data-dcnode-id="2345" instrument_node=""> Variables.</span></div><p class="caption_target" data-dcnode-id="2343"></p><p class="caption_object" data-dcnode-id="2340"><a data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0242929.t001"><span data-dcnode-id="2342" instrument_node="">
              https://doi.org/10.1371/journal.pone.0242929.t001</span></a></p></div><a class="link-target" data-dcnode-id="2338" id="pone-0242929-t002" name="pone-0242929-t002"></a><div class="figure" data-dcnode-id="2304" data-doi="10.1371/journal.pone.0242929.t002"><div class="img-box" data-dcnode-id="2334"><a data-dcnode-id="2336" data-doi="10.1371/journal.pone.0242929" data-uri="10.1371/journal.pone.0242929.t002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0242929.t002" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="2337" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0242929.t002&amp;raw"></a><div class="expand" data-dcnode-id="2335"></div></div><div class="figure-inline-download" data-dcnode-id="2313"><span data-dcnode-id="2333" instrument_node="">
          Download:
          </span><ul data-dcnode-id="2314"><li data-dcnode-id="2327"><a data-dcnode-id="2328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0242929.t002"><div class="definition-label" data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="2321"><a data-dcnode-id="2322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0242929.t002"><div class="definition-label" data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="2315"><a data-dcnode-id="2316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0242929.t002"><div class="definition-label" data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="2309"><span data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Table 2. </span></span><span data-dcnode-id="2310" instrument_node=""> Descriptive statistics.</span></div><p class="caption_target" data-dcnode-id="2308"></p><p class="caption_object" data-dcnode-id="2305"><a data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0242929.t002"><span data-dcnode-id="2307" instrument_node="">
              https://doi.org/10.1371/journal.pone.0242929.t002</span></a></p></div></div><span data-dcnode-id="2302" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2222" id="section2"><a class="link-target" data-dcnode-id="2301" id="sec012" name="sec012" title="Robot data"></a><span data-dcnode-id="2300" instrument_node="">
</span><h3 data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Robot data</span></h3><span data-dcnode-id="2297" instrument_node="">
</span><a class="link-target" data-dcnode-id="2296" id="article1.body1.sec4.sec2.p1" name="article1.body1.sec4.sec2.p1"></a><p data-dcnode-id="2267"><span data-dcnode-id="2295" instrument_node="">To measure the introduction of industrial robots in local labor markets in Norway, we make use of a dataset provided by the International Federation of Robotics (IFR), which contains information on robot stock and deliveries in Norwegian industrial firms since 1993. The IFR defines an industrial robot as an “</span><em data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">automatically controlled</span></em><span data-dcnode-id="2292" instrument_node="">, </span><em data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">reprogrammable multipurpose [stationary or mobile machine]</span></em><span data-dcnode-id="2289" instrument_node="">” [</span><a class="ref-tip" data-dcnode-id="2287" href="#pone.0242929.ref032"><span data-dcnode-id="2288" instrument_node="">32</span></a><span data-dcnode-id="2286" instrument_node="">]. Following this definition, industrial robots are autonomous machines capable of operating without human intervention and that could potentially substitute or complement human labor. The IFR provides detailed data on robot stock and deliveries for the period 1993–2017, which can be broken down by application or industry. Robot stock for years 2018 and 2019 are extrapolated assuming a 9 percent annual growth in operational stock as projected by IFR [</span><a class="ref-tip" data-dcnode-id="2284" href="#pone.0242929.ref033"><span data-dcnode-id="2285" instrument_node="">33</span></a><span data-dcnode-id="2283" instrument_node="">]. IFR data have recently been used to analyze the impact of automation on employment and wages [</span><a class="ref-tip" data-dcnode-id="2281" href="#pone.0242929.ref022"><span data-dcnode-id="2282" instrument_node="">22</span></a><span data-dcnode-id="2280" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2278" href="#pone.0242929.ref034"><span data-dcnode-id="2279" instrument_node="">34</span></a><span data-dcnode-id="2277" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2275" href="#pone.0242929.ref035"><span data-dcnode-id="2276" instrument_node="">35</span></a><span data-dcnode-id="2274" instrument_node="">], as well as on workers’ well-being [</span><a class="ref-tip" data-dcnode-id="2272" href="#pone.0242929.ref011"><span data-dcnode-id="2273" instrument_node="">11</span></a><span data-dcnode-id="2271" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2269" href="#pone.0242929.ref012"><span data-dcnode-id="2270" instrument_node="">12</span></a><span data-dcnode-id="2268" instrument_node="">].</span></p><span data-dcnode-id="2266" instrument_node="">
</span><a class="link-target" data-dcnode-id="2265" id="article1.body1.sec4.sec2.p2" name="article1.body1.sec4.sec2.p2"></a><p data-dcnode-id="2224"><span data-dcnode-id="2264" instrument_node="">We allocate robots in regional labor markets following extant research [</span><a class="ref-tip" data-dcnode-id="2262" href="#pone.0242929.ref022"><span data-dcnode-id="2263" instrument_node="">22</span></a><span data-dcnode-id="2261" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2259" href="#pone.0242929.ref034"><span data-dcnode-id="2260" instrument_node="">34</span></a><span data-dcnode-id="2258" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2256" href="#pone.0242929.ref036"><span data-dcnode-id="2257" instrument_node="">36</span></a><span data-dcnode-id="2255" instrument_node="">], assuming that robots are distributed across region and industries by their respective employment shares. Employment shares are calculated based on Eurostat’s Labor Force Survey data dating back to 2008. The long-term change in robot adoption occurs between years 2008 and </span><em data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">t</span></em><span data-dcnode-id="2252" instrument_node=""> based on initial regional employment composition in each industrial category (industry, agriculture, construction, and services), with the change in robot adoption per 1,000 workers fixed at the starting level in year 2008.
</span><a class="link-target" data-dcnode-id="2251" id="pone.0242929.e001" name="pone.0242929.e001"></a><span class="equation" data-dcnode-id="2247"><img class="inline-graphic" data-dcnode-id="2250" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/file%3Ftype%3Dthumbnail%26id%3D10.1371/journal.pone.0242929.e001&amp;raw"><span class="note" data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">(1)</span></span></span><span data-dcnode-id="2246" instrument_node="">
In this setup, robot exposure is measured as national robot adoption allocated at the region-industry level (</span><em data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">r</span></em><span data-dcnode-id="2243" instrument_node="">,</span><em data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">s)</span></em><span data-dcnode-id="2240" instrument_node="">. Each regional labor market </span><em data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">r</span></em><span data-dcnode-id="2237" instrument_node=""> is scaled by the nation’s total employment </span><em data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">emp</span></em><sub data-dcnode-id="2232"><em data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">c</span></em></sub><span data-dcnode-id="2231" instrument_node="">. In short, the instrumental variable that we will use in our empirical analysis is the long-term change in the adoption of industrial robots by Norwegian firms in each local labor market (i.e. in each region-industry </span><em data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">r</span></em><span data-dcnode-id="2228" instrument_node="">,</span><em data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">s)</span></em><span data-dcnode-id="2225" instrument_node="">. This measures the extent to which workers have been exposed to automation from 2007 onwards (see a further discussion of the empirical identification strategy in section 3.2 below).</span></p><span data-dcnode-id="2223" instrument_node="">
</span></div><span data-dcnode-id="2221" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2192" id="section3"><a class="link-target" data-dcnode-id="2220" id="sec013" name="sec013" title="Regional-level control variables"></a><span data-dcnode-id="2219" instrument_node="">
</span><h3 data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Regional-level control variables</span></h3><span data-dcnode-id="2216" instrument_node="">
</span><a class="link-target" data-dcnode-id="2215" id="article1.body1.sec4.sec3.p1" name="article1.body1.sec4.sec3.p1"></a><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">We use the Eurostat’s Labor Force Survey to obtain regional-level variables on GDP per capita, population share with tertiary education, and population size. From Statistics Norway, we retrieve data on firms by size for each region. Further, we collect data on unemployment benefit recipients as a share of total population from the Norwegian Labour and Welfare Administration (NAV), for each region and each year of our dataset.</span></p><span data-dcnode-id="2212" instrument_node="">
</span><a class="link-target" data-dcnode-id="2211" id="article1.body1.sec4.sec3.p2" name="article1.body1.sec4.sec3.p2"></a><p data-dcnode-id="2194"><span data-dcnode-id="2210" instrument_node="">To avoid omitting the possible conflating influence of ICTs when analyzing automation, previous studies have included ICT capital or investment as an additional control variable [</span><a class="ref-tip" data-dcnode-id="2208" href="#pone.0242929.ref034"><span data-dcnode-id="2209" instrument_node="">34</span></a><span data-dcnode-id="2207" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2205" href="#pone.0242929.ref037"><span data-dcnode-id="2206" instrument_node="">37</span></a><span data-dcnode-id="2204" instrument_node="">]. However, others argue that more specific measures of ICT utilization are necessary for micro-level studies [</span><a class="ref-tip" data-dcnode-id="2202" href="#pone.0242929.ref038"><span data-dcnode-id="2203" instrument_node="">38</span></a><span data-dcnode-id="2201" instrument_node="">]. Unlike existing studies that have analyzed the impact of high-speed broadband developments in Norway [</span><a class="ref-tip" data-dcnode-id="2199" href="#pone.0242929.ref039"><span data-dcnode-id="2200" instrument_node="">39</span></a><span data-dcnode-id="2198" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2196" href="#pone.0242929.ref040"><span data-dcnode-id="2197" instrument_node="">40</span></a><span data-dcnode-id="2195" instrument_node="">], we use as additional control variable the broadband internet availability in office buildings instead of households in each region. Data on office buildings with at least 8/8 Mbit/s speeds are provided by the Norwegian Communications Authority (Nkom), and matched against individuals through regional identifiers.</span></p><span data-dcnode-id="2193" instrument_node="">
</span></div><span data-dcnode-id="2191" instrument_node="">
</span></div><span data-dcnode-id="2189" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1838" id="section5" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="2188" data-toc="sec014" id="sec014" name="sec014" title="5. Empirical methods"></a><h2 data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">5. Empirical methods</span></h2><a class="link-target" data-dcnode-id="2185" id="article1.body1.sec5.p1" name="article1.body1.sec5.p1"></a><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">The econometric analysis sets out to study the relationship between fear of replacement and job satisfaction. Fear of replacement is the subjective assessment that each worker does on the possibility that her working tasks will be replaced by a smart machine in the future. Such subjective assessment may arguably depend on unobserved and idiosyncratic factors such as e.g. ability, attitude towards risk, and technological/digital competencies. Therefore, unobserved individual factors might possibly influence both the outcome variable (job satisfaction) and the main explanatory variable (fear of replacement).</span></p><span data-dcnode-id="2182" instrument_node="">
</span><a class="link-target" data-dcnode-id="2181" id="article1.body1.sec5.p2" name="article1.body1.sec5.p2"></a><p data-dcnode-id="2140"><span data-dcnode-id="2180" instrument_node="">To address endogeneity concerns, we follow recent research and use the lagged introduction of robots in local labor markets (industry-regions) as an instrument for individual workers’ fear of replacement [</span><a class="ref-tip" data-dcnode-id="2178" href="#pone.0242929.ref011"><span data-dcnode-id="2179" instrument_node="">11</span></a><span data-dcnode-id="2177" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2175" href="#pone.0242929.ref012"><span data-dcnode-id="2176" instrument_node="">12</span></a><span data-dcnode-id="2174" instrument_node="">]. Existing studies on robot implications for labor markets where robot adoption is the main explanatory variable address endogeneity issues by incorporating spillover effects from robot adoption across industries in other countries as an instrument in a 2SLS setup [</span><a class="ref-tip" data-dcnode-id="2172" href="#pone.0242929.ref022"><span data-dcnode-id="2173" instrument_node="">22</span></a><span data-dcnode-id="2171" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2169" href="#pone.0242929.ref034"><span data-dcnode-id="2170" instrument_node="">34</span></a><span data-dcnode-id="2168" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="2166" href="#pone.0242929.ref036"><span data-dcnode-id="2167" instrument_node="">36</span></a><span data-dcnode-id="2165" instrument_node="">]. Unlike these studies, we approach subjective responses to structural inroads of robot technology in local labor markets to identify learning effects from past automation. Specifically, our instrumental variable is the one defined in (1) above, i.e. the change in the adoption of industrial robots by Norwegian firms in each local labor market (industry-region) between 2008 and year </span><em data-dcnode-id="2163"><span
