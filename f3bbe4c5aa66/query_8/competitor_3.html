gressions (reported in Table A14 in </span><a data-dcnode-id="1378" href="#pone.0242929.s001"><span data-dcnode-id="1379" instrument_node="">S1 File</span></a><span data-dcnode-id="1377" instrument_node="">) show that the two additional interaction variables are not statistically significant. We think that the role of union membership as a factor moderating the effects of industrial automation is an interesting topic for future research.</span></p><span data-dcnode-id="1375" instrument_node="">
</span></div><span data-dcnode-id="1373" instrument_node="">
</span></div><span data-dcnode-id="1371" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1326" id="section7" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="1370" data-toc="sec019" id="sec019" name="sec019" title="7. Conclusions"></a><h2 data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">7. Conclusions</span></h2><a class="link-target" data-dcnode-id="1367" id="article1.body1.sec7.p1" name="article1.body1.sec7.p1"></a><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">The swift pace of introduction of industrial robots, AI and smart machines in production activities in recent years represents a new major process of Schumpeterian creative destruction. This process will in the near future lead to dramatic consequences for employment in many sectors and regions, and it will at the same time create new unprecedented opportunities for productivity growth, wealth and well-being. As for other major transformations in the past, this structural change and the related transition and adjustment process will arguably not be smooth and swift: it will unfold over a period of several years, and it will lead to important negative impacts in the short-run before the long-run economic and societal benefits will eventually emerge.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><a class="link-target" data-dcnode-id="1363" id="article1.body1.sec7.p2" name="article1.body1.sec7.p2"></a><p data-dcnode-id="1358"><span data-dcnode-id="1362" instrument_node="">Studying the effects of automation on employment, extant research has so far mostly focused on aggregate impacts that industrial robots and AI have on employment demand and wages for different industries and countries. The present paper has argued that it is important to shift the focus to the micro-level of analysis and study the impacts of automation technologies on individual workers’ well-being. Specifically, we have put forward the idea that the relevant impacts that it is important to study are not only pecuniary (i.e. related to workers’ employment conditions and wages) but also nonpecuniary (i.e. related to workers’ expectations and future job prospects). </span><em data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Ceteris paribus</span></em><span data-dcnode-id="1359" instrument_node="">, workers that fear that their working tasks might be replaced by a smart machine in the future may have a lower job satisfaction at present than workers who have more secure job prospects and less uncertainty about the future.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><a class="link-target" data-dcnode-id="1356" id="article1.body1.sec7.p3" name="article1.body1.sec7.p3"></a><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">We have investigated this idea by considering a large sample of workers in Norway for the period 2016–2019, and studying the extent to which the introduction of industrial robots in local labor markets affect workers’ fear of being replaced in the future, and in this way hamper their subjective well-being. Our data and results provide a quite striking picture. 40% of Norwegian workers in our sample think their working tasks might be replaced by a machine, and our analysis shows that this fear of replacement significantly lowers their job satisfaction at present. We also find that this transmission mechanism is driven by low-skilled workers, which are those carrying out routine-based tasks, and who are therefore aware to be more exposed to the risks of automation. On the whole, we think that our empirical findings are not only relevant for Norway (the country to which our dataset refers), but they can in principle have more general lessons for other countries too. Automation is by now an important trend that is rapidly diffusing worldwide, and its effect on workers’ health and well-being is therefore a topic of high societal relevance. Schwabe (2019) provides related evidence using a different dataset for a larger sample of European countries. The present work calls therefore for further research that may investigate and extend this research topic in a variety of different countries and continents.</span></p><span data-dcnode-id="1353" instrument_node="">
</span><a class="link-target" data-dcnode-id="1352" id="article1.body1.sec7.p4" name="article1.body1.sec7.p4"></a><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">A first important policy implication of our results is that the current process of structural change and creative destruction will in the short-run likely lead to stronger fear of replacement and uncertainty about the future for low-skilled workers carrying out routine work in factories, thus possibly leading to further polarization not only in terms of employment and wages, but also in terms of subjective well-being. To mitigate these negative consequences, which are already visible at present, national authorities should actively support training and re-training policies in such a way that workers that are exposed to future replacement may build up new competencies that can increase their ability to work with smart machines, as well as increase their qualifications and the likelihood to find a new job if this will become necessary in the future. If fear of replacement triggers workers to participate in such training is an interesting question for future studies. In other words, by giving better future prospects to more vulnerable workers, training policies will also contribute to enhance their subjective well-being at present.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><a class="link-target" data-dcnode-id="1348" id="article1.body1.sec7.p5" name="article1.body1.sec7.p5"></a><p data-dcnode-id="1343"><span data-dcnode-id="1347" instrument_node="">Our results also suggest a second reflection and possible policy implication. As noted above, 40% of Norwegian workers in our sample think that their working tasks might be replaced by a machine. According to the Eurobarometer survey, the extent of fear of replacement is roughly the same for workers in other European countries [</span><a class="ref-tip" data-dcnode-id="1345" href="#pone.0242929.ref012"><span data-dcnode-id="1346" instrument_node="">12</span></a><span data-dcnode-id="1344" instrument_node="">]. This number is quite high indeed. Is it reasonable that so many workers fear competition from smart machines, and why is it so?</span></p><span data-dcnode-id="1342" instrument_node="">
</span><a class="link-target" data-dcnode-id="1341" id="article1.body1.sec7.p6" name="article1.body1.sec7.p6"></a><p data-dcnode-id="1336"><span data-dcnode-id="1340" instrument_node="">Extant research on automation and employment has not yet reached a consensus on the direction and size of these effects, and it still presents a vivid debate between those that emphasize negative consequences and those that point out positive economic and societal effects. Hence, there is no clear scientific evidence and consensus at present that could provide the basis for individual workers to form rational and well-informed assessments and expectations about their job prospects in the future. It is therefore reasonable to ask whether the generalized fear of competition from smart machines is actually exaggerated and not based on extant research and established knowledge. The concrete risk is that–in the current phase of rapid and disruptive technological change–societal debates in the media on robots, automation and AI may tend to exaggerate risks and depict gloomy future scenarios, while often neglecting possible long-run benefits for the economy and the society, which are indeed even hard to imagine at the moment [</span><a class="ref-tip" data-dcnode-id="1338" href="#pone.0242929.ref001"><span data-dcnode-id="1339" instrument_node="">1</span></a><span data-dcnode-id="1337" instrument_node="">].</span></p><span data-dcnode-id="1335" instrument_node="">
</span><a class="link-target" data-dcnode-id="1334" id="article1.body1.sec7.p7" name="article1.body1.sec7.p7"></a><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Since media debates on this topic are often biased and tend to overemphasize the negative impacts of automation (which are arguably more “catchy” and attractive for the uninformed audience), this may contribute to explain why so many workers report to fear future machine replacement. However, our paper has shown that such subjective individual assessments about the future may indeed hamper job satisfaction at present. This can also lead to anxiety, mental stress and low motivation at work, which may in turn depress creativity, productivity and innovation in the workplace.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><a class="link-target" data-dcnode-id="1330" id="article1.body1.sec7.p8" name="article1.body1.sec7.p8"></a><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">In short, we should not disregard the possibility that a biased and uninformed presentation of this topic in the media may indeed have concrete negative consequences on workers’ subjective well-being by affecting their beliefs about future job prospects. The policy implications of this are certainly not easy to draw. A major point, though, is to stress the importance of having better informed societal debates in the media, and particularly in State-owned channels, that take a more balanced view of the negative and positive consequences of automation, and that avoid spreading fears and gloomy scenarios that are not based on solid evidence and arguments.</span></p><span data-dcnode-id="1327" instrument_node="">
