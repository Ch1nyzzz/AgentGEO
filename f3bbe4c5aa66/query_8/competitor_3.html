 data-dcnode-id="2164" instrument_node="">t</span></em><span data-dcnode-id="2162" instrument_node=""> (i.e. one of the survey years 2016–2019). This variable measures the extent to which workers in each of the 16 industry-regions considered in this study have been </span><em data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">exposed</span></em><span data-dcnode-id="2159" instrument_node=""> to rising automation in recent years. We thus exploit (lagged) variation in robot adoption over time and across industry-regions in Norway to instrument for individual fear of replacement at time </span><em data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">t</span></em><span data-dcnode-id="2156" instrument_node="">. The underlying idea of this identification strategy is that workers that are employed in local labor markets that have more rapidly been exposed to automation (i.e. in industry-regions where firms have increasingly used industrial robots) will be more likely to consider automation as a possible threat, and therefore fear that some of their working tasks could be replaced by a machine in the future. In other words, we posit that workers learn from past robot adoption in their local labor markets, because they are subject to </span><em data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">peer effects</span></em><span data-dcnode-id="2153" instrument_node=""> [</span><a class="ref-tip" data-dcnode-id="2151" href="#pone.0242929.ref041"><span data-dcnode-id="2152" instrument_node="">41</span></a><span data-dcnode-id="2150" instrument_node="">]. Although it is reasonable to posit that these peer effects work through </span><em data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">changes</span></em><span data-dcnode-id="2147" instrument_node=""> in robot adoption over time, we cannot exclude the possibility that the same mechanism may also work through the absolute </span><em data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">levels</span></em><span data-dcnode-id="2144" instrument_node=""> of robot adoption (i.e. workers may fear replacement when they experience a high intensity of industrial robots in the industry-region where they work). To consider this possibility, we have also calculated our instrumental variable in levels rather than as changes over time, and reported additional regressions in the online appendix (see Table A5 in </span><a data-dcnode-id="2142" href="#pone.0242929.s001"><span data-dcnode-id="2143" instrument_node="">S1 File</span></a><span data-dcnode-id="2141" instrument_node="">, whose results are in line with the main results presented in the paper).</span></p><span data-dcnode-id="2139" instrument_node="">
</span><a class="link-target" data-dcnode-id="2138" id="article1.body1.sec5.p3" name="article1.body1.sec5.p3"></a><p data-dcnode-id="2121"><span data-dcnode-id="2137" instrument_node="">Norwegian firms have invested in sophisticated robotics and automation technologies to keep pace with the Digital Single Market strategy [</span><a class="ref-tip" data-dcnode-id="2135" href="#pone.0242929.ref042"><span data-dcnode-id="2136" instrument_node="">42</span></a><span data-dcnode-id="2134" instrument_node="">], and our empirical analysis exploits this exogenous source of tempo-spatial variations to identify the effects of automation on workers’ job satisfaction. </span><a data-dcnode-id="2132" href="#pone-0242929-g001"><span data-dcnode-id="2133" instrument_node="">Fig 1</span></a><span data-dcnode-id="2131" instrument_node=""> illustrates the dynamics of industrial robots adoption in Norway in the last decades, showing a much faster pace since 2014. </span><a data-dcnode-id="2129" href="#pone-0242929-t003"><span data-dcnode-id="2130" instrument_node="">Table 3</span></a><span data-dcnode-id="2128" instrument_node=""> shows that most robots have so far been used by firms within manufacturing, and less so in other branches such as agriculture, construction and services. However, </span><a data-dcnode-id="2126" href="#pone-0242929-t003"><span data-dcnode-id="2127" instrument_node="">Table 3</span></a><span data-dcnode-id="2125" instrument_node=""> also shows that the introduction of robots by service firms has been quite rapid in the last decade. </span><a data-dcnode-id="2123" href="#pone-0242929-g002"><span data-dcnode-id="2124" instrument_node="">Fig 2</span></a><span data-dcnode-id="2122" instrument_node=""> illustrates the trend in robot adoption since 2010, indicating a rising trend in all 16 industry-regions considered in this study, and particularly so in manufacturing and services.</span></p><span data-dcnode-id="2120" instrument_node="">
</span><a class="link-target" data-dcnode-id="2119" id="pone-0242929-g001" name="pone-0242929-g001"></a><div class="figure" data-dcnode-id="2085" data-doi="10.1371/journal.pone.0242929.g001"><div class="img-box" data-dcnode-id="2115"><a data-dcnode-id="2117" data-doi="10.1371/journal.pone.0242929" data-uri="10.1371/journal.pone.0242929.g001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0242929.g001" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="2118" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0242929.g001&amp;raw"></a><div class="expand" data-dcnode-id="2116"></div></div><div class="figure-inline-download" data-dcnode-id="2094"><span data-dcnode-id="2114" instrument_node="">

          </span><ul data-dcnode-id="2060"><li data-dcnode-id="2073"><a data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0242929.g002"><div class="definition-label" data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="2067"><a data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0242929.g002"><div class="definition-label" data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="2061"><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0242929.g002"><div class="definition-label" data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="2055"><span data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Fig 2. </span></span><span data-dcnode-id="2056" instrument_node=""> Robot adoption by industry-region, 2010–2019.</span></div><p class="caption_target" data-dcnode-id="2054"></p><p class="caption_object" data-dcnode-id="2051"><a data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/jour           Download:
          </span><ul data-dcnode-id="2025"><li data-dcnode-id="2038"><a data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0242929.t003"><div class="definition-label" data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="2032"><a data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0242929.t003"><div class="definition-label" data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="2026"><a data-dcnode-id="2027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0242929.t003"><div class="definition-label" data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="2020"><span data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Table 3. </span></span><span data-dcnode-id="2021" instrument_node=""> Adoption of robots (operational stock) in Norwegian regions and industries.</span></div><p class="caption_target" data-dcnode-id="2019"></p><p class="caption_object" data-dcnode-id="2016"><a data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0242929.t003"><span data-dcnode-id="2018" instrument_node="">
              https://doi.org/10.1371/journal.pone.0242929.t003</span></a></p></div><a class="link-target" data-dcnode-id="2014" id="article1.body1.sec5.p4" name="article1.body1.sec5.p4"></a><p data-dcnode-id="2009"><span data-dcnode-id="2013" instrument_node="">To get a further overview of the diffusion and use of industrial robots in Norway, it is also useful to get some descriptive figures from Eurostat’ survey on “ICT usage and e-commerce in enterprises (2018)” (see Tables A1 to A4 in </span><a data-dcnode-id="2011" href="#pone.0242929.s001"><span data-dcnode-id="2012" instrument_node="">S1 File</span></a><span data-dcnode-id="2010" instrument_node="">). Large firms are the main adopters of both industrial and service robot technologies, and capital-intensive firms appear to invest in and integrate both technologies in their operations. Operating machines represent about 60% of all industrial robots in Norwegian firms in 2017. Whereas large firms use service robots for mostly logistics and transportation purposes, small and medium enterprises (SMEs) deploy robots in more product-related purposes, such as inspection, assembly or construction works.</span></p><span data-dcnode-id="2008" instrument_node="">
</span><a class="link-target" data-dcnode-id="2007" id="article1.body1.sec5.p5" name="article1.body1.sec5.p5"></a><p data-dcnode-id="2002"><span data-dcnode-id="2006" instrument_node="">Although our paper focuses on industrial automation, workers in knowledge-intensive service occupations may rather fear competition from new artificial intelligence technologies. Table A4 in </span><a data-dcnode-id="2004" href="#pone.0242929.s001"><span data-dcnode-id="2005" instrument_node="">S1 File</span></a><span data-dcnode-id="2003" instrument_node=""> presents some descriptives on Norwegian firms’ use of Big Data in their business operations. Large firms are more likely to use Big Data than SMEs. Large firms use smart sensors (e.g. Internet of Things) and geo-data to a greater extent than SMEs. On the other hand, SMEs more actively collect data from social media for marketing purposes. In sum, smart machines are swiftly making inroads in the Norwegian economy, and this pace has accelerated in the last five years.</span></p><span data-dcnode-id="2001" instrument_node="">
</span><a class="link-target" data-dcnode-id="2000" id="article1.body1.sec5.p6" name="article1.body1.sec5.p6"></a><p data-dcnode-id="1987"><a data-dcnode-id="1998" href="#pone-0242929-g003"><span data-dcnode-id="1999" instrument_node="">Fig 3</span></a><span data-dcnode-id="1997" instrument_node=""> shows the time trend of the variable machine replacement for each of the 16 industry-regions in the more recent period 2016–2019 to which our survey data refers. Although this is a relatively short span (which does not make it possible to assess long run trends), </span><a data-dcnode-id="1995" href="#pone-0242929-g003"><span data-dcnode-id="1996" instrument_node="">Fig 3</span></a><span data-dcnode-id="1994" instrument_node=""> indicates that fear of replacement due to automation has increased steadily in most of the industry-regions considered in this study, and that there is by and large a correspondence between the time trends reported in </span><a data-dcnode-id="1992" href="#pone-0242929-g002"><span data-dcnode-id="1993" instrument_node="">Fig 2</span></a><span data-dcnode-id="1991" instrument_node=""> (robot adoption) and </span><a data-dcnode-id="1989" href="#pone-0242929-g003"><span data-dcnode-id="1990" instrument_node="">Fig 3</span></a><span data-dcnode-id="1988" instrument_node=""> (machine replacement).</span></p><span data-dcnode-id="1986" instrument_node="">
</span><a class="link-target" data-dcnode-id="1985" id="pone-0242929-g003" name="pone-0242929-g003"></a><div class="figure" data-dcnode-id="1951" data-doi="10.1371/journal.pone.0242929.g003"><div class="img-box" data-dcnode-id="1981"><a data-dcnode-id="1983" data-doi="10.1371/journal.pone.0242929" data-uri="10.1371/journal.pone.0242929.g003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0242929.g003" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="1984" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0242929.g003&amp;raw"></a><div class="expand" data-dcnode-id="1982"></div></div><div class="figure-inline-download" data-dcnode-id="1960"><span data-dcnode-id="1980" instrument_node="">
          Download:
          </span><ul data-dcnode-id="1961"><li data-dcnode-id="1974"><a data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0242929.g003"><div class="definition-label" data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="1968"><a data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0242929.g003"><div class="definition-label" data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="1962"><a data-dcnode-id="1963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0242929.g003"><div class="definition-label" data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="1956"><span data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Fig 3. </span></span><span data-dcnode-id="1957" instrument_node=""> Share of workers who believe that their job can be replaced by machines, by region and industry.</span></div><p class="caption_target" data-dcnode-id="1955"></p><p class="caption_object" data-dcnode-id="1952"><a data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0242929.g003"><span data-dcnode-id="1954" instrument_node="">
              https://doi.org/10.1371/journal.pone.0242929.g003</span></a></p></div><a class="link-target" data-dcnode-id="1950" id="article1.body1.sec5.p7" name="article1.body1.sec5.p7"></a><p data-dcnode-id="1909"><span data-dcnode-id="1949" instrument_node="">Based on the identification strategy noted above, we estimate a two-stage instrumental variables (IV) model: the first stage (3) investigates how robot exposure and other control factors explain variations in workers’ fear of replacement, whereas the second stage (2) estimates the relationship between job satisfaction and anticipated replacement:
</span><a class="link-target" data-dcnode-id="1948" id="pone.0242929.e002" name="pone.0242929.e002"></a><span class="equation" data-dcnode-id="1944"><img class="inline-graphic" data-dcnode-id="1947" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/file%3Ftype%3Dthumbnail%26id%3D10.1371/journal.pone.0242929.e002&amp;raw"><span class="note" data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">(2)</span></span></span><span data-dcnode-id="1943" instrument_node="">
</span><a class="link-target" data-dcnode-id="1942" id="pone.0242929.e003" name="pone.0242929.e003"></a><span class="equation" data-dcnode-id="1938"><img class="inline-graphic" data-dcnode-id="1941" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/file%3Ftype%3Dthumbnail%26id%3D10.1371/journal.pone.0242929.e003&amp;raw"><span class="note" data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">(3)</span></span></span><span data-dcnode-id="1937" instrument_node="">
</span><em data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">JS</span></em><span data-dcnode-id="1934" instrument_node=""> is reported job satisfaction, </span><em data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">machine replacement</span></em><span data-dcnode-id="1931" instrument_node=""> is the dummy variable indicating whether the respondent believes a machine can perform her/his job tasks, </span><em data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">z</span></em><span data-dcnode-id="1928" instrument_node=""> is the instrumental variable (industry-region lagged pace of robot adoption), and </span><em data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">x</span></em><span data-dcnode-id="1925" instrument_node=""> is a set of covariates (measured for individuals in each survey wave). The subscript </span><em data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">r</span></em><span data-dcnode-id="1922" instrument_node=""> denotes the geographical region of residence of each worker </span><em data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">i</span></em><span data-dcnode-id="1919" instrument_node="">, </span><em data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">s</span></em><span data-dcnode-id="1916" instrument_node=""> denotes the industry in which the worker is employed, and the subscript </span><em data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">t</span></em><span data-dcnode-id="1913" instrument_node=""> refers to survey year. Among the set of covariates, the skill variable is particularly relevant for the present study, as we seek to investigate whether the relationship between fear of replacement and job satisfaction differs for high- </span><em data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">versus</span></em><span data-dcnode-id="1910" instrument_node=""> low-skilled workers. To test these moderation effects, we interact the skill variable with the robots variable in the first stage equation, and with the fear of replacement variable in the second stage equation.</span></p><span data-dcnode-id="1908" instrument_node="">
</span><a class="link-target" data-dcnode-id="1907" id="article1.body1.sec5.p8" name="article1.body1.sec5.p8"></a><p data-dcnode-id="1875"><span data-dcnode-id="1906" instrument_node="">For model identification, the vector </span><em data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">x</span></em><span data-dcnode-id="1903" instrument_node=""> in Eqs (</span><a data-dcnode-id="1901" href="#pone.0242929.e002"><span data-dcnode-id="1902" instrument_node="">2</span></a><span data-dcnode-id="1900" instrument_node="">) and (</span><a data-dcnode-id="1898" href="#pone.0242929.e003"><span data-dcnode-id="1899" instrument_node="">3</span></a><span data-dcnode-id="1897" instrument_node="">) does also include detailed demographic and socio-economic characteristics expected to correlate with job satisfaction and anticipated replacement, such as age, gender, income, union membership, and industry employment. According to previous studies, these factors are relevant to explain variation in job satisfaction, labor dynamics and technological automation diffusion [</span><a class="ref-tip" data-dcnode-id="1895" href="#pone.0242929.ref008"><span data-dcnode-id="1896" instrument_node="">8</span></a><span data-dcnode-id="1894" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1892" href="#pone.0242929.ref022"><span data-dcnode-id="1893" instrument_node="">22</span></a><span data-dcnode-id="1891" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1889" href="#pone.0242929.ref031"><span data-dcnode-id="1890" instrument_node="">31</span></a><span data-dcnode-id="1888" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1886" href="#pone.0242929.ref034"><span data-dcnode-id="1887" instrument_node="">34</span></a><span data-dcnode-id="1885" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1883" href="#pone.0242929.ref037"><span data-dcnode-id="1884" instrument_node="">37</span></a><span data-dcnode-id="1882" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1880" href="#pone.0242929.ref043"><span data-dcnode-id="1881" instrument_node="">43</span></a><span data-dcnode-id="1879" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="1877" href="#pone.0242929.ref045"><span data-dcnode-id="1878" instrument_node="">45</span></a><span data-dcnode-id="1876" instrument_node="">]. Finally, both equations also include a full set of regional dummies and time dummies that control for unobservable determinants of job satisfaction within each region over time.</span></p><span data-dcnode-id="1874" instrument_node="">
</span><a class="link-target" data-dcnode-id="1873" id="article1.body1.sec5.p9" name="article1.body1.sec5.p9"></a><p data-dcnode-id="1868"><span data-dcnode-id="1872" instrument_node="">It is important to note that our identification strategy is based on the assumption that robot exposure in each industry-region will affect workers’ job satisfaction only through its effects on fear of replacement, and we therefore exclude a direct impact of robot exposure on job satisfaction. Conceptually, we cannot exclude that robot adoption in a given firm may potentially affect employees’ job satisfaction directly, and not only indirectly through fear of replacement. However, we think that this conceptual argument is not a particular reason of concern in our empirical study. The reason for this is that robot adoption in Norway, although it has increased rapidly during the last few years, it is still relatively low in absolute levels (around 6%, see </span><a data-dcnode-id="1870" href="#pone-0242929-t002"><span data-dcnode-id="1871" instrument_node="">Table 2</span></a><span data-dcnode-id="1869" instrument_node="">). This means that our dataset and estimations do not refer to workers who already use robots in their current job, but for the great majority they refer to workers that are exposed to (i.e. observe) automation being introduced in other firms in the industry-region where they work, and that due to these peer effects fear that machines could replace some of their working tasks in the future.</span></p><span data-dcnode-id="1867" instrument_node="">
</span><a class="link-target" data-dcnode-id="1866" id="article1.body1.sec5.p10" name="article1.body1.sec5.p10"></a><p data-dcnode-id="1840"><span data-dcnode-id="1865" instrument_node="">The econometric model is estimated as a two-stage bivariate recursive ordered probit maximum likelihood setup, which accommodates the ordinal character of the outcome and main explanatory variable [</span><a class="ref-tip" data-dcnode-id="1863" href="#pone.0242929.ref046"><span data-dcnode-id="1864" instrument_node="">46</span></a><span data-dcnode-id="1862" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1860" href="#pone.0242929.ref047"><span data-dcnode-id="1861" instrument_node="">47</span></a><span data-dcnode-id="1859" instrument_node="">]. This model estimates response probabilities of two variables, one ordered and one dichotomous, and the exogenous variable robot exposure is included in the first stage [</span><a class="ref-tip" data-dcnode-id="1857" href="#pone.0242929.ref048"><span data-dcnode-id="1858" instrument_node="">48</span></a><span data-dcnode-id="1856" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1854" href="#pone.0242929.ref049"><span data-dcnode-id="1855" instrument_node="">49</span></a><span data-dcnode-id="1853" instrument_node="">]. Estimations are performed with Roodman’s [</span><a class="ref-tip" data-dcnode-id="1851" href="#pone.0242929.ref050"><span data-dcnode-id="1852" instrument_node="">50</span></a><span data-dcnode-id="1850" instrument_node="">] conditional mixed process (CMP) program. Because the instrument is measured at the industry-region level, estimations are likely to contain grouped structures, and we therefore cluster standard errors in all regressions [</span><a class="ref-tip" data-dcnode-id="1848" href="#pone.0242929.ref041"><span data-dcnode-id="1849" instrument_node="">41</span></a><span data-dcnode-id="1847" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1845" href="#pone.0242929.ref051"><span data-dcnode-id="1846" instrument_node="">51</span></a><span data-dcnode-id="1844" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1842" href="#pone.0242929.ref052"><span data-dcnode-id="1843" instrument_node="">52</span></a><span data-dcnode-id="1841" instrument_node="">].</span></p><span data-dcnode-id="1839" instrument_node="">
</span></div><span data-dcnode-id="1837" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1372" id="section6" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="1836" data-toc="sec015" id="sec015" name="sec015" title="6. Results"></a><h2 data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">6. Results</span></h2><span data-dcnode-id="1833" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1667" id="section1"><a class="link-target" data-dcnode-id="1832" id="sec016" name="sec016" title="First stage results"></a><span data-dcnode-id="1831" instrument_node="">
</span><h3 data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">First stage results</span></h3><span data-dcnode-id="1828" instrument_node="">
</span><a class="link-target" data-dcnode-id="1827" id="article1.body1.sec6.sec1.p1" name="article1.body1.sec6.sec1.p1"></a><p data-dcnode-id="1802"><a data-dcnode-id="1825" href="#pone-0242929-t004"><span data-dcnode-id="1826" instrument_node="">Table 4</span></a><span data-dcnode-id="1824" instrument_node=""> presents the estimation results of the first stage (</span><a data-dcnode-id="1822" href="#pone.0242929.e003"><span data-dcnode-id="1823" instrument_node="">Eq 3</span></a><span data-dcnode-id="1821" instrument_node="">), in which the dependent variable is machine replacement (i.e. workers’ self-reported assessment of the possibility that some of their working tasks will be replaced by a smart machine in the future). </span><a data-dcnode-id="1819" href="#pone-0242929-t004"><span data-dcnode-id="1820" instrument_node="">Table 4</span></a><span data-dcnode-id="1818" instrument_node=""> reports estimation results for both the model without control variables and the one including the full set of controls, in order to assess whether the inclusion of controls affect the results [</span><a class="ref-tip" data-dcnode-id="1816" href="#pone.0242929.ref053"><span data-dcnode-id="1817" instrument_node="">53</span></a><span data-dcnode-id="1815" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1813" href="#pone.0242929.ref054"><span data-dcnode-id="1814" instrument_node="">54</span></a><span data-dcnode-id="1812" instrument_node="">]. The results for the two models are however very close to each other. We begin by briefly looking at the results for the set of control variables, before turning attention to the main variables of our interest. Among the controls, </span><a data-dcnode-id="1810" href="#pone-0242929-t004"><span data-dcnode-id="1811" instrument_node="">Table 4</span></a><span data-dcnode-id="1809" instrument_node=""> shows that fear of replacement is stronger for younger workers. These have a longer time horizon remaining in their working life, and they are therefore more likely to expect that automation will replace some of their working tasks in the future [</span><a class="ref-tip" data-dcnode-id="1807" href="#pone.0242929.ref012"><span data-dcnode-id="1808" instrument_node="">12</span></a><span data-dcnode-id="1806" instrument_node="">]. Employees that belong to a trade union are less likely to fear replacement, arguably because their employment and working conditions are partly protected by the trade union membership (we elaborate further on this in section 6 below). Regarding wage levels, fear of replacement is stronger for workers that have higher income. A possible interpretation of this finding is that, after controlling for education and skill levels (that are correlated with wages and that also affect fear of replacement), workers with higher income have more to lose </span><em data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">vis-à-vis</span></em><span data-dcnode-id="1803" instrument_node=""> workers with lower income, since automation of tasks may lead, in absolute terms, to a stronger wage decrease for them. Further, we control for gender and sector of occupation (industry employment), which are two standard control variables in studies of workers’ subjective well-being.</span></p><span data-dcnode-id="1801" instrument_node="">
</span><a class="link-target" data-dcnode-id="1800" id="pone-0242929-t004" name="pone-0242929-t004"></a><div class="figure" data-dcnode-id="1761" data-doi="10.1371/journal.pone.0242929.t004"><div class="img-box" data-dcnode-id="1796"><a data-dcnode-id="1798" data-doi="10.1371/journal.pone.0242929" data-uri="10.1371/journal.pone.0242929.t004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0242929.t004" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="1799" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0242929.t004&amp;raw"></a><div class="expand" data-dcnode-id="1797"></div></div><div class="figure-inline-download" data-dcnode-id="1775"><span data-dcnode-id="1795" instrument_node="">
          Download:
          </span><ul data-dcnode-id="1776"><li data-dcnode-id="1789"><a data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0242929.t004"><div class="definition-label" data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="1783"><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0242929.t004"><div class="definition-label" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="1777"><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0242929.t004"><div class="definition-label" data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="1771"><span data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Table 4. </span></span><span data-dcnode-id="1772" instrument_node=""> First stage results.</span></div><p class="caption_target" data-dcnode-id="1769"><a class="link-target" data-dcnode-id="1770" id="article1.body1.sec6.sec1.table-wrap1.caption1.p1" name="article1.body1.sec6.sec1.table-wrap1.caption1.p1"></a></p><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Dependent variable: Machine replacement.</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1765"></p><p class="caption_object" data-dcnode-id="1762"><a data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0242929.t004"><span data-dcnode-id="1764" instrument_node="">
              https://doi.org/10.1371/journal.pone.0242929.t004</span></a></p></div><a class="link-target" data-dcnode-id="1760" id="article1.body1.sec6.sec1.p2" name="article1.body1.sec6.sec1.p2"></a><p data-dcnode-id="1746"><span data-dcnode-id="1759" instrument_node="">Shifting the focus to the main variables of interest for this study, the instrumental variable (changes in robot adoption in local labor markets between 2008 and year </span><em data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">t</span></em><span data-dcnode-id="1756" instrument_node="">) is as expected positively correlated with the dependent variable (workers’ fear of replacement). As explained in section 5, the underlying idea is that when individuals work in industry-regions in which firms have increasingly been using robots in the last few years, they are more </span><em data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">exposed</span></em><span data-dcnode-id="1753" instrument_node=""> to automation (e.g. because some of their peers or acquaintances in the same region have lost their job due to automation). These peer effects translate into fear of replacement even for workers that are still employed and not directly touched by automation technologies yet. Table A6 in </span><a data-dcnode-id="1751" href="#pone.0242929.s001"><span data-dcnode-id="1752" instrument_node="">S1 File</span></a><span data-dcnode-id="1750" instrument_node=""> corroborates this interpretation by presenting first stage regressions in which we use two additional control variables that measure </span><em data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">fear of job loss</span></em><span data-dcnode-id="1747" instrument_node="">: (1) job loss worry (“To what extent are you worried about losing your job?”); (2) unemployed in five years (“Do you expect to be unemployed within the next five years?”). Both of these control variables are positive and significant in the regressions, indicating that fear of job loss (emotional reaction) and machine replacement (cognitive reaction) are closely related dimensions. Further, the inclusion of these additional control variables does not affect the size and significance of the estimated effect of the instrumental variable robot adoption on machine replacement.</span></p><span data-dcnode-id="1745" instrument_node="">
</span><a class="link-target" data-dcnode-id="1744" id="article1.body1.sec6.sec1.p3" name="article1.body1.sec6.sec1.p3"></a><p data-dcnode-id="1730"><span data-dcnode-id="1743" instrument_node="">What is the economic significance of these results? According to our OLS estimates (see column 2 in </span><a data-dcnode-id="1741" href="#pone-0242929-t004"><span data-dcnode-id="1742" instrument_node="">Table 4</span></a><span data-dcnode-id="1740" instrument_node="">), a one standard deviation increase in robot exposure increases the probability that a worker expresses fear of machine replacement by 2.6 percent (we thank an anonymous reviewer for suggesting to point this out). It is hard to say whether this estimated effect is economically sizeable. However, considering that robot adoption in Norway has more than doubled during the time span considered in this study, we may think that the overall effect of automation on fear of replacement has arguably been important during this period. It is also interesting to assess this figure in the light of the effects of robot adoption on employment found in other recent studies (although none of these present estimates of the effects of robot adoption on subjective fear of replacement). [</span><a class="ref-tip" data-dcnode-id="1738" href="#pone.0242929.ref034"><span data-dcnode-id="1739" instrument_node="">34</span></a><span data-dcnode-id="1737" instrument_node="">] find that one additional robot per thousand workers reduces the employment rate by 0.16–0.20 percentage points across European regions. In their study of the U.S. labor market, [</span><a class="ref-tip" data-dcnode-id="1735" href="#pone.0242929.ref022"><span data-dcnode-id="1736" instrument_node="">22</span></a><span data-dcnode-id="1734" instrument_node="">] find that one robot reduces employment by three workers. Further, [</span><a class="ref-tip" data-dcnode-id="1732" href="#pone.0242929.ref036"><span data-dcnode-id="1733" instrument_node="">36</span></a><span data-dcnode-id="1731" instrument_node="">] suggest that the corresponding number for German manufacturing workers is about two jobs. However, the overall effect on German employment is unchanged as the job reduction in manufacturing is offset by gains in the service sector.</span></p><span data-dcnode-id="1729" instrument_node="">
</span><a class="link-target" data-dcnode-id="1728" id="article1.body1.sec6.sec1.p4" name="article1.body1.sec6.sec1.p4"></a><p data-dcnode-id="1723"><span data-dcnode-id="1727" instrument_node="">Next, we look at the results for the other important variable considered in this study: workers’ skills. </span><a data-dcnode-id="1725" href="#pone-0242929-t004"><span data-dcnode-id="1726" instrument_node="">Table 4</span></a><span data-dcnode-id="1724" instrument_node=""> shows that individuals with tertiary education have on average a greater fear that some of their working tasks could be replaced by a machine in the future. As discussed in section 3, this might be explained by the fact that high-skilled workers are typically more educated individuals who read more and follow societal debates on the media about robots, AI and automation, and their negative consequences for employment. Hence, high skilled workers are arguably more exposed to peer effects, which may translate in a greater fear about the future of employment.</span></p><span data-dcnode-id="1722" instrument_node="">
</span><a class="link-target" data-dcnode-id="1721" id="article1.body1.sec6.sec1.p5" name="article1.body1.sec6.sec1.p5"></a><p data-dcnode-id="1704"><span data-dcnode-id="1720" instrument_node="">Relatedly, how do workers’ skills affect the positive relationship between automation and fear of replacement? To test this moderation effect, </span><a data-dcnode-id="1718" href="#pone-0242929-t005"><span data-dcnode-id="1719" instrument_node="">Table 5</span></a><span data-dcnode-id="1717" instrument_node=""> reports estimation results of the first stage equation by workers’ skill level. While the estimated coefficient of the robot adoption variable is positive and significant for both workers with tertiary education and those without a college degree, the size of this effect is larger for the latter group. This moderation effect is in line with the recent literature on the effects of automation on employment, which shows that low-skilled workers are more exposed to the risks of displacement from automation because they typically carry out routine tasks that can more easily be automated [</span><a class="ref-tip" data-dcnode-id="1715" href="#pone.0242929.ref003"><span data-dcnode-id="1716" instrument_node="">3</span></a><span data-dcnode-id="1714" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1712" href="#pone.0242929.ref004"><span data-dcnode-id="1713" instrument_node="">4</span></a><span data-dcnode-id="1711" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1709" href="#pone.0242929.ref016"><span data-dcnode-id="1710" instrument_node="">16</span></a><span data-dcnode-id="1708" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1706" href="#pone.0242929.ref020"><span data-dcnode-id="1707" instrument_node="">20</span></a><span data-dcnode-id="1705" instrument_node="">].</span></p><span data-dcnode-id="1703" instrument_node="">
</span><a class="link-target" data-dcnode-id="1702" id="pone-0242929-t005" name="pone-0242929-t005"></a><div class="figure" data-dcnode-id="1668" data-doi="10.1371/journal.pone.0242929.t005"><div class="img-box" data-dcnode-id="1698"><a data-dcnode-id="1700" data-doi="10.1371/journal.pone.0242929" data-uri="10.1371/journal.pone.0242929.t005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0242929.t005" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="1701" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0242929.t005&amp;raw"></a><div class="expand" data-dcnode-id="1699"></div></div><div class="figure-inline-download" data-dcnode-id="1677"><span data-dcnode-id="1697" instrument_node="">
          Download:
          </span><ul data-dcnode-id="1678"><li data-dcnode-id="1691"><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0242929.t005"><div class="definition-label" data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="1685"><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0242929.t005"><div class="definition-label" data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="1679"><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0242929.t005"><div class="definition-label" data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="1673"><span data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Table 5. </span></span><span data-dcnode-id="1674" instrument_node=""> First stage results by workers’ skill level.</span></div><p class="caption_target" data-dcnode-id="1672"></p><p class="caption_object" data-dcnode-id="1669"><a data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0242929.t005"><span data-dcnode-id="1671" instrument_node="">
              https://doi.org/10.1371/journal.pone.0242929.t005</span></a></p></div></div><span data-dcnode-id="1666" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1455" id="section2"><a class="link-target" data-dcnode-id="1665" id="sec017" name="sec017" title="Second stage results"></a><span data-dcnode-id="1664" instrument_node="">
</span><h3 data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Second stage results</span></h3><span data-dcnode-id="1661" instrument_node="">
</span><a class="link-target" data-dcnode-id="1660" id="article1.body1.sec6.sec2.p1" name="article1.body1.sec6.sec2.p1"></a><p data-dcnode-id="1638"><a data-dcnode-id="1658" href="#pone-0242929-t006"><span data-dcnode-id="1659" instrument_node="">Table 6</span></a><span data-dcnode-id="1657" instrument_node=""> reports estimation results for the second stage of the model (</span><a data-dcnode-id="1655" href="#pone.0242929.e002"><span data-dcnode-id="1656" instrument_node="">Eq 2</span></a><span data-dcnode-id="1654" instrument_node="">), in which job satisfaction is the dependent variable. The table reports first the results for the model without control variables and then those for the model including the full set of controls. The results for the two models are very close to each other, indicating that the inclusion of controls does not affect the results on the main explanatory variables [</span><a class="ref-tip" data-dcnode-id="1652" href="#pone.0242929.ref053"><span data-dcnode-id="1653" instrument_node="">53</span></a><span data-dcnode-id="1651" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1649" href="#pone.0242929.ref054"><span data-dcnode-id="1650" instrument_node="">54</span></a><span data-dcnode-id="1648" instrument_node="">]. The control variables that we use are commonly used in the job satisfaction literature. Income is positively correlated with job satisfaction, in line with extant literature showing that wage is one of the factors that enhance workers’ subjective well-being [</span><a class="ref-tip" data-dcnode-id="1646" href="#pone.0242929.ref007"><span data-dcnode-id="1647" instrument_node="">7</span></a><span data-dcnode-id="1645" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1643" href="#pone.0242929.ref008"><span data-dcnode-id="1644" instrument_node="">8</span></a><span data-dcnode-id="1642" instrument_node="">]. Female workers report on average higher job satisfaction than males; and individuals employed in manufacturing (industry) have lower satisfaction than average, a finding that is explained in the subjective well-being literature by the fact that factory workers typically carry out routine and monotonous working tasks and have a lower degree of autonomy and creativity [</span><a class="ref-tip" data-dcnode-id="1640" href="#pone.0242929.ref025"><span data-dcnode-id="1641" instrument_node="">25</span></a><span data-dcnode-id="1639" instrument_node="">].</span></p><span data-dcnode-id="1637" instrument_node="">
</span><a class="link-target" data-dcnode-id="1636" id="pone-0242929-t006" name="pone-0242929-t006"></a><div class="figure" data-dcnode-id="1597" data-doi="10.1371/journal.pone.0242929.t006"><div class="img-box" data-dcnode-id="1632"><a data-dcnode-id="1634" data-doi="10.1371/journal.pone.0242929" data-uri="10.1371/journal.pone.0242929.t006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0242929.t006" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="1635" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0242929.t006&amp;raw"></a><div class="expand" data-dcnode-id="1633"></div></div><div class="figure-inline-download" data-dcnode-id="1611"><span data-dcnode-id="1631" instrument_node="">
          Download:
          </span><ul data-dcnode-id="1612"><li data-dcnode-id="1625"><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0242929.t006"><div class="definition-label" data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="1619"><a data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0242929.t006"><div class="definition-label" data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="1613"><a data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0242929.t006"><div class="definition-label" data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="1607"><span data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Table 6. </span></span><span data-dcnode-id="1608" instrument_node=""> Second stage results.</span></div><p class="caption_target" data-dcnode-id="1605"><a class="link-target" data-dcnode-id="1606" id="article1.body1.sec6.sec2.table-wrap1.caption1.p1" name="article1.body1.sec6.sec2.table-wrap1.caption1.p1"></a></p><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">Dependent variable: Job satisfaction.</span></p><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1601"></p><p class="caption_object" data-dcnode-id="1598"><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0242929.t006"><span data-dcnode-id="1600" instrument_node="">
              https://doi.org/10.1371/journal.pone.0242929.t006</span></a></p></div><a class="link-target" data-dcnode-id="1596" id="article1.body1.sec6.sec2.p2" name="article1.body1.sec6.sec2.p2"></a><p data-dcnode-id="1588"><span data-dcnode-id="1595" instrument_node="">The main variable of interest in </span><a data-dcnode-id="1593" href="#pone-0242929-t006"><span data-dcnode-id="1594" instrument_node="">Table 6</span></a><span data-dcnode-id="1592" instrument_node=""> is machine replacement. The estimated coefficient for this variable is as expected negative and significant. This means that workers that report higher fear of replacement from smart machines have on average lower job satisfaction. As noted in section 3, the reason for this is that for workers that are currently employed, the prospect that smart machines could replace some of their current working tasks in the future, or even the whole job, does create uncertainty about future job prospects and personal finance, thus lowering job satisfaction. The marginal effects for each category of the job satisfaction variable (not reported in </span><a data-dcnode-id="1590" href="#pone-0242929-t006"><span data-dcnode-id="1591" instrument_node="">Table 6</span></a><span data-dcnode-id="1589" instrument_node="">) indicate that a change in the fear of replacement dummy variable (i.e. from “no fear” to “fear of replacement”) decreases the job satisfaction of the “very satisfied” workers by around 30%, and of the “very or pretty dissatisfied” workers by around 6–11%.</span></p><span data-dcnode-id="1587" instrument_node="">
</span><a class="link-target" data-dcnode-id="1586" id="article1.body1.sec6.sec2.p3" name="article1.body1.sec6.sec2.p3"></a><p data-dcnode-id="1578"><span data-dcnode-id="1585" instrument_node="">Table A7 in </span><a data-dcnode-id="1583" href="#pone.0242929.s001"><span data-dcnode-id="1584" instrument_node="">S1 File</span></a><span data-dcnode-id="1582" instrument_node=""> reports second stage regressions that also include two additional control variables that measure </span><em data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">fear of job loss</span></em><span data-dcnode-id="1579" instrument_node="">: (job loss worry; unemployed in five years; see definition of these two survey questions in section 6 above). The additional control variables are positive and significant in the regressions, and their inclusion in the model does not affect the size and significance of the estimated effect of machine replacement on job satisfaction, indicating that fear of replacement due to automation is important for workers’ subjective well-being even after controlling for the more general construct fear of job loss.</span></p><span data-dcnode-id="1577" instrument_node="">
</span><a class="link-target" data-dcnode-id="1576" id="article1.body1.sec6.sec2.p4" name="article1.body1.sec6.sec2.p4"></a><p data-dcnode-id="1556"><span data-dcnode-id="1575" instrument_node="">How is this relationship moderated by workers’ skill level? </span><a data-dcnode-id="1573" href="#pone-0242929-t007"><span data-dcnode-id="1574" instrument_node="">Table 7</span></a><span data-dcnode-id="1572" instrument_node=""> investigates this question by reporting marginal effects of the machine replacement variable for workers that have tertiary education </span><em data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">versus</span></em><span data-dcnode-id="1569" instrument_node=""> those that do not have a college degree. The table shows that the marginal effect for the workers without a college degree is negative and significant, indicating that fear of replacement increases the probability that low-educated workers will report high job satisfaction by nearly 50%. On the other hand, the corresponding marginal effect for the workers with a University degree is not statistically significant. Abeliansky and Beulmann [</span><a class="ref-tip" data-dcnode-id="1567" href="#pone.0242929.ref011"><span data-dcnode-id="1568" instrument_node="">11</span></a><span data-dcnode-id="1566" instrument_node="">] also carried out some regressions to study the relationships between automation and mental health for different educational groups (tertiary vs secondary education), but they did not find any significant difference among these groups of workers in Germany. As discussed in section 3, the interpretation of our finding is that low-skilled workers, if replaced, will on average have fewer possibilities to find another occupation in the labor market. This is in line with recent literature that provides evidence that displacement effects of industrial robots on employment and wages are stronger and more significant for low-education workers [</span><a class="ref-tip" data-dcnode-id="1564" href="#pone.0242929.ref020"><span data-dcnode-id="1565" instrument_node="">20</span></a><span data-dcnode-id="1563" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1561" href="#pone.0242929.ref022"><span data-dcnode-id="1562" instrument_node="">22</span></a><span data-dcnode-id="1560" instrument_node="">]. On the other hand, automation technologies can have more positive effects on high-skilled workers, increasing the demand for labor, wages and the complexity and interest of their tasks [</span><a class="ref-tip" data-dcnode-id="1558" href="#pone.0242929.ref018"><span data-dcnode-id="1559" instrument_node="">18</span></a><span data-dcnode-id="1557" instrument_node="">]. In short, we posit that workers are at least to some extent aware of the distinct impacts that automation can have for different types of occupations, and this explains why fear of replacement turns out to be a concern for low-skilled employees.</span></p><span data-dcnode-id="1555" instrument_node="">
</span><a class="link-target" data-dcnode-id="1554" id="pone-0242929-t007" name="pone-0242929-t007"></a><div class="figure" data-dcnode-id="1520" data-doi="10.1371/journal.pone.0242929.t007"><div class="img-box" data-dcnode-id="1550"><a data-dcnode-id="1552" data-doi="10.1371/journal.pone.0242929" data-uri="10.1371/journal.pone.0242929.t007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0242929.t007" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="1553" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0242929.t007&amp;raw"></a><div class="expand" data-dcnode-id="1551"></div></div><div class="figure-inline-download" data-dcnode-id="1529"><span data-dcnode-id="1549" instrument_node="">
          Download:
          </span><ul data-dcnode-id="1530"><li data-dcnode-id="1543"><a data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0242929.t007"><div class="definition-label" data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="1537"><a data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0242929.t007"><div class="definition-label" data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="1531"><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0242929.t007"><div class="definition-label" data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="1525"><span data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Table 7. </span></span><span data-dcnode-id="1526" instrument_node=""> Second stage results by workers’ skill level (marginal effects of machine replacement for workers of different education levels).</span></div><p class="caption_target" data-dcnode-id="1524"></p><p class="caption_object" data-dcnode-id="1521"><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0242929.t007"><span data-dcnode-id="1523" instrument_node="">
              https://doi.org/10.1371/journal.pone.0242929.t007</span></a></p></div><a class="link-target" data-dcnode-id="1519" id="article1.body1.sec6.sec2.p5" name="article1.body1.sec6.sec2.p5"></a><p data-dcnode-id="1508"><span data-dcnode-id="1518" instrument_node="">It may be argued that the education level dummy variables that we have used in these regressions only reflect formal education acquired through the school and University system, and disregards other skills that workers acquire during the working life through training, apprenticeships and learning by doing. Ideally, if we had information about each worker’s occupation, we could construct a proxy measure for skills by using the three-level job complexity schema developed by Hunter et. al. [</span><a class="ref-tip" data-dcnode-id="1516" href="#pone.0242929.ref055"><span data-dcnode-id="1517" instrument_node="">55</span></a><span data-dcnode-id="1515" instrument_node="">], which creates a correspondence between job types and corresponding skill content. However, our dataset does not have information about workers’ occupation type, and we are therefore not able to follow this route. Hence, in the absence of a more specific variable measuring workers’ skills, we carry out two additional exercises. First, we use age as an additional proxy of workers’ skills and abilities to perform their job. </span><a data-dcnode-id="1513" href="#pone-0242929-t008"><span data-dcnode-id="1514" instrument_node="">Table 8</span></a><span data-dcnode-id="1512" instrument_node=""> reports marginal effects of machine replacement on job satisfaction for workers of different education levels </span><em data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">and</span></em><span data-dcnode-id="1509" instrument_node=""> for different age groups. The results confirm the main finding noted above. The marginal effect of anticipated machine replacement on present job satisfaction of the workers without a college degree is negative and significant for all sub-groups (except those younger than 30), and it is not significant for workers with a University degree. This corroborates the main finding of our analysis that machine replacement has a negative effect on job satisfaction, and that this effect is particularly relevant for low-skilled workers.</span></p><span data-dcnode-id="1507" instrument_node="">
</span><a class="link-target" data-dcnode-id="1506" id="pone-0242929-t008" name="pone-0242929-t008"></a><div class="figure" data-dcnode-id="1472" data-doi="10.1371/journal.pone.0242929.t008"><div class="img-box" data-dcnode-id="1502"><a data-dcnode-id="1504" data-doi="10.1371/journal.pone.0242929" data-uri="10.1371/journal.pone.0242929.t008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0242929.t008" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="1505" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0242929.t008&amp;raw"></a><div class="expand" data-dcnode-id="1503"></div></div><div class="figure-inline-download" data-dcnode-id="1481"><span data-dcnode-id="1501" instrument_node="">
          Download:
          </span><ul data-dcnode-id="1482"><li data-dcnode-id="1495"><a data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0242929.t008"><div class="definition-label" data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="1489"><a data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0242929.t008"><div class="definition-label" data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="1483"><a data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0242929.t008"><div class="definition-label" data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="1477"><span data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Table 8. </span></span><span data-dcnode-id="1478" instrument_node=""> Second stage results by workers’ skill level and age (marginal effects of machine replacement for workers of different education levels and different age groups).</span></div><p class="caption_target" data-dcnode-id="1476"></p><p class="caption_object" data-dcnode-id="1473"><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0242929.t008"><span data-dcnode-id="1475" instrument_node="">
              https://doi.org/10.1371/journal.pone.0242929.t008</span></a></p></div><a class="link-target" data-dcnode-id="1471" id="article1.body1.sec6.sec2.p6" name="article1.body1.sec6.sec2.p6"></a><p data-dcnode-id="1457"><span data-dcnode-id="1470" instrument_node="">Second, it may be argued that the education variable does not only measure workers’ skills, but it is also a proxy for </span><em data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">employability</span></em><span data-dcnode-id="1467" instrument_node="">, since workers with higher education levels can more easily find a new job. If so, employability, rather than skills, could be the latent variable moderating the effect of fear of replacement on job satisfaction. To address this possibility, we make use of two additional variables measuring employability: (1) Difficult to find a new job (“How difficult or easy do you think it would be for you to find a job that is at least as good as the one you have now?”); (2) Insufficient skills in current job (“How often do you experience insufficient competence to perform your tasks?”). Then we include these two variables as additional controls in our first and second stage regressions, and report the results of these robustness tests in tables A8 to A10 in </span><a data-dcnode-id="1465" href="#pone.0242929.s001"><span data-dcnode-id="1466" instrument_node="">S1 File</span></a><span data-dcnode-id="1464" instrument_node="">. First stage results (Tables A8 and A9 in </span><a data-dcnode-id="1462" href="#pone.0242929.s001"><span data-dcnode-id="1463" instrument_node="">S1 File</span></a><span data-dcnode-id="1461" instrument_node="">) show that the inclusion of the additional controls for employability does not affect the main result about the effect of robot adoption on machine replacement, and that this effect is still stronger for workers with lower education level. Second stage results (Table A10 in </span><a data-dcnode-id="1459" href="#pone.0242929.s001"><span data-dcnode-id="1460" instrument_node="">S1 File</span></a><span data-dcnode-id="1458" instrument_node="">) are also in line with our baseline estimations: in the extended model specification that controls for employability, the effect of machine replacement on job satisfaction is still negative and significantfor workers of lower education level (across age groups). In short, these additional exercises show that, even when we control for employability, workers’ education level moderates the effect of fear of replacement on job satisfaction, and it may thus be considered as a reasonable proxy measure of latent workers’ skills.</span></p><span data-dcnode-id="1456" instrument_node="">
</span></div><span data-dcnode-id="1454" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1374" id="section3"><a class="link-target" data-dcnode-id="1453" id="sec018" name="sec018" title="Robustness tests"></a><span data-dcnode-id="1452" instrument_node="">
</span><h3 data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Robustness tests</span></h3><span data-dcnode-id="1449" instrument_node="">
</span><a class="link-target" data-dcnode-id="1448" id="article1.body1.sec6.sec3.p1" name="article1.body1.sec6.sec3.p1"></a><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Our identification strategy rests on the assumption that the (lagged) introduction of robots in local labor markets in Norway affects current job satisfaction only through its effects on workers’ fear of replacement. Although our regressions control for a set of relevant employee-level characteristics and include region- and time fixed effects, it is also useful to carry out some additional robustness exercises to test the potential confounding effects of omitted variables that may in principle affect both fear of replacement and the error term of the outcome equation.</span></p><span data-dcnode-id="1445" instrument_node="">
</span><a class="link-target" data-dcnode-id="1444" id="article1.body1.sec6.sec3.p2" name="article1.body1.sec6.sec3.p2"></a><p data-dcnode-id="1418"><span data-dcnode-id="1443" instrument_node="">Tables A11 and A12 in </span><a data-dcnode-id="1441" href="#pone.0242929.s001"><span data-dcnode-id="1442" instrument_node="">S1 File</span></a><span data-dcnode-id="1440" instrument_node=""> report estimation results of first and second stage regressions that include some additional region-level control variables in the model. The first two columns add region’s GDP and tertiary education level, which may be thought to be general relevant factors that may drive both the introduction of industrial robots and job satisfaction patterns. Though, the estimated coefficients of the instrumental variable robot adoption (Table A11 in </span><a data-dcnode-id="1438" href="#pone.0242929.s001"><span data-dcnode-id="1439" instrument_node="">S1 File</span></a><span data-dcnode-id="1437" instrument_node="">) and of the machine replacement variable (Table A12 in </span><a data-dcnode-id="1435" href="#pone.0242929.s001"><span data-dcnode-id="1436" instrument_node="">S1 File</span></a><span data-dcnode-id="1434" instrument_node="">) are still significant and stable after the introduction of these two possible confounding factors. Regressions in column 3 add a variable measuring business building broadband infrastructure in each region. The reason for including this variable is that ICT diffusion may be a potentially conflating factor that can disturb the effect of robots adoption on employment [</span><a class="ref-tip" data-dcnode-id="1432" href="#pone.0242929.ref003"><span data-dcnode-id="1433" instrument_node="">3</span></a><span data-dcnode-id="1431" instrument_node="">,</span><a class="ref-tip" data-dcnode-id="1429" href="#pone.0242929.ref037"><span data-dcnode-id="1430" instrument_node="">37</span></a><span data-dcnode-id="1428" instrument_node="">]. By controlling for broadband internet access in office buildings we address this concern, reasonably assuming that the development of broadband infrastructure is driven by policies and investments that are exogenous to the individual worker. Again, the inclusion of this additional control does not affect the estimated coefficient of the robot variable in Table A11 in </span><a data-dcnode-id="1426" href="#pone.0242929.s001"><span data-dcnode-id="1427" instrument_node="">S1 File</span></a><span data-dcnode-id="1425" instrument_node="">, and of the machine replacement variable in Table A12 in </span><a data-dcnode-id="1423" href="#pone.0242929.s001"><span data-dcnode-id="1424" instrument_node="">S1 File</span></a><span data-dcnode-id="1422" instrument_node="">. These coefficients still have the same signs and significance levels, and their estimated size is slightly larger than in baseline regressions. Finally, columns 4, 5 and 6 also add three other region-level controls: unemployment benefit recipients (share of population in each region), share of large companies in each region, and population size (log). The unemployment benefit variable controls for the possible confounding effect of different unemployment rates across regions. The share of large companies takes into account the fact that large firms do on average have a higher rate of introduction and use of industrial robots (see Tables A1 and A4 in </span><a data-dcnode-id="1420" href="#pone.0242929.s001"><span data-dcnode-id="1421" instrument_node="">S1 File</span></a><span data-dcnode-id="1419" instrument_node="">), so that employees in regions with a high share of large firms are potentially more exposed to the effects of automation. Finally, the population variable is a standard control for the size and density of the region, which may be related to the extent and intensity of peer effects that affect workers’ fear of replacement. However, the inclusion of these additional variables does not affect the main results for the explanatory variables of our interest.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><a class="link-target" data-dcnode-id="1416" id="article1.body1.sec6.sec3.p3" name="article1.body1.sec6.sec3.p3"></a><p data-dcnode-id="1408"><span data-dcnode-id="1415" instrument_node="">As a further robustness test, Table A13 in </span><a data-dcnode-id="1413" href="#pone.0242929.s001"><span data-dcnode-id="1414" instrument_node="">S1 File</span></a><span data-dcnode-id="1412" instrument_node=""> reports the results of a placebo test that adds a lead variable–robust exposure at year </span><em data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">t+1</span></em><span data-dcnode-id="1409" instrument_node=""> –to the set of regressors in the first stage equation (including also the three additional region-level control variables noted in the previous paragraph). In these placebo regressions, the future robot adoption variable is not significant, and its inclusion does not affect the sign and size of the estimated coefficient of the instrumental variable (lagged pace of robot adoption). This further rules out the possibility that our results are driven by some omitted variables that are related to both job satisfaction and robot adoption.</span></p><span data-dcnode-id="1407" instrument_node="">
</span><a class="link-target" data-dcnode-id="1406" id="article1.body1.sec6.sec3.p4" name="article1.body1.sec6.sec3.p4"></a><p data-dcnode-id="1392"><span data-dcnode-id="1405" instrument_node="">Next, it is interesting to consider the question on whether our instrumental variable (pace of robot adoption in industry-regions) should be regarded as a </span><em data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">peer effect</span></em><span data-dcnode-id="1402" instrument_node=""> or rather a </span><em data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">neighbor effect</span></em><span data-dcnode-id="1399" instrument_node="">. Table A14 (in </span><a data-dcnode-id="1397" href="#pone.0242929.s001"><span data-dcnode-id="1398" instrument_node="">S1 File</span></a><span data-dcnode-id="1396" instrument_node="">) considers this question by including two additional control variables in the first stage regressions. The first additional control is robot adoption in the other three industries in the same region; and the second one is robot adoption in the same industry in all other regions in Norway. In other words, these two additional controls are proxies for inter-industry and inter-regional neighboring effects, respectively. Table A14 in </span><a data-dcnode-id="1394" href="#pone.0242929.s001"><span data-dcnode-id="1395" instrument_node="">S1 File</span></a><span data-dcnode-id="1393" instrument_node=""> shows that none of these variables are significantly correlated with fear of replacement, and their inclusion does not affect the precision of the instrumental variable (robot adoption in a given industry-region). These robustness exercises provide further evidence that our instrumental variable catches peer effects that are specific to each industry-region, and that hold even after controlling for neighbor effects related to robot adoption in surrounding regions and industries in Norway.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><a class="link-target" data-dcnode-id="1390" id="article1.body1.sec6.sec3.p5" name="article1.body1.sec6.sec3.p5"></a><p data-dcnode-id="1376"><span data-dcnode-id="1389" instrument_node="">Finally, it is relevant to comment further on the role of one of the control variables in the model: union membership. As noted in relation to </span><a data-dcnode-id="1387" href="#pone-0242929-t004"><span data-dcnode-id="1388" instrument_node="">Table 4</span></a><span data-dcnode-id="1386" instrument_node=""> (and other first stage results reported in the online appendix), workers that belong to a trade union do on average report lower fear of machine replacement. This may suggest that workers in trade unions feel they are more protected from the impacts of industrial robots. However, this pattern is in contrast with Acemoglu and Restrepo [</span><a class="ref-tip" data-dcnode-id="1384" href="#pone.0242929.ref044"><span data-dcnode-id="1385" instrument_node="">44</span></a><span data-dcnode-id="1383" instrument_node="">], which find a positive association between industrial robot adoption and unionization rates across countries, arguing that this is due to the fact that unionization may raise labor costs. Yet, skill-biased technical change also creates a stronger incentive for deunionization because the outside employment and wage options of skilled workers have improved [</span><a class="ref-tip" data-dcnode-id="1381" href="#pone.0242929.ref056"><span data-dcnode-id="1382" instrument_node="">56</span></a><span data-dcnode-id="1380" instrument_node="">]. To investigate this further, we run additional regressions in which we interact our two main explanatory variables (robot adoption in the first stage, and machine replacement in the second stage) with the union membership variable. The idea is to test directly whether Norwegian workers that belong to a trade union do on average think that they are less likely to be affected by automation. However, the results of these re
