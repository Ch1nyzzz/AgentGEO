</span><section class="grid grid-cols-12 py-6 md:py-12 col-span-12 lg:col-span-8 lg:col-start-3" data-dcnode-id="1164"><span data-dcnode-id="1857" instrument_node="">

</span><img alt="Automation and Job Loss Statistics: The Robots Are Coming Image" class="max-w-full mx-auto pb-8 sm:inline-block hidden lazy entered loading" data-dcnode-id="1855" data-ll-status="loading" height="473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trinity-core.s3.us-west-1.amazonaws.com/fortunly/45/automation-job-loss-statistics.jpg&amp;raw" width="710"><span data-dcnode-id="1854" instrument_node="">

</span><section class="" data-dcnode-id="1774"><span data-dcnode-id="1852" instrument_node="">
</span><div class="grid grid-cols-12 gap-6" data-dcnode-id="1776"><span data-dcnode-id="1851" instrument_node="">
</span><div class="col-span-12" data-dcnode-id="1778"><span data-dcnode-id="1850" instrument_node="">
</span><div class="content content-section" data-dcnode-id="1780"><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1845"><span data-dcnode-id="1846" style="color: #2baa19;"><em data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Employment in the buggy-whip industry is about 0%.</span></em></span></p><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">That’s the example economists cite when they talk about technology and employment. As automobiles replaced horses, industries based on the old order shut down. The Industrial Revolution left millions unemployed, their jobs rendered obsolete by machines.</span></p><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1836"><span data-dcnode-id="1840" instrument_node="">Economists agree that </span><a data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fortunly.com/statistics/job-cuts-statistics/"><span data-dcnode-id="1839" instrument_node="">new technologies can create a large wave of short-term unemployment</span></a><span data-dcnode-id="1837" instrument_node="">.</span></p><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">They agree that some jobs disappear forever, what they refer to as “displacement.” Workers in obsolete industries find jobs, if they can, in emergent fields related to the new technology.</span></p><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">Economists do not agree about the long-term automation and job loss statistics. Some say new technology always creates abundant jobs for workers with the proper training. Others aren’t so sure.</span></p><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Today, automation, artificial intelligence, and a worldwide digital communications network serve as an empowering platform for unprecedented innovation. More inexpensive goods, less tedious work, and previously unimaginable levels of personalization are just some of the ways our lives are likely to improve through the sheer power of technology.&nbsp;</span></p><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Nevertheless, this unprecedented new age of progress also heralds a period of great challenges and uncertainty, especially when it comes to employment.</span></p><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1818"><span data-dcnode-id="1822" instrument_node="">Millions of jobs in America have been lost recently, lost never to return due to automation. The robots are responsible for a larger chunk of </span><a data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fortunly.com/statistics/us-gdp-by-year-guide/"><span data-dcnode-id="1821" instrument_node="">US GDP</span></a><span data-dcnode-id="1819" instrument_node=""> each year. And the eye of the storm is not yet upon us.&nbsp;</span></p><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">What can we expect?</span></p><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Read on.</span></p><span data-dcnode-id="1811" instrument_node="">
</span><h2 data-dcnode-id="1809" id="key-automation-job-loss-stats-editor-s-choice"><span data-dcnode-id="1810" instrument_node="">Key Automation Job Loss Stats - Editor’s Choice</span></h2><span data-dcnode-id="1808" instrument_node="">
</span><ul class="bullet-list editors-choice py-8 pl-0 md:pl-6" data-dcnode-id="1782"><span data-dcnode-id="1807" instrument_node="">
</span><li data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">37% of workers are worried about losing their jobs due to automation.</span></li><span data-dcnode-id="1804" instrument_node="">
</span><li data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">The number of industrial robot jobs increases by 14% each year.</span></li><span data-dcnode-id="1801" instrument_node="">
</span><li data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">More than 70% of people are willing to augment their brains and bodies in order to improve their employment prospects.</span></li><span data-dcnode-id="1798" instrument_node="">
</span><li data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Three industries facing the highest risk of automation are transportation, storage, and manufacturing.</span></li><span data-dcnode-id="1795" instrument_node="">
</span><li data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">By 2022, the total task hours completed by humans will drop by 13%.</span></li><span data-dcnode-id="1792" instrument_node="">
</span><li data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Robots could displace 20 million manufacturing jobs by 2030.</span></li><span data-dcnode-id="1789" instrument_node="">
</span><li data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Generation Z is at the highest risk of being displaced due to automation.</span></li><span data-dcnode-id="1786" instrument_node="">
</span><li data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">33% of new jobs in the United States are for occupations that did not exist 25 years ago.</span></li><span data-dcnode-id="1783" instrument_node="">
</span></ul><span data-dcnode-id="1781" instrument_node="">

</span><section class="" data-dcnode-id="1492"><span data-dcnode-id="1737" instrument_node="">
</span><div class="grid grid-cols-12 gap-6" data-dcnode-id="1494"><span data-dcnode-id="1736" instrument_node="">
</span><div class="col-span-12" data-dcnode-id="1496"><span data-dcnode-id="1735" instrument_node="">
</span><div class="content content-section" data-dcnode-id="1498"><span data-dcnode-id="1734" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1732" id="more-than-25-of-jobs-in-the-us-are-experiencing-high-levels-of-disruption-due-to-automation"><span data-dcnode-id="1733" instrument_node="">More than 25% of jobs in the US are experiencing high levels of disruption due to automation.</span></h4><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" style="color: #2baa19;"><span data-dcnode-id="1730" instrument_node="">(Brookings Institution)</span></span></p><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">This figure amounted to 36 million jobs in 2016, with more than 70% at high risk of being replaced by automation. The same research on jobs at risk of automation found that 36% of American workers face medium-level exposure to these disruptive technologies by 2030, while 39% - or 57 million jobs - will face low-level exposure.&nbsp;</span></p><span data-dcnode-id="1724" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1722" id="37-of-workers-are-worried-about-losing-their-jobs-directly-because-of-automation"><span data-dcnode-id="1723" instrument_node="">37% of workers are worried about losing their jobs directly because of automation.</span></h4><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" style="color: #2baa19;"><span data-dcnode-id="1720" instrument_node="">(PricewaterhouseCoopers)</span></span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Statistics on automation show an increasingly worried workforce as the number of people worried about losing their jobs due to technological advancements increased by 3% compared to 2014. Innovations in AI and robotics suggest that it is not only the uneducated who are at risk of being displaced. Every job is at risk. However, the same research found that 73% of workers believed that technology could never replace the human mind.</span></p><span data-dcnode-id="1714" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1712" id="the-number-of-operational-industrial-robot-jobs-increases-by-14-annually"><span data-dcnode-id="1713" instrument_node="">The number of operational industrial robot jobs increases by 14% annually.</span></h4><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1709" style="color: #2baa19;"><span data-dcnode-id="1710" instrument_node="">(International Federation of Robotics)</span></span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">One of the most visible ways that automation impacts jobs is the ever-increasing reliance on robots for industrial work. In 2016, the number of industrial robots was 1.83 million. Experts expect that figure to grow to 3.05 million in 2020. The statistics indicate that new innovations are speeding up this trend, and that we are very likely going to see an even more drastic yearly increase in the robot workforce.</span></p><span data-dcnode-id="1704" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1702" id="almost-70-of-workers-believe-that-automation-will-offer-them-an-opportunity-to-qualify-for-more-highly-skilled-work"><span data-dcnode-id="1703" instrument_node="">Almost 70% of workers believe that automation will offer them an opportunity to qualify for more highly skilled work.</span></h4><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1699" style="color: #2baa19;"><span data-dcnode-id="1700" instrument_node="">(International Federation of Robotics)</span></span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">A survey by the International Federation of Robotics found that even as the number of jobs eliminated by automation rises, people remain optimistic about potential benefits. Of 7,000 surveyed workers, almost 70% expressed hope about higher-skilled employment.</span></p><span data-dcnode-id="1694" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1692" id="57-of-employers-say-that-the-main-goal-of-automation-is-the-augmentation-of-worker-performance-and-productivity"><span data-dcnode-id="1693" instrument_node="">57% of employers say that the main goal of automation is the augmentation of worker performance and productivity.</span></h4><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1689" style="color: #2baa19;"><span data-dcnode-id="1690" instrument_node="">(Willis Towers Watson)</span></span></p><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1686" instrument_node="">While there is a prevalent belief and more than a little evidence that business owners are shifting toward automated technologies and innovations just to replace expensive human workers, the truth may be quite different. In fact, analyses of automation and job loss show that most employers wish new technologies to support their workers in completing </span><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fortunly.com/business/best-business-plan-software/"><span data-dcnode-id="1685" instrument_node="">business processes</span></a><span data-dcnode-id="1683" instrument_node="">, with only 11% looking to automate their operations to a great extent. The research found that 15% of employers invest in automation in order to reduce risks and avoid mistakes.</span></p><span data-dcnode-id="1681" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1679" id="more-than-70-of-people-would-be-willing-to-augment-their-bodies-and-brains-in-order-to-improve-their-employment-prospects"><span data-dcnode-id="1680" instrument_node="">More than 70% of people would be willing to augment their bodies and brains in order to improve their employment prospects.</span></h4><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1675"><span data-dcnode-id="1676" style="color: #2baa19;"><span data-dcnode-id="1677" instrument_node="">(PricewaterhouseCoopers)</span></span></p><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">The impact of automation on employment will not only mean losing jobs to a robotic threat, but will also bring us face-to-face with a completely different issue: Our jobs will increasingly depend on our willingness to augment our bodies and brains to stay competitive.</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">&nbsp;With many people already willing to fuse with machines in one way or another, it is clear how powerful our drive to keep the edge really is.</span></p><span data-dcnode-id="1668" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1666" id="transportation-storage-and-manufacturing-industries-face-the-highest-risk-of-automation"><span data-dcnode-id="1667" instrument_node="">Transportation, storage, and manufacturing industries face the highest risk of automation.</span></h4><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" style="color: #2baa19;"><span data-dcnode-id="1664" instrument_node="">(PricewaterhouseCoopers)</span></span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Research on job loss due to automation from 2017 suggests that automation will happen in three overlapping waves that will have different levels of impact on different industries. That is why some branches of the economy, like financial services, will face a bigger threat from the algorithm wave, for instance, as advanced algorithms are bound to outperform humans on pure data analysis.&nbsp;</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Other industries, especially transportation and storage, are at the top of the list because they face huge impact from the augmentation wave and the autonomy wave.&nbsp;</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">The same goes for manufacturing. The construction industry follows at third place, while industries like education and social work stand firmly at the bottom of the list, making them the least likely to face significant automation job displacement.</span></p><span data-dcnode-id="1652" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1650" id="artificial-intelligence-alone-is-expected-to-have-a-15-7-trillion-economic-impact-by-2030"><span data-dcnode-id="1651" instrument_node="">Artificial intelligence alone is expected to have a $15.7 trillion economic impact by 2030.</span></h4><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" style="color: #2baa19;"><span data-dcnode-id="1648" instrument_node="">(PricewaterhouseCoopers)</span></span></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Research shows that AI will have a big impact on the GDP of countries like China and the United States. China’s GDP is expected to grow by an astonishing 26% due to AI, while North America faces a potential 14% boost. Almost half of these economic gains will come from product enhancements, experts say. It is projected that AI taking jobs away from humans will drive product variety, with increased attractiveness, personalization and affordability.&nbsp;</span></p><span data-dcnode-id="1642" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1640" id="the-automation-potential-for-jobs-that-require-less-than-a-bachelor-s-degree-is-55"><span data-dcnode-id="1641" instrument_node="">The automation potential for jobs that require less than a bachelor’s degree is 55%.</span></h4><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1637" style="color: #2baa19;"><span data-dcnode-id="1638" instrument_node="">(Brookings Institution)</span></span></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1634" instrument_node="">Over the next decade, in-house manual production and office administration jobs will continue to face the most risk due to </span><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fortunly.com/statistics/outsourcing-statistics/"><span data-dcnode-id="1633" instrument_node="">outsourcing</span></a><span data-dcnode-id="1631" instrument_node=""> or automation. Positions that don’t require a bachelor’s degree are almost at double the risk of occupations that do. Only 24% of those jobs are likely to be automated, while occupational groups like food preparation and serving could face disruption of up to 80%. Automation job loss statistics show these jobs in stark contrast to jobs that require higher levels of education such as engineering and financial operations. Only about 14% of those jobs are projected to disappear in the short term.</span></p><span data-dcnode-id="1629" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1627" id="america-s-heartland-states-face-the-greatest-levels-of-risk-due-to-automation"><span data-dcnode-id="1628" instrument_node="">America’s heartland states face the greatest levels of risk due to automation.</span></h4><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1624" style="color: #2baa19;"><span data-dcnode-id="1625" instrument_node="">(Brookings Institution)</span></span></p><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Just as the IT boom was mostly confined to big-city states on the coasts, so automation is likely to be bring employment opportunities to displaced educated workers on on the east and west coasts. States in the heart of the US are at the highest risk of losing jobs due to automation. The biggest problem these places have is that in some, only 25% of adults hold bachelor’s degrees. This automatically puts them at high risk of being disrupted by automation, especially considering that heartland states rely heavily on industries like manufacturing, agriculture and transportation.&nbsp;</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">To better illustrate the threat, the statistics on projected job loss due to automation in some rural parts of Alabama, Arkansas, and other states show that these places face potential risks of up to 64.4%. This is in stark contrast to metropolitan places with more highly educated employees. They face disruption rates below 31.6%.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1614" id="by-the-early-2020s-the-share-of-jobs-at-potential-high-risk-of-automation-will-be-around-3"><span data-dcnode-id="1615" instrument_node="">By the early 2020s, the share of jobs at potential high risk of automation will be around 3%.</span></h4><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" style="color: #2baa19;"><span data-dcnode-id="1612" instrument_node="">(PricewaterhouseCoopers)</span></span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Data and statistics on job loss to automation show that the early 2020s will not carry with them a high increase in job automation. This trend will skyrocket, however, toward the second part of the decade. Researchers say the risk will rise to 20% by 2030. Researchers say there will be a second rise to 30% by 2035, and that the automation risk will begin to plateau after that.&nbsp;</span></p><span data-dcnode-id="1606" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1604" id="by-2022-the-total-task-hours-completed-by-humans-will-drop-by-13"><span data-dcnode-id="1605" instrument_node="">By 2022, the total task hours completed by humans will drop by 13%.</span></h4><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1601" style="color: #2baa19;"><span data-dcnode-id="1602" instrument_node="">(World Economic Forum)</span></span></p><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Job loss to automation statistics&nbsp;suggest that 71% of total task-hours are currently completed by humans, compared to 29% that are done by machines. The study predicts that if current trends continue, in just four years the average will shift to 58% completed by humans and 42% by machines.&nbsp;</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Advanced algorithms will see an especially significant increase in specific tasks like information and data processing, while also taking over a percentage of tasks that are still overwhelmingly human, like decision making, communicating, and coordinating.</span></p><span data-dcnode-id="1593" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1591" id="almost-24-of-jobs-that-are-held-by-men-are-at-high-risk-of-automation-compared-to-17-held-by-women"><span data-dcnode-id="1592" instrument_node="">Almost 24% of jobs that are held by men are at high risk of automation, compared to 17% held by women.</span></h4><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" style="color: #2baa19;"><span data-dcnode-id="1589" instrument_node="">(Brookings Institution)</span></span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">When it comes to the percentage of jobs at risk of automation, men face tougher odds. That’s because they are overrepresented in some of the most high-risk occupations. For example, men represent 70% of production jobs and more than 80% of transport workers.&nbsp;</span></p><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">In areas like construction and installation these numbers go well above 90%, indicating that in the long term men will be facing at least a slightly bigger issue with automation. Women are guarded by the fact that they represent 70% of the labor force in relatively safe occupations like education and health care, which are among the low-risk jobs in the coming decades.</span></p><span data-dcnode-id="1580" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1578" id="the-youngest-workers-are-at-the-highest-risk-of-being-displaced-due-to-automation"><span data-dcnode-id="1579" instrument_node="">The youngest workers are at the highest risk of being displaced due to automation.</span></h4><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1575" style="color: #2baa19;"><span data-dcnode-id="1576" instrument_node="">(Brookings Institution)</span></span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Job loss due to automation statistics from the last year indicate that the workers aged 16 to 24 are at a 49% average automation exposure, putting them ahead of their older counterparts. Workers aged 25-54 have a 40% task automation potential, which is about the same percentage that workers age 55-64 face.</span></p><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">What’s making the youngest workers so disproportionately affected is that they are overrepresented in highly repetitive jobs like food service and preparation. To put it in perspective: People aged 16 to 24 are 9% of the overall workforce in America, but they represent 29% of all workers in the food preparation and service industry.</span></p><span data-dcnode-id="1567" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1565" id="about-33-of-new-jobs-created-in-the-united-states-are-for-occupations-that-did-not-exist-or-barely-existed-25-years-ago"><span data-dcnode-id="1566" instrument_node="">About 33% of new jobs created in the United States are for occupations that did not exist or barely existed 25 years ago.</span></h4><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1562" style="color: #2baa19;"><span data-dcnode-id="1563" instrument_node="">(McKinsey &amp; Co.)</span></span></p><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Historical data on jobs replaced by automation has shown that innovation doesn’t necessarily impact productivity and jobs negatively. In fact, most years since 1929 have seen gains in productivity and employment. What troubles economists is the fact that modern automation can prove to be substantially different from historical technological disruptions, so different that 48% believe that new technologies will displace more jobs than they create by 2025.</span></p><span data-dcnode-id="1557" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1555" id="by-the-year-2022-more-than-54-of-workers-will-require-significant-re-skilling-or-upskilling"><span data-dcnode-id="1556" instrument_node="">By the year 2022, more than 54% of workers will require significant re-skilling or upskilling.</span></h4><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" style="color: #2baa19;"><span data-dcnode-id="1553" instrument_node="">(World Economic Forum)</span></span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Technological disruptions will not be limited to automation replacing jobs that are currently performed by humans. Most of the remaining workers will need significant training to stay productive and employable in the new world. Of 54% of workers that will need their skills upgraded or relearned, some 35% are expected to require 6 months of training. Nine percent of workers will require training that lasts 6 to 12 months, and 10% will require more than a year of training.</span></p><span data-dcnode-id="1547" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1545" id="robots-could-displace-20-million-manufacturing-jobs-by-2030"><span data-dcnode-id="1546" instrument_node="">Robots could displace 20 million manufacturing jobs by 2030.</span></h4><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1542" style="color: #2baa19;"><span data-dcnode-id="1543" instrument_node="">(Oxford Economics)</span></span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Job loss due to automation statistics from 2019 demonstrate that each industrial robot is on average replacing 1.6 human workers, meaning that the number of displaced workers could reach tens of millions in the coming decade. Data also suggests that low-income regions of the world are going to feel the impact of automation in manufacturing much more than average and high-income areas.</span></p><span data-dcnode-id="1537" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1535" id="in-2018-sales-of-medical-robots-increased-by-48-compared-to-the-year-before"><span data-dcnode-id="1536" instrument_node="">In 2018, sales of medical robots increased by 48% compared to the year before.</span></h4><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" style="color: #2baa19;"><span data-dcnode-id="1533" instrument_node="">(Oxford Economics)</span></span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Population data indicates that we are living in a civilization that’s increasingly growing older. In fact, it is estimated that by the year 2050, the percentage of 60-year olds will go from 12% to 22%. Robots taking over jobs in the medical field will alleviate some of the issues that plague an aging population. Robots are expected to take over some of the tasks in hospitals, clinics, and assisted living homes, and sales are already increasing year over year. By the end of 2018, the total sales of medical robots amounted to $1.9 billion.</span></p><span data-dcnode-id="1527" instrument_node="">
</span><h4 class="numbered" data-dcnode-id="1525" id="it-is-estimated-that-automation-can-accelerate-the-productivity-of-the-global-economy-by-1-4-of-global-gdp-annually"><span data-dcnode-id="1526" instrument_node="">It is estimated that automation can accelerate the productivity of the global economy by 1.4% of global GDP annually.</span></h4><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" style="color: #2baa19;"><span data-dcnode-id="1523" instrument_node="">(McKinsey &amp; Co.)</span></span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Jobs lost to automation statistics from three years ago show that automation is a powerful tool that countries can use to increase their overall productivity, but only if the displaced human workers re-enter the workforce. It is believed that automation alone will not be enough to sustain long-term economic growth.&nbsp;</span></p><span data-dcnode-id="1517" instrument_node="">
</span><h3 data-dcnode-id="1515" id="sailing-into-the-brave-new-world"><span data-dcnode-id="1516" instrument_node="">Sailing Into The Brave New World</span></h3><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">There is no doubt that automation is a powerful force for change and that it is already reshaping the world. Each technological leap has brought huge disruptions to the way the economy works and the types of jobs that people do. And the coming revolution promises to be bigger and more disruptive than any that came before.</span></p><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">The age of robotics and artificial intelligence could bring a catastrophic crisis due to automation job loss fallout, but it also presents an incredible opportunity to create a better life for everyone.</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">The worker of the future will increasingly be required to have knowledge in areas like programming and design as our place in the workforce moves from manual labor into positions that require more critical thinking and planning.&nbsp;</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Job loss to automation statistics we collected show that our competitive nature will play a big part in the fusion of machines and humans. A vast majority of people already admit that they would willingly use technology to improve their brains and bodies just to keep the edge with the competition, and that number is sure to increase as we move forward.</span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">All of this means that by 2050 our world is likely to look much different. We get to decide how human workers will fit into that world, and it is imperative that we choose wisely.</span></p><span data-dcnode-id="1499" instrument_node="">
</span></div><span data-dcnode-id="1497" instrument_node="">
</span></div><span data-dcnode-id="1495" instrument_node="">
