</span><h2 class="page-title" data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Salesforce Military Partnership</span></h2><span data-dcnode-id="471" instrument_node="">
</span><span data-dcnode-id="469" instrument_node="">
</span><h2 data-dcnode-id="466"><strong data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">VHA partnership with Salesforce supports Veterans transitioning into civilian workforce and their spouses</span></strong></h2><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">A developing partnership between the Veterans Health Administration (VHA) and Salesforce, Inc. (Salesforce), will leverage the resources and reach of VHA and the Salesforce Military community to support Veterans and their spouses. &nbsp;Salesforce Military, Salesforce’s workforce development program for Veterans and military spouses, supports them through their transition out of active duty and into the civilian workforce. VHA and Salesforce Military aim to help Veterans learn more about the benefits and services they may be eligible for and can help connect Veterans to skill development, career advancement, and employment resources. Together, VHA and Salesforce Military are collaborating to help Veterans during this time of transition across multiple social determinants of health (SDOH).</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">SDOH are conditions in the environments in which people live, learn, work, play, worship, and age that affect a wide range of health, functioning, and quality-of-life outcomes and risks.&nbsp; The partnership between VHA and Salesforce aims to support Veterans across SDOH such as economic stability, employment, health literacy, and both physical and mental health. The partnership will also help provide Veterans who may not already be enrolled in VHA and their spouses with information and resources about suicide prevention.</span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Since its launch in 2014, Salesforce Military has provided military personnel, Veterans, and their spouses with free training in high-demand technology skills and certifications to help them land meaningful careers. These benefits are numerous, and Salesforce currently provides these groups with:</span></p><span data-dcnode-id="456" instrument_node="">
</span><ul data-dcnode-id="445"><span data-dcnode-id="455" instrument_node="">
</span><li data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Free virtual, self-paced training for Veterans and their spouses through the Trailhead program;</span></li><span data-dcnode-id="452" instrument_node="">
</span><li data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Free vouchers for Salesforce classes and certification exams; and</span></li><span data-dcnode-id="449" instrument_node="">
</span><li data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Free access to a network of companies committed to hiring Veterans and spouses of Veterans.</span></li><span data-dcnode-id="446" instrument_node="">
</span></ul><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">The non-monetary partnership between VHA and Salesforce also will help Veterans and their spouses not familiar with VHA learn about VHA service and benefit eligibility. Those enrolled in Salesforce Military will be able to read more about VA services and benefits and will find direct links to the VA website where they can get more details and, if they have not already, start the enrollment process.</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">"At Salesforce, we know that Veterans and military spouses offer unique skills that make them exemplary employees," said Ann Weeby, head of Salesforce Military. "Especially now in this time of uncertainty, it is more important than ever for this partnership between Salesforce Military and the VHA to help equip Veterans and military spouses with new high-demand technical skills and the support to land meaningful employment, as well as share valuable resources for the health and safety of the military community.”</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Salesforce Military will also provide direct links to VA resources and information about suicide prevention, like how Veterans, their spouses, and employers can help to reduce the risk for suicide in their homes, businesses, and communities. By helping to increase access information about suicide prevention, VHA and Salesforce Military hope to reach more Veterans and the community of Veteran supporters to help reduce Veteran suicides.</span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">“The Salesforce Military program aligns with VA’s mission of serving Veterans by providing free training and career development support to both Veterans and their spouses. VHA is excited to be partnering with Salesforce to help Veterans and their spouses achieve their economic, career, and health goals, and hopefully reach more Veterans who don’t engage with VHA and may be at higher risk for negative health outcomes,” said Christine Eickhoff, a health system specialist for VHA’s National Center for Healthcare Advancement and Partnerships (HAP, formerly known as the Office of Community Engagement). “This partnership comes at a time when many Veterans need support across social determinants of health like employment and economic stability and we are excited to work with our community partners to help Veterans overcome challenges and achieve their goals.”</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">HAP supports partnerships such as this one to ensure better health outcomes for Veterans. The mission of the office is to serve as a trusted resource and a catalyst for the growth of effective partnerships at the national, state, and community level and as a facilitator and access point for public and private entities interested in partnering with VHA to benefit Veterans, their families, caregivers, and survivors.</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">“Partnerships like the one with Salesforce are crucial for raising awareness about VHA services and to improve access to SDOH, which impact the health and well-being of our nation’s heroes,” said Dr. Tracy Weistreich, nurse executive of HAP.</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="425" instrument_node="">To learn more about resources offered through Salesforce Military, visit </span><a data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//veterans.force.com/" target="_blank"><span data-dcnode-id="424" instrument_node="">https://veterans.force.com</span></a><span data-dcnode-id="422" instrument_node="">.</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="419" instrument_node="">To learn more about HAP, visit </span><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.va.gov/healthpartnerships/" target="_blank"><span data-dcnode-id="418" instrument_node="">https://www.va.gov/healthpartnerships/</span></a><span data-dcnode-id="416" instrument_node="">.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="410" style="font-size: 0.9em; padding-top: 8px; border-top: 1px solid #CCC;"><strong data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">External Link Disclaimer:</span></strong><span data-dcnode-id="411" instrument_node=""> This page contains links that will take you outside of the Department of Veterans Affairs website. VA does not endorse and is not responsible for the content of the linked websites.</span></p><span data-dcnode-id="409" instrument_node="">
