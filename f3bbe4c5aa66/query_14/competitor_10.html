</span><h2 class="page-title" data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">OnStar Partnership</span></h2><span data-dcnode-id="465" instrument_node="">
</span><span data-dcnode-id="463" instrument_node="">
</span><h2 data-dcnode-id="460"><strong data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">VHA partners with OnStar to prevent Veteran suicide</span></strong></h2><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">A Veteran’s potential death by suicide, prevented by quick thinking and an in-vehicle safety and security system, resulted in a partnership that could help save Veterans’ lives.</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Veterans Health Administration Health Systems Specialist Dr. Jamie Davis was working with a Veteran who reported that her spouse, also a Veteran, was out driving and reported that he did not want to live.</span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="452" instrument_node="">“He wouldn’t tell her where he was, go to the VA, or meet her anywhere,” said Dr. Davis. “When asked about locating him through her phone’s GPS, she said his car was </span><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onstar.com/us/en/home/" target="_blank"><span data-dcnode-id="451" instrument_node="">OnStar</span></a><span data-dcnode-id="449" instrument_node="">-equipped. We called OnStar, and police were able to coordinate with OnStar to locate him and bring him in safely for an evaluation.”</span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="446" instrument_node="">The story’s happy ending inspired Dr. Davis to contact OnStar to develop an official partnership with VHA after she joined the </span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.va.gov/HEALTHPARTNERSHIPS/index.asp" target="_blank"><span data-dcnode-id="445" instrument_node="">Office of Community Engagement</span></a><span data-dcnode-id="443" instrument_node=""> (OCE). OCE facilitates and manages nonmonetary partnerships with nongovernmental organizations to improve the quality of life for Veterans, their families, caregivers, and survivors.</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="440" instrument_node="">The partnership, which </span><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.va.gov/opa/pressrel/pressrelease.cfm%3Fid%3D5502" target="_blank"><span data-dcnode-id="439" instrument_node="">became official</span></a><span data-dcnode-id="437" instrument_node=""> this year, will help connect Veterans in crisis with mental health assistance by using OnStar’s in-vehicle emergency services button or OnStar’s smartphone app. Veterans who contact OnStar because of a mental health crisis can be transferred to VA’s </span><a data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veteranscrisisline.net/" target="_blank"><span data-dcnode-id="436" instrument_node="">Veterans Crisis Line</span></a><span data-dcnode-id="434" instrument_node=""> (VCL), a 24/7 hotline that is staffed by trained responders, many of whom are Veterans themselves. Through the partnership, VA will provide resources and education to OnStar about suicide prevention, military culture, and how to determine if the caller has served in the military.</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Additional partnership objectives include providing training to VA clinicians and OnStar call center staff to facilitate suicide prevention efforts for Veterans and explore opportunities for how to use OnStar tools, techniques, and services to improve access to suicide prevention resources. VA clinicians, for example, will be trained to ask at-risk Veterans if they have OnStar and include that information in a Veteran’s suicide prevention safety plan as a resource should the Veteran experience emotional distress or a suicidal crisis, Dr. Davis said.</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">“OnStar’s emergency-certified advisors are trained in how to help people who have a mental health crisis,” said Ms. Ann Maher, assistant manager of emergency service and technology at OnStar. For Veterans who wish to speak to a crisis line responder, OnStar will provide a “warm hand-off” to VCL. “We’re not going to conference you in and then hang up,” said Ms. Maher. “We’re going to stay connected and let the VCL know what’s going on. We’re going to bridge all the parties together, and we will remain in the background until the person who called in or the crisis counselor determines we’re no longer needed.”</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">OnStar safety and security devices require a trial or paid subscription plan and are available on most General Motors vehicles. Additionally, OnStar’s Guardian smartphone app allows members with active service plans and up to seven family members or friends access from their phones. The app also has an emergency services button, which can help OnStar advisors locate members in distress. Members can also choose to share their locations with each other within the app.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Suicide prevention is the top clinical priority for VA and educating partners about suicide prevention and intervention for Veterans is a cornerstone of any partnership VHA pursues. Dr. Davis said the partnership has the potential to help any Veteran who is in crisis, regardless of discharge status or whether they are enrolled in VA care.</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="419" instrument_node="">For more information on how OCE builds effective partnerships to support Veterans, visit </span><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.va.gov/HEALTHPARTNERSHIPS/index.asp" target="_blank"><span data-dcnode-id="418" instrument_node="">va.gov/healthpartnerships</span></a><span data-dcnode-id="416" instrument_node="">.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="410" style="font-size: 0.9em; padding-top: 8px; border-top: 1px solid #CCC;"><strong data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">External Link Disclaimer:</span></strong><span data-dcnode-id="411" instrument_node=""> This page contains links that will take you outside of the Department of Veterans Affairs website. VA does not endorse and is not responsible for the content of the linked websites.</span></p><span data-dcnode-id="409" instrument_node="">
