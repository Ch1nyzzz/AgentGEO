</span><div class="html-content__content" data-dcnode-id="515"><span data-dcnode-id="557" instrument_node="">
</span><div class="clearfix text-formatted field field--name-field-html field--type-text-long field--label-hidden field--paragraph--field-html field__item" data-dcnode-id="517"><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Are you interested in joining our health care team? We continually have job opportunities available for well-qualified,&nbsp;highly motivated people. In addition to job openings in health-related fields, we also have career positions available in administration, information systems and many other divisions of the system.</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">UK HealthCare consists of the medical, nursing, health sciences, public health, dental and pharmacy patient care activities of the University of Kentucky in Lexington. Our team of more than 9,000 physicians, nurses, pharmacists and healthcare workers are dedicated to ensuring Kentuckians receive the highest-quality patient care.</span></p><span data-dcnode-id="551" instrument_node="">
</span><ul data-dcnode-id="540"><li data-dcnode-id="548"><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ukjobs.uky.edu/postings/search%3Futf8%3D%25E2%259C%2593%26query%3D%26query_v0_posted_at_date%3D%26225%3D%26985%3D12%26986%3D%26987%3D%26988%3D%26989%3D%26query_organizational_tier_3_id%3Dany%26commit%3DSearch" title="Working at UK"><span data-dcnode-id="550" instrument_node="">Employment Opportunities at UK HealthCare</span></a></li><span data-dcnode-id="547" instrument_node="">
</span><li data-dcnode-id="542"><span data-dcnode-id="546" instrument_node="">Visit the&nbsp;</span><a data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mednet.mc.uky.edu/placement" title="Kentucky Medical Professions Placement Service"><span data-dcnode-id="545" instrument_node="">Kentucky Medical Professions Placement Service</span></a><span data-dcnode-id="543" instrument_node="">&nbsp;website or view our brochure below.</span></li><span data-dcnode-id="541" instrument_node="">
</span></ul><div class="media--document" data-dcnode-id="535" data-link-text="Kentucky Medical Professions Placement Service brochure (PDF, 148 KB)"><span data-dcnode-id="539" instrument_node="">
</span><a data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ukhealthcare.uky.edu/sites/default/files/kentucky-medical-professionals-placement-service.pdf" target="_blank"><span data-dcnode-id="538" instrument_node="">
          Kentucky Medical Professions Placement Service brochure (PDF, 148 KB)
      </span></a><span data-dcnode-id="536" instrument_node="">
</span></div><span data-dcnode-id="534" instrument_node="">
</span><div class="clearfix" data-dcnode-id="533"></div><span data-dcnode-id="532" instrument_node="">
</span><ul data-dcnode-id="525"><li data-dcnode-id="527"><span data-dcnode-id="531" instrument_node="">Also see UK HealthCare&nbsp;</span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ukhealthcare.uky.edu/wellness-community/volunteer-observe" title="volunteer opportunities"><span data-dcnode-id="530" instrument_node="">volunteer</span></a><span data-dcnode-id="528" instrument_node="">&nbsp;opportunities.&nbsp;</span></li><span data-dcnode-id="526" instrument_node="">
</span></ul><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">The University of Kentucky uses an online employment system&nbsp;and requires individuals to complete an online application before they can apply for positions. Hard-copy applications and resumes are not accepted.&nbsp;</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="518"><strong data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">The University of Kentucky is an equal opportunity employer and invites applications from all interested individuals.</span></strong><span data-dcnode-id="519" instrument_node="">&nbsp;</span></p></div><span data-dcnode-id="516" instrument_node="">
