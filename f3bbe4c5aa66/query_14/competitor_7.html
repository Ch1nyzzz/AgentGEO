</span><h2 class="page-title" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">HAP Partnerships</span></h2><span data-dcnode-id="639" instrument_node="">
</span><span data-dcnode-id="637" instrument_node="">
</span><h4 data-dcnode-id="633"><span data-dcnode-id="636" instrument_node="">HAP's partnerships utilize coordinated efforts to increase Veterans' access to quality health care, wherever they are. Here are a few of the partnerships&nbsp;HAP supports:</span><br data-dcnode-id="635"><br data-dcnode-id="634"></h4><span data-dcnode-id="632" instrument_node="">
</span><ul data-dcnode-id="413"><span data-dcnode-id="631" instrument_node="">
</span><li data-dcnode-id="625"><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">American College of Emergency Physicians (ACEP):</span></strong><span data-dcnode-id="628" instrument_node=""> VA and ACEP are working together to educate community emergency medicine clinicians about Veteran-specific conditions and care needs. Emergency medicine clinicians care for patients with acute illnesses and injuries that require immediate medical attention, and VA and ACEP will collaborate on initiatives that focus on quality improvement of VA emergency departments, including geriatric and women’s health care treatment. The partners will also work toward efforts to address the safe use of opioids within the VA health care system and improving timely access to emergency care for Veterans in non-VA facilities.</span><br data-dcnode-id="627"><br data-dcnode-id="626"></li><span data-dcnode-id="624" instrument_node="">
</span><li data-dcnode-id="618"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">American Kidney Fund (AKF):</span></strong><span data-dcnode-id="621" instrument_node=""> This partnership will increase awareness of the risk factors, causes, complications, and treatments of kidney disease and its associated conditions, and it will provide additional resources through AKF’s webinars, awareness campaigns, and events to Veterans who are diagnosed with or are at risk for developing kidney disease. Both VA and AKF are focused on education, screenings, and mental and emotional support for those who suffer from the disease, which affects about 1 in 6 Veterans. AKF offers information about kidney disease for patients and their caregivers and an emergency fund to provide grants to some patients diagnosed with the disease. The foundation is also advocating for federal emergency assistance for dialysis patients. As part of the collaboration, VA will share publicly available data that can be used in AKF’s clinical research and information about AKF’s resources. AKF will share VA and VHA educational resources and assist in identifying Veterans who may be eligible for VA care by disseminating information at its in-person and virtual events.</span><br data-dcnode-id="620"><br data-dcnode-id="619"></li><span data-dcnode-id="617" instrument_node="">
</span><li data-dcnode-id="611"><strong data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Amyotrophic Later Sclerosis Association (ALS):</span></strong><span data-dcnode-id="614" instrument_node=""> This partnership with the ALS Association allows VHA to expand the number of resources for Veterans diagnosed with this chronic health condition. It provides Veterans with greater access ALS programs and services. The partnership provides VA healthcare teams opportunities to participate in continuing education, enables access to the ALS Associations resources and patient education, and promotes participation in local communities where ALS chapters are located.</span><br data-dcnode-id="613"><br data-dcnode-id="612"></li><span data-dcnode-id="610" instrument_node="">
</span><li data-dcnode-id="604"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">American Lung Association:</span></strong><span data-dcnode-id="607" instrument_node=""> VA and the American Lung Association have a shared goal to improve Veterans’ health and well-being through collaborative education and services for Veterans living with lung disease. A partnership between these two entities helps Veterans access American Lung Association’s online resources or support groups, including Better Breathers Clubs; give American Lung Association’s partners and providers a chance to learn more about Veteran-specific issues including suicide prevention; and encourage VA medical centers and regional American Lung Association affiliates to create local partnerships that can bring Veterans awareness and support. VA diagnoses 7,700 Veterans with lung cancer each year and an estimated 900,000 remain at risk due to age, smoking, and other environmental exposures during and after military service. VA continues to conduct groundbreaking research, studies, and clinical projects on topics like the risks of e-cigarettes, tuberculosis treatment, and sleep apnea. This partnership will add to the support and resources VA and VHA already offer to Veterans, their families, caregivers, and survivors.</span><br data-dcnode-id="606"><br data-dcnode-id="605"></li><span data-dcnode-id="603" instrument_node="">
</span><li data-dcnode-id="597"><strong data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Americans for the Arts:</span></strong><span data-dcnode-id="600" instrument_node=""> VHA and Americans for the Arts (AFTA) have expanded their partnership to increase access to the arts and humanities and enhance services for Veterans and their families. The goal is to provide more Veterans with the opportunity to experience how the arts can benefit their health and well-being. AFTA will also implement the Whole Health system, which includes conventional treatment with a focus on self-empowerment, self-healing, and self-care. VHA’s Office of Patient Centered Care and Cultural Transformation (OPCC&amp;CT) is working with AFTA to create a formalized process by which VA facilities can establish new, collaborative relationships with local arts partners. Over the past several years, more than 30 VA facilities have participated in efforts to bring the partnership’s offerings to Veterans.</span><br data-dcnode-id="599"><br data-dcnode-id="598"></li><span data-dcnode-id="596" instrument_node="">
</span><li data-dcnode-id="590"><strong data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Arthritis Foundation:</span></strong><span data-dcnode-id="593" instrument_node=""> The partnership between VHA and the Arthritis Foundation (AF) is designed to increase access to care, education and support for Veterans diagnosed with arthritis. According to the CDC, 35% of Veterans have arthritis and Veterans are 25% more like than the general public to be diagnosed with the condition. The VHA provides education and care and engages in research related to arthritis within the Veteran population and this partnership will allow VHA to gain insights from research and surveys conducted by the Arthritis Foundation about Veterans’ physical and emotional needs and experience of care.</span><br data-dcnode-id="592"><br data-dcnode-id="591"></li><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="583"><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Cigna: </span></strong><span data-dcnode-id="586" instrument_node="">VHA is working with Cigna, a health services company, to create and share resources for safer prescribing of opioids to Veterans in pain. The partners will share resources related to opioids, such as best practices, treatment methods, tools to decrease risk, and methods for educating clinicians. Cigna and VHA will work together to educate providers about safe opioid use as well as opioid alternatives. The partnership will also develop a new national action agenda to address the opioid crisis among Veterans.</span><br data-dcnode-id="585"><br data-dcnode-id="584"></li><span data-dcnode-id="582" instrument_node="">
</span><li data-dcnode-id="576"><strong data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Corporation for National and Community Service (CNCS): </span></strong><span data-dcnode-id="579" instrument_node="">The partnership with CNCS supports VA’s Choose Home Initiative, which allows Veterans to age in their homes rather than in institutions. Through this interagency collaboration, CNCS is providing volunteer support services in five communities within the Choose Home Initiative: Colorado Springs, CO; Missoula, MT; Las Vegas, NV; Pittsburgh, PA; and San Antonio, TX. The CNCS volunteers will deliver services such as homemaker and in-home respite care.&nbsp; VA will work with CNCS to bring these services to eligible Veterans at a local level.</span><br data-dcnode-id="578"><br data-dcnode-id="577"></li><span data-dcnode-id="575" instrument_node="">
</span><li data-dcnode-id="569"><strong data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Crohn’s &amp; Colitis Foundation (CCF): </span></strong><span data-dcnode-id="572" instrument_node="">The partnership between VHA and the Crohn’s &amp; Colitis Foundation will raise awareness of Crohn’s disease and ulcerative colitis and improve the quality of life for Veterans affected by chronic intestinal diseases. VHA and the Foundation are also launching a website that will include step-by-step instructions for Veterans to access treatment, links to other VA resources, and a peer support program that will be available in the coming months.</span><br data-dcnode-id="571"><br data-dcnode-id="570"></li><span data-dcnode-id="568" instrument_node="">
</span><li data-dcnode-id="553"><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Expiration Term of Service Sponsorship Program (ETS-SP):&nbsp;</span></strong><span data-dcnode-id="565" instrument_node="">The Veterans Health Administration (VHA) has created a public-private partnership with the </span><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gcc02.safelinks.protection.outlook.com/%3Furl%3Dhttps%253A%252F%252Fetssponsorship.com%252F%26data%3D04%257C01%257C%257C21fcb3294b9b453f86bf08d9792347d7%257Ce95f1b23abaf45ee821db7ab251ab3bf%257C0%257C0%257C637674014696265810%257CUnknown%257CTWFpbGZsb3d8eyJWIjoiMC4wLjAwMDAiLCJQIjoiV2luMzIiLCJBTiI6Ik1haWwiLCJXVCI6Mn0%253D%257C1000%26sdata%3D9pRG0MV%252BJ8VkMUpy9AnhcMKnjTKdzc%252FhGo85x2mYaJU%253D%26reserved%3D0"><span data-dcnode-id="564" instrument_node="">Expiration Term of Service Sponsorship Program (ETS-SP)</span></a><span data-dcnode-id="562" instrument_node=""> to better support service members and Veterans across social determinants of health as they integrate into civilian life and communities. The agreement between VHA and ETS-SP supports transitioning service members and Veterans earlier in the transition process by facilitating better access to VHA health care and benefits prior to leaving the Department of Defense. ETS-SP is a nonprofit that assists service members in their transition to the post-military community of their choice by making it easy for service members to find&nbsp; resources in the community they are moving to and facilitating connections for service members to VA-trained sponsors in their new community that can help them through the transition process. Through the partnership, VHA and ETS-SP promote wellness, increase resilience and protective factors such as employment and financial stability, link Veterans with VA and community-based services and support, and address the environmental and social conditions that can contribute to risk factors related to Veteran death by suicide. This partnership is led by </span><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gcc02.safelinks.protection.outlook.com/%3Furl%3Dhttps%253A%252F%252Fwww.oefoif.va.gov%252Fcaremanagement.asp%26data%3D04%257C01%257C%257C21fcb3294b9b453f86bf08d9792347d7%257Ce95f1b23abaf45ee821db7ab251ab3bf%257C0%257C0%257C637674014696275763%257CUnknown%257CTWFpbGZsb3d8eyJWIjoiMC4wLjAwMDAiLCJQIjoiV2luMzIiLCJBTiI6Ik1haWwiLCJXVCI6Mn0%253D%257C1000%26sdata%3DiAIcjhUHcYnE1N9wyYiucfZ0CA0fcr1ASvFvzcSFNUg%253D%26reserved%3D0"><span data-dcnode-id="561" instrument_node="">VA’s Post-9/11 Transition and Case Management (TCM) program</span></a><span data-dcnode-id="559" instrument_node=""> and is facilitated by the </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gcc02.safelinks.protection.outlook.com/%3Furl%3Dhttp%253A%252F%252Fwww.va.gov%252Fhealthpartnerships%26data%3D04%257C01%257C%257C21fcb3294b9b453f86bf08d9792347d7%257Ce95f1b23abaf45ee821db7ab251ab3bf%257C0%257C0%257C637674014696275763%257CUnknown%257CTWFpbGZsb3d8eyJWIjoiMC4wLjAwMDAiLCJQIjoiV2luMzIiLCJBTiI6Ik1haWwiLCJXVCI6Mn0%253D%257C1000%26sdata%3D2tpU3iIyGvS3B1ayQNtgEq4eiozBOOQ70hW6LLaJSu0%253D%26reserved%3D0"><span data-dcnode-id="558" instrument_node="">National Center for Healthcare Advancement and Partnerships</span></a><span data-dcnode-id="556" instrument_node="">.</span><br data-dcnode-id="555"><br data-dcnode-id="554"></li><span data-dcnode-id="552" instrument_node="">
</span><li data-dcnode-id="534"><strong data-dcnode-id="547"><span data-dcnode-id="551" instrument_node="">GO</span><sub data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">2</span></sub><span data-dcnode-id="548" instrument_node=""> Foundation: </span></strong><span data-dcnode-id="546" instrument_node="">VHA and GO</span><sub data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">2 </span></sub><span data-dcnode-id="543" instrument_node="">Foundation are working together to increase awareness of the importance of lung cancer screening for Veterans at high risk for the disease. In addition to increased access to lung cancer screening for Veterans through its national network of more than 700 screening centers, GO</span><sub data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">2</span></sub><span data-dcnode-id="540" instrument_node=""> Foundation is working with VHA to provide additional resources for screening implementation, professional development training, patient education campaigns and potential research programs. GO</span><sub data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">2 </span></sub><span data-dcnode-id="537" instrument_node="">Foundation is dedicated to saving, extending, and improving the lives of those vulnerable, at risk for, and diagnosed with lung cancer.</span><br data-dcnode-id="536"><br data-dcnode-id="535"></li><span data-dcnode-id="533" instrument_node="">
</span><li data-dcnode-id="527"><strong data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Heroes Foundation: </span></strong><span data-dcnode-id="530" instrument_node="">VHA is working with the Daniel and Salvador Montoya Heroes Foundation to provide Veterans with economic stability, employment, and health literacy opportunities. The Heroes Foundation aims to match Service members, Veterans, and their spouses with corporate organizations and careers that engage and embrace them. VHA and the Foundation will work together to facilitate corporate hiring opportunities for Veterans and transitioning service members, raise employer awareness of the risk factors of suicide, and share VA suicide prevention tools for Veterans.</span><br data-dcnode-id="529"><br data-dcnode-id="528"></li><span data-dcnode-id="526" instrument_node="">
</span><li data-dcnode-id="520"><strong data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Marcus Institute for Brain Health (MIBH): </span></strong><span data-dcnode-id="523" instrument_node="">Through VHA’s partnership with MIBH, VHA assigns a nurse or social worker as a liaison to Veterans who have sought care at MIBH and then chosen to return to VHA treatment. This liaison works to meet the ongoing health care needs of Veterans diagnosed with a traumatic brain injury (TBI). The goals of the partnership are to optimize care coordination for VHA-enrolled Veterans after they are discharged from acute self-referred treatment at MIBH and to support eligible Veterans who want to enroll in VHA care, maintaining continuity of treatment.</span><br data-dcnode-id="522"><br data-dcnode-id="521"></li><span data-dcnode-id="519" instrument_node="">
</span><li data-dcnode-id="513"><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">MAZON: </span></strong><span data-dcnode-id="516" instrument_node="">VHA and MAZON: A Jewish response to hunger have formed a partnership to increase awareness about the risks associated with food insecurity and options to address it through outreach to Veterans. MAZON is a national advocacy organization working to end hunger among people of all faiths in the United States and Israel. The organization advocates for food security among Veterans and other groups, a priority for VHA. MAZON also leads a national effort to eliminate barriers to Supplemental Nutrition Assistance Program (SNAP) access for currently serving military families, which VHA also supports.</span><br data-dcnode-id="515"><br data-dcnode-id="514"></li><span data-dcnode-id="512" instrument_node="">
</span><li data-dcnode-id="503"><strong data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Medical-Legal Partnerships:</span></strong><span data-dcnode-id="509" instrument_node=""> These nonmonetary partnerships bring together VA medical facilities and volunteer attorneys who provide services to Veterans at no cost. Veterans, including those experiencing homelessness, ranked affordable legal assistance high on their list of unmet needs in a </span><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.va.gov/HOMELESS/docs/CHALENG-2016-factsheet-508-2017-07-29.pdf" rel="noopener noreferrer" target="_blank" title="2016 VA survey"><span data-dcnode-id="508" instrument_node="">2016 VA survey</span></a><span data-dcnode-id="506" instrument_node="">. Legal issues can also directly affect Veterans’ health. For example, a Veteran experiencing stress because of a child custody dispute cannot fully focus on recovering from a health issue. After screening Veterans for unmet legal needs, VA medical teams can refer Veterans to on-site legal clinics where attorneys provide free services for noncriminal legal issues, in areas such as family law, landlord-tenant disputes, and elder law.</span><br data-dcnode-id="505"><br data-dcnode-id="504"></li><span data-dcnode-id="502" instrument_node="">
</span><li data-dcnode-id="493"><strong data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Microsoft Adaptive Controller: </span></strong><span data-dcnode-id="499" instrument_node="">&nbsp;VA and Microsoft formalized a partnership to expand opportunities for education, recreation, and other activities of daily life for Veterans living with disabilities. VA will work with Microsoft to bring its specialized equipment to Veterans with spinal cord injuries, amputations, and neurological or other injuries at more than 22 VA medical centers in the United States. Microsoft’s Xbox Adaptive Controller will be the first piece of hardware developed through an inclusive design approach and in consultation with people who have disabilities. The Controller gives people with a range of physical disabilities the ability to customize their computer and gaming setups. The partners will collaborate to bring these Controllers and other equipment and services to Veterans who can use them for</span><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nextgov.com/it-modernization/2019/10/va-launch-adaptive-game-therapy-program/160574/" rel="noopener noreferrer" target="_blank" title="VA to Launch Adaptive Game Therapy Program"><span data-dcnode-id="498" instrument_node=""> therapeutic and rehabilitative as well as recreational activities</span></a><span data-dcnode-id="496" instrument_node="">.</span><br data-dcnode-id="495"><br data-dcnode-id="494"></li><span data-dcnode-id="492" instrument_node="">
</span><li data-dcnode-id="486"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Microsoft Airband: </span></strong><span data-dcnode-id="489" instrument_node="">Through its partnership with Microsoft Corporation (Microsoft), VHA aims to improve rural Veterans’ online access to VA services and benefits. By leveraging Microsoft’s Airband Initiative with Internet Service Providers, the partnership will help identify opportunities to bring broadband internet access to rural areas of the country with large populations of Veterans who have limited access to reliable internet service at home. Improved access to broadband internet can facilitate digital inclusion and Veterans’ access to learning, working, communicating, and accessing VA services and benefits online — which in turn enhances their ability to participate in their health care.</span><br data-dcnode-id="488"><br data-dcnode-id="487"></li><span data-dcnode-id="485" instrument_node="">
</span><li data-dcnode-id="479"><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">OnStar: </span></strong><span data-dcnode-id="482" instrument_node="">VHA and OnStar entered into a formal partnership in 2020. This partnership will support Veterans who experience crisis and increase suicide prevention services for them, as suicide prevention is the top clinical priority for VA. VHA and OnStar will work together to reduce deaths by suicide by providing additional resources for Veterans in crisis or emotional distress. The partners will also work to utilize OnStar as a resource that VHA clinicians can use in developing enhanced suicide prevention safety plans for Veterans.</span><br data-dcnode-id="481"><br data-dcnode-id="480"></li><span data-dcnode-id="478" instrument_node="">
</span><li data-dcnode-id="472"><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Parkinson’s Foundation: </span></strong><span data-dcnode-id="475" instrument_node="">VHA and&nbsp;the Parkinson’s Foundation work together to increase Veterans’ and health care providers’ access to Parkinson’s&nbsp;disease&nbsp;information and resources,&nbsp;educate&nbsp;and train&nbsp;VA&nbsp;staff on disease management, and improve service coordination and navigation for Veterans.&nbsp;The Foundation&nbsp;also&nbsp;integrates&nbsp;members of the Veteran community&nbsp;into&nbsp;the nonprofit’s&nbsp;planning and&nbsp;activities supporting&nbsp;outreach&nbsp;efforts that&nbsp;promote education and awareness&nbsp;among Veterans, including Veteran-specific health concerns and suicide prevention strategies.&nbsp;The Foundation’s goal is to make life better for people with Parkinson’s disease by improving care and advancing research toward a cure. It is estimated that 80,000 Veterans suffer from Parkinson’s Disease. VA operates six specialized Parkinson’s Disease Research, Education, and Clinical Centers (PADRECCs) which assist Veterans in effectively managing Parkinson’s Disease and other movement disorders by way of VA pharmacy benefits, physical, occupational, and speech&nbsp;therapies, medical equipment, surgical services, and other valuable resources. PADDRECs offer state-of-the-art clinical care, education, research, and national outreach and advocacy.</span><br data-dcnode-id="474"><br data-dcnode-id="473"></li><span data-dcnode-id="471" instrument_node="">
</span><li data-dcnode-id="465"><strong data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">PATRIOTlink:</span></strong><span data-dcnode-id="468" instrument_node=""> This new resource navigation platform is designed to help users quickly locate Veteran support services and programs. PATRIOTlink, which is operated by Code of Support Foundation, a partner of VA’s Veterans Experience Office, connects users with trustworthy resources that are specific to stakeholder needs. The platform parses through the nearly 6,000 programs that have cleared its extensive screening process to provide refined search results for topics such as financial counseling, caregiver support, peer support, and Veteran benefits. Because the tool is cloud-based, the information on PATRIOTlink is continually updated as platform administrators are notified of changes to program offerings and as users provide feedback on program quality. PATRIOTlink is a member of Veterans Hub, a project led by VHA’sThe National Center for Healthcare Advancement and Partnerships, that is focused on improving the health and well-being of Veterans by providing them access to positive social determinants of health such as housing, employment, and food security.</span><br data-dcnode-id="467"><br data-dcnode-id="466"></li><span data-dcnode-id="464" instrument_node="">
</span><li data-dcnode-id="458"><strong data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Pet Partners: </span></strong><span data-dcnode-id="461" instrument_node="">Pet Partners’ volunteer handlers, along with their trained animals, have long visited Veterans at several VA medical centers throughout the nation. Pet Partners has now partnered with VHA to develop more opportunities for Veterans to benefit from pet visitation, clinical interventions with therapy animals, and other activities and events. The aim of this partnership is to bring more Veteran patients the benefits of the human-animal bond. Research has shown that people in contact with animals may experience lower blood pressure, reduced risk of cardiovascular disease, lessened anxiety and pain, and decreased feelings of loneliness.</span><br data-dcnode-id="460"><br data-dcnode-id="459"></li><span data-dcnode-id="457" instrument_node="">
</span><li data-dcnode-id="439"><strong data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Salesforce Military:</span></strong><span data-dcnode-id="454" instrument_node=""> VHA and Salesforce have developed a partnership to support Veterans and military service members who are transitioning out of active duty and into the civilian workforce. The partnership facilitates coordination between VHA and the </span><a data-dcnode-id="452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//veterans.force.com/s/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="453" instrument_node="">Salesforce Military</span></a><span data-dcnode-id="451" instrument_node=""> community to better connect Veterans, service members, and their spouses with skill development, career advancement, and employment resources. Since its launch in 2014, Salesforce Military has provided military personnel, Veterans, and their spouses with high-demand technology skills and certifications at no cost to help them establish and enhance their careers. Similarly, VA offers a number of benefits and programs that address needs across social determinants of health, such as economic stability, employment, and health literacy. Through the partnership, Salesforce Military will provide direct links to VA resources and information about suicide prevention and how Veterans, their spouses, and employers can reduce the risk for suicide in their homes, businesses, and communities. The partnership will add to VHA’s initiatives to provide transition assistance through programs such as </span><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.va.gov/careers-employment/education-and-career-counseling/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="450" instrument_node="">Personalized Career Planning and Guidance</span></a><span data-dcnode-id="448" instrument_node="">, </span><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.va.gov/careers-employment/vocational-rehabilitation/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="447" instrument_node="">Veterans Readiness and Employment</span></a><span data-dcnode-id="445" instrument_node="">, and the </span><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.benefits.va.gov/transition/tap.asp" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="444" instrument_node="">Transition Assistance Program</span></a><span data-dcnode-id="442" instrument_node="">.</span><br data-dcnode-id="441"><br data-dcnode-id="440"></li><span data-dcnode-id="438" instrument_node="">
</span><li data-dcnode-id="432"><strong data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Veterans Community Partnerships (VCPs):</span></strong><span data-dcnode-id="435" instrument_node="">These represent a national initiative that ensures all Veterans and their caregivers have access to, and a wide range of choices among, the services that allow Veterans to stay in the places they call home. VCPs comprise Veterans and their caregivers, VA facilities, community health care providers, and organizations and agencies working together to foster seamless access to care and support services at VA and in Veteran communities.</span><br data-dcnode-id="434"><br data-dcnode-id="433"></li><span data-dcnode-id="431" instrument_node="">
</span><li data-dcnode-id="425"><strong data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Veterans Hub:</span></strong><span data-dcnode-id="428" instrument_node="">The Institute for Healthcare Improvement’s 100 Million Healthier Lives initiative is working toward a goal of 100 million people living healthier lives by 2020. The Veterans Hub is one of the initiative’s seven topical hubs and aims to create a network of organizations and coalitions working to empower Veterans to be the healthiest versions of themselves. The hub program will strive to meet the goal of 20 million Veterans leading healthier lives by increasing food security, access to employment, safe housing, and more.</span><br data-dcnode-id="427"><br data-dcnode-id="426"></li><span data-dcnode-id="424" instrument_node="">
</span><li data-dcnode-id="415"><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Y-USA:</span></strong><span data-dcnode-id="421" instrument_node=""> This partnership between VHA and Y-USA (the national entity that oversees YMCA facilities across the country) works to provide effective services to Veterans. Since 2015, this partnership has leveraged the resources and expertise of both organizations to promote the well-being of Veterans and their families. VHA employees throughout the country work with local YMCAs to connect Veterans to needed resources in their communities. Veterans can access volunteer opportunities plus services and benefits in the areas of healthy lifestyle programming and community reintegration. In addition, Y-USA is offering free, online, on-demand fitness videos through its </span><a data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ymca360.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="420" instrument_node="">“YMCA 360” platform</span></a><span data-dcnode-id="418" instrument_node=""> in response to stay-at-home orders issued due to the coronavirus pandemic.</span><br data-dcnode-id="417"><br data-dcnode-id="416"></li><span data-dcnode-id="414" instrument_node="">
</span></ul><span data-dcnode-id="412" instrument_node="">
