="jobsearch-JobDescriptionSection-section" data-dcnode-id="476" id="jobDetailsSection"><div class="jobsearch-JobDescriptionSection-title" data-dcnode-id="487"><h2 class="jobsearch-JobDescriptionSection-title--main icl-u-textBold" data-dcnode-id="488" id="jobDetails" tabindex="-1"><span data-dcnode-id="489" instrument_node="">Job details</span></h2></div><div class="jobsearch-JobDescriptionSection-sectionItem" data-dcnode-id="482"><div class="jobsearch-JobDescriptionSection-sectionItemKey icl-u-textBold" data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Salary</span></div><span class="icl-u-xs-mr--xs" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">$22 - $24 an hour</span></span></div><div class="jobsearch-JobDescriptionSection-sectionItem" data-dcnode-id="477"><div class="jobsearch-JobDescriptionSection-sectionItemKey icl-u-textBold" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Job Type</span></div><div data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Full-time</span></div></div></div></div><div class="mosaic-zone" data-dcnode-id="473" id="mosaic-aboveFullJobDescription"><div class="mosaic mosaic-provider-company-info-salary mosaic-rst" data-dcnode-id="474" id="mosaic-provider-company-info-salary"></div></div><h2 class="jobsearch-JobDescriptionSection-jobDescriptionTitle icl-u-xs-my--md" data-dcnode-id="471" id="jobDescriptionTitle"><span data-dcnode-id="472" instrument_node="">Full Job Description</span></h2><div class="jobsearch-jobDescriptionText" data-dcnode-id="365" id="jobDescriptionText"><span data-dcnode-id="470" instrument_node="">
</span><div data-dcnode-id="367"><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="466"><b data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Work from your home while making a difference at the nation’s elite telephonic behavioral health organization!</span></b></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node=""> ProtoCall Services is a national leader in crisis intervention, assessment and access services in the behavioral health field. We are also 100% remote! As we continue to grow our team, our employees’ health and safety remains a top priority, and our years of experience supporting a remote workforce has allowed our staff to continue taking calls from the comfort of their homes without risking themselves or their loved ones by attempting to come to an office. Our close-knit community supports each other virtually, maintaining a culture of connection and engagement.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node=""> Established in 1992, ProtoCall’s customers include community behavioral health providers, employee assistance programs, university counseling centers, and managed behavioral health organizations. ProtoCall answers calls on behalf of over 400 organizations who look to our call takers to provide effective and compassionate access to services 24 hours a day, 7 days a week, as coverage that they typically could not otherwise afford.</span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node=""> ProtoCall Services is made up of a resilient team who work around the clock to provide immediate support for those in crisis, and are located all over the country. Think of us as mental health first aid on a paramedic scale; we are telephonic first responders to people in need. We are looking for Bachelor's level people with relevant experience to work alongside our Master's level counselors and social workers, providing crisis counseling services to consumers nationwide. Remote workers are highly independent and technologically savvy, with a private work space available.</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node=""> At ProtoCall, you will learn how to effectively navigate urgent and emergent mental health situations with confidence as one of our crisis intervention professionals. Through our rigorous 6-week training and 6-month orientation period, you will be trained at the elite level of the nation’s leading telephonic behavioral health organization. We are ProtoCall’s Crisis Counselors.</span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node=""> Work at ProtoCall is inherently stressful given the nature of our mission. It is the basic responsibility of each employee to manage their stress in a way that sustains our commitment to the highest level of client care, customer service, professional conduct, and a supportive work environment. During times of stress, this includes but is not limited to: staying focused on work tasks and productively using time and energy, presenting a positive disposition, maintaining constructive interpersonal relationships, and developing and maintaining appropriate self-care strategies to manage conditions that create stress and to sustain physical and mental health.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="447"><b data-dcnode-id="448"><span data-dcnode-id="449" instrument_node=""> What does an average day look like for a Remote Crisis Counselor - Bachelor’s Level?</span></b></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node=""> As a Remote Crisis Counselor - Bachelor’s Level, you provide telephone triage, crisis intervention, coordination and intake services to those in need across the nation. On your calls, you will work under the close supervision of Licensed Master’s Level Mental Health Professionals. You exhibit strong customer service skills in every phone call as you support our callers. This carries over to our ProtoCall remote environment as we build support systems over chat and in Zoom groups. We maintain our supportive culture by displaying a positive attitude and exercising open communication and problem-solving skills.</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node=""> Our bachelor’s level remote call takers operate from a private home office using our telecommuting equipment, but they are strongly connected to the call center through our technology and chat system. You receive calls from working professionals with anxiety, college students in distress, consumers in recovery, people with thoughts of suicide, and a myriad of other mental health-related presentations. We experience all levels of acuity - from routine counseling requests to someone who is in immediate danger. During an interaction with a client, you will learn to simultaneously speak with consumers over the phone, access information on available resources, manage documentation, collaborate with colleagues for support, and guide callers to their next step…all while talking someone through a critical moment in their life. Our crisis counselors do not carry a caseload and once the immediate work is done with that caller, follow up is arranged with our partners. You will start each new work day fresh without anything left over from the previous shift. As a remote crisis counselor, you are able to work independently, troubleshoot technology, and stay in touch with supervisors and colleagues to continue contributing to the team environment.</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node=""> This work will teach you to literally talk people off of ledges, as well as help others through job or love loss, grief, loneliness, and anxiety, from callers of different ages and backgrounds. We talk with people looking for recovery options, counseling, or legal services through their EAPs. Crisis is a spectrum, but our training and intervention are thorough and leading in the field. If you want to learn crisis intervention, you have come to the right place.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="434"><b data-dcnode-id="435"><span data-dcnode-id="436" instrument_node=""> Benefits</span></b></p><span data-dcnode-id="433" instrument_node="">
</span><ul data-dcnode-id="407"><span data-dcnode-id="432" instrument_node="">
</span><li data-dcnode-id="429"><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node=""> Ability to work safely from home</span></p></li><span data-dcnode-id="428" instrument_node="">
</span><li data-dcnode-id="425"><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node=""> Full benefit program that includes medical, dental, life insurance, 401k, STD/LTD and EAP services</span></p></li><span data-dcnode-id="424" instrument_node="">
</span><li data-dcnode-id="421"><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node=""> An accrued planned time off package that earns up to 4 weeks of vacation during your first year</span></p></li><span data-dcnode-id="420" instrument_node="">
</span><li data-dcnode-id="417"><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node=""> A team-oriented culture of leading crisis intervention specialists with a supportive supervisory team and accessible senior management - from executives all the way up to C Suite!</span></p></li><span data-dcnode-id="416" instrument_node="">
</span><li data-dcnode-id="413"><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node=""> Opportunities for advancement</span></p></li><span data-dcnode-id="412" instrument_node="">
</span><li data-dcnode-id="409"><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node=""> Company-matched student loan repayment</span></p></li><span data-dcnode-id="408" instrument_node="">
</span></ul><span data-dcnode-id="406" instrument_node="">
</span><h3 class="jobSectionHeader" data-dcnode-id="403"><b data-dcnode-id="404"><span data-dcnode-id="405" instrument_node=""> Who You Are</span></b></h3><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node=""> You have degree from a four-year accredited college or university.</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node=""> You reside in WA, OR, AZ, NM, MI, KS, IL, GA, NC, MN, ME, TN, MD.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node=""> You have behavioral health/Social Services/Helping Field-related work with direct client/consumer contact experience (6 month cumulative minimum, paid or unpaid).</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node=""> You thrive in a fast paced environment that serves people in crisis.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node=""> You work from a brief, solution-focused model to best assist as many of our callers as possible in a first responder model, while maintaining an unfailing commitment to quality care.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node=""> You love to move fast, and perform well under pressure, much like paramedics or ER nurses.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node=""> You are able to multitask while remaining present and attuned to callers who may be in their darkest hour, and be ready to do it again the next day.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node=""> You do all of our documentation while on and between calls. That means navigating all of our systems and entering information quickly.</span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node=""> Crisis is 24/7/365 and so are we. You don’t mind a nontraditional schedule. You thrive working full-time (32 or 40 hours) in afternoon, evening, and overnight shifts, with one weekend day required every week. Schedules are consistent.</span></p><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node=""> While working from home, to maintain HIPAA compliance and focus, we ask you to have a private office space with a door, with business internet with 10mb speeds or higher, not susceptible to frequent outages. Because our systems run through the internet, it cannot be satellite or cellular hotspots. Static IP address and business class internet is required. This job is high-tech and requires multitasking.</span></p><span data-dcnode-id="372" instrument_node="">
