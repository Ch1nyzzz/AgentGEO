</span><h1 class="green m-b-0" data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Automation and its impact on employment</span></h1><span data-dcnode-id="869" instrument_node="">
</span></div><span data-dcnode-id="867" instrument_node="">
</span><div class="col-md-5 hidden-xs" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">
</span></div><span data-dcnode-id="864" instrument_node="">
</span></div><span data-dcnode-id="862" instrument_node="">
</span><hr data-dcnode-id="861"><span data-dcnode-id="860" instrument_node="">
</span><div class="social-share" data-dcnode-id="840"><span data-dcnode-id="859" instrument_node="">
</span><span class="social-share-label" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Share On:</span></span><span data-dcnode-id="856" instrument_node="">
</span><span class="social-icons" data-dcnode-id="842"><span data-dcnode-id="855" instrument_node="">
</span><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A//www.nigelwright.com/news-insights/news/great-ideas-for-building-your-employer-brand/%26text%3DGreat%2520Ideas%2520for%2520Building%2520Your%2520Employer%2520Brand" target="_blank"><span class="icon" data-dcnode-id="854"></span></a><span data-dcnode-id="852" instrument_node="">
</span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/shareArticle%3Furl%3Dhttps%3A//www.nigelwright.com/news-insights/news/great-ideas-for-building-your-employer-brand/%26title%3DGreat%2520Ideas%2520for%2520Building%2520Your%2520Employer%2520Brand" target="_blank"><span class="icon lin" data-dcnode-id="851"></span></a><span data-dcnode-id="849" instrument_node="">
</span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//www.nigelwright.com/news-insights/news/great-ideas-for-building-your-employer-brand/%26title%3DGreat%2520Ideas%2520for%2520Building%2520Your%2520Employer%2520Brand" target="_blank"><span class="icon fb" data-dcnode-id="848"></span></a><span data-dcnode-id="846" instrument_node="">
</span><a data-dcnode-id="844" href="mailto:?Subject=Great%20Ideas%20for%20Building%20Your%20Employer%20Brand&amp;Body=%20https://www.nigelwright.com/news-insights/news/great-ideas-for-building-your-employer-brand/"><span class="icon em" data-dcnode-id="845"></span></a><span data-dcnode-id="843" instrument_node="">
</span></span><span data-dcnode-id="841" instrument_node="">
</span></div><span data-dcnode-id="839" instrument_node="">
</span><img class="img-responsive img-responsive-bottom-margin" data-dcnode-id="838" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.eu-west-2.amazonaws.com/media.nigelwright.com/news/Automation%2BArticle%2B-%2Btitle%2Bimage%2B%28big%29.jpg&amp;raw"><span data-dcnode-id="837" instrument_node="">
</span><div class="rte" data-dcnode-id="345"><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Automation will increasingly impact the world of work during the next few years. This is already felt in some industries, and different countries are experiencing the effects more so than others. Discussions of how automation will alter working life, however, are always loaded with ‘maybe’ statements.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Studies highlight varying degrees of job losses or job creation, yet scenarios are dependent on factors that will facilitate positive or negative change. It’s not a simple case of the ‘jobs we have now’ experiencing gains or decreases either. Yes, automation could create demand for existing goods and services, but it may also lead to new industries and new jobs. Job ‘designs’ too could evolve once new technologies are embedded, and, if progress is positive, there may even be more work to go around – or not, depending on what action is taken to offset disruption.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Predicting the future is not a science. Differences of opinion vary. So we’ve reviewed research on automation and its potential impact on employment. We summarise our findings below, including the steps required by governments and employers to ensure positive rather than negative disruption. But first…</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">&nbsp;</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="821"><strong data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">DIFFERENT TYPES OF AUTOMATION</span></strong></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="817"><strong data-dcnode-id="818"><img data-dcnode-id="819" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.eu-west-2.amazonaws.com/media.nigelwright.com/news/Automation%2BArticle%2Bimage%2B2.png&amp;raw" style="float:right;padding:10px;width:348px;height:240px"></strong></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">When people think about automation and work, they often imagine robots operating within a manufacturing environment. A key factor to understand, however, is that automation and robotics are two distinctly different things. Yes, crossovers exist between the two, but to appreciate the nuances of the technology, it’s a good idea to keep them separate in your mind.</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="812" instrument_node="">Automation is the term used when describing a process or task performed by software or a machine, usually undertaken by a human. It can be mechanical or virtual; simple or complicated. Robotics, on the other hand, is a branch of engineering focused on designing and building robots. While robots may automate some tasks, in the main, they have </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.robotiq.com/whats-the-difference-between-automation-and-robotics"><span data-dcnode-id="810" style="text-decoration:underline"><span data-dcnode-id="811" instrument_node="">little to do with automation</span></span></a><span data-dcnode-id="808" instrument_node=""> outside of industrial settings. And even within manufacturing facilities, other types of machines are used which don’t come under the robotics banner.&nbsp;&nbsp;</span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="803"><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Industrial Automation (IA)</span></strong></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><img data-dcnode-id="801" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.eu-west-2.amazonaws.com/media.nigelwright.com/news/Automation%2BArticle%2Bimage%2B3.png&amp;raw" style="float:right;padding:10px;width:318px;height:209px"></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="798" instrument_node="">
  There’s various uses for robots and other automated machines in industrial settings. 3D printing is an obvious example, as are autonomous vehicles for logistics. But also, specific machines are used in hazardous environments including </span><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vdocuments.com.br/automation-and-the-workfo-parliamentary-office-of-science-and-technology-industrial.html"><span data-dcnode-id="796" style="text-decoration:underline"><span data-dcnode-id="797" instrument_node="">‘cobots’ which work alongside humans</span></span></a><span data-dcnode-id="794" instrument_node="">, assisting with heavy lifting and other potentially dangerous tasks.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="791"></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Software automation also plays an increasingly critical role in the working lives of humans and there are variations worth considering.</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="786"></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="782"><strong data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Business Process Automation (BPA)</span></strong></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="780" instrument_node="">This involves an organisation taking all its basic non-manufacturing processes and seeking ways to improve efficiency by automatising them. Various software tools are used across areas such as </span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.laserfiche.com/ecmblog/what-is-business-process-automation-bpa/"><span data-dcnode-id="778" style="text-decoration:underline"><span data-dcnode-id="779" instrument_node="">HR, accounts and contract management</span></span></a><span data-dcnode-id="776" instrument_node=""> – essentially creating a back-office function but without people.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="771"><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Robotic Process Automation (RPA)</span></strong></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="769" instrument_node="">Unrelated to (mechanical) robotics, RPA is the term given to higher level automation, where software is used in certain circumstances to </span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mindmajix.com/30-rpa-examples"><span data-dcnode-id="767" style="text-decoration:underline"><span data-dcnode-id="768" instrument_node="">augment process performance</span></span></a><span data-dcnode-id="765" instrument_node=""> and perform complex tasks. Rather than being an aspect of a BPA solution, it fulfils a primary function in one critical area such as customer order processing.&nbsp; A one off investment, rather than business overhaul.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="759"><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Intelligent Process Automation (IPA)</span></strong><span data-dcnode-id="760" instrument_node=""> </span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="757" instrument_node="">Whereas RPA is adherent to pre-set rules, IPA software uses artificial intelligence (AI) to learn how to mimic human computer interactions and deliver intelligent outcomes. Another component of IPS is machine learning, a type of AI that enables computers to </span><a data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/bernardmarr/2018/04/30/27-incredible-examples-of-ai-and-machine-learning-in-practice/%2353bfb69e7502"><span data-dcnode-id="755" style="text-decoration:underline"><span data-dcnode-id="756" instrument_node="">adapt, change and even test different approaches</span></span></a><span data-dcnode-id="753" instrument_node=""> based on data retrieval.</span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">&nbsp;</span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><img data-dcnode-id="747" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.eu-west-2.amazonaws.com/media.nigelwright.com/news/Automation%2BArticle%2Bimage%2B6.png&amp;raw" style="width:701px;height:126px;margin:0px auto;display:block"></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">&nbsp;</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><strong data-dcnode-id="741"></strong></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="736"><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">WHAT THE IMPACT STUDIES TELL US</span></strong></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="734" instrument_node="">As the </span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technologyreview.com/s/610005/every-study-we-could-find-on-what-automation-will-do-to-jobs-in-one-chart/"><span data-dcnode-id="732" style="text-decoration:underline"><span data-dcnode-id="733" instrument_node="">MIT Technology Review</span></span></a><span data-dcnode-id="730" instrument_node=""> discovered when it analysed several reports published between 2013 and 2017, little consistency or agreement exists on how many jobs will be lost or created due to automation, worldwide, during the next few years.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><img data-dcnode-id="727" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.eu-west-2.amazonaws.com/media.nigelwright.com/news/Automation%2BArticle%2Bimage%2B7.JPG&amp;raw" style="float:right;padding:10px;width:342px;height:270px"></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="724" instrument_node="">Although some of the studies in the table are close when it comes to predictions up to 2020-2021, jumping ahead a decade the numbers become incomprehensibly bigger. To think that only 1.8 million jobs will go within the next two years, and ten years later that figure increases by half a million or more, is difficult to accept. But, change is coming, and as the technology described in the previous section becomes more prevalent and embedded within different sectors of the economy – </span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//researchbriefings.files.parliament.uk/documents/POST-PN-0534/POST-PN-0534.pdf"><span data-dcnode-id="722" style="text-decoration:underline"><span data-dcnode-id="723" instrument_node="">the UK Government</span></span></a><span data-dcnode-id="720" instrument_node=""> discusses decreasing cost of AI licensing models and sensors, as well as rising labour costs as propelling development of and investment in automaton – it could be far reaching and rapid.</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="717"></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="715"></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="713"></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="711"></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="709" instrument_node="">What’s more useful are the studies that take a nuanced view of the components of jobs and how they may be affected. </span><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oecd-ilibrary.org/docserver/2e2f4eea-en.pdf%3Fexpires%3D1533719853%26id%3Did%26accname%3Dguest%26checksum%3D98EF74C1413C1E3C7B32F85915EF9389"><span data-dcnode-id="707" style="text-decoration:underline"><span data-dcnode-id="708" instrument_node="">A new report by OECD</span></span></a><span data-dcnode-id="705" instrument_node=""> published in March 2018, considers the impact across 32 countries. While it claims one in two jobs will be influenced by automation, the risk of replacement varies, with only 14% of jobs (66 million workers) being highly (70%+) automatable. 32%, on the other hand, have a 50%-70% risk of changing due to automation. The median job within the study has a 48% chance of being partly automated.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="702"></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="696"><a data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/~/media/mckinsey/featured%2520insights/Digital%2520Disruption/Harnessing%2520automation%2520for%2520a%2520future%2520that%2520works/MGI-A-future-that-works-Executive-summary.ashx"><span data-dcnode-id="699" style="text-decoration:underline"><span data-dcnode-id="700" instrument_node="">The 2o17 McKinsey</span></span></a><span data-dcnode-id="697" instrument_node=""> study also assesses degrees of automation and revealed a now well documented statistic. 60% of occupations have at least 30% of constituent work activities that can be automated. It further states that although half of all jobs have the technical potential to become automated based on currently available technologies, due to social, economic and technical factors, the rate of adoption will be varied and slow. However, over 200 million global workers will need to switch occupational categories by 2030 and most likely re-train because of role changes.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">&nbsp;</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><img data-dcnode-id="691" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.eu-west-2.amazonaws.com/media.nigelwright.com/news/Automation%2BArticle%2Bimage%2B8.png&amp;raw" style="width:707px;height:424px;margin:0px auto;display:block"></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">&nbsp;</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="685" instrument_node="">Different countries, too, will feel the impact more than others. According </span><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oecd-ilibrary.org/docserver/2e2f4eea-en.pdf%3Fexpires%3D1533810056%26id%3Did%26accname%3Dguest%26checksum%3D4F43C48F475342AEF392AEE1B8813676"><span data-dcnode-id="683" style="text-decoration:underline"><span data-dcnode-id="684" instrument_node="">to the OECD</span></span></a><span data-dcnode-id="681" instrument_node=""> jobs in Anglo-Saxon, Nordic countries and the Netherlands are less at risk than jobs in Eastern and Southern European countries. In a European context, when analysing McKinsey’s research across Spain, Netherlands, France, Norway, UK, Germany, Switzerland and Sweden, between 20%-26% of workers will be displaced. The UK is lowest, and Germany is highest on that scale.</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">&nbsp;</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="673"><b data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">JOBS UNDER THREAT</span></b></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="671" instrument_node="">Jobs in the manufacturing industry and agriculture, as well as various low-level service sector roles are the most automatable. A </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//researchbriefings.files.parliament.uk/documents/POST-PN-0534/POST-PN-0534.pdf"><span data-dcnode-id="669" style="text-decoration:underline"><span data-dcnode-id="670" instrument_node="">UK Government briefing document</span></span></a><span data-dcnode-id="667" instrument_node=""> provides several examples of developments in this area including German manufacturers using robotic arms for loading and lifting, as well as automated factories and warehouses such as those used by adidas and Ocado, where goods are moved and packed by machines. Amazon, too, has </span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.growcode.com/blog/51-ecommerce-trends-2018/"><span data-dcnode-id="665" style="text-decoration:underline"><span data-dcnode-id="666" instrument_node="">doubled the number</span></span></a><span data-dcnode-id="663" instrument_node=""> of packing robots in its factories in recent years. Within agricultural settings, machines can harvest and sow crops as well as perform more delicate roles like fruit picking.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><img data-dcnode-id="660" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.eu-west-2.amazonaws.com/media.nigelwright.com/news/Automation%2BArticle%2Bimage%2B9.jpg&amp;raw" style="float:left;padding:10px;width:390px;height:215px"></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="657" instrument_node="">Outside of manufacturing, low-level administrative functions will most likely decline in the short term. Data entry, analysis and office support occupations in addition to some customer interaction, will be the first to go. In its briefing paper, the UK Government highlight how technology could help businesses manage increased workloads and deliver faster and more accurate services. Chatbots – an example of IPA technology –&nbsp; are a tool already entering mainstream business practice. The compound annual </span><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.growcode.com/blog/51-ecommerce-trends-2018/"><span data-dcnode-id="655" style="text-decoration:underline"><span data-dcnode-id="656" instrument_node="">growth rate of chatbots is 24%</span></span><span data-dcnode-id="654" instrument_node="">,</span></a><span data-dcnode-id="652" instrument_node=""> with some studies indicating </span><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shopify.co.uk/partners/blog/ecommerce-trends-2018%23automation"><span data-dcnode-id="650" style="text-decoration:underline"><span data-dcnode-id="651" instrument_node="">over 50%</span></span></a><span data-dcnode-id="648" instrument_node=""> of online shoppers prefer accessing apps rather than using email, phone or contact forms when making enquiries.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="645" instrument_node="">Other software automation is helping law firms conduct document searches, assist publishers such as the Associated Press to write earnings reports, process mortgage applications for lenders, and even offer short-term market predictions for traders. All experience better and faster outcomes than if humans had done the work, according to the UK Government. Areas where technology is available but falls short of human expertise includes text and speech translation and sales. Outside of the office, </span><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/~/media/McKinsey/Featured%2520Insights/Future%2520of%2520Organizations/What%2520the%2520future%2520of%2520work%2520will%2520mean%2520for%2520jobs%2520skills%2520and%2520wages/MGI-Jobs-Lost-Jobs-Gained-Executive-summary-December-6-2017.ashx"><span data-dcnode-id="643" style="text-decoration:underline"><span data-dcnode-id="644" instrument_node="">McKinsey also reveal</span></span></a><span data-dcnode-id="641" instrument_node=""> developments in software that could replace workers within the travel and leisure industry, banking, food service and cleaning. Transport too will see widespread changes when autonomous vehicles are good enough to replace people.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="638" instrument_node="">A useful table in </span><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oecd-ilibrary.org/docserver/2e2f4eea-en.pdf%3Fexpires%3D1533810056%26id%3Did%26accname%3Dguest%26checksum%3D4F43C48F475342AEF392AEE1B8813676"><span data-dcnode-id="636" style="text-decoration:underline"><span data-dcnode-id="637" instrument_node="">the OECD report</span></span></a><span data-dcnode-id="634" instrument_node=""> highlights the mean probability of automation for different sectors of the economy. While it is lower-level and skilled roles which score most highly, it’s interesting that industries and professions such as teaching, medicine, accounting and ICT are also at risk of changing and evolving due to technological advances. Innovation in automation software capable of social and cognitive intelligence, perception and manipulation, is moving at a rapid pace, according to the report.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">&nbsp;</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="626"><b data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">GAINS TO BE MADE</span></b></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="624" instrument_node="">As we saw in the table above, all impact reports, whether making short or long term predications, agree that a net gain in jobs is likely thanks to automation. Most refer to past technological progress as proof of how employment will adapt. Using the personal computer as a basis for its estimations, </span><a data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/~/media/McKinsey/Featured%2520Insights/Future%2520of%2520Organizations/What%2520the%2520future%2520of%2520work%2520will%2520mean%2520for%2520jobs%2520skills%2520and%2520wages/MGI-Jobs-Lost-Jobs-Gained-Executive-summary-December-6-2017.ashx"><span data-dcnode-id="622" style="text-decoration:underline"><span data-dcnode-id="623" instrument_node="">McKinsey’s study shows</span></span></a><span data-dcnode-id="620" instrument_node=""> how 15+ million new jobs were created in the US since 1980, despite the PC replacing certain functions. It also discusses how previous technological revolutions have led to increased leisure time, facilitating the rise of new industries such as entertainment, sport and DIY and the jobs within them.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="617" instrument_node="">The process is twofold, however, with a demand for existing jobs also expected to rise. </span><a data-dcnode-id="614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oecd-ilibrary.org/docserver/2e2f4eea-en.pdf%3Fexpires%3D1533810056%26id%3Did%26accname%3Dguest%26checksum%3D4F43C48F475342AEF392AEE1B8813676"><span data-dcnode-id="615" style="text-decoration:underline"><span data-dcnode-id="616" instrument_node="">OECD use a similar example</span></span></a><span data-dcnode-id="613" instrument_node=""> explaining how US bank teller numbers increased thanks to ATMs. Fewer tellers meant branch operation costs went down, but urban bank branches have subsequently increased by 43% during the last 30 years, meaning more tellers exist now than before ATMs.</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><img data-dcnode-id="610" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.eu-west-2.amazonaws.com/media.nigelwright.com/news/Automation%2BArticle%2Bimage%2B10.png&amp;raw" style="float:right;padding:10px;width:265px;height:310px"></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="607" instrument_node="">As the </span><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//researchbriefings.files.parliament.uk/documents/POST-PN-0534/POST-PN-0534.pdf"><span data-dcnode-id="605" style="text-decoration:underline"><span data-dcnode-id="606" instrument_node="">UK Government briefings</span></span></a><span data-dcnode-id="603" instrument_node=""> on the impact of automation on jobs claim,&nbsp; technological innovation never leads to long-term unemployment, but rather types of employment within professions change as specific tasks evolve and new tasks emerge. </span><a data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oecd-ilibrary.org/docserver/2e2f4eea-en.pdf%3Fexpires%3D1533810056%26id%3Did%26accname%3Dguest%26checksum%3D4F43C48F475342AEF392AEE1B8813676"><span data-dcnode-id="601" style="text-decoration:underline"><span data-dcnode-id="602" instrument_node="">Research also indicates</span></span></a><span data-dcnode-id="599" instrument_node=""> that roles tend to become more intensive. Bank tellers, for example, now deliver several of what McKinsey calls ‘ value added services’ which never existed before. Other occupations where analytical and social skills are required have also grown in line with a greater intensity in performing critical tasks associated with those roles. According to</span><span data-dcnode-id="595" style="text-decoration:underline"><span data-dcnode-id="598" instrument_node=""> </span><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oecd-ilibrary.org/employment/automation-skills-use-and-training_2e2f4eea-en"><span data-dcnode-id="597" instrument_node="">the OECD</span></a></span><span data-dcnode-id="594" instrument_node="">, scientists across different disciplines are more numerous and more productive now thanks to computer software taking on time consuming data work, enabling experts to engage is theory and methodology development, interpretation, writing and communication.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="591" instrument_node="">With regards to completely new jobs, McKinsey say by 2030 </span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/~/media/McKinsey/Featured%2520Insights/Future%2520of%2520Organizations/What%2520the%2520future%2520of%2520work%2520will%2520mean%2520for%2520jobs%2520skills%2520and%2520wages/MGI-Jobs-Lost-Jobs-Gained-Executive-summary-December-6-2017.ashx"><span data-dcnode-id="589" style="text-decoration:underline"><span data-dcnode-id="590" instrument_node="">8%-9% of roles</span></span></a><span data-dcnode-id="587" instrument_node=""> won’t be familiar to us today. It’s certain sectors, too, that will experience increases coinciding with automation, as well as other social and economic trends driving growth and changes in employment.</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="584" instrument_node="">First, the obvious area where new occupations will emerge will be within automation and robotics itself. This industry alone could be worth </span><a data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//researchbriefings.files.parliament.uk/documents/POST-PN-0534/POST-PN-0534.pdf"><span data-dcnode-id="582" style="text-decoration:underline"><span data-dcnode-id="583" instrument_node="">up to $11 trillion</span></span></a><span data-dcnode-id="580" instrument_node=""> globally by 2025. Sub sectors such as autonomous vehicles could account for </span><a data-dcnode-id="577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smmt.co.uk/wp-content/uploads/sites/2/CRT036586F-Connected-and-Autonomous-Vehicles-%25E2%2580%2593-The-UK-Economic-Opportu...1.pdf"><span data-dcnode-id="578" style="text-decoration:underline"><span data-dcnode-id="579" instrument_node="">£51 billion in the UK alone</span></span></a><span data-dcnode-id="576" instrument_node="">. Other industries expected to become hives for new types of employment include the wider </span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oecd-ilibrary.org/deliver/2e2f4eea-en.pdf%3FitemId%3D%252Fcontent%252Fpaper%252F2e2f4eea-en%26mimeType%3Dpdf"><span data-dcnode-id="574" style="text-decoration:underline"><span data-dcnode-id="575" instrument_node="">service sector</span></span></a><span data-dcnode-id="572" instrument_node="">, such as financial and management services as well as </span><a data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//researchbriefings.files.parliament.uk/documents/POST-PN-0534/POST-PN-0534.pdf"><span data-dcnode-id="570" style="text-decoration:underline"><span data-dcnode-id="571" instrument_node="">healthcare and education</span></span><span data-dcnode-id="569" instrument_node="">.</span></a></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">For healthcare, McKinsey offer the most in-depth insight into how that sector will evolve. The primary driver they see behind imminent healthcare worker demand is our aging populations. By 2030, an estimated 300 million more people aged over 65 years means a greater need for caring services. Automation won’t necessarily replace workers in this sector because the inherent skills required are difficult to automate, while lower wages means the industry remains a low priority for innovation. Employment at the top will rise too, however, in occupations like doctors, nurses and health technicians whose specialist skills are in demand.</span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="562" instrument_node="">Another facilitator for job growth is consumption. Driven by an emerging middle class in previously undeveloped regions of the world, by 2030 consumer spending will have </span><a data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/~/media/McKinsey/Featured%2520Insights/Future%2520of%2520Organizations/What%2520the%2520future%2520of%2520work%2520will%2520mean%2520for%2520jobs%2520skills%2520and%2520wages/MGI-Jobs-Lost-Jobs-Gained-Executive-summary-December-6-2017.ashx"><span data-dcnode-id="560" style="text-decoration:underline"><span data-dcnode-id="561" instrument_node="">increased by $23 trillion</span></span></a><span data-dcnode-id="558" instrument_node=""> during the previous decade and a half. McKinsey estimates 300+ million new jobs will emerge in occupations producing goods and services, as well as across the whole supporting infrastructure of the consumer industry. Difficult to automate jobs include everything from engineering, building and plumbing to accountants, analysts, IT professionals and other technology specialists. Generic functions such as management, and skills and competencies like </span><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//researchbriefings.files.parliament.uk/documents/POST-PN-0534/POST-PN-0534.pdf"><span data-dcnode-id="556" style="text-decoration:underline"><span data-dcnode-id="557" instrument_node="">digital, creativity, entrepreneurship, empathy, persuasion, negotiation and perception</span></span></a><span data-dcnode-id="554" instrument_node=""> will also be in demand and integral to new occupations that emerge.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="551" instrument_node="">In a London Business School backed study in 2016 which revealed </span><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//recruitmentbuzz.co.uk/o-new-study-reveals-100-jobs-future/"><span data-dcnode-id="549" style="text-decoration:underline"><span data-dcnode-id="550" instrument_node="">100 jobs of the future</span></span></a><span data-dcnode-id="547" instrument_node="">, it’s interesting to note how climate change, energy efficiency and space exploration are other areas facilitating the creation of new and previously unheard of jobs. Some stand-out titles from the list include: Vertical Farmer, Insect-based Food Developer, Drowned City Specialist, Solar Flight Specialist and Spaceport Designer.</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">&nbsp;</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="539"><b data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">UNDERLYING CONCERNS</span></b></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="537" instrument_node="">In 2018, several indicators show that employment is moving in the right direction, despite the march of automation. The </span><a data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oecd-ilibrary.org/docserver/2e2f4eea-en.pdf%3Fexpires%3D1533896031%26id%3Did%26accname%3Dguest%26checksum%3DD03F190D0A75FD812F89AE893F0C838A"><span data-dcnode-id="535" style="text-decoration:underline"><span data-dcnode-id="536" instrument_node="">OECD confirms</span></span></a><span data-dcnode-id="533" instrument_node=""> that US employment has risen 6% in the last 10 years, and a recent report by the European Commission showed similar trends in Europe. An additional </span><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.governmenteuropa.eu/employment-and-social-developments-in-europe-review-2018/89421/"><span data-dcnode-id="531" style="text-decoration:underline"><span data-dcnode-id="532" instrument_node="">3.5 million people</span></span></a><span data-dcnode-id="529" instrument_node=""> were working across the region between 2016 and 2017, while incomes also went up and levels of poverty decreased. Current momentum in the jobs market suggests the EU will reach its target of a 75% employment rate by 2020.</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">&nbsp;</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><img data-dcnode-id="523" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.eu-west-2.amazonaws.com/media.nigelwright.com/news/Automation%2BArticle%2Bimage%2B12.png&amp;raw" style="width:694px;height:172px;margin:0px auto;display:block"></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="520" instrument_node="">Regardless, worries that things are on the cusp of turning bad endure. </span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2018/aug/06/more-than-6m-workers-fear-being-replaced-by-machines-report"><span data-dcnode-id="518" style="text-decoration:underline"><span data-dcnode-id="519" instrument_node="">A recent UK survey</span></span></a><span data-dcnode-id="516" instrument_node="">, for example, revealed 37% (circa 10 million workers) fear employment circumstances will change for the worse over the next decade due to automation. While some fearmongering can be attributed to dramatic media coverage, some genuine concerns of how things may pan out exist. One is that the transition period will be protracted, leading to a conflagration of inequality. European income inequality </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euronews.com/2018/06/12/europe-s-ticking-time-bomb-wage-inequality"><span data-dcnode-id="514" style="text-decoration:underline"><span data-dcnode-id="515" instrument_node="">rises still</span></span></a><span data-dcnode-id="512" instrument_node="">, and as most new jobs require specialist knowledge and higher education, those at the top of the wage tree could experience pay increases, while demand for low-paid, easily automatable labour declines.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">&nbsp;</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><img data-dcnode-id="506" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.eu-west-2.amazonaws.com/media.nigelwright.com/news/Automation%2BArticle%2Bimage%2B13.png&amp;raw" style="width:690px;height:206px;margin:0px auto;display:block"></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="503" instrument_node="">Furthermore, significant employment increases in the past have relied on productivity gains driven by automation and other technological advances. While the Eurozone is </span><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/0e2d7ed6-2e89-11e8-a34a-7e7563b0b0f4"><span data-dcnode-id="501" style="text-decoration:underline"><span data-dcnode-id="502" instrument_node="">making gains in productivity</span></span></a><span data-dcnode-id="499" instrument_node="">, figures are only reaching pre-recession levels now, and only in some, but not all, states. All the while the trend globally </span><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//macronomy.blogspot.com/2016/06/macro-and-credit-optimism-bias.html%3F_sm_au_%3DiHVk7QvJ3DDWRjQS"><span data-dcnode-id="497" style="text-decoration:underline"><span data-dcnode-id="498" instrument_node="">suggests productivity has been in decline</span></span></a><span data-dcnode-id="495" instrument_node=""> for several years and is unlikely to ever reach levels recorded in the past. So much so, only 50% of </span><a data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pewinternet.org/2014/08/06/future-of-jobs/"><span data-dcnode-id="493" style="text-decoration:underline"><span data-dcnode-id="494" instrument_node="">experts surveyed in 2014</span></span></a><span data-dcnode-id="491" instrument_node=""> believed automation would continue to create jobs at a similar or faster rate than it displaces them. And if ‘not enough jobs’ is one side of the coin, McKinsey take another track suggesting it’s a </span><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/featured-insights/future-of-organizations-and-work/the-digital-future-of-work-what-will-automation-change"><span data-dcnode-id="489" style="text-decoration:underline"><span data-dcnode-id="490" instrument_node="">dearth of workers</span></span></a><span data-dcnode-id="487" instrument_node=""> due to several demographical factors such as aging, that will cause major problems. Other concerns flagged in UK Government research include over-regulation stifling innovation, as well as automation encouraging re-shoring of manufacturing to Europe. The latter posing &nbsp;potential negative effects on the global economy.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">&nbsp;</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="479"><b data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">SOLUTIONS: EDUCATION AND TRAINING</span></b></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">The general agreement within impact research is the overwhelming need for employers and Governments to invest in training and developing key skills. This will both offset disruption, as well as facilitate the transition into an automated future.</span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Research points to three interrelated strands to upskilling requirements:&nbsp;</span></p><span data-dcnode-id="472" instrument_node="">
</span><li data-dcnode-id="469"><b data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Training specialist skills</span></b></li><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="459"><a data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//researchbriefings.files.parliament.uk/documents/POST-PN-0534/POST-PN-0534.pdf"><span data-dcnode-id="466" style="text-decoration:underline"><span data-dcnode-id="467" instrument_node="">Training specialist skills</span></span></a><span data-dcnode-id="464" instrument_node="">, particularly those within the STEM (science, technology, engineering and mathematics) family, is essential. These skills will enable people to gain employment within the burgeoning automation sector, but also help people transition into roles where they’re working more closely with, and being assisted by, automated software and devices. It’s part of what McKinsey call a mass </span><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/featured-insights/future-of-organizations-and-work/the-digital-future-of-work-what-will-automation-change"><span data-dcnode-id="462" style="text-decoration:underline"><span data-dcnode-id="463" instrument_node="">redeployment of labour</span></span></a><span data-dcnode-id="460" instrument_node="">, training people to become adaptable so they can fulfil roles where the task or purpose changes due to automation. Careers, too, will become more varied as employment evolves.</span></p><span data-dcnode-id="458" instrument_node="">
</span><li data-dcnode-id="455"><b data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Boosting levels of education</span></b></li><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="449"><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oecd-ilibrary.org/social-issues-migration-health/the-risk-of-automation-for-jobs-in-oecd-countries_5jlz9h56dvq7-en"><span data-dcnode-id="452" style="text-decoration:underline"><span data-dcnode-id="453" instrument_node="">A 2016 OECD</span></span></a><span data-dcnode-id="450" instrument_node=""> study confirmed that those with higher degrees such as a Masters or PhD, were least likely to lose their job to automation. Less than 1% of highly educated workers were at risk versus 15% of workers whose highest qualification was up to secondary school level. Higher educational attainment, whether that’s professional training or some form of tertiary education, is critical.</span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">&nbsp;</span></p><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="443"><img data-dcnode-id="444" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.eu-west-2.amazonaws.com/media.nigelwright.com/news/Automation%2BArticle%2Bimage%2B14.png&amp;raw" style="width:690px;height:144px;margin:0px auto;display:block"></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">&nbsp;</span></p><span data-dcnode-id="439" instrument_node="">
</span><li data-dcnode-id="436"><b data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Skills and attributes</span></b></li><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="434" instrument_node="">A third strand is the types of skills and attributes gained through this upskilling process. Yes, STEM is one aspect, but not everyone has an aptitude in those areas. Instead, training in activities that require </span><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/~/media/McKinsey/Featured%2520Insights/Future%2520of%2520Organizations/What%2520the%2520future%2520of%2520work%2520will%2520mean%2520for%2520jobs%2520skills%2520and%2520wages/MGI-Jobs-Lost-Jobs-Gained-Executive-summary-December-6-2017.ashx"><span data-dcnode-id="432" style="text-decoration:underline"><span data-dcnode-id="433" instrument_node="">social and emotional skills</span></span></a><span data-dcnode-id="430" instrument_node="">, higher cognitive capabilities and creativity will take precedence. Academics at the Massachusetts Institute of Technology (MIT) Center for Digital Business indicate </span><a data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fastcompany.com/3046332/the-new-rules-of-work/what-work-will-look-like-in-2025"><span data-dcnode-id="428" style="text-decoration:underline"><span data-dcnode-id="429" instrument_node="">writing, NPD and even art</span></span></a><span data-dcnode-id="426" instrument_node=""> may be useful skills to have.&nbsp; The Pew Research Center further states that developing any ‘uniquely human’ and therefore </span><a data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pewinternet.org/files/2014/08/Future-of-AI-Robotics-and-Jobs.pdf"><span data-dcnode-id="424" style="text-decoration:underline"><span data-dcnode-id="425" instrument_node="">difficult to automate adroitness</span></span></a><span data-dcnode-id="422" instrument_node="">, should be encouraged.</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="419" instrument_node="">The need for training differs between countries. McKinsey highlight how the percentage of workers that would need to learn new skills or upgrade their education was </span><a data-dcnode-id="416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/~/media/McKinsey/Featured%2520Insights/Future%2520of%2520Organizations/What%2520the%2520future%2520of%2520work%2520will%2520mean%2520for%2520jobs%2520skills%2520and%2520wages/MGI-Jobs-Lost-Jobs-Gained-Executive-summary-December-6-2017.ashx"><span data-dcnode-id="417" style="text-decoration:underline"><span data-dcnode-id="418" instrument_node="">considerably higher in Japan</span></span></a><span data-dcnode-id="415" instrument_node=""> , than it was in the USA and Germany. Access to education and training is also better in some countries. Across OECD countries, however, a widespread issue is </span><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oecd-ilibrary.org/docserver/2e2f4eea-en.pdf%3Fexpires%3D1534235517%26id%3Did%26accname%3Dguest%26checksum%3DC3FD2B04090AEF07AE3BE28FF728CE06"><span data-dcnode-id="413" style="text-decoration:underline"><span data-dcnode-id="414" instrument_node="">poor participation</span></span></a><span data-dcnode-id="411" instrument_node=""> in training schemes, and education in general, by workers most at risk of automation. It recommends boosting adult learning initiatives outside of the workplace as a key policy for Governments over the next few years.&nbsp;</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="408" instrument_node="">European Commission documents point to </span><a data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//europa.eu/rapid/press-release_IP-18-4395_en.htm"><span data-dcnode-id="406" style="text-decoration:underline"><span data-dcnode-id="407" instrument_node="">'Skills Agenda for Europe'</span></span></a><span data-dcnode-id="404" instrument_node=""> and EU funding, as providing a strong foundation for equipping people in Europe with better skills at all levels. It also notes facilitating better cooperation between member states, training providers and companies as a key component of its strategy. Similarly, the UK Government is expanding training funding in automation technology, as well as seeking ways to leverage training programmes that enable humans to </span><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//researchbriefings.files.parliament.uk/documents/POST-PN-0534/POST-PN-0534.pdf"><span data-dcnode-id="402" style="text-decoration:underline"><span data-dcnode-id="403" instrument_node="">‘retain an advantage’</span></span></a><span data-dcnode-id="400" instrument_node=""> over automation technologies.</span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">&nbsp;</span></p><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="392"><b data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">SOLUTIONS: BEYOND SKILLS AND EDUCATION</span></b></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="390" instrument_node="">There are other initiatives which could help offset the disruption caused by automation. Some of these are being pursued while others remain at the conceptual stage as policy makers and investors work out how to deliver outcomes. On the policy side, they include </span><a data-dcnode-id="387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//researchbriefings.files.parliament.uk/documents/POST-PN-0534/POST-PN-0534.pdf"><span data-dcnode-id="388" style="text-decoration:underline"><span data-dcnode-id="389" instrument_node="">promoting work sharing</span></span></a><span data-dcnode-id="386" instrument_node="">, as well as various tax reforms aimed at increasing capital, business or consumption taxes while reducing taxes on labour. Another more contentious solution is for countries to introduce a universal basic income. This was already </span><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2017/jan/03/finland-trials-basic-income-for-unemployed"><span data-dcnode-id="384" style="text-decoration:underline"><span data-dcnode-id="385" instrument_node="">trialled in Finland</span></span></a><span data-dcnode-id="382" instrument_node=""> in 2017, and is widely debated by European policy makers.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="379" instrument_node="">With regards to investment, </span><a data-dcnode-id="376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/~/media/McKinsey/Featured%2520Insights/Future%2520of%2520Organizations/What%2520the%2520future%2520of%2520work%2520will%2520mean%2520for%2520jobs%2520skills%2520and%2520wages/MGI-Jobs-Lost-Jobs-Gained-Executive-summary-December-6-2017.ashx"><span data-dcnode-id="377" style="text-decoration:underline"><span data-dcnode-id="378" instrument_node="">McKinsey identify three areas</span></span></a><span data-dcnode-id="375" instrument_node=""> where they believe heightened investment will create a demand for work. The first is infrastructure and specifically construction. 80 million to 200 million jobs could be created according to estimations, helping offset the displacement of workers in other sectors. Housing shortages is one main driver for investment and the range of jobs the sector supports are broad and includes architects and engineers, skilled trades people, construction workers, machinery operators and other lower skilled positions.</span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"><img data-dcnode-id="372" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.eu-west-2.amazonaws.com/media.nigelwright.com/news/Automation%2BArticle%2Bimage%2B15.png&amp;raw" style="float:right;padding:10px;width:248px;height:235px"></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="369"></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="367"></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Energy is another sector where investment is needed and where the positive knock-on effect for employment would be welcomed amidst rising automation. Climate change is an obvious catalyst for innovation and, according to McKinsey, giving a boost to industries supporting renewable energy and energy efficiency could create up to 20 million jobs by 2030. Finally, another contentious solution is the marketisation of previously unpaid domestic work including childcare, early childhood education, cleaning, cooking and gardening. Up to 90&nbsp;million new jobs could be created in this scenario, according to the report.</span></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">&nbsp;</span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="357"><b data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">WHO’S PREPARED?</span></b></p><span data-dcnode-id="356" instrument_node="">In conclusion, we found a recent Economist backed study helpful in assessing which countries were most prepared for the imminent automation revolution. Going beyond skills and training, the study also considers various other factors such as a country’s innovation environment, as well as education and labour market policies. Out of the 25 countries assessed, it’s encouraging that Germany, France and the UK make the top ten, while perhaps surprising that the USA is only ninth on the list.&nbsp; To find out more, visit </span><a data-dcnode-id="353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.automationreadiness.eiu.com/"><span data-dcnode-id="354" style="text-decoration:underline"><span data-dcnode-id="355" instrument_node="">http://www.automationreadiness.eiu.com</span></span></a><span data-dcnode-id="352" instrument_node="">.
</span><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">&nbsp;</span></p><span data-dcnode-id="349" instrument_node="">
</span><img data-dcnode-id="348" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.eu-west-2.amazonaws.com/media.nigelwright.com/news/Untitled-1.png&amp;raw" style="width:712px;height:372px;margin:0px auto;display:block"><img data-dcnode-id="347" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.eu-west-2.amazonaws.com/media.nigelwright.com/news/Automation%2BArticle%2Bimage%2B17.JPG&amp;raw" style="width:711px;height:260px;margin:0px auto;display:block"><span data-dcnode-id="346" instrument_node="">
