</span><div class="c-article-body" data-article-body="true" data-dcnode-id="661" data-track-component="article body"><span data-dcnode-id="1458" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="1451" data-gtm-vis-first-on-screen-50443292_562="598" data-gtm-vis-first-on-screen-50443292_563="598" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="598" data-gtm-vis-recent-on-screen-50443292_563="598" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="1452" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1456" id="Abs1"><span data-dcnode-id="1457" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="1453" id="Abs1-content"><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">This viewpoint discusses the impacts of automation technologies on tourism and hospitality jobs by delving into the mechanisms through which automation eliminates, transforms, and creates job positions in the industry. It elaborates on the tourism and hospitality jobs of the future, the skills that tourism and hospitality employees would need, and the implication of automation for tourism and hospitality education.</span></p></div></div></section><span data-dcnode-id="1450" instrument_node="">
</span><section data-dcnode-id="1373" data-gtm-vis-first-on-screen-50443292_562="598" data-gtm-vis-first-on-screen-50443292_563="598" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="598" data-gtm-vis-recent-on-screen-50443292_563="598" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="1374" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1448" id="Sec1"><span data-dcnode-id="1449" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="1375" id="Sec1-content"><p data-dcnode-id="1416"><span data-dcnode-id="1447" instrument_node="">Automation technologies include industrial and social robots, self-service kiosks, artificial intelligence, chatbots, face recognition technology, voice controlled technologies, wearable and implanted technologies, additive manufacturing (3D printing), internet of things, and other technologies that are used for the production and delivery of good and services instead of human employees. They serve as the technological basis for Industry 4.0 (Schwab </span><a aria-label="Reference 2016" data-dcnode-id="1445" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d224720328e302" title="Schwab K (2016) The fourth industrial revolution. World Economic Forum, Cologne"><span data-dcnode-id="1446" instrument_node="">2016</span></a><span data-dcnode-id="1444" instrument_node="">; Skilton and Hovsepian </span><a aria-label="Reference 2018" data-dcnode-id="1442" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d224720328e305" title="Skilton M, Hovsepian F (2018) The 4th industrial revolution: responding to the impact of artificial intelligence on business. Palgrave Macmillan, Cham"><span data-dcnode-id="1443" instrument_node="">2018</span></a><span data-dcnode-id="1441" instrument_node="">) and change the global political and economic landscape (WEF </span><a aria-label="Reference 2019" data-dcnode-id="1439" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d224720328e308" title="World Economic Forum (WEF) (2019) Globalization 4.0. Shaping a new global architecture in the age of the fourth industrial revolution. White paper. 
http://www3.weforum.org/docs/WEF_Globalization_4.0_Call_for_Engagement.pdf

. Accessed 21 March 2020"><span data-dcnode-id="1440" instrument_node="">2019</span></a><span data-dcnode-id="1438" instrument_node="">). While manufacturing is largely automated, this is not the case with services where automation is yet to unfold its full potential (Huang and Rust </span><a aria-label="Reference 2018" data-dcnode-id="1436" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d224720328e311" title="Huang MH, Rust RT (2018) Artificial intelligence in service. J Serv Res 21(2):155–172"><span data-dcnode-id="1437" instrument_node="">2018</span></a><span data-dcnode-id="1435" instrument_node="">; Wirtz et al. </span><a aria-label="Reference 2018" data-dcnode-id="1433" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d224720328e314" title="Wirtz J, Patterson P, Kunz W, Gruber T, Lu VN, Paluch S, Martins A (2018) Brave new world: service robots in the frontline. J Serv Manag 29(5):907–931"><span data-dcnode-id="1434" instrument_node="">2018</span></a><span data-dcnode-id="1432" instrument_node="">). Within tourism and hospitality, the use of robots, artificial intelligence and service automation is still in its infancy (Ivanov and Webster </span><a aria-label="Reference 2019a" data-dcnode-id="1430" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d224720328e318" title="Ivanov S, Webster C (eds) (2019a) Robots, artificial intelligence and service automation in travel, tourism and hospitality. Emerald Publishing, Bingley"><span data-dcnode-id="1431" instrument_node="">2019a</span></a><span data-dcnode-id="1429" instrument_node="">; Murphy et al. </span><a aria-label="Reference 2017" data-dcnode-id="1427" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d224720328e321" title="Murphy J, Hofacker C, Gretzel U (2017) Dawning of the age of robots in hospitality and tourism: challenges for teaching and research. Eur J Tour Res 15:104–111"><span data-dcnode-id="1428" instrument_node="">2017</span></a><span data-dcnode-id="1426" instrument_node="">), but technological progress and declining birth rates would force tourism and hospitality companies to look at automation as a pathway to innovation, competitive advantage, productivity and profitability (Ivanov and Webster </span><a aria-label="Reference 2019b" data-dcnode-id="1424" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d224720328e324" title="Ivanov S, Webster C (2019b) Conceptual framework of the use of robots, artificial intelligence and service automation in travel, tourism, and hospitality companies. In: Ivanov S, Webster C (eds) Robots, artificial intelligence and service automation in travel, tourism and hospitality. Emerald Publishing, Bingley, pp 7–37"><span data-dcnode-id="1425" instrument_node="">2019b</span></a><span data-dcnode-id="1423" instrument_node="">; Makridakis </span><a aria-label="Reference 2017" data-dcnode-id="1421" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d224720328e327" title="Makridakis S (2017) The forthcoming artificial intelligence (AI) revolution: its impact on society and firms. Futures 90:46–60"><span data-dcnode-id="1422" instrument_node="">2017</span></a><span data-dcnode-id="1420" instrument_node="">; Pencarelli </span><a aria-label="Reference 2019" data-dcnode-id="1418" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d224720328e330" title="Pencarelli T (2019) The digital revolution in the travel and tourism industry. Inf Technol Tour. 
https://doi.org/10.1007/s40558-019-00160-3


"><span data-dcnode-id="1419" instrument_node="">2019</span></a><span data-dcnode-id="1417" instrument_node="">).</span></p><p data-dcnode-id="1378"><span data-dcnode-id="1415" instrument_node="">The introduction of automation technologies raises fears of job losses and technological unemployment due to the substitution of human employees by robots, AI and other automation technologies (Dengler and Matthes </span><a aria-label="Reference 2018" data-dcnode-id="1413" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d224720328e336" title="Dengler K, Matthes B (2018) The impacts of digital transformation on the labour market: substitution potentials of occupations in Germany. Technol Forecast Soc Chang 137:304–316"><span data-dcnode-id="1414" instrument_node="">2018</span></a><span data-dcnode-id="1412" instrument_node="">; Frey and Osborne </span><a aria-label="Reference 2017" data-dcnode-id="1410" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d224720328e339" title="Frey CB, Osborne MA (2017) The future of employment: how susceptible are jobs to computerisation? Technol Forecast Soc Chang 114:254–280"><span data-dcnode-id="1411" instrument_node="">2017</span></a><span data-dcnode-id="1409" instrument_node="">; Li et al. </span><a aria-label="Reference 2019" data-dcnode-id="1407" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d224720328e342" title="Li JJ, Bonn MA, Ye BH (2019) Hotel employee’s artificial intelligence and robotics awareness and its impact on turnover intention: the moderating roles of perceived organizational support and competitive psychological climate. Tour Manag 73:172–181"><span data-dcnode-id="1408" instrument_node="">2019</span></a><span data-dcnode-id="1406" instrument_node="">; Walsh </span><a aria-label="Reference 2018" data-dcnode-id="1404" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d224720328e345" title="Walsh T (2018) Expert and non-expert opinion about technological unemployment. Int J Autom Comput 15(5):637–642. 
https://doi.org/10.1007/s11633-018-1127-x


"><span data-dcnode-id="1405" instrument_node="">2018</span></a><span data-dcnode-id="1403" instrument_node="">). Other authors see the potential of automation for creating value for customers and shareholders, for improving health, well-being and quality of life of people (Brynjolfsson and McAfee </span><a aria-label="Reference 2014" data-dcnode-id="1401" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d224720328e348" title="Brynjolfsson E, McAfee A (2014) The second machine age: work, progress, and prosperity in a time of brilliant technologies. WW Norton and Company, New York"><span data-dcnode-id="1402" instrument_node="">2014</span></a><span data-dcnode-id="1400" instrument_node="">; Frank et al. </span><a aria-label="Reference 2017" data-dcnode-id="1398" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d224720328e352" title="Frank M, Roehring P, Pring B (2017) What to do when machines do everything: how to get ahead in a world of AI, algorithms, bots and big data. Wiley, Hoboken"><span data-dcnode-id="1399" instrument_node="">2017</span></a><span data-dcnode-id="1397" instrument_node="">; LaGrandeur and Hughes </span><a aria-label="Reference 2017" data-dcnode-id="1395" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d224720328e355" title="LaGrandeur K, Hughes JJ (eds) (2017) Surviving the machine age. Intelligent technology and the transformation of human work. Palgrave Macmillan, London"><span data-dcnode-id="1396" instrument_node="">2017</span></a><span data-dcnode-id="1394" instrument_node="">; Talwar et al. </span><a aria-label="Reference 2017" data-dcnode-id="1392" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d224720328e358" title="Talwar R, Wells S, Whittington A, Koury A, Romero M (2017) The future reinvented. Reimagining life, society, and business. Fast Future Publishing, London"><span data-dcnode-id="1393" instrument_node="">2017</span></a><span data-dcnode-id="1391" instrument_node="">). Regardless of their differences, all authors agree that automation will change the nature of work, the job positions for and the skill required by human employees (Ernst et al. </span><a aria-label="Reference 2019" data-dcnode-id="1389" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d224720328e361" title="Ernst E, Merola R, Samaan D (2019) Economics of artificial intelligence: implications for the future of work. IZA J Labor Policy 9(1):20190004. 
https://doi.org/10.2478/izajolp-2019-0004


"><span data-dcnode-id="1390" instrument_node="">2019</span></a><span data-dcnode-id="1388" instrument_node="">; Webster and Ivanov </span><a aria-label="Reference 2020" data-dcnode-id="1386" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d224720328e364" title="Webster C, Ivanov S (2020) Robotics, artificial intelligence, and the evolving nature of work. In: George B, Paul J (eds) Digital transformation in business and society theory and cases. Palgrave-MacMillan, Cham, pp 127–143"><span data-dcnode-id="1387" instrument_node="">2020</span></a><span data-dcnode-id="1385" instrument_node="">; West </span><a aria-label="Reference 2018" data-dcnode-id="1383" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d224720328e367" title="West DM (2018) The future of work: robots, AI, and automation. Brookings Institution Press, Washington"><span data-dcnode-id="1384" instrument_node="">2018</span></a><span data-dcnode-id="1382" instrument_node="">). Moreover, these new technologies would require new managerial mindsets (Ringberg et al. </span><a aria-label="Reference 2019" data-dcnode-id="1380" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d224720328e371" title="Ringberg T, Reihlen M, Rydén P (2019) The technology-mindset interactions: leading to incremental, radical or revolutionary innovations. Ind Mark Manag 79:102–113"><span data-dcnode-id="1381" instrument_node="">2019</span></a><span data-dcnode-id="1379" instrument_node="">) to facilitate their adoption by tourism and hospitality companies, to reorganise operational processes, and to overcome complacency and resistance to change by both customers and employees.</span></p><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">In the light of the above discussion, this viewpoint aims at elaborating on the impacts of automation technologies on tourism and hospitality jobs by delving into the mechanisms through which automation eliminates, changes, and creates job positions in the industry. The paper looks at the tourism and hospitality jobs of the future, the future skills required by tourism and hospitality employees, and sketches some of the implications of automation for tourism and hospitality education.</span></p></div></div></section><section data-dcnode-id="1169" data-gtm-vis-first-on-screen-50443292_562="598" data-gtm-vis-first-on-screen-50443292_563="598" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="598" data-gtm-vis-recent-on-screen-50443292_563="598" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Automation of tasks of tourism and hospitality employees"><div class="c-article-section" data-dcnode-id="1170" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1371" id="Sec2"><span data-dcnode-id="1372" instrument_node="">Automation of tasks of tourism and hospitality employees</span></h2><div class="c-article-section__content" data-dcnode-id="1171" id="Sec2-content"><p data-dcnode-id="1354"><span data-dcnode-id="1370" instrument_node="">The impact of automation of jobs in tourism and hospitality is not as straightforward as may seem at first sight because of various reasons. First, tourism and hospitality services are very heterogeneous—one and the same service process can be implemented in different ways in different companies depending on their size, category, internal operating procedures, market positioning strategy, etc. A restaurant with a low-cost strategy, for example, will have very different operating procedures, processes; and tasks, compared to a Michelin-starred fine dining restaurant. Second, tourism and hospitality companies include a wide variety of processes and job positions that have various degrees of automatability. Some of these processes (front-of-house) involve customers while others do not (back-of-house processes). Back-of-house processes are easier to control and could be reorganised to facilitate their automation, while the automation of front-of-house processes may face the resistance of customers (Ivanov and Webster </span><a aria-label="Reference 2018" data-dcnode-id="1368" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d224720328e385" title="Ivanov S, Webster C (2018) Adoption of robots, artificial intelligence and service automation by travel, tourism and hospitality companies—a cost–benefit analysis. In: Marinov V, Vodenska M, Assenova M, Dogramadjieva E (eds) Traditions and innovations in contemporary tourism. Cambridge Scholars Publishing, Cambridge, pp 190–203"><span data-dcnode-id="1369" instrument_node="">2018</span></a><span data-dcnode-id="1367" instrument_node="">), although employees may fear automation as well (Li et al. </span><a aria-label="Reference 2019" data-dcnode-id="1365" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d224720328e388" title="Li JJ, Bonn MA, Ye BH (2019) Hotel employee’s artificial intelligence and robotics awareness and its impact on turnover intention: the moderating roles of perceived organizational support and competitive psychological climate. Tour Manag 73:172–181"><span data-dcnode-id="1366" instrument_node="">2019</span></a><span data-dcnode-id="1364" instrument_node="">). Third, many tourism and hospitality services require emotional intelligence and empathy—e.g. for communicating with customers (Kim et al. </span><a aria-label="Reference 2012" data-dcnode-id="1362" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d224720328e391" title="Kim TT, Yoo JJE, Lee G, Kim J (2012) Emotional intelligence and emotional labor acting strategies among frontline hotel employees. Int J Contemp Hosp Manag 24(7):1029–1046"><span data-dcnode-id="1363" instrument_node="">2012</span></a><span data-dcnode-id="1361" instrument_node="">). The automation of these service may eliminate a vital component of their perceived service quality (Koc </span><a aria-label="Reference 2019" data-dcnode-id="1359" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d224720328e394" title="Koc E (2019) Do women make better in tourism and hospitality? A conceptual review from a customer satisfaction and service quality perspective. J Qual Assur Hosp Tour. 
https://doi.org/10.1080/1528008X.2019.1672234


"><span data-dcnode-id="1360" instrument_node="">2019</span></a><span data-dcnode-id="1358" instrument_node="">; Markovic et al. </span><a aria-label="Reference 2013" data-dcnode-id="1356" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d224720328e397" title="Markovic S, Raspor S, Ivankovic G, Planinc T (2013) A study of expected and perceived service quality in Croatian and Slovenian hotel industry. Eur J Tour Res 6(1):36–52"><span data-dcnode-id="1357" instrument_node="">2013</span></a><span data-dcnode-id="1355" instrument_node="">). Hence, the impacts of automation technologies cannot be generalised and would be company-specific. That is why in this paper I focus on the basic mechanisms of the impacts of automation on tourism and hospitality jobs, rather than on the exact impacts of specific technologies on specific job positions.</span></p><p data-dcnode-id="1349"><span data-dcnode-id="1353" instrument_node="">As Ivanov and Webster (</span><a aria-label="Reference 2019c" data-dcnode-id="1351" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d224720328e403" title="Ivanov S, Webster C (2019c) Economic fundamentals of the use of robots, artificial intelligence and service automation in travel, tourism and hospitality. In: Ivanov S, Webster C (eds) Robots, artificial intelligence and service automation in travel, tourism and hospitality. Emerald Publishing, Bingley, pp 39–55"><span data-dcnode-id="1352" instrument_node="">2019c</span></a><span data-dcnode-id="1350" instrument_node="">) point out, automation has both substitution and enhancement effects on jobs simultaneously. Automation has a substitution effect on jobs when it replaces humans in the tasks that they currently perform. An enhancement effect happens when automation does not lead to the elimination of a job position but increases the productivity of the employee. The impact on tourism/hospitality jobs depends on the balance between the two effects and goes through the impact of automation on the process tasks that are grouped into separate job positions.</span></p><p data-dcnode-id="1296"><span data-dcnode-id="1348" instrument_node="">Figures&nbsp;</span><a data-dcnode-id="1346" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1347" instrument_node="">1</span></a><span data-dcnode-id="1345" instrument_node="">, </span><a data-dcnode-id="1343" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1344" instrument_node="">2</span></a><span data-dcnode-id="1342" instrument_node="">, and </span><a data-dcnode-id="1340" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1341" instrument_node="">3</span></a><span data-dcnode-id="1339" instrument_node=""> present, graphically, the impacts of automation. Figure&nbsp;</span><a data-dcnode-id="1337" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1338" instrument_node="">1</span></a><span data-dcnode-id="1336" instrument_node=""> shows the processes, the tasks that constitute the processes, and the grouping of tasks into job positions before the introduction of a particular type of automation (e.g. a self-check-in kiosk at the reception, a social robot in the lobby of a hotel, a room service robot, an automated pricing module in the property management system of a hotel, autonomous vehicle for food delivery, a social media chatbot, etc.). For simplicity, the figure shows the tasks of three hypothetical processes that are grouped into three hypothetical job positions. The impact of automation on tasks is depicted in Fig.&nbsp;</span><a data-dcnode-id="1334" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1335" instrument_node="">2</span></a><span data-dcnode-id="1333" instrument_node="">—some of the existing tasks are automated (marked in dark grey), while new tasks are introduced (marked in dashed ovals). The result of automation is that all tasks constituting </span><i data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Process 1</span></i><span data-dcnode-id="1330" instrument_node=""> are eliminated for human employees, and the whole process is now automated. The process will still be implemented within the company but without human involvement. Some tasks in </span><i data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Process 2</span></i><span data-dcnode-id="1327" instrument_node=""> are automated but not all of them. Automation has no impact on </span><i data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Process 3</span></i><span data-dcnode-id="1324" instrument_node="">, but it has created a completely new process (</span><i data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Process 4</span></i><span data-dcnode-id="1321" instrument_node="">) and new tasks for human employees for </span><i data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Processes 2</span></i><span data-dcnode-id="1318" instrument_node=""> and </span><i data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">4</span></i><span data-dcnode-id="1315" instrument_node="">. The elimination of most of the tasks performed for </span><i data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Job position 1</span></i><span data-dcnode-id="1312" instrument_node=""> means that the remaining two tasks can be reallocated and the whole job position is eliminated. Hence, for that job position the substitution effect is stronger than the enhancement effect and the job position is removed because it is not necessary and economically viable. </span><i data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Job position 2</span></i><span data-dcnode-id="1309" instrument_node=""> loses some of the tasks that were previously performed but it is enriched with the reallocated tasks from </span><i data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Job position 1</span></i><span data-dcnode-id="1306" instrument_node="">. Thus, for it the substitution and enhancement effects are relatively balanced. </span><i data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Job position 3</span></i><span data-dcnode-id="1303" instrument_node=""> loses a task as well but is it enhanced by newly created tasks due to automation (e.g. operating a room service robot), i.e. the enhancement effect prevails. Some of the newly created tasks are grouped into the new </span><i data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Job position 4</span></i><span data-dcnode-id="1300" instrument_node="">, that did not exist before automation. Some of the existing tasks from other job positions could be reallocated to it as well. Finally, Fig.&nbsp;</span><a data-dcnode-id="1298" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1299" instrument_node="">3</span></a><span data-dcnode-id="1297" instrument_node=""> shows the processes, tasks, and job positions after automation.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1272" data-gtm-vis-first-on-screen-50443292_561="597" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="597" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure" data-title="Fig.&nbsp;1" id="figure-1"><figure data-dcnode-id="1273"><figcaption data-dcnode-id="1293"><b class="c-article-section__figure-caption" data-dcnode-id="1294" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="1295" instrument_node="">Fig.&nbsp;1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1284"><div class="c-article-section__figure-item" data-dcnode-id="1288"><a class="c-article-section__figure-link" data-dcnode-id="1289" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40558-020-00175-1/figures/1" rel="nofollow"><picture data-dcnode-id="1290"><source data-dcnode-id="1292" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs40558-020-00175-1/MediaObjects/40558_2020_175_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="1291" height="405" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s40558-020-00175-1/MediaObjects/40558_2020_175_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1285" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Processes, tasks and job positions for human employees before automation</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1274"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="1275" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40558-020-00175-1/figures/1" rel="nofollow"><span data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Full size image</span></span><svg aria-hidden="true" </span></a></div></figure></div><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1224" data-gtm-vis-first-on-screen-50443292_561="598" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="598" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure" data-title="Fig.&nbsp;3" id="figure-3"><figure data-dcnode-id="1225"><figcaption data-dcnode-id="1245"><b class="c-article-section__figure-caption" data-dcnode-id="1246" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="1247" instrument_node="">Fig.&nbsp;3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1236"><div class="c-article-section__figure-item" data-dcnode-id="1240"><a class="c-article-section__figure-link" data-dcnode-id="1241" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40558-020-00175-1/figures/3" rel="nofollow"><picture data-dcnode-id="1242"><source data-dcnode-id="1244" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs40558-020-00175-1/MediaObjects/40558_2020_175_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="1243" height="409" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s40558-020-00175-1/MediaObjects/40558_2020_175_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1237" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Processes, tasks and job positions for human employees after automation</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1226"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="1227" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40558-020-00175-1/figures/3" rel="nofollow"><span data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1228" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1229" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1230" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1233" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1232" fill-rule="evenodd"></path><span data-dcnode-id="1231" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1201"><span data-dcnode-id="1223" instrument_node="">The impact of automation on jobs depends on the balance of substitution and enhancement effect on tasks of the existing jobs and the new job creation. If automation eliminates more tasks for human employees than it creates, the overall effect on tourism/hospitality jobs would be negative. And vice versa—if the enhancement effect and the new job creation are stronger than the substitution effect, the number of tourism/hospitality jobs would increase. The balance between the substitution and the enhancement effects depends on several factors: the set of tasks included in a process, the relative productivity of automation technologies vs. human employees, and a company’s service capacity and its level of utilisation (Ivanov and Webster </span><a aria-label="Reference 2019c" data-dcnode-id="1221" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d224720328e487" title="Ivanov S, Webster C (2019c) Economic fundamentals of the use of robots, artificial intelligence and service automation in travel, tourism and hospitality. In: Ivanov S, Webster C (eds) Robots, artificial intelligence and service automation in travel, tourism and hospitality. Emerald Publishing, Bingley, pp 39–55"><span data-dcnode-id="1222" instrument_node="">2019c</span></a><span data-dcnode-id="1220" instrument_node="">, </span><a aria-label="Reference d" data-dcnode-id="1218" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d224720328e490" title="Ivanov S, Webster C (2019d) Robots in tourism: a research agenda for tourism economics. Tour Econ. 
https://doi.org/10.1177/1354816619879583


"><span data-dcnode-id="1219" instrument_node="">d</span></a><span data-dcnode-id="1217" instrument_node="">). If a process includes mainly tasks that can be easily automated (e.g. information processing, moving items), or it is a batch or line process (e.g. making pancakes/donuts), then the whole process is likely to be automated through self-service kiosks (for hotel check-in/out), social robots (concierge/information provision), room service delivery robots, automated pricing software, automated refunds for cancelled flights, social media chatbots, or virtual/augmented/mixed reality in museums, to name just a few examples. In that case, substitution effect will prevail. If, on the contrary, a process is not well structured and requires more discretion, emotional intelligence, and creativity by the employee (e.g. customised gourmet dish, spa services); automation may eliminate some tasks but not the whole process or job position. Hence, the enhancement effect prevails. Additionally, if the revenues per dollar costs for automation technologies are higher than the revenues per dollar costs for human employees, tourism and hospitality companies would have strong economic stimuli to substitute their human employees with automation technologies and vice versa. However, following the institutional theory (DiMaggio and Powell </span><a aria-label="Reference 1983" data-dcnode-id="1215" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d224720328e493" title="DiMaggio J, Powell W (1983) The iron cage revisited: institutional isomorphism and collective rationality in organizational fields. Am Sociol Rev 48(2):147–160"><span data-dcnode-id="1216" instrument_node="">1983</span></a><span data-dcnode-id="1214" instrument_node="">), the adoption of a specific automation technology might be a result of mimetic pressure (e.g. because competitors have been already using it), normative pressure (e.g. because it is required to do so by law), or coercive pressure (e.g. because a powerful partner such as a franchisor is insisting on it or customers expect that the company uses it). A company’s market positioning and target market’s preferences may drive the choice whether to automate processes or not. Therefore, in practice, the economic efficiency of automation technologies and their productivity relative to human employees, might not always be relevant considerations when tourism and hospitality managers make decisions in investment in automation. Finally, the enhancement effect will be stronger if: (a) automation technologies expand the service capacity of tourism and hospitality companies (e.g. online bookings of tours and hotel accommodation via a chatbots) or the utilisation of that service capacity (e.g. room service delivery robot), without additional human employees; or (b) when the additional (marginal) revenues generated by automation technologies are higher than the additional (marginal) costs for newly hired human employees. In both cases, automation technologies decrease the costs to serve one guest, but companies do not have economic stimuli to lay off people. On the other hand, the substitution effect will prevail if: (a) a service or a task has a fixed and well-utilised capacity that automation technologies cannot easily increase (e.g. a hotel with a very high occupancy rate), or (b) when the demand for a service/task is secondary (e.g. it is provided to guests that are already accommodated in a hotel) and it is limited by that fixed capacity (e.g. concierge services in a hotel). In these situations, the use of automation technologies will not generate sufficient additional demand; thus companies will focus on cost savings and substituting human employees for automation technologies (Ivanov and Webster </span><a aria-label="Reference 2019c" data-dcnode-id="1212" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d224720328e496" title="Ivanov S, Webster C (2019c) Economic fundamentals of the use of robots, artificial intelligence and service automation in travel, tourism and hospitality. In: Ivanov S, Webster C (eds) Robots, artificial intelligence and service automation in travel, tourism and hospitality. Emerald Publishing, Bingley, pp 39–55"><span data-dcnode-id="1213" instrument_node="">2019c</span></a><span data-dcnode-id="1211" instrument_node="">, </span><a aria-label="Reference d" data-dcnode-id="1209" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d224720328e499" title="Ivanov S, Webster C (2019d) Robots in tourism: a research agenda for tourism economics. Tour Econ. 
https://doi.org/10.1177/1354816619879583


"><span data-dcnode-id="1210" instrument_node="">d</span></a><span data-dcnode-id="1208" instrument_node="">). However, in the long term, the advances in robots, artificial intelligence, and service automation (Bhaumik </span><a aria-label="Reference 2018" data-dcnode-id="1206" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d224720328e503" title="Bhaumik A (2018) From AI to robotics: mobile, social, and sentient robots. CRC Press, Boca Raton"><span data-dcnode-id="1207" instrument_node="">2018</span></a><span data-dcnode-id="1205" instrument_node="">; Russell and Norvig </span><a aria-label="Reference 2016" data-dcnode-id="1203" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d224720328e506" title="Russell SJ, Norvig P (2016) Artificial intelligence: a modern approach. Pearson Education Limited, Harlow"><span data-dcnode-id="1204" instrument_node="">2016</span></a><span data-dcnode-id="1202" instrument_node="">) allow the automation of a growing number of tasks which are currently within the realm of human employees, but in the future might be successfully performed by automation technologies.</span></p><p data-dcnode-id="1172"><span data-dcnode-id="1200" instrument_node="">The impact of a particular automation technology on a particular process would be very specific and, following the TOE (‘Technology-Organisation-Environment’) framework of Tornatzky and Fleischer (</span><a aria-label="Reference 1990" data-dcnode-id="1198" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d224720328e513" title="Tornatzky LG, Fleischer M (1990) The process of technological innovation. Lexington Books, Lexington"><span data-dcnode-id="1199" instrument_node="">1990</span></a><span data-dcnode-id="1197" instrument_node="">), it would vary by company, type of technology, and process. The specific mechanism how a particular human-delivered task is being replaced by technology is different for each task. Some of the ways are very straightforward—e.g. hotel guests are issued an access card by a kiosk instead of by a human employee. In that case, the task is the same, but is implemented by an automation technology; this corresponds to </span><i data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Process 1</span></i><span data-dcnode-id="1194" instrument_node=""> on Figs.&nbsp;</span><a data-dcnode-id="1192" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1193" instrument_node="">1</span></a><span data-dcnode-id="1191" instrument_node="">, </span><a data-dcnode-id="1189" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1190" instrument_node="">2</span></a><span data-dcnode-id="1188" instrument_node=""> and </span><a data-dcnode-id="1186" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1187" instrument_node="">3</span></a><span data-dcnode-id="1185" instrument_node="">. In other situations, the replacement is a bit different, because the whole process is transformed. For example, if a hotel offers an application which customers can use to access the hotel and their rooms, the task of issuing access cards is eliminated completely and is replaced by another task that is completely automated; this corresponds to a combination between </span><i data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Processes 1 and 4</span></i><span data-dcnode-id="1182" instrument_node=""> on Figs.&nbsp;</span><a data-dcnode-id="1180" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1181" instrument_node="">1</span></a><span data-dcnode-id="1179" instrument_node="">, </span><a data-dcnode-id="1177" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1178" instrument_node="">2</span></a><span data-dcnode-id="1176" instrument_node="">, and </span><a data-dcnode-id="1174" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1175" instrument_node="">3</span></a><span data-dcnode-id="1173" instrument_node="">. Furthermore, each automation technology has a different effect on tourism/hospitality jobs depending on its technical characteristics, ubiquity, and scale of their adoption in a company. Technology that is widespread and can be used for various tasks (e.g. smartphones and mobile applications, self-service kiosks) has a larger potential effect on jobs, compared to a technology with currently limited capabilities and/or areas of application (e.g. room service delivery robots). Additionally, size matters too: a large 4000-room casino hotel with several hundred human employees could easily use various automation technologies (e.g. room service robots, entertainment robots, information kiosks, automated pricing software, in-room voice activated devices, face recognition of gamblers, chatbot for online communications, etc.), that could eliminate a substantial number of jobs. At the same time, an 80-room city hotel might not have the financial resources for large scale adoption of various automation technologies and might settle for a room service robot or an information kiosk that would enhance rather than replace the human employees due to the small total number of human employees working in it.</span></p></div></div></section><section data-dcnode-id="1121" data-title="Implications of automation of tourism and hospitality jobs"><div class="c-article-section" data-dcnode-id="1122" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1167" id="Sec3"><span data-dcnode-id="1168" instrument_node="">Implications of automation of tourism and hospitality jobs</span></h2><div class="c-article-section__content" data-dcnode-id="1123" id="Sec3-content"><h3 class="c-article__sub-heading" data-dcnode-id="1165" id="Sec4"><span data-dcnode-id="1166" instrument_node="">Tourism and hospitality jobs of the future</span></h3><p data-dcnode-id="1160"><span data-dcnode-id="1164" instrument_node="">Automation will eliminate or significantly decrease the number of some jobs, change the tasks and the nature of work for others, and create new job positions. By 2030, the growth of the tourism industry, combined with the insufficient number of employees looking for a carrier in tourism and hospitality due to low birth rates, will force tourism and hospitality companies in developed economies to introduce automation regardless whether they want it or not (Ivanov and Webster </span><a aria-label="Reference 2019b" data-dcnode-id="1162" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d224720328e553" title="Ivanov S, Webster C (2019b) Conceptual framework of the use of robots, artificial intelligence and service automation in travel, tourism, and hospitality companies. In: Ivanov S, Webster C (eds) Robots, artificial intelligence and service automation in travel, tourism and hospitality. Emerald Publishing, Bingley, pp 7–37"><span data-dcnode-id="1163" instrument_node="">2019b</span></a><span data-dcnode-id="1161" instrument_node="">). Job positions that include automatable tasks such as moving objects, information processing, calculations, standardised communications, repetitive tasks, etc., would be largely automated through computer programmes, mobile applications, kiosks, chatbots, robots, autonomous vehicles, and other automation technologies. Other tasks that require a lot of social skills and emotional intelligence would be more difficult to automate. In this context, the jobs positions that may shrink in numbers, although not completely disappear, will include: receptionists, sales agents, cooks, waiters, room service delivery staff, food orders delivery staff for restaurants, cashiers, accountants, drivers, cleaners, gardeners, etc. This means that automation technologies will decrease the entry-level jobs in tourism and hospitality, hence providing fewer entry-level career opportunities for people with lower education.</span></p><p data-dcnode-id="1155"><span data-dcnode-id="1159" instrument_node="">At the same time, other job positions will change in nature. A marketing specialist would need to update the information in a chatbot, and modify its block, links between the block, and AI rules as necessary. A chef would need to plan the weekly menu in advance, input it in the information system of the restaurant, the smart fridge would identify the necessary ingredients for the menu, compare them with the available food inventory, and send automated orders to trusted suppliers for the missing ingredients. A hotel F&amp;B employee would receive a room service order via a hotel’s chatbot, prepare the order, and send a robot to deliver it. Hence, although these job positions implement the same processes as before the introduction of automation technologies (maintaining relationships with customers, menu planning, and room service delivery), the nature of the tasks they need to perform is different. Receptionists, wherever they still exist, would not need to give keys or issue cards to hotel guests, because access to the hotel rooms may be with facial recognition technology or via human RFID microchip implants (Ivanov et al. </span><a aria-label="Reference 2014" data-dcnode-id="1157" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d224720328e559" title="Ivanov S, Webster C, Mladenovic A (2014) The microchipped tourist: implications for European tourism. In: Postma A, Oskam J, Yeoman I (eds) The future of European tourism. Stenden University of Applied Sciences, Leeuwarden, pp 86–106"><span data-dcnode-id="1158" instrument_node="">2014</span></a><span data-dcnode-id="1156" instrument_node="">).</span></p><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Yes, automation would create the need for completely new job positions in tourism and hospitality companies that are currently largely neglected—e.g. for robot maintenance and repair, kiosks maintenance and repair, big data analytics, machine learning, automation process planning and control, etc. Specialists in these areas would be necessary in order to successfully implement automation projects in tourism and hospitality companies. Hence, automation would create demand for employees with degrees in robotics, engineering, software development, artificial intelligence, and data science. However, outsourcing allows tourism and hospitality companies to get access to these skills without the need to hire highly paid and scarce specialists, so that they can concentrate on their core capabilities. Furthermore, robots or kiosks can be leased rather than purchased (i.e. Robot-as-a-service, Kiosk-as-a-service), hence, the responsibility for their maintenance will remain with the lessor, i.e. their manufacturer or distributor.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1151" id="Sec5"><span data-dcnode-id="1152" instrument_node="">Future skill requirements in tourism and hospitality</span></h3><p data-dcnode-id="1143"><span data-dcnode-id="1150" instrument_node="">The changes in the nature of work in tourism and hospitality would impose changes on the skills that tourism and hospitality employees would need. The Next Tourism Generation Alliance (</span><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nexttourismgeneration.eu/"><span data-dcnode-id="1149" instrument_node="">https://nexttourismgeneration.eu/</span></a><span data-dcnode-id="1147" instrument_node="">) identifies technical, social, and green skills as key skills for tourism and hospitality employees in the future. Technical skills will be required in order to use effectively and efficiently the various automation technologies that would be available in tourism/hospitality companies. Automation, however, does not necessarily mean that tourism/hospitality employees would need professional level skills in software engineering, robotics, or artificial intelligence, but they have to know how to use the respective technology. They do not need to develop smartphone applications but must know how to use them and be familiar with the implications for their jobs, the company, the tourism industry, and the destination. Furthermore, employees would need social skills and emotional intelligence as well because these skills would provide their competitive advantage over automation technologies. Hence, automation would allow human employees to focus more on the core meaning of hospitality (human–human interaction) and the provision of high-touch services (Naisbitt et al. </span><a aria-label="Reference 2001" data-dcnode-id="1145" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d224720328e577" title="Naisbitt J, Naisbitt D, Philips D (2001) High tech high touch: technology and our accelerated search for meaning. Nicolas Brealey Publishing, London"><span data-dcnode-id="1146" instrument_node="">2001</span></a><span data-dcnode-id="1144" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1141" id="Sec6"><span data-dcnode-id="1142" instrument_node="">Implications of automation for tourism and hospitality higher education institutions</span></h3><p data-dcnode-id="1124"><span data-dcnode-id="1140" instrument_node="">Higher education institutions (HEIs) offering tourism and hospitality programmes would need to respond to the technological challenges. The demand for such programmes would decrease in developed economies, but would increase in developing countries, where tourism and hospitality companies may rely more on human labour than on automation technologies. Curricula would need to incorporate technical skills—as dedicated compulsory or elective modules/subjects, but as topics in existing modules/subjects as well. Currently, no university offers a robotics or AI module in its curricula of tourism/hospitality programmes, but the situation would need to change with the widespread automation. For example, universities could include a compulsory module on </span><i data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Technologies in Tourism and Hospitality</span></i><span data-dcnode-id="1137" instrument_node=""> in their tourism and hospitality programmes. Such a module could introduce students to the wide variety of technologies that are or might be used by tourism and hospitality companies—not only the basic technological solution such as websites, social media, and specialised hotel/restaurant software (e.g. property management systems) but more complex and automated technologies such as virtual, augmented, and mixed reality, chatbots, kiosks, service robots and face-recognition technologies. It can equip them with the knowledge and skills students would need to successfully use these technologies when they graduate. Additionally, this module needs to delve into the economic aspects of automation technologies and the cost–benefit analysis companies need to implement before deciding to invest in automation (Ivanov and Webster </span><a aria-label="Reference 2018" data-dcnode-id="1135" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d224720328e591" title="Ivanov S, Webster C (2018) Adoption of robots, artificial intelligence and service automation by travel, tourism and hospitality companies—a cost–benefit analysis. In: Marinov V, Vodenska M, Assenova M, Dogramadjieva E (eds) Traditions and innovations in contemporary tourism. Cambridge Scholars Publishing, Cambridge, pp 190–203"><span data-dcnode-id="1136" instrument_node="">2018</span></a><span data-dcnode-id="1134" instrument_node="">, </span><a aria-label="Reference 2019c" data-dcnode-id="1132" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d224720328e594" title="Ivanov S, Webster C (2019c) Economic fundamentals of the use of robots, artificial intelligence and service automation in travel, tourism and hospitality. In: Ivanov S, Webster C (eds) Robots, artificial intelligence and service automation in travel, tourism and hospitality. Emerald Publishing, Bingley, pp 39–55"><span data-dcnode-id="1133" instrument_node="">2019c</span></a><span data-dcnode-id="1131" instrument_node="">). Such a module was introduced in February 2020 at Varna University of Management, Bulgaria. A separate module on artificial intelligence and robotics might not be necessary or feasible at the moment, because of three main reasons: (a) it would require additional software engineering modules in the curricula as prerequisites for it, (b) hospitality and tourism graduates need to know how, when, and whether to use automation technologies, not how to develop them, and (c) tourism and hospitality companies would use the services of software engineers/technology companies for developing AI/robotics solutions. Furthermore, the content of modules and the assessment strategies would need to focus on data analytics, innovation and creativity, critical thinking, complex problem solving, and emotional intelligence, as these skills would be of high demand in the future (WEF </span><a aria-label="Reference 2016" data-dcnode-id="1129" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d224720328e597" title="World Economic Forum (WEF) (2016) The future of jobs. Employment, skills and workforce strategy for the fourth industrial revolution. World Economic Forum report. 
http://www3.weforum.org/docs/WEF_Future_of_Jobs.pdf

. Accessed 28 Dec 2019"><span data-dcnode-id="1130" instrument_node="">2016</span></a><span data-dcnode-id="1128" instrument_node="">, </span><a aria-label="Reference 2018" data-dcnode-id="1126" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d224720328e600" title="World Economic Forum (WEF) (2018) The future of jobs report 2018. World Economic Forum report. 
http://www3.weforum.org/docs/WEF_Future_of_Jobs_2018.pdf

. Accessed 28 Dec 2019"><span data-dcnode-id="1127" instrument_node="">2018</span></a><span data-dcnode-id="1125" instrument_node="">). Additionally, lecturers in tourism and hospitality programmes would need to upgrade their qualifications, take courses in robotics, AI, and automation technologies, and attend technological exhibitions in order to be up-to-date with the technological developments.</span></p></div></div></section><section data-dcnode-id="1114" data-title="Concluding thoughts"><div class="c-article-section" data-dcnode-id="1115" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1119" id="Sec7"><span data-dcnode-id="1120" instrument_node="">Concluding thoughts</span></h2><div class="c-article-section__content" data-dcnode-id="1116" id="Sec7-content"><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">This view point looked at the impact of automation technologies on tourism and hospitality jobs from an operations management perspective with relevant considerations from Institutional Theory and Technology-Organisation-Environment framework. Current job positions in tourism and hospitality reflect the analogue past of the industry, partially its digital present, but not even the shadow of its automated future. Automation will eliminate some tourism and hospitality jobs, will change the tasks for others, and will create brand new job positions. This means that companies that adopt automation technologies will experience changes in their service processes (both front-of-house and back-of-house processes) and the job requirements towards their employees. The source of their competitive advantage may shift from the attitude, conduct and appearance of their service personnel towards the effective and efficient use of automation technologies. Of course, automation technologies would will many other aspects of the business including maintenance, security, new business models will appear, new services and products will be developed, etc. Companies, universities, managers and employees will have to adapt to the new technological realities. The biggest challenge will be to persuade (even to force) lecturers, managers and employees to abandon their silos and within-the-box thinking, stop being afraid of automation and embrace it as a tool for being more productive in the workplace. Resistance to change will be inevitable; managers, employees, labour unions, and customers would be afraid for their jobs, bonuses, membership, or comfort. Nevertheless, automation will help the tourism industry go to back to its basics and focus more on what hospitality is all about—human–human interactions.
</span></p></div></div></section><span data-dcnode-id="1113" instrument_node="">
