</span><h1 class="SolutionHero-title" data-dcnode-id="1682"><span data-dcnode-id="1685" instrument_node="">RPA Nurtures Productivity in the </span><br data-dcnode-id="1684"><span data-dcnode-id="1683" instrument_node="">Consumer Packaged Goods &amp; Retail Sectors</span></h1><span data-dcnode-id="1681" instrument_node="">

</span><div class="two-columns-text" data-dcnode-id="1629"><span data-dcnode-id="1657" instrument_node="">
</span><h4 class="left-title" data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Retail and CPG meet RPA </span></h4><span data-dcnode-id="1654" instrument_node="">
</span><div class="row-fluid" data-dcnode-id="1631"><span data-dcnode-id="1653" instrument_node="">
</span><div class="span6 right-section" data-dcnode-id="1645"><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1651" instrument_node="">The physical robot is already the casual co-worker in many factories or retailers’ warehouses or shops. But can automation play a more impactful role in these two strongly intertwined industries? As online sales in the US alone are </span><a data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.info.fticonsulting.com/Web/FTIConsultingInc/%257B9a5e3367-4d55-4b2d-8432-5e00bd0d4df5%257D_2017-us-online-retail-forecast.pdf" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1650" instrument_node="">expected to double</span></a><span data-dcnode-id="1648" instrument_node=""> by 2023, reaching approximately 20 to 25% of the overall retail sector, the landscape is facing numerous challenges that require a reorganization of business processes from top to bottom. Retailers, wholesalers and consumer products companies need to face head-on a host of challenges:</span></p><span data-dcnode-id="1646" instrument_node="">
</span></div><span data-dcnode-id="1644" instrument_node="">
</span><div class="span6 left-section" data-dcnode-id="1633"><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1642" instrument_node="">rising production costs, slow growth, new technology disruptions, uncertain labor availability, and most important of all, rapidly changing customer expectations. Enter Enterprise Robotic Process Automation (RPA) and its ability to transform work and boost productivity, enhance customer experience and deliver accurate and reliable results in both </span><a data-dcnode-id="1640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uipath.com/blog/unattended-attended-automation" rel="noopener" target="_blank"><span data-dcnode-id="1641" instrument_node="">attended and unattended</span></a><span data-dcnode-id="1639" instrument_node=""> processes. CPG executives agree: </span><a data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.accenture.com/t20170926T105943Z__w__/us-en/_acnmedia/PDF-61/Accenture-Strategy-Consumer-Goods-Workforce-POV.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1638" instrument_node="">43% of them</span></a><span data-dcnode-id="1636" instrument_node=""> already use automation to cut costs and increase efficiency.</span></p><span data-dcnode-id="1634" instrument_node="">
</span></div><span data-dcnode-id="1632" instrument_node="">
</span></div><span data-dcnode-id="1630" instrument_node="">

</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">RPA is a good fit for processes that require filling, capturing data, updating and processing requests, increasing efficiency and cost-effectiveness. These account for approx. 65% of HR rules-based processes.</span></p><span data-dcnode-id="1585" instrument_node="">
</span><ul class="InfographicTable-tableList" data-dcnode-id="1571"><span data-dcnode-id="1584" instrument_node="">

</span><h3 class="InfographicTable-tableTitle" data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Supply Chain</span></h3><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">RPA enhances cycle time, speed, capacity, and asset efficiency. It also increases customer, supplier and employee satisfaction, while bringing cost savings of more than 30%.</span></span></p><span data-dcnode-id="1560" instrument_node="">

</span><h3 class="InfographicTable-tableTitle" data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">IT Services</span></h3><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">RPA delivers solutions to both enterprise computing and end-user computing. Approx. 30% of the time is spent on low-level, repetitive tasks.</span></span></p><span data-dcnode-id="1532" instrument_node="">
</span><ul class="InfographicTable-tableList" data-dcnode-id="1520"><span data-dcnode-id="1531" instrument_node="">
</span><li data-dcnode-id="1527"><span data-dcnode-id="1530" instrument_node="">Enterprise Computing processes: </span><small data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">servers, data centers, security, infrastructure</span></small></li><span data-dcnode-id="1526" instrument_node="">
</span><li data-dcnode-id="1522"><span data-dcnode-id="1525" instrument_node="">End-user Computing: any application used by human users: </span><small data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">from Citrix to Excel, hardware or collaborative tools</span></small></li><span data-dcnode-id="1521" instrument_node="">
</span></ul><span data-dcnode-id="1519" instrument_node="">

</span><p data-dcnode-id="1510"><span data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">In F&amp;A processes, RPA reduces costs, improves efficiency, accuracy and delivers significantly faster cycle times at more than 50% cost reduction.</span></span></p><span data-dcnode-id="1509" instrument_node="">

</span><h6 data-dcnode-id="1372" style="margin-bottom: 30px;"><span data-dcnode-id="1373" instrument_node="">Real Life Scenario #1</span></h6><span data-dcnode-id="1371" instrument_node="">
</span><h3 data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">World-Leading Retailer Adopts RPA to Empower its Workforce and Deliver a Better Customer Experience</span></h3><span data-dcnode-id="1368" instrument_node="">
</span></div><span data-dcnode-id="1366" instrument_node="">
</span></div><span data-dcnode-id="1364" instrument_node="">
</span></div><span data-dcnode-id="1362" instrument_node="">
</span></div><span data-dcnode-id="1360" instrument_node="">
</span><div class="case-study-texts" data-dcnode-id="1288"><span data-dcnode-id="1359" instrument_node="">
</span><div class="container" data-dcnode-id="1290"><span data-dcnode-id="1358" instrument_node="">
</span><div class="row-fluid" data-dcnode-id="1292"><span data-dcnode-id="1357" instrument_node="">
</span><div class="full-text" data-dcnode-id="1294" id=""><span data-dcnode-id="1356" instrument_node="">
</span><h3 data-dcnode-id="1355"></h3><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Even the largest companies constantly seek to improve their operations. In this case, our customer is a world-leading retail and wholesale business, with a presence in over 25 countries and more than 2 million employees globally.</span></p><span data-dcnode-id="1351" instrument_node="">
</span><br data-dcnode-id="1350"><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Confronted with a constant increase of processes and not enough employees to handle them manually, the retailer had to rethink how its entire business functioned, down to the nitty-gritty. RPA became the logical step forward and UiPath was chosen for its power to automate a wide variety of processes across any environment rapidly and with ease.</span></p><span data-dcnode-id="1346" instrument_node="">
</span><br data-dcnode-id="1345"><br data-dcnode-id="1344"><span data-dcnode-id="1343" instrument_node="">
</span><blockquote data-dcnode-id="1336"><span data-dcnode-id="1340" style="display: block; font-size: 30px; color: #ff6600; margin-bottom: 16px;"><em data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Working with UiPath was “agile, easy as it comes, and responsive”.</span></em></span><cite data-dcnode-id="1337"><small data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">World-leading retailer, present in over 25 countries, over 2 million employees</span></small></cite></blockquote><span data-dcnode-id="1335" instrument_node="">
</span><br data-dcnode-id="1334"><br data-dcnode-id="1333"><span data-dcnode-id="1332" instrument_node="">
</span><h3 data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">The Challenge</span></h3><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Tax, Audit, HR or Citrix-driven operations are just some of the few areas where the retailer identified the best-suited processes for automation. One of these concerned the “Back office retail file report” in its Brazilian stores. All the reports from hundreds of stores closing on the day before were used so that store managers could validate the closing information for each cash register. A different type of process was related to “Tax Invoices” and involved the retailer quarterly crawling through each vendor’s website to get invoices. Time-consuming and error-prone, these activities prevented employees to be fully productive and make an impact in more customer-centric activities.</span></p><span data-dcnode-id="1326" instrument_node="">
</span><br data-dcnode-id="1325"><br data-dcnode-id="1324"><span data-dcnode-id="1323" instrument_node="">
</span><h3 data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">The Solution</span></h3><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">For the “Back office retail file report”, the report for each store is now stored in its dedicated individual FTP server. From there, a UiPath Robot reads the input from the terminal and gathers all the information. It then accesses each FTP server and downloads the file and finally aggregate all the reports and dumps them into a shared drive.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><br data-dcnode-id="1316"><span data-dcnode-id="1315" instrument_node="">
</span><div class="promoText" data-dcnode-id="1310"><span class="promoText-text" data-dcnode-id="1311"><span data-dcnode-id="1314" instrument_node="">400 UiPath Robots delivered </span><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">100% processing accuracy</span></strong></span></div><span data-dcnode-id="1309" instrument_node="">
</span><br data-dcnode-id="1308"><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">In the “Tax invoice” case, the process was reorganized by employing RPA Robots to automatically log into a vendor’s website. Once logged in, the Robot reads the configurable search filters, interprets the content of documents in local drives and merges documents according to their specifications.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><br data-dcnode-id="1303"><br data-dcnode-id="1302"><span data-dcnode-id="1301" instrument_node="">
</span><h3 data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Powerful Outcomes</span></h3><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Implementing RPA has already brought immediate results. The 400 robots implemented delivered 100% process accuracy.For the retailer, RPA will continue to drive efficiency improvements and free up employees for mission-critical tasks. Working with UiPath was “agile, easy as it comes, and responsive”, allowing them to reach the best automation solutions for each selected process. The responsiveness and support of the UiPath team were a key differentiator.</span></p><span data-dcnode-id="1295" instrument_node="">
</span></div><span data-dcnode-id="1293" instrument_node="">

</span><h3 data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Global Consumer Goods Company Deploys a Complete UiPath Attended &amp; Unattended Automation Solution Across Multiple Service Lines</span></h3><span data-dcnode-id="1261" instrument_node="">

</span><h3 data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">The Challenge</span></h3><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">The customer has a large global presence and sought to automate repetitive and laborious tasks to drive efficiency, productivity and accuracy across various service lines: Procure to Pay (P2P), Order to Cash (O2C), Record to Analyze (R2A), Supply Chain Management (SCM)/ MDM &amp; Tax. All these while keeping the same systems and applications in order without altering the business process flow and steps.</span></p><span data-dcnode-id="1243" instrument_node="">
</span><br data-dcnode-id="1242"><span data-dcnode-id="1241" instrument_node="">
</span><div class="promoText" data-dcnode-id="1236"><span class="promoText-text" data-dcnode-id="1237"><span data-dcnode-id="1240" instrument_node="">Attended &amp; Unattended solution </span><strong data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">62 processes automated</span></strong></span></div><span data-dcnode-id="1235" instrument_node="">
</span><br data-dcnode-id="1234"><span data-dcnode-id="1233" instrument_node="">
</span><h3 data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">The Solution</span></h3><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Together with implementation partner Capgemini, a robotics Center of Excellence (CoE) was established. After a Proof of Concept (POC) was successfully implemented, the project was taken into full scale using a complete UiPath Attended &amp; Unattended automation strategy for agent-assisted work as well as back-office intensive activities, where Citrix-based processing represented a main component.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><br data-dcnode-id="1226"><span data-dcnode-id="1225" instrument_node="">
</span><div class="promoText" data-dcnode-id="1220"><span class="promoText-text" data-dcnode-id="1221"><span data-dcnode-id="1224" instrument_node="">60% cycle time reduction </span><strong data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Easy to scale and extend</span></strong></span></div><span data-dcnode-id="1219" instrument_node="">
</span><br data-dcnode-id="1218"><span data-dcnode-id="1217" instrument_node="">
</span><h3 data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Powerful Outcomes</span></h3><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">By the end of 2017, UiPath had delivered productivity gains the equivalent of 85 FTEs through the automation of 62 process activities. The normal cycle time was reduced by 60% and the UiPath Robots now complete tasks 3 times faster than advisors. What’s more, the solution provided an ease of scalability to extend the virtual team of co-workers.</span></p><span data-dcnode-id="1211" instrument_node="">
</span></div><span data-dcnode-id="1209" instrument_node="">

</span></div><span data-dcnode-id="1143" instrument_node="">

</span><h5 data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Powerful &amp; Easy to Use</span></h5><span data-dcnode-id="1085" instrument_node="">
</span><div class="grid-content" data-dcnode-id="1074"><p data-dcnode-id="1075"><span data-dcnode-id="1084" instrument_node="">Implementing a transformational technology like RPA requires speedy and easy implementation. The Platform is equipped with </span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uipath.com/product/studio" rel="noopener" target="_blank"><span data-dcnode-id="1083" instrument_node="">Studio</span></a><span data-dcnode-id="1081" instrument_node="">, a powerful and intuitive designer tool that models complex business processes with countless templates, reusable libraries, and desktop, web and Citrix recorders that capture every user action on the screen. </span><span data-dcnode-id="1076"><span data-dcnode-id="1080" instrument_node="">With Citrix being a part of daily online retail operations, in processes related to optimizing supply chains or product life cycles, UiPath Robots achieve Citrix automation 8 to 10 times faster than the competition. Our Robots automate any process with speed and 100% accuracy, as well as any data source from any application or web form. To top it all, the </span><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uipath.com/rpa/academy" rel="noopener" target="_blank"><span data-dcnode-id="1079" instrument_node="">UiPath RPA Academy</span></a><span data-dcnode-id="1077" instrument_node="">, the first open online training platform for RPA users, ensures your employees master the fundamentals of working with UiPath rapidly.</span></span></p></div><span data-dcnode-id="1073" instrument_node="">
</span><button class="read-more" data-dcnode-id="1070"><span data-dcnode-id="1072" instrument_node="">More </span><i aria-hidden="true" class="fa fa-caret-down" data-dcnode-id="1071"></i></button><span data-dcnode-id="1069" instrument_node="">
</span></div><span data-dcnode-id="1067" instrument_node="">
</span><div class="span4 first-grid-section" data-dcnode-id="1047"><span data-dcnode-id="1066" instrument_node="">
</span><img alt="Shape 9.png" data-dcnode-id="1065" height="47" sizes="(max-width: 51px) 100vw, 51px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%2520Journey/icons/Shape%25209.png%3Fwidth%3D51%26height%3D47%26name%3DShape%25209.png&amp;raw" srcset="https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%209.png?width=26&amp;height=24&amp;name=Shape%209.png 26w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%209.png?width=51&amp;height=47&amp;name=Shape%209.png 51w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%209.png?width=77&amp;height=71&amp;name=Shape%209.png 77w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%209.png?width=102&amp;height=94&amp;name=Shape%209.png 102w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%209.png?width=128&amp;height=118&amp;name=Shape%209.png 128w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%209.png?width=153&amp;height=141&amp;name=Shape%209.png 153w" width="51"><span data-dcnode-id="1064" instrument_node="">
</span><h5 data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Attended and Unattended</span></h5><span data-dcnode-id="1061" instrument_node="">
</span><div class="grid-content" data-dcnode-id="1053"><p data-dcnode-id="1054"><span data-dcnode-id="1060" instrument_node="">From processing claims and customer service-related operations to any high-volume, standardized processes related to invoicing, accounting, supply management or data processing, UiPath supports both </span><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uipath.com/product/robots" rel="noopener" target="_blank"><span data-dcnode-id="1059" instrument_node="">attended and unattended Robots</span></a><span data-dcnode-id="1057" instrument_node=""> in a single Enterprise RPA Platform. </span><span data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Working either separately or together in a myriad of retail-related tasks, they deliver results faster, leaner and with unmatched precision.</span></span></p></div><span data-dcnode-id="1052" instrument_node="">
</span><button class="read-more" data-dcnode-id="1049"><span data-dcnode-id="1051" instrument_node="">More </span><i aria-hidden="true" class="fa fa-caret-down" data-dcnode-id="1050"></i></button><span data-dcnode-id="1048" instrument_node="">
</span></div><span data-dcnode-id="1046" instrument_node="">
</span><div class="span4 first-grid-section" data-dcnode-id="1026"><span data-dcnode-id="1045" instrument_node="">
</span><img alt="Shape 11.png" data-dcnode-id="1044" height="43" sizes="(max-width: 43px) 100vw, 43px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%2520Journey/icons/Shape%252011.png%3Fwidth%3D43%26height%3D43%26name%3DShape%252011.png&amp;raw" srcset="https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%2011.png?width=22&amp;height=22&amp;name=Shape%2011.png 22w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%2011.png?width=43&amp;height=43&amp;name=Shape%2011.png 43w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%2011.png?width=65&amp;height=65&amp;name=Shape%2011.png 65w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%2011.png?width=86&amp;height=86&amp;name=Shape%2011.png 86w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%2011.png?width=108&amp;height=108&amp;name=Shape%2011.png 108w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%2011.png?width=129&amp;height=129&amp;name=Shape%2011.png 129w" width="43"><span data-dcnode-id="1043" instrument_node="">
</span><h5 data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Big Scale</span></h5><span data-dcnode-id="1040" instrument_node="">
</span><div class="grid-content" data-dcnode-id="1032"><p data-dcnode-id="1033"><span data-dcnode-id="1039" instrument_node="">For those peak trading periods, scaling is essential. The Platform’s flexible architecture allows it to use any retailer’s infrastructure, be it cloud, on-premises or desktops. The </span><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uipath.com/product/orchestrator" rel="noopener" target="_blank"><span data-dcnode-id="1038" instrument_node="">Orchestrator</span></a><span data-dcnode-id="1036" instrument_node=""> centrally manages, deploys and scales automations, prioritizing work on demand to meet service level agreements. </span><span data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">As retailers implement RPA in more than one department, they need privacy and security between separate automation projects. With a feature called multi-tenancy, retailers can implement RPA in more than one unit or geography, without compromise to data or other corporate assets.</span></span></p></div><span data-dcnode-id="1031" instrument_node="">
</span><button class="read-more" data-dcnode-id="1028"><span data-dcnode-id="1030" instrument_node="">More </span><i aria-hidden="true" class="fa fa-caret-down" data-dcnode-id="1029"></i></button><span data-dcnode-id="1027" instrument_node="">

</span><div class="span4" data-dcnode-id="1003"><span data-dcnode-id="1019" instrument_node="">
</span><img alt="Shape 12.png" data-dcnode-id="1018" height="63" sizes="(max-width: 54px) 100vw, 54px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%2520Journey/icons/Shape%252012.png%3Fwidth%3D54%26height%3D63%26name%3DShape%252012.png&amp;raw" srcset="https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%2012.png?width=27&amp;height=32&amp;name=Shape%2012.png 27w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%2012.png?width=54&amp;height=63&amp;name=Shape%2012.png 54w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%2012.png?width=81&amp;height=95&amp;name=Shape%2012.png 81w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%2012.png?width=108&amp;height=126&amp;name=Shape%2012.png 108w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%2012.png?width=135&amp;height=158&amp;name=Shape%2012.png 135w, https://www.uipath.com/hs-fs/hubfs/Binovate/Pages/RPA%20Journey/icons/Shape%2012.png?width=162&amp;height=189&amp;name=Shape%2012.png 162w" width="54"><span data-dcnode-id="1017" instrument_node="">
</span><h5 data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Automate unstructured data</span></h5><span data-dcnode-id="1014" instrument_node="">
</span><div class="grid-content" data-dcnode-id="1009"><p data-dcnode-id="1010"><span data-dcnode-id="1013" instrument_node="">Automating invoices and any other document in a semi-structured form is no match for UiPath’s Robots as they read, process and classify non-standard data using Intelligent OCR. </span><span data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">One of our global retail customers needs to process millions of invoices of many different types every month.This feature completely solves the issue, with powerful machine learning algorithms that train Robots to remember different document layouts and then match new ones against them.</span></span></p></div><span data-dcnode-id="1008" instrument_node="">

</span><h5 data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Complete Audit Trail</span></h5><span data-dcnode-id="996" instrument_node="">
</span><div class="grid-content" data-dcnode-id="991"><p data-dcnode-id="992"><span data-dcnode-id="995" instrument_node="">Retailers put emphasis on thorough audit reports, as it allows them to gain critical insights on sales volumes, stock levels, pricing, compliance, product damage and more. With UiPath, companies can master retail compliance with logging, monitoring, and a full audit trail. </span><span data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">All Robot and user activities are trackedand stored in log files in the Orchestrator, that integrates ElasticSearch analytics. Add Kibana integration to the mix and you have access to precise audit information reported in customized dashboards, increasing your audit efficiency. Use these insights to target specific areas for improvement and optimization.</span></span></p></div><span data-dcnode-id="990" instrument_node="">
