</span><div class="ibm-cloud-blog-body ibm-mb-6" data-dcnode-id="1113"><span data-dcnode-id="1530" instrument_node="">
</span><h2 class="ibm-type-f ibm-pb-0 ibm-mb-3" data-dcnode-id="1525"><span data-dcnode-id="1529" instrument_node=""> </span><span data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">A conversation between Jerry Cuomo and Tim Vanderham from NCR Corporation on automation in the retail industry.</span></span><span data-dcnode-id="1526" instrument_node="">
</span></h2><span data-dcnode-id="1524" instrument_node="">
</span><div class="embedded-entity" data-dcnode-id="1520" data-embed-button="media" data-entity-embed-display="entity_reference:entity_reference_entity_view_preview" data-entity-embed-display-settings="embedded" data-entity-type="media" data-entity-uuid="11688f08-7cb8-40c3-bfff-de90f7a73b29"><span data-dcnode-id="1523" instrument_node="">
</span><figure class="ibm-cloud-image ibm-cloud-image--embedded" data-dcnode-id="1521"><img alt="aoa10" data-dcnode-id="1522" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.cms.s81c.com/sites/default/files/2021-10-01/0010_chapter%252010.jpg&amp;raw"></figure></div><span data-dcnode-id="1519" instrument_node="">
</span><h2 class="ibm-h2" data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Covered in this chapter</span></h2><span data-dcnode-id="1516" instrument_node="">
</span><ul data-dcnode-id="1503"><li data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Automation in the retail world</span></li><span data-dcnode-id="1513" instrument_node="">
</span><li data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Retail on the cutting "edge"</span></li><span data-dcnode-id="1510" instrument_node="">
</span><li data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">AI in the retail world</span></li><span data-dcnode-id="1507" instrument_node="">
</span><li data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Crypto in retail</span></li><span data-dcnode-id="1504" instrument_node="">
</span></ul><p data-dcnode-id="1499"><a data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ibm.com/cloud/blog/art-of-automation" target="_blank"><em data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">The Art of Automation: Table of Contents</span></em></a></p><span data-dcnode-id="1498" instrument_node="">
</span><h2 class="ibm-h2" data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">An industry lens</span></h2><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">This chapter of the Art of Automation is a reduced transcript of a conversation between Jerry Cuomo and Tim Vanderham, Senior Vice President and Chief Technology Officer at NCR Corporation. In our third chapter of AI-powered Automation viewed through the lens of a specific industry, Tim and Jerry discuss how progressive retailers are beginning to use automation to transform the customer's shopping experience — a transformation that has been catalyzed by the ongoing pandemic.&nbsp;</span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1483"><span data-dcnode-id="1491" instrument_node="">Tim shares automation examples from self-checkout to online ordering and explains how this goes beyond classic automation to edge, computer vision, Internet of Things (IoT) and even cryptocurrency. They close by jumping the tracks to </span><a data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ibm.com/cloud/learn/what-is-artificial-intelligence" target="_blank"><span data-dcnode-id="1490" instrument_node="">artificial intelligence (</span></a><a data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ibm.com/cloud/learn/what-is-artificial-intelligence" target="_blank"><span data-dcnode-id="1488" instrument_node="">AI</span></a><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ibm.com/cloud/learn/what-is-artificial-intelligence" target="_blank"><span data-dcnode-id="1486" instrument_node="">)</span></a><span data-dcnode-id="1484" instrument_node=""> and diving into how, out of necessity, retail companies are utilizing AI to filter through millions of events to isolate outages and create a more personalized experience for their consumers.</span></p><span data-dcnode-id="1482" instrument_node="">
</span><h2 class="ibm-h2" data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Jerry and Tim&nbsp;</span></h2><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1471"><strong data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">C</span></strong><strong data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">UOMO</span></strong><strong data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">:</span></strong><span data-dcnode-id="1472" instrument_node=""> Welcome everyone to the Art of Automation, a podcast that explores the application of automation in the enterprise. Folks, today's "always-on" world has led to new rules for engaging consumers. As shoppers' needs and demands change, retailers need to respond accordingly and quickly.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Consumers are increasingly expecting efficient, safe and engaging online experiences to also be replicated in store; and as you'll hear from my guest today, progressive retailers are using automation and AI to transform the retail experience — making sense of immense volumes of data, filtering out the noise from millions of events generated in and above the retail store. They're using advanced technology like edge computing, Internet of Things, computer vision, hybrid cloud and even cryptocurrency.</span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">So, for today's episode, we have the fortune to have my good friend Tim Vanderham with us. Tim is the Senior VP and Chief Technology Officer at NCR Corporation, leading NCR's global software and technology organization.</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">His team includes software innovation and software engineering, with more than 3,000 engineers building NCR's current and next-generation products and solutions. With that, I'd like to welcome Tim to the Art of Automation.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1455"><strong data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">VANDERHAM:</span></strong><strong data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node=""> </span></strong><span data-dcnode-id="1456" instrument_node="">Hey, Jerry, thanks for having me. It's great to be here with you today.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><h2 class="ibm-h2" data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Automation in the retail world</span></h2><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1443"><strong data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">C</span></strong><strong data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">UOMO</span></strong><strong data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">:</span></strong><span data-dcnode-id="1444" instrument_node=""> I'm so excited, Tim. I want to get right into it. Why are you so excited about the opportunities to transform the retail space; and, why now? What is happening in the world today, and why is that putting an exclamation point on all of this?</span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1438"><strong data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">VANDERHAM</span></strong><span data-dcnode-id="1439" instrument_node="">: Yes. So, you know, here at NCR, the passion of automating retail is really out of necessity. When you think about what retailers are going through in the world today with rising labor costs, the challenge they're having of keeping their shelves stocked with the demands that are coming to people in the store, above store ordering, etc. — automation is the way they're going to still make the bottom line and still serve all of us as consumers.</span></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">And COVID accelerated it. We saw this as a necessary coming down the pipeline — we were planning for it.&nbsp; But COVID hit March of 2020, and bam, we're in the middle of — "how do we better automate the retail experience and the retail store."</span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">So, I'm excited about it, my team's excited about it. And more than being excited about it, our customers are demanding it. They're coming to us asking:&nbsp;</span></p><span data-dcnode-id="1431" instrument_node="">
</span><ul data-dcnode-id="1418"><li data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">How can we deploy software solutions faster?&nbsp;&nbsp;</span></li><span data-dcnode-id="1428" instrument_node="">
</span><li data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">How can we automate inventory management?&nbsp;&nbsp;</span></li><span data-dcnode-id="1425" instrument_node="">
</span><li data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">How can we automate that whole notion of, "I order online, I pick up in the store"?</span></li><span data-dcnode-id="1422" instrument_node="">
</span><li data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">How do we automate that flow end-to-end?&nbsp;</span></li><span data-dcnode-id="1419" instrument_node="">
</span></ul><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Now think about it in the convenience store space, think about it&nbsp; in a department store like Macy's. It's happening in spades across all of our retailers, across the globe. It's exciting.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1407"><strong data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">C</span></strong><strong data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">UOMO</span></strong><strong data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">:</span></strong><span data-dcnode-id="1408" instrument_node=""> Yes, I can only imagine. I mean, I'm a consumer — I'm part of this on the other end — so I see what's happening and really appreciate it. But tell us a little bit more about some of the processes that you're focused on. NCR is known for the cash register, but you're so much more than that these days.&nbsp; Share with us some of the processes that are working behind the scenes that are targets for automation.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1400"><strong data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">VANDERHAM:</span></strong><strong data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node=""> </span></strong><span data-dcnode-id="1401" instrument_node="">Sure. So, how are we running the store more efficiently? It's everything from self-checkout, which we have market share leadership in when it comes to self-checkout machines across the globe. But also then how do you just manage all of those components that run in your store?</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">When you go into a Whole Foods (let's use as an example, a great customer of ours), every self-checkout lane or every manned checkout lane is literally running a computer today, right? Running a piece of software that you interact with as a cashier or as a consumer in self-checkout. How do we keep that up and running? How do we keep that at an SLA level available every day, every hour of that day? And so in-store automation is really key.</span></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">We automate things in the store, but then we're using IoT technology to be able to get alerts off of it so that if one of the processes goes down or a printer goes offline we can restart through automation, through advanced analytics and automation — restart that printer, restart that process so that manned lane or that self-checkout lane is only down for a couple of minutes versus having a store manager call, somebody log in, somebody to drive a truck to fix a printer, whatever it might be. So, that's kind of one example of automation in the store.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1385"><strong data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">C</span></strong><strong data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">UOMO</span></strong><strong data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">:</span></strong><span data-dcnode-id="1386" instrument_node=""> Yes, okay. And Tim, just give me a sense here — I can imagine years ago where the cash register was a physical device that had probably firmware that got updated infrequently. What is your frequency of change? Is it measured in weeks, days or finer-grained than that? How often are you automating changes at that level?</span></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1380"><strong data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">VANDERHAM:</span></strong><span data-dcnode-id="1381" instrument_node=""> Yes, so, it has been increased. It's not where it needs to be yet today; I hate to say it. You know, I manage everything from code that's been built in the last 12 months to code that's literally been built 25 years ago. And so, that frequency of change depends on the code level and the solution that's running in the store.</span></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">We're trying to get it down to in the order of updates every month when it comes to kind of core software packages. And down to literally every 10, 15, 20 minutes when it comes to alerts coming off of the devices and us taking automated remote actions on those. So, it's a wide spectrum. And that's just in the store, and then we've got to think about above the store.</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1368"><strong data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">C</span></strong><strong data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">UOMO</span></strong><strong data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">:</span></strong><span data-dcnode-id="1369" instrument_node=""> Yes, tell us more.</span></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1363"><strong data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">VANDERHAM</span></strong><span data-dcnode-id="1364" instrument_node="">: We started thinking about online ordering. When I order online, it sends in the solution, somebody goes and picks, oh, the steak that I want is out today. You have to be able to real-time interact with the consumer; again, through an automated way, using the picker device in the store and me through my texting or chat app that I'm using on my mobile device. And so, we're automating that. The above-store stuff we are literally updating, you know, multiple times a week. You see this paradigm of a hybrid environment. We've been talking about hybrid in software for a lot of years.</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1354"><strong data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">C</span></strong><strong data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">UOMO</span></strong><strong data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">:</span></strong><span data-dcnode-id="1355" instrument_node=""> Sure, sure.</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1347"><strong data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">VANDERHAM:</span></strong><strong data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node=""> </span></strong><span data-dcnode-id="1348" instrument_node="">This hybrid environment, what runs in the cloud, what runs in the store and then how we manage those, I'll say homogeneously, but on different intervals because of still some of the complexity that comes. And then maybe during the session, we can talk about some of the things we're doing at the edge to made edge look more like cloud in the long run.</span></p><span data-dcnode-id="1346" instrument_node="">
</span><h2 class="ibm-h2" data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Retail on the cutting "edge"</span></h2><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1335"><strong data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">C</span></strong><strong data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">UOMO</span></strong><strong data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">:</span></strong><span data-dcnode-id="1336" instrument_node=""> Let's jump right into that. Let's talk about edge. What's the role of edge here, and what's running at the edge? What's the interaction between the edge and the mothership and how does automation play a role in that?</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1328"><strong data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">VANDERHAM:</span></strong><strong data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node=""> </span></strong><span data-dcnode-id="1329" instrument_node="">Yes, so, about three years ago now, we acquired a company called Zynstra where we started virtualizing at the edge. So, we could take those old Windows monolithic code bases and at least virtualize them so that, again, you can shrink wrap the VM, test it, configure it and deploy that and do almost near time — no downtime updates. So,&nbsp; we're running a lot of that at large retailers today.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">One of our great examples is Pilot Flying J. So, over 500 locations for truck stops — everything in their store runs virtualized in the back of the house with a dumb thin client on the front end. They're kind of on the leading edge of this virtualization. So, that's what we've been doing for the last three years. And now the team's working on — as we break apart those monoliths into microservices — how do we run that application or that set of services, set of components at the edge in a container-based model?</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">We're literally bringing down on that same infrastructure MicroK8s infrastructure, running sets of microservices. So, think of a selling engine, think of a tax engine, think of an inventory engine and then all those run in store in the back of the servers with a lightweight thin client. And then we're going to be able to update those in not a monthly cadence but in a daily cadence and manage SLAs at the edge.</span></p><span data-dcnode-id="1321" instrument_node="">
</span><h2 class="ibm-h2" data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">AI in the retail world</span></h2><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1310"><strong data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">C</span></strong><strong data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">UOMO</span></strong><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">:</span></strong><span data-dcnode-id="1311" instrument_node=""> Oh, very cool, Tim.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Hey, Tim, let's jump to tracks here. This is the Art of Automation — we talk a lot about the relationship of AI and automation. So, could you add the AI perspective to the story here? What's the role of AI in automating retail?</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1302"><strong data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">VANDERHAM:</span></strong><span data-dcnode-id="1303" instrument_node=""> AI serves a huge role because we have to be able to take all of the sensor data off of the hardware, the software — even human interactions. When you start thinking about how we can instrument our mobile devices or our websites, we can start to see people's activities, right? And so leveraging that super set of data — again, machine data, software data, transactional data (which is also really important) and then consumer behavior data.</span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1300" instrument_node="">Bringing all that data back to a common data lake, leveraging AI and advanced </span><a data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ibm.com/cloud/learn/machine-learning" target="_blank"><span data-dcnode-id="1299" instrument_node="">machine </span></a><a data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ibm.com/cloud/learn/machine-learning" target="_blank"><span data-dcnode-id="1297" instrument_node="">learning</span></a><span data-dcnode-id="1295" instrument_node=""> algorithms against that to make sure that we are doing the right things for our customers. We're committing, NCR is committing to our customers an SLA — so, a Service Level Agreement of when your systems are up and running, able to transact and that you're able to transact 24 hours a day, seven days a week in many cases.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">We have to use AI to intelligently filter out the noise so we can focus on what really needs to be fixed, because let's be honest, some of these are machines. Sometimes we have literally filter out the noise, get the telemetry data back and say, we've got three self-checkouts down out of six at this one store for various reasons. Get a customer engineer in a truck rolling to that store to get them back up and online for when they open at 6:00 a.m.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">So, that's the level of sophistication that we're working through of hundreds of thousands of events every day from every retailer, so millions across our retail set. How do we filter it out, how do we give support and, ultimately, how do we deliver availability. So Jerry, when you're a consumer and you want to walk in to Whole Foods or you want to get your gas at Sheets there in North Carolina — both good customers of ours — you're able to transact because our systems have made sure we're available.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1283"><strong data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">CUOMO</span></strong><span data-dcnode-id="1284" instrument_node="">: I've seen a situation where I was about to scan a bottle of wine, and it could have been my imagination, but it seemed like the checkout manager got an alert to ask for my license before I even kind of pulled it out of my cart.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">So, are we in a world where there's that level of granularity of awareness in the store? Is AI — things like computer vision — is it really an alternate employee now in the store? Maybe paint a picture of where this is going. What's a day in the life of a consumer going forward?</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1273"><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">VANDERHAM:</span></strong><strong data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node=""> </span></strong><span data-dcnode-id="1274" instrument_node="">Yes, you're absolutely right. We call your self-checkout environments "bullpens." When you think about all the cameras in the bullpen — yes, there's a camera in the scanning agent in the self checkout machine. Many of them have a camera above head now as well to avoid shrink, and that could be what's picking up objects that are in your basket.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">So, this isn't widespread yet, but when you start thinking about that, yes, the eyes in the sky around those bullpens are going to help us understand when baskets are really empty and when they're not so they can avoid shrink. They're going to hopefully help identify you, Jerry, as who you are, if you're a loyal member.</span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">So, some of our retailers are wanting facial recognition so that they know that, "hey, Jerry, you're back in today, thanks for your business. Oh, by the way, we're going to give you a special discount on something that will show up in your mobile device as well just because we came and talked to you today or what have you."</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">So, really that whole heatmap, tracking, understanding. And at the end of the day, we all want a better consumer experience, so we're going to leverage computer vision, facial recognition, advanced AI concepts if you opt in, obviously, from a data security perspective, but if you opt in, to give you a better experience, which also makes that consumer better able to serve you day in and day out.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><h2 class="ibm-h2" data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Crypto in retail</span></h2><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1252"><strong data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">C</span></strong><strong data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">UOMO</span></strong><strong data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">:</span></strong><span data-dcnode-id="1253" instrument_node=""> On that topic of painting a picture of the day in the life of a customer, you've been in the news recently for your acquisition of LibertyX and I think being a very progressive point of sales organization thinking about crypto. Can you quickly comment on some of your ideas around crypto and what you're thinking?</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1245"><strong data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">VANDERHAM:</span></strong><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node=""> </span></strong><span data-dcnode-id="1246" instrument_node="">Yes, absolutely, Jerry. So, you're right, we acquired a company called LibertyX, they're a crypto-based company for three things. So, we can allow consumers to buy and sell crypto in a digital format or with cash at a physical device like a self-checkout machine or a point of sale. So, we can help consumers using crypto as the rails which is a more consumer friendly way and a safer way to move money from, say, to the U.S. to Brazil or U.S. to Mexico.</span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Finally, it's payments. And so, I want to allow consumers to be able to take whether it be Bitcoin or other alt coins or a stable coin like USDC, and whatever you have in your wallet, if a consumer wants to interact that way, we have to enable that at that point of sale at that self-checkout machine.</span></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">So, that's kind of our vision of what we're doing, and I like to say we want to put crypto on every corner, because we have hundreds of millions of touchpoints every day digitally and physically with consumers. So, Jerry, next time you want to buy your groceries or your gas with Bitcoin or other cryptos in the future, look for an NCR pump or an NCR point of sale and you'll be able to do it.</span></p><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1230"><strong data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">C</span></strong><strong data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">UOMO</span></strong><strong data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">:</span></strong><span data-dcnode-id="1231" instrument_node=""> Will do, Tim. Thank you so much, that has both been inspiring, impressive and so progressive. Thank you so much for spending time with us this afternoon.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1223"><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">VANDERHAM:</span></strong><strong data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node=""> </span></strong><span data-dcnode-id="1224" instrument_node="">Thanks, Jerry. Great to be here, and thanks for the time. Always great to see you.</span></p><span data-dcnode-id="1222" instrument_node="">
