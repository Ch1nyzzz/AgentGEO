</span><h1 class="title-heading" data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">Consumer Products &amp; Retail</span></h1><span data-dcnode-id="2608" instrument_node="">
</span></div><span data-dcnode-id="2606" instrument_node="">
</span></div><span data-dcnode-id="2604" instrument_node="">
</span><div class="parentSector component section col-xs-12 col-sm-12 col-md-12 col-lg-12 default-style" data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">
</span></div><span data-dcnode-id="2601" instrument_node="">
</span></div><span data-dcnode-id="2599" instrument_node="">
</span></div><span data-dcnode-id="2597" instrument_node="">
</span></div><span data-dcnode-id="2595" instrument_node="">
</span><div class="richText richText-introduction component section col-xs-12 col-sm-6 col-lg-6" data-dcnode-id="2581"><span data-dcnode-id="2594" instrument_node="">
</span><div class="component-content" data-dcnode-id="2583"><span data-dcnode-id="2593" instrument_node="">
</span><div class="richText-content" data-dcnode-id="2585"><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2591" instrument_node="">As consumer</span><strong data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="2588" instrument_node="">demands evolve, consumer products and retail companies must find the right balance between success today and growth tomorrow.</span></p><span data-dcnode-id="2586" instrument_node="">
</span></div><span data-dcnode-id="2584" instrument_node="">
</span></div><span data-dcnode-id="2582" instrument_node="">
</span></div><span data-dcnode-id="2580" instrument_node="">
</span><div class="box default-style component section col-xs-12 col-sm-5 col-lg-5 parent-of-richText parent-of-readMore" data-dcnode-id="2537"><span data-dcnode-id="2579" instrument_node="">
</span><div class="component-content" data-dcnode-id="2539"><span data-dcnode-id="2578" instrument_node="">
</span><div class="paragraphSystem content" data-dcnode-id="2541"><span data-dcnode-id="2577" instrument_node="">
</span><div class="richText component section default-style col-xs-12 read-more-target-0 activated" data-dcnode-id="2555" style="height: 168px;"><span data-dcnode-id="2576" instrument_node="">
</span><div class="component-content" data-dcnode-id="2557"><span data-dcnode-id="2575" instrument_node="">
</span><div class="richText-content" data-dcnode-id="2559"><span data-dcnode-id="2574" instrument_node="">
</span><p class="parent-of-hyperlink-text-link" data-dcnode-id="2570"><a class="hyperlink-text-link" data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//login.ey.com/en_in/emerging-technologies"><span data-dcnode-id="2573" instrument_node="">Disruptive technologies</span></a><span data-dcnode-id="2571" instrument_node="">, new business models and agile market entrants are revolutionizing the way people shop, what they buy and how they live. In this complex environment, consumer products and retail (CPR) companies must shift their focus from protecting what they have to creating what they need to become.</span></p><span data-dcnode-id="2569" instrument_node="">
</span><p class="parent-of-hyperlink-text-link" data-dcnode-id="2564"><span data-dcnode-id="2568" instrument_node="">Consumer products and retail companies must rethink how and where to serve the smart consumer. They must build the capabilities to put data at the heart of the organization and create the agility to respond to market change. Their </span><a class="hyperlink-text-link" data-dcnode-id="2566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//login.ey.com/en_in/consulting/supply-chain-operations"><span data-dcnode-id="2567" instrument_node="">supply chain</span></a><span data-dcnode-id="2565" instrument_node=""> must evolve into a transparent demand-response network.</span></p><span data-dcnode-id="2563" instrument_node="">
</span><p data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">We help consumer products and retail companies explore, identify and implement the right balance of bold strategic choices that will sustain their business today and transform it for relevance tomorrow.</span></p><span data-dcnode-id="2560" instrument_node="">
