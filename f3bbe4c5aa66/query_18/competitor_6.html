</span><meta content="Based on an exhaustive dataset of all journalists in France, this article investigates the impact of digitisation on the employment of journalists in …" data-dcnode-id="7423" property="og:description"><span data-dcnode-id="7422" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0005&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0005&quot;><p id=&quot;sp0085&quot;>Based on an exhaustive dataset of all journalists in France, this article investigates the impact of digitisation on the employment of journalists in the press industry. In particular, focus is put on the effect played by the level of digitisation of newspapers and magazines, some of which have resisted digitisation, while others have embraced it. We find that greater levels of digitisation tend to increase the likelihood of job creation and reduce the probability of job destruction. Likewise, higher level of digitisation leads, on average, to higher earnings for journalists. At the same time, though, higher digitisation also increases sharply the likelihood that jobs created are of casual contractual natures, as opposed to regular permanent contracts. Yet, we find that digitisation also has a positive impact on the earnings of journalists on a casual contact (though, far less than for ‘tenured’ journalists). More surprisingly, we show that digitisation also reduces job instability of those journalists on a casual contract, as a greater level of digitisation reduces the likelihood of job destruction, even for casual jobs. Though, while digitisation tends to change the contractual nature of job created, embracing digitisation appears to be a ‘lesser evil’ than resisting technological change.</p></div></div></div>" data-dcnode-id="7421" lang="en" name="citation_abstract"><span data-dcnode-id="7420" instrument_node="">

t_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="6957" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="6960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.techfore.2017.10.015" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="6961" instrument_node="">https://doi.org/10.1016/j.techfore.2017.10.015</span></a><a class="rights-and-content" data-dcnode-id="6958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0040162516305650%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6959" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="6956"></section><section class="ReferencedArticles" data-dcnode-id="6955"></section><div class="PageDivider" data-dcnode-id="6954"></div><div class="Abstracts u-font-serif" data-dcnode-id="6916" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="6923" id="ab0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6952"><span data-dcnode-id="6953" instrument_node="">Highlights</span></h2><div data-dcnode-id="6924" id="as0010"><p data-dcnode-id="6925" id="sp0090"></p><dl class="list" data-dcnode-id="6926"><dt class="list-label" data-dcnode-id="6950"><span data-dcnode-id="6951" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6947"><p data-dcnode-id="6948" id="p0005"><span data-dcnode-id="6949" instrument_node="">We investigate the impact of digitisation on employment in the press industry.</span></p></dd><dt class="list-label" data-dcnode-id="6945"><span data-dcnode-id="6946" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6942"><p data-dcnode-id="6943" id="p0010"><span data-dcnode-id="6944" instrument_node="">We find a positive relationship between digitisation and earnings of journalists.</span></p></dd><dt class="list-label" data-dcnode-id="6940"><span data-dcnode-id="6941" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6937"><p data-dcnode-id="6938" id="p0015"><span data-dcnode-id="6939" instrument_node="">Digitisation increases the likelihood of net job creation.</span></p></dd><dt class="list-label" data-dcnode-id="6935"><span data-dcnode-id="6936" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6932"><p data-dcnode-id="6933" id="p0020"><span data-dcnode-id="6934" instrument_node="">The higher the digitisation, the more likely jobs created are of casual nature.</span></p></dd><dt class="list-label" data-dcnode-id="6930"><span data-dcnode-id="6931" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6927"><p data-dcnode-id="6928" id="p0025"><span data-dcnode-id="6929" instrument_node="">However digitisation also increases job stability for casual contracts</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="6917" id="ab0005" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6921"><span data-dcnode-id="6922" instrument_node="">Abstract</span></h2><div data-dcnode-id="6918" id="as0005"><p data-dcnode-id="6919" id="sp0085"><span data-dcnode-id="6920" instrument_node="">Based on an exhaustive dataset of all journalists in France, this article investigates the impact of digitisation on the employment of journalists in the press industry. In particular, focus is put on the effect played by the level of digitisation of newspapers and magazines, some of which have resisted digitisation, while others have embraced it. We find that greater levels of digitisation tend to increase the likelihood of job creation and reduce the probability of job destruction. Likewise, higher level of digitisation leads, on average, to higher earnings for journalists. At the same time, though, higher digitisation also increases sharply the likelihood that jobs created are of casual contractual natures, as opposed to regular permanent contracts. Yet, we find that digitisation also has a positive impact on the earnings of journalists on a casual contact (though, far less than for ‘tenured’ journalists). More surprisingly, we show that digitisation also reduces job instability of those journalists on a casual contract, as a greater level of digitisation reduces the likelihood of job destruction, even for casual jobs. Though, while digitisation tends to change the contractual nature of job created, embracing digitisation appears to be a ‘lesser evil’ than resisting technological change.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="6893" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="6905"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="6906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0040162516303304"><svg class="icon icon-navigate-left" data-dcnode-id="6914" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="6915"></path></svg><span class="button-alternative-text" data-dcnode-id="6907"><strong data-dcnode-id="6912"><span data-dcnode-id="6913" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="6910"><span data-dcnode-id="6911" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="6908"><span data-dcnode-id="6909" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="6894"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="6895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0040162517305206"><span class="button-alternative-text" data-dcnode-id="6898"><strong data-dcnode-id="6903"><span data-dcnode-id="6904" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="6901"><span data-dcnode-id="6902" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="6899"><span data-dcnode-id="6900" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="6896" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="6897"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="6871"><div class="keywords-section" data-dcnode-id="6872" id="ks0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6891"><span data-dcnode-id="6892" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="6888" id="kw0005"><span data-dcnode-id="6889" id="tx0010"><span data-dcnode-id="6890" instrument_node="">Technological change</span></span></div><div class="keyword" data-dcnode-id="6885" id="kw0010"><span data-dcnode-id="6886" id="tx0015"><span data-dcnode-id="6887" instrument_node="">Digitisation</span></span></div><div class="keyword" data-dcnode-id="6882" id="kw0015"><span data-dcnode-id="6883" id="tx0020"><span data-dcnode-id="6884" instrument_node="">Newspapers</span></span></div><div class="keyword" data-dcnode-id="6879" id="kw0020"><span data-dcnode-id="6880" id="tx0025"><span data-dcnode-id="6881" instrument_node="">Employment</span></span></div><div class="keyword" data-dcnode-id="6876" id="kw0025"><span data-dcnode-id="6877" id="tx0030"><span data-dcnode-id="6878" instrument_node="">Creative destruction</span></span></div><div class="keyword" data-dcnode-id="6873" id="kw0030"><span data-dcnode-id="6874" id="tx0035"><span data-dcnode-id="6875" instrument_node="">Casualization</span></span></div></div></div><span data-dcnode-id="6870" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4078" id="body"><div data-dcnode-id="4079"><section data-dcnode-id="6805" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6864" id="st0020"><span data-dcnode-id="6869" instrument_node="">1</span><span data-dcnode-id="6867" instrument_node="">. </span><span data-dcnode-id="6865" instrument_node="">Introduction</span></h2><p data-dcnode-id="6862" id="p0030"><span data-dcnode-id="6863" instrument_node="">While any technological change is bearer of economic and social disruptions, it is safe to say that the development of digital technologies and the digitisation process that has ensued are at the root in numerous industries of the single biggest disruption that has happened in decades (in some cases, centuries). Whether in media industries, service industries, content industries, long-time incumbents in control of the market for aeons were suddenly wiped out in just a matter of years.</span></p><p data-dcnode-id="6854" id="p0035"><span data-dcnode-id="6861" instrument_node="">In this respect, the example of the press industry is quite striking. Once the only way to obtain news (if we leave aside word of mouth), newspapers and magazines survived the advent of radio (in the 1930s) and television (in the 1950s) only to be crushed by the arrival of the Internet in the 1990s. As a result, in the U.S. alone, 16,200 newspaper jobs and 38,000 magazine jobs were wiped out between 2003 and 2012 (</span><a class="workspace-trigger" data-dcnode-id="6859" href="#bb0185" name="bbb0185"><span data-dcnode-id="6860" instrument_node="">Jurkowitz et al., 2014</span></a><span data-dcnode-id="6858" instrument_node="">) and while ‘online’ jobs have been the rise, they still account for less than 10% of the jobs destroyed (</span><a class="workspace-trigger" data-dcnode-id="6856" href="#bb0300" name="bbb0300"><span data-dcnode-id="6857" instrument_node="">White, 2012</span></a><span data-dcnode-id="6855" instrument_node="">).</span></p><p data-dcnode-id="6846" id="p0040"><span data-dcnode-id="6853" instrument_node="">Yet, overall, digitisation has obvious benefits. As demonstrated by </span><a class="workspace-trigger" data-dcnode-id="6851" href="#bb0190" name="bbb0190"><span data-dcnode-id="6852" instrument_node="">Katz and Koutroumpis (2013)</span></a><span data-dcnode-id="6850" instrument_node="">, there is a strong positive link between the level of digitisation, economic growth and social welfare. Likewise, </span><a class="workspace-trigger" data-dcnode-id="6848" href="#bb0260" name="bbb0260"><span data-dcnode-id="6849" instrument_node="">Sabbagh et al. (2013)</span></a><span data-dcnode-id="6847" instrument_node=""> find a clear global positive impact of digitisation on job creation, though they highlight differences between industries, some of which experience a net destruction of jobs, while others enjoy a sharp boost in employment.</span></p><p data-dcnode-id="6841" id="p0045"><span data-dcnode-id="6845" instrument_node="">Hence, digitisation is just a typical case of creative destruction, as defined by </span><a class="workspace-trigger" data-dcnode-id="6843" href="#bb0270" name="bbb0270"><span data-dcnode-id="6844" instrument_node="">Schumpeter (1942)</span></a><span data-dcnode-id="6842" instrument_node="">: digital technologies have triggered a “process of industrial mutation […] that incessantly revolutionises the economic structure from within, incessantly destroying the old one, incessantly creating a new one”.</span></p><p data-dcnode-id="6835" id="p0050"><span data-dcnode-id="6840" instrument_node="">As is generally the case with technological change, it is clear in the case of digital technologies that, overall, ‘creation’ has exceeded (by far) ‘destruction’. Yet, while the overall picture is clear, details remain quite blurry. In this respect, the question of the impact of digitisation on labour is certainly one of the most sensitive ones. While controversies about the impact of technological change on labour are anything but new,</span><a class="workspace-trigger" data-dcnode-id="6837" href="#fn0005" name="bfn0005"><sup data-dcnode-id="6838"><span data-dcnode-id="6839" instrument_node="">1</span></sup></a><span data-dcnode-id="6836" instrument_node=""> the current climate of economic crisis makes this issue particularly critical.</span></p><p data-dcnode-id="6833" id="p0055"><span data-dcnode-id="6834" instrument_node="">Unfortunately, whereas at macro and industry/sectorial levels it may be possible to determine the net effect of technological change on labour, it is generally far more difficult to do so at micro-level, as even in the most affected industries, while jobs are indeed destroyed, others are created.</span></p><p data-dcnode-id="6831" id="p0060"><span data-dcnode-id="6832" instrument_node="">Thus, beyond the sole matter of the net (aggregate) effect on the number of jobs lies the question of the actual relationship between technology adoption and job destruction, i.e. are jobs more likely to be destroyed in companies that embrace technological change than in the ones that do not? The effect of technology is a priori ambiguous. On the one hand, one could expect companies that adopt technology rapidly to outperform those that do not, and, consequently, be less likely to lay workers off. On the other hand, making a greater use of technology typically calls (ceteris paribus) for less labour being used.</span></p><p data-dcnode-id="6826" id="p0065"><span data-dcnode-id="6830" instrument_node="">Furthermore, the question of the ‘quality’ of the jobs created in comparison to the jobs destroyed is just as important. For instance, while technological change has led to the destruction of many mining jobs, created jobs were, thanks to mechanisation, much safer and far less health-hazardous. In contrast, the journalist positions created following the advent of the Internet are generally far less advantageous than those that were destroyed and, as noted in </span><a class="workspace-trigger" data-dcnode-id="6828" href="#bb0300" name="bbb0300"><span data-dcnode-id="6829" instrument_node="">White (2012)</span></a><span data-dcnode-id="6827" instrument_node="">, there has been a strong rise of freelancer type jobs (which now make up to 60% of the work force in EU countries).</span></p><p data-dcnode-id="6821" id="p0070"><span data-dcnode-id="6825" instrument_node="">A final question is whether, in those industries that are affected, it is better for those who remain in employment to work for a company that embraces technological change to its full extent, as opposed to one that does not. While in the case of the mining industry, the former is certainly better than the latter, this is not so clear in the case of digitised industries, where newly created jobs are likely to be far less secure and of a more casual nature.</span><a class="workspace-trigger" data-dcnode-id="6822" href="#fn0010" name="bfn0010"><sup data-dcnode-id="6823"><span data-dcnode-id="6824" instrument_node="">2</span></sup></a></p><p data-dcnode-id="6816" id="p0075"><span data-dcnode-id="6820" instrument_node="">The answer to these questions is generally hard to find because available data is almost always aggregated to some extent and it is exceedingly rare to have industry-scale individual data. While surveys have been conducted, the resulting conclusions suffer the inherent limitations (in particular in regard to generalisation) of this kind of non-exhaustive data (</span><a class="workspace-trigger" data-dcnode-id="6818" href="#bb0240" name="bbb0240"><span data-dcnode-id="6819" instrument_node="">Pianta, 2006</span></a><span data-dcnode-id="6817" instrument_node="">).</span></p><p data-dcnode-id="6814" id="p0080"><span data-dcnode-id="6815" instrument_node="">In contrast, this research is based on the analysis of an exhaustive micro-level dataset. Indeed, in France, unlike in other countries, having a press card is a de facto requirement for all journalists. When applying for a press card (which happens yearly), journalists have to supply a significantly large amount of information (e.g. gender, age, experience, income, main employer, work status, type of contract, diplomas). For the purpose of this research, this highly unique and exhaustive (anonymised) database is combined with another official database that lists the subscription and sales figures (offline and online) of all French newspapers and magazines.</span></p><p data-dcnode-id="6812" id="p0085"><span data-dcnode-id="6813" instrument_node="">Doing so enables a study that has the advantages of micro-level analysis (in particular, the highly detailed observations enabled by individual data) while avoiding the traditional pitfalls of this level of analysis (namely, the lack of tangible generalisation). In this particular case, this means that we are able to observe the creative destruction process caused by digitisation on the labour market in the press industry, based on the degree of adoption of the technology of each individual newspaper and magazine, and on the individual characteristics (e.g. age, gender, education, experience) of each single journalist.</span></p><p data-dcnode-id="6810" id="p0090"><span data-dcnode-id="6811" instrument_node="">This rather unique level of detail enables us to answer the following questions: 1) how does the level of “technology embracement” (in this case, adoption of digital technologies) of press outlets impact the job destruction process? 2) how does the level of digitisation impact the job creation process? 3) how does the degree of digitisation affects the quality of jobs (in regard to contractual status, i.e. permanent vs temp jobs)? 4) what is the impact of the degree of digitisation on journalist wages?</span></p><p data-dcnode-id="6808" id="p0095"><span data-dcnode-id="6809" instrument_node="">By answering these four questions, this research aims to fill a gap in the detailed, micro-level, understanding of the impact of digitisation on labour. In this respect, it is important to note that the press industry was arguably the first to be disrupted following the advent of the Internet in the early 1990s. Consequently, the effects of digitisation observed in this research are long-term ones.</span></p><p data-dcnode-id="6806" id="p0100"><span data-dcnode-id="6807" instrument_node="">This article is organised as follows. The first section provides an overview of the relevant literature. The second section introduces the methodology. The final section details the results obtained.</span></p></section><section data-dcnode-id="6493" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6799" id="st0025"><span data-dcnode-id="6804" instrument_node="">2</span><span data-dcnode-id="6802" instrument_node="">. </span><span data-dcnode-id="6800" instrument_node="">Literature review and hypotheses</span></h2><p data-dcnode-id="6794" id="p0105"><span data-dcnode-id="6798" instrument_node="">While there is little doubt that, overall, technological change has been highly beneficial to our societies, it is also obvious that, in general, the introduction of a new technology does not make every single individual better off. For instance, as noted in </span><a class="workspace-trigger" data-dcnode-id="6796" href="#bb0285" name="bbb0285"><span data-dcnode-id="6797" instrument_node="">Trannoy (2002: 125)</span></a><span data-dcnode-id="6795" instrument_node="">, “there is no question that new information technologies represent a source of wealth for society taken as a whole. The question of the impact of these technologies on distribution issues, either at a national level or at an international one remains open.”</span></p><p data-dcnode-id="6789" id="p0110"><span data-dcnode-id="6793" instrument_node="">This ambiguous impact of technological change has been particularly clear since the early days of the First Industrial Revolution, when mechanisation became both a source of great life improvements and a seed of pauperisation for the working classes, whose jobs were progressively eaten away by machines. For the economists of the day, the positive effect of technological change (in that case, mechanisation) on employment was far from being obvious, many believing that more jobs would be destroyed than created. Even a ‘modern’ economist such as David Ricardo had to concede that technological change might indeed be more favourable to “landlords” and “capitalists” than to the “labouring class”, whose feeling “that the employment of machinery is frequently detrimental to their interests, is not founded on prejudice and error, but is conformable to the correct principles of political economy” (</span><a class="workspace-trigger" data-dcnode-id="6791" href="#bb0250" name="bbb0250"><span data-dcnode-id="6792" instrument_node="">Ricardo, 1821</span></a><span data-dcnode-id="6790" instrument_node="">).</span></p><p data-dcnode-id="6784" id="p0115"><span data-dcnode-id="6788" instrument_node="">In the midst of the post WWII golden years, characterised by technological progress, high growth and full employment, this duality of technical change was nearly forgotten. But the economic crises of the 1970s, as well as the concurrent growing adoption of automation, put this question back into focus. In the early 1980s, </span><a class="workspace-trigger" data-dcnode-id="6786" href="#bb0160" name="bbb0160"><span data-dcnode-id="6787" instrument_node="">Godet (1983)</span></a><span data-dcnode-id="6785" instrument_node=""> pointed out that, in a context of perpetual crisis and high unemployment, the negative impact of technological change on labour markets was a necessary evil, “but no doubt less worse than if one were not to proceed with [implementation of technology]”.</span></p><p data-dcnode-id="6779" id="p0120"><span data-dcnode-id="6783" instrument_node="">Indeed, as emphasised by </span><a class="workspace-trigger" data-dcnode-id="6781" href="#bb0175" name="bbb0175"><span data-dcnode-id="6782" instrument_node="">Henize (1981)</span></a><span data-dcnode-id="6780" instrument_node="">, the introduction of a new technology, through the resulting increase in labour productivity, affects the demand for labour in two opposite ways. On the one hand, the increase in labour productivity decreases ceteris paribus the demand for labour. On the other hand, the increased labour productivity also enables to decrease relative prices and increase the quality and accessibility of products (and services). This, in turn, results in additional demand for the products and, hence, for labour, which may partially or totally offset the labour-displacing effect of productivity growth.</span></p><p data-dcnode-id="6746" id="p0125"><span data-dcnode-id="6778" instrument_node="">Besides the question of the direct impact of technological change on employment, addressed within the context of automation by </span><a class="workspace-trigger" data-dcnode-id="6776" href="#bb0180" name="bbb0180"><span data-dcnode-id="6777" instrument_node="">Ishitani and Kaya (1989)</span></a><span data-dcnode-id="6775" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6773" href="#bb0230" name="bbb0230"><span data-dcnode-id="6774" instrument_node="">Mori (1989)</span></a><span data-dcnode-id="6772" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="6770" href="#bb0280" name="bbb0280"><span data-dcnode-id="6771" instrument_node="">Torii (1989)</span></a><span data-dcnode-id="6769" instrument_node="">, assessing the overall effect (i.e. direct and indirect) of technological change on employment has been a critical issue in the literature ever since. For instance, </span><a class="workspace-trigger" data-dcnode-id="6767" href="#bb0265" name="bbb0265"><span data-dcnode-id="6768" instrument_node="">Saito and Nakamura (1989)</span></a><span data-dcnode-id="6766" instrument_node=""> find that while the impact of robotisation in Japan for the period 1985–1990 is, overall, positive (+</span><span data-dcnode-id="6764" instrument_node="">&nbsp;</span><span data-dcnode-id="6762" instrument_node="">0.03% GNP growth p. a.), its direct effect (jobs destroyed) is nearly 50% greater than the indirect effect (jobs created). In this respect, </span><a class="workspace-trigger" data-dcnode-id="6760" href="#bb0015" name="bbb0015"><span data-dcnode-id="6761" instrument_node="">Alic (1997)</span></a><span data-dcnode-id="6759" instrument_node=""> points out that although in the past technological change had, overall, a net positive effect on job creation, this may no longer be the case as technology is now reducing the direct labour content of production in nearly all sectors. As a matter of fact, several studies, conducted at industry-level (</span><a class="workspace-trigger" data-dcnode-id="6757" href="#bb0020" name="bbb0020"><span data-dcnode-id="6758" instrument_node="">Antonucci and Pianta, 2002</span></a><span data-dcnode-id="6756" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6754" href="#bb0135" name="bbb0135"><span data-dcnode-id="6755" instrument_node="">Evangelista and Savona, 2002</span></a><span data-dcnode-id="6753" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6751" href="#bb0220" name="bbb0220"><span data-dcnode-id="6752" instrument_node="">Meyer-Krahmer, 1992</span></a><span data-dcnode-id="6750" instrument_node="">) and firm-level (</span><a class="workspace-trigger" data-dcnode-id="6748" href="#bb0065" name="bbb0065"><span data-dcnode-id="6749" instrument_node="">Brouwer et al., 1993</span></a><span data-dcnode-id="6747" instrument_node="">) have found a negative impact of technological change on employment.</span></p><p data-dcnode-id="6735" id="p0130"><span data-dcnode-id="6745" instrument_node="">Yet, it is not because technology can replace labour that it necessarily does. Studying the German labour market, </span><a class="workspace-trigger" data-dcnode-id="6743" href="#bb0095" name="bbb0095"><span data-dcnode-id="6744" instrument_node="">Dengler and Matthes (2015)</span></a><span data-dcnode-id="6742" instrument_node=""> show that in 2013, 15% of German employees had an occupation for which more than 70% of the tasks could have been carried out by computers, which is a sign of a rather low percentage of job destruction caused by technological change. Likewise, </span><a class="workspace-trigger" data-dcnode-id="6740" href="#bb0060" name="bbb0060"><span data-dcnode-id="6741" instrument_node="">Bourgeois (2015)</span></a><span data-dcnode-id="6739" instrument_node=""> finds that while ICTs have changed the nature of jobs and created new types of job, their adoption has not led to massive job destruction. Studying the impact of ICTs in Europe, </span><a class="workspace-trigger" data-dcnode-id="6737" href="#bb0140" name="bbb0140"><span data-dcnode-id="6738" instrument_node="">Evangelista et al. (2014)</span></a><span data-dcnode-id="6736" instrument_node=""> also find an overall positive effect of these technologies on employment levels.</span></p><p data-dcnode-id="6721" id="p0135"><span data-dcnode-id="6734" instrument_node="">A further issue related to technological change and labour is that while the overall impact of technological change on employment may be positive, this may not be the case for all industry sectors. As evidenced by </span><a class="workspace-trigger" data-dcnode-id="6732" href="#bb0280" name="bbb0280"><span data-dcnode-id="6733" instrument_node="">Torii (1989)</span></a><span data-dcnode-id="6731" instrument_node=""> and more recently by </span><a class="workspace-trigger" data-dcnode-id="6729" href="#bb0310" name="bbb0310"><span data-dcnode-id="6730" instrument_node="">Wydra (2011)</span></a><span data-dcnode-id="6728" instrument_node="">, technological change does not affect employment in all industry sectors in the same manner. As a matter of fact, regardless of the overall impact on employment, it is often the case that some sectors experience a positive effect, while others have to face a negative one (</span><a class="workspace-trigger" data-dcnode-id="6726" href="#bb0310" name="bbb0310"><span data-dcnode-id="6727" instrument_node="">Wydra, 2011</span></a><span data-dcnode-id="6725" instrument_node="">). For instance, </span><a class="workspace-trigger" data-dcnode-id="6723" href="#bb0140" name="bbb0140"><span data-dcnode-id="6724" instrument_node="">Evangelista et al. (2014)</span></a><span data-dcnode-id="6722" instrument_node=""> find a significant difference in regard to impact of ICTs on employment between manufacturing and service sectors.</span></p><p data-dcnode-id="6716" id="p0140"><span data-dcnode-id="6720" instrument_node="">One of the reasons why technological change does not affect all sectors equally is that it often results in a large-scale shift within the economy towards different types of sectors. For instance, ICTs have led developed countries to move away from manufacturing and towards services, causing net job destruction in manufacturing sectors and job creation in service sectors, a move that has been further amplified by the economic crises (</span><a class="workspace-trigger" data-dcnode-id="6718" href="#bb0030" name="bbb0030"><span data-dcnode-id="6719" instrument_node="">Archibugi et al., 2013</span></a><span data-dcnode-id="6717" instrument_node="">).</span></p><p data-dcnode-id="6705" id="p0145"><span data-dcnode-id="6715" instrument_node="">Leaving aside such long-term trends, the difference of impact across sectors can also be explained by the fact that incumbents in some sectors are able to better resist the entrance of newcomers (</span><a class="workspace-trigger" data-dcnode-id="6713" href="#bb0130" name="bbb0130"><span data-dcnode-id="6714" instrument_node="">Essendorfer et al., 2015</span></a><span data-dcnode-id="6712" instrument_node="">). Furthermore, within the same sector, technological change does not affect employment homogeneously. For instance, even in the case of a high rate of substitution from labour to capital, low-skilled workers are still often needed (e.g. for maintenance tasks), albeit in a lower quantity, while high-skilled workers, familiar with the new technology, are likely to be in high demand. In contrast, medium-skilled jobs (e.g. clerical workers, middle managers) are generally at threat because of the introduction of the new technology (</span><a class="workspace-trigger" data-dcnode-id="6710" href="#bb0255" name="bbb0255"><span data-dcnode-id="6711" instrument_node="">Roessner, 1985</span></a><span data-dcnode-id="6709" instrument_node="">). Also, the introduction of a new technology is generally more detrimental to older workers. In this respect, </span><a class="workspace-trigger" data-dcnode-id="6707" href="#bb0205" name="bbb0205"><span data-dcnode-id="6708" instrument_node="">Malul (2009)</span></a><span data-dcnode-id="6706" instrument_node=""> shows that there is a significant negative impact of technological change on the employment of older workers, while no such effect can be found for younger workers.</span></p><p data-dcnode-id="6697" id="p0150"><span data-dcnode-id="6704" instrument_node="">The two previous issues obviously relate to the question of skills. For </span><a class="workspace-trigger" data-dcnode-id="6702" href="#bb0150" name="bbb0150"><span data-dcnode-id="6703" instrument_node="">Freeman and Perez (1988)</span></a><span data-dcnode-id="6701" instrument_node="">, technological change leads to the emergence of a new techno-economic paradigm, which involves a new skill profile in the labour force. As a consequence, both quality and quantity of labour are affected (and, as a result, income distribution). Indeed, while at first glance the Schumpeterian creative destruction may appear to relate to new technologies disrupting and replacing older ones, it has far broader implication at higher levels and makes some occupations obsolete, hereby shifting the structure of employment (</span><a class="workspace-trigger" data-dcnode-id="6699" href="#bb0075" name="bbb0075"><span data-dcnode-id="6700" instrument_node="">Conceição et al., 2001</span></a><span data-dcnode-id="6698" instrument_node="">).</span></p><p data-dcnode-id="6686" id="p0155"><span data-dcnode-id="6696" instrument_node="">As noted in </span><a class="workspace-trigger" data-dcnode-id="6694" href="#bb0210" name="bbb0210"><span data-dcnode-id="6695" instrument_node="">Mangematin et al. (2014)</span></a><span data-dcnode-id="6693" instrument_node="">, the adjustment towards the new techno-economic paradigm is painful, as some categories of jobs become obsolete, unemployment rises and the skills required for the new jobs are too scarce. While strict employment protection regulations may appear to alleviate the issue, </span><a class="workspace-trigger" data-dcnode-id="6691" href="#bb0110" name="bbb0110"><span data-dcnode-id="6692" instrument_node="">Di Pietro (2002)</span></a><span data-dcnode-id="6690" instrument_node=""> emphasises that such regulations may in fact impede the adoption of the new technology and lead to a “low skill, low technology trap” characterised by low demand for high-skill workers and over-education. Thus, regardless of how painful the transition is, fully embracing the new technology yields better results than resisting it, just as was argued by </span><a class="workspace-trigger" data-dcnode-id="6688" href="#bb0160" name="bbb0160"><span data-dcnode-id="6689" instrument_node="">Godet (1983)</span></a><span data-dcnode-id="6687" instrument_node="">.</span></p><section data-dcnode-id="6605" id="s0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6680" id="st0030"><span data-dcnode-id="6685" instrument_node="">2.1</span><span data-dcnode-id="6683" instrument_node="">. </span><span data-dcnode-id="6681" instrument_node="">Job destruction and creation in the press industry</span></h3><p data-dcnode-id="6669" id="p0160"><span data-dcnode-id="6679" instrument_node="">The current article investigates the impact of digitisation on the employment in the press industry. As noted in </span><a class="workspace-trigger" data-dcnode-id="6677" href="#bb0235" name="bbb0235"><span data-dcnode-id="6678" instrument_node="">Øiestad and Bugge (2014)</span></a><span data-dcnode-id="6676" instrument_node="">, digitisation has considerably disrupted the music, film, advertising and publishing industries, which have been struggling for years now to overcome the challenges brought about by digital technologies. Likewise, </span><a class="workspace-trigger" data-dcnode-id="6674" href="#bb0210" name="bbb0210"><span data-dcnode-id="6675" instrument_node="">Mangematin et al. (2014)</span></a><span data-dcnode-id="6673" instrument_node=""> argue that creative industries in general have been the most affected by digitisation. For </span><a class="workspace-trigger" data-dcnode-id="6671" href="#bb0120" name="bbb0120"><span data-dcnode-id="6672" instrument_node="">Doyle (2013)</span></a><span data-dcnode-id="6670" instrument_node="">, “the profound and potentially disruptive impact of recent technological changes on the newspaper industry” makes “the concept of creative destruction […] especially apposite”.</span></p><p data-dcnode-id="6658" id="p0165"><span data-dcnode-id="6668" instrument_node="">In the U.S. alone, over 100,000 jobs were destroyed in just two years in 2008–2009 (</span><a class="workspace-trigger" data-dcnode-id="6666" href="#bb0300" name="bbb0300"><span data-dcnode-id="6667" instrument_node="">White, 2012</span></a><span data-dcnode-id="6665" instrument_node="">), with the press (newspapers and magazines) being particularly affected by this destruction. Indeed, as noted earlier, between 2003 and 2012, 16,200 full-time newspaper newsroom jobs vanished, while 38,000 magazine jobs were wiped out (</span><a class="workspace-trigger" data-dcnode-id="6663" href="#bb0185" name="bbb0185"><span data-dcnode-id="6664" instrument_node="">Jurkowitz et al., 2014</span></a><span data-dcnode-id="6662" instrument_node="">). Of course, meanwhile, there has been a shift towards online media. Yet, the growth of jobs in this sector is far from offsetting the jobs lost ‘offline’. For instance, in the U.S., while 5400 jobs were created in online media outlets, over 65,000 jobs were destroyed meanwhile (</span><a class="workspace-trigger" data-dcnode-id="6660" href="#bb0300" name="bbb0300"><span data-dcnode-id="6661" instrument_node="">White, 2012</span></a><span data-dcnode-id="6659" instrument_node="">).</span></p><p data-dcnode-id="6644" id="p0170"><span data-dcnode-id="6657" instrument_node="">Thus, one could reasonably expect that this study would also show a negative impact of digitisation on employment in the press industry. Yet, previous studies, generally at industry-level, have shown that industries and sectors that had a comparatively low adoption of the new technology were hit harder than those industries and sectors that had embraced technological change to a greater extent (</span><a class="workspace-trigger" data-dcnode-id="6655" href="#bb0135" name="bbb0135"><span data-dcnode-id="6656" instrument_node="">Evangelista and Savona, 2002</span></a><span data-dcnode-id="6654" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6652" href="#bb0215" name="bbb0215"><span data-dcnode-id="6653" instrument_node="">Mastrostefano and Pianta, 2009</span></a><span data-dcnode-id="6651" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6649" href="#bb0220" name="bbb0220"><span data-dcnode-id="6650" instrument_node="">Meyer-Krahmer, 1992</span></a><span data-dcnode-id="6648" instrument_node="">). Likewise, </span><a class="workspace-trigger" data-dcnode-id="6646" href="#bb0065" name="bbb0065"><span data-dcnode-id="6647" instrument_node="">Brouwer et al. (1993)</span></a><span data-dcnode-id="6645" instrument_node=""> provide evidence at micro-level that firms with a higher adoption of technology (ICT, in particular) display a higher employment growth that firms that do not.</span></p><p data-dcnode-id="6636" id="p0175"><span data-dcnode-id="6643" instrument_node="">We therefore hypothesise:</span></p><section data-dcnode-id="6637"><p data-dcnode-id="6640" id="en0005"><strong data-dcnode-id="6641"><span data-dcnode-id="6642" instrument_node="">H1</span></strong></p><p data-dcnode-id="6638" id="p0180"><span data-dcnode-id="6639" instrument_node="">The likelihood of job destruction is greater in the case of newspapers and magazines that are more reluctant to embrace digitisation.</span></p></section><p></p><p data-dcnode-id="6625"><span data-dcnode-id="6635" instrument_node="">Yet, while technological change is bearer of job destruction, it also creates opportunities of job creation. As a matter of fact, many studies, conducted at various levels (e.g. </span><a class="workspace-trigger" data-dcnode-id="6633" href="#bb0065" name="bbb0065"><span data-dcnode-id="6634" instrument_node="">Brouwer et al., 1993</span></a><span data-dcnode-id="6632" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6630" href="#bb0215" name="bbb0215"><span data-dcnode-id="6631" instrument_node="">Mastrostefano and Pianta, 2009</span></a><span data-dcnode-id="6629" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6627" href="#bb0240" name="bbb0240"><span data-dcnode-id="6628" instrument_node="">Pianta, 2006</span></a><span data-dcnode-id="6626" instrument_node="">) have shown that companies that embrace technological change to a greater extent display a greater likelihood of job creation.</span></p><p data-dcnode-id="6614" id="p0185"><span data-dcnode-id="6624" instrument_node="">Although the situation of the press industry, as presented so far, may look rather bleak, digitisation also has benefits. For </span><a class="workspace-trigger" data-dcnode-id="6622" href="#bb0065" name="bbb0065"><span data-dcnode-id="6623" instrument_node="">Doyle (2010)</span></a><span data-dcnode-id="6621" instrument_node="">, “digital convergence and growth of the Internet have provided extensive opportunities for innovation in the media sector”, and indeed, the traditional press groups have tried to adapt to the changes, which has created new opportunities for the press industry. As noted in </span><a class="workspace-trigger" data-dcnode-id="6619" href="#bb0215" name="bbb0215"><span data-dcnode-id="6620" instrument_node="">Charon (2010)</span></a><span data-dcnode-id="6618" instrument_node="">, the web is not a straight substitute to the traditional press and the two have developed together. As a matter of fact, when the printed version of a newspaper is not fully available online, web and print are complementary goods. However, if the print content is entirely put online without payment needed, print and web become substitutes (</span><a class="workspace-trigger" data-dcnode-id="6616" href="#bb0240" name="bbb0240"><span data-dcnode-id="6617" instrument_node="">Filistrucchi, 2005</span></a><span data-dcnode-id="6615" instrument_node="">). The ability to position online and offline content as complements or substitutes, depending on the content provided and on the pricing model, has provided opportunities to the press industry to reinvent itself and, indeed, the imminent threat of obliteration caused by digitisation has forced companies in the press industry to become creative again after a long period of inertia.</span></p><p data-dcnode-id="6606" id="p0190"><span data-dcnode-id="6613" instrument_node="">Consequently, the second hypothesis is:</span></p><section data-dcnode-id="6607"><p data-dcnode-id="6610" id="en0010"><strong data-dcnode-id="6611"><span data-dcnode-id="6612" instrument_node="">H2</span></strong></p><p data-dcnode-id="6608" id="p0200"><span data-dcnode-id="6609" instrument_node="">The likelihood of new job creation is higher for newspapers and magazines that have embraced digitisation to a greater extent.</span></p></section><p></p></section><section data-dcnode-id="6494" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6599" id="st0035"><span data-dcnode-id="6604" instrument_node="">2.2</span><span data-dcnode-id="6602" instrument_node="">. </span><span data-dcnode-id="6600" instrument_node="">Job quality in the press industry: types of contracts and wages</span></h3><p data-dcnode-id="6585" id="p0205"><span data-dcnode-id="6598" instrument_node="">The impact of technological change on employment goes beyond the sole question of job creation or destruction, but also relates to the issue of job quality, i.e. job security and wages. In regard to job security, technological change tends to increase employee turnover and less secure employment (</span><a class="workspace-trigger" data-dcnode-id="6596" href="#bb0035" name="bbb0035"><span data-dcnode-id="6597" instrument_node="">Askenazy and Moreno Galbis, 2007</span></a><span data-dcnode-id="6595" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6593" href="#bb0045" name="bbb0045"><span data-dcnode-id="6594" instrument_node="">Bauer and Bender, 2004</span></a><span data-dcnode-id="6592" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6590" href="#bb0155" name="bbb0155"><span data-dcnode-id="6591" instrument_node="">Givord and Maurin, 2004</span></a><span data-dcnode-id="6589" instrument_node="">). Likewise, technological change has been shown to cause a downwards pressure on wages (</span><a class="workspace-trigger" data-dcnode-id="6587" href="#bb0240" name="bbb0240"><span data-dcnode-id="6588" instrument_node="">Pianta, 2006</span></a><span data-dcnode-id="6586" instrument_node="">).</span></p><p data-dcnode-id="6577" id="p0210"><span data-dcnode-id="6584" instrument_node="">As a matter of fact, evidence shows that in the media industries, the working conditions of those who have remained employed have significantly worsened. In Europe, there has been a strong rise of freelance jobs, which now make up to 60% of the work force in some European countries (</span><a class="workspace-trigger" data-dcnode-id="6582" href="#bb0300" name="bbb0300"><span data-dcnode-id="6583" instrument_node="">White, 2012</span></a><span data-dcnode-id="6581" instrument_node="">). However, unlike freelancers in other sectors, who may be freelancers by choice, a significant proportion of freelancers in the media industry are former permanent members of staff who have been pressured to become freelancers, but, essentially, carry on doing the same job as they used to, albeit for less. </span><a class="workspace-trigger" data-dcnode-id="6579" href="#bb0090" name="bbb0090"><span data-dcnode-id="6580" instrument_node="">Dagiral and Parasie (2010)</span></a><span data-dcnode-id="6578" instrument_node=""> also note that most studies show that online journalists tend to have comparatively more insecure and lower paid jobs that the other journalists.</span></p><p data-dcnode-id="6572" id="p0215"><span data-dcnode-id="6576" instrument_node="">Furthermore, journalists who have kept their job have reported far higher workloads, both because of the layoffs, but also because of their new online responsibilities, which corresponds to a decrease in hourly wages (</span><a class="workspace-trigger" data-dcnode-id="6574" href="#bb0245" name="bbb0245"><span data-dcnode-id="6575" instrument_node="">Reinardy, 2010</span></a><span data-dcnode-id="6573" instrument_node="">). For journalists traditionally involved in the ‘print newspaper’, digitisation of content implies a significant number of additional tasks (and skills): create, edit, publish, update and format online articles, but also find photos or pictures to illustrate the content, moderate online comments left by the readers. As a matter of fact, with the Internet, the workload of journalists has become significantly heavier, with relatively unpredictable periods of frantic activity.</span></p><p data-dcnode-id="6540" id="p0220"><span data-dcnode-id="6571" instrument_node="">However, technological change (at least since the second half of the 20th century) has been known to be skill-biased, i.e. while low-skilled workers' job quality tends to be negatively affected by technological change, high-skilled workers tend to benefit from new technologies, both in terms of wages and job security (</span><a class="workspace-trigger" data-dcnode-id="6569" href="#bb0010" name="bbb0010"><span data-dcnode-id="6570" instrument_node="">Addison and Teixeira, 2001</span></a><span data-dcnode-id="6568" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6566" href="#bb0045" name="bbb0045"><span data-dcnode-id="6567" instrument_node="">Bauer and Bender, 2004</span></a><span data-dcnode-id="6565" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6563" href="#bb0140" name="bbb0140"><span data-dcnode-id="6564" instrument_node="">Evangelista et al., 2014</span></a><span data-dcnode-id="6562" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6560" href="#bb0240" name="bbb0240"><span data-dcnode-id="6561" instrument_node="">Pianta, 2006</span></a><span data-dcnode-id="6559" instrument_node="">). In regard to wages, the polarisation effect and rise of wage inequality is a well-known phenomenon (</span><a class="workspace-trigger" data-dcnode-id="6557" href="#bb0005" name="bbb0005"><span data-dcnode-id="6558" instrument_node="">Acemoglu, 2002</span></a><span data-dcnode-id="6556" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6554" href="#bb0010" name="bbb0010"><span data-dcnode-id="6555" instrument_node="">Addison and Teixeira, 2001</span></a><span data-dcnode-id="6553" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6551" href="#bb0240" name="bbb0240"><span data-dcnode-id="6552" instrument_node="">Pianta, 2006</span></a><span data-dcnode-id="6550" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6548" href="#bb0295" name="bbb0295"><span data-dcnode-id="6549" instrument_node="">Van Reenen, 1996</span></a><span data-dcnode-id="6547" instrument_node="">) and there is further evidence that the impact of technological change on job security also differs according to employees' skills (</span><a class="workspace-trigger" data-dcnode-id="6545" href="#bb0045" name="bbb0045"><span data-dcnode-id="6546" instrument_node="">Bauer and Bender, 2004</span></a><span data-dcnode-id="6544" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6542" href="#bb0275" name="bbb0275"><span data-dcnode-id="6543" instrument_node="">Segal and Sullivan, 1997</span></a><span data-dcnode-id="6541" instrument_node="">).</span></p><p data-dcnode-id="6520" id="p0225"><span data-dcnode-id="6539" instrument_node="">Skill-biased technological change is clearly visible in the press industry. While unavoidable, the move towards “digital multiplatform entities” has been competence destroying for the press industry (</span><a class="workspace-trigger" data-dcnode-id="6537" href="#bb0290" name="bbb0290"><span data-dcnode-id="6538" instrument_node="">Tushman and Anderson, 1986</span></a><span data-dcnode-id="6536" instrument_node="">). Indeed, as noted in </span><a class="workspace-trigger" data-dcnode-id="6534" href="#bb0090" name="bbb0090"><span data-dcnode-id="6535" instrument_node="">Dagiral and Parasie (2010)</span></a><span data-dcnode-id="6533" instrument_node="">, the production of online content and management of websites, which are not part of the traditional competences of newspapers and magazines, can either be internalised (which requires the development of new competences) or outsourced (which also requires new competences, albeit to a much smaller extent). In both cases, ‘going online’ leads to a significant transformation of the nature of the jobs in the industry. For instance, journalists now need to have the ability to create and maintain a relationship with the online community and to involve ‘experts’, the ‘net surfers’ and social media users (</span><a class="workspace-trigger" data-dcnode-id="6531" href="#bb0070" name="bbb0070"><span data-dcnode-id="6532" instrument_node="">Charon, 2010</span></a><span data-dcnode-id="6530" instrument_node="">). They also have to develop multimedia skills, work faster and be able to multitask (</span><a class="workspace-trigger" data-dcnode-id="6528" href="#bb0100" name="bbb0100"><span data-dcnode-id="6529" instrument_node="">Deuze et al., 2004</span></a><span data-dcnode-id="6527" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6525" href="#bb0305" name="bbb0305"><span data-dcnode-id="6526" instrument_node="">Witschge and Nygren, 2009</span></a><span data-dcnode-id="6524" instrument_node="">). Finally, they have to be knowledgeable about web-specific practices, such as referencing, and develop specific skills related to online content, which has a different format and readership than printed content (</span><a class="workspace-trigger" data-dcnode-id="6522" href="#bb0105" name="bbb0105"><span data-dcnode-id="6523" instrument_node="">DGEFP, 2011</span></a><span data-dcnode-id="6521" instrument_node="">).</span></p><p data-dcnode-id="6509" id="p0230"><span data-dcnode-id="6519" instrument_node="">Thus, new skills have to be acquired and becoming multi-skilled is a necessity. This importance of ‘new’ skills leads to a sorting behaviour, identified in the literature (</span><a class="workspace-trigger" data-dcnode-id="6517" href="#bb9000" name="bbb9000"><span data-dcnode-id="6518" instrument_node="">Bartel and Sicherman, 1999</span></a><span data-dcnode-id="6516" instrument_node="">), whereby higher skilled workers tend to be more prevalent within firms and industries with higher rate of technological change. Thus, one can expect journalists who work for newspapers and magazines that embraced digitisation to a greater extent to have both higher wages and more secure contracts. Besides sorting, this positive relationship between higher adoption of new technologies by the firms and wages of their employees has been confirmed by several studies at various levels of analysis (</span><a class="workspace-trigger" data-dcnode-id="6514" href="#bb0050" name="bbb0050"><span data-dcnode-id="6515" instrument_node="">Berman et al., 1994</span></a><span data-dcnode-id="6513" instrument_node="">; van Reenen; </span><a class="workspace-trigger" data-dcnode-id="6511" href="#bb0240" name="bbb0240"><span data-dcnode-id="6512" instrument_node="">Pianta, 2006</span></a><span data-dcnode-id="6510" instrument_node="">), as new technologies require new skills that are, at first, rare and highly valued.</span></p><p data-dcnode-id="6495" id="p0235"><span data-dcnode-id="6508" instrument_node="">This leads to the following two hypotheses:</span></p><section data-dcnode-id="6502"><p data-dcnode-id="6505" id="en0015"><strong data-dcnode-id="6506"><span data-dcnode-id="6507" instrument_node="">H3</span></strong></p><p data-dcnode-id="6503" id="p0240"><span data-dcnode-id="6504" instrument_node="">Jobs created in the press industry are more likely to be of insecure nature, but the level of digitisation decreases this likelihood.</span></p></section><section data-dcnode-id="6496"><p data-dcnode-id="6499" id="en0020"><strong data-dcnode-id="6500"><span data-dcnode-id="6501" instrument_node="">H4</span></strong></p><p data-dcnode-id="6497" id="p0245"><span data-dcnode-id="6498" instrument_node="">The wages of journalists are positively impacted by the degree of digitisation of the newspaper or magazine they work for.</span></p></section><p></p></section></section><section data-dcnode-id="5329" id="s0025"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6487" id="st0040"><span data-dcnode-id="6492" instrument_node="">3</span><span data-dcnode-id="6490" instrument_node="">. </span><span data-dcnode-id="6488" instrument_node="">Data and methodology</span></h2><p data-dcnode-id="6477" id="p0250"><span data-dcnode-id="6486" instrument_node="">In order to test these hypotheses, data on digitisation, as well as on the dynamics of wages and jobs creation and destruction in the press, are needed. This research is based on the joint statistical analysis of two databases for the years 2011–2012. The first database, compiled by the CCIJP,</span><a class="workspace-trigger" data-dcnode-id="6483" href="#fn0015" name="bfn0015"><sup data-dcnode-id="6484"><span data-dcnode-id="6485" instrument_node="">3</span></sup></a><span data-dcnode-id="6482" instrument_node=""> provides exhaustive individual records of all French professional journalists (13,800 entries). The second database, obtained from OJD,</span><a class="workspace-trigger" data-dcnode-id="6479" href="#fn0020" name="bfn0020"><sup data-dcnode-id="6480"><span data-dcnode-id="6481" instrument_node="">4</span></sup></a><span data-dcnode-id="6478" instrument_node=""> consists of online and print sales, as well as subscription data for all French newspapers and magazines (481 entries). It also provides information about specific characteristics of each newspaper and magazines, such as publication schedule and topic areas.</span></p><p data-dcnode-id="6475" id="p0255"><span data-dcnode-id="6476" instrument_node="">These two databases were combined by matching the name of the employer in the CCIJP database with the newspaper or magazine title in the OJD database. Journalists working in the press industry (as opposed to other media) account for about 70% of journalists in the CCIJP database. After matching the two databases and removing incomplete or erroneous entries, the final sample consists of 35% of the CCIJP database (i.e. a sample size of 4830 entries). Because this article focuses particularly on the impact of technological change on traditional media outlets, ‘pure players’, such as the Huffington Post, that deliver content exclusively online were left aside.</span></p><section data-dcnode-id="6162" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6469" id="st0045"><span data-dcnode-id="6474" instrument_node="">3.1</span><span data-dcnode-id="6472" instrument_node="">. </span><span data-dcnode-id="6470" instrument_node="">Model specification and dependent variables</span></h3><p data-dcnode-id="6459" id="p0260"><a class="workspace-trigger" data-dcnode-id="6467" href="#en0005" name="ben0005"><span data-dcnode-id="6468" instrument_node="">H1</span></a><span data-dcnode-id="6466" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="6464" href="#en0010" name="ben0010"><span data-dcnode-id="6465" instrument_node="">H2</span></a><span data-dcnode-id="6463" instrument_node=""> suggest that digitisation directly influences the destruction and creation of jobs. In addition, according to </span><a class="workspace-trigger" data-dcnode-id="6461" href="#en0015" name="ben0015"><span data-dcnode-id="6462" instrument_node="">H3</span></a><span data-dcnode-id="6460" instrument_node="">, new jobs created are of a more casual nature than the ones they replaced, but this trend is stronger for those firms that more reluctant to embrace digitisation.</span></p><p data-dcnode-id="6330" id="p0265"><span data-dcnode-id="6458" instrument_node="">Around 8% of the journalists in the sample have been affected by job creation or destruction. Indeed, there were 1099 jobs created and 1199 jobs destroyed. To assess the effect of digitisation on job creation/destruction, a binominal logit model is used to estimate the probabilities of both job creation and destruction. This model is estimated using the method of maximum likelihood:</span><span class="display" data-dcnode-id="6338"><span class="formula" data-dcnode-id="6339" id="fo0005"><span class="label" data-dcnode-id="6456"><span data-dcnode-id="6457" instrument_node="">(1)</span></span><span class="math" data-dcnode-id="6340"><span class="MathJax_Preview" data-dcnode-id="6455" style=""></span><span class="MathJax_SVG" data-dcnode-id="6343" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mo mathvariant=&quot;italic&quot; is=&quot;true&quot;>log</mo><mfenced open=&quot;(&quot; close=&quot;)&quot; is=&quot;true&quot;><mfrac is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3C0;</mi><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>1</mn><mo is=&quot;true&quot;>&amp;#x2212;</mo><mi is=&quot;true&quot;>&amp;#x3C0;</mi></mrow></mfrac></mfenced><mo is=&quot;true&quot;>=</mo><mi is=&quot;true&quot;>a</mi><mo is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mi is=&quot;true&quot;>b</mi><mn is=&quot;true&quot;>1</mn></msub><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>Digitisation</mi><mo is=&quot;true&quot;>+</mo><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>X&amp;#x3B4;</mi></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="6376" focusable="false" height="4.549ex" role="img" style="vertical-align: -1.722ex; margin-right: -0.016ex;" viewBox="0 -1217.1 15817.5 1958.7" width="36.738ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="6377" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="6448" is="true"><use data-dcnode-id="6453" href="#MJMATHI-6C"><path d="M117 59Q117 pan></mn><mo data-dcnode-id="6368" is="true"><span data-dcnode-id="6369" instrument_node="">−</span></mo><mi data-dcnode-id="6366" is="true"><span data-dcnode-id="6367" instrument_node="">π</span></mi></mrow></mfrac></mfenced><mo data-dcnode-id="6361" is="true"><span data-dcnode-id="6362" instrument_node="">=</span></mo><mi data-dcnode-id="6359" is="true"><span data-dcnode-id="6360" instrument_node="">a</span></mi><mo data-dcnode-id="6357" is="true"><span data-dcnode-id="6358" instrument_node="">+</span></mo><msub data-dcnode-id="6352" is="true"><mi data-dcnode-id="6355" is="true"><span data-dcnode-id="6356" instrument_node="">b</span></mi><mn data-dcnode-id="6353" is="true"><span data-dcnode-id="6354" instrument_node="">1</span></mn></msub><mi data-dcnode-id="6350" is="true" mathvariant="italic"><span data-dcnode-id="6351" instrument_node="">Digitisation</span></mi><mo data-dcnode-id="6348" is="true"><span data-dcnode-id="6349" instrument_node="">+</span></mo><mi data-dcnode-id="6346" is="true" mathvariant="italic"><span data-dcnode-id="6347" instrument_node="">Xδ</span></mi></math></span></span></span></span></span><span data-dcnode-id="6337" instrument_node="">where </span><em data-dcnode-id="6335"><span data-dcnode-id="6336" instrument_node="">π</span></em><span data-dcnode-id="6334" instrument_node=""> is the probability that a journalist experiences a modification of her job status, and </span><em data-dcnode-id="6332"><span data-dcnode-id="6333" instrument_node="">X</span></em><span data-dcnode-id="6331" instrument_node=""> is a vector of control variables. The same model is estimated for two different sets of explanatory variables. In the first version of the model, a latent variable that takes the value 1 if a journalist was laid off and 0 otherwise is used. In the second version of the model, the latent variable is equal to one if a journalist is hired and zero otherwise.</span></p><p data-dcnode-id="6163" id="p0270"><a class="workspace-trigger" data-dcnod " role="presentation"><math data-dcnode-id="6175" xmlns="http://www.w3.org/1998/Math/MathML"><mo data-dcnode-id="6217" is="true" mathvariant="italic"><span data-dcnode-id="6218" instrument_node="">ln</span></mo><mi data-dcnode-id="6215" is="true"><span data-dcnode-id="6216" instrument_node="">Y</span></mi><mo data-dcnode-id="6213" is="true"><span data-dcnode-id="6214" instrument_node="">=</span></mo><mi data-dcnode-id="6211" is="true"><span data-dcnode-id="6212" instrument_node="">a</span></mi><mo data-dcnode-id="6209" is="true"><span data-dcnode-id="6210" instrument_node="">+</span></mo><msub data-dcnode-id="6204" is="true"><mi data-dcnode-id="6207" is="true"><span data-dcnode-id="6208" instrument_node="">b</span></mi><mn data-dcnode-id="6205" is="true"><span data-dcnode-id="6206" instrument_node="">1</span></mn></msub><mi data-dcnode-id="6202" is="true" mathvariant="italic"><span data-dcnode-id="6203" instrument_node="">Digitisation</span></mi><mo data-dcnode-id="6200" is="true"><span data-dcnode-id="6201" instrument_node="">+</span></mo><msub data-dcnode-id="6195" is="true"><mi data-dcnode-id="6198" is="true"><span data-dcnode-id="6199" instrument_node="">b</span></mi><mn data-dcnode-id="6196" is="true"><span data-dcnode-id="6197" instrument_node="">2</span></mn></msub><mi data-dcnode-id="6193" is="true" mathvariant="italic"><span data-dcnode-id="6194" instrument_node="">School</span></mi><mo data-dcnode-id="6191" is="true"><span data-dcnode-id="6192" instrument_node="">+</span></mo><msub data-dcnode-id="6186" is="true"><mi data-dcnode-id="6189" is="true"><span data-dcnode-id="6190" instrument_node="">b</span></mi><mn data-dcnode-id="6187" is="true"><span data-dcnode-id="6188" instrument_node="">3</span></mn></msub><mi data-dcnode-id="6184" is="true" mathvariant="italic"><span data-dcnode-id="6185" instrument_node="">XBT</span></mi><mo data-dcnode-id="6182" is="true"><span data-dcnode-id="6183" instrument_node="">+</span></mo><mi data-dcnode-id="6180" is="true" mathvariant="italic"><span data-dcnode-id="6181" instrument_node="">Xδ</span></mi><mo data-dcnode-id="6178" is="true"><span data-dcnode-id="6179" instrument_node="">+</span></mo><mi data-dcnode-id="6176" is="true"><span data-dcnode-id="6177" instrument_node="">ϵ</span></mi></math></span></span></span></span></span><span data-dcnode-id="6167" instrument_node="">where, </span><em data-dcnode-id="6165"><span data-dcnode-id="6166" instrument_node="">Y</span></em><span data-dcnode-id="6164" instrument_node=""> corresponds to the journalists' monthly wages in Euros (base 2012).</span></p></section><section data-dcnode-id="5831" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6156" id="st0050"><span data-dcnode-id="6161" instrument_node="">3.2</span><span data-dcnode-id="6159" instrument_node="">. </span><span data-dcnode-id="6157" instrument_node="">Measuring digitisation</span></h3><p data-dcnode-id="6142" id="p0275"><span data-dcnode-id="6155" instrument_node="">The difference of impact between adoption of new technologies for product innovation and for process innovation has been largely evidenced in the literature (</span><a class="workspace-trigger" data-dcnode-id="6153" href="#bb0065" name="bbb0065"><span data-dcnode-id="6154" instrument_node="">Brouwer et al., 1993</span></a><span data-dcnode-id="6152" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6150" href="#bb9005" name="bbb9005"><span data-dcnode-id="6151" instrument_node="">Vivarelli et al., 1996</span></a><span data-dcnode-id="6149" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6147" href="#bb0020" name="bbb0020"><span data-dcnode-id="6148" instrument_node="">Antonucci and Pianta, 2002</span></a><span data-dcnode-id="6146" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6144" href="#bb0240" name="bbb0240"><span data-dcnode-id="6145" instrument_node="">Pianta, 2006</span></a><span data-dcnode-id="6143" instrument_node="">). Whereas embracing technological change for product innovation tends to have a positive impact on employment, process innovation generally leads to a decrease in employment needs.</span></p><p data-dcnode-id="6134" id="p0280"><span data-dcnode-id="6141" instrument_node="">Although what first comes to mind when thinking about digitisation of the press industry are the severe disruptions that have ensued the wide availability of the Internet from the mid-1990s onwards, digitisation in this industry actually started a decade earlier with the development of ‘Desktop Publishing’ in the mid-1980s. The appearance of computers with mouse and Graphical Interface (Apple Macintosh in 1984, Windows 1 in 1985), typesetting software (such as Aldus PageMaker, Quark Xpress, and, later on, Adobe InDesign), digital printing protocols (Postscript, PDF) and printing machines led to large changes the industry and less than a decade later, digitisation had extensively transformed the press industry (</span><a class="workspace-trigger" data-dcnode-id="6139" href="#bb0080" name="bbb0080"><span data-dcnode-id="6140" instrument_node="">Cox and Mowatt, 2008</span></a><span data-dcnode-id="6138" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6136" href="#bb0125" name="bbb0125"><span data-dcnode-id="6137" instrument_node="">Driver and Gillespie, 1993</span></a><span data-dcnode-id="6135" instrument_node="">).</span></p><p data-dcnode-id="6128" id="p0285"><span data-dcnode-id="6133" instrument_node="">Thus, in the press industry, digital technological change first led mainly to process innovation from the mid-1980s to the mid-1990s.</span><a class="workspace-trigger" data-dcnode-id="6130" href="#fn0025" name="bfn0025"><sup data-dcnode-id="6131"><span data-dcnode-id="6132" instrument_node="">5</span></sup></a><span data-dcnode-id="6129" instrument_node=""> In contrast, after the mid-1990s, with the advent of the Internet, digitisation mainly led to (radical) product innovation.</span></p><p data-dcnode-id="6126" id="p0290"><span data-dcnode-id="6127" instrument_node="">Thus, by the time the press industry started to be affected by the advent of the Internet (in the mid-1990s), process innovation due to digitisation had already largely taken place and further process innovation was relatively minor (for instance, Desktop Publishing software was updated to directly publish web pages based on print articles at the touch of a button). In the case at hand, it is rather clear that disruptions are related to product innovation and not process innovation.</span></p><p data-dcnode-id="6109" id="p0295"><span data-dcnode-id="6125" instrument_node="">In the literature, product innovation has been measured using various proxies, such as the number of patents (</span><a class="workspace-trigger" data-dcnode-id="6123" href="#bb0025" name="bbb0025"><span data-dcnode-id="6124" instrument_node="">Archibugi, 1992</span></a><span data-dcnode-id="6122" instrument_node="">), R&amp;D (</span><a class="workspace-trigger" data-dcnode-id="6120" href="#bb0065" name="bbb0065"><span data-dcnode-id="6121" instrument_node="">Brouwer et al., 1993</span></a><span data-dcnode-id="6119" instrument_node="">), innovation expenditure (</span><a class="workspace-trigger" data-dcnode-id="6117" href="#bb2000" name="bbb2000"><span data-dcnode-id="6118" instrument_node="">Lachenmaier and Rottmann, 2011</span></a><span data-dcnode-id="6116" instrument_node="">), innovation count (</span><a class="workspace-trigger" data-dcnode-id="6114" href="#bb2000" name="bbb2000"><span data-dcnode-id="6115" instrument_node="">Lachenmaier and Rottmann, 2011</span></a><span data-dcnode-id="6113" instrument_node="">). Yet, as noted in </span><a class="workspace-trigger" data-dcnode-id="6111" href="#bb0215" name="bbb0215"><span data-dcnode-id="6112" instrument_node="">Mastrostefano and Pianta (2009)</span></a><span data-dcnode-id="6110" instrument_node="">, what brings job growth is innovation that has market impact rather than innovation per se.</span></p><p data-dcnode-id="5832" id="p0300"><span data-dcnode-id="6108" instrument_node="">For this reason, we decided to use the figures of online sales as a proxy for the degree of digitisation (from a product perspective) of each news outlet. More precisely, we build a </span><em data-dcnode-id="6106"><span data-dcnode-id="6107" instrument_node="">Digitisation</span></em><span data-dcnode-id="6105" instrument_node=""> index using both the figures of digital (paid) circulation and total circulation in the OJD dataset was computed as follows:</span><span class="display" data-dcnode-id="5833"><span class="formula" data-dcnode-id="5834" id="fo0015"><span class="math" data-dcnode-id="5835"><span class="MathJax_Preview" data-dcnode-id="6104" style=""></span><span class="MathJax_SVG" data-dcnode-id="5838" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>Digitisation</mi><mo is=&quot;true&quot;>=</mo><mo is=&quot;true&quot;>ln</mo><mfenced open=&quot;(&quot; close=&quot;)&quot; is=&quot;true&quot;><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>1</mn><mo is=&quot;true&quot;>+</mo><mfenced open=&quot;(&quot; close=&quot;)&quot; is=&quot;true&quot;><mfrac is=&quot;true&quot;><mrow is=&quot;true&quot;><mn mathvariant=&quot;italic&quot; is=&quot;true&quot;>100</mn><mo mathvariant=&quot;italic&quot; is=&quot;true&quot;>&amp;#xD7;</mo><mi is=&quot;true&quot;>D</mi><mi is=&quot;true&quot;>i</mi><mi is=&quot;true&quot;>g</mi><mi is=&quot;true&quot;>i</mi><mi is=&quot;true&quot;>t</mi><mi is=&quot;true&quot;>a</mi><mi is=&quot;true&quot;>l</mi><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mi is=&quot;true&quot;>C</mi><mi is=&quot;true&quot;>i</mi><mi is=&quot;true&quot;>r</mi><mi is=&quot;true&quot;>c</mi><mi is=&quot;true&quot;>u</mi><mi is=&quot;true&quot;>l</mi><mi is=&quot;true&quot;>a</mi><mi is=&quot;true&quo
