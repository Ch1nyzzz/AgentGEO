trument_node="">0.467**</span></td><td class="align-char" data-dcnode-id="4256"><span data-dcnode-id="4261" instrument_node="">−</span><span data-dcnode-id="4259" instrument_node="">&nbsp;</span><span data-dcnode-id="4257" instrument_node="">0.416**</span></td><td class="align-char" data-dcnode-id="4250"><span data-dcnode-id="4255" instrument_node="">−</span><span data-dcnode-id="4253" instrument_node="">&nbsp;</span><span data-dcnode-id="4251" instrument_node="">0.463**</span></td></tr><tr data-dcnode-id="4238"><td data-dcnode-id="4248"></td><td data-dcnode-id="4247"></td><td class="align-char" data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">(0.018)</span></td><td class="align-char" data-dcnode-id="4243"><span data-dcnode-id="4244" instrument_node="">(0.015)</span></td><td class="align-char" data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">(0.027)</span></td><td class="align-char" data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">(0.013)</span></td></tr><tr data-dcnode-id="4223"><th data-dcnode-id="4236" scope="row"><span data-dcnode-id="4237" instrument_node="">Observations</span></th><td class="align-char" data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">5075</span></td><td class="align-char" data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">19,633</span></td><td class="align-char" data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">13,252</span></td><td class="align-char" data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">11,456</span></td><td class="align-char" data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">3575</span></td><td class="align-char" data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">21,133</span></td></tr><tr data-dcnode-id="4208"><th data-dcnode-id="4221" scope="row"><span data-dcnode-id="4222" instrument_node="">R-squared</span></th><td class="align-char" data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">0.073</span></td><td class="align-char" data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">0.624</span></td><td class="align-char" data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">0.589</span></td><td class="align-char" data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">0.509</span></td><td class="align-char" data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">0.592</span></td><td class="align-char" data-dcnode-id="4209"><span data-dcnode-id="4210" instrument_node="">0.550</span></td></tr><tr data-dcnode-id="4193"><th data-dcnode-id="4206" scope="row"><span data-dcnode-id="4207" instrument_node="">RMSE</span></th><td class="align-char" data-dcnode-id="4204"><span data-dcnode-id="4205" instrument_node="">0.564</span></td><td class="align-char" data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">0.242</span></td><td class="align-char" data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">0.317</span></td><td class="align-char" data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">0.366</span></td><td class="align-char" data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">0.323</span></td><td class="align-char" data-dcnode-id="4194"><span data-dcnode-id="4195" instrument_node="">0.344</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4187"></p><p data-dcnode-id="4188" id="sp0080"><span data-dcnode-id="4189" instrument_node="">Notes. * Significant at 5%, ** significant at 1%. Except for dummy variables, all variables are expressed in log form. Heteroscedastic and clustering robust standard errors are in parentheses. Each regression includes a constant, time dummies, position dummies, French department dummies, and specialisation dummies not reported.</span></p><p></p></div></div><p data-dcnode-id="4180" id="p0405"><span data-dcnode-id="4184" instrument_node="">The main result of this section is that digitisation has, overall, a positive impact on journalists' wages, which validates </span><a class="workspace-trigger" data-dcnode-id="4182" href="#en0020" name="ben0020"><span data-dcnode-id="4183" instrument_node="">H4</span></a><span data-dcnode-id="4181" instrument_node="">. However, beyond digitisation, other criteria (size of the journal, gender, education, experience, type of contract) play a significant role in income disparity. Altogether, results show that the positive impact of digitisation is greater for permanent members of staff than for journalists with casual contracts.</span></p></section><section data-dcnode-id="4102" id="s0065"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4173" id="st0080"><span data-dcnode-id="4178" instrument_node="">6</span><span data-dcnode-id="4176" instrument_node="">. </span><span data-dcnode-id="4174" instrument_node="">Discussion</span></h2><p data-dcnode-id="4171" id="p0410"><span data-dcnode-id="4172" instrument_node="">This research firstly aimed to contribute to the large body of literature related to the creative destruction phenomenon caused by technological change. While the media and the press industries have been, arguably, amongst the first and most affected by digitisation, there have been, so far, few studies devoted to these industries. As a matter of fact, even years after digitisation started, this research shows evidence of creative destruction taking place in the press industry.</span></p><p data-dcnode-id="4166" id="p0415"><span data-dcnode-id="4170" instrument_node="">A second question and, possibly the most critical one, was whether embracing technological change had a positive or a negative effect on employment. As noted earlier, while this question has been addressed in the literature, by means of studies at micro-level, the main shortcoming of such studies is that they rely on surveys, necessarily incomplete, which lead to results that cannot be generalised (</span><a class="workspace-trigger" data-dcnode-id="4168" href="#bb0240" name="bbb0240"><span data-dcnode-id="4169" instrument_node="">Pianta, 2006</span></a><span data-dcnode-id="4167" instrument_node="">). Instead, this research is based on an exhaustive dataset of all journalists working for newspapers and magazines in France and do not need generalisation, as they are related to the entire sector. Such exhaustiveness is rarely achieved, and this constitutes one of the key contributions of this research.</span></p><p data-dcnode-id="4143" id="p0420"><span data-dcnode-id="4165" instrument_node="">As noted in </span><a class="workspace-trigger" data-dcnode-id="4163" href="#s0010" name="bs0010"><span data-dcnode-id="4164" instrument_node="">Section 2</span></a><span data-dcnode-id="4162" instrument_node="">, besides the issue of creative destruction caused by technological change, one of the central questions discussed in the literature is whether embracing the technology to a greater extent favours creation or, instead, destruction (</span><a class="workspace-trigger" data-dcnode-id="4160" href="#bb0065" name="bbb0065"><span data-dcnode-id="4161" instrument_node="">Brouwer et al., 1993</span></a><span data-dcnode-id="4159" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4157" href="#bb0135" name="bbb0135"><span data-dcnode-id="4158" instrument_node="">Evangelista and Savona, 2002</span></a><span data-dcnode-id="4156" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4154" href="#bb0215" name="bbb0215"><span data-dcnode-id="4155" instrument_node="">Mastrostefano and Pianta, 2009</span></a><span data-dcnode-id="4153" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4151" href="#bb0220" name="bbb0220"><span data-dcnode-id="4152" instrument_node="">Meyer-Krahmer, 1992</span></a><span data-dcnode-id="4150" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4148" href="#bb0240" name="bbb0240"><span data-dcnode-id="4149" instrument_node="">Pianta, 2006</span></a><span data-dcnode-id="4147" instrument_node="">). The present research shows that in the case of the press industry in France, a higher degree of digitisation (i.e. a greater embrace of the technology) both decreases the likelihood of job destruction and increases the likelihood of job creation. This result is quite an important one, as the various reports published on the impact of digitisation on employment in the press industry could have led to believe that digitisation had, </span><em data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">in fine</span></em><span data-dcnode-id="4144" instrument_node="">, an overwhelming negative impact. Instead, this research shows that digitisation is in fact the best response to the disruption it creates.</span></p><p data-dcnode-id="4126" id="p0425"><span data-dcnode-id="4142" instrument_node="">However, the number of jobs (i.e. job quantity) is only one of the dimensions of the evolution of the labour market caused by technological change. As noted in the literature, it is important to consider the issues related to job quality, i.e. the type of contract (secure or insecure) and the impact on the wages (</span><a class="workspace-trigger" data-dcnode-id="4140" href="#bb0035" name="bbb0035"><span data-dcnode-id="4141" instrument_node="">Askenazy and Moreno Galbis, 2007</span></a><span data-dcnode-id="4139" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4137" href="#bb0045" name="bbb0045"><span data-dcnode-id="4138" instrument_node="">Bauer and Bender, 2004</span></a><span data-dcnode-id="4136" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4134" href="#bb0155" name="bbb0155"><span data-dcnode-id="4135" instrument_node="">Givord and Maurin, 2004</span></a><span data-dcnode-id="4133" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4131" href="#bb0240" name="bbb0240"><span data-dcnode-id="4132" instrument_node="">Pianta, 2006</span></a><span data-dcnode-id="4130" instrument_node="">). In regard to the former, this study highlights a clear trend of replacement of secure jobs by insecure ones, which confirms trends highlighted in previous studies (</span><a class="workspace-trigger" data-dcnode-id="4128" href="#bb0300" name="bbb0300"><span data-dcnode-id="4129" instrument_node="">White, 2012</span></a><span data-dcnode-id="4127" instrument_node="">). Yet, embracing technological change creates a moderating factor, since a greater degree of digitisation increases to a larger extent the probability of creation of secure jobs. Finally, results show a positive relationship between the degree of digitisation and the wages of the journalists, with a stronger positive effect for journalists on a secure contract. Thus, overall, embracing digitisation for newspapers and magazines, leads to greater jobs opportunities, to more opportunities that these jobs will be of a secure nature, and to a greater likelihood that they will be better paid.</span></p><p data-dcnode-id="4121" id="p0430"><span data-dcnode-id="4125" instrument_node="">A further contribution of this work is that it confirms the skilled-biased nature of technological change (in this case, digitisation). As noted in </span><a class="workspace-trigger" data-dcnode-id="4123" href="#s0010" name="bs0010"><span data-dcnode-id="4124" instrument_node="">Section 2</span></a><span data-dcnode-id="4122" instrument_node="">, newspapers and magazines seeking a greater online presence require journalists with new skills. The higher demand for those skills is evidenced by the fact that news outlets that have a higher level of digitisation are also more likely to offer secure contracts and higher wages. In this respect, it is interesting to note that results show that holding a recognised journalist degree does not have a significant impact on the likelihood of either job destruction, creation or casualisation, and only impacts wages marginally. An interpretation of this rather surprising result is that the employers do not recognise these degrees as being bearers of the new skills required because of digitisation, which may be a sign that the curriculum of these degrees has to be updated (or, if this has been done, greater communication about it is needed).</span></p><p data-dcnode-id="4112" id="p0435"><span data-dcnode-id="4120" instrument_node="">As a matter of fact, French journalist schools, whether they deliver recognised degrees or not, have sought to adapt their curriculum to the job market's new reality. As a consequence, all schools now deliver courses involving multimedia technologies and online journalism techniques, and digital technologies are now a cornerstone of every journalist's initial training (</span><a class="workspace-trigger" data-dcnode-id="4118" href="#bb0195" name="bbb0195"><span data-dcnode-id="4119" instrument_node="">Le Cam and Trédan, 2008</span></a><span data-dcnode-id="4117" instrument_node="">). However, besides schools, the required new skills related to digital technologies are also provided through further education programmes. In France, this training is mainly provided by the Afdas,</span><a class="workspace-trigger" data-dcnode-id="4114" href="#fn0045" name="bfn0045"><sup data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">8</span></sup></a><span data-dcnode-id="4113" instrument_node=""> a joint body between employers and unions, whose objectives are set by the industry stakeholders. For the past decade, the training provided by Afdas has largely focused on teaching journalists how to use the new techniques required as a result of the digitisation of the industry. The fact that journalists have obtained their digital skills through further education instead of regular degrees, as well as the engagement of both recognised and non-recognised schools towards digital skills, might provide an explanation for the apparent lack of significant impact of recognised degrees, since journalists are able to obtain the new needed skills through many channels (including self-training).</span></p><p data-dcnode-id="4110" id="p0440"><span data-dcnode-id="4111" instrument_node="">Finally, a key interest of micro-level studies is to enable to investigate the role of a variety of individual factors. One of the contributions of this research is that the exhaustiveness of the sample enables to obtain general results. In this respect, gender does not significantly affect either the likelihood of job creation, job destruction or casualisation. However, gender has a significant impact on wages. In contrast, age has a significant impact on job destruction, job creation and casualisation. Interestingly, age affects negatively both job creation and destruction, which implies that older journalists are more likely to be on a secured contract and less likely to lose their job, but if they do, they will have a harder time finding a new one.</span></p><p data-dcnode-id="4105" id="p0445"><span data-dcnode-id="4109" instrument_node="">In regard to firms' characteristics (besides digitisation level), size is shown to significantly impact destruction, creation, casualisation and wages. Job destruction, creation and casualisation are less likely to arise at larger newspapers and magazines, while size positively impacts the level of wages, which is in line with previous research, such as </span><a class="workspace-trigger" data-dcnode-id="4107" href="#bb0170" name="bbb0170"><span data-dcnode-id="4108" instrument_node="">Haltiwanger et al. (2014)</span></a><span data-dcnode-id="4106" instrument_node="">. This means that larger newspaper and magazines offer more stable, more secure, and better paid jobs for the journalists they employ, but also fewer job opportunities for the other ones.</span></p><p data-dcnode-id="4103" id="p0450"><span data-dcnode-id="4104" instrument_node="">Firms (i.e. newspapers and magazines) were not the focus of this research, so there are few managerial implications that can be derived from this study (aside from the fact that more digitised press outlets seem to be doing better, but that does not necessarily imply a greater profitability). In regard to policymakers, however, this research supports the idea that while technological change is disruptive and causes unemployment, embracing change to a fuller extent is a means to mitigate the adverse effects of technological change on employment. Thus, policies should rather promote a larger adoption of the technology and resist the urge to delay its adoption in an attempt to safeguard jobs. A further policy implication of this research relates to training and especially to the fact that traditional degrees may not be the best way to deliver the new needed skills. Instead, being able to retrain workers through ad hoc further education programmes may indeed be required.</span></p></section><section data-dcnode-id="4080" id="s0070"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4096" id="st0085"><span data-dcnode-id="4101" instrument_node="">7</span><span data-dcnode-id="4099" instrument_node="">. </span><span data-dcnode-id="4097" instrument_node="">Conclusion</span></h2><p data-dcnode-id="4094" id="p0455"><span data-dcnode-id="4095" instrument_node="">While the evidence that digitisation has disrupted the press industry is overwhelming, its actual effects have been until now poorly understood. Without doubt, digitisation has led to destruction of both firms and jobs. But both destruction and creation are inherent to technological change, and indeed, digitisation has also led to the creation of many jobs in the press industry. Still, the question of the degree of adoption of the new technology remained: all things remaining equal, does a greater level of digitisation cause a greater job destruction or a greater job creation? Furthermore, the issue of the impact of technological change on employment is not just quantitative (i.e. the net quantity of jobs created) but also qualitative: are the new jobs created of the same ‘quality’ (e.g. in terms of wages, type of contract) that the destroyed jobs they replace?</span></p><p data-dcnode-id="4092" id="p0460"><span data-dcnode-id="4093" instrument_node="">Based on an exhaustive database of all professional journalists in France, this article has, with the help of two different statistical models, provided answers to these questions. Firstly, it was shown that a greater digitisation intensity not only increases the likelihood of job creation, but also decreases the likelihood of job destruction. Hence, the more firms in the press industry embrace digitisation, the more likely it is that it will lead to a net job creation. In contrast, delaying the adoption of digital technologies increases the likelihood of net job loss.</span></p><p data-dcnode-id="4090" id="p0465"><span data-dcnode-id="4091" instrument_node="">Yet, overall, this article has shown that jobs created are far more likely to be casual in nature, rather than regular open-ended contract jobs. However, ‘casualisation’ of employment can be partially reduced through a greater level of digitisation. At the same time, casual jobs are also far more likely to be destroyed than regular open-ended jobs, which means that journalists on casual contracts are likely to be placed in a very unstable work environment, where they permanently change jobs. Perhaps more surprisingly, the likelihood of destruction of casual jobs sharply decreases with the level of digitisation, which means that journalists on a casual contract might find that working for a more digitised media outlet increases their job stability. Hence, paradoxically, higher digitisation tends to make the insecure jobs it creates more secure.</span></p><p data-dcnode-id="4088" id="p0470"><span data-dcnode-id="4089" instrument_node="">It was further demonstrated that a higher degree of digitisation leads to higher wages for journalists. Yet, looking in greater details, this article shows that the positive impact of digitisation is more felt by ‘tenured’ journalists, who benefit from more stable, open-ended contact. In contrast, in the case of casual jobs, the benefits of digitisation in regard to wages, although positive, are also significantly lower. Besides the type of work contract, the models used in this article have shown that gender, education, experience and the size of the employer do play a significant role.</span></p><p data-dcnode-id="4083" id="p0475"><span data-dcnode-id="4087" instrument_node="">Overall, this study of the impact of digitisation in the press industry demonstrates that, while digitisation undoubtedly has adverse effects on the labour market, fully embracing technological change can help mitigating its negative side. As already noted a long time ago by </span><a class="workspace-trigger" data-dcnode-id="4085" href="#bb0160" name="bbb0160"><span data-dcnode-id="4086" instrument_node="">Godet (1983)</span></a><span data-dcnode-id="4084" instrument_node="">, embracing technological change is, in regard to employment, a “necessary evil” that is far less worse than what would arise if one were to resist change.</span></p><p data-dcnode-id="4081" id="p0480"><span data-dcnode-id="4082" instrument_node="">While this may be hard to do, considering that the highly structured and organised journalist profession in France was instrumental in obtaining exhaustive employment data, a clear avenue for further research would be to compare the results obtained in this article, with those obtained with data from different countries. Considering that this research has shown a rather unexpected lack of impact of holding a recognised degree on the job situation, it would be interesting to explicitly consider skills, instead of using degrees as a proxy. This would provide valuable policy implications in terms of workforce training.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="4074"><button class="button button-anchor" data-dcnode-id="4075" type="button"><span class="button-text" data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="4073"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="484" id="bi0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="485" id="bs0005"><dl class="references" data-dcnode-id="486" id="reference-links-bs0005"><dt class="label" data-dcnode-id="4068"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="4069" href="#bbb0005" id="ref-id-bb0005"><span data-dcnode-id="4070" instrument_node="">Acemoglu, 2002</span></a></dt><dd class="reference" data-dcnode-id="4021" id="rf0005"><div class="contribution" data-dcnode-id="4059"><span data-dcnode-id="4067" instrument_node="">D.</span><span data-dcnode-id="4065" instrument_node=""> </span><span data-dcnode-id="4063" instrument_node="">Acemoglu</span><div data-dcnode-id="4060" id="ref-id-rf0005"><strong class="title" data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">Technical change, inequality, and the labor market</span></strong></div></div><div class="host" data-dcnode-id="4033"><span data-dcnode-id="4058" instrument_node="">J. Econ. Lit.</span><span data-dcnode-id="4056" instrument_node="">, </span><span data-dcnode-id="4054" instrument_node="">40</span><span data-dcnode-id="4052" instrument_node=""> (</span><span data-dcnode-id="4050" instrument_node="">1</span><span data-dcnode-id="4048" instrument_node="">)</span><span data-dcnode-id="4046" instrument_node=""> (</span><span data-dcnode-id= ribedby="citing-articles-header" data-dcnode-id="337"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="338"><ul data-dcnode-id="344"><li class="ListArticleItem" data-dcnode-id="462"><div class="sub-heading" data-dcnode-id="474"><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S004016252200107X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="478" id="citing-articles-article0-title"><span data-dcnode-id="479" instrument_node="">The interplay of digital transformation and employee competency: A design science approach</span></h3></a><div class="article-source ellipsis" data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">2022, Technological Forecasting and Social Change</span></div></div><div class="buttons" data-dcnode-id="468"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="469" type="button"><span class="button-link-text" data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="470" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="471"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="463"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="464" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="465"><p data-dcnode-id="466" id="spara011"><span data-dcnode-id="467" instrument_node="">Businesses and academia alike agree upon the significant influence of digitalization on the business world. Hence, digital transformation is a very topical issue. While researchers underline that the movement toward digitalization is a challenge influencing various dimensions, studies to date have largely focused on the technological and organizational aspects of digitalization. Consequently, there is a gap in digital transformation concerning the role of human resources and employee competency. This paper adopts a human-centered view of digitalization at the intersection of digital and human transformation. Drawing on design science research (DSR), we developed a framework as an artifact that takes into account individual employee competency related to an organization's level of digital transformation. As suggested by DSR, the framework was developed in iterations and refined after evaluation by various domain experts in academia and business. The final framework illustrates the interplay between the individual and organizational levels; in particular, employees’ transformation competency (intrapreneurial and digital competencies) driving digital transformation. Our findings suggest that the development of intrapreneurial competencies is dynamic. Based on an intrapreneurial journey, employee competencies function as triggers to reach the next level of digital transformation. As such, employee competency is crucial in enabling an organization's transformation toward digitalization.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="444"><div class="sub-heading" data-dcnode-id="456"><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0160791X2200046X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="460" id="citing-articles-article1-title"><span data-dcnode-id="461" instrument_node="">Does technological innovation bring destruction or creation to the labor market?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">2022, Technology in Society</span></div></div><div class="buttons" data-dcnode-id="450"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="451" type="button"><span class="button-link-text" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="452" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="453"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="445"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="446" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="447"><p data-dcnode-id="448" id="abspara0010"><span data-dcnode-id="449" instrument_node="">The latest era of the industrial revolution is the culmination of an accelerating pace of evolution and digital transformation, one that has had a profound impact on the labor market dynamics. The bootstrap rolling-window causality test has been referred to analyze this, in further detail. This approach has been undertaken to start triggering a discourse on the employment benefits of technological innovation and actively respond to the challenges associated with technological progress in the labor market. By studying the interactions between the number of patents (PIs) and the new employment (NE) opportunities during 2013:M01-2021:M8, we have found that the interaction mechanism between innovation and employment is complicated. In this regard, the positive impact can confirm that technological innovation has given a boost to the labor market. However, this view can also be refuted by the negative influences surrounding the concept, primarily because the substitution effect of employment tends to be greater than the creation effect. Therefore, the NE negatively impacts the PIs, indicating that the labor market can be a leading indicator for innovation and development. It should be noted that Chinese society has been in a period of digital transformation for some time now, and the impact of short-term employment also contains new impetus.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="414"><div class="sub-heading" data-dcnode-id="438"><a data-dcnode-id="441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0048733320301578" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="442" id="citing-articles-article2-title"><span data-dcnode-id="443" instrument_node="">Digitalization, routineness and employment: An exploration on Italian task-based data</span></h3></a><div class="article-source ellipsis" data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">2021, Research Policy</span></div></div><div class="buttons" data-dcnode-id="432"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="433" type="button"><span class="button-link-text" data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="434" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="435"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="415"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="416" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="417"><p data-dcnode-id="418" id="spara027"><span data-dcnode-id="431" instrument_node="">This paper explores the relation between the digitalization of labour processes, the level of routineness of labour tasks and changes in employment in the case of Italy in the period 2011-16. The levels of digitalization and routineness of occupations in more than 500 4-digit ISCO professional groups are measured using data from a unique Italian profession-level survey on skill, tasks and work contents – the INAPP-ISTAT </span><em data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Survey on Italian Occupations</span></em><span data-dcnode-id="428" instrument_node=""> (ICP), an O*NET-type dataset. Two digitalization indices are used: a </span><em data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">digital use</span></em><span data-dcnode-id="425" instrument_node=""> index, measuring the use of computers and e-mail in the workplace, and a </span><em data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">digital tasks</span></em><span data-dcnode-id="422" instrument_node=""> index, capturing the presence of a set of key digital tasks, such as those related to programming or activities concerning the use of specialized hardware. The same dataset is used to compute a composite </span><em data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">routine task intensity</span></em><span data-dcnode-id="419" instrument_node=""> index. The descriptive evidence presented in the paper shows strong differences across occupations in the level of digitalization and routineness, and the presence of a negative relation between the two in most professional groups. The econometric estimates show that digital-intensive occupations tend to grow more than the rest of the workforce, particularly when digitalization is measured relying on the digital use indicator. The level of routineness, in turn, is negatively or, in some specifications, not significantly associated to employment change. However, occupations that are both digital and routine-intensive turn out to be penalized in terms of employment growth, providing further support to (and further qualifying) the the routine biased technological change (RBTC) hypothesis. In other words, our results show that the impact of digitalization on employment is mediated by the level of routineness characterizing the tasks bundled in each occupation.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="381"><div class="sub-heading" data-dcnode-id="408"><a data-dcnode-id="411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0040162520312178" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="412" id="citing-articles-article3-title"><span data-dcnode-id="413" instrument_node="">Fostering skills for the 21&lt;sup&gt;st&lt;/sup&gt; century: The role of Fab labs and makerspaces</span></h3></a><div class="article-source ellipsis" data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">2021, Technological Forecasting and Social Change</span></div></div><div class="buttons" data-dcnode-id="402"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="403" type="button"><span class="button-link-text" data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="404" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="405"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="382"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="383" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="384"><p data-dcnode-id="385" id="sp0004"><span data-dcnode-id="401" instrument_node="">Based on a study of a network of fab labs and makerspaces, this article investigates the role that such ‘fabrication spaces’ can play in fostering 21</span><sup data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">st</span></sup><span data-dcnode-id="398" instrument_node=""> century skills. Using a combination of the two main 21</span><sup data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">st</span></sup><span data-dcnode-id="395" instrument_node=""> century skills frameworks—DigComp and EntreComp—developed by the EU Commission, we study by the means of two combined qualitative research methods—semi-structured interviews of 13 fab lab/makerspace founders, followed by a focus group with founders and policymaker—the entrepreneurial and digital skills that are fostered by these fab labs and makerspaces. Our findings are that while fab labs and makerspaces naturally foster some entrepreneurial 21</span><sup data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">st</span></sup><span data-dcnode-id="392" instrument_node=""> century skills, only explicit and proactive entrepreneurship and education programme enable to foster the whole spectrum of these skills. In regard to technical skills, fab labs and makerspaces enable to develop skills beyond what is generally considered as 21</span><sup data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">st</span></sup><span data-dcnode-id="389" instrument_node=""> century digital skills, because they combine digital skills with hands-on ‘making’ skills, since they are themselves mixed environment, both digital and physical. Consequently, the growing importance of ‘maker technologies’ may force to redefine what 21</span><sup data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">st</span></sup><span data-dcnode-id="386" instrument_node=""> century skills should be.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="363"><div class="sub-heading" data-dcnode-id="375"><a data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0148296319305478" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="379" id="citing-articles-article4-title"><span data-dcnode-id="380" instrument_node="">Digital transformation: A multidisciplinary reflection and research agenda</span></h3></a><div class="article-source ellipsis" data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">2021, Journal of Business Research</span></div></div><div class="buttons" data-dcnode-id="369"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="370" type="button"><span class="button-link-text" data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="371" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="372"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="364"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="365" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="366"><p data-dcnode-id="367" id="sp0005"><span data-dcnode-id="368" instrument_node="">Digital transformation and resultant business model innovation have fundamentally altered consumers’ expectations and behaviors, putting immense pressure on traditional firms, and disrupting numerous markets. Drawing on extant literature, we identify three stages of digital transformation: digitization, digitalization, and digital transformation. We identify and delineate growth strategies for digital firms as well as the assets and capabilities required in order to successfully transform digitally. We posit that digital transformation requires specific organizational structures and bears consequences for the metrics used to calibrate performance. Finally, we provide a research agenda to stimulate and guide future research on digital transformation.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="345"><div class="sub-heading" data-dcnode-id="357"><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0040162520310854" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="361" id="citing-articles-article5-title"><span data-dcnode-id="362" instrument_node="">Effects of advancing internet technology on Chinese employment: a spatial study of inter-industry spillovers</span></h3></a><div class="article-source ellipsis" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">2020, Technological Forecasting and Social Change</span></div></div><div class="buttons" data-dcnode-id="351"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="352" type="button"><span class="button-link-text" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="353" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="354"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="346"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="347" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="348"><p data-dcnode-id="349" id="spara013"><span data-dcnode-id="350" instrument_node="">The digital economy based on Internet technology has provided an important boost for economic growth. However, it has also created opportunities and challenges for stabilizing macroeconomic employment and growth. To measure how the Internet technology has influenced employment at the industry level in China, we first separate it from other technological progress in a production function model. Based on the input–output data spanning 2000–2014 in the World Input–Output Database (WIOD), we use a direct consumption coefficient matrix as the spatial weight matrices to verify inter-industry spillovers between 47 industries of China and its influence on employment by using spatial econometrics model. Empirical results indicate that Internet technology progress in one industry will significantly promote Internet technology progress in “adjacent” industries. Internet technology progress directly promote the employment within industry. Furthermore, due to the positive inter-industry spillovers, Internet technology progress also exerts positive effects on employment in other industries and positively affects employment within industry again through various feedback loops between industries. Therefore, policy should promote Internet technology in various industries, especially those closely linked to other industries, to stabilize employment and growth.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85032805354%26md5%3D2e9e9f1d95eeb03babe281665d419670" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="342" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="343"></path></svg><span class="button-alternative-text" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="article-biography" data-dcnode-id="330" id="bg0005"><p data-dcnode-id="331" id="sp0095"><strong data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Clémence Aubert-Tarby</span></strong><span data-dcnode-id="332" instrument_node=""> is Associate Professor of Economics at PSB Paris School of Business, France. She obtained her Ph.D. in Economics from the Panthéon-Sorbonne University, France. Her research focuses on labour economics and media management and business. She also provides advice to journalists about their labour contracts and social protection.</span></p></div><div class="article-biography" data-dcnode-id="325" id="bg0010"><p data-dcnode-id="326" id="sp0100"><strong data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Octavio R. Escobar</span></strong><span data-dcnode-id="327" instrument_node=""> holds a Ph.D. in Economics from the Paris-Dauphine University, France. He is currently Associate Professor of Economics at PSB Paris School of Business, France. In addition, Escobar is a Research Associate at UMR 225-DIAL, a Consultant for the Economics Department of the OECD, and a Lecturer at Paris-Dauphine University. His research focuses on international economics and regional economics issues, including the location of foreign direct investment, export performance, labour productivity, and regional disparities.</span></p></div><div class="article-biography" data-dcnode-id="320" id="bg0015"><p data-dcnode-id="321" id="sp0105"><strong data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Thierry Rayna</span></strong><span data-dcnode-id="322" instrument_node="">, PhD, is a Professor of Innovation Management at École Polytechnique (Paris, France) and fellow at CRG-i3 (Management Research Centre, Innovation Interdisciplinary Institute, UMR CNRS 9217). Beforehand, he spent ten years in the UK, where he held positions at Imperial College London, the London School of Economics, UCL, and the University of Cambridge. His research investigates the consequences of technological change and digitisation on strategies, business models and innovation ecosystems. He has served as an advisor for national and international organisations, as well as for major companies in the media, telecommunications and cultural industries. He also mentors start-ups.</span></p></div><div class="Footnotes" data-dcnode-id="243"><dl class="footnote" data-dcnode-id="312"><dt class="footnote-label" data-dcnode-id="316"><sup data-dcnode-id="317"><a data-dcnode-id="318" href="#bfn0005"><span data-dcnode-id="319" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="313"><p data-dcnode-id="314" id="np0005"><span data-dcnode-id="315" instrument_node="">In this respect, the 19th century American folk story of John Henry defeating a steam machine, but dying as a result of it is particularly illustrative.</span></p></dd></dl><dl class="footnote" data-dcnode-id="301"><dt class="footnote-label" data-dcnode-id="308"><sup data-dcnode-id="309"><a data-dcnode-id="310" href="#bfn0010"><span data-dcnode-id="311" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="302"><p data-dcnode-id="303" id="np0010"><span data-dcnode-id="307" instrument_node="">Journalists with casual contracts are not in a traditional employment relationship as explained by </span><a class="workspace-trigger" data-dcnode-id="305" href="#bb0055" name="bbb0055"><span data-dcnode-id="306" instrument_node="">Bosch (2004)</span></a><span data-dcnode-id="304" instrument_node="">: “a stable, socially protected, dependent, full-time job…the basic conditions of which (working time, pay, social transfers) are regulated to a minimum level by collective agreement or by labour and/or social security law” (p.618–619).</span></p></dd></dl><dl class="footnote" data-dcnode-id="293"><dt class="footnote-label" data-dcnode-id="297"><sup data-dcnode-id="298"><a data-dcnode-id="299" href="#bfn0015"><span data-dcnode-id="300" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="294"><p data-dcnode-id="295" id="np0015"><span data-dcnode-id="296" instrument_node="">The Commission of Professional Journalists' Identity Card (CCIJP), created in 1936, is the institution that delivers press cards to journalists. While journalists can work without having a press card, a collective agreement within the press industry in France, it is only possible to hire journalists who do not have a professional card for duration of three months or less.</span></p></dd></dl><dl class="footnote" data-dcnode-id="285"><dt class="footnote-label" data-dcnode-id="289"><sup data-dcnode-id="290"><a data-dcnode-id="291" href="#bfn0020"><span data-dcnode-id="292" instrument_node="">4</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="286"><p data-dcnode-id="287" id="np0020"><span data-dcnode-id="288" instrument_node="">OJD is the French agency in charge of certification of sales, subscription and diffusion numbers for the French medias.</span></p></dd></dl><dl class="footnote" data-dcnode-id="274"><dt class="footnote-label" data-dcnode-id="281"><sup data-dcnode-id="282"><a data-dcnode-id="283" href="#bfn0025"><span data-dcnode-id="284" instrument_node="">5</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="275"><p data-dcnode-id="276" id="np0025"><span data-dcnode-id="280" instrument_node="">Although product innovation also happened during this period, it was fairly incremental (</span><a class="workspace-trigger" data-dcnode-id="278" href="#bb0080" name="bbb0080"><span data-dcnode-id="279" instrument_node="">Cox and Mowatt, 2008</span></a><span data-dcnode-id="277" instrument_node="">). The format of newspapers and magazines did not significantly change.</span></p></dd></dl><dl class="footnote" data-dcnode-id="260"><dt class="footnote-label" data-dcnode-id="270"><sup data-dcnode-id="271"><a data-dcnode-id="272" href="#bfn0035"><span data-dcnode-id="273" instrument_node="">6</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="261"><p data-dcnode-id="262" id="np0035"><span data-dcnode-id="269" instrument_node="">This non-linear functional form for experience gives a better fit than the parabolic form also used in the literature (</span><a class="workspace-trigger" data-dcnode-id="267" href="#bb0165" name="bbb0165"><span data-dcnode-id="268" instrument_node="">Griliches, 1977</span></a><span data-dcnode-id="266" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="264" href="#bb0225" name="bbb0225"><span data-dcnode-id="265" instrument_node="">Mincer, 1974</span></a><span data-dcnode-id="263" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="252"><dt class="footnote-label" data-dcnode-id="256"><sup data-dcnode-id="257"><a data-dcnode-id="258" href="#bfn0040"><span data-dcnode-id="259" instrument_node="">7</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="253"><p data-dcnode-id="254" id="np0040"><span data-dcnode-id="255" instrument_node="">Departments are administrative divisions in France.</span></p></dd></dl><dl class="footnote" data-dcnode-id="244"><dt class="footnote-label" data-dcnode-id="248"><sup data-dcnode-id="249"><a data-dcnode-id="250" href="#bfn0045"><span data-dcnode-id="251" instrument_node="">8</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="245"><p data-dcnode-id="246" id="np0045"><span data-dcnode-id="247" instrument_node="">“Assurance Formation des Activités du Spectacle”, i.e. Training Association for Creative Activities</span></p></dd></dl></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0040162516305650"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2017 Elsevier Inc. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="231" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="232"></path></svg></button></header><div aria-describedby="recommended-articles-header" aria-hidden="false" class="" data-dcnode-id="141"><div data-dcnode-id="155" id="recommended-articles"><ul data-dcnode-id="156"><li class="SidePanelItem" data-dcn
