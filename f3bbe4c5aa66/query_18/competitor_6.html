<mi data-dcnode-id="5891" is="true"><span data-dcnode-id="5892" instrument_node="">l</span></mi><mi data-dcnode-id="5889" is="true"><span data-dcnode-id="5890" instrument_node="">a</span></mi><mi data-dcnode-id="5887" is="true"><span data-dcnode-id="5888" instrument_node="">t</span></mi><mi data-dcnode-id="5885" is="true"><span data-dcnode-id="5886" instrument_node="">i</span></mi><mi data-dcnode-id="5883" is="true"><span data-dcnode-id="5884" instrument_node="">o</span></mi><mi data-dcnode-id="5881" is="true"><span data-dcnode-id="5882" instrument_node="">n</span></mi></mrow><mrow data-dcnode-id="5845" is="true"><mi data-dcnode-id="5878" is="true"><span data-dcnode-id="5879" instrument_node="">T</span></mi><mi data-dcnode-id="5876" is="true"><span data-dcnode-id="5877" instrument_node="">o</span></mi><mi data-dcnode-id="5874" is="true"><span data-dcnode-id="5875" instrument_node="">t</span></mi><mi data-dcnode-id="5872" is="true"><span data-dcnode-id="5873" instrument_node="">a</span></mi><mi data-dcnode-id="5870" is="true"><span data-dcnode-id="5871" instrument_node="">l</span></mi><mspace data-dcnode-id="5869" is="true" width="0.25em"></mspace><mspace data-dcnode-id="5868" is="true" width="0.25em"></mspace><mi data-dcnode-id="5866" is="true"><span data-dcnode-id="5867" instrument_node="">C</span></mi><mi data-dcnode-id="5864" is="true"><span data-dcnode-id="5865" instrument_node="">i</span></mi><mi data-dcnode-id="5862" is="true"><span data-dcnode-id="5863" instrument_node="">r</span></mi><mi data-dcnode-id="5860" is="true"><span data-dcnode-id="5861" instrument_node="">c</span></mi><mi data-dcnode-id="5858" is="true"><span data-dcnode-id="5859" instrument_node="">u</span></mi><mi data-dcnode-id="5856" is="true"><span data-dcnode-id="5857" instrument_node="">l</span></mi><mi data-dcnode-id="5854" is="true"><span data-dcnode-id="5855" instrument_node="">a</span></mi><mi data-dcnode-id="5852" is="true"><span data-dcnode-id="5853" instrument_node="">t</span></mi><mi data-dcnode-id="5850" is="true"><span data-dcnode-id="5851" instrument_node="">i</span></mi><mi data-dcnode-id="5848" is="true"><span data-dcnode-id="5849" instrument_node="">o</span></mi><mi data-dcnode-id="5846" is="true"><span data-dcnode-id="5847" instrument_node="">n</span></mi></mrow></mfrac></mfenced></mrow></mfenced></math></span></span></span></span></span></p></section><section data-dcnode-id="5330" id="s0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5825" id="st0055"><span data-dcnode-id="5830" instrument_node="">3.3</span><span data-dcnode-id="5828" instrument_node="">. </span><span data-dcnode-id="5826" instrument_node="">Control variables</span></h3><p data-dcnode-id="5769" id="p0305"><span data-dcnode-id="5824" instrument_node="">Following the literature, we use a set of control variables that are relevant to the case at hand. First, small businesses exhibit a substantially higher rate of both job creation and destruction (</span><a class="workspace-trigger" data-dcnode-id="5822" href="#bb0170" name="bbb0170"><span data-dcnode-id="5823" instrument_node="">Haltiwanger et al., 2014</span></a><span data-dcnode-id="5821" instrument_node="">), thus we use a </span><em data-dcnode-id="5819"><span data-dcnode-id="5820" instrument_node="">Firm Size</span></em><span data-dcnode-id="5818" instrument_node=""> variable that measures the number of employees in the newspaper or magazine. There are also differences in bargaining behaviour between men and women (</span><a class="workspace-trigger" data-dcnode-id="5816" href="#bb0085" name="bbb0085"><span data-dcnode-id="5817" instrument_node="">Croson and Buchan, 1999</span></a><span data-dcnode-id="5815" instrument_node="">), we use a </span><em data-dcnode-id="5813"><span data-dcnode-id="5814" instrument_node="">Gender</span></em><span data-dcnode-id="5812" instrument_node=""> dummy variable that takes the value of 1 if the journalist is a man, and 0 otherwise. Following the work of </span><a class="workspace-trigger" data-dcnode-id="5810" href="#bb0225" name="bbb0225"><span data-dcnode-id="5811" instrument_node="">Mincer (1974)</span></a><span data-dcnode-id="5809" instrument_node="">, literature has widely used age, experience, and school-level variables to study labour dynamics (</span><a class="workspace-trigger" data-dcnode-id="5807" href="#bb0200" name="bbb0200"><span data-dcnode-id="5808" instrument_node="">Lemieux, 2006</span></a><span data-dcnode-id="5806" instrument_node="">). More precisely, we define </span><em data-dcnode-id="5804"><span data-dcnode-id="5805" instrument_node="">Age</span></em><span data-dcnode-id="5803" instrument_node=""> as journalists' age in years. </span><em data-dcnode-id="5801"><span data-dcnode-id="5802" instrument_node="">School</span></em><span data-dcnode-id="5800" instrument_node=""> is a dummy variable that equals one if the journalist holds a degree recognised by French journalism community, and zero otherwise. In the case of Eq. </span><a class="workspace-trigger" data-dcnode-id="5798" href="#fo0010" name="bfo0010"><span data-dcnode-id="5799" instrument_node="">(2)</span></a><span data-dcnode-id="5797" instrument_node="">, we add a variable </span><em data-dcnode-id="5795"><span data-dcnode-id="5796" instrument_node="">XBT</span></em><span data-dcnode-id="5794" instrument_node="">&nbsp;</span><span data-dcnode-id="5792" instrument_node="">=</span><span data-dcnode-id="5790" instrument_node="">&nbsp;</span><em data-dcnode-id="5788"><span data-dcnode-id="5789" instrument_node="">e</span></em><sup data-dcnode-id="5774"><span data-dcnode-id="5787" instrument_node="">−</span><span data-dcnode-id="5785" instrument_node="">&nbsp;</span><span data-dcnode-id="5783" instrument_node="">0.1</span><span data-dcnode-id="5781" instrument_node="">&nbsp;</span><span data-dcnode-id="5779" instrument_node="">∗</span><span data-dcnode-id="5777" instrument_node="">&nbsp;</span><em data-dcnode-id="5775"><span data-dcnode-id="5776" instrument_node="">Experience</span></em></sup><span data-dcnode-id="5773" instrument_node="">, which is a non-linear functional form of cumulated work experience, which suggests that the return of experience decreases over time.</span><a class="workspace-trigger" data-dcnode-id="5770" href="#fn0035" name="bfn0035"><sup data-dcnode-id="5771"><span data-dcnode-id="5772" instrument_node="">6</span></sup></a></p><p data-dcnode-id="5763" id="p0310"><span data-dcnode-id="5768" instrument_node="">To avoid omitted variables bias, dummy variables are used to control for specific characteristics Time dummies are used to control for the conjuncture in France. 202 position dummies are also used to control for differences in wages according to the position of the journalist in the firm. Regional dummies are used to control for wage heterogeneity amongst the 95 French departments.</span><a class="workspace-trigger" data-dcnode-id="5765" href="#fn0040" name="bfn0040"><sup data-dcnode-id="5766"><span data-dcnode-id="5767" instrument_node="">7</span></sup></a><span data-dcnode-id="5764" instrument_node=""> Finally, 58 dummy variables related to the topic area of the newspaper or magazine, are used.</span></p><div data-dcnode-id="5331"><p data-dcnode-id="5756" id="p0315"><a class="workspace-trigger" data-dcnode-id="5761" href="#t0005" name="bt0005"><span data-dcnode-id="5762" instrument_node="">Table 1</span></a><span data-dcnode-id="5760" instrument_node=""> presents the summary statistics and the correlation matrix for all variables. The model confirms that there is a significant and positive correlation between wages and digitisation. Furthermore, digitisation is, amongst the explanatory variables, the third most correlated to wages, as, only work experience and type of contract are more correlated to wages than digitisation. There could be a risk of multicollinearity since digitisation may be correlated to other explanatory variables such as firm size, experience, etc. The correlation matrix in </span><a class="workspace-trigger" data-dcnode-id="5758" href="#t0005" name="bt0005"><span data-dcnode-id="5759" instrument_node="">Table 1</span></a><span data-dcnode-id="5757" instrument_node=""> shows that there is not strong correlation amongst control variables, thus we have a first result that suggests the absence of multicollinearity. In addition, we estimate the variance inflation factor was used to test for potential multicollinearity. The results (non-reported here) show that there is no multicollinearity when including all the dependent variables into the model.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="5332" id="t0005"><span class="captions" data-dcnode-id="5748"><span data-dcnode-id="5749" id="ca0015"><p data-dcnode-id="5750" id="sp0025"><span class="label" data-dcnode-id="5754"><span data-dcnode-id="5755" instrument_node="">Table 1</span></span><span data-dcnode-id="5753" instrument_node="">. </span><span data-dcnode-id="5751" instrument_node="">Descriptive statistics and correlation matrix.</span></p></span></span><div class="groups" data-dcnode-id="5360"><table data-dcnode-id="5361"><thead data-dcnode-id="5720"><tr class="rowsep-1 valign-top" data-dcnode-id="5721"><th data-dcnode-id="5746" scope="col"><span data-dcnode-id="5747" instrument_node="">Variable</span></th><th data-dcnode-id="5744" scope="col"><span data-dcnode-id="5745" instrument_node="">Mean</span></th><th data-dcnode-id="5742" scope="col"><span data-dcnode-id="5743" instrument_node="">S.D.</span></th><th data-dcnode-id="5740" scope="col"><span data-dcnode-id="5741" instrument_node="">1</span></th><th data-dcnode-id="5738" scope="col"><span data-dcnode-id="5739" instrument_node="">2</span></th><th data-dcnode-id="5736" scope="col"><span data-dcnode-id="5737" instrument_node="">3</span></th><th data-dcnode-id="5734" scope="col"><span data-dcnode-id="5735" instrument_node="">4</span></th><th data-dcnode-id="5732" scope="col"><span ode-id="5353" instrument_node="">24,708 observations for all variables except for </span><sup data-dcnode-id="5351"><span data-dcnode-id="5352" instrument_node="">i</span></sup><span data-dcnode-id="5350" instrument_node="">where </span><em data-dcnode-id="5348"><span data-dcnode-id="5349" instrument_node="">N</span></em><span data-dcnode-id="5347" instrument_node="">&nbsp;</span><span data-dcnode-id="5346" instrument_node="">=</span><span data-dcnode-id="5345" instrument_node="">&nbsp;</span><span data-dcnode-id="5344" instrument_node="">12,333 and </span><sup data-dcnode-id="5342"><span data-dcnode-id="5343" instrument_node="">ii</span></sup><span data-dcnode-id="5341" instrument_node="">where </span><em data-dcnode-id="5339"><span data-dcnode-id="5340" instrument_node="">N</span></em><span data-dcnode-id="5338" instrument_node="">&nbsp;</span><span data-dcnode-id="5337" instrument_node="">=</span><span data-dcnode-id="5336" instrument_node="">&nbsp;</span><span data-dcnode-id="5335" instrument_node="">12,375.</span></p><p></p></div></div></section></section><section data-dcnode-id="4758" id="s0045"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5323" id="st0060"><span data-dcnode-id="5328" instrument_node="">4</span><span data-dcnode-id="5326" instrument_node="">. </span><span data-dcnode-id="5324" instrument_node="">Effects of digitisation on job destruction, job creation and job casualisation</span></h2><section data-dcnode-id="5002" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5317" id="st0065"><span data-dcnode-id="5322" instrument_node="">4.1</span><span data-dcnode-id="5320" instrument_node="">. </span><span data-dcnode-id="5318" instrument_node="">Job destruction</span></h3><div data-dcnode-id="5192"><p data-dcnode-id="5306" id="p0320"><span data-dcnode-id="5316" instrument_node="">We start by testing </span><a class="workspace-trigger" data-dcnode-id="5314" href="#en0005" name="ben0005"><span data-dcnode-id="5315" instrument_node="">H1</span></a><span data-dcnode-id="5313" instrument_node="">, which stands that the likelihood of job destruction is greater in the case of newspapers and magazines that are more reluctant to embrace digitisation. Hence, we estimate Eq. </span><a class="workspace-trigger" data-dcnode-id="5311" href="#fo0005" name="bfo0005"><span data-dcnode-id="5312" instrument_node="">(1)</span></a><span data-dcnode-id="5310" instrument_node=""> using as dependent variable a latent variable that takes the value 1 if a journalist was laid off and 0 otherwise. Results are displayed in </span><a class="workspace-trigger" data-dcnode-id="5308" href="#t0010" name="bt0010"><span data-dcnode-id="5309" instrument_node="">Table 2</span></a><span data-dcnode-id="5307" instrument_node="">. The left-hand column lists the explanatory variables, with the other columns showing the values of the regression coefficients, the standard errors of the coefficients, and the odds ratio.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="5193" id="t0010"><span class="captions" data-dcnode-id="5298"><span data-dcnode-id="5299" id="ca0020"><p data-dcnode-id="5300" id="sp0035"><span class="label" data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">Table 2</span></span><span data-dcnode-id="5303" instrument_node="">. </span><span data-dcnode-id="5301" instrument_node="">Logistic regression analysis of job destruction in the press industry.</span></p></span></span><div class="groups" data-dcnode-id="5201"><table data-dcnode-id="5202"><thead data-dcnode-id="5287"><tr class="rowsep-1 valign-top" data-dcnode-id="5288"><td data-dcnode-id="5295" scope="col"><span class="screen-reader-only" data-dcnode-id="5296"><span data-dcnode-id="5297" instrument_node="">Empty Cell</span></span></td><th data-dcnode-id="5293" scope="col"><span data-dcnode-id="5294" instrument_node="">Coefficient</span></th><th data-dcnode-id="5291" scope="col"><span data-dcnode-id="5292" instrument_node="">Std. error</span></th><th data-dcnode-id="5289" scope="col"><span data-dcnode-id="5290" instrument_node="">Odds</span></th></tr></thead><tbody data-dcnode-id="5203"><tr data-dcnode-id="5274"><th data-dcnode-id="5285" scope="row"><span data-dcnode-id="5286" instrument_node="">Digitisation</span></th><td class="align-char" data-dcnode-id="5279"><span data-dcnode-id="5284" instrument_node="">−</span><span data-dcnode-id="5282" instrument_node="">&nbsp;</span><span data-dcnode-id="5280" instrument_node="">0.197*</span></td><td class="align-char" data-dcnode-id="5277"><span data-dcnode-id="5278" instrument_node="">(0.077)</span></td><td class="align-char" data-dcnode-id="5275"><span data-dcnode-id="5276" instrument_node="">0.821</span></td></tr><tr data-dcnode-id="5261"><th data-dcnode-id="5272" scope="row"><span data-dcnode-id="5273" instrument_node="">Firm size</span></th><td class="align-char" data-dcnode-id="5266"><span data-dcnode-id="5271" instrument_node="">−</span><span data-dcnode-id="5269" instrument_node="">&nbsp;</span><span data-dcnode-id="5267" instrument_node="">0.109**</span></td><td class="align-char" data-dcnode-id="5264"><span data-dcnode-id="5265" instrument_node="">(0.023)</span></td><td class="align-char" data-dcnode-id="5262"><span data-dcnode-id="5263" instrument_node="">0.897</span></td></tr><tr data-dcnode-id="5252"><th data-dcnode-id="5259" scope="row"><span data-dcnode-id="5260" instrument_node="">Gender</span></th><td class="align-char" data-dcnode-id="5257"><span data-dcnode-id="5258" instrument_node="">0.040</span></td><td class="align-char" data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">(0.067)</span></td><td class="align-char" data-dcnode-id="5253"><span data-dcnode-id="5254" instrument_node="">1.041</span></td></tr><tr data-dcnode-id="5243"><th data-dcnode-id="5250" scope="row"><span data-dcnode-id="5251" instrument_node="">School</span></th><td class="align-char" data-dcnode-id="5248"><span data-dcnode-id="5249" instrument_node="">0.115</span></td><td class="align-char" data-dcnode-id="5246"><span data-dcnode-id="5247" instrument_node="">(0.096)</span></td><td class="align-char" data-dcnode-id="5244"><span data-dcnode-id="5245" instrument_node="">1.121</span></td></tr><tr data-dcnode-id="5234"><th data-dcnode-id="5241" scope="row"><span data-dcnode-id="5242" instrument_node="">Age</span></th><td class="align-char" data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">0.537**</span></td><td class="align-char" data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">(0.158)</span></td><td class="align-char" data-dcnode-id="5235"><span data-dcnode-id="5236" instrument_node="">1.712</span></td></tr><tr data-dcnode-id="5225"><th data-dcnode-id="5232" scope="row"><span data-dcnode-id="5233" instrument_node="">Casual contract</span></th><td class="align-char" data-dcnode-id="5230"><span data-dcnode-id="5231" instrument_node="">1.342**</span></td><td class="align-char" data-dcnode-id="5228"><span data-dcnode-id="5229" instrument_node="">(0.067)</span></td><td class="align-char" data-dcnode-id="5226"><span data-dcnode-id="5227" instrument_node="">3.827</span></td></tr><tr data-dcnode-id="5218"><th data-dcnode-id="5223" scope="row"><span data-dcnode-id="5224" instrument_node="">Observations</span></th><td class="align-char" data-dcnode-id="5221"><span data-dcnode-id="5222" instrument_node="">12, 375</span></td><td data-dcnode-id="5220"></td><td data-dcnode-id="5219"></td></tr><tr data-dcnode-id="5211"><th data-dcnode-id="5216" scope="row"><span data-dcnode-id="5217" instrument_node="">Model Chi-squared</span></th><td class="align-char" data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">459</span></td><td data-dcnode-id="5213"></td><td data-dcnode-id="5212"></td></tr><tr data-dcnode-id="5204"><th data-dcnode-id="5209" scope="row"><span data-dcnode-id="5210" instrument_node="">Pseudo R-squared</span></th><td class="align-char" data-dcnode-id="5207"><span data-dcnode-id="5208" instrument_node="">0.053</span></td><td data-dcnode-id="5206"></td><td data-dcnode-id="5205"></td></tr></tbody></table></div><p class="legend" data-dcnode-id="5194"></p><p data-dcnode-id="5195" id="sp0040"><span data-dcnode-id="5200" instrument_node="">Notes. * Significant at 5%, ** significant at 1%. The dependent variable in this analysis is coded so that 1</span><span data-dcnode-id="5199" instrument_node="">&nbsp;</span><span data-dcnode-id="5198" instrument_node="">=</span><span data-dcnode-id="5197" instrument_node="">&nbsp;</span><span data-dcnode-id="5196" instrument_node="">new journalist fired, and 0 otherwise. Robust standard errors reported in brackets. The regression includes a constant not reported here.</span></p><p></p></div></div><p data-dcnode-id="5187" id="p0325"><span data-dcnode-id="5191" instrument_node="">Results show that the likelihood of a journalist being laid off indeed decreases with digitisation. The odds ratio for digitisation is 0.821, which suggests that when increasing the level of digitisation by one, the likelihood that a journalist is laid off decreases by 17.9%, which validates </span><a class="workspace-trigger" data-dcnode-id="5189" href="#en0005" name="ben0005"><span data-dcnode-id="5190" instrument_node="">H1</span></a><span data-dcnode-id="5188" instrument_node="">.</span></p><div data-dcnode-id="5060"><p data-dcnode-id="5182" id="p0330"><span data-dcnode-id="5186" instrument_node="">As expected, results show that the risk of job loss decreases with firm size. The results show that there is neither a significant difference between male and female journalists, nor between journalists who hold a recognised degree and those who do not. The results also show that the risk of job loss is lower in the case of firms with higher digitisation intensity, as well as in the case of larger firms. Finally, it is clear from </span><a class="workspace-trigger" data-dcnode-id="5184" href="#t0015" name="bt0015"><span data-dcnode-id="5185" instrument_node="">Table 3</span></a><span data-dcnode-id="5183" instrument_node=""> that the probability of being laid off increases with age and is larger for journalists on a casual contract.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="5061" id="t0015"><span class="captions" data-dcnode-id="5174"><span data-dcnode-id="5175" id="ca0025"><p data-dcnode-id="5176" id="sp0045"><span class="label" data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">Table 3</span></span><span data-dcnode-id="5179" instrument_node="">. </span><span data-dcnode-id="5177" instrument_node="">Logistic regression analysis of job creation in the press industry.</span></p></span></span><div class="groups" data-dcnode-id="5069"><table data-dcnode-id="5070"><thead data-dcnode-id="5163"><tr class="rowsep-1 valign-top" data-dcnode-id="5164"><td data-dcnode-id="5171" scope="col"><span class="screen-reader-only" data-dcnode-id="5172"><span data-dcnode-id="5173" instrument_node="">Empty Cell</span></span></td><th data-dcnode-id="5169" scope="col"><span data-dcnode-id="5170" instrument_node="">Coefficient</span></th><th data-dcnode-id="5167" scope="col"><span data-dcnode-id="5168" instrument_node="">Std. error</span></th><th data-dcnode-id="5165" scope="col"><span data-dcnode-id="5166" instrument_node="">Odds</span></th></tr></thead><tbody data-dcnode-id="5071"><tr data-dcnode-id="5154"><th data-dcnode-id="5161" scope="row"><span data-dcnode-id="5162" instrument_node="">Digitisation</span></th><td class="align-char" data-dcnode-id="5159"><span data-dcnode-id="5160" instrument_node="">0.172*</span></td><td class="align-char" data-dcnode-id="5157"><span data-dcnode-id="5158" instrument_node="">(0.059)</span></td><td class="align-char" data-dcnode-id="5155"><span data-dcnode-id="5156" instrument_node="">1.188</span></td></tr><tr data-dcnode-id="5141"><th data-dcnode-id="5152" scope="row"><span data-dcnode-id="5153" instrument_node="">Firm size</span></th><td class="align-char" data-dcnode-id="5146"><span data-dcnode-id="5151" instrument_node="">−</span><span data-dcnode-id="5149" instrument_node="">&nbsp;</span><span data-dcnode-id="5147" instrument_node="">0.110**</span></td><td class="align-char" data-dcnode-id="5144"><span data-dcnode-id="5145" instrument_node="">(0.025)</span></td><td class="align-char" data-dcnode-id="5142"><span data-dcnode-id="5143" instrument_node="">0.896</span></td></tr><tr data-dcnode-id="5128"><th data-dcnode-id="5139" scope="row"><span data-dcnode-id="5140" instrument_node="">Gender</span></th><td class="align-char" data-dcnode-id="5133"><span data-dcnode-id="5138" instrument_node="">−</span><span data-dcnode-id="5136" instrument_node="">&nbsp;</span><span data-dcnode-id="5134" instrument_node="">0.073</span></td><td class="align-char" data-dcnode-id="5131"><span data-dcnode-id="5132" instrument_node="">(0.073)</span></td><td class="align-char" data-dcnode-id="5129"><span data-dcnode-id="5130" instrument_node="">0.929</span></td></tr><tr data-dcnode-id="5115"><th data-dcnode-id="5126" scope="row"><span data-dcnode-id="5127" instrument_node="">School</span></th><td class="align-char" data-dcnode-id="5120"><span data-dcnode-id="5125" instrument_node="">−</span><span data-dcnode-id="5123" instrument_node="">&nbsp;</span><span data-dcnode-id="5121" instrument_node="">0.131</span></td><td class="align-char" data-dcnode-id="5118"><span data-dcnode-id="5119" instrument_node="">(0.097)</span></td><td class="align-char" data-dcnode-id="5116"><span data-dcnode-id="5117" instrument_node="">0.878</span></td></tr><tr data-dcnode-id="5102"><th data-dcnode-id="5113" scope="row"><span data-dcnode-id="5114" instrument_node="">Age</span></th><td class="align-char" data-dcnode-id="5107"><span data-dcnode-id="5112" instrument_node="">−</span><span data-dcnode-id="5110" instrument_node="">&nbsp;</span><span data-dcnode-id="5108" instrument_node="">2.608**</span></td><td class="align-char" data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node="">(0.155)</span></td><td class="align-char" data-dcnode-id="5103"><span data-dcnode-id="5104" instrument_node="">0.074</span></td></tr><tr data-dcnode-id="5093"><th data-dcnode-id="5100" scope="row"><span data-dcnode-id="5101" instrument_node="">Casual contract</span></th><td class="align-char" data-dcnode-id="5098"><span data-dcnode-id="5099" instrument_node="">1.851**</span></td><td class="align-char" data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">(0.076)</span></td><td class="align-char" data-dcnode-id="5094"><span data-dcnode-id="5095" instrument_node="">6.369</span></td></tr><tr data-dcnode-id="5086"><th data-dcnode-id="5091" scope="row"><span data-dcnode-id="5092" instrument_node="">Observations</span></th><td class="align-char" data-dcnode-id="5089"><span data-dcnode-id="5090" instrument_node="">12,333</span></td><td data-dcnode-id="5088"></td><td data-dcnode-id="5087"></td></tr><tr data-dcnode-id="5079"><th data-dcnode-id="5084" scope="row"><span data-dcnode-id="5085" instrument_node="">Model Chi-squared</span></th><td class="align-char" data-dcnode-id="5082"><span data-dcnode-id="5083" instrument_node="">1324</span></td><td data-dcnode-id="5081"></td><td data-dcnode-id="5080"></td></tr><tr data-dcnode-id="5072"><th data-dcnode-id="5077" scope="row"><span data-dcnode-id="5078" instrument_node="">Pseudo R-squared</span></th><td class="align-char" data-dcnode-id="5075"><span data-dcnode-id="5076" instrument_node="">0.194</span></td><td data-dcnode-id="5074"></td><td data-dcnode-id="5073"></td></tr></tbody></table></div><p class="legend" data-dcnode-id="5062"></p><p data-dcnode-id="5063" id="sp0050"><span data-dcnode-id="5068" instrument_node="">Notes. * Significant at 5%, ** significant at 1%. The dependent variable in this analysis is coded so that 1</span><span data-dcnode-id="5067" instrument_node="">&nbsp;</span><span data-dcnode-id="5066" instrument_node="">=</span><span data-dcnode-id="5065" instrument_node="">&nbsp;</span><span data-dcnode-id="5064" instrument_node="">new journalist hired, and 0 otherwise. Robust standard errors reported in brackets. The regression includes a constant not reported here.</span></p><p></p></div></div><div data-dcnode-id="5018"><p data-dcnode-id="5049" id="p0335"><span data-dcnode-id="5059" instrument_node="">Using estimates from </span><a class="workspace-trigger" data-dcnode-id="5057" href="#t0015" name="bt0015"><span data-dcnode-id="5058" instrument_node="">Table 3</span></a><span data-dcnode-id="5056" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5054" href="#f0005" name="bf0005"><span data-dcnode-id="5055" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5053" instrument_node=""> displays the predicted probability of job destruction in relation to digitisation intensity for both casual and standard contracts. It is clear that for both types of contracts the probability of job destruction decreases as digitisation increases. This validates </span><a class="workspace-trigger" data-dcnode-id="5051" href="#en0005" name="ben0005"><span data-dcnode-id="5052" instrument_node="">H1</span></a><span data-dcnode-id="5050" instrument_node=""> because the probability of job destruction clearly increases for newspapers and magazines that are more reluctant to adopt digitisation.</span></p><figure class="figure text-xs" data-dcnode-id="5019" id="f0005"><span data-dcnode-id="5033"><img alt="Fig. 1" aria-describedby="ca0005" data-dcnode-id="5048" height="276" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0040162516305650-gr1.jpg&amp;raw"><span data-dcnode-id="5047" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5034"><li data-dcnode-id="5041"><a class="anchor download-link u-font-sans" data-dcnode-id="5042" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0040162516305650-gr1_lrg.jpg" target="_blank" title="Download high-res image (76KB)"><span class="anchor-text" data-dcnode-id="5043"><span data-dcnode-id="5046" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5044"><span data-dcnode-id="5045" instrument_node="">Download high-res image (76KB)</span></span></span></a></li><li data-dcnode-id="5035"><a class="anchor download-link u-font-sans" data-dcnode-id="5036" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0040162516305650-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5037"><span data-dcnode-id="5040" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5038"><span data-dcnode-id="5039" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5020"><span data-dcnode-id="5021" id="ca0005"><p data-dcnode-id="5027" id="sp0005"><span class="label" data-dcnode-id="5031"><span data-dcnode-id="5032" instrument_node="">Fig. 1</span></span><span data-dcnode-id="5030" instrument_node="">. </span><span data-dcnode-id="5028" instrument_node="">Predicted probability of job destruction by digitisation intensity.</span></p><p data-dcnode-id="5022" id="sp0010"><span data-dcnode-id="5026" instrument_node="">Notes. Effects estimated using estimates from </span><a class="workspace-trigger" data-dcnode-id="5024" href="#t0010" name="bt0010"><span data-dcnode-id="5025" instrument_node="">Table 2</span></a><span data-dcnode-id="5023" instrument_node="">. The dashed lines represent the 95% confidence intervals.</span></p></span></span></figure></div><p data-dcnode-id="5010" id="p0340"><span data-dcnode-id="5017" instrument_node="">Yet, </span><a class="workspace-trigger" data-dcnode-id="5015" href="#f0005" name="bf0005"><span data-dcnode-id="5016" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5014" instrument_node=""> also illustrates differences in regard to the impact of digitisation on job destruction between casual and standard contracts. Firstly, overall, permanent contract jobs are, regardless of the level of digitisation, more likely to be destroyed than casual jobs. Yet, the benefits of digitisation are stronger for permanent contract jobs than for casual jobs, as digitisation causes a sharper decrease of the likelihood of job destruction for the former than for the latter (as illustrated by the slope of the two curves on </span><a class="workspace-trigger" data-dcnode-id="5012" href="#f0005" name="bf0005"><span data-dcnode-id="5013" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5011" instrument_node="">). Thus, in more digitised news outlets, while permanent contract jobs are still more likely to be destroyed, the difference with casual jobs is noticeably lower (i.e. likelihood roughly twice as high). In contrast, in the case of journalists working for less digitised outlet, the difference is more striking, with journalists on a permanent contract four times as likely to see their job destroyed than journalists on a casual contract.</span></p><p data-dcnode-id="5005" id="p0345"><span data-dcnode-id="5009" instrument_node="">Secondly, </span><a class="workspace-trigger" data-dcnode-id="5007" href="#f0005" name="bf0005"><span data-dcnode-id="5008" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5006" instrument_node=""> shows that digitisation increases variability. Looking at the 95% confidence interval, it can be seen that for both types of contracts, the range of this interval increases with the degree of digitisation. Yet, variability increases more in the case of permanent contract jobs than for casual jobs.</span></p><p data-dcnode-id="5003" id="p0350"><span data-dcnode-id="5004" instrument_node="">Thus, overall, digitisation decreases the likelihood of job destruction for both permanent contract jobs and casual contract jobs, though the effect is greater for the former (though, nonetheless, permanent jobs remain more at risk). At the same time, digitisation increases the variability of the probability of destruction for both permanent and casual jobs, albeit to a lesser extent for the latter.</span></p></section><section data-dcnode-id="4759" id="s0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4996" id="st0070"><span data-dcnode-id="5001" instrument_node="">4.2</span><span data-dcnode-id="4999" instrument_node="">. </span><span data-dcnode-id="4997" instrument_node="">Job creation and job casualisation</span></h3><p data-dcnode-id="4985" id="p0355"><span data-dcnode-id="4995" instrument_node="">The second hypothesis (</span><a class="workspace-trigger" data-dcnode-id="4993" href="#en0010" name="ben0010"><span data-dcnode-id="4994" instrument_node="">H2</span></a><span data-dcnode-id="4992" instrument_node="">) was that the likelihood of new job creation was higher for newspapers and magazines that had embraced digitisation to a greater extent. To test this hypothesis, a similar procedure as to test </span><a class="workspace-trigger" data-dcnode-id="4990" href="#en0005" name="ben0005"><span data-dcnode-id="4991" instrument_node="">H1</span></a><span data-dcnode-id="4989" instrument_node=""> is used, with a change of dependent variable: Eq. </span><a class="workspace-trigger" data-dcnode-id="4987" href="#fo0010" name="bfo0010"><span data-dcnode-id="4988" instrument_node="">(2)</span></a><span data-dcnode-id="4986" instrument_node=""> is estimated using a latent variable that takes the value 1 if a journalist is hired and 0 otherwise as dependent variable.</span></p><p data-dcnode-id="4977" id="p0360"><span data-dcnode-id="4984" instrument_node="">The results obtained with this logistic regression analysis (</span><a class="workspace-trigger" data-dcnode-id="4982" href="#t0015" name="bt0015"><span data-dcnode-id="4983" instrument_node="">Table 3</span></a><span data-dcnode-id="4981" instrument_node="">) show that, indeed, the likelihood of a journalist being hired increases with digitisation. The odds ratio for digitisation is 1.188, which suggests that when increasing the level of digitisation by one, the likelihood that a journalist is hired increases by 18.8%. Consequently, </span><a class="workspace-trigger" data-dcnode-id="4979" href="#en0010" name="ben0010"><span data-dcnode-id="4980" instrument_node="">H2</span></a><span data-dcnode-id="4978" instrument_node=""> is validated.</span></p><p data-dcnode-id="4975" id="p0365"><span data-dcnode-id="4976" instrument_node="">Results also show that the likelihood of finding a new job decreases with age and that it is harder to find a job in larger firms. As for job destruction, in the case of job creation, there are no significant differences between male and females, or between journalists with a recognised degree and those without.</span></p><p data-dcnode-id="4967" id="p0370"><span data-dcnode-id="4974" instrument_node="">The same model can also be used to investigate </span><a class="workspace-trigger" data-dcnode-id="4972" href="#en0015" name="ben0015"><span data-dcnode-id="4973" instrument_node="">H3</span></a><span data-dcnode-id="4971" instrument_node="">, i.e. the assumption that jobs created in the press industry are more likely to be of insecure nature, but that the level of digitisation decreases this likelihood. Results show that, indeed, the likelihood of job creation is higher for casual contracts, as for each standard open-ended contract job created, odds are that there are six times more casual contract jobs created. While this enables to partially validate </span><a class="workspace-trigger" data-dcnode-id="4969" href="#en0015" name="ben0015"><span data-dcnode-id="4970" instrument_node="">H3</span></a><span data-dcnode-id="4968" instrument_node="">, we also need to verify that the level of digitisation decreases this likelihood.</span></p><div data-dcnode-id="4799"><p data-dcnode-id="4953" id="p0375"><span data-dcnode-id="4966" instrument_node="">To do so, a logistic regression analysis of job creation quality by digitisation is conducted (</span><a class="workspace-trigger" data-dcnode-id="4964" href="#t0020" name="bt0020"><span data-dcnode-id="4965" instrument_node="">Table 4</span></a><span data-dcnode-id="4963" instrument_node="">). Results confirm the casualisation phenomenon observed with the previous regression (</span><a class="workspace-trigger" data-dcnode-id="4961" href="#t0015" name="bt0015"><span data-dcnode-id="4962" instrument_node="">Table 3</span></a><span data-dcnode-id="4960" instrument_node="">), as journalists are shown to be 7.2 times more likely to be hired on an insecure contract. Results displayed in </span><a class="workspace-trigger" data-dcnode-id="4958" href="#t0020" name="bt0020"><span data-dcnode-id="4959" instrument_node="">Table 4</span></a><span data-dcnode-id="4957" instrument_node=""> also show that digitisation has a moderating effect and that a greater level of digitisation reduces the likelihood of insecure contracts, i.e. the likelihood of being hired on an insecure contract decreases as for more digitised press outlets. These results enable to validate </span><a class="workspace-trigger" data-dcnode-id="4955" href="#en0015" name="ben0015"><span data-dcnode-id="4956" instrument_node="">H3</span></a><span data-dcnode-id="4954" instrument_node="">.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4800" id="t0020"><span class="captions" data-dcnode-id="4945"><span data-dcnode-id="4946" id="ca0030"><p data-dcnode-id="4947" id="sp0055"><span class="label" data-dcnode-id="4951"><span data-dcnode-id="4952" instrument_node="">Table 4</span></span><span data-dcnode-id="4950" instrument_node="">. </span><span data-dcnode-id="4948" instrument_node="">Logistic regression analysis of the job creation quality by digitisation.</span></p></span></span><div class="groups" data-dcnode-id="4808"><table data-dcnode-id="4809"><thead data-dcnode-id="4934"><tr class="rowsep-1 valign-top" data-dcnode-id="4935"><td data-dcnode-id="4942" scope="col"><span class="screen-reader-only" data-dcnode-id="4943"><span data-dcnode-id="4944" instrument_node="">Empty Cell</span></span></td><th data-dcnode-id="4940" scope="col"><span data-dcnode-id="4941" instrument_node="">Coefficient</span></th><th data-dcnode-id="4938" scope="col"><span data-dcnode-id="4939" instrument_node="">Std. error</span></th><th data-dcnode-id="4936" scope="col"><span data-dcnode-id="4937" instrument_node="">Odds</span></th></tr></thead><tbody data-dcnode-id="4810"><tr data-dcnode-id="4925"><th data-dcnode-id="4932" scope="row"><span data-dcnode-id="4933" instrument_node="">Digitisation</span></th><td data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node="">0.295***</span></td><td data-dcnode-id="4928"><span data-dcnode-id="4929" instrument_node="">(0.081)</span></td><td data-dcnode-id="4926"><span data-dcnode-id="4927" instrument_node="">1.343</span></td></tr><tr data-dcnode-id="4916"><th data-dcnode-id="4923" scope="row"><span data-dcnode-id="4924" instrument_node="">Casual contract</span></th><td data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node="">1.976***</span></td><td data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node="">(0.096)</span></td><td data-dcnode-id="4917"><span data-dcnode-id="4918" instrument_node="">7.211</span></td></tr><tr data-dcnode-id="4895"><th data-dcnode-id="4906" scope="row"><span data-dcnode-id="4915" instrument_node="">Digitisation</span><span data-dcnode-id="4913" instrument_node="">&nbsp;</span><span data-dcnode-id="4911" instrument_node="">×</span><span data-dcnode-id="4909" instrument_node="">&nbsp;</span><span data-dcnode-id="4907" instrument_node="">casual contract</span></th><td data-dcnode-id="4900"><span data-dcnode-id="4905" instrument_node="">−</span><span data-dcnode-id="4903" instrument_node="">&nbsp;</span><span data-dcnode-id="4901" instrument_node="">0.227*</span></td><td data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">(0.109)</span></td><td data-dcnode-id="4896"><span data-dcnode-id="4897" instrument_node="">0.797</span></td></tr><tr data-dcnode-id="4882"><th data-dcnode-id="4893" scope="row"><span data-dcnode-id="4894" instrument_node="">Firm size</span></th><td data-dcnode-id="4887"><span data-dcnode-id="4892" instrument_node="">−</span><span data-dcnode-id="4890" instrument_node="">&nbsp;</span><span data-dcnode-id="4888" instrument_node="">0.111***</span></td><td data-dcnode-id="4885"><span data-dcnode-id="4886" instrument_node="">(0.025)</span></td><td data-dcnode-id="4883"><span data-dcnode-id="4884" instrument_node="">0.895</span></td></tr><tr data-dcnode-id="4869"><th data-dcnode-id="4880" scope="row"><span data-dcnode-id="4881" instrument_node="">Gender</span></th><td data-dcnode-id="4874"><span data-dcnode-id="4879" instrument_node="">−</span><span data-dcnode-id="4877" instrument_node="">&nbsp;</span><span data-dcnode-id="4875" instrument_node="">0.069</span></td><td data-dcnode-id="4872"><span data-dcnode-id="4873" instrument_node="">(0.073)</span></td><td data-dcnode-id="4870"><span data-dcnode-id="4871" instrument_node="">0.934</span></td></tr><tr data-dcnode-id="4856"><th data-dcnode-id="4867" scope="row"><span data-dcnode-id="4868" instrument_node="">School</span></th><td data-dcnode-id="4861"><span data-dcnode-id="4866" instrument_node="">−</span><span data-dcnode-id="4864" instrument_node="">&nbsp;</span><span data-dcnode-id="4862" instrument_node="">0.130</span></td><td data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">(0.096)</span></td><td data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">0.878</span></td></tr><tr data-dcnode-id="4843"><th data-dcnode-id="4854" scope="row"><span data-dcnode-id="4855" instrument_node="">Age</span></th><td data-dcnode-id="4848"><span data-dcnode-id="4853" instrument_node="">−</span><span data-dcnode-id="4851" instrument_node="">&nbsp;</span><span data-dcnode-id="4849" instrument_node="">2.615***</span></td><td data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">(0.155)</span></td><td data-dcnode-id="4844"><span data-dcnode-id="4845" instrument_node="">0.073</span></td></tr><tr data-dcnode-id="4836"><th data-dcnode-id="4841" scope="row"><span data-dcnode-id="4842" instrument_node="">Observations</span></th><td data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">12,333</span></td><td data-dcnode-id="4838"></td><td data-dcnode-id="4837"></td></tr><tr data-dcnode-id="4829"><th data-dcnode-id="4834" scope="row"><span data-dcnode-id="4835" instrument_node="">Model Chi-squared</span></th><td data-dcnode-id="4832"><span data-dcnode-id="4833" instrument_node="">1319.86</span></td><td data-dcnode-id="4831"></td><td data-dcnode-id="4830"></td></tr><tr data-dcnode-id="4822"><th data-dcnode-id="4827" scope="row"><span data-dcnode-id="4828" instrument_node="">Pseudo-R2</span></th><td data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node="">0.194</span></td><td data-dcnode-id="4824"></td><td data-dcnode-id="4823"></td></tr><tr data-dcnode-id="4811"><th data-dcnode-id="4820" scope="row"><span data-dcnode-id="4821" instrument_node="">Log likelihood</span></th><td data-dcnode-id="4814"><span data-dcnode-id="4819" instrument_node="">−</span><span data-dcnode-id="4817" instrument_node="">&nbsp;</span><span data-dcnode-id="4815" instrument_node="">2790.969</span></td><td data-dcnode-id="4813"></td><td data-dcnode-id="4812"></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4801"></p><p data-dcnode-id="4802" id="sp0060"><span data-dcnode-id="4807" instrument_node="">Notes. * Significant at 5%, ** significant at 1%. The dependent variable in this analysis is coded so that 1</span><span data-dcnode-id="4806" instrument_node="">&nbsp;</span><span data-dcnode-id="4805" instrument_node="">=</span><span data-dcnode-id="4804" instrument_node="">&nbsp;</span><span data-dcnode-id="4803" instrument_node="">new journalist hired, and 0 otherwise. Robust standard errors reported in brackets. The regression includes a constant not reported here.</span></p><p></p></div></div><div data-dcnode-id="4760"><p data-dcnode-id="4791" id="p0380"><span data-dcnode-id="4798" instrument_node="">Using the estimates from </span><a class="workspace-trigger" data-dcnode-id="4796" href="#t0020" name="bt0020"><span data-dcnode-id="4797" instrument_node="">Table 4</span></a><span data-dcnode-id="4795" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4793" href="#f0010" name="bf0010"><span data-dcnode-id="4794" instrument_node="">Fig. 2</span></a><span data-dcnode-id="4792" instrument_node=""> illustrates the probability of job creation by type of contract as a function of the digitisation intensity. Though the probability of job creation increases with digitisation intensity in both cases, the probability of creation of casual contract jobs is significantly higher than the one of permanent jobs. However, this difference between casual and standard contracts decreases with the level of digitisation. Interestingly, it can be noted that digitisation tends to have larger positive impact on the creation of permanent jobs than on the creation of casual jobs (as illustrated by the steeper slope of the likelihood of permanent job creation). Also, similarly to what was noted for job destruction, digitisation tends to increase variability. In the case of job creation, variability becomes comparatively larger for casual jobs at higher levels of digitisation.</span></p><figure class="figure text-xs" data-dcnode-id="4761" id="f0010"><span data-dcnode-id="4775"><img alt="Fig. 2" aria-describedby="ca0010" data-dcnode-id="4790" height="277" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0040162516305650-gr2.jpg&amp;raw"><span data-dcnode-id="4789" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4776"><li data-dcnode-id="4783"><a class="anchor download-link u-font-sans" data-dcnode-id="4784" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0040162516305650-gr2_lrg.jpg" target="_blank" title="Download high-res image (71KB)"><span class="anchor-text" data-dcnode-id="4785"><span data-dcnode-id="4788" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4786"><span data-dcnode-id="4787" instrument_node="">Download high-res image (71KB)</span></span></span></a></li><li data-dcnode-id="4777"><a class="anchor download-link u-font-sans" data-dcnode-id="4778" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0040162516305650-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4779"><span data-dcnode-id="4782" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4762"><span data-dcnode-id="4763" id="ca0010"><p data-dcnode-id="4769" id="sp0015"><span class="label" data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">Fig. 2</span></span><span data-dcnode-id="4772" instrument_node="">. </span><span data-dcnode-id="4770" instrument_node="">Predicted probability of job creation quality by digitisation intensity.</span></p><p data-dcnode-id="4764" id="sp0020"><span data-dcnode-id="4768" instrument_node="">Notes. Effects estimated using estimates from </span><a class="workspace-trigger" data-dcnode-id="4766" href="#t0020" name="bt0020"><span data-dcnode-id="4767" instrument_node="">Table 4</span></a><span data-dcnode-id="4765" instrument_node="">. The dashed lines represent the 95% confidence intervals.</span></p></span></span></figure></div></section></section><section data-dcnode-id="4179" id="s0060"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4752" id="st0075"><span data-dcnode-id="4757" instrument_node="">5</span><span data-dcnode-id="4755" instrument_node="">. </span><span data-dcnode-id="4753" instrument_node="">Effect of digitisation on the wages of journalists</span></h2><div data-dcnode-id="4494"><p data-dcnode-id="4741" id="p0385"><span data-dcnode-id="4751" instrument_node="">The final hypothesis (</span><a class="workspace-trigger" data-dcnode-id="4749" href="#en0020" name="ben0020"><span data-dcnode-id="4750" instrument_node="">H4</span></a><span data-dcnode-id="4748" instrument_node="">) is that the wages of journalists are positively impacted by the degree of digitisation of the newspaper or magazine they work for. To test this hypothesis, Eq. </span><a class="workspace-trigger" data-dcnode-id="4746" href="#fo0010" name="bfo0010"><span data-dcnode-id="4747" instrument_node="">(2)</span></a><span data-dcnode-id="4745" instrument_node=""> is estimated using an ordinary least squares method (</span><a class="workspace-trigger" data-dcnode-id="4743" href="#t0025" name="bt0025"><span data-dcnode-id="4744" instrument_node="">Table 5</span></a><span data-dcnode-id="4742" instrument_node="">). Results show that the level of digitisation indeed has a positive impact on wages, as an increase of 10% in digitisation level raises wages by around 1%. This result holds when controlling for heterogeneity amongst positions within the firm, as well as for regional specific characteristics and firm's topic area. R-squared and RMSE values show that including specific characteristics raises the explanatory power of the model.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4495" id="t0025"><span class="captions" data-dcnode-id="4733"><span data-dcnode-id="4734" id="ca0035"><p data-dcnode-id="4735" id="sp0065"><span class="label" data-dcnode-id="4739"><span data-dcnode-id="4740" instrument_node="">Table 5</span></span><span data-dcnode-id="4738" instrument_node="">. </span><span data-dcnode-id="4736" instrument_node="">Effects of digitisation on wages.</span></p></span></span><div class="groups" data-dcnode-id="4499"><table data-dcnode-id="4500"><thead data-dcnode-id="4720"><tr class="rowsep-1 valign-top" data-dcnode-id="4721"><td data-dcnode-id="4730" scope="col"><span class="screen-reader-only" data-dcnode-id="4731"><span data-dcnode-id="4732" instrument_node="">Empty Cell</span></span></td><th data-dcnode-id="4728" scope="col"><span data-dcnode-id="4729" instrument_node="">(1)</span></th><th data-dcnode-id="4726" scope="col"><span data-dcnode-id="4727" instrument_node="">(2)</span></th><th data-dcnode-id="4724" scope="col"><span data-dcnode-id="4725" instrument_node="">(3)</span></th><th data-dcnode-id="4722" scope="col"><span data-dcnode-id="4723" instrument_node="">(4)</span></th></tr></thead><tbody data-dcnode-id="4501"><tr data-dcnode-id="4709"><th data-dcnode-id="4718" rowspan="2" scope="row"><span data-dcnode-id="4719" instrument_node="">Digitisation</span></th><td class="align-char" data-dcnode-id="4716"><span data-dcnode-id="4717" instrument_node="">0.157**</span></td><td class="align-char" data-dcnode-id="4714"><span data-dcnode-id="4715" instrument_node="">0.132**</span></td><td class="align-char" data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node="">0.103**</span></td><td class="align-char" data-dcnode-id="4710"><span data-dcnode-id="4711" instrument_node="">0.103**</span></td></tr><tr data-dcnode-id="4700"><td class="align-char" data-dcnode-id="4707"><span data-dcnode-id="4708" instrument_node="">(0.006)</span></td>< ss="align-char" data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">0.358</span></td><td class="align-char" data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">0.351</span></td><td class="align-char" data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">0.342</span></td></tr><tr data-dcnode-id="4524"><th data-dcnode-id="4533" scope="row"><span data-dcnode-id="4534" instrument_node="">Position dummies</span></th><td data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">non</span></td><td data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">yes</span></td><td data-dcnode-id="4527"><span data-dcnode-id="4528" instrument_node="">yes</span></td><td data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">yes</span></td></tr><tr data-dcnode-id="4513"><th data-dcnode-id="4522" scope="row"><span data-dcnode-id="4523" instrument_node="">Department dummies</span></th><td data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">non</span></td><td data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">non</span></td><td data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">yes</span></td><td data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">yes</span></td></tr><tr data-dcnode-id="4502"><th data-dcnode-id="4511" scope="row"><span data-dcnode-id="4512" instrument_node="">Specialisation dummies</span></th><td data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">Non</span></td><td data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">non</span></td><td data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">Non</span></td><td data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">yes</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4496"></p><p data-dcnode-id="4497" id="sp0070"><span data-dcnode-id="4498" instrument_node="">Notes. * Significant at 5%, ** significant at 1%. Except for dummy variables, all variables are expressed in log form. Heteroscedastic and clustering robust standard errors are in parentheses. Each regression includes a constant and time dummies not reported.</span></p><p></p></div></div><p data-dcnode-id="4492" id="p0390"><span data-dcnode-id="4493" instrument_node="">Results also suggest that the largest newspapers and magazines pay better. In regard to journalists' characteristics, results display significant gender differences, as male journalists have wages around 5% higher than those of female journalists. Finally, having a degree from recognised school increases wages by more than 2%.</span></p><p data-dcnode-id="4483" id="p0395"><span data-dcnode-id="4491" instrument_node="">As expected, the XBT variable is negative and significant, which suggests declining returns for each additional year of experience. In </span><a class="workspace-trigger" data-dcnode-id="4489" href="#t0025" name="bt0025"><span data-dcnode-id="4490" instrument_node="">Table 5</span></a><span data-dcnode-id="4488" instrument_node="">, column 4 shows that XBT coefficient is equal to −</span><span data-dcnode-id="4486" instrument_node="">&nbsp;</span><span data-dcnode-id="4484" instrument_node="">0.301. Thus, the first year of experience gives a return of about 2.7%, but the return of an additional year of experience drops to less than 1% after twelve years of experience. Finally, results highlight that journalists on casual contracts have wages 50% lower than journalists with a standard open-ended contract.</span></p><div data-dcnode-id="4185"><p data-dcnode-id="4478" id="p0400"><span data-dcnode-id="4482" instrument_node="">Hence, results show that digitisation has a positive impact on journalists' wages, but also illustrate the differences that prevail amongst journalists, depending on their gender, degree, and type of contract. In order to analyse whether digitisation has a different effect depending on the subgroup journalists belong to, the same model is applied again to each respective subsample. As displayed in </span><a class="workspace-trigger" data-dcnode-id="4480" href="#t0030" name="bt0030"><span data-dcnode-id="4481" instrument_node="">Table 6</span></a><span data-dcnode-id="4479" instrument_node="">, the effect of digitisation is only significantly different when one considers the type of contract. Indeed, the positive impact of digitisation is significantly larger for the journalist on a standard open-ended contract, in comparison to those on a casual contract. Furthermore, journalists on a casual contract also suffer from significantly poorer returns on experience, 0.65% for the first year and less than 0.32% after the eighth year, whereas returns for journalists on a standard contact are 3.92% the first year—six times larger. In this respect, male journalist also enjoys returns on experience 1.5 times larger than those of their female counterparts. Finally, journalists who attended recognised schools have returns on experience 1.2 larger than those who do not.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4186" id="t0030"><span class="captions" data-dcnode-id="4470"><span data-dcnode-id="4471" id="ca0040"><p data-dcnode-id="4472" id="sp0075"><span class="label" data-dcnode-id="4476"><span data-dcnode-id="4477" instrument_node="">Table 6</span></span><span data-dcnode-id="4475" instrument_node="">. </span><span data-dcnode-id="4473" instrument_node="">Effects of digitalisation on wages for different subgroups.</span></p></span></span><div class="groups" data-dcnode-id="4190"><table data-dcnode-id="4191"><thead data-dcnode-id="4434"><tr class="valign-top" data-dcnode-id="4461"><th class="rowsep-1" data-dcnode-id="4468" rowspan="3" scope="col"><span data-dcnode-id="4469" instrument_node="">Subsample</span></th><th class="rowsep-1" colspan="2" data-dcnode-id="4466" scope="col"><span data-dcnode-id="4467" instrument_node="">Type of contract</span></th><th class="rowsep-1" colspan="2" data-dcnode-id="4464" scope="col"><span data-dcnode-id="4465" instrument_node="">Gender</span></th><th class="rowsep-1" colspan="2" data-dcnode-id="4462" scope="col"><span data-dcnode-id="4463" instrument_node="">School (recognised degree)</span></th></tr><tr class="valign-top" data-dcnode-id="4448"><th class="rowsep-1" data-dcnode-id="4459" scope="col"><span data-dcnode-id="4460" instrument_node="">Casual</span></th><th class="rowsep-1" data-dcnode-id="4457" scope="col"><span data-dcnode-id="4458" instrument_node="">Standard</span></th><th class="rowsep-1" data-dcnode-id="4455" scope="col"><span data-dcnode-id="4456" instrument_node="">Male</span></th><th class="rowsep-1" data-dcnode-id="4453" scope="col"><span data-dcnode-id="4454" instrument_node="">Female</span></th><th class="rowsep-1" data-dcnode-id="4451" scope="col"><span data-dcnode-id="4452" instrument_node="">With</span></th><th class="rowsep-1" data-dcnode-id="4449" scope="col"><span data-dcnode-id="4450" instrument_node="">Without</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="4435"><th data-dcnode-id="4446" scope="col"><span data-dcnode-id="4447" instrument_node="">(1)</span></th><th data-dcnode-id="4444" scope="col"><span data-dcnode-id="4445" instrument_node="">(2)</span></th><th data-dcnode-id="4442" scope="col"><span data-dcnode-id="4443" instrument_node="">(3)</span></th><th data-dcnode-id="4440" scope="col"><span data-dcnode-id="4441" instrument_node="">(4)</span></th><th data-dcnode-id="4438" scope="col"><span data-dcnode-id="4439" instrument_node="">(5)</span></th><th data-dcnode-id="4436" scope="col"><span data-dcnode-id="4437" instrument_node="">(6)</span></th></tr></thead><tbody data-dcnode-id="4192"><tr data-dcnode-id="4419"><th data-dcnode-id="4432" rowspan="2" scope="row"><span data-dcnode-id="4433" instrument_node="">Digitisation</span></th><td class="align-char" data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_
