</span><meta content="The aim of this paper is twofold. On the one hand, the economic insights on the employment impact of technological change are discussed covering both classical theories and updated theoretical and empirical analyses. On the other hand, an empirical test is provided; in particular, longitudinal data—covering manufacturing and service sectors over the 1998–2011 period for 11 European countries—are used to run GMM-SYS and LSDVC estimates. Two are the main results: (1) a significant labor-friendly impact of R&amp;amp;D expenditures (mainly related to product innovation) is found; yet, this positive employment effect appears to be entirely due to medium and high-tech sectors, while no effect can be detected in low-tech industries; (2) capital formation is found to be negatively related to employment; this outcome suggests a possible labor-saving effect due to the embodied technological change incorporated in gross investment (mainly related to process innovation)." data-dcnode-id="4635" name="dc.description"><span data-dcnode-id="4634" instrument_node="">

</span><meta content="The aim of this paper is twofold. On the one hand, the economic insights on the employment impact of technological change are discussed covering both classical theories and updated theoretical and empirical analyses. On the other hand, an empirical test is provided; in particular, longitudinal data—covering manufacturing and service sectors over the 1998–2011 period for 11 European countries—are used to run GMM-SYS and LSDVC estimates. Two are the main results: (1) a significant labor-friendly impact of R&amp;D expenditures (mainly related to product innovation) is found; yet, this positive employment effect appears to be entirely due to medium and high-tech sectors, while no effect can be detected in low-tech industries; (2) capital formation is found to be negatively related to employment; this outcome suggests a possible labor-saving effect due to the embodied technological change incorporated in gross investment (mainly related to process innovation)." data-dcnode-id="4343" property="og:description"><span data-dcnode-id="4342" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1546" data-track-component="article body"><span data-dcnode-id="3897" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="3890" data-gtm-vis-first-on-screen-50443292_562="417" data-gtm-vis-first-on-screen-50443292_563="417" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="417" data-gtm-vis-recent-on-screen-50443292_563="417" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="3891" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3895" id="Abs1"><span data-dcnode-id="3896" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="3892" id="Abs1-content"><p data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">The aim of this paper is twofold. On the one hand, the economic insights on the employment impact of technological change are discussed covering both classical theories and updated theoretical and empirical analyses. On the other hand, an empirical test is provided; in particular, longitudinal data—covering manufacturing and service sectors over the 1998–2011 period for 11 European countries—are used to run GMM-SYS and LSDVC estimates. Two are the main results: (1) a significant labor-friendly impact of R&amp;D expenditures (mainly related to product innovation) is found; yet, this positive employment effect appears to be entirely due to medium and high-tech sectors, while no effect can be detected in low-tech industries; (2) capital formation is found to be negatively related to employment; this outcome suggests a possible labor-saving effect due to the embodied technological change incorporated in gross investment (mainly related to process innovation).</span></p></div></div></section><span data-dcnode-id="3889" instrument_node="">
</span><section data-dcnode-id="3821" data-gtm-vis-first-on-screen-50443292_562="417" data-gtm-vis-first-on-screen-50443292_563="417" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="417" data-gtm-vis-recent-on-screen-50443292_563="417" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="3822" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3887" id="Sec1"><span data-dcnode-id="3888" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="3823" id="Sec1-content"><p data-dcnode-id="3879"><span data-dcnode-id="3886" instrument_node="">In the past decades the emergence and subsequent pervasive diffusion of a ‘new technological paradigm’ (Dosi </span><a aria-label="Reference 1982" data-dcnode-id="3884" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d151356967e363" title="Dosi, G. (1982). Technological paradigms and technological trajectories. Research Policy, 11, 147–163."><span data-dcnode-id="3885" instrument_node="">1982</span></a><span data-dcnode-id="3883" instrument_node="">, </span><a aria-label="Reference 1988" data-dcnode-id="3881" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d151356967e366" title="Dosi, G. (1988). Source, procedure and microeconomic effects of innovation. Journal of Economic Literature, 26, 1120–1171."><span data-dcnode-id="3882" instrument_node="">1988</span></a><span data-dcnode-id="3880" instrument_node="">), mainly based on ICT and automation, has led to a dramatic social impact on the employment structure of the industrialized world.</span></p><p data-dcnode-id="3871"><span data-dcnode-id="3878" instrument_node="">In recent years, the introduction of 3D printing machines, self-driving cars (Tesla, Google, Apple) and agricultural robots has raised again the fear of an upcoming massive technological unemployment. Moreover, not only agricultural and manufacturing employment appears at risk,</span><sup data-dcnode-id="3873"><a data-dcnode-id="3874" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">Footnote </span></span><span data-dcnode-id="3875" instrument_node="">1</span></a></sup><span data-dcnode-id="3872" instrument_node=""> but employees in services—including those jobs requiring cognitive skills—are no longer protected (see, for instance, how IBM’s cognitive computer Watson may displace the majority of legal advices).</span></p><p data-dcnode-id="3857"><span data-dcnode-id="3870" instrument_node="">In addition, from the macroeconomic point of view, the recent financial and economic crisis has led to a slow recovery characterized by a worrying jobless growth. Indeed, international organizations (UNIDO and OECD) are increasingly concerned about this risk (see Crespi and Tacsir </span><a aria-label="Reference 2012" data-dcnode-id="3868" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d151356967e384" title="Crespi, G., &amp; Tacsir, E. (2012). Effects of innovation on employment in Latin America. Inter-American Development Bank Institutions for Development (IFD) Technical Note No.IDB-TN-496. Inter-American Development Bank, Washington, DC."><span data-dcnode-id="3869" instrument_node="">2012</span></a><span data-dcnode-id="3867" instrument_node="">; UNIDO </span><a aria-label="Reference 2013" data-dcnode-id="3865" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d151356967e387" title="UNIDO. (2013). Industrial Development Report 2013. Sustaining employment growth: The role of manufacturing and structural change. Vienna: United Nations Industrial Development Organization."><span data-dcnode-id="3866" instrument_node="">2013</span></a><span data-dcnode-id="3864" instrument_node="">; Arntz et al. </span><a aria-label="Reference 2016" data-dcnode-id="3862" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d151356967e390" title="Arntz, M., Gregory, T., &amp; Zierahn, U. (2016). The risk of automation for jobs in OECD countries: A comparative analysis. OECD Social, Employment and Migration Working Papers n. 189, Paris."><span data-dcnode-id="3863" instrument_node="">2016</span></a><span data-dcnode-id="3861" instrument_node="">; OECD </span><a aria-label="Reference 2016" data-dcnode-id="3859" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d151356967e393" title="OECD. (2016). ICT and jobs: Complements or substitutes? The effects of ICT investment on labour market demand by skills and by industry in selected OECD countries. 2016 Ministerial Meeting on the Digital Economy Technical Report, OECD Digital Economy Papers n. 259, Paris."><span data-dcnode-id="3860" instrument_node="">2016</span></a><span data-dcnode-id="3858" instrument_node="">).</span></p><p data-dcnode-id="3846"><span data-dcnode-id="3856" instrument_node="">In this context, Brynjolfsson and McAfee (</span><a aria-label="Reference 2011" data-dcnode-id="3854" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d151356967e399" title="Brynjolfsson, E., &amp; McAfee, A. (2011). Race against the machine: How the digital revolution is accelerating innovation, driving productivity, and irreversibly transforming employment and the economy. Lexington, MA: Digital Frontier Press."><span data-dcnode-id="3855" instrument_node="">2011</span></a><span data-dcnode-id="3853" instrument_node="">, </span><a aria-label="Reference 2014" data-dcnode-id="3851" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d151356967e402" title="Brynjolfsson, E., &amp; McAfee, A. (2014). The second machine age: Work, progress, and prosperity in a time of brilliant technologies. New York: W.W. Norton."><span data-dcnode-id="3852" instrument_node="">2014</span></a><span data-dcnode-id="3850" instrument_node="">) suggest that the current employment problems are only partially caused by the economic crisis. In their opinion, they rather are the expression of a structural adjustment (a ‘Great Restructuring’) characterized by an exponential growth in computers’ processing speed having an even bigger impact on jobs, skills, and the whole economy. By the same token, Frey and Osborne (</span><a aria-label="Reference 2017" data-dcnode-id="3848" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d151356967e405" title="Frey, C. B., &amp; Osborne, M. A. (2017). The future of employment: how susceptible are jobs to computerisation? Technological Forecasting and Social Change, 114, 254–280."><span data-dcnode-id="3849" instrument_node="">2017</span></a><span data-dcnode-id="3847" instrument_node="">)—using a Gaussian process classifier applied to data from the US Department of Labor—predict that 47% of the occupational categories are at high risk of being automated, including a wide range of service/white-collar/cognitive tasks such as accountancy, logistics, legal works, translation and technical writing.</span></p><p data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">The aim of this paper is twofold. On the one hand, the economic insights over the employment impact of technological change will be discussed covering both classical theories and updated theoretical and empirical analyses; on the other hand, a sectoral empirical test will be provided, in order to shed some light on the recent evolution of the relationship between innovation and employment in Europe.</span></p><p data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">Three are the main novel contributions of this work.</span></p><p data-dcnode-id="3837"><span data-dcnode-id="3841" instrument_node="">Firstly, a comprehensive theoretical setting will be critically discussed, trying to reveal implicit assumptions, possible drawbacks and market failures frequently neglected by the current economic debate often prone to believe that market clearing easily guarantees a return to full employment (Sect.&nbsp;</span><a data-dcnode-id="3839" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="3840" instrument_node="">2</span></a><span data-dcnode-id="3838" instrument_node="">).</span></p><p data-dcnode-id="3832"><span data-dcnode-id="3836" instrument_node="">Secondly, an updated survey of previous empirical studies (at the macro, sectoral and micro level) will be provided (Sect.&nbsp;</span><a data-dcnode-id="3834" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec5"><span data-dcnode-id="3835" instrument_node="">3</span></a><span data-dcnode-id="3833" instrument_node="">).</span></p><p data-dcnode-id="3824"><span data-dcnode-id="3831" instrument_node="">Thirdly, we will put forward a dynamic specification able to empirically test the possible employment impact of innovation across different European countries in recent times (Sects.&nbsp;</span><a data-dcnode-id="3829" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec6"><span data-dcnode-id="3830" instrument_node="">4</span></a><span data-dcnode-id="3828" instrument_node="">, </span><a data-dcnode-id="3826" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec9"><span data-dcnode-id="3827" instrument_node="">5</span></a><span data-dcnode-id="3825" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="3608" data-gtm-vis-first-on-screen-50443292_562="417" data-gtm-vis-first-on-screen-50443292_563="417" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="417" data-gtm-vis-recent-on-screen-50443292_563="417" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Theory"><div class="c-article-section" data-dcnode-id="3609" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3819" id="Sec2"><span data-dcnode-id="3820" instrument_node="">Theory</span></h2><div class="c-article-section__content" data-dcnode-id="3610" id="Sec2-content"><p data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">The assessment of the effects of technological change on employment is a well-known controversial issue for theoretical economists. Indeed, technological unemployment is considered a direct troublesome consequence of labor-saving process innovations. However, economic theory underlines also the existence of indirect compensation mechanisms able to balance the reduction of the number of employees caused by technological progress.</span></p><p data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">In addition, product innovations, differently from process innovations, generally show a labor-friendly nature.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3813" id="Sec3"><span data-dcnode-id="3814" instrument_node="">Process innovation and ‘compensation mechanisms’</span></h3><p data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">The unavoidable direct impact of process innovation is job destruction: by definition, process innovation means producing the same amount of output using a smaller quantity of production factors, i.e. mainly labor. However, since the very beginning, economic theory has pointed out the existence of economic forces that can counterbalance—at least partially—the employment reduction caused by process innovation.</span></p><p data-dcnode-id="3800"><span data-dcnode-id="3810" instrument_node="">In more detail, at the time of the classical economists, these two opposite views started to compete. On one hand, the working class feared to be dismissed because of innovation (see Ricardo </span><a aria-label="Reference 1951" data-dcnode-id="3808" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d151356967e457" title="Ricardo, D. (1951). Principles of Political Economy. In P. Sraffa (Ed.), The works and correspondence of David Ricardo (Vol. 1). Cambridge: Cambridge University Press. (third edn 1821)."><span data-dcnode-id="3809" instrument_node="">1951</span></a><span data-dcnode-id="3807" instrument_node="">). Indeed, the working class perception was so negative that Ned Ludd guided workers to destroy machines (see Hobsbawm </span><a aria-label="Reference 1968" data-dcnode-id="3805" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d151356967e460" title="Hobsbawm, E. J. (1968). Industry and empire: An economic history of Britain since 1750. Harmondsworth Middlesex: Penguin Books."><span data-dcnode-id="3806" instrument_node="">1968</span></a><span data-dcnode-id="3804" instrument_node="">; Hobsbawm and Rudé </span><a aria-label="Reference 1969" data-dcnode-id="3802" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d151356967e463" title="Hobsbawm, E. J., &amp; Rudé, G. (1969). Captain swing. London: London Reader’s Union."><span data-dcnode-id="3803" instrument_node="">1969</span></a><span data-dcnode-id="3801" instrument_node="">). On the other hand, the political and academic debate was mainly theoretically dominated by an ex-ante confidence in the existence of market compensation mechanisms for fired workers.</span></p><p data-dcnode-id="3762"><span data-dcnode-id="3799" instrument_node="">In fact, in the first half of the XIX century, classical economists put forward a theory that Marx called the ‘compensation theory’ (see Marx </span><a aria-label="Reference 1961" data-dcnode-id="3797" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d151356967e469" title="Marx, K. (1961). Capital. Moscow: Foreign Languages Publishing House. (first edn 1867)."><span data-dcnode-id="3798" instrument_node="">1961</span></a><span data-dcnode-id="3796" instrument_node="">; Marx </span><a aria-label="Reference 1969" data-dcnode-id="3794" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d151356967e472" title="Marx, K. (1969). Theories of surplus value. London: Lawrence &amp; Wishart. (first edn. 1905–10)."><span data-dcnode-id="3795" instrument_node="">1969</span></a><span data-dcnode-id="3793" instrument_node="">). This theory is based on different market compensation mechanisms which are generated by technological change and which might counterbalance—partially or totally—the initial labor-saving impact of process innovation</span><sup data-dcnode-id="3788"><a data-dcnode-id="3789" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">Footnote </span></span><span data-dcnode-id="3790" instrument_node="">2</span></a></sup><span data-dcnode-id="3787" instrument_node=""> (see also Petit </span><a aria-label="Reference 1995" data-dcnode-id="3785" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d151356967e484" title="Petit, P. (1995). Employment and technological change. In P. Stoneman (Ed.), Handbook of the economics of innovation and technological change (pp. 366–408). Amsterdam: North Holland."><span data-dcnode-id="3786" instrument_node="">1995</span></a><span data-dcnode-id="3784" instrument_node="">; Vivarelli </span><a aria-label="Reference 1995" data-dcnode-id="3782" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d151356967e487" title="Vivarelli, M. (1995). The economics of technology and employment: Theory and empirical evidence. Aldershot: Elgar."><span data-dcnode-id="3783" instrument_node="">1995</span></a><span data-dcnode-id="3781" instrument_node="">; Vivarelli and Pianta </span><a aria-label="Reference 2000" data-dcnode-id="3779" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d151356967e491" title="Vivarelli, M., &amp; Pianta, M. (Eds.). (2000). The employment impact of innovation: Evidence and policy. London: Routledge."><span data-dcnode-id="3780" instrument_node="">2000</span></a><span data-dcnode-id="3778" instrument_node="">; Pianta </span><a aria-label="Reference 2005" data-dcnode-id="3776" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d151356967e494" title="Pianta, M. (2005). Innovation and employment. In J. Fagerberg, D. Mowery, &amp; R. R. Nelson (Eds.), Handbook of innovation (pp. 568–598). Oxford: Oxford University Press."><span data-dcnode-id="3777" instrument_node="">2005</span></a><span data-dcnode-id="3775" instrument_node="">; Coad and Rao </span><a aria-label="Reference 2011" data-dcnode-id="3773" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d151356967e497" title="Coad, A., &amp; Rao, R. (2011). The firm-level employment effects of innovations in high-tech US manufacturing industries. Journal of Evolutionary Economics, 21, 255–283."><span data-dcnode-id="3774" instrument_node="">2011</span></a><span data-dcnode-id="3772" instrument_node="">; Vivarelli </span><a aria-label="Reference 2013" data-dcnode-id="3770" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d151356967e500" title="Vivarelli, M. (2013). Technology, employment and skills: An interpretative framework. Eurasian Business Review, 3, 66–89."><span data-dcnode-id="3771" instrument_node="">2013</span></a><span data-dcnode-id="3769" instrument_node="">, </span><a aria-label="Reference 2014" data-dcnode-id="3767" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d151356967e503" title="Vivarelli, M. (2014). Innovation, employment and skills in advanced and developing countries: A survey of economic literature. Journal of Economic Issues, 48, 123–154."><span data-dcnode-id="3768" instrument_node="">2014</span></a><span data-dcnode-id="3766" instrument_node="">; Calvino and Virgillito </span><a aria-label="Reference 2017" data-dcnode-id="3764" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d151356967e506" title="Calvino, F., &amp; Virgillito, M.E. (2017). The innovation-employment nexus: A critical survey of theory and empirics. Journal of Economic Surveys. (forthcoming)."><span data-dcnode-id="3765" instrument_node="">2017</span></a><span data-dcnode-id="3763" instrument_node="">).</span></p><p data-dcnode-id="3754"><span data-dcnode-id="3761" instrument_node="">A first channel for compensating the initial job losses can be related to the ‘introduction of new machines’. The process innovations displacing workers in the ‘user sectors’ are able to create new jobs in the capital sectors where these new machines are fabricated (see Say </span><a aria-label="Reference 1964" data-dcnode-id="3759" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d151356967e512" title="Say, J. B. (1964). A treatise on political economy or the production, distribution and consumption of wealth. New York: M. Kelley. (first edn 1803)."><span data-dcnode-id="3760" instrument_node="">1964</span></a><span data-dcnode-id="3758" instrument_node="">). However, the size of this effect can be only partial as labor-saving technologies affect the capital goods sector as well (see Marx </span><a aria-label="Reference 1969" data-dcnode-id="3756" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d151356967e515" title="Marx, K. (1969). Theories of surplus value. London: Lawrence &amp; Wishart. (first edn. 1905–10)."><span data-dcnode-id="3757" instrument_node="">1969</span></a><span data-dcnode-id="3755" instrument_node="">).</span></p><p data-dcnode-id="3737"><span data-dcnode-id="3753" instrument_node="">A second compensation mechanism depends on the ‘decrease in prices’. As process innovations involve the displacement of workers, they easily determine the reduction of the unit costs of production. In a competitive market, this dynamics reduces final prices as well and, in turn, decreasing prices encourage a new demand for products and, so, additional production and employment (see Steuart </span><a aria-label="Reference 1966" data-dcnode-id="3751" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d151356967e522" title="Steuart, J. (1966). An Inquiry into the principles of political economy. Chicago: Oliver and Boyd. (first edn 1767)."><span data-dcnode-id="3752" instrument_node="">1966</span></a><span data-dcnode-id="3750" instrument_node="">). Nonetheless, two critical issues might reduce the effectiveness of this mechanism. First of all oligopolistic markets or less competitive market structures do not grant the 100% translation of lower costs into lower prices (see Sylos Labini </span><a aria-label="Reference 1969" data-dcnode-id="3748" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d151356967e525" title="Sylos Labini, P. (1969). Oligopoly and technical progress. Cambridge (Mass.): Harvard University Press. (first edn 1956)."><span data-dcnode-id="3749" instrument_node="">1969</span></a><span data-dcnode-id="3747" instrument_node="">). Secondly, the initial effect of a labor-saving technology is a decline in the aggregate demand from the dismissed workers. Therefore, the mechanism ‘via decrease in prices’ applies to an already reduced demand and has to more than counterbalance the initial decrease in aggregate purchasing power (see Malthus </span><a aria-label="Reference 1964" data-dcnode-id="3745" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d151356967e528" title="Malthus, T. R. (1964). Principles of political economy. New York: M. Kelley. (first edn 1836)."><span data-dcnode-id="3746" instrument_node="">1964</span></a><span data-dcnode-id="3744" instrument_node="">; Sismondi </span><a aria-label="Reference 1971" data-dcnode-id="3742" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d151356967e531" title="Sismondi, J. C. L. (1971). Nouveaux Principes d’Economie Politique ou de la Richesse dans ses Rapports avec la Population. Paris: Calmann-Levy. (first edn 1819)."><span data-dcnode-id="3743" instrument_node="">1971</span></a><span data-dcnode-id="3741" instrument_node="">; Mill </span><a aria-label="Reference 1976" data-dcnode-id="3739" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d151356967e534" title="Mill, J. S. (1976). Principles of political economy. New York: M. Kelley. (first edn 1848)."><span data-dcnode-id="3740" instrument_node="">1976</span></a><span data-dcnode-id="3738" instrument_node="">). If the delay of this compensation mechanism is crucially relevant, it might create structural unemployment that continues over time.</span></p><p data-dcnode-id="3723"><span data-dcnode-id="3736" instrument_node="">A third compensation mechanism might depend on the decision to ‘support new investments’. Indeed, in case of delay in translating the decline in costs (caused by technological progress) into decrease in prices, positive profits may be accumulated by the innovative entrepreneurs. If these profits are invested, new productions and job opportunities are created with a lag. This proposition has been originally optimistically put forward by Ricardo (</span><a aria-label="Reference 1951" data-dcnode-id="3734" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d151356967e540" title="Ricardo, D. (1951). Principles of Political Economy. In P. Sraffa (Ed.), The works and correspondence of David Ricardo (Vol. 1). Cambridge: Cambridge University Press. (third edn 1821)."><span data-dcnode-id="3735" instrument_node="">1951</span></a><span data-dcnode-id="3733" instrument_node="">), but it has also been called forth by neo-classical economists such as Marshall (</span><a aria-label="Reference 1961" data-dcnode-id="3731" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d151356967e543" title="Marshall, A. (1961). Principles of economics. Cambridge: Macmillan. (first edn 1890)."><span data-dcnode-id="3732" instrument_node="">1961</span></a><span data-dcnode-id="3730" instrument_node="">) and, lately, by Hicks (</span><a aria-label="Reference 1973" data-dcnode-id="3728" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d151356967e546" title="Hicks, J. R. (1973). Capital and time. Oxford: Oxford University Press."><span data-dcnode-id="3729" instrument_node="">1973</span></a><span data-dcnode-id="3727" instrument_node="">) and Stoneman (</span><a aria-label="Reference 1983" data-dcnode-id="3725" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d151356967e549" title="Stoneman, P. (1983). The economic analysis of technological change. Oxford: Oxford University Press."><span data-dcnode-id="3726" instrument_node="">1983</span></a><span data-dcnode-id="3724" instrument_node="">). Nevertheless, pessimistic expectations (‘animal spirits’ in Keynesian terms) may imply the decision to postpone investments even if cumulated profits obtained by innovation are available. If this is the case, a substantial delay in compensation may generate structural technological unemployment.</span></p><p data-dcnode-id="3715"><span data-dcnode-id="3722" instrument_node="">A forth compensation mechanism relates to the impact of new technologies on labor market as it might be affected by a ‘reduction in wages’. Focusing on the labor-market only, the direct effect of job-destructive technologies may be directly compensated in case of free competition and full substitutability between labor and capital. If these assumptions hold, technological unemployment implies a decrease in wages that would stimulate more labor-intensive and less expensive technologies. The first to adopt this kind of argument were Wicksell (</span><a aria-label="Reference 1961" data-dcnode-id="3720" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR94" id="ref-link-section-d151356967e555" title="Wicksell, K. (1961). Lectures on political economy. London: Routledge &amp; Kegan. (first edn 1901–1906)."><span data-dcnode-id="3721" instrument_node="">1961</span></a><span data-dcnode-id="3719" instrument_node="">) and Hicks (</span><a aria-label="Reference 1932" data-dcnode-id="3717" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d151356967e558" title="Hicks, J. R. (1932). The theory of wages. London: Macmillan."><span data-dcnode-id="3718" instrument_node="">1932</span></a><span data-dcnode-id="3716" instrument_node="">).</span></p><p data-dcnode-id="3698"><span data-dcnode-id="3714" instrument_node="">Finally, a compensation mechanism connected to an ‘increase in incomes’ has to be considered. This compensation mechanism is directly in contrast with the previous one (‘reduction in wages’) suggesting that there might be a competition between the two. Under the assumption that economies are dominated by Fordist mass production, unions participate in the distribution of the fruits of technological progress, i.e. a portion of the cost savings due to innovation can be transformed into higher income and, therefore, larger consumption. This demand expansion leads to an increase in employment which may compensate the initial technological unemployment (see Pasinetti </span><a aria-label="Reference 1981" data-dcnode-id="3712" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d151356967e564" title="Pasinetti, L. (1981). Structural change and economic growth. Cambridge: Cambridge University Press."><span data-dcnode-id="3713" instrument_node="">1981</span></a><span data-dcnode-id="3711" instrument_node="">; Boyer </span><a aria-label="Reference 1988a" data-dcnode-id="3709" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d151356967e567" title="Boyer, R. (1988a). Assessing the impact of R&amp;D on employment: Puzzle or consensus? Paper presented at the International Conference on New Technology: Its Impacts on Labour Markets and the Employment System, December 5–7, Berlin."><span data-dcnode-id="3710" instrument_node="">1988a</span></a><span data-dcnode-id="3708" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="3706" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d151356967e570" title="Boyer, R. (1988b). Technical change and the theory of regulation. In G. Dosi, C. Freeman, R. R. Nelson, G. Silverberg, &amp; L. Soete (Eds.), Technical change and the economic theory (pp. 67–94). London: Pinter."><span data-dcnode-id="3707" instrument_node="">b</span></a><span data-dcnode-id="3705" instrument_node="">, </span><a aria-label="Reference 1990" data-dcnode-id="3703" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d151356967e573" title="Boyer, R. (1990). The capital labour relations in OECD countries: From the Fordist “Golden Age” to contrasted national trajectories. Working paper CEPREMAP, 9020, Paris."><span data-dcnode-id="3704" instrument_node="">1990</span></a><span data-dcnode-id="3702" instrument_node="">). However, nowadays the Fordist mode of production is not so relevant anymore, therefore the distribution of income follows different systems (based more on Phillips’ curve than on sharing the productivity gains) and labor markets—depending on institutional factors—have become more competitive and flexible (see Appelbaum and Schettkat </span><a aria-label="Reference 1995" data-dcnode-id="3700" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d151356967e576" title="Appelbaum, E., &amp; Schettkat, R. (1995). Employment and productivity in industrialized economies. International Labour Review, 134, 605–623."><span data-dcnode-id="3701" instrument_node="">1995</span></a><span data-dcnode-id="3699" instrument_node="">).</span></p><p data-dcnode-id="3690"><span data-dcnode-id="3697" instrument_node="">In sum, economic theory cannot reach a conclusive answer in terms of the final employment impact of process innovation. In order for compensation mechanisms to be effective in counterbalancing the technological displacement caused by process innovations, they have to rely on many simultaneous factors such as the degree of competition and demand elasticity. Depending on institutional, social and economic contexts,</span><sup data-dcnode-id="3692"><a data-dcnode-id="3693" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">Footnote </span></span><span data-dcnode-id="3694" instrument_node="">3</span></a></sup><span data-dcnode-id="3691" instrument_node=""> compensation can therefore be more or less prompt and victorious in reabsorbing the technological unemployment.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3688" id="Sec4"><span data-dcnode-id="3689" instrument_node="">Product innovation and employment</span></h3><p data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">Of course, technological change cannot be reduced to process innovation: the other side of the coin is product innovation that is also important in terms of its possible employment impact.</span></p><p data-dcnode-id="3678"><span data-dcnode-id="3685" instrument_node="">As far as product innovation is concerned, obviously enough the introduction of new products and the subsequent emergence of new markets cause a job-creation effect. Indeed, the labor-intensive impact of product innovation was already underlined by classical economists (Say </span><a aria-label="Reference 1964" data-dcnode-id="3683" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d151356967e602" title="Say, J. B. (1964). A treatise on political economy or the production, distribution and consumption of wealth. New York: M. Kelley. (first edn 1803)."><span data-dcnode-id="3684" instrument_node="">1964</span></a><span data-dcnode-id="3682" instrument_node="">) and even the most rigorous opponent to an optimistic vision of the employment consequences of technological change admitted the positive employment benefits which can derive from the introduction of new products (Marx </span><a aria-label="Reference 1961" data-dcnode-id="3680" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d151356967e605" title="Marx, K. (1961). Capital. Moscow: Foreign Languages Publishing House. (first edn 1867)."><span data-dcnode-id="3681" instrument_node="">1961</span></a><span data-dcnode-id="3679" instrument_node="">).</span></p><p data-dcnode-id="3652"><span data-dcnode-id="3677" instrument_node="">In the current debate, various studies (Freeman et al. </span><a aria-label="Reference 1982" data-dcnode-id="3675" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d151356967e611" title="Freeman, C., Clark, J., &amp; Soete, L. (1982). Unemployment and technical innovation. London: Pinter."><span data-dcnode-id="3676" instrument_node="">1982</span></a><span data-dcnode-id="3674" instrument_node="">; Freeman and Soete </span><a aria-label="Reference 1994" data-dcnode-id="3672" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d151356967e614" title="Freeman, C., &amp; Soete, L. (1994). Work for all or mass unemployment? Computerised technical change into the twenty-first century. London-New York: Pinter."><span data-dcnode-id="3673" instrument_node="">1994</span></a><span data-dcnode-id="3671" instrument_node="">, </span><a aria-label="Reference 1987" data-dcnode-id="3669" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d151356967e617" title="Freeman, C., &amp; Soete, L. (Eds.). (1987). Technical change and full employment. Oxford: Basil Blackwell."><span data-dcnode-id="3670" instrument_node="">1987</span></a><span data-dcnode-id="3668" instrument_node="">; Vivarelli and Pianta </span><a aria-label="Reference 2000" data-dcnode-id="3666" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d151356967e620" title="Vivarelli, M., &amp; Pianta, M. (Eds.). (2000). The employment impact of innovation: Evidence and policy. London: Routledge."><span data-dcnode-id="3667" instrument_node="">2000</span></a><span data-dcnode-id="3665" instrument_node="">; Edquist et al. </span><a aria-label="Reference 2001" data-dcnode-id="3663" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d151356967e623" title="Edquist, C., Hommen, L., &amp; McKelvey, M. (2001). Innovation and employment: Product versus process innovation. Cheltenham: Elgar."><span data-dcnode-id="3664" instrument_node="">2001</span></a><span data-dcnode-id="3662" instrument_node="">; Bogliacino and Pianta </span><a aria-label="Reference 2010" data-dcnode-id="3660" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d151356967e627" title="Bogliacino, F., &amp; Pianta, M. (2010). Innovation and employment. A reinvestigation using revised Pavitt classes. Research Policy, 39, 799–809."><span data-dcnode-id="3661" instrument_node="">2010</span></a><span data-dcnode-id="3659" instrument_node="">) agree that product innovations have a positive impact on employment since they open the way to the production of either entire new goods or differentiated mature ones (Vivarelli </span><a aria-label="Reference 2013" data-dcnode-id="3657" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d151356967e630" title="Vivarelli, M. (2013). Technology, employment and skills: An interpretative framework. Eurasian Business Review, 3, 66–89."><span data-dcnode-id="3658" instrument_node="">2013</span></a><span data-dcnode-id="3656" instrument_node="">, </span><a aria-label="Reference 2014" data-dcnode-id="3654" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d151356967e633" title="Vivarelli, M. (2014). Innovation, employment and skills in advanced and developing countries: A survey of economic literature. Journal of Economic Issues, 48, 123–154."><span data-dcnode-id="3655" instrument_node="">2014</span></a><span data-dcnode-id="3653" instrument_node="">).</span></p><p data-dcnode-id="3638"><span data-dcnode-id="3651" instrument_node="">Nevertheless, even the job creating effect of product innovation may be more or less effective. In fact, the so-called ‘welfare effect’ (the creation of new branches of production) has to face the ‘substitution effect’ (i.e. dispcement of mature products; see Katsoulacos </span><a aria-label="Reference 1984" data-dcnode-id="3649" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d151356967e639" title="Katsoulacos, Y. S. (1984). Product innovation and employment. European Economic Review, 26, 83–108."><span data-dcnode-id="3650" instrument_node="">1984</span></a><span data-dcnode-id="3648" instrument_node="">, </span><a aria-label="Reference 1986" data-dcnode-id="3646" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d151356967e642" title="Katsoulacos, Y. S. (1986). The employment effect of technical change. Brighton: Wheatsheaf."><span data-dcnode-id="3647" instrument_node="">1986</span></a><span data-dcnode-id="3645" instrument_node="">; Hall et al. </span><a aria-label="Reference 2008" data-dcnode-id="3643" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d151356967e645" title="Hall, B. H., Lotti, F., &amp; Mairesse, J. (2008). Employment, innovation, and productivity: Evidence from Italian microdata. Industrial and Corporate Change, 17, 813–839."><span data-dcnode-id="3644" instrument_node="">2008</span></a><span data-dcnode-id="3642" instrument_node="">; Harrison et al. </span><a aria-label="Reference 2008" data-dcnode-id="3640" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d151356967e648" title="Harrison, R., Jaumandreu, J., Mairesse, J., &amp; Peters, B. (2008). Does innovation stimulate employment? A firm-level analysis using comparable micro-data from four European countries. NBER Working Papers 14216, Cambridge (Mass.)."><span data-dcnode-id="3641" instrument_node="">2008</span></a><span data-dcnode-id="3639" instrument_node="">). For example, the MP3 music format is a product innovation now displacing the compact disk which in turn displaced the vinyl.</span></p><p data-dcnode-id="3621"><span data-dcnode-id="3637" instrument_node="">Indeed, the balance between the direct labor-saving effect of process innovation and the counterbalancing effects of compensation forces and product innovation can significantly diverge depending on different historical periods and institutional/social frameworks</span><sup data-dcnode-id="3632"><a data-dcnode-id="3633" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">Footnote </span></span><span data-dcnode-id="3634" instrument_node="">4</span></a></sup><span data-dcnode-id="3631" instrument_node=""> (Freeman et al. </span><a aria-label="Reference 1982" data-dcnode-id="3629" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d151356967e667" title="Freeman, C., Clark, J., &amp; Soete, L. (1982). Unemployment and technical innovation. London: Pinter."><span data-dcnode-id="3630" instrument_node="">1982</span></a><span data-dcnode-id="3628" instrument_node="">; Freeman and Soete </span><a aria-label="Reference 1987" data-dcnode-id="3626" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d151356967e670" title="Freeman, C., &amp; Soete, L. (Eds.). (1987). Technical change and full employment. Oxford: Basil Blackwell."><span data-dcnode-id="3627" instrument_node="">1987</span></a><span data-dcnode-id="3625" instrument_node="">, </span><a aria-label="Reference 1994" data-dcnode-id="3623" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d151356967e673" title="Freeman, C., &amp; Soete, L. (1994). Work for all or mass unemployment? Computerised technical change into the twenty-first century. London-New York: Pinter."><span data-dcnode-id="3624" instrument_node="">1994</span></a><span data-dcnode-id="3622" instrument_node="">).</span></p><p data-dcnode-id="3613"><span data-dcnode-id="3620" instrument_node="">Summarizing the economic theory available on the subject, the relationship between innovation and employment can be represented by a very multifaceted picture where the direct labor-saving impact of process innovation, the compensation mechanisms, the impediments and obstacles which can seriously weaken the effectiveness of such mechanisms, and the labor friendly nature of product innovation can combine in very diverse outcomes (see also Vivarelli </span><a aria-label="Reference 2013" data-dcnode-id="3618" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d151356967e679" title="Vivarelli, M. (2013). Technology, employment and skills: An interpretative framework. Eurasian Business Review, 3, 66–89."><span data-dcnode-id="3619" instrument_node="">2013</span></a><span data-dcnode-id="3617" instrument_node="">, </span><a aria-label="Reference 2014" data-dcnode-id="3615" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d151356967e682" title="Vivarelli, M. (2014). Innovation, employment and skills in advanced and developing countries: A survey of economic literature. Journal of Economic Issues, 48, 123–154."><span data-dcnode-id="3616" instrument_node="">2014</span></a><span data-dcnode-id="3614" instrument_node="">).</span></p><p data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">Hence, although theoretical economists may develop sophisticated models about the employment impact of innovation, the economic theory does not have a clear-cut answer about the final employment effect of innovation. Indeed, the actual employment impact of the new technologies depend on the balance between process and product innovation, the values of the different parameters assessing the efficacy of the different compensation mechanisms and the particular institutional context. Therefore, attention should be devoted to the empirical analyses.</span></p></div></div></section><section data-dcnode-id="3451" data-title="Previous empirical evidence"><div class="c-article-section" data-dcnode-id="3452" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3606" id="Sec5"><span data-dcnode-id="3607" instrument_node="">Previous empirical evidence</span></h2><div class="c-article-section__content" data-dcnode-id="3453" id="Sec5-content"><p data-dcnode-id="3598"><span data-dcnode-id="3605" instrument_node="">Turning to the empirical analyses</span><sup data-dcnode-id="3600"><a data-dcnode-id="3601" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node="">Footnote </span></span><span data-dcnode-id="3602" instrument_node="">5</span></a></sup><span data-dcnode-id="3599" instrument_node="">, only country-studies can fully assess the functioning of all the compensation mechanisms.</span></p><p data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">However, country-level studies are affected by severe methodological shortcomings. Therefore, even if they allow to explore compensation mechanisms at work in the aggregate, they are often severely constrained by composition biases in the data, the difficulty to find a proper unique proxy for technological change and the fact that the final employment national trends are co-determined by overwhelming institutional and social determinants difficult to disentangle and to control for.</span></p><p data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">In general, macroeconometric analyses have tested the validity of the compensation mechanisms in a partial or general equilibrium framework.</span></p><p data-dcnode-id="3589"><span data-dcnode-id="3593" instrument_node="">At the beginning of the ‘80s and using US data, Sinclair (</span><a aria-label="Reference 1981" data-dcnode-id="3591" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d151356967e724" title="Sinclair, P. J. N. (1981). When will technical progress destroy jobs? Oxford Economic Papers, 31, 1–18."><span data-dcnode-id="3592" instrument_node="">1981</span></a><span data-dcnode-id="3590" instrument_node="">) proposes a macroeconomic IS/LM approach and concludes that a positive employment compensation can occur, especially ‘via decrease in wages’, if demand elasticity and the elasticity of factor substitution are sufficiently high.</span></p><p data-dcnode-id="3584"><span data-dcnode-id="3588" instrument_node="">Turning to the UK, Layard and Nickell (</span><a aria-label="Reference 1985" data-dcnode-id="3586" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d151356967e731" title="Layard, R., &amp; Nickell, S. (1985). The causes of British unemployment. National Institute Economic Review, 111, 62–85."><span data-dcnode-id="3587" instrument_node="">1985</span></a><span data-dcnode-id="3585" instrument_node="">) derive a demand for labor in a quasi-general equilibrium framework and state that the crucial parameter is the elasticity of the demand for labor in response to a variation in the ratio between real wages and labor productivity. Their hypothesis is that technical change increases labor productivity and—given an adequate elasticity—proportionally the demand for labor and this can be enough to fully compensate initial job losses.</span></p><p data-dcnode-id="3573"><span data-dcnode-id="3583" instrument_node="">In Vivarelli (</span><a aria-label="Reference 1995" data-dcnode-id="3581" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d151356967e737" title="Vivarelli, M. (1995). The economics of technology and employment: Theory and empirical evidence. Aldershot: Elgar."><span data-dcnode-id="3582" instrument_node="">1995</span></a><span data-dcnode-id="3580" instrument_node="">) the direct labor-saving effect of process innovation and the different compensation mechanisms in US and Italy are estimated through a simultaneous equations model over the period 1960–1988. Running 3SLS regressions, the most effective compensation mechanism turns out to be that ‘via decrease in prices’ in both countries. In addition, the US technological progress results to be more product oriented than the Italian one. Simonetti et al. (</span><a aria-label="Reference 2000" data-dcnode-id="3578" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d151356967e740" title="Simonetti, R., Taylor, K., &amp; Vivarelli, M. (2000). Modelling the employment impact of innovation. In M. Vivarelli &amp; M. Pianta (Eds.), The employment impact of innovation: Evidence and policy (pp. 26–43). London: Routledge."><span data-dcnode-id="3579" instrument_node="">2000</span></a><span data-dcnode-id="3577" instrument_node="">) apply the same simultaneous equations macroeconomic model of Vivarelli (</span><a aria-label="Reference 1995" data-dcnode-id="3575" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d151356967e743" title="Vivarelli, M. (1995). The economics of technology and employment: Theory and empirical evidence. Aldershot: Elgar."><span data-dcnode-id="3576" instrument_node="">1995</span></a><span data-dcnode-id="3574" instrument_node="">), running 3SLS regressions and using US, Italian, French and Japanese data over the period 1965–1993. The authors find that the most effective compensation mechanisms are the ‘via decrease in prices’ and ‘via increase in incomes’ (especially in Italy and France till the mid-eighties). Finally, product innovation significantly reveals its labor intensive potentiality only in the technological leader country in the period, namely the US.</span></p><p data-dcnode-id="3568"><span data-dcnode-id="3572" instrument_node="">At last, Feldmann (</span><a aria-label="Reference 2013" data-dcnode-id="3570" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d151356967e749" title="Feldmann, H. (2013). Technological unemployment in industrial countries. Journal of Evolutionary Economics, 23, 1099–1126."><span data-dcnode-id="3571" instrument_node="">2013</span></a><span data-dcnode-id="3569" instrument_node="">)—using data on 21 industrial countries over the period 1985–2009—assesses the impact of innovation (proxied by triadic patents normalized by population) on aggregate unemployment, controlling for a set of macroeconomic factors such as labor market features, tax wedge, employment protection, inflation and output gap. His results suggest that technological change significantly increases unemployment over a 3&nbsp;year period, but this impact fades away in the long run (compensation mechanisms via decrease ‘in prices’ and ‘wages’ seem to be effective).</span></p><p data-dcnode-id="3566"><span data-dcnode-id="3567" instrument_node="">On the whole, the (few) aggregate studies available on the subject reveal that technological change can display its labor-friendly nature only when markets are characterized by competition and flexibility. Therefore, both the mechanisms ‘via decrease in wages’ and ‘via decrease in prices’ turn out to be the most effective ones to compensate the employment displacing nature of technological change.</span></p><p data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">However, the shortcomings of the county-level studies suggest that the sectoral-level approach is an alternative and particularly important setting for investigating the overall employment impact of innovation. Sectoral-analyses have become more relevant in recent years due to an increasing availability of data. In general, the industrial dimension is not neutral as, especially in manufacturing, new process innovations seem to be implemented mainly through labor-saving embodied technical change, only partially counterbalanced by the market compensation mechanisms.</span></p><p data-dcnode-id="3553"><span data-dcnode-id="3563" instrument_node="">For instance, Clark (</span><a aria-label="Reference 1983" data-dcnode-id="3561" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d151356967e761" title="Clark, J. (1983). Employment projections and technological change. In D. L. Bosworth (Ed.), The employment consequences of technical change (pp. 110–125). London: Macmillan."><span data-dcnode-id="3562" instrument_node="">1983</span></a><span data-dcnode-id="3560" instrument_node="">, </span><a aria-label="Reference 1987" data-dcnode-id="3558" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d151356967e764" title="Clark, J. (1987). A vintage-capital simulation model. In C. Freeman &amp; L. Soete (Eds.), Technical change and full employment (pp. 86–98). Oxford: Basil Blackwell."><span data-dcnode-id="3559" instrument_node="">1987</span></a><span data-dcnode-id="3557" instrument_node="">) puts forward a supply-oriented vintage model investigating UK manufacturing and shows that the expansionary effect of innovative investments prevails until the mid ‘60s, when the rationalizing effect (due to labor-saving process innovation incorporated in investments and scrapping) starts to overcome the expansionary one. However, Nickell and Kong (</span><a aria-label="Reference 1989" data-dcnode-id="3555" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d151356967e767" title="Nickell, S., &amp; Kong, P. (1989). Technical progress and jobs. Centre for Labour Economics. Discussion Paper 366, London School of Economics, London."><span data-dcnode-id="3556" instrument_node="">1989</span></a><span data-dcnode-id="3554" instrument_node="">) focus their attention to the operating of the compensation mechanism ‘via decrease in prices’ in nine UK industries. Putting forward a price equation where cost-saving effects of labor-saving technologies are fully transferred into decreasing prices, results show that in seven sectors out of nine a sufficiently high demand elasticity is able to imply an overall positive impact of technical change on employment.</span></p><p data-dcnode-id="3548"><span data-dcnode-id="3552" instrument_node="">In the case of Italy, Vivarelli et al. (</span><a aria-label="Reference 1996" data-dcnode-id="3550" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d151356967e774" title="Vivarelli, M., Evangelista, R., &amp; Pianta, M. (1996). Innovation and employment in Italian manufacturing industry. Research Policy, 25, 1013–1026."><span data-dcnode-id="3551" instrument_node="">1996</span></a><span data-dcnode-id="3549" instrument_node="">) find evidence that in manufacturing the relationship between productivity growth and employment appears to be negative and, in particular, that product and process innovation have, respectively, positive and negative effects on the demand for labor.</span></p><p data-dcnode-id="3540"><span data-dcnode-id="3547" instrument_node="">Indeed, at the European level, Pianta (</span><a aria-label="Reference 2000" data-dcnode-id="3545" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d151356967e780" title="Pianta, M. (2000). The employment impact of product and process innovations. In M. Vivarelli &amp; M. Pianta (Eds.), The employment impact of innovation: Evidence and policy (pp. 77–95). London: Routledge."><span data-dcnode-id="3546" instrument_node="">2000</span></a><span data-dcnode-id="3544" instrument_node="">) and Antonucci and Pianta (</span><a aria-label="Reference 2002" data-dcnode-id="3542" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d151356967e783" title="Antonucci, T., &amp; Pianta, M. (2002). Employment effects of product and process innovation in Europe. International Review of Applied Economics, 16, 295–307."><span data-dcnode-id="3543" instrument_node="">2002</span></a><span data-dcnode-id="3541" instrument_node="">) show—using sectoral data based on the European Community Innovation Surveys (CIS)—an overall negative impact of innovation on employment in manufacturing industries across five European countries.</span></p><p data-dcnode-id="3535"><span data-dcnode-id="3539" instrument_node="">However, more recently, Coad and Rao (</span><a aria-label="Reference 2011" data-dcnode-id="3537" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d151356967e789" title="Coad, A., &amp; Rao, R. (2011). The firm-level employment effects of innovations in high-tech US manufacturing industries. Journal of Evolutionary Economics, 21, 255–283."><span data-dcnode-id="3538" instrument_node="">2011</span></a><span data-dcnode-id="3536" instrument_node="">), focusing only on high-tech manufacturing industries in US over the period 1963–2002, show that innovation and employment are positively linked (especially within the fast growing firms).</span></p><p data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">Overall, the scenario may also change if services are considered.</span></p><p data-dcnode-id="3525"><span data-dcnode-id="3532" instrument_node="">Evangelista (</span><a aria-label="Reference 2000" data-dcnode-id="3530" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d151356967e798" title="Evangelista, R. (2000). Sectoral patterns of technological change in services. Economics of Innovation and New Technology, 9, 183–222."><span data-dcnode-id="3531" instrument_node="">2000</span></a><span data-dcnode-id="3529" instrument_node="">) and Evangelista and Savona (</span><a aria-label="Reference 2002" data-dcnode-id="3527" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d151356967e801" title="Evangelista, R., &amp; Savona, M. (2002). The impact of innovation on employment in services: Evidence from Italy. International Review of Applied Economics, 16, 309–318."><span data-dcnode-id="3528" instrument_node="">2002</span></a><span data-dcnode-id="3526" instrument_node="">) find—in the Italian case—a positive employment effect of technological change (only) in the most innovative and knowledge-intensive service sectors.</span></p><p data-dcnode-id="3514"><span data-dcnode-id="3524" instrument_node="">Moreover, taking manufacturing and services jointly into account (again using CIS data), Bogliacino and Pianta (</span><a aria-label="Reference 2010" data-dcnode-id="3522" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d151356967e807" title="Bogliacino, F., &amp; Pianta, M. (2010). Innovation and employment. A reinvestigation using revised Pavitt classes. Research Policy, 39, 799–809."><span data-dcnode-id="3523" instrument_node="">2010</span></a><span data-dcnode-id="3521" instrument_node="">) find a positive employment impact of product innovation (which turns out to be reasonable in high-tech manufacturing sectors—see also Mastrostefano and Pianta </span><a aria-label="Reference 2009" data-dcnode-id="3519" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d151356967e810" title="Mastrostefano, V., &amp; Pianta, M. (2009). Technology and jobs. Economics of Innovation and New Technology, 18, 729–741."><span data-dcnode-id="3520" instrument_node="">2009</span></a><span data-dcnode-id="3518" instrument_node="">). By the same token, Bogliacino and Vivarelli (</span><a aria-label="Reference 2012" data-dcnode-id="3516" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d151356967e813" title="Bogliacino, F., &amp; Vivarelli, M. (2012). The job creation effect of R&amp;D expenditures. Australian Economic Papers, 51, 96–113."><span data-dcnode-id="3517" instrument_node="">2012</span></a><span data-dcnode-id="3515" instrument_node="">)—running GMM-SYS panel estimations covering 25 manufacturing and service sectors for 15 European countries over the time-span 1996–2005—demonstrate that R&amp;D expenditures have a job-creating effect, especially in high-tech industries.</span></p><p data-dcnode-id="3503"><span data-dcnode-id="3513" instrument_node="">Finally, Bogliacino et al. (</span><a aria-label="Reference 2017" data-dcnode-id="3511" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d151356967e820" title="Bogliacino, F., Guarascio, D., &amp; Cirillo, V. (2017). The dynamics of profits and wages: technology, offshoring and demand. Industry and Innovation. (forthcoming)."><span data-dcnode-id="3512" instrument_node="">2017</span></a><span data-dcnode-id="3510" instrument_node="">), based on Bogliacino (</span><a aria-label="Reference 2014" data-dcnode-id="3508" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d151356967e823" title="Bogliacino, F. (2014). Innovation and employment: A firm level analysis with European R&amp;D Scoreboard data. EconomiA, 15, 141–154."><span data-dcnode-id="3509" instrument_node="">2014</span></a><span data-dcnode-id="3507" instrument_node="">) formal treatment, explore the impact of innovation and offshoring on wage and employment dynamics, performing an analysis on a panel of 37 industries (1995–2010) across five European countries. Both innovation and offshoring favor mainly high-skill wages and employees, suggesting a heterogeneous impact on different categories of workers (see also Vivarelli </span><a aria-label="Reference 2014" data-dcnode-id="3505" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d151356967e826" title="Vivarelli, M. (2014). Innovation, employment and skills in advanced and developing countries: A survey of economic literature. Journal of Economic Issues, 48, 123–154."><span data-dcnode-id="3506" instrument_node="">2014</span></a><span data-dcnode-id="3504" instrument_node="">).</span></p><p data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node="">Summarizing the available sectoral-level evidence, a dominant labor friendly impact has been detected in high-tech manufacturing sectors and knowledge-intensive services, those sectors where product innovation is prevailing and where the demand evolution is more dynamic, while a labor-saving tendency is relevant especially in low- and medium- tech manufacturing.</span></p><p data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">While the econometric test put forward in this paper will be run at the sectoral level, the literature devoted to the microeconometric investigation of the link between technological change and employment also deserves to be briefly discussed. Indeed, microeconometric studies have the great advantage to grasp the very nature of firms’ innovative activities and to allow an accurate and specific firm-level mapping of innovation variables (innovation dummies, R&amp;D, patents, etc.). However, there are limitations associated with this level of analysis, as well. Firstly, the microeconomic approach cannot take fully into account the indirect compensation effects which operate at the sectoral and country levels, therefore the reference to ‘compensation mechanisms’ is not straightforward. Secondly, a possible shortcoming of this kind of analysis consists in an ‘optimistic ex-ante bias’: in fact, innovative firms tend to be characterized by better employment performances simply because they gain market shares because of innovation. Even when the innovation is intrinsically labor-saving, microeconomic analyses generally show a positive link between technology and employment since they do not take into account the important effect on the competitors, which are crowded out by innovative firms themselves (a sort of substitution effect commonly named—in this literature—‘business stealing’ effect).</span></p><p data-dcnode-id="3494"><span data-dcnode-id="3498" instrument_node="">For instance, van Reenen (</span><a aria-label="Reference 1997" data-dcnode-id="3496" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d151356967e838" title="van Reenen, J. (1997). Employment and technological innovation: Evidence from U.K. manufacturing firms. Journal of Labour Economics, 15, 255–284."><span data-dcnode-id="3497" instrument_node="">1997</span></a><span data-dcnode-id="3495" instrument_node="">)—using the SPRU innovation database over the period 1976–1982—finds evidence of a positive employment impact of innovation. This result turns out to be robust after controlling for fixed effects, dynamics and endogeneity.</span></p><p data-dcnode-id="3489"><span data-dcnode-id="3493" instrument_node="">Interestingly enough, Greenan and Guellec (</span><a aria-label="Reference 2000" data-dcnode-id="3491" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d151356967e844" title="Greenan, N., &amp; Guellec, D. (2000). Technological innovation and employment reallocation. Labour, 14, 547–590."><span data-dcnode-id="3492" instrument_node="">2000</span></a><span data-dcnode-id="3490" instrument_node="">)—using data on French manufacturing firms over the 1986–1990 period—find that innovating firms create more jobs than non-innovating ones, but, conversely, the reverse turns out to be true at the sectoral level, where the overall effect is negative and only product innovation reveals its job-creating nature.</span></p><p data-dcnode-id="3478"><span data-dcnode-id="3488" instrument_node="">In the case of Italy, Piva and Vivarelli (</span><a aria-label="Reference 2004" data-dcnode-id="3486" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d151356967e850" title="Piva, M., &amp; Vivarelli, M. (2004). Technological change and employment: Some micro evidence from Italy. Applied Economics Letters, 11, 373–376."><span data-dcnode-id="3487" instrument_node="">2004</span></a><span data-dcnode-id="3485" instrument_node="">, </span><a aria-label="Reference 2005" data-dcnode-id="3483" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d151356967e853" title="Piva, M., &amp; Vivarelli, M. (2005). Innovation and employment: Evidence from Italian microdata. Journal of Economics, 86, 65–83."><span data-dcnode-id="3484" instrument_node="">2005</span></a><span data-dcnode-id="3482" instrument_node="">) find evidence in favor of a positive effect—although small in magnitude—of gross innovative investment on employment (on the Italian case, see also Hall et al. (</span><a aria-label="Reference 2008" data-dcnode-id="3480" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d151356967e856" title="Hall, B. H., Lotti, F., &amp; Mairesse, J. (2008). Employment, innovation, and productivity: Evidence from Italian microdata. Industrial and Corporate Change, 17, 813–839."><span data-dcnode-id="3481" instrument_node="">2008</span></a><span data-dcnode-id="3479" instrument_node="">) showing a positive employment contribution of product innovation and no evidence of employment displacement due to process innovation).</span></p><p data-dcnode-id="3473"><span data-dcnode-id="3477" instrument_node="">More recently, Lachenmaier and Rottmann (</span><a aria-label="Reference 2011" data-dcnode-id="3475" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d151356967e863" title="Lachenmaier, S., &amp; Rottmann, H. (2011). Effects of innovation on employment: A dynamic panel analysis. International Journal of Industrial Organization, 29, 210–220."><span data-dcnode-id="3476" instrument_node="">2011</span></a><span data-dcnode-id="3474" instrument_node="">)—using a comprehensive dataset of German manufacturing firms over the period 1982–2002—find a significantly positive impact of different innovation measures on employment, but, partially in contrast with expectations and previous contributions, the authors find a higher positive impact of process rather than product innovation.</span></p><p data-dcnode-id="3468"><span data-dcnode-id="3472" instrument_node="">Turning the attention to Spain, Ciriaci et al. (</span><a aria-label="Reference 2016" data-dcnode-id="3470" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d151356967e869" title="Ciriaci, D., Moncada-Paternò-Castello, P., &amp; Voigt, P. (2016). Innovation and job creation: A sustainable relation? Eurasian Business Review, 6, 189–213."><span data-dcnode-id="3471" instrument_node="">2016</span></a><span data-dcnode-id="3469" instrument_node="">)—using matched waves of Spanish CIS—run quantile regressions based on a sample of 3.304 Spanish firms over the period 2002–2009. Their results show that innovative, smaller and younger firms are more likely to experience high and persistent employment growth episodes than non-innovative firms.</span></p><p data-dcnode-id="3463"><span data-dcnode-id="3467" instrument_node="">Other recent studies were applied to several countries rather than to just one country. For instance, Bogliacino et al. (</span><a aria-label="Reference 2012" data-dcnode-id="3465" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d151356967e875" title="Bogliacino, F., Piva, M., &amp; Vivarelli, M. (2012). R&amp;D and employment: An application of the LSDVC estimator using European data. Economics Letters, 116, 56–59."><span data-dcnode-id="3466" instrument_node="">2012</span></a><span data-dcnode-id="3464" instrument_node="">), investigating European manufacturing and service firms over the period 1990–2008, find a positive and significant employment impact of R&amp;D ex
