penditures in high-tech manufacturing and services but not in the more traditional manufacturing sectors.</span></p><p data-dcnode-id="3458"><span data-dcnode-id="3462" instrument_node="">Finally, using firm level data from four European countries, Harrison et al. (</span><a aria-label="Reference 2014" data-dcnode-id="3460" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d151356967e881" title="Harrison, R., Jaumandreu, J., Mairesse, J., &amp; Peters, B. (2014). Does innovation stimulate employment? A firm-level analysis using comparable micro-data from four European countries. International Journal of Industrial Organization, 35, 29–43."><span data-dcnode-id="3461" instrument_node="">2014</span></a><span data-dcnode-id="3459" instrument_node="">) show that process innovation tend to displace employment, while product innovation is fundamentally labor-friendly.</span></p><p data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">On the whole, the microeconometric literature provides evidence of a positive link between innovation and employment, especially when R&amp;D and/or product innovation are adopted as proxies of technological change and when high-tech sectors are considered.</span></p><p data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">In the next section, we contribute to the empirical literature running an employment dynamic specification—at the sectoral-level—to empirically test the possible impact of innovation across different European countries in recent years.</span></p></div></div></section><section data-dcnode-id="3298" data-title="Data and econometric setting"><div class="c-article-section" data-dcnode-id="3299" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3449" id="Sec6"><span data-dcnode-id="3450" instrument_node="">Data and econometric setting</span></h2><div class="c-article-section__content" data-dcnode-id="3300" id="Sec6-content"><h3 class="c-article__sub-heading" data-dcnode-id="3447" id="Sec7"><span data-dcnode-id="3448" instrument_node="">The data</span></h3><p data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">We rely on a database including two-digit sectors belonging to manufacturing and services in 11 European countries (Austria, Belgium, Czech Republic, Denmark, Finland, Germany, Hungary, Italy, Norway, Slovenia, Sweden). The database covers the 1998–2011 period and total number of observations is of 3073. We use the statistical source OECD-STAN for most of the information, coupling it with OECD-ANBERD as far as business R&amp;D, our main proxy for innovation, is concerned.</span></p><p data-dcnode-id="3422"><span data-dcnode-id="3444" instrument_node="">In Table&nbsp;</span><a data-dcnode-id="3442" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3443" instrument_node="">1</span></a><span data-dcnode-id="3441" instrument_node=""> we report the sectors considered and the average R&amp;D intensity for the covered industries, measured as the ratio of R&amp;D expenditures over value added.</span><sup data-dcnode-id="3436"><a data-dcnode-id="3437" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">Footnote </span></span><span data-dcnode-id="3438" instrument_node="">6</span></a></sup><span data-dcnode-id="3435" instrument_node=""> Since the available classifications are not fully exhaustive,</span><sup data-dcnode-id="3430"><a data-dcnode-id="3431" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">Footnote </span></span><span data-dcnode-id="3432" instrument_node="">7</span></a></sup><span data-dcnode-id="3429" instrument_node=""> we decided to adopt an endogenous classification based on the revealed R&amp;D intensities, in order to have three homogeneous groups (the outcome is however almost fully consistent with EUROSTAT classification). In particular, sectors are classified as LT if R&amp;D intensity is less than 1%; MT if it is included between 1 and 5%; HT if R&amp;D intensity is larger than 5%. This splitting will allow us to investigate the R&amp;D/employment nexus across the three groups of sectors, in order to test if the outcome (common to the previous empirical studies) of a positive employment impact of innovation is detectable mainly (only) in the high-tech sectors.</span><sup data-dcnode-id="3424"><a data-dcnode-id="3425" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">Footnote </span></span><span data-dcnode-id="3426" instrument_node="">8</span></a></sup><span data-dcnode-id="3423" instrument_node="">
</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3407" data-test="inline-table" id="table-1"><figure data-dcnode-id="3408"><figcaption class="c-article-table__figcaption" data-dcnode-id="3419"><b data-dcnode-id="3420" data-test="table-caption" id="Tab1"><span data-dcnode-id="3421" instrument_node="">Table&nbsp;1 The sectoral splitting</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3409"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="3410" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40821-017-0100-x/tables/1" rel="nofollow"><span data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3411" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3412" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3413" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3416" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3415" fill-rule="evenodd"></path><span data-dcnode-id="3414" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3406" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3404" id="Sec8"><span data-dcnode-id="3405" instrument_node="">Econometric strategy</span></h3><p data-dcnode-id="3396"><span data-dcnode-id="3403" instrument_node="">Since our dependent variable (employment) is highly persistent,</span><sup data-dcnode-id="3398"><a data-dcnode-id="3399" href="#Fn9"><span class="u-visually-hidden" data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">Footnote </span></span><span data-dcnode-id="3400" instrument_node="">9</span></a></sup><span data-dcnode-id="3397" instrument_node=""> we adopt a dynamic employment equation where employment is autoregressive and depends on output (value added), wages, capital formation and R&amp;D expenditures, which is our direct measure for innovation. Therefore, the estimated equation is a dynamic labor demand, augmented with technology:</span></p><div class="c-article-equation" data-dcnode-id="3387" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="3390"><span class="mathjax-tex" data-dcnode-id="3391"><span class="MathJax_Preview" data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node=""> \begin{aligned} \ln (E_{ijt} ) &amp;= \rho {\kern 1pt} \;\ln (E_{ijt - 1} ) + \alpha_{0} + \alpha_{1} \;\ln (W_{ijt} ) + \alpha_{2} \;\ln (Y_{ijt} ) + \alpha_{3} \;\ln (I_{ijt} ) + \hfill \\ &amp;\quad \alpha_{4} \;\ln (R \&amp; D_{ijt} ) + \beta 'C + \gamma 'T + \varepsilon_{ij} + u_{ijt} \hfill \\ \end{aligned} </span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">
                    (1)
                </span></div></div><p data-dcnode-id="3349"><span data-dcnode-id="3386" instrument_node="">where </span><i data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">i</span></i><span data-dcnode-id="3383" instrument_node="">, </span><i data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">j</span></i><span data-dcnode-id="3380" instrument_node="">, </span><i data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">t</span></i><span data-dcnode-id="3377" instrument_node=""> indicate respectively industry, country and year, </span><i data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">E</span></i><span data-dcnode-id="3374" instrument_node=""> is employment, </span><i data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">W</span></i><span data-dcnode-id="3371" instrument_node=""> is labor compensation per employee, </span><i data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">Y</span></i><span data-dcnode-id="3368" instrument_node=""> is value added, </span><i data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">I</span></i><span data-dcnode-id="3365" instrument_node=""> is gross fixed capital formation, </span><i data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">R&amp;D</span></i><span data-dcnode-id="3362" instrument_node=""> is the proxy for technology, </span><i data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">C</span></i><span data-dcnode-id="3359" instrument_node=""> is a set of country dummies, </span><i data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">T</span></i><span data-dcnode-id="3356" instrument_node=""> is a set of time dummies, and the last two terms are the components of the error term.</span><sup data-dcnode-id="3351"><a data-dcnode-id="3352" href="#Fn10"><span class="u-visually-hidden" data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">Footnote </span></span><span data-dcnode-id="3353" instrument_node="">10</span></a></sup><span data-dcnode-id="3350" instrument_node="">
</span></p><p data-dcnode-id="3344"><span data-dcnode-id="3348" instrument_node="">It is well known by scholars of panel theory that the above dynamic specification cannot be correctly estimated either by pooled ordinary least squares (POLS) or by the Within Group (fixed effects, WG) estimator. Accordingly, we use generalized method of moments (GMM) in the Blundell and Bond (</span><a aria-label="Reference 1998" data-dcnode-id="3346" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d151356967e2275" title="Blundell, R., &amp; Bond, S. (1998). Initial conditions and moment restrictions in dynamic panel data models. Journal of Econometrics, 87, 115–143."><span data-dcnode-id="3347" instrument_node="">1998</span></a><span data-dcnode-id="3345" instrument_node="">) version (GMM-SYS), since our sample is characterized by high persistence and a dominant cross-sectional variability. Furthermore, we compute a robust and Windmeijer (finite sample) corrected covariance matrix.</span></p><p data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">While in a dynamic employment equation the lagged dependent variable and the wage term are obviously endogenous, high persistence suggests potential endogeneity for the other variables, as well. Therefore, to be on the safer side, we instrument all of them assuming they are endogenous.</span></p><p data-dcnode-id="3301"><span data-dcnode-id="3341" instrument_node="">We expect a positive and high coefficient for the lagged term, a negative </span><span class="mathjax-tex" data-dcnode-id="3336"><span class="MathJax_Preview" data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node=""> \alpha_{1} </span></span></span><span data-dcnode-id="3335" instrument_node=""> capturing the standard labor demand inverse relationship between wages and employment, and a positive </span><span class="mathjax-tex" data-dcnode-id="3330"><span class="MathJax_Preview" data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node=""> \alpha_{2} </span></span></span><span data-dcnode-id="3329" instrument_node=""> capturing the role played by the final demand. A priori, </span><span class="mathjax-tex" data-dcnode-id="3324"><span class="MathJax_Preview" data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node=""> \alpha_{3} </span></span></span><span data-dcnode-id="3323" instrument_node=""> has no obvious sign, since capital formation is labor-expanding through its expansionary effect, and labor-saving through process innovation embodied in the new machineries (see Sect.&nbsp;</span><a data-dcnode-id="3321" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="3322" instrument_node="">2</span></a><span data-dcnode-id="3320" instrument_node="">). Finally, our main interest is in </span><span class="mathjax-tex" data-dcnode-id="3315"><span class="MathJax_Preview" data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node=""> \alpha_{4} </span></span></span><span data-dcnode-id="3314" instrument_node="">, linking R&amp;D with employment: consistently with the previous literature (see Sect.&nbsp;</span><a data-dcnode-id="3312" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec5"><span data-dcnode-id="3313" instrument_node="">3</span></a><span data-dcnode-id="3311" instrument_node="">) and taking into account that R&amp;D is more related with product rather than process innovation, we expect a positive sign for </span><span class="mathjax-tex" data-dcnode-id="3306"><span class="MathJax_Preview" data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node=""> \alpha_{4} </span></span></span><span data-dcnode-id="3305" instrument_node=""> (see Sect.&nbsp;</span><a data-dcnode-id="3303" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="3304" instrument_node="">2</span></a><span data-dcnode-id="3302" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="3123" data-title="Results"><div class="c-article-section" data-dcnode-id="3124" id="Sec9-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3296" id="Sec9"><span data-dcnode-id="3297" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="3125" id="Sec9-content"><p data-dcnode-id="3291"><span data-dcnode-id="3295" instrument_node="">As can be seen from Table&nbsp;</span><a data-dcnode-id="3293" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="3294" instrument_node="">2</span></a><span data-dcnode-id="3292" instrument_node=""> and focusing on the more reliable GMM-SYS estimates, the results exhibit very interesting patterns. Pooled ordinary least squares (POLS) and fixed effect estimators (WG) are provided for completeness and for showing that the estimated GMM coefficient for the lagged dependent variable is correctly situated within the upper and lower bounds set by the POLS and WG estimates respectively.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3276" data-test="inline-table" id="table-2"><figure data-dcnode-id="3277"><figcaption class="c-article-table__figcaption" data-dcnode-id="3288"><b data-dcnode-id="3289" data-test="table-caption" id="Tab2"><span data-dcnode-id="3290" instrument_node="">Table&nbsp;2 Dependent variable: number of employees in log scale</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3278"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="3279" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40821-017-0100-x/tables/2" rel="nofollow"><span data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3280" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3281" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3282" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3285" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3284" fill-rule="evenodd"></path><span data-dcnode-id="3283" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3275" instrument_node="">
</span><p data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">Not surprisingly, the employment variable turns out to be highly auto-correlated and value added is positively linked with employment, while wages tend to inhibit the demand for labor (although this relationship is significant only in the preliminary POLS and WG estimates).</span></p><p data-dcnode-id="3268"><span data-dcnode-id="3272" instrument_node="">Together with these expected results, capital formation is negatively (and significantly at 95%) related to employment; this result points to a possible labor-saving effect due to the embodied technological change incorporated in the new investment (see Sect.&nbsp;</span><a data-dcnode-id="3270" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="3271" instrument_node="">2</span></a><span data-dcnode-id="3269" instrument_node="">). It may well be the case that in most recent years (also including the worldwide financial crisis and its consequences) the rationalizing component of investment—fostering process innovation—has turned out to dominate its expansionary component.</span></p><p data-dcnode-id="3263"><span data-dcnode-id="3267" instrument_node="">Turning our attention to our main variable of interest (R&amp;D), the outcome based on the overall estimate is consistent with the previous empirical literature (see Sect.&nbsp;</span><a data-dcnode-id="3265" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec5"><span data-dcnode-id="3266" instrument_node="">3</span></a><span data-dcnode-id="3264" instrument_node="">): the elasticity between R&amp;D expenditures and employment turns out to be positive and significant (at the 95% level of confidence), albeit very small in magnitude: 0.005.</span></p><p data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">Therefore, considering all the economic sectors, R&amp;D expenditures (linked to product innovation) show a labor-friendly nature, although their impact is almost negligible: doubling the R&amp;D investment would induce an increase in employment by about 0.5%. In contrast, capital formation (linked to labor-saving process innovation) seem to play a more relevant role: ceteris paribus, an increase of 100% in investment activity in European sectors would imply a decrease of 1% in employment levels.</span></p><p data-dcnode-id="3253"><span data-dcnode-id="3260" instrument_node="">As a first extension, we have run alternative specifications in which we have replaced capital and R&amp;D flows with their stocks (respectively K and Z); in fact, it may well be the case that current employment is affected not just by the current flows of R&amp;D expenditures and investments, but rather by the cumulated stocks of knowledge and physical capital. The K and Z stocks have been built using the perpetual inventory method (PIM)</span><sup data-dcnode-id="3255"><a data-dcnode-id="3256" href="#Fn11"><span class="u-visually-hidden" data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">Footnote </span></span><span data-dcnode-id="3257" instrument_node="">11</span></a></sup><span data-dcnode-id="3254" instrument_node="">:</span></p><div class="c-article-equation" data-dcnode-id="3244" id="Equ2"><div class="c-article-equation__content" data-dcnode-id="3247"><span class="mathjax-tex" data-dcnode-id="3248"><span class="MathJax_Preview" data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node=""> K_{ijt} = \left\{ {\begin{array}{ll} {(1 - \delta_{i} )K_{ijt - 1} + I_{ijt} \quad if\,t &gt; 0} \\ {\frac{{I_{ijt} }}{{g_{ij} + \delta_{i} }}\quad if\,t = 0} \\ \end{array} } \right. </span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">
                    (2)
                </span></div></div><span data-dcnode-id="3243" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="3234" id="Equ3"><div class="c-article-equation__content" data-dcnode-id="3237"><span class="mathjax-tex" data-dcnode-id="3238"><span class="MathJax_Preview" data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node=""> Z_{ijt} = \left\{ {\begin{array}{ll} {(1 - \lambda_{i} )Z_{ijt - 1} + R\&amp; D_{ijt} \quad if\,t &gt; 0} \\ {\frac{{R\&amp; D_{ijt} }}{{g_{ij} + \lambda_{i} }}\quad if\,t = 0} \\ \end{array} } \right. </span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">
                    (3)
                </span></div></div><p data-dcnode-id="3211"><span data-dcnode-id="3233" instrument_node="">where </span><i data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">g</span></i><span data-dcnode-id="3230" instrument_node=""> is the 1998–2003 compound growth rate at the industry level, </span><span class="mathjax-tex" data-dcnode-id="3225"><span class="MathJax_Preview" data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node=""> \delta </span></span></span><span data-dcnode-id="3224" instrument_node=""> is equal to 6% and </span><span class="mathjax-tex" data-dcnode-id="3219"><span class="MathJax_Preview" data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node=""> \lambda </span></span></span><span data-dcnode-id="3218" instrument_node=""> is equal to 15%; </span><i data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">I</span></i><span data-dcnode-id="3215" instrument_node=""> and </span><i data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">R&amp;D</span></i><span data-dcnode-id="3212" instrument_node=""> are the flows of capital and R&amp;D, while K and Z are the corresponding stock measures.</span></p><p data-dcnode-id="3206"><span data-dcnode-id="3210" instrument_node="">As can be seen in Table&nbsp;</span><a data-dcnode-id="3208" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="3209" instrument_node="">3</span></a><span data-dcnode-id="3207" instrument_node="">, reporting alternative GMM-SYS estimates, the demand-for-labor coefficients confirm the auto-correlated nature of the employment variable, the positive and highly significant impact of output and the negative effect of wages (although they turn out to be barely significant in these estimates).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3191" data-test="inline-table" id="table-3"><figure data-dcnode-id="3192"><figcaption class="c-article-table__figcaption" data-dcnode-id="3203"><b data-dcnode-id="3204" data-test="table-caption" id="Tab3"><span data-dcnode-id="3205" instrument_node="">Table&nbsp;3 Dependent variable: number of employees in log scale (flows and stocks)</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3193"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="3194" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40821-017-0100-x/tables/3" rel="nofollow"><span data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3195" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3196" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3197" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3200" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3199" fill-rule="evenodd"></path><span data-dcnode-id="3198" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3190" instrument_node="">
</span><p data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">The negative impact of capital formation is not only confirmed (third column), but also reinforced by using the stock variable K (columns 1 and 2); indeed, at least in the examined period, the complementarity between capital and labor has been dominated by a labor-saving impact, possibly due to process innovation incorporated in capital formation.</span></p><p data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">Moving to the R&amp;D flow and stock (Z), its labor-friendly nature is fully confirmed and even reinforced: when Z is considered, the estimated elasticity increases to 0.8/0.9% and its significance rises to 99%.</span></p><p data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">On the whole, the stock estimates are consistent with the flow ones and point to a labor-friendly nature of R&amp;D and a labor-saving impact of embodied technological change, more or less compensating each-other.</span></p><p data-dcnode-id="3173"><span data-dcnode-id="3183" instrument_node="">A further extension consists in using the sectoral splitting presented in Table&nbsp;</span><a data-dcnode-id="3181" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3182" instrument_node="">1</span></a><span data-dcnode-id="3180" instrument_node="">, in order to investigate possible sectoral peculiarities in the relationship between innovation and employment, as detected by the previous literature (see Sect.&nbsp;</span><a data-dcnode-id="3178" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec5"><span data-dcnode-id="3179" instrument_node="">3</span></a><span data-dcnode-id="3177" instrument_node="">). Indeed, the computed R&amp;D intensity is significantly different across sectors (see Table&nbsp;</span><a data-dcnode-id="3175" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3176" instrument_node="">1</span></a><span data-dcnode-id="3174" instrument_node="">) and the balance between product innovation (potentially labor friendly) vs process innovation (potentially labor-saving) is also not uniform across industries.</span></p><p data-dcnode-id="3159"><span data-dcnode-id="3172" instrument_node="">Since this differentiation significantly reduces the number of available observations for each sectoral group and multiply the number of necessary moment conditions, we have opted for using the least squares dummy variable corrected estimator (LSDVC). Indeed, Bruno (</span><a aria-label="Reference 2005a" data-dcnode-id="3170" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d151356967e3819" title="Bruno, G. S. C. (2005a). Estimation and inference in dynamic unbalanced panel data models with a small number of individuals. Stata Journal, 5, 473–500."><span data-dcnode-id="3171" instrument_node="">2005a</span></a><span data-dcnode-id="3169" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="3167" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d151356967e3822" title="Bruno, G. S. C. (2005b). Approximating the bias of the LSDVC estimator for dynamic unbalanced panel data models. Economic Letters, 87, 361–366."><span data-dcnode-id="3168" instrument_node="">b</span></a><span data-dcnode-id="3166" instrument_node="">) shows that—when the number of individuals is low related to the number of effects to identify and the panel is unbalanced—the LSDVC estimator performs better than the GMM ones.</span><sup data-dcnode-id="3161"><a data-dcnode-id="3162" href="#Fn12"><span class="u-visually-hidden" data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">Footnote </span></span><span data-dcnode-id="3163" instrument_node="">12</span></a></sup><span data-dcnode-id="3160" instrument_node="">
</span></p><p data-dcnode-id="3154"><span data-dcnode-id="3158" instrument_node="">Table&nbsp;</span><a data-dcnode-id="3156" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="3157" instrument_node="">4</span></a><span data-dcnode-id="3155" instrument_node=""> reports the separate LSDVC regressions for the LT, MT and HT sectors.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3139" data-test="inline-table" id="table-4"><figure data-dcnode-id="3140"><figcaption class="c-article-table__figcaption" data-dcnode-id="3151"><b data-dcnode-id="3152" data-test="table-caption" id="Tab4"><span data-dcnode-id="3153" instrument_node="">Table&nbsp;4 Dependent variable: number of employees in log scale</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3141"><a aria-label="Full size table 4" class="c-article__pill-button" data-dcnode-id="3142" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40821-017-0100-x/tables/4" rel="nofollow"><span data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3143" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3144" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3145" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3148" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3147" fill-rule="evenodd"></path><span data-dcnode-id="3146" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3138" instrument_node="">
</span><p data-dcnode-id="3130"><span data-dcnode-id="3137" instrument_node="">Previous results in terms of path-dependency of the dependent variable, significant positive impact of value added and negative impact of the cost of labor, are fully confirmed.</span><sup data-dcnode-id="3132"><a data-dcnode-id="3133" href="#Fn13"><span class="u-visually-hidden" data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">Footnote </span></span><span data-dcnode-id="3134" instrument_node="">13</span></a></sup><span data-dcnode-id="3131" instrument_node="">
</span></p><p data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">The sectoral splitting also allows throwing some light on the revealed overall negative relationship between investments and employment: this seems to be entirely due to the traditional low-tech sectors, while the link is not significant in the HT sectors and even positive in the MT ones. Therefore, a possible labor-saving effect due to the embodied technological change incorporated in capital formation appears to be specific to the low-tech sectors where competition is reached through decreasing costs (lower wages and process innovation).</span></p><p data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">This picture is consistent with what was found with regard to our main variable of interest: indeed, R&amp;D expenditures are job-creating in both the medium-tech and the high-tech sectors (with a 95% level of confidence and an elasticity raising to 1.8% in the MT and 2.6% in the HT), but not in the traditional sectors where they turn out to be not significant.</span></p></div></div></section><section data-dcnode-id="3097" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="3098" id="Sec10-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3121" id="Sec10"><span data-dcnode-id="3122" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="3099" id="Sec10-content"><p data-dcnode-id="3116"><span data-dcnode-id="3120" instrument_node="">The relationship between innovation and employment is far from being a simple one: as detailed in Sect.&nbsp;</span><a data-dcnode-id="3118" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="3119" instrument_node="">2</span></a><span data-dcnode-id="3117" instrument_node="">, technological change generates a direct impact and many indirect effects. On the one hand, process innovation implies a labor-saving effect, while product innovation is generally labor friendly. On the other hand, together with their labor-saving impact, process innovations involve decreasing prices and increasing incomes and these, in turn, boost an increase in demand and production that can compensate the initial job losses.</span></p><p data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">However, these compensation mechanisms can be hindered by the existence of severe drawbacks and their efficacy is dependent on crucial parameters and on the different institutional and socio-economic contexts.</span></p><p data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">Therefore, in different historical periods and various institutional frameworks, the relative balance between the direct labor-saving effect of process innovation and the counterbalancing impacts of compensation forces and product innovation can be substantially different. Of course, the scenario appears even more complicated—and less optimistic—when these direct and indirect impacts occur within a period of structural crisis as the current one.</span></p><p data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">Fully consistent with what was obtained by the previous literature, this study also found a significant labor-friendly impact of R&amp;D expenditures, which are particularly related to product innovation; however, this positive employment effect appears to be entirely due to the medium-and high-tech sectors, while no effect could be detected in the low-tech industries.</span></p><p data-dcnode-id="3102"><span data-dcnode-id="3109" instrument_node="">From a policy point of view, this outcome, which is consistent with previous studies (see Sect.&nbsp;</span><a data-dcnode-id="3107" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec5"><span data-dcnode-id="3108" instrument_node="">3</span></a><span data-dcnode-id="3106" instrument_node="">), proves that the aim of the EU2020 strategy (see European Commission </span><a aria-label="Reference 2010" data-dcnode-id="3104" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d151356967e4147" title="European Commission. (2010). Communication from the Commission to the European Parliament, the Council, the European Economic and Social Committee and the Committee of the Regions. Europe 2020 Flagship Initiative Innovation Union, COM(2010) 546 final. European Commission, Brussels."><span data-dcnode-id="3105" instrument_node="">2010</span></a><span data-dcnode-id="3103" instrument_node="">)—that is to develop a European economy based on R&amp;D, knowledge and innovation—points in the right direction also in terms of job creation. However, this job creation has to be expected solely in the high-tech sectors, while most of European economies are specialized in traditional industries and this is somehow worrying in terms of future perspectives of the European labor market.</span></p><p data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">Moreover, and partially in contrast with the previous empirical evidence, capital formation (both in terms of flow and stock) was found to be negatively related to employment. This outcome points to a possible labor-saving effect due to embodied technological change incorporated in gross investment. It seems that in the recent years the rationalizing component of investment has turned out to dominate its expansionary component. Moreover, a possible labor-saving effect due to process innovation incorporated in capital formation seems to be specific to the low-tech sectors where competition is reached through decreasing costs. If these results will be confirmed by future research, this is surely matter for thought for the European policy makers.</span></p></div></div></section><span data-dcnode-id="3096" instrument_node="">
</span><section data-dcnode-id="2966" data-title="Notes"><div class="c-article-section" data-dcnode-id="2967" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3094" id="notes"><span data-dcnode-id="3095" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="2968" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="2969"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="3087" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="3088"><p data-dcnode-id="3089"><span data-dcnode-id="3093" instrument_node="">Atkinson (</span><a aria-label="Reference 2015" data-dcnode-id="3091" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d151356967e376" title="Atkinson, A. B. (2015). Inequality: What can be done?. Cambridge (Mass.): Harvard University Press."><span data-dcnode-id="3092" instrument_node="">2015</span></a><span data-dcnode-id="3090" instrument_node="">) discusses the changing nature of ‘jobs’ in contemporary economies.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="3080" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="3081"><p data-dcnode-id="3082"><span data-dcnode-id="3086" instrument_node="">Basically this literature refers to process innovations that are general-purpose technologies. For a treatment and an analysis of non-general purpose technologies, see, for instance, Grimalda (</span><a aria-label="Reference 2016" data-dcnode-id="3084" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d151356967e479" title="Grimalda, G. (2016). Can labour market rigidity foster economic efficiency? A model with non-general purpose technical change. Eurasian Business Review, 6, 79–99."><span data-dcnode-id="3085" instrument_node="">2016</span></a><span data-dcnode-id="3083" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="3073" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="3074"><p data-dcnode-id="3075"><span data-dcnode-id="3079" instrument_node="">Indeed, also business cycles might have an impact on the innovation-employment nexus as they are ‘generated’ by innovation à la Schumpeter, but they may also affect propensity to invest à la Keynes (see Guarascio et al. </span><a aria-label="Reference 2015" data-dcnode-id="3077" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d151356967e586" title="Guarascio, D., Pianta, M., Lucchese, M., &amp; Bogliacino, F. (2015). Business cycles, technology and exports. Economia Politica, 32, 167–200."><span data-dcnode-id="3078" instrument_node="">2015</span></a><span data-dcnode-id="3076" instrument_node="">, for an analysis).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="3063" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="3064"><p data-dcnode-id="3065"><span data-dcnode-id="3072" instrument_node="">For instance, nowadays, the role of green innovation is crucial, also in terms of likely employment impact: see Crespi et al. (</span><a aria-label="Reference 2015" data-dcnode-id="3070" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d151356967e659" title="Crespi, F., Ghisetti, C., &amp; Quatraro, F. (2015). Environmental and innovation policies for the evolution of green technologies: A survey and a test. Eurasian Business Review, 5, 343–370."><span data-dcnode-id="3071" instrument_node="">2015</span></a><span data-dcnode-id="3069" instrument_node="">) and Gagliardi et al. (</span><a aria-label="Reference 2016" data-dcnode-id="3067" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d151356967e662" title="Gagliardi, L., Marin, G., &amp; Miriello, C. (2016). The greener the better? Job creation effects of environmentally-friendly technological change. Industrial and Corporate Change, 25, 779–807."><span data-dcnode-id="3068" instrument_node="">2016</span></a><span data-dcnode-id="3066" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="5." data-dcnode-id="3047" id="Fn5"><div class="c-article-footnote--listed__content" data-dcnode-id="3048"><p data-dcnode-id="3049"><span data-dcnode-id="3062" instrument_node="">The empirical studies devoted to the relationship between innovation and employment have mainly focused on high-income countries (see Sect.&nbsp;</span><a data-dcnode-id="3060" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec5"><span data-dcnode-id="3061" instrument_node="">3</span></a><span data-dcnode-id="3059" instrument_node="">), especially OECD countries (basically because of data availability), meanwhile only recently the phenomenon has been investigated in developing countries (see Meschi et al. </span><a aria-label="Reference 2011" data-dcnode-id="3057" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d151356967e704" title="Meschi, E., Taymaz, E., &amp; Vivarelli, M. (2011). Trade, technology and skills: Evidence from Turkish microdata. Labour Economics, 18, S60–S70."><span data-dcnode-id="3058" instrument_node="">2011</span></a><span data-dcnode-id="3056" instrument_node="">, for an application to the Turkish case; Mitra and Jha </span><a aria-label="Reference 2015" data-dcnode-id="3054" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d151356967e707" title="Mitra, A., &amp; Jha, A. (2015). Innovation and employment: A firm level study of Indian industries. Eurasian Business Review, 5, 45–71."><span data-dcnode-id="3055" instrument_node="">2015</span></a><span data-dcnode-id="3053" instrument_node="">, for an application to the Indian case and Mendoza Cota </span><a aria-label="Reference 2016" data-dcnode-id="3051" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d151356967e710" title="Mendoza Cota, J. E. (2016). US manufacturing imports from China and employment in the Mexican manufacturing sector. Cuadernos de Economia, 35, 583–613."><span data-dcnode-id="3052" instrument_node="">2016</span></a><span data-dcnode-id="3050" instrument_node="">, for an application in Mexico where new technological paradigms allow organizational change and offshoring).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="6." data-dcnode-id="3040" id="Fn6"><div class="c-article-footnote--listed__content" data-dcnode-id="3041"><p data-dcnode-id="3042"><span data-dcnode-id="3046" instrument_node="">Value added has been deflated using the sectoral deflators provided by STAN, which take (quality adjusted) hedonic prices into account. All other nominal variables have been deflated using GDP deflators. We have considered 2010 as the base year. We have corrected all the series for purchasing power parities, expressing, at the end, all the monetary values in constant prices and PPP 2010 US dollars (in order to be consistent within our statistical sources, we used information provided by OECD: </span><a data-dcnode-id="3044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//stats.oecd.org/"><span data-dcnode-id="3045" instrument_node="">http://stats.oecd.org/</span></a><span data-dcnode-id="3043" instrument_node=""> where deflators, exchange rates and PPP series are available).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="7." data-dcnode-id="3030" id="Fn7"><div class="c-article-footnote--listed__content" data-dcnode-id="3031"><p data-dcnode-id="3032"><span data-dcnode-id="3039" instrument_node="">See: </span><a data-dcnode-id="3037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ec.europa.eu/eurostat/statistics-explained/index.php/Glossary%3AHightech_classification_of_manufacturing_industries"><span data-dcnode-id="3038" instrument_node="">http://ec.europa.eu/eurostat/statistics-explained/index.php/Glossary:Hightech_classification_of_manufacturing_industries</span></a><span data-dcnode-id="3036" instrument_node="">; </span><a data-dcnode-id="3034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ec.europa.eu/eurostat/cache/metadata/Annexes/htec_esms_an3.pdf"><span data-dcnode-id="3035" instrument_node="">http://ec.europa.eu/eurostat/cache/metadata/Annexes/htec_esms_an3.pdf</span></a><span data-dcnode-id="3033" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="8." data-dcnode-id="3023" id="Fn8"><div class="c-article-footnote--listed__content" data-dcnode-id="3024"><p data-dcnode-id="3025"><span data-dcnode-id="3029" instrument_node="">An important source of heterogeneity at the sectoral level may be due to the overall difference in innovation strategy (see Bogliacino and Pianta </span><a aria-label="Reference 2016" data-dcnode-id="3027" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d151356967e945" title="Bogliacino, F., &amp; Pianta, M. (2016). The Pavitt taxonomy, revisited: Patterns of innovation in manufacturing and services. Economia Politica, 33, 153–180."><span data-dcnode-id="3028" instrument_node="">2016</span></a><span data-dcnode-id="3026" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="9." data-dcnode-id="3013" id="Fn9"><div class="c-article-footnote--listed__content" data-dcnode-id="3014"><p data-dcnode-id="3015"><span data-dcnode-id="3022" instrument_node="">Indeed, the estimation of an employment equation is the standard example for which a panel dynamic specification turns out to be the proper econometric strategy (see Arellano and Bond </span><a aria-label="Reference 1991" data-dcnode-id="3020" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d151356967e1907" title="Arellano, M., &amp; Bond, S. (1991). Some tests of specification for panel data: Monte Carlo evidence and an application to employment equations. The Review of Economic Studies, 58, 277–297."><span data-dcnode-id="3021" instrument_node="">1991</span></a><span data-dcnode-id="3019" instrument_node="">; van Reenen </span><a aria-label="Reference 1997" data-dcnode-id="3017" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d151356967e1910" title="van Reenen, J. (1997). Employment and technological innovation: Evidence from U.K. manufacturing firms. Journal of Labour Economics, 15, 255–284."><span data-dcnode-id="3018" instrument_node="">1997</span></a><span data-dcnode-id="3016" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="10." data-dcnode-id="3009" id="Fn10"><div class="c-article-footnote--listed__content" data-dcnode-id="3010"><p data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">The set of country dummies control for the possible impact of different national macroeconomic situations and specific economic policies, while the set of time dummies capture both the economic business cycle and possible supply side effects in the European labor market. However, this specification, while recalling the main economic variables affecting the employment dynamics, does not allow singling out the effects of all the compensation mechanisms.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="11." data-dcnode-id="2987" id="Fn11"><div class="c-article-footnote--listed__content" data-dcnode-id="2988"><p data-dcnode-id="2989"><span data-dcnode-id="3008" instrument_node="">To initialize the PIM it is necessary to input historical capital and R&amp;D growth rates. To avoid losing observations, we have calculated the average compound growth rates over the period 1998–2003 and used them as the growth rates for computing the initial 1998 stocks. Whenever the growth rates were negative we have used zero. As far as depreciation rates are concerned, we have used the reference rates in the literature: 15% for R&amp;D and 6% for physical capital (see Musgrave </span><a aria-label="Reference 1986" data-dcnode-id="3006" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d151356967e2855" title="Musgrave, J. C. (1986). Fixed reproducible tangible wealth series in the United States, 1925–91. Survey of Current Business, 66, 51–75."><span data-dcnode-id="3007" instrument_node="">1986</span></a><span data-dcnode-id="3005" instrument_node="">; Bischoff and Kokkelenberg </span><a aria-label="Reference 1987" data-dcnode-id="3003" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d151356967e2858" title="Bischoff, C. W., &amp; Kokkelenberg, E. C. (1987). Capacity utilization and depreciation-in use. Applied Economics, 19, 995–1007."><span data-dcnode-id="3004" instrument_node="">1987</span></a><span data-dcnode-id="3002" instrument_node="">; Nadiri and Prucha </span><a aria-label="Reference 1996" data-dcnode-id="3000" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d151356967e2861" title="Nadiri, M. I., &amp; Prucha, I. R. (1996). Estimation of the depreciation rate of physical and R&amp;D Capital in the US total manufacturing sector. Economic Inquiry, 34, 43–56."><span data-dcnode-id="3001" instrument_node="">1996</span></a><span data-dcnode-id="2999" instrument_node=""> for physical capital; Pakes and Schankerman </span><a aria-label="Reference 1986" data-dcnode-id="2997" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d151356967e2864" title="Pakes, A., &amp; Schankerman, M. (1986). Estimates of the value of patent rights in European countries during the post-1950 period. Economic Journal, 96, 1052–1076."><span data-dcnode-id="2998" instrument_node="">1986</span></a><span data-dcnode-id="2996" instrument_node="">; Hall </span><a aria-label="Reference 2007" data-dcnode-id="2994" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d151356967e2867" title="Hall, B. H. (2007). Measuring the returns to R&amp;D: The depreciation problem. NBER Working Papers 13473, Cambridge (Mass.)."><span data-dcnode-id="2995" instrument_node="">2007</span></a><span data-dcnode-id="2993" instrument_node="">; Aiello and Cardamone </span><a aria-label="Reference 2008" data-dcnode-id="2991" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d151356967e2871" title="Aiello, F., &amp; Cardamone, P. (2008). R&amp;D spillovers and firms’ performance in Italy. Empirical Economics, 34, 143–166."><span data-dcnode-id="2992" instrument_node="">2008</span></a><span data-dcnode-id="2990" instrument_node=""> for knowledge capital). For obvious reasons, the literature assumes the obsolescence of knowledge capital to be faster than that of physical capital.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="12." data-dcnode-id="2974" id="Fn12"><div class="c-article-footnote--listed__content" data-dcnode-id="2975"><p data-dcnode-id="2976"><span data-dcnode-id="2986" instrument_node="">This methodology is based on the within group estimator, but corrected for its asymptotic bias (see Kiviet </span><a aria-label="Reference 1995" data-dcnode-id="2984" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d151356967e3829" title="Kiviet, J. F. (1995). On bias, inconsistency and efficiency of various estimators in dynamic panel data models. Journal of Econometrics, 68, 53–78."><span data-dcnode-id="2985" instrument_node="">1995</span></a><span data-dcnode-id="2983" instrument_node="">, </span><a aria-label="Reference 1999" data-dcnode-id="2981" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d151356967e3832" title="Kiviet, J. F. (1999). Expectation of expansions for estimators in a dynamic panel data model. Some results for weakly exogenous regressors. In C. Hsiao, K. Lahiri, L. F. Lee &amp; M. H. Pesaran (Eds.) Analysis of panel data and limited dependent variables (pp. 199–225). Cambridge: Cambridge University Press."><span data-dcnode-id="2982" instrument_node="">1999</span></a><span data-dcnode-id="2980" instrument_node="">; Bun and Kiviet </span><a aria-label="Reference 2003" data-dcnode-id="2978" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d151356967e3835" title="Bun, M. J. G., &amp; Kiviet, J. F. (2003). On the diminishing returns of higher order terms in asymptotic expansions of bias. Economics Letters, 79, 145–152."><span data-dcnode-id="2979" instrument_node="">2003</span></a><span data-dcnode-id="2977" instrument_node="">). The procedure must be initialized by a dynamic panel data estimate and we have opted for the less demanding GMM-DIF. Robust standard errors have been obtained through bootstrapping, with 50 iterations.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="13." data-dcnode-id="2970" id="Fn13"><div class="c-article-footnote--listed__content" data-dcnode-id="2971"><p data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">Interestingly enough, the negative role of wages in affecting employment seems to be limited to the low-tech sectors, where competition is mainly based on cost-saving rather than on innovation.</span></p></div></li></ol></div></div></section><div data-dcnode-id="1753" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="1754" data-title="References"><div class="c-article-section" data-dcnode-id="1755" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2964" id="Bib1"><span data-dcnode-id="2965" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="1756" id="Bib1-content"><div data-container-section="references" data-dcnode-id="1757"><ul class="c-article-references" data-dcnode-id="1767"><li class="c-article-references__item js-c-reading-companion-references-item" data-dcnode-id="2948"><p class="c-article-references__text" data-dcnode-id="2956" id="ref-CR1"><span data-dcnode-id="2963" instrument_node="">Aiello, F., &amp; Cardamone, P. (2008). R&amp;D spillovers and firms’ performance in Italy. </span><i data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Empirical Economics,</span></i><span data-dcnode-id="2960" inst
