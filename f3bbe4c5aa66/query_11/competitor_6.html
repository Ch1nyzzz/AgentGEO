y. Modern workflows are full of tedious and repetitive tasks that take time but not necessarily brain power. Automating those workflows can help employees focus on what’s most important. The COVID-19 pandemic pushed even more companies toward workflow automation, transforming </span><a data-dcnode-id="412" href="#2"><span data-dcnode-id="413" instrument_node="">both their workforce and bottom line</span></a><span data-dcnode-id="411" instrument_node="">. </span></p><p data-dcnode-id="405"><span data-dcnode-id="409" instrument_node="">Check out these </span><strong data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">40+ workflow automation statistics &amp; trends</span></strong><span data-dcnode-id="406" instrument_node=""> to see why automation is the future of work.</span></p><p data-dcnode-id="399"><em data-dcnode-id="400"><span data-dcnode-id="404" instrument_node="">Statistics &amp; trends are sourced from the most up-to-date reports available. See the complete list of sources </span><a data-dcnode-id="402" href="#sources"><span data-dcnode-id="403" instrument_node="">here</span></a><span data-dcnode-id="401" instrument_node="">.</span></em></p><h2 data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Jump to statistics:</span></h2><ul data-dcnode-id="384"><li data-dcnode-id="394"><a data-dcnode-id="395" href="#1"><span data-dcnode-id="396" instrument_node="">Rise of workflow automation</span></a></li><li data-dcnode-id="391"><a data-dcnode-id="392" href="#2"><span data-dcnode-id="393" instrument_node="">Benefits &amp; impact of automation</span></a></li><li data-dcnode-id="388"><a data-dcnode-id="389" href="#3"><span data-dcnode-id="390" instrument_node="">Workflow automation by industry</span></a></li><li data-dcnode-id="385"><a data-dcnode-id="386" href="#4"><span data-dcnode-id="387" instrument_node="">Risks &amp; barriers for workflow automation</span></a></li></ul><hr data-dcnode-id="383"><h2 data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Quick recap: What is workflow automation?</span></h2><p data-dcnode-id="373"><span data-dcnode-id="380" instrument_node="">What exactly is workflow automation, and how is it different from other productivity trends? According to Gartner’s </span><a data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gartner.com/en/information-technology/glossary/workflow-management"><span data-dcnode-id="379" instrument_node="">definition</span></a><span data-dcnode-id="377" instrument_node="">, workflow automation (also called workflow management) is when you </span><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">link together app functions to automate a process</span></strong><span data-dcnode-id="374" instrument_node="">. This can happen in the same app or digital tool… </span></p><p data-dcnode-id="370"><em data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">For example, using Hubspot to send Email 1 vs. Email 2 based on which criteria a subscriber meets</span></em></p><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">…Or across different apps or digital tools.</span></p><p data-dcnode-id="365"><em data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">For example, using Zapier to promote a new blog post on your social media channels and then mark the task as complete</span></em></p><img alt="Illustrated diagram of example workflow in Zapier" class="centerImg" data-dcnode-id="364" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firebasestorage.googleapis.com/v0/b/workona-prod.appspot.com/o/cms/workflow-automation-example-flow.png%3Falt%3Dmedia%26token%3D49f611fe-a69d-49e8-ba11-245548692558&amp;raw" width="576"><div class="callout1" data-dcnode-id="354"><div class="titleContainer" data-dcnode-id="361"><span class="title" data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Related: How to boost your multitasking skills</span></span></div><div data-dcnode-id="355"><span data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">See examples of </span></span><a data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//workona.com/blog/multitasking-skills-examples/%23task-automation"><span data-dcnode-id="358" instrument_node="">task automation in popular apps →</span></a><span data-dcnode-id="356"></span></div></div><h3 data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Workflow automation vs. other types of automation</span></h3><p data-dcnode-id="347"><span data-dcnode-id="351" instrument_node="">Workflow automation is similar to process automation, task automation, business process automation, marketing automation, etc. But while terms like “business process management” recall expensive system integration projects from the 90s, the term “workflow automation” is used by modern, low-code tools that allow </span><em data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">anyone</span></em><span data-dcnode-id="348" instrument_node=""> to streamline their digital tasks. Examples of workflow automation tools include:</span></p><ul data-dcnode-id="334"><li data-dcnode-id="343"><a data-dcnode-id="345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//zapier.com/"><span data-dcnode-id="346" instrument_node="">Zapier</span></a><span data-dcnode-id="344" instrument_node=""> - by far the most popular workflow automation app</span></li><li data-dcnode-id="339"><a data-dcnode-id="341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//workona.com/pages/workflow-automation-statistics-trends/Integromat"><span data-dcnode-id="342" instrument_node="">Integromat</span></a><span data-dcnode-id="340" instrument_node=""> - similar functionality to Zapier</span></li><li data-dcnode-id="335"><a data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airtable.com/"><span data-dcnode-id="338" instrument_node="">Airtable</span></a><span data-dcnode-id="336" instrument_node=""> - a visual spreadsheet-meets-database tool with lots of automation options</span></li></ul><div class="callout1" data-dcnode-id="324"><div class="titleContainer" data-dcnode-id="331"><span class="title" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Want more examples?</span></span></div><div data-dcnode-id="325"><span data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Check out our list of the </span></span><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//workona.com/reviews/best-workflow-apps-team/"><span data-dcnode-id="328" instrument_node="">best no-code workflow apps for teams →</span></a><span data-dcnode-id="326"></span></div></div><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">RPA, or robotic process automation, also tries to reduce the burden of repetitive tasks on employees, but it does so by training bots to handle these tasks as a human would. "Smarter" versions of automation include machine learning (ML), which falls under the broader category of artificial intelligence (AI). These types of automation consume vast amounts of data to learn how to improve automation, ideally without human intervention.</span></p><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">While "AI" is not synonymous with "automation", the two terms are closely linked. But as anyone who’s dealt with a customer support chat bot can tell you, AI-driven automation is far from perfect.</span></p><hr data-dcnode-id="319" id="1"><h2 data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">The rise of workflow automation</span></h2><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">What percentage of businesses use automation? What percentage of business processes are automated? These statistics shed some light on how widespread workflow automation is.</span></p><ul data-dcnode-id="294"><li data-dcnode-id="311"><span data-dcnode-id="314" instrument_node="">31% of surveyed businesses have fully automated at least one function.</span><sup data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">1</span></sup></li><li data-dcnode-id="307"><span data-dcnode-id="310" instrument_node="">13% of surveyed organizations say they are implementing the practice of intelligent automation at scale (51+ automations); 23% are implementing (11 – 50 automations); 37% are piloting (1 – 10 automations).</span><sup data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">6</span></sup></li><li data-dcnode-id="303"><span data-dcnode-id="306" instrument_node="">The market for workflow automation and related technologies is growing at 20% per year and is likely to reach $5 billion USD by 2024.</span><sup data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">7</span></sup></li><li data-dcnode-id="299"><span data-dcnode-id="302" instrument_node="">41% of respondents say they are using automation extensively or across multiple functions.</span><sup data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">7</span></sup></li><li data-dcnode-id="295"><span data-dcnode-id="298" instrument_node="">Among the many workflow automation options, respondents said they used RPA most heavily (31%) and AI least heavily (18%).</span><sup data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">7</span></sup></li></ul><img alt="Chart of survey results showing the popularity of various automation technologies." class="centerImg" data-dcnode-id="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firebasestorage.googleapis.com/v0/b/workona-prod.appspot.com/o/cms/workflow-automation-technology-chart-1.png%3Falt%3Dmedia%26token%3D231d885e-0794-48b8-9bc7-c27feb1f66ce&amp;raw" width="576"><div data-dcnode-id="290" style="text-align:right;font-style:italic"><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www2.deloitte.com/content/dam/Deloitte/cz/Documents/human-capital/cz-hc-trends-reinvent-with-human-focus.pdf"><span data-dcnode-id="292" instrument_node="">Source</span></a></div><ul data-dcnode-id="261"><li data-dcnode-id="286"><span data-dcnode-id="289" instrument_node="">AI-driven automation is getting more popular: 74% of current users say their organization will increase their AI investment in the next three years.</span><sup data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">3</span></sup></li><li data-dcnode-id="282"><span data-dcnode-id="285" instrument_node="">57% of respondents say their organizations are at least piloting the automation of processes in one or more business units or functions.</span><sup data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">2</span></sup></li><li data-dcnode-id="278"><span data-dcnode-id="281" instrument_node="">38% admit their organization have not begun to automate business processes, but nearly half plan to do so within the next year.</span><sup data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">2</span></sup></li><li data-dcnode-id="274"><span data-dcnode-id="277" instrument_node="">More so than smaller organizations, larger organizations say they're using automation across the business or have fully automated at least one process (40% vs 25%).</span><sup data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">2</span></sup></li><li data-dcnode-id="270"><span data-dcnode-id="273" instrument_node="">The robotic process automation (RPA) market, valued at $1.4 billion in 2019, is forecast to grow at an annual rate of 40% between 2020 and 2027.</span><sup data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">9</span></sup></li><li data-dcnode-id="266"><span data-dcnode-id="269" instrument_node="">Of total market revenue for robotic process automation, the on-premise segment accounted for the largest revenue share of over 90% in 2020. However, enterprise companies (the highest adopters of RPA historically) are now shifting to cloud-based infrastructure.</span><sup data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">9</span></sup></li><li data-dcnode-id="262"><span data-dcnode-id="265" instrument_node="">Digital process automation (DPA) — roughly synonymous with workflow automation — was a $7.8 billion market in 2019 and is forecast to reach $16 billion by 2025.</span><sup data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">10</span></sup></li></ul><hr data-dcnode-id="260" id="2"><img alt="Illustration of a man standing on a blue background, with an arrow moving between steps labeled 1, 2, and 3" class="centerImg" data-dcnode-id="259" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firebasestorage.googleapis.com/v0/b/workona-prod.appspot.com/o/cms/workflow-automation-benefits.png%3Falt%3Dmedia%26token%3Df761d1e5-bb4b-47dc-ad11-e2ebfa8aa989&amp;raw"><h2 data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Benefits &amp; impact of automation</span></h2><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">How much does automation increase productivity? Is it good for the economy overall —&nbsp;improving not just company revenue, but also employees' skills?</span></p><ul data-dcnode-id="210"><li data-dcnode-id="251"><span data-dcnode-id="254" instrument_node="">Despite concerns about losing jobs due to automation, survey respondents claimed that "reducing head count through automation" was the least popular AI benefit in their organization.</span><sup data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">5</span></sup></li><li data-dcnode-id="247"><span data-dcnode-id="250" instrument_node="">90% of executives expect their automation investments to increase their workforce capacity over the next three years.</span><sup data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">6</span></sup></li><li data-dcnode-id="243"><span data-dcnode-id="246" instrument_node="">Organizations that have already implemented or scaled automation indicated a 12% workforce capacity increase due to their efforts.</span><sup data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">6</span></sup></li><li data-dcnode-id="239"><span data-dcnode-id="242" instrument_node="">Surveyed executives in many countries, especially  China and the United Kingdom, show a distinct preference for using AI automation to free up workers for higher-value tasks.</span><sup data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">5</span></sup></li><li data-dcnode-id="235"><span data-dcnode-id="238" instrument_node="">35% of survey respondents say they need more workers skilled in automation, AI, and robotics, due to increased deployment of automation during COVID-19.</span><sup data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">4</span></sup></li><li data-dcnode-id="231"><span data-dcnode-id="234" instrument_node="">67% of surveyed executives say they have accelerated automation and artificial intelligence during the COVID-19 pandemic.</span><sup data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">4</span></sup></li><li data-dcnode-id="227"><span data-dcnode-id="230" instrument_node="">Nearly half of executives say their automation adoption has grown moderately during the COVID-19 pandemic.</span><sup data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">4</span></sup></li><li data-dcnode-id="223"><span data-dcnode-id="226" instrument_node="">83% of US executives and 70% of Indian executives reporting faster adoption of automation during the pandemic, standing out against other countries.</span><sup data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">4</span></sup></li><li data-dcnode-id="219"><span data-dcnode-id="222" instrument_node="">Companies are increasingly optimistic about automation. In 2020, organizations expected their automation strategies to drive a 15% increase in revenue (in targeted areas), up from 11% in 2019.</span><sup data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">6</span></sup></li><li data-dcnode-id="215"><span data-dcnode-id="218" instrument_node="">Due to automation, respondents expected an average cost reduction of 24% over the next three years (in targeted areas), up from 22% in 2019.</span><sup data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">6</span></sup></li><li data-dcnode-id="211"><span data-dcnode-id="214" instrument_node="">Organizations already implementing or scaling automation report a cost reduction of 24%, up from 19% in 2019.</span><sup data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">6</span></sup></li></ul><hr data-dcnode-id="209" id="3"><h2 data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">Workflow automation statistics by industry</span></h2><h3 data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Finance</span></h3><ul data-dcnode-id="196"><li data-dcnode-id="201"><span data-dcnode-id="204" instrument_node="">Since the COVID-19 outbreak, automation has been most heavily adopted by the financial services and technology sectors, with 88% and 76% of executives reporting increased implementation, respectively.</span><sup data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">4</span></sup></li><li data-dcnode-id="197"><span data-dcnode-id="200" instrument_node="">Over 50% of banking and financial organization CEOs are focusing on simplifying their products and operations to manage complexity effectively, suggesting a high demand for automation.</span><sup data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">10</span></sup></li></ul><h3 data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Marketing &amp; sales</span></h3><ul data-dcnode-id="181"><li data-dcnode-id="190"><span data-dcnode-id="193" instrument_node="">Survey respondents have credited AI-driven automation with increasing revenue in pricing, prediction of likelihood to buy, and customer service analytics.</span><sup data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">3</span></sup></li><li data-dcnode-id="186"><span data-dcnode-id="189" instrument_node="">Global spending on marketing automation tools is predicted to pass $25 billion by 2023 — which amounts to a 14% annual growth rate from 2017.</span><sup data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">8</span></sup></li><li data-dcnode-id="182"><span data-dcnode-id="185" instrument_node="">55% of global marketers plan to increase spending on overall marketing technology in the next year.</span><sup data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">8</span></sup></li></ul><h3 data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Supply chain management</span></h3><ul data-dcnode-id="174"><li data-dcnode-id="175"><span data-dcnode-id="178" instrument_node="">Survey respondents have credited AI-driven automation with increasing revenue in sales and demand forecasting, as well as spend analytics.</span><sup data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">3</span></sup></li></ul><hr data-dcnode-id="173" id="4"><h2 data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Risks &amp; barriers for workflow automation</span></h2><ul data-dcnode-id="158"><li data-dcnode-id="167"><span data-dcnode-id="170" instrument_node="">Nearly 66% of AI early adopters agree that their organization would like to cut costs by automating as many jobs as possible.</span><sup data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">5</span></sup></li><li data-dcnode-id="163"><span data-dcnode-id="166" instrument_node="">36% of respondents rank job cuts from AI-driven automation as a top-three ethical risk.</span><sup data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">5</span></sup></li><li data-dcnode-id="159"><span data-dcnode-id="162" instrument_node="">According to surveyed executives, the top two barriers to adopting automation at scale are process fragmentations and lack of IT readiness, followed by resistance to change and lack of a clear vision.</span><sup data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">6</span></sup></li></ul><img alt="Chart of survey results showing top barriers to scaling intelligent automation." class="centerImg" data-dcnode-id="157" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firebasestorage.googleapis.com/v0/b/workona-prod.appspot.com/o/cms/workflow-automation-barriers-chart.png%3Falt%3Dmedia%26token%3Da8ebe6c2-1f99-4d44-bff1-2c0e0b5539cb&amp;raw" width="576"><div data-dcnode-id="154" style="text-align:right;font-style:italic"><a data-dcnode-id="155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www2.deloitte.com/bg/en/pages/about-deloitte/articles/Intelligent-Automation-Survey-2021.html/"><span data-dcnode-id="156" instrument_node="">Source</span></a></div><ul data-dcnode-id="121"><li data-dcnode-id="150"><span data-dcnode-id="153" instrument_node="">Only 38% of surveyed organization have mature process definitions, standards, and management, which impacts their ability to implement automation.</span><sup data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">6</span></sup></li><li data-dcnode-id="146"><span data-dcnode-id="149" instrument_node="">Only 37% of organizations report that they have appropriate standards overseen by a dedicated, capable IT function in charge of automation. </span><sup data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">6</span></sup></li><li data-dcnode-id="142"><span data-dcnode-id="145" instrument_node="">Nearly half (49%) of respondents said their automation require process change, such as eliminating, simplifying, or standardizing.</span><sup data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">6</span></sup></li><li data-dcnode-id="138"><span data-dcnode-id="141" instrument_node="">In one study, just 2% of respondents have all their business processes modeled, suggesting that few organizations are ready for automation at scale.</span><sup data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">10</span></sup></li><li data-dcnode-id="134"><span data-dcnode-id="137" instrument_node="">60% of respondents from the same survey were working on one or more process transformation projects, with 36% working on ten or more process improvement projects.</span><sup data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">10</span></sup></li><li data-dcnode-id="130"><span data-dcnode-id="133" instrument_node="">A high number of organizations don't know how long it will take to see results from their automation efforts: 50% of organizations in the pilot phase have not estimated the payback period, and 36% of organizations implementing and scaling automation have also not calculated payback.</span><sup data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">6</span></sup></li><li data-dcnode-id="126"><span data-dcnode-id="129" instrument_node="">Only 26% of respondents stated that their organizations were “ready or very ready” to address the impact of AI and related workflow automation technologies.</span><sup data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">7</span></sup></li><li data-dcnode-id="122"><span data-dcnode-id="125" instrument_node="">Just 6% of respondents agreed their organizations were “very ready” to address automation &amp; AI. Considering all the changes that would be necessary — scaling up IT functions, reskilling large parts of the workforce, and integrating human behavior with automation — this low percentage is understandable.</span><sup data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">7</span></sup></li></ul><hr data-dcnode-id="120" id=""><h4 data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">About Workona</span></h4><p data-dcnode-id="113"><span data-dcnode-id="117" instrument_node="">If your organization is ready to improve its processes, try </span><a data-dcnode-id="115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//workona.com/"><span data-dcnode-id="116" instrument_node="">Workona</span></a><span data-dcnode-id="114" instrument_node="">. It brings essential organization to teams by helping them organize everything for a project in one place: cloud docs, links, notes &amp; tasks. With over one million workspaces created, Workona is transforming how modern work is done.</span></p><div class="center" data-dcnode-id="110" style="margin-top:40px;margin-bottom:40px"><a class="btn btnPrimary btnInline" data-dcnode-id="111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//workona.com/"><span data-dcnode-id="112" instrument_node="">Try Workona Now</span></a></div><div class="callout2" data-dcnode-id="101"><img class="icon" data-dcnode-id="109" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//firebasestorage.googleapis.com/v0/b/workona-prod.appspot.com/o/cms/twitter-profile-bg.png%3Falt%3Dmedia%26token%3Da6a94875-c65c-4581-975c-d35c437206e2&amp;raw"><div class="title" data-dcnode-id="107"><span data-dcnode-id="108" instrument_node="">One of the best products to improve my workflow</span></div><div class="text" data-dcnode-id="105"><span data-dcnode-id="106" instrument_node="">“Honestly, I think my brain (and computer) would pop without Workona. This has been one of the best products to improve my workflow that I've adopted in years.”</span></div><div class="linkContainer" data-dcnode-id="102"><a data-dcnode-id="103" href="https://chatnoir-webcontent.chatnoir.eu/?index=
