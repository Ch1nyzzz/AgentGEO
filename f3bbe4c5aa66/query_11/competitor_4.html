</span><h3 class="column-title" data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">中国，台州 | 2023年1月5日-7日</span></h3><span data-dcnode-id="546" instrument_node="">

</span><div class="embed-responsive embed-responsive-16by9" data-dcnode-id="539"><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><img border="0" data-dcnode-id="542" height="486" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icrca.org/images/slider/ICRCA-banner.jpg&amp;raw" width="570"></p><span data-dcnode-id="540" instrument_node="">

</span><div class="col-sm-6 wow fadeInRight animated" data-dcnode-id="493" style="visibility: visible; animation-name: fadeInRight;"><span data-dcnode-id="535" instrument_node="">
</span><h3 class="column-title" data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">ICRCA 2023 | January 5-7, 2023</span></h3><span data-dcnode-id="532" instrument_node="">
</span><p align="justify" data-dcnode-id="520"><b data-dcnode-id="529"><font color="#FF9900" data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">2023 the 7th International Conference on Robotics, Control and Automation (ICRCA 2023) will be held in </span></font></b><span data-dcnode-id="528" instrument_node=""> </span><font color="#FF9900" data-dcnode-id="525"><b data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Taizhou, China</span></b></font><span data-dcnode-id="524" instrument_node=""> </span><font color="#FF9900" data-dcnode-id="521"><b data-dcnode-id="522"><span data-dcnode-id="523" instrument_node=""> during January 5-7, 2023.</span></b></font></p><span data-dcnode-id="519" instrument_node="">
</span><p align="justify" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node=""> It's aims to boost development of the robotics, control and automation field, expand channels of international academic exchange in science and technology, build a sharing platform of academic resources, promote scientific innovation on the global scale. It also aims to encourage exchange of information on research frontiers in different fields, turn research results into industrial solutions, bring together talents, technologies and capital to boost development. ICRCA will be a perfect gathering to learn about new perspectives, technologies and trends which might pushes the boundaries of the technology and eventually creates a broader future for applications. </span></p><span data-dcnode-id="516" instrument_node="">
</span><p align="justify" data-dcnode-id="514"><span data-dcnode-id="515" instrument_node=""> Welcome you to attend the conference! </span></p><span data-dcnode-id="513" instrument_node="">
</span><p align="justify" data-dcnode-id="509"><strong data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">2023年第七届机器人技术、控制和自动化国际会议（ICRCA 2023）定于2023年1月5日-7日在中国·台州举行。</span></strong><span data-dcnode-id="510" instrument_node="">本次会议将汇聚机器人技术、控制和自动化领域的学者、科研人员及专业人士，围绕”机器人技术、控制和自动化”研究领域展开讨论，分享研究经验，探寻合作机会，推动领域的研究发展与合作，促进业界, 学术界间的创新交流。欢迎海内外学者投稿和参会。                    </span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="494"><a class="btn btn-primary" data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icrca.org/icrca_cfp.pdf"><span data-dcnode-id="507" instrument_node="">CFP Download</span></a><span data-dcnode-id="505" instrument_node="">
</span><a class="btn btn-primary" data-dcnode-id="503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.zmeeting.org/submission/icrca2023" target="_blank"><span data-dcnode-id="504" instrument_node="">Submisssion Now</span></a><span data-dcnode-id="502" instrument_node="">
</span><a class="btn btn-primary" data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.zmeeting.org/register/icrca2023" target="_blank"><span data-dcnode-id="501" instrument_node="">Listener Registration</span></a><span data-dcnode-id="499" instrument_node="">
</span><br data-dcnode-id="498"><span data-dcnode-id="497" instrument_node="">
</span><br data-dcnode-id="496"><span data-dcnode-id="495" instrument_node="">
</span></p></div><span data-dcnode-id="492" instrument_node="">

</span><h2 data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">CONFERENCE PROCEEDINGS | 会议出版 </span></h2><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="473"><br data-dcnode-id="478"><span data-dcnode-id="477" instrument_node="">
