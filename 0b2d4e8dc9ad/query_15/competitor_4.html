</span></div><div class="button-container" data-dcnode-id="752"></div></div></div><div class="more-in-container" data-dcnode-id="744"><div class="more-in-button" data-dcnode-id="745"><span data-dcnode-id="749" instrument_node=""> More in </span><span data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Plants</span></span><span data-dcnode-id="746" instrument_node=""> → </span></div></div></div></div></div><span data-dcnode-id="740" instrument_node=""> </span></div><span data-dcnode-id="738" instrument_node=""> </span><div class="section-container" data-dcnode-id="700"><span data-dcnode-id="737" instrument_node=""> </span><h2 data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">How to Prune Yellow Bells</span></h2><span data-dcnode-id="734" instrument_node=""> </span><div class="step-container step-2" data-dcnode-id="702"><span data-dcnode-id="733" instrument_node=""> </span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Prune or cut back unruly canes by cutting the cane all the way back to a main stem or to the ground. This will keep the plant's natural shape and can be done anytime.</span></p><span data-dcnode-id="730" instrument_node=""> </span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Remove seed pods and spent blooms by cutting back each stem that recently bloomed by one-third. This is done after each bloom period.</span></p><span data-dcnode-id="727" instrument_node=""> </span><div class="mobile-display-ad" data-ad-unit-index="2" data-ad-unit-name="slot" data-dcnode-id="726"></div><span data-dcnode-id="725" instrument_node=""> </span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Cut back bare stems to green wood in late winter while the plant is still dormant. Young esperanza plants may die all the way to the ground, so cut stems to the ground if the plant has no green wood. They will recover in the spring.</span></p><span data-dcnode-id="722" instrument_node=""> </span><div class="custom-module end-section" data-dcnode-id="704"><span data-dcnode-id="721" instrument_node=""> </span><div class="wrapper" data-dcnode-id="706"><span data-dcnode-id="720" instrument_node=""> </span><div class="copy" data-dcnode-id="708"><span data-dcnode-id="719" instrument_node=""> </span><ul data-dcnode-id="710"><span data-dcnode-id="718" instrument_node=""> </span><li data-dcnode-id="715"><span data-dcnode-id="717" instrument_node="">Yellow bells or esperanza (Tecoma stans) are a drought-tolerant relative of the trumpet vine and produce bright yellow flowers during the summer and fall.</span><br data-dcnode-id="716"></li><span data-dcnode-id="714" instrument_node=""> </span><li data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Young esperanza plants may die all the way to the ground, so cut stems to the ground if the plant has no green wood.</span></li><span data-dcnode-id="711" instrument_node=""> </span></ul><span data-dcnode-id="709" instrument_node=""> </span></div><span data-dcnode-id="707" instrument_node=""> </span></div><span data-dcnode-id="705" instrument_node=""> </span></div><span data-dcnode-id="703" instrument_node=""> </span></div><span data-dcnode-id="701" instrument_node=""> </span></div><span data-dcnode-id="699" instrument_node=""> </span><div class="section-container" data-dcnode-id="663"><span data-dcnode-id="698" instrument_node=""> </span><h2 data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Prune Yellow Bell Shrubs</span></h2><span data-dcnode-id="695" instrument_node=""> </span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Prune yellow bells shrubs after the last blooms fade in late spring or early summer. Avoid cutting in a hedge or formal shape as this can greatly reduce the number of buds and resulting flowers. Remove older large branches from the inner areas of young yellow bells shrubs. Taking out older branches will not only help promote new growth but will also facilitate air circulation around the branches. Cut at least one-quarter of the older branches on a mature yellow bells plant close to the ground. Renovate an older yellow bells with out-of-control shape with more aggressive pruning. This will allow the plant to renew itself and achieve its natural shape within two years. Remove dead, damaged or diseased branches anytime.</span></p><span data-dcnode-id="692" instrument_node=""> </span><div class="custom-module end-section" data-dcnode-id="674"><span data-dcnode-id="691" instrument_node=""> </span><div class="wrapper" data-dcnode-id="676"><span data-dcnode-id="690" instrument_node=""> </span><div class="copy" data-dcnode-id="678"><span data-dcnode-id="689" instrument_node=""> </span><ul data-dcnode-id="680"><span data-dcnode-id="688" instrument_node=""> </span><li data-dcnode-id="685"><span data-dcnode-id="687" instrument_node="">Prune yellow bells shrubs after the last blooms fade in late spring or early summer.</span><br data-dcnode-id="686"></li><span data-dcnode-id="684" instrument_node=""> </span><li data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Cut at least one-quarter of the older branches on a mature yellow bells plant close to the ground.</span></li><span data-dcnode-id="681" instrument_node=""> </span></ul><span data-dcnode-id="679" instrument_node=""> </span></div><span data-dcnode-id="677" instrument_node=""> </span></div><span data-dcnode-id="675" instrument_node=""> </span></div><span data-dcnode-id="673" instrument_node=""> </span><div class="tip" data-dcnode-id="665"><span data-dcnode-id="672" instrument_node=""> </span><p class="tip-header" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Tip</span></p><span data-dcnode-id="669" instrument_node=""> </span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">The "gold star" variety blooms more often than the standard "yellow bells" variety of esperanza.</span></p><span data-dcnode-id="
