</span><table class="ct-table ct-table-bordered" data-dcnode-id="741"><tbody data-dcnode-id="743"><tr data-dcnode-id="745"><td data-dcnode-id="747"><span class="ct-underline" data-dcnode-id="750"><em data-dcnode-id="751"><strong data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Did You Know?</span></strong></em></span><br data-dcnode-id="749"><span data-dcnode-id="748" instrument_node="">Barberry can be of great medicinal use. It is used to treat skin infections, psoriasis, gastritis, ulcers, diarrhea, gallstones and inflammation of gall bladder, and even malaria. It is also effective in cleansing the liver, correcting anemia, and in treating hangovers.</span></td></tr></tbody></table><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="739" instrument_node="">Barberry shrubs or bushes, also known as </span><i data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">berberis</span></i><span data-dcnode-id="736" instrument_node=""> or </span><i data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">pepperidge</span></i><span data-dcnode-id="733" instrument_node=""> bushes, belong to a genus that contains about 450―500 different species of deciduous and evergreen shrubs. They are known for their thorny ‘barbs’ and wiry branches, and hence, the name </span><i data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">‘Barberries’</span></i><span data-dcnode-id="730" instrument_node="">. They are often used as fencing or for setting boundaries between yards. The </span><i data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Japanese barberry</span></i><span data-dcnode-id="727" instrument_node=""> is one of the most common barberry shrubs grown in landscapes.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">They are hard, woody, and deciduous shrubs. They bear bright yellow, fragrant flowers in spring. These flowers hang from the stem like a tear drop. The leaves of the barberry plant are small and oval-shaped with a fine texture. The attractive foliage with different colors from bright green to burgundy and gold, make barberries useful in landscaping. These shrubs are slow growers and grow steadily in a semi-spreading fashion. Most bushes grow to a height of 10 feet; however, there also exist some dwarf shrubs. They are extremely sturdy and grow even in harsh conditions. They thrive in USDA hardiness zones 4 through 8.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Barberry shrubs have a uniform growth, and hence, require very little maintenance. This is the main reason why barberries are often planted by garden owners as hedges or natural fences. A little bit of trimming and pruning at regular intervals is required for proper growth, as in case of any other shrub.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="714"><strong data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Pruning</span></strong><br data-dcnode-id="716"><span data-dcnode-id="715" instrument_node=""> Barberry shrubs are decorative plants that are often used for landscaping. No one wants their shrubs to be grown out of control and in unwanted places. Hence, it becomes very important to trim or prune these shrubs timely. But for that, one should know when and how to prune your beautiful-looking shrub. </span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="707"><strong data-dcnode-id="710"><span data-dcnode-id="712" instrument_node="">When to Prune Barberry Shrubs?</span><br data-dcnode-id="711"></strong><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">Pruning the barberry bushes yearly is important to aid in better growth and blooming. They produce fruits or berries that create seedlings. It is recommended that you prune the shrubs after they have fruited, during fall or winter. Dead woods should be removed during summer months, and the bushes should be pruned in the period between mid winter to late winters, i.e., before spring.</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">According to the University of Minnesota Extension, barberry bushes should be trimmed at the time of planting. This is important as it encourages the shrub to develop a strong structure. The shrubs should be trimmed to six inches from the ground, and the diseased or damaged branches should be removed. This helps in encouraging healthy fruit and flower development. The first two years after planting are important for shaping up the barberry shrub or hedge.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">If the shrub is old, leggy, or overgrown, then severe pruning is recommended, i.e., to cut back the older stems to the ground. It encourages dense and bushy growth of the plant.&nbsp;</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="690"><strong data-dcnode-id="697"><span data-dcnode-id="699" instrument_node="">How to Prune Barberry Shrubs?</span><br data-dcnode-id="698"></strong><br data-dcnode-id="696"><span data-dcnode-id="695" instrument_node=""> Pruning these shrubs is not a very difficult task! Put on your safety glasses, heavy work gloves and other protective gear, and get started. The tools needed to prune barberry plant include pruning shears and long handled loppers. You will also need a nylon rope and a plastic drop sheet.</span><br data-dcnode-id="694"><span data-dcnode-id="693" instrument_node="">Start pruning your barberry bush to the height, width, and shape that you desire. You can wrap the obstructive branches in the plastic drop cloth and secure it with nylon rope till you trim the other branches.</span><br data-dcnode-id="692"><span data-dcnode-id="691" instrument_node="">Check for new sprouting plants and pull them out from the roots. Put all the pruning waste in a drag bag. Do not leave it on the ground as it may give rise to new growth. And last but not the least, protect yourself from the thorns of the barberry bush! </span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="688" instrument_node="">These colorful shrubs not only serve as hedge plants, but also create a nice backdrop for other plants in your garden. However, they require proper care and maintenance like any other garden plant. </span><i data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Happy gardening!</span></i></p><span data-dcnode-id="684" instrument_node="">
