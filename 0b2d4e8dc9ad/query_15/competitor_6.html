ebcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeguides.sfgate.com/hardiness-camellias-winter-66681.html"><span data-dcnode-id="829" instrument_node=""> Hardiness of Camellias in Winter </span></a><span data-dcnode-id="827" instrument_node=""> </span></li><span data-dcnode-id="825" instrument_node=""> </span></ul><span data-dcnode-id="823" instrument_node=""> </span></div><span data-dcnode-id="821" instrument_node=""> </span></div><span data-dcnode-id="819" instrument_node=""> </span></div><span data-dcnode-id="817" instrument_node=""> </span><ul data-dcnode-id="809" data-hearst-affiliate-data="" data-rendered="true" style="display: none"><span data-dcnode-id="816" instrument_node=""> </span><li data-dcnode-id="814" data-hearst-affiliate-index="1" data-hearst-affiliate-keyword="bleach" data-hearst-affiliate-link="https://fave.co/3j0twFq"><span data-dcnode-id="815" instrument_node=""> </span></li><span data-dcnode-id="813" instrument_node=""> </span><li data-dcnode-id="811" data-hearst-affiliate-index="2" data-hearst-affiliate-keyword="disinfectant" data-hearst-affiliate-link="https://fave.co/3sygB0H"><span data-dcnode-id="812" instrument_node=""> </span></li><span data-dcnode-id="810" instrument_node=""> </span></ul><span data-dcnode-id="808" instrument_node=""> </span><div class="freestyle-content article-content" data-dcnode-id="703"><span data-dcnode-id="807" instrument_node=""> </span><div class="parts" data-dcnode-id="766"><span data-dcnode-id="806" instrument_node=""> </span><div class="content" data-dcnode-id="800"><p data-dcnode-id="801"><span data-dcnode-id="805" instrument_node="">Sometimes called blue mist spirea, the bluebeard shrub (Caryopteris x clandonensis 'Blue Mist') is a showy, deciduous plant grown throughout USDA plant hardiness zones 6b to 9a, according to </span><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plants.ces.ncsu.edu/plants/caryopteris-x-clandonensis/" rel="nofollow noopener"><span data-dcnode-id="804" instrument_node="">North Carolina State University Cooperative Extension Service</span></a><span data-dcnode-id="802" instrument_node="">. Prized for its aromatic foliage and delicate haze of powder blue flowers, it is low maintenance and drought-tolerant shrub that requires very little attention if planted in a sunny location with well-drained soil. Both young and established bluebeard shrubs benefit from occasional hard pruning to give them a tidier appearance, although the time to prune depends on the local climate.</span></p></div><span data-dcnode-id="799" instrument_node=""> </span><div class="mobile-only-min-height-250 ad-unit inline-ad" data-ad-unit-name="inline-mobile" data-dcnode-id="798"></div><span data-dcnode-id="797" instrument_node=""> </span><div class="desktop-only-min-height-280 ad-unit centered" data-ad-id="Leaf2" data-ad-unit-name="inline-desktop" data-dcnode-id="795" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="796" data-has-intersected="true" id="Leaf2"></div></div><span data-dcnode-id="794" instrument_node=""> </span><div class="section" data-dcnode-id="768" id="things-needed"><span data-dcnode-id="793" instrument_node=""> </span><h4 data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Things You Will Need</span></h4><span data-dcnode-id="790" instrument_node=""> </span><ul data-dcnode-id="770"><span data-dcnode-id="789" instrument_node=""> </span><li data-dcnode-id="786"><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Pruning shears</span></p></li><span data-dcnode-id="785" instrument_node=""> </span><li data-dcnode-id="780"><p data-dcnode-id="781"><span data-dcnode-id="784" instrument_node="">Household </span><a class="hearst-affiliate-link" data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fave.co/3sygB0H" rel="nofollow,noopener" target="_blank"><span data-dcnode-id="783" instrument_node="">disinfectant</span></a></p></li><span data-dcnode-id="779" instrument_node=""> </span><li data-dcnode-id="776"><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Paper towel</span></p></li><span data-dcnode-id="775" instrument_node=""> </span><li data-dcnode-id="772"><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">15-15-15 or lower fertilizer</span></p></li><span data-dcnode-id="771" instrument_node=""> </span></ul><span data-dcnode-id="769" instrument_node=""> </span></div><span data-dcnode-id="767" instrument_node=""> </span></div><span data-dcnode-id="765" instrument_node=""> </span><h2 class="title" data-dcnode-id="763" data-for="Pruning Bluebeard Plant"><span data-dcnode-id="764" instrument_node=""> Pruning Bluebeard Plant</span></h2><span data-dcnode-id="762" instrument_node=""> </span><div class="parts" data-dcnode-id="738"><span data-dcnode-id="761" instrument_node=""> </span><div class="content" data-dcnode-id="755"><p data-dcnode-id="756"><span data-dcnode-id="760" instrument_node="">Bluebeard shrubs do not tolerate harsh winter weather and will die back with the frost and snow in colder climates, leaving the plants looking shabby. Gardeners typically prune back the entire plant in autumn in anticipation of this die-back, which will make space for lush new growth in spring. According to </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.missouribotanicalgarden.org/PlantFinder/PlantFinderDetails.aspx%3Ftaxonid%3D244664%23%3A~%3Atext%3DCaryopteris%2520%25C3%2597%2520clandonensis%252C%2520commonly%2520called%2Cof%2520blue%2520smoke%2520or%2520mist." rel="nofollow noopener"><span data-dcnode-id="759" instrument_node="">Missouri Botanical Garden</span></a><span data-dcnode-id="757" instrument_node="">, gardeners in warmer climates can prune back bluebeard shrubs in autumn or in early spring before new growth appears to improve their shape and overall appearance. These shrubs bloom on new growth, so hard pruning in autumn or early spring won't affect their flower production.</span></p></div><span data-dcnode-id="754" instrument_node=""> </span><div class="content" data-dcnode-id="745"><p data-dcnode-id="746"><span data-dcnode-id="753" instrument_node="">Hard pruning bluebeard shrubs is simple and takes little time or effort. In autumn, prune back the entire shrub to within 6 inches of the ground, as recommended by the </span><a data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pss.uvm.edu/ppp/articles/dormant.html" rel="nofollow noopener"><span data-dcnode-id="752" instrument_node="">University of Vermont Department of Plant and Soil Sciences</span></a><span data-dcnode-id="750" instrument_node="">. You can hard prune – also called rejuvenation pruning – every year if you want, but some experts, such as the </span><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.colostate.edu/client-files/csfs/pdfs/PruningFloweringShrubs_619.pdf" rel="nofollow noopener"><span data-dcnode-id="749" instrument_node="">Colorado State University Extension</span></a><span data-dcnode-id="747" instrument_node="">, recommend waiting for three to five years before rejuvenating bluebeard shrubs or waiting until the shrub starts to look leggy and weak. It all depends on the local climate and the gardener's personal preference.</span></p></div><span data-dcnode-id="744" instrument_node=""> </span><div class="mobile-only-min-height-250 ad-unit inline-ad" data-ad-unit-name="partner-A300-mobile" data-dcnode-id="743"></div><span data-dcnode-id="742" instrument_node=""> </span><div class="desktop-only-min-height-90 ad-unit inline-ad" data-ad-id="Leaf3" data-ad-unit-name="lowline-desktop" data-dcnode-id="740" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="741" data-has-intersected="true" id="Leaf3"></div></div><span data-dcnode-id="739" instrument_node=""> </span></div><span data-dcnode-id="737" instrument_node=""> </span><h2 class="title" data-dcnode-id="735" data-for="Bluebeard Shrub Care"><span data-dcnode-id="736" instrument_node=""> Bluebeard Shrub Care</span></h2><span data-dcnode-id="734" instrument_node=""> </span><div class="parts" data-dcnode-id="721"><span data-dcnode-id="733" instrument_node=""> </span><div class="content" data-dcnode-id="730"><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Caryopteris varieties such as bluebeard shrubs are low maintenance, disease-resistant plants that thrive in areas of the garden where other plants might fail, although they still benefit from routine care to look their best. Watering, in particular, is important for bluebeard shrubs when they are first planted in the garden because it will help them establish a deep root system so they can better withstand drought conditions. Once established, bluebeard shrubs need 1 inch of irrigation each week if no rain falls for longer than a week, particularly if conditions are hot. Just be sure to let the soil dry out on the surface between waterings to prevent root problems.</span></p></div><span data-dcnode-id="729" instrument_node=""> </span><div class="content" data-dcnode-id="723"><p data-dcnode-id="724"><span data-dcnode-id="728" instrument_node="">Bluebeard shrubs grow best with low soil fertility but some plants benefit from light applications of fertilizer if they are grown in very porous or sandy soil. Use a balanced fertilizer with an N-P-K number lower than 15-15-15. Apply it at half-strength onto wet soil to prevent root burn. </span><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.logees.com/media/care/pdf/Caryopteris.pdf" rel="nofollow noopener"><span data-dcnode-id="727" instrument_node="">Logee’s Plants</span></a><span data-dcnode-id="725" instrument_node=""> warns to feed bluebeard shrubs only in early spring so that their soft, succulent growth has time to harden.</span></p></div><span data-dcnode-id="722" instrument_node=""> </span></div><span data-dcnode-id="720" instrument_node=""> </span><h2 class="title" data-dcnode-id="718" data-for="Cleaning Your Pruning Shears"><span data-dcnode-id="719" instrument_node=""> Cleaning Your Pruning Shears</span></h2><span data-dcnode-id="717" instrument_node=""> </span><div class="parts" data-dcnode-id="704"><span data-dcnode-id="716" instrument_node=""> </span><div class="content" data-dcnode-id="713"><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Clean and sanitary shears will do the important task of pruning and maintaining plants without accidentally passing on infectious bacteria, viruses and fungi. Cleaning shears is only part of their ongoing maintenance. They should also be sharpened each year if the blades become nicked or pitted from hard wear because pathogens can grow in nicked blades, increasing the likelihood of passing on an infection. Badly damaged pruning shears should be replaced entirely.</span></p></div><span data-dcnode-id="712" instrument_node=""> </span><div class="content" data-dcnode-id="706"><p data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">Scrub your pruning shears in hot, soapy water to remove any bits of plant debris or dirt, rinse them well and wipe them dry. Dip the blades in an undiluted household disinfectant such as Lysol. Let the cleaning solution sit on the blades until it evaporates or let it sit for at least two minutes to kill any harmful pathogens. Wipe the blade with a clean paper towel. Avoid using bleach on metal pruning blades because it can corrode or damage the metal, according to the </span><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//extension.umn.edu/planting-and-growing-guides/clean-and-disinfect-gardening-tools%23bleach-%2528525%2525-sodium-hypochlorite%2529-2148062" rel="nofollow noopener"><span data-dcnode-id="710" instrument_node="">University of Minnesota Extension</span></a><span data-dcnode-id="708" instrument_node="">.</span></p></div><span data-dcnode-id="705" instrument_node=""> </span></div></div><span data-dcnode-id="702" instrument_node=""> </span><div class="min-height-250 ad-unit main-ad" data-ad-id="Leaf4" data-ad-unit-name="main" data-dcnode-id="700" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="701" data-has-intersected="true" id="Leaf4"></div></div><span data-dcnode-id="699" instrument_node=""> </span><div class="hst-exco-player pbs" data-dcnode-id="695" data-exs-config="{&quot;customParams&quot;:{&quot;section1&quot;:&quot;&quot;,&quot;section2&quot;:&quot;&quot;,&quot;section3&quot;:&quot;&quot;,&quot;page_type2&quot;:&quot;&quot;,&quot;permutive&quot;:&quot;&quot;}}" data-pbs-position="static" data-pbs-root="true" id="bfd120c4-7961-4553-8db6-72038c76a9c1"><div class="pbs__player" data-dcnode-id="696" id="exp_54f01c25-802b-44ad-be0f-4f6e4be57562"><div class="pb-stream" data-dcnode-id="697" id="video671266652e9a0382b-081c-4bd2-82f7-d3d645482d6c" style="width: 660px; height: 371px;"></div></div></div><span data-dcnode-id="694" instrument_node=""> </span><div class="dropdowns-wrapper" data-dcnode-id="636"><span data-dcnode-id="693" instrument_node=""> </span><div class="dropdowns-container" data-dcnode-id="638"><span data-dcnode-id="692" instrument_node=""> </span><div class="headings-line" data-dcnode-id="643"><span data-dcnode-id="691" instrument_node=""> </span><p class="heading" data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">References</span></p><span data-dcnode-id="688" instrument_node=""> </span><div class="dropdown-content" data-dcnode-id="654"><span data-dcnode-id="687" instrument_node=""> </span><ul data-dcnode-id="656"><li data-dcnode-id="682"><span data-dcnode-id="686" instrument_node=""> </span><a aria-label="http://www.missouribotanicalgarden.org/PlantFinder/PlantFinderDetails.aspx?taxonid=244664#:~:text=Caryopteris%20%C3%97%20clandonensis%2C%20commonly%20called,of%20blue%20smoke%20or%20mist." data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.missouribotanicalgarden.org/PlantFinder/PlantFinderDetails.aspx%3Ftaxonid%3D244664%23%3A~%3Atext%3DCaryopteris%2520%25C3%2597%2520clandonensis%252C%2520commonly%2520called%2Cof%2520blue%2520smoke%2520or%2520mist." rel="nofollow"><span data-dcnode-id="685" instrument_node=""> Missouri Botanical Garden: Caryopteris x Clandonensis 'Blue Mist' </span></a><span data-dcnode-id="683" instrument_node=""> </span></li><li data-dcnode-id="677"><span data-dcnode-id="681" instrument_node=""> </span><a aria-label="https://plants.ces.ncsu.edu/plants/caryopteris-x-clandonensis/" data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plants.ces.ncsu.edu/plants/caryopteris-x-clandonensis/" rel="nofollow"><span data-dcnode-id="680" instrument_node=""> North Carolina State University Cooperative Extension Service: Caryopteris x Clandonensis 'Blue Mist' </span></a><span data-dcnode-id="678" instrument_node=""> </span></li><li data-dcnode-id="672"><span data-dcnode-id="676" instrument_node=""> </span><a aria-label="https://static.colostate.edu/client-files/csfs/pdfs/PruningFloweringShrubs_619.pdf" data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.colostate.edu/client-files/csfs/pdfs/PruningFloweringShrubs_619.pdf" rel="nofollow"><span data-dcnode-id="675" instrument_node=""> Colorado State University Extension: Pruning Flowering Shrubs </span></a><span data-dcnode-id="673" instrument_node=""> </span></li><li data-dcnode-id="667"><span data-dcnode-id="671" instrument_node=""> </span><a aria-label="https://www.logees.com/media/care/pdf/Caryopteris.pdf" data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.logees.com/media/care/pdf/Caryopteris.pdf" rel="
