</span><h1 data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Tree trimming</span></h1><span data-dcnode-id="959" instrument_node="">
</span><div class="callout critical" data-dcnode-id="911"><span data-dcnode-id="958" instrument_node="">
</span><div class="callout-content" data-dcnode-id="913"><span data-dcnode-id="957" instrument_node="">
</span><figure class="figurebox full" data-dcnode-id="938"><span data-dcnode-id="956" instrument_node="">
</span><a class="swipebox" data-dcnode-id="950" data-rel="emergency" data-size="1764x662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hydro.mb.ca/assets/img/figurebox/tree-danger.svg"><picture data-dcnode-id="952"><span data-dcnode-id="955" instrument_node="">
</span><img alt="Power line sparking next to tree branches." data-dcnode-id="954" height="662" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hydro.mb.ca/assets/img/figurebox/tree-danger.svg&amp;raw" width="1764"><span data-dcnode-id="953" instrument_node="">
</span></picture><span data-dcnode-id="951" instrument_node="">
</span></a><span data-dcnode-id="949" instrument_node="">
</span><figcaption data-dcnode-id="940"><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="942"><a class="swipebox" data-dcnode-id="943" data-rel="emergency-1" data-size="1764x662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hydro.mb.ca/assets/img/figurebox/tree-danger.svg"><span data-dcnode-id="947" instrument_node="">Enlarge image</span><span class="sr-only" data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">: Power line sparking next to tree branches</span></span><span data-dcnode-id="944" instrument_node="">.</span></a></p><span data-dcnode-id="941" instrument_node="">
</span></figcaption><span data-dcnode-id="939" instrument_node="">
</span></figure><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="934"><strong data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Call 911 if a tree is touching or leaning over overhead lines or hydro pole, AND is:</span></strong></p><span data-dcnode-id="933" instrument_node="">
</span><ul data-dcnode-id="919"><span data-dcnode-id="932" instrument_node="">
</span><li data-dcnode-id="927"><strong data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">smoking, sparking, or burning</span></strong><span class="sr-only" data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">;</span></span></li><span data-dcnode-id="926" instrument_node="">
</span><li data-dcnode-id="921"><strong data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">making a loud zapping or popping noises</span></strong><span class="sr-only" data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">.</span></span></li><span data-dcnode-id="920" instrument_node="">
</span></ul><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="915"><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Stay at least 10 metres away. Do not trim the tree or move any power lines.</span></strong></p><span data-dcnode-id="914" instrument_node="">
</span></div><span data-dcnode-id="912" instrument_node="">
</span></div><span data-dcnode-id="910" instrument_node="">
</span><h2 data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Our responsibility</span></h2><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="906" instrument_node="">We only trim trees and vegetation if they are a </span><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hydro.mb.ca/safety/downed_power_lines/"><span data-dcnode-id="905" instrument_node="">threat to safety or our infrastructure</span></a><span data-dcnode-id="903" instrument_node="">. In an emergency, we may do this work without notice.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Power line voltage and tree growth rates determine how far trees are trimmed back for clearance. We may do this work ourselves or contract it out to an arborist. To safely trim trees or vegetation around overhead lines, we may temporarily shut off the electricity. </span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Debris clean-up is the property owner’s responsibility.</span></p><span data-dcnode-id="895" instrument_node="">
</span><h2 data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Your responsibility</span></h2><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="891" instrument_node="">Private and public property owners are responsible for keeping </span><a data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hydro.mb.ca/safety/landscaping/%23trees"><span data-dcnode-id="890" instrument_node="">trees, shrubs, and vegetation</span></a><span data-dcnode-id="888" instrument_node=""> on their property clear of overhead lines and hydro poles. </span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Trees and vegetation should be trimmed back if they:</span></p><span data-dcnode-id="883" instrument_node="">
</span><ul data-dcnode-id="875"><span data-dcnode-id="882" instrument_node="">
</span><li data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">have overhead lines passing through them from a hydro pole to a house;</span></li><span data-dcnode-id="879" instrument_node="">
</span><li data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">are leaning close to, but not touching, overhead lines or hydro poles.</span></li><span data-dcnode-id="876" instrument_node="">
</span></ul><span data-dcnode-id="874" instrument_node="">
</span><figure class="figurebox full" data-dcnode-id="852"><span data-dcnode-id="873" instrument_node="">

</span><div class="callout" data-dcnode-id="811"><span data-dcnode-id="827" instrument_node="">
</span><h3 class="callout-title" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Debris clean up</span></h3><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">It is the property owner’s responsibility to remove any debris.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="820" instrument_node="">If we trim trees or vegetation in an </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hydro.mb.ca/safety/emergency/"><span data-dcnode-id="819" instrument_node="">emergency situation</span></a><span data-dcnode-id="817" instrument_node="">, </span><strong data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">it is still the property owner’s responsibility to clean up debris left on site</span></strong><span data-dcnode-id="814" instrument_node="">.</span></p><span data-dcnode-id="812" instrument_node="">
</span></div><span data-dcnode-id="810" instrument_node="">
</span><h2 data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Tree trimming contacts</span></h2><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Your options depend on whether the trees are on private or public property. If a tree’s roots are on public property and it is leaning on overhead lines in your yard, the tree is on public property.</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Some trees, such as elms, cannot be trimmed or removed during certain times of the year unless there is an immediate safety hazard.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="800" instrument_node="">If you have concerns, </span><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hydro.mb.ca/contact/customer_service_email/"><span data-dcnode-id="799" instrument_node="">contact us</span></a><span data-dcnode-id="797" instrument_node="">.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="794" instrument_node="">If the trees or vegetation are causing a power outage, you can </span><a data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hydro.mb.ca/outages/"><span data-dcnode-id="793" instrument_node="">report the outage online</span></a><span data-dcnode-id="791" instrument_node="">. </span></p><span data-dcnode-id="789" instrument_node="">
</span><h3 data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Public property</span></h3><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">A city, town, or municipality is responsible for trees or vegetation on its public property. Contact your local civic authority about any potential hazards.</span></p><span data-dcnode-id="783" instrument_node="">
</span><h3 data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Private property</span></h3><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="779" instrument_node="">You may trim or remove trees and vegetation on your own property, but </span><strong data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">we strongly recommend you hire a qualified arborist</span></strong><span data-dcnode-id="776" instrument_node=""> to do the work. They are trained to work around overhead lines and hydro poles.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">You, or the arborist, can </span><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hydro.mb.ca/accounts_and_services/services_and_lighting/service_disconnection/"><span data-dcnode-id="772" instrument_node="">request a temporary electricity disconnect</span></a><span data-dcnode-id="770" instrument_node=""> to safely trim your trees and vegetation. We may require a tree safety assessment or tree investigation before we will process your temporary disconnect request.</span></p><span data-dcnode-id="768" instrument_node="">
</span><h2 data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Tree safety assessment request</span></h2><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Send us photos and information about potential hazards on private or public property. We will assess the situation and advise you what to do next.</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="761" instrument_node="">If the situation is your responsibility, you or your qualified arborist can </span><a data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hydro.mb.ca/accounts_and_services/services_and_lighting/service_disconnection/"><span data-dcnode-id="760" instrument_node="">request a temporary electricity disconnect</span></a><span data-dcnode-id="758" instrument_node=""> to safely trim around the trees or vegetation. We may require a tree safety assessment or tree investigation before we will process your temporary disconnect request.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">For this request, we require 2 photos that clearly show:</span></p><span data-dcnode-id="753" instrument_node="">
</span><ul data-dcnode-id="745"><span data-dcnode-id="752" instrument_node="">
</span><li data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">a clear view of the overhead line or hydro pole in the tree or vegetation;</span></li><span data-dcnode-id="749" instrument_node="">
</span><li data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">the entire tree, including the ground, hydro poles and overhead wires, and any nearby buildings.</span></li><span data-dcnode-id="746" instrument_node="">
</span></ul><span data-dcnode-id="744" instrument_node="">
</span><p class="text-center" data-dcnode-id="741"><a class="button" data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hydro.mb.ca/accounts_and_services/tree_trimming/request/"><span data-dcnode-id="743" instrument_node="">Request a tree safety assessment</span></a></p><span data-dcnode-id="740" instrument_node="">
