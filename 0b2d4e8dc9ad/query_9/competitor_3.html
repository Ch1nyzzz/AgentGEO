</span></div><div class="et_pb_module et_pb_post_title et_pb_post_title_0_tb_body et_pb_bg_layout_light et_pb_text_align_center" data-dcnode-id="566"><span data-dcnode-id="573" instrument_node="">

</span><h1 class="entry-title" data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Tips to Safely Cutting Down Dead Trees</span></h1><span data-dcnode-id="569" instrument_node="">
</span></div><span data-dcnode-id="567" instrument_node="">
</span></div><div class="et_pb_module et_pb_post_content et_pb_post_content_0_tb_body" data-dcnode-id="413"><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">It’s in our nature to love trees. We love how green they make our community and the many benefits they provide, from fresh air to fruit to flowers. Trees are assets that increase our home value and improve our mood. But, just like all beautiful living things, their long lives eventually come to an end.</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="561" instrument_node="">So, what do you do when you notice a&nbsp;tree in your yard has lived its long life, but now it’s time for removal? Cutting down dead trees is no easy task, so you should probably consult an arborist to confirm there is no way to save the tree and then have your </span><a data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mrtreeservices.com/" title="Portland Tree Expert"><span data-dcnode-id="560" instrument_node="">tree expert</span></a><span data-dcnode-id="558" instrument_node=""> use the proper tools and technique to </span><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mrtreeservices.com/tree-removal-portland/" title="Dead Tree Removal"><span data-dcnode-id="557" instrument_node="">safely cut down any dead trees</span></a><span data-dcnode-id="555" instrument_node=""> on your property. And, here at Mr. Tree, we are ready and willing 24/7 to assist with this process.</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">However, if you are a skilled do-it-yourselfer and have the knowledge and equipment to take on the task, here is our best advice for cutting down dead trees.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="547"><strong data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Remember, safety always comes first.</span></strong></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544" style="text-align: right;"><img alt="Tip to Safely Cutting Down Dead Trees" class="size-full wp-image-3711 alignright" data-dcnode-id="545" height="333" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mrtreeservices.com/wp-content/uploads/2017/08/Tip-to-Safely-Cutting-Down-Dead-Trees.jpg&amp;raw" srcset="https://mrtreeservices.com/wp-content/uploads/2017/08/Tip-to-Safely-Cutting-Down-Dead-Trees.jpg 500w, https://mrtreeservices.com/wp-content/uploads/2017/08/Tip-to-Safely-Cutting-Down-Dead-Trees-300x200.jpg 300w" width="500"></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Even before you secure the necessary tools, ask yourself, “Am I ready to safely tackle this project? Do the people assisting me know the necessary precautions to take?”</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">At Mr. Tree, our focus is always safety. First, we ensure that by felling a tree we will not cause harm to ourselves or the people or animals around us. Then, we make a carefully devised plan to avoid potential damage to nearby structures or other trees.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">These safety measures include safe chain saw etiquette. Rule number one: never work alone with working with a chain saw.</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="531"><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Do you have the correct tools &amp; supplies?</span></strong></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Once you know you’ll be taking on this project safely, and with a partner, do you have all the right equipment? Here is our recommended list:</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="526" instrument_node="">-Hard hat</span><br data-dcnode-id="525"><span data-dcnode-id="524" instrument_node="">
-Hearing protection</span><br data-dcnode-id="523"><span data-dcnode-id="522" instrument_node="">
-Eye protection</span><br data-dcnode-id="521"><span data-dcnode-id="520" instrument_node="">
-Gloves</span><br data-dcnode-id="519"><span data-dcnode-id="518" instrument_node="">
-Boots-Fire extinguisher</span><br data-dcnode-id="517"><span data-dcnode-id="516" instrument_node="">
-Single-blade axe</span><br data-dcnode-id="515"><span data-dcnode-id="514" instrument_node="">
-Saw gas &amp; bar oil</span><br data-dcnode-id="513"><span data-dcnode-id="512" instrument_node="">
-Wedges</span><br data-dcnode-id="511"><span data-dcnode-id="510" instrument_node="">
-First-aid kit</span><br data-dcnode-id="509"><span data-dcnode-id="508" instrument_node="">
-Plum line</span><br data-dcnode-id="507"><span data-dcnode-id="506" instrument_node="">
-Chain</span><br data-dcnode-id="505"><span data-dcnode-id="504" instrument_node="">
-Chain saw</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="499"><strong data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Is your chain saw in good condition?</span></strong></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">To ensure safety, check to main sure the chain saw you’ll be using is working properly. This means checking to note that the chain brake is working, saw dogs are attached to the saw housing, the bar is as long as the diameter of the tree you’ll be cutting, and that the chain has recently been sharpened.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">If you notice that the chain saw is dull, damaged, or just not cutting straight, immediately stop cutting down your dead tree.</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="489"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Make a plan.</span></strong></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Don’t just step up to a dead tree and start cutting. First, make a plan that includes felling-to-lead. This means that you are cutting in a way that ensures the tree will fall in a certain direction. In this case, the tree is angled 30 to 45 degrees to either side of the skid trail.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Keep an eye out for potential “widow makers”. These are tree fragments that could potentially fall and cause serious injury (hence the name) during the felling process.</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Notice the weather. Gusting winds can cause trees to tip in the wrong direction. If you see trees moving, do not attempt this project. Also, avoid fog and smog. This can hamper vision at the tree crown, as well as obscure potential widow makers. If the tree sits on a&nbsp;</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">steep or uneven slope, this can also quickly turn into a dangerous situation. Skip DIY felling altogether and call in the professionals. Better safe than sorry.</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="473"><strong data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Think about the tree itself.</span></strong></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="471" instrument_node="">Dead or rotten trees are more likely to cause an unsafe situation when felling. They often have loose limbs and bark and unstable tops. These loose limbs are more susceptible to outside forces and are more likely to fall unpredictably. If you know your tree is dead or rotting, it is strongly recommended that you leave </span><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mrtreeservices.com/tree-removal-portland/" title="Tree Removal Service"><span data-dcnode-id="470" instrument_node="">cutting down dead trees to the professionals</span></a><span data-dcnode-id="468" instrument_node="">.</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Additional unsafe conditions include trees with sharp curves near the base, which are more likely to uproot during felling; alder and maple trees, which are susceptible to hidden rotten heart wood; and trees near utility lines, roads, or other houses.</span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="460"><strong data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Make an escape plan.</span></strong></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Felling trees is inherently dangerous, so think ahead of time about how you and your workers will escape potential emergency scenarios. Your path should lead as far away from the stump as possible and be clear of shrubs, rocks, or any other obstacles. You also want the path to be in the opposite direction of where you expect the tree to fall.</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">If you are unable to create a clear escape path, call in the professional tree fellers.</span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="450"><strong data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Now, start with the undercut.</span></strong></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="448" instrument_node="">So, if after reading the above you still want to cut down your tree, then you’re ready to begin, and this first step is the </span><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.extension.oregonstate.edu/sites/catalog/files/project/pdf/ec1124.pdf" rel="noopener" target="_blank"><span data-dcnode-id="447" instrument_node="">undercut</span></a><span data-dcnode-id="445" instrument_node="">. This is the notch cut in the tree that allows it to safely fall. This is the cut that determines the direction the tree will fall, so it’s one of the most important steps. Based on your goals, you’ll either want to go with the conventional undercut, Humboldt undercut, or open-face undercut. Note that the undercut is the proper depth, the cuts are level, and that the cuts match-up.</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="440"><strong data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Next, it’s time for the back cut.</span></strong></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">This is the cut that actually causes the tree to fall. It’s made horizontally and must be at least as high as the horizontal undercut. Do not make the back cut lower than the undercut. This could cause the tree to move backward toward you.</span></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Before this cut, stop the chain saw and give a warning call to those around you. Do not intersect the back cut and the undercut. Instead, leave a bit of uncut wood between the two cuts. Then, as soon as possible, insert a falling wedge into the back cut. The wedge will help ease the tree in the right direction and can also help you adjust if it starts leaning the wrong way.</span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">If the tree doesn’t fall after these steps, drive in the wedge using an axe until it does.</span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="427"><strong data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Keep an eye outduring this process.</span></strong></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Don’t forget to continually look around and ensure the environment is safe. Watch for overhead hazards, clear up any hang-ups, and notice if any limbs or tree tops are left in adjacent trees.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="422" instrument_node="">Felling trees is a dangerous task that should not be undertaken lightly. If at anytime you are hesitant about this </span><a data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mrtreeservices.com/tree-removal-portland/" title="Tree Removal In Portland"><span data-dcnode-id="421" instrument_node="">tree removal</span></a><span data-dcnode-id="419" instrument_node=""> process, call in our service at </span><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mrtreeservices.com/"><span data-dcnode-id="418" instrument_node="">Mr. Tree</span></a><span data-dcnode-id="416" instrument_node="">. We are available 24/7.</span></p><span data-dcnode-id="414" instrument_node="">
</span></div><div class="et_pb_with_border et_pb_module et_pb_post_nav_0_tb_body et_pb_posts_nav nav-single" data-dcnode-id="389"><span data-dcnode-id="412" instrument_node="">
