</span><div class="accordion-intro" data-dcnode-id="796"><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">The pro growers that pull down the heaviest harvests from the fewest cannabis plants are, without exception, highly skilled at trimming marijuana. With the trimming tips in this blog, you too can take the path to a scale-tipping harvest, even with just one cannabis plant in the garden.</span></p><span data-dcnode-id="797" instrument_node="">
</span></div><span data-dcnode-id="795" instrument_node="">
</span><div class="accordion-body clearfix" data-dcnode-id="560"><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="792"><img alt="Cannabis Trimming Techniques and Tips" class="full-width-image" data-dcnode-id="793" height="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/img/cms/Cannabis%2520Grow%2520Guide/New/Advanced_Techniques/Other_Yield_Boosting_Techniques/Essential_Trimming_Techniques_And_Tips/Cannabis-Trimming-Techniques-And-Tips-HEADER.jpg&amp;raw" title="Cannabis Trimming Techniques and Tips" width="900"></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="790"></p><span data-dcnode-id="789" instrument_node="">
</span><h2 data-dcnode-id="787" id="what-are-the-advantages-of-trimming-cannabis-plants"><span data-dcnode-id="788" instrument_node="">WHAT ARE THE ADVANTAGES OF TRIMMING CANNABIS PLANTS?</span></h2><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">The natural structure of the cannabis plant is similar to that of a Christmas tree. For most real-world indoor and outdoor cannabis growers, this shape is not ideal. Sure, if you have the space and privacy someplace sunny in a southern climate, you can crop great big ganja trees and not bother with pruning. Make Haze while the sun shines.</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="782" instrument_node="">However, for the vast majority of cannabis cultivators, plant height needs to be controlled. And who couldn’t do with a </span><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/blog-5-ways-to-increase-cannabis-yields-n1169" title="6 Ways To Increase Cannabis Yields"><span data-dcnode-id="781" instrument_node="">heavier harvest</span></a><span data-dcnode-id="779" instrument_node="">? Trimming solves both issues for photoperiod-dependent cannabis strains. </span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/blog-top-10-advantages-autoflowering-seeds-n408" title="Top 10 Reasons To Grow Autoflowering Cannabis"><span data-dcnode-id="778" instrument_node="">Autoflowering strains</span></a><span data-dcnode-id="776" instrument_node=""> are best left untouched by scissors or fingers until harvest day. Trust us, or find out the heart-breaking way.</span></p><span data-dcnode-id="774" instrument_node="">
</span><h2 data-dcnode-id="772" id="the-5-most-common-trimming-techniques"><span data-dcnode-id="773" instrument_node="">THE 5 MOST COMMON TRIMMING TECHNIQUES</span></h2><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><img alt="THE 5 MOST COMMON TRIMMING TECHNIQUES" class="full-width-image" data-dcnode-id="770" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/img/cms/Cannabis%2520Grow%2520Guide/New/Advanced_Techniques/Other_Yield_Boosting_Techniques/Essential_Trimming_Techniques_And_Tips/2-The-5-Most-Common-Trimming-Techniques.jpg&amp;raw" title="The 5 Most Common Trimming Techniques" width="100%"></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="767" instrument_node="">This is by no means an exhaustive list of cannabis trimming techniques. These are the 5 most popular techniques that can be combined with the </span><a data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/grow-weed/54-scrog-cannabis" title="Cropping Cannabis ScrOG Style"><span data-dcnode-id="766" instrument_node="">ScrOG or “screen of green”</span></a><span data-dcnode-id="764" instrument_node=""> method for maximum yield. That being said, there is a price to be paid for trimming. Pruning cannabis will cost you time during the vegetative growth phase with every technique applied. Cannabis plants need time to recover. Usually about one week. Otherwise, you run the risk of stunting growth and/or </span><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/blog-7-common-causes-that-stress-your-cannabis-plant-n1001" title="7 Common Causes Of Stress For Your Cannabis Plant"><span data-dcnode-id="763" instrument_node="">stressing plants</span></a><span data-dcnode-id="761" instrument_node=""> into hermies.</span></p><span data-dcnode-id="759" instrument_node="">
</span><h3 data-dcnode-id="756"><span class="fsize12pt" data-dcnode-id="757" id="3" style="font-size: 12pt;"><span data-dcnode-id="758" instrument_node="">#1 TOPPING</span></span></h3><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="752"><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/grow-weed/59-topping-cannabis" title="How To Top Your Cannabis Plants"><img alt="Topping Cannabis" class="full-width-image" data-dcnode-id="754" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/img/cms/Cannabis%2520Grow%2520Guide/New/Advanced_Techniques/Other_Yield_Boosting_Techniques/Essential_Trimming_Techniques_And_Tips/Topping1.jpg&amp;raw" width="800"></a></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="747"><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/grow-weed/59-topping-cannabis" title="How To Top Your Cannabis Plants"><span data-dcnode-id="750" instrument_node="">Topping</span></a><span data-dcnode-id="748" instrument_node=""> is the process of removing the terminal bud or tip of the main stem. The set of branches below the cut rise to become two new top colas. All branches grow more vigorously as growth hormone is dispersed throughout the shoots instead of toward a single main cola. This gives the plant a bushy profile and can be easily repeated to fill more lateral space. Aside from the FIM method, topping works well in combination with the rest of this list and the ScrOG method.</span></p><span data-dcnode-id="746" instrument_node="">
</span><h3 data-dcnode-id="743"><span class="fsize12pt" data-dcnode-id="744" id="4" style="font-size: 12pt;"><span data-dcnode-id="745" instrument_node="">#2 FIMMING</span></span></h3><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="739"><a data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/grow-weed/58-fimming-cannabis" title="Fimming Cannabis: Everything You Need to Know"><img alt="FIMMING" class="full-width-image" data-dcnode-id="741" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/img/cms/Cannabis%2520Grow%2520Guide/New/Advanced_Techniques/Other_Yield_Boosting_Techniques/Essential_Trimming_Techniques_And_Tips/Fimming1.jpg&amp;raw" width="800"></a></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="737" instrument_node="">The </span><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/grow-weed/58-fimming-cannabis" title="Fimming Cannabis: Everything You Need to Know"><span data-dcnode-id="736" instrument_node="">FIM or “Fuck I Missed”</span></a><span data-dcnode-id="734" instrument_node=""> is essentially an untidy topping. Surprisingly, fimming produces twice as many top colas as proper topping. Four, rather than two new main colas are typical with fimming. Removing about 75% of the tip from the main stem instead of the whole thing looks untidy and plain wrong, but that’s how to FIM.</span></p><span data-dcnode-id="732" instrument_node="">
</span><h3 data-dcnode-id="729"><span class="fsize12pt" data-dcnode-id="730" id="5" style="font-size: 12pt;"><span data-dcnode-id="731" instrument_node="">#3 LOLLIPOPPING</span></span></h3><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="725"><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/grow-weed/62-lollipopping-cannabis" title="How To Lollipop Cannabis"><img alt="LOLLIPOPPING" class="full-width-image" data-dcnode-id="727" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/img/cms/Cannabis%2520Grow%2520Guide/New/Advanced_Techniques/Other_Yield_Boosting_Techniques/Essential_Trimming_Techniques_And_Tips/Lollipopping1.jpg&amp;raw" width="800"></a></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="723" instrument_node="">During week 3 or 4 of the flowering period, the lower bud sites can be removed. Leaving only big, chunky tops. </span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/grow-weed/62-lollipopping-cannabis" title="How To Lollipop Cannabis"><span data-dcnode-id="722" instrument_node="">Lollipopping</span></a><span data-dcnode-id="720" instrument_node=""> gets its name from the lollipop look it gives shoots post-pruning. This technique concentrates plant energy on large flower tops, reducing popcorn budding and boosting big bud production in effect.</span></p><span data-dcnode-id="718" instrument_node="">
</span><h3 data-dcnode-id="715"><span class="fsize12pt" data-dcnode-id="716" id="6" style="font-size: 12pt;"><span data-dcnode-id="717" instrument_node="">#4 DEFOLIATION</span></span></h3><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="711"><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/grow-weed/128-defoliation" title="Cannabis Defoliation: Everything You Need To Know"><img alt="DEFOLIATION" class="full-width-image" data-dcnode-id="713" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/img/cms/Cannabis%2520Grow%2520Guide/New/Advanced_Techniques/Other_Yield_Boosting_Techniques/Essential_Trimming_Techniques_And_Tips/6-Defoliation.jpg&amp;raw" width="100%"></a></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Defoliation is probably the most contentious technique on this list as there are growers that will recoil in horror at the thought of leaf stripping. But if too many bud sites are shaded by fan leaves, it hurts yields. Leaves are the “solar panels” of the cannabis plant, but it’s the flowers you want to smoke. So some leaf sacrifices must be made for trophy colas.</span></p><span data-dcnode-id="707" instrument_node="">
</span><h3 data-dcnode-id="704"><span class="fsize12pt" data-dcnode-id="705" id="7" style="font-size: 12pt;"><span data-dcnode-id="706" instrument_node="">#5 CUT OFF LOWER BRANCHES</span></span></h3><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><img alt="Cut Off Lower Branches" class="full-width-image" data-dcnode-id="702" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/img/cms/Cannabis%2520Grow%2520Guide/New/Advanced_Techniques/Other_Yield_Boosting_Techniques/Essential_Trimming_Techniques_And_Tips/7-Cut-Off-Lower-Branches.jpg&amp;raw" title="Cut Off Lower Branches" width="100%"></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="699" instrument_node="">Cutting off the first set or two of branches (once plants are 30cm in height or above) is a good way to improve airflow and concentrate plant energy on higher branches closer to the light. This is most growers’ introduction to </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/grow-weed/61-pruning-cannabis" title="Pruning: Everything You Need To Know"><span data-dcnode-id="698" instrument_node="">pruning</span></a><span data-dcnode-id="696" instrument_node=""> and a simple way to crop a little more bud.</span></p><span data-dcnode-id="694" instrument_node="">
</span><h2 data-dcnode-id="692" id="tips-on-how-to-trim-your-cannabis-plants"><span data-dcnode-id="693" instrument_node="">TIPS ON HOW TO TRIM YOUR CANNABIS PLANTS</span></h2><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><img alt="TIPS ON HOW TO TRIM YOUR CANNABIS PLANTS" class="full-width-image" data-dcnode-id="690" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/img/cms/Cannabis%2520Grow%2520Guide/New/Advanced_Techniques/Other_Yield_Boosting_Techniques/Essential_Trimming_Techniques_And_Tips/8-Tips-On-How-To-Trim-Your-Cannabis-Plants.jpg&amp;raw" title="Tips On How To Trim Your Cannabis Plants" width="100%"></p><span data-dcnode-id="688" instrument_node="">
</span><h3 data-dcnode-id="685"><span class="fsize12pt" data-dcnode-id="686" style="font-size: 12pt;"><span data-dcnode-id="687" instrument_node="">TIP 1: PRUNE IN STAGES</span></span></h3><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">If you plan on going for it and experimenting with a few trimming techniques, you can absolutely combine multiple methods to achieve max yield. Just don’t do too much all at once. Trim plants in weekly intervals and monitor behaviour closely. Trimming the lower branches and some fan leaves is a good place to start and perhaps, really as far as you need to go.</span></p><span data-dcnode-id="681" instrument_node="">
</span><h3 data-dcnode-id="678"><span class="fsize12pt" data-dcnode-id="679" style="font-size: 12pt;"><span data-dcnode-id="680" instrument_node="">TIP 2: BE HYGIENIC</span></span></h3><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Clean grower, clean grow-op, clean cutting tools. No exceptions. Cleanliness is next to Godliness, as they say.</span></p><span data-dcnode-id="674" instrument_node="">
</span><h3 data-dcnode-id="671"><span class="fsize12pt" data-dcnode-id="672" style="font-size: 12pt;"><span data-dcnode-id="673" instrument_node="">TIP 3: DON’T BE AFRAID TO TRIM DURING BLOOM</span></span></h3><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="669" instrument_node="">Contrary to the sometimes hapless misinformation that cannabis hacks are peddling, you can prune flowering cannabis plants. For starters, you have to wait until week 3 or 4 of bloom to lollipop. Monster cropping requires </span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/grow-weed/56-cannabis-clones" title="Best Way To Clone Cannabis Plants"><span data-dcnode-id="668" instrument_node="">clones</span></a><span data-dcnode-id="666" instrument_node=""> cut from plants at the same stage of bloom. Defoliation can be an ongoing process; some growers will prune leaves every 3-4 days. Also, pests and disease can strike at any stage, with pruning often required to remove dead or dying leaves and shoots. So ignore the naysayers. Be brave, be a winner, and trim as necessary during flowering.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="663" style="padding-top: 0px;"></p><div class="related-story-quote" data-dcnode-id="642"><span data-dcnode-id="662" instrument_node="">
</span><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/blog-weed-stems-don-t-throw-them-away-n1362"><span data-dcnode-id="661" instrument_node="">
</span><div class="quote-container" data-dcnode-id="646"><span data-dcnode-id="660" instrument_node="">
</span><div class="quote-img" data-dcnode-id="659" style="background-image: url(https://www.zamnesia.com/modules/prestablog/themes/responsive/up-img/1362.jpg)"></div><span data-dcnode-id="658" instrument_node="">
</span><div class="quote-info" data-dcnode-id="648"><span data-dcnode-id="657" instrument_node="">

</span><span class="name" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Weed Stems: Don't Throw Them Away!</span></span><span data-dcnode-id="649" instrument_node="">
</span></div><span data-dcnode-id="647" instrument_node="">
</span></div><span data-dcnode-id="645" instrument_node="">
</span></a><span data-dcnode-id="643" instrument_node="">
</span></div><p data-dcnode-id="641"></p><span data-dcnode-id="640" instrument_node="">
</span><h3 data-dcnode-id="637"><span class="fsize12pt" data-dcnode-id="638" style="font-size: 12pt;"><span data-dcnode-id="639" instrument_node="">TIP 4: USE THE RIGHT TOOLS FOR THE JOB</span></span></h3><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="635" instrument_node="">If you favour cutting tools like </span><a data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/3955-leaf-cutter-pruning-shears.html" title="Leaf Cutter Pruning Shears"><span data-dcnode-id="634" instrument_node="">trimming scissors</span></a><span data-dcnode-id="632" instrument_node=""> or a </span><a data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/2312-mushroom-grow-supplies-scalpel.html" title="Scalpel"><span data-dcnode-id="631" instrument_node="">scalpel</span></a><span data-dcnode-id="629" instrument_node="">, make sure they are comfortable for you to hold and 100% sterile. Pinching tops with fingers is fine too. But you still need to wash your hands first. Fingers are generally best for fimming and lollipopping. Topping, defoliation, and trimming branches is best performed with </span><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zamnesia.com/blog-how-to-keep-your-trimming-scissors-clean-n1417" title="How to Clean Cannabis Trimming Scissors"><span data-dcnode-id="628" instrument_node="">clean scissors</span></a><span data-dcnode-id="626" instrument_node="">. Scalpels are normally reserved for taking cuttings.</span></p><span data-dcnode-id="624" instrument_node="">
</span><h3 data-dcnode-id="621"><span class="fsize12pt" data-dcnode-id="622" style="font-size: 12pt;"><span data-dcnode-id="623" instrument_node="">TIP 5: REPETITION IS THE FATHER OF LEARNING</span></span></h3><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Trimming cannabis plants is a skill that will take time and practice to master. It’s best to begin by trimming from the bottom up, at least until you get some growing and trimming experience under your belt. If you don’t get amazing results the first time you experiment with a trimming technique, don’t give up. Remember that every Grand Master grower was, once upon a time, a rank amateur who was not sure what they were doing.</span></p><span data-dcnode-id="616" instrument_node="">

</span><div class="cookie-popup__text_statement" data-dcnode-id="191" style="display: none;"><span data-dcnode-id="231" instrument_node="">
</span><div class="cookie-popup__title" data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">What are cookies?</span></div><span data-dcnode-id="228" instrument_node="">
</span><div class="cookie-popup__paragraph" data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Cookies and similar technologies are very small text documents or pieces of code that often contain a unique identifier. When you visit a website or use a mobile application, a computer asks your computer or mobile device for permission to store this file on your computer or mobile device and access information. Information collected through cookies and similar technologies may include the date and time of the visit and how you use a particular website or mobile application.</span></div><span data-dcnode-id="225" instrument_node="">
</span><div class="cookie-popup__title" data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Why do we use cookies?</span></div><span data-dcnode-id="222" instrument_node="">
</span><div class="cookie-popup__paragraph" data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Cookies ensure that you remain logged in during your visit to our online store, that all items remain in your shopping cart, that you can shop safely and that the website continues to run smoothly. The cookies also ensure that we can see how our website is used and how we can improve it. Depending on your preferences, our own cookies may also be used to present you targeted advertisements that match your personal interests.</span></div><span data-dcnode-id="219" instrument_node="">
</span><div class="cookie-popup__title" data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">What kind of cookies do we use?</span></div><span data-dcnode-id="216" instrument_node="">
</span><div class="cookie-popup__subtitle" data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Functional cookies</span></div><span data-dcnode-id="213" instrument_node="">
</span><div class="cookie-popup__paragraph" data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">The functional cookies ensure that our website functions properly.</span></div><span data-dcnode-id="210" instrument_node="">
</span><div class="cookie-popup__subtitle" data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Preference cookies</span></div><span data-dcnode-id="207" instrument_node="">
</span><div class="cookie-popup__paragraph" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Preference cookies allow a website to remember information that influence on the behavior and design of the website.</span></div><span data-dcnode-id="204" instrument_node="">
</span><div class="cookie-popup__subtitle" data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Analytical cookies</span></div><span data-dcnode-id="201" instrument_node="">
</span><div class="cookie-popup__paragraph" data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Analytical cookies give us insight into how our website is used. On the basis of this information we can make our website more user-friendly.</span></div><span data-dcnode-id="198" instrument_node="">
</span><div class="cookie-popup__title" data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">How can I disable or delete cookies?</span></div><span data-dcnode-id="195" instrument_node="">
</span><div class="cookie-popup__paragraph" data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">You can choose to disable all cookies except the necessary cookies. You can change the settings in the browser settings to ensure that cookies are blocked. Most browsers give you an explanation of how to do this in the so-called \’help-function\’. However, if you block the cookies, you may not be able to enjoy all the technical features our website has to offer and this may negatively impact your user experience.</span></div><span data-dcnode-id="192" instrument_node="">
