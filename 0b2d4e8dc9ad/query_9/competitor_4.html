 planters, birdhouses, wind-chimes and other items to the trees. Are there any bands or some sort of safe winches that could be pulled around the tree &amp; loosened without damaging the tree?</span></p><span data-dcnode-id="1117" instrument_node="">
</span></div><div class="hz-question__social" data-container="Discussion Actions" data-dcnode-id="1097"><div class="hz-user-action-bar hz-user-actions hz-track-me" data-dcnode-id="1101"><button class="btn btn-default hz-user-action-button hz-user-action-bar__btn hz-user-action-bar__btn--share hz-track-me" compid="share" data-compid="share" data-component="Share" data-dcnode-id="1112" type="button"><span aria-hidden="true" class="icon-font icon-box_up_arrow hz-user-action-button__icon" data-dcnode-id="1115"></span><span class="btn__label" data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Share</span></span></button><button class="btn btn-default hz-user-action-button hz-user-action-bar__btn hz-user-action-bar__btn--save" compid="save" data-compid="save" data-dcnode-id="1108" type="button"><span aria-hidden="true" class="icon-font icon-heart hz-user-action-button__icon" data-dcnode-id="1111"></span><span class="btn__label" data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Save</span></span></button><button anchortext="Comment" class="btn btn-default hz-user-action-button hz-user-action-bar__btn hz-user-action-bar__btn--comment" compid="comment" data-compid="comment" data-dcnode-id="1102" scopeid="viewQuestion" type="button"><span aria-hidden="true" class="icon-font icon-sb_solid hz-user-action-button__icon" data-dcnode-id="1107"></span><span class="btn__label" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Comment</span></span><span class="btn__label hz-user-action-button__counter" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">10</span></span></button></div><button aria-label="Follow this discussion" class="btn hzui-follow-button hz-track-me hz-question__follow-btn text-bold btn-secondary hzui-follow-button--unfollowed" compid="follow-button" data-dcnode-id="1098" data-objid="btn_follow"><span aria-hidden="true" class="hzi-font hzi-Follow hzui-follow-button__icon text-m mrs" data-dcnode-id="1100"></span><span data-dcnode-id="1099" instrument_node="">Follow</span></button></div></div><div class="hz-question-card-full hz-comments" data-dcnode-id="531" scopeid="feedComment"><div class="hz-comments__featured-comment" data-dcnode-id="1043"><div class="hz-comments__featured-comment-title" data-dcnode-id="1092"><div class="hz-comments__title header-4" data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Featured Answer</span></div><span aria-hidden="true" class="icon-font icon-circle_question" data-dcnode-id="1093"></span></div><li class="comment-list__item comment-list__best-comment-background" data-dcnode-id="1044" id="3982368"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="1045"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="1089"><a class="user-avatar-link" data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/nmgirl-gw"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="1091" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/res/27519650/pic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="1059"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="1086"><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/nmgirl-gw"><span data-dcnode-id="1088" instrument_node="">nmgirl</span></a></h6><div class="comment-list__item-time" data-dcnode-id="1076"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="1082"><span data-dcnode-id="1083"><span data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">12 years ago</span></span></span></div><div class="comment-list__item-time--modified text-xs text-muted" data-dcnode-id="1077"><span data-dcnode-id="1081" instrument_node="">last modified: </span><span data-dcnode-id="1078"><span data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">7 years ago</span></span></span></div></div><div class="hz-peekable__container" data-dcnode-id="1060"><div class="hz-peekable__mask" data-dcnode-id="1065"><div class="slide-toggle slide-toggle--collapsed" data-dcnode-id="1067" style="height:140px"><div class="message-body new-message-body text-l" data-dcnode-id="1068"><p data-dcnode-id="1070"><span data-dcnode-id="1075" instrument_node="">Putting a band or any sort of constriction around a tree or branch might crush or cut off the circulatory system of the plant. It comparable to putting a rubber band around a finger or a tourniquet around an arm or leg. Please don't do it. Inserting or installing nails, screws or whatever into the tree wounds it and, until the tree heals over the area, can be a source of disease or pest entrance. Never remove a nail or hook from a tree once it has been installed or if the tree has grown around it. Just cut it flush with the trunk and leave it. Hanging heavy objects from limbs will cut into the tree and also do damage. If you must hang items from a limb please pad it with a section of old hose, bicycle tire,...put something between the tree and whatever you're using to hang your object.</span><br data-dcnode-id="1074"><span data-dcnode-id="1073" instrument_node="">Consider investing in some shepherds hooks or attractive metal trellis/plant hangers that go in the ground instead of the tree. Since these can be moved around your garden they are much more useful in the long run.</span><br data-dcnode-id="1072"><span data-dcnode-id="1071" instrument_node="">Have a great day! </span></p><span data-dcnode-id="1069" instrument_node="">

ment_node="">

" objid="251826" posid="0"><div class="hz-text-clamp hz-inline-question__title" data-dcnode-id="974" style="height:48px"><p class="hz-text-clamp__text-node" data-dcnode-id="982" style="-webkit-line-clamp:2;-webkit-box-orient:vertical"><span data-dcnode-id="983" instrument_node="">Should I paint this dresser yellow, or play it safe and keep it white?</span></p><p data-dcnode-id="980" style="visibility: hidden; position: absolute; top: 0px; left: 0px; width: 244px;"><span data-dcnode-id="981" instrument_node="">Should I paint this dresser yellow, or play it safe and keep it white?</span></p><div data-dcnode-id="975" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="978" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="979" style="position: absolute; left: 0px; top: 0px; width: 254px; height: 58px;"></div></div><div data-dcnode-id="976" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="977" style="position:absolute;left:0;top:0;width:200%;height:200%"></div></div></div></div><div class="hz-inline-question__comment-no text-m" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Comments (23)</span></div><div class="hz-inline-question__comment" data-dcnode-id="967"><div class="hz-inline-question__comment-body" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Again, GO YELLOW!  It is such a cheerful color and the yellow dresser will just enhance the white crib instead of fighting it or looking too bland.  If you were painting the walls yellow, then I would paint the dresser the same white as the crib, but since you aren't, definitely, GO YELLOW!</span></div><div class="hz-inline-question__comment-see-more" data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">...See More</span></div></div></a><a class="hz-inline-question text-l" data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/discussions/628959/rug-must-stay-paint-must-go-stay-safe-or-take-a-chance" objid="628959" posid="1"><div class="hz-text-clamp hz-inline-question__title" data-dcnode-id="956" style="height:48px"><p class="hz-text-clamp__text-node" data-dcnode-id="964" style="-webkit-line-clamp:2;-webkit-box-orient:vertical"><span data-dcnode-id="965" instrument_node="">Rug must stay, paint must go--stay safe or take a chance?</span></p><p data-dcnode-id="962" style="visibility: hidden; position: absolute; top: 0px; left: 0px; width: 244px;"><span data-dcnode-id="963" instrument_node="">Rug must stay, paint must go--stay safe or take a chance?</span></p><div data-dcnode-id="957" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="960" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="961" style="position: absolute; left: 0px; top: 0px; width: 254px; height: 58px;"></div></div><div data-dcnode-id="958" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="959" style="position:absolute;left:0;top:0;width:200%;height:200%"></div></div></div></div><div class="hz-inline-question__comment-no text-m" data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Comments (22)</span></div><div class="hz-inline-question__comment" data-dcnode-id="949"><div class="hz-inline-question__comment-body" data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">I do like that color, carolins. I will have to take a look at it. I have never used yellow because I always hear how tricky it is. Do you think with a southern exposure room it will end up even yellower? I would have to do a big chip too to see how the color looks with the rug. It's a creamy white.
 
 The Sea Salt chip is pretty too. It is similar to Tranquility http://www.benjaminmoore.com/en-us/paint-color/tranquility#ce_s=tranquility but I think it's less green. Tranquility is seeming very green on our wall right now. Almost aqua. In my son's room in our old house, it was way more of a blue gray. Not sure whether it's a bad sample or our light. My husband could not believe it was the same color we had used before.</span></div><div class="hz-inline-question__comment-see-more" data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">...See More</span></div></div></a><a class="hz-inline-question text-l" data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/discussions/882292/do-you-have-a-safe-in-your-house" objid="882292" posid="2"><div class="hz-text-clamp hz-inline-question__title" data-dcnode-id="938" style="height:48px"><p class="hz-text-clamp__text-node" data-dcnode-id="946" style="-webkit-line-clamp:2;-webkit-box-orient:vertical"><span data-dcnode-id="947" instrument_node="">Do you have a safe in your house?</span></p><p data-dcnode-id="944" style="visibility: hidden; position: absolute; top: 0px; left: 0px; width: 244px;"><span data-dcnode-id="945" instrument_node="">Do you have a safe in your house?</span></p><div data-dcnode-id="939" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="942" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="943" style="position: absolute; left: 0px; top: 0px; width: 254px; height: 58px;"></div></div><div data-dcnode-id="940" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="941" style="position:absolute;left:0;top:0;width:200%;height:200%"></div></div></div></div><div class="hz-inline-question__comment-no text-m" data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Comments (70)</span></div><div class="hz-inline-question__comment" data-dcnode-id="931"><div class="hz-inline-question__comment-body" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">No one has mentioned what I believe is (or will soon be) the most common reason for needing a safe - prescription medications.  I have had addicted friends or family members steal meds from my home and my stepmother also lost meds this way.  I learned that the fire safes are useless for this.  Pounded or dropped enough, they just fall apart.  
 
 We have installed a $300 wall safe in the spot where a medicine cabinet used to go. It is screwed into the wall studs from inside the safe.  My carpenter then hid it behind a mirror using a piano hinge that is not really visible from the front at all.  I have tried to use a Magnetic Secret Latch system (below) to make it impossible to open the mirror, but I cannot figure how to make it work in my configuration.  I would recommend it as a great way to hide a safe, however!  If they just think your mirror is firmly attached to the wall, no one will find the safe behind it.  I would use one latch at the top, and another at the bottom of the wall mirror.  If we remodel, I will have the carpenter work the magnetic latch into the design.
 
 We keep money, unused credit cards, and my pain meds and the dog's pain meds and dog's phenobarbital in the safe.  Although it is digital, the safe does have a manual key and a battery-operated back up auxiliary pack for getting in if the internal battery dies.  For ease of memory, a childhood address is the code - not from the side of the family with the addict, though!
 
 http://www.leevalley.com/US/hardware/page.aspx?p=40353&amp;amp;cat=3,41399,41403</span></div><div class="hz-inline-question__comment-see-more" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">...See More</span></div></div></a><a class="hz-inline-question text-l" data-dcnode-id="912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/discussions/925604/storing-jewelry-in-a-safe-in-the-master-bedroom-closet" objid="925604" posid="3"><div class="hz-text-clamp hz-inline-question__title" data-dcnode-id="920" style="height:48px"><p class="hz-text-clamp__text-node" data-dcnode-id="928" style="-webkit-line-clamp:2;-webkit-box-orient:vertical"><span data-dcnode-id="929" instrument_node="">storing jewelry in a safe in the master bedroom closet</span></p><p data-dcnode-id="926" style="visibility: hidden; position: absolute; top: 0px; left: 0px; width: 244px;"><span data-dcnode-id="927" instrument_node="">storing jewelry in a safe in the master bedroom closet</span></p><div data-dcnode-id="921" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="924" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="925" style="position: absolute; left: 0px; top: 0px; width: 254px; height: 58px;"></div></div><div data-dcnode-id="922" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="923" style="position:absolute;left:0;top:0;width:200%;height:200%"></div></div></div></div><div class="hz-inline-question__comment-no text-m" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Comments (9)</span></div><div class="hz-inline-question__comment" data-dcnode-id="913"><div class="hz-inline-question__comment-body" data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">If the dimensions of your storage needs can only be accomplished by a square safe as pictured, you can easily incorporate the safe into a "hidden" area of the closet behind a closed door or false tall drawer front.  The safe could then be anchored to the closet material to make it even more difficult to disappear if discovered during a break in.  If the safe size you shared is not absolutely necessary, wall safes are a great alternative as they can be concealed behind hanging garments, and potential thieves would most likely never look behind clothing for valuables.  We install quite a few and our clients really find value in them.  The attached wall safe offers 6" depth in a 2 x 4 wall, which is nice additional depth compared to traditional wall safes being closer to 3 1/2" deep.</span></div><div class="hz-inline-question__comment-see-more" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">...See More</span></div></div></a></div></div></li><li class="comment-list__item" data-dcnode-id="813" id="3982373"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="814"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="906"><a class="user-avatar-link" data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/goldenpond-gw"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="908" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/res/27519650/pic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="828"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="903"><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/goldenpond-gw"><span data-dcnode-id="905" instrument_node="">goldenpond</span></a></h6><div class="comment-list__item-time" data-dcnode-id="893"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="899"><span data-dcnode-id="900"><span data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">12 years ago</span></span></span></div><div class="comment-list__item-time--modified text-xs text-muted" data-dcnode-id="894"><span data-dcnode-id="898" instrument_node="">last modified: </span><span data-dcnode-id="895"><span data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">7 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="829"><p data-dcnode-id="879"><span data-dcnode-id="892" instrument_node="">I think you will find everyone has an opinion.I agree it could be detrimental to some trees,apparently not all. With the humidity and diseases in Florida I only poke the Palm tree(which are really a fibrous grass) that I know I will remove in the future.The Laurel Oaks here are so shallow rooted you cannot disturb the roots or drive on them. Because we had heavy equipment here to dig our ponds Mine went into distress. A year later I lost 8 to Hypoxylon Oak Cancre and have since lost many </span><a class="colorLink" data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//others.it/" rel="nofollow" target="_blank"><span data-dcnode-id="891" instrument_node="">others.It</span></a><span data-dcnode-id="889" instrument_node=""> is devasting to lose a mature tree.</span><br data-dcnode-id="888"><span data-dcnode-id="887" instrument_node="">here is from the arbor Day </span><a class="colorLink" data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//site.it/" rel="nofollow" target="_blank"><span data-dcnode-id="886" instrument_node="">site.It</span></a><span data-dcnode-id="884" instrument_node=""> is about carving but helps you understand about the cambium layer</span><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">******************************************************</span><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">Arbor Day Foundation We inspire people to plant, nurture, and celebrate trees. </span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Question: </span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">I have some mature trees, Cottonwood and Cherry, that I wanted to try some carving on. I wanted to remove the bark and chisel faces into the wood. I know that winter is the time for pruning, but I wonder if I would do the trees serious harm? Any thoughts? </span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Answer: </span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Answers from our Tree Forum: </span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="865" instrument_node="">Quirky Quercus said:</span><br data-dcnode-id="864"><span data-dcnode-id="863" instrument_node="">I could be wrong but I don't think you're going to find many proponents of carving into the bark of live trees here. </span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">If you decide to do it, it would be fitting to carve a frown face as wounding the tree unnecessarily can't be good. No guarantees that it will do harm, but it sure as heck isn't going to bring about better health of the tree. </span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">I remember seeing wooden tree faces at a nursery once that you can hang on the tree with a nail. Sure, that's not great either but if your trees absolutely have to have a face and you want to carve it, I think that's the ticket. Carve into a piece of wood and then hang it up. </span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="854" instrument_node="">Ellyssian said:</span><br data-dcnode-id="853"><span data-dcnode-id="852" instrument_node="">I would advise against it. </span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">The cambium - the part of the tree that is actually alive - is directly below the bark. If you cut into that, you stop all the nutrients from going to and from the roots and leaves for the parts you cut. </span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">If you cut a wide enough, just-deep-enough, area around the entire tree (known as "girdling"), you will most likely kill the tree. This is often used as a way to remove trees in forest management - where the tree is not in a place where it is a danger to whatever it might fall on. </span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Smaller cuts - and sometimes some trees with full girdling - can heal themselves, but the cut is a point for insects and disease to enter the tree and cause further damage. </span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="840" instrument_node="">Red Maple said:</span><br data-dcnode-id="839"><span data-dcnode-id="838" instrument_node="">Along woodland trails the American beech tree's smooth bark is often covered with the carvings of initials and names. Carvings into beech bark will last for the lifespan of the tree. Once a tree has been carved on it is so tempting for the next person to add their mark. </span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Ellyssian &amp; Quirky Quercus are right. The wounds caused by the carvings leave the tree open for fungi or wood damaging insects. </span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Best to leave your cherry and cottonwood trees alone. Enjoy them as they are. </span></p><span data-dcnode-id="830" instrument_node="">
</span></div></div><div class="comment-list__item-footer" data-container="Comment Actions" data-dcnode-id="816"><ul class="comment-list__item-actions text-xxs text-muted mb0 mrl" data-dcnode-id="817"><li class="comment-list__item-action comment-list__item-action--like" data-dcnode-id="823"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-dcnode-id="824"><span aria-hidden="true" class="icon-font icon-thumb_solid comment-list__item-action-btn-icon" data-compid="comment_like" data-component="Like" data-dcnode-id="827"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-compid="comment_show_like" data-component="Like" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Like | 1</span></span></button></li><li class="comment-list__item-action comment-list__item-action--save mlm" data-dcnode-id="818"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-compid="comment_save" data-component="Save" data-dcnode-id="819"><span aria-hidden="true" class="icon-font icon-heart comment-list__item-action-btn-icon" data-dcnode-id="822"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Save</span></span></button></li></ul></div><div class="comment-list__item-best-comment" data-dcnode-id="815"></div></div></li><li class="comment-list__item" data-dcnode-id="765" id="3982375"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="766"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="810"><a class="user-avatar-link" data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/dcarch7"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="812" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//st.hzcdn.com/fimgs/7463caaf0a32a35b_8059-w 0-h40-b0-p0--.jpg&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="693"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="717"><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/spedigrees"><span data-dcnode-id="719" instrument_node="">spedigrees z4VT</span></a></h6><div class="comment-list__item-time" data-dcnode-id="707"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="713"><span data-dcnode-id="714"><span data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">12 years ago</span></span></span></div><div class="comment-list__item-time--modified text-xs text-muted" data-dcnode-id="708"><span data-dcnode-id="712" instrument_node="">last modified: </span><span data-dcnode-id="709"><span data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">7 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="694"><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Our Vermont sugar maples are full of hundreds of drilled holes from years and years of tapping for maple syrup manufacturing. If this hurt the trees, sugar makers would have all gone bankrupt long ago. </span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">In fact I worked for many years at a plywood mill where trees were peeled into layers of veneer on a lathe. It was common to find slices of maple wood riddled with holes from sugar makers' taps, and we even found the occasional bullets that had been lodged in the wood for years. </span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">In my lifetime we have employed trees as fenceposts and they live on today unimpaired by many generations of barbed wire partially embedded in the bark and wood. Likewise with the quaking aspen that held my clothesline for decades. It has finally lived its natural life and died of old age at about 40 years (very old for an aspen.) </span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">The caution not to remove a hook from your tree once it is placed is a good one.</span></p><span data-dcnode-id="695" instrument_node="">
</span></div></div><div class="comment-list__item-footer" data-container="Comment Actions" data-dcnode-id="681"><ul class="comment-list__item-actions text-xxs text-muted mb0 mrl" data-dcnode-id="682"><li class="comment-list__item-action comment-list__item-action--like" data-dcnode-id="688"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-dcnode-id="689"><span aria-hidden="true" class="icon-font icon-thumb_solid comment-list__item-action-btn-icon" data-compid="comment_like" data-component="Like" data-dcnode-id="692"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-compid="comment_show_like" data-component="Like" data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Like | 1</span></span></button></li><li class="comment-list__item-action comment-list__item-action--save mlm" data-dcnode-id="683"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-compid="comment_save" data-component="Save" data-dcnode-id="684"><span aria-hidden="true" class="icon-font icon-heart comment-list__item-action-btn-icon" data-dcnode-id="687"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Save</span></span></button></li></ul></div><div class="comment-list__item-best-comment" data-dcnode-id="680"></div></div></li><li class="comment-list__item" data-dcnode-id="642" id="16638252"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="643"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="675"><a class="user-avatar-link" data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/snydr-knnth"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="677" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/res/27519650/pic/user_0
