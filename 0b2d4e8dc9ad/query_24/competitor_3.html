</span><div class="trellis-comment-content" data-dcnode-id="321"><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">I have a young plant that has long arching limbs. Where do I cut back on those?  The rest of the shrub is fine.</span></p><span data-dcnode-id="322" instrument_node="">
</span></div><span data-dcnode-id="320" instrument_node="">
</span><div class="trellis-comment-child trellis-comment-new" data-dcnode-id="300"><span data-dcnode-id="319" instrument_node="">
</span><div class="trellis-comment-header" data-dcnode-id="308"><span data-dcnode-id="318" instrument_node="">
</span><div class="trellis-comment-text" data-dcnode-id="310"><span data-dcnode-id="317" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Carol Speake</span></p><span data-dcnode-id="314" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Saturday 24th of April 2021</span></p><span data-dcnode-id="311" instrument_node="">
</span></div><span data-dcnode-id="309" instrument_node="">
</span></div><span data-dcnode-id="307" instrument_node="">
</span><div data-dcnode-id="302"><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">The growth nature of a forsythia is that it has long arching limbs. These are desirable. If you trim them, it will change the overall look of the plant. If they are too large for your garden spot, you can cut the entire limb off close to the ground.</span></p><span data-dcnode-id="303" instrument_node="">
</span></div><span data-dcnode-id="301" instrument_node="">
</span></div><span data-dcnode-id="299" instrument_node="">
</span></div><span data-dcnode-id="297" instrument_node="">
</span><div class="trellis-comment trellis-comment-new" data-dcnode-id="253"><span data-dcnode-id="296" instrument_node="">
</span><div class="trellis-comment-header" data-dcnode-id="285"><span data-dcnode-id="295" instrument_node="">
</span><div class="trellis-comment-text" data-dcnode-id="287"><span data-dcnode-id="294" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Bonnie</span></p><span data-dcnode-id="291" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Thursday 19th of November 2020</span></p><span data-dcnode-id="288" instrument_node="">
</span></div><span data-dcnode-id="286" instrument_node="">
</span></div><span data-dcnode-id="284" instrument_node="">
</span><div class="trellis-comment-content" data-dcnode-id="279"><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Hello Carol,
My forsythia bushes cover a large area in the corner of my yard and they are very old.  They were here when I moved in 37 years ago!  I prune them every year, but I think they need a hard pruning now. Can I cut them down to 3 feet or so instead of all the way to the ground?  It's mid-November and I would do this within the week, which is  hopefully not too late.</span></p><span data-dcnode-id="280" instrument_node="">
</span></div><span data-dcnode-id="278" instrument_node="">
</span><div class="trellis-comment-child trellis-comment-new" data-dcnode-id="255"><span data-dcnode-id="277" instrument_node="">
</span><div class="trellis-comment-header" data-dcnode-id="266"><span data-dcnode-id="276" instrument_node="">
</span><div class="trellis-comment-text" data-dcnode-id="268"><span data-dcnode-id="275" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Carol Speake</span></p><span data-dcnode-id="272" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Thursday 19th of November 2020</span></p><span data-dcnode-id="269" instrument_node="">
</span></div><span data-dcnode-id="267" instrument_node="">
</span></div><span data-dcnode-id="265" instrument_node="">
</span><div data-dcnode-id="257"><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">In my opinion, pruning of forsythia canes should be close to the ground. I normally prune the oldest canes each year right to the ground and leave the others for flowering. Hard pruning is really only recommended for totally overgrown forsythia.</span></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">If you cut the branches off at three feet, you'll have all the branches sprouting new growth which will alter the arching habit of the perennial. Pruning is normally done in the spring right after flowering. Doing it now will mean that you'll get no blooms next spring.</span></p><span data-dcnode-id="258" instrument_node="">
</span></div><span data-dcnode-id="256" instrument_node="">
</span></div><span data-dcnode-id="254" instrument_node="">
</span></div><span data-dcnode-id="252" instrument_node="">
</span><div class="trellis-comment trellis-comment-new" data-dcnode-id="208"><span data-dcnode-id="251" instrument_node="">
</span><div class="trellis-comment-header" data-dcnode-id="240"><span data-dcnode-id="250" instrument_node="">
</span><div class="trellis-comment-text" data-dcnode-id="242"><span data-dcnode-id="249" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Kathy</span></p><span data-dcnode-id="246" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Thursday 27th of August 2020</span></p><span data-dcnode-id="243" instrument_node="">
</span></div><span data-dcnode-id="241" instrument_node="">
</span></div><span data-dcnode-id="239" instrument_node="">
</span><div class="trellis-comment-content" data-dcnode-id="234"><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Hello Carol!
I loved your article! so much information! We had 4 forsythia bushes which were a mess and taking over the garden. We hard pruned them after they had blossomed this past spring. I misunderstood the timing of this. So, now, along with seeingly a number of other plants, are really growing during this co-vid summer. Now the forsythia each have many branches, some are 3-4 feet tall. Should we be pruning anything at this point?
They seem to be growing in all directions. Please advise! Thank you in advance for your advice. We live in upstate NY.</span></p><span data-dcnode-id="235" instrument_node="">
</span></div><span data-dcnode-id="233" instrument_node="">
</span><div class="trellis-comment-child trellis-comment-new" data-dcnode-id="210"><span data-dcnode-id="232" instrument_node="">
</span><div class="trellis-comment-header" data-dcnode-id="221"><span data-dcnode-id="231" instrument_node="">
</span><div class="trellis-comment-text" data-dcnode-id="223"><span data-dcnode-id="230" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Carol Speake</span></p><span data-dcnode-id="227" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Sunday 30th of August 2020</span></p><span data-dcnode-id="224" instrument_node="">
</span></div><span data-dcnode-id="222" instrument_node="">
</span></div><span data-dcnode-id="220" instrument_node="">
</span><div data-dcnode-id="212"><span data-dcnode-id="219" instrument_node="">
</span><p data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">The new canes will grow in weird directions during the first year. They get more graceful over time.  Pruning after flowering allows the flower buds to form for next year. The plant CAN be pruned at other times, but it may result in a loss of flowers for one season.</span></p><span data-dcnode-id="216" instrument_node="">
</span><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">I normally prune mine only in spring but if branches are getting in the way, I will removed them right down to the soil at any time.</span></p><span data-dcnode-id="213" instrument_node="">
</span></div><span data-dcnode-id="211" instrument_node="">
</span></div><span data-dcnode-id="209" instrument_node="">
</span></div><span data-dcnode-id="207" instrument_node="">
</span><div class="trellis-comment trellis-comment-new" data-dcnode-id="163"><span data-dcnode-id="206" instrument_node="">
</span><div class="trellis-comment-header" data-dcnode-id="195"><span data-dcnode-id="205" instrument_node="">
</span><div class="trellis-comment-text" data-dcnode-id="197"><span data-dcnode-id="204" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">John K Atchley</span></p><span data-dcnode-id="201" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Friday 15th of May 2020</span></p><span data-dcnode-id="198" instrument_node="">
</span></div><span data-dcnode-id="196" instrument_node="">
</span></div><span data-dcnode-id="194" instrument_node="">
</span><div class="trellis-comment-content" data-dcnode-id="189"><span data-dcnode-id="193" instrument_node="">
</span><p data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">I am in the process of cutting down a huge Forsythia in the outer corner of the back yard of my town house. The house was built in 1984, and the Forsythia may be that old. It has always blossomed beautifully, and could be seen from Google satellite views. However, as you so correctly warn, it got out of control. It was a good 10 or 11 feet high, and had spread out with numerous branches tip rooting in a circle around the center about 10 or 12 feet from the center. This year I noticed that the back half seemed to have a lot of dead branches, so I decided to drastically cut it back. It has taken days, as I cut long branches into 6 to 12 inch pieces to fill those large lawn clipping bags, 8 of them so far. My questions is, will anything grow from the old main stems? They are trunks, as much as 3 inches in diameter, gnarled and wooden. I will have to use a saw to cut back the last 3 or 4 feet. Or is it too late and they will die? If so, I guess I will have to dig them out, which could be a big job. Also, are the tip rooted babies worth saving? I have cut most of those stems that grew straight up back to 12 to 18 inches. I really only want one nice plant in the corner as the yard is small. Is it possible to send you photos?</span></p><span data-dcnode-id="190" instrument_node="">
</span></div><span data-dcnode-id="188" instrument_node="">
</span><div class="trellis-comment-child trellis-comment-new" data-dcnode-id="165"><span data-dcnode-id="187" instrument_node="">
</span><div class="trellis-comment-header" data-dcnode-id="176"><span data-dcnode-id="186" instrument_node="">
</span><div class="trellis-comment-text" data-dcnode-id="178"><span data-dcnode-id="185" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Carol Speake</span></p><span data-dcnode-id="182" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">Saturday 16th of May 2020</span></p><span data-dcnode-id="179" instrument_node="">
</span></div><span data-dcnode-id="177" instrument_node="">
</span></div><span data-dcnode-id="175" instrument_node="">
</span><div data-dcnode-id="167"><span data-dcnode-id="174" instrument_node="">
</span><p data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">From my experience, every cane that I cut back to just above ground level re-grew just above the cut area to produce more additional healthy canes.  I've never had a forsythia with such a huge trunk at the base to say exactly, just my observation of each of the canes I have cut myself.</span></p><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">In my experience, all my tip rooted plants could be dug up and planted elsewhere and will make new plants.</span></p><span data-dcnode-id="168" instrument_node="">
</span></div><span data-dcnode-id="166" instrument_node="">
</span></div><span data-dcnode-id="164" instrument_node="">
</span></div><span data-dcnode-id="162" instrument_node="">
</span><div class="trellis-comment trellis-comment-new" data-dcnode-id="112"><span data-dcnode-id="161" instrument_node="">
</span><div class="trellis-comment-header" data-dcnode-id="150"><span data-dcnode-id="160" instrument_node="">
</span><div class="trellis-comment-text" data-dcnode-id="152"><span data-dcnode-id="159" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">Diane Kistner</span></p><span data-dcnode-id="156" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">Wednesday 28th of August 2019</span></p><span data-dcnode-id="153" instrument_node="">
</span></div><span data-dcnode-id="151" instrument_node="">
</span></div><span data-dcnode-id="149" instrument_node="">
</span><div class="trellis-comment-content" data-dcnode-id="144"><span data-dcnode-id="148" instrument_node="">
</span><p data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">Great article! I'm planning to rehabilitate a gigantic forsythia in a corner of my back yard and plant it all along my 160' back chainlink fence to let it be itself and hopefully help keep deer from jumping the fence. To be honest, this lot is huge and I am old and I wouldn't care if the replantings don't take off ten feet from the back line. I don't want to have to do a lot of pruning after I get the new plants placed. How far apart and how far from the fence would you plant the babies for this purpose? I would not be surprised if there are not 20 plants all around this Forsythia Monster I've got to tackle!</span></p><span data-dcnode-id="145" instrument_node="">
</span></div><span data-dcnode-id="143" instrument_node="">
</span><div class="trellis-comment-child trellis-comment-new" data-dcnode-id="114"><span data-dcnode-id="142" instrument_node="">
</span><div class="trellis-comment-header" data-dcnode-id="131"><span data-dcnode-id="141" instrument_node="">
</span><div class="trellis-comment-text" data-dcnode-id="133"><span data-dcnode-id="140" instrument_node="">
</span><p class="trellis-comment-author" data-dcnode-id="138"><span data-dcnode-id="139" instrument_node="">Carol</span></p><span data-dcnode-id="137" instrument_node="">
</span><p class="trellis-comment-date" data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">Saturday 31st of August 2019</span></p><span data-dcnode-id="134" instrument_node="">
</span></div><span data-dcnode-id="132" instrument_node="">
</span></div><span data-dcnode-id="130" instrument_node="">
</span><div data-dcnode-id="116"><span data-dcnode-id="129" instrument_node="">
</span><p data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">Hi Diane,</span></p><span data-dcnode-id="126" instrument_node="">
</span><p data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">I have a row of forsythia that are along my chain link fence.  Originally, I planted them about 3 feet out from the fence and about 6 feet apart.  Even with this spacing them really took over the area.  As long as you don’t have anything planted in front of them, this spacing should do for you.</span></p><span data-dcnode-id="123" instrument_node="">
</span><p data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">I had a garden bed in front, so I am pruning the forsythias in their position to eventually make a hedge, so I planted the tip rooted pieces between each large forsythia.</span></p><span data-dcnode-id="120" instrument_node="">
</span><p data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">If left alone, forsythia will eventually root on each branch that touches the ground.</span></p><span data-dcnode-id="117" instrument_node="">
