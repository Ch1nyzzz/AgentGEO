</span><article class="article-post article post-33653 post type-post status-publish format-standard has-post-thumbnail hentry category-flowers category-gardening-tips category-gardens category-landscaping category-outdoor-plants category-perennials category-trees mv-content-wrapper grow-content-body" data-dcnode-id="391" id="post-33653"><span data-dcnode-id="928" instrument_node="">
</span><header class="entry-header header-singular wrapper" data-dcnode-id="912"><span data-dcnode-id="927" instrument_node="">
</span><h1 class="entry-title article-heading" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Renovation Pruning Forsythia Shrubs vs Hard Pruning Forsythia</span></h1><span data-dcnode-id="924" instrument_node="">
</span><div class="article-meta post-meta-wrapper post-meta-single post-meta-single-top no-author-meta" data-dcnode-id="914"><span data-dcnode-id="923" instrument_node="">
</span><p class="meta-wrapper" data-dcnode-id="916"><span class="posted-on" data-dcnode-id="917"><span class="screen-reader-text" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Posted on </span></span><span data-dcnode-id="920" instrument_node="">Published: </span><time class="entry-date" data-dcnode-id="918" datetime="2018-05-03T15:00:20-04:00"><span data-dcnode-id="919" instrument_node="">05/03/2018</span></time></span></p><span data-dcnode-id="915" instrument_node="">
</span></div><span data-dcnode-id="913" instrument_node="">
</span></header><span data-dcnode-id="911" instrument_node="">
</span><div class="entry-content mvt-content" data-dcnode-id="415"><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="904"><a data-dcnode-id="906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/tips-growing-forsythia-bushes/"><span data-dcnode-id="907" instrument_node="">Forsythia bushes</span></a><span data-dcnode-id="905" instrument_node=""> have a wonderful arching habit will makes them a great focal point when planted in a large garden bed. All shrubs need pruning, but what do you do when you have totally overgrown forsythia shrub?</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">It’s either time for hard pruning or renovation pruning for them.</span></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Rejuvenating forsythia gives them a new lease on life.&nbsp; Basically, you take the plant right back to the crown, sacrifice buds for next year but the plant is much healthier for it.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="896" instrument_node="">Check out this article for more information on </span><a data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/forsythia-bushes-care/"><span data-dcnode-id="895" instrument_node="">forsythia bushes</span></a><span data-dcnode-id="893" instrument_node="">. It talks about pruning, transplanting, forcing and other gardening tasks related to forsythia.</span><noscript data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-33806 size-full" title="Steps for pruning overgrown forsythia bushes" src="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning.jpg" alt="Renovation Pruning for Overgrown Forsythia Shrubs vs Hard Pruning Forsythia. This tutorial shows the difference between renovation pruning and hard pruning of forsythia. See my step by step process to trim very overgrown forsythia bushes" width="700" height="1052" srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-333x500.jpg 333w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-681x1024.jpg 681w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-300x451.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-560x842.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-260x391.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-170x255.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Renovation Pruning for Overgrown Forsythia Shrubs vs Hard Pruning Forsythia. This tutorial shows the difference between renovation pruning and hard pruning of forsythia. See my step by step process to trim very overgrown forsythia bushes" class="aligncenter wp-image-33806 size-full lazyload" data-dcnode-id="890" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-333x500.jpg 333w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-681x1024.jpg 681w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-300x451.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-560x842.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-260x391.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-170x255.jpg 170w" height="1052" id="mv-trellis-img-1" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-333x500.jpg 333w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-681x1024.jpg 681w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-300x451.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-560x842.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-260x391.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-renovation-pruning-170x255.jpg 170w" title="Steps for pruning overgrown forsythia bushes" width="700"></p><span data-dcnode-id="888" instrument_node="">
</span><div class="mv-video-target mv-video-id-lupmtfrnwjmmg48dku7f" data-dcnode-id="887" data-video-id="lupmtfrnwjmmg48dku7f" data-volume="70"></div><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="885" instrument_node="">If you stay on top of </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/pruning-forsythia-trim-forsythia-bushes/"><span data-dcnode-id="884" instrument_node="">pruning forsythia bushes</span></a><span data-dcnode-id="882" instrument_node=""> you will be able to keep them well under control. But a neglected shrub can grow to quite an immense size in both height and width.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Remember that the plant throws up many new canes each year, and what once started as a pretty 3 foot shrub will become an overgrown monster that takes over the whole garden space in just a few short years.</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="876" instrument_node="">We all know forsythia as a </span><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/growing-perennials/"><span data-dcnode-id="875" instrument_node="">perennial plant</span></a><span data-dcnode-id="873" instrument_node=""> loved for its early yellow spring flowers and pretty arching growth habit.&nbsp; It is one of the earliest shrubs to flower in spring and can also be </span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/forcing-forsythia-indoors/"><span data-dcnode-id="872" instrument_node="">forced indoors</span></a><span data-dcnode-id="870" instrument_node=""> very easily.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">But an overgrown forsythia will get leggy, will lose the arching habit from having the branches lopped off mid length,&nbsp; and lack the luster of a well pruned shrub.</span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="864" instrument_node="">Sometimes the answer is to move the forsythia bush.&nbsp;See my tips for </span><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/transplanting-forsythia/"><span data-dcnode-id="863" instrument_node="">transplanting forsythia</span></a><span data-dcnode-id="861" instrument_node=""> here. But often renovation pruning will do just fine.</span></p><span data-dcnode-id="859" instrument_node="">
</span><h3 data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">When to rejuvenate forsythia</span></h3><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">The best time for trimming most flowering shrubs is the in the spring, right after the plant blooms.&nbsp; If you wait until summer or fall, you will be cutting down on the number of spring flowers that you get next year.&nbsp;</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Forsythia blooms on old wood, so pruning too late will cut off the flower buds that formed earlier in the year.</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Annual pruning is a good idea to keep the shrub manageable in size. All good intentions aside, sometimes this just doesn’t happen and you end up with a huge shrub that has taken over.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">My forsythia shrubs were a mass of yellow color this spring.&nbsp;</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="843" instrument_node="">Little did I know that my lack of pruning the last couple of years, while giving me great blooms, also gave me a plant that is pretty unruly this year!</span><noscript data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-33804 size-full" title="Forsythia in spring" src="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring.jpg" alt="Forsythia bush in bloom in spring" width="700" height="643" srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-500x459.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-300x276.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-560x514.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-260x239.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-170x156.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Forsythia bush in bloom in spring" class="aligncenter wp-image-33804 size-full lazyload" data-dcnode-id="840" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-500x459.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-300x276.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-560x514.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-260x239.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-170x156.jpg 170w" height="643" id="mv-trellis-img-2" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-500x459.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-300x276.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-560x514.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-260x239.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-bush-spring-170x156.jpg 170w" title="Forsythia in spring" width="700"></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">The rule of thumb, when it comes to forsythias, of cutting about a third of the canes is only for yearly pruning where you plan to remove just a few of the branches. In the case of renovation pruning or hard pruning, other factors come into play.</span></p><span data-dcnode-id="835" instrument_node="">
</span><h2 data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">What is the difference between renovation pruning and hard pruning?</span></h2><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Think of a house renovation. When you talk about renovating a house, you are doing perhaps one room at a time.&nbsp; It’s rare to take the whole house back to the studs and start over.&nbsp; The same idea goes for plants.&nbsp;</span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Renovation pruning thins out a plant by leaving most of the plant but removing the oldest and weakest branches.&nbsp; It’s also called rejuvenation pruning.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">It gives the plant a chance to grow new branches that are more healthy and vigorous.&nbsp; Hard pruning cuts the shrub right down to its base and allows it to regrow into a new shrub.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Renovation pruning of shrubs leaves you a better looking plant (temporarily,) which may still flower the flowing year.</span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Hard pruning leaves an unsightly stub for a while and you’ll have to wait a couple of years for the plant to flower again. Also note that some plants can’t take hard pruning.</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">(Red Bush is a good example of a plant that can easily be killed if its cut back too far – Ask my husband.)</span></p><span data-dcnode-id="814" instrument_node="">
</span><h3 data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Tools for renovation pruning and hard pruning</span></h3><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">I used both bypass pruners and long handled tree pruners for my pruning job.&nbsp; None of my forsythia canes were much larger than about 1 1/4 inch in size so these two tools did the job well.&nbsp;</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">I used the long handled pruners for the larger canes and the bypass prunes for the smaller branches that were unhealthy looking or took up too much center space.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">The long handled tools give more leverage and make the job of cutting the thicker branches much easier. They also gave me a cleaner cut.</span></p><span data-dcnode-id="802" instrument_node="">
</span><h2 data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Renovation Pruning of Forsythia</span></h2><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">I have forsythia bushes that grow along one side of my garden. They all started from one plant which got dug up and divided into 7 individual shrubs. That was four years ago.&nbsp;</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="795" instrument_node="">They are so large now, that the</span><a data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/hiding-chain-link-fences/"><span data-dcnode-id="794" instrument_node=""> chain link fence is totally hidden</span></a><span data-dcnode-id="792" instrument_node=""> (good) but the plants in front of the forsythia are getting lost.&nbsp;</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="786"><noscript data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-33663 size-full" title="Forsythia shrubs along a fence line in need of pruning" src="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs.jpg" alt="Row of forsythia shrubs" width="700" height="474" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-500x339.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-300x203.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-560x379.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-260x176.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-170x115.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Row of forsythia shrubs" class="aligncenter wp-image-33663 size-full lazyload" data-dcnode-id="787" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-500x339.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-300x203.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-560x379.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-260x176.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-170x115.jpg 170w" height="474" id="mv-trellis-img-3" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-500x339.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-300x203.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-560x379.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-260x176.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-shrubs-170x115.jpg 170w" title="Forsythia shrubs along a fence line in need of pruning" width="700"></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">The shrubs are not so overgrown that they need to be chopped right now to the ground. But they really do need to be resized so that they fit better into the garden bed where they are planted.</span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">It’s time to get out the tree loppers and get this line of forsythia bushes into a smaller size.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Most of the shrubs still have quite a nice shape, but are just too large for the location and dwarf the other plants growing nearby.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">The branches are growing into the fence and need more than a </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/pruning-forsythia-trim-forsythia-bushes/"><span data-dcnode-id="774" instrument_node="">light pruning</span></a><span data-dcnode-id="772" instrument_node="">, but not so much as to change the overall shape.</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="769" instrument_node="">It’s time for some selective </span><em data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">renovation pruning</span></em><span data-dcnode-id="766" instrument_node=""> to change the look of this shrub into a more tidy one and smaller one.&nbsp;</span><noscript data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-33664 size-full" title="Overgrown forsythia bush" src="https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush.jpg" alt="Overgrown forsythia bush in need of some renovation pruning" width="700" height="467" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-500x334.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-300x200.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-560x374.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-260x173.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-170x113.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Overgrown forsythia bush in need of some renovation pruning" class="aligncenter wp-image-33664 size-full lazyload" data-dcnode-id="763" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-500x334.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-300x200.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-560x374.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-260x173.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-170x113.jpg 170w" height="467" id="mv-trellis-img-4" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-500x334.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-300x200.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-560x374.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-260x173.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/overgrown-forgthia-bush-170x113.jpg 170w" title="Overgrown forsythia bush" width="700"></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="760" instrument_node="">There are a few steps to take when you try&nbsp;</span><em data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">renovation pruning</span></em><span data-dcnode-id="757" instrument_node=""> on forsythia shrubs.&nbsp; First, remove 1/3 of the canes as low to the base as you can get.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Once a forsythia is quite a mature size (as in like mine), this should be done each year.</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">The oldest branches will produce less and less flowers over time, so they are the ones to remove.&nbsp; It’s easy to tell which ones they are, since they have the largest diameter and often have spit tips that can get pretty mangled looking.</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">The arching habit of the forsythia bush may be lovely to look at but it sure isn’t lovely when you decide to prune the plant.&nbsp; How on earth do you get close enough to the inside of the shrub to remove them?</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Forsythia are such leafy shrubs that it is very difficult to see into the center to decide what to cut back, unless you prune in the winter when the leaves are gone.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">My answer was to use car roof tie down ratchet straps to tie up the whole bush so that I could see the base.&nbsp; It was then easy to figure out which branches to remove without poking my eyes out.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="739" instrument_node="">I cut the oldest and thickest canes while the plant was tied up and then removed the straps so that I could thin to get the shape I wanted.</span><noscript data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-33665" src="https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush.jpg" alt="Car straps make it easy to get to the base of a large forsythia to prune it." width="700" height="689" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-500x492.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-300x295.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-560x551.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-260x256.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-170x167.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Car straps make it easy to get to the base of a large forsythia to prune it." class="aligncenter size-full wp-image-33665 lazyload" data-dcnode-id="736" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-500x492.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-300x295.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-560x551.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-260x256.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-170x167.jpg 170w" height="689" id="mv-trellis-img-5" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-500x492.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-300x295.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-560x551.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-260x256.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/tied-up-forsythia-bush-170x167.jpg 170w" width="700"></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">The ties also showed me just how many baby forsythias were growing around the base of the plant. No wonder the shrub looked so large! At least now I can see what I am taking out for canes.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">A well groomed forsythia plant should look like a large vase that holds long arching feathers.&nbsp;&nbsp;That is its natural shape.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="727" instrument_node="">Trying to trim it into a ball or a </span><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/gardens-that-make-a-big-impact/"><span data-dcnode-id="726" instrument_node="">forsythia hedge</span></a><span data-dcnode-id="724" instrument_node=""> is going to give you a season of more and more trimming, as well as reducing the number of flowers you’ll get next spring.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Go with nature, not against it!</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Don’t worry too much about exactly which canes to remove.&nbsp; I just look for the thickest ones.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="715" instrument_node="">The idea is to reduce the size of the plant , not to worry too much at this stage about the shape of it. The plant will take care of that in time.</span><noscript data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-33666 size-full" title="old thick forsythia canes" src="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes.jpg" alt="Forsythia canes ready for pruning" width="700" height="652" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-500x466.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-300x279.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-560x522.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-260x242.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-170x158.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Forsythia canes ready for pruning" class="aligncenter wp-image-33666 size-full lazyload" data-dcnode-id="712" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-500x466.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-300x279.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-560x522.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-260x242.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-170x158.jpg 170w" height="652" id="mv-trellis-img-6" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-500x466.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-300x279.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-560x522.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-260x242.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-canes-170x158.jpg 170w" title="old thick forsythia canes" width="700"></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">After the oldest canes have been removed, examine the shrub.&nbsp; Just&nbsp; have a look for other canes that seem weak, dead and unhealthy and for those that cross over the middle of the bush, ruining the shape of the shrub.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Thinning them out will give you a better looking and more healthy plant. Remember that since forsythia blooms on old wood, removing a lot of the old canes will likely mean that you won’t get as many flowers next year.&nbsp;&nbsp;</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Also, look for those canes that have been “headed” with a split tip.&nbsp; These branches have more leaves and side branches than a traditional forsythia cone and interrupt the look of the shape. Follow those back to the base and remove them.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">They are always the ugliest branches and usually the thickest one. </span><noscript data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-33667 size-full" title="Headed forsythia branch" src="https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch.jpg" alt="Forsythia branches that have been headed need to be removed." width="700" height="415" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-500x296.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-300x178.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-560x332.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-260x154.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-170x101.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Forsythia branches that have been headed need to be removed." class="aligncenter wp-image-33667 size-full lazyload" data-dcnode-id="697" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-500x296.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-300x178.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-560x332.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-260x154.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-170x101.jpg 170w" height="415" id="mv-trellis-img-7" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-500x296.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-300x178.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-560x332.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-260x154.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/headed-forsythia-branch-170x101.jpg 170w" title="Headed forsythia branch" width="700"></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Other branches to look for to remove are those that are very low and growing close to the ground. They will eventually tip root, so get rid of them.&nbsp;</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Think of a vase of flowers.&nbsp; That is sort of what you want as the base of your plant with the branches spilling out the top.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Be sure to cut at least a few canes from the center of the plant.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">This will give room for new healthy growth and will also allow sunlight to reach into the center of the plant.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">This way, you will get new growth from the base and not just side shoots from the longer branches (which is what gives it a mangy look as it ages.)</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">A good rule of thumb for renovation pruning is to remove about 1/4 to 1/3 of the oldest and weakest canes.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">If the plant is really overgrown,&nbsp; like mine were, you can remove about half of them. Renovation pruning can be done in either spring (best, in my opinion) or fall.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">I advise against it in summer, since pruning is stressful on a plant and you don’t need drought situations added to the mix.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="670" instrument_node="">The picture below shows the shrub after pruning it down quite a bit.&nbsp; So much prettier looking than my overgrown mess!</span><noscript data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-33802 size-full" title="Forsythia shrub after pruning" src="https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub.jpg" alt="Pruned forsythia shrub" width="700" height="504" srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-500x360.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-300x216.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-560x403.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-260x187.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-170x122.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Pruned forsythia shrub" class="aligncenter wp-image-33802 size-full lazyload" data-dcnode-id="667" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-500x360.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-300x216.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-560x403.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-260x187.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-170x122.jpg 170w" height="504" id="mv-trellis-img-8" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-500x360.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-300x216.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-560x403.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-260x187.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/pruned-forsythia-shrub-170x122.jpg 170w" title="Forsythia shrub after pruning" width="700"></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">The finished shrub will have a much better size and will still have a similar shape, although it won’t be as full.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Since it is early in the year, the additional growth will fill in but the branches will be much more healthy and lush looking with no damaged canes.</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">A few less flowers next year, perhaps, but this is a small price to pay for a much smaller shrub that will allow the other plants in the garden to shine too!</span></p><span data-dcnode-id="656" instrument_node="">
</span><h2 data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">When do you hard prune forsythia?</span></h2><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">The best time to </span><em data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">hard prune forsythia</span></em><span data-dcnode-id="649" instrument_node=""> is when the plant has become so over grown that normal pruning won’t do much and the branches are starting to have sparse areas where no leaves grow and they look mangled.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Another time is when the plant is just taking over the area in the garden where you have it planted.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">I had one forsythia bush that needed to be cut right back and it’s sending up new growth in just a few weeks. It had been taken over by a honeysuckle vine that was growing all through it.&nbsp;</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">I couldn’t get into the center to find out what growth belonged to which plant, so I hard pruned it fairly close to the ground.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="637" instrument_node="">The whole left side of the forsythia was a tangled mess of honeysuckle!</span><noscript data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-33668 size-full" title="overgrown forsythia" src="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle.jpg" alt="Forsythia and honeysuckle growing in together" width="700" height="480" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-500x343.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-300x206.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-560x384.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-260x178.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-170x117.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Forsythia and honeysuckle growing in together" class="aligncenter wp-image-33668 size-full lazyload" data-dcnode-id="634" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-500x343.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-300x206.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-560x384.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-260x178.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-170x117.jpg 170w" height="480" id="mv-trellis-img-9" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-500x343.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-300x206.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-560x384.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-260x178.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/forsythia-honeysuckle-170x117.jpg 170w" title="overgrown forsythia" width="700"></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">I just cut it down to about 18″ from the ground trying to leave some of the new growth that had already started. It’s still early spring so it won’t suffer from extra heat and I can get rid of the honeysuckle at the same time that was growing along the fence top.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">I will watch this one and shape it as it grows to make sure I get the shape I want.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">It looks a bit odd in the center of my long row, but it had so many mangled canes and vine overgrowth that it really needed a buzz cut!</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="622" instrument_node="">I would normally wait until fall with hard pruning, but the plant is part of the line of shrubs along the fence, so it got done now.</span><noscript data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-33669 size-full" title="Hard pruned forsythia bush with new growth" src="https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia.jpg" alt="How to prune a forsythia branch" width="700" height="794" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-441x500.jpg 441w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-300x340.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-560x635.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-260x295.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-170x193.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="How to prune a forsythia branch" class="aligncenter wp-image-33669 size-full lazyload" data-dcnode-id="619" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-441x500.jpg 441w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-300x340.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-560x635.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-260x295.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-170x193.jpg 170w" height="794" id="mv-trellis-img-10" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-441x500.jpg 441w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-300x340.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-560x635.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-260x295.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/hard-pruned-forsythia-170x193.jpg 170w" title="Hard pruned forsythia bush with new growth" width="700"></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Hard pruning forsythia is normally best done in late fall. It won’t flower next year anyway and pruning it then will allow you to enjoy the look of the plant as it grows during the summer.</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Plus, you won’t have the ugly stub staring at you when you are out and about in the garden.</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">It will also give the plant an extra month of growth.&nbsp; You WILL lose the flowers the following spring but you’ll still get the lush new growth of leaves.</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">The growth rate of forsythia is very fast, so you won’t have that ugly clump for long.&nbsp;</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Cutting back forsythia bushes is actually easier to do than renovation pruning.&nbsp; You just cut all the canes close to the ground.</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">When the plant starts growing again, you’ll get new branches that are more healthy.&nbsp;</span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">New canes will look quite different from the old mature ones. The new shoots are thin and very straight and grow very quickly.&nbsp; They have few flowers and long spaces along the length.</span></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Eventually they will begin to arch and put on some side branches and flowers as they turn into replacement canes for the ones you have removed.</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="590" style="color: #800080;"><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Note: Be careful with hard pruning.</span></strong></span><span data-dcnode-id="589" instrument_node="">&nbsp; If your forsythia shrub is quite old, cutting it back this far may kill the plant.&nbsp; &nbsp;</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">But since old and overgrown forsythia bushes look pretty awful and don’t flower well, that may not be a bad thing. Perhaps, it’s just time for a new one.&nbsp;&nbsp;</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">The good news is that the arching habit of forsythia is just what you need for new plants. The plant naturally tip roots.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">The weight of the branches dip down and touch the ground and then the tips will root and begin a new shrub.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">I had some good sized ones around the base of each of my plants that were well established.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="571"><noscript data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-33670 size-full" title="Forsythia tip rooted plants" src="https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets.jpg" alt="Forsythia shrubs tip root easily. These can be dug up and replanted in another area." width="700" height="510" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-500x364.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-300x219.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-560x408.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-260x189.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-170x124.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Forsythia shrubs tip root easily. These can be dug up and replanted in another area." class="aligncenter wp-image-33670 size-full lazyload" data-dcnode-id="572" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-500x364.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-300x219.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-560x408.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-260x189.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-170x124.jpg 170w" height="510" id="mv-trellis-img-11" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-500x364.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-300x219.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-560x408.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-260x189.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/04/tip-offsets-170x124.jpg 170w" title="Forsythia tip rooted plants" width="700"></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">A mature forsythia, untended for a few years might look like one plant but actually be 8 or more!&nbsp; I had two or three around most of my shrubs.</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Left untended, these extra plants can take over a whole bed, which is one of the reason my other plants were being dwarfed!</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">However, they were easy to dig up and I got a whole batch of </span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/plant-propagation-tips/"><span data-dcnode-id="562" instrument_node="">plants for free</span></a><span data-dcnode-id="560" instrument_node="">.</span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="557" instrument_node="">Transplanting forsythia offsets is very easy and they take very well. I intend to plant them on two sides of a stairway of a backyard garden storage shed, as well as along the back fence of our large back lawn.</span><noscript data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-33809 size-full" title="forsythia branches in a bucket" src="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots.jpg" alt="Rooted Forsythia branches" width="700" height="553" srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-500x395.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-300x237.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-560x442.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-260x205.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-170x134.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Rooted Forsythia branches" class="aligncenter wp-image-33809 size-full lazyload" data-dcnode-id="554" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-500x395.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-300x237.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-560x442.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-260x205.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-170x134.jpg 170w" height="553" id="mv-trellis-img-12" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-500x395.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-300x237.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-560x442.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-260x205.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/forsythia-tip-roots-170x134.jpg 170w" title="forsythia branches in a bucket" width="700"></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">I had 7 overgrown forsythia shrubs that needed renovation pruning. As I pruned them down the fence line, I just pulled up the baby plants growing nearby and stuck them in a bucket of water.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">When I was done, I had at least a dozen more plants, and about 5 pretty good sized shrubs that just need digging up and transplanting somewhere else in the yard.&nbsp; They tip root in a ridiculously easy way. Looks like my gardening buddies will be getting a new plant!</span></p><span data-dcnode-id="546" instrument_node="">
</span><h2 data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Mistakes people make when pruning forsythia bushes</span></h2><span data-dcnode-id="543" instrument_node="">
</span><ul data-dcnode-id="526"><span data-dcnode-id="542" instrument_node="">
</span><li data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Worrying too much about which canes to choose. Forsythia is a very forgiving plant.&nbsp; You really can’t go wrong just by remove the oldest mangiest looking, thickest canes.</span></li><span data-dcnode-id="539" instrument_node="">
</span><li data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Not taking the size of a mature plant into consideration. Forsythias will be a big plant. Trying to tame it forever is a losing proposition.&nbsp; Plant it with room to grow or you’ll always be stressing about getting it to the right size.</span></li><span data-dcnode-id="536" instrument_node="">
</span><li data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Pruning at the wrong time. Remember that the blooms grow on old wood. Early spring is best for most pruning other than very hard pruning.</span></li><span data-dcnode-id="533" instrument_node="">
</span><li data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Cutting off too many canes. I get it.&nbsp; It’s hard to see the canes let along get into the plant to start removing them.&nbsp; But don’t just cut the whole shrub to the ground unless it really needs it. It can kill a plant that is not as established just as easily as a really old one. Selective pruning is often best.</span></li><span data-dcnode-id="530" instrument_node="">
</span><li data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Not understanding the natural shape of the plant. A forsythia should look like a vase with cascading flowers.&nbsp; Trying to turn it into a hedge or a finely pruned topiary just won’t work well. It will look ugly and won’t flower much.&nbsp;</span></li><span data-dcnode-id="527" instrument_node="">
</span></ul><span data-dcnode-id="525" instrument_node="">
</span><h3 data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">A word on the size of forsythia shrubs</span></h3><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="521" instrument_node="">When you </span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.naturehills.com/bushes-and-shrubs/bushes-and-shrubs-varieties/forsythia-bushes" rel="noopener" target="_blank"><span data-dcnode-id="520" instrument_node="">walk into a nursery and come out with a forsythia plant</span></a><span data-dcnode-id="518" instrument_node="">, it will be just a tiny fraction of it’s mature size.&nbsp; Forsythia shrubs will easily grow to 10 feet tall and just about as wide. (Mine were at least 6 by 6 feet in just four years!)</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Keep the mature size in mind when you are planting and give the shrub plenty of room around it to grow.&nbsp; Then you won’t have to worry so much about the plant taking over a garden bed.&nbsp;</span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="512" instrument_node="">This overgrown forsythia might look pretty big but in the world of huge forsythia bushes, it’s just a baby!&nbsp; Give it a few years more of this neglect and you won’t be able to get near it!</span><noscript data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-33808 size-full" title="badly overgrown forsythia bush" src="https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia.jpg" alt="Huge overgrown forsythia" width="700" height="728" srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-481x500.jpg 481w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-300x312.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-560x582.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-260x270.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-170x177.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Huge overgrown forsythia" class="aligncenter wp-image-33808 size-full lazyload" data-dcnode-id="509" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-481x500.jpg 481w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-300x312.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-560x582.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-260x270.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-170x177.jpg 170w" height="728" id="mv-trellis-img-13" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-481x500.jpg 481w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-300x312.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-560x582.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-260x270.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/overgrown-forsythia-170x177.jpg 170w" title="badly overgrown forsythia bush" width="700"></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">All babies eventually grow up.&nbsp; Baby forsythias won’t stay small for long.&nbsp; When they are all grown up and adult, they look best in the middle of a lawn or large garden bed, where they can arch out to their hearts content.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">(But watch for those tip roots, or you will have a whole yard full of the plant!)</span></p><span data-dcnode-id="501" instrument_node="">
</span><h2 data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Forsythia Shrubs after Renovation Pruning</span></h2><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Once I realized how overgrown my forsythia shrubs had gotten, I gave them all a very heavy renovation pruning.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Not a hard prune all the way down, since it is spring and I don’t want to see stumps along the fence line, but a significant prune just the same.</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="491" instrument_node="">I can see into my neighbor’s yard now, but the bushes are much less mangled and overgrown. I am missing the way they covered the metal fence but it won’t be long before that is the case again. Forsythia bushes grow quickly.</span><noscript data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-33803 size-full" title="Forsythia shrubs along a fence line" src="https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line.jpg" alt="Forsythia shrubs after renovation pruning" width="700" height="464" srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-500x331.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-300x199.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-560x371.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-260x172.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-170x113.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Forsythia shrubs after renovation pruning" class="aligncenter wp-image-33803 size-full lazyload" data-dcnode-id="488" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-500x331.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-300x199.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-560x371.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-260x172.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-170x113.jpg 170w" height="464" id="mv-trellis-img-14" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-500x331.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-300x199.jpg 300w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-560x371.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-260x172.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2018/05/shrubs-fence-line-170x113.jpg 170w" title="Forsythia shrubs along a fence line" width="700"></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">It is almost as though I planted new shrubs. I can’t believe the overgrown mess that I had here a few days ago is so tidy and small looking now!</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Forsythia are quite forgiving plants.&nbsp;</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Try to spend a few minutes renovating them each spring by removing older canes and you won’t have to go to the more drastic effort of hard pruning and starting over to get a new plant.</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="471"><br data-dcnode-id="474"><span data-dcnode-id="473" instrument_node="">
