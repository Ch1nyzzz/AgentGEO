    How to Trim an Overgrown Camellia Bush
  </span></h1><span data-dcnode-id="587" instrument_node=""> </span><h2 class="article-subtitle" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">
</span></h2><span data-dcnode-id="584" instrument_node=""> </span><div class="component-article-byline" data-dcnode-id="533"><div class="writer-info" data-dcnode-id="536"><div class="writer-name-article-date ui-label" data-dcnode-id="571"><span class="writer-name" data-dcnode-id="578"><span data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">By </span></span><span data-dcnode-id="581" instrument_node=""> </span><span class="writer-profile-link ui-label-bold" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">
          Sarah Terry
        </span></span></span><span data-dcnode-id="577" instrument_node=""> </span><span data-dcnode-id="575" instrument_node=""> </span><span data-dcnode-id="573" instrument_node=""> </span></div><span data-dcnode-id="570" instrument_node=""> </span><span data-dcnode-id="568" instrument_node=""> </span><span data-dcnode-id="566" instrument_node=""> </span><div class="component-contributor-bio-modal" data-dcnode-id="537" style="display:none;"><div class="contributor-bio-mask" data-dcnode-id="538"><div class="contributor-bio-wrapper" data-dcnode-id="539"><div class="contributor-bio-container" data-dcnode-id="540"><div class="icon-close" data-dcnode-id="565"></div><span data-dcnode-id="564" instrument_node=""> </span><div class="component-personnel-module view-user-profile" data-dcnode-id="544"><div class="personnel-wrapper" data-dcnode-id="545"><span data-dcnode-id="562" instrument_node=""> </span><div class="personnel-detail-wrapper" data-dcnode-id="546"><div class="name" data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">
        Sarah Terry
      </span></div><span data-dcnode-id="559" instrument_node=""> </span><span data-dcnode-id="557" instrument_node=""> </span><div class="bio-wrapper" data-dcnode-id="551"><div class="" data-dcnode-id="554"><div class="bio" data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Sarah Terry brings over 10 years of experience writing novels, business-to-business newsletters and a plethora of how-to articles. Terry has written articles and publications for a wide range of markets and subject matters, including Medicine &amp; Health, Eli Financial, Dartnell Publications and Eli Journals.</span></div></div><span data-dcnode-id="553" instrument_node=""> </span></div><span data-dcnode-id="550" instrument_node=""> </span><span data-dcnode-id="548" instrument_node=""> </span></div></div></div><span data-dcnode-id="543" instrument_node=""> </span><a class="link editorial-standards-link" data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hunker.com/editorial-process"><span data-dcnode-id="542" instrument_node="">Our Editorial Process</span></a></div></div></div></div></div><span data-dcnode-id="535" instrument_node=""> </span></div></div><span data-dcnode-id="531" instrument_node=""> </span><span data-dcnode-id="529" instrument_node=""> </span><div class="component-compensation-disclaimer ui-label desktop-hide" data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">
  Hunker may earn compensation through affiliate links in this story.
</span></div><span data-dcnode-id="526" instrument_node=""> </span><div class="article-content-wrapper" data-dcnode-id="83"><span data-dcnode-id="524" instrument_node=""> </span><div class="article-sections-container" data-dcnode-id="314"><div class="component-article-pinnable-images" data-dcnode-id="523"></div><span data-dcnode-id="522" instrument_node=""> </span><article adunitpathdesktop="/6117/hunker/" adunitpathmobile="/6117/hunker.mw/" class="component-article-sections" data-dcnode-id="353"><div class="component-article-section-tip ui-body article-section-module desktop-hide mobile-hide article-section-content content-section-0" data-dcnode-id="514"><h4 class="heading ui-heading-3" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Tip</span></h4><span data-dcnode-id="519" instrument_node=""> </span><div class="tip" data-dcnode-id="515"><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">If you want to reduce the size of your overgrown camellia, you may need to trim it in a three-step process over the course of several years. During spring in the first year, cut back the camellia’s branches to the desired height. In the second spring, cut back all the new growth that developed over the previous growing season so that the camellia is at the desired height once again. Then, trim back the camellia again in the third year to remove the bushy crown and reduce the growth to the preferred height.</span></p><span data-dcnode-id="516" instrument_node="">
</span></div></div><div class="component-article-section-warning ui-body article-section-module desktop-hide mobile-hide article-section-content" data-dcnode-id="506"><h4 class="heading ui-heading-3" data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Warning</span></h4><span data-dcnode-id="511" instrument_node=""> </span><div class="warning" data-dcnode-id="507"><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">If you’re performing a severe pruning, don’t cut the camellia back to more than 18 inches from the ground. Camellias cut back to 2 feet or taller won’t properly regrow and branch correctly near the ground.</span></p><span data-dcnode-id="508" instrument_node="">
</span></div></div><div class="component-article-section-image image-full-width article-image-2 article-section-content" data-dcnode-id="479"><div class="component-pinterest visible" data-dcnode-id="504"><div class="svg pinterest-pin" data-dcnode-id="505"></div></div><span data-dcnode-id="503" instrument_node=""> </span><div class="image-container" data-dcnode-id="488"><div class="image-wrapper svg logo" data-dcnode-id="489"><span data-dcnode-id="501" instrument_node=""> </span><span data-dcnode-id="499" instrument_node=""> </span><div class="component-responsive-picture" data-dcnode-id="490"><div data-dcnode-id="491"><picture class="picture" data-dcnode-id="492" style="position:null;"><source data-dcnode-id="498" media="(min-width: 500px)" srcset="https://img.hunkercdn.com/630x/clsd/getty/cache.gettyimages.com/f2579880e79c43bc90100776f950ffa8.jpg?type=webp" type="image/webp"><source data-dcnode-id="497" media="(min-width: 500px)" srcset="https://img.hunkercdn.com/630x/clsd/getty/cache.gettyimages.com/f2579880e79c43bc90100776f950ffa8.jpg"><source data-dcnode-id="496" media="(min-width: 300px)" srcset="https://img.hunkercdn.com/375/clsd/getty/cache.gettyimages.com/f2579880e79c43bc90100776f950ffa8.jpg?type=webp" type="image/webp"><source data-dcnode-id="495" media="(min-width: 300px)" srcset="https://img.hunkercdn.com/375/clsd/getty/cache.gettyimages.com/f2579880e79c43bc90100776f950ffa8.jpg"><span data-dcnode-id="494" instrument_node=""> </span><img alt="..." class="picture__image" data-dcnode-id="493" height="477" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.hunkercdn.com/375/clsd/getty/cache.gettyimages.com/f2579880e79c43bc90100776f950ffa8.jpg&amp;raw" width="358"></picture></div></div></div></div><span data-dcnode-id="487" instrument_node=""> </span><div class="component-caption-module" data-dcnode-id="482"><div class="caption__caption-text ui-label" data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">
    Older camellia shrubs can become overgrown, requiring extensive pruning.
  </span></div><span data-dcnode-id="484" instrument_node=""> </span></div><span data-dcnode-id="481" instrument_node=""> </span></div><div class="component-article-section-content ui-body article-section-content" data-dcnode-id="475"><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Camellias are large shrubs that are popular due to their evergreen, broad leaves and large, showy flowers that bloom from winter through spring. Without adequate yearly pruning, your camellia can become overgrown, producing less-attractive flowers and developing thin branches. Overgrown camellias are even more susceptible to winter injury from cold temperatures and strong winds. Prune your camellia to rejuvenate it in late spring or after the shrub is finished flowering. You can perform a very severe pruning on your overgrown camellia or you can employ a gentler pruning method.</span></p><span data-dcnode-id="476" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="468"><div class="inline-ad inline-ad--mobile" data-dcnode-id="469"><p class="inline-ad__label ui-label" data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">

    </span></p><span data-dcnode-id="472" instrument_node=""> </span><div class="inline-ad__wrapper inline-ad__wrapper_runway" data-dcnode-id="470"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="1" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/hunker.mw/slot1-1" data-ad-refresh="false" data-ad-sizes="[[300,250]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_1&quot;}" data-ad-type="gpt" data-dcnode-id="471" id="slot1-1" reveadrefresh="false"></div></div></div></div><div class="component-article-section-jwplayer-wrapper" data-dcnode-id="446"><div class="component-article-section-jwplayer" data-dcnode-id="447"><p class="component-article-section-jwplayer-label" data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">

    </span></p><span data-dcnode-id="465" instrument_node=""> </span><div class="component-article-section-jwplayer-container-outer" data-dcnode-id="448"><div class="component-article-section-jwplayer-container" data-dcnode-id="449"><div class="jw-error jw-reset" data-dcnode-id="453" id="lg-jwplayer" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="454"><div class="jw-icon jw-reset" data-dcnode-id="460"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="461" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="462"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="455"><div class="jw-error-text jw-reset-text" data-dcnode-id="456" data-nosnippet="" dir="auto"><span data-dcnode-id="459" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="458"></span><span data-dcnode-id="457" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div><span data-dcnode-id="452" instrument_node=""> </span><div data-dcnode-id="450" id="lg-jwplayer-close"><span class="close-x" data-dcnode-id="451"></span></div></div></div></div></div><div class="component-article-section-heading article-section-content" data-dcnode-id="443"><h2 data-dcnode-id="444" id="gentler-pruning"><span data-dcnode-id="445" instrument_node="">
    Gentler Pruning
  </span></h2></div><div class="component-article-steps article-section-content" data-dcnode-id="396"><div class="component-article-step article-section-content" data-dcnode-id="428"><div class="component-article-section-heading article-section-content" data-dcnode-id="440"><h2 data-dcnode-id="441" id="step-"><span data-dcnode-id="442" instrument_node="">
    Step 1
  </span></h2></div><div class="component-article-section-content ui-body article-section-content content-section-0" data-dcnode-id="436"><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Prune away all dead, weak or damaged stems and shoots from your camellia, using pruning shears or loppers. Cut these branches and stems back to the main stem or nearest branch intersection. Cut back or trim any long shoots that have become overgrown.</span></p><span data-dcnode-id="437" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="429"><div class="inline-ad inline-ad--mobile" data-dcnode-id="430"><p class="inline-ad__label ui-label" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">
      Advertisement
    </span></p><span data-dcnode-id="433" instrument_node=""> </span><div class="inline-ad__wrapper inline-ad__wrapper_runway" data-dcnode-id="431"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="1" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/hunker.mw/slot1-2" data-ad-refresh="false" data-ad-sizes="[[300,250]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_2&quot;}" data-ad-type="gpt" data-dcnode-id="432" id="slot1-2" reveadrefresh="false"></div></div></div></div></div><div class="component-article-step article-section-content" data-dcnode-id="420"><div class="component-article-section-heading article-section-content" data-dcnode-id="425"><h2 data-dcnode-id="426" id="step-"><span data-dcnode-id="427" instrument_node="">
    Step 2
  </span></h2></div><div class="component-article-section-content ui-body article-section-content content-section-0" data-dcnode-id="421"><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Thin out twiggy and crowded growth to ensure that sunlight can penetrate the inside of the camellia shrub. Remove all crossing or rubbing and scraggly branches, cutting them back to the main stem.</span></p><span data-dcnode-id="422" instrument_node="">
</span></div></div><div class="component-article-step article-section-content" data-dcnode-id="405"><div class="component-article-section-heading article-section-content" data-dcnode-id="417"><h2 data-dcnode-id="418" id="step-"><span data-dcnode-id="419" instrument_node="">
    Step 3
  </span></h2></div><div class="component-article-section-content ui-body article-section-content content-section-0" data-dcnode-id="413"><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Encourage your camellia to grow into a bushier form by pruning some of its branches back to the base of the newest growth. Cut the limbs back to the nearest bud to this point, and then several new shoots will emerge from the buds below the pruning cut.</span></p><span data-dcnode-id="414" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="406"><div class="inline-ad inline-ad--mobile" data-dcnode-id="407"><p class="inline-ad__label ui-label" data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">
      Advertisement
    </span></p><span data-dcnode-id="410" instrument_node=""> </span><div class="inline-ad__wrapper" data-dcnode-id="408"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="2" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/hunker.mw/slot1-3" data-ad-refresh="false" data-ad-sizes="[[300,250],[320,50],[320,100]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_3&quot;}" data-ad-type="gpt" data-dcnode-id="409" id="slot1-3" reveadrefresh="false"></div></div></div></div></div><div class="component-article-step article-section-content" data-dcnode-id="397"><div class="component-article-section-heading article-section-content" data-dcnode-id="402"><h2 data-dcnode-id="403" id="step-"><span data-dcnode-id="404" instrument_node="">
    Step 4
  </span></h2></div><div class="component-article-section-content ui-body article-section-content content-section-0" data-dcnode-id="398"><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Prune away all the branches around the lowest part of the camellia's trunk as well, if your camellia is very large and old. Doing this, along with removing all the crossing, twiggy and weak growth, will rejuvenate the shrub into a more attractive tree-like form.</span></p><span data-dcnode-id="399" instrument_node="">
</span></div></div></div><div class="component-article-section-heading article-section-content" data-dcnode-id="393"><h2 data-dcnode-id="394" id="severe-pruning"><span data-dcnode-id="395" instrument_node="">
    Severe Pruning
  </span></h2></div><div class="component-article-steps article-section-content" data-dcnode-id="361"><div class="component-article-step article-section-content" data-dcnode-id="378"><div class="component-article-section-heading article-section-content" data-dcnode-id="390"><h2 data-dcnode-id="391" id="step-"><span data-dcnode-id="392" instrument_node="">
    Step 1
  </span></h2></div><div class="component-article-section-content ui-body article-section-content content-section-0" data-dcnode-id="386"><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Cut the overgrown camellia back severely, leaving only 1 to 1 1/2 feet of growth above the ground. Remove most of the camellia shrub's branches and foliage. Perform this pruning in late winter or early spring.</span></p><span data-dcnode-id="387" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="379"><div class="inline-ad inline-ad--mobile" data-dcnode-id="380"><p class="inline-ad__label ui-label" data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">
      Advertisement
    </span></p><span data-dcnode-id="383" instrument_node=""> </span><div class="inline-ad__wrapper" data-dcnode-id="381"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="2" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/hunker.mw/slot1-4" data-ad-refresh="false" data-ad-sizes="[[300,250],[320,50],[320,100]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_4&quot;}" data-ad-type="gpt" data-dcnode-id="382" id="slot1-4" reveadrefresh="false"></div></div></div></div></div><div class="component-article-step article-section-content" data-dcnode-id="370"><div class="component-article-section-heading article-section-content" data-dcnode-id="375"><h2 data-dcnode-id="376" id="step-"><span data-dcnode-id="377" instrument_node="">
    Step 2
  </span></h2></div><div class="component-article-section-content ui-body article-section-content content-section-0" data-dcnode-id="371"><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Thin all new shoots that emerge during early to midsummer by cutting any crowded shoots back to the main stems. Remove these shoots when they're about 10 to 12 inches long. In addition to preventing crowded growth, thinning out the shoots also promotes healthy branching.</span></p><span data-dcnode-id="372" instrument_node="">
</span></div></div><div class="component-article-step article-section-content" data-dcnode-id="362"><div class="component-article-section-heading article-section-content" data-dcnode-id="367"><h2 data-dcnode-id="368" id="step-"><span data-dcnode-id="369" instrument_node="">
    Step 3
  </span></h2></div><div class="component-article-section-content ui-body article-section-content content-section-0" data-dcnode-id="363"><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Continue to perform annual pruning of the rejuvenated camellia every spring, just after the flowers fade. Prune away all leggy, crowded, crossing, rubbing, dead or damaged growth from the camellia to keep it from becoming overgrown and unhealthy again.</span></p><span data-dcnode-id="364" instrument_node="">
</span></div></div></div><div class="component-article-section-inline-ad" data-dcnode-id="354"><div class="inline-ad inline-ad--mobile" data-dcnode-id="355"><p class="inline-ad__label ui-label" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">
