</span><p data-dcnode-id="1188"><a data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independenttree.com/seasonal-news-tips/"><span data-dcnode-id="1190" instrument_node="">BACK TO BLOG</span></a></p><span data-dcnode-id="1187" instrument_node=""> </span></div><span data-dcnode-id="1185" instrument_node="">

</span><div class="fl-col-group fl-node-5fa0a69ca52f1" data-dcnode-id="566" data-node="5fa0a69ca52f1"><span data-dcnode-id="1172" instrument_node="">
</span><div class="fl-col fl-node-5fa0a69ca53e5" data-dcnode-id="893" data-node="5fa0a69ca53e5"><span data-dcnode-id="1171" instrument_node="">
</span><div class="fl-col-content fl-node-content" data-dcnode-id="895"><span data-dcnode-id="1170" instrument_node="">
</span><div class="fl-module fl-module-fl-post-content fl-node-5fa0a5d9b161b it-blog-post" data-dcnode-id="897" data-node="5fa0a5d9b161b"><span data-dcnode-id="1169" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="899"><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><img alt="Close up of red flowers on a branch of flowering quince, a type of shrub that can be rejuvenation pruned every few years" class="aligncenter size-full wp-image-2588" data-dcnode-id="1167" height="500" loading="lazy" sizes="(max-width: 850px) 100vw, 850px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/IT-header-flowering-quince-rejuvenation-pruning.jpg&amp;raw" srcset="https://2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/IT-header-flowering-quince-rejuvenation-pruning.jpg 850w, https://2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/IT-header-flowering-quince-rejuvenation-pruning-300x176.jpg 300w, https://2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/IT-header-flowering-quince-rejuvenation-pruning-768x452.jpg 768w" width="850"></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Are your shrubs looking overgrown or crowded? Did they only produce a few flowers or fruit last year? If so, it’s probably time for rejuvenation pruning!</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">In this article, we answer all of your questions about this special pruning technique so you’ll know whether or not it’s a good option for your own shrubs.</span></p><span data-dcnode-id="1159" instrument_node="">
</span><h2 data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">What is rejuvenation pruning?</span></h2><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Periodically, large, deciduous shrubs need more extensive pruning than they usually receive. This is called rejuvenation pruning, and it involves removing branches all the way down to their base. That’s right – the entire shrub is cut off just above ground level or up to 6” to 12” above the soil, depending on the type of shrub.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1149" id="attachment_2582" style="width: 860px"><img alt="A red twig dogwood with flowers " aria-describedby="caption-attachment-2582" class="size-full wp-image-2582" data-dcnode-id="1152" height="500" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/IT-blog-Red_twig_dogwood.jpg&amp;raw" width="850"><p class="wp-caption-text" data-dcnode-id="1150" id="caption-attachment-2582"><span data-dcnode-id="1151" instrument_node="">Red twig dogwood can benefit from rejuvenation pruning</span></p></div><span data-dcnode-id="1148" instrument_node="">
</span><h2 data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Why is rejuvenation pruning done?</span></h2><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">This type of extreme pruning is done to “rejuvenate” the health of shrubs that have become too overgrown or woody to look their best or to thrive. Without regular pruning, shrubs can get crowded, look misshapen, produce fewer flowers, and develop a bare interior without leaves. At that stage, regular pruning is not enough to correct the problems.</span></p><span data-dcnode-id="1142" instrument_node="">
</span><h2 data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">What are the benefits of cutting a shrub to the ground?</span></h2><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">When done to the right type of shrub (more on that below), rejuvenation pruning results in:</span></p><span data-dcnode-id="1136" instrument_node="">
</span><ul data-dcnode-id="1125"><span data-dcnode-id="1135" instrument_node="">
</span><li data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">a smaller plant that flowers more profusely,</span></li><span data-dcnode-id="1132" instrument_node="">
</span><li data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">new stems with much brighter color (such as with red-twig dogwood), and</span></li><span data-dcnode-id="1129" instrument_node="">
</span><li data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">a shrub that’s easier to control with regular thinning.</span></li><span data-dcnode-id="1126" instrument_node="">
</span></ul><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1123" instrument_node="">The new, healthy growth and more compact shape also </span><a data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independenttree.com/pruning-landscape-shrubs-ornamental-trees/"><span data-dcnode-id="1122" instrument_node="">improve the shrub’s overall appearance</span></a><span data-dcnode-id="1120" instrument_node="">.</span></p><span data-dcnode-id="1118" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1114" id="attachment_2583" style="width: 860px"><img alt="Vibernum plant in bloom with white small flowers" aria-describedby="caption-attachment-2583" class="size-full wp-image-2583" data-dcnode-id="1117" height="500" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/IT-blog-viburnum.jpg&amp;raw" width="850"><p class="wp-caption-text" data-dcnode-id="1115" id="caption-attachment-2583"><span data-dcnode-id="1116" instrument_node="">Viburnum flowers can bloom more profusely after a rejuvenation pruning</span></p></div><span data-dcnode-id="1113" instrument_node="">
</span><h2 data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">What’s the best time to do rejuvenation pruning? Does it matter?</span></h2><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Late winter or early spring are the best times to perform rejuvenation pruning on a shrub. The exact time depends on the weather, but here in northeast Ohio it’s usually in February or March.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Wait till the very cold temperatures are over and then prune before new growth starts to appear.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><h2 data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">How often should I do rejuvenation pruning on a shrub?</span></h2><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1100" instrument_node="">Rejuvenation pruning is typically&nbsp;done only every three to five years, usually when the shrub starts to look overgrown or stops flowering. Cutting off all the stems and leaves is a huge stressor to the plant so it’s best not to do it too often. Stressed shrubs are more </span><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independenttree.com/pest-disease-protection/"><span data-dcnode-id="1099" instrument_node="">susceptible to disease and pests</span></a><span data-dcnode-id="1097" instrument_node=""> plus, when cut back too frequently, the shrub may become too weak to fully recover.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><h2 data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Are there any shrubs that should NOT be pruned this way?</span></h2><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1083"><strong data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Hard pruning can be damaging or fatal to the wrong plant</span></strong><span data-dcnode-id="1089" instrument_node=""> so let’s cover what shrubs </span><strong data-dcnode-id="1085"><em data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">don’t</span></em><span data-dcnode-id="1086" instrument_node=""> </span></strong><span data-dcnode-id="1084" instrument_node="">need rejuvenation pruning, and why.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">DON’T use rejuvenation pruning techniques on:</span></p><span data-dcnode-id="1079" instrument_node="">
</span><ul data-dcnode-id="1051"><span data-dcnode-id="1078" instrument_node="">
</span><li data-dcnode-id="1074"><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Any shrub in poor health</span></strong><span data-dcnode-id="1075" instrument_node=""> or recovering from insect damage, disease, or water stress. Leave fragile shrubs to regain their vigor, and be sure to provide enough irrigation and organic fertilizer to help them along.</span></li><span data-dcnode-id="1073" instrument_node="">
</span><li data-dcnode-id="1069"><strong data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Evergreen shrubs</span></strong><span data-dcnode-id="1070" instrument_node="">, which have different pruning requirements. If you cut an evergreen down to its base, it will not re-grow, and you’ll have a stump to dig out.</span></li><span data-dcnode-id="1068" instrument_node="">
</span><li data-dcnode-id="1064"><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Shrubs that are woody and overgrown</span></strong><span data-dcnode-id="1065" instrument_node="">, with leaves and new growth appearing only at the very ends of branches. Shrubs with 1/3 or more of their mass made up of dead twigs and branches need incremental pruning over time to slowly coax new growth along its stems (although that’s not always possible – sometimes it’s better to simply remove the shrub).</span></li><span data-dcnode-id="1063" instrument_node="">
</span><li data-dcnode-id="1059"><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Shrubs with a single main stem</span></strong><span data-dcnode-id="1060" instrument_node=""> or leader. Any shrub that’s like a small tree, with branches above a vertical stem, should be pruned differently. If you prune off that single stem, it’s all over.</span></li><span data-dcnode-id="1058" instrument_node="">
</span><li data-dcnode-id="1053"><span data-dcnode-id="1057" instrument_node="">Finally, </span><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">if you’re pruning a cultivar that’s budded onto a different rootstock</span></strong><span data-dcnode-id="1054" instrument_node="">, don’t cut it to the ground. The regrowth will be from the rootstock, not the cultivar.</span></li><span data-dcnode-id="1052" instrument_node="">
</span></ul><span data-dcnode-id="1050" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1046" id="attachment_2585" style="width: 860px"><img alt="A large grouping of boxwood shrubs, an evergreen bush" aria-describedby="caption-attachment-2585" class="size-full wp-image-2585" data-dcnode-id="1049" height="500" loading="lazy" sizes="(max-width: 850px) 100vw, 850px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/blog-rejuvenation-boxwood.jpg&amp;raw" srcset="https://2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/blog-rejuvenation-boxwood.jpg 850w, https://2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/blog-rejuvenation-boxwood-300x176.jpg 300w, https://2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/blog-rejuvenation-boxwood-768x452.jpg 768w" width="850"><p class="wp-caption-text" data-dcnode-id="1047" id="caption-attachment-2585"><span data-dcnode-id="1048" instrument_node="">Do NOT use rejuvenation pruning on evergreen shrubs</span></p></div><span data-dcnode-id="1045" instrument_node="">
</span><h2 data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Which shrubs respond best to rejuvenation pruning?</span></h2><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1038"><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Rejuvenation pruning is for twiggy, multi-stem shrubs,</span></strong><span data-dcnode-id="1039" instrument_node=""> such as:</span></p><span data-dcnode-id="1037" instrument_node="">
</span><ul data-dcnode-id="1005"><span data-dcnode-id="1036" instrument_node="">
</span><li data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">red-twig dogwood,</span></li><span data-dcnode-id="1033" instrument_node="">
</span><li data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">viburnum,</span></li><span data-dcnode-id="1030" instrument_node="">
</span><li data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">spirea,</span></li><span data-dcnode-id="1027" instrument_node="">
</span><li data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">flowering quince,</span></li><span data-dcnode-id="1024" instrument_node="">
</span><li data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">forsythia,</span></li><span data-dcnode-id="1021" instrument_node="">
</span><li data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">witch hazel,</span></li><span data-dcnode-id="1018" instrument_node="">
</span><li data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">beautyberry (prune down to 12 inches only),</span></li><span data-dcnode-id="1015" instrument_node="">
</span><li data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">oakleaf hydrangea,</span></li><span data-dcnode-id="1012" instrument_node="">
</span><li data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">lilac, and</span></li><span data-dcnode-id="1009" instrument_node="">
</span><li data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">honeysuckle.</span></li><span data-dcnode-id="1006" instrument_node="">
</span></ul><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Consider rejuvenation pruning if you have an otherwise healthy, multi-stem shrub that:</span></p><span data-dcnode-id="1001" instrument_node="">
</span><ul data-dcnode-id="987"><span data-dcnode-id="1000" instrument_node="">
</span><li data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">looks overgrown,</span></li><span data-dcnode-id="997" instrument_node="">
</span><li data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">has lost its usual structure or form,</span></li><span data-dcnode-id="994" instrument_node="">
</span><li data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">doesn’t flower as much as it used to, or</span></li><span data-dcnode-id="991" instrument_node="">
</span><li data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">is crowded with dead twigs and branches.</span></li><span data-dcnode-id="988" instrument_node="">
</span></ul><span data-dcnode-id="986" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="982" id="attachment_2586" style="width: 860px"><img alt="Close up of red flowers on branches of flowering quince" aria-describedby="caption-attachment-2586" class="size-full wp-image-2586" data-dcnode-id="985" height="500" loading="lazy" sizes="(max-width: 850px) 100vw, 850px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/blog-ornamental-quince.jpg&amp;raw" srcset="https://2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/blog-ornamental-quince.jpg 850w, https://2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/blog-ornamental-quince-300x176.jpg 300w, https://2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/blog-ornamental-quince-768x452.jpg 768w" width="850"><p class="wp-caption-text" data-dcnode-id="983" id="caption-attachment-2586"><span data-dcnode-id="984" instrument_node="">Flowering quince can benefit from rejuvenation pruning</span></p></div><span data-dcnode-id="981" instrument_node="">
</span><h2 data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">How does rejuvenation pruning work?</span></h2><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">To rejuvenate means to “make young again.”</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Depending on species, juvenile plant growth can look very different from mature growth. Some shrubs are most valued for their juvenile growth habit or bark color, or their leaves and flowers are more prolific on young growth. For these shrubs, rejuvenation pruning works by bringing out a new, young shrub from its mature base.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">When multiple branches of a shrub are cut back to their above-ground base, their larger, below-ground structural base responds by sending up new branches. It’s these branches that start a new cycle of growth.</span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="965"><strong data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Note: </span></strong><span data-dcnode-id="966" instrument_node="">Cutting back to the base of stems can mean just that, or it can mean leaving 6”- 12” of stem. This depends on the species.</span></p><span data-dcnode-id="964" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="960" id="attachment_2587" style="width: 860px"><img alt="close-up of witch hazel yellow flowers on a branch" aria-describedby="caption-attachment-2587" class="size-full wp-image-2587" data-dcnode-id="963" height="500" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/IT-blog-witch-hazel.jpg&amp;raw" width="850"><p class="wp-caption-text" data-dcnode-id="961" id="caption-attachment-2587"><span data-dcnode-id="962" instrument_node="">Witch hazel can benefit from rejuvenation pruning every few years</span></p></div><span data-dcnode-id="959" instrument_node="">
</span><h2 data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">How is rejuvenation pruning done?</span></h2><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Depending on the size of the branches you’ll be pruning, you can use hand clippers, loppers, or a saw. Most hand clippers can handle branches up to about 3/4” around, loppers can cut branches up to 1 ½ – 2”, and larger branches will need a pruning saw. You want your tool to be strong enough to make clean, even cuts all the way through the branch you’re cutting.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Check around the base of your shrub for weed barrier fabric, mulch, or irrigation lines. Remove any you find so they don’t interfere with your pruning cuts or the new growth that will soon emerge.</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">If your shrub has large or arching branches that obscure the base, you can cut those back part way first to make some room.</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">When you’re ready to prune, make a cut at the base of the branch or at a growth point.</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">Before getting to work, check out</span><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independenttree.com/avoid-pruning-mistakes-that-kill-trees/"><span data-dcnode-id="942" instrument_node=""> these pruning mistakes</span></a><span data-dcnode-id="940" instrument_node=""> so you’ll know what to avoid.</span></p><span data-dcnode-id="938" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="934" id="attachment_2584" style="width: 860px"><img alt="Bridal Wreath Spirea bush in bloom" aria-describedby="caption-attachment-2584" class="size-full wp-image-2584" data-dcnode-id="937" height="500" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2pmc1m32wgwa1lganl14rfyb-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/IT-blog-bridal-wreath-spirea.jpg&amp;raw" width="850"><p class="wp-caption-text" data-dcnode-id="935" id="caption-attachment-2584"><span data-dcnode-id="936" instrument_node="">A bridal wreath spirea in bloom</span></p></div><span data-dcnode-id="933" instrument_node="">
</span><h2 data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Do shrubs need special care after this type of pruning?</span></h2><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="929" instrument_node="">After rejuvenation pruning, give your shrub a little extra care, such as adding a layer of compost or replenishing mulch (here’s </span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independenttree.com/mulching/"><span data-dcnode-id="928" instrument_node="">how to use mulch correctly</span></a><span data-dcnode-id="926" instrument_node="">), and make sure it has plenty of water. Keep a close watch for any signs of pests or disease, as these can be particularly damaging as the shrub recovers. And don’t use synthetic fertilizer; it’ll only force spindly new growth instead of nourishing the shrub.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">In a short while, you should see new growth starting to sprout from the base, followed by healthy new leaves and flowers.</span></p><span data-dcnode-id="921" instrument_node="">
</span><h2 data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">NEED A HAND?</span></h2><span data-dcnode-id="918" instrument_node="">
