</span><section class="elementor-section elementor-top-section elementor-element elementor-element-30e564a elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="206" data-element_type="section" data-id="30e564a"><span data-dcnode-id="251" instrument_node="">
</span><div class="elementor-container elementor-column-gap-default" data-dcnode-id="208"><span data-dcnode-id="250" instrument_node="">
</span><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-4fc1c9d" data-dcnode-id="210" data-element_type="column" data-id="4fc1c9d"><span data-dcnode-id="249" instrument_node="">
</span><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="212"><span data-dcnode-id="248" instrument_node="">
</span><div class="elementor-element elementor-element-c95e7a6 elementor-widget elementor-widget-text-editor" data-dcnode-id="229" data-element_type="widget" data-id="c95e7a6" data-widget_type="text-editor.default"><span data-dcnode-id="247" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="231"><span data-dcnode-id="246" instrument_node="">
</span><span data-dcnode-id="243" instrument_node=""> </span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Hebes are a type of plant that needs little or no pruning. The larger-leaved types, however, can be prone to damaged stems and these should always be cut back at any time during the growing season.</span></p><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Deadheading old flowers on Hebe plants is well worth the effort as it could extend the flowering period for your particular plant or encourage further flowering later in the year. If you find that your specific hebe has become straggly then cutting them back hard – within 30 cm from the ground – will rejuvenate it. This option should be done with care because they’re very sensitive so make sure that you don’t go too far when trimming.</span></p><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">With a few simple tips, Hebe shrubs can be a great addition to any garden or container.</span></p><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">As a flowering evergreen shrub, they should be pruned during their growing season, or right at the end of winter / early spring.</span></p><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">You should not prune them in late autumn – or the winter months – which is why they are typically considered “trouble free” flowering evergreens that just need sprucing up occasionally.</span></p><span data-dcnode-id="232" instrument_node=""> </span></div><span data-dcnode-id="230" instrument_node="">
</span></div><span data-dcnode-id="228" instrument_node="">
</span><div class="elementor-element elementor-element-85ab5d2 elementor-widget-divider--view-line elementor-widget elementor-widget-divider" data-dcnode-id="214" data-element_type="widget" data-id="85ab5d2" data-widget_type="divider.default"><span data-dcnode-id="227" instrument_node="">

</span><div class="elementor-widget-container" data-dcnode-id="181"><span data-dcnode-id="199" instrument_node="">
</span><h2 data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">When &amp; How to Prune Hebes</span></h2><p data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">Hebe eliptica bushes need to be cut back after flowering. These shrubs often suffer from snow damage, which opens up the centre of the plant and snaps off branches under its weight.</span></p><p data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">A simple solution requires occasional trimming for new growths to emerge again quickly – especially following a period of abundant blooming that might lead these plants into going completely overgrown. Allowing any seed heads to develop can actually slow down the growth of the plant.</span></p><p data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Hebe Midsummer Beauty and other long leaved Hebes generally require no pruning unless damaged over winter but can become top-heavy with bare stems at the bottom of the bush. To increase branching from old branches near the base up to new growth in higher regions, cut back a few older stems as low down as possible on your shrubs.</span></p><p data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Deadheading flowers will help prolong the flowering season by several months.</span></p><h3 data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Pruning Damaged and Old Hebes</span></h3><p data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Hebe Tricolor shrubs are among some of the less hardy types of Hebes. After a harsh winter, they will probably need to be cut back quite severely. The new shoots that grow from lower down on the stems after pruning, should stop just before reaching buds that would break and form new branches for future growth in springtime or summer months.</span></p><p data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Larger hebe varieties can suffer injury during severe winters – either by the weight of snowfall or frost damage that may not heal adequately. If this happens, it’s best if you do some light pruning up until about six inches above where there was obvious damage done, but then follow-through with harder pruning.</span></p><span data-dcnode-id="182" instrument_node=""> </span></div><span data-dcnode-id="180" instrument_node="">
