span data-dcnode-id="885" instrument_node=""> </span><a aria-label="Link to How to Prune Bridal Wreath and Snowmound Spiraeas" data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeguides.sfgate.com/how-to-prune-bridal-wreath-and-snowmound-spiraeas-13427931.html"><span data-dcnode-id="884" instrument_node=""> How to Prune Bridal Wreath and Snowmound Spiraeas </span></a><span data-dcnode-id="882" instrument_node=""> </span></li><span data-dcnode-id="880" instrument_node=""> </span><li data-dcnode-id="875"><span data-dcnode-id="879" instrument_node=""> </span><a aria-label="Link to Brown Spots After Pruning My Juniper" data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeguides.sfgate.com/brown-spots-after-pruning-juniper-92692.html"><span data-dcnode-id="878" instrument_node=""> Brown Spots After Pruning My Juniper </span></a><span data-dcnode-id="876" instrument_node=""> </span></li><span data-dcnode-id="874" instrument_node=""> </span><li data-dcnode-id="869"><span data-dcnode-id="873" instrument_node=""> </span><a aria-label="Link to How to Prune a Thorny Elaeagnus" data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeguides.sfgate.com/prune-thorny-elaeagnus-42554.html"><span data-dcnode-id="872" instrument_node=""> How to Prune a Thorny Elaeagnus </span></a><span data-dcnode-id="870" instrument_node=""> </span></li><span data-dcnode-id="868" instrument_node=""> </span><li data-dcnode-id="863"><span data-dcnode-id="867" instrument_node=""> </span><a aria-label="Link to Pests Of Junipers" data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeguides.sfgate.com/pests-junipers-22675.html"><span data-dcnode-id="866" instrument_node=""> Pests Of Junipers </span></a><span data-dcnode-id="864" instrument_node=""> </span></li><span data-dcnode-id="862" instrument_node=""> </span><li data-dcnode-id="857"><span data-dcnode-id="861" instrument_node=""> </span><a aria-label="Link to How to Prune a Skyrocket Juniper Properly" data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeguides.sfgate.com/prune-skyrocket-juniper-properly-42717.html"><span data-dcnode-id="860" instrument_node=""> How to Prune a Skyrocket Juniper Properly </span></a><span data-dcnode-id="858" instrument_node=""> </span></li><span data-dcnode-id="856" instrument_node=""> </span></ul><span data-dcnode-id="854" instrument_node=""> </span></div><span data-dcnode-id="852" instrument_node=""> </span></div><span data-dcnode-id="850" instrument_node=""> </span></div><span data-dcnode-id="848" instrument_node=""> </span><div class="freestyle-content article-content" data-dcnode-id="790"><span data-dcnode-id="847" instrument_node=""> </span><div class="parts" data-dcnode-id="836"><span data-dcnode-id="846" instrument_node=""> </span><div class="content" data-dcnode-id="843"><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Most large, overgrown evergreen shrubs accept tough love. They can be pruned back severely and allowed to start over with fresh new growth. However, juniper (Juniperus spp.) is not a good tough-love candidate. These evergreens have dead zones in their centers and branches cut back too far cannot initiate new growth. So what's a gardener to do?</span></p></div><span data-dcnode-id="842" instrument_node=""> </span><div class="mobile-only-min-height-250 ad-unit inline-ad" data-ad-unit-name="inline-mobile" data-dcnode-id="841"></div><span data-dcnode-id="840" instrument_node=""> </span><div class="desktop-only-min-height-280 ad-unit centered" data-ad-id="Leaf2" data-ad-unit-name="inline-desktop" data-dcnode-id="838" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="839" data-has-intersected="true" id="Leaf2"></div></div><span data-dcnode-id="837" instrument_node=""> </span></div><span data-dcnode-id="835" instrument_node=""> </span><h2 class="title" data-dcnode-id="833" data-for="The Problem with Juniper Shrubs"><span data-dcnode-id="834" instrument_node=""> The Problem with Juniper Shrubs</span></h2><span data-dcnode-id="832" instrument_node=""> </span><div class="parts" data-dcnode-id="813"><span data-dcnode-id="831" instrument_node=""> </span><div class="content" data-dcnode-id="828"><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Evergreen shrubs like holly or photinia have plenty of dormant buds beneath their bark. That means that you can renew an overgrown specimen by cutting the canopy way back. Over time, new branches and foliage grow in the area and make the shrub look good again.</span></p></div><span data-dcnode-id="827" instrument_node=""> </span><div class="content" data-dcnode-id="824"><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">On the other hand, junipers don't have many dormant buds beneath their bark and don't develop dormant buds on old wood. The old wood near the truck, for example, is a dead zone without any dormant buds. In these areas, you can never get new growth. When you cut back a juniper into those zones, it will remain in the shape you cut it, brown and ugly, indefinitely.</span></p></div><span data-dcnode-id="823" instrument_node=""> </span><div class="mobile-only-min-height-250 ad-unit inline-ad" data-ad-unit-name="partner-A300-mobile" data-dcnode-id="822"></div><span data-dcnode-id="821" instrument_node=""> </span><div class="desktop-only-min-height-90 ad-unit inline-ad" data-ad-id="Leaf3" data-ad-unit-name="lowline-desktop" data-dcnode-id="819" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="820" data-has-intersected="true" id="Leaf3"></div></div><span data-dcnode-id="818" instrument_node=""> </span><div class="content" data-dcnode-id="815"><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">In other trees, pruning branches stimulates growth. But in a juniper, only buds close to the cut get the green light. Anything farther away than 12 inches won’t leaf out. And juniper branches tend to grow longer, not fuller, when left untrimmed.</span></p></div><span data-dcnode-id="814" instrument_node=""> </span></div><span data-dcnode-id="812" instrument_node=""> </span><h2 class="title" data-dcnode-id="810" data-for="Pruning a Juniper"><span data-dcnode-id="811" instrument_node=""> Pruning a Juniper</span></h2><span data-dcnode-id="809" instrument_node=""> </span><div class="parts" data-dcnode-id="791"><span data-dcnode-id="808" instrument_node=""> </span><div class="content" data-dcnode-id="805"><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">You must be very careful when pruning a juniper, since a bad "haircut" may never grow out. There are dozens of different types of junipers, from spreading, to creeping to upright, pyramidal, and each has pruning peculiarities. But some general rules apply to all.</span></p></div><span data-dcnode-id="804" instrument_node=""> </span><div class="content" data-dcnode-id="801"><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">All junipers have dead zones at their center so severe pruning, including topping, is never a good idea. Instead, prune lightly and regularly, just before new growth begins in spring. The key to pruning juniper is to leave areas with dormant bud on each branch you trim.</span></p></div><span data-dcnode-id="800" instrument_node=""> </span><div class="content" data-dcnode-id="797"><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">For upright species, like Chinese juniper (Juniperus chinensis_,),_ prune a little off the side branches annually. This will correct the shape and limit spread. Chinese juniper thrives in U.S. Department of Agriculture plant hardiness zones 4 through 9 and can grow to 30 feet tall with a 15 foot spread. If the tree is overgrown, remove up to 20 percent of the height, but make all cuts well above the dead zone.</span></p></div><span data-dcnode-id="796" instrument_node=""> </span><div class="content" data-dcnode-id="793"><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">If your juniper is a low species like creeping juniper (Juniperus horizontalis_),_ a shrub that thrives in USDA zones 3 through 9, selectively cut back the branches. Trim each one back to just above a vigorous side branch. Never shear these. They do not look attractive if pruned in a formal manner.</span></p></div><span data-dcnode-id="792" instrument_node=""> </span></div></div><span data-dcnode-id="789" instrument_node=""> </span><div class="min-height-250 ad-unit main-ad" data-ad-id="Leaf4" data-ad-unit-name="main" data-dcnode-id="787" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="788" data-has-intersected="true" id="Leaf4"></div></div><span data-dcnode-id="786" instrument_node=""> </span><div class="hst-exco-player pbs" data-dcnode-id="715" data-exs-config="{&quot;customParams&quot;:{&quot;section1&quot;:&quot;&quot;,&quot;section2&quot;:&quot;&quot;,&quot;section3&quot;:&quot;&quot;,&quot;page_type2&quot;:&quot;&quot;,&quot;permutive&quot;:&quot;&quot;}}" data-pbs-ads="ended" data-pbs-device="desktop" data-pbs-logo-pos="left" data-pbs-position="static" data-pbs-root="true" data-pbs-size="medium-large" id="bfd120c4-7961-4553-8db6-72038c76a9c1"><div class="pbs__player" data-dcnode-id="716" id="exp_fc02edc9-3f6a-4c3c-af32-908799d992a8" style="height: inherit;"><div class="pb-stream" data-dcnode-id="725" id="exp_1a072eef-383c-4fb5-9d5d-7714546ed0ec" style="position: relative;"><div class="avp-p-wrapper" data-dcnode-id="726" id="exp_1a072eef-383c-4fb5-9d5d-7714546ed0ecWrapper"><div data-dcnode-id="727" id="exp_1a072eef-383c-4fb5-9d5d-7714546ed0ecContainer" style="background-color: rgb(0, 0, 0); position: relative; text-align: initial; width: 660px; height: 372px;"><div data-dcnode-id="781" id="content_368565496" style= =""> </span><ul data-dcnode-id="678"><li data-dcnode-id="679"><span data-dcnode-id="683" instrument_node=""> </span><a aria-label="http://www.finegardening.com/how-to/videos/pruning-conifers-size-control.aspx" data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.finegardening.com/how-to/videos/pruning-conifers-size-control.aspx" rel="nofollow"><span data-dcnode-id="682" instrument_node=""> Fine Gardening: Pruning Arborvitae, Junipers, and Chamaecyparis </span></a><span data-dcnode-id="680" instrument_node=""> </span></li></ul><span data-dcnode-id="677" instrument_node=""> </span></div><span data-dcnode-id="675" instrument_node=""> </span><p class="heading" data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Tips</span></p><span data-dcnode-id="672" instrument_node=""> </span><div class="dropdown-content" data-dcnode-id="666"><span data-dcnode-id="671" instrument_node=""> </span><ul data-dcnode-id="668"><li data-dcnode-id="669"><span data-dcnode-id="670" instrument_node=""> Cut down overgrown junipers if pruning will result in mostly bare wood. It is easier to replace such junipers with new, smaller shrubs than to try to rejuvenate old, nearly bare wood shrubs. </span></li></ul><span data-dcnode-id="667" instrument_node=""> </span></div><span data-dcnode-id="665" instrument_node=""> </span><p class="heading" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Warnings</span></p><span data-dcnode-id="662" instrument_node=""> </span><div class="dropdown-content" data-dcnode-id="654"><span data-dcnode-id="661" instrument_node=""> </span><ul data-dcnode-id="656"><li data-dcnode-id="659"><span data-dcnode-id="660" instrument_node=""> Severe pruning of junipers growing in shade may disfigure the shrubs, because new growth rates under such low-light conditions are slow. </span></li><li data-dcnode-id="657"><span data-dcnode-id="658" instrument_node=""> Shearing is not recommended for junipers, although it is often practiced for pyramidal junipers when a formal look is desired. Shearing causes dense outer growth, which shades the interior of the shrub and makes it more susceptible to needle browning and branch dieback caused by drying winds. </span></li></ul><span data-dcnode-id="655" instrument_node=""> </span></div><span data-dcnode-id="653" instrument_node=""> </span><p class="heading" data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Writer Bio</span></p><span data-dcnode-id="650" instrument_node=""> </span><div class="dropdown-content" data-dcnode-id="645"><span data-dcnode-id="649" instrument_node=""> </span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">From Alaska to California, from France's Basque Country to Mexico's Pacific Coast, Teo Spengler has dug the soil, planted seeds and helped trees, flowers and veggies thrive. A professional writer and consummate gardener, Spengler has written about home and garden for Gardening Know How, San Francisco Chronicle, Gardening Guide and Go Banking Rates. She earned a BA from U.C. Santa Cruz, a law degree from U.C. Berkeley's Boalt Hall, and an MA and MFA from San Francisco State. She currently divides her life between San Francisco and southwestern France.</span></p><span data-dcnode-id="646" instrument_node=""> </span></div><span data-dcnode-id="644" instrument_node=""> </span></div><span data-dcnode-id="642" instrument_node=""> </span><div class="dropdown-content-target" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node=""> </span></div><span data-dcnode-id="639" instrument_node=""> </span></div><span data-dcnode-id="637" instrument_node=""> </span></div><span data-dcnode-id="635" instrument_node=""> </span><div class="mobile-only-min-height-250 ad-unit inline-ad" data-ad-unit-name="partner-B300-mobile" data-dcnode-id="634"></div><span data-dcnode-id="633" instrument_node=""> </span><div class="rcp-carousel-wrapper" data-dcnode-id="490"><span data-dcnode-
