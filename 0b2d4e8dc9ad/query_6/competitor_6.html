</span><p data-dcnode-id="4099"><span data-dcnode-id="4115" instrument_node="">
		This article was co-authored by </span><a data-dcnode-id="4113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Author/Steve-Masley"><span data-dcnode-id="4114" instrument_node="">Steve Masley</span></a><span data-dcnode-id="4112" instrument_node="">. Steve Masley has been designing and maintaining organic vegetable gardens in the San Francisco Bay Area for over 30 years. He is an Organic Gardening Consultant and Founder of Grow-It-Organically, a website that teaches clients and students the ins and outs of organic vegetable gardening. In 2007 and 2008, Steve taught the Local Sustainable Agriculture Field Practicum at Stanford University.

</span><p data-dcnode-id="4063"><span data-dcnode-id="4092" instrument_node="">Pruning apricot trees at least once a year is necessary in order to have healthy plants. Pruning your tree not only helps it look better, but also stimulates new growth and helps the tree produce optimal numbers of healthy apricots each year.</span><sup aria-label="Link to Reference 1" class="reference trusted" data-dcnode-id="4065" id="_ref-1"><a data-dcnode-id="4090" href="#_note-1"><span data-dcnode-id="4091" instrument_node="">[1]</span></a><span class="ts_popup trustedsource" data-dcnode-id="4067" hidden="" id="ts_popup_1" style="display: none;"><span data-dcnode-id="4089" instrument_node="">
</span><span class="ts_close" data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">X</span></span><span data-dcnode-id="4086" instrument_node="">
</span><a class="ts_trustworthy" data-dcnode-id="4084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/wikiHow%3ADelivering-a-Trustworthy-Experience"><span data-dcnode-id="4085" instrument_node="">Expert Source</span></a><span data-dcnode-id="4083" instrument_node="">
</span><span class="ts_name" data-dcnode-id="4082"></span><span data-dcnode-id="4081" instrument_node="">
</span><a class="ts_expert_link" data-dcnode-id="4072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Author/Steve-Masley"><span class="ts_expert_image" data-dcnode-id="4077"><picture data-dcnode-id="4078"><source data-dcnode-id="4080" srcset="/images/thumb/5/5d/Steve_masley.jpg/-crop-100-100-99px-Steve_masley.jpg.webp" type="image/webp"><img alt="Steve Masley" data-dcnode-id="4079" height="30" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/5/5d/Steve_masley.jpg/-crop-100-100-99px-Steve_masley.jpg&amp;raw" style="max-width: 30px" width="30"></picture></span><span data-dcnode-id="4076" instrument_node="">Steve Masley</span><br data-dcnode-id="4075"><span class="ts_blurb" data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">Home &amp; Garden Specialist</span></span></a><span data-dcnode-id="4071" instrument_node="">
</span><span class="ts_description" data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">Expert Interview.  19 June 2019.</span></span><span data-dcnode-id="4068" instrument_node="">
</span></span><span data-dcnode-id="4066" instrument_node="">
</span></sup><span data-dcnode-id="4064" instrument_node=""> By trimming away unwanted branches, shortening the length of remaining branches, and maintaining your tree properly throughout the growing season, you can have a healthy apricot tree that gives you plenty of fruit.
</span></p><span data-dcnode-id="4062" instrument_node="">

</span><b class="whb" data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">Wait until late summer to prune your apricot tree.</span></b><span data-dcnode-id="3982" instrument_node=""> Many other types of fruit trees are best pruned in the winter while they’re dormant, but apricot trees can be especially prone to catching disease.</span><sup aria-label="Link to Reference 2" class="reference trusted" data-dcnode-id="3955" id="_ref-2"><a data-dcnode-id="3980" href="#_note-2"><span data-dcnode-id="3981" instrument_node="">[2]</span></a><span class="ts_popup trustedsource" data-dcnode-id="3957" hidden="" id="ts_popup_2" style="display: none;"><span data-dcnode-id="3979" instrument_node="">

</span></span><span data-dcnode-id="3956" instrument_node="">

</span></span><span data-dcnode-id="3934" instrument_node="">
</span></sup><span data-dcnode-id="3932" instrument_node="">
</span><ul data-dcnode-id="3924"><span data-dcnode-id="3931" instrument_node="">
</span><li data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">Trim your tree as soon as possible after harvesting fruit. At this stage, the tree will still be in a growth phase and will be able to heal more quickly.</span></li><span data-dcnode-id="3928" instrument_node="">
</span><li data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">Pruning in late summer gives your apricot tree more time to grow new branches, which means that your tree will produce more apricots next year.</span></li><span data-dcnode-id="3925" instrument_node="">
</span></ul><span data-dcnode-id="3923" instrument_node="">

</span><b class="whb" data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">Acquire sharp pruning shears and a pruning saw.</span></b><span data-dcnode-id="3883" instrument_node=""> The blades on your shears should be sturdy, not corroded, and able clip through smaller branches. A pruning saw is usually necessary to cut thicker branches. It should have a curved blade and wide teeth.</span><sup aria-label="Link to Reference 4" class="reference" data-dcnode-id="3867" id="_ref-4"><a data-dcnode-id="3881" href="#_note-4"><span data-dcnode-id="3882" instrument_node="">[4]</span></a><span class="ts_popup" data-dcnode-id="3869" hidden="" id="ts_popup_4" style="display: none;"><span data-dcnode-id="3880" instrument_node="">

</span></span><span data-dcnode-id="3868" instrument_node="">
</span></sup><span data-dcnode-id="3866" instrument_node=""> Older tools can often be sharpened at your local hardware store.
</span><ul data-dcnode-id="3863"><li data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">If you can’t reach the top of your tree, you’ll also need a sturdy ladder. Folding and leaning ladders not safe to use when pruning, as they’re not stable on uneven ground. Instead, use an orchard ladder, which has a more sturdy tripod structure.</span></li></ul><span data-dcnode-id="3862" instrument_node="">

</span><b class="whb" data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">Sterilize your tools in rubbing alcohol, disinfectant, or 10% bleach solution.</span></b><span data-dcnode-id="3819" instrument_node=""> Soak shears and saws for 30 seconds to make sure they’re clean and won’t transmit any diseases to your tree. If you’re pruning multiple apricot trees, re-soak your tools in between each tree.</span><sup aria-label="Link to Reference 5" class="reference" data-dcnode-id="3803" id="_ref-5"><a data-dcnode-id="3817" href="#_note-5"><span data-dcnode-id="3818" instrument_node="">[5]</span></a><span class="ts_popup" data-dcnode-id="3805" hidden="" id="ts_popup_5" style="display: none;"><span data-dcnode-id="3816" instrument_node="">

</span><b class="whb" data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">Cut away dead, diseased, or damaged branches.</span></b><span data-dcnode-id="3707" instrument_node=""> These branches will detract from overall tree growth, and could spread disease to other healthy branches.</span><sup aria-label="Link to Reference 7" class="reference trusted" data-dcnode-id="3680" id="_ref-7"><a data-dcnode-id="3705" href="#_note-7"><span data-dcnode-id="3706" instrument_node="">[7]</span></a><span class="ts_popup trustedsource" data-dcnode-id="3682" hidden="" id="ts_popup_7" style="display: none;"><span data-dcnode-id="3704" instrument_node="">

</span><span class="ts_description" data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">Expert Interview.  19 June 2019.</span></span><span data-dcnode-id="3683" instrument_node="">
</span></span><span data-dcnode-id="3681" instrument_node="">
</span></sup><span data-dcnode-id="3679" instrument_node="">
</span><ul data-dcnode-id="3659"><li data-dcnode-id="3660"><span data-dcnode-id="3678" instrument_node="">Look for young branches that have fresh or hardened sap, and remove them. Gumminess can be a sign of disease and rot.</span><sup aria-label="Link to Reference 8" class="reference" data-dcnode-id="3662" id="_ref-8"><a data-dcnode-id="3676" href="#_note-8"><span data-dcnode-id="3677" instrument_node="">[8]</span></a><span class="ts_popup" data-dcnode-id="3664" hidden="" id="ts_popup_8" style="display: none;"><span data-dcnode-id="3675" instrument_node="">

</span><li data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">"Watersprouts" are shoots that grow straight up from the main branches of the apricot tree. These perfectly vertical new branches won’t produce fruit, but often block sunlight from reaching the fruit on lower branches.</span></li><span data-dcnode-id="3597" instrument_node="">

</span><div class="image_details" data-dcnode-id="3425" style="display:none;"><span data-dcnode-id="3426" style="display:none;"><span data-dcnode-id="3427" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/9\/98\/Prune-Apricot-Trees-Step-8.jpg\/v4-460px-Prune-Apricot-Trees-Step-8.jpg","bigUrl":"\/images\/thumb\/9\/98\/Prune-Apricot-Trees-Step-8.jpg\/aid10353643-v4-728px-Prune-Apricot-Trees-Step-8.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="3422" instrument_node="">

</span><b class="whb" data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">Choose a few healthy scaffold branches that you want to keep.</span></b><span data-dcnode-id="3416" instrument_node=""> Optimal tree growth can be promoted by choosing 3-5 branches located 18–36 inches (46–91&nbsp;cm) from the ground. These will serve as your primary fruit-producing branches.</span><sup aria-label="Link to Reference 12" class="reference" data-dcnode-id="3400" id="_ref-12"><a data-dcnode-id="3414" href="#_note-12"><span data-dcnode-id="3415" instrument_node="">[12]</span></a><span class="ts_popup" data-dcnode-id="3402" hidden="" id="ts_popup_12" style="display: none;"><span data-dcnode-id="3413" instrument_node="">
</span><span class="ts_close" data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">X</span></span><span data-dcnode-id="3410" instrument_node="">
</span><span class="ts_name" data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">Research source</span></span><span data-dcnode-id="3407" instrument_node="">
</span><span class="ts_description" data-dcnode-id="3406"></span><span data-dcnode-id="3405" instrument_node="">
</span><a class="ts_source" data-dcnode-id="3404" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="3403" instrument_node="">
</span></span><span data-dcnode-id="3401" instrument_node="">
</span></sup><span data-dcnode-id="3399" instrument_node="">
</span><ul data-dcnode-id="3371"><span data-dcnode-id="3398" instrument_node="">
</span><li data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">It’s best to choose branches that are growing outwards away from the trunk, rather than straight up, as vertically-growing branches are more prone to snapping off if they produce a lot of heavy fruit. Think of a clock, and look to keep branches growing outwards at about a 2:00 or 10:00 angle.</span></li><span data-dcnode-id="3395" instrument_node="">
</span><li data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">All of the scaffold branches should be evenly spaced around the trunk of the tree so that the tree’s structure is well-balanced.</span></li><span data-dcnode-id="3392" instrument_node="">
</span><li data-dcnode-id="3373"><span data-dcnode-id="3391" instrument_node="">Mark these scaffold branches with a piece of brightly-colored ribbon or string, so you won’t accidentally trim them later. Keeping these intact will help prevent over-pruning and ensure your apricot tree’s overall structure is sound.</span><sup aria-label="Link to Reference 13" class="reference" data-dcnode-id="3375" id="_ref-13"><a data-dcnode-id="3389" href="#_note-13"><span data-dcnode-id="3390" instrument_node="">[13]</span></a><span class="ts_popup" data-dcnode-id="3377" hidden="" id="ts_popup_13" style="display: none;"><span data-dcnode-id="3388" instrument_node="">

</span><div class="image_details" data-dcnode-id="3342" style="display:none;"><span data-dcnode-id="3343" style="display:none;"><span data-dcnode-id="3344" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/d\/d8\/Prune-Apricot-Trees-Step-9.jpg\/v4-460px-Prune-Apricot-Trees-Step-9.jpg","bigUrl":"\/images\/thumb\/d\/d8\/Prune-Apricot-Trees-Step-9.jpg\/aid10353643-v4-728px-Prune-Apricot-Trees-Step-9.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="3339" instrument_node="">
</span><div class="step_num" data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">2</span></div><div class="step" data-dcnode-id="3311"><span data-dcnode-id="3336" instrument_node="">
</span><b class="whb" data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">Cut most of the remaining branches about 0.25 inches (0.64&nbsp;cm) above where they connect to the trunk.</span></b><span data-dcnode-id="3333" instrument_node=""> Use a shears to clip thinner, new branches, or use a pruning saw to cut thicker boughs.</span><sup aria-label="Link to Reference 14" class="reference" data-dcnode-id="3317" id="_ref-14"><a data-dcnode-id="3331" href="#_note-14"><span data-dcnode-id="3332" instrument_node="">[14]</span></a><span class="ts_popup" data-dcnode-id="3319" hidden="" id="ts_popup_14" style="display: none;"><span data-dcnode-id="3330" instrument_node="">

</span><span class="ts_description" data-dcnode-id="3323"></span><span data-dcnode-id="3322" instrument_node="">

</span></span><span data-dcnode-id="3318" instrument_node="">
</span></sup><span data-dcnode-id="3316" instrument_node="">
</span><ul data-dcnode-id="3313"><li data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">Look for the collar at the base of the branch. This is a thicker, ridged area of bark that connects the branch to the trunk. Cut the branch just outside the collar, as this region promotes formation of new tissue and cutting it can cause damage and introduce decay.</span></li></ul><span data-dcnode-id="3312" instrument_node="">

</span><div class="step_num" data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">3</span></div><div class="step" data-dcnode-id="3253"><span data-dcnode-id="3278" instrument_node="">
</span><b class="whb" data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">Prune branches located within 8–10 inches (20–25&nbsp;cm) of your scaffold branches.</span></b><span data-dcnode-id="3275" instrument_node=""> There should be plenty of space surrounding your tree’s primary branches. This helps promote adequate air circulation and lets sunlight reach all the way down through the tree to apricots on the lower branches.</span><sup aria-label="Link to Reference 15" class="reference" data-dcnode-id="3259" id="_ref-15"><a data-dcnode-id="3273" href="#_note-15"><span data-dcnode-id="3274" instrument_node="">[15]</span></a><span class="ts_popup" data-dcnode-id="3261" hidden="" id="ts_popup_15" style="display: none;"><span data-dcnode-id="3272" instrument_node="">

</span></sup><span data-dcnode-id="3258" instrument_node="">
</span><ul data-dcnode-id="3255"><li data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">Thinner branches towards the top of the tree can be left a little closer together, whereas the thickest branches towards the bottom need the most space.</span></li></ul><span data-dcnode-id="3254" instrument_node="">

</span><div class="step_num" data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">4</span></div><div class="step" data-dcnode-id="3190"><span data-dcnode-id="3220" instrument_node="">
</span><b class="whb" data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">Thin out the entire tree by removing extra branches.</span></b><span data-dcnode-id="3217" instrument_node=""> Aim to remove about ⅓ of branches overall. Apricot trees tend to grow quickly and therefore need more pruning than some other fruit trees. You should be left with sparse but evenly-spaced branches throughout the height of your tree.</span><sup aria-label="Link to Reference 16" class="reference trusted" data-dcnode-id="3196" id="_ref-16"><a data-dcnode-id="3215" href="#_note-16"><span data-dcnode-id="3216" instrument_node="">[16]</span></a><span class="ts_popup trustedsource" data-dcnode-id="3198" hidden="" id="ts_popup_16" style="display: none;"><span data-dcnode-id="3214" instrument_node="">

</span></sup><span data-dcnode-id="3195" instrument_node="">
</span><ul data-dcnode-id="3192"><li data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">Cut more branches off of young trees, and less off of older ones. During an apricot tree’s first three years, prune aggressively to aim for growth rather than fruit production.</span></li></ul><span data-dcnode-id="3191" instrument_node="">
</span></div><span data-dcnode-id="3189" instrument_node="">

</span><b class="whb" data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">Leave your scaffolding branches intact.</span></b><span data-dcnode-id="3120" instrument_node=""> Your tree’s primary branches should remain uncut to produce maximal apricot crops during the next growth season. Make sure these scaffolds are balanced, however - if one is much larger than all the others, shorten it so all the scaffolding branches are balanced and growing at a similar rate.</span><sup aria-label="Link to Reference 17" class="reference" data-dcnode-id="3104" id="_ref-17"><a data-dcnode-id="3118" href="#_note-17"><span data-dcnode-id="3119" instrument_node="">[17]</span></a><span class="ts_popup" data-dcnode-id="3106" hidden="" id="ts_popup_17" style="display: none;"><span data-dcnode-id="3117" instrument_node="">

</span><b class="whb" data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Shorten all other branches 20-30%.</span></b><span data-dcnode-id="3066" instrument_node=""> Depending on how large the tree is, and how much it grew within the past year, this could mean trimming anywhere from 2 inches (5.1&nbsp;cm) to 4 feet (1.2&nbsp;m). Chopping the ends encourages branches to grow shorter and bushier and spurs the tree to grow more fruit on the lower branches.</span><sup aria-label="Link to Reference 18" class="reference" data-dcnode-id="3050" id="_ref-18"><a data-dcnode-id="3064" href="#_note-18"><span data-dcnode-id="3065" instrument_node="">[18]</span></a><span class="ts_popup" data-dcnode-id="3052" hidden="" id="ts_popup_18" style="display: none;"><span data-dcnode-id="3063" instrument_node="">

</span></sup><span data-dcnode-id="3049" instrument_node="">
</span><ul data-dcnode-id="3041"><span data-dcnode-id="3048" instrument_node="">
</span><li data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Trimming vertical branches encourages new branches and leaves to form, and prevents them from growing too tall and blocking sunlight.</span></li><span data-dcnode-id="3045" instrument_node="">
</span><li data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">Pruning horizontal branches promotes new fruit-producing wood.</span></li><span data-dcnode-id="3042" instrument_node="">
</span></ul><span data-dcnode-id="3040" instrument_node="">

</span><div class="image_details" data-dcnode-id="3012" style="display:none;"><span data-dcnode-id="3013" style="display:none;"><span data-dcnode-id="3014" instrument_node="">{"smallUrl":"https:\/\/www.wikihow.com\/images\/thumb\/f\/f3\/Prune-Apricot-Trees-Step-14.jpg\/v4-460px-Prune-Apricot-Trees-Step-14.jpg","bigUrl":"\/images\/thumb\/f\/f3\/Prune-Apricot-Trees-Step-14.jpg\/aid10353643-v4-728px-Prune-Apricot-Trees-Step-14.jpg","smallWidth":460,"smallHeight":345,"bigWidth":728,"bigHeight":546,"licensing":"&lt;div class=\"mw-parser-output\"&gt;&lt;p&gt;License: &lt;a target=\"_blank\" rel=\"nofollow noreferrer noopener\" class=\"external text\" href=\"https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\"&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;"}</span></span></div></a></div><span data-dcnode-id="3009" instrument_node="">
</span><div class="step_num" data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">3</span></div><div class="step" data-dcnode-id="2976"><span data-dcnode-id="3006" instrument_node="">
</span><b class="whb" data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">Trim branches to 0.25 inches (0.64&nbsp;cm) above a bud, stub, or branch.</span></b><span data-dcnode-id="3003" instrument_node=""> Buds will continue to grow in the same direction as they’re currently facing, so choose a bud that faces outward, away from the trunk and other nearby branches. Cut at a 45 degree angle away from the bud.</span><sup aria-label="Link to Reference 19" class="reference" data-dcnode-id="2987" id="_ref-19"><a data-dcnode-id="3001" href="#_note-19"><span data-dcnode-id="3002" instrument_node="">[19]</span></a><span class="ts_popup" data-dcnode-id="2989" hidden="" id="ts_popup_19" style="display: none;"><span data-dcnode-id="3000" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">X</span></span><span data-dcnode-id="2997" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">Research source</span></span><span data-dcnode-id="2994" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2993"></span><span data-dcnode-id="2992" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2991" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2990" instrument_node="">
</span></span><span data-dcnode-id="2988" instrument_node="">
</span></sup><span data-dcnode-id="2986" instrument_node="">
</span><ul data-dcnode-id="2978"><span data-dcnode-id="2985" instrument_node="">
</span><li data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">For example, if you’re shortening a branch that’s close to another branch, trim it near a bud that’s facing the opposite direction of the nearby branch.</span></li><span data-dcnode-id="2982" instrument_node="">
</span><li data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">Shortening a branch will make buds within 1–8 inches (2.5–20.3&nbsp;cm) of the cut grow more vigorously, so make sure you’re trimming at a place along the branch that gives new buds room to grow.</span></li><span data-dcnode-id="2979" instrument_node="">
</span></ul><span data-dcnode-id="2977" instrument_node="">

</span><a class="collapse_link" data-dcnode-id="1538" href="#summary_wrapper"><span data-dcnode-id="1541" id="summary_toc_heading_text"><span data-dcnode-id="1542" instrument_node="">Article Summary</span></span><span data-dcnode-id="1539" id="summary_close"><span data-dcnode-id="1540" instrument_node="">X</span></span></a><p class="text_summary_wrapper" data-dcnode-id="1533" id="summary_text"><span data-dcnode-id="1537" instrument_node="">Apricot trees are prone to catching disease, but pruning them once a year will help them heal and stay healthy. It’s best to prune your apricot tree in late summer right after harvesting fruit. You’ll want to use sharp, clean pruning shears and a pruning saw to make the job easier. Start by cutting away any visibly dead, diseased, or damaged branches. Then, cut off any small sprouts growing out of the trunk, since these can get in the way of other fruit-bearing branches. To thin the branches, cut away smaller branches about a quarter-inch above where they connect to the trunk. Leave a few healthy branches in place so you don’t thin the tree too much. </span><span data-dcnode-id="1535" id="summary_last_sentence"><span data-dcnode-id="1536" instrument_node="">To learn how to shorten the height of your tree with pruning, read on!</span></span><span class="sumpos_bottom" data-dcnode-id="1534" id="summary_position"></span></p><div class="s-help-wrap" data-dcnode-id="1519" data-type="summarytexthelp"><span data-dcnode-id="1532" instrument_node="">
