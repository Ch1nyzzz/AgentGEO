dex=cw22&amp;url=https%3A//img.ehowcdn.com/375/photos.demandstudios.com/227/243/fotolia_9288446_XS.jpg&amp;raw" width="400"></picture></div></div></div></div><span data-dcnode-id="393" instrument_node=""> </span><div class="component-caption-module" data-dcnode-id="388"><div class="caption__caption-text ui-label" data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">
    Elm trees belong to the plant genus Ulmus.
  </span></div><span data-dcnode-id="390" instrument_node=""> </span></div><span data-dcnode-id="387" instrument_node=""> </span></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="381"><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Pruning, or removing dead and undesirable growth, can help ensure that an elm tree enjoys a long, healthy life, while also providing optimal aesthetic value. However, before you take out the pruning shears and begin cutting and snipping away at the elm in your yard, make sure that the time is right for pruning. Pruning at the incorrect times can cause injury to an elm tree and can even make the tree more susceptible to Dutch elm disease, which is a devastating fungal disease that elm bark beetles spread.</span></p><span data-dcnode-id="382" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="374"><div class="inline-ad inline-ad--mobile" data-dcnode-id="375"><p class="inline-ad__label ui-label" data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">

      Video of the Day
    </span></p><span data-dcnode-id="371" instrument_node=""> </span><div class="component-article-section-jwplayer-container-outer" data-dcnode-id="365"><div class="component-article-section-jwplayer-container" data-dcnode-id="366"><div data-ad-tag="https://pubads.g.doubleclick.net/gampad/ads?sz=640x480&amp;iu=/6117/ehow.jw&amp;impl=s&amp;gdfp_req=1&amp;env=vp&amp;output=vast&amp;unviewed_position_start=1&amp;" data-dcnode-id="370" data-index-exchange-id="247073" data-player-url="https://content.jwplatform.com/libraries/4vWWJItE.js" data-playlist-url="https://cdn.jwplayer.com/v2/playlists/MMQvDlZR" data-preroll-duration-limit="25" id="lg-jwplayer"></div><span data-dcnode-id="369" instrument_node=""> </span><div data-dcnode-id="367" id="lg-jwplayer-close"><span class="close-x" data-dcnode-id="368"></span></div></div></div></div></div><div class="component-article-section-heading article-section-content" data-dcnode-id="360"><h2 data-dcnode-id="361" id="by-season"><span data-dcnode-id="362" instrument_node="">
    By Season
  </span></h2></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="356"><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">As with many types of deciduous tree, the ideal pruning time for an elm tree is early spring, as TreeHelp.com notes. During the early spring, hard, thick tissue, known as callus tissue, develops rapidly over the areas you prune. The callus tissue protects elm trees from invading pests, which in turn helps prevent the spread of Dutch elm disease. In comparison, waiting until summer to prune an elm can deter new growth and disrupt foliage production. Waiting even longer to prune, such as until late summer or early fall, can cause rapid regrowth of the shoots and branches you cut back. As a result, the elm tree can suffer from cold damage over the winter, as the new growth may not have ample time to harden.</span></p><span data-dcnode-id="357" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="349"><div class="inline-ad inline-ad--mobile" data-dcnode-id="350"><p class="inline-ad__label ui-label" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">

    </span></p><span data-dcnode-id="353" instrument_node=""> </span><div class="inline-ad__wrapper inline-ad__wrapper_runway" data-dcnode-id="351"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="1" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/dmd.ehow.mw/slot1-2" data-ad-refresh="false" data-ad-sizes="[[300,250]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_2&quot;}" data-ad-type="gpt" data-dcnode-id="352" id="slot1-2" reve-ad-refresh="false"></div></div></div></div><div class="component-article-section-heading article-section-content" data-dcnode-id="346"><h2 data-dcnode-id="347" id="by-year"><span data-dcnode-id="348" instrument_node="">
    By Year
  </span></h2></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="342"><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">According to TreeHelp.com, you should thoroughly prune an elm tree once every three years. Pruning an elm more frequently than this can interfere with the tree's development, potentially stunting its growth. However, if you have a young elm tree that you have just planted in the yard, a different pruning schedule may be necessary. As the Virginia Cooperative Extension notes, with a young tree, leaving on temporary branches for three or four years following planting can help protect the tree's bark from sun scald and can also help increase trunk strength and food production. Temporary branches are branches that grow below scaffolding branches, which are the branches that form the framework of a tree's canopy. According to Virginia Cooperative Extension, after the three or four years is up, you can gradually remove temporary branches over the following two or three years.</span></p><span data-dcnode-id="343" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="335"><div class="inline-ad inline-ad--mobile" data-dcnode-id="336"><p class="inline-ad__label ui-label" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">
