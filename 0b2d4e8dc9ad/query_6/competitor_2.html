 a specific shape? Read on below to learn more about these specifics.</span></p><span data-dcnode-id="1200" instrument_node="">
</span></div><div class="fusion-title title fusion-title-4 fusion-sep-none fusion-title-text fusion-title-size-four" data-dcnode-id="1194" style="margin-top:16px;margin-right:0px;margin-bottom:16px;margin-left:0px;"><h4 class="title-heading-left fusion-responsive-typography-calculated" data-dcnode-id="1195" style="margin:0;--fontSize:26;--minFontSize:26px;line-height:1.5;"><span data-dcnode-id="1196" instrument_node="">Pruning Terminology</span></h4></div><div class="fusion-text fusion-text-8" data-dcnode-id="1186"><p data-dcnode-id="1192" style="text-align: left;"><span data-dcnode-id="1193" instrument_node="">Let’s make sure we’re on the same page with our pruning verbiage. Below are definitions of the different types of cuts you may wish to employ.</span></p><span data-dcnode-id="1191" instrument_node="">

</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Head cuts control the overall size of the tree vertically, for the most part. They’re also known as “topping” cuts.&nbsp; If your tree is to be harvested annually for olive fruit, you may wish to make head cuts eventually to control the height of your tree. (If you can’t reach the fruit on branches that grow beyond the height of reach, that means the tree is sending a lot of energy to an area of the tree you can’t harvest.) Head cuts remove terminal shoots or limbs. When these are removed, regrowth is stimulated near the cut. It can also invigorate growth, resulting in thick, compact form near the cut. This may also be useful for training and shape for olive trees maintained in containers.</span></p><span data-dcnode-id="1152" instrument_node="">

</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Thinning cuts aid in long-term growth and health of the tree. Thinning is cutting out branches of your olive tree to permit greater sun exposure of the inner canopy. This, in turn, may produce higher fruit production within the canopy. Thinning cuts may also be used simply to shape the tree into a pleasing shape. They are often used with multi-trunked trees to “thin” the middle of the tree, allowing greater airflow and sunshine to penetrate the tree at lower levels.</span></p><span data-dcnode-id="1098" instrument_node="">

</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Just as it sounds, vase pruning opens the center of the canopy as a flower arrangement would in a vase. By removing center branches, more lateral growth is encouraged than vertical growth. This frequently leads to a larger olive crop in fruiting trees, that is distributed across the entire canopy versus a crop formed primarily around the perimeter when the canopy is denser in the center of the tree. Vase pruning is the most common for olive trees. And it is employed often for non-fruiting olive trees to create the most pleasing visual appearance of the tree.</span></p><span data-dcnode-id="1047" instrument_node="">
</span><div class="fusion-builder-row fusion-builder-row-inner fusion-row fusion-flex-align-items-flex-start" data-dcnode-id="1022" style="width:104% !important;max-width:104% !important;margin-left: calc(-4% / 2 );margin-right: calc(-4% / 2 );"><div class="fusion-layout-column fusion_builder_column_inner fusion-builder-nested-column-4 fusion_builder_column_inner_1_3 1_3 fusion-flex-column" data-dcnode-id="1039"><div class="fusion-column-wrapper fusion-flex-justify-content-flex-start fusion-content-layout-column" data-dcnode-id="1042" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div data-dcnode-id="1043" style="text-align:center;"><span class="fusion-imageframe imageframe-none imageframe-6 hover-type-zoomin" data-dcnode-id="1044"><a class="fusion-lightbox" data-dcnode-id="1045" data-rel="iLightbox[77b4decd74a586e77a3]" data-title="Fruiting Olive Trees in 15 gallon containers" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/wp-content/uploads/2019/05/swanhill_olive_trees.jpg" title="Fruiting Olive Trees in 15 gallon containers"><img alt="Fruiting 15 gallon olive trees" class="lazyload img-responsive wp-image-1253" data-dcnode-id="1046" data-orig-src="https://olivesunlimited.com/wp-content/uploads/2019/05/swanhill_olive_trees.jpg" height="563" src="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27750%27%20height%3D%27563%27%20viewBox%3D%270%200%20750%20563%27%3E%3Crect%20width%3D%27750%27%20height%3D%27563%27%20fill-opacity%3D%220%22%2F%3E%3C%2Fsvg%3E" width="750"></a></span></div></div></div><div class="fusion-layout-column fusion_builder_column_inner fusion-builder-nested-column-5 fusion_builder_column_inner_1_3 1_3 fusion-flex-column" data-dcnode-id="1031"><div class="fusion-column-wrapper fusion-flex-justify-content-flex-start </span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">The most commonly used pruning tools for olive trees are loppers and pruning shears. While pole shears may also be used for head cuts and thinning, they require an experienced hand and knowledge of safety protocols to ensure other branches aren’t damaged when cuts are made, nor are attending humans injured by falling branches!</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">We recommend you maintain your pruning tools in good conditions, oiling and cleaning them as needed. And in the case of disease, ensure your tools are sterilized between uses to prevent spreading of disease.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">On rare occasion you may have use for a chain saw to trim a branch. This tool should only be used by an experienced practitioner following all necessary safety protocols, including the use of safety goggles.</span></p><span data-dcnode-id="980" instrument_node="">

</span></div></div></div></div></div></div><div class="fusion-fullwidth fullwidth-box fusion-builder-row-9 fusion-flex-container nonhundred-percent-fullwidth non-hundred-percent-height-scrolling" data-dcnode-id="741" style="background-color: rgba(255,255,255,0);background-position: center center;background-repeat: no-repeat;border-width: 0px 0px 0px 0px;border-color:#eae9e9;border-style:solid;"><div class="fusion-builder-row fusion-row fusion-flex-align-items-flex-start" data-dcnode-id="744" style="max-width:calc( 80% + 0px );margin-left: calc(-0px / 2 );margin-right: calc(-0px / 2 );"><div class="fusion-layout-column fusion_builder_column fusion-builder-column-18 fusion_builder_column_1_1 1_1 fusion-flex-column" data-dcnode-id="745"><div class="fusion-column-wrapper fusion-flex-justify-content-flex-start fusion-content-layout-column" data-dcnode-id="748" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-title title fusion-title-5 fusion-sep-none fusion-title-text fusion-title-size-four" data-dcnode-id="927" style="margin-top:16px;margin-right:0px;margin-bottom:16px;margin-left:0px;"><h4 class="title-heading-left fusion-responsive-typography-calculated" data-dcnode-id="928" style="margin:0;--fontSize:26;--minFontSize:26px;line-height:1.5;"><span data-dcnode-id="929" instrument_node="">When and Why to Prune an Olive Tree</span></h4></div><div class="fusion-text fusion-text-15" data-dcnode-id="902"><p data-dcnode-id="925" style="text-align: left;"><span data-dcnode-id="926" instrument_node="">Here are guides for when and why to prune your olive tree:</span></p><span data-dcnode-id="924" instrument_node="">
</span><ul data-dcnode-id="904"><span data-dcnode-id="923" instrument_node="">
</span><li data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Wait until your tree has been planted for at least 3 years before any pruning. Until your tree is at least four years old, keep your shears and loppers stowed away. During the first three years of growth, encourage foliage to form and roots to remain undisturbed as the tree acclimates to its environment. The tree’s leaves provide its food (photosynthesis!), so having as many leaves as possible when it is young ensures for the healthiest tree.</span></li><span data-dcnode-id="920" instrument_node="">
</span><li data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Pruning is usually conducted after harvest (winter-spring) during the dormant season. But there are good reasons to prune into late spring. (See below.)</span></li><span data-dcnode-id="917" instrument_node="">
</span><li data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Because pruning leaves fresh, open wounds at the cuts, it is recommended not to prune during the rainy season when water-borne or mold/mildew diseases are more easily transmitted. We also recommend waiting until frost season has passed before pruning.</span></li><span data-dcnode-id="914" instrument_node="">
</span><li data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Best practices: prune olive trees in spring or in early summer after the tree begins to open its flower buds. (TIP: Pruning an olive tree while it’s blooming allows you to assess the probable crop before you trim.)</span></li><span data-dcnode-id="911" instrument_node="">
</span><li data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Shaping the tree – Beginning with its fourth year after planting, prune your olive tree to open the canopy. For trees planted in a container (or non fruiting), now is the time to begin thinning your tree’s limbs and branches to create the desired shape.</span></li><span data-dcnode-id="908" instrument_node="">
</span><li data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Prune to remove dead, diseased or damaged limbs as needed. If you are not familiar with the proper angle cuts to ensure these limbs’ wounds heal properly, please review the detailed instructions for angle and placement of cuts on damaged limbs in the reference links below.</span></li><span data-dcnode-id="905" instrument_node="">
</span></ul><span data-dcnode-id="903" instrument_node="">
</span></div><div class="fusion-title title fusion-title-6 fusion-sep-none fusion-title-text fusion-title-size-four" data-dcnode-id="897" style="margin-top:16px;margin-right:0px;margin-bottom:16px;margin-left:0px;"><h4 class="title-heading-left fusion-responsive-typography-calculated" data-dcnode-id="898" style="margin:0;--fontSize:26;--minFontSize:26px;line-height:1.5;"><span data-dcnode-id="899" instrument_node="">Pruning Strategy</span></h4></div><div class="fusion-text fusion-text-16" data-dcnode-id="749"><p data-dcnode-id="895" style="text-align: left;"><span data-dcnode-id="896" instrument_node="">Considerations for your olive tree pruning strategy:</span></p><span data-dcnode-id="894" instrument_node="">
</span><ul data-dcnode-id="772"><span data-dcnode-id="893" instrument_node="">
</span><li data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">For a commercial olive tree orchard: What’s the proximity to neighboring trees? How far apart do you need to maintain limbs for optimal sun exposure and airflow? Is this an “on” or “off” year for your trees? (“On” years alternate with “off” years, producing more fruit than the tree usually can support. So you may wish to trim more heavily in “off” years to stimulate growth for the following “on” year production.) Did your orchard suffer from a recent frost, throwing off the alternating cycle?</span></li><span data-dcnode-id="890" instrument_node="">
</span><li data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">For fruiting production: Are you harvesting manually or by machine? What is your maximum height?</span></li><span data-dcnode-id="887" instrument_node="">
</span><li data-dcnode-id="877"><span data-dcnode-id="886" instrument_node="">Vigorous growers: These trees grow quickly and will require greater attention in pruning if you wish to maintain a specific height: </span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/leccino-olive-tree/"><span data-dcnode-id="885" instrument_node="">Leccino</span></a><span data-dcnode-id="883" instrument_node="">, </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/pendolino-olive-tree/"><span data-dcnode-id="882" instrument_node="">Pendolino</span></a><span data-dcnode-id="880" instrument_node=""> and </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/swan-hill-olive-tree/"><span data-dcnode-id="879" instrument_node="">Swan Hill</span></a></li><span data-dcnode-id="876" instrument_node="">
</span><li data-dcnode-id="851"><span data-dcnode-id="875" instrument_node="">Moderate growers: </span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/cerignola-olive-tree/"><span data-dcnode-id="874" instrument_node="">Cerignola</span></a><span data-dcnode-id="872" instrument_node="">, </span><a data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/coratina-olive-tree/"><span data-dcnode-id="871" instrument_node="">Coratina</span></a><span data-dcnode-id="869" instrument_node="">, </span><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/kalamata-olive-tree/"><span data-dcnode-id="868" instrument_node="">Kalamata</span></a><span data-dcnode-id="866" instrument_node="">, </span><a data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/koroneiki-olive-tree/"><span data-dcnode-id="865" instrument_node="">Koroneiki</span></a><span data-dcnode-id="863" instrument_node="">, </span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/little-ollie-dwarf-olive/"><span data-dcnode-id="862" instrument_node="">Little Ollie Dwarf Olive</span></a><span data-dcnode-id="860" instrument_node="">, </span><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/maurino-olive-tree/"><span data-dcnode-id="859" instrument_node="">Maurino</span></a><span data-dcnode-id="857" instrument_node="">, </span><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/sevillano-olive-tree/"><span data-dcnode-id="856" instrument_node="">Sevillano</span></a><span data-dcnode-id="854" instrument_node=""> and </span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/wilsonii-olive-tree/"><span data-dcnode-id="853" instrument_node="">Wilsonii</span></a></li><span data-dcnode-id="850" instrument_node="">
</span><li data-dcnode-id="837"><span data-dcnode-id="849" instrument_node="">Slow growers: These olive cultivars develop slowly but may also have canopies that grow quick tall and wide: </span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/arbequina-olive-tree/"><span data-dcnode-id="848" instrument_node="">Arbequina</span></a><span data-dcnode-id="846" instrument_node="">, </span><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/frantoio-olive-tree/"><span data-dcnode-id="845" instrument_node="">Frantoio</span></a><span data-dcnode-id="843" instrument_node="">, </span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/majestic-beauty-olive-tree/"><span data-dcnode-id="842" instrument_node="">Majestic Beauty</span></a><span data-dcnode-id="840" instrument_node=""> and </span><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/manzanillo-olive-tree/"><span data-dcnode-id="839" instrument_node="">Manzanillo</span></a></li><span data-dcnode-id="836" instrument_node="">
</span><li data-dcnode-id="826"><span data-dcnode-id="835" instrument_node="">Large canopy: These cultivars may grow between 30 and 40 feet tall (and potentially as wide) without rigorous pruning: </span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/arbequina-olive-tree/"><span data-dcnode-id="834" instrument_node="">Arbequina</span></a><span data-dcnode-id="832" instrument_node="">, </span><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/cerignola-olive-tree/"><span data-dcnode-id="831" instrument_node="">Cerignola</span></a><span data-dcnode-id="829" instrument_node=""> and </span><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/swan-hill-olive-tree/"><span data-dcnode-id="828" instrument_node="">Swan Hill</span></a></li><span data-dcnode-id="825" instrument_node="">
</span><li data-dcnode-id="791"><span data-dcnode-id="824" instrument_node="">Moderate canopy: Most of these cultivars may grown between 20 and 25 feet wide or tall: </span><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/coratina-olive-tree/"><span data-dcnode-id="823" instrument_node="">Coratina</span></a><span data-dcnode-id="821" instrument_node="">, </span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/frantoio-olive-tree/"><span data-dcnode-id="820" instrument_node="">Frantoio</span></a><span data-dcnode-id="818" instrument_node="">, </span><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/kalamata-olive-tree/"><span data-dcnode-id="817" instrument_node="">Kalamata</span></a><span data-dcnode-id="815" instrument_node="">, </span><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/koroneiki-olive-tree/"><span data-dcnode-id="814" instrument_node="">Koroneiki</span></a><span data-dcnode-id="812" instrument_node="">, </span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/leccino-olive-tree/"><span data-dcnode-id="811" instrument_node="">Leccino</span></a><span data-dcnode-id="809" instrument_node="">, </span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/majestic-beauty-olive-tree/"><span data-dcnode-id="808" instrument_node="">Majestic Beauty</span></a><span data-dcnode-id="806" instrument_node="">, </span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/manzanillo-olive-tree/"><span data-dcnode-id="805" instrument_node="">Manzanillo</span></a><span data-dcnode-id="803" instrument_node="">, </span><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/maurino-olive-tree/"><span data-dcnode-id="802" instrument_node="">Maurino</span></a><span data-dcnode-id="800" instrument_node="">, </span><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/pendolino-olive-tree/"><span data-dcnode-id="799" instrument_node="">Pendolino</span></a><span data-dcnode-id="797" instrument_node="">, </span><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/sevillano-olive-tree/"><span data-dcnode-id="796" instrument_node="">Sevillano</span></a><span data-dcnode-id="794" instrument_node=""> and </span><a data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/wilsonii-olive-tree/"><span data-dcnode-id="793" instrument_node="">Wilsonii</span></a></li><span data-dcnode-id="790" instrument_node="">
</span><li data-dcnode-id="785"><span data-dcnode-id="789" instrument_node="">Small canopy: The </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/little-ollie-dwarf-olive/"><span data-dcnode-id="788" instrument_node="">Little Ollie Dwarf Olive</span></a><span data-dcnode-id="786" instrument_node=""> is ideal for low hedges and shrubs, topping out at four feet in height and width.</span></li><span data-dcnode-id="784" instrument_node="">
</span><li data-dcnode-id="774"><span data-dcnode-id="783" instrument_node="">Canopy density: These cultivars sport canopies with tightly spaced leaves, requiring greater thinning if more sunlight or fruit production is desired: </span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/leccino-olive-tree/"><span data-dcnode-id="782" instrument_node="">Leccino</span></a><span data-dcnode-id="780" instrument_node="">, </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/little-ollie-dwarf-olive/"><span data-dcnode-id="779" instrument_node="">Little Ollie Dwarf Olive</span></a><span data-dcnode-id="777" instrument_node=""> and </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olivesunlimited.com/portfolio-item/wilsonii-olive-tree/"><span data-dcnode-id="776" instrument_node="">Wilsonii</span></a></li><span data-dcnode-id="773" instrument_node="">
</span></ul><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">For commercial olive production, we recommend writing out your strategy and pruning plan to clarify your thoughts on the cultivars in your orchard and to write out your results each year for comparative analysis. This will ensure you achieve the desired results. A few tips:</span></p><span data-dcnode-id="768" instrument_node="">
</span><ul data-dcnode-id="751"><span data-dcnode-id="767" instrument_node="">
</span><li data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Smart pruning is one considered part of a multi-year strategy. When planning for vase pruning, we recommend removing major center branches over three years, trimming one or more major branch over the three year period.</span></li><span data-dcnode-id="764" instrument_node="">
</span><li data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Some master pruners adhere to the principle that every olive on the tree should receive sunlight during part of the day. If your canopy is too dense for this to occur, you’ll need to plan when and where to open it up for more sunshine to beam through.</span></li><span data-dcnode-id="761" instrument_node="">
</span><li data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Plan desired tree shape: Some cultivars are naturally rounded, others more vase shaped. But some desire the A-frame or Christmas tree shape to achieve more sun exposure. The shape of the tree affects fruit production and related harvesting ability. Determine what works best for you.</span></li><span data-dcnode-id="758" instrument_node="">
</span><li data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Routine maintenance vs. strategic pruning – choose the best time for each. Routine maintenance can be completed at any time, removing suckers and shoots around the tree trunk’s base. Strategic pruning involves planning for the coming season and responding to climate conditions which vary from&nbsp; year to year.</span></li><span data-dcnode-id="755" instrument_node="">
</span><li data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Allowances for tree personality – Your ancient olive trees may have highly unique appearances, from quite gnarly to elegantly aging. These trees may show highly imbalanced canopies but loads of personality. Trim with care once you understand how your cuts will affect growth over several years into the future.</span></li><span data-dcnode-id="752" instrument_node="">
</span></ul><span data-dcnode-id="750" instrument_node="">
</span></div></div></div></div></div><div data-dcnode-id="723" id="#Landscape"><div class="fusion-fullwidth fullwidth-box fusion-builder-row-10 fusion-flex-container nonhundred-percent-fullwidth non-hundred-percent-height-scrolling" data-dcnode-id="724" style="background-color: rgba(255,255,255,0);background-position: center center;background-repeat: no-repeat;border-width: 0px 0px 0px 0px;border-color:#eae9e9;border-style:solid;"><div class="fusion-builder-row fusion-row fusion-flex-align-items-flex-start" data-dcnode-id="727" style="max-width:calc( 80% + 0px );margin-left: calc(-0px / 2 );margin-right: calc(-0px / 2 );"><div class="fusion-layout-column fusion_builder_column fusion-builder-column-19 fusion_builder_column_1_1 1_1 fusion-flex-column" data-dcnode-id="728"><div class="fusion-column-wrapper fusion-flex-justify-content-flex-start fusion-content-layout-column" data-dcnode-id="731" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-separator fusion-full-width-sep" data-dcnode-id="739" style="align-self: center;margin-left: auto;margin-right: auto;margin-top:16px;margin-bottom:40px;width:100%;"><div class="fusion-separator-border sep-single sep-solid" data-dcnode-id="740" style="border-color:#f1f1f1;border-top-width:2px;"></div></div><div class="fusion-separator" data-dcnode-id="737" style="align-self: flex-start;margin-right:auto;margin-top:8px;width:100%;max-width:32px;"><div class="fusion-separator-border sep-single sep-solid" data-dcnode-id="738" style="border-color:#000000;border-top-width:2px;"></div></div><div class="fusion-text fusion-text-17 caption" data-dcnode-id="732"><p data-dcnode-id="734"><span data-dcnode-id="735" style="padding-left: 52px;"><span data-dcnode-id="736" instrument_node="">Resources</span></span></p><span data-dcnode-id="733" instrument_node="">
</span></div></div></div></div></div></div><div class="fusion-fullwidth fullwidth-box fusion-builder-row-11 fusion-flex-container nonhundred-percent-fullwidth non-hundred-percent-height-scrolling" data-dcnode-id="675" style="background-color: rgba(255,255,255,0);background-position: center center;background-repeat: no-repeat;border-width: 0px 0px 0px 0px;border-color:#eae9e9;border-style:solid;"><div class="fusion-builder-row fusion-row fusion-flex-align-items-flex-start" data-dcnode-id="678" style="max-width:calc( 80% + 0px );margin-left: calc(-0px / 2 );margin-right: calc(-0px / 2 );"><div class="fusion-layout-column fusion_builder_column fusion-builder-column-20 fusion_builder_column_1_1 1_1 fusion-flex-column" data-dcnode-id="679"><div class="fusion-column-wrapper fusion-flex-justify-content-flex-start fusion-content-layout-column" data-dcnode-id="682" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-title title fusion-title-7 fusion-sep-none fusion-title-text fusion-title-size-four" data-dcnode-id="718" style="margin-top:16px;margin-right:0px;margin-bottom:16px;margin-left:0px;"><h4 class="title-heading-left fusion-responsive-typography-calculated" data-dcnode-id="719" style="margin:0;--fontSize:26;--minFontSize:26px;line-height:1.5;"><span data-dcnode-id="720" instrument_node="">Resources on Pruning</span></h4></div><div class="fusion-text fusion-text-18" data-dcnode-id="683"><p data-dcnode-id="716" style="text-align: left;"><span data-dcnode-id="717" instrument_node="">Here are some excellent, detailed guides on pruning methodology:</span></p><span data-dcnode-id="715" instrument_node="">
</span><ul data-dcnode-id="685"><span data-dcnode-id="714" instrument_node="">
</span><li data-dcnode-id="711"><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardeningknowhow.com/edible/fruits/olive/pruning-olive-trees.htm"><span data-dcnode-id="713" instrument_node="">Pruning Olive Trees – Learn When And How To Prune Olive Trees</span></a></li><span data-dcnode-id="710" instrument_node="">
</span><li data-dcnode-id="707"><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Prune-an-Olive-Tree"><span data-dcnode-id="709" instrument_node="">How to Prune an Olive Tree</span></a></li><span data-dcnode-id="706" instrument_node="">
