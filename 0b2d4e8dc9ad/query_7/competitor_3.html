</span><h2 data-dcnode-id="1087"><span data-dcnode-id="1091" instrument_node="">The different types</span><br data-dcnode-id="1090"><b data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node=""> of prunes</span></b></h2><span data-dcnode-id="1086" instrument_node="">
</span></div><span data-dcnode-id="1084" instrument_node="">
</span><div class="clear" data-dcnode-id="1083"></div><span data-dcnode-id="1082" instrument_node="">
</span></section><span data-dcnode-id="1080" instrument_node="">
</span><section class="contenu mB1rem ombrage_1 mT1rem" data-dcnode-id="1048"><span data-dcnode-id="1079" instrument_node="">
</span><div class="taL mT1rem" data-dcnode-id="1064" id="dp_paragraphe_1"><span data-dcnode-id="1078" instrument_node="">
</span><b data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">	You’ll often hear people say that a prune is just a prune!  It’s true that the different types of prune all look fairly similar.  You can’t judge this exceptional fruit merely by grade (the number of fruits per 500g) – there’s a lot more to it than that. 

					</span></b><br data-dcnode-id="1075"><br data-dcnode-id="1074"><span data-dcnode-id="1073" instrument_node="">
</span><span class="orange" data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">•</span></span><span data-dcnode-id="1070" instrument_node=""> Prunes are made from Ente plums, the only variety of plum with the physical and flavour qualities required to make a truly high-quality prune.</span><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">
</span><span class="orange" data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">•</span></span><span data-dcnode-id="1065" instrument_node=""> They are available in a number of different grades, or sizes.				</span></div><span data-dcnode-id="1063" instrument_node="">
</span><div class="mT1rem" data-dcnode-id="1050" id="dp_illustration1"><span data-dcnode-id="1062" instrument_node="">
</span><picture data-dcnode-id="1052"><span data-dcnode-id="1061" instrument_node="">
</span><source data-dcnode-id="1060" media="(max-width:480px)" srcset="images/500/prunes-DifferentsPruneaux.jpg, images/1000/prunes-DifferentsPruneaux.jpg 2x"><span data-dcnode-id="1059" instrument_node="">
</span><source data-dcnode-id="1058" media="(max-width:768px)" srcset="images/800/prunes-DifferentsPruneaux.jpg, images/1600/prunes-DifferentsPruneaux.jpg 2x"><span data-dcnode-id="1057" instrument_node="">
</span><source data-dcnode-id="1056" srcset="images/1050/prunes-DifferentsPruneaux.jpg"><span data-dcnode-id="1055" instrument_node="">
</span><img alt="" class="w100p dispBlock" data-dcnode-id="1054" srcset="images/1050/prunes-DifferentsPruneaux.jpg"><span data-dcnode-id="1053" instrument_node="">
</span></picture><span data-dcnode-id="1051" instrument_node="">
</span></div><span data-dcnode-id="1049" instrument_node="">
</span></section><span data-dcnode-id="1047" instrument_node="">
</span><section class="contenu mB1rem ombrage_1 mT1rem" data-dcnode-id="931"><span data-dcnode-id="1046" instrument_node="">
</span><div class="taL mT1rem" data-dcnode-id="1008" id="dp_paragraphe_1"><span data-dcnode-id="1045" instrument_node="">
</span><div class="fL" data-dcnode-id="1026" id="dp_paragraphe_1_gauche"><span data-dcnode-id="1044" instrument_node="">
</span><h2 class="orange gras" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">The Agen prune</span></h2><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1040" instrument_node="">

						When you hear the word Agen, you intuitively think that all it takes is for the plums to be harvested in a specific area (Agen). </span><br data-dcnode-id="1039"><span data-dcnode-id="1038" instrument_node="">

						 While this is partly true, it is certainly not all.  We’ll tell you all about it.</span><br data-dcnode-id="1037"><br data-dcnode-id="1036"><span data-dcnode-id="1035" instrument_node="">
</span></p><span data-dcnode-id="1033" instrument_node="">
</span><div class="orange gras" data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Agen prunes are protected by an IGP.</span></div><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">

						An IGP (Protected Geographical Indication) is a European label of recognition, created in 1992, to combat fraud and protect the original product awarded the label.

						</span></p><span data-dcnode-id="1027" instrument_node="">
</span></div><span data-dcnode-id="1025" instrument_node="">
</span><div class="fL" data-dcnode-id="1012" id="dp_paragraphe_1_droite"><span data-dcnode-id="1024" instrument_node="">
</span><picture data-dcnode-id="1014"><span data-dcnode-id="1023" instrument_node="">
</span><source data-dcnode-id="1022" media="(max-width:480px)" srcset="images/500/PruneauxIGP.jpg, images/1000/PruneauxIGP.jpg 2x"><span data-dcnode-id="1021" instrument_node="">
</span><source data-dcnode-id="1020" media="(max-width:768px)" srcset="images/800/PruneauxIGP.jpg, images/1600/PruneauxIGP.jpg 2x"><span data-dcnode-id="1019" instrument_node="">
</span><source data-dcnode-id="1018" srcset="images/1050/PruneauxIGP.jpg"><span data-dcnode-id="1017" instrument_node="">
</span><img alt="" class="w100p mW1024 dispBlock" data-dcnode-id="1016" srcset="images/1050/PruneauxIGP.jpg"><span data-dcnode-id="1015" instrument_node="">
</span></picture><span data-dcnode-id="1013" instrument_node="">
</span></div><span data-dcnode-id="1011" instrument_node="">
</span><div class="clear" data-dcnode-id="1010"></div><span data-dcnode-id="1009" instrument_node="">
</span></div><span data-dcnode-id="1007" instrument_node="">
</span><div class="taL mT1rem" data-dcnode-id="933" id="dp_paragraphe_2"><span data-dcnode-id="1006" instrument_node="">
</span><div class="fL" data-dcnode-id="993" id="dp_paragraphe_2_gauche"><span data-dcnode-id="1005" instrument_node="">
</span><picture data-dcnode-id="995"><span data-dcnode-id="1004" instrument_node="">
</span><source data-dcnode-id="1003" media="(max-width:480px)" srcset="images/500/CarteAgen.jpg, images/1000/CarteAgen.jpg 2x"><span data-dcnode-id="1002" instrument_node="">
</span><source data-dcnode-id="1001" media="(max-width:768px)" srcset="images/800/CarteAgen.jpg, images/1600/CarteAgen.jpg 2x"><span data-dcnode-id="1000" instrument_node="">
</span><source data-dcnode-id="999" srcset="images/1050/CarteAgen.jpg"><span data-dcnode-id="998" instrument_node="">
</span><img alt="" class="w100p mW1024 dispBlock" data-dcnode-id="997" srcset="images/1050/CarteAgen.jpg"><span data-dcnode-id="996" instrument_node="">
</span></picture><span data-dcnode-id="994" instrument_node="">
</span></div><span data-dcnode-id="992" instrument_node="">
</span><div class="fL" data-dcnode-id="981" id="dp_paragraphe_2_droite"><span data-dcnode-id="991" instrument_node="">
</span><div class="orange gras" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">So where is Agen, exactly?</span></div><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="987" instrument_node="">
							Let’s look it up on the map. Fruit with the “Agen Prune” label is produced in the strict geographical area set out for Agen prunes, which includes the entire Lot-et-Garonne department (except for the Houeillès canton), as well as the neighbouring cantons in the Gironde, the Dordogne, the Lot, the Tarn-et-Garonne and the Gers.</span><br data-dcnode-id="986"><br data-dcnode-id="985"><span data-dcnode-id="984" instrument_node="">

						The orchards, drying facilities and processing and packing plants must all be located in this area.  If you want to sell prunes as “Agen Prunes”, every step of the process (from the orchard to the final packing) must be completed within the area set out by the IGP.  And of course, this is highly controlled, ensuring that you know exactly where your Agen prunes have come from.						</span></p><span data-dcnode-id="982" instrument_node="">
</span></div><span data-dcnode-id="980" instrument_node="">
</span><div class="clear" data-dcnode-id="979"></div><span data-dcnode-id="978" instrument_node="">
</span><div class="orange gras mT1rem" data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">A careful process set out in an extremely strict set of technical specifications.</span></div><span data-dcnode-id="975" instrument_node="">

From the producer to the processor, the conditions required to bear the label are strict, precise and extensively checked.  For the Agen Prune IGP, the production of the prunes must follow all of the instructions set out in the specifications.  And only prunes made according to this procedure can be labelled “Agen Prunes”.  So it’s vital to apply all of the rules if you want to benefit from this label.  </span><br data-dcnode-id="974"><span data-dcnode-id="973" instrument_node="">

					That’s not all: every company along the line (plum farmer, dryer and processor) must be approved and checked by QUALISUD, a certifying organisation.</span><br data-dcnode-id="972"><br data-dcnode-id="971"><span data-dcnode-id="970" instrument_node="">
</span><div class="orange gras" data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Here are a few of the technical steps they need to follow.</span></div><span data-dcnode-id="967" instrument_node="">

					If we still need to convince you that this is a serious process, here is a quick breakdown of the main steps that make the Agen prune the unique product you enjoy today.</span><br data-dcnode-id="966"><br data-dcnode-id="965"><span data-dcnode-id="964" instrument_node="">
</span><b data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Trees must be pruned every year.</span></b><span data-dcnode-id="961" instrument_node=""> The pruner must bear in mind several key principles, such as maintaining the symmetrical pyramid shape, keeping a low base and keeping the framework branches* clear to ensure that air and light can penetrate deep inside the tree.

					</span><br data-dcnode-id="960"><br data-dcnode-id="959"><span data-dcnode-id="958" instrument_node="">
</span><b data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">The fruit must be harvested when fully ripe, and this is done in several passes.</span></b><span data-dcnode-id="955" instrument_node=""> Plums harvested before they ripen properly become dry, low-quality prunes. The farmer must therefore ensure that he or she picks the plums at exactly the right moment. A date is published every year, announcing the best date to start the harvest. </span><br data-dcnode-id="954"><span data-dcnode-id="953" instrument_node="">

					 However, the fruit doesn’t all ripen at once; it varies from tree to tree.  To ensure that the fruit they pick are naturally sweet, the farmer must regularly check the Brix level** of a few of their plums, using a refractometer***, so they can track the ripening of the fruit across their orchards and start the harvest at the right time.  The trees are shaken lightly, then the plums which fall are collected and a sample of 10 plums are tested using the refractometer.

					</span><br data-dcnode-id="952"><br data-dcnode-id="951"><span data-dcnode-id="950" instrument_node="">
</span><b data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">The drying rate.</span></b><br data-dcnode-id="947"><span data-dcnode-id="946" instrument_node="">

					The residual humidity must not exceed 23%, with the exception of the “mi-cuit” Agen prunes, which are produced by halting the drying process when the fruits drop to a water content of no more than 35 %.

					</span><br data-dcnode-id="945"><br data-dcnode-id="944"><span data-dcnode-id="943" instrument_node="">
</span><small data-dcnode-id="935"><span data-dcnode-id="942" instrument_node="">

					*Framework branches: large branches forking off from the trunk of the plum tree </span><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node=""> 

					**Brix level: the quantity of natural sugar contained in the plum</span><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node=""> 

					***Refractometer: In farming, refractometers are regularly used to determine the sugar content of fruit juices, jams etc.  For example: 20°Brix = 20% sugar.</span><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">
</span></small><span data-dcnode-id="934" instrument_node="">
</span></div><span data-dcnode-id="932" instrument_node="">
</span></section><span data-dcnode-id="930" instrument_node="">
</span><section class="bloc_titre_page ombrage_1" data-dcnode-id="894"><span data-dcnode-id="929" instrument_node="">
</span><div data-dcnode-id="896" id="dp_paragraphe_3"><span data-dcnode-id="928" instrument_node="">
</span><div class="fL" data-dcnode-id="915" id="dp_paragraphe_3_gauche"><span data-dcnode-id="927" instrument_node="">
</span><picture data-dcnode-id="917"><span data-dcnode-id="926" instrument_node="">
</span><source data-dcnode-id="925" media="(max-width:480px)" srcset="images/500/PruneauxBIO.png, images/1000/PruneauxBIO.png 2x"><span data-dcnode-id="924" instrument_node="">
</span><source data-dcnode-id="923" media="(max-width:768px)" srcset="images/800/PruneauxBIO.png, images/1600/PruneauxBIO.png 2x"><span data-dcnode-id="922" instrument_node="">

</span><div class="fL taL" data-dcnode-id="900" id="dp_paragraphe_3_droite"><span data-dcnode-id="913" instrument_node="">
</span><h2 class="blanc orange" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Standard organic prunes</span></h2><span data-dcnode-id="910" instrument_node="">
</span><div class="fL taL" data-dcnode-id="904" id="dp_bloc_sous_titre_droite"><span data-dcnode-id="909" instrument_node="">
</span><div class="actus_titres_fleches" data-dcnode-id="906"><a class="noSouligne" data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pruneau.fr/bio-prune.html" id="actus_lien_pruneau"><span data-dcnode-id="908" instrument_node="">Voir la page Pruneau Bio</span></a></div><span data-dcnode-id="905" instrument_node="">
</span></div><span data-dcnode-id="903" instrument_node="">
</span><div class="clear" data-dcnode-id="902"></div><span data-dcnode-id="901" instrument_node="">
</span></div><span data-dcnode-id="899" instrument_node="">
</span><div class="clear" data-dcnode-id="898"></div><span data-dcnode-id="897" instrument_node="">
</span></div><span data-dcnode-id="895" instrument_node="">
</span></section><span data-dcnode-id="893" instrument_node="">
</span><section class="contenu mB1rem ombrage_1 mT1rem" data-dcnode-id="855"><span data-dcnode-id="892" instrument_node="">
</span><div class="taL" data-dcnode-id="857" id="dp_paragraphe_4"><span data-dcnode-id="891" instrument_node="">
</span><div class="fL" data-dcnode-id="875" id="dp_paragraphe_4_gauche"><span data-dcnode-id="890" instrument_node="">
</span><h2 class="orange gras" data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">“Mi-cuit” prunes</span></h2><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="886" instrument_node="">These are prunes for which the drying process is halted at the final rehydration level for normal prunes, which is a water content of 35%.  The fruit is then packed directly into a pasteurised container and sold.  It does not undergo rehydration. These prunes make up a tiny proportion of the prunes sold (around 3% of the market). They are available all year round, but some producers release them as “new harvest” or “early” prunes, between October and December. </span><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">

						One variation on this method is to freeze the prunes before pasteurising them, instead of packing them immediately. This prolongs the shelf life of the fruit, and provides greater flexibility when marketing the prunes.</span></p><span data-dcnode-id="882" instrument_node="">
</span><h2 class="orange gras" data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Over-humidified prunes</span></h2><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">These are standard prunes, but the rehydration process is deliberately extended.  By going from 35 % to 40 %, or even higher, you get a very rich, flavoursome and soft fruit.  These products are sometimes flavoured, with vanilla for example.</span></p><span data-dcnode-id="876" instrument_node="">
</span></div><span data-dcnode-id="874" instrument_node="">
</span><div class="fL" data-dcnode-id="861" id="dp_paragraphe_4_droite"><span data-dcnode-id="873" instrument_node="">
