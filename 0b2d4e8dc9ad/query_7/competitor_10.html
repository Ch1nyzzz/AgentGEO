</span><h1 class="hero-page-title" data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">When to Trim Evergreens</span></h1><span class="white-italic-text" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">March 4, 2021</span></span><span data-dcnode-id="980" instrument_node="">
</span><ul class="white-breadcrumbs-list" data-dcnode-id="970"><span data-dcnode-id="979" instrument_node="">
</span><li data-dcnode-id="976"><a class="white-breadcrumb-link" data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.davey.com/"><span data-dcnode-id="978" instrument_node="">Home</span></a></li><span data-dcnode-id="975" instrument_node="">
</span><li data-dcnode-id="972"><a class="white-breadcrumb-link" data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">When to Trim Evergreens</span></a></li><span data-dcnode-id="971" instrument_node="">
</span></ul><span data-dcnode-id="969" instrument_node="">
</span></div><span data-dcnode-id="967" instrument_node="">
</span></div><span data-dcnode-id="965" instrument_node="">
</span></div><span data-dcnode-id="963" instrument_node="">
</span></section><span data-dcnode-id="961" instrument_node="">
</span><section class="content-section" data-dcnode-id="722"><span data-dcnode-id="960" instrument_node="">
</span><div class="medium-center-margin-wrap" data-dcnode-id="724"><span data-dcnode-id="959" instrument_node="">
</span><div class="post-topics-snippet" data-dcnode-id="939"><span data-dcnode-id="958" instrument_node="">
</span><span class="h6" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Topics</span></span><span data-dcnode-id="955" instrument_node="">
</span><ul class="post-topics-list" data-dcnode-id="941"><span data-dcnode-id="954" instrument_node="">
</span><li data-dcnode-id="951"><a class="orange-text-link" data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.davey.com/%3Ft%3Devergreen%2Btree%2Bcare"><span data-dcnode-id="953" instrument_node="">evergreen tree care</span></a></li><span data-dcnode-id="950" instrument_node="">
</span><li data-dcnode-id="947"><a class="orange-text-link" data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.davey.com/%3Ft%3Dtree%2Btrimming"><span data-dcnode-id="949" instrument_node="">tree trimming</span></a></li><span data-dcnode-id="946" instrument_node="">
</span><li data-dcnode-id="943"><a class="orange-text-link" data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.davey.com/%3Ft%3Dbest%2Btime%2Bto%2Btrim%2Btrees"><span data-dcnode-id="945" instrument_node="">best time to trim trees</span></a></li><span data-dcnode-id="942" instrument_node="">
</span></ul><span data-dcnode-id="940" instrument_node="">
</span></div><span data-dcnode-id="938" instrument_node="">
</span><div class="new-main-copy-area" data-dcnode-id="777"><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Evergreens bring such great balance to the landscape. They provide incredible texture and depths of green. Depending on your location, they even bring you that much needed privacy and greenery during those winter months when your deciduous trees and shrubs have lost their leaves.</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Evergreens can be so hardy and reliable that you might even think they don’t need a lot of pruning or maintenance. But just like your other trees need some love, you can’t ignore the needs of your evergreens.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Most evergreens have a unique shape that keeps them attractive without any pruning. This might make you think you can skip it. But there are a few moments when trimming evergreens can be worthwhile.</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">For instance, pruning out dead, diseased or broken branches can boost the health of your tree. And sometimes properly pruning for shape can also boost your tree’s aesthetics.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Once you’re sold on the need for pruning evergreens, your next question may be, “When is the best time to trim evergreens?”</span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">This is a great question because you are recognizing that evergreens, unlike deciduous trees, have specific needs. Even further, specific evergreen varieties will have different requirements compared to others.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Let’s explore the best time to prune evergreens and the complexities involved, depending on which evergreen you’re dealing with.</span></p><span data-dcnode-id="916" instrument_node="">
</span><h2 data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Best Time to Prune Evergreens</span></h2><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Pruning evergreens is done for some very specific reasons. You should remember that it’s never a good idea to trim evergreens without a good purpose in mind. Why? This can lead you to overprune the plant and cause some additional challenges like inviting diseases or pests or even negatively impacting overall plant health because of added stress.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">The main reasons for trimming evergreens are:</span></p><span data-dcnode-id="907" instrument_node="">
</span><ul data-dcnode-id="891"><span data-dcnode-id="906" instrument_node="">
</span><li data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">To remove dead or damaged branches</span></li><span data-dcnode-id="903" instrument_node="">
</span><li data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">To maintain plant health</span></li><span data-dcnode-id="900" instrument_node="">
</span><li data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">To maintain size</span></li><span data-dcnode-id="897" instrument_node="">
</span><li data-dcnode-id="893"><span data-dcnode-id="896" instrument_node="">To shape or train the plant’s growth</span><br data-dcnode-id="895"><br data-dcnode-id="894"></li><span data-dcnode-id="892" instrument_node="">
</span></ul><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">In addition to having a specific agenda, applying the appropriate pruning method depending on your specific evergreen species is vital to this process.</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Here are some of the plant types you’re dealing with:</span></p><span data-dcnode-id="884" instrument_node="">
</span><ul data-dcnode-id="873"><span data-dcnode-id="883" instrument_node="">
</span><li data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Broadleaf evergreens have foliage that is not needle-like. Think hollies.</span></li><span data-dcnode-id="880" instrument_node="">
</span><li data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Conifers include needled evergreens like pine and spruce, as well as flat scaled leafy types like cypress and arborvitae.</span></li><span data-dcnode-id="877" instrument_node="">
</span><li data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Deciduous trees like maples and some oaks lose their leaves in the fall and regrow them in the spring. Deciduous conifers are needle-leaved trees that lose their needles in the fall after they provide some color. Examples of these are the bald cypress and dawn redwood.</span></li><span data-dcnode-id="874" instrument_node="">
</span></ul><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Each of these have different trimming requirements.</span></p><span data-dcnode-id="869" instrument_node="">
</span><h3 data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Pruning Conifers</span></h3><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Pruning conifers can be different from pruning deciduous trees. When you plant conifers in the right space and with the right room for growth, they can actually require very little pruning.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">When trimming evergreens is necessary, the best time to prune conifers is winter or very early spring when they are dormant and before growth begins.</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">The next best time to prune evergreens, particularly conifers, is after the new season’s growth is complete, usually late June or July.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Minimal pruning is always best with conifers. They don’t recover quickly from trimming mistakes or haphazard cutting. If you planted a conifer in a space that is too small for its growth, then you may have to trim it a bit more. As a general rule, though, it is not advisable to remove more than one-third of the plant at any one time. This will stress the tree, and it will take longer to recover.</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">There are some specifics when it comes to certain conifer varieties.</span></p><span data-dcnode-id="851" instrument_node="">
</span><ul data-dcnode-id="829"><span data-dcnode-id="850" instrument_node="">
</span><li data-dcnode-id="846"><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Pines:</span></strong><span data-dcnode-id="847" instrument_node=""> Trim pines as new growth forms in spring.</span></li><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="841"><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Spruces and firs:</span></strong><span data-dcnode-id="842" instrument_node=""> Prune new growth in late winter or early spring.</span></li><span data-dcnode-id="840" instrument_node="">
</span><li data-dcnode-id="836"><strong data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Arborvitae:</span></strong><span data-dcnode-id="837" instrument_node=""> Prune in early spring or mid-summer. They can handle a bit heavier pruning in spring.</span></li><span data-dcnode-id="835" instrument_node="">
</span><li data-dcnode-id="831"><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Junipers:</span></strong><span data-dcnode-id="832" instrument_node=""> Prune them early in the season - April to May - depending on your growing zone. Avoid pruning in mid- to late summer as it will add new growth that will not be hardy enough by the time winter arrives.</span></li><span data-dcnode-id="830" instrument_node="">
</span></ul><span data-dcnode-id="828" instrument_node="">
</span><h3 data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Pruning Deciduous Trees</span></h3><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Some people think fall is a good time to prune deciduous trees, but that’s not the case. Trees are storing up all of their carbohydrates and preparing for dormancy. If fall pruning is necessary for any reason, consulting with a professional arborist is best since he or she can take measures to ensure less risk to your beloved landscape investments.</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">The best time to prune deciduous trees then is winter or early spring - think December through early April. This will be before they begin leafing out.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">When it comes to deciduous conifers, prune them when they are dormant in late winter or after needle fall. Your focus should be on lightly trimming back the outermost growth.</span></p><span data-dcnode-id="816" instrument_node="">
</span><h3 data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Pruning Broadleaf Evergreens</span></h3><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Looking to prune your broadleaf evergreens? These require different timing compared to conifers and other evergreens. Generally, you want to prune broadleaf evergreens in early spring or mid-summer.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">When it comes to some of your favorites, you’ll want to understand more about the plant to ensure success when trimming evergreens.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Boxwoods are a popular landscape plant. They tend to tolerate pruning well. Most boxwoods have a nice informal shape without much pruning, except for the occasional trimming to clean out dead branches and lightly for shape. This can be done almost any time during the growing season, but avoid late fall to prevent any winter browning.</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Hollies are also a regular in home landscapes. Most of the time, pruning hollies in winter when they are dormant is a good plan. Trimming these evergreens helps keep their shape and appearance looking neat, as well as encourages new growth.</span></p><span data-dcnode-id="801" instrument_node="">
</span><h3 data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Best Time to Prune Evergreen Shrubs</span></h3><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Your trimming schedule wouldn’t be complete without also looking at evergreen shrubs and where they fit into the mix. Shrubs like Juniper and yew fall into this category.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Pruning evergreen bushes is best done in late March or early April before new growth begins. Light pruning can also happen in late June or early July.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Avoid pruning evergreen shrubs in the fall, since they are more susceptible to winter injury.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Whichever type of tree you have in your yard, it’s always important to research the species you are pruning and observe its growth habits.</span></p><span data-dcnode-id="786" instrument_node="">
</span><h3 data-dcnode-id="783"><a data-dcnode-id="784" data-id="12414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.davey.com/arborist-advice/articles/dormant-pruning/" target="_blank" title="Dormant Pruning"><span data-dcnode-id="785" instrument_node="">PRUNING CAN REQUIRE SOME SPECIFIC SKILLS FOR BEST RESULTS. SCHEDULE YOUR CONSULTATION FOR DORMANT PRUNING TODAY.</span></a></h3><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="779"><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newsletter.davey.com/acton/fs/blocks/showLandingPage/a/39378/p/p-0015/t/page/fm/1" target="_blank"><img alt="" data-dcnode-id="781" data-id="35056" id="__mcenew" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.davey.com/media/2440604/sapling-blog-image3.png&amp;raw"></a></p><span data-dcnode-id="778" instrument_node="">
</span></div><span data-dcnode-id="776" instrument_node="">
</span><div class="blog-post-metadata" data-dcnode-id="726"><span data-dcnode-id="775" instrument_node="">
