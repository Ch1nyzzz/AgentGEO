</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Growing a fruit tree in your garden and wondering when is the best time prune a fruit tree? Pruning your fruit bearing trees is key to strong growth and an overall healthy plant but cutting at the wrong time of year can cause lasting damage or kill the tree!</span></p><h2 data-dcnode-id="692"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">When to Prune Fruit Trees</span></strong></h2><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">There are a few different opinions on the best season to prune fruit trees. We think the best time to start pruning branches is in the early spring. It is important to start cutting before the buds break and the tree becomes active for the warm months of the year.</span></p><p data-dcnode-id="688"><img alt="Apple Tree" class="aligncenter size-full wp-image-669" data-dcnode-id="689" height="300" sizes="(max-width: 385px) 100vw, 385px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whackyourweeds.com/wp-content/uploads/2018/09/apple-tree-compressor.jpg&amp;raw" srcset="https://www.whackyourweeds.com/wp-content/uploads/2018/09/apple-tree-compressor.jpg 385w, https://www.whackyourweeds.com/wp-content/uploads/2018/09/apple-tree-compressor-300x234.jpg 300w" width="385"></p><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Pruning when the leaves are dormant and the branches are bare allows you to get a clear view of the entire tree and find dormant buds, disease and dead wood. If you can break the branch with your finger it is likely a good choice to prune! Scaffolding branches are also a popular target so the tree grows in the direction you want – and not into your fence!</span></p><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Waiting until the summer to prune your trees causes fruit growth to slow and even get burned by the sun! We only recommend pruning from June to August if you need to slow growth!</span></p><h2 data-dcnode-id="681"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Why Prune Fruit Trees?</span></strong></h2><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">One of the main reasons arborist prune fruit trees is to promote growth by removing things like dormant buds, dead branches and bark as well as disease. Some other benefits to pruning early in a fruit tree’s life also promotes a healthy root system and balanced branching as the tree grows. If you are not comfortable making a pruning cut we recommend calling a local tree service.</span></p><h3 data-dcnode-id="676"><strong data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">When to Prune after Year 1</span></strong></h3><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">When a tree is younger than 1 year we recommend regular pruning to promote consistent growth and health. Keep a careful eye out for disease, insects and other potential problems with bank, branches and buds during this time!</span></p><h2 data-dcnode-id="671"><b data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">When to Prune Mature Fruit Trees</span></b></h2><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">As a fruit tree ages so should your pruning strategy. While you still need to keep an eye out for things like disease, bugs and dead wood you should focus more on promoting fruit growth.</span></p><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">To promote fruit growth try to make sure all branches are receiving sunlight by pruning upper horizontal branches and removing competing vertical branches.</span></p><h2 data-dcnode-id="664"><b data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Benefits of Pruning Fruit Trees</span></b></h2><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">We like to prune our fruit trees because it:</span></p><ul data-dcnode-id="651"><li data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Promote tree health in young and old trees</span></li><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Allows trees to produce bigger fruit</span></li><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Keep away disease and pests</span></li><li data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Encourages growth of new and existing buds</span></li><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Removes dead, damaged, diseased and broken branches</span></li></ul><span data-dcnode-id="650" instrument_node=""> </span></div><span data-dcnode-id="648" instrument_node="">

</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Pruning in the Spring months allows you to remove branches and buds that may have died or become damaged over the winter but it will inhibit growth due to wasted energy. Also, new leaf growth from March to May can also block your view making cutting difficult!</span></p><h3 data-dcnode-id="570"><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Summer Pruning</span></strong></h3><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Summer is the best time for “corrective pruning” since most of the growth for the year ended in Spring. During the Summer try to prune any problem branches and buds before too much damage is done!</span></p><h3 data-dcnode-id="565"><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Fall Pruning</span></strong></h3><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">During the Fall we try to prune our fruit trees as little as possible so they can prepare themselves for winter! During the Fall months your fruit tree will be moving nutrients produced via photosynthesis to the roots and will have little energy to support your pruning cuts.</span></p><h3 data-dcnode-id="560"><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Winter Pruning</span></strong></h3><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">The best season to prune your fruit tree is in the Winter. From November to February your tree will be dormant, making pruning much easier! Pruning during the Winter also promotes growth because you can pick and choose the branches that look like they will produce the best fruit and cut away the rest!</span></p><h2 data-dcnode-id="555"><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Fruit Tree Pruning Tips</span></strong></h2><ul data-dcnode-id="543"><li data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Always use sharp shears for the best cut and safety</span></li><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Create compost from clippings as long as there is no disease</span></li><li data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Make quick, clean cuts about a quarter inch from the bud</span></li><li data-dcnode-id="544"><span data-dcnode-id="548" instrument_node="">Got a large tree? You might need to use a chain saw for the bigger branches (we recommend </span><a data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whackyourweeds.com/echo-chainsaw-reviews/"><span data-dcnode-id="547" instrument_node="">Echo</span></a><span data-dcnode-id="545" instrument_node="">)</span></li></ul><h2 data-dcnode-id="540"><strong data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Frequently Asked Questions</span></strong></h2><p data-dcnode-id="535"><strong data-dcnode-id="537"><span data-dcnode-id="539" instrument_node="">What is the best time of year to prune fruit trees?</span><br data-dcnode-id="538"></strong><span data-dcnode-id="536" instrument_node="">Experts agree the best time to prune fruit trees is before they bud and the trees are still dormant from the winter.</span></p><p data-dcnode-id="530"><b data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">How do you prune a neglected fruit tree?</span></b><br data-dcnode-id="532"><span data-dcnode-id="531" instrument_node="">Start by removing the diseased and broken branches then thinning other low hanging and weak branches starting at the bottom.</span></p><p data-dcnode-id="525"><strong data-dcnode-id="527"><span data-dcnode-id="529" instrument_node="">What time of year do you prune peach trees?</span><br data-dcnode-id="528"></strong><span data-dcnode-id="526" instrument_node="">The best time of the year to prune your peach trees is early spring, usually around March or April depending on the weather.</span></p><p data-dcnode-id="520"><strong data-dcnode-id="522"><span data-dcnode-id="524" instrument_node="">What time of year do you prune plum trees?</span><br data-dcnode-id="523"></strong><span data-dcnode-id="521" instrument_node="">Prune your plum trees before the buds break in early spring time. In our experience the best months are March or April.</span></p><span data-dcnode-id="519" instrument_node=""> </span></div><span data-dcnode-id="517" instrument_node="">
