</span><h2 data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">3 Ways to Maintain the Health of your Trees</span></h2><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Just like people regularly see a Doctor to maintain their health and receive boosts to their systems, our trees sometimes need the same maintenance and special attention. Living in Arizona provides numerous benefits as well as a great environment for landscaping and trees but a quick refresher can always provide great benefits to property owners – businesses and homeowners alike! Three simple ways to keep your trees healthy and thriving are regular tree trimming, annual deep root fertilization and watering as necessary.</span></p><span data-dcnode-id="925" instrument_node="">
</span><h3 data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Tree Trimming</span></h3><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Regular tree trimming is a simple way to maintain the health of your trees. Trimming trees during their dormant season is most recommended, but the warm months (March through September in Arizona) tend to be the most popular.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Having your trees trimmed reduces the dead weight of both deadwood and larger branches that may put unnecessary stress on the leader branches and limbs of an already stressed tree. Tree trimming reduces that weight and, when done properly by a pro tree doctor, correctly balances your tree.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">When monsoon season hits in the summer months in southern states, a balanced and trimmed tree is more likely to stay upright (and not end up dying!) A balanced tree is also largely unaffected by the strong wind gusts and rain that storms bring. Trees that are too top heavy or unbalanced are much more likely to be damaged or fall onto vehicles, homes or other surroundings.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">If an unbalanced tree starts to lean in a storm, it may even require complete removal of the tree itself. (This is definitely a worst case scenario). If a tree becomes uprooted or it’s trunk is badly damaged, there is little chance that the tree can be saved. When tree roots shift beneath the soil, a tree usually can't even be saved by a pro tree doctor.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">It's no secret that a tree doctor can help save your tree, even if it's just a balance issue. Trimmed trees are healthy trees, and healthy trees are happy trees that provide more shade, grow larger fruit, and better protect your family.</span></p><span data-dcnode-id="907" instrument_node="">
</span><h3 data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Deep Root Fertilization</span></h3><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="903" instrument_node="">Deep Root Fertilization is a great way for a tree doctor to keep your trees both healthy and strong.&nbsp; It's not only important to fertilize trees during their growing season, but also at the </span><em data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">end</span></em><span data-dcnode-id="900" instrument_node=""> of their dormant season. This is so that a hibernating tree has plenty of quality tree food once it awakens from its long nap.</span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Deep Root Fertilization (tree feeding) is performed by an Arborist professionally trained in the science of Deep Root Soil Injection.&nbsp; Treatments are administered by soil-injecting proprietary blends of nutrients into the ground under high pressure. These tree life-saving nutrients are typically comprised of nitrogen, phosphorous, potassium, and vital micro-nutrients. Those vital nutrients are soil-injected directly into the root zone of the tree to revitalize the tree's immune system.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">These soil treatments are made in a 2-3 foot grid pattern, using specialized tree Deep Root Fertilization equipment. Our tree doctor will inject these nutrients into the soil, typically 4-10 inches below the ground's surface. This directs these precious nutrients to where they're needed most; the tree's fine absorbing roots.&nbsp; By making sure this powerful liquid fertilizer is applied in the proper place, a tree's life can potentially be saved.&nbsp; (What's better than saving your tree's life? Saving hundreds or thousands of dollars on replacing a dead tree!)</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="891" instrument_node="">Healthy soil and roots mean healthier tree growth and tree longevity. According to top-rated local I.S.A. Certified Arborist Dan A. Riggs, “twice a year deep root fertilization is recommended. Once in the spring to give your trees a boost before they gear up for a season of growth. And another in the fall before the tree enters its dormancy”. This&nbsp;</span><em data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">guarantees&nbsp;</span></em><span data-dcnode-id="888" instrument_node="">that your tree's roots can eat everytime that they're hungry!</span></p><span data-dcnode-id="886" instrument_node="">
</span><h3 data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Watering</span></h3><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Regular watering of the trees and shrubbery on your property or place or work is highly recommended by tree doctors. Not only is this obvious, but it helps to wash soil salts and other impurities from the ground. This is possibly the easiest way to ensure the overall health and longevity of your trees.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">While some trees such as mesquite, citrus and eucalyptus, don’t require much watering on a regular basis, they need hydration to maintain their health. As a rule of thumb, all new trees (up to 2 years of age) should be watered daily for the first week or so to help the tree settle in. This allows the tree to establish its main root structure that it will use for it’s lifetime.</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">In the warm spring and summer months, watering is advised 1-3 times per week, depending upon the size of your trees. In the fall and winter months, watering once every week and a half should be sufficient. As always, if you notice yellowing leaves or off-colored leaves or leaning trunks, it is advised to consult with a tree doctor.</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">An I.S.A. Certified Arborist can always determine the best course of action for your trees. It may be as simple as your trees needing Deep Root Fertilization to boost their immune systems so they can fight their own infections. Or your tree doctor may find signs of something more serious, such as an infection or disease. Call a tree doctor from Gilbert Tree Trimmers(TM) Tree Services for a Free Quote!</span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">&nbsp;</span></p></div><span data-dcnode-id="867" instrument_node="">
