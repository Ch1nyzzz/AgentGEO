oSPlayer62671e86d3f37" scrolling="no" style="border: none; margin: 0px; visibility: visible; position: absolute; z-index: 0 !important; top: 0px; left: 0px; width: 100%; max-width: 100%; min-width: 100%; height: 282px;" title="primisNativeSkinFrame_SekindoSPlayer62671e86d3f37"></iframe></div></div></div></div></div><p data-dcnode-id="467"><b data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">TIP—</span></b><span data-dcnode-id="468" style="font-weight: 400;"><span data-dcnode-id="469" instrument_node="">Our expert gardening advisor, Karen Thurber adds, "Pruning trees while they are young is important to establish good structure. Begin to shape and prune your tree one to two years after planting."</span></span></p><p data-dcnode-id="462"><b data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">WARNING—</span></b><span data-dcnode-id="463" style="font-weight: 400;"><span data-dcnode-id="464" instrument_node="">Check with authorities to see if your tree qualifies as a heritage tree, in which case you need a permit to cut it. You can pay hefty fines for cutting or trimming heritage trees without permission.</span></span></p><h2 data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Tools of the Trade</span></h2><p data-dcnode-id="452"><b data-dcnode-id="453"><span class="image-container" data-dcnode-id="454"><img alt="person trimming tree branches" class="lazyload js-mobile-stretch" data-dcnode-id="459" data-src="https://cimg2.ibsrv.net/cimg/www.doityourself.com/700x312_85/950/limb-pruning-390950.png" data-srcset="https://cimg2.ibsrv.net/cimg/www.doityourself.com/660x300_85-1/950/limb-pruning-390950.png 660w,https://cimg2.ibsrv.net/cimg/www.doityourself.com/320x143_85-1/950/limb-pruning-390950.png 320w,https://cimg2.ibsrv.net/cimg/www.doityourself.com/375x168_85-1/950/limb-pruning-390950.png 375w,https://cimg2.ibsrv.net/cimg/www.doityourself.com/425x190_85-1/950/limb-pruning-390950.png 425w" data-target="#articlesModal" loading="lazy" sizes="(max-width: 320px) 320px,
                                       (max-width: 375px) 375px,
                                       (max-width: 425px) 425px,
                                660px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cimg2.ibsrv.net/cimg/www.doityourself.com/700x312_85/950/limb-pruning-390950.png&amp;raw" style="visibility: visible;"><span class="cs-image-expandable" data-dcnode-id="457" data-target="#articlesModal" data-toggle="modal"><i aria-hidden="true" class="fa fa-arrows-alt" data-dcnode-id="458"></i></span><span class="cs-image-overlay" data-dcnode-id="455" data-target="#articlesModal" data-toggle="modal"><i aria-hidden="true" class="far fa-hand-pointer" data-dcnode-id="456"></i></span></span></b></p><p data-dcnode-id="445"><b data-dcnode-id="448"><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.doityourself.com/stry/3-different-types-of-tree-pruners-explained" title="3 Different Types of Tree Pruners Explained"><span data-dcnode-id="451" instrument_node="">Pruning shears</span></a><span data-dcnode-id="449" instrument_node="">—</span></b><span data-dcnode-id="446" style="font-weight: 400;"><span data-dcnode-id="447" instrument_node="">Available in both scissor and anvil action models, the scissor design is often preferred because it makes a cleaner cut.</span></span></p><p data-dcnode-id="440"><b data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Lopping shears—</span></b><span data-dcnode-id="441" style="font-weight: 400;"><span data-dcnode-id="442" instrument_node="">Operated with both hands, this scissor-action tool can slice through branches up to two inches in diameter.</span></span></p><p data-dcnode-id="435"><b data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Pole pruner—</span></b><span data-dcnode-id="436" style="font-weight: 400;"><span data-dcnode-id="437" instrument_node="">Good for reaching higher branches.</span></span></p><p data-dcnode-id="430"><b data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Rope saw—</span></b><span data-dcnode-id="431" style="font-weight: 400;"><span data-dcnode-id="432" instrument_node="">Allows cutting of branches located higher on the tree while you remain on the ground.</span></span></p><p data-dcnode-id="425"><b data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Portable buck saw—</span></b><span data-dcnode-id="426" style="font-weight: 400;"><span data-dcnode-id="427" instrument_node="">Lightweight but very strong.</span></span></p><p data-dcnode-id="420"><b data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Chainsaw—</span></b><span data-dcnode-id="421" style="font-weight: 400;"><span data-dcnode-id="422" instrument_node="">For larger jobs, and intended for use by professionals or highly experienced homeowners only.</span></span></p><p data-dcnode-id="415"><b data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Hard hat, gloves, and safety glasses—</span></b><span data-dcnode-id="416" style="font-weight: 400;"><span data-dcnode-id="417" instrument_node="">For personal protection.</span></span></p><p data-dcnode-id="410"><b data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">TIP:</span></b><span data-dcnode-id="411" style="font-weight: 400;"><span data-dcnode-id="412" instrument_node=""> Karen recommends, "Pruning tools should be regularly sharpened to ensure a clean cut. A clean cut will heal quickly, reducing the stress on the tree and the opportunities for diseases and insects."</span></span></p><div class="ibinject-container" data-dcnode-id="408"><div data-dcnode-id="409" id="div-gpt-ad-1650925191111-0"></div></div><h2 data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Pruning Techniques</span></h2><p data-dcnode-id="403"><span class="image-container" data-dcnode-id="404"><img alt="trimming a tree branch" class="lazyload js-mobile-stretch" data-dcnode-id="405" data-src="https://cimg1.ibsrv.net/cimg/www.doityourself.com/660x300_85/325/adobestock-18697738-640325.jpg" data-srcset="https://cimg1.ibsrv.net/cimg/www.doityourself.com/660x300_85-1/325/adobestock-18697738-640325.jpg 660w,https://cimg1.ibsrv.net/cimg/www.doityourself.com/320x146_85-1/325/adobestock-18697738-640325.jpg 320w,https://cimg1.ibsrv.net/cimg/www.doityourself.com/375x171_85-1/325/adobestock-18697738-640325.jpg 375w,https://cimg1.ibsrv.net/cimg/www.doityourself.com/425x194_85-1/325/adobestock-18697738-640325.jpg 425w" data-target="#articlesModal" loading="lazy" sizes="(max-width: 320px) 320px,
                                       (max-width: 375px) 375px,
                                       (max-width: 425px) 425px,
                                660px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cimg1.ibsrv.net/cimg/www.doityourself.com/660x300_85/325/adobestock-18697738-640325.jpg&amp;raw" style="visibility: visible;"></span></p><p data-dcnode-id="400"><span data-dcnode-id="401" style="font-weight: 400;"><span data-dcnode-id="402" instrument_node="">There are several general approaches to pruning, each for a specific purpose, including:</span></span></p><p data-dcnode-id="395"><b data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Cleaning—</span></b><span data-dcnode-id="396" style="font-weight: 400;"><span data-dcnode-id="397" instrument_node="">removing dead, diseased, or weak branches from the crown of a tree</span></span></p><p data-dcnode-id="390"><b data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Thinning—</span></b><span data-dcnode-id="391" style="font-weight: 400;"><span data-dcnode-id="392" instrument_node="">removing branches to allow more light to penetrate, reducing stress on heavy limbs and encouraging retention of the tree’s natural shape, removing crossing branches that may rub on each other</span></span></p><p data-dcnode-id="385"><b data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Raising—</span></b><span data-dcnode-id="386" style="font-weight: 400;"><span data-dcnode-id="387" instrument_node="">removing lower branches to provide clearings for buildings, vehicles, pedestrians and views</span></span></p><p data-dcnode-id="380"><b data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Reduction—</span></b><span data-dcnode-id="381" style="font-weight: 400;"><span data-dcnode-id="382" instrument_node="">cutting back tree limbs to reduce the size of the tree and make room for utility lines</span></span></p><h2 data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Making the Cut</span></h2><p data-dcnode-id="375"><span class="image-container" data-dcnode-id="376"><img alt="trimming the end of a tree branch" class="lazyload js-mobile-stretch" data-dcnode-id="377" data-src="https://cimg2.ibsrv.net/cimg/www.doityourself.com/660x300_85/326/adobestock-329127803-640326.jpg" data-srcset="https://cimg2.ibsrv.net/cimg/www.doityourself.com/660x300_85-1/326/adobestock-329127803-640326.jpg 660w,https://cimg2.ibsrv.net/cimg/www.doityourself.com/320x146_85-1/326/adobestock-329127803-640326.jpg 320w,https://cimg2.ibsrv.net/cimg/www.doityourself.com/375x171_85-1/326/adobestock-329127803-640326.jpg 375w,https://cimg2.ibsrv.net/cimg/www.doityourself.com/425x194_85-1/326/adobestock-329127803-640326.jpg 425w" data-target="#articlesModal" loading="lazy" sizes="(max-width: 320px) 320px,
                                       (max-width: 375px) 375px,
                                       (max-width: 425px) 425px,
                                660px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cimg2.ibsrv.net/cimg/www.doityourself.com/660x300_85/326/adobestock-329127803-640326.jpg&amp;raw" style="visibility: visible;"></span></p><p data-dcnode-id="372"><span data-dcnode-id="373" style="font-weight: 400;"><span data-dcnode-id="374" instrument_node="">Select a spot about three inches from the collar of the branch (the thickened, collar-like place where the parent and child limb intersect) and make a cut about 1/3 of the way through the branch. This will prevent the branch, when severed, from tearing through the collar or the parent branch and harming future growth. Make this first cut on the underside of the limb.</span></span></p><p data-dcnode-id="369"><span data-dcnode-id="370" style="font-weight: 400;"><span data-dcnode-id="371" instrument_node="">Cut slightly beyond this first slice and cut straight through the branch to be removed.</span></span></p><p data-dcnode-id="366"><span data-dcnode-id="367" style="font-weight: 400;"><span data-dcnode-id="368" instrument_node="">Make a final cut through the remaining portion of the branch, as near to the collar as possible, without touching the collar itself.</span></span></p><h2 data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">To Seal or Not to Seal</span></h2><p data-dcnode-id="361"><span data-dcnode-id="362" style="font-weight: 400;"><span data-dcnode-id="363" instrument_node="">For the most part, it’s not necessary to seal the stump left after tree trimming. Nature will do this on its own. There are exceptions however. Trees such as oak, birch, and elm are particularly fragile and prone to disease. You may wish to use a non-asphalt based pruning sealer for these, as well as for any fresh stumps on trees in very dry climates.</span></span></p><div class="ibinject-container" data-dcnode-id="359"><div data-dcnode-id="360" id="div-gpt-ad-1650925191111-1"></div></div><p data-dcnode-id="354"><b data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">TIP:</span></b><span data-dcnode-id="355" style="font-weight: 400;"><span data-dcnode-id="356" instrument_node=""> Karen advises, "Do not prune Oak trees from early March through July. Oak trees are highly susceptible to the disease oak wilt which is spread by sap feeding beetles that are active during this time."</span></span></p><h2 data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">When to Call in an Expert</span></h2><p data-dcnode-id="349"><span class="image-container" data-dcnode-id="350"><img alt="cutting a tree branch" class="lazyload js-mobile-stretch" data-dcnode-id="351" data-src="https://cimg3.ibsrv.net/cimg/www.doityourself.com/660x300_85/327/adobestock-340689348-640327.jpg" data-srcset="https://cimg3.ibsrv.net/cimg/www.doityourself.com/660x300_85-1/327/adobestock-340689348-640327.jpg 660w,https://cimg3.ibsrv.net/cimg/www.doityourself.com/320x146_85-1/327/adobestock-340689348-640327.jpg 320w,https://cimg3.ibsrv.net/cimg/www.doityourself.com/375x171_85-1/327/adobestock-340689348-640327.jpg 375w,https://cimg3.ibsrv.net/cimg/www.doityourself.com/425x194_85-1/327/adobestock-340689348-640327.jpg 425w" data-target="#articlesModal" loading="lazy" sizes="(max-width: 320px) 320px,
                                       (max-width: 375px) 375px,
                                       (max-width: 425px) 425px,
                                660px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cimg3.ibsrv.net/cimg/www.doityourself.com/660x300_85/327/adobestock-340689348-640327.jpg&amp;raw" style="visibility: visible;"></span></p><p data-dcnode-id="346"><span data-dcnode-id="347" style="font-weight: 400;"><span data-dcnode-id="348" instrument_node="">If you’re inexperienced using the tools needed for the job that must be done, it's time to call a professional arborist, especially with power tools, such as chainsaws or others that harbor the chance for serious injury.</span></span></p><p data-dcnode-id="343"><span data-dcnode-id="344" style="font-weight: 400;"><span data-dcnode-id="345" instrument_node="">Also, if the limbs you need to remove are especially heavy. When it’s possible for the limb to fall improperly and hurt you or an adjacent structure.</span></span></p><p data-dcnode-id="340"><span data-dcnode-id="341" style="font-weight: 400;"><span data-dcnode-id="342" instrument_node="">Call in a pro if the limbs that need removing are too high on the tree for you to reach. It takes some skill to climb a tree or use the extended tools required for such a job. Also, never use a ladder for these jobs.</span></span></p><p data-dcnode-id="337"><span data-dcnode-id="338" style="font-weight: 400;"><span data-dcnode-id="339" instrument_node="">If the tree is close to a power line, don't try to do this yourself.</span></span></p><h2 data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">How Much Do Tree Trimming Professionals Charge?</span></h2><p data-dcnode-id="329"><span data-dcnode-id="330" style="font-weight: 400;"><span data-dcnode-id="334" instrument_node="">Professional tree trimmers charge, on average, between $50 and $90 per hour. Good ones should be members of a professional association such as the International Society of Arboriculture (ISA) and be certified by that association’s Certified </span><a data-dcnode-id="332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.doityourself.com/stry/removing-a-dead-limb-from-an-oak-tree" title="Removing a Dead Limb from an Oak Tree"><span data-dcnode-id="333" instrument_node="">Arborist</span></a><span data-dcnode-id="331" instrument_node=""> program. They should also have proof of insurance, a list of references, and give you a written estimate before beginning work.</span></span></p></div><span data-dcnode-id="327" instrument_node=""> </span><div class="keywords-container container" data-dcnode-id="315"><button class="btn keywords-accordion collapsed-xs" data-dcnode-id="321"><span class="keyword-title bottom_line" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">More From Doityourself</span></span><span data-dcnode-id="324" instrument_node=""> </span><span class="angle_container" data-dcnode-id="322"><i aria-hidden="true" class="fa fa-angle-down" data-dcnode-id="323"></i></span></button><span data-dcnode-id="320" instrument_node=""> </span><div class="keyword-content row" data-dcnode-id="316" style="display: none;"><div class="keyword-links col-12 col-md-6" data-dcnode-id="317"><a class="ga-track-click" data-dcnode-id="318" data-ga-click-category="End of Article" data-ga-click-label="Silk" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.doityourself.com/stry/make-your-own-wood-shingles"><span data-dcnode-id="319" instrument_node="">Make Your Own Wood Shingles</span></a></div></div></div><span data-dcnode-id="314" instrument_node=""> </span><div class="homeadvisor_iframe" data-dcnode-id="302"><a data-dcnode-id="312" data-target="#homeAdvisorPopupIframe" data-toggle="modal" href="#" rel="nofollow"><img alt="HomeAdvisor Iframe Image" class="homeadvisor_iframe_image lazyload" data-dcnode-id="313" data-src="/images/homeadvisor/T:D_Fences.png" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.doityourself.com/images/homeadvisor/
