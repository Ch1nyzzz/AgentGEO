</span><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Even as a beginner to bonsai, you probably know that a bonsai tree needs a lot of care to maintain its beautiful shape. Scheduled pruning is one of these things.</span></p><div data-dcnode-id="1426" data-inserter-version="2" id="ezoic-pub-ad-placeholder-187"></div><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">As a beginner to bonsai, it might be quite daunting to figure out how to prune a tree and the right time to do so. Thankfully, pruning a bonsai is not that troublesome once you know a few key elements.</span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1418"><strong data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">You need to gather some pruning tools and shape your bonsai tree the way you want it. Make sure not to over prune, and always prune and trim your bonsai tree before and after the growing season. That way, they can recover quickly and not be at risk of dying.</span></strong></p><div data-dcnode-id="1416" data-inserter-version="2" id="ezoic-pub-ad-placeholder-195"></div><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">That sounds easy enough, but you still need to know how to cut and trim your bonsai tree based on how you want it to grow. There are also different types of pruning techniques that serve various purposes.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1410" instrument_node="">So, if you were wondering, </span><strong data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">how do you prune a </span></strong><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bonsaistarter.com/how-do-you-take-care-of-a-bonsai-tree-for-beginners/"><span data-dcnode-id="1407" instrument_node="">bonsai tree for beginners</span></a><span data-dcnode-id="1405" instrument_node="">, you’re at the right place.</span></p><span data-dcnode-id="1403" instrument_node="">

</span><p data-dcnode-id="1362"><span data-dcnode-id="1366" instrument_node="">One of the questions I see asked by beginners in bonsai communities is </span><strong data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">how do you trim a bonsai tree for the first time?</span></strong><span data-dcnode-id="1363" instrument_node=""> Beginners often ask questions like these, especially those who are brand new to the world of bonsai.</span></p><div data-dcnode-id="1360" data-inserter-version="2" id="ezoic-pub-ad-placeholder-197"></div><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">As with any novelty, they tend to think that a tree probably needs special care during the first pruning session.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Sorry to say, but you don’t need to do anything special for the first pruning session. In my opinion, the only thing a beginner needs to watch out for is over-pruning.</span></p><span data-dcnode-id="1352" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1350"><img alt="Craftsman pruning a bonsai" class="wp-image-690" data-dcnode-id="1351" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bonsaistarter.com/wp-content/uploads/2021/01/Craftsman-pruning-a-bonsai.jpg&amp;raw" srcset="https://bonsaistarter.com/wp-content/uploads/2021/01/Craftsman-pruning-a-bonsai.jpg 1200w, https://bonsaistarter.com/wp-content/uploads/2021/01/Craftsman-pruning-a-bonsai-1024x683.jpg 1024w, https://bonsaistarter.com/wp-content/uploads/2021/01/Craftsman-pruning-a-bonsai-768x512.jpg 768w" width="1200"></figure><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Most of the time, you don’t have to prune young trees too much to give them the desired shape. You only need to do light pruning to remove the dead branches, leaves, and twigs.</span></p><div data-dcnode-id="1345" data-inserter-version="2" id="ezoic-pub-ad-placeholder-198"></div><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">The type of pruning I mentioned just now is called maintenance pruning. There is also Structural/stylistic pruning. Let me give you a brief rundown of the two kinds of pruning.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><h3 data-dcnode-id="1338" id="maintenance-pruning"><span data-dcnode-id="1339" instrument_node="">Maintenance Pruning</span></h3><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">This is the most fundamental sort of pruning, and you can easily do it as a total beginner. Maintenance pruning is not for altering the shape of the tree. Instead, it acts as a support for the tree’s natural growth.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Do maintenance pruning more often than stylistic pruning. Every time you see your tree develop unruly branches or weeds growing on your pot, you need to prune them out.</span></p><div data-dcnode-id="1330" data-inserter-version="2" id="ezoic-pub-ad-placeholder-199"></div><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1327" instrument_node="">Also, remove branches that tend to grow downwards. They will eventually touch the dirt or grow outside the </span><a data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bonsaistarter.com/choosing-the-right-bonsai-pot/"><span data-dcnode-id="1326" instrument_node="">pot making your bonsai</span></a><span data-dcnode-id="1324" instrument_node=""> tree look shabby and unkempt.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">After that, you need to pluck out the dead branches if there are any. Also, remove the twigs that are growing over each other. Many beginners tend not to notice, but a beautiful bonsai does not have any branches that touch grow over each other.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">We don’t remove those branches for purely aesthetic reasons either. If you let them grow out, they will eventually grind on each other and damage themselves. So, it’s better for the tree if you remove them altogether.</span></p><div data-dcnode-id="1315" data-inserter-version="2" id="ezoic-pub-ad-placeholder-600"></div><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">During a maintenance pruning, you should also remove any weeds from your pot. It’s also a good idea to apply fertilizer and water afterward so that the bonsai tree can recover from the pruning session.</span></p><span data-dcnode-id="1310" instrument_node="">
</span><h3 data-dcnode-id="1308" id="structural-stylistic-pruning"><span data-dcnode-id="1309" instrument_node="">Structural/Stylistic Pruning</span></h3><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Structural pruning is not something you would do regularly. It is a slightly more advanced form of pruning that we use to shape the tree into whichever form we like.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">As a beginner, you should start by doing regular maintenance pruning. As time goes by and you get a better handle on things, you can move on to structural pruning.</span></p><div data-dcnode-id="1300" data-inserter-version="2" id="ezoic-pub-ad-placeholder-601"></div><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">You need to be aware of the growth periods of your bonsai tree. Always keep them in mind before you do any major pruning sessions. Don’t forget to water your plant regularly if you keep it in a pot.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="1255"><div class="wp-block-embed__wrapper" data-dcnode-id="1256"><span data-dcnode-id="1294" instrument_node="">
</span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="1258" frameborder="0" height="281" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/cOGAJ5iqWfk%3Ffeature%3Doembed&amp;raw" title="Bonsai Care - How to prune your Bonsai tree  |  Part 1" width="500"><html data-cast-api-enabled="true" data-dcnode-id="1260" dir="ltr" lang="en"><head data-dcnode-id="1269"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="1290" name="viewport"/><link data-dcnode-id="1285" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="xAJBRBsTtlyI8NStM5VIXQ" rel="stylesheet"/><title data-dcnode-id="1272">YouTube</title><link data-dcnode-id="1271" href="https://www.youtube.com/watch?v=cOGAJ5iqWfk" rel="canonical"/><link data-dcnode-id="1270" data-loaded="true" href="https://www.youtube.com/s/player/534c466c/www-player.css" id="css-335067421" nonce="XfM/8wjRmHqpFlWXdjoGpA" rel="stylesheet"/></meta></head><body class="date-20220424 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="1261" dir="ltr"><div data-dcnode-id="1268" id="player" style="width: 100%; height: 100%;"></div><noscript data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=cOGAJ5iqWfk" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe><span data-dcnode-id="1257" instrument_node="">
</span></div></figure><span data-dcnode-id="1254" instrument_node="">
</span><h2 data-dcnode-id="1252" id="when-should-you-prune-a-bonsai-tree"><span data-dcnode-id="1253" instrument_node="">When Should You Prune A Bonsai Tree?</span></h2><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">A lot of beginners don’t realize how sensitive trees can be. I’m not talking about only the bonsai trees. All trees have inherent sensitivity to touch and other external stimulants.</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">They feel agitated every time something touches or prevents their natural growth and movement.</span></p><div data-dcnode-id="1244" data-inserter-version="2" id="ezoic-pub-ad-placeholder-602"></div><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">That’s why you should not prune trees too frequently or do a lot of pruning at the same time. That makes the bonsai tree grow as naturally as possible. That is why choosing the right time to prune is paramount to the growth of your tree.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">You need to know about the yearly growth cycle of trees before you can choose the right time for pruning your bonsai tree. Most trees have their growth period around spring.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">They stay dormant during harsh seasons such as winter and high summer. I advise people to avoid doing any major trimming or pruning during these dormant seasons.</span></p><div data-dcnode-id="1232" data-inserter-version="2" id="ezoic-pub-ad-placeholder-603"></div><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1229" instrument_node="">So, </span><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">when should a bonsai tree be pruned?</span></strong><span data-dcnode-id="1226" instrument_node=""> The answer is late winter or right before the start of spring. The middle of winter or summer is not an optimal time for pruning bonsai.</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">The perfect time for pruning is about a week before spring starts. That’s because your tree can handle heavy pruning much better if you do it right as it hits the growth period.</span></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Pruning is not only about the branches and leaves. You need to be conscious about the roots too. If you see roots coming out of the pot, you need to trim those out. Eventually, you would need to re-pot the whole plant.</span></p><div data-dcnode-id="1217" data-inserter-version="2" id="ezoic-pub-ad-placeholder-604"></div><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Doing it right before spring starts is the best possible option, as your tree will recover much faster during spring. Most of the time, you would need to place the plant in a larger pot.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><h2 data-dcnode-id="1210" id="how-to-prune-your-bonsai-into-shape"><span data-dcnode-id="1211" instrument_node="">How to Prune Your Bonsai into Shape?</span></h2><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Maintenance pruning is easy because it only deals with removing unwanted parts. Structure or style pruning is different, and you need to consider several things before doing it.</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">As I mentioned before, the best time to do this sort of pruning is right at the start of the growing season. Doing it any other way will make it hard for the tree to recover.</span></p><div data-dcnode-id="1202" data-inserter-version="2" id="ezoic-pub-ad-placeholder-605"></div><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">A bonsai tree should usually have a dominant base and top. The trunk should start thick and start to thin out as it goes up. There should not be any branches near the root of the tree.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">The canopy of a bonsai should be evenly spread. That is the structure you should try to imitate with most bonsai trees.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">When you are pruning for the structure, you need to remove a lot of things. Here’s a list of things that hinder the beauty of a bonsai tree:</span></p><div data-dcnode-id="1190" data-inserter-version="2" id="ezoic-pub-ad-placeholder-606"></div><span data-dcnode-id="1188" instrument_node="">
</span><h3 data-dcnode-id="1186" id="low-hanging-branches"><span data-dcnode-id="1187" instrument_node="">Low Hanging Branches</span></h3><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">These are the branches that start high up at the trunk. They then dip down so low that they nearly touch the ground. It makes the tree look burdened and lifeless. It isn’t a problem in the early stages. But as the tree ages, it starts to look progressively dull.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">You can cut these off at the base, but these branches tend to be quite large. Removing large branches like these will leave unsightly scars on your bonsai, though you can mitigate that by using some tools.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Alternately, you can wrap an aluminum wire over the branch and bend it upwards, usually in a shape that complements the whole tree.</span></p><div data-dcnode-id="1175" data-inserter-version="2" id="ezoic-pub-ad-placeholder-607"></div><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">This method will not cause any scarring and make your tree look better. However, some branches are too far gone to be saved by this method.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><h3 data-dcnode-id="1168" id="dead-branches-twisted-branches"><span data-dcnode-id="1169" instrument_node="">Dead Branches, Twisted Branches</span></h3><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">You should remove dead branches and leaves. They look unsightly and are a burden on the tree. Twisted branches that have deformed structures are also something that you should prune out.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Deformed or twisted branches look out of place on a well-kept bonsai. They also cause the nearby branches to twist with them if you leave them on your tree for too long. You can prune them out with tools or even pluck them by hand.</span></p><div data-dcnode-id="1160" data-inserter-version="2" id="ezoic-pub-ad-placeholder-608"></div><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Sometimes it is better to pluck them out by hand rather than cutting them with a&nbsp; blade. Blades often leave behind scars that take a long time to heal, but hand-plucked wounds heal much faster.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">If the branches are too thick, you have to use a tool because trying to twist it by hand could damage other parts of the tree.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><h3 data-dcnode-id="1150" id="suckers"><span data-dcnode-id="1151" instrument_node="">Suckers</span></h3><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">After removing dead and deformed branches, you need to deal with suckers. Suckers are tiny twigs that start growing right from the base and all over the trunk. They usually do not develop into full branches and look like little parasites on your bonsai tree.</span></p><div data-dcnode-id="1145" data-inserter-version="2" id="ezoic-pub-ad-placeholder-609"></div><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">One of the first things you should do during a stylistic pruning is to remove these suckers. That will give your bonsai more room for growth, and it will look cleaner and more dignified.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><h3 data-dcnode-id="1138" id="parallel-branches"><span data-dcnode-id="1139" instrument_node="">Parallel Branches</span></h3><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Parallel branches might sound ok while you’re reading this, but they look very odd on a real bonsai. You want your bonsai to have evenly spread out branches of different layers, sizes, and heights.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Parallel branches that grow evenly side by side usually leave empty spaces on one side and too much canopy on the other. Depending on how many of them you have, you can either remove both parallel branches or a single one. Choose based on the sort of structure you’re trying to get.</span></p><div data-dcnode-id="1130" data-inserter-version="2" id="ezoic-pub-ad-placeholder-610"></div><span data-dcnode-id="1128" instrument_node="">
</span><h3 data-dcnode-id="1126" id="overly-thick-branches"><span data-dcnode-id="1127" instrument_node="">Overly Thick Branches</span></h3><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">The ideal structure of a bonsai involves a thick base and branches and sub-branches that gradually become thinner. You need to remove any that goes outside this structure.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Sometimes you will find branches at the top that are almost as thick as the trunk of your tree. There are odd branches that might be thin at the base but gradually gains more girth as it extends.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">These are the types of them that you need to prune for a healthy and structured bonsai.</span></p><div data-dcnode-id="1115" data-inserter-version="2" id="ezoic-pub-ad-placeholder-611"></div><span data-dcnode-id="1113" instrument_node="">
</span><h3 data-dcnode-id="1111" id="branches-with-similar-height"><span data-dcnode-id="1112" instrument_node="">Branches With Similar Height</span></h3><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Usually, branches tend to grow slightly over or below the starting point of another one. There are exceptions to that, and sometimes you will see them start growing from the same height as another.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">When two branches grow from the same height, the tree starts to look more like an umbrella, and that is something you do not want.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Usually, it is better to cut one of the branches out completely. On the other hand, if you think you can salvage it, you can wire one of them to bend higher than the other.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><h3 data-dcnode-id="1099" id="up-or-inbound-branches"><span data-dcnode-id="1100" instrument_node="">Up or Inbound Branches</span></h3><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Sometimes, you will find sub-branches on your bonsai that are going the wrong way. Instead of spreading outwards, they tend to either move inward toward the trunk. Sometimes they grow vertically upward, sticking out like a thorn.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">They don’t pose any harm to your tree, but branches like that tend to be quite unsightly. Thus, it’s a good idea to remove these early. If you get rid of them early, you won’t have to deal with a scar later on.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><h3 data-dcnode-id="1090" id="crossed-branches"><span data-dcnode-id="1091" instrument_node="">Crossed Branches</span></h3><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Crossed branches directly have an impact in harming a bonsai tree’s growth. These are branches that intersect each other. They continuously grind on each other, causing calluses to develop in the adjoined area.</span></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Sometimes it can even make one branch grow in an unusual direction. It is best to remove it as soon as possible.</span></p><span data-dcnode-id="1083" instrument_node="">
</span><h3 data-dcnode-id="1081" id="soots"><span data-dcnode-id="1082" instrument_node="">Soots</span></h3><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Some trees, such as Ficus, will have long hanging soots. They add to the aesthetics but having too many of them hanging around might feel a bit overwhelming. You should remove access soots while pruning this sort of species with a twig shear.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><h2 data-dcnode-id="1075" id="how-to-prune-bonsai-tree-leaves"><span data-dcnode-id="1076" instrument_node="">How to Prune Bonsai Tree Leaves?</span></h2><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1073" instrument_node="">Leaf pruning is the simplest form of pruning, and it takes the least number of tools to perform. Leaf pruning makes the tree get better sunlight and provides better overall ventilation. That, in turn, makes the </span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bonsaistarter.com/how-do-you-start-a-bonsai-tree-for-beginners/"><span data-dcnode-id="1072" instrument_node="">bonsai tree grow</span></a><span data-dcnode-id="1070" instrument_node=""> much faster.</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Another reason why leaf pruning is essential is infestations. Bonsai trees can get infected with diseases and pests, just like any other tree.&nbsp; Removing infected leaves is a reliable way of keeping a tree healthy.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Most deciduous trees have a very high leaf regeneration rate, so it is easy for them to recover from excessive leaf pruning.</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Leaf pruning is simple because all you need to do is cut them off from the stem with scissors. You can use your hands to do it too.&nbsp; The tricky bit is knowing when to prune and what goals you’re trying to achieve.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">As you can guess, if you randomly remove leaves, your tree will look like a shaved chicken. So, before you start pruning, research how your tree should look at its age and try to keep it in roughly the same shape.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Cutting off too many leaves will result in lower sunlight absorption. It can seriously staunch the growth of your tree, so be sure to avoid it.</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">If you end up over-pruning the leaves, place your plant in sunlight. Make sure that it is bright but not too direct. Reduce the amount of water and fertilizer until new buddings start to form.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Before then, the plant cannot process the excess water and fertilizer. It will do more harm than good.</span></p><span data-dcnode-id="1047" instrument_node="">
</span><h2 data-dcnode-id="1045" id="how-to-prune-bonsai-tree-trunk"><span data-dcnode-id="1046" instrument_node="">How to Prune Bonsai Tree Trunk?</span></h2><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">One of the most important aspects of a bonsai tree is the majestic trunk. As you may have noticed, when it is well-developed, it gives a bonsai tree that wise aura that makes it look older.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">As a beginner, you would probably be disappointed to know that bonsai tree trunks do not grow into that shape naturally. Prune it regularly for a long time to achieve that effect.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">The ideal shape you want on a standard bonsai is the flared root system that looks evenly spread out over the pot. The trunk needs to be thicker at the bottom and gradually thin out as it goes up.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">If you neglect to prune your bonsai trunk, you can end up with an inverse tapper- where it is thin near the roots and thicker near the center.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Inverse tappers are unsightly as it makes your tree look out of balance. If you want to know how to prune your trunk, you need to know how trunks grow and what purpose they serve.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Otherwise, you can never get the desired shape or style. Other than that, what you’re looking for in a good trunk are these:</span></p><span data-dcnode-id="1026" instrument_node="">
</span><ul data-dcnode-id="1017"><li data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Evenly spread root system</span></li><li data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Consistent trunk thickness slowly thinning out as it goes up</span></li><li data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">No inverse taper or unevenly thick trunk</span></li><li data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Trunk always thicker than branches</span></li></ul><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Tree trunks support the weight of the tree and they transport nutrients. You can usually manipulate a bonsai tree’s growth and size by manipulating these factors.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">However, in bonsai you want to keep the trees small and compact, this clashes directly with the purpose of a trunk. They only grow thicker based on how tall the tree is, and the bigger the tree the more nutrients it transports.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1009" instrument_node="">So, </span><em data-dcnode-id="1006"><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">bonsai trees will not have naturally thick and even trunks</span></strong></em><span data-dcnode-id="1005" instrument_node="">. That is why there are a few artificial ways you can prune them and get the desired thickness. Let me explain how they work and what the differences are between them.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><h3 data-dcnode-id="1001" id="grow-and-cut"><span data-dcnode-id="1002" instrument_node="">Grow and Cut</span></h3><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">The fastest and most consistent method of getting a perfect trunk for your bonsai is the Grow and cut system. The theory behind it is simple, you let the tree grow for a while and then prune it down to a stump size and let it grow again.</span></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">When you remove the big stump, all the nutrients in the roots will focus on growing a new and stronger trunk. For this to work, you need to have the initial trunk grow slightly bent. And try to have a few other branches that are facing the top.</span></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Once you cut the bent trunk, the roots will transfer all the energy to the straight branch. That branch will eventually develop into a new trunk.</span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">An important point to note is that you cannot do this in a pot. Pots restrict the roots from growing, and there is a noticeable limitation of nutrients in there.</span></p><div data-dcnode-id="987" data-inserter-version="2" id="ezoic-pub-ad-placeholder-612"></div><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">That is why you need to plant the tree outside. Let it grow for a few years naturally. After that, prune the big trunk right before the winter.</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">You can usually tell if your tree is ready when the size of the trunk is around two-thirds of the desired thickness. You can now prune the roots and put your tree in a pot like a proper bonsai.</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">This is the method of getting a consistent trunk in the shortest time possible. It does, however, have a few flaws. The most prominent flaw of this method is that the place where the first cut is made will have a significantly large scar. These scars may go away in a few years, or it may stay permanently.</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">If the tree did not have a suitable vertical branch, then the new trunk will be slightly bent, and there’s nothing you can do to change that. </span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">If you don’t leave any live branches and leaves on the tree, or if you prune it like this in the winter, the tree might end up dying. Although the chances of that happening are quite low.</span></p><span data-dcnode-id="970" instrument_node="">
</span><h3 data-dcnode-id="968" id="branch-sacrifice"><span data-dcnode-id="969" instrument_node="">Branch Sacrifice</span></h3><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Sacrificing two side branches is similar to the previous fundamentally, but the process is different. You prune the tree in a way that only leaves two side branches with lots of leaves. Then you have to cut the main trunk right where those branches start</span></p><div data-dcnode-id="963" data-inserter-version="2" id="ezoic-pub-ad-placeholder-613"></div><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">It may seem like we are sacrificing the trunk for the two branches but it’s the other way around.</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">If you keep growing the side branches for a few years, the trunk will eventually start to spread out and thicken, without being overly tall.</span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Once your trunk is thick enough, you can go ahead and prune those branches and cut them off completely.</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">The trunk will now develop naturally and you can maintain the shape as you want over the next few years.</span></p><div data-dcnode-id="948" data-inserter-version="2" id="ezoic-pub-ad-placeholder-614"></div><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">This method leaves scars that do not heal, but the scars are on locations that look normal for a grown tree. So it ends up making it look more beautiful.</span></p><span data-dcnode-id="943" instrument_node="">
</span><h3 data-dcnode-id="940" id="trunk-merging"><strong data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Trunk Merging</span></strong></h3><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">The third option is the trunk merging. This method makes your tree trunk look thick and luscious, but it isn’t going to thicken the individual trunks.</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Trunk merging does exactly as the name suggests. It merges a bunch of trunks to make them look like one big whole.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">It is the fastest method for having a tree with a thick trunk, as you do not have to wait for the tree to grow for years.</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">However, you would need to prune the canopy a lot. They are a lot of trees fused into one. That is why they produce more branches and leaves.</span></p><div data-dcnode-id="926" data-inserter-version="2" id="ezoic-pub-ad-placeholder-615"></div><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">It might be a challenge for people who are new to bonsai. If you can’t grow a good trunk outside, then this is the best choice you have.</span></p><span data-dcnode-id="921" instrument_node="">
</span><h2 data-dcnode-id="919" id="how-to-split-a-branch-trunk-while-pruning"><span data-dcnode-id="920" instrument_node="">How to Split A Branch/Trunk While Pruning?</span></h2><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Cutting out unwanted parts of a bonsai is not the only pruning you can do to give it the shape you want. You can wire a branch to permanently bend it in a certain way. Alternately, you can use that wire to make it grow in a different direction.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Sadly, some branches may be too thick to bend, and if you push too hard, they may break. In cases like these, you can use a splitting tool to split them apart.</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Make sure that the split happens on a vertical line. You are creating two layers of a single branch. That makes it more flexible and bendable.</span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">This method is like making plywood. Plywood with a lot of layers is very sturdy and inflexible. But a single layer of plywood is almost like paper. Splitting works the same way as those layers.</span></p><div data-dcnode-id="905" data-inserter-version="2" id="ezoic-pub-ad-placeholder-616"></div><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Don’t worry about the branch dying out, if you do it right, it does not affect the nutrition flow of the branch and it stays perfectly healthy.</span></p><span data-dcnode-id="900" instrument_node="">
</span><h2 data-dcnode-id="898" id="how-to-choose-the-right-pruning-tools"><span data-dcnode-id="899" instrument_node="">How to Choose the Right Pruning Tools?</span></h2><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="896" instrument_node="">The </span><a data-dcnode-id="894" data-id="21" data-type="page" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bonsaistarter.com/recommended/"><span data-dcnode-id="895" instrument_node="">most basic set of tools you need is a scissor for pruning leaves</span></a><span data-dcnode-id="893" instrument_node="">, a concave cutter for cutting branches. You also need a set of wire cutters for removing the wires you would usually put on a bonsai.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="890" instrument_node="">Other than that, you should also have a </span><strong data-dcnode-id="887"><em data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">separate set of shears for pruning the roots</span></em></strong><span data-dcnode-id="886" instrument_node="">. Roots have water and dirt around them, so using your primary set of sears can cause rust. </span><strong data-dcnode-id="883"><em data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Root shears need to be stronger</span></em></strong><span data-dcnode-id="882" instrument_node=""> than your standard leaf shears.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">If you need to split your tree trunk or a thick branch, you need a branch splitter. You should also keep a pair of pliers if you plan on using wires often. Many people think they are unnecessary, but I find it easier to tie up wire ends with pliers.</span></p><span data-dcnode-id="877" instrument_node="">
</span><h2 data-dcnode-id="875" id="final-thoughts-on-how-do-you-prune-a-bonsai-tree-for-beginners"><span data-dcnode-id="876" instrument_node="">Final Thoughts on How do you Prune a Bonsai Tree for Beginners</span></h2><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">For anyone looking to start the art of </span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bonsaistarter.com/what-to-do-with-a-dead-bonsai-tree/"><span data-dcnode-id="872" instrument_node="">bonsai pruning will become a solid part of your management</span></a><span data-dcnode-id="870" instrument_node=""> and growth plan. Getting high quality tools and learning how and when to manage your tree will yield amazing results!</span></p><div data-dcnode-id="867" data-inserter-version="2" id="ezoic-pub-ad-placeholder-617"></div><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">If you are just learning about bonsai trees and looking to purchase high quality trees that will likely live longer than you then I would highly suggest checking out Bonsai Boy Trees as they are a long lasting New York business that provides trees for all price ranges!</span></p><span data-dcnode-id="862" instrument_node="">
