</span><meta content="State-of-the-art decision tree methods apply heuristics recursively to create each split in isolation, which may not capture well the underlying characteristics of the dataset. The optimal decision tree problem attempts to resolve this by creating the entire decision tree at once to achieve global optimality. In the last 25&amp;nbsp;years, algorithmic advances in integer optimization coupled with hardware improvements have resulted in an astonishing 800 billion factor speedup in mixed-integer optimization (MIO). Motivated by this speedup, we present optimal classification trees, a novel formulation of the decision tree problem using modern MIO techniques that yields the optimal decision tree for axes-aligned splits. We also show the richness of this MIO formulation by adapting it to give optimal classification trees with hyperplanes that generates optimal decision trees with multivariate splits. Synthetic tests demonstrate that these methods recover the true decision tree more closely than heuristics, refuting the notion that optimal methods overfit the training data. We comprehensively benchmark these methods on a sample of 53 datasets from the UCI machine learning repository. We establish that these MIO methods are practically solvable on real-world datasets with sizes in the 1000s, and give average absolute improvements in out-of-sample accuracy over CART of 1–2 and 3–5% for the univariate and multivariate cases, respectively. Furthermore, we identify that optimal classification trees are likely to outperform CART by 1.2–1.3% in situations where the CART accuracy is high and we have sufficient training data, while the multivariate version outperforms CART by 4–7% when the CART accuracy or dimension of the dataset is low." data-dcnode-id="5588" name="dc.description"><span data-dcnode-id="5587" instrument_node="">

</span><meta content="State-of-the-art decision tree methods apply heuristics recursively to create each split in isolation, which may not capture well the underlying characteristics of the dataset. The optimal decision tree problem attempts to resolve this by creating the entire decision tree at once to achieve global optimality. In the last 25 years, algorithmic advances in integer optimization coupled with hardware improvements have resulted in an astonishing 800 billion factor speedup in mixed-integer optimization (MIO). Motivated by this speedup, we present optimal classification trees, a novel formulation of the decision tree problem using modern MIO techniques that yields the optimal decision tree for axes-aligned splits. We also show the richness of this MIO formulation by adapting it to give optimal classification trees with hyperplanes that generates optimal decision trees with multivariate splits. Synthetic tests demonstrate that these methods recover the true decision tree more closely than heuristics, refuting the notion that optimal methods overfit the training data. We comprehensively benchmark these methods on a sample of 53 datasets from the UCI machine learning repository. We establish that these MIO methods are practically solvable on real-world datasets with sizes in the 1000s, and give average absolute improvements in out-of-sample accuracy over CART of 1–2 and 3–5% for the univariate and multivariate cases, respectively. Furthermore, we identify that optimal classification trees are likely to outperform CART by 1.2–1.3% in situations where the CART accuracy is high and we have sufficient training data, while the multivariate version outperforms CART by 4–7% when the CART accuracy or dimension of the dataset is low." data-dcnode-id="5394" property="og:description"><span data-dcnode-id="5393" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="993" data-track-component="article body"><span data-dcnode-id="4961" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="4948" data-gtm-vis-first-on-screen-50443292_562="574" data-gtm-vis-first-on-screen-50443292_563="574" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="574" data-gtm-vis-recent-on-screen-50443292_563="574" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4949" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4959" id="Abs1"><span data-dcnode-id="4960" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4950" id="Abs1-content"><p data-dcnode-id="4951"><span data-dcnode-id="4958" instrument_node="">State-of-the-art decision tree methods apply heuristics recursively to create each split in isolation, which may not capture well the underlying characteristics of the dataset. The optimal decision tree problem attempts to resolve this by creating the entire decision tree at once to achieve global optimality. In the last 25&nbsp;years, algorithmic advances in integer optimization coupled with hardware improvements have resulted in an astonishing 800 billion factor speedup in mixed-integer optimization (MIO). Motivated by this speedup, we present </span><i data-dcnode-id="4956"><span data-dcnode-id="4957" instrument_node="">optimal classification trees</span></i><span data-dcnode-id="4955" instrument_node="">, a novel formulation of the decision tree problem using modern MIO techniques that yields the optimal decision tree for axes-aligned splits. We also show the richness of this MIO formulation by adapting it to give </span><i data-dcnode-id="4953"><span data-dcnode-id="4954" instrument_node="">optimal classification trees with hyperplanes</span></i><span data-dcnode-id="4952" instrument_node=""> that generates optimal decision trees with multivariate splits. Synthetic tests demonstrate that these methods recover the true decision tree more closely than heuristics, refuting the notion that optimal methods overfit the training data. We comprehensively benchmark these methods on a sample of 53 datasets from the UCI machine learning repository. We establish that these MIO methods are practically solvable on real-world datasets with sizes in the 1000s, and give average absolute improvements in out-of-sample accuracy over CART of 1–2 and 3–5% for the univariate and multivariate cases, respectively. Furthermore, we identify that optimal classification trees are likely to outperform CART by 1.2–1.3% in situations where the CART accuracy is high and we have sufficient training data, while the multivariate version outperforms CART by 4–7% when the CART accuracy or dimension of the dataset is low.</span></p></div></div></section><span data-dcnode-id="4947" instrument_node="">
</span><section data-dcnode-id="4640" data-gtm-vis-first-on-screen-50443292_562="574" data-gtm-vis-first-on-screen-50443292_563="575" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="574" data-gtm-vis-recent-on-screen-50443292_563="575" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="4641" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4945" id="Sec1"><span data-dcnode-id="4946" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="4642" id="Sec1-content"><p data-dcnode-id="4937"><span data-dcnode-id="4944" instrument_node="">Decision trees are one of the most widely-used techniques for classification problems. Guided by the training data </span><span class="mathjax-tex" data-dcnode-id="4939"><span class="MathJax_Preview" data-dcnode-id="4942"><span data-dcnode-id="4943" instrument_node="">({\varvec{x}}_i, y_i), i = 1, \ldots , n</span></span></span><span data-dcnode-id="4938" instrument_node="">, decision trees recursively partition the feature space and assign a label to each resulting partition. The tree is then used to classify future points according to these splits and labels. The key advantage of decision trees over other methods is that they are very interpretable, and in many applications, such as healthcare, this interpretability is often preferred over other methods that may have higher accuracy but are relatively uninterpretable.</span></p><p data-dcnode-id="4926"><span data-dcnode-id="4936" instrument_node="">The leading work for decision tree methods in classification is classification and regression trees (CART), proposed by&nbsp;Breiman et&nbsp;al. (</span><a aria-label="Reference 1984" data-dcnode-id="4934" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d60465247e402" title="Breiman, L., Friedman, J., Olshen, R., &amp; Stone, C. (1984). Classification and regression trees. Monterey, CA: Wadsworth and Brooks."><span data-dcnode-id="4935" instrument_node="">1984</span></a><span data-dcnode-id="4933" instrument_node="">), which takes a top-down approach to determining the partitions. Starting from the root node, a split is determined by solving an optimization problem (typically minimizing an impurity measure), before proceeding to recurse on the two resulting child nodes. The main shortcoming of this top-down approach, shared by other popular decision tree methods like C4.5 (Quinlan </span><a aria-label="Reference 1993" data-dcnode-id="4931" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d60465247e405" title="Quinlan, J. R. (1993). C4.5: Programs for machine learning. San Francisco, CA: Morgan Kaufmann."><span data-dcnode-id="4932" instrument_node="">1993</span></a><span data-dcnode-id="4930" instrument_node="">) and ID3 (Quinlan </span><a aria-label="Reference 1986" data-dcnode-id="4928" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d60465247e408" title="Quinlan, J. R. (1986). Induction of decision trees. Machine Learning, 1(1), 81–106."><span data-dcnode-id="4929" instrument_node="">1986</span></a><span data-dcnode-id="4927" instrument_node="">), is its fundamentally greedy nature. Each split in the tree is determined in isolation without considering the possible impact of future splits in the tree. This can lead to trees that do not capture well the underlying characteristics of the dataset, potentially leading to weak performance when classifying future points.</span></p><p data-dcnode-id="4915"><span data-dcnode-id="4925" instrument_node="">Another limitation of top-down induction methods is that they typically require pruning to achieve trees that generalize well. Pruning is needed because top-down induction is unable to handle penalties on tree complexity while growing the tree, since powerful splits may be hidden behind weaker splits. This means that the best tree might not be found by the top-down method if the complexity penalty is too high and prevents the first weaker split from being selected. The usual approach to resolve this is to grow the tree as deep as possible before pruning back up the tree using the complexity penalty. This avoids the problem of weaker splits hiding stronger splits, but it means that the training occurs in two phases, growing via a series of greedy decisions, followed by pruning. Lookahead heuristics such as IDX&nbsp;(Norton </span><a aria-label="Reference 1989" data-dcnode-id="4923" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d60465247e414" title="Norton, S. W. (1989). Generating better decision trees. In IJCAI (Vol. 89, pp. 800–805)."><span data-dcnode-id="4924" instrument_node="">1989</span></a><span data-dcnode-id="4922" instrument_node="">), LSID3 and ID3-k&nbsp;(Esmeir and Markovitch </span><a aria-label="Reference 2007" data-dcnode-id="4920" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d60465247e417" title="Esmeir, S., &amp; Markovitch, S. (2007). Anytime learning of decision trees. The Journal of Machine Learning Research, 8, 891–933."><span data-dcnode-id="4921" instrument_node="">2007</span></a><span data-dcnode-id="4919" instrument_node="">) also aim to resolve this problem of strong splits being hidden behind weak splits by finding new splits based on optimizing deeper trees rooted at the current leaf, rather than just optimizing a single split. However, it is unclear whether these methods can lead to trees with better generalization ability and avoid the so-called look-ahead pathology of decision tree learning&nbsp;(Murthy and Salzberg </span><a aria-label="Reference 1995a" data-dcnode-id="4917" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d60465247e420" title="Murthy, S., &amp; Salzberg, S. (1995a). Lookahead and pathology in decision tree induction. In IJCAI, Citeseer (pp. 1025–1033)."><span data-dcnode-id="4918" instrument_node="">1995a</span></a><span data-dcnode-id="4916" instrument_node="">).</span></p><p data-dcnode-id="4910"><span data-dcnode-id="4914" instrument_node="">These top-down induction methods typically optimize an impurity measure when selecting splits, rather than using the misclassification rate of training points. This seems odd when the misclassification rate is the final objective being targeted by the tree, and indeed is also the measure that is used when pruning the tree.&nbsp;Breiman et al. (</span><a aria-label="Reference 1984" data-dcnode-id="4912" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d60465247e426" title="Breiman, L., Friedman, J., Olshen, R., &amp; Stone, C. (1984). Classification and regression trees. Monterey, CA: Wadsworth and Brooks."><span data-dcnode-id="4913" instrument_node="">1984</span></a><span data-dcnode-id="4911" instrument_node="">,&nbsp;p. 97) explain why impurity measures are used in place of the more natural objective of misclassification:</span></p><span data-dcnode-id="4909" instrument_node="">
</span><blockquote class="c-blockquote" data-dcnode-id="4903"><div class="c-blockquote__body" data-dcnode-id="4904"><span data-dcnode-id="4908" instrument_node="">
</span><p data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">...the [misclassification] criterion does not seem to appropriately reward splits that are more desirable in the context of the continued growth of the tree. ...This problem is largely caused by the fact that our tree growing structure is based on a one-step optimization procedure.</span></p><span data-dcnode-id="4905" instrument_node="">
</span></div></blockquote><p data-dcnode-id="4901"><span data-dcnode-id="4902" instrument_node="">It seems natural to believe that growing the decision tree with respect to the final objective function would lead to better splits, but the use of top-down induction methods and their requirement for pruning prevents the use of this objective.</span></p><p data-dcnode-id="4893"><span data-dcnode-id="4900" instrument_node="">The natural way to resolve this problem is to form the entire decision tree in a single step, allowing each split to be determined with full knowledge of all other splits. This would result in the </span><i data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">optimal</span></i><span data-dcnode-id="4897" instrument_node=""> decision tree for the training data. This is not a new idea; Breiman et al. (</span><a aria-label="Reference 1984" data-dcnode-id="4895" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d60465247e444" title="Breiman, L., Friedman, J., Olshen, R., &amp; Stone, C. (1984). Classification and regression trees. Monterey, CA: Wadsworth and Brooks."><span data-dcnode-id="4896" instrument_node="">1984</span></a><span data-dcnode-id="4894" instrument_node="">,&nbsp;p.&nbsp;42) noted the potential for such a method:</span></p><blockquote class="c-blockquote" data-dcnode-id="4884"><div class="c-blockquote__body" data-dcnode-id="4885"><span data-dcnode-id="4892" instrument_node="">
</span><p data-dcnode-id="4890"><span data-dcnode-id="4891" instrument_node="">Finally, another problem frequently mentioned (by others, not by us) is that the tree procedure is only one-step optimal and not overall optimal. ...If one could search all possible partitions ...the two results might be quite different.</span></p><span data-dcnode-id="4889" instrument_node="">
</span><p data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node="">This issue is analogous to the familiar question in linear regression of how well the stepwise procedures do as compared with ‘best subsets’ procedures. We do not address this problem. At this stage of computer technology, an overall optimal tree growing procedure does not appear feasible for any reasonably sized dataset.</span></p><span data-dcnode-id="4886" instrument_node="">
</span></div></blockquote><p data-dcnode-id="4846"><span data-dcnode-id="4883" instrument_node="">The use of top-down induction and pruning in CART was therefore not due to a belief that such a procedure was inherently better, but instead was guided by practical limitations of the time, given the difficulty of finding an optimal tree. Indeed, it is well-known that the problem of constructing optimal binary decision trees is NP-hard&nbsp;(Hyafil and Rivest </span><a aria-label="Reference 1976" data-dcnode-id="4881" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d60465247e455" title="Hyafil, L., &amp; Rivest, R. L. (1976). Constructing optimal binary decision trees is np-complete. Information Processing Letters, 5(1), 15–17."><span data-dcnode-id="4882" instrument_node="">1976</span></a><span data-dcnode-id="4880" instrument_node="">). Nevertheless, there have been many efforts previously to develop effective ways of constructing optimal univariate decision trees using a variety of heuristic methods for growing the tree in one step, including linear optimization&nbsp;(Bennett </span><a aria-label="Reference 1992" data-dcnode-id="4878" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d60465247e458" title="Bennett, K. P. (1992). Decision tree construction via linear programming. In M. Evans (Ed.), Proceedings of the 4th midwest artificial intelligence and cognitive science society conference (pp. 97–101)."><span data-dcnode-id="4879" instrument_node="">1992</span></a><span data-dcnode-id="4877" instrument_node="">), continuous optimization&nbsp;(Bennett and Blue </span><a aria-label="Reference 1996" data-dcnode-id="4875" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d60465247e462" title="Bennett, K. P., &amp; Blue, J. (1996). Optimal decision trees. Rensselaer Polytechnic Institute Math Report No. 214."><span data-dcnode-id="4876" instrument_node="">1996</span></a><span data-dcnode-id="4874" instrument_node="">), dynamic programming&nbsp;(Cox et&nbsp;al. </span><a aria-label="Reference 1989" data-dcnode-id="4872" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d60465247e465" title="Cox, L. A, Jr., Yuping, Q., &amp; Kuehner, W. (1989). Heuristic least-cost computation of discrete classification functions with uncertain argument values. Annals of Operations Research, 21(1), 1–29."><span data-dcnode-id="4873" instrument_node="">1989</span></a><span data-dcnode-id="4871" instrument_node="">; Payne and Meisel </span><a aria-label="Reference 1977" data-dcnode-id="4869" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d60465247e468" title="Payne, H. J., &amp; Meisel, W. S. (1977). An algorithm for constructing optimal binary decision trees. IEEE Transactions on Computers, 100(9), 905–916."><span data-dcnode-id="4870" instrument_node="">1977</span></a><span data-dcnode-id="4868" instrument_node="">), genetic algorithms&nbsp;(Son </span><a aria-label="Reference 1998" data-dcnode-id="4866" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d60465247e471" title="Son, N. H. (1998). From optimal hyperplanes to optimal decision trees. Fundamenta Informaticae, 34(1, 2), 145–174."><span data-dcnode-id="4867" instrument_node="">1998</span></a><span data-dcnode-id="4865" instrument_node="">), and more recently, optimizing an upper bound on the tree error using stochastic gradient descent&nbsp;(Norouzi et&nbsp;al. </span><a aria-label="Reference 2015" data-dcnode-id="4863" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d60465247e474" title="Norouzi, M., Collins, M. D., Johnson, M. A., Fleet, D. J., &amp; Kohli, P. (2015). Efficient non-greedy optimization of decision trees. In C. Cortes, N. D. Lawrence, D. D. Lee, M. Sugiyama, &amp; R. Garnett (Eds.), Proceedings of the Advances in Neural Information Processing Systems 2015, 28: Annual Conference on Neural Information Processing Systems, 7–12 December 2015, Montreal, QC, pp. 1729–1737."><span data-dcnode-id="4864" instrument_node="">2015</span></a><span data-dcnode-id="4862" instrument_node="">). However, none of these methods have been able to produce certifiably optimal trees in practical times. A different approach is taken by the methods T2&nbsp;(Auer et&nbsp;al. </span><a aria-label="Reference 1995" data-dcnode-id="4860" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d60465247e477" title="Auer, P., Holte, R. C., &amp; Maass, W. (1995). Theory and applications of agnostic pac-learning with small decision trees. In Proceedings of the 12th international conference on machine learning (pp. 21–29)."><span data-dcnode-id="4861" instrument_node="">1995</span></a><span data-dcnode-id="4859" instrument_node="">), T3&nbsp;(Tjortjis and Keane </span><a aria-label="Reference 2002" data-dcnode-id="4857" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d60465247e481" title="Tjortjis, C., &amp; Keane, J. (2002). T3: A classification algorithm for data mining. Lecture Notes in Computer Science (Vol. 2412, pp. 50–55). Berlin: Springer."><span data-dcnode-id="4858" instrument_node="">2002</span></a><span data-dcnode-id="4856" instrument_node="">) and T3C&nbsp;(Tzirakis and Tjortjis </span><a aria-label="Reference 2016" data-dcnode-id="4854" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d60465247e484" title="Tzirakis, P., &amp; Tjortjis, C. (2016). T3c: Improving a decision tree classification algorithms interval splits on continuous attributes. Advances in Data Analysis and Classification, 1–18."><span data-dcnode-id="4855" instrument_node="">2016</span></a><span data-dcnode-id="4853" instrument_node="">), a family of efficient enumeration approaches which create optimal non-binary decision trees of depths up to 3. However, trees produced using these enumeration schemes are not as interpretable as binary decision trees, and do not perform significantly better than current heuristic approaches&nbsp;(Tjortjis and Keane </span><a aria-label="Reference 2002" data-dcnode-id="4851" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d60465247e487" title="Tjortjis, C., &amp; Keane, J. (2002). T3: A classification algorithm for data mining. Lecture Notes in Computer Science (Vol. 2412, pp. 50–55). Berlin: Springer."><span data-dcnode-id="4852" instrument_node="">2002</span></a><span data-dcnode-id="4850" instrument_node="">; Tzirakis and Tjortjis </span><a aria-label="Reference 2016" data-dcnode-id="4848" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d60465247e490" title="Tzirakis, P., &amp; Tjortjis, C. (2016). T3c: Improving a decision tree classification algorithms interval splits on continuous attributes. Advances in Data Analysis and Classification, 1–18."><span data-dcnode-id="4849" instrument_node="">2016</span></a><span data-dcnode-id="4847" instrument_node="">).</span></p><p data-dcnode-id="4844"><span data-dcnode-id="4845" instrument_node="">We believe the lack of success in developing an algorithm for optimal decision trees can be attributed to a failure to address correctly the underlying nature of the decision tree problem. Constructing a decision tree involves a series of discrete decisions—whether to split at a node in the tree, which variable to split on—and discrete outcomes—which leaf node a point falls into, whether a point is correctly classified—and as such, the problem of creating an optimal decision tree is best posed as a mixed-integer optimization (MIO) problem.</span></p><p data-dcnode-id="4839"><span data-dcnode-id="4843" instrument_node="">Continuous optimization methods have been widely used in statistics over the past 40&nbsp;years, but MIO methods, which have been used to great effect in many other fields, have not had the same impact on statistics. Despite the knowledge that many statistical problems have natural MIO formulations&nbsp;(Arthanari and Dodge </span><a aria-label="Reference 1981" data-dcnode-id="4841" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d60465247e499" title="Arthanari, T., &amp; Dodge, Y. (1981). Mathematical programming in statistics (Vol. 341). New York: Wiley."><span data-dcnode-id="4842" instrument_node="">1981</span></a><span data-dcnode-id="4840" instrument_node="">), there is the belief within the statistics/machine learning community that MIO problems are intractable even for small to medium instances, which was true in the early 1970s when the first continuous optimization methods for statistics were being developed.</span></p><p data-dcnode-id="4771"><span data-dcnode-id="4838" instrument_node="">However, the last 25&nbsp;years have seen an incredible increase in the computational power of MIO solvers, and modern MIO solvers such as </span><span class="u-small-caps" data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">Gurobi</span></span><span data-dcnode-id="4835" instrument_node="">&nbsp;(Gurobi Optimization Inc </span><a aria-label="Reference 2015b" data-dcnode-id="4833" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d60465247e508" title="Gurobi Optimization Inc. (2015b). Gurobi optimizer reference manual. 
                    http://www.gurobi.com
                    
                  ."><span data-dcnode-id="4834" instrument_node="">2015b</span></a><span data-dcnode-id="4832" instrument_node="">) and </span><span class="u-small-caps" data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node="">CPLEX</span></span><span data-dcnode-id="4829" instrument_node="">&nbsp;(IBM ILOG CPLEX </span><a aria-label="Reference 2014" data-dcnode-id="4827" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d60465247e514" title="IBM ILOG CPLEX. (2014). V12.1 users manual. 
                    https://www-01.ibm.com/software/commerce/optimization/cplex-optimizer/
                    
                  ."><span data-dcnode-id="4828" instrument_node="">2014</span></a><span data-dcnode-id="4826" instrument_node="">) are able to solve linear MIO problems of considerable size. To quantify this increase,&nbsp;Bixby (</span><a aria-label="Reference 2012" data-dcnode-id="4824" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d60465247e517" title="Bixby, R. E. (2012). A brief history of linear and mixed-integer programming computation. Documenta Mathematica, Extra Volume: Optimization Stories, 107–121."><span data-dcnode-id="4825" instrument_node="">2012</span></a><span data-dcnode-id="4823" instrument_node="">) tested a set of MIO problems on the same computer using </span><span class="u-small-caps" data-dcnode-id="4821"><span data-dcnode-id="4822" instrument_node="">CPLEX 1.2</span></span><span data-dcnode-id="4820" instrument_node="">, released in 1991, through </span><span class="u-small-caps" data-dcnode-id="4818"><span data-dcnode-id="4819" instrument_node="">CPLEX 11</span></span><span data-dcnode-id="4817" instrument_node="">, released in 2007. The total speedup factor was measured to be more than 29,000 between these versions&nbsp;(Bixby </span><a aria-label="Reference 2012" data-dcnode-id="4815" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d60465247e527" title="Bixby, R. E. (2012). A brief history of linear and mixed-integer programming computation. Documenta Mathematica, Extra Volume: Optimization Stories, 107–121."><span data-dcnode-id="4816" instrument_node="">2012</span></a><span data-dcnode-id="4814" instrument_node="">; Nemhauser </span><a aria-label="Reference 2013" data-dcnode-id="4812" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d60465247e530" title="Nemhauser, G. L. (2013). Integer programming: The global impact. In Presented at EURO, INFORMS, Rome, Italy, 2013. 
                    http://euro-informs2013.org/data/http_/euro2013.org/wp-content/uploads/nemhauser.pdf
                    
                  . Accessed September 9, 2015."><span data-dcnode-id="4813" instrument_node="">2013</span></a><span data-dcnode-id="4811" instrument_node="">). </span><span class="u-small-caps" data-dcnode-id="4809"><span data-dcnode-id="4810" instrument_node="">Gurobi</span></span><span data-dcnode-id="4808" instrument_node=""> 1.0, an MIO solver first released in 2009, was measured to have similar performance to CPLEX 11. Version-on-version speed comparisons of successive </span><span class="u-small-caps" data-dcnode-id="4806"><span data-dcnode-id="4807" instrument_node="">Gurobi</span></span><span data-dcnode-id="4805" instrument_node=""> releases have shown a speedup factor of nearly 50 between </span><span class="u-small-caps" data-dcnode-id="4803"><span data-dcnode-id="4804" instrument_node="">Gurobi</span></span><span data-dcnode-id="4802" instrument_node=""> 6.5, released in 2015, and </span><span class="u-small-caps" data-dcnode-id="4800"><span data-dcnode-id="4801" instrument_node="">Gurobi</span></span><span data-dcnode-id="4799" instrument_node=""> 1.0&nbsp;(Bixby </span><a aria-label="Reference 2012" data-dcnode-id="4797" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d60465247e546" title="Bixby, R. E. (2012). A brief history of linear and mixed-integer programming computation. Documenta Mathematica, Extra Volume: Optimization Stories, 107–121."><span data-dcnode-id="4798" instrument_node="">2012</span></a><span data-dcnode-id="4796" instrument_node="">; Nemhauser </span><a aria-label="Reference 2013" data-dcnode-id="4794" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d60465247e549" title="Nemhauser, G. L. (2013). Integer programming: The global impact. In Presented at EURO, INFORMS, Rome, Italy, 2013. 
                    http://euro-informs2013.org/data/http_/euro2013.org/wp-content/uploads/nemhauser.pdf
                    
                  . Accessed September 9, 2015."><span data-dcnode-id="4795" instrument_node="">2013</span></a><span data-dcnode-id="4793" instrument_node="">; Gurobi Optimization Inc </span><a aria-label="Reference 2015a" data-dcnode-id="4791" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d60465247e552" title="Gurobi Optimization Inc. (2015a). Gurobi 6.0 performance benchmarks. 
                    http://www.gurobi.com/pdfs/benchmarks.pdf
                    
                  . Accessed September 5, 2015."><span data-dcnode-id="4792" instrument_node="">2015a</span></a><span data-dcnode-id="4790" instrument_node="">), so the combined machine-independent speedup factor in MIO solvers between 1991 and 2015 is approximately 1,400,000. This impressive speedup factor is due to incorporating both theoretical and practical advances into MIO solvers. Cutting plane theory, disjunctive programming for branching rules, improved heuristic methods, techniques for preprocessing MIOs, using linear optimization as a black box to be called by MIO solvers, and improved linear optimization methods have all contributed greatly to the speed improvements in MIO solvers&nbsp;(Bixby </span><a aria-label="Reference 2012" data-dcnode-id="4788" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d60465247e555" title="Bixby, R. E. (2012). A brief history of linear and mixed-integer programming computation. Documenta Mathematica, Extra Volume: Optimization Stories, 107–121."><span data-dcnode-id="4789" instrument_node="">2012</span></a><span data-dcnode-id="4787" instrument_node="">). Coupled with the increase in computer hardware during this same period, a factor of approximately 570,000&nbsp;(Top500 Supercomputer Sites </span><a aria-label="Reference 2015" data-dcnode-id="4785" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d60465247e559" title="Top500 Supercomputer Sites. (2015). Performance development. 
                    http://www.top500.org/statistics/perfdevel/
                    
                  . Accessed September 4, 2015."><span data-dcnode-id="4786" instrument_node="">2015</span></a><span data-dcnode-id="4784" instrument_node="">), the overall speedup factor is approximately 800 billion! This astonishing increase in MIO solver performance has enabled many recent successes when applying modern MIO methods to a selection of these statistical problems&nbsp;(Bertsimas et&nbsp;al. </span><a aria-label="Reference 2016" data-dcnode-id="4782" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d60465247e562" title="Bertsimas, D., King, A., &amp; Mazumder, R. (2016). Best subset selection via a modern optimization lens. Annals of Statistics, 44(2), 813–852."><span data-dcnode-id="4783" instrument_node="">2016</span></a><span data-dcnode-id="4781" instrument_node="">; Bertsimas and King </span><a aria-label="Reference 2015" data-dcnode-id="4779" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d60465247e565" title="Bertsimas, D., &amp; King, A. (2015). An algorithmic approach to linear regression. Operations Research, 64(1), 2–16."><span data-dcnode-id="4780" instrument_node="">2015</span></a><span data-dcnode-id="4778" instrument_node="">, </span><a aria-label="Reference 2017" data-dcnode-id="4776" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d60465247e568" title="Bertsimas, D., &amp; King, A. (2017). Logistic regression: From art to science. Statistical Science (to appear)."><span data-dcnode-id="4777" instrument_node="">2017</span></a><span data-dcnode-id="4775" instrument_node="">; Bertsimas and Mazumder </span><a aria-label="Reference 2014" data-dcnode-id="4773" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d60465247e571" title="Bertsimas, D., &amp; Mazumder, R. (2014). Least quantile regression via modern optimization. The Annals of Statistics, 42(6), 2494–2525."><span data-dcnode-id="4774" instrument_node="">2014</span></a><span data-dcnode-id="4772" instrument_node="">).</span></p><p data-dcnode-id="4769"><span data-dcnode-id="4770" instrument_node="">The belief that MIO approaches to problems in statistics are not practically relevant was formed in the 1970s and 1980s and it was at the time justified. Given the astonishing speedup of MIO solvers and computer hardware in the last 25&nbsp;years, the mindset of MIO as theoretically elegant but practically irrelevant is no longer supported. In this paper, we extend this re-examination of statistics under a modern optimization lens by using MIO to formulate and solve the decision tree training problem, and provide empirical evidence of the success of this approach.</span></p><p data-dcnode-id="4731"><span data-dcnode-id="4768" instrument_node="">One key advantage of using MIO is the richness offered by the modeling framework. For example, consider </span><i data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node="">multivariate</span></i><span data-dcnode-id="4765" instrument_node=""> (or </span><i data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">oblique</span></i><span data-dcnode-id="4762" instrument_node="">) decision trees, which split on multiple variables at a time, rather than the </span><i data-dcnode-id="4760"><span data-dcnode-id="4761" instrument_node="">univariate</span></i><span data-dcnode-id="4759" instrument_node=""> or </span><i data-dcnode-id="4757"><span data-dcnode-id="4758" instrument_node="">axis-aligned</span></i><span data-dcnode-id="4756" instrument_node=""> trees that are more common. These multivariate splits are often much stronger than univariate splits, however the problem of determining the split at each node is much more complicated than the univariate case, as a simple enumeration is no longer possible. Many approaches to solving this problem have been proposed, including using logistic regression&nbsp;(Truong </span><a aria-label="Reference 2009" data-dcnode-id="4754" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d60465247e593" title="Truong, A. (2009). Fast growing and interpretable oblique trees via logistic regression models. Ph.D. thesis, University of Oxford."><span data-dcnode-id="4755" instrument_node="">2009</span></a><span data-dcnode-id="4753" instrument_node="">), support vector machines&nbsp;(Bennett and Blue </span><a aria-label="Reference 1998" data-dcnode-id="4751" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d60465247e597" title="Bennett, K. P., &amp; Blue, J. A. (1998). A support vector machine approach to decision trees. In IEEE international joint conference on neural networks proceedings. IEEE world congress on computational intelligence (Vol. 3, pp. 2396–2401)."><span data-dcnode-id="4752" instrument_node="">1998</span></a><span data-dcnode-id="4750" instrument_node="">), simulated annealing&nbsp;(Heath et&nbsp;al. </span><a aria-label="Reference 1993" data-dcnode-id="4748" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d60465247e600" title="Heath, D., Kasif, S., &amp; Salzberg, S. (1993). Induction of oblique decision trees. In IJCAI, Citeseer (pp. 1002–1007)."><span data-dcnode-id="4749" instrument_node="">1993</span></a><span data-dcnode-id="4747" instrument_node="">), linear discriminant analysis&nbsp;(Loh and Shih </span><a aria-label="Reference 1997" data-dcnode-id="4745" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d60465247e603" title="Loh, W. Y., &amp; Shih, Y. S. (1997). Split selection methods for classification trees. Statistica Sinica, 7(4), 815–840."><span data-dcnode-id="4746" instrument_node="">1997</span></a><span data-dcnode-id="4744" instrument_node="">; López-Chau et&nbsp;al. </span><a aria-label="Reference 2013" data-dcnode-id="4742" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d60465247e606" title="López-Chau, A., Cervantes, J., López-García, L., &amp; Lamont, F. G. (2013). Fishers decision tree. Expert Systems with Applications, 40(16), 6283–6291."><span data-dcnode-id="4743" instrument_node="">2013</span></a><span data-dcnode-id="4741" instrument_node="">), Householder transformations&nbsp;(Wickramarachchi et&nbsp;al. </span><a aria-label="Reference 2016" data-dcnode-id="4739" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d60465247e609" title="Wickramarachchi, D., Robertson, B., Reale, M., Price, C., &amp; Brown, J. (2016). Hhcart: An oblique decision tree. Computational Statistics &amp; Data Analysis, 96, 12–23."><span data-dcnode-id="4740" instrument_node="">2016</span></a><span data-dcnode-id="4738" instrument_node="">), and perturbation of existing univariate trees&nbsp;(Breiman et&nbsp;al. </span><a aria-label="Reference 1984" data-dcnode-id="4736" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d60465247e612" title="Breiman, L., Friedman, J., Olshen, R., &amp; Stone, C. (1984). Classification and regression trees. Monterey, CA: Wadsworth and Brooks."><span data-dcnode-id="4737" instrument_node="">1984</span></a><span data-dcnode-id="4735" instrument_node="">; Murthy et&nbsp;al. </span><a aria-label="Reference 1994" data-dcnode-id="4733" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d60465247e616" title="Murthy, S. K., Kasif, S., &amp; Salzberg, S. (1994). A system for induction of oblique decision trees. Journal of Artificial Intelligence Research, 2, 1–32."><span data-dcnode-id="4734" instrument_node="">1994</span></a><span data-dcnode-id="4732" instrument_node="">). Most of these approaches do not have easily accessible implementations that can be used on practically-sized datasets and as such, the use of multivariate decision trees in the statistics/machine learning community has been limited. We also note that these multivariate decision tree approaches share the same major flaw as univariate decision trees, in that the splits are formed one-by-one using top-down induction, and so the choice of split cannot be guided by the possible influence of future splits. However, when viewed from an MIO perspective the problems of generating univariate and multivariate problems are very similar, and the second is in fact simpler than the first, allowing a practical way to generate such trees which has not previously been possible for any heuristic. The flexibility of modeling the problem using MIO allows many such extensions to incorporated very easily.</span></p><p data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">Our goal in this paper is to demonstrate that formulating and solving the decision tree problem using MIO is a tractable approach and leads to practical solutions that outperform the classical approaches, often significantly.</span></p><p data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node="">We summarize our contributions in this paper below:</span></p><ol class="u-list-style-none" data-dcnode-id="4668"><span data-dcnode-id="4726" instrument_node="">
</span><li data-dcnode-id="4712"><span data-dcnode-id="4725" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4723"><span data-dcnode-id="4724" instrument_node="">1.</span></span><span data-dcnode-id="4722" instrument_node="">
</span><p data-dcnode-id="4714"><span data-dcnode-id="4721" instrument_node="">We present a new, novel formulation of the classical univariate decision tree problem as an MIO problem that motivates our new classification method, </span><i data-dcnode-id="4719"><span data-dcnode-id="4720" instrument_node="">optimal classification trees</span></i><span data-dcnode-id="4718" instrument_node=""> (OCT). We also show that by relaxing constraints in this model we obtain the multivariate decision tree problem, and that the resulting classification method, </span><i data-dcnode-id="4716"><span data-dcnode-id="4717" instrument_node="">optimal classification trees with hyperplanes</span></i><span data-dcnode-id="4715" instrument_node=""> (OCT-H), is as easy to train as its univariate counterpart, a fact that is not true about heuristic approaches for generating multivariate decision trees.</span></p><span data-dcnode-id="4713" instrument_node="">
</span></li><span data-dcnode-id="4711" instrument_node="">
</span><li data-dcnode-id="4703"><span data-dcnode-id="4710" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4708"><span data-dcnode-id="4709" instrument_node="">2.</span></span><span data-dcnode-id="4707" instrument_node="">
</span><p data-dcnode-id="4705"><span data-dcnode-id="4706" instrument_node="">Using a range of tests with synthetic data comparing OCT against CART, we demonstrate that solving the decision tree problem to optimality yields trees that better reflect the ground truth in the data, refuting the belief that such optimal methods will simply overfit to the training set and not generalize well.</span></p><span data-dcnode-id="4704" instrument_node="">
</span></li><span data-dcnode-id="4702" instrument_node="">
</span><li data-dcnode-id="4694"><span data-dcnode-id="4701" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4699"><span data-dcnode-id="4700" instrument_node="">3.</span></span><span data-dcnode-id="4698" instrument_node="">
</span><p data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">We demonstrate that our MIO methods outperform classical decision tree methods in practical applications. We comprehensively benchmark both OCT and OCT-H against the state-of-the-art CART on a sample of 53 datasets from the UCI machine learning repository. We show that across this sample, the OCT and OCT-H problems are practically solvable for datasets with sizes in the thousands and yield higher out-of-sample accuracy than CART, with average absolute improvements over CART of 1–2 and 3–5% for OCT and OCT-H, respectively, across all datasets depending on the depth of tree used.</span></p><span data-dcnode-id="4695" instrument_node="">
</span></li><span data-dcnode-id="4693" instrument_node="">
</span><li data-dcnode-id="4679"><span data-dcnode-id="4692" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">4.</span></span><span data-dcnode-id="4689" instrument_node="">
</span><p data-dcnode-id="4681"><span data-dcnode-id="4688" instrument_node="">We provide a comparison of OCT and OCT-H to Random Forests. Across all 53 datasets, OCT closes the gap between CART and Random Forests by about one-sixth, and OCT-H by about half. Furthermore, for the 31 datasets with two or three classes, and </span><span class="mathjax-tex" data-dcnode-id="4683"><span class="MathJax_Preview" data-dcnode-id="4686"><span data-dcnode-id="4687" instrument_node="">p \le 25</span></span></span><span data-dcnode-id="4682" instrument_node="">, OCT-H and Random Forests are comparable in accuracy.</span></p><span data-dcnode-id="4680" instrument_node="">
</span></li><span data-dcnode-id="4678" instrument_node="">
</span><li data-dcnode-id="4670"><span data-dcnode-id="4677" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4675"><span data-dcnode-id="4676" instrument_node="">5.</span></span><span data-dcnode-id="4674" instrument_node="">
</span><p data-dcnode-id="4672"><span data-dcnode-id="4673" instrument_node="">To provide guidance to machine learning practitioners, we present simple decision rules using characteristics of the dataset that predict with high accuracy when the optimal tree methods will deliver consistent and significant accuracy improvements over CART. OCT is highly likely to improve upon CART by 2–4% when the CART accuracy is low, and by 1.2–1.3% when the CART accuracy is high and sufficient training data is availble. OCT-H improves upon CART by 4–7% when the CART accuracy is low or the dimension of the dataset is small.</span></p><span data-dcnode-id="4671" instrument_node="">
</span></li><span data-dcnode-id="4669" instrument_node="">
</span></ol><p data-dcnode-id="4663"><span data-dcnode-id="4667" instrument_node="">We note that there have been efforts in the past to apply MIO methods to classification problems. Classification and regression via integer optimization (CRIO), proposed by&nbsp;Bertsimas and Shioda (</span><a aria-label="Reference 2007" data-dcnode-id="4665" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d60465247e715" title="Bertsimas, D., &amp; Shioda, R. (2007). Classification and regression via integer optimization. Operations Research, 55(2), 252–271."><span data-dcnode-id="4666" instrument_node="">2007</span></a><span data-dcnode-id="4664" instrument_node="">), uses MIO to partition and classify the data points. CRIO was not able to solve the classification problems to provable optimality for moderately-sized classification problems, and the practical improvement over CART was not significant. In contrast, in this paper we present a very different MIO approach based around solving the same problem that CART seeks to solve, and this approach provides material improvement over CART for a variety of datasets.</span></p><p data-dcnode-id="4643"><span data-dcnode-id="4662" instrument_node="">The structure of the paper is as follows. In Sect.&nbsp;</span><a data-dcnode-id="4660" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="4661" instrument_node="">2</span></a><span data-dcnode-id="4659" instrument_node="">, we review decision tree methods and formulate the problem of optimal tree creation within an MIO framework. In Sect.&nbsp;</span><a data-dcnode-id="4657" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec6"><span data-dcnode-id="4658" instrument_node="">3</span></a><span data-dcnode-id="4656" instrument_node="">, we present a complete training algorithm for optimal tree classification methods. In Sect.&nbsp;</span><a data-dcnode-id="4654" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec7"><span data-dcnode-id="4655" instrument_node="">4</span></a><span data-dcnode-id="4653" instrument_node="">, we extend the MIO formulation to consider trees with multivariate splits. In Sect.&nbsp;</span><a data-dcnode-id="4651" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec11"><span data-dcnode-id="4652" instrument_node="">5</span></a><span data-dcnode-id="4650" instrument_node="">, we conduct a range of experiments using synthetic datasets to evaluate the performance of our method in recovering a known ground truth. In Sect.&nbsp;</span><a data-dcnode-id="4648" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec12"><span data-dcnode-id="4649" instrument_node="">6</span></a><span data-dcnode-id="4647" instrument_node="">, we perform a variety of computational tests on real-world datasets to benchmark our performance against classical decision tree methods in practical applications. In Sect.&nbsp;</span><a data-dcnode-id="4645" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec17"><span data-dcnode-id="4646" instrument_node="">7</span></a><span data-dcnode-id="4644" instrument_node="">, we include our concluding remarks.</span></p></div></div></section><section data-dcnode-id="3422" data-title="Optimal decision tree formulation using MIO"><div class="c-article-section" data-dcnode-id="3423" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4638" id="Sec2"><span data-dcnode-id="4639" instrument_node="">Optimal decision tree formulation using MIO</span></h2><div class="c-article-section__content" data-dcnode-id="3424" id="Sec2-content"><p data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">In this section, we first give an overview of the classification problem and the approach taken by typical decision tree methods. We then present the problem that CART seeks to solve as a formal optimization problem and develop an MIO model formulation for this problem allowing us to solve it to optimality, providing the basis for our method OCT.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4634" id="Sec3"><span data-dcnode-id="4635" instrument_node="">Overview of classification problem and decision trees</span></h3><p data-dcnode-id="4587"><span data-dcnode-id="4633" instrument_node="">We are given the training data </span><span class="mathjax-tex" data-dcnode-id="4628"><span class="MathJax_Preview" data-dcnode-id="4631"><span data-dcnode-id="4632" instrument_node="">({\varvec{X}}, {\varvec{Y}})</span></span></span><span data-dcnode-id="4627" instrument_node="">, containing </span><i data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">n</span></i><span data-dcnode-id="4624" instrument_node=""> observations </span><span class="mathjax-tex" data-dcnode-id="4619"><span class="MathJax_Preview" data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">({\varvec{x}}_i, y_i)</span></span></span><span data-dcnode-id="4618" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4613"><span class="MathJax_Preview" data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">i = 1, \ldots , n</span></span></span><span data-dcnode-id="4612" instrument_node="">, each with </span><i data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">p</span></i><span data-dcnode-id="4609" instrument_node=""> features </span><span class="mathjax-tex" data-dcnode-id="4604"><span class="MathJax_Preview" data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">{\varvec{x}}_i \in \mathbb {R}^p</span></span></span><span data-dcnode-id="4603" instrument_node=""> and a class label </span><span class="mathjax-tex" data-dcnode-id="4598"><span class="MathJax_Preview" data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">y_i \in \{1, \ldots , K\}</span></span></span><span data-dcnode-id="4597" instrument_node=""> indicating which of </span><i data-dcnode-id="4595"><span data-dcnode-id="4596" instrument_node="">K</span></i><span data-dcnode-id="4594" instrument_node=""> possible labels is assigned to this point. We assume without loss of generality that the values for each dimension across the training data are normalized to the 0–1 interval, meaning each </span><span class="mathjax-tex" data-dcnode-id="4589"><span class="MathJax_Preview" data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">{\varvec{x}}_i \in {[0, 1]}^p</span></span></span><span data-dcnode-id="4588" instrument_node="">.</span></p><p data-dcnode-id="4576"><span data-dcnode-id="4586" instrument_node="">Decision tree methods seek to recursively partition </span><span class="mathjax-tex" data-dcnode-id="4581"><span class="MathJax_Preview" data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">{[0, 1]}^p</span></span></span><span data-dcnode-id="4580" instrument_node=""> to yield a number of hierarchical, disjoint regions that represent a classification tree. An example of a decision tree is shown in Fig.&nbsp;</span><a data-dcnode-id="4578" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4579" instrument_node="">1</span></a><span data-dcnode-id="4577" instrument_node="">. The final tree is comprised of branch nodes and leaf nodes:</span></p><ul class="u-list-style-dash" data-dcnode-id="4532"><span data-dcnode-id="4575" instrument_node="">
</span><li data-dcnode-id="4540"><span data-dcnode-id="4574" instrument_node="">
</span><p data-dcnode-id="4542"><span data-dcnode-id="4573" instrument_node="">Branch nodes apply a split with parameters </span><span class="mathjax-tex" data-dcnode-id="4568"><span class="MathJax_Preview" data-dcnode-id="4571"><span data-dcnode-id="4572" instrument_node="">{\varvec{a}}</span></span></span><span data-dcnode-id="4567" instrument_node=""> and </span><i data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">b</span></i><span data-dcnode-id="4564" instrument_node="">. For a given point </span><i data-dcnode-id="4562"><span data-dcnode-id="4563" instrument_node="">i</span></i><span data-dcnode-id="4561" instrument_node="">, if </span><span class="mathjax-tex" data-dcnode-id="4556"><span class="MathJax_Preview" data-dcnode-id="4559"><span data-dcnode-id="4560" instrument_node="">{\varvec{a}}^T {\varvec{x}}_i &lt; b</span></span></span><span data-dcnode-id="4555" instrument_node=""> the point will follow the left branch from the node, otherwise it takes the right branch. A subset of methods, including CART, produce </span><i data-dcnode-id="4553"><span data-dcnode-id="4554" instrument_node="">univariate</span></i><span data-dcnode-id="4552" instrument_node=""> or </span><i data-dcnode-id="4550"><span data-dcnode-id="4551" instrument_node="">axis-aligned</span></i><span data-dcnode-id="4549" instrument_node=""> decision trees which restrict the split to a single dimension, i.e., a single component of </span><span class="mathjax-tex" data-dcnode-id="4544"><span class="MathJax_Preview" data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">{\varvec{a}}</span></span></span><span data-dcnode-id="4543" instrument_node=""> will be 1 and all others will be 0.</span></p><span data-dcnode-id="4541" instrument_node="">
</span></li><span data-dcnode-id="4539" instrument_node="">
</span><li data-dcnode-id="4534"><span data-dcnode-id="4538" instrument_node="">
</span><p data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">Leaf nodes are assigned a class that will determine the prediction for all data points that fall into the leaf node. The assigned class is almost always taken to be the class that occurs most often among points contained in the leaf node.</span></p><span data-dcnode-id="4535" instrument_node="">
</span></li><span data-dcnode-id="4533" instrument_node="">
</span></ul><span data-dcnode-id="4531" instrument_node="">
</span><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4507" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="4508"><figcaption data-dcnode-id="4528"><b class="c-article-section__figure-caption" data-dcnode-id="4529" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="4530" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4519"><div class="c-article-section__figure-item" data-dcnode-id="4523"><a class="c-article-section__figure-link" data-dcnode-id="4524" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/figures/1" rel="nofollow"><picture data-dcnode-id="4525"><source data-dcnode-id="4527" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10994-017-5633-9/MediaObjects/10994_2017_5633_Fig1_HTML.gif?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="4526" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10994-017-5633-9/MediaObjects/10994_2017_5633_Fig1_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4520" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">An example of a decision tree with two partition nodes and three leaf nodes</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4509"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="4510" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/figures/1" rel="nofollow"><span data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4511" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4512" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4513" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4516" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4515" fill-rule="evenodd"></path><span data-dcnode-id="4514" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4506" instrument_node="">
</span><p data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">Classical decision tree methods like CART, ID3, and C4.5 take a top-down approach to building the tree. At each step of the partitioning process, they seek to find a split that will partition the current region in such a way to maximize a so-called splitting criterion. This criterion is often based on the label impurity of the data points contained in the resulting regions instead of minimizing the resulting misclassification error, which as discussed earlier is a byproduct of using a top-down induction process to grow the tree. The algorithm proceeds to recursively partition the two new regions that are created by the hyperplane split. The partitioning terminates once any one of a number of stopping criteria are met. The criteria for CART are as follows:</span></p><ul class="u-list-style-dash" data-dcnode-id="4484"><span data-dcnode-id="4503" instrument_node="">
</span><li data-dcnode-id="4492"><span data-dcnode-id="4502" instrument_node="">
</span><p data-dcnode-id="4494"><span data-dcnode-id="4501" instrument_node="">It is not possible to create a split where each side of the partition has at least a certain number of nodes, </span><span class="mathjax-tex" data-dcnode-id="4496"><span class="MathJax_Preview" data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">N_{\min }</span></span></span><span data-dcnode-id="4495" instrument_node="">;</span></p><span data-dcnode-id="4493" instrument_node="">
</span></li><span data-dcnode-id="4491" instrument_node="">
</span><li data-dcnode-id="4486"><span data-dcnode-id="4490" instrument_node="">
</span><p data-dcnode-id="4488"><span data-dcnode-id="4489" instrument_node="">All points in the candidate node share the same class.</span></p><span data-dcnode-id="4487" instrument_node="">
</span></li><span data-dcnode-id="4485" instrument_node="">
</span></ul><p data-dcnode-id="4476"><span data-dcnode-id="4483" instrument_node="">Once the splitting process is complete, a class label </span><span class="mathjax-tex" data-dcnode-id="4478"><span class="MathJax_Preview" data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">1, \ldots , K</span></span></span><span data-dcnode-id="4477" instrument_node=""> is assigned to each region. This class will be used to predict the class of any points contained inside the region. As mentioned earlier, this assigned class will typically be the most common class among the points in the region.</span></p><p data-dcnode-id="4465"><span data-dcnode-id="4475" instrument_node="">The final step in the process is pruning the tree in an attempt to avoid overfitting. The pruning process works upwards through the partition nodes from the bottom of the tree. The decision of whether to prune a node is controlled by the so-called </span><i data-dcnode-id="4473"><span data-dcnode-id="4474" instrument_node="">complexity parameter</span></i><span data-dcnode-id="4472" instrument_node="">, denoted by </span><span class="mathjax-tex" data-dcnode-id="4467"><span class="MathJax_Preview" data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">\alpha </span></span></span><span data-dcnode-id="4466" instrument_node="">, which balances the additional complexity of adding the split at the node against the increase in predictive accuracy that it offers. A higher complexity parameter leads to more and more nodes being pruned off, resulting in smaller trees.</span></p><p data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">As discussed previously, this two-stage growing and pruning procedure for creating the tree is required when using a top-down induction approach, as otherwise the penalties on tree complexity may prevent the method from selecting a weaker split that then allows a selection of a stronger split in the next stage. In this sense, the strong split is hidden behind the weak split, and this strong split may be passed over if the growing-then-pruning approach is not used.</span></p><p data-dcnode-id="4440"><span data-dcnode-id="4462" instrument_node="">Using the details of the CART procedure, we can state the problem that CART attempts to solve as a formal optimization problem. There are two parameters in this problem. The tradeoff between accuracy and complexity of the tree is controlled by the complexity parameter </span><span class="mathjax-tex" data-dcnode-id="4457"><span class="MathJax_Preview" data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">\alpha </span></span></span><span data-dcnode-id="4456" instrument_node="">, and the minimum number of points we require in any leaf node is given by </span><span class="mathjax-tex" data-dcnode-id="4451"><span class="MathJax_Preview" data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">N_{\min }</span></span></span><span data-dcnode-id="4450" instrument_node="">. Given these parameters and the training data </span><span class="mathjax-tex" data-dcnode-id="4445"><span class="MathJax_Preview" data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">({\varvec{x}}_i, y_i), i = 1, \ldots , n</span></span></span><span data-dcnode-id="4444" instrument_node="">, we seek a tree </span><i data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">T</span></i><span data-dcnode-id="4441" instrument_node=""> that solves the problem:</span></p><div class="c-article-equation" data-dcnode-id="4431" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="4434"><span class="mathjax-tex" data-dcnode-id="4435"><span class="MathJax_Preview" data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">\begin{aligned} \begin{aligned} \min&amp;\quad R_{xy}(T) + \alpha |T|\\ \text {s.t.}&amp;\quad N_x(l) \ge N_{\min }&amp;\quad \forall l \in \text {leaves}(T) \end{aligned} \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">
                    (1)
                </span></div></div><p data-dcnode-id="4402"><span data-dcnode-id="4430" instrument_node="">where </span><span class="mathjax-tex" data-dcnode-id="4425"><span class="MathJax_Preview" data-dcnode-id="4428"><span data-dcnode-id="4429" instrument_node="">R_{xy}(T)</span></span></span><span data-dcnode-id="4424" instrument_node=""> is the misclassification error of the tree </span><i data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">T</span></i><span data-dcnode-id="4421" instrument_node=""> on the training data, |</span><i data-dcnode-id="4419"><span data-dcnode-id="4420" instrument_node="">T</span></i><span data-dcnode-id="4418" instrument_node="">| is the number of branch nodes in tree </span><i data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">T</span></i><span data-dcnode-id="4415" instrument_node="">, and </span><span class="mathjax-tex" data-dcnode-id="4410"><span class="MathJax_Preview" data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">N_x(l)</span></span></span><span data-dcnode-id="4409" instrument_node=""> is the number of training points contained in leaf node </span><i data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">l</span></i><span data-dcnode-id="4406" instrument_node="">. We refer to this problem as the </span><i data-dcnode-id="4404"><span data-dcnode-id="4405" instrument_node="">optimal tree problem</span></i><span data-dcnode-id="4403" instrument_node="">.</span></p><p data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">Notice that if we can solve this problem in a single step we obviate the need to use an impurity measure when growing the tree, and also remove the need to prune the tree after creation, as we have already accounted for the complexity penalty while growing the tree.</span></p><p data-dcnode-id="4395"><span data-dcnode-id="4399" instrument_node="">We briefly note that our choice to use CART to define the optimal tree problem was arbitrary, and one could similarly define this problem based on another method like C4.5; we simply use this problem to demonstrate the advantages of taking a problem that is traditionally solved by a heuristic and instead solving it to optimality. Additionally, we note that the experiments of&nbsp;Murthy and Salzberg (</span><a aria-label="Reference 1995b" data-dcnode-id="4397" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d60465247e1706" title="Murthy, S. K., &amp; Salzberg, S. (1995b). Decision tree induction: How effective is the greedy heuristic? In KDD (pp. 222–227)."><span data-dcnode-id="4398" instrument_node="">1995b</span></a><span data-dcnode-id="4396" instrument_node="">) found that CART and C4.5 did not differ significantly in any measure of tree quality, including out-of-sample accuracy, and so we do not believe our choice of CART over C4.5 to be an important one.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4393" id="Sec4"><span data-dcnode-id="4394" instrument_node="">Formulating optimal tree creation as an MIO problem</span></h3><p data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">As mentioned previously, the top-down, greedy nature of state-of-the-art decision tree creation algorithms can lead to solutions that are only locally optimal. In this section, we first argue that the natural way to pose the task of creating the globally optimal decision tree is as an MIO problem, and then proceed to develop such a formulation.</span></p><p data-dcnode-id="4386"><span data-dcnode-id="4390" instrument_node="">To see that the most natural representation for formulating the optimal decision tree problem&nbsp;(</span><a data-dcnode-id="4388" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="4389" instrument_node="">1</span></a><span data-dcnode-id="4387" instrument_node="">) is using MIO, we note that at every step in tree creation, we are required to make a number of discrete decisions:</span></p><ul class="u-list-style-dash" data-dcnode-id="4360"><span data-dcnode-id="4385" instrument_node="">
</span><li data-dcnode-id="4380"><span data-dcnode-id="4384" instrument_node="">
</span><p data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">At every new node, we must choose to either branch or stop.</span></p><span data-dcnode-id="4381" instrument_node="">
</span></li><span data-dcnode-id="4379" instrument_node="">
</span><li data-dcnode-id="4374"><span data-dcnode-id="4378" instrument_node="">
</span><p data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node="">After choosing to stop branching at a node, we must choose a label to assign to this new leaf node.</span></p><span data-dcnode-id="4375" instrument_node="">
</span></li><span data-dcnode-id="4373" instrument_node="">
</span><li data-dcnode-id="4368"><span data-dcnode-id="4372" instrument_node="">
</span><p data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">After choosing to branch, we must choose which of the variables to branch on.</span></p><span data-dcnode-id="4369" instrument_node="">
</span></li><span data-dcnode-id="4367" instrument_node="">
</span><li data-dcnode-id="4362"><span data-dcnode-id="4366" instrument_node="">
</span><p data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">When classifying the training points according to the tree under construction, we must choose to which leaf node a point will be assigned such that the structure of the tree is respected.</span></p><span data-dcnode-id="4363" instrument_node="">
</span></li><span data-dcnode-id="4361" instrument_node="">
</span></ul><p data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">Formulating this problem using MIO allows us to model all of these discrete decisions in a single problem, as opposed to recursive, top-down methods that must consider these decision events in isolation. Modeling the construction process in this way allows us to consider the full impact of the decisions being made at the top of the tree, rather than simply making a series of locally optimal decisions, also avoiding the need for pruning and impurity measures.</span></p><p data-dcnode-id="4332"><span data-dcnode-id="4357" instrument_node="">We will next formulate the optimal tree creation problem&nbsp;(</span><a data-dcnode-id="4355" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="4356" instrument_node="">1</span></a><span data-dcnode-id="4354" instrument_node="">) as an MIO problem. Consider the problem of trying to construct an optimal decision tree with a maximum depth of </span><i data-dcnode-id="4352"><span data-dcnode-id="4353" instrument_node="">D</span></i><span data-dcnode-id="4351" instrument_node="">. Given this depth, we can construct the </span><i data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">maximal tree</span></i><span data-dcnode-id="4348" instrument_node=""> of this depth, which has </span><span class="mathjax-tex" data-dcnode-id="4343"><span class="MathJax_Preview" data-dcnode-id="4346"><span data-dcnode-id="4347" instrument_node="">T = 2^{(D+1)} - 1</span></span></span><span data-dcnode-id="4342" instrument_node=""> nodes, which we index by </span><span class="mathjax-tex" data-dcnode-id="4337"><span class="MathJax_Preview" data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node=""> t = 1, \ldots , T</span></span></span><span data-dcnode-id="4336" instrument_node="">. Figure&nbsp;</span><a data-dcnode-id="4334" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4335" instrument_node="">2</span></a><span data-dcnode-id="4333" instrument_node=""> shows the maximal tree of depth 2.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4302" data-test="figure" data-title="Fig. 2" id="figure-2"><figure data-dcnode-id="4303"><figcaption data-dcnode-id="4329"><b class="c-article-section__figure-caption" data-dcnode-id="4330" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="4331" instrument_node="">Fig. 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4314"><div class="c-article-section__figure-item" data-dcnode-id="4324"><a class="c-article-section__figure-link" data-dcnode-id="4325" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/figures/2" rel="nofollow"><picture data-dcnode-id="4326"><source data-dcnode-id="4328" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10994-017-5633-9/MediaObjects/10994_2017_5633_Fig2_HTML.gif?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="4327" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10994-017-5633-9/MediaObjects/10994_2017_5633_Fig2_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4315" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="4316"><span data-dcnode-id="4323" instrument_node="">The maximal tree for depth </span><span class="mathjax-tex" data-dcnode-id="4318"><span class="MathJax_Preview" data-dcnode-id="4321"><span data-dcnode-id="4322" instrument_node="">D = 2</span></span></span><span data-dcnode-id="4317" instrument_node="">
