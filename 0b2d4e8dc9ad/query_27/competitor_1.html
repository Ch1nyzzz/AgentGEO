</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4304"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="4305" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/figures/2" rel="nofollow"><span data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4306" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4307" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4308" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4311" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4310" fill-rule="evenodd"></path><span data-dcnode-id="4309" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4301" instrument_node="">
</span><p data-dcnode-id="4236"><span data-dcnode-id="4300" instrument_node="">We use the notation </span><i data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">p</span></i><span data-dcnode-id="4297" instrument_node="">(</span><i data-dcnode-id="4295"><span data-dcnode-id="4296" instrument_node="">t</span></i><span data-dcnode-id="4294" instrument_node="">) to refer to the parent node of node </span><i data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">t</span></i><span data-dcnode-id="4291" instrument_node="">, and </span><i data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">A</span></i><span data-dcnode-id="4288" instrument_node="">(</span><i data-dcnode-id="4286"><span data-dcnode-id="4287" instrument_node="">t</span></i><span data-dcnode-id="4285" instrument_node="">) to denote the set of ancestors of node </span><i data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">t</span></i><span data-dcnode-id="4282" instrument_node="">. We also define </span><span class="mathjax-tex" data-dcnode-id="4277"><span class="MathJax_Preview" data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">A_L(t)</span></span></span><span data-dcnode-id="4276" instrument_node=""> as the set of ancestors of </span><i data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">t</span></i><span data-dcnode-id="4273" instrument_node=""> whose left branch has been followed on the path from the root node to </span><i data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">t</span></i><span data-dcnode-id="4270" instrument_node="">, and similarly </span><span class="mathjax-tex" data-dcnode-id="4265"><span class="MathJax_Preview" data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">A_R(t)</span></span></span><span data-dcnode-id="4264" instrument_node=""> is the set of right-branch ancestors, such that </span><span class="mathjax-tex" data-dcnode-id="4259"><span class="MathJax_Preview" data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">A(t) = A_L(t) \cup A_R(t)</span></span></span><span data-dcnode-id="4258" instrument_node="">. For example, in the tree in Fig.&nbsp;</span><a data-dcnode-id="4256" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4257" instrument_node="">2</span></a><span data-dcnode-id="4255" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4250"><span class="MathJax_Preview" data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">A_L(5) = \{1\}</span></span></span><span data-dcnode-id="4249" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="4244"><span class="MathJax_Preview" data-dcnode-id="4247"><span data-dcnode-id="4248" instrument_node="">A_R(5) = \{2\}</span></span></span><span data-dcnode-id="4243" instrument_node="">, and </span><span class="mathjax-tex" data-dcnode-id="4238"><span class="MathJax_Preview" data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">A(5) = \{1,2\}</span></span></span><span data-dcnode-id="4237" instrument_node="">.</span></p><p data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">We divide the nodes in the tree into two sets:</span></p><ul class="u-list-style-none" data-dcnode-id="4196"><span data-dcnode-id="4233" instrument_node="">
</span><li data-dcnode-id="4213"><span data-dcnode-id="4232" instrument_node="">
</span><p data-dcnode-id="4215"><span data-dcnode-id="4231" instrument_node="">
</span><i data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">Branch nodes</span></i><span data-dcnode-id="4228" instrument_node=""> Nodes </span><span class="mathjax-tex" data-dcnode-id="4223"><span class="MathJax_Preview" data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">t \in \mathcal T_B = \{1, \ldots , \lfloor T/2 \rfloor \}</span></span></span><span data-dcnode-id="4222" instrument_node=""> apply a split of the form </span><span class="mathjax-tex" data-dcnode-id="4217"><span class="MathJax_Preview" data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">{\varvec{a}}^{\mathsf{T}}{\varvec{x}}&lt; b</span></span></span><span data-dcnode-id="4216" instrument_node="">. Points that satisfy this split follow the left branch in the tree, and those that do not follow the right branch.</span></p><span data-dcnode-id="4214" instrument_node="">
</span></li><span data-dcnode-id="4212" instrument_node="">
</span><li data-dcnode-id="4198"><span data-dcnode-id="4211" instrument_node="">
</span><p data-dcnode-id="4200"><span data-dcnode-id="4210" instrument_node="">
</span><i data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">Leaf nodes</span></i><span data-dcnode-id="4207" instrument_node=""> Nodes </span><span class="mathjax-tex" data-dcnode-id="4202"><span class="MathJax_Preview" data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">t \in \mathcal T_L = \{\lfloor T/2 \rfloor + 1, \ldots , T \}</span></span></span><span data-dcnode-id="4201" instrument_node=""> make a class prediction for each point that falls into the leaf node.</span></p><span data-dcnode-id="4199" instrument_node="">
</span></li><span data-dcnode-id="4197" instrument_node="">
</span></ul><p data-dcnode-id="4146"><span data-dcnode-id="4195" instrument_node="">We track the split applied at node </span><span class="mathjax-tex" data-dcnode-id="4190"><span class="MathJax_Preview" data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">t \in \mathcal T_B</span></span></span><span data-dcnode-id="4189" instrument_node=""> with variables </span><span class="mathjax-tex" data-dcnode-id="4184"><span class="MathJax_Preview" data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node="">{\varvec{a}}_t\in \mathbb {R}^{p}</span></span></span><span data-dcnode-id="4183" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="4178"><span class="MathJax_Preview" data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">b_t \in \mathbb {R}^{}</span></span></span><span data-dcnode-id="4177" instrument_node="">. We will choose to restrict our model to univariate decision trees (like CART), and so the hyperplane split at each node should only involve a single variable. This is enforced by setting the elements of </span><span class="mathjax-tex" data-dcnode-id="4172"><span class="MathJax_Preview" data-dcnode-id="4175"><span data-dcnode-id="4176" instrument_node="">{\varvec{a}}_{t}</span></span></span><span data-dcnode-id="4171" instrument_node=""> to be binary variables that sum to 1. We want to allow the option of not splitting at a branch node. We use the indicator variables </span><span class="mathjax-tex" data-dcnode-id="4166"><span class="MathJax_Preview" data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">d_t = \mathbbm {1}\{\text {node } t \text { applies a split}\}</span></span></span><span data-dcnode-id="4165" instrument_node=""> to track which branch nodes apply splits. If a branch node does not apply a split, then we model this by setting </span><span class="mathjax-tex" data-dcnode-id="4160"><span class="MathJax_Preview" data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">{\varvec{a}}_t = {\varvec{0}}</span></span></span><span data-dcnode-id="4159" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="4154"><span class="MathJax_Preview" data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">b_t = 0</span></span></span><span data-dcnode-id="4153" instrument_node="">. This has the effect of forcing all points to follow the right split at this node, since the condition for the left split is </span><span class="mathjax-tex" data-dcnode-id="4148"><span class="MathJax_Preview" data-dcnode-id="4151"><span data-dcnode-id="4152" instrument_node="">0 &lt; 0</span></span></span><span data-dcnode-id="4147" instrument_node=""> which is never satisfied. This allows us to stop growing the tree early without introducing new variables to account for points ending up at the branch node—instead we send them all the same direction down the tree to end up in the same leaf node. We enforce this with the following constraints:</span></p><div class="c-article-equation" data-dcnode-id="4137" id="Equ2"><div class="c-article-equation__content" data-dcnode-id="4140"><span class="mathjax-tex" data-dcnode-id="4141"><span class="MathJax_Preview" data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">\begin{aligned}&amp;\sum _{j = 1}^{p}a_{jt} = d_t,\quad \forall t \in \mathcal T_B, \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">
                    (2)
                </span></div></div><span data-dcnode-id="4136" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="4127" id="Equ3"><div class="c-article-equation__content" data-dcnode-id="4130"><span class="mathjax-tex" data-dcnode-id="4131"><span class="MathJax_Preview" data-dcnode-id="4134"><span data-dcnode-id="4135" instrument_node="">\begin{aligned}&amp;0 \le b_t \le d_t,\quad \forall t \in \mathcal T_B, \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">
                    (3)
                </span></div></div><span data-dcnode-id="4126" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="4117" id="Equ4"><div class="c-article-equation__content" data-dcnode-id="4120"><span class="mathjax-tex" data-dcnode-id="4121"><span class="MathJax_Preview" data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">\begin{aligned}&amp;a_{jt} \in \{0, 1\},\quad j = 1, \ldots , p,\quad \forall t \in \mathcal T_B, \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">
                    (4)
                </span></div></div><p data-dcnode-id="4073"><span data-dcnode-id="4116" instrument_node="">where the second inequality is valid for </span><span class="mathjax-tex" data-dcnode-id="4111"><span class="MathJax_Preview" data-dcnode-id="4114"><span data-dcnode-id="4115" instrument_node="">b_t</span></span></span><span data-dcnode-id="4110" instrument_node=""> since we have assumed that each </span><span class="mathjax-tex" data-dcnode-id="4105"><span class="MathJax_Preview" data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">{\varvec{x}}_i \in {[0,1]}^p</span></span></span><span data-dcnode-id="4104" instrument_node="">, and we know that </span><span class="mathjax-tex" data-dcnode-id="4099"><span class="MathJax_Preview" data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">{\varvec{a}}_t</span></span></span><span data-dcnode-id="4098" instrument_node=""> has one element that is 1 if and only if </span><span class="mathjax-tex" data-dcnode-id="4093"><span class="MathJax_Preview" data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">d_t=1</span></span></span><span data-dcnode-id="4092" instrument_node="">, with the remainder being 0. Therefore we it is always true that </span><span class="mathjax-tex" data-dcnode-id="4087"><span class="MathJax_Preview" data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">0 \le {\varvec{a}}_t ^{\mathsf{T}}{\varvec{x}}_i \le d_t</span></span></span><span data-dcnode-id="4086" instrument_node=""> for any </span><i data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">i</span></i><span data-dcnode-id="4083" instrument_node=""> and </span><i data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">t</span></i><span data-dcnode-id="4080" instrument_node="">, and we need only consider values for </span><span class="mathjax-tex" data-dcnode-id="4075"><span class="MathJax_Preview" data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">b_t</span></span></span><span data-dcnode-id="4074" instrument_node=""> in this same range.</span></p><p data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">Next, we will enforce the hierarchical structure of the tree. We restrict a branch node from applying a split if its parent does not also apply a split.</span></p><div class="c-article-equation" data-dcnode-id="4062" id="Equ5"><div class="c-article-equation__content" data-dcnode-id="4065"><span class="mathjax-tex" data-dcnode-id="4066"><span class="MathJax_Preview" data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">\begin{aligned} d_t \le d_{p(t)},\quad \forall t \in \mathcal T_BP{\setminus } \{ 1 \}, \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">
                    (5)
                </span></div></div><p data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">where no such constraint is required for the root node.</span></p><p data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">We have constructed the variables that allow us to model the tree structure using MIO; we now need to track the allocation of points to leaves and the associated errors that are induced by this structure.</span></p><p data-dcnode-id="4038"><span data-dcnode-id="4057" instrument_node="">We introduce the indicator variables </span><span class="mathjax-tex" data-dcnode-id="4052"><span class="MathJax_Preview" data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">z_{it} = \mathbbm {1}\{{\varvec{x}}_i \text { is in node } t\}</span></span></span><span data-dcnode-id="4051" instrument_node=""> to track the points assigned to each leaf node, and we will then use the indicator variables </span><span class="mathjax-tex" data-dcnode-id="4046"><span class="MathJax_Preview" data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">l_t = \mathbbm {1}\{\text {leaf } t \text { contains any points}\}</span></span></span><span data-dcnode-id="4045" instrument_node=""> to enforce a minimum number of points at each leaf, given by </span><span class="mathjax-tex" data-dcnode-id="4040"><span class="MathJax_Preview" data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">N_{\min }</span></span></span><span data-dcnode-id="4039" instrument_node="">:</span></p><div class="c-article-equation" data-dcnode-id="4029" id="Equ6"><div class="c-article-equation__content" data-dcnode-id="4032"><span class="mathjax-tex" data-dcnode-id="4033"><span class="MathJax_Preview" data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">\begin{aligned} z_{it}&amp;\le l_t,\quad t \in \mathcal T_B, \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">
                    (6)
                </span></div></div><span data-dcnode-id="4028" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="4019" id="Equ7"><div class="c-article-equation__content" data-dcnode-id="4022"><span class="mathjax-tex" data-dcnode-id="4023"><span class="MathJax_Preview" data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">\begin{aligned} \sum _{i = 1}^{n}z_{it}&amp;\ge N_{\min } l_t, \quad t \in \mathcal T_B. \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">
                    (7)
                </span></div></div><p data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">We also force each point to be assigned to exactly one leaf:</span></p><div class="c-article-equation" data-dcnode-id="4008" id="Equ8"><div class="c-article-equation__content" data-dcnode-id="4011"><span class="mathjax-tex" data-dcnode-id="4012"><span class="MathJax_Preview" data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node="">\begin{aligned} \sum _{t \in \mathcal T_L}z_{it} = 1,\quad i = 1, \ldots , n. \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">
                    (8)
                </span></div></div><p data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">Finally, we apply constraints enforcing the splits that are required by the structure of the tree when assigning points to leaves:</span></p><div class="c-article-equation" data-dcnode-id="3997" id="Equ9"><div class="c-article-equation__content" data-dcnode-id="4000"><span class="mathjax-tex" data-dcnode-id="4001"><span class="MathJax_Preview" data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">\begin{aligned}&amp;{\varvec{a}}_m ^{\mathsf{T}}{\varvec{x}}_i &lt; b_t + M_1 (1 - z_{it}),\quad i = 1, \ldots , n, \quad \forall t \in \mathcal T_B, \quad \forall m \in A_L(t), \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">
                    (9)
                </span></div></div><span data-dcnode-id="3996" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="3987" id="Equ10"><div class="c-article-equation__content" data-dcnode-id="3990"><span class="mathjax-tex" data-dcnode-id="3991"><span class="MathJax_Preview" data-dcnode-id="3994"><span data-dcnode-id="3995" instrument_node="">\begin{aligned}&amp;{\varvec{a}}_m ^{\mathsf{T}}{\varvec{x}}_i \ge b_t - M_2 (1 - z_{it}),\quad i = 1, \ldots , n, \quad \forall t \in \mathcal T_B,\quad \forall m \in A_R(t), \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">
                    (10)
                </span></div></div><p data-dcnode-id="3973"><span data-dcnode-id="3986" instrument_node="">Note that the constraints&nbsp;(</span><a data-dcnode-id="3984" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ9"><span data-dcnode-id="3985" instrument_node="">9</span></a><span data-dcnode-id="3983" instrument_node="">) use a strict inequality which is not supported by MIO solvers, so this must be converted into a form that does not use a strict inequality. To do this we can add a small constant </span><span class="mathjax-tex" data-dcnode-id="3978"><span class="MathJax_Preview" data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">\epsilon </span></span></span><span data-dcnode-id="3977" instrument_node=""> to the left-hand-side of&nbsp;(</span><a data-dcnode-id="3975" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ9"><span data-dcnode-id="3976" instrument_node="">9</span></a><span data-dcnode-id="3974" instrument_node="">) and change the inequality to be non-strict:</span></p><div class="c-article-equation" data-dcnode-id="3964" id="Equ11"><div class="c-article-equation__content" data-dcnode-id="3967"><span class="mathjax-tex" data-dcnode-id="3968"><span class="MathJax_Preview" data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">\begin{aligned} {\varvec{a}}_m^T {\varvec{x}}_{i} + \epsilon \le b_{m} + M_1 \left( 1 - z_{it}\right) , \quad i = 1, \ldots , n, \quad \forall t \in \mathcal T_B, \quad \forall m \in A_L(t) \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">
                    (11)
                </span></div></div><p data-dcnode-id="3938"><span data-dcnode-id="3963" instrument_node="">However, if </span><span class="mathjax-tex" data-dcnode-id="3958"><span class="MathJax_Preview" data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">\epsilon </span></span></span><span data-dcnode-id="3957" instrument_node=""> is too small, this could cause numerical instabilities in the MIO solver, so we seek to make </span><span class="mathjax-tex" data-dcnode-id="3952"><span class="MathJax_Preview" data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">\epsilon </span></span></span><span data-dcnode-id="3951" instrument_node=""> as big as possible without affecting the feasibility of any valid solution to the problem. We can achieve this by specifying a different </span><span class="mathjax-tex" data-dcnode-id="3946"><span class="MathJax_Preview" data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">\epsilon _j</span></span></span><span data-dcnode-id="3945" instrument_node=""> for each feature </span><i data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">j</span></i><span data-dcnode-id="3942" instrument_node="">. The largest valid value is the smallest non-zero distance between adjacent values of this feature. To find this, we sort the values of the </span><i data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">j</span></i><span data-dcnode-id="3939" instrument_node="">th feature and take</span></p><div class="c-article-equation" data-dcnode-id="3931" id="Equ29"><div class="c-article-equation__content" data-dcnode-id="3932"><span class="mathjax-tex" data-dcnode-id="3933"><span class="MathJax_Preview" data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">\begin{aligned} \epsilon _j = \min \left\{ x_j^{(i + 1)} - x_j^{(i)} \biggm | x_j^{(i + 1)} \ne x_j^{(i)},\quad i = 1, \ldots , n - 1 \right\} , \end{aligned}</span></span></span></div></div><p data-dcnode-id="3905"><span data-dcnode-id="3930" instrument_node="">where </span><span class="mathjax-tex" data-dcnode-id="3925"><span class="MathJax_Preview" data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">x_j^{(i)}</span></span></span><span data-dcnode-id="3924" instrument_node=""> is the </span><i data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">i</span></i><span data-dcnode-id="3921" instrument_node="">th largest value in the </span><i data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">j</span></i><span data-dcnode-id="3918" instrument_node="">th feature. We can then use these values for </span><span class="mathjax-tex" data-dcnode-id="3913"><span class="MathJax_Preview" data-dcnode-id="3916"><span data-dcnode-id="3917" instrument_node="">\epsilon </span></span></span><span data-dcnode-id="3912" instrument_node=""> in the constraint, where the value of </span><span class="mathjax-tex" data-dcnode-id="3907"><span class="MathJax_Preview" data-dcnode-id="3910"><span data-dcnode-id="3911" instrument_node="">\epsilon _j</span></span></span><span data-dcnode-id="3906" instrument_node=""> that is used is selected according to the feature we are using for this split:</span></p><div class="c-article-equation" data-dcnode-id="3896" id="Equ12"><div class="c-article-equation__content" data-dcnode-id="3899"><span class="mathjax-tex" data-dcnode-id="3900"><span class="MathJax_Preview" data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">\begin{aligned} {\varvec{a}}_m^T ({\varvec{x}}_{i} + {\varvec{\epsilon }}) \le b_{m} + M_1 \left( 1 - z_{it}\right) ,\quad i = 1, \ldots , n, \quad \forall t \in \mathcal T_B, \quad \forall m \in A_L(t) \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">
                    (12)
                </span></div></div><p data-dcnode-id="3831"><span data-dcnode-id="3895" instrument_node="">We must also specify values for the big-</span><i data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">M</span></i><span data-dcnode-id="3892" instrument_node=""> constants </span><span class="mathjax-tex" data-dcnode-id="3887"><span class="MathJax_Preview" data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">M_1</span></span></span><span data-dcnode-id="3886" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="3881"><span class="MathJax_Preview" data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">M_2</span></span></span><span data-dcnode-id="3880" instrument_node="">. As mentioned previously, we know that both </span><span class="mathjax-tex" data-dcnode-id="3875"><span class="MathJax_Preview" data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">{\varvec{a}}_t ^T {\varvec{x}}_i \in [0, 1]</span></span></span><span data-dcnode-id="3874" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="3869"><span class="MathJax_Preview" data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">b_t \in [0,1]</span></span></span><span data-dcnode-id="3868" instrument_node="">, and so the largest possible value of </span><span class="mathjax-tex" data-dcnode-id="3863"><span class="MathJax_Preview" data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">{\varvec{a}}_t ^T ({\varvec{x}}_i + \epsilon ) - b_t</span></span></span><span data-dcnode-id="3862" instrument_node=""> is </span><span class="mathjax-tex" data-dcnode-id="3857"><span class="MathJax_Preview" data-dcnode-id="3860"><span data-dcnode-id="3861" instrument_node="">1 + \epsilon _{\max }</span></span></span><span data-dcnode-id="3856" instrument_node="">, where </span><span class="mathjax-tex" data-dcnode-id="3851"><span class="MathJax_Preview" data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">\epsilon _{\max } = \max _j \{\epsilon _j\}</span></span></span><span data-dcnode-id="3850" instrument_node="">. We can therefore set </span><span class="mathjax-tex" data-dcnode-id="3845"><span class="MathJax_Preview" data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">M_1 = 1 + \epsilon _{\max }</span></span></span><span data-dcnode-id="3844" instrument_node="">. Similarly, we have the largest possible value of </span><span class="mathjax-tex" data-dcnode-id="3839"><span class="MathJax_Preview" data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">b_t - {\varvec{a}}_t ^T x_i</span></span></span><span data-dcnode-id="3838" instrument_node=""> is 1, and so we can set </span><span class="mathjax-tex" data-dcnode-id="3833"><span class="MathJax_Preview" data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">M_2 = 1</span></span></span><span data-dcnode-id="3832" instrument_node="">. This gives the following final constraints that will enforce the splits in the tree:</span></p><div class="c-article-equation" data-dcnode-id="3822" id="Equ13"><div class="c-article-equation__content" data-dcnode-id="3825"><span class="mathjax-tex" data-dcnode-id="3826"><span class="MathJax_Preview" data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">\begin{aligned}&amp;{\varvec{a}}_m^T ({\varvec{x}}_{i} + {\varvec{\epsilon }}) \le b_{m} + (1 + \epsilon _{\max }) \left( 1 - z_{it}\right) , \quad i = 1, \ldots , n, \quad \forall t \in \mathcal T_L, \quad \forall m \in A_L(t), \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">
                    (13)
                </span></div></div><span data-dcnode-id="3821" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="3812" id="Equ14"><div class="c-article-equation__content" data-dcnode-id="3815"><span class="mathjax-tex" data-dcnode-id="3816"><span class="MathJax_Preview" data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">\begin{aligned}&amp;{\varvec{a}}_m ^{\mathsf{T}}{\varvec{x}}_i \ge b_m - (1 - z_{it}), \quad i = 1, \ldots , n, \quad \forall t \in \mathcal T_L, \quad \forall m \in A_R(t). \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">
                    (14)
                </span></div></div><p data-dcnode-id="3804"><span data-dcnode-id="3811" instrument_node="">The objective is to minimize the misclassification error, so an incorrect label prediction has cost 1, and a correct label prediction has cost 0. Let us define the matrix </span><span class="mathjax-tex" data-dcnode-id="3806"><span class="MathJax_Preview" data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">{\varvec{Y}}</span></span></span><span data-dcnode-id="3805" instrument_node=""> using the data, where</span></p><div class="c-article-equation" data-dcnode-id="3797" id="Equ30"><div class="c-article-equation__content" data-dcnode-id="3798"><span class="mathjax-tex" data-dcnode-id="3799"><span class="MathJax_Preview" data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">\begin{aligned} Y_{ik} = {\left\{ \begin{array}{ll} +1, &amp;{}\quad \text {if } y_i = k \\ -1, &amp;{}\quad \text {otherwise} \end{array}\right. } ,\quad k = 1, \ldots , K, \quad i = 1, \ldots , n. \end{aligned}</span></span></span></div></div><p data-dcnode-id="3774"><span data-dcnode-id="3796" instrument_node="">We set </span><span class="mathjax-tex" data-dcnode-id="3791"><span class="MathJax_Preview" data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">N_{kt}</span></span></span><span data-dcnode-id="3790" instrument_node=""> to be the number of points of label </span><i data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">k</span></i><span data-dcnode-id="3787" instrument_node=""> in node </span><i data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">t</span></i><span data-dcnode-id="3784" instrument_node="">, and </span><span class="mathjax-tex" data-dcnode-id="3779"><span class="MathJax_Preview" data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">N_t</span></span></span><span data-dcnode-id="3778" instrument_node=""> to be the total number of points in node </span><i data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">t</span></i><span data-dcnode-id="3775" instrument_node="">:</span></p><div class="c-article-equation" data-dcnode-id="3765" id="Equ15"><div class="c-article-equation__content" data-dcnode-id="3768"><span class="mathjax-tex" data-dcnode-id="3769"><span class="MathJax_Preview" data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">\begin{aligned} N_{kt}&amp;= \frac{1}{2} \sum _{i = 1}^{n}(1 + Y_{ik}) z_{it}, \quad k = 1, \ldots , K, \quad t \in \mathcal T_L, \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">
                    (15)
                </span></div></div><span data-dcnode-id="3764" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="3755" id="Equ16"><div class="c-article-equation__content" data-dcnode-id="3758"><span class="mathjax-tex" data-dcnode-id="3759"><span class="MathJax_Preview" data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">\begin{aligned} N_t&amp;= \sum _{i = 1}^{n}z_{it}, \quad \forall t \in \mathcal T_L. \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">
                    (16)
                </span></div></div><p data-dcnode-id="3744"><span data-dcnode-id="3754" instrument_node="">We need to assign a label to each leaf node </span><i data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">t</span></i><span data-dcnode-id="3751" instrument_node=""> in the tree, which we denote with </span><span class="mathjax-tex" data-dcnode-id="3746"><span class="MathJax_Preview" data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">c_t \in \{1, \ldots , K\}</span></span></span><span data-dcnode-id="3745" instrument_node="">. It is clear that the optimal label to predict is the most common of the labels among all points assigned to the node:</span></p><div class="c-article-equation" data-dcnode-id="3735" id="Equ17"><div class="c-article-equation__content" data-dcnode-id="3738"><span class="mathjax-tex" data-dcnode-id="3739"><span class="MathJax_Preview" data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">\begin{aligned} c_t = \mathop {{{\mathrm{arg\,max}}}}\limits _{k = 1, \ldots , K} \{ N_{kt} \} \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">
                    (17)
                </span></div></div><p data-dcnode-id="3721"><span data-dcnode-id="3734" instrument_node="">We will use binary variables </span><span class="mathjax-tex" data-dcnode-id="3729"><span class="MathJax_Preview" data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">c_{kt}</span></span></span><span data-dcnode-id="3728" instrument_node=""> to track the prediction of each node, where </span><span class="mathjax-tex" data-dcnode-id="3723"><span class="MathJax_Preview" data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">c_{kt} = \mathbbm {1}\{c_t = k\}</span></span></span><span data-dcnode-id="3722" instrument_node="">. We must make a single class prediction at each leaf node that contains points:</span></p><div class="c-article-equation" data-dcnode-id="3712" id="Equ18"><div class="c-article-equation__content" data-dcnode-id="3715"><span class="mathjax-tex" data-dcnode-id="3716"><span class="MathJax_Preview" data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">\begin{aligned} \sum _{k = 1}^{K}c_{kt} = l_t, \quad \forall t \in \mathcal T_L. \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">
                    (18)
                </span></div></div><p data-dcnode-id="3698"><span data-dcnode-id="3711" instrument_node="">Since we know how to make the optimal prediction at each leaf </span><i data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">t</span></i><span data-dcnode-id="3708" instrument_node=""> using&nbsp;(</span><a data-dcnode-id="3706" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ17"><span data-dcnode-id="3707" instrument_node="">17</span></a><span data-dcnode-id="3705" instrument_node="">), the optimal misclassification loss in each node, denoted </span><span class="mathjax-tex" data-dcnode-id="3700"><span class="MathJax_Preview" data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">L_t</span></span></span><span data-dcnode-id="3699" instrument_node=""> is going to be equal to the number of points in the node less the number of points of the most common label:</span></p><div class="c-article-equation" data-dcnode-id="3689" id="Equ19"><div class="c-article-equation__content" data-dcnode-id="3692"><span class="mathjax-tex" data-dcnode-id="3693"><span class="MathJax_Preview" data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">\begin{aligned} L_t = N_t - \max _{k = 1, \ldots , K} \{N_{kt} \} = \min _{k = 1, \ldots , K} \{ N_t - N_{kt} \}, \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">
                    (19)
                </span></div></div><p data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">which can be linearized to give</span></p><div class="c-article-equation" data-dcnode-id="3678" id="Equ20"><div class="c-article-equation__content" data-dcnode-id="3681"><span class="mathjax-tex" data-dcnode-id="3682"><span class="MathJax_Preview" data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">\begin{aligned}&amp;L_t \ge N_t - N_{kt} - M(1 - c_{kt}), \quad k = 1, \ldots , K, \quad \forall t \in \mathcal T_L, \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">
                    (20)
                </span></div></div><span data-dcnode-id="3677" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="3668" id="Equ21"><div class="c-article-equation__content" data-dcnode-id="3671"><span class="mathjax-tex" data-dcnode-id="3672"><span class="MathJax_Preview" data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">\begin{aligned}&amp;L_t \le N_t - N_{kt} + M c_{kt}, \quad k = 1, \ldots , K, \quad \forall t \in \mathcal T_L, \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">
                    (21)
                </span></div></div><span data-dcnode-id="3667" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="3658" id="Equ22"><div class="c-article-equation__content" data-dcnode-id="3661"><span class="mathjax-tex" data-dcnode-id="3662"><span class="MathJax_Preview" data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">\begin{aligned}&amp;L_t \ge 0, \quad \forall t \in \mathcal T_L, \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">
                    (22)
                </span></div></div><p data-dcnode-id="3641"><span data-dcnode-id="3657" instrument_node="">where again </span><i data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">M</span></i><span data-dcnode-id="3654" instrument_node=""> is a sufficiently large constant that makes the constraint inactive depending on the value of </span><span class="mathjax-tex" data-dcnode-id="3649"><span class="MathJax_Preview" data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">c_{kt}</span></span></span><span data-dcnode-id="3648" instrument_node="">. Here, we can take </span><span class="mathjax-tex" data-dcnode-id="3643"><span class="MathJax_Preview" data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">M = n</span></span></span><span data-dcnode-id="3642" instrument_node=""> as a valid value.</span></p><p data-dcnode-id="3612"><span data-dcnode-id="3640" instrument_node="">The total misclassification cost is therefore </span><span class="mathjax-tex" data-dcnode-id="3635"><span class="MathJax_Preview" data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">\sum _{t \in \mathcal T_L}L_t</span></span></span><span data-dcnode-id="3634" instrument_node="">, and the complexity of the tree is the number of splits included in the tree, given by </span><span class="mathjax-tex" data-dcnode-id="3629"><span class="MathJax_Preview" data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">\sum _{t \in \mathcal T_B}d_t</span></span></span><span data-dcnode-id="3628" instrument_node="">. Following CART, we normalize the misclassification against the baseline accuracy, </span><span class="mathjax-tex" data-dcnode-id="3623"><span class="MathJax_Preview" data-dcnode-id="3626"><span data-dcnode-id="3627" instrument_node="">\hat{L}</span></span></span><span data-dcnode-id="3622" instrument_node="">, obtained by simply predicting the most popular class for the entire dataset. This makes the effect of </span><span class="mathjax-tex" data-dcnode-id="3617"><span class="MathJax_Preview" data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3616" instrument_node=""> independent of the dataset size. This means the objective from problem&nbsp;(</span><a data-dcnode-id="3614" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="3615" instrument_node="">1</span></a><span data-dcnode-id="3613" instrument_node="">) can be written:</span></p><div class="c-article-equation" data-dcnode-id="3603" id="Equ23"><div class="c-article-equation__content" data-dcnode-id="3606"><span class="mathjax-tex" data-dcnode-id="3607"><span class="MathJax_Preview" data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">\begin{aligned} \min \quad \frac{1}{\hat{L}} \sum _{t \in \mathcal T_L}L_t + \alpha \sum _{t \in \mathcal T_B}d_t. \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">
                    (23)
                </span></div></div><p data-dcnode-id="3598"><span data-dcnode-id="3602" instrument_node="">Putting all of this together gives the following MIO formulation for problem&nbsp;(</span><a data-dcnode-id="3600" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="3601" instrument_node="">1</span></a><span data-dcnode-id="3599" instrument_node="">), which we call the OCT model:</span></p><div class="c-article-equation" data-dcnode-id="3589" id="Equ24"><div class="c-article-equation__content" data-dcnode-id="3592"><span class="mathjax-tex" data-dcnode-id="3593"><span class="MathJax_Preview" data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">\begin{aligned} \min&amp;\quad \frac{1}{\hat{L}} \sum _{t \in \mathcal T_L}L_t + \alpha \sum _{t \in \mathcal T_B}d_t \\ \text {s.t.}&amp;\quad L_t \ge N_t - N_{kt} - n(1 - c_{kt}), \quad k = 1, \ldots , K,\quad \forall t \in \mathcal T_L, \nonumber \\&amp;\quad L_t \le N_t - N_{kt} + n c_{kt}, \quad k = 1, \ldots , K, \quad \forall t \in \mathcal T_L, \nonumber \\&amp;\quad L_t \ge 0, \quad \forall t \in \mathcal T_L, \nonumber \\&amp;\quad N_{kt} = \frac{1}{2} \sum _{i = 1}^{n}(1 + Y_{ik}) z_{it},\quad k = 1, \ldots , K, \quad \forall t \in \mathcal T_L,\nonumber \\&amp;\quad N_t = \sum _{i = 1}^{n}z_{it},\quad \forall t \in \mathcal T_L, \nonumber \\&amp;\quad \sum _{k = 1}^{K}c_{kt} = l_t,\quad \forall t \in \mathcal T_L, \nonumber \\&amp;\quad {\varvec{a}}_m ^{\mathsf{T}}{\varvec{x}}_i \ge b_t - (1 - z_{it}),\quad i = 1, \ldots , n,\quad \forall t \in \mathcal T_B,\quad \forall m \in A_R(t),\nonumber \\&amp;\quad {\varvec{a}}_m ^{\mathsf{T}}({\varvec{x}}_i + {\varvec{\epsilon }}) \le b_t + (1 + \epsilon _{\max })(1 - z_{it}),\quad i = 1, \ldots , n,~ \forall t \in \mathcal T_B, \quad \forall m \in A_L(t),\nonumber \\&amp;\quad \sum _{t \in \mathcal T_L} z_{it} = 1, \quad i = 1, \ldots , n,\nonumber \\&amp;\quad z_{it} \le l_t,\quad \forall t \in \mathcal T_L,\nonumber \\&amp;\quad \sum _{i = 1}^{n}z_{it} \ge N_{\min } l_t,\quad \forall t \in \mathcal T_L,\nonumber \\&amp;\quad \sum _{j = 1}^{p}a_{jt} = d_t,\quad \forall t \in \mathcal T_B,\nonumber \\&amp;\quad 0 \le b_t \le d_t, \quad \forall t \in \mathcal T_B, \nonumber \\&amp;\quad d_t \le d_{p(t)},\quad \forall t \in \mathcal T_B {\setminus } \{1\}, \nonumber \\&amp;\quad z_{it}, l_t \in \{0,1\}, \quad i = 1, \ldots , n, \quad \forall t \in \mathcal T_L,\nonumber \\&amp;\quad a_{jt}, d_t \in \{0,1\}, \quad j = 1, \ldots , p, \quad \forall t \in \mathcal T_B.\nonumber \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">
                    (24)
                </span></div></div><p data-dcnode-id="3575"><span data-dcnode-id="3588" instrument_node="">This model as presented is in a form that can be directly solved by any MIO solver. The difficulty of the model is primarily determined by the number of binary variables </span><span class="mathjax-tex" data-dcnode-id="3583"><span class="MathJax_Preview" data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">z_{it}</span></span></span><span data-dcnode-id="3582" instrument_node="">, which is </span><span class="mathjax-tex" data-dcnode-id="3577"><span class="MathJax_Preview" data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">n \cdot 2^D</span></span></span><span data-dcnode-id="3576" instrument_node="">. Empirically we observe that we can find high-quality solutions in minutes for depths up to 4 for datasets with thousands of points. Beyond this depth or dataset size, the rate of finding solutions is slower, and more time is required.</span></p><p data-dcnode-id="3555"><span data-dcnode-id="3574" instrument_node="">There are three hyper-parameters that need to be specified: the maximum depth </span><i data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">D</span></i><span data-dcnode-id="3571" instrument_node="">, the minimum leaf size </span><span class="mathjax-tex" data-dcnode-id="3566"><span class="MathJax_Preview" data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">N_{\min }</span></span></span><span data-dcnode-id="3565" instrument_node="">, and the complexity parameter </span><span class="mathjax-tex" data-dcnode-id="3560"><span class="MathJax_Preview" data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3559" instrument_node="">. We will present in Sect.&nbsp;</span><a data-dcnode-id="3557" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec6"><span data-dcnode-id="3558" instrument_node="">3</span></a><span data-dcnode-id="3556" instrument_node=""> effective methods for tuning these parameters in validation.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3553" id="Sec5"><span data-dcnode-id="3554" instrument_node="">Improving MIO performance using warm starts</span></h3><p data-dcnode-id="3545"><span data-dcnode-id="3552" instrument_node="">MIO solvers benefit greatly when supplied an integer-feasible solution as a </span><i data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">warm start</span></i><span data-dcnode-id="3549" instrument_node=""> for the solution process. Injecting a strong warm start solution before starting the solver greatly increases the speed with which the solver is able to generate strong feasible solutions&nbsp;(Bertsimas and Weismantel </span><a aria-label="Reference 2005" data-dcnode-id="3547" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d60465247e9016" title="Bertsimas, D., &amp; Weismantel, R. (2005). Optimization over integers. Belmont, MA: Dynamic Ideas."><span data-dcnode-id="3548" instrument_node="">2005</span></a><span data-dcnode-id="3546" instrument_node="">). The warm start provides a strong initial upper bound on the optimal solution that allows more of the search tree to be pruned, and it also provides a starting point for local search heuristics. The benefit realized increases with the quality of the warm start, so it is desirable to be able to quickly and heuristically find a strong integer-feasible solution before solving.</span></p><p data-dcnode-id="3525"><span data-dcnode-id="3544" instrument_node="">To demonstrate the effectiveness of warm starts, Fig.&nbsp;</span><a data-dcnode-id="3542" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3543" instrument_node="">3</span></a><span data-dcnode-id="3541" instrument_node=""> shows an example of the typical evolution of upper and lower bounds as we solve the MIO problem&nbsp;(</span><a data-dcnode-id="3539" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ24"><span data-dcnode-id="3540" instrument_node="">24</span></a><span data-dcnode-id="3538" instrument_node="">) for the optimal tree of depth 2 on the “Wine” dataset, which has </span><span class="mathjax-tex" data-dcnode-id="3533"><span class="MathJax_Preview" data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">n=178</span></span></span><span data-dcnode-id="3532" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="3527"><span class="MathJax_Preview" data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">p=13</span></span></span><span data-dcnode-id="3526" instrument_node="">. We see when no warm start is supplied, the upper bound decreases gradually until the eventual optimal solution is found after 270&nbsp;s. An additional 1360&nbsp;s are required to prove the optimality of this solution. When we inject a heuristic solution (in this case, the CART solution) as a warm start, the same optimal solution is found after just 105&nbsp;s, and it takes an additional 230&nbsp;s to prove optimality. The total time required to find and prove optimality in this example decreases by a factor of 5 when the warm start is added, and the time taken to find the optimal solution decreases by a factor of around 2.5, showing that using high-quality warm start solutions can have a significant effect on the MIO solution times. Additionally, we see that the optimal tree solution has an objective with roughly half the error of the CART warm start, showing that the CART solutions can indeed be far from optimality in-sample. Finally, we observe that the majority of the time is spent in proving that the solution is optimal. A proof of optimality is good to have for comparison to other methods, but is not necessarily required in practice when evaluating a classifier (note that other methods make no claims as to their optimality). It is therefore a reasonable option to terminate the solve early once the best solution has remained unchanged for some time, because this typically indicates the solution is indeed optimal or close to it, and proving optimality may take far more time.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3468" data-test="figure" data-title="Fig. 3" id="figure-3"><figure data-dcnode-id="3469"><figcaption data-dcnode-id="3522"><b class="c-article-section__figure-caption" data-dcnode-id="3523" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="3524" instrument_node="">Fig. 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3480"><div class="c-article-section__figure-item" data-dcnode-id="3517"><a class="c-article-section__figure-link" data-dcnode-id="3518" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/figures/3" rel="nofollow"><picture data-dcnode-id="3519"><source data-dcnode-id="3521" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10994-017-5633-9/MediaObjects/10994_2017_5633_Fig3_HTML.gif?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="3520" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10994-017-5633-9/MediaObjects/10994_2017_5633_Fig3_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3481" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="3482"><span data-dcnode-id="3516" instrument_node="">Comparison of </span><i data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">upper</span></i><span data-dcnode-id="3513" instrument_node=""> and </span><i data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">lower</span></i><span data-dcnode-id="3510" instrument_node=""> bound evolution while solving MIO problem&nbsp;(</span><a data-dcnode-id="3508" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ24"><span data-dcnode-id="3509" instrument_node="">24</span></a><span data-dcnode-id="3507" instrument_node="">) with and without warm starts for a tree of depth </span><span class="mathjax-tex" data-dcnode-id="3502"><span class="MathJax_Preview" data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">D=2</span></span></span><span data-dcnode-id="3501" instrument_node=""> for the Wine dataset with </span><span class="mathjax-tex" data-dcnode-id="3496"><span class="MathJax_Preview" data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">n=178</span></span></span><span data-dcnode-id="3495" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="3490"><span class="MathJax_Preview" data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">p=13</span></span></span><span data-dcnode-id="3489" instrument_node="">. </span><b data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">a</span></b><span data-dcnode-id="3486" instrument_node=""> Without warm start, </span><b data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">b</span></b><span data-dcnode-id="3483" instrument_node=""> with warm start</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3470"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="3471" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/figures/3" rel="nofollow"><span data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3472" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3473" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3474" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3477" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3476" fill-rule="evenodd"></path><span data-dcnode-id="3475" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3467" instrument_node="">
</span><p data-dcnode-id="3459"><span data-dcnode-id="3466" instrument_node="">We already have access to good heuristic methods for the MIO problem&nbsp;(</span><a data-dcnode-id="3464" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ24"><span data-dcnode-id="3465" instrument_node="">24</span></a><span data-dcnode-id="3463" instrument_node="">); we can use CART to generate these warm start solutions. Given a solution from CART, it is simple to construct a corresponding feasible solution to the MIO problem&nbsp;(</span><a data-dcnode-id="3461" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ24"><span data-dcnode-id="3462" instrument_node="">24</span></a><span data-dcnode-id="3460" instrument_node="">) using the splits from CART to infer the values of the remaining variables in the MIO problem.</span></p><p data-dcnode-id="3439"><span data-dcnode-id="3458" instrument_node="">By design, the parameters </span><span class="mathjax-tex" data-dcnode-id="3453"><span class="MathJax_Preview" data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">N_{\min }</span></span></span><span data-dcnode-id="3452" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="3447"><span class="MathJax_Preview" data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3446" instrument_node=""> have the same meaning in CART and in problem&nbsp;(</span><a data-dcnode-id="3444" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ24"><span data-dcnode-id="3445" instrument_node="">24</span></a><span data-dcnode-id="3443" instrument_node="">), so we can run CART with these parameters to generate a good solution. We must then prune the splits on the CART solution until it is below the maximum depth </span><i data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">D</span></i><span data-dcnode-id="3440" instrument_node=""> for the MIO problem to ensure it is feasible.</span></p><p data-dcnode-id="3425"><span data-dcnode-id="3438" instrument_node="">We can also use MIO solutions that we have previously generated as warm starts. In particular, if we have a solution generated for a depth </span><i data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">D</span></i><span data-dcnode-id="3435" instrument_node="">, this solution is a valid warm start for depth </span><span class="mathjax-tex" data-dcnode-id="3430"><span class="MathJax_Preview" data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">D+1</span></span></span><span data-dcnode-id="3429" instrument_node="">. This is important because the problem difficulty increases with the depth, so for larger depths it may be advantageous to run the MIO problem with a smaller depth to generate a strong warm start. This technique is used heavily in the validation procedure described in Sect.&nbsp;</span><a data-dcnode-id="3427" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec6"><span data-dcnode-id="3428" instrument_node="">3</span></a><span data-dcnode-id="3426" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="3083" data-title="Using optimal classification trees for classification"><div class="c-article-section" data-dcnode-id="3084" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3420" id="Sec6"><span data-dcnode-id="3421" instrument_node="">Using optimal classification trees for classification</span></h2><div class="c-article-section__content" data-dcnode-id="3085" id="Sec6-content"><p data-dcnode-id="3415"><span data-dcnode-id="3419" instrument_node="">In this section, we present the implementation details of a full algorithm for training a decision tree classifier using the OCT MIO problem from Sect.&nbsp;</span><a data-dcnode-id="3417" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="3418" instrument_node="">2</span></a><span data-dcnode-id="3416" instrument_node="">. In particular, we devise a procedure for effectively tuning the values of the hyperparameters of this model.</span></p><p data-dcnode-id="3401"><span data-dcnode-id="3414" instrument_node="">The most important parameter to choose is the maximum depth of the tree </span><i data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">D</span></i><span data-dcnode-id="3411" instrument_node="">. As discussed in Sect.&nbsp;</span><a data-dcnode-id="3409" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="3410" instrument_node="">2</span></a><span data-dcnode-id="3408" instrument_node="">, the depth has a very large effect on the difficulty of the resulting problem, and it is advantageous to reuse solutions from lower depths as warm starts for the higher-depth problems. To take advantage of this, we will specify a maximum depth </span><span class="mathjax-tex" data-dcnode-id="3403"><span class="MathJax_Preview" data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">D_{\max }</span></span></span><span data-dcnode-id="3402" instrument_node="">, and start building trees from depth 2 up to this maximum depth, maintaining a pool of possible warm start solutions.</span></p><p data-dcnode-id="3393"><span data-dcnode-id="3400" instrument_node="">We also have to tune the value of the complexity parameter </span><span class="mathjax-tex" data-dcnode-id="3395"><span class="MathJax_Preview" data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3394" instrument_node="">. Recall that the objective is given by</span></p><div class="c-article-equation" data-dcnode-id="3384" id="Equ25"><div class="c-article-equation__content" data-dcnode-id="3387"><span class="mathjax-tex" data-dcnode-id="3388"><span class="MathJax_Preview" data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">\begin{aligned} \min \quad \frac{1}{\hat{L}} \sum _{t \in \mathcal T_L}L_t + \alpha \sum _{t \in \mathcal T_B}d_t. \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">
                    (25)
                </span></div></div><p data-dcnode-id="3364"><span data-dcnode-id="3383" instrument_node="">It is hard to tune the value of the continuous-valued parameter </span><span class="mathjax-tex" data-dcnode-id="3378"><span class="MathJax_Preview" data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3377" instrument_node="">. A typical approach would be to discretize the search space and test each value. In our case, this would involve solving the MIO problem for each value, which is expensive. Additionally, multiple values of </span><span class="mathjax-tex" data-dcnode-id="3372"><span class="MathJax_Preview" data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3371" instrument_node=""> might give the same solution which would mean that solving these problems was unnecessary. Ideally we could simply search over the “critical” values of </span><span class="mathjax-tex" data-dcnode-id="3366"><span class="MathJax_Preview" data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3365" instrument_node=""> that would lead to different solutions, minimizing the number of MIO problems that need to be solved.</span></p><p data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">Observe that the penalty term can be rewritten into constraint form as follows:</span></p><div class="c-article-equation" data-dcnode-id="3355" id="Equ31"><div class="c-article-equation__content" data-dcnode-id="3356"><span class="mathjax-tex" data-dcnode-id="3357"><span class="MathJax_Preview" data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">\begin{aligned} \min&amp;\quad \frac{1}{\hat{L}} \sum _{t \in \mathcal T_L}L_t\\ \text {s.t.}&amp;\quad \sum _{t \in \mathcal T_B}d_t \le C, \end{aligned}</span></span></span></div></div><p data-dcnode-id="3344"><span data-dcnode-id="3354" instrument_node="">where </span><i data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">C</span></i><span data-dcnode-id="3351" instrument_node=""> is some constant corresponding to the value of </span><span class="mathjax-tex" data-dcnode-id="3346"><span class="MathJax_Preview" data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3345" instrument_node="">.</span></p><p data-dcnode-id="3318"><span data-dcnode-id="3343" instrument_node="">Note that the term in this constraint is the number of splits in the model and is integer-valued. This means we need only test values of </span><i data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">C</span></i><span data-dcnode-id="3340" instrument_node=""> that are integral. We can therefore search over </span><span class="mathjax-tex" data-dcnode-id="3335"><span class="MathJax_Preview" data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">C = 1, \ldots , C_{\max }</span></span></span><span data-dcnode-id="3334" instrument_node=""> to generate the entire range of possible solutions, where </span><span class="mathjax-tex" data-dcnode-id="3329"><span class="MathJax_Preview" data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">C_{\max } = 2^D-1</span></span></span><span data-dcnode-id="3328" instrument_node=""> is the maximum number of possible splits in the solution. Additionally, a solution to the problem for </span><i data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">C</span></i><span data-dcnode-id="3325" instrument_node=""> is a feasible warm start solution for the problem at </span><span class="mathjax-tex" data-dcnode-id="3320"><span class="MathJax_Preview" data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">C+1</span></span></span><span data-dcnode-id="3319" instrument_node="">, so the solutions generated during this search can be stored and reused during the remaining search.</span></p><p data-dcnode-id="3295"><span data-dcnode-id="3317" instrument_node="">It can happen that the solution for a particular value of </span><i data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">C</span></i><span data-dcnode-id="3314" instrument_node=""> is not actually an optimal solution to the original problem&nbsp;(</span><a data-dcnode-id="3312" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ24"><span data-dcnode-id="3313" instrument_node="">24</span></a><span data-dcnode-id="3311" instrument_node="">) for any value of </span><span class="mathjax-tex" data-dcnode-id="3306"><span class="MathJax_Preview" data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3305" instrument_node="">. This means it is dominated by solutions for other values of </span><i data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">C</span></i><span data-dcnode-id="3302" instrument_node="">. Such solutions can be removed in a post-processing step to ensure that only solutions optimal for the original problem for any value of </span><span class="mathjax-tex" data-dcnode-id="3297"><span class="MathJax_Preview" data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3296" instrument_node=""> remain.</span></p><p data-dcnode-id="3275"><span data-dcnode-id="3294" instrument_node="">Given this set of optimal solutions for each value of </span><i data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">C</span></i><span data-dcnode-id="3291" instrument_node="">, we evaluate each on a validation set and identify the solution that performs best. We can then calculate the interval for </span><span class="mathjax-tex" data-dcnode-id="3286"><span class="MathJax_Preview" data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3285" instrument_node=""> in which this solution is the minimizer for problem&nbsp;(</span><a data-dcnode-id="3283" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ24"><span data-dcnode-id="3284" instrument_node="">24</span></a><span data-dcnode-id="3282" instrument_node="">). We use the midpoint of this interval as the final tuned value for </span><span class="mathjax-tex" data-dcnode-id="3277"><span class="MathJax_Preview" data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3276" instrument_node="">. In case of a tie, we take the union of the intervals for all such solutions and take the midpoint of this union interval.</span></p><p data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">An overview of the complete process for tuning the parameters using a validation set follows:</span></p><ol class="u-list-style-none" data-dcnode-id="3117"><span data-dcnode-id="3272" instrument_node="">
</span><li data-dcnode-id="3252"><span data-dcnode-id="3271" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">1.</span></span><span data-dcnode-id="3268" instrument_node="">
</span><p data-dcnode-id="3254"><span data-dcnode-id="3267" instrument_node="">Set the maximal depth for the MIO problem, </span><span class="mathjax-tex" data-dcnode-id="3262"><span class="MathJax_Preview" data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">D_{\max }</span></span></span><span data-dcnode-id="3261" instrument_node="">, and the minimum leaf size </span><span class="mathjax-tex" data-dcnode-id="3256"><span class="MathJax_Preview" data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">N_{\min }</span></span></span><span data-dcnode-id="3255" instrument_node="">.</span></p><span data-dcnode-id="3253" instrument_node="">
</span></li><span data-dcnode-id="3251" instrument_node="">
</span><li data-dcnode-id="3158"><span data-dcnode-id="3250" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">2.</span></span><span data-dcnode-id="3247" instrument_node="">
</span><p data-dcnode-id="3239"><span data-dcnode-id="3246" instrument_node="">For </span><span class="mathjax-tex" data-dcnode-id="3241"><span class="MathJax_Preview" data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">D = 1, \ldots , D_{\max }</span></span></span><span data-dcnode-id="3240" instrument_node="">:</span></p><ol class="u-list-style-none" data-dcnode-id="3160"><span data-dcnode-id="3238" instrument_node="">
</span><li data-dcnode-id="3162"><span data-dcnode-id="3237" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">(a)</span></span><span data-dcnode-id="3234" instrument_node="">
</span><p data-dcnode-id="3226"><span data-dcnode-id="3233" instrument_node="">For </span><span class="mathjax-tex" data-dcnode-id="3228"><span class="MathJax_Preview" data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">C = 1, \ldots , 2^D-1</span></span></span><span data-dcnode-id="3227" instrument_node="">:</span></p><ol class="u-list-style-none" data-dcnode-id="3164"><span data-dcnode-id="3225" instrument_node="">
</span><li data-dcnode-id="3199"><span data-dcnode-id="3224" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">i.</span></span><span data-dcnode-id="3221" instrument_node="">
</span><p data-dcnode-id="3201"><span data-dcnode-id="3220" instrument_node="">Run CART using </span><span class="mathjax-tex" data-dcnode-id="3215"><span class="MathJax_Preview" data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">N_{\min }</span></span></span><span data-dcnode-id="3214" instrument_node=""> with </span><span class="mathjax-tex" data-dcnode-id="3209"><span class="MathJax_Preview" data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">\alpha =0</span></span></span><span data-dcnode-id="3208" instrument_node="">. Trim the solution to depth </span><i data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">D</span></i><span data-dcnode-id="3205" instrument_node=""> and to a maximum of </span><i data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">C</span></i><span data-dcnode-id="3202" instrument_node=""> splits.</span></p><span data-dcnode-id="3200" instrument_node="">
</span></li><span data-dcnode-id="3198" instrument_node="">
</span><li data-dcnode-id="3190"><span data-dcnode-id="3197" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">ii.</span></span><span data-dcnode-id="3194" instrument_node="">
</span><p data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">Search through pool of candidate warm starts (including CART) and choose the one with the lowest error.</span></p><span data-dcnode-id="3191" instrument_node="">
</span></li><span data-dcnode-id="3189" instrument_node="">
</span><li data-dcnode-id="3175"><span data-dcnode-id="3188" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">iii.</span></span><span data-dcnode-id="3185" instrument_node="">
</span><p data-dcnode-id="3177"><span data-dcnode-id="3184" instrument_node="">Solve MIO problem for depth </span><i data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">D</span></i><span data-dcnode-id="3181" instrument_node=""> and </span><i data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">C</span></i><span data-dcnode-id="3178" instrument_node=""> splits using the selected warm start.</span></p><span data-dcnode-id="3176" instrument_node="">
</span></li><span data-dcnode-id="3174" instrument_node="">
</span><li data-dcnode-id="3166"><span data-dcnode-id="3173" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">iv.</span></span><span data-dcnode-id="3170" instrument_node="">
</span><p data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">Add the MIO solution to the warm start pool.</span></p><span data-dcnode-id="3167" instrument_node="">
</span></li><span data-dcnode-id="3165" instrument_node="">
</span></ol><span data-dcnode-id="3163" instrument_node="">
</span></li><span data-dcnode-id="3161" instrument_node="">
</span></ol><span data-dcnode-id="3159" instrument_node="">
</span></li><span data-dcnode-id="3157" instrument_node="">
</span><li data-dcnode-id="3140"><span data-dcnode-id="3156" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">3.</span></span><span data-dcnode-id="3153" instrument_node="">
</span><p data-dcnode-id="3142"><span data-dcnode-id="3152" instrument_node="">Post-process the solution pool to remove all solutions that are not optimal to&nbsp;(</span><a data-dcnode-id="3150" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ24"><span data-dcnode-id="3151" instrument_node="">24</span></a><span data-dcnode-id="3149" instrument_node="">) for any value of </span><span class="mathjax-tex" data-dcnode-id="3144"><span class="MathJax_Preview" data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3143" instrument_node="">.</span></p><span data-dcnode-id="3141" instrument_node="">
</span></li><span data-dcnode-id="3139" instrument_node="">
</span><li data-dcnode-id="3119"><span data-dcnode-id="3138" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">4.</span></span><span data-dcnode-id="3135" instrument_node="">
</span><p data-dcnode-id="3121"><span data-dcnode-id="3134" instrument_node="">Identify the best performing solution on a validation set, and the range of </span><span class="mathjax-tex" data-dcnode-id="3129"><span class="MathJax_Preview" data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3128" instrument_node=""> for which this solution is optimal. Use the midpoint of this interval as the tuned value of </span><span class="mathjax-tex" data-dcnode-id="3123"><span class="MathJax_Preview" data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">\alpha </span></span></span><span data-dcnode-id="3122" instrument_node="">.</span></p><span data-dcnode-id="3120" instrument_node="">
</span></li><span data-dcnode-id="3118" instrument_node="">
</span></ol><p data-dcnode-id="3094"><span data-dcnode-id="3116" instrument_node="">We have not addressed how to tune the value of </span><span class="mathjax-tex" data-dcnode-id="3111"><span class="MathJax_Preview" data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">N_{\min }</span></span></span><span data-dcnode-id="3110" instrument_node=""> as this was not required for the computational experiments in Sect.&nbsp;</span><a data-dcnode-id="3108" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec12"><span data-dcnode-id="3109" instrument_node="">6</span></a><span data-dcnode-id="3107" instrument_node="">. In theory it would be simple to use a similar approach for reusing solutions as warm starts by noting that a solution for a value of </span><span class="mathjax-tex" data-dcnode-id="3102"><span class="MathJax_Preview" data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">N_{\min }</span></span></span><span data-dcnode-id="3101" instrument_node=""> is also valid for any smaller value of this parameter. In this way, it would be best to search over the </span><span class="mathjax-tex" data-dcnode-id="3096"><span class="MathJax_Preview" data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">N_{\min }</span></span></span><span data-dcnode-id="3095" instrument_node=""> values in reverse order, and this could be carried out as the outermost loop in the search procedure.</span></p><p data-dcnode-id="3086"><span data-dcnode-id="3093" instrument_node="">Having tuned the parameter values using the training and validation sets, we proceed to use these parameters to train a final tree on the combined training and validation sets. Following a similar procedure as in the validation, we use solutions from lower depths to warm start higher depths. For each depth </span><span class="mathjax-tex" data-dcnode-id="3088"><span class="MathJax_Preview" data-dcnode-id="3091"><span data-dcnode-id="3092" inst
