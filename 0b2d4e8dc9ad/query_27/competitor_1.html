</span><p data-dcnode-id="2200"><span data-dcnode-id="2207" instrument_node="">In Table&nbsp;</span><a data-dcnode-id="2205" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab8"><span data-dcnode-id="2206" instrument_node="">8</span></a><span data-dcnode-id="2204" instrument_node="">, we present the number of datasets for which each method performed strongest, broken down by the maximum depth of the trees. We see that at all depths, OCT is stronger on roughly twice as many datasets as CART. This table also shows the mean difference between the out-of-sample accuracies of each method across all datasets at each depth, along with the </span><i data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">p</span></i><span data-dcnode-id="2201" instrument_node=""> value indicating the statistical significance of this difference. We see that the OCT trees have a higher accuracy of around 0.5–2% at all depths, and that this difference is statistically significant for all depths. The largest difference is at depth 2, and at depths 3 and 4 this difference is smaller, but still significant both statistically and in magnitude. The result at depth 2 shows there is scope for OCT to significantly outperform CART by a large margin. We believe the smaller differences at higher depths can be attributed to the MIO problems being harder to solve, and so less progress is being made at these depths for the same time limit. Another explanation is that the natural advantage we would expect optimal methods to have over CART is less pronounced at higher depths, but this runs contrary to intuition which would suggest that larger trees have more scope for optimization than shallower ones.</span></p><p data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">Note that even at depth 1, a significant difference is present between the methods, which is simply the effect of using the misclassification score to select the best split as opposed to an impurity measure.</span></p><p data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">We have established that OCT is more likely to outperform CART, and has a small yet significant gain in out-of-sample accuracy across the collection of datasets. Next, we will consider the relative performance of the methods according to characteristics of the dataset in order to identify the types of problems where each method is more likely to outperform the other.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2181" data-test="inline-table" id="table-9"><figure data-dcnode-id="2182"><figcaption class="c-article-table__figcaption" data-dcnode-id="2193"><b data-dcnode-id="2194" data-test="table-caption" id="Tab9"><span data-dcnode-id="2195" instrument_node="">Table 9 Breakdown of results according to the accuracy of CART on the dataset and the maximum depth of the trees</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2183"><a aria-label="Full size table 9" class="c-article__pill-button" data-dcnode-id="2184" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/tables/9" rel="nofollow"><span data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2185" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2186" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2187" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2190" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2189" fill-rule="evenodd"></path><span data-dcnode-id="2188" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2179" instrument_node="">Table&nbsp;</span><a data-dcnode-id="2177" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab9"><span data-dcnode-id="2178" instrument_node="">9</span></a><span data-dcnode-id="2176" instrument_node=""> presents a comparison of OCT against CART as a function of the accuracy of CART. We can see OCT consistently has an edge when the CART accuracy is above 80% or below 60%. The win rates in these areas also favor OCT. In the region where CART accuracy is 60–80%, the results are mixed with no clear winner at the higher depths. The main conclusion of this comparison is that OCT is able to consistently deliver improvements in accuracy when CART performs either well or poorly. To understand this, it seems that a high CART accuracy indicates that axis-aligned decision tree methods are well-suited to the dataset in question, which means solving the problem using MIO is more likely to lead to better decision trees with higher accuracy on the problem. Conversely, when CART performs very poorly, it may be the result of bad decisions in the trees that OCT can avoid. However, when the CART accuracy is in the middle, it could indicate that CART is hitting the limit of what is possible for a decision tree method and so the benefits of a stronger decision tree in-sample are not realized out-of-sample.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2142" data-test="figure" data-title="Fig. 4" id="figure-4"><figure data-dcnode-id="2143"><figcaption data-dcnode-id="2172"><b class="c-article-section__figure-caption" data-dcnode-id="2173" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="2174" instrument_node="">Fig. 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2154"><div class="c-article-section__figure-item" data-dcnode-id="2167"><a class="c-article-section__figure-link" data-dcnode-id="2168" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/figures/4" rel="nofollow"><picture data-dcnode-id="2169"><source data-dcnode-id="2171" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10994-017-5633-9/MediaObjects/10994_2017_5633_Fig4_HTML.gif?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="2170" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10994-017-5633-9/MediaObjects/10994_2017_5633_Fig4_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2155" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="2156"><span data-dcnode-id="2166" instrument_node="">Plot of winning method (CART vs. OCT) by the accuracy of CART and the ratio of the number of points to the dimension of points, </span><i data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">n</span></i><span data-dcnode-id="2163" instrument_node="">&nbsp;/&nbsp;</span><i data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">p</span></i><span data-dcnode-id="2160" instrument_node="">, in each dataset for trees of depth 2. The high-performance where OCT is highly likely to perform strongest is indicated by the </span><i data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">dashed lines</span></i><span data-dcnode-id="2157" instrument_node="">
</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2144"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="2145" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/figures/4" rel="nofollow"><span data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2146" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2147" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2148" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2151" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2150" fill-rule="evenodd"></path><span data-dcnode-id="2149" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2124"><span data-dcnode-id="2140" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="2138" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="2139" instrument_node="">4</span></a><span data-dcnode-id="2137" instrument_node=""> shows the winning method for trees of depth 2 plotted according to the accuracy of CART and the ratio of </span><i data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">n</span></i><span data-dcnode-id="2134" instrument_node=""> and </span><i data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">p</span></i><span data-dcnode-id="2131" instrument_node="">. We see that the top-left corner has a very high concentration of OCT wins, and this pattern is present in both the depth 3 and 4 plots as well so they are omitted for brevity. The dashed lines on the plot indicate a region of high OCT performance, which are those datasets with CART error below 20% and </span><i data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">n</span></i><span data-dcnode-id="2128" instrument_node="">&nbsp;/&nbsp;</span><i data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">p</span></i><span data-dcnode-id="2125" instrument_node=""> over 10. This region was determined by looking at the results collectively across all depths.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2109" data-test="inline-table" id="table-10"><figure data-dcnode-id="2110"><figcaption class="c-article-table__figcaption" data-dcnode-id="2121"><b data-dcnode-id="2122" data-test="table-caption" id="Tab10"><span data-dcnode-id="2123" instrument_node="">Table 10 Breakdown of results according to whether the dataset is in the region of high-performance and the maximum depth of the trees</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2111"><a aria-label="Full size table 10" class="c-article__pill-button" data-dcnode-id="2112" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/tables/10" rel="nofollow"><span data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2113" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2114" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2115" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2118" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2117" fill-rule="evenodd"></path><span data-dcnode-id="2116" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2103"><span data-dcnode-id="2107" instrument_node="">Table&nbsp;</span><a data-dcnode-id="2105" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab10"><span data-dcnode-id="2106" instrument_node="">10</span></a><span data-dcnode-id="2104" instrument_node=""> summarizes the results for each depth according to whether they are in this region of high performance. We see that in the regions of high performance, OCT is almost always the winning method if there is a winner, and the average improvement for OCT is consistently around 1.2–1.3%. For the datasets that are not in this region, the results are more mixed and there is no clear winner, although at depth 2 there is a large difference of 2.2% between the accuracies of CART and OCT, and in all other cases OCT has a slight accuracy advantage.</span></p><p data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">This breakdown suggests that we can predict with high probability that OCT is very likely to outperform CART if the following expression is true:</span></p><div class="c-article-equation" data-dcnode-id="2094" id="Equ39"><div class="c-article-equation__content" data-dcnode-id="2095"><span class="mathjax-tex" data-dcnode-id="2096"><span class="MathJax_Preview" data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">\begin{aligned} (\text {CART accuracy} \ge 80\%) \wedge (n/p \ge 10) \end{aligned}</span></span></span></div></div><p data-dcnode-id="2083"><span data-dcnode-id="2093" instrument_node="">This rule makes sense intuitively, as datasets where CART performs well are likely those which are well suited to decision tree models, which means that creating these trees optimally could well lead to better performance, whereas this may not be as likely if tree models are a poor fit to the data. Additionally, if </span><span class="mathjax-tex" data-dcnode-id="2088"><span class="MathJax_Preview" data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">n \gg p</span></span></span><span data-dcnode-id="2087" instrument_node="">, this suggests we have enough data relative to the number of possible splits to learn a good tree without overfitting, echoing the results of the second synthetic test in Sect.&nbsp;</span><a data-dcnode-id="2085" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec11"><span data-dcnode-id="2086" instrument_node="">5</span></a><span data-dcnode-id="2084" instrument_node="">.</span></p><p data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">The other key takeaway is that if we are not in this region, there is no indication of any ill-effects; the results outside this region are balanced, and there is even a slight edge towards optimal trees.</span></p><p data-dcnode-id="2073"><span data-dcnode-id="2080" instrument_node="">Based on the strength of these results, this partitioning based on </span><i data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">n</span></i><span data-dcnode-id="2077" instrument_node="">&nbsp;/&nbsp;</span><i data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">p</span></i><span data-dcnode-id="2074" instrument_node=""> and CART accuracy should provide a highly accurate and useful guide for when OCT are likely to yield accuracy improvements on real-world problems.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2071" id="Sec15"><span data-dcnode-id="2072" instrument_node="">Optimal classification trees with hyperplanes versus CART</span></h3><p data-dcnode-id="2063"><span data-dcnode-id="2070" instrument_node="">We now present a comparison of out-of-sample accuracies between OCT-H and CART. Recall that after formulating the OCT problem using MIO, we were able to easily obtain the OCT-H problem by relaxing integrality constraints on the split variables </span><span class="mathjax-tex" data-dcnode-id="2065"><span class="MathJax_Preview" data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">{\varvec{a}}</span></span></span><span data-dcnode-id="2064" instrument_node="">. This comparison aims to examine the possible accuracy gains from first formulating the problem using MIO and then relaxing a subset of difficult constraints to generate a model that is simpler to solve.</span></p><p data-dcnode-id="2055"><span data-dcnode-id="2062" instrument_node="">The entire set of mean out-of-sample accuracies on each dataset for both methods at depth 2 is provided in Table&nbsp;</span><a data-dcnode-id="2060" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab11"><span data-dcnode-id="2061" instrument_node="">11</span></a><span data-dcnode-id="2059" instrument_node="">, which again reports the size and dimension of the dataset, the number of classes </span><i data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">K</span></i><span data-dcnode-id="2056" instrument_node="">, and the average out-of-sample accuracy of each method along with the mean improvement of OCT-H over CART and the associated standard error (results for depths 1, 3 and 4 are provided in Appendix&nbsp;2).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2040" data-test="inline-table" id="table-11"><figure data-dcnode-id="2041"><figcaption class="c-article-table__figcaption" data-dcnode-id="2052"><b data-dcnode-id="2053" data-test="table-caption" id="Tab11"><span data-dcnode-id="2054" instrument_node="">Table 11 Full results for CART and OCT-H at depth 2</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2042"><a aria-label="Full size table 11" class="c-article__pill-button" data-dcnode-id="2043" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/tables/11" rel="nofollow"><span data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2044" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2045" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2046" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2049" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2048" fill-rule="evenodd"></path><span data-dcnode-id="2047" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2039" instrument_node="">
</span><div class="c-article-table" data-container-section="table" data-dcnode-id="2021" data-test="inline-table" id="table-12"><figure data-dcnode-id="2022"><figcaption class="c-article-table__figcaption" data-dcnode-id="2033"><b data-dcnode-id="2034" data-test="table-caption" id="Tab12"><span data-dcnode-id="2038" instrument_node="">Table 12 Comparison of CART and OCT-H across a range of depths, showing the number of datasets for which each method had the highest out-of-sample accuracy, and the mean improvement in out-of-sample accuracy when using OCT-H across all datasets along with the </span><i data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">p</span></i><span data-dcnode-id="2035" instrument_node=""> value indicating the statistical significance of this difference</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2023"><a aria-label="Full size table 12" class="c-article__pill-button" data-dcnode-id="2024" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/tables/12" rel="nofollow"><span data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2025" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2026" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2027" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2030" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2029" fill-rule="evenodd"></path><span data-dcnode-id="2028" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2019" instrument_node="">Table&nbsp;</span><a data-dcnode-id="2017" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab12"><span data-dcnode-id="2018" instrument_node="">12</span></a><span data-dcnode-id="2016" instrument_node=""> shows a summary of the relative performance of CART and OCT-H according to the depth of the trees. We see that at all depths, OCT is stronger than CART on the vast majority of datasets. OCT-H also gives a significant increase of 3–5% in out-of-sample accuracy compared to CART across all datasets, depending on the tree depth. The corresponding </span><i data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">p</span></i><span data-dcnode-id="2013" instrument_node=""> values confirm this difference to be highly significant statistically. We believe the smaller differences at higher depths can be attributed to the MIO problems being harder to solve, and so less progress is being made at these depths for the same time limit. Similar to the OCT comparison, the advantage of OCT-H over CART decreases as the depth of the trees increases. This could be due to the increasing difficulty of the problems as the depth increases as for OCT, but it may also be the case that most of the accuracy advantage from multivariate decision trees can be realized with shallower trees, and so the advantages of deeper trees are less pronounced, allowing CART to reduce the accuracy gap with increasing depth.</span></p><p data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Unlike the OCT versus CART comparison, the depth 1 difference here is very significant because multivariate trees of depth 1 can still use multiple variables in the splits, and this leads to a very significant mean improvement of around 5%.</span></p><p data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">As we did for OCT, we will now consider the influence of problem characteristics on the performance of the OCT-H.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1993" data-test="inline-table" id="table-13"><figure data-dcnode-id="1994"><figcaption class="c-article-table__figcaption" data-dcnode-id="2005"><b data-dcnode-id="2006" data-test="table-caption" id="Tab13"><span data-dcnode-id="2007" instrument_node="">Table 13 Breakdown of results according to the accuracy of CART on the dataset and the maximum depth of the trees</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1995"><a aria-label="Full size table 13" class="c-article__pill-button" data-dcnode-id="1996" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/tables/13" rel="nofollow"><span data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1997" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1998" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1999" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2002" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2001" fill-rule="evenodd"></path><span data-dcnode-id="2000" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1992" instrument_node="">
</span><p data-dcnode-id="1987"><span data-dcnode-id="1991" instrument_node="">Table&nbsp;</span><a data-dcnode-id="1989" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab13"><span data-dcnode-id="1990" instrument_node="">13</span></a><span data-dcnode-id="1988" instrument_node=""> compares OCT-H to CART broken down by the accuracy of CART. Unlike OCT, we see that OCT-H improves significantly upon CART accuracy in each group, with the most significant gains coming from the datasets where CART is weakest (below 80%), showing average improvements of 5–10%. As the CART accuracy increases, the improvement offered by OCT-H decreases, but they still have an advantage even at the highest CART accuracies. This indicates that multivariate trees are able to exploit problem structure in a way that univariate trees cannot, and this exploitation is most beneficial when univariate decision trees perform poorly.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1957" data-test="figure" data-title="Fig. 5" id="figure-5"><figure data-dcnode-id="1958"><figcaption data-dcnode-id="1984"><b class="c-article-section__figure-caption" data-dcnode-id="1985" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="1986" instrument_node="">Fig. 5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1969"><div class="c-article-section__figure-item" data-dcnode-id="1979"><a class="c-article-section__figure-link" data-dcnode-id="1980" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/figures/5" rel="nofollow"><picture data-dcnode-id="1981"><source data-dcnode-id="1983" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10994-017-5633-9/MediaObjects/10994_2017_5633_Fig5_HTML.gif?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="1982" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10994-017-5633-9/MediaObjects/10994_2017_5633_Fig5_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1970" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="1971"><span data-dcnode-id="1978" instrument_node="">Plot of winning method (CART vs. OCT-H) by the accuracy of CART and the dimension of points, </span><i data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">p</span></i><span data-dcnode-id="1975" instrument_node="">, in each dataset for trees of depth 2. The high-performance where OCT-H is highly likely to perform strongest is indicated by the </span><i data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">dashed lines</span></i><span data-dcnode-id="1972" instrument_node="">
</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1959"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="1960" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/figures/5" rel="nofollow"><span data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1961" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1962" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1963" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1966" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1965" fill-rule="evenodd"></path><span data-dcnode-id="1964" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1951"><span data-dcnode-id="1955" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="1953" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="1954" instrument_node="">5</span></a><span data-dcnode-id="1952" instrument_node=""> shows the winning method for each dataset as a function of the CART accuracy on each dataset and the number of features in the data. As we did for OCT, we can identify a region where OCT-H is highly likely to outperform CART. Like OCT, we have considered the results for all depths when identifying this region but the plots for other depths show similar patterns and are omitted. We see that this region of high-performance is when either the CART accuracy is low or the number of features is low, with the following test determining membership of the region:</span></p><div class="c-article-equation" data-dcnode-id="1944" id="Equ40"><div class="c-article-equation__content" data-dcnode-id="1945"><span class="mathjax-tex" data-dcnode-id="1946"><span class="MathJax_Preview" data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">\begin{aligned} (\text {CART Accuracy} \le 70\%) \vee (p \le 10) \end{aligned}</span></span></span></div></div><span data-dcnode-id="1943" instrument_node="">
</span><div class="c-article-table" data-container-section="table" data-dcnode-id="1928" data-test="inline-table" id="table-14"><figure data-dcnode-id="1929"><figcaption class="c-article-table__figcaption" data-dcnode-id="1940"><b data-dcnode-id="1941" data-test="table-caption" id="Tab14"><span data-dcnode-id="1942" instrument_node="">Table 14 Breakdown of results according to whether the dataset is in the region of high-performance and the maximum depth of the trees</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1930"><a aria-label="Full size table 14" class="c-article__pill-button" data-dcnode-id="1931" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/tables/14" rel="nofollow"><span data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1932" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1933" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1934" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1937" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1936" fill-rule="evenodd"></path><span data-dcnode-id="1935" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1926" instrument_node="">Table&nbsp;</span><a data-dcnode-id="1924" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab14"><span data-dcnode-id="1925" instrument_node="">14</span></a><span data-dcnode-id="1923" instrument_node=""> shows the relative performance of the methods in each of the regions. We see that in terms of the win rate, OCT-H is highly likely to deliver significant out-of-sample accuracy improvements on datasets that fall into the high-performance region, and in this region the average accuracy improvement over CART is 4–7% depending on depth. Outside the region, OCT-H is still likely to beat CART, but less so than in the region, and the average accuracy improvment is 2–3%. We have already addressed why OCT-H is likely to do well when the CART accuracy is poor, but these results also suggest that OCT-H performs better when the dimension of the data is small. We presume that this may be because there are fewer possible hyperplane splits to consider and so the feasible space for the problem is smaller, allowing better solutions to be found faster.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1920" id="Sec16"><span data-dcnode-id="1921" instrument_node="">Optimal classification trees versus Random Forests</span></h3><p data-dcnode-id="1915"><span data-dcnode-id="1919" instrument_node="">We conclude our experiments on real-world datasets by providing a brief comparison with Random Forests&nbsp;(Breiman </span><a aria-label="Reference 2001" data-dcnode-id="1917" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d60465247e47602" title="Breiman, L. (2001). Random forests. Machine Learning, 45(1), 5–32."><span data-dcnode-id="1918" instrument_node="">2001</span></a><span data-dcnode-id="1916" instrument_node="">). Random Forests achieve state-of-the-art accuracies, and so this allows us to place our results in a wider context. We would like to note that our goal in developing these methods was not necessarily to develop the best classification method overall; rather, we intended to show the benefits of taking a problem that is traditionally solved by a heuristic and instead solving this problem to optimality. Nevertheless, these comparisons help to quantify the significance of the improvements in accuracy.</span></p><p data-dcnode-id="1904"><span data-dcnode-id="1914" instrument_node="">We ran Random Forests on all datasets using the </span><span class="u-small-caps" data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">randomForest</span></span><span data-dcnode-id="1911" instrument_node=""> package&nbsp;(Liaw and Wiener </span><a aria-label="Reference 2002" data-dcnode-id="1909" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d60465247e47611" title="Liaw, A., &amp; Wiener, M. (2002). Classification and regression by randomforest. R News, 2(3), 18–22. 
                    http://CRAN.R-project.org/doc/Rnews/
                    
                  ."><span data-dcnode-id="1910" instrument_node="">2002</span></a><span data-dcnode-id="1908" instrument_node="">) in </span><span class="u-sans-serif" data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">R</span></span><span data-dcnode-id="1905" instrument_node="">, using the same training, validation and testing splits as the other methods. The Random Forests do not require any tuning, so they were trained on the combined training and validation sets and then evaluated on the testing set. This was averaged over five splits as for the other methods. The forests were trained with 100 trees.</span></p><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">The average accuracy of Random Forests across all 53 datasets was 85.8%, which is about 6, 5 and 3% higher than CART, OCT and OCT-H at depth 4, respectively. We see that across all datasets, OCT closes the gap between CART and Random Forests by about one-sixth, and OCT-H by about half. We believe this demonstrates the significance of our accuracy improvements when measured against the improvement offered by Random Forests.</span></p><p data-dcnode-id="1876"><span data-dcnode-id="1901" instrument_node="">We found that Random Forests performed strongest relative to OCT-H on datasets with a high number of classes, </span><i data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">K</span></i><span data-dcnode-id="1898" instrument_node="">, or features, </span><i data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">p</span></i><span data-dcnode-id="1895" instrument_node="">. If we consider only datasets with </span><span class="mathjax-tex" data-dcnode-id="1890"><span class="MathJax_Preview" data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">K=2</span></span></span><span data-dcnode-id="1889" instrument_node=""> or </span><span class="mathjax-tex" data-dcnode-id="1884"><span class="MathJax_Preview" data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">K=3</span></span></span><span data-dcnode-id="1883" instrument_node=""> classes, and </span><span class="mathjax-tex" data-dcnode-id="1878"><span class="MathJax_Preview" data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">p \le 25</span></span></span><span data-dcnode-id="1877" instrument_node="">, we find that OCT-H and Random Forests are comparable in accuracy, with average out-of-sample accuracies of 85.2 and 85.1%, respectively. We can therefore achieve state-of-the-art accuracies in this regime with just a single tree learner, allowing us to maintain some interpretability in the model, albeit less than an axis-aligned tree, but still much more than a forest. We note that 31 of the datasets we considered fall into this regime, so we do not believe it is a restrictive setting.</span></p><p data-dcnode-id="1868"><span data-dcnode-id="1875" instrument_node="">Finally, we note that we did not tune the value of </span><span class="mathjax-tex" data-dcnode-id="1870"><span class="MathJax_Preview" data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">N_{\min }</span></span></span><span data-dcnode-id="1869" instrument_node=""> in our experiments, nor did we consider other improvements to the original OCT problem that could improve accuracy. With the right selection of model and parameters, we believe it is possible to train a single decision tree learner that has the accuracy of a random forest without sacrificing interpretability, which would be significant for those applications where interpretability is required.</span></p></div></div></section><section data-dcnode-id="1842" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="1843" id="Sec17-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1863" id="Sec17"><span data-dcnode-id="1864" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="1844" id="Sec17-content"><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">In this paper, we have revisited the classical problem of decision tree creation under a modern MIO lens. We presented a novel MIO formulation for creating optimal decision trees that captures the discrete nature of this problem and motivates two new methods, OCT and OCT-H.</span></p><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Experiments with synthetic data provide strong evidence that optimal decision trees can better recover the true generating decision tree in the data, contrary to the popular belief that such optimal methods will just overfit the training data at the expense of generalization ability.</span></p><p data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Exploiting the astonishing progress of MIO solvers in the last 25&nbsp;years, our comprehensive computational experiments showed that both the OCT and OCT-H problems are both practically solvable and deliver solutions that outperform the classical state-of-the-art methods, with average absolute improvements in out-of-sample accuracy over CART of 1–2% for OCT and 3–5% for OCT-H across all datasets, depending on the depth of the tree. We also provided guidance for each method that predict when each is most likely to outperform CART.</span></p><p data-dcnode-id="1849"><span data-dcnode-id="1856" instrument_node="">For OCT, we predict consistent accuracy improvements of 2–4% when the CART accuracy is below 60%, and improvements of 1.2–1.3% when the CART accuracy is above 80% and there is sufficient training data available relative to the complexity of the problem (</span><span class="mathjax-tex" data-dcnode-id="1851"><span class="MathJax_Preview" data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">n/p \ge 10</span></span></span><span data-dcnode-id="1850" instrument_node="">). Outside these cases, we find that OCT and CART are competitive with each other.</span></p><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">For OCT-H, we can predict consistent accuracy improvements of 4–7% over CART if the CART accuracy is below 70% or the dimension of the data is no more than 10. On other datasets, we can still predict strong performance by OCT-H, but with a smaller yet still significant average improvement of 2–3%.</span></p><p data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">These results provide comprehensive evidence that the optimal decision tree problem is tractable for practical applications and leads to significant improvements over heuristic methods.</span></p></div></div></section><span data-dcnode-id="1841" instrument_node="">
