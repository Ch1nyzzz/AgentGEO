rument_node="">D = 1, \ldots , D_{\max }</span></span></span><span data-dcnode-id="3087" instrument_node="">, we run the MIO problem, with the warm start being either CART trimmed to this depth, or the best MIO solution from a lower depth. Finally, we take the final solution and evaluate this on the test set to get the out-of-sample error.</span></p></div></div></section><section data-dcnode-id="2729" data-title="Optimal multivariate decision trees using MIO"><div class="c-article-section" data-dcnode-id="2730" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3081" id="Sec7"><span data-dcnode-id="3082" instrument_node="">Optimal multivariate decision trees using MIO</span></h2><div class="c-article-section__content" data-dcnode-id="2731" id="Sec7-content"><p data-dcnode-id="3076"><span data-dcnode-id="3080" instrument_node="">So far, we have only considered decision trees that use a single variable in their splits at each node, known as </span><i data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">univariate decision trees</span></i><span data-dcnode-id="3077" instrument_node="">. In this section, we show that it is simple to extend our MIO formulation for univariate trees to yield a problem for determining the optimal multivariate decision tree.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3074" id="Sec8"><span data-dcnode-id="3075" instrument_node="">Formulating the multivariate optimal tree problem</span></h3><p data-dcnode-id="3051"><span data-dcnode-id="3073" instrument_node="">In a multivariate decision tree, we are no longer restricted to choosing a single variable upon which to split, and instead can choose a general hyperplane split at each node. The variables </span><span class="mathjax-tex" data-dcnode-id="3068"><span class="MathJax_Preview" data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">{\varvec{a}}_t</span></span></span><span data-dcnode-id="3067" instrument_node=""> will be used to model the split at each node as before, except we relax&nbsp;(</span><a data-dcnode-id="3065" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ4"><span data-dcnode-id="3066" instrument_node="">4</span></a><span data-dcnode-id="3064" instrument_node="">) and instead choose </span><span class="mathjax-tex" data-dcnode-id="3059"><span class="MathJax_Preview" data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">{\varvec{a}}_t \in {[-1, 1]}^p</span></span></span><span data-dcnode-id="3058" instrument_node=""> at each branch node </span><i data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">t</span></i><span data-dcnode-id="3055" instrument_node="">. We must modify&nbsp;(</span><a data-dcnode-id="3053" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ2"><span data-dcnode-id="3054" instrument_node="">2</span></a><span data-dcnode-id="3052" instrument_node="">) to account for the the possibility these elements are negative by dealing with the absolute values instead:</span></p><div class="c-article-equation" data-dcnode-id="3044" id="Equ32"><div class="c-article-equation__content" data-dcnode-id="3045"><span class="mathjax-tex" data-dcnode-id="3046"><span class="MathJax_Preview" data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">\begin{aligned} \sum _{j = 1}^{p}|a_{jt}| \le d_t,\quad \forall t \in \mathcal T_B,\\ \end{aligned}</span></span></span></div></div><p data-dcnode-id="3036"><span data-dcnode-id="3043" instrument_node="">which can be linearized using auxiliary variables to track the value of </span><span class="mathjax-tex" data-dcnode-id="3038"><span class="MathJax_Preview" data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">|a_{jt}|</span></span></span><span data-dcnode-id="3037" instrument_node="">:</span></p><div class="c-article-equation" data-dcnode-id="3029" id="Equ33"><div class="c-article-equation__content" data-dcnode-id="3030"><span class="mathjax-tex" data-dcnode-id="3031"><span class="MathJax_Preview" data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">\begin{aligned}&amp;\sum _{j = 1}^{p}\hat{a}_{jt} \le d_t,\quad \forall t \in \mathcal T_B,\\&amp;\hat{a}_{jt} \ge a_{jt}, \quad j = 1, \ldots , p, \quad \forall t \in \mathcal T_B,\\&amp;\hat{a}_{jt} \ge -a_{jt},\quad j = 1, \ldots , p, \quad \forall t \in \mathcal T_B.\\ \end{aligned}</span></span></span></div></div><p data-dcnode-id="3021"><span data-dcnode-id="3028" instrument_node="">As before, these constraints force the split to be all zeros if </span><span class="mathjax-tex" data-dcnode-id="3023"><span class="MathJax_Preview" data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">d_t = 0</span></span></span><span data-dcnode-id="3022" instrument_node=""> and no split is applied.</span></p><p data-dcnode-id="3010"><span data-dcnode-id="3020" instrument_node="">We now have that </span><span class="mathjax-tex" data-dcnode-id="3015"><span class="MathJax_Preview" data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">{\varvec{a}}_t^T {\varvec{x}}_i \in {[-1, 1]}</span></span></span><span data-dcnode-id="3014" instrument_node="">, so we replace&nbsp;(</span><a data-dcnode-id="3012" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ3"><span data-dcnode-id="3013" instrument_node="">3</span></a><span data-dcnode-id="3011" instrument_node="">) with:</span></p><div class="c-article-equation" data-dcnode-id="3003" id="Equ34"><div class="c-article-equation__content" data-dcnode-id="3004"><span class="mathjax-tex" data-dcnode-id="3005"><span class="MathJax_Preview" data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">\begin{aligned} -d_t \le b_t \le d_t, \quad \forall t \in \mathcal T_B. \end{aligned}</span></span></span></div></div><p data-dcnode-id="2965"><span data-dcnode-id="3002" instrument_node="">Now we consider the split constraints&nbsp;(</span><a data-dcnode-id="3000" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ9"><span data-dcnode-id="3001" instrument_node="">9</span></a><span data-dcnode-id="2999" instrument_node="">) and&nbsp;(</span><a data-dcnode-id="2997" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ14"><span data-dcnode-id="2998" instrument_node="">14</span></a><span data-dcnode-id="2996" instrument_node="">). Previously we had that the range of </span><span class="mathjax-tex" data-dcnode-id="2991"><span class="MathJax_Preview" data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">({\varvec{a}}_t^T {\varvec{x}}_i - b_t)</span></span></span><span data-dcnode-id="2990" instrument_node=""> was </span><span class="mathjax-tex" data-dcnode-id="2985"><span class="MathJax_Preview" data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">{[-1, 1]}</span></span></span><span data-dcnode-id="2984" instrument_node="">, whereas it is now </span><span class="mathjax-tex" data-dcnode-id="2979"><span class="MathJax_Preview" data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">{[-2, 2]}</span></span></span><span data-dcnode-id="2978" instrument_node="">. This means we need </span><span class="mathjax-tex" data-dcnode-id="2973"><span class="MathJax_Preview" data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">M=2</span></span></span><span data-dcnode-id="2972" instrument_node=""> to ensure that the constraint is trivially satisfied when </span><span class="mathjax-tex" data-dcnode-id="2967"><span class="MathJax_Preview" data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">z_{it} = 0</span></span></span><span data-dcnode-id="2966" instrument_node="">. The constraints therefore become:</span></p><div class="c-article-equation" data-dcnode-id="2956" id="Equ26"><div class="c-article-equation__content" data-dcnode-id="2959"><span class="mathjax-tex" data-dcnode-id="2960"><span class="MathJax_Preview" data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">\begin{aligned}&amp;{\varvec{a}}_m^T {\varvec{x}}_{i} &lt; b_{m} + 2 \left( 1 - z_{it}\right) , \quad i = 1, \ldots , n, \quad \forall t \in \mathcal T_B, \quad \forall m \in A_L(t), \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">
                    (26)
                </span></div></div><span data-dcnode-id="2955" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="2946" id="Equ27"><div class="c-article-equation__content" data-dcnode-id="2949"><span class="mathjax-tex" data-dcnode-id="2950"><span class="MathJax_Preview" data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">\begin{aligned}&amp;{\varvec{a}}_m^T {\varvec{x}}_{i} \ge b_{m} - 2 \left( 1 - z_{it}\right) , \quad i = 1, \ldots , n, \quad \forall t \in \mathcal T_B, \quad \forall m \in A_R(t), \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">
                    (27)
                </span></div></div><p data-dcnode-id="2935"><span data-dcnode-id="2945" instrument_node="">Finally, as before we need to convert the strict inequality in&nbsp;(</span><a data-dcnode-id="2943" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ26"><span data-dcnode-id="2944" instrument_node="">26</span></a><span data-dcnode-id="2942" instrument_node="">) to a non-strict version. We do this by introducing a sufficiently small constant </span><span class="mathjax-tex" data-dcnode-id="2937"><span class="MathJax_Preview" data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">\mu </span></span></span><span data-dcnode-id="2936" instrument_node="">:</span></p><div class="c-article-equation" data-dcnode-id="2928" id="Equ35"><div class="c-article-equation__content" data-dcnode-id="2929"><span class="mathjax-tex" data-dcnode-id="2930"><span class="MathJax_Preview" data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">\begin{aligned} {\varvec{a}}_m^T {\varvec{x}}_{i} + \mu \le b_{m} + (2 + \mu ) \left( 1 - z_{it}\right) ,\quad i = 1, \ldots , n, \quad \forall t \in \mathcal T_B, \quad \forall m \in A_L(t), \end{aligned}</span></span></span></div></div><p data-dcnode-id="2896"><span data-dcnode-id="2927" instrument_node="">Note that we need to include </span><span class="mathjax-tex" data-dcnode-id="2922"><span class="MathJax_Preview" data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">\mu </span></span></span><span data-dcnode-id="2921" instrument_node=""> in the rightmost term to ensure the constraint is always satisfied when </span><span class="mathjax-tex" data-dcnode-id="2916"><span class="MathJax_Preview" data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">z_{ik} = 0</span></span></span><span data-dcnode-id="2915" instrument_node="">. Additionally, unlike in the univariate case, we cannot choose a value for </span><span class="mathjax-tex" data-dcnode-id="2910"><span class="MathJax_Preview" data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">\mu </span></span></span><span data-dcnode-id="2909" instrument_node=""> in an intelligent manner, and instead need to choose a small constant. Choosing </span><span class="mathjax-tex" data-dcnode-id="2904"><span class="MathJax_Preview" data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">\mu </span></span></span><span data-dcnode-id="2903" instrument_node=""> too small can lead to numerical issues in the MIO solver, while too large reduces the size of the feasible region, potentially reducing the quality of the optimal solution. We take </span><span class="mathjax-tex" data-dcnode-id="2898"><span class="MathJax_Preview" data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">\mu = 0.005</span></span></span><span data-dcnode-id="2897" instrument_node=""> as a compromise between these extremes.</span></p><p data-dcnode-id="2882"><span data-dcnode-id="2895" instrument_node="">Previously, we penalized the number of splits in the tree. In the multivariate regime where a single split may use multiple variables, it seems sensible to generalize this to instead penalize the total number of variables used in the splits. To achieve this, we introduce binary variables </span><span class="mathjax-tex" data-dcnode-id="2890"><span class="MathJax_Preview" data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">s_{jt}</span></span></span><span data-dcnode-id="2889" instrument_node=""> to track if the </span><i data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">j</span></i><span data-dcnode-id="2886" instrument_node="">th feature is used in the </span><i data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">t</span></i><span data-dcnode-id="2883" instrument_node="">th split:</span></p><div class="c-article-equation" data-dcnode-id="2875" id="Equ36"><div class="c-article-equation__content" data-dcnode-id="2876"><span class="mathjax-tex" data-dcnode-id="2877"><span class="MathJax_Preview" data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">\begin{aligned} -s_{jt} \le a_{jt} \le s_{jt}, \quad j = 1, \ldots , p, \quad \forall t \in \mathcal T_B\end{aligned}</span></span></span></div></div><p data-dcnode-id="2855"><span data-dcnode-id="2874" instrument_node="">We must also make sure that the values of </span><span class="mathjax-tex" data-dcnode-id="2869"><span class="MathJax_Preview" data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">s_{jt}</span></span></span><span data-dcnode-id="2868" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="2863"><span class="MathJax_Preview" data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">d_t</span></span></span><span data-dcnode-id="2862" instrument_node=""> are compatible. The following constraints ensure that </span><span class="mathjax-tex" data-dcnode-id="2857"><span class="MathJax_Preview" data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">d_t = 1</span></span></span><span data-dcnode-id="2856" instrument_node=""> if and only if any variable is used in the split:</span></p><div class="c-article-equation" data-dcnode-id="2848" id="Equ37"><div class="c-article-equation__content" data-dcnode-id="2849"><span class="mathjax-tex" data-dcnode-id="2850"><span class="MathJax_Preview" data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">\begin{aligned}&amp;s_{jt} \le d_t, \quad j = 1, \ldots , p, \quad \forall t \in \mathcal T_B,\\&amp;\sum _{j = 1}^{p}s_{jt} \ge d_t,\quad \forall t \in \mathcal T_B. \end{aligned}</span></span></span></div></div><p data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">Finally, we modify the objective function to penalize the number of variables used across the splits in the tree:</span></p><div class="c-article-equation" data-dcnode-id="2839" id="Equ38"><div class="c-article-equation__content" data-dcnode-id="2840"><span class="mathjax-tex" data-dcnode-id="2841"><span class="MathJax_Preview" data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">\begin{aligned} \min ~ \frac{1}{\hat{L}} \sum _{t \in \mathcal T_L}L_t + \alpha \cdot \sum _{t \in \mathcal T_B}\sum _{j = 1}^{p}s_{jt} \end{aligned}</span></span></span></div></div><p data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Combining all of these changes yields the complete OCT-H model:</span></p><div class="c-article-equation" data-dcnode-id="2828" id="Equ28"><div class="c-article-equation__content" data-dcnode-id="2831"><span class="mathjax-tex" data-dcnode-id="2832"><span class="MathJax_Preview" data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">\begin{aligned} \min&amp;\quad \phantom {} \frac{1}{\hat{L}} \sum _{t \in \mathcal T_L}L_t + \alpha \cdot \sum _{t \in \mathcal T_B}\sum _{j = 1}^{p}s_{jt} \\ \text {s.t.}&amp;\quad L_t \ge N_t - N_{kt} - n(1 - c_{kt}), \quad k = 1, \ldots , K, \quad \forall t \in \mathcal T_L, \nonumber \\&amp;\quad L_t \le N_t - N_{kt} + n c_{kt}, \quad k = 1, \ldots , K, \quad \forall t \in \mathcal T_L, \nonumber \\&amp;\quad L_t \ge 0, \quad \forall t \in \mathcal T_L, \nonumber \\&amp;\quad N_{kt} = \frac{1}{2} \sum _{i = 1}^{n}(1 + Y_{ik}) z_{it}, \quad k = 1, \ldots , K, \quad \forall t \in \mathcal T_L,\nonumber \\&amp;\quad N_t = \sum _{i = 1}^{n}z_{it}, \quad \forall t \in \mathcal T_L, \nonumber \\&amp;\quad \sum _{k = 1}^{K}c_{kt} = l_t, \quad \forall t \in \mathcal T_L, \nonumber \\&amp;\quad {\varvec{a}}_m^T {\varvec{x}}_{i} + \mu \le b_{m} + (2 + \mu ) \left( 1 - z_{it}\right) ,\quad i = 1, \ldots , n, \quad \forall t \in \mathcal T_B, \quad \forall m \in A_L(t),\nonumber \\&amp;\quad {\varvec{a}}_m^T {\varvec{x}}_{i} \ge b_{m} - 2 \left( 1 - z_{it}\right) , \quad i = 1, \ldots , n, \quad \forall t \in \mathcal T_B, \quad \forall m \in A_R(t),\nonumber \\&amp;\quad \sum _{t \in \mathcal T_L} z_{it} = 1, \quad i = 1, \ldots , n,\nonumber \\&amp;\quad z_{it} \le l_t, \quad \forall t \in \mathcal T_L,\nonumber \\&amp;\quad \sum _{i = 1}^{n}z_{it} \ge N_{\min } l_t, \quad \forall t \in \mathcal T_L,\nonumber \\&amp;\quad \sum _{j = 1}^{p}\hat{a}_{jt} \le d_t, \quad \forall t \in \mathcal T_B,\nonumber \\&amp;\quad \hat{a}_{jt} \ge a_{jt}, \quad j = 1, \ldots , p, \quad \forall t \in \mathcal T_B,\nonumber \\&amp;\quad \hat{a}_{jt} \ge -a_{jt}, \quad j = 1, \ldots , p, \quad \forall t \in \mathcal T_B,\nonumber \\&amp;\quad -s_{jt} \le a_{jt} \le s_{jt}, \quad j = 1, \ldots , p, \quad \forall t \in \mathcal T_B\nonumber \\&amp;\quad s_{jt} \le d_t, \quad j = 1, \ldots , p, \quad \forall t \in \mathcal T_B,\nonumber \\&amp;\quad \sum _{j = 1}^{p}s_{jt} \ge d_t, \quad \forall t \in \mathcal T_B,\nonumber \\&amp;\quad -d_t \le b_t \le d_t, \quad \forall t \in \mathcal T_B, \nonumber \\&amp;\quad d_t \le d_{p(t)}, \quad \forall t \in \mathcal T_B {\setminus } \{1\}, \nonumber \\&amp;\quad z_{it}, l_t \in \{0,1\}, \quad i = 1, \ldots , n, \quad \forall t \in \mathcal T_L,\nonumber \\&amp;\quad \quad s_{jt}, d_t \in \{0,1\}, \quad j = 1, \ldots , p, \quad \forall t \in \mathcal T_B.\nonumber \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">
                    (28)
                </span></div></div><p data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">Note that the OCT-H formulation contains the same number of binary variables as the OCT problem. This means the OCT-H problem tends to be as easy to solve as the OCT problem, which is not usually the case for hyperplane tree methods.</span></p><p data-dcnode-id="2818"><span data-dcnode-id="2825" instrument_node="">Additionally, from this formulation we can easily obtain the OCT problem as a special case by restoring the integrality constraints on </span><span class="mathjax-tex" data-dcnode-id="2820"><span class="MathJax_Preview" data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">{\varvec{a}}_t</span></span></span><span data-dcnode-id="2819" instrument_node="">. The close relationship between the univariate and multivariate problems reinforces the notion that the MIO formulation is the natural way to view the decision tree problem.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2816" id="Sec9"><span data-dcnode-id="2817" instrument_node="">Warm starts for optimal classification trees with hyperplanes</span></h3><p data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">As a result of relaxing the constraints that required the splits in the tree be univariate, the warm start trees from before are no longer ideal for warm starting the solving process. Because we have only relaxed constraints in the model, these previous warm starts are still feasible solutions, but it is possible that we can inexpensively find better warm starts that exploit the increased solution space in the OCT-H problem. Recall that the quality of the warm start solution has a large effect on the speed of the solving process, so it is generally a good idea for us to generate higher quality warm starts where possible.</span></p><p data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">The approach we employ to generate a high-quality warm start to the OCT-H problem is to use greedy top-down induction with multivariate splits. This is a natural extension of the univariate heuristics to the multivariate case. To determine the multivariate split at each node, we simply solve a reduced version of the OCT-H problem for the points in the current node by restricting the solution to a single split. This is a much smaller problem than the full OCT-H problem, and so it solves much faster and without the need for a warm start, although it can also use the best univariate split as a good warm start.</span></p><p data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Note that it would be possible to determine the split at each node using any other multivariate classification technique, such as logistic regression or support vector machines. This may increase the speed at which the multivariate warm starts are generated, since highly optimized versions of these algorithms exist for most programming languages. It may also lead to increased quality of the warm start solution, although this has not been tested.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2808" id="Sec10"><span data-dcnode-id="2809" instrument_node="">Training procedure for optimal classification trees with hyperplanes</span></h3><p data-dcnode-id="2773"><span data-dcnode-id="2807" instrument_node="">The OCT-H problem&nbsp;(</span><a data-dcnode-id="2805" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ28"><span data-dcnode-id="2806" instrument_node="">28</span></a><span data-dcnode-id="2804" instrument_node="">) has exactly the same parameters as the OCT problem, and thus the procedure in Sect.&nbsp;</span><a data-dcnode-id="2802" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec6"><span data-dcnode-id="2803" instrument_node="">3</span></a><span data-dcnode-id="2801" instrument_node=""> can be used for tuning these parameters. The only difference is that each split in the tree can now use up to </span><i data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">p</span></i><span data-dcnode-id="2798" instrument_node=""> variables, and so the maximum tree complexity, </span><span class="mathjax-tex" data-dcnode-id="2793"><span class="MathJax_Preview" data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">C_{\max }</span></span></span><span data-dcnode-id="2792" instrument_node="">, becomes </span><span class="mathjax-tex" data-dcnode-id="2787"><span class="MathJax_Preview" data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">p(2^D-1)</span></span></span><span data-dcnode-id="2786" instrument_node="">. As before, we can search over all values of </span><span class="mathjax-tex" data-dcnode-id="2781"><span class="MathJax_Preview" data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">C = 1, \ldots , C_{\max }</span></span></span><span data-dcnode-id="2780" instrument_node="">, solving the complexity-constrained problem for each and then post-processing to obtain the corresponding tuned value for </span><span class="mathjax-tex" data-dcnode-id="2775"><span class="MathJax_Preview" data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">\alpha </span></span></span><span data-dcnode-id="2774" instrument_node="">.</span></p><p data-dcnode-id="2732"><span data-dcnode-id="2772" instrument_node="">It can happen that </span><i data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">p</span></i><span data-dcnode-id="2769" instrument_node=""> is too large to make this computationally feasible, and it may be more efficient to simply search over a discretized range of possible </span><span class="mathjax-tex" data-dcnode-id="2764"><span class="MathJax_Preview" data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">\alpha </span></span></span><span data-dcnode-id="2763" instrument_node=""> values as is typically done during validation. In this case, the number of problems to solve is </span><span class="mathjax-tex" data-dcnode-id="2758"><span class="MathJax_Preview" data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">D \cdot |\mathcal A|</span></span></span><span data-dcnode-id="2757" instrument_node="">, where </span><span class="mathjax-tex" data-dcnode-id="2752"><span class="MathJax_Preview" data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">\mathcal A</span></span></span><span data-dcnode-id="2751" instrument_node=""> is the discretized set of values to search. The same approach of reusing the solutions from lower depths as warm starts can still be applied to speed up the solutions. Whether this approach is better than the constraint-based approach depends on the size of </span><span class="mathjax-tex" data-dcnode-id="2746"><span class="MathJax_Preview" data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">\mathcal A</span></span></span><span data-dcnode-id="2745" instrument_node=""> that is chosen, and the number of problems that must be solved by each approach, which is </span><span class="mathjax-tex" data-dcnode-id="2740"><span class="MathJax_Preview" data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">D \cdot |\mathcal A|</span></span></span><span data-dcnode-id="2739" instrument_node=""> compared to </span><span class="mathjax-tex" data-dcnode-id="2734"><span class="MathJax_Preview" data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">p(2^D-1)</span></span></span><span data-dcnode-id="2733" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="2404" data-title="Computational experiments with synthetic datasets"><div class="c-article-section" data-dcnode-id="2405" id="Sec11-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2727" id="Sec11"><span data-dcnode-id="2728" instrument_node="">Computational experiments with synthetic datasets</span></h2><div class="c-article-section__content" data-dcnode-id="2406" id="Sec11-content"><p data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">In this section, we examine the performance of OCT on a variety of synthetically-generated datasets in order to understand how effective the method is at discovering the underlying ground truth in a dataset whose structure is in fact described by a decision tree.</span></p><p data-dcnode-id="2714"><span data-dcnode-id="2724" instrument_node="">The experiments we conduct are adaptations of the experiments by&nbsp;Murthy and Salzberg (</span><a aria-label="Reference 1995b" data-dcnode-id="2722" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d60465247e14962" title="Murthy, S. K., &amp; Salzberg, S. (1995b). Decision tree induction: How effective is the greedy heuristic? In KDD (pp. 222–227)."><span data-dcnode-id="2723" instrument_node="">1995b</span></a><span data-dcnode-id="2721" instrument_node="">). These experiments use a single decision tree as the ground truth to generate datasets, and then different methods are used to induce decision trees on these datasets and are then compared to the ground truth tree to evaluate performance. To construct the ground truth, a decision tree of a specified depth is created by choosing splits at random, and the leaves of the resulting tree are labeled such that no two adjacent leaves have the same label, ensuring that this tree is the smallest representation of the ground truth. The training and test datasets are created by generating each </span><span class="mathjax-tex" data-dcnode-id="2716"><span class="MathJax_Preview" data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">{\varvec{x}}_i</span></span></span><span data-dcnode-id="2715" instrument_node=""> as a uniform random vector, and then using the ground truth tree to assign the corresponding label to the point.</span></p><p data-dcnode-id="2709"><span data-dcnode-id="2713" instrument_node="">Following&nbsp;Murthy and Salzberg (</span><a aria-label="Reference 1995b" data-dcnode-id="2711" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d60465247e14996" title="Murthy, S. K., &amp; Salzberg, S. (1995b). Decision tree induction: How effective is the greedy heuristic? In KDD (pp. 222–227)."><span data-dcnode-id="2712" instrument_node="">1995b</span></a><span data-dcnode-id="2710" instrument_node="">), we report six measures of tree quality in all experiments:</span></p><ul class="u-list-style-dash" data-dcnode-id="2650"><span data-dcnode-id="2708" instrument_node="">
</span><li data-dcnode-id="2700"><span data-dcnode-id="2707" instrument_node="">
</span><p data-dcnode-id="2702"><span data-dcnode-id="2706" instrument_node="">
</span><i data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">In-sample accuracy</span></i><span data-dcnode-id="2703" instrument_node=""> Accuracy on the training set.</span></p><span data-dcnode-id="2701" instrument_node="">
</span></li><span data-dcnode-id="2699" instrument_node="">
</span><li data-dcnode-id="2691"><span data-dcnode-id="2698" instrument_node="">
</span><p data-dcnode-id="2693"><span data-dcnode-id="2697" instrument_node="">
</span><i data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">Out-of-sample accuracy</span></i><span data-dcnode-id="2694" instrument_node=""> Accuracy on the test set.</span></p><span data-dcnode-id="2692" instrument_node="">
</span></li><span data-dcnode-id="2690" instrument_node="">
</span><li data-dcnode-id="2682"><span data-dcnode-id="2689" instrument_node="">
</span><p data-dcnode-id="2684"><span data-dcnode-id="2688" instrument_node="">
</span><i data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">Tree size</span></i><span data-dcnode-id="2685" instrument_node=""> Number of leaf nodes.</span></p><span data-dcnode-id="2683" instrument_node="">
</span></li><span data-dcnode-id="2681" instrument_node="">
</span><li data-dcnode-id="2673"><span data-dcnode-id="2680" instrument_node="">
</span><p data-dcnode-id="2675"><span data-dcnode-id="2679" instrument_node="">
</span><i data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">Maximum depth</span></i><span data-dcnode-id="2676" instrument_node=""> Total depth of the tree.</span></p><span data-dcnode-id="2674" instrument_node="">
</span></li><span data-dcnode-id="2672" instrument_node="">
</span><li data-dcnode-id="2664"><span data-dcnode-id="2671" instrument_node="">
</span><p data-dcnode-id="2666"><span data-dcnode-id="2670" instrument_node="">
</span><i data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">Average depth</span></i><span data-dcnode-id="2667" instrument_node=""> Average depth of leaf nodes in the tree.</span></p><span data-dcnode-id="2665" instrument_node="">
</span></li><span data-dcnode-id="2663" instrument_node="">
</span><li data-dcnode-id="2652"><span data-dcnode-id="2662" instrument_node="">
</span><p data-dcnode-id="2654"><span data-dcnode-id="2661" instrument_node="">
</span><i data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">Expected depth</span></i><span data-dcnode-id="2658" instrument_node=""> Average depth of leaf nodes in the tree, weighted by the proportion of the test set that belongs to each leaf node (this is also sometimes referred to as </span><i data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">dynamic complexity</span></i><span data-dcnode-id="2655" instrument_node="">).</span></p><span data-dcnode-id="2653" instrument_node="">
</span></li><span data-dcnode-id="2651" instrument_node="">
</span></ul><p data-dcnode-id="2636"><span data-dcnode-id="2649" instrument_node="">In each experiment, ten random trees are generated as different ground truths, and ten training and test set pairs are created using each tree. The size of the training set is specified by the experiment, and the size of the test set is always </span><span class="mathjax-tex" data-dcnode-id="2644"><span class="MathJax_Preview" data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">2^D \cdot (p - 1) \cdot 500</span></span></span><span data-dcnode-id="2643" instrument_node="">, where </span><i data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">D</span></i><span data-dcnode-id="2640" instrument_node=""> is the depth of the ground truth tree and </span><i data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">p</span></i><span data-dcnode-id="2637" instrument_node=""> is the number of features in the data, both specified by the particular experiment. The quality measures are calculated over all 100 instances of the problem, and we present the means and standard errors of these measures.</span></p><p data-dcnode-id="2625"><span data-dcnode-id="2635" instrument_node="">The methods we compare are our OCT method, the standard CART heuristic, and a modified CART heuristic that imposes a depth limit equal to the depth of the ground truth. The purpose of this third method is to examine the impact of trimming the CART solution as a method of obtaining a simpler and more interpretable tree. For experiments with noise in the data, 10% of the training set is reserved for validation purposes in order to tune the complexity parameter </span><span class="mathjax-tex" data-dcnode-id="2630"><span class="MathJax_Preview" data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">\alpha </span></span></span><span data-dcnode-id="2629" instrument_node="">. Note that&nbsp;Murthy and Salzberg (</span><a aria-label="Reference 1995b" data-dcnode-id="2627" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d60465247e15137" title="Murthy, S. K., &amp; Salzberg, S. (1995b). Decision tree induction: How effective is the greedy heuristic? In KDD (pp. 222–227)."><span data-dcnode-id="2628" instrument_node="">1995b</span></a><span data-dcnode-id="2626" instrument_node="">) found that C4.5 and CART gave near-identical results for all experiments they conducted and reported only the C4.5 results, so our results for CART should also be similar to those that would be obtained using C4.5.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2610" data-test="inline-table" id="table-1"><figure data-dcnode-id="2611"><figcaption class="c-article-table__figcaption" data-dcnode-id="2622"><b data-dcnode-id="2623" data-test="table-caption" id="Tab1"><span data-dcnode-id="2624" instrument_node="">Table 1 Effects of noise in ground truth depth</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2612"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="2613" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/tables/1" rel="nofollow"><span data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2614" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2615" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2616" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2619" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2618" fill-rule="evenodd"></path><span data-dcnode-id="2617" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2609" instrument_node="">
</span><p data-dcnode-id="2592"><span data-dcnode-id="2608" instrument_node="">The first experiment evaluates the effectiveness of each method as the problem complexity increases by increasing the depth of the ground truth while holding the training set size and dimension fixed at </span><span class="mathjax-tex" data-dcnode-id="2603"><span class="MathJax_Preview" data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">n=100</span></span></span><span data-dcnode-id="2602" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="2597"><span class="MathJax_Preview" data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">p=2</span></span></span><span data-dcnode-id="2596" instrument_node="">, respectively. There is no noise present in the training data. Table&nbsp;</span><a data-dcnode-id="2594" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2595" instrument_node="">1</span></a><span data-dcnode-id="2593" instrument_node=""> shows the results of this experiment. We see that depth-constrained CART is significantly worse than the other methods when compared to the ground truth, a result that is common to all of these experiments. In terms of out-of-sample accuracy, both CART and OCT are about the same in all tests, with OCT having a very slight advantage at all depths that is largest at depth 3. We see that the out-of-sample accuracies decrease significantly as the depth increases, which is to be expected because the training problem is becoming more complex with the same amount of training data available. In terms of the other quality measures, OCT matches the ground truth nearly identically in all cases across the measures, whereas CART is significantly different and seems to be learning trees that are structurally different to the ground truth. This experiment demonstrates that although different methods can have the same out-of-sample accuracy, the underlying structure learned by each method can still be significantly different from one another, and in this case OCT is a much closer match for the ground truth.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2577" data-test="inline-table" id="table-2"><figure data-dcnode-id="2578"><figcaption class="c-article-table__figcaption" data-dcnode-id="2589"><b data-dcnode-id="2590" data-test="table-caption" id="Tab2"><span data-dcnode-id="2591" instrument_node="">Table 2 Effects of training set size</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2579"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="2580" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/tables/2" rel="nofollow"><span data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2581" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2582" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2583" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2586" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2585" fill-rule="evenodd"></path><span data-dcnode-id="2584" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2576" instrument_node="">
</span><p data-dcnode-id="2559"><span data-dcnode-id="2575" instrument_node="">The second experiment investigates the effect of the amount of available training data relative to the complexity of the problem. We increase the size of the training set while holding the depth of the ground truth fixed at </span><span class="mathjax-tex" data-dcnode-id="2570"><span class="MathJax_Preview" data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">D=2</span></span></span><span data-dcnode-id="2569" instrument_node=""> and the dimension fixed at </span><span class="mathjax-tex" data-dcnode-id="2564"><span class="MathJax_Preview" data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">p=2</span></span></span><span data-dcnode-id="2563" instrument_node="">. There is no noise in the training data. Table&nbsp;</span><a data-dcnode-id="2561" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2562" instrument_node="">2</span></a><span data-dcnode-id="2560" instrument_node=""> shows a summary of the results. We see that all methods increase in out-of-sample accuracy as the training size increases, approaching 100% accuracy at the higher sizes. We see that initially depth-constrained CART is a poor approximation to the ground truth, but it becomes as accurate out-of-sample as the other methods if sufficient training data is available. In a data-poor environment, depth-constrained CART performs significantly worse, and OCT offers a slight improvement over CART in terms of out-of-sample accuracy. This offers clear evidence against the notion that optimal methods tend to overfit the training data in data-poor scenarios; in fact the optimal method performs stronger. In terms of the other metrics, OCT most closely matches the attributes of the true trees in nearly all cases, indicating it is actually learning the truth in the data.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2544" data-test="inline-table" id="table-3"><figure data-dcnode-id="2545"><figcaption class="c-article-table__figcaption" data-dcnode-id="2556"><b data-dcnode-id="2557" data-test="table-caption" id="Tab3"><span data-dcnode-id="2558" instrument_node="">Table 3 Effects of noise in class labels</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2546"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="2547" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/tables/3" rel="nofollow"><span data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2548" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2549" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2550" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2553" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2552" fill-rule="evenodd"></path><span data-dcnode-id="2551" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2543" instrument_node="">
</span><p data-dcnode-id="2511"><span data-dcnode-id="2542" instrument_node="">The third experiment examines the impact of adding noise to the labels of the training data. In this experiment, 100 training points were generated per distinct label of the ground truth tree (</span><span class="mathjax-tex" data-dcnode-id="2537"><span class="MathJax_Preview" data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">D=2</span></span></span><span data-dcnode-id="2536" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="2531"><span class="MathJax_Preview" data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">p=2</span></span></span><span data-dcnode-id="2530" instrument_node="">). Noise was then added to the training set by increasing by 1 the label of a random </span><span class="mathjax-tex" data-dcnode-id="2525"><span class="MathJax_Preview" data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">k\%</span></span></span><span data-dcnode-id="2524" instrument_node=""> of the points, where </span><i data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">k</span></i><span data-dcnode-id="2521" instrument_node=""> is a parameter of the experiment. Table&nbsp;</span><a data-dcnode-id="2519" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="2520" instrument_node="">3</span></a><span data-dcnode-id="2518" instrument_node=""> shows the impact of increasing levels of label perturbations in the training data. As the level of noise increases, the accuracies of all methods tend to decrease, as would be expected. The difference between the out-of-sample accuracies of CART and OCT increases with the level of noise up to </span><span class="mathjax-tex" data-dcnode-id="2513"><span class="MathJax_Preview" data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">20\%</span></span></span><span data-dcnode-id="2512" instrument_node="">, indicating that OCT is able to better identify the true tree than CART when exposed to such noise, and this difference quickly becomes significant (1–2% for noise levels of 15–20%). At the highest level of noise, the difference between these methods is diminished, reflecting the difficulty of learning the truth in such a noisy environment. The other metrics also indicate that OCT again most closely matches the ground truth as the noise levels are increased. We remark that these results counter the idea that optimal methods are less robust to noise in the data than current heuristic approaches due to problems of overfitting, as we clearly see that the OCT trees are significantly stronger out-of-sample than the heuristic counterparts for high levels of label noise.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2496" data-test="inline-table" id="table-4"><figure data-dcnode-id="2497"><figcaption class="c-article-table__figcaption" data-dcnode-id="2508"><b data-dcnode-id="2509" data-test="table-caption" id="Tab4"><span data-dcnode-id="2510" instrument_node="">Table 4 Effects of noise in attribute values</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2498"><a aria-label="Full size table 4" class="c-article__pill-button" data-dcnode-id="2499" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/tables/4" rel="nofollow"><span data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2500" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2501" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2502" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2505" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2504" fill-rule="evenodd"></path><span data-dcnode-id="2503" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2495" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2494" instrument_node="">The fourth experiment is similar to the previous one, except it considers noise in the features of the training data instead of the labels. Again, 100 training points are generated for each distinct label in the ground truth tree (</span><span class="mathjax-tex" data-dcnode-id="2489"><span class="MathJax_Preview" data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">D=2</span></span></span><span data-dcnode-id="2488" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="2483"><span class="MathJax_Preview" data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">p=2</span></span></span><span data-dcnode-id="2482" instrument_node="">). We introduce noise by selecting a random </span><span class="mathjax-tex" data-dcnode-id="2477"><span class="MathJax_Preview" data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">k\%</span></span></span><span data-dcnode-id="2476" instrument_node=""> of the training points and to each of these adding random noise </span><span class="mathjax-tex" data-dcnode-id="2471"><span class="MathJax_Preview" data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">\epsilon \sim U(-0.1, 0.1)</span></span></span><span data-dcnode-id="2470" instrument_node=""> to every feature. Table&nbsp;</span><a data-dcnode-id="2468" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="2469" instrument_node="">4</span></a><span data-dcnode-id="2467" instrument_node=""> shows the impact of increasing levels of this feature noise in the training data. At all levels of noise, the out-of-sample accuracies of CART and OCT are comparable, as are the other tree metrics. Even at the highest level of noise, where </span><span class="mathjax-tex" data-dcnode-id="2462"><span class="MathJax_Preview" data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">25\%</span></span></span><span data-dcnode-id="2461" instrument_node=""> of the training data are perturbed in all features by up to </span><span class="mathjax-tex" data-dcnode-id="2456"><span class="MathJax_Preview" data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">10\%</span></span></span><span data-dcnode-id="2455" instrument_node="">, both methods have an out-of-sample accuracy above </span><span class="mathjax-tex" data-dcnode-id="2450"><span class="MathJax_Preview" data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">97\%</span></span></span><span data-dcnode-id="2449" instrument_node="">. We conclude that in the presence of significant feature noise, neither method outperforms the other, and the optimal method is clearly not overfitting the training data.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2433" data-test="inline-table" id="table-5"><figure data-dcnode-id="2434"><figcaption class="c-article-table__figcaption" data-dcnode-id="2445"><b data-dcnode-id="2446" data-test="table-caption" id="Tab5"><span data-dcnode-id="2447" instrument_node="">Table 5 Effects of dimensionality</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2435"><a aria-label="Full size table 5" class="c-article__pill-button" data-dcnode-id="2436" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/tables/5" rel="nofollow"><span data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2437" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2438" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2439" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2442" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2441" fill-rule="evenodd"></path><span data-dcnode-id="2440" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2432" instrument_node="">
</span><p data-dcnode-id="2409"><span data-dcnode-id="2431" instrument_node="">The final experiment considers the effect of increasing the dimensionality of the problem while holding the training size and ground truth depth fixed at </span><span class="mathjax-tex" data-dcnode-id="2426"><span class="MathJax_Preview" data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">n=100</span></span></span><span data-dcnode-id="2425" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="2420"><span class="MathJax_Preview" data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">D=2</span></span></span><span data-dcnode-id="2419" instrument_node="">, respectively. Table&nbsp;</span><a data-dcnode-id="2417" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab5"><span data-dcnode-id="2418" instrument_node="">5</span></a><span data-dcnode-id="2416" instrument_node=""> shows the effect of increasing the number of features for fixed training size and tree depth. At the lower dimensions, there is no significant difference between CART and OCT, but at higher dimensions the difference is about </span><span class="mathjax-tex" data-dcnode-id="2411"><span class="MathJax_Preview" data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">0.6\%</span></span></span><span data-dcnode-id="2410" instrument_node=""> and is significant. The other metrics show that again the OCT trees are the best match for the ground truth. These results echo those from the second test and show that the optimal method performs stronger relative to CART in data-poor environments where relatively little training data is available compared to the problem complexity.</span></p><p data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">We conclude by summarizing the collective findings of these tests with synthetic data. In nearly all cases, the trees generated by the OCT method most closely matched the quality metrics of the ground truth trees. In particular, the OCT trees in most cases had out-of-sample accuracies that were significantly higher than those of CART, even in the presence of significant levels of noise in the training data. This provides strong evidence against the widely-held belief that optimal methods are more inclined to overfit the training set at the expense of out-of-sample accuracy. A secondary conclusion is that the depth-constrained CART method is a poor way of constructing a decision tree of a given depth. Creating complete trees and then trimming these to shorter depths yields trees that are significantly worse in nearly all cases than those created by OCT, which creates the tree with the depth limit in mind.</span></p></div></div></section><section data-dcnode-id="1865" data-title="Computational results with real-world datasets"><div class="c-article-section" data-dcnode-id="1866" id="Sec12-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2402" id="Sec12"><span data-dcnode-id="2403" instrument_node="">Computational results with real-world datasets</span></h2><div class="c-article-section__content" data-dcnode-id="1867" id="Sec12-content"><p data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">In this section, we report the performance of Optimal Classification Trees with and without hyperplanes on several publicly available datasets widely-used within the statistics and machine learning communities, and compare these to the prominent decision tree method, CART.</span></p><p data-dcnode-id="2395"><span data-dcnode-id="2399" instrument_node="">In order to provide a comprehensive benchmark of performance for optimal trees, we used a collection of 53 datasets obtained from the UCI machine learning repository&nbsp;(Lichman </span><a aria-label="Reference 2013" data-dcnode-id="2397" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d60465247e35622" title="Lichman, M. (2013). UCI machine learning repository. 
                    http://archive.ics.uci.edu/ml
                    
                  ."><span data-dcnode-id="2398" instrument_node="">2013</span></a><span data-dcnode-id="2396" instrument_node="">). These datasets are used regularly for reporting and comparing the performance of different classification methods. The datasets we use have sizes up to 1000s of points, which we demonstrate can be handled by our methods. Datasets with tens of thousands of points were tested, but the time required for our methods to generate high-quality solutions was prohibitive. For these experiments, we seek to demonstrate the improvement delivered by our methods on these common datasets of manageable size.</span></p><p data-dcnode-id="2381"><span data-dcnode-id="2394" instrument_node="">Each dataset was split into three parts: the training set (50%), the validation set (25%), and the testing set (25%). The training and validation sets were used to tune the value of the hyperparameter </span><span class="mathjax-tex" data-dcnode-id="2389"><span class="MathJax_Preview" data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">\alpha </span></span></span><span data-dcnode-id="2388" instrument_node="">. We then used this </span><span class="mathjax-tex" data-dcnode-id="2383"><span class="MathJax_Preview" data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">\alpha </span></span></span><span data-dcnode-id="2382" instrument_node=""> to train a tree on the combined training and validation sets, which we then evaluate against the testing set to determine the out-of-sample accuracy.</span></p><p data-dcnode-id="2373"><span data-dcnode-id="2380" instrument_node="">To reduce the amount of computation required across all the datasets, we elected not to tune the parameter </span><span class="mathjax-tex" data-dcnode-id="2375"><span class="MathJax_Preview" data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">N_{\min }</span></span></span><span data-dcnode-id="2374" instrument_node="">. Instead, we set this to 5% of the total number of points in the dataset so that this value would work across all datasets.</span></p><p data-dcnode-id="2359"><span data-dcnode-id="2372" instrument_node="">We trained optimal trees of depths 1–4 on all datasets, and compared them to solutions from CART trimmed to the same depth. These CART solutions were obtained by fixing </span><span class="mathjax-tex" data-dcnode-id="2367"><span class="MathJax_Preview" data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">N_{\min }</span></span></span><span data-dcnode-id="2366" instrument_node=""> to the same value as for optimal trees, and tuning the hyperparameter </span><span class="mathjax-tex" data-dcnode-id="2361"><span class="MathJax_Preview" data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">\alpha </span></span></span><span data-dcnode-id="2360" instrument_node=""> in the usual way for CART. The resulting tree was then trimmed to the specified depth. This lets us evaluate the performance of all methods in the same depth-constrained scenario, which is often important for applications that require interpretability of the solutions. In such cases, we seek solutions with very few splits that best capture the structure in the data. We collected data for CART without the depth constraints to examine whether shallower Optimal Trees can achieve the same accuracy as deep CART trees.</span></p><p data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">In order to minimize the effect of the particular splitting of the data into training, validation and testing sets, the entire process was conducted five times for each dataset, with a different splitting each time. The final out-of-sample accuracies were then obtained by averaging the results across these five runs.</span></p><p data-dcnode-id="2325"><span data-dcnode-id="2356" instrument_node="">For testing the performance of CART, we used the </span><span class="u-small-caps" data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">rpart</span></span><span data-dcnode-id="2353" instrument_node=""> package&nbsp;(Therneau et&nbsp;al. </span><a aria-label="Reference 2015" data-dcnode-id="2351" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d60465247e35754" title="Therneau, T., Atkinson, B., &amp; Ripley, B. (2015). rpart: Recursive partitioning and regression trees. 
                    http://CRAN.R-project.org/package=rpart
                    
                  , R package version 4.1-9."><span data-dcnode-id="2352" instrument_node="">2015</span></a><span data-dcnode-id="2350" instrument_node="">) in the </span><span class="u-sans-serif" data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">R</span></span><span data-dcnode-id="2347" instrument_node=""> programming language&nbsp;(R Core Team </span><a aria-label="Reference 2015" data-dcnode-id="2345" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d60465247e35760" title="R Core Team. (2015). R: A language and environment for statistical computing. Vienna: R Foundation for Statistical Computing. 
                    http://www.R-project.org/
                    
                  ."><span data-dcnode-id="2346" instrument_node="">2015</span></a><span data-dcnode-id="2344" instrument_node="">). The hyperparameters </span><span class="mathjax-tex" data-dcnode-id="2339"><span class="MathJax_Preview" data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">N_{\min }</span></span></span><span data-dcnode-id="2338" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="2333"><span class="MathJax_Preview" data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">\alpha </span></span></span><span data-dcnode-id="2332" instrument_node=""> correspond to the parameters </span><span class="u-monospace" data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">minbucket</span></span><span data-dcnode-id="2329" instrument_node=""> and </span><span class="u-monospace" data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">cp</span></span><span data-dcnode-id="2326" instrument_node="">. As discussed earlier, we post-processed the trees to satisfy any depth constraints.</span></p><p data-dcnode-id="2296"><span data-dcnode-id="2324" instrument_node="">The OCT problems (OCT and OCT-H) were implemented in the </span><span class="u-small-caps" data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">Julia</span></span><span data-dcnode-id="2321" instrument_node=""> programming language, which is a rapidly maturing language designed for high-performance scientific computing&nbsp;(Bezanson et&nbsp;al. </span><a aria-label="Reference 2014" data-dcnode-id="2319" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d60465247e35821" title="Bezanson, J., Edelman, A., Karpinski, S., &amp; Shah, V. B. (2014). Julia: A fresh approach to numerical computing. arXiv preprint 
                    arXiv:1411.1607
                    
                  
                        "><span data-dcnode-id="2320" instrument_node="">2014</span></a><span data-dcnode-id="2318" instrument_node="">). We formulated our MIO models using the </span><span class="u-small-caps" data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">JuMP</span></span><span data-dcnode-id="2315" instrument_node=""> package, a state-of-the-art library for algebraic modeling and mathematical optimization&nbsp;(Lubin and Dunning </span><a aria-label="Reference 2015" data-dcnode-id="2313" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d60465247e35827" title="Lubin, M., &amp; Dunning, I. (2015). Computing in operations research using julia. INFORMS Journal on Computing, 27(2), 238–248."><span data-dcnode-id="2314" instrument_node="">2015</span></a><span data-dcnode-id="2312" instrument_node="">), and solved them using the </span><span class="u-small-caps" data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">Gurobi</span></span><span data-dcnode-id="2309" instrument_node=""> 6.5 solver, one of the fastest available commercial MIO solvers&nbsp;(Gurobi Optimization Inc </span><a aria-label="Reference 2015b" data-dcnode-id="2307" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d60465247e35834" title="Gurobi Optimization Inc. (2015b). Gurobi optimizer reference manual. 
                    http://www.gurobi.com
                    
                  ."><span data-dcnode-id="2308" instrument_node="">2015b</span></a><span data-dcnode-id="2306" instrument_node="">). Again, we tuned the value of </span><span class="mathjax-tex" data-dcnode-id="2301"><span class="MathJax_Preview" data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">\alpha </span></span></span><span data-dcnode-id="2300" instrument_node=""> through the validation process described in Sect.&nbsp;</span><a data-dcnode-id="2298" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec6"><span data-dcnode-id="2299" instrument_node="">3</span></a><span data-dcnode-id="2297" instrument_node="">.</span></p><p data-dcnode-id="2291"><span data-dcnode-id="2295" instrument_node="">All problems were solved in parallel using the Amazon Web Services (AWS) Elastic Compute Cloud (EC2). We used the compute-optimized </span><span class="u-monospace" data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">c4.xlarge</span></span><span data-dcnode-id="2292" instrument_node=""> instances, which have have four virtual CPU cores (2.9&nbsp;GHz) and 7.5&nbsp;GB RAM.</span></p><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">A time limit was applied to each optimal tree problem. On most datasets for OCT this was 30&nbsp;min, but for some of the larger datasets we increased the time limit up to 2&nbsp;h to ensure that the solver could make progress. The OCT-H problem is easier to solve and so only required time limits of 5–15&nbsp;min. When generating heuristic warm starts for the multivariate problem by recursively solving the OCT-H problem with a single split, we used a time limit of 60&nbsp;s. We found this was more than enough to find a good greedy solution.</span></p><p data-dcnode-id="2281"><span data-dcnode-id="2288" instrument_node="">As discussed in Sect.&nbsp;</span><a data-dcnode-id="2286" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="2287" instrument_node="">2</span></a><span data-dcnode-id="2285" instrument_node="">, the application of a time limit when solving an MIO problem when using strong warm starts and heuristics does not usually affect the quality of the solution if the time limit is sufficiently large. As we saw in Fig.&nbsp;</span><a data-dcnode-id="2283" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2284" instrument_node="">3</span></a><span data-dcnode-id="2282" instrument_node="">, the solution that is eventually shown to be optimal is typically found very close to the beginning of the solve, especially when warm starts are used. Moreover, the majority of the time is spent in proving that this solution is in fact optimal, which is not required for our purposes. If we set the time limit intelligently, we can avoid the lengthy process of proving optimality while still generating high quality solutions. However, this does mean that most of our results for OCT and OCT-H do not carry explicit certificates of optimality.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2279" id="Sec13"><span data-dcnode-id="2280" instrument_node="">Overall comparison of all methods</span></h3><span data-dcnode-id="2278" instrument_node="">
</span><div class="c-article-table" data-container-section="table" data-dcnode-id="2263" data-test="inline-table" id="table-6"><figure data-dcnode-id="2264"><figcaption class="c-article-table__figcaption" data-dcnode-id="2275"><b data-dcnode-id="2276" data-test="table-caption" id="Tab6"><span data-dcnode-id="2277" instrument_node="">Table 6 Mean out-of-sample accuracies across all datasets for each method, according to the maximum tree depth</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2265"><a aria-label="Full size table 6" class="c-article__pill-button" data-dcnode-id="2266" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/tables/6" rel="nofollow"><span data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2267" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2268" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2269" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2272" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2271" fill-rule="evenodd"></path><span data-dcnode-id="2270" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2262" instrument_node="">
</span><p data-dcnode-id="2257"><span data-dcnode-id="2261" instrument_node="">We first provide a summary of all methods for comparison purposes. Table&nbsp;</span><a data-dcnode-id="2259" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab6"><span data-dcnode-id="2260" instrument_node="">6</span></a><span data-dcnode-id="2258" instrument_node=""> shows the average out-of-sample accuracy across all datasets for each method and tree depth. For reference we also include the results for a top-down induction version of OCT-H, where the tree is decided greedily, one split at a time, providing a reference point for the performance of top-down multivariate methods. We see that CART performs the weakest, and is outperformed at all depths by OCT by about 1–2%, demonstrating the advantage that can be realized by using optimal trees. OCT-H is significantly more powerful than all other methods; in particular, OCT-H performs significantly stronger than the top-down OCT-H heuristic, over 2% better on average, indicating that multivariate trees also benefit significantly from taking a global perspective when choosing the splits.</span></p><p data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">When we run CART without constraining the depth of the trees, the maximum tree depth required is 10 and the resulting average accuracy across all datasets is 80.7%. We note this is very close to the accuracy of 80.4% of OCT at depth 4. It is quite possible that with a longer time limit, OCT at depth 4 would be able to achieve accuracies similar to those of CART at depth 10. This would be very significant for applications that require interpretation of the decision trees, since shallow trees are much more interpretable. We also note that even the depth 2 accuracy of OCT-H at 81.0% is greater than this depth 10 CART accuracy, indicating that very shallow multivariate decision trees can outperform the deepest univariate trees.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2240" data-test="inline-table" id="table-7"><figure data-dcnode-id="2241"><figcaption class="c-article-table__figcaption" data-dcnode-id="2252"><b data-dcnode-id="2253" data-test="table-caption" id="Tab7"><span data-dcnode-id="2254" instrument_node="">Table 7 Full results for CART and OCT at depth 2</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2242"><a aria-label="Full size table 7" class="c-article__pill-button" data-dcnode-id="2243" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/tables/7" rel="nofollow"><span data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2244" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2245" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2246" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2249" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2248" fill-rule="evenodd"></path><span data-dcnode-id="2247" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2239" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="2237" id="Sec14"><span data-dcnode-id="2238" instrument_node="">Optimal classification trees versus CART</span></h3><p data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">We now present an in-depth direct comparison of OCT and CART. Both methods seek to solve the same decision tree problem, so this comparison aims to show the effectiveness of formulating the problem under an MIO framework and solving the exact same problem to optimality.</span></p><p data-dcnode-id="2227"><span data-dcnode-id="2234" instrument_node="">The entire set of mean out-of-sample accuracies on each dataset for both methods at depth 2 is provided in Table&nbsp;</span><a data-dcnode-id="2232" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab7"><span data-dcnode-id="2233" instrument_node="">7</span></a><span data-dcnode-id="2231" instrument_node="">, which reports the size and dimension of the dataset, the number of class labels </span><i data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">K</span></i><span data-dcnode-id="2228" instrument_node="">, and the average out-of-sample accuracy of each method along with the mean accuracy improvement for OCT over CART and the corresponding standard error (results for depths 3 and 4 are provided in Appendix&nbsp;1).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2209" data-test="inline-table" id="table-8"><figure data-dcnode-id="2210"><figcaption class="c-article-table__figcaption" data-dcnode-id="2221"><b data-dcnode-id="2222" data-test="table-caption" id="Tab8"><span data-dcnode-id="2226" instrument_node="">Table 8 Comparison of CART and OCT across a range of depths, showing the number of datasets for which each method had the highest out-of-sample accuracy, and the mean improvement in out-of-sample accuracy when using OCT across all datasets along with the </span><i data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">p</span></i><span data-dcnode-id="2223" instrument_node=""> value indicating the statistical significance of this difference</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2211"><a aria-label="Full size table 8" class="c-article__pill-button" data-dcnode-id="2212" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10994-017-5633-9/tables/8" rel="nofollow"><span data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2213" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2214" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2215" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2218" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2217" fill-rule="evenodd"></path><span data-dcnode-id="2216" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2208" instrument_node="">
