</span><div class="full_width_content__long-formatted-text" data-dcnode-id="1081"><h2 data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">BWL Tree Trimming</span></h2><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">We know the greater Lansing community takes pride in our&nbsp;neighborhoods, including our beautiful tree-lined streets. At BWL, we're committed to managing trees along easements and public rights-of-way to provide line clearance that ensures customer safety, safety for electric line crews&nbsp;and reliable electric power, while demonstrating respect for customers and their property.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">These resources explain how we work with community members to ensure our power lines are safe, secure and reliable.&nbsp;Check out the current status of our tree trimming program</span></p><span data-dcnode-id="1093" instrument_node="">
</span><h3 data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">How We Trim</span></h3><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1089" instrument_node="">All vegetation maintenance performed by BWL crews follows pruning standards approved by the American National Standards for Line Clearance. Our goal is to retain the health of trees and other vegetation, as we clear lines to ensure customer safety and system reliability. If you have questions about the tree trimming work in your neighborhood, please call </span><a data-dcnode-id="1087" href="tel:1-517-702-6552"><span data-dcnode-id="1088" instrument_node="">(517) 702-6552</span></a><span data-dcnode-id="1086" instrument_node="">.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">We strive to complete a tree trimming maintenance cycle throughout our service area every five years in order to provide clearance for power lines.&nbsp;</span></p></div><span data-dcnode-id="1080" instrument_node="">
</span></div><span data-dcnode-id="1078" instrument_node="">

</span><div class="full_width_content__long-formatted-text" data-dcnode-id="976"><h4 data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Dot Color Meaning</span></h4><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="993" instrument_node="">A blue dot on a tree indicates trimming is planned. A planned removal will be indicated by two blue dots on the tree.&nbsp;A red dot on a tree indicates it is a City of Lansing tree that is marked for removal. The City of Lansing Forestry can be reached at </span><a data-dcnode-id="991" href="tel:1-517-483-4218"><span data-dcnode-id="992" instrument_node="">(517) 483-4218</span></a><span data-dcnode-id="990" instrument_node="">.</span></p><span data-dcnode-id="988" instrument_node="">
</span><h4 data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Customer Notification</span></h4><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="984" instrument_node="">The BWL will mail a letter to customers when we begin planning and performing tree trimming in your neighborhood. </span><a class="file file--mime-application-pdf file--application-pdf" data-dcnode-id="982" data-entity-type="file" data-entity-uuid="86da6d9f-c21f-4e29-8e03-753eefea6853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/inline-files/TreeTrimmingLetter.pdf" target="_blank"><span data-dcnode-id="983" instrument_node="">Download a sample letter to get the full details</span></a><span data-dcnode-id="981" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">In the event a BWL employee came to your address and you were unavailable, a door card should be left in or near your door. There are three types of door cards, which are described below.&nbsp;</span></p></div><span data-dcnode-id="975" instrument_node="">
</span></div><span data-dcnode-id="973" instrument_node="">
</span><div class="paragraph--container paragraph--container-two-columns container--2col grid grid-2col" data-dcnode-id="938"><span data-dcnode-id="972" instrument_node="">
</span><div class="card grid-item" data-dcnode-id="954"><span data-dcnode-id="971" instrument_node="">
</span><h2 class="card__heading" data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">
                    Pink Door Cards

                </span></h2><span data-dcnode-id="968" instrument_node="">
</span><div class="card__content" data-dcnode-id="956"><span data-dcnode-id="967" instrument_node=""> </span><p data-dcnode-id="963"><strong data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Tree Maintenance Notification:</span></strong><span data-dcnode-id="964" instrument_node=""> Trees or tree limbs are touching power lines and need maintenance.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="958"><strong data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Sorry We Missed You:</span></strong><span data-dcnode-id="959" instrument_node=""> We responded to your possible line clearance problem and you were unavailable. BWL has inspected the trees and will "mark" on the card what they have found.</span></p><span data-dcnode-id="957" instrument_node="">
</span></div><span data-dcnode-id="955" instrument_node="">
</span></div><span data-dcnode-id="953" instrument_node="">

</span><div class="card__content" data-dcnode-id="942"><span data-dcnode-id="948" instrument_node=""> </span><p data-dcnode-id="944"><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Tree Maintenance Completed:</span></strong><span data-dcnode-id="945" instrument_node=""> All work is complete at your location.</span></p><span data-dcnode-id="943" instrument_node="">

</span><div class="collapse__content js-hidden" data-dcnode-id="909" role="region"><span data-dcnode-id="929" instrument_node="">
</span><div class="paragraph paragraph--type--full-width-content paragraph--view-mode--default" data-dcnode-id="911"><span data-dcnode-id="928" instrument_node="">
</span><div class="full_width_content__long-formatted-text" data-dcnode-id="913"><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">The BWL manages tree and vegetation growth along our electric line right of ways to ensure public and crew safety, as well as to provide reliable electric service to our customers. Falling trees and broken limbs are one of the major causes of power outages. The BWL has tree trimming trouble crews who respond to emergent tree concerns that could affect safety and reliability more immediately. Our tree trimming policy is based on the following:</span></p><span data-dcnode-id="925" instrument_node="">
</span><ul data-dcnode-id="914"><span data-dcnode-id="924" instrument_node="">
</span><li data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Best Management Practices for Utility Pruning of Trees</span></li><span data-dcnode-id="921" instrument_node="">
</span><li data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Trimming trees and brush in a manner that will provide adequate clearance from our electric lines for a 5-year period of time.</span></li><span data-dcnode-id="918" instrument_node="">
</span><li data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Trimming or removing of trees outside of the cutting zone is the customer’s responsibility</span></li><span data-dcnode-id="915" instrument_node="">
</span></ul></div><span data-dcnode-id="912" instrument_node="">
</span></div><span data-dcnode-id="910" instrument_node="">
</span></div><span data-dcnode-id="908" instrument_node="">
</span></div><span data-dcnode-id="906" instrument_node="">
</span><div class="collapse__item" data-dcnode-id="864"><span data-dcnode-id="905" instrument_node="">
</span><h2 class="collapse__heading" data-dcnode-id="900"><span data-dcnode-id="904" instrument_node="">
</span><button aria-expanded="false" class="collapse__button" data-dcnode-id="902" data-expand-content=""><span data-dcnode-id="903" instrument_node="">
          Clearing Tree Debris

      </span></button><span data-dcnode-id="901" instrument_node="">
</span></h2><span data-dcnode-id="899" instrument_node="">
</span><div class="collapse__content js-hidden" data-dcnode-id="866" role="region"><span data-dcnode-id="898" instrument_node="">
</span><div class="paragraph paragraph--type--full-width-content paragraph--view-mode--default" data-dcnode-id="868"><span data-dcnode-id="897" instrument_node="">
</span><div class="full_width_content__long-formatted-text" data-dcnode-id="870"><h4 data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Wood Practices</span></h4><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Trimming crews will remove wood and brush that is 4 inches in diameter or less during maintenance trimming. Wood wider than 4 inches in diameter will be cut into handling lengths and left for the property owner. The customer is responsible for removal.</span></p><span data-dcnode-id="891" instrument_node="">
</span><h4 data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Stump Treatment Practices</span></h4><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Certified trimmers apply herbicides according to state and federal regulations. Stump treatment is regularly performed, as untreated stumps grow shoots covered with foliage.</span></p><span data-dcnode-id="885" instrument_node="">
</span><h4 data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Storm Debris</span></h4><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">When severe weather comes through our area, tree limbs can sometimes bring down our power lines. When this happens, we need to work quickly to restore electric service to the affected homes and businesses. Problem trees will be cut so our line crews can make needed repairs. However, the BWL does not pick up brush or cut wood into handling lengths as a result of storm damage.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">The tree debris, brush and wood will be left on your property so we can continue to the next site that needs our attention.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="875" instrument_node="">Please wait until all electric line repairs are complete before cleaning up your yard. Hazardous, energized electric lines could be hidden under your brush. If you see a downed line, please stay at least 25 feet away and call us immediately at </span><a data-dcnode-id="873" href="tel:1-877-295-5001"><span data-dcnode-id="874" instrument_node="">(877) 295-5001</span></a><span data-dcnode-id="872" instrument_node="">.</span></p></div><span data-dcnode-id="869" instrument_node="">
</span></div><span data-dcnode-id="867" instrument_node="">
</span></div><span data-dcnode-id="865" instrument_node="">
</span></div><span data-dcnode-id="863" instrument_node="">
</span><div class="collapse__item" data-dcnode-id="769"><span data-dcnode-id="862" instrument_node="">
</span><h2 class="collapse__heading" data-dcnode-id="857"><span data-dcnode-id="861" instrument_node="">
</span><button aria-expanded="false" class="collapse__button" data-dcnode-id="859" data-expand-content=""><span data-dcnode-id="860" instrument_node="">
          Planting Trees

      </span></button><span data-dcnode-id="858" instrument_node="">
</span></h2><span data-dcnode-id="856" instrument_node="">
</span><div class="collapse__content js-hidden" data-dcnode-id="771" role="region"><span data-dcnode-id="855" instrument_node="">
</span><div class="paragraph paragraph--type--full-width-content paragraph--view-mode--default" data-dcnode-id="843"><span data-dcnode-id="854" instrument_node="">
</span><div class="full_width_content__long-formatted-text" data-dcnode-id="845"><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Trees are a valuable part of where we live, helping to moderate our weather along with supplying us with life giving oxygen. When you consider planting a new tree at your home, please allow us to assist you. Together, we can add value to your home for years to come.</span></p><span data-dcnode-id="851" instrument_node="">
</span><h4 data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Guidelines for Planting Trees</span></h4><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Consider the type, location, and eventual height of the trees to improve safety and electric reliability. Pay attention to where you plant each tree to enhance the value of your property, save energy costs, and prevent costly maintenance trimming or potential damage to your home.</span></p></div><span data-dcnode-id="844" instrument_node="">
</span></div><span data-dcnode-id="842" instrument_node="">
</span><div class="grid grid-2col grid-gutter content-with-image" data-dcnode-id="813"><span data-dcnode-id="841" instrument_node="">
</span><div class="content-with-image__content grid-item" data-dcnode-id="823"><span data-dcnode-id="840" instrument_node="">
</span><div class="content_with_image__long-formatted-text" data-dcnode-id="825"><h4 data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Tree Clearance</span></h4><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">We encourage you to plan your landscaping with our clearances in mind. Remember to consider how much the landscaping will spread as it matures, because we must trim or remove foliage or structures that invade these clearances.</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="833" instrument_node="">Before you dig, call Miss Dig at </span><a data-dcnode-id="831" href="tel:1-800-482-7171"><span data-dcnode-id="832" instrument_node="">1-800-482-7171</span></a><span data-dcnode-id="830" instrument_node=""> to locate all underground utilities. Please call this free service three full work days before you dig or plant trees.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">We are a member of the American Public Power Association's TREE POWER program to improve the environment and promote energy conservation. We can help you plant the right tree in the right place and maintain it. Download a brochure&nbsp;about our tree trimming program.</span></p></div><span data-dcnode-id="824" instrument_node="">
</span></div><span data-dcnode-id="822" instrument_node="">
</span><div class="content-with-image__image grid-item" data-dcnode-id="815"><span data-dcnode-id="821" instrument_node="">

</span><h2 class="collapse__heading" data-dcnode-id="762"><span data-dcnode-id="766" instrument_node="">
</span><button aria-expanded="false" class="collapse__button" data-dcnode-id="764" data-expand-content=""><span data-dcnode-id="765" instrument_node="">
          Underground Electricity

      </span></button><span data-dcnode-id="763" instrument_node="">
</span></h2><span data-dcnode-id="761" instrument_node="">
</span><div class="collapse__content js-hidden" data-dcnode-id="738" role="region"><span data-dcnode-id="760" instrument_node="">
</span><div class="paragraph paragraph--type--full-width-content paragraph--view-mode--default" data-dcnode-id="740"><span data-dcnode-id="759" instrument_node="">
</span><div class="full_width_content__long-formatted-text" data-dcnode-id="742"><p data-dcnode-id="755"><strong data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Some power lines are located underground</span></strong><span data-dcnode-id="756" instrument_node="">&nbsp;and the BWL has transformers that connect and regulate an underground service.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">These transformers require periodic maintenance, and therefore it’s important your landscaping doesn’t obstruct access. We require an 8-foot clearance from the front of the transformer cabinet, as well as a 3-foot clearance around the back and the sides.</span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Our transformer boxes contain stickers to keep you informed of instructions and dangers pertaining to the underground utility.</span></p><span data-dcnode-id="748" instrument_node="">
</span><h4 data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Underground Electric</span></h4><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Customers often ask about having their electric service converted to underground to eliminate the need for tree trimming. Installing underground facilities may require boring under or near trees, which can damage the root system of the tree. Please keep in mind, if a tree is planted over our underground service and the service fails, the tree may have to be removed to access the underground cable. Underground electric is also more expensive and not always possible to install.</span></p></div><span data-dcnode-id="741" instrument_node="">
</span></div><span data-dcnode-id="739" instrument_node="">
</span></div><span data-dcnode-id="737" instrument_node="">
</span></div><span data-dcnode-id="735" instrument_node="">
</span><div class="collapse__item" data-dcnode-id="640"><span data-dcnode-id="734" instrument_node="">

</span><button aria-expanded="false" class="collapse__button" data-dcnode-id="731" data-expand-content=""><span data-dcnode-id="732" instrument_node="">
          Wood Salvage Contacts

      </span></button><span data-dcnode-id="730" instrument_node="">

</span><div class="paragraph paragraph--type--full-width-content paragraph--view-mode--default" data-dcnode-id="644"><span data-dcnode-id="726" instrument_node="">
</span><div class="full_width_content__long-formatted-text" data-dcnode-id="646"><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">The BWL does not remove wood or wood debris from tree trimming activities, including after a storm. Individuals have expressed an interest in salvaging wood from the BWL’s tree trimming activities.&nbsp;Customers can contact individuals available and willing to salvage wood from customer properties. The BWL makes no recommendations of these individuals, and customers should make arrangements at their own risk.</span></p><span data-dcnode-id="723" instrument_node="">
