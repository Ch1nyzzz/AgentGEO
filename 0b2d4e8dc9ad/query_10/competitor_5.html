</span><p data-dcnode-id="1245"><span data-dcnode-id="1252" instrument_node="">Also known as hand pruners, </span><a data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.familyhandyman.com/list/pruning-tools/"><span data-dcnode-id="1251" instrument_node="">pruning shears</span></a><span data-dcnode-id="1249" instrument_node=""> or pruners, these glorified scissors cut through branches between one and two inches thick. Lou Meyer, an arborist for Davey Tree Company in greater Baltimore, calls them the most basic starter tool for </span><a data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.familyhandyman.com/project/tree-pruning-techniques/"><span data-dcnode-id="1248" instrument_node="">tree trimming</span></a><span data-dcnode-id="1246" instrument_node="">.</span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Bypass hand shears work like traditional scissors, with one blade bypassing a blunt side to slice the branch off the tree. Meyer prefers these to anvil shears, which have one straight blade that closes onto a flat edge. Meyer says an anvil shears sometimes crushes the branch. Bypass hand shears take the branch off in one clean cut, allowing the tree heal faster.</span></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1240" instrument_node="">The </span><a data-content-rating="" data-dcnode-id="1238" data-product-category="Lawn &amp; Patio" data-product-name="FELCO F2 Professional Pruning Shears with Leather Clip or Belt Holster (Bundle, 2 Items)" data-product-price="78.8" data-product-retailer="Sanver Supply, LLC" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B07XF81BP3/%3Fots%3D1%26tag%3Dfhmeag-20" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1239" instrument_node="">Felco F2 bypass shears</span></a><span data-dcnode-id="1237" instrument_node=""> are the longtime gold standard in hand shears, Meyer says. They cost around $70, but will last a lifetime with some TLC — a little bit of WD-40, steel wool for cleaning off sap, and a flat hand file for occasional sharpening.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p class="listicle-page__cta-button-shop" data-dcnode-id="1232"><a class="shop-btn" data-content-rating="" data-dcnode-id="1233" data-product-category="Lawn &amp; Patio" data-product-name="FELCO F2 Professional Pruning Shears with Leather Clip or Belt Holster (Bundle, 2 Items)" data-product-price="78.8" data-product-retailer="Sanver Supply, LLC" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B07XF81BP3/%3Fots%3D1%26tag%3Dfhmeag-20" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1234" instrument_node="">Shop Now</span></a></p><span data-dcnode-id="1231" instrument_node="">

</span><h2 data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Loppers</span></h2><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1175"><a data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.familyhandyman.com/article/homeowners-guide-to-tree-pruners-and-loppers/"><span data-dcnode-id="1181" instrument_node="">Loppers</span></a><span data-dcnode-id="1179" instrument_node=""> work like hand shears, but with longer handles and blades to cut through branches up to three inches thick. You need both hands to work the handles, which are about two to three feet long. This extra length is helpful for </span><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.familyhandyman.com/article/garden-pruning-guide/"><span data-dcnode-id="1178" instrument_node="">trimming branches</span></a><span data-dcnode-id="1176" instrument_node=""> above your head or in awkward spots. Again, Meyer prefers the bypass blades over anvil blades for a cleaner cut.</span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1173" instrument_node="">Meyer’s go-to brand for loppers is A.M. Leonard. Their </span><a data-content-rating="" data-dcnode-id="1171" data-product-category="Home Improvement" data-product-name="A.M. Leonard Professional Lifetime Loppers, 2 Inch Cutting Capacity (34 Inches Long)" data-product-price="" data-product-retailer="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B01N38GUCE/%3Fots%3D1%26tag%3Dfhmeag-20" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1172" instrument_node="">Lifetime Loppers </span></a><span data-dcnode-id="1170" instrument_node="">, with two-inch cut capacity, have 34-inch handles that are lightweight yet durable. And the blades are replaceable.</span></p><span data-dcnode-id="1168" instrument_node="">

handyman.com/wp-content/uploads/2021/07/pole-pruner-61PLJYE6atL._AC_SL1500_.jpg?fit=700,700" alt="Pole Pruner" width="700" height="700" srcset="https://www.familyhandyman.com/wp-content/uploads/2021/07/pole-pruner-61PLJYE6atL._AC_SL1500_.jpg?resize=700,700 700w, https://www.familyhandyman.com/wp-content/uploads/2021/07/pole-pruner-61PLJYE6atL._AC_SL1500_.jpg?resize=300,300 300w, https://www.familyhandyman.com/wp-content/uploads/2021/07/pole-pruner-61PLJYE6atL._AC_SL1500_.jpg?resize=150,150 150w, https://www.familyhandyman.com/wp-content/uploads/2021/07/pole-pruner-61PLJYE6atL._AC_SL1500_.jpg?resize=768,768 768w, https://www.familyhandyman.com/wp-content/uploads/2021/07/pole-pruner-61PLJYE6atL._AC_SL1500_.jpg?resize=568,568 568w, https://www.familyhandyman.com/wp-content/uploads/2021/07/pole-pruner-61PLJYE6atL._AC_SL1500_.jpg?resize=522,522 522w, https://www.familyhandyman.com/wp-content/uploads/2021/07/pole-pruner-61PLJYE6atL._AC_SL1500_.jpg?resize=185,185 185w, https://www.familyhandyman.com/wp-content/uploads/2021/07/pole-pruner-61PLJYE6atL._AC_SL1500_.jpg?resize=295,295 295w, https://www.familyhandyman.com/wp-content/uploads/2021/07/pole-pruner-61PLJYE6atL._AC_SL1500_.jpg?resize=350,350 350w, https://www.familyhandyman.com/wp-content/uploads/2021/07/pole-pruner-61PLJYE6atL._AC_SL1500_.jpg?w=1200 1200w" sizes="(max-width: 700px) 100vw, 700px" data-image-analytics='{"licensorName":"not available","credits":"via amazon.com"}' data-image-analytics='{"licensorName":"not available","credits":"via amazon.com"}' data-recalc-dims="1" /&gt;</span></noscript><span class="credits-overlay" data-dcnode-id="1106"><span class="image-credit noskim" data-dcnode-id="1107"><a class="image-credit-link" data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Jameson-FG-6PKG-7-Manual-Pruner-Fiberglass/dp/B01FY0CUIK/%3Fots%3D1%26tag%3Dfhmeag-20" rel="nofollow" target="_blank"><span data-dcnode-id="1109" instrument_node="">via amazon.com</span></a></span></span></p><span data-dcnode-id="1104" instrument_node="">

</span><h2 data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Pole Pruners</span></h2><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Pole pruners are handy for reaching two- to three-inch-thick branches that are well above your head. The pole averages about eight feet long, but Meyer says you can also buy telescoping pole pruners or connect multiple pole pruners to reach as high as 30 feet.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">The pruning blades are at the top of the pole, and a string or thin rope runs the length of the pole. With one hand on the pole, you pull the string with the other hand to make the blades snip the branch. You should be able to trim the branch with one cut, or one pull of the string.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1092" instrument_node="">If you need more than one person to operate the tool, or are exerting a lot of energy to make the cut, Meyer says you need different pruners or your </span><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.familyhandyman.com/list/garden-tool-sharpening/"><span data-dcnode-id="1091" instrument_node="">blades need sharpening</span></a><span data-dcnode-id="1089" instrument_node="">.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1086" instrument_node="">Some pole pruners come with attachments to convert them into pole saws, which work well for high branches up to five inches thick. This </span><a data-content-rating="" data-dcnode-id="1084" data-product-category="Tools" data-product-name="Jameson FG-6PKG-7 FG-Series Manual Pole Saw and Tree Pruner with Two 6-Foot Fiberglass Poles" data-product-price="239.99" data-product-retailer="industrialproductsltd" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Jameson-FG-6PKG-7-Manual-Pruner-Fiberglass/dp/B01FY0CUIK/%3Fots%3D1%26tag%3Dfhmeag-20" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1085" instrument_node="">pole saw kit from Jameson</span></a><span data-dcnode-id="1083" instrument_node=""> includes two six-foot poles to double your reach.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Don’t stand directly under the branch you’re cutting to avoid a good bonk on the head. Meyer says you can also use a grab pole to methodically lower the branch to the ground.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p class="listicle-page__cta-button-shop" data-dcnode-id="1075"><a class="shop-btn" data-content-rating="" data-dcnode-id="1076" data-product-category="Tools" data-product-name="Jameson FG-6PKG-7 FG-Series Manual Pole Saw and Tree Pruner with Two 6-Foot Fiberglass Poles" data-product-price="239.99" data-product-retailer="industrialproductsltd" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Jameson-FG-6PKG-7-Manual-Pruner-Fiberglass/dp/B01FY0CUIK/%3Fots%3D1%26tag%3Dfhmeag-20" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1077" instrument_node="">Shop Now</span></a></p><span data-dcnode-id="1074" instrument_node="">

w" width="700" height="700" srcset="https://www.familyhandyman.com/wp-content/uploads/2021/07/hand-saw-51WUdK4iIbL._AC_SL1000_.jpg?resize=700,700 700w, https://www.familyhandyman.com/wp-content/uploads/2021/07/hand-saw-51WUdK4iIbL._AC_SL1000_.jpg?resize=300,300 300w, https://www.familyhandyman.com/wp-content/uploads/2021/07/hand-saw-51WUdK4iIbL._AC_SL1000_.jpg?resize=150,150 150w, https://www.familyhandyman.com/wp-content/uploads/2021/07/hand-saw-51WUdK4iIbL._AC_SL1000_.jpg?resize=768,768 768w, https://www.familyhandyman.com/wp-content/uploads/2021/07/hand-saw-51WUdK4iIbL._AC_SL1000_.jpg?resize=568,568 568w, https://www.familyhandyman.com/wp-content/uploads/2021/07/hand-saw-51WUdK4iIbL._AC_SL1000_.jpg?resize=522,522 522w, https://www.familyhandyman.com/wp-content/uploads/2021/07/hand-saw-51WUdK4iIbL._AC_SL1000_.jpg?resize=185,185 185w, https://www.familyhandyman.com/wp-content/uploads/2021/07/hand-saw-51WUdK4iIbL._AC_SL1000_.jpg?resize=295,295 295w, https://www.familyhandyman.com/wp-content/uploads/2021/07/hand-saw-51WUdK4iIbL._AC_SL1000_.jpg?resize=350,350 350w, https://www.familyhandyman.com/wp-content/uploads/2021/07/hand-saw-51WUdK4iIbL._AC_SL1000_.jpg?w=1200 1200w" sizes="(max-width: 700px) 100vw, 700px" data-image-analytics='{"licensorName":"not available","credits":"via amazon.com"}' data-image-analytics='{"licensorName":"not available","credits":"via amazon.com"}' data-recalc-dims="1" /&gt;</span></noscript><span class="credits-overlay" data-dcnode-id="1049"><span class="image-credit noskim" data-dcnode-id="1050"><a class="image-credit-link" data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B005X5WRC6/%3Fots%3D1%26tag%3Dfhmeag-20" rel="nofollow" target="_blank"><span data-dcnode-id="1052" instrument_node="">via amazon.com</span></a></span></span></p><span data-dcnode-id="1047" instrument_node="">

</span><h2 data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Hand Saw</span></h2><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1041" instrument_node="">Hand saws are helpful for tackling branches up to five inches thick whether you’re standing on the ground or aloft. They come in inexpensive folding versions, or you can spend as much as $150 on one, Meyer says. This </span><a data-content-rating="" data-dcnode-id="1039" data-product-category="Lawn &amp; Patio" data-product-name="Fiskars 15 Inch Pruning Saw with Handle" data-product-price="24.88" data-product-retailer="Amazon.com" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B005X5WRC6/%3Fots%3D1%26tag%3Dfhmeag-20" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1040" instrument_node="">Fiskars hand saw</span></a><span data-dcnode-id="1038" instrument_node=""> is highly rated and a best seller.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1035" instrument_node="">Hand saws can cut on the push stroke, the pull stroke or both. A push saw makes the cut while you’re pushing the saw away from you, and a pull saw makes the cut while you’re pulling the saw toward your body. Meyer says a pull saw is safer if you’re going to use it </span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.familyhandyman.com/article/leveling-your-ladder/"><span data-dcnode-id="1034" instrument_node="">on a ladder</span></a><span data-dcnode-id="1032" instrument_node=""> or in a tree so that you’re not pushing your body away from the tree.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">On the ground, plant your feet and use a push saw or a saw that cuts on both the pull and push strokes, like the Fiskars hand saw mentioned above.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p class="listicle-page__cta-button-shop" data-dcnode-id="1024"><a class="shop-btn" data-content-rating="" data-dcnode-id="1025" data-product-category="Lawn &amp; Patio" data-product-name="Fiskars 15 Inch Pruning Saw with Handle" data-product-price="24.88" data-product-retailer="Amazon.com" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B005X5WRC6/%3Fots%3D1%26tag%3Dfhmeag-20" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1026" instrument_node="">Shop Now</span></a></p><span data-dcnode-id="1023" instrument_node="">

arge wp-image-417579" src="https://www.familyhandyman.com/wp-content/uploads/2021/07/chainsaw-e36356eb-f093-46f6-9358-7a8e9080b8bd.jpg?fit=700,700" alt="Chainsaw" width="700" height="700" srcset="https://www.familyhandyman.com/wp-content/uploads/2021/07/chainsaw-e36356eb-f093-46f6-9358-7a8e9080b8bd.jpg?resize=700,700 700w, https://www.familyhandyman.com/wp-content/uploads/2021/07/chainsaw-e36356eb-f093-46f6-9358-7a8e9080b8bd.jpg?resize=300,300 300w, https://www.familyhandyman.com/wp-content/uploads/2021/07/chainsaw-e36356eb-f093-46f6-9358-7a8e9080b8bd.jpg?resize=150,150 150w, https://www.familyhandyman.com/wp-content/uploads/2021/07/chainsaw-e36356eb-f093-46f6-9358-7a8e9080b8bd.jpg?resize=768,768 768w, https://www.familyhandyman.com/wp-content/uploads/2021/07/chainsaw-e36356eb-f093-46f6-9358-7a8e9080b8bd.jpg?resize=568,568 568w, https://www.familyhandyman.com/wp-content/uploads/2021/07/chainsaw-e36356eb-f093-46f6-9358-7a8e9080b8bd.jpg?resize=522,522 522w, https://www.familyhandyman.com/wp-content/uploads/2021/07/chainsaw-e36356eb-f093-46f6-9358-7a8e9080b8bd.jpg?resize=185,185 185w, https://www.familyhandyman.com/wp-content/uploads/2021/07/chainsaw-e36356eb-f093-46f6-9358-7a8e9080b8bd.jpg?resize=295,295 295w, https://www.familyhandyman.com/wp-content/uploads/2021/07/chainsaw-e36356eb-f093-46f6-9358-7a8e9080b8bd.jpg?resize=350,350 350w, https://www.familyhandyman.com/wp-content/uploads/2021/07/chainsaw-e36356eb-f093-46f6-9358-7a8e9080b8bd.jpg?w=1200 1200w" sizes="(max-width: 700px) 100vw, 700px" data-image-analytics='{"licensorName":"not available","credits":"via acehardware.com"}' data-image-analytics='{"licensorName":"not available","credits":"via acehardware.com"}' data-recalc-dims="1" /&gt;</span></noscript><span class="credits-overlay" data-dcnode-id="998"><span class="image-credit noskim" data-dcnode-id="999"><a class="image-credit-link" data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acehardware.com/departments/lawn-and-garden/outdoor-power-equipment/chainsaws/7000560" rel="nofollow" target="_blank"><span data-dcnode-id="1001" instrument_node="">via acehardware.com</span></a></span></span></p><span data-dcnode-id="996" instrument_node="">
</span></div><span data-dcnode-id="994" instrument_node="">
</span><h2 data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Chainsaw</span></h2><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="990" instrument_node="">For branches and limbs thicker than five inches, it’s time to turn on the power. </span><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.familyhandyman.com/list/best-cordless-chain-saws/"><span data-dcnode-id="989" instrument_node="">Chainsaws have gas-powered engines</span></a><span data-dcnode-id="987" instrument_node=""> and a cutting bar that holds the chain.</span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="981"><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.familyhandyman.com/article/chainsaw-buying-guide/"><span data-dcnode-id="984" instrument_node="">Chainsaws</span></a><span data-dcnode-id="982" instrument_node=""> can have cutting bars as short as six inches or as long as 20 inches. The smaller chainsaws may also be electric instead of gas-powered. Meyer says electric chainsaws (which use a power cord or a rechargeable battery) are much quieter and vibrate less than gas-powered chainsaws.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">To figure out what size chainsaw you need, add two inches to the thickest branch or limb you need to cut. So if that’s a six-inch limb, you’ll need at least an eight-inch chainsaw.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="976" instrument_node="">Meyer likes Stihl and Husqvarna chainsaws for professionals and homeowners. </span><a data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acehardware.com/departments/lawn-and-garden/outdoor-power-equipment/chainsaws/7000560" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="975" instrument_node="">Stihl Farm Boss chainsaws</span></a><span data-dcnode-id="973" instrument_node=""> come with a cutting bar up to 20 inches long and earn top marks for their power. Stihl chainsaws are only sold through select dealers though, whereas </span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lowes.com/pl/Husqvarna--Gas-chainsaws-Chainsaws-pole-saws-Outdoor-tools-equipment-Outdoors/4294612756%3Frefinement%3D4294965511" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="972" instrument_node="">Husqvarnas are available at Lowe’s</span></a><span data-dcnode-id="970" instrument_node="">.</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="967" instrument_node="">Meyer says wearing closed-toe shoes and hearing protection are musts when using a chainsaw, which can register up to 130 decibels. (Anything higher than 80 decibels can cause hearing loss or damage). </span><a data-content-rating="" data-dcnode-id="965" data-product-category="Drugstore" data-product-name="Mack's Ultra Soft Foam Earplugs, 50 Pair - 33dB Highest NRR, Comfortable Ear Plugs for Sleeping, Snoring, Travel, Concerts, Studying, Loud Noise, Work" data-product-price="8.99" data-product-retailer="Amazon.com" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Macks-Ultra-Soft-Foam-Earplugs/dp/B0051U7W32%3Fots%3D1%26tag%3Dfhmeag-20" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="966" instrument_node="">Foam ear buds</span></a><span data-dcnode-id="964" instrument_node=""> or </span><a data-content-rating="" data-dcnode-id="962" data-product-category="Tools" data-product-name="Professional Safety Ear Muffs by Decibel Defense - 37dB NRR - The HIGHEST Rated &amp; MOST COMFORTABLE Ear Protection for Shooting &amp; Industrial Use - THE BEST HEARING PROTECTION...GUARANTEED" data-product-price="22.79" data-product-retailer="Dart Enterprises" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Professional-Safety-Muffs-Decibel-Defense/dp/B01BEENYCQ%3Fots%3D1%26tag%3Dfhmeag-20" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="963" instrument_node="">headphones</span></a><span data-dcnode-id="961" instrument_node=""> should do the trick.</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="955"><a data-content-rating="" data-dcnode-id="957" data-product-category="Lawn &amp; Patio" data-product-name="Husqvarna 587160703 Functional Chaps, 40 to 42-Inch, Black" data-product-price="81.99" data-product-retailer="Amazon.com" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Husqvarna-Functional-Apron-Chap-42-Inch/dp/B00TZXUJB8%3Fots%3D1%26tag%3Dfhmeag-20" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="958" instrument_node="">Chainsaw chaps</span></a><span data-dcnode-id="956" instrument_node="">&nbsp;are also helpful. The material is stringy so if a chainsaw cuts through it, the fabric jams the chain and stops the saw from inflicting a potentially life-threatening injury.</span></p><span data-dcnode-id="954" instrument_node="">
