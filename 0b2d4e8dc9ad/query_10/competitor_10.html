</span><p class="header2" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Objectives</span></p><span data-dcnode-id="1427" instrument_node="">
</span><ol data-dcnode-id="1419"><span data-dcnode-id="1426" instrument_node="">
</span><li data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Identify environmental hazards. </span></li><span data-dcnode-id="1423" instrument_node="">
</span><li data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node=""> Recognize treatment and first aid for exposure to environmental hazards.</span></li><span data-dcnode-id="1420" instrument_node="">
</span></ol><span data-dcnode-id="1418" instrument_node="">
</span><p class="header2" data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Heat Stress</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">You can become seriously ill or die if you do not take the proper precautions while working in high temperatures and humidity. Heat can reduce physical performance, as well as mental alertness, causing more accidents.</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1409"><b data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Heat Facts </span></b></p><span data-dcnode-id="1408" instrument_node="">
</span><ul data-dcnode-id="1360"><span data-dcnode-id="1407" instrument_node="">
</span><li data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">You are more likely to suffer from a heat related illness on humid days. </span></li><span data-dcnode-id="1404" instrument_node="">
</span><li data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">If you are not used to working in the heat, you are more likely to suffer from a heat related illness. It can take your body anywhere from 5 days to 2 weeks to be acclimated to working in the heat. It is recommended that new workers who begin in hot, humid weather, start out by working half of the normal time and workload on the first day and then build up to a complete day by the end of the week. </span></li><span data-dcnode-id="1401" instrument_node="">
</span><li data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">You are more vulnerable to heat illness if you have suffered in the past. </span></li><span data-dcnode-id="1398" instrument_node="">
</span><li data-dcnode-id="1362"><span data-dcnode-id="1397" instrument_node="">During the course of the day, you can produce as much as 2 to 3 gallons of sweat. Replenish this fluid by drinking liquids so that you do not suffer from a heat related illness.</span><br data-dcnode-id="1396"><span data-dcnode-id="1395" instrument_node="">
</span><br data-dcnode-id="1394"><span data-dcnode-id="1393" instrument_node="">
</span><span data-dcnode-id="1392" instrument_node="">
</span><span data-dcnode-id="1391" instrument_node="">
</span><span data-dcnode-id="1385" instrument_node="">
</span><span data-dcnode-id="1383" instrument_node="">
</span><span data-dcnode-id="1382" instrument_node="">
</span><span data-dcnode-id="1368" instrument_node="">
</span><span data-dcnode-id="1366" instrument_node="">
</span><table align="center" border="1" cellspacing="0" data-dcnode-id="1364" width="439"><tbody data-dcnode-id="1365"><tr data-dcnode-id="1384"><td bgcolor="#CCCCCC" data-dcnode-id="1386" width="433"><b data-dcnode-id="1387"><span data-dcnode-id="1390" instrument_node="">Accident Report</span><br data-dcnode-id="1389"><span data-dcnode-id="1388" instrument_node="">
            Employee Dies of Heat Stroke</span></b></td></tr><tr data-dcnode-id="1367"><td data-dcnode-id="1369"><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Summary of OSHA Accident Inspection 014444699 </span></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">An employee was dragging tree branches and feeding them into the chipper. Shortly before noon, the temperature had risen into the 80s. The employee became overheated and collapsed. He was taken to the hospital where he was pronounced dead due to heat stroke.</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1370"><img align="left" alt=" " data-dcnode-id="1375" height="45" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/2.gif&amp;raw" width="50"><b data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Take frequent, short breaks and drink plenty of water to keep yourself cool and hydrated.</span></b><br data-dcnode-id="1372"><span data-dcnode-id="1371" instrument_node="">
</span></p></td></tr></tbody></table><span data-dcnode-id="1363" instrument_node="">
</span></li><span data-dcnode-id="1361" instrument_node="">
</span></ul><span data-dcnode-id="1359" instrument_node="">
</span><p class="header2" data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">What to Do If Someone's Suffering from a Heat Illness </span></p><span data-dcnode-id="1356" instrument_node="">
</span><ul data-dcnode-id="1342"><span data-dcnode-id="1355" instrument_node="">
</span><li data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">If someone feels overheated, move them into a cooler, preferably air conditioned area. Watch the person and seek medical attention if needed. </span></li><span data-dcnode-id="1352" instrument_node="">
</span><li data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Fan the person in order to increase cooling. </span></li><span data-dcnode-id="1349" instrument_node="">
</span><li data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Have the person drink plenty of fluids. </span></li><span data-dcnode-id="1346" instrument_node="">
</span><li data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">If the person goes into convulsions or shows symptoms of heat stroke, call 911 immediately and take steps to cool them down such as soaking their clothing in cool water.</span></li><span data-dcnode-id="1343" instrument_node="">
</span></ul><span data-dcnode-id="1341" instrument_node="">
</span><span data-dcnode-id="1340" instrument_node="">
</span><span data-dcnode-id="1339" instrument_node="">
</span><span data-dcnode-id="1314" instrument_node="">
</span><span data-dcnode-id="1286" instrument_node="">
</span><span data-dcnode-id="1284" instrument_node="">
</span><table align="center" border="0" cellpadding="5" data-dcnode-id="1282" width="500"><tbody data-dcnode-id="1283"><tr data-dcnode-id="1285" valign="top"><td data-dcnode-id="1315" height="201" width="231"><p data-dcnode-id="1334"><b data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Heat Exhaustion Symptoms </span></b><br data-dcnode-id="1336"><span data-dcnode-id="1335" instrument_node="">
        Heat exhaustion is a serious illness and needs to be treated immediately before a heat stroke occurs. If you or a coworker experience any of the following symptoms, cool off immediately and drink plenty of water.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><ul data-dcnode-id="1316"><span data-dcnode-id="1332" instrument_node="">
</span><li data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node=""> Dizziness </span></li><span data-dcnode-id="1329" instrument_node="">
</span><li data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Light headedness </span></li><span data-dcnode-id="1326" instrument_node="">
</span><li data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Headache </span></li><span data-dcnode-id="1323" instrument_node="">
</span><li data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Feeling weak, fatigued </span></li><span data-dcnode-id="1320" instrument_node="">
</span><li data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Clammy and moist skin</span></li><span data-dcnode-id="1317" instrument_node="">
</span></ul></td><td data-dcnode-id="1287" width="259"><p data-dcnode-id="1309"><b data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Heat Stroke Symptoms </span></b><br data-dcnode-id="1311"><span data-dcnode-id="1310" instrument_node="">
        Heat Stroke is a medical emergency that can become fatal. If anyone experiences the following symptoms of heat stroke, call 911 immediately.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><ul data-dcnode-id="1288"><span data-dcnode-id="1307" instrument_node="">
</span><li data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Hot, dry, red skin (not sweaty) </span></li><span data-dcnode-id="1304" instrument_node="">
</span><li data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Disorientation </span></li><span data-dcnode-id="1301" instrument_node="">
</span><li data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Confusion </span></li><span data-dcnode-id="1298" instrument_node="">
</span><li data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Body temperature greater than 105° F </span></li><span data-dcnode-id="1295" instrument_node="">
</span><li data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Convulsing </span></li><span data-dcnode-id="1292" instrument_node="">
</span><li data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Unconsciousness</span></li><span data-dcnode-id="1289" instrument_node="">
</span></ul></td></tr></tbody></table><span data-dcnode-id="1281" instrument_node="">
</span><p class="header2" data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Avoid Heat Related Illnesses </span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">It is important to keep yourself hydrated and cool while working outside. </span></p><span data-dcnode-id="1275" instrument_node="">
</span><ul data-dcnode-id="1246"><span data-dcnode-id="1274" instrument_node="">
</span><li data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Drink water often throughout the day; don't wait until you're thirsty to get a drink. At least a quart of water per hour is recommended. Sports drinks can also be consumed to replace electrolytes lost through dehydration.</span></li><span data-dcnode-id="1271" instrument_node="">
</span><li data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Stay away from soda, coffee, tea and alcoholic drinks that dehydrate the body. </span></li><span data-dcnode-id="1268" instrument_node="">
</span><li data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Avoid large meals before working in the heat. </span></li><span data-dcnode-id="1265" instrument_node="">
</span><li data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Some prescriptions can make you more susceptible to heat illnesses. Check with your doctor or pharmacist to see if any medicine you are taking could affect you while working in the heat. </span></li><span data-dcnode-id="1262" instrument_node="">
</span><li data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Wear light-weight fabric, such as cotton, to help keep your body cool. </span></li><span data-dcnode-id="1259" instrument_node="">
</span><li data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Wear a hat or sun visor on sunny days to help control body temperature. </span></li><span data-dcnode-id="1256" instrument_node="">
</span><li data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Plan to do the heaviest work at the coolest part of the day. This is usually between 6 a.m. and 10 a.m. </span></li><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Take frequent, short breaks in shaded areas to cool down. </span></li><span data-dcnode-id="1250" instrument_node="">
</span><li data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Do not take salt tablets, unless recommended by your doctor. Most people receive enough salt in their diet to account for the salt that is lost through sweating.</span></li><span data-dcnode-id="1247" instrument_node="">
</span></ul><span data-dcnode-id="1245" instrument_node="">
</span><p class="header2" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Sun Exposure </span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Prolonged exposure to sunlight causes skin cancer, cataracts and other serious illnesses. </span></p><span data-dcnode-id="1239" instrument_node="">
</span><ul data-dcnode-id="1231"><span data-dcnode-id="1238" instrument_node="">
</span><li data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Choose a sunscreen that is marked broad-spectrum. This will protect you from both UVA and UVB rays. Ensure the Sun Protection Factor (SPF) is at least 15. </span></li><span data-dcnode-id="1235" instrument_node="">
</span><li data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node=""> Wear a hat or sun visor, sunglasses, and lightweight long-sleeve shirts and pants on sunny days to help control body temperature and block the sun.</span></li><span data-dcnode-id="1232" instrument_node="">
</span></ul><span data-dcnode-id="1230" instrument_node="">
</span><p class="header2" data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Lightning Precautions </span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Lightning strikes injure and kill hundreds of people each year. Follow these precautions to help keep you safe when the weather turns bad. </span></p><span data-dcnode-id="1224" instrument_node="">
</span><ul data-dcnode-id="1213"><span data-dcnode-id="1223" instrument_node="">
</span><li data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">As soon as you hear thunder, shut off and put away equipment and move indoors out of the storm. When you are able to hear thunder, you are able to be struck by lightning. Lightning can strike even when it's not raining. </span></li><span data-dcnode-id="1220" instrument_node="">
</span><li data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">The cab of an enclosed vehicle provides some protection from lightning but a sturdy building provides the best protection. </span></li><span data-dcnode-id="1217" instrument_node="">
</span><li data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Listen to the radio for weather updates and storm warnings.</span></li><span data-dcnode-id="1214" instrument_node="">
</span></ul><span data-dcnode-id="1212" instrument_node="">
</span><p class="header2" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">If You Can't Take Cover Inside </span></p><span data-dcnode-id="1209" instrument_node="">
</span><ul data-dcnode-id="1195"><span data-dcnode-id="1208" instrument_node="">
</span><li data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Get to a low space. Lightning strikes the tallest objects. </span></li><span data-dcnode-id="1205" instrument_node="">
</span><li data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Crouch down on the balls of your feet. Place your hands on your knees and lower your head between your knees. </span></li><span data-dcnode-id="1202" instrument_node="">
</span><li data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Minimize contact with the ground. </span></li><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Do not lie flat on the ground. This will make you a larger target.</span></li><span data-dcnode-id="1196" instrument_node="">
</span></ul><span data-dcnode-id="1194" instrument_node="">
</span><p class="header2" data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Keep Away From</span></p><span data-dcnode-id="1191" instrument_node="">
</span><ul data-dcnode-id="1180"><span data-dcnode-id="1190" instrument_node="">
</span><li data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node=""> Large, lone trees and towers, fences, telephone poles and power lines. </span></li><span data-dcnode-id="1187" instrument_node="">
</span><li data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Rivers, lakes, pools and other bodies of water. </span></li><span data-dcnode-id="1184" instrument_node="">
</span><li data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Metal objects, tools, equipment, wire fences and umbrellas.</span></li><span data-dcnode-id="1181" instrument_node="">
</span></ul><span data-dcnode-id="1179" instrument_node="">
</span><p class="header2" data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">If Someone is Struck by Lightning </span></p><span data-dcnode-id="1176" instrument_node="">
</span><ul data-dcnode-id="1157"><span data-dcnode-id="1175" instrument_node="">
</span><li data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Call 911 </span></li><span data-dcnode-id="1172" instrument_node="">
</span><li data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Check to see if they're breathing. Rescue breathing or CPR may be required. </span></li><span data-dcnode-id="1169" instrument_node="">
</span><li data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Check for burns on their body. </span></li><span data-dcnode-id="1166" instrument_node="">
</span><li data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Move the victim inside, out of the storm. </span></li><span data-dcnode-id="1163" instrument_node="">
</span><li data-dcnode-id="1159"><i data-dcnode-id="1160"><b data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Note: Most lightning-strike victims survive with immediate treatment and rescue breathing or CPR.</span></b></i></li><span data-dcnode-id="1158" instrument_node="">
</span></ul><span data-dcnode-id="1156" instrument_node="">

</span><table align="center" border="0" data-dcnode-id="1101" width="273"><tbody data-dcnode-id="1102"><tr bgcolor="#D4D0C8" data-dcnode-id="1149"><td colspan="2" data-dcnode-id="1151"><b data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Lightning Facts</span></b></td></tr><tr data-dcnode-id="1140"><td data-dcnode-id="1145" width="31"><img alt=" " data-dcnode-id="1146" height="27" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/15.gif&amp;raw" width="26"></td><td data-dcnode-id="1142" width="281"><span data-dcnode-id="1143" instrument_node="">A person that is struck by lightning DOES NOT retain an electric charge that can shock you.</span></td></tr><tr data-dcnode-id="1131"><td data-dcnode-id="1136"><img alt=" " data-dcnode-id="1137" height="27" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/15.gif&amp;raw" width="26"></td><td data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Lightning can spread as far as 60 feet after striking the ground.</span></td></tr><tr data-dcnode-id="1122"><td data-dcnode-id="1127"><img alt=" " data-dcnode-id="1128" height="27" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/15.gif&amp;raw" width="26"></td><td data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Lightning can travel at speeds of 100,000 mph.</span></td></tr><tr data-dcnode-id="1113"><td data-dcnode-id="1118"><img alt=" " data-dcnode-id="1119" height="27" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/15.gif&amp;raw" width="26"></td><td data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">The temperature of a bolt of lightning can be as high as 50,000° F.</span></td></tr><tr data-dcnode-id="1104"><td data-dcnode-id="1109"><img alt=" " data-dcnode-id="1110" height="27" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/15.gif&amp;raw" width="26"></td><td data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Lightning CAN strike the same place twice.</span></td></tr></tbody></table><span data-dcnode-id="1100" instrument_node="">
</span><p class="header2" data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Cold Induced Injuries and Illnesses </span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Prolonged exposure to freezing temperatures can result in cold induced injuries and illnesses that can seriously injure or kill you. </span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Cold temperatures reduce mental alertness and cause fatigue and exhaustion that can lead to accidents.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1083"><b data-dcnode-id="1085"><span data-dcnode-id="1090" instrument_node="">Frostbite</span><br data-dcnode-id="1089"><span data-dcnode-id="1088" instrument_node="">
</span><br data-dcnode-id="1087"><span data-dcnode-id="1086" instrument_node="">
</span></b><span data-dcnode-id="1084" instrument_node="">Frostbite occurs when parts of the body become so cold that the skin and tissue freezes. Frostbite normally occurs on ears, nose, fingers, hands, toes and feet or other parts of the body that are left uncovered in below-freezing temperatures. Frostbitten skin becomes numb and turns a pale white color.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1074"><b data-dcnode-id="1076"><span data-dcnode-id="1081" instrument_node="">Hypothermia </span><br data-dcnode-id="1080"><span data-dcnode-id="1079" instrument_node="">
</span><br data-dcnode-id="1078"><span data-dcnode-id="1077" instrument_node="">
</span></b><span data-dcnode-id="1075" instrument_node="">Hypothermia occurs when a person's body temperature drops to or below 95° F. Common symptoms include bluish-colored skin, uncontrollable shivering and drowsiness or fatigue.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1070"><b data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Avoid Cold-Induced Injuries and Illnesses </span></b></p><span data-dcnode-id="1069" instrument_node="">
</span><ul data-dcnode-id="1049"><span data-dcnode-id="1068" instrument_node="">
</span><li data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Layer clothing when working in cold temperatures; you can easily take off layers if you are too warm. </span></li><span data-dcnode-id="1065" instrument_node="">
</span><li data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Wear a hat and gloves. </span></li><span data-dcnode-id="1062" instrument_node="">
</span><li data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Keep muscles warm and loose by moving as much as possible. </span></li><span data-dcnode-id="1059" instrument_node="">
</span><li data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Take frequent, short breaks in warm areas. </span></li><span data-dcnode-id="1056" instrument_node="">
</span><li data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Perform work at the warmest part of the day, typically in the afternoon. </span></li><span data-dcnode-id="1053" instrument_node="">
</span><li data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Never work alone.</span></li><span data-dcnode-id="1050" instrument_node="">
</span></ul><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1045"><b data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">What to Do If Someone's Suffering from a Cold-Induced Injury or Illness </span></b></p><span data-dcnode-id="1044" instrument_node="">
</span><ul data-dcnode-id="1030"><span data-dcnode-id="1043" instrument_node="">
</span><li data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Move the person out of the cold and into an area that is warm and dry. </span></li><span data-dcnode-id="1040" instrument_node="">
</span><li data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Remove wet and tight clothing and cover the person with a blanket. </span></li><span data-dcnode-id="1037" instrument_node="">
</span><li data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Never rub the affected area. This will cause further skin and tissue damage. </span></li><span data-dcnode-id="1034" instrument_node="">
</span><li data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Seek medical attention immediately.</span></li><span data-dcnode-id="1031" instrument_node="">
</span></ul><span data-dcnode-id="1029" instrument_node="">
</span><p class="header2" data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Insect Stings </span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Insect stings can be treated without medical attention unless the person suffers an allergic reaction. </span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">The first step to treating an insect sting is to remove the stinger. This can be done by using a straight edge to scrape off the stinger or by using tweezers to pull it out. If you choose to use tweezers to remove the stinger, use extreme caution to not puncture the protruding venom sac.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node=""> After the stinger has been removed, a cold pack can be used during the first 24 hours to suppress pain and swelling. Following the first 24 hours, heat should be applied if pain or swelling persist. </span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Those with severe allergies to insect stings should consult a physician about carrying a prescription medical kit. The kit contains medicine and instructions to be used if the person is stung. If the kit is used, the victim still must receive medical attention. Call for help or take them to the nearest hospital.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p class="header2" data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Snake Bites</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node=""> If you are bitten by a snake, seek medical attention immediately and try to describe the size and color of the snake to the doctor. This can help the doctor determine whether or not the snake was poisonous. Never cut, suck or apply cold packs to snake bites.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p class="header2" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Mammals </span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Be aware of animals such as squirrels or bats that may be in trees or bushes and startle you during work. Also, be cautious of animals such as rats, skunks and raccoons that could be rabid.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p class="header2" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Poison Ivy, Oak and Sumac</span></p><span data-dcnode-id="999" instrument_node="">
</span><ul data-dcnode-id="985"><span data-dcnode-id="998" instrument_node="">
</span><li data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Wash the affected area and all clothing and tools that may have touched the plant. </span></li><span data-dcnode-id="995" instrument_node="">
</span><li data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Avoid scratching the area if possible, to prevent infection. </span></li><span data-dcnode-id="992" instrument_node="">
</span><li data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Hot and cold compresses can be used to suppress itching. </span></li><span data-dcnode-id="989" instrument_node="">
</span><li data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Consult a doctor if the rash is on the face, inside the mouth or covers a large portion of the body.</span></li><span data-dcnode-id="986" instrument_node="">
</span></ul><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">&nbsp;</span></p><span data-dcnode-id="981" instrument_node="">
</span><span data-dcnode-id="980" instrument_node="">
</span><span data-dcnode-id="979" instrument_node="">
</span><span data-dcnode-id="976" instrument_node="">
</span><span data-dcnode-id="974" instrument_node="">
</span><span data-dcnode-id="973" instrument_node="">
</span><span data-dcnode-id="969" instrument_node="">
</span><span data-dcnode-id="967" instrument_node="">
</span><table align="center" border="0" data-dcnode-id="965" width="176"><tbody data-dcnode-id="966"><tr data-dcnode-id="975"><td data-dcnode-id="977" width="170"><img alt="poison ivy" data-dcnode-id="978" height="173" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/16.gif&amp;raw" width="170"></td></tr><tr data-dcnode-id="968"><td data-dcnode-id="970"><div align="center" data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Poison Ivy Leaves are usually found in clusters of three.</span></div></td></tr></tbody></table><span data-dcnode-id="964" instrument_node="">
</span><p class="header2" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Treating Cuts and Burns </span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Minor cuts and burns can be treated on the job site. 
    Seek medical attention if: </span></p><span data-dcnode-id="958" instrument_node="">
</span><ul data-dcnode-id="950"><span data-dcnode-id="957" instrument_node="">
</span><li data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Cuts are severely bleeding, more than one-half inch long and one-quarter inch deep, or the result of a puncture wound. </span></li><span data-dcnode-id="954" instrument_node="">
</span><li data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Burn area covers more than one-fifth of the body with blisters, blisters occur on the hands, feet, face or genitalia, or if the skin is blackened or charred.</span></li><span data-dcnode-id="951" instrument_node="">
</span></ul><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="946"><b data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Treating Cuts </span></b></p><span data-dcnode-id="945" instrument_node="">
</span><ul data-dcnode-id="925"><span data-dcnode-id="944" instrument_node="">
</span><li data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Clean the area thoroughly. </span></li><span data-dcnode-id="941" instrument_node="">
</span><li data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Remove any debris that may be in the wound. </span></li><span data-dcnode-id="938" instrument_node="">
</span><li data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Apply pressure to the wound using gauze or a clean, absorbent cloth until the bleeding stops. If blood seeps through the cloth, do not remove it, continue adding more gauze or cloth over the previous one. </span></li><span data-dcnode-id="935" instrument_node="">
</span><li data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Apply an antibiotic ointment and cover with a bandage or clean gauze. </span></li><span data-dcnode-id="932" instrument_node="">
</span><li data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Allow wound to heal and keep dirt from creating infection by changing the bandage or gauze frequently. </span></li><span data-dcnode-id="929" instrument_node="">
</span><li data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">If a limb has been amputated, elevate while applying direct pressure and call 911.</span></li><span data-dcnode-id="926" instrument_node="">
</span></ul><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="921"><b data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Treating Burns</span></b></p><span data-dcnode-id="920" instrument_node="">
</span><ul data-dcnode-id="906"><span data-dcnode-id="919" instrument_node="">
</span><li data-dcnode-id="917"><span data-dcnode-id="918" instrument_node=""> Cool the burn by placing it under cool running water or in a container of cool water for at least 15 minutes. </span></li><span data-dcnode-id="916" instrument_node="">
</span><li data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Cover the area with gauze or a clean cloth. </span></li><span data-dcnode-id="913" instrument_node="">
</span><li data-dcnode-id="911"><span data-dcnode-id="912" instrument_node=""> Allow burn to heal and keep dirt from creating infection by changing the gauze frequently. </span></li><span data-dcnode-id="910" instrument_node="">
</span><li data-dcnode-id="908"><span data-dcnode-id="909" instrument_node=""> If blisters occur, do not break them. Cover with gauze and allow them to break on their own.</span></li><span data-dcnode-id="907" instrument_node="">
</span></ul><span data-dcnode-id="905" instrument_node="">
</span><p class="header2" data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">First Aid Kit Contents </span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">The following is a list of minimum requirements for workplace first aid kits as outlined by ANSI Standard Z308.1-2003*. </span></p><span data-dcnode-id="899" instrument_node="">
</span><ul data-dcnode-id="874"><span data-dcnode-id="898" instrument_node="">
</span><li data-dcnode-id="896"><span data-dcnode-id="897" instrument_node=""> absorbent compress </span></li><span data-dcnode-id="895" instrument_node="">
</span><li data-dcnode-id="893"><span data-dcnode-id="894" instrument_node=""> adhesive bandages </span></li><span data-dcnode-id="892" instrument_node="">
</span><li data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">adhesive tape </span></li><span data-dcnode-id="889" instrument_node="">
</span><li data-dcnode-id="887"><span data-dcnode-id="888" instrument_node=""> individual-use antiseptic applications </span></li><span data-dcnode-id="886" instrument_node="">
</span><li data-dcnode-id="884"><span data-dcnode-id="885" instrument_node=""> individual-use burn treatment applications </span></li><span data-dcnode-id="883" instrument_node="">
</span><li data-dcnode-id="879"><span data-dcnode-id="882" instrument_node=""> latex-free medical exam gloves </span><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">
      sterile pads </span></li><span data-dcnode-id="878" instrument_node="">
</span><li data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">triangular bandage</span></li><span data-dcnode-id="875" instrument_node="">
</span></ul><span data-dcnode-id="873" instrument_node="">
