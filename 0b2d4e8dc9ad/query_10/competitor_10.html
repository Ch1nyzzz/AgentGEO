</span><p class="header1" data-dcnode-id="3793"><a data-dcnode-id="3795" name="int"></a><span data-dcnode-id="3794" instrument_node="">What’s Inside?</span></p><span data-dcnode-id="3792" instrument_node="">
</span><p data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">This booklet teaches important safety practices to be followed when manually trimming trees. </span></p><span data-dcnode-id="3789" instrument_node="">
</span><p data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">Safety tips, along with real accident reports, have been combined to help you protect yourself from the hazards involved in this type of work. </span></p><span data-dcnode-id="3786" instrument_node="">
</span><p data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">Use this booklet in conjunction with hands-on safety training and equipment operator’s manuals.</span></p><span data-dcnode-id="3783" instrument_node="">
</span><p class="header1" data-dcnode-id="3780"><a data-dcnode-id="3782" name="1"></a><span data-dcnode-id="3781" instrument_node="">Lesson 1 Take Control of Your Own Safety</span></p><span data-dcnode-id="3779" instrument_node="">
</span><p class="header2" data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">Objectives</span></p><span data-dcnode-id="3776" instrument_node="">
</span><ol data-dcnode-id="3762"><span data-dcnode-id="3775" instrument_node="">

</span><li data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node=""> Interpret the meaning of common warning signs and labels. </span></li><span data-dcnode-id="3769" instrument_node="">
</span><li data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node=""> Identify appropriate protective equipment. </span></li><span data-dcnode-id="3766" instrument_node="">
</span><li data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node=""> Indicate hazards to be assessed before beginning operation.</span></li><span data-dcnode-id="3763" instrument_node="">

</span><p class="header2" data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">Greatest Dangers</span></p><span data-dcnode-id="3758" instrument_node="">
</span><p data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">The most common types of serious tree trimming accidents are:</span></p><span data-dcnode-id="3755" instrument_node="">
</span><ol data-dcnode-id="3625"><li data-dcnode-id="3713"><b data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">Electrocution</span></b><span data-dcnode-id="3752" instrument_node=""> </span><br data-dcnode-id="3751"><span data-dcnode-id="3750" instrument_node="">
      You can be seriously injured or killed if you come into contact with an electric line.</span><br data-dcnode-id="3749"><span data-dcnode-id="3748" instrument_node="">
</span><br data-dcnode-id="3747"><span data-dcnode-id="3746" instrument_node="">

            Employee Electrocuted When Branch Falls on Line</span></b></td></tr><tr data-dcnode-id="3720"><td data-dcnode-id="3722"><p data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">Summary OSHA Accident Inspection 1099688358 </span></p><span data-dcnode-id="3732" instrument_node="">
</span><p data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">An employee was trimming a tree that was near an overhead power line. The employee misjudged the distance, cut the branch, and it fell on the line. The employee, who was still holding onto the branch, was electrocuted.</span></p><span data-dcnode-id="3729" instrument_node="">
</span><p data-dcnode-id="3723"><img align="left" alt=" " data-dcnode-id="3728" height="45" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/2.gif&amp;raw" width="50"><b data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">Always keep a safe distance from power lines. Refer to page 12 for more information.</span></b><br data-dcnode-id="3725"><span data-dcnode-id="3724" instrument_node="">
</span></p></td></tr></tbody></table><span data-dcnode-id="3716" instrument_node="">

</span><li data-dcnode-id="3670"><b data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node=""> Falling From Trees</span></b><span data-dcnode-id="3709" instrument_node=""> </span><br data-dcnode-id="3708"><span data-dcnode-id="3707" instrument_node="">
      You can be seriously injured or killed if you fall from a tree.</span><br data-dcnode-id="3706"><span data-dcnode-id="3705" instrument_node="">

            Employee Falls After Disconnecting Both Lanyards</span></b></td></tr><tr data-dcnode-id="3677"><td data-dcnode-id="3679"><p data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">Summary of OSHA Accident Inspection 126621820 </span></p><span data-dcnode-id="3689" instrument_node="">
</span><p data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">While working in a tree, an employee disconnected one lanyard to move around some limbs. After climbing approximately 60 feet up the tree, he disconnected the second lanyard before reconnecting the first. The employee fell and died of head injuries.</span></p><span data-dcnode-id="3686" instrument_node="">
</span><p data-dcnode-id="3680"><img align="absmiddle" alt=" " data-dcnode-id="3685" height="45" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/2.gif&amp;raw" width="50"><b data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Always make sure all safety lines are connected.</span></b><br data-dcnode-id="3682"><span data-dcnode-id="3681" instrument_node="">
</span></p></td></tr></tbody></table><span data-dcnode-id="3673" instrument_node="">

      You can be seriously injured or killed if you are struck by falling trees or limbs.</span><br data-dcnode-id="3663"><span data-dcnode-id="3662" instrument_node="">

            Employee Struck by Falling Limb</span></b></td></tr><tr data-dcnode-id="3634"><td data-dcnode-id="3636"><p data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">Summary of OSHA Accident Inspection 125616698</span></p><span data-dcnode-id="3646" instrument_node="">
</span><p data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node=""> An employee was felling trees in a forested area when a limb fell from an adjacent tree and struck him on the head. The employee was killed.</span></p><span data-dcnode-id="3643" instrument_node="">
</span><p data-dcnode-id="3637"><img align="left" alt=" " data-dcnode-id="3642" height="45" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/2.gif&amp;raw" width="50"><b data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">Always wear a hard hat and do a pre-start inspection before beginning work.</span></b><br data-dcnode-id="3639"><span data-dcnode-id="3638" instrument_node="">
</span></p></td></tr></tbody></table><span data-dcnode-id="3630" instrument_node="">
</span><br data-dcnode-id="3629"><span data-dcnode-id="3628" instrument_node="">
</span></li><span data-dcnode-id="3626" instrument_node="">
</span></ol><span data-dcnode-id="3624" instrument_node="">
</span><p class="header2" data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">Help Yourself</span></p><span data-dcnode-id="3621" instrument_node="">
</span><p data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">Safe work habits are important. Here are three important actions you can take to be safe on the job site.</span></p><span data-dcnode-id="3618" instrument_node="">
</span><ol data-dcnode-id="3598"><span data-dcnode-id="3617" instrument_node="">
</span><li data-dcnode-id="3612"><b data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node=""> Learn All You Can.</span></b><br data-dcnode-id="3614"><span data-dcnode-id="3613" instrument_node="">
      To prevent tree trimming accidents, read and follow directions that come with all climbing and trimming equipment. While reading, pay attention to safety instructions and look for warning labels on the equipment. If you have questions, stop and ask your supervisor before you continue.</span></li><span data-dcnode-id="3611" instrument_node="">
</span><li data-dcnode-id="3606"><b data-dcnode-id="3609"><span data-dcnode-id="3610" instrument_node=""> Concentrate on Working Safely.</span></b><br data-dcnode-id="3608"><span data-dcnode-id="3607" instrument_node="">
      Sometimes you may be tempted to take risky shortcuts. Remember that an accident can leave you permanently injured or cut your life short. For your safety and the safety of those around you, do not take unnecessary risks. No deadline is so pressing you can’t take the time to do your work safely.</span></li><span data-dcnode-id="3605" instrument_node="">
</span><li data-dcnode-id="3600"><b data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node="">Additional Precautions </span></b><br data-dcnode-id="3602"><span data-dcnode-id="3601" instrument_node="">
      Do not operate machinery or climb trees if you are tired or have taken drugs or alcohol. If you are on medication, discuss with your doctor or pharmacist if you are capable of climbing and operating machinery safely.</span></li><span data-dcnode-id="3599" instrument_node="">
</span></ol><span data-dcnode-id="3597" instrument_node="">
</span><p class="header2" data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">Safety Messages and Signs</span></p><span data-dcnode-id="3594" instrument_node="">
</span><p data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">Manufacturers put important safety messages on each piece of equipment and in the operator’s manual. It is critical to read, understand and follow all safety messages.</span></p><span data-dcnode-id="3591" instrument_node="">
</span><p data-dcnode-id="3585"><img alt=" " data-dcnode-id="3590" height="45" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/2.gif&amp;raw" width="50"><span data-dcnode-id="3589" instrument_node="">The triangle shape is the symbol for caution. The exclamation mark in the center means </span><i data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">Pay Attention</span></i><span data-dcnode-id="3586" instrument_node="">. In some instances, the triangle-shaped sign will show a picture. Other times, words explain why the sign is used.</span></p><span data-dcnode-id="3584" instrument_node="">
</span><p data-dcnode-id="3573"><span data-dcnode-id="3583" instrument_node="">Many safety messages use the words </span><i data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">Caution</span></i><span data-dcnode-id="3580" instrument_node="">, </span><i data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">Warning</span></i><span data-dcnode-id="3577" instrument_node=""> and </span><i data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">Danger</span></i><span data-dcnode-id="3574" instrument_node=""> to get your attention. Following are safety messages and their meanings. Each of these signs will have a written message, and perhaps a picture, about a possibly unsafe condition.</span></p><span data-dcnode-id="3572" instrument_node="">
</span><p data-dcnode-id="3567"><span data-dcnode-id="3571" instrument_node="">CAUTION means you need to be careful. Follow the directions on the sign or you could get hurt.</span><br data-dcnode-id="3570"><span data-dcnode-id="3569" instrument_node="">
</span><img alt="PRECAUCIÓN" data-dcnode-id="3568" height="126" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/3.gif&amp;raw" width="227"></p><span data-dcnode-id="3566" instrument_node="">
</span><p data-dcnode-id="3561"><span data-dcnode-id="3565" instrument_node="">WARNING is more serious and means you need to follow the directions on the sign or you could be badly hurt or killed.</span><br data-dcnode-id="3564"><span data-dcnode-id="3563" instrument_node="">
</span><img alt="ADVERTENCIA" data-dcnode-id="3562" height="132" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/4.gif&amp;raw" width="229"></p><span data-dcnode-id="3560" instrument_node="">
</span><p data-dcnode-id="3551"><span data-dcnode-id="3559" instrument_node="">DANGER is the most serious safety message. If you don’t follow the directions, you will be seriously injured or killed.</span><br data-dcnode-id="3558"><span data-dcnode-id="3557" instrument_node="">
</span><img alt="PELIGRO" data-dcnode-id="3556" height="134" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/5.gif&amp;raw" width="227"><br data-dcnode-id="3555"><span data-dcnode-id="3554" instrument_node="">
</span><span class="large_table_text" data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">Images displayed in the caution, warning and danger boxes have been recreated from images taken with permission from ASAE S441.4, FEB04, Safety Signs.</span></span></p><span data-dcnode-id="3550" instrument_node="">
</span><p class="header1" data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">Protective Equipment</span></p><span data-dcnode-id="3547" instrument_node="">
</span><p data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">Certain equipment is necessary to protect you while trimming trees. The following protective equipment is required.</span></p><span data-dcnode-id="3544" instrument_node="">
</span><p data-dcnode-id="3539"><b data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">Hard Hat</span></b><br data-dcnode-id="3541"><span data-dcnode-id="3540" instrument_node="">
    A hard hat should be worn to protect your head from falling limbs. </span></p><span data-dcnode-id="3538" instrument_node="">
</span><p data-dcnode-id="3532"><b data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">Gloves</span></b><span data-dcnode-id="3535" instrument_node=""> </span><br data-dcnode-id="3534"><span data-dcnode-id="3533" instrument_node="">
    Gloves may be worn to protect your hands from puncture wounds and cuts.</span></p><span data-dcnode-id="3531" instrument_node="">
</span><p data-dcnode-id="3525"><b data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">Sturdy, Non-Slip Boots</span></b><span data-dcnode-id="3528" instrument_node=""> </span><br data-dcnode-id="3527"><span data-dcnode-id="3526" instrument_node="">
    Wear boots to keep a firm footing on the ground and reduce the risk of slipping and falling.</span></p><span data-dcnode-id="3524" instrument_node="">
</span><p data-dcnode-id="3518"><b data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">Climbing Equipment</span></b><span data-dcnode-id="3521" instrument_node=""> </span><br data-dcnode-id="3520"><span data-dcnode-id="3519" instrument_node="">
    Safety harnesses, belts, ropes, lanyards, slings and carabiners appropriate to the job are used to keep you secured in the tree.</span></p><span data-dcnode-id="3517" instrument_node="">
</span><p class="header2" data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">When Operating a Chainsaw You Must Wear:</span></p><span data-dcnode-id="3514" instrument_node="">
</span><p data-dcnode-id="3509"><b data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">Leg Protection</span></b><br data-dcnode-id="3511"><span data-dcnode-id="3510" instrument_node=""> 
    Leg protection must be worn when performing ground operations. The material should be cut-resistant and cover the entire thigh to the top of each boot.</span></p><span data-dcnode-id="3508" instrument_node="">
</span><p data-dcnode-id="3502"><span data-dcnode-id="3507" instrument_node=""> </span><b data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">Goggles or Safety Glasses</span></b><br data-dcnode-id="3504"><span data-dcnode-id="3503" instrument_node="">
    Goggles or safety glasses must be worn at all times to protect your eyes from foreign objects.</span></p><span data-dcnode-id="3501" instrument_node="">
</span><p data-dcnode-id="3495"><b data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">Face Shield</span></b><span data-dcnode-id="3498" instrument_node=""> </span><br data-dcnode-id="3497"><span data-dcnode-id="3496" instrument_node="">
    A face shield should be worn to protect your face from the kickback of the machine and debris.</span></p><span data-dcnode-id="3494" instrument_node="">
</span><p data-dcnode-id="3488"><b data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">Hearing protection.</span></b><span data-dcnode-id="3491" instrument_node=""> </span><br data-dcnode-id="3490"><span data-dcnode-id="3489" instrument_node="">
    Over time, you will lose your hearing if you are exposed to loud noises without protection.</span></p><span data-dcnode-id="3487" instrument_node="">
</span><p data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">Two common types of hearing protection are muffs and plugs. Ear muffs should seal around your ears to properly muffle loud noises. Wash reusable ear plugs with warm, soapy water after each use in order to prevent infection. Discard disposable ear plugs after each use.</span></p><span data-dcnode-id="3484" instrument_node="">
</span><p class="header2" data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">When to Wear Hearing Protection</span></p><span data-dcnode-id="3481" instrument_node="">
</span><p data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">OSHA Standard 1910.95 (i) (l) requires hearing protection to be worn when sound levels exceed certain limits (generally, a daily average of 85 or 90 decibels, depending on the circumstances). These levels can be measured with a dosimeter. A hearing conservation program requiring hearing tests and other precautions may also be necessary. Check with the equipment operator’s manual, as well as your supervisor, for suggestions on hearing protection for each piece of equipment and instructions on how to wear it properly.</span></p><span data-dcnode-id="3478" instrument_node="">
</span><p class="header2" data-dcnode-id="3476"><span data-dcnode-id="3477" instrument_node="">Hearing Protection Rules of Thumb</span></p><span data-dcnode-id="3475" instrument_node="">
</span><p data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">Hearing protection may be needed if:</span></p><span data-dcnode-id="3472" instrument_node="">
</span><ul data-dcnode-id="3461"><span data-dcnode-id="3471" instrument_node="">
</span><li data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">You have to raise your voice significantly to be heard by someone three feet away. </span></li><span data-dcnode-id="3468" instrument_node="">
</span><li data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node=""> After leaving a noisy area, your ears feel plugged or you hear a mild ringing or whooshing noise that goes away after an hour or two. </span></li><span data-dcnode-id="3465" instrument_node="">
</span><li data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node=""> When you start your car in the morning, the radio is so loud from the evening before that you have to turn it down.</span></li><span data-dcnode-id="3462" instrument_node="">

d></tr><tr data-dcnode-id="3393"><td colspan="2" data-dcnode-id="3395"><b data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">Equipment</span></b></td></tr><tr data-dcnode-id="3384"><td data-dcnode-id="3389"><img alt=" " data-dcnode-id="3390" height="21" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/9.gif&amp;raw" width="20"></td><td data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">Belts and harnesses free of cracks, cuts and broken stitching.</span></td></tr><tr data-dcnode-id="3375"><td data-dcnode-id="3380"><img alt=" " data-dcnode-id="3381" height="21" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/9.gif&amp;raw" width="20"></td><td data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">Clips, buckles and rivets not loose or broken.</span></td></tr><tr data-dcnode-id="3366"><td data-dcnode-id="3371"><img alt=" " data-dcnode-id="3372" height="21" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/9.gif&amp;raw" width="20"></td><td data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">Ropes and lanyards are dry and show no signs of fraying, intense wear or sun damage.</span></td></tr><tr data-dcnode-id="3357"><td data-dcnode-id="3362"><img alt=" " data-dcnode-id="3363" height="21" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/9.gif&amp;raw" width="20"></td><td data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Snap catches and carabiners close securely and are the appropriate size for the D-rings in use.</span></td></tr><tr data-dcnode-id="3348"><td data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">&nbsp;</span></td><td data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="3341"><td colspan="2" data-dcnode-id="3343"><b data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">Location</span></b></td></tr><tr data-dcnode-id="3332"><td data-dcnode-id="3337"><img alt=" " data-dcnode-id="3338" height="21" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/9.gif&amp;raw" width="20"></td><td data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">Warning signs and rumble strips are being used, when necessary, if the site is near a roadway.</span></td></tr><tr data-dcnode-id="3323"><td data-dcnode-id="3328"><img alt=" " data-dcnode-id="3329" height="21" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/9.gif&amp;raw" width="20"></td><td data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">Cones and flaggers are used to divert traffic, when necessary.</span></td></tr><tr data-dcnode-id="3314"><td data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">&nbsp;</span></td><td data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="3304"><td data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">&nbsp;</span></td><td data-dcnode-id="3306"><b data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">Following the inspection, should you find any hazards while climbing, descend the tree immediately and take appropriate action to solve the problem.</span></b></td></tr></tbody></table><span data-dcnode-id="3300" instrument_node="">
</span><p class="header2" data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">Pre-Start Inspection</span></p><span data-dcnode-id="3297" instrument_node="">
</span><p data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">A hazard briefing must be performed before the start of each job. During this briefing, you and your supervisor should analyze the potential dangers of performing the job. Based on the analysis, choose a plan of attack and proper equipment that will help you carry out the job safely.</span></p><span data-dcnode-id="3294" instrument_node="">
</span><p class="header2" data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">Tree</span></p><span data-dcnode-id="3291" instrument_node="">
</span><p data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">Ensure the trunk is stable by looking for cracks, splits and cankers. Look for any dead and rotten branches. Watch for any nests, hives, or other signs that animals may be in the tree. Look for poison ivy or oak growing on or around the tree.</span></p><span data-dcnode-id="3288" instrument_node="">
</span><span data-dcnode-id="3287" instrument_node="">
</span><span data-dcnode-id="3286" instrument_node="">
</span><span data-dcnode-id="3280" instrument_node="">

</span><span data-dcnode-id="3263" instrument_node="">
</span><span data-dcnode-id="3261" instrument_node="">
</span><table align="center" border="1" cellspacing="0" data-dcnode-id="3259" width="439"><tbody data-dcnode-id="3260"><tr data-dcnode-id="3279"><td bgcolor="#CCCCCC" data-dcnode-id="3281" width="433"><b data-dcnode-id="3282"><span data-dcnode-id="3285" instrument_node="">Accident Report</span><br data-dcnode-id="3284"><span data-dcnode-id="3283" instrument_node="">
        Employee Suffers Infection</span></b></td></tr><tr data-dcnode-id="3262"><td data-dcnode-id="3264"><p data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">Summary of OSHA Accident Inspection 119705770</span></p><span data-dcnode-id="3274" instrument_node="">
</span><p data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node=""> An employee was trimming trees when his arm came in contact with poison oak. He suffered an allergic reaction and infection set in his arm before transferring to his leg. He was hospitalized for treatment.</span></p><span data-dcnode-id="3271" instrument_node="">
</span><p data-dcnode-id="3265"><img align="left" alt=" " data-dcnode-id="3270" height="45" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/2.gif&amp;raw" width="50"><b data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Be on the lookout for poison ivy and oak during your prestart hazard inspection.</span></b><br data-dcnode-id="3267"><span data-dcnode-id="3266" instrument_node="">
</span></p></td></tr></tbody></table><span data-dcnode-id="3258" instrument_node="">
</span><p class="header2" data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">Equipment</span></p><span data-dcnode-id="3255" instrument_node="">
</span><p data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">Check belts and harnesses for any cracks, cuts or broken stitching. Ensure that all clips, buckles and rivets are not loose or broken. Check ropes and lanyards for signs of fraying and intense wear. Do not use a rope that is wet, has been driven over or has been stored in the sun. These factors will weaken the elasticity and strength of the rope. Check snap catches and carabiners to make sure they will close securely and are the appropriate size for the D-ring on your harness or belt.</span></p><span data-dcnode-id="3252" instrument_node="">
</span><p class="header2" data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">Location</span></p><span data-dcnode-id="3249" instrument_node="">
</span><p data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">If working near roadways, use warning signs and rumble strips, when necessary, to alert motorists that employees are in the area. Use cones and flaggers (wearing highly-reflective vests) to divert traffic away from the area where work is being performed.</span></p><span data-dcnode-id="3246" instrument_node="">
</span><p class="header1" data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">Quiz Yourself</span></p><span data-dcnode-id="3243" instrument_node="">
</span><p data-dcnode-id="3238"><span data-dcnode-id="3242" instrument_node="">Answers can be found </span><a data-dcnode-id="3240" href="#sol"><span data-dcnode-id="3241" instrument_node="">here.</span></a><span data-dcnode-id="3239" instrument_node=""> </span></p><span data-dcnode-id="3237" instrument_node="">
</span><p data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">Select the correct answer for the following sentences from the list below.</span></p><span data-dcnode-id="3234" instrument_node="">
</span><ol data-dcnode-id="3217" type="a"><span data-dcnode-id="3233" instrument_node="">

</span><li data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node=""> ___________, falls from trees and being struck by trees or limbs are the three most commonly reported causes of serious tree trimming accidents. </span></li><span data-dcnode-id="3209" instrument_node="">
</span><li data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node=""> The __________ shape is the symbol for caution. </span></li><span data-dcnode-id="3206" instrument_node="">
</span><li data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node=""> Leg protection consisting of __________ material is required when operating a chainsaw during ground operations. </span></li><span data-dcnode-id="3203" instrument_node="">
</span><li data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node=""> _________ is the most serious safety message.</span></li><span data-dcnode-id="3200" instrument_node="">

</span><p class="header1" data-dcnode-id="3195"><a data-dcnode-id="3197" name="2"></a><span data-dcnode-id="3196" instrument_node="">Lesson 2 Avoid Shock and Electrocution</span></p><span data-dcnode-id="3194" instrument_node="">
</span><p class="header2" data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">Objectives</span></p><span data-dcnode-id="3191" instrument_node="">
</span><ol data-dcnode-id="3180"><span data-dcnode-id="3190" instrument_node="">
</span><li data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">Differentiate between qualified and unqualified line-clearance tree trimmers. </span></li><span data-dcnode-id="3187" instrument_node="">
</span><li data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node=""> Recognize electrical hazards. </span></li><span data-dcnode-id="3184" instrument_node="">
</span><li data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node=""> Identify minimum distance requirements.</span></li><span data-dcnode-id="3181" instrument_node="">
</span></ol><span data-dcnode-id="3179" instrument_node="">
</span><p class="header2" data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">Qualified vs. Unqualified</span></p><span data-dcnode-id="3176" instrument_node="">
</span><p data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">Only qualified line-clearance tree trimmers are allowed within 10 feet of energized power lines. According to OSHA, qualified employees are “those who are knowledgeable in the construction and operation of electric power generation, transmission, or distribution equipment involved, along with the associated hazards.” To become a qualified line-clearance tree trimmer, you will need additional training that is beyond the scope of this book. </span></p><span data-dcnode-id="3173" instrument_node="">
</span><p data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">Qualified and unqualified employees are required to keep the minimum distances found in the tables in the next section.</span></p><span data-dcnode-id="3170" instrument_node="">
</span><p class="header2" data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">Electrical Hazards</span></p><span data-dcnode-id="3167" instrument_node="">
</span><p data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">You must use extreme caution when working around electrical lines. Electrocution can occur by direct contact, indirect contact or electrical arcing.</span></p><span data-dcnode-id="3164" instrument_node="">
</span><ul data-dcnode-id="2985"><span data-dcnode-id="3163" instrument_node="">
</span><li data-dcnode-id="3112"><span data-dcnode-id="3162" instrument_node="">Electric shock or electrocution will occur when:</span><br data-dcnode-id="3161"><span data-dcnode-id="3160" instrument_node="">
      You physically touch the line with any part of your body or clothing. </span><br data-dcnode-id="3159"><span data-dcnode-id="3158" instrument_node="">
      Example:  You touch a power line with your body.</span><br data-dcnode-id="3157"><span data-dcnode-id="3156" instrument_node="">
</span><br data-dcnode-id="3155"><span data-dcnode-id="3154" instrument_node="">
</span><span data-dcnode-id="3153" instrument_node="">
</span><span data-dcnode-id="3152" instrument_node="">
</span><span data-dcnode-id="3146" instrument_node="">
</span><span data-dcnode-id="3144" instrument_node="">
</span><span data-dcnode-id="3143" instrument_node="">

</span><p class="header1" data-dcnode-id="2370"><a data-dcnode-id="2372" name="3"></a><span data-dcnode-id="2371" instrument_node="">Lesson 3 Preventing Falls from Trees</span></p><span data-dcnode-id="2369" instrument_node="">
</span><p class="header2" data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">Objectives</span></p><span data-dcnode-id="2366" instrument_node="">
</span><ol data-dcnode-id="2358"><span data-dcnode-id="2365" instrument_node="">
</span><li data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Recognize precautions to prevent falling from trees. </span></li><span data-dcnode-id="2362" instrument_node="">
</span><li data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node=""> Identify climbing knots.</span></li><span data-dcnode-id="2359" instrument_node="">
</span></ol><span data-dcnode-id="2357" instrument_node="">
</span><p class="header2" data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Avoid Injury from Falling</span></p><span data-dcnode-id="2354" instrument_node="">
</span><ul data-dcnode-id="2322"><span data-dcnode-id="2353" instrument_node="">
</span><li data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Always climb trees using ropes or harnesses and use additional anchor points whenever possible. Do not free-climb. </span></li><span data-dcnode-id="2350" instrument_node="">
</span><li data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Never anchor or tie yourself to the limb you are cutting on. </span></li><span data-dcnode-id="2347" instrument_node="">
</span><li data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Always tie ladders into the tree. </span></li><span data-dcnode-id="2344" instrument_node="">
</span><li data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Do not cut your safety lines. Keep all ropes and harnesses away from chainsaws and other cutting equipment. </span></li><span data-dcnode-id="2341" instrument_node="">
</span><li data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Use extra caution when working on slopes. </span></li><span data-dcnode-id="2338" instrument_node="">
</span><li data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">Use an aerial device to trim trees that are not safe to climb. </span></li><span data-dcnode-id="2335" instrument_node="">
</span><li data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Remove cut limbs from the tree so that you don’t accidentally use them for support when you descend. </span></li><span data-dcnode-id="2332" instrument_node="">
</span><li data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Do not climb when the tree is wet, icy or snow-covered or when the weather is extremely windy. </span></li><span data-dcnode-id="2329" instrument_node="">
</span><li data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Never turn your back on a tree being felled. </span></li><span data-dcnode-id="2326" instrument_node="">
</span><li data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">When working above concrete or a paved surface, watch out for branches that might bounce back and strike you or your equipment.</span></li><span data-dcnode-id="2323" instrument_node="">
</span></ul><span data-dcnode-id="2321" instrument_node="">
</span><span data-dcnode-id="2320" instrument_node="">
</span><span data-dcnode-id="2319" instrument_node="">
</span><span data-dcnode-id="2307" instrument_node="">

        Employee Falls From Ladder</span></b></td></tr><tr data-dcnode-id="2264"><td data-dcnode-id="2266"><p data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Summary of OSHA Accident Inspection 200450096 </span></p><span data-dcnode-id="2276" instrument_node="">
</span><p data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">An employee who was trimming trees put a ladder in the bed of a pickup to use it as a height extender. There were no support attachments on the ladder and the base section did not have secure footing. The employee fell off the ladder, approximately 14 feet, broke his neck and died.</span></p><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2267"><img align="left" alt=" " data-dcnode-id="2272" height="45" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/2.gif&amp;raw" width="50"><b data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Never use a ladder in a pickup bed for added height.</span></b><br data-dcnode-id="2269"><span data-dcnode-id="2268" instrument_node="">

</span><p class="header2" data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Knots</span></p><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Below are some knots commonly used for climbing. For a more complete list of knots and explanations on how and when to use them refer to:</span></p><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2245"><i data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Arborists Certification Study Guide, </span></i><br data-dcnode-id="2251"><span data-dcnode-id="2250" instrument_node="">
    International Society of Aboriculture</span><br data-dcnode-id="2249"><span data-dcnode-id="2248" instrument_node="">

</span><p data-dcnode-id="2234"><i data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Tree Climber’s Guide,</span></i><span data-dcnode-id="2241" instrument_node=""> </span><br data-dcnode-id="2240"><span data-dcnode-id="2239" instrument_node="">

</span><a data-dcnode-id="2235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.isa-arbor.com/" target="_blank"><span data-dcnode-id="2236" instrument_node="">www.isa-arbor.com </span></a></p><span data-dcnode-id="2233" instrument_node="">
</span><p data-dcnode-id="2224"><i data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">National Tree Climbing Guide, </span></i><br data-dcnode-id="2230"><span data-dcnode-id="2229" instrument_node="">

</span><p class="header2" data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">Figure Eight Knot</span></p><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">The figure eight knot can be used for a variety of purposes. Examples include but are not limited to:</span></p><span data-dcnode-id="2217" instrument_node="">
</span><ul data-dcnode-id="2206"><span data-dcnode-id="2216" instrument_node="">
</span><li data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">a stopper knot at the end of hitches and rappel lines </span></li><span data-dcnode-id="2213" instrument_node="">
</span><li data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">to tie two pieces of rope together </span></li><span data-dcnode-id="2210" instrument_node="">
</span><li data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">to attach lanyards</span></li><span data-dcnode-id="2207" instrument_node="">
</span></ul><span data-dcnode-id="2205" instrument_node="">
</span><p data-dcnode-id="2200"><span data-dcnode-id="2204" instrument_node="">Follow the steps below to tie a Figure 8 knot.</span><br data-dcnode-id="2203"><span data-dcnode-id="2202" instrument_node="">
</span><img alt=" " data-dcnode-id="2201" height="104" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/13.gif&amp;raw" width="383"></p><span data-dcnode-id="2199" instrument_node="">
</span><p class="header2" data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Prusik Knot</span></p><span data-dcnode-id="2196" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">The Prusik is a friction knot. This means the knot can slide easily without tension. Examples include but are not limited to:</span></p><span data-dcnode-id="2193" instrument_node="">
</span><ul data-dcnode-id="2182"><span data-dcnode-id="2192" instrument_node="">
</span><li data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">attach climbing equipment to rappel lines </span></li><span data-dcnode-id="2189" instrument_node="">
</span><li data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">create adjustable lanyards </span></li><span data-dcnode-id="2186" instrument_node="">
</span><li data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">use as an ascending knot</span></li><span data-dcnode-id="2183" instrument_node="">
</span></ul><span data-dcnode-id="2181" instrument_node="">
</span><p data-dcnode-id="2176"><span data-dcnode-id="2180" instrument_node="">Follow the steps below to tie a Prusik knot.</span><br data-dcnode-id="2179"><span data-dcnode-id="2178" instrument_node="">
</span><img alt=" " data-dcnode-id="2177" height="108" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/14.gif&amp;raw" width="530"></p><span data-dcnode-id="2175" instrument_node="">
</span><p class="header2" data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Blake’s Hitch</span></p><span data-dcnode-id="2172" instrument_node="">
</span><p data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">The Blake’s hitch is a modified version of the Prusik knot. It is also a friction knot. After making the hitch, the end should always be tied with a figure eight stopper knot.</span></p><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2164"><span data-dcnode-id="2168" instrument_node="">Follow the steps below to tie a Blake’s hitch.</span><br data-dcnode-id="2167"><span data-dcnode-id="2166" instrument_node="">
</span><img alt=" " data-dcnode-id="2165" height="106" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/17.gif&amp;raw" width="529"></p><span data-dcnode-id="2163" instrument_node="">
</span><p class="header2" data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Clove Hitch</span></p><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">The Clove hitch is a knot that can be used to tie equipment to the end of the rope or to the tree. The Clove hitch should never be used as a lifeline.</span></p><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2152"><span data-dcnode-id="2156" instrument_node="">Follow the steps below to tie a Clove hitch.</span><br data-dcnode-id="2155"><span data-dcnode-id="2154" instrument_node="">
</span><img alt=" " data-dcnode-id="2153" height="158" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/19.gif&amp;raw" width="407"></p><span data-dcnode-id="2151" instrument_node="">
</span><p class="header2" data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Bowline Knot</span></p><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">The Bowline knot is formed at the end of a rope and does not slip or tighten under stress. Examples include but are not limited to: </span></p><span data-dcnode-id="2145" instrument_node="">
</span><ul data-dcnode-id="2137"><span data-dcnode-id="2144" instrument_node="">
</span><li data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">tie a climbing line to a carabiner </span></li><span data-dcnode-id="2141" instrument_node="">
</span><li data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">attach a throw bag to its line</span></li><span data-dcnode-id="2138" instrument_node="">
</span></ul><span data-dcnode-id="2136" instrument_node="">
</span><p data-dcnode-id="2131"><span data-dcnode-id="2135" instrument_node="">Follow the steps below to tie a Bowline knot.</span><br data-dcnode-id="2134"><span data-dcnode-id="2133" instrument_node="">
</span><img alt=" " data-dcnode-id="2132" height="104" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/20.gif&amp;raw" width="549"></p><span data-dcnode-id="2130" instrument_node="">

</span><p class="header1" data-dcnode-id="2074"><a data-dcnode-id="2076" name="4"></a><span data-dcnode-id="2075" instrument_node="">Lesson 4 Avoid Being Struck by Trees or Limbs</span></p><span data-dcnode-id="2073" instrument_node="">
</span><p class="header2" data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Objectives</span></p><span data-dcnode-id="2070" instrument_node="">
</span><ol data-dcnode-id="2056"><span data-dcnode-id="2069" instrument_node="">
</span><li data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Recognize ways to avoid being struck by trees and limbs. </span></li><span data-dcnode-id="2066" instrument_node="">
</span><li data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node=""> Develop safe chainsaw operating procedures. </span></li><span data-dcnode-id="2063" instrument_node="">
</span><li data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node=""> Identify tree felling danger zones. </span></li><span data-dcnode-id="2060" instrument_node="">
</span><li data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node=""> Compare different felling techniques.</span></li><span data-dcnode-id="2057" instrument_node="">
</span></ol><span data-dcnode-id="2055" instrument_node="">
</span><p class="header2" data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">Prevent Injury from Trees and Limbs</span></p><span data-dcnode-id="2052" instrument_node="">
</span><ul data-dcnode-id="2032"><span data-dcnode-id="2051" instrument_node="">
</span><li data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Limbs that cannot be dropped safely should be lowered with a rope. </span></li><span data-dcnode-id="2048" instrument_node="">
</span><li data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">Do not leave cut branches in a tree. Drop or lower them safely to the ground. </span></li><span data-dcnode-id="2045" instrument_node="">
</span><li data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Do not turn your back on a tree where branches are being cut or a tree is being felled. </span></li><span data-dcnode-id="2042" instrument_node="">
</span><li data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Follow a two-tree rule when felling. No one (other than the feller) should be within two tree lengths of the tree being felled. </span></li><span data-dcnode-id="2039" instrument_node="">
</span><li data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">Maintain a greater distance when trimming or felling on a slope where logs could roll or slide. </span></li><span data-dcnode-id="2036" instrument_node="">
</span><li data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Always be aware of your surroundings. Talk with coworkers to ensure you know what kind of work they are doing and where.</span></li><span data-dcnode-id="2033" instrument_node="">
</span></ul><span data-dcnode-id="2031" instrument_node="">
</span><span data-dcnode-id="2030" instrument_node="">
</span><span data-dcnode-id="2029" instrument_node="">
</span><span data-dcnode-id="2023" instrument_node="">
</span><span data-dcnode-id="2021" instrument_node="">
</span><span data-dcnode-id="2020" instrument_node="">
</span><span data-dcnode-id="2006" instrument_node="">
</span><span data-dcnode-id="2004" instrument_node="">

</span><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">General Instructions:</span></p><span data-dcnode-id="1963" instrument_node="">
</span><ul data-dcnode-id="1931"><span data-dcnode-id="1962" instrument_node="">
</span><li data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">Read the chainsaw’s operator’s manual before attempting to operate equipment. </span></li><span data-dcnode-id="1959" instrument_node="">
</span><li data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Always be alert. Chainsaw work is strenuous and fatiguing. </span></li><span data-dcnode-id="1956" instrument_node="">
</span><li data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">When carrying a chainsaw, always turn the engine off. </span></li><span data-dcnode-id="1953" instrument_node="">
</span><li data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">Do not refuel the chainsaw with the engine running. Shut it off and wait at least 5 minutes for it to cool down. Wipe up any spills immediately. </span></li><span data-dcnode-id="1950" instrument_node="">
</span><li data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">Never smoke while refueling. </span></li><span data-dcnode-id="1947" instrument_node="">
</span><li data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">Never work alone. Make sure someone is close by for help in case of an emergency. </span></li><span data-dcnode-id="1944" instrument_node="">
</span><li data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">Keep hands and feet away from the wood that is being cut. </span></li><span data-dcnode-id="1941" instrument_node="">
</span><li data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">Ensure your chain is sharp. Dull chains are hard to use. </span></li><span data-dcnode-id="1938" instrument_node="">
</span><li data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Make sure the chain tension is correct. Refer to the operator’s manual for instruction. If the chain is too loose, it could come off during operation and if it is too tight, it could damage the saw. </span></li><span data-dcnode-id="1935" instrument_node="">
</span><li data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">Never operate the saw above your chest. Reaching above your chest makes the saw hard to control.</span></li><span data-dcnode-id="1932" instrument_node="">
</span></ul><span data-dcnode-id="1930" instrument_node="">

        Employee Cut by Chainsaw </span></b></td></tr><tr data-dcnode-id="1904"><td data-dcnode-id="1906"><p data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Summary of OSHA Accident Inspection 120134390 </span></p><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">An employee was standing on a slope cutting a log into pieces. He slipped on the damp ground and hit his upper left arm with the chainsaw. The arm was severely cut and the employee was hospitalized.</span></p><span data-dcnode-id="1913" instrument_node="">
</span><p data-dcnode-id="1907"><img align="left" alt=" " data-dcnode-id="1912" height="45" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/2.gif&amp;raw" width="50"><b data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Always stand on a solid, flat, dry surface when operating a chainsaw.</span></b><br data-dcnode-id="1909"><span data-dcnode-id="1908" instrument_node="">
</span></p></td></tr></tbody></table><span data-dcnode-id="1900" instrument_node="">

        Never start a chainsaw against your body.</span><br data-dcnode-id="1877"><span data-dcnode-id="1876" instrument_node="">
</span><img alt=" " data-dcnode-id="1875" height="176" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/24.gif&amp;raw" width="216"><br data-dcnode-id="1874"><span data-dcnode-id="1873" instrument_node="">
</span></div></td></tr></tbody></table><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Kickback is a common cause of injury associated with chainsaws. Kickback occurs when the chain around the end of the bar contacts a hard object (such as a knothole) or when the teeth of the saw are pinched in the wood. This kicks the saw backward and upward, rapidly, where it can strike you.</span></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">To reduce kickback: </span></p><span data-dcnode-id="1859" instrument_node="">
</span><ul data-dcnode-id="1848"><span data-dcnode-id="1858" instrument_node="">
</span><li data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Do not cut with the upper section of the bar. Insert the saw fully. </span></li><span data-dcnode-id="1855" instrument_node="">
</span><li data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">When cutting, always stand at an angle, with a firm balance on the ground or branch, so that if the saw kicks back, it will avoid your neck and head. </span></li><span data-dcnode-id="1852" instrument_node="">
</span><li data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Make sure your saw has an anti-kickback device. Chainsaws manufactured after 1995 have one or more devices already installed on the machine. For saws older than 1995, a retro-fit kit may be available.</span></li><span data-dcnode-id="1849" instrument_node="">
</span></ul><span data-dcnode-id="1847" instrument_node="">
</span><span data-dcnode-id="1846" instrument_node="">

        Employee Killed When Chainsaw Kicks Back </span></b></td></tr><tr data-dcnode-id="1821"><td data-dcnode-id="1823"><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Summary of OSHA Accident Inspection 120169669 </span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">An employee was trimming trees and cutting downed limbs. The tip of his chainsaw struck a limb and kicked back, striking him across the neck. He died due to a severe cut to his throat.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1824"><img align="absmiddle" alt=" " data-dcnode-id="1829" height="45" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/2.gif&amp;raw" width="50"><b data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Always insert the blade fully to reduce kickback.</span></b><br data-dcnode-id="1826"><span data-dcnode-id="1825" instrument_node="">
</span></p></td></tr></tbody></table><span data-dcnode-id="1817" instrument_node="">

        Insert the blade fully to reduce kickback.

        Do not cut with the tip of the blade.</span><br data-dcnode-id="1794"><span data-dcnode-id="1793" instrument_node="">
</span><img alt=" " data-dcnode-id="1792" height="159" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/26.gif&amp;raw" width="159"><br data-dcnode-id="1791"><span data-dcnode-id="1790" instrument_node="">
</span></div></td></tr></tbody></table><span data-dcnode-id="1782" instrument_node="">
</span><p class="header1" data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Trimming Branches</span></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1778" instrument_node="">To safely trim branches, use three cuts to remove the branch completely.</span><img alt=" " data-dcnode-id="1777" height="175" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/27.gif&amp;raw" width="437"></p><span data-dcnode-id="1775" instrument_node="">
</span><p class="header1" data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Felling Techniques</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">When a tree must be removed, there are several things to consider before cutting.</span></p><span data-dcnode-id="1769" instrument_node="">
</span><ol data-dcnode-id="1758"><span data-dcnode-id="1768" instrument_node="">
</span><li data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Ensure coworkers and all others maintain a two-tree length distance. If the tree is going to fall downhill, increase the distance depending on the slope. </span></li><span data-dcnode-id="1765" instrument_node="">
</span><li data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Look for any fences, buildings or power lines and avoid felling toward them. </span></li><span data-dcnode-id="1762" instrument_node="">
</span><li data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node=""> Work only in good weather. Never work in strong winds, lightning, rain or any time when visibility is low.</span></li><span data-dcnode-id="1759" instrument_node="">
</span></ol><span data-dcnode-id="1757" instrument_node="">
</span><p class="header2" data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Inspect the Tree</span></p><span data-dcnode-id="1754" instrument_node="">
</span><ul data-dcnode-id="1740"><span data-dcnode-id="1753" instrument_node="">
</span><li data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Is the tree leaning in one direction? This will play a major role in the direction the tree will fall. </span></li><span data-dcnode-id="1750" instrument_node="">
</span><li data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Check the trunk (where the cuts are going to be made) for knot holes, cracks or signs of rot that could hinder the felling operation. </span></li><span data-dcnode-id="1747" instrument_node="">
</span><li data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Ensure the tree has no interlocking branches or vines from another tree. If it does, they must be separated prior to felling. Also, survey the crown of the tree for any material that may break loose as the tree falls. </span></li><span data-dcnode-id="1744" instrument_node="">
</span><li data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Trim any low branches that are in your way.</span></li><span data-dcnode-id="1741" instrument_node="">
</span></ul><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1737"><img alt=" " data-dcnode-id="1738" height="255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/28.gif&amp;raw" width="233"></p><span data-dcnode-id="1736" instrument_node="">
</span><p class="header2" data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Locating the Escape Areas</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Before you begin to cut, you must determine your escape area. This is the area you will go to immediately after the back cut has been made and the tree is beginning to fall. </span></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">To locate the escape areas, you must first determine the danger zones. Two danger zones can be identified and must be avoided to prevent serious injury or death. The first danger zone is located in a semi-circle, from half the diameter of the tree toward the direction of the fall. The second danger zone is one-quarter of the diameter of the tree and located in the opposite direction of the intended fall. Fellers MUST avoid these two danger zones. </span></p><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">The escape areas are then located between the danger zones. Always retreat to one of these areas as the tree is beginning to fall.</span></p><span data-dcnode-id="1724" instrument_node="">
</span><span data-dcnode-id="1723" instrument_node="">
</span><span data-dcnode-id="1722" instrument_node="">
</span><span data-dcnode-id="1716" instrument_node="">
</span><span data-dcnode-id="1714" instrument_node="">
</span><span data-dcnode-id="1713" instrument_node="">
</span><span data-dcnode-id="1699" instrument_node="">
</span><span data-dcnode-id="1697" instrument_node="">
</span><table align="center" border="1" cellspacing="0" data-dcnode-id="1695" width="439"><tbody data-dcnode-id="1696"><tr data-dcnode-id="1715"><td bgcolor="#CCCCCC" data-dcnode-id="1717" width="433"><b data-dcnode-id="1718"><span data-dcnode-id="1721" instrument_node="">Accident Report </span><br data-dcnode-id="1720"><span data-dcnode-id="1719" instrument_node="">
        Employee Struck by Falling Tree </span></b></td></tr><tr data-dcnode-id="1698"><td data-dcnode-id="1700"><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Summary of OSHA Accident Inspection 114147440 </span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">An employee was working on the ground, cutting down a tree. When the tree fell, it struck him on the head, killing him.</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1701"><img align="left" alt=" " data-dcnode-id="1706" height="45" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/2.gif&amp;raw" width="50"><b data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Move to one of the two escape areas after making the back cut.</span></b><br data-dcnode-id="1703"><span data-dcnode-id="1702" instrument_node="">
</span></p></td></tr></tbody></table><span data-dcnode-id="1694" instrument_node="">
</span><p class="header2" data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Making the Cut</span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">There are three key parts to a successful felling.</span></p><span data-dcnode-id="1688" instrument_node="">
</span><ol data-dcnode-id="1677"><span data-dcnode-id="1687" instrument_node="">
</span><li data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Scarf. The scarf is a notch that is cut out of the tree by making a top and bottom cut. There are three commonly used notches that can make a good scarf and we will discuss them later in this chapter. The scarf is important because it controls the direction of the fall. </span></li><span data-dcnode-id="1684" instrument_node="">
</span><li data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node=""> Hinge wood. The hinge wood is a piece of the tree, equal to 1/10th of the tree’s diameter, that is left uncut. It serves as a hinge, after the final cut has been made, to push the tree in the intended direction of fall. </span></li><span data-dcnode-id="1681" instrument_node="">
</span><li data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node=""> Backcut. The backcut is the final cut and helps clear the wood up to the hinge wood so the tree can easily fall.</span></li><span data-dcnode-id="1678" instrument_node="">
</span></ol><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><img alt=" " data-dcnode-id="1675" height="260" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/29.gif&amp;raw" width="286"></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><img alt=" " data-dcnode-id="1669" height="412" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/30.gif&amp;raw" width="365"></p><span data-dcnode-id="1667" instrument_node="">
</span><p class="header2" data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Types of Notches</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Note: The notches can be made at any height on the tree, but always start high enough to allow room to complete all three cuts.</span></p><span data-dcnode-id="1661" instrument_node="">
</span><span data-dcnode-id="1660" instrument_node="">
</span><span data-dcnode-id="1659" instrument_node="">
</span><span data-dcnode-id="1655" instrument_node="">
</span><span data-dcnode-id="1653" instrument_node="">
</span><span data-dcnode-id="1652" instrument_node="">

</span><span data-dcnode-id="1637" instrument_node="">
</span><span data-dcnode-id="1635" instrument_node="">
</span><span data-dcnode-id="1634" instrument_node="">
</span><span data-dcnode-id="1631" instrument_node="">
</span><span data-dcnode-id="1628" instrument_node="">
</span><span data-dcnode-id="1626" instrument_node="">
</span><table border="0" cellpadding="3" cellspacing="0" data-dcnode-id="1624" width="565"><tbody data-dcnode-id="1625"><tr data-dcnode-id="1654"><td colspan="2" data-dcnode-id="1656"><b data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Conventional Notch</span></b></td></tr><tr data-dcnode-id="1645"><td data-dcnode-id="1650" width="92"><span data-dcnode-id="1651" instrument_node="">Top Cut:</span></td><td data-dcnode-id="1647" width="461"><span data-dcnode-id="1648" instrument_node="">Cut downward at a 45° angle to a point that is 1/4 to 1/3 the tree’s diameter.</span></td></tr><tr data-dcnode-id="1636"><td data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Bottom Cut:</span></td><td data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Cut straight across the tree until you reach the end point of the top cut.</span></td></tr><tr data-dcnode-id="1627"><td data-dcnode-id="1632" valign="top"><span data-dcnode-id="1633" instrument_node=""> Back Cut:</span></td><td data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Start the cut 1 inch above the notched corner on the opposite side of the tree. Cut straight across, until you reach the hinge wood.</span></td></tr></tbody></table><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1621"><img alt=" " data-dcnode-id="1622" height="508" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nasdonline.org/static_content/documents/1952/31.gif&amp;raw" width="317"></p><span data-dcnode-id="1620" instrument_node="">
</span><span data-dcnode-id="1619" instrument_node="">
</span><span data-dcnode-id="1618" instrument_node="">
