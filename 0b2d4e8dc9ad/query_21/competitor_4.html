</span><h1 class="entry-title article-heading" data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Pruning Apricot Trees: When, Why, and How</span></h1><span data-dcnode-id="659" instrument_node="">

</span><div class="entry-content mvt-content" data-dcnode-id="300"><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Pruning apricot trees doesn’t have to be an intimidating task. Itâ€™s actually pretty easy once you learn how to prune apricot trees.&nbsp;</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">There are a few basic cuts, the tools of the trade, and some general advice on how to best shape your apricot tree. Once youâ€™ve read through this DIY guide for pruning apricots, youâ€™ll be ready to make that green thumb even greener.&nbsp;</span></p><span data-dcnode-id="636" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="630"><noscript data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">&lt;img loading="lazy" width="700" height="470" src="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees.jpg" alt="Pruning Apricot Trees" class="wp-image-2823" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees.jpg 700w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-300x201.jpg 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-335x225.jpg 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-347x233.jpg 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-520x349.jpg 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-640x430.jpg 640w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Pruning Apricot Trees" class="wp-image-2823 lazyload" data-dcnode-id="633" data-pin-media="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees.jpg" data-src="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees.jpg.webp" data-srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees.jpg.webp 700w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-300x201.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-335x225.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-347x233.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-520x349.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-640x430.jpg.webp 640w" data-trellis-processed="1" data-webp="true" height="470" id="mv-trellis-img-1" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees.jpg.webp&amp;raw" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees.jpg.webp 700w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-300x201.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-335x225.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-347x233.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-520x349.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Pruning-Apricot-Trees-640x430.jpg.webp 640w" width="700"><figcaption data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Apricot Tree with Apricot Fruit</span></figcaption></figure><h1 data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Apricot Tree Pruning Goals</span></h1><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">The topic of pruning is a tough one for home gardeners. This is a big jump into a more skill-intensive aspect of taking care of our plants. So, why do we prune apricot trees in the first place?</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">As it turns out, there are several different reasons to learn how to prune apricot trees.&nbsp;</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">One of the biggest is improving tree health. We can prune trees to ensure that sunlight is able to evenly reach the buds on the branches and to optimize airflow through the tree. Even sunlight helps ensure there are no barren patches which could cause problems and the improved airflow helps your apricot tree resist disease.&nbsp;</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Another big reason is the apricots themselves! Pruning is done to help ensure new fruit growth each year.&nbsp;</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Now that we know why pruning apricot trees is so useful, letâ€™s learn how to do it!&nbsp;</span></p><span data-dcnode-id="612" instrument_node="">
</span><h1 data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">When to Start Pruning Apricot Trees&nbsp;</span></h1><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">The first thing to know about pruning apricot trees is that there is only one time of year you should do it. Late winter and early spring are the ideal times to prune the apricot tree. This is right as new flowers begin to open. Why do we start pruning apricot trees right when they are flowering again after winter?</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">This time is when your tree is actively growing. This means that your cuts from pruning will heal very quickly. Overall, waiting for late winter or early spring lets your apricot tree heal quickly from pruning and have the best chance at resisting diseases after being pruned. There are also gardeners who argue for summer pruning after the tree has fruited.&nbsp;</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Pruning in the summer after the tree has fruited prevents new growth and helps to keep the size, spread, and shape of your apricot tree in check. If you have a particularly demanding pruning job, waiting until mid summer might be best.&nbsp;</span></p><span data-dcnode-id="600" instrument_node="">
</span><ul data-dcnode-id="595"><li data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Prune in late winter and early spring for most mild to moderate pruning jobs. Wait until the flower buds start opening.&nbsp;</span></li><li data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Pruning apricot trees in summer inhibits growth and can be a good time to shape overgrown trees.&nbsp;</span></li></ul><h1 data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Preparing the Tools For Pruning Apricot Trees</span></h1><span data-dcnode-id="592" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="588"><noscript data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">&lt;img loading="lazy" width="900" height="600" src="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up.jpg" alt="Pruning An Apricot Tree Close Up" class="wp-image-1234" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up.jpg 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-300x200.jpg 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-768x512.jpg 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-735x490.jpg 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-335x223.jpg 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-347x231.jpg 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-520x347.jpg 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-640x427.jpg 640w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Pruning An Apricot Tree Close Up" class="wp-image-1234 lazyload" data-dcnode-id="589" data-pin-media="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up.jpg" data-src="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up.jpg.webp" data-srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up.jpg.webp 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-300x200.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-768x512.jpg.webp 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-735x490.jpg.webp 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-335x223.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-347x231.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-520x347.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-640x427.jpg.webp 640w" data-trellis-processed="1" data-webp="true" height="600" id="mv-trellis-img-2" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up.jpg.webp&amp;raw" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up.jpg.webp 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-300x200.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-768x512.jpg.webp 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-735x490.jpg.webp 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-335x223.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-347x231.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-520x347.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruning-An-Apple-Tree-Close-Up-640x427.jpg.webp 640w" width="900"></figure><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Pruning apricot trees is hard work and weâ€™re going to need some tools to help us get the job done. Letâ€™s go through the tools weâ€™ll need and how to prevent the spread of diseases in your apricot trees.&nbsp;</span></p><span data-dcnode-id="585" instrument_node="">
</span><h3 data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Hand Pruner</span></h3><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="578"><a aria-label="Hand pruners (opens in a new tab)" class="rank-math-link" data-dcnode-id="580" data-lasso-id="7304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00023RYT0%3Ftag%3Dminn-orchard-20" rel="nofollow noopener" target="_blank"><span data-dcnode-id="581" instrument_node="">Hand pruners</span></a><span data-dcnode-id="579" instrument_node=""> are the best tool of the trade when it comes to making sure apricots are healthy and well pruned. Youâ€™ll be doing the vast majority of your pruning with these little clippers.&nbsp;</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Itâ€™s a good idea to invest in a high quality hand pruner, but you donâ€™t need to go overboard with a high-end model. You want to make sure that your ideal pruner has replaceable parts in case anything breaks, a comfortable hand grip, and blades that can easily fit reasonably sized branches.&nbsp;</span></p><span data-dcnode-id="574" instrument_node="">
</span><h3 data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Lopper</span></h3><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Think about these as hand pruners with reach.&nbsp;</span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="564"><a aria-label="Loppers (opens in a new tab)" class="rank-math-link" data-dcnode-id="566" data-lasso-id="7305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/s%3Fk%3Dlopper%26linkCode%3Dsl2%26tag%3Dminn-orchard-20%26linkId%3Dfc49dd9feabf8a91e42f4852105b263f%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="567" instrument_node="">Loppers</span></a><span data-dcnode-id="565" instrument_node=""> have the same basic technology as the hand pruner, but they can reach up into trees and handle larger branches. Loppers are useful for helping you get at hard to access branches and tackle those thicker branches.&nbsp;</span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Itâ€™s important to make sure your pruning is done with clean cuts. If you think the branch might be a little too big for your hand pruners to handle, do your apricot tree a favor and break out the loppers.</span></p><span data-dcnode-id="560" instrument_node="">
</span><h3 data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Pruning Saw</span></h3><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">This is for the bigger jobs!</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="553" instrument_node="">A </span><a aria-label="pruning saw (opens in a new tab)" class="rank-math-link" data-dcnode-id="551" data-lasso-id="7306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B001RD7LRO%3Ftag%3Dminn-orchard-20" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="552" instrument_node="">pruning saw</span></a><span data-dcnode-id="550" instrument_node=""> helps you tackle those large branches that pruners and loppers just canâ€™t handle. This tool is a bit of an odd choice for our list because you are going to get the least use out of it. These saws are for cutting off large limbs which isn’t done very often outside of the initial shaping of a young apricot.&nbsp;</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">With that said, any hand saw will do the trick here. You can get one specifically made for pruning or just use a hand saw from your garage. Just make sure itâ€™s clean!&nbsp;</span></p><span data-dcnode-id="545" instrument_node="">
</span><h3 data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Help Prevent Apricot Tree Diseases&nbsp;</span></h3><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">One of the major reasons we prune apricot trees is to help them stay healthy, but pruning can also cause and spread diseases.&nbsp;</span></p><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Each time you move on to a new apricot tree or another type of plant, you should wash your hand pruner, lopper, and saw. This will help you to prevent the spread of disease from one plant to another.&nbsp;</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">If you want to be extra safe, you should wash equipment after cutting off dead, dying, or sick branches. The goal here is to have a healthy and safe apricot tree that looks great and produces delicious fruit. The little extra work of keeping your tools clean will go a long way.&nbsp;</span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="532" instrument_node="">You can read more about </span><a class="rank-math-link" data-dcnode-id="530" data-lasso-id="7307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//minnetonkaorchards.com/apricot-tree-diseases/"><span data-dcnode-id="531" instrument_node="">Apricot Tree Diseases and How To Prevent Them Here. </span></a></p><span data-dcnode-id="528" instrument_node="">
</span><h1 data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Pruning Apricot Trees in the First 3 Years</span></h1><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Letâ€™s say you just planted a young apricot tree, should you prune it?&nbsp;</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Yes! This is one of the most important times to learn how to prune apricot trees. When your tree is in its first three years is the ideal time window to help the tree to develop an ideal shape by the time it is fully grown.&nbsp;</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Young apricots grow rapidly and are more resilient. This means you can prune aggressively for shape and future fruit productions. Hereâ€™s how it works.&nbsp;</span></p><span data-dcnode-id="516" instrument_node="">
</span><h3 data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Clearing Out Dead Branches&nbsp;</span></h3><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">The first step is to clear out any dead, dying, or visibly sick branches. This should be an easy and quick job for most healthy trees. If your apricot tree is in seriously bad shape, it might be worth it to call in a professional to help restore the treeâ€™s health.&nbsp;</span></p><span data-dcnode-id="510" instrument_node="">
</span><h3 data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Creating Scaffolding Branches</span></h3><span data-dcnode-id="507" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="503"><noscript data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">&lt;img loading="lazy" width="900" height="627" src="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning.jpg" alt="Scaffolding Cuts" class="wp-image-1238" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning.jpg 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-300x209.jpg 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-768x535.jpg 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-735x512.jpg 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-335x233.jpg 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-347x242.jpg 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-520x362.jpg 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-640x446.jpg 640w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Scaffolding Cuts" class="wp-image-1238 lazyload" data-dcnode-id="504" data-pin-media="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning.jpg" data-src="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning.jpg.webp" data-srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning.jpg.webp 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-300x209.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-768x535.jpg.webp 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-735x512.jpg.webp 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-335x233.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-347x242.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-520x362.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-640x446.jpg.webp 640w" data-trellis-processed="1" data-webp="true" height="627" id="mv-trellis-img-3" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning.jpg.webp&amp;raw" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning.jpg.webp 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-300x209.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-768x535.jpg.webp 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-735x512.jpg.webp 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-335x233.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-347x242.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-520x362.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Apple-Tree-Pruning-640x446.jpg.webp 640w" width="900"></figure><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">The next step is creating what we call scaffolding branches. These will be the major branches of your tree as it gets older. You want to select about three scaffolding branches for your tree. They should be spaced about 18 to 25-inches apart and be growing outward at an angle from the trunk. These branches will be the core of your tree and this angle will help to support the heavy weight of the apricot fruit.&nbsp;</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Cut the remaining branches off at about a quarter of an inch from where they connect to the tree. You should be left with one main trunk that connects into three branches.&nbsp;</span></p><span data-dcnode-id="497" instrument_node="">
</span><h3 data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Other Cuts and Trimming&nbsp;</span></h3><span data-dcnode-id="494" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="490"><noscript data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">&lt;img loading="lazy" width="900" height="601" src="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep.jpg" alt="Cut and Keep" class="wp-image-1237" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep.jpg 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-300x200.jpg 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-768x513.jpg 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-735x491.jpg 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-335x224.jpg 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-347x232.jpg 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-520x347.jpg 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-640x427.jpg 640w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Cut and Keep" class="wp-image-1237 lazyload" data-dcnode-id="491" data-pin-media="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep.jpg" data-src="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep.jpg.webp" data-srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep.jpg.webp 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-300x200.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-768x513.jpg.webp 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-735x491.jpg.webp 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-335x224.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-347x232.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-520x347.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-640x427.jpg.webp 640w" data-trellis-processed="1" data-webp="true" height="601" id="mv-trellis-img-4" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep.jpg.webp&amp;raw" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep.jpg.webp 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-300x200.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-768x513.jpg.webp 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-735x491.jpg.webp 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-335x224.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-347x232.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-520x347.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Cut-and-Keep-640x427.jpg.webp 640w" width="900"></figure><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Take a look at your scaffolding branches and prune any smaller branches growing between the start of the scaffolding branch and about 8 to 10-inches up. There should be plenty of space between the base of the scaffolding branches and the tree itself. This helps promote even lighting and better air circulation throughout the tree.&nbsp;</span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Other cuts to consider have to do with the overall shape of your tree. Youâ€™ll want to cut off branches that are growing inwards toward the trunk as well as branches that are growing downward too dramatically.&nbsp;</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">You might have to do several pruning passes throughout the summer to handle smaller branches as they grow. Apricots grow quickly and this means more assertive pruning is needed.&nbsp;</span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">This covers younger apricot trees, but what more mature ones?&nbsp;</span></p><span data-dcnode-id="478" instrument_node="">
</span><h1 data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Pruning Mature Apricot Trees&nbsp;</span></h1><span data-dcnode-id="475" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="471"><noscript data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">&lt;img loading="lazy" width="900" height="540" src="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles.jpg" alt="good bad tree angles" class="wp-image-1236" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles.jpg 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-300x180.jpg 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-768x461.jpg 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-735x441.jpg 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-335x201.jpg 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-347x208.jpg 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-520x312.jpg 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-640x384.jpg 640w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="good bad tree angles" class="wp-image-1236 lazyload" data-dcnode-id="472" data-pin-media="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles.jpg" data-src="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles.jpg.webp" data-srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles.jpg.webp 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-300x180.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-768x461.jpg.webp 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-735x441.jpg.webp 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-335x201.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-347x208.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-520x312.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-640x384.jpg.webp 640w" data-trellis-processed="1" data-webp="true" height="540" id="mv-trellis-img-5" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles.jpg.webp&amp;raw" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles.jpg.webp 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-300x180.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-768x461.jpg.webp 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-735x441.jpg.webp 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-335x201.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-347x208.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-520x312.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Good-Bad-Tree-Angles-640x384.jpg.webp 640w" width="900"></figure><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Mature trees are less resilient than their younger counterparts which changes how we approach pruning.&nbsp;</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Ideally, your mature tree should already be in a great shape with strong scaffolding branches. This means that mature apricot trees typically only need regular upkeep and maintenance rather than massive overhauls.&nbsp;</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">In addition to the other cuts we talked about above, youâ€™re also going to want to trim back the growth each year. Apricot trees need about 20% trimmed to help keep growth in check. This could mean anything from a few inches to a few feet depending on how much your tree grew this year.&nbsp;</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Another growth-related trim is keeping the highest branches within armâ€™s reach. This makes picking the fruit much easier. This is also optional and more about how you want your apricot experience to be. Some people donâ€™t mind either breaking out the ladder or buying a specialty fruit picker for those high-up branches.&nbsp;</span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Now letâ€™s talk about one of the most interesting problems when it comes to pruning apricot trees: overproducing.&nbsp;</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="455" instrument_node="">Check out our post on </span><a class="rank-math-link" data-dcnode-id="453" data-lasso-id="7308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//minnetonkaorchards.com/growing-apricot-trees/"><span data-dcnode-id="454" instrument_node="">How To Grow Apricot Trees Here.</span></a><span data-dcnode-id="452" instrument_node=""> </span></p><span data-dcnode-id="450" instrument_node="">
</span><h1 data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Fruit Thinning for Apricot Trees</span></h1><span data-dcnode-id="447" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="441"><noscript data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">&lt;img loading="lazy" width="700" height="467" src="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots.jpg" alt="Ripe Apricots" class="wp-image-2821" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots.jpg 700w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-300x200.jpg 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-335x223.jpg 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-347x231.jpg 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-520x347.jpg 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-640x427.jpg 640w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Ripe Apricots" class="wp-image-2821 lazyload" data-dcnode-id="444" data-pin-media="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots.jpg" data-src="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots.jpg.webp" data-srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots.jpg.webp 700w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-300x200.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-335x223.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-347x231.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-520x347.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-640x427.jpg.webp 640w" data-trellis-processed="1" data-webp="true" height="467" id="mv-trellis-img-6" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots.jpg.webp&amp;raw" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots.jpg.webp 700w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-300x200.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-335x223.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-347x231.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-520x347.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Ripe-Apricots-640x427.jpg.webp 640w" width="700"><figcaption data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Ripe apricots on the orchard tree. </span></figcaption></figure><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Yes. Your apricot tree can actually produce too much fruit. Hereâ€™s what happens.&nbsp;</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">An apricot tree is considered to be â€œoverproducingâ€ if it only fruits every other year or so. One of the reasons for inconsistent fruiting is that by producing too much fruit one year, the tree needs to skip the next year.&nbsp;</span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Overproducing also references boughs that have too much fruit weight on them and are at risk for snapping.&nbsp;</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">If your apricotâ€™s branches are starting to sag dramatically, it might be time to do some fruit thinning.&nbsp;</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Wait until the summer for this pruning job. The apricot fruits should be about one-inch in diameter when you go to fruit thin your apricot tree. Cut off a few fruiting branches that are growing off your main scaffolding branches.&nbsp;</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Youâ€™re mainly looking to reduce weight on the main branches and create an even distribution of fruit throughout the tree. It should only take a few cuts to even things out.&nbsp;</span></p><span data-dcnode-id="423" instrument_node="">
</span><h1 data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">How to Prune Apricot Trees with Style</span></h1><span data-dcnode-id="420" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="416"><noscript data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">&lt;img loading="lazy" width="900" height="600" src="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees.jpg" alt="pruned apple trees" class="wp-image-1239" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees.jpg 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-300x200.jpg 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-768x512.jpg 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-735x490.jpg 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-335x223.jpg 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-347x231.jpg 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-520x347.jpg 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-640x427.jpg 640w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="pruned apple trees" class="wp-image-1239 lazyload" data-dcnode-id="417" data-pin-media="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees.jpg" data-src="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees.jpg.webp" data-srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees.jpg.webp 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-300x200.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-768x512.jpg.webp 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-735x490.jpg.webp 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-335x223.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-347x231.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-520x347.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-640x427.jpg.webp 640w" data-trellis-processed="1" data-webp="true" height="600" id="mv-trellis-img-7" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees.jpg.webp&amp;raw" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees.jpg.webp 900w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-300x200.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-768x512.jpg.webp 768w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-735x490.jpg.webp 735w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-335x223.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-347x231.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-520x347.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/01/Pruned-Apple-Trees-640x427.jpg.webp 640w" width="900"></figure><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Your apricot tree is more than just a fruit producing plant, itâ€™s also ornamental.&nbsp;</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">The apricot features beautiful foliage, stunning blooms, and eye-catching fruit in the summer months. Part of pruning your apricot tree is making sure that it still fits in with your style and your gardening plans.&nbsp;</span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">If youâ€™re planning on adding another apricot or a different type of fruiting tree nearby, it might be time to prune back your apricot. The shape of your tree is also an important style decision to consider.&nbsp;</span></p><span data-dcnode-id="407" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="401"><noscript data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">&lt;img loading="lazy" width="700" height="465" src="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning.jpg" alt="Crabapple Tree" class="wp-image-2822" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning.jpg 700w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-300x199.jpg 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-335x223.jpg 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-347x231.jpg 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-520x345.jpg 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-640x425.jpg 640w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Crabapple Tree" class="wp-image-2822 lazyload" data-dcnode-id="404" data-pin-media="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning.jpg" data-src="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning.jpg.webp" data-srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning.jpg.webp 700w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-300x199.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-335x223.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-347x231.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-520x345.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-640x425.jpg.webp 640w" data-trellis-processed="1" data-webp="true" height="465" id="mv-trellis-img-8" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning.jpg.webp&amp;raw" srcset="https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning.jpg.webp 700w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-300x199.jpg.webp 300w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-335x223.jpg.webp 335w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-347x231.jpg.webp 347w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-520x345.jpg.webp 520w, https://minnetonkaorchards.com/wp-content/uploads/2021/05/Fence-Pruning-640x425.jpg.webp 640w" width="700"><figcaption data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">The branches of this crabapple tree have been trained over decades to grow along wires into a linear form, creating a formal appearance of a wall or fence.</span></figcaption></figure><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">We talked about the functional aspects of shaping our apricot trees with the scaffolding method earlier. Over time, this will create a beautiful and bushy tree with easily accessible fruit!&nbsp;</span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">As it turns out, shaping an apricot tree for style also gives us the best shape when it comes time to harvest the fruit.&nbsp;</span></p><span data-dcnode-id="395" instrument_node="">
</span><h1 data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Tradeoffs &amp; Limits for Pruning Apricot Trees</span></h1><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Pruning apricot trees always has its limitations.&nbsp;</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Your apricot tree is a living thing. It can only take so much pruning throughout the year before it succumbs to disease or stops producing fruit for a season. If youâ€™re new to pruning apricot trees, itâ€™s best to take things easy and start simple. This is especially true if youâ€™ve got an apricot tree thatâ€™s in need of a lot of TLC.&nbsp;</span></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">We hope our guide has taught you how to prune apricot trees. We canâ€™t wait to see what you accomplish in your garden!&nbsp;</span></p><span data-dcnode-id="383" instrument_node="">
</span><h2 data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Apricot Trees You Can Read About on Minneopa Orchards</span></h2><span data-dcnode-id="380" instrument_node="">
