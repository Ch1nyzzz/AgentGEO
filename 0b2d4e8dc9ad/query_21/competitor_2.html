</span><h1 data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Pruning Trees</span></h1><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="245"><img alt="Pruning" data-dcnode-id="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.treesaregood.org/portals/0/Images/treeowner/Pruning.jpg&amp;raw" style="margin: 10px 5px; float: left; width: 650px; height: 85px;" title="Pruning"><span data-dcnode-id="246" instrument_node="">Pruning is the most common tree maintenance procedure. Unlike forest trees, landscape trees need a higher level of care to maintain structural integrity and aesthetics. Pruning must be done with an understanding of tree biology because improper pruning can create lasting damage or shorten the tree’s life.</span></p><span data-dcnode-id="244" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="243" instrument_node="">Learn more about </span><a data-dcnode-id="241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.treesaregood.org/Portals/0/TreesAreGood_Pruning%2520Mature%2520Trees_0721_1.pdf"><span data-dcnode-id="242" instrument_node="">mature&nbsp;tree pruning</span></a><span data-dcnode-id="240" instrument_node="">.</span></p><span data-dcnode-id="238" instrument_node="">
</span><h2 data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Reasons for Pruning</span></h2><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="232"><img alt="" class="floatLeft" data-dcnode-id="234" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.treesaregood.org/portals/0/images/treeowner/pruning1.jpg&amp;raw" style="max-width: 50%;"><span data-dcnode-id="233" instrument_node="">Each cut can potentially change the growth of the tree; therefore, it is important to remember that no branch should be cut without a reason. Some common reasons for pruning include, removal of dead branches to improve form and increase safety, to increase light and air penetration for plants below the tree’s crown, or corrective and preventative measures.</span></p><span data-dcnode-id="231" instrument_node="">
</span><h2 data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">When to Prune</span></h2><span data-dcnode-id="228" instrument_node="">
</span><p data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">&nbsp;</span></p><span data-dcnode-id="225" instrument_node="">
</span><p data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Most light, routine pruning to remove weak, dead, or diseased limbs can be accomplished at any time during the year with little effect on the tree.</span></p><span data-dcnode-id="222" instrument_node="">
</span><p data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">As a rule, growth and wound closure are maximized if pruning takes place before the spring growth flush. Heavy pruning of live tissue just after the spring growth flush should be avoided, especially on weak trees.</span></p><span data-dcnode-id="219" instrument_node="">
</span><p data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Tree diseases, such as oak wilt, can be spread when pruning wounds provide access to disease-causing agents. Susceptible trees should not be pruned during active transmission periods.</span></p><span data-dcnode-id="216" instrument_node="">
</span><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">If you’re unsure about when to prune, contact your local arborist.</span></p><span data-dcnode-id="213" instrument_node="">
</span><h2 data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Pruning Techniques</span></h2><span data-dcnode-id="210" instrument_node="">
</span><div data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Specific types of pruning may be necessary to maintain a mature tree in a healthy, safe, and attractive condition.</span></div><span data-dcnode-id="207" instrument_node="">
</span><ul data-dcnode-id="185"><span data-dcnode-id="206" instrument_node="">
</span><li data-dcnode-id="202"><strong data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Cleaning</span></strong><span data-dcnode-id="203" instrument_node=""> is the removal of dead, dying, diseased, weakly attached, and low-vigor branches from the crown of a tree.</span></li><span data-dcnode-id="201" instrument_node="">
</span><li data-dcnode-id="197"><strong data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Raising</span></strong><span data-dcnode-id="198" instrument_node=""> removes the lower branches from a tree to provide clearance for buildings, vehicles, pedestrians, and vistas.</span></li><span data-dcnode-id="196" instrument_node="">
</span><li data-dcnode-id="192"><strong data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Reduction</span></strong><span data-dcnode-id="193" instrument_node=""> reduces the size of a tree, often for utility line clearance. Reducing a tree’s height or spread is best accomplished by pruning back the leaders and branch terminals to secondary branches that are large enough to assume the terminal roles (at least one-third the diameter of the cut stem). Compared to topping, reduction helps maintain the tree’s form and structural integrity.</span></li><span data-dcnode-id="191" instrument_node="">
</span><li data-dcnode-id="187"><strong data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Reducing density</span></strong><span data-dcnode-id="188" instrument_node=""> of foliage at the crown periphery, thinning, is sometimes performed to increase wind or light penetration for aesthetic reasons and to promote interior foliage development.</span></li><span data-dcnode-id="186" instrument_node="">
</span></ul><span data-dcnode-id="184" instrument_node="">
</span><h2 data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Pruning Young Trees</span></h2><span data-dcnode-id="181" instrument_node="">
</span><p data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">&nbsp;</span></p><span data-dcnode-id="178" instrument_node="">
</span><p data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Structural pruning is essential in developing a tree with a strong structure and desirable form. Trees that receive the appropriate pruning while young will require less corrective pruning as they mature.</span></p><span data-dcnode-id="175" instrument_node="">
</span><p data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Remember that each cut has the potential to change the growth of the tree, therefore it is important to set an objective for why the tree will be pruned. For young trees the objective is to improve tree structure. Poor pruning can cause damage the tree must grow over causing the wound to stay within the tree forever.</span></p><span data-dcnode-id="172" instrument_node="">
</span><p data-dcnode-id="167"><span data-dcnode-id="171" instrument_node="">Learn more about </span><a class="PDFlink" data-dcnode-id="169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.treesaregood.org/Portals/0/TreesAreGood_Pruning%2520Young%2520Trees_0621.pdf" target="_blank"><span data-dcnode-id="170" instrument_node="">pruning young trees</span></a><span data-dcnode-id="168" instrument_node="">.</span></p><span data-dcnode-id="166" instrument_node="">
</span><h2 data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Pruning Palms</span></h2><span data-dcnode-id="163" instrument_node="">
</span><p data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">&nbsp;</span></p><span data-dcnode-id="160" instrument_node="">
</span><p data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">Most pruning of palms is done to remove dead or dying fronds, inflorescences (flowering), and/or fruiting clusters, particularly those that may be a potential risk to the public, such as coconuts.</span></p><span data-dcnode-id="157" instrument_node="">
</span><p data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">Pruning is usually conducted at least biannually. Coconuts may be pruned as often as every 3–4 months to minimize the risk of injury or damage from the heavy fruit. Great care should be taken to avoid any damage to the terminal bud. Over-pruned palms may have slower growth and may attract pests.</span></p><span data-dcnode-id="154" instrument_node="">
</span><p data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">Generally, remove old, dead, lower fronds only, unless otherwise required for clearance. Occasionally, live green fronds, where the frond shaft has descended below a horizontal plane, can be removed. Removing live fronds where the shaft is greater than 45 degrees above horizontal is not known to reduce future pruning requirements.</span></p><span data-dcnode-id="151" instrument_node="">
</span><p data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Climbing spikes should not be used to climb palms for pruning because they permanently wound the palm trunk. Wounds on palms do not close.</span></p><span data-dcnode-id="148" instrument_node="">
</span><p data-dcnode-id="143"><span data-dcnode-id="147" instrument_node="">Learn more about </span><a class="PDFlink" data-dcnode-id="145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.treesaregood.org/Portals/0/TreesAreGood_Palms_0321.pdf" target="_blank"><span data-dcnode-id="146" instrument_node="">palms</span></a><span data-dcnode-id="144" instrument_node="">.</span></p><span data-dcnode-id="142" instrument_node="">
</span><h2 data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">Don’t Top Trees!</span></h2><span data-dcnode-id="139" instrument_node="">
</span><p data-dcnode-id="137"><img alt="Tree Topping" data-dcnode-id="138" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.treesaregood.org/portals/0/images/treeowner/pruning3.jpg&amp;raw" style="max-width: 100%;"></p><span data-dcnode-id="136" instrument_node="">
</span><p data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">Topping is the indiscriminate cutting of tree branches to stubs or to lateral branches that are not large enough to assume the terminal role. Topping is often used to reduce the size of a tree, but it is perhaps the most harmful tree pruning practice known.</span></p><span data-dcnode-id="133" instrument_node="">
</span><p data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">Topping can lead to unacceptable risk, tree stress, and decay. It is also expensive and destroys the natural form of the tree.</span></p><span data-dcnode-id="130" instrument_node="">
</span><p data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Alternatives to topping include removing small branches to their point of origin, or pruning back larger limbs to a lateral branch that is large enough to assume the terminal role. Sometimes the best solution is removing the tree and replacing it with a species that is more appropriate for the site.</span></p><span data-dcnode-id="127" instrument_node="">
</span><p data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">Be sure to consult with a local arborist about alternatives to topping.</span></p><span data-dcnode-id="124" instrument_node="">
</span><p data-dcnode-id="119"><span data-dcnode-id="123" instrument_node="">Learn more about </span><a class="PDFlink" data-dcnode-id="121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.treesaregood.org/Portals/0/TreesAreGood_Why%2520Topping%2520Hurts_0321.pdf" target="_blank"><span data-dcnode-id="122" instrument_node="">why topping hurts trees</span></a><span data-dcnode-id="120" instrument_node="">.</span></p><span data-dcnode-id="118" instrument_node="">
</span></div><span data-dcnode-id="116" instrument_node="">
