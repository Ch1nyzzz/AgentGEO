</span><div class="entry-content" data-dcnode-id="1581"><span data-dcnode-id="1814" instrument_node="">
</span><div class="at-above-post addthis_tool" data-dcnode-id="1813" data-url="https://www.thegardenglove.com/how-and-when-to-prune-trees/"></div><p data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Lets touch base about how to prune trees, because it is one of those gardening chores that must be done at a certain time of year. If you have run across any of the “guides” on pruning trees written by the extension programs of state universities, you may have had your head spin around. Here are all the simple guidelines on how, and when to prune trees.</span></p><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" style="color: #ff0000;"><span data-dcnode-id="1809" instrument_node=""> </span></span></p><center data-dcnode-id="1803"><span data-dcnode-id="1806" instrument_node="">

</span><p class="has-image-child" data-dcnode-id="1794"><img alt="How To Prune Trees &amp; When To Prune Trees" class="aligncenter size-full wp-image-8855 entered lazyloaded" data-dcnode-id="1797" data-lazy-sizes="(max-width: 736px) 100vw, 736px" data-lazy-src="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25.jpg" data-lazy-srcset="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25.jpg 736w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25-300x141.jpg 300w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25-570x269.jpg 570w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25-550x259.jpg 550w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25-610x288.jpg 610w" data-ll-status="loaded" height="347" sizes="(max-width: 736px) 100vw, 736px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25.jpg&amp;raw" srcset="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25.jpg 736w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25-300x141.jpg 300w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25-570x269.jpg 570w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25-550x259.jpg 550w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25-610x288.jpg 610w" width="736"><noscript data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">&lt;img class="aligncenter size-full wp-image-8855" src="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25.jpg" alt="How To Prune Trees &amp;amp; When To Prune Trees" width="736" height="347" srcset="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25.jpg 736w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25-300x141.jpg 300w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25-570x269.jpg 570w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25-550x259.jpg 550w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-25-610x288.jpg 610w" sizes="(max-width: 736px) 100vw, 736px" /&gt;</span></noscript></p><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1790" instrument_node="">
</span><h2 data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">When to Prune Trees</span></h2><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1786" instrument_node="">For all of you who pull out the clippers and loppers right after Christmas, you might want to think again. While many experts recommend this, we think there is good reason to wait. Part of the reason to prune trees is to remove any dead or dying tissue that didn’t survive winter temperatures. Most trees will come out healthier on the other end if you wait until after the coldest part of winter has passed, but before vigorous growth starts in </span><strong data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">early</span></strong><span data-dcnode-id="1783" instrument_node=""> spring. For most people that’s February to March. That having been said, it’s ok to do minor pruning to weed out dead branches, etc… at any time of year. Note: it is okay to still prune fruit trees if they have started to flower. In fact, fruit trees tend to get some winter kill of branches, and waiting for the first flowers will help you determine which branches are dead and need to be removed.</span></p><span data-dcnode-id="1781" instrument_node="">
</span><p class="has-image-child" data-dcnode-id="1777"><img alt="How To Prune Trees &amp; When To Prune Trees" class="aligncenter size-full wp-image-8850 entered lazyloaded" data-dcnode-id="1780" data-lazy-sizes="(max-width: 1000px) 100vw, 1000px" data-lazy-src="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21.jpeg" data-lazy-srcset="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21.jpeg 1000w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-225x300.jpeg 225w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-768x1025.jpeg 768w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-570x760.jpeg 570w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-550x734.jpeg 550w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-375x500.jpeg 375w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-810x1080.jpeg 810w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-610x814.jpeg 610w" data-ll-status="loaded" height="1334" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21.jpeg&amp;raw" srcset="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21.jpeg 1000w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-225x300.jpeg 225w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-768x1025.jpeg 768w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-570x760.jpeg 570w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-550x734.jpeg 550w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-375x500.jpeg 375w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-810x1080.jpeg 810w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-610x814.jpeg 610w" width="1000"><noscript data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">&lt;img class="aligncenter size-full wp-image-8850" src="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21.jpeg" alt="How To Prune Trees &amp;amp; When To Prune Trees" width="1000" height="1334" srcset="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21.jpeg 1000w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-225x300.jpeg 225w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-768x1025.jpeg 768w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-570x760.jpeg 570w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-550x734.jpeg 550w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-375x500.jpeg 375w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-810x1080.jpeg 810w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-21-610x814.jpeg 610w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript></p><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1773" instrument_node="">
</span><h2 data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">How to Prune Trees That Are Large</span></h2><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Short answer? Don’t. Large trees need an arborist or tree trimming service for both safety and health of the tree.&nbsp; Fortunately, large trees rarely need to be pruned yearly!</span></p><span data-dcnode-id="1767" instrument_node="">
</span><h4 data-dcnode-id="1766"></h4><span data-dcnode-id="1765" instrument_node="">
</span><h2 data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">How to Prune Trees That Are Small</span></h2><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1761" instrument_node="">You prune decorative garden trees for two reasons… First, is to improve the health of the tree. Pruning creates more compact and healthy growth, and opens up the crown for good air circulation. Second, to improve the appearance of the tree. Every time you make a cut in your tree, first think about which one of those objectives you are trying to achieve… if your cut fits with one of those two, it’s a good cut. Check out this great reference from </span><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lancotree.com/about-us/" rel="noopener" target="_blank"><span data-dcnode-id="1760" instrument_node="">Lanco Tree</span></a><span data-dcnode-id="1758" instrument_node="">.</span></p><span data-dcnode-id="1756" instrument_node="">
</span><p class="has-image-child" data-dcnode-id="1752"><img alt="" class="aligncenter size-full wp-image-8860 entered error" data-dcnode-id="1755" data-lazy-sizes="(max-width: 736px) 100vw, 736px" data-lazy-src="https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26.jpg" data-lazy-srcset="https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26.jpg 736w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-279x300.jpg 279w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-570x613.jpg 570w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-550x592.jpg 550w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-465x500.jpg 465w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-610x656.jpg 610w" data-ll-status="error" height="792" sizes="(max-width: 736px) 100vw, 736px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26.jpg&amp;raw" srcset="https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26.jpg 736w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-279x300.jpg 279w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-570x613.jpg 570w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-550x592.jpg 550w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-465x500.jpg 465w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-610x656.jpg 610w" width="736"><noscript data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">&lt;img class="aligncenter size-full wp-image-8860" src="https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26.jpg" alt="" width="736" height="792" srcset="https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26.jpg 736w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-279x300.jpg 279w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-570x613.jpg 570w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-550x592.jpg 550w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-465x500.jpg 465w, https://www.thegardenglove.com/wp-content/uploads/2018/01/How-and-When-to-Prune-Trees-26-610x656.jpg 610w" sizes="(max-width: 736px) 100vw, 736px" /&gt;</span></noscript></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1747" instrument_node="">Note: Make sure your </span><a data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardeners.com/buy/garden-tools/pruners-and-loppers/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1746" instrument_node="">pruners and loppers</span></a><span data-dcnode-id="1744" instrument_node=""> are sharp and clean. You don’t want to invite fungus or disease. And if they need to be replaced, we like all the garden tools &amp; supples at </span><a data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardeners.com/buy/garden-tools/pruners-and-loppers/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1743" instrument_node="">Gardener’s Supply Co</span></a><span data-dcnode-id="1741" instrument_node="">.</span></p><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">To prune a small tree for health, first you want to remove any dead or unhealthy branches. Make your cuts just outside the collar of the branch…don’t cut too close to the trunk, and on the other side, don’t leave a stub. Below is an example of a proper cut. If branches cross over or are too thick, prune them out to allow the branches you leave room to grow and flourish. Most people are not aggressive enough in thinning out branches.</span></p><span data-dcnode-id="1736" instrument_node="">
</span><p class="has-image-child" data-dcnode-id="1732"><img alt="" class="full aligncenter wp-image-8852 size-full entered error" data-dcnode-id="1735" data-lazy-sizes="(max-width: 736px) 100vw, 736px" data-lazy-src="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22.jpg" data-lazy-srcset="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22.jpg 736w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22-300x200.jpg 300w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22-570x379.jpg 570w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22-550x366.jpg 550w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22-610x406.jpg 610w" data-ll-status="error" height="490" sizes="(max-width: 736px) 100vw, 736px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22.jpg&amp;raw" srcset="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22.jpg 736w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22-300x200.jpg 300w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22-570x379.jpg 570w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22-550x366.jpg 550w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22-610x406.jpg 610w" width="736"><noscript data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">&lt;img class="full aligncenter wp-image-8852 size-full" src="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22.jpg" alt="" width="736" height="490" srcset="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22.jpg 736w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22-300x200.jpg 300w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22-570x379.jpg 570w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22-550x366.jpg 550w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-22-610x406.jpg 610w" sizes="(max-width: 736px) 100vw, 736px" /&gt;</span></noscript></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Now prune your tree for shape and size. Step back and look at your tree, and know what it’s natural shape should be. For instance, is it a weeping tree, or a graceful vase shape? Make sure you remove branches that are interfering with the shape you want your tree to take. Step back after every cut and re-evaluate. Try to remove most of your branches at the trunk, but if you need to shorten a branch, don’t cut it in the middle… make your cut a quarter inch above a bud.</span></p><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1722" instrument_node="">
</span><h2 data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">How to Prune Fruit Trees</span></h2><span data-dcnode-id="1719" instrument_node="">
</span><p class="has-image-child" data-dcnode-id="1715"><img alt="How To Prune Trees &amp; When To Prune Trees" class="aligncenter size-full wp-image-8853 entered lazyloaded" data-dcnode-id="1718" data-lazy-sizes="(max-width: 726px) 100vw, 726px" data-lazy-src="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23.jpg" data-lazy-srcset="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23.jpg 726w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23-300x200.jpg 300w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23-570x379.jpg 570w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23-550x366.jpg 550w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23-610x406.jpg 610w" data-ll-status="loaded" height="483" sizes="(max-width: 726px) 100vw, 726px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23.jpg&amp;raw" srcset="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23.jpg 726w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23-300x200.jpg 300w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23-570x379.jpg 570w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23-550x366.jpg 550w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23-610x406.jpg 610w" width="726"><noscript data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">&lt;img class="aligncenter size-full wp-image-8853" src="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23.jpg" alt="How To Prune Trees &amp;amp; When To Prune Trees" width="726" height="483" srcset="https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23.jpg 726w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23-300x200.jpg 300w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23-570x379.jpg 570w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23-550x366.jpg 550w, https://www.thegardenglove.com/wp-content/uploads/2013/12/How-and-When-to-Prune-Trees-23-610x406.jpg 610w" sizes="(max-width: 726px) 100vw, 726px" /&gt;</span></noscript></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Pruning fruit trees is slightly different in that the main purpose is to encourage stronger growth of the fruit itself, not size of the tree. This involves creating a more compact tree and only leaving the strongest branches, which results in large and more flavorful fruit.</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1710" instrument_node="">According to Dr. Lee Reich, author of “Landscaping with Fruits”, “You need to make thinning cuts </span><i data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">and</span></i><span data-dcnode-id="1707" instrument_node=""> heading cuts—to keep the center of the tree open and to stimulate new growth for the following year. And in general you need to cut more than you probably think you should.”</span></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1702" instrument_node="">
</span><h3 data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Cat Tossing Method!</span></h3><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Also suggested by Dr. Reich is a good visual tool for deciding whether you have thinned your fruit trees far enough…another place most people are not aggressive enough. He calls it his “cat tossing method”. Yes, I find this disturbing, but it’s a good visual… He says if when you are finished pruning, you could toss a cat through the branches, you’ve done enough. Not the analogy I would use, and I’m torn between laughing at the craziness of it, and feeling really disturbed. But there you are, one of the leading authorities on pruning. How about this, he offers an alternative for those of us a bit sensitive… If a large bird can fly through the branches, you are good. Why didn’t you just say that in the first place, Dr. Reich? :) His basic rule for thinning fruit on apple and peach trees is that for every 20 blossoms, only one should remain. Yep, that aggressive.</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">So prune your trees at the right time, with the right technique. It will improve their curb appeal, their flowering and fruiting, and their health. It’s not hard, just take it one cut at a time!</span></p><span data-dcnode-id="1693" instrument_node="">
