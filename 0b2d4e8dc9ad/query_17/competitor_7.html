</span><div class="three-col-spacing" data-dcnode-id="1107"><span data-dcnode-id="1117" instrument_node="">
</span><p class="lead" data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">It’s deep winter and I haven’t really felt like going out into the garden. It’s damp and brown and doesn’t look very inviting. The cold, short days have seemed like a good excuse to stay indoors.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">But today it’s bright and sunny and I feel inspired. Succulent, green spring shoots are emerging from piles of rotting leaves that cover my borders and the snowdrops are out. It’s a good day for cutting and tidying. And my garden really needs it, especially the fruit trees.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Throughout the winter, I’ve been watching them from the window, droplets of water hanging from their dormant branches. The Bramley apple in my garden is leggy and shapeless – it needs some help. But when is the right time to prune fruit trees? Here are some general tips on how to prune your apple and other fruit trees in your garden.</span></p><span data-dcnode-id="1108" instrument_node="">
</span></div><span data-dcnode-id="1106" instrument_node=""> </span></div><span data-dcnode-id="1104" instrument_node="">
</span></div><div class="column-3" data-dcnode-id="1098"><span data-dcnode-id="1102" instrument_node=""> </span><div data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">

</span><h2 data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">When to prune fruit trees?</span></h2><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Fruit tree pruning can generally be carried out in winter, spring or summer, depending on what your end goal is.</span></p><span data-dcnode-id="1036" instrument_node="">

</span><div class="three-col-spacing" data-dcnode-id="963"><span data-dcnode-id="970" instrument_node="">
</span><h3 data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Winter pruning</span></h3><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Mainly for apples, pears and quince, winter pruning encourages vigorous growth. So if you want new shoots, and more flowers and therefore fruits, prune in winter. Pruning at this time of year, when the leaves have fallen, gives you a chance to see the overall shape and structure of your tree.</span></p><span data-dcnode-id="964" instrument_node="">
</span></div><span data-dcnode-id="962" instrument_node=""> </span></div><span data-dcnode-id="960" instrument_node="">

</span></div><div class="column-6" data-dcnode-id="916"><span data-dcnode-id="935" instrument_node=""> </span><div data-dcnode-id="918"><span data-dcnode-id="934" instrument_node="">
</span><div class="three-col-spacing" data-dcnode-id="920"><span data-dcnode-id="933" instrument_node="">
</span><h3 data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Spring and summer pruning</span></h3><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Mainly for stone fruits or if your tree is too big, and you don’t want to encourage vigorous growth. Also good for trained apples and pears.</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">It doesn’t trigger the tree into producing lots of new growth so it's good for trees you want to keep small and for dwarf trees. It’s also a chance to remove diseased or dead wood.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Because spring and summer pruning is carried out after the tree has started to develop fruits (known as setting fruits), you can avoid cutting the branches with fruits on.</span></p><span data-dcnode-id="921" instrument_node="">

</span><h3 data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Autumn pruning</span></h3><span data-dcnode-id="887" instrument_node="">

</span><div class="three-col-spacing" data-dcnode-id="776"><span data-dcnode-id="789" instrument_node="">
</span><div class="quick-facts" data-dcnode-id="778"><span data-dcnode-id="788" instrument_node="">
</span><div class="heading" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">When to prune apple trees</span></div><span data-dcnode-id="785" instrument_node="">
</span><div class="fact" data-dcnode-id="780"><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Standard apple trees - those with a central trunk -&nbsp; should be pruned when the tree is dormant in winter. Ideally between November and early March. Trained apple trees, like espaliers and fans, should be pruned in summer.</span></p><span data-dcnode-id="781" instrument_node="">
</span></div><span data-dcnode-id="779" instrument_node="">
</span></div><span data-dcnode-id="777" instrument_node="">
</span></div><span data-dcnode-id="775" instrument_node=""> </span></div><span data-dcnode-id="773" instrument_node="">
</span></div><div class="column-6" data-dcnode-id="723"><span data-dcnode-id="771" instrument_node=""> </span><div data-dcnode-id="725"><span data-dcnode-id="770" instrument_node="">
</span><div class="three-col-spacing" data-dcnode-id="727"><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="768" instrument_node="">In general, pruning of apples (</span><em data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Malus</span></em><span data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">&nbsp;</span></span><span data-dcnode-id="763" instrument_node="">species), pears (</span><em data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Pyrus</span></em><span data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">&nbsp;</span></span><span data-dcnode-id="758" instrument_node="">species) and quince (</span><em data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Cydonia oblongata</span></em><span data-dcnode-id="755" instrument_node="">) is best carried out in winter. Quince fruits are produced on the new season’s growth so winter pruning can be used to promote new shoots and a better fruit crop.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">When you're pruning, aim to create an open goblet shape in the canopy. Only remove about a third of the branches, including those that grow towards the centre of the goblet, crossing, diseased and damaged branches. This will encourage new growth and allow the air and sunlight to penetrate the branches.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Trained fruit trees and or overgrown trees can be pruned in the summer to maintain shape.&nbsp;</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="741"><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">When:</span></strong><span data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">&nbsp;</span></span><span data-dcnode-id="742" instrument_node="">November to early March.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="729"><strong data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">General tips:</span></strong><span data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">&nbsp;</span></span><a data-dcnode-id="731" data-udi="umb://document/b515365653e94a7782656ba7f51cfdb7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.woodlandtrust.org.uk/blog/2017/12/how-to-prune-apple-trees-in-winter/" title="How to prune apple trees in winter"><span data-dcnode-id="735" instrument_node="">see our</span><span data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">&nbsp;</span></span><span data-dcnode-id="732" instrument_node="">guide to winter pruning apples and pears</span></a><span data-dcnode-id="730" instrument_node="">.</span></p><span data-dcnode-id="728" instrument_node="">

</span><div class="heading" data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">When to prune plum trees?</span></div><span data-dcnode-id="592" instrument_node="">
</span><div class="fact" data-dcnode-id="586"><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Once plum trees have established (about 3 years old) they can be pruned in summer, from June onwards.</span></span></p><span data-dcnode-id="587" instrument_node="">
</span></div><span data-dcnode-id="585" instrument_node="">
</span></div><span data-dcnode-id="583" instrument_node="">
</span></div><span data-dcnode-id="581" instrument_node=""> </span></div><span data-dcnode-id="579" instrument_node="">
</span></div><div class="column-6" data-dcnode-id="543"><span data-dcnode-id="577" instrument_node=""> </span><div data-dcnode-id="545"><span data-dcnode-id="576" instrument_node="">
</span><div class="three-col-spacing" data-dcnode-id="547"><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="574" instrument_node="">Plum trees, along with cherries, peaches and apricots are all plants from the genus</span><span data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">&nbsp;</span></span><em data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Prunus</span></em><span data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">&nbsp;</span></span><span data-dcnode-id="567" instrument_node="">and are best pruned lightly in the summer. Carefully prune out the centre of the canopy to create an open goblet shape. Only take about one-third of the branches out and remove crossing ranchers and those growing inwards towards the centre. Also, remove any shoots or buds growing from the base of the trunk.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Summer pruning encourages your tree to produce higher fruit crops, allows the air and light into the centre of the tree canopy (which helps fruits to stay healthy and ripen) and stops your trees from becoming too big.</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="556"><strong data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">When:</span></strong><span data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">&nbsp;</span></span><span data-dcnode-id="557" instrument_node="">ideally in spring and summer, either before or after flowering.&nbsp;</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="549"><strong data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">General tips:</span></strong><span data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">&nbsp;</span></span><span data-dcnode-id="550" instrument_node="">remove damaged, dead and diseased branches and focus on keeping the tree a manageable shape and size. Make cuts to where there is fruit.</span></p><span data-dcnode-id="548" instrument_node="">
</span></div><span data-dcnode-id="546" instrument_node=""> </span></div><span data-dcnode-id="544" instrument_node="">

</span><div class="three-col-spacing" data-dcnode-id="431"><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">If you’re lucky enough to have a mature mulberry tree it won’t need much pruning. Only prune light else you’ll shock the tree into so much growth it may not be able to support itself. Mulberries also tend to bleed sap from cuts which is minimised in winter.</span></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="433"><strong data-dcnode-id="438"><span data-dcnode-id="441" instrument_node="">When:</span><span data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">&nbsp;</span></span></strong><span data-dcnode-id="437" instrument_node="">winter. The</span><span data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">&nbsp;</span></span><span data-dcnode-id="434" instrument_node="">RHS recommends pruning mulberries about a month after the last leaves have fallen.</span></p><span data-dcnode-id="432" instrument_node="">
