ode="">pruning</span></b><span data-dcnode-id="1007" instrument_node=""> in the fall since this stimulates new growth at the same time the </span><b data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">tree</span></b><span data-dcnode-id="1004" instrument_node=""> should be getting ready for winter.</span></span></span></p><p data-dcnode-id="996"><span data-dcnode-id="1000" instrument_node="">Additionally,  how do you prune an apple tree for the winter?  </span><b data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">How to Winter Prune Apple Trees</span></b><span data-dcnode-id="997" instrument_node=""> </span></p><ol data-dcnode-id="982"><span data-dcnode-id="995" instrument_node=""> </span><li data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Cut out the 3Ds – dead, dying and diseased wood.</span></li><span data-dcnode-id="992" instrument_node=""> </span><li data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Cut out crossing branches to prevent them from rubbing, which can provide access points for disease.</span></li><span data-dcnode-id="989" instrument_node=""> </span><li data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Prune flush with the branch collar, but not into it.</span></li><span data-dcnode-id="986" instrument_node=""> </span><li data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Remove a quarter to a third of new growth on young apple trees to thicken the branches.</span></li><span data-dcnode-id="983" instrument_node=""> </span></ol><span data-dcnode-id="981" instrument_node=""> </span><p data-dcnode-id="980"></p><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node=""> Consequently,  can you over prune an apple tree?</span></p><p data-dcnode-id="962"><span data-dcnode-id="977" instrument_node=""> </span><span data-dcnode-id="963"><span data-dcnode-id="964"><b data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Over</span></b><span data-dcnode-id="974" instrument_node="">-</span><b data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">pruning</span></b><span data-dcnode-id="971" instrument_node=""> (removing more than 25 percent of the canopy in any </span><b data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">one</span></b><span data-dcnode-id="968" instrument_node=""> year) may result in the production of watershoots (epicormic growth), which are vigorous, tall, upright and leafy branches, producing no flowers or </span><b data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">fruit</span></b><span data-dcnode-id="965" instrument_node="">.</span></span></span></p><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">When should you not prune apple trees?</span></p><p data-dcnode-id="947"><span data-dcnode-id="948"><span data-dcnode-id="949"><span data-dcnode-id="959" instrument_node="">When to winter </span><b data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">prune apples</span></b><span data-dcnode-id="956" instrument_node=""> and pears. </span><b data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Pruning should</span></b><span data-dcnode-id="953" instrument_node=""> be carried out when the </span><b data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">tree</span></b><span data-dcnode-id="950" instrument_node=""> is dormant, between leaf fall and bud burst (usually between November and early March).</span></span></span></p><span data-dcnode-id="946" instrument_node=""> </span><div class="pg-lazy" data-dcnode-id="945" data-gpt-parent="th_flex_desk"></div><span data-dcnode-id="944" instrument_node="">
