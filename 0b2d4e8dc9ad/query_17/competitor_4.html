</span><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node=""> In this way,  when should I prune a smoke bush?</span><p data-dcnode-id="916"><span data-dcnode-id="917"><span data-dcnode-id="918"><span data-dcnode-id="937" instrument_node="">The rule for </span><b data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">pruning</span></b><span data-dcnode-id="934" instrument_node=""> deciduous flowering plants states that if it flowers after June 1, like the </span><b data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">smoke bush</span></b><span data-dcnode-id="931" instrument_node="">, you need </span><b data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">to prune</span></b><span data-dcnode-id="928" instrument_node=""> in early spring. </span><b data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Smoke tree pruning can</span></b><span data-dcnode-id="925" instrument_node=""> also be done in late winter if you wish </span><b data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">to</span></b><span data-dcnode-id="922" instrument_node=""> rejuvenate the plant and cut it all the way </span><b data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">to</span></b><span data-dcnode-id="919" instrument_node=""> the ground.</span></span></span></p><p data-dcnode-id="903"><span data-dcnode-id="915" instrument_node="">Secondly,  can you hard prune Cotinus? </span><span data-dcnode-id="904"><span data-dcnode-id="905"><b data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Cotinus</span></b><span data-dcnode-id="912" instrument_node="">. </span><b data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Hard prune</span></b><span data-dcnode-id="909" instrument_node=""> to ground level in late winter to stimulate next year's foliage, or remove </span><b data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">one</span></b><span data-dcnode-id="906" instrument_node="">-third of stems in mid-spring for a display of fine young foliage and attractive flowers.</span></span></span></p><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node=""> Similarly, it is asked,  how do you prune a smoke bush tree?</span></p><p data-dcnode-id="896"><span data-dcnode-id="900" instrument_node=""> </span><b data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">How to Prune a Smoke Bush Into Tree Form</span></b><span data-dcnode-id="897" instrument_node=""> </span></p><ol data-dcnode-id="885"><span data-dcnode-id="895" instrument_node=""> </span><li data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Evaluate your smoke bush in late winter or early spring before new growth begins and select the strongest two to three trunks, evenly spaced across the plant.</span></li><span data-dcnode-id="892" instrument_node=""> </span><li data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Cut out all other trunks and shoots at the ground with loppers.</span></li><span data-dcnode-id="889" instrument_node=""> </span><li data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Prune away lower branches with loppers or hand pruners depending on their diameter.</span></li><span data-dcnode-id="886" instrument_node=""> </span></ol><span data-dcnode-id="884" instrument_node=""> </span><p data-dcnode-id="883"></p><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">How do you take care of a smoke tree?</span></p><p data-dcnode-id="874"><span data-dcnode-id="875"><span data-dcnode-id="876"><span data-dcnode-id="880" instrument_node="">When grouping plants, they should be spaced 10 to 15 feet apart. Young plants should be watered deeply and regularly, but once established, </span><b data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">smoke</span></b><span data-dcnode-id="877" instrument_node=""> bush has good resistance to drought. Mulch the base of the shrubs with wood chips or bark mulch to keep weeds away and soil moist.</span></span></span></p><span data-dcnode-id="873" instrument_node=""> </span><div class="pg-lazy" data-dcnode-id="872" data-gpt-parent="th_flex_desk"></div><span data-dcnode-id="871" instrument_node="">
