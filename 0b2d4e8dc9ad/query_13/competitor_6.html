</span></div></div><p data-dcnode-id="715"><strong data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">The shrubs mentioned in this calendar for pruning do NOT HAVE TO BE PRUNED in many instances. These are simply optimum times if you so wish. </span></strong></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">For instance, some of the evergreens are best pruned back by mid-summer in order that they gain sufficient ‘hardy;’ growth before the onset of the following winter. You will soon be aware of why ‘when to prune shrubs’ is as important as ‘how to prune shrubs’.</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Pruning is necessary for some shrubs – not because they actually need it, but more because we have either planted them in the wrong place, or they are simply not conforming to what we think they should look like.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">But if you are going to prune, it is essential that you know when to prune shrubs, for if you prune some shrubs at the wrong time, you can lose flowers for a year or maybe two.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">There are many other shrubs that simply need pruning to do their best for us – whether new lush foliage, stems or flowers. The downfall of pruning in many cases – certainly as our mailbox suggests – is that many shrubs are pruned at the wrong time.</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">This results in either cutting off the flower buds for the season – hence no flowers for a year; cutting off the stems in autumn which would normally give us a great display through the winter; or even pruning some types of shrubs/trees at the wrong time of year, which then allows fungal spores to enter!</span></p><span data-dcnode-id="699" instrument_node="">
</span><h2 data-dcnode-id="696"><span data-dcnode-id="697" id="when-to-prune-your-shrubs-calendar-of-pruning-for-shrubs-hardy-plants"><span data-dcnode-id="698" instrument_node="">When to prune your Shrubs – Calendar Of Pruning For Shrubs &amp; Hardy Plants</span></span></h2><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">One of the problems of writing a calendar for shrub pruning, is the fact that every year brings seasons which are either earlier or later than usual – particularly spring and autumn, and of course, being a worldwide website, there will be different hardiness zones in different countries, together with different general climatic conditions which will also affect the optimal timing of any pruning for some types of shrubs.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">This can affect the time when you prune your shrubs. You will have to gain knowledge about your own particular time zone to know this.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">The basis of our calendar is that of minimum average temperature of approximately -7deg.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">This corresponds to most areas within the UK. It is roughly equivalent to Group 8B on the USDA Hardiness Zones Table. As with all things in life, times change. So do temperatures – regardless of your feeling about global warming.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">The calendar below will be added to.</span></p><span data-dcnode-id="680" instrument_node="">
</span><h3 data-dcnode-id="677"><span data-dcnode-id="678" id="january-february-pruning"><span data-dcnode-id="679" instrument_node="">January – February Pruning</span></span></h3><span data-dcnode-id="676" instrument_node="">
</span><ul data-dcnode-id="668"><span data-dcnode-id="675" instrument_node="">
</span><li data-dcnode-id="670"><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenseeker.com/pruning/pruning-buddleja-buddleia/"><strong data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Buddleia – Buddleja davidii</span></strong></a><span data-dcnode-id="671" instrument_node="">&nbsp;types. The image at the top of the page was taken at pruning time on 7th February 2007.</span></li><span data-dcnode-id="669" instrument_node="">
</span></ul><span data-dcnode-id="667" instrument_node="">
</span><h3 data-dcnode-id="664"><span data-dcnode-id="665" id="february-march-pruning"><span data-dcnode-id="666" instrument_node="">February – March Pruning</span></span></h3><span data-dcnode-id="663" instrument_node="">
</span><ul data-dcnode-id="639"><span data-dcnode-id="662" instrument_node="">
</span><li data-dcnode-id="657"><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenseeker.com/pruning/pruning-hydrangea-paniculata/"><strong data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Hydrangea PG</span></strong></a><span data-dcnode-id="658" instrument_node="">&nbsp;(Paniculata Grandiflora) and arborescens – quite hard pruning.</span></li><span data-dcnode-id="656" instrument_node="">
</span><li data-dcnode-id="652"><strong data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Sambucus foliage types –</span></strong><span data-dcnode-id="653" instrument_node="">&nbsp;can be cut back hard to induce good growth stems and foliage.</span></li><span data-dcnode-id="651" instrument_node="">
</span><li data-dcnode-id="647"><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Cornus alba and stolonifera types&nbsp;</span></strong><span data-dcnode-id="648" instrument_node="">– together with sanguinea can be cut back hard to get plenty of stems for next winter spectacular.</span></li><span data-dcnode-id="646" instrument_node="">
</span><li data-dcnode-id="641"><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenseeker.com/pruning/pruning-wisteria-sinensis/"><strong data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Wisteria</span></strong></a><span data-dcnode-id="642" instrument_node=""> – Mid February is best.</span></li><span data-dcnode-id="640" instrument_node="">
</span></ul><span data-dcnode-id="638" instrument_node="">
</span><h3 data-dcnode-id="635"><span data-dcnode-id="636" id="march-april-pruning"><span data-dcnode-id="637" instrument_node="">March – April Pruning</span></span></h3><span data-dcnode-id="634" instrument_node="">
</span><ul data-dcnode-id="591"><span data-dcnode-id="633" instrument_node="">
</span><li data-dcnode-id="629"><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Evergreens General Pruning</span></strong><span data-dcnode-id="630" instrument_node="">&nbsp;if needed. Some&nbsp;flowering evergreens&nbsp;will need to be pruned at different times. As a general rule, evergreens should not be pruned when dormant.</span></li><span data-dcnode-id="628" instrument_node="">
</span><li data-dcnode-id="624"><strong data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Garrya elliptica</span></strong><span data-dcnode-id="625" instrument_node=""> – as soon as finished flower tassels</span></li><span data-dcnode-id="623" instrument_node="">
</span><li data-dcnode-id="619"><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Chimonanthus praecox – The Wintersweet</span></strong><span data-dcnode-id="620" instrument_node="">. Right after flowering – but minimal.</span></li><span data-dcnode-id="618" instrument_node="">
</span><li data-dcnode-id="613"><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenseeker.com/pruning/pruning-honeysuckle-lonicera/"><strong data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Honeysuckle</span></strong></a><span data-dcnode-id="614" instrument_node="">&nbsp;– the winter flowering bush types – Lonicera fragrantissima etc.</span></li><span data-dcnode-id="612" instrument_node="">
</span><li data-dcnode-id="608"><strong data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Caryopteris x clandonensis</span></strong><span data-dcnode-id="609" instrument_node=""> – should be hard pruned at this time</span></li><span data-dcnode-id="607" instrument_node="">
</span><li data-dcnode-id="603"><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Viburnum x bodnantense types</span></strong><span data-dcnode-id="604" instrument_node=""> – as soon as finished flowering. Cut out 25% of the old stems to ground level each year to keep the shrub looking tidy, and youthful.</span></li><span data-dcnode-id="602" instrument_node="">
</span><li data-dcnode-id="596"><strong data-dcnode-id="598"><a data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenseeker.com/pruning/pruning-ribes/"><span data-dcnode-id="601" instrument_node="">Ribes</span></a><span data-dcnode-id="599" instrument_node=""> –&nbsp;</span></strong><span data-dcnode-id="597" instrument_node="">SHould be pruned in March or April at the latest to give it a full growing season.</span></li><span data-dcnode-id="595" instrument_node="">
</span><li data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Hard Pruning and Rejuvenation&nbsp;of old shrubs – End of March Easly April</span></li><span data-dcnode-id="592" instrument_node="">
</span></ul><span data-dcnode-id="590" instrument_node="">
</span><h3 data-dcnode-id="587"><span data-dcnode-id="588" id="april-may"><span data-dcnode-id="589" instrument_node="">April – May</span></span></h3><span data-dcnode-id="586" instrument_node="">
</span><ul data-dcnode-id="540"><span data-dcnode-id="585" instrument_node="">
</span><li data-dcnode-id="581"><strong data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Hamamelis mollis&nbsp;and other Witch Hazels</span></strong><span data-dcnode-id="582" instrument_node="">&nbsp;– but only if you have to!</span></li><span data-dcnode-id="580" instrument_node="">
</span><li data-dcnode-id="576"><strong data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Forsythia</span></strong><span data-dcnode-id="577" instrument_node="">&nbsp;– All types right after flowering.</span></li><span data-dcnode-id="575" instrument_node="">
</span><li data-dcnode-id="571"><strong data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Jasminum nudiflorum</span></strong><span data-dcnode-id="572" instrument_node="">&nbsp;– the Yellow Winter flowering type. Cut back hard if you wish.</span></li><span data-dcnode-id="570" instrument_node="">
</span><li data-dcnode-id="566"><strong data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Kerria japonica</span></strong><span data-dcnode-id="567" instrument_node="">&nbsp;– right after flowering, and cut some of the branches down to near ground level. If you are really brave you can cut the whole shrub down hard! It will reward you with some great lush foliage – and flowers for next year of course.</span></li><span data-dcnode-id="565" instrument_node="">
</span><li data-dcnode-id="560"><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenseeker.com/pruning/pruning-pieris/"><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Pieris</span></strong></a><span data-dcnode-id="561" instrument_node=""> – Especially if there was frost damage to the new foliage. Don’t be afraid to cut back to regenerate – and get some new coloured foliage.</span></li><span data-dcnode-id="559" instrument_node="">
</span><li data-dcnode-id="555"><strong data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Chaenomeles – Quince</span></strong><span data-dcnode-id="556" instrument_node="">&nbsp;– As soon as flowering finished.</span></li><span data-dcnode-id="554" instrument_node="">
</span><li data-dcnode-id="550"><strong data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Salix caprea&nbsp;</span></strong><span data-dcnode-id="551" instrument_node="">and others that are grown for their pussy willow catkins.</span></li><span data-dcnode-id="549" instrument_node="">
</span><li data-dcnode-id="545"><strong data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Fatsia japonica&nbsp;</span></strong><span data-dcnode-id="546" instrument_node="">– is best pruned in late April – May once frosts are over. Winter damage cut out, and cut beck for renewed foliage, and flower for the coming winter.</span></li><span data-dcnode-id="544" instrument_node="">
</span><li data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Deciduous Winter Flowering Viburnums&nbsp;– V. bodnantense</span></li><span data-dcnode-id="541" instrument_node="">
</span></ul><span data-dcnode-id="539" instrument_node="">
</span><h3 data-dcnode-id="536"><span data-dcnode-id="537" id="may-june"><span data-dcnode-id="538" instrument_node="">May – June</span></span></h3><span data-dcnode-id="535" instrument_node="">
</span><ul data-dcnode-id="473"><span data-dcnode-id="534" instrument_node="">
</span><li data-dcnode-id="530"><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Weigela&nbsp;–&nbsp;</span></strong><span data-dcnode-id="531" instrument_node="">&nbsp;Unless still in flower. The foliage types can be cut back hard – ie W florida nana and W foliis purpurea</span></li><span data-dcnode-id="529" instrument_node="">
</span><li data-dcnode-id="525"><strong data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Photinia Red Robin</span></strong><span data-dcnode-id="526" instrument_node="">&nbsp;for some extra foliage colour, and especially now if you want flowers in the next year.</span></li><span data-dcnode-id="524" instrument_node="">
</span><li data-dcnode-id="520"><strong data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Euonymus Evergreen types&nbsp;</span></strong><span data-dcnode-id="521" instrument_node="">– Can be pruned now through to end July for better foliage effect.</span></li><span data-dcnode-id="519" instrument_node="">
</span><li data-dcnode-id="515"><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Camellia – the Sasanqua</span></strong><span data-dcnode-id="516" instrument_node="">&nbsp;types – early in May/June – after all flowering finished.</span></li><span data-dcnode-id="514" instrument_node="">
</span><li data-dcnode-id="510"><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Camellia – Japanese&nbsp;</span></strong><span data-dcnode-id="511" instrument_node="">types – C. japonica</span></li><span data-dcnode-id="509" instrument_node="">
</span><li data-dcnode-id="505"><strong data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Daphne</span></strong><span data-dcnode-id="506" instrument_node="">&nbsp;– Evergreen types such as Daphne bhuolua. Only corrective pruning really.</span></li><span data-dcnode-id="504" instrument_node="">
</span><li data-dcnode-id="500"><strong data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Forsythia</span></strong><span data-dcnode-id="501" instrument_node="">&nbsp;should have been done early May, but still ok now.</span></li><span data-dcnode-id="499" instrument_node="">
</span><li data-dcnode-id="495"><strong data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Fothergilla</span></strong><span data-dcnode-id="496" instrument_node="">&nbsp;– Only if you have to. Minimal unless wanting to regenerate.</span></li><span data-dcnode-id="494" instrument_node="">
</span><li data-dcnode-id="490"><strong data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Lilac – Syringa</span></strong><span data-dcnode-id="491" instrument_node="">&nbsp;– Dear head or prune back as soon as you can after flowering.</span></li><span data-dcnode-id="489" instrument_node="">
</span><li data-dcnode-id="485"><strong data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Kalmia latifolia</span></strong><span data-dcnode-id="486" instrument_node="">&nbsp;– probably in June, but right after flowering has stopped.</span></li><span data-dcnode-id="484" instrument_node="">
</span><li data-dcnode-id="480"><strong data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Spiraea</span></strong><span data-dcnode-id="481" instrument_node="">&nbsp;– the varieties that have already finished flowering in spring. NOT the summer flowering types</span></li><span data-dcnode-id="479" instrument_node="">
</span><li data-dcnode-id="475"><strong data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Viburnum evergreen and Deciduous</span></strong><span data-dcnode-id="476" instrument_node="">&nbsp;types – spring or late winter flowering types such as V. tinus and V davidii.</span></li><span data-dcnode-id="474" instrument_node="">
</span></ul><span data-dcnode-id="472" instrument_node="">
</span><h3 data-dcnode-id="469"><span data-dcnode-id="470" id="june-july"><span data-dcnode-id="471" instrument_node="">June – July</span></span></h3><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Pruning at this time of year is normally confined to shrubs that flower on growths that were produced in the previous year. Therefore by pruning now, you are giving the plant time to produce new growth this year, which will also bear the flower buds for next year. Leave it too late, and there will be no time for the shrub to produce next year’s flower buds. For this group of shrubs – prune immediately after flowering.</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">However, there are also several evergreens that can be pruned at this time – if they are simply being grown for foliage effect.</span></p><span data-dcnode-id="462" instrument_node="">
</span><ul data-dcnode-id="336"><span data-dcnode-id="461" instrument_node="">
</span><li data-dcnode-id="457"><strong data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Flowering Cherry and Almond Trees</span></strong><span data-dcnode-id="458" instrument_node="">&nbsp;– Prunus</span></li><span data-dcnode-id="456" instrument_node="">
</span><li data-dcnode-id="451"><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenseeker.com/pruning/pruning-azaleas-rhododendrons/"><strong data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Evergreen Azaleas</span></strong></a><span data-dcnode-id="452" instrument_node="">&nbsp;– as soon as finished flowering, but only if they need it for shape or size.</span></li><span data-dcnode-id="450" instrument_node="">
</span><li data-dcnode-id="446"><strong data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Deciduous Azales</span></strong><span data-dcnode-id="447" instrument_node="">&nbsp;will need pruning – dead heading in July.</span></li><span data-dcnode-id="445" instrument_node="">
</span><li data-dcnode-id="440"><a data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenseeker.com/pruning/pruning-azaleas-rhododendrons/"><strong data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Rhododendrons</span></strong></a><span data-dcnode-id="441" instrument_node="">&nbsp;– best only to dead-head the old flowers, then you will see the new shoots directly beneath the old flower trusses.</span></li><span data-dcnode-id="439" instrument_node="">
</span><li data-dcnode-id="435"><strong data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Kolkwitzia</span></strong><span data-dcnode-id="436" instrument_node="">&nbsp;– The Beauty Bush, right after flowering.</span></li><span data-dcnode-id="434" instrument_node="">
</span><li data-dcnode-id="430"><strong data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Deutzia</span></strong><span data-dcnode-id="431" instrument_node=""> – All types right after flowering.</span></li><span data-dcnode-id="429" instrument_node="">
</span><li data-dcnode-id="425"><strong data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Gardenia</span></strong><span data-dcnode-id="426" instrument_node="">&nbsp;if you are lucky enough to live in an area of the world where they grow outside.</span></li><span data-dcnode-id="424" instrument_node="">
</span><li data-dcnode-id="420"><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Hydrangea – Oak leaf type</span></strong><span data-dcnode-id="421" instrument_node="">&nbsp;– Hydrangea quercifolia -minimal, but will ensure good autumn – fall – foliage.</span></li><span data-dcnode-id="419" instrument_node="">
</span><li data-dcnode-id="413"><strong data-dcnode-id="415"><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenseeker.com/pruning/pruning-philadelphus/"><span data-dcnode-id="418" instrument_node="">Philadelphus – Mock Orange</span></a><span data-dcnode-id="416" instrument_node=""> –</span></strong><span data-dcnode-id="414" instrument_node="">&nbsp;All types right after flowering.</span></li><span data-dcnode-id="412" instrument_node="">
</span><li data-dcnode-id="408"><strong data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Osmanthus</span></strong><span data-dcnode-id="409" instrument_node="">&nbsp;– after flowering best.</span></li><span data-dcnode-id="407" instrument_node="">
</span><li data-dcnode-id="403"><strong data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Pyracantha</span></strong><span data-dcnode-id="404" instrument_node="">&nbsp;– Firethorn can be spur-pruned, or simply cut back to the old faded flowers. These will bring you the berries this autumn – fall – so don’t cut them off.</span></li><span data-dcnode-id="402" instrument_node="">
</span><li data-dcnode-id="398"><strong data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Roses – The climbing types</span></strong><span data-dcnode-id="399" instrument_node="">&nbsp;– after flowering finished.</span></li><span data-dcnode-id="397" instrument_node="">
</span><li data-dcnode-id="393"><strong data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Calycanthus – Carolina Allspice</span></strong><span data-dcnode-id="394" instrument_node="">, or Sweet shrub – Right after flowering</span></li><span data-dcnode-id="392" instrument_node="">
</span><li data-dcnode-id="388"><strong data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Itea ilicifolia</span></strong><span data-dcnode-id="389" instrument_node="">&nbsp;– unless still in flower</span></li><span data-dcnode-id="387" instrument_node="">
</span><li data-dcnode-id="383"><strong data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Elaeagnus pungens maculata and limelight – </span></strong><span data-dcnode-id="384" instrument_node="">can be pruned back to ‘refresh’ the foliage if required, or quite hard to re-juvenate the plant. No later than end of July.</span></li><span data-dcnode-id="382" instrument_node="">
</span><li data-dcnode-id="378"><strong data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Corylus avellana Contorta – </span></strong><span data-dcnode-id="379" instrument_node="">may be rejuvenate by pruning back hard by end of June preferably. This will give some new contorted growths and clean up the foliage that tends to get messy around now!</span></li><span data-dcnode-id="377" instrument_node="">
</span><li data-dcnode-id="373"><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Cotinus Royal Purple</span></strong><span data-dcnode-id="374" instrument_node="">&nbsp;will benefit from cutting back hard to force another flush of vibrant foliage.</span></li><span data-dcnode-id="372" instrument_node="">
</span><li data-dcnode-id="368"><strong data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Holly – Ilex</span></strong><span data-dcnode-id="369" instrument_node="">&nbsp;best to do any pruning for foliage by end of June – very early July latest.</span></li><span data-dcnode-id="367" instrument_node="">
</span><li data-dcnode-id="363"><strong data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Junipers</span></strong><span data-dcnode-id="364" instrument_node="">&nbsp;– the low growing types. Last pruning back time this month.</span></li><span data-dcnode-id="362" instrument_node="">
</span><li data-dcnode-id="358"><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Laurels such as Prunus Otto Luyken</span></strong><span data-dcnode-id="359" instrument_node="">, can be cut back now at latest.</span></li><span data-dcnode-id="357" instrument_node="">
</span><li data-dcnode-id="353"><strong data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Photinia Red Robin –</span></strong><span data-dcnode-id="354" instrument_node="">&nbsp;can still be cut back for new foliage effect.</span></li><span data-dcnode-id="352" instrument_node="">
</span><li data-dcnode-id="348"><strong data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Pittosporum</span></strong><span data-dcnode-id="349" instrument_node="">&nbsp;– all varieties. Prune as required.</span></li><span data-dcnode-id="347" instrument_node="">
</span><li data-dcnode-id="343"><strong data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Yew – Taxus spps –</span></strong><span data-dcnode-id="344" instrument_node="">&nbsp;Last time for pruning back hard.</span></li><span data-dcnode-id="342" instrument_node="">
</span><li data-dcnode-id="338"><strong data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Myrtus – Myrtle</span></strong><span data-dcnode-id="339" instrument_node="">&nbsp;– Would have been better earlier in the year, but can be pruned quite hard now.</span></li><span data-dcnode-id="337" instrument_node="">
</span></ul><span data-dcnode-id="335" instrument_node="">
</span><h3 data-dcnode-id="332"><span data-dcnode-id="333" id="july-august"><span data-dcnode-id="334" instrument_node="">July – August</span></span></h3><span data-dcnode-id="331" instrument_node="">
</span><ul data-dcnode-id="314"><span data-dcnode-id="330" instrument_node="">
</span><li data-dcnode-id="326"><strong data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Itea ilicifolia – </span></strong><span data-dcnode-id="327" instrument_node="">Maybe earlier if flowering is over.</span></li><span data-dcnode-id="325" instrument_node="">
</span><li data-dcnode-id="321"><strong data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Leucothoe –</span></strong><span data-dcnode-id="322" instrument_node="">&nbsp;The Rainbow type responds well to a hard cut back (for foliage) the others just minimal.</span></li><span data-dcnode-id="320" instrument_node="">
</span><li data-dcnode-id="316"><strong data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Osmanthus</span></strong><span data-dcnode-id="317" instrument_node="">&nbsp;– if you missed out in late June.</span></li><span data-dcnode-id="315" instrument_node="">
</span></ul><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">August – September</span></p><span data-dcnode-id="310" instrument_node="">
</span><ul data-dcnode-id="296"><span data-dcnode-id="309" instrument_node="">
</span><li data-dcnode-id="304"><span data-dcnode-id="305" lang="en-gb"><strong data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Hedges</span></strong><span data-dcnode-id="306" instrument_node=""> that should be given their last trin will include beech and hornbeam if grown for the winter foliage. This allows time for new shoots – which will keep their dead leaves through most of the winter.</span></span></li><span data-dcnode-id="303" instrument_node="">
</span><li data-dcnode-id="298"><span data-dcnode-id="299" lang="en-gb"><strong data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Summer Jasmine</span></strong><span data-dcnode-id="300" instrument_node="">&nbsp;– Once the flowers have stopped.</span></span></li><span data-dcnode-id="297" instrument_node="">
</span></ul><span data-dcnode-id="295" instrument_node="">
</span><h3 data-dcnode-id="292"><span data-dcnode-id="293" id="september-october"><span data-dcnode-id="294" instrument_node="">September – October</span></span></h3><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="289" lang="en-gb"><span data-dcnode-id="290" instrument_node="">September can be a useful month for pruning certain shrubs – and trees – in certain ways! It is the month that gardeners normally start to do a bit of tidying-up, and snipping away at everything that looks overgrown can be a bit tempting. Wait! Don’t!</span></span></p><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="285" lang="en-gb"><span data-dcnode-id="286" instrument_node="">The single most important this about pruning now, is to ensure that you are not cutting off the flower bud stem for next spring.</span></span></p><span data-dcnode-id="283" instrument_node="">
</span><ul data-dcnode-id="262"><span data-dcnode-id="282" instrument_node="">
</span><li data-dcnode-id="277"><span data-dcnode-id="278" lang="en-gb"><strong data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Hedges</span></strong><span data-dcnode-id="279" instrument_node=""> – will normally have their last clipping this month, but beech and hornbeam should have been done in mid-august if you want leaves to stay on. (New growth).</span></span></li><span data-dcnode-id="276" instrument_node="">
</span><li data-dcnode-id="271"><span data-dcnode-id="272" lang="en-gb"><strong data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Pyracantha</span></strong><span data-dcnode-id="273" instrument_node=""> – can have the non-berrying shoots trimmed back to the visible berry trusses or spurs.</span></span></li><span data-dcnode-id="270" instrument_node="">
</span><li data-dcnode-id="264"><span data-dcnode-id="265" lang="en-gb"><a data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenseeker.com/pruning/pruning-wisteria-sinensis/"><strong data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Wisteria</span></strong></a><span data-dcnode-id="266" instrument_node=""> – normally pruned in October for the winter prune, can be harmlessly cut back to within 45cm of the shoots. The remaining stubs are tackled in February.</span></span></li><span data-dcnode-id="263" instrument_node="">
</span></ul><span data-dcnode-id="261" instrument_node="">
</span><h3 data-dcnode-id="258"><span data-dcnode-id="259" id="october-november"><span data-dcnode-id="260" instrument_node="">October – November</span></span></h3><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Winter Pruning Wisteria – should take place in October or November</span></p><span data-dcnode-id="254" instrument_node="">
</span><h3 data-dcnode-id="251"><span data-dcnode-id="252" id="november-december"><span data-dcnode-id="253" instrument_node="">November – December</span></span></h3><span data-dcnode-id="250" instrument_node="">
</span><h3 data-dcnode-id="247"><span data-dcnode-id="248" id="december-january"><span data-dcnode-id="249" instrument_node="">December – January</span></span></h3><span data-dcnode-id="246" instrument_node="">
