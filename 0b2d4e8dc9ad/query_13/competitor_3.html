bruary, March, October, November</span></td></tr><tr data-dcnode-id="1075"><td data-dcnode-id="1078"><strong data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Flowering Months</span></strong></td><td data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">May, June, July,</span></td></tr><tr data-dcnode-id="1069"><td data-dcnode-id="1072"><strong data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">When To Prune</span></strong></td><td data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">July</span></td></tr></tbody></table></figure><span data-dcnode-id="1065" instrument_node="">

</span><h5 class="has-text-align-center" data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Size</span></h5><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1037"><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Height</span></strong><br data-dcnode-id="1039"><span data-dcnode-id="1038" instrument_node="">1.5 – 2.5M</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1031"><strong data-dcnode-id="1033"><span data-dcnode-id="1035" instrument_node="">Spread</span><br data-dcnode-id="1034"></strong><span data-dcnode-id="1032" instrument_node="">1.5 – 2.5M</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1025"><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Bloom Time</span></strong><br data-dcnode-id="1027"><span data-dcnode-id="1026" instrument_node="">May – July</span></p><span data-dcnode-id="1024" instrument_node="">

</span><h5 class="has-text-align-center" data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Soil</span></h5><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1013"><strong data-dcnode-id="1015"><span data-dcnode-id="1017" instrument_node="">Preferred</span><br data-dcnode-id="1016"></strong><span data-dcnode-id="1014" instrument_node="">Most Soil Types</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1007"><strong data-dcnode-id="1009"><span data-dcnode-id="1011" instrument_node="">Moisture</span><br data-dcnode-id="1010"></strong><span data-dcnode-id="1008" instrument_node="">Moist but well drained</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1001"><strong data-dcnode-id="1003"><span data-dcnode-id="1005" instrument_node="">pH</span><br data-dcnode-id="1004"></strong><span data-dcnode-id="1002" instrument_node="">Any</span></p><span data-dcnode-id="1000" instrument_node="">
</span></div><span data-dcnode-id="998" instrument_node="">
</span></div><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="993"><strong data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Weigela are a range of deciduous plants that come in a variety of different colours.</span></strong></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">With their multi-coloured leaves and distinctive flowers, they are a great choice to add interest to your garden.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Growing weigela in your garden isn’t too difficult. Their water requirements are average and providing you pick a good spot with plenty of sunlight, they should thrive for many years.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Below is a full guide to weigela that includes their origins
and varieties, feeding and growing tips, when to plant them, common diseases
and problems and frequently asked questions. &nbsp;</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Let’s start by looking at the origins and different
varieties of weigela. </span></p><span data-dcnode-id="980" instrument_node="">
</span><h2 data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Origins &amp; Varieties</span></h2><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Weigela originated from Japan but today they’re grown in
many different climates around the world. </span></p><span data-dcnode-id="974" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="969"><img alt="Weigela Florida Pink flowers with green leaves" class="wp-image-4247" data-dcnode-id="973" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upgardener.co.uk/wp-content/uploads/2019/11/1-7.jpg&amp;raw" srcset="https://horticulture.co.uk/wp-content/uploads/2019/11/1-7.jpg 1000w, https://horticulture.co.uk/wp-content/uploads/2019/11/1-7-300x200.jpg 300w, https://horticulture.co.uk/wp-content/uploads/2019/11/1-7-768x512.jpg 768w, https://horticulture.co.uk/wp-content/uploads/2019/11/1-7-370x247.jpg 370w, https://horticulture.co.uk/wp-content/uploads/2019/11/1-7-800x534.jpg 800w, https://horticulture.co.uk/wp-content/uploads/2019/11/1-7-20x13.jpg 20w, https://horticulture.co.uk/wp-content/uploads/2019/11/1-7-185x123.jpg 185w, https://horticulture.co.uk/wp-content/uploads/2019/11/1-7-740x494.jpg 740w, https://horticulture.co.uk/wp-content/uploads/2019/11/1-7-400x267.jpg 400w, https://horticulture.co.uk/wp-content/uploads/2019/11/1-7-72x48.jpg 72w" width="1000"><figcaption data-dcnode-id="970"><em data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Weigela Florida Pink </span></em></figcaption></figure><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="967"></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Below are some of the most common varieties of weigela – </span></p><span data-dcnode-id="963" instrument_node="">
</span><h4 data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Red prince</span></h4><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Red prince weigela have very distinctive, bright red flowers
and can grow to be 1.5 meters in height. </span></p><span data-dcnode-id="957" instrument_node="">
</span><h4 data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Monet </span></h4><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Weigela Monet are much smaller than a lot of other weigela
plants, measuring roughly 60cm high. Their leaves are a mixture of green, pink
and white with deep pink flowers. They are best planted in a spot where there’s
plenty of direct sunlight. </span></p><span data-dcnode-id="951" instrument_node="">
</span><h4 data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Middendorffiiana</span></h4><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Middendorffiiana has beautiful yellow flowers and bright green leaves. It also grows over a meter tall, so it’s a great choice if you want to add interest to your garden.&nbsp; </span></p><span data-dcnode-id="945" instrument_node="">
</span><h4 data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Bristol ruby</span></h4><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Bristol ruby weigela can grow up to 2.5 meters tall, making them a particularly large species. They also have a very distinctive look, with dark green leaves and crimson flowers. </span></p><span data-dcnode-id="939" instrument_node="">
</span><h4 data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Mont-blanc </span></h4><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">As you would imagine from the name, Mont-blanc weigela shrubs have white flowers mixed with green foliage. The flowers tend to be pure white, but they can develop some pink as the plant ages. </span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">It may not be as colourful as other varieties, but it does have a great understated look that would suit most gardens. </span></p><span data-dcnode-id="930" instrument_node="">
</span><h4 data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Florida Variegata</span></h4><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">The light pink flowers and oval-shaped leaves of Florida
variegata give it a classic look that a lot of people associate with weigela
plants. It can grow to be 2.5 meters tall in the right conditions. </span></p><span data-dcnode-id="924" instrument_node="">
</span><h2 data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Feeding, Care &amp; Growing Tips</span></h2><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Growing weigela in your garden isn’t too difficult, but it
is important to know the best way to go about it if you want your plants to
thrive. </span></p><span data-dcnode-id="918" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="913"><img alt="The distinctive green leaves of the weigela plant" class="wp-image-4249" data-dcnode-id="917" height="664" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upgardener.co.uk/wp-content/uploads/2019/11/2-7.jpg&amp;raw" srcset="https://horticulture.co.uk/wp-content/uploads/2019/11/2-7.jpg 1000w, https://horticulture.co.uk/wp-content/uploads/2019/11/2-7-300x199.jpg 300w, https://horticulture.co.uk/wp-content/uploads/2019/11/2-7-768x510.jpg 768w, https://horticulture.co.uk/wp-content/uploads/2019/11/2-7-370x246.jpg 370w, https://horticulture.co.uk/wp-content/uploads/2019/11/2-7-800x531.jpg 800w, https://horticulture.co.uk/wp-content/uploads/2019/11/2-7-20x13.jpg 20w, https://horticulture.co.uk/wp-content/uploads/2019/11/2-7-185x123.jpg 185w, https://horticulture.co.uk/wp-content/uploads/2019/11/2-7-740x491.jpg 740w, https://horticulture.co.uk/wp-content/uploads/2019/11/2-7-400x266.jpg 400w, https://horticulture.co.uk/wp-content/uploads/2019/11/2-7-72x48.jpg 72w" width="1000"><figcaption data-dcnode-id="914"><em data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">The leaves and flowers of weigela plants are very distinctive – a big part of what makes them so popular with growers</span></em></figcaption></figure><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="911"></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Below is a full guide to growing weigela in your garden,
including the initial planting, watering, picking the right spot and using
fertiliser. </span></p><span data-dcnode-id="907" instrument_node="">
</span><h4 data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Planting </span></h4><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Before planting, you should ensure that the soil is in
decent condition. Soil that’s too hard, frozen or waterlogged would not be
suitable. </span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">The roots of weigela that have already been established tend
to be quite substantial, so be sure to make a hole in the sole that can
accommodate it properly. You should make the hole as least as deep as the roots
and roughly twice as wide. Make sure to cover it properly and using a layer of
mulch would not be a bad idea, particularly if you’re planning in autumn. </span></p><span data-dcnode-id="898" instrument_node="">
</span><h4 data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Watering</span></h4><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Weigela plants have average watering needs. This means if
there’s a decent downpour during the week, then you usually don’t need to worry
about watering them. You should certainly water them during dry spells,
however. Make sure to soak the roots well when watering. </span></p><span data-dcnode-id="892" instrument_node="">
</span><h4 data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Picking the right spot</span></h4><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">The best spot for weigela would be in either full or partial
sunlight. Although weigela can cope in shaded spots, they won’t flourish in the
same way as they would with a good amount of sunlight. </span></p><span data-dcnode-id="886" instrument_node="">
</span><h4 data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Using fertiliser </span></h4><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Using a good fertiliser that’s suitable for shrubs is
certainly a good idea when you first plant your weigela. Make sure to avoid
getting it on the leaves of the plants, since this can cause issues with fungal
diseases. </span></p><span data-dcnode-id="880" instrument_node="">
</span><h2 data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Pruning Weigela</span></h2><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">It’s a good idea to prune weigela plants so you can ensure
good air circulation and encourage new growth. The best time to prune your
plants would be in the late spring. This will give you a chance to remove any
wilting flowers without disturbing the branches that next year’s flowers will
grow from. </span></p><span data-dcnode-id="874" instrument_node="">
</span><h2 data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">When To Plant</span></h2><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">The best time to plant weigela would be either in the spring
or autumn. This is because it prevents the plants from being immediately
exposed to strong sunlight, which can be an issue when you’re transplanting
already established bushes. </span></p><span data-dcnode-id="868" instrument_node="">
</span><h2 data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Where To Buy Weigela Shrubs</span></h2><span data-dcnode-id="865" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="860"><img alt="Weigela plant growing in the garden" class="wp-image-4251" data-dcnode-id="864" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upgardener.co.uk/wp-content/uploads/2019/11/3-7.jpg&amp;raw" srcset="https://horticulture.co.uk/wp-content/uploads/2019/11/3-7.jpg 1000w, https://horticulture.co.uk/wp-content/uploads/2019/11/3-7-300x200.jpg 300w, https://horticulture.co.uk/wp-content/uploads/2019/11/3-7-768x512.jpg 768w, https://horticulture.co.uk/wp-content/uploads/2019/11/3-7-370x247.jpg 370w, https://horticulture.co.uk/wp-content/uploads/2019/11/3-7-800x534.jpg 800w, https://horticulture.co.uk/wp-content/uploads/2019/11/3-7-20x13.jpg 20w, https://horticulture.co.uk/wp-content/uploads/2019/11/3-7-185x123.jpg 185w, https://horticulture.co.uk/wp-content/uploads/2019/11/3-7-740x494.jpg 740w, https://horticulture.co.uk/wp-content/uploads/2019/11/3-7-400x267.jpg 400w, https://horticulture.co.uk/wp-content/uploads/2019/11/3-7-72x48.jpg 72w" width="1000"><figcaption data-dcnode-id="861"><em data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Weigela plant growing in the garden</span></em></figcaption></figure><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="858"></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">There are plenty of places you can buy weigela shrubs, both
online and in person. You want to be sure that any plants you buy have been
grown in optimal conditions and fit your needs. </span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">With this in mind – some of the most important things to
consider when buying weigela are – </span></p><span data-dcnode-id="851" instrument_node="">
</span><h4 data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Species</span></h4><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Not all weigela are the same and the colours of the leaves/flowers, as well as the size they can grow to, varies a lot depending on the species. You should think about the space you have in your garden as well as the type of colours you prefer most. </span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">You also need to consider how much sunlight the spots where
you’ll be planting your shrubs get and choose accordingly. </span></p><span data-dcnode-id="842" instrument_node="">
</span><h4 data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Price</span></h4><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Price is always going to be a big consideration when you’re
buying weigela shrubs. The price can vary a lot depending on where you get them
from and whether you buy online or in person. Thankfully, it’s very easy to
compare prices now thanks to the internet. </span></p><span data-dcnode-id="836" instrument_node="">
</span><h4 data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Delivery </span></h4><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Delivery is another consideration if you’re buying your
shrubs online. You want to be sure that they’re going to be well packaged and
there’s no risk of them getting damaged in transit. Most reputable suppliers
will take no chances when it comes to delivering their plants. </span></p><span data-dcnode-id="830" instrument_node="">
</span><h2 data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">How To Propagate</span></h2><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">There are a couple of reliable ways to go about propagating
weigela, both using cuttings. It is possible to propagate using seed but it’s
not as reliable, so here we’ll focus on using cuttings. </span></p><span data-dcnode-id="824" instrument_node="">
</span><h4 data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Using early cuttings </span></h4><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Using cuttings that you take in late summer/early autumn is
the first method you can use to propagate weigela. </span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Before taking any cuttings, it’s a good idea to take any
steps you can prior to ensure the plant is in optimal condition. A very good
way to do this is by watering the plant you’ll be taking the cuttings from a
day before you do. You’ll only need to do this if the soil is dry. &nbsp;</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Make sure that any cuttings you take have a decent amount of foliage with healthy-looking stems. Cut just below the leaf bud and make sure to remove some of the leaves that are close to the base in order to reduce the water requirements. </span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Once you’ve taken the cuttings, it’s a good idea to use a
rooting hormone powder on the roots of them to encourage healthy growth and reduce
the risk of rotting. You should place your cuttings in decent-sized containers
and use a good quality compost. </span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">It’s important to ensure the cuttings get a decent amount of
sunlight but aren’t overexposed. A greenhouse would be an ideal location but
failing that you can place them in a semi-shaded spot in the house. </span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">You should check on your cuttings at least once a week,
being sure to remove any unhealthy-looking foliage as well as watering as
needed. </span></p><span data-dcnode-id="803" instrument_node="">
</span><h4 data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Using hardwood cuttings </span></h4><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">The second method for propagating weigela is using hardwood
cuttings. This is where you take fully mature cuttings from the current year’s
growth. You should follow the same steps as mentioned above when making the
cuttings. </span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">The advantage to using hardwood cuttings as opposed to early
cuttings, is that you’re able to grow them outdoors as well as indoors. If you
choose to plant them outdoors, then you will need to take a bit of care to
encourage the best growth. You should use a good quality compost and plant the
stems so there’s roughly a third of them protruding from the soil. </span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Growing them in containers, either indoors or in a
greenhouse is another option. This does give you some advantages – namely being
able to protect the cuttings from the harsh winter weather. </span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">If you do plant the cuttings in containers, then be sure to
also use good quality compost and water them whenever they become dry. </span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Providing you check on them regularly and provide proper care, they should be ready to plant outdoors by the next autumn. </span></p><span data-dcnode-id="785" instrument_node="">
</span><h2 data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Common Diseases &amp; Problems</span></h2><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Below are some of the most common diseases and problems that
weigela can suffer from – </span></p><span data-dcnode-id="779" instrument_node="">
</span><h4 data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Powdery mildew </span></h4><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Powdery mildew is a very common type of fungal disease that affects a wide variety of plants. It’s so-called because the leaves of infected plants will have a coat of mildew on them that resembles white powder. </span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">To avoid powdery mildew, you should ensure that your plants
have plenty of space between them for good circulation. You should also take
care when watering to avoid any water getting on the leaves. </span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">If you have any plants that are affected by powdery mildew,
then you should remove infected leaves, or in more severe cases – dig up and
destroy infected plants. </span></p><span data-dcnode-id="767" instrument_node="">
</span><h4 data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Black spot</span></h4><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Black spot is another type of fungal disease that can affect
weigela. It will cause infected plants to develop black spots on their leaves
and will often result in the leaves falling off the plant. </span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">To avoid black spot, you should take care not to get the
leaves wet when watering, since this is often how it spreads. It’s also a good
idea to use mulch, which helps to prevent water from splashing up. </span></p><span data-dcnode-id="758" instrument_node="">
</span><h4 data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Rust </span></h4><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Rust is a fungal disease that will cause orange coloured
spots to appear on the leaves of infected plants. If you notice any plants that
are affected by rust, then you should either remove them or use a good
fungicide. </span></p><span data-dcnode-id="752" instrument_node="">
</span><h4 data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Spider mites</span></h4><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Spider mites may be small, but they can cause a lot of
damage to plants. As well as injecting toxins into plants, they also leave
visible webbing and quickly multiply. Thankfully, it’s quite easy to get rid of
them. A simple spray of fungicidal soap or water is usually enough to remove
them from plants. </span></p><span data-dcnode-id="746" instrument_node="">
</span><h4 data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Mealybugs</span></h4><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Mealybugs are another pest that can affect weigela. They are
troublesome for a few reasons. Firstly, they will drink from the leaves, which
can easily result in poor growth. The honeydew they excrete also attracts ants
as well as causing further issues with the honeydew itself growing mould. </span></p><span data-dcnode-id="740" instrument_node="">
</span><h4 data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Aphids</span></h4><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Aphids feed on the bottom of leaves and the residue they
leave behind can attract ants. If aphids become a problem, then you can wash
them off with water or a fungicide. Another effective way to deal with them is
by growing plants that attract predators, such as wasps and ladybirds. </span></p><span data-dcnode-id="734" instrument_node="">
</span><h2 data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Frequently Asked Questions</span></h2><span data-dcnode-id="731" instrument_node="">
</span><h4 data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">When should I prune Weigela?</span></h4><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">The best time to prune weigela would be in the spring, after
they’ve finished blooming. The reason for this is that it takes roughly a year
for the wood that the flowers bloom from to grow. By pruning immediately after
your plants have bloomed in the spring, you will avoid cutting off wood that
the plant will need to bloom the following year. </span></p><span data-dcnode-id="725" instrument_node="">
</span><h4 data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Are weigela acid-loving plants?</span></h4><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Weigela plants do best in soil that’s slightly acidic, with
a pH level of around 5.5-6. </span></p><span data-dcnode-id="719" instrument_node="">
</span><h4 data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Are weigela evergreen or deciduous?</span></h4><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Weigela are deciduous plants, so they’ll generally look at their best during the late spring and summer.</span></p><span data-dcnode-id="713" instrument_node="">
</span><h4 data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Are weigela deer resistant?</span></h4><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Yes. Deer usually won’t damage or destroy weigela plants. </span></p><span data-dcnode-id="707" instrument_node="">
