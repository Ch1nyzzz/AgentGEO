</span><h1 data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Pruning Trees and Shrubs in Tucson</span></h1><span data-dcnode-id="644" instrument_node="">
</span><span data-dcnode-id="642" instrument_node="">
</span><span data-dcnode-id="639" typeof="v:Breadcrumb"><a class="home" data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticultureunlimited.com/" property="v:title" rel="v:url" title="Go to Horticulture Unlimited."><span data-dcnode-id="641" instrument_node="">Home</span></a></span><span data-dcnode-id="638" instrument_node=""> &gt; </span><span data-dcnode-id="635" typeof="v:Breadcrumb"><span data-dcnode-id="636" property="v:title"><span data-dcnode-id="637" instrument_node="">Pruning Trees and Shrubs in Tucson</span></span></span><span data-dcnode-id="634" instrument_node=""> </span></div><span data-dcnode-id="632" instrument_node="">

</span><h3 data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Pruning Trees and Shrubs in Tucson</span></h3><span data-dcnode-id="609" instrument_node="">
</span><div class="introduction clearfix" data-dcnode-id="332"><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Pruning is the removal of plant parts, including shoots, branches, fronds, and flowers to improve a plant’s health, control its growth, or influence its blooming cycle. Pruning should be a routine part of landscape maintenance practices. Proper plant selection and knowledge of plant varieties and their size at maturity will help eliminate the need for major pruning. If a tree needs to be pruned several times each year to control its size, it may be the wrong species for a particular location.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Plants are pruned for a number of reasons, so determine why you are pruning a plant before making that first cut. The main reasons for pruning include safety and the tree’s health and aesthetics. Pruning is also used to stimulate fruit production. When pruning for safety reasons, remove branches that could fall and cause property damage or interfere with lines of sight on streets or driveways. Remove branches growing near utility lines. However, always consult your local utility company or call a certified arborist for help. Never prune trees that are touching utility lines. For safety purposes, prune trees that obscure the entry to your home.</span></p><span data-dcnode-id="602" instrument_node="">
</span><div data-dcnode-id="594" style="float: right; padding: 10px;"><img alt="mesquite tree pruning" class="lazy alignnone size-medium wp-image-1944" data-dcnode-id="601" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/mesquite-tree-pruning-300x224.png" data-lazy-srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/mesquite-tree-pruning-300x224.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/mesquite-tree-pruning.png 386w" data-lazy-type="image" height="224" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticultureunlimited.com/wp-content/uploads/2016/02/mesquite-tree-pruning-300x224.png&amp;raw" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/mesquite-tree-pruning-300x224.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/mesquite-tree-pruning.png 386w" width="300"><noscript data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">&lt;img class="alignnone size-medium wp-image-1944" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/mesquite-tree-pruning-300x224.png" alt="mesquite tree pruning" width="300" height="224" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/mesquite-tree-pruning-300x224.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/mesquite-tree-pruning.png 386w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><center data-dcnode-id="595"><img alt="improperly pruned mesquite tree" class="lazy alignnone size-full wp-image-1943" data-dcnode-id="598" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/improperly-pruned-mesquite-tree.png" data-lazy-type="image" height="217" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticultureunlimited.com/wp-content/uploads/2016/02/improperly-pruned-mesquite-tree.png&amp;raw" width="298"><noscript data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">&lt;img loading="lazy" class="alignnone size-full wp-image-1943" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/improperly-pruned-mesquite-tree.png" alt="improperly pruned mesquite tree" width="298" height="217" /&gt;</span></noscript></center></div><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">When plants are pruned for health, it might involve removal of diseased or insect infested parts. This is an effective way to limit the spread of decay, disease, and insects to portions of the plant or to neighboring plants. Branches may need to be removed that are crossing over other branches or crowding out the crown of the tree. If branches are broken due to storm damage, it is a good idea to prune them.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">When pruning trees for aesthetics, the goal is to enhance character and shape or to stimulate flower production. Pruning should only be done when there is a good reason to prune. For example, the limbs of a tree might interfere with the roof or side of a house, or it might need to be shaped because the top or sides are growing too big for a planting space. Selective pruning thins a thick canopy and allows light to penetrate through the tree, and can give the tree a more balanced appearance.</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Pruning and maintaining a solid plant structure should begin when trees are young. This helps produce strong branches and influences long-term health. A tree’s branch spacing and structural safety are controlled by selectively removing or shortening branches. Always encourage one central trunk to develop by removing or reducing the length of competing upright trunks or branches. When determining what branches should be removed, follow this guideline: If the cut is less than two inches in diameter, go ahead and prune. If the cut is between two and four inches, think twice before pruning. It the cut is greater than four inches, have a good reason to prune the tree. If in question, do not prune. Careful, selective pruning results in a beautiful, healthy tree that enhances your landscape for many years.</span></p><span data-dcnode-id="584" instrument_node="">
</span><h3 data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Pruning Large Established Trees</span></h3><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Contact a qualified tree care professional who has the right training, equipment, and knowledge to prune large, established trees in your landscape. Large-tree pruning requires climbing, heavy chainsaws, and even bucket lift trucks. Never compromise personal safety when pruning a tree.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="570"><img alt="certified arborist" class="lazy size-medium wp-image-1949 alignnone" data-dcnode-id="577" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/certified-arborist-300x225.png" data-lazy-srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/certified-arborist-300x225.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/certified-arborist.png 419w" data-lazy-type="image" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticultureunlimited.com/wp-content/uploads/2016/02/certified-arborist-300x225.png&amp;raw" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/certified-arborist-300x225.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/certified-arborist.png 419w" width="300"><noscript data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">&lt;img loading="lazy" class="size-medium wp-image-1949 alignnone" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/certified-arborist-300x225.png" alt="certified arborist" width="300" height="225" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/certified-arborist-300x225.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/certified-arborist.png 419w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="574" instrument_node="">&nbsp;</span><img alt="qualified tree cutting" class="lazy size-medium wp-image-1946 alignnone" data-dcnode-id="573" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/qualified-tree-cutting-300x226.png" data-lazy-srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/qualified-tree-cutting-300x226.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/qualified-tree-cutting.png 321w" data-lazy-type="image" height="226" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticultureunlimited.com/wp-content/uploads/2016/02/qualified-tree-cutting-300x226.png&amp;raw" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/qualified-tree-cutting-300x226.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/qualified-tree-cutting.png 321w" width="300"><noscript data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">&lt;img loading="lazy" class="size-medium wp-image-1946 alignnone" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/qualified-tree-cutting-300x226.png" alt="qualified tree cutting" width="300" height="226" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/qualified-tree-cutting-300x226.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/qualified-tree-cutting.png 321w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">The three most common types of tree pruning on established landscape trees are crown thinning, crown raising, and crown reduction. Below is a description of each.</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="562"><strong data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Crown thinning</span></strong><span data-dcnode-id="563" instrument_node="">: Crown thinning is the process of selectively removing branches on young trees throughout the crown or in the top of the tree to help develop a tree’s structure and shape. This procedure increases light penetration and air movement into the tree. No more than one-quarter of the living crown should be removed at any time. This technique involves removal of any branches that rub or cross another branch.</span></p><span data-dcnode-id="561" instrument_node="">
</span><figure aria-describedby="caption-attachment-1953" class="wp-caption aligncenter" data-dcnode-id="555" id="attachment_1953" style="width: 212px"><img alt="Crown thinning on a tree" class="lazy wp-image-1953 size-medium" data-dcnode-id="560" data-lazy-sizes="(max-width: 212px) 100vw, 212px" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Crown-thinning-on-a-tree-212x300.png" data-lazy-srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/Crown-thinning-on-a-tree-212x300.png 212w, https://horticultureunlimited.com/wp-content/uploads/2016/02/Crown-thinning-on-a-tree.png 256w" data-lazy-type="image" height="300" loading="lazy" sizes="(max-width: 212px) 100vw, 212px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticultureunlimited.com/wp-content/uploads/2016/02/Crown-thinning-on-a-tree-212x300.png&amp;raw" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/Crown-thinning-on-a-tree-212x300.png 212w, https://horticultureunlimited.com/wp-content/uploads/2016/02/Crown-thinning-on-a-tree.png 256w" width="212"><noscript data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">&lt;img loading="lazy" class="wp-image-1953 size-medium" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Crown-thinning-on-a-tree-212x300.png" alt="Crown thinning on a tree" width="212" height="300" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/Crown-thinning-on-a-tree-212x300.png 212w, https://horticultureunlimited.com/wp-content/uploads/2016/02/Crown-thinning-on-a-tree.png 256w" sizes="(max-width: 212px) 100vw, 212px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="556" id="caption-attachment-1953"><span data-dcnode-id="557" instrument_node="">Crown thinning on a tree</span></figcaption></figure><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="549"><strong data-dcnode-id="551"><br data-dcnode-id="553"><span data-dcnode-id="552" instrument_node="">
Crown raising</span></strong><span data-dcnode-id="550" instrument_node="">: Crown raising is a pruning method that removes lower branches from the bottom of developing or mature trees. This may be done to provide clearance for pedestrians, vehicles, and buildings, or a line of sight. Always maintain live branches on at least two-thirds of the tree’s total height. Removal of too many lower branches hinders development of a strong stem.</span></p><span data-dcnode-id="548" instrument_node="">
</span><figure aria-describedby="caption-attachment-1954" class="wp-caption aligncenter" data-dcnode-id="542" id="attachment_1954" style="width: 283px"><img alt="crown raising" class="lazy wp-image-1954 size-medium lazy-loaded" data-dcnode-id="547" data-lazy-sizes="(max-width: 283px) 100vw, 283px" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/crown-raising-283x300.png" data-lazy-srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/crown-raising-283x300.png 283w, https://horticultureunlimited.com/wp-content/uploads/2016/02/crown-raising.png 295w" data-lazy-type="image" height="300" loading="lazy" sizes="(max-width: 283px) 100vw, 283px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticultureunlimited.com/wp-content/uploads/2016/02/crown-raising-283x300.png&amp;raw" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/crown-raising-283x300.png 283w, https://horticultureunlimited.com/wp-content/uploads/2016/02/crown-raising.png 295w" width="283"><noscript data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">&lt;img loading="lazy" class="wp-image-1954 size-medium" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/crown-raising-283x300.png" alt="crown raising" width="283" height="300" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/crown-raising-283x300.png 283w, https://horticultureunlimited.com/wp-content/uploads/2016/02/crown-raising.png 295w" sizes="(max-width: 283px) 100vw, 283px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="543" id="caption-attachment-1954"><span data-dcnode-id="544" instrument_node="">Crown raising on a tree</span></figcaption></figure><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="537"><strong data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Crown reduction</span></strong><span data-dcnode-id="538" instrument_node="">: Crown reduction is a method used when a tree has grown too large for its permitted space. Removal of larger branches at the top of the tree is done to reduce its height. When pruned properly, this method is different from topping because it results in a more natural appearance and minimizes stress to the tree. Crown reduction is a method of last resort and the least desirable pruning practice. A better long-term solution would be to remove the tree and replace it with a smaller plant specimen.</span></p><span data-dcnode-id="536" instrument_node="">
</span><figure aria-describedby="caption-attachment-1958" class="wp-caption aligncenter" data-dcnode-id="530" id="attachment_1958" style="width: 207px"><img alt="Crown reduction on trees" class="lazy size-full wp-image-1958" data-dcnode-id="535" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Crown-reduction-on-trees.png" data-lazy-type="image" height="288" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticultureunlimited.com/wp-content/uploads/2016/02/Crown-reduction-on-trees.png&amp;raw" width="207"><noscript data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-1958" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Crown-reduction-on-trees.png" alt="Crown reduction on trees" width="207" height="288" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="531" id="caption-attachment-1958"><span data-dcnode-id="532" instrument_node="">Crown reduction on trees</span></figcaption></figure><span data-dcnode-id="529" instrument_node="">
</span><h3 data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Proper Pruning Methods</span></h3><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">When pruning larger branches, three separate cuts may be necessary to avoid tearing the bark. Make the first cut on the underside of the branch, at the branch collar, which is a shoulder or bulge formed at the base of a branch by the annual production of overlapping layers of branch and stem tissue. On the upper surface, there is a branch bark ridge that runs along the stem of the tree. The ridge is formed by the stem and branch tissue as they grow against one another. A proper pruning cut does not damage either the branch bark ridge or the branch collar. Make pruning cuts just outside the branch collar. The branch collar contains trunk or parent branch tissues. The tree may be damaged if you cut into the collar. If the cut is too large, the tree may suffer permanent internal decay from an improper pruning cut. Make the second pruning cut just higher on the branch than the first cut. The third cut may be made by cutting down through the branch, severing it. Do not ever leave a stub.</span></p><span data-dcnode-id="523" instrument_node="">
</span><figure aria-describedby="caption-attachment-1959" class="wp-caption alignright" data-dcnode-id="517" id="attachment_1959" style="width: 300px"><img alt="Proper pruning techniques " class="lazy size-medium wp-image-1959 lazy-loaded" data-dcnode-id="522" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Proper-pruning-techniques-300x186.png" data-lazy-srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/Proper-pruning-techniques-300x186.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/Proper-pruning-techniques.png 435w" data-lazy-type="image" height="186" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticultureunlimited.com/wp-content/uploads/2016/02/Proper-pruning-techniques-300x186.png&amp;raw" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/Proper-pruning-techniques-300x186.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/Proper-pruning-techniques.png 435w" width="300"><noscript data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">&lt;img loading="lazy" class="size-medium wp-image-1959" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Proper-pruning-techniques-300x186.png" alt="Proper pruning techniques " width="300" height="186" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/Proper-pruning-techniques-300x186.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/Proper-pruning-techniques.png 435w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="518" id="caption-attachment-1959"><span data-dcnode-id="519" instrument_node="">Proper pruning techniques</span></figcaption></figure><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">You would be wise to begin pruning trees when they are young to correct structural problems, because waiting to prune a tree until it is mature will create the need for large cuts that can cause problems for the tree. Poor pruning practices can damage a tree, so learn where and how to make the cuts before pruning. Trees do not heal when cut improperly. Small cuts do less damage than large cuts. If you cannot avoid large cuts, follow the instructions in this chapter, and generally avoid wound dressings and pruning paint. They are not necessary, and research has proven wrong the old belief that they speed wound closures and protect against insects, diseases, and decay. If a dressing must be used for cosmetic purposes, use a thin coat of material that is not toxic to the plant.</span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Pruning of deciduous trees should be done during their period of dormancy when all of their foliage has dropped, usually between mid December and the middle of January, well before their spring buds begin to swell. Also, pruning in winter makes it easier to see crossing limbs, excessive crowding, and branches that might be in need of pruning.</span></p><span data-dcnode-id="510" instrument_node="">
</span><h3 data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Pruning Dead Branches</span></h3><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Pruning dead branches is similar to pruning live ones. The cut is usually easy because the branch collar and branch bark ridge are more easily observed in dead wood. Still, be careful to make the pruning cut just outside the branch collar. Large, dead branches should be supported with one hand or cut in the three-step method, just as live branches are pruned. If a limb is large and heavy, its weight should be reduced before attempting to prune. Use the three-cut method by making the first cut under the branch about twelve to eighteen inches from the limb’s point of attachment. Make the second cut from the top, a few inches farther out on the limb. This removes the heavy limb without tearing or ripping the bark from the tree. You will be left with a stub that can be pruned back to the branch collar.</span></p><span data-dcnode-id="504" instrument_node="">
</span><h3 data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Topping of Trees</span></h3><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Topping of trees is not recommended. It is a misguided practice that shortens a tree’s lifespan. After a deciduous tree is topped, its growth rate increases dramatically in an attempt to replace its missing leaves and foliage, which are a source of nutrients. Many long, skinny shoots called water sprouts or suckers form. Theses are weak and unsightly and they must be cut and re-cut every year. This creates a major maintenance problem in the yard. The tree needs to be repeatedly pruned and eventually removed when it dies or when the owner gives up this expensive, vicious pruning cycle. A properly pruned tree requires less maintenance than an unsightly topped tree.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="490"><img alt="Incorrect topping of trees2" class="lazy size-full wp-image-1960 alignnone" data-dcnode-id="497" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Incorrect-topping-of-trees2.png" data-lazy-type="image" height="292" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticultureunlimited.com/wp-content/uploads/2016/02/Incorrect-topping-of-trees2.png&amp;raw" width="240"><noscript data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-1960 alignnone" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Incorrect-topping-of-trees2.png" alt="Incorrect topping of trees2" width="240" height="292" /&gt;</span></noscript><span data-dcnode-id="494" instrument_node=""> </span><img alt="Incorrect topping of trees" class="lazy wp-image-1961" data-dcnode-id="493" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Incorrect-topping-of-trees.png" data-lazy-type="image" height="290" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticultureunlimited.com/wp-content/uploads/2016/02/Incorrect-topping-of-trees.png&amp;raw" width="217"><noscript data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">&lt;img loading="lazy" class=" wp-image-1961" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Incorrect-topping-of-trees.png" alt="Incorrect topping of trees" width="217" height="290" /&gt;</span></noscript></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">The practice of topping is evident on many older mulberry and chinaberry trees growing in the Southwest desert. These trees have responded by growing back to a normal height, but they lack their original, beautiful silhouettes and structural integrity. Instead, they sport unsightly suckers and shoots making then susceptible to wind damage. This improper pruning has also caused injury, and has depleted these trees of stored food reserves. As a result, many end up diseased or dead.</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">If a large tree outgrows its space, it should be pruned using the crown reduction method, which allows for a natural appearance while correctly reducing the height of the tree, stimulating new growth throughout the tree and minimizing stress.</span></p><span data-dcnode-id="483" instrument_node="">
</span><h3 data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Pruning Shrubs</span></h3><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Pruning is an important practice for maintaining shrubs. Doing it successfully requires an understanding of the individual growth habit of each plant and when they flower. Shrubs come in many shapes and sizes. A properly pruned shrub is a work of art and beauty, because when trained into a particular shape or form, its natural characteristics, colorful flowers, or abundant berries are allowed to emerge in full.</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">When pruning, cuts should be hidden inside the plant where they are covered over by remaining leaves. The first step in pruning is to remove all dead and diseased or broken branches. Remove branches that might cross over other branches, or which look out of place. If the shrub is too large, remove some of the older branches first. When shrubs are sheared back routinely, lots of dense, new growth may be produced near the outer parts of the canopy. Light cannot reach the interior of the plant and it becomes top-heavy; little or no growth happens near the bottom. If you notice this pattern in your landscape plants, selectively cut the excess vegetation to a side branch or main trunk and let the plant grow back.</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Control height by making cuts inside the shrub—always make pruning cuts so they remain hidden. This method reduces the height without sacrificing the shape of the plant. When older shrubs grow out of proportion to the landscape, they may need pruning in order to rejuvenate. Also make sure that you are pruning at the right time. Frost-tender vegetation should be pruned back to live wood in early March after the chance of a last frost has passed.</span></p><span data-dcnode-id="471" instrument_node="">
</span><figure aria-describedby="caption-attachment-1962" class="wp-caption alignright" data-dcnode-id="465" id="attachment_1962" style="width: 300px"><img alt="improper pruning of Texas Ranger shrubs" class="lazy size-medium wp-image-1962" data-dcnode-id="470" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/improper-pruning-of-Texas-Ranger-shrubs-300x169.png" data-lazy-srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/improper-pruning-of-Texas-Ranger-shrubs-300x169.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/improper-pruning-of-Texas-Ranger-shrubs.png 381w" data-lazy-type="image" height="169" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticultureunlimited.com/wp-content/uploads/2016/02/improper-pruning-of-Texas-Ranger-shrubs-300x169.png&amp;raw" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/improper-pruning-of-Texas-Ranger-shrubs-300x169.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/improper-pruning-of-Texas-Ranger-shrubs.png 381w" width="300"><noscript data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">&lt;img loading="lazy" class="size-medium wp-image-1962" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/improper-pruning-of-Texas-Ranger-shrubs-300x169.png" alt="improper pruning of Texas Ranger shrubs" width="300" height="169" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/improper-pruning-of-Texas-Ranger-shrubs-300x169.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/improper-pruning-of-Texas-Ranger-shrubs.png 381w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="466" id="caption-attachment-1962"><span data-dcnode-id="467" instrument_node="">Improper pruning of Texas Ranger shrubs</span></figcaption></figure><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Select an appropriate pruning method for your plant species. Consider how pruning a particular plant might affect the landscape. How quickly can the plant recover from drastic pruning? Give extra care to heavily pruned shrubs. Fertilization, water, and possible pest control are critical factors when considering rejuvenation pruning techniques.</span></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Common landscape plants such as crape myrtle, nandina, gardenia, salvia, camellia, floribunda roses, and other flowering shrubs should be pruned in late winter or early spring before growth begins. They produce flowers on the current season’s growth. Old, dead flowers should be taken off at this time, too. Tender plants like bougainvillea, lantana, bird of paradise, plumbago, yellow bells, dwarf oleander, ruella, and shrubs that freeze back every year need to be pruned back to live wood in late winter or early spring. Don’t prune back frozen vegetation too early after a freeze. The frozen vegetation acts as a coat to protect the live wood from further damage. It is wise waiting to cut back this growth, even if plants look unsightly. The last frost in the Southwest desert generally occurs in mid March, depending on where you live.</span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">A word of caution: When pruning the desert spoon, do not take too much of the lower growth off. If these species are over-pruned they tend to look like a pineapple. The same techniques apply to the Sago palm and Mediterranean fan palm. Removing minor growth touching the ground, or just enough to cosmetically shape the plant, is adequate. It is better to prune a little than to over-prune. When pruning agave species it is a good practice to remove the bottom dead or dried-out leaves. Aloe ferrox and other tree aloes can show signs of frost damage in extremely cold winters. When frozen, the tips of the plants dry out and turn a crusty brown. Take hand clippers and prune off the dry, crusty ends of the plant. The cuts eventually callus over. Since aloes grow back from their core, the plant will eventually recover. Carefully prune back dead, diseased or frozen pieces of succulents and cactus when needed. It helps to wear protective gloves when pruning these plants to protect your arms and hands from serrated thorns. Also, use a small saw to remove dead growth. Plants like rosemary, pyracantha, and acacia develop dead wood in mature plants. Sometimes, the dead sections of these plants need to be drastically pruned in order to remove unsightly stumps and stimulate new growth.</span></p><span data-dcnode-id="455" instrument_node="">
</span><h3 data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Hedge Pruning</span></h3><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Hedges are shrubs planted close together in a row to form a windbreak or high screen. They should be allowed to maintain their natural form and characteristics. Pruning of hedges is needed to keep them looking dense or to remove dead, diseased, or broken branches. Keep hedges pruned so that they are wider at the base than at the top. Hedges that grow all season long need to be periodically trimmed throughout the spring and summer. A hedge will be thicker and better looking when cutting small amounts more frequently.</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Prune when newly planted hedges begin to show signs of new growth. Don’t wait until a hedge gets too high to start training. Light, frequent trimmings help the plant to grow gradually and eventually become an attractive, thick hedge that is evenly horizontal at the top. The best guideline for pruning hedges is to simply prune them whenever they look like they need it. To rejuvenate an old neglected hedge, cut back in the spring to a few feet above the ground. Then prune lightly as needed.</span></p><span data-dcnode-id="446" instrument_node="">
</span><h3 data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Stump Grinding</span></h3><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">A tree stump is what remains of a living plant that has been cut down. It is often unsightly and hazardous, and encroaches on garden space. The stump should be removed. Of the few ways to do this, the easiest is to hire a certified arborist to remove the stump with a stump grinder.</span></p><span data-dcnode-id="440" instrument_node="">
</span><figure aria-describedby="caption-attachment-1963" class="wp-caption alignright" data-dcnode-id="434" id="attachment_1963" style="width: 300px"><img alt="Stump grinder " class="lazy size-medium wp-image-1963 lazy-loaded" data-dcnode-id="439" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Stump-grinder-300x226.png" data-lazy-srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/Stump-grinder-300x226.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/Stump-grinder.png 303w" data-lazy-type="image" height="226" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticultureunlimited.com/wp-content/uploads/2016/02/Stump-grinder-300x226.png&amp;raw" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/Stump-grinder-300x226.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/Stump-grinder.png 303w" width="300"><noscript data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">&lt;img loading="lazy" class="size-medium wp-image-1963" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Stump-grinder-300x226.png" alt="Stump grinder " width="300" height="226" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/Stump-grinder-300x226.png 300w, https://horticultureunlimited.com/wp-content/uploads/2016/02/Stump-grinder.png 303w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="435" id="caption-attachment-1963"><span data-dcnode-id="436" instrument_node="">Stump grinder</span></figcaption></figure><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">A stump grinder is a power tool that removes the stump with a rotating, cutting disk that chips away at the wood. It comes in a variety of sizes with a high-speed disk with specially designed teeth that grind down the stump to about 12 inches below the ground level, as well as underground roots. What remains are small wood chips. Once the tree stump is removed you can install turf, landscape plants, or another tree.</span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">It takes a stump many years to decay if left untouched. However, some products are available on the market that can be applied to a stump to speed decay. You will need to drill&nbsp;many holes into the stump and pour the liquid into the holes. After three to four months, the chemical begins to break down the wood fibers of the stump, leaving them porous and able to absorb kerosene. At this point, ignite the stump, keeping a watchful eye on containment. Allow the stump to burn to the ground.</span></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Small stump grinding machines may be rented if the operator is properly trained. Eye protection is required along with other safety gear. If unsure, it is always best to hire a professional.</span></p><span data-dcnode-id="424" instrument_node="">
</span><h3 data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Pruning Tools</span></h3><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Pruning tools are available in a wide range of styles, prices, and brands. When purchasing tools, shop for the best quality and durability that you can afford. Always keep pruning tools sharp to produce a cleaner cut that helps the plant heal faster and places less stress on your hand and wrist. Also, clean tools after you use them. A pruning cut on a diseased branch can spread infection throughout your landscape.</span></p><span data-dcnode-id="418" instrument_node="">
</span><figure aria-describedby="caption-attachment-1964" class="wp-caption alignright" data-dcnode-id="412" id="attachment_1964" style="width: 203px"><img alt="Pruning tools " class="lazy size-medium wp-image-1964" data-dcnode-id="417" data-lazy-sizes="(max-width: 203px) 100vw, 203px" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Pruning-tools-203x300.png" data-lazy-srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/Pruning-tools-203x300.png 203w, https://horticultureunlimited.com/wp-content/uploads/2016/02/Pruning-tools.png 250w" data-lazy-type="image" height="300" loading="lazy" sizes="(max-width: 203px) 100vw, 203px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticultureunlimited.com/wp-content/uploads/2016/02/Pruning-tools-203x300.png&amp;raw" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/Pruning-tools-203x300.png 203w, https://horticultureunlimited.com/wp-content/uploads/2016/02/Pruning-tools.png 250w" width="203"><noscript data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">&lt;img loading="lazy" class="size-medium wp-image-1964" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Pruning-tools-203x300.png" alt="Pruning tools " width="203" height="300" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/Pruning-tools-203x300.png 203w, https://horticultureunlimited.com/wp-content/uploads/2016/02/Pruning-tools.png 250w" sizes="(max-width: 203px) 100vw, 203px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="413" id="caption-attachment-1964"><span data-dcnode-id="414" instrument_node="">Pruning tools</span></figcaption></figure><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Most pruning tasks are accomplished by using hand clippers, loppers, pole pruners, hedge shears pruning saws, and for larger cuts, chainsaws are needed. Hand pruners are the most important of all the pruning tools. They are versatile for small pruning jobs and for cutting twigs and branches up to three-quarters of an inch in diameter. They come in handy when pruning frozen growth on most groundcovers and smaller plants, or to remove dead palm fronds or leaves.</span></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">When pruning larger branches more than one to two inches, loppers are the best choice. They are like scissor-action hand pruners; except they have longer blades and a long handle that increase leverage. When using loppers, it is best to cut in one smooth stroke to avoid injuring the plant. Loppers need to be used with both hands. Good quality loppers can slice though branches of two inches or more, depending on the plant species and condition of the&nbsp;wood. Loppers are excellent when pruning smaller branches on trees, because their long handles not only increase your leverage but also help to get inside the tree. When pruning back dead sections of plants a lopper will cut deeply into the branch to quickly prune dead or frozen wood.</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Pruning saws work best on pruning cuts larger than two inches in diameter. They have narrow blades for easier maneuvering and coarser teeth than common carpenter saws. There are many types of pruning saws available. Special tri-cut or razor-tooth pruning saws cut through larger branches with ease. Avoid folding saws—they have a special wing nut that can scar the trunk when a limb is cut, and if the saw suddenly folds while in use, it could injure you. A fixed blade saw is much safer. Blades can be straight or curved. A double-edged saw has fine teeth on one side and is coarse on the other side, but can be hard to use in densely branched plants. Bow saws are useful only when there is no obstruction above the area where you are cutting.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Pole pruners remove branches from trees that cannot be reached from the ground. Most pole pruners have a cutting blade and a saw. The cutting blade can be operated from the ground by using a long rope that is pulled downward. Sometimes, pole pruners have poles that fit together in sections to extend them for special jobs. When selecting one to buy, consider that the wooden pole pruners are heavy, while white aluminum poles are lighter and easier to use. And in general, avoid using pole pruners near power lines. Material cut overhead can fall on you, so always use caution and wear head and eye protection.</span></p><span data-dcnode-id="399" instrument_node="">
</span><figure aria-describedby="caption-attachment-1965" class="wp-caption alignleft" data-dcnode-id="393" id="attachment_1965" style="width: 223px"><img alt="Gas powered pole pruners" class="lazy lazy-hidden size-medium wp-image-1965" data-dcnode-id="398" data-lazy-sizes="(max-width: 223px) 100vw, 223px" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Gas-powered-pole-pruners-223x300.png" data-lazy-srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/Gas-powered-pole-pruners-223x300.png 223w, https://horticultureunlimited.com/wp-content/uploads/2016/02/Gas-powered-pole-pruners.png 235w" data-lazy-type="image" height="300" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="223"><noscript data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">&lt;img loading="lazy" class="size-medium wp-image-1965" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Gas-powered-pole-pruners-223x300.png" alt="Gas powered pole pruners" width="223" height="300" srcset="https://horticultureunlimited.com/wp-content/uploads/2016/02/Gas-powered-pole-pruners-223x300.png 223w, https://horticultureunlimited.com/wp-content/uploads/2016/02/Gas-powered-pole-pruners.png 235w" sizes="(max-width: 223px) 100vw, 223px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="394" id="caption-attachment-1965"><span data-dcnode-id="395" instrument_node="">Gas powered pole pruners</span></figcaption></figure><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Use hedge shears to shear or clip hedges or other plants for a neat, trimmed appearance. Never try to cut large branches with hedge shears. Hedge shears can be manual, handheld, gaspowered, or electric. Manual shears have long, flat blades and short handles, one for each hand. Heavy duty gas-powered or electric shears are best for difficult jobs.</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Chainsaws should be used when pruning large branches over two inches in diameter. They come in a variety of sizes, in both gas and electric models. Before beginning your job, make sure the chainsaw is sharp, and also check the chain tension and lubrication for proper function; this ensures long chain life and safer cutting. You should always wear leather work gloves, eyewear, steel-toed work boots, and close fitting clothing. Proper clothing and equipment can reduce injury, but always use chainsaws with extreme caution.</span></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Before cutting, always look up into the tree. Overhead hazards can include dangerous wires, other trees, or dead and loose branches. When making pruning cuts, always stand to one side of a limb—never straddle it. Consider where the chain might go if it snaps. Never position&nbsp;yourself or other people in line with the chain. Keep the chain out of dirt, as debris will fly, the teeth of the chain may become dulled, and the chain life will be shortened considerably. When pruning, always keep the tree limb or a similar barrier between yourself and the saw blade. Larger limbs may require more than one cut to be removed safely. Before cutting any tree, check the diameter of the branch. If it is more than four inches or may require special cutting techniques, then it is a good idea to call a professional.</span></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Keep all pruning tools in good shape. Sharpen and oil blades at the end of each use, or at least at the end of the pruning season. Sharpen only the outside surfaces of the blades so the insides surfaces remain flat and slide smoothly against one another. It is a good idea to have pruning saws and chainsaws sharpened by a professional. Treat wooden handles with linseed oil. Wipe off blades with a cloth and oil them with common household oil. Store all tools in a dry, safe location.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">If any pruning job is too big or unsafe for you to handle, or trees are growing into electrical lines, please call in a landscape professional or certified arborist. These highly trained individuals are equipped and certified to handle all tree issues and problems. The International Society of Arboriculture (ISA) is an organization of people who have achieved a level of knowledge and competence in the art and science of proper tree care. Their acute knowledge and maintenance of trees is an investment that can enhance the longevity of a tree. To become a certified arborist, you need to pass a comprehensive examination developed by some of the nation’s leading experts on tree care. Arborists must continue their education to maintain these certifications. This keeps them well informed on the latest techniques in arboriculture.</span></p><span data-dcnode-id="377" instrument_node="">
</span><figure aria-describedby="caption-attachment-1966" class="wp-caption alignright" data-dcnode-id="371" id="attachment_1966" style="width: 179px"><img alt="The International Society of Arboriculture logo" class="lazy lazy-hidden size-full wp-image-1966" data-dcnode-id="376" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/The-International-Society-of-Arboriculture-logo.png" data-lazy-type="image" height="278" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="179"><noscript data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-1966" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/The-International-Society-of-Arboriculture-logo.png" alt="The International Society of Arboriculture logo" width="179" height="278" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="372" id="caption-attachment-1966"><span data-dcnode-id="373" instrument_node="">The International Society of Arboriculture logo</span></figcaption></figure><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Well-cared-for trees that are properly maintained and attractive add considerable value to your property. If trees are poorly maintained, they become a liability. Trees that need major pruning or removal can also be dangerous. An arborist helps determine the type of pruning that is needed to preserve the health, appearance, and safety of trees. In a severe storm that may cause a tree to uproot or limbs to fall, an arborist can assist in the safe removal of the tree without further risk to property. Additionally, an arborist recommends types of trees to install, helps with cabling or bracing of tree branches, and treats diseases and insects. When looking for an arborist, check with the International Society of Arboriculture; search the Internet or the phone directory.</span></p><span data-dcnode-id="367" instrument_node="">
</span><h3 data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Mistletoe Removal from Trees by Pruning Methods</span></h3><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Mistletoe is a flowering evergreen that grows as a parasite on a number of landscape plants in the Southwest desert. It has thick, green leaves that are oval in shape, and it grows up to two or more feet in diameter, producing small, sticky, whitish berries from October to Fried / Southwest Landscaping / 160 December. Evergreen clumps of this parasite are easily seen on deciduous trees in winter when all of the leaves have fallen.</span></p><span data-dcnode-id="361" instrument_node="">
</span><figure aria-describedby="caption-attachment-1967" class="wp-caption alignleft" data-dcnode-id="355" id="attachment_1967" style="width: 175px"><img alt="Mistletoe in a dormant mesquite tree" class="lazy lazy-hidden wp-image-1967" data-dcnode-id="360" data-lazy-src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Mistletoe-in-a-dormant-mesquite-tree-220x300.png" data-lazy-type="image" height="239" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="175"><noscript data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">&lt;img loading="lazy" class=" wp-image-1967" src="https://horticultureunlimited.com/wp-content/uploads/2016/02/Mistletoe-in-a-dormant-mesquite-tree-220x300.png" alt="Mistletoe in a dormant mesquite tree" width="175" height="239" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="356" id="caption-attachment-1967"><span data-dcnode-id="357" instrument_node="">Mistletoe in a dormant mesquite tree</span></figcaption></figure><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Mistletoe plants are either female or male, respectively producing either berries or pollen. Both male and female plants must exist in close proximity for pollination and fruit development. Birds feed off of the berries, digest the pulp, and excrete the seeds, which can then stick to the branches of living trees. When the seed germinates, it grows into tree tissues. It may take up to two years for the plant to bloom and produce viable seed. Seeds may also fall from mistletoe in the upper parts of the trees creating new infestations on lower branches. The parasitic plant depends on its host plant for water and nutrients, eventually causing decline over a period of years. Severe infestations cause the host tree to lose limbs and eventually die. At different elevations in Arizona and other states, mistletoe infects many trees and shrub species, including palo verde, mesquite, cottonwood, ash, sycamore, ironwood and acacia.</span></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">The most effective way to control this parasite is to prune out infected branches as soon as they appear. Cut the mistletoe from the host tree before its roots become deeply embedded in the tree limbs. Infected branches should be pruned at least one foot below the point of plant attachment. Heavy infestations may require you to remove the entire tree. At a minimum, prune the mistletoe from infected trees every six months to keep this parasite in check.</span></p><span data-dcnode-id="348" instrument_node="">
