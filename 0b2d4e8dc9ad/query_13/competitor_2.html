</span><h1 class="entry-title article-heading" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Forsythia Shrub – Tips for Planting, Growing and Pruning Forsythia Plants</span></h1><span data-dcnode-id="804" instrument_node="">
</span><div class="article-meta post-meta-wrapper post-meta-single post-meta-single-top no-author-meta" data-dcnode-id="794"><span data-dcnode-id="803" instrument_node="">
</span><p class="meta-wrapper" data-dcnode-id="796"><span class="posted-on" data-dcnode-id="797"><span class="screen-reader-text" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Posted on </span></span><span data-dcnode-id="800" instrument_node="">Published: </span><time class="entry-date" data-dcnode-id="798" datetime="2019-05-04T11:59:59-04:00"><span data-dcnode-id="799" instrument_node="">05/04/2019</span></time></span></p><span data-dcnode-id="795" instrument_node="">
</span></div><span data-dcnode-id="793" instrument_node="">
</span></header><span data-dcnode-id="791" instrument_node="">
</span><div class="entry-content mvt-content" data-dcnode-id="280"><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="787" instrument_node="">A </span><em data-dcnode-id="784"><strong data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">forsythia shrub</span></strong></em><span data-dcnode-id="783" instrument_node="">&nbsp;is one of the first harbingers of spring. Who can resist those </span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/yellow-flowers/"><span data-dcnode-id="782" instrument_node="">cherry yellow blooms</span></a><span data-dcnode-id="780" instrument_node=""> that appear about the time that the daffodils poke their heads up?</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="777" instrument_node="">These shrubs can be used as a stand alone plant in the middle of your lawn and can also be used as a </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/gardens-that-make-a-big-impact/"><span data-dcnode-id="776" instrument_node="">forsythia hedge</span></a><span data-dcnode-id="774" instrument_node=""> to </span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/hiding-chain-link-fences/"><span data-dcnode-id="773" instrument_node="">cover a chain link fence line</span></a><span data-dcnode-id="771" instrument_node="">.</span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">A forsythia shrub is tough and easy to care for.&nbsp; They have a few drawbacks, one being that you will need room for them to grow well.&nbsp;&nbsp;</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">With their arching habit and a mature adult size of up to 10 feet across, this is not a plant to put in front of the window in a small garden bed!</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="759"><noscript data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-39450 size-full" title="forsythia tree in a meadow" src="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips.jpg" alt="Forsythia is a hardy and tough shrub with cherry yellow flowers. Click through for the care guide." width="700" height="1116" srcset="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-314x500.jpg 314w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-642x1024.jpg 642w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-560x893.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-260x415.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-170x271.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Forsythia is a hardy and tough shrub with cherry yellow flowers. Click through for the care guide." class="aligncenter wp-image-39450 size-full lazyload" data-dcnode-id="760" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-314x500.jpg 314w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-642x1024.jpg 642w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-560x893.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-260x415.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-170x271.jpg 170w" height="1116" id="mv-trellis-img-1" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-314x500.jpg 314w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-642x1024.jpg 642w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-560x893.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-260x415.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-care-tips-170x271.jpg 170w" title="forsythia tree in a meadow" width="700"></p><span data-dcnode-id="758" instrument_node="">
</span><div class="mv-video-target mv-video-id-lupmtfrnwjmmg48dku7f" data-dcnode-id="757" data-video-id="lupmtfrnwjmmg48dku7f" data-volume="70"></div><span data-dcnode-id="756" instrument_node="">
</span><h2 data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Where is a forsythia shrub native to?</span></h2><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Forsythia is a genus of flowering plants in the olive family Oleaceae. It is native to Eastern Asia and Southeastern Europe. The genus is&nbsp;named after&nbsp;William Forsyth, a Scottish botanist.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">For many in the country, the forsythia shrub flowers somewhere near Easter time, giving the bush the common name Easter Tree.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="740"><em data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Forsythia intermedia</span></em><span data-dcnode-id="744" instrument_node="">&nbsp;(also known as border forsythia) and </span><em data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">forsythia suspensa</span></em><span data-dcnode-id="741" instrument_node="">&nbsp;(common name weeping forsythia) are two varieties prized for being tough and hardy. Both are spring flowering shrubs with yellow flowers.</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="738" instrument_node="">If you love a blast of color that </span><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/spring-blooming-plants/"><span data-dcnode-id="737" instrument_node="">early spring blooming plants</span></a><span data-dcnode-id="735" instrument_node=""> bring to your garden, try growing forsythia shrubs. Even though they only bloom once, it is worth waiting for the show!</span></p><span data-dcnode-id="733" instrument_node="">
</span><h2 data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Common Questions about Growing a Forsythia Shrub</span></h2><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">I get questions from readers all the time about forsythia, since it is a favorite of mine and I have written several articles about the care of the plant. Here are a few:</span></p><span data-dcnode-id="727" instrument_node="">
</span><h3 data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Does Forsythia Grow in the Shade?</span></h3><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="723" instrument_node="">Forsythia likes the sun and does well when it gets plenty of it – at least 6 hours a day – in order for it to bloom properly.</span><noscript data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-39449 size-full" title="forsythia in the sun" src="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight.jpg" alt="a forsythia shrub likes 6 hours of sun a day." width="700" height="876" srcset="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight-400x500.jpg 400w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight-560x701.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight-260x325.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight-170x213.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="a forsythia shrub likes 6 hours of sun a day." class="aligncenter wp-image-39449 size-full lazyload" data-dcnode-id="720" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight-400x500.jpg 400w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight-560x701.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight-260x325.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight-170x213.jpg 170w" height="876" id="mv-trellis-img-2" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight-400x500.jpg 400w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight-560x701.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight-260x325.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-sunlight-170x213.jpg 170w" title="forsythia in the sun" width="700"></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="717" instrument_node="">While this </span><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/growing-perennials/"><span data-dcnode-id="716" instrument_node="">perennial</span></a><span data-dcnode-id="714" instrument_node=""> is tough, and can tolerate some shade, if you give it less light that this, it will affect the amount of bloom that the plant puts out in the spring.</span></p><span data-dcnode-id="712" instrument_node="">
</span><h3 data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Does Forsythia have a Scent?</span></h3><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Forsythia is grown mainly for the color of the blossoms and the early bearing flowers that the plant has.&nbsp; In my experience, I have not noticed a smell from my forsythia shrub and I have many of them.</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">I have heard others mention a smell at certain times – after a rainstorm, etc so your mileage may vary.&nbsp;&nbsp;</span></p><span data-dcnode-id="703" instrument_node="">
</span><h3 data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Does a Forsythia shrub Spread in a Garden?</span></h3><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">The answer to this is a resounding YES.&nbsp; The growth habit of forsythia is such that the branches arch forward from the center of the plant.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="696" instrument_node="">If the tips of the branches come into contact with the soil, roots will develop and new plants will start to grow.&nbsp; This gives you </span><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/plant-propagation-tips/"><span data-dcnode-id="695" instrument_node="">new plants for free</span></a><span data-dcnode-id="693" instrument_node="">, but can also be a problem of managing size.</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">These plantings can be separated from the mother plant and placed in a new location, but if not separated, the plant will just get larger and larger. This habit is called tip-rooting.</span></p><span data-dcnode-id="688" instrument_node="">
</span><h3 data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Does Forsythia come in different colors?</span></h3><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="684" instrument_node="">There are different varieties of forsythia that have differences in size, but there is not much variety in color. All of them are yellow and trumpet shaped, with only slight variations in the yellow shade.</span><noscript data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-39448 size-full" title="yellow forsythia flower" src="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower.jpg" alt="Yellow trumpet like flowers" width="700" height="602" srcset="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower-500x430.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower-560x482.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower-260x224.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower-170x146.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Yellow trumpet like flowers" class="aligncenter wp-image-39448 size-full lazyload" data-dcnode-id="681" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower-500x430.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower-560x482.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower-260x224.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower-170x146.jpg 170w" height="602" id="mv-trellis-img-3" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower-500x430.jpg 500w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower-560x482.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower-260x224.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-flower-170x146.jpg 170w" title="yellow forsythia flower" width="700"></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">I have heard people referring to a white forsythia, but this is a different plant which belongs to another botanical family.</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">(The scientific name for white forsythia is&nbsp;</span><em data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Abeliophyllum distichum</span></em><span data-dcnode-id="672" instrument_node="">.) This plant has an almond like fragrance.</span></p><span data-dcnode-id="670" instrument_node="">
</span><h3 data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Are Forsythia Deer Resistant?</span></h3><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">While there is no plant that is truly “deer-proof,” you should be safe planting forsythia even if you have deer visiting your garden.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Note that if the deer are part of a large population and have to compete for food, they will eat most anything, so forsythia may interest them.</span></p><span data-dcnode-id="661" instrument_node="">
</span><h3 data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Is a Forsythia shrub Poisonous?</span></h3><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Forsythia is said to be nontoxic to both pets and humans. The petals have a bitter taste that helps to keep animals away.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="654" instrument_node="">If this issue concerns you, this </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.poison.org/articles/plant" rel="noopener" target="_blank"><span data-dcnode-id="653" instrument_node="">list of poisonous and non poisonous plants</span></a><span data-dcnode-id="651" instrument_node=""> may be useful.</span></p><span data-dcnode-id="649" instrument_node="">
</span><h3 data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Can Forsythia be Pruned to a hedge?</span></h3><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">It is possible to trim forsythia shrubs into a hedge. (I am planning this for a border patch of mine this year.)&nbsp;</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">If your mature forsythia shrubs have grown too large for their current location, pruning them into a hedge will give you an answer to the problem.</span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Making a forsythia hedge will change the arching habit of the plant and result in a tidier looking shrub that does a good job of hiding a fence. New growth will need to be trimmed periodically throughout the summer months.</span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Please note that pruning the plant during the growing season may result in far less blooms the following spring.</span></p><span data-dcnode-id="634" instrument_node="">
</span><h2 data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Tips for growing, pruning and planting a forsythia shrub</span></h2><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">There may be other questions that you have in mind about growing forsythia.&nbsp; These posts should be helpful to you. So, grab a cup of coffee and enjoy reading my tips for growing and general forsythia care.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="627" instrument_node="">Note: the articles open in the same window. Use your browser back button to return to this page for more articles to read about forsythia shrubs.</span><noscript data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-39447 size-full" title="forsythia bushes and cat" src="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care.jpg" alt="Forsythia Shrubs are one of the first harbingers of spring. Click through for a growing guide to this perennial." width="700" height="1050" srcset="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-333x500.jpg 333w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-683x1024.jpg 683w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-560x840.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-260x390.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-170x255.jpg 170w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Forsythia Shrubs are one of the first harbingers of spring. Click through for a growing guide to this perennial." class="aligncenter wp-image-39447 size-full lazyload" data-dcnode-id="624" data-pin-media="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care.jpg" data-src="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care.jpg" data-srcset="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-333x500.jpg 333w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-683x1024.jpg 683w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-560x840.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-260x390.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-170x255.jpg 170w" height="1050" id="mv-trellis-img-4" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care.jpg&amp;raw" srcset="https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care.jpg 700w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-333x500.jpg 333w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-683x1024.jpg 683w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-560x840.jpg 560w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-260x390.jpg 260w, https://thegardeningcook.com/wp-content/uploads/2019/05/forsythia-bushes-care-170x255.jpg 170w" title="forsythia bushes and cat" width="700"></p><span data-dcnode-id="622" instrument_node="">
