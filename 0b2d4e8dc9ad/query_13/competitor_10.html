ta-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/advice/health-and-wellbeing"><span data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Wellbeing</span></span></a></li></ul></div></div></div></app-bread-crumbs><app-global-banner class="ng-tns-c54-0 ng-star-inserted" data-dcnode-id="764"></app-global-banner></app-nav><router-outlet data-dcnode-id="761"></router-outlet><app-advice-profile class="ng-star-inserted" data-dcnode-id="177"><div class="section ng-star-inserted" data-dcnode-id="714"><div class="section__container" data-dcnode-id="715"><app-rhs-ad data-dcnode-id="760"></app-rhs-ad><div class="l-row ng-star-inserted" data-dcnode-id="718"><div class="l-col-md-6" data-dcnode-id="729"><div class="l-module" data-dcnode-id="730"><div class="flag flag--top flag--rev hidden-md hidden-lg" data-dcnode-id="753"><div class="flag__img" data-dcnode-id="757"><a class="heading-link heading-link--back heading-link--h1" data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/types/shrubs/advice/plant-problems/all-plant-problems" id="backButtonMobile" style="display: none;"><span data-dcnode-id="759" instrument_node="">Back</span></a></div><div class="flag__body" data-dcnode-id="754"><h1 data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Shrubs: pruning evergreens</span></h1></div></div><h1 class="hidden-xs hidden-sm" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Shrubs: pruning evergreens</span></h1><p class="summary" data-dcnode-id="746"><span data-dcnode-id="750" instrument_node="">Once established, most evergreen shrubs are fairly low maintenance and need little or no regular pruning. Pruning, when required, is generally carried out in mid to late spring. Such plants fall into </span><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/pruning/rhs-pruning-groups"><span data-dcnode-id="749" instrument_node="">RHS Pruning groups 8, 9 and 10</span></a><span data-dcnode-id="747" instrument_node="">.</span></p><lib-quick-add-bookmark class="f2" data-dcnode-id="731" display="true"><div class="article-action u-m-b-2 ng-star-inserted" data-dcnode-id="734"><div class="article-action__item ng-star-inserted" data-dcnode-id="741"><a data-dcnode-id="742"><span class="article-action__icon article-action__icon--scrapbook" data-dcnode-id="745"></span><span class="article-action__text" data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Save to My scrapbook</span></span></a></div><div class="article-action__item" data-dcnode-id="737"><a class="article-action__icon article-action__icon--twitter" data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/The_RHS" target="_blank"></a></div><div class="article-action__item" data-dcnode-id="735"><a class="article-action__icon article-action__icon--facebook" data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/rhshome" target="_blank"></a></div></div></lib-quick-add-bookmark></div></div><div class="l-col-md-6" data-dcnode-id="719"><div class="l-module" data-dcnode-id="720"><a class="heading-link heading-link--back heading-link--h1 right u-m-b-2 hidden-xs hidden-sm" data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/types/shrubs/advice/plant-problems/all-plant-problems" id="backButtonDesktop" style="display: none;"><span data-dcnode-id="728" instrument_node="">Back</span></a><div class="image-frame image-frame--1x1 clear-both" data-dcnode-id="721"><div class="cover-image cover-image--1x1 cover-image--dark-placeholder" data-dcnode-id="722"><div class="cover-image__img" data-dcnode-id="726" style="background-image: url(&quot;/getmedia/e2a1a7a5-7c5c-40db-8840-95de49a349f9/Pruning-evergreen-shrub.jpg?width=940&amp;height=940&amp;ext=.jpg&quot;);"></div><div class="image-overlay image-overlay--tint image-overlay--large image-overlay--bottom" data-dcnode-id="723"><span class="text-small" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Pruning keeps your plants compact</span></span></div></div></div></div></div></div></div></div><div class="section ng-star-inserted" data-dcnode-id="180"><div class="section__container" data-dcnode-id="207"><div class="l-layout" data-dcnode-id="208"><div class="l-module" data-dcnode-id="209"><div class="l-row l-row--space" data-dcnode-id="210"><div class="l-col-md-9 l-col-lg-8" data-dcnode-id="269"><div class="l-module" data-dcnode-id="693"><div class="panel panel--border" data-dcnode-id="694"><div class="panel__content" data-dcnode-id="695"><div class="panel__heading" data-dcnode-id="711"><h4 data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Quick facts</span></h4></div><div class="panel__body" data-dcnode-id="696"><div class="content" data-dcnode-id="697"><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Suitable for:</span></strong><span data-dcnode-id="708" instrument_node=""> Evergreen shrubs</span><br data-dcnode-id="707"><span data-dcnode-id="706" instrument_node="">
</span><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Timing:</span></strong><span data-dcnode-id="703" instrument_node=""> April to May, or after flowering</span><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">
</span><strong data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Difficulty:</span></strong><span data-dcnode-id="698" instrument_node=""> Moderate</span></div></div></div></div></div><div class="l-module ng-star-inserted" data-dcnode-id="676"><h2 data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Jump to</span></h2><ul class="jump-to" data-dcnode-id="677"><li class="jump-to__item ng-star-inserted" data-dcnode-id="688"><a class="u-cursor-pointer" data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Suitable for...</span></a></li><li class="jump-to__item ng-star-inserted" data-dcnode-id="685"><a class="u-cursor-pointer" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">When to prune evergreen shrubs</span></a></li><li class="jump-to__item ng-star-inserted" data-dcnode-id="682"><a class="u-cursor-pointer" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">How to prune evergreen shrubs</span></a></li><li class="jump-to__item ng-star-inserted" data-dcnode-id="679"><a class="u-cursor-pointer" data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Problems</span></a></li></ul></div><div class="l-module ng-star-inserted" data-dcnode-id="635" id="sectionsContainer"><div class="l-layout" data-dcnode-id="636"><div class="l-module" data-dcnode-id="638" id="section-1"><div class="content-steps" data-dcnode-id="639"><h3 data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Suitable for...</span></h3><lib-inline-widgets data-dcnode-id="640"><ngx-dynamic-hooks data-dcnode-id="641"><p data-dcnode-id="643"><span data-dcnode-id="671" instrument_node="">This advice is suitable for evergreen shrubs (retaining their leaves in winter).</span><br data-dcnode-id="670"><span data-dcnode-id="669" instrument_node="">
</span><br data-dcnode-id="668"><span data-dcnode-id="667" instrument_node="">
Many </span><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">small shrubs</span></strong><span data-dcnode-id="664" instrument_node=""> such as lavender, and heathers (</span><em data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Calluna</span></em><span data-dcnode-id="661" instrument_node="">, </span><em data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Erica</span></em><span data-dcnode-id="658" instrument_node="">) are generally short-lived and will need replacing after 10 years or so. These shrubs flower on new wood, so pruning these plants annually will improve flowering and extend their life and prevent them from becoming too woody.</span><br data-dcnode-id="657"><span data-dcnode-id="656" instrument_node="">
</span><br data-dcnode-id="655"><span data-dcnode-id="654" instrument_node="">
</span><strong data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Larger shrubs</span></strong><span data-dcnode-id="651" instrument_node="">, such as rhododendrons, generally require very little pruning, except for the removal of unhealthy, dead, diseased and damaged shoots. Likewise, slow-growing shrubs also require little or no regular pruning, except the removal of unhealthy shoots in mid-spring.</span><br data-dcnode-id="650"><span data-dcnode-id="649" instrument_node="">
</span><br data-dcnode-id="648"><span data-dcnode-id="647" instrument_node="">
</span><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Formal shrubs</span></strong><span data-dcnode-id="644" instrument_node=""> can be clipped as for hedges.</span></p><span data-dcnode-id="642" instrument_node="">
</span></ngx-dynamic-hooks></lib-inline-widgets></div></div></div></div><div class="l-module ng-star-inserted" data-dcnode-id="614" id="sectionsContainer"><div class="l-layout" data-dcnode-id="615"><div class="l-module" data-dcnode-id="617" id="section-2"><div class="content-steps" data-dcnode-id="618"><h3 data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">When to prune evergreen shrubs</span></h3><lib-inline-widgets data-dcnode-id="619"><ngx-dynamic-hooks data-dcnode-id="620"><p data-dcnode-id="627"><span data-dcnode-id="632" instrument_node="">You can prune most evergreen shrubs just before growth starts in mid-spring, after any risk of frost has passed. Pruning at this time will avoid frost damage to new shoots, and any pruning scars will be concealed by new growth.</span><br data-dcnode-id="631"><span data-dcnode-id="630" instrument_node="">
</span><br data-dcnode-id="629"><span data-dcnode-id="628" instrument_node="">
Evergreens that are still flowering or about to flower in mid-spring can be left until flowering has finished.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="622"><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/types/hedges/when-to-prune"><span data-dcnode-id="625" instrument_node="">Hedges</span></a><span data-dcnode-id="623" instrument_node="">&nbsp;may have specific pruning times.</span></p><span data-dcnode-id="621" instrument_node="">
</span></ngx-dynamic-hooks></lib-inline-widgets></div></div></div></div><div class="l-module ng-star-inserted" data-dcnode-id="323" id="sectionsContainer"><div class="l-layout" data-dcnode-id="324"><div class="l-module" data-dcnode-id="326" id="section-3"><div class="content-steps" data-dcnode-id="327"><h3 data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">How to prune evergreen shrubs</span></h3><lib-inline-widgets data-dcnode-id="328"><ngx-dynamic-hooks data-dcnode-id="329"><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">When pruning any evergreen shrub (except old, overgrown shrubs, see below), aim to remove about one-third of older wood in total.</span></p><span data-dcnode-id="609" instrument_node="">
</span><ul data-dcnode-id="598"><span data-dcnode-id="608" instrument_node="">
</span><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Prune out any diseased, damaged or dead shoots using long-handled loppers or a saw if necessary</span></li><span data-dcnode-id="605" instrument_node="">
</span><li data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">And finally, thin out crowded shoots and any badly positioned ones that spoil the shrub’s appearance</span></li><span data-dcnode-id="602" instrument_node="">
</span><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">After pruning, plants benefit from mulching and feeding. Use either a general-purpose fertiliser or specialist rose or other high-potassium fertiliser</span></li><span data-dcnode-id="599" instrument_node="">
</span></ul><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">For convenience, we have divided evergreen shrubs into three groups on the basis of timing and type of pruning required:</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="587"><b data-dcnode-id="588"><strong data-dcnode-id="589"><span data-dcnode-id="593" instrument_node="">1. Early flowering evergreen shrubs (</span><a data-dcnode-id="591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/pruning/rhs-pruning-groups"><span data-dcnode-id="592" instrument_node="">Pruning group 8</span></a><span data-dcnode-id="590" instrument_node="">)</span></strong></b></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="483"><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Timing:</span></strong><span data-dcnode-id="583" instrument_node=""> Prune immediately after flowering.</span><br data-dcnode-id="582"><span data-dcnode-id="581" instrument_node="">
</span><strong data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Examples:</span></strong><span data-dcnode-id="578" instrument_node=""> </span><i data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Berberis</span></i><span data-dcnode-id="575" instrument_node="">,</span><em data-dcnode-id="573"><span data-dcnode-id="574" instrument_node=""> </span></em><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/box/growing-guide"><span data-dcnode-id="572" instrument_node="">box</span></a><span data-dcnode-id="570" instrument_node=""> (</span><i data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Buxus</span></i><span data-dcnode-id="567" instrument_node="">),</span><i data-dcnode-id="563"><span data-dcnode-id="566" instrument_node=""> </span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/camellia/growing-guide"><span data-dcnode-id="565" instrument_node="">Camellia</span></a></i><span data-dcnode-id="562" instrument_node="">, </span><i data-dcnode-id="559"><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/ceanothus/growing-guide"><span data-dcnode-id="561" instrument_node="">Ceanothus</span></a></i><span data-dcnode-id="558" instrument_node="">,</span><i data-dcnode-id="556"><span data-dcnode-id="557" instrument_node=""> Choisya</span></i><span data-dcnode-id="555" instrument_node="">, </span><i data-dcnode-id="552"><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/daphne/growing-guide"><span data-dcnode-id="554" instrument_node="">Daphne</span></a></i><span data-dcnode-id="551" instrument_node="">,</span><i data-dcnode-id="549"><span data-dcnode-id="550" instrument_node=""> Hypericum</span></i><span data-dcnode-id="548" instrument_node="">, laurel&nbsp;(</span><em data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Prunus laurocerasus </span></em><span data-dcnode-id="545" instrument_node="">and </span><em data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Prunus&nbsp;lusitanica</span></em><span data-dcnode-id="542" instrument_node="">),&nbsp;</span><i data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Mahonia</span></i><span data-dcnode-id="539" instrument_node="">,</span><i data-dcnode-id="537"><span data-dcnode-id="538" instrument_node=""> Pieris</span></i><span data-dcnode-id="536" instrument_node="">, Azalea (</span><i data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Rhododendron</span></i><span data-dcnode-id="533" instrument_node="">), </span><i data-dcnode-id="530"><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/rhododendron/growing-guide"><span data-dcnode-id="532" instrument_node="">Rhododendron</span></a></i><span data-dcnode-id="529" instrument_node="">, </span><i data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Viburnum tinus.</span></i><br data-dcnode-id="526"><span data-dcnode-id="525" instrument_node="">
</span><strong data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Pruning:</span></strong><span data-dcnode-id="522" instrument_node=""> Winter, spring and early summer-flowering evergreens such as </span><i data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Rhododendron</span></i><span data-dcnode-id="519" instrument_node=""> and </span><i data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Camellia</span></i><span data-dcnode-id="516" instrument_node=""> are best left unpruned except for removal of unsightly shoots and deadheading, unless some shaping is required. Do this by lightly cutting back shoots after flowering. Deadheading and removal of dead, damaged and diseased growth can be done at the same time.</span><br data-dcnode-id="515"><span data-dcnode-id="514" instrument_node="">
</span><b data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Exceptions:</span></b><span data-dcnode-id="511" instrument_node=""> Certain evergreen shrubs require a harder prune to increase flowering or to maintain their attractive shape. Examples include groundcover such as </span><i data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Mahonia aquifolium </span></i><span data-dcnode-id="508" instrument_node="">and </span><i data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Hypericum calycinum</span></i><span data-dcnode-id="505" instrument_node=""> which look best sheared over in spring. Deciduous </span><i data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Viburnum</span></i><span data-dcnode-id="502" instrument_node=""> - whether winter, spring or summer flowering - also fall within pruning group 8 and can be lightly pruned after flowering unless berries are required.&nbsp;Those shrubs recommended for </span><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/types/hedges/pruning-guide"><span data-dcnode-id="501" instrument_node="">hedges</span></a><span data-dcnode-id="499" instrument_node="">, </span><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/types/hedges/topiary"><span data-dcnode-id="498" instrument_node="">topiary</span></a><span data-dcnode-id="496" instrument_node=""> or </span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/types/shrubs/colourful-stems-large-foliage"><span data-dcnode-id="495" instrument_node="">foliage</span></a><span data-dcnode-id="493" instrument_node=""> often require regular trimming and tolerate heavier pruning.</span><br data-dcnode-id="492"><span data-dcnode-id="491" instrument_node="">
</span><br data-dcnode-id="490"><span data-dcnode-id="489" instrument_node="">
</span><strong data-dcnode-id="484"><span data-dcnode-id="488" instrument_node="">2. Late flowering evergreen shrubs (</span><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/pruning/rhs-pruning-groups"><span data-dcnode-id="487" instrument_node="">Pruning group 9</span></a><span data-dcnode-id="485" instrument_node="">)</span></strong></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="445"><strong data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Timing:</span></strong><span data-dcnode-id="479" instrument_node=""> Prune mid- to late spring.</span><br data-dcnode-id="478"><span data-dcnode-id="477" instrument_node="">
</span><strong data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Examples:</span></strong><span data-dcnode-id="474" instrument_node=""> </span><em data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Escallonia</span></em><span data-dcnode-id="471" instrument_node="">,&nbsp;</span><em data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Eucryphia</span></em><span data-dcnode-id="468" instrument_node="">,&nbsp;</span><em data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Fatsia</span></em><span data-dcnode-id="465" instrument_node="">,&nbsp;</span><em data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Hebe</span></em><span data-dcnode-id="462" instrument_node="">,&nbsp;</span><em data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Rosmarinus</span></em><br data-dcnode-id="459"><span data-dcnode-id="458" instrument_node="">
</span><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Pruning:</span></strong><span data-dcnode-id="455" instrument_node=""> This group of evergreen shrubs bloom in summer and late autumn on the previous or current year's growth. They need little pruning. Prune lightly removing unsightly shoots as required. Those shrubs recommended for </span><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/types/hedges/pruning-guide"><span data-dcnode-id="454" instrument_node="">hedges</span></a><span data-dcnode-id="452" instrument_node="">, </span><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/types/hedges/topiary"><span data-dcnode-id="451" instrument_node="">topiary</span></a><span data-dcnode-id="449" instrument_node=""> or </span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/types/shrubs/colourful-stems-large-foliage"><span data-dcnode-id="448" instrument_node="">foliage</span></a><span data-dcnode-id="446" instrument_node=""> often require regular trimming and tolerate heavier pruning.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="438"><strong data-dcnode-id="439"><span data-dcnode-id="443" instrument_node="">3. Evergreen shrubs (</span><a data-dcnode-id="441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/pruning/rhs-pruning-groups"><span data-dcnode-id="442" instrument_node="">Pruning group 10</span></a><span data-dcnode-id="440" instrument_node="">)</span></strong></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="381"><strong data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Timing: </span></strong><span data-dcnode-id="434" instrument_node="">Prune immediately after flowering where flowering is on the previous year's growth, or in the subsequent early to mid-spring if flowering is on the current year's growth.</span><br data-dcnode-id="433"><span data-dcnode-id="432" instrument_node="">
</span><strong data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Examples:</span></strong><span data-dcnode-id="429" instrument_node=""> </span><em data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Bouvardia</span></em><span data-dcnode-id="426" instrument_node="">, heather (</span><em data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Calluna</span></em><span data-dcnode-id="423" instrument_node="">), </span><em data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Erica</span></em><span data-dcnode-id="420" instrument_node="">, </span><em data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Helianthemum</span></em><span data-dcnode-id="417" instrument_node="">, </span><em data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Hyssopus</span></em><span data-dcnode-id="414" instrument_node="">, </span><em data-dcnode-id="411"><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/lavender/growing-guide"><span data-dcnode-id="413" instrument_node="">Lavandula</span></a></em><span data-dcnode-id="410" instrument_node="">, </span><em data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Ruta</span></em><span data-dcnode-id="407" instrument_node="">, </span><em data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Santolina</span></em><span data-dcnode-id="404" instrument_node="">, </span><em data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Thymus</span></em><span data-dcnode-id="401" instrument_node="">, gorse (</span><em data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Ulex</span></em><span data-dcnode-id="398" instrument_node="">).</span><br data-dcnode-id="397"><span data-dcnode-id="396" instrument_node="">
</span><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Pruning: </span></strong><span data-dcnode-id="393" instrument_node="">This group of evergreen shrubs flower on the previous year's growth in spring or early summer, or on the current year's growth in late summer and autumn. Remove shoots that have flowered to within 1.5-2.5cm (¾-1in) of the previous year's growth.</span><br data-dcnode-id="392"><span data-dcnode-id="391" instrument_node="">
</span><strong data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Exceptions:</span></strong><span data-dcnode-id="388" instrument_node=""> Certain deciduous shrubs such as </span><em data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Potentilla fruticosa </span></em><span data-dcnode-id="385" instrument_node="">and </span><em data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Ceratostigma willmotianum </span></em><span data-dcnode-id="382" instrument_node="">also fall within this pruning group.&nbsp;</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="379"></p><span data-dcnode-id="378" instrument_node="">
</span><h3 data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Renovation of neglected shrubs</span></h3><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="374" instrument_node="">If you inherit a garden full of neglected shrubs or have a plant that is overgrown and choked with branches, you can try to </span><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/plants/types/shrubs/renovation"><span data-dcnode-id="373" instrument_node="">rejuvenate</span></a><span data-dcnode-id="371" instrument_node=""> it by pruning.</span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="343"><span data-dcnode-id="368" instrument_node="">Some shrubs can be severely pruned just as growth begins in mid-spring. Spotted laurel (</span><em data-dcnode-id="366" lang="latin"><span data-dcnode-id="367" instrument_node="">Aucuba)</span></em><span data-dcnode-id="365" instrument_node="">, box (</span><em data-dcnode-id="363" lang="latin"><span data-dcnode-id="364" instrument_node="">Buxus)</span></em><span data-dcnode-id="362" instrument_node="">, camellias, </span><em data-dcnode-id="360" lang="latin"><span data-dcnode-id="361" instrument_node="">Choisya</span></em><span data-dcnode-id="359" instrument_node="">, </span><em data-dcnode-id="357" lang="latin"><span data-dcnode-id="358" instrument_node="">Euonymus</span></em><span data-dcnode-id="356" instrument_node="">, hollies, </span><em data-dcnode-id="354" lang="latin"><span data-dcnode-id="355" instrument_node="">Pieris</span></em><span data-dcnode-id="353" instrument_node="">, laurels (</span><em data-dcnode-id="351" lang="latin"><span data-dcnode-id="352" instrument_node="">Prunus laurocerasus&nbsp;</span></em><span data-dcnode-id="350" instrument_node="">and</span><em data-dcnode-id="348" lang="latin"><span data-dcnode-id="349" instrument_node="">&nbsp;Prunus&nbsp;lusitanica</span></em><span data-dcnode-id="347" instrument_node="">),&nbsp;</span><em data-dcnode-id="345" lang="latin"><span data-dcnode-id="346" instrument_node="">Viburnum tinus</span></em><span data-dcnode-id="344" instrument_node=""> and yew&nbsp;all tolerate severe pruning to near ground level.</span></p><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Other evergreens are often best renovated over several years, removing one-third to half of shoots to ground level, and reducing all other shoots by one-third in the first year. Over the next couple of years, each year remove half of the older shoots to ground level.</span></p><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="338" instrument_node="">Following renovation apply a general-purpose </span><a data-dcnode-id="336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/garden-jobs/fertilisers"><span data-dcnode-id="337" instrument_node="">fertiliser</span></a><span data-dcnode-id="335" instrument_node=""> and </span><a data-dcnode-id="333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/soil-composts-mulches/mulch"><span data-dcnode-id="334" instrument_node="">mulch</span></a><span data-dcnode-id="332" instrument_node=""> and avoid drought stress in the following season.</span></p><span data-dcnode-id="330" instrument_node="">
</span></ngx-dynamic-hooks></lib-inline-widgets></div></div></div></div><div class="l-module ng-star-inserted" data-dcnode-id="292" id="sectionsContainer"><div class="l-layout" data-dcnode-id="293"><div class="l-module" data-dcnode-id="295" id="section-4"><div class="content-steps" data-dcnode-id="296"><h3 data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Problems</span></h3><lib-inline-widgets data-dcnode-id="297"><ngx-dynamic-hooks data-dcnode-id="298"><p data-dcnode-id="300"><span data-dcnode-id="320" instrument_node="">While pruning, you may notice signs of the following diseases; </span><a data-dcnode-id="318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/disease/bacterial-canker"><span data-dcnode-id="319" instrument_node="">bacterial canker</span></a><span data-dcnode-id="317" instrument_node="">, </span><a data-dcnode-id="315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/biodiversity/bracket-fungi"><span data-dcnode-id="316" instrument_node="">bracket fungi</span></a><span data-dcnode-id="314" instrument_node="">, </span><a data-dcnode-id="312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/biodiversity/coral-spot"><span data-dcnode-id="313" instrument_node="">coral spot</span></a><span data-dcnode-id="311" instrument_node="">&nbsp;and </span><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/disease/verticillium-wilt"><span data-dcnode-id="310" instrument_node="">verticillium wilt</span></a><span data-dcnode-id="308" instrument_node="">.</span><br data-dcnode-id="307"><span data-dcnode-id="306" instrument_node="">
</span><br data-dcnode-id="305"><span data-dcnode-id="304" instrument_node="">
