k to How to Prune Bridal Wreath and Snowmound Spiraeas" data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeguides.sfgate.com/how-to-prune-bridal-wreath-and-snowmound-spiraeas-13427931.html"><span data-dcnode-id="825" instrument_node=""> How to Prune Bridal Wreath and Snowmound Spiraeas </span></a><span data-dcnode-id="823" instrument_node=""> </span></li><span data-dcnode-id="821" instrument_node=""> </span></ul><span data-dcnode-id="819" instrument_node=""> </span></div><span data-dcnode-id="817" instrument_node=""> </span></div><span data-dcnode-id="815" instrument_node=""> </span></div><span data-dcnode-id="813" instrument_node=""> </span><div class="article-content" data-dcnode-id="717"><span data-dcnode-id="812" instrument_node=""> </span><div class="section" data-dcnode-id="805"><span data-dcnode-id="811" instrument_node=""> </span><p data-dcnode-id="810"></p><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Instead of digging up the overgrown shrubs that seem to infest your garden, you can salvage them and reshape them into cozy plants again. You'll need to treat deciduous shrubs differently than evergreens. For instance, renewal pruning gets rid of the oldest branches to tame the look of deciduous shrubs and encourage new growth lower to the ground, but it doesn't suit evergreens. Though it may take several years to see well-groomed bushes again, careful pruning can shape your shrubs from a tangled mess of branches into plants that suit your garden space.</span></p><p data-dcnode-id="807"></p><span data-dcnode-id="806" instrument_node=""> </span></div><div class="mobile-only-min-height-250 ad-unit inline-ad" data-ad-unit-name="inline-mobile" data-dcnode-id="804"></div><span data-dcnode-id="803" instrument_node=""> </span><div class="desktop-only-min-height-280 ad-unit centered" data-ad-id="Leaf2" data-ad-unit-name="inline-desktop" data-dcnode-id="801" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="802" data-has-intersected="true" id="Leaf2"></div></div><span data-dcnode-id="800" instrument_node=""> </span><div class="section" data-dcnode-id="757"><h2 data-dcnode-id="797"><span data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Deciduous Shrubs</span></span></h2><span data-dcnode-id="796" instrument_node=""> </span><ol class="legacy-steps" data-dcnode-id="759"><span data-dcnode-id="795" instrument_node=""> </span><li data-dcnode-id="786"><span data-dcnode-id="794" instrument_node=""> </span><h4 class="step-header" data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">1.</span></h4><div data-dcnode-id="787"><span data-dcnode-id="791" instrument_node=""> </span><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Cut back one-third of the oldest, large branches that are close to the ground, leaving the branch collar -- the swollen area at the base of the branch -- when dealing with overgrown deciduous shrubs. This sparks new growth just below the pruning cuts, which should thicken the shrub at the ground level. Repeat this on one-third of the old branches every year.</span></p><span data-dcnode-id="788" instrument_node=""> </span></div></li><span data-dcnode-id="785" instrument_node=""> </span><div class="mobile-only-min-height-250 ad-unit inline-ad" data-ad-unit-name="partner-A300-mobile" data-dcnode-id="784"></div><span data-dcnode-id="783" instrument_node=""> </span><div class="desktop-only-min-height-90 ad-unit inline-ad" data-ad-id="Leaf3" data-ad-unit-name="lowline-desktop" data-dcnode-id="781" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="782" data-has-intersected="true" id="Leaf3"></div></div><span data-dcnode-id="780" instrument_node=""> </span><li data-dcnode-id="771"><span data-dcnode-id="779" instrument_node=""> </span><h4 class="step-header" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">2.</span></h4><div data-dcnode-id="772"><span data-dcnode-id="776" instrument_node=""> </span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Cut back the top and side shrub branches halfway with pruning shears, to reduce the size of the shrub without killing it.</span></p><span data-dcnode-id="773" instrument_node=""> </span></div></li><span data-dcnode-id="770" instrument_node=""> </span><li data-dcnode-id="761"><span data-dcnode-id="769" instrument_node=""> </span><h4 class="step-header" data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">3.</span></h4><div data-dcnode-id="762"><span data-dcnode-id="766" instrument_node=""> </span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Thin the branches all over the shrub each year, leaving the healthiest new shoots that at ground level. This encourages strong growth close to the ground, while the bushy tops and sides of the shrub gradually reduce their size with regular trims.</span></p><span data-dcnode-id="763" instrument_node=""> </span></div></li><span data-dcnode-id="760" instrument_node=""> </span></ol><span data-dcnode-id="758" instrument_node=""> </span></div><span data-dcnode-id="756" instrument_node=""> </span><div class="section" data-dcnode-id="718"><h2 data-dcnode-id="753"><span data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Evergreen Shrubs</span></span></h2><span data-dcnode-id="752" instrument_node=""> </span><ol class="legacy-steps" data-dcnode-id="720"><span data-dcnode-id="751" instrument_node=""> </span><li data-dcnode-id="742"><span data-dcnode-id="750" instrument_node=""> </span><h4 class="step-header" data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">1.</span></h4><div data-dcnode-id="743"><span data-dcnode-id="747" instrument_node=""> </span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Select a few large branches that you would like to remove from various parts of your evergreen shrub. To keep the shrub looking natural, choose branches with hidden bases in the center of the bush, so the pruning cuts don't show.</span></p><span data-dcnode-id="744" instrument_node=""> </span></div></li><span data-dcnode-id="741" instrument_node=""> </span><li data-dcnode-id="732"><span data-dcnode-id="740" instrument_node=""> </span><h4 class="step-header" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">2.</span></h4><div data-dcnode-id="733"><span data-dcnode-id="737" instrument_node=""> </span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Remove the selected branches at their bases using pruning shears, in March or April. This reduces the size of the overgrown evergreen shrub, instantly transforming it from wild to tame.</span></p><span data-dcnode-id="734" instrument_node=""> </span></div></li><span data-dcnode-id="731" instrument_node=""> </span><li data-dcnode-id="722"><span data-dcnode-id="730" instrument_node=""> </span><h4 class="step-header" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">3.</span></h4><div data-dcnode-id="723"><span data-dcnode-id="727" instrument_node=""> </span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Repeat the process each year if the shrub becomes overgrown again. Fortunately, evergreens do not readily grow new shoots from pruning cuts, so maintenance is much less work than with ever-growing deciduous shrubs.</span></p><span data-dcnode-id="724" instrument_node=""> </span></div></li><span data-dcnode-id="721" instrument_node=""> </span></ol><span data-dcnode-id="719" instrument_node=""> </span></div></div><span data-dcnode-id="716" instrument_node=""> </span><div class="min-height-250 ad-unit main-ad" data-ad-id="Leaf4" data-ad-unit-name="main" data-dcnode-id="714" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="715" data-has-intersected="true" id="Leaf4"></div></div><span data-dcnode-id="713" instrument_node=""> </span><div class="hst-exco-player pbs" data-dcn
