</span><article about="/publicworks/trees/plant-care" class="page full clearfix" data-dcnode-id="1729" data-history-node-id="714" role="article"><span data-dcnode-id="1739" instrument_node="">
</span><div class="content" data-dcnode-id="1731"><span data-dcnode-id="1738" instrument_node="">
</span><div class="field field--name-body field--type-text-with-summary field--label-hidden field--item" data-dcnode-id="1733"><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Trees are a great investment in your property and a source of pride and pleasure. Proper planting and maintenance are essential to protect your investment and make the most of the benefits of having trees.</span></p><span data-dcnode-id="1735" instrument_node="">

</span><div class="contentcolumntext" data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">
						
							For information about the benefits of trees; how to select, plant, and maintain trees, and additional information from the Fairfax County Tree Commission, download the Fairfax County Tree Basics booklet. The booklet is available in&nbsp;multiple languages.	
						</span></div><span data-dcnode-id="1703" instrument_node="">

</span><h2 data-dcnode-id="1683"><span data-dcnode-id="1687" instrument_node="">
</span><div class="field field--name-field-title field--type-string field--label-hidden field--item" data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Frequently Asked Questions</span></div><span data-dcnode-id="1684" instrument_node="">
</span></h2><span data-dcnode-id="1682" instrument_node="">
</span><div class="ui-accordion ui-widget ui-helper-reset" data-dcnode-id="1528" id="accordion_1875131044" role="tablist"><span data-dcnode-id="1681" instrument_node="">
</span><h3 aria-controls="ui-id-2" aria-expanded="false" aria-selected="false" class="ffx_background_paleblue ui-accordion-header ui-corner-top ui-state-default ui-accordion-header-collapsed ui-corner-all" data-dcnode-id="1679" id="ui-id-1" role="tab" tabindex="0"><span data-dcnode-id="1680" instrument_node="">Tree Selection: Where can I get advice about what to consider when selecting a tree to plant? Tree buying guidance? Information on Native Plants?</span></h3><span data-dcnode-id="1678" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ui-id-1" class="ui-accordion-content ui-corner-bottom ui-helper-reset ui-widget-content" data-dcnode-id="1670" id="ui-id-2" role="tabpanel" style="display: none;"><span data-dcnode-id="1677" instrument_node="">
</span><p data-dcnode-id="1672"><span data-dcnode-id="1676" instrument_node="">Visit&nbsp;</span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairfaxcounty.gov/publicworks/trees/selection" tabindex="-1" title="Visit Tree Selection"><span data-dcnode-id="1675" instrument_node="">Tree Selection</span></a><span data-dcnode-id="1673" instrument_node="">&nbsp;for information on what to consider when choosing a tree to get the right tree planted in the right place, buying guidance and information on native plants.</span></p><span data-dcnode-id="1671" instrument_node="">
</span></div><span data-dcnode-id="1669" instrument_node="">
</span><h3 aria-controls="ui-id-4" aria-expanded="false" aria-selected="false" class="ffx_background_paleblue ui-accordion-header ui-corner-top ui-accordion-header-collapsed ui-corner-all ui-state-default" data-dcnode-id="1667" id="ui-id-3" role="tab" tabindex="-1"><span data-dcnode-id="1668" instrument_node="">What is the proper way to plant a tree?</span></h3><span data-dcnode-id="1666" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ui-id-3" class="ui-accordion-content ui-corner-bottom ui-helper-reset ui-widget-content" data-dcnode-id="1637" id="ui-id-4" role="tabpanel" style="display: none;"><span data-dcnode-id="1665" instrument_node="">
</span><ul data-dcnode-id="1639"><span data-dcnode-id="1664" instrument_node="">
</span><li data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Place the tree in the prepared hole and ensure the tree is straight from all sides.Remember to remove all burlap, twine and the wire basket (if present) from the tree before planting.</span></li><span data-dcnode-id="1661" instrument_node="">
</span><li data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Gently backfill the hole while keeping the tree level. Pack soil firmly to eliminate air pockets which can dry out roots. If the tree is in an area where wind is a concern, staking may be necessary.</span></li><span data-dcnode-id="1658" instrument_node="">
</span><li data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Provide a 2"-4" layer of mulch around the base of the tree, taking care to avoid packing mulch against the trunk.</span></li><span data-dcnode-id="1655" instrument_node="">
</span><li data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Water the tree at least weekly - more frequently in extremely hot temperatures.</span></li><span data-dcnode-id="1652" instrument_node="">
</span><li data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Watch the tree for signs of stress such as browning or wilting leaves or; if the tree exhibits signs of stress, contact your retailer or a certified arborist.</span></li><span data-dcnode-id="1649" instrument_node="">
</span><li data-dcnode-id="1641"><span data-dcnode-id="1648" instrument_node="">For additional information on proper tree planting techniques, visit </span><a data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dof.virginia.gov/tree/care/how-to-plant.htm" target="_blank"><span data-dcnode-id="1647" instrument_node=""> Virginia Department of Forestry, How to Plant A Tree</span></a><span data-dcnode-id="1645" instrument_node=""> or </span><a data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fs.usda.gov/Internet/FSE_DOCUMENTS/stelprdb5368392.pdf" target="_blank"><span data-dcnode-id="1644" instrument_node=""> Virginia Department of Agriculture, Forest Service, Tree Owners Manual</span></a><span data-dcnode-id="1642" instrument_node="">.</span></li><span data-dcnode-id="1640" instrument_node="">
</span></ul><span data-dcnode-id="1638" instrument_node="">
</span></div><span data-dcnode-id="1636" instrument_node="">
</span><h3 aria-controls="ui-id-6" aria-expanded="false" aria-selected="false" class="ffx_background_paleblue ui-accordion-header ui-corner-top ui-accordion-header-collapsed ui-corner-all ui-state-default" data-dcnode-id="1634" id="ui-id-5" role="tab" tabindex="-1"><span data-dcnode-id="1635" instrument_node="">How should I prune my trees?</span></h3><span data-dcnode-id="1633" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ui-id-5" class="ui-accordion-content ui-corner-bottom ui-helper-reset ui-widget-content" data-dcnode-id="1625" id="ui-id-6" role="tabpanel" style="display: none;"><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1631" instrument_node="">Using proper pruning techniques is extremely important to the long-term health and viability of trees. Always use clean, sharp tools when making cuts. Pruning is best accomplished during the tree's dormant season before new growth begins. Pruning of young trees should be aimed at establishing a healthy growth pattern for the new tree. Pruning of mature trees is best limited to removal of dead or hazardous limbs. Topping a tree is NOT proper pruning, and is not conducive to the long-term health of the tree. See below for information on why topping is bad for a tree. For more information on how to properly prune a tree, you may also visit the </span><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dof.virginia.gov/tree/care/how-to-prune.htm"><span data-dcnode-id="1630" instrument_node="">Virginia Department of Forestry</span></a><span data-dcnode-id="1628" instrument_node="">.</span></p><span data-dcnode-id="1626" instrument_node="">
</span></div><span data-dcnode-id="1624" instrument_node="">
</span><h3 aria-controls="ui-id-8" aria-expanded="false" aria-selected="false" class="ffx_background_paleblue ui-accordion-header ui-corner-top ui-accordion-header-collapsed ui-corner-all ui-state-default" data-dcnode-id="1622" id="ui-id-7" role="tab" tabindex="-1"><span data-dcnode-id="1623" instrument_node="">Why does the pruning practice of "topping" hurt trees?</span></h3><span data-dcnode-id="1621" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ui-id-7" class="ui-accordion-content ui-corner-bottom ui-helper-reset ui-widget-content" data-dcnode-id="1608" id="ui-id-8" role="tabpanel" style="display: none;"><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1617"><img alt="topping trees creates hazards" data-align="right" data-dcnode-id="1619" data-entity-type="" data-entity-uuid="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairfaxcounty.gov/publicworks/sites/publicworks/files/Assets/images/Trees/topping-trees-creates-hazards.jpg&amp;raw"><span data-dcnode-id="1618" instrument_node="">"Topping" of trees is perhaps the most harmful pruning practice known. By removing a large portion of the tree's upper leaves, new problems can be created. Topped trees are more likely to suffer from stress and become vulnerable to sun damage, insects, disease and storms. If you have a tree that has grown too large, there are ways to correctly prune to reduce the tree crown without damaging the health of the tree. The rapid re-growth of shoots on a topped tree is an indication of stress and a weakened state of health. For appropriate methods to reduce the height or spread of a tree, an arborist can determine the best approach to pruning to preserve the tree's natural beauty, health and safety for the surrounding environment.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1613" instrument_node="">Download </span><a data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairfaxcounty.gov/publicworks/sites/publicworks/files/Assets/documents/PDF/publications/topping-trees-creates-hazards.pdf" title="Download Topping Trees Creates Hazards"><span data-dcnode-id="1612" instrument_node="">Topping Trees Creates Hazards</span></a></p><span data-dcnode-id="1609" instrument_node="">
</span></div><span data-dcnode-id="1607" instrument_node="">
</span><h3 aria-controls="ui-id-10" aria-expanded="false" aria-selected="false" class="ffx_background_paleblue ui-accordion-header ui-corner-top ui-accordion-header-collapsed ui-corner-all ui-state-default" data-dcnode-id="1605" id="ui-id-9" role="tab" tabindex="-1"><span data-dcnode-id="1606" instrument_node="">How can I manage trees and turf and promote the continued health of both?</span></h3><span data-dcnode-id="1604" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ui-id-9" class="ui-accordion-content ui-corner-bottom ui-helper-reset ui-widget-content" data-dcnode-id="1587" id="ui-id-10" role="tabpanel" style="display: none;"><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1601"><img alt="grass vs mulch root structure" data-align="right" data-caption="Root profiles of sugar maples (Acer saccharum) growing in similar soils with grass competition and in a naturally mulched woodland area." data-dcnode-id="1602" data-entity-type="" data-entity-uuid="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairfaxcounty.gov/publicworks/sites/publicworks/files/Assets/images/Trees/grass-vs-mulch.JPG&amp;raw"></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Trees and grass are healthier when they are not forced to compete with each other. Both provide benefits to the environment, but when placed next to each other can result in problems to both species. Grass at the base of a tree is often weak and thin. The shade provided by the tree is not suitable for many types of grasses. In addition, the roots of the tree, which are closer to the surface, can disrupt the growth pattern of grasses. In return, grasses take away many nutrients and much needed moisture, causing trees to weaken and produce poor growth. Trees may also be damaged by lawn equipment, causing wounds that allow disease and insects a point of entry. The best approach is generally to allow a mulched area around the perimeter of the drip line of the tree. This keeps grass from competing with the tree for vital nutrients and moisture and reduces likelihood of damage to both species.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1596" instrument_node="">Download </span><a data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairfaxcounty.gov/publicworks/sites/publicworks/files/Assets/documents/PDF/publications/Tree-vs-Lawn.pdf" title="Download document"><span data-dcnode-id="1595" instrument_node="">Tree vs. Lawn: Uneasy Coexistence by Gary Watson</span></a></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1589"><i data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Picture: Root profiles of sugar maples (Acer saccharum) growing in similar soils with grass competition and in a naturally mulched woodland area.</span></i></p><span data-dcnode-id="1588" instrument_node="">
</span></div><span data-dcnode-id="1586" instrument_node="">
</span><h3 aria-controls="ui-id-12" aria-expanded="false" aria-selected="false" class="ffx_background_paleblue ui-accordion-header ui-corner-top ui-accordion-header-collapsed ui-corner-all ui-state-default" data-dcnode-id="1584" id="ui-id-11" role="tab" tabindex="-1"><span data-dcnode-id="1585" instrument_node="">Why is proper mulching of trees important and what are the proper techniques?</span></h3><span data-dcnode-id="1583" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ui-id-11" class="ui-accordion-content ui-corner-bottom ui-helper-reset ui-widget-content" data-dcnode-id="1566" id="ui-id-12" role="tabpanel" style="display: none;"><span data-dcnode-id="1582" instrument_node="">
</span><div class="img-50percent-right" data-dcnode-id="1580"><img alt="Mulch volcanoes" data-align="right" data-caption="<em>'Volcano mulching' can harm the tree trunk, and may cover extra soil that has been piled around the trunk after planting. Mulch should be no more than 3-4 inches deep. </em>" data-dcnode-id="1581" data-entity-type="" data-entity-uuid="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairfaxcounty.gov/publicworks/sites/publicworks/files/Assets/images/Trees/mulch-volcanoes.JPG&amp;raw"></div><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Proper mulching helps maintain moisture in dry summer months, reduces weeds that draw away necessary nutrients, acts as an insulation against extreme heat and cold, and provides an aesthetically pleasing base for landscaping. Improper mulching, however, can be the cause of stress and decline in a tree. For instance, mulch that is too deep and piled high against the trunk of a tree may actually prevent the tree from receiving adequate amounts of oxygen and water, cause excessive moisture to be retained causing roots to rot, and may harbor insects and other pests. Mulch should generally be applied in a 2"-4" layer around the base of the tree, extending outward towards the dripline. Avoid mulching directly against the base of the tree; allow several inches between the base of the tree and the surrounding mulch. Whenever possible, use organic mulches to provide beneficial nutrients.</span></p><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1575" instrument_node="">Download </span><a data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairfaxcounty.gov/publicworks/sites/publicworks/files/Assets/documents/PDF/publications/Tree-vs-Lawn.pdf" title="Download document"><span data-dcnode-id="1574" instrument_node="">Tree vs. Lawn: Uneasy Coexistence by Gary Watson</span></a></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1568"><i data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">'Volcano mulching' can harm the tree trunk, and may cover extra soil that has been piled around the trunk after planting. Mulch should be no more than 3-4 inches deep.</span></i></p><span data-dcnode-id="1567" instrument_node="">
</span></div><span data-dcnode-id="1565" instrument_node="">
</span><h3 aria-controls="ui-id-14" aria-expanded="false" aria-selected="false" class="ffx_background_paleblue ui-accordion-header ui-corner-top ui-accordion-header-collapsed ui-corner-all ui-state-default" data-dcnode-id="1563" id="ui-id-13" role="tab" tabindex="-1"><span data-dcnode-id="1564" instrument_node="">My tree looks stressed and strange; what's wrong with it?</span></h3><span data-dcnode-id="1562" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ui-id-13" class="ui-accordion-content ui-corner-bottom ui-helper-reset ui-widget-content" data-dcnode-id="1554" id="ui-id-14" role="tabpanel" style="display: none;"><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1556"><span data-dcnode-id="1560" instrument_node="">A healthy tree has many built-in methods of resisting normal insect and disease invasions. A tree may become stressed from physical changes in the root zone or from other environmental factors that affect the basic requirements of the tree, including light, oxygen to the roots, water and the balance of essential nutrients. A stressed tree then becomes more vulnerable and unable to sustain the needed resistance to insect and disease invasion. Identifying causes of tree stress and mitigating them early can help a tree to resist or fight harmful agents. A certified tree professional can identify causes of stress and make recommendations to mitigate the stressful situation, and detail any treatments. For more information on identifying common insect and disease symptoms in trees visit the </span><a data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dof.virginia.gov/health/index.htm"><span data-dcnode-id="1559" instrument_node="">Virginia Department of Forestry</span></a><span data-dcnode-id="1557" instrument_node="">.</span></p><span data-dcnode-id="1555" instrument_node="">
</span></div><span data-dcnode-id="1553" instrument_node="">
</span><h3 aria-controls="ui-id-16" aria-expanded="false" aria-selected="false" class="ffx_background_paleblue ui-accordion-header ui-corner-top ui-accordion-header-collapsed ui-corner-all ui-state-default" data-dcnode-id="1551" id="ui-id-15" role="tab" tabindex="-1"><span data-dcnode-id="1552" instrument_node="">What are the signs of a hazardous tree?</span></h3><span data-dcnode-id="1550" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ui-id-15" class="ui-accordion-content ui-corner-bottom ui-helper-reset ui-widget-content" data-dcnode-id="1542" id="ui-id-16" role="tabpanel" style="display: none;"><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1548" instrument_node="">A hazardous tree is a tree, or a portion of a tree, that is in danger of falling and presents a threat to life or property. Find out more about the signs of a hazardous tree and information about pruning and removal at&nbsp;</span><a data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairfaxcounty.gov/publicworks/trees/removal" tabindex="-1" title="Visit Tree Removal"><span data-dcnode-id="1547" instrument_node="">Tree Removal</span></a><span data-dcnode-id="1545" instrument_node="">.</span></p><span data-dcnode-id="1543" instrument_node="">
</span></div><span data-dcnode-id="1541" instrument_node="">

</span><p data-dcnode-id="1532"><span data-dcnode-id="1536" instrument_node="">Visit Fairfax County's </span><a data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairfaxcounty.gov/wildlife/deer-management-program" title="Visit Deer Management Program"><span data-dcnode-id="1535" instrument_node="">Deer Management Program</span></a><span data-dcnode-id="1533" instrument_node=""> for information about how deer populations are being managed in Fairfax County and what you can do to humanely exclude or deter deer on your property.&nbsp;</span></p><span data-dcnode-id="1531" instrument_node="">
