</span><ul data-dcnode-id="3157"><li data-dcnode-id="3287"><b data-dcnode-id="3289"><a data-dcnode-id="3290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Habitat" title="Habitat"><span data-dcnode-id="3291" instrument_node="">habitat</span></a></b><span data-dcnode-id="3288" instrument_node=""> - an ecological or environmental area that is inhabited by a particular species.</span></li><span data-dcnode-id="3286" instrument_node="">
</span><li data-dcnode-id="3281"><b data-dcnode-id="3283"><a class="new" data-dcnode-id="3284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHard_waste%26action%3Dedit%26redlink%3D1" title="Hard waste (page does not exist)"><span data-dcnode-id="3285" instrument_node="">hard waste</span></a></b><span data-dcnode-id="3282" instrument_node=""> - household garbage which is not normally accepted into rubbish bins by local councils, e.g. old stoves, mattresses.</span></li><span data-dcnode-id="3280" instrument_node="">
</span><li data-dcnode-id="3275"><b data-dcnode-id="3277"><a data-dcnode-id="3278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heat" title="Heat"><span data-dcnode-id="3279" instrument_node="">heat</span></a></b><span data-dcnode-id="3276" instrument_node="">– energy derived from the motion of molecules; a form of energy into which all other forms of energy may be degraded.</span></li><span data-dcnode-id="3274" instrument_node="">
</span><li data-dcnode-id="3269"><b data-dcnode-id="3271"><a data-dcnode-id="3272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herbicide" title="Herbicide"><span data-dcnode-id="3273" instrument_node="">herbicide</span></a></b><span data-dcnode-id="3270" instrument_node=""> – a chemical the kills or inhibits growth of a plant.</span></li><span data-dcnode-id="3268" instrument_node="">
</span><li data-dcnode-id="3260"><b data-dcnode-id="3265"><a class="mw-redirect" data-dcnode-id="3266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herbivory" title="Herbivory"><span data-dcnode-id="3267" instrument_node="">herbivory</span></a></b><span data-dcnode-id="3264" instrument_node=""> - predation in which an organism known as an herbivore, consumes principally </span><a data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autotroph" title="Autotroph"><span data-dcnode-id="3263" instrument_node="">autotrophs</span></a><span data-dcnode-id="3261" instrument_node=""> such as plants, algae and photosynthesizing bacteria.</span></li><span data-dcnode-id="3259" instrument_node="">
</span><li data-dcnode-id="3254"><b data-dcnode-id="3256"><a data-dcnode-id="3257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heterotroph" title="Heterotroph"><span data-dcnode-id="3258" instrument_node="">heterotroph</span></a></b><span data-dcnode-id="3255" instrument_node=""> (chemoorganotrophy) - an organism that requires organic substrates to obtain its carbon for growth and development.</span></li><span data-dcnode-id="3253" instrument_node="">
</span><li data-dcnode-id="3248"><b data-dcnode-id="3250"><a data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hierarchy" title="Hierarchy"><span data-dcnode-id="3252" instrument_node="">hierarchy</span></a></b><span data-dcnode-id="3249" instrument_node=""> – an organisation of parts in which control from the top (generally with few parts), proceeds through a series of levels (ranks) to the bottom (generally of many parts) cf. heterarchy.</span></li><span data-dcnode-id="3247" instrument_node="">
</span><li data-dcnode-id="3242"><b data-dcnode-id="3244"><a data-dcnode-id="3245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/High-density_polyethylene" title="High-density polyethylene"><span data-dcnode-id="3246" instrument_node="">high-density polyethylene</span></a></b><span data-dcnode-id="3243" instrument_node=""> (HDPE) - A member of the polyethylene family of plastics and is used to make products such as milk bottles, pipes and shopping bags. HDPE may be coloured or opaque.</span></li><span data-dcnode-id="3241" instrument_node="">
</span><li data-dcnode-id="3236"><b data-dcnode-id="3238"><a class="new" data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHomoclime%26action%3Dedit%26redlink%3D1" title="Homoclime (page does not exist)"><span data-dcnode-id="3240" instrument_node="">homoclime</span></a></b><span data-dcnode-id="3237" instrument_node=""> – a region with the same climate as the one under investigation.</span></li><span data-dcnode-id="3235" instrument_node="">
</span><li data-dcnode-id="3230"><b data-dcnode-id="3232"><a data-dcnode-id="3233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Horsepower" title="Horsepower"><span data-dcnode-id="3234" instrument_node="">horsepower</span></a></b><span data-dcnode-id="3231" instrument_node=""> (hp) = 745.7 watts.</span></li><span data-dcnode-id="3229" instrument_node="">
</span><li data-dcnode-id="3224"><b data-dcnode-id="3226"><a data-dcnode-id="3227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homeostasis" title="Homeostasis"><span data-dcnode-id="3228" instrument_node="">homeostasis</span></a></b><span data-dcnode-id="3225" instrument_node=""> - the property of either an open system or a closed system, especially a living organism, that regulates its internal environment so as to maintain a stable, constant condition.</span></li><span data-dcnode-id="3223" instrument_node="">
</span><li data-dcnode-id="3212"><b data-dcnode-id="3220"><a data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Horton_overland_flow" title="Horton overland flow"><span data-dcnode-id="3222" instrument_node="">Horton overland flow</span></a></b><span data-dcnode-id="3219" instrument_node=""> - the tendency of water to flow horizontally across land surfaces when rainfall has exceeded </span><a class="mw-redirect" data-dcnode-id="3217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infiltration_capacity" title="Infiltration capacity"><span data-dcnode-id="3218" instrument_node="">infiltration capacity</span></a><span data-dcnode-id="3216" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Depression_storage_capacity" title="Depression storage capacity"><span data-dcnode-id="3215" instrument_node="">depression storage capacity</span></a><span data-dcnode-id="3213" instrument_node="">.</span></li><span data-dcnode-id="3211" instrument_node="">
</span><li data-dcnode-id="3206"><b data-dcnode-id="3208"><a class="new" data-dcnode-id="3209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHouse_energy%26action%3Dedit%26redlink%3D1" title="House energy (page does not exist)"><span data-dcnode-id="3210" instrument_node="">house energy</span></a></b><span data-dcnode-id="3207" instrument_node=""> rating - an assessment of the energy efficiency of residential house or unit designs using a 5 star scale.</span></li><span data-dcnode-id="3205" instrument_node="">
</span><li data-dcnode-id="3200"><b data-dcnode-id="3202"><a class="new" data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHousehold_metabolism%26action%3Dedit%26redlink%3D1" title="Household metabolism (page does not exist)"><span data-dcnode-id="3204" instrument_node="">household metabolism</span></a></b><span data-dcnode-id="3201" instrument_node=""> - the passage of food, energy, water, goods, and waste through the household unit in a similar way to the metabolic activity of an organism cf. industrial metabolism.</span></li><span data-dcnode-id="3199" instrument_node="">
</span><li data-dcnode-id="3194"><b data-dcnode-id="3196"><a data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Humus" title="Humus"><span data-dcnode-id="3198" instrument_node="">humus</span></a></b><span data-dcnode-id="3195" instrument_node=""> - organic material in soil lending it a bark brown or black colouration.</span></li><span data-dcnode-id="3193" instrument_node="">
</span><li data-dcnode-id="3188"><b data-dcnode-id="3190"><a data-dcnode-id="3191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_equivalent" title="Human equivalent"><span data-dcnode-id="3192" instrument_node="">human equivalent</span></a></b><span data-dcnode-id="3189" instrument_node=""> (He) - the approximate human daily energy requirement of 12,500 kJ or its approximate energy generating capacity at basal metabolic rate which is equivalent to about 80 watts (3.47222kWh/day). A 100 watt light bulb therefore runs at 1.25 He.</span></li><span data-dcnode-id="3187" instrument_node="">
</span><li data-dcnode-id="3182"><b data-dcnode-id="3184"><a data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Humus" title="Humus"><span data-dcnode-id="3186" instrument_node="">humus</span></a></b><span data-dcnode-id="3183" instrument_node=""> – semi-persistent organic matter in the soil that can no longer be recognised as tissue.</span></li><span data-dcnode-id="3181" instrument_node="">
</span><li data-dcnode-id="3176"><b data-dcnode-id="3178"><a class="mw-redirect" data-dcnode-id="3179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydrocarbons" title="Hydrocarbons"><span data-dcnode-id="3180" instrument_node="">hydrocarbons</span></a></b><span data-dcnode-id="3177" instrument_node=""> - chemicals made up of carbon and hydrogen that are found in raw materials such as petroleum, coal and natural gas, and derived products such as plastics.</span></li><span data-dcnode-id="3175" instrument_node="">
</span><li data-dcnode-id="3170"><b data-dcnode-id="3172"><a class="mw-redirect" data-dcnode-id="3173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydroelectric_power" title="Hydroelectric power"><span data-dcnode-id="3174" instrument_node="">hydroelectric power</span></a></b><span data-dcnode-id="3171" instrument_node=""> - the electrical power generated using the power of falling water.</span></li><span data-dcnode-id="3169" instrument_node="">
</span><li data-dcnode-id="3164"><b data-dcnode-id="3166"><a class="mw-redirect" data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydrological_cycle" title="Hydrological cycle"><span data-dcnode-id="3168" instrument_node="">hydrological cycle</span></a></b><span data-dcnode-id="3165" instrument_node=""> (water cycle) -  the natural cycle of water from evaporation, transpiration in the atmosphere, condensation (rain and snow), and flows back to the ocean (e.g. rivers).</span></li><span data-dcnode-id="3163" instrument_node="">
</span><li data-dcnode-id="3158"><b data-dcnode-id="3160"><a data-dcnode-id="3161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydrosphere" title="Hydrosphere"><span data-dcnode-id="3162" instrument_node="">hydrosphere</span></a></b><span data-dcnode-id="3159" instrument_node=""> - all the Earth's water; this would include water found in the sea, streams, lakes and other waterbodies, the soil, groundwater, and in the air.</span></li></ul><span data-dcnode-id="3156" instrument_node="">
</span><h2 data-dcnode-id="3146"><span class="mw-headline" data-dcnode-id="3154" id="I"><span data-dcnode-id="3155" instrument_node="">I</span></span><span class="mw-editsection" data-dcnode-id="3147"><span class="mw-editsection-bracket" data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">[</span></span><a data-dcnode-id="3150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D10" title="Edit section: I"><span data-dcnode-id="3151" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3145" instrument_node="">
</span><ul data-dcnode-id="3001"><li data-dcnode-id="3140"><b data-dcnode-id="3142"><a data-dcnode-id="3143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Incineration" title="Incineration"><span data-dcnode-id="3144" instrument_node="">incineration</span></a></b><span data-dcnode-id="3141" instrument_node=""> - combustion (by chemical oxidation) of waste material to treat or dispose of that waste material.</span></li><span data-dcnode-id="3139" instrument_node="">
</span><li data-dcnode-id="3134"><b data-dcnode-id="3136"><a class="mw-redirect" data-dcnode-id="3137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indicator_species" title="Indicator species"><span data-dcnode-id="3138" instrument_node="">indicator species</span></a></b><span data-dcnode-id="3135" instrument_node=""> - any biological species that defines a trait or characteristic of the environment.</span></li><span data-dcnode-id="3133" instrument_node="">
</span><li data-dcnode-id="3128"><b data-dcnode-id="3130"><a data-dcnode-id="3131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_agriculture" title="Industrial agriculture"><span data-dcnode-id="3132" instrument_node="">industrial agriculture</span></a></b><span data-dcnode-id="3129" instrument_node=""> - a form of modern farming that involves industrialized production of livestock, poultry, fish, and crops.</span></li><span data-dcnode-id="3127" instrument_node="">
</span><li data-dcnode-id="3122"><b data-dcnode-id="3124"><a data-dcnode-id="3125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_Revolution" title="Industrial Revolution"><span data-dcnode-id="3126" instrument_node="">Industrial Revolution</span></a></b><span data-dcnode-id="3123" instrument_node=""> - a period in the late 18th and early 19th centuries when major changes in agriculture, manufacturing, and transportation had a profound effect on socioeconomic and cultural conditions.</span></li><span data-dcnode-id="3121" instrument_node="">
</span><li data-dcnode-id="3116"><b data-dcnode-id="3118"><a data-dcnode-id="3119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infiltration_%28hydrology%29" title="Infiltration (hydrology)"><span data-dcnode-id="3120" instrument_node="">infiltration</span></a></b><span data-dcnode-id="3117" instrument_node=""> – movement of water below topsoil to the plant roots and below.</span></li><span data-dcnode-id="3115" instrument_node="">
</span><li data-dcnode-id="3110"><b data-dcnode-id="3112"><a data-dcnode-id="3113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infiltration_%28hydrology%29" title="Infiltration (hydrology)"><span data-dcnode-id="3114" instrument_node="">infiltration</span></a></b><span data-dcnode-id="3111" instrument_node=""> - the process by which water on the ground surface enters the soil.</span></li><span data-dcnode-id="3109" instrument_node="">
</span><li data-dcnode-id="3104"><b data-dcnode-id="3106"><a data-dcnode-id="3107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_indicator" title="Environmental indicator"><span data-dcnode-id="3108" instrument_node="">indicators</span></a></b><span data-dcnode-id="3105" instrument_node="">– quantitative markers for monitoring progress towards desired goals.</span></li><span data-dcnode-id="3103" instrument_node="">
</span><li data-dcnode-id="3089"><b data-dcnode-id="3100"><a data-dcnode-id="3101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_ecology" title="Industrial ecology"><span data-dcnode-id="3102" instrument_node="">industrial ecology</span></a></b><span data-dcnode-id="3099" instrument_node=""> (term int. Harry Zvi Evan 1973) - the observation that nature produces no waste and therefore provides an example of sustainable waste management. Natural Capitalism espouses industrial ecology as one of its four pillars together with energy conservation, material conservation, and redefinition of commodity markets and product stewardship in terms of a service economy. Publications:</span><sup class="reference" data-dcnode-id="3096" id="cite_ref-7"><a data-dcnode-id="3097" href="#cite_note-7"><span data-dcnode-id="3098" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="3093" id="cite_ref-8"><a data-dcnode-id="3094" href="#cite_note-8"><span data-dcnode-id="3095" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="3090" id="cite_ref-9"><a data-dcnode-id="3091" href="#cite_note-9"><span data-dcnode-id="3092" instrument_node="">[9]</span></a></sup></li><span data-dcnode-id="3088" instrument_node="">
</span><li data-dcnode-id="3083"><b data-dcnode-id="3085"><a data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Insecticide" title="Insecticide"><span data-dcnode-id="3087" instrument_node="">insecticide</span></a></b><span data-dcnode-id="3084" instrument_node=""> - a pesticide used to control insects in all developmental forms.</span></li><span data-dcnode-id="3082" instrument_node="">
</span><li data-dcnode-id="3077"><b data-dcnode-id="3079"><a class="mw-redirect" data-dcnode-id="3080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Integrated_Pest_Management" title="Integrated Pest Management"><span data-dcnode-id="3081" instrument_node="">Integrated Pest Management</span></a></b><span data-dcnode-id="3078" instrument_node=""> (IPM) - a pest control strategy that uses an array of complementary methods: natural predators and parasites, pest-resistant varieties, cultural practices, biological controls, various physical techniques, and the strategic use of pesticides.</span></li><span data-dcnode-id="3076" instrument_node="">
</span><li data-dcnode-id="3071"><b data-dcnode-id="3073"><a data-dcnode-id="3074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intercropping" title="Intercropping"><span data-dcnode-id="3075" instrument_node="">intercropping</span></a></b><span data-dcnode-id="3072" instrument_node=""> - the agricultural practice of cultivating two or more crops in the same space at the same time.</span></li><span data-dcnode-id="3070" instrument_node="">
</span><li data-dcnode-id="3065"><b data-dcnode-id="3067"><a class="new" data-dcnode-id="3068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIn-stream%26action%3Dedit%26redlink%3D1" title="In-stream (page does not exist)"><span data-dcnode-id="3069" instrument_node="">in-stream</span></a></b><span data-dcnode-id="3066" instrument_node="">  - the use of freshwater where it occurs, usually within a river or stream: it includes hydroelectricity, recreation, tourism, scientific and cultural uses, ecosystem maintenance, and dilution of waste.</span></li><span data-dcnode-id="3064" instrument_node="">
</span><li data-dcnode-id="3059"><b data-dcnode-id="3061"><a data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Integrated_pest_management" title="Integrated pest management"><span data-dcnode-id="3063" instrument_node="">integrated pest management</span></a></b><span data-dcnode-id="3060" instrument_node="">   (IPM) – pest management that attempts to minimise chemical use by using several pest control options in combination. The goal of IPM is not to eliminate all pests but to reduce pest populations to acceptable levels; an ecologically based pest control strategy that relies heavily on natural mortality factors and seeks out control tactics that disrupt these factors as little as possible.</span></li><span data-dcnode-id="3058" instrument_node="">
</span><li data-dcnode-id="3053"><b data-dcnode-id="3055"><a class="new" data-dcnode-id="3056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIntegrated_product_life-cycle_management%26action%3Dedit%26redlink%3D1" title="Integrated product life-cycle management (page does not exist)"><span data-dcnode-id="3057" instrument_node="">integrated product life-cycle management</span></a></b><span data-dcnode-id="3054" instrument_node="">  - management of all phases of goods and services to be environmentally friendly and sustainable.</span></li><span data-dcnode-id="3052" instrument_node="">
</span><li data-dcnode-id="3047"><b data-dcnode-id="3049"><a class="mw-redirect" data-dcnode-id="3050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inter-generational_equity" title="Inter-generational equity"><span data-dcnode-id="3051" instrument_node="">inter-generational equity</span></a></b><span data-dcnode-id="3048" instrument_node=""> – the intention to leave the world in the best possible condition for future generations.</span></li><span data-dcnode-id="3046" instrument_node="">
</span><li data-dcnode-id="3038"><b data-dcnode-id="3043"><a data-dcnode-id="3044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intergovernmental_Panel_on_Climate_Change" title="Intergovernmental Panel on Climate Change"><span data-dcnode-id="3045" instrument_node="">Intergovernmental Panel on Climate Change</span></a></b><span data-dcnode-id="3042" instrument_node=""> (IPCC) - the IPCC was established in 1988 by the World Meteorological Organization and the UN Environment Programme to provide the scientific and technical foundation for the United Nations Framework Convention on Climate Change (UNFCCC), primarily through the publication of periodic assessment reports.</span><sup class="reference" data-dcnode-id="3039" id="cite_ref-10"><a data-dcnode-id="3040" href="#cite_note-10"><span data-dcnode-id="3041" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="3037" instrument_node="">
</span><li data-dcnode-id="3032"><b data-dcnode-id="3034"><a class="mw-redirect" data-dcnode-id="3035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internal_water_footprint" title="Internal water footprint"><span data-dcnode-id="3036" instrument_node="">internal water footprint</span></a></b><span data-dcnode-id="3033" instrument_node=""> – the water embodied in goods produced within a country (although these may be subsequently exported) cf. external water footprint.</span></li><span data-dcnode-id="3031" instrument_node="">
</span><li data-dcnode-id="3026"><b data-dcnode-id="3028"><a data-dcnode-id="3029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intrinsic_theory_of_value" title="Intrinsic theory of value"><span data-dcnode-id="3030" instrument_node="">intrinsic value</span></a></b><span data-dcnode-id="3027" instrument_node=""> – the value of something that is independent of its utility.</span></li><span data-dcnode-id="3025" instrument_node="">
</span><li data-dcnode-id="3020"><b data-dcnode-id="3022"><a class="new" data-dcnode-id="3023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIrrigation_index%26action%3Dedit%26redlink%3D1" title="Irrigation index (page does not exist)"><span data-dcnode-id="3024" instrument_node="">irrigation index</span></a></b><span data-dcnode-id="3021" instrument_node=""> – an efficiency indicator showing degree of match between applied and used water. Ideal rating = 1, an Ii of 1.5 means an oversupply of water by 50%.</span></li><span data-dcnode-id="3019" instrument_node="">
</span><li data-dcnode-id="3014"><b data-dcnode-id="3016"><a data-dcnode-id="3017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irrigation_scheduling" title="Irrigation scheduling"><span data-dcnode-id="3018" instrument_node="">irrigation scheduling</span></a></b><span data-dcnode-id="3015" instrument_node=""> – watering plants according to their needs.</span></li><span data-dcnode-id="3013" instrument_node="">
</span><li data-dcnode-id="3008"><b data-dcnode-id="3010"><a data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irrigation" title="Irrigation"><span data-dcnode-id="3012" instrument_node="">irrigation</span></a></b><span data-dcnode-id="3009" instrument_node=""> – important component for agriculture developed across cultures.</span></li><span data-dcnode-id="3007" instrument_node="">
</span><li data-dcnode-id="3002"><b data-dcnode-id="3004"><a class="mw-redirect" data-dcnode-id="3005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ISO_14001" title="ISO 14001"><span data-dcnode-id="3006" instrument_node="">ISO 14001</span></a></b><span data-dcnode-id="3003" instrument_node="">- The international standard for companies seeking to certify their environmental management system. International Organization for Standardization (ISO) 14001 standard was first published in 1996 specifying the requirements for an environmental management system in organization (companies and institutions) with the goal of minimizing harmful effects on the environment and the goal of continual improvement of environmental performance.</span></li></ul><span data-dcnode-id="3000" instrument_node="">
</span><h2 data-dcnode-id="2990"><span class="mw-headline" data-dcnode-id="2998" id="J"><span data-dcnode-id="2999" instrument_node="">J</span></span><span class="mw-editsection" data-dcnode-id="2991"><span class="mw-editsection-bracket" data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">[</span></span><a data-dcnode-id="2994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D11" title="Edit section: J"><span data-dcnode-id="2995" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2989" instrument_node="">
</span><ul data-dcnode-id="2983"><li data-dcnode-id="2984"><b data-dcnode-id="2986"><a data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joule" title="Joule"><span data-dcnode-id="2988" instrument_node="">joule</span></a></b><span data-dcnode-id="2985" instrument_node=""> (J)–  the basic unit of energy; the equivalent of 1 watt of power radiated or dissipated for 1 second. Natural gas consumption is usually measured in megajoules (MJ), where 1 MJ = 1, 000,000 J. On large accounts it may be measured in gigajoules (GJ), where 1 GJ = 1 000,000,000 J.</span></li></ul><span data-dcnode-id="2982" instrument_node="">
</span><h2 data-dcnode-id="2972"><span class="mw-headline" data-dcnode-id="2980" id="K"><span data-dcnode-id="2981" instrument_node="">K</span></span><span class="mw-editsection" data-dcnode-id="2973"><span class="mw-editsection-bracket" data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">[</span></span><a data-dcnode-id="2976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D12" title="Edit section: K"><span data-dcnode-id="2977" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2971" instrument_node="">
</span><ul data-dcnode-id="2953"><li data-dcnode-id="2966"><b data-dcnode-id="2968"><a data-dcnode-id="2969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kerbside_collection" title="Kerbside collection"><span data-dcnode-id="2970" instrument_node="">kerbside collection</span></a></b><span data-dcnode-id="2967" instrument_node=""> - collection of household recyclable materials (separated or co-mingled)  that are left at the kerbside for collection by local council services.</span></li><span data-dcnode-id="2965" instrument_node="">
</span><li data-dcnode-id="2960"><b data-dcnode-id="2962"><a data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keystone_species" title="Keystone species"><span data-dcnode-id="2964" instrument_node="">keystone species</span></a></b><span data-dcnode-id="2961" instrument_node=""> - a species that has a disproportionate effect on its environment relative to its abundance, affecting many other organisms in an ecosystem and help in determine the types and numbers of various others species in a community.</span></li><span data-dcnode-id="2959" instrument_node="">
</span><li data-dcnode-id="2954"><b data-dcnode-id="2956"><a data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyoto_Protocol" title="Kyoto Protocol"><span data-dcnode-id="2958" instrument_node="">Kyoto Protocol</span></a></b><span data-dcnode-id="2955" instrument_node=""> - an international agreement adopted in December 1997 in Kyoto, Japan. The Protocol sets binding emission targets for developed countries that would reduce their emissions on average 5.2 percent below 1990 levels.</span></li></ul><span data-dcnode-id="2952" instrument_node="">
</span><h2 data-dcnode-id="2942"><span class="mw-headline" data-dcnode-id="2950" id="L"><span data-dcnode-id="2951" instrument_node="">L</span></span><span class="mw-editsection" data-dcnode-id="2943"><span class="mw-editsection-bracket" data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">[</span></span><a data-dcnode-id="2946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D13" title="Edit section: L"><span data-dcnode-id="2947" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2941" instrument_node="">
</span><ul data-dcnode-id="2881"><li data-dcnode-id="2933"><b data-dcnode-id="2938"><a data-dcnode-id="2939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Land_use" title="Land use"><span data-dcnode-id="2940" instrument_node="">land use</span></a></b><span data-dcnode-id="2937" instrument_node="">, Land-use change and forestry (</span><a data-dcnode-id="2935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Land_use%2C_land-use_change%2C_and_forestry" title="Land use, land-use change, and forestry"><span data-dcnode-id="2936" instrument_node="">LULUCF</span></a><span data-dcnode-id="2934" instrument_node="">) - land uses and land-use changes can act either as sinks or as emission sources. It is estimated that approximately one-fifth of global emissions result from LULUCF activities. The Kyoto Protocol allows parties to receive emissions credit for certain LULUCF activities that reduce net emissions.</span></li><span data-dcnode-id="2932" instrument_node="">
</span><li data-dcnode-id="2927"><b data-dcnode-id="2929"><a data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Landfill" title="Landfill"><span data-dcnode-id="2931" instrument_node="">landfill</span></a></b><span data-dcnode-id="2928" instrument_node="">- solid waste disposal in which refuse is buried between layers of soil, a method often used to reclaim low-lying ground; the word is sometimes used as a noun to refer to the waste itself.</span></li><span data-dcnode-id="2926" instrument_node="">
</span><li data-dcnode-id="2918"><b data-dcnode-id="2923"><a data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Landfill_gas" title="Landfill gas"><span data-dcnode-id="2925" instrument_node="">landfill gas</span></a></b><span data-dcnode-id="2922" instrument_node=""> – the gas emissions from biodegrading waste in landfill, including CO</span><sub data-dcnode-id="2920" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="2921" instrument_node="">2</span></sub><span data-dcnode-id="2919" instrument_node="">, CH4, and small amounts of nitrogen, oxygen with traces of toluene, benzene and vinyl chloride.</span></li><span data-dcnode-id="2917" instrument_node="">
</span><li data-dcnode-id="2912"><b data-dcnode-id="2914"><a class="new" data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLandfill_lev%26action%3Dedit%26redlink%3D1" title="Landfill lev (page does not exist)"><span data-dcnode-id="2916" instrument_node="">landfill lev</span></a></b><span data-dcnode-id="2913" instrument_node="">y - levy applied at differential rates to municipal, commercial and industrial and prescribed wastes disposed to licensed landfills the levies used to foster the environmentally sustainable use of resources and best practice in waste management.</span></li><span data-dcnode-id="2911" instrument_node="">
</span><li data-dcnode-id="2906"><b data-dcnode-id="2908"><a class="new" data-dcnode-id="2909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLandfill_prohibition%26action%3Dedit%26redlink%3D1" title="Landfill prohibition (page does not exist)"><span data-dcnode-id="2910" instrument_node="">landfill prohibition</span></a></b><span data-dcnode-id="2907" instrument_node=""> - The banning of a certain material or product type from disposal to landfills. Occurs occasionally, for example, where a preferable waste management option is available.</span></li><span data-dcnode-id="2905" instrument_node="">
</span><li data-dcnode-id="2900"><b data-dcnode-id="2902"><a data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Landfill" title="Landfill"><span data-dcnode-id="2904" instrument_node="">landfill</span></a></b><span data-dcnode-id="2901" instrument_node=""> (dump or tip and historically as a midden) - a site for the disposal of waste materials by burial and is the oldest form of waste treatment.</span></li><span data-dcnode-id="2899" instrument_node="">
</span><li data-dcnode-id="2894"><b data-dcnode-id="2896"><a class="mw-redirect" data-dcnode-id="2897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Land_use_planning" title="Land use planning"><span data-dcnode-id="2898" instrument_node="">land use planning</span></a></b><span data-dcnode-id="2895" instrument_node=""> - a branch of public policy which encompasses various disciplines which seek to order and regulate the use of land in an efficient and ethical way.</span></li><span data-dcnode-id="2893" instrument_node="">
</span><li data-dcnode-id="2888"><b data-dcnode-id="2890"><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leaching_%28pedology%29" title="Leaching (pedology)"><span data-dcnode-id="2892" instrument_node="">leaching</span></a></b><span data-dcnode-id="2889" instrument_node=""> – the movement of chemical in the upper layers of soil into lower layers or into groundwater by being dissolved in water.</span></li><span data-dcnode-id="2887" instrument_node="">
</span><li data-dcnode-id="2882"><b data-dcnode-id="2884"><a data-dcnode-id="2885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithosphere" title="Lithosphere"><span data-dcnode-id="2886" instrument_node="">lithosphere</span></a></b><span data-dcnode-id="2883" instrument_node=""> - the solid outermost shell of a rocky planet.</span></li></ul><span data-dcnode-id="2880" instrument_node="">
</span><p data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">considered ideal for gardening and agricultural uses.
</span></p><span data-dcnode-id="2877" instrument_node="">
</span><ul data-dcnode-id="2800"><li data-dcnode-id="2872"><b data-dcnode-id="2874"><a data-dcnode-id="2875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leachate" title="Leachate"><span data-dcnode-id="2876" instrument_node="">leachate</span></a></b><span data-dcnode-id="2873" instrument_node="">  (waste) - the mixture of water and dissolved solids (possibly toxic) that accumulates as water passes through waste and collects at the bottom of a landfill site.</span></li><span data-dcnode-id="2871" instrument_node="">
</span><li data-dcnode-id="2866"><b data-dcnode-id="2868"><a data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leaf_area_index" title="Leaf area index"><span data-dcnode-id="2870" instrument_node="">leaf area index</span></a></b><span data-dcnode-id="2867" instrument_node="">  (LAI) –  the ratio of photosynthetic leaf area to ground area covered (optimal for photosynthesis = 3-5). LAI is often optimised by shifts in leaf angle, a form of solar tracking.</span></li><span data-dcnode-id="2865" instrument_node="">
</span><li data-dcnode-id="2859"><span data-dcnode-id="2864" instrument_node="">'</span><i data-dcnode-id="2861"><a class="extiw" data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/level" title="wikt:level"><span data-dcnode-id="2863" instrument_node="">level</span></a></i><span data-dcnode-id="2860" instrument_node=""> (scale, context or framework) – a context, frame of reference or degree of organisation within an integrated system. A level may or may not be spatially delimited.</span></li><span data-dcnode-id="2858" instrument_node="">
</span><li data-dcnode-id="2853"><b data-dcnode-id="2855"><a class="mw-redirect" data-dcnode-id="2856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Product_lifecycle_%28engineering%29" title="Product lifecycle (engineering)"><span data-dcnode-id="2857" instrument_node="">life cycle</span></a></b><span data-dcnode-id="2854" instrument_node=""> (of a product) - All stages of a product's development, from raw materials, manufacturing through to consumption and ultimate disposal.</span></li><span data-dcnode-id="2852" instrument_node="">
</span><li data-dcnode-id="2847"><b data-dcnode-id="2849"><a class="mw-redirect" data-dcnode-id="2850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life_Cycle_Analysis" title="Life Cycle Analysis"><span data-dcnode-id="2851" instrument_node="">Life Cycle Analysis</span></a></b><span data-dcnode-id="2848" instrument_node=""> (LCA) - an objective process to evaluate the environmental impacts associated with a product, process, or activity. A means of identifying resource use and waste released to the environment, and to assess management options.</span></li><span data-dcnode-id="2846" instrument_node="">
</span><li data-dcnode-id="2841"><b data-dcnode-id="2843"><a class="new" data-dcnode-id="2844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLife_support_systems%26action%3Dedit%26redlink%3D1" title="Life support systems (page does not exist)"><span data-dcnode-id="2845" instrument_node="">life support systems</span></a></b><span data-dcnode-id="2842" instrument_node=""> - according to the World Conservation Union (IUCN), the biophysical processes "that sustain the productivity, adaptability and capacity for renewal of lands, waters, and / or the biosphere as a whole."</span></li><span data-dcnode-id="2840" instrument_node="">
</span><li data-dcnode-id="2835"><b data-dcnode-id="2837"><a class="new" data-dcnode-id="2838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLilacwater%26action%3Dedit%26redlink%3D1" title="Lilacwater (page does not exist)"><span data-dcnode-id="2839" instrument_node="">lilacwater</span></a></b><span data-dcnode-id="2836" instrument_node=""> – recycled water that is unsuitable for drinking.</span></li><span data-dcnode-id="2834" instrument_node="">
</span><li data-dcnode-id="2829"><b data-dcnode-id="2831"><a data-dcnode-id="2832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Linear_low-density_polyethylene" title="Linear low-density polyethylene"><span data-dcnode-id="2833" instrument_node="">linear low-density polyethylene</span></a></b><span data-dcnode-id="2830" instrument_node="">  - a member of the polyolefin family of plastics. It is a strong and flexible plastic and usually used in film for packaging, bags and for industrial products such as pressure pipe.</span></li><span data-dcnode-id="2828" instrument_node="">
</span><li data-dcnode-id="2823"><b data-dcnode-id="2825"><a class="new" data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLinear_metabolism%26action%3Dedit%26redlink%3D1" title="Linear metabolism (page does not exist)"><span data-dcnode-id="2827" instrument_node="">linear metabolism</span></a></b><span data-dcnode-id="2824" instrument_node=""> - direct conversion of resources into wastes that are often sent directly to landfill</span></li><span data-dcnode-id="2822" instrument_node="">
</span><li data-dcnode-id="2813"><b data-dcnode-id="2819"><a data-dcnode-id="2820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Loam" title="Loam"><span data-dcnode-id="2821" instrument_node="">loam</span></a></b><span data-dcnode-id="2818" instrument_node=""> - a soil composed of sand, silt, and clay in relatively even concentration (about 40-40-20% concentration respectively), *</span><b data-dcnode-id="2815"><a class="new" data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLocally_existing_capacit%26action%3Dedit%26redlink%3D1" title="Locally existing capacit (page does not exist)"><span data-dcnode-id="2817" instrument_node="">locally existing capacit</span></a></b><span data-dcnode-id="2814" instrument_node="">y - the total ecological production that is found within a country's territories. It is usually expressed in hectares based on world average productivity.</span></li><span data-dcnode-id="2812" instrument_node="">
</span><li data-dcnode-id="2807"><b data-dcnode-id="2809"><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Low-density_polyethylene" title="Low-density polyethylene"><span data-dcnode-id="2811" instrument_node="">low-density polyethylene</span></a></b><span data-dcnode-id="2808" instrument_node="">  - A member of the polyolefin family of plastics. It is a flexible material and usually used as film for packaging or as bags.</span></li><span data-dcnode-id="2806" instrument_node="">
</span><li data-dcnode-id="2801"><b data-dcnode-id="2803"><a class="new" data-dcnode-id="2804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLow_entropy_energy%26action%3Dedit%26redlink%3D1" title="Low entropy energy (page does not exist)"><span data-dcnode-id="2805" instrument_node="">low entropy energy</span></a></b><span data-dcnode-id="2802" instrument_node=""> - to high-quality energy, or energy that is concentrated and available. Electricity is considered the energy carrier with the lowest entropy (i.e. highest quality) as it can be transformed into mechanical energy at efficiency rates well above 90%. In contrast, fossil fuel chemical energy can only be converted into mechanical energy at a typical efficiency rate of 25% (cars) to 50 percent (modern power plants). The chemical energy of biomass is of lower quality.</span></li></ul><span data-dcnode-id="2799" instrument_node="">
</span><h2 data-dcnode-id="2789"><span class="mw-headline" data-dcnode-id="2797" id="M"><span data-dcnode-id="2798" instrument_node="">M</span></span><span class="mw-editsection" data-dcnode-id="2790"><span class="mw-editsection-bracket" data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">[</span></span><a data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D14" title="Edit section: M"><span data-dcnode-id="2794" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2788" instrument_node="">
</span><ul data-dcnode-id="2674"><li data-dcnode-id="2783"><b data-dcnode-id="2785"><a data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magma" title="Magma"><span data-dcnode-id="2787" instrument_node="">magma</span></a></b><span data-dcnode-id="2784" instrument_node=""> - molten rock that sometimes forms beneath the surface of the Earth (or any other terrestrial planet) that often collects in a magma chamber and is ejected by volcano's.</span></li><span data-dcnode-id="2782" instrument_node="">
</span><li data-dcnode-id="2777"><b data-dcnode-id="2779"><a data-dcnode-id="2780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manure" title="Manure"><span data-dcnode-id="2781" instrument_node="">manure</span></a></b><span data-dcnode-id="2778" instrument_node=""> - organic matter used as fertilizer in agriculture.</span></li><span data-dcnode-id="2776" instrument_node="">

</span><li data-dcnode-id="2762"><b data-dcnode-id="2764"><a data-dcnode-id="2765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Material_flow" title="Material flow"><span data-dcnode-id="2766" instrument_node="">material flow</span></a></b><span data-dcnode-id="2763" instrument_node=""> – the cycling of materials, which is driven by the flow of energy.</span></li><span data-dcnode-id="2761" instrument_node="">

</span><li data-dcnode-id="2738"><b data-dcnode-id="2746"><a class="new" data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMauna_Loa_record%26action%3Dedit%26redlink%3D1" title="Mauna Loa record (page does not exist)"><span data-dcnode-id="2748" instrument_node="">Mauna Loa record</span></a></b><span data-dcnode-id="2745" instrument_node=""> - the record of measurement of atmospheric CO</span><sub data-dcnode-id="2743" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="2744" instrument_node="">2</span></sub><span data-dcnode-id="2742" instrument_node=""> concentrations taken at Mauna Loa Observatory, Mauna Loa, Hawaii, since March 1958. This record shows the continuing increase in average annual atmospheric CO</span><sub data-dcnode-id="2740" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="2741" instrument_node="">2</span></sub><span data-dcnode-id="2739" instrument_node=""> concentrations.</span></li><span data-dcnode-id="2737" instrument_node="">
</span><li data-dcnode-id="2732"><b data-dcnode-id="2734"><a class="new" data-dcnode-id="2735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMaximum_soil_water_deficit%26action%3Dedit%26redlink%3D1" title="Maximum soil water deficit (page does not exist)"><span data-dcnode-id="2736" instrument_node="">maximum soil water deficit</span></a></b><span data-dcnode-id="2733" instrument_node=""> – amount of water stored in the soil that is readily available to plants</span></li><span data-dcnode-id="2731" instrument_node="">

</span><li data-dcnode-id="2708"><b data-dcnode-id="2710"><a class="mw-redirect" data-dcnode-id="2711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mobile_garbage_bin" title="Mobile garbage bin"><span data-dcnode-id="2712" instrument_node="">mobile garbage bin</span></a></b><span data-dcnode-id="2709" instrument_node="">  - A wheeled kerbside container for the collection of garbage or other materials.</span></li><span data-dcnode-id="2707" instrument_node="">
</span><li data-dcnode-id="2702"><b data-dcnode-id="2704"><a data-dcnode-id="2705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monoculture" title="Monoculture"><span data-dcnode-id="2706" instrument_node="">monoculture</span></a></b><span data-dcnode-id="2703" instrument_node=""> - the practice of producing or growing one single crop over a wide area.</span></li><span data-dcnode-id="2701" instrument_node="">
</span><li data-dcnode-id="2693"><b data-dcnode-id="2698"><a data-dcnode-id="2699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montreal_Protocol" title="Montreal Protocol"><span data-dcnode-id="2700" instrument_node="">Montreal Protocol</span></a></b><span data-dcnode-id="2697" instrument_node=""> –an international treaty signed in 1987 designed to protect the ozone layer by phasing out the production of numerous substances that are responsible for ozone depletion, especially </span><a class="mw-redirect" data-dcnode-id="2695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CFC%2527s" title="CFC's"><span data-dcnode-id="2696" instrument_node="">CFC's</span></a><span data-dcnode-id="2694" instrument_node="">.</span></li><span data-dcnode-id="2692" instrument_node="">
</span><li data-dcnode-id="2687"><b data-dcnode-id="2689"><a data-dcnode-id="2690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mortality_rate" title="Mortality rate"><span data-dcnode-id="2691" instrument_node="">mortality rate</span></a></b><span data-dcnode-id="2688" instrument_node=""> –  generally understood as the total number of deaths per 1000 people of a given age group</span></li><span data-dcnode-id="2686" instrument_node="">
</span><li data-dcnode-id="2681"><b data-dcnode-id="2683"><a data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mulch" title="Mulch"><span data-dcnode-id="2685" instrument_node="">mulch</span></a></b><span data-dcnode-id="2682" instrument_node=""> - any composted or non-composted organic material, excluding plastic, that is suitable for placing on soil surfaces to restrict moisture loss from the soil and to provide a source of nutrients to the soil.</span></li><span data-dcnode-id="2680" instrument_node="">
</span><li data-dcnode-id="2675"><b data-dcnode-id="2677"><a class="mw-redirect" data-dcnode-id="2678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Municipal_waste" title="Municipal waste"><span data-dcnode-id="2679" instrument_node="">municipal waste</span></a></b><span data-dcnode-id="2676" instrument_node=""> - solid waste generated from domestic premises (garbage and hard waste) and council activities such as street sweeping, litter and street tree lopping. Also includes waste dropped at transfer stations and construction waste from owner/occupier renovations.</span></li></ul><span data-dcnode-id="2673" instrument_node="">
</span><h2 data-dcnode-id="2663"><span class="mw-headline" data-dcnode-id="2671" id="N"><span data-dcnode-id="2672" instrument_node="">N</span></span><span class="mw-editsection" data-dcnode-id="2664"><span class="mw-editsection-bracket" data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">[</span></span><a data-dcnode-id="2667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D15" title="Edit section: N"><span data-dcnode-id="2668" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2662" instrument_node="">
</span><ul data-dcnode-id="2563"><li data-dcnode-id="2657"><b data-dcnode-id="2659"><a class="new" data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNational_Packaging_Covenant%26action%3Dedit%26redlink%3D1" title="National Packaging Covenant (page does not exist)"><span data-dcnode-id="2661" instrument_node="">National Packaging Covenant</span></a></b><span data-dcnode-id="2658" instrument_node="">  - a self-regulatory agreement between packaging industries and government.</span></li><span data-dcnode-id="2656" instrument_node="">
</span><li data-dcnode-id="2648"><b data-dcnode-id="2653"><a class="mw-redirect" data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural" title="Natural"><span data-dcnode-id="2655" instrument_node="">natural</span></a></b><span data-dcnode-id="2652" instrument_node="">- the existing air, water, land and energy resources from which all resources derive. Main functions include resource production (such as fish, timber or cereals), waste assimilation (such as CO</span><sub data-dcnode-id="2650" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="2651" instrument_node="">2</span></sub><span data-dcnode-id="2649" instrument_node=""> absorption, sewage decomposition), and life support services (UV protection, biodiversity, water cleansing, climate stability). The environmental services that must be maintained so that human development can be sustainable.</span></li><span data-dcnode-id="2647" instrument_node="">
</span><li data-dcnode-id="2639"><b data-dcnode-id="2644"><a data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_capital" title="Natural capital"><span data-dcnode-id="2646" instrument_node="">natural capital</span></a></b><span data-dcnode-id="2643" instrument_node=""> - natural resources and ecological processes that are equivalent to </span><a data-dcnode-id="2641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_capital" title="Financial capital"><span data-dcnode-id="2642" instrument_node="">financial capital</span></a><span data-dcnode-id="2640" instrument_node="">.</span></li><span data-dcnode-id="2638" instrument_node="">
</span><li data-dcnode-id="2633"><b data-dcnode-id="2635"><a class="mw-redirect" data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_resources" title="Natural resources"><span data-dcnode-id="2637" instrument_node="">natural resources</span></a></b><span data-dcnode-id="2634" instrument_node=""> - naturally occurring substances that are considered valuable in their relatively unmodified (natural) form.</span></li><span data-dcnode-id="2632" instrument_node="">
</span><li data-dcnode-id="2627"><b data-dcnode-id="2629"><a data-dcnode-id="2630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_selection" title="Natural selection"><span data-dcnode-id="2631" instrument_node="">natural selection</span></a></b><span data-dcnode-id="2628" instrument_node=""> - the process by which favorable heritable traits become more common in successive generations of a population of reproducing organisms, and unfavorable heritable traits become less common.</span></li><span data-dcnode-id="2626" instrument_node="">
</span><li data-dcnode-id="2621"><b data-dcnode-id="2623"><a class="new" data-dcnode-id="2624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNeighbourhood_environment_improvement_plan%26action%3Dedit%26redlink%3D1" title="Neighbourhood environment improvement plan (page does not exist)"><span data-dcnode-id="2625" instrument_node="">neighbourhood environment improvement plan</span></a></b><span data-dcnode-id="2622" instrument_node=""> - plans developed by a local community including residents, special interest groups, local government, local industry and government agencies.</span></li><span data-dcnode-id="2620" instrument_node="">
</span><li data-dcnode-id="2612"><b data-dcnode-id="2617"><a class="mw-redirect" data-dcnode-id="2618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nematocide" title="Nematocide"><span data-dcnode-id="2619" instrument_node="">nematocide</span></a></b><span data-dcnode-id="2616" instrument_node=""> – a chemical that kills </span><a data-dcnode-id="2614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nematode" title="Nematode"><span data-dcnode-id="2615" instrument_node="">nematodes</span></a><span data-dcnode-id="2613" instrument_node="">.</span></li><span data-dcnode-id="2611" instrument_node="">
</span><li data-dcnode-id="2606"><b data-dcnode-id="2608"><a class="mw-redirect" data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Net_primary_production" title="Net primary production"><span data-dcnode-id="2610" instrument_node="">net primary production</span></a></b><span data-dcnode-id="2607" instrument_node=""> - the energy or biomass content of plant material that has accumulated in an ecosystem over a period of time through photosynthesis. It is the amount of energy left after subtracting the respiration of primary producers (mostly plants) from the total amount of solar energy that is fixed biologically; gross primary productivity minus respiratory losses (this is the carbon gain).</span></li><span data-dcnode-id="2605" instrument_node="">
</span><li data-dcnode-id="2600"><b data-dcnode-id="2602"><a class="mw-redirect" data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nickel_cadmium" title="Nickel cadmium"><span data-dcnode-id="2604" instrument_node="">nickel cadmium</span></a></b><span data-dcnode-id="2601" instrument_node=""> batteries - batteries typically used in appliances such as power tools and mobile phones. Cadmium is a heavy metal that poses risk to human and ecosystem health.</span></li><span data-dcnode-id="2599" instrument_node="">
</span><li data-dcnode-id="2594"><b data-dcnode-id="2596"><a data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noise_pollution" title="Noise pollution"><span data-dcnode-id="2598" instrument_node="">noise pollution</span></a></b><span data-dcnode-id="2595" instrument_node=""> (environmental noise) - displeasing human or machine created sound that disrupts the activity or happiness of human or animal life.</span></li><span data-dcnode-id="2593" instrument_node="">
</span><li data-dcnode-id="2588"><b data-dcnode-id="2590"><a data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nonpoint_source_pollution" title="Nonpoint source pollution"><span data-dcnode-id="2592" instrument_node="">nonpoint source pollution</span></a></b><span data-dcnode-id="2589" instrument_node=""> - water pollution affecting a water body from diffuse sources, rather than a point source which discharges to a water body at a single location.</span></li><span data-dcnode-id="2587" instrument_node="">
</span><li data-dcnode-id="2582"><b data-dcnode-id="2584"><a data-dcnode-id="2585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/No-till_farming" title="No-till farming"><span data-dcnode-id="2586" instrument_node="">no-till farming</span></a></b><span data-dcnode-id="2583" instrument_node=""> - considered a kind of conservation tillage system and is sometimes called zero tillage.</span></li><span data-dcnode-id="2581" instrument_node="">
</span><li data-dcnode-id="2576"><b data-dcnode-id="2578"><a class="mw-redirect" data-dcnode-id="2579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-ferrous_metals" title="Non-ferrous metals"><span data-dcnode-id="2580" instrument_node="">non-ferrous metals</span></a></b><span data-dcnode-id="2577" instrument_node=""> - those metals that contain little or no iron, e.g. copper, brass and bronze.</span></li><span data-dcnode-id="2575" instrument_node="">
</span><li data-dcnode-id="2570"><b data-dcnode-id="2572"><a class="mw-redirect" data-dcnode-id="2573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non_Government_Organisation" title="Non Government Organisation"><span data-dcnode-id="2574" instrument_node="">Non Government Organisation</span></a></b><span data-dcnode-id="2571" instrument_node=""> (NGO) - A not-for-profit or community-based organization.</span></li><span data-dcnode-id="2569" instrument_node="">
</span><li data-dcnode-id="2564"><b data-dcnode-id="2566"><a class="mw-redirect" data-dcnode-id="2567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nutrients" title="Nutrients"><span data-dcnode-id="2568" instrument_node="">nutrients</span></a></b><span data-dcnode-id="2565" instrument_node=""> – chemicals required for the growth of organisms. Phosphorus, nitrogen and potassium are major plant nutrients but there are also many trace elements, elements that are needed in small quantities for the growing and developing of animal and plant life.</span></li></ul><span data-dcnode-id="2562" instrument_node="">
</span><h2 data-dcnode-id="2552"><span class="mw-headline" data-dcnode-id="2560" id="O"><span data-dcnode-id="2561" instrument_node="">O</span></span><span class="mw-editsection" data-dcnode-id="2553"><span class="mw-editsection-bracket" data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">[</span></span><a data-dcnode-id="2556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D16" title="Edit section: O"><span data-dcnode-id="2557" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2551" instrument_node="">
</span><ul data-dcnode-id="2479"><li data-dcnode-id="2546"><b data-dcnode-id="2548"><a data-dcnode-id="2549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ocean_acidification" title="Ocean acidification"><span data-dcnode-id="2550" instrument_node="">Ocean acidification</span></a></b><span data-dcnode-id="2547" instrument_node="">  -  reduction in pH. Caused by their uptake of anthropogenic carbon dioxide from the atmosphere.</span></li><span data-dcnode-id="2545" instrument_node="">
</span><li data-dcnode-id="2537"><b data-dcnode-id="2542"><a data-dcnode-id="2543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oceania" title="Oceania"><span data-dcnode-id="2544" instrument_node="">Oceania</span></a></b><span data-dcnode-id="2541" instrument_node=""> - the islands of the southern, western, and central Pacific Ocean, including Melanesia, Micronesia, and Polynesia. Sometimes extended to encompass Australia, New Zealand, and </span><a data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maritime_Southeast_Asia" title="Maritime Southeast Asia"><span data-dcnode-id="2540" instrument_node="">Maritime Southeast Asia</span></a><span data-dcnode-id="2538" instrument_node="">.</span></li><span data-dcnode-id="2536" instrument_node="">
</span><li data-dcnode-id="2531"><b data-dcnode-id="2533"><a class="mw-redirect" data-dcnode-id="2534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_growth_forest" title="Old growth forest"><span data-dcnode-id="2535" instrument_node="">old growth forest</span></a></b><span data-dcnode-id="2532" instrument_node=""> - an area of forest that has attained great age and so exhibits unique biological features.</span></li><span data-dcnode-id="2530" instrument_node="">
</span><li data-dcnode-id="2525"><b data-dcnode-id="2527"><a data-dcnode-id="2528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Omnivore" title="Omnivore"><span data-dcnode-id="2529" instrument_node="">omnivore</span></a></b><span data-dcnode-id="2526" instrument_node=""> - a species of animal that eats both plants and animals as its primary food source.</span></li><span data-dcnode-id="2524" instrument_node="">
</span><li data-dcnode-id="2519"><b data-dcnode-id="2521"><a data-dcnode-id="2522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open-pit_mining" title="Open-pit mining"><span data-dcnode-id="2523" instrument_node="">open-pit mining</span></a></b><span data-dcnode-id="2520" instrument_node=""> (opencast mining, open-cut mining) - a method of extracting rock or minerals from the earth by their removal from an open pit or borrow.</span></li><span data-dcnode-id="2518" instrument_node="">
</span><li data-dcnode-id="2513"><b data-dcnode-id="2515"><a class="mw-redirect" data-dcnode-id="2516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_growth_forests" title="Old growth forests"><span data-dcnode-id="2517" instrument_node="">old growth forests</span></a></b><span data-dcnode-id="2514" instrument_node=""> - forests dominated by mature trees and with little or no evidence of any disturbance such as logging, ground clearing and building.</span></li><span data-dcnode-id="2512" instrument_node="">
</span><li data-dcnode-id="2507"><b data-dcnode-id="2509"><a class="mw-redirect" data-dcnode-id="2510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organic_agriculture" title="Organic agriculture"><span data-dcnode-id="2511" instrument_node="">organic agriculture</span></a></b><span data-dcnode-id="2508" instrument_node=""> - a holistic production management system that avoids the use of synthetic fertilisers, pesticides and GM organisms, minimises pollution of air, soil and water, and optimises the health and productivity of interdependent communities of plants, animals and people.</span></li><span data-dcnode-id="2506" instrument_node="">
</span><li data-dcnode-id="2501"><b data-dcnode-id="2503"><a class="mw-redirect" data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organic_gardening" title="Organic gardening"><span data-dcnode-id="2505" instrument_node="">organic gardening</span></a></b><span data-dcnode-id="2502" instrument_node=""> – gardening that follows, in general principle, the philosophy of organic agriculture</span></li><span data-dcnode-id="2500" instrument_node="">
</span><li data-dcnode-id="2495"><b data-dcnode-id="2497"><a data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organic_matter" title="Organic matter"><span data-dcnode-id="2499" instrument_node="">organic</span></a></b><span data-dcnode-id="2496" instrument_node=""> – derived from a living organism.</span></li><span data-dcnode-id="2494" instrument_node="">
</span><li data-dcnode-id="2486"><b data-dcnode-id="2491"><a data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organic_matter" title="Organic matter"><span data-dcnode-id="2493" instrument_node="">organics</span></a></b><span data-dcnode-id="2490" instrument_node=""> - plant or animal matter originating from domestic or industrial sources, e.g. grass clippings, tree prunings, </span><a class="mw-redirect" data-dcnode-id="2488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_waste" title="Food waste"><span data-dcnode-id="2489" instrument_node="">food waste</span></a><span data-dcnode-id="2487" instrument_node="">.</span></li><span data-dcnode-id="2485" instrument_node="">
</span><li data-dcnode-id="2480"><b data-dcnode-id="2482"><a class="mw-redirect" data-dcnode-id="2483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Overshoot_%28ecology%29" title="Overshoot (ecology)"><span data-dcnode-id="2484" instrument_node="">overshoot</span></a></b><span data-dcnode-id="2481" instrument_node="">- growth beyond an area's carrying capacity; ecological deficit occurs when human consumption and waste production exceed the capacity of the Earth to create new resources and absorb waste. During overshoot, natural capital is being liquidated to support current use so the Earth's ability to support future life declines.</span></li></ul><span data-dcnode-id="2478" instrument_node="">
</span><h2 data-dcnode-id="2468"><span class="mw-headline" data-dcnode-id="2476" id="P"><span data-dcnode-id="2477" instrument_node="">P</span></span><span class="mw-editsection" data-dcnode-id="2469"><span class="mw-editsection-bracket" data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">[</span></span><a data-dcnode-id="2472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D17" title="Edit section: P"><span data-dcnode-id="2473" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2467" instrument_node="">
</span><ul data-dcnode-id="2265"><li data-dcnode-id="2462"><b data-dcnode-id="2464"><a data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patterns_in_nature" title="Patterns in nature"><span data-dcnode-id="2466" instrument_node="">Patterns in nature</span></a></b><span data-dcnode-id="2463" instrument_node=""> - are visible regularities of form found in the natural world.</span></li><span data-dcnode-id="2461" instrument_node="">
</span><li data-dcnode-id="2456"><b data-dcnode-id="2458"><a class="new" data-dcnode-id="2459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPay-by-weight_systems%26action%3Dedit%26redlink%3D1" title="Pay-by-weight systems (page does not exist)"><span data-dcnode-id="2460" instrument_node="">pay-by-weight systems</span></a></b><span data-dcnode-id="2457" instrument_node=""> - financial approaches to managing waste that charge prices according to the quantity of waste collected, rather than a price per pick-up or fixed annual charge, as typically applied to households for kerbside services. Pay-by-weight systems may provide an incentive to reduce waste generation.</span></li><span data-dcnode-id="2455" instrument_node="">
</span><li data-dcnode-id="2450"><b data-dcnode-id="2452"><a class="new" data-dcnode-id="2453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPer_capita_consumption%26action%3Dedit%26redlink%3D1" title="Per capita consumption (page does not exist)"><span data-dcnode-id="2454" instrument_node="">per capita consumption</span></a></b><span data-dcnode-id="2451" instrument_node=""> - the average amount of commodity used per person.</span></li><span data-dcnode-id="2449" instrument_node="">
</span><li data-dcnode-id="2443"><b data-dcnode-id="2445"><a class="mw-redirect" data-dcnode-id="2447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persistent_organic_pollutants" title="Persistent organic pollutants"><span data-dcnode-id="2448" instrument_node="">Persistent organic pollutants</span></a><span data-dcnode-id="2446" instrument_node=""> (POPs)</span></b><span data-dcnode-id="2444" instrument_node=""> - organic compounds that are resistant to environmental degradation through chemical, biological, and photolytic processes.</span></li><span data-dcnode-id="2442" instrument_node="">
</span><li data-dcnode-id="2437"><b data-dcnode-id="2439"><a class="new" data-dcnode-id="2440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPervious_surface%26action%3Dedit%26redlink%3D1" title="Pervious surface (page does not exist)"><span data-dcnode-id="2441" instrument_node="">pervious surface</span></a></b><span data-dcnode-id="2438" instrument_node=""> – one which can be penetrated by air and water.</span></li><span data-dcnode-id="2436" instrument_node="">
</span><li data-dcnode-id="2431"><b data-dcnode-id="2433"><a data-dcnode-id="2434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pesticide" title="Pesticide"><span data-dcnode-id="2435" instrument_node="">pesticide</span></a></b><span data-dcnode-id="2432" instrument_node=""> - means any substance or mixture of substances intended for preventing, destroying or controlling any pest. This includes substances intended for use as a plant growth regulator, defoliant, desiccant, or agent for thinning fruit or preventing the premature fall of fruit, and substances applied to crops either before or after harvest to protect the commodity from deterioration during storage and transport. (Food and Agriculture Organization of the United Nations, 2003).</span></li><span data-dcnode-id="2430" instrument_node="">
</span><li data-dcnode-id="2422"><b data-dcnode-id="2427"><a data-dcnode-id="2428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photosynthesis" title="Photosynthesis"><span data-dcnode-id="2429" instrument_node="">photosynthesis</span></a></b><span data-dcnode-id="2426" instrument_node=""> – the transformation of </span><a data-dcnode-id="2424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radiant_energy" title="Radiant energy"><span data-dcnode-id="2425" instrument_node="">radiant energy</span></a><span data-dcnode-id="2423" instrument_node=""> to chemical energy by plants; the manufacture by plants of carbohydrates from carbon dioxide and water. The reaction is driven by energy from sunlight, catalysed by chlorophyll and releases oxygen as a byproduct. The capture of the Sun's energy (primary production) to power all life on Earth (consumption).</span></li><span data-dcnode-id="2421" instrument_node="">
</span><li data-dcnode-id="2416"><b data-dcnode-id="2418"><a class="mw-redirect" data-dcnode-id="2419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photovoltaic" title="Photovoltaic"><span data-dcnode-id="2420" instrument_node="">photovoltaic</span></a></b><span data-dcnode-id="2417" instrument_node="">  - the direct conversion of light into electricity</span></li><span data-dcnode-id="2415" instrument_node="">
</span><li data-dcnode-id="2410"><b data-dcnode-id="2412"><a data-dcnode-id="2413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phytoplankton" title="Phytoplankton"><span data-dcnode-id="2414" instrument_node="">phytoplankton</span></a></b><span data-dcnode-id="2411" instrument_node="">– plant plankton cf. Plankton.</span></li><span data-dcnode-id="2409" instrument_node="">
</span><li data-dcnode-id="2404"><b data-dcnode-id="2406"><a data-dcnode-id="2407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plankton" title="Plankton"><span data-dcnode-id="2408" instrument_node="">plankton</span></a></b><span data-dcnode-id="2405" instrument_node=""> – mostly microscopic animal and plant life suspended in water and a valuable food source for animals cf. Phytoplankton.</span></li><span data-dcnode-id="2403" instrument_node="">
</span><li data-dcnode-id="2398"><b data-dcnode-id="2400"><a class="new" data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlant_quality%26action%3Dedit%26redlink%3D1" title="Plant quality (page does not exist)"><span data-dcnode-id="2402" instrument_node="">plant quality</span></a></b><span data-dcnode-id="2399" instrument_node=""> - a standard of plant appearance or yield.</span></li><span data-dcnode-id="2397" instrument_node="">
</span><li data-dcnode-id="2392"><b data-dcnode-id="2394"><a data-dcnode-id="2395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plastic" title="Plastic"><span data-dcnode-id="2396" instrument_node="">plastic</span></a></b><span data-dcnode-id="2393" instrument_node=""> - One of many high-polymeric substances, including both natural and synthetic products, but excluding rubbers. At some stage in its manufacture every plastic is capable of flowing, under heat and pressure, if necessary, into the desired final shape.</span></li><span data-dcnode-id="2391" instrument_node="">
