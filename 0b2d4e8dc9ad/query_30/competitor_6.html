</span><li data-dcnode-id="2386"><b data-dcnode-id="2388"><a data-dcnode-id="2389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polluter_pays_principle" title="Polluter pays principle"><span data-dcnode-id="2390" instrument_node="">Polluter Pays Principle</span></a></b><span data-dcnode-id="2387" instrument_node=""> (PPP) - the principle that producers of pollution should in some way compensate others for the effects of their pollution.</span></li><span data-dcnode-id="2385" instrument_node="">
</span><li data-dcnode-id="2380"><b data-dcnode-id="2382"><a data-dcnode-id="2383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polyethylene_terephthalate" title="Polyethylene terephthalate"><span data-dcnode-id="2384" instrument_node="">polyethylene terephthalate</span></a></b><span data-dcnode-id="2381" instrument_node=""> (PET) – a clear, tough, light and shatterproof type of plastic, used to make products such as soft drink bottles, film packaging and fabrics.</span></li><span data-dcnode-id="2379" instrument_node="">
</span><li data-dcnode-id="2374"><b data-dcnode-id="2376"><a data-dcnode-id="2377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polypropylene" title="Polypropylene"><span data-dcnode-id="2378" instrument_node="">polypropylene</span></a></b><span data-dcnode-id="2375" instrument_node=""> (PP) - a member of the polyelofin family of plastics. PP is light, rigid and glossy and is used to make products such as washing machine agitators, clear film packaging, carpet fibres and housewares.</span></li><span data-dcnode-id="2373" instrument_node="">
</span><li data-dcnode-id="2368"><b data-dcnode-id="2370"><a data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polystyrene" title="Polystyrene"><span data-dcnode-id="2372" instrument_node="">polystyrene</span></a></b><span data-dcnode-id="2369" instrument_node=""> (PS) - a member of the styrene family of plastics. PS is easy to mould and is used to make refrigerator and washing machine components. It can be foamed to make single use packaging, such as cups, meat and produce trays.</span></li><span data-dcnode-id="2367" instrument_node="">
</span><li data-dcnode-id="2362"><b data-dcnode-id="2364"><a data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polyvinyl_chloride" title="Polyvinyl chloride"><span data-dcnode-id="2366" instrument_node="">polyvinyl chloride</span></a></b><span data-dcnode-id="2363" instrument_node=""> (PVC) - a member of the vinyl family of plastics. PVC can be clear, flexible or rigid and is used to make products such as fruit juice bottles, credit cards, pipes and hoses.</span></li><span data-dcnode-id="2361" instrument_node="">
</span><li data-dcnode-id="2356"><b data-dcnode-id="2358"><a class="new" data-dcnode-id="2359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostconsumer_material_or_waste%26action%3Dedit%26redlink%3D1" title="Postconsumer material or waste (page does not exist)"><span data-dcnode-id="2360" instrument_node="">postconsumer material or waste</span></a></b><span data-dcnode-id="2357" instrument_node=""> - material or product that has served its intended purpose and has been discarded for disposal or recovery. This includes returns of material from the distribution chain; waste that is collected and sorted after use; kerbside waste cf. pre-consumer waste.</span></li><span data-dcnode-id="2355" instrument_node="">
</span><li data-dcnode-id="2350"><b data-dcnode-id="2352"><a class="mw-redirect" data-dcnode-id="2353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Potable" title="Potable"><span data-dcnode-id="2354" instrument_node="">potable</span></a></b><span data-dcnode-id="2351" instrument_node=""> – safe to drink.</span></li><span data-dcnode-id="2349" instrument_node="">
</span><li data-dcnode-id="2344"><b data-dcnode-id="2346"><a data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Power_%28physics%29" title="Power (physics)"><span data-dcnode-id="2348" instrument_node="">power</span></a></b><span data-dcnode-id="2345" instrument_node="">- the rate at which work is done; electrically, power = current x voltage (P = I V)</span></li><span data-dcnode-id="2343" instrument_node="">
</span><li data-dcnode-id="2338"><b data-dcnode-id="2340"><a class="mw-redirect" data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Precautionary_Principle" title="Precautionary Principle"><span data-dcnode-id="2342" instrument_node="">Precautionary Principle</span></a></b><span data-dcnode-id="2339" instrument_node=""> – where there are threats of serious irreversible environmental damage, lack of full scientific certainty should not be used as a reason for introducing measures to prevent that degradation (Rio Declaration).</span></li><span data-dcnode-id="2337" instrument_node="">
</span><li data-dcnode-id="2332"><b data-dcnode-id="2334"><a class="mw-redirect" data-dcnode-id="2335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Precipitation_%28meteorology%29" title="Precipitation (meteorology)"><span data-dcnode-id="2336" instrument_node="">precipitation</span></a></b><span data-dcnode-id="2333" instrument_node=""> – (weather) any liquid or solid water particles that fall from the atmosphere to the Earth's surface; includes drizzle, rain, snow, snow pellets, ice crystals, ice pellets and ha</span></li><span data-dcnode-id="2331" instrument_node="">
</span><li data-dcnode-id="2326"><b data-dcnode-id="2328"><a class="new" data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPreconsumer_material_or_waste%26action%3Dedit%26redlink%3D1" title="Preconsumer material or waste (page does not exist)"><span data-dcnode-id="2330" instrument_node="">preconsumer material or waste</span></a></b><span data-dcnode-id="2327" instrument_node=""> - material diverted to the waste stream during a manufacturing process; waste from manufacture and production.</span></li><span data-dcnode-id="2325" instrument_node="">
</span><li data-dcnode-id="2320"><b data-dcnode-id="2322"><a class="mw-redirect" data-dcnode-id="2323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pre-industrial" title="Pre-industrial"><span data-dcnode-id="2324" instrument_node="">pre-industrial</span></a></b><span data-dcnode-id="2321" instrument_node=""> - for the purposes of the IPCC this is defined as 1750.</span></li><span data-dcnode-id="2319" instrument_node="">
</span><li data-dcnode-id="2314"><b data-dcnode-id="2316"><a class="new" data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPrescribed_waste_and_prescribed_industrial_waste%26action%3Dedit%26redlink%3D1" title="Prescribed waste and prescribed industrial waste (page does not exist)"><span data-dcnode-id="2318" instrument_node="">prescribed waste and prescribed industrial waste</span></a></b><span data-dcnode-id="2315" instrument_node=""> - Those wastes listed in the Environment Protection (Prescribed Waste) Regulations 1998 and subject to requirements under the industrial waste management policy 2000. Prescribed wastes carry special handling, storage, transport and often licensing requirements, and attract substantially higher disposal levies than non-prescribed solid wastes.</span></li><span data-dcnode-id="2313" instrument_node="">
</span><li data-dcnode-id="2308"><b data-dcnode-id="2310"><a class="mw-redirect" data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Primary_productivity" title="Primary productivity"><span data-dcnode-id="2312" instrument_node="">primary productivity</span></a></b><span data-dcnode-id="2309" instrument_node=""> - the fixation rate at which energy is fixed by plants.</span></li><span data-dcnode-id="2307" instrument_node="">
</span><li data-dcnode-id="2302"><b data-dcnode-id="2304"><a class="new" data-dcnode-id="2305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProducer_responsibility%26action%3Dedit%26redlink%3D1" title="Producer responsibility (page does not exist)"><span data-dcnode-id="2306" instrument_node="">producer responsibility</span></a></b><span data-dcnode-id="2303" instrument_node=""> – the legal responsibilities of producers/manufacturers for the full life of their products.</span></li><span data-dcnode-id="2301" instrument_node="">
</span><li data-dcnode-id="2296"><b data-dcnode-id="2298"><a class="mw-redirect" data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Producer_%28ecology%29" title="Producer (ecology)"><span data-dcnode-id="2300" instrument_node="">producer</span></a></b><span data-dcnode-id="2297" instrument_node=""> – (ecology) a plant, that is able to produce its own food from inorganic substance;  (energetics) an organism or process that generates concentrated energy from sunlight beyond its own needs.</span></li><span data-dcnode-id="2295" instrument_node="">
</span><li data-dcnode-id="2290"><b data-dcnode-id="2292"><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Product_stewardship" title="Product stewardship"><span data-dcnode-id="2294" instrument_node="">product stewardship</span></a></b><span data-dcnode-id="2291" instrument_node=""> – the principle of shared responsibility by all sectors involved in the manufacture, distribution, use and disposal of products for the consequences of these activities; manufacturing responsibility extending to the entire life of the product.</span></li><span data-dcnode-id="2289" instrument_node="">
</span><li data-dcnode-id="2284"><b data-dcnode-id="2286"><a data-dcnode-id="2287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Product_%28business%29" title="Product (business)"><span data-dcnode-id="2288" instrument_node="">Product</span></a></b><span data-dcnode-id="2285" instrument_node=""> – a thing produced by labour; mostly the material items we buy in shops; (ecology) the results of photosynthesis.</span></li><span data-dcnode-id="2283" instrument_node="">
</span><li data-dcnode-id="2278"><b data-dcnode-id="2280"><a data-dcnode-id="2281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Productivity" title="Productivity"><span data-dcnode-id="2282" instrument_node="">productivity</span></a></b><span data-dcnode-id="2279" instrument_node=""> (ecology) - the rate at which radiant energy is used by producers to form organic substances as food for consumers.</span></li><span data-dcnode-id="2277" instrument_node="">
</span><li data-dcnode-id="2272"><b data-dcnode-id="2274"><a class="new" data-dcnode-id="2275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProvisioning_services%26action%3Dedit%26redlink%3D1" title="Provisioning services (page does not exist)"><span data-dcnode-id="2276" instrument_node="">provisioning services</span></a></b><span data-dcnode-id="2273" instrument_node=""> – one of the major ecosystem services: the products obtained from ecosystems e.g. genetic resources, food, fibre and fresh water.</span></li><span data-dcnode-id="2271" instrument_node="">
</span><li data-dcnode-id="2266"><b data-dcnode-id="2268"><a data-dcnode-id="2269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pyrolysis" title="Pyrolysis"><span data-dcnode-id="2270" instrument_node="">pyrolysis</span></a></b><span data-dcnode-id="2267" instrument_node=""> - advanced thermal technology involving the thermal decomposition of organic compounds in the complete absence of oxygen under pressure and at elevated temperature.</span></li></ul><span data-dcnode-id="2264" instrument_node="">
</span><h2 data-dcnode-id="2254"><span class="mw-headline" data-dcnode-id="2262" id="R"><span data-dcnode-id="2263" instrument_node="">R</span></span><span class="mw-editsection" data-dcnode-id="2255"><span class="mw-editsection-bracket" data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">[</span></span><a data-dcnode-id="2258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D18" title="Edit section: R"><span data-dcnode-id="2259" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2253" instrument_node="">
</span><ul data-dcnode-id="2064"><li data-dcnode-id="2248"><b data-dcnode-id="2250"><a data-dcnode-id="2251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radiative_forcing" title="Radiative forcing"><span data-dcnode-id="2252" instrument_node="">radiative forcing</span></a></b><span data-dcnode-id="2249" instrument_node=""> - changes in the energy balance of the earth-atmosphere system in response to a change in factors such as greenhouse gases, land-use change, or solar radiation. Positive radiative forcing increases the temperature of the lower atmosphere, which in turn increases temperatures at the Earth's surface. Negative radiative forcing cools the lower atmosphere. Radiative forcing is most commonly measured in units of watts per square meter (W/m2).</span></li><span data-dcnode-id="2247" instrument_node="">
</span><li data-dcnode-id="2242"><b data-dcnode-id="2244"><a data-dcnode-id="2245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rain_garden" title="Rain garden"><span data-dcnode-id="2246" instrument_node="">rain garden</span></a></b><span data-dcnode-id="2243" instrument_node=""> – an engineered area for the collection, infiltration and evapotranspiration of rainwater runoff, mostly from impervious surfaces; it reduces rain runoff by allowing stormwater to soak into the ground (as opposed to flowing into storm drains and surface waters which can cause erosion, water pollution, flooding, and diminished groundwater). They can also absorb water contaminants that would otherwise end up in water bodies. The terminology arose in Maryland, USA in 1990s as a more marketable expression for bioremediation.</span></li><span data-dcnode-id="2241" instrument_node="">
</span><li data-dcnode-id="2233"><b data-dcnode-id="2238"><a data-dcnode-id="2239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rainwater_harvesting" title="Rainwater harvesting"><span data-dcnode-id="2240" instrument_node="">rainwater harvesting</span></a></b><span data-dcnode-id="2237" instrument_node=""> – collecting rainwater either in storages or the soil mostly close to where it falls; the attempt to increase rainwater productivity by storing it in </span><a data-dcnode-id="2235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pondage" title="Pondage"><span data-dcnode-id="2236" instrument_node="">pondages</span></a><span data-dcnode-id="2234" instrument_node="">, wetlands etc., and helping to avoid the need for infrastructure to bring water from elsewhere. Practiced on a large scale upstream this reduces available water downstream.</span></li><span data-dcnode-id="2232" instrument_node="">
</span><li data-dcnode-id="2227"><b data-dcnode-id="2229"><a data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rangeland" title="Rangeland"><span data-dcnode-id="2231" instrument_node="">rangeland</span></a></b><span data-dcnode-id="2228" instrument_node=""> – a region where grazing or browsing livestock is the main land use.</span></li><span data-dcnode-id="2226" instrument_node="">
</span><li data-dcnode-id="2221"><b data-dcnode-id="2223"><a class="mw-redirect" data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raw_materials" title="Raw materials"><span data-dcnode-id="2225" instrument_node="">raw materials</span></a></b><span data-dcnode-id="2222" instrument_node=""> - materials that are extracted from the ground and processed e.g. bauxite is processed into aluminium.</span></li><span data-dcnode-id="2220" instrument_node="">
</span><li data-dcnode-id="2215"><b data-dcnode-id="2217"><a data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reclaimed_water" title="Reclaimed water"><span data-dcnode-id="2219" instrument_node="">reclaimed water</span></a></b><span data-dcnode-id="2216" instrument_node=""> -  water taken from a waste (effluent) stream and purified to a level suitable for further use.</span></li><span data-dcnode-id="2214" instrument_node="">
</span><li data-dcnode-id="2209"><b data-dcnode-id="2211"><a class="mw-redirect" data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recovered_material" title="Recovered material"><span data-dcnode-id="2213" instrument_node="">recovered material</span></a></b><span data-dcnode-id="2210" instrument_node=""> – (waste) material that would have otherwise been disposed of as waste or used for energy recovery, but has instead been collected and recovered (reclaimed) as a material input thus avoiding the use of new primary materials.</span></li><span data-dcnode-id="2208" instrument_node="">
</span><li data-dcnode-id="2203"><b data-dcnode-id="2205"><a class="mw-redirect" data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recovery_rate" title="Recovery rate"><span data-dcnode-id="2207" instrument_node="">recovery rate</span></a></b><span data-dcnode-id="2204" instrument_node=""> – (waste) the recovery rate is the percentage of materials consumed that is recovered for recycling.</span></li><span data-dcnode-id="2202" instrument_node="">
</span><li data-dcnode-id="2197"><b data-dcnode-id="2199"><a class="mw-redirect" data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recyclables" title="Recyclables"><span data-dcnode-id="2201" instrument_node="">recyclables</span></a></b><span data-dcnode-id="2198" instrument_node=""> – strictly, all materials that may be recycled, but this may include the recyclable containers and paper/cardboard component of kerbside waste (excluding garden organics).</span></li><span data-dcnode-id="2196" instrument_node="">
</span><li data-dcnode-id="2191"><b data-dcnode-id="2193"><a class="new" data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRecycled_content%26action%3Dedit%26redlink%3D1" title="Recycled content (page does not exist)"><span data-dcnode-id="2195" instrument_node="">recycled content</span></a></b><span data-dcnode-id="2192" instrument_node=""> - proportion, by mass, of recycled material in a product or packaging. Only pre-consumer and post-consumer materials are considered as recycled content.</span></li><span data-dcnode-id="2190" instrument_node="">
</span><li data-dcnode-id="2185"><b data-dcnode-id="2187"><a class="mw-redirect" data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recycled_material" title="Recycled material"><span data-dcnode-id="2189" instrument_node="">recycled material</span></a></b><span data-dcnode-id="2186" instrument_node=""> – see recovered material.</span></li><span data-dcnode-id="2184" instrument_node="">
</span><li data-dcnode-id="2179"><b data-dcnode-id="2181"><a class="mw-redirect" data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recycled_water" title="Recycled water"><span data-dcnode-id="2183" instrument_node="">recycled water</span></a></b><span data-dcnode-id="2180" instrument_node=""> – treated stormwater, greywater or blackwater suitable for uses like toilet flushing, irrigation, industry etc. It is non-drinking water and is indicated using a lilac non-drinking label.</span></li><span data-dcnode-id="2178" instrument_node="">
</span><li data-dcnode-id="2173"><b data-dcnode-id="2175"><a data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recycling" title="Recycling"><span data-dcnode-id="2177" instrument_node="">recycling</span></a></b><span data-dcnode-id="2174" instrument_node=""> - a wide range of activities, including collection, sorting, reprocessing and manufacture of products into new goods.</span></li><span data-dcnode-id="2172" instrument_node="">
</span><li data-dcnode-id="2167"><b data-dcnode-id="2169"><a data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reforestation" title="Reforestation"><span data-dcnode-id="2171" instrument_node="">reforestation</span></a></b><span data-dcnode-id="2168" instrument_node=""> – the direct human conversion of non-forested land to forested land through planting, seeding or promotion of natural seed sources, on land that was once forested but no longer so. According to the language of the Kyoto Protocol, for the first commitment period (2008–2012), reforestation activities are limited to reforestation occurring on lands that did not contain forest at the start of 1990; replanting of forests on lands that have recently been harvested.</span></li><span data-dcnode-id="2166" instrument_node="">
</span><li data-dcnode-id="2161"><b data-dcnode-id="2163"><a class="new" data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRegulating_services%26action%3Dedit%26redlink%3D1" title="Regulating services (page does not exist)"><span data-dcnode-id="2165" instrument_node="">regulating services</span></a></b><span data-dcnode-id="2162" instrument_node=""> – (sustainability) the benefits obtained from the regulation of ecosystem processes including, for example, the regulation of climate, water or disease.</span></li><span data-dcnode-id="2160" instrument_node="">
</span><li data-dcnode-id="2155"><b data-dcnode-id="2157"><a data-dcnode-id="2158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Renewable_energy" title="Renewable energy"><span data-dcnode-id="2159" instrument_node="">renewable energy</span></a></b><span data-dcnode-id="2156" instrument_node=""> - any source of energy that can be used without depleting its reserves. These sources include sunlight (solar energy) and other sources such as, wind, wave, biomass, geothermal and hydro energy.</span></li><span data-dcnode-id="2154" instrument_node="">
</span><li data-dcnode-id="2149"><b data-dcnode-id="2151"><a class="mw-redirect" data-dcnode-id="2152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Renewable_Energy_Certificates" title="Renewable Energy Certificates"><span data-dcnode-id="2153" instrument_node="">renewable energy certificates</span></a></b><span data-dcnode-id="2150" instrument_node=""> - Market trading mechanisms created through the Renewable Energy (Electricity) Act 2000 in connection with the commonwealth government's mandatory renewable energy target. The certificates provide a 'premium' revenue stream for electricity generated from renewable sources.</span></li><span data-dcnode-id="2148" instrument_node="">
</span><li data-dcnode-id="2143"><b data-dcnode-id="2145"><a data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recycling" title="Recycling"><span data-dcnode-id="2147" instrument_node="">reprocessing</span></a></b><span data-dcnode-id="2144" instrument_node=""> – (waste) changing the physical structure and properties of a waste material that would otherwise have been sent to landfill, in order to add financial value to the processed material, this may involve a range of technologies including composting, anaerobic digestion and energy from waste technologies such as pyrolysis, gasification and incineration.</span></li><span data-dcnode-id="2142" instrument_node="">
</span><li data-dcnode-id="2137"><b data-dcnode-id="2139"><a class="mw-redirect" data-dcnode-id="2140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Residual_waste" title="Residual waste"><span data-dcnode-id="2141" instrument_node="">residual waste</span></a></b><span data-dcnode-id="2138" instrument_node=""> – (waste) waste that remains after the separation of recyclable materials (including green waste).</span></li><span data-dcnode-id="2136" instrument_node="">
</span><li data-dcnode-id="2131"><b data-dcnode-id="2133"><a class="new" data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DResource_flow%26action%3Dedit%26redlink%3D1" title="Resource flow (page does not exist)"><span data-dcnode-id="2135" instrument_node="">resource flow</span></a></b><span data-dcnode-id="2132" instrument_node=""> - the totality of changes in multiple resource stocks, or at least any pair of them, over a specified period of time</span></li><span data-dcnode-id="2130" instrument_node="">
</span><li data-dcnode-id="2122"><b data-dcnode-id="2127"><a data-dcnode-id="2128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Resource_intensity" title="Resource intensity"><span data-dcnode-id="2129" instrument_node="">resource intensity</span></a></b><span data-dcnode-id="2126" instrument_node=""> – ratio of </span><a data-dcnode-id="2124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Resource_consumption" title="Resource consumption"><span data-dcnode-id="2125" instrument_node="">resource consumption</span></a><span data-dcnode-id="2123" instrument_node=""> relative to its economic or physical output; for example, litres of water used per dollar spent, or litres of water used per tonne of aluminium produced. At the national level, energy intensity is the ratio of total primary energy consumption of the country to either the gross domestic product, or the physical output (total goods produced).</span></li><span data-dcnode-id="2121" instrument_node="">
</span><li data-dcnode-id="2116"><b data-dcnode-id="2118"><a data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Resource_productivity" title="Resource productivity"><span data-dcnode-id="2120" instrument_node="">resource productivity</span></a></b><span data-dcnode-id="2117" instrument_node=""> – the output obtained for a given resource input.</span></li><span data-dcnode-id="2115" instrument_node="">
</span><li data-dcnode-id="2110"><b data-dcnode-id="2112"><a data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Resource_recovery" title="Resource recovery"><span data-dcnode-id="2114" instrument_node="">resource recovery</span></a></b><span data-dcnode-id="2111" instrument_node=""> – (waste) the process of obtaining matter or energy from discarded materials.</span></li><span data-dcnode-id="2109" instrument_node="">
</span><li data-dcnode-id="2104"><b data-dcnode-id="2106"><a class="new" data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DResource_stock%26action%3Dedit%26redlink%3D1" title="Resource stock (page does not exist)"><span data-dcnode-id="2108" instrument_node="">resource stock</span></a></b><span data-dcnode-id="2105" instrument_node=""> - the total amount of a resource often related to resource flow (the amount of resources harvested or used per unit of time). To harvest a resource stock sustainably, the harvest must not exceed the net production of the stock. Stocks are measured in mass, volume, or energy and flows in mass, volume, or energy per unit of time.</span></li><span data-dcnode-id="2103" instrument_node="">
</span><li data-dcnode-id="2089"><b data-dcnode-id="2100"><a data-dcnode-id="2101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Respiration_%28physiology%29" title="Respiration (physiology)"><span data-dcnode-id="2102" instrument_node="">respiration</span></a></b><span data-dcnode-id="2099" instrument_node=""> – (biology) uptake by a living organism of oxygen from the air (or water) which is then used to oxidise organic matter or food. The outputs of this oxidation are usually CO</span><sub data-dcnode-id="2097" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="2098" instrument_node="">2</span></sub><span data-dcnode-id="2096" instrument_node=""> and H</span><sub data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">2</span></sub><span data-dcnode-id="2093" instrument_node="">O; the metabolic process by which organisms meet their internal energy needs and release CO</span><sub data-dcnode-id="2091" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="2092" instrument_node="">2</span></sub><span data-dcnode-id="2090" instrument_node="">.</span></li><span data-dcnode-id="2088" instrument_node="">
</span><li data-dcnode-id="2083"><b data-dcnode-id="2085"><a data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Retail_therapy" title="Retail therapy"><span data-dcnode-id="2087" instrument_node="">retail therapy</span></a></b><span data-dcnode-id="2084" instrument_node=""> – using shopping to obtain a ‘lift’ to make up for other things lacking in our lives.</span></li><span data-dcnode-id="2082" instrument_node="">
</span><li data-dcnode-id="2077"><b data-dcnode-id="2079"><a class="mw-redirect" data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Retrofit" title="Retrofit"><span data-dcnode-id="2081" instrument_node="">retrofit</span></a></b><span data-dcnode-id="2078" instrument_node=""> - to replace existing items with updated items.</span></li><span data-dcnode-id="2076" instrument_node="">
</span><li data-dcnode-id="2071"><b data-dcnode-id="2073"><a data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reuse" title="Reuse"><span data-dcnode-id="2075" instrument_node="">reuse</span></a></b><span data-dcnode-id="2072" instrument_node=""> - the second pillar of the waste hierarchy - recovering value from a discarded resource without reprocessing or remanufacture e.g.clothes sold though opportunity shops strictly represent a form of re-use, rather than recycling</span></li><span data-dcnode-id="2070" instrument_node="">
</span><li data-dcnode-id="2065"><b data-dcnode-id="2067"><a data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Risk" title="Risk"><span data-dcnode-id="2069" instrument_node="">risk</span></a></b><span data-dcnode-id="2066" instrument_node=""> – the probability of a (negative) occurrence.</span></li></ul><span data-dcnode-id="2063" instrument_node="">
</span><h2 data-dcnode-id="2053"><span class="mw-headline" data-dcnode-id="2061" id="S"><span data-dcnode-id="2062" instrument_node="">S</span></span><span class="mw-editsection" data-dcnode-id="2054"><span class="mw-editsection-bracket" data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">[</span></span><a data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D19" title="Edit section: S"><span data-dcnode-id="2058" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2052" instrument_node="">
</span><ul data-dcnode-id="1682"><li data-dcnode-id="2047"><b data-dcnode-id="2049"><a class="mw-redirect" data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salinisation" title="Salinisation"><span data-dcnode-id="2051" instrument_node="">salinisation</span></a></b><span data-dcnode-id="2048" instrument_node=""> – (ecology) the process by which land becomes salt-affected.</span></li><span data-dcnode-id="2046" instrument_node="">
</span><li data-dcnode-id="2041"><b data-dcnode-id="2043"><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salinity" title="Salinity"><span data-dcnode-id="2045" instrument_node="">salinity</span></a></b><span data-dcnode-id="2042" instrument_node=""> – (ecology) salt in water and soils, generally in the context of human activity such as clearing and planting for annual crops rather than perennial trees and shrubs. Can make soils infertile.</span></li><span data-dcnode-id="2040" instrument_node="">
</span><li data-dcnode-id="2035"><b data-dcnode-id="2037"><a class="mw-redirect" data-dcnode-id="2038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scale_factor" title="Scale factor"><span data-dcnode-id="2039" instrument_node="">scale</span></a></b><span data-dcnode-id="2036" instrument_node=""> – the physical dimensions, in either space or time, of phenomena or events; cf. a level which may or may not have a scale.</span></li><span data-dcnode-id="2034" instrument_node="">
</span><li data-dcnode-id="2029"><b data-dcnode-id="2031"><a class="mw-redirect" data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sector_%28economics%29" title="Sector (economics)"><span data-dcnode-id="2033" instrument_node="">sectors</span></a></b><span data-dcnode-id="2030" instrument_node=""> – (economics) economic groupings used to generalise patterns of expenditure and use.</span></li><span data-dcnode-id="2028" instrument_node="">
</span><li data-dcnode-id="2023"><b data-dcnode-id="2025"><a data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sediment" title="Sediment"><span data-dcnode-id="2027" instrument_node="">sediment</span></a></b><span data-dcnode-id="2024" instrument_node=""> – (ecology) soil or other particles that settle to the bottom of water bodies.</span></li><span data-dcnode-id="2022" instrument_node="">
</span><li data-dcnode-id="2017"><b data-dcnode-id="2019"><a class="mw-redirect" data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-organisation" title="Self-organisation"><span data-dcnode-id="2021" instrument_node="">self-organisation</span></a></b><span data-dcnode-id="2018" instrument_node=""> – the process by which systems use energy to develop structure and organisation.</span></li><span data-dcnode-id="2016" instrument_node="">
</span><li data-dcnode-id="2011"><b data-dcnode-id="2013"><a class="new" data-dcnode-id="2014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSentinel_indicator%26action%3Dedit%26redlink%3D1" title="Sentinel indicator (page does not exist)"><span data-dcnode-id="2015" instrument_node="">sentinel indicator</span></a></b><span data-dcnode-id="2012" instrument_node=""> – (ecology) an indicator that captures the essence of the process of change affecting a broad area of interest and which is also easily communicated.</span></li><span data-dcnode-id="2010" instrument_node="">
</span><li data-dcnode-id="2005"><b data-dcnode-id="2007"><a class="new" data-dcnode-id="2008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSeptic_sewage%26action%3Dedit%26redlink%3D1" title="Septic sewage (page does not exist)"><span data-dcnode-id="2009" instrument_node="">septic sewage</span></a></b><span data-dcnode-id="2006" instrument_node=""> – sewage in which anaerobic respiration is taking place characterised by a blackish colour and smell of hydrogen sulphide.</span></li><span data-dcnode-id="2004" instrument_node="">
</span><li data-dcnode-id="1999"><b data-dcnode-id="2001"><a data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Septic_tank" title="Septic tank"><span data-dcnode-id="2003" instrument_node="">septic tank</span></a></b><span data-dcnode-id="2000" instrument_node=""> - a type of sedimentation tank in which the sludge is retained long enough for the organic content to undergo anaerobic digestion. Typically used for receiving the sewage from houses and other premises that are too isolated for connection to a sewer.</span></li><span data-dcnode-id="1998" instrument_node="">
</span><li data-dcnode-id="1990"><b data-dcnode-id="1995"><a class="mw-redirect" data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CO2_sequestration" title="CO2 sequestration"><span data-dcnode-id="1997" instrument_node="">sequestration</span></a></b><span data-dcnode-id="1994" instrument_node=""> – (global warming) the removal of carbon dioxide from the Earth's atmosphere and storage in a sink as when trees absorb CO</span><sub data-dcnode-id="1992" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="1993" instrument_node="">2</span></sub><span data-dcnode-id="1991" instrument_node=""> in photosynthesis and store it in their tissues.</span></li><span data-dcnode-id="1989" instrument_node="">
</span><li data-dcnode-id="1984"><b data-dcnode-id="1986"><a data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sewage" title="Sewage"><span data-dcnode-id="1988" instrument_node="">sewage</span></a></b><span data-dcnode-id="1985" instrument_node="">- water and raw effluent disposed through toilets, kitchens and bathrooms. Includes water-borne wastes from domestic uses of water from households, or similar uses in trade or industry.</span></li><span data-dcnode-id="1983" instrument_node="">
</span><li data-dcnode-id="1978"><b data-dcnode-id="1980"><a data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanitary_sewer" title="Sanitary sewer"><span data-dcnode-id="1982" instrument_node="">sewer</span></a></b><span data-dcnode-id="1979" instrument_node=""> - a pipe conveying sewage.</span></li><span data-dcnode-id="1977" instrument_node="">
</span><li data-dcnode-id="1972"><b data-dcnode-id="1974"><a data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanitary_sewer" title="Sanitary sewer"><span data-dcnode-id="1976" instrument_node="">sewerage</span></a></b><span data-dcnode-id="1973" instrument_node=""> - a system of pipes and mechanical appliances for the collection and transportation of domestic and industrial sewages.</span></li><span data-dcnode-id="1971" instrument_node="">
</span><li data-dcnode-id="1966"><b data-dcnode-id="1968"><a class="mw-redirect" data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sewerage_system" title="Sewerage system"><span data-dcnode-id="1970" instrument_node="">sewerage system</span></a></b><span data-dcnode-id="1967" instrument_node=""> – sewage system infrastructure: the network of pipes, pumping stations and treatment plants used to collect, transport, treat and discharge sewage.</span></li><span data-dcnode-id="1965" instrument_node="">
</span><li data-dcnode-id="1960"><b data-dcnode-id="1962"><a class="mw-redirect" data-dcnode-id="1963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sewer-mining" title="Sewer-mining"><span data-dcnode-id="1964" instrument_node="">sewer-mining</span></a></b><span data-dcnode-id="1961" instrument_node=""> - tapping directly into a sewer (either before or after a sewage treatment plant) and extracting wastewater for treatment and use.</span></li><span data-dcnode-id="1959" instrument_node="">
</span><li data-dcnode-id="1954"><b data-dcnode-id="1956"><a class="new" data-dcnode-id="1957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DShredder_flock%26action%3Dedit%26redlink%3D1" title="Shredder flock (page does not exist)"><span data-dcnode-id="1958" instrument_node="">shredder flock</span></a></b><span data-dcnode-id="1955" instrument_node=""> - the residue from shredded car bodies, whitegoods and the like.</span></li><span data-dcnode-id="1953" instrument_node="">
</span><li data-dcnode-id="1944"><i data-dcnode-id="1949"><b data-dcnode-id="1950"><a data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silent_Spring" title="Silent Spring"><span data-dcnode-id="1952" instrument_node="">Silent Spring</span></a></b></i><span data-dcnode-id="1948" instrument_node="">  - environmental science book by Rachel Carson published in 1962 that inspired the environmental movement and later led to the creation of the U.S. </span><a class="mw-redirect" data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_Protection_Agency" title="Environmental Protection Agency"><span data-dcnode-id="1947" instrument_node="">Environmental Protection Agency</span></a><span data-dcnode-id="1945" instrument_node=""> in 1970.</span></li><span data-dcnode-id="1943" instrument_node="">
</span><li data-dcnode-id="1938"><b data-dcnode-id="1940"><a data-dcnode-id="1941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Simple_living" title="Simple living"><span data-dcnode-id="1942" instrument_node="">simple living</span></a></b><span data-dcnode-id="1939" instrument_node=""> - a lifestyle individuals may pursue for a variety of motivations, such as spirituality, health, or ecology. Others may choose simple living for reasons of social justice or a rejection of consumerism. Some may emphasise an explicit rejection of "westernised values", while others choose to live more simply for reasons of personal taste, a sense of fairness or for personal economy. Simple living as a concept is distinguished from the simple lifestyles of those living in conditions of poverty in that its proponents are consciously choosing to not focus on wealth directly tied to money or cash-based economics.</span></li><span data-dcnode-id="1937" instrument_node="">
</span><li data-dcnode-id="1932"><b data-dcnode-id="1934"><a class="mw-redirect" data-dcnode-id="1935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sinks" title="Sinks"><span data-dcnode-id="1936" instrument_node="">sinks</span></a></b><span data-dcnode-id="1933" instrument_node=""> - processes or places that remove or store gases, solutes or solids; any process, activity or mechanism that results in the net removal of greenhouse gases, aerosols, or precursors of greenhouse gases from the atmosphere.</span></li><span data-dcnode-id="1931" instrument_node="">
</span><li data-dcnode-id="1926"><b data-dcnode-id="1928"><a data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slow_Food" title="Slow Food"><span data-dcnode-id="1930" instrument_node="">slow Food</span></a></b><span data-dcnode-id="1927" instrument_node=""> –  the slow food movement was founded in Italy in 1986 by Carlo Petrini as a response to the negative impact of multinational food industries. Slow Food is a counteracting force to Fast Food as it encourages using local seasonal produce, restoring time-honoured methods of production and preparation, and sharing food at communal tables. Slow Food encourages environmentally sustainable production, ethical treatment of animals and social justice. Gatherings of Slow Food supporters are called convivia and in September Victoria has 11 of these. Slow Food members seek to defend biodiversity in our food supply, to better appreciate how our lives can be improved by understanding the sensation of taste, and to celebrate the connection between plate and planet.</span></li><span data-dcnode-id="1925" instrument_node="">
</span><li data-dcnode-id="1920"><b data-dcnode-id="1922"><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sludge" title="Sludge"><span data-dcnode-id="1924" instrument_node="">sludge</span></a></b><span data-dcnode-id="1921" instrument_node=""> - waste in a state between liquid and solid.</span></li><span data-dcnode-id="1919" instrument_node="">
</span><li data-dcnode-id="1914"><b data-dcnode-id="1916"><a class="mw-redirect" data-dcnode-id="1917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sodicity" title="Sodicity"><span data-dcnode-id="1918" instrument_node="">sodicity</span></a></b><span data-dcnode-id="1915" instrument_node=""> – (ecology) a measure of the sodium content of soil. Sodic soils are dispersible and are thus vulnerable to erosion.</span></li><span data-dcnode-id="1913" instrument_node="">
</span><li data-dcnode-id="1908"><b data-dcnode-id="1910"><a class="mw-redirect" data-dcnode-id="1911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sodification" title="Sodification"><span data-dcnode-id="1912" instrument_node="">sodification</span></a></b><span data-dcnode-id="1909" instrument_node=""> - the build-up in soils of sodium relative to potassium and magnesium in the composition of the exchangeable cations of the clay fraction.</span></li><span data-dcnode-id="1907" instrument_node="">
</span><li data-dcnode-id="1902"><b data-dcnode-id="1904"><a data-dcnode-id="1905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soil_acidification" title="Soil acidification"><span data-dcnode-id="1906" instrument_node="">soil acidification</span></a></b><span data-dcnode-id="1903" instrument_node=""> -  reduction in pH, usually in soil. Acidification can result in poorly structured or hard-setting topsoils that cannot support sufficient vegetation to prevent erosion.</span></li><span data-dcnode-id="1901" instrument_node="">
</span><li data-dcnode-id="1896"><b data-dcnode-id="1898"><a class="new" data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoil_bulk_density%26action%3Dedit%26redlink%3D1" title="Soil bulk density (page does not exist)"><span data-dcnode-id="1900" instrument_node="">soil bulk density</span></a></b><span data-dcnode-id="1897" instrument_node=""> – the relative density of a soil measured by dividing the dry weight of a soil by its volume.</span></li><span data-dcnode-id="1895" instrument_node="">
</span><li data-dcnode-id="1890"><b data-dcnode-id="1892"><a data-dcnode-id="1893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soil_compaction" title="Soil compaction"><span data-dcnode-id="1894" instrument_node="">soil compaction</span></a></b><span data-dcnode-id="1891" instrument_node=""> – the degree of compression of soil. Heavy compaction can impede plant growth.</span></li><span data-dcnode-id="1889" instrument_node="">
</span><li data-dcnode-id="1884"><b data-dcnode-id="1886"><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soil_conditioner" title="Soil conditioner"><span data-dcnode-id="1888" instrument_node="">soil conditioner</span></a></b><span data-dcnode-id="1885" instrument_node=""> - any composted or non-composted material of organic origin that is produced or distributed for adding to soils, it includes 'soil amendment', 'soil additive', 'soil improver' and similar materials, but excludes polymers that do not biodegrade, such as plastics, rubbers, and coatings.</span></li><span data-dcnode-id="1883" instrument_node="">
</span><li data-dcnode-id="1878"><b data-dcnode-id="1880"><a class="new" data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoil_moisture_deficit%26action%3Dedit%26redlink%3D1" title="Soil moisture deficit (page does not exist)"><span data-dcnode-id="1882" instrument_node="">soil moisture deficit</span></a></b><span data-dcnode-id="1879" instrument_node=""> – the volume of water needed to raise the soil water content of the root zone to field capacity.</span></li><span data-dcnode-id="1877" instrument_node="">
</span><li data-dcnode-id="1872"><b data-dcnode-id="1874"><a class="mw-redirect" data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soil_organic_carbon" title="Soil organic carbon"><span data-dcnode-id="1876" instrument_node="">soil organic carbon</span></a></b><span data-dcnode-id="1873" instrument_node=""> (SOC) – the total organic carbon of a soil exclusive of carbon from undecayed plant and animal residue.</span></li><span data-dcnode-id="1871" instrument_node="">
</span><li data-dcnode-id="1866"><b data-dcnode-id="1868"><a data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soil_organic_matter" title="Soil organic matter"><span data-dcnode-id="1870" instrument_node="">soil organic matter</span></a></b><span data-dcnode-id="1867" instrument_node=""> (SOM) – the organic fraction of the soil exclusive of undecayed plant and animal residues.</span></li><span data-dcnode-id="1865" instrument_node="">
</span><li data-dcnode-id="1860"><b data-dcnode-id="1862"><a data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soil_structure" title="Soil structure"><span data-dcnode-id="1864" instrument_node="">soil structure</span></a></b><span data-dcnode-id="1861" instrument_node=""> – the way soil particles are aggregated into aggregates or “crumbs”, important for the passage of air and water</span></li><span data-dcnode-id="1859" instrument_node="">
</span><li data-dcnode-id="1854"><b data-dcnode-id="1856"><a class="new" data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoil_water_storage%26action%3Dedit%26redlink%3D1" title="Soil water storage (page does not exist)"><span data-dcnode-id="1858" instrument_node="">soil water storage</span></a></b><span data-dcnode-id="1855" instrument_node=""> – total amount of water stored in the soil in the plant root zone.</span></li><span data-dcnode-id="1853" instrument_node="">
</span><li data-dcnode-id="1848"><b data-dcnode-id="1850"><a data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_energy" title="Solar energy"><span data-dcnode-id="1852" instrument_node="">solar energy</span></a></b><span data-dcnode-id="1849" instrument_node=""> - the radiant energy of the Sun, which can be converted into other forms of energy, such as heat or electricity.</span></li><span data-dcnode-id="1847" instrument_node="">
</span><li data-dcnode-id="1842"><b data-dcnode-id="1844"><a data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_power" title="Solar power"><span data-dcnode-id="1846" instrument_node="">solar power</span></a></b><span data-dcnode-id="1843" instrument_node=""> - electricity generated from solar radiation.</span></li><span data-dcnode-id="1841" instrument_node="">
</span><li data-dcnode-id="1836"><b data-dcnode-id="1838"><a class="new" data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSolid_industrial_waste%26action%3Dedit%26redlink%3D1" title="Solid industrial waste (page does not exist)"><span data-dcnode-id="1840" instrument_node="">solid industrial waste</span></a></b><span data-dcnode-id="1837" instrument_node=""> - solid waste generated from commercial, industrial or trade activities, including waste from factories, offices, schools, universities, State and Federal government operations and commercial construction and demolition work. Excludes wastes that are prescribed under the Environment Protection Act 1970 and quarantine wastes.</span></li><span data-dcnode-id="1835" instrument_node="">
</span><li data-dcnode-id="1830"><b data-dcnode-id="1832"><a class="new" data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSolid_inert_waste%26action%3Dedit%26redlink%3D1" title="Solid inert waste (page does not exist)"><span data-dcnode-id="1834" instrument_node="">solid inert waste</span></a></b><span data-dcnode-id="1831" instrument_node=""> - hard waste and dry vegetative material and which as a negligible activity or effect on the environment, such as demolition material, concrete, bricks, plastic, glass, metals and shredded tyres.</span></li><span data-dcnode-id="1829" instrument_node="">
</span><li data-dcnode-id="1824"><b data-dcnode-id="1826"><a class="mw-redirect" data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solid_waste" title="Solid waste"><span data-dcnode-id="1828" instrument_node="">solid waste</span></a></b><span data-dcnode-id="1825" instrument_node=""> - non-hazardous, non-prescribed solid waste materials ranging from municipal garbage to industrial waste, generally: domestic and municipal; commercial and industrial; construction and demolition; other.</span></li><span data-dcnode-id="1823" instrument_node="">
</span><li data-dcnode-id="1818"><b data-dcnode-id="1820"><a class="mw-redirect" data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waste_separation" title="Waste separation"><span data-dcnode-id="1822" instrument_node="">source separation</span></a></b><span data-dcnode-id="1819" instrument_node=""> – (waste) separation of recyclable material from other waste at the point and time the waste is generated, i.e. at its source. This includes separation of recyclable material into its component categories, e.t. paper, glass, aluminium, and may include further separation within each category, e.g. paper into computer paper, office whites and newsprint; The practice of segregating materials into discrete materials streams prior to collection by or delivery to reprocessing facilities.</span></li><span data-dcnode-id="1817" instrument_node="">
</span><li data-dcnode-id="1812"><b data-dcnode-id="1814"><a data-dcnode-id="1815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Generalist_and_specialist_species" title="Generalist and specialist species"><span data-dcnode-id="1816" instrument_node="">specialist species</span></a></b><span data-dcnode-id="1813" instrument_node=""> – those that can only thrive in a narrow range of environmental conditions and/or have a limited diet.</span></li><span data-dcnode-id="1811" instrument_node="">
</span><li data-dcnode-id="1806"><b data-dcnode-id="1808"><a data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Specific_heat_capacity" title="Specific heat capacity"><span data-dcnode-id="1810" instrument_node="">specific heat capacity</span></a></b><span data-dcnode-id="1807" instrument_node=""> – the amount of energy needed to increase the temperature of 1&nbsp;kg of a substance by 1oC. It can be considered a measure of resistance to an increase in temperature and important for energy saving.</span></li><span data-dcnode-id="1805" instrument_node="">
</span><li data-dcnode-id="1800"><b data-dcnode-id="1802"><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Project_stakeholder" title="Project stakeholder"><span data-dcnode-id="1804" instrument_node="">stakeholders</span></a></b><span data-dcnode-id="1801" instrument_node=""> - parties having an interest in a particular project or outcome.</span></li><span data-dcnode-id="1799" instrument_node="">
</span><li data-dcnode-id="1794"><b data-dcnode-id="1796"><a class="new" data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DState_Environment_Protection_Policies%26action%3Dedit%26redlink%3D1" title="State Environment Protection Policies (page does not exist)"><span data-dcnode-id="1798" instrument_node="">State Environment Protection Policies</span></a></b><span data-dcnode-id="1795" instrument_node=""> - statutory instruments under the Environment Protection Act 1970 that identify beneficial uses of the environment that are to be protected, establish environmental indicators and objectives and define attainment programs to implement the policies.</span></li><span data-dcnode-id="1793" instrument_node="">
</span><li data-dcnode-id="1788"><b data-dcnode-id="1790"><a class="mw-redirect" data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_of_the_Environment_reporting" title="State of the Environment reporting"><span data-dcnode-id="1792" instrument_node="">State of the Environment reporting</span></a></b><span data-dcnode-id="1789" instrument_node=""> - a scientific assessment of environmental conditions, focusing on the impacts of human activities, their significance for the environment and social responses to the identified trends.</span></li><span data-dcnode-id="1787" instrument_node="">
</span><li data-dcnode-id="1782"><b data-dcnode-id="1784"><a data-dcnode-id="1785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steady_state" title="Steady state"><span data-dcnode-id="1786" instrument_node="">steady state</span></a></b><span data-dcnode-id="1783" instrument_node=""> – a constant pattern e.g. a balance of inflows and outflows.</span></li><span data-dcnode-id="1781" instrument_node="">
</span><li data-dcnode-id="1776"><b data-dcnode-id="1778"><a data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stormwater" title="Stormwater"><span data-dcnode-id="1780" instrument_node="">stormwater</span></a></b><span data-dcnode-id="1777" instrument_node=""> – rainfall that accumulates in natural or artificial systems after heavy rain; surface run-off or water sent to (stormwater) drains during heavy rain.</span></li><span data-dcnode-id="1775" instrument_node="">
</span><li data-dcnode-id="1770"><b data-dcnode-id="1772"><a class="mw-redirect" data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strategic_Environmental_Assessment" title="Strategic Environmental Assessment"><span data-dcnode-id="1774" instrument_node="">strategic Environmental Assessment</span></a></b><span data-dcnode-id="1771" instrument_node=""> (SEA) - a system of incorporating environmental considerations into policies, plans and programs esp in the EU.</span></li><span data-dcnode-id="1769" instrument_node="">
</span><li data-dcnode-id="1764"><b data-dcnode-id="1766"><a class="mw-redirect" data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sullage" title="Sullage"><span data-dcnode-id="1768" instrument_node="">sullage</span></a></b><span data-dcnode-id="1765" instrument_node=""> – domestic waste water from baths, basins, showers, laundries, kitchens and floor waste (but not from toilets).</span></li><span data-dcnode-id="1763" instrument_node="">
</span><li data-dcnode-id="1758"><b data-dcnode-id="1760"><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Superfund" title="Superfund"><span data-dcnode-id="1762" instrument_node="">Superfund</span></a></b><span data-dcnode-id="1759" instrument_node=""> –a United States federal government program designed to fund the cleanup of sites contaminated with hazardous substances and pollutants. It was established as the Comprehensive Environmental Response, Compensation, and Liability Act of 1980 (CERCLA).</span></li><span data-dcnode-id="1757" instrument_node="">
</span><li data-dcnode-id="1752"><b data-dcnode-id="1754"><a class="new" data-dcnode-id="1755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSupporting_services%26action%3Dedit%26redlink%3D1" title="Supporting services (page does not exist)"><span data-dcnode-id="1756" instrument_node="">supporting services</span></a></b><span data-dcnode-id="1753" instrument_node=""> – (sustainability) ecosystem services that are necessary for the production of all other ecosystem services e.g. biomass production, production of atmospheric oxygen, soil formation, nutrient and water cycling.</span></li><span data-dcnode-id="1751" instrument_node="">
</span><li data-dcnode-id="1746"><b data-dcnode-id="1748"><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Surface_runoff" title="Surface runoff"><span data-dcnode-id="1750" instrument_node="">surface runoff</span></a></b><span data-dcnode-id="1747" instrument_node=""> – that part of rainfall passing out of an area into the drainage system.</span></li><span data-dcnode-id="1745" instrument_node="">
</span><li data-dcnode-id="1740"><b data-dcnode-id="1742"><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suspended_solids" title="Suspended solids"><span data-dcnode-id="1744" instrument_node="">suspended solids</span></a></b><span data-dcnode-id="1741" instrument_node=""> (SS) – solid particles suspended in water; used as an indicator of water quality.</span></li><span data-dcnode-id="1739" instrument_node="">
</span><li data-dcnode-id="1734"><b data-dcnode-id="1736"><a data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sustainability" title="Sustainability"><span data-dcnode-id="1738" instrument_node="">sustainability</span></a></b><span data-dcnode-id="1735" instrument_node=""> - the Brundtland definition is ‘Sustainable development is development that meets the needs of the present without compromising the ability of future generations to meet their own needs’.</span></li><span data-dcnode-id="1733" instrument_node="">
</span><li data-dcnode-id="1728"><b data-dcnode-id="1730"><a class="new" data-dcnode-id="1731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSustainability_covenant%26action%3Dedit%26redlink%3D1" title="Sustainability covenant (page does not exist)"><span data-dcnode-id="1732" instrument_node="">sustainability covenant</span></a></b><span data-dcnode-id="1729" instrument_node=""> - Under Section 49 of the Environment Protection Act 1970, a Sustainability Covenant is an agreement which a person or body undertakes to increase the resource use efficiency and/or reduce ecological impacts of activities, products, services and production processes. Parties can voluntarily enter into such agreements with EPA, or could be required to if they are declared by Governor in Council, on the recommendation of EPA, to have potential for significant impact on the environment.</span></li><span data-dcnode-id="1727" instrument_node="">
</span><li data-dcnode-id="1716"><b data-dcnode-id="1724"><a data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sustainability_science" title="Sustainability science"><span data-dcnode-id="1726" instrument_node="">sustainability science</span></a></b><span data-dcnode-id="1723" instrument_node=""> - the multidisciplinary scientific study of sustainability, focusing especially on the quantitative dynamic interactions between nature and society. Its objective is a deeper and more fundamental understanding of the rapidly growing inter-dependence of the nature-society system and the intention to make this sustainable. It critically examines the tools used by </span><a data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sustainability_accounting" title="Sustainability accounting"><span data-dcnode-id="1722" instrument_node="">sustainability accounting</span></a><span data-dcnode-id="1720" instrument_node=""> and the methods of </span><a class="mw-redirect" data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sustainability_governance" title="Sustainability governance"><span data-dcnode-id="1719" instrument_node="">sustainability governance</span></a><span data-dcnode-id="1717" instrument_node="">.</span></li><span data-dcnode-id="1715" instrument_node="">
</span><li data-dcnode-id="1707"><b data-dcnode-id="1712"><a class="new" data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSustainability_Triangle%26action%3Dedit%26redlink%3D1" title="Sustainability Triangle (page does not exist)"><span data-dcnode-id="1714" instrument_node="">sustainability Triangle</span></a></b><span data-dcnode-id="1711" instrument_node=""> – a graphic indication of the action needed to stabilize CO</span><sub data-dcnode-id="1709" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="1710" instrument_node="">2</span></sub><span data-dcnode-id="1708" instrument_node=""> levels below about 500 ppm. It shows stabilization ‘wedges’ indicating savings made per year by the use of a particular strategy.</span></li><span data-dcnode-id="1706" instrument_node="">
</span><li data-dcnode-id="1701"><b data-dcnode-id="1703"><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sustainable_consumption" title="Sustainable consumption"><span data-dcnode-id="1705" instrument_node="">sustainable consumption</span></a></b><span data-dcnode-id="1702" instrument_node=""> - sustainable resource use - a change to society's historical patterns of consumption and behaviour that enables consumers to satisfy their needs with better performing products or services that use fewer resources, cause less pollution and contribute to social progress worldwide.</span></li><span data-dcnode-id="1700" instrument_node="">
</span><li data-dcnode-id="1695"><b data-dcnode-id="1697"><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sustainable_development" title="Sustainable development"><span data-dcnode-id="1699" instrument_node="">sustainable development</span></a></b><span data-dcnode-id="1696" instrument_node=""> – see Sustainability.</span></li><span data-dcnode-id="1694" instrument_node="">
</span><li data-dcnode-id="1689"><b data-dcnode-id="1691"><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bioswale" title="Bioswale"><span data-dcnode-id="1693" instrument_node="">swale</span></a></b><span data-dcnode-id="1690" instrument_node=""> – an open channel transporting surface run-off to a drainage system, usually grassed; a swale promotes infiltration, the filtration of sediment by plants and ornamental interest.</span></li><span data-dcnode-id="1688" instrument_node="">
</span><li data-dcnode-id="1683"><b data-dcnode-id="1685"><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/System" title="System"><span data-dcnode-id="1687" instrument_node="">system</span></a></b><span data-dcnode-id="1684" instrument_node=""> – a set of parts organised into a whole, usually processing a flow of energy.</span></li></ul><span data-dcnode-id="1681" instrument_node="">
</span><h2 data-dcnode-id="1671"><span class="mw-headline" data-dcnode-id="1679" id="T"><span data-dcnode-id="1680" instrument_node="">T</span></span><span class="mw-editsection" data-dcnode-id="1672"><span class="mw-editsection-bracket" data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">[</span></span><a data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D20" title="Edit section: T"><span data-dcnode-id="1676" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1670" instrument_node="">
</span><ul data-dcnode-id="1568"><li data-dcnode-id="1665"><b data-dcnode-id="1667"><a class="mw-redirect" data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Take-back" title="Take-back"><span data-dcnode-id="1669" instrument_node="">take-back</span></a></b><span data-dcnode-id="1666" instrument_node=""> - a concept commonly associated with product stewardship, placing responsibility on brand-owners, retailers, manufacturers or other supply chain partners to accept products returned by consumers once they have reached the end of their useful life. Products may then be recycled, treated or sent to landfill.</span></li><span data-dcnode-id="1664" instrument_node="">
</span><li data-dcnode-id="1659"><b data-dcnode-id="1661"><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Novel_ecosystem" title="Novel ecosystem"><span data-dcnode-id="1663" instrument_node="">technosphere</span></a></b><span data-dcnode-id="1660" instrument_node=""> – synthetic and composite components and materials for med by human activity. True technosphere materials, like plastics, are not biodegradable.</span></li><span data-dcnode-id="1658" instrument_node="">
</span><li data-dcnode-id="1653"><b data-dcnode-id="1655"><a class="mw-redirect" data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temperate" title="Temperate"><span data-dcnode-id="1657" instrument_node="">temperate</span></a></b><span data-dcnode-id="1654" instrument_node=""> – with moderate temperatures, weather, or climate; neither hot nor cold; mean annual temperature between 0 – 20 deg C.</span></li><span data-dcnode-id="1652" instrument_node="">
</span><li data-dcnode-id="1647"><b data-dcnode-id="1649"><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thermal_mass" title="Thermal mass"><span data-dcnode-id="1651" instrument_node="">thermal mass</span></a></b><span data-dcnode-id="1648" instrument_node=""> – (architecture) any mass that can absorb and store heat and can therefore be used to buffer temperature change. Concrete, bricks and tiles need a lot of heat energy to change their temperature and therefore have high thermal mass, timber has low thermal mass.</span></li><span data-dcnode-id="1646" instrument_node="">
</span><li data-dcnode-id="1641"><b data-dcnode-id="1643"><a class="new" data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThird_pipe_system%26action%3Dedit%26redlink%3D1" title="Third pipe system (page does not exist)"><span data-dcnode-id="1645" instrument_node="">third pipe system</span></a></b><span data-dcnode-id="1642" instrument_node=""> – a third pipe, in addition to the standard water supply pipe and sewer disposal pipe, which carries recycled water for irrigation purposes.</span></li><span data-dcnode-id="1640" instrument_node="">
</span><li data-dcnode-id="1635"><b data-dcnode-id="1637"><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecological_threshold" title="Ecological threshold"><span data-dcnode-id="1639" instrument_node="">threshold</span></a></b><span data-dcnode-id="1636" instrument_node=""> – (ecology) a point that, when crossed, can bring rapid and sometimes unpredictable change in a trend. An example would be the sudden altering of ocean currents due to the melting of ice at the poles.</span></li><span data-dcnode-id="1634" instrument_node="">
</span><li data-dcnode-id="1629"><b data-dcnode-id="1631"><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Topsoil" title="Topsoil"><span data-dcnode-id="1633" instrument_node="">topsoil</span></a></b><span data-dcnode-id="1630" instrument_node=""> – mostly fertile surface soil moved or introduced to topdress gardens, roadbanks, lawns etc.</span></li><span data-dcnode-id="1628" instrument_node="">
</span><li data-dcnode-id="1623"><b data-dcnode-id="1625"><a class="new" data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTotal_energy_use%26action%3Dedit%26redlink%3D1" title="Total energy use (page does not exist)"><span data-dcnode-id="1627" instrument_node="">total energy use</span></a></b><span data-dcnode-id="1624" instrument_node=""> –  as applied in this book is the total of combined direct and indirect energy use</span></li><span data-dcnode-id="1622" instrument_node="">
</span><li data-dcnode-id="1617"><b data-dcnode-id="1619"><a data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Total_fertility_rate" title="Total fertility rate"><span data-dcnode-id="1621" instrument_node="">total fertility rate</span></a></b><span data-dcnode-id="1618" instrument_node=""> – the number of children that, on average, a woman would have in her lifetime at present age-specific fertility rates. Calculated as the average number of children born per woman of every given age in a particular year and totalled for all ages.</span></li><span data-dcnode-id="1616" instrument_node="">
</span><li data-dcnode-id="1608"><b data-dcnode-id="1613"><a class="new" data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTotal_water_use%26action%3Dedit%26redlink%3D1" title="Total water use (page does not exist)"><span data-dcnode-id="1615" instrument_node="">total water use</span></a></b><span data-dcnode-id="1612" instrument_node=""> - in </span><a class="new" data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWater_accounting%26action%3Dedit%26redlink%3D1" title="Water accounting (page does not exist)"><span data-dcnode-id="1611" instrument_node="">water accounting</span></a><span data-dcnode-id="1609" instrument_node="">: distributed water use + self-extracted water use + reuse water use cf. water consumption; here used to mean total direct and indirect water use.</span></li><span data-dcnode-id="1607" instrument_node="">
</span><li data-dcnode-id="1602"><b data-dcnode-id="1604"><a class="new" data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTown_water%26action%3Dedit%26redlink%3D1" title="Town water (page does not exist)"><span data-dcnode-id="1606" instrument_node="">town water</span></a></b><span data-dcnode-id="1603" instrument_node=""> – water supplied by government or private enterprise and known as the mains or reticulated water supply.</span></li><span data-dcnode-id="1601" instrument_node="">
</span><li data-dcnode-id="1596"><b data-dcnode-id="1598"><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transfer_station_%28waste_management%29" title="Transfer station (waste management)"><span data-dcnode-id="1600" instrument_node="">transfer station</span></a></b><span data-dcnode-id="1597" instrument_node=""> – (waste) a facility allowing drop-off and consolidation of garbage and a wide range of recyclable materials. Transfer stations have become an integral part of municipal waste management, playing an important role in materials recovery and improving transportation economics associated with municipal waste disposal.</span></li><span data-dcnode-id="1595" instrument_node="">
</span><li data-dcnode-id="1590"><b data-dcnode-id="1592"><a class="mw-redirect" data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transgenic_plant" title="Transgenic plant"><span data-dcnode-id="1594" instrument_node="">transgenic plant</span></a></b><span data-dcnode-id="1591" instrument_node=""> – a plant into which genetic material has been transferred by genetic engineering.</span></li><span data-dcnode-id="1589" instrument_node="">
