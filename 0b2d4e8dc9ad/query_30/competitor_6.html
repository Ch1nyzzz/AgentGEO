</span><li data-dcnode-id="1581"><b data-dcnode-id="1586"><a class="mw-redirect" data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Triple_Bottom_Line" title="Triple Bottom Line"><span data-dcnode-id="1588" instrument_node="">Triple Bottom Line</span></a></b><span data-dcnode-id="1585" instrument_node=""> – a form of sustainability accounting going beyond the financial ‘bottom line’ to consider the social and environmental as well as economic consequences of an organisation's activity; generally included with economic accounts. Term coined by John Elkington in 1994</span><sup class="reference" data-dcnode-id="1582" id="cite_ref-11"><a data-dcnode-id="1583" href="#cite_note-11"><span data-dcnode-id="1584" instrument_node="">[11]</span></a></sup></li><span data-dcnode-id="1580" instrument_node="">
</span><li data-dcnode-id="1575"><b data-dcnode-id="1577"><a class="mw-redirect" data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tropical" title="Tropical"><span data-dcnode-id="1579" instrument_node="">tropical</span></a></b><span data-dcnode-id="1576" instrument_node=""> – occurring in the tropics (the region on either side of the equator); hot and humid with a mean annual temperature greater than 20oC.</span></li><span data-dcnode-id="1574" instrument_node="">
</span><li data-dcnode-id="1569"><b data-dcnode-id="1571"><a data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turbine" title="Turbine"><span data-dcnode-id="1573" instrument_node="">turbine</span></a></b><span data-dcnode-id="1570" instrument_node=""> - A machine for converting the heat energy in steam or high temperature gas into mechanical energy. In a turbine, a high velocity flow of steam or gas passes through successive rows of radial blades fastened to a central shaft.</span></li></ul><span data-dcnode-id="1567" instrument_node="">
</span><h2 data-dcnode-id="1557"><span class="mw-headline" data-dcnode-id="1565" id="U"><span data-dcnode-id="1566" instrument_node="">U</span></span><span class="mw-editsection" data-dcnode-id="1558"><span class="mw-editsection-bracket" data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">[</span></span><a data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D21" title="Edit section: U"><span data-dcnode-id="1562" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1556" instrument_node="">
</span><ul data-dcnode-id="1523"><li data-dcnode-id="1551"><b data-dcnode-id="1553"><a data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="1555" instrument_node="">United Nations</span></a></b><span data-dcnode-id="1552" instrument_node=""> - an international organisation based in New York and formed to promote international peace, security, and cooperation under a charter signed by 51 founding countries in San Francisco in 1945</span></li><span data-dcnode-id="1550" instrument_node="">
</span><li data-dcnode-id="1542"><b data-dcnode-id="1547"><a data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Framework_Convention_on_Climate_Change" title="United Nations Framework Convention on Climate Change"><span data-dcnode-id="1549" instrument_node="">United Nations Framework Convention on Climate Change</span></a></b><span data-dcnode-id="1546" instrument_node="">  (UNFCCC) – The UNFCCC and the Convention on Biological Diversity (CBD) were established at the 1992 U.N. Conference on Environment and Development in Rio de Janeiro, Brazil. The Kyoto Protocol was then formulated by the UNFCCC and sets specific timelines and timetables for reducing industrialized nations’ GHG emissions and allows some international trading in carbon credits. For more information visit:</span><sup class="reference" data-dcnode-id="1543" id="cite_ref-12"><a data-dcnode-id="1544" href="#cite_note-12"><span data-dcnode-id="1545" instrument_node="">[12]</span></a></sup></li><span data-dcnode-id="1541" instrument_node="">
</span><li data-dcnode-id="1536"><b data-dcnode-id="1538"><a data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Upstream_%28petroleum_industry%29" title="Upstream (petroleum industry)"><span data-dcnode-id="1540" instrument_node="">upstream</span></a></b><span data-dcnode-id="1537" instrument_node="">  – those processes necessary before a particular activity is completed e.g. for a manufactured product this would be the extraction, transport of materials etc. needed prior to the process of manufacture cf. downstream.</span></li><span data-dcnode-id="1535" instrument_node="">
</span><li data-dcnode-id="1530"><b data-dcnode-id="1532"><a class="mw-redirect" data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Urban_Heat_Island" title="Urban Heat Island"><span data-dcnode-id="1534" instrument_node="">urban Heat Island</span></a></b><span data-dcnode-id="1531" instrument_node=""> - the tendency for urban areas to have warmer air temperatures than the surrounding rural landscape, due to the low albedo of streets, sidewalks, parking lots, and buildings. These surfaces absorb solar radiation during the day and release it at night, resulting in higher night temperatures.</span></li><span data-dcnode-id="1529" instrument_node="">
</span><li data-dcnode-id="1524"><b data-dcnode-id="1526"><a data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Urban_metabolism" title="Urban metabolism"><span data-dcnode-id="1528" instrument_node="">urban metabolism</span></a></b><span data-dcnode-id="1525" instrument_node="">  – the functional flow of materials and energy required by cities.</span></li></ul><span data-dcnode-id="1522" instrument_node="">
</span><h2 data-dcnode-id="1512"><span class="mw-headline" data-dcnode-id="1520" id="V"><span data-dcnode-id="1521" instrument_node="">V</span></span><span class="mw-editsection" data-dcnode-id="1513"><span class="mw-editsection-bracket" data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">[</span></span><a data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D22" title="Edit section: V"><span data-dcnode-id="1517" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1511" instrument_node="">
</span><ul data-dcnode-id="1475"><li data-dcnode-id="1506"><b data-dcnode-id="1508"><a class="mw-redirect" data-dcnode-id="1509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veloway" title="Veloway"><span data-dcnode-id="1510" instrument_node="">veloway</span></a></b><span data-dcnode-id="1507" instrument_node="">  - cycle track; cycleway; contrasts with freeway.</span></li><span data-dcnode-id="1505" instrument_node="">
</span><li data-dcnode-id="1500"><b data-dcnode-id="1502"><a data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polyvinyl_chloride" title="Polyvinyl chloride"><span data-dcnode-id="1504" instrument_node="">vinyl</span></a></b><span data-dcnode-id="1501" instrument_node=""> - a type of plastic (usually PVC) used to make products such as fruit juice bottles, credit cards, pipes and hoses.</span></li><span data-dcnode-id="1499" instrument_node="">
</span><li data-dcnode-id="1494"><b data-dcnode-id="1496"><a data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virtual_water" title="Virtual water"><span data-dcnode-id="1498" instrument_node="">virtual water</span></a></b><span data-dcnode-id="1495" instrument_node="">  - the volume of water required to produce a commodity or service.  First coined by Professor J.A. Allan of the University of London in the early 1990s, though this is now more widely known as cf. embedded (embodied) water.</span></li><span data-dcnode-id="1493" instrument_node="">
</span><li data-dcnode-id="1488"><b data-dcnode-id="1490"><a class="new" data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVisual_waste_audit%26action%3Dedit%26redlink%3D1" title="Visual waste audit (page does not exist)"><span data-dcnode-id="1492" instrument_node="">visual waste audit</span></a></b><span data-dcnode-id="1489" instrument_node="">  - observing, estimating and recording data on waste streams and practices without physical weighing.</span></li><span data-dcnode-id="1487" instrument_node="">
</span><li data-dcnode-id="1482"><b data-dcnode-id="1484"><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volatile_organic_compound" title="Volatile organic compound"><span data-dcnode-id="1486" instrument_node="">volatile organic compound</span></a></b><span data-dcnode-id="1483" instrument_node="">  (VOC) – molecules containing carbon and differing proportions of other elements such as hydrogen, oxygen, fluorine and chlorine. With sunlight and heat they form ground-level ozone.</span></li><span data-dcnode-id="1481" instrument_node="">
</span><li data-dcnode-id="1476"><b data-dcnode-id="1478"><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volt" title="Volt"><span data-dcnode-id="1480" instrument_node="">volt</span></a></b><span data-dcnode-id="1477" instrument_node="">  - The unit of potential difference between two points is the volt (V) (commonly called voltage). One thousand volts equals 1 kilovolt (kV).</span></li></ul><span data-dcnode-id="1474" instrument_node="">
</span><h2 data-dcnode-id="1464"><span class="mw-headline" data-dcnode-id="1472" id="W"><span data-dcnode-id="1473" instrument_node="">W</span></span><span class="mw-editsection" data-dcnode-id="1465"><span class="mw-editsection-bracket" data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">[</span></span><a data-dcnode-id="1468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D23" title="Edit section: W"><span data-dcnode-id="1469" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1463" instrument_node="">
</span><ul data-dcnode-id="1229"><li data-dcnode-id="1458"><b data-dcnode-id="1460"><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waste" title="Waste"><span data-dcnode-id="1462" instrument_node="">waste</span></a></b><span data-dcnode-id="1459" instrument_node="">  - any material (liquid, solid or gaseous) that is produced by domestic households and commercial, institutional, municipal or industrial organisations, and which cannot be collected and recycled in any way for further use. For solid wastes, this involves materials that currently go to landfills, even though some of the material is potentially recyclable.</span></li><span data-dcnode-id="1457" instrument_node="">
</span><li data-dcnode-id="1452"><b data-dcnode-id="1454"><a class="new" data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWaste_analysis%26action%3Dedit%26redlink%3D1" title="Waste analysis (page does not exist)"><span data-dcnode-id="1456" instrument_node="">waste analysis</span></a></b><span data-dcnode-id="1453" instrument_node="">  -the quantifying of different waste streams, recording and detailing of it as a proportion of the total waste stream, determining its destination and recording details of waste practices.</span></li><span data-dcnode-id="1451" instrument_node="">
</span><li data-dcnode-id="1446"><b data-dcnode-id="1448"><a class="new" data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWaste_assessment%26action%3Dedit%26redlink%3D1" title="Waste assessment (page does not exist)"><span data-dcnode-id="1450" instrument_node="">waste assessment</span></a></b><span data-dcnode-id="1447" instrument_node="">  - observing, measuring, and recording data and collecting and analysing waste samples. Some practitioners consider an assessment to be one where observations are carried out visually, without sorting and measuring individual streams (see visual waste audit).</span></li><span data-dcnode-id="1445" instrument_node="">
</span><li data-dcnode-id="1440"><b data-dcnode-id="1442"><a class="mw-redirect" data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waste_audit" title="Waste audit"><span data-dcnode-id="1444" instrument_node="">waste audit</span></a></b><span data-dcnode-id="1441" instrument_node="">  -see waste assessment.</span></li><span data-dcnode-id="1439" instrument_node="">
</span><li data-dcnode-id="1434"><b data-dcnode-id="1436"><a class="mw-redirect" data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waste_avoidance" title="Waste avoidance"><span data-dcnode-id="1438" instrument_node="">waste avoidance</span></a></b><span data-dcnode-id="1435" instrument_node="">  – primary pillar of the waste hierarchy; avoidance works on the principle that the greatest gains result from efficiency-centred actions that remove or reduce the need to consume materials in the first place, but deliver the same outcome.</span></li><span data-dcnode-id="1433" instrument_node="">
</span><li data-dcnode-id="1428"><b data-dcnode-id="1430"><a class="new" data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWaste_factors%26action%3Dedit%26redlink%3D1" title="Waste factors (page does not exist)"><span data-dcnode-id="1432" instrument_node="">waste factors</span></a></b><span data-dcnode-id="1429" instrument_node="">  - (used in round-wood calculations) give the ratio of one cubic metre of round wood used per cubic metre (or tonne) of product.</span></li><span data-dcnode-id="1427" instrument_node="">
</span><li data-dcnode-id="1422"><b data-dcnode-id="1424"><a class="new" data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWaste_generation%26action%3Dedit%26redlink%3D1" title="Waste generation (page does not exist)"><span data-dcnode-id="1426" instrument_node="">waste generation</span></a></b><span data-dcnode-id="1423" instrument_node="">  - generation of unwanted materials including recyclables as well as garbage. Waste generation = materials recycled + waste to landfill.</span></li><span data-dcnode-id="1421" instrument_node="">
</span><li data-dcnode-id="1416"><b data-dcnode-id="1418"><a data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waste_hierarchy" title="Waste hierarchy"><span data-dcnode-id="1420" instrument_node="">waste hierarchy</span></a></b><span data-dcnode-id="1417" instrument_node=""> (waste management hierarchy)– a concept promoting waste avoidance ahead of recycling and disposal, often referred to in community education campaigns as 'reduce, reuse, recycle.' The waste hierarchy is recognised in the Environment Protection Act 1970, promoting management of wastes in the order of preference: avoidance, reuse, recycling, recovery of energy, treatment, containment, disposal.</span></li><span data-dcnode-id="1415" instrument_node="">
</span><li data-dcnode-id="1410"><b data-dcnode-id="1412"><a data-dcnode-id="1413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waste_management" title="Waste management"><span data-dcnode-id="1414" instrument_node="">waste management</span></a></b><span data-dcnode-id="1411" instrument_node="">  - practices and procedures that relate to how the waste is dealt with.</span></li><span data-dcnode-id="1409" instrument_node="">
</span><li data-dcnode-id="1404"><b data-dcnode-id="1406"><a data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waste_minimisation" title="Waste minimisation"><span data-dcnode-id="1408" instrument_node="">waste minimisation</span></a></b><span data-dcnode-id="1405" instrument_node=""> - techniques to keep waste generation at a minimum level in order to divert materials from landfill and thereby reduce the requirement for waste collection, handling and disposal to landfill; recycling and other efforts made to reduce the amount of waste going into the waste stream.</span></li><span data-dcnode-id="1403" instrument_node="">
</span><li data-dcnode-id="1398"><b data-dcnode-id="1400"><a class="mw-redirect" data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waste_reduction" title="Waste reduction"><span data-dcnode-id="1402" instrument_node="">waste reduction</span></a></b><span data-dcnode-id="1399" instrument_node=""> - Measures to reduce the amount of waste generated by an individual, household or organisation.</span></li><span data-dcnode-id="1397" instrument_node="">
</span><li data-dcnode-id="1392"><b data-dcnode-id="1394"><a class="mw-redirect" data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waste_stream" title="Waste stream"><span data-dcnode-id="1396" instrument_node="">waste stream</span></a></b><span data-dcnode-id="1393" instrument_node="">  - Waste materials that are either of a particular type (e.g. 'timber waste stream') or produced a particular source (e.g. 'C&amp;I waste stream').</span></li><span data-dcnode-id="1391" instrument_node="">
</span><li data-dcnode-id="1386"><b data-dcnode-id="1388"><a data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waste_treatment" title="Waste treatment"><span data-dcnode-id="1390" instrument_node="">waste treatment</span></a></b><span data-dcnode-id="1387" instrument_node=""> - where some additional processing is undertaken of a particular waste. This may be done to reduce its toxicity, or increase its degradability or compostability.</span></li><span data-dcnode-id="1385" instrument_node="">
</span><li data-dcnode-id="1380"><b data-dcnode-id="1382"><a data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wastewater" title="Wastewater"><span data-dcnode-id="1384" instrument_node="">wastewater</span></a></b><span data-dcnode-id="1381" instrument_node="">  - used water; generally not suitable for drinking.</span></li><span data-dcnode-id="1379" instrument_node="">
</span><li data-dcnode-id="1374"><b data-dcnode-id="1376"><a class="mw-redirect" data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_consumption" title="Water consumption"><span data-dcnode-id="1378" instrument_node="">water consumption</span></a></b><span data-dcnode-id="1375" instrument_node="">   - in water accounting: distributed water use + self-extracted water use + reuse water use - distributed water supplied to other users - in-stream use (where applicable).</span></li><span data-dcnode-id="1373" instrument_node="">
</span><li data-dcnode-id="1368"><b data-dcnode-id="1370"><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_cycle" title="Water cycle"><span data-dcnode-id="1372" instrument_node="">water cycle</span></a></b><span data-dcnode-id="1369" instrument_node="">  (hydrological cycle)  passage of the water between the oceans and waterbodies, land and atmosphere.</span></li><span data-dcnode-id="1367" instrument_node="">
</span><li data-dcnode-id="1362"><b data-dcnode-id="1364"><a class="new" data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWater_entitlement%26action%3Dedit%26redlink%3D1" title="Water entitlement (page does not exist)"><span data-dcnode-id="1366" instrument_node="">water entitlement</span></a></b><span data-dcnode-id="1363" instrument_node=""> - the entitlement, as defined in a statutory water plan, to a share of water from a water source.</span></li><span data-dcnode-id="1361" instrument_node="">
</span><li data-dcnode-id="1356"><b data-dcnode-id="1358"><a class="new" data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWater_Footprint%26action%3Dedit%26redlink%3D1" title="Water Footprint (page does not exist)"><span data-dcnode-id="1360" instrument_node="">Water Footprint</span></a></b><span data-dcnode-id="1357" instrument_node="">   - the total volume of freshwater that is required in a given period to perform a particular task or to produce the goods and services consumed at any level of the action hierarchy. Country water footprint is a concept introduced by Hoekstra in 2002 as a consumption-based indicator of water use in a country – the volume of water needed to produce the goods and services consumed by the inhabitants of a country.</span></li><span data-dcnode-id="1355" instrument_node="">
</span><li data-dcnode-id="1350"><b data-dcnode-id="1352"><a class="mw-redirect" data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_harvesting" title="Water harvesting"><span data-dcnode-id="1354" instrument_node="">water harvesting</span></a></b><span data-dcnode-id="1351" instrument_node="">  – see rainwater harvesting.</span></li><span data-dcnode-id="1349" instrument_node="">
</span><li data-dcnode-id="1344"><b data-dcnode-id="1346"><a class="new" data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWater_intensity%26action%3Dedit%26redlink%3D1" title="Water intensity (page does not exist)"><span data-dcnode-id="1348" instrument_node="">water intensity</span></a></b><span data-dcnode-id="1345" instrument_node="">  - volume of water used per unit of production or service delivery; this is generally further reduced to monetary unit return per given volume of water used. Essentially equivalent to water productivity.</span></li><span data-dcnode-id="1343" instrument_node="">
</span><li data-dcnode-id="1331"><b data-dcnode-id="1340"><a class="new" data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWater_neutral%26action%3Dedit%26redlink%3D1" title="Water neutral (page does not exist)"><span data-dcnode-id="1342" instrument_node="">water neutral</span></a></b><span data-dcnode-id="1339" instrument_node="">  – a scientifically based calculator for individuals</span><sup class="reference" data-dcnode-id="1336" id="cite_ref-13"><a data-dcnode-id="1337" href="#cite_note-13"><span data-dcnode-id="1338" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1335" instrument_node=""> to be extended to cover the construction industry, the food and beverage sector and other corporations or organisations. The water offset calculators aimed at business and other organisations are being developed and will be launched with the Individual Water Offset Calculator.</span><sup class="reference" data-dcnode-id="1332" id="cite_ref-14"><a data-dcnode-id="1333" href="#cite_note-14"><span data-dcnode-id="1334" instrument_node="">[14]</span></a></sup></li><span data-dcnode-id="1330" instrument_node="">
</span><li data-dcnode-id="1325"><b data-dcnode-id="1327"><a class="new" data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWater_productivity%26action%3Dedit%26redlink%3D1" title="Water productivity (page does not exist)"><span data-dcnode-id="1329" instrument_node="">water productivity</span></a></b><span data-dcnode-id="1326" instrument_node="">  – the efficiency of outcomes for the amount of water used; the quantity of water required to produce a given outcome. WP-field relates to crop output e.g. kg of wheat produced per m3 of water. WP-basin relates to water productivity in the widest possible sense as including crop, fishery yield, environmental services etc. Increasing WP means obtaining increasing value from the available water.</span></li><span data-dcnode-id="1324" instrument_node="">
</span><li data-dcnode-id="1319"><b data-dcnode-id="1321"><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_quality" title="Water quality"><span data-dcnode-id="1323" instrument_node="">water quality</span></a></b><span data-dcnode-id="1320" instrument_node="">  - the microbiological, biological, physical and chemical characteristics of water.</span></li><span data-dcnode-id="1318" instrument_node="">
</span><li data-dcnode-id="1313"><b data-dcnode-id="1315"><a data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_resources" title="Water resources"><span data-dcnode-id="1317" instrument_node="">water resources</span></a></b><span data-dcnode-id="1314" instrument_node="">  - water in various forms, such as groundwater, surface water, snow and ice, at present in the land phase of the hydrological cycle—some parts may be renewable seasonally, but others may be effectively mined.</span></li><span data-dcnode-id="1312" instrument_node="">
</span><li data-dcnode-id="1307"><b data-dcnode-id="1309"><a class="mw-redirect" data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_restrictions" title="Water restrictions"><span data-dcnode-id="1311" instrument_node="">water restrictions</span></a></b><span data-dcnode-id="1308" instrument_node=""> - mandatory staged restrictions on the use of water, which are relative to water storage levels.</span></li><span data-dcnode-id="1306" instrument_node="">
</span><li data-dcnode-id="1301"><b data-dcnode-id="1303"><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_trading" title="Water trading"><span data-dcnode-id="1305" instrument_node="">water trading</span></a></b><span data-dcnode-id="1302" instrument_node="">  - transactions involving water access entitlements or water allocations assigned to water access entitlements.</span></li><span data-dcnode-id="1300" instrument_node="">
</span><li data-dcnode-id="1295"><b data-dcnode-id="1297"><a data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_treatment" title="Water treatment"><span data-dcnode-id="1299" instrument_node="">water treatment</span></a></b><span data-dcnode-id="1296" instrument_node="">  - the process of converting raw untreated water to a public water supply safe for human consumption; can involve, variously, screening, initial disinfection, clarification, filtration, pH correction and final disinfection.</span></li><span data-dcnode-id="1294" instrument_node="">
</span><li data-dcnode-id="1289"><b data-dcnode-id="1291"><a data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_table" title="Water table"><span data-dcnode-id="1293" instrument_node="">water table</span></a></b><span data-dcnode-id="1290" instrument_node="">  – upper level of water in saturated ground.</span></li><span data-dcnode-id="1288" instrument_node="">
</span><li data-dcnode-id="1278"><b data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">watershed</span></b><span data-dcnode-id="1285" instrument_node="">  – a </span><a data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drainage_basin" title="Drainage basin"><span data-dcnode-id="1284" instrument_node="">water catchment area</span></a><span data-dcnode-id="1282" instrument_node=""> (North America) or </span><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drainage_divide" title="Drainage divide"><span data-dcnode-id="1281" instrument_node="">drainage divide</span></a><span data-dcnode-id="1279" instrument_node=""> (non-American usage).</span></li><span data-dcnode-id="1277" instrument_node="">
</span><li data-dcnode-id="1272"><b data-dcnode-id="1274"><a data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Weather" title="Weather"><span data-dcnode-id="1276" instrument_node="">weather</span></a></b><span data-dcnode-id="1273" instrument_node=""> - the hourly/daily change in atmospheric conditions which over a longer period constitute the climate of a region cf. climate.</span></li><span data-dcnode-id="1271" instrument_node="">
</span><li data-dcnode-id="1266"><b data-dcnode-id="1268"><a data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Weathering" title="Weathering"><span data-dcnode-id="1270" instrument_node="">weathering</span></a></b><span data-dcnode-id="1267" instrument_node=""> - is the breaking down of rocks, soil, and minerals as well as wood and artificial materials through contact with the Earth's atmosphere, water, and biological organisms.</span></li><span data-dcnode-id="1265" instrument_node="">
</span><li data-dcnode-id="1260"><b data-dcnode-id="1262"><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Well-being" title="Well-being"><span data-dcnode-id="1264" instrument_node="">well-being</span></a></b><span data-dcnode-id="1261" instrument_node=""> – a context-dependent physical and mental condition determined by the presence of basic material for a good life, freedom and choice, health, good social relations, and security.</span></li><span data-dcnode-id="1259" instrument_node="">
</span><li data-dcnode-id="1254"><b data-dcnode-id="1256"><a class="mw-redirect" data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wetlands" title="Wetlands"><span data-dcnode-id="1258" instrument_node="">wetlands</span></a></b><span data-dcnode-id="1255" instrument_node="">  - areas of permanent or intermittent inundation, whether natural or artificial, with water that is static or flowing, fresh, brackish or salt, including areas of marine water not exceeding 6 m at low tide. (Adapted from definition of the Ramsar Convention on Wetlands of International Importance). Engineered wetlands are becoming more frequent and are sometimes called constructed wetlands. In urban areas wetlands are sometimes referred to as the kidney of a city.</span></li><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1248"><b data-dcnode-id="1250"><a class="mw-redirect" data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whitegoods" title="Whitegoods"><span data-dcnode-id="1252" instrument_node="">whitegoods</span></a></b><span data-dcnode-id="1249" instrument_node=""> - household electrical appliances like refrigerators, washing machines, clothes dryers, and dishwashers.</span></li><span data-dcnode-id="1247" instrument_node="">
</span><li data-dcnode-id="1242"><b data-dcnode-id="1244"><a class="mw-redirect" data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wind_energy" title="Wind energy"><span data-dcnode-id="1246" instrument_node="">wind energy</span></a></b><span data-dcnode-id="1243" instrument_node="">  - the kinetic energy present in the motion of the wind. Wind energy can be converted to mechanical or electrical energy. A traditional mechanical windmill can be used for pumping water or grinding grain. A modern electrical wind turbine converts the force of the wind to electrical energy for consumption on-site and/or export to the electricity grid.</span></li><span data-dcnode-id="1241" instrument_node="">
