</span><li data-dcnode-id="3964"><b data-dcnode-id="3966"><a data-dcnode-id="3967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Energy_recovery" title="Energy recovery"><span data-dcnode-id="3968" instrument_node="">energy recovery</span></a></b><span data-dcnode-id="3965" instrument_node="">  – the productive extraction of energy, usually electricity or heat, from waste or materials that would otherwise have gone to landfill.</span></li><span data-dcnode-id="3963" instrument_node="">
</span><li data-dcnode-id="3955"><b data-dcnode-id="3960"><a class="new" data-dcnode-id="3961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEnergy-for-land_ratio%26action%3Dedit%26redlink%3D1" title="Energy-for-land ratio (page does not exist)"><span data-dcnode-id="3962" instrument_node="">energy-for-land ratio</span></a></b><span data-dcnode-id="3959" instrument_node="">  - the amount of energy that can be produced per hectare of ecologically productive land. The units used are gigajoules per hectare and year, or GJ/ha/yr. For fossil fuel (calculated as CO</span><sub data-dcnode-id="3957" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="3958" instrument_node="">2</span></sub><span data-dcnode-id="3956" instrument_node=""> assimilation) the ratio is 100 GJ/ha/yr.</span></li><span data-dcnode-id="3954" instrument_node="">
</span><li data-dcnode-id="3949"><b data-dcnode-id="3951"><a class="mw-redirect" data-dcnode-id="3952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enhanced_greenhouse_effect" title="Enhanced greenhouse effect"><span data-dcnode-id="3953" instrument_node="">enhanced greenhouse effect</span></a></b><span data-dcnode-id="3950" instrument_node="">  - the increase in the natural greenhouse effect resulting from increases in atmospheric concentrations of greenhouse gases due to emissions from human activities.</span></li><span data-dcnode-id="3948" instrument_node="">
</span><li data-dcnode-id="3943"><b data-dcnode-id="3945"><a class="mw-redirect" data-dcnode-id="3946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ENSO" title="ENSO"><span data-dcnode-id="3947" instrument_node="">ENSO</span></a></b><span data-dcnode-id="3944" instrument_node="">  (El Niño–Southern Oscillation) a suite of events that occur at the time of an El Niño; at one extreme of the cycle, when the central Pacific Ocean is warm and the atmospheric pressure over Australia is relatively high, the ENSO causes drought conditions over eastern Australia cf. El Niño, Southern Oscillation.</span></li><span data-dcnode-id="3942" instrument_node="">
</span><li data-dcnode-id="3937"><b data-dcnode-id="3939"><a class="mw-redirect" data-dcnode-id="3940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environment_%28biophysical%29" title="Environment (biophysical)"><span data-dcnode-id="3941" instrument_node="">environment</span></a></b><span data-dcnode-id="3938" instrument_node=""> - the external conditions, resources, stimuli etc. with which an organism interacts.</span></li><span data-dcnode-id="3936" instrument_node="">
</span><li data-dcnode-id="3931"><b data-dcnode-id="3933"><a data-dcnode-id="3934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_ethics" title="Environmental ethics"><span data-dcnode-id="3935" instrument_node="">Environmental ethics</span></a></b><span data-dcnode-id="3932" instrument_node=""> - There are many ethical decisions that human beings make with respect to the environment.</span></li><span data-dcnode-id="3930" instrument_node="">
</span><li data-dcnode-id="3925"><b data-dcnode-id="3927"><a class="mw-redirect" data-dcnode-id="3928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_flows" title="Environmental flows"><span data-dcnode-id="3929" instrument_node="">environmental flows</span></a></b><span data-dcnode-id="3926" instrument_node="">  - river or creek water flows that are allocated for the maintenance of the waterway ecosystems.</span></li><span data-dcnode-id="3924" instrument_node="">
</span><li data-dcnode-id="3919"><b data-dcnode-id="3921"><a data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_indicator" title="Environmental indicator"><span data-dcnode-id="3923" instrument_node="">environmental indicator</span></a></b><span data-dcnode-id="3920" instrument_node="">  - physical, chemical, biological or socio-economic measure that can be used to assess natural resources and environmental quality.</span></li><span data-dcnode-id="3918" instrument_node="">
</span><li data-dcnode-id="3913"><b data-dcnode-id="3915"><a data-dcnode-id="3916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_movement" title="Environmental movement"><span data-dcnode-id="3917" instrument_node="">environmental movement</span></a></b><span data-dcnode-id="3914" instrument_node="">   (environmentalism) - both the conservation and green movements; a diverse scientific, social, and political movement. In general terms, environmentalists advocate the sustainable management of resources and stewardship of the natural environment through changes in public policy and individual behavior. In its recognition of humanity as a participant in ecosystems, the movement is centered around ecology, health, and human rights.</span></li><span data-dcnode-id="3912" instrument_node="">
</span><li data-dcnode-id="3907"><b data-dcnode-id="3909"><a data-dcnode-id="3910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_science" title="Environmental science"><span data-dcnode-id="3911" instrument_node="">environmental science</span></a></b><span data-dcnode-id="3908" instrument_node=""> - the study of interactions among physical, chemical, and biological components of the environment.</span></li><span data-dcnode-id="3906" instrument_node="">
</span><li data-dcnode-id="3901"><b data-dcnode-id="3903"><a data-dcnode-id="3904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epidemiology" title="Epidemiology"><span data-dcnode-id="3905" instrument_node="">epidemiology</span></a></b><span data-dcnode-id="3902" instrument_node=""> - the study of factors affecting the health and illness of populations, and serves as the foundation and logic of interventions made in the interest of public health and preventive medicine.</span></li><span data-dcnode-id="3900" instrument_node="">
</span><li data-dcnode-id="3895"><b data-dcnode-id="3897"><a data-dcnode-id="3898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Erosion" title="Erosion"><span data-dcnode-id="3899" instrument_node="">erosion</span></a></b><span data-dcnode-id="3896" instrument_node=""> - displacement of solids (sediment, soil, rock and other particles) usually by the agents of currents such as, wind, water, or ice by downward or down-slope movement in response to gravity or by living organisms.</span></li><span data-dcnode-id="3894" instrument_node="">
</span><li data-dcnode-id="3885"><i data-dcnode-id="3890"><b data-dcnode-id="3891"><a data-dcnode-id="3892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Escherichia_coli" title="Escherichia coli"><span data-dcnode-id="3893" instrument_node="">Escherichia coli</span></a></b></i><span data-dcnode-id="3889" instrument_node="">  (</span><i data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">E. coli</span></i><span data-dcnode-id="3886" instrument_node="">) – a bacterium used as an indicator of faecal contamination and potential disease organisms in water.</span></li><span data-dcnode-id="3884" instrument_node="">
</span><li data-dcnode-id="3879"><b data-dcnode-id="3881"><a data-dcnode-id="3882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estuary" title="Estuary"><span data-dcnode-id="3883" instrument_node="">estuary</span></a></b><span data-dcnode-id="3880" instrument_node=""> - a semi-enclosed coastal body of water with one or more rivers or streams flowing into it, and with a free connection to the open sea.</span></li><span data-dcnode-id="3878" instrument_node="">
</span><li data-dcnode-id="3873"><b data-dcnode-id="3875"><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethical_consumerism" title="Ethical consumerism"><span data-dcnode-id="3877" instrument_node="">ethical consumerism</span></a></b><span data-dcnode-id="3874" instrument_node="">  - buying things that are made ethically i.e. without harm to or exploitation of humans, animals or the natural environment. This generally entails favoring products and businesses that take account of the greater good in their operations.</span></li><span data-dcnode-id="3872" instrument_node="">
</span><li data-dcnode-id="3867"><b data-dcnode-id="3869"><a data-dcnode-id="3870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethical_living" title="Ethical living"><span data-dcnode-id="3871" instrument_node="">ethical living</span></a></b><span data-dcnode-id="3868" instrument_node="">  – adopting lifestyles, consumption and shopping habits that minimise our negative impact, and maximise our positive impact on people, the environment and the economy cf. consumer democracy, sustainable living.</span></li><span data-dcnode-id="3866" instrument_node="">
</span><li data-dcnode-id="3861"><b data-dcnode-id="3863"><a data-dcnode-id="3864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eutrophication" title="Eutrophication"><span data-dcnode-id="3865" instrument_node="">eutrophication</span></a></b><span data-dcnode-id="3862" instrument_node="">  - the enrichment of waterbodies with nutrients, primarily nitrogen and phosphorus, which stimulates the growth of aquatic organisms.</span></li><span data-dcnode-id="3860" instrument_node="">
</span><li data-dcnode-id="3855"><b data-dcnode-id="3857"><a data-dcnode-id="3858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eutrophication" title="Eutrophication"><span data-dcnode-id="3859" instrument_node="">eutrophication</span></a></b><span data-dcnode-id="3856" instrument_node=""> - an increase in chemical nutrients, typically compounds containing nitrogen or phosphorus, in an ecosystem.</span></li><span data-dcnode-id="3854" instrument_node="">
</span><li data-dcnode-id="3849"><b data-dcnode-id="3851"><a class="new" data-dcnode-id="3852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEuxenic%26action%3Dedit%26redlink%3D1" title="Euxenic (page does not exist)"><span data-dcnode-id="3853" instrument_node="">euxenic</span></a></b><span data-dcnode-id="3850" instrument_node="">  - with extremely low oxygen cf. anoxic.</span></li><span data-dcnode-id="3848" instrument_node="">
</span><li data-dcnode-id="3843"><b data-dcnode-id="3845"><a data-dcnode-id="3846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evaporation" title="Evaporation"><span data-dcnode-id="3847" instrument_node="">evaporation</span></a></b><span data-dcnode-id="3844" instrument_node="">  – water converted to water vapour.</span></li><span data-dcnode-id="3842" instrument_node="">
</span><li data-dcnode-id="3837"><b data-dcnode-id="3839"><a data-dcnode-id="3840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evapotranspiration" title="Evapotranspiration"><span data-dcnode-id="3841" instrument_node="">evapotranspiration</span></a></b><span data-dcnode-id="3838" instrument_node="">  (ET) – the water evaporating from the soil and transpired by plants.</span></li><span data-dcnode-id="3836" instrument_node="">
</span><li data-dcnode-id="3831"><b data-dcnode-id="3833"><a class="mw-redirect" data-dcnode-id="3834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/E-waste" title="E-waste"><span data-dcnode-id="3835" instrument_node="">e-waste</span></a></b><span data-dcnode-id="3832" instrument_node="">  - electronic waste, especially mobile phones, televisions and personal computers.</span></li><span data-dcnode-id="3830" instrument_node="">
</span><li data-dcnode-id="3825"><b data-dcnode-id="3827"><a data-dcnode-id="3828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extended_producer_responsibility" title="Extended producer responsibility"><span data-dcnode-id="3829" instrument_node="">extended producer responsibility</span></a></b><span data-dcnode-id="3826" instrument_node=""> (EPR) (product take-back) - a requirement (often in law) that producers take back and accept responsibility for the responsible disposal of their products; this encourages the design of products that can be easily repaired, recycled, reused or upgraded.</span></li><span data-dcnode-id="3824" instrument_node="">
</span><li data-dcnode-id="3819"><b data-dcnode-id="3821"><a class="new" data-dcnode-id="3822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DExternal_water_footprint%26action%3Dedit%26redlink%3D1" title="External water footprint (page does not exist)"><span data-dcnode-id="3823" instrument_node="">external water footprint</span></a></b><span data-dcnode-id="3820" instrument_node="">  – the embodied water of imported goods cf. internal water footprint.</span></li><span data-dcnode-id="3818" instrument_node="">
</span><li data-dcnode-id="3810"><b data-dcnode-id="3815"><a data-dcnode-id="3816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Externality" title="Externality"><span data-dcnode-id="3817" instrument_node="">externality</span></a></b><span data-dcnode-id="3814" instrument_node="">  – (environmental economics) by-products of activities that affect the well-being of people or damage the environment, where those impacts are not reflected in market prices. The costs (or benefits) associated with externalities do not enter </span><a data-dcnode-id="3812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standard_cost_accounting" title="Standard cost accounting"><span data-dcnode-id="3813" instrument_node="">standard cost accounting</span></a><span data-dcnode-id="3811" instrument_node=""> schemes. The environment is often cited as a negatively affected externality of the economy (see economic externality).</span></li><span data-dcnode-id="3809" instrument_node="">
</span><li data-dcnode-id="3804"><b data-dcnode-id="3806"><a data-dcnode-id="3807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extinction_event" title="Extinction event"><span data-dcnode-id="3808" instrument_node="">extinction event</span></a></b><span data-dcnode-id="3805" instrument_node=""> - (mass extinction, extinction-level event, ELE) - a sharp decrease in the number of species in a relatively short period of time.</span></li><span data-dcnode-id="3803" instrument_node="">
</span><li data-dcnode-id="3798"><b data-dcnode-id="3800"><a data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extinction" title="Extinction"><span data-dcnode-id="3802" instrument_node="">extinction</span></a></b><span data-dcnode-id="3799" instrument_node=""> - the cessation of existence of a species or group of taxa, reducing biodiversity.</span></li><span data-dcnode-id="3797" instrument_node="">
</span><li data-dcnode-id="3792"><b data-dcnode-id="3794"><a class="mw-redirect" data-dcnode-id="3795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extreme_points_of_Earth" title="Extreme points of Earth"><span data-dcnode-id="3796" instrument_node="">Extreme points of Earth</span></a></b><span data-dcnode-id="3793" instrument_node=""> - the geographical locations that differ relative to other locations on the landmasses, continents or countries.</span></li></ul><span data-dcnode-id="3790" instrument_node="">
</span><h2 data-dcnode-id="3780"><span class="mw-headline" data-dcnode-id="3788" id="F"><span data-dcnode-id="3789" instrument_node="">F</span></span><span class="mw-editsection" data-dcnode-id="3781"><span class="mw-editsection-bracket" data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">[</span></span><a data-dcnode-id="3784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D7" title="Edit section: F"><span data-dcnode-id="3785" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3779" instrument_node="">
</span><ul data-dcnode-id="3631"><li data-dcnode-id="3774"><b data-dcnode-id="3776"><a data-dcnode-id="3777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feedback" title="Feedback"><span data-dcnode-id="3778" instrument_node="">feedback</span></a></b><span data-dcnode-id="3775" instrument_node="">  – flow from the products of an action back to interact with the action.</span></li><span data-dcnode-id="3773" instrument_node="">
</span><li data-dcnode-id="3768"><b data-dcnode-id="3770"><a data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feedlot" title="Feedlot"><span data-dcnode-id="3772" instrument_node="">feedlot</span></a></b><span data-dcnode-id="3769" instrument_node=""> (feedyard) - a type of Confined Animal Feeding Operation (CAFO) (also known as "factory farming") which is used for finishing livestock, notably beef cattle, prior to slaughter.</span></li><span data-dcnode-id="3767" instrument_node="">
</span><li data-dcnode-id="3762"><b data-dcnode-id="3764"><a class="new" data-dcnode-id="3765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFertigate%26action%3Dedit%26redlink%3D1" title="Fertigate (page does not exist)"><span data-dcnode-id="3766" instrument_node="">fertigate</span></a></b><span data-dcnode-id="3763" instrument_node="">  – apply fertiliser through an irrigation system.</span></li><span data-dcnode-id="3761" instrument_node="">
</span><li data-dcnode-id="3756"><b data-dcnode-id="3758"><a class="mw-redirect" data-dcnode-id="3759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fertility_rate" title="Fertility rate"><span data-dcnode-id="3760" instrument_node="">fertility rate</span></a></b><span data-dcnode-id="3757" instrument_node="">  - number of live births per 1,000 women aged 15 to 44 years cf. birth rate, mortality rate.</span></li><span data-dcnode-id="3755" instrument_node="">
</span><li data-dcnode-id="3750"><b data-dcnode-id="3752"><a class="mw-redirect" data-dcnode-id="3753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fertilizers" title="Fertilizers"><span data-dcnode-id="3754" instrument_node="">fertilizers</span></a></b><span data-dcnode-id="3751" instrument_node=""> (also spelled fertilisers) - compounds given to plants to promote growth; they are usually applied either through the soil, for uptake by plant roots, or by foliar feeding, for uptake through leaves.</span></li><span data-dcnode-id="3749" instrument_node="">
</span><li data-dcnode-id="3744"><b data-dcnode-id="3746"><a data-dcnode-id="3747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flyway" title="Flyway"><span data-dcnode-id="3748" instrument_node="">flyway</span></a></b><span data-dcnode-id="3745" instrument_node=""> - the flight paths used in bird migration. Flyways generally span over continents and often oceans.</span></li><span data-dcnode-id="3743" instrument_node="">
</span><li data-dcnode-id="3735"><b data-dcnode-id="3740"><a data-dcnode-id="3741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_chain" title="Food chain"><span data-dcnode-id="3742" instrument_node="">food chain</span></a></b><span data-dcnode-id="3739" instrument_node=""> (food webs, food networks and/or trophic networks) - the feeding relationships between species within an </span><a data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecosystem" title="Ecosystem"><span data-dcnode-id="3738" instrument_node="">ecosystem</span></a><span data-dcnode-id="3736" instrument_node="">.</span></li><span data-dcnode-id="3734" instrument_node="">
</span><li data-dcnode-id="3729"><b data-dcnode-id="3731"><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_miles" title="Food miles"><span data-dcnode-id="3733" instrument_node="">food miles</span></a></b><span data-dcnode-id="3730" instrument_node="">  - the emissions produced and resources needed to transport food and drink around the globe.</span></li><span data-dcnode-id="3728" instrument_node="">
</span><li data-dcnode-id="3723"><b data-dcnode-id="3725"><a data-dcnode-id="3726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_security" title="Food security"><span data-dcnode-id="3727" instrument_node="">food security</span></a></b><span data-dcnode-id="3724" instrument_node="">  - food produced in sufficient quantity to meet the full requirements of all people i.e. total global food supply equals the total global demand. For households it is the ability to purchase or produce the food they need for a healthy and active life (disposable income is a crucial issue). Women are typically gatekeepers of household food security. For national food security, the focus is on sufficient food for all people in a nation and it entails a combination of national production, imports and exports. Food security always has components of production, access and utilisation.</span></li><span data-dcnode-id="3722" instrument_node="">
</span><li data-dcnode-id="3717"><b data-dcnode-id="3719"><a data-dcnode-id="3720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Footprint" title="Footprint"><span data-dcnode-id="3721" instrument_node="">Footprint</span></a></b><span data-dcnode-id="3718" instrument_node="">  – (Ecological Footprint) in a very general environmental sense a "footprint" is a measure of environmental impact. However, this is usually expressed as an area of productive land (the footprint) needed to counteract the impact.</span></li><span data-dcnode-id="3716" instrument_node="">
</span><li data-dcnode-id="3711"><b data-dcnode-id="3713"><a data-dcnode-id="3714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forage" title="Forage"><span data-dcnode-id="3715" instrument_node="">forage</span></a></b><span data-dcnode-id="3712" instrument_node=""> - the plant material (mainly plant leaves) eaten by grazing animals.</span></li><span data-dcnode-id="3710" instrument_node="">
</span><li data-dcnode-id="3705"><b data-dcnode-id="3707"><a data-dcnode-id="3708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forest" title="Forest"><span data-dcnode-id="3709" instrument_node="">forest</span></a></b><span data-dcnode-id="3706" instrument_node="">  – land with a canopy cover greater than 30%.</span></li><span data-dcnode-id="3704" instrument_node="">
</span><li data-dcnode-id="3699"><b data-dcnode-id="3701"><a data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fossil_fuel" title="Fossil fuel"><span data-dcnode-id="3703" instrument_node="">fossil fuel</span></a></b><span data-dcnode-id="3700" instrument_node="">  -  any hydrocarbon deposit that can be burned for heat or power, such as coal, oil and natural gas (produces carbon dioxide when burnt); fuels formed from once-living organisms that have become fossilized over geological time.</span></li><span data-dcnode-id="3698" instrument_node="">
</span><li data-dcnode-id="3693"><b data-dcnode-id="3695"><a data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fossil_water" title="Fossil water"><span data-dcnode-id="3697" instrument_node="">fossil water</span></a></b><span data-dcnode-id="3694" instrument_node="">  – groundwater that has remained in an aquifer for thousands or millions of years; when geologic changes seal the aquifer preventing further replenishment, the water becomes trapped inside and is then referred to as fossil water. Fossil water is a limited resource and can only be used once.</span></li><span data-dcnode-id="3692" instrument_node="">
</span><li data-dcnode-id="3681"><b data-dcnode-id="3689"><a class="mw-redirect" data-dcnode-id="3690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freegan" title="Freegan"><span data-dcnode-id="3691" instrument_node="">freegan</span></a></b><sup class="reference" data-dcnode-id="3686" id="cite_ref-2"><a data-dcnode-id="3687" href="#cite_note-2"><span data-dcnode-id="3688" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3685" instrument_node="">  - a person using alternative strategies for living based on limited participation in the conventional economy and minimal consumption of resources. Freegans embrace community, generosity, social concern, freedom, cooperation, and sharing  - in opposition to materialism, moral apathy, competition, conformity, and greed. The most notorious freegan strategy is "urban foraging" or "</span><a data-dcnode-id="3683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dumpster_diving" title="Dumpster diving"><span data-dcnode-id="3684" instrument_node="">dumpster diving</span></a><span data-dcnode-id="3682" instrument_node="">". This technique involves rummaging through the garbage of retailers, residences, offices, and other facilities for useful goods. The word freegan is compounded from "free" and "vegan". cf. affluenza, froogle.</span></li><span data-dcnode-id="3680" instrument_node="">
</span><li data-dcnode-id="3669"><b data-dcnode-id="3677"><a data-dcnode-id="3678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freon" title="Freon"><span data-dcnode-id="3679" instrument_node="">freon</span></a></b><span data-dcnode-id="3676" instrument_node=""> -  DuPont's trade name for its odourless, colorless, nonflammable, and noncorrosive </span><a data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chlorofluorocarbon" title="Chlorofluorocarbon"><span data-dcnode-id="3675" instrument_node="">chlorofluorocarbon</span></a><span data-dcnode-id="3673" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydrochlorofluorocarbon" title="Hydrochlorofluorocarbon"><span data-dcnode-id="3672" instrument_node="">hydrochlorofluorocarbon</span></a><span data-dcnode-id="3670" instrument_node=""> refrigerants, which are used in air conditioning and refrigeration systems Fair trade - a guarantee that a fair price is paid to producers of goods or services; it includes a range of other social and environmental standards including safety standards and the right to form unions.</span></li><span data-dcnode-id="3668" instrument_node="">
</span><li data-dcnode-id="3663"><b data-dcnode-id="3665"><a class="mw-redirect" data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freshwater" title="Freshwater"><span data-dcnode-id="3667" instrument_node="">freshwater</span></a></b><span data-dcnode-id="3664" instrument_node="">  - water containing no significant amounts of salt; potable water suitable for all normal uses cf. potable water.</span></li><span data-dcnode-id="3662" instrument_node="">
</span><li data-dcnode-id="3657"><b data-dcnode-id="3659"><a data-dcnode-id="3660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Weather_front" title="Weather front"><span data-dcnode-id="3661" instrument_node="">front</span></a></b><span data-dcnode-id="3658" instrument_node="">  – (weather) the boundary between warm (high pressure) and cold (low pressure) air masses.</span></li><span data-dcnode-id="3656" instrument_node="">
</span><li data-dcnode-id="3645"><b data-dcnode-id="3653"><a class="mw-redirect" data-dcnode-id="3654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Froogle" title="Froogle"><span data-dcnode-id="3655" instrument_node="">froogle</span></a></b><sup class="reference" data-dcnode-id="3650" id="cite_ref-3"><a data-dcnode-id="3651" href="#cite_note-3"><span data-dcnode-id="3652" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="3647" id="cite_ref-4"><a data-dcnode-id="3648" href="#cite_note-4"><span data-dcnode-id="3649" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3646" instrument_node="">  - a play on the word frugal; people who lead low-consumption life-styles: a person who is part of a new movement towards self-sufficiency and waste-reduction achieved by bartering goods and services especially through the internet, making their own products, soap, clothes, and breeding chickens and goats, growing their own food, baking their own bread, harvesting their own water and energy, and helping to develop a sense of community. Sometimes referring to people who have made a resolution to only buy essentials for a particular period of time cf. freegan, affluenza.</span></li><span data-dcnode-id="3644" instrument_node="">
</span><li data-dcnode-id="3639"><b data-dcnode-id="3641"><a class="mw-redirect" data-dcnode-id="3642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fugitive_emissions" title="Fugitive emissions"><span data-dcnode-id="3643" instrument_node="">fugitive emissions</span></a></b><span data-dcnode-id="3640" instrument_node="">  - in the context of the National Greenhouse Gas Inventory, these are greenhouse gases emitted from fuel production itself including, processing, transmission, storage and distribution processes, and including emissions from oil and natural gas exploration, venting, and flaring, as well as the mining of black coal.</span></li><span data-dcnode-id="3638" instrument_node="">
</span><li data-dcnode-id="3632"><b data-dcnode-id="3634"><a data-dcnode-id="3636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_full-cost_accounting" title="Environmental full-cost accounting"><span data-dcnode-id="3637" instrument_node="">full cost</span></a><span data-dcnode-id="3635" instrument_node=""> pricing</span></b><span data-dcnode-id="3633" instrument_node="">  - the pricing of commercial goods—such as electric power—that includes not only the private costs of inputs, but also the costs of the externalities required by their production and use cf. externality.</span></li></ul><span data-dcnode-id="3630" instrument_node="">
</span><h2 data-dcnode-id="3620"><span class="mw-headline" data-dcnode-id="3628" id="G"><span data-dcnode-id="3629" instrument_node="">G</span></span><span class="mw-editsection" data-dcnode-id="3621"><span class="mw-editsection-bracket" data-dcnode-id="3626"><span data-dcnode-id="3627" instrument_node="">[</span></span><a data-dcnode-id="3624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D8" title="Edit section: G"><span data-dcnode-id="3625" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3619" instrument_node="">
</span><ul data-dcnode-id="3304"><li data-dcnode-id="3614"><b data-dcnode-id="3616"><a class="mw-redirect" data-dcnode-id="3617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/G8" title="G8"><span data-dcnode-id="3618" instrument_node="">G8</span></a></b><span data-dcnode-id="3615" instrument_node=""> - The Group of Eight is an international forum for the world's major industrialised democracies that emerged following the 1973 oil crisis and subsequent global recession. It includes Canada, France, Germany, Italy, Japan, Russia, the UK and the US which represents about 65% of the world economy.</span></li><span data-dcnode-id="3613" instrument_node="">
</span><li data-dcnode-id="3602"><b data-dcnode-id="3610"><a data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gaia_hypothesis" title="Gaia hypothesis"><span data-dcnode-id="3612" instrument_node="">Gaia hypothesis</span></a></b><span data-dcnode-id="3609" instrument_node=""> - an ecological </span><a data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypothesis" title="Hypothesis"><span data-dcnode-id="3608" instrument_node="">hypothesis</span></a><span data-dcnode-id="3606" instrument_node=""> that proposes that living and nonliving parts of the earth are a complex interacting system that can be thought of as a single </span><a data-dcnode-id="3604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organism" title="Organism"><span data-dcnode-id="3605" instrument_node="">organism</span></a><span data-dcnode-id="3603" instrument_node="">.</span></li><span data-dcnode-id="3601" instrument_node="">
</span><li data-dcnode-id="3593"><b data-dcnode-id="3598"><a data-dcnode-id="3599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gene_pool" title="Gene pool"><span data-dcnode-id="3600" instrument_node="">gene pool</span></a></b><span data-dcnode-id="3597" instrument_node=""> - the complete set of unique </span><a data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allele" title="Allele"><span data-dcnode-id="3596" instrument_node="">alleles</span></a><span data-dcnode-id="3594" instrument_node=""> in a species or population.</span></li><span data-dcnode-id="3592" instrument_node="">
</span><li data-dcnode-id="3587"><b data-dcnode-id="3589"><a data-dcnode-id="3590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Generalist_and_specialist_species" title="Generalist and specialist species"><span data-dcnode-id="3591" instrument_node="">generalist species</span></a></b><span data-dcnode-id="3588" instrument_node=""> - those able to thrive in a wide variety of environmental conditions and can make use of a variety of different resources.</span></li><span data-dcnode-id="3586" instrument_node="">
</span><li data-dcnode-id="3575"><b data-dcnode-id="3583"><a data-dcnode-id="3584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gene" title="Gene"><span data-dcnode-id="3585" instrument_node="">gene</span></a></b><span data-dcnode-id="3582" instrument_node=""> - a locatable region of </span><a class="mw-redirect" data-dcnode-id="3580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genomic_sequence" title="Genomic sequence"><span data-dcnode-id="3581" instrument_node="">genomic sequence</span></a><span data-dcnode-id="3579" instrument_node="">, corresponding to a unit of </span><a data-dcnode-id="3577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inheritance" title="Inheritance"><span data-dcnode-id="3578" instrument_node="">inheritance</span></a><span data-dcnode-id="3576" instrument_node="">, which is associated with regulatory regions, transcribed regions and/or other functional sequence regions.</span></li><span data-dcnode-id="3574" instrument_node="">
</span><li data-dcnode-id="3566"><b data-dcnode-id="3571"><a data-dcnode-id="3572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genetic_diversity" title="Genetic diversity"><span data-dcnode-id="3573" instrument_node="">genetic diversity</span></a></b><span data-dcnode-id="3570" instrument_node=""> - one of the three levels of </span><a data-dcnode-id="3568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biodiversity" title="Biodiversity"><span data-dcnode-id="3569" instrument_node="">biodiversity</span></a><span data-dcnode-id="3567" instrument_node=""> that refers to the total number of genetic characteristics.</span></li><span data-dcnode-id="3565" instrument_node="">
</span><li data-dcnode-id="3560"><b data-dcnode-id="3562"><a data-dcnode-id="3563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenhouse_effect" title="Greenhouse effect"><span data-dcnode-id="3564" instrument_node="">greenhouse effect</span></a></b><span data-dcnode-id="3561" instrument_node=""> - the process in which the emission of infrared radiation by the atmosphere warms a planet's surface.</span></li><span data-dcnode-id="3559" instrument_node="">
</span><li data-dcnode-id="3551"><b data-dcnode-id="3556"><a data-dcnode-id="3557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenhouse_gas" title="Greenhouse gas"><span data-dcnode-id="3558" instrument_node="">greenhouse gas</span></a></b><span data-dcnode-id="3555" instrument_node=""> - components of the atmosphere that contribute to the </span><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenhouse_effect" title="Greenhouse effect"><span data-dcnode-id="3554" instrument_node="">greenhouse effect</span></a><span data-dcnode-id="3552" instrument_node="">.</span></li><span data-dcnode-id="3550" instrument_node="">
</span><li data-dcnode-id="3545"><b data-dcnode-id="3547"><a data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_manure" title="Green manure"><span data-dcnode-id="3549" instrument_node="">green manure</span></a></b><span data-dcnode-id="3546" instrument_node=""> - a type of cover crop grown primarily to add nutrients and organic matter to the soil.</span></li><span data-dcnode-id="3544" instrument_node="">
</span><li data-dcnode-id="3536"><b data-dcnode-id="3541"><a data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_Revolution" title="Green Revolution"><span data-dcnode-id="3543" instrument_node="">Green Revolution</span></a></b><span data-dcnode-id="3540" instrument_node=""> - the ongoing transformation of </span><a data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agriculture" title="Agriculture"><span data-dcnode-id="3539" instrument_node="">agriculture</span></a><span data-dcnode-id="3537" instrument_node=""> that led in some places to significant increases in agricultural production between the 1940s and 1960s.</span></li><span data-dcnode-id="3535" instrument_node="">
</span><li data-dcnode-id="3530"><b data-dcnode-id="3532"><a data-dcnode-id="3533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Groundwater" title="Groundwater"><span data-dcnode-id="3534" instrument_node="">groundwater</span></a></b><span data-dcnode-id="3531" instrument_node=""> - water located beneath the ground surface in soil pore spaces and in the fractures of lithologic formation.</span></li><span data-dcnode-id="3529" instrument_node="">
</span><li data-dcnode-id="3524"><b data-dcnode-id="3526"><a class="new" data-dcnode-id="3527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGarden_organics%26action%3Dedit%26redlink%3D1" title="Garden organics (page does not exist)"><span data-dcnode-id="3528" instrument_node="">garden organics</span></a></b><span data-dcnode-id="3525" instrument_node=""> - organics derived from garden sources e.g. prunings, grass clippings.</span></li><span data-dcnode-id="3523" instrument_node="">
</span><li data-dcnode-id="3518"><b data-dcnode-id="3520"><a data-dcnode-id="3521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genetic_engineering" title="Genetic engineering"><span data-dcnode-id="3522" instrument_node="">genetic engineering</span></a></b><span data-dcnode-id="3519" instrument_node=""> - the use of various experimental techniques to produce molecules of DNA containing new genes or novel combinations of genes, usually for insertion into a host cell for cloning; the technology of preparing recombinant DNA in vitro by cutting up DNA molecules and splicing together fragments from more than one organism; the modification of genetic material by man that would otherwise be subject to the forces of nature only.</span></li><span data-dcnode-id="3517" instrument_node="">
</span><li data-dcnode-id="3509"><b data-dcnode-id="3514"><a data-dcnode-id="3515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genome" title="Genome"><span data-dcnode-id="3516" instrument_node="">genome</span></a></b><span data-dcnode-id="3513" instrument_node=""> – the total genetic composition of an organism</span><sup class="reference" data-dcnode-id="3510" id="cite_ref-5"><a data-dcnode-id="3511" href="#cite_note-5"><span data-dcnode-id="3512" instrument_node="">[5]</span></a></sup></li><span data-dcnode-id="3508" instrument_node="">
</span><li data-dcnode-id="3500"><b data-dcnode-id="3505"><a data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geosphere" title="Geosphere"><span data-dcnode-id="3507" instrument_node="">geosphere</span></a></b><span data-dcnode-id="3504" instrument_node=""> - the solid part of planet Earth, the main divisions being the crust, mantle, and liquid core. The lithosphere is the part of the geosphere that consists of the crust and </span><a data-dcnode-id="3502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Upper_mantle_%28Earth%29" title="Upper mantle (Earth)"><span data-dcnode-id="3503" instrument_node="">upper mantle</span></a><span data-dcnode-id="3501" instrument_node="">.</span></li><span data-dcnode-id="3499" instrument_node="">
</span><li data-dcnode-id="3494"><b data-dcnode-id="3496"><a class="mw-redirect" data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geothermal" title="Geothermal"><span data-dcnode-id="3498" instrument_node="">geothermal</span></a></b><span data-dcnode-id="3495" instrument_node=""> energy - energy derived from the natural heat of the earth contained in hot rocks, hot water, hot brine or steam.</span></li><span data-dcnode-id="3493" instrument_node="">
</span><li data-dcnode-id="3488"><b data-dcnode-id="3490"><a class="new" data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlobal_acres%26action%3Dedit%26redlink%3D1" title="Global acres (page does not exist)"><span data-dcnode-id="3492" instrument_node="">global acres</span></a></b><span data-dcnode-id="3489" instrument_node=""> see global hectares.</span></li><span data-dcnode-id="3487" instrument_node="">
</span><li data-dcnode-id="3482"><b data-dcnode-id="3484"><a data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_dimming" title="Global dimming"><span data-dcnode-id="3486" instrument_node="">global dimming</span></a></b><span data-dcnode-id="3483" instrument_node=""> – a reduction in the amount of direct solar radiation reaching the surface of the earth due to light diffusion as a result of air pollution and increasing levels of cloud. A phenomenon of the last 30–50 years.</span></li><span data-dcnode-id="3481" instrument_node="">
</span><li data-dcnode-id="3476"><b data-dcnode-id="3478"><a data-dcnode-id="3479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_globalization" title="Economic globalization"><span data-dcnode-id="3480" instrument_node="">economic globalization</span></a></b><span data-dcnode-id="3477" instrument_node=""> -  the emerging international economy characterized by free trade in goods and services, unrestricted capital flows and more limited national powers to control domestic economies.</span></li><span data-dcnode-id="3475" instrument_node="">
</span><li data-dcnode-id="3470"><b data-dcnode-id="3472"><a class="mw-redirect" data-dcnode-id="3473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_hectares" title="Global hectares"><span data-dcnode-id="3474" instrument_node="">global hectares</span></a></b><span data-dcnode-id="3471" instrument_node=""> - acres/hectares that have been adjusted according to world average biomass productivity so that they can be compared meaningfully across regions; 1 global hectare is 1 hectare of biologically productive space with world average productivity.</span></li><span data-dcnode-id="3469" instrument_node="">
</span><li data-dcnode-id="3464"><b data-dcnode-id="3466"><a data-dcnode-id="3467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_warming_potential" title="Global warming potential"><span data-dcnode-id="3468" instrument_node="">global warming potential</span></a></b><span data-dcnode-id="3465" instrument_node=""> - a system of multipliers devised to enable warming effects of different gases to be compared.</span></li><span data-dcnode-id="3463" instrument_node="">
</span><li data-dcnode-id="3458"><b data-dcnode-id="3460"><a class="mw-redirect" data-dcnode-id="3461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_warming" title="Global warming"><span data-dcnode-id="3462" instrument_node="">global warming</span></a></b><span data-dcnode-id="3459" instrument_node=""> – the observable increase in global temperatures considered mainly caused by the human induced enhanced greenhouse effect trapping the Sun's heat in the Earth's atmosphere.</span></li><span data-dcnode-id="3457" instrument_node="">
</span><li data-dcnode-id="3452"><b data-dcnode-id="3454"><a class="mw-redirect" data-dcnode-id="3455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalisation" title="Globalisation"><span data-dcnode-id="3456" instrument_node="">globalisation</span></a></b><span data-dcnode-id="3453" instrument_node="">  – the expansion of interactions to a global or worldwide scale; the increasing interdependence, integration and interaction among people and organisations from around the world. A mix of economic, social, technological, cultural, and political interrelationships.</span></li><span data-dcnode-id="3451" instrument_node="">
</span><li data-dcnode-id="3446"><b data-dcnode-id="3448"><a data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glyphosate" title="Glyphosate"><span data-dcnode-id="3450" instrument_node="">glyphosate</span></a></b><span data-dcnode-id="3447" instrument_node=""> – the active ingredient in the herbicide RoundupTM.</span></li><span data-dcnode-id="3445" instrument_node="">
</span><li data-dcnode-id="3437"><b data-dcnode-id="3442"><a data-dcnode-id="3443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Governance" title="Governance"><span data-dcnode-id="3444" instrument_node="">governance</span></a></b><span data-dcnode-id="3441" instrument_node=""> – the decision-making procedure; who makes decisions, how they are made, and with what information.  The structures and processes for collective decision-making involving governmental and non-governmental actors.</span><sup class="reference" data-dcnode-id="3438" id="cite_ref-6"><a data-dcnode-id="3439" href="#cite_note-6"><span data-dcnode-id="3440" instrument_node="">[6]</span></a></sup></li><span data-dcnode-id="3436" instrument_node="">
</span><li data-dcnode-id="3425"><b data-dcnode-id="3433"><a data-dcnode-id="3434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Pacific_garbage_patch" title="Great Pacific garbage patch"><span data-dcnode-id="3435" instrument_node="">Great Pacific garbage patch</span></a></b><span data-dcnode-id="3432" instrument_node=""> - a gyre of </span><a data-dcnode-id="3430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marine_debris" title="Marine debris"><span data-dcnode-id="3431" instrument_node="">marine debris</span></a><span data-dcnode-id="3429" instrument_node=""> particles in the central North Pacific Ocean discovered between 1985 and 1988. The patch is characterized by exceptionally high relative pelagic concentrations of plastic, chemical sludge, and other debris that have been trapped by the currents of the </span><a data-dcnode-id="3427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Pacific_Gyre" title="North Pacific Gyre"><span data-dcnode-id="3428" instrument_node="">North Pacific Gyre</span></a><span data-dcnode-id="3426" instrument_node="">.</span></li><span data-dcnode-id="3424" instrument_node="">
</span><li data-dcnode-id="3419"><b data-dcnode-id="3421"><a class="mw-redirect" data-dcnode-id="3422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_architecture" title="Green architecture"><span data-dcnode-id="3423" instrument_node="">green architecture</span></a></b><span data-dcnode-id="3420" instrument_node=""> - building design that moves towards self-sufficiency sustainability by adopting circular metabolism.</span></li><span data-dcnode-id="3418" instrument_node="">
</span><li data-dcnode-id="3413"><b data-dcnode-id="3415"><a class="mw-redirect" data-dcnode-id="3416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_design" title="Green design"><span data-dcnode-id="3417" instrument_node="">green design</span></a></b><span data-dcnode-id="3414" instrument_node=""> - environmentally sustainable design.</span></li><span data-dcnode-id="3412" instrument_node="">
</span><li data-dcnode-id="3407"><b data-dcnode-id="3409"><a class="mw-redirect" data-dcnode-id="3410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_power" title="Green power"><span data-dcnode-id="3411" instrument_node="">green power</span></a></b><span data-dcnode-id="3408" instrument_node=""> - Electricity generated from clean, renewable energy sources (such as solar, wind, biomass and hydro power) and supplied through the grid.</span></li><span data-dcnode-id="3406" instrument_node="">
</span><li data-dcnode-id="3401"><b data-dcnode-id="3403"><a class="mw-redirect" data-dcnode-id="3404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_products" title="Green products"><span data-dcnode-id="3405" instrument_node="">green products</span></a></b><span data-dcnode-id="3402" instrument_node=""> and services - products or services that have a lesser or reduced effect on human health and the environment when compared with competing products or services that serve the same purpose. Green products or services may include, but are not limited to, those which contain recycled content, reduce waste, conserve energy or water, use less packaging, and reduce the amount of toxics disposed or consumed.</span></li><span data-dcnode-id="3400" instrument_node="">
</span><li data-dcnode-id="3395"><b data-dcnode-id="3397"><a class="new" data-dcnode-id="3398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGreen_purchasing%26action%3Dedit%26redlink%3D1" title="Green purchasing (page does not exist)"><span data-dcnode-id="3399" instrument_node="">green purchasing</span></a></b><span data-dcnode-id="3396" instrument_node=""> - purchasing goods and services that minimise impacts on the environment and that are socially just.</span></li><span data-dcnode-id="3394" instrument_node="">
</span><li data-dcnode-id="3389"><b data-dcnode-id="3391"><a data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_Star_%28Australia%29" title="Green Star (Australia)"><span data-dcnode-id="3393" instrument_node="">Green Star</span></a></b><span data-dcnode-id="3390" instrument_node=""> – a voluntary building rating for green design covering 9 impact categories up to 6 stars which equals world leader.</span></li><span data-dcnode-id="3388" instrument_node="">
</span><li data-dcnode-id="3383"><b data-dcnode-id="3385"><a data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_waste" title="Green waste"><span data-dcnode-id="3387" instrument_node="">green waste</span></a></b><span data-dcnode-id="3384" instrument_node=""> (green organic material or green organics, sometimes referred to as "green wealth") - plant material discarded as non-putrescible waste - includes tree and shrub cuttings and prunings, grass clippings, leaves, natural (untreated) timber waste and weeds (noxious or otherwise).</span></li><span data-dcnode-id="3382" instrument_node="">
</span><li data-dcnode-id="3377"><b data-dcnode-id="3379"><a data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green" title="Green"><span data-dcnode-id="3381" instrument_node="">green</span></a></b><span data-dcnode-id="3378" instrument_node=""> – (sustainability) like ‘eco’ - a word frequently used to indicate consideration for the environment e.g. green plumbers, green purchasing etc., sometimes used as a noun e.g. the Greens.</span></li><span data-dcnode-id="3376" instrument_node="">
</span><li data-dcnode-id="3371"><b data-dcnode-id="3373"><a data-dcnode-id="3374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenhouse_effect" title="Greenhouse effect"><span data-dcnode-id="3375" instrument_node="">greenhouse effect</span></a></b><span data-dcnode-id="3372" instrument_node=""> - the insulating effect of atmospheric greenhouse gases (e.g., water vapor, carbon dioxide, methane, etc.) that keeps the Earth's temperature about 60&nbsp;°F (16&nbsp;°C) warmer than it would be otherwise cf. enhanced greenhouse effect.</span></li><span data-dcnode-id="3370" instrument_node="">
</span><li data-dcnode-id="3350"><b data-dcnode-id="3367"><a class="mw-redirect" data-dcnode-id="3368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenhouse_gases" title="Greenhouse gases"><span data-dcnode-id="3369" instrument_node="">greenhouse gases</span></a></b><span data-dcnode-id="3366" instrument_node=""> - any gas that contributes to the greenhouse effect; gaseous constituents of the atmosphere, both natural and from human activity, that absorb and re-emit infrared radiation. Water vapor (H2O) is the most abundant greenhouse gas. Greenhouse gases are a natural part of the atmosphere and include carbon dioxide (CO</span><sub data-dcnode-id="3364" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="3365" instrument_node="">2</span></sub><span data-dcnode-id="3363" instrument_node="">), methane (CH</span><sub data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">4</span></sub><span data-dcnode-id="3360" instrument_node="">, persisting 9-15 yrs with a greenhouse warming potential (GWP) 22 times that of CO</span><sub data-dcnode-id="3358" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="3359" instrument_node="">2</span></sub><span data-dcnode-id="3357" instrument_node="">), nitrous oxide (N</span><sub data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">2</span></sub><span data-dcnode-id="3354" instrument_node="">O persists 120 years and has a GWP of 310), ozone (O</span><sub data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">3</span></sub><span data-dcnode-id="3351" instrument_node="">), hydrofluorocarbons, perfluorocarbons and sulfur hexafluoride.</span></li><span data-dcnode-id="3349" instrument_node="">
</span><li data-dcnode-id="3344"><b data-dcnode-id="3346"><a class="new" data-dcnode-id="3347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGreenlash%26action%3Dedit%26redlink%3D1" title="Greenlash (page does not exist)"><span data-dcnode-id="3348" instrument_node="">greenlash</span></a></b><span data-dcnode-id="3345" instrument_node=""> – dramatic changes in the structure and dynamic behaviour of ecosystems.</span></li><span data-dcnode-id="3343" instrument_node="">
</span><li data-dcnode-id="3335"><b data-dcnode-id="3340"><a data-dcnode-id="3341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenwashing" title="Greenwashing"><span data-dcnode-id="3342" instrument_node="">greenwashing</span></a></b><span data-dcnode-id="3339" instrument_node=""> - companies that portray themselves as environmentally friendly when their business practices do not back this up. Generally applies to excessive use of </span><a data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_marketing" title="Green marketing"><span data-dcnode-id="3338" instrument_node="">green marketing</span></a><span data-dcnode-id="3336" instrument_node=""> and packaging when this does not take account of the total ecological footprint.</span></li><span data-dcnode-id="3334" instrument_node="">
</span><li data-dcnode-id="3329"><b data-dcnode-id="3331"><a class="mw-redirect" data-dcnode-id="3332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_use%23Components" title="Water use"><span data-dcnode-id="3333" instrument_node="">greenwater</span></a></b><span data-dcnode-id="3330" instrument_node=""> – water replenishing soil moisture, evaporating from soil, plant and other surfaces, and transpired by plants. In nature the global average amount of rainfall becoming green water is about 60%. Of the green water about 55% falls on forests, 25% on grasslands and about 20% on crops. We can increase green water productivity by rainwater harvesting, increased infiltration and runoff collection. Green water cannot be piped or drunk (cannot be sold) and is therefore generally ignored by water management authorities but it is crucial to plants in both nature and agriculture and needs careful management as an important part of the global water cycle.</span></li><span data-dcnode-id="3328" instrument_node="">
</span><li data-dcnode-id="3323"><b data-dcnode-id="3325"><a data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greywater" title="Greywater"><span data-dcnode-id="3327" instrument_node="">greywater</span></a></b><span data-dcnode-id="3324" instrument_node=""> – household waste water that has not come into contact with toilet waste; includes water from baths, showers, bathrooms, washing machines, laundry and kitchen sinks.</span></li><span data-dcnode-id="3322" instrument_node="">
</span><li data-dcnode-id="3317"><b data-dcnode-id="3319"><a class="mw-redirect" data-dcnode-id="3320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gross_primary_productivity" title="Gross primary productivity"><span data-dcnode-id="3321" instrument_node="">gross primary productivity</span></a></b><span data-dcnode-id="3318" instrument_node=""> - total carbon assimilation.</span></li><span data-dcnode-id="3316" instrument_node="">
</span><li data-dcnode-id="3311"><b data-dcnode-id="3313"><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Groundwater" title="Groundwater"><span data-dcnode-id="3315" instrument_node="">groundwater</span></a></b><span data-dcnode-id="3312" instrument_node=""> – water found below the surface – usually in porous rocks, or soil, or in underground aquifers.</span></li><span data-dcnode-id="3310" instrument_node="">
</span><li data-dcnode-id="3305"><b data-dcnode-id="3307"><a class="mw-redirect mw-disambig" data-dcnode-id="3308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Growth_%28disambiguation%29" title="Growth (disambiguation)"><span data-dcnode-id="3309" instrument_node="">growth</span></a></b><span data-dcnode-id="3306" instrument_node=""> – increase in size, weight, power etc.</span></li></ul><span data-dcnode-id="3303" instrument_node="">
