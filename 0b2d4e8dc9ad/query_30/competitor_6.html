</span><li data-dcnode-id="4620"><b data-dcnode-id="4622"><a class="mw-redirect" data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Controlled_burning" title="Controlled burning"><span data-dcnode-id="4624" instrument_node="">controlled burning</span></a></b><span data-dcnode-id="4621" instrument_node=""> – a technique sometimes used in forest management, farming, prairie restoration or greenhouse gas abatement.</span></li><span data-dcnode-id="4619" instrument_node="">
</span><li data-dcnode-id="4611"><b data-dcnode-id="4616"><a class="new" data-dcnode-id="4617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DConvention_on_the_International_Trade_in_Endangered_Species%26action%3Dedit%26redlink%3D1" title="Convention on the International Trade in Endangered Species (page does not exist)"><span data-dcnode-id="4618" instrument_node="">Convention on the International Trade in Endangered Species</span></a></b><span data-dcnode-id="4615" instrument_node=""> (CITES) – International agreement among 167 governments aiming to ensure that cross-border trade in wild animals and plants does not threaten their survival. The species covered by CITES are listed in three Appendices, according to the degree of protection they need (see: </span><a class="external free" data-dcnode-id="4613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cites.org/" rel="nofollow"><span data-dcnode-id="4614" instrument_node="">http://www.cites.org</span></a><span data-dcnode-id="4612" instrument_node="">)</span></li><span data-dcnode-id="4610" instrument_node="">
</span><li data-dcnode-id="4605"><b data-dcnode-id="4607"><a class="mw-redirect" data-dcnode-id="4608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corporate_Social_Responsibility" title="Corporate Social Responsibility"><span data-dcnode-id="4609" instrument_node="">Corporate Social Responsibility</span></a></b><span data-dcnode-id="4606" instrument_node=""> – integration of social and environmental policies into day-to-day corporate business.</span></li><span data-dcnode-id="4604" instrument_node="">
</span><li data-dcnode-id="4599"><b data-dcnode-id="4601"><a data-dcnode-id="4602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Covenant_%28law%29" title="Covenant (law)"><span data-dcnode-id="4603" instrument_node="">covenants</span></a></b><span data-dcnode-id="4600" instrument_node=""> – formal agreements or contracts, often between government and industry sectors. The national packaging covenant and sustainability covenants are examples of voluntary covenants with a regulatory underpinning. Land covenants protect land for wildlife into the future.</span></li><span data-dcnode-id="4598" instrument_node="">
</span><li data-dcnode-id="4593"><b data-dcnode-id="4595"><a data-dcnode-id="4596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crop_coefficient" title="Crop coefficient"><span data-dcnode-id="4597" instrument_node="">crop coefficient</span></a></b><span data-dcnode-id="4594" instrument_node=""> (Kc) – (water management) a variable used to calculate the evapotranspiration of a plant crop based on that of a reference crop.</span></li><span data-dcnode-id="4592" instrument_node="">
</span><li data-dcnode-id="4587"><b data-dcnode-id="4589"><a class="mw-redirect" data-dcnode-id="4590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crop_evapotranspiration" title="Crop evapotranspiration"><span data-dcnode-id="4591" instrument_node="">crop evapotranspiration</span></a></b><span data-dcnode-id="4588" instrument_node=""> (ETc) – (water management) is the crop water use – the daily water withdrawal.</span></li><span data-dcnode-id="4586" instrument_node="">
</span><li data-dcnode-id="4581"><b data-dcnode-id="4583"><a data-dcnode-id="4584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crop_rotation" title="Crop rotation"><span data-dcnode-id="4585" instrument_node="">crop rotation</span></a></b><span data-dcnode-id="4582" instrument_node=""> (crop sequencing) – the practice of growing a series of dissimilar types of crops in the same space in sequential seasons for various benefits such as to avoid the buildup of pathogens and pests that often occurs when one species is continuously cropped.</span></li><span data-dcnode-id="4580" instrument_node="">
</span><li data-dcnode-id="4575"><b data-dcnode-id="4577"><a class="mw-redirect" data-dcnode-id="4578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crude_oil" title="Crude oil"><span data-dcnode-id="4579" instrument_node="">crude oil</span></a></b><span data-dcnode-id="4576" instrument_node=""> – naturally occurring mixture of hydrocarbons under normal temperature and pressure.</span></li><span data-dcnode-id="4574" instrument_node="">
</span><li data-dcnode-id="4569"><b data-dcnode-id="4571"><a class="mw-redirect" data-dcnode-id="4572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cullet" title="Cullet"><span data-dcnode-id="4573" instrument_node="">cullet</span></a></b><span data-dcnode-id="4570" instrument_node=""> – crushed glass that is suitable for recycling by glass manufacturers.</span></li><span data-dcnode-id="4568" instrument_node="">
</span><li data-dcnode-id="4563"><b data-dcnode-id="4565"><a class="mw-redirect" data-dcnode-id="4566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_eutrophication" title="Cultural eutrophication"><span data-dcnode-id="4567" instrument_node="">cultural eutrophication</span></a></b><span data-dcnode-id="4564" instrument_node=""> - the process that speeds up natural eutrophication because of human activity.</span></li><span data-dcnode-id="4562" instrument_node="">
</span><li data-dcnode-id="4557"><b data-dcnode-id="4559"><a class="new" data-dcnode-id="4560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_services%26action%3Dedit%26redlink%3D1" title="Cultural services (page does not exist)"><span data-dcnode-id="4561" instrument_node="">cultural services</span></a></b><span data-dcnode-id="4558" instrument_node=""> – the non-material benefits of ecosystems including refreshment, spiritual enrichment, knowledge, artistic satisfaction.</span></li><span data-dcnode-id="4556" instrument_node="">
</span><li data-dcnode-id="4551"><b data-dcnode-id="4553"><a data-dcnode-id="4554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Culture_jamming" title="Culture jamming"><span data-dcnode-id="4555" instrument_node="">culture jamming</span></a></b><span data-dcnode-id="4552" instrument_node=""> – altering existing mass media to criticise itself (e.g. defacing advertisements with an alternative message). Public activism opposing commercialism as little more than propaganda for established interests, and the attempt to find alternative expression.</span></li><span data-dcnode-id="4550" instrument_node="">
</span><li data-dcnode-id="4545"><b data-dcnode-id="4547"><a data-dcnode-id="4548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Culvert" title="Culvert"><span data-dcnode-id="4549" instrument_node="">culvert</span></a></b><span data-dcnode-id="4546" instrument_node=""> – drain that passes under a road or pathway, may be a pipe or other conduit.</span></li><span data-dcnode-id="4544" instrument_node="">
</span><li data-dcnode-id="4539"><b data-dcnode-id="4541"><a data-dcnode-id="4542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cut_and_fill" title="Cut and fill"><span data-dcnode-id="4543" instrument_node="">cut and fill</span></a></b><span data-dcnode-id="4540" instrument_node=""> – removing earth from one place to another, usually mechanically.</span></li><span data-dcnode-id="4538" instrument_node="">
</span><li data-dcnode-id="4533"><b data-dcnode-id="4535"><a data-dcnode-id="4536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyanobacteria" title="Cyanobacteria"><span data-dcnode-id="4537" instrument_node="">cyanobacteria</span></a></b><span data-dcnode-id="4534" instrument_node=""> (Cyanophyta or blue-green algae) – a phylum of bacteria that obtain their energy through photosynthesis.</span></li><span data-dcnode-id="4532" instrument_node="">
</span><li data-dcnode-id="4527"><b data-dcnode-id="4529"><a data-dcnode-id="4530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyclone" title="Cyclone"><span data-dcnode-id="4531" instrument_node="">cyclone</span></a></b><span data-dcnode-id="4528" instrument_node=""> – intense low pressure weather systems; mid-latitude cyclones are atmospheric circulations that rotate clockwise in the Southern Hemisphere and anti-clockwise in the Northern Hemisphere and are generally associated with stronger winds, unsettled conditions, cloudiness and rainfall. Tropical cyclones (which are called hurricanes in the Northern Hemisphere) cause storm surges in coastal areas.</span></li></ul><span data-dcnode-id="4525" instrument_node="">
</span><h2 data-dcnode-id="4515"><span class="mw-headline" data-dcnode-id="4523" id="D"><span data-dcnode-id="4524" instrument_node="">D</span></span><span class="mw-editsection" data-dcnode-id="4516"><span class="mw-editsection-bracket" data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">[</span></span><a data-dcnode-id="4519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D5" title="Edit section: D"><span data-dcnode-id="4520" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4514" instrument_node="">
</span><ul data-dcnode-id="4304"><li data-dcnode-id="4506"><b data-dcnode-id="4511"><a data-dcnode-id="4512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DDT" title="DDT"><span data-dcnode-id="4513" instrument_node="">DDT</span></a></b><span data-dcnode-id="4510" instrument_node=""> - a chlorinated hydrocarbon used as a pesticide that is a </span><a data-dcnode-id="4508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persistent_organic_pollutant" title="Persistent organic pollutant"><span data-dcnode-id="4509" instrument_node="">persistent organic pollutant</span></a><span data-dcnode-id="4507" instrument_node="">.</span></li><span data-dcnode-id="4505" instrument_node="">
</span><li data-dcnode-id="4500"><b data-dcnode-id="4502"><a class="mw-redirect" data-dcnode-id="4503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Debt-for-Nature_Swap" title="Debt-for-Nature Swap"><span data-dcnode-id="4504" instrument_node="">debt-for-Nature Swap</span></a></b><span data-dcnode-id="4501" instrument_node=""> - a financial transaction in which a portion of a developing nation's foreign debt is forgiven in exchange for local investments in conservation measures.</span></li><span data-dcnode-id="4499" instrument_node="">
</span><li data-dcnode-id="4494"><b data-dcnode-id="4496"><a class="mw-redirect" data-dcnode-id="4497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decomposers" title="Decomposers"><span data-dcnode-id="4498" instrument_node="">decomposers</span></a></b><span data-dcnode-id="4495" instrument_node=""> –  consumers, mostly microbial, that change dead organic matter into minerals and heat.</span></li><span data-dcnode-id="4493" instrument_node="">
</span><li data-dcnode-id="4488"><b data-dcnode-id="4490"><a data-dcnode-id="4491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deforestation" title="Deforestation"><span data-dcnode-id="4492" instrument_node="">deforestation</span></a></b><span data-dcnode-id="4489" instrument_node=""> - the conversion of forested areas to non-forest land for agriculture, urban use, development, or wasteland.</span></li><span data-dcnode-id="4487" instrument_node="">
</span><li data-dcnode-id="4482"><b data-dcnode-id="4484"><a data-dcnode-id="4485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dematerialization_%28economics%29" title="Dematerialization (economics)"><span data-dcnode-id="4486" instrument_node="">dematerialisation</span></a></b><span data-dcnode-id="4483" instrument_node=""> – decreasing the consumption of materials and resources while maintaining quality of life.</span></li><span data-dcnode-id="4481" instrument_node="">
</span><li data-dcnode-id="4476"><b data-dcnode-id="4478"><a data-dcnode-id="4479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Desalination" title="Desalination"><span data-dcnode-id="4480" instrument_node="">desalination</span></a></b><span data-dcnode-id="4477" instrument_node=""> producing potable or recyclable water by removing salts from salty or brackish water. This is done by three methods: distillation/freezing; reverse osmosis using membranes and electrodialysis; ion exchange. At present, all these methods are energy intensive.</span></li><span data-dcnode-id="4475" instrument_node="">
</span><li data-dcnode-id="4470"><b data-dcnode-id="4472"><a data-dcnode-id="4473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Desert" title="Desert"><span data-dcnode-id="4474" instrument_node="">desert</span></a></b><span data-dcnode-id="4471" instrument_node=""> – an area that receives an average annual precipitation of less than 250&nbsp;mm (9.8&nbsp;in) or an area in which more water is lost than falls as precipitation.</span></li><span data-dcnode-id="4469" instrument_node="">
</span><li data-dcnode-id="4464"><b data-dcnode-id="4466"><a data-dcnode-id="4467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Desertification" title="Desertification"><span data-dcnode-id="4468" instrument_node="">desertification</span></a></b><span data-dcnode-id="4465" instrument_node=""> - the degradation of land in arid, semi arid and dry sub-humid areas resulting from various climatic variations, but primarily from human activities.</span></li><span data-dcnode-id="4463" instrument_node="">
</span><li data-dcnode-id="4458"><b data-dcnode-id="4460"><a data-dcnode-id="4461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Detritivore" title="Detritivore"><span data-dcnode-id="4462" instrument_node="">detritivore</span></a></b><span data-dcnode-id="4459" instrument_node=""> (detritus feeder) - animals and plants that consume detritus (decomposing organic material), and in doing so contribute to decomposition and the recycling of nutrients.</span></li><span data-dcnode-id="4457" instrument_node="">
</span><li data-dcnode-id="4452"><b data-dcnode-id="4454"><a data-dcnode-id="4455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Detritus" title="Detritus"><span data-dcnode-id="4456" instrument_node="">detritus</span></a></b><span data-dcnode-id="4453" instrument_node=""> - non-living particulate organic material (as opposed to dissolved organic material).</span></li><span data-dcnode-id="4451" instrument_node="">
</span><li data-dcnode-id="4446"><b data-dcnode-id="4448"><a class="mw-redirect" data-dcnode-id="4449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Developing_countries" title="Developing countries"><span data-dcnode-id="4450" instrument_node="">developing countries</span></a></b><span data-dcnode-id="4447" instrument_node=""> – development of a country is measured using a mix of economic factors (income per capita, GDP, degree of modern infrastructure (both physical and institutional), degree of industrialisation, proportion of economy devoted to agriculture and natural resource extraction) and social factors (life expectancy, the rate of literacy, poverty). The UN-produced Human Development Index (HDI) is a compound indicator of the above statistics. There is a strong correlation between low income and high population growth, both within and between countries. In developing countries, there is low per capita income, widespread poverty, and low capital formation. In developed countries there is continuous economic growth and a relatively high standard of living. The term is value-laden and prescriptive, as it implies a natural transition from "undeveloped" to "developed" when such transitions can instead be imposed. Although poverty and physical deprivation are clearly undesirable, it does not follow that it is therefore desirable for "undeveloped" economies to move towards affluent Western-style "developed" free market economies. The terms "industrialised" and "non-industrialised" are no different in this assumption.</span></li><span data-dcnode-id="4445" instrument_node="">
</span><li data-dcnode-id="4440"><b data-dcnode-id="4442"><a class="mw-redirect" data-dcnode-id="4443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DfE" title="DfE"><span data-dcnode-id="4444" instrument_node="">dfE</span></a></b><span data-dcnode-id="4441" instrument_node=""> – design for the environment; dfE considers 'cradle to grave' costs and benefits associated with material acquisition, manufacture, use, and disposal.</span></li><span data-dcnode-id="4439" instrument_node="">
</span><li data-dcnode-id="4434"><b data-dcnode-id="4436"><a class="new" data-dcnode-id="4437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDfM%26action%3Dedit%26redlink%3D1" title="DfM (page does not exist)"><span data-dcnode-id="4438" instrument_node="">dfM</span></a></b><span data-dcnode-id="4435" instrument_node=""> – design for manufacturing; designing products in such a way that they are easy to manufacture.</span></li><span data-dcnode-id="4433" instrument_node="">
</span><li data-dcnode-id="4428"><b data-dcnode-id="4430"><a class="new" data-dcnode-id="4431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDfS%26action%3Dedit%26redlink%3D1" title="DfS (page does not exist)"><span data-dcnode-id="4432" instrument_node="">dfS</span></a></b><span data-dcnode-id="4429" instrument_node=""> – design for sustainability; an integrated design approach aiming to achieve both environmental quality and economic efficiency through the redesign of industrial systems.</span></li><span data-dcnode-id="4427" instrument_node="">
</span><li data-dcnode-id="4422"><b data-dcnode-id="4424"><a class="new" data-dcnode-id="4425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDfX%26action%3Dedit%26redlink%3D1" title="DfX (page does not exist)"><span data-dcnode-id="4426" instrument_node="">dfX</span></a></b><span data-dcnode-id="4423" instrument_node=""> – design for assembly/disassembly, re-use. recycle.</span></li><span data-dcnode-id="4421" instrument_node="">
</span><li data-dcnode-id="4416"><b data-dcnode-id="4418"><a data-dcnode-id="4419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forest_dieback" title="Forest dieback"><span data-dcnode-id="4420" instrument_node="">dieback</span></a></b><span data-dcnode-id="4417" instrument_node=""> – (arboriculture) a condition in trees or woody plants in which peripheral parts are killed, either by parasites or due to conditions such as acid rain.</span></li><span data-dcnode-id="4415" instrument_node="">
</span><li data-dcnode-id="4410"><b data-dcnode-id="4412"><a data-dcnode-id="4413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dietary_energy_supply" title="Dietary energy supply"><span data-dcnode-id="4414" instrument_node="">dietary energy supply</span></a></b><span data-dcnode-id="4411" instrument_node=""> – food available for human consumption, usually expressed in kilocalories per person per day.</span></li><span data-dcnode-id="4409" instrument_node="">
</span><li data-dcnode-id="4398"><b data-dcnode-id="4406"><a data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dioxins_and_dioxin-like_compounds" title="Dioxins and dioxin-like compounds"><span data-dcnode-id="4408" instrument_node="">dioxin</span></a></b><span data-dcnode-id="4405" instrument_node=""> - any one of a number of chemical compounds that are </span><a data-dcnode-id="4403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persistent_organic_pollutant" title="Persistent organic pollutant"><span data-dcnode-id="4404" instrument_node="">persistent organic pollutants</span></a><span data-dcnode-id="4402" instrument_node=""> and are </span><a class="mw-redirect" data-dcnode-id="4400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carcinogenic" title="Carcinogenic"><span data-dcnode-id="4401" instrument_node="">carcinogenic</span></a><span data-dcnode-id="4399" instrument_node="">.</span></li><span data-dcnode-id="4397" instrument_node="">
</span><li data-dcnode-id="4392"><b data-dcnode-id="4394"><a class="new" data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDistributed_water%26action%3Dedit%26redlink%3D1" title="Distributed water (page does not exist)"><span data-dcnode-id="4396" instrument_node="">distributed water</span></a></b><span data-dcnode-id="4393" instrument_node=""> – (water management) purchased water supplied to a user; this is usually through a reticulated mains system (but also through pipes and open channels, irrigation systems supplied to farms).</span></li><span data-dcnode-id="4391" instrument_node="">
</span><li data-dcnode-id="4386"><b data-dcnode-id="4388"><a class="new" data-dcnode-id="4389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDiversion_rate%26action%3Dedit%26redlink%3D1" title="Diversion rate (page does not exist)"><span data-dcnode-id="4390" instrument_node="">diversion rate</span></a></b><span data-dcnode-id="4387" instrument_node=""> – (waste disposal) the proportion of a potentially recyclable material that has been diverted out of the waste disposal stream and therefore not directed to landfill.</span></li><span data-dcnode-id="4385" instrument_node="">
</span><li data-dcnode-id="4380"><b data-dcnode-id="4382"><a class="new" data-dcnode-id="4383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDivertible_resource%26action%3Dedit%26redlink%3D1" title="Divertible resource (page does not exist)"><span data-dcnode-id="4384" instrument_node="">divertible resource</span></a></b><span data-dcnode-id="4381" instrument_node=""> – (water management) the proportion of water runoff and recharge that can be accessed for human use.</span></li><span data-dcnode-id="4379" instrument_node="">
</span><li data-dcnode-id="4374"><b data-dcnode-id="4376"><a data-dcnode-id="4377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Downcycling" title="Downcycling"><span data-dcnode-id="4378" instrument_node="">downcycling</span></a></b><span data-dcnode-id="4375" instrument_node=""> – (waste management) recycling in which the quality of an item is diminished with each recycling.</span></li><span data-dcnode-id="4373" instrument_node="">
</span><li data-dcnode-id="4368"><b data-dcnode-id="4370"><a data-dcnode-id="4371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Downstream_%28manufacturing%29" title="Downstream (manufacturing)"><span data-dcnode-id="4372" instrument_node="">downstream</span></a></b><span data-dcnode-id="4369" instrument_node=""> – those processes occurring after a particular activity e.g. the transport of a manufactured product from a factory to the wholesale or retail outlet cf. upstream.</span></li><span data-dcnode-id="4367" instrument_node="">
</span><li data-dcnode-id="4362"><b data-dcnode-id="4364"><a data-dcnode-id="4365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drainage" title="Drainage"><span data-dcnode-id="4366" instrument_node="">drainage</span></a></b><span data-dcnode-id="4363" instrument_node=""> – (water management) that part of irrigation or rainfall that runs off an area or is lost to deep percolation.</span></li><span data-dcnode-id="4361" instrument_node="">
</span><li data-dcnode-id="4356"><b data-dcnode-id="4358"><a data-dcnode-id="4359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drawdown_%28hydrology%29" title="Drawdown (hydrology)"><span data-dcnode-id="4360" instrument_node="">drawdown</span></a></b><span data-dcnode-id="4357" instrument_node=""> – (water management) drop in water level, generally applied to wells or bores.</span></li><span data-dcnode-id="4355" instrument_node="">
</span><li data-dcnode-id="4350"><b data-dcnode-id="4352"><a data-dcnode-id="4353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dredging" title="Dredging"><span data-dcnode-id="4354" instrument_node="">dredging</span></a></b><span data-dcnode-id="4351" instrument_node=""> - (water management) the repositioning of soil from an aquatic environment, using specialized equipment, in order to initiate infrastructural and/or ecological improvements.</span></li><span data-dcnode-id="4349" instrument_node="">
</span><li data-dcnode-id="4341"><b data-dcnode-id="4346"><a class="mw-redirect" data-dcnode-id="4347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drift_net" title="Drift net"><span data-dcnode-id="4348" instrument_node="">drift net</span></a></b><span data-dcnode-id="4345" instrument_node=""> - a type of </span><a data-dcnode-id="4343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fishing_net" title="Fishing net"><span data-dcnode-id="4344" instrument_node="">fishing net</span></a><span data-dcnode-id="4342" instrument_node=""> used in oceans, coastal seas and freshwater lakes.</span></li><span data-dcnode-id="4340" instrument_node="">
</span><li data-dcnode-id="4335"><b data-dcnode-id="4337"><a data-dcnode-id="4338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drinking_water" title="Drinking water"><span data-dcnode-id="4339" instrument_node="">drinking water</span></a></b><span data-dcnode-id="4336" instrument_node=""> – (potable water) – water fit for human consumption in accordance with World Health Organisation guidelines.</span></li><span data-dcnode-id="4334" instrument_node="">
</span><li data-dcnode-id="4329"><b data-dcnode-id="4331"><a data-dcnode-id="4332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drip_irrigation" title="Drip irrigation"><span data-dcnode-id="4333" instrument_node="">drip irrigation</span></a></b><span data-dcnode-id="4330" instrument_node=""> – (water management) a drip hose placed near the plant roots so minimising deep percolation and evaporation.</span></li><span data-dcnode-id="4328" instrument_node="">
</span><li data-dcnode-id="4323"><b data-dcnode-id="4325"><a class="new" data-dcnode-id="4326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDriver_%28ecology%29%26action%3Dedit%26redlink%3D1" title="Driver (ecology) (page does not exist)"><span data-dcnode-id="4327" instrument_node="">driver</span></a></b><span data-dcnode-id="4324" instrument_node=""> – (ecology) any natural or human-induced factor that directly or indirectly causes a change in an ecosystem. A direct driver is one that unequivocally influences ecosystem processes and that can be measured.</span></li><span data-dcnode-id="4322" instrument_node="">
</span><li data-dcnode-id="4317"><b data-dcnode-id="4319"><a class="new" data-dcnode-id="4320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDrop-off_centre%26action%3Dedit%26redlink%3D1" title="Drop-off centre (page does not exist)"><span data-dcnode-id="4321" instrument_node="">drop-off centre</span></a></b><span data-dcnode-id="4318" instrument_node=""> – (waste management) a location where discarded materials can be left for recycling.</span></li><span data-dcnode-id="4316" instrument_node="">
</span><li data-dcnode-id="4311"><b data-dcnode-id="4313"><a data-dcnode-id="4314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drought" title="Drought"><span data-dcnode-id="4315" instrument_node="">drought</span></a></b><span data-dcnode-id="4312" instrument_node=""> – an acute water shortage relative to availability, supply and demand in a particular region. An extended period of months or years when a region notes a deficiency in its water supply. Generally, this occurs when a region receives consistently below average precipitation.</span></li><span data-dcnode-id="4310" instrument_node="">
</span><li data-dcnode-id="4305"><b data-dcnode-id="4307"><a data-dcnode-id="4308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dryland_salinity" title="Dryland salinity"><span data-dcnode-id="4309" instrument_node="">dryland salinity</span></a></b><span data-dcnode-id="4306" instrument_node=""> -  (water management) accumulation of salts in soils, soil water and ground water; may be natural or induced by land clearing</span></li></ul><span data-dcnode-id="4303" instrument_node="">
</span><h2 data-dcnode-id="4293"><span class="mw-headline" data-dcnode-id="4301" id="E"><span data-dcnode-id="4302" instrument_node="">E</span></span><span class="mw-editsection" data-dcnode-id="4294"><span class="mw-editsection-bracket" data-dcnode-id="4299"><span data-dcnode-id="4300" instrument_node="">[</span></span><a data-dcnode-id="4297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D6" title="Edit section: E"><span data-dcnode-id="4298" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4295"><span data-dcnode-id="4296" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4292" instrument_node="">
</span><ul data-dcnode-id="4109"><li data-dcnode-id="4287"><b data-dcnode-id="4289"><a class="mw-redirect" data-dcnode-id="4290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eco-" title="Eco-"><span data-dcnode-id="4291" instrument_node="">eco-</span></a></b><span data-dcnode-id="4288" instrument_node="">  - a prefix now added to many words indicating a general consideration for the environment e.g. ecohousing, ecolabel, ecomaterial.</span></li><span data-dcnode-id="4286" instrument_node="">
</span><li data-dcnode-id="4281"><b data-dcnode-id="4283"><a class="new" data-dcnode-id="4284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEco-asset%26action%3Dedit%26redlink%3D1" title="Eco-asset (page does not exist)"><span data-dcnode-id="4285" instrument_node="">eco-asset</span></a></b><span data-dcnode-id="4282" instrument_node="">  – a biological asset that provides financial value to private land owners when they are maintained in or restored to their natural state.</span></li><span data-dcnode-id="4280" instrument_node="">
</span><li data-dcnode-id="4275"><b data-dcnode-id="4277"><a data-dcnode-id="4278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecolabel" title="Ecolabel"><span data-dcnode-id="4279" instrument_node="">ecolabel</span></a></b><span data-dcnode-id="4276" instrument_node="">  - seal or logo indicating a product has met a certain environmental or social standards.</span></li><span data-dcnode-id="4274" instrument_node="">
</span><li data-dcnode-id="4269"><b data-dcnode-id="4271"><a class="mw-redirect" data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecological_deficit" title="Ecological deficit"><span data-dcnode-id="4273" instrument_node="">ecological deficit</span></a></b><span data-dcnode-id="4270" instrument_node="">  - of a country or region measures the amount by which its Ecological Footprint exceeds the ecological capacity of that region.</span></li><span data-dcnode-id="4268" instrument_node="">
</span><li data-dcnode-id="4263"><b data-dcnode-id="4265"><a class="mw-redirect" data-dcnode-id="4266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecological_Footprint" title="Ecological Footprint"><span data-dcnode-id="4267" instrument_node="">Ecological Footprint</span></a></b><span data-dcnode-id="4264" instrument_node="">   (Eco-footprint, Footprint)– a measure of the area of biologically productive land and water needed to produce the resources and absorb the wastes of a population using the prevailing technology and resource management schemes; a measure of the consumption of renewable natural resources by a human population, be it that of a country, a region or the whole world given as the total area of productive land or sea required to produce all the crops, meat, seafood, wood and fibre it consumes, to sustain its energy consumption and to give space for its infrastructure.</span></li><span data-dcnode-id="4262" instrument_node="">
</span><li data-dcnode-id="4257"><b data-dcnode-id="4259"><a data-dcnode-id="4260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecological_niche" title="Ecological niche"><span data-dcnode-id="4261" instrument_node="">ecological niche</span></a></b><span data-dcnode-id="4258" instrument_node=""> - the habitat of a species or population within its ecosystem.</span></li><span data-dcnode-id="4256" instrument_node="">
</span><li data-dcnode-id="4251"><b data-dcnode-id="4253"><a data-dcnode-id="4254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecological_succession" title="Ecological succession"><span data-dcnode-id="4255" instrument_node="">ecological succession</span></a></b><span data-dcnode-id="4252" instrument_node=""> - the more-or-less predictable and orderly changes in the composition or structure of an ecological community with time.</span></li><span data-dcnode-id="4250" instrument_node="">
</span><li data-dcnode-id="4245"><b data-dcnode-id="4247"><a class="mw-redirect" data-dcnode-id="4248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecological_sustainability" title="Ecological sustainability"><span data-dcnode-id="4249" instrument_node="">ecological sustainability</span></a></b><span data-dcnode-id="4246" instrument_node="">  - the capacity of ecosystems to maintain their essential processes and function and to retain their biological diversity without impoverishment.</span></li><span data-dcnode-id="4244" instrument_node="">
</span><li data-dcnode-id="4239"><b data-dcnode-id="4241"><a data-dcnode-id="4242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecologically_sustainable_development" title="Ecologically sustainable development"><span data-dcnode-id="4243" instrument_node="">ecologically sustainable development</span></a></b><span data-dcnode-id="4240" instrument_node="">  - using, conserving and enhancing the human community's resources so that ecological processes, on which all life depends, can be maintained and enriched into the future.</span></li><span data-dcnode-id="4238" instrument_node="">
</span><li data-dcnode-id="4233"><b data-dcnode-id="4235"><a data-dcnode-id="4236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecology" title="Ecology"><span data-dcnode-id="4237" instrument_node="">ecology</span></a></b><span data-dcnode-id="4234" instrument_node="">  - the scientific study of living organisms and their relationships to one another and their environment; the scientific study of the processes regulating the distribution and abundance of organisms; the study of the design of ecosystem structure and function.</span></li><span data-dcnode-id="4232" instrument_node="">
</span><li data-dcnode-id="4227"><b data-dcnode-id="4229"><a data-dcnode-id="4230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Externality" title="Externality"><span data-dcnode-id="4231" instrument_node="">externality</span></a></b><span data-dcnode-id="4228" instrument_node="">  – a cost or benefit that are not borne by the producer or supplier of a good or service. In many environmental situations environmental deterioration may be caused by a few while the cost is borne by the community; examples would include overfishing, pollution (e.g. production of greenhouse emissions that are not compensated for in any way by taxes etc.), the environmental cost of land-clearing etc.</span></li><span data-dcnode-id="4226" instrument_node="">
</span><li data-dcnode-id="4221"><b data-dcnode-id="4223"><a data-dcnode-id="4224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecoregion" title="Ecoregion"><span data-dcnode-id="4225" instrument_node="">ecoregion</span></a></b><span data-dcnode-id="4222" instrument_node=""> - (bioregion) the next smallest ecologically and geographically defined area beneath realm (or ecozone).</span></li><span data-dcnode-id="4220" instrument_node="">
</span><li data-dcnode-id="4212"><b data-dcnode-id="4217"><a class="new" data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEcosystem_boundary%26action%3Dedit%26redlink%3D1" title="Ecosystem boundary (page does not exist)"><span data-dcnode-id="4219" instrument_node="">ecosystem boundary</span></a></b><span data-dcnode-id="4216" instrument_node="">  – the spatial </span><a class="mw-redirect" data-dcnode-id="4214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delimitation" title="Delimitation"><span data-dcnode-id="4215" instrument_node="">delimitation</span></a><span data-dcnode-id="4213" instrument_node=""> of an ecosystem usually based on discontinuities of organisms and the physical environment.</span></li><span data-dcnode-id="4211" instrument_node="">
</span><li data-dcnode-id="4206"><b data-dcnode-id="4208"><a class="mw-redirect" data-dcnode-id="4209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecosystem_services" title="Ecosystem services"><span data-dcnode-id="4210" instrument_node="">ecosystem services</span></a></b><span data-dcnode-id="4207" instrument_node="">  - the role played by organisms, without charge, in creating a healthy environment for human beings, from production of oxygen to soil formation, maintenance of water quality and much more. These services are now generally divided into four groups, supporting, provisioning, regulating and cultural.</span></li><span data-dcnode-id="4205" instrument_node="">
</span><li data-dcnode-id="4200"><b data-dcnode-id="4202"><a data-dcnode-id="4203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecosystem" title="Ecosystem"><span data-dcnode-id="4204" instrument_node="">ecosystem</span></a></b><span data-dcnode-id="4201" instrument_node="">  - a dynamic complex of plant, animal and microorganism communities and their non-living environment all interacting as a functional unit.</span></li><span data-dcnode-id="4199" instrument_node="">
</span><li data-dcnode-id="4194"><b data-dcnode-id="4196"><a class="mw-redirect" data-dcnode-id="4197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/E-cycling" title="E-cycling"><span data-dcnode-id="4198" instrument_node="">e-cycling</span></a></b><span data-dcnode-id="4195" instrument_node="">  – recycling electronic waste.</span></li><span data-dcnode-id="4193" instrument_node="">
</span><li data-dcnode-id="4188"><b data-dcnode-id="4190"><a class="new" data-dcnode-id="4191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEffective_rainfall%26action%3Dedit%26redlink%3D1" title="Effective rainfall (page does not exist)"><span data-dcnode-id="4192" instrument_node="">effective rainfall</span></a></b><span data-dcnode-id="4189" instrument_node="">  – the volume of rainfall passing into the soil; that part of rainfall available for plant use after runoff, leaching, evaporation and foliage interception.</span></li><span data-dcnode-id="4187" instrument_node="">
</span><li data-dcnode-id="4182"><b data-dcnode-id="4184"><a data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Efficient_energy_use" title="Efficient energy use"><span data-dcnode-id="4186" instrument_node="">energy efficiency</span></a></b><span data-dcnode-id="4183" instrument_node=""> - using less energy to provide the same level of energy service.</span></li><span data-dcnode-id="4181" instrument_node="">
</span><li data-dcnode-id="4176"><b data-dcnode-id="4178"><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Effluent" title="Effluent"><span data-dcnode-id="4180" instrument_node="">effluent</span></a></b><span data-dcnode-id="4177" instrument_node="">  - a discharge or emission of liquid, gas or other waste product.</span></li><span data-dcnode-id="4175" instrument_node="">
</span><li data-dcnode-id="4170"><b data-dcnode-id="4172"><a data-dcnode-id="4173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/El_Ni%25C3%25B1o" title="El Niño"><span data-dcnode-id="4174" instrument_node="">El Niño</span></a></b><span data-dcnode-id="4171" instrument_node="">  - a warm water current which periodically flows southwards along the coast of Ecuador and Peru in South America, replacing the usually cold northwards flowing current; occurs once every five to seven years, usually during the Christmas season (the name refers to the Christ child); the opposite phase of an El Niño is called a La Niña.</span></li><span data-dcnode-id="4169" instrument_node="">
</span><li data-dcnode-id="4164"><b data-dcnode-id="4166"><a data-dcnode-id="4167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Embodied_energy" title="Embodied energy"><span data-dcnode-id="4168" instrument_node="">embodied energy</span></a></b><span data-dcnode-id="4165" instrument_node="">  - the energy expended over the entire life cycle of a good or service cf. emergy.</span></li><span data-dcnode-id="4163" instrument_node="">
</span><li data-dcnode-id="4158"><b data-dcnode-id="4160"><a class="mw-redirect" data-dcnode-id="4161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emergent_property" title="Emergent property"><span data-dcnode-id="4162" instrument_node="">emergent property</span></a></b><span data-dcnode-id="4159" instrument_node="">  – a property that is not evident in the individual components of an object or system.</span></li><span data-dcnode-id="4157" instrument_node="">
</span><li data-dcnode-id="4152"><b data-dcnode-id="4154"><a data-dcnode-id="4155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emergy" title="Emergy"><span data-dcnode-id="4156" instrument_node="">emergy</span></a></b><span data-dcnode-id="4153" instrument_node="">  – “energy memory” all the available energy that was used in the work of making a product directly and indirectly, expressed in units of one type of available energy (work previously done to provide a product or service); the energy of one type required to make energy of another.</span></li><span data-dcnode-id="4151" instrument_node="">
</span><li data-dcnode-id="4146"><b data-dcnode-id="4148"><a class="mw-redirect" data-dcnode-id="4149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emission_standard" title="Emission standard"><span data-dcnode-id="4150" instrument_node="">emission standard</span></a></b><span data-dcnode-id="4147" instrument_node="">  - a level of emissions that, under law, may not be exceeded.</span></li><span data-dcnode-id="4145" instrument_node="">
</span><li data-dcnode-id="4140"><b data-dcnode-id="4142"><a class="mw-redirect" data-dcnode-id="4143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emissions_intensity" title="Emissions intensity"><span data-dcnode-id="4144" instrument_node="">emissions intensity</span></a></b><span data-dcnode-id="4141" instrument_node="">  – emissions expressed as quantity per monetary unit.</span></li><span data-dcnode-id="4139" instrument_node="">
</span><li data-dcnode-id="4134"><b data-dcnode-id="4136"><a data-dcnode-id="4137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emissions_trading" title="Emissions trading"><span data-dcnode-id="4138" instrument_node="">emissions trading</span></a></b><span data-dcnode-id="4135" instrument_node="">  – see carbon trading.</span></li><span data-dcnode-id="4133" instrument_node="">
</span><li data-dcnode-id="4128"><b data-dcnode-id="4130"><a data-dcnode-id="4131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exhaust_gas" title="Exhaust gas"><span data-dcnode-id="4132" instrument_node="">emissions</span></a></b><span data-dcnode-id="4129" instrument_node="">  - substances such as gases or particles discharged into the atmosphere as a result of natural processes of human activities, including those from chimneys, elevated point sources, and tailpipes of motor vehicles.</span></li><span data-dcnode-id="4127" instrument_node="">
</span><li data-dcnode-id="4122"><b data-dcnode-id="4124"><a data-dcnode-id="4125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Endangered_species" title="Endangered species"><span data-dcnode-id="4126" instrument_node="">endangered species</span></a></b><span data-dcnode-id="4123" instrument_node=""> – a species which is at risk of becoming extinct because it is either few in number, or threatened by changing environmental or predation parameters.</span></li><span data-dcnode-id="4121" instrument_node="">
</span><li data-dcnode-id="4116"><b data-dcnode-id="4118"><a data-dcnode-id="4119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Energy_flow_%28ecology%29" title="Energy flow (ecology)"><span data-dcnode-id="4120" instrument_node="">energetics</span></a></b><span data-dcnode-id="4117" instrument_node=""> –  the study of how energy flows within an ecosystem: the routes it takes, rates of flow, where it is stored and how it is used.</span></li><span data-dcnode-id="4115" instrument_node="">
</span><li data-dcnode-id="4110"><b data-dcnode-id="4112"><a data-dcnode-id="4113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Energy" title="Energy"><span data-dcnode-id="4114" instrument_node="">energy</span></a></b><span data-dcnode-id="4111" instrument_node=""> -  a property of all systems which can be turned into heat and measured in heat units.</span></li></ul><span data-dcnode-id="4108" instrument_node="">
</span><dl data-dcnode-id="4000"><dd data-dcnode-id="4103"><span data-dcnode-id="4107" instrument_node="">* </span><i data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">available energy</span></i><span data-dcnode-id="4104" instrument_node=""> – energy with the potential to do work (exergy);</span></dd><span data-dcnode-id="4102" instrument_node="">

</span><dd data-dcnode-id="4091"><span data-dcnode-id="4095" instrument_node="">* </span><i data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">direct energy</span></i><span data-dcnode-id="4092" instrument_node=""> - the energy being currently used, used mostly at home (delivered energy) and for fuels used mainly for transport;</span></dd><span data-dcnode-id="4090" instrument_node="">
</span><dd data-dcnode-id="4085"><span data-dcnode-id="4089" instrument_node="">* </span><i data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">embodied energy</span></i><span data-dcnode-id="4086" instrument_node=""> - t the energy expended over the entire life cycle of a good or service OR the energy involved in the extraction of basic materials, processing/manufacture, transport and disposal of a product OR the energy required to provide a good or service;</span></dd><span data-dcnode-id="4084" instrument_node="">
</span><dd data-dcnode-id="4079"><span data-dcnode-id="4083" instrument_node="">* </span><i data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">geothermal energy</span></i><span data-dcnode-id="4080" instrument_node=""> – heat emitted from within the Earth’s crust as hot water or steam and used to generate electricity after transformation;</span></dd><span data-dcnode-id="4078" instrument_node="">
</span><dd data-dcnode-id="4073"><span data-dcnode-id="4077" instrument_node="">* </span><i data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">hydro energy</span></i><span data-dcnode-id="4074" instrument_node=""> – potential and kinetic energy of water used to generate electricity;</span></dd><span data-dcnode-id="4072" instrument_node="">
</span><dd data-dcnode-id="4067"><span data-dcnode-id="4071" instrument_node="">* </span><i data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">indirect energy</span></i><span data-dcnode-id="4068" instrument_node=""> – the energy generated in, and accounted for, by the wider economy as a consequence of an agent’s actions or demands;</span></dd><span data-dcnode-id="4066" instrument_node="">
</span><dd data-dcnode-id="4061"><span data-dcnode-id="4065" instrument_node="">* </span><i data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">kinetic energy</span></i><span data-dcnode-id="4062" instrument_node=""> - the energy possessed by a body because of its motion;</span></dd><span data-dcnode-id="4060" instrument_node="">
</span><dd data-dcnode-id="4055"><span data-dcnode-id="4059" instrument_node="">* </span><i data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">nuclear energy</span></i><span data-dcnode-id="4056" instrument_node=""> - energy released by reactions within atomic nuclei, as in nuclear fission or fusion (also called atomic energy);</span></dd><span data-dcnode-id="4054" instrument_node="">

</span><dd data-dcnode-id="4043"><span data-dcnode-id="4047" instrument_node="">* </span><i data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">potential energy</span></i><span data-dcnode-id="4044" instrument_node=""> – the energy possessed by a body as a result of its position or condition e.g. coiled springs and charged batteries have potential energy;</span></dd><span data-dcnode-id="4042" instrument_node="">
</span><dd data-dcnode-id="4037"><span data-dcnode-id="4041" instrument_node="">* </span><i data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">primary energy</span></i><span data-dcnode-id="4038" instrument_node=""> – forms of energy obtained directly from nature, the energy in raw fuels (electricity from the grid is not primary energy), used mostly in energy statistics when compiling energy balances;</span></dd><span data-dcnode-id="4036" instrument_node="">
</span><dd data-dcnode-id="4031"><span data-dcnode-id="4035" instrument_node="">* </span><i data-dcnode-id="4033"><span data-dcnode-id="4034" instrument_node="">solar energy</span></i><span data-dcnode-id="4032" instrument_node=""> – solar radiation used for hot water production and electricity generation (does not include passive solar energy to heat and cool buildings etc.);</span></dd><span data-dcnode-id="4030" instrument_node="">

</span><ul data-dcnode-id="3791"><li data-dcnode-id="3994"><b data-dcnode-id="3996"><a data-dcnode-id="3997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Energy_accounting" title="Energy accounting"><span data-dcnode-id="3998" instrument_node="">energy accounting</span></a></b><span data-dcnode-id="3995" instrument_node="">  – measuring value by the energy input required for a good or service. A form of accounting that builds in a measure of our impact on nature (rather than being restricted to human-based items).</span></li><span data-dcnode-id="3993" instrument_node="">
</span><li data-dcnode-id="3988"><b data-dcnode-id="3990"><a data-dcnode-id="3991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Energy_audit" title="Energy audit"><span data-dcnode-id="3992" instrument_node="">energy audit</span></a></b><span data-dcnode-id="3989" instrument_node="">  - a systematic gathering and analysis of energy use information that can be used to determine energy efficiency improvements. The Australian and New Zealand Standard AS/NZS 3598:2000 Energy Audits defines three levels of audit.</span></li><span data-dcnode-id="3987" instrument_node="">
</span><li data-dcnode-id="3976"><b data-dcnode-id="3984"><a class="new" data-dcnode-id="3985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEnergy_Footprint%26action%3Dedit%26redlink%3D1" title="Energy Footprint (page does not exist)"><span data-dcnode-id="3986" instrument_node="">Energy Footprint</span></a></b><span data-dcnode-id="3983" instrument_node="">  - the area required to provide or absorb the waste from coal, oil, gas, fuelwood, nuclear energy and hydropower: the Fossil Fuel Footprint is the area required to sequester the emitted CO</span><sub data-dcnode-id="3981" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="3982" instrument_node="">2</span></sub><span data-dcnode-id="3980" instrument_node=""> taking into account CO</span><sub data-dcnode-id="3978" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="3979" instrument_node="">2</span></sub><span data-dcnode-id="3977" instrument_node=""> absorption by the sea etc.</span></li><span data-dcnode-id="3975" instrument_node="">
