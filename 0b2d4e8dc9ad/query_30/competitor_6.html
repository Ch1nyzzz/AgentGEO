</span><ul data-dcnode-id="5244"><li data-dcnode-id="5474"><b data-dcnode-id="5479"><a class="mw-redirect" data-dcnode-id="5480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abiotic" title="Abiotic"><span data-dcnode-id="5481" instrument_node="">abiotic</span></a></b><span data-dcnode-id="5478" instrument_node=""> - non-living chemical and physical factors of the environment (see also </span><a class="mw-redirect" data-dcnode-id="5476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biotic_component" title="Biotic component"><span data-dcnode-id="5477" instrument_node="">biotic</span></a><span data-dcnode-id="5475" instrument_node="">).</span></li><span data-dcnode-id="5473" instrument_node="">
</span><li data-dcnode-id="5468"><b data-dcnode-id="5470"><a class="mw-redirect" data-dcnode-id="5471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soakaway" title="Soakaway"><span data-dcnode-id="5472" instrument_node="">absorption pit</span></a></b><span data-dcnode-id="5469" instrument_node="">  (soakaway) – a hole dug in permeable ground and filled with broken stones or granular material and usually covered with earth allowing collected water to soak into the ground.</span></li><span data-dcnode-id="5467" instrument_node="">
</span><li data-dcnode-id="5462"><b data-dcnode-id="5464"><a data-dcnode-id="5465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absorption_%28chemistry%29" title="Absorption (chemistry)"><span data-dcnode-id="5466" instrument_node="">absorption</span></a></b><span data-dcnode-id="5463" instrument_node=""> -  one substance taking in another, either physically or chemically.</span></li><span data-dcnode-id="5461" instrument_node="">
</span><li data-dcnode-id="5456"><b data-dcnode-id="5458"><a class="mw-redirect" data-dcnode-id="5459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acclimation" title="Acclimation"><span data-dcnode-id="5460" instrument_node="">acclimation</span></a></b><span data-dcnode-id="5457" instrument_node=""> - the process of an organism adjusting to chronic change in its environment.</span></li><span data-dcnode-id="5455" instrument_node="">
</span><li data-dcnode-id="5438"><b data-dcnode-id="5452"><a data-dcnode-id="5453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acid_mine_drainage" title="Acid mine drainage"><span data-dcnode-id="5454" instrument_node="">acid mine drainage</span></a></b><span data-dcnode-id="5451" instrument_node=""> - the outflow of </span><a data-dcnode-id="5449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acid" title="Acid"><span data-dcnode-id="5450" instrument_node="">acidic</span></a><span data-dcnode-id="5448" instrument_node=""> water from </span><a data-dcnode-id="5446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metal" title="Metal"><span data-dcnode-id="5447" instrument_node="">metal</span></a><span data-dcnode-id="5445" instrument_node=""> </span><a data-dcnode-id="5443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mining" title="Mining"><span data-dcnode-id="5444" instrument_node="">mines</span></a><span data-dcnode-id="5442" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="5440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coal_mine" title="Coal mine"><span data-dcnode-id="5441" instrument_node="">coal mines</span></a><span data-dcnode-id="5439" instrument_node="">.</span></li><span data-dcnode-id="5437" instrument_node="">
</span><li data-dcnode-id="5432"><b data-dcnode-id="5434"><a data-dcnode-id="5435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acid_rain" title="Acid rain"><span data-dcnode-id="5436" instrument_node="">acid rain</span></a></b><span data-dcnode-id="5433" instrument_node=""> - rain or other forms of precipitation that is unusually acidic.</span></li><span data-dcnode-id="5431" instrument_node="">
</span><li data-dcnode-id="5426"><b data-dcnode-id="5428"><a data-dcnode-id="5429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptation" title="Adaptation"><span data-dcnode-id="5430" instrument_node="">adaptation</span></a></b><span data-dcnode-id="5427" instrument_node=""> - a characteristic of an organism that has been favoured by natural selection.</span></li><span data-dcnode-id="5425" instrument_node="">
</span><li data-dcnode-id="5420"><b data-dcnode-id="5422"><a data-dcnode-id="5423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptive_radiation" title="Adaptive radiation"><span data-dcnode-id="5424" instrument_node="">adaptive radiation</span></a></b><span data-dcnode-id="5421" instrument_node=""> - closely related species that look very different, as a result of having adapted to widely different ecological niches.</span></li><span data-dcnode-id="5419" instrument_node="">
</span><li data-dcnode-id="5414"><b data-dcnode-id="5416"><a data-dcnode-id="5417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adsorption" title="Adsorption"><span data-dcnode-id="5418" instrument_node="">adsorption</span></a></b><span data-dcnode-id="5415" instrument_node=""> - one substance taking up another at its surface.</span></li><span data-dcnode-id="5413" instrument_node="">
</span><li data-dcnode-id="5408"><b data-dcnode-id="5410"><a data-dcnode-id="5411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aerobic_organism" title="Aerobic organism"><span data-dcnode-id="5412" instrument_node="">aerobic</span></a></b><span data-dcnode-id="5409" instrument_node=""> - requiring air or oxygen; used in reference to decomposition processes that occur in the presence of oxygen.</span></li><span data-dcnode-id="5407" instrument_node="">
</span><li data-dcnode-id="5402"><b data-dcnode-id="5404"><a class="mw-redirect" data-dcnode-id="5405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aerosols" title="Aerosols"><span data-dcnode-id="5406" instrument_node="">aerosols</span></a></b><span data-dcnode-id="5403" instrument_node=""> -  solid or liquid particles suspended within the atmosphere.</span></li><span data-dcnode-id="5401" instrument_node="">
</span><li data-dcnode-id="5392"><b data-dcnode-id="5398"><a data-dcnode-id="5399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Affluenza" title="Affluenza"><span data-dcnode-id="5400" instrument_node="">affluenza</span></a></b><span data-dcnode-id="5397" instrument_node=""> -  as defined in the book of the same name</span><sup class="reference" data-dcnode-id="5394" id="cite_ref-1"><a data-dcnode-id="5395" href="#cite_note-1"><span data-dcnode-id="5396" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5393" instrument_node=""> 1. the bloated, sluggish and unfulfilled feeling that results from efforts to keep up with the Joneses. 2. an epidemic of stress, overwork, waste and indebtedness caused by dogged pursuit of the Australian dream. 3. an unsustainable addiction to economic growth. The traditional Western environmentally unfriendly high consumption life-style: a play on the words affluence and influenza cf. froogle, freegan.</span></li><span data-dcnode-id="5391" instrument_node="">
</span><li data-dcnode-id="5386"><b data-dcnode-id="5388"><a data-dcnode-id="5389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afforestation" title="Afforestation"><span data-dcnode-id="5390" instrument_node="">afforestation</span></a></b><span data-dcnode-id="5387" instrument_node=""> -  planting new forests on lands that have not been recently forested.</span></li><span data-dcnode-id="5385" instrument_node="">
</span><li data-dcnode-id="5380"><b data-dcnode-id="5382"><a data-dcnode-id="5383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agroforestry" title="Agroforestry"><span data-dcnode-id="5384" instrument_node="">agroforestry</span></a></b><span data-dcnode-id="5381" instrument_node=""> -  (sustainability) an ecologically based farming system, that, through the integration of trees in farms, increases social, environmental and economic benefits to land users.</span></li><span data-dcnode-id="5379" instrument_node="">
</span><li data-dcnode-id="5374"><b data-dcnode-id="5376"><a data-dcnode-id="5377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Air_pollution" title="Air pollution"><span data-dcnode-id="5378" instrument_node="">air pollution</span></a></b><span data-dcnode-id="5375" instrument_node=""> -  the modification of the natural characteristics of the atmosphere by a chemical, particulate matter, or biological agent.</span></li><span data-dcnode-id="5373" instrument_node="">
</span><li data-dcnode-id="5368"><b data-dcnode-id="5370"><a data-dcnode-id="5371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albedo" title="Albedo"><span data-dcnode-id="5372" instrument_node="">albedo</span></a></b><span data-dcnode-id="5369" instrument_node=""> -  reflectance; the ratio of light from the Sun that is reflected by the Earth's surface, to the light received by it. Unreflected light is converted to infrared radiation (heat), which causes atmospheric warming (see "radiative forcing"). Thus, surfaces with a high albedo, like snow and ice, generally contribute to cooling, whereas surfaces with a low albedo, like forests, generally contribute to warming. Changes in land use that significantly alter the characteristics of land surfaces can alter the albedo.</span></li><span data-dcnode-id="5367" instrument_node="">
</span><li data-dcnode-id="5362"><b data-dcnode-id="5364"><a data-dcnode-id="5365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Algal_bloom" title="Algal bloom"><span data-dcnode-id="5366" instrument_node="">algal bloom</span></a></b><span data-dcnode-id="5363" instrument_node=""> -  the rapid and excessive growth of algae; generally caused by high nutrient levels combined with other favourable conditions. Blooms can deoxygenate the water leading to the loss of wildlife.</span></li><span data-dcnode-id="5361" instrument_node="">
</span><li data-dcnode-id="5353"><b data-dcnode-id="5358"><a class="mw-redirect" data-dcnode-id="5359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alien_species" title="Alien species"><span data-dcnode-id="5360" instrument_node="">alien species</span></a></b><span data-dcnode-id="5357" instrument_node="">  -  see </span><a data-dcnode-id="5355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Introduced_species" title="Introduced species"><span data-dcnode-id="5356" instrument_node="">introduced species</span></a><span data-dcnode-id="5354" instrument_node="">.</span></li><span data-dcnode-id="5352" instrument_node="">
</span><li data-dcnode-id="5347"><b data-dcnode-id="5349"><a data-dcnode-id="5350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alloy" title="Alloy"><span data-dcnode-id="5351" instrument_node="">alloy</span></a></b><span data-dcnode-id="5348" instrument_node=""> - composite blend of materials made under special conditions. Metal alloys like brass and bronze are well known but there are also many plastic alloys.</span></li><span data-dcnode-id="5346" instrument_node="">
</span><li data-dcnode-id="5341"><b data-dcnode-id="5343"><a class="mw-redirect" data-dcnode-id="5344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alternative_fuels" title="Alternative fuels"><span data-dcnode-id="5345" instrument_node="">alternative fuels</span></a></b><span data-dcnode-id="5342" instrument_node=""> -  fuels like ethanol and compressed natural gas that produce fewer emissions than the traditional fossil fuels.</span></li><span data-dcnode-id="5340" instrument_node="">
</span><li data-dcnode-id="5335"><b data-dcnode-id="5337"><a data-dcnode-id="5338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anaerobic_digestion" title="Anaerobic digestion"><span data-dcnode-id="5339" instrument_node="">anaerobic digestion</span></a></b><span data-dcnode-id="5336" instrument_node=""> -  the biological degradation of organic materials in the absence of oxygen to yield methane gas (that may be combusted to produce energy) and stabilised organic residues (that may be used as a soil additive).</span></li><span data-dcnode-id="5334" instrument_node="">
</span><li data-dcnode-id="5329"><b data-dcnode-id="5331"><a data-dcnode-id="5332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anaerobic_respiration" title="Anaerobic respiration"><span data-dcnode-id="5333" instrument_node="">anaerobic</span></a></b><span data-dcnode-id="5330" instrument_node=""> -  not requiring air or oxygen; used in reference to decomposition processes that occur in the absence of oxygen.</span></li><span data-dcnode-id="5328" instrument_node="">
</span><li data-dcnode-id="5320"><b data-dcnode-id="5325"><a class="mw-redirect" data-dcnode-id="5326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_forest" title="Ancient forest"><span data-dcnode-id="5327" instrument_node="">ancient forest</span></a></b><span data-dcnode-id="5324" instrument_node="">  - see </span><a class="mw-redirect" data-dcnode-id="5322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_growth_forest" title="Old growth forest"><span data-dcnode-id="5323" instrument_node="">old growth forest</span></a><span data-dcnode-id="5321" instrument_node="">.</span></li><span data-dcnode-id="5319" instrument_node="">
</span><li data-dcnode-id="5314"><b data-dcnode-id="5316"><a data-dcnode-id="5317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypoxia_%28environmental%29" title="Hypoxia (environmental)"><span data-dcnode-id="5318" instrument_node="">anoxic</span></a></b><span data-dcnode-id="5315" instrument_node=""> -  - with abnormally low levels of oxygen.</span></li><span data-dcnode-id="5313" instrument_node="">
</span><li data-dcnode-id="5308"><b data-dcnode-id="5310"><a data-dcnode-id="5311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_impact_on_the_environment" title="Human impact on the environment"><span data-dcnode-id="5312" instrument_node="">anthropogenic</span></a></b><span data-dcnode-id="5309" instrument_node=""> -  man-made, not natural.</span></li><span data-dcnode-id="5307" instrument_node="">
</span><li data-dcnode-id="5302"><b data-dcnode-id="5304"><a data-dcnode-id="5305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthroposophy" title="Anthroposophy"><span data-dcnode-id="5306" instrument_node="">anthroposophy</span></a></b><span data-dcnode-id="5303" instrument_node=""> -  spiritual philosophy based on the teachings of Rudolf Steiner (25 February 1861 – 30 March 1925) which postulates the existence of an objective, intellectually comprehensible spiritual world accessible to direct experience through inner development - more specifically through cultivating conscientiously a form of thinking independent of sensory experience. Steiner was the initiator of biodynamic gardening.</span></li><span data-dcnode-id="5301" instrument_node="">
</span><li data-dcnode-id="5296"><b data-dcnode-id="5298"><a class="new" data-dcnode-id="5299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DApplication_efficiency%26action%3Dedit%26redlink%3D1" title="Application efficiency (page does not exist)"><span data-dcnode-id="5300" instrument_node="">application efficiency</span></a></b><span data-dcnode-id="5297" instrument_node=""> -  (sustainability) the efficiency of watering after losses due to runoff, leaching, evaporation, wind etc.</span></li><span data-dcnode-id="5295" instrument_node="">
</span><li data-dcnode-id="5290"><b data-dcnode-id="5292"><a class="mw-redirect" data-dcnode-id="5293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Appropriated_carrying_capacity" title="Appropriated carrying capacity"><span data-dcnode-id="5294" instrument_node="">appropriated carrying capacity</span></a></b><span data-dcnode-id="5291" instrument_node=""> -  another name for the Ecological Footprint, but often used in referring to the imported ecological capacity of goods from overseas.</span></li><span data-dcnode-id="5289" instrument_node="">
</span><li data-dcnode-id="5284"><b data-dcnode-id="5286"><a data-dcnode-id="5287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aquaculture" title="Aquaculture"><span data-dcnode-id="5288" instrument_node="">aquaculture</span></a></b><span data-dcnode-id="5285" instrument_node=""> -  the cultivation of aquatic organisms under controlled conditions.</span></li><span data-dcnode-id="5283" instrument_node="">
</span><li data-dcnode-id="5278"><b data-dcnode-id="5280"><a data-dcnode-id="5281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aquifer" title="Aquifer"><span data-dcnode-id="5282" instrument_node="">aquifer</span></a></b><span data-dcnode-id="5279" instrument_node=""> – a bed or layer yielding water for wells and springs etc.; an underground geological formation capable of receiving, storing and transmitting large quantities of water. Aquifer types include: confined (sealed and possibly containing “fossil” water); unconfined (capable of receiving inflow); and Artesian (an aquifer in which the hydraulic pressure will cause the water to rise above the upper confining layer).</span></li><span data-dcnode-id="5277" instrument_node="">
</span><li data-dcnode-id="5272"><b data-dcnode-id="5274"><a data-dcnode-id="5275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arable_land" title="Arable land"><span data-dcnode-id="5276" instrument_node="">arable land</span></a></b><span data-dcnode-id="5273" instrument_node=""> - land that can be used for growing crops.</span></li><span data-dcnode-id="5271" instrument_node="">
</span><li data-dcnode-id="5263"><b data-dcnode-id="5268"><a data-dcnode-id="5269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atmosphere" title="Atmosphere"><span data-dcnode-id="5270" instrument_node="">atmosphere</span></a></b><span data-dcnode-id="5267" instrument_node=""> – general name for the layer of gases around a material body; the Earth's atmosphere consists, from the ground up, of the troposphere (which includes the </span><a data-dcnode-id="5265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planetary_boundary_layer" title="Planetary boundary layer"><span data-dcnode-id="5266" instrument_node="">planetary boundary layer</span></a><span data-dcnode-id="5264" instrument_node=""> or peplosphere, the lowest layer), stratosphere, mesosphere, ionosphere (or thermosphere), exosphere and magnetosphere.</span></li><span data-dcnode-id="5262" instrument_node="">
</span><li data-dcnode-id="5257"><b data-dcnode-id="5259"><a data-dcnode-id="5260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autotroph" title="Autotroph"><span data-dcnode-id="5261" instrument_node="">autotroph</span></a></b><span data-dcnode-id="5258" instrument_node="">  - an organism that produces complex organic compounds from simple inorganic molecules using energy from light or inorganic chemical reactions.</span></li><span data-dcnode-id="5256" instrument_node="">
</span><li data-dcnode-id="5251"><b data-dcnode-id="5253"><a data-dcnode-id="5254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Available_water_capacity" title="Available water capacity"><span data-dcnode-id="5255" instrument_node="">available water capacity</span></a></b><span data-dcnode-id="5252" instrument_node=""> –  that proportion of soil water that can be readily absorbed by plant roots.</span></li><span data-dcnode-id="5250" instrument_node="">
</span><li data-dcnode-id="5245"><b data-dcnode-id="5247"><a data-dcnode-id="5248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waste_minimisation" title="Waste minimisation"><span data-dcnode-id="5249" instrument_node="">avoidance</span></a></b><span data-dcnode-id="5246" instrument_node=""> – (sustainability) the first step in the waste hierarchy where waste generation is prevented (avoided).</span></li></ul><span data-dcnode-id="5243" instrument_node="">
</span><h2 data-dcnode-id="5233"><span class="mw-headline" data-dcnode-id="5241" id="B"><span data-dcnode-id="5242" instrument_node="">B</span></span><span class="mw-editsection" data-dcnode-id="5234"><span class="mw-editsection-bracket" data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">[</span></span><a data-dcnode-id="5237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D3" title="Edit section: B"><span data-dcnode-id="5238" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5235"><span data-dcnode-id="5236" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5232" instrument_node="">
</span><ul data-dcnode-id="4987"><li data-dcnode-id="5227"><b data-dcnode-id="5229"><a data-dcnode-id="5230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Backflow" title="Backflow"><span data-dcnode-id="5231" instrument_node="">backflow</span></a></b><span data-dcnode-id="5228" instrument_node=""> - movement of water back to source e.g. contaminated water in a plumbing system.</span></li><span data-dcnode-id="5226" instrument_node="">
</span><li data-dcnode-id="5221"><b data-dcnode-id="5223"><a class="new" data-dcnode-id="5224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBaffle_%28landscape_design%29%26action%3Dedit%26redlink%3D1" title="Baffle (landscape design) (page does not exist)"><span data-dcnode-id="5225" instrument_node="">baffle</span></a></b><span data-dcnode-id="5222" instrument_node=""> -   (landscape design) an obstruction to trap debris in drainage water.</span></li><span data-dcnode-id="5220" instrument_node="">
</span><li data-dcnode-id="5215"><b data-dcnode-id="5217"><a data-dcnode-id="5218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bagasse" title="Bagasse"><span data-dcnode-id="5219" instrument_node="">bagasse</span></a></b><span data-dcnode-id="5216" instrument_node=""> -  the fibrous residue of sugar cane milling used as a fuel to produce steam in sugar mills.</span></li><span data-dcnode-id="5214" instrument_node="">
</span><li data-dcnode-id="5209"><b data-dcnode-id="5211"><a class="mw-redirect" data-dcnode-id="5212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baseload" title="Baseload"><span data-dcnode-id="5213" instrument_node="">baseload</span></a></b><span data-dcnode-id="5210" instrument_node=""> -  the steady and reliable supply of energy through the grid. This is punctuated by bursts of higher demand known as “peak-load”. Supply companies must be able to respond instantly to extreme variation in demand and supply, especially during extreme conditions. Gas generators can react quickly while coal is slow but provides the steady "baseload". Renewable energies are generally not available on demand in this way.</span></li><span data-dcnode-id="5208" instrument_node="">
</span><li data-dcnode-id="5203"><b data-dcnode-id="5205"><a data-dcnode-id="5206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Batter_%28walls%29" title="Batter (walls)"><span data-dcnode-id="5207" instrument_node="">batters</span></a></b><span data-dcnode-id="5204" instrument_node=""> -  (landscape design) the slope of earthworks such as drainage channels.</span></li><span data-dcnode-id="5202" instrument_node="">
</span><li data-dcnode-id="5197"><b data-dcnode-id="5199"><a data-dcnode-id="5200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Best_practice" title="Best practice"><span data-dcnode-id="5201" instrument_node="">best practice</span></a></b><span data-dcnode-id="5198" instrument_node=""> -  a process, or innovative use of technology, equipment or resources or other measurable factors that have a proven record of success.</span></li><span data-dcnode-id="5196" instrument_node="">
</span><li data-dcnode-id="5191"><b data-dcnode-id="5193"><a data-dcnode-id="5194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bioaccumulation" title="Bioaccumulation"><span data-dcnode-id="5195" instrument_node="">bioaccumulation</span></a></b><span data-dcnode-id="5192" instrument_node=""> -  the accumulation of a substance, such as a toxic chemical, in the tissues of a living organism.</span></li><span data-dcnode-id="5190" instrument_node="">
</span><li data-dcnode-id="5185"><b data-dcnode-id="5187"><a data-dcnode-id="5188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biocapacity" title="Biocapacity"><span data-dcnode-id="5189" instrument_node="">biocapacity</span></a></b><span data-dcnode-id="5186" instrument_node=""> -  a measure of the biological productivity of an area. This may depend on natural conditions or human inputs like farming and forestry practices; the area needed to support the consumption of a defined population.</span></li><span data-dcnode-id="5184" instrument_node="">
</span><li data-dcnode-id="5164"><b data-dcnode-id="5181"><a data-dcnode-id="5182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biocoenosis" title="Biocoenosis"><span data-dcnode-id="5183" instrument_node="">biocoenosis</span></a></b><span data-dcnode-id="5180" instrument_node=""> (alternatively, </span><b data-dcnode-id="5178"><span data-dcnode-id="5179" instrument_node="">biocoenose </span></b><span data-dcnode-id="5177" instrument_node=""> or </span><b data-dcnode-id="5175"><span data-dcnode-id="5176" instrument_node="">biocenose </span></b><span data-dcnode-id="5174" instrument_node="">) – all the interacting </span><a data-dcnode-id="5172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organism" title="Organism"><span data-dcnode-id="5173" instrument_node="">organisms</span></a><span data-dcnode-id="5171" instrument_node=""> living together in a specific </span><a class="mw-redirect" data-dcnode-id="5169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Habitat_%28ecology%29" title="Habitat (ecology)"><span data-dcnode-id="5170" instrument_node="">habitat</span></a><span data-dcnode-id="5168" instrument_node=""> (or </span><a data-dcnode-id="5166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biotope" title="Biotope"><span data-dcnode-id="5167" instrument_node="">biotope</span></a><span data-dcnode-id="5165" instrument_node="">).</span></li><span data-dcnode-id="5163" instrument_node="">
</span><li data-dcnode-id="5158"><b data-dcnode-id="5160"><a class="mw-redirect" data-dcnode-id="5161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biodegradable" title="Biodegradable"><span data-dcnode-id="5162" instrument_node="">biodegradable</span></a></b><span data-dcnode-id="5159" instrument_node=""> - capable of being decomposed through the action of organisms, especially bacteria.</span></li><span data-dcnode-id="5157" instrument_node="">
</span><li data-dcnode-id="5152"><b data-dcnode-id="5154"><a data-dcnode-id="5155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biodiversity" title="Biodiversity"><span data-dcnode-id="5156" instrument_node="">biodiversity</span></a></b><span data-dcnode-id="5153" instrument_node=""> - the variety of life in all its forms, levels and combinations; includes ecosystem diversity, species diversity, and genetic diversity.</span></li><span data-dcnode-id="5151" instrument_node="">
</span><li data-dcnode-id="5146"><b data-dcnode-id="5148"><a class="new" data-dcnode-id="5149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBioelement%26action%3Dedit%26redlink%3D1" title="Bioelement (page does not exist)"><span data-dcnode-id="5150" instrument_node="">bioelement</span></a></b><span data-dcnode-id="5147" instrument_node=""> - an element required by a living organism.</span></li><span data-dcnode-id="5145" instrument_node="">
</span><li data-dcnode-id="5140"><b data-dcnode-id="5142"><a class="mw-redirect" data-dcnode-id="5143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bioenergy" title="Bioenergy"><span data-dcnode-id="5144" instrument_node="">bioenergy</span></a></b><span data-dcnode-id="5141" instrument_node=""> - used in different senses: in its most narrow sense it is a synonym for biofuel, fuel derived from biological sources. In its broader sense it encompasses also biomass, the biological material used as a biofuel, as well as the social, economic, scientific and technical fields associated with using biological sources for energy.</span></li><span data-dcnode-id="5139" instrument_node="">
</span><li data-dcnode-id="5134"><b data-dcnode-id="5136"><a data-dcnode-id="5137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biofuel" title="Biofuel"><span data-dcnode-id="5138" instrument_node="">biofuel</span></a></b><span data-dcnode-id="5135" instrument_node=""> - the fuel produced by the chemical and/or biological processing of biomass. Biofuel will either be a solid (e.g. charcoal), liquid (e.g. ethanol) or gas (e.g. methane).</span></li><span data-dcnode-id="5133" instrument_node="">
</span><li data-dcnode-id="5128"><b data-dcnode-id="5130"><a data-dcnode-id="5131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biogas" title="Biogas"><span data-dcnode-id="5132" instrument_node="">biogas</span></a></b><span data-dcnode-id="5129" instrument_node=""> - landfill gas and sewage gas, also called biomass gas.</span></li><span data-dcnode-id="5127" instrument_node="">
</span><li data-dcnode-id="5122"><b data-dcnode-id="5124"><a data-dcnode-id="5125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biogeochemical_cycle" title="Biogeochemical cycle"><span data-dcnode-id="5126" instrument_node="">biogeochemical cycle</span></a></b><span data-dcnode-id="5123" instrument_node=""> - a circuit or pathway by which a chemical element or molecule moves through both biotic ("bio-") and abiotic ("geo-") parts of an ecosystem.</span></li><span data-dcnode-id="5121" instrument_node="">
</span><li data-dcnode-id="5116"><b data-dcnode-id="5118"><a class="mw-redirect" data-dcnode-id="5119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biogeochemical_cycles" title="Biogeochemical cycles"><span data-dcnode-id="5120" instrument_node="">biogeochemical cycles</span></a></b><span data-dcnode-id="5117" instrument_node=""> - the movement of chemical elements between organisms and non-living components of the atmosphere, aquatic systems and soils.</span></li><span data-dcnode-id="5115" instrument_node="">
</span><li data-dcnode-id="5110"><b data-dcnode-id="5112"><a class="mw-redirect" data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biological_oxygen_demand" title="Biological oxygen demand"><span data-dcnode-id="5114" instrument_node="">biological oxygen demand</span></a></b><span data-dcnode-id="5111" instrument_node=""> (BOD) - a chemical procedure for determining how fast biological organisms use up oxygen in a body of water.</span></li><span data-dcnode-id="5109" instrument_node="">
</span><li data-dcnode-id="5104"><b data-dcnode-id="5106"><a data-dcnode-id="5107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biological_pest_control" title="Biological pest control"><span data-dcnode-id="5108" instrument_node="">biological pest control</span></a></b><span data-dcnode-id="5105" instrument_node=""> - a method of controlling pests (including insects, mites, weeds and plant diseases) that relies on predation, parasitism, herbivory, or other natural mechanisms.</span></li><span data-dcnode-id="5103" instrument_node="">
</span><li data-dcnode-id="5098"><b data-dcnode-id="5100"><a class="mw-redirect" data-dcnode-id="5101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biological_productivity" title="Biological productivity"><span data-dcnode-id="5102" instrument_node="">biological productivity</span></a></b><span data-dcnode-id="5099" instrument_node=""> -  (bioproductivity) the capacity of a given area to produce biomass; different ecosystems (i.e. pasture, forest, etc.) will have different levels of bioproductivity. Biological productivity is determined by dividing the total biological production (how much is grown and living) by the total area available.</span></li><span data-dcnode-id="5097" instrument_node="">
</span><li data-dcnode-id="5092"><b data-dcnode-id="5094"><a class="new" data-dcnode-id="5095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBiologically_productive_land%26action%3Dedit%26redlink%3D1" title="Biologically productive land (page does not exist)"><span data-dcnode-id="5096" instrument_node="">biologically productive land</span></a></b><span data-dcnode-id="5093" instrument_node=""> -  is land that is fertile enough to support forests, agriculture and / or animal life. All of the biologically productive land of a country comprises its biological capacity. Arable land is typically the most productive area.</span></li><span data-dcnode-id="5091" instrument_node="">
</span><li data-dcnode-id="5086"><b data-dcnode-id="5088"><a data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biomass" title="Biomass"><span data-dcnode-id="5090" instrument_node="">biomass</span></a></b><span data-dcnode-id="5087" instrument_node=""> - the materials derived from photosynthesis (fossilised materials may or may not be included) such as forest, agricultural crops, wood and wood wastes, animal wastes, livestock operation residues, aquatic plants, and municipal and industrial wastes; the quantity of organic material present in unit area at a particular time mostly expressed as tons of dry matter per unit area; organic matter that can be used as fuel.</span></li><span data-dcnode-id="5085" instrument_node="">
</span><li data-dcnode-id="5080"><b data-dcnode-id="5082"><a data-dcnode-id="5083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biome" title="Biome"><span data-dcnode-id="5084" instrument_node="">biome</span></a></b><span data-dcnode-id="5081" instrument_node=""> - a climatic and geographically defined area of ecologically similar communities of plants, animals, and soil organisms, often referred to as ecosystems.</span></li><span data-dcnode-id="5079" instrument_node="">
</span><li data-dcnode-id="5074"><b data-dcnode-id="5076"><a class="mw-redirect" data-dcnode-id="5077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biophysical" title="Biophysical"><span data-dcnode-id="5078" instrument_node="">biophysical</span></a></b><span data-dcnode-id="5075" instrument_node=""> - the living and non-living components and processes of the ecosphere. Biophysical measurements of nature quantify the ecosphere in physical units such as cubic metres, kilograms or joules.</span></li><span data-dcnode-id="5073" instrument_node="">
</span><li data-dcnode-id="5068"><b data-dcnode-id="5070"><a data-dcnode-id="5071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bioregion" title="Bioregion"><span data-dcnode-id="5072" instrument_node="">bioregion</span></a></b><span data-dcnode-id="5069" instrument_node=""> - (ecoregion) an area comprising a natural ecological community and bounded by natural borders.</span></li><span data-dcnode-id="5067" instrument_node="">
</span><li data-dcnode-id="5062"><b data-dcnode-id="5064"><a data-dcnode-id="5065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bioremediation" title="Bioremediation"><span data-dcnode-id="5066" instrument_node="">bioremediation</span></a></b><span data-dcnode-id="5063" instrument_node=""> - a process using organisms to remove or neutralise contaminants (e.g. petrol), mostly in soil or water.</span></li><span data-dcnode-id="5061" instrument_node="">
</span><li data-dcnode-id="5056"><b data-dcnode-id="5058"><a data-dcnode-id="5059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biosolids" title="Biosolids"><span data-dcnode-id="5060" instrument_node="">biosolids</span></a></b><span data-dcnode-id="5057" instrument_node=""> - nutrient-rich organic materials derived from wastewater solids (sewage sludge) that have been stabilised through processing.</span></li><span data-dcnode-id="5055" instrument_node="">
</span><li data-dcnode-id="5050"><b data-dcnode-id="5052"><a data-dcnode-id="5053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biosphere" title="Biosphere"><span data-dcnode-id="5054" instrument_node="">biosphere</span></a></b><span data-dcnode-id="5051" instrument_node=""> - the part of the Earth, including air, land, surface rocks, and water, within which life occurs, and which biotic processes in turn alter or transform.</span></li><span data-dcnode-id="5049" instrument_node="">
</span><li data-dcnode-id="5044"><b data-dcnode-id="5046"><a data-dcnode-id="5047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biosphere" title="Biosphere"><span data-dcnode-id="5048" instrument_node="">biosphere</span></a></b><span data-dcnode-id="5045" instrument_node=""> - the zone of air, land and water at the surface of the earth that is occupied by living organisms; the combination of all ecosystems on Earth and maintained by the energy of the Sun; the interface between the hydrosphere, geosphere and atmosphere.</span></li><span data-dcnode-id="5043" instrument_node="">
</span><li data-dcnode-id="5038"><b data-dcnode-id="5040"><a data-dcnode-id="5041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biotic_potential" title="Biotic potential"><span data-dcnode-id="5042" instrument_node="">biotic potential</span></a></b><span data-dcnode-id="5039" instrument_node=""> - the maximum reproductive capacity of a population under optimum environmental conditions.</span></li><span data-dcnode-id="5037" instrument_node="">
</span><li data-dcnode-id="5029"><b data-dcnode-id="5034"><a class="mw-redirect" data-dcnode-id="5035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biotic_component" title="Biotic component"><span data-dcnode-id="5036" instrument_node="">biotic</span></a></b><span data-dcnode-id="5033" instrument_node=""> - relating to, produced by, or caused by living organisms. (see also </span><a class="mw-redirect" data-dcnode-id="5031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abiotic" title="Abiotic"><span data-dcnode-id="5032" instrument_node="">abiotic</span></a><span data-dcnode-id="5030" instrument_node="">).</span></li><span data-dcnode-id="5028" instrument_node="">
</span><li data-dcnode-id="5023"><b data-dcnode-id="5025"><a data-dcnode-id="5026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Birth_rate" title="Birth rate"><span data-dcnode-id="5027" instrument_node="">birth rate</span></a></b><span data-dcnode-id="5024" instrument_node=""> - number of people born as a percentage of the total population in any given period of time; number of live births per 1000 people.</span></li><span data-dcnode-id="5022" instrument_node="">
</span><li data-dcnode-id="5017"><b data-dcnode-id="5019"><a data-dcnode-id="5020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blackwater_%28waste%29" title="Blackwater (waste)"><span data-dcnode-id="5021" instrument_node="">blackwater</span></a></b><span data-dcnode-id="5018" instrument_node=""> - household wastewater that contains solid waste i.e. toilet discharge.</span></li><span data-dcnode-id="5016" instrument_node="">
</span><li data-dcnode-id="5012"><b data-dcnode-id="5014"><span data-dcnode-id="5015" instrument_node="">bluewater</span></b><span data-dcnode-id="5013" instrument_node=""> - collectible water from rainfall; the water that falls on roofs and hard surfaces usually flowing into rivers and the sea and recharging the ground water. In nature the global average proportion of total rainfall that is blue water is about 40%. Blue water productivity in the garden can be increased by improving irrigation techniques, soil water storage, moderating the climate, using garden design and water-conserving plantings; also safe use of grey water.</span></li><span data-dcnode-id="5011" instrument_node="">
</span><li data-dcnode-id="5006"><b data-dcnode-id="5008"><a data-dcnode-id="5009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boreal_ecosystem" title="Boreal ecosystem"><span data-dcnode-id="5010" instrument_node="">boreal</span></a></b><span data-dcnode-id="5007" instrument_node=""> - northern; cold temperate Northern Hemisphere forests that grow where there is a mean annual temperature &lt; 0&nbsp;°C.</span></li><span data-dcnode-id="5005" instrument_node="">
</span><li data-dcnode-id="5000"><b data-dcnode-id="5002"><a class="new" data-dcnode-id="5003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBroad-acre_farm%26action%3Dedit%26redlink%3D1" title="Broad-acre farm (page does not exist)"><span data-dcnode-id="5004" instrument_node="">broad-acre farm</span></a></b><span data-dcnode-id="5001" instrument_node=""> - commercial farm covering a large area; usually a mixed farm in dryland conditions.</span></li><span data-dcnode-id="4999" instrument_node="">
</span><li data-dcnode-id="4994"><b data-dcnode-id="4996"><a class="mw-redirect" data-dcnode-id="4997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brownfield" title="Brownfield"><span data-dcnode-id="4998" instrument_node="">brownfield</span></a></b><span data-dcnode-id="4995" instrument_node=""> - a term often used to describe land previously used for industrial or commercial purposes with known or suspected pollution including soil contamination due to hazardous waste.</span></li><span data-dcnode-id="4993" instrument_node="">
</span><li data-dcnode-id="4988"><b data-dcnode-id="4990"><a class="mw-redirect" data-dcnode-id="4991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brundtland_Commission_Report" title="Brundtland Commission Report"><span data-dcnode-id="4992" instrument_node="">Brundtland Commission Report</span></a></b><span data-dcnode-id="4989" instrument_node=""> - a UN report, Our Common Future, published in 1987 and dealing with sustainable development and the policies required to achieve it, which the report characterizes as "development that meets the needs of the present without compromising the ability of future generations to meet their own needs."</span></li></ul><span data-dcnode-id="4986" instrument_node="">
</span><h2 data-dcnode-id="4976"><span class="mw-headline" data-dcnode-id="4984" id="C"><span data-dcnode-id="4985" instrument_node="">C</span></span><span class="mw-editsection" data-dcnode-id="4977"><span class="mw-editsection-bracket" data-dcnode-id="4982"><span data-dcnode-id="4983" instrument_node="">[</span></span><a data-dcnode-id="4980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlossary_of_environmental_science%26action%3Dedit%26section%3D4" title="Edit section: C"><span data-dcnode-id="4981" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4975" instrument_node="">
</span><ul data-dcnode-id="4526"><li data-dcnode-id="4964"><b data-dcnode-id="4972"><a class="new" data-dcnode-id="4973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DC3_%2526_C4_plants%26action%3Dedit%26redlink%3D1" title="C3 &amp; C4 plants (page does not exist)"><span data-dcnode-id="4974" instrument_node="">C3 &amp; C4 plants</span></a></b><span data-dcnode-id="4971" instrument_node=""> – C4 plants comprise about 5% of all plants, are most abundant in hot and arid conditions, and include crops like sugar cane and soybeans. During photosynthesis they form molecules with 4-carbon atoms and saturate at the given level of CO</span><sub data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">2</span></sub><span data-dcnode-id="4968" instrument_node="">. C3 plants, the other 95%, photosynthesise to form 3 carbon molecules and increase photosynthesis with as CO</span><sub data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">2</span></sub><span data-dcnode-id="4965" instrument_node=""> levels increase.</span></li><span data-dcnode-id="4963" instrument_node="">
</span><li data-dcnode-id="4958"><b data-dcnode-id="4960"><a data-dcnode-id="4961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Calorie" title="Calorie"><span data-dcnode-id="4962" instrument_node="">calorie</span></a></b><span data-dcnode-id="4959" instrument_node=""> – a basic measure of energy that has been replaced by the SI unit the joule; in physics it approximates the energy needed to increase the temperature of 1&nbsp;gram of water by 1&nbsp;°C which is about 4.184 joules. The Calories in food ratings (spelled with a capital C) and nutrition are ‘big C’ Calories or kcal.</span></li><span data-dcnode-id="4957" instrument_node="">
</span><li data-dcnode-id="4952"><b data-dcnode-id="4954"><a class="mw-redirect" data-dcnode-id="4955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Calorific_value" title="Calorific value"><span data-dcnode-id="4956" instrument_node="">calorific value</span></a></b><span data-dcnode-id="4953" instrument_node=""> – the energy content of a fuel measured as the heat released on complete combustion.</span></li><span data-dcnode-id="4951" instrument_node="">
</span><li data-dcnode-id="4946"><b data-dcnode-id="4948"><a data-dcnode-id="4949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancer" title="Cancer"><span data-dcnode-id="4950" instrument_node="">cancer</span></a></b><span data-dcnode-id="4947" instrument_node=""> – a group of diseases in which cells are aggressive (grow and divide without respect to normal limits), invasive (invade and destroy adjacent tissues), and sometimes metastatic (spread to other locations in the body).</span></li><span data-dcnode-id="4945" instrument_node="">
</span><li data-dcnode-id="4940"><b data-dcnode-id="4942"><a data-dcnode-id="4943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capillary_action" title="Capillary action"><span data-dcnode-id="4944" instrument_node="">capillary action</span></a></b><span data-dcnode-id="4941" instrument_node=""> (wicking) – water drawn through a medium by surface tension.</span></li><span data-dcnode-id="4939" instrument_node="">
</span><li data-dcnode-id="4934"><b data-dcnode-id="4936"><a class="mw-redirect" data-dcnode-id="4937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Car_pooling" title="Car pooling"><span data-dcnode-id="4938" instrument_node="">car pooling</span></a></b><span data-dcnode-id="4935" instrument_node=""> – giving people lifts to help reduce emissions and traffic.</span></li><span data-dcnode-id="4933" instrument_node="">
</span><li data-dcnode-id="4928"><b data-dcnode-id="4930"><a data-dcnode-id="4931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_budget" title="Carbon budget"><span data-dcnode-id="4932" instrument_node="">carbon budget</span></a></b><span data-dcnode-id="4929" instrument_node=""> – a measure of carbon inputs and outputs for a particular activity.</span></li><span data-dcnode-id="4927" instrument_node="">
</span><li data-dcnode-id="4910"><b data-dcnode-id="4924"><a data-dcnode-id="4925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_credit" title="Carbon credit"><span data-dcnode-id="4926" instrument_node="">carbon credit</span></a></b><span data-dcnode-id="4923" instrument_node="">  – a market-driven way of reducing the impact of </span><a data-dcnode-id="4921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenhouse_gas_emissions" title="Greenhouse gas emissions"><span data-dcnode-id="4922" instrument_node="">greenhouse gas emissions</span></a><span data-dcnode-id="4920" instrument_node="">; it allows an agent to benefit financially from an emission reduction. There are two forms of carbon credit, those that are part of national and international trade and those that are purchased by individuals. Internationally, to achieve Kyoto Protocol objectives, ‘caps’ (limits) on participating country's emissions are established. To meet these limits countries, in turn, set ‘caps’ (allowances or credits: 1 convertible and transferable credit = 1 </span><a data-dcnode-id="4918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tonne" title="Tonne"><span data-dcnode-id="4919" instrument_node="">tonne</span></a><span data-dcnode-id="4917" instrument_node=""> of CO</span><sub data-dcnode-id="4915" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="4916" instrument_node="">2</span></sub><span data-dcnode-id="4914" instrument_node="">-e emissions) for operators. Operators that meet the agreed ‘caps’ can then sell unused credits to operators who exceed ‘caps’. Operators can then choose the most cost-effective way of reducing emissions. Individual carbon credits would operate in a similar way cf. </span><a data-dcnode-id="4912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_offset" title="Carbon offset"><span data-dcnode-id="4913" instrument_node="">carbon offset</span></a><span data-dcnode-id="4911" instrument_node="">.</span></li><span data-dcnode-id="4909" instrument_node="">
</span><li data-dcnode-id="4904"><b data-dcnode-id="4906"><a data-dcnode-id="4907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_cycle" title="Carbon cycle"><span data-dcnode-id="4908" instrument_node="">carbon cycle</span></a></b><span data-dcnode-id="4905" instrument_node=""> – the biogeochemical cycle by which carbon is exchanged between the biosphere, geosphere, hydrosphere, and atmosphere of the Earth.</span></li><span data-dcnode-id="4903" instrument_node="">
</span><li data-dcnode-id="4895"><b data-dcnode-id="4900"><a class="mw-redirect" data-dcnode-id="4901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_Dioxide_Equivalent" title="Carbon Dioxide Equivalent"><span data-dcnode-id="4902" instrument_node="">Carbon Dioxide Equivalent</span></a></b><span data-dcnode-id="4899" instrument_node=""> (CO</span><sub data-dcnode-id="4897" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="4898" instrument_node="">2</span></sub><span data-dcnode-id="4896" instrument_node="">e ) – the unit used to measure the impacts of releasing (or avoiding the release of) the seven different greenhouse gases; it is obtained by multiplying the mass of the greenhouse gas by its global warming potential. For example, this would be 21 for methane and 310 for nitrous oxide.</span></li><span data-dcnode-id="4894" instrument_node="">
</span><li data-dcnode-id="4886"><b data-dcnode-id="4891"><a data-dcnode-id="4892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_dioxide" title="Carbon dioxide"><span data-dcnode-id="4893" instrument_node="">carbon dioxide</span></a></b><span data-dcnode-id="4890" instrument_node=""> – a gas with the chemical formula CO</span><sub data-dcnode-id="4888" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="4889" instrument_node="">2</span></sub><span data-dcnode-id="4887" instrument_node="">; the most abundant greenhouse gas emitted from fossil fuels.</span></li><span data-dcnode-id="4885" instrument_node="">
</span><li data-dcnode-id="4877"><b data-dcnode-id="4882"><a class="mw-redirect" data-dcnode-id="4883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_equivalent" title="Carbon equivalent"><span data-dcnode-id="4884" instrument_node="">carbon equivalent</span></a></b><span data-dcnode-id="4881" instrument_node=""> (C-e) – obtained by multiplying the CO</span><sub data-dcnode-id="4879" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="4880" instrument_node="">2</span></sub><span data-dcnode-id="4878" instrument_node="">-e by the factor 12/44.</span></li><span data-dcnode-id="4876" instrument_node="">
</span><li data-dcnode-id="4868"><b data-dcnode-id="4873"><a data-dcnode-id="4874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_footprint" title="Carbon footprint"><span data-dcnode-id="4875" instrument_node="">carbon footprint</span></a></b><span data-dcnode-id="4872" instrument_node=""> – a measure of the carbon emissions that are emitted over the full life cycle of a product or service and usually expressed as grams of CO</span><sub data-dcnode-id="4870" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="4871" instrument_node="">2</span></sub><span data-dcnode-id="4869" instrument_node="">-e.</span></li><span data-dcnode-id="4867" instrument_node="">
</span><li data-dcnode-id="4862"><b data-dcnode-id="4864"><a data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_emission_label" title="Carbon emission label"><span data-dcnode-id="4866" instrument_node="">carbon labelling</span></a></b><span data-dcnode-id="4863" instrument_node=""> – use of product labels that display greenhouse emissions associated with goods (www.carbontrustcertification.com for product carbon footprint methodology).</span></li><span data-dcnode-id="4861" instrument_node="">
</span><li data-dcnode-id="4856"><b data-dcnode-id="4858"><a class="mw-redirect" data-dcnode-id="4859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_neutral" title="Carbon neutral"><span data-dcnode-id="4860" instrument_node="">carbon neutral</span></a></b><span data-dcnode-id="4857" instrument_node=""> – activities where net carbon inputs and outputs are the same. For example, assuming a constant amount of vegetation on the planet, burning wood will add carbon to the atmosphere in the short term but this carbon will cycle back into new plant growth.</span></li><span data-dcnode-id="4855" instrument_node="">
</span><li data-dcnode-id="4850"><b data-dcnode-id="4852"><a class="mw-redirect" data-dcnode-id="4853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_pool" title="Carbon pool"><span data-dcnode-id="4854" instrument_node="">carbon pool</span></a></b><span data-dcnode-id="4851" instrument_node=""> – a storage reservoir of carbon.</span></li><span data-dcnode-id="4849" instrument_node="">
</span><li data-dcnode-id="4844"><b data-dcnode-id="4846"><a data-dcnode-id="4847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_sink" title="Carbon sink"><span data-dcnode-id="4848" instrument_node="">carbon sink</span></a></b><span data-dcnode-id="4845" instrument_node=""> – any carbon storage system that causes a net removal of greenhouse gases from the atmosphere.</span></li><span data-dcnode-id="4843" instrument_node="">
</span><li data-dcnode-id="4838"><b data-dcnode-id="4840"><a data-dcnode-id="4841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_source" title="Carbon source"><span data-dcnode-id="4842" instrument_node="">carbon source</span></a></b><span data-dcnode-id="4839" instrument_node=""> – opposite of carbon sink; a net source of carbon for the atmosphere.</span></li><span data-dcnode-id="4837" instrument_node="">
</span><li data-dcnode-id="4832"><b data-dcnode-id="4834"><a class="new" data-dcnode-id="4835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCarbon_stocks%26action%3Dedit%26redlink%3D1" title="Carbon stocks (page does not exist)"><span data-dcnode-id="4836" instrument_node="">carbon stocks</span></a></b><span data-dcnode-id="4833" instrument_node=""> – the quantity of carbon held within a carbon pool at a specified time.</span></li><span data-dcnode-id="4831" instrument_node="">
</span><li data-dcnode-id="4826"><b data-dcnode-id="4828"><a class="mw-redirect" data-dcnode-id="4829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_taxes" title="Carbon taxes"><span data-dcnode-id="4830" instrument_node="">carbon taxes</span></a></b><span data-dcnode-id="4827" instrument_node=""> – a surcharge on fossil fuels that aims to reduce carbon dioxide emissions.</span></li><span data-dcnode-id="4825" instrument_node="">
</span><li data-dcnode-id="4820"><b data-dcnode-id="4822"><a data-dcnode-id="4823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carcinogen" title="Carcinogen"><span data-dcnode-id="4824" instrument_node="">carcinogen</span></a></b><span data-dcnode-id="4821" instrument_node=""> – a substance, radionuclide or radiation that is an agent directly involved in the promotion of cancer or in the facilitation of its propagation.</span></li><span data-dcnode-id="4819" instrument_node="">
</span><li data-dcnode-id="4814"><b data-dcnode-id="4816"><a data-dcnode-id="4817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carrying_capacity" title="Carrying capacity"><span data-dcnode-id="4818" instrument_node="">carrying capacity</span></a></b><span data-dcnode-id="4815" instrument_node=""> – the maximum population that an ecosystem can sustain cf. biocapacity.</span></li><span data-dcnode-id="4813" instrument_node="">
</span><li data-dcnode-id="4808"><b data-dcnode-id="4810"><a data-dcnode-id="4811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drainage_basin" title="Drainage basin"><span data-dcnode-id="4812" instrument_node="">catchment area</span></a></b><span data-dcnode-id="4809" instrument_node=""> – the area that is the source of water for a water supply whether a dam or rainwater tank.</span></li><span data-dcnode-id="4807" instrument_node="">
</span><li data-dcnode-id="4802"><b data-dcnode-id="4804"><a data-dcnode-id="4805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cell_%28biology%29" title="Cell (biology)"><span data-dcnode-id="4806" instrument_node="">cell</span></a></b><span data-dcnode-id="4803" instrument_node=""> – (biology) the structural and functional unit of all known living organisms and is the smallest unit of an organism that is classified as living</span></li><span data-dcnode-id="4801" instrument_node="">
</span><li data-dcnode-id="4796"><b data-dcnode-id="4798"><a data-dcnode-id="4799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chlorofluorocarbon" title="Chlorofluorocarbon"><span data-dcnode-id="4800" instrument_node="">CFC</span></a></b><span data-dcnode-id="4797" instrument_node=""> – chlorofluorocarbon. CFCs are potent greenhouse gases which are not regulated by the Kyoto Protocol since they are covered by the Montreal Protocol.</span></li><span data-dcnode-id="4795" instrument_node="">
</span><li data-dcnode-id="4788"><b data-dcnode-id="4792"><a class="mw-redirect" data-dcnode-id="4793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chlorinated_hydrocarbon" title="Chlorinated hydrocarbon"><span data-dcnode-id="4794" instrument_node="">chlorinated hydrocarbon</span></a></b><span data-dcnode-id="4791" instrument_node=""> – see </span><a class="mw-redirect" data-dcnode-id="4789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organochloride" title="Organochloride"><span data-dcnode-id="4790" instrument_node="">organochloride</span></a></li><span data-dcnode-id="4787" instrument_node="">
</span><li data-dcnode-id="4779"><b data-dcnode-id="4784"><a data-dcnode-id="4785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chlorofluorocarbon" title="Chlorofluorocarbon"><span data-dcnode-id="4786" instrument_node="">chlorofluorocarbons</span></a></b><span data-dcnode-id="4783" instrument_node=""> – one of the more widely known family of </span><a data-dcnode-id="4781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haloalkane" title="Haloalkane"><span data-dcnode-id="4782" instrument_node="">haloalkanes</span></a><span data-dcnode-id="4780" instrument_node="">.</span></li><span data-dcnode-id="4778" instrument_node="">
</span><li data-dcnode-id="4773"><b data-dcnode-id="4775"><a class="new" data-dcnode-id="4776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCircular_metabolism%26action%3Dedit%26redlink%3D1" title="Circular metabolism (page does not exist)"><span data-dcnode-id="4777" instrument_node="">circular metabolism</span></a></b><span data-dcnode-id="4774" instrument_node=""> – a system in which wastes, especially water and materials, are reused and recycled cf. linear metabolism.</span></li><span data-dcnode-id="4772" instrument_node="">
</span><li data-dcnode-id="4767"><b data-dcnode-id="4769"><a class="new" data-dcnode-id="4770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DClass_A_pan%26action%3Dedit%26redlink%3D1" title="Class A pan (page does not exist)"><span data-dcnode-id="4771" instrument_node="">Class A pan</span></a></b><span data-dcnode-id="4768" instrument_node=""> – (water management) an open pan used as a standard for measuring water evaporation.</span></li><span data-dcnode-id="4766" instrument_node="">
</span><li data-dcnode-id="4761"><b data-dcnode-id="4763"><a data-dcnode-id="4764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cleaner_production" title="Cleaner production"><span data-dcnode-id="4765" instrument_node="">cleaner production</span></a></b><span data-dcnode-id="4762" instrument_node=""> – the continual effort to prevent pollution, reduce the use of energy, water and material resources and minimise waste – all without reducing production capacity.</span></li><span data-dcnode-id="4760" instrument_node="">
</span><li data-dcnode-id="4755"><b data-dcnode-id="4757"><a data-dcnode-id="4758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clearcutting" title="Clearcutting"><span data-dcnode-id="4759" instrument_node="">clearcutting</span></a></b><span data-dcnode-id="4756" instrument_node=""> – a forestry or logging practice in which most or all trees in a forest sector are felled.</span></li><span data-dcnode-id="4754" instrument_node="">
</span><li data-dcnode-id="4746"><b data-dcnode-id="4751"><a class="mw-redirect" data-dcnode-id="4752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change_%28general_concept%29" title="Climate change (general concept)"><span data-dcnode-id="4753" instrument_node="">climate change</span></a></b><span data-dcnode-id="4750" instrument_node=""> – a change in weather over time and/or region; usually relating to changes in temperature, wind patterns and rainfall; although may be natural or anthropogenic, common discourse carries the assumption that </span><a data-dcnode-id="4748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change" title="Climate change"><span data-dcnode-id="4749" instrument_node="">recent climate change</span></a><span data-dcnode-id="4747" instrument_node=""> is anthropogenic.</span></li><span data-dcnode-id="4745" instrument_node="">
</span><li data-dcnode-id="4740"><b data-dcnode-id="4742"><a data-dcnode-id="4743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate" title="Climate"><span data-dcnode-id="4744" instrument_node="">climate</span></a></b><span data-dcnode-id="4741" instrument_node=""> – the general variations of weather in a region over long periods of time; the "average weather" cf. weather.</span></li><span data-dcnode-id="4739" instrument_node="">
</span><li data-dcnode-id="4734"><b data-dcnode-id="4736"><a data-dcnode-id="4737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cogeneration" title="Cogeneration"><span data-dcnode-id="4738" instrument_node="">cogeneration</span></a></b><span data-dcnode-id="4735" instrument_node="">  – the simultaneous production of electricity and useful heat from the combustion of the same fuel source.</span></li><span data-dcnode-id="4733" instrument_node="">
</span><li data-dcnode-id="4728"><b data-dcnode-id="4730"><a data-dcnode-id="4731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cohousing" title="Cohousing"><span data-dcnode-id="4732" instrument_node="">cohousing</span></a></b><span data-dcnode-id="4729" instrument_node="">  – clusters of houses having shared dining halls and other spaces, encouraging stronger social ties while reducing the material and energy needs of the community.</span></li><span data-dcnode-id="4727" instrument_node="">
</span><li data-dcnode-id="4722"><b data-dcnode-id="4724"><a data-dcnode-id="4725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coir" title="Coir"><span data-dcnode-id="4726" instrument_node="">coir</span></a></b><span data-dcnode-id="4723" instrument_node=""> – fibre of the coconut.</span></li><span data-dcnode-id="4721" instrument_node="">
</span><li data-dcnode-id="4716"><b data-dcnode-id="4718"><a class="new" data-dcnode-id="4719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCommercial_and_industrial_waste%26action%3Dedit%26redlink%3D1" title="Commercial and industrial waste (page does not exist)"><span data-dcnode-id="4720" instrument_node="">commercial and industrial waste</span></a></b><span data-dcnode-id="4717" instrument_node=""> – (waste management) solid waste generated by the business sector as well as that created by State and Federal government, schools and tertiary institutions. Does not include that from the construction and demolition industry.</span></li><span data-dcnode-id="4715" instrument_node="">
</span><li data-dcnode-id="4710"><b data-dcnode-id="4712"><a class="new" data-dcnode-id="4713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCommingled_materials%26action%3Dedit%26redlink%3D1" title="Commingled materials (page does not exist)"><span data-dcnode-id="4714" instrument_node="">commingled materials</span></a></b><span data-dcnode-id="4711" instrument_node=""> – (waste management) materials mixed together, such as plastic bottles, glass, and metal containers. Commingled recyclable materials require sorting after collection before they can be recycled.</span></li><span data-dcnode-id="4709" instrument_node="">
</span><li data-dcnode-id="4701"><b data-dcnode-id="4706"><a class="new" data-dcnode-id="4707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DComparative_Risk_Assessment%26action%3Dedit%26redlink%3D1" title="Comparative Risk Assessment (page does not exist)"><span data-dcnode-id="4708" instrument_node="">comparative risk assessment</span></a></b><span data-dcnode-id="4705" instrument_node="">  – a methodology which uses science, policy, economic analysis and stakeholder participation to identify and address areas of greatest environmental risk; a method for assessing environmental management priorities. The US EPA (</span><a class="external text" data-dcnode-id="4703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.epa.gov/seahome/comprisk.html" rel="nofollow"><span data-dcnode-id="4704" instrument_node="">www.epa.gov/seahome/comprisk.html</span></a><span data-dcnode-id="4702" instrument_node="">) offers free software which contains the history and methodology of comparative risk, as well as many case studies.</span></li><span data-dcnode-id="4700" instrument_node="">
</span><li data-dcnode-id="4695"><b data-dcnode-id="4697"><a data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Compensation_point" title="Compensation point"><span data-dcnode-id="4699" instrument_node="">compensation point</span></a></b><span data-dcnode-id="4696" instrument_node=""> – the point where the amount of energy produced by photosynthesis equals the amount of energy released by respiration.</span></li><span data-dcnode-id="4694" instrument_node="">
</span><li data-dcnode-id="4689"><b data-dcnode-id="4691"><a data-dcnode-id="4692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Complex_system" title="Complex system"><span data-dcnode-id="4693" instrument_node="">Complex system</span></a></b><span data-dcnode-id="4690" instrument_node=""> is a system composed of many components which may interact with each other.</span></li><span data-dcnode-id="4688" instrument_node="">
</span><li data-dcnode-id="4683"><b data-dcnode-id="4685"><a data-dcnode-id="4686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Compost" title="Compost"><span data-dcnode-id="4687" instrument_node="">compost</span></a></b><span data-dcnode-id="4684" instrument_node=""> – the aerobically decomposed remnants of organic matter.</span></li><span data-dcnode-id="4682" instrument_node="">
</span><li data-dcnode-id="4677"><b data-dcnode-id="4679"><a class="mw-redirect" data-dcnode-id="4680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Composting" title="Composting"><span data-dcnode-id="4681" instrument_node="">composting</span></a></b><span data-dcnode-id="4678" instrument_node=""> – the biological decomposition of organic materials in the presence of oxygen that yields carbon dioxide, heat, and stabilised organic residues that may be used as a soil additive.</span></li><span data-dcnode-id="4676" instrument_node="">
</span><li data-dcnode-id="4671"><b data-dcnode-id="4673"><a class="mw-redirect" data-dcnode-id="4674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confined_aquifer" title="Confined aquifer"><span data-dcnode-id="4675" instrument_node="">confined aquifer</span></a></b><span data-dcnode-id="4672" instrument_node=""> – aquifers that have the water table above their upper boundary and are typically found below unconfined aquifers.</span></li><span data-dcnode-id="4670" instrument_node="">
</span><li data-dcnode-id="4665"><b data-dcnode-id="4667"><a data-dcnode-id="4668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conspicuous_consumption" title="Conspicuous consumption"><span data-dcnode-id="4669" instrument_node="">conspicuous consumption</span></a></b><span data-dcnode-id="4666" instrument_node=""> – the lavish spending on goods and services that are acquired mainly for the purpose of displaying income or wealth rather than to satisfy basic needs of the consumer.</span></li><span data-dcnode-id="4664" instrument_node="">
</span><li data-dcnode-id="4656"><b data-dcnode-id="4661"><a class="mw-redirect" data-dcnode-id="4662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Construction_and_demolition_waste" title="Construction and demolition waste"><span data-dcnode-id="4663" instrument_node="">construction and demolition waste</span></a></b><span data-dcnode-id="4660" instrument_node=""> – (waste management)  includes waste from residential, civil, and commercial construction and demolition activities, such as fill material (e.g. soil), asphalt, bricks and timber. C&amp;D waste excludes </span><a data-dcnode-id="4658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Construction_waste" title="Construction waste"><span data-dcnode-id="4659" instrument_node="">construction waste</span></a><span data-dcnode-id="4657" instrument_node=""> which is included in the municipal waste stream. C&amp;D waste does not generally include waste from the commercial and industrial waste stream.</span></li><span data-dcnode-id="4655" instrument_node="">
</span><li data-dcnode-id="4650"><b data-dcnode-id="4652"><a class="new" data-dcnode-id="4653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DConsumer_democracy%26action%3Dedit%26redlink%3D1" title="Consumer democracy (page does not exist)"><span data-dcnode-id="4654" instrument_node="">consumer democracy</span></a></b><span data-dcnode-id="4651" instrument_node=""> – using your economic capacity to promote your values.</span></li><span data-dcnode-id="4649" instrument_node="">
</span><li data-dcnode-id="4644"><b data-dcnode-id="4646"><a data-dcnode-id="4647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consumer" title="Consumer"><span data-dcnode-id="4648" instrument_node="">consumer</span></a></b><span data-dcnode-id="4645" instrument_node=""> – organism, human being, or industry that maintains itself by transforming a high-quality energy source into a lower one cf. Producer, primary production.</span></li><span data-dcnode-id="4643" instrument_node="">
</span><li data-dcnode-id="4638"><b data-dcnode-id="4640"><a class="mw-redirect" data-dcnode-id="4641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consumption_%28ecology%29" title="Consumption (ecology)"><span data-dcnode-id="4642" instrument_node="">consumption (ecology)</span></a></b><span data-dcnode-id="4639" instrument_node=""> – the use of resources by a living system, the inflow and degradation of energy that is used for system activity.</span></li><span data-dcnode-id="4637" instrument_node="">
</span><li data-dcnode-id="4632"><b data-dcnode-id="4634"><a data-dcnode-id="4635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consumption_%28economics%29" title="Consumption (economics)"><span data-dcnode-id="4636" instrument_node="">consumption (economics)</span></a></b><span data-dcnode-id="4633" instrument_node=""> – part of disposable income (income after taxes paid and payments received) that is not saved, essentially the goods and services used by households; this includes purchased commodities at the household level (such as food, clothing, and utilities), the goods and services paid for by government (such as defence, education, social services and health care), and the resources consumed by businesses to increase their assets (such as business equipment and housing).</span></li><span data-dcnode-id="4631" instrument_node="">
</span><li data-dcnode-id="4626"><b data-dcnode-id="4628"><a class="mw-redirect" data-dcnode-id="4629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Contour_ploughing" title="Contour ploughing"><span data-dcnode-id="4630" instrument_node="">contour ploughing</span></a></b><span data-dcnode-id="4627" instrument_node=""> (contour farming) – the farming practice of plowing across a slope following its contours. The rows formed have the effect of slowing water run-off during rainstorms so that the soil is not washed away and allows the water to percolate into the soil.</span></li><span data-dcnode-id="4625" instrument_node="">
