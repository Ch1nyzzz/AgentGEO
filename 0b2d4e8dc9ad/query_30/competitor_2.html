047" onclick="return showCourse(this, 'CHM 2047');" title="CHM&nbsp;2047"><span data-dcnode-id="1313" instrument_node="">CHM&nbsp;2047</span></a><span data-dcnode-id="1311" instrument_node="">.	</span></p></div><div class="courseblock courseblocktoggle" data-dcnode-id="1281"><span data-dcnode-id="1308" instrument_node=""> </span><p class="courseblocktitle noindent" data-dcnode-id="1300"><span data-dcnode-id="1307" instrument_node=""> </span><strong data-dcnode-id="1302"><span data-dcnode-id="1306" instrument_node="">			EVR&nbsp;3323 Introduction to Ecosystem Restoration </span><span class="credits" data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">4 Credits</span></span><span data-dcnode-id="1303" instrument_node=""> </span></strong><span data-dcnode-id="1301" instrument_node=""> </span></p><p class="courseblockextra noindent" data-dcnode-id="1295"><span data-dcnode-id="1299" instrument_node=""> </span><strong data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Grading Scheme:</span></strong><span data-dcnode-id="1296" instrument_node=""> Letter Grade	</span></p><p class="courseblockdesc noindent" data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">		Restoration theory and planning, disturbed land reclamation, woodland/wetland/river restoration, invasive species, community involvement, and monitoring, and emphasizes plant selection, establishment and maintenance.	</span></p><p class="courseblockextra noindent" data-dcnode-id="1282"><span data-dcnode-id="1292" instrument_node=""> </span><strong data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Corequisite:</span></strong><span data-dcnode-id="1289" instrument_node=""> </span><a class="bubblelink code" data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DBOT%25202010C" onclick="return showCourse(this, 'BOT 2010C');" title="BOT&nbsp;2010C"><span data-dcnode-id="1288" instrum sp;3410C"><span data-dcnode-id="1210" instrument_node="">LDE&nbsp;3410C</span></a><span data-dcnode-id="1208" instrument_node=""> or </span><a class="bubblelink code" data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DLAA%25202360C" onclick="return showCourse(this, 'LAA 2360C');" title="LAA&nbsp;2360C"><span data-dcnode-id="1207" instrument_node="">LAA&nbsp;2360C</span></a><span data-dcnode-id="1205" instrument_node="">.	</span></p></div><div class="courseblock courseblocktoggle" data-dcnode-id="1186"><span data-dcnode-id="1202" instrument_node=""> </span><p class="courseblocktitle noindent" data-dcnode-id="1194"><span data-dcnode-id="1201" instrument_node=""> </span><strong data-dcnode-id="1196"><span data-dcnode-id="1200" instrument_node="">			ORH&nbsp;1030 Plants, Gardening and You </span><span class="credits" data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">1 Credit</span></span><span data-dcnode-id="1197" instrument_node=""> </span></strong><span data-dcnode-id="1195" instrument_node=""> </span></p><p class="courseblockextra noindent" data-dcnode-id="1189"><span data-dcnode-id="1193" instrument_node=""> </span><strong data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Grading Scheme:</span></strong><span data-dcnode-id="1190" instrument_node=""> Letter Grade	</span></p><p class="courseblockdesc noindent" data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">		A non-majors overview of environmental horticulture that emphasizes the art and science of growing, installing and maintaining plants used to enhance and improve the human environment indoors and outdoors. Gain familiarity with the science and the industries associated with environmental horticulture.	</span></p></div><div class="courseblock courseblocktoggle" data-dcnode-id="1169"><span data-dcnode-id="1185" instrument_node=""> </span><p class="courseblocktitle noindent" data-dcnode-id="1177"><span data-dcnode-id="1184" instrument_node=""> </span><strong data-dcnode-id="1179"><span data-dcnode-id="1183" instrument_node="">			ORH&nbsp;1283 Survey of Orchids </span><span class="credits" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">1 Credit</span></span><span data-dcnode-id="1180" instrument_node=""> </span></strong><span data-dcnode-id="1178" instrument_node=""> </span></p><p class="courseblockextra noindent" data-dcnode-id="1172"><span data-dcnode-id="1176" instrument_node=""> </span><strong data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Grading Scheme:</span></strong><span data-dcnode-id="1173" instrument_node=""> Letter Grade	</span></p><p class="courseblockdesc noindent" data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">		Overview of the complexities of the orchid family, how selected genera are produced and the potential these plants offer to commercial nursery operators and hobbyists for profit or enjoyment.	</span></p></div><div class="courseblock courseblocktoggle" data-dcnode-id="1152"><span data-dcnode-id="1168" instrument_node=""> </span><p class="courseblocktitle noindent" data-dcnode-id="1160"><span data-dcnode-id="1167" instrument_node=""> </span><strong data-dcnode-id="1162"><span data-dcnode-id="1166" instrument_node="">			ORH&nbsp;2752 Sensory Gardening </span><span class="credits" data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">2 Credits</span></span><span data-dcnode-id="1163" instrument_node=""> </span></strong><span data-dcnode-id="1161" instrument_node=""> </span></p><p class="courseblockextra noindent" data-dcnode-id="1155"><span data-dcnode-id="1159" instrument_node=""> </span><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Grading Scheme:</span></strong><span data-dcnode-id="1156" instrument_node=""> Letter Grade	</span></p><p class="courseblockdesc noindent" data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">		Hands-on, multidisciplinary approach to environmental horticulture delivered through the context of the human senses. Class activities, assignments, and projects enhance awareness and understanding of how horticulture relates to the natural and built world, as well as the ways in which people perceive those worlds.	</span></p></div><div class="courseblock courseblocktoggle" data-dcnode-id="1121"><span data-dcnode-id="1151" instrument_node=""> </span><p class="courseblocktitle noindent" data-dcnode-id="1143"><span data-dcnode-id="1150" instrument_node=""> </span><strong data-dcnode-id="1145"><span data-dcnode-id="1149" instrument_node="">			ORH&nbsp;3222C Turfgrass Culture </span><span class="credits" data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">4 Credits</span></span><span data-dcnode-id="1146" instrument_node=""> </span></strong><span data-dcnode-id="1144" instrument_node=""> </span></p><p class="courseblockextra noindent" data-dcnode-id="1138"><span data-dcnode-id="1142" instrument_node=""> </span><strong data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Grading Scheme:</span></strong><span data-dcnode-id="1139" instrument_node=""> Letter Grade	</span></p><p class="courseblockdesc noindent" data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">		Comparisons of turfgrass for their landscape and recreational uses. Covers growth characteristics, method of propagation, and basic management requirements, including control of important pest problems.	</span></p><p class="courseblockextra noindent" data-dcnode-id="1122"><span data-dcnode-id="1135" instrument_node=""> </span><strong data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Prerequisite:</span></strong><span data-dcnode-id="1132" instrument_node="">  (</span><a class="bubblelink code" data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DBOT%25202010C" onclick="return showCourse(this, 'BOT 2010C');" title="BOT&nbsp;2010C"><span data-dcnode-id="1131" instrument_node="">BOT&nbsp;2010C</span></a><span data-dcnode-id="1129" instrument_node=""> or </span><a class="bubblelink code" data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DBSC%25202010" onclick="return showCourse(this, 'BSC 2010');" title="BSC&nbsp;2010"><span data-dcnode-id="1128" instrument_node="">BSC&nbsp;2010</span></a><span data-dcnode-id="1126" instrument_node="">) and </span><a class="bubblelink code" data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DCHM%25201025" onclick="return showCourse(this, 'CHM 1025');" title="CHM&nbsp;1025"><span data-dcnode-id="1125" instrument_node="">CHM&nbsp;1025</span></a><span data-dcnode-id="1123" instrument_node="">.	</span></p></div><div class="courseblock courseblocktoggle" data-dcnode-id="1104"><span data-dcnode-id="1120" instrument_node=""> </span><p class="courseblocktitle noindent" data-dcnode-id="1112"><span data-dcnode-id="1119" instrument_node=""> </span><strong data-dcnode-id="1114"><span data-dcnode-id="1118" instrument_node="">			ORH&nbsp;3253C Introductory Nursery Management </span><span class="credits" data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">4 Credits</span></span><span data-dcnode-id="1115" instrument_node=""> </span></strong><span data-dcnode-id="1113" instrument_node=""> </span></p><p class="courseblockextra noindent" data-dcnode-id="1107"><span data-dcnode-id="1111" instrument_node=""> </span><strong data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Grading Scheme:</span></strong><span data-dcnode-id="1108" instrument_node=""> Letter Grade	</span></p><p class="courseblockdesc noindent" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">		Introduces the principles of planning, organizing and managing nursery operations. Emphasizes interactions between growing medium components, plant nutrition and irrigation. Nursery layout, growing structures, materials requirements and business practices are covered. Weekend field trips may be required.	</span></p></div><div class="courseblock courseblocktoggle" data-dcnode-id="1079"><span data-dcnode-id="1103" instrument_node=""> </span><p class="courseblocktitle noindent" data-dcnode-id="1095"><span data-dcnode-id="1102" instrument_node=""> </span><strong data-dcnode-id="1097"><span data-dcnode-id="1101" instrument_node="">			ORH&nbsp;3324 Palm Short Course </span><span class="credits" data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">1 Credit</span></span><span data-dcnode-id="1098" instrument_node=""> </span></strong><span data-dcnode-id="1096" instrument_node=""> </span></p><p class="courseblockextra noindent" data-dcnode-id="1090"><span data-dcnode-id="1094" instrument_node=""> </span><strong data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Grading Scheme:</span></strong><span data-dcnode-id="1091" instrument_node=""> Letter Grade	</span></p><p class="courseblockdesc noindent" data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">		Overview of how palm plants grow and how to diagnose and interpret problems with palm plants.	</span></p><p class="courseblockextra noindent" data-dcnode-id="1080"><span data-dcnode-id="1087" instrument_node=""> </span><strong data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Prerequisite:</span></strong><span data-dcnode-id="1084" instrument_node=""> </span><a class="bubblelink code" data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DBOT%25202010C" onclick="return showCourse(this, 'BOT 2010C');" title="BOT&nbsp;2010C"><span data-dcnode-id="1083" instrument_node="">BOT&nbsp;2010C</span></a><span data-dcnode-id="1081" i pan data-dcnode-id="470" instrument_node=""> Letter Grade	</span></p><p class="courseblockdesc noindent" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">		Methods of propagating by seeds, bulbs, divisions, layering, cuttings, budding, grafting and micropropagation in a hands-on environment.	</span></p><p class="courseblockextra noindent" data-dcnode-id="456"><span data-dcnode-id="466" instrument_node=""> </span><strong data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Prerequisite:</span></strong><span data-dcnode-id="463" instrument_node=""> </span><a class="bubblelink code" data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DBOT%25202010C" onclick="return showCourse(this, 'BOT 2010C');" title="BOT&nbsp;2010C"><span data-dcnode-id="462" instrument_node="">BOT&nbsp;2010C</span></a><span data-dcnode-id="460" instrument_node=""> or </span><a class="bubblelink code" data-dcnode-id="458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DBSC%25202010" onclick="return showCourse(this, 'BSC 2010');" title="BSC&nbsp;2010"><span data-dcnode-id="459" instrument_node="">BSC&nbsp;2010</span></a><span data-dcnode-id="457" instrument_node="">.	</span></p></div><div class="courseblock courseblocktoggle" data-dcnode-id="430"><span data-dcnode-id="454" instrument_node=""> </span><p class="courseblocktitle noindent" data-dcnode-id="446"><span data-dcnode-id="453" instrument_node=""> </span><strong data-dcnode-id="448"><span data-dcnode-id="452" instrument_node="">			PLS&nbsp;4081 Techniques in Horticultural Therapy </span><span class="credits" data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">3 Credits</span></span><span data-dcnode-id="449" instrument_node=""> </span></strong><span data-dcnode-id="447" instrument_node=""> </span></p><p class="courseblockextra noindent" data-dcnode-id="441"><span data-dcnode-id="445" instrument_node=""> </span><strong data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Grading Scheme:</span></strong><span data-dcnode-id="442" instrument_node=""> Letter Grade	</span></p><p class="courseblockdesc noindent" data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">		Examine the effectiveness of horticultural therapy across a diverse range of client populations, programs, and environments, and the physical, cognitive, and psychosocial implications. Explore therapeutic, vocational, and social modalities employing plants, as well as task analysis, activity analysis and tool and site adaptations.	</span></p><p class="courseblockextra noindent" data-dcnode-id="431"><span data-dcnode-id="438" instrument_node=""> </span><strong data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Prerequisite:</span></strong><span data-dcnode-id="435" instrument_node=""> </span><a class="bubblelink code" data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DPLS%25203080" onclick="return showCourse(this, 'PLS 3080');" title="PLS&nbsp;3080"><span data-dcnode-id="434" instrument_node="">PLS&nbsp;3080</span></a><span data-dcnode-id="432" instrument_node=""> with a minimum grade of C.	</span></p></div><div class="courseblock courseblocktoggle" data-dcnode-id="402"><span data-dcnode-id="429" instrument_node=""> </span><p class="courseblocktitle noindent" data-dcnode-id="421"><span data-dcnode-id="428" instrument_node=""> </span><strong data-dcnode-id="423"><span data-dcnode-id="427" instrument_node="">			PLS&nbsp;4082 Program Management in Horticultural Therapy </span><span class="credits" data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">3 Credits</span></span><span data-dcnode-id="424" instrument_node=""> </span></strong><span data-dcnode-id="422" instrument_node=""> </span></p><p class="courseblockextra noindent" data-dcnode-id="416"><span data-dcnode-id="420" instrument_node=""> </span><strong data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Grading Scheme:</span></strong><span data-dcnode-id="417" instrument_node=""> Letter Grade	</span></p><p class="courseblockdesc noindent" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">		Learn to develop, manage, and evaluate horticultural therapy programs in diverse environments. Explore strategies for program proposals and funding, along with recruitment of clients and required regulations and documentation. Discuss staff and volunteer management, as well as plant materials, gardens, and other program resources.	</span></p><p class="courseblockextra noindent" data-dcnode-id="403"><span data-dcnode-id="413" instrument_node=""> </span><strong data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Prerequisite:</span></strong><span data-dcnode-id="410" instrument_node=""> </span><a class="bubblelink code" data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DPLS%25203080" onclick="return showCourse(this, 'PLS 3080');" title="PLS&nbsp;3080"><span data-dcnode-id="409" instrument_node="">PLS&nbsp;3080</span></a><span data-dcnode-id="407" instrument_node=""> and </span><a class="bubblelink code" data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DPLS%25204081" onclick="return showCourse(this, 'PLS 4081');" title="PLS&nbsp;4081"><span data-dcnode-id="406" instrument_node="">PLS&nbsp;4081</span></a><span data-dcnode-id="404" instrument_node=""> with minimum grades of C.	</span></p></div><div class="courseblock courseblocktoggle" data-dcnode-id="374"><span data-dcnode-id="401" instrument_node=""> </span><p class="courseblocktitle noindent" data-dcnode-id="393"><span data-dcnode-id="400" instrument_node=""> </span><strong data-dcnode-id="395"><span data-dcnode-id="399" instrument_node="">			PLS&nbsp;4105 Genome Editing and Plant Biotechnology </span><span class="credits" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">3 Credits</span></span><span data-dcnode-id="396" instrument_node=""> </span></strong><span data-dcnode-id="394" instrument_node=""> </span></p><p class="courseblockextra noindent" data-dcnode-id="388"><span data-dcnode-id="392" instrument_node=""> </span><strong data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Grading Scheme:</span></strong><span data-dcnode-id="389" instrument_node=""> Letter Grade	</span></p><p class="courseblockdesc noindent" data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">		Plant biotechnology is one of the most prolific and influential areas of the plant sciences. This upper level undergraduate course will be focused on modern biotechnological tools and applications that have resulted in great advances for agriculture and society.	</span></p><p class="courseblockextra noindent" data-dcnode-id="375"><span data-dcnode-id="385" instrument_node=""> </span><strong data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Prerequisite:</span></strong><span data-dcnode-id="382" instrument_node=""> </span><a class="bubblelink code" data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DPLS%25203004C" onclick="return showCourse(this, 'PLS 3004C');" title="PLS&nbsp;3004C"><span data-dcnode-id="381" instrument_node="">PLS&nbsp;3004C</span></a><span data-dcnode-id="379" instrument_node=""> and </span><a class="bubblelink code" data-dcnode-id="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DAGR%25203303" onclick="return showCourse(this, 'AGR 3303');" title="AGR&nbsp;3303"><span data-dcnode-id="378" instrument_node="">AGR&nbsp;3303</span></a><span data-dcnode-id="376" instrument_node="">.	</span></p></div><div class="courseblock courseblocktoggle" data-dcnode-id="349"><span data-dcnode-id="373" instrument_node=""> </span><p class="courseblocktitle noindent" data-dcnode-id="365"><span data-dcnode-id="372" instrument_node=""> </span><strong data-dcnode-id="367"><span data-dcnode-id="371" instrument_node="">			PLS&nbsp;4242C Micropropagation of Horticultural Crops </span><span class="credits" data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">4 Credits</span></span><span data-dcnode-id="368" instrument_node=""> </span></strong><span data-dcnode-id="366" instrument_node=""> </span></p><p class="courseblockextra noindent" data-dcnode-id="360"><span data-dcnode-id="364" instrument_node=""> </span><strong data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Grading Scheme:</span></strong><span data-dcnode-id="361" instrument_node=""> Letter Grade	</span></p><p class="courseblockdesc noindent" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">		Lectures and laboratory exercises emphasizing the practical application of plant tissue culture for the clonal propagation of horticultural crops. Emphasis on aseptic technique, culture methodology and micropropagation systems development.	</span></p><p class="courseblockextra noindent" data-dcnode-id="350"><span data-dcnode-id="357" instrument_node=""> </span><strong data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Prerequisite:</span></strong><span data-dcnode-id="354" instrument_node=""> </span><a class="bubblelink code" data-dcnode-id="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DORH%25203513C" onclick="return showCourse(this, 'ORH 3513C');" title="ORH&nbsp;3513C"><span data-dcnode-id="353" instrument_node="">ORH&nbsp;3513C</span></a><span data-dcnode-id="351" instrument_node=""> recommended.	</span></p></div><div class="courseblock courseblocktoggle" data-dcnode-id="327"><span data-dcnode-id="348" instrument_ trument_node=""> </span></p><p class="courseblockextra noindent" data-dcnode-id="313"><span data-dcnode-id="317" instrument_node=""> </span><strong data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Grading Scheme:</span></strong><span data-dcnode-id="314" instrument_node=""> Letter Grade	</span></p><p class="courseblockdesc noindent" data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">		Identify a problem or topic in plant sciences and develop a poster presentation about this problem or topic. This course discusses the following topics: how to develop a hypothesis, how to complete a reliable literature review, the importance of peer review and how to present results and findings.	</span></p><p class="courseblockextra noindent" data-dcnode-id="297"><span data-dcnode-id="310" instrument_node=""> </span><strong data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Prerequisite:</span></strong><span data-dcnode-id="307" instrument_node=""> </span><a class="bubblelink code" data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DPLS%25203004C" onclick="return showCourse(this, 'PLS 3004C');" title="PLS&nbsp;3004C"><span data-dcnode-id="306" instrument_node="">PLS&nbsp;3004C</span></a><span data-dcnode-id="304" instrument_node=""> and </span><a class="bubblelink code" data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DPLS%25204941" onclick="return showCourse(this, 'PLS 4941');" title="PLS&nbsp;4941"><span data-dcnode-id="303" instrument_node="">PLS&nbsp;4941</span></a><span data-dcnode-id="301" instrument_node=""> One year of employment experience in plant science may be substituted for </span><a class="bubblelink code" data-dcnode-id="299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.ufl.edu/search/%3FP%3DPLS%25204941" onclick="return showCourse
