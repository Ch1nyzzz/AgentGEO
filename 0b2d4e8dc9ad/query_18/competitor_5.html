</span><h1 class="entry-title" data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Grow Roses in a Hot Climate</span></h1><span data-dcnode-id="1808" instrument_node=""> </span></header><span data-dcnode-id="1805" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1273"><span data-dcnode-id="1804" instrument_node="">
</span><div class="hotga-before-content" data-dcnode-id="1797" id="hotga-1972643691" style="margin-top: 17px; margin-right: 7px; margin-bottom: 17px; margin-left: 2px; clear: both; "><ins class="adsbygoogle" data-ad-client="ca-pub-2553263214884055" data-ad-format="auto" data-ad-slot="3410600704" data-dcnode-id="1802" style="display:block;"></ins><span data-dcnode-id="1801" instrument_node="">
</span><span data-dcnode-id="1798" instrument_node="">
</span></div><h6 data-dcnode-id="1791"><em data-dcnode-id="1794"><span data-dcnode-id="1796" instrument_node="">Tips for growing roses in a hot, dry garden</span><br data-dcnode-id="1795"></em><br data-dcnode-id="1793"><img alt="Austin rose Lilian Austin" class="alignleft wp-image-1042 size-medium" data-attachment-id="1042" data-comments-opened="1" data-dcnode-id="1792" data-image-caption="<p>Dscanso Gardens are famed for their rose and comellia collections.</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Austin rose Lilian Austin" data-large-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/austin-rose-lilian-austin.jpg?fit=600%2C605&amp;ssl=1" data-medium-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/austin-rose-lilian-austin.jpg?fit=298%2C300&amp;ssl=1" data-orig-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/austin-rose-lilian-austin.jpg?fit=600%2C605&amp;ssl=1" data-orig-size="600,605" data-permalink="https://hotgardens.net/grow-roses-in-a-hot-climate/austin-rose-lilian-austin/" height="300" sizes="(max-width: 298px) 85vw, 298px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/austin-rose-lilian-austin.jpg%3Fresize%3D298%252C300%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/austin-rose-lilian-austin.jpg?resize=298%2C300&amp;ssl=1 298w, https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/austin-rose-lilian-austin.jpg?resize=150%2C150&amp;ssl=1 150w, https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/austin-rose-lilian-austin.jpg?resize=100%2C100&amp;ssl=1 100w, https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/austin-rose-lilian-austin.jpg?w=600&amp;ssl=1 600w" width="298"></h6><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1786"><em data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">The fragrant David Austin rose, ‘Lilian Austin’, will bloom again and again throughout the summer</span></em><span data-dcnode-id="1787" instrument_node="">.</span></p><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">We love roses. We grow them. We cut them for bouquets in our home. We spray aphids off their leaves in the mornings. We fertilize them (irregularly) and cut the shrubs back in winter. We are, however, not rose experts by any measure.</span></p><div class="hotga-hot-gardens-content-1" data-dcnode-id="1776" id="hotga-1202885576" style="margin-left: auto; margin-right: auto; text-align: center; margin-top: 17px; margin-bottom: 17px; clear: both; "><ins class="adsbygoogle" data-ad-client="ca-pub-2553263214884055" data-ad-format="auto" data-ad-slot="3410600704" data-dcnode-id="1781" style="display:block;"></ins><span data-dcnode-id="1780" instrument_node="">
</span><span data-dcnode-id="1777" instrument_node="">
</span></div><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1770"><em data-dcnode-id="1771"><strong data-dcnode-id="1772"><span data-dcnode-id="1773" style="font-size: 14pt;"><span data-dcnode-id="1774" instrument_node="">What a professional rose grower recommends</span></span></strong></em></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1768" instrument_node="">But recently we attended a lecture by Luke Stimson of </span><a data-dcnode-id="1766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.davidaustinroses.com/us/"><span data-dcnode-id="1767" instrument_node="">David Austin Roses</span></a><span data-dcnode-id="1765" instrument_node=""> and learned — much to our surprise — that all David Austin Roses sold in the United States are grown in Arizona where the temperature reaches 90F on a daily basis for months on end. This makes these highly fragrant roses ideal for hot weather gardens.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><figure aria-describedby="caption-attachment-5529" class="wp-caption alignleft" data-dcnode-id="1759" id="attachment_5529" style="width: 300px"><img alt="Austin 'The Squire' rose deep red crimson" class="size-medium wp-image-5529" data-attachment-id="5529" data-comments-opened="1" data-dcnode-id="1762" data-image-caption="<p>The Squire rose by Austin Roses.</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;4&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;Canon PowerShot SX260 HS&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1416056877&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;4.5&quot;,&quot;iso&quot;:&quot;200&quot;,&quot;shutter_speed&quot;:&quot;0.016666666666667&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Austin ‘The Squire’ rose deep red crimson" data-large-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2019/02/Austin-The-Squire-rose-deep-red-crimson.jpg?fit=840%2C630&amp;ssl=1" data-medium-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2019/02/Austin-The-Squire-rose-deep-red-crimson.jpg?fit=300%2C225&amp;ssl=1" data-orig-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2019/02/Austin-The-Squire-rose-deep-red-crimson.jpg?fit=1050%2C787&amp;ssl=1" data-orig-size="1050,787" data-permalink="https://hotgardens.net/grow-roses-in-a-hot-climate/austin-the-squire-rose-deep-red-crimson/" height="225" loading="lazy" sizes="(max-width: 300px) 85vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/hotgardens.net/wp-content/uploads/2019/02/Austin-The-Squire-rose-deep-red-crimson.jpg%3Fresize%3D300%252C225%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/hotgardens.net/wp-content/uploads/2019/02/Austin-The-Squire-rose-deep-red-crimson.jpg?resize=300%2C225&amp;ssl=1 300w, https://i0.wp.com/hotgardens.net/wp-content/uploads/2019/02/Austin-The-Squire-rose-deep-red-crimson.jpg?resize=768%2C576&amp;ssl=1 768w, https://i0.wp.com/hotgardens.net/wp-content/uploads/2019/02/Austin-The-Squire-rose-deep-red-crimson.jpg?resize=1024%2C768&amp;ssl=1 1024w, https://i0.wp.com/hotgardens.net/wp-content/uploads/2019/02/Austin-The-Squire-rose-deep-red-crimson.jpg?w=1050&amp;ssl=1 1050w" width="300"><figcaption class="wp-caption-text" data-dcnode-id="1760" id="caption-attachment-5529"><span data-dcnode-id="1761" instrument_node="">The Squire rose by Austin Roses.</span></figcaption></figure><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">If you are not familiar with David Austin Roses, a little background: David Austin, who passed away recently after living into his 90s, began developing highly fragrant roses, many with the flower shape of a peony, decades ago in England near the wet and rainy Welsh border. Some people simply call them “English roses”.</span></p><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">In recent years he has expanded his research into creating disease-resistant roses and roses for warmer, dryer climates.</span></p><span data-dcnode-id="1752" instrument_node="">
</span><p data-dcnode-id="1750"><img alt="David Austin rose sir edward elgar" class="alignright wp-image-1044 size-full" data-attachment-id="1044" data-comments-opened="1" data-dcnode-id="1751" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="David Austin rose sir edward elgar" data-large-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/david-austin-rose-sir-edward-elgar.jpg?fit=300%2C299&amp;ssl=1" data-medium-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/david-austin-rose-sir-edward-elgar.jpg?fit=300%2C299&amp;ssl=1" data-orig-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/david-austin-rose-sir-edward-elgar.jpg?fit=300%2C299&amp;ssl=1" data-orig-size="300,299" data-permalink="https://hotgardens.net/grow-roses-in-a-hot-climate/david-austin-rose-sir-edward-elgar/" height="299" loading="lazy" sizes="(max-width: 300px) 85vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/david-austin-rose-sir-edward-elgar.jpg%3Fresize%3D300%252C299%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/david-austin-rose-sir-edward-elgar.jpg?w=300&amp;ssl=1 300w, https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/david-austin-rose-sir-edward-elgar.jpg?resize=150%2C150&amp;ssl=1 150w, https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/david-austin-rose-sir-edward-elgar.jpg?resize=100%2C100&amp;ssl=1 100w" width="300"></p><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1739"><em data-dcnode-id="1742"><br data-dcnode-id="1748"><span data-dcnode-id="1747" instrument_node="">The highly fragrant ‘Sir Edward Elgar’ rose lives side by side with a big-leafed, 5 foot tall </span><strong data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Cardoon</span></strong><span data-dcnode-id="1744" instrument_node=""> (Cynara Cardunculus) as part of a flower border.</span><br data-dcnode-id="1743"></em><br data-dcnode-id="1741"><span data-dcnode-id="1740" instrument_node="">Stimson advocated our favorite practice: plant roses as part of a traditional border — not a single, isolated specimen plants, neatly separated and labeled, as we often see in public rose gardens.</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">One benefit of planting roses in a perennial border is that the rose roots are more likely to be shaded most of the day and the rose leaves offer shade to other companion plants beside them in the border. Plants with cool roots grow better in the desert. (Except palms.) Roses should be planted where they will receive at least 6 hours of sun per day.</span></p><span data-dcnode-id="1735" instrument_node="">
</span><h6 data-dcnode-id="1731" style="text-align: left;"><strong data-dcnode-id="1732"><em data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Smelly food</span></em></strong></h6><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">He also revealed what fertilizer Austin roses receive in Arizona: AGED horse manure — 18 inches of it! He emphasized the “aged’ factor — fresh manure will burn the plants in a flash. If you have a source for manure, be sure to let it sit at least 5 to 6 months before you use it.</span></p><span data-dcnode-id="1727" instrument_node="">
</span><hr data-dcnode-id="1726"><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1710" style="text-align: center;"><span data-dcnode-id="1711" style="font-size: 14pt;"><span data-dcnode-id="1718" style="color: #800000;"><em data-dcnode-id="1719"><strong data-dcnode-id="1720"><span data-dcnode-id="1724" instrument_node="">Retired? Still need more income?</span><br data-dcnode-id="1723"><span data-dcnode-id="1722" instrument_node="">Read this best selling guide to 69+ ways to earn extra money</span><br data-dcnode-id="1721"></strong></em></span><span data-dcnode-id="1712" style="color: #339966;"><em data-dcnode-id="1713"><strong data-dcnode-id="1714"><span data-dcnode-id="1715" style="color: #800000;"><span data-dcnode-id="1716" style="color: #ff0000;"><span data-dcnode-id="1717" instrument_node="">Free on Kindle Unlimited&nbsp; &nbsp; New in Paperback</span></span></span></strong></em></span></span></p><span data-dcnode-id="1709" instrument_node="">
</span><hr data-dcnode-id="1708"><span data-dcnode-id="1707" instrument_node="">
</span><p class="auto-style39" data-dcnode-id="1705" style="text-align: left;"><span data-dcnode-id="1706" instrument_node="">Alternatively, you can ask your local garden center or nursery for organic mulch which combines aged manure with other components. This should not be as smelly as pure aged manure. You may also prefer an entirely different and less odoriferous solution: organic rose food you can pour from a bag. Commercial rose food, however, will not do much to balance the pH of the soil, so if you use it be sure to add a lot of organic compost to your flower bed.</span></p><span data-dcnode-id="1704" instrument_node="">
</span><h6 data-dcnode-id="1701" style="text-align: left;"><em data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">About watering roses</span></em></h6><span data-dcnode-id="1700" instrument_node="">
</span><p data-dcnode-id="1697"><img alt="Pink Roses in Pasadena" class="alignleft wp-image-1045 size-medium" data-attachment-id="1045" data-comments-opened="1" data-dcnode-id="1699" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Pink Roses in Pasadena" data-large-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/pink-roses-in-pasadena.jpg?fit=700%2C525&amp;ssl=1" data-medium-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/pink-roses-in-pasadena.jpg?fit=300%2C225&amp;ssl=1" data-orig-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/pink-roses-in-pasadena.jpg?fit=700%2C525&amp;ssl=1" data-orig-size="700,525" data-permalink="https://hotgardens.net/grow-roses-in-a-hot-climate/pink-roses-in-pasadena/" height="28" loading="lazy" sizes="(max-width: 300px) 85vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/pink-roses-in-pasadena.jpg%3Fresize%3D300%252C225%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/pink-roses-in-pasadena.jpg?resize=300%2C225&amp;ssl=1 300w, https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/pink-roses-in-pasadena.jpg?w=700&amp;ssl=1 700w" width="300"><span data-dcnode-id="1698" instrument_node="">Alas, roses like water and they should not be planted as part of a xeriscape border that is irrigated only once a week. And they need soil that drains well. Both these factors can create difficulties for hot climate gardeners.</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1695" instrument_node="">Many areas in the Southwest have </span><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hotgardens.net//low-down-dirt-in-desert-gardens/"><span data-dcnode-id="1694" instrument_node="">hard-as-rock clay soil</span></a><span data-dcnode-id="1692" instrument_node=""> so we recommend that you dig a hole at least twice as wide than the root ball to give the roots space to grow. You may also want to dig the hole much deeper than the root ball and backfill it firmly to the correct level. (If the hole is small, you are effectively planting your rose in an in-ground terra cotta pot with no drainage holes) Morning watering will help prevent diseases such as black spot. If you can only water in the evening, water at the roots; avoid splashing water on the leaves if at all possible. Standing water on the leaves is a major source of rose diseases.</span></p><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1686" style="font-size: 14pt;"><strong data-dcnode-id="1687"><em data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node=""> Pruning roses</span></em></strong></span></p><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Stimson also suggested a simple, practical annual pruning technique that conforms to what we have always done in our garden. In November or December, he said, cut your roses back to knee height — if you want a taller shrub, cut the roses back to waist height. For a shorter shrub, shape the plant during summer as you clip of the dead rose blooms. Be sure to cut out any stems that cross so when the roses regrow in Spring the new growth and leaves will not prevent air circulation in the center of the plant — although air circulation in a hot dry climate is not usually an issue!</span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">At this point rose experts will probably be claiming that each stem should be cut back by 5 buds. Personally, we like the simple knee height measurement better. Space allowing, the Austin catalog advocates not pruning annually at all.</span></p><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1676"><img alt="Austin roses on Greek home" class="alignleft wp-image-1046 size-medium" data-attachment-id="1046" data-comments-opened="1" data-dcnode-id="1677" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Austin roses on Greek home" data-large-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/austin-roses-on-greek-home.jpg?fit=640%2C480&amp;ssl=1" data-medium-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/austin-roses-on-greek-home.jpg?fit=300%2C225&amp;ssl=1" data-orig-file="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/austin-roses-on-greek-home.jpg?fit=640%2C480&amp;ssl=1" data-orig-size="640,480" data-permalink="https://hotgardens.net/grow-roses-in-a-hot-climate/austin-roses-on-greek-home/" height="28" loading="lazy" sizes="(max-width: 300px) 85vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/austin-roses-on-greek-home.jpg%3Fresize%3D300%252C225%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/austin-roses-on-greek-home.jpg?resize=300%2C225&amp;ssl=1 300w, https://i0.wp.com/hotgardens.net/wp-content/uploads/2017/05/austin-roses-on-greek-home.jpg?w=640&amp;ssl=1 640w" width="300"></p><span data-dcnode-id="1675" instrument_node="">
