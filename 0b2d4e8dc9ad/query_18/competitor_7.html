</span><nav aria-label="breadcrumb" class="mt-4" data-dcnode-id="633" id="breadcrumbs"><span data-dcnode-id="634"><span data-dcnode-id="635"><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.launchtesting.com/"><span class="fas fa-home" data-dcnode-id="654"><span class="sr-only" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Homepage</span></span></span></a><span data-dcnode-id="652" instrument_node=""> </span><span class="fas fa-xs fa-chevron-right mx-1" data-dcnode-id="651"></span><span data-dcnode-id="650" instrument_node=""> </span><span data-dcnode-id="636"><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/tips"><span data-dcnode-id="649" instrument_node="">Tips &amp; Techniques</span></a><span data-dcnode-id="647" instrument_node=""> </span><span class="fas fa-xs fa-chevron-right mx-1" data-dcnode-id="646"></span><span data-dcnode-id="645" instrument_node=""> </span><span data-dcnode-id="637"><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/category/gardening"><span data-dcnode-id="644" instrument_node="">Gardening</span></a><span data-dcnode-id="642" instrument_node=""> </span><span class="fas fa-xs fa-chevron-right mx-1" data-dcnode-id="641"></span><span data-dcnode-id="640" instrument_node=""> </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">The Ultimate Guide to Caring for Shrubs</span></span></span></span></span></span></nav><span data-dcnode-id="632" instrument_node=""> </span><h1 class="single--title" data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">The Ultimate Guide to Caring for Shrubs</span></h1><span data-dcnode-id="629" instrument_node="">
</span><p class="single--category" data-dcnode-id="626"><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/category/gardening" rel="category tag"><span data-dcnode-id="628" instrument_node="">Gardening</span></a></p><span data-dcnode-id="625" instrument_node="">
</span><div class="single--featured-img" data-dcnode-id="621"><span data-dcnode-id="624" instrument_node="">
</span><img alt="shrub-care-tips" class="attachment-post-thumbnail size-post-thumbnail wp-post-image" data-dcnode-id="623" height="580" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-01.jpg&amp;raw" srcset="https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-01.jpg 1000w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-01-600x348.jpg 600w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-01-300x174.jpg 300w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-01-768x445.jpg 768w" width="1000"><span data-dcnode-id="622" instrument_node="">
</span></div><span data-dcnode-id="620" instrument_node="">
</span><span data-dcnode-id="618" instrument_node="">
</span><div class="addthis_sharing_toolbox" data-dcnode-id="617"></div><span data-dcnode-id="616" instrument_node="">
</span><div class="single--content" data-dcnode-id="453"><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">By Marty Ross</span></p><span data-dcnode-id="612" instrument_node=""> </span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">When designing your outdoor space, consider adding shrubs. They make great additions around the foundations of a house or as privacy walls. Shrubs provide shade which can be helpful for lower-growing plants and can be used as backdrops to define garden beds.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Shrubs are small to medium-sized woody plants, larger than flower, but smaller than trees. They usually have several stems, not just one main stem or trunk, like a tree. A shrub can be less than a foot tall or up to 15 feet tall and may be evergreen or deciduous (dropping their leaves in the winter).</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><img alt="" class="alignnone size-full wp-image-12661" data-dcnode-id="605" height="450" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-02.jpg&amp;raw" srcset="https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-02.jpg 800w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-02-600x338.jpg 600w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-02-300x169.jpg 300w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-02-768x432.jpg 768w" width="800"></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Shrubs add color, foliage texture, and structure to a garden. The most popular shrubs are hydrangeas because of their long-lasting blooms. Lilacs, azaleas, roses, and butterfly bush are other popular flowering shrubs. Yews, boxwood, and arborvitae are evergreens and grown mainly for their lush greenery.</span></p><span data-dcnode-id="600" instrument_node="">
</span><h2 data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Planting shrubs</span></h2><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Choose a shrub that will thrive in your climate and conditions. A local garden shop is a great place to start. As you browse through the selection, read the labels to find out whether a shrub needs sun or shade, whether it tolerates drought or needs plenty of moisture, and what size it will be at maturity. Once you’ve chosen the right shrub, it’s time to plant.</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Before digging a hole, set the shrub in its nursery pot in the desired new spot. Allow plenty of room for it to grow. Don’t plant too close to the house, the front walk, or a driveway.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="590" instrument_node="">Now water the new plant well. Watering before planting helps reduce the stress of transplanting and helps keep the soil ball intact. </span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/products/nozzles-wands/watering-nozzles-wands/thumb-control-watering-nozzle-with-swivel-connect/"><span data-dcnode-id="589" instrument_node="">Gilmour’s Thumb Control Watering Nozzle</span></a><span data-dcnode-id="587" instrument_node=""> is an ideal tool to use because you can adjust the spray to water gently.</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Next, dig a hole. The hole should be the same depth as the plant’s pot and about twice as wide to give the shrub’s roots room to spread out. Take the plant out of its pot, loosen the soil around the sides, and center it in the hole at the same depth it was growing in the pot. Fill the hole around the shrub with soil. Firm the soil around the root ball with your hands making sure to establish good soil contact.</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><img alt="" class="alignnone size-full wp-image-12663" data-dcnode-id="581" height="450" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-04.jpg&amp;raw" srcset="https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-04.jpg 800w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-04-600x338.jpg 600w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-04-300x169.jpg 300w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-04-768x432.jpg 768w" width="800"></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">To reduce water run-off, make a ring of soil, compost or mulch around the edge of the hole. When watering, the water will then soak down to the roots. Mulch lightly around the plant to help keep the soil moist and to discourage weeds.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Use your watering nozzle to water thoroughly by hand. Another option is setting the nozzle on a “shrub” setting and laying it down by the shrub for a few minutes.</span></p><span data-dcnode-id="573" instrument_node="">
</span><h2 data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Pruning shrubs</span></h2><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Light pruning from time to time will help maintain a shrub’s size and shape. There are a few different tools you can use depending on the size of the shrub and the area you are pruning. Choose between hand shears, loppers, or hedge shears.</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><img alt="" class="alignnone size-full wp-image-12664" data-dcnode-id="566" height="450" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-05.jpg&amp;raw" srcset="https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-05.jpg 800w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-05-600x338.jpg 600w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-05-300x169.jpg 300w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-05-768x432.jpg 768w" width="800"></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="563" instrument_node="">Spring is a good time to prune, before the shrub leafs out. Use </span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/products/pruning-tools/limbs-branches/telescoping-bypass-lopper-1155"><span data-dcnode-id="562" instrument_node="">loppers</span></a><span data-dcnode-id="560" instrument_node=""> or </span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/products/pruning-tools"><span data-dcnode-id="559" instrument_node="">hand pruners</span></a><span data-dcnode-id="557" instrument_node=""> to remove dead stems, wayward or crossing branches. Cut dead stems back to a point where you can see fresh growth.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Wait to prune flowering shrubs, such as lilacs, until after they bloom. Lilacs produce spring flower buds on stems from the previous summer. If you prune lilacs in spring, before they bloom, you may be cutting off flower buds. Pruning after flowering also encourages re-blooming shrubs to bush out and produce another round of blooms.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Big blue or pink-flowering hydrangeas should be cleaned and shaped early in spring, cutting off the spent blooms from the previous year and removing any dead stems.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><img alt="" class="alignnone size-full wp-image-12665" data-dcnode-id="548" height="450" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-06.jpg&amp;raw" srcset="https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-06.jpg 800w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-06-600x338.jpg 600w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-06-300x169.jpg 300w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-06-768x432.jpg 768w" width="800"></p><span data-dcnode-id="546" instrument_node="">
</span><h2 data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Watering shrubs</span></h2><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Watering is one of the most important things you can do to take care of shrubs, especially newly planted ones. During their first season in the garden, water thoroughly once a week if it doesn’t rain. Soak the soil around the shrub, using a nozzle to manage the flow. Lay the nozzle on the ground and turn on the water to a slow flow.</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="539" instrument_node="">Easily adjust the flow with the thumb control watering nozzle. Then set a </span><a data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/products/timers/electronic/electronic-water-timer/"><span data-dcnode-id="538" instrument_node="">timer</span></a><span data-dcnode-id="536" instrument_node=""> for five or 10 minutes to allow the water to sink in. Deep watering encourages the shrub’s roots to grow deep into the soil. Once there, they will have more access to moisture.</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="533" instrument_node="">Another tool you can use to water newly planted shrubs is a </span><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/products/hoses/lawn-garden-hoses/soaker-hoses/soaker-hose/"><span data-dcnode-id="532" instrument_node="">soaker hose</span></a><span data-dcnode-id="530" instrument_node="">. Lay the hose around the shrub inside the watering ring and turn the water on so it is weeping gently from the hose. Leave the water on for about 10 minutes to water deeply. Then check the moisture in the soil with your finger. If it feels moist down to the root layer, turn the water off.</span></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="527" instrument_node="">If you’re watering a number of shrubs in a border or a hedge, use a sprinkler, such as </span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/products/sprinklers/lawn-sprinklers/adjustable-circular-tripod-sprinkler-1677/"><span data-dcnode-id="526" instrument_node="">Gilmour’s Tripod Circular Sprinkler</span></a><span data-dcnode-id="524" instrument_node="">, to water the area where shrubs are growing.</span></p><span data-dcnode-id="522" instrument_node="">
</span><h2 data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Feeding shrubs</span></h2><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Newly planted shrubs should not be fertilized. Applying fertilizer to new shrubs can lead to weak, spindly growth. Mulching the soil with compost helps maintain moisture and adds sufficient nutrients and micronutrients to the soil.</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Before fertilizing existing shrubs that are performing poorly, cultivate the soil around them lightly and add a layer of mulch or compost. Make sure they are getting the moisture they need and prune to remove damaged stems. If the shrubs do not respond to this care, then fertilize lightly, following the directions on the package.</span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><img alt="" class="alignnone size-full wp-image-12667" data-dcnode-id="512" height="450" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-08.jpg&amp;raw" srcset="https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-08.jpg 800w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-08-600x338.jpg 600w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-08-300x169.jpg 300w, https://gilmour.com/wp-content/uploads/2017/06/shrub-care-tips-08-768x432.jpg 768w" width="800"></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Good gardening practices are the key to growing beautiful shrubs. Choose shrubs that thrive in your area, plant them properly and give them room to grow. Make sure to water thoroughly while they are becoming established and continue to water when necessary. Prune to shape, encourage blooms, and remove lanky, dead, or crossing stems.</span></p><span data-dcnode-id="507" instrument_node="">
