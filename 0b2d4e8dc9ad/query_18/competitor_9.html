</span><div class="single-page post-1922 post type-post status-publish format-standard hentry category-research-study category-shrubs category-trees tag-pruning tag-shrubs-2 tag-trees-2" data-dcnode-id="2019" id="post-1922"><span data-dcnode-id="2631" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Pruning Trees and Shrubs – Will Late Summer Pruning Harm Them?</span></h1><span data-dcnode-id="2628" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="2624"><span data-dcnode-id="2627" instrument_node="">By </span><a data-dcnode-id="2626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenmyths.com/author/teachgm/" rel="author" title="Posts by "></a><span data-dcnode-id="2625" instrument_node=""> on </span></p><span data-dcnode-id="2623" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2044"><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Pruning trees and shrubs in late summer is NOT recommended because such pruning causes new soft growth that can’t harden off before winter. You will find this advice everywhere, but is it correct?</span></p><span data-dcnode-id="2619" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2613" id="attachment_2661" style="width: 510px"><img alt="Pruning trees and shrubs" aria-describedby="caption-attachment-2661" class="wp-image-2661 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="2618" data-lazy-loaded="1" height="319" loading="eager" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenmyths.com/wp-content/uploads/2014/10/Pruning-trees-and-shrubs.jpg&amp;raw" srcset="https://www.gardenmyths.com/wp-content/uploads/2014/10/Pruning-trees-and-shrubs.jpg 500w, https://www.gardenmyths.com/wp-content/uploads/2014/10/Pruning-trees-and-shrubs-300x191.jpg 300w" title="Pruning trees and shrubs" width="500"><noscript data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">&lt;img aria-describedby="caption-attachment-2661" class="wp-image-2661 size-full" title="Pruning trees and shrubs" src="https://www.gardenmyths.com/wp-content/uploads/2014/10/Pruning-trees-and-shrubs.jpg" alt="Pruning trees and shrubs" width="500" height="319" srcset="https://www.gardenmyths.com/wp-content/uploads/2014/10/Pruning-trees-and-shrubs.jpg 500w, https://www.gardenmyths.com/wp-content/uploads/2014/10/Pruning-trees-and-shrubs-300x191.jpg 300w" sizes="(max-width: 500px) 100vw, 500px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="2614" id="caption-attachment-2661"><span data-dcnode-id="2615" instrument_node="">Pruning trees and shrubs – what is the best time?</span></p></div><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2610" style="text-align: center;"><span data-dcnode-id="2611" id="more-1922"></span></p><span data-dcnode-id="2609" instrument_node="">
</span><h2 data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Pruning Trees and Shrubs</span></h2><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">The woody stems of trees and shrubs go through an annual process of maturation. In spring new growth starts and continues into early summer. The growth at this point in time is called ‘softwood’ because it is soft and pliable, and can be bent to a large degree without breaking. If you bend it too much it will snap and break but in some species you can actually tie the stem into a knot without breaking them. This softwood is not yet mature, and it can’t withstand freezing.</span></p><span data-dcnode-id="2603" instrument_node="">
</span><p data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">As the summer progresses, the plant slowly converts the softwood into hardwood. The bark thickens and and the color changes from green to brown. The hardwood becomes much stiffer and does not bend very well. Along with the physical changes there are internal chemical changes that make it more resistant to low temperatures. It is getting ready for a freezing winter.</span></p><span data-dcnode-id="2600" instrument_node="">
</span><p data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">Pruning trees and shrubs stimulates new growth. If pruning is done in spring, the new growth has time to mature and become hardwood before winter starts and it can then survive the cold of winter. However, if pruning is done too late in the season, there is not enough time for the new growth to harden off–it runs out of time to become hardwood. When winter comes, it will freeze and die off.</span></p><span data-dcnode-id="2597" instrument_node="">
</span><p data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">To combat the problem of winter die off, it is commonly suggested that you do not prune trees and shrubs in late summer or early fall. If you don’t prune at this time, you will not cause new growth, and winter will not damage your woody plants. This all makes a lot of sense.</span></p><span data-dcnode-id="2594" instrument_node="">
</span><p data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">But ….how early is too early to prune late in the season?</span></p><span data-dcnode-id="2591" instrument_node="">
</span><p data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">This question was discussed on social media a few months ago, and it was suggested that pruning in mid August might not cause new growth. The following experiment was carried out to determine if it is OK to prune in late summer.</span></p><div class="code-block code-block-1" data-dcnode-id="2582" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2588" instrument_node="">
</span><a data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gardenmyths.com/garden-myths-book-1/" rel="noopener" target="_blank"><img alt="Garden Myths book by Robert Pavlis" class="aligncenter wp-image-5381 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="2587" data-lazy-loaded="1" height="160" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenmyths.com/wp-content/uploads/2019/12/garden-myths-1-and-2-ver-2-500.jpg&amp;raw" title="Garden Myths book by Robert Pavlis" width="500"><noscript data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">&lt;img class="aligncenter wp-image-5381 size-full" title="Garden Myths book by Robert Pavlis" src="https://www.gardenmyths.com/wp-content/uploads/2019/12/garden-myths-1-and-2-ver-2-500.jpg" alt="Garden Myths book by Robert Pavlis" width="500" height="160" /&gt;</span></noscript></a><span data-dcnode-id="2583" instrument_node="">
</span></div><span data-dcnode-id="2581" instrument_node="">
</span><h2 data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">Experiment Design</span></h2><span data-dcnode-id="2578" instrument_node="">
</span><p data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">On August 15, 2014 I went around my garden and took cuttings from a number of shrubs. I tried to include a variety of species to get a good cross section of shrubs. In most cases, two different types of cuttings were made:</span></p><span data-dcnode-id="2575" instrument_node="">
</span><ul data-dcnode-id="2567"><span data-dcnode-id="2574" instrument_node="">
</span><li data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">This years growth (starting to harden off)</span></li><span data-dcnode-id="2571" instrument_node="">
</span><li data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">2-3 year old growth (fully hardened)</span></li><span data-dcnode-id="2568" instrument_node="">
</span></ul><span data-dcnode-id="2566" instrument_node="">
</span><p data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2563" instrument_node="">
</span><p data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">I wanted to see if there was a difference in response to the two types of cuts. In theory, the tip of this years growth should contain higher levels of auxins (plant hormones) and be more responsive to a cut. Older wood should require a longer time to mobilize chemicals to the right spot and wake up dormant buds–at least that seemed like a rational explanation.</span></p><span data-dcnode-id="2560" instrument_node="">
</span><p data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">If pruning in late summer causes new growth then most, if not all, of the cuts would generate new growth. In that case a second round of cuts was planned for September 15 to see if pruning done at the start of fall would initiate new growth.</span></p><div class="code-block code-block-7" data-dcnode-id="2552" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2557" instrument_node="">
</span><a data-dcnode-id="2553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenfundamentals.com/plant-science-for-gardeners/" rel="noopener" target="_blank"><img alt="Plant Science for Gardeners by Robert Pavlis" class="aligncenter wp-image-9109 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="2556" data-lazy-loaded="1" height="141" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenmyths.com/wp-content/uploads/2022/04/Plant-Scieince-ad.jpg&amp;raw" title="Plant Science for Gardeners by Robert Pavlis" width="500"><noscript data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">&lt;img class="aligncenter wp-image-9109 size-full" title="Plant Science for Gardeners by Robert Pavlis" src="https://www.gardenmyths.com/wp-content/uploads/2022/04/Plant-Scieince-ad.jpg" alt="Plant Science for Gardeners by Robert Pavlis" width="500" height="141" /&gt;</span></noscript></a></div><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">The following is a list of the shrubs used in the test. All were well established and have been in the current location for 3 to 7 years. Unless noted otherwise (see notes below), the shrubs had stopped their spring/summer growth period. The third column indicates whether new growth took place in the 30 days following the cuts.</span></p><span data-dcnode-id="2548" instrument_node="">
</span><p data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2545" instrument_node="">

</span><h3 data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Notes:</span></h3><span data-dcnode-id="2147" instrument_node="">
</span><p data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">1) Caryopteris divaricata ‘Snow Fairy’ and Buddleja davidii were growing at the time the cuttings were made and these shrubs tend to keep growing until frost. The amount of new growth was the same on cut stems and non-cut stems. Both shrubs are root hardy in zone 5, but are not stem hardy. They are treated more like perennials in this climate and are cut back each spring.</span></p><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">2) Plants with only a ‘current year’ cut, are plants that are normally cut to the ground in spring, so there was no 2-3 year old growth to cut.</span></p><div class="code-block code-block-5" data-dcnode-id="2135" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2141" instrument_node="">
</span><a data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gardenfundamentals.com/soil-science/" rel="noopener" target="_blank"><img alt="Soil Science for Gardeners book by Robert Pavlis" class="aligncenter wp-image-5381 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="2140" data-lazy-loaded="1" height="169" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenmyths.com/wp-content/uploads/2019/12/soil-ad-1-500.jpg&amp;raw" title="Soil Science for Gardeners book by Robert Pavlis" width="500"><noscript data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">&lt;img class="aligncenter wp-image-5381 size-full" title="Soil Science for Gardeners book by Robert Pavlis" src="https://www.gardenmyths.com/wp-content/uploads/2019/12/soil-ad-1-500.jpg" alt="Soil Science for Gardeners book by Robert Pavlis" width="500" height="169" /&gt;</span></noscript></a><span data-dcnode-id="2136" instrument_node="">
</span></div><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">3) The Rose is a vigorous fall grower in zone 5, and normally keeps growing and flowering until frost. There was more growth on the cut stems than the non-cut stems. The rose stems usually die back to ground during the winter.</span></p><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">4) Two shrubs, Spirea X vanhouetii and salix purpurea ‘Nana’, showed ‘minimal new growth’ on 2-3 year old stems. Minimal new growth is 3-4 very small leaves. Unexpectedly, the pruning did not initiate grow on the current years growth.</span></p><span data-dcnode-id="2128" instrument_node="">
</span><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">5) 2014 was an unusual year weather wise. The middle of the summer was colder than usual which resulted in some plants flowering earlier, and others flowering much later.</span></p><span data-dcnode-id="2125" instrument_node="">
</span><h2 data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Best Time to Prune, Conclusion</span></h2><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">At the test site located in Southern Ontario in 2014, pruning on August 15 did not result in new growth for the majority of shrubs. Except for the rose, new growth was minimal or non-existent.</span></p><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">It is possible that a more major pruning (ie removal of a large number of stems) may result in new growth.&nbsp; It is also possible that the results of this test are unusual given the cold summer weather.</span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Since pruning mid August caused very limited new growth, the mid September pruning was not carried out.</span></p><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">The data from this test suggests that late summer or fall pruning will not result in new growth, and there should not be any concern about winter damage. The commonly accepted recommendation, not to prune in late summer or early fall does not seem to harm the shrubs. Pruning in late fall or winter certainly works, but late summer or early fall should also work in zone 5.</span></p><span data-dcnode-id="2110" instrument_node="">

</span><cite class="fn" data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">david</span></cite><span data-dcnode-id="1847" instrument_node=""> </span><span class="says" data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">says:</span></span><span data-dcnode-id="1844" instrument_node=""> </span></div><span data-dcnode-id="1842" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="1839"><a data-dcnode-id="1840" href="#comment-525"><span data-dcnode-id="1841" instrument_node="">November 1, 2014 at 7:38 am</span></a></div><span data-dcnode-id="1838" instrument_node="">
</span><p data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">I think we are getting a bit complicated here. As a horny handed gardener with 40 years experience I can confidently say that some plants definitely shouldn’t be pruned to early (unless you intend to prune again in November…). I am thinking particularly of Yew hedges, which will regrow after an August pruning and the new growth will freeze, looking unsightly. I also used a very rough guide: ‘plant (or prune) Spring flowering species in Autumn, summer and Autumn flowering species in Spring’. Sometimes difficult to decide if something is late Spring or early Summer flowering, but that doesn’t seem to make a difference.</span></p><span data-dcnode-id="1835" instrument_node="">

</span><div class="comment-meta commentmetadata" data-dcnode-id="1808"><a data-dcnode-id="1809" href="#comment-539"><span data-dcnode-id="1810" instrument_node="">November 6, 2014 at 12:41 am</span></a></div><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Your rule of thumb will work in most cases, but pruning spring flowering shrubs in autumn will remove the flowers for next year. Spring flowering shrubs develop their buds during summer for the following year and an autumn pruning removes them. </span></p><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">Even if we follow your rule, one has to define what ‘autumn’ is. Late fall after leaf drop is certainly a safe time to prune. What this blog post tries to determine is how early is too early. </span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">What about Yews? It is certainly possible that an August pruning, leads to new growth–they seem to grow all the time. Does this new growth get damaged in winter? That was not tested in the above list of plants–a project for next year.</span></p><span data-dcnode-id="1798" instrument_node="">

</span><div class="comment-meta commentmetadata" data-dcnode-id="1771"><a data-dcnode-id="1772" href="#comment-540"><span data-dcnode-id="1773" instrument_node="">November 6, 2014 at 5:13 am</span></a></div><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1766"><span data-dcnode-id="1769" instrument_node="">OK, you are quite right of course, I was maybe confusing ‘autumn planting’ with autumn pruning. Substitute ‘summer pruning’ for autumn pruning, but you have to prune sometime, do you not?</span><br data-dcnode-id="1768"><span data-dcnode-id="1767" instrument_node="">
I had a huge yew hedge to look after. It would get a going over in July/ August, followed by a final trimming after the first frost. Not pruning in November resulted in the top growth going yellow due to freeze back, so you learnt about yews that way. There are so many different climate zones to consider that it is difficult to establish firm and fast rules about this kind of thing.</span></p><span data-dcnode-id="1765" instrument_node="">

</span><div class="comment-meta commentmetadata" data-dcnode-id="1738"><a data-dcnode-id="1739" href="#comment-554"><span data-dcnode-id="1740" instrument_node="">November 14, 2014 at 3:23 pm</span></a></div><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">when talking about things like pruning it is always important to know about things like climatic zones, that is why I mentioned that this testing was done in zone 5. If you are in another zone you need to adjust the dates. </span></p><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Unfortunately people like simple rules and will base gardening tasks on dates–which is not the best way to go. Learn to look at the plants. What are they doing? Base gardening tasks on what the plants tell you–not on specific dates. </span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">I prune early flowering shrubs right after blooming. Some evergreens such as pines as the candles elongate. Everything else gets pruned in winter when I have nothing else to do in the garden.</span></p><span data-dcnode-id="1728" instrument_node="">

</span><cite class="fn" data-dcnode-id="1689"><a class="url" data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//garden%40leereich.com/" rel="external nofollow ugc"><span data-dcnode-id="1691" instrument_node="">Lee Reich</span></a></cite><span data-dcnode-id="1688" instrument_node=""> </span><span class="says" data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">says:</span></span><span data-dcnode-id="1685" instrument_node=""> </span></div><span data-dcnode-id="1683" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="1680"><a data-dcnode-id="1681" href="#comment-515"><span data-dcnode-id="1682" instrument_node="">October 23, 2014 at 1:28 am</span></a></div><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Pruning late in the season could stimulate metabolic activity at a time when plants should be “shutting down.” Metabolically active cells presumably would be more susceptible to winter injury. More useful that looking for new growth would be to monitor cold injury at the end of winter, which would likely also be dependent on the severity of the winter cold.</span></p><span data-dcnode-id="1676" instrument_node="">
</span><div class="reply" data-dcnode-id="1671"><span data-dcnode-id="1675" instrument_node="">
</span><a aria-label="Reply to Lee Reich" class="comment-reply-link" data-belowelement="comment-515" data-commentid="515" data-dcnode-id="1673" data-postid="1922" data-replyto="Reply to Lee Reich" data-respondelement="respond" href="#comment-515" rel="nofollow"><span data-dcnode-id="1674" instrument_node="">Reply</span></a><span data-dcnode-id="1672" instrument_node=""> </span></div><span data-dcnode-id="1670" instrument_node="">

</span><li class="comment odd alt depth-2" data-dcnode-id="1592" id="li-comment-516"><span data-dcnode-id="1666" instrument_node="">
</span><div data-dcnode-id="1632" id="comment-516"><span data-dcnode-id="1665" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="1653"><span data-dcnode-id="1664" instrument_node="">
</span><img alt="" class="avatar avatar-48 photo jetpack-lazy-image" data-dcnode-id="1663" data-lazy-src="https://secure.gravatar.com/avatar/c8bacc9d9920d57203e2edc889c8b26b?s=48&amp;is-pending-load=1#038;d=%3Cpath_to_url%3E&amp;r=g" data-lazy-srcset="https://secure.gravatar.com/avatar/c8bacc9d9920d57203e2edc889c8b26b?s=96&amp;d=%3Cpath_to_url%3E&amp;r=g 2x" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/c8bacc9d9920d57203e2edc889c8b26b%3Fs%3D48%26d%3D%253Cpath_to_url%253E%26r%3Dg&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="48"><noscript data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">&lt;img alt='' src='https://secure.gravatar.com/avatar/c8bacc9d9920d57203e2edc889c8b26b?s=48&amp;#038;d=%3Cpath_to_url%3E&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/c8bacc9d9920d57203e2edc889c8b26b?s=96&amp;#038;d=%3Cpath_to_url%3E&amp;#038;r=g 2x' class='avatar avatar-48 photo' height='48' width='48' loading='lazy'/&gt;</span></noscript><span data-dcnode-id="1660" instrument_node="">
</span><cite class="fn" data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Robert Pavlis</span></cite><span data-dcnode-id="1657" instrument_node=""> </span><span class="says" data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">says:</span></span><span data-dcnode-id="1654" instrument_node=""> </span></div><span data-dcnode-id="1652" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="1649"><a data-dcnode-id="1650" href="#comment-516"><span data-dcnode-id="1651" instrument_node="">October 23, 2014 at 1:46 pm</span></a></div><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Can you stimulate metabolic activity without also starting the growth process? I guess it might be possible to change the internal chemical processes so cells stop getting ready for winter. But I think (just a guess) that the processes to get a cell ready for winter are driven more strongly by light durations and temperatures, than by pruning. </span></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">The reason for looking for new growth is that most warnings about pruning too early indicate that it results in new growth that does not have time to harden off. This test seem to disprove this. You are quite correct that it does not disprove the idea that early pruning may still result in winter injury of a different type. </span></p><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Measuring winter injury would be much more difficult. It is possible that you see more winter damage on stems that had been pruned than none pruned stems? But it is would probably be best to test whole shrubs–some pruned and some not pruned. And it should be a multiyear process to take into account yearly variability. The pruned areas on the shrubs in this test will still be marked in spring so I can see if there is any differences between pruned stems and none pruned stems.</span></p><span data-dcnode-id="1639" instrument_node="">
</span><div class="reply" data-dcnode-id="1634"><span data-dcnode-id="1638" instrument_node="">
</span><a aria-label="Reply to Robert Pavlis" class="comment-reply-link" data-belowelement="comment-516" data-commentid="516" data-dcnode-id="1636" data-postid="1922" data-replyto="Reply to Robert Pavlis" data-respondelement="respond" href="#comment-516" rel="nofollow"><span data-dcnode-id="1637" instrument_node="">Reply</span></a><span data-dcnode-id="1635" instrument_node=""> </span></div><span data-dcnode-id="1633" instrument_node="">

</span><img alt="" class="avatar avatar-48 photo jetpack-lazy-image" data-dcnode-id="1626" data-lazy-src="https://secure.gravatar.com/avatar/4e48b2fa1b5b4e07e64d23290f37e937?s=48&amp;is-pending-load=1#038;d=%3Cpath_to_url%3E&amp;r=g" data-lazy-srcset="https://secure.gravatar.com/avatar/4e48b2fa1b5b4e07e64d23290f37e937?s=96&amp;d=%3Cpath_to_url%3E&amp;r=g 2x" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/4e48b2fa1b5b4e07e64d23290f37e937%3Fs%3D48%26d%3D%253Cpath_to_url%253E%26r%3Dg&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="48"><noscript data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">&lt;img alt='' src='https://secure.gravatar.com/avatar/4e48b2fa1b5b4e07e64d23290f37e937?s=48&amp;#038;d=%3Cpath_to_url%3E&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/4e48b2fa1b5b4e07e64d23290f37e937?s=96&amp;#038;d=%3Cpath_to_url%3E&amp;#038;r=g 2x' class='avatar avatar-48 photo' height='48' width='48' loading='lazy'/&gt;</span></noscript><span data-dcnode-id="1623" instrument_node="">
</span><cite class="fn" data-dcnode-id="1620"><a class="url" data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//garden%40leereich.com/" rel="external nofollow ugc"><span data-dcnode-id="1622" instrument_node="">Lee Reich</span></a></cite><span data-dcnode-id="1619" instrument_node=""> </span><span class="says" data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">says:</span></span><span data-dcnode-id="1616" instrument_node=""> </span></div><span data-dcnode-id="1614" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="1611"><a data-dcnode-id="1612" href="#comment-517"><span data-dcnode-id="1613" instrument_node="">October 24, 2014 at 10:56 am</span></a></div><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Briefly . . . You could have metabolic activity being stimulated without a gross, visible sign of growth stimulation. Measuring winter cold damage is not at all difficult; just look for dead stems or parts  of stems. As with any horticultural “experiment”, you need a sufficient number of test subjects to pin down variability on the treatment you are testing rather than weather, parts of plant treated, etc.</span></p><span data-dcnode-id="1607" instrument_node="">
